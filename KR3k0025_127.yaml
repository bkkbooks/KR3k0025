body:
  text: 不遇經我生不辰衛之賢者仕於伶官柏舟言仁而不遇也衛頃公之時仁人不遇小人在側並毛詩子駑驥同轅伯樂為之咨嗟玉石相揉和氏為之嘆息孔叢子儒服篇浮磬息音未別於眾石抱朴子越公初見子遇內史薛公曰公見王通乎薛公曰鄉人也是其家傳七世矣皆有經濟之道而位不逢越公曰天下豈有七世不逢乎薛公曰君子道消十世不逢有矣文中子禮樂篇史六鷁退飛左僖十六自屈原沈汨羅後百有餘年漢有賈生為長沙王太傅過湘水投書以吊屈原史記屈原傳蘇秦出遊數歲大困而歸本傳仲尼干七十餘君無所遇儒林傳孔子去魯斥乎齊逐乎宋衛困於陳蔡之間孔世家並史朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯飲之漢書張釋之十年不見省馮唐白首屈於郎荀悅漢紀文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉西漢李廣傳何為官之拓落也楊雄傳馮唐為郎帝問曰父老何自為郎師古曰年已老本傳張釋之以貲為騎郎事文帝十年不得調亡所知名本傳揚雄三世不徙官本傳廣數奇孟康曰不偶也李廣傳留落不偶霍去病傳長卿久宦遊不遂司馬相如傳並前漢馬融為校書郎十年不調後漢本傳懷琬琰以就埃塵抱棟梁而困溝壑晉書趙有處士毛公隱於博徒薛公隱於賣漿家通監五周紀魏高允為郎二十七年不徙官同上宋武帝紀劉藏器七十為尚書郎唐高宗紀王義方一世英豪而死草萊同上汲黯直氣餓死淮陽仲舒大才位屈於諸侯相封事孔子門人三千達者無子男之位並唐傳記王播少孤貧嘗客楊州木蘭院隨僧齋僧厭之播至已飯矣摭言顏駟對武帝曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇漢武故事段相文昌少貧每聽曾口寺齋鍾輒詣謁食為寺僧所厭乃齋後撞鍾後入相出鎮京南題曾口寺云曾遇闍梨飯後鍾北夢瑣言集年既已過太半然坎軻而留滯楚辭當世豈無騏驥兮誠無王良之善御懷瑾握瑜兮窮不知所示伯牙之絕絃無鍾子期而聽之和抱璞而泣血安得良工而別之並楚辭潦倒聲名壅腫材一生多故苦邅迴劉賓客萬族咸悅獨為窮人四時平分未變寒谷孤鳴甚哀卒無善聽並同上早行多露悔強進觸藩羸呂和叔文憊色秋來草哀吟雨後蟬元微之金寶潛砂礫芝蘭似草萊同上其言如水投石莫之受也文選李蕭遠運命論以仲尼之才也而器不用於魯衛以仲尼之辯也而言不行於定哀以仲尼之謙也而見忌於子西以仲尼之仁也而取讎於亙魋以仲尼之智也而受屈於陳蔡以仲尼之行也而招毀於叔孫夫道足以濟天下而不得貴於人言足以經萬世而不信於時行足以應神明而不能彌綸於俗應聘七十國而不一獲其主驅驟於蠻夷之域屈辱於公卿之門其不遇也如此同上班匠不我顧牙曠不我錄焉得成琴瑟何由揚妙曲司馬紹贈山濤互入怨望卞和潛幽冥誰能證奇璞未遇伯樂則千載無一驥並文選百年歌自苦未見有知音杜詩垂白馮唐老真成窮轍鮒或似喪家狗有才無命百寮底相如逸才親滌器子雲識字終投閣但覺高歌有鬼神焉知餓死填溝壑醉時歌並杜詩東野不得官白首誇龍鍾韓文汨東西與南北亙十年以不居辱飽食其有數況策名於薦書時所好之為賢庸有謂余之非愚及時運之未來或兩求而莫致雖家至而戶曉祗以招尤而速累感二鳥賦選舉於有司與百千人偕進偕退不得策名於薦書齒下士于朝以望天子之光明同上世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴隸之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也策之不以其道食之不能盡其材鳴之不能通其意執策而臨之曰天下無良馬嗚呼其真無馬耶其真不識馬耶雜說名不譽大夫之口上賈滑州書並韓文馮公豈不偉白首不見招詠史詩十處投人九處違家鄉萬里又空歸唐李吉甫之父詩騏驥筋力成意在萬里外歷塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅別島空留大名李太白集互入失勢祗歎官如舊韋應物鏌釾無人淬兩刃幽壤鐵秦鏡無人拭一片埋霧月驥跼獧闍中骨附筋入節蚖蟠尺澤內魚貫蛙同穴元稹集抱冤志氣屈忍恥形神沮白樂天集詞賦擅名來已久煙霄得路去何遲文行如君尚憔悴不知霄漢待何人如今豈無腰褭與驊騮時無王良伯樂死即休並同上姜子牙貧賣漿值天涼白帖上嘗三欲命李白官卒為宮中所捍而止李陽冰作李白集序去矣時難遇沽哉價莫酬杜牧之自來金骨無人識溫飛卿徒有干時策青山尚掩門許用晦文仲尼聖賢之宗位至於司寇師聃道德之祖官不過柱史李文饒低佪歧路杼軸蓬心文粹文王久不出賢士如土賤劉文時無識寶世缺知音若論衡之未遇伯喈太玄之不逢平子逝將煙燼火滅泥沈雨絕安有歿而不朽揚名於後乎史通本朝神奇之產銷藏委翳於蒿藜榛莽之間而山岩野叟不知其為瑞也臨川集互入處非其地子雲苦執戟長孺終主爵東坡子蘭芝以芳未嘗見霜淮南子史楊大眼謂同寮曰吾之今日所謂蛟龍得雨之秋也自此一舉不復與諸君齊列矣後魏本傳互入論矜及得勢門上曰八堯九舜不能冬種野夫童子春種而生得時故也通監唐太宗紀集策名清時榮聞休暢李陵報蘇武書熙乎若鴻鴈之得春也陳子昂蛟龍得雲雨鵰鶚在秋天杜詩驊騮開道路鷹隼出風塵同上春風得意馬蹄疾一日看盡長安花孟東野互入失勢平衢騁高足逸翰凌長風李太白久跼散游曠窮慘遇陽舒韋應物一日風雲會橫行歸故鄉元稹集涸魚千丈水僵燕一聲雷元微之如幽蟄聞春雷而起柔荑望和風而拆呂和叔文秋來氣勢洪河壯霜後精神泰華獰杜牧之芍藥薔薇語早梅不知誰是艷陽才從令領得東風意不復饒君雪裏開溫飛卿明月讓燈光王維集本朝李密詩曰樊噲市井徒蕭何刀筆吏一朝時運來千古傳名謚續世說互入人生罔測清秋一鶚上拭目萬人看後山經絺兮綌兮凄其以風詩燕燕日月逝矣歲不我與語季氏史上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也西漢李尋傳蘭榮一何晚嚴霜萃其柯後漢酈炎傳集常恐秋節至涼飆奪炎熱棄捐篋笥中恩情中道絕班婕妤扇詩屈身泥蟠陳子昂終為時來晚花開不及春唐詩石榴詩扇因秋棄置元微之鴻倦青冥翮蛟潛雲雨心白侍郎詩經何天之衢道大行也易大畜卦出自幽谷遷于喬木小雅伐木詩互見引凡入聖子猶水之就下獸之走壙也孟子离婁上鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里故九萬里則風斯在下矣莊子逍遙遊篇史司馬相如成都人家徒四壁立後數歲為中郎至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵西漢本傳互見人生罔測跨騰風雨西漢班固敘傳龍躍天衢振翼雲漢孔融薦禰衡表整轡雲衢驤首天路三國名臣序楊大眼謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣北楊大眼傳互入驕矜傳記鴻鵠高蜚一舉千里羽融已就橫絕四海雖有繒繳尚安所施劉向新序鴻脩六翮而凌清風麃搖高翔同上走人於庭辟人於塗戰國策集躡天衢而長驅楚辭濯翼凌高梯應瑒建章臺詩乘雲翔鄧林阮嗣宗詠懷濯鱗清流飛翼天衢阮元瑜詩風雲會一合呼吸期萬里雷研山岳碎電斬鯨鯢死元稹詩逸足競駸駸鵬路觀翱翔霜蹄千里駿風翮九霄鵬潛鱗輸駭浪歸翼會高風九萬一朝摶並杜詩飛龍在天巨魚縱壑駱賓王倏忽摶風生羽翼同上假高衢而騁力王仲宣賦疾奔凌騕褭高唱軋吳歌元微之魚得水而游馬逸駕而走鳥乘風而翔火得薪而熾此皆快其物之所蘊也同上席其勢鼓行人間劉賓客集互入恃勢鯤化鵬征擘波沖天同上貴有風雲興富無飢寒憂白樂天得水難留久臥龍同上若出井置之於泰山之上唐文粹羽翮得清風之上同上互見得助長驅洋洋無有齟齬柳文有地數百里趍走之吏自長史司馬已下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼大丈夫官至剌史亦榮矣韓文富貴可期煙霄漸邇孫可之文水積厚而蛻鵬門愈高而容駟司馬表聖文出籠鸞鶴歸遼海溫飛卿如虎傅兩翅杜牧之逸驥尋雲步步高同上經明夷于飛垂其翼易明夷卦子君子之戹於陳蔡之間無上下之交也孟子盡心下孔子厄於陳蔡七日不火藜羹不糂荀子危行惻視振動悼慄處勢不便未足以逞其能也莊子山木篇互入恐懼函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之同上庚桑楚篇雲罷霧散而龍蛇與螾螘同矣失其所乘也慎子史叔向曰欒郤胥原狐續慶伯降在皂隸左昭三年齊桓公之子七人為七大夫於楚僖二十年周勃下廷尉吏稍侵辱之勃以千金與獄吏吏乃書牘背示之勃既出曰吾嘗將百萬軍然安知獄吏之貴乎史記世家威盡勢極閭巷之人為敵國律書長公主賜鄧通吏隨沒之一簪不得著身佞幸傳伍子胥載橐而出昭關夜行晝伏至於陵水無以糊其口膝行蒲伏稽首肉袒鼓腹吹箎乞食於吳市范睢儔並史記應龍潛於潢汙魚黿媟之西漢班固自敘以鴻漸之翼困於燕雀公孫洪等贊李廣當斬贖為庶人野居藍田射獵至霸陵亭霸陵尉呵止廣曰故李將軍尉曰今將軍尚不夜行何乃故也本傳並西漢陳蕃送黃門北寺獄黃門從官騶蹋蕃曰死老魅復能損我曹員數奪我曹廩假否後范曄失水之魚喪家之狗晉書潘岳傳猛虎所以百獸畏者為爪牙也若去之則犬彘馬牛皆能為敵唐書段秀實傳赦韓信封為淮陰侯信知漢王畏其能多稱病不朝從居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣出門笑曰生乃與噲等為伍通監漢高祖紀魏其失勢賓客益襄漢武紀弘農太守移良承樊豐等旨遣吏於陝縣留停楊震喪露棺道側讁震諸子代郵行書道路皆為隕涕漢殤帝紀隋李諤曰擯落私門不加收齒隋紀飛鳥折翼唐紀子儀閑廢日久部曲離散唐代宗並通監傳記騏驥之襄也駑馬先之孟賁之倦也女子勝之戰國策李白遊華山過縣跨驢宰怒引至庭下摭言集黃鵠後時而寄處兮鴟梟群而制之神龍失水而陸居兮為螻蟻之所裁夫黃鵠神龍猶如此兮況賢者之逢亂世哉楚辭橫江湖之鱣鯨兮固將制於螻蟻同上翅翮摧屈趙景真言鎩羽儀於高雲摧迅翮於風穴辨命論青衿冑子困泥塗杜詩窮猿失木悲天驥跛足隨氂牛鬱二若不展羽翮困低昂車馬何蕭索門前百草長並杜詩明妃失漢寵蔡女墮胡塵陳子昂鵷鷺無聲仰天泣元稹集涸魚久失風波勢枯草曾沾雨露恩同上狸病翻隨鼠驄羸反作駒元微之飢搖困尾喪家狗熱暴窮鱗失水魚同上儡然與破甑為伍劉賓客閉門少光彩昨宵鳳池客今日雀羅門並同上門前冷落鞍馬希白侍郎鶴病翅羽垂獸窮爪牙縮門冷少人過子弟多寂寞僮僕少精光衣食雖充給神意不揚揚廚冷難留烏上屋門閑可與雀張羅並同上青冥無依倚飛轍危難安韓文斷鶴兩翅鳴何哀縶驥四足氣空橫同上黃鶴翅垂同燕雀劉長卿吊影失所依側身隨下列獨立雖輕燕雀群孤飛還懼鷹鸇搏自怜天上青雲路吊影徘徊獨愁暮想君疇昔高步時豈料今日折腰事並同上騏驥筋力成意在萬里外歷塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅別島空留大名唐文粹互入不遇失地無顏色同上婆娑塵俗之下踸踔藩籬之際同上春色不入門孟東野鱗介槁以橫陸兮鴟嘯群而厲吻柳閔生賦誰為濟川楫今作野人船溫飛卿驊騮思故第鸚鵡識佳人司空表聖文天球減價而喪色鏌釾不寶而奪銳李元賓文與荊棘凡骨溷皮日休本朝失勢今為噲等伍坡詩張鑄以京東轉運使坐公事降通判太平州葛源為提舉坑冶取鑄腳色欲發薦狀鑄與詩曰提司坑冶是新差職比催綱勝一階若發薦章求腳色下官蹤跡轉沉埋張師止倦游集
