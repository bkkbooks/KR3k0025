body:
  text: 責望經微君之故胡為乎中露詩式微母金玉爾音而有遐心詩白駒借曰未知亦既抱子詩抑子惠思我褰裳涉溱子不我思豈無他人詩褰裳豈無他人不如我同父詩胡逝我梁不入我門胡逝我梁不入唁我始者不如今云不我可我聞其聲爾還而入我心易也還而不入否難知也一者之來俾我祗也幽小雅何人斯彼狡童兮不與我言兮維子之故使我不能餐兮鄭風忘我大德思我小怨變小雅谷風伊誰云憎詩正月縱我不往子寧不嗣音詩子襟互見恕己責人相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之幽雅小辨死生契闊與子成説執子之手與子偕手于嗟闊兮不我活兮示嗟洵兮不我信兮詩擊鼓終遠兄弟謂他人父謂他人父亦莫我顧詩王風葛藟子行修而名不彰友之罪也家語互見罪有所歸舍館定然後求見長者乎孟離婁上為民父母使民盻盻然將終歲勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑烏在其為民父母也孟滕文上史楚伐鄭鄭使告于晉知武子使行人對曰君有楚命亦不使一介行李告于寡君而即安于楚左襄八年一介獨使吉賀反公如晉使請逆于晉晉人曰夭禍魯國君淹恤在外君亦不使一介辱在寡君而即安于甥舅左襄二十八一介單使古賀反且寡人出伯父無裡言左傳越石父賢在縲紲中晏子解左驂贖之載歸入閨久之越石父請絶晏子瞿然曰嬰雖不仁兔子於厄何子求絶之速也石父曰吾聞君子詘於不知己而信於知己者方吾在縲紲中彼不知我也夫子既以感悟而贖我是知己知己而無禮固不如在縲紲之中史記晏平仲傳燕惠王使人讓樂毅且謝之曰將軍過聽以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎通監周紀呂后使呂澤語張良曰今日君安得高枕而臥張良傳天下之責四面至矣西漢谷永傳夫戚而不見殊孰能無怨西漢杜鄴傳張讓詰何進曰但欲託卿門戶耳今乃欲滅我曹種族不亦太甚乎通監漢獻紀張良曰聞將軍有意督過之西漢從事中郎馬融主為梁冀作章表吳祐謂融曰李公之罪成於卿手李公若誅卿何面目視天下通監漢質紀李公謂李固也李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚皆長嘆流涕而已通監上徵田遊岩為太子洗馬在東宮無所規益右衛副率蔣儼以書責之曰向使不飧周粟僕何敢言祿及身矣以何酬塞遊岩竟不能答通監唐高宗盧杞惡太子少師顏真卿欲出之於外真卿謂杞曰先中丞傳首至平原真卿以舌舐面血今相公忍不相容乎杞瞿然起拜然恨之益甚通監唐德宗謝安纍辟不就簡文帝時為相曰安石既與人同樂必不得不與人同憂召之必至晉書本傳武德中突厥頡利二可汗到原州太宗謂之曰不念昔者香火之言乃來相侵唐書傳記將軍一陳為功業忍見沙場百戰人南唐近事集久客多枉朋友書素書一月凡一束虛名但蒙寒溫問泛愛不救溝壑辱杜詩互入書問故友不相恤新交寧見矜李白詩雖日受千金之賜一歲九遷其官感恩則有之矣將以稱於天下曰知己則未也韓文飛黃騰踏去不能顧蟾蜍韓文尹今得意厭粱肉豈復念我貧賤時孟東野奈何軒冕貴不與布衣言王維集親友若雲霄可望不可攀高達夫集儻存平仲久要之言無惜詩人金玉之問張九齡文不豫衾之眠信豫衾之穿盧同文互見不相孚本朝念於爾而何負乃於吾而見殃歐公集方傾耳以聽願續書諫苑之篇若有待而言或能著爭臣之論東坡集可憐狄仁傑猶復負婁公欒城集中原莫道無麟鳳自是皇家結網踈詩話總龜孰知衰老難為別聲問應須續續來陳後山集經豈曰無衣七兮不如子之衣安且吉兮詩無衣子虞世基曰吾遊矰繳之下也若夫子王通可謂冥冥矣並文中子史公孫卿曰黃帝仙登于天黃帝采首山銅鑄鼎荊山下鼎既成有龍垂其髯下迎黃帝上騎龍與群臣後宮七十餘人俱登天於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳通監疏廣父子乞骸骨去道路觀者皆曰賢哉二大夫或嘆息為之泣下西漢本傳曹丘生謂季布曰足下何以得此聲於梁楚之間哉前漢本傳士有被其容接者名為登龍門東漢李膺傳郭林宗與李膺同舟而濟賓客望之以為神仙焉東漢郭泰傳袁術見孫策嘆曰使術有子如孫郎死復何恨東漢本傳互見怨恨有子秦王堅嘆曰周孟威不屈於前丁彥遠潔己於後吉祖沖閉口而死何晉氏之多忠臣也通監晉成紀互見怨恨守節唐太宗作文學館收賢才以杜如晦等為學士方是時在選中者天下所慕向謂之登瀛州唐書褚亮傳楊貴妃有寵民間歌之曰生男勿喜女勿悲君今看女作門楣通監唐元宗班景倩入為大理少卿過大梁倪若水餞之行立望其行塵久之乃返謂官屬曰班生此行何異登仙通監唐元宗紀梁帝曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳通監五代梁紀互入有子傳記崔日知恨不居八座為太常卿起樓與尚書省相對人謂之崔公望省樓國史纂要唐文宗時進士特盛舉子語曰卿貢進士不博上州刺史盧氏雜説唐宣宗留心貢舉題殿柱曰鄉貢進士李某北夢瑣言集陸大夫燕喜西都郭有道人倫東國公卿貴其籍甚縉紳羡其登仙劉孝標廣絶交論縹組雲臺者摩肩趍走丹墀者疊迹選絶交論桓子新論曰關東語曰人聞長安樂則出門西向而笑知肉美味則對屠門而大嚼論衡互見怨恨妄想仰羡鸛鶴矯仰羡黃昏鳥投林羽翮輕並杜工部飛騰無奈故人何杜詩自視雛鷇望君飛鴻士大夫家孰不榮羡並韓文籠禽羡歸翼韋應物集已將四海聲名去又占三風春景來白樂天集天外鳳凰誰得髓無人解合續絃膠杜牧之知有杏園無路入馬前惆悵滿枝紅武伯奮咫尺邈霄漢武伯蒼本朝長松百尺不自覺企而羡者蓬與蒿東坡見説文星環北極人間無路仰天庭山谷詩經季文子三思而後行子聞之曰再斯可矣語子道在邇而求諸遠事在易而求之難孟離婁上杞國有人憂天地崩墜身亡所寄廢飲食者列子天瑞無病而自灸莊盜跖墨子之言昭昭為天下憂不足夫不足非天下之公患也特墨子之私憂過計也荀富國以數雜匝也憂天下之亂猶憂河水之少泣而益之也龜三千歲蜉蝤不過三日以蜉蝤而為龜憂養生之具人必笑之矣淮南子詮言訓史趙孟未盈五十而諄諄焉如八九十者左傳蔡謨性尤篤慎每事必為過防故時人云蔡公過浮航脫帶腰舟長晉書生年不滿百常懷千歲憂選詩終夜九回唐文粹子交淺而言深忠也淮南子史石祁子曰得一夫而失一國與惡而棄好非謀也左莊十二富辰曰庸勳親昵近尊賢德之大者也即聾從昧與頑用囂姦之大者也棄德崇姦禍之大者也左僖二十四頭以小人之腹為君子之心左昭二十楚沈尹戍曰智者除讒以自安也今子愛讒以自危也左昭二十七沈尹戍曰仁者殺人以掩謗猶弗為也今吾子殺人以具謗而弗圖左僖二十六吳公子札適晉説叔向謂曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難左襄草九子太叔語趙孟曰無始亂無估富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義左定四公子有德於人願公子忘之史記信陵君傳孟嘗君問門下客誰能為文收責於薛者馮諼曰能治裝載契券而行辭曰責畢收以何市而反君曰視吾家所寡有者諼之薛召諸民當償者悉來合券以責賜民因燒其券民稱萬歲反齊見君曰臣切計君宮中積珍寶狗馬實外廄美人充下陳所寡有者義耳切為君市義矯命以責賜諸民因燒其券戰國策鮑叔牙曰君將治齊即高傒與叔牙足也君且欲霸王非管夷吾不可史齊世家陳餘遺章邯書曰白起為秦南征鄢郢北坑馬服攻城略地不可勝計而竟賜死蒙恬為秦將北逐戎人開榆中地數千里竟斬陽周有功亦誅無功亦誅通監蕭何曰王必欲長王漢中無所事信必欲爭天下非信無可與計事者西漢韓信劉望之弟廙謂望之曰趙殺鳴犢仲尼回輪今兄既不能法柳下惠和光同塵於內則宜模范蠡遷化於外坐而自絶於時殆不可也通監馬援謂黃門郎梁松竇固曰凡人富貴當使可復賤也如卿等欲不可復賤居高堅自持勉思鄙言通監黃久以雋才知名郭泰見而謂曰卿高才絶人足成偉器年過四十名著矣然至於此際當深自匡持不然將失之矣通監芻蕘所見冀申螢爝北史高祖平京師秦王引杜如晦為府兵曹參軍徙陝州總管府長史時府屬多外遷王患之房元齡曰去者雖多不足吝如晦王佐才也大王若終守藩無所事如晦必欲經營四方捨如晦無與立功者王驚曰非公言我幾失之因表留幕府唐書傳記馮諼謂孟嘗君曰兔有三窟僅得免死君始一窟未得高枕而臥也請為君復鑿二窟戰國策晏公與晏子登路寢愀然而歎曰使後嗣代代有此豈不可哉晏子曰厚斂百姓欲代之延不亦難乎晏子春秋集此別無多語期君晦盛名杜牧之不用更教詩過好折君官戢是聲名白侍郎本朝溫公議改免役為差役蘇公軾嘗見之政事堂條陳不可溫公忿然公曰昔韓魏公剌陝西義勇公為諫官爭之甚力魏公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶溫公笑而止蘇子由撰兄墓志王旦在中書處七魏野獻詩曰聖朝宰相頻頻出君在中書十四秋西祀東封俱禮畢好來相伴赤松遊聖宋掇遺經如山如阜如岡如陵如川之方至以莫不增如日之常如月之升如南山之壽如松柏之茂詩天保俾爾昌而大俾爾耆而艾萬有千歲眉壽無有害詩閟宮俾爾熾而昌俾爾壽而臧同上天保定爾俾爾戩穀罊無不宜受天百祿降爾遐福維日不足何福不除並小雅天保膺受多福書君陳子請祝聖人使聖人壽使聖人富使聖人多男子莊子地篇史諸福之物莫不畢至前漢專精神近醫藥強食自愛西漢康衡傳強餐自愛東漢東平王傳天所開右西漢谷永傳萬盧薦祉唐書集王其愛玉體俱享黃髮期曹植宜享遐紀長保天秩選詩殃消禍散百福併從此直至耆與鮐韓文願公如衛武百歲尚康強杜牧之本朝冀大錫於壽祺得永承於慈範彌加葆衛永御吉康剛健之德與陽皆享壽昌之期如日方永燮精祲之至和納享嘉之盛福和倪粹隱御六氣之和薦百嘉之祐欽承德履茂享春祺並臨川集絳闕雲臺總有名應須極貴又長生鼎中龍虎黃金賤松下龜蛇緑骨輕東坡詩祕藏函谷關中子將獻蓬萊閣上仙願得鬢眉如此老卻教龜鶴羡長年詩話總龜祝公齒髮老復老歲歲不改冰雪顏欒城集此中自有不變地歲閲生日如等間同上經以賀慶之禮親異姓周禮士於大夫不承賀下大夫於上大夫承賀記玉藻史豪傑吏聞沛公有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐堂下史記呂僧珍生子宋季雅往賀署函曰一千閽人少之不為通強之乃進僧珍疑其故親自發乃金錢也梁書互入謁見傳記新進士每及第鄉曲親戚例以聲樂相慶天寶遺事集大廈構而相歡選詩姻族相賀壺觴盈門劉禹錫賀聲盈耳柳宗元序本朝里閈相賀灑然相賀孔帖
