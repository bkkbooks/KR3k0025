body:
  text: 因文致窮集相如逸才親滌器子雲識字終投閣杜詩但看古來盛名下終日坎壈纏其身本賣文為活翻令室倒懸文章憎命達並杜詩詩人多蹇如陳子昂杜甫各授一拾遺而迍剝至死李白孟浩然不及一命窮悴終身近日孟郊六十終葉律郎張籍五十未離一太祝白樂天愛詩愛酒愛琴客多賤多愁多苦辛中散步兵終不貴孟郊張籍過於貧同上詩人多蹇厄文士多數奇詩人尤命薄方知自殘者為有好文章不用更教詩過好折君官職是聲名並同上六經作孔子削跡不粒矣孟子述子輿坎坷齊魯矣馬遷以史記禍揚雄以太玄法言窮杜甫李白王江寧皆相望於窮者也孫可之文吾聞畋漁者謂之暴天物天物既不可暴又可擿刻削露其情狀乎使自萌卵至于槁死不得隱伏能不致罰耶長吉死東野窮王谿生不掛朝籍而死正坐是哉陸魯望倚詩為活計從古無多肥孟東野本朝至於文人其窮也固宜勞心以耗神盛氣以忤物未老而先病無惡而得罪鮮不以文者東坡邵茂誠詩集敘詩人例窮蹇秀句出寒餓東坡詩騷人長負一秋悲詩人固長貧古來百巧出窮人詩從肺腑出出輒愁肺腑並同上好衣不近節士體粱肉似怕腹中書魯直管城子無食肉相同上經夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝伳此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是莊子人間世豐狐文豹捿於山林伏於巖穴靜也然且不免於網羅機辟之患者其皮為之災也莊子山林自冠也膏火自煎也桂可食故伐之漆可用故割之同上直木先伐甘井先竭山木篇吳王浮于江登乎狙之山有一狙焉委蛇攫抓見巧乎王王射之敏給摶捷矢王命相者趍射之狙執死王顧謂其友顏不疑曰之狙也伐其巧恃其便以敖予以至此極也戒之哉雜篇並莊子強自取柱柔自取束荀子勸學質的張而弓矢至焉林木茂而斧斤至焉同上其文好者身必剝其角美者身見殺文子鐸以聲自毀膏燭以明自爍故子路以勇死萇弘以智困淮南子繆稱訓翠飾羽而體分象美牙而身喪蚌懷珠而致剖蘭含香而遭焚金摟子翠以羽自殘龜以智自害若欲翠歛翮於剛丘之林則解羽之患永脫龜曳尾於晹谷之泥則鑽灼之悲不至劉子山狙見巧終必招害含奇佩美衒異露才者未有不以此傷性毀命者也並同上鳴鐸以聲自毀膏燭以明自消文中子史子產曰象有齒以焚其身賄也左襄二十四賈生以為漢興當改正朔易服色定官名興禮樂悉草具其事悉更秦之法諸律令所更定及列侯悉就國其說皆自賈生發之絳灌之屬盡害之天子乃以為長沙王太傳史記同上屈原博聞強志明於治亂為憲令草藁未定上官大夫欲奪之平不與因讒之王怒疏平作離騷既疏不復在位頃襄王立遷之江南史記同上吳起相楚明法審令損不急之官廢公族疏遠者以撫飬戰鬭之士要在強兵破馳說之言從橫者南平百越北并陳蔡卻三晉西伐秦楚之貴戚盡害吳起史記同上勇略震主者身危功蓋天下者不賞史淮陰傳楊脩有俊才為丞相曹操主簿嘗出行籌操有問外事乃逆為答記勑守舍兒若有令出依此通之既而果然操怪其速廉之知狀忌脩後因事殺之後漢薰以氣自燒膏以明自銷西漢兩龔傳傳記晁錯以智死東漢亙譚傳姦人多才未必不為患故酆舒以俊死而鄧析以辯亡唐書元載等贊繁華折枝膏腴壞骨文心彫龍清受塵白受垢青蠅所污常在練素論衡有高世之功者必負遺俗之累有獨知之慮者必被庶人之怨戰國策天寶中劉希夷王昌齡祖詠張若虛孟浩然常建李白杜甫雖有文名俱流落不偶恃才浮誕而然也明皇雜錄木摧於秀蘭燒以薰晉書安平王孚贊集行高於眾人必非之文選李蕭遠運命論木秀於林風必摧之堆出於岸流必湍之同上咸美羽以豐肌孔翠故無罪而皆斃徒御蘆以避繳終為戮於此世蒼鷹鷙而受緤鸚鵡慧而入籠張華鷦鷯賦蘭薰而摧玉縝則折物忌堅芳人諱明潔選祭屈原文薰膏自消鑠唐文粹麝懷香以賈害狙伐巧而招射象之有齒以焚其身魚之貪餌必曝其鱗並同上子胥既棄吳江上屈原終投湘水濱陸機雄才豈自保李斯稅駕苦不早華亭鶴唳詎可聞上蔡蒼鷹何足道李太白漆有用而割膏以明自煎杜詩有味之物蠹蝕必生有才之人讒言必至劉賓客老龜被刳腸不如無神靈白樂天多材非福祿薄命是聰明同上因知早貴多才子不得多時在世間膏明自爇緣何事並同上事脩而謗興德高而毀來韓文凡物之生不願為材犧尊青黃乃木之災韓公祭柳子厚寶玉忌出璞出璞先為塵松柏忌出山出山先為薪孟東野木直先自冠石堅亦他攻張九齡玉堅而折膏明自焚齒由剛折膏為明鑠同上本朝山雞照綠水自愛一何愚文采為世用適足累形𨈬臨川集木有癭石有暈犀有通以取妍於人皆物之病也東坡膏明蘭臭俱自焚象牙翠羽殘其身同上經禍從口出易順卦正義惟口起羞書說命中匪舌是出維躬是瘁詩口費而煩易出難悔易以溺人記緇衣君子溺於口同上溺口舌所覆也禦人以口給屢憎於人語子多言多敗口是禍之門也家語語及所匿之事如此者身危矣韓子言有召禍荀子傷人之言深於矛戟同上禍莫大於多言文中子言輕則招憂楊子口舌者患禍之宮亡滅之府也家語言失之害非堆鋒刃劉子謹言篇史叔向曰小人之言僣而無證故怨咎及之左昭八晉伯宗每朝其妻必戒之曰子好直言必及於難後晉三卻害伯宗左成十五三家以國人圍而灌之城不浸者三版民無叛意智伯行水曰吾乃知水可以亡人國也桓子肘康子康子履柏子之跗以汾水可以灌安邑絳水可以灌平陽也趙襄子夜使人決水灌智伯軍智伯軍救水而亂遂殺智伯通監互見自納敗缺昔者鄭武公欲伐胡乃以其子妻之因問群臣吾欲用兵誰可伐者關其思曰胡可伐乃戮關其思曰胡兄弟之國也子言伐之何也史韓非傳過誤失言文吏躡辱西漢文三王傳口語致罪漢書李陵降匈奴上問太史令司馬遷盛言陵事親孝與士信奮不頃身以徇國家之急今舉事一不幸全軀保妻子之臣隨而媒孽其短誠可痛也上以遷誣罔為陵游說下遷腐刑西漢李陵傳僕以口語遭此禍重為鄉黨戮汙辱先人同上司馬遷傳張敞椽絮舜私歸其家曰五日京兆耳安能復案事敞聞舜語收係獄死通監漢宣紀連率韓博上言有奇士長丈大十圍來臣府曰欲奮擊胡虜自謂巨無霸出於蓬萊軺車不能載三馬不能勝臥則枕鼓以鐵箸食此皇天所以輔新室也願迎之京師門戶不容者開高大之以視百蠻鎮安天下博意欲以風莽莽聞惡之留霸在所更其姓曰巨母氏謂因文母太后而霸王符也徵博下獄以非所宜言棄市西漢王莽傳言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒東漢蔡邕傳董卓誅蔡邕在司徒王允坐殊不意言之而歎有動於色允勃然斥之收廷尉治罪邕遂死獄中同上蔡邕曰夫君臣不密上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後切視之悉宣語左右事遂漏露其為邕所裁黜者側目思報通監漢靈紀以言獲罪同上竇融與隗囂書云袁紹復說何進曰前竇武欲誅內寵而反為所害者但坐言語漏泄陳琳曰諺稱掩目捕雀夫微物尚不可欺以得志況大事乎同上漢獻紀許攸恃功驕慢嘗於眾坐呼曹操小字曰某甲卿非我不得冀州也操笑曰汝言是也然內不樂後竟殺之同上孔融以對孫權使有誹謗之言坐棄市東漢帝游後園曲宴極樂郭夫人請延皇后帝弗許因禁左右使不得宣后知之明日謂帝曰昨日游宴北園樂乎帝以左右泄之所殺十餘人賜后死通監三國魏明紀嵇康與山濤書自說不堪流俗而非薄湯武司馬昭聞而怒之遂殺康同上晉元紀周顗曰今年殺賊奴取金印如斗大係肘王導甚銜之顗為王敦所害晉書周顗傳初拓跋窟咄之伐珪也莫題以珪年少潛以箭遺窟咄曰三歲犢豈能勝重載耶珪心銜之至是使人以箭示題而謂之曰三歲犢果何如題父子對泣詰朝收斬之通監晉安紀互入不可淺量秦王墮性剛峻或謂墮曰董君貴幸無比公宜小降意接之墮曰董龍是何雞狗而令國士與之言乎會有天變榮言於秦主生曰今天譴甚重宜以貴重臣應之乃殺王墮謂之曰今日復敢比董龍雞狗乎同上晉哀紀太子素惡西昌侯鸞嘗謂子良曰我意中殊不喜此人不解其故當由其福薄故也及鸞得政太子子孫無遺焉齊高宗紀多言多釁梁武紀賀若弼怨望上下弼獄謂之曰我以高熲楊素為相汝每昌言曰此二人惟堪啗飯耳是何意也隋高祖紀並通監賀若弼父敦臨刑呼弼曰吾志欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐剌弼舌出血戒以謹口隋書蘇安恒矜高好奇太子重俊之誅武三思也安恒自言此我之謀太子敗或告之伏誅通監唐中宗國家大事嫌不當位而言實有罪故作罪言新唐書杜牧杜甫嘗醉登嚴武床瞪視曰嚴挺之乃有此兒武銜之一日欲殺甫集吏於門武將出冠鉤于簾三左右白其母奔救得止新唐書杜甫傳傳記言失者身棄出言不當反自傷也並說苑集鵲鳴聲楂楂烏噪聲擭擭爭鬭庭宇間持身博彈射韓文幕中之辨人反以汝為叛臺中之評人反以汝為傾汝不懲耶而呶呶以害其生耶同上言箴言既我禍即無以掩其辭能不罹其失者亦鮮矣言解好盡言以招人過國武子之所以見殺於齊也諫臣論互入取禍並韓文不擇言以危肆兮固群禍之際也柳懲咎賦一言成痾智不能明劉賓客口兵之起其刑剭焉同上智伯失灌水之言白帖
