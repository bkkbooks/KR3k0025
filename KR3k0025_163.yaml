body:
  text: 稱頌經有匪君子如金如錫如圭如璧詩淇噢追琢其章金玉其相詩棫朴子宜為國老家語冉有矢口而成言肆筆而成書揚五百命世亞聖之大才孟序史齊聖廣淵明允篤誠左文十八年忠肅恭懿宣慈惠和同上羊舌盻而下祈午張躍籍談女齊梁丙苗賁皇皆諸侯之選也左昭五年文能拊衆武能威敵史記司馬穰苴傳名實純粹史蔡澤傳聰以知遠明以察微史五帝本紀雖甚盛德無以加矣史世家諸君譽之皆不容口史朝錯傳位冠群臣聲施後世史蕭何世家靜淵以有謀疏通而知事史五帝本紀諸公翕然稱鄭莊史鄭當時傳二君之所稱頌可著廟堂二君張釋之馮唐史二傳論劉向稱仲舒王佐之才雖伊呂無以加西漢本傳實羽翮之美用非徒腹背之毛也東漢孟嘗傳淑質正亮英才卓礫東漢彌衡傳魏孝文曰上馬能擊賊下馬作露板惟傳修期耳通監齊明紀下卷續世説改版字為布字謝安曰裒雖不言而四時之氣亦備矣晉書褚裒傳文貫九功武經七德晉書王導册文垣榮祖曰昔曹公父子上馬橫槊下馬談詠此於天下可不負飲食矣通監宋紀互入才美江智淵少有操行沈懷文每稱之曰人所應有盡有人所應無盡無者其惟江智淵乎通監宋世祖虞世南卒上嘗稱世南有五絶一德行二忠直三博學四文辭五書翰通監唐太宗員半千稱張鷟文辭猶青銅錢萬選萬中唐書明珠美玉求之可得如陳國範人中之寶不可得也通監五代晉高祖宋公齊丘造國手也通監周世宗功可象於圖畫德可刻於金石聲可記於絃管名可留於竹帛後漢趙曄吳越春秋集騰跨百辟孤絶一人李雍宣聖廟碑言炳丹青道潤金璧文選王元長回水詩序玉質幼章金聲夙振文選劉越石表直斡百尋澄波千頃盧府君碑辭同錦肆心同學府沈約作任昉墓志風儀與秋月齊明音徽與春雲等潤選褚淵碑含辰象之秀德體河嶽之上靈文選齊故安陸碑氣蘊風雲身負日月沈約如攀珠樹徒仰照車之輝若踐玉田不知照廡之價隋江總道協神交黃石授帝師之略德由天縱白雲降玉輔之精已上並駱賓王折衝千里魯連談笑之功師表一時郭泰人倫之至三千運比擊舜海以遊鱗九萬圖南望堯雲而矯翼羽儀百代掩梁竇以霞搴鍾鼎一時罩袁揚而嶽立言泉漱逈驚瀑布以飛瀾文江淡清含擢錦而翻浪飛英鳳穴藻五色以疑華濯穎龍泉涵九重而育潤心波湛漢泳精魄於黃陂情嶽千天韞風雲於嵇巘疏乾激泒龍門開竹箭之波鎮地橫基鵠翅峙蓮花之嶺騰瀾浴景濬靈泒以含珠擢幹梢雲翊高岩而聳桂玉潤金聲蘭薰桂馥垂秋實於翰林絢春花於文苑清規湛秀照月旦而雕談素論凝玄開夜光於妙辨談叢散馥韜餘氣於九蘭筆海流濤駭洪波於八水已上並駱賓王學如猗頓之富文如清廟之樂皇甫湜氣岸遙淩豪士前風流肯落他人後李太白浩蕩深謀噴江海縱橫逸氣走風雷吐言貴珠玉落筆回風霜舒文振頽波秉德冠彝倫並同上幼而擢陵苕之秀長而成清廟之器群倫月旦咸以第一流處之仁麟智龍為瑞一辰末若君子瑞于天倫文雅關西族衣冠趙北都有聲真漢相無纇勝隋珠金石高韻圭璋德容宵語途話琴書調謔一出于文章已上並劉賓客凝為和兮聚五福發為春兮消六沴以孝友肥其身以仁信羶其行言行謹直風操端莊肅然禮容清廟之器降自天和立為人傑沈斷大事奮揚奇謀器得天爵文為國華行有根源辭無枝葉王立不倚金扣有聲嚴重有大臣之體溫雅秉君子之文金璧其操鸞鳳其姿器宇甚宏衣冠甚偉寡言正色人望而敬之燕遊觴詠之間則其貌溫然如春其心油然如雲已上並白侍郎氣蒸雲夢澤波動嶽陽城唐明皇詩伯仲之間見伊呂指揮若定失蕭曹學業醇儒富詞華哲匠能詞源倒流三峽水筆陳獨掃千人軍詞華傾後輩風雅藹孤騫讀書破萬卷下筆如有神異才應間出爽氣必殊倫清高金莖露正直朱絲絃鄭公瑚璉器華嶽金天晶情窮造化理學貫天人際道為詩書重名因賦頌雄金鐘大鏞在東序冰壺玉衡縣清秋已上並岑詩心輕馬融帳籌奪子房帷秀發幽岩電清澄隘岸陂盛氣河包濟貞姿嶽柱天並元微之集頌其聲聞其謠如金石之永播也確然金石不足以為貞淡然冰玉不足以為潔秉義植信高蹈於世潔乎瑾瑜不足為其貞芬乎茞蘭不足為其秀清似匣中鏡直如琴上絲溟渤於文場嵩華於朝右身行聖人之道口吐聖人之言立身百行足為文六藝全已上並皮日休雷霆驅號令星斗煥文章舐筆和鉛欺賈馬讚公論道鄙蕭曹山秀扶英氣川流入妙思盛德大功直筆實光於簡策清節細行祝史不愧於神明夷險一貫忠勞兩兼已上並杜牧之雲朗鏡開匣月寒冰在壺高達夫白圭無玷朱絃有聲二十八宿羅心胸並同上名將日月同時朽身是山河應數生方雉飛
