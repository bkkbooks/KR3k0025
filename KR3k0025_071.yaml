body:
  text: 不由介紹子孟孺子子車無介而見孔叢子雜訓史谷永曰薛宣無遊説之助西漢喬幹直聳磨天自致魏鄭公唐太宗曰觀古今用人必因媒介若行成張者朕自舉之無先容也唐書集青雲當自致何必求知音李太白互入自賀出身入任並不因人劉禹錫表貌符心冥如舊君臣天降時雨山川出雲感激自致其間無因呂和叔傳巖銘本朝豈因糞壤栽培力自得乾坤造化心臨川集不階尺木遂致青雲同上經獨行踽踽詩杕杜武公寡特詩有杕之杜子踽踽涼涼孟盡心下史寡耦少徒西漢東方朔傳落落難合東漢耿弇傳至音不合衆聽故伯牙絶絃至寶不同衆好故卞和泣血東漢陳元傳孤音寡和直轡安歸東漢荀彧傳論沈懷文素不飲酒又不好戲宋孝武謂故欲異已謝莊嘗戒曰卿每與人異亦何可久懷文曰非欲異物性之所不能耳南史夷行介特雅不與合唐陳夷行傳蕭瑀性狷介與同僚多不合通監唐太宗集臥喜晚起而當關呼之不置一不堪也抱琴行吟戈釣草野而吏卒守之不得妄動二不堪也危坐一時痺不得搖性復多虱爬搔無巳而當褁以章服揖拜上官三不堪也素不便書不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉強則不能及四不堪也不喜弔喪而人道以此為重巳為不見恕者所怨至欲見中傷者雖矍然自責然不可化終不能獲無咎無譽如此五不堪也不喜俗人而當與之共事或賓客盈坐鳴聲聒耳囂塵臭處千變萬伎在人目前六不堪也心不耐煩而官事鞅掌機務纏其心世故繁其慮七不堪也縱逸來久情意傲散間與禮相背懶與慢相成榮進之心日頽任實之情轉篤此由禽鹿少見馴育則服從教制長而見羈則狂顧頓纓赴蹈湯火雖飾以金鑣享以嘉殽愈思長林而志在豐草也嵇康與山濤絶交書天資木強不能屈節權門地隔蓬心不能買名時議駱賓王互入不屈秀木勢怕孤張説之一生傲岸苦不諧李太白不合者雖造廬未嘗與之坐韓文答馮宿書今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉韓文互入不苟合出門無所往入室還獨處白侍郎孤風絶侶逸翮獨翔柳文性不苟合居常寡徒唐文粹互入不苟合本朝惟枉尋直尺之不為故圓鑿方枘而難合歐公集古聲無慆淫真味有淡泊臨川集窈眇文章宜和寡崢嶸肝肺亦交難坡詩互入寡和經比之匪人易比卦簡賢附勢實繁有徒書仲虺之誥協比讒言書盤庚朋家作仇脅權相滅書泰誓中小人比而不周語為政子上偏曲則下比周比周則難知荀正論史相引以藝相道以利史記日者傳有背公死黨之信西漢翟方進傳阿黨所厚西漢杜欽傳谷永黨於王氏西漢本傳公卿以下畏石顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位通監漢元紀互入權勢長安令楊興與賈捐之相善捐之欲得召見謂興曰京兆尹缺使我得見言君蘭楊興字京兆尹可立得興曰君房下筆言語妙天下使君房為尚書令勝五鹿充宗遠甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍期思侯並可為曹皆如言又薦滿宣立為剌史相薦之信不當如是乎興曰我復見言君房也捐之復短石顯興曰上信用之今欲進第從我計且與合意即得入矣捐之即與興共為薦顯奏又共為薦興奏石顯白之上乃下興捐之獄西漢捐之傳牢耶石耶五鹿客耶印何纍纍綬若若耶通監漢元紀共相標榜東漢黨錮傳黨同而伐異激揚名聲互相題拂並同上鄉人為之謠曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣通監漢桓紀諸葛誕鄧揚等相與結為黨友更相題表以散騎常侍夏侯玄等四人為四聰誕輩八人為八達合黨連群互相褒歎以毀訾為罰戮用黨譽為爵賞附己者則歎之盈言不附者則為作瑕釁通監魏明紀賈謐喜延士大夫郭彰石崇陸機機弟雲和郁及滎陽潘嶽清河崔基勃海歐陽建蘭陵繆徵京兆杜斌摯虞琅琊諸葛詮弘農王粹襄城杜育南陽許猛彭城劉訥中山劉輿輿弟琨皆附於謐號曰二十四友通監晉世祖王伾為左散騎常侍王叔文為起居舍人大抵計事叔文依伾伾依李忠言忠言依牛昭容轉相交結每事先下翰林使叔文可否然後宣于中書外黨則韓泰柳宗元劉禹錫等主采聽外事謀議唱和日夜汲汲如狂互相推獎曰伊曰周曰管曰葛僴然自得謂天下無人通監唐順宗李德裕宗閔各有朋黨互相援擠上曰去河北賊易去朝中朋黨難通監唐文宗漢朱慱陳咸相為腹心背公死黨周福房植各以黨相傾議論相軋故朋黨始於甘陵二部唐書李德裕邪人必更為黨以相欺蔽同上德裕宗閔各分朋黨更相傾軋垂四十年通監唐穆宗集群衆成朋上浸以惑楚辭朋曹比而黨譽同上本朝夏侯玄與何晏等皆有盛名晏目玄以易之所謂深者而玄目晏以神及其遇禍深與神皆安在乎群兒妄作名字自相刻畫類皆如此東坡書樂毅論後經皇甫卿士番維司徒家伯維宰仲允膳夫棸子內史蹶維趣馬楀維師氏豔妻煽方處詩十月之父注六人相連於朝皇父為首相覿以貨相賂以利記郊特牲史宋公子鮑禮於國人年自七十以上無不饋詒時加羞珍異國之材人無不事也親自桓以下無不恤也左傳灌夫所與交通無非豪傑大猾家纍數千萬食客數千百人史本傳郭解入關中關中賢豪知與不知聞其聲爭交歡解史遊俠傳賂遺外戚許史傾家自盡西漢陳萬年苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事通監漢武紀王氏方盛賓客滿門五侯各有所厚不得左右唯長安人樓護盡得其歡心西漢互入奔競近侍並樹所親禁省起居纖微必知通監漢桓紀梁冀崔烈為司徒因傳母入錢五百萬通監漢靈紀杜預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也晉書本傳苟晞為兗州剌史多所交結每得珍物即遺都下親貴兗州去洛五百里恐不鮮美慕得千里牛每遣信旦發暮還同上蕭至忠自託於太平公主引為刑部尚書通監唐紀互入由徑李林甫柔佞多狡數深結宦官及妃嬪家伺上動靜無不知之由是每奏對常稱旨上悅之通監唐元宗李林甫常以金帛賂上左右上舉動必知之柳澤上疏以為斜封官因僕妾汲引劉幽求魏知古崔湜陸象先同平章事皆太平公主之志也並同上饋謝四方有名士無不至其有口舌者率以利啖之使不得有所訾短唐書劉晏李聽素以賂遺得權幸心故多為助力唐書本傳王叔文因為太子言某可為相某可為將幸異日用之密結翰林學士韋執誼及當時朝士有名而求速進者陸淳呂溫李景儉韓曄韓泰陳諫柳宗元劉禹錫等定為死友通監唐順宗王叔文依王伾伾依李忠言忠言依牛昭客轉相交結每事先下翰林使叔文可否然後宣于中書韋執誼承而行之叔文及餘黨十餘家之門晝夜車馬如市客候見叔文伾者至宿其坊中餅肆酒罏下一人得千錢乃容之通監唐紀楊虞卿張元夫蕭浣等善結交依附權要上干執政下撓有司為士求官及第無不如志通監唐文宗經富人之屋烏所集也詩正月注子小夫之智不離苞苴竿牘莊列禦寇互入小器史成風聞成季之繇乃事之而屬僖公焉左閔二年承顏觀色為務史記淳于髡張湯造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而刻深吏多為爪牙用者依於文學之士丞相弘數稱其美史本傳魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而司之得勃勃曰願見相君無因故為子掃於是舍人見勃曹參西漢追時好而取世資西漢蓋寬饒時王氏方盛五侯兄弟爭名其客各有所厚不得左右唯護盡入其門咸得其歡心西漢樓護傳互入交結奔競許伯入第丞相御史將軍中二千石皆賀同上追趨逐耆西漢楊雄傳師古曰隨所趍向愛嗜而追逐之也畢軌鄧揚李勝何晏丁謐皆有才名而急於富貴趨時附勢通監魏邵陵厲公紀慕容超時公孫五樓為侍中內外無不憚之王儼諂事五樓時人語曰欲得侯事五樓晉書互入恃勢朝露未晞小車盈董賢石崇之居夕陽早落皂蓋填閻竇之里隋書盧思道勞生論李林甫欲除不附己者求治獄吏蕭炅薦吉溫於林甫得之大喜溫常曰若遇知己南山白額虎不足縛也羅希奭為吏深刻皆隨林甫所欲深淺煆鍊成獄無能自脫者時人謂之羅鉗吉網通監唐元宗集輿金輦璧輸貨權門陳琳檄融融者皆趍熱之士得其門而入者惟挾炭之子王沈釋時論見御覽輪蓋所遊必非夷惠之室苞苴所入實行張霍之家選劉孝標絶交論甲第金張管門庭車騎多孟浩然公卿朱門未開鎖我曹已到肩相齊杜詩權門多噂沓名利苟可取殺身旁權要並同上號國門前鬧如市元稹集大都車馬就權門元微之集權門衆所趍有客動百千韓文伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅韓文所遊皆青雲之士劉賓客集當隆赫柄用而蜂附蟻合柳文本朝張易之兄弟嬖幸武三思等候其門庭爭執鞭轡續世説李輔國權盛宰相李揆見輔國執子弟之禮同上經子曰非其鬼而祭之諂也語為政史何昌瑀為吏部尚書有一客姓閔求官曰君是誰後答曰子騫後南史杜正倫為相與城南諸杜昭穆素遠求同譜不許唐書豆盧革韋説嘗問郭崇韜因曰遭亂亡失譜牒嘗得聞先人言上距汾陽四世耳革曰然則固從祖也崇韜由是以膏粱自處通監後唐莊宗集非有積素纍舊之歡皆塗覯卒遇而以為親者也四子講德論本朝郭崇韜哭子儀之墓筆談
