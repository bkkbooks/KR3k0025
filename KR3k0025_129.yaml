body:
  text: 分謗史韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也左成二年宋城謳者曰澤門之晰實興我役邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者乃止左分謗生民宣十二年韓厥曰事之不捷惡有所分與其專罪六人同之不猶愈乎同上毋令獨蒙惡聲史記蘇秦傳贊互見辨白陳實為功曹中常侍侯覽託太守高倫用吏倫教署為文學實知非其人懷檄請見曰此人不宜用而侯常侍不可違實乞從外署倫從之鄉論怪其非舉倫後為人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚彊禦陳君可謂過則稱己者也實固自引愆聞者方歎息東漢本傳互見事久論定傳記忠臣令誹在己譽在上宋君奪民時以為臺而民非之無忠臣以掩蓋之也子罕執撲為司空民非子罕而善其君齊桓公宮中七市女閭七百國人非之管仲為三歸之家以掩桓公之非自傷於民也春秋記臣弒君皆大臣見譽者也大臣得譽非國家之美戰國策本朝于尼為鬼所憑言事或驗士庶輻湊事之後以傳習妖教下獄詔差官按之得諸公書自韓曾以下皆有之文潞公獨無上問其故公曰臣但不知耳知之亦當有書時人美其分謗溫公日録晏元獻公曰臣非不樂宴遊者若有錢亦須往但無錢不能出耳筆談經季氏將伐顓臾冉有季路見於孔子曰季氏將伐顓臾孔子曰求無乃爾是過與夫顓臾昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也論語季氏篇子人死則曰非我也歲也是何異於剌人而殺之曰非我也兵也孟子梁惠王上孟子之平陸謂其大夫曰子之持戟之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣凶年飢歲子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也孟子公孫丑下史公孫敖深入胸奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上於是族陵家通監漢武紀又嫁禍桓溫伐燕不利溫深恥喪敗乃歸罪於袁真奏免真為庶人通監晉海西公紀子梁鱣年三十未有子欲出其妻商瞿曰吾恐子自晚生耳未必妻之過從之二年而有子家語七十二弟子解今有同室之人鬭者救之雖被髮纓冠而往救之可也孟子猶解倒懸也孟公孫丑解其紛老子昔市南宜僚弄丸而兩家之難解莊子史如熱之有濯也濯以救熱何患之有左襄三十一年談言微中亦可以解紛史滑稽傳魯仲連曰所貴乎天下之士者為人排難解紛史本傳里婦亡肉姑以為盜而逐之婦所善里母曰我令而家追女矣即束縕請火於亡肉家曰昨暮夜大爭肉相殺請火治之亡肉家遽追呼其婦西漢蒯通傳上曰先帝置孟舒雲中十餘年虜常一入孟舒不能堅守無故士卒戰死數百人田叔曰孟舒知士卒敝不忍出言士卒爭臨城死敵如子為父以故死者數百人孟舒豈驅之哉上復召舒為雲中守本傳魯連辨言而退秦包胥單辭以有楚後漢崔駰傳黨事起賈彪謂同志曰吾不西行大難不解即入關設方略天子為之大赦袁山松後漢書謀解時紛三國名臣贊謝安為王國寶所讒孝武召桓伊飲宴安侍坐伊撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刊推心輔王政二叔反流言泣下沾襟乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色晉桓伊傳孫亮出西苑方食生梅使黃門至中藏取蜜漬梅蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黃門從汝求蜜耶向求實不敢與黃門不服侍中刀玄張邠啓黃門藏吏辭語不同請付嶽推亮曰此易知耳令破鼠屎裏燥亮大笑謂玄邠曰若久在蜜中中外當俱濕今裏燥必黃門所為黃門首服左右莫不驚悚吳曆互見致察帝召允謂曰國書皆浩作否曰先帝紀及今紀臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作允竟得免北史高允傳孫子答齊威王曰解雜亂紛糾者不控拳救鬭者不摶撠批亢搗虛形格勢禁則自為解耳通監周紀槐里令朱雲上書曰臣願賜尚方斬馬劍斬佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已通監漢成紀互見忠鯁袁術遣將紀靈等攻劉備求救於布布謂靈等曰玄德布弟也為諸君所困故來救之布性不喜合鬭喜解鬭耳乃令軍候植戟於營門布彎弓顧曰諸君觀布射戟小支中者當各解兵不中可留決鬭布即一發正中戟支靈等皆驚言將軍天威也通監漢紀諸葛亮曰如何禁止孝直使不得少行其意漢獻帝紀應奉上疏曰馮緄前討蠻荊均吉甫之功劉祐數臨督司有不吐茹之節李膺著威幽并遺愛度遼今三垂蠢動王旅未振乞原膺等以備不虞書奏乃悉免其刑久之李膺復拜司隸校尉漢桓帝紀孫權欲斬蘇飛甘寧為權言飛疇昔舊恩寧不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今為君置之獻帝紀初大司馬疑中書郎陸機為趙王倫擬禪詔收欲殺之大將軍穎為之辨理得免死因表為平原內史晉惠帝紀解鬭不可以不離唐德宗紀辛京杲以私忿杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸兄弟皆戰死獨京杲至今尚存臣故以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類議者言韓滉修石頭城陰蓄異志上疑之以問李泌泌退遂上章請以百口保滉妖僧李軟奴謀作亂其黨告之上命捕送內侍省推之李晟聞之遽仆於地曰晟族滅矣李泌問其故晟曰晟新罹謗毀中外有家人千餘若有一人在其黨中則兄亦不能救矣泌乃密奏大獄一起所連引必多外間人情恟懼請出付臺推上從之朝廷之臣無連及者並唐德宗紀杜兼誣奏李藩於張建封之薨搖動軍情上大怒密詔杜佑使殺之佑素重藩懷詔旬日不忍發因引藩出詔示藩藩神色不變佑曰君慎勿出口吾已密論用百口保君矣上召藩詣長安望見藩儀度安雅乃曰此豈為惡者耶即除祕書郎唐德宗紀互入轉禍為福權善才范懷義誤斫昭陵柏罪當除名上特命殺之狄仁傑奏二人罪不當死上曰善才等斫陵柏我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易張釋之有言設有盜長陵一抔土陛下何以處之今以一株柏殺二將軍後代謂陛下為何如臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下故也上怒稍解二人除名流嶺南唐高宗紀互見轉移人心韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寬唐武后紀互入兄弟處士韋月將上書告武三司潛通宮掖上大怒命斬之宋璟奏請推按曰必欲斬月將請先斬臣不然臣終不敢奉詔唐中宗紀敕曰王衍一行並從殺戮已印畫樞密使張居翰就殿柱揩去行字改為家字後唐明宗紀互入救援竇建德陷景城執戶曹河東張玄素將殺之縣民千餘人號泣請代其死曰戶曹清慎無比大王殺之何以勸善唐高祖紀張九齡事無細大皆力爭惠妃泣訴於上曰太子陰結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之九齡曰太子天下本不可動搖昔晉獻公聽驪姬之讒殺申生三世大亂漢武帝信江充之誣罪戾太子京城流血晉惠帝用賈后之譖廢愍懷太子中原塗炭隋文帝納獨孤后之言黜太子勇立煬帝遂失天下由此觀之不可不慎陛下必欲為此臣不敢奉詔故訖九齡罷相太子得無動唐元宗紀並通監李德裕為兵部尚書初李宗閔與德裕有隙及德裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能杜悰嘗詣宗閔曰悰有一策可平宿憾恐公不能用宗閔曰何如悰曰德裕有文學而不由科第常用此為慊若使之知舉必喜矣宗閔默然有間曰更思其次悰曰不則用為御史大夫宗閔曰此則可矣悰乃詣德裕德裕迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意即以大夫之命告之德裕驚喜泣下曰此大門官小子何足以當之通監唐文宗紀劉仁軌運糧失船李義甫使袁異式鞠之具獄以聞義甫言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及乃除名通監唐高宗乾封元年集解疑釋結選薦表解紛挫鋭同上本朝白樂天為王涯所讒謫江州司馬甘露之禍樂天有詩云當君白首同歸日是我青衫獨往時不知者以為幸亡樂天豈幸人之禍者哉蓋悲之也仇池筆記上經國奢則示之以儉國儉則示之以禮記檀弓下子掃地而求更新文子史除煩解嬈如紹反西漢朝錯傳破觚為圜斫雕為璞酷吏傳興滯補弊舉其偏以補其弊西漢董仲舒策為政不行甚者必變而更化之乃可理也同上譬若衣敗壞一以相補猶有所完若不如此將兩無所保東漢虞詡傳補綻敗壞枝柱邪傾東漢崔實傳治荒剔蠹唐韓愈傳反刓以朴划僞以真同上贊鄭覃救世之弊在責實唐書自晉訖隋佛老顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時同上互入直守三王之道所祖不同非其相反將以救溢扶襄所遭之變然也夏上忠殷上敬周上文者所繼之救當用此也通監漢武帝凡欲拯其弊須窮致弊之由時弊則但理其時法弊則全革其法通監唐德宗紀開元中天下鑄錢七十餘爐歲入百萬今才十餘爐歲入十五萬又積於商賈之室流入四夷又大曆以前淄青太原魏博貿易雜用鉛鐵嶺南雜用金銀丹砂象齒今一用錢如此則錢焉不輕今宜使天下輸稅課者皆用穀帛廣鑄錢而禁滯積及出塞者則錢日滋矣通監唐穆宗紀集八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春生秋殺陽開陰閉今修於戶庭數月之間而人自得於湖山千里之外韓文新修滕王閣記補苴罅漏韓愈淮學解韓愈轉吏部侍郎凡令史皆不鎖聽其出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故令史勢重聽其出入故勢輕皇甫湜作韓愈墓志公之來思如古醫之治劇病宣泄頤養氣還神復劉賓客百祀之弊一朝而去唐文粹本朝三聖既沒邪詖幅裂鼎沸莫敢誰何孔子出焉氣足以壓其聲焰量足以吞其區穴排異如摧枯拉朽引同如川流海會崇安聖傳論鳴道集經燎之方揚寧或滅之詩正月發言盈庭誰敢執其咎詩小旻危而不持顛而不扶語季氏子嫂溺不援是豺狼也孟子觀孺子之入并非仁者之意視瞽人之觸柱非兼愛之意抱朴子明本篇史人溺不拯則非仁也東漢崔駰傳視漏弗填恣傾弗支唐崔群傳政令玩垢上下怠蟹通監集懷道以迷國佯愚而不言顛則不能扶危則不能安楚辭有觀溺於水而爇於火者有可救之道而終莫之救也韓文
