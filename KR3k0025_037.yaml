body:
  text: 全德經州閭鄉黨稱其孝兄弟親戚稱其慈僚友稱其弟執友稱其仁交遊稱其信記曲禮上致廣大而盡精微極高明而道中庸記中庸言滿天下無口過行滿天下無怨惡孝經子曰君子不器語為政互入不可比喻子君子貧窮而志廣富貴而體恭安燕而血氣不惰勞倦而容貌不祜怒不過奪喜不過豫荀修身史德至矣哉如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣左襄二十九年德人無纍西漢賈誼傳德重山嶽東漢仲長統傳事四朝以全德始終唐書裴度傳直不近禍廉不沽名唐書柳玭傳集美冒衆流楚辭兼資九德揔修百行陳大丘碑終始三朝無玷可磨唐呂溫作李英公贊山之大者匿峰巒含氣象積高無倪而不見其險孕粹有物而不知其神此其所以為大也德之全者毀方圭黔皎厲靈機密運而智不驚愚遐標特立而迹無變俗此其所以為全也然則太山高則可陟全德近而難知呂溫文虛懷泛愛而涇渭不雜真率徑盡而應變無窮張説通塞若水變化若龍動之謂道非可以一善稱非可以一行目皇甫湜互入不可比喻本朝剛毅正直而守之以寬忠恕仁厚而發之以義東坡上韓太尉書君子安身崇德如山嶽之鎮開物成務如江河之流東坡賜文彥博不允答器業崇深不言而四方自服道德高妙無為而庶務以成蘇子由賀文侍中啓經好行小慧謂小小之才語衛靈公斗筲之人何足算也語互入小器子其為人也小有才未聞君子之大道也則足以殺其軀而已矣孟盡心下史國之亂臣家之敗子才有餘而德不足以至於顛覆者多矣通監周紀求斗筲之才西漢谷永傳察察小慧類無大能後漢韋彪傳論書畫辭賦才之小者通監漢靈紀費禕曰楊儀魏延牧豎小子也蜀志董允傳魏崔浩曰纖利小才不能成大功通監宋太祖紀夫中智之人豈無小慧然才非經國慮不及遠雖竭力盡誠猶未免有敗通監唐太宗王勃等雖有才而浮躁衒露唐裴行儉傳經管仲之器小哉語子曰斗筲之人何足算也語子罕互入小有才子小夫之知不離苞苴竿櫝莊列禦寇有盛雲濃霧之勢而不能乘遊者蚓蟻之材也韓非難勢史小智自私賤彼貴我西漢賈誼傳九江王至漢漢王方踞床洗足召布大怒悔欲自殺及出就舍帳御飲食從官皆如王居布又大喜過望通監漢高紀馬援曰朱勃小器智盡此耳後漢馬援傳駑馬戀棧豆通監三國志食垂餌者皆小魚唐書楊綰傳又見唐選舉志集蚊虻終日經營不能越階序文選四子講德論互入力所不及盤盂小器文選銘推得失去就於方寸銖黍間杜牧之互入瑣紀本朝有小丈夫得一金櫝而藏諸家拒戶而守之嗚呼是求不失非求富也老泉文桑蠶作繭自纏裹蛛蝥結網工遮邏黃魯直詩醯雞甕裏天幾大同上經無所取才語子此木以不才得終其天年莊山木懷空抱虛有似蜀人瓠壺之喻胸中無一紙之識不過酒炙所謂冒于貨賄貪于飲食左氏所載不才之子枹朴子互入所學史帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周謂之渾敦左文十八年顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲很明德以亂天常謂之檮杌少皞氏有不才子毀信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德謂之窮奇縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極謂之叨餮左文十八年經不聞亦式不諫亦式詩思齊天生蒸民有物有則民之秉彝好是懿德詩蒸民人生而靜天之性也記樂記君子不矜而莊記表記生而知之者上也語季氏子孔子曰少成則若性也習慣若自然也家語七十二弟子解丹漆不文白玉不雕何者質有餘者不受飾故也家語仁義禮智根於心其生色也睟然見於面盎於背孟盡心上人之所不學而能者其良能也所不慮而知者其良知也孟人無有不善孟告子上互入人人有分惻隱之心羞惡之心是非之心辭讓之心人皆有之孟或問甘羅之悟呂不韋張辟強之覺平勃皆以十二齡曰茂良不必父祖揚重黎注甘羅茂之孫張辟強良之子天才自然不假父祖互入無種白玉不雕美珠不文質有餘也淮南互入不待矯揉石生而堅蘭生而芳淮南鴻不學飛飛則沖天驥不學行行則千里傳子史生有嘉聞左不修文學而性明達前漢高祖紀少成若天性習貫如自然前漢賈誼傳良玉不瑑無以異於達巷黨人不學而自知也前漢董仲舒傳器範自然標準無假三國名臣序或謂秦宓曰足下何故揚文藻見環穎乎密曰虎生而文炳鳳生而五色豈以五采自飾畫哉天性自然也蜀志天質不雕合於大朴晉書王湛等傳嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳳姿天質自然晉書不學孫吳而暗與之合晉山濤傳傳記鳳凰生而有仁義之意大戴禮保傳篇雕之不增文磨之不加瑩氣質貞正稟性自然魏文士傳互入不待損益得諸襟府非由染習史通似特受異氣稟之自然非積學所能致也嵇康養生論集芳華自中出楚辭天然生知姿杜詩如鶴雛襹褷未有六翮而步舒視遠戛然唳天非泥滓間物劉賓客互入警敏天受神敏性能無師同上松柏生深山無心自貞直盧同文朱絃遺音而宮商自韻大玉不瑑而符采溢發呂公叔文虎豹之文不得不炳於犬羊鸞鳳之音不得不鏘於烏鵲金玉之光不得不炳於瓦石非有意先之也乃自然也皇甫湜匹庶賤陋循習淺下性非文字所導生與耒耨為業而能鍾彼醇孝超出古列柳文孝門銘本朝美不待追琢歐公集韓魏公范文正公皆是天資不由講學上蔡語録經翹翹錯薪言刈其楚詩漢廣文子麒麟之於走獸鳳凰之於飛鳥太山之於丘垤河海之於行潦類也聖人之於民亦類也出乎其類拔乎其萃孟公孫丑上好書者衆矣而蒼頡獨傳好稼者衆矣而后稷獨傳荀史鐵中錚錚庸中佼佼也後漢劉盆子傳桂林之一枝崑山之片玉晉郤詵傳王敦曰夷甫處衆中如珠玉在瓦石間晉書嵇紹於稠人中昂昂然若野鶴之在雞群晉書本傳謝混風流為江左第一晉書謝晦傳沈演之家世為將至演之折節好學宋書人中之龍宋殷鐵傳文宗謂李程曰高飛之翮長者在前卿朝廷羽翮也唐書本傳竇威家世勳貴諸昆弟並尚武藝而威耽玩文史介然自守諸兄謂為書癡唐書集亭亭物表文選北山移文冠倫魁能揚雄甘泉賦有同類而殊能者故力稱烏獲捷言慶忌勇期賁育司馬相如疏絶唱高蹤久無嗣響謝靈運互入寡和逸群之骨拔俗之標陳子昂集有才繼騷推哲匠不比肩杜詩絶類離倫韓文進學解聖賢者時人之耳目韓文清居市不為市之行柳文宋清傳粲焉如繁星麗天而芒寒色正人望而敬者五行而已劉賓客序柳文市井生而雲鶴性劉賓客萬人頭上見儀形同上秀出儕輩劉禹錫人倫之落落士林之楚楚李元賓公侯子弟多溺於驕邪能讀書學文自可嘉獎白侍郎集技癢者出於群藝成者推於衆白樂天衆花盡處松千尺群鳥喧時鶴一聲高達夫顧後絶配瞻前無鄰唐文粹粹然立於千仞之表以嶽長群山猶人之有聖賢草木之有松蘭百川之有河海鱗羽之有虯鸞同上五行秀氣得之居多者為雋人呂和叔仲尼聖賢之宗也師聃道德之祖也李文饒本朝萬木寒癡睡不醒惟有此樹先萌芽乃知此為最靈物宜其獨得天地之英華歐公茶詩百鳥而一鶚群獸出麟角歐公詩顏魯公書雄秀獨出一變古法如杜子美詩格力天縱於杜子美文至於韓退之書至於顏魯公畫至於吳道子而古今之變天下之能事畢矣東坡書吳道子畫後一尾追風抹萬蹄坡詩於愛欲泥如蓮生塘處水超然出泥而香黃魯直詩蓮生於泥中不與泥同調同上經下愚不移語子凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者螫有蹄者趹喜而相戲怒而相害天地之性也淮南虎能雄猛不可以託麑鷹能飄擊不可以寄雛秦子史夫性惡之民民之豺狼雖得放宥之澤終無改悔之心東漢王符傳互入稔惡國狗之瘈無不噬也左傳記鳥之美羽勾喙者鳥畏之魚之侈口垂腴者魚畏之人之利口贍辭者人畏之韓詩外傳集譬猶鷇卵始生翰毛而便陸梁放肆陳琳檄志蘄害物陰妬潛狙汝之稟受若是雖欲為龜與蚓焉可得已凡汝之為惡非樂乎此緣形役性不可自止柳宥蝮蛇鴟梟不鳴未為瑞鳥唐呂尚文醜性毒行唐文粹丹朱商均為堯舜子夫生於堯舜之世被其化皆為善人況生於其室親為父子蒸不能潤灼不能熱是其惡與堯舜之善等耳杜牧之集本朝小人雖微弱之時未嘗無害君子之心程易姤卦解
