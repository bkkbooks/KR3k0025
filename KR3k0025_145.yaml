body:
  text: 被禍經明夷于飛垂其翼易明夷卦困于石據于蒺藜困卦困于葛藟于臲卼同上子禍重乎地莫之知避莊子鳥飛千仞之上獸走叢薄之中禍猶及之又況編戶齊民乎淮南子俶真訓史昔虞舜窘於井廩伊尹負於鼎俎傳説匿於巖險呂尚困於棘津夷吾桎梏百里飯牛仲尼畏匡菜色陳蔡此皆學士所謂有道仁人也猶遭此災況以中材涉亂世遇害可勝道哉史遊俠傳人方為刀俎我為魚肉史記項羽傳景帝沒入鄧通家財一簪不得著身漢佞幸傳龍不隱鱗鳳不藏羽網羅高懸去將安所東漢陳留老父過誤失言文吏躡尋西漢文三王傳明知禍烈及已也西漢朝錯傳張敬兒被收脫冠投地曰用此物誤我齊書烈火燒心衆鎬叢體通監唐憲宗紀集秋草榮其將實兮微霜下而夜降楚辭哀余生之不當兮獨蒙毒而逢尤同上妻孥受灰滅之罪選袁紹檄潤鑊伏鑕王命論抱不測之罪選任安書動足蹈非搖首入禍孔稚圭作晉陸修靜傳論互見著著失利清霜一委地萬草色不緑狂飆一入林萬葉不著木孟郊網羅未解縱羽翮而何施囊檻方堅雖虎豹其焉往柳文一廢不復曾不若躄足涎顙之猶有遭也柳文起廢苔問牛悲釁鍾説彘驚臨牢柳詩夫鳥俯而啄仰而四顧獸深居而簡出懼物之為己害也猶且不免焉韓文斷鶴兩翅鳴何哀縶驥四足氣空橫同上共展排空翼俱遭繳遠矰元微之集車摧太行路劍落酆城獄白侍郎集才展凌雲翼俄成失水鱗同上經哀此煢獨詩小雅無父何怙無母何恃詩子老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤四者天下之窮民而無告者孟子史小人老而無子知擠于溝壑矣左昭十二年集單孑獨立文選揮杯勤孤影陶潛詩弔影慚魂江文通賦零丁孤苦至于成立煢煢孑立形影相弔李令伯陳情表蚊虻當家口草木是親情廬同詩衡門獨立惟影與形陳子昂集垂老之歲棄為窮人白傳集形單影隻韓文舉杯邀明月對影成三人李白詩在抱無兒承家之祀柳祭文承先人之後在孫惟汝在子惟吾嫂嘗撫汝指吾而言曰韓氏兩世惟此而已韓退之祭兄子文萬族各有托孤雲獨無根陶淵明詩孤桐亦胡為百尺旁無枝踈陰不自覆修幹欲何施張九齡一身形影單元微之集單鳴無應隻影長孤唐文粹老而無子天之窮人白樂天空床將影宿李君虞經若涉大水其無津涯書微子蕩析離居罔有定極書盤庚譬彼舟流不知所屆詩小辨孔子曰丘也東西南北之人也記擅弓上史心搖搖然如懸旌而無所終薄史蘇秦傳如河中木泛泛東西東漢陳蕃傳集飄萍浮而蓬轉潘安仁西征賦似舟飄不定如梗泛何從駱賓王萬里無故人江鷗不相識劉長卿流落感溫涼劉賓客飄然隨釣艇雲水是生涯溫飛卿蓬生非無根漂蕩隨高風天寒落萬里不復歸本叢杜工部詩飄蓬踰三年回首肝肺熱飄飄何所似天地一沙鷗漂梗無安地遊子無根株並同上汨東西與南北怕十年其不居韓文就水草以休息兮常未安而既危同上長念蝸牛猶有舍不如碩鼠解藏身白侍郎集七十無家萬里身吊影分為千里鴈辭根散作九秋蓬並同上去國長為不繫舟李太白江海今為客風波失所依劉長卿一身不家食萬事從人求同上身逐間雲不在家武伯蒼生計如雲無定所窮愁似影巧相隨姚少監本朝井水分四鄰竹陰借東家蕭然行腳僧一身寄天涯東坡經黎侯寓于衛詩式微諸侯不臣寓公記郊特牲史羈旅之臣左傳兩君羈旅西漢張耳傳李揆乞衣求食萍寄諸郡唐外史集羈旅無定心張景陽暫託棟梁何用喜元稹集生計南枝鳥白侍郎醉鄉無迹似間雲溫飛卿人生已如寄在寄復為客李君虞文經果裸之實亦施于宇伊威在室蠨蛸在戶町畽鹿場熠耀宵行詩東山史狐狸所居豺狼所嗥左傳襄十四年土狹而險山居谷汲前漢地理志窮里空舍前漢趙廣漢傳集落落窮巷士抱影守空廬左太沖詠史詩采茨葺茅宇剪棘開舊畦顏延年和謝靈運詩小市常爭米孤城早閉門杜詩草深迷市井地僻懶衣裳同上陋宇荒階不足回旋劉賓客欲掃柴門迎遠客青苔黃葉滿貧家劉長卿愧非鄭公里歸掃蒙籠室韋應物集青苔依空墻蜘蛛網四屋張景陽雜詩里無曲突煙路無行輪聲同上千里蕭條雞犬罕音選傳季友表草合人蹤斷塵濃鳥迹深李太白集周王之馬迹不至謝公之屐齒不及柳文史敝邑褊小不足以容從者左昭元年僻陋在夷其孰以我為虞左傳生於窮巷之中長於蓬茨之下無有遊觀廣覽之知顧有至愚極陋之纍西漢王褒傳集煙銷日出不見人款乃一聲山水緑柳詩千山鳥飛絶萬徑人迹滅孤舟蓑笠翁獨釣寒江雪同上蹄道補復破絲窠掃還成韓文聯句寂寞之濱韓文落葉滿空山何處尋行迹韋應物蛙聲籬落下草色戶庭間張文昌怪禽啼曠野落日恐行人賈浪仙紅葉紛紛蓋欹瓦緑苔重重封壞垣元稹集孤螢出荒池落葉穿破屋司空圖本朝緑苔人迹少黃葉雨聲多歐陽集不知人間之幾時兮但見草木華落為春冬同上虛市無人冷欲冰欒城文
