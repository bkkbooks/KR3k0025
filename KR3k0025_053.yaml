body:
  text: 淫亂經朋淫于家書益稷淫佚于非彝用燕喪威儀書酒誥作奇技淫巧書泰誓下中冓之言不可道也所可道也言之醜也詩墻有茨期我乎桑中要我乎上宮送我乎淇之上矣詩桑中淫茺昏亂游蕩無度詩陳宛丘夫惟禽獸無禮故父子聚塵記曲禮上淫於色而害於德記樂記宣公小大其聲怡悅婦人詩雄雉箋子吳越之俗男女無別同川而浴孔叢子史齊慶封耆酒以其內實遷于盧蒲嫳氏易內而飲酒左陳靈公與孔寧儀行父通于夏姬皆衷其衵服以戲于朝泄冶諫曰公卿宣淫民無效焉左宣九年貪色為淫淫為大罰左成二年商紂以酒為池縣肉為林使男女倮相逐於其間為長夜之飲史記殷本紀胸奴父子乃同穹廬而臥史記本傳沈溺放恣西漢景十三王傳贊賓客相過以婦侍宿嫁取之夕男女無別反以為榮西漢地理志抱哺其子與公併倨西漢賈誼傳坐汙穢者曰帷薄不修同上設長夜之淫宴東漢邊讓傳帷薄不修衽席無辨東漢皇后紀序楊國忠與號國夫人居第相鄰晝夜往來無復期度或並轡走馬入朝不施障幕道路為之掩目通監安祿山得出入禁中因請為貴妃兒上與貴妃共坐祿山先拜貴妃上問何故對曰胡人先母而後父通監唐元宗祿山生日上及貴妃賜衣服寶器酒饌甚厚後三日召祿山禁中貴妃以錦繡為大襁褓裹祿山使宮人以綵輿舁之上聞後宮喧笑問其故左右以貴妃三日洗祿兒對上自往觀之喜賜貴妃浴兒金銀錢復厚賜祿山盡歡而罷自是祿山出入宮掖不禁或與貴妃對食或通宵不出頗有醜聲聞于外上亦不疑也同上自天寶以來公卿大夫競為遊宴耽酣晝夜擾雜子女不愧左右通監唐穆宗集漸漬茺沈往而不返陳琳檄經君子辭貴不辭賤辭富不辭貧記坊記子人皆取先己獨取後莊史石慶為丞相乞骸骨歸避賢者路史記本傳平當為丞相上召欲封當當病篤不應召或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也前漢互入貽後司馬相如任官未嘗肯與公卿國家之事常稱疾間居不慕官爵西漢本傳豈不牽位穢我王朝西漢韋賢傳應邵曰豈不戀此爵位乎疏廣謂受曰吾聞知足不欲知止不殆功遂身退天之道也今仕宦至二千石不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎即日父子俱移病上疏乞骸骨受乃廣兄之子也西漢本傳互入知足𢾅門不朝請西漢王陵傳杜字本作𢾅杜篤二十年不窺京師後漢文苑傳不愛權勢聲名東漢馬廖傳任高百辟情惟一丘東晉謝安傳王奐常賃灌園恥交勢利謝承後漢書范丹傳注張翰曰人生貴得適志何能羈宦數千里以要名爵乎潘嶽遷博士輒去官免自弱冠涉于知命之年三遷而已於是退而間居于洛之涘晉書本傳王導能任真推分淡如也有識皆稱善處興廢通監晉帝紀蔡謨除司徒三年不就職詔書屢下謨終不受命臨軒遣侍中紀據黃門郎丁纂徵謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至詔免謨為庶人通監晉穆紀互入有守謝安少有重名前後徵辟皆不就寓居會稽以山水文籍自娛雖為布衣時人皆以公輔期之士大夫至相謂曰安石不出當如蒼生何通監東晉海西公紀沈慶之先有四宅又有園舍在婁湖慶之一夕攜子孫及中表親戚徙居婁湖以四宅輸官非賀朝不出門車馬率素從者不過三五人過之者不知其三公也通監宋世祖紀清規懋賞與白雲俱潔厭榮捨紱以松竹為心通監齊東昏侯紀辭蟬捨冕遂其沖挹之性同上陶洪景永乎十年脫朝服衣冠掛神武門上表辭祿詔許之南齊書本傳蜀王宗辨杜門不出曰廉者足而不憂貪者憂而不足通監後梁太祖紀司空圖名亭曰休休作文以見志曰量才一宜休揣分二宜休老而聵三宜休唐書本傳裴度晚節頗浮沉為自安計唐書本贊逍遙林亭保安宗族通監周出宗傳記肅宗既還京師泌辭去云臣有五不可住臣遇太早陛下用臣太重恩太深功太高而跡太奇鄴侯家傳集脫冠謝朝列謝靈運送孔令詩功成不受賞長揖歸田廬左大沖詠史詩閉關卻掃塞門不仕江文通恨賦投簪高邁陶洪景與從兄書抽簪解朝衣文選景陽詠史投冠旋舊墟不為好爵榮文選淵明詩掛冠裂冕已辭榮南畝東皋事耕鑿賓階客院常踈散蓬徑柴扉終寂寞自有林泉堪隱構何必山中事丘壑駱賓王解佩收朝帶抽簪換野巾杜詩紅顏棄軒冕白首臥松雲事了拂衣去深藏身與名並李白集出車山林揮手青門擁途而祖者惟恐不及非仁聖不能全不奪之操非堅明不能果獨往之志惇史古風復行於今群公惜別飛蓋擁道如漢廷祖二疏故事並李義山不矍矍於進取左絃右壺樂以自放柳文鳳閣鸞臺路從教年少爭劉賓客隨山歸少海就日背長安劉長卿新辭將印拂朝纓臨水登山四體輕劉賓客脫屣將相守沖謙唯於山水獨不廉同上沒齒為間官白侍郎挂印著公門蒲柳質易朽麋鹿心難馴宜當早罷去收取雲泉身宦情薄似紙漸消名利想無夢到長安厚貞退之風遏躁進之俗貂蟬雖未脫鸞鳳已不羈同上陶居三十七挂綬出都門同上能以功成疏寵位不將心賞負雲霞錢起倒冠落佩兮與世闊疏杜牧之時過無心求富貴身間不覺見公卿王建集本朝曾看元臣調鼎鼐卻將田叟問耕耘已上印書辭北闕稍留冠蓋餞東門歐公集秋光都似宦情薄山色不如歸興濃張詠詩見幾禍福之先脫屣塵埃之外東坡賀歐公致仕見故人而一笑綽有餘歡念平生之百為一無可恨東坡賀趙大資致仕天眷雖隆莫奪已行之志士流太息共高難繼之風坡啓雖外為天下惜老成之去然私喜明哲得保身之全東坡賀歐公致仕啓付青簡以遺事追赤松而並遊蘇子由賀魯太慱致仕斂藏為國之方勉就還家之樂進退有裕卷舒適宜蘇子由賀韓魏公知相州留侯志於赤松晉公安於緑野蘇子由賀文侍中退居水石之鄉自放簪裳之外優游空寂有以知萬物之輕呼吸清華有以期百年之壽蘇子由賀趙少保坐而論道本無黃髮之嫌出以濟時何負赤松之約而能去如脫屣名重太山近世以來一人而已方將翱翔嵩少之下泝洄伊洛之間身寄白雲堂開緑野釋鼎鍾之重負收竹帛之餘光蘇子由賀文太師致仕高風所振清議益隆蘇子由賀歐陽少師身安氣定色如玉脫遺世俗心浩然蘇子由集薄有田園歸去好苦無官況莫來休陸子履詩事見青經自獻其身記坊記不仁者不可以久處約語里仁子晉國亦仕國也未嘗聞仕如此其急孟子罪莫大於好進進不以道文中關朗史衛鞅因嬖臣景監以求見秦孝公說以富國強兵之術通監周紀互入由徑中書郎王融自恃人地三十內望為公輔曰車前無八騶何得稱丈夫通監南齊武紀本朝蘇易簡特受太宗顧遇性特躁進罷參政知鄧州年才逾壯有不勝寒冷之嘆贈老僧詩曰憔悴二卿三十六與師氣味不爭多又移書親舊曰退位菩薩難做竟不登強仕而卒世言躁進有夏侯嘉正為館職平生好燒銀常曰吾得見水銀一錢知制誥一日無恨矣俱不諧而卒錢僖公惟演自樞密使為使相歎曰使我於黃紙盡處押一箇字足矣類說魏泰東軒雜録經窺觀女貞亦可醜也易觀卦王孫賈曰與其媚於奧寧媚於竈語八佾皇父卿士番維司徒家伯為宰仲允膳夫棸子內史蹶維趣馬楀維師氏豔妻煽方處詩十月之交注六人相連於朝皇父為首互入交結子不由其道而往者與鑽穴隙之類也舍正路而不由哀哉並孟史衛鞅因嬖臣景監以求見秦孝公說以富國強兵之術通監周紀互入躁進蕭至忠自託於太平公主引為刑部尚書通監唐中宗紀互入交結自大曆以來節度使多出禁軍其禁軍大將皆以倍稱之息貸錢於富室以賂中尉動踰億萬然後得之未嘗由執政至鎮則重斂以償所負及王沛薨裴度韋處厚以高瑀代之中外相賀曰自今債帥鮮矣通監唐文紀集捷徑從狹路阮嗣宗詠懷經爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德書君陳注曰善則稱君人臣之義為人臣之禮不顯諫記曲禮史臣不專大名善則稱君過則稱己穀梁宣三年晉師歸范文子後入武子曰無為吾望爾也夫對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢左成二年互入謙抑宋平公築臺妨於農收子罕請俟農工之畢公弗許築者謳曰澤門之晢實興我投邑中之黔實慰我心于罕聞之親執撲以行築者而抶其不勉者左襄十七年箕子曰為人臣諫不聽而去是彰君之惡而自託於民也吾不忍為也乃被髮佯狂而為奴史記宋世家魯朱家陰脫季布之厄及而尊貴終身不見史記游俠傳孔光有所薦惟恐人聞名張安世嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝耶絶弗與通丙吉有舊恩而不言孔光時有所言輒削草藁以為章主之過以干忠直人臣之大罪也並西漢本傳陳重在郎署有郎負息數十萬債主日至煎求無已重密以錢代還郎後覺知厚辭謝之重曰非我之為將有同姓名者終不言惠謝承後漢書韓康採藥賣於長安市三十餘年時有女子買藥康守價不移女子怒曰公是韓伯休那乃不二價耶康嘆曰我本欲避名今小子皆知有我焉用藥為乃遁入霸陵後漢書互入欲晦而彰諸葛亮苟全性命於亂世不求聞達於諸侯通監三國魏明紀清畏人知晉書胡質傳楊綰不好立名唐書本傳羊祜每薦舉人未嘗知曰拜爵公朝謝恩私室豈人臣之節晉書本傳帝定禍亂而房杜不言功唐書房杜贊婁師德薦狄仁傑師德不言仁傑不知武后問仁傑曰師德賢乎曰不知又問知人乎曰未聞其知人后曰朕用卿師德薦也婁師德傳傳記樂毅曰忠臣之去也不潔其名戰國策山濤為吏部尚書用人皆先密啓然後公奏通典本朝王旦在相每薦引人未嘗知薦寇準同中書門下平章事準入見曰非陛下知臣何以至此真宗具道公所以薦準始愧歎以為不可及七日神道碑范鎮論熙寧法制至廢黜不用公既得謝軾往賀之曰公雖退而名益重矣公愀然不樂曰君子言聽計從消患於未萌使天下陰受其賜夫使天下受其害而吾享其名吾何心哉東坡文范忠宣公在相位凡薦引人才必以天下公議所薦士未嘗知出於公公亦未嘗示恩意於人三朝言行録互入徇公忘私子獨弦哀歌以賣名聲於天下者乎莊天地好名之人能讓千乘之國史列士徇名西漢賈誼傳互入節操皇甫規自以西州豪傑恥不得與自上書附黨通監東漢蔡雍曰孤特一身得託名忠臣死有餘榮通監杜預好為後世名常言高岸為谷深谷為陵刻石二碑紀其勳績一沈萬山之下一立峴山之上晉書本傳劉晝每言使我數十卷書行於後世不易齊景之千駟也北史楊己取名唐書房元齡贊熊執易疏論裴延齡相以示歸登登動色曰願竄吾名雷霆之下君難獨處歸登傳互入疾惡傳記謝敷字慶緒隱居耶山初月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故會稽人嘲曰吳中高士要死不得死孫氏晉陽秋互入失望集賣身買得千年名李太白士生為名纍有侶魚中鉤韓文古人貴身沒而名存皇甫湜唯將道業為芳餌釣得高名直至今杜荀鶴集子賣聲名於天下莊天地史已惡而掠美為昏左管晏暴君之過取身後名唐書史周傳
