body:
  text: 易足子榮啓期行乎郕之野鹿裘帶索鼓琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾既得為人是一樂也男女之別男尊女卑吾既得為男是二樂也人生有不見日月不免襁褓吾既得巳行年九十五矣是三樂也貧者士之常死者人之終處常得終吾何憂哉家語六本篇飢者易為食渴者易為飲孟公孫丑上鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹莊互入小器易足孔子謂顏淵曰家貧居卑胡不仕乎對曰不願仕回有郭外之田五十畝足以給饘粥郭內之田十畝足以為絲麻鼓琴足以自娛所學於夫子者足以自樂也回不願仕莊子蟪蛄不羡大椿而欣然自得斥鷃不貴天地而榮願以足莊齊物論注互入小器北宮子衣其裋褐有狐貉之溫進其茙菽有稻粱之味庇其蓬室若廣夏之蔭乘其蓽輅若文軒之飾終身逌然庖饌班錯所享不過一味華蓋結駟列道警蹕其榮不過容膝並列子渴飲河水入腹不過壺漿淮南子史鄭玄曰家今差多於昔東漢本傳寒之於衣不待輕暖飢之於食不待甘旨西漢食貨互入實惠糲粱之食藜藿之羹夏日葛衣冬日鹿裘西漢司馬遷傳馬援謂兄子少游曰士生一世但取衣食裁足乘下澤車御款段馬為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳東漢本傳阮孚曰持一皂囊遊會稽客問囊中何物但一錢看囊庶免羞澀晉書本傳潘師正曰茂林清泉臣所須也既不乏矣本傳傳記國子高子曰臣賴君之賜蔬食惡衣可得而食也駑馬柴車可得而乘也韓詩外傳方丈之食不過一飽綈袍之繡不過一暖袁淮正書集其居易容其求易給巢林不過一枝每食不過數粒選詩飲河期滿腹貴足不願餘巢林棲一枝可為達士模方太中史詩王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍陸士衡互見隨宜池沼足以漁釣春稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之費潘嶽間居賦序一枝之上巢父得安巢之所一壺之中壺公有容身之地庾信小園賦但願守陋巷教子孫時時與親舊敘契闊陳說平生濁酒一杯彈琴一曲志願畢矣晉嵇康與山濤絶交書禽鹿志豐草嵇康絶交書蔬食足充飢何必膏梁珍繒絮足禦寒何必錦繡文文選互見實惠篋中有餘衣盎中有餘糧閉門讀書史清風窗戶涼韓文此日足可惜詩高嗜緑蔬羹意輕肥膩羊孟東野飲啄既已盈安能勞羽翼劉賓客苟無公私債飲水不為貧元稹集茲焉即可愛何必是吾廬韋應物枯鱗易為水貧士易為施孟東野如鳥擇木姑務安巢白樂天才小分易足心寬體長舒浮榮及虛位皆是身之賓惟有衣與食此事粗關身苟免飢寒外餘物盡浮雲稍無骨肉纍粗有漁樵資家田輸歲盡拾此充飢腸並白侍郎日有糲食歲有粗衣飢寒獲同骨肉相保此亦熙熙委順之外益自安也白傳集互入委順寬於蝸舍足容身富於黔婁壽於顏回飽於伯夷樂於榮啓期健於衛叔寶余何求哉身間自為貴何必居榮秩心足即非貧豈惟金滿室並同上互入知足畦蔬繞茅屋自足媚盤飧老杜集一枝聊暫安駱賓王蓬蒿三畝居寬於一天下杜牧之田家衣食無厚薄不見縣門身即樂王建詩以此心目暢敵彼名利途輕微何為者藜藿自有餘李義山文每含咀義味獨坐日昃案上有一杯藜羹如五鼎七牢饋於左右加之以撞金石萬羽籥也陸曾望文坐白屋有公侯之姿食藜羹有卿相之色皮日休集尚儉經營少居間意思長張文昌田翁真快活婚嫁不離村州縣供輸罷追隨鼓笛喧盤餐同老小家計共田園盡戟門前難作客釣漁船上易安身杜荀鶴集本朝生計易足才蔬畦人生自足乃為娛並歐公詩三徑粗成資一枝有餘暖身安一床足並東坡詩陋巷開門負朝日小園除雪得春蔬無錢種菜為家事同上老作諸侯客貧為一飽謀生當得意樂鷗邊何用封侯隨鳶外並後山集茅簷適性輕華屋黍酒忘情敵上尊茹蔬飯糗不願餘並欒城集吾身眠食耳一飽萬想滅東坡詩一室可盤蝸山谷互入安貧經辛未取郜歸于我辛巳取防歸于我春秋子不奪不饜孟富貴之中有私龍斷焉同上禍莫大於不知足老子江河不能實漏卮淮南子貪者難為惠譙子法訓互入貪汙史申侯有寵於楚文王文王將死使行曰唯我知汝女專利而不厭豫取豫求不女疵瑕也左傳僖七初虞叔有玉虞公求旃之也既而獻之又求其寶劍曰是無厭也無厭將及我左威十年侵欲崇侈不可盈厭聚斂積實不知紀極左文十八管仲曰戎狄豺狼不可厭也左傳閔二實有豕心貪婪無厭忿纇無期謂之封豕左傳溪壑可盈是不可饜也國語田蚡嘗請考工地益宅上怒曰君何不遂取武庫史記田蚡傳猶未足淡淡言贍其欲西漢食貨志夫已受大又取小天不能足而況人乎此民之所囂囂苦苦一作若不足也通鑑漢武安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治産業纍積纖微是以能殖其貨西漢張安世傳互入求多夫晉何厭之有既東封鄭又欲肆其西封左僖三十嬰兒常病傷於飽也東漢王符傳光武賜岑彭書曰人苦不知足既平隴復望蜀通鑑光武紀建武八年殷興曰外戚家苦不知謙退嫁女欲配侯王聚婦盻晲王室通鑑光武建武宣王破張魯請魏武便討劉備魏武曰人苦無足既得隴復欲得蜀耶王隱晉書車騎將軍張敬兒好信夢初為南陽太守其妻向氏夢一手熱如火及為雍州夢一股熱為開府夢半身熱敬兒意欲無限嘗謂所親曰吾妻復夢舉體熱矣又自言夢舊村杜樹高至天上聞而惡之通監齊太祖溪壑可盈志欲難滿齊書溪壑之欲發乎無厭唐書元載等贊楊國忠子暄舉明經舉業茺陋不及格禮部侍郎達奚珣置暄上第及暄為戶部侍郎珣始自禮部遷吏部暄與所親言猶歎已之淹回珣之迅疾通鑑唐元宗傳記薛元超曰吾富貴過分然平生有三恨不以進士擢第不得娶五姓女不得修國史劉餗撰隋唐嘉話華貂深不足之嘆選表江海誠難滿元微之集早夭羡中年中年羡暮齒暮齒又貪生服食求不已白侍郎互見貪迷子一人之身而百工之所為備如必自為而後用之是率天下而路也孟子注路謂奔走道路無時休息史無大功以求大祿國語互見不自揆度淳于髡曰臣見道傍有禳田者操一豚蹄酒一杯祝曰甌寠滿籠汗邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而一本無而字所欲者奢史記滑稽傳寧成曰仕不至二千石賈不至千萬安可比於人乎西漢本傳安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治産業纍積纖微是以能殖其貨西漢張安世傳互見無厭身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下通鑑漢武昔秦始皇毀壞諡法以一二數欲至萬世而莽下三萬六千歲之歷言身當盡此度東隗囂傳無毛髮之勞而欲求丘山之用東張奐傳互見不自揆度本朝宿鳥一枝足爭林終夜鳴陳後山經君子不以小言受大祿禮表記君子素其位而行不願乎其外在下位不援上並記中庸君子上不僭上下不逼下記子監門御旅抱關擊拆而不自以為寡荀榮辱古之為道者量腹而食容身而居文子史公孫免餘曰唯卿備百邑臣六十矣下有上祿亂也受其半左襄二十七齊景公欲更晏子之宅辭曰君之先臣容焉臣不足以嗣之於臣侈矣左昭三李克曰卑不謀尊疏不謀戚史魏世家龍門王通教授於河汾之間弟子自遠至者甚衆纍徵不起楊素甚重之勸之仕通曰有先人之弊廬足以庇風雨薄田足以具餰粥讀書談道足以自樂願明公正身以治天下使時和年豐通也受賜多矣不願仕也通鑑隋高祖蔬食以當肉安步以當車無罪以當貴清靜以自虞戰國策客徒欲朱丹吾轂不知一跌將赤吾之族也文選解嘲布衣可終身寵祿豈足賴阮嗣宗詠懷互入省悟寧與燕雀翔不隨鴻鵠飛同上苟無凌風翮徘徊守故林陸土衡文老龜豈羡犧牲飽蟠木寧爭桃李春我本蓬蓽人鄙賤遽泥沙並白侍郎回瞻順流輩誰敢望同升元稹集寧為宇宙間吟客怕作乾坤竊祿人杜荀鶴鳳凰不憎山栖蛟龍不羞泥蟠王無功逍遙飲啄安涯分何假扶搖九萬為王維集身世比行舟無風亦暫休敢言終破浪唯願穩乘流錢起文卻厭長裾曳寧辭短褐穿張氶吉文驥路未伸雀羅無慍司空表聖文本朝或告狄青當推狄梁公為遠祖青謝曰青出田家少為兵安敢祖梁公哉聞見録茹蔬飯糗不願餘欒城集石守道為舉子時王瀆侍郎以盤飧遺之石謝曰甘脆者亦介之願也但日享之則可若止得一餐則明日將何繼乎朝享膏粱暮厭粗糲人之常情也介所以不敢當倦遊録
