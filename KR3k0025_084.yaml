body:
  text: 先知經至誠之道可以前知禍福將至善必先知之不善必先知之記中庸子冥冥之中獨見曉焉無聲之中獨聞和焉莊子先知其幾於神乎楊先知神以知來探未兆也逆識先知近於神也楊子注史晉復假道於虞以伐號宮之奇曰號虞之表也號亡虞必從之諺所謂輔車相依唇亡齒寒者其虞號之謂也晉滅號遂襲虞滅之左傳僖五吳季札使齊説晏平仲曰子速納邑與政無邑無政乃免於難晏子納邑與政是以免於欒高之難左傳晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及於難范氏之福也左成十七吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜惟子胥懼曰是豢吳也夫越在我心腹之疾也夫其柔服求濟其欲也左哀十一子胥賜屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣同上秦伯問士鞅曰晉大夫其誰先亡對曰其欒氏乎左初楚子良生子越椒子文曰熊虎之狀而豺狼之聲弗殺必滅若敖氏矣子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬攻王楚滅若敖氏左宣四子魚曰禍猶未也未足以懲君左僖二十初平王之東遷辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川左僖二十二人生求富而子逃之何也子文曰民多曠者而我取富焉是廑民以自封也死無日矣我逃死非逃富也故莊公世滅若敖唯子文之後在國語楚伯禽封魯三年而後報政周公曰何遲也太公封於齊五月而報政周公曰何疾也乃嘆曰魯後世其北面事齊矣史魯世家初智宣子將以瑤為後智果曰不如宵也若果立瑤智宗必滅弗聽韓趙魏殺智伯盡滅智氏之族通鑑張儀至楚説楚王曰大王誠能聽臣閉關絶約於齊臣請獻商於之地六百里陳軫獨弔曰秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王使一將軍隨張儀至秦張儀詐墮車不朝三月通鑑周紀袁盎曰淮南王為人剛悍今暴摧折之臣恐卒逢霧露病死陛下有殺弟之名奈何上曰吾特苦之耳今復之淮南王果憤恚不食死通鑑漢文紀聰者聽於無聲明者見於未形漢書伍被傳互入聰明文帝復封淮南厲王四子皆為列侯賈誼諫以為患之興自此起矣數上疏言諸侯或連數郡非古之制可稍削之不聽史本傳朝厝上書言升可削曰今削之亦反不削亦反削之其反亟禍小不削反遲禍大通監漢景紀朝厝言削諸侯錯父聞之謂錯曰口語多怨公劉氏安矣而朝氏危吾去公歸矣遂飲藥而死西漢本傳明者遠見於未萌而知者避危於無形漢司馬相如傳張安世長子千秋與霍光子禹俱隨范明友擊烏桓還謁大將軍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人西漢本傳京房學易於梁人焦延壽嘗曰得我道以亡身者京生也通監漢元紀宋沖常勸郭泰曰吾夜觀乾象晝察人事天之所廢不可支也通鑑漢桓紀楊彪見漢室衰微政在曹氏遂稱腳攣積十餘年不行由是得免禍通鑑東漢中常侍張讓權傾天下讓父死歸葬穎川雖一郡畢至而名士無往者讓甚恥之實獨弔焉及後復誅黨人讓感實故多所全宥東漢陳實傳申屠蟠嘆曰昔戰國之世處士橫議列國之主至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮之禍惟蟠超然免於評論通鑑互入知幾梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變名姓為吳市門卒云通鑑漢平紀互入避禍魏張緝言於司馬師曰諸葛恪雖克捷見誅不久師曰何故緝曰威震其主功蓋一世求不死得乎通監魏高貴卿公傳嘏曰太初志大其量能合虛聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆邦家家一作國之人也鄚元茂有為而無終外要名利而內無關鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人者必將敗家通監魏紀唐彬與王濬共伐吳彬知賊冠已殄孫皓將降未至建鄴二百里稱疾避留以示不競果有先到者爭物後到者爭功晉書本傳互入推遜鄭興子衆以通經知名太子因梁松以縑帛請之衆曰太子儲君無外交之義不私通賓客松曰長者意不可逆衆曰犯禁觸罪不如守正而死及松敗賓客多坐之唯衆不染於辭通監漢明紀劉元海胸奴人齊王攸言於武帝曰不除元海恐并州不得久寧王渾曰元海長者為君王保之至惠帝時元海果僣位號前趙晉書載記互入不具眼目江統深惟四夷亂華宜杜其萌乃作徙戎論帝不能用未及十年而夷狄亂華時人服其深識晉書本傳山濤言不宜去州郡武備帝不聽及永寧以後盜賊群起州郡無備不能禽制天下遂大亂如濤所言通監晉世祖紀索靖知天下將亂指洛陽宮門銅駝嘆曰會見汝在荊棘中耳通監晉書互入料度張翰為齊王大司馬東曹椽時執權翰因見秋風起乃思吳中菰菜蓴羹鱸魚鱠遂命駕而歸俄而冏敗人皆謂之見機晉書本傳石勒販洛陽倚嘯上東門王衍見而異之曰向胡雛吾觀其聲視有奇志恐將為天下之患其後以兵屬劉聰自立為趙王晉書載記王猛將死苻堅問以後事猛曰臣歿之後願勿以晉為圖鮮卑羌虜我之仇讎終為人患宜漸除之以寧社稷堅不能用同前初劉毅季父鎮之間居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久我不就爾求財位亦不同爾受罪每見毅藩導從到門輒詬之通監晉安紀義康方用事人爭求親昵唯司徒主簿江湛早能自踈求出為武陵內史檀道濟嘗為其子求婚於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難通鑑宋太祖顏延之子竣貴重凡所資供延之一無所受布衣茅室蕭然如故嘗乘羸牛笨車逢竣鹵簿即屏住道側常語竣曰吾平生不喜見要人今不幸見汝通監宋世祖顏延之嘗早詣其子竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎後竣被誅通監宋紀閔湛等又勸崔浩刊所撰國史于石以彰直筆高允聞之謂著作郎宗欽曰閔湛所營方寸之間恐為崔門萬世之禍吾徒亦無類矣未幾而難作宗欽臨刑嘆曰高允其殆聖乎北史高允傳鬱林王之將廢也王晏從弟思遠謂晏曰兄荷世祖厚恩今一旦贊人如此事彼或可以權計相傾未知兄將來何以自立若及此引決猶可保全門戶不失後名思遠知上外待晏厚而內已疑異乘間謂晏曰時事稍異兄亦覓否凡人多拙於自謀而巧於謀人通監齊高宗張九齡奏安祿山狼子野心面有逆相請戮之上放歸藩唐書裴坦子娶楊收女資送甚厚器用飾以犀玉坦見之怒曰破我家矣立命壞之已而收竟以賄敗通監唐太宗王勮蘇味道皆未知名裴行儉一見謂之曰二君後當相次掌銓衡是時王勮弟勃與華陰楊炯范陽盧照鄰義烏駱賓王皆以文章有盛名同列少常伯李敬玄尤重之以為必顯達裴行儉曰士之致遠者當先器識而後才藝勃等雖有文章而浮躁淺露豈享爵祿之器耶楊子稍沈靜應至令長餘得令終幸矣既而勃度海墮水炯終於盈川令照鄰惡疾不愈赴水死賓王及誅勮味道皆典選如行儉言通監唐武后萬寶常聽太常所奏樂泫然曰樂聲淫厲而哀天下不久將盡時四海全盛聞者皆謂不然大業之末其言卒驗通監隋高祖二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産祿猶在去草不去根終當復生二人曰大事已定彼猶機上肉耳夫何能為季昶歎曰吾不知死所矣劉幽求亦謂亙彥範敬暉曰武三思尚存公輩終無葬地若不早圖噬臍何及通監唐太宗互入遠慮蔣欽緒蕭至忠姊夫也謂之曰如子之才何憂不達勿為非分妄求至忠不應欽緒退嘆曰九代卿族一舉滅之可哀也哉通監唐元宗上欲以李林甫為相張九齡曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂通監唐元宗王忠嗣數上言祿山必反同上哥舒翰攻吐蕃石堡城士卒死者數萬果如王忠嗣之言通監顏真卿為平原太守安祿山逆節頗著真卿以霖雨為託修城浚濠未幾祿山果反河朔盡陷獨平原城守具備唐書陝郡進士張彖曰君輩倚楊右相為泰山吾以為冰山若皎日既出得無失所恃乎通監唐紀互入警戒崇勸天子不求邊功璟不肯賞邊臣而天寶之亂卒蹈其害可謂先見矣唐書姚宋贊姚崇與張説同為宰相張銜崇崇疾戒諸子曰張為人好服玩吾身沒之後汝具陳吾平生服玩寶帶重器羅列於帳前張若不顧汝計家事産族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時録進仍先礱石以待至便鐫刻張丞相見事常遲於我數日之後必當有悔若徵碑文以刊削為辭當引使視其鐫石仍告已具聞上崇沒張果至目其服玩者三四不數日文成敘足該詳後數日果遣使取本以為辭未周密欲加刪改姚氏子引使者視其碑乃告以奏御使者復命張悔恨拊膺曰死姚崇能算生張説吾今日方知才之不及遠矣唐書互入心腹吐蕃劫盟德宗謂柳渾曰卿儒士乃知軍戎萬里情乎唐書本傳初渾以吐蕃難以信結李弘曰鄭注姦猾無雙卵鷇不除使成羽翼必為國患通監樂工李可及流嶺南可及嘗大受賜物載以官車西門季玄謂曰汝他日破家此物復應以官車載還不為受賜徒煩牛足耳及流嶺南籍沒其家果如季玄言通監唐懿宗唐司空致仕李建勳卒且死戒家曰時事如此吾得良死幸矣勿封土立碑聽人耕種於其上免為它日開發之標及江南亡也諸貴人高大之冢無不發者惟建勳冢莫知其處通監五代周太祖傳記聖人獨見先䐗白虎通集子胥知姑蘇之有麋鹿輔果識智伯之為趙禽選賢儒在世猶靈蓍神龜也王充論衡思同蓍蔡選贊見機於萬里之外衆趍明所避陳子昂蓍龜所以前人用盧藏用有先知而無後悔白帖盜據淮滸宰相以李元平有名以為才堪攘寇拜為汝州公柳惟深慷慨言於朝曰是夫喋喋衒玉賈石者王衍誤天下殷浩敗中軍華而不實往且見獲何寇之攘人不之信未幾盜襲汝州以元平歸柳文韓魏公嘗云吳長文奎有識方天下盛推王安石以為必可致太平唯長文獨語曰王安石心強性很不可大用魏公別録呂獻可任御史中丞將對於崇政殿司馬溫公密問曰今日欲言何事獻可曰袖中彈文乃新參也溫公愕然獻可正色曰王安石雖有時名上意所向然好執偏見不通物惰輕信難回喜人佞己聽其言則美施於用則踈若在侍從猶或可容置諸宰府則天下必受其弊矣劉諫議集王安石始為政司馬溫公上疏逆陳其利害曰後當如是行之十餘年無一不如公言者東坡撰溫公行狀神宗將召用介甫訪於大臣爭稱譽之張安道時為氶旨獨言安石言偽而辨行偽而堅用之必亂天下記聞見於衆人之所未見也曾南豐昔者王叔子見王衍曰誤天下蒼生必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣老泉康節與客散步天津橋上聞杜鵑聲慘然不樂客問其故則曰洛舊無杜鵑今始至有所主不二年上用南士為相多引南人多務更變天下自此多事矣至熙寧初其言乃驗三朝言行録
