body:
  text: 力量經君子以厚德載物易坤卦大車以載積中不敗也大有地之廣厚載華岳而不重振河海而不洩記中庸子天不能死地不能埋桀跖之世不能汙非大儒莫之能立荀儒效天下者至重也非至強莫之能任正論並荀史王嘉為丞相數言不宜封董賢上怒召丞相詣廷尉詔獄椽吏涕泣共和藥進嘉引藥盂擊地謂官屬曰丞相幸得備位三公負國伏刑都市以示萬眾豈兒女子耶何謂咀藥而死嘉出見使者受詔西漢本傳苻堅眾號百萬次淝水謝玄入問計謝安無懼色方與玄圍碁遊陟至夜乃還晉書確乎不動如棟處屋如骨在身隋書房彥謙傳張公論事有四天之力唐書張元素傳傳記昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威劫操劍斬蛟蛟死波休乃投璧於河三投而輒躍出乃毀璧而去示無恡意水經注集幹坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下唐文粹功參造物謀協先天天地之內指麾無前屹屹中立為天一柱雷崩山谷貔虎頓伏飆倒溟波鯨鯢蹉跎長轡利策橫制宇宙據長河如指盃擘太華若破塊斷鰲補天大與地角壯與天勍橫流之中一斥而定乾坤為之坱軋河嶽為之震蕩並唐文粹障百川而東之回狂瀾於既倒韓文鰲怒則蹴翻五嶽鯨擊則掉破百川皮日休本朝韓魏公知北都有獻二玉杯公荅以百金乃開宴召貴客特設一棹致杯其上將酌酒遍勸坐客俄為吏誤觸檯倒玉杯俱碎坐皆失色吏伏地待罪公神色不動曰物破亦自有時汝誤也非故也何罪之有劉斧翰府名談韓魏公鎮相州祀宣尼齋夜宿省偷兒入室挺刃曰不能自濟求濟於公公曰几上器具可直百千盡以與汝偷兒曰願得公首以獻西人公即引頸偷兒稽顙曰以公量過人欲來試公几上之物已荷公賜願無泄也公曰諾終不以語人其後為盜者以他事坐罪當死於市中備言其事曰慮吾死後惜公之遺德不傳於世也遯齋閑覽寇準在澶淵每夕與楊億飲博歌謳諧謔歡呼常達旦或就寢則鼻息如雷上使人視之喜曰得渠如此吾復何憂五朝言行寇萊公之貶雷州也丁謂遣中使臺勑往授之公方與郡官飲上下皆皇恐公神色自若使人謂之曰朝廷若賜準死願見勑書公乃從錄事借綠衫著之拜受於庭升階復飲至暮而罷記閭臨大事決大議垂紳正笏不動聲色而揩天下於泰山之安歐公撰韓魏公晝錦堂記孤舟倒江河赤手攬犀象坡詩萬牛挽不前公乃獨力扛黃魯直詩倒海取明月同上子魯燒積澤天北風火南向恐燒國哀公自將眾趨救火人盡逐獸而火不救及仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣韓非子史呂太后立諸呂為王陳平偽聽之及太后崩平與太尉勃合謀卒誅諸呂史陳平本傳不易太子者留侯招此四人之力也同上留侯本傳上欲廢太子呂后恐良曰上有所不能致者四人令太子為書固請太子迎此四人至上置酒太子侍四人者從太子上怪問四人前對曰聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子上召戚姬曰我欲易之四人為之輔羽翼已成難動搖矣西漢張良傳上居南宮見諸將偶語以問張良對曰陛下與此屬共取天下而所封皆故人所誅皆仇怨今恐以過失及誅故相聚謀反耳上曰柰何良曰取上素所不快計群臣所共知最甚者一人先封以示群臣上封雍齒群臣皆喜曰雍齒且侯吾屬亡患耳初雍齒不欲屬沛公沛公怨齒互見轉移人心田延年前離席按劍曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今群臣鼎沸社稷將傾且漢之傳謚帝為孝者以長有天下令宗廟血食也如漢家絕祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵群臣後應者請劍斬之通鑑漢宣帝紀關內大雨四十餘日京師民相驚言大水至百姓奔走大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水王商獨曰何因當有大水暴至此必訛言也有頃長安中稍定問之果訛言鳳大慚自恨失言同上漢成帝紀互見失言臥赤子天下之上而安朝委裘而天下不亂西漢賈誼傳變所欲為易於反掌安於泰山枚乘傳太子幸酒樂燕樂上不以為能有意欲以山陽為嗣上間獨寢時史丹直入臥內頓首伏青蒲上涕泣言曰道路流言以為太子有動搖之議臣願先賜死以示群臣太子由是遂定為嗣通鑑漢元帝紀灼曰章酒好酒也樂燕沈讌也師古曰上樂又音五孝切王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至滹沱河還白河水流澌無船不可渡官屬大懼光武令王霸往視之霸恐驚眾欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河水亦合乃令霸護渡未畢數騎而冰解光武謂霸曰安吾眾得濟免者卿之力也東漢本紀誅王郎收文書得吏人與郎交關謗毀者數千章光武不省會諸將軍燒之令反側子自安同上初陸遜為大都督諸將或討逆時舊將或公室貴戚各自矜恃不相聽從遜按劍曰諸軍並荷國恩當相輯睦共剪此虜上報所受而不相順何也僕雖書生受命主上國家所以屈諸君使相承望者以僕尺寸可稱能忍辱負重故也各任其事豈復得辭軍令有常不可犯也及至破備計多出遜諸將乃服通鑑三國魏文帝紀蔣琬為尚書時新喪元帥琬出類拔萃處群僚之右既無戚容又無喜色神守舉止有如平日由是眾望漸服同上魏明帝紀亙溫入赴山陵止新亭大陳兵衛將移晉室呼謝安及王坦之欲於坐害之安從容就席坐定謂曰安聞諸侯有道守在四鄰明公何須壁後置人耶溫笑曰正自不能不爾遂笑語移日晉書謝安本傳苻堅百萬之眾已瞰吳江亙溫九五之心將移晉鼎衣冠易慮遠邇崩心從容而杜姦謀宴術而清群寇同上慕容根言於燕王暐曰太宰太傳將謀不軌臣請帥禁兵以誅之可足渾氏將從之暐曰二公國之親賢先帝選之託以孤嫠必不肯爾安知非太師欲為亂也乃止通鑑晉海西公燕新遭大喪內外恟懼太宰恪舉止如常人不見其有憂色每出一人步從或說以宜自嚴備恪曰人情方懼當安定以鎮之柰何復自驚擾眾將何仰由是人心稍定同上晉紀帝崩群臣未敢立嗣或曰當須大司馬處分王彪之曰天子崩太子代立大司馬何容得異同上魏有新徒勑勒千餘家苦於將吏期以草生牛馬肥亡歸漠北劉潔安原奏請徙之河西魏王曰此曹習俗放散日久譬如囿中之鹿急則奔突緩之自定吾區處自有道不煩徙也通鑑宋太祖後周文帝崩孝閔帝尚幼中山公護雖受顧命而名位素下群公各圖執政護深憂之密訪於謹謹曰夙蒙丞相殊眷今日必以死爭之若對眾定策公必不得讓明日群公會議謹曰昔帝室傾危丞相志存匡救今上天降禍奄棄百僚嗣子雖幼而中山公親則猶子兼受顧託軍國大事理須歸之辭色抗厲眾皆悚動護曰此是家事護何敢有辭謹既周文等夷護每申禮敬至是謹乃言曰公若統理軍國謹等便有所依遂再拜群公迫於謹亦拜眾議始定北史于謹本傳或說上曰突厥所以屢寇關中者子女玉帛皆在長安故也若徙長安而不都則胡寇自息矣上以為然遣中書侍郎宇文士及踰南山至樊鄧行可居之地將徙都之太子建成齊王元吉裴叔皆贊成其策秦王世民諫曰戎狄為患自古有之陛下以聖武龍興光宅中夏精兵百萬所征無敵柰何以胡寇擾邊遽遷都以避之貽四海之羞為百世之笑乎乃止通鑑唐高祖紀馮盎本北燕人以軍功進總管或告盎叛大宗詔發兵討之魏證諫曰當懷之以德帝乃遣韋叔諧諭盎盎遣子智戴入侍帝曰證一言賢如十萬眾唐書上謂侍臣曰術者言五日中當有急兵入宮卿等為朕備之張說曰此必讒人欲離間東宮願陛下使太子監國則流言自息矣通鑑唐玄宗民間訛言上採擇女子以充掖庭上聞之令有司具牛車於崇明門自選後宮無用者載還其家敕曰燕寢之內尚令罷遣閭閻之間足可知悉同上郭晞在邠州縱士卒為暴節度使白孝德患之段秀實自請補都虞候既署一月晞軍士十七人入市取酒以刀刺酒翁壞釀器秀實列卒取十七人首注槊上植市門晞一營大譟盡甲孝德恐召秀實曰柰何秀實曰無傷也請往解之孝德使數十人從行秀實盡辭去請老躄者一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰常侍負若屬耶副元帥負若屬耶柰何欲以亂敗郭氏晞出秀實讓之曰副元帥勳塞天地當念始終今常侍恣卒為暴行且致亂亂則罪及副元帥亂由常侍出然則郭氏功名其存者幾何言未畢晞再拜曰公幸教晞以道恩甚大敢不從命顧叱左右皆解甲散還火伍中敢譁者死通鑑唐代宗回紇吐蕃合兵圍涇陽郭子儀曰今眾寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓注矢於陣前子儀免冑釋甲投鎗而進回紇諸酋長相顧曰是也皆下馬羅拜藥葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復總兵於此懷恩又為天所殺我曹豈肯與公戰乎同上涇州王童之謀作亂期以辛酉旦警嚴而發前夕有告之者段秀實陽召掌漏者怒之以其失節令每更來白輒延之數刻遂四更而曙童之不果發同上容管經略使王翃為河中少尹知府事部將凌正暴橫翃抑之焉其徒乘夜作亂翃知之故縮漏水數刻以差其期賊驚潰走同上裴度平章中書失印度自如左右白復於故處得印度不應或問其故曰此必吏人盜之以印書券耳急之則投諸水火緩之則復還故處人服其識量通鑑訛言有寇士民驚譟縱橫走塵埃四起兩省諸司官聞之皆奔走鄭覃李石在中書顧吏卒稍稍逃去覃謂石曰耳目頗異宜且出避之石曰宰相位尊望重人心所屬不可輕也今事虛實未可知堅坐鎮之庶幾可定若宰相亦走則中外亂矣且果有禍亂避之亦不免覃然之石坐視文案沛然自若左金吾大將軍陳君賞率其眾立望仙門下謂勑使曰賊至閉門未晚請徐觀其變不宜示弱至晡後乃定是日非石與君賞鎮之京師幾再亂矣通鑑唐文宗傳記錢鏐封吳越王役大興士卒嗟怨或夜書府門曰沒了期沒了期修城纔了又開池鏐出見之命吏書曰沒了期沒了期春衣纔罷又冬衣嗟怨頓息陶岳五代史補集眉如松雪齊四皓調笑可以安儲皇李太白以忠義感脅從之伍以含洪安反側之徒劉賓客天步艱難海內崩離六合恟然一言安之劉長卿洒掃垢汙以為萬世安杜牧之本朝有妄言南詔欲來寇蜀蜀守調兵築城民大驚擾朝廷聞之詔張文定公移鎮西蜀公言此必妄也當以靜鎮之入境下令曰寇來吾自當之妄言者斬悉歸所調兵罷築城之役會上元觀燈城門皆通夕不閉蜀遂大安東坡撰公墓誌如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡同上王元之畫像贊張乖崖守成都兵火之餘人懷反側一日合軍旅大閱始出眾遂嵩呼者三乖崖亦下馬東北望而三呼復攬轡行眾不敢讙王清臣塵史
