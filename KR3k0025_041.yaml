body:
  text: 遲鈍懶慢史翟方進年十二三給事太守府為小史號遲頓師古讀曰鈍不及事西漢本傳張衡擬班固兩都作二京賦因以諷諫思十年始成後漢左思造齊都賦一年乃成欲作三都賦構思十年賦成晉書儒緩機事不稱耳通監晉海西公紀李程為翰林學士性嬾日過八塼乃至時號八塼學士新唐書本傳傳記張衡研京十年左思練都一紀文心雕龍楊子草玄累年不就史通經誰夙知而暮成詩抑注云早有所知實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食詩生民箋云能匍匐則岐岐然意有所知也其貌嶷嶷然有所識別也蚤有譽於天下記中庸子孔子東遊見兩小兒辯鬥問其故一兒曰我以日始出時去人近而日中時遠也一兒曰我以日出時遠而日中時近也一兒曰日初出時大如車蓋及日中則如盤盂此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及日中則如探湯此不為近者熱而遠者涼乎孔子不能決也兩小兒笑曰孰謂汝多知乎列湯問童烏九齡與我玄文楊子注童烏子雲之子也或問甘羅之悟呂不韋張辟彊之覺平勃皆以十二齡楊重黎虎豹未成文而有食牛之氣鴻鵠之鷇羽翼未成而有四海之心賢者之生亦然尹子史楚使子玉治兵國老皆賀子文蒍賈尚幼後至不賀子文問之對曰子玉之敗子之舉也舉以敗國將何賀焉過三百乘不能入矣苟入而賀何後之有左僖二十七年秦師過周北門王孫滿尚幼觀之言秦師輕而無禮必敗左僖三十二年項羽攻外黃下欲阬之外黃令舍人兒年十三往說羽曰彭越彊劫外黃故且降待大王至又皆阬之百姓豈有歸心後此梁地十餘城皆恐莫肯下矣史記項羽紀秦始皇使張唐往相燕不肯行甘羅曰項橐生七歲為孔子師今臣生十二歲於茲矣君其試臣始皇使甘羅於趙史記甘茂傳賈誼年二十餘最少每詔令議下諸老先生未能言誼盡為之對西漢本傳司馬遷年十歲則誦古文二十而南游江淮上會稽探禹穴窺九疑浮沅湘西漢本傳應奉少聰明自為童兒凡所經履莫不暗記讀書五行並下東漢本傳賈誼求試屬國詭繫單于終軍欲以長纓牽致勁越弱冠慷慨前世美之禰衡傳日蝕京師不見黃瓊以狀聞太后詔問所蝕多少瓊未知所況琬年七歲在傍曰何不言日蝕之餘如月之初瓊大驚即以其言應詔東漢黃瓊傳京師號曰天下無雙江夏黃童後漢黃香傳孔融幼有異才十歲隨父詣京師時河南尹李膺不妄接士融造門曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與李老君同德比義而相師友則融與君累世通家眾坐歎息陳煒後至坐中以告煒曰小而聰了大未必奇融曰觀君所言將不早慧乎東漢本傳孔融第六四歲時嘗與諸兄共食棗輒引小者人問其故荅曰我小兒法當取小者由是宗族奇之後漢張霸年七歲通春秋欲進餘經父母曰汝小未能者霸曰我饒為之東漢本傳賈逵自為兒戲弄常設部伍魏書虞翻少有高氣年十二客有候其兄者不過翻翻追與書曰僕聞琥珀不取腐芥磁石不授曲針過而不存不亦宜乎吳書本傳注常林七歲有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有魏志諸葛瞻八歲聰慧可愛蜀志本傳荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志互入諸父張憑祖鎮憑年數歲鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎晉書互見祖孫兩門鄧艾年十一每見高山大澤輒指畫軍營處後為大將晉書王允之總角從伯敦常以自隨出則同輿入則共寢敦常夜飲允之辭醉先臥敦與錢鳳謀為逆允之已醒悉聞其言慮敦或疑已便於臥處大吐衣面並汙鳳既出敦果照視見允之臥吐中以為大醉不復疑之晉書本傳劉湛自弱年即有宰物之情常自比管葛通監晉恭紀慕容盛年十三謂慕容柔曰夫十人之長亦須才過九人然後得安通監晉武紀謝安摠角沈敏風宇條暢晉書王暕年數歲風神聳拔有成人之度晉王儉傳謝朏十歲能屬文隨父莊游山使朏命篇攬筆便就晉書本傳陸雲少與兄機齊名幼時閔鴻見而奇之曰此兒若非龍駒當是鳳雛謝尚八歲神悟速成父鯤嘗攜之送客或曰此兒一坐之顏回也尚應聲荅曰坐無尼父焉別顏回王戎幼而穎悟年六七歲嘗與群兒戲於道側見李樹多實等輩競趍之戎獨不往或問其故戎曰樹在道傍而多子必苦李也取之信然並同上元魏祖瑩年八歲能誦詩書十二為中書學生耽書父母恐其成疾禁之不能止常密於灰中藏火驅逐僮僕父母寢睡之後燃火讀書以衣被蔽塞窗戶恐漏光明為家人所覺由是聲譽甚盛內外親屬呼為聖小兒尤好屬文北史本傳明帝幼而聰哲為元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊來元帝異之明日宴群僚復問之對曰日近元帝失色曰何乃異向者之言乎對曰舉目則見日不見長安晉本紀謝安年四歲桓彝見之而歎曰此兒風神秀徹後當不減王東海王導亦深器之由是少有重名晉書栝柏豫章雖小已有棟梁之器南宋袁粲傳王泰幼敏悟年數歲時祖母諸孫姪散栗於床群兒競之泰獨不取問其故對曰不取自當得賜由是中外異之宋書劉孝綽七歲能屬文父繪齊時掌詔誥孝綽年十四繪嘗使代草之南史朱書互入克紹謝貞八歲嘗為春日閑居詩曰風定花猶落從舅王筠曰追步惠連矣南史何遜八歲能賦詩沈約謂遜曰吾每讀卿詩一日三復猶不己其為名流所稱如此梁書蕭摩訶年十三單騎出戰無敢當者通監梁高祖徐陵八歲屬文十三通莊老慧雲法師每嗟陵早就謂之顏回南史本傳王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先嘗齊書楊愔庭前有奈樹實落群兒咸爭之愔頹然不動獨坐甘齊何妥少機警八歲顧良戲之曰汝姓何是荷葉之荷是河水之河妥應聲曰先生姓顧是眷顧之顧是新故之故隋書薛世雍為童時與群輩游戲輒畫地為城郭令諸兒為攻守之勢有不從令者撻之諸兒畏憚莫不整齊同上宇文忻為童時與群輩游輒為部伍進止行列無不用命識者見而異之李泌七歲知為文玄宗召之既至帝方與張說觀弈因使說試其能說請賦方圓動靜泌曰願聞其略說曰方若棋局圓若棊子動若棋生靜若棋死泌應曰方若行義圓若用智動若騁材靜若得意說因賀帝得奇童新唐書李泌傳蘇頲弱冠敏悟一覽至千言輒覆誦唐書蘇頲傳盧懷慎在童丱已不凡韓思彥歎曰此兒器不可量同上員俶九歲升坐詞辯注射坐人皆屈新唐書李泌傳白居易始生七月能展書指之無兩字雖試百不差唐書本傳李賀七歲能辭章韓愈皇甫湜始聞未信過其家使賦詩援筆輒就如素搆目曰高軒過唐書李賀傳褚無量幼厲志好學家近湖中有龍鬥傾里閈觀之無量時年十二讀書晏然不動舊唐書嚴武幼豪爽母裴不為挺之所荅獨厚其妾英武始八歲怪問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也唐書嚴挺之傳嚴武神氣雋爽敏於聞見幼有成人之風舊唐書斬裴炎炎弟子太僕寺丞伷先年七歲上封事請見言事太后召見詰之曰汝伯父謀反尚何言伷先對曰陛下為李氏婦先帝棄天下遽攬朝政變易嗣子踈斥李氏封崇諸武臣伯父忠於社稷反誣以罪戮及子孫陛下所為如是臣實惜之陛下早宜復子明辟高枕深居則宗族可全不然天下一變不可復救矣通監唐武后樂思晦男未十歲沒入司農得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承反矣太后意稍寤通監唐武后互入轉移人心劉晏八歲獻頌帝奇其幼命宰相張說試之曰國瑞也即授以正字公卿邀請旁午號神童名震一時新唐書本傳互入際遇傳記王獻之少而標邁為一時風流之冠晉陽秋楊信字子烏雄第二子幼而明慧雄草玄經不會子烏令作九數而得之雄又擬易羝羊觸藩彌日不就子烏曰大人何不云荷戟入榛劉向張玄祖八歲齒虧先達知其不常戲之曰君口復何為開狗竇玄荅云使君輩正從此中出劉昭幼童傳互入納侮賈逵年十歲暗誦六經父曰吾未嘗教爾安得三墳五典誦之對曰姉嘗抱于籬邊聽鄰家讀書因記得而誦之耳王子年拾遺何晏大將軍進之孫進遇害魏武納晏養於宮至七八歲惠心天悟帝欲以為子每遊觀令與諸子長幼晏微覺之坐則專席止則獨立或問其故荅曰禮異姓不相貫何晏別傳劉晏以神童為秘書省正字上問晏曰正字正得幾字晏曰天下字皆正惟朋字未正玄宗大奇之明皇雜錄辛攀年七歲程曉目攀而笑曰犁牛騂犢孺子之謂攀曰戲及人親非雅訓也崔鴻十六國春秋徐孺子年九歲月下戲人或曰月中無物當極明徐曰不然譬如人眼中有瞳子無此可不暗乎世說鍾毓鍾會少有令譽年十三魏文帝聞之召見問毓曰卿何汗曰戰戰惶惶汗出如漿復問會卿何不汗對曰戰戰慄慄汗不敢出王濬仲裴叔則二人總角詣鍾世季客問鍾曰二童是誰鍾曰裴楷清通王戎簡要並同上楊氏子九歲甚聰惠孔君平詣其父父不在乃呼兒出為設果果有楊梅孔以示兒曰此是君家果兒應聲荅曰未聞孔雀是夫子家禽世說上集終童山東之英妙賈生洛陽之才子文選西征賦弱冠流芳雋聲清劭音韶文選楊武仲往昔十四五出遊翰墨場斯文崔魏徒以我似班楊七齡思即壯開口詠鳳凰九齡書大字有作成一囊杜詩早年見標格秀氣衝星斗驥之子鳳之雛陸機二十作文賦汝更小年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青冥只今年才十六七射策君門期第一並同上生而歧嶷實單實華越在襁褓神明滋盛童蒙訓敏光潤玉顏與諸兒戲神清涵泳卓然如鴻雛鵠子有青雲之意也陳子昂耳目明達神氣以靈特出等夷韓文少年嶄然見頭角眾謂柳氏有子矣韓愈撰柳宗元墓誌互入有後新篁纔解籜寒色已青蔥元微之衛瓘諸郎衛玠珍可怜雛鳳好青春十歲佩觿嬌稚子八行飛札老成人同上成童在侶獨不嗜戲劉賓客骨清年少雙眼冰鳳羽參差五色層天上麒麟時一下人間不獨有徐陵杜牧之七歲屬文意語天出皇甫湜撰韓愈碑童區寄十一歲行牧且蕘二豪賊劫持之虛所賣之寄偽兒啼恐慄為兒怕狀賊易之一人去為市一人醉臥童殺之逃未遠市者還得僮曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者持僮抵主人所愈束縛牢甚夜半童自轉以縛即爐火燒絕之雖瘡手勿憚復殺市者因大號一虛皆驚以聞於官剌史顏証奇之留為小吏不肯護還之鄉柳文童區寄傳本朝王元之七八歲一日太守席上出詩句鸚鵡能言爭似鳳元之書其下曰蜘蛛雖巧不如蠶聞見後錄文潞公幼時與群兒擊毬一兒擊毬入柱穴中不能出公以水灌之毬浮出司馬公幼與群兒戲一兒墮大水甕中已沒群兒驚走不能救公取石破甕兒得出識者已知二公之仁智不凡矣同上司馬溫公自成童凜然如成人七歲手不釋書至不知寒暑飢渴年十五書無所不通東坡撰公行狀軾總角入鄉校有自京師來者以石守道所作聖德詩示鄉先生軾從旁竊觀問先生以所頌者十一人何也先生曰童子何用知之軾曰此天人也則不敢知若亦人耳何為而不可先生奇軾言盡以告之東坡范文正公集敘搖頭卻梨棗似識非分恥東坡詩少年壯盛日千里同上蘇公軾生十年而太夫人親授以書聞古今成敗輒能語其要太夫人讀范滂傳慨然太息公侍側曰某若為滂夫人亦許之乎蘇子由撰東坡墓誌虎子墮地氣食牛陳後山童幼子朣然如新生之犢莊古之伐國不殺黃口淮南史昭公生十九年矣猶有童心左襄三十一年漢高祖問魏大將誰曰柏直是口尚乳臭不能當韓信西漢末世貴戚食祿之家溫衣美飯乘堅驅良而面墻術學不識臧否通監漢薚紀黃吻婢兒通監晉紀晉惠帝為人戇騃聞蛙聲謂左右曰此鳴者為官乎為私乎時天下荒百姓餓死曰何不食肉麋晉書生長富貴齒髮尚少不更艱危通監唐德宗集雖有五男兒摠不好紙筆阿舒已二八嬾惰固無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓棗與栗陶淵明責子詩互入責子童騃無知雖藉祖父之寵曾微分寸之勞白傳集
