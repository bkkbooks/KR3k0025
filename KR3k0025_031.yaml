body:
  text: 任其自然子性長非所斷性短非所續莊子駢拇篇賈瓊問何以息謗子曰無辯曰何以止怨曰無爭文中子問易史荒服之外其叛不為之勞師其降不為之釋備使其為寇不能為臣不得唐書突厥傳序又見控制有道集苟不知我而謂我盜跖吾又安取懼焉苟不知我而謁我仲尼吾又安取榮焉柳文謗譽本朝美者自美吾何為而喜惡者自惡吾何為而怒去自去耳吾何缺而追來自來耳吾何妨而拒臨川集齒髮付天公缺壞不可修東坡經寧適弗來微我弗顧寧適不來微我有咎詩伐木君子內省不疚無惡於志記中庸子曰不患無位患所以立不患莫已知求為可知也語里仁忠告而善道之不可則止語顏淵子曰不患人之不已知患其不能也語憲問子殀壽不貳脩身以俟之孟盡心上君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故恥不脩不恥見汙恥不信不恥不見信恥不能不恥不見用荀子非十二子互入知恥君子慕其在已者不慕其在天者荀子天道蘭生幽宮不為莫服而不芳舟在江海不為莫乘而不浮君子行義不為莫知而止休淮南子說山訓史心苟無瑕何恤乎無家左閔鄭人游於鄉校以論執政然明謂子產曰毀鄉校子產曰夫人退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之左襄三十二苟能脩身何患不榮東方朔傳士病不能明經經術苟明其取青紫如侻拾地芥西漢夏侯勝傳內省不疚何息人言東漢班超傳互入無傀虞世南曰若德不脩雖獲麟鳳終是無補但執政無闕雖有災何損於時唐書集諸生業患不能精無患有司之不明行患不能成無患有司之不公韓文公進學解夫有湛盧豪曹之器者患不得犀兇而剸之不患其不利也柳文君子抱仁義不懼天地傾王建集本朝清香肯以無人減歐公陪飲上林院後亭不可取者存乎子取不取者存乎人東坡四菩薩記知命者必盡人事然後理足而無憾物之有成必有壞譬如人之有生必有死國之有興必有亡也雖知其然而君子之養身也凡可以久生而緩死者無不用其治國也凡可以存存而救亡者無不為至於不可柰何而後已此之謂知命東坡墨妙亭記經惟聖罔念作狂惟狂克念作聖書多方禮之於人也猶酒之有孽也君子以厚小人以薄記禮運互入事同體異子仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之孟子子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣孟子西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以祀上帝孟離婁下有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳孟盡心下人性之善也猶水之就下也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉人之可使為不善其性亦猶是也孟告子下鍥而舍之朽木不折鍥而不舍金石可鏤荀子勸學厭其源開其瀆江河可竭一進一退一左一右六驥不致荀子脩身故善用之則百里之國足以獨立不善用之則楚六千里而為讎人役荀子仲尼日月星辰禹桀之所同也禹以治桀以亂有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王得其人則存失其人則亡並荀子天道積厚者流澤廣積薄者流澤狹為君子則常安榮為小人則常危辱並荀子跛鼈致之六驥不致是無他故焉或為之或不為之耳荀子脩身百川學海而至于海丘陵學山而不至于山楊子學行晞驥之馬亦驥之乘也晞顏之人亦顏之徒也同上脩其善則為善人脩其惡則為惡人楊子脩身見畏與見侮無不由己楊子五百御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵楊子互入間不容髮假儒衣書服而讀之三月不歸孰曰非儒也楊子互入矯揉耕道而得道獵德而得德楊子譬水火焉善用之則為福不善用之則為禍亢倉子兵道篇今夫毛嬙西施天下之美人若使之御腐鼠蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環則雖王公大人有嚴志頡頏之行者無不憛悇癢心而悅其色矣淮南子脩務訓互入間不容髮故魏兩用樓翟吳起而亡西河湣王專用淖齒而死于東廟無術以御之也文王兩用呂望召公奭而王楚莊王專用孫叔敖而霸有術以御之也淮南子記論訓史衛文公元年革車三十乘季年乃三百乘左閔三閔子馬曰禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也左襄二十三李斯見吏廁中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂斯乃曰人之賢不肖譬如鼠矣在所自處耳史本傳今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子所置之湯武置天下於仁義禮樂累子孫數十世此天下所共聞也秦王置天下於法令刑罰禍幾及身子孫誅絕此天下之所共見也西漢賈誼治安策祜之始至也軍無百日之糧至季年有十年之積晉書羊祜傳許敬宗嘆曰士之登庸不係世業履道則為衣冠失緒則為匹庶來護男兒作宰相虞世南男作木匠新唐書來濟傳云作匠將作少匠主工作夫人猶水也壅之則為泉疏之則為川通塞隨流豈有常性通監唐武后疏曰雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長通監後唐明宗傳記昔者禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵夫差以吳見禽於越文公以晉國霸而厲公以見殺於匠黎之宮大戴禮記保傅篇集必若所為危於累卵難於上天變所以為易於反掌安於泰山選枚乘上吳王書互入間不容髮如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥流濬則沼沚陸宣公文善根苟種佛果終成白樂天狙猴之處山叫呼跳梁其輕躁很戾異甚然得而縶之未半日則定坐求食唯人之為制其或優人得之加鞭箠狎而擾焉跪起趍走咸能為人所為者未有一焉狂奔掣頓踣弊自絕吾信夫狂之聖也柳文楊誨之第二書本朝越人之望燕為絕域也北轅而首之苟不已無不至臨川集士生於世使其中不自得將何往而非弊使其中坦然不以物傷性將何適而非快欒城集方寸之地清之則為高明虛靜之府雜之則為塵垢滓穢之囊鷹之鷙不可以為慈化而為鳩則鷙心盡矣橘之甘不可以為善變而為枳則甘味忘矣並鳴道集或問伊川氏量可學否曰可學進則識進識進則量進胡氏傳家錄經罔俾阿衡專美有商書說命下子舜何人也予何人也有為者亦若是孟子滕文公上人人皆有貴於己弗思耳孟告子惻隱之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之孟告子下人皆可以為堯舜孟子塗之人可以為禹荀子性惡晞驥之馬亦驥之乘也晞顏之人亦顏之徒也晞之則是楊子學行互入在人所為傳記動靜之物日月所照莫不砥礪大戴禮集雨露之所濡甘苦齊結實杜工部若果以堊與我異類則自堯舜以下皆宜縱目卬鼻四手八足鱗毛羽鬣飛走變化然後乃可苟不為是則亦人耳柳文楊誨之第二書一氣之所春一雨之所膏而得之者各有淺深不必均也李習之禽魚各翔泳草木遍芬芳韋應物集本朝春風無先後爛熳爭紅白歐公集草木本無情及時如自得不及墻根花與草春來隨處自芳菲並同上造化未嘗私一物各隨妍醜自芳菲歐公春帖子皇帝閣詞陽和不擇地海角亦逢春古今詩話子跬步不休跛鱉千里荀子駑馬十駕功在不捨同上經有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也詩江有汜說以使民民忘其死詩東山志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣憤之音作而民剛毅廉直勁正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛記樂記子韓娥之齊鬻歌聲哀一里老幼悲怨復為長歌老幼喜抃列子夫榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂動諸琴瑟形諸聲音而能使人為諸哀樂淮南子主術訓荊軻入秦宋意擊筑歌於易水之上聞者瞋目髮直穿冠趙王遷於房陵心懷故鄉作山水之謳聽者嗚咽泣涕流連簞醪注流軍士通醉溫辭一灑師人挾纊並釗子史楚伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左成十二燕昭王為郭隗改築臺師事之其後樂毅自魏往鄒衍自齊往劇辛自趙往士爭趍燕史記漢王下令軍士不幸死者吏為衣衾棺歛轉送其家四方歸心焉通監漢高紀趙佗稱制與中國侔帝乃為佗親冢在真定者置守邑歲時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越賜佗書曰前日聞王發兵於邊為冠災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕今得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭而不遜仁者不為也願與王分棄前惡終今以來通使如故賈至南越南越王恐頓首謝罪願奉明詔長為藩臣奉貢職下令去帝制稱臣通監漢文紀悲者不可為絫欷思者不可為歎息故高漸離擊筑易水之上荊軻為之低而不食雍門子一微吟孟嘗君為之於邑西漢中山靖王勝傳滿堂飲酒有一人向隅而悲泣則一堂皆不樂前漢刑法志一夫得情千室鳴絃後漢循吏傳姜詩事母至孝妻奉順尤篤母好飲江水妻常泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑慚感呼還東漢姜詩妻列傳王脩母以社日亡來歲鄰里社脩感念母哀鄰里為之罷社三國魏志羊祜都督荊州有并吞之心每與吳人交兵剋日方戰不為掩襲之計將帥欲有進譎詐之策者輒飲以醇酒使不得言有略吳二兒為俘者送還其家出軍行吳境刈穀為糧皆計所侵送絹償之游獵常止晉地若禽獸為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利晉書羊祜傳劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞之聲以動其游客之思於是群胡泣去晉書互入處事閑暇轉移人心劉琨在晉陽嘗為胡騎所圍窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊流涕欷歔向曉復吹之賊並棄圍而走晉書本傳互入處事閑暇坐以制勝轉移人心三門劉弘每有興發手書守相丁寧款密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事通監晉懷紀德可感義夫恩可勸死士通監梁高祖宇文泰從賀拔岳入關時關壠彫弊泰撫以恩信民皆感悅曰早遇宇文使君吾輩豈從亂乎通監梁高祖諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悅服通監唐太宗上見病卒召至御榻前存慰士卒莫不感悅有不預征名自願以私裝從軍動以千計皆曰不求縣官勳賞惟願效死遼東通監唐太宗山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下通監唐肅宗李懷光叛其將降馬燧以數騎入城慰撫其眾大呼曰吾輩復為王人矣通監唐德宗唐德宗在奉天時赦令武夫悍卒無不感動思奮唐書陸贄傳僕固懷恩誘吐蕃等南下急召郭子儀屯涇陽回紇曰令公誠存安得而見之子儀將出諸將請無往子儀曰虜收十倍之眾今力固不敵至誠感神況虜乎諸將請選鐵騎五百子儀曰適足以為害也即傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免冑而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領入朝舊唐書本傳互入處事閑暇遣知制誥裴度至魏博宣慰以錢百五十萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成德兗鄆使者數輩見之相顧失色嘆曰倔強者果何益乎通鑑唐憲宗互入倔強裴度以蔡卒為牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾為彰義節度使元惡既擒蔡人則吾人也又何疑焉蔡人聞之感泣先是吳氏父子阻兵禁人偶語於途夜不燃燭有以酒食相過從者罪死度既視事下令惟禁盜賊鬭殺餘皆不問往來者不限晝夜蔡人始知有生之樂通鑑唐憲宗傳記昔者良將之用兵饋簞醪者投諸河士卒同流而飲夫一簞之醪不能味一河之水而三軍之士思為致死者以滋味之及巳也黃石公三略互入與士卒一体雍門周以琴見孟嘗君曰臣竊悲千秋萬歲外墳墓生荊棘狐兔穴其中樵兒牧豎躑躅而歌其上行人見之悽愴曰孟嘗君之尊貴如何成此乎孟嘗君喟然嘆息淚下承睫桓譚新論高臺已傾稷下有聞琴之泣壯士一去燕南有擊筑之悲周庾思舊銘簞醪投河三軍奮感刓印在手萬夫睽離陳子昂集降將有依風之感宮人成憶月之歌劉賓客一客失意行十客顏色低姚少監本朝河西諸將讀璽書而知天子之聖明河北叛臣聞赦令而致武夫之涕泣欒城集
