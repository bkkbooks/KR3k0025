body:
  text: 得意子衆人熙熙如享太牢如春登臺老子二十史翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意如此漢王褒頌矯翼厲翮恣意所存前楊雄傳韓稜遷南陽太守特聽得過家上冢後漢書李琪既貴為相乃刻牙版為金字曰前鄉貢進士李琪常置之座側五代梁史本傳傳記喜氣津津出眉宇間太公六韜龍門下登者化龍三秦記江海集春風得意馬蹄疾一日看盡長安花南部新書載嚴揮詩互見得時集離蔬釋蹻而享膏梁王子淵頌振衣造雲闕跪坐陳清猷韓文脫然若沉痾之去體灑然若執熱之濯清風也枯槁沈溺魁宏寬通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣風雲入壯懷泉石別幽耳並韓文奮翅騰驤西京賦昨日鴻都新上第五陵年少讓清光劉賓客脫鱗介生羽翮柳文超群越輩顯赫明朝陳子昂心躍色揚皇甫湜煩襟與滯念一望恐作息皆遁逃白侍郎風高漸展摩天翼幹聳方呈構廈材羅隱集登龍有路水不峻杜牧之集本朝仕宦而至將相富貴而歸故鄉此人情之所榮而今昔之所同也歐公書錦堂記昔時結髮曾遊處今見焚香夾道迎歐公集得意無前敵陳後山子困吝之中精神遐漂孟子序卑陬失色莊子賈生以適音謫去意不自得及渡湘水為賦以吊屈原史本傳顏色憔悴形容枯槁史屈原傳荀勗自中書監遷尚書令甚慍有賀者勗怒曰奪我鳳凰池諸君賀我耶晉書本傳殷浩被黜終日書空作咄咄怪事四字而已本傳失志為昏史記孔子世家五鹿折角西漢朱雲傳墨墨不得志田蚡傳計乃無聊吳王傳其畫無俚之至欒布傳俚聊也腸一日而九回居則忽忽若有所亡出則不知所乘往司馬遷傳寒心銷志鄒陽傳于嗟默默應劭曰不得意賈生傳並前漢李林甫奏嚴挺之授員外郎詹事令東京養疾挺之至東都鬱鬱不得志成疾自為墓志曰挺之自絳郡太守抗疏陳乞天恩允請許養疾歸間前後歷任二十五官春秋七十無所展用上士所悲舊唐書本傳亞父聞項王疑之乃怒曰天下事大定矣君王自為之願請骸骨歸未至彭城疽發背而死通監漢高紀傳記蘇秦說秦王書十上而說不行黑貂之裘弊黃金百斤盡資用乏絶去秦而歸羸騰履蹻負書擔橐形容枯槁面目黧黑歸至家妻不下紝嫂不為炊父母不與言蘇秦喟嘆曰妻不以我為夫嫂不以我為叔父母不以我為子戰國策進士不捷而醉飽謂之打眊矂托言李白失意遊華山過縣跨驢宰怒引至庭下同上互入失勢龍門下不登者點額暴腮三秦江海集高蟾落第云天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上莫向春風怨未開胡曾下第詩云翰苑何時休嫁女文章早晚罷生兒上林新桂年年發不許平人折一枝北夢瑣言隱憫而不達獨徙倚而倣徉楚辭想崑山之高嶽思鄧林之扶踈顧六翮之殘毀雖奮迅而焉如文選禰正平賦互見抑鬱奪氣禠魄張平子西京賦神辱志沮嵇叔夜幽憤詩垂頭塌翼陳孔璋檄形影相吊曹子建上責躬詩表攀倒影而迷塗顧中峰而失路陳子昂金流玉鑠兮曾不自比於塵沙柳解崇賦力蹙勢窮吞志而沒柳文奔驥騁力中塗蹶足高鴻輕舉在雲墜翼同上失地顏色改傷根枝葉殘元稹集青冥卻垂翅蹭蹬無縱鱗杜詩倚風遺鶂路隨水到龍門竟與蛟螭雜寧無燕雀喧季子黑貂敝得無妻嫂欺自此無顏色朝扣富兒門暮隨肥馬塵殘杯與冷灸到處潛悲辛並杜詩獨掩窮途淚長歌行步難駱賓王集吊影慚連茹浮生倦觸藩同上垂頭喪氣韓送窮文低首下心祭鱷魚文獨閔閔以曷己憑文章以自宣閔己詩作驥君垂耳為魚我曝腮蹉跎顏遂低摧折氣愈下並韓文食齏腸亦苦強歌聲無歡出門即有礙誰謂天地寬孟東野男兒久失意寶劍亦生塵同上猿啼客散暮江頭人自傷心水自流同作逐臣君更遠青山萬里一孤舟劉長卿濩落名不成徘徊意空大誰伶棄置久卻與駑駘親並同上浩乎若泊諸巨海而無恨長乎若囚諸暗室而無曉唐文粹百酸攪腸同上氣味如中酒情懷似別人唐人下第詩泥尾休搖掉灰心罷激昂白侍郎僕乘囊輜日削月朘同上鎩翮鸞棲棘藏鋒箭在弸元微之低回傷志氣蒙犯變肌膚溫飛卿摶風滯北雲同上三獻無功玉有瑕更攜書劍客天涯許用晦十年失路誰知己千里思親獨遠歸錢起文故山歸夢近新歲客愁多刷羽思喬木登龍阻尺波蛾眉不入秦臺鏡鶂羽還驚宋國風世事悠揚春夢裏年光寂寞旅程中並同上接坐羞人識還家畏嫂輕張承吉若向南臺見鶯友為傳垂翅度春風李義山抱薰心恆焦舉斾心恆搖張說之咽喉梗而心膂分矣陸宣公床頭黃金盡壯士無顏色張文昌心事如摧櫓溫庭筠未得青雲志春同秋日情花開如葉落鶯語似蟬鳴杜荀鶴本朝落第汝為中酒味吟詩我作忍飢聲東坡集經人之所助者信也易繫辭子得道者多助孟子公孫丑下多助之至天下順之同上史齊柏有鮑叔牙賓須無以為輔佐有莒衛以為外主有國高以為內主晉文有子餘子犯以為腹心有賈他魏犨以為股肱有齊宋秦楚以為外主有欒郤狐先以為內主左昭公十三年孔子曰自吾得由惡言不聞於耳史本傳鸞鳳沖霄必假羽翼唐馬周集百足之蟲至死不僵以扶之者衆也文選曹六代論又衆力易成海浪扶鵬翅天風引驥毛劉賓客亦足張吾軍韓文羽翮得清風之助唐文粹互見得勢經折其右肱雖左股在豈足用乎易略例譬如瞽之無相與倀倀乎其何之記仲尼燕居子寡助之至親戚叛之孟子公孫丑下失道者寡助同上史衆叛親離難以濟矣左隱四年諺所謂輔車相依唇亡齒寒者其虞虢之謂也左僖五年虢叔曰皮之不存毛將安傅僖十四年晏子曰二惠競爽猶可又弱一個焉姜其危哉左傳昭三欒高皆齊惠公孫斷右臂而與人鬭失其黨而孤居求欲無危豈可得乎史記張儀傳蕭何追韓信漢高如失左右手西漢韓信傳渡江河而亡維楫中流而遇風波船必覆矣同上賈誼傳傳記狼狽是兩物狽前足短每行常駕兩狼失狼則不能動酉陽雜俎集猛虎雖云惡亦各有匹儕自矜無當對氣性縱以乖朝怒食其子暮還食其妃匹儕四散走猛虎還孤棲狐鳴門四旁烏鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頤猛虎死不辭但慚前所為虎兕無助死況知汝細微韓文偏轂不可轉隻翼不可翔孟東野太川未濟乃失巨艦長途始半而喪良驥劉賓客此心欲引托誰為生羽翼劉長卿本朝嗟吾譬馳車而失左右驂歐公共載一車喪其楫維坡詩子如開浮雲見白日如執火炬入冥室矣牟子史塞天下之望滿也西漢高五王傳仕官當作執金吾娶妻當得陰麗華後漢呂婆樓曰僕里舍有王猛者其人謀略不世出堅因婆樓以招猛一見如舊友語及時事堅大悅自謂如劉玄德之遇諸葛孔明也通監晉哀紀勒曰吾不喜得幽州喜得二子以裴憲為從事中郎荀綽為參軍同上晉愍紀上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳同上唐肅宗紀徐幹一作幹中曰文王遇姜公於渭陽若披雲見日月開霧睹青天也晉書人見之若披雲霧而睹青天也樂廣傳傳記唐太宗私幸端門見新進士綴行而出喜曰天下英雄入吾彀中矣托言集共君一夜話勝讀十年書古詩宿心遂矣冥骨甘焉陳子昂一得拜光輝溫如春風至韋應物心朗目舒炯若深井之下仰視白日之正中也柳文如黑而迷仰見斗極唐文粹經終遠兄弟謂他人父謂他人父亦莫我顧詩葛藟燕婉之求得此戚施詩新臺薄言往訴逢彼之怒詩柏舟子避水火也如水益深如火益熱亦運而已矣運者將轉而望救於他人孟子梁惠王下有託其妻子於其友而之楚遊者比其反也則凍餒其妻子同上良人者所仰望而終身也今若此孟離婁下莊周顧車轍中鮒魚曰激西江之水而迎子可乎鮒魚忿然作色曰我得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆莊子外物篇惜乎衣未成而轉為裳也揚子修身篇史四方諸侯誰不解體左成八年士大夫悵然失望西漢谷永傳鄭世翼遇崔信明曰聞公有楓落吳江冷願見其餘信明多出衆篇翼覽未終曰所見不逮所聞唐書崔信明傳侯霸聞太原閔仲叔之名而辟之既至霸不及政事徒勞苦而已叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去通監漢光武紀李密與王世充戰失利與衆二萬人歸關中上遣使迎勞相望於道密大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連數百城知我在此遣使招之亦當盡至比於竇融功亦不細豈不以一台司見處乎密至長安有司供待稍薄所部兵纍日不得食衆心頗怨既而以密為光祿卿上柱國賜爵邢國公密既不滿望朝臣又多輕之執政者或來求賄意甚不平通監唐高祖紀傳記郝隆為桓公南蠻參軍三月三日作詩不能者罰酒隆攬筆作一句云娵隅躍清池桓公曰娵隅是何物答曰蠻名魚是娵隅桓曰作詩何作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語世說見面不如聞名傳燈録集若葵藿之傾葉太陽不為回光選表求逢而招嫌求安而乘坎劉賓客本望文字達今因文字窮孟東野本欲雲雨化卻隨波浪翻唐文粹摶羊角而高翥浩若無津附驥尾以上馳邈焉難托駱賓王騎驢到京國欲和薰風琴豈識天子居九重鬱沈沈一門百夫守無籍不可尋韓文稞載而往垂橐而歸同上何意掌上玉化為眼中沙白樂天本朝陶穀久在翰林意希大用其黨因對言穀宣力實多微伺上旨太祖曰翰林草制皆檢前人舊本俗所謂依樣畫葫蘆耳何宣力之有穀作詩曰官職須由生處有才能不管舊時無堪笑翰林陶學士年年依樣畫葫蘆東軒雜録史周子曰孤始願不及此雖及此豈非天乎左成十八年垂橐而入稞載而歸國語齊語英布歸漢至漢王方踞床洗而召布入見布大怒悔來欲自殺出就舍張御食飲從官如漢王居布又大喜過望西漢本傳孟他以蒲萄酒一斗遺張讓讓拜他為涼州刺史漢書不圖今日復見漢官威儀東漢光武紀呂蒙晚節好學魯肅過之拊蒙背曰吾謂大弟但有武略耳至今者學識英偉非復吳下阿蒙吳志庾翼與王羲之書云吾昔有伯英章草十紙過江失亡常歎妙跡永絶忽見足下書煥若神明頓還舊觀晉書本傳周武帝平齊謂群臣曰我聞李德林名謂是天上人豈言今日得其驅使北史以臺省官為司鄭管原伊殷梁湊嵩谷懷等十二州營田使丞郎得此行者喜若登仙通監唐高祖紀有勸岑文本置産業文本曰南方一布衣徒步入關望不過祕郎縣令耳無汗馬之勞以文墨致位中書令亦極矣何更言産業乎唐書本傳互見知足傳記王敦鎮豫章衛玠避亂從洛投敦相見欣然談話彌日敦曰不意永嘉之中復聞正始之音世說中歲在辛酉乞漿得酒袁子正書殷禮與張溫使蜀諸葛亮見而歎曰江東菰蘆生此奇材建康實録集幾度見詩詩盡好及觀標格勝於詩唐楊敬之詩本朝所得如今過所聞臨川集經子不我思豈無他人詩褰裳篇婚姻之故言就爾宿爾不我蓄言歸思復我行其野詩反是不思亦已焉哉詩集有行三塗之難而墜千仞之下者仰望於道號以求出過之者日千百人皆去而不顧就令哀而顧之者不過攀木俯首深矉太息良久而去耳其卒無可奈何然其人猶望而不止也俄而有烏獲者持長綆千尋徐而過焉其力足為也其器足施也號之而不顧顧而曰不能力則其人知必死於大壑矣何也是時不可遇而幸遇焉而不逮乎已然後知命之窮勢之極其卒呼憤自斃不復望於上矣柳文互見求哀落葉不更息斷蓬無復歸韓落葉詩雨落不上天水覆最難收唐文粹古樹春無花同上
