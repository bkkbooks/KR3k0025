body:
  text: 窒泥經大過棟橈之世也棟已橈矣而守其常則是危而不扶凶之道也易略例子猶執熱而不以濯也孟離婁上執中無權猶執一也所惡執一者舉一而廢百也孟盡心上凡人蔽於一曲而暗於大理荀解蔽尾生與女子期於梁下女子不來水至不去抱梁柱而死莊子又見抱朴子曲士不可以語道莊子宋人有耕者田中有株兔走觸株而死因釋耕而守株冀更得兔宋人笑之韓非子互入愚暗以往聖人之法治將來譬猶膠柱而調瑟揚先知規行矩步不可以救焚拯溺抱朴子執其方天下無善教凝滯者智之蝥也執小義妨大權並文中子待扁鵲乃治病終身不愈也魏子史鄙儒不知時變前漢叔孫通傳當更化而不更化雖有大賢不能善治也西漢董仲舒傳常人可與守經未可與權也前漢張敞傳為人臣者不可不知春秋守經事而不知其宜遭變事而不知其權前漢司馬遷傳猶焦朋已翔乎寥廓而羅者猶視乎藪澤前漢司馬相如傳俗儒不達時宜前漢宣紀猶察伯樂之圖求騏驥於市而不可得梅福傳欲以承平之法理暴秦之緒猶以鄉飲酒禮理軍市也西漢梅福傳崔實曰俗士拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉東漢本傳俗士不知變以為結繩之約可理亂秦之緒干戚之舞足解平城之圍崔實傳庸儒泥文不知變唐姚崇傳儒生俗士豈識時務蜀諸葛亮傳注何異遺劍中流而刻舟以記唐史選舉志傳記膠柱調瑟刻舟求劍史通楚人有涉江者其劍自舟中墜於水遽鍥其舟曰是吾劍所從墜也舟去從所鍥處入求之而舟已行劍不行此不亦惑乎呂氏春秋互入愚暗類集蹐蹐一作蜷局顧而不行楚辭未嘗違戶庭安能千里遊鮑明遠還都詩永有某氏者拘忌尤甚以為已生歲直子鼠子神也因愛鼠不蓄貓禁僮勿擊倉廩恣鼠不問室無完衣飲食大率鼠之餘也夜不可寢終不厭柳子厚本朝團團如磨驢步步踏陳迹坡詩登木求魚知我拙循窠覓兔笑君踈欒城集經水流而不盈易坎卦水之性可停可行詩敝笱注子轉圓石於千仞之山孫子兵勢盤中走珠杜牧注孫子序事猶琴瑟曲終改調非循一迹之路守一隅之指拘繫牽連於物而不與世推移也並淮南子安得圓機之士與之共言九流哉文中子周公篇史不凝滯於物而與世推移史記屈平傳從諫若轉圜前漢梅福傳從叔特重謝弘微常曰微子異不傷物同不害止通鑑南史宋高祖紀譬如餌藥當人羸冷資散石以全身及勢熱發動去堅積以止患非忘其功勢不獲已耳通鑑宋蒼梧王紀本朝古來真遁何曾遁笑殺踰垣與閉門東坡詩經旅瑣瑣斯其所取災易旅卦言必信行必果硜硜然小人哉語子路史規小節者不能成榮名惡小恥者不能立大功史魯仲連傳互入因小失大遴東布章西漢高惠功臣表互入書問齪齪廉謹西漢申屠嘉傳愚士繫俗僒若囚拘西漢賈誼傳飾小行競小廉以自託於鄉黨同上局趣效轅下駒西漢灌夫傳委瑣握齪拘文牽俗西漢司馬相如傳握齪局狹也坐飾邊幅東漢隗囂傳修飾邊幅如偶人形東漢馬援傳仲長統曰務於清愨謹畏循常習故者是乃婦人之檢柙鄉曲之常人通鑑東漢胡粉飾貌搔頭弄姿槃旋偃仰從容冶步通鑑漢殤紀忘禮敬之大任禁忌之書拘信小故以虧大典通鑑漢靈紀袁紹繁禮多儀通鑑漢獻紀何晏行步顧影通鑑三國阮孚問卞壼曰卿常無間泰如含瓦石不亦勞乎晉書卞壼傳好荷禮荷與苛同漢酈食其傳互入不識大體李賀父名晉肅以是不應進士韓愈作諱辨竟不就試唐書本傳韋挺剪剪小夫唐書本傳文士齷齪不足與成天下之務唐書張柬之傳傳記吳郡陸襄父間被刑襄終身布衣蔬飯雖薑菜有切割皆不忍食居家惟以搯摘供廚江陵姚子為母燒死終身不忍噉炙熊康父以醉為奴所殺終身不嘗酒然禮緣人情恩由義斷親以噎死亦當絶食顏氏家訓集規行無曠迹矩步豈逮人選樂府丈夫無特達雖貴猶碌碌以不知事為簡以清一身為廉以守舊弊為奉法是心清於椳闑之內而柄移於胥吏之手並劉賓客煦煦為仁孑孑為義韓文本朝劉溫叟父名嶽終身不聽樂不遊嵩岱每赴內宴聞鈞奏則涕泣移時曰若非君命則不至於是此與李賀父名晉肅終身不舉進士相類吳處厚青箱雜記韋翼尚書有重名生平不飲酒不務歡笑為家諱樂也本朝丁用晦芝田録山鳥不知紅粉樂一聲檀板便驚飛總龜詩話經君子見幾而作不俟終日易繫辭時哉弗可失書泰誓上子雖有智慧不如乘勢孟子禹之趍時也履遺而不取冠挂而弗顧非爭其先也爭其得時也淮南子成務雖均機速為上決謀或同遲緩為下善濟事者若救火拯溺劉子史圖之此為時矣左莊六智者不失時史記子貢傳死生榮辱貴賤尊卑此時不再至史魯仲連傳時間不容息史陳餘傳時者難得而易失時乎時不再來西漢蒯通傳先即制人後則為人所制史記項羽紀時乎時乎聞不及謀贏糧躍馬惟恐後時史李斯傳平曰臣為事來所言不可以過今日史陳平世家范蠡曰會稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎史越世家張良陳平説曰漢有天下太半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也通鑑漢高紀互入失機趣時若猛獸鷙鳥之發西漢貸殖傳操刀必割西漢賈誼傳互入果決鳳鳥乘於風聖人乘於時西漢韓安國傳善人在患飢不及餐通鑑漢殤紀陳琳曰矢在弦上不可不發後漢當及其根柢未深而撲取之此救火貴速之勢也通鑑晉武紀暫勞永逸時不可失通鑑宋太祖庾質曰事機在速緩則無功通鑑隋紀投機之會間不容穟唐張公謹贊唐睿宗曰鷹摶狡兔須急救之不爾必反為所噬通鑑互入救援李絳曰錢用盡更來機事一失不可復追通鑑唐憲宗紀周行逢曰機事貴速緩則彼為之備不可圖也通鑑周太祖集賈餘勇者宜乘破竹之勢元微之集變通之間不容髮白帖時不再來唐文粹本朝范蜀公請建儲復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也諸公言今日難於前日安知他日不難於今日乎范鎮墓志無機則無以濟萬世之功老泉經知至至之可與幾也易乾卦初六履霜堅冰至坤卦見險而能止知矣哉易蹇卦幾者動之微吉之先見者也君子見幾而作不俟終日子曰知幾其神乎惟幾也故能成天下之務並易繫辭色斯舉矣語鄉黨忠告而善道之不可則止毋自辱焉語顏淵齊人歸女樂季桓子受之孔子行語微子子孔子相魯齊人饋女樂孔子遂行家語燔肉不至不稅冕而行孟子亭名柏人漢后夜遁劉子史越稱霸范蠡遂去曰蜚鳥盡良弓藏狡兔死走狗烹史越世家范蠡事越王勾踐二十餘年竟滅吳報會稽之恥還反國為書辭勾踐勾踐曰孤將與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃裝其輕寶珠玉自與其私徒屬乘舟浮海以行終不反止于陶自謂陶朱公同上孔子既不得用於衛將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趍而進曰敢問何謂也孔子曰竇鳴犢舜華國之賢大夫也趙簡子未得志之時須此兩人而后從政及其已得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至郊竭澤涸漁則蛟龍不合陰陽覆巢毀卵則鳳凰不翔何則君子諱傷其類也夫鳥獸之於不義也尚知避之而況乎丘哉乃還息乎陬鄉作為陬操以哀之史孔子世家蚤知之士名成而不毀故稱於後世史樂毅傳夏侯玄曰觀樂生遺燕惠王書其殆庶幾乎知機合道史樂毅傳成功之下不可久居史蔡澤傳張良願棄人間事欲從赤松子遊前漢張良傳初楚元王為穆生置醴及王戊即位忘設穆生曰可以逝矣醴酒不設王之意怠西漢楚王傳鳶音鳶鵲遇害則仁鳥增逝愚者蒙戮則知士深退西漢梅福傳秦穆遺戎而由余去齊人餽魯而孔子行前禮樂志王莽殺其子宇逢萌謂友人曰三綱絶矣不去禍及即解冠挂東都城門將家屬浮海後漢鄧禹賈復知帝偃干戈修文德不欲功臣擁衆京師乃去甲兵敦儒學耿弇等亦上將軍印綬皆以列侯就第通鑑漢光武籍本有濟世志屬魏晉之際天下多故名士少有全者由是不與世事遂酣飲為常晉書阮籍傳後周于謹自以久當重權功名既立願保優間乃上先所乘駿馬及所著鎧甲等北史本傳互入保身王及善雖無學術然清正難奪有大臣之節太后不悅謂及善曰卿高年不宜更侍遊宴但檢校閣中可也及善因稱疾謁假月餘太后不問及善歎曰豈有中書令而天子可一月不見乎事可知矣乃上疏乞骸骨通鑑唐武后蕭嵩乞骸骨上曰朕未厭卿何為遽去對曰及陛下未厭臣故臣得從容引去若已厭臣臣首領且不保安能自遂通鑑唐紀郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及已通鑑漢靈紀司馬溫公論傳記覆巢毀卵而鳳凰不翔刳胎焚夭而麒麟不至戰國策君子雖窮不處亡國之勢説苑集恐登階之逢殆故退伏於末庭楚辭梟鴟既以成群兮玄鶴弭翼而屏移梟鴟並進而俱鳴兮鳳凰飛而高翔並楚辭穆生謝病以免楚難選書仲連事成而蹈滄海子房名遂而追赤松白樂天集
