body:
  text: 評文下傳記楊雄曰軍旅之際飛書馳檄用枚皋廊廟之中高文大册用相如西京雜記庾信自南朝至北方惟愛溫子升所作韓山寺碑或問信曰北方何如曰惟韓山一片石堪共語餘若驢鳴狗吠耳玉泉子鄭奕常以文選教其子兄曰何不教他讀孝經論語免他學沈謝嘲風詠月汙人行止外史檮杌互見教子唐張九齡嘗覽蘇廷碩文卷謂同列曰蘇生之俊贍無敵真文陳雄帥也帝命虞世南等四十人選文章自楚詞訖大業共為一部五千卷號文章總集又擇能書二千人為御書生番鈔書南部煙花記夫文章者原出五經詔命策檄生於書者也序述論議生於易者也歌詠賦誦生於詩者也祭祀哀誄生於禮者也書奏針銘生於春秋者也朝廷憲章軍旅誓誥敷暢仁義發明功德牧民建國不可暫無一本作施用多途至於陶冶性靈從容諷誦入其滋味亦樂事也行有餘力則可習之然而自古文人多陷輕薄屈原露才揚己顯暴君過宋玉體貌容冶見遇徘優東方曼倩滑稽不雅司馬長卿竊資無操王褒過章僮約楊雄德敗美新李陵降辱夷虜劉歆反覆莽世傳毅黨附權門班固盜竊父史趙元叔抗疏過度馮敬通浮華擯壓馬季良佞媚獲誚蔡伯喈同惡受誅吳質詆斥卿里曹植悖慢犯法杜篤乞假無厭路粹隘狹已甚陳琳實號粗踈樊歆性無檢格劉楨屈強輸作王粲率躁見嫌孔融禰衡誕傲致殞楊修丁廙扇動取斃阮籍無禮敗俗嵇康凌物凶終傳玄忿鬥免官孫楚矜誇陵上陸機犯順履險潘嶽乾沒取危顏延年負氣摧黜謝靈運空踈亂紀王元長凶徒自貽謝玄暉侮嫚見及凡此諸人皆其翹秀者不能悉紀大概如此顏之推家訓凡為文章猶乘騏驥雖有逸氣當以御策制之勿使流亂軌躅放意填坑岸也文章當以理致為心腎氣調為筋骨事義為皮膚華麗為冠冕今世相承趍末棄本率多浮艷辭與理競辭勝而理伏事與才爭事繁而才損放逸者流宕而忘歸穿鑿者補綴而不足時俗如此安能獨違但務去泰甚耳同上沈隱侯曰文章當從三易易見事一也易識字二也易讀誦三也同上翬翟備色而翔翥百步肌豐而力沈也鷹隼無采而翰飛戾天骨徑而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿唯藻曜而高翔固文章之鳴鳳也文心雕龍章奏表議則準的乎典雅贊頌歌詩則羽儀乎清麗符檄書移則楷式於明斷史論序注則軌範於核要針銘碑誄則體制於弘深連珠七辭則從事於功艷此修體而成勢隨變而立功者雖復契會相參節文牙雜譬五色之錦各以本采為地矣同上文章沿學能在天才故才自內發學以外成有學飽而才餒才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此內外之殊分也文心雕龍戰國以降詞人屬文偽立主客假相酬答史通所謂文者非徒執卷於儒生之門攄筆於翰墨之采乃貴其造化之淵禮樂之盛也陸景典誥自梁室之季雕蟲道喪平頭上尾尤忌於時對語儷辭盛行於俗史通詩有韋孟諷諫賦有趙一嫉邪篇則賈誼過秦論則班彪王命張華述針於女史張載題銘於劍閣諸葛表主以出師王昶書家以戒子劉向谷永之上疏朝錯李固之對策荀伯子之彈文山巨源之啓事此皆言成軌則為世龜鑑史通趙牧效李長吉為短歌可謂蹙金結繡而無痕迹托言沈光有洞庭樂賦韋岫曰此賦乃一片宮商北夢瑣言集文病而後奇不奇不能駭俗陸龜蒙公之文蹴楊墨於不毛之地蹂釋老於無人之境皮日休請韓愈配享詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔李漢作韓文集序其所為文未嘗效前人之言而固與之並自正元末後進之士有志於古文者莫不視公以為法韓愈行狀茹古涵今無有端涯渾渾灝灝不可窺校及其酣放毫曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗密窈眇章妥句適精能之至入神出天韓文公墓志銘梁陳之間率不過嘲風雪詠花草白傳集文猶戰也一鼓作氣再而衰三而竭同上清愁素艷幽快古秀皆得芝蘭之芬芳鸞鳳之羽毛也皮日休雲煙綿聯不足為其態也水之迢迢不足為其情也春之盎盎不足為其格也風檣陳馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘隴不足為其恨怨悲愁也鰲吸鯨擲牛鬼蛇神不足為其虛茺誕幻也杜牧之燕公之文如楩木枝幹締構大廈上棟下宇孕育氣象可以變陰陽而閲寒暑坐天子而朝群后如應鐘鼖鼓笙簧錞磬崇牙樹羽考以宮縣可以奉神明享宗廟李北海之文如赤羽玄甲延亙平野如風如雲有貙有虎闐然鼓之誠可畏也賈常侍之文如高冠華簪曳裾鳴玉立於廊廟非法不言可以望為羽儀資以道義李員外之文如金輿玉輦雕龍彩鳳外雖丹青可掬內亦體骨不飢獨孤尚書之文如危峰絶壁穿倚霄漢長松怪石傾倒溪壑然而略無和暢雅德者避之楊崖州之文如長橋新構鐵騎夜渡雄震威厲動心駭耳然而鼓作多容君子所謹權文公之文如朱門大第氣勢宏敞廊廡廩廄戶牖悉周然而不能有新規勝概令人竦觀韓吏部之文如長江秋注千里一道衝飆激浪污流不滯然而施於灌溉或爽於用李襄陽之文如燕市夜鴻華亭曉鶴嘹唳亦足驚聽然而才力偕鮮瞥然高遠沈咨議之文則隼擊鷹揚滅沒空碧崇蘭繁榮曜光揚蕤雖迅舉秀擢而能沛艾艷景其他握珠幾奮組繡者不可一二而紀矣皇甫湜凡為文以意為主氣為輔以辭彩章句為之兵衛未有主強盛而輔不飄逸者兵衛不華赫而莊整者四者高下圓折步驟隨主所指如鳥隨鳳魚隨龍師衆隨湯武騰天湧泉橫裂天下無不如意苟意不先立止以文彩辭句繞前捧後是言愈多而理愈亂如入門闠紛紛然莫知其誰暮散而已是以意全勝者辭愈朴而文愈高意不勝者辭愈華而文愈鄙杜牧之自漢明帝後文體寖弱以至于魏晉宋齊梁陳隋嫣然華媚無復筋骨唐興猶襲隋故至天后朝陳伯玉始復古制當世高之雖慱雅典質猶未能全去其諧靡退乃大革流弊落落有老成之風而元賓則不古不今卓然一體激揚超越若絲竹中有金石聲每篇得意處如健馬在御蹀蹀不能止陸希聲作李元賓文集序文似相如而檢度過之李義山陳拾遺橫制頽波天下質文翕然一變李白集玉川子月蝕詩韓吏部進學解莫不拔地倚天句句欲活讀之如赤手捕長蛇不施控勒騎生馬急不得暇孫樵與王霖書自三代以來風騷之後驅馳屈宋鞭撻楊馬千載獨步唯公一人李陽冰作李白集逸歌長句駿發踔厲若穿天心出月脅意外驚人語非尋常所能及皇甫湜本朝李白落筆生雲煙千奇萬險不可攀歐公詩自唐以來言文章者惟韓柳柳豈韓之徒哉真韓門之罪人也世俗不知其所學第以當時流輩言之耳歐公集古目録詩人之優遊騷人之清深孟韓之溫淳遷固之雄剛孫吳之簡切投之所向無不如意老泉文孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉蚖鼉蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆餘委備往復百折而條達踈暢無所間斷氣盡語極急言竭論而容與簡易無艱難勞苦之態此三者皆斷然自為一家文也惟李翱之文其味黯然而長其光油然而幽俯仰揖遜有執事之態陸贄之文遣言措意切近的當有執事之實老泉上歐陽內翰書晉無文章惟陶淵明歸去來辭東坡志林引歐公文唐無文章惟韓愈送李願歸盤谷序東坡志林雖江山之勝莫適為主而奇麗秀絶之氣常為能文者用故吾以為西湖蓋公几案間一物耳東坡集諸葛孔明出師表簡而盡直而不肆大哉言乎與伊訓説命相為表裏非秦漢以下以事君為悅者所能至也東坡集詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療飢斷斷乎如藥石必可以伐病同上如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態橫生東坡集歐陽文忠公言文章如精金美玉市有定價非人所能以口舌貴賤也蘇東坡太史公行天下周覽名山大川與燕趙間豪傑交遊故其文踈蕩頗有奇氣此豈嘗執筆學為此文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也欒城上韓太尉書近世之文以襞積故實為有學以雕繪語句為清新譬之擷奇花之英積而玩之雖光華馨采鮮縟可愛求其根柢濟用則蔑如也臨川集侈能盡之約遠能見之近大能使之微小能使之著煩能不亂肆能不流其雄壯俊偉若決江河而下也其輝光明白若引星辰而上也曾南豐作老泉哀辭文章自唐之末日淪淺俗浸以大敝本朝柳仲塗始以古道發明之卒不能振天聖初尹師魯與穆伯長矯時所尚以古文為主次得歐陽永叔以雄詞鼓動之文風一變五朝言行録歐公之文粹如金玉東坡之文浩如河漢鳴道集三百年來文不振直從韓柳到孫丁詩話總龜山谷云西漢文章雄深雅健其氣長故也同上江左風流久已零落士大夫人品久不高故音韻絶滅東晉韻人勝士無出安石之右同上東坡云凡人做文字須是筆頭上挽得數百斤起歐公云興來筆力千鈞重同上文章有兩等山林草野之文其氣枯稿著書立言者之所尚也朝廷臺閣之文其氣溫潤演綸視草者之所尚也王安國曰文章調格須是官樣今樂藝亦有兩般教坊則婉媚風流外道則粗野嘲哳下則村歌社舞抑又甚矣亦與文章相類吳處厚青箱雜記古人文章自應律度未嘗以音韻為主自沈崇韻學論文則欲宮羽相變低昂殊節若前有浮聲則後須切響一篇之內音韻盡殊兩句之中輕重各異妙達此旨始可言文自後浮巧之語體制漸多如傍犯蹉對假對雙聲疊韻之類詩文有正格偏格三十四格十九圖四聲八病之類如徐陵云陪遊馺娑騁纖腰於結風長樂鴛鴦奏新聲於度曲又云厭長樂之踈鐘勞中宮之緩箭雖兩長樂意義不同此類為傍犯如九歌蕙殽蒸兮蘭藉莫桂酒兮椒漿當蒸蕙殽對莫桂酒今倒用之謂之蹉對如自朱耶之狼狽致赤子之流離又如廚人具雞黍稚子摘楊梅皆為假對如幾家村草裏吹唱隔江聞幾家村草吹唱隔江皆雙聲如月影侵簪冷江光逼履清皆疊韻詩第二字側入謂之正格如鳳曆軒轅紀龍飛四十春第二字平入謂之偏格如四更山吐月殘夜水明樓唐名賢詩多正格如杜甫律詩用偏格者十無一二沈括筆談文章自東漢以來氣象則巳卑矣分為三國又裂為南北天下大亂士氣不振而又雜以蠻夷輕淫靡嫚之風亂以羌胡悍魯鄙悖之氣至於唐而大壞矣雖人才衆多如正觀風俗平治如開元而惟文章之衰未有能振其弊者愈當正元中獨卻而揮之上窺典謨中包遷固下逮騷雅沛然有餘浩乎無窮是愈之才有見於聖賢之文而後如此其在夫子之門將追遊夏而及之而比之於漢以來齷齪之文人則不可張右史韓愈論或傳王荊公稱竹樓記勝歐陽公醉翁亭記或曰此非荊公之言也某以謂荊公出此言未失也荊公評文章常先體製而後工拙蓋觀蘇子瞻醉白堂記戲曰文辭雖極工然不是醉白堂記乃是韓白優劣論耳以此考之優竹樓記而劣醉翁亭記是荊公之言不疑也黃魯直與何靜翁書好作奇語自是文章一病要當以理為主理得而辭順文章自然出群觀杜子美到夔州後詩韓退之自潮州還朝後文章皆不煩繩削而合矣黃魯直答王觀復書陳履常作文深知古人之關鍵其論事救首救尾如常山之蛇黃魯直凡為文須讀司馬子長韓退之文每作一文皆有宗有趣終始關鍵有開有闔如四瀆雖納百川或匯而為廣澤汪洋千里要自發源注海耳罵大文雖奇不作可也東坡文章妙天下其短處在好罵切勿襲其軌也黃魯直答洪駒父書凡為文自作語最難老杜詩退之作文無一字無來處蓋後人讀書少故謂韓杜自作此語爾古之能為文章者真能陶冶萬物雖取古人之陳言入於翰墨如靈丹一粒點鐵成金也文章雖為儒者末事然既學之又不可不知其曲折至如推之使高如太山之崇崛如垂天之雲作之雄壯如滄江八月濤海運吞舟之魚又不可守繩墨使儉陋也同上余以古文為三等周為上七國次之漢為下周之文雅七國之文壯偉其失騁西漢之文華贍其失緩東漢而下無取焉陳後山詩話永叔謂為文有三多看多做多商量多也同上退之作記記其事爾今之記乃論也少遊謂醉翁記亦用賦體同上楊子雲之文好奇而卒不能奇也故思苦而詞難善為文者因事以出奇江河之行順下而已至於觸山赴谷風搏物激然後盡天下之變子雲唯好奇故不能奇也陳後山詩韓退之上尊號表曰析木天街星宿清潤北嶽醫閭神鬼受職曾子固賀赦表曰鉤陳太微星緯咸若崑崙渤澥濤波不驚世莫能輕重之也後山詩話國初士大夫例能四六然用散語與故事爾楊文公筆力豪贍體亦多變而不脫唐末五代之氣又喜用古語以切對為工乃進士賦體耳歐陽公始以文體為對屬文善敘事不用故事陳言而文益高次退之云同上凡為文寧拙無巧寧朴無華寧粗無弱寧僻無俗作詩亦然也陳後山詩話賈誼鵩賦源流自檀弓來步里客談歐文長於陳情如隴岡阡表甚勝同上吾嘗論唐人文章下韓退之為柳子厚下柳子厚為劉夢得下劉夢得為杜牧下杜牧為李翱皇甫湜最下者為元稹白居易蓋白以澄淡簡質為工而流入於鄙近譬如哇淫之歌雖足以快心便耳不可頓之韶濩翱湜優柔泛濫而詞不掩理杜牧清深徑峻而體乏步驟夢得俊逸麗縟而時窘邊幅子厚雄健飄肆有懸崖峭壁之勢不幸而不發於仁義而發於躁誕至退之後淳粹溫潤駸駸乎為六經之苗裔何則文章者天地之奇氣造物者常嗇於與人故愚者終身而不得智者得其幽微之思勇者得其果敢之氣雕者得其玲瓏之聲巧者得其藻繪之容是數者得而不能盡然猶足以取高於天下蓋必兼是數者之才而後得其純全中正之氣錦繡五藏雕鏤萬化明以寓物象之形容幽以露鬼神之奇怪小而歌詠乎蟲魚鳥獸之情大而羽翼乎禮樂刑政之具隨時抑揚為歌頌譏刺之音以舒發其歡愈愁嘆湮鬱之志而終始出入於仁義為禹稷之謨伊周之訓箕子之疇伏羲之易孔子之春秋而天地之蘊始盡矣李朴送徐行中序子厚文辭醇正雖不及退之至氣格雄絶亦退之所不及然子厚論著大抵非怨憤必刺毀辨論語下篇尤害道李朴書柳子厚集文章涉秦漢而病夫六經之於道譬猶一氣之運産出萬化孟軻楊雄為之五行四時之用蓋書道治亂興廢之迹故其辭顯春秋賞善辨惡歸諸正故其辭微易以四象告吉凶故其辭深而通禮以齋莊恭敬之心達於邊豆玉帛故其辭典而嚴詩以君臣父子之情詠於竹絃於絲故其辭婉而順下三代而道德之意不傳在戰國則蘇秦張儀以縱橫病韓非申商以刑名病莊周列禦寇又取仁義法度捶提絶滅之為窈窕荒怪之説漢司馬遷得其汪洋峻逸之氣以馳騁上下數千載而顛倒橫斜識不逮理歷晉魏齊梁而光鋩氣焰埋藏腐蝕頽波橫流淫靡一轍唐興三光五嶽之氣不分文風復起韓愈得其溫潤深淳以為貫道之器柳子厚得其豪健雄肆飄逸果決者僅足窺馬遷之藩鍵而類發於躁誕下至孫樵杜牧峻峰激流景出象外而窘裂邊幅李翱劉禹錫刮垢見奇清徑可愛而體乏雄渾皇甫湜白居易間淡簡質斫去雕篆而拙迹每見回宮轉角之音隨時間作類乏韶夏皆淫哇而不可聽李朴謁顧子敦侍郎書杜預製二碑一沈水中慮數百年後水為陵則碑出預但知陵谷有遷變而不知石亦有磨滅此一説也然深谷為陵則必實以土然後為陵谷既為陵則石亦埋沒豈復可見此又不達物理陳正敏撰遁齋間覽或曰莊子之辨雖當世宿學不能自解迂夫曰佞人也堯之所畏舜之所難孔子之所患是青蠅之變白黑者也子獨悅之乎或曰莊子之文人不能為也迂夫曰君子之學為道乎為文乎文勝而道不至者君子惡諸迂書東坡云李陵答蘇武書其詞猥淺乃齊梁間人擬作蕭統不之悟而劉子元獨知之據宋史江淹獄中上書云此少卿所以仰天捶心泣盡而繼之以血也正引陵書中語是又非齊梁間人所作明矣年世既遠真偽難辨如此者多如繫辭歐公尚疑非仲尼所作荊公以詩序非子夏之文禮記多漢儒所增五經如此況其餘哉宋咸以私意改周易正經數十處多見其不知量也陳正敏撰齋遁間覽盧照鄰弱冠拜鄧王府典籤王府書記一以委之王有書十二車鄰披覽略能記憶楊炯為文好以古人姓名連用如張平子之談略陸士衡之所記潘安仁宜其陋矣仲長統何足知之號為點鬼簿駱賓王好以數對如秦地重關一百二漢家離宮三十六時號算博士朝野僉載
