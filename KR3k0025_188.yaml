body:
  text: 道士附女道士史有道士西門君惠李守等云劉秀當為天子後光武紀論嵩山道士寇謙之修張道陵之術自言嘗遇老子降命謙之繼道陵為天師魏主起天師道場重壇五層給道士一百二十人衣食每月設廚會數千人通鑑宋營陽王紀客問三教優劣李謙曰道月也北史魏本傳上召天台道士司馬承禎問以陰陽數術睿宗紀睿宗崩以上女萬安公主為女官欲以追福通鑑唐元宗開元二年楊妃乞為女官號太真天寶三年上受三洞法籙於衡山道士劉玄靜唐武宗會昌六年唐主問道士王栖霞何道可致太平晉紀天福八年並同上傳記風局清古集異記集風餐委松柏雲臥恣天行選樂府升天行玄真高蹤萬古同德陳子昂喘息餐妙氣步虛吟真聲道與古先合心將元化并李太白集茹芝鍊玉學輕身元次山咽嗽元和津所思煙霞微杜張道士嵩南之有道者通古今學有文武長材寄迹老子法中為道士韓送張道七序院閉青霞入松高老鶴尋猶疑隱形坐敢起竊桃心尋劉尊師不遇洗粧拭面著冠帔白咽紅頰長眉青華山女詩真風道骨玄格高情冥鴻孤鶴不可云喻元微之見韓文送毛仙翁十八兄序注書出步虛三百韻蕊珠文字在人間元微之歲計芝田熟晨裝月帔寒李義山文葉潤靈津凝華霄極同上如未鑿七竅若都遺四肢白侍郎性靈間似鶴顏狀古如松道心精微真學奧祕為仙列上首與儒流爭衡並同上得崆㠓之道與汗漫之遊白帖藉草飯松屑焚香看道書王維集有道者其神則清雙眸朗暢四氣和平長江月影太華松聲同上古木無人地來尋羽客家道書堆玉案仙帔疊青霞鶴老難知歲松寒未作花山中不可見何處化丹砂劉長卿蘿月延虛步松花醉宴間同上道士無白髮語音靈泉清青松多壽色白石常夜明放步霽霞起振衣華風生孟東野松骨輕自飛鶴心高不群日下鶴過時人間空落影同上聞鍊師之名者足以激厲風俗睹煉師之容者足以脫落氛埃唐文粹玄標仙骨偕真蹈冥鍊影遊化遊心於千載之表騁思於九流之域水其心雲其身素琴在右黃庭在左徜徉高空軒裳鍾鼎於我如浮雲大位遐年在生為逆旅鶴骨松貌並同上白髮道心熟黃衣仙骨輕王建集道士寫將行氣法家童授與步虛詞同上泥竈煮靈液掃壇朝玉真張文昌餐空御日雲賈浪仙綵雲不散燒丹竈白鹿時藏種玉田錢起文君有出俗志不貪英雄名傲然脫冠帶改換人間情道士司馬退之詩不踐名利道始覺塵土腥同上樓觀本記曰周穆王因尹真人草樓之觀召逸人居之謂之道士平王東遷置七人漢明帝永平七年置三七人晉惠帝度四十九人審此則是自周而有也事物紀原本朝百尺松梢幾飛步鶴棲枝上禮虛皇詩話子吹詬呼吸吐故納新熊經鳥申為壽而巳矣莊史沐浴玄德稟仰太和班孟堅敘傳華他曰人體欲得勞動但不當使極耳動搖則穀氣得消血脈流通病不得生譬猶戶樞終不朽也古之仙者為導引之事熊經鴟顧引接要體動諸關節以求難老吾有一術名五禽之戲一曰虎二曰鹿三曰熊四曰猿五曰烏他別傳曰吳普從他學微得其力魏明帝呼之使為禽獸普以年老手足不能及粗以其法語諸醫今年將九十耳不聾目不冥牙齒完全飲食無損東漢本傳王真年百歲視之面有光澤似未五十者云周流登五嶽名山悉能行胎息之方嗽舌下泉咽之後漢本傳傳記食氣者常有少容五符經志若流水居若空城妙真經真人道士常吐納以和六液太上三元經斷穀茹芝茅君內傳集含天地之醇和吸日月之光采嵇康琴賦挹以玄玉之水嗽以華池之泉孫綽天台賦化心養精魄隱几窅天真李太白鍊冰雪之容延金石之壽納沆瀣之精率逍遙之性白帖緘縢六志扃鐍百骸吸新吐故以練藏專志積精以適志鄭君得自然虛白生心胸吸彼沆瀣精凝為冰雪容飲咽日月精茹嚼沆瀣芬栖山臥雲鍊氣絶食滋味不接於口塵埃不染於心齋心受籙服氣練形暑不流汗冬不挾纊膚體顏色冰清玉溫未識者望之疑神仙中人也並同上委氣榮衛和咽津顏色好元微之集萬過黃庭經一食青糧稻同上食柏鍊玉顏元稹集叩爾玄關保其真宅柳文齋心巳恬愈澡身自澄明沈沈簾幃下藹藹燈燭青四支動用息一室虛白生收視忘趣捨叩齒集神靈伊子嗜欲寡居常痾恙輕三尸既伏竄九藏乃和平無令耳目勝則使性命傾窅然深夜中若與元氣并李義山文精神如太陽霍然照清都四支為琅玕五藏為璠璵顏如芙蓉頂為醍醐與天地相終始浩漫為娛下顧人間溷糞蠅蛆皇甫湜修行近日形如鶴道引多時骨似綿王建集骨換肌膚膩心靈氣色真姚少監講論參同深到底停騰姹女立成銀方雄飛不味稻粱食始覺神骨清道士司馬退之詩本朝服餌既久毛骨清丹顏益少方瞳明歐公集緑髮方瞳瘦骨輕歐公集稿死三彭仇澡換五骨腸清骨凝緑髓丹田發幽光坡詩丹鼎一丸深自祕紫芝三葉卻先知欒城子夫道在太極之先而不為高在太極之下而不為深先天地生而不為久長於上古而不為老狶韋氏得之以挈天地伏羲得之以襲氣母維斗得之終古不忒日月得之終古不息堪壞得之以襲崑崙馮夷得之以遊大川肩吾得之以處太山黃帝得之以登雲天顓頊得之以處玄宮禺強得之以立乎北極西王母得之坐乎少廣莫知其終彭祖得之上及有虞下及五伯傳説得之以相武丁奄有天下乘東維騎箕尾而比於列星莊子大宗師偃其聰明而抱其太素淮南子俶真訓體本抱神以遊于天地之樊淮南子精神訓史履操夷簡德業沖粹屏棄塵雜栖志虛玄吐故納新食芝餌朮念衆妙於三清之表返華髮於百靈之外道邁前烈聲高自古舊唐書道士知遠傳集步八閎而為宇節四運之常氣魏文帝大暑賦貫元虛於太素薄紫微而竦戾陸機賦澄神元漠流栖心太素域同上頤神太素逍遙方外阮籍詩恣語樂以終日等寂寞於不言孫綽天台賦道風秀世任彥升表夜後不聞龜喘息秋來惟長鶴精神白樂天贈王山人詩身輕得道羽化升天白帖鶴骨松貌泉停谷虛寓形人間天地無纍與扶桑公陶隱居遙為師友矣唐蔣防文子合金丹之大藥鍊八石之氣英尤忌凡俗聞見則仙物不成抱朴子丹砂服之令人飛行長生九丹仙藥之上同上史寡婦清得丹穴而擅其利史記葛洪聞交趾出丹求為勾漏令晉書陶洪景既得神符祕訣以為神丹可成而告無藥物帝賜黃金朱砂雌黃等後合飛丹色如霜雪服之體輕梁書高宗時道士劉合還丹丹成而上之咸亨中卒唯有空皮而背上開拆有似蟬蛻唐書山人柳泌能合長生藥詔泌居興唐觀煉藥通鑑唐憲宗紀傳記成王時濮人獻丹砂周書仙藥之上者丹砂孝經援神契羿請不死之藥於西王母妻嫦娥竊以奔月託身於月是為蟾蜍張衡靈憲丹砂木精得金乃并參同契魏伯陽撰參同契以周易爻象論作丹之意三洞珠囊丹砂朱之朴廣志服之一月三蟲出太上元變經丹砂外包八石內含金精先稟氣於甲受氣於丙出胎見壬結魄成庚太清煉靈丹經丹砂服火化為黃銀能輕能神能黑能白能暗能明一斛人擎力難勝舉萬斤遇火輕速上騰鬼神尋求莫知所在青霞子論馬明生服丹半劑為地仙展轉百餘年乃白日升天也神仙傳魏伯陽與弟子三人作丹丹成與犬犬死弟子曰先王可服之而死二人下山求葬具伯陽即起再以丹納犬及弟子口中皆起仙去葛洪神仙傳變凡為仙丹之力也太平廣記身生羽翼飛行輕舉莫不皆因服丹孫思邈太清丹經要訣五靈三使之藥九光七曜之丹神仙大丹異名三十四種出世十三種非世所用二十種同上集夫交梨火棗者是飛騰之藥也君侯若能剪除荊棘絶去人我泯是非則二樹生君心中矣亦能開花結實葉茂枝繁食之一枚則景光萬里許遠遊與王逸少書守丹竈而不顧煉金鼎而方堅選別賦方士煉玉液雜體詩安期鍊五石遊山詩同上遠慚勾漏令不得問丹砂杜家事丹砂訣同上金丹別後知傳得乞取刀圭救病身韓文淮南王仙去雞犬舐藥器以升仙白帖將延金石之壽以煉冰雪之膚吸而蟬蛻吞則翼生與我一丸藥光輝有五色服之四五日身輕生羽翼同上載古詩應得丹霜餌春來黑髮新王建長生只要一丸丹同上金丹駐少年姚合洞裏丹砂日採還同上史墨敕以鄭普思為祕書監葉靜能為國子祭酒通鑑唐中宗紀傳記史宗玄附太平公主授鴻臚卿朝野僉載唐高宗時葉靜能入直翰林為國子祭酒事物紀原唐元宗時葉法善授銀青光祿大夫鴻臚卿尹愔拜諫議大夫同上史公孫卿言仙人好樓居上作蜚廉桂館益壽延壽館通鑑漢武魏主起天師道場寇謙之重壇五層同上宋營陽王詔山人柳泌居興唐觀煉藥唐憲宗紀傳記列真之宇白帖列仙遊館同上周穆王尚神仙召尹軌杜仲居終南山尹真人草樓所因號樓觀蓋道觀之初也隋煬帝改為玄壇後復曰觀事物紀原集精廬陳伯玉集碁聲花院閉幡影石壇高司空圖詩傳記後周武帝時衛元嵩封蜀郡公事物紀原唐元宗時葉法善封越國公事物紀原唐中宗神龍初加葉靜能金紫之階未頒紫衣事物紀原朝野僉載曰史崇玄附太平公主衣紫羅裙帔唐代宗時李泌乞為道士賜紫衣道士賜紫自李泌始並同上後漢張道陵有天師之稱梁陶洪景死賜諡正白先生元魏世祖賜寇謙之天師之號唐王知遠贈升玄先生事物紀原唐玄宗賜李含光曰玄靜先生並事物紀原子左慈以氣禁水水為逆流一二丈禁水著中庭露之大寒不冰抱朴子史王喬有神術為葉縣令每月晦望自縣詣臺朝帝怪其以誑幻人又河南有麴聖卿善為丹青符劾厭殺鬼神而使命之又有編盲意亦與鬼神交通解奴辜傳孟節能含棗核不食可至五年十年又能結氣不息身不動搖狀若死人可至百日半年王真傳張揩性好道術能作五里霧本傳並東漢吳猛因還豫章江波甚急猛不假舟楫以白羽扇畫水而度觀者異之晉書本傳順陽樊長賓為建昌令發百姓作官船於建城山中吏令人各作箸一雙幸靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃愈甚靈曰爾若不以情告我今真死矣竊者甚遽乃自首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此巳過足但部分未至耳靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神本傳僧涉者西域人得魚恨無蜀中生薑耳元放曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過勑使者增市三端語頃即得薑還併獲操使報命後操使蜀反驗問增錦之數及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為齎酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸壚悉亡其酒脯矣操懷不喜因收欲殺之慈郤入壁中霍然不知所在或見於市而市人皆變形與慈同莫知誰是後人逢慈因復逐之走入羊群操知不可得乃令就復相殺本試君術耳忽有一老羝屈前遽如許即競往赴之而群羊數百皆變為立云遽如許遂莫知所取焉本傳解奴辜張貂者亦不知其何郡國人也皆能隱淪出入不由門戶奴辜能變易物形來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候至舉羅張之但得一隻舄焉乃詔尚方診視則四年中所賜尚書官屬履也當朝時葉門下鼓不擊自鳴聞於京師東漢王喬傳道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱入尺許以氣吹之便可躍出射去如弩箭之發異苑云趙候以盆盛水吹氣作禁魚龍立見越方善禁咒也東漢徐登傳注事出抱朴子左慈字元放廬江人也少有神通嘗在司空曹操坐操從容顧衆賓曰今日高會珍羞略備所少吳松江鱸魚耳元放於下座應曰此可得也因求銅盤貯水以竹竿餌釣於盤中須臾引一鱸魚出操拊掌笑會者皆驚操曰一魚不周坐席可更得乎元放乃更餌釣沈之須臾復引出長二尺餘生鮮可愛操使自前鱠之周浹會者操又謂曰既已也不知何姓少為沙門苻堅時入長安虛靜服氣不食五榖日能行五百里言未然之事驗若指掌能以祕咒下神龍每旱堅使之咒龍請雨俄而龍下鉢中天輒大雨堅與群臣親就鉢中觀之卒于長安本傳沙門曇霍者或遺以衣服受而投之於河後皆以還其本主衣無所污行步如風雲本傳並晉書傳記費長房遇壺公有神術能縮地脈千里聚在目前放之如舊葛洪神仙傳後漢欒巴漢帝召為尚書正朝大會巴獨後到頗有醉色不飲而以酒望西南噀之有司奏巴大不敬詔問巴巴對曰臣鄉里以臣能治鬼護病為立廟今旦耆老皆入廟致饗是以來遲臣本縣成都失火臣噀酒為雨以滅火災詔原罪即遣使往驗其言答云正旦失火食時有大雨從東北來乃息雨皆酒氣後一旦大風天霧暗失巴所在尋問之其日還成都與親戚別去而升天矣左慈拔簪以畫杯酒即中斷分為兩向左慈明六甲能役鬼神坐致行廚劉政有道術能以一人作千人千人作萬人又能噓水興雲聚壤成山剌地成淵並同上仙翁為客設酒不令人傳之見杯自至人前若不盡者則杯不去葛仙翁傳琴彈碧玉調藥煉白朱砂解釀頃刻酒能開非時花續仙傳劉綱有道術能檄召鬼神禁制變化之事嘗與妻樊夫人較其術俱坐堂上綱作火燒碓屋從東起夫人禁之火即滅庭中兩株桃夫妻各咒一株使相鬭擊良久綱所咒者不如數走出籬外綱唾盤中即成鯉魚夫人唾盤中成獺食魚綱與夫人入四明山路阻虎綱禁虎伏不敢動適欲往虎即喊之夫人徑前虎即面向地不敢仰視夫人以繩繫虎牽歸繫於床腳下將升天綱仕上虞令縣廳側先有大皂莢樹綱升樹數丈方能飛舉夫人平坐冉冉如雲氣之升同升天而去女仙録集吞刀弄火易貌分形選西京賦劉根丹篆二千字郭璞青囊兩卷書杜牧之長繩繫白日大藥駐朱顏唐文粹宋毋忌王伯僑充尚羡門韋昭曰皆效古人各效神仙者子高最後皆燕人為方仙道形解銷化服虔曰尸解也張晏曰人老如解去故骨則變化也今山中有龍骨世人謂之龍解骨化為之史記封禪書葛洪卒年八十一視其顏色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解晉書本傳唐高宗時道士劉合還丹成而上之咸亨中卒唯有空皮而背上開坼有如蟬蛻唐書互見煉丹傳記費長房隱變解化神仙傳分形散影集仙録道中有尸解劍解水解火解實繁有徒嵇康郭璞非受戕害者以此委蛻廣異記形如生人者尸解也足不青皮不皺者尸解也目光不落無異生人者尸解也髮盡落而失形骨者尸解也有死而更生者有未斂而失其尸者有衣存而形去者有髮脫而形飛者皆尸解也白日解者為上夜半解者為下向曉向暮去者為地下主者此皆得道之差降也集仙録南海太守鮑靚通靈士也東海徐寧師之寧夜聞靜室有琴聲怪其妙而問焉靚曰嵇叔夜寧曰嵇臨命東市何得在茲靚曰叔夜雖示終而實尸解顧愷之嵇康贊集解形而遺世乘白雲而上賓陳子昂集白日尸解得為飛仙寶劍上經尸解本真人之鍊蛻也五屬之隱適也同上
