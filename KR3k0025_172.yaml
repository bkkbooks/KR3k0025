body:
  text: 間適經逮我暇矣飲此湑矣詩伐木爰居爰處爰笑爰語詩斯干飯蔬食飲水曲肱而枕之樂亦在其中矣論語述而浴乎沂風乎舞雩詠而歸語先進子解衣盤礴莊子山本篇居不知所為行不知所之含哺而熙鼓腹而遊莊子馬蹄篇就藪澤處間曠釣魚間處無為而巳矣此江海之士避世之人間暇者之所好也莊子刻意史弭節容與西漢司馬相如傳間居可以養志詩書足以自娛東漢梁竦傳謝萬著白綸巾鶴氅裘談宴終日晉書夏月虛間高臥北窗之下清風颯至自謂羲皇上人晉書陶潛傳陶潛既絶州郡覲謁乘藍輿令一門生二兒共舁之言笑賞識不覺有羡於華軒同上嵇康所與神交者惟阮籍山濤預其流者向秀劉伶阮咸王戎遂為竹林之遊世謂竹林七賢晉本傳世説云七人常集於竹林之下肆意酣暢徐勉曰冬日之陽夏日之陰良辰美景負杖躡履逍遙陋館臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終南史本傳孔稚圭門庭之內草萊不剪中有蛙鳴或問之曰我以此當兩部鼓吹南史本傳一壺之酒足以養性一簞之食足以怡形南史前園後圃從容丘壑之情左琴右書蕭散煙霞之境隋書白居易致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自號香山居士唐書本傳裴度治第石林幽勝煥館涼臺號緑野堂唐書本傳李適之罷知政事守太子少保命親故歡會賦詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾個來舊唐書本傳集聊假日兮相徉楚辭集聊暇日兮銷憂王仲宣賦退而間居于洛之涘潘安仁間居賦修日朗月攜手逍遙潘安仁贈陸士衡解帶臨清風文選沈休文詩引壺觴以自酌盻庭柯以怡顏倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關策扶老以流憩時矯首而遐觀悅親戚之情話樂琴書以消憂懷良辰以孤往或植杖而耘耔登東皋以舒嘯臨清流而賦詩陶淵明歸去來辭間居三十載遂與塵事冥陶淵明弄春風於澗戶詠秋月於山扃王無功披書坐落花王無功優遊園沼放蕩形骸姚崇遺令松菊無時賞孟浩然歸間日無事雲臥晝不起孟浩然把酒話桑麻同上居間好芝木孟浩然山水尋吳越風塵厭洛京枕藉琴書滿誰家無風月此地有琴樽日睹田園趣自謂羲皇人並孟浩然吟風詠月席地幕天李太白杖藜從白首心迹喜雙清腹中書籍幽時曬肘後醫方靜處看並杜甫詩既無衣食牽亦少人事拘人間有間地何必隱林丘陶然遺萬纍常時簪組纍此日和身忘身適忘四肢心適忘是非心足即為富身間乃當貴間心對定水清淨兩無塵人生苟有纍食肉常如飢我心既無苦飲水亦可肥臥簟蘄竹冷風襟邛葛踈取興或寄酒放情不過詩海內無如此地間今日北窗下自問何所為欣然得三友三友者為誰琴罷輒舉酒酒罷輒吟詩三友相引循環無巳時無事日月長不羈天地闊筋力不將諸處用登山臨水詠詩行元晏家風黃綺身深居高臥養精神性慵無病常稱病心足雖貧不道貧朝隨浮雲出夕與飛鳥還天供間日月人借好園林始知天造空間景不為忙人富貴人人間自在天一日安間直萬金優遊福祿更難消輕紗一幅巾小簟六尺床無客盡日靜有風終夜涼以山水風月歌詩風吟樂其志白侍郎醉吟先生墓志銘已上並白侍郎詩集平明閭巷掃花開薄暮漁樵乘水入王維集花時金谷飲月夜竹林眠王維集口不言功心自適吟詩釀酒待花開劉賓客永日屬間人同上間人占間景入門松菊間並劉賓客斸嵩開雲扃壓穎抗風榭韓氏文何人有酒身無事誰家多竹門可款斷送一生唯有酒尋思百計不如間莫憂世事兼身事須著人間比夢間窮居而野處升高而望遠坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適所安古之老於鄉者將身佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也已上並韓文沈浮閭巷間不以事自纍韓文薛公墓志酒食罷無為棊槊以相娛韓愈示兒詩自笑無名字因名自在天元微之乘興無羈束間行信馬蹄元微之衣裳無復帝京塵元微之扁舟從此去鷗鳥自為群張九齡歸去田園老儻來軒冕輕張九齡把鋤荷臿決溪泉以給茹行歌坐釣望青天白雲以此為適亦足老死無戚戚者柳文左絃右壺樂以自放柳文西山爽氣在我襟袖柳文南州溽暑醉如酒隱機熟臥開北牖日午獨覺無餘聲山童隔竹敲茶臼柳詩日高文五睡正濃盧同茶詩稍覺天籟清自傷人世促權載之待月出深竹合歡忘印綬之輕重陳詩無章句之約束放言無擇造適則笑行觴無算既醉而罷虧成彼是曾不棲於念慮之中而惠風間雲引川左右動用視聽無非大方心靈曠而體胖泊然與白雲鷗鳥同其無事權載之想夫草堂環合喬松千餘本交柯翳景吟泫風露幅巾長謠偃放其間一氣不耗四肢交暢清時外臣其樂如何同上結廬江南退然食力奉詩書杖屨為膝下歡蓬蒿晏如不改其度每遇一勝境得一佳句則怡然獨笑如獲貴仕豐祿並權載之官間人事少年長道情多張文昌無事焚香坐有時尋竹行畫苔藤杖細踏石筍鞋輕張文昌從來間坐慣漸覺出門稀有地唯栽竹無池不養鵝詩裏難同相得伴酒邊多見自由身同上晚攜碁局對松陰許用晦文林間掃石安碁局巖下分泉酒杯同上但得身間日月長泉繞松根助茗香竹裏碁聲夜雨寒茂林久病書千卷彭澤初歸酒一瓢有藥身長健無機性自間並許用晦文樽酒且循環移竹疏泉常岸幘流鶯日日啼花間能使萬家春意間並韋應物平生江海意惟共白鷗同劉長卿阮籍推名飲清風滿竹林劉義文間中方寸闊於天杜荀鶴窗間風引煮茶煙棊添局上聲間敲巖果呼猿接時釣溪魚引鶴爭杜荀鶴暫對杉松如結社偶同麋鹿自成群溫飛卿劉琨坐嘯風清塞謝眺題詩月滿樓松軒塵外客高枕自瀟踈採茶溪樹緑煮藥石泉清溫飛卿六經與一琴姚少監摘花尋酒春愁盡燒竹煎茶夜臥遲留僧竹裏棊姚少監時過無心求富貴身間不夢見公卿姚少監戀花林下飲愛草野中眠姚少監日隨棊客靜心共睡僧間韓渥憂隨落花散目送歸雲飛儲光羲看山愜野情李嘉祐暑天移榻就深竹月夜乘舟歸淺山方雄飛誰識浮雲意悠悠天地間方雄飛直為援毫方掩卷常因按曲便開樽方雄飛倚松長嘯宜踈拙拂石欹眠絶是非方雄飛世間書讀盡雲外客來稀鄭守愚睡輕可忍風敲竹飲散那堪月在花同上醉眠風捲簟茶罷月移瑎張承吉清時有味是無能間愛孤雲靜愛僧杜牧之草色人心相與間是非名利有無間杜牧之醉頭扶不起三丈日還高同上踏苔行引興枕石臥論文賈浪仙北海樽中常有酒東陽樓上豈無詩羅隱如今嬴得將衰老間看人間得意人同上虛室生白玄門不關流水去住清風往還唐文粹清風朗月不用一錢買唐文粹本朝花能嫣然顧我笑鳥勸我飲非無情身間酒美惜光景唯恐鳥散花飄零歐公詩身間始覺韶光好同上人意乘間味愈長歐公詩脫遺軒冕就安間笑傲丘園縱倒冠同上玉塵清談消永日美酒清香消晝景飲酒橫琴消永日解組便為間處士輕簑短笠伴春鋤並歐涼竹簟之暑風曝茅簷之冬日睡餘支枕念昔平生仕官出處歐公集清風之館覽秀追涼坐竹林之修蔭泛水芰之清香歐公集無窮興味間中得強半光陰醉裏消靜愛竹時來野寺獨尋春偶過溪橋歐公集王子猷之噯竹造門不問於主人陶淵明之臥輿遇酒便留於道士歐公互見不拘形迹至歡然而會意亦旁若於無人乃知偶來常勝於特來前言可信所有雖非於巳有其得巳多歐公集互入遊賞翁歡不待絲與竹把酒終日聽泉聲有時醉倒枕溪石青山白雲為枕屏花間百鳥喚不覺日落山風吹自醒歐公集水竹煙花興有餘詩史張齊賢詩藜杖牧雞豚筠筒釣魴鯉臨川集壺觴自笑傲裙屣相追逐談笑明月相與間臨川集間貌老難增蕭然一世外所樂有誰同枕簟不移隨處有飽飧甘寢更無求間眠盡日無人到自有春風為掃門攀花弄草興常新春風似我間臨溪放杖依山坐溪竹山花共我間身間處處堪行樂並臨川集能將屐齒記苔痕聊行弄芳草獨坐隱圓蒲問客茅簷日君家有此無已上並臨川集曾借僧窗半日間東坡詩食罷茶甌未要深清風一榻抵千金腹搖鼻息庭花落還盡平生未足心處士風流水石間樽酒樂餘春局碁消長夏春風無事秋日間日長唯有睡相宜半脫紗巾落紈扇先生食飽無一事散步逍遙自捫腹不問人家與僧舍拄杖敲門看修竹三杯軟飽後一枕黑甜餘已上並蘇東坡詩惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭是造物者之無盡藏蘇東坡前赤壁賦吾嘗中夜而起挈瓶而東有落月之相隨無一人之我同汲者未動夜氣方歸鏘瓊珮之落谷灩玉池之生肥東坡集北牖巳安陶令榻西風還避庾公塵東坡詩南廊清遊繼顏謝北囪高臥等羲黃東坡詩但看花開謝不言人是非邵堯夫靜處乾坤大間中日月長間為水竹雲山主靜得風花雪月權邵堯夫醉吟終日不知老經史滿堂誰道貧長掩柴荊閉寒暑只將花卉記冬春溫公和邵堯夫安樂窩詩邵堯夫居洛四十年安貧樂道自云未嘗攢眉所居寢息處為安樂窩呂氏家孰頽然付一榻是處得清涼欒城集雖無事業傳千古卻得安間過一生程松詩佳眠未知曉屋角聞聲哢山谷詩西湖十頃月自比漢封君松風自度曲我琴不須彈春蛙秋蠅不到耳夏涼冬暖總宜人山谷詩問舍求田真得計臨流據石有餘清陳後山詩不聞人聲但聞落子百斛明珠經多歷年所書君奭篇豈不爾思遠莫致之詩竹竿誰謂河廣一葦杭之詩河廣道之云遠曷云能來詩雄雉其室則迹其人甚遠詩東門之墠道阻且長詩兼葭史間者闊焉久不聞問西漢嚴助傳集道里遼遠山川阻深文選司馬長卿檄風波一失所各在天一隅李陵詩各在天一方李陵詩邈若胡與秦李陵與蘇武詩山川阻且遠別促會日長曹子建送應氏詩形影曠不接所托聲與音音聲日夜闊何用慰吾心陸士衡形影參商垂音息曠不達士衡贈顧彥先清卮阻獻酬良書限聞見謝玄暉登孫權城美人邁兮音塵闕隔千里兮共明月謝莊月賦殊隔過參商正長雜詩無路從容陪笑語一別星橋夜三移斗柄春渭北春天樹江東日暮雲常恨結歡淺各在天一涯並杜甫詩千山道路阻萬里音塵闊元微之尚阻青天霧空瞻白王塵山水萬重書斷絶一葦礙車輪音徽千里斷魂夢兩清偏並元微之地遠心難達劉長卿一水阻佳期相望空脈脈劉長卿自憐豈是風引舟如何漸與蓬山遠李文饒垂隔多年不獲數附書狀慕仰風味未嘗敢忘韓文答汽州李方古使君書接袂杳無由唐文粹雲山間之造謁無路唐文粹本朝地理江山隔天文日月同歐公詩辭闊義風臨川集故人各在天一涯相望落落如晨星東坡詩不見便同千里遠東坡詩隔巷如千里後山詩盈盈一水不斯須經歲相過自作踈陳後山
