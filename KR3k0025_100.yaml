body:
  text: 區處失當經絺兮綌兮凄其以風詩緑衣注絺綌所以當暑今以待寒喻其失所也糾糾葛屨可以履霜詩大東子以戈舂黍以錐飧壺荀勸學田鳩曰昔者秦伯嫁女於晉公子為之飾裝媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣未可謂善嫁女也韓非子互入末能勝本載鼷以車馬樂鷃以鐘鼓也莊達生使虻負山莊是猶貫甲胄而入宗廟被羅紈而從軍旅淮南子主術訓史子産謂子皮曰子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎襄三十年賈誼曰釋斧斤之用而欲嬰以芒刃臣以為不缺則折本傳劉陶曰猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生用之不時必至焦爛通監東漢國輔大臣未褒而昌邑小輩先遷通監漢宣紀是猶種枳棘於良田養虺蛇於室內也東漢段頴傳餓狼守庖廚飢虎牧牢豚後漢仲長統理亂篇慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎傳翼也丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變今遠之於外不猶愈乎通監晉武紀此無異解衣包火張羅捕虎通監晉恭紀沈慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟通監宋文帝上每命將出師常授以成律交戰日時亦待中詔是以將帥趑趄莫敢自決通監宋文帝建成夜召世民飲酒而鴆之世民暴心痛吐血數升上幸西宮問世民疾曰首建大謀削平海內皆汝之功吾欲立汝為嗣汝固辭且建成年長為嗣日久吾不忍奪也觀汝兄弟似不相容同處京邑必有紛競當遣汝還行臺居洛陽自陝以東皆主之仍命汝建天子旌旗如漢梁孝王故事通監唐高祖可謂薦圭璧於房闥以脂澤汙漫之也唐書陳子昂傳陸贄上奏其略曰太宗列置府兵分隸禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣承平漸久武備寖微雖府衛具存而卒乘罕習故祿山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴西邊有兵諸牧有馬每州有糧故肅宗得以中興乾元之後繼有外虞悉師東討邊備既弛禁戎亦空吐蕃乘空深入為寇是皆失居重馭輕之權志深根固蒂之慮通監唐紀決江海以救焚焚收而溺至引鴆爵以止渴渴止而身亡新唐書如寄珠於盜跖之門畜水於尾閭之上唐書昭宗贊傳記以狐白補犬羊説苑貴德篇孫興公曰如著弊絮在荊棘中觸地挂閡世説使武士宰民如使狼牧羊使鷹養雛也物理論集騏驥于中庭兮焉能及夫遠道致猿狖於櫺檻兮夫何以責其捷巧楚辭互入處非其地為鳳皇而作鶉籠兮雖翕翅其不容同上互入不具眼目任小能於大事猶狸搏虎而刀伐木也屈長才於短用猶驥搏鼠而斧剪毛也白居易策秀才審官互入大才小用小才大用百鍊之金而不鑄干將十圍之木而不作棟梁白樂天集沈玉在弱泥泥弱玉易沈元稹集有木有木碩大而長破為桷杙不作棟梁有驥有驥規行矩步辱在短轅不駕太輅唐文粹本朝繡繪錦縠衣服之窮美者也尺寸而割之錯而紉之以為服則綈繒之不若老泉文昔漢武嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰東坡文經三揖而進一辭而退記表記其行本方立義同而進不同而退記孺行子進以禮退以義孟治則進亂則退同上君子以禮動以義止合則進否則退楊問明史義則進否則奉身而退左襄二十六年經羝羊觸藩羸其角不能退不能遂周易大壯卦注云持疑志無所定進退維谷詩桑柔匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵詩狼跋其胡載疐其尾注進則躐其胡退則跲其尾進退有難詩狼跋子壽陵餘子之學行於邯鄲未得其能又失其故行矣直匍匐而歸耳莊秋水注以此效彼兩失之史進退不可周旋不能左傳僖公十五年進退罪也左昭三年昔有學步邯鄲者曾未得其髣佛又復失其故步遂匍匐而歸前漢欲儃佪低佪也以干求也傺往也兮恐重患而離尤欲高飛而遠集兮君罔無也謂汝何之楚辭跋前疐後動輒得咎韓文進學解經拜下禮也今拜乎上泰也雖違衆吾從下語子罕衆惡之必察焉衆好之必察焉語衛靈公子流言止於智者荀天不為人之惡寒也而輟冬地不為人之惡遠也而輟廣荀天道良農不為水旱不耕同上史君之仇讎我之昏姻也左成十三年執此之政堅如金石西漢賈誼傳莊助言汲黯於武帝曰招之不來麾之不去通監西漢孤立群邪之間前漢鄭崇曰臣門如市臣心如水前漢本傳戰國儒術既絀然齊魯之間學者獨不廢史記儒林傳班稚獨不上嘉瑞及歌謠通監漢平紀朝廷爭為嚴切以避誅責唯鍾離意獨敢諫爭數封還詔書臣下過失輒救解之通監漢明紀岑晊之亡也親友競匿之賈彪獨閉門不納時人望之彪曰傳言相時而動無纍後人公孝要君致釁自遺其咎吾已不能奮戈相待反可容隱之乎於是咸服其裁正通監漢柏紀詔書下舉鉤黨郡國所奏相連唯平原相史弼獨無所上曰他郡自有平原自無胡可相比通監漢靈紀王衍妻試衍以錢繞床使不得行衍曰舉阿堵物卻晉書殷仲文還姑熟祖送傾朝桓謙要王弘之同行答曰凡祖離送別必在有情與殷風馬不接無緣陪從沈約宋書互入不苟合崔浩性不好莊老之書每讀數十行輒棄之曰此矯誣之説不近人情必非老子所作老聃習禮仲尼所師豈設敗法之言以亂先王之教袁生所謂家人筐篋中物不可揚於王庭魏史崔浩傳太宗謂尉遲敬德曰公心如山嶽雖積金至斗知公不移通監唐高祖紀互入有守上曰人言魏徵舉止疏慢我視之更覺嫵媚通監唐太宗時法官競為深刻唯司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生通監唐武后韋況不為聲利所遷唐書傳記庾子嵩謂王渾曰我自用我家法卿自用卿家法世説當風鼓箑向日燃爐而天終不為夏冬易氣論衡集舉世皆濁我獨清衆人皆醉我獨醒楚辭安能以身之察察受物之汶汶者乎又安能以皎皎之白而蒙世俗之塵埃乎同上互入高舉遠覽雖飾以金鑣享以嘉殽逾思長林而志在豐草也嵇叔夜書風雨急而不輟其音雪霜零而不渝其色劉孝標絶交書如聞風過塵不動井中水陳子昂集處腴能不潤居劇體常間孟浩然生長紈綺內辛勤筆舌間劉長卿侶彼白蓮花在水不著水白侍郎雖居世網常清淨韋應物主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽劉賓客守法持正嶷如秋山市井生而雲鶴性並同上玉立孤潔無緇磷遷染之譏唐文粹不為物遷不為波流同上惟憐一泒溫泉水不逐人心冷暖移唐杜正倫詩本朝士之進顯於榮祿者莫不欲安享於豐腴公為輔弼飲食起居如陋巷之士環堵之儒他人不堪公處愈愈歐公集祭杜祁公文百人譽之不加密百人毀之不加疏老泉文世人共棄君獨厚東坡詩身為玉雪不汙青蠅東坡祭黃幾道文納之煩劇而不亂涅於渾濁而不緇欒城集終守金石之姿不為燥濕所變同上白蓮生淤泥清濁不相干欒城集經惟民生厚因物有遷書君陳人生而靜天之性也感於物而動性之欲也記樂記夫民有血氣心知之性無哀樂喜怒之常應感起物而動然後心術形焉同上身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正記大學子從物如流不知所執家語今使人生而未嘗睹芻豢稻粱也惟菽藿糟粳之為睹則以至足為在此也俄而粲然有秉芻豢稻粱而至者則瞲然視之曰此何怪也彼臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不取此而棄彼矣莊天運罔兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶莊史郤超王珣為桓大司馬主簿記室人為之歌曰髯參軍短主簿能令公喜能令公怒世説傳記貧賤則懾於飢寒富貴則流於逸樂魏文典論皎皎練絲得藍則青得丹則赤得蘗則黃得泥則黑楚辭偭音面規矩而改錯背繩墨以追曲楚辭蘭芷變而不芳兮芝一作荃蕙化而為茅何昔日之芳草兮今直為蕭艾也楚辭情因所習而遷移物觸所遇而興感故振轡於朝市則充詘之心生間步於林野則遼落之志興晉孫綽蘭亭序已悲素質隨時染杜詩小人趍時必變顏色棄瘠涵腴乃蝨之賊陸龜蒙布鼓隨椎響坯泥仰匠圓元微之集無異盧狗之遇嗾呀呀而走不顧險阻唯嗾者之從何無已之心也柳文一日看除目終年損道心姚少監本朝衣冠所以為容也稱禮斯美矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎涑水迂書一逢蘭蕙質稍回鐵石心東坡詩丈夫剛鐵腸因花反柔弱翰府名談經不義而富且貴於我如浮雲語述而見利思義語憲問義然後取人不厭其取同上子非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也孟萬章上先義而後利者榮荀從士以上皆羞利而不與民爭業荀大略義之所在不傾其權不顧其利舉國而與之不為改視重死持義而不撓荀榮辱道義重則輕王公矣荀修身不為利遷莊為義者不可劫以兵不可縣以利文子士有一飧而倒戟義所驅也莊史吳伐楚入郢申包胥乞師於秦以救楚楚子入于郢當申包胥申包胥曰吾為君也非為身也遂逃賞左定五年末世爭利維彼奔義讓國餓死天下稱之史太史公作伯夷傳序趙平原君以千金為魯連壽連笑曰所貴於天下之士者為人排患攘難解紛亂而無取也即有取者是商賈之事連不忍為也史魯仲記連傳魯連飛一矢而蹶千金虞卿以顧盼而捐相印西漢班固一矢事見史記魯仲連傳相印事見史記虞卿傳集君於為義若嗜欲勇不顧前後於利與祿則畏避退處如怯夫然韓文孔君墓志銘輕財抵一銖白樂天集本朝吳奎以錢二千萬買田北海號曰義莊以賙親戚朋友之貧乏者終之日家無餘財諸子無宅以居吳奎墓銘
