body:
  text: 粧飾經副笄六珈詩君子偕老子周文王宮人髻上加珠翠翹花傅之鉛粉其高髻名鳳髻又有雲髻加之步步而搖故曰步搖始皇宮中梳望仙髻漢宮有迎春髻漢武時諸仙從王母下降皆梳飛仙髻盤龍髻貫以鳳首叉孔雀搔頭雲頭篦掃八字眉漢明帝宮人梳百合分梢髻同心髻掃青黛蛾眉魏武宮人掃連頭眉晉惠帝宮人梳芙蓉髻通草五色花子掃黑墨眉一盡連心細長曰仙娥粧隋文帝宮中梳九真髻唐武德中梳平蕃髻長樂髻開元中梳雙鬟望仙髻貞元作偏髻子王睿纂炙轂子史張敞為婦畫眉長安中傳張京兆眉憮西漢張敞傳憮音詡蘇林音嫵應劭曰憮大也樊姬為卷髮號新興髻為薄眉號遠山黛施小朱號慵來粧趙后外傳宋武帝女壽陽公主人日臥含章殿簷下梅花落公主額上成五出之花拂之不去皇后留之自後有梅粧後又名壽陽粧宋書北周禁天下婦人不得施粉黛自非宮人皆黃眉墨粧通鑑傳記司馬相如妻卓文君眉如遠山時人效之畫遠山眉西京雜記崔樞夫人治家整肅婢妾皆不許時世粧注時出粧斜紅不暈也因話録互見治家門隋文宮中紅粧為桃花面事物紀原蜀後主宮中有飾粧蓋其髻別為一家之美因施胭脂粉夾連額號曰醉粧見北夢瑣言曰頭花鈿滿面不如徐妃半粧蔣凝宏詞賦見托言集衣香知步近湘東王詩微汗粉中光選鳳靨蛾眉粧玉面梁劉遵笑靨人前斂衣香動處來陳後主頭上何所有翠微圔葉垂鬢唇背後何所見珠壓腰衱穩稱身杜詩麗人行翻嫌脂粉涴顏色淡掃蛾眉朝至尊杜詩翠翹金雀玉搔頭長恨歌粧成更點星徐君倩詩盡日弄花梳洗晚元稹詩鬢輕全作影嚬淺未成眉溫飛卿裝掠學西京劉賓客風流薄梳洗時世寬裝束白侍郎頭上玉燕叉妾小嫁時物李白白頭吟時世粧時世粧自出城中傳四方白樂天昂黛內家粧同上玉蟬金掌三層插翠髻高藂緑鬢虛王建詩蜂鬚蟬鬢薄瓏驄浮動搔頭似有風王建宮詞宋家宮粧髻一片緑雲斜白傅集高髻雲鬟宮樣粧韋應物插花照鏡千嬌出玉臺後録紅綿粉絮裛粧啼崔國輔白紵詞皓腕約金環選樂府鉛黛凝春態金鈿耀水嬉風流誇墜髻時世鬭啼眉白樂天點黛方初月樂府本朝淡粧濃抹總相宜歐公集隨宜梳洗莫傾城臨川集直饒肌骨秀正要畫眉長陳後山鄰家小婦學間媚靚粧惟有長眉掃欒城集綰結湘娥十二鬟山谷美人睡起薄梳洗坡詩勤把鉛花記宮樣同上經象服是宜玉之瑱也象之揥也詩君子偕老蒙彼皺絺是紲袢也同上衣錦褧衣詩碩人注夫人嫁則錦衣加褧襜辨內外命婦之服鞠衣展衣禒衣素沙周禮內司服史楊妃死之日馬嵬媼得錦袎襪一隻遇客過一玩百錢前後獲錢無數唐楊太真外傳集披羅衣之璀粲珥瑤碧之華琚戴金翠之首飾綴明珠以耀軀踐遠遊之文履曳露綃之輕裾曹子建洛神賦羅襪躡蹀而容與張衡南都賦巾㡚鮮明選南都賦注曰女服新衣翠粲嵇叔夜琴賦注翠粲衣聲也繡羅衣裳照暮春蹙金孔雀銀麒麟杜詩麗人行解蘊麝之衣衾袁淑正情賦顏如玉不著人家俗衣服白傅集互見艷麗春衣一對直千金鬱衣香汗裛歌巾同上空見凌波襪劉禹錫馬嵬行藕花衫子柳花裙多著沉香慢火薰唐人詩經歌者纍纍乎端如貫珠記樂記子撫節悲歌聲振林木響遏行雲列子湯問韓娥過雍門鬻歌去而餘音繞梁三日不絶曼聲長歌同上史趙飛燕體輕能掌上舞漢書為平陽主謳漢武衛后傳亙溫問嘉曰聽伎絲不如竹竹不如肉何謂也曰漸近自然一坐咨嗟孟嘉別傳麗服靚粧燕歌趙舞觀者忘疲唐書徐堅傳傳記漢宮人麗娟善歌體弱殆不勝衣常唱回風曲庭葉翻落如秋洞真記聲震林木響遏行雲餘音傳林數日不絶荊州記今之催酒三臺或曰鄴中有三臺石崇遊宴之地樂工以促飲又云蔡雍三日之間周歷三臺樂府以雍曉音律製此曲希其厚遺李正文資暇集回波樂春鶯囀烏夜啼之屬謂之軟舞柘枝大渭州達摩枝之屬謂之健舞教坊記白尚書姬妓樊素善歌小蠻善舞樂府解題開元中入內人許子和吉州永新縣樂家女也入宮因名永新能變新聲高秋朗月唯轉一聲響傳九陌一日大酺於勤政樓萬衆喧譁莫得聞魚龍百戲之音永新乃撩鬢舉袂直奏曼聲廣場寂寂若無一人樂府雜録舞者樂之容有大垂手有小垂手或象驚鴻或如飛燕婆娑舞態也曼延舞綴也有健舞軟舞字舞花舞馬舞舞曲有緑腰蘇合香屈柘胡渭州團圓旋甘州等字舞以舞人亞身于地布成字也花舞著緑衣偃身合成花字也馬舞者攏馬人著綵衣執鞭於床上舞躞蹄皆應節奏也同上集吳歈蔡謳楚辭一唱萬夫嘆再唱梁塵飛擬古詩阿陽奏奇舞洛京出名謳選樂府發妙聲於丹唇激哀音於皓齒飄浮雲於太清集長風乎萬里曲既終而響絶遺餘玩而未已良自然之至音非竹絲之所擬聲不假器用不借物動唇有曲發吻成音成公子安嘯賦吳蔡齊秦之聲鮑照賦定面凝眸一聲發雲停塵下何勞算元稹集愛君簾下唱歌人色似芙蓉聲似玉白樂天清歌拂梁塵選謝靈運詩舞罷錦纏頭杜詩皓齒歌細腰舞李賀將進酒骨氣端翔音情頓挫光英朗練有金石聲陳子昂集衆音不能逐裊裊穿雲衢杜牧之佳人絶代歌獨立發皓齒杜詩青蛾翳長袖韓文醉從趙女舞杜詩清緊如敲玉深圓似囀簧一聲腸一斷能有幾多腸又一曲萬重情白傳集盼盼善歌舞幽雅多風態同上歌詞妙宛轉舞態能剜刻元稹集歌眉低有思舞態輕無骨劉賓客清絲妙管從空來韋應物衛娘清轉遏雲歌羅隱艷歌能起關山恨武伯蒼嬌歌自駐壺中景艷舞長留海上春許用晦珠弗咽歌喉李義山百金買一聲千金傳一曲文粹迎娘歌喉玉䆗窱蠻兒舞帶金葳蕤鄭嵎津陽門遏雲歌響清回雪舞腰輕李義山舞筵須揀腰輕女白傳集喉囀一聲響傳九陌樂府雜録樂石城有女名莫愁善歌謠同上子莊子妻死惠子吊之方箕踞鼓盆而歌莊子互見達理門史長孫后薨太宗曰內失一良佐以此益令人哀耳唐書集望廬思其人入室想所歷帷屏無倣拂翰墨有餘迹流芳未及歇遺挂猶在壁如彼翰林鳥雙棲一朝隻如彼遊川魚比目中路析潘安仁悼亡衾裳一毀撤千載不復引豈曰無重纊誰與同歲寒展轉盻枕席長簟竟空床床空委清塵空虛來悲風寢興目存形遺音猶在耳明月入綺窗倣佛想惠質夢寐復冥冥何由覿爾形我慚北海術爾無帝女靈雨絶無還雲華落豈留英並同上蘭室無容光張茂先房櫳無行迹張景陽蘭徑少行迹玉臺生網絲唐華帷軒夕改軿輅晨遷靈衣虛襲組帳空煙巾見餘軸匣有遺絃庭樹驚兮中帷響金釭曖兮玉座寒謝希逸宋貴妃誄重扄閟兮燈巳暗幽泉寂兮此夜深響乘氣兮蘭馭風德有遠兮聲無窮謝希逸衾衽長塵絲竹罷調王僧達羅襪生塵曹子建洛神賦既將友而復疑如有求而遂失梁王筠昭明太子哀策文皎皎河漢匹三秋會有期嗟嗟琴瑟偶一去無還時暗壁看遺挂虛簷想步綦流芳行處歇空色夢中疑梁務先嚴霜降兮青春玉樹榷落成黃塵陳子昂集宜享偕老胡寧鞠凶燕公碑美玉褫顏明珠晦色同上畫圖省記春風面環佩空歸夜月魂杜詩冥寞憐香骨提攜近玉顏同上穠華不居松扄永閟陳子昂集美人在時香滿堂美人去後餘空床李太白情一何長命一何短韓文羲和不駐哀禍翻錦帷悄戚彤史寒同上夫喪少婦子失壯母韓文周況妻銘丹青畫出竟何益不言不笑愁殺人白侍郎軒窗簾幕皆依舊只是堂前欠一人舊物零落盡此情安可任魂魄不曾來入夢似葉飄辭樹如雲斷別根念梧桐之早落不及夫榮芳魂艷色知何在開箱衣帶隔年香應生寶瑟塵並同上芙蓉如面柳如眉對此如何不淚垂長恨歌春風桃李花開日秋雨梧桐葉落時同上孤鸞念其雌見鏡而舞白帖歸來舊香滅溫飛卿玉梳細朵香膠鮮元微之死後留得生前恩文粹竹垂哀折節蓮敗惜空房元微之鳳樓人已去鸞鏡月空懸李義山撫存悼亡感今思昔哀册流水飄香去不歸李賀雲貌久已隔玉音無復傳元稹本朝鏡下穸臺衣緘泉笥類要靡及湯沐之封徒切糟粳之感楊文公行求兮不可過坐思兮不可知處可見惟夢兮奈寐少而寤多歐公集晝出門而不敢歸兮畏空室之漫漫忽入門而欲語兮嗟猶意其尚存役魂魄於宵夢兮追髣佛而無緣訪臨邛之道士兮從稠桑之老人縱可得而復見兮恐荒忽而非真東坡傷春詞夫婦之好義同朋友勤瘁相成於艱難之中而死生契闊於安樂之後東坡司馬光妻贈夫人制互入京薄芳菲美艷不禁風未到春殘已墜紅詩話總龜互入同上塵入羅衣暗風隨玉篆消同上緑琴蛛網遍絃絶不成聲山谷哀挽滅椒蘭顏延年泣葬一枝紅賢薰照風度簫聲遠河低婺彩沈權載之秦地吹簫女湘波鼓瑟妃佩蘭初應夢奔月竟淪輝韓文公主挽詞胄于克成厥家享有全福韓文古原三丈穴深葬一生樹德本沒揚淑聲劉賓客傾國留無路還魂怨有香蘭麝不馨香珠翠無顏色文粹自從香骨化飛作馬蹄塵劉長卿蘭蕙芳意銷武伯蒼菱寒竟不春同上皓月掩蘭室光風虛蕙樓沈雲卿可憐妍艷正當時剛被狂風一夜吹方雄飛夫人雖沒風躅具存勒銘泉戶作範閨門白傅集青苔竟埋骨紅粉自傷神溫飛卿本朝故得以門內之理為隧道之銘類要
