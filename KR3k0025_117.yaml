body:
  text: 懷昔經豐水東注維禹之績詩文王有聲奕奕梁山維禹甸之詩韓奕踧踧周道鞠為茂草詩小辨周大夫行役至于宗周過故宗廟宮室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也王風黍離顧瞻周道中心怛兮檜匪風誰將西歸懷之好音同前愾我寤歎念彼周京曹下泉我心憂傷念昔先人明發不寐有懷二人詩小宛孔子曰魯之郊禘非禮也周公其衰矣禮記禮運子在齊聞韶三月不知肉味論語子晉宋江東衣冠文物之舊文中子述史篇史韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王韓子所見蓋周之舊典禮經也左傳序天王使劉定公勞趙孟于洛汭劉定公曰美哉禹功明德遠矣微禹吾其魚乎左傳魏杜弼曰荊棘生於建鄴之宮麋鹿遊於姑蘇之館通鑑梁紀集思南郢之舊俗兮腸一夕而九運楚辭衣冠禮樂盡在是矣選集序南登霸陵岸回首望長安選七哀詩北邙何纍纍高陵有四五借問誰家冢皆云漢世主張載七哀詩舊國千年盡荒城四望通駱賓王柏梁高宴今何在同上山川四望是人事一朝非同上山川不改舊時丘壟多為陳迹同上江頭宮殿鎖千門細柳新蒲為誰緑杜詩聞道長安似奕棊百年世事不勝悲侯王第宅皆新主文武衣冠異昔時杜詩庾信羅含俱有宅春來秋去作誰家杜詩功蓋三分國名成八陳圖江流石不轉遺恨失吞吳杜詩緑珠樓下花滿園今日曾無一枝在杜詩古之帝宮苑今乃人樵蘇杜詩故園池臺今是非杜詩金谷銅馳非故鄉杜詩吳宮花草埋幽徑晉代衣冠成古丘唐詩滕王高閣臨江渚佩玉鳴鑾罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨間雲潭影日悠悠物換星移度幾秋閣中帝子今何在檻外長江空自流王勃洛陽東風幾時來川波岸柳春全回宮門一鎖不復啓雖有九陌無塵埃昌黎集感春宮前遺老來相問今是開元幾葉孫韓文我思古人伊鄭之僑韓文丘園滿目衣冠盡城闕連雲草樹荒韓文舞榭欹傾基尚在文窗窈窕紗猶緑塵埋粉壁舊花鈿鳥啄風箏碎珠玉元稹集憶昔開元全盛日小邑猶藏萬家室同上萬古一長嗟同上覽物想故國同上腸斷裴家光德宅無人掃地戟門深同上吳妖小女飛作煙越艷西施化為土嬌花巧笑久寂寥妓妓一作娃館苧羅空處所白樂天集事去惟留冰人非但見山同上金谷風光依舊在無人管領石家春同上周臺漢園斜陽暮草杜牧之芳苑至今生茂草古城依舊枕寒流劉夢得商女不知亡國恨隔江猶唱後庭花杜牧之可憐故國三千里虛唱歌詞滿六宮同上錦纜龍舟隋煬帝平臺復道漢梁王遊人間起前朝念折柳孤吟斷殺腸杜牧之登古城兮思古人感賢達兮同埃塵平原兮寄遠目姑蘇兮聚麋鹿黃池高會事未終滄海橫流人蕩覆伍胥殺身誰不冤竟看墓樹如所言越王嘗膽安可敵遠取石田有何益一朝空謝會稽人萬古猶傷角東客黍離離兮城陂阤牛羊踐兮牧豎歌野無人兮秋草緑國為墟兮古木多劉長卿萬戶千門成緑草只緑一曲後庭花劉賓客集芳草遍吳宮劉長卿碑苔幾字滅山木萬株齊同上山圍故國周遭在潮打孤城寂寞回惟有淮東舊時月夜深還過女墻來劉禹錫官舍已空秋草緑女墻猶在夜烏啼劉長卿大抵南朝皆曠達可憐西晉最風流杜牧之石麟埋沒藏春草銅雀荒涼對暮雲溫飛卿事去人亡迹自留劉長卿永和春色千年在羅隱集七雄三傑今何在休為間人淚滿襟同上梁王兔苑荊榛裡煬帝雞臺夢想中同上孤嶂秦碑在荒城魯殿餘從來多古意臨眺獨躊躇杜詩宮盡燕聲少臺荒麋迹多許用晦集今日皆何處間門春草長同上白骨半隨流水去黃雲猶傍郡城低李嘉祐文白社已應無故老清江依舊繞空城鄭守愚文市朝欲認不知處漠漠野田空草花錢起文高冢荒涼多貴臣蛾眉漫睩共灰塵試上同臺歌舞處唯有秋風愁殺人張説之文屏上樓臺陳後主鏡中金翠李夫人溫飛卿六代精靈人不見思量應在月明中羅隱集六朝勝事已塵埃同上一朝物變人亦非四面荒涼人徑稀意氣豪華何處去空餘草露濕征衣孟浩然憑高覽古嗟寰宇造化茫茫思悠哉秦川八水長繚繞漢氏五陵空崔嵬韋應物古城聊一望荒棘幾千叢盧照鄰詩寂寞空餘歌舞地姚少監昔日青樓對歌舞今日黃埃聚荊棘李嶠本朝不知此地幾興廢仰視喬木皆蒼煙歐公集煙濃草遠望不見物換星移度幾秋臨川集金陵限南北形勢豈其然楚役六千里陳亡三百年江山空幕府風月自觥船臨川集登高一曲悲亡國想繞紅梁落暗塵同上破堞自生新草木廢宮誰識舊軒窗同上西望夏口東望武昌山川相繆鬱乎蒼蒼此非曹孟德之困於周郎者乎方其破荊州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江橫槊賦詩固一世之雄也而今安在哉東坡赤壁賦三千宮女看花處人盡臺空花自開古今詩話經無平不陂無往不復易泰卦互見物極則反禍從口出患從口入周易頤卦正義言行君子之樞機樞機之發榮辱之主也繫辭夙興夜寐無忝爾所生變小雅小宛蘀兮蘀兮風其吹女詩籜兮敢有怕舞于宮酣歌于室時謂巫風敢有殉于貨色怕于遊畋時謂淫風敢有侮聖言逆忠直遠耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一于身國必亡書伊訓玩人喪德玩物喪志書旅獒惟女子與小人為難養也近之則不孫遠之則怨論語陽貨子趙孟之所貴趙孟能賤之孟子名也者相軋也知也者爭之器也莊子人間世富則多事壽則多辱莊天地不可以無涯之智役有涯之身莊子水能載舟亦能覆舟荀子夫善遊者溺善騎者墮各以其所好反自為禍淮南子五聲八音清商流徵損聰者也鮮華艷采彧麗炳爛傷明者也宴安逸豫清醪芳醲亂性者也冶容媚姿鉛華素質伐命者也抱朴子暢玄里語曰人在人間日失一日如牽牛以詣屠所每進一步去死轉近也抱朴子順者福之門逆者禍之府劉子目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓口貪滋味命曰腐腸之藥鼻悅芳馨命曰燻喉之煙身安輿駟命曰召蹶之機劉子互入不善攝養勒於几杖刻於盤盂為之日楊文子聲無小而不聞行無隱而不形荀勸學史道高益安勢高益危史司馬季主傳若君不修德舟中之人皆敵國也通鑑第一周紀毌為怨府毌為禍梯史記趙世家易曰狐涉水濡其尾此言始之易終之難也史春申君傳大名之下難以久居史越世家無以先入之語為主西漢息夫躬禍固多藏於隱微而發於人之所忽西漢司馬相如傳互見禍生所忽動色相戒前漢劉輔傳木勝者人亡楚作章華以凶吳興姑蘇而滅東漢濟南安王秉傳蓋寬饒至許伯第曰此如傳舍所閲多矣西漢無為權首將受其咎前漢朝厝贊無為虎傅翼將飛入邑西漢賈誼傳注聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛強者戒於太暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘西漢康衡傳得失一朝而榮辱千載荀悅漢書天地之心福謙禍盛東漢李固傳日不常中月盈有虧履道者固挾勢者危東漢王逸黃石公記曰務廣地者荒務廣德者強有其有者安貪人有者殘東漢臧宮傳李固貽書黃瓊曰觀聽望深聲名太盛通鑑吳隱之為廣州剌史地有水曰貪泉隱之語其親人曰不見可欲使心不亂晉書興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至通鑑七十九晉世祖紀謝朏與弟瀹別指其口曰此中惟宜飲酒齊書人笑褚先生至今齒冷無為效也南史樂預傳齊陳顯達曰塵尾蠅拂是王謝家物通鑑齊紀蕭允曰禍之所來皆生於利苟不求利禍從何生通鑑梁武紀欹器防滿金人戒言隋樂志諸葛長民曰貧賤常思富貴富貴必履危機宋書徐惠曰地廣非常安之術通鑑唐太宗紀徐惠曰珍玩伎巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒同前陝郡進士張彖曰君輩倚楊右相如泰山吾以為冰山若皎日既出君輩得無失所恃乎通鑑唐紀互入先見飲食資身過則生患唐書柳公綽傳夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛唐書柳玭傳互入成難壞易壯九重於內所居不過容膝彼昏不知瑤其臺而瓊其室羅八珍於前所食不過適口惟狂罔念丘其糟而池其酒通鑑唐太宗目見可欲何能自窒于心己與交私何能中絶其意通鑑唐德宗盛名之下為難居名盛則責望備唐書房琯傳劉延祐有吏能治第一李績戒之曰子春秋少而有美名宜稍自抑無為出人上唐書馮道曰臣嘗記昔奉使中山歷井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕通鑑後唐明宗憂先於事故能無憂事至而憂無救於事通鑑唐憲宗互見遠慮傳記行百里者半九十此言末路之難也戰國策若虎口入之則不知所出矣同上墻薄則亟壞繒薄則亟裂器薄則亟毀酒薄則亟酸夫薄而可以曠日持久者殆未有也劉向新序互見輕薄以財事人者利盡而交踈以色事人者華落而寵衰説苑開元中道士呂翁經邯鄲止邸舍有邑少年盧生同止于邸主人方蒸黃粱共待其熟盧不覺長歎翁問之具言生世困厄翁取囊中枕以授盧曰枕此當榮適如願生俯首但記身入枕穴中遂至其家未幾登高第歷臺閣出入將相五十年子孫皆列顯仕榮盛無比上疏曰臣年踰八十位歷三台空負深恩永辭聖代其夕卒盧生欠伸而寤呂翁在旁黃粱尚未熟生謝曰此先生所以窒吾欲也敢不受教再拜而出陳翰異聞集淳于棼家廣陵宅南有古槐生豪飲其下因醉致疾二友扶生歸臥東廡夢二紫衣使者曰槐安國王奉邀生隨二使上車指古槐入一穴中大城朱門題曰大槐安國有一騎傳呼曰駙馬遠降引生升廣殿見一人衣素練服簪朱華冠令生拜王王曰前奉賢尊命許令女瑤芳奉事君子有仙姬數十奏樂執燭引導金翠步障玲瓏不斷至一門號修儀宮一女子號金枝公主儼若神仙交歡成禮情義日洽王曰吾南柯郡政事不理屈卿為守敕有司出金玉錦繡僕妾車馬施列廣衢餞公主行夫人戒子曰淳于郎性剛好酒為婦之道貴在柔順爾善事之纍日達郡有官吏僧道音樂來迎下車省風俗察疾苦郡中大理凡二十載百姓立生祠王賜爵錫邑位居台輔生五男二女榮盛莫比公主遇疾而薨生請護喪赴國王與夫人素服慟哭于郊備儀仗羽葆鼓吹葬主于盤龍岡生以貴戚威福日盛有人上表玄象謪見國有大恐都邑遷徙宗廟崩壞事在蕭墻時議以生僣侈之應王因命生曰卿可暫歸本里一見親族諸孫留此無以為念復令二使者送出一穴遂寤見家僮擁篲于庭二客濯足于榻斜日未隱西垣餘尊尚湛東牖因與二客尋古槐下穴洞然明朗可容一榻上有土壤為城郭臺殿之狀有蟻數斛二大蟻素翼朱首乃槐安國王又窮一穴直一南枝群蟻亦處其中即南柯郡也又一穴盤屈若龍蛇狀有小墳高尺餘即盤龍山岡也生追想感歎遽遣掩塞是夕風雨暴發旦視其穴遂失群蟻莫知所之國有大恐都邑遷徙此其驗矣同上集桀作瑤臺紂為璇室人力不堪而帝業不卒詩詠宣王由儉改奢春秋譏剌書彼泉臺兩觀雉門而魯以不恢楊雄將作大匠針董生有云弔者在門賀者在閭言憂則恐懼敬事則有善功又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至劉向與子歆書互見戒子出輿入輦命曰蹙痿之機洞房清宮命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥選七發置膏烈火上哀哀自煎熬杜工部有才無義惟家之殃無愛糞土以毀五常晉物忌堅芳人諱明潔顏延年祭屈原文炙手可熱勢絶倫謹莫近前丞相嗔江湖多風波舟楫恐失墜涼風蕭蕭吹汝急恐汝後時難獨立借問頻朝謁何如穩晝眠念君惜羽翮既飽更思戢莫作翻雲鶻聞呼向禽急淘米少汲水汲多井水渾刈葵莫放手放手傷葵根玉潤終孤立珠明得暗藏並杜詩勢利禍之門陳子昂集處世忌太潔李太白集作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬同上互入勢不可恃月缺花殘莫慘然花須終發月終圓竟能何事銷芳念亦有濃華委逝川一曲艷歌留婉轉九原春草妬嬋娟王孫莫學多情客自古多情損少年溫飛卿竿上擲身難倚梯青冥舉足斯跌並劉賓客異質忌處群孤芳難寄林韓退之互入立異年少得塗未要忙韓退之保貴在家貧劉賓客寸心生萬路今古棼若絲逐逐行不盡忙忙休者誰來恨不可遏去悔何足追劉乂文人生莫依倚依倚事不成唐文粹莫倚顏似花君看歲如水元微之集名腸內煎外火非熱盛名先物易生癘疵並劉賓客莫道韶華鎮長在白頭面皺專相待唐文粹高名難恃劉長卿權重持難久位高勢易窮窮者物之盈老者數之終四者如冠盜日夜來相攻寵者防悔尤權者懷憂畏為報高蓋車恐非真富貴日近恩雖重雲高勢劫孤翻身落霄漢失腳倒泥塗晦即全身藥明為伐性兵無以滋章為聰明無以鹵莽為高簡幸履坦途勿遵邪徑莫養瘦馬駒莫養小妓女後事在目前不信君看取馬肥快行去妓長能歌舞三年五歲間已聞換一主借問新舊主誰樂誰辛苦互見與人為地試問池臺主多為將相官終身不曾到惟展畫圖看蛾須遠燈燭兔勿近罝罘相爭兩蝸角所得一牛毛莫嫌地窄林亭小莫厭家貧活計微大有高門鎖寬宅主人到老不曾歸吾觀權勢者苦以身徇物炙手外炎炎履冰中栗栗須除愛君障莫作戀家囚名為公器無多取利是身災合少求悔時其奈噬臍何權門要路是身災散地間居少禍胎莫對月明思往事損君顏色減君年並白侍郎集居處不守其度則峻宇崇臺攻之視聽不守其度則姦聲艷色攻之喜怒不守其度則僣賞淫刑攻之玩好不守其度則妨行之貨蕩心之器攻之獻納不守其度則讒諂之言聚斂之計攻之道術不守其度則不死之方無生之法攻之夫然則安得不內固其守甚於城池外防其攻甚於冠戎焉白樂天集皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國兢兢以強六國既除訑訑乃亡柳文夫祿位富貴人所大欲也得之之難未若持之之難也得之於功或失之於德得之於身或失於子孫韓文時不再來榮難久藉唐文粹我屋汝嫌低不住雕梁畫閣也知寬大須穩擇安巢處莫到巢成卻不安杜荀鶴集遍看原上纍纍冢曾是城中汲汲人盡謂黃金堪潤屋誰思荒骨旋成塵同上互入貪迷堯舜宰乾坤器農不器兵秦漢盜山嶽鑄殺不鑄耕天地莫生金生金人起爭孟東坐屏云守口如瓶防意如城朝氏客語切深疾惡反傷和陳後山集互見己甚
