body:
  text: 感嘆經知我者謂我心憂不知我者謂我何求詩王風黍離互見自歎昔先王受命有如召公日辟國百里今也日蹙國百里詩召旻趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸記檀弓下孔子曰我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣記禮運子在川上曰逝者如斯夫不舍晝夜語子罕楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰語微子子曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣語八佾子曰鳳鳥不至河不出圖吾已矣夫語述而子故家流俗遺風善政猶有存者孟公孫丑上其中開口而笑者一月之中不過四五日而已矣莊子人生天地間若白駒之過隙忽然而已莊子史仲尼視麟曰河不出圖洛不出書吾已矣夫史孔子世家魯季桓子見魯城喟然歎曰昔此國幾興矣以吾獲罪於孔子故不興也謂其嗣康子曰若相魯必召仲尼史記世家人生一世間如白駒過隙前漢魏豹傳阮孚好蠟屐因自嘆曰未知一生當著幾緉屐晉書本傳亙溫過淮泗踐北境與諸寮屬登東平乘樓眺矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責晉書本傳互見罪有所歸門亙溫自江陵北伐行經金城見少為琅琊時所種柳皆已十圍慨然曰木猶如此人何以堪晉書亙溫傳羊祜遊峴山言詠終日嘗顧從事鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆堙滅無聞使人悲傷晉書本傳古稱一世三十年子厚之斥十二年殆半世也唐書吳武陵傳記古人混混去不返今人紛紛來更多續仙傳藍采和歌集年歲晚暮時已斜安得壯士翻日車後漢李尤九曲歌所遇無故物焉得不速老古詩連連舟壑改徾徾市朝變局塗頓遠策留歡恨奔箭春貌既移紅秋林豈停蒨一倍倍一作陪茂陵道寧思柏梁宴沈約長歌行變燧回星劉孝標書人生一百年歡笑惟三五庾信對酒後之視今亦猶今之視昔王羲之蘭亭記臨川感流以嘆逝登山懷古而悼遠潘安仁秋興賦感冬索而春敷嗟夏茂而秋落同前天地無終極人命若朝露曹子建送應氏詩未厭青春好已睹朱明移謝靈運南亭詩頽魄不再圓傾曦無兩旦曹子建贈白馬王彪百川東到海何時復西歸長歌行對酒當歌人生幾何譬如朝露去日苦多短歌行人壽如朝露時華不載揚陽來日苦短陽去日苦長同前故人雖故昔經新新人雖新復應故隋江總詩彤庭所分帛本自寒女出鞭撻其夫家聚斂貢城闕杜詩信知生男惡反是生女好生女猶是嫁比鄰生男埋沒隨百草杜詩悵望千秋一灑淚蕭條異代不同時杜詩歲暮日月疾杜詩古來白骨無人收杜詩但見好花開易落從來尤物不長生劉賓客長使英雄淚滿襟杜詩即今千種恨惟共水東流杜詩王侯與螻蟻隨盡同丘墟杜詩萬事隨轉燭杜詩乾坤萬里眼時序百年心杜詩日月不相饒節敘昨夜隔杜詩仙鶴來歸遼東之城郭猶是靈烏代謝漢南之陵谷已非駱賓王臨水感逝川之嘆同上百年三萬日一別幾千秋同上吾操鏝以入於富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問其鄰或曰噫刑戮也或曰身既死而子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者邪非強心以智而不足不擇其才之稱否而冒之者耶非多行可愧知己之不可強而為之者耶將富貴難守薄功而厚享者耶抑豐悴有時一去一來而不可常者耶韓文圬者王承福傳坐觀萬象化方見百年侵陳子昂孟郊死葬北邙山日月風雲頓覺間韓文樽酒相逢十載前君為壯夫我少年樽酒相逢十載後我為壯夫君白首韓文人生大限雖百歲就中三十稱一世晦明烏兔相推遷霜雪漸到雙鬢邊沈憂戚戚多浩歎不得如意居太半一氣暫聚常恐散黃河清兮白石爛權集城池百載後耆舊幾家殘處處蓬蒿遍歸人掩淚看劉長卿白首相逢征戰後青春已過亂離中同上蒼苔換古今同上萬事依然在無如歲月何同上長明燈是前朝焰曾照青春年少時劉禹錫世事不同心事新人何似故人同上所嘆別此年永無長慶曆元微之集凄涼百年事應與一年同同上風光少時新同上一夜思量十年事幾人強健幾人無同上二百年來城裡宅一家知換幾多人同上西施顏色今何在但看春風百草頭同上不知山下東流水何事長須日夜流同上不是花中偏愛菊此花開後更無花鄭谷詩功名富貴若長在漢水亦應西北流元微之集冠蓋散為煙霧盡金輿玉座成寒灰李太白集今人不見古人月今月曾經照古人同上時來天地皆同力運去英雄不自由羅隱集欲招屈宋當時魄蘭敗荷枯不可尋同上析羽不復飛逝水不復歸孟東野樹有百年花人無一定顏花送人老盡人悲花自間同上四時如逝水同上春蚤見花枝朝朝恨發遲及看花落後卻憶未開時劉禹錫芳林新葉催陳葉流水前波讓後波同上人凶非宅凶同上三百年來庾樓上曾經多少望鄉人白侍郎胭脂化為泥鉛黛復何有同上百齡同一寐同上人壽不如山年光忽如水同上因驚成人者盡是舊童儒同上同是天涯流落人相悲何必曾相識同上昔如玄雲光今如素絲白鴉頭與鶴頸至老長如墨獨有人鬢毛不得終身黑同上黃金不惜買蛾眉揀得如花三四枝歌舞教成心力盡一朝身去不相隨白侍郎互見警戒省悟兩門自嗟名利客擾擾在人間何事長淮水東流亦不間同上大都好物不堅牢彩雲易散琉璃脆白侍郎春銷不得處惟有鬢邊霜同上惟有愁人鬢間雪不隨春盡逐春生同上羲和走馭趁年光不許人間日月長同上年年只是人空好處處何曾花不開白傳集朝鐘暮角催頭白同上真宰倒持生殺柄間物命長人短命松枝上鶴蓍下龜千年不死仍無病人生不得似龜鶴少去老來同旦暝白侍郎天色晴明少人生事故多同上天時人事常多故一歲春能幾度遊不是塵埃便風雨若非疾病即悲憂貧窮心苦多無興富貴身忙不自由同上春日雖遲不再中白侍郎搖落覆井梧荒涼故籬菊同上百川趁海返潮易一葉報秋歸樹難鮑溶劫灰飛盡古今平王維天若有情天亦老李賀隱迹今尚存高風邈已遠白雲何時去丹桂空偃蹇孟浩然人生無幾何如寄天地間心有千載憂身無一日間白集南朝三十六英雄各逐興亡自此中有國有家皆是夢為龍為虎亦成空唐韋莊人生天地之間若流電之過戶牖輕塵之棲弱草李康遊仙序恨如春草多事與孤鴻去杜牧之彭殤共一籌同上景物不盡人自老同上芳草何時時一作年恨即休同上日月如跳丸相趁走不住同上南去北來人自老夕陽長送釣船歸同上浮生冷似冰底水日夜東流人不知同上郵亭寄人世人世寄郵亭同上聚散真標梗光陰極轉郵同上花若有情還悵望水應無事莫潺湲溫飛卿墓平春草緑碑折古苔青同上全盛已隨流水去黃鸝空囀舊春聲武伯蒼日日人空老年年春更歸王維集一向破除愁不盡百方回避老新來王建千金立碑高百尺終作誰家柱下石張文昌舊國別多日故人無少年賈浪仙不覺年華似箭流同上主人何處獨徘徊流水自流花自開若見故交皆散去即應新燕不歸來方雄飛文世事隨時變交情與我違空餘主人柳相見即依依錢起文只聞丞相夷三族不見扁舟泛五湖張承吉文朝悲辭樹葉夕感歸巢禽韓文地下若逢陳後主豈宜重問後庭花李義山文幾時心緒休無事得及遊絲百尺長同上縱使有花兼有月可堪無酒又無人同上年年歲歲花相似歲歲年年人不同唐文粹四時輪轉春常少百刻支分夜苦長白侍郎本朝沈碑身後念陵谷把酒泣下悲山川歐公集春風自是無情物肯為汝惜無情花今年花落明年好但見開花人自老同上月如無恨月長圓石曼卿集好山緑水萬里有盡處清風明月千古無忘忘一作老時名談山阿昔留賞屐齒無遺迹歐公集憶伊川詩異鄉物態與人殊惟有東風舊相識歐公集春日西湖歌廟堂元老今華袞巖壁遺文已緑苔歐公集一生勤苦書千卷萬事消磨酒百杯歐公集退居寄韓侍郎往事無迹難追尋臨川集秦徵天下材入作阿房宮宮成非一木山谷為窮空子羽一炬火驪山三月紅能令掃地盡豈但焚人功同上世上惟知古有秦山中豈料今為晉同上天下紛紛經幾秦同上六朝人物隨煙埃金輿玉几安在哉同上事事只隨波浪去年年空得鬢毛新同上廢陵壞冢空冠劍誰復沾纓酹一缸同上山花落盡山長在山水空流山自間同上歌舞可憐人暗換花開花落幾春風同上丹樓碧閣昔時事只有江山到古今同上世道如奕棊變化不容覆東坡詩互見事無常洛陽泉水今誰主莫學癡人李與牛東坡詩壞壁無由見舊題同上人生營居止竟為何人卜同上常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷同上盛衰哀樂兩須臾同上過眼榮枯電與風同上榮華坐銷歇閲世如郵傳惟有長明燈依然照深殿同上有生共處覆載內擾擾膏火同烹煎近事愈覺世議隘愈覺寬處差便安同上世事如今臘酒醲交情自昔秋雲薄同上過眼百歲如風燈同上一番花老一番新同上雕欄能得幾時好不獨憑欄人易老百年興廢更堪哀懸知草莽化池臺同上生前富貴草頭露身後風流陌上花同上親友如摶沙放手還復散同上出處升沉十年後死生契闊幾人存同上此生此夜不長好明月明年何處看東坡中秋月詩歲月如宿昔人事幾反覆東坡詩近來世上無徐庶誰向桑麻識臥龍詩話總龜平生功業數張紙千古英雄一窖塵聞見録本朝謝諫議詩邯鄲炊未熟榮謝隔逡巡欒城集時事無端日日新同上凄涼百年後事付何人筆同上襄陽耆舊內無復姓龐人陳後山詩日月過箭疾山谷自古非一秦六籍蓋多難山谷詩春不能朱鏡裡顏同上青莎徑裡香未乾黃鳥陰中實已團同上今日牛羊上丘隴當時近前左右嗔同上向來歌舞地夜雨鳴寒蛩後山詩經父沒而不能讀父之書手澤存焉爾母沒而杯圈不能飲焉口澤之氣存焉爾禮郊特牲子仰視欀桷俯察几筵其器皆存而不睹其人以此思哀則哀可知矣家語五儀解互入思慕曾晢嗜羊棗而曾子不忍食羊棗孟子其物存其人亡不言哀自至莊子史長老言胸奴失陰山之後過之未嘗不哭也西漢胸奴傳杜延年居父官府不敢當舊位坐臥皆易其處西漢本傳孤者易傷貧者易感魏邴原傳讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇晉書王裒王獻之卒徽之奔喪上靈床取獻之琴彈之久而不調歎曰嗚呼子敬人琴俱亡晉書王徽之傳薛收卒太宗曰吾與伯褒款曲襟抱何期一朝忽成萬古舊唐書本傳集生存華屋處零落歸山丘曹子建詩懿親戚屬亡多寡存昵交密友亦不半在或曾共遊一塗同宴一室十年之外索然已盡陸士衡歌逝賦嗟人生之短期孰長年之能執時飄忽其不再老晼晚其將及觸萬類以生悲歎同節而異時顧舊要於遺存得十一於千百陸士衡嘆逝賦不見耆舊老但見新少年曹子建送應氏詩謂百年已分可共相保何圖數年之間零落略盡魏文帝吳質書徐陳應劉一時俱逝痛可言邪同上舊齒皆雕喪車馬行有淚皆成血無聲不斷腸張説之衣繡而歸雖榮之在晝纍茵以坐而悲不逮親張九齡文既來何苦不須臾縹渺悠揚還滅去去何速兮來何遲是耶非耶兩不知魂之不來君心苦魂之來兮君亦悲背燈隔帳不得語安用暫來還見違唐文粹他時一笑後今日幾人存杜詩世上空驚故人少集中惟覺祭文多劉禹錫解攜襟袖交臂存亡駱賓王寒煙半堂影燼火滿庭灰元微之集逝水良久矣行雲安在哉同上君骨久為土我心長似灰同上眼前少年客無復昔時人同上落盡寒花不見人同上不如元不識俱作路人行同上滿朝豪士今已盡欲話舊遊人不知韋應物集見話先朝如夢中同上何言巾上淚乃是腸中血白侍郎見説白楊堪作柱爭教紅粉不成灰同上試發舊篋君書盈千詞旨重重墨色如新孫可之文本朝因拂醉題詩句在應憐手種樹陰成歐公集人昔共遊今孰在樹猶如此我何堪同上原憲之貧顏回之短命楊雄之無子馮衍之不遇皇甫士安之篤疾彼遇其一而人哀之至今而茂誠兼之豈非命也哉東坡詩集序
