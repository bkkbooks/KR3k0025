body:
  text: 有守經確乎其不可拔易乾卦改邑不改井易井卦注井以不變為德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不巳詩風雨齊大饑黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死記檀弓下儒有委之以貨財淹之以樂好見利不虧其義劫之以眾沮之以兵見死不更其守記儒行不隕穫於貧賤不充詘於富貴同上互入氣概富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也語里仁一簞食一瓢飲在陋巷人不堪其憂回也不改其樂語雍也三軍可奪帥也匹夫不可奪志也語子罕不曰堅乎磨而不磷不曰白乎涅而不緇語陽貨不降其志不辱其身語微子子君子脩道立德不以困窮而改節家語昔齊景公田招虞人以旌不至將殺之孔子奚取焉取非其招不往也孟滕文公下大匠不為拙工改廢繩墨羿不為拙射變其彀率孟盡心上堂高數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乘我得志弗為也同上不誘於譽不恐於誹率道而行端然正已不為物傾側荀卿子非十二子古之賢人賤為布衣貧為匹夫食則饘粥不足衣則豎褐不完然而非禮不進非義不受荀卿子大略景不為曲物直響不為惡聲美管子五輔非其志不之非其心不為雖以天下譽之得其所謂謷然不顧以天下非之失其所謂倘然不受莊子天地與屈己以富貴不若抗志以貧賤屈己則制於人抗志則不愧於道孔叢子抗志互入審於取舍胡母思謂子思曰子思好大世莫能容子思曰大不見容命也毀大而求容罪也吾弗改矣孔叢子公義鐘山之玉炊以爐炭而色澤不變淮南子仲尼開跡將以自用也如委己而從人雖有規矩準繩焉得而用之揚子千變萬化吾常守中文中子史雖有挈缾之智守不假器挈缾汲者喻小智為人守器猶知不以借人左昭七年孔子曰天下無行多為家臣仕於都唯季次未嘗仕史公晢哀傳戰國儒術既絀齊魯之間學者獨不廢史儒林傳陳餘謂孔鮒曰秦將滅先王之籍而子為書籍之主其危哉子魚曰吾為無用之學知吾者惟友秦非吾友吾何危哉吾將藏之以待其求至無患矣通監秦紀叔孫通徵魯諸生三十餘人魯有兩生不肯行曰吾不忍為公所為公所為不合古吾不行公往矣西漢本傳周亞夫曰高皇帝約非劉氏不得王非有功不得侯今王信雖皇后兄無功侯之非約也通監漢景紀天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不畏小人匈匈而易其行西漢東方朔傳互入不隨事轉丁傅董賢用事諸附離之者或起家至二千石時雄方草太玄有以自守泊如也西漢揚雄傳不為燥濕寒暑變其節不為風雨暴露改其形介然有常西漢律歷志心如金石東漢王常傳郅惲為上東城門候帝常出獵車駕夜還惲拒門不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃迴從東中門入東漢本傳高獲師事歐陽歙歙下獄獲冠鐵冠帶鈇鑕詣闕請歙帝見之謂曰欲用子宜改性獲對曰臣受性於父母不可改之於陛下東漢任延為武威太守帝戒之曰善事上官無失於和延曰忠臣不和和臣不忠上下雷同非陛下之福善事上官不敢奉詔高峻東漢互入不苟合離朱不為巧眩移目師曠不為新聲易耳東漢范升傳志士不飲盜泉之水廉者不受嗟來之食東漢烈女傳孤竹長飢羞食周粟東漢逸民傳千乘莫移其情同上陳忠薦汝南周燮南陽馮良學行深純隱居不仕名重於世帝以玄纁羔幣聘之燮宗族更勸之曰夫修德立行以為國君獨何為守東岡之陂乎燮曰夫修道者度其時而動動而不時焉得亨乎與良皆自載至近縣稱病而還通監漢殤紀楊震為太尉帝舅耿寶薦李閏兄於震震不從寶乃自往候震曰李常侍國家所重欲令公辟其兄寶唯傳上意耳震曰如朝廷欲令三府辟召固宜有尚書勑拒不許東漢書楊震為東萊太守當之郡道經昌邑故所舉荊州茂才王密為昌邑令夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知地知我知子知何謂無知者密愧而出通監漢殤紀范滂甥李頌素無行中常侍唐衡以屬宗資資用為吏滂寢而不召資遷怒捶書佐朱零零曰范滂清裁今日寧受笞而死滂不可違資乃止通監漢桓紀帝愛楊喬才貌欲妻以公主喬固辭不聽遂閉口不食七日而死通監漢靈紀中常侍趙忠遣弟延致殷勤於傳燮延謂燮曰南容少荅我常侍萬戶侯不足得也燮正色拒之曰有功不論命也傳燮豈求私賞哉本傳初劉備舉袁渙渙為呂布所留布欲使渙作書罵辱備渙不可笑而應之曰渙它日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎通監漢獻紀曹操追念田疇功恨前聽其讓乃復以前爵封疇疇上疏陳誠以死自誓操不聽欲引拜之至于數四終不受疇素與夏侯惇善操使惇自以其情喻之惇就疇宿而勸之疇揣知其指不復發言惇臨去同邀疇疇曰疇負義逃竄之人耳蒙恩全活為幸多矣豈可買盧龍之塞以易賞祿哉縱國私疇疇獨不愧於心將軍雅知疇者猶復如此若必不得已願效死刎首於前同上不為小利移目不為意侶改步通監三國志中常侍郎黃皓用事董厥諸葛瞻不能矯正士大夫多附之唯樊建不與皓往來秘書令卻正久在內職與皓比屋周旋三十餘年澹然自守以書自娛既不為皓所愛亦不為皓所憎故官不過六百石而亦不罹其禍通監魏元帝吳隱之為廣州剌史酌貪泉賦詩曰試使夷齊飲終當不易心晉書吳隱之傳蔡謨除司徒三年不就職詔書屢下謨終不受帝臨軒遣侍中紀據黃門郎丁纂徵謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至詔免謨為庶人通監漢穆紀褚淵侍山陰公主十日備見逼迫誓死不迴沈約宋書沈慶之請老乃至稽顙泣涕上不能奪聽以始興公就第上復欲用慶之使何尚之往起之尚之累陳上意慶之笑曰沈公不效何公往而復返尚之慚乃止通監宋文紀豈可令臣曲筆魏游肇傳周處士韋敻志尚夷簡魏周之際十徵不屈世宗禮敬尤厚號曰逍遙公通監陳高祖傳縡上書言後主酒色過度辭多訐直後主大怒曰我欲赦卿卿能改過否對曰臣心如面面可改臣心可改南史劉行本性剛烈周武時為掌朝大夫典筆硯故事持至御坐則承御大夫取以進及行本將進承御欲取之行本抗聲謂承御曰筆不可得帝驚問之曰臣既不佩承御刀承御亦焉取臣筆隋書互入任責王世充以國子助教吳人陸德明為漢王師令玄恕就其家行束脩禮德明恥之故服巴豆散臥稱病玄恕入跪床下對之遺利竟不與語通監唐高祖太宗謂尉遲敬德曰公心如山岳雖積金至斗知公不移上又謂尉遲敬德曰朕欲以女妻卿何如敬德叩頭謝曰臣妻雖鄙陋相與共貧賤久矣臣雖不學聞古人富不易妻並同上段志元與宇文士及勒兵衛章武門太宗夜遣使至二將軍所士及披戶內使志元拒曰軍門不夜開使者示手詔志元曰夜不能辨不納比曉帝歎曰真將軍也周亞夫何以加唐書本傳太平公主與僧寺爭碾磑雍州司戶李元紘判歸僧寺雍州剌史竇從一大懼亟命元紘改判元紘大署判後曰南山可移判不可搖從一不能奪通監唐中宗李尚隱遷廣州都督及還人或裒金以贈尚隱曰吾自性分不可易非畏人知也唐書本傳不移如山唐書陸贄傳柳渾與張延賞同為相怙權嫉渾守正俾其所厚謂渾曰相公舊德但節言於廟堂則重位可久荅曰為吾謝張相公柳渾頭可斷舌不可禁唐書秉心蹈義鐵心石腸唐郭子儀傳御史大夫高元裕欲薦用韋澳諷澳謁巳澳曰然恐無呈身御史唐書韋澳傳傳記伯成耦耕不慕諸侯之榮愿憲桑樞不易有官之宅世說上石可破也而不可奪其堅呂氏春秋集操愈堅而不衰楚辭每以清白洗心不為寒暑變節陳子昂傳甘心苦節風雨不改同上處屯而必行其道居陋而不改其度張九齡文昔聞陵仲子守義辭三公身賃妻織屨樂亦在其中豈無貧賤苦羞與傾巧同張說之松柏雖居寒羞逐桃李春李太白不學蒲柳凋真心常自保同上道勝於內者物莫能亂德充於外者事不能誘元次山寧方為皁不圓為卿寧方為污辱不圓為顯榮同上河漢不改色杜詩江流石不轉君看磊落士不肯易其身並同上抗哉巢由志堯舜不可遷元稹集金石有銷鑠肺肝無寒溫旋風四面起井深波不生堅冰一時合井深凍不成終年汲引絕不耗復不盈五月金石鑠既寒亦既清易時不易性改邑不改名君門客如水日夜隨勢行君看守心者井水為君盟玉色深不變井水撓不移同上若俛首帖耳搖尾而乞憐者非我之志也韓退之與韋舍人書人生豈草木寒暑移此心韋應物志為飲冰堅劉賓客集玉貞而折不能瓦合鸞鎩而萎不同雞群同上金石自銷鑠玉性肯磷緇白侍郎星霜屢變金石彌堅同上玉立於磷緇之際雞鳴於風雨之中靜柯勁草在我而已李義山集直不枉尺正不由徑同上人或歎曰千乘之邑非無好事者家日欲擊鮮為具以飽君者多矣君獨閉關而不出率空腹貯古聖賢道德言語何自苦如此生笑曰我幾年來忍飢誦經豈不知屠沽兒有酒食耶陸魯望自言歲寒性不知露與霜唐文粹石可轉也不可奪其堅貞陵谷可移隋和之德不昧寒暑有遷松筠之志如一並同上惟有剛腸鐵百鍊不柔虧劉義集澹然一心獨立千仞劉長卿骨鯁知難屈鋒芒豈易干青松心在任風霜並同上不憚芳蘭之焚竟全孤竹之志李文饒松色不肯秋玉性不可柔孟東野身不以形勢屈口不以觀望柔皇甫湜本朝王元之作三黜賦其卒章曰屈于身而不屈于道雖百謫其何虧五朝言行錄我生不有命其肯枉尺尋坡詩飲風蟬至潔長吟不改調同上雖事君均於事親而奪志難於奪帥東坡集
