body:
  text: 遠慮經君子以思患而預防之易既濟君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易繫辭互見預備惟懷永圖書太甲上樹德務滋除惡務本書泰誓下居寵思危制治于未亂保邦于未危並書周官瞻言百里詩桑柔注遠慮也君子言必慮其所終行必稽其所敝記緇衣吾恐季孫之憂不在顓臾而在蕭墻之內也語季氏子曾參出妻終身不娶其子請焉告之曰高宗以後妻出孝已尹吉甫以後妻嫉伯奇容知其得免乎家語得其所利必慮其害樂其所樂必顧其敗老子季平子卒將以君之璠璵斂贈以珠玉孔子聞之歷級而救焉曰送人以寶玉是猶曝尸於中原也家語子貢以千歲之法自持者是乃千歲之信士也荀王伯滿盛之國不可以仕任滿盛則敗亡亦不可任其事也滿盛之家不可以嫁子驕倨傲暴之人不可與交管子白心篇史定姒薨不殯于廟無襯不虞匠慶謂季文子曰子為正卿而小君之喪不成君長誰受其咎左襄四晉傳叟曰雖克鄭猶有知在憂未文也左襄三言晉知氏將為難夫勢在人臣之位而有高天下之名竊為足下危之前漢蒯通傳蕭何不治垣屋曰令後世賢師吾儉不賢毌為勢家所奪前漢本傳竇長君竇廣國賜田宅封公昆弟家於長安絳侯灌將軍曰吾屬不死命且縣此兩人兩人所出微不可不為擇師傳賓客又復效呂氏大事也於是選士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人史外戚世家雋不疑名重朝廷大將軍霍光欲以女妻之不疑固辭不肯當前漢本傳霍顯之謀將行於杯杓荊軻之變必起於帷幄西漢息夫躬傳張釋之曰豈效嗇夫喋喋利口捷給哉以口辨而超遷之臣恐天下隨風而靡本傳安不忘危盛必慮衰前漢陳湯傳梁商常曰多藏厚亡為子孫纍每租奉到及兩宮受賜便置中門外未嘗入藏悉分與昆弟中外西漢本傳互入好施一脛之大幾如腰一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為痼疾後雖有扁鵲不能為已漢書賈誼傳班昭女誡云生男如狼猶恐其尫生女如鼠猶恐其虎東漢列女傳梁冀既誅李固子燮乃還鄉里姊戒燮曰吾家血食將絶弟幸得濟豈非天耶宜杜絶衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已通鑑漢桓紀北海王袞謹慎好學文學防輔遂具表稱陳袞美袞聞之太驚懼責讓文學曰修身自守常人之行耳而諸君乃以上聞是適所以增其負纍也通鑑三國魏文互入保身李豐年十七八已有清名海內翕然稱之其父太僕恢不願其然故使閉門斷客通鑑魏高貴鄉公曹冏曰末大必折尾大不掉尾同於體猶或不從況非體之尾其可掉哉通鑑晉武欲使羊祜臥護諸將祜曰取吳不必臣行但既平之後當勞聖慮耳通監晉紀初何曾侍武帝宴退謂諸子曰主上開創大業吾每宴見未嘗聞經國遠圖及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎通鑑晉懷紀王猛寢疾堅親至猛第訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣沒之後願勿以晉為圖鮮卑西羌我之仇敵終為人患宜漸除之通鑑晉文紀謝瞻見弟晦門巷填隘曰勢傾朝廷豈門戶之福耶通鑑晉安帝紀下王晏外弟尉氏阮孝緒亦知晏必敗晏屢至其門逃匿不肯見嘗食醬美問知得於晏家吐而覆之通鑑齊高宗紀互入免禍外表魏主疾甚謂司徒協曰社稷所倚惟在於汝霍子孟諸葛孔明以異姓猶受顧託況汝親賢可不勉之協泣曰昔周公大賢成王至明猶不免疑而況臣乎如此則陛下愛臣更為未盡始終之美通鑑齊東昏侯高歡曰堪敵侯景者惟有慕容紹宗我故不貴之留以遺汝通鑑梁高祖終恐尾大於身踵粗於股倔彊不掉很戾難馴通鑑同前梁太子於玄圃自講老莊何敬容謂學士吳孜曰昔西晉祖尚玄虛使中原淪於胡羯今東宮復爾江南亦將為戎乎通鑑梁高祖淮南長鯨雖云授首襄陽短狐未全革面通鑑梁高祖齊顯祖嗜酒成疾不復能食自知不能久謂李后曰人生必有死何足致惜但憐正道尚幼人將奪之耳又謂常山王演曰奪則任汝慎勿殺也通鑑梁高祖北齊王晞曰人王恩私何由可保萬一披猖求退無地非不好作要官但思之爛熟耳通鑑陳世祖齊左丞斛律金長子光為大將軍次子羡及孫封侯顯貴者甚衆門中一皇后二太子妃三公主事齊三世貴寵無比然金不以為喜嘗謂光曰我雖不讀書聞古來外戚鮮有能保其族者女若有寵為諸貴所嫉無寵為天子所憎我家宜以勳勞致富貴何必藉女寵也通鑑陳紀蘇威少有令名周晉公護強以女妻之威見護專權恐禍及己屏居山寺以諷讀為娛通鑑陳紀隋蔡王智積有五男止教讀論語孝經恐諸子有才能以致禍也同前人主誠能見可欲則思知足將興繕則思知止處高危則思謙降臨滿盈則思挹損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫通鑑唐太宗上既詔宗室群臣襲封剌史左庶子于志寧以為古今事殊恐非久安之道上疏爭之侍御史馬周亦上疏以為孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在欲留之也而欒黶之惡已彰向所謂愛之者乃適所以傷之也通鑑唐太宗上謂太子曰李世績才智有餘然汝與之無恩恐不能懷服我今黜之若其即行俟我死汝於後用為僕射親任之若徘徊顧望當殺之耳通鑑唐太宗沛王賢聞王勃善屬文召為修撰時諸王鬭雞勃戲為檄周王雞文上見之怒曰此乃交構之漸斥勃出沛府通鑑唐高宗上御翔鸞閣觀大酺分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推梨讓棗相親如一今分二朋遞相競誇俳優小人言辭無度恐其交爭勝負譏誚失禮非以崇禮義勸敦睦也通鑑唐高宗姚崇析資令諸子各有定分治令曰比見達官之裔多貪困至銖尺是競無論曲直均受嗤詆田宅水磑既共有之至相推倚以頓廢陸賈石苞古達者也亦先有定分以絶後爭新唐書本傳李績寢疾謂其弟司衛少卿弼曰我見房杜平生勤苦僅能立門戶遭不肖子蕩覆無餘吾有此子孫今悉付汝其有志氣不倫交遊非類者皆先撾殺通鑑吉頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子未立而外戚猶為王此陛下驅之使它日必爭兩不得安也通鑑唐武后二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産祿猶在草不去根終當復生二人曰大事已定彼猶機上肉耳夫何能為季昶歎曰吾不知死所矣劉幽求亦謂亙彥範敬暉曰武三思尚存公輩終無葬地若不早圖噬臍何及通鑑唐中宗互入先見古之智者皆不願受夷狄之惠蓋豫憂其求請無厭終為後患故也通鑑唐睿宗齊浣言葛福順典禁兵不宜與毛仲為昏毛仲小人寵過則生姦不早為之恐成後患又曰君不密則失臣願陛下密之通鑑張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之後適足為無賴子孫酒色之資吾不取之同上上召子儀還京師朔方將士樂子儀之寬憚光弼之嚴張用濟與諸將謀以精鋭突入東京逐光弼請子儀康元寶曰君以兵請郭公朝廷必疑郭公諷君為之是破其家也郭公百口何負於君乎用濟乃止通鑑唐肅宗郭子儀每見賓客姬妾不離側盧杞嘗往問疾子儀悉屏侍妾獨隱几而待之或問其故子儀曰杞貌醜而心險婦人輩見之必笑它日杞得志吾族無類矣通鑑唐德宗夫以匹夫愛其子猶知求明哲之師而教之況萬乘之嗣繫四海之命乎通鑑唐憲宗憂先於事故能無憂事至而憂無救於事通鑑同前互入警戒鄭注求為鳳翔節度使請禮部員外郎韋溫為副使溫不可或曰拒之必為患溫曰擇禍莫若輕拒之止於遠貶從之有不測之禍卒辭之通鑑唐文宗度支以用度不足奏借富戶及胡商財物敕借其半鹽鐵轉運使高駢上言天下盜賊蜂起皆出於飢寒獨富戶胡商未耳乃止通鑑唐僖宗楊涉當為宰相與家人相泣謂其子凝式曰此吾家之不幸也必為汝纍通鑑唐昭宗蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊讒間將興繕甲訓士非吾輩所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已通鑑後梁王互入保身崔琳盧從願兩人有宰相望元宗欲相之數矣以族大恐附離者衆卒不用新唐書崔儼傳帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙斂以瓦棺勿作石羊虎人馬惟刻石置陵前曰周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝通鑑周太祖集圖匱於豐防儉於逸潘嶽籍田賦留作功成身退地劉禹錫本朝李宸妃薨呂夷簡為相請厚葬之章獻怒公曰陛下不以劉氏為念臣不敢言尚念劉氏喪禮宜從厚呂夷簡行狀大書文字隄防老剩買田園准備間倦游録初議貶蔡確新州范忠宣謂呂汲公曰此路荊棘已七八十年吾輩開之恐自不免聞見録有非常之功聖人之所甚懼也雖有大功而不忘戒懼東坡士燮論經知周乎萬物易繫辭子知者無不知也當務之為急孟盡心下知者之舉事也滿則慮嗛平則慮險安則慮危曲重其豫猶恐及禍是以百舉而不陷也荀子智慮足以待百變同上智者明於事達於數荀大略智慮者禍福之門戶不可不謹也神者智之役神清則智明智者心之符智公則心平並文子史祭仲以智免左傳互入保身燕師長驅平齊田單走安平令其宗人盡斷其車軸末而傳鐵籠已而燕軍攻安平城破齊人走爭塗以轊折車敗為燕所虜唯田單宗人以鐵籠故得脫史本傳秦樗里子多智秦人號曰智囊史記秦之敗也豪傑爭取金玉任氏獨窖倉粟楚漢相距滎陽民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富西漢貨殖傳呂氏時事多故然平竟自脫以榮名終非知謀孰能當此者史陳平世家朝厝號曰智囊師古曰言其一身所有皆是智算西漢陳平智有餘西漢魯恭父康有權數號智囊後漢魯恭傳智略謀慮朝之淵藪後漢伏湛傳互入謀畫胡廣慮無失策舉無失事後漢本傳遠無所不見慮無所不周通鑑漢獻紀元文都謂盧楚等曰今讎恥未雪而兵力不足若赦李密罪使擊宇文化及兩賊自鬭吾徐承其弊化及既破密兵亦疲其將士利吾官賞易可離間并密亦可擒也通鑑唐高祖李密致書于唐高祖請步騎會河內太宗曰若不與是生一隋唐書李密傳房元齡每陳事千里猶對面語唐書本傳裴度歷事四朝不遺廟算唐書傳記耿純率宗族歸光武恐半有不同焚燒廬舍絶其反顧之望東觀漢紀天下無窮者才智也陳平出六奇恐禍及己陸賈教之交歡太尉又為畫呂氏數事平從之卒誅諸呂則賈之智謀又在平之右矣孔氏雜說互入強復遇強集持籌而算萬不失一枚乘七發智刃所由日新選寺碑
