body:
  text: 神速經如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征國詩常武子發如風雨動如雷霆管子善用兵者動于九天之上孫子微乎微至於無形神乎神至於無聲同上良將如收電可見不可追抱朴子史先人有奪人之心軍之善謀也左文七年周亞夫擊吳楚趙涉曰兵事尚神密將軍出武關抵洛陽直入武庫諸侯聞之以為將軍從天而下也前漢周勃傳雷動風舉後發先至離合向背變化死生常以輕疾制敵也前漢岑彭至武陽繞出延岑軍後公孫述大驚以杖擊地曰是何神也後漢岑彭傳兵動若神前漢宣紀檄書有急即插鳥羽其上也後漢胸奴傳贊注此神兵從天而墮破之必矣晉書宣帝紀杜預曰兵威已振譬如破竹數節之後迎刃而解無復著手處也晉本傳變化若神同上吳孫歆與伍延書曰北來諸軍乃飛渡江也通監西晉武紀秦符登曰彼為何人去令我不知來令我不覺通監東晉武紀梁韋睿夜掘長塹樹鹿角截洲為城比曉而營立魏中山王英大驚以杖擊地曰是何神也通鑑梁武帝紀李光顏平劍南搴旗蹈軍出入若神唐書傳記指顧之間擒摘如神太公六韜用兵之道如疾雷不及掩耳卒電不暇瞑目同上集我軍過若駭鯨之決細網奔兕之觸魯縞選書四校橫徂星流彗掃文選燕然碑摧群雄而電擊選弔文風馳羽檄選行狀身輕一鳥過鎗急萬人呼杜詩兵之情惟主速乘人之不及李衛公兵法子善用兵者感忽悠暗莫知所從出荀子議兵凡戰者以正合以奇勝故善奇者無窮如天地不竭如江海終而復始日月是也死而更生四時是也孫子飛鳥之鷙也總其首猛獸之玃也匿其爪虎豹不外其牙噬犬不見其齒故用兵之道示之以柔而迎之以剛示之以弱而乘之以強為之以翕應之以張淮南子史秦人毒涇上流人多死左襄十四年晉與楚戰晉胥臣蒙馬以虎皮先犯於陳蔡狐毛設二旆而退之欒枝使輿曳柴而偽遁左僖二十八年晉伐齊齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必旆而疏陳之使乘車者左實右偽以旆先輿曳柴而從之齊侯見之畏其衆也乃脫歸左襄十八年燕使騎劫代樂毅齊田單收城中得千餘牛為絳繒衣畫五綵龍文束兵刃於其角灌脂束葦於其尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍所觸盡死傷因擊之大敗復齊七十餘城史記本傳魏與趙攻韓告急於齊使田忌將直往而走大梁魏將龐涓聞之去韓而歸齊孫臏使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龐涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃與輕鋭倍日併行逐之史記趙括擊秦武安軍張二奇兵以劫之趙括不利通監第五卷韓信擊趙乃使萬人先行出眥水陳趙兵望見大笑開壁擊之大戰信棄鼓旗走水上軍皆殊死戰不可敗趙破斬成安君通監漢高紀楚龍且與韓信夾濰水陳信乃夜令人為萬餘囊盛沙壅水上流引兵半度擊龍且陽還走龍且追信信使人決壅囊水大至龍且兵太半不得度即擊殺龍且西漢韓信傳韓信擊魏王豹信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌渡軍襲安邑通鑑漢高紀李廣擊胸奴令曰下馬解鞍其騎曰虜多且近即有急奈何廣曰彼虜以我為走今皆解鞍以示不走用堅其意於是胡騎遂不敢擊史記本傳臧宮為輔威將軍將兵屯越時公孫述將任滿與岑彭相拒於荊州宮兵少力不能制會屬縣送委輸數百乘至宮夜使鋸斷城門限令車聲回轉出入至旦越人伺候者聞車聲不絶而門限斷遂破荊門滅公孫述後漢北胸奴大入雲中太守廉范拒之吏以衆少欲移書傍郡求救范不許會日暮范令軍中蓐食晨往赴之斬首數百級通鑑漢明紀虞詡為武都太守不滿三千兵羌衆萬餘圍之詡陳兵從郡東郭出北郭入貿易衣服回轉數周虜恐而退設伏邀之大敗後漢虞詡有將帥之略以為武都太守羌衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃鈔傍縣倉詡因其兵散日夜進道兼行百餘里令士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之兵法曰行不過三十里以戒不虞而今日且二百里何也詡曰虜衆吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強勢有不同故也通監漢殤紀胡遵諸葛誕攻東興吳將丁奉見其前部兵少乃使兵皆解鎧去矛戟但兜鍪刀楯倮身緣場魏人望見大笑之不即嚴兵吳兵得上便鼓譟斫破魏前軍魏軍驚擾散走通監魏邵陵厲公馬隆擊樹機能出敵不意夾道纍磁石賊負鐵鎧行不得前隆卒悉被犀甲無所留礙咸以為神晉書江逌為殷浩長史時羌及丁零叛浩軍懼令逌擊之逌謂將校曰今兵非不精而衆少於羌且其塹柵甚固難與校力吾當以計破之乃取數百雞以長繩繫火於足群雞駭飛散集姚襄營火發因其亂而擊之敗同上檀道濟與魏戰食盡軍士有亡降魏者具告之魏人追之衆恟懼將潰道濟夜唱籌量沙以所餘少米覆其上及旦魏軍見之謂道濟資糧有餘以降者為妄而斬之時道濟兵少魏軍甚盛道濟命士皆披甲己白服乘輿徐出魏人以為有伏兵不敢逼道濟全軍而返通鑑宋文帝紀賀若弼請緣江防人每交代之際必集廣陵於是大列旗幟營幕被野陳人以為隋兵大至急發兵為備既知防人交代其衆復散後以為常不復設備又使兵緣江時獵人馬喧譟故弼之濟江陳人不覺通鑑隋高祖權奇間出隋楊素傳突厥達頭可汗犯塞長孫晟以突厥飲泉易可行毒因取諸藥毒水上流突厥人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級通監隋高祖柴紹擊吐谷渾虜據高射紹軍士皆失色紹安坐遣人彈琵琶二女子舞虜疑之休射而觀紹伺其懈掩擊虜大潰唐書阿史那元珍入寇王方翼被詔進擊時軍無完鎧方翼斷六板畫虎文鉤聯解合賊馬忽見奔駭遂大敗同上傳記形人而我無形此乃奇正之極七書能因敵變化以取勝謂之神五行無常勝四時無常位日有長短月有死生經元戎十乘以先啓行小雅史頴考叔取鄭伯之旗蝥弧以先登瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登左隱十一年金鼓以聲氣也左僖二十二年軍志曰先人有奪人之心左宣十二年齊侯賞犁彌辭曰有先登者臣從之晢幘而衣貍製公使視東郭書曰乃夫子也左定九年祭彤為遼東太守彤有勇力虜每犯塞常為士卒先鋒數破走之通鑑漢光武紀鄧艾伐蜀山高谷深至艱險艾以氈自褁推轉而下將士皆攀木緣崖魚貫而進先登至江油魏志本傳高麗率兵二十五萬來拒戰薛仁貴自恃驍勇欲立奇功乃異其服色著白衣腰鞬兩弓大呼先入所向無前賊盡披靡太宗遙望見之問先鋒白衣者為誰引見賜馬絹舊唐書本傳張巡每戰將士或退散巡立於戰所謂將士曰我不離此汝為我還決之將士莫敢不還死戰通鑑唐肅宗紀李晟每與賊戰錦衣繡帽指顧陳前唐書本傳馬璘單騎先士卒奮擊俘斬千計通鑑唐代宗紀李訴至蔡州城下李祐李忠義钁其城為坎以先登壯士從之同上唐憲宗紀集振臂一呼爭為先登李少卿突刃摧鋒為士卒先曹子建自試首啓戎行選九錫文將秉先登羽選從軍詩決命爭首陷陳摧凶陳子昂集張軍心以吞敵奮士力而指縱白傳集裂裳而千里來應左袒而一呼皆至柳文史吳起善用兵廉平盡能得士心史記本傳李廣為人廉得賞賜輒分其麾下飲食與士共之通監漢武紀魏尚為雲中守軍市租盡以饗士卒史馮唐傳諸葛亮軍無私蜀志世祖問諸將所得物唯李忠無所略世祖賜所乘驪馬及繡被後漢鄧艾為大將二十餘年素儉不治私妻子不免飢寒蜀志羊祜入吳境刈榖為糧送絹酬之晉書後周于謹伐梁收其府庫珍寶得宋渾天儀梁日晷銅表魏相風烏銅蟠螭蚨大玉徑四尺圍七尺及諸輿輦法物以獻軍無私焉北史本傳李績得金帛盡散之士卒一毫之費必用於戈矛白傳集子視卒如嬰兒故可與之赴深溪視卒如愛子故可與之俱死孫子史楚子伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左宣十二年昔闔廬在軍熟食者分而後敢食其所嘗者卒乘與焉左哀九年士卒次舍并竈飲食問疾尋藥身自拊循之悉取將軍之資糧享士卒身與士卒平分糧食史穰苴傳吳起為將與士卒最下者同衣食臥不設席行不騎乘親褁贏糧與士卒分勞苦卒有病疽者起為吮之史本傳田單身操版鍤與士卒分功妻妾編於行伍之間同上孟舒守雲中士爭臨城死敵如子為父西漢田叔傳李廣士卒咸樂為之死士卒多樂從廣飲食與士共之史本傳廣之將兵乏絶之處見水士卒不盡飲廣不近水士卒不盡食廣不嘗食寬緩不苛士以此愛樂為用同上仁愛士卒號令不煩師徒鄉之史李將軍傳序李陵得人之死力西漢本傳蓋寬饒為衛司馬躬撫士卒及交代衛士數千人願自留一年報寬饒厚德前漢本傳軍士皆言願屬大樹將軍後漢馮異傳謝尚為建武將軍始到官郡府以布四十匹為尚造烏布帳尚壞之以為軍士襦褲晉書本傳北齊斛律光為大將軍卒中蠱親嘗其吐三軍感之三國典略李抱真曰朔方將士思子儀如子弟之思父兄通鑑唐代宗紀上謂郭子儀曰聞朔方將士思公如枯旱之望雨同上郭子儀如邠州僕固懷恩之衆數萬悉歸之咸鼓舞涕泣喜其來而悲其晚也同上李晟善於撫御與士卒同甘苦人樂從之通鑑唐德宗紀烏重胤死軍士皆割股肉以祭重胤唐書傳記越王勾踐伐吳客有獻醇酒一器王使人注上流使士卒飲下流味不加喙而戰自五也異日又獻一囊糧者王又使以賜軍士分而食之甘不踰嗌而戰自十也列女傳軍不舉火將亦不食六韜良將之養士也不易於身故能使三軍為一心三略軍并未達將不言渴軍竈未炊將不言飢軍幕未辦將不言倦冬不服裘夏不操扇是謂禮也同上為將冬日不衣裘夏日不操扇天雨不張蓋呂氏春秋集願得受號令者以億計文選經伯也執殳為王前驅詩伯兮子甲胄生蟣蝨淮南子道應訓史居戲下無所知名韓信傳李廣以良家子從軍史本傳尺籍伍符史馮唐傳鞮鍪即兜鍪也生蟣蝨介胄被沾汗西漢楊雄傳甲胄生蟣蝨弓弩不得弛東漢朱馮傳一介鷹犬效力戎行後周集鋒鏑縱橫魏都賦朝食不免胄夕息常負戈陸機從軍詩名編壯士籍不得中顧私選華林園詩邊郡未和負羽從軍選別賦旦聞羽檄飛夕見邊驛奔劉義榮詩從軍古云樂談笑清油幕韓文用進士從軍同上神道碑各拋筆硯誇旄銊莫遣文星讓將星劉賓客集結髮從軍李文饒史自漢擊胸奴廣未嘗不在其中史李廣傳李廣曰廣結髮與胸奴大小七十餘戰史本傳向寵曉暢軍事諸葛亮出師表胡奮少練軍事晉起居注斛律金行兵用胸奴法望塵知馬步多少嗅地知軍度遠近通監梁高祖唐宋璟練習邊事通鑑唐武后紀李晟曰吾生長西陲備諳虜情通鑑唐德宗紀劉南金練習軍旅同上唐順宗集久在軍門悉知邊事白傳集結髮從軍擁旄為將李文饒夙精戎韜素習軍旅唐文粹經歸馬于華山之陽放牛于桃林之野書武成載戢干戈載櫜弓矢詩時邁馬散之華山之陽而弗復乘牛散之桃林之野而弗復服倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也散軍而郊射而貫革之射息也裨冕搢笏而虎賁之士説劍也記樂記子鑄劍戟為農器家語致思篇定三革偃五兵荀子儒效史止戈為武左宣十二年按甲休兵西漢戢弓矢而散馬牛光武紀櫜弓臥鼓後漢偃武息戈東漢投戈講藝息馬論道後漢樊準傳戴白不見兵革武功立而干戈戢威械藏而俎豆布同上馬融傳集洗兵海島刷馬江洲振旅䡘䡘反旆悠悠文選按甲養威選辨亡下戢戈以柙刃選賦偃甲辭軒銷金罷刃選詩序虹旌攝麾以就卷選賦休兵歸馬卷旗臥鼓晉穆帝哀策文寢黑山之析包青海之戈唐蘇晉三傑詩序安得壯士挽天河淨洗甲兵長不用杜詩青海無傳箭天山早挂弓同上皇帝在宥天下鑄五兵為農器栖萬姓於壽域獨孤文本朝羌兵自此無傳箭漢甲如今不解纍介甫經執訊獲醜薄言旋歸詩出車王師大獻則令奏凱樂周禮大司樂若師有功則左執律右秉銊以先愷樂獻于社周禮大司馬史晉文公敗楚於城濮振旅凱以入于晉獻俘授馘飲至大賞左僖公二十八年集折衝分閫愧非式遏之才榮耀自天猥辱專征之賜呂和叔文觸刃突鋒未為效節膏原潤草豈足酬恩柳文經邦饗孤子孤子者死王事者之子也周禮外饔篇以其財養死政之老與其孤周禮司門史齊侯伐晉夷儀敝無存先登求自門出死於霤下齊侯謂夷儀人曰得敝無存者以五家免乃得其尸公三襚之與之犀軒與直蓋而先歸之坐引者以師哭之親推之三左定九年公為與其嬖僮汪踦乘皆殯孔子曰能執干戈以衛社稷可無殤也左哀十二年齊師將興陳成子屬孤子三日朝屬會死事者之子使朝三日以禮之設乘車兩馬繫五邑焉召顏涿聚之子晉曰隰之役而父死焉今君命女以是邑也服車而朝無廢前勞左哀三十七年取從軍死者之子養羽林官教以五兵號曰羽林孤兒少壯令從軍前漢宣紀集身與煙消名與風興選陸七衡頌無由覩雄略大樹日蕭蕭杜詩落梅笛怨細柳營空猶嘶戰馬永挂長弓劉長卿前軍落大星白樂天本朝將星飛墜漢番驚森森氣與秦山在奄奄魂隨壟水傾塞路簫笳悲部曲海天風雨濕銘旌堪嗟未勒燕然石遽失連雲萬里城參寥子詩屢試干將羌破膽忽摧梁木士沾巾同上
