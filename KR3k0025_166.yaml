body:
  text: 著書經芟夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立教尚書序研精覃思慱考經籍採托群言以立訓傳約文申義敷暢厥旨庶幾有補於將來同上子孔子自衛反魯然後樂正雅頌各得其所乃刪詩定書繫周易作春秋孟子退自齊梁述堯舜之道而著作焉此大賢擬聖而作者也孟子序孟子與高第弟子公孫丑萬章之徒難疑答問又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字包羅天地揆敘萬類仁義道德性命禍福燦然靡所不載帝王公侯遵之則可以致隆平頌清廟卿大夫士蹈之則可以尊君父立忠信守志厲操者儀之則可以崇高節抗浮雲有風人之托物二雅之正言可謂直而不倨曲而不屈命世亞聖之大才者也同上余之抄略譬猶摘翡翠之藻羽脫犀象之牙角抱朴子文中子曰甚矣王道難行也吾家頃銅川六世矣未嘗不篤於斯然亦未嘗得宣其用退而咸有述焉則以志其道也蓋先生之述曰時變論六篇其言化俗推移之理竭矣江州府君之述曰五經決録五篇其言聖賢製述之意備矣晉陽穆公之述曰政大論八篇其言帝王之道著矣同州府君之述曰政小論八篇其言王霸之業盡矣安康獻公之述曰皇極讜義九篇其言三才之去就深矣銅川府君之述曰興衰要論七篇其言六代之得失明矣文中子子謂董常曰吾欲修元經稽諸史論不足徵也吾得皇極讜義焉吾欲續詩考諸集記不足徵也吾得時變論焉吾欲續書按諸載録不足徵也吾得政大論焉文中子史老子著書上下篇言道德之意五千餘言史本傳莊子著書十餘萬言大抵率寓言其洸洋自恣以適己史本傳韓非作孤憤五蠹內外儲説林説難十餘萬言史本傳蒯通論戰國時説士權變亦自序其説凡八十一首號曰雋永西漢蒯本傳虞卿非窮愁亦不能著書以自見於世史本傳陸賈著書號曰新語每奏一篇高帝稱善史陸賈傳公孫弘著公孫子言刑名謂字直百金也漢書公孫弘傳淮南王安為人好書鼓琴不喜弋獵狗馬馳騁招致賓客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言前淮南王傳百三十篇五十二萬六千五百字為太史公書序略成一家言協六經異傳齊百家雜語藏之名山副在京師史記太史公自序究天人之際通古今之變成一家之言史司馬遷自序劉向以為王教由內及外自近者始於是採取詩書所載賢妃貞婦興國顯家及孽嬖亂政者序次為列女傳凡八篇及採傳記行事著新序説苑凡五十篇通監漢成帝紀楊雄欲以文章成名於後世作法言訓纂離騷四賦前漢傳劉歆集六藝群書種別為七略西漢劉本傳班彪著王命論東漢班本傳班固所著典引賓戲應譏詩賦銘誄頌書文記論議六言在者凡四十一篇東漢本傳王符隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論同上王通隋蜀郡司戶書佐大業末棄官歸以著書講學為業依春秋體例自獲麟後歷秦漢至於後魏著紀年之書謂之元經又依孔子家語楊雄法言例為客主對答之説號曰中説皆為儒士所稱唐書王勃傳歐陽詢作藝文類聚一百卷唐書本傳傳記呂不韋為秦相國集諸儒使著其所聞為十二紀八覽六論合十餘萬言名為呂氏春秋暴之咸陽市門懸千金於上有能增損一字者與之金時人無能增減説者以為非不能也蓋憚相國畏其勢耳然其書以道德為準的以無為為紀綱以忠義為品式以公方為檢格與孟軻孫卿相表裏也秋氏春帝命虞世南等四十人選文章自楚詞訖大業共為一部五千卷號文章總集大業拾遺虞世南於省後堂集群事可為文用者號北堂書抄唐劉餗傳記古者著述多矣雖復門千戶萬波委雲集而言皆瑣碎事必叢殘固難以接光塵於五傳並輝烈於三史史通強著一書受嗤千載同上淮南子牢籠天地慱極古今同上集記事者必提其要纂言者必鉤其玄韓文進學解平生十萬篇金薤垂琳琅仙官勑六丁雷霆下取將流落人間者太山一毫芒韓文調張籍傳互入文章著書十餘年幽賾靡不推柳文著書者蓋道充積厄摧於時身處卑下澤不能潤物恥灰泯而燼又無聖人為之發明故假空言是非一代以傳無窮自光耀於後李習之本朝白居易作六帖以陶家餅數千各題門目作七層架列齋中命諸生求集事類投中倒取抄録成書故記代無次談苑載正觀中魏證撰文思慱要一千二百卷義出六經事兼百氐究帝王之則極聖賢之訓墳典之苑囿文章之江海晏公類要姚鉉責居連州常寫所著文粹一百卷好事者於縣建樓貯之官屬多遣吏寫録吏以為苦以鹽水噀之冀其速壞縱火焚樓胡訥見聞録劉中山見徐堅初學記愛其書曰非止初學可為終身記春明退朝録孔子年六十八歲乃始刪詩定書繫周易作春秋只數年間了卻一生著述蓋是時學問成矣涉世深矣故其述作始可為萬世法譬如積水千仞之源一日決之滔滔汨汨直至于海其源深矣若夫潢潦之水乍盈乍涸終不能有所至者其源淺矣古人著書多在暮年蓋為此也劉器之子或問賦曰童子雕蟲篆刻壯夫不為楊吾子篇詩人之賦麗以則辭人之賦麗以同上世謂王充所著文時有小疪猶鄧林枯枝滄海流芥未易貶者抱朴子房元齡問文子曰古之文也約以達今之文也繁以塞文中子事君篇謝靈運小人哉其文傲君子則謹沈休文小人哉其文冶君子則典鮑昭江淹古之狷者也其文急以怨吳筠孔圭古之狂者也其文怪以怒謝莊王融古之纖人也其文碎徐陵庾信古之夸人也其文誕或問孝綽兄弟子曰鄙人也其文或問湘東王兄弟子曰貪人也其文繁謝眺淺人也其文捷江總詭人也其文虛皆古之不利人也子謂顏延之王儉任昉有君子之心焉其文約以則文中子史左氏艷而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗穀梁子序屈平之作離騷蓋自怨生也國風好色而不小雅怨誹而不亂若離騷者可謂兼之矣史記屈原傳相如雖多虛辭濫説然要其歸引之於節儉此與詩之風諫何以異楊雄以為靡麗之賦勸百而諷一猶騁鄚衛之聲曲終而奏雅西漢司馬相如贊枚皋為文疾受詔輒成故所作多司馬相如善為文而遲故所作少而善於皋西漢枚皋傳其文骫骳不甚間雅同上二班懷文裁成帝墳比良遷董兼麗卿雲後漢班固贊孔璋章表殊健微為繁富公幹有逸氣但未遒耳元瑜書記翩翩致足樂也仲宣獨自善於詞賦惜其體弱不起其文至其所善古人無以遠過也魏書孔璋傳張説與徐堅論近世文章曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨如孤峰絶岸壁立萬仞濃雲鬱興震雷俱發誠可畏也若施於廊廟則駭矣閻朝隱如麗服靚粧燕歌趙舞觀者忘疲若類之風雅則罪人矣堅問今世奈何説曰韓休之文如大羹元酒有典則而薄滋味許景先如豐肌膩體雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊杯玉斝雖爛然可珍而多玷鈌堅謂篤論唐書唐有天下三百年文章無慮三變高祖太宗大難始夷沿江左餘風製句繪章揣合低昂故王楊為之伯元宗好經術群臣稍厭雕琢索理致崇雅黜浮氣益雄渾則燕許擅其宗是時唐興已百年諸儒爭自名家大曆貞元間美才輩出嚌嚅道直涵泳聖涯於是韓愈唱之柳宗元皇甫湜李翱等和之排逐百家法度森嚴抵轢晉魏上軋漢周唐之文全然為一王法此其極也若侍從酬奉則李嶠宋之問沈佺期王維制册則常袞楊炎陸贄權德輿王仲舒李德裕言詩則杜甫李白元稹白居易劉禹錫譎怪則李賀杜牧之李商隱皆卓然以所長為一世冠唐書文藝傳序葛洪稱機文猶玄圃積玉無非夜光焉五河之吐流泉源如一焉其弘麗妍贍英鋭漂逸亦一代之絶乎晉書陸機傳晉孫綽重張衡左思之賦每云三都二京六經鼓吹也晉書文章者情性之風標神明之律呂漢書文苑傳元魏祖瑩嘗語人曰文章須自出機抒成一家風骨何能共人同生活也北史祖本傳筆有餘力詞無竭源南史文學自漢至魏四百餘年文體三變相如工為形似之言二班工於情理之説子建仲宣以氣質為體所始莫不同祖風騷沈休文宋書謝虛運傳江左宮商發越貴於清綺河朔詞義正剛重乎氣質隋書文學傳序梁自大同之後爭馳新巧簡文湘東啓其淫放徐陵庾信分路揚鑣音淺而繁文匿而彩詞尚輕險情多哀思同上永嘉以來玄風既扇辭多平淡文寡風力隋經籍志張説曰楊盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前謙也舊唐書陽炯李商隱能為古文不喜偶對從令孤楚幕楚能章奏遂以其道授商隱自是始為今體章奏唐書文苑韓愈評其文曰雄深雅健似司馬子長崔蔡不足多也唐書柳宗元傳正元元和間以文學聳動縉紳之伍者宗元禹錫而已其巧麗淵博屬辭比事誠一代之宏材如俾之歌詠帝載黼黻王言足以平揖古賢氣吞時輩唐史臣舊劉柳傳李觀屬文不旁沿前人時謂與韓愈相上下陸希聲以為李觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老終不能加觀之辭觀後愈死亦不能加愈之質唐李觀傳其文鍛鍊精粹出入今古唐舒無輿許舍人之文雖乏峻峰激流然辭旨豐美得中和之氣唐許景先李石曰古人因事為文今人以文害事唐書傳渾涵汪茫兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣唐書杜甫傳卓然植立成一家言其原性師説等數十篇皆奧衍宏深與孟軻楊雄相表裏而佐佑六經云至它文造端置辭要不為蹈襲前人者然惟愈為之沛然若有餘至其徒李翱李漢皇甫湜從而效之遽不及遠其唐韓愈傳文章與時高下變態百出不可窮極唐藝文志愈以六經之文為諸儒唱障隄末流反刓以朴劃偽以真粹然一出於正刊落陳言橫騖別驅注洋大肆無抵牾聖人者唐書傳贊元和之後文章學奇於韓愈學澀於樊宗師歌行則學放於張籍詩則學矯激於孟郊學淺於白居易學淫靡於元稹俱名元和體大抵天寶之風尚黨犬曆之風尚浮貞元之風尚蕩元和之風尚怪也李肇國史裴子野論曰夫有逸群之才必思沖天之據蓋俗之量則憤常均之下其能守之以道將之以禮殆為鮮乎通監集仲宣獨步於漢南孔璋鷹揚於河朔偉長擅名於東土公幹振藻於海隅德璉發蹤於北魏足下高視於上京曹子建與楊修書魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁驥騄於千里仰齊足而並馳魏文帝論文文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後同上夫文本同而末異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同而能之者偏也唯通才能備其體文以氣為主氣之清濁有體不可強而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟魏文帝典論詩緑情而侈靡賦體物而瀏亮碑披文而相質誄纏綿而悽愴銘慱約而溫潤針頓挫而清壯頌優遊以彬蔚論精微而朗暢奏平徹以間雅説煒燁而譎誑陸機文賦其會意也尚巧其遣言也貴妍立片言而居要乃一篇之警策雖衆辭之有條必待茲而效績同上相如工於形似之言仲宣以氣質為體選賦序爛若縟繡悽若繁絃陸機文賦陶匏異器並為入耳之娛黼黻不同俱為悅目之玩梁昭明文選陳思之文章也譬人倫之有周孔鱗羽之有麟鳳音樂之有笙竽女工之有黼黻若孔子之門如用詩則公幹升堂思王入室潘陸自可坐於廊廡之間劉楨文體出於古詩仗氣愛奇動多震絶貞骨凌霜高風跨俗但氣過其文而雕潤恨少然自陳思已下楨稱獨步鐘嶸詩評屈宋已降為文者本於哀艷務於恢誕亡於比興柳冕集騷人起而淫麗興文與教分而為二柳冕論文處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戛戛乎其難哉韓文公文必出於己不蹈襲前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海函地負放恣橫從無所統紀然而不煩於繩削而自合也韓文樊宗師惟古於詞必己出降而不能乃剽賊後皆指前公相襲後漢迄今用一律韓文樊宗師墓志銘互見蹈襲龍文百斛鼎筆力可獨扛韓文詩天子曰王某之文最宜為誥有古風韓文王沖舒碑互見際遇為詞章泛濫停蓄深博無涯涘韓文柳子厚墓漢朝人莫不能為文獨司馬相如太史公劉向楊雄為之最然則用功深者其收名也遠若皆與世浮沉不自樹立雖不為當時所怪亦必無後世之傳也韓文劉正夫書夫和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作怕發於羈旅草野至若王公貴人氣得志滿非性能而好之則不暇以為韓文荊潭裴均楊憑唱和詩序登文章之録波及後代高視於萬物之中雄峙於百代之下柳論文書號為文章家柳上楊憑書漢魏風骨晉宋莫傳齊梁詩彩麗競繁而興寄都絶陳子昂集士大夫掉鞅於文囿者咸不得攀而倫之柳文唱和序文有二道辭令褒貶本乎著作者也導楊諷諭本乎比興者也著作者流蓋出於書之謨訓易之象繫春秋之筆削其要在於高壯廣厚詞正而理備謂宜藏於簡册者也比興者流蓋出於虞夏之詠歌商周之風雅其要在於麗則清越言暢意美謂宜流於謠誦者也二者考其旨意乖離不合柳子厚作楊評事集序商周之前文簡而野魏晉以降則蕩而靡得其中者漢氐漢之東則衰矣柳子厚作西漢文類序退之所敬者司馬遷楊雄遷於退之固相上下若雄者如太玄法言及四愁賦退之獨未作爾決作之加恢奇至他文過雄遠甚雄文遣言措意頗短局滯澀不若退之猖狂恣肆柳答韓珩書參之穀梁以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以慱其趣參之離騷以致其幽參之太史公以著其潔柳文騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎諫之文也自為一家不是正氣賈誼之文化成之文也鋪陳帝王之道昭昭在目司馬遷之文裁成之文也馳騁數千載若有餘力董仲舒劉向之文通儒之文也發明經術究極天人裴度與李翱書文之異在氣格之高下思致之淺深不在磔裂章句隳廢聲韻也同上文章如千兵萬馬風恬雨霽寂無人聲蓋謂是也李德裕文章論文之為物自然靈氣惚恍而來不思而至李德裕文章論八音與政通而文章與時高下三代之文至戰國而病涉秦漢而起漢之文至列國而病唐興復起夫政龐而土裂三光五嶽之氣分大音不完故必混而後一劉賓客柳文序唐定天下驟示以文韶英之音與鉦鼓相襲故起文章為大臣者魏文貞以諫諍顯馬高唐以智略奮岑江陵以潤色聞無草昧汗馬之勞而遇任在功臣上唐之貴文至矣同上得董生之詞杳如搏翠屏浮層瀾視聽所遇非風塵間物亦猶明金綷羽得于遐裔欲勿寶可乎其詞甚約而味奫然以長氣為幹文為支詞賦詔誥封章啓事歌詩贈箋金石揚功洪鐘駭聽瑤瑟清骨感人肺肝毛髮皆聳丹青景化焜耀藩方如非煙祥風緣飾萬物觀其發德音福生人沛然如時雨褒元老諭功臣穆然如景風命相之册和而莊命將之誥昭而毅已上並見劉賓客集李白尚不能歷其藩翰況堂奧乎元稹作杜子美墓志銘建武以還文卑質喪儷花鬭葉顛倒相尚及兄為之思動鬼神撥去其華得其本根關合怪駭驅濤湧雲六經之風絶而復新學者有歸大變于文李翱祭韓愈孔子歿二百歲而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成人之風長卿子雲之儔瑰詭萬變亦奇特之士也惜其王公大人之言溺於浮辭而不顯其後班張崔蔡曹劉潘陸隨波而作雖大雅不足然其遺風餘烈尚有典刑宋齊已來蓋憔悴逶迤陵頽流靡至于徐庾天之將喪斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣唐盧藏用論文
