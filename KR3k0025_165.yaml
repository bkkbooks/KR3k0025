body:
  text: 取信經人不問於其父母昆弟之言語先進言忠信行篤敬雖蠻貊之邦行矣語衛靈公子孔子厄於陳蔡七日不食子貢糴於野人得米一石焉顏回仲由炊之有埃墨墮飯中顏回取而食之子貢見之不悅以為竊食也入問孔子孔子曰吾信回之為仁久矣雖汝有聞弗以疑之其或者必有故乎召顏回問之對曰向有埃墨墮飯中欲置之則不潔欲棄之則可惜回即食之顏回出孔子顧謂二三子曰吾之信回久矣非恃今日也家語在厄篇其言於人也無所不信曾參也家語偃然如固有之而天下不稱貪焉荀儒效史晉叔向曰祁大夫外舉不棄讎內舉不失親其獨遺我乎襄二十一互入自信羊祜與陸抗相對抗嘗病祜饋之藥抗服之無疑心人多諫抗曰羊祜豈酖人者晉書羊祜傳通鑑云豈有酖人羊叔子哉君子謂祁奚能舉善稱其讎不為諂立其子不為比舉其偏不為黨左傳襄三年小邾射以句繹來奔曰使季路要我吾無盟矣季康子曰千乘之國不信其盟而信子之言子何辱焉左哀公十四年一字之褒踰華袞之贈片言之貶過市朝之撻穀梁序蘇秦相燕燕人惡之於王王按劍而怒食以駃騠白圭顯於中山中山人惡之於魏文侯文侯投之以夜光之璧何則兩主二臣剖心折肝相信豈移於浮辭哉史記得黃金百斤不如季布一諾前漢季布傳二荀論而久而益信魏志本傳得劉公一紙書賢於十部從事晉書劉弘傳上官桀黨與有讚霍光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毀者坐之自是桀等不敢復言通鑑漢昭紀黃瓊薨將葬四方遠近名士會者六七千人徐穉往弔之進酹哀哭而去人莫知者諸名士推問喪宰曰先時有一書生來衣麤薄而哭之哀不記姓字眾曰必徐孺子也通鑑漢桓紀吳主假太常潘濬節使討五溪蠻濬姨兄蔣琬為諸葛亮長史衛旍奏濬遣密使與琬相聞欲有自託之計吳王曰承明不為此也通鑑魏明紀龐晃等短高熲於上上怒皆黜之因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明通鑑隋高祖世民謂尉遲敬德曰公心如山嶽雖積金至斗知公不移通鑑唐高祖李緯為戶部尚書有自京師來者上問元齡何言對曰元齡聞李緯拜尚書但云李緯羹鬚鬢帝遽改除緯為洛州刺史通鑑唐太宗夏官侍郎李昭德密言於太后曰魏王承嗣權大重承嗣亦毀昭德於太后太后曰吾任昭德始得安眠通鑑唐武后周太祖推心委任蘇綽而無間言太祖或出游常預署空紙以授綽若須處分則隨事施行及還啟之而已通鑑魏武法尚峻令云京城有變九卿各居其府其後嚴才作亂與其徒屬數千人攻左掖門魏武登銅雀臺遠望無敢救者時王脩為奉常聞變召車馬未至便將官屬步至宮門魏武望見之曰彼來者必王脩乎權傾天下而朝不忌功蓋一世而上不疑唐書郭子儀傳一言之重訂千金唐李大亮傳傳記衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮下公門軾路馬今蘧伯玉賢者也必不以暗昧失禮公令人視之果如所言列女傳集殺青無兼兩之疑薏苡豈懷珠之謗王摠歐陽熲墓誌片辭貴白璧一諾輕黃金李太白集斯言勝金玉佩服無失墜白侍郎唯君飲冰心可酌貪泉水張承吉文笑言成月旦李義山集偉人一顧踰于華章一非慘乎黥刖劉賓客褒其一字有踰拱璧之利假以一言若垂章袞之榮唐文粹經沔彼流水朝宗于海詩沔水愛莫助之詩大雅烝民豈弟君子民之攸歸成大雅洞酌子巨室之所慕一國慕之一國之所慕天下慕之孟離婁下願受一廛而為氓孟滕文上君子若華山松柏既多望之自不知厭晏子春秋史楚葉公至或遇之曰君胡不冑國人望君如望慈父母焉盜賊之矢或傷君是絕民望也若之何不冑乃冑又遇一人曰君胡冑國人望君如望歲焉日月以幾若見君面是得艾也民知不死而又掩面以絕民望不亦甚乎乃免冑而進左哀十六裨諶曰天禍鄭久矣其必使子產息之乃猶可以戾定也不然將亡矣左襄二十九年楊回見趙簡子曰臣居鄉三逐事君五去聞君好士故走來見說苑相如至一坐盡傾西漢本傳歙然歸仁西漢康衡傳陳遵請求不敢逆所到衣冠懷之惟恐在後西漢本傳趙廣漢為京兆尹吏咸願為用僵仆無所避廣漢聰明皆知其能之所宜盡力與否通鑑漢宣紀士皆言願屬大樹將軍通鑑漢平紀願從陛下復借寇君一年通鑑漢光武大司徒歐陽歙坐前為汝南太守度田不實贓罪千餘萬下獄歙世受尚書八世為博士諸生守闕為歙求哀者千餘人至有自髡剔者平原禮震年十七求代歙死同上罷戊已校尉及都護官徵還班超于寘王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬腳不得前通鑑章紀張綱在郡一歲卒張嬰五百餘人為之制服行喪送到犍為負土成墳通鑑漢殤帝梁冀收李固下獄門生渤海王調貫械上書證固之枉河內趙承等數十人亦要鈇質詣闕通訴太后詔赦之及出獄京師市里皆稱萬歲同上客有言於何進曰孔文舉有重名不如因而禮之可以示廣天下後漢孔融傳注猶眾星之有北斗百穀之有黍稷天下莫不屬目也李膺等雖廢錮天下士大夫皆高尚其節而汙穢朝廷希之者唯恐不及更共相標牓為之稱號為三君八俊八顧八及八廚通鑑漢獻紀魯肅曰孫討虜敬賢禮士江表英豪咸歸附之同上劉豫州士慕仰若水歸海同前車駕南征寇恂從至穎川盜賊悉平百姓遮道曰願從陛下復借寇君一年上乃留恂東觀漢紀懷赴如歸後漢禹所止停車駐節父老童稚垂髮戴白滿其車下東漢鄧禹張楷居弘農山學者隨之所居成市范曄後漢齊魯間宗之東漢鄭玄傳犬馬戀主物不敢忘晉書石勒傳互見微小有知車胤害於賞會當時每有盛坐而胤不在皆云無車公不樂謝安遊集之日輒開筵待之晉書本傳互見宴會周顗曰何敢近捨明公王導遠希嵇阮晉書周顗傳溫嶠等至建康王導周顗庾亮等皆愛嶠才爭與之交通鑑漢晉元當效犬馬之用陳書蕭穎士有奴事穎士十年笞楚嚴慘或勸其去曰非不能愛其才也唐書互見僕從謝超宗公事免詣東府門自通其日風寒蕭道成謂四座曰此客至使人不衣自煖矣宋書竇建德陷京城執戶曹河東張玄素將殺之縣民千餘人號泣請代其死曰戶曹清謹無比大王殺之何以勸善通鑑太后思徐有功用法平擢拜左臺殿中侍御史遠近聞者無不相賀通鑑唐武后劉瞻為刑部尚書瞻之貶也人無賢愚莫不痛惜及其還也長安兩市人率錢雇百戲迎之瞻聞之改期由他道而入通鑑傳記漢韋約曰犬馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割三輔決錄集不勝犬馬之情選曹子建責躬詩表疲馬戀君軒選詩互見微小有知百川赴巨海謝靈運詩百川宗海渤五岳輔崑崙劉賓客傾巢舉落望德如歸選昭王碑白聞天下談士相聚而言曰生不用萬戶侯但願一識韓荊州何令人之景慕一至於此耶豈不以有周公之風躬吐握之事使海內豪俊奔走而歸之一登龍門則聲譽十倍所以龍蟠鳳逸之士皆欲收名定價於君侯李太白上韓荊州水深魚極樂林茂鳥知歸杜工部雖天地不求仁於芻狗而畎澮思委潤於滄溟白傳集小人之懷惠兮猶知獻其至愚固余異於牛馬兮寧止乎飲水而求芻伏門下之默默兮竟歲年以康娛時乘間以獲進兮顏垂歡而愉愉仰盛德以安窮兮又何忠之能輸韓復志賦惴惴焉惟恐不得出大賢之門韓文上宰相書介然而居士友以傾韓文王仲舒碑生徒皆喜曰韓公來為祭酒國子監不寂寞矣韓愈行狀鱗介宗龜龍郭有道碑本朝四方之至如歸其家樂而忘去既駕雖馬亦顧其皁而嘶東坡集神宗崩公赴闕臨衛士見公入皆以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之東坡集司馬溫公神道碑互見為世輕重經覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下記郊特牲子人必自侮然後人侮之家必自毀然後人毀之國必自伐然後人伐之孟子離婁上行有招辱荀勸學史蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中面梁書互見陵犯張玄祖八歲齒虧先達知其不常戲之曰君口復何為開狗竇荅云正使君輩從此中出劉昭幼童傳互見警悟劉道真遭亂於河側自牽船見一老嫗探櫓劉曰女子何不調機利杼而探櫓女荅曰丈夫何不跨馬揮鞭而牽船裴啟期語林互見婦言本朝孫皓為晉所滅武帝問皓曰聞南人好作爾汝詩皓曰昔與汝為鄰今與汝為臣勸汝一杯酒令汝壽萬春古今詩話
