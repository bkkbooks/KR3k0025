body:
  text: 能言不能行經靜言庸違書堯典有其言無其行君子恥之記雜記下互入言行相顧其言之不怍則為之也難語憲問子言不顧行行不顧言孟盡心下口言善身行惡國妖也荀大略孔子讀而儀秦行揚淵騫史群臣上言宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎何事污七十二代之編錄若郡縣遠遣吏上壽盛稱虛美必髡令屯田既上讀河圖會昌符幸泰山禪祭地於梁陰通監漢光武魏比年將帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懷雄圖銳氣一朝頓盡通監梁高祖牛僧孺口道先生語行如市人唐書本贊集遇客多言愛山水逢僧盡道厭囂塵玉潭泉畔松間宿要且經年無一人白樂天相逢盡道休官去林下何曾見一人唐僧靈徹詩經率履不越詩長發燕處則聽雅頌之音行步則有環佩之聲升車則有和鸞之音居處有禮進退有度記經解砥礪廉隅記儒行君子言不過辭動不過則記哀公問不戲色記少儀致禮以治躬則莊敬莊敬則嚴威記祭義君子無故玉不去身君子於玉比德焉記玉藻行中規還中矩記仲尼燕居君子不失足於人不失口於人是故貌足畏也色足憚也言足信也記表記互入持重今世行之後世以為楷記儒行君子矜而不爭語衛靈公子君子言有壇宇行有防表荀儒效為冠所以莊其首也為履所以重其足也衣裳襜如劍佩鏘如皆所以防其躁也文中子史斷斷自修整榖梁傳莊公如布帛之有幅左襄二十八年君子目以定體足以從之國語人之有冠猶宮室之有墻屋也糞除而已同上進退容止非禮不行西漢董仲舒霍光出入省殿門止進有常處郎僕射竊識眡之不失尺寸西漢本傳互入威儀矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表東漢張湛傳陳登處身循禮非法不行東漢陳球傳雖在燕居必以禮自整東漢仇覽君子當正威儀何有蓬頭跣足自謂宏達耶通監九十三謝弘微精神端審時然後言婢僕之前不妄語笑通監南史宋高祖傳記南山有文豹霧兩七日不下食者何也欲以澤其衣毛而成其文章也列女傳楊愔曰裴讓兄弟都無鄉音三國典略集余好脩以為常雖體解吾猶未變楚辭新沐者必彈冠新浴者必振衣同上與人有畛域不為戲狎韓文互入持重本朝趙光逢規矱自持孔六帖柳仲郢私居束帶正色同上經虎視耽耽易頤卦伊川云重其體貌也正色率下書畢命其容不改出言有章詩都人士坐如尸立如齊記曲禮上君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也記表記互入矜持君子之容舒遲足容重手容恭目容端口容止聲客靜頭容直氣容肅立容德色容莊記玉藻山立時行揚休玉色同上互入威儀不旁狎記少儀夫子時然後言人不厭其言樂然後笑人不厭其笑語憲問君子正其衣冠尊其瞻視儼然人望而畏之語堯曰互入威儀集與人有畛域不為戲狎唐文粹互入矜持本朝包孝肅未嘗有笑容人謂包希仁笑比黃河清筆談經欲敗度縱敗禮書太甲不矜細行書旅獒不知其秩常也詩賓之初筵載號載呶同上子猖狂妄行莊史使酒難近西漢李布傳數以酒失過丞相西漢灌夫跅弛之士西漢武紀師古曰無檢局也弛者放廢不遵禮度也儻𦳝音蕩西漢陳湯傳師古曰無行檢也為人佚音鐵蕩西漢揚雄傳不修廉隅以徼名當世同上何晏與夏侯玄荀粲王弼之徒競為清談尚虛無謂六經為聖人糟粕天下士大夫爭慕效之遂成風流通監魏邵陵厲公譙郡嵇康文辭壯麗好言老莊而尚奇任俠與陳留阮籍籍兄子咸河內山濤河南向秀琅琊王戎沛人劉伶特相友善號竹林七賢皆崇尚虛無輕蔑禮法縱酒昏酣遺落世事通監魏元紀放者因斯或悖吉凶之禮忽容止之表瀆長幼之序混貴賤之級甚者至於祼裎褻慢無所不至通監晉惠紀時王澄胡毋輔之等皆以放任為達或至祼體晉書樂廣傳武帝求婚於籍籍醉六十日不得言而止晉書阮籍傳鄰家少婦美色當壚沽酒籍嘗詣婦飲醉便臥其側籍既不自嫌其夫察之亦不疑也同上阮咸素幸姑之婢姑當歸於夫家初云留婢既而自從咸聞之借馬追既及與婢累騎而還晉書本傳王獻之卒徽之奔喪不哭直上靈床取獻之琴彈之晉書王徽之傳謝琨任達不拘鄰家高氏女有美色琨嘗挑之女投梭折其兩齒琨傲然長嘯曰猶不廢我嘯歌晉書本傳謝安愛好聲律朞功之慘不廢妓樂晉書王坦之秘書監謝靈運好稱疾不朝直或出郭遊行且二百里經旨不歸既無表聞又不請急以貴凌物物不服以威加人人不厭通監宋太祖溫廷筠薄於行無檢幅多作側辭艷曲唐書本傳脫冠露髻諠譁自恣通監唐莊宗傳記阮籍㛐嘗歸家籍相見與別人或譏之曰禮豈為我輩設耶世說王澄嘗之荊州送者傾邑所別樹上有鵲巢澄便脫衣著犢鼻上樹探鵲𪆪而弄之旁若無人晉中興書謝郎中云王修載樂託之性出自門風世說王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴同上互入無恥史丹儻蕩無檢阮籍不拘禮教孔白帖縱逸類華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時迴杜牧之為御史分務洛陽有李司徒者罷鎮閑居聲妓為當時第一嘗開筵以杜持憲不敢邀致杜遣客達意李馳書招之杜聞命遽來時女妓百餘人皆絕藝殊色杜獨坐南行住目瞪視引滿問李曰聞有紫雲者孰是李指示杜凝睇良久曰名不虛得宜以見惠李俯而笑諸妓亦皆回首破顏杜又自飲三爵即吟而起本事詩杜牧佐宣城幕聞湖州多奇麗往遊之剌史崔君張水嬉使州人畢觀令杜牧閱之牧因見一女娃期之曰吾不十年來守此郡不來從所適洎牧守湖州女已從人三載矣牧因賦詩曰自是尋春去較遲不須惆悵怨芳時雜說張祐客淮南幕中赴宴杜牧同坐有所屬意索骰子賭酒微吟曰骰子巡巡褁手拈無因得見玉纖纖祐曰但知報道金釵落髣髴還應露指尖摭言集觀古今文人類不護細行鮮能以名節自立魏文帝與吳質書幕天席地縱意所如文選酒德頌以莊老為宗而黜六經以虛薄為辨而賤名檢以放蕩為通而狹節信以苟得為貴而鄙居正以望空為高而笑勤恪于令升總論互入居邪惡正少年氣真狂有意與春競韓文野鳥終難縶元微之醉來擬共天公爭杜荀鶴酒腸寬似海詩膽大如天劉義本朝醉後麤狂膽滿軀東坡詩經威儀棣棣不可選也詩邶風威儀反反慎重威儀抑抑謹密並詩賓之初筵抑抑威儀維德之隅詩抑顒顒卬卬如圭如璋詩卷阿令儀令色詩烝民威儀容止宣著詩淇奧注端行頤霤如矢記玉藻直也朝廷濟濟翔翔君子之容舒遲同上山立時行揚休玉色同上注揚讀為陽互入持重赫兮咺兮者威儀也記大學趍進翼如也語鄉黨君子正其衣冠尊其瞻視儼然人望而畏之語堯曰互入持重容止可觀進退可度孝經子步中武象趨中韶濩荀大略君子貌重則有威揚史劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也左成十三年北宮文子有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家左襄三十一年君子在位施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也同上魯徐生善為容為禮官史儒林霍光每出入下殿門止進有常處郎僕射竊識視之不失尺寸西漢霍光傳互入矜持威儀之盛如圭如璋西漢班固敘傳進止皆有表識東漢馮異傳儀貌堂堂國之輝光東漢杜詩舒紳緩佩鳴玉以步綽有餘裕後漢蔡邕傳溫彥博進止詳華人拭目觀唐書張垍舉止都雅裴休為人醞藉進止雍閑馮定端凝若植權德輿動止外飾其醞藉風流為縉紳羽儀並同上集風儀與秋月齊明文選褚淵碑賀琛為散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之藝文志巉巖容儀削成風骨李白文風儀甚雅劉賓客日光玉潔李漢韓文序經而無望兮詩宛丘相鼠有皮人而無儀人而無儀不死何為詩相鼠威儀不類詩瞻卬威儀幡幡詩賓之初筵失威儀也史視流而行速左成六年邾子執玉高其容仰公受玉卑其容俯子貢曰高仰驕也卑俯替也驕近亂替近疾左定十五年張敞為京兆尹無威儀罷朝走馬章臺街自以便面拊馬西漢本傳羞怍俛首刮席不敢視東漢劉玄傳李程簡脫無威儀唐書本傳韓思彥儀矩梗野同上傳記王戎簡脫不持儀刑好乘巴𩥄馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之竹林七賢話
