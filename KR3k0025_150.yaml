body:
  text: 總敘學問經窮理盡性以至於命易繫辭君子學以聚之問以辨之乾卦學然後知不足記學記入學鼓篋孫其業也叩之以小則小鳴叩之以大則大鳴君子如欲化民成俗其必由學乎學者有四失或失則多或失則寡或失則易或失則止此四者心之莫同也並同上子曰學而不思則罔思而不學則殆語為政博學於文約之以禮顏淵子曰古之學者為己今之學者為人憲問互入趍向不同子孔子謂伯魚曰可以與人終日不倦者其惟學乎家語學問之道無他求其放心而巳矣孟子君子之學非為通也為窮而志不困憂而意不衰也宥坐真積力久則入學至乎沒而後止也君子之學也入乎耳著乎心布乎四體形乎動靜學者固學一之也一出焉一入焉塗巷之人也並同上史范獻子曰人之有學猶木之有枝葉也國語東方朔曰臣學書三冬足用漢書本傳遊乎六藝之囿馳騖乎仁義之塗覽觀乎春秋之林修容乎禮園翱翔乎書圃西漢司馬相如傳學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也晉虞溥傳陶鑄神情啓悟耳目北史魏常爽傳仲尼積學成聖唐書竇威傳傳記學者猶種樹也春玩其華秋取其實講説文章春之華也修身利行秋之實也顏氏家訓集肴核仁義之林藪班固典引茹古含今無有端倪皇甫湜撰韓愈墓志天然生知姿學立遊夏上杜詩沈潛乎訓義反復乎句讀磨礱乎事業而奮發乎文章韓文人之能為人由腹有詩書韓文學問藏之身身在則有餘同上經君子以自強不息易乾卦互見勉強君子進德修業欲及時也同上惟學遜志務時敏厥修乃來念終始典于學厥德修罔覺書説命下惟日孜孜無敢逸豫君陳夙夜強學以待問記儒行有弗學學之弗能弗措也有弗問問之弗知弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也中庸人一能之巳百之人十能之巳千之果能此道矣雖愚必明雖柔必強同上有匪君子如切如磋如琢如磨詩淇奧日就月將敬之學而時習之不亦説乎語學而子曰吾嘗終日不食終夜不寢以思無益不如學也學如不及猶恐失之泰伯吾見其進也未見其止也子罕日知其所亡月無志其所能子張博學而篤志切問而近思同上子流水之不腐以其逝故也戶樞之不蠹以其運故也子華子源泉混混不舍晝夜盈科而後進放乎四海孟離婁下用志不分乃凝於神列子黃帝好書者衆矣而倉頡獨傳者一也好稼者衆矣而后稷獨傳者一也好樂者衆矣而夔獨傳者一也倕作弓浮遊作矢而羿精於射奚仲作車乘杜作乘馬而造父精於御天下未嘗有兩而能精者也荀解蔽君子強學而力行揚子修身辰乎辰曷來之遲去之速君子競諸揚問明周公上聖日讀百篇仲尼天縱韋編三絶墨翟大賢載文盈車仲舒命世不窺園圃倪寬帶經以耘鋤路生截蒲以寫書黃霸桎梏以受業寧子夙夜以倍功抱朴子聞所不聞見所不見楊子宣尼臨沒手不釋卷仲舒垂卒口不輟誦有子惡臥自焠其掌蘇生患睡親錐其股以聖賢之性猶好學無倦劉子心若醉六經文中子史孔子晚喜易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣史孔子世家董仲舒耽學下惟讀書十年不窺園圃其精如此前漢本傳倪寬帶經而鋤同上舋舋不舍晝夜前漢張敞傳潛于篇籍以章厥身西漢班固敘傳枕經藉書西漢賓戲劉向專積思於經籍晝誦書傳夜觀星宿或不寐達旦西漢本傳榮學長安精力不倦十五年不窺家園後漢亘榮傳光武正旦朝賀禮畢令群臣能説經者更相詰義有不通輒奪其席戴憑遂重坐五十重故京師為之語曰解經不窮戴侍中後漢閉戶講誦絶人間事東漢耿恭傳昧毗櫛梳坐於客堂朝則誦羲文之易虞夏之書歷公旦之典禮覽仲尼之春秋夕則逍遙內階詠詩南軒百家衆氏投間而作洋洋乎其盈耳也煥爛乎其溢目也紛紛欣欣兮其獨樂也當此之時不知天之為蓋地之為輿不知世之有人已之有軀東漢延篤傳李固郃之子也少好學常改易姓名杖策驅驢負笈從師不遠千里遂究覽墳籍為世大儒每到太學密入公府定省父母不令同業諸生知其為郃子也通鑑漢安紀皇甫謐耽玩經籍忘寢與食時人謂之書淫晉書本傳車胤家不常得油夏日則綀囊盛數十螢火以照書以夜繼日晉書左思專思三都賦杜絶人事杜預耽思經籍為春秋左氏傳集解自言有左傳癖同上江泌隨月光讀書斜則握卷升屋南史李鉉以鄉里寡文集來遊京師讀所未見書北史本傳李雍自言讀書未遍願一見祕書李嶠曰祕閣萬卷豈時日能習耶雍固請乃假直祕書唐書杜佑嗜學雖貴猶夜分讀書柳仲郢嗜學嘗和熊膽丸夜咽以助勤同上陸龜蒙勤學卷不去手新唐書本傳傳記褚陶清淡間默以墳典自娛語所親曰聖賢備在黃卷中舍此何求世説中注善學者若齊王之食雞必也食其跖數千而後足呂氏春秋孫康家貧無油映雪讀書孫氏世録李頻曰只將五字句用破一生心北夢瑣言互入詩門劉向校書天祿閣夜有老人著黃衣植青藜杖授向五行洪範云我是太乙之精天帝聞金卯之子有博學者下而觀焉晉王嘉拾遺傳康衡勤學無燭鄰有燭乃穿壁引其光而讀之西京雜記管寧隱居好學藜床半穿高士傳張儀蘇秦傭書遇聖人之文無題記則以墨書掌內股裡夜還折竹寫之王子拾遺殷亮建武中為博士諸儒勝者賜席亮重席至八九帝曰學不當如是耶殷氏世傳集諷誦詩書百家之言唇腐齒落服膺不釋選東方朔答客難集螢映雪編蒲緝柳選薦表筆耕為養選表書禿千兔毫詩裁兩牛腰李太白集白髮死章句同上朝馳騖乎書林夕翱翔乎藝苑韓文復志賦互見頃刻不忘善口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其玄貪多務得細大不捐焚膏油以繼晷常兀兀以窮年韓文補苴鏬漏張皇幽眇尋墜緒之茫茫獨旁搜而遠紹古史散左右詩書置後前豈殊書蠹蟲生死文字間並同上平居雖寢食未嘗去書怠以為枕餐以飴口韓文公墓銘弋志書林咀風騷於七略耘情義圃偃圖籍於九流駱賓王屢益蘭膏燈猶研兔杖墨元稹集耽嗜文籍注意鑽礪柳文鑽仰沈研僅於不窺園井元微之集開卷有得便欣然忘食陶淵明集以道為飲以文為食皮日休集聰察嗜學不肯為凡夫劉賓客貫穿學問骨唐文粹退公猶筆耕劉賓客讀書眼欲暗秉筆手生胝白侍郎堯舜癯瘠大禹胼胝彼聖人焉吾一布衣耳不勤劬何以為妻子之天乎陸魯望猶波之委於瀆瀆之注於溟晝夜何曾知停息之時唐文粹本朝農馬智專吾不讓後山寄杜釋之詩騷人思苦骨巖巖欒城集天以日運故健日月以日行故明水以日流故不竭人之四肢以日動故無疾器以日用故不蠹東坡集尚有讀書清淨業未嘗春睡敵千鐘坡詩徐鉉黜邠州年七十手不釋卷常親隸書寫許慎説文一秩聖宋掇遺經不學墻面書周官雖有至道弗學不知其善也記學記玉不琢不成器人不學不知道學記互入矯揉人而不為周南召南其猶正牆面而立也歟語陽貨子曰有鄙夫問於我空空如也子罕困而不學民斯為下矣季氏子曰好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂子卜商反衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥於是衛以子夏為聖家語七十二子篇人而不學雖無憂如禽何楊子學行凡薄之徒懷空抱虛有似蜀人瓠壺之喻胸中無一紙之識不過酒炙所謂冒于貨賄貪於酒食左氏所載不才之子抱朴子互見不才史周原伯魯不説學閔子馬曰學殖也不學將落原氏其亡乎左昭十八互見識者所窺范獻子聘於魯問具山敖山魯人以鄉對獻子曰不為具敖乎曰先君獻武之諱也獻子歸曰吾名其二諱為笑矣唯不學也國語互見明於自知秦有司奏太白罰星東井秦分必有暴兵起京師秦主苻生曰太白入井自為渴耳何所怪乎通鑑晉紀江州刺史陳伯之目不識書得文牒辭訟惟作大喏而已通鑑百四十五梁高祖北齊源師攝祠部嘗白高阿那肱龍見當雩阿那肱驚曰何處龍見其色何如師曰龍星初見禮當雩祭非真龍也阿那肱怒曰漢見多事強知星宿遂不祭陳紀又見三國典略選人入等者六十四人上召面試之張奭手持紙終日不成一字時人謂之曳白唐元宗紀光不學無術西漢霍光傳生世不學其猶穴處何所見焉北史雷紹傳戶部侍郎蕭炅言蒸嘗伏臘為伏獵嚴挺之白張九齡曰省中而有伏獵侍郎乎唐嚴浚傳通鑑載李林甫無學術時選人嚴逈判語杕杜二字林甫不識謂吏部侍郎韋陟曰此云狀杜何也陟俯首不敢言唐書臧希讓無學術公卿間強引古言以自賢而所聞知多道途得之發必差謬為士子所笑同上任圜曰天下皆知崔協不識文字而虛有表號為沒字碑五代史任圜傳傳記韓昶退之子也性暗劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實互見不克紹霍光無學不知一經史通桓帝時有辟公府椽者倩人作奏記邯鄲氏笑林互見代筆張由古無學業對衆歎班固文章不入文選衆對以兩都賦燕然銘由古曰此是班孟堅非固也唐溫庭筠乾𦠆子李建勳羆相江南出鎮豫章一日遊西山田間茅舍有老叟教村童公觴于其廬連食數梨賓僚有曰梨號五藏刀斧不宜多食叟笑曰鶡冠子云五藏離別之離非梨也蓋離別胸懷有若刀斧遂就架取小册振拂以呈丞相乃鶡冠子也吳僧文瑩湘山野録江南有一權貴讀誤本蜀都賦注解蹲鴟芋也乃為羊字人饋羊肉答書云損惠蹲鴟北齊黃門侍郎顏之推顏氏家訓本朝太常少卿薑度生子李林甫手書慶之曰聞有弄麞之慶客視之掩口續世説
