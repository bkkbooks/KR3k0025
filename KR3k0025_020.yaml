body:
  text: 因惡纍美經今衆人之命儒也妄常以儒相詬病記儒行如有周公之才之美使驕且吝其餘不足觀已語泰伯子西子蒙不潔人皆掩鼻而過之孟子五穀者種之美者也苟為不熟不如荑稗同上告子上槃水正錯而勿動則湛濁在下清明在上足以見鬚眉而察理微風過之湛濁動乎下清明亂於上則不可以得大形之正也荀子蘭槐之根是為芷其漸之滫君子不近同上勸學篇注滫溺也水之性清所以濁者土渾之也林之性靜所以動者風搖之也人之性正所以邪者欲眩之也劉子河水欲清沙壤穢之淮南子史一薰一蕕十年尚猶有臭左傳莠盛苗穢何不鋤也西漢嚴延年傳忠如鬻拳信如卞和智如孫臏冤如巷伯才如史遷達如子政一離刀鋸沒世不齒東漢郭太傳涇以渭濁同上賈彪傳山有朽壤雖大必虧木有蠹蟲其榮易落唐史臣元宗贊集聯蕙芷以為佩兮過鮑肆而失香楚辭資高明之質而未免卑濁之纍選吊文青蠅一相點白璧遂成冤陳子昂集本朝君子小人如冰炭決不可以同器若兼收並用則小人必勝薰蕕雜處終必為臭東坡富鄭公神道碑性之有喜怒猶水之有波否曰湛然平靜如鏡者水之性也及過沙石或地勢不平便有湍激或風行其上便為波濤洶湧此豈水之性哉鳴道集子故雖有珉之雕雕不若玉之章章荀子法行百星之明不如一月之光十牖畢開不如一戶之明淮南子豹裘而雜不若狐裘而粹同上史趙良曰千羊之皮不如一狐之腋史記啇君傳鷙鳥纍百不如一鶚引文舉薦禰衡表一見西漢鄒陽傳玉以礫貞東漢賈彪傳傳記張臣魚者垂其千鉤而得之在於一筌捕高鳥者張其萬罝而獲之由於一目史通集雀喧知鶴靜高達夫經若苗之有莠若粟之有秕書仲氏之誥子飲玉飴則知漿荇之薄味抱朴子金篇集虎豹之文炳於犬羊鸞鳳之音鏘於烏鵲金玉之光炫於瓦石皇甫湜互見事物相形子矢人惟恐不傷人孟子史治獄之吏皆欲人死非憎人也自安之道在人之死通監漢宣紀互見其勢使然魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸撜書之比訖鬚髮盡白裁餘氣息還語子弟宜絶此法晉王獻之傳秦王符生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無他疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之通監晉哀紀太宗與侍臣泛舟春苑池見異鳥容與波上悅之詔坐者賦詩而召閻立本侔狀閣外傳呼畫師立本是時已為主爵郎中俯伏池左研丹粉望坐者羞恨流汗歸戒其子曰吾少讀書文辭不減儕輩今獨以畫見名與廝役等若曹慎毋習唐本傳本朝昔閻立本始以文學進身卒蒙畫師之恥東坡書吳道子畫後經于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不犮于弟書康誥互見無情子人有鬻矛楯者譽之曰吾楯之堅物莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以子之矛陷子之楯何如其人弗能應也韓非子使人之子孫自賊其父母也荀子議兵為人父而榷其子縱利如子何楊子寡見斷根以續枝割皆以裨腹抱朴子山生木反自刻木生蠹反自食人生事反自賊淮南子史楚昭王曰除腹心之疾而置諸股肱何益左哀六昔高辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討左傳助秦自攻史虞卿傳劉向受穀梁春秋其子歆乃大好左氏傳以左丘明好惡與聖人同親見夫子而公羊穀梁七十子後傳聞之與親見其詳略不同歆數以難向向不能非間也前漢書李固曰刻割心腹以補四支東漢本傳魏曹冏曰猶芟刈股肱獨任胸臆觀者為之寒心通監三國志刖趾適屨刻肌傷骨魏志借子之矛剌子之楯晉天文志唐高祖謂侍臣曰刻民以奉君猶割肉以充腹腹飽而身斃通監唐紀傳記漢書孝成紀贊曰成帝善修容儀升車正立不內顧臨朝淵默尊嚴若神可謂穆穆有天子之容貌矣又五行志曰成帝好微行選私奴客十餘人自稱富平侯或乘小車御者偕騎出入由斯而言則成帝魚服嫚遊鳥集無度雖外飾威重內肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者也史通班固稱項羽弒義帝自取夭亡又云于公高門以待封嚴母掃地以待喪如固斯言則深信夫天怨神怒福善禍者矣至於其賦幽通也復以天命久定非理所移故善惡無徵報施多爽斯則同理異說前後自相矛盾者焉同上集昆弟自相傾韋應物集肝膽反為賊文粹經或錫之鞶帶終朝三褫之易訟卦其車既載乃棄爾輔詩子惡辱而居不仁是猶惡濕而居下也孟子互入明知故犯惡死亡而樂不仁是猶惡醉而強酒同上互入明知故犯猶欲其入而閉之門也同上萬章下猶立枉木而求其影之直也荀子君道欲壽而刎頸同上強國篇伏而咶天救經而引其足經縊也引其足愈急也愈務而愈遠同上仲尼篇欲滅跡而走雪中淮南子譬如拯溺錘之以石救火投之以薪尹鄧子鄧析子篇病熱而強之以餐救暍而飲之以寒救經而引其索拯溺而授之石欲救之反為惡淮南子說林訓披裘而扇淮南子史今有二命其誰不解體左成八猶治絲而棼之也左傳互見躁急首尾衡決西漢賈誼傳行危而求安造禍而求福史荊軻傳濁其源而求其流清前禮樂志是猶紲韓盧而責之獲也班固傳時成帝無嗣政由王氏劉向遂上封事極諫王氏與劉氏不並立如下有泰山之安則上有纍卵之危向卒子歆王莽舉為侍中王莽持政留歆為右曹建平元年改名秀及王莽篡位歆為國師西漢本傳互入不克紹猶卻行而求及前人也楚元王傳欲湯之滄音愴悽愴之愴寒也一人炊之百人揚之無益也枚乘傳譬猶抱薪而救火同上狐白之裘而反衣之也匡衡傳互見愚暗並前漢自吉至崇皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣天下服其廉而怪其奢前漢王吉傳陳琳曰掩目捕雀通監劉炫曰相期高於周孔相待下於奴僕三國蜀志互見自相背馳郤愔遺桓溫箋欲共獎王室請督所部出河上愔子超為溫參軍取視寸寸毀裂乃更作愔箋自陳非將帥才不堪軍旅老弱乞間地自養勸溫并領已所統通監晉海西公紀互見趨向不同將適越者指沙漠以遵途欲登山者涉舟航而覓路所趣逾遠所向轉難南北倍殊高下相反求其至也不亦難乎晉武紀如室斯搆而去其鑿契如水斯積而決其隄防如火斯蓄而離其薪燎也晉書干令升總論崔浩性不好莊老之書每讀不過數十行輒棄之非毀佛法因欲修服食飬性術天師冠謙之有神中籙圖新經因師事之北史本傳張九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦徑然蕭軟美可喜方召蕭李泌在旁帥爾曰公起布衣以直道至宰相而喜軟美者乎唐書李泌傳伐根以求木茂塞源而欲流長同上魏證傳迂訪道之重築禮神之館捿心玄化物色幽人將致俗於大庭欲希蹤於姑射於是削浮圖之法懲游墯之民志欲矯步丹梯求珠赤水徒見蕭衍姚興之謬學不悟秦皇漢武之非求蓋惑於左道之言偏斥異方之說舊唐書武宗紀論武宗奮然除去浮圖之法而躬受道家之籙服藥以求長生新唐書本紀集絆良驥之足而責以千里之任檻猿猴之勢而望其巧捷之能吳季重書猶適于南而北轅其到也無日矣唐文粹北轅適楚圓鑿方枘北轅適楚南轅適晉猶航斷港絶潢以望至於海也並唐文粹經若苗之有莠若粟之有秕書仲氏之誥互入因精見粗惡徼以為智者惡不孫以為勇者惡訏以為直者語陽貨夫樂者與音相近而不同記樂記子惡似而非者惡莠恐其亂苗也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也孟盡心若初真得鹿妄謂之夢真夢得鹿妄謂之實列子周穆王篇懦弱易奪似仁而非悍戇好鬭似勇而非荀子大略白石似玉姦佞似賢抱朴子魯人縫掖實非儒行東郭吹竽而不知音劉子史孔子過匡匡人以為陽虎陽虎嘗暴匡人匡人止孔子孔子狀類陽虎拘五日史孔子世家陳遵字孟公時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云西漢本傳杜欽字子夏少好經書家富而目偏盲茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆乃為小冠高廣財二寸由是京師謂欽為小冠杜子夏而鄴為大冠杜子夏云西漢本傳市虎成於三夫孝子疑於屢至後漢蔡謨初渡江見彭蜞大喜曰蟹有八足加二螯令烹之既食吐下委頓方知非蟹後詣謝尚而說之尚曰卿讀爾雅不熟幾為勸學死晉書傳記夫以曾參之賢與其母之信也而三人疑之則慈母不能信也戰國策物多相類而非也幽莠之幼也似禾驪牛之黃也似虎白骨疑象碔砆類玉此皆似之而非者也同上相玉者患石似玉呂氏春秋魯有兩魯參趙有兩毛遂昔南曾參殺人見捕人告北曾參母母見以疑野人毛遂墜井而死客以告平原君平原君曰嗟乎天喪豫矣既而知非平原君客西京雜記陳國張伯諧弟仲諧婦炊於竈下至井上謂伯諧曰我今日粧好不伯諧曰我伯諧也婦大慚愧其夕時伯諧到更衣婦復逐牽其背曰今旦大誤謂伯諧為卿答曰我故伯諧也風俗通集若青蠅之僞質僞猶變也蠅變白使黑變黑使白楚辭衆僞冒真文選毛遂不墮井曾參不殺人虛言誤公子投杼惑慈親李白似錦言應巧如絲數易欺元微之人之至信者心目也天性者父子也不惑者聖賢也然而於竊鈇而知心目之可亂於掇蜂而知父子之可間於拾煤而知聖賢之可疑劉賓客積異以生疑積疑以生惑白樂天外容間暇中心苦似是而非誰得知白樂天鷺詩祥禽之類凡羽而凡羽混之神芝之類腐菌而腐菌混之嘉蕙之類棼芻而棼芻混之唐文粹本朝聞之曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊斧而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑東坡辨試館職策問劄子
