body:
  text: 姊妹經房中內賓姑姊妹也儀禮姊妹已嫁而反兄弟不與同席而坐弗與同器而食記曲禮上子路有姊之喪可以除之矣而弗除也孔子曰何不除也子路曰吾寡兄弟而弗忍也檀弓男子謂女子先生為姊後生為妹父之姊妹為姑母之姊妹為從母妻之姊妹同出為姨爾雅婦稱夫之姊為女公音中女弟為女妹爾雅史鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是夏姬也左昭公十八年晉公子重耳取季隗趙衰妻叔隗僖三十二年吳伐楚楚昭王取其妹季芊以出涉睢鍾建負之以從復國王將嫁季芊辭曰所以為女子遠丈夫也鍾建負我矣使妻鍾建以為樂尹左聶政為嚴仲子殺韓相俠纍因自抉眼出腸以死韓取政尸暴於市購之曰有能言殺俠纍者與千金政姊嫠聞之乃伏尸哭曰是軹深井里聶政也妾奈何畏歿身之誅滅賢弟之名乃三大呼天者遂死於政旁也史記李園妹欲進諸楚王春申君納之既而有娠李園使其妹説春申君曰楚王貴幸公雖兄弟不如也今君相楚二十餘年而王無子即千歲後將更立兄弟兄弟立禍且及身矣今妾有娠而人莫知妾幸君未久誠以君之重進妾於王王必幸之妾賴之而有男則是君之子為王也春申君大然之即出李園妹謹舍而言諸楚王王召入幸之遂生男立為太子李園妹為王后通監班超妹曹大家上書曰蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心妾竊聞古者十五受兵六十還之亦有休息不任職也故妾敢觸死為超求哀丐超餘年一得生還復見闕庭漢和紀慕容垂娶假氏字元妃光祿大夫假儀女婉惠有志操常謂妹季妃曰我終不作凡人妻妾季妃曰我亦不作庸夫婦鄰人聞笑之後燕王納元妃范陽王德聘季妃並如其言晉書王凝之妻謝氏名道韞朗之妹聰明有才辨同郡張玄妹亦有才質適顧氏謝玄每以當是一比擬樣字道韞有濟尼者遊於二家或問之答曰謝夫人神清散朗故有林下之風顧家婦清心玉映自是閨房之秀同上石奮家貧有妹能鼓琴高祖召為美人本傳老姊垂白西漢杜周傳曹壽妻班超之妹也超為都護在絶域年老思入關妹乃上書曰妾兄超延命沙漠三十餘年骨肉生離不復相識書奏徵還謝承漢書宋山陰公主謂帝曰妾與陛下俱託體先帝宋武紀劉孝綽三妹並有才學一適徐悱文尤清拔所謂劉三娘也悱卒為祭文辭甚悽愴悱父欲為哀辭及見此文乃閣筆南史本傳李績性友愛其姊病嘗自為粥而燎其須姊戒止答曰姊多疾而績且老雖欲數進粥尚幾何唐書本傳張巡姊軍中號陸姑張巡傳傳記袁彥道有二妹一適殷洪源浩一適謝仁祖尚世説載袁氏譜賈彥年六歲其姊聞鄰家讀書日日抱彥就籬聽之十歲乃暗誦六經王子年拾遺經嫂者尊嚴之稱儀禮嫂叔不通問記曲禮嫂叔之無服也蓋推而遠之也檀弓上子思之哭嫂也為位同上史蘇秦窮困歸嫂笑之不為下機及相六國擬王者歸嫂側目不敢仰視秦曰何前踞而後恭嫂伏地謝史記初高祖微時過其丘嫂食嫂厭叔陽為羹盡轑釜由是怨嫂漢書陳平嫂疾之或問平食何物而肥嫂曰食粳籺耳有叔如此不如無有漢書馬援奉嫂不冠不入東漢王澄衍季弟也衍妻郭氏性貪鄙令婢於路擔糞澄年十四諫郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣裾欲杖之澄懼走得脫晉書謝道韞為王凝之妻凝之弟獻之弟嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步障自蔽申獻之前議客不能屈晉書列女傳事嫂見稱載籍非一鄭仲虞則恩禮甚篤顏弘都則竭誠致感馬援則見之必冠孔伋則哭之為位唐書魏鄭公等嫂叔服議韓愈三歲而孤嫂鄭鞠之唐書本傳傳記阮籍嫂嘗還家籍見嫂與之別或譏之籍曰禮豈為我輩設也世説互見放蕩晉謝公曰家嫂詞情慷慨致可傳述恨不使朝士見世説集昔在韶州之行受命于元兄曰爾幼養于嫂喪服必以期今其敢忘天實臨之韓祭鄭夫人文互見知恩經兄弟之子猶子也記檀弓下史定陶王於帝子行西漢孔光傳虛譽隆洽傾於諸父王莽傳互入諸父黃瓊昔隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪通監漢殤紀吳陸遜曰子弟苟有才不憂不用不宜私出以要榮利若其不佳終為取禍通監三國紀魏舒容貌質朴少號遲鈍人莫之知唯叔父衡知其奇每有賓客造已常勸使過舒言吾兄子非常人也王隱晉書顧和總角便有清操族敘榮雅重之曰此吾家騏驎興吾宗者必此子也晉書本傳王羲之深為從伯敦導所器嘗謂羲之曰汝是吾家佳子弟當不減阮主簿本傳阮裕為王敦主簿謝安問諸子弟曰子弟何與人事車騎玄答曰譬如芝蘭欲其生於階庭晉本傳謝玄為叔父安所器符堅南伐安舉玄竟敗堅晉書謝安嘗詣陸納而納殊無供辦其兄子俶密為之具安既至納所設唯茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益父叔乃復穢我素業邪晉書詔求文武良將謝安以兄子玄應詔郤超嘆曰安之明乃能違衆舉親玄之才足以不負所舉通監晉武紀謝朏幼聰慧謝莊器之十歲能屬文莊遊山使朏命篇攬筆便就王景文曰賢子足稱神童後來復為特達莊曰真吾家千金晉書本傳振少薄行玄不以子姪齒之通監晉安紀謝混與族子靈運瞻晦曜以文義賞會常共處居在烏衣巷故謂之烏衣之遊南史謝弘微傳謝密童幼時精神端審時然後言叔父琨見而異之曰此兒深中夙敏可成佳器有子如此足矣南史宗炳問兄子愨所志答曰願乘長風破萬里浪炳曰汝若不富貴必破我門戶沈休文宋書初王弘與兄弟集會任子孫戲適僧達跳下地作虎子僧綽正坐采蠟燭珠為鳳皇僧達奪取打壞亦不復惜僧虔纍十二博棋既不墜落亦不重作弘嘆曰僧達俊爽當不減人然恐終危吾家僧綽當以名義見美僧虔必為長者位至公台已而皆如其言通監王渾與婦共坐見武子從庭過渾欣然曰生兒如此足慰人意晉列女傳劉孺七歲能屬文叔父瑱常置座側謂賓客曰此吾家明珠宋書楊愔幼時庭有奈樹實落群兒爭之愔不動獨坐季父暐大嗟異謂客曰此兒恬裕有我家風宅內有茂竹遂於林邊別葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彥謹慎自得竹林別室銅盤重肉之食北史本傳楊愔叔父見愔曰愔將相器謂人曰此兒駒齒未落已是我家龍文更十歲當求之千里外本傳任瓌早孤叔父忠每曰吾子雖多庸保耳所以寄門戶者瓌也唐書本傳傳記晉林下諸賢各有雋子籍子渾器重宏曠康子紹清遠雅正濤子簡練通高潔咸子瞻虛夷有遠心瞻弟孚爽朗多所遺秀子純悌並淑令有清流戎子萬有大成之風惟劉伶子無聞凡諸子惟瞻為冠紹簡亦見重當時世説集有韋群玉者在家無子弟之過求子弟之賢而能業其家者韋群玉也韓文經介婦請於冢婦記內則介婦無敢敵耦於冢婦不敢并行不敢并命不敢共坐一作不敢并坐娣姒猶兄弟也並同上長婦謂稚婦為娣婦娣婦為長婦謂姒婦注今或云妯娌爾雅史聲伯之母不聘穆薑曰吾不以妾為姒左成十一注昆弟之妻相謂姒伯石始生子容之母走謁諸姑曰長叔姒生男昭二十七注兄弟之妻相謂王渾妻鍾氏字琰禮儀法度為中表所則渾弟湛妻郝亦有德行琰雖貴門與郝雅相敬重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人之禮郝夫人之法晉書列女傳太后以薛顗妻蕭氏及顗弟緒妻成氏非貴族欲出之曰我女豈可與田舍女為妯娌耶或曰蕭氏瑀之姪孫國家舊姻乃止通監唐高宗李光進與弟光顏友善光顏先娶其母委以家事母卒光進後娶光顏使其妻奉管鑰籍財物歸于其姒光進反之曰新婦逮事先姑姑命主家事不可易也唐德宗紀經以飲食之禮親宗族兄弟周禮大宗伯五廟之孫祖廟未毀雖為庶人冠取妻者必告死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之記文王世子適子庶子祗事宗子宗婦雖富貴不敢以富貴入宗子之家雖衆車徒舍於外以寡約入不敢以富貴加於父兄宗族內則別子為祖繼別為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者別子之後也宗其繼別子之所自出者百世不遷者也宗其繼高祖者五世則遷者也大傳合族以食序以昭穆別之以禮義人道竭矣同姓從宗合族屬四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣其庶姓別於上而戚單於下婚姻可以通乎繫之以姓而弗別綴之以食而弗殊雖百世而婚姻不通周道然也親親故尊祖尊祖故敬宗敬宗故收族並同上君子因睦以合族坊記同宗無相賓客之道文王世子注父之黨為宗族爾雅宗族稱孝焉語史翼九宗五正左隱六晉吾宗也豈害我哉同上犬牙相制所謂盤石之宗也西漢文紀宗族盤互劉向骨肉之親粲而不殊宣帝紀粲明也當明於仁恩不離絶也支屬項籍傳臣幸得聯肺腑劉向傳師古曰謂肝肺相附著猶言心膂也得託肺腑王莽傳骨肉天性誠不以遠近為親踈然數見顏色情重昔時通鑑漢章帝紀禮從祖兄弟別居異財恩義已輕服屬踈末漢殤紀武康沈法興世為郡著姓宗族數千家唐高祖紀唐張公藝九世同居高宗問其故書忍字百餘以進唐紀集宗黨鄉外少徐騎省詩紛綸國諜昭晰家聲駱賓王經豈無他人不如我同姓唐風杕杜君不與同姓同車記坊記娶妻不娶同姓同上同姓從宗合族屬大傳繫之以姓而弗別雖百世而婚姻不通也同上族晜弟之子相謂為親同姓爾雅子諱名不諱姓姓所同也孟史於諸姬為近左僖二十四幸得同姓末屬西漢劉向傳初何武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之東漢李密與唐高祖書曰與兄泒流雖異根系本同通鑑
