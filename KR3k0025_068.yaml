body:
  text: 無定力子性猶湍水也決諸東方則東流決諸西方則西流孟告子上史子夏入聞夫子之道而樂出見紛華盛麗而悅史記孔子弟子列傳王莽誅甄豐辭所連及便收不請時揚雄校書天祿閣上治獄使者來欲收雄雄恐不能免乃從閣上自投下幾死西漢本傳互入不能自信或謂讜是復慮為非不知所定通監漢章紀帝問侍中爰延朕何如主也曰陛下為漢中主帝曰何以言之曰尚書令陳蕃任事則治中常侍黃門與政則亂是以知陛下可與為善可與為非通監漢桓紀髯參軍短主簿能令公喜能令公怒晉書郤超傳帝嘗問樂運曰卿言太子何如人對曰中人問中人狀對曰齊桓公是也管仲相之則霸豎貂輔之則亂可與為善可與為惡通監陳宣紀一回一惑在於瞬息之間自可自否變於帷房之所通監唐太宗傳記有與曾子同名族者而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若也頃之又一人告之曰曾參殺人其母懼投杼踰墻而走戰國策互入不能自信集依稀似曲才堪聽又被風吹別調中北夢瓚言載唐人詩經之死矢靡它之死矢靡慝詩柏舟我心匪石不可轉也我心匪席不可卷也同上君子雖貧不粥祭器雖寒不衣祭服記曲禮君子固窮語衛靈公子良農不為水旱輟耕良賈不為折閲不市士君子不為貧窮怠乎道荀修身北山愚公年九十欲平太行王屋二山或笑之愚公曰我死有子子又生孫孫又生子子子孫孫無窮匱也而山不加增何若而不平操蛇之神聞之懼其不已告之於帝帝命夸蛾氏二子負二山一厝朔東一厝雍南列不以物挫志之謂全莊史司馬握節以死左文八年晉文公曰困獸猶鬭左宣十二年楚伐宋華元夜入楚師曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能從也左宣十五年請收合餘燼背城借一左成二年晉文亡十九年守志彌篤左昭十三年伍子胥窘於江上道乞食志豈嘗須臾忘郢邪故隱忍就功名非烈丈夫孰能致此哉史記子胥傳互入英烈豫讓事智伯智伯滅讓挾匕首刺襄子襄子釋之頃之漆身為厲吞炭為啞行乞於市曰所以為此者將以愧天下後世之為人臣懷二心以事其君者也頃之襄子出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅願請君之衣而擊之以致報讎之意則死不恨襄子持衣與讓拔劍三躍而擊之曰吾可以下報智伯矣史本傳互入英烈藺相如奉趙璧於秦秦王喜傳示左右相如視秦王無意償趙城乃曰璧有瑕請指示王王授璧相如持璧卻立倚柱怒髮衝冠曰臣觀大王無意償趙王城故取璧大王必欲急臣臣頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王乃辭謝相如懷其璧從徑道歸璧于趙同上互入英烈屈原曰誰能以身之察察受物之汶汶者乎寧赴湘流而葬于江魚腹中耳又安能以皓皓之白而蒙世之溫蠖乎同上張儀謂其妻曰視吾舌尚在不其妻曰舌在也儀曰足矣史張儀傳高皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之聲不絶史記儒林所以隱忍苟活函糞土之中而不辭者恨私心有所不盡鄙沒世而文采不表於後也西漢司馬遷傳馬援曰丈夫為志窮當益堅老當益壯東漢本傳梁謝舉兄子僑素貴嘗一朝無食其子啓欲以班史質錢答曰寧餓死豈可以此充食乎南史張巡許遠可謂烈丈夫矣以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得搏食牽掣首尾豗潰梁宋間大小數百戰力盡乃死唐書本贊集亦余心之所善兮雖九死其猶未悔楚辭寧溘死而流亡兮余不忍為此態也同上當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳韓文但存舌在口當翼身遂心賈浪仙無傷禽哀鳴之意有困獸猶鬭之心李文饒手張空拳力殫氣雄劉長卿本朝金百死而不化水萬折而東流陳瑩中史吳伐魯微虎欲攻王舍私屬徒七百人三踊於幕庭吳子聞之一夕三遷左哀八年從風而靡西漢韓信傳養由睇而猿號西漢班固敘傳范滂按部守吏自知贓汙望風解印綬去後漢本傳苻堅敗于淝水餘衆奔潰聞風聲鶴唳皆以為王師至晉書謝玄傳互入恐懼心隨事移應弦而倒北史李彪傳望風輒奔新唐書房元齡傳河北二十四郡無一忠臣耶唐書顏真卿傳集命使西征隨流而攘風之所被罔不披靡選傳記鄉邑望煙而奔城郭覩塵而潰典論本朝馬首所嚮無不望風奔潰司馬溫公魏元論猛虎處於深山則百獸震恐而不敢出非吾則爾拒而爾則不吾抗也蘇子由文子子路曰由願得白羽若月赤羽若日鍾鼓之音上震於天旗旍繽紛下蟠于地由當一隊而敵之必也攘地千里搴旗執馘唯由能之家語致思管仲曾西之所不為也而子為我願之乎孟公孫丑上夫天未欲平治天下也如欲平治天下當今之世捨我其誰也孟公孫丑下以位則子君也我臣也何敢與君友也以德則子事我者也奚可與我友千乘之君求與之友而不可得也而況可召與孟萬章下互入氣概鬻子年九十見文王文王曰嘻老矣鬻子曰若使臣捕虎逐鹿則老矣使臣策國事則臣年尚少因立為師鬻子互入精強在山澤而有廊廟之志文中史欒武子曰不可以當吾世而失諸侯左成十六年毛遂曰使遂早得處囊中乃穎脫而出非特其末見而已史記平原君傳蔡澤從唐舉相曰富貴吾所自有不知者壽也史記趙王思復得廉頗廉頗亦思復用於趙趙王使使召廉頗廉頗見使者一飯斗米肉十斤被甲上馬以示可用通監秦紀先從隗始通監周紀韓信家貧葬母行營高燥地令旁可置萬家者西漢本傳韓信曰臣多多益辦前漢本傳里中社陳平為宰分肉甚均曰嗟乎使平得宰天下亦如此肉矣通監漢高紀蒯通自序其説號曰雋永西漢本傳師古曰雋字充反肥肉也永長也以其所論甚善而義深長也韓安國曰死灰獨不復然乎終軍自願受長纓羈南越王致之闕下終軍步入關關吏與軍繻軍問何為吏曰為復傳還當合符軍曰丈夫西遊終不復傳還棄繻而去並同上士病不明經術經術苟明取青紫如俯拾地芥西漢夏侯勝傳郭丹曰丹不乘使者車終不出關去家十有二年果乘高車出關東漢本傳梁竦自負其才曰大丈夫居世生當封侯死當廟食州縣之職徒勞人耳同上虞詡笑曰不遇盤根錯節無以別利器此乃吾立功之秋也通監漢殤紀禰衡唯善孔融楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌不足數東漢本傳曹操從容謂劉備曰今天下英雄惟使君與操耳本初之徒不足數也通監漢獻紀韓遂請與操相見時秦胡觀者前後重沓操笑謂之曰爾欲觀曹公耶亦猶人也非有四目兩口但多智耳同上劉備曰孔北海知世間有劉備耶吳志廖化欲與宗預詣諸葛瞻預曰吾等年踰七十但少一死何求於年少輩而屑屑造其門耶遂不往蜀志宗預傳王濬恢廓有大志嘗起宅開門前路廣數十步曰吾欲使容長戟幡旗晉書本傳山濤布衣家貧謂妻韓氏曰忍飢寒我後當作三公孫綽作天台賦示友人范榮期云卿試擲地當作金石聲也謝琨曰一丘一壑自謂過之過庾亮也祖逖渡江擊楫而誓曰祖逖不能清中原而復濟者有如大江並同上石勒曰若遇光武當並驅中原未知鹿死誰手晉書載記周顗曰今年殺諸賊奴取金印如斗大繫肘本傳謝安妻見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳晉書本傳謝安甚敬王獻之因問曰吾書何如家君曰固不同安曰外論不爾曰人那得知同上涼張雍驕矜淫縱國人患之張天錫所親劉肅謂天錫曰正當速除之耳天錫曰安得其人肅曰肅即其人也肅年時未二十天錫曰汝年少更求其助肅曰趙白駒與肅二人足矣通監晉海西公傳燕主垂議伐西燕垂曰吾比老叩囊底智足以取之終不復留此賊以纍子孫通監晉武紀王羲之自稱我書比鍾繇當抗行比張芝草猶當鴈行也晉書本傳胡藩曰劉毅一談一詠自許以為雄豪通監晉紀崔浩纖妍潔白如美婦人常自謂才比張良而稽古過之通監宋紀王儉曰江左風流宰相唯有謝安蓋自況也宋王儉傳裴子野曰為文人皆得於手我獨得於心南史本傳胸中貯千卷書使人那得不畏服北史崔陵傳王侃不交遊親朋勸其出仕侃曰苟有良田何憂晚歲但恨無才具爾北史周武謂楊素曰善自勉之勿憂不富貴應聲答曰臣但恐富貴來逼臣臣無心圖富貴隋書隋王羆曰老羆當道臥貛子安得過同上激濁揚清疾惡好善臣於數子有一日之長唐書王圭傳李靖常曰丈夫遭遇要當以功名取富貴何至作章句儒唐書本傳李晟謂所親曰吾生長西陲備諳虜情同上裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而遠取居易請從此辭唐書韓愈傳韓愈自視遷雄至固以下不論也唐書贊自比孟軻以荀況揚雄為未醇唐書韓愈傳李懷遠宗人欲藉以高蔭懷遠曰因人之勢高士恥之假蔭而官豈吾志耶擢四科第唐書本傳鄭仁表常自曰天瑞有五色雲人瑞有鄭仁表同上傳記婁敬過洛陽曰臣之策能不血刃坐羈胸奴頭著陛下前三輔故事李元禮高自標持欲以天下名教是非為己任世説新語張賓自謂昆弟曰吾自言智策鑒識不後張子房但不遇高祖耳崔鴻後趙録僧支遁曰既有凌霄之姿何肯為人耳目玩乎世説後魏楊大眼曰若使旗鼓相望瞋眸奮發足以使君亡魂喪膽談藪猛虎不處卑勢徑鷹不立垂枝蔣子萬機論司馬相如往京師過蜀郡升仙橋題其柱曰不乘駟馬不復過此白氏六帖楚丘先生見孟嘗君孟嘗君曰先生老矣春秋高矣多遺忘矣何以教文先生曰使我投石斥距追車赴馬逐麋鹿摶虎豹吾則老矣使我探計謀殺精神決嫌疑出正辭尚諸侯吾仍始壯耳何老之有孟嘗君勃然汗出至踵曰文過耳韓詩列傳劉長卿每題詩不言姓但曰長卿雲溪友議皮日休傲誕自號間氣布衣北夢瓚言沙門貫休風騷之外精於筆扎成中令問其筆法休曰此事須登壇而授安可草草而言同上鍾子期死伯牙子屏琴絶絃終身不鼓以為時無足為鼓琴者劉向説苑集知我者希則我貴矣揚雄解難鳳凰集南嶽羞與燕雀群劉公幹詩雖逍遙於廣廈思擊厲於中原選傳玄鷹賦生必耀華名於玉牒沒則勒洪伐於金策張景陽七命懷紀燕山石思開函谷園徐敬業琅琊城作排朱門而獨遠升青雲而自致匪偷光於鄰壁寧假輝於陽燧終徇己以致能靡因人以成事駱賓王雖不能縱逸韻於霜皋唳野致九天之響頗亦蓄奇芬於露薄垂薰有十步之芳同上安能與尺鷃決起但搶榆孟浩然人生若不能師表朝廷即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顏受納元次山杜陵有布衣老大意轉拙許身一何愚自比稷與契居然成濩落白首甘契闊蓋棺事則已此志常覬豁窮年憂黎元嘆息腸內熱非無江海志瀟灑送日月杜詩虎氣必騰上龍身寧久藏同上心藏風雲世莫知李白詩騄驥本天馬素非伏櫪駒韓信羞將絳灌比禰衡恥逐屠沽兒青雲當自致何以求知音李太白上裴長史書曰他人之文猶山無煙霞春無草樹白之文光明洞徹句句動人並同上自矜無當對韓文猛虎行當今盲於心者皆是若籍自謂獨盲於目爾韓文代張籍書使其道由愈而粗傳雖滅死萬萬無恨韓愈答孟簡書承先人後者在孫惟汝在子惟吾韓文互入期待自度若世無孔子不當在弟子列韓文與呂醫山人書固余異於牛馬兮寧止乎飲水而求芻群雌孤雄意橫出誰為傾國媒自許連城價懷奇負氣不隨人後衝天鵬翅闊報國劍鎈寒天不欲使茲人有知乎則吾之命不可期如使茲人有知乎非我其誰哉其行道其為書其化今其傳遠必有在矣並同上鋪張對天之閎休揚厲無前之偉績編之乎詩書之策而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓韓文潮州謝上表配圭璋而為貴豈泥滓而為儔柳文披沙揀金賦金之為寶恥居下流同上低回且向籠間宿奮迅終須天外飛白樂天互入待時崔杜鞭齊下元常轡共驅若不佩金印即合翳玉芝並同上振臂猶堪呼一擲爭知當下不成盧劉賓客雲霄坐應致劉長卿老虎終開眼兒蟲會叩頭但令吾舌在何畏不封侯張承吉文肯與夫斗筲者決得失於一夫之目唐文粹砥名礪節易地改轍冀桑榆之未晚得雌雄之一決同上將攜健筆干明主杜牧之本朝萬里秋風天外意歐公集誰言一身窮自待九鼎重同上枯朽猶能出菌芝坡詩海底鯤魚會化鵬蘇子由集吾文如萬斛泉源不擇地而出在平地滔滔汨汨雖一日千里無難東坡
