body:
  text: 端本澄源經言出乎身加乎民行發乎邇見乎遠易繫辭爾身克正罔敢不正民心罔中惟爾之中書君牙刑于寡妻至于兄弟以御于家邦詩思齊爾之遠矣民胥然矣爾之教矣民胥效矣角弓民以君為心君以民為體心莊則體舒心肅則容敬記緇衣政者正也君為正則百姓從政矣君之所為百姓之所從也哀公問古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意太學自天子以至於庶人一是皆以修身為本其本亂而末治者否矣大學並記政者正也子帥以正孰敢不正語顏淵季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊季康子問政於孔子孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃並顏淵其身正不令而行其身不正雖令不從子路苟正其身矣於從政乎何有不能正其身如正人何同上並語子天下之本在國國之本在家家之本在身孟離婁上其身正而天下歸之同上君子之守修其身而天下平盡心下身不行道不行於妻子使人不以道不能行於妻子同上並孟我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴老子聞修身未聞修國也君者儀也儀正則景正君者槃也槃圓而水圓君者盂也孟方而水方荀君道君子者治之源也君子養源源清則流清源濁則流濁同上上者下之本也上宣明則下治辨矣上端誠則下願愨矣上公正則下易直矣荀子正論史法令者治之具而非制治清濁之源也史酷吏傳序罔密而姦不塞刑煩而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也宜思所以清源正本之論前漢刑法志管子曰先王端本肇末國齊語春秋謂一為元者示大始而欲正本也為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方前董仲舒傳易曰正其本萬物理同上杜欽傳失之末流求之本源後漢陳忠傳表曲者影必邪源清者流必潔猶叩木本百枝皆動也同上李固傳本立道生風行草從澄其源者流清溷其本者末濁同上即顗傳治水不自其源末流彌增其廣矣通監漢靈紀志正則衆邪不生心靜則衆事不躁思慮審定則教令不煩三國志萬目不張舉其綱衆毛不整齊其領通監魏明紀荀勉曰省吏不如省官省官不如省事省事不如清心同上晉武紀潔其流者清其源理其末者正其本北史袁翻傳禍之所求皆生於利苟不求利禍從何生通監梁高祖上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎同上唐太宗夫家給人足而無瑞不害為堯舜百姓怨愁而多瑞不害為桀紂同上上謂魏徵曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣並同上求木之長者必固其根本欲流之遠者必浚其泉源舊唐書魏徵傳陸象先嘗謂人曰天下本無事但庸人擾之爾苟清其源何憂不治通監天下本無事庸人擾之為煩耳第澄其源何憂不簡邪唐陸象先傳上嘗問裴為理之要何先對曰先正其心通監唐憲宗集爾形信直影亦不曲爾聲信清響亦不濁晉裴顧女史針互入影響相應養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄韓文澄其源而清其流韓文本朝莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而專言仁義之說仁義之說勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏之道孔氏之道明則百家自息此所謂修其本以勝之之效也歐文本論經小人革面順以從君也易革卦四方風動書大禹謨爾惟風下民惟草君陳爾身克正罔敢弗正同上翩彼飛梟集于泮林食我桑椹懷我好音詩泮水古者長民衣服不二從容有常以齊其民則民德歸一都人士爾之教矣民胥效矣角弓君子不賞而民勸不怒而民威於鈇鉞記中庸德輝動乎內而民莫不承聽理發乎外而衆莫不承順祭義好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服緇衣上好仁則下之為仁爭先人同上君子有徽猷小人與屬詩角弓一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此記太學君子篤於親則民興於仁故舊不遺則民不偷語泰伯動容貌斯遠暴慢矣正顏色斯近信矣出辭氣斯遠鄙倍矣同上苟子之不欲雖賞之不竊顏淵子欲善而民善矣君子之德風小人之德草草上之風必偃同上其身正不令而行子路天何言哉四時行焉百物生焉陽貨君子之教以孝也非家至而日見之也孝經子文武興則民好善孟告子上孔子為中都宰路不拾遺器不雕僞家語有大人者正己而物正者也孟盡心下孔子為政魯沈猶氏不敢朝飲其羊公慎氏出其妻淫不制慎潰氏越境而走鬻牛馬者不儲價賣羔豚者不加飾家語虞芮二國爭田而訟連年不決乃相謂曰西伯仁也盍往質之入其境則耕者讓畔行者讓路入其朝士讓于大夫大夫讓于卿虞芮之君曰嘻吾儕小人也不可以入君子之朝遂自相與而退咸以所爭之田為間田家語三恕篇孔子遭厄於陳蔡之間子路彈琴而歌孔子和之曲三終康人解甲而罷家語孔子曰天下有道盜其先變乎荀子正論君子為國張其綱紀謹其教化導之以仁則下不相賊蒞之以廉則下不相盜臨之以正則下不相詐修之以禮義則下多德讓荀子夷惠變貪厲薄千載聞之猶有感激孟子注南郭順子正容以悟物使人之意也消莊子市南宜僚弄丸兩家之難解孫叔敖秉羽而郢人投兵同上子罕不利寶玉而爭券契者愧矣務光不汙於世而貪利偷生者愧矣淮南子精神訓昔舜耕于歷山朞年而田者爭處墝埆以封壤肥饒相讓釣於河濱朞年而漁者爭處湍瀨以曲隈深潭相豫當此之時口不設言手不指麾執玄德於心而化馳若神使舜無其志雖口辨而戶說之不能化一人淮南子原道訓速哉七十子之肖仲尼也楊子孔子用於魯齊人歸其侵疆同上史范宣子讓其下皆讓欒黶為汰不敢違也左襄十三年一人刑善百姓休和同上士會將中軍晉國之盜逃奔于秦左宣十六年孔父正色而立於朝則人莫敢過而致難於君者公羊傳孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是叔孫帥師墮郈季孫仲孫帥師隋費同上舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居史記五帝紀西伯行善虞芮之人有獄不能決如周入界耕者讓畔民俗皆讓長虞芮之人未見西伯皆慚相謂曰吾所爭周人所恥何往為祗取辱耳遂還俱讓而去史記周紀孔子與聞國政三月粥羔豚者弗飾賈男女行者別於塗塗不拾遺四方之客至乎邑者不求有司史孔子世家儉節仁義之人立於朝則荒肆之樂輟矣諫說論理之臣聞於側則流漫之志詘矣烈士死節之行顯於世則康之虞廢矣史李斯傳萬石君子孫有過不誚讓為便坐對案不食諸子相責因長跪肉袒固謝罪改之前漢同上互入示人以意吳王詐病不朝賜以几杖張武等受賂金錢覺更加賞賜以愧其心通監漢文紀上設禮義廉恥以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在上之化也前漢賈誼傳韓延壽守馮翊民有昆弟訟田延壽閉閣思過於是訟者宗族相責此兩昆弟深自悔皆自髡肉袒謝願以田相移終死不敢爭後民莫敢以辭訟自言者前漢同上互見政事山有猛獸藜藿為之不采國有忠臣姦邪為之不起前漢蓋寬饒傳宋均為九江太守虎相與東渡江後漢同上孟嘗遷合浦太守去珠復還後漢同上王烈所居市無二價東漢前在江陵反風滅火後守弘農虎北渡河東漢劉昆傳諸有爭訟曲直將質之於王烈或至塗而反或望廬而還東漢同上黃憲言論風旨無所傳聞然士君子見之靡不服深遠去玭吝東漢同上譬如靈蓍在林林無毒草威鳳在野野集仁禽東漢許邵傳舜歌南風不下堂而天下治步騭傳涉其門者貪夫反廉懦夫立志晉羊祜傳天下改目貪暴斂手北史李彪傳徐有功為蒲州司法以寬為治不施敲撲吏相約有犯徐司法杖者衆共斥之逮官滿不杖一人職事亦修通監唐武后陸贄秉筆內翰僄狡向風懦夫增氣唐書同上汲黯在朝淮南寢謀干木處魏諸侯息兵一士止百萬之師一賢制千里之難唐書裴度傳楊綰始輔政中丞崔寬本豪俊城南別墅池觀堂皇為當時第一即日遣人毀之京兆尹黎幹出入從騶馭百數省損才留十餘騎郭子儀邠州行營方大會除書至音樂散五之四他聞風靡然自化者不可勝紀唐書同上贊綰以德服人而人自化唐同上贊毛玠以清德為魏尚書而人不敢鮮衣美食唐書李程傳魯秉周禮齊不加兵唐于休烈傳陽公在朝四方聞風貪冒苟進邪薄之夫沮其志雖微師尹之位而人實瞻望焉唐同上至潮與鰐魚約數日水涸西徙潮無鰐魚患韓愈楚有昭王井傳言汲者死行人雖渴困不敢視韓朝宗移書諭神自是亡恙唐書冀缺以禮遜升而晉人知禮文翁以經術教而蜀士多儒唐薛登傳可使繁暑坐變清涼五代史郭崇韜傳傳記陳實在鄉閭平心率物有盜夜入其室止於梁上實命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是也盜驚自投地實徐譬之曰視君狀貌不似惡人宜深克己反善然當由貧今遺絹二匹自是一縣無復盜竊東觀漢紀程普頗以年長侮周瑜瑜折節下之不與計普後自敬而親重之告人曰吾與周公瑾交若飲醇醪不覺自醉江表傳宓子賤為單父宰鳴琴不下堂而單父自治呂氏春秋子産相鄭桃李之垂於街者莫之援也同上楚昭王與吳人戰楚軍敗走履決背而行三十步復左右問曰王何惜一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與偕反也自是之後楚國之俗無相棄者賈誼新書人問郭文曰虎狼害人先生獨不畏乎文曰人無害獸之心獸亦不害人耳高士傳孔子居小位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起鹽鐵論集不言之化若門到戶說矣齊竟陵王行狀鄰國有偷衣食帶刀劍椎埋胠篋之類鬭雞走狗之豪莫不靡下風馴雅素陳子昂集懷梟鴟以好音消祲冷為和氣陸宣公文魯有泮林鳥革其音劉賓客集自從卻縠為元帥大將歸來盡把書同上鸞鳳一鳴蜩螳革音並同上始知聽韶濩可使心和平白侍郎令修於庭戶數月之間而人自得於湖山千里之外唐文猝集陽城居於晉之鄙晉之鄙人薰其德而善良者幾千人韓文諫臣論柳侯為州不鄙夷其民動以禮法三年民各自矜奮曰茲土雖遠京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趍之無有後先必以其時韓文柳州羅池廟碑舅無夜動梟變好音柳文本朝渡海鯨波息登山豹霧銷楊文公集凜凜乎其若處女之在閨也兢兢乎其若懷千金之璧而行也夫是以不仁者不敢至其墻不義者不敢過其門東坡密州謝上表環堵蕭然而妻子奴婢皆有自得之色東坡方山子傳退居於洛往來陝郊陝洛間皆化其德尊其學法其儉有不善曰君實得無知之乎東坡司馬公行狀使人之意消不善無由萌東坡詩以衛武之年踐呂尚之位安然無作則功名自隆默然無言則卿尹自化當以至靜之德坐鎮群動之樞蘇子由文彥博乞致仕不允批答互見老成
