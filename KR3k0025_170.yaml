body:
  text: 史筆經動則左史書之言則右史書之記玉藻國史明乎得失之跡詩大序子孔子作春秋而亂臣賊子懼孟子太熙之後述史者幾乎罵矣故君子沒稱焉文中子述史使陳壽不美於史遷固之罪也使范寧不美於春秋歆向之罪也文中子述史篇史之失自遷固始也記繁而志寡文中子子曰非至公不及史也同前史春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀遠近別同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史大事書之於策小事簡牘而巳孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也周德既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章仲尼因魯史策書成文考其真僞而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刊而正之以示勸戒其餘皆即用舊史史有文質辭有詳略不必改也故傳曰其善志又曰非聖人孰能修之蓋周公之志仲尼從而明之左丘明受經於仲尼以為經者不刊之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其旨遠將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而巳非例也故發傳之體有三而為例之情有五一曰微而顯文見於此而起義在彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參會不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱避璧假許田之類是也四曰盡而不污直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而彰書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義者也先儒所傳皆不其然答曰春秋皆以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者十數家大體轉相祖述進不成為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆沒而不說而更膚引公羊榖梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必出於傳傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端蓋丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿創通大義賈景伯父子許惠卿皆先儒之羹者也末有穎子嚴者雖淺近亦復名家故特舉劉賈許穎之違以見同異分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又別集諸例及地名譜第曆數相與為部凡四十五部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之說釋例詳之也春秋左氏傳一字之褒寵踰華袞之贈片言之貶辱過市朝之撻德之所助雖賤必申義之所抑雖貴必屈故附勢匿非者無所逃其罪潛德獨運者無所隱其名范寧春秋穀梁傳司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖于大漢其言秦漢詳矣至於采經托傳分散數家之事甚多疏略或有抵牾亦其涉獵者廣慱貫穿經傳馳騁古今上下數千年間斯以勤矣又其是非頗謬於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也然自劉向楊雄慱極群書皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録西漢司馬遷傳司馬喜生談為太史公談生遷為太史令紬史記石室金匱之書前漢本傳武帝始置太史天下計書先上太史副上丞相故司馬談父子世居此職得撰史記本傳古之王者世有史官君舉必書左史記言右史記事事為春秋言為尚書前漢藝文班彪續司馬遷後傳數十篇未成而卒明帝命其子固續之固以史遷所記乃以漢氏繼百王之末非其義也大漢當可獨立一史故上自高祖下至王莽為紀表傳志九十九篇後漢本傳司馬遷班固父子其言史官載籍之作大義粲然著矣議者咸稱二子有良史之才遷文直而事核固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭信哉其能成名也東漢班固傳二班懷文裁成帝墳比良遷董兼麗卿雲東漢二班古者天子諸侯有事必告于廟廟有二史左史記言右史記事後漢荀悅得失一朝榮辱千載同上韋昭領國史吳主欲為其父作記昭曰文皇不登帝位當為傳不當為紀通監晉世祖陳壽撰魏吳蜀三國志丁儀丁廙有盛名於魏壽謂其子曰可覓千斛米見與當為尊公作佳傳丁不與之竟不為立傳晉書陳壽傳陳壽為諸葛書佐得撻後論武侯云應變將略非其所長後魏書魏收納爾朱榮之子金減其惡而增其善衆口喧然號為穢史北史魏收傳收所引史官恐其陵逼唯取學流先相依附者其房延祐辛元稹睦仲讓雖夙涉朝位並非史才刁柔裴昂之以儒業見知全不堪編緝高孝幹以左道求進修史諸人宗族姻戚多被書録飾以美言收頗急碎不甚能乎夙有怨者多沒其善每言何物小子敢共魏收作色舉之則使上天按之當使入地北史魏收傳魏收曰願秉直筆東觀同前宋魏以降南北分治各有國史互相排黜南謂北為索虜北謂南為島夷通監又唐李延壽傳晉祕書監太原孫盛作晉陽秋直書時事大司馬溫見之怒謂盛子曰枋頤誠為失利何至乃如尊君所言若此史遂行自是關君門戶事其子遽拜謝請改之時盛年老家居性方嚴有軌度諸子乃共號泣稽顙請為百口計盛大怒不許諸子遂私改之盛巳寫別本傳之外國通監晉海西公紀王韶之私撰晉陽秋成時人謂之宜居史職即除著作郎使續後事訖義熙九年善敘事辭論可觀為後世佳史宋書裴松之字世期注陳壽三國志松之鳩集傳記廣增異聞既成奏之上覽之曰裴世期為不朽矣宋書元魏高允曰夫史籍帝王之實録將來之炯誡今之所以觀往後之所以知今是以言行舉動莫不備載故人君謹焉崔浩私欲沒其公廉愛憎蔽其直理此浩之責也至於書朝廷起動之跡言國家得失之事此為史之本體未易多違北史本傳劉洎曰使遂良不記天下亦記之矣唐書上謂監修國史房元齡曰前世史官所記皆不令人主見之何也對曰史官不虛美不隱惡若人主見之必怒故不敢獻也通監唐太宗吳兢撰則天實録言宋璟激張說使證魏元忠事說修史見之知兢所為謬曰劉五殊不相借兢起曰此乃兢所為史草具在不可使明公枉怨死者同僚皆失色其後說陰祈兢改數字兢終不許曰若徇公請則此史不為直筆何以取信於後世吳兢敘事簡核號良史唐書本傳古之國史皆自出一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以衆功方云絶筆唯後漢東觀大集群儒而著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子糾之於當代傳范兩家嗤之於後葉今史司取士有倍東京人自以為荀袁家自稱為政駿每欲評一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為慱原自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該討沿革於臺閣簿籍難見雖使尼父再出猶且成其管窺況限以中才安能遂其慱物其不可二也昔董狐之書弒也執簡以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者由杜彼顏面防諸請謁故也然今館中作者多士如林皆願長喙無聞齻舌償有五始初成一字加貶言未絶口而朝野具知筆未棲毫而縉紳咸誦夫孫盛實録取嫉權門王邵直書見讎貴族人之情也能無畏乎其不可三也古者刊定一史纂成一家體統各殊指歸咸別夫尚書之教以疏通知遠為主春秋之義以懲惡勸善為先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩賢得失之例良史是非之筆作者言之詳矣須者史官多取稟監修楊令公則云必須直詞宋尚書則謂宜多隱惡十羊九牧其事難行一國三公適從焉在其不可四也切以史置監修雖無古式尋其名號可得而言夫言監者蓋總領之義耳如創紀編年則年有斷限草傳敘事則事有豐約或可略而不略或應書而不書此刊削之任也屬事比辭勞逸宜均揮鉛奮墨勤惰須等某表某篇付之此職某紀某傳歸之此官此詮配之理也斯並宜明立科條審定區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉用使爭學苟且務相推避坐變炎涼徒延歲月其不可五也舊唐書劉子玄鄭惟忠嘗問劉子玄曰自古以來文士多而史才少何也對曰史才須有三長謂才也學也識也夫有學而無才亦猶有良田萬頃黃金滿籯而使愚者營生終不敢致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩柟斧斤終不果成其宮室者矣舊唐書劉子玄傳子玄初名劉知幾史官權重宰相宰相能制生人史官兼制生死唐書朱敬則蔣楷三世修國史世稱良筆唐書本傳劉允濟修國史嘗曰史官善惡必書使驕主賊臣懼而班生受金陳壽乞米唐書本傳唐李延壽本魏登國元年盡隋義寧二年作紀傳謂之北史本宋永初元年盡陳禎明三年作紀傳謂之南史凡八代合二書百八十篇其書頗有條理刪落穰辭過本書遠甚唐書本傳韓愈為順宗實録議者鬨然不息卒竄定無完篇唐柳芳贊李翱以史官記事不實奏曰凡人事跡非大善大惡則衆人無由得知舊例皆訪於人又取行狀為據今之行狀者多是其門生故吏莫不虛美於受恩之地唐書上就起居舍人魏謨取記注觀之謨不可曰記注兼書善惡所以警戒人君陛下但力為善不必觀史上曰朕向嘗觀之對曰此向日史官之罪也若陛下自觀史則史官必有所諱避何以取信於後上乃止通監唐文宗紀傳記太史公發憤作史記一百三十篇西京雜記自昔史氏所書兩人一事則曰語在某人傳晉書載王縕陳祖訥奕棋一假幾二百字兩傳俱在此為文煩矣孔氏雜記英賢書之則與日月長懸不書則與煙塵俱滅史通彰善疸惡不避強禦晉之董狐齊之南史此其上也史通自永嘉以來三百餘年稱王者十六君皆目睹其事國亡之後史書皆非實録今人亦生愚死智惑己甚矣生時庸人其死也碑文志窮天地之大德盡生民之能事生為盜路沒為夷齊妄言傷正華詞損實後魏楊衍之撰洛陽伽藍記吹霜煦露寒暑筆端文心雕龍論史傳沈約修宋史書裴子野父子殊無令譽云自松之已下無聞焉子野乃撰宋略書沈約家世備有醜聲云某年某月斬盱眙太守沈璞於建鄴市璞約之父也約見之乃削宋書子野亦削宋略隋楊松玠八代談藪憎愛出於方寸與奪由其筆端史通謬彼虛譽定為實録同上子長立記藏於名山班固成書出自家庭陳壽為志創於私室史通得失凜於片言是非由於一句談何容易可不謹哉史通集世人論司馬遷班固之優劣多以固為勝余以為史遷敘三千年事五十萬言固敘二百年事八十萬言煩省不敵固之不如一也良史述事善足以獎勸惡足以鑒戒人道之常中流小事無取又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足明其大才也此真所以為良史也張輔名士優劣論自史記班漢以來秉史筆者豫盡知其人矣言東漢有若陳宗尹敏伏無忌邊韶崔實馬日磾蔡雍盧植司馬彪華嶠范曄袁宏言三國志有若衛顗繆襲應璩王沈傳玄茅曜薛瑩華核陳壽言晉洛京史有若陸機束晢王詮詮子隱言江左史有若鄧粲孫盛王韶之檀道鸞何法盛臧榮緒言宋史有若何承天裴松之蘇寶圭沈約裴子野言齊史有若江文通吳均言梁史有若周興嗣鮑行卿何之元劉璠言陳史有若顧野王傳宰陸瓊姚察察子思廉言十六國史有若崔鴻言魏史有若鄧淵崔浩浩弟覽高允張偉劉橫李彪邢巒溫子升魏收言北齊史有若祖孝徵陸元規楊休之杜臺卿崔子發李德林德林子百藥言後周史有若柳虯牛弘令狐德棻岑文本言隋書有若王邵王胄顏師古孔穎達于志寧李廷壽言皇家受命有若溫大雅魏鄭公房梁公長孫趙公許敬宗劉胤之楊仁卿顧胤牛鳳及劉子玄朱敬則徐堅次而修者亦近耳目劉軒作唐之一經垂之於無窮誅姦諛於既死發潛德之幽光韓文今之所以知古後之所以知今不可口傳必憑諸史韓進順宗實録狀孔子作春秋也諸侯用夷禮則夷之夷而進於中國則中國之韓文孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史兄弟幾盡左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死陳壽起又廢卒亦無所至王隱謗退死家習鑿齒無一足崔浩范曄赤族魏收夭絶宋孝王誅死足下所稱吳兢亦不聞身貴而後有聞也夫為史者不有人禍必有天刑豈可不畏懼而輕為之哉韓文公答劉秀才論史書何不自著書實録彼善人編為一家言以備史闕文白集顯筆有史流于千祀杜牧之宰相升沉人於數十年間史官出沒人於千百歲下是史官與宰相分挈死生權也孫可之文文敵遷固直如南董皇甫湜筆端膚寸澤及天下唐文粹史筆應令諂骨羞王建集馬遷班固咸有述作庶幾聖賢其於斟酌典謨表章微絶曾不能觸其藩籬者也魏晉之際夫何足云中原板蕩史道息矣陳叔達本朝聯借舊史誅姦彊坡詩互見疾惡新唐書敘事好簡略其詞簡故其事多鬱而不明此作史之弊也且文章豈有繁簡必欲多則文冗而不足讀必欲簡則僻澀令人不喜假令新唐書載卓文君事不過止曰少嘗竊卓氏如此而班固載此事乃近五百字讀之不覺其繁也且文君之事亦何補於天下後世哉然作史之法不得不如此故謂文如風行水上出於自然也若不出於自然而有意於繁簡則失之矣唐書進表云其事則增於前其文則省於舊且新唐書所以不如兩漢文章者其病正在此兩句也劉器之唐李延壽著南北史粗得作史之體故唐書本傳亦謂其過本書遠甚然好述妖異兆祥謠讖特為繁猥陳正敏遁齊間覽晉書僞極多有甚害名教者如鄧攸棄子則攸之滅天性何足為賢列女傳王渾見王濟趍庭曰生子如此足慰人意妻鍾琰曰新婦得配參軍生子不翅如此何等語乃載之史冊謂之列女乎謝安捷書至還內屣齒折謂之矯情鎮物安之過海風起浪湧諸人皆懼而安自若又亙溫欲害安與王坦之倒執手板而安神色不變苻堅入寇獨無懼色如此之類曰矯可乎故荊公詩云彼哉斗筲人得喪易驚怯妄言屣齒折吾欲刊史牒蓋深嫉作史者之繆也同前范蔚宗黃憲傳最佳憲初無事跡蔚宗直以語言模寫叔度形容體假使後世見之此最妙處其他傳即馮衍馬援勝蓋得二人文字照映便覺此傳不同以此知班固前書不可及者亦得司馬賈董諸人文字作皮草步里客談史顏師古曰發縱讀為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也西漢蕭何傳注周處風俗記仲夏端五謂五月初五也今書端午其義無取豫家元和中端五詔書並無作午字唐李正文資暇集近世作文者多以青紫荷橐作侍從使不知其誤晉輿服志曰八座尚書則荷上聲紫以生紫為夾囊綴之服外加於左肩至南史周捨問劉杳曰尚書著紫荷囊相傳云挈囊竟何所出杳曰張安世傳云持橐簪筆今世以侍從為持橐則誤矣風俗通曰無恙俗說疾也凡人相見及書問者曰無疾耶按上古之時草居霧宿恙噬蟲也食人心凡相勞問者曰無恙乎非為疾也藝文類聚南史顏延之詩曰五薦不入朝一麾乃出守延之披擯以此自托古今詩話亦載此事雖杜牧之為登樂詩亦云擬把一麾江海去因此遂為故事今世以守郡謂之把麾蓋其誤有自來矣于頔以樂曲有想夫憐其名不雅客曰南朝相府曾有瑞蓮故號相府蓮後語訛矣國史補本朝毛詩出車曰畏此簡書則簡書者治竹煞青作簡以書耳今人直用紙名曰簡以通慶吊之禮說苑曰越襲吳吳王將死曰吾不用子胥之言至于此死者有知吾何面以見子胥也遂蒙絮覆面以死今人死以方帛覆面者誤也事物紀原唐避代宗嫌名故民間呼山藥為薯藥本朝又避英宗嫌名遂改曰山藥自此全失其本稱矣事物紀原晉右軍王羲之好鵝後世以鵝為右軍同前惟桑與梓必恭敬止謂桑梓以人賴其用故養而成之莫肯凌踐則有恭敬之道父子相與豈特如人之親桑梓今乃言父母之邦者必稱桑梓非也溫叟詩話山東曰朝陽山西曰夕陽故詩曰度其夕陽又曰梧桐生矣于彼朝陽指山之處耳後人便用夕陽忽西流然古人亦誤用久矣宋子京作筆記高山仰止景行行止景明也高山則仰之明行則行之耳魏晉間所謂景莊景儉等從一人差誤遂相承謬亦如郡守為一麾也山谷俗呼人之妻父為嶽丈以泰山有丈人峰丈人觀似亦有理也而呼妻母為泰水此何義耶晉樂廣衛玠妻父也時稱冰情玉潤然則俗所謂嶽丈當云樂丈耳本朝孫正訓又互見婦翁門渭陽秦康公念母之詩也我見舅氏如母存焉今世俗母在稱舅氏亦曰渭陽非也鄭風揚之水云終鮮兄弟注云鮮寡也言忽兄弟爭國寡於兄弟之恩後世無兄弟者則稱終鮮失詩人之意凡分至啓閉必書雲物今世以冬至為書雲節而夏至二分皆未嘗用豈未知道歟並管見荀子云蘭槐之根為芷蘭芷自兩物又云蟹六跪而二螯蟹實八足不應言六跪荀卿楚人蘭芷蟹皆楚地所有著書者既借物以為喻當能辨物之形性不知何以致誤如此陸正敏撰遁齊間覽嵇叔夜與山巨源絶交書云野人有快灸背而羹芹子者欲獻之至尊後世遂有獻芹之說豫讀列子楊朱篇但云宋國有田夫曰負日之暄人莫知之以獻吾君其室告之曰昔人有羹戎蔡與芹子者對鄉豪稱之鄉豪嘗之蜇於心慘於腹衆哂之此獻芹之說實無所出特嵇叔夜合快灸背羹芹子二者而言之耳管見
