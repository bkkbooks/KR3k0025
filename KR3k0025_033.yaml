body:
  text: 袖手旁觀史利不在身以之謀事則智慮不私已以之斷義必厲東漢馬援傳互入無心門集坐觀垂釣者空有羨魚情孟浩然巧匠旁觀縮手袖間韓文自彈不若聽人彈白集本朝望室而知四隅者必超室表舉輿而知輕重者必在輿外老泉操舟常患不見水道之曲折而水邊之立觀者常見之奕棊之形雖國工有所不盡而袖手傍觀者常得之東坡秉燭者不如隨燭之明奕棊者不如觀棊之精通鑑論篤經差之毫釐繆以千里記經解財聚則民散財散則民聚記子孔子曰舟非水不行水入舟則舟沒家語六本篇仲尼曰吾終身與汝交一臂而失之謂顏回也莊子自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊子德充符人之所以異於禽獸者幾希庶民去之君子存之孟離婁上善擇者制人不善擇者人制之荀子王伯時之反側間不容息淮南子原道訓適堯舜文王者為正道非堯舜文王者為他道揚子問道先甲一日易後甲一日難揚子先知御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵揚子互在人所為開之廓然見四海閉之閛匹庚切然不覩墻之裡揚子問道由其德舜禹受天下不為泰不由其德五兩之綸半通之銅亦泰矣揚子孝至史先則制人後則為人所制史記太尉令軍中曰為呂氏右袒為劉氏左袒軍中皆左袒史記呂后紀意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣西漢鄒陽傳互入離合無親踈先發制人後發制於人西漢陳勝傳行之有疑禍如發矢不可追也前漢淮南王傳係絕於天不可復結墜入深淵難以復出其出不出間不容髮西漢枚乘傳上吳王書譬之操鏌釾執其柄則人莫敢抗失其柄還見害也東漢崔寔傳政論千里之差興於毫端東漢匈奴傳上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也秦始皇營宮室而民怨叛者病人以利巳故也通鑑唐太宗機靜則有福機動則有禍通鑑唐武后帝曰丈夫得則為王失則為虜通鑑梁均王石敬塘曰夫事成於果決而敗於猶豫通鑑傳記中山君曰吾以一杯羊羹亡國以一壺食得士二人戰國策集必若所為危於累卵難於上天變所以為易於反掌安於太山選枚乘上吳王書互入在人所為用之則為虎不用則為鼠選荅客難出其言善千里應之苟違此義同衾以疑張華女史箴聽受一繆差以千里齊竟陵王行狀君失臣兮龍為魚權歸臣兮鼠變虎李白火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且遠能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣韓文先謀後事者逸先事後謀者失文粹珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多遠也鏌釾臥於鈆鈍之中下工覩之固亦知矣一有不知則必自與鈆鈍者亦不多遠也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多遠也唐文粹猛虎所以使物畏而不敢犯者以能威自居也故盤林橫谷奮睛以拏怒掉尾以倚嘯厭食於羆豕麋麚之肉及棄其所長而欲弭目委首以待餧是知命懸於執者之手雖麈兒得以狎而搏欲申步於咫尺安得自遂也同前非以智免則將禍隨劉長卿南軍不袒左邊袖四老安劉是滅劉杜牧之佞媚之言出如絲棼一入于人治亂不分間諜之言出如鷹鸇鷹鸇之迅一舉凌天皮日休集本朝權衡之平物動則輕重差其於靜也錙銖不失水之鑒物動則不能有睹其於靜也毫髮可辨歐公非非臺記聚則為君臣散則為仇讎聚散之間不容毫釐故天下歸往謂之王人各有心謂之獨夫東坡上皇帝書此等棄而不用則作賊收而用之則捉賊東坡代李琮論東京賊盜狀順水而行雲駚鳥集維水之利千里咫尺亂流而涉過膝則止維水之窖咫尺千里東坡何公橋詩序若已為君子而使人為小人是亦去小人無幾矣東坡文譬諸草木種子若置之虛空不投地中雖經百千歲何緣得產若種之地中潤之以雨露暵之以風日則開花結子數日可待欒城集經若火之燎于原不可嚮邇書盤庚上燎之方揚寧或滅之詩小雅正月子故仁人之兵聚則成卒散則成列延則若莫耶之長刃嬰之者斷銳則若莫耶之利鋒當之者潰圜居而方正則若盤石然觸之者角摧荀子議兵臣之劍十步一人千里不留行王曰天下無敵矣此劍直之無前舉之無上案之無下運之無旁上絕浮雲下絕地紀莊子說劍史以此眾戰誰能禦之以此攻城何城不克左僖四鼓行而西西漢張良傳觸之者碎犯之者焦通鑑一卒畢力百人不當萬夫致死可以橫行後漢鄭泰曰譬猶驅虎兇以赴犬羊鼓烈風以掃枯葉誰敢禦之通鑑漢獻紀一夫荷戟千人莫當晉書羊祜傳盧藏用曰君如干將莫耶難與爭鋒通鑑唐紀若虎狼之得獸也何以當之通鑑唐代宗傳記干將鏌釾所刺無前論衡集一夫揮戟萬人不得進選陳孔璋書先鋒孰敢爭杜詩經若農服田力穡乃亦有秋書盤庚上若藥弗瞑眩厥疾弗瘳書說命上先知稼穡之艱難乃逸書無逸思其艱以圖其易民乃寧書君牙子無冥冥之志者無昭昭之明無惛惛之事者無赫赫之功荀子忍痛苦之藥石者所以除伐命之疾韓非子史不一勞者不久佚不暫費者不永寧西漢匈奴傳集孰不實而有獲楚辭經潛雖伏矣亦孔之炤詩正月君子之道闇然而日章記中庸子鄭子真耕乎巖石之下名振京師揚問神自後者人先之自下者人高之揚子寡見史法真隱居不仕前後四徵終不屈友人郭正曰法真名可得聞身難得而見逃名而名我隨避名而名我追通鑑漢順紀互入隱逸韓康採藥賣於長安市三十餘年時有女子買藥康守價不移女子怒曰公是韓伯休耶乃不二價耶康嘆曰我本欲避名今小女皆知有我焉用藥為乃遯入霸陵漢後書互入避名傳記魏武將見匈奴使自以形陋不足雄遠因使崔季珪代當自捉刀立床頭曰魏王何如匈奴使荅曰王雅望非常然床頭捉刀人此乃英雄也王馳遣殺使世說互入因言取禍集蘭芷幽而有芳楚辭居蔽而聞章同上經素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難記中庸道不行乘桴浮于海語公治長子欲居九夷或曰陋如之何子曰君子居之何陋之有語子罕樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也語語子路言忠信行篤敬雖蠻貊之邦行矣語衛靈公子人知之亦囂囂人不知亦囂囂孟子盡心下靜而與陰同德動而與陽同波上際於天下蟠於地莊子刻意史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季主傳互入隱逸寐與周公通夢靜與孔子同意東漢邊韶傳集採於山美可茹釣於水鮮可食起居無時惟適所安韓文若有人於群動處一代問彼為彼我為我不自潔不自污不巢許不伊呂水其心雲其身浮沉消息無往而不自得其為達人乎白樂天互入曠達居不必野惟性之寂止不必廣唯心之適皮日休集經婉兮孌兮總角丱兮未幾見兮突而弁兮詩甫田子日改月化莊子山水史積善在身猶長日加益而人不知也西漢董仲舒策魯肅拊呂蒙背曰吾謂大弟但有武略耳至於今日學識英博非復吳下阿蒙蒙曰士別三日即更刮目相待吳志本傳注經言者所以明象得象而忘言象者所以存意得意而忘象猶蹄者所以在兔得兔而忘蹄筌者所以在魚得魚而忘筌者也易略例子筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言莊子外物篇女因媒而嫁不因媒而親淮南子史蜚鳥盡良弓藏狡兔死走狗烹史越世家四時之序成功者去通鑑秦紀弓藏鳥盡信匪虛言通鑑唐代宗傳記濟川得岸何假舟馬祕要經經母教猱升木詩角弓季氏富於周公而求也為之聚歛而附益之語先進子孟子曰求也為季氏宰而賦粟倍他日孟子離婁上君不鄉道不志於仁而求富之是富桀也孟告子下虎哉虎哉角而翼者也揚子始皇方斧將相方刀揚子互入同惡推波助瀾文中子史猶抱薪救火薪不盡火不滅通鑑周紀子天定亦能勝人荀子史天之棄商久矣君將具之弗可左僖二十一天之所啟人弗及也左僖二十三天之所置其可廢乎左僖二十八天方授楚未可與爭雖晉之彊能違天乎左宣十五力田不如逢年善仕不如遇合史佞倖傳祕記云唐三世之後女主武王代有天下上惡之密問太史令李淳風祕記所云信有之乎對曰臣仰稽天象俯察曆數其人已在陛下宮中為親屬自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣通鑑唐太宗經君所無私諱記曲禮上注尊無二父前子名君前臣名注曰至尊無大小皆名記曲禮上從於先生不越路而與人言注尊不二也記曲禮上夫為人子者三賜不及車馬不受不敢以成尊比踰於父記曲禮上孔子曰天無二曲土無二王嘗禘郊社尊無二上記曾子問雖有三命不踰父兄記文王世子子云天無二日土無二王家無二主尊無二上示民有君臣之別也記坊記國無二君家無二尊以一治之也父在為母齊衰期者見無二尊也喪服四制子孔子曰天無二日民無二王孟萬章上大夫之臣拜不稽首非尊家臣也所以辟君也荀子大略君者國之隆也父者家之隆也隆一而治二則亂未有二隆爭重而能長久者荀子史周宰渠伯糾來聘父在故名左威四欒書將載晉侯鍼曰書退時鍼為晉侯右書將中軍國有大任馬得專之注云在君前故子名其父左成十六經拔茅茹以其彙征吉易泰卦子天下之至明能舉天下之至賢家語唯君子為能知類荀子楊素曰素聞惟賢知賢敢問夫子文中子王道篇史惟善故能舉其類詩云惟其有之是以似之左襄孝文召田叔問曰公知天下長者乎對曰臣何以知之上曰公長者宜知之田叔曰孟舒長者也西漢田叔傳賢人在上位則引其類而聚之於朝在下位則思與其類俱進在上則引其類在下則推其類以類相致也前漢劉向傳惟賢知賢為朕求可以自輔者通鑑漢成紀夫惟賢知賢惟堊知聖凡人安能知非凡人耶通鑑漢獻紀田子方曰進賢者亦賢也說苑傳記同聲則異類而相應意合則未見而相親賢者立於本朝而天下之豪相率而趍之也從其類也故詩有伐木之歌易有拔茅之喻也大戴記保傳篇經飲食男女人之大欲存焉死亡貧苦人之大惡存焉禮運如惡惡臭如好好色記大學子所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心孟子公孫丑上若合符節先堊後堊其揆一也孟子離婁下孩提之童無不知愛其親及其長也無不知敬其兄孟子夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五者人情之所必不能免也荀子王伯人之情雖桀紂又豈肯為其所惡賊其所好者哉荀子議兵凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡耳辨聲音清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨体膚理辨寒暑疾養是又人之所當生而有也是無待而然者也是禹桀之所同也荀子榮辱凡人之情得所欲則樂逢所惡則憂見利莫能勿就見害莫能勿避管子禁藏民之去就如火之於燥濕水之於高下同上琬琰之玉存泥沙之中雖廉者不釋淮南子史夫不令之臣天下之所惡也左宣十互入疾惡曾參孝其親天下願以為子子胥忠於君天下願以為臣史記陳軫傳和氏璧天下所共傳寶也史記司馬相如傳猶子弟之衛父兄手足之捍頭目前漢刑法志人情憚難而趍易好同而惡異通監魏明紀集至於稻也粱也膾也炙也豈聞有不嗜者哉儒墨同是堯舜同非桀紂並韓文麟之為靈雖婦人小子皆知其為祥也韓退之獲麟解劉伶今日意異代是同聲柳詩本朝韓魏公嘗言仁廟配享清議皆與沂公不與申公誠意不可欺如此遺事人情不問賢愚莫不畏天而嚴父東坡
