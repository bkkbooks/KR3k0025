body:
  text: 嫉妬經人之有技冒疾以惡之人之彥聖而違之俾不達書秦誓子愚者好專事而妬賢能抑有功而濟有罪荀仲尼士有妬友則賢交不親君有妬臣則賢人不至荀大略小人不能則嫉妬怨誹以傾覆人荀不苟害良曰賊荀脩身隱良者謂之嫉荀大略日月欲明浮雲蔽之藂蘭欲茂秋風敗之文子史屈原入則與王圖議國事以出號令出則接遇賓客應對諸侯王甚厚之上官大夫與之同列爭寵而害其能王使屈原為憲令屬草藁未定上官大夫見而欲奪之平不與因讒之史記本傳藺相如為上卿在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且素賤人吾羞不忍為之下宣言曰我見必辱之史記本傳互入不伏善韓非使秦王悅之未信用李斯姚賈害毀之王以為然下吏治非李斯使人遺非藥自殺史記本傳妬賢嫉能有功者害之賢者疑之史記漢高紀天子議以賈生為公卿絳灌馮敬之屬盡害之乃短賈生曰洛陽之人年少初學專欲擅權紛亂諸事於是天子疏之不用其議史記本傳翟方進舉明經遷議郎時宿儒有胡常與方進同經名譽出方進下乃心害其能論議不右方進西漢本傳公孫為人意忌史記本傳女無美惡入宮見妬士無賢不肖入朝見嫉西漢鄒陽傳初孫臏與龐涓俱學兵法涓自以能不及臏乃以法斷其兩足而黥之欲使終身廢棄通監周紀有妬媢之心西漢五行志王式為博士諸大夫博士共持酒肉勞式皆注意高仰之博士江公世為魯詩宗心嫉式謂歌吹諸生曰歌驪駒式曰聞之於師客歌驪駒主人歌客毋庸歸今日諸生為主人日尚早未可也江公曰經何以言之式曰出曲禮江公曰何狗曲也式恥之陽醉逿墬古地字式客罷讓諸生曰我本不欲來諸生彊勸我竟為豎子所辱西漢王式傳董仲舒言道德見妬於公孫洪李廣奮節於匈奴見排於衛青東漢馬衍傳唐彬當世英彥見彬莫不欽悅稱之於文帝文帝問孔顥顥忌其能良久不荅陳騫曰彬為人勝騫遠甚帝辟彬為屬他日謂孔顥曰近見唐彬卿受蔽賢之責矣晉書互入蔽賢燕封裕曰己無骨鯁嫉人有之通監晉紀互入居邪惡正外似柔謹內實忌克通監梁高祖孔穎達老師宿儒恥出其下陰遣客剌之隋書本傳李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而陰陷之世謂李林甫口有蜜腹有劍通監唐元紀傳記馬融筭渾天不合召鄭元令一筭便決及元歸融心忌焉元亦疑有追者乃坐橋下在水上據屣融果欲追之左右曰元在土下水上據木此必死矣遂罷追語林天寶初帝顧林甫曰嚴挺之安在其材可用林甫退召其弟損之與道舊諄複款曲且許美官因曰天子視絳州挺之也厚要當以事自解歸得見上且大用因紿挺之使稱疾願就醫京師林甫已得奏即言挺之春秋高有疾幸閑官得就養唐書嚴挺之傳盧杞居相忌能妬善小不附者必致之於死惡顏真卿之直言令奉使李希烈竟歿於賊唐書本傳集世溷濁而嫉妬楚辭眾僉諧以妬賢孤聖特而易傷同上人惡俊異俗疵文雅選詩斲善害能醜正惡直肆其噤害則皆妬之徒也妨功害能之臣盡為萬戶侯並同上靜思屈原沈遠憶賈誼貶椒蘭爭妬忌絳灌共讒諂韓文妬腸務生敵同上忌者畏人修事修而謗興德高而毀來韓文來時畏有他人上截斷龍胡斬鵬翼元稹集權臣妬逸才心如斗筲窄文粹經誣善之人其辭游易繫辭讒說殄行書舜典起信險膚書盤庚上協比讒言書盤庚下萋兮成是貝錦彼譖人者亦己太甚哆兮侈兮成是南箕箋云箕星舌廣彼譖人者誰適與謀詩巷伯緝緝翩翩謀欲譖人捷捷幡幡謀欲譖言取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊並同上互入疾惡營營青蠅止于樊豈弟君子無信讒言注蠅之為虫污白使黑污黑使白喻佞人變亂善惡也營營青蠅止于棘讒人罔極交亂四國詩青蠅盜言孔甘亂是用餤詩巧言無罪無辜讒口囂囂詩十月之交浸潤之譖膚受之愬語顏淵子傷良曰讒荀脩身搖唇鼓舌擅生是非莊墨子所以悲絲楊朱所以泣歧路以其變為青黃迴為左右也劉點素為緇同上讒嫉之人必好聞人惡惡聞人善劉貴言讒邪之蔽善人也猶朝日洞明霧甚則不見天沙石至淨流濁則不見地雖有明淨之質而不發明水霧蔽之也同上昔直不疑未嘗有兄而讒者謂之盜嫂第五倫三娶孤女而世人云笞婦翁此聽虛而責響悖情倒理誣罔之甚也劉傷讒互入謗毀史猶有內讒左閔二年毀信廢忠崇飾惡言靖譖庸回服讒蒐慝以誣盛德謂之窮奇共工左文十八年若眾口之鑠金國語言之太甘其中必苦譖在中矣國語晉吳太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩今不見用常鞅鞅怨望吳王乃使使賜子胥屬鏤之劍以死史記本傳互入信讒屈原為憲令上官大夫見而欲奪之不與因讒之曰王使屈平為令眾莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平史記屈平傳積毀銷骨史記張儀傳范睢謬曰秦安得王秦獨有太后穰侯耳臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王大其都者危其國尊其臣者卑其主今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝通監周紀田蚡曰魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而心謗不仰視天而俯畫地睥睨兩宮幸天下有變而欲有功史記灌夫傳絳灌讒陳平曰平雖美丈夫如冠玉耳其中未必有也居家盜其嫂受諸將金西漢陳平傳眾口之浸潤通監漢文紀張湯曰嚴助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市通監漢武紀孔墨之辯不能免於讒諛西漢鄒陽傳師丹使吏書奏吏私寫其草丁傳子弟聞之使人上書告丹上封事行道人遍持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄通監漢成紀讒言蠭生西漢中山王傳馬援在交趾嘗以薏苡實能輕身省慾以勝瘴氣援欲以為種軍還載之一車時人以為南土珍怪卒後有人上書譖之者以為前所還載皆明珠文犀東漢本傳邪徑敗良田讒言敗善人荀悅漢紀周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之剌惡直醜正何代無之晉書元宗曰是子妬賢嫉能舉無比者新唐書李林甫傳傳記三人成虎十人撓椎眾口所移毌翼而飛戰國策眾口鑠金俗說有美金眾人咸共詆訾言其不純賣金者欲其售因取鍜以見真偽此為眾口鑠金風俗眾口所毀浮石沈木陸賈集鴟鴞鳴衡軛豺狼當路衢蒼蠅間白黑讒巧令親踈曹子建贈白王彪詩飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳晉傳元飛塵萹積毀銷金積讒磨骨江文通書飛金沈羽蔣子萬機論欲構南箕成貝錦文選青蠅一相點白璧遂成冤陳子昂集互入因惡累美群誣成罪聖人不能救同上讒口到骨杜甫祭房相文黃金銷眾口白璧竟難投李太白文白璧何辜青蠅屢前群輕折軸下沈黃泉眾毛飛骨上凌青天萋斐暗成貝錦粲然泥沙聚埃珠玉不鮮交亂四國播于八埏拾塵掇蜂疑聖猜賢握髮數罪罪乃孔多傾海流奔惡無以過積毀銷金沈憂作歌同上有道士言人皆有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏出讒于帝以求饗以是人多謫過疾癘夭死柳文罵尸蟲側肩帖耳有舌如刀韓文喑嚙堪銷骨潛飛有禍胎元稹集蚊蚋與利觜枳棘與鋒鋩巧隨清影觸處行好學春鶯百般囀讒譖消骨髓並同上巧言構人罪至死人不疑白侍郎集如有膚受譖久則瘡痏成同上蒼蠅難祛貝錦方織好丹非素點白成黑李義山白璧眾求瑕素絲易成污韋應物人或罹譖比肩狐疑借有解紛毀輒隨之劉賓客蒼蠅點垂棘巧舌成錦綺盧仝常恐眾毀至春葉成秋黃孟東野微瑕懼掩瑜溫飛卿能用傾巧之智構成疑似之端李深之鑠肉銷骨皇甫湜每被銷於兄口唐文粹初因起毫髮漸可離骨肉嘉木忌深蠹哲人悲巧誣並同上本朝自從蒙眾說日月遭蔽虧歐公詩積毀銷骨巧言鑠金市虎成於三人投杼起於屢至東坡文天螻伏隙錄人語射工含沙須影過黃魯直詩止棘之詩垂之六經宜乎以爾剌讒人之亂國誠可嫉而可憎歐陽公憎蒼蠅賦經人之有技若己有之人之彥聖其心好之不啻如自其口出書秦誓衛文公臣子多好善詩干旄愛莫助之詩烝民好賢如緇衣詩緇衣彰人之善美人之功記表記推賢而進達之不望其報記儒行君子成人之美語顏淵見善如不及語季氏子樂善不倦孟告子上得天下英才而教育之三樂也孟盡心上史晉叔向適鄭鄭鬷蔑立於堂下一言而善叔向下執其手以上曰子若無言吾幾失子矣左昭鮑叔既進管仲以身下之史記本傳鄭當時推轂士及官屬丞吏常引以為賢於己聞人之善言進之上唯恐後諸公以此翕然稱鄭莊前漢本傳何武為人好獎人之善為楚內史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也世以此多之漢武帝讀子雲賦而善之曰朕不得與此人同時哉並同上聞人之善若出諸口言有可采必演而成之薦達賢士多所獎進知而未言以為己過東漢孔融傳天下之寶故為天下所惜王坦之荅謝安書好賢樂善情如飢渴通監楊敬之雅愛項斯為詩所至稱之唐書本傳荀文若之進善不進不休通監集田文之愛士鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌嵇叔夜絕交論片善經心揖仲宣於蔡席一言合道接然明於鄭階駱賓王集片善必甄揖虞翻於東箭一言可紀許顧榮以南金同上執事好賢樂善孜孜以薦進良士為己任方今天下一人而已韓愈與陸員外書一字愜心金玉不顧片言合趣布褐無間呂和叔文本朝文忠公見子瞻書語聖俞曰老夫當避此人放出一頭地蘇子由集歐陽文忠公喜士為天下第一冷齋夜話互入延接冠萊公聞一善薦導推輓不進用不已五朝言行錄
