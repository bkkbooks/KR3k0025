body:
  text: 頃刻不忘善經道也者不可須臾離也中庸禮樂不可斯須去身記樂記仰之彌高鑽之彌堅瞻之在前忽焉在後語子罕立則見其參於前也在輿則見其倚於衡也衛靈公子曰君子無終食之間違仁造次必於是顛沛必於是里仁集口不絶吟於六藝之文手不停披於百家之編韓文朝馳騖乎書林夕翱翔乎藝苑互入好學行之乎仁義之塗遊之乎詩書之源並同上經為山九仞功虧一簣書旅熬君子遵道而行半塗而廢中庸為禮不本於義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也譬如為山未成一簣止吾止也語子罕子掘井九仞而不及泉猶為棄井也孟子盡心上丘陵學山而不至於山是故惡夫畫也楊學徑集方伐柯而捨其斧可乎文粹經子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣中庸子路有聞未之能行惟恐有聞語公冶長吉人為善惟日不足書泰誓當仁不讓於師語衛靈公見善如不及為仁由己而由人乎哉顏淵子聞一善言見一善行若決江河沛然莫之能禦也孟子雞鳴而起孳孳為善仰而思之夜以繼日幸而得之坐以待旦離婁下史從善如流左上問東平王處家王言為善最樂東漢本傳經好問則裕書仲虺之誥舜好問而好察邇言中庸不恥下問語子入太廟每事問以能問於不能以多問於寡泰伯子孔子適周問禮於老聃訪樂於萇弘家語受書於李育學詩於夏琠問禮於關子明正樂於霍汲考易於仲華文中世家史郯子來朝昭子問少皞氏鳥名官郯子曰吾祖也我知之仲尼聞之見於郯子而學之左昭十七年時仲尼年十八孔子學鼓琴于師襄子史孔子世家問事不休賈長頭後漢賈逵傳傳記仲尼之聖訪諸郯子始聞少皞之官叔向之賢詢彼國僑載辨黃熊之祟史通集靡事不咨楊荊州誄經擇乎中庸而不能期月守也中庸其餘則日月至焉而已矣語中庸之為德也其至矣乎民鮮久矣雍也子五穀不熟不如荑稗孟子告子經顏子有不善未嘗不知知之未嘗復行也易繫辭不遠復無祗悔復卦君子有過則改益卦無咎者善補過也繫辭上改過不吝書仲虺之誥不二過語過則勿憚改學而子子路鼓瑟孔子聞之曰習亡國之音能保六尺之體乎冉有以告子路子路懼而自悔靜思不食以至骨立家語互見勇於改過晉人有馮婦者善搏虎卒為善士孟子萬章上子路人告之以有過則喜公孫丑上聞過而有喜色程元能之文中子禮樂篇史吳季札如晉將宿於戚孫林父邑聞鐘聲焉曰夫子獲罪於君而在此懼猶不足而又何樂文子林父聞之終身不聽琴瑟左襄二十八年人誰無過過而能改善莫大焉宣二年君子能知其過必有令圖天所贊也左改往反過西漢谷永傳有盜牛者主得之盜請曰刑戮是甘乞不使王彥方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懷恥惡必能改過故以此激之後有老父遺劍于路行道一人見而守之至莫老父還尋得劍怪而問其姓名以事告烈使推求乃先盜牛者也東漢王烈傳周處少不修細行州里患之自知為人所惡慨然有改勵之志曰今時和歲豐何不樂耶父老曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處乃入山殺虎沒水殺蛟勵志好學志存義烈克己年州府交辟晉書本傳互入發憤智者改過而遷善則其德日新通監唐德宗紀陸贄曰臣聞仲虺贊揚成湯不稱其無過而稱其改過吉甫歌頌周宣不美其無闕而美其補闕是則聖意較然明甚唯以改過為能不以無過為貴通監唐德宗紀集剋己自懲創韓文事多改前好顏子不二過者蓋能止之於始萌絶之於未形不二之言行也並同上馮婦好搏虎卒為善士周處狂橫一旦改節皆能自克柳文本朝今當痛自改三釁復三湔山谷經法語之言能無從乎改之為貴從而不改吾末如之何也已矣語子有人日攘其鄰之雞或告之曰是非君子之道請損之月攘一雞以待來年然後已如知其非義斯速已矣何待來年孟子滕文公下史朕見前世帝王拒諫者多云業已為之或云業已許之終不為改如此欲無危亡得乎通監唐太宗紀互見遂非集人患不知其過既知之又不能改是無勇也韓文經小人以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易繫辭互見怙終無恥過作非書說命過而不改是謂過矣語衛靈公吾未見能見其過而內自訟者也公冶長舍曰欲之而必為之辭季氏不善不能改是吾憂也小人之過也必文並語子今之君子過則順之豈徒順之又從而為之辭孟子公孫丑下醜必托善以自為解邪必蒙正以自為辭游不論國仕不擇官行不辟污曰伊尹之道也分別爭財親戚兄弟構怨骨肉相殘曰周公之義也行無廉恥辱而不死曰管子之趍也行貨賂趣勢門立私廢公比周而取容曰孔子之術也淮南子秦族訓史過而不改而又久之以成其悔何利之有焉左宣十七年言足以飾非史記商紀子獨不見家人寡婦耶始自約敕之時意乃慕宋伯姬及陳孝婦不幸一為盜賊所污遂行淫佚知其非禮然不得自還吾猶此矣西漢原涉傳互入將誤就非竇嬰曰侯自我得之自我失之無所恨西漢田蚡傳漢高帝曰吾繫相國欲令百姓聞吾過也通監漢高紀愚者恥過而遂非遂非則其惡彌積通監唐德宗紀公孫洪謝曰夫知臣者以臣為忠不知臣者以臣為不忠通監漢武紀梁武帝遭臺城之變歎曰自我得之自我失之亦復何恨通監本紀翟莊曰貪餌吞鉤豈我也哉晉書本傳謝鯤字幼輿挑鄰家女高氏投梭折其兩齒時人為之語曰任達不已幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌晉書孫子荊謂王武子曰當枕流漱石武子曰石非可漱流非可枕孫曰所以枕流欲洗其耳所以漱石欲礪其齒王隱晉書互見將誤就非李林甫子岫見權勢熏灼曰大人居位久枳棘滿前一旦禍至若欲比若人可得乎時岫見輦重者流涕林甫不樂曰勢已然可奈何唐書互入恐懼傳記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曹劉沈謝暗中摸索著亦可識國史纂異互見藐視賈充問孫皓曰何以剝人面皓曰憎其顏之厚耳語林本朝仁宗朝王安石知制誥一日賞花釣魚宴內侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也聞見録互見為識者所窺經自用則小書仲虺之誥匪先民是程匪大猷是經詩具曰豫聖詩正月自獨俾臧自有肺腸詩桑柔抑此皇父豈曰不時詩十月之交愚而好自用賤而好自專生乎今之世反古之道中庸子自以為是而不可與入堯舜之道孟子宋之愚人得燕石藏之以為大寶周客聞而觀焉主人端冕玄服以發寶匱十重緹巾十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固闕子不是師法而好自用譬以盲辨色以聾辨聲荀修身今之處士無能而云能無知而云知者也荀子非十二子史吳起為人剛徑自喜通監周紀奮其私知而不師古始史項羽紀事不師古而能長久者非所聞也史李斯傳輦上君子自以為堯舜之世何敢妄言晉書子思曰君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非通監上曰吾業已授之不可追也通監唐高祖紀宗愨為豫州吳喜為典籤愨刑政所施喜每多違執愨大怒曰宗愨年將六十為竭命正得一州如斗大不能復與典籤共臨之自用不能聽大度之言通監秦紀經人莫知其子之惡記大學史人有愛其狗者狗常溺井其鄰人見欲入言之狗當門而噬之通監周紀令狐綯執政歲久子滈頗招權受賄言者攻其短令狐綯為其子滈訟冤通監唐宣宗集柏侯抱將死之疾而怒扁鵲之先見嵇叔夜養生論本朝今人有過不喜人規如護疾而忌醫寧滅其身而無悟也濂溪通書經小人以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易繫辭互入遂非怙終賊刑書舜典晝夜額額注肆惡無休見書益稷凶人為不善亦惟日不足書泰誓穢德彰聞同上狃于姦宄書君陳驕矜誇將由惡終書畢命方茂爾惡相爾矛矣詩節南山庶曰式臧覆出為惡詩雨無正多將熇熇不可救藥詩板史長惡不悛從自及也左隱六年不思謗言讀不憚鬼神神怒民痛無悛於心左昭二十宋子魚曰禍猶未也未足以懲君左僖二十一年於易一過為過再為涉三而弗改滅其頂凶魏志傳記蜂蠆不棄毒於人則不靜說苑權謀篇集雖九死其猶未悔楚詞蜂蠆終懷毒杜詩梟音不悛鴟張益熾白傳集史吳季札將宿於戚孫林父邑聞鐘聲焉曰夫子獲罪於君以在此懼猶不足而又何樂焉左衛侯衎復歸于衛大夫逆于境者執其手而與之言道逆者自車揖之逆於門者頷之而已左襄二十六年互見驕矜門齊王出亡之衛衛君辟宮舍之稱臣而共具齊王不孫衛人侵之齊王去奔鄒魯有驕色鄒魯弗內遂走莒通監周紀項王渡淮有二十八騎漢追者數千人項王曰起兵七十餘載戰所當者破未嘗敗北今卒困此天亡我非戰之罪也今日願為決戰斬將搴旗令諸君知天亡我非戰之罪也史項羽紀集小人在辱亦克知悔及其既寧終莫能戒韓文
