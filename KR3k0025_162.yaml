body:
  text: 心服經獻子加於人一等矣記檀弓管仲奪伯氏駢邑三百飯蔬食沒齒無怨言語憲問顏淵喟然嘆曰仰之彌高鑽之彌堅瞻之在前忽焉在後語子罕子中心悅而誠服也如七十子之服孔子也孟子公孫丑上以佚道使民雖勞不怨以生道殺民雖死不怨殺者孟子盡心上立以為仲父而貴戚莫之敢妬也與高國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢拒也貴賤長少莫不秩秩然而貴敬之荀仲尼賈瓊曰夫子文中子十五為人師王孝逸先達之傲者也然白首北面豈以牢乎文中子立命篇敬佩玉音服之無斁文中子史孔子之所嚴事於周則老子於衛遽伯玉於齊晏平仲於楚老萊子於鄭子產於魯孟公綽史記仲尼弟子列傳新垣衍謝魯仲連曰吾今日知先生為天下士也史記管仲富擬公室有三歸反坫齊人不以為侈史記本傳太史公曰假令晏子而在吾雖為之執鞭所忻慕焉史記管仲傳張儀曰此在吾術中而不悟吾不及蘇君明矣史本傳吳起謂田文曰請與子論功可乎文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賓從子孰與起文曰不如子起曰此三者子皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之子乎屬之我乎起默然良久曰屬之子矣通鑑周紀匹夫無勢化之者七十人劉向戰國策序梁丘據曰吾至死不及夫子說苑建本萬石君以孝謹聞雖齊魯諸儒質行皆自以為不及前漢本傳相如至一坐盡傾西漢司馬相如傳互見歸向每讀詔書嘗嘆息曰此聖主也一見決矣後漢第五倫傳王延壽作靈光殿賦後蔡邕亦造此賦未成及見延壽所為遂輟翰東漢王逸傳陳寔在鄉閭平心率物有爭訟輒求判正曉諭曲直退無怨者至乃嘆曰寧為刑罰所加不為陳君所短卒海內赴者三萬餘人制衰麻者以百數後漢互見為世輕重馬援與越人申明舊制以約束之自後駱越奉行馬將軍故事通鑑漢光武博聞強記奇逸卓犖吾敬孔文舉魏志陳矯傳互入強記董允代費禕為尚書令旬日之中事多停滯允歎曰人才力相懸若此非吾所及蜀志互入明於自知陳壽撰三國志時人稱善夏侯湛時著魏書見壽所作便壞己書晉書本傳王粲才高辨論應機鍾繇等為魏卿相至於奏議皆閣筆不能措手魏志本傳注司馬懿與諸葛亮相距于五丈原對壘百餘日會亮病卒諸將燒營遁走經日乃行其營壘曰天下奇才也晉書管輅嘗謂人曰吾與劉穎川兄弟語兄寔弟智使人神思清發昏不假寐晉書劉寔傳石勒陷京師呼王衍與相見勒甚悅之謂其黨曰吾行天下多矣未嘗見如此人晉書衍傳郭奕高爽於時少所推先見阮咸心醉晉書阮咸傳謝安嘆曰朝廷大事所不能決者以諮王公彪之無不立決通鑑晉簡文紀徐羡之起自布衣又無學術直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望通鑑晉恭紀王澄有高名少所推服每聞衛玠言輒歎息絕倒王衍尤重澄有經澄所題目者衍不敢復有言輒云已經平子矣晉書陸雲曰君苗見兄文輒欲焚其筆硯晉陸機傳石勒曰若遇漢祖當北面事之與韓彭比肩晉載記本傳侯景曰吾跨鞍對陳刃石交下了無怖心今見蕭公使人自慴通鑑梁紀柳顧博學罕所推謝見虞世基曰海內當共推此一人非吾儕所及也隋書田承嗣傲狠不軌謂子儀使者曰茲膝不屈於人久矣今為公拜舊唐書郭子儀傳自愈沒其言盛行學者仰之如太山北斗唐書韓愈傳李密見太宗不敢仰視退而歎曰真英主也唐書尹思正為大府卿時侯知一亦厲威嚴吏為語曰不畏侯卿杖秪畏尹卿筆唐書李祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於溫御史唐書本傳孫逖典制誥為代言最張九齡視其草欲易一字卒不能也唐書孫逖傳張說曰死姚崇能筭生張說吾今日方知才之不及遠矣唐書互見事出意表料度兩門韓愈於文章慎許可至歌詩獨推曰李杜文章在光燄萬丈長唐書李密謂徐文遠曰始謂先生儒者不達時事今乃坐決大計何其明也通鑑唐高祖岑文本嘗稱馬周論事援引事類揚搉古今舉要刪煩會文切理一字不可增亦不可減聽之靡靡令人忘倦通鑑唐太宗辛彥之撰新禮沈重名為碩學彥之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢隋書郭子儀勞回紇皆捨兵下馬齊拜曰果吾父也舊唐書本傳吾儕五人智不及一韋公唐韋顗傳傳記禰衡高論冠世來遊京師詆訿朝士及南見趙戩嘆曰鐵則干將莫邪木則椅桐梓添人則顏冉仲弓坡略元微之劉夢得韋楚客會於樂天之居因論南朝興廢事各賦詩夢得首唱一揮而成白公曰四人採驪吾子先得其珠其餘鱗甲將何為三公罷吟監戒錄李相讀春秋誤以叔孫婼敕略呼為敕晷有小吏曰某緣師受誤呼文字聞相公呼婼為綽方悟之耳公曰不然因檢釋文果敕略反公大慚號小吏為一字師摭言劉孝標有重名無所與讓惟服謝詠置几按動輒吟味其文顏氏家訓集共君一夜話勝讀十年書古詩使人意奪神駭心摧骨驚江淹別賦天下進士望風戁畏以為瑞人神士朗出天外不可梯接望門不敢造皇甫湜作韓愈神道碑衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀韓作柳誌曾經聖人手議論安敢到韓文所聞昔已多所得今過前久聞名始相識也韓文萬不試而一出焉猶為當世甚重若使幸得出于十二三則巍然為偉人與世無窮其可涯也互見舉輕明重柳文觀其掉鞅于術藝之場游刃乎文翰之林風雨生於筆札雲霞發於簡牘左右圜視朋儕拱手甚可壯也柳文睹徽容而敬聞嘉話而慕同上作永桂雪車二詩出盧仝孟郊右樊宗師為獨拜劉乂文取卷開讀喜嘆入骨孫可之文豈獨書紳可以銘心唐文粹本朝眾工讓口無敢先臨川集孔明與司馬宣王對壘不能取尺寸地宣王受其巾幗之辱而不敢出兵其已死按行軍壘猶曰天下奇材也元城語錄欲知君得人失者亦稱善東坡詩擅場推老手後山溫公退居洛陽每論當世人物必曰呂獻可之先見范景仁之勇決皆予所不及心誠服之劉諫議互見伏善經我思古人實獲我心詩燕燕高山仰止景行行止詩車舝泰山巖巖魯邦所瞻詩固願聞名於將命者記少儀日月星辰民所瞻仰也記祭統景行先哲孝經序子君子若華山松柏既多望之自不知厭晏子史太史公曰余讀孔子書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低回留之不能去史孔子世家竊伏海演聞暴公子威名舊矣西漢雋不疑傳講聞高誼之日久矣西漢董仲舒傳竊高下風之行西漢鄒陽傳陳蕃周舉相謂曰時月之間不見黃生則鄙吝之萌復存乎心東漢黃憲傳李膺與郭林宗泛舟洛水之上望之者以為仙舟後漢李膺傳朝野翕然謂之一世龍門後進之士莫不景慕放效晉書王衍傳宋纖沈靜不與世交隱居南山太守楊宣畫其象於閣上出入視之酒泉太守馬岌具威儀造焉纖不見岌嘆曰吾今知先生人中之龍也晉書陸象先曰季真清談風流吾一日不見則鄙吝生矣唐書賀知章傳房琯每見德秀嘆曰見紫芝眉宇使人名利之心都盡蘇源明常語人曰吾不幸生衰俗所不恥者識元紫芝也唐書元德秀傳仰之如太山北斗唐書韓愈傳傳記夫山萬人之所觀仰韓詩外傳集後世仰末照李白集所恨不見之猶如仰昭回李白集管鮑久已死何人繼其蹤李太白集五雲多處是三台杜詩羽儀之拜日月以數皇甫湜朝廷之士引頸東望若景星鳳凰之始見也爭先睹之為快韓愈與李渤書瞻仰德宇高踰嵩岱柳文四岳仰維嵩之高劉賓客健筆高科早絕倫後來無不揖芳塵同上飽聞聲名渴見風采杜牧之四瀆宗海眾星拱天唐文粹洗心瞻仰天漢彌高生不用萬戶侯但願一識韓荊州並同上何令人景慕一至於此同上本朝惟門墻之高未始得望故竿牘之褻無容自通如其仰望之勤未始須臾之間臨川逖懷英俊之並遊恨無羽翮而飛肉歐公集白雲在天引領何及東坡集經豈不爾思畏子不敢王風大車郕人有其兄死而不為縗者聞子皋將為郕宰遂為縗記檀弓互見先聲子李景讓為御史大夫大臣貴戚看街樓皆泥之畏其紏彈金華子史晉士會將中軍晉國之盜逃奔于秦左宣十六十人而從一人者寧力不勝而智不足耶畏之也史魯仲連傳郭解出入人皆避之史游俠傳胡人不敢南下而牧馬士不敢彎弓而報怨史記賈誼過秦論正衣冠立於朝廷而群臣莫敢言浮說長孺矜焉史記鄭傳序燕之初入齊聞畫邑人王蠋賢令軍中曰環畫邑三十里無入以王蠋之故也史記齊世家匈奴竟郅都死不近鴈門史本傳威王曰吾臣有檀子者使守南城則楚人不敢為寇泗上十二諸侯皆來朝吾臣有盻子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺通鑑周紀項羽召見諸侯將諸侯將入轅門無不滕行而前莫敢仰視通鑑秦紀李牧為將居代鴈門單干聞之大率眾來入李牧多為奇陣張左右翼擊之大破殺匈奴十餘萬騎單于奔走十餘歲不敢近趙邊通鑑秦級諸呂憚朱虛侯雖大臣皆依朱虛侯通鑑漢高后諸呂欲為亂畏大臣絳灌尋未敢發通鑑漢高紀漢天子我丈人行也西漢蘇武傳李膺為度遼將軍膺到邊羗胡皆望風畏服先所掠男女悉詣塞下送還之通鑑漢貫紀韓韶為嬴長賊聞其賢相戒不敢入嬴境同上宦人黃皓畏董允不敢為非終允之世皓位不過黃門丞通鑑魏邵陵厲公紀張華盡忠帝室彌縫遺闕賈后雖凶險猶知敬重數年之間雖闇主在上而朝野安靜華等之功也通監晉惠紀王毛仲有婚事上謂宰相曰卿等宜與達官悉詣其第既而日中客未敢舉筋待璟久之方至通監唐元宗互見宴會淮南大將王韶欲自為留後令將士推己知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶等懼止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人通監唐德宗紀孫期事母至孝黃巾賊起過期里陌相約不犯後漢本傳卓王孫為具召臨邛令王吉及司馬長卿令既至日中司馬長卿謝病不能臨臨邛令不敢嘗食身自迎相如相如不得已而強往一坐盡傾西漢司馬相如傳尹翁歸拜東海太守過辭廷尉于定國定國欲屬託邑子兩人終日不敢見乃謂邑子曰此賢將汝不任事也又不可干以私西漢本傳坐者皆屬目卑下之西漢蓋寬饒傳淮南王謀反憚黯曰黯好直諫守節死義至說公孫洪等如發蒙耳西漢汲黯傳姜詩事母至孝赤眉散經詩里弛兵而過曰驚大孝必觸鬼神東漢本傳許劭為功曹太守徐璆甚敬之府中聞子將為吏莫不改操飾行同郡袁紹去濮陽令歸車徒甚盛將入郡界乃謝遣賓客曰吾輿服豈可使許子將見遂以單車歸家東漢本傳亙典為御史無所迴避京師為之語曰行行且止避驄馬御史後漢本傳有盜牛者主得之盜請罪曰刑戮是甘乞不使王彥方知也東漢王烈傳黃巾賊數萬人見鄭玄皆拜相約不敢入縣境東漢本傳孔融深敬玄屣履造門告高密縣為玄特立一卿曰鄭公卿東漢鄭玄傳彭脩為州從事時賊張子林等數百人作亂賊素聞其恩信即降曰自為彭君故降不為太守服也後漢袁閎投跡深林潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免後漢書互見有定力周訪智勇過人聞王敦有不臣之心常切齒敦雖懷逆謀故終訪之世不敢為非晉書荀巨伯遠看友人疾值胡賊攻郡賊相謂曰我輩無義之人而入有義之國遂班師而還一郡並獲全世說上裴令公目夏侯太初肅肅如入廊廟中不修敬而人自敬世說中宋璟嘗侍宴在下坐張易之兄弟皆為列卿素畏於璟虛位揖璟曰公第一人何乃下座續世說王敦久懷逆亂畏祖逖不敢發晉書劉琨傳謝安欲使王獻之題太極殿榜而難言之試謂曰魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸橙書之獻之揣知其旨正色曰仲將魏之大臣寧有此事使其若此有以知魏德之不長安遂不之逼晉書獻之互見有守王敦素憚周顗每見顗面熱雖復冬月扇面手不得休晉書周顗傳梁顧協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎顧郎難衣食者竟不敢以遺之本傳范叔孫周窮濟急鄉曲貴其義行無有呼其名者宋書司空圖居王官谷時冠盜所過殘暴獨不入士人依以避難唐本傳明皇嘗獵苑中或大張樂稍過差必視左右曰韓休知否唐書來瑱北收河洛屢摧賊陣安祿山叛賊號為來嚼鐵唐小史李靈曜據汴州公私財賦一皆遏絕獨子儀封幣經其境莫敢留之必持兵衛送其為豺狼所服如此舊唐書郭子儀傳段秀實為涇州刺史三四年間吐蕃不敢犯塞唐書黃巢作亂鄭棨為廬州刺史移檄無犯州境巢為歛兵州獨完歲蒲去嬴錢千緡藏府庫後它盜終不犯鄭使君錢本傳權戚縮氣魏徵傳傳記四坐為之改容世說上劉整居家奢麗謂人曰紗縠吾之常服耳遇蔡子在坐而終日不自安蔡克別傳集偵諜不敢東窺駝馬不敢南牧選昭王碑千乘為之軾廬左太中魏賦將敬滌耳以聽玉音七啟四座皆辟易杜詩夷落遙知真漢相爭來屈膝看儀形劉賓客曹操不敢以兵強輒進孫權不敢以境闊妄動彼相之力焉尚馳作諸葛武侯碑黠吏偏驚隼貪夫輒避驄劉長卿一坐凜生寒劉叉文崔徐跡未朽千載揖風波同上親賓改舊觀僮僕生新敬唐文粹蒼鷹獨立時惡鳥不敢飛同上三公不敢吏唐文粹日月垂於方寸不求不欺於人而人不忍欺三不欺論本朝范仲淹在延安夏人聞之相戒曰無以延州為意今小范老子胸中自有數萬甲兵不比大范雍老子可欺也五朝言行錄司馬溫公為相遼人敕其邊吏曰中國相司馬矣謹無生事開邊隙溫公神道碑文潞公在朝契丹使耶律永昌劉霄來聘使者入覲望見公殿門外卻立改容曰此文潞公耶所謂以德服人者東坡德威堂記傳欽之欲見陳師道知其貧甚因懷金餽之及睹其貌聽其議論竟不敢以出口道卿集姦凶與佞媚膽破骨亦驚歐公集里中少年聞其謦欬之聲往往逃匿若匿而不及則俯首恐愧臨川奮鬚抵几走群纖兮聞名見像已癘痁兮東坡不仁者不敢至其墻不義者不敢過其門同上耿然如秋霜夏日不可狎玩東坡集向來一瓣香敬為曾南豐陳後山詩盛德于今丈人行陳後山詩子孟子曰乃所願則學孔子也孟子公孫丑夫子步亦步夫子趍亦趍夫子馳亦馳莊田子方篇昔顏常睎夫子矣正考甫常晞尹吉甫矣公子奚斯常晞正考甫矣楊子學行衣冠禮義所自出也故聖賢景慕焉文中子述史篇史季札曰札雖不才願附於子臧以無失節左襄十四燕齊之間皆為欒布立社號曰欒公社史本傳互見遺愛石慶為齊相舉齊國皆慕其行為立石相祠本傳鮑宣下廷尉博士弟子王咸舉幡太學下曰欲救鮑司隸者會此諸生會者千餘人西漢本傳互入捄援陳遵居長安近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門所到衣冠懷之惟恐在後西漢本傳司馬相如慕藺相如之為人更名相如西漢本傳雄家貧嗜酒有好事者載酒肴從游學前漢自關以東莫不延頸願交西漢朱家傳郭林宗遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此東漢本傳張霸博覽五經諸生孫林劉固段著等慕之皆市宅其旁以就學焉後漢李膺性簡亢無所交接南陽樊陵求為門徒荀爽嘗謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此同上蔡邕以經籍去聖已久文字多謬乃自書於碑使工雕刻太學門外後儒晚學咸取正焉及碑始立其觀及摹寫者車騎日千餘兩填塞街陌東漢本傳士有被其容接者名為登龍門後漢李膺傳互見仰羨卓茂性寬仁鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉東漢本傳阮脩字宣子居貧四十未有室王敦等歛錢為婚皆名士也時慕之者求入錢而不得晉書互見婚姻謝安本能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗能及或掩鼻以效之晉書本傳習鑿齒為亙溫荊州主簿時語曰三十年看儒書不如一詣習主簿晉書謝鯤為王敦長史時王澄在敦坐見鯤談語無倦唯歎謝長史可與言都不盻敦為人所慕如此晉書郄超死之日貴賤操筆為誄者四十餘人其為物所宗如此晉中興書晉陶潛江州刺史王弘欲識之不能致潛嘗往廬山弘令潛故人龐通之齎酒具於半道要之及至欣然共飲南史獨孤信為秦州刺史日暮馳馬入秦州城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉北史南史任昉為中丞簪裾輻湊預其宴者號為龍門遊梁陸倕傳陽城遠近慕其行來學者跡接于道唐書互見師門唐賀知章美談笑陸象先知章之族姑子與知章甚厚謂人曰賀兄可謂風流之士一日不見賀兄則鄙吝生矣舊唐書傳李華為元德秀墓碑顏真卿李陽冰篆額後人爭模寫號為三絕碑唐書互見相資成美公卿大臣家碑不得公權手筆者人以為不孝外夷入貢皆別署貨具曰此購柳書唐書盧知猷善書一落簡翰人皆模倣唐書劉義聞韓愈接天下士徒步歸之唐書本傳大曆中楊綰為相德望日崇天下雅正之士爭趍其門有自數千里來者唐書傳記王勃所至請託為文金帛豐積人謂之心織筆耕李肇翰林志江偉善書人得其手疏莫不藏之以為寶江偉別傳白傳葬龍門山四方過者必奠酒塚前方丈之土常成泥濘賈黃中談錄白樂天應宏詞賦考落登科之人賦並無聞白公之賦傳於天下摭言師其德業可以治國字人慕其風範可以激貪厲俗史通集吾希叚干木偃息藩魏君吾慕魯仲連談笑卻秦軍文選著論準過秦作賦擬子虛文選左太沖詠史詩王仲舒家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交韓文墓碑柰何李膺之遇士思就田文之下客楊盈川碑李邕求識面王翰願卜鄰杜詩衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀韓文柳子厚墓誌銘名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦以流徵國中屬而和者不過數人是其曲彌高其和彌寡劉向新序絕唱幽蹤久無嗣音沈休文作謝靈運傳論互入出類北海天逸孤音少和後漢孔融傳贊陽春之曲和者必寡東漢黃瓊傳陽春無和者選張景陽雜詩南荊有寡和之歌古詩唱繁而和寡選寅連珠清歌寡和於郢路駱賓王本朝窈眇文章宜寡和崢嶸肝肺亦交難坡詩互見寡合門陽春白雪和者少陽春白雪分吞聲山谷互見退聽史蘇君之時儀何敢言且蘇君在儀寧渠音詎能耶史張儀傳孔子為春秋子夏之徒不能贊一辭史記孔子出家互見小巫又見大巫須賈曰不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事史記范睢傳班陽韜筆仲舒結舌晉書虞博傳魑魅乘夜爭出見日自消通監五代漢隱帝集金石寢聲匏竹屏氣王豹輟謳嵇康琴賦衛無所措其邪鄭無所容其淫選潘安仁笙賦綿駒結舌而喪精王豹杜口而失色成公子安嘯賦虞公輟聲而止歌甯子歛手而嘆息同上毛嬙鄣袂不不足程式西施掩面比之無色宋玉好色賦戴憑遙避席祖逖後施鞭元微之集本朝陽春白雪分吞聲山谷
