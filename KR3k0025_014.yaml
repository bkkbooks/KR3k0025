body:
  text: 微小必報經敝帷不棄為埋馬也敝蓋不棄為埋狗也記檀弓下迎貓為其食田鼠也迎虎為其食田豕也郊特牲子馬免人於其難者其死也葬之以帷牛有德於人者其死也葬之以大車之豸牛馬有功猶不可忘又況人乎淮南史田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非也於是收贖而養之史記犬馬有勞於人尚加帷蓋之報前漢陳湯傳經獺祭魚豺祭獸鷹祭鳥記月令今是大鳥獸則失喪其群匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之三年問子鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患莊子應帝王瓠巴鼓瑟而流魚出聽伯牙鼓琴而六馬仰秣荀子勸學篇管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘遂得水韓非子烏鵲識歲之多風去喬木而巢扶枝淮南子鵲巢知風之所起獺穴知水之高下暉日知晏鴆鳥也陰諧知雨雌也淮南子雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計抱朴子鶴知夜半燕識戊己抱朴子至理篇智禽含蘆以逆網水牛結陳而卻虎抱朴狂馬不自觸於木猘狗不自投於河淮南子史巢居知風穴居知雨西漢翼奉傳機心內萌則鷗鳥不下魏志高柔傳注孫堅於西華失利被鎗墮馬臥草中軍衆分散不知堅所在堅所騎驄馬馳還營踣地鳴呼將士隨馬於草中得堅吳書孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寢嚴畢趨出犬銜引其衣恪曰犬不欲我行乎還坐有頃乃復起犬又銜其衣恪令從者逐犬遂升車吳志劉備屯樊城潛遁所乘馬名為的顱騎走墮襄城西檀溪水中溺不得出備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過世語裴子野曰夫噬虎之獸知愛己子搏狸之鳥非護異巢通監宋紀張彪敗後與妻楊氏去唯常所養一犬黃倉在彪前後未曾捨離乃還入若邪山中沈秦説陳文遣章昭達領千兵重購之并圖其妻彪眠未覺黃倉驚吠劫來便噬一人中喉即死及彪被害黃倉嗥叫宛轉血中陳書犬馬戀主晉書石勒傳傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俯而噴仰而鳴聲達於天若出金石者何也彼見伯樂之知己也戰國策互見受知齊廣寧王孝珩嘗蓄一犬守外人不得趣近孝珩每射令其取箭亦解呼召左右牽衣而進三國典略蜂有兩衙應潮稗雅亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也論衡鄭子陽之難猘狗潰之齊高固之難失牛潰之當其時狗牛猶可以為人唱呂氏春秋陸機犬名曰黃耳機往仕洛常將自隨此犬黠慧能解又嘗借人三百里外犬識路自還一日至家機羈宦京師久無家問機戲語犬曰我家絶無書信汝能齎書馳還取消息不犬喜搖尾作聲應之機試為書盛於竹筒繫之犬頸犬出驛路疾走向吳飢入草噬肉取飽每經大水輒依渡者弭耳掉尾其人憐愛因呼上船載近岸犬即騰上速去如飛徑至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作答內竹筒中復繫其犬頸犬既得答仍馳還洛計人程五旬而犬往還裁半述異記會稽人張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍蕩奴奴失刀信然取刀殺奴也續搜神記苻堅為慕容沖所襲堅馳馬墮澗追兵幾及計無由出馬踟蹰臨澗垂鞚與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江異苑鵲知太歲之所在燕作巢知戊己説文鄧芝射中猿母其子以葉塞瘡華陽國志集疲馬戀君軒選樂府東武吟互見歸向師曠奏清徵之音而玄鵠下舞謝靈運擬詩注混雞犬以亂放各識家而競入西征賦蜂蠆螳蜋頗亦自負杜牧之集攘螳臂而戰蝸角唐文粹本朝可憐蝸角能多少獨與區區觸事爭臨川集物有自得天理者如蜂蟻知衛其君豺獺知祭禮鳴道集豺獺祭天葵藿向陽蜂蟻之有君臣喬梓之有父子同上黃蜂衙退海潮上白蟻戰酣山雨來談苑子千鈞之重加銖兩而移家語屈節解管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水以管仲隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎韓非子齊興兵伐楚子發將師以當之兵三卻楚賢良大夫皆盡其計而悉其誠齊師愈強於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明日又復往取其枕子發又使人歸之明日又復往取其簪子發又使歸之齊帥聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去故曰無細而能薄在人君用之耳淮南子道應訓史猶塵加岱嶽霧集淮海雖未有益不為損也後漢楊倫傳陶侃為征西大將軍荊州刺史時造船木屑及竹頭悉令舉掌之咸不解正會積雪始晴廳事前積雪猶濕於是以屑布地及桓溫伐蜀以侃所貯竹頭作釘裝船其綜理微密皆此類也晉書互入兼收並蓄集勿言分寸鐵為用乃長兵白樂天互見不可淺量水之細者江海假其深材之短者棟梁資其峻唐文粹互見相資成美兼收並蓄本朝王安石曰權者與物相為輕重雖千鈞之重物所加損不過銖兩而移三朝言行録經有以少為貴者記禮器史堯作大章一夔足矣後漢曹褒傳傳記黃河千年一清王子年拾遺記集王鮪登俎不假吞波之魚選演連珠賈餗為禮部朝士以進士千賈公不獲有強毀嘲者賈公曰我祗以杜顗敵數百輩足矣杜牧之集互見鑒別才而奇者不獨地上少耶天上亦不多耶唐文粹聖人不世出賢人不時出韓文本朝黃河千年始一清歧山鳴鳳不再鳴歐公集今如晨星存者幾人孰如我公碩大光明導日而升燦焉長庚東坡集經此日而食于何不臧詩十月之交子田父晨出夜入自以性之恆啜水茹藿自以味之極一朝處以柔毛綈幕薦以粱肉蘭橘心悁體煩列子楊朱篇夫星之墜木之鳴物之罕至者也怪之可也荀子天道篇山出嘄陽水生罔象木生畢方井生墳羊人怪之聞見鮮而識物淺也淮南子汜論訓去國期年見似人者而喜逃虛谷者聞人足音跫然喜莊子徐無鬼史春生秋殺天道之常春一物枯即為災秋一物華即為異東漢張敏傳作奉天宮李善感諫自遂良死無敢直諫幾二十年及善感始諫天下皆喜謂之鳳鳴朝陽通監唐武后集邑犬之群吠兮吠所怪也楚辭韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎柳文答韋中立書蜀之南常雨少日日出則犬吠大雪南越數州之犬皆蒼黃吠噬狂走纍日同上子荊人不貴玉鮫人不貴珠符子史趙王倫篡位奴卒廝役亦加爵位每朝會貂蟬盈坐故時諺曰貂不足狗尾續晉書安祿山反時郭子儀為元帥大將軍告身一通才易一醉通監唐紀傳記鍾山之上以玉抵鵲彭蠡之濱以魚食犬論衡黎洞之人以香代爨番禺雜記集物以多為賤雙錢易一束白樂天家有千里驥不珍焉人懷盈尺和氏無貴矣曹子建書
