body:
  text: 委順經樂天知命故不憂易繫辭遁世無悶不見是而無悶樂則行之憂則違之易乾卦得之自是不得自是以聽天命記表記君子居易以俟命上不怨天下不尤人並記中庸用之則行捨之則藏論語道之將行也與命也道之將廢也與命也語憲問子遺佚而不怨厄窮而不憫孟公孫丑下君子不怨天不尤人同上行止非人所能也吾之不遇魯侯天也孟梁惠下當死不懼在窮而戚知命也列子力命知其不可奈何而安之若命唯有德者能之子貢曰古之得道者窮亦樂通亦樂所樂非窮通也適來夫子時也適去夫子順也安時而處順哀樂不能入也孔子曰我諱窮久矣而不免命也求通久矣而不得時也並莊子樂天知命吾何憂窮理盡性吾何疑文中子史知命不憂乘流則逝得坎則止並漢賈誼傳君子得時則大行不得時則龍蛇遇不遇命也西漢楊雄傳黃憲隤然其處順東漢本傳郭璞遇顏含欲為之筮含曰自有性命無勞蓍龜通鑑晉紀有心於避禍不如無心於任運通鑑宋紀顧愷之常以為人稟命有定分非智力所移唯應恭己守道而暗者不達妄意僥幸徒虧雅道無關得喪乃以其意命弟子願著定命論以釋之通鑑宋世祖李嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳通鑑唐明宗傳記知命之士見利不動臨死不怨劉向新序集委命順理與物無患張華鷦鷯賦齊萬物兮超自得委性命兮任去留嵇康琴賦歸老任乾坤杜詩進取果由命不由趍險艱元稹集貧賤非不惡道在何足避富貴非不愛時來當自致置懷齊寵辱委順隨行止時邪命邪吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能真至順而合大和客問樂天憂病否樂天知命更無憂並白侍郎集悠悠天地間委順無不樂張九齡文日有糲食歲有粗衣飢寒獲同骨肉相保此亦熙熙委順之外益自安也白傳集互見易足何去何從罷龜策之臧否自開自落任天地之榮枯唐文粹本朝齒髮付天公缺壞不可修坡詩經君子藏器於身待時而動尺蠖之屈以求信也龍蛇之蟄以存身也並易繫辭有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也語子罕子雖有鎡基不如待時孟公孫丑上史姑務修德以待時乎左傳莊八年譬如農夫是穮是蔉雖有飢饉必有豐年左傳互入有備戢鱗潛翼思屬風雲晉宣帝紀王猛斂翼待時候風雲而後動晉書王猛傳陸法和曰凡人取果宜待熟時不撩自落通鑑梁世祖元魏于謹曰州郡之職昔人所鄙台鼎之位須待時來北史本傳集貴賤貧富不可求兮正身履道以俟時曹大家東征賦雖無玄豹姿且隱南山霧謝眺詩仲尼旅人文王明夷苟非其時聖賢低眉李太白天馬長鳴待駕馭杜詩未展從東駿空戢圖南翼駱賓王勉哉耘其業以待歲晚收填窗塞戶慎勿出暄風暖景明年日並韓文低回且向籠間宿奮迅終須天外飛白樂天潛龍須待一聲雷杜牧之六翮未因風武伯蒼龍蟠泥中未有雲不能生彼升天翼張文昌天矯太空鱗曾為小泉蟄孟東野夫豫章珠璣鏌釾毛嬙終不慮隱匱撓匱一作櫝撓一作橈帷之為患而擁腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳權德輿蟄龍三冬臥老鶴萬里心唐文粹冬去冰須泮春來草自生馮道互見委順本朝徘徊且垂翼會有秋風時歐公集龍不冬躍螢能夜飛君子小人各有其時邵堯夫經不知命無以為君子也語子怨夭折者不知命者也列子力命怨貧窮者不知時者也列子湯問史屈原至江濱懷石自投汨羅以死史記本傳經孟獻子曰蓄馬乘不察於雞豚伐冰之家不蓄牛羊百乘之家不蓄聚斂之臣記大學君子仕則不稼田則不漁記坊記分無求多記曲禮上子知足常足知足不辱老子知者不為不足莊子福莫長於無禍荀子勸學士不通財貨國君不息牛羊錯質之臣不息雞豚大夫不為場圃荀大略名進身退天之道也管子互入物理消長天下有至富而非金玉也適情知足則富矣淮南子錦繢紛華所服不過溫體三牲太牢所食不過充腹知以身取節者則知足矣苟知足則不纍其志矣孔叢子居衛第七知足者則能肥遁勿用頤光山林紆鸞龍之翼養浩然之氣襤縷帶索不以負龍章之暐曄也負步杖策不以易結駟之絡繹也抱朴子暢玄篇史齊與晏子邶殿弗受曰慶氏之邑足欲故亡吾邑不足欲也不受邶殿非惡富也恐失富也左襄二十八范蠡曰居家則致千金居官則致卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懷其重寶間行以去止于陶史越世家褚先生曰蘇秦張儀一當萬乘之主而都卿相之位今子積數十年官不過侍郎位不過執戟意者有遺行耶東方生曰彼一時也此一時也使蘇秦張儀與僕並生於今之世曾不能得掌故安敢望常侍侍郎乎東方朔傳以齊三萬戶封張良良曰臣願封留足矣不敢當三萬戶西漢本傳公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫紅女利乎西漢董仲舒傳辟強侯子德常持老子知足之計西漢楚元王傳疏廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石不知退懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎即日父子俱移病上疏乞骸骨西漢本傳互見恬退門殷興曰外戚家若不知謙退嫁女欲配侯王娶婦盻睨公主愚心實不安富貴有極人當知足通鑑漢光武建武七年田豫為衛尉乞遜位司馬宣王不聽豫曰年過七十而居位譬猶鍾鳴漏盡而夜行不休是罪人也遂稱疾魏志虞玩之年老請退表曰四十仕進七十懸車壯即驅馳老即休息知足不辱臣知足矣齊書光祿大夫開府儀同三司王僧虔固辭台府謂兄子儉曰汝任重於朝行登三事我若復有此授乃是一門有二台司吾實懼焉魏志韋世康拜吏書前後十餘年間多所進拔謂子弟曰吾聞功遂身退古人常道今將懸車汝輩謂何子福嗣曰大人澡身浴德名立宦成追蹤二踈伏奉尊命隋書韋世康在吏部十餘年時稱廉平常有止足之志謂子弟曰祿豈須多防滿則退年不待暮有疾便辭通鑑隋高祖李義琰宅無正寢弟為市材送之義琰曰既處貴仕又廣居宇非有令德必受其殃不許舊唐書本傳張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為將相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子弟酒色之資吾不取也聞者是之通鑑唐元宗紀互見貽後李日知拜侍中先天中乞骸骨日知將有請不謀于家歸乃治行妻驚曰産利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭于心無日而足也唐書本傳元延祖調舂陵丞輒棄官去曰人生衣食可適飢飽不宜復有所須每灌園掇薪以為有生之役過此吾不思也唐書元結傳有勸岑文本營産業文本曰南方一布衣徒步入關望不過祕郎縣令耳無汗馬之勞以文墨致位中書令亦極矣何得更言産業乎唐書本傳互見過望傳記委積之臣不探市井之利韓詩外傳集畏極位之盛滿潘安仁西征賦上方不足而下比有餘張華鷦鷯賦達人知止足遺榮忽如無抽簪解朝衣散髮歸海隅張景陽詠史詩伯兄德行高曉方藥食必視本草年止四十二某踈愚食不擇禁忌位為侍郎年出伯兄十五歲矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣韓愈行狀幸生天下無事時承先人之遺業不識千戈耒耜攻守耕穫之勤韓文感二鳥賦月費俸錢歲縻廩粟子不知耕婦不知織乘馬從徒安坐而食韓文始我來京師止攜一束書辛勤三十年以有此屋廬此屋豈無華於我自有餘中堂高且新四時登牢蔬同上柳氏號為大族五六從以來無為朝士者豈容豈容一作豈愚蒙獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受祿位亦所未能柳與楊京兆憑書手不能執殳肩不能荷鋤幸因筆硯工得升仕進途白樂天鬢雪人間壽腰金世上榮子孫無可念産業不能營一日安間直萬金互入間適優遊福祿更難銷互入安適得年非瘦薄長福是單貧設自為化工優饒只如是若比簞瓢人吾今大富貴莫嫌貧活計更富即勞心有帛禦冬寒有榖防歲飢飽於東方朔樂於榮啓期身間自為貴何必居榮秩心足即非貧豈惟珠滿室並白樂天團圓便是家肥事何必盈倉與滿箱杜荀鶴一身既飽暖一家無怨咨家雖有畎畝手不秉鎡基皮日休集季子今二頃楊雄才一廛伊豫有南畝數已踰先賢李義山文福不可以屢僥幸得不可以常覬覦先生貧而不言利問之對曰利者商也今既士矣奈何亂四民之業乎並陸魯望文於臣一生已為萬足王維集本朝薄酒可與忘憂醜婦可與白頭徐行不必駟馬稱身不必狐裘無禍不必受福甘餐不必食肉山谷
