body:
  text: 際會經王三錫命易師卦承天寵也同上錫馬蕃庶晝日三接晉卦既見君子為龍為光小雅蓼蕭虎拜稽首對揚王休大雅紅漢父子並為周司徒記緇衣以近天子之光書洪範子其君用之則安富尊榮孟盡心上傳說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟告子下互入人生罔測門又見白屋史公孫洪以春秋白衣為天子三公史儒林傳入則與王圖議國事以出號令出則接賓客應對諸侯王甚任之史記屈原傳司馬相如為天子游獵賦上令尚書給筆札本傳出入臥內親幸莫及史盧綰傳商鞅見孝公公與語不自知䣛之前於席也本傳甘茂居秦累世重矣同上廁之賓客之中立之士民之上不謀父兄以為亞卿史樂毅傳賈生徵見孝文方受釐坐宣室上因感鬼神之事而問鬼神之本賈生因具道所以然至夜半文帝前席罷曰吾久不見賈生自以為過之今不及也史本傳擢之閭里之中加之大夫之上里一作伍史記司馬攘苴傳公孫洪數月佩六印貴振天下西漢武紀殷說夢發於傅岩周望兆動於渭濱皆俟命而神交匪詞言之所信西漢楊雄解嘲以三寸舌為帝者師西漢張良傳東方朔待詔金馬門稍得親近西漢本傳車千秋以一言寤意旬月取宰相西漢本傳樊噲夏侯嬰灌嬰之徒方其鼓刀僕御販繒之時豈自知附驥之尾勒功帝籍慶流子孫哉前漢樊酈等贊互見人生罔測劉敬脫輓輅而建金城之安叔孫通舍抱鼓而立一王之儀身名俱榮西漢本贊互入人生罔測功臣之世惟有金氏親近寵貴西漢張安世傳召汲黯拜為淮陽太守上曰吾徒得君重臥而治之西漢本傳卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜東漢班孟堅公孫弘傳贊互入人生罔測信惟餓隸布實黥徒越亦狗盜芮尹江湖雲起龍驤化為侯王同上述史贊互入人生罔測攀龍附鳳并乘天衢班固敘傳獻帝詔荀悅抄撰漢書尚書給紙筆虎賁給書吏後荀悅漢紀序竇融始以豪俠為名拔起風塵之中以投天隙遂蟬蛻王侯之尊終膺卿相之位後漢本傳鄭崇為尚書上曰我識鄭尚書履聲西漢主父偃等書奏天子召見謂曰公等皆安在河相見之晚也拜為郎中主父偃尤親幸一歲中凡四遷為中大夫通監漢武紀封衛青子伉不疑皆為列侯青曰臣青子在襁褓中未有勤勞上裂地封為三侯張禹病上親拜禹床下禹小子未有官禹數視其小子上即禹床下拜為黃門郎給事中並同上感會風雲奮其智勇後漢二十八將傳賈復戰於真定復傷創甚王大驚曰我所以不令賈復別將者為其輕敵也果然失吾名將聞其婦有孕生女耶我子娶之生男耶我女嫁之不令其憂妻子也通監東漢光武紀郭況為大鴻臚賞賜金帛豐盛莫比京師號況家為金穴竇氏一公兩侯三公主四二千石相與并時自祖及孫官府邸第相望京師於親戚功臣中莫與為比帝思中興功臣乃圖畫二十八將於南宮雲臺並同上東平獻王蒼薨遣大鴻臚持節監喪令四姓小侯諸國王悉會葬通監漢章帝昔文帝之於鄧通可為至愛而猶展甲屠嘉之志其見任如此則何患於左右小臣哉通監漢殤帝互入深識大體胡廣周流四公歷事六帝通監漢靈紀諸袁事漢四世五公可謂受恩通監漢獻紀呂蒙未及受封而疾發權迎置於所館之側所以治護者萬方時有加減權為之慘慼欲數見顏色又恐勞動常壁瞻之見小能下食則喜顧左右言笑不然則咄喑一作唶夜不能寐病中瘳為下赦令同上魏朝廷事有不便高允輒求見帝屏左右以待之或自朝至暮或連日不出群臣莫知其所言語或痛切帝所不忍聞命左右扶出然終善遇之通監宋世祖紀周主以李德林為內史謂群臣曰我常日唯聞李德林名復見其為齊朝作詔書移檄正謂是天上人豈意今日得其驅使神武公紇豆陵毅對曰臣聞麒麟鳳皇得之無用豈如德林為瑞且有用哉陳紀上曰徵箴規朕失不可一日離左右唐太宗紀魏證薨上自製碑文并為書上思徵不己謂侍臣曰魏證沒朕亡一鏡矣李勣嘗得暴疾方云鬚灰可療上自剪鬚為之和藥並唐太宗韋嗣立時為萊蕪令太后召謂曰卿父嘗言臣有兩兒堪事陛下卿凡弟在官誠如父言朕今以卿代兄更不用他人即日拜鳳閣舍人唐武后紀互入兄弟太后信重內史梁文惠公狄仁傑群臣莫及常謂之國老而不名曰每見公拜朕亦身痛唐中宗紀互入尊禮太后謂唐休璟練習邊事卿曹十不當一同上李泌曰臣居禁中自中至履皆陛下所賜所餘特一身耳上曰朕欲卿食酒肉有室家受祿位為俗人泌泣曰臣絕粒二十餘年陛下何必使臣隳其志乎為泌娶盧氏女為妻資費皆出縣官賜第於光福坊令泌數日宿第中數日宿蓬萊院唐代宗紀以杜悰同平章事上勞之曰朕知卿有致君之心今相卿如得一魏證矣唐武宗紀陸贄在翰林為上所親信居艱難中雖有宰相小大之事必與贄謀之故當時謂之內相上行止必與之俱唐德宗紀李泌乞骸骨上曰朕父子賴卿得全方屬子孫使卿代代富貴以報德同上並通監上嘗欲近獵花中至蓬萊池西謂左右曰李絳必諫不如且止通監唐憲宗紀上嘉崔群讜直命學士自今奏事必取崔群連署然後進之同上加李德裕太尉德裕固辭上曰恨無官賞卿耳唐武宗紀李德裕乞退就閑局上曰卿每辭位使我旬日不得所同上上命所司授監察御史李素立以七品清要官所司擬雍州司戶上曰此官要而不清又擬祕書郎上曰此官清而不要遂擢授侍御史唐高祖紀韓休為人峭直不干榮利及為相甚允時望上或宮中宴樂及後苑遊獵小有過差輒謂左右曰韓休知否言終諫疏已至上歎曰蕭嵩奏事常順指既退吾寢不安唐元宗並通監孤之有孔明猶魚之有水也蜀諸葛亮傳三顧臣草廬之中咨臣以當世之事同上出師表苻堅謂王猛曰朕奇卿於一見卿亦異朕於一言精契神交千載之會晉載記山濤志必欲退詔曰山僕射近日暫出遂以微苦未還豈吾側席之意其遣丞掾奉詔諭旨若體力故未平康者使以車輿還寺舍濤辭不獲己乃起視事晉本傳李德林自隋有天下每贊平陳之計高祖幸同州以馬鞭南指云待平陳訖以七寶裝嚴公隋書宋王彧字景文文帝甚相欽重故為明帝娶景文妹而以景文之名名明帝武帝五女新安公主先適太原王景深離絕以適景文景文固辭不成婚宋書本傳羊玄保徙吳郡太守太祖嘗曰我有好官缺未嘗不先憶羊玄保同上紀騭為中書令父亮為尚書令每朝會帝以雲母屏風隔其座吳錄張率遷祕書丞高祖曰祕書丞天下之清官東南冑緒未有為之今以相處為卿定名譽齊書孔靈產為光祿大夫不肯任太祖以白毛扇素杌遺之曰卿有古人之風故賜以古人之服同上周太祖問蘇綽整衣危坐不覺膝之前席達曙不厭北史王肅為楊州大中正後魏孝文徵入朝手詔曰飾館華林拂席相待本傳帝執崔浩手以示蒙遜使曰所云崔公此是也才略之美當今無比魏崔浩傳並北史玄宗命相皆先書其名置桉上會太子入侍舉金甌覆其名曰此宰相名也肅宗曰非崔琳盧從愿乎唐書秦王以如晦元齡等兼洪文館學士圖形顯爵號十八學士預入館者時人謂之登瀛洲元和五年李絳遷中書舍人依前翰林學士上面賜金紫親為絳擇良笏太宗親解佩刀以賜房元齡魏證陸贄入翰林天子常以行輩呼而不名本傳陸贄從幸山南道塗艱險扈從不及與帝相失一夕不至上諭曰得贄者賞千金翌日贄謁見上喜形顏色魏徵喪日太宗登樓臨路哭祭為製碑文御書裴度臥疾文宗遣中使賜度詩曰注想待元老識君恨不早國家柱石襄憂來學丘禱令狐綯為翰林學士宣宗夜召與論人間疾苦以乘輿金蓮花炬送還院吏望見以為天子來及綯至皆驚唐太宗曰人言魏證舉止踈慢我視之更覺嫵媚並唐書柳公權宣宗召昇御殿前書三紙軍容使西門季玄捧硯樞密使崔巨源過筆舊唐書本傳柳公權文宗朝為中書舍人翰林學士每召燭見跋語猶未盡不敢取燭宮人以蠟淚揉紙繼之同上則天以王方慶家多書籍嘗訪求右軍遺跡方慶奏二十八人書共十卷則天御武成殿示群臣仍令中書舍人崔融為寶章集以敘其事復賜方慶當時甚以為榮同上王方慶傳狄仁傑后自製金字十二於袍以表其忠復拜平章事新唐書本傳劉晏八歲獻頌帝奇其幼命宰相張說試之曰國瑞也即授以正字公卿邀請旁午號神童名震一時同上本傳互入穎悟溫大雅歷遷黃門太宗曰我起義晉陽為卿一門耳互入兄弟傳記梁劉綽除祕書丞武帝曰第一官當與第一人通典德宗呼陸贄為陸九嘗脫御衣以賜之唐小史李白對明皇撰詔誥時天寒筆凍帝勑宮嬪執牙筆呵之開元天寶遺事李泌多年絕粒唐肅宗時每自為燒二梨以賜之李鄴侯家事徐堅以多識典故七入書府大唐遺事互見博洽劉晏八歲獻東封書明皇命宰相出題就中書試驗引晏於內殿坐晏貴妃膝上親為畫眉摠丱髻宮人遺花投果開元傳信記李衛公疾太宗親詔者數四其一曰有晝夜視公疾大老嫗令一人來吾欲熟知公起居狀權文公視此詔常泣曰君臣之際乃如此耶韋端衛公故物記唐宣宗好儒雅留心貢舉題殿柱曰鄉貢進士李某北夢瑣言集千載一合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑王褒頌蘭臺金門遞宿迭居西京賦既通金閨籍復酌瓊筵醴選昂昂子敬拔跡蒿萊選問我何功德三入承明廬應據詩遭千歲之嘉會潘安仁西征賦其言如石投水莫之逆也李蕭遠運命論並選君王賜顏色聲價凌煙虹李太白風雲感會起屠釣互見人生罔測魚水三顧合風雲四海生並同上攀龍附鳳勢莫當杜詩天子曰王某之文最宜為誥有古風豈可久以吏事役之拜中書舍人韓文王仲舒碑互見評文王仲舒與陽城合遏裴延齡不得為相德宗久嘉之後入閣顧問謂宰相曰第幾人必王某也果然月餘改員外郎同上玄宗召見李白於金鑾殿降輦步迎如見園綺以寶裝方丈賜食於前御手和羹德音褒獎褐衣恩遇前無比儔遂直翰林專掌密命他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命高大將軍扶以登舟范傳正作李白碑乘朱輪於郡邸曳長裾於王門名官至此不為不遇也白樂天文集可使珥貂立吾左右從容侍從以備顧問同上御札盈几天香滿衣李文饒寤一言而取宰相以三寸而為帝師同上寒衣病藥悉出聖慈匹馬一人咸經御選呂和叔文本朝狄青與西賊戰累功至副部署而上未識其面遂令圖形以進由是天下知公名東齋記事便蕃曲澤臨川集
