body:
  text: 不爭經寬柔以教不報無道南方之強也君子居之記中庸謂犯而不校也犯而不校語君子無所爭同上史人或毀直不疑盜嫂不疑聞曰我乃無兄然終不自明也史記本傳廉頗為趙將藺相如拜上卿位在頗右頗曰我見必辱之相如聞不肯與會每朝時嘗稱病不欲與頗爭列已而出望見頗引車避匿相如曰夫以秦王之威而相如廷叱之辱其群臣吾雖駑獨畏廉將軍哉顧念強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬥勢不俱生吾所以為此者先國家之急而後私讎也史記互入徇公忘私門衛綰不與他將爭西漢本傳直不疑為郎同舍有告歸誤持同舍郎金去金主意不疑不疑謝有之買金償後告歸者來歸金而前郎亡金者大慚同上寇恂在穎川賈復部將犯法恂斬之復欲手刃恂恂每避後漢劉寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛送還叩頭謝之寬曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校後漢卓茂事孔光嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日茂有馬數年心知其謬默解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主得亡者乃詣府送馬叩頭謝之陳重在郎舍同舍郎有告歸寧者誤持同舍郎袴以去主疑重所取重不自申説市袴以償之後歸寧者歸以袴還主其事乃顯並同上性既遲緩與人無傷雖出胯下之負榆次之辱不知貶損之於己猶蚊虻之一過也東漢孔融傳曹萌字元偉以仁厚稱鄰人有亡豕者與萌豕相類詣門認之萌不與爭後所亡豕自還其主大慚送所認豕辭謝萌萌笑而受之後漢弟子賈瓊問息謗通曰無辨問止怨曰不爭通監隋高祖直不疑買金以償同舍劉寬下車歸牛鄉人誠知疑似之難明非口之所能勝也唐書柳宗元何必窮其窟穴與螻蟻校長短哉通鑑唐武后傳記司馬徽字德操時人呼為水鏡嘗有人妄認徽豬徽便推與之後數日亡豬者以豬還徽乃叩頭謝自責徽又厚謝董正別傳何隨字季業清廉退讓嘗有屠者牽豬過隨門索斷失之強認隨溷中豬隨牽與之屠人尋自得亡者還隨隨竟以與之華陽國志集虛舟為心白樂天本朝難以口舌爭水清石自見黃魯直詩經汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功書大禹謨子天道不爭而善勝老子夫唯不爭故天下莫能與之爭同上史藺相如退避廉頗名重太山史記本傳經方茂爾惡相爾矛矣既夷既懌如相酬矣詩節南山進人若將加諸膝退人若將隊諸淵記檀弓下子馬喜則交頸相靡惡則分背相踶大計反莊子輕與苟毀好憎尚怒小人哉文中子互見躁急史喜怒以類者鮮易者實多左傳宣十七年魏收曰舉之則使上天按之當使入地北史本傳好則鑽皮出羽惡則洗垢索瘢新唐書魏證傳集君心好惡苦不常好生毛羽惡生瘡白樂天經惟深也故能通天下之志易繫辭史靜淵以有謀史記顓頊記情欲之感無介乎容儀西漢匡衡傳默而好深沉之思西漢楊雄傳淵哉若人西漢班固敘傳何休質朴訥口而雅有心思東漢本傳互入不以貌取劉儒口訥心辨同上殷浩雖被黜放口無怨言夷神委命談詠不輟雖家人不見其有流放之戚晉書本傳柏彝嘗謂褚裒曰季野有皮裏陽秋言其外無臧否而內有褒貶也謝安曰裒雖不言而四時之氣已備通監晉紀遊雅曰余與高子遊處四十年未嘗見其喜慍之色通監宋世祖楊綰性沈靜獨處一室左右圖史凝塵滿席淡如也唐書本傳李藩沈靜有檢局同上宋璟為刑部尚書馳驛詣闕遣內侍將軍楊思勗迎之璟風度凝遠人莫測其際在塗竟不與思勗交言通監唐元宗傳記智深勇沈戰國策集韻宇弘深褚淵碑智謀深靜唐文粹子一命而呂巨再命而於車上儛三命而名諸父莊子小人之學也入乎耳出乎口口耳之間則四寸耳曷足以美七尺之軀哉荀子史富貴不歸故鄉如衣繡而夜行誰知之者史記項羽紀韓信平齊使人言於漢王曰齊偽詐多變反覆之國不為假王以鎮之其勢不定願為假王史記本傳范睢一飯之德必償睚眥之怨必報同上意氣揚揚甚自得也史記晏子傳夫不足者視人有餘西漢班固傳桓榮為太子少師帝賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也東漢本傳互入驕矜一飱之德睚眥之怨無不報復通監漢獻紀桑維翰任愛憎一飯之恩睚眥之怨必報人亦以是少之通監五代晉高祖楊炎獨任大政以復恩讎為事通監唐德宗李訓鄭注平生絲恩髮怨無不報者通監唐文宗紀傳記章孝標及第後寄白樂天詩曰及第全勝十政官金湯鍍了出長安馬頭漸及揚州路為報時人洗眼看托言互入驕矜集詩未有劉長卿一句已呼阮籍為老兵矣筆語未有駱賓王一字已罵宋玉為罪人矣書字未識偏傍高談稷契讀書未知句讀下視服虔皇甫湜互入不自揆度內不足者急於人知韓文一人譽之則自以為有餘一人沮之則自以為不足經君子語大天下莫能載焉語小天下莫能破焉記中庸互見不可形容今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉鮫龍魚鱉生焉貨財殖焉記中庸仰之彌高鑽之彌堅瞻之在前忽然在後語君子易事而難説也夫子之墻數仞不得其門而入並論語子天俄而可度則其覆物也淺地俄而可測則其載物也微楊子水測之而益深窮之而益遠同上大壑之為物也注焉而不滿酌焉而不竭莊子猶河漢而無極莊子逍遙遊無窮如天地不竭如江海孫子不為謀府混然無際劉子史孔子適周問禮於老子孔子去謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為罔遊者可以為綸飛者可以為矰至於龍吾不知其乘風雲而上天吾今日見老子其猶龍耶史記戴良曰良不見叔度自以為不及既睹其人則瞻之在前忽然在後固難得而測矣東漢黃憲傳叔度汪汪若千頃陂澄之不清淆之不濁不可量也同上家人莫見喜怒聲色之異東漢仇覽傳薛收與房杜處腹心之寄更相結附薛元敬謹畏未嘗申款曲如晦曰小記室不可得而親不可得而踈新唐書本傳孫登性無恚怒或投諸水欲觀其量既出便大笑晉書隱逸傳賈耽自朝歸第接對賓客終日無倦家人近習未嘗見其喜怒之色古之淳德君子何以加焉舊唐書本傳風度凝遠人莫涯其量唐書宋璟傳杜如晦從太宗征伐參帷幄機祕方多事裁處無留僚屬共才之莫見所涯唐書本傳周顗指顧和心曰此中何所有和曰此中最是難測地晉書顧和傳一片靈臺丹青難狀唐書裴度傳諸諫官紛紛言事細碎天子益厭苦之陽城方與二弟及客日夜痛飲人莫能窺其際皆以為虛得名耳韓愈作爭臣論以譏之城不屑意通監唐德宗傳記王戎與嵇康居二十年未嘗見其喜慍之色世説上謝太傳無嗔喜劉義慶世説司馬徽與人語莫問好惡皆言好有鄉人問徽安否答曰好有人自陳子死答曰大好妻責之曰人以君有德故相告何忽聞人子死便言好徽曰卿言亦大好殷藝小説猶執杯就江海飲莫知淺深也劉向説苑按太行山而北去亦不知山所限極處亦如東海不知所窮博物志集喜慍莫見其際褚淵碑道識虛遠表裏融通淵然萬頃直上千仞僕妾不睹其喜慍近侍莫見其傾弛任彥升塞鴻絶儔匹海月難等夷孟東野烏可究其津涯而窺其墻仞唐文粹誰辨心與迹非行亦非藏白樂天仰之彌峻巍乎其若山挹之彌深湛乎其若海唐文粹朋友罕聞得喪之言家人莫見喜慍之色呂和叔文德輝陶然不見其際李義山時人欲識胸襟否彭蠡秋連萬里江杜牧之若躋太華臨溟渤但觀乎積高而水深不知磅薄澶漫所為遠大者也同上本朝須臾慰滿三農望卻斂神功寂似無韓魏公喜雨詩公之所能我不能知乘雲馭風與汗漫期東坡撰文定神道碑子之心胸蟠屈龍蛇風雲變化雨雹交加包然揮斧霹靂轟車人有遭之心驚膽落震仆如麻須臾霽止而四顧百里山川草木開發萌芽歐公祭蘇子美招之不來麾之不去不可得而親其可得而踈之乎坡文才如凌雲松豈受尺寸量蘇子由譬如太山喬嶽不見其運動而功利之及於物者不可以數計而周知東坡祭歐公文
