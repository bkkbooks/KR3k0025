body:
  text: 分量不同經維此聖人瞻言百里維彼愚人覆狂以喜詩桑柔厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親記表記生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣語季氏子曰回心三月不違仁其餘則日月至焉而已矣雍也中人以上可以語上也中人以下不可以語上也公冶長子曰君子固窮小人窮斯濫矣衛靈公譬之宮牆賜之牆也及肩窺見室家之好夫子之牆數仞不得其門而入子張子曰君子上達小人下達憲問子曰君子泰而不驕小人驕而不泰子路子曰君子易事而難説也説之不以道不説也及其使人也器之小人難事而易説也説之雖不以道説也及其使人也求備焉同上子麒麟之於走獸鳳凰之於飛鳥太山之於丘垤河海之於行潦孟賜也日進商也日退賜也好友勝己者商也好友不勝己者家語魯繆公無人乎子思之側則不能安子思泄柳申詳無人乎繆公之側則不能安其身孟公孫丑下好名之人能讓千乘之國苟非其人簞食豆羹見於色盡心下楊子取為我拔一毛而利天下不為也墨子兼愛摩頂放踵利天下為之盡心上互見不得中道趨向不同天之道損有餘補不足人之道損不足奉有餘老七十七章公儀伯以力聞周宣王聘之曰女力何如曰臣力能折春螽之股堪勝也秋蟬之翼王曰吾力能裂犀兕之革曳九牛之尾猶憾其弱列子上古有大椿者以八千歲為春秋朽壤之上有菌芝者生於朝死於晦春夏之月蠓蚋者因雨而生見陽而死溟海有魚焉其廣數千里其長稱焉其名為鯤有鳥焉其名為鵬翼若垂天之雲江浦之間生麼蟲其名曰焦螟群飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也列湯問宋元君將圖畫衆史皆至舐筆和墨在外者半有一史後至者儃儃不趨受揖不立因之舍公使人觀之則解衣槃礡莊子孔子謂子路曰水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交于前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也同上大智間間小智間間夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞪若乎後矣田子方篇互見事有難易門坎井之蛙謂東海之鱉曰井幹之樂至矣東海之鱉左足未入而右膝已縶秋水篇鵬徙於南溟水擊三千里摶扶搖而上者九萬里蜩與鳩決起而飛槍榆枋斥鷃騰躍而上不過數仞而下翱翔蓬蒿之間逍遙遊篇並莊子輕死而暴是小人之勇也荀子君子能則寬容易直以開道人不能則恭敬繜絀以畏事人小人能則倨傲辟違以驕溢人不能則妒嫉怨誹以傾覆人荀不苟楚王有白猿自射之則摶矢而熙使養由基射之始調弓矯矢未發而猿擁柱號矣淮南子泰山之與丘垤江河之與行潦孟子仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入于沱或淪于漢楊君子良馬不待策錣而行駑馬雖兩錣之而不能進淮南子許由獨善其身太公兼利天下孔叢子記問篇衆木不能法松柏諸蟲不能學龜鶴抱朴子對俗篇明之所及雖玄陰幽夜之地毫釐芒髮之物不以為難焉苟所不逮者雖日月麗天之照灼嵩岱干雲之峻峭猶不能察焉微旨論篇虎豹之所餘乃狸鼠之所爭也陶朱之所棄乃原顏之所無也祛惑論瓦盎木柸比門所饒金觴玉爵萬家無一並抱朴子江河之流爛胔漂尸縱橫接連而人飲之者量大故也盆盂之水鼠尾一曳必嘔吐而棄之者量小故也劉子子遊治武城仲尼發割雞之歎尹何為邑宰子産出製錦之諫同上師曠對晉平公曰少而學者如日出之光壯而學者如日中之光老而學者如秉燭夜行范子計然篇史子皮曰君子務知大者遠者小人務知小者近者左襄三十一年子皮治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳左僖二十七愚者暗於成事智者睹於未形史記趙世家故以詐遇詐猶有巧拙焉以詐遇齊譬之猶以錐刀墮太行山也通監六子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺史滑稽傳互見殊塗同歸故以桀詐桀猶巧拙有幸焉以桀詐堯譬之以卵投石以指撓沸若赴水火入焉焦沒耳通監工人之用鈍器也勞筋苦骨終日矻矻及巧冶鑄干將之朴清水淬其鋒越砥斂其咢水斷蛟龍陸剸犀革前漢王褒傳荷旃被毳者難與道純綿之麗密羹藜茹糗者不足與論太牢之滋味同上小智自私賤彼貴我達人大觀物亡不可賈誼傳度長挈大比權量力不可同年而語項籍傳盲者不見咫尺而離婁燭千里之隅楊雄傳男雖賤各為其家陽女雖貴各為其國陰杜鄴傳並前漢上智不處危以僥幸中智能因危以為功下愚安於危以自亡後漢吳漢傳智者順時而謀愚者逆理而動朱浮傳智者順以成德愚者逆以取害郅惲傳登高不懼者胥靡之人也坐不垂堂者千金之子也馬融傳互入其居使然門管寧與華歆共鋤菜見地有金寧鋤不顧與瓦石無異歆捉而擲之人以是知其優劣通監東漢費禕為尚書令常以朝晡聽事其間接賓客飲食嬉戲加之博奕每盡人之歡董允代禕旬日之中事多停滯蜀志桓溫來朝或云欲誅王謝謝安神色不變坦之流汗沾衣倒執手版通監晉紀或謂華談曰諺言人之相去如九牛毛寧有此理乎談對曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也晉書華談傳魏主執任城王協手曰二曹以才名相忌吾與汝以道德相親通監齊明紀下顧悅之與簡文帝同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲柳常質望秋先零晉書本傳互見敏於應對顏峻謝莊為吏部尚書時人語曰顏峻嗔而與人官謝莊笑而不與人官宋書齊神武令諸子各理亂絲帝獨抽刀斬之曰亂者須斬北史文宣紀松柏孤生徑特無所因倚女蘿弱不能立必附他木唐書李德裕傳正人如松柏獨立不倚邪人如藤羅非附他物不能自起通監唐文宗李晟為其子請昏於延賞不許晟謂人曰武夫性快釋怨於柸酒間則不復貯胸中矣非如文士難犯外雖和解內蓄憾如故吾得無懼通監唐德宗土城竹馬童兒樂也飾金翠羅綺婦人樂也貿遷有無商賈樂也高官厚秩士大夫樂也戰無前敵將帥樂也四海寧一帝王樂也唐書西域焉耆傳傳記君子得時如水小人得時如火説苑談叢篇郭林宗曰奉高之器譬諸汍濫雖清而易挹叔度汪汪若千頃陂澄之不清撓之不濁不可量也世説後漢黃憲傳氿從九音晷泉之側出者濫戶斬反泉之正出者毛詩有列氿泉又觱沸檻泉同義今人多誤作泛濫繆矣此段只當載漢書者夏侯太初嘗倚柱作書時大雨霹靂破所倚柱衣服焦然神色無變書亦如故賓客左右皆跌蕩不能住世説中楊修為丞相曹操主簿至江南讀曹娥碑上八字問修修曰知之操曰待朕思之行三十里乃得之令修解修曰黃絹色絲絶字幼婦少女妙字外孫女子好字齏臼受辛辭字操曰一如朕意俗云有智無智校三十里裴啓語林孔子曰仁義動君子財色動小人樂動聲儀魯有男子獨處于室鄰人嫠婦又獨處于室夜暴風雨至而室壞婦人趨而託之男子閉戶而不納曰吾聞之男子不六十不間居今子幼吾亦幼不可以納子婦人曰子何不若柳下惠然嫗不逮門之女國人不稱亂男子曰柳下惠固可吾固不可毛公詩傳集尺澤之鯢豈能與鯤魚量江海之大藩籬之鷃豈能與鳳凰料天地之高哉楚辭互見小不足以知大犨原之與子都培螻之與方壺左太沖魏賦彼桑榆之末光踰長庚之初輝同上鷦螟巢於蚊睫大鵬彌乎天隅張華鷦鷯賦一飛沖青天曠世不再鳴安與鶉鷃徒翩翩戲中庭晉阮步兵詩駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用班叔皮論孤松宜晚歲衆木愛芳春陳子昂互見物各有宜巢許蔑四海商賈爭一錢曹植樂府歌衆星羅青天朗者獨有月李太白互見事相形雀鳴朝營食鳩鳴暮求群獨有知時鶴雖鳴不緣身韓文內不足者急於人知霈焉有餘厥聞四馳今人適數百里出門惘惘有離別可憫之色持被入直三省丁寧顧婢子語剌剌不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉不善為斫血指汗顏巧匠旁觀縮手袖間不知言之人烏可與言知言之人默焉而其意已傳強者必怒於言懦者必怒於色並韓文不矍矍於進取不施施於得喪左絃右壺樂以終日與夫拳拳恐悸蒙諂負義得之拘拘榮不蓋愧以終其身而不能止者不獨優乎柳文君子宜于上不宜于下小人宜于下不宜于上柳文謗譽達士如弦直小人似鉤曲杜工部智士日千慮愚夫唯四愁孟東野君子山嶽定小人絲毫爭駑蹄顧挫抹逸翮遺稻粱君子芳桂性春榮冬更繁小人槿花心朝在夕不存並孟東野百草短長出衆禽高下鳴元微之聖人瑩其心而窒其謗是以能照天下之理故其心清而定愚者負其心而薄於外是以閉天下之理故其心塵而結皇甫湜項籍納秦降卒二十萬慮其懷詐一舉而盡坑之其於防虞亦已甚矣漢高豁達大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也陸贄狀貌群分頭角萬殊皇甫湜務鳩斂而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也陸宣公文屠羊于肆適味於衆口也攻玉於山俟知於獨見也貪日得則鼓刀利要歲計而韞櫝多劉賓客靈芝萐蒲與百果齊拆然煌煌翹翹出乎其類同上彼如君子心秉操貫冰霜此如小人面變態隨炎涼白樂天椿壽八千春槿花不經宿葵枯猶向日蓬斷即辭春因指塵土下蜉蝣良可悲不聞姑射上千歲冰雪肌彼為葅醢機上盡此作鸞鳳天外飛並白樂天集鷹飢常啄腥鳳飢亦待瓊張説文顏回簞瓢才白給肥醲不到口年不登三十張蒼染愛浩無際妾媵填後房竟壽百餘歲同上互見事難詰門鵬背負天龜曳尾雲泥不可得同遊並張説之文蟪蛄寧與雪霜期賢哲難教俗士知杜牧文君子寧小窮而大達小人寧小達而大窮程晏靜者多便夜豪家不見愁姚少監逸足期千里窮鱗渴一泓張承吉智士役十慮達人輕百憂許用晦文以至愚而對至聖以極卑而對極尊徒思自強不可得也唐文粹小物無大志同上蘭蕙雖可懷芳香與時息豈如凌霜葉歲暮藹顏色韋應物聖人之道猶坦途諸子之道猶斜徑皮日休本朝昔閻立本始以文學進身卒蒙畫師之恥余謂不然謝安石欲使王子敬書太極殿榜以韋仲將事諷之子敬曰仲將魏之大臣理不必爾若然者有以知魏德之不長也使立本如子敬之高其誰敢以畫師使之阮千里善彈琴無貴賤長幼皆為彈神氣沖和不知向人所在內兄潘嶽使彈終日達夜無忤色識者知其不可榮辱也使立本如千里之達其誰能以畫師辱之東坡書朱象先畫後翟公之客負公於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪己與士益厚賢於古人遠矣東坡勤上人詩集敘公謂歐公也昔者夫子廉潔而不為異衆之行勇敢而不為過物之操孝而不徇其親忠而不犯其君凡此者是夫子之全也原憲廉而至於貧公良孺勇而至於鬭曾子孝而徇其親子路忠而犯其君凡此者是數子之偏也上韓太尉書昔唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以宴安之際不能用裴度於未病治亂之效如斯可見賜文彥博乞致仕不允批答小人以位為寵求之而不可得君子以寵為憂推之而莫能去賜尚書右丞相胡宗允辭免不允詔君子之難知如麟鳳色斯舉矣翔而後集況可麾而卻之乎小人之易進如蛆蠅腥羶所聚瞬息千萬況可招而來之乎論周種擅議配享劄子並東坡富人事紛華綵繡光翻座貧者愧不能微摯出舂磨東坡君如大江日千里我如此水千山底達人千鈞弩一弛難再彀下士沭猴冠已繫猶跳驟乃知賢達與愚陋豈直相去九牛毛達人友四海曲士守一鄉鳳凰覽德輝遠引不待遣鷾鴯燕子戀庭宇倏忽來千轉有如市倡抹青紅妖歌嫚舞眩兒童謝家夫人淡手容蕭然自有林下風並東坡詩古之君子不用於世必寄於物以自遣阮籍以酒嵇康以琴阮無酒嵇無琴則其食草木而友麋鹿有不安者矣獨顏氏子飲水啜菽居於陋巷無假於外而不改其樂此孔子所以嘆其不可及也欒城集衆皆以力事君公獨以道自任仕以其力者力衰而後去進以其道者道高則難留同上秋鴻一何樂空際乘風飛秋蟲一何憂壁間終夜悲秋風坐見蒲柳躓歲晏惟有松柏堅袞袞河渭濁皎皎江漢清並同上大小窮鵬鷃短長見椿槿山谷詩我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江同上互入明於自知太阿無前鋒不缺鉛刀不堪供一切後山詩賜牆及肩人得視公才槃槃一都會同上棋不甚相遠但高棋識先後著耳若低棋即以後著為先著昔黥布以窮來歸故高祖洗足不起以挫其鋭布欲自殺後見張御從官如漢王則又大喜過望此識先著者也侯景以窮來歸梁武遽裂地而王之其後景凡有所須輒痛銼抑之故景反而梁武亡此以後著為先著也鳴道集互見區處失當人有斗筲之量者有鐘鼎之量者有江河之量者有天地之量者斗筲之量固不足算若鐘鼎江河者亦已大矣然滿則溢也唯天地之量無得而損益焉非聖人孰能當之大抵為名者只是內不足內足者自無意於名冰與水精非不光比之玉自是有溫潤含蓄氣象無許多光耀也譬如積水於萬仞之源一日決之滔滔汨汨直至于海其源深也若夫潢潦之水乍流乍涸終不能有所至者其源淺也並鳴道集韓魏公惟務容小人善惡黑白不太分故小人忌之亦少如范富歐尹常欲分君子小人故小人忌怨日至遺書韓魏公曰呂申公以進賢自任恩歸於己時士皆出其籠絡獨歐范尹旋收旋失之終不受其籠絡聖人之道如天地天地之間靡所不有衆人之道如山川如陵谷如鳥獸如草木如蟲沙各盡其分不知其外天地則無不包也無不遍也並遺書司馬溫公曰夫功名之際人臣之所難處如高帝所稱者三傑而巳淮陰誅夷蕭何械繫非以履盛滿而不止耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者子房有焉通監高帝紀有獻狄梁公畫像及告身十餘通詣狄青以為青之遠祖青謝遣還之比之郭崇韜哭子儀之墓青所得多矣筆談如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立於朝則豺狼狐狸自相吞噬故皆能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖纍千百緩急豈可望哉王元之畫像贊新序青松守節見臨危正色凜凜不可犯芭蕉芰荷不足數狼籍徒能污池檻歐陽文集新進之士喜勇鋭老成之人多持重同上夫窮天下之物無不得其欲者富貴者之樂也浮槎山水記他人磨礱爭出圭角公獨渾然不見其璞祭胡太博文萬物各有役無心獨浮塵貴賤同為一丘土聖賢獨如星日垂歐陽文集人能百歲自古稀松得千年未為老臨川集松苗地合分高下鳧鶴天教有短長短羽卑飛已甘心於枚粒陰虯自躍思遠耀於風雲並同上
