body:
  text: 稔惡經過涉滅頂凶易大過驕淫矜侉將由惡終書畢命元惡大憝書康誥暋不畏死同上天吏逸德烈于猛火書嗣征穢德彰聞書泰誓凶人為不善亦惟日不足商罪貫盈同上方茂爾惡詩變小雅節南山史鄭莊公之弟叔段姜氏愛之祭仲使圃之莊公曰多行不義必自斃子姑待之既而叔叚命西鄙北鄙貳於己公子呂請除之公曰無庸將自及太叔又收貳以為己邑子封曰厚將得眾公曰不義不暱厚將崩左隱九年復惡己甚左桓十七年長惡不悛左傳天奪之鑒而益其疾不可以五稔左僖二年此三族也世濟其凶增其惡名左文十八年天之假助不善非祚之也厚其凶惡而降之罰也左昭十八年左師曰縱之使盈其罪重而無基能無敝乎左哀二十六年季氏之惡已熟前漢五行志於易一為過再為涉三而弗改滅其頂凶通監漢獻紀竇憲姦惡貫天達地通監漢和紀夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絕東漢王符傳互入無恣素惡譬如猘狗或能噬人通監漢和紀桓溫曰男子縱不能流芳百世亦當遺臭萬年晉書杜絕言路掩蔽聰明以成其姦妬賢嫉能排抑勝己以保其位通監唐元宗集未革狼心仍懷豕突駱賓王未悟傾巢之兆敢懷拒轍之心同上惡稔禍盈親離眾叛人神共棄天地不容白樂天本朝袁紹以十倍之眾大敗於官渡僅以身死而操歛兵不追者何也所以緩紹而亂其國也東坡集經積善之家必有餘慶易坤卦互見種德吉人為善惟日不足書泰誓宗族稱孝焉鄉黨稱悌焉語子罕善人為邦百年亦可以勝殘去殺矣語季路子天道無親常與善人老子和大怨章史善人天地之紀也左成十五年東平王曰為善最樂後漢本傳馬援曰吾從弟少游曰士生一世但長取衣食裁足乘下澤車御款叚馬為郡掾吏守墳墓鄉里稱善人斯可矣本傳互見易足洗心向善東漢郭太傳良善與人無讎魏志集人而好善雖福未至禍其遠矣徐幹中論云曾子曰云云史三郤族大多怨左成十七年子皮授子產政子產曰族大多寵不可為也左襄八年羊舌四族皆彊家也左昭五年寧成抵罪歸家持吏短長史記本傳濟南氏宗人三百餘家豪猾二千石莫能制史記郅都傳家富埶足目指氣使西漢貢禹傳田儋弟榮橫皆豪傑宗彊能得人西漢本傳班氏遠祖以財雄北邊西漢班固自敘以多財為邊也之雄豪僮僕千指富埒王者西漢班固自敘豪彊之徒武斷鄉曲西漢食貨志師古曰恃其饒富則擅行威罰也圉奪成家者為雄桀同上師古曰圉謂禁守其人摶掩成富西漢食貨志豪植大彊西漢賈誼傳寧成抵罪歸家威重於郡守西漢本傳彊者怨之歸也東漢臧宮傳其并兼者則陵橫邦邑桀健者則雄張閭里東漢酷吏傳集乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌左太沖吳都賦豪家乘聲相扇元微之集史灌夫陂池田園宗族賓客為權利橫於穎川史記本傳田蚡為相薦人或起家至二千石權移主上上曰君除吏盡未朕亦欲除吏田蚡治宅甲諸弟田園極豪腴市買郡縣器物相屬於道前堂羅鐘鼓立曲旃後房婦女以百數諸侯奉金玉狗馬玩好不可勝數同上熏灼四方西漢班固敘傳公卿以下畏石顯重足一跡顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位通監漢元紀五人同日封故世謂之五侯通監漢成紀代相陳豨從車千乘而吳濞淮南皆招賓客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳騖於閭閻權行州域力折公侯通監漢武紀丁傳董賢用事諸附離者或起家至二千石西漢楊雄傳列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆籍王公之埶競為游俠通監漢武紀黨親連體根據於朝廷通監漢宣紀其四方調發歲時貢獻皆先輸上第於冀乘輿乃其次焉吏民齎貨求官請罪者道路相望百官遷召皆先到冀門牋檄謝恩然後敢詣尚書通監漢柏紀黃門常侍及中使伯榮往來甘陵尚威儀翕赫震動郡縣王侯二千石至為伯榮獨拜車下通監漢殤紀四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墮通監漢柏紀李固曰中常侍在日月之側聲勢振天下通監東漢手握王爵口含天憲運掌則使餓吏富於季孫呼噏則令伊顏化為桀跖東漢朱暉傳指撝足以震風雨叱咤可以興雷電東漢皇甫嵩傳埶家多所宜咳唾自成珠被褐懷金玉蘭蕙化為芻東漢趙壹傳問起居者車如流水馬如游龍東漢皇后紀帝以惠琳道人善談論因與議朝廷大事遂參權要賓客輻湊門車常有數千兩四方贈賂相係方筵七八座上桓滿琳著高屐披貂裘置通呈書佐會稽孔覬詣之遇賓客填咽暄涼而已覬慨然曰遂有黑衣宰相可謂冠屨失所矣通監南史宋高祖紀忤意者嚴霜夏零阿旨者膏雨冬澍榮枯由其唇吻廢興候其指麾通監隋高祖竇霍勢傾中外藩鎮將帥多出神策軍臺省清要亦有出其門者矣通監唐德宗楊國忠相禳袂扼腕公卿以下頤旨氣使莫不震慴通監唐紀劉晏任職久勢軋宰相要官華使多出其門唐書本傳自江淮茗橘珍甘常與本道分獻競欲先至雖封山斷道以禁前發晏厚貲致之常冠諸府唐書劉晏傳士之浮競甘進者爭出其門赫然勢焰可炙唐書韋渠牟傳當其黨盛門若沸羹唐書王丕傳楊虞卿依柔善諧麗權倖倚為姦利歲舉選者皆走門下無不得所欲升沉在牙頰間唐書慕容超時公孫五樓為侍中內外无不憚之王儼諂事五樓時人語曰欲得侯事五樓晉書互入趍時天憲在口勢迴日月舊唐書盧杞為相朋附者咳唾立至青雲睚眥者顧盻己擠溝壑唐書桑維翰權勢既盛四方賂遺歲積鉅萬五代晉舉動回山海呼吸變霜露范蔚宗宦者論阿旨曲求則光寵三族直情忤意則參夷五宗同上傳記事非權不立非勢不成戰國策集俛仰生榮華咄嗟復彫枯左太沖詠史詩冠蓋輻湊衣裳雲合輜軿擊轊坐客怕滿蹈其閫閾若升闕里之堂入其奧隅謂登龍門之阪文選敘溫郁則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言文選絕交論寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐漱興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼文選劉孝標絕交論服軒乘冕出於言笑之下選恩倖傳所愛光五宗所惡滅三族陳琳檄冠帶交錯方圓接軫文選張平子西京賦宗黨生光華賓僕遠傾慕選詩況聞內金盤盡在衛霍室杜詩掌握有權柄衣馬日肥輕同上聲馳而響溢風振而草靡可使尺澤之鯢奮鱗而縱海密網之鳥舉羽而翔霄柳文轉盻生光輝唐文粹權傾一國聲震八紘同上本朝吹噓死灰生氣燄談笑暖律回嚴凝歐公集經依勢作威倚法以削書君陳席寵惟舊怙侈滅義書畢命季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也記檀弓史以寵賈怨國語夫郤昭子其富半公室其家半三軍恃其富寵以汰于國其身尸於朝其宗滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無德也國語互見勢不可恃武安負貴而好權史記灌夫等傳論田蚡為丞相召客飲坐其兄蓋侯北卿自坐東卿以為漢相尊不可以兄故私撓西漢田蚡傳互見陵紀我倚名族西漢項籍傳恃勢怙寵後漢怙寵矜功前漢竇憲恃宮掖聲勢以賤直請奪沁水公主園主逼畏不敢計通監漢明帝久依城社不畏熏燒東漢盧延傳城狐社鼠通監晉紀杜威久鎮恒州性貪殘自恃貴戚多不法每以備邊為名歛吏民錢帛以充私藏富室有珍貨或名姝駿馬皆奪取之或誣以罪殺之籍沒其家通監五代晉高祖魏宗愛方用事威振四方嘗召百官於都坐王公已下皆趍庭望拜通監宋世祖江表自東晉以來世族陵駕寒門通監隋高祖來俊臣倚勢貪淫士民妻妾有美者百方取之自宰相以下籍其姓名而取之通監唐武后山東人士崔盧李鄭諸族好自矜地望雖累葉陵夷苟他族欲與為姻必多責財幣或捨其鄉里而妄稱名族或兄弟齊列而更以妻族相陵通監唐太宗紀號國尤為豪蕩一旦帥工突入韋嗣立宅即撤去舊屋自為新第但授韋氏以隙地十畝而已通監唐元宗故事諸宰相會食中書丞相食時百僚無敢謁者叔文至中書欲與同平章事韋執誼計事令直省通之直省以舊事告叔文怒叱直省懼入白執誼通監傳記三貴瞋目張拳有噉人勢三國典略集馮藉世資用相陵駕選恩倖論鼠憑社貴狐藉虎威同上夫傲雖凶德必有恃而敢行韓文釋言互入傲慢廣勢馳聲劉賓客席其勢鼓行人間同上驅駕氣勢若掀雷挾電抉於天地之垠唐文粹本朝依倚秋風氣勢豪似欺黃雀在蓬蒿歐公集經脅權相滅書恭誓中強者脅弱眾者暴寡知者詐愚勇者苦怯記樂記子名也者相軋也莊子人間世以強陵弱以眾暴寡皆亂人之徒也莊子盜跖強以克弱韓非子強者害弱而奪之眾者暴寡而譁之荀子性惡獸食顓善民鷙鳥攫老弱淮南子強掩弱眾暴寡詐欺愚勇侵怯同上雞有專栖之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳抱朴子史天下以智力相雄長通監周紀眾暴寡大并小西漢天文志孔熙先曰近者殷鐵一言而劉班碎首彼豈父兄之讎百世之怨乎所爭不過榮名勢利先後之間耳及其末也唯恐陷之不深發之不早戮及百口猶曰未厭是可為寒心通監宋太祖張弘策曰一國三公猶不堪說六貴同朝勢必相圖通監齊東昏侯紀永元元年時徐孝嗣蕭坦之等交輔政也江左自東晉以來世族陵駕寒門通監陳紀天后方圖臨朝乃鴆殺太子弘立雍王賢賢自知必不保全與二弟無由敢言乃作黃臺瓜詞賢終為后所逐死黔中唐書互相吞噬唯力是視通監唐僖宗紀集傾奪相誇侈不知身所終陳子昂弱之肉強之食韓文送文暢序暴寡脅弱柳文力大者摶齒利者齧爪剛者抉群眾者軋柳文貞符爭先利塗虞相軋則釁起劉賓客
