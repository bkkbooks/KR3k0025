body:
  text: 強勉經君子以自強不息易乾卦功崇惟志業廣惟勤書周官有所不足不敢不勉記中庸學之弗能問之弗知思之弗得辨之弗明行之弗篤弗措也人一能之己百之人十能之己千之果能此道矣雖愚必明雖柔必強同上子久假而不歸惡知其非有也孟子強恕而行求仁莫近焉盡心上道雖邇不行不至事雖小不為不成荀子修身鍥而不舍金石可鏤荀勸學史子順曰人皆作之作之不止乃成君子作之不變習與體成則自然也通鑑強勉學問則聞見博而智益明強勉行道則德日起而大有功西漢董仲舒傳傳記蘇秦讀書欲睡引錐自刺其股血流至足戰國策孫敬嘗閉戶讀書睡則以繩繫頭懸之梁上楚國先賢傳集策駑磨鈍陳子昂磨鉛重剸割策蹇再奔馳白侍郎無若泰山之麓止而不得升也其惟川之不已乎柳文經惰農自安不昏作勞不服田畝越其罔有黍稷書盤庚中人之性好逸豫無逸注弗為胡成太甲下安肆日偷記表記逸豫無期詩白駒子曰德之不修學之不講聞義不能徙不善不能改語述而冉求曰非不悅子之道力不足也雍也飽食終日無所用心難矣哉陽貨群居終日言不及義衛靈公士而懷居不足以為士矣憲問子子貢曰賜倦於學困於道矣願息可乎家語處身而常逸者則志不廣同上一進一退六驥不致荀子修身其為人也多暇日者其出入不遠矣偷懦憚事無廉恥而嗜乎飲食則可謂惡少者也並同上肉腐出蟲魚枯生蠹怠惰忘身禍災乃作勤學史懷與安實敗名左僖二十三管敬仲曰宴安鴆毒不可懷也左閔元吾儕偷食朝不謀夕左昭元主民玩歲而揭日昭元揭苦蓋切雀鼠貪生苟乞一活耳通鑑八十一東漢世祖紀相聚偷生若魚遊釜中知其不可久且以喘息須臾間耳通鑑漢殤紀集怠者不能修韓文原毀本朝坐棄時日臨川筆硯生塵空度日欒城集經君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯記中庸玉不琢不成器人不學不知道學記互入不學子子路曰南山有竹不揉自直斬而用之達于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入不亦深乎家語子路篇純璞不殘孰為犧樽白玉不毀孰為圭璋莊馬蹄紀渻子為齊宣王養鬭雞十日而問雞巳乎曰未也方虛憍而恃氣十日又問曰未也猶應響景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者巳無變望之似木雞矣其德全矣莊子達生篇西門豹性急故佩韋以自緩董安于性緩故佩絃以自急韓子木直中繩輮以為輪其曲中規雖有槁暴不復挺者輮使之然也荀勸學枉木必得櫽括然後直鈍金必得寨厲然後利荀性惡玉不雕璵璠不作器楊子海蚌未剖則明珠不顯崑竹未斷則鳳音不彰文子吳竿質徑非筈羽而不羹越劍性利非淬礪而不銛同上侯自直之箭則百代無一矢俟自員之木則千歲無一輪韓子假儒衣書服而讀之三月不歸孰曰非儒也楊子史虎豹馬牛禽獸之不可制也及其教馴服習之至牽持駕服唯人之從西漢公孫洪傳治性之道審己之所有餘而強其所不足聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛強者戒於太暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘康衡傳金在礦何足貴善冶煆而為器人乃寶之唐書魏證傳互見提拔集刓方以為圜楚辭若金受礪若泥在鈞張茂先勵志詩木以繩直金以淬剛必須砥礪就其鋒鋩蔡雍勸學不自朱藍何遷素絲之質晉王儉表木之性直匠者揉以為輪金之性剛工人理以成器豈人事也唯上智下愚特稟異氣中庸之才全由訓習虞世南公子先生論刻意厲行如奉商鞅之法而懼秦刑皇甫湜本朝唐太宗性本強悍勇不顧親而能畏義好賢屈己從諫刻厲矯揉力於為善此所以致正觀之治也范唐監經君子多識前言往行易大畜好古博雅君子書序君子之學也博儒有博學而不窮禮記儒行博學無方記內則大哉孔子博學而無所成名語子多聞曰博多見曰間荀修身博學而詳說之孟子史鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣今夢黃熊入於寢門其何厲鬼也對曰昔堯殛鯀於羽山其神化為黃熊以入羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間左傳晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯會郤成子于承匡之歲也七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也杜注云亥字二畫在上併三六為身如算之六也同上吳伐越墮會稽得骨節專車吳使使問仲尼骨何者最大仲尼曰禹致群臣於會稽山防風氏後至禹殺而戮之其節專車此為大也史記有隼集於陳庭而死楛矢貫之石砮矢長尺有咫陳湣公使問仲尼仲尼曰隼來遠矣此肅謹之矢也昔武王克商通道九夷八蠻使各以其方賄來貢於是肅謹貢楛矢石砮長尺有咫先王以分大姬配虞胡公而封諸陳試求之故府果得之同上莊子其學無所不窺史本傳褚先生好讀外家傳語史滑稽傳東方朔多所博觀外家之語索隱曰外家非止經史即傳記雜說之書史滑稽傳田蚡學盤盂諸書本傳劉向楊雄博極群書西漢司馬遷贊司馬遷為太史令音抽紬史記石室金匱之書太史公自序其涉獵者廣博貫穿經傳馳騁古今西漢班固贊司馬遷天下方聞之士西漢儒材傳師古曰博聞之士也五經紛紜井大春後漢周舉博洽為儒者所宗京師為之語曰五經縱橫周宣光沈淪典籍為儒家文林後漢崔實傳仲尼恥一物之不知晉張衡傳所觀彌博所習彌多日聞所不聞日見所不見晉虞溥傳巨骨出吳隼集陳庭黃熊入寢亥有二首非夫洽聞者莫識其端也東漢謝該傳晉杜預朝野號曰武庫言其無所不有也晉書本傳王粲博物強記問無不對魏志裴頠博學稽古周弼見而嘆曰若武庫五兵縱橫一時之傑也晉書裴頠傳荀勗於路逢趙賈人牛鐸識其聲及掌樂音未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飯謂在坐人曰此勞薪所炊帝遣問膳夫實用故車腳舉世服其明識晉書天下奇祕世所希有者悉在華所由是博物洽聞世無與比惠帝中人有得鳥毛三丈以示華華見慘然曰此謂海鳧毛也出則天下亂矣陸機嘗餉華鮓于時賓客滿坐華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化為雉也開視雉側果有蛇蛻焉吳郡臨平岸崩出一石鼓捶之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣於是如其言果聲聞數里初吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也惟華以為不然及吳平之後紫氣愈明華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寶劍佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒豔發大盆盛水置劍其上視之者精芒眩目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰本朝將亂張公當受其禍此劍當繫徐君墓樹矣靈異之物終當化去不永為人服也華得寶劍愛之常置座側華以南昌土不如華陰赤土報煥書曰詳觀劍文乃干將也莫邪可復至不雖然天生神物終當合耳因以華陰土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽於腰間躍去墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反須臾光彩照水波浪驚沸於是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多類此不可詳載焉張華博物洽聞世無與比符元達善識味鹹酢及肉皆別所由或人殺雞以食之元達曰此雞栖常半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無差時人以為知味並同上李守素通姓氏學世號肉譜虞世南曰昔任彥升通經時稱五經笥今以倉曹為人物志可乎唐書王元感為五經指南同上殷踐猷博學賀知章號為五總龜謂龜千年五聚問無不知也新唐書劉杳博綜群書沈約任昉以下每有遺忘皆訪問焉南史王彪之博聞多識江左舊事緘青箱世謂之王氏青箱學同上澄博覽無所不知王儉自以博聞多識過澄澄待儉語畢然後談所及遺漏數百十條皆儉所未睹儉乃歎服曰陸公書廚也南史陸澄傳劉孝綽子諒悉晉代故事時人號曰皮裏晉書南史本傳朱异遍治五經涉獵文史博奕書算皆其所長沈約曰卿年少何乃不廉异未達約曰天下唯有文義棋書卿一時將去可謂不廉梁書房暉遠世傳儒學牛洪稱為五經庫隋書本傳古事問仲舒高今事問琳尚何疑唐書崔琳傳常爽為儒林先生北史谷律那淹識群書褚遂良稱為九經庫唐書本傳傳記楊雄懷鉛抱槧從計吏訪四方語作方言西京雜記漢武帝時未央宮殿前鐘無故自鳴詔問東方朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鐘先鳴三日南郡上言山崩東方朔外傳徐堅多識典故七入書府大唐遺事互見際遇總括萬殊包吞九府史通時無遠近事無巨細必藉多聞以成博識同上集并包書林楊雄長楊賦兵法五十家爾腹為篋笥杜詩收百世之闋文采千載之遺韻觀古今於須臾撫四海於一瞬陸士衡文賦文學穰穰囷倉稠韓文枯腸唯文字五千卷盧同茶歌凡自唐虞以來編簡所存大之為河海高之為山嶽明之為日月幽之為鬼神纖之為珠璣華實變之為雷霆風雨奇辭奧旨靡不通達韓文書無所不讀然正用資以為詩韓退之范陽盧殷墓銘鉤引貫穿舉大包小若太倉之蓄崇山之載浩浩乎不可知也柳文藝邃六書學該七録柳祭文武庫則矛戟森然文房則禮樂盡存姚崇銘本朝晏公所為類要上中下帙總七十四篇六藝太史公百家之言騷人墨客之文章至於地志族譜佛老方技之衆說旁及九州之外蠻夷荒忽詭變奇跡之序録皆披尋紬繹而於三才萬物變化情僞是非興壞之理顯隱細巨之委曲莫不究盡老泉奇書可學知子雲之苦心亡書復存賴安世之默識東坡集互見強記撐腸拄腹文字五千卷東坡詩學如富賈在博收仰取俯拾無遺籌東坡詩史漢武幸河東亡書三篋詔問莫能知唯張安世識之具作其事後購求得書以相校無所遺失西漢霍光問張千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所遺失西漢張安出傳黃祖長子射嘗與禰衡俱遊共讀蔡雍碑射恨不繕寫衡曰吾一覽能識之唯其中石缺二字因書出之射馳使寫碑校如衡所書東漢禰衡傳禰衡目所一見輒誦於口耳所暫聞不忘於心同上王起天下書無不讀一經目弗忘新唐書費禕為尚書令識悟過人每省讀舉目暫視已究其意旨其速數倍於人終亦不忘通鑑魏邵陵厲公紀唐雍練習軍書自督將以降勞效本末及四方軍士強弱多少番代往還器械精粗儲蓄虛實靡不諳悉通鑑梁世祖劉輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之通鑑晉懷紀楊愔性強記一見皆不忘其姓名選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊乘短尾牡驢見我不下以方麴障面我何為不識卿漫漢驚服通鑑梁敬帝王粲觀人圍棊局壞粲為覆之不誤一道其強記如此魏志本傳王粲與人共行讀道邊碑人問曰卿能暗誦乎曰能因使背而誦之不失一字同上朱桓強識與人一面數十年不忘部曲妻子悉識之吳志本傳張華強記默識帝問漢宮室制度及建章千門萬戶華應對如流畫地成圖強記默識四海之內若指諸掌晉本傳唐太宗寫列女傳於時無本虞世南暗疏之無一字謬本傳張巡讀書不過三復終身不忘唐書本傳張巡初守睢陽時城中居人亦且數萬巡一見問姓名其後無不識者通鑑唐肅宗蘇頲一覽至千言輒覆誦唐書本傳李雍自言讀書未遍乃假直祕書未幾辭去李嶠驚試問隱篇隱帙了辨如響唐書傳記晉羅犮為人強記從桓宣武伐蜀按行蜀道陌果竹皆默記之世說開元中常敬忠十五歲上書言能一過誦千言張燕公召問曰能十過誦萬言乎曰能以萬字試之七過巳通熟御史臺記太宗征遼碑在水中張建章帛包麥屑置水中摸而讀之不缺一字北夢瑣言集為人強記覽過眼不再讀偉哉群聖文磊落載其腹韓文經目所涉莫不精詣唐文粹巡曰吾於書讀不過三遍終身不忘也因誦于嵩所讀書盡卷不錯一字嵩驚以為巡偶熟此卷因亂抽它帙以試無不盡熟嵩又取架上諸書以問巡巡應口誦無疑嵩從巡久亦不見巡常讀書也韓文張中丞後敘本朝昔賢書曹娥碑後蔡雍夜暗手摸其文而讀之見山谷詩張安道家貧無書常就人借三史旬日輒歸之曰得其詳矣凡書皆一閲終身不再讀屬文未嘗起草東坡撰墓志
