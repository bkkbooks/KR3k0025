body:
  text: 不待擬議經不耕穫不菑畬易無妄其或繼周者雖百世可知也語誰能出不由戶何莫由斯道也語雍也子兩木相摩而然金火相守而流圓者常轉窾者常浮自然之勢也淮南子史雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者賈山傳褚䂮曰冰炭不言而冷熱之質自明者以其有實也通監三國魏文紀集近火固宜熱履冰豈惡寒君子行苟贊其道若譽天地之大褒日月之明非愚則惑柳文互見不待增益楩楠出地知為棟梁鳳凰在殼知摩雲霄高達夫鳳凰芝草賢愚皆以為美瑞青天白日奴隸亦知其清明韓文本朝如炊之無不熟種之無不生也東坡思治論集毛嬙西施善毀者不能蔽其好選四子講德論稱謂一立古先聖賢所不敢移劉賓客精金百鍊良驥千金唐文粹本朝鬻千金之璧者不之於肆而願觀者塞其門觀者歎息而主人無言焉非不能言知言之無加也東坡上曾丞相書文章如金玉各有定價先後進相汲引因其言以信於世則有之矣至其品目高下蓋付之眾口決非一夫所能抑揚東坡荅毛滂書歐陽公言文章如精金美玉市有定價非人所能以口舌貴賤也東坡荅謝師民書野鶩家雞定誰美東坡詩藍田生美璞未琢價連城山谷互見素服經汲養而不窮愈汲愈生並易井卦疏齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終不食而死記檀弓下子孟子曰焉有君子而可以貨取乎孟公孫丑下子貢南游於楚過漢陰見一丈人方為圃畦鑿隧而入井抱甕而出灌用力多見功寡子貢曰鑿木為機後重前輕挈水若抽其名為槔圃者曰聞有機事必有機心吾非不知羞不為也莊子見虎一文不知其武見驥一毛不知善走淮南子行一棊不足以見智彈一弦不足以見悲同上故九州不可頃畝也八極不可道里也大山不可丈尺也江海不可斗斛也淮南子泰族訓不可以黔婁原憲之貧而謂古者無陶朱猗頓之富不可以無鹽宿瘤之醜而謂在昔無南威西施之美抱朴子暢玄篇王莽引典墳以飾其邪不可謂儒者皆為篡盜也相如因鼓琴以竊文君不可謂雅樂主於佚也同上史趙有處士毛公隱於博徒薛公隱於賣漿家通監周赧王紀始孟嘗君列此二人雞鳴狗盜於賓客賓客盡羞之及孟嘗有秦難卒此二人捄之史記孟嘗君列傳韓安國坐法獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之居無幾韓安國為梁內史前漢書趙使平原君合從於楚約與食客二十人偕得十九人毛遂自贊備負曰使遂蚤處囊中乃脫穎而出平原君竟與毛遂偕十九人相與目笑之而未發也毛遂至楚與十九人論議十九人皆服遂定從而歸史記平原君傳毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顏色奉心賤之及義母死後舉賢良徵不至張奉歎曰賢者固不可測往日之喜乃為親屈也後漢器博者無近用東漢宋弘傳安靜之吏日計不足月計有餘東漢安紀互見安靜王導因事就功雖無日用之益而歲計有餘通監晉元帝紀庸可以水旱而累堯湯乎東漢蔡邕傳魏舒不為鄉親所重後為將軍鐘毓長史毓每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數舒容範閑雅發無不中舉坐愕然莫有敵者毓曰吾之不足以盡卿才有如此射矣通監魏元紀王湛初有隱德人莫能知兄弟宗族皆以為癡兄子濟輕之嘗詣湛見床頭有周易濟請言之因剖析玄理微妙而有奇趣皆濟所未聞武帝亦以湛為癡見濟輒調之濟曰臣叔殊不癡晉書初陸機入洛欲為三都賦聞左思作之撫掌而笑之與其弟雲書曰須其成當以覆酒甕及思賦出機絕歎以不能加也遂輟筆焉晉書左思傳互見心服門初拓跋窟咄之伐珪也莫題以珪年少以箭遺窟咄曰三歲犢豈能勝重載耶珪心御之至是使人以箭示題而謂之曰三歲犢果何如題父子對泣詰朝收斬之通監晉安紀互入因言取禍王敬則母常謂人云敬則應得鳴鼓角人笑之曰汝子得為人吹角可矣後果封侯給鼓吹齊書曹景宗大破魏軍振旅凱入帝於華光宴飲因令左僕射沈約賦韻景宗不得韻意色不平啟求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝欣然不已約及朝賢驚嗟竟日詔令上史梁書陳慶之曰吾始以為大江以北皆戎狄之鄉比至洛陽乃知衣冠人物盡在中原非江東所及也通監梁高祖魏游雅曰昔崔司徒謂高生豐才博學所乏者矯矯風節耳余亦以為然及司徒得罪詔指臨責聲嘶股慄殆不能言高子獨敷陳事理辭義清辨音韻高亮人主為之動容聽者無不神聳此非矯矯者乎通監高生乃高允太宗令封德彝舉賢久無所舉上詰之對曰非不盡心但於今未有奇才耳上曰君子用人如器各取所長正患不能知安可誣一世之人通監唐太宗互入淺量封常清少孤貧細瘦纇目一足偏短求為高仙芝傔不納常清日候仙芝出入不離其門凡數十日芝不得已留之會達奚部叛常清私作捷書以示仙芝皆仙芝心所欲言者由是一府奇之仙芝為節度使即署常清判官通監唐元宗桑維翰隨事裁決初若不經思慮人疑其踈略退而熟議之終亦不能易也通監五代晉高祖傳記張華見褚陶語陸平原曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見褚生陸曰公未睹不鳴不躍者耳世說中鳳凰初起也環二十步之雀喔咿而笑之及升少陽一詘一信展轉雲間藩籬之雀超然知不及遠矣士褐衣未嘗完也糲食未嘗飽也世俗之士即以為羞耳及其出則安百議用則延民命世俗之士超然自知不及遠矣韓詩外傳集夫鯤之為魚也潛碧海泳滄流沈鰓於渤海之中掉尾乎風濤之下而濠魚井鮒自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天地之間宛頸乎江海之畔而雙鳧乘鴈自以為可得而褻焉及其羽化垂天摶風九萬振鱗橫海擊浪三千寧能借翰於桑榆假力於在藻資江濱涓流之水待堀堞揚塵之風哉駱賓王人之難知堯舜所病胡可以一詶一詰而謂盡其能哉陸宣公文勿言分寸鐵為用乃長兵白樂天本朝盡道滿城無國艷不知朱戶鎖嬋娟臨川集劉中山謂王曾曰狀元試三場一生喫著不盡曾曰平生之志不在溫飽東軒筆錄經其何傷於日月乎語子君子所性雖大行不加焉雖窮居不損焉孟子單父一歲之麥於魯不加強喪之不加損家語舉世而譽之不加勸舉世而非之不加沮莊子逍遙遊天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛秋水篇注焉而不滿酌焉而不竭天地篇禹之時十年九潦而水不加益湯之時八年七旱而涯不加損並莊子不能毀山之一毛列湯問富貴不足以益卑賤不足以損荀哀公篇不為堯存不為桀亡荀毀譽之於己猶蚤䖟之一過也淮南子渴飲河水腹滿而河水不為之竭同上堯舜在上雖有十桀不能亂者勢治也韓子史江湖之崖渤海之島乘鴈集不為之多雙鳧飛不為之少西漢楊雄傳九牛亡一尾司馬遷傳譬猶鍾山之玉泗濱之石累珪璧不為之盈採浮磬不為之索蔡邕傳譬猶衡陽之林岱陰之麓伐尋抱不為之稀蓺拱把不為之數後漢崔駰傳塵加岱嵩霜集淮海雖未有益不為損也後楊倫傳如彼白圭質無點塵清不增潔濁不加染袁宏三國名臣贊虞仲翔美寶為質彫摩益光不足以損三國虞翻傳唐段志沖曰尺霧障天不虧於大寸雲點日何損於明通監唐記傳記鴻鵠高飛沖天然其所恃者六翮耳夫腹下之毳背上之毛增去一把飛不為高下劉向新新序子貢曰臣譽仲尼如兩手捧土而附泰山其無益明矣臣不譽仲尼如兩手把泰山無損亦明矣韓詩外傳一室之中益一人燭不為益明去一人燭不為益暗列女傳集青蠅不能穢垂棘邪論不能惑孔墨文選四子講德論行潦暴集江海不以為多鰌鱓並逃九罭不以為虛是以許由匿堯而深隱唐氏不以衰夷齊恥周而遠餓文武不以卑同上百川注東海東海無虛盈泥滓不能濁澄波非益清韋應物淮濟之清有玷焉若秋毫固不為病柳文日月之蝕大圭之瑕曷足以傷其明黜其寶哉同上穢者自穢不足以害吾潔狹者自狹不足以害吾廣幽者自幽不足以害吾明柳文落一星伐一樹不足以損天地光輝唐文粹如太倉之稊米委一粒於萬鍾同上譽之所不能益者毀不能損榮之所不能動者辱不能加利之所不能勸者害不能嬰同上俾吾為秋毫之杪吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多唐文粹互見有定力終年汲引絕不耗復不盈元稹集經君子語大天下莫能載焉語小天下莫能破焉記中庸君子之道造端乎夫婦及其至也察乎天地同上觀天下之物無可以稱其德者記禮器大道不器記學記君子不器語為政子澤及萬世而不為仁長於上古而不為壽覆載天地彫刻眾形而不為巧莊天道千里之遠不足以舉其大千仞之高不足以極其深秋水篇在太極之先而不為高在六極之下而不為深先天地生而不為久長於上古而不為老莊子大宗師史莊周其言洸洋自恣王公大人不能器之同上深者入黃泉高者出蒼天大者含元氣纖者入無倫前楊雄傳王戎常目山濤如璞玉渾金人能欽其寶莫能名其器晉王戎傳集昭乎日月不足為明崒乎泰山不足為高巍乎天地不足為容韓伯夷頌潔乎瑾瑜不足為其珍芬乎蘭茞不足為其秀皮日休確然金石不足以為貞澹然冰玉不足以為潔唐文粹雲煙綿聯不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其格也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘隴不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也唐文粹通塞若水變化若龍動之謂道非可以一善稱非可以一行目皇甫湜本朝天子有道其德不可得而名輔相有德其才不可得而見故漢之文景紀無可書之事唐之房杜傳無可載之功除呂大防尚書左僕射制譬夫天地之妙造化萬物動者植者無細與大不見痕跡自極其工歐公墓誌
