body:
  text: 得此失彼經豐其屋蔀其家易豐卦王弼注云蔀覆也暗之甚也子見牛未見羊也孟梁惠王上人有濱河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半本學泅不學溺而利害如此列史祝有益也詛亦有損左昭二十年袁紹見人飢寒恤念之形於顏色其所不見慮或不及通監漢獻帝魏曹冏曰猶芟刈股肱獨任胸臆觀者為之寒心通監三國志互入自相矛盾翟莊惟以弋釣為事及長不復獵或問漁獵同是害生何止去其一莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞釣豈我哉晉書傳記夫知古不知今謂之陸沉然則儒生所謂陸沈者也王充論衡集工於瑟而不工於求齊也韓答陳商書楊馬之才不知教化荀陳之道不知文章柳冕論文互入事無全美一自低心翰墨場箭靫拋盡負書囊元微之集君耳惟聞堂上言君眼不見門前事白侍郎徐鉉不信佛酷好鬼神之說楊億談苑經家不寶龜記禮器子家不藏甲家語史五大不在邊五細不在庭左昭十年國家之立也本大而末小是以能固故天子建國諸侯立家左大夫無百雉之城史孔子世家徙齊諸田楚昭屈燕趙韓魏後及豪傑名家居關中無事可以備胡諸侯有變亦足率以東伐此強本弱末之術也史劉敬傳太宗別置府兵分隸禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中則居重馭輕之意明矣通監唐德宗紀傳記臣無富於君都無大於國太公六韜集理天下者若身之使臂臂之使指則小大適稱不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也陸宣公文子楚人賣珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠韓非子田鳩曰昔者秦伯嫁女於晉公子為之飾裝媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣未可謂善嫁女也同上互入區處失當史晉甸侯也而建國本既弱矣其能久乎左威二年末大必折尾大不掉左昭十二年以利相傾千里游敖冠蓋相望乘堅策肥履絲曳縞此商人所以兼并農人所以流亡者也通監漢文紀支大於幹脛大於股不折必披西漢灌夫傳如下有泰山之安則上有纍卵之危西漢劉向傳唐魏元忠曰言文者則以詞華為首而不及經綸言武者則以騎習為先而不知方略通監唐紀傳記脛大於股者難以步指大於臂者難以把本小末大不能相使也說苑君道篇集母瘦雛漸肥白樂天子今盆水在庭清之終日未能見目睫濁之不用一撓而不能察方圓人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎淮南子俶真訓夫樹本灌以潦水疇以肥壤千人養之一人拔之則必無餘孽淮南子史凡事易壞而難成史曆書蒯徹曰功者難成而易敗通監高紀以衆賢舉而用以一人毀而棄積年任而信一朝疑而斥唐書魏證傳百年勞之一日失之西漢胸奴傳十譽之未信一毀之可疑唐書趙璟傳百年纍之一朝毀之東漢竇融傳五薦不入朝一麾乃出守宋書顏延之傳昔齊桓一矜其功而叛者九國曹操暫自驕伐而天下三分皆勤之於數十年之內而棄之於俯仰之頃豈不惜乎通監漢獻紀夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛唐書柳琪傳互入警戒傳記譬如十夫樹楊一夫拔之無得以成其大也戰國策集綴縫難成裁破易元稹集取之難梯天失之易反掌杜牧之本朝夫事不患於不成而患於易壞蓋作者未始不欲其久存而繼者常至於殆廢自古賢哲之士為其民捍患興利其遺跡往往而在使其繼者皆如始作之心則民到于今受其賜天下豈有遺利乎歐公偃虹隄記以四時之功而成之以數日之雨而壞之歐公求晴祭文善百譽而不進兮一毀終世以顛隮歐文蘇子美墓銘子其進鋭者其退速孟無故以合者則無故以離莊山木史物暴長者必夭折功卒成者必亟壞東漢朱浮傳致貴無漸失必暴東漢翟酺傳受爵非道失必疾同上夫物速成則疾亡晚就則善終朝華之草夕而零落通監晉明帝經獲罪於天無所禱也語八佾互入守正子知而使之是不仁也不知而使之是不知也孟公孫丑下史欲加之罪其無辭乎左僖十年進退罪也左不有人禍則當鬼誅通監唐紀魏元忠曰臣猶鹿耳羅織之徒欲得臣肉為羹臣安避之通監唐武后集豈不在遐遠虞羅所見尋陳子昂集不有人禍則有天刑韓文經虎兕出於柙龜玉毀於櫝中是誰之過歟語子行修而名不章友之罪也家語夫舟浮於水車轉於陸此勢之自然也木擊折軎水戾破舟不怨木石而罪巧拙者知故不載焉淮南子主術篇言木石無巧拙故不怨也史鄭棄其師春秋閔二年左傳曰鄭惡高克使帥師次于河上師潰而歸高克奔陳申子卑卑施之於名實韓子引繩墨切事情明是非其極慘礉胡革切少恩皆原於道德之意史記韓非傳論王恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為胸奴報仇也上曰首為馬邑事者恢不誅恢無以謝天下通監漢武紀是時小旱上令官求雨卜式言曰縣官當食租衣稅而已今弘羊令吏坐市列肆販物求利烹弘羊天乃雨同上時以浮虛相扇儒雅日朁范寧謂其源始於王弼何晏二人之罪深於桀紂晉書范寧傳互入作俑桓溫過淮泗踐北境與諸寮屬登平乘樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責晉書本傳互入感歎武后見駱賓王檄曰宰相之過也人有如此才而使之流落不偶乎通監唐紀陸贄上疏以為陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死臣所謂致今日之患群臣之罪者豈徒言歟謂禍福由人不言盛衰有命人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也通監唐德宗譬猶操兵以刃人天下不委罪於兵而委罪於所操之主蓄毒以殃物天下不歸咎於蠱而歸咎於所蓄之家舊唐書裴延齡傳傳記以徵為羽非絃之罪也以甘為苦非味之罪也說苑集教盜穴墻發匱多得金玉已復不與同挈得不為盜乎杜牧之集互入誅心本朝百鍊之剛日膾千牛匣而不用非我之羞東坡集民勞吏宜羞坡詩經昭然若發矇矣記仲尼燕居子孔子見老子曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊山木史師之耳目在吾旗鼓左成二年獵追殺獸者狗也而發縱指示獸處者人也前漢蕭何傳注師古曰發縱謂解紲而放之也縱音子用反而讀者乃為蹤跡之蹤非也書本皆不為蹤字經同力王室書嗣征胥及逸勤書盤庚史譬如捕鹿晉人角之諸戎掎之左襄十四年笙磬同音惟房與杜舊唐書贊唐高祖與李密書曰所望左提右挈戮力同心執子嬰於咸陽殪商辛於牧野通監隋恭紀互入愚弄
