body:
  text: 無愧經相在爾室尚不愧于屋漏毛詩抑對越在天詩清廟君子內省不疚無惡於志記中庸子曰內省不疚夫何憂何懼書語顏淵子自友而忠矣其橫逆由是也君子曰此亦妄人也已矣孟離婁下仰不愧於天俯不怍於人孟盡心上史范武子祝史陳信於鬼神無愧辭左襄二十七年內省不疚何恤人言東漢班超傳郭子儀奪兵權朝聞命夕引道無纖芥自嫌唐書本傳互入保身崔斯立曰余不負丞而丞負余唐書本傳傳記蔡伯喈為天下作碑銘多矣未嘗不有慚色唯郭先生碑無愧耳郭子別傳集內自省而不慚楚辭思對上靈之心文選序仰不愧天俯不愧人內不愧心韓文無怍於心無愧於色柳宗元本朝唐王義方道南海舟師持酒脯請福義方酌水誓曰有如忠獲戾孝見尤四維廓氛千里安流神之聽之無作神羞是時盛夏濤霧蒸湧既祭天雲開露人壯其誠孔白六帖朝無咎言司馬溫公有言吾無過人者但平生所為未嘗有不可對人言者東坡文互入誠實性何適之不可中無愧之為安東坡文經事君有犯無隱事師無犯無隱語檀弓上瑜不掩瑕瑕不掩瑜記聘義子曰二三子以我為隱乎吾無隱乎爾語述而子郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食摶牛一下卞子有常産者有常心孟滕文公上人有常理管子史開心見誠無所隱伏東漢或問倫有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎東漢第五倫傳互入私意帝召允謂曰國書浩作不允曰太祖記前著作郎鄧彥海所撰先帝記及今記臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作帝問如東宮不允曰臣罪應滅族不敢虛妄殿下以臣侍講日久哀臣乞命耳實不敢迷亂帝謂景穆曰直哉此亦人情所難而能臨死不移且對君以實貞臣也寧失一有罪宜宥之北史高允傳互入有定力詔百官言得失常何武人馬周為條對二十餘事太宗怪曰此非臣所能家客馬周教臣言之唐書馬周傳崔祐甫作相未二百日除官八百人上嘗謂祐甫曰人或謗卿所用多涉親故何也對曰苟平生未之識何以諳其才行而用之通監唐代宗元義方言李絳私其同年上以詰絳對曰若其人果才雖在兄弟子姪之中猶將用之況同年乎避嫌而棄才是乃便身非徇公也通監唐憲宗上謂宰相曰卿輩當為朕惜官勿用之私親故李絳曰若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也苟所用非其人則朝廷自有典刑誰敢逃之同上經有靦面目詩何人斯顏厚有忸怩書五子之歌子夫泚也非為人泚中心達於面目孟滕文公上子貢聞漢陰丈人之言卑陬失色莊史子貢過原憲憲敝衣冠見子貢子貢曰豈病乎憲曰貧也非病也子貢慚終身恥其言之過也史本傳項王曰縱江東父兄憐我我何面目見之縱彼不言籍獨不愧於心乎史本記主臣文穎曰惶恐之辭也猶今言死罪漢書陳平馮唐兩傳張玄素少為刑部令史上嘗對朝臣問之玄素恥之出閣殆不能步色如死灰通監唐太宗愧顏何寄通監唐僖宗慚恨入地吳志呂蒙傳集服藥求汗或有弗獲愧情一集渙然流離嵇叔夜養生論寄顏無所蔡謨表逢人多厚顏杜工部經君子以常德行易坎卦言有物而行有恆易家人卦動靜有常剛柔斷矣易繫辭其爾典常作之師書周官政貴有常書畢命不愆不忘率由舊章詩大雅得見有常者斯可矣語述而子曰居處恭執事敬與人忠雖之夷狄不可棄也語子路子喪祭從先祖孟滕文公上遵先王之法而過者未之有也孟離婁上有恆産者有恆心同上君子道其常荀榮辱天行有常不為堯存不為桀亡應之以治則吉應之以亂則凶荀彊國天有常道地有常數君子有常體荀天道人有常理管子史天有常度地有常形君子有常行君子道其常西漢東方朔傳銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行西漢律歷志雖有倉卒未嘗疾言東漢劉寬傳金石有一定之聲晉書律歷志或問盧欽徐邈當武帝之時人以為通自涼州剌史及來京師人以為介何也欽答曰往者毛孝先崔季圭用事貴清素之士皆時變易車服以求名高而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也通監三國志上指殿屋謂侍臣曰治天下如建此屋營構既成勿數改移苟易一榱正一瓦踐履動搖必有所損若慕奇功變法度不恆其德勞撓實多通監唐太宗傳記一心可以事百君晏子春秋鸞鳳不遷甘於竹實騶虞不移食於生物太元經集動循定檢天有可察文選連珠迅風凌雨不謬晨禽之察徑陰殺節不凋寒木之心文選衣緇守白髮華守黑不為物遷是有常德陸龜蒙虱賦衆木悅芳艷松獨守其貞衆耳喜鄭衛琴亦不改聲白侍郎面色不憂喜血氣常平和同上不失信於兒童無惰容於暗室呂和叔文君子芳桂性春榮冬更繁孟東野言語舉止率有常度杜牧之外若可渾其中甚清外如可雜其中甚靜唐文粹經不恆其德或承之羞易恆卦不恆其德無所容也同上德二三動罔不凶書咸有一德士也罔極二三其德詩氓篇亡而為有虛而為盈約而為泰難乎有常矣語述而南人有言曰人而無恆不可以作巫醫語子路子苟無怕心放僻邪侈無不為巳孟梁惠王上趣舍無定謂之無常荀修身言無常信行無常真荀不苟傳記百心不可以事一君晏子春秋經夫子制義從婦凶也易恆卦反道敗德書大禹謨敗常亂俗書君陳子鴟鵂夜察豪末晝出瞑目而不見丘山莊秋水聞歌以為哭視白以為黑饗香以為臭嘗甘以為苦行非以為是列小人道其怪荀榮辱夫醉者超江津以為咫尺之溝也淮南子鄰之母死往哭之哀妻死而不泣有所劫以然也同上史天反時為災地反物為妖民反德為亂亂則妖災生故文反正為乏左宣十年經庸言之信易乾卦厥孚交如信以發志也易次有卦有孚顒若易觀卦行險而不失其信易坎卦信及豚魚易中孚卦不言而信存乎德行易繫辭人之所助者信也同上中孚信也易雜卦爾無不信朕不食言書湯誓大信不約記學記與國人交止於信記大學信近於義言可復也語學而謹而信同上上好信則民莫敢不用情語子路信則人任焉語陽貨子刑賞巳諾信乎天下荀王霸齊桓晉文楚莊吳闔閭越勾踐威動天下強殆中國無他信也同上仲尼曰夫至信也動天地感鬼神橫六合而無逆豈但履危嶮入火水而已哉列至信辟金莊或問信曰不食其言揚重黎史苟有明信澗溪沼沚之毛蘋蘩縕藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公左隱三年信國之寶也民之所庇也左僖二十五年仗莫如信左襄八年信者言之瑞也左襄九年能信不為人下左昭九年晉荀息曰使死者反生生者不愧乎其言則可謂信矣公羊傳五衛鞅變秦法令恐民不信乃立三丈之木於國都南門募民有能徙置北門者豫十金民莫敢徙復曰豫五十金有一人徙之輒豫五十金以明不欺史記吳起欲伐秦恐士卒軍人不信乃埋一車轅於市東門書有能移此轅置西門者給土田宅百畝黃金百斤有一人來移即賜之於是召募人伐秦遂克同上昔齊桓公不背曹沫之盟晉文公不貪伐原之利魏文侯不棄虞人之期秦孝公不廢徙木之賞通監周紀肥義曰死者復生生者不愧吾言已在前矣史記趙世家信如尾生與女子期於梁下女子不來水至不去抱柱而死史記蘇秦傳互入拘窒相然信死前漢張耳傳一邑一鄉不可以無信通監西晉世祖羊祜為鎮南每與吳人剋日戰而不為掩襲之計晉書陸羽與人期雨雪虎狼不避也唐書本傳衛大經口無二言同上趙鳳曰帝王心存大信固不必刻之金石也通監後唐明宗傳記吳起與故人期食不至起終日不食來乃食白氏帖踐言諾責同上魏文侯與虞人期獵其日飲酒樂天雨文侯曰雖樂豈可無一會期哉戰國策集共秉延州信無慚仲路諾文選互入不輕然諾然諾之信重於布言同上豚魚不爽文選碑海嶽尚可傾吐諾終不移李太白玉無改行金不如諾李義山文經大無信也詩蝃蝀威王失信諸侯背叛詩兔置君子屢盟亂是用長詩巧言苟無忠信誠愨之心以涖之雖固結之民其不解乎記檀弓子曰人而無信不知其可也大車無輗小車無軏其何以行之哉語為政自古皆有死民無信不立語顏淵史君子曰苟信不繼盟無益也詩云君子屢盟亂是用長無信也左威十一年巳則無信而殺人以逞不亦難乎左襄四年小所以事大信也小國無信兵亂日至亡無日矣左襄八年晉楚將盟楚衷甲子木曰晉楚無信久矣苟得志焉用信太宰曰令尹將死矣求逞志而棄信左襄二十七年若可尋也亦可寒也左哀十二年是食言多矣能無肥乎左哀二十五年晉楚無信我安得有信左不實其言同上
