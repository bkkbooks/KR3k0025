body:
  text: 慣習經習與性成書太甲上世祿之家鮮克由禮書畢命位不期驕祿不期侈書周官子居移氣養移體孟子盡心上嬰兒生無名師而能言與能言者處也莊子外物篇越人安越楚人安楚荀子蓼蟲在蓼則生在芥則死非蓼仁而芥賊也本不可失文子九疑之南陸事寡而水事衆於是民人被髮文身以像鱗蟲短綣不褲以便涉遊短袂攘卷以便剌舟因之也鴈門之北狄不穀食賤長貴壯俗上氣力人不弛弓馬不解勒便之也淮南子訓道篇史譬如田獵射御貫則能獲禽左襄三十一少而習焉其心安焉不見異物而遷焉國齊語習貫如自然西漢賈誼傳吳地以船為家以魚為食五行志胡越之人生而同聲嗜欲不異及其長而成俗纍數譯而不能相通者有雖死而不相為者則教習然也習與智長故切而不愧化與心成故中道若性並賈誼傳秦使趙高傳胡亥而教之獄所習者非斬劓人則夷人之三族也胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也通監漢文紀傳記戎人生乎戎而戎言楚人生乎楚而楚言不知其所受也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言也呂氏春秋互見積漸集蓼蟲不知徙乎葵菜楚辭蓼蟲忘辛左太沖魏賦蓼蟲避葵堇習苦良可哀鮑昭放歌行食辛寧避蓼元稹集鮑肆不知其臭臭一作臭玩其所以先入張平子東京賦生長太平日不知太平歡韋應物本朝寖久之俗益薄惡而可嗟習慣為常遂安恬而不怪歐文冰蠶不知寒火鼠不知暑坡詩醉中不以鼻飲夢中不以趾捉天機之所合不強而自記也東坡書李伯時山莊圖後嘗食芻豢者難以食菜嘗衣錦者難以衣布為其大者不屑為其小此天下之通患也東坡集食蘗不知苦山谷詩凡人之情於憂樂之事初遇之則其心變焉次遇之則其心微變三遇之則其心如常矣元城語録經衡門誘僖公也詩夫子循循然善誘人互鄉難與言童子見門人惑子曰與其進也譬如平地雖覆一簣進吾往也並論語子單門後進必加善誘選集序講評孜孜以磨諸生使皆醉義忘歸韓文開以昏蒙示以階漸甘或可和白或可染李義山集傳記香餌之下必有懸魚重賞之下必有死夫七略經賁者飾也物相合則須飾以修外也易序卦若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘書梓材東里子産潤色之論語憲問男女非有行媒不相知名記曲禮上互見避嫌類事兩君者不容荀勸學史父子之間人所難言也前漢車千秋傳楊忠曰兩姑之間難為婦通鑑陳紀經投我以木瓜報之以瓊琚匪報也永以為好也詩木瓜投我以桃報之以李詩抑無言不讎無德不報詩其次務施報禮尚往來往而不來非禮也來而不往亦非禮也記曲禮上子出乎爾者反乎爾者也孟子曰愛人者人恆愛之敬人者人恆敬之孟子互見影響相應以富貴而下人何人不尊以富貴而愛人何人不親家語互見影響相應昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫耘而滅裂之則其實亦滅裂而報豫莊子則陽有陰德者必有陽報有隱行者必有昭名淮南子有而不施窮無與也荀子法行史富辰曰報者倦矣施者未厭左傳僖二十四李陵素與士大夫絶甘分少能得人之死力西漢司馬遷傳蓋寬饒為衛司馬躬案士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚恩及歲終交代衛卒數千人皆叩頭自請願復更留一年以報寬饒厚德西漢本傳陳蕃出為豫章太守性方峻不接賓客徵為尚書令送者不出郭門後漢書掩人者人亦掩之陵人者人亦陵之魏士昶傳傳記豫讓曰范中行衆人遇我我以衆人報之智伯國士遇我我以國士報之戰國策集恨無隨侯珠以酬荊文璧選盧子諒詩人微惠重答施何階陳子昂明珠青玉不足報贈子相好無時衰韓文拔人於死者必捨生而報恩榮人於辱者必居節而雪恥張説之舉人表本朝人情貴往還不報生禍根東坡被以卵翼之恩壯其鷹犬之效蘇子由經可以託六尺之孤語子有託其妻子於其友而之楚遊者孟子史初晉獻公使荀息傳奚齊公疾召之曰以是藐諸孤辱在大夫息曰臣竭其股肱之力不濟則以死繼之左僖九穆嬴日抱太子以啼于朝頓首於宣子曰先君奉此子也而屬諸子曰此子才也吾受子之賜不才吾唯子之怨今君雖終言猶在耳左文七子胥使齊托其子於鮑氏史記越世家樓護有故人呂公無子歸護託身護與呂公妻及呂嫗同食護妻子頗厭呂公護聞之流涕責子曰呂公以窮老付託於我義所當奉遂養呂公終身漢書互入高誼薛宣字貢君為不其丞琅琊太守趙貢見宣悅其能還至府舍令妻相見戒曰貢君至丞相我子亦中丞相史西漢本傳丙吉聞史良娣有母貞君及兄恭乃載皇曾孫以付之通監漢宣帝紀宣紀傅燮謂其子曰主簿楊會吾之程嬰也東漢本傳初李固既策罷知不免禍乃遣三子基茲燮皆歸鄉里時燮年十三姊文姬為同郡趙伯英妻見二兄歸具知事本默然獨悲曰李氏滅矣密與二兄謀豫藏匿燮託言還京師有頃難作州郡壯基茲皆死獄中文姬乃告父門生王成曰今委君以六尺之孤李氏存滅其在君矣成乃將燮乘江東下入徐州界變姓名為酒家傭而成賣卜於市各為異人陰相往來積十餘年通監漢桓紀晉謝混尚晉陵公主混死詔公主與謝氏絶婚公主悉以混家事委混從子弘微弘微為之紀理生業一錢尺布有文簿九年而高祖即位公主降號東鄉君聽還謝氏之門室宇倉廩不異平日田疇墾闢有加於舊通監晉太祖太后與劉仁軌書曰昔漢以關中之事委蕭何今託公亦猶是矣仁軌上疏辭以衰老不堪居守因陳呂后禍敗之事以規戒太后通監唐武后王敦之舉兵也劉隗勸帝盡除諸王司空導呼周顗曰伯仁以百口纍卿晉書本傳嵇康臨刑謂子曰山公在汝不孤晉書高孝基見杜如晦謂曰君必任棟梁以子孫託之通監李績疾謂弟弼曰我見房元齡杜如晦高季輔皆辛苦立門戶亦望貽後悉為不肖子敗之我子孫今以付汝汝可謹察有不厲言行交非類者急榜殺以聞勿令後人笑吾猶吾笑房杜也新唐書本傳太宗謂太子曰無忌遂良在國家之事汝無憂矣唐書績之功見於黎陽故太宗拳拳於託孤唐書李績贊王勮蘇味道未知名裴行儉謂之曰僕有弱息願以為託通監傳記甘茂逢蘇代曰茂之妻子在秦願君以餘光振之代許諾春秋後語晉大夫伯宗妻曰子之性不可易國家危可立待伯宗乃得畢羊而友之及欒不忌之難三郤害伯宗簡讚之畢羊乃送州犁于荊遂得免焉列女傳集遍告諸友以寄厥子不鄙謂余亦託以死韓作柳祭文昌黎先生以疾免書喻湜曰死能全我躬所以不隨世磨滅者惟子以為囑韓愈墓志經表裏山河必無害也左傳僖二十八史漢武以汲黯為淮陽太守曰徒得君重臥而治之前漢本傳詔裴度節度河東度辭老疾帝曰為朕臥護北門可也唐書本傳集惟鄆也截然中居四鄰望之若防之止水恃以無恐韓文徒得君重剛吾四支劉賓客經蔦與女蘿施于松柏詩頍辨南有樛木葛藟纍之詩樛木南有樛木甘瓠纍之南有嘉魚史田蚡以肺附為相本傳注如肺肝之相附著也攀龍附鳳並乘天衢西漢序贊皇甫規自以西州豪傑恥不得與自上書附黨通監東漢互見好名女蘿弱不能立必附它木唐李德裕傳集蚊虻終日經營不能越階序附驥尾則涉千里攀鴻翮則翔四海選四子講德論託微莖於樛木選潘安仁寡婦賦遠近乘風一朝景附攀日月之末光繼螢爝之微照陳子昂兔絲附蓬麻杜詩願連光於咳唾之餘元微之集子泄柳申詳無人乎繆公之側則不能安其身孟公孫丑下史周之東遷晉鄭焉依左隱六輔車相依左傳晉吾宗也豈害我哉左傳依日月之末光前漢蕭何傳曾孫因依倚廣漢兄弟及祖母家史氏通監漢宣紀攀龍鱗附鳳翼以成其所志耳通監東漢光武紀倚以為北道主人東漢彭寵傳如鳥有翼如魚有水失之則死不可暫無通監唐紀集願為雙飛燕銜泥巢君屋古詩龍無雲雨不能參天論衡寄松為女蘿依水如浮萍曹植詩依水類浮萍寄松如懸蘿潘安仁河陽詩塵附太山文選鼠憑社貴選恩幸傳自慚青蒿倚長松韓文一身相倚千里徒步劉長卿一榻偶依陳太守羅隱集衆星傳月之光也因其波瀾唐文粹不逢高枝引未得凌空上何處堪托身為君長萬丈文粹史先軫曰效尤禍也左傳尤而效之其又甚焉同上原伯曰鄭伯效尤其亦將有咎左莊二十一衛公叔文子曰尤人而效之非禮也左定六集效痛嚬眉元稹集
