body:
  text: 自薦子今大冶鑄金金踴躍曰我且必為鏌鋣莊子史毛遂曰使遂早得處囊中則穎脫而出非特其末見而已史平原君傳東方朔上書曰臣朔少失父母長養兄嫂年十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陳之具鉦鼓之教亦誦二十二萬言臣朔年二十二長九尺三寸目若懸珠齒若編具勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣前漢東方朔傳猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄前漢董彼舒傳先零反趙充國年七十餘上問誰可將充國曰亡踰於老臣本傳搦朽摩鈍鉛刀皆能一斷班固敘傳僕雖罷駑亦嘗側聞長者遺風耳司馬遷傳並西漢青骸繁霜縶於籠中何以效其撮東郭於韝下也白猿女豹藏於櫺檻何以知其接垂條於千仞也晉書張載傳和璧之在荊山隋珠之潛重川非遇其人焉有連城之價照車之名乎同上晉譙王永曰公未見知耳鉛刀豈無一割通監晉紀使受天澤餘潤雖朽枿敗腐不能生殖猶足蒸出芝菌以為瑞物唐書柳宗元傳衣不蓋體常寄食於人切恐轉死溝壑伏惟天子哀矜之令執先臣故事拔泥塗之久辱則臣之述作雖不足鼓吹六經至沈鬱頓挫隨時敏給楊雄枚皋可企及也有臣如此陛下其忍棄之唐杜甫傳元淡謂狄仁傑曰下之事上譬富家儲蓄以自資也脯臘以供滋味參木以防疾疢門下充百味者多矣願以小人備一藥石可乎唐書本傳集羞庖人之獨割引尸祝以自助絶交論高鳥未挂於輕繳淵魚未懸於鉤餌者恐釣射之術或未盡也昔賈誼弱冠求試屬國請繫單于之頸而制其命終軍以妙年使越欲得長纓纓其王羈致北闕切不自量志在效命庶立毛髮之功以報所受之恩效錐刀之用使得西屬大將軍當一校之隊東屬大司馬統偏師之任必乘危躡險騁舟奮驪突刃觸鋒為士卒先雖未能擒權馘亮庶虜其雄率殲其醜類必效須臾之捷以滅終身之愧雖身分蜀境首懸吳闕猶生之年也如微才不試沒世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重祿禽息鳥視終於白首此徒圈牢之養物非臣之所志也選曹植來自試表冀以塵露微誠補益山海螢燭未光增輝日月同上收孟明於三敗責曹沫於一舉俾折臂臏腳之倫得自拂飾以期效命於鞭策之下柳文奮短翮於槍榆希高標之餘拂濯鮮鱗於涓滴望鴻浪之微沾所冀顧盻曲流剪拂增價則鉛刀起一割之用跛鱉致千里之行駱賓王互見求援儻能分其斗水濟濡沫之枯鱗惠以餘光照孀棲之寒女使得伏櫪駑蹇希騏驥而蹀足竄迹翩翾排鴛鸞而刷羽同上魯澤祥麟希委質於宣父吳坂逸驥實長鳴於孫陽所貴在乎見知所屈伸乎知己同上在公之宇下非一日是生于匠石之園長於伯樂之廄者也於是而不得知假有見者千萬人亦何足云耳韓愈為人求薦書籍善為詩使其心不以憂衣食亂閣下無事時一致之座側使跪進其所有閣下憑几而聽之未必不如聽吹竹彈絲敲金擊石也韓愈代張籍與李中丞書大溝中之木與犧象同體追琢不至坐成枯薪朱而藍之猶足以為器苟液瞞曲戾不足枉斧斤願為庭燎以照嘉客劉賓客幸堪調鼎用願君垂採摘王維集鐵衣雖正澀寶刃猶可試儻遇拂拭恩應知轉犀利劉長卿連城之珍俟楚文而乃進崩山之操待鐘期而後發唐文粹本朝敝車無用猶可具於勞薪棄席未忘或再施於華屋臨川集枯朽猶能出菌芝東坡詩子薛談學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲談乃謝求反終身不敢言歸列子湯問篇互見小器易足史項王曰縱江東父兄憐而王我何面目見之縱彼不言籍獨不愧於心乎史記本紀互見自責李廣曰吾為隴西守羌嘗反誘降者八百餘人詐而同日殺之至今恨獨此耳西漢本傳負之無可言者後漢張步傳褚裒伐後趙敗還至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慚憤發疾卒晉穆紀王導曰吾雖不殺伯仁伯仁由我而死幽冥之中負此良友晉書周顗傳互見知悔門狄仁傑曰婁公盛德我為所容乃知吾不逮遠矣唐書婁師德傳王叔文敗韋執誼亦自失形勢知禍且至雖尚為相常不自得奄奄無氣聞人行聲輒皇悸失色通監唐順宗紀集愧汗如漿駱賓王互見陳情門內省慚惶若墜冰谷劉賓客汗赩含羞恥杜牧之史張儀嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盜相君之璧共執張儀掠笞數百不服釋之其妻曰子母讀書遊説安得此辱乎張儀謂其妻曰視吾舌尚在不其妻笑曰在也儀曰足矣史記本傳東方朔曰使張儀蘇秦與僕並生於今之世曾不能掌故安敢望常侍郎乎時朔已為殿中郎出史記本傳苟有良田何憂晚歲北史楊侃傳互見預備韓愈才高數黜官作進學解以自喻唐書本傳季子來歸魯人喜其紓難通監漢安帝紀上曰隋煬帝勞民築長城以備突厥卒無所益朕惟置李世績於晉陽而邊塵不驚其為長城又豈不壯哉通監唐太宗紀蘇源明曰吾不幸生衰俗所不恥者識元紫芝也唐書郭子儀嘗奏除州縣一人不報潦佐相謂曰以令公勳德奏一屬吏而不從何宰相之不知體子儀聞之謂僚佐曰自兵興以來方鎮武臣多跋扈凡有所求朝廷常委曲從之此無他乃疑之也今子儀所奏事人主以為不可行而置之是不以武臣相待而親厚之也諸君可賀矣又何怪焉聞者皆服通監唐代宗裴皞書一絶曰宦塗最重是文衡天與愚夫立盛名三主禮闈今八十門生門下見門生五代史集位貶道行身窮志逸文選齒落未是無心人舌有只作窮途哭杜詩新歸且慰意生理焉足説生還對童稚似欲忘飢渴大哉乾坤內吾道長悠悠自古有羈旅我何苦哀傷眼前無俗物多病也身輕家書抵萬金此生免荷殳莫思身外無窮事且盡生前有限杯親朋滿天地脫身簿尉中始與菙楚辭憶獻三賦蓬萊宮自怪一日聲輝赫並杜詩歲稔貧心泰劉賓客遊人莫笑白頭醉老醉花間有幾人同上比者分將委棄泥塗老死草野今胸中之氣勃然復有仕進之路矣韓文壯志已憐成白骨餘生猶待發青春同上眼中了了見鄉國知有歸日眉方開同上乍拋衫笏覺身輕姚少監朝來始向花前覺度卻醒時一半愁元微之我愛狷介性立為頑拙身平生雖寡合今即無緇磷白侍郎昨因風發甘長往今遇陽和又小康還似遠行裝束了遲回且住又何妨我是人間事了人老耳未多聾薺花榆莢深村裏亦道春風為我來婚嫁纍輕何怕老飢寒心慣不憂貧酒引眼前興詩留身後名自此光陰為已有從前日月屬官家互見間適門骨肉團欒亦可榮已為海內有名客又占世間長命人書訊朝賢斷知音野老多世間富貴應無分身後文章合有名擢第未為貴賀親方可榮並白侍郎詩間人似我世間無杜牧之老為樊上翁既不自期富貴要有數百首文章顧樊川一禽魚一草木無限矣庶千百年未隨此磨滅耶同上他人似我還應少如此安貧亦荷天杜荀鶴本朝花與新奇如有意臨川何必濯於水本無纓上塵歐公集世上升沈無恨事樽前強健不資身欒城集尚有讀書清淨業未容春睡敵千鐘東坡集因病得間殊不惡安心是藥更無方同上但把窮愁博長健退伏田野自稱老臣追敘始終之遭運以詫鄉鄰之父老如醉而醒如瘖而鳴如痿而起初還故鄉初見父兄無官一身輕有子萬事足並同上平生不作皺眉事天下應無切齒人邵堯夫詩孫奭致仕於鄆置宴語客曰白傳有言多少朱門鎖空宅主人到了不曾歸今老夫歸矣喜動于色繩水燕談滿院花開不似貧雲溪友議歲祿二千親八十世間誰有此時榮陳後山詩收身薄冰釋置枕泰山安山谷詩史欲改過自新西漢刑法志灑心自新東漢平帝紀洗心向善後郭泰傳失旦之雞復思一鳴三國志諸葛瑾云竺景秀曰若許自新必吞刀割腸飲灰洗胃南史齊書荀伯玉傳集君其務貰過我亦請改事韓文經母氏聖善我無令人有子七人母氏勞苦有子七人莫慰母心毛詩凱風靜言思之躬自悼矣詩氓篇史宣子曰吾淺之為丈夫也左襄十九年趙孟曰我實不德而以隸人之垣以贏諸侯是吾罪也使謝不敏襄三十一年晉悼夫人食輿人之城杞者絳縣人年長矣與於食趙孟問縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才襄三十年擢賈之髮以讀賈之罪尚未足史記范睢傳縱彼不言籍獨不愧於心乎前漢項籍傳互見自愧門妻子有過輒免冠自責東漢仇覽傳罪積山河亶深莫磨劉越石傳寧人負我我無負人通監唐德宗紀互見長厚門集灰琯屢移塵露無補劉賓客本朝茫如醉夢之中不知言語之出東坡謫黃州表細思所以得禍患者皆由名過其實造物者所不能堪與無功而受千鍾者其罪均也閉門卻掃收召魂魄方尚口乃窮之時蓋擢髮莫數其罪並東坡集長箭挽不盡不中無尤弓欒城集
