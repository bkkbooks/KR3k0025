body:
  text: 福祉經受茲介福易如山如阜如岡如陵如川之方至以莫不增如月之恆如日之升如南山之壽不騫不崩如松柏之茂無不爾或承詩天保福祿申之福祿膍之萬福攸同小雅采菽俾爾戩穀罄無不宜受天百祿降爾遐福維日不足天保降福穰穰降福簡簡執競天錫公純嘏閟宮福祿如茨瞻彼洛矣受福無疆假樂以介景福錫茲介福並詩永膺多福書九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命洪範襲于休祥泰誓中膺受多福君陳福者備也備者百順之名也禮記承天之祜禮運史唯厚德者能受多福晉國語互見怨恨重厚受天豐福國語中外禔福前司馬相如傳函蒙福祉禮樂志休嘉砰隱同上砰普耕反盛意婁師德專綜邊任三十餘年當危亂之時族滅者相繼師德出將入相能以功名終始識者多之唐本傳富貴壽考哀榮終始郭子儀傳張萬福始終祿食七十年未嘗一日言病本傳傳記崔琳三十年間無中外緦麻之喪明皇雜録集景福盼蠁而興作選左思蜀都賦五臣呂向注曰景大也盼蠁濕生蟲蚊類大福之具有如此蟲群飛而多也興作皆起也家膺五福堂享三壽陳子昂真是超然五湖客未知終始郭汾陽杜牧之五福叢滋文粹本朝方公之輝華顯赫之時而其親享壽考康寧之福夫得祿及親人以為幸也而公以榮名顯仕為之養綵衣而戲者人以為孝也而公以金章紫綬悅其顏使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也歐公集蒙休承福外內用寧臨川且綏福履同上信順為助蓋大有上吉之祥高明令終真既醉太平之福東坡集弼亮四世如畢公壽考百年如衛武東坡賀范端明啓年高福祚多欒城子福輕乎羽莫之知載莊子史武帝自為太子時聞枚乘名及即位乘年老乃以安車蒲輪徵乘道死西漢本傳齊廣寧王孝珩歎曰自神武皇帝以外一作來吾諸父兄弟無一人至四十者命也通監陳紀文惠太子惡西昌侯鸞嘗曰我意中殊不喜此人當由其福薄故也齊武帝紀王維私邀孟浩然入內署俄而元宗至浩然匿床下維以實對帝曰朕聞其人而未見也詔浩然出帝問其詩浩然自誦所為至不才明主棄之句帝曰卿不求仕而朕未嘗棄卿奈何誣我因放還唐孟浩然傳薄命之人不足與成功名李靖傳集自古聖賢多薄命杜詩吾憐孟浩然短褐即長夜同上常三娶而卒無主婦庭無倚廬堂無抱孤柳文詞人命薄多無位白樂天因知早貴多才子不得多時在世間同上世間尤物不長生劉賓客道甚長而命窄同上上嘗三欲命李白官卒為宮中所捍而止李翰林別集序本朝范文正公守鄱陽有書生自言寒餓時盛行歐陽率更字薦福碑墨本直千錢文正為打千本求售于京師紙墨已具一夕雷擊碎其碑類説一夕雷轟薦福碑東坡作窮措大詩經四體既正膚革充盈人之肥也禮記耳目聰明血氣和平樂記心廣體胖同上身其康強書洪範五福三曰康寧同上史百體堅強手足便利史記強一作剛經無妄之疾勿藥有喜易無妄卦有負薪之憂記曲禮下曾子寢疾病注病謂疾困曾元曰夫子之病革矣注革急也檀弓篇子有采薪之憂孟子滿奮畏風在晉武帝坐北窗有琉璃屏實密似踈奮有難色帝笑之奮曰臣猶吳牛見月而喘郭子史河魚腹疾左宣十二秦醫和曰天有六氣淫生六疾過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生內熱惑蠱之疾昭元晉侯求醫於秦秦使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志同上心之精爽是謂魂魄魂魄去之何以能久昭二十五晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也成十互見力所不及素有負薪之疾史記公孫洪上書不幸罹霜露之疾公孫洪傳扁鵲曰疾之居腠理也湯尉之所及也在血脈針石之所及也在腸胃酒醪之所及也在骨髓雖司命無奈之何本傳狗馬之疾前嚴助傳眚病馮昭儀傳滿身青也未嘗請疾三王傳請問也膠西王陰痿一近婦人病數日同上必為錮疾賈誼傳身有內疾吳王𠏿傳許商被病殘人杜固傳商一作裔病力伋黯傳力謂甚也相如善著書常有消渴病司馬相如傳疾稍侵史册傳謁泰山而請命後漢許峻傳命懸呼吸魏志注漢上羸殘號半人晉書習鑿齒傳殷仲堪患耳聞床下蟻動謂是牛鬭本傳晉衛玠好言玄理其後多病體羸毋常禁其語本傳互入博愛老病百日數旬革帶常應移孔南沈約傳集邪氣襲余之形體兮疾病憯怛而萌生聞玉體不安文選七啓解衣一臥肢體不復相關沈約與徐勉書風毒敗形陰沴遷魄禍氣侵骨淫神化脈體側筋倦榮乖衛逆柳斬曲几文常恐遊岱宗不復見故人劉楨詩婢能尋本草犬不吠醫人白樂天襄疾多時似瘦仙同上病體得秋輕劉賓客脹腹堪成鼓羸形漸比柴耳鳴疑暮角眼暗助昏霾元微之多病所須惟藥物杜詩本朝兩脛惟骨拜履俱艱雙瞳雖存黑白才辨歐公集弱脛零丁惟存骨立昏瞳眊瞀常若冥行中痟渴涸注若漏卮弱脛零丁兀如稿木並同上病骸今似沈休文臨川負薪無力病浸淫同上眼暈見花真是病耳虛聞蟻定非聰坡詩經秉國之均變小雅節南山詩三命赤韍蔥衡記玉藻三命不齒祭義子夫子當路於齊孟子紆朱懷金楊子三命族人雖七十不敢先荀大略史服冕乘軒左傳周公拜乎前魯公拜乎後公羊傳武安之貴在日月之際史魏其等傳論貴振天下孝武紀王氏一姓乘朱輪華轂者二十三人青紫蟬貂充盈幄內前劉向傳印何纍纍綬若若耶石顯傳石奮及四子皆二千石人臣尊寵舉集其門號為萬石君本傳互入家世戴金貂之飾谷永傳歷金門上玉堂楊雄傳近臣簪筆以待顧問張安世傳注登文石之陛涉赤墀之塗梅福傳當軸處中車千秋傳司馬安四至九卿昆弟同時至二千石十人汲黯傳楊惲丞相敞子家隆盛乘朱輪者十人本傳武帝賜嚴助書曰君厭承明之廬勞侍從之事本傳嚴延年兄弟五人皆至大官東海號曰萬石嚴嫗本傳嫗其母也平帝以孔光為太師賜靈壽杖入省中用杖本傳竇氏一公兩侯三公主四二千石相與並時官府邸第相望於功臣中莫與為比後竇融傳貴寵最盛與九卿絶席馬防傳每朝會與三公絶席梁冀傳趍走日月之側孟嘗傳朝夕論思日月獻納陪扈清蹕張衡傳耿況病兄弟六人皆垂青紫省侍當代以為榮耿弇傳重侯纍將建天樞執斗柄崔駰傳梁冀一門前後七侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人通監後漢桓帝紀會稽內史周札一門五侯宗族強盛吳士莫與為比晉明紀八座尚書則荷紫以生紫為祫囊綴之服外加於左肩輿服志位班三事邑啓萬家通監梁高祖紀鳴玉在腰回豐貂以步文昌聳高蟬而趍武帳南史何敬容傳持橐簪筆同上劉杳傳漢尚書郎口含雞舌香以其奏事答對欲使其氣息芬芳也宋百官志溫彥慱為中書侍郎兄大雅時為黃門侍郎與彥博對居近密時人榮之唐高祖紀互入兄弟上命圖畫功臣於凌煙閣太宗紀蘇瓌為同中書三品蘇頲拜中書舍人父子同在禁管朝廷榮之本傳校中書令考二十四八子七壻皆貴顯朝廷郭子儀傳張嘉祐嘉正每上朝軒蓋趍導盈閭巷時號所居坊曰鳴珂里本傳接武夔龍簉羽鵷鷺上官儀傳唐時凡拜相禮絶班行自子城東至府第載沙填路名曰沙堤或百僚問疾有司設幕次排班元日冬至立仗百官皆備燭炬謂之火城宰相將至火城皆撲滅以避國史補傳記尚書郎入直臺中官供新青縑白綾被或錦被晝夜更宿幃帳晝通中枕尚書臥旃蓐冬夏隨時改易太官供食五日一美食下天子一等尚書郎伯使一人女使二人皆選端正者伯使從至上東門還女侍史挈被服執香爐燻護衣漢官儀士之貴權不過尚書漢官解説黃金橫帶而馳戰國策身帶三綬寵貴至盛東觀漢記李藩未第有僧告曰公是紗籠中人藩問其故曰凡宰相冥司必立其像以紗籠護之後果至台輔兩京雜記將相列金榜同上集六印磊落駢組流離蔡雍釋誨出入金華之殿升降承明之闕江淹詣建平王上書紅藥當階翻文選謝元暉直中書省詩戴蟬珥貂曹植詩同上入侍帷幄出擁華蓋同上金張服貂冕許史乘華軒左記室詩朱輪華轂擁旄萬里丘希範書結綬金馬之庭高議雲臺之上選書飛翠緌拖鳴玉以出入禁門西征賦紆青拖紫楊雄解嘲排朱門入紫闥魯褒錢神論賓御紛颯沓鞍馬光照地鮑昭詩三入承明廬車服一何煥應璩詩注云璩初為侍郎又為常侍又為侍中故云三入職近日月王肅論祕書表天顏有喜近臣知杜詩朝罷香煙攜滿袖侍臣緩步歸青瑣退食從容出每遲聽履上星辰光輝仗鉞雄榮光懸日月雲霄今已逼人生五馬貴翰林逼雲蓋高名入竹帛新渥照乾坤並杜詩天與三台座人當萬里城張九齡文宿昔三台踐榮華駟馬歸印從青瑣拜翰入紫宸揮同上四面諸侯瞻節制劉賓客佩玉鳴環交響庭戶同上護衣直夜南宮靜焚草清時左掖深權載之集王人織路傳清問風生鞍馬疾日出旌旗鮮便蕃清近烜赫光大並同上雙旌擁萬戟中有霍嫖姚韋應物絳闕銀河曙東風右掖春官隨名共美花與思俱新綺陌朝遊間綾衾夜直頻橫門開日月高閣切星辰韓文利澤施于人名聲昭于時坐于廟堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑爵勳逮僮隸互見僕從其後閣下位益尊伺候於門墻者日益進夫位益尊則賤者日隔伺候於門墻者日益進則愛慱而情不專與陳京紿事書並韓文羅曲旃於堂下列長戟於門前楊盈川司言鳳綍揮汗龍池陳子昂遊鳳凰之池觀蓬萊之閣天下之榮踐也同上密侍樞機草偷瞻咫尺顏恩垂天詔近對久漏聲間元微之兵衛森畫戟燕寢凝清香韋應物集金貂傳幾葉同上一身自樂何足言九族為榮真可羡權載之徑直隨臺柏芳香動省蘭劉長卿肅穆烏臺上雍容粉署中同上金帶縋腰衫委地白樂天官曹清切非人境風日鮮明似洞天傳呼鞭索索拜舞佩鏘鏘春風侍女護朝衣介然風規有光近侍並同上劍佩身隨玉墀步衣冠身惹御爐香王維集軒冕三紀姚崇銘橫據要津杜牧之彤弓隨武庫金印逐文房同上太守負弩前驅守丞引章下拜王建承恩不許離床謝密詔長教侍案書同上繞身垂印綬姚合詩左貂右蟬榮冠東省王無功出身侍丹墀舉翮凌青冥高達夫青雲生羽翼畫省比神仙委佩雲霄裏含香日月前儲光義朝升玉署朝天紀夕憩金闈奉帝綸王勃詩直登宣室螭頭上橫度甘泉豹尾中李義山趍其庭有魏絳之金石焉候其門有亞夫之棨戟焉柳文及親之貴自古罕兼老萊則空耀綵衣多慚紱冕潘嶽則惟稱壽酒固乏鼎彝豈同大國進封高堂拜慶司空表聖荷筆入文昌駱賓王吟處美人擎筆硯行時飛鳥避旌旃方雄飛玉樹滿庭家轉貴雲衢獨步位初高錢起贊書辰告節印照路權德輿詩宮漏夜催封事草爐煙曉侍入朝衣鄭概聯句本朝文潞公逮事四朝荐更二府七換節鉞位將相五十餘年遍歷公孤兩以太師致仕三朝言行録錦衣晝歸閭里驚歐公集歸來解帶西風冷衣袖猶沾玉案香金門玉堂早接雋遊之末紫樞黃閣晚陪國論之餘並同上榮附中天日月光臨川衡紞紘綖備三公服飾之盛囊兜戟纛兼大將威儀之多同上上尊日日開黃封賜茗時時烹小鳳坡詩紫府侍臣鳴玉烏臺御史生風山谷班近聞香早人間風月不到處天上玉堂森寶書衣拂御爐香職親黃屋傍堯軒殿上給扶鳴漢履螭頭簪筆見秦冠並同上笙歌聲裏旌旗動羅綺叢中語笑香後山袖中諫草朝天去頭上宮花侍宴歸歸田録太宗尤重內外制之任嘗曰朕聞朝廷命一舍人六姻相賀諺以謂一佛出世豈容易哉又曰學士之職清切貴重朕嘗恨不得為之楊億談苑陳彭年在翰林兼十餘職皆文翰清祕之目人謂其署御為一條冰聖宋掇遺
