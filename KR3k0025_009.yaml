body:
  text: 世路嶮巇集荊棘聚而成林楚辭世路嶮巇太行孟門豈云嶄絕劉孝標世議迫阨不容其高陳子昂集雲海方蕩潏孤鱗安得寧陳子昂集互入紛擾世路如秋風相逢盡蕭索世路有屈曲李太白集世梗悲路澀杜詩世路知交薄時危人事急風逆羽毛傷浮生有蕩汨吾道正羈束人寰難容身石壁滑側足雲雷屯不已艱險路更跼普天無川梁欲濟願水縮舉頭向蒼天安得騎鴻鵠並同上盈盈一尺水浩浩千丈波白樂天時晴變寒暑世利等錙銖若比世路難猶自平於掌同上初入太行詩世塗昏險擬步如漆柳文世路山河險君門煙霧深劉賓客官途似風水白傳可怜百鳥紛縱橫雖有深林何處宿韋應物集古心雖自鞭世路終難拗韓文本朝線路不容足東坡詩要路風波無限惡欒城集平地生崎嶇山谷集經彼何人斯其心孔艱詩何人斯人藏其心不可測度也記禮運今吾於人也聽其言而觀其行語雍也與其進也不與其退也與其潔也不保其往也語述而子喜則交頸相靡怒則分背相踶大計反莊子孔子曰人心險於山川難於知天天亦有春秋冬夏旦暮之期人者厚貌深情莊子互入傾險使信士分財不如探籌使廉士守財不如閉戶文子史史佚曰非我族類其心必異左成四子晢曰我好見之不知其有異志也左傳互入失望子產曰人心不同如其面焉吾豈敢謂子面如吾面乎左襄三十一雖有親父安知其不為虎雖有親兄安知其不為狼史韓安國傳始常山王成安君為刎頸交卒滅亡患生於多欲而人心難測也西漢蒯通傳入吾室操吾戈以伐我東漢鄚玄傳符丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變通監晉紀昔呂布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以構妖通監梁高祖惟有人心相對間咫尺之情不能料通監五代晉高祖李繁者泌之子也陽城盡疏裴延齡過惡欲密論之以繁故人子使之繕寫繁徑以告延齡先詣上一一自解疏入上以為妄不之省通監唐德宗集孰知其不合兮若竹柏之異心楚辭失意杯酒問白刃起相讎選少年行互入因小失大無曰父子無間昔有潘崇無曰至親無二或容江充王廣之保傳箴人心若波瀾它人方寸間山海幾千重輕言託朋友對面九疑峰李太白翻手為雲覆手雨紛紛輕薄何足數杜工部詩天可度地可量唯有人不可防但見丹誠赤如血誰知偽言巧似簧白樂天太行之路能摧車若比君心是坦途巫峽之水能覆舟若比君心是安流同上太行路詩理平則為鸞為鳳為鵷為鷺世變則為蛇為豕為獍為梟者十恒八九元微之集平生親友心豈得知淺深白樂天今夫平居里巷相慕悅酒食游戲相徵逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓死生不相背負一旦臨小利害僅如毛髮比反眼若不相識落陷阱不一引手救反擠之又下石焉者皆是也韓柳墓誌湜輩雖屢指教不知其果不叛去否韓愈與孟簡書小人知慮險平地生太行孟東野大海波濤淺小人方寸深海枯終見底人死不知心杜荀鶴集世情本難合對面隔山丘王建詩兒冠出門父翁不知其枉正女笄上車夫人不保其貞汙唐文粹一人千萬心唐文粹一日天無風四溟波盡息人心風不吹波浪高百尺唐于瀆詩識貌不識腸王建集長恨人心不如水等閑平地起波瀾劉賓客天下之事為脩潔者有如河間之始為妻婦者乎天下之言朋友相慕望有如河間之與其夫切密者乎河間一自敗於強暴誠服其利歸敵其夫猶盜賊仇讎不忍一視其面卒計以殺之無須臾之戚則凡以情愛相戀結者得不有邪利之猾其中耶亦足以知恩之難恃矣柳文本朝醜好隨手翻山谷詩人心百態巧且難臨危利害兩相關朝為親戚暮仇敵自古常嘆交道難歐公集當人盡賓主對面如蠻夷邵堯夫觀棋集經富人之屋烏所集也詩正月注互入趍附墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬記檀弓下子射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也荀互入處得其地目不自見荀子市井相與言則以財與利楊子十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也韓非子五蠹丘阜不能生雲雨縈水不能主魚鱉者小也淮南子互入小不足以處大甚霧之朝可以細書不可以望尋常之外淮南子禿腐之山無十丈之材同上眼能察天衢而不能周項領之間抱朴子兩目不相為視蔣子崑山之下以玉抵烏彭蠡之濱以魚食犬而人不愛者非性輕財所豐故也劉子史叔向之母曰深山大澤實生龍蛇左襄二十一如目見毫毛而不見其睫也史越世家齊魯之間於文學自古以來其天性然也史儒林傳高明之家鬼瞰其室西漢楊雄傳鄒魯守經學齊楚多辯智韓魏有奇節西漢鄒陽傳秦漢以來山東出相山西出將西漢趙充國傳萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏西漢食貨志猛虎在深山百獸震恐及其在井檻之中搖尾而求食西漢司馬遷傳服絺綌之涼者不苦盛暑之鬱燠襲狐裘之炊者不憂沍寒之悽愴西漢王褒傳互入有備鈞天廣樂必有奇麗之觀帝室皇居必蓄非常之寶東漢禰衡傳富貴生不仁沉溺致愚疾唐史臣穆宗贊河南帝城多近臣南陽帝鄉多近親東漢光武紀衣冠人物盡在中原通監梁武紀登高不懼者胥靡之人也坐不垂堂者千金之子也東漢馬融傳互入分量不同京師衣冠所聚身名所出從容附會不勤而成唐書張九齡傳水清無大魚通監漢和紀傳記楚國食貴於玉薪貴於桂爭名者於朝爭利者於市戰國策高山之巔無美木傷於多陽也大樹之下無美草傷於多陰也說苑談叢順風而呼聲不加疾而聞者眾登丘而招臂不加長而見者遠說苑建本互入處得其地與君子游苾乎如入蘭芷之室久而不聞則與之化矣與小人游貸乎如入鮑魚之次久而不聞則與之化矣是故君子慎其所去就與君子游如長日加益而不自知也與小人游如履薄冰每履而下幾何而不陷乎哉大戴曾子疾病篇高山多林必有怪虎豹藏孕焉深淵大川必有蛟龍焉大戴禮四代篇林中多疾風富貴多諛言鹽鐵論鬼谷先生曰子不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子不見嵩岱之松柏乎上枝干於青雲下根通於九泉千秋百歲不逢斧斤之患此木豈與天地有骨肉所居然也虞般祐高士傳集登高使人意遐臨深使人意清張景陽詩注互入游賞市廛所會萬商之淵左太沖蜀都賦虱處頭而黑麝食柏而香頸處險而癭齒居晉而黃嵇康養生論五陵佳氣無時無杜詩帝都名利場雞鳴無安居白樂天溫飽充於內清廉形於外南山多白雲洛陽惟紅塵闇生魑魅蠹生虫並同上貧士少顏色貴門多輕肥孟東野懷貝玉以之名都之肆未有不售者也挈而之三家之野未有不盜而困者皇甫湜枯巢無還羽在富易為容居貧難自好孟東野蓬門自古少車塵韓渥知君五陵客不樂石門遊劉賓客集青雲豈有窺梁燕濁水應無避釣魚獨樹高高風勢急平湖渺渺月明多許用晦文松柏之下無凡草鸑鷟之侶無凡禽歐陽詹文水宿知寒早愁眠覺夜長李義山文水積而深縱壑之鱗躍風積而厚垂天之翼奮呂和叔文火山無冷地濁流無清源王建集本朝居貧賤而有聞易處富貴而無過難東坡仲暹遙郡防禦使日近先知曉天低易得春邵堯夫近水樓臺先得月向陽花木易逢春翰府名談公子何自知秋陽哉生於華屋之下而生於朝廷之上出擁大蓋入侍帷幄暑至於溫寒至於涼而已東坡秋陽賦經何以聚人曰財易係辭世祿之家鮮克由禮位不期驕祿不期侈書畢命子子路曰負重涉遠不擇地而休家貧親老不擇祿而仕家語三尺之岸虛車不能登百仞之山任負車登焉陵遲故也孫卿子衰麻苴杖者志不存乎樂非耳不聞服使然也黼黻袞冕者容不褻慢非矜莊服使然也介冑執戈者無退懦之氣非體純猛服使然也家語三恕篇夫芻猛之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之莊子諺曰長袂善舞多資善賈此言多資易為工也韓子衣食足而知榮辱管子夫堯舜在上雖十桀紂而不能亂者勢治也桀紂在上雖十堯舜而不能治者勢亂也韓子饑歲之春幼弟不飽穰歲之秋疏客必食韓非子五蠹遺腹子不思其父無貌於心也淮南子說林篇夫民有餘即讓不足則爭讓則禮義生爭則暴亂起扣門求水莫不與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則爭止淮南子齊俗訓堯為匹夫不能使鄰家至為主則令行禁止慎子明月之光可以遠望而不可以細書盛霧之朝可以細書而不可以望尋常之外淮南子富不學奢而奢任子舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福尸子挈瓶丐水執雚求火而人不吝非性好施有餘故也劉子懸千金於市而人不敢取者分定矣委一錢於地童子爭者分不定矣傅子史膏粱之性難正國語食鮮肥者多驕放同上安民可與行義危民可與為非史秦始皇紀治獄吏上下相歐以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死人情安則樂生痛則思死捶楚之下何求不得故囚人不勝痛則飾詞以視之吏治者利其然則指道以明之上奏畏卻則鍜鍊而周內之雖咎繇聽之猶以為死有餘辜何則成練者眾文致之罪明也西漢路溫舒傳勇略震主者身危功蓋天下者不賞通監衣食足而知榮辱廉讓生而爭訟息前漢食貨志夫百人作之不能衣一人欲滅下亡寒胡可得也一人耕之十人聚而食之欲天下無飢不可得也飢寒切於民之冗膚欲其亡為奸邪不可得也通監漢文孤者易傷貧者易感東漢邴原傳本根既微枝葉強大故其末流有從橫之事勢數然也通監漢光武生而富者驕生而貴者傲生富貴而不能驕傲者未之有也通監漢和紀勢存則威無不加勢亡則不保一身通監漢獻紀貴不與驕期而驕自至富不與奢期而奢自至唐魏證傳貧不學儉富不學奢非人性也勢使然耳魏志互入不待矯揉夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒魏志王粲傳晉劉毅曰上品無寒門下品無勢族通監宋明帝詔曰貴高有危殆之懼卑賤有溝壑之憂通監宋紀辛雄曰凡人所以臨陳忘身觸白刃而不憚者一求榮名二貪重賞三畏刑罰四避禍難非此數者雖聖主不能使其臣慈父不能厲其子矣通監梁高祖朱敬則曰急趍無善跡促柱少和聲續世說久安之民驕佚則難教經亂之民愁苦則易化譬猶飢者易為食渴者易為飲也通監唐太宗紀傳記市朝則滿夕則虛非朝愛市而夕憎之也求存故往亡故去戰國策貴不與富期而富自至富不與粱肉期而粱肉至粱肉不與驕侈期而驕侈至同上與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣呂氏春秋漁人匠者何患山海之貧罄哉劉知幾史通集廣川無逆流選謝靈運詩錢之所在危可使安死可使活錢之所去貴可使賤生可使殺魯褒錢神論洪波振壑川無恬鱗驚飆拂野林無靜柯殷仲文表高風摧秀木李太白少年樂新知衰暮思故友韓文互入趍向不同文章之作恒發於羈旅草野至若王公貴人氣得志滿非性能而好之則不暇以為夫和平之音淡薄而愁嘆之聲要妙歡愉之辭難工而窮苦之言易好也並同上絡首縻足兮驥不能踰跬步無所阻兮跛鱉千里炎天無冽井日月停午物無邪陰劉賓客短線無長縫孟東野鄰富雞長往家貧客漸稀姚少監長江不肯向西流白樂天世冑躡高位英俊沈下僚地勢使之然由來非一朝左太沖詠史詩在貴多忘賤曹子建贈丁儀本朝朱門有遺啄千里來燕雀公門冷如水百呼無一諾東坡詩飽食有殘肉飢食無餘菜先竭是甘井得全如苦李並同上尺箠當猛虎奮呼而操擊徒手遇蜥蜴變色而卻走老泉先生集袒裼而按劍則烏獲不敢逼冠冑衣甲據兵而寢則童子彎弓殺之矣利之所在天下趍之是故千金之家欲有所為則百家之市無寧居者三蘇集自下觀上無限富貴自上觀下無限貧賤邵堯夫
