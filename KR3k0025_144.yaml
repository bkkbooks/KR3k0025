body:
  text: 辨白經無信人之言人實廷女詩揚之水廷音誑子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也論語述而子如使予欲富辭十萬而受萬是為欲富乎孟子公孫丑下予豈好辨哉予不得已也孟子滕文公下史考問左驗明白西漢楊惲傳師古曰言當時在其左右見此事者也貫高怨家知其謀上變告之於是上逮捕趙王及諸反者趙午等十餘人皆爭自剄貫高獨怒罵曰誰令公為之今王實無謀而并捕王公等皆死誰白王不反者乃詣長安高對獄曰獨吾屬為之王實不知吏治榜笞數千剌剟身無可擊者終不復言貫高曰人情寧不各愛其父母妻子乎今吾三族皆以論死豈愛王過於吾親哉顧為王實不反獨吾等為之通監漢惠紀初大司馬疑中書郎陸機為趙王倫撰禪詔收欲殺之大將軍為之辨理得免死因表為平原內史晉惠帝紀張昌宗曰說嘗謂元忠為伊周伊尹放太甲周公攝王位說曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫臣以郎官往賀元忠語客曰無功受寵不勝慚懼臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為臣至忠古今仰慕陛下用宰相不使學伊周當使學誰耶且臣豈不知今日附昌宗立取台衡附元忠立致族滅但臣畏元忠冤魂不敢誣之耳通監唐中宗紀議者或罪張巡以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上之以為若不時記錄恐遠而不傳使巡生死不遇誠可悲哉通監唐肅宗紀帝戲第五倫曰聞卿為吏篣婦公不過從兄飯寧有之耶對曰臣三娶妻皆無父少遭飢亂實不敢妄過人飡東漢本傳李晟大安園多竹復有為飛語者云晟伏兵大安園謀因倉卒為變晟遂斫伐其竹通監唐德宗紀張巡死節睢陽人媢其功以為降賊肅宗未及知李翰傳巡功狀表之帝因是感悟而巡大節白於世唐李翰傳集剌心以自明刎頸以見志李少卿夫傲雖凶德必有恃而敢行愈之族親鮮少無扳音班聯之勢於今不善交人無相生相死之友於朝無宿貨蓄資以釣聲弱於才而腐於力不能犇走乘機抵巇以要權利夫何恃而傲若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也韓文釋言自古賢人才士秉志遵分被謗議不能自明者百數故有無兄盜嫂娶孤女云撾婦翁者然賴當世豪傑分明辨別卒光史籍柳文堅然相白者無數人同上西施若解傾吳國越國亡來又是誰羅隱集經淳于公少女緹縈隨其父至長安迺上書曰妾傷夫死者不可復生刑者不可復續雖欲改過自新其道無繇西漢刑法志隆天重地死無以塞責一日卒有不勝洒掃之職先狗馬填溝壑竊有所恨西漢東方朔傳劉向曰臣幸得託肺腑西漢劉向傳范逵謂陶侃曰欲仕郡乎曰困於無津晉陶侃傳春不得避風塵夏不得避暑熱秋不得避風雨冬不得避寒凍四時之間無日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此通監西漢文帝紀因陳肝膽自以底裏上露通監後漢光武紀班超久在絕域年老思土上書乞歸曰臣不敢望到酒泉郡但願生入玉門關通監漢和帝紀每四節之會塊然獨處左右惟僕隸所對惟妻子高談無所與陳精義無所與展未嘗不聞樂而拊心臨觴而嘆息也通監魏明帝紀諸葛亮表於漢主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒臣不別治生以長寸尺若臣死之日不使內有餘帛外有贏財以負陛下卒如其所言同上集雀鼠貪生魏曹植鷂雀賦命輕鴻毛責重山嶽齊明讓表美芹之願徒有獻於至尊蟠木之姿誰為容於左右駱賓王日夜相代笑溝壑之匪遙貧病交侵思薜蘿而可托同上在藻纖鱗終寡登龍之望棲榆弱羽徒仰摶鵬之高同上蚊蚋負山力誠不足鷹鸇逐鳥志則有餘劉賓客聖日難逢生涯漸短體羸則無拜舞之望心在則有涕戀之悲同上草木賤𨈬誠不足惜烏鳥微志實有可哀身侔蟬翼死輕鴻毛無因隨賀燕翔集畫梁間並同上懦弱昏塞不能奮厲出奇少荅所遇韓文與李實書霄漢益高泥塵永棄瞻仰遼絕陳露無由柳文戴天彌懼履地益慚負罪淪伏聲銷跡滅並同上慚切股肱喜深骨髓白傳集忝非土木如履冰泉葵藿之心徒傾螻蟻之誠難達並同上蹄涔赴海誠亦無因場藿向陽輒思自效權載之集本朝曾與蒿藜同雨露終隨松柏耐風霜臨川集豈堪置足青冥上終欲回身寂寞濱少遭閔凶自奮寒苦螢爝末光不獲干時之譽榱楹近用亦參構廈之功日有簡書之繁久無竿牘之獻並同上范忠宣遺表云蓋嘗先天下而憂期不負聖人之學三朝言行錄養痾臥治之所蒙成坐嘯之餘東坡集信道直前曾無坎井之避立朝寡助誰為先後之容同上隻影自憐命寄江湖之上驚魂未定夢遊縲紲之中疾病連年人皆相傳為已死餘寒併日臣亦自厭其餘生並東坡集逮親而得斗祿雖慰於子心斂板而揖上官遂成於俗狀學久矣而將落思兀然而欲枯進無取當塗之資退已失故時之步歐公集學以父兄為師貧無公卿之助欒城集木雞自笑真無用芻狗何勞收已陳罪積如山命輕如髮並同上經開釋無辜周書蟄蟲昭蘇記樂記子息我黥而補我劓莊子史所謂生死而肉骨也左傳互入感謝振拔泥塗前漢班固敘傳枯骨復被肉東漢趙壹傳洗刷疵垢宣暢湮鬱通監雪冤氣於幽泉唐書集使入湯之禽復假羽毛自斷之足復蒙連續蘇武報李陵書塵洗天波謗絕眾口陸機表苟削丹書得夷平民同上迴霜收電同上拔泥塗之久辱文粹窮骸枯骨一朝再生踴躍章惶再崩再殯陳子昂集收骸溝壑返魄幽泉魑魅窮魂重生聖日糞土殘命不滅荒陬再造生涯天實為德起骨九泉幽魂雪憤遺噍昭蘇天波昭洗更得自新朽骨更肉萬死一生並同上使枯朽之條更與秋蘭垂芳陸沉之羽復共翔鴻撫翼陸士衡洗拔出泥滓白侍郎出泥騰霄從骨生肉提拔出泥吹噓生翅將枯鱗再躍經鎩翼重矯並同上恩波起涸鱗杜詩冤氣初逢渙汗收劉長卿六翮方鎩思重托於扶搖孤桐半焦冀見收於煨燼同上表而出之為生羽翼劉賓客重雲開朗照九地雪幽魂杜牧之藥肉白骨香返遊魂抆拭舊痕湔洗前過必欲牽復用存始終並同上莫因毫髮累長使賤泥沙錢起文收召魂魄柳文生繁華於枯荑育豐肌於朽骨劉越石書聖代也知無棄物羅隱集本朝安得層穹返收拾莫教狼籍渾泥沙僧參寥子雪詩經云不可使得罪于天子亦云可使怨及朋友詩雨無正子與之為無方則危吾國與之為有方則危吾身莊子矰繳機而在上網罟張而在下雖欲翱翔其勢焉得淮南子俶真訓史齊魯仲連為書約之以矢遺燕將燕將得書泣三日猶豫不能決欲歸燕已有隙恐誅欲降齊所殺虜於齊甚眾恐己降而後見辱曰與人刃我寧自刃乃自殺史魯仲連傳依世則廢道違俗則危殆西漢何武等贊文集居閑力不足從事力難任兩事皆害性一生怕苦心韓文公集經不耕穫不菑畬易仰成書畢命史渠成亦秦之利也前漢溝洫志蕭何為法講若畫一曹參代之守而勿失西漢本傳贊馮翊垂拱蒙成西漢薛宣傳師古曰自言端拱無為而受縣之成功以杜畿為河東太守鍾繇促王邑交付邑佩印綬畿謂衛固范先曰范衛河東之望也吾仰成而已通監漢獻紀本朝秦收鄭渠成晉得楚材多山谷集互見坐享人利經今由與求也可謂具臣矣論語子齊宣王好竽南郭先生不知竽而濫吹於三百人之中以食祿韓非子互見尸素史魏絳曰日君乏使使臣斯司馬左襄三年韓厥曰下臣不幸屬當戎行攝官承乏左成三年蒯聵不敢自佚備持矛焉左傳趙使平原君合從於楚約與食客二十人偕得十九人毛遂自贊曰願備員而行史記平原君傳雖有姬姜絲麻不棄憔悴菅蒯蓋所以代匱也東漢應奉傳貂不足狗尾續晉書備員不復事唐書王鉷傳贊鍾毓每與參佐射魏舒常為畫籌而已後遇朋人不足以舒滿數通監魏明帝紀傳記強奏庸者特為足曲史通乘間簉乏琴賦集切混吹於齊竽濫飛聲於郢路並駱賓王名亦濫吹竽溫飛卿本朝眾裏笙歌誰比數東坡詩經若崩厥角周書注無容頭史匹馬隻輪無反者公羊僖公三十一年掃地盡矣西漢韓信傳奉頭鼠竄以歸西漢蒯通傳託足無所晉書傳記狼狽是兩物狽前足短常駕兩狼失狼則不能動故世言事垂者稱狼狽酉陽雜俎互見失助集乾坤之量包含海嶽臣身甚微無所投足蟻適于垤蝸休于殼龜黿螺蜯皆有所伏臣物之靈進退惟辱柳乞巧文子輪無反文粹經巷伯寺人傷於讒故作是詩也詩幽王小雅巧言大夫傷於讒故作是詩也詩本篇何人斯暴公為卿士而譖蘇公焉故蘇公作是詩以絕之本詩讒人罔極構我二人詩青蠅子匡章通國皆稱不孝孟子史日月之明時蔽於浮雲史記龜莢傳孔墨之辨不能自免於讒諛西漢鄒陽傳馬援自交趾還載薏苡一車時人以為南土珍怪後有上書譖之者以為明珠文犀東漢本傳困於口舌不能以忠自明李光弼傳贊集巧言易信孤憤難伸劉賓客有無兄而盜嫂娶孤女而撾婦翁詆訶萬端旁午構扇並柳文本朝巧語屢曾遭薏苡坡詩眾口相咻有口難訴欒城集
