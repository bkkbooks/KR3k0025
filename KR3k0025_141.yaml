body:
  text: 求援經弱者不能自濟必依於強易略例控于大邦詩載馳終夜有求於幽室之中非燭何見記仲尼燕居子昏暮叩人之門戶孟子車轍之中鮒魚曰我東海之波臣也豈有升斗之水而能活我哉莊子外物篇史孟獻子曰願借助焉左襄四年甘茂謂蘇秦曰貧人女與富人女會績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一便焉史記雖復零雨自天終待雲興四嶽北史魏愷傳蕭炅為河南尹嘗坐事西臺遣吉溫往按之溫治炅甚急及溫為萬年丞未幾炅為京兆尹溫素與高力士相結力士自禁中歸度炅必往謝官乃先詣力士與之談謔握手甚歡炅後至溫陽為驚避力士呼曰吉七不須避此亦吾故人也召還與炅坐炅接之甚恭不敢以前事為怨他日溫詣炅曰曩者溫不敢虧國家法自今請洗心事公炅遂與盡歡通監唐元宗紀傳記士非玉璧談者為價物理論互見因人而重門集冀宵燭之末光邀潤屋之微澤劉孝標廣絶交論寒谷待鳴律文選譬諸蟄蟲坯戶而死者與夫槁死亦無以異矣春雷一震必歆然翹首與生為徒況有吹律者召東風以薰之其化也益速劉賓客集宋廣平之沈下僚蘇公味道為使者廣平投以梅花賦蘇盛稱之自是方列于聞人之目是知英賢卓犖可外文字猶用片言借說於先達之口席其勢而後驤首當時矧碌碌者疇能自異同上互見因人而重施一陽於剝極之際援衆溺於坎深之下夫踣者思起必呼而求極疾者思愈必呻而求醫並同上孤獸走索群曹子建贈白馬王彪詩無衆星之明假日月之光魏文帝吳質書願假東壁輝餘光照貧女李白集餘波期救涸杜詩巨海能無釣浮雲亦有梯麾下賴君相並入獨能無意向漁樵揚雄更有河東賦惟待吹噓送上天並杜詩儻荊璞不致見疑夜光不逢按劍則沈骸九死終望銜珠俯首三泉徒希結草駱賓王涸鱗濡沫常觖望於鯨波決羽搶揄頗思遷於鶯樹同上儻餘光之可照庶寒灰之重然曲逮恩光資餘潤於東里襲承導引輕托夢於南樛奮短翮於搶榆希高標之餘拂濯鮮鱗於涓滴望鴻浪之微沾所冀顧眄曲流剪拂增價則鉛刀起一割之用跛鱉致千里之行互見自夢儻能分其斗水濟濡沫之枯鱗惠以餘光照孀棲之寒女得使伏櫪駑蹇布騏驥而蹀足竄跡翩翾排鴛鸞而刷羽互見自薦門並駱賓王集蹈水火者之求免於人也不惟其父兄子弟之慈愛然後往而全之也將有介於其側者雖其所憎怨苟不至乎欲其死者則將大聲疾呼而望其人之救也韓愈文太在山馬在肆過之而不顧者雖日纍千百人末為不才與下乘也及至匠石過之而不睨伯樂過之而不顧然後知其非棟梁之才超逸之足也韓愈為人求薦書互見委棄天地之濱大江之濆有怪物焉蓋非常鱗凡介之品彙匹儔其得水變化風雨上下于天地不難也其不及水蓋尋常尺寸之間耳無高山大陵矌途絶險為之關隔也然其窮涸不能自致乎水為猵獺之笑者蓋八九年如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也以有力者遇之熟視之若無睹也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其有命而且鳴且號之者亦命也韓文且天下熙熙然而獨呻吟柳文恩波自解借枯鱗劉長卿銜花縱有報恩時擇木誰容托身處同上見借羽翼王維集折簡能榮瘁遺簪莫棄捐韶光如見借寒谷變風煙溫飛卿愧無鵷鷺姿短翮空飛還誰當假羽毛雲路相追奪韋應物集線因針而入矢因絃而發雖有線矢無針絃欲自致焉不可得也白傳集當途訴知己投剌匪求蒙孟浩然朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家溉灌所不沾其濯乃條枚成乃華實者上天至仁之膏澤厚地無際之陽春乎相公為上天霖雨佐厚地無際之陽春發生者也何以處某焉歐陽行言文握風捕影鑄木鏤水敢求恩知但希鐫琢杜牧之墜并者求出執熱者願濯同上自愧掃門士誰為乞火人同上遺簪墜履應留念門客如今只下寮羅隱詩宣室夜闌如有問可能全忘未燃灰同上本朝無監頌刻畫寒谷借吹噓歐公詩必為鏌釾盡歸鎔鑄晏公類要儻矜一介之誠願借半辭之助臨川行看富貴逼灸手借餘暖東坡集特借齒牙曲成羽翼同上史楚子圍鄭三月克之鄭伯肉祖牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不惟命是聽其俘諸江南以實海濱亦惟命其剪以賜諸侯使臣妾之亦惟命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左宣十二楚莊王伐鄭克之鄭伯肉袒牽羊以逆曰孤不天不能事君君用懷怒孤之罪也敢不唯命是聽賓之南海以臣妾賜諸侯亦惟命是聽若不絶其社稷使改事君孤之願也非所敢望也敢布腹心史楚出家懷朔鎮將元尼須與元懷舊交貪穢狼籍置酒請懷謂懷曰命之短長繫卿之口豈可不相寬貸通監梁武帝紀魏齊笞擊范睢折脅摺齒睢佯死卷以簀置廁中使客醉者更溺之范睢謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣通監周紀晉王斬劉守光守光曰守光善騎射王欲成伯業何不留之使自效其二妻李氏祝氏讓之曰皇帝事已至此生亦何益妾請先死即伸頸就戮守光至死號泣哀祈不已通監後梁均王丁公為項羽將逐窘高祖彭城西短兵接漢王急顧謂丁公曰兩賢豈相厄哉丁公引兵而還西漢季布傳暴勝之欲斬王欣欣曰殺欣不足增威不如時有所寬以明恩貸勝壯其言而赦之前漢猛虎處深山百穀震恐及其在陷阱之中搖尾而求食司馬遷傳集元相公在浙東賓府有薛書記酒後傷公猶子逐出幕既去作十離詩以獻犬離主筆離手馬離廄鸚鵡離籠燕離巢珠離掌魚離池鷹離群竹離亭鏡離臺大詩云馴擾朱門四五年毛香足淨主人憐無端咬著親情客不得紅絲毯上眠筆詩云越管宣毫始稱情紅箋紙上撒花瓊都緣用久鋒頭盡不得羲之手裏驚鸚鵡詩云隴西獨自一孤身飛去飛來上錦裀都緣出語無方便不得籠中更喚人燕詩云出入朱門未忍拋主人常愛語咬咬銜泥穢污珊瑚簟不得梁間更壘巢托言餘不載經見情者獲直往則違易略例注云見彼之情往必得之不揆而往彼必相違既見君子云胡不喜詩風雨既見君子為龍為光詩聞始見君子者辭曰某固願聞名於將命者敵者曰某固願見罕見曰聞名亟見曰朝夕記少儀注云亟數也於君子則曰某願朝夕聞名於將命者於敵者則曰某願朝夕見於將命者子不識可以繼此而得見乎孟子願望履幕下莊子盜路篇侍於下風幸聞咳唾之音莊子漁父篇史子産曰敝邑不敢寧居來會時事逢執事之不間而未得見又不獲聞命未知見時左襄三十一年鄒陽曰何王之門不可曳長裾乎西漢本傳願有謁也同上耳餘上謁西漢張耳傳造請諸公西漢張湯傳曠若開雲見日何喜如之東漢袁紹傳伏拜賓阼通爵里之剌魏志呂僧珍生子宋季雅往賀署函曰錢一千閽人少之不為通強之乃進梁書互見慶賀集承顏下風陸士雲宴會詩獨恥事干謁杜工部趙奉先詩君出我入如相避然韓文鄭光業有一巨皮箱凡投贄有可嗤者即投其中號曰苦海托言古者未有紙削竹木以書姓名故謂之剌後以紙書故謂之名紙唐李德裕為相貴盛人務加禮改具銜候起居之狀謂之門狀集韻經日月麗乎天百穀草木麗乎土易離卦注各得所著伊川云天地之中無不麗之物得其所歸者必大故受之以豐序卦弱而不懼於敵者得所據也憂而不懼於亂者得所也易略例上日月得天而能久照易常卦魚麗于水獸麗于山易繫辭注菁菁者莪在彼中阿詩菁菁者莪鴻鴈于飛集于中澤卷阿詩互見處得其地魚在在藻依于其蒲詩魚藻子霜鴈託於秋風以成輕舉之勢列子投魚于淵置猿于木文中子大廈成而燕雀相賀淮南子說林訓互見第宅門史齊侯使敬仲為卿辭曰羈旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戾君之惠也所獲多矣左莊二十二年社鼷不灌屋鼠不熏何則所托者然也前漢中山王傳巨魚縱大壑前王褒傳星辰之麗天猶萬國之附王後漢襄楷傳如晨風之鬱北林龍魚之趣藪澤也晉書孝憋帝紀魚得水而遊鳥乘風而翔唐書元稹傳鳥生深林獸在豐草白居易傳傳記稷蜂不攻社鼠不熏其所托者然也韓詩外傳鳳凰巢于阿閣通曆集歸鳥赴喬林翩翩厲羽翼曹子建贈白馬王彪庇身有地任彥升集蝟結蟻聚水草有依文選露淋秋檜鶴聲清杜荀鶴問無恙外不暇出一語且先賀其得賢主人韓退之代張籍團團規內星未必明如月託跡近北辰周天無淪沒元稹雄藩車馬地作尉有光華韋應物集銜泥入華屋同上不見千年鶴多栖百丈松白侍郎集獸樂在山谷魚樂在陂池蟲樂在深草鳥樂在高枝同上互見趍向不同水深魚極樂杜詩經龍戰于野其道窮也易坤卦若涉大水其無津涯書微子篇豫將疇依書五子之歌豫羽譙譙豫尾翛翛豫室翹翹風雨所漂搖詩鴟梟鴻飛遵陸詩九罭不屬于毛不罹于裏小雅小辨靡所止戾詩小雅子下喬木而入於幽谷孟子滕文公上蒙鳩以羽為巢而編之以髮繫之以葦苕風至苕折卵破子死巢非不完也所繫者然也荀子勸學篇史號射曰皮之不存毛將安傅左僖十四年容容無所倚史淮陰傳失所為愆史孔子世家曾不得邪徑而託足焉前漢賈山傳宇宙雖廣自容無所通監晉穆紀有鳥於此架巢於葭葦之顛天風則葭折而巢毀所托者弱也韓詩外傳集眇眇而無所歸泊楚辭花離帶而姜條去幹而枯蔡雍釋誨出籠窮短翮委轍涸枯鱗駱賓王行舟楫而不識四方兮涉大水之漫漫韓文閔己賦互入昧於趍向為水不入海安得浮天波為木不在山安得橫日柯孟東野枳棘徒棲鳳劉長卿舊來王榭堂前燕飛入尋常百姓家劉賓客百川不朝于海雖狂奔澶漫終為涸土唐田頵移書楊行密纍纍然若喪家之狗史記孔子世家
