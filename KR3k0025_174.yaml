body:
  text: 行役經我馬瘏矣我僕痡矣詩卷耳言秣其馬言秣其駒詩漢廣載脂載牽還車言邁詩泉水行邁靡靡中心搖搖詩漆離昔我往矣楊柳依依今我來思雨雪霏霏詩采薇行道遲遲載渴載飢同上憂心悄悄僕夫況瘁詩出車檀車幝幝尺善切四牡痯痯古緩切詩杕杜山川悠遠維其勞矣幽小雅漸漸之石星言夙駕詩定之方中或不已于行詩北山道途不爭險易之利記儒行子百舍重趼而不敢息莊子天道車馬有行色莊子盜跖史交贄往來道路無壅左成十一跋履山川踰越險阻同上具行器矣左傳道宿行遲客寢甚安史齊世家夜衣而行犁明至國史齊世家犁猶此也遲也已業行西漢婁敬蒙霜露沐風雨西漢淮南王傳賜祿直以辦裝西漢龔勝傳道塗之濘滯不通魏志許由辭帝堯之命而舍於逆旅外傳曰晉陽處父過寧舍於逆旅魏武皇帝亦以為宜其詩曰逆旅整設以道商賈然則自唐到今未有不到客舍之法惟商鞅尤之晉書潘嶽傳行道路往來無風塵之色北齊書星行詣闕通監後唐明宗集征夫勞于周行道也楚辭路修遠以多艱選騷經裹足入秦李斯上書昔去雪如花今來花似雪互見還舍藝文類聚三十九李陵詩簡元辰而俶裝張衡思玄賦日既西頽車殆馬煩洛神賦星陳宿駕秣馬脂車曹子建應詔詩羈旅無定心翩翩如懸旌景陽雜詩首路局險艱選北使洛詩揚旍西邁五陵表客途亙萬里東武吟侵星赴早路還都道中詩行矣倦路長無由稅歸鞅京路夜發詩戒塗在昧旦秋胡詩連翩戒征軸八公山詩櫛風沐雨多在道路選修路無窮迹陸士衡詩嚴駕越風寒解鞍犯霜露秋胡詩寒燈耿宵夢謝眺詩關山嗟墜葉岐路憫征蓬別鶴聲聲遠愁雲處處同江總詩行子腸斷百感悽惻江文通別賦舟凝滯於水演車逶遲於山側江文通別賦已上並文選鄉國一辭江山萬里駱賓王行役風霜久鄉園夢想孤同上著鞭跨馬涉遠道李白我車巳載脂杜工部詩舟車半天下同上旅魂驚北鴈鄉信是東風元微之集互見懷鄉春來愛有歸鄉夢一旦猶疑夢裏行同前互見懷鄉車行冒風塵韋應物集僕御促前征同上主人燈下別羸馬月中行踏石新霜滑穿林宿鳥驚杜詩來往再逢梅柳新韓文始去杏飛蜂及歸柳嘶蚻同上互入還舍漂淪憔悴轉徙於江湖間白侍郎旅情偏在夜鄉思豈唯秋劉賓客繭足千里劉禹錫日下人誰憶天涯客獨行劉長卿逆旅鄉夢頻春風客心碎頃來行已遠彌覺天無涯迢萬里帆飄飄一行客同上雞聲茅店月人迹板橋霜溫庭筠詩失意未還家馬蹄盡四方王建詩芰荷風起客堂靜松桂月高僧院深清露下時傷旅鬢白雲歸處寄鄉心許用晦文孤枕易為客遠書難到家同上身賤與心違秋風生旅衣久貧辭國遠為病在家稀同上疊鼓催殘月踈鐘迎早霜同上旅遊知世薄貧別覺情深許用晦文晨雞喔喔茅店傍行人起掃車上霜張文昌歸使雨中發寄書燈下封同上薄寒燈影外殘漏雨聲中錢起文本朝永夕清霜暗濕中楊文公雨冷侵燈暈風愁送葉聲歐公集坡長坂峻牛力疲天寒日暮人心速同上櫛沐飽風雨坡詩酒醒燈前猶是客臨川脂車秣馬試長道欒城集五更歸夢常苦短一寸客愁無奈多黃魯直曠懷亦苦中年別歸翼仍愁行路難後山鄰雞接響作三鳴殘點連聲殺五更寒氣挾霜侵敗絮賓鴻將子度微明同上經薄言還歸詩采蘩出車以勞還杕杜以勤歸詩采薇子息肩弛簷孟子序還鄉者心務見家不可以一步至也劉子互入心至力不及史叔孫歸曾阜御季孫以勞之左傳已出反舍西漢叔孫通傳君其反室同上石奮傳集昔去雪如花今來花似雪選詩互見行役息徒稅征駕選雜體詩俶裝反柴荊謝靈運初去郡詩乃瞻衡宇載欣載奔僮僕歡迎稚子候門陶淵明新歸且慰意生理焉足説杜詩生還對僮稚似欲忘飢渴杜詩北征眉間黃色見歸期韓文始去杏飛蜂及歸柳嘶蚻韓文互見行役去遠即相忘歸近不可忍兒女已在眼眉目略不省喜極不得語淚盡不一哂了知不是夢忽忽心未穩後山示三子安得香水泉濯郎襟上塵古詩踏著家鄉馬腳輕王建詩近家心轉切不敢問來人脞説載獨孤遐詩本朝撲面蜘蛛傳喜信入簾蝴蝶報佳人歐陽公向家還漸近豈復倦征輪歐陽公詩歸時快馬亦須鞭臨川莫言還家樂未覺道路長閭里喜我來車馬塞康莊爭言借顏色草木亦晶光後山還里詩樂莫樂於還故鄉東坡互見還鄉雞豚不改舊鄰里自相歡欒城集經朋盍簪易豫卦邂逅相遇詩野有蔓草如此邂逅何詩綢繆子孔子之郯遭程子於塗傾蓋而語終日甚相親家語致思史楚伍舉將奔晉聲子遇之於鄭郊班荊相與食而言班布也布荊坐地左襄二十六粲然有文以相接歡然有恩以相愛前漢共語移日握手極歡李通傳握手歡如平生東漢馬援傳相見不數則彼我不親無因得盡人情何由知衆事也通監集恨不具雞黍得與故人揮選詩枉道相過文選窮巷隔深轍頗回故人車同上掩泣敘溫涼同上數面成親況情其過此者乎陶潛逢故人而永夜陳子昂留連嘯歌從容風月駱賓王主稱會面難一舉纍十觴杜詩夜闌接軟語同上良會惜清晨杜詩會合意彌重韓文乍見悲兼喜猶驚是與非元微之集江湖十年別衰老一樽同劉長卿相逢苦易散動別知難會劉長卿誰言此相見暫得話疇昔唐文粹五日之面半旬之歡唐文粹夜闌更秉燭相對如夢寐杜詩本朝一樽客語從容盡千里人情委曲諳臨川人與嘉節會坡詩經以致稍餼周禮詒我佩玖詩丘中有麻雜佩以贈之詩女曰雞鳴實幣帛筐篚以將其厚意詩鹿鳴其贈維何乘馬路車詩韓奕苞苴記少儀朋友之饋雖車馬非祭肉不拜語卿黨康子饋藥拜而受之同上子孔子遭程子於塗謂子路曰取束帛以贈先生家語致思篇行者必以贐辭曰饋贐孟子公孫丑下史乃饋盤飧置璧焉公子受飧反璧左僖二十四吳季札聘鄭見子産與之縞帶子産獻紵衣焉注吳地貴縞鄭地貴紵故各獻己所貴左襄二十九加貺左傳衛人饋叔向羹與一篋錦同上孟嘗君聘於楚楚人遺之象床通監周紀束修之饋西漢朱邑傳記唐上元夜登樓貴戚例有黃柑相遺謂之傳柑詩話楊國忠每至伏日取堅冰命工雕為鳥獸之形飾以金環縷帶置雕盤中送遺王公唐開元遺事陸凱與范曄為友在江南寄梅花一枝詣長安與曄并贈詩云折花逢驛使寄與隴頭人江南無所有聊贈一枝春荊州記集金膏翠羽將其意脂韋便辟導其誠苞苴所入實行張霍之家選廣絶交論本朝贈遺蕃渥孔六帖朝來聞好語叩戶得美餉輕圓白曬荔脆釅紅螺醬坡詩歲晚相與餽問為餽歲同上經出宿于沛飲餞于禰詩泉水之子于歸遠送于野瞻望弗及泣涕如雨詩燕燕韓侯出祖出宿于屠顯父餞之清酒百壺詩韓奕史鄭六卿餞宣子于郊左昭十六年孔子過周問禮老子送之曰富貴者送人以財貧賤者送人以言吾不能富貴竊仁人之號送子以言史記孔子世家祖於北門西漢臨江王傳祖者送行之祭因饗飲也昔黃帝之子纍祖好遠遊而死於道故後人以為行神也同上疏廣父子乞骸骨公卿大夫故人邑子設祖道供張東都門外送者車數百兩西漢本傳朋友以言贈行同上段會宗共工氏子曰修好遠遊祀以為祖神漢以午日祖後漢荀或傳注傳記將行者有祖道五經要義集傾城遠追送餞我千里道孫子荊征西詩舉觴矜飲餞指途念出宿謝宣遠王撫軍詩臨塗未及引置酒慘無言顏延年五侯相餞送高會集新豐六樂陳廣坐祖帳楊春風鮑明遠張飲東都送客金谷江文通別賦班荊兮贈恨樽酒兮敘愁同上樽酒送征人踟蹰在清宴日暮浮雲滋握手淚如霰江淹詩頓旌節而少留傾朝廷而出餞陳子昂集漢朝卿士供帳餞於東都晉國名賢傾城祖於西郊同上桃花嘶別路竹葉鴻離樽駱賓王勸君更盡一杯酒西出陽關無故人唐王維離筵不隔日那得易為情杜詩二天開寵餞五馬爛生光同上祖席倍輝光同上祖席洛橋邊親交共黯然韓退之鳴笛急吹催落日清歌緩送感行人韓文無疾其驅天子有詔同上預離觴之餘瀝柳文載肉于俎崇酒于觴追而送之同上送荊軻於易水餞疏廣於東門白帖自嘆旅人行意速每嫌杯酒緩歸期元微之賢豪爭追攀飲餞出西京韋應物集衣冠列祖道劉義絃管有離聲張文昌羽觴交餞席同上樽酒別期促劉長卿送君把酒不成歡同上本朝我亦且如常日醉莫教絃管作離聲歐詩離腸莫惜少留連同上經雲上於天需君子以飲食宴樂易需卦鹿鳴燕群臣嘉賓也同上常棣燕兄弟也儐爾籩豆飲酒之飫小雅伐木燕朋友故舊也同上賓之初筵左右秩秩籩豆有楚殽核維旅同上賓之初筵或獻或酢大雅行葦為酒食以召鄉黨僚友記曲禮上酒食者所以合歡也史樂書銜杯酒接殷勤之歡西漢司馬遷烹羊炮羔斗酒自勞酒後耳熱仰天拊缶西漢楊惲傳引蒲舉白班固敘卓王孫為具召臨邛令王吉及司馬長卿令既至日中司馬長卿謝病不能臨臨邛令不敢嘗食身自迎相如不得已而強往一坐盡傾西漢司馬相如傳互見敬畏武帝問三日曲水之義束晢曰昔周公城洛邑因流水以氿酒逸詩云羽觴隨波晉書束晢車胤善於賞會當時每有盛坐而胤不在皆云無車公不樂謝安遊集之日輒開筵待之晉書本傳又互見歸向今夕只可談風月南史王毛仲有婚上謂宰相曰卿等達官悉詣其第既而日中客未敢舉筋待宋璟通監唐元宗又互入敬畏郭子儀入朝上命元載王縉魚朝恩等互置酒於其第一會之費至十萬緡通監出有餞路還有軟腳唐書白居易居東都嘗與胡杲吉旻盧真等燕集皆高年不仕者人慕之繪為九老圖傳記學士許慎與親友宴花圃中聚落花鋪坐曰吾自有花禋何消坐具王仁俗開元天寶遺魏文侯與大夫飲公乘不仁為觴政曰飲若不盡浮之太白文侯不盡公乘不仁舉白浮君也劉向説長安風俗元日以後以飲食相邀號傳座南部新書集酒車酌醴方駕授餐東京賦肴來不虛歸觴至反無餘曹子建贈觴酌流行絲竹並奏酒酣耳熱仰而賦詩魏文帝吳質書燕飲彌日曹子建塤簫激於華屋文選吳質酌羽觴以交歡三沈宴置酒若淮泗積肴若山丘左太沖吳賦回坐咸同志羽觴不可算陸士衡永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修褉事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管弦之盛一觴二詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也王羲之蘭亭序中山不知醉飲德方學飽選謝靈運擬詩情盤景遽歡洽日斜選曲水詩金壘引上賓駱賓王笙歌踏曙鐘孟浩然樂極未言醉杯深猶恨稀陳後主晚宴詩峨峨紅粉席沈佺期花迎喜氣皆知笑鳥識歡心亦解歌王維集高談隨羽觴杜詩樽前還有錦纏頭華筵直千金同上萬牛臠炙萬甕行酒韓文妖姬踏筵舞韓退之車載牲牢甕舁酒並召賓客延鄒枚韓文聯句放杯遲元微之貴重近臣光綺席同上殷勤報絃管明月有嘉賓白傳集賀賓喜色欺杯酒醉妓歡聲遏管絃南山賓客東山妓此會人間曾有無白傳集羽觴飛翔匏竹激越熙然而歌婆然而舞持灦而笑不知日之將暮柳文所謂牛馬之飲者離坐其背實觴而流之接取以飲柳文序管絃喧夜景燈燭掩寒蟾劉賓客飲和心自醉何必管絃催客重杯搬侈臨觴而百斟同上賓筵接時彥韋應物集宵晝方連宴野庖薦嘉魚激潤泛羽觴絲竹促飛觴夜宴達晨星花裏獨開樽同上何事歡娛中易學春城暮劉駕詩歌舞留人月易低儲光羲花添羅綺色鶯亂管絃聲同上香薰羅幕暖成煙火照中庭燭滿筵整頓舞衣呈玉腕動搖歌扇露金鈿青娥側坐調雙管彩鳳斜飛入五絃王建集彩檻燭煙光吐日盡屏香霧暖凝春許用晦絃管開雙調花鈿坐兩行杜牧之本朝歷城北有使君林魏正始中鄭公愨於三伏之際率賓僚避暑于此取大荷葉盛酒以簪剌令與柄通屈莖上輪囷如象鼻傳吸之名為碧筒歷下皆效之酒味雜運氣香冷勝於他酎張君房脞説又互見僚屬寇準在中書多召兩制就第飲宴必閉關苛留之畏謹者甚懼李宗諤嘗於門扉下竊出得馬而走錢惟演纂金坡遺事文潞公以太尉留守西都時富韓公以司徒致仕潞公集洛中公卿大夫德高者為耆英會聞見録水涵樽俎光如洗臨川集燒燭飲至跋黃魯直經駕言出遊以寫我憂詩泉水以遨以遊詩柏舟車輪曳踵記曲禮可以遠眺望記月令史山簡鎮襄陽諸習氏荊土豪族有佳園池簡每出嬉遊多之池上置酒輒醉時有兒童歌曰山公出何許往至高陽池日夕倒載歸倒著白接籬晉書本傳庾亮在武昌諸佐吏商浩之徒登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺便據胡床而坐與浩等談詠晉書本傳互見不拘形迹及僚屬九月九日亙溫燕龍山僚屬畢集有風至吹孟嘉帽墜落嘉不之覺同上本傳孟嘉傳王羲之云每行山陰道上如鏡中遊王獻之望鏡湖澄徹瀉注乃云山川之美使人應接不暇宋景前祕書監謝靈運好為山澤之遊窮幽極險從者數百人伐木開徑通監宋太祖謝靈運與族弟惠連東海何長瑜穎川荀雍太山羊璿之以文章賞會共為山澤之遊時人謂之四友南史宋謝靈運傳謝琨與族子靈運晦曜以文義賞會共處居在烏衣巷故謂之烏衣之遊琨詩所言昔為烏衣遊戚戚皆親姓者也南史謝弘微蕭介與兄琛眕弟俶等文酒賞會時人以比謝氏烏衣之遊梁書本傳簡文帝遊華林園顧謂左右曰會心處不必在遠翳然林木便自有濠濮間想覺鳥獸禽魚自來親人世説令百官於春月旬休選勝行樂自宰相至員外郎凡十二筵各賜錢五百緍上或御花萼樓邀其歸騎留飲迭使起舞盡歡而去通監唐元宗紀集楚襄王遊於蘭臺有風颯然而至王披襟而當之宋玉風賦清夜遊西園飛蓋相追隨曹子建公宴晝短苦夜長何不秉燭遊選詩綴賞無地選王文隱序謂不擇地也屢借山水以化其鬱結晉孫綽詩序何必絲與竹山水有清音左太沖落花與芝蓋同飛楊柳與春旗一色藝文類聚周庾信林園馬射賦曲水公卿宴春塵晝滿階殷堯藩日落紅塵暮車馬亂縱橫陳子昂詩只去長安六日期多因及得杏花時同上花月窮遊宴杜詩此時同一醉應在仲宣樓同上謝安不倦登臨費杜詩江南多臨觀之美而滕王閣獨為第一韓文潁水嵩山刮眼明同上氣煩則慮亂視壅則志滯君子必有遊息之物高明之具使之清寧平夷常若有餘柳文莫教風景屬他人劉賓客傳語風光共流轉暫時相賞莫相違白傳集再得塵襟清白侍郎暫來不宿歸山去應被山呼作俗人同上獨上雲梯入翠微劉長卿康樂愛山水賞心千載同同上湖山四面爭氣色曠望不與人間同元稹集禽浮似揖羽觴杯鱗躍疑投水心劍公子王孫恣遊玩沙場水曲情無厭金鞭玉勒騁輕肥落絮紅塵擁路飛淥水殘霞催席散盡樓初月待人歸萬齊容不為尋山試筋力杜牧之謝公領茲郡山水無塵泥孟東野半醉百花前唐文粹心愜賞未足同上坐石逡巡染緑苔方雄飛列芳林而薦賞控清洛以開筵追李郭之佳遊嗣裴王之故事㳅杯曲水折巾幽徑流波度曲自諧中散之絃舞蝶成行無忝季倫之效揮魯陽之戈奔曦可駐騁山公之騎餘興方遒孫慎行宴山亭本朝人行亂石間歐公集至歡然而會意亦旁若於無人乃知偶來常勝於特來前言可信所有雖非於已有其得已多歐陽公集繞城駿馬誰能惜到處各園意盡便坡詩年年行樂不辜春同上腳力盡時山更好同上折花只恐傷花意攜客就花花定喜欒城集但須匹馬尋幽勝勢處清樽到處開同上登高懷遠心如在向老逢辰意有加後山集
