body:
  text: 爭鬥經嚚訟可乎書堯典注好爭訟不和政厖書周官相為敵讎書微子之命受爵不讓至于已斯亡詩角弓子惡聲至必反之孟公孫丑上今有鬭何哉我甚醜之荀榮辱爭飲食無廉恥不知是非不避死傷不畏衆強恈恈惟利飲食之見是狗彘也同上有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反莊史趙奢曰兩鼠鬭於穴中將勇者勝通監周紀君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由爭善也左襄十三年晏子曰凡有血氣必有爭心左昭十年不心競而力爭左自含血戴角之獸見犯則校而況於人懷好惡喜怒之氣史記律書譬如賈豎女子爭言何其無大體也武安侯曰爭時急不知出此史記灌夫傳爭者事之末也史越世家相與摩牙而爭之西漢揚雄傳傳記鬭者忘其身者也忘其親者也忘其君者也行須臾之怒而鬭終身之禍是忘其身也家室離散親戚被戮是忘其親也犯刑法之大禁是忘其君也凡鬭者皆以己為是而以他人為非説苑貴德集力大者搏齒利者囓爪剛者決柳子厚貞符互入勢利相軋本朝投骨於地狺然而爭者犬之常也老泉審敵強梁經子貢曰我不欲人之加諸我也語公冶長子強梁者不得其死好勝者必遇其敵家語無辭遜之心非人也孟公孫丑上小人致亂而惡人之非已也致不肖而欲人之賢已也心如虎狼行如禽獸而又恐人之賊己也荀修身史子晢好在人上左襄三十年子玉曰非敢必有功也願以間執讒慝之口左僖二十八年季郈之雞鬭季氏芥其雞郈氏為之金距平子怒左昭二十五年互入兩不相下為守視都尉如令為都尉必陵太守奪之治史記周陽由傳寧成為小吏必陵其長為人上者上操下如束濕薪史記本傳藺相如位在廉頗右頗曰吾羞不忍為之下我見相如必辱之同上田蚡辭不能滿觴灌夫怒西漢亙範持節都督青徐與徐州剌史鄒岐爭屋欲斬岐坐免復為兗州剌史屬鎮北將軍呂昭範與妻曰我寧作諸卿向三公長屈耳不能為呂屈也妻曰君前欲斬徐州衆人謂君難為作下今復羞為呂屈是復難為作上魏志曹爽傳樊世本氐豪佐秦王健定關中謂猛曰吾輩耕之君食之耳猛曰非徒使君耕之又將使君炊之通監晉哀紀劉琨曰吾枕戈待旦志梟逆虜常恐祖生逖先吾著鞭耳晉書互見尚氣趨事赴功齊高德政恆以精神凌逼人通監陳高祖王彬謂王敦曰卿昔歲殺兄今又欲殺弟耶本傳傳記杜預書告兒古詩有書借人為可嗤借書送還亦可嗤殷藝小記集譖下謾上恆其心術柳罵尸蟲本朝王荊公在臺閣侍從時每言唐太宗今諫官隨宰相入閣最切於政道後世所當行也及入司政事而孫莘老李公擇在諫職二人者熟荊公此論遂列奏請舉行之荊公不可曰是又益兩參知政事也呂氏家孰記互入私意經言念君子溫其如玉詩小戎溫溫恭人維德之基詩即之也溫語史溫顏和辭承上接下無所失意西漢韓王信傳互入和易向寵性行淑均諸葛亮出師表何充為劉惔所貴每云見次道飲令人欲傾家釀言其能溫克也晉書王景文情度淹粹宋泰始起居注集夷雅之體無待韋絃王文憲集序互入不待矯揉白璧無瑕玷孟浩然經方命圯族書堯典注言鯀性很戾厥心疾狠不克畏死書酒誥勇而無禮則亂語泰伯史富辰曰心不則德義之經為頑口不道忠信之言為嚚左僖二十四年不可教訓不知話言告之則頑舍之則嚚傲很明德以亂天常謂之檮杌左文十八智伯曰難將由我我不為難誰敢興之通監周紀天為剛德猶不干時況在人乎左文五年熊虎之狀豺狼之聲左宣四年狼子野心左昭二十七年膠西王為人賊盩言其性賊害而很戾西漢膠西王傳貌很自將西漢王莽傳很如羊西漢項羽傳灌夫曰今日斬頭穴胸何識程李西漢本傳用氣自行多所陵折東漢馬援傳羊聃以很戾為瑣伯晉書傳記符生粗暴無賴祖洪甚惡之生無一目年七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自剌出血曰此亦一淚也崔鴻十六國春秋本朝睅目知誰嗔皤腹空自脹東坡詩經從容以和書君陳載色載笑匪怒伊教詩泮水輯柔爾顏詩抑君子和而不流記中庸夫敬以和何事不行記樂記子冉雍使其臣如借家語和者大同於物物無得傷閡者遊金石蹈水火皆可也列黃帝薰然慈仁謂之君子莊無責於人人亦無責焉莊山木史為霽威嚴西漢魏相傳溫顏和辭承上接下無所失意西漢韓王信傳互入溫粹臣生與人無分爭通監漢武紀粲然有文以相接歡然有恩以相愛漢書鄭當時與官屬言若恐傷之西漢本傳卓茂自束髮至白首與人未嘗有爭競通監漢光武紀性惟遲緩與人無傷後漢孔融傳夷粹無競唐書沈傳師傳樂廣性沖約清遠與物無競通監晉惠紀集溫渥浹輿隸顏延年湖田詩陽和熙熙貯在顏間睦其仲季施及鄉黨含光不曜煦物如春並劉賓客尊己者敬之如臣事君下己者慈之如母畜子敵己者友之如兄弟無不得忐者也柳文意氣自生春高達夫本朝不立異以為高不逆情以干譽歐文趙清獻公為人和易與人言如恐傷之東坡撰公神道碑樂易向人無不可蘇子由文拍拍滿懷俱是春邵堯夫經宜兄宜弟詩寥蕭伯氏吹塤仲氏吹箎詩何人斯雍雍喈喈詩卷阿妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥詩棠棣互入閨門父子篤兄弟睦夫婦和家之肥也記禮運睦於父母之黨記坊記史是謂鳳凰于飛和鳴鏘鏘左萬石君居家子孫申申僮僕欣欣西漢石奮傳魏楊播及弟椿津家世孝友緦服同爨男女百口無間言通監梁高祖紀崔氏四世緦麻同爨唐書高崇文七世不異居開元中再表其閭唐書本傳元暐三世不異居家人怡怡如也同上集塤箎鳴自合杜詩本朝劉君良纍代義居尺布斗粟無私焉續世説經不惟好異書畢命在彼無惡在此無斁詩無怨無惡詩假樂君子行禮不求變俗記曲禮下毀方而瓦合記儒行注去己之大圭角與人小合也修其教不易其俗齊其政不易其宜記王制無可無不可語微子在邦無怨在家無怨語麻冕禮也今也純儉吾從衆語子罕鳥獸不可與同群吾非斯人之徒與而誰與語微子子柳下惠不羞汙君不辭小官雖袒裼祼裎於我側爾焉能浼我哉孟公孫丑上又見萬章下魯人獵較孔子亦獵較孟萬章下和其光同其塵老道沖與物委蛇而同其波莊庾桑楚聖人處物不傷物不傷物者物亦不能傷也唯無所傷者為能與人相將迎莊知北遊人之所惡者吾亦惡之荀史聖人與衆同欲是以濟事左成六年子産曰求逞於人不可與人同欲盡濟左昭四年袁盎病免居家與閭里浮沉相隨行史記袁盎傳將相調和則士豫附史記陸賈傳無乖剌之心西漢杜欽傳不夷不惠可否之間聖賢居身之所珍也通監漢殤紀卓茂曰人生焉能高飛遠走不在人間耶東漢本傳無彼此於人通監晉武紀集聖人不凝滯於物而能與世推移衆人皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而啜其醨何故深思高舉自令放為楚辭史記本傳云何故懷瑜握瑾與一世同其波流而悔吝不生嵇叔夜書時無間言陳子昂集含光混世貴無名何用孤高比雲月李白集隨時任其舒卷與物同其波流駱賓王願為同社人雞豚燕春秋韓文不為崖岸斬絶之行同上忍汙雜囂譁柳文恭其體貌遜其言辭柳文楊晦之書虯龍未化時魚覩同一波孟東野眼看人盡醉何忍獨為醒王無功惠和得衆司空表聖文或慮雷同何傷瓦合白傳集本朝借君拍板與門槌我也逢場作戲東坡集物有圭角剌人眼目亦易玷缺故君子處世常渾然天成則人不厭棄矣龜山語録經損益盈虛與時偕行易損卦時止則止時行則行易艮卦時有泰否用有行藏易略例國有道其言足以興國無道其默足以容中庸君子之於禮也有直而行也有曲而殺也記禮器道隆則從而隆道汙則從而汙記檀弓上邦有道危言危行邦無道危行言孫憲問君子哉遽伯玉邦有道則仕邦無道則可卷而懷之語衛靈公寧武子邦有道則知邦無道則愚語公冶長子時詘則詘時伸則伸荀仲尼史晏平仲在朝君語及之則危言語不及之即危行國有道則順命無道則衡命以此三世顯名於諸侯史記本傳君子得其時則駕不得其時則蓬纍而行史記老子傳乘流則逝兮得坎則止一作坻史記賈生傳從俗浮湛與時俯仰西漢司馬遷傳書中云浮沉王戎作吏部與時浮沉晉書集孔隨時而行藏遽與國而卷舒潘安仁西征賦伸屈須為蠖窮通莫問龜白樂天集互入委順因俗為禮人用愛戴唐文粹經其次致曲曲能有誠記中庸子川雖曲而動諸海塗雖曲而通諸夏楊子史河千里而一曲公羊傳記孟嘗君每與客坐語屏風後常有侍史主記所與客語知其親戚居處客去後使謝餽無所遺失春秋後序集情深禮至款密重復劉賓客集本朝右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質東坡啓古之聖賢欲行其意必有以曲成之未嘗直情而徑行也東坡集經我聞其聲不見其身詩何人斯箋云何故近之我館庭使我得聞女之聲音不得覩女之身乎子訑訑之聲音顏色距人於千里之外孟告子是絶物也孟史趙禹為吏以來舍無食客公卿相造請禹終不行報謝務在絶知賓友客之請孤立行一意而已西漢本傳鄧榮為人矜潔自貴於人少所與東漢本傳經好人之所惡惡人之所好記大學子吾聞言於接輿大有徑庭不近人情莊史諸勢在己之右必陵之士在己之左愈貧賤尤益敬與鈞史記灌夫傳舛午膠戾乖剌西漢劉向傳師古曰志意不和各相違背趙禹孤立行一意而已西漢本傳上文入絶物嚴延年為河南守衆人言當死者一朝出之言當生者詭殺之前漢違時絶俗為激詭之行東漢范丹傳沈懷文素不飲酒又不好戲調謝莊常戒懷文曰卿每與人異亦何可久懷文曰吾少來如此豈可一朝而變非欲異物性所得也通監宋世祖阮瞻素執無鬼論物莫能難晉書本傳集異質忌處群孤芳難寄林韓文互入警戒冰雪之交衆裘我絺溽暑之鑠衆從之風而我從之火柳文本朝夫面垢不忘洗衣垢不忘浣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書豈其情也哉老蘇辨姦論經直往則違易略例上注不揆則往彼必相違互入踈略上文云見情者獲有直情而徑行者戎狄之道也記檀弓下子非能好先王之樂也直好世俗之樂耳孟梁惠王下史大決所犯傷人必多左襄三十年平恩侯許伯入第蓋寬饒往賀視屋而歎曰美哉富貴無常此如傳舍所閲多矣君侯可不戒哉因起趍出西漢蓋寬饒傳楊惲曰事何容易脛脛者未必全也脛脛直貌也西漢本傳
