body:
  text: 早達史桑弘羊年十三為侍中史記本傳甘羅十二為秦上卿本傳霍去病年十八為侍中西史張辟強為侍中年十五西漢陳咸年十八為左曹二十餘為御史中丞蕭育傳終軍年十八為博士後為諫議大夫漢書賈生矯矯弱冠登朝班固敘傳下賈誼年二十餘為博士超遷歲中至太中大夫本傳鄧禹為大司徒封酇侯食邑萬戶時年二十四後漢本傳諸葛恪領丹陽太守賜戟武騎三百拜軍令作鼓吹導引歸家時三十二王僧綽遷侍中時年二十九晉本傳王儉年十八遷尚書右僕射領吏部本傳荀羡監徐州軍年二十八中興方伯未有如羡少者晉書傳記習鑿齒吏才不常宣武器之未三十用為荊州治中謝箋曰不遇明公荊州老從事耳世説互見受知荀中郎年二十已為荊府都督高氏小史崔湜弱冠進士及第其初執政方二十至宰輔年始三十翰林盛事劉晏以神童為祕書省正字唐明皇雜録集楊炯年十一待制弘文館楊炯渾天賦序勝帶官王城選樂府升天行宦一作官三十擁旄誰不羡劉長卿年未四十班於赤墀之下簪筆持簡為王近臣崔祐甫議弱冠厲羽翼儀初升夏侯湛誄弱冠步鼎鉉潘正叔贈河陽榮祿何妨早甘羅亦小兒韋應物經説築傳巖之野惟肖爰立作相書説命上史無閥閲功勞特以一言寤意數月取宰相封侯世未嘗有也通監漢武紀公孫洪起白衣為天子三公西漢本傳賈誼為博士超遷歲中至太中大夫本傳車千秋以一言寤意旬月取宰相封侯本傳主父偃上書朝奏暮召歲中四遷本傳柳粲及第不四年為宰相通監唐昭宗張柬之為洛州司馬姚崇薦之曰其人老唯亟用之即日召拜平章事本傳喬琳為懷州刺史上求人於不次之地張涉舉琳為相張涉傳劉展曰展自陳留參軍數年至刺史可謂暴貴矣本傳路岩淮南支使為御史不出長安城十年至宰相並通監傳記駢角挺生一朝暴貴史通董卓徵荀爽到府三日策拜司空起岩穴九十五日而為台司荀氏家傳尚父之帥河中也咸寧郡王渾公佐之不十年按控數州繼踐台庭郭子儀家傳互入僚屬集一佐成湯遂荷阿衡之號選箋釋褐而傅楊雄解嘲千秋一日九遷荀爽十旬遠至任彥升為范尚書表掉頭稱俊造翹足取公卿白樂天集本朝以一日而蓋天下東坡史絳縣人七十有三年矣趙孟仕之使為君復陶主衣服之官以為絳縣師左襄三年束帛加璧安車駟馬迎申公弟子二人乘鞀傳從時已八十餘老天子以為中大夫史儒林傳韋賢年七十餘為丞相西漢本傳公孫弘年七十以賢良徵為博士至宰相封侯本傳鄭武公年過八十入為周司徒晉劉毅傳張柬之以賢良召時年七十餘矣狄仁傑薦曰荊州長吏張柬之雖老宰相材也姚崇又薦曰其人老唯亟用之即日召拜平章事年已八十唐書本傳傳記卓茂年七十餘拜太傅東觀漢記集飄飄蘇季子六印佩何遲杜詩紫綬映晚年同上共憐芳意晚秋露未須漙劉長卿古人多重晚年榮杜荀鶴集本朝梁灝年八十二歲雍熙二年狀元及第謝啓云白首窮經少伏生之八歲青雲得路多太公之二年後終祕書監卒年九十餘陳正敏遁齋間覽經孔子曰吾少也賤故多能鄙事語史主父偃曰結髮遊學四十餘年身不得遂親不以為子昆弟不收賓客棄我我厄日久矣史本傳衛青曰人奴之生得母笞罵足矣本傳趙高世世卑賤蒙恬傳舄姓莊故越之鄙細人也陳軫傳欒布窮困賃傭於齊為酒家保數歲為人所掠賣為奴於燕史虞卿非窮愁亦不能著書以自見於世本傳互入著書及愁兩類寄食於漂母無資身之策受辱於跨下無兼人之勇通監高紀家貧傭作前匡衡傳陳涉甕牖繩樞之子氓隸之人遷徙之徒也賈誼傳生為愍隸表言為徒隸可哀愍賣庸於齊欒布傳與人傭耕陳勝傳閭閻之隸臣武五子傳顏師古曰賤也從人寄食韓信傳攻苦食啖叔孫通傳並西漢兩人所出微謂竇廣國兄弟陳實出於單微通監黃憲世貧賤父為牛醫後漢本傳郭泰世貧賤早孤母欲使給事縣廷林宗曰大丈夫焉能處斗筲之役乎本傳衛青出於奴虜通監漢武紀身非王公大人名族之後同上韓安國起自徒中朱買臣出於幽賤并以才守本邦漢靈紀魏高允曰臣少賤唯知農事通監劉文靜與裴寂曰吾二人者可終羈賤乎隋書互入自負西川節度使陳敬瑄素賤微報至蜀蜀人皆驚莫知為誰唐僖宗魏知古本起小吏因姚崇引薦以至同為相崇意輕之唐玄宗集布衣單門文選朝不坐宴不與言賤也白帖唐白志貞骨徒雜類出自微賤柳文本朝韓全義家世寒史失其先世孔帖天窮無所逃一作遁東坡經乃求千斯倉乃求萬斯箱詩小雅甫田富潤屋記大學富有曰苟美矣語子重裘纍茵而坐公孫子晉楚之富不可及也孟子虞氏梁之富人高樓臨大路設樂陳酒擊博樓上列子有富厚丘山之積荀子富國史高臺深池撞鍾舞女左昭二十管仲相齊富擬公室史記夫倮鄙人牧長清窮鄉寡婦禮抗萬乘名顯天下豈非以富耶貨殖猗頓傳無鹽氏富埒關中貨殖傳金石絲竹之聲不絶於耳俳優侏儒之笑不乏於前主父偃傳富者衆之怨也通監漢宣紀乘堅策肥曳絲履縞西漢食貨志藏鏹千萬同上鍾鼓帳帷不移而具賈山傳高訾富人地理志言多財也家資纍巨萬杜周傳任氏善富者數十世貨殖傳田園極膏腴田蚡傳奉養極為鮮明王吉傳南金和寶冰紈霜縠之積盈仞珍藏嬙媛侍兒歌童舞女之玩充備綺室范曄官者傳財寶足富數世通監漢桓帝紀和嶠富擬王者而至吝晉本傳石崇絲竹盡當時之選庖廚極水陸之珍同上高陽王雍富貴冠一國出則儀衛塞道路歸則歌吹連日夜一食直錢數萬李崇富埒於雍而性儉嗇嘗謂人曰高陽一食敵我千日河間王琛每欲與雍爭富謂章武王融曰不恨我不見石崇恨石崇不見我融素以富自負歸而惋歎臥疾三日王繼曰卿之貨財計不減於彼何為愧羡乃爾融曰始謂富於我者獨高陽耳不謂更有河間繼曰卿似袁術在河南不意世間復有劉備耳梁高祖紀郭子儀月入俸錢二萬緡私産不在焉府庫珍貨山積唐帝紀白承福家甚富飼馬用銀槽通監晉高祖紀傳記居則廣廈邃房下羅幃來清風倡優侏儒處前迭進而諂諛燕則鬭象棋而舞鄭女綵色以淫目流聲以虞耳説苑説善篇石崇為客作豆粥咄嗟便辦世説上明皇問富人王元寶家財多少對曰請以一縑繫陛下南山一樹南山樹盡臣縑未窮李元獨異志郭況纍金數億庭中起高閣厝衡石於其上以稱量珠玉也謂為瓊廚金窟子年拾遺記集致崑山之玉有和隨之寶垂明月之珠服太阿之劍李斯書錦牆雕柱傅玄正都賦藏鏹巨萬選左太沖蜀都賦富與地侔資選楊雄羽獵賦鞍馬光照地選鮑明遠詠史詩賓從皆珠玳鞍馬悉輕肥選范彥龍詩身被輕暖口厭百味選曹子建目極華麗耳倦絲竹同上流懸藜之夜光綴隨珠以為燭選西京賦富埒陶白資巨程羅山擅銅陵家藏金穴出平原而聯騎居里閈而鳴鍾選廣絶交論青樓臨大路選樂府美女行玉饌薪燃蠟椒房燭用銀元微之北里富熏天高樓夜吹笛杜詩金丸落鳴鳥鳴一作飛李太白集狐裘獸炭酌流霞同上寶蓋雕鞍金絡馬蘭窗繡柱玉盤龍繡柱璇題粉壁映鏘金鳴玉王侯宮駱賓王庳車軟輿香衫細馬白樂天當今甲第與王宮織成步障錦屏風綴珠陷鈿帖雲母五金七寶相玲瓏貴主冠浮動親王轡鬧裝金鈿相照耀朱紫間熒煌毬簇桃花騎歌巡玉葉觴窪銀中貴帶昂黛內家粧並同上睡鴨香爐換夕燻李商隱開瓊筵以坐花飛羽觴而醉月唐文粹咳唾萬金意氣驕滿路鞍馬光照塵並同上羅幃送上七香車寶扇迎歸九華帳王維集互見娶妻黛娥陳二八珠履列三千舞轉回紅袖歌愁斂翠鈿滿堂開照耀分座儼嬋娟油額芙蓉帳香塵玳瑁筵繡旗隨影合金陳似波旋溫飛卿瑤簪錦裾千萬侍女杜牧之本朝君家稻田冠西蜀搗玉揚珠三萬斛傾家取樂不論錢散盡黃金如轉燭坡詩經無衣無褐何以卒歲詩七月終窶且貧莫知我艱詩北門貧者不以貨財為禮記曲禮上傷哉貧也生無以為養死無以為禮禮記儒有一畝之宮環堵之室篳門圭竇蓬戶甕牖易衣而出并日而食記儒行一簞食一瓢飲語回也屢空語子衣褐捆屨織席以為食孟子滕文公上原憲居魯蓬戶不全桑以為樞而甕牖上漏下濕莊子曾子居衛三日不舉火十年不製衣正冠而纓絶斂襟而肘見同上孔子曰我諱窮久矣而不免命也莊秋水莊子衣大布而補之魏王曰何先生之憊耶莊子曰衣敝履穿貧也非憊也莊山木稿項黃馘莊列禦寇捉襟而肘見納屨而踵決莊讓王篇蓬戶桑樞淮南子少有之者貧至無有者窮荀大略姚義困於窶房元齡曰傷哉窶也文中問明家有長卿壁立之貧腹懷翳桑絶糧之餒抱朴子暢玄篇史室如垂磬左傳國語猶有食色左昭十八王章為諸生學長安病無被臥牛衣中漢書竇少君家貧為人所掠賣傳十餘家史外戚傳東郭先生貧困孤寒衣敝履不全行雪中履有上無下足盡踐地史滑稽傳篳露藍蔞服虔曰藍蔞言衣敝壞其蔞藍藍然也史楚世家家貧落魄史酈生傳注晉灼曰落薄落託義同也貧人常衣馬牛之衣而食犬彘之食前漢董仲舒傳司馬相如家徒四壁立自著犢鼻禈本傳積土為室編蓬為戶東方朔傳菜食不厭足也衣又穿空可為酸鼻鮑宣傳衣敝履空同上無立錐之地張良傳始居約時張耳傳貧者短褐不全貨殖志糲餐之食瓜匏之羹劉向新序並西漢伏臘無糟粳粳一作粕東漢明紀衣無兼副祭彤傳搏手困窮龐參傳甑中生塵釜中生魚范冉傳並東漢環堵蕭然不蔽風日短褐穿結簞瓢屢空晉陶僭傳韓信家貧常從人寄食通監西漢高祖紀崔林為塢令貧無車馬單步之官魏志盧攜曰貧者磑蓬實為麵蓄槐葉為齏通監唐僖宗紀傳記李陽冰家無宿舂之儲出無代步之乘李陽冰論朝營夕用故無宿給語溪記集無衣裘以御冬兮恐溘死而不自得見乎陽春楚辭自余為人逢運之貧簞瓢屢罄絺綌冬陳翳翳柴門事我宵晨陶僭自祭文門無結駟之迹堂無好事之客樵蘇不爨清談而已選應仲璉書外望無寸祿內顧無斗儲左太沖詠史詩薇藿弗充虛皮褐猶不全選曹子建贈徐幹下貧無兼養之業中産闕洊食之資選策丈分鴈鶩之稻粱沾玉斝之餘瀝選絶交論飢寒無甘旨之資選啓原憲懸磬之居值天雨不已室宇漸而作漏堂館洽而為泥應璩書釜遲鈍而難沸薪鬱絆而不然束皙家貧賦寥寂守窮巷幽獨臥空床陳子昂集蠨蛸在堂蟋蟀在戶同上海圖坼波濤舊繡移曲折天吳及紫鳳顛倒在短褐杜詩棲托難高臥飢寒迫向隅經年在茅屋妻子衣百結不爨井晨凍無衣床夜寒囊空恐羞澀留得一錢看蓬蒿翳環堵才名四十年坐客寒無氈故人供祿米鄰舍與園蔬窮愁但有骨鶉衣寸寸針處處是窮途補綻才過膝無寸數百針經日無煙火注王褒家貧並杜詩鶉服長悲碎蝸廬未卜安駱賓王糟粳不贍甘旨之養屢空簞食無資朝夕之歡寧展同上無簞食無瓢飲無所取資則餓而死韓文答李翱書使吾面目可憎語言無味十日營一炊蕭條資用盡濩落門巷空吾徒猶在陳僮僕誠自鄶囊空甑倒誰救之我今一食日還併冬暖而兒號寒年登而妻啼飢並韓文無一釐之地以處其子孫無一畝之宮以聚其族屬柳文蠶絲盡輸稅機杼空倚壁闕滫瀡之養乏庾釜之蓄並同上門庭多草廚少煙白樂天集蕭條殘活計生計方落然床單食味薄養無晨昏膳隱無伏臘資天寒身上猶衣葛日高甑中未拂塵草合門無徑煙銷甑有塵階庭寬窄才容足牆壁高低粗及肩並同上居惟四壁飲才一瓢白帖蓬門下客篳戶輕生同上望一金之助已有沒齒之難皮日休盡日一菜食窮年一布衣同上廚灶無青煙刀機生緑蘚李太白集甕頭寒絶酒灶額冷無煙姚少監永日廚煙絶同上拄杖倚田尋野菜封書乞米趁朝炊張文昌家貧長畏客同上牽衣肘見步雪履穿王維集鬢邊雖有絲不堪織寒衣賈浪仙夜學更須憑雪照朝廚爭奈絶煙何方雄飛終朝之雨流潦下停既夕之天列宿上羅李元賓生事萍無定愁心雲不開錢起文管寧木榻坐己膝穿孔伋縕袍行而肘見李義山産薄一釐家徒四壁司空表聖文甘脆朝不足簞瓢夕屢空孟浩然樵蘇莫爨粳籺靡資唐文粹飢不飽菜寒無襲衣孫樵文拙於生事舉家食粥來已數月今又罄竭祗益憂煎惠及少米實濟艱勤顏魯公乞米帖居無僕妾井臼弗任藜菽不給陶徵士誄枯涸方窮轍生涯不繫舟元微之集一瓢顏巷日空高杜牧之家徒四壁身無一簪同上地爐不暖柴枝濕杜荀鶴明朝曬犢鼻方信阮郎貧李商隱司馬相如與文君久益貧以所著鷫鸘裘貫酒西京雜記本朝其家空短孔帖出無車與馬但踏車馬塵歐公集破屋仰見星窗風冷如鎪破硯裂冰澌敗席薦霜笴並同上破窗孤燈冷炭凍席炭一作灰蘇老泉我貧如飢鼠長夜空咬齧瓦池研灶煤葦管書柿葉坡詩齏鹽冷落空柸盤欒城集我貧無一錐所向皆四壁後山集衝風窗自語涴壁蟲成字同上兒餒嗔郎罷妻寒怨藁砧唐詩倒身無著處呵手不成溫同上經祭器衣服不假記曲禮下始有曰苟合矣少有曰苟完矣語子孔子曰回家貧胡不仕對曰回有郭外之田五十畝足以給飦粥郭內之田十畝足以為絲麻回不願仕莊子讓王篇疏屬之南汾水之曲有先人之弊廬在可以避風雨有田可以其饘粥彈琴著書講道勸義自樂也文中子事君篇史子罕曰吾儕小人皆有闔廬以辟燥濕寒暑左襄十七鄭玄戒子益恩曰家今差多於昔後漢本傳互入易足資計差溫唐儉
