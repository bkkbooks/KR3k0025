body:
  text: 門生史鄭弘為太尉時舉將第五倫為司空班次在下每正朔朝見弘曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間東漢天下之人非家吏則門生也吳志孫策與袁術書宋弘薦亙談帝令談鼓琴愛其繁聲宋弘聞之不悅伺談內出正朝服坐府上遣吏召之談至不與席而讓之且曰能自改耶將令相舉以法乎談頓首辭謝良久乃遣之後帝使談鼓琴談見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦亙談者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也通鑑東光武紀楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎漢紀馮裔孫裴皞門生也清泰初裔孫知舉引新進士謁謝皞皞曰門生門下見門生五代史傳記唐李逢吉知貢舉榜未放而入相及第人就中書見座主時謂好腳迹門生因話録集凡號門生而不知恩之所自者非人也柳文商山老皓雖休去終是留侯門下人白傅集令公桃李滿天下何用堂前更種花同上至今青雲人猶是門下客高達夫徐孺子於舉主之喪徒步千里而行一祭唐崔祐甫廣朋友喪議鸞鳳杞梓舉集權公之門唐楊嗣復作權載之集門館舊桃蹊劉長卿本朝李翰於和凝榜及第後與座主同任學士凝作相翰為承旨適當批詔次日於玉堂輒開和相舊閣悉取圖書器玩留詩云座主登庸歸鳳閣門生批詔主鰲頭玉堂舊閣多珍玩可作西齋潤筆不玉壺清話史胡廣與故吏陳蕃陳咸並為三司蕃每朝會稱疾避廣時人榮之東漢梁冀乘勢橫暴所在怨毒朱穆自以冀故吏奏記諫不納通鑑漢桓紀劉晏沒後掌財賦有聲者多晏之故吏也唐德宗紀吉黃為長陵令時科禁長吏擅去官黃聞司徒趙溫薨自以為故吏違科奔喪魏志常林傳袁氏植恩四世舊吏遍於天下袁紹傳殷浩被黜放卒故吏顧悅之上疏訟浩疏奏追復浩本官晉史本傳劉晏為度支鹽鐵轉運使其商榷財用之術者皆一時之選故沒後二十餘年韓洄元琇裴腆包佶盧貞李衡相繼分掌財賦皆晏門下唐史本傳傳記鄧訓故吏念訓常所服藥北州少之又知訓好青泥封書從黎陽步推鹿車於洛陽市藥還過趙國易陽并載青泥至上谷遺訓其得人心如是東觀漢紀見東漢本傳注王戎故吏多至大官相逢戎輒下道避之竹林七賢論本朝故吏滿諸方欒城集子聖人用之則為官長老子知其雄章史黃霸守穎川許丞老病聾督郵白欲去之霸曰許丞雖老尚能拜起送迎重聽何傷且善助之毋失賢者意西漢本傳陳遵入公府日出醉歸曹事數廢西曹請斥之大司徒馬宮重遵謂西曹曰此人大度士奈何以小文責之本傳光武戒任延曰善事上官通鑑光武紀婁師德調江都尉楊州長史盧承業異之曰子台輔器也當以子孫相諉詎論僚屬一作吏哉唐史本傳傳記牛奇章公帥維楊杜牧在幕中夜微服逸遊後牧以拾遺召公以縱逸為戒牧始隱諱公取一篋皆街子報帖云杜書記平善芝田録集裹以章服揖拜上官嵇康絶交書賀其得賢主人韓文拜迎官長心欲碎唐文粹本朝自言官長如靈運坡經惟暨乃僚罔不同心書説命六卿分職各帥其屬周官謹簡乃僚冏命其屬六十禮小宰一曰官屬以舉邦治大宰以官府之六屬舉邦治禮小宰史參代何為相擇郡縣吏長大訥於文辭謹厚長者為史言文刻深欲務聲名輒斥去之西漢曹參傳幽州牧朱浮年少有俊才欲厲風迹收士心辟召州中名宿皆引置幕府通監漢光武梁商為大將軍辟漢陽巨覽上黨陳龜為椽屬李固為從事中郎楊倫為長史漢殤紀琅琊王睿辟椽屬百餘人時人謂之百六椽晉懷紀郤超常為亙溫謀主謝安與王坦之見溫溫使超臥帳中聽其言風動帳開安笑曰郤生可謂入幕之賓矣晉簡文紀宜數引見佐史相見不數則彼我不親不親無因得盡人情人情不盡復何由知衆事也宋太祖紀房元齡收采人物置之幕府唐高祖紀馬燧為河東節度使辟兗州人張建封為判官唐代宗紀路巖佐崔鉉於淮南為支使不十年至宰相唐懿宗紀鄭從讜充河東節度使自擇參佐從讜奏以長安令王調為節度副使前兵部員外郎史館修撰劉崇龜為節度判官前進士劉崇魯為推官人謂之小朝廷言名士之多也唐僖宗廣明元年韓滉在二浙所辟僚佐各隨所長無不得人唐德貞元二年並通鑑竇憲平胸奴班固傅毅之徒皆置幕府以典文章東漢本傳晉陶侃鎮武昌軍殷浩庾翼等皆為佐史時武昌號為多士晉陶侃傳庾亮在武昌諸佐史商浩之徒登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺便據胡床而坐與浩等談詠本傳杜恕舉劉毅為功曹月餘日三魏稱焉為之語曰但聞劉功曹不聞杜府曹王隱傳亙溫遊龍山僚佐畢集有風吹孟嘉帽墮嘉不之覺孟嘉傳羊祜開府纍年謙讓不辟士始有所命會卒不得除署名故參佐劉儈等箋詣杜預曰生前所辟之士便當隨例放棄者乎乞蒙列上本傳陶侃見諸參佐或以談戲廢事乃取其摴蒲戲具悉以投于江本傳殷浩善玄言征西將軍庾亮引為記室參軍本傳晉書王徽之有俊才少為桓沖參軍從沖值雨便下馬入沖車中謂沖曰豈有獨擅一車不容國士乎世説太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾會以中郎任大將軍管記室事為心腹之任時人謂之子房魏志王儉用庾杲之為衛將軍長史蕭緬與儉書盛府元僚每難其選庾景行泛緑水依芙蓉何其麗也時人以儉府為蓮花池故緬書美之南史齊庾杲之傳蔡興宗謂諸子曰沈記室人倫師表宜善師之沈約傳元稹長於詩書在越時辟竇鞏鞏工於詩與之酬和號蘭亭絶唱唐本傳許孟容韓愈皆奏署幕府有文章傳于時張建封傳烏重胤待官屬有禮當時有名士如溫造石洪皆在幕府本傳烏重胤鎮河陽求賢者以自重本傳幕府六十餘人後皆為將相顯官郭子儀傳晏部吏在千里奉教如目前劉晏傳裴度充淮西宣慰招討處置使仍以刑部尚書馬總為副太子右庶子韓愈為彰義行軍司馬司勳員外郎李正封都官員外郎馮宿禮部員外郎李宗閔等為兩史判官書記裴度傳令狐楚為太原掌書記鄭儋在鎮暴卒不及指撝後事軍中喧譁將變夜忽數十騎持刃迫楚至軍門諸將邀之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書薛收與房杜處腹心之寄薛元敬謹畏未嘗申款曲如晦曰小記室不可得而親不可得而踈新唐書本傳左肅機皇甫公義檢校沛王府長史引韋思謙為同府倉曹謂思謙曰公豈池中之物屈公為數旬之客以望此府舊唐書韋思謙傳新唐書云以重吾府尚父之帥河中也咸寧郡王渾公佐之不十年按控數州繼踐台庭郭子儀家傳婁師德調江都尉楊州長史盧承業異之曰子台輔器也當以子孫相諉詎論僚吏哉本傳裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而遠取居易請從此辭並唐史傳記歷城北有使君林魏正始中鄭公愨於三伏之際率賓僚避暑于此取大荷葉盛酒以簪刺令與柄通屈莖上輪囷如象鼻傳吸之名為碧筒歷下皆效之酒味雜蓮氣香冷勝於他酎張君房脞説太傅府有三才裴邈清才潘陽仲大才劉慶孫長才語林集婉婉幕中畫謝宣遠張子房詩襄陽幕府天下異杜入幕如孫楚雲幕隨開門同上宜在上位託於幕府韓文與崔群書書記之任亦難矣元戎總齊三軍之事統理所部之氓以鎮定邦國贊天子施教化而又與外賓客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記非閎辨通敏兼人之才莫宜居之然皆元戎自辟然後命於天子苟其帥之不文則其辟或不當亦其理宜也韓文有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也送楊儀之支使歸湖南序從軍古云樂談笑青油幕同上長慚典午非材識韓為行軍司馬簉俊傑之末迹廁牒計之下列柳文奮六翮翔千里以為轅門大府之重參帷幕之任董龜虎之威夷俗敬畏革面受事同上不羡君官羡君幕幕中收得阮元瑜白傅集冰壺幕下清韋應物詩羽儀吾府唐文粹非惜幕間一足地不容也皮日休集賓於幕吏之上同上陳琳書記好王粲從軍樂早晚歸漢庭隨公上麟閣劉長卿以文行謀畫雍容於幕府之間白傅集學業才畫堪置幄中載筆在幕名已重同上少年諸侯府杜牧之望府紅蓮已減花羅隱集本朝范文正公言幕府辟客須可為師者乃辟之雖朋友亦不可辟遺事謝希深歐陽永叔官洛陽時同遊嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以廚傳歌妓至且勞之曰山行良勞當少留龍門府事簡無遽歸也聞見録天聖明道中錢文僖留守西都謝希深為通判歐陽永叔為推官尹師魯為書記梅聖俞為主簿皆天下之名士聞見録幕中俊乂間刀筆帳下驍雄冷劍鐔臨川集幕府稱上賓東坡與劉莘老詩經我雖異事及爾同僚詩大雅板同寅協恭書皋陶謨五曰官聯以會官治禮史同官為寮吾嘗同寮敢不盡心乎左文七直不疑為郎同舍有告歸誤持同舍郎金去前漢本傳陳重為郎同舍郎有告歸寧者誤持同舍郎袴以去後漢蕭瑀性狷介與同僚多不合通鑑唐太宗紀集濁水行泥清路塵還曾同制掌絲綸韓文册庭嘗接武書殿忝連衡劉賓客史唐李絳相德宗人言其私同年許季同德宗問之曰人於同年固有情乎絳曰同年乃九州四海之人偶同科第或登科然後相識於情何有若其果才雖在兄弟子姪之中猶將用之況同年乎通監唐紀傳記神龍以來杏園宴後於慈恩寺塔下題名同年中推善書者紀之托言崔沆為主罰録事同年盧彖俯近關宴請假往洛及同年宴于曲江亭彖微服縱觀為團司所發托言進士榜出謝後便往期集院狀元與同年相見請一人為録事其餘主宴主酒主樂探花主茶之類咸以其年辟之俱捷謂之同年既捷列名於慈恩寺塔謂之題名大宴曲江亭謂之曲江會在關試後謂之關燕同上大中以來禮部放榜歲取二三人姓氏稀僻謂之色目人亦曰榜花南郊新書本朝同芳晉堂桂共聽禹門雷趙清獻通家不隔同年面坡詩史漢高祖與盧綰同日生里中持羊酒賀兩家西漢本傳鍾瑾與李膺同年俱有聲名通監漢質紀孫權母曰公瑾周瑜與伯符孫策同年小一月耳我視之如子也汝謂孫權兄事之吳志周瑜傳注江表傳孫策與周瑜同年獨相友善有無通共同上史窣干即思明也與安祿山先後一日生及長相親愛皆為互市牙郎通監唐元宗集許遠與張巡同年生月日後於巡呼之為兄韓退之書中丞傳集何事共年壬子歲老於崔相及劉郎白侍郎集注白與崔劉同年本朝同甲惟君尚黑頭坡次周長官詩文潞公保洛日年七十八同時有司馬旦等三人皆年七十八嘗為同甲會潞公詩曰四人三百十二歲況是同生丙午年招得梁園為賦客合成商嶺採芝仙清談亶亶風盈席素髮飄飄雪滿肩此會從來誠未有洛中因作畫圖傳沈括筆談史司馬相如因客遊梁孝王令與諸生同舍史本傳陳重為郎同舍郎有告歸寧者誤持同舍郎袴以去東漢陸贄為翰林學士詔書一日數百起草如泉注曲盡事情同舍伏其能唐史集取笑同舍翁杜詠懷子申屠嘉兀者也而與鄭子産同師於伯昏無人莊德充符史鄭崇弟立與傅喜同門學相友善西漢鄭崇傳同門謂同師也經舊令尹之政必以告新令尹語史瓜時而往及瓜而代左莊八鄭子産疾謂子太叔曰我死子必為政惟有德者能以寬服民其次莫如猛昭二十蕭望之以韓延壽代已為馮翊而有能名出已之上故忌害之遂令御史案延壽在東郡時事竟坐棄市時望之為御史大夫見西漢韓延壽傳初郡守范津薦傅燮及津為漢陽與燮交代合符而去後傅燮傳徵班超還任尚代為郡都護尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮遠宜有以誨之通監漢和紀河東太守王邑被徵郡椽衛固及中郎將范先詣司隸校尉鍾繇請留之繇不從操曹以杜畿為河東太守鍾繇促王邑交符邑佩印綬經從河北詣許自歸衛固等使兵數千人絶陝津畿數月不得渡同上漢獻紀謝方明善治郡所至有能名承前代人不易其政必當改者則以漸移變使無迹可尋晉恭紀張軌病風以秦州刺史賈龕代之龕將受之其兄讓龕曰涼州一時名士威著西河何德以代之同上晉懷紀沙之汰之瓦石在後簸之揚之粳粃在前晉習鑿齒王延之代張緒為中書令何點曰後接之者實為未易齊書傅劌代劉元明為山陰令問元明曰願以舊政告新令尹南史集蘇州刺史例能詩西掖今來替左司劉夢得贈白樂天本朝後功掩前羞歐公詩古人重交代子孫不相忘王元之知徐州送交代劉戢之詩經勿疑朋盍簪易豫卦二人同心其利斷金同心之言其臭如蘭麗澤兌君子以朋友講習兌卦與我同志亦所不隱也書序喪亂既平既安且寧雖有兄弟不如友生詩棠棣惠而好我攜手同行北風自天子至於庶人未有不須友以成者伐木相彼鳥矣猶求友聲矧伊人矣不求友生朋友攸攝攝以威儀毛詩言朋友以禮義攝正朋友皆在他邦袒免歸則已儀禮喪服歸有主則止也主若幼小則未止朋友麻朋友雖無親有同道之恩相為服緦之絰帶君子不盡人之歡不竭人之忠以全交也曲禮上君子之接如水小人之接如醴君子淡以成小人甘以壞表記相觀而善之謂摩學記子夏曰離群索居亦已久矣檀弓下獨學而無友則孤陋而寡聞學記曾子曰朋友之墓有宿草而不哭焉曲禮下合志同方營道同術并立則樂相下不厭久不相見聞流言不信儒行有朋自遠方來不亦樂乎語學而晏平仲善與人交久而敬之公冶長孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣季氏子孔子曰與人交推其長者違其短者故能久也家語尹公之他端人也其取友必端矣孟責善朋友之道也離婁下友也者友其德也不可以有挾也萬章下合堂同席而坐莊相視而笑莫逆於心遂相與為友同交淺而言深者忠也淮南子齊俗訓交淺而言深是亂也齊俗訓史譬諸草木吾臭味也左襄二十二北宮文子曰周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也襄三十一廉頗與藺相如為刎頸交史藺相如傳不知其人視其友史馮唐論自關以東莫不延頸願交魯世家鄭當時年少官薄其遊知交者皆其大父行天下有名之士也本傳魏其灌夫兩人相引重相得甚歡無厭恨相知晚也史記一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見西漢鄭當時傳天下以酈寄為賣友為見利而忘義也本傳合從締交賈誼傳尹敏與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周惠施之相得也東尹敏傳適陳留則友符偉明遊太學則師仇季智之陳國則親魏德公入汝南則交黃叔度後郭泰傳交道之難未易言也世稱管鮑次則王貢張陳災其終蕭朱隙其末故知全之者鮮矣王丹傳禰衡唯善孔融楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數融亦深愛其才衡始冠而融四十遂與為交何顒與蕃膺袁紹結為奔走之交公沙穆來遊太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之間吳祐傳膠漆自謂堅不如陳與雷雷義傳交淺而言深者愚也崔駰傳華歆與邴原管寧為友時號三友為一龍歆為龍頭原為龍腹寧為龍尾魏志華歆傳程普曰與周公瑾遊如飲醇酎不覺自醉吳志嵇康阮籍山濤一見便為神交晉本傳呂安服嵇康高致每一相思輒千里命駕嵇康傳山濤與嵇康阮籍等為竹林之交著忘言之契山濤傳王戎少阮籍二十歲而籍與之交王戎傳嵇康臨刑謂子曰山公在汝不孤孫盛與殷浩談論食冷而復暖者數四交踈而吐誠今人以為難劉畢芳樽之友本贊謝瞻范秦為雲霞之交南本傳魏元同與裴炎締交能保終始故號耐久朋唐書楊寧有高操擢第棄官與陽城為莫逆交德宗召城詔寧與俱來薛收與元敬為文學館學士時房杜等處心腹之寄深相友託嚴挺之重交遊許與生死不易其操陸贄年十八張鎰有重名請為忘年友並唐史傳記一面契若金蘭竹林七賢傳集樂莫樂兮新相知楚辭昔日遊處行則連輿止則接席何曾須臾相失魏文帝吳質書心同琴瑟言鬱郁於蘭道葉膠漆志婉孌於塤箎劉孝標傳心照神交惟我與子選吳都賦時復相與舉觴對膝劉琨書數面成親舊況情其過此者乎龐參軍詩序清交素友比景同波王僧達祭顏延年文李郭或同舟潘夏時方駕藝文類聚梁陸唾詩身雖胡越意存斷金選賞心惟良知同交之於人也猶唇齒之相濟劉欽新議僕自少至今往還朋友間一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少韓與崔群書與詹離率不歷時移時則必合合必兩志其所趨久然後去韓文歐陽詹也詩成有共賦酒熟無孤斟同上締交君贈縞投分我忘筌駱賓王意氣一言合風期萬里親挹蘭言於斷金交蓬心於匪石共引文江同開筆海千載契風雲一言忘貴賤並同上人生交契無老少論交何必先同調杜忘形向友朋醉眠秋共被攜手日同行與子成二老來往亦風流論交翻恨晚並同上攜手慚連璧同心許斷金劉賓客風期契合同上分定金蘭契言通藥石規白侍郎豈無舊交結久別多遷易亦有新往還相見多形迹唯君與我分堅久如金石定交非勢利松筠與金石未足喻堅密在車如輪轅在身如肘腋淡交唯對水淡水交情老始知豆觴之會軒蓋之遊多奉光塵最承歡惠行止通塞靡所不同金石膠漆未足為喻平生定交取人窄屈指相知唯五人豈無晚歲新相識相識面親心不親並同上阿閣鸞鳳野田鶴何人信道舊同群同上掘井須到流結交須到頭賈浪仙接枕話通宵劉長卿結交指松柏孟浩然坐登徐孺榻頻接李膺杯同不言而信者其分深唐文粹至交淡不疑孟東野與足下義結紈素恩比同生傳幹與張叔威書本朝文章驚世知名旱意氣論交相得晚歐公集群居平日幸得肩從齒序跪拜起居竊兄弟行同上攜被夜語達旦窮窮坡文樂天夢得老相從欒城集交情舊許雞為具同上交情淡泊久彌新同上
