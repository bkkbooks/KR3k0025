body:
  text: 佛史漢驃騎將軍去病出隴西過焉耆山得休屠王祭天金人顏師古曰今佛像是其遺法也西漢初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之通鑑漢明紀專尚釋氏遠近承風無不事佛梁高祖客問三教李士謙曰佛日也北史魏本傳隋初民間佛書多於六經數十百倍通鑑隋紀功德使上言鳳翔法門寺塔有佛指骨相傳三十年一開開則歲豐人安上遣中使帥僧衆迎之通監唐憲宗元和十三年傳記浮屠佛也佛者漢言覺也將以覺悟群生也沙門漢言息也蓋息去欲而歸于無為也袁宏漢記集相貌既闢睟容巳安選碑金姿寶相永藉安間選行狀佛法入中國爾來六百年庶民逃賦役高士著幽禪韓文佛之道轉惑見為真智即群迷為正覺拾大暗為光明柳文西軒記國無有三惡八難人無有十纏九惱柳文永州龍興寺記信士圖為佛像法相甚真浮圖事神而語人金仙氏之道蓋本於孝敬而後積以衆德歸於空無其敷演教戒於中國者離為異門曰禪曰法曰律以誘掖於迷濁並同上仲尼之有十哲猶如來之有十大弟子即迦葉阿難須菩提舍利佛迦旃延目乾連阿那律優婆離羅睺羅是也白傳集是法平等故所至為淨土是身應供故隨念如降生劉賓客清淨不染花中蓮捧持世界百億千同上睟容瑞相同上三十二相具八十一種好備歐陽行周金蓮捧足寶珠垂髻王建集本朝金仙氏之教有自來矣天毒之國實紀于山經竺乾之師嘗聞于柱史西京名將得休屠天祭之人東漢諸王為蒲塞桑門之饌楊文公處州金沙院記佛晦靈迹遺骨舍利應現無方佛之靈骨金剛不朽劫火不燒金剛之骨賁育擊以千鈞之力終莫能毀類要吳孫權時僧會所言史初帝聞西域有神其名曰佛遣使之天竺求其道得其書及沙門以來其書善為宏闊勝大之言精於其道者號沙門通鑑漢明帝紀趙主石勒以天笁竺僧佛圖澄預言成敗數有驗敬事之及虎即位奉之尤謹衣以綾錦乘以雕輦朝會之日太子諸公扶翼上殿主者唱大和尚衆坐皆起使司空李農旦夕問起居太子諸公五日一朝國人化之率多事佛澄之所在無敢向其方面涕唾者爭造寺廟削髮出家通鑑晉成紀秦王興以鳩摩羅什為國師奉之如神親帥群臣及沙門聽羅什講佛經三百餘卷大營寺塔沙門坐禪者嘗以千數公卿以下皆奉佛由是州郡化之事佛者十室而九晉安紀帝以惠琳道人善談論因與議朝廷大事遂參權要賓客輻湊門車嘗有數十兩四方贈賂相係方筵七八座上常滿琳著高屐披貂裘置通呈書佐會稽孔覬嘗詣之遇賓客填咽暄涼而已覬慨然曰遂有黑衣宰相可謂冠屨失所矣通鑑南史宋高祖紀時佛教盛於洛陽中國沙門之外自西域來者三千餘人通鑑梁武帝天監八年魏自正光以後僧尼至二百萬人通鑑梁高祖閩王延鈞度民二萬為僧由是閩中多僧唐明宗紀敕天下寺院非敕額者悉廢之禁私度僧尼是歲天下見僧四萬二千四百四十四周世宗顯德二年傳記晉道安受業於佛圖澄澄姓帛氏以師莫過於佛遂以釋為姓類説事始四姓為沙門皆稱釋種增一阿含經沙門有三坐禪為上輩誦經為中輩助衆為下輩無為經僧曰苾芻本是草名有五義一生不背日二冬夏常青三體性柔軟四香氣遠騰五引蔓旁布為佛弟子理亦宜然其精至者號為沙門尊勝經百尺竿頭須進步十方世界是全身傳燈録後漢明帝遣蔡愔等天笁竺訪僧見摩騰乃要還漢地此中國有僧之始僧史略曰明帝聽陽城侯劉峻等出家此又中國人為僧之始事物紀原集法輪明智日慧海度慈航梁昭明太子詩戒珠靡缺忍鎧無違智燈含影慧駕馳騑梁簡文帝慧日低輪下禪枝而返照法雲凝蓋浮定水以涵光駱賓王燒葉成香早得熏修之漸拂花為供都忘染著之疑崔融懷素律師碑擯俗捨家投簪落采衣屏繒纊食惟菰麥同上惟有摩尼珠可照濁水源杜戒珠如水獨潔麒麟之行法寶如山普聞獅子之吼燕公集梵旅時出寺杜禪師都未知名姓始覺空門氣味長同上願將功德水從此灌塵機孟浩然法雨晴飛去天花晝下來同上百千萬劫菩提種八十三年功德林八十二歲若不秉持僧行苦將何得荷佛恩深慈悲不瞬諸天眼清淨無塵幾地心每歲八關蒙九度戒律殷勤一戒重千金白傳集以無為為心地以不二為法門口藏宣傳十二部心臺照耀百千燈以真如不二之宗助清淨得一之化蓮花法藏心懸悟具葉經文手自書蓄為道粹揭作僧豪道場半夜香花冷猶在佛前禮佛名並同上錫杖隨緣草廬入定行止依頭陀之法住持遠聲利之嫌裴休元和尚碑講法則金蓮冬敷頓錫則靈泉湧溢李華徑山碑晉宋尚法故為碑者多法梁尚禪故碑多禪法不周施禪不大行而律存焉故近世碑多律柳文之道源生知善根宿植深嗜法語忘甘露之味修最上乘解第一義無體空折色之迹而造乎真源通假有借無之名而入於實相並同上燈前便是觀心處元微之心超幾地行無處雲到何天住有期頓見佛光身上出巳蒙衣內綴摩尼同上八部天人入道場劉賓客慕道遵壞削之儀同上同翻貝葉文劉長卿遠嶽回飛錫空門臥白雲山僧獨在山中老惟有寒松見少年作梵連松韻焚香入桂叢唯將舊瓶鉢卻寄白雲中花間午時飯雲外青山鍾滿腹萬餘卷息機三十年身隨弊履經殘雪手綻寒衣入舊山獨向清溪依樹下空留白日在人間老鶴無衰貌寒松有本心並同上秪恐為僧心不了為僧得了盡輸僧杜荀鶴童子為僧今白首暗鋤心地種間情時將舊衲添新線披坐披行過一生同上韓愈貶潮州浮圖之士歡快獨師憤起求序以資適潮不顧險毒皇甫湜自翻貝葉偈人施福田衣姚少監上人從儒至道從道至釋如歷星月以得白日若棄扇翣而灑清風歐陽行周寂爾方丈內瑩然虛白間千燈智慧心片玉清羸顏同上登滿足地超究竟天王建法向空林説心隨寶地平王建欲結三天社初降十地魔許用晦心出是非外迹辭榮辱中禪心空已寂世路任為歧到院客長見閉關人不知寺喧聽講絶廚遠送齋遲並同上水月通禪觀魚龍聽梵聲錢起獨樹月中鶴孤舟雲外人榮華長指幻衰病久觀身張歌吉師步有雲隨師情惟鶴知方雄飛讀盡龍王宮裏書劉禹錫美師了達無牽束竹徑生苔晝掩門方雄飛佛不遠人即心而證法無所著觸境皆知權載之雖然到城郭衣上不棲塵孟東野駕橫海之大航拯迷塗於彼岸唐文粹闡律藏而日月光明騁辨才而龍象蹴踏同上千峰明一燈愛僧不愛紫衣僧鄭谷一瓶一鉢垂垂老唐僧貫休詩空門氣味長同上本朝清譽落人間臨川如不動山如常撞鍾如一水月如萬竅風東坡領袖萬僧同上開不二門設無盡藏同上道價喧宇宙陳後山人皆趨世出世者誰人皆遺世世誰為之爰有大士處此兩間非濁非清非律非禪東坡集心開寶月嬋娟處身寄浮雲出沒間欒城集休夏巾鉼誰與共迎秋水石不勝間師始以法教人叩之必鳴如千石鍾來不失時故人皆以辨名之及其退居此山閉門燕座寂默終日葉落根榮如冬枯木風止波定如古澗水故人以訥名之並同上彼有釋氏子願力何堅固蔬食十四春蓮經一萬部戶庭未嘗出唇齒欲爛腐邇來功行滿漸覺休息處間詠詩遠公初渡江道譽藹東晉參寥子詩史秦王興以鳩摩羅什為國師親帥群臣及沙門聽羅什講佛經又命羅什翻譯經論三百餘卷通鑑晉安帝紀升法座講大覺凡在瞻聽塵蔽俱開梁武天監八年支遁林許椽共在會稽支為法師許為都講支通一義四座莫不厭心許送一難衆人莫不抃舞世説傳記以智慧刀裂煩惱網金光明經以智慧劍破煩惱宅維摩經聽聞妙法如飲甘露本淨禪師曰若欲求佛即心是佛若欲會道無心是道傳燈録集能令梵志達亦使群魔驚梁元帝聽講詩以智慧火燒煩惱薪陳徐陵長干寺碑仗智慧劍破煩惱軍盧藏用説法動海嶽遊方化公卿微言注百川亹亹信可聽一風鼓群有萬籟各自鳴李白黃金獅子承高座白玉塵尾談重玄同上登法堂居講坐緇素觀聽天龍圍繞搖塵尾而析理風生弄象鼻而吐辭河注震雷霆之法鼓聾俗知驚整日月之慈煙幽途識曉崔法雄碑抉開生盲眼擺去煩惱塵燭以智慧日灑之甘露津千界一時度萬劫無與鄰白傳集口藏宣傳十二部同上開善誘之門施方便之力白帖拯苦海之沈溺救火宅之燒焚啓覺路之緘縢發空門之扄鐍並同上高筵談柄一麾拂講下聽徒如醉醒劉賓客十方傳句偈八部會壇場外道邪山千萬重真言一發盡摧鋒並同上講席邀談柄孟浩然詩後至無地無由聽韓文華山女詩觀中人滿坐觀外一雨普沾於衆緣萬籟各吹於本分張説之晉遠法師作念佛三昧詠大勸于時其後天台顗大師著淨土十疑論弘宣其教周密微妙迷者咸賴焉柳文龍興寺記由其內者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之稱道要莫不悽欷欣踴如獲赦宥同上釋第一義開不二門王維集談雲漸入微杜荀鶴本朝法師説法臨泗水無數天花隨塵尾坡詩揮塵空山亂石聽同上
