body:
  text: 總敘言語經言行君子之樞機易亂之所生也則言語以為階易繫辭將叛者其辭慚中心疑者其辭技吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈易繫辭下好言自口莠言自口詩正月惟口出好興戎書大禹謨惟口起羞書説命中君子約言小人先言記坊記言語之美穆穆皇皇記少儀言語宰我子貢語有德者必有言有言者不必有德語憲問詩書執禮皆雅言也語述而言未及之而言謂之躁言及之而不言謂之隱未見顏色而言謂之瞽語季氏子與人善言暖於布帛傷人之言深於矛戟荀子孟浪之言莊子言不經非言也楊五百言重則有法言輕則招憂楊子人有多言者猶百舌之聲人有少言者猶不脂之尸也淮南子説山訓不脂其言也捈中心之所欲通諸人之㗲㗲者莫如言言心聲也楊子問神史言身之文也左僖二十八年叔向曰辭之不可以已也如是子産有辭諸侯賴之若之何其釋辭也左襄三十一年貌言華也至言實也苦言藥也甘言疾也史商君傳誠有味其言也西漢鄭當時傳臣宣訥鈍於辭西漢鮑宣傳集言語階亂禰正平賦語到磨圭角元微之本朝言不可以不重也子不見鐘鼓乎叩之然後鳴鏗鍧鏜鞳人不以為異也若不叩自鳴人孰不以為妖耶可以言而不言猶叩之不鳴亦為廢鐘鼓矣迂書有意而言意盡而言止者天下之至言也東坡經山下有雷頤君子以謹言語易擬之而後言易繫辭猶胥顧于針言其發有逸口書盤庚上謹爾出話詩抑君子無易由言耳屬于垣詩小辨白圭之玷尚可磨也斯言之玷不可為也詩抑無易由言無曰苟矣莫捫朕舌言不可逝矣詩蕩口費而煩易出難悔記緇衣注過言一出駟馬不能及不可得悔也君子約言記坊記君子寡言而行以成其信記緇衣惡言不出於口記祭義君子於其言無所苟而已矣語其在宗廟朝廷便便言惟謹爾語卿黨駟不及舌語顏淵謹言其餘則寡悔語非先王之法言不敢道孝經子多言數窮不如守中老子言者風波也莊子人間世言有召禍楊子后稷之廟有金人焉三緘其口而銘其背曰古之謹言人也無多言多言多敗口是禍之門家語口可以食不可以言鬼谷子言而非仁之中也則其言不若其默也其辨不若其訥也荀非相言語在口譬含鋒刃不可動故天有卷舌之星人有緘口之銘劉子言出不可復追其猶射也懸機未發則猶可止矢一離弦雖欲反之不得也言者風也無足而行無翼而飛不可易也劉子史十語九中不如一默史記龜策傳口無惡言東漢卓茂傳平均與人言若不出口世號囁嚅翁唐書竇群傳傳記舌者兵也出言不當反自傷也説苑談叢互入因言取禍言猶射也括既離絃雖有所悔不可從而退也説苑談叢集白圭尚可磨斯言為易緇選詩出言自口驥騄不追文選齊竟陵王行狀舌端之孽慘乎楚鐵劉賓客五刃之傷藥之可乎一言成痾智不能明我口之啓爾心之門無為我兵當為我藩以慎為鍵以忍為閽可以多食不可多言口兵之起其刑握焉劉賓客互入因言取禍徒見婁敬掉而獲爵不見魏其齰以可悲李德裕舌針不知言之人烏可與言韓文言針互見言不徒發經吉人之辭寡易繫辭君子約言記坊記史顧雍為丞相平尚書事雍為人寡言吳主亦曰顧公在坐使人不樂其畏憚如此徐羡之風度詳整時然後言通鑑晉恭紀王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之晉書本傳阮千里見王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎即辟之時謂之三語掾晉書謝安嘗稱美王濛云王長史語甚不多可謂有令音晉王濛傳衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微琅琊王澄有高名每聞玠言輒歎息絶倒晉書衛玠傳互見服善及言不徒發傳記吉人之辭寡若含鋒刃而不敢動也白氏六帖經躁人之辭多易繫辭人之多言亦可畏也詩小人先言記坊記子多言數窮老子禍莫大於多言文中子關朗篇多言德之賊也文中子多言不可與遠謀機易泄文子人有多言猶百舌之聲也淮南子蝦蟆蛙黽日夜而鳴舌乾劈然而人不聽之今鶴經時夜而鳴天下振動多言何益唯其言之時也墨子互見言不徒發史子産曰竈焉知天道是亦多言矣左昭十八仲尼曰賜不幸言而中是使賜多言者也左司馬牛多言而躁史記多語耗氣唐書劉洎傳集人有多言者百舌之聲也文粹蛙蛙鳴無謂閣閣祗亂人韓文經吊喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍記曲禮上君子問人之寒則衣之問人之飢則食之記表記夫子時然後言人不厭其言語憲問知者不失言語衛靈公夫人不言言必有中語子蝦蟆蛙蛙日夜之鳴舌乾劈然而人不聽之今鶴經時夜之鳴天下振動多言何益唯其言之時也墨子互入多言得萬人之兵不如聞一言之當淮南子史東方朔曰談何容易西漢本傳晏子曰君子有信其有以知之矣左昭二年衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微琅琊王澄有高名每聞玠言輒歎息絶倒晉書本傳互見伏善及寡言傳記謝太傳一生言未嘗誤世説集不知言之人烏可與言韓文言針互入謹言經言滿天下無口過孝經出其言善則千里之外應之易繫辭辭之輯矣民之洽矣辭之繹矣民之莫矣詩板子宰我子貢善為説辭孟子贈人以言重於珠玉荀子魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諫不聽乃以問其傳宰折睢曰吾欲西益宅而史以為不祥子以為如何宰折睢曰天下有三不祥西益宅不與焉哀公大悅而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜欲無止二不祥也不聽強諫三不祥也哀公默然深念憤然自反遂不取西益宅淮南子人間訓互入轉移人心史楚子玉請戰晉欒枝對曰楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫為二三子敬爾君事詰朝相見左僖二十八年左氏曰仁人之言其利博哉晏子一言而齊侯省刑左昭二年晉叔向適鄭鄭鬷蔑立於堂下一言而善叔向曰子若無言吾幾失子矣言之不可以已也如是同上趙王新立秦急攻趙趙求救於齊齊曰必以長安君為質兵乃出太后不肯大臣強諫后曰復言者老婦必唾其面左師觸龍見后盛氣而胥之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為媼之愛燕后賢於長安君太后曰不若長安君之甚左師曰父母愛子則為之計深遠今媼尊長安君之位而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媼為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家互入轉移人心王澄曰胡母彥國吐佳言如鋸木屑霏霏不絶後進領袖也晉書胡母輔之傳樂廣善談論每以約言析理以厭人之心晉書本傳趙王間出為燕軍所得燕因之欲求割地使者往請燕輒殺之有廝養卒走燕壁見燕將曰君知張耳陳餘何欲曰欲得其王耳趙養卒笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面而王豈欲為卿相終巳耶今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕況以兩賢王左提右挈而責殺王之罪減燕易矣燕將乃歸趙王養卒為御而歸通鑑秦紀焦和清談干雲通鑑東漢孔公緒清談高論噓枯吹生同上曹操執陳宮謂宮曰奈卿老母何曰宮聞以孝治天下者不害人之親老母存否在明公不在宮也操曰奈卿妻子何宮曰臣聞施仁政於天下者不絶人之祀妻子存否在明公不在宮也通鑑漢獻紀孔融高談清雅盈溢官曹可玩而誦通鑑東漢雍州言新豐縣東南有山踴出俞文俊上書天氣不和而寒暑併人氣不和而疣贅生地氣不和而堆阜出今陛下以女處陽位反易剛柔故地氣隔塞而山變為災陛下謂之慶山臣以為非慶通鑑唐武后李昭德言於太后曰天皇陛下之夫皇嗣陛下之子陛下身有天下當傳之子孫為萬代業豈得以姪為嗣乎自古未有姪為天子姑立廟者也通鑑唐武后上謂李泌曰今用卿欲與卿有約卿慎勿報仇有恩者朕當為卿報之對曰臣素奉道不與人為仇李輔國元載皆害臣者今自斃矣素所善及有恩者率已顯達或零落臣無可報也泌曰李晟馬燧有大功於國聞有讒之者雖陛下必不聽然臣今日對二人言之欲其不自疑耳晟燧富貴已足苟陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之故臣願陛下勿以二臣功大而忌之二臣勿以位高而自疑則天下永無事矣晟燧皆起泣謝通鑑唐德宗帝苦溽暑命宮苑使王允平別建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足然陛下雖欲營繕終不可得乃遣中使語之曰今歲盛暑異常朕昔在河上與梁人相距行營卑濕被甲乘馬親當矢石猶無此暑今在深宮之中而暑不可度奈何對曰陛下昔在河上勍敵未滅深念讎恥雖有盛暑不介聖懷今外患已除海內賓服故雖珍臺間館猶覺鬱蒸也陛下儻不忘艱難之時則暑氣自消矣帝默然通鑑後唐莊宗以三寸舌為帝者師前漢張良傳賈山借秦為諭名曰至言西漢唐武后欲以武三思為太子以問宰相狄仁傑曰姑姪與母子孰親立廬陵王則千秋萬歲後常享宗廟三思立廟不祔姑后感悟即日迎廬陵王新唐書狄仁傑傳互見轉移人心朱欽則一諫而羅織之獄衰時而後言者歟唐書狄仁傑贊集微言破秋毫李白清言如冰玉劉禹錫豐而不餘一言約而不失一辭韓文子相公書吐詞如蘭馥韋應物清談如冰玉逸韻貫珠璣劉賓客清談見滋味清談勝管絃並同上公談私詠溢于人聽劉禹錫有言語可委以專對白樂天本朝高談四座掃炎熱臨川集清談消瘴癘同上
