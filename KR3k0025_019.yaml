body:
  text: 因事思人經君子聽鍾聲則思武臣聽磬聲則思死封疆之臣聽琴瑟之聲則思志義之臣聽竽笙簫管之聲則思蓄聚之臣聽鼓鼙之聲則思將帥之臣記樂記史越子使后庸來聘且言邾田封于駘上盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰固將召之文子曰他日請念左哀二十七越敗吳遷吳王夫差於甬東豫百家居之吳王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此史記吳世家家貧則思良妻國亂則思良相史魏世家上至廣武赦劉敬曰吾不用公言以困平城通監漢高紀張敞免為庶人亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者詣公車天子引見敞拜為冀州剌史敞到部盜賊屏迹同上漢宣紀頴川盜賊群起河東守兵亦叛京師騷動帝聞之言吾悔不用郭子橫之言同上漢光武紀馬援南擊交趾從容謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中臥念少遊平生語何可得也後漢本傳漢主伐吳而敗時法正已卒亮歎曰孝直若在必能制主上東行就使東行必不傾危矣通監三國王獻之兄弟自郤超未亡見愔常躡履問訊甚修舅甥之禮及超死見愔慢怠屐而候之愔每慨然曰使嘉賓不死鼠子敢爾耶晉書郤超傳愔超父也互入炎涼宋文帝曰檀道濟若在豈使胡馬至此通監宋紀吳已平群臣上壽帝執爵流涕曰此羊太傳之功也同上晉武大康元年突厥圍鴈門煬帝歎曰向使長孫晟在不令胸奴至此隋書劉行本太子少庶子太子勇虛襟敬憚後卒及太子廢上曰劉行本在勇當不及於此元嵓為蜀王長史後王漸以非法得罪上曰元嵓若在吾兒豈有是乎並同上張九齡奏安祿山有逆相請因罪戮之上放歸九齡既死上皇在蜀思九齡之先覺詔哀贈唐書征高麗班師上以不能成功深悔之歎曰魏證若在不使我有是行也命馳驛祀徵以少牢復立製碑召其妻子詣行在勞賜之通監唐太宗刑部郎中闕上曰朕得其人矣往者李道裕議張亮獄云反形未具此言當矣朕雖不從至今悔之遂以道裕為刑部郎中同上太宗自遼東還曰魏證若在吾豈有此行耶唐書傳記祭遵死後每朝會上常歎曰安得奉公憂國如祭征虜者東觀漢紀集霖雨思賢佐丹青憶老臣杜詩因詠霜雪句永懷鸞鶴姿白樂天徽績空存書旗當而播美音容不見聽鼙鼓以增思同上聞鼓鼙而憶名將鑒丹青而思老臣李文饒湘竹舊班思帝子江蘺初緑哀騷人劉長卿本朝韓魏公死士大夫歎曰天何不為我留歐陽公為魏公作志文而後死也韓魏公別録盧同韓愈不在此彈壓百怪無雄文歐公集經萬夫之長可以觀政書咸有一德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不已詩風雨觀其器而知其工之巧觀其發而知其人之知記禮器歲寒然後知松柏之後雕也語子罕子不容然後見君子家語互見不苟合及道大不容六親不和有孝慈國家昏亂有忠臣老子遠使之而知其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以酒而觀其則雜之以處而觀其色臨之以危而觀其節莊子飬生者不足以當大事惟送死可以當大事孟子離婁下窮觀其所為達觀其所與列子貧則見廉富則見義生則見愛死則見哀尹鄧子修身歲不寒無以知松柏事不難無以知君子荀子大略舟覆乃見善遊馬奔乃見良御淮南子説林訓如鍾山之玉寒嶺之松比之瓀珉梓柳無殊也及其燒以爐炭三日而色潤不改處於積冰終歲而枝葉不雕然後知其異於他玉衆木也劉子史李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取史魏世家互見致察舉世混濁清士乃見史記伯夷傳肥義曰正臣難至而節見忠臣纍至而行明同上趙世家淮陰黥布等皆已誅滅而何之勳爛焉蕭何世家天下昏濁忠臣乃見魏王豹傳狗盜雞鳴孟嘗君列此二人於賓客盡羞及有秦難卒此二人技之孟嘗君傳互入兼收並蓄已上並史記劇孟博徒母死客送喪千餘乘此亦有過人者西漢袁盎傳不遇盤根錯節何以別利器後漢虞詡傳王祥之薨奔赴者非朝廷之賢則親親故吏而已門無雜吊之賓晉書本傳互見吊門王湛曰直行平路何以別馬唯當於蟻封晉紀鄧粲傳唐李夷簡彈楊憑坐貶臨賀尉徐晦獨至藍田與別後夷簡薦晦為御史晦曰平生未嘗望公顏色公何從而取之夷簡曰君不負楊臨賀肯負國乎通監互見徇公忘私當一生一死間而後見其節唐元德秀傳疾風知徑草版蕩識誠臣唐太宗賜蕭瑀詩見本傳李世績常侍宴上從容謂曰朕求群臣可托孤幼者無以踰公公往不負李密豈負朕哉通監唐太宗馬文舉曰不遇勍敵何以顯壯士同上集寧如霜雪後獨見竹柏心江淹詩時危見臣節世亂識忠良選鮑明遠詩扶顛始知籌策長杜詩繹騷之際鯁亮彌彰劉賓客火後見琮璜霜餘識松柏同上士窮乃見節義韓文雨晦識雞鳴之信風高見隼擊之威白樂天磨涅始彰其堅白杜牧之微風但覺杉香滿烈日方知竹氣寒呂和叔文不有百鍊火孰知寸金精孟東野互見是真難滅破松見貞心裂竹看直文唐文粹天若無雪霜青松不如草地若無山川何人重平道唐于續詩衆木盡搖落始見竹色真孟東野詩互見事物相形本朝揮毫更想能一戰數窘乃見詩人才臨川集馬之在廄也駑驥雜處飲水食芻嘶鳴蹄齧求其所以異者蔑矣及其引重車取夷路不屢策不煩御一頓其轡而千里已至矣當是時駑馬並驅則雖傾輪絶勒敗筋傷骨不舍晝夜而追之遼乎其不可以及也臨川文得路方知異日心東坡詩萬木歲寒配喬松於巨柏衆星夜艾凜明月於長庚東坡賀林待制啓互見事物相形火數四百炎靈消誰其代者當塗高窮姦極酷不易取始知文景基局牢同上古硯歌欒布惟不廢彭越之命故高祖知其賢李績惟不利李密之地故太宗許其義欒城集受人恩而不忍負者其為子必孝為臣必忠鳴道集不經大火燒孰得真黃金欒城集請觀風急天寒夜誰是當門定腳人邵堯夫詩經知不足然後能自反也知困然後能自強也記學記子孔子欲以顏狀取人也於滅明改之矣欲以言辭取人也於宰我改之矣欲以容貌取人也於子張改之矣家語所以動心忍性增益其所不能人恆過然後能改困於心衡於慮而後作證於色發於聲而後喻孟子告子下人之有德慧術智者恆存乎疢疾獨孤臣孽子其操心也危其慮患也深故達同上盡心下晉公子重耳霸心生於曹越王勾踐霸心生於會稽齊威公小白霸心生於莒荀子老子學商容見舌而知守柔矣列子學壺子觀景柱而知持後矣淮南子繆稱訓注先有形而後有影堯遭洪水而貴陸湯大旱而重水傳子史齊高強曰三折肱知為良醫左定十三互見復而後知高宗遭鳴雉之戒飭己正道享百年之壽西漢杜欽傳木不生庭太戊無以隆雉不鳴鼎武丁不為宗晉書郭璞傳集九折臂而成醫楚辭三折乃良醫劉賓客經蔽芾甘棠勿翦勿伐召伯所茇詩甘棠子無仲尼則西山之餓夫與東國之絀臣惡乎聞楊子連城之璧瘞影荊山夜光之珠潛輝鬱浦玉無翼而飛珠無脛而行揚聲於章華之臺炫耀於綺羅之堂者蓋人為之舉也劉子柳下惠不遇仲尼則貞潔之行不顯未免於三黜之臣季布不遇曹丘則百金之諾不揚未離於凡虜之人同上史伯夷叔齊雖賢得夫子而名益彰門巷之人欲砥行立名者非附青雲之士烏能施於後世哉史記伯夷傳毛先生遂一至楚使趙重於九鼎大呂同上平原傳庾乘遊學宮為諸生傭後能講誦自以卑第每處下坐諸生博士皆就讎問之由是學中以下坐為貴後漢本傳河南尹羊陟謁造趙一言談至曛夕極歡陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采同上趙一傳阮籍見張華鷦鷯賦曰王佐才也由是聲名始著晉書左思作三都賦成人未之重思以示張華深稱讚之兼作序豪貴競寫都下為之紙貴晉書許詢移居皋屯之嵓常與沙門支遁及謝安石王羲之等同遊往來今皋屯呼為許度嵓謝安有盛名時人愛慕有罷縣還安問其歸資答曰有蒲葵扇五萬安乃取其中者捉之士庶競市價增數倍晉書楊雄作太玄晚遭陸續玄道遂明王長文傳王導為司徒時帑藏空竭庫中惟有綀數千端鬻之不售乃與朝賢俱制綀布單衣於是士人翕然服之綀遂踊貴主者出賣端直一金其為時所慕如此王羲之見一姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百金價姥如言人競買之已上並晉書傳記人有市駿馬者三旦立市人莫之知伯樂一顧之一旦而馬價十倍戰國策郭林宗遊洛陽始見河南尹李膺膺大奇之遂相友善於是名震京師郭林宗別傳慈廉江者昔有李祖仁居此兄弟十人並慈孝廉讓因此名江交州記梁顧總始為縣吏一夕遇二人稱是王粲徐幹云昔與公同府公劉楨也乃誦其遺文總悟以遺文數篇投令令待之甚厚時謂死劉楨猶庇得生顧總太平廣記士非玉璧談者為價物理論互見求援白樂天以詩謁顧況因為延譽聲名大振幽間鼓吹集昔歐冶改視鉛刀易價伯樂所盻駑馬百倍文選曹植表夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭藝文類聚載應璩薦和慮則箋一經品題便作佳士李白一顧之隆駘足逾於山鹿片言之重魚目軼於靈蛇駱賓王一言之譽東陵侔於西山一面之榮鄭璞踰於周寶王彥升文集序互見感謝昔虞阪之上逸驥與駑駘俱疲吳竈之中孤桐共樵蘇並爨遇王良伯喈遂騰聲於千古此詩若不遇王君乃數十張故紙耳唐韋縚作孟浩然集序處州本王君名士源天寶中獲孟浩然文集士源為之序宋廣平之沉下僚蘇公味道為使者廣平投以梅花賦蘇盛稱之自是方列于聞人之月自是知英賢斝斝可外文字猶用片言借説於先達之口席其勢而後驤首當時矧碌碌者疇能自異劉賓客互見求援夫美不自美因人而彰蘭亭不遭右軍則清湍修竹蕪沒於空山矣柳文本朝鵝毛贈千里所重以其人歐公峴山臨漢上望之隱然蓋諸山之小者而其名特著於荊者豈非以其人哉其人謂誰羊祐叔子杜預元凱是也峴山亭記溫公營獨樂園在洛中諸園最為簡素人以公之故故春時必遊鳴道集互入生理門園池類黃叔度淡然無作郭林宗一言至今以為顏子叔度之賢無一見於外者而後世猶信徒以林宗之重東坡謝太保撰先人墓碣書
