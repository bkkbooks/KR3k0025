body:
  text: 處事間暇史晉伐齊州綽門于東閭左驂迫還于門中以枚數闔左襄十八年注云示不恐吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下周亞夫堅臥不起頃之復定西漢本傳祭遵為將軍取士皆用儒術對酒設樂必雅歌投壺東漢本傳諸將見戰不利多懼吳漢意氣自若整厲器械激揚士吏帝曰吳公差強人意隱若一敵國同上張奐為中郎將烏桓叛燒軍門奐坐帷中與弟子講論若無事眾稍安東漢書魏軍次于興勢假禕節率眾往禦之光祿大夫來敏至禕話別求共圍碁于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退蜀志費禕傳互入坐以制勝費禕代蔣琬為尚書令以朝晡聽事其間接納賓客加博奕不廢費禕別傳晉羊祜都督襄陽在軍常輕裘緩帶身不被甲鈴閣之下侍衛不過十數人通監晉武紀劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其游客之思於是群胡泣去晉書互入轉移人心人心易感謝艾距石季龍將麻秋艾乘軺車冠白帽鳴鼓而行秋大怒馳擊之左右大擾勸艾乘馬艾不從乃下車踞胡床指麾處分賊不敢進晉書柴紹討吐谷渾虜據高射紹軍士失色紹安坐遣人彈胡琵琶使二女子舞虜疑之休射而觀唐書僕固懷恩誘吐蕃等南下急召郭子儀屯涇陽回紇曰謂令公亡矣令公誠存安得而見之子儀將出諸將請無往子儀曰虜數十倍之眾今力固不敵至諴感神況虜乎諸將請選鐵騎五百為衛子儀曰適足為害也即傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免冑而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領各飲之酒與之羅錦歡言如初乃遣首領入朝舊唐書本傳互入人心易感陝虢都知兵馬使達奚抱暉鴆殺節度使張勸代揔軍務上謂李泌曰不得不煩卿往以泌為陝虢都防禦水陸運使上欲以神策軍送泌之官問須幾何人對曰臣請以單騎入之上曰單騎如何可入對曰陝城之人不貫逆命此特抱暉為惡耳若以大兵臨之彼閉壘定矣臣今單騎抵其近郊彼舉大兵則非敵若遣小校來殺臣未必不更為臣用也上曰朕方大用卿寧失陝州不可失卿對曰他人必不能入泌見陝州進奏官及將吏在長安者語之曰主上以陝虢飢故不授泌節而領運使欲令督江淮米以賑之耳陝州行營在夏縣若抱暉可用當使將之有功則賜旌節矣抱暉覘者馳告之抱暉稍自安因疾驅而前抱暉不使將佐出迎惟偵者相繼泌宿曲沃將佐不俟抱暉之命來迎抱暉亦出謁泌稱其攝事保完城隍之功入城視事由是反仄者皆自安抱暉遂亡命不知所之通監唐德宗裴度平章中書失印度自如左右白復於故處得印度不應或問其故曰此必吏人盜以印書券耳急之則投諸水火緩之則復還故處人服其識量通監唐紀又互入鎮重人事張從賓引兵入洛陽從官在大梁者無不涑懼獨桑維翰從容指畫軍事神色自若接對賓客不改常度眾心差安通監五代晉高紀集東山謝安石談笑靜胡沙李太白集互入坐以制勝簿領如山處之若閑劉賓客集子趙文王喜劍太子悝患之募左右能悅王之意止劍左右曰莊子當能莊子見王曰有天子之劍有諸侯之劍天子之劍一用匡諸侯天下服諸侯之劍如雷霆之震四封之內無不賓服庶人之劍無異於鬭雞一旦命已絕矣無所用於國事今大王有天子之位而好庶人之劍竊為大王薄之於是文王不出宮三月劍士皆服斃其處也莊子說劍魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諫不聽乃以問其傳宰折睢曰吾欲西益宅而史以為不祥子以為何如宰折睢曰天下有三不祥西益宅不與焉哀公大悅而喜頃復問曰何謂三不祥對曰不行仁義一不祥也嗜慾無止二不祥也不聽強諫三不祥也哀公默然深念憤然自反遂不取西益宅淮南子人間訓互入善於言語史楚人伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左宣十二年互入與士卒一體宋平公築臺妨於農收築者謳子罕聞之親執扑以行築者曰吾儕小人皆有闔廬以辟燥溼寒暑今君為一臺而不速成何以為役謳者乃止左襄十七年晉平公射鷃不死使豎襄摶之失公怒拘將殺之叔向曰必速殺之無令遠聞君忸怩于顏乃趣舍之國語楚優孟嘗以談笑諷諫楚莊王有愛馬死使群臣喪之欲以棺椁大夫禮葬之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為椁楩楓豫章為題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼於後廟食太牢奉以萬戶之邑諸侯聞之皆知大王賤人而貴馬王曰寡人之過一至此乎乃使以馬屬太官令無令天下久聞也史滑稽互入反鋒而用及滑稽趙王新立秦急攻趙趙求救於齊齊曰必以長安君為質兵乃出太后不肯大臣彊諫后曰復言者老婦必唾其面左師觸龍見后盛氣而須之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為父母愛之則為之計深遠今媼尊長安君之位而不及今有功於國一旦山陵崩長安君何以自託於趙老臣以嫗為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家互入善於言語茅蕉曰陛下有狂悖之行不自知耶車裂假父囊撲二弟遷母於雍桀紂之行不至於是矣令天下聞之盡瓦解無嚮秦者王下殿手自執之曰先生趨起就衣今願受事王自駕虛左方往迎太后歸於咸陽復為母子如初通監秦紀上居南宮見諸將偶語以問張良良曰陛下與此屬共取天下而所封皆故人所誅皆仇怨今恐以過失及誅故相聚謀反耳上曰奈何良曰取上素所不快計群臣所共知最甚者一人先封以示群臣上封雍齒群臣皆喜曰雍齒且侯吾屬亡患矣初雍齒不欲屬沛公沛公怨齒互入鎮重大事西漢良因事納忠以變移帝意使上無阿私之失下無猜懼之謀國家無虞慮及後世若良者可謂善諫矣通監漢高紀冒頓為書褻嫚樊噲曰臣願得十萬眾橫行匈奴季布曰噲可斬也前匈奴圍高帝於平城漢兵三十二萬噲為上將軍不能解圍今歌吟之聲未絕傷夷者甫起而噲欲搖動天下妄言以十萬眾橫行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也高后曰善通監漢惠馮唐曰陛下雖得廉頗李牧弗能用也上怒召讓唐曰公奈何眾辱我獨無間處乎唐曰鄙人不知忌諱魏尚坐上功首虜差六級陛下削其爵而罰之上說令唐持節赦魏尚復以為雲中守通監漢文紀縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令右內史汲黯曰長安令無罪獨斬臣黯民乃肯出馬上默然通監漢武紀上從容謂虎賁中郎將馬援曰吾甚恨前殺守相多也對曰死得其罪何多之有但死者既往不可復生也上大笑通監漢光武紀嶺南舊獻生龍眼荔枝十里一置五里一候晝夜傳送唐羌上書曰臣聞上不以滋味為德下不以貢膳為功伏見交趾七郡獻生龍眼等南州土地炎熱惡蟲猛獸不絕於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽詔敕大官勿復受獻通監漢和紀復斷大臣行三年喪陳忠上疏臣願陛下登高北望以廿陵之思揆度臣子之心則海內咸得其所通監東漢殤帝紀河間王政慠很不奉法順帝以侍御史沈景有強能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王耶景曰王不正服常人何別今相謁王豈謁無禮者耶王慚而更服東漢河間本傳時文帝為五官將臨淄侯植才名方盛有奪宗之議太祖嘗屏除左右問賈詡詡默然不對太祖曰與卿言而不荅何也詡曰屬適有思故不即對耳太祖曰何思曰思袁本初劉景升父子也太祖大笑於是太子遂定魏志關羽聞黃忠位與己並怒曰大丈夫終不與老兵同列不肯受拜費詩謂羽曰夫立王業者所用非一蕭曹與高祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨且王與君侯譬猶一體同休等戚禍福共之君侯不受拜如是便還但相為惜此舉動恐有後悔耳羽大感悟遽即受拜通監漢獻紀帝謂侍中蘇則曰前西域通使燉煌徑寸大珠可復求市益得不則對曰若陛下化洽中國德流沙漠即不求自至求而得之不足貴也帝嘿然通監三國魏文紀魏明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射殺其子因涕泣帝以此建樹之意定魏志帝好土功陳群曰人之所欲莫不有辭況乃天王莫之敢違前欲壞武庫謂不可不壞也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也帝為之少有減省通監魏明紀帝嘗著帽披縹綾半袖楊阜問帝曰此於禮何法服也帝默然不荅自是不法服不以見阜同上過江人士每至暇日出新亭飲宴周顗中坐而歎曰風景不同舉目有江河之異皆相視流涕惟王導愀然變色曰當共戮力王室剋復神州何至作楚因相對泣耶眾收淚而謝之晉書王導傳劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其游客之思於是群胡泣去晉書互入處事間暇劉琨在晉陽嘗為胡騎所圍窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊流涕欷歔向曉復吹之賊並棄圍而走晉書本傳互入處事間暇坐以制勝人心易感三類秦王堅與群臣飲酒以秘監朱彤為正命人人以極醉為限秘書侍郎趙整作酒德之歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悅命整書之以為酒戒自是宴群臣禮飲而已通監晉武紀亙玄得志常欲以謝安宅為營謝混曰召伯之仁猶惠及甘棠文靜之德更不保五畝宅耶玄聞慚而止晉書魏崔楷為殷州剌史或勸楷留家單騎之官楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕終無叛志通鑑梁高祖蘇瓊為清河太守有兄弟爭田積年不決各相援據乃至百人瓊召而諭之曰天下難得者兄弟易求者田地假令得地失兄弟心如何因下淚兄弟叩頭乞外更分異十年遂還同住北史屈突通往陝西檢覆群牧得隱匿馬二萬匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜產之故殺千有餘人臣敢以死請又頓首曰臣一身分死就陛下匄千餘人命帝感悟悉達等皆減死論通監隋高祖文德皇后既葬帝即苑中作層觀以望昭陵引徵同升熟視曰臣眊昏不能見帝指示之徵曰臣以為陛下望獻陵若昭陵臣固見之帝泣為毀觀新唐書魏徵傳上出畋遇雨問諫議大夫昌樂谷那律曰油衣若為則不漏對曰以瓦為之必不漏上悅為之罷獵通監唐高紀互入敏於應對權善才范懷義誤斫昭陵柏罪當除名上特命殺之狄仁傑奏二人罪不當死上曰善才等斫陵柏我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易張釋之有言設有盜長陵一抔土陛下何以處之今以一株柏殺二將軍後代謂陛下為如何矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下者也上怒稍解二人除名流嶺南通監唐高宗上造鏡殿成上與劉仁軌觀之仁軌驚趍下殿上問其故對曰天無二日土無二王適視四壁有數天子不祥孰甚焉上遽令剔去上遣宦者緣江徙異竹欲種苑中宦者科舟載竹所在縱暴過荊州長史蘇良嗣囚之上疏切諫手詔慰諭良嗣令棄竹江中並同上太后謂侍臣曰自興周俊臣來死不復有反者姚元崇曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動搖所問者若有翻覆懼遭慘毒不若速死賴天啟聖心興等伏誅臣以百口為陛下保自今內外之臣無復反者若微有實狀臣請受知而不告之罪太后悅曰曏時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心通監唐武后李昭德言於太后曰天皇陛下之夫皇嗣陛下之子陛下身有天子當傳之子孫為萬代業豈得以姪為嗣乎自古未聞姪為天子而為姑立廟者也樂思晦男未十歲沒入司農上變得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承受矣太后意稍寤並同上互入頴梧大雪蘇味道以為瑞帥百官入賀殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷乎味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂諛之士也太后為之罷朝通監唐中宗鄭普思謀作亂事覺西京留守蘇環窮治之普思妻第五氏以鬼道得幸於皇后上敕環勿治侍御史范獻思進曰請斬蘇環上曰何故對曰環為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣流普思同上唐武后欲以武三思為太子以問宰相狄仁傑曰姑姪與母子孰親立廬陵王則千秋萬歲後常享宗廟三思立廟不祔姑后感悟即日遣迎廬陵王唐書狄仁傑傳互入善於言語端午日肅宗召見山人李唐帝方擁幼女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下帝泫然泣下新唐書肅宗張后傳承天皇帝倓既為張良娣所構肅宗怒而幽死又欲搖動代宗李泌入朝從容語及倓事曰臣念得黃臺瓜辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚自可四摘抱蔓歸今已一摘矣謹無再摘上愕然自是奪宗之計不行唐書李光弼代郭子儀於朔方營壘士卒麾幟無所更而光弼一號令之氣色乃益精明唐書本傳回紇吐蕃合兵圍涇陽郭子儀曰今眾寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓注矢於陣前子儀免胃釋甲投槍而進回紇諸酋長相顧曰是也皆下馬羅拜葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復總兵於此懷恩又為天所殺我曹豈肯與公戰乎通監唐代宗互入鎮重大事朱泚反諸生將從亂太學何蕃正色叱不聽故六館士無受污者唐何蕃傳互入節操辛京杲以私杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類通監唐德宗韓思彥巡察劍南益州高貲兄弟相訟累年不決思彥敕廚宰飲以乳二人悟泣曰公將以兄弟共乳而生邪乃請輟訟唐書帝問公權用筆法對曰心正則筆正筆正乃可法矣時帝荒淫故公權及之帝改容悟其以筆諫也新唐書本傳互入嘿會高仁厚圍梓州久不下乃為書射城中遺其將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功若十日不送楊師立者當分見兵為五番番分書夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於眾曰天子所誅者元惡耳他人無預也眾呼萬歲通監唐僖宗帝嘗畋於中牟踐民稼中牟令當馬前諫曰陛下為民父母奈何毀其所食使轉死溝壑乎帝怒叱去將殺之敬新磨追擒至馬前責之曰汝為縣令獨不知吾天子好獵耶奈何縱民耕種以妨吾天子之馳騁乎汝罪當死因請行刑帝笑而釋之通監後唐莊宗傳記景公使人養所愛馬馬病死公怒令人殺養馬者晏子請數之曰爾有三罪使汝養馬殺之一當死也又殺公素所喜馬二當死也使公以一馬之故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之晏子春秋魏武行役失道三軍皆渴乃令曰前有大梅林梅子甘酸可以解愒集鎮州亂殺其帥田弘正詔公往宣撫既行疾驅入公告兒郎等以天寶來禍福為兒郎等明之安祿山史思明李希烈梁崇義朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎眾皆曰無又曰令公以魏博六州歸朝廷為節度使後至中書令父子皆授旌節子與孫雖在幼童者亦為好官窮貴極寵榮耀天下劉悟李祐皆居大鎮王承元年始十七亦杖節此皆三軍所共聞也眾乃讙曰侍郎語是皇甫湜作韓愈行狀李懷光反所率皆朔方兵公知其謀與朱泚合也患之造懷光言曰公之功天下無與敵公之過未有聞於人主某至上所言公之情上寬明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君苟得志於公何有公既為太尉矣彼雖寵公何以加此彼不能事君能以事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉公之敵彼有餘力不如明告之絕而起兵襲取之清宮而迎天子庶人服而請罪有司雖有大過猶將揜焉如公則誰敢議語已懷光拜曰天賜公活懷光之命喜且泣公亦泣則又語其將卒如語懷光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懷光卒不與朱泚韓文贈董太傳行狀人變愁為喜歲易歉為豐劉賓客懷梟鴟以好音清祲沴為和氣唐文粹嚴冬變為韶景寒風鬱為和氣同上本朝文潞公知益州喜遊宴嘗宴鈐轄舍夜久不罷從卒輒拆馬庌為之薪不可禁遏軍校白之坐客股栗公曰天實寒可拆與之神色自若飲宴如故卒氣沮無以為變記聞文彥博知永興軍或言陝西鐵錢不便乞一切廢之朝廷雖不從人多知之爭以鐵錢買物賣者不肯受長安民多閉肆僚屬請禁之彥博曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百疋使賣之曰納其直盡以鐵錢勿以銅錢也於是眾知鐵錢不廢市肆復安同上慶曆中廣州有蕃商死珍珠沒官上命取珠出禁中錢易之以賜張貴妃時禁中同列因是有於上前乞旨和買緣此京師珠價騰踊上頗知之一日上於別殿賞牡丹妃嬪畢集貴妃最後至乃以前日珍珠為首飾以誇同輩至上前上望見以袖掩面曰滿頭白紛紛地更沒些忌諱妃慚赧起易之乃大悅自是禁中更不戴珠珠價大減鳴道集一語徑破千言牢東坡詩前漢武帝時人有殺上林鹿者下有司殺之東方朔曰是人有三當死使陛下以鹿之故殺人一也使天下聞重鹿賤人二也匈奴即有急惟鹿觸之三也武帝默然乃赦之
