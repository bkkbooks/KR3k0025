body:
  text: 作俑經苖民作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥呂刑庭燎之百由齊威公始也大夫之奏肆夏由趙文子始也公廟之設於私家由三桓始也記郊特牲孔子謂為俑者不仁記檀弓下子仲尼曰始作俑者其無後乎孟子梁惠王上有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子公孫丑史作法於涼其弊猶貪作法於貪弊將若之何左昭四互見流弊沈約曰開端樹隙通監宋紀時以浮虛相扇儒雅日替范寧謂其源始於王弼何晏二人之罪深於桀紂晉書范寧傳互見罪有所歸德宗貞元九年初稅茶歲得四十萬貫從鹽鐵使張滂所奏茶之有稅自此始德宗實録通監云州縣産茶及茶山外要路皆估直什稅一茶之有稅自王涯始唐書兩書異同今並載之初行稅間架除陌錢法所謂稅間架者每屋兩架為間上屋稅錢二千中稅千下稅五百吏執筆握算入人室廬計其數或有宅屋多而無它資者出錢數百緡敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買每緡官留五十錢給他物及相貿貿一作貸易者約錢為率敢隱錢百杖六十罰錢二千賞告者十緡其賞錢皆出坐事之家通鑑唐德宗經鼎折足覆公餗易鼎卦火炎崑岡玉石俱焚書嗣征言火逸而害玉延及于平民書呂刑若此無罪淪胥以鋪詩雨無正傷其本枝從而亡記哀公問民之無辜并其臣僕詩正月子謂公冶長雖在縲紲之中非其罪也論語子湛濁動乎下清明亂於上荀子救鬭者傷廕不祥之木為雷電所撲淮南子同類相推俱入禍門史趙世家連污史周勃世家令民為什伍而相壯司連坐通鑑周紀始皇幸梁山宮從山上見丞相車騎衆弗喜也中人或告丞相後損車騎始皇怒曰此中人泄吾語案問莫服捕時在旁者盡殺之通鑑秦紀淮南衡山二獄所連引列侯二千石豪傑等死者數萬人通鑑漢武紀王莽誅甄豐辭所連及便壯不請西漢楊雄傳無罪而坐率西漢石奮傳如源曰率家長也師古曰幼年無罪坐為父兄所率諸犯令相引數千人名曰株送西漢食貨志曰師古曰言被引牽者為其根株梁冀所連朝廷為之一空後漢事發相重西漢劉澤傳重猶纍也糠及米古舐字前漢荊吳傳黨事起張儉亡命望門投止其所經歷伏重誅者以十數連引壯考布遍天下宗親並皆殄滅郡縣為之殘破夏馥歎曰一人逃死禍及萬家通鑑漢靈帝袁紹誅閹官或有無鬚而誤死者後漢何進傳辭所連染無辜者衆通鑑漢殤紀窮治楚王英獄遂至纍年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附坐死徙者以千數而繫獄者尚數千人諸所連及率一切陷入無敢以情恕者御史寒朗曰考一連十考十連百歸舍口雖不言而仰屋竊歎莫不知其多冤通鑑漢明帝紀猶張瑟琴大絃急者小絃絶後漢陳寵傳石鑒僭位石閔反率趙人誅諸胡羯于時高鼻多鬚濫死者半晉載記灼火攻蠹蠹盡木焚唐書官者傳逮捕黨人其辭所連及太僕穎川杜密御史中丞陳翔及陳實范滂之徒二百餘人通鑑漢桓紀魏杜弼曰楚國亡猿禍延林木城門失火殃及池魚通鑑齊紀互入事出意表崔仁師曰古者父子兄弟罪不相及奈何以亡秦酷法變隆周中典且誅其父子足纍其心此而不顧何愛兄弟通監唐太宗跡涉嫌疑辭相逮引莫不窮捕考案至有姦人熒惑乘險相誣糾告疑似睚眥之嫌即稱有密一人被訟百人滿獄使殺人如麻流血成澤通監唐武后一夫不率闔境罹殃一境不寧普天致擾通鑑唐德宗王涯有再從弟沐家於江南老且貧聞涯為相跨驢詣之欲求一簿尉留長安二歲餘始得一見涯待之殊落莫久之沐因嬖奴以道所欲涯許以微官自是朝夕造涯之門以俟命及涯家被壯沐適在第與涯俱腰斬通鑑唐文宗有書尚書省門為詩以嘲賊者尚讓怒應在省官及門卒悉抉目倒懸之大索城中能詩者盡殺之識字者給賤役凡殺三十餘萬通鑑唐懿宗官者怨李訓等凡與之有瓜葛親者誅貶不已通監傳記巨防容螻而漂邑殺人突泄一熛而焚宮燒積呂氏春秋集割髮及膚剪爪侵肌應休璉書犧尊青黃乃木之災韓祭柳子厚文經謂子不信有如皎日詩大車豫所否者天厭之天厭之論語子顧曰為私誓州綽曰有如日左襄十八晉荀偃卒而視不可含范宣子撫之曰主苟終所不嗣事于齊者有如河左襄十九晉斐豹曰苟焚丹書我殺督戎宣子曰而殺之所不請於君焚丹書者有如日襄二十三齊晏子曰嬰所不唯忠於君利社稷者是與有如上帝襄二十五蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川左定三晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言群臣敢在下風左僖十五縱子忘之山川鬼神其忘諸乎左定九晉郤克曰所不此報無能涉河左宣十九所不與舅氏同心者有如白水投其璧於河左僖二十四則不能見夫人已所能見夫人者有如河左昭三十一互入怨恨孟孫謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君左定六齊子行抽劍曰所不殺子者有如陳宗左襄十四宋公曰所難子者上有天下有先君左襄十四郤克曰不報齊者河伯視之史記晉世家祖逖曰祖逖不能清中原而復濟者有如大江晉愍帝建興元年宋文帝指蔣山曰必無此慮若違今誓便是負於寧陵元嘉十七賜王衍詔略曰三辰在上一言不欺通鑑後唐明宗大夫種曰越王謹上刻青天敢不如命後漢趙曄吳越春秋集援青松而示心指白水而旌信劉孝標絶交論待余異日弟妹婚姻畢司馬歲秩滿出處行止得以遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言白居易草堂記出肺肝相示指天日涕泣韓文經死生契闊與子成說詩擊鼓久要不忘平生之言論語子書契所以識公信也慎子史晉欒書中行偃逆周子于京師而立之周子曰二三子用我今日否亦今日左成十八申之以盟誓重之以昏姻左成十三昭大神要言焉左襄九傳記越人結交約曰卿雖乘車我戴笠後日相逢下車揖經易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣易係辭互入非據維鵲有巢維鳩居之詩鵲巢互見非據彼其之子不稱其服詩候人子取猿狙而衣周公之服莊天運史服之不衷身之災也左齊慶封來聘其車美叔孫曰服美不稱必以惡終左德不稱祿猶鑿墉之址以益其高東漢皇甫規傳龜茲來朝樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼撞鍾鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂鸁也西漢龜茲傳侍中有封侯賜爵者士君子皆恥與為列焉通監漢靈紀婢作夫人不堪位置絳帖梁武評書集峨峨進賢冠耿耿水蒼佩服章豈不好不與德相對顧影聽其聲頳顏汗慚背韓文紫綬裹文身白侍郎本朝附鳴雞以隼翼披羔羊以豹文類要史衛懿公好鶴鶴有乘軒者左莊二十七漢武時大農經用耗竭有請置賞官名曰武功爵得至樂卿案漢書音義曰名樂卿者朝位從九卿加樂者別正卿又十九爵為樂公食公卿祿以顯軍功軍功多用超等大者封侯卿大夫小者郎吏吏道雜而多端則官職耗廢除故鹽鐵家富者為吏吏道益雜不選而多賈人矣史記平準書賦六百餘萬錢乘傳而行郡國如淳曰此言富者出錢穀得高爵或乃為使者乘傳車循行郡國以為榮也西漢賈誼傳西園弄狗著進賢冠帶印綬通監漢靈紀更始官爵皆賈豎群小語曰灶下養中郎將爛羊胃騎都尉爛羊頭關內侯後漢賣關內侯假金印紫綬傳世入錢五百萬後漢靈紀金紫佩士卒之身符策委僕隸之門非所以重名器正紀綱也通鑑晉愍帝紀緋服衆於青衣象板多於木笏通鑑唐武后晉趙王倫奴卒廝役亦加爵位每會貂蟬盈坐時人語曰貂不足狗尾續晉書互入非據北齊蒼頭皆開府封王狗馬及鷹亦有儀同郡君之號有鬭雞號開府通鑑陳紀員外常侍路上比肩咨議參軍市中無數豈是朝章固應如此通鑑陳世祖柳澤曰神龍以來賣官鬻爵妃主之門有同商賈舉選之曹實均闤闠屠販之人悉由邪而忝官黜斥之人咸因姦而冒進舊唐書本傳上以舞胡安叱奴為散騎侍郎李綱曰古樂工不與士齒惟齊末封曹妙達為王安馬駒為開府有國家者以為殷鑑通鑑唐高祖紀先是階無泛加皆以勞考敘進至五品二品仍奏取進止至是始有泛濫之階比及末年服緋者滿朝矣通鑑唐高宗紀屠沽臧獲用錢三十萬則別降封敕除官斜封付中書時人謂之斜封官通鑑唐中宗馬周曰騶子倡人鳴玉曳履與朝賢君子比肩而立同坐而食舊唐書本傳經或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也注以訟受錫榮何可保易訟卦易曰負且乘子曰負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣易繫互入不稱非所據而據焉身必危德薄而位尊並易繫辭包羞位不當也易否卦維鵲有巢維鳩居之詩鵲巢互見不稱子不仁而在高位是播其惡於衆也孟子受爵非道殃必疾東漢翟酺傳費充位居人上智居人下三國志互入不稱趙王倫篡位奴卒廝役亦加以爵每朝會貂蟬盈坐時人為之語曰貂不足狗尾續晉書本傳互入冒濫集牧守由將校以授皆虎而冠子男由胥徒以出皆鶴而軒劉賓客蚤虱名器鼠雀倉庾陸魯望文
