body:
  text: 事物相形子子貢結駟連騎以造原憲憲衣冠敝子貢慚家語好女之色惡者之孽也荀子史文帝常病癰鄧通常為帝唶吮之太子入問病帝使唶癰而色難之已而聞通常為帝唶吮之心慚史佞幸傳美女入室惡女之仇史記外戚世家上自勞軍至灞上及棘門軍直馳入將已下送迎已而之細柳不得入使使持節入帝曰此真將軍耳灞上棘門軍若兒戲耳其將固可襲而虜也史周勃世家王蠋布衣義不北面於燕況在位食祿者乎史田單傳後張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓謁大將軍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才漢書魏明帝使后弟毛曾與夏侯玄共坐時人謂之蒹葭倚玉樹泰初如朗月入懷魏志王濟雋爽有風姿每見衛玠輒歎曰珠玉在側覺我形穢晉書本傳潘嶽美姿儀常出婦人遇之者皆連手縈繞投之以果時張載甚醜每行小兒以瓦石投之委頓而反晉書潘嶽傳互見所遇不同阮咸與籍居道南諸阮居道北北阮富南阮貧七月七日北阮盛曬衣服皆錦繡粲目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳晉本傳時人謂道子為東録元顯為西録西府車騎填湊東第門可張羅通監晉安紀晉恭帝禪位于宋祕書監徐廣流涕哀慟侍中謝晦謂之曰徐公得無小過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同通監文德皇帝之葬段志玄與宇文士及分統士馬守章武門太宗夜使宮官至將軍所士及開營納使者志玄閉門不納停使者至曉太宗曰此真將軍也唐書互見紀律姚崇常有子喪謁告十餘日政事委積盧懷慎不能決惶恐入謝於上上曰朕以天下事委姚崇以卿坐鎮雅俗耳崇既出須臾裁決俱盡通監唐元宗傳記陳遵關西大俠犮人喪親遵為護喪事贈助甚厚王丹乃懷縑一匹陳於主人之前曰如丹此縑出自機杼遵聞而有慚色東觀漢紀中宗嘗召宰相蘇瓌李嶠子進見上曰宜意所通盡奏頲曰木從繩則正后從諫則聖嶠子跡進曰斫朝涉之脛剖賢人之心上曰蘇瓌有子李嶠無兒松蔥雜録冥鴻跡在煙霞上燕雀休誇大廈梁稚言雜録集見西施之容歸憎其貌楊德祖箋西施出惟嫫母侍側吳季重書南鄰擊鍾磬比里吹笙竽寂寂楊子宅門無卿相輿左太沖詠史詩虎豹之文炳於犬羊鸞鳳之音鏘於鳥鵲金玉之光炫於瓦石皇甫湜互見因精見粗無貴賤不悲無富貧亦足杜詩衆星羅青天朗者獨有月李白互見分量不同二十漸乖張清溝映汙渠三十骨骼成乃一龍一豬韓文冬之為候也霜雪飄暴凍入肌髮夏之為用也金流石礫火走膚脈如陽春高秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如洛陽咸秦者幾焉李文饒集衆木盡搖落始見竹色真孟東野互見因事見人醜婦競簪花花多映愈醜唐文粹衆花盡處松千尺群鳥喧時鶴一聲高達天雀喧知鶴靜鳧戲識鷗間同上本朝萬木歲寒配喬松於巨柏衆星夜艾凜明月與長庚東坡賀林待制啓互見因難見人試看青松鶴何似朱門客歐公集互見趨向不同君看花枝朝露何如松上霜風山谷詩經子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎易繫辭鳴鶴在陰其子和之中孚卦隆墀永歎遠壑必盈處高墀而長嘆遠壑之中盈響而應易略例善邇而遠至命宮而商應修下而高者降與彼而取此者服矣同上惠迪吉從逆凶惟影響書卿士師師非度小民方興相為敵讎書微子之命建無窮之基亦有無窮之聞畢命作善降之百祥作不善降之百殃伊訓並書鼓鍾于宮聲聞于外詩白華衛文公臣子多好善賢者樂告以善道也鄘于旄內和而外順則民膽其顏色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順記樂記下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不謹也是民之表也緇衣上好仁則下之為仁爭先人上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情語子路子以富貴而下人何人不尊以富貴而愛人何人不親家語互見施報愛人者人恆愛之敬人者人恆敬之孟子互見施報夫苟好善則四海之內皆將輕千里而來告之以善同上告子上生於其心害於其政發於其政害於其事公孫丑上文武興則民好善幽厲興則民好暴告子上上有好者下必有甚焉者矣滕文公上夫人必自侮然後人侮之家必自毀然後人毀之國必自伐而後人伐之離婁訑訑之聲音顏色拒人於千里之外告子下德之流行速於置郵而傳命已上並孟子大人之教若形之於影聲之於響莊子在宥別契券者所以為信也上好權謀則誕詐之人乘是而後欺探籌投鉤者所以為公也上好曲私則下乘是而後偏衡石稱懸者所以為平也上好傾覆則下乘是而後險勝斛敦概者所以為嘖也上好貪利則下乘是而後鄙豐取刻與以無度取於人荀子君道楚王好細腰故朝有餓人同上善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也同上不苟夫下之和上猶響之應聲影之像形也強國篇聽唱而應視儀而動正論篇上好富則民死利矣大略篇並荀子齊桓好服紫一國盡服十素不得一紫公患之管仲曰試勿衣也謂左右曰甚惡紫臭公曰諾三日莫有衣紫者韓子鄒君好長纓左右皆服纓甚貴公悉之因先自斷其纓而出國中皆不服同上人主之情上通于天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不收則多雨淮南子天文訓鄒衍盡忠於燕惠王王信讒繫之鄒子仰天而哭正夏而天為之降霜淮南子有陰德者必有陽報有陰行者必有昭名同上湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁傳子體痛者口不能不呼心說者顏不能不笑尹子從道必吉反道必凶如影如響也同上史齊桓公復會諸侯於葵丘益有驕色諸侯頗有叛者史齊世家口雖未言聲疾雷震令雖未行化馳如神史記漢女居東海飬姑姑女讒之於姑姑經太守訴而殺之五月下雪漢書東海有孝婦少寡無子養姑甚謹姑死姑之女告吏婦殺我母更捕孝婦婦自誣服太守竟殺婦郡中枯旱三年漢書上自初即位招選天下文學材智之士待以不次之位四方士多上書言得失自衒鬻者以千數通鑑漢武紀猶桴鼓之相應前漢李尋傳宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍西漢杜欽傳吳王好劍客百姓多瘡瘢楚王好細腰宮中多餓死同上匡衡傳朝有變色之言則下有爭鬭之患上有自專之士則下有不遜之人上有克勝之任則下有傷患之心上有好利之臣則下有盜竊之民周南召南被聖賢之化深故篤於行而廉於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民祀晉侯好儉而民蓄聚太王躬仁邠國貴恕由此觀之治天下者審所上而已並同上善惡之報各如其事西漢梅福傳車駕自幸洛陽獄録囚徒理出千餘人時天旱大雨通監為善者天報之以福為非者天報之以殃西漢景帝紀下之應上猶景嚮也西漢伍被傳讀曰響自永平以來臣民雖有習浮屠術者而天子未之好至帝始篤好之常躬自禱祠由是其法浸盛通監漢桓紀猶叩木本百枝皆動東漢李固傳互見事同一體舉中於禮則強梁禠氣片言違正則廝臺解情東漢循吏傳贊一夫得情千室鳴絃同上互見循良姜詩母嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舍側忽有湧泉味如江水每旦輒出雙鯉魚以供二母之膳同上姜詩妻列傳魏武好法術而天下貴刑名魏文慕通達而天下賤守節通監殷紂好色妲己是出葉公好龍真龍游廷通監漢桓紀王者心有所想雖未形顏色而五星以之推移陰陽為之變度漢靈紀謝安好聲律㫷功之慘不廢絲竹土大夫效之遂以成俗晉侮西公紀秦劉蘭討蝗經秋多不能滅有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是歲秦大熟晉武紀作解散髻斜插簪朝野慕之相與倣效齊王儉齊帝既殘忍有司訊囚莫不嚴酷或燒犁耳使立其上或燒車釭使以臂貫之梁敬帝紀以上並通監裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠通監唐太宗上入苑中見蝗掇數枚祝之曰民以榖為命而汝食之寧食吾之肺腸舉手吞之是歲蝗不為災同上夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣同上唐高祖張楚金魏元忠臨刑太后使鳳閣舍人王隱客馳騎傳聲赦之是日陰雲四塞既釋楚金等天氣晴霽武后並通監傳記行非為影也而影隨之呼非為響也而響和之說文書蟊吏抵冒取民財則生蟘吏乞貸則生螟吏冥冥犯法則生許慎說文宋景公時熒惑在心公召子韋問焉子韋曰禍在君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於歲公曰歲飢人餓必死焉為人君而殺其人誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舍後果三徙呂氏春秋齊景公時熒惑守虛朞年晏子曰虛齊之分野當強為善公乃去冤獄振孤敬老行之三日而熒惑遷晏子春秋周公下白屋之士七十人而天下之士皆至晏子與同衣食百人而天下之士亦至仲尼修道行理文章而天下之士亦至說苑集爾形信直影亦不曲爾聲信清響亦不濁晉裴頠女史針互入端本澄源庶女告天振風襲於齊堂建平王上書風大行貞女蒙冶容之化淳化殷流盜跖挾曾史之情陸士衡演連珠賤臣叩心飛霜擊於燕地選江文通上書珠玉無脛而自至者以人好之也孔文璋文宋景公時大旱三年卜之以人祠乃雨公下堂頓首曰所以求雨將自當之言未卒大雨藝文類聚強於內者外必勝殖不固者發必隳皇甫湜匹婦含怨三年亢陽匹夫結憤六月飛霜唐文粹漢高帝大度故其時多魁傑不羈之才孝武好英風故其時富瑰琦立名之士孝宣精吏能故其時萃循良核實之能陸宣公集誠信大虧則百事無不紕繆同上本朝六國合從而辨說之材出劉項並世而籌畫戰鬭之徒起唐太宗欲治而謀謨諫諍之佐來臨川集唐太宗朝將相固不可及至伎藝之士醫有孫真人陰陽有李淳風呂才相法有袁天綱後世不及也鳴道集武帝好四夷之功而勇鋭輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘亦被其利此一君之身趣好殊別而士輒應之司馬溫公通監論經子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎語憲問子曰參乎吾道一以貫之曾子曰唯里仁子犁然有當於人之心莊山木子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子互入知音史禰衡為江夏太守黃祖作書記輕重踈密各得體宜祖持其手曰此正得祖腹中之所欲言也東漢本傳互入文章王儉令任昉作一文及見曰正得吾腹中之欲任昉傳集堯心惟舜會元稹集光陰與時節先感是詩人白樂天杜詩韓集愁來讀似倩麻姑癢處抓杜牧之經若金用汝作礪書說命上惟木從繩則正同上鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章記學記無本不立無文不行禮器子無君子莫治野人無野人莫養君子孟滕文公上以粟易器械者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉同上勞心者治人勞力者治於人治於人者食人治人者食於人並同上金石有聲不考不鳴莊子互見激厲有刀者礲諸有玉者錯諸楊學行烏號之弓溪子之弩不能無弦而發越舲蜀艇不能無水而浮淮南子俶真訓史陽不得陰之助亦不能獨成歲終前漢董仲舒策水火相濟監梅相成唐王義方傳傳記干將莫耶非得人力則不能割堅箭利金不得玄機之利則不能遠戰國策龍非風不舉龜非火不兆戴禮曾子天圖篇集塤箎相須選雲龍之所能使為靈也然龍弗得雲無以神其靈矣韓文雜記經非權則泥權非經則悖柳斷刑經同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也易乾卦鶴鳴在陰其子和之中孚召雲者龍命呂者律易略例命宮而商應同上有豕白蹢蒸涉波矣詩漸漸之石將久雨則豕進涉水波喓喓草蟲躍躍阜螽草蟲詩以燧取明火於日以鑒取明水於月周禮天降時雨山川出雲記孔子閒居方以類聚樂記子陽燧見日則燃為火莊子鄭師文學琴於師襄當春而叩商絃以召南宮涼風總至草木成實及秋而叩角絃以激夾鍾溫風徐回草木發榮當夏而叩羽絃以召黃鍾霜雪交下川池暴沍及冬而叩徵絃以激蕤賓陽光熾烈堅冰立散將終命宮而總四絃則景風翔慶雲浮甘露降醴泉涌列湯問施薪若一火就燥也平地若一水就濕也草木疇生禽獸群焉物各從其類也荀勸學天之且雨也陰曀未集而魚已噞矣山雲蒸柱礎淮南子抱薪加火燥者必先然平地注水濕者必先濡鄧子史蟋蟀俟秋吟蜉蝣出以陰虎嘯而風冽龍具而致雲王褒頌南風至則黃鍾應融風動而魚上冰後蔡雍傳威蒸在野野集仁獸後漢應龍之翔雲雺滃然而從震風薄怒萬竅不約而號物有自然相動耳唐裴寂贊影之像形響之赴聲動而相隨各以類應唐傳記吳牛見月而喘世說蛤蟹珠龜與月盛衰會稽先賢傳蚌蛤龜珠與月盛衰月者太陰之精故龜蛤之屬因之以盛虧呂氏春秋曰月望則蚌蛤實月晦則蚌蛤虛大戴禮霜降則鳴山海經陽出雞鳴以類感也春秋說蟻封穴戶大雨將至焦貢易林唐樂懸散失獨無徵音李嗣真求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一段為四具補樂懸之散闋大周正集同音者相和同類者相似飛鳥號其群鹿鳴求其友楚辭叩宮而宮應彈角而角動虎嘯而谷風生龍舉而景雲往聲音之相扣兮言物類之相感也同上鳴聲相應仇偶相從選詩蚌蛤珠胎與月虧全選東都賦隱雷自天昆蟲已聽浮陰在漢柱礎先霑任孝恭啓
