body:
  text: 乘時而樂經欲其及時以禮自娛樂也詩蟋蟀今我不樂日月其邁同前今者不樂逝者其耋詩車鄰子有酒食何不日鼓瑟且以喜樂且以永日詩山有樞史人生行樂耳須富貴何時西漢楊惲傳張翰曰使我有身後名不如即時一杯酒晉書張翰傳更可憐人生如寄惟當行樂何用愁為通監陳宣帝大建五年晉王聞河水合曰用兵數歲限一水不能度今冰自合天贊我也亟如魏州通監後梁均王集時不可兮再得聊逍遙兮容與楚辭對酒當歌人生幾何譬如朝露去日苦多魏文短歌行清時難屢得嘉會不可常曹子建送應氏詩時無重至華不再揚蘋以春暉蘭以秋芳來日苦短去日苦長今我不樂蟋蟀在房陸機短歌行揮金樂當年歲暮不留儲張景陽詠史詩頓足起舞抗音高歌人生安樂孰知其他潘嶽間居賦人生不能行樂死何以虛諡為潘安仁吹笙賦良晨美景賞心樂事四者雖並謝靈運擬魏太子鄴中集詩序人生如寄多憂何為今我不樂歲月如馳善哉行願及芳年賞嬌鶯二月初孟浩然人生得意須盡歡莫使金樽空對月李太白集人生飄忽百年內且須酣暢萬古情李太白集下直間如社尋芳醉似狂白樂天時景不重來賞心難再并白侍郎良晨且宴樂樂往不再來韋應物集塵世難逢開口笑杜牧之殘花不一醉行樂是何時杜牧之本朝優遊琴酒逐漁釣上下林壑相攀躋及身強健始為樂莫待衰病相扶攜歐公集明年豈無年心事恐蹉跎坡詩簿書常苦百憂集樽酒今應一笑開坡詩聊將詩酒樂一掃簿書冗坡詩經君子向晦入宴息易隨卦下管上簟乃安斯寢乃寢乃興詩斯干史君子夜以安身左昭元高枕顯神西漢梁翼傳集子不知耕婦不知織乘馬從徒安坐而食韓文經子寧不嗣音詩子襟母金玉爾音而有遐心詩白駒簡謂之筆注今簡札也爾雅子千里之情通管子傳千里之忞忞莫如書楊問神敬佩玉音服之無斁文中子立命篇史子産寓書於子西以告宣子左襄二十四年叔向詒子産書左昭六廣武君謂韓信曰君苦使一介奉咫尺之書史記萬石君為中涓受書謁史本傳時有奏記西漢朱博傳移書顯責之西漢薛宣傳鄧訓故吏知訓好青泥封書從黎陽步推鹿車載青泥訓嘗將兵屯黎陽至上谷遺訓東觀漢紀見後漢本傳注心開目明反覆數周曠然發曚東漢蔡雍劉廙曰尊卑有分不敢修草書三國志執玩反覆不能釋手劉琨傳萬里之心存於尺書晉書劉琨傳殷羡為豫章太守都下人士因其致書百餘函行次石頭皆投之水中曰沈者自沈浮者自浮殷洪喬不為置書郵晉書殷浩傳互見端介殷浩答亙溫書慮有謬誤開閉數十竟達空函晉書殷浩置箋於簡文具自申敘晉書殷浩傳陶侃為荊州遠近書疏莫不手答晉書劉弘為荊州剌史每發手書郡國叮嚀款密莫不感悅咸曰得劉公一紙書賢於十部從事晉陽秋徐湛之善於尺牘音詞流暢沈約宋書韋陟常以五采箋為書記使侍妾主之其裁答受意而已皆有楷法陟唯署名自謂所書陟字若五朵雲時人慕之號郇公五雲體新唐書本傳陟封郇國公席豫與子弟屬吏書不作草字新唐書本傳傳記公府奏記郡將奏箋文心雕龍張九齡家養群鴿每與親知書繫鴿足上飛往投之目為飛奴王仁裕開元天寶遺事集時因北風復惠德音選李陵答蘇武書馳一介之使加咫尺之書孔文舉書蔡雍曰相見無期唯是書疏可以當面蔡雍書書疏往返未足解其勞結魏文帝吳質書信到奉所惠貺發函伸紙是何文采之巨麗而慰諭之綢繆乎魏吳質答曹植書得所來信文采委曲曄若春華瀏若清風曹子建答吳季重書承問震惶精夾飛越劉越石良訊代兼金陸機詩東望于邑裁書敘心選書申詠反覆曠若復面選書客從遠方來遺我一書札上言長相思下言久離別置書懷袖中三歲字不滅古詩客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中竟何如上有加餐食下有長相憶古樂府誰謂情可書盡書非尺牘謝宣遠王撫軍詩音塵慰寂滅謝靈運方山詩書疏尺牘千里眉目顏氏家訓敢陳丹款以代言覲類文王筠答邵陵王箋寶札自千里江淹惠存好我無密爾音駱賓王集開緘書札光杜工部巴箋染翰光杜詩欲問平安無使來札翰時相投書疏莫相忘家書抵萬金並杜詩久客多枉友朋書素書一月凡一束盧名但蒙寒溫問泛愛不救溝壑辱道州手札適復至紙長要自三過讀盈把那須滄海珠入懷本擬崑山玉撥棄潭州百斛酒蕪沒蕭岸千株菊使我晝立煩兒孫令我夜坐費燈燭杜工部詩拆書八九讀淚落千萬行元稹集句句截我腸萬恨緘其中元稹集投擲珠玉元微之舊好飛瓊翰元微之集足下猶復以為可教貶損道德乃至手筆以問之辭義高遠足下之於故舊之道得之矣韓文公文賜書諭誨微悉重厚欣踊恍惚疑若夢寐捧書叩頭悸不自定柳子厚文集穆然清風發在簡素柳集序開緘宛見諫議面盧同茶歌是非傳尺素誰與論衷腸劉長卿一緘瓊玖贈萬里別離愁武伯蒼蘭章忽有贈韋應物忽因西飛禽贈我以瓊琚韋應物集行數雖不多字字有委曲韋應物殷嶠工為尺牘孔帖本朝士或同師友締交遊以道誼相期者尚有手書勤勤之意猶為近古歐公與陳員外書寓意於簡止於舒心意為問好下吏以私自達於其屬長而有所候問請謝者則曰箋記書啓歐公與陳員外書遙懷具短劄類要時飛寶刻之音臨川集書隨好夢到坡詩一紙家書百鎰輕欒城集衡陽有歸鴈它日更傳音山谷但知家裏俱無患不用書來細作行山谷欲傳千里信暗折一枝春後山史元稹長於詩在越時辟竇鞏工於詩與之酬和號蘭亭絶唱唐書本傳集恨無隋侯珠以酬荊文璧選魏子悌咸池酬於百里夜光報于魚目文選韻劇詞殫瓖奇怪譎意欲定霸取威置僕於窮地耳白傳敢辭課拙酬高韻一句爭禁萬頃波投君之文甚茺蕪數篇價直一束芻報我之章何璀璨纍纍四貫驪龍珠慚無白雪曲難答碧雲篇貧薄詩家無好物反投桃李報瓊琚並白侍郎錢財不足以賄左右之匱急文章不足以發足下之事業稇載而往垂橐而歸足下亮之而已韓文酬君十首三更坐減卻當時半夜愁元微之珠玉慚新贈麗句悲虛擲粗酬珍重意工拙定相懸憐君詩似湧贈我筆如飛元微之新和敵南金柳詩申章報蘭藻韋應物覽君金玉篇彩色發我容韋應物開緘瑩新篇韋應物本朝少低筆力容我和無使難追韻高絶歐公詩空虛豈敢酬瓊玉坡詩我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江黃魯直答蘇東坡詩玉案愧無酬綿繡木瓜卻用報瓊塊欒城集斷璋殘璧忽我贈把玩溢目驚輝光自嗟行李久蕭瑟安得置之雲錦囊僧參寥子經金玉玩好周禮玉府史顏師古多藏古畫器物書帖性所篤愛唐書本傳王涯既誅涯家書數萬卷侔於書府前代法書名畫人所寶惜者必以厚貨致之不受貨者必以官爵致之後為盜取之或剔取函奩金寶之飾與其玉軸而棄之唐本傳集玩奇筋骨輕劉賓客凡人問藏畫必有顧陸張吳著名卷軸方可言有圖寫若言有書籍豈可無九經三史顧陸張吳為正經楊鄭董展為三史餘盡為百家唐彥達名畫記家世所寶琴書圖畫廣明之亂散失蕩盡其中二琴希世之寶也張茂樞記本朝奇書古畫不論價盛以錦囊裝玉軸歐公詩歐陽公集三代以來金石刻為一千卷歐公行狀余視天下之蓄此者多矣有能及三世者乎其始求之若不及既得唯恐失之而子孫不以易衣食者鮮矣東坡集有好書而不得其法則拊心歐血幾死而僅存至於剖家斫棺而求之是豈聲色臭味足以移人哉方其樂之也雖口不能自言而況他人乎東坡集經藏之書府書子聚書四十年得書八萬卷河間之侔漢室頗謂過之金樓子華匱十重緹巾十襲闕子史河間王德以金帛招求四方善書得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得皆古文先秦舊書采禮樂故事稍稍增輯至五百餘篇通監漢武帝紀王修家不滿斗斛有書數萬卷魏志郭基任語人云任官之所頗令人寫書樊子蓋遺之書曰在官寫書亦是風流罪過三國志典略張華雅愛書籍嘗徙居載書三十乘祕書監撰定官書皆資華之本以取正天下奇祕世所希有者悉在華所家無遺財有文史溢于几篋晉書張華傳崔祖思死家無餘財有書八千卷晉陽秋辛術清儉寡欲凡諸資物一毫不犯唯收典籍多是晉宋齊梁時佳本北齊沈驎手寫細書滿數十篋齊書軸帶帙籤異色以別之唐書藝文志吳兢家聚書頗多嘗目録其卷第號吳氏西齊書目舊唐本傳陸龜蒙得書乃録讎比所藏雖少其精皆可傳新唐陸龜蒙傳則天以王方慶家多書籍訪求右軍遺迹唐書王方慶傳田洪正起樓聚書萬餘卷唐書王涯家書數萬卷侔於書府唐書假成式家多書史用以自娛舊唐書本傳李溪家有奇書時號李書樓後唐書周張昭遠好學積書萬卷以樓載之號書樓五代史補集鄴侯家多書插架三萬軸一一懸牙籤新若手未觸韓退之詩家有賜書三千卷在善和里舊宅柳文薛稷知集庫馬懷素知經庫沈佺期知史庫武平一知子庫通曰四部書景龍文館記本朝余家藏書一萬卷六一居士傳序歐陽公生於物少有所好收蓄古文圖書集三代以來金石刻為一千卷以校正史傳百家訛謬之説歐公行狀經錦衣狐裘黼衣繡裳佩玉將將詩終南衣裳楚楚曹風蜉蝣史雋不疑見暴勝之褒衣慱帶前漢書冰紈純麗西漢地理志冰謂色鮮潔如水綺襦紈袴西漢敘傳紆侈袂曳方履唐書儒林傳集薰以幽若流芳肆布選七啓織為雲外秋鴈行染作江南秋水色白侍郎經珍用八物周禮膳夫注八珍謂淳熬淳毌炮豚炮牂搗珍漬熬肝膋也其詳見內則死生鮮薧之物周禮庖人或膰或灸嘉殽脾臄詩大雅行葦飲御諸友包鱉鱠鯉詩六月其殽維何維筍及蒲詩韓奕觴酒豆肉記坊記食不厭精膾不厭細語鄉黨有盛饌必變色而作同上子魚我所欲也熊掌亦我所欲也孟告子上膾灸與羊棗孰美孟子史享有體薦宴有折俎左宣十六有肉如坻有肉如陵同上庶人有魚灸之薦國語獨置大胾西漢周亞夫傳割鮮染輪西漢司馬相如傳不過一肉卮酒相對西漢張禹傳互見用情漿酒藿肉西鮑宣傳互見用情五鼎食西主父偃傳糲粱之食漢書鹽食肴之將西食貨志下武帝嘗幸王濟宅供饌甚豐悉貯琉璃器中晉王濟傳石崇庖廚窮水陸之珍晉本傳晉元帝始鎮建鄴每得一豚以為珍膳項上一臠尤美輒以薦帝群下未嘗敢食時呼為禁臠晉謝倱傳王羲之年十三周顗異之時重牛心灸先割噉羲之晉本傳何徹侈於味食必方丈後稍欲去其甚者猶食白魚鱔脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾玩曰鱔之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螫蚶蠣眉目內闕慚混沌之奇壙殼外緘非金人之慎不悴不榮曾草木之不若無香無臭與瓦礫其何算故宜長充庖廚永為口味梁書裴冕珍膳賓客有昧於品味之名者唐本傳八珍百品以宴賓客唐韋彤傳互見賓客鼎臑而刀切盈望和致芳只臑熟也芳椒薑也只語助也楚詞蕙肴蒸兮蘭藉楚詞和酸若苦陳吳羹吳人善作羹楚詞招瘣珍羞琅玕充溢圓方南都賦嘉肴充圓方曹子建公宴詩豐膳出中廚曹子建贈丁廙膚寸肴羞味踰方丈應休璉書六禽殊珍四膳異肴窮海之錯極陸之毛七命封熊之蹯翰音之跖燕髀之脣玄豹之胎七命時膳四膏七命饔人縷切鑾刀若飛應刃落俎靃靃霏霏潘嶽西征賦積肴如丘山左太沖吳賦甘食兼味夏侯常侍諫中廚辨豐饌樂府箜篌引繁肴既闋亦有寒羞朝食也選膾鯉臇蝦胎樂府名都篇酌醴焚枯魚百一詩薄耆之灸凝脂之飯文選海物錯萬類陸産尚千名齊謳行八珍盈雕俎綺肴紛錯重鮑明遠臑鄨炮羔臇子兗切鳧煎鴻蝦牛之臑芍藥之醬文選肴開玉饌駱賓王鮮鯽銀絲鱠香芹碧澗羹杜詩紫駝之峰出翠釜水精之盤行素鱗犀箸饜飫久未下鑾刀縷切空紛紜御廚絲絡送八珍杜詩勸客馳蹄羹杜詩朱門酒肉臭杜詩列鼎錯珍羞李白集庖霜鱠玄鯽淅玉吹香粳朝饌已百態春醪又千名韓文臠盤灸酒群奴餘啄韓文丹穴取鳳充行庖高達夫行廚五熟烹劉賓客封腴擊鮮同前盤筵饒異味元微之集鼎臑俎臠胾柳文五侯王氏競致奇膳護樓護為五侯上客乃合以為鯖世稱五侯鯖以為奇味焉西京雜記漢有五侯鯖君臣鯖父子鯖結盟人致共為之飧南越志內廚五鼎外膳二肴西京雜記金齏玉膾東南佳味南部煙花傳本朝紫馳之峰人莫識雜以雞豚真可惜今君坐致五侯鯖衣是猩唇與熊白東坡經酒既和旨詩賓之初筵清酒百壺詩韓奕君子有酒旨魚麗仲冬之月乃命大酋秫稻必齊趜糵必時湛熾必潔水泉必香陶器必良火齊必得記月令酒者所以養老也所以養病也記射義子日昃不飲酒酒必酸賓主百拜而酒三行楊子修身史奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也左威六年有酒如池有酒如澠左傳大宛有蒲萄酒史夷狄傳酒百藥之長前食貨志下酒者天之美祿帝王所以頤養天下享祀祈福扶衰養疾百禮之會非酒不行前食貨志下銷憂者莫若酒前漢東方朔傳漿酒霍肉西漢張禹傳互入食品一肉卮酒西漢鮑宣傳互入食品鮮于輔曰醉客謂酒清者為聖人濁者為賢人魏志徐邈傳阮籍聞步兵廚營人善釀有貯酒三百斛乃求為步兵校尉晉書本傳阮孚為常侍以金貂換酒同上桓公有王簿善別酒好者謂青州從事惡者謂平原督郵世説集奠桂酒兮椒漿楚辭千鍾電釂選七命鷥觴酌醴選叔夜雜詩置酒若淮泗左太沖吳賦美酒斗十千選樂府名都篇破除萬事無過酒何但步兵偏愛酒杜詩玉壺美酒清若空李白集方知趜糵靈萬物無與匹白侍郎九醞侈聖賢白樂天春醪又千名韓文斷送一生唯有酒韓文舊法依稀傳自杜新方要妙得於陳白傳色洞玉壺無表裏光搖金盞有精神能銷忙事成間事轉得憂人作樂人白傳集雲液灑六腑陽和生四肢白傳集溢甕清如水粘杯半似脂姚少監經誕彌厥月詩生民乃占我夢吉夢維何維熊維羆男子之祥詩維嶽降神生甫及申詩生男子設弧於門左女子設帨於門右記內則男子生桑弧蓬矢六以射天地四方記史李白母夢長庚而生李白唐本傳傳記夫子生有麟降於庭孔鯉生有人饋金鯉記室新書關令尹喜生時其家陸地自生蓮華光色鮮盛關令內傳集皇覽揆余初度兮楚辭昴星呈祥德精降祉文選王文憲集敘太白之精雷泉之靈應家之楨為國而生張説上帝降精是生純臣蛇蟠北極鵬化南溟楊炎我生之辰月宿南斗韓文本朝生育初日夏英公門弧吉慶是謂嘉時臨川蓬矢之祥雖世俗之所尚蓼莪之感逮衰老而不忘東坡攝提正於孟陬已光初度月宿直於南斗更借虛名東坡時及初度弧矢之祥永記於生育老逢誕日泣親養之無時並欒城集椿年七十二回新蓬矢桑弧記此辰同前不惟嵩嶽降神固亦文星助采碎事
