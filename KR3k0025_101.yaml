body:
  text: 逐利經機巧趍利詩葛屨放於利而行多怨語里仁小人喻於利同上子後義而先利不奪不饜孟梁惠王上王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣同上枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為歟孟滕文公上有賤丈夫焉必求龍斷而登之以左右望而罔市利孟為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄同上保利棄義謂之至賤荀惟利所在無所不傾荀不苟凡人之情見利莫能勿就故利之所在雖千仞之山無所不上深源之下無所不入管禁藏秦王有病召醫舐痔者得車五乘莊史惟利是視左成十二年叔向曰錐刀之末將盡爭之左昭六年太史公曰利誠亂之始也史孟子傳序利令志昏平原君傳好利無信不識禮義德行苟有利焉不顧親戚兄弟若禽獸耳史魏世家呂不韋販賤賣貴家累千金史本傳子貢鬻財於曹魯之間史貨殖傳行賈丈夫賤行也而雍樂成以饒販脂辱處也而雍伯千金賣漿小業也而張氏千萬洒削薄技也而郅氏鼎食由是觀之富無輕業則貨無常主能者輻湊不肖者瓦解天下熙熙皆為利來天下壤壤皆為利往夫千乘之王萬家之侯百室之君猶尚患貧而況匹夫編戶之民乎並同上匹夫專利謂之盜史記周紀苟利所在不知禮義史匈奴傳樂毅入臨淄取寶物祭器輸之於燕通監周紀頑頓嗜利西漢陳平傳逐利不耳慮非顧行也西漢賈誼傳注言其所追逐利唯計利與不耳桑洪羊洛陽賈人子善心計年十三侍中言利事析秋毫通監漢武紀趍利如水走下四方無擇前漢食貨志商賈乘上之急所賣必倍習於商功分銖之事牟利取也富商大賈亡所牟利並同上刺繡文不如倚市門西漢貨殖傳序義路閉則利門開東漢李固傳司徒袁隗欲為從女求姻見黃允歎曰得婿如是足矣允聞而黜遣其妻通監漢桓紀互入婿門并無情王戎性好興利每自執牙籌晝夜筭計恒若不足晉書本傳魏城陽王徽走至山南抵前洛陽令寇祖仁家祖仁一門三刺史皆徽所引拔以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戶侯今日富貴至矣乃怖徽云官捕將至令其逃於他所使人於路邀殺之送首於兆通監梁高祖諸道巡院皆募駛足置驛相望四方貨殖低昂及他利害雖甚遠不數日即知每朝謁馬上以鞭筭唐書劉晏傳初吉溫因李林甫得進及楊釗恩遇浸深溫遂去林甫而附之為釗畫代林甫執政之策通監唐元宗傳記大王之狗臥起行止母相與鬭投之一骨輕起相牙戰國策田英曰義死者不避鈌鉞之威義窮者不受軒冕之賜無義而生不如有義而死說苑求利下交曾無愧色分銖之利知而必爭同上集目額語瞬動頞塞鼻談智於尺寸之間窺窬於分毫之利晉成伯陽平樂市賦競羽毛之輕趍錐刀之利劉孝標廣絕交論利重太山道輕鴻毛周祗執友箴市人日中集於利競錐刀杜詩醫善吮人瘍含人血非有肌骨之親也利之所加也韓文質劑之曹較固之倫合彼此而騰躍之冒良苦之巧言致量衡於險手抄忽之差鼓舌傖儜詆欺相高詭態橫出鼓囂譁坌煙埃劉賓客集子本頻蕃息貨販日兼并求珠駕滄海採玉上荊衡北買党項馬西擒吐蕃鸚炎州布火浣蜀地錦織成元微之集舳艫爭利涉來往接風潮劉叉文本朝彼佞人者不知義之所在而惟利之從故也利在君父則從君父利在權臣則附權臣利在敵國則交敵國利在夷狄則親夷狄利之所在則從之利之所去則違之范祖禹唐監經不登高不臨深記曲禮上諸侯不下漁色記坊記君子頃步而弗敢忘孝也一舉足而不敢忘父母是故道而不徑舟而不游記祭義互入子道道途不爭險易之利冬夏不爭陰陽之和愛其死以有待也養其身以有為也記儒行君子不以一日使其躬儳焉如不終日記表記註可輕賤之色也不敢以先父母之遺體行殆惡言不出於口忿言不反於身不辱其身不羞其親記祭義互入子道身也者親之枝也敢不敬與記哀公問互入子道君子不重則不威語學而豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也語憲問子無尺寸之膚不愛焉則無尺寸之膚不養也孟告子上知命者不立於巖墻之下孟盡心上周公曰君子力如牛不與牛爭力走如馬不與馬爭走荀有干越之劍者柙而藏之不敢用也寶之至也莊刻意奔車之上無仲尼覆舟之下無伯夷韓非史千金之子不死於市史記人人自愛而重犯法史平準書百金之子不騎衡漢袁益傳王陽為益州長史行至九折阪陽曰奉先人之遺體奈何數乘此險西漢本傳千鈞之弩不為鼷鼠發機萬石之鍾不以筳撞起音通監漢獻紀傳記南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也列女傳集家絫千金坐不垂堂司馬相如諫獵疏努力自愛選李陵荅蘇武書以明月珠彈千仞雀吾不能也陳子昂肯與夫斗筲者決得失於一夫之目而為之憂樂哉韓文不曾妄與燕雀群王維集豈無朝陽鳳羞與微物爭唐文粹互入高舉遠覽本朝韓魏公言始學行已當如金玉不受微塵之汙遺事范忠宣公曰大輅與柴車較逐鸞鳳與鴟梟爭食連城與瓦石爭觸君子與小人鬭力不惟不能勝兼亦不可勝不惟不可勝雖勝亦非也范忠宣公行狀懍懍乎若處女之在閨也兢兢乎若懷千金之璧而行也東坡楊薦字說俗言彭祖觀井自係大木之上以車輪覆井而後敢觀東坡集射鼠何勞挽六鈞同上千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也東坡留侯論互入知所輕重明珠自有千金價莫為遊人作彈丸百斛明珠經諸侯非問疾弔喪而入諸臣之家是謂君臣為謔記禮運下堂而見諸侯天子之失禮也記郊特牲暴虎馮河死而無悔語述而子以隋侯之珠彈千仞之雀莊史虞翻性疏直數有酒失又好抵忤人多見謗毀通監魏明紀集子厚少年勇於為人不自貴重顧藉謂功業可立就韓文墓誌經柔而不憂於斷者得所御也易略例上子邶詩曰執轡如組兩驂如舞孔子曰為此詩者其知政乎夫為組者總紕於此成文於彼言其動於近行於遠也執此法御民豈不化乎家語三恕周宣王之牧正役人梁鴦者能養鳥獸雖虎狼無不柔馴鴦曰養虎之法順之則喜逆之則怒有血氣者之性也食者不敢以生物與之為其殺之之怒也不敢以全物與之為其辟之之怒也時其飢飽達其怒心虎之與人異類而媚養己者也列子聖主之治也順猶造父之御也和輯乎轡銜之際而緩急乎唇吻之和正度乎胸臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進能退履繩而還曲中規矩取道致遠氣力有餘誠得其術也淮南御得其道則天下狙詐咸作使楊史車軌塵馬候蹄御者不失其馳穀梁英布與隋何歸漢至漢王方踞床洗而召布入見布大怒悔來欲自殺出就舍張御食飲從官如漢王居布大喜過望西漢英布傳韓信之下魏破代漢輒使人收其精兵滎陽以拒楚通監漢高紀夫與人鬭不搤其亢音剛喉嚨也拊其背未能全勝西漢婁敬傳韓信曰陛下不能將兵而善將將西漢韓信傳欲天下之治安莫若眾建諸侯而少其力力少則易使以義國小則亡邪心今海內之勢如身之使臂臂之使指莫不制從通監漢文紀夫泛駕之馬跅弛之士亦在御之而已西漢武紀虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從西漢公孫洪傳羈縻勿絕西漢司馬相如傳寇鄧之高勳耿賈之洪烈分土不過大縣數四所加特進朝請而已東漢二十八將論曹操曰吾任天下之智力以道御之無所不可通監漢獻紀呂布降曹公縛之呂布曰繩縛我急曹公曰縛虎不得不急魏書魏劉曄曰釣者如中大魚則縱而隨之須可制而後牽之則無不得也通監魏紀崔浩曰夫擊蛇者先擊其首首破則尾不能掉通監宋太祖李崇徙兗州刺史兗土舊多劫盜崇命村置一樓樓皆懸鼓盜發之處亂擊之旁村始聞者以一擊為節次二次三俄頃之間聲聞百里皆發人守險要由是盜發無不擒獲通監齊太祖爾朱榮廄有惡馬榮命高歡剪之歡乃不加羈絆而剪竟不蹄齧己而起曰御惡人亦如此馬北齊書豢擾虎狼而不拂其心則忿氣不萌通監勇者好行其志貪者急趍其利愚者不計其死通監唐太宗宿將數十皆王侯貴重子儀頤指進退若部曲唐書郭子儀傳荒服之外其叛不為之勞師其降不為之釋備嚴守禦使其為寇不能為臣不得唐突厥傳序傳記使智使勇使貪使愚黃石公三略十圍之牛為牧豎所驅論衡百馬齊轡御由造父魏明帝善哉行集射人先射馬擒賊先擒王杜詩閩悍而囂夷風脆急恩信綏之安然如蟄劉賓客帝王之任英傑皆御之以氣結之以恩不以英氣折之而寵以姑息則驕不可任不以恩愛結之而肅以禮貌則怨不為用李文饒集夫御英傑使猛將與見道義之人接方正之士不同也不可以繁禮飾貌浮辭足去聲言是宜動開胸懷令見肺肝氣懾其勇恩結其心雖踞洗召之不為薄矣同上雖百中之自我終一呼而在君高達夫本朝千鈞之牛制於三尺之童弭耳而下之曾不如狙猿之奮擲於山林此其故何也權在人也蘇文養物者不以全物與之牧羊者去其敗群視其後者而鞭之養鷹者飢之山谷文經上失其道民散久矣語子張子譬猶御馬去其銜勒而專用箠策其不可制也必矣家語急轡數策者非千里之御也淮南子御失其道則天下狙詐咸作敵楊史晉郤缺曰叛而不討何以示威服而不柔何以示懷非威非懷何以示德左文七年內寵之妾肆奪於市外寵之臣僭令於鄙左昭二十年操持悖繆失其統與前漢倒持太阿授楚其柄西漢梅福傳撫御乖方通監唐德紀集駕蹇驢之無策又何路之能極楚辭執組者不制兮必折軛而摧轅同上
