body:
  text: 憂世經我瞻四方蹙蹙靡所騁詩節南山憂心如惔不敢戲談小雅節南山憂心如酲同上心之憂矣疢如疾首不遑假寐變小雅小弁癙憂以痒詩正月鼠思泣血詩雨無正一夫不獲則曰時予之辜書說命下雖危起居竟信其志猶將不忘百姓之病也記儒行子孟子周流憂世思濟斯民孟子序經營八紘之內心勦形瘵何勤如焉同上有安社稷臣者以安社稷為悅也孟子思天下之民有不被堯舜之澤者若已推而納之溝中孟子憂以天下孟子今世之仁人蒿目而憂世之患莊子周行天下上說下教雖天下不取強聒而不舍莊子天下篇楊子見路逵而哭為其可以南可以北墨子見練絲而泣為其可以黃可以黑淮南子神農憔悴堯瘦臞舜黴黑禹胼胝由此觀之則聖人之憂勞百姓甚矣淮南子修已訓目若營四海文中子史楚子囊死遺言謂子庚必城郢君子謂子囊忠將死不忘衛社稷左傳嫠不恤其緯而憂宗周之隕左昭二十四憂國如飢渴西漢鮑宣傳孔席不煖墨突不黔西漢班固傳陳蕃曰當今之世三空田野空朝廷空倉庫空後漢劉寬任重責大憂心如醉東漢本傳陳蕃曰鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎續漢書王坦之卒臨終與謝安亙沖書惟以國家為憂言不及私通鑑晉武紀昔要腹過於十圍今之瘦削裁二尺餘舊帶猶存非為妄說救物故也通鑑百五九梁高祖吳漢病篤車駕親臨問所欲言對曰臣愚無所知識惟願陛下慎無赦而已通鑑四十三漢光武互見徇公忘私房元齡留守京師疾篤謂諸子曰今天下無事惟東征未已乃上表諫上謂公主曰彼病篤如此尚能憂我國家通鑑百九十九唐太宗溫彥博薨上謂侍臣曰彥博以憂國之故精神耗竭通鑑百九十五唐太宗上將發兵討新羅侍中張文瓘臥疾在家自輿入見諫上乃止通鑑二百二唐高宗晉州男子郇模以麻辮髮持竹筐葦席哭於東市人問其故對曰願獻三十字一字為一事若言無所取請以席裹尸貯筐中棄於野其言團者請罷諸州團練使也監者請罷諸道監軍使也通鑑唐代宗大曆元年紀遂使家國愔愔如日將暮江南野錄載江南潘佑表集生逢堯舜君不忍便永訣當今廊廟具構廈豈云缺葵藿傾太陽物性固莫奪杜工部賢有不黔突聖有不煖席同上安得壯士挽天河凈洗甲兵長不用同上幾時高議排金門各使蒼生有環堵同上安得大廈千萬間盡庇天下寒士皆歡顏同上自古聖人賢士皆非有心求於聞用也憫其時之不平人之不義得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇煖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也韓文豈無成都酒憂國只細傾杜工部集前古之興亡未嘗不經於心韓文疾與憂積柳文惟歌生民病願得天子知未得天子知甘受時人嗤藥良氣味苦瑟淡音聲稀但自高聲歌庶幾天聽卑白樂天但傷民疾痛不識時忌諱同上安得萬里裘蓋裹周四垠穩暖皆如我天下無寒人同上一夫不獲若納之於隍同上二月賣新絲五月糶新穀醫得眼下瘡剜卻心頭肉我願君王心化作光明燭不照綺羅筵偏照逃亡屋聶夷中詩我若未忘世雖閑心亦忙世若未忘我雖退身難藏白樂天遂我一身逸不如萬物安元稹集以生人為心唐文粹負其道以環軫於諸侯皇甫湜志士白髮早孟東野夫仲尼之悲麟悲不在麟也墨翟之泣絲泣不在絲也且阮籍縱車於途途窮輒慟豈始慮不至耶蓋假事諷時致意於此耳沈顏登華旨心為四海懸袁陽源白馬篇本朝貌先年老因憂國事與心違始乞身歐公挽杜祁公白髮憂民雖種種丹心許國尚柏柏歐公詩進不知富貴之為樂退不忘天下以為心同上中原未得平安報醉裡眉攢萬國愁介甫詩呂獻可病臥洛陽猶旦夕憤嘆以天下事為憂過於在位任其責者溫公撰呂誨墓誌士當先天下之憂而憂後天下之樂而樂也言行錄范文正公經臧武仲以防求為後於魯雖曰不要君吾不信也語憲問子曰事君三違而不出竟則利祿也人雖不曰要吾弗信也記表記史建章宮有物出狀似麋詔東方朔視之朔曰願賜美酒粱肉飲飧臣乃言詔曰可已飧又曰某所有公田魚池蒲葦數頃願以賜臣臣乃言詔曰可於是朔乃言史本傳姚崇知帝銳于治乃先設十事以堅帝意即陽不謝帝怪之崇因疏奏臣願以十事聞陛下度不可行臣敢辭帝曰朕能行之崇乃謝翌日同中書門下三品唐書姚崇傳奉親經靡瞻匪父靡依匪母變小雅小弁肇牽車牛遠服賈用孝養厥父母書酒誥親有疾飲藥子先嘗之記曲禮下啜菽飲水盡其歡斯之謂孝記檀弓下下氣怡聲問所欲而敬進之柔色以溫之記內則滫髓以滑之脂膏以膏之同上旨甘柔滑同上子子路曰昔者由也事二親之時常食藜藿之羹為親負米百里之外家語事親若曾子可也孟子齊聘曾子為卿曰吾不忍遠親而為人役家語君子不以天下儉其親孟丑下以孝敬易以孝愛難莊子天運曾子曰吾及親仕三釜而心樂後仕三千鐘而不洎吾愁愁一本作悲莊子史孝如曾參義不離其親一宿於外史蘇秦傳頴考叔曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之左傳隱元年旦夕得甘毳以養親而供養備史聶政傳李密曰為人子者願為人兄不願為人弟兄者事親之日長弟者事親之日短蜀志視省席辱燥濕數奏甘毳食物西漢丙吉傳黃香九歲失母思慕號泣事父竭力致養冬無被袴而盡滋味暑扇床枕寒則以身溫席後漢郄超黨桓氏溫不令其父愔知之將亡出一箱書付門生曰本欲焚之恐尊公以傷愍為弊我亡後若大損眠食可呈此箱不爾便燒之愔後果哀悼成疾門生呈之則悉與溫往反密計愔於是大怒曰小子死恨晚矣更不復哭晉書本傳潘岳退居于洛之涘微雨新晴六合清朗大夫人乃御板輿升輕軒昆弟班白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顏和浮杯樂飲絲竹駢羅頓足起舞抗音高歌人生安樂孰知其他晉書浩父病篤乃剪爪截髮夜在庭中仰禱斗極為父請命求以身代叩頭流血歲餘不息家人罕有知者北史魏崔浩傳承順顏色唐書崔日用傳傳記子春孝道義感神明方駕曾閔連蹤丁郭史通老萊子楚人養親極甘脆年七十父母猶存萊子服荊蘭之衣為嬰兒戲於親前高士傳集凡侍父母得如曾參可以無譏也韓文諱辨忘身展孝白樂天眷戀庭闈心不遑安選補亡詩馨爾夕膳潔爾晨飧同上白華增勤綵衣是慕朝盥夕膳候色承顏夔夔齋慄烝烝不匱有若楚老萊子之為嬰兒也陳子昂承歡膝下馭潘輿於家園駱賓王經子弗祗服厥父事康誥侮厥父母無逸子好貨財私妻子不顧父母之養孟子離婁下妻子具而愛衰於親荀子史借父耰鋤慮有德色母取箕箒立而誶語西漢本朝譬如人子得過於父母惟有恭順靜思引咎自責庶幾可解今乃詰責奴婢恣行箠楚以此事親未有見赦於父母者東坡集經教誨爾子式穀似之詩小宛子君子之於子愛之而勿面使之而勿貌導之以道而勿彊荀大略人有教其子曰爾行矣慎無為善曰不為善將為不善耶應之曰善且猶弗為況不善乎此全其天器者也淮南子史狐突曰子之能仕父教之忠古之制也策名委質貳乃辟也父教子貳何以事君左僖二十三石碏曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也左隱三漢孝武曰生子當置之齊魯禮義之邦史記三王世家互見漸染樊宏戒子曰富貴盈溢未有能終者吾非不喜榮勢也保身全己豈不樂哉後漢鄭玄以書戒子益恩曰入此歲來已七十矣宿業衰落仍有失誤按之禮典便合傳家今我告爾以老歸爾以事將閑居以安性覃思以精業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之家今差多於昔勤力務時無恤飢寒菲飲食薄衣服節夫二者尚可令吾寡悔悔一作恨若忽忘不識亦已焉哉東漢本傳范滂謂其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡通鑑漢靈紀王昶名其兄子曰默曰沈名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆冬不衰夫能屈以為伸讓以為得弱以為強鮮不遂矣通鑑魏明魏文帝誡子曰父母於子雖肝腸腐爛為其掩蔽不欲鄉黨士友聞其罪過然行之不改人自知之見太平御覽馬援戒其子曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不得言也好議論人長短妄是非政法此吾所大惡也寧死不願聞子孫有此行也龍伯高端厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶為謹敕之士所謂刻鵠不成尚類騖者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也東漢馬援傳鄧禹內行淳備有子十三人各使守一藝修整閨門教養子孫皆可以為後世法通鑑四十一漢光武竇融曰臣有子朝夕教導以經藝不令觀天文見讖記誠欲令恭肅畏事恂恂守道不願其有才能通鑑四十王昶戒子曰未有千名要利不厭而能保世持家永全福祿者也魏本傳王昶明帝時為揚威將軍嘗為書誡其子及其兄子曰吾與時人從事雖出處不同然各有取頴川郭伯益好尚通達敏而有知其為人洪曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以是親之昵之不願兒子為之北海徐偉長不沽高名不求苟得澹然自守惟道是務其有所是非則託古人以見意當時無所褒貶吾欽之重之願兒子師之東平劉公幹博學才高識遠有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道內敏外恕推遜恭謙處不避洿而義勇在朝忘身為國吾友之善之願兒子遵之魏三國志劉殷有七子五子各授一經一子授太史公一子授漢書一門之內七業俱興北州之學殷門為盛晉書顏延之嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎通鑑百二十八世祖蔡王智積帝之弟子也有五男止教讀論語孝經不令交通賓客或問其故智積曰卿非知我者其意恐諸子有才能致禍也通鑑百七九隋紀朱仁軌嘗誨子弟終身遜路不枉百步終身遜畔不失一叚唐書上謂侍臣曰朕自立太子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乘馬則曰汝知其勞逸不竭力則常得乘之矣見其乘舟則曰水所以載舟亦所以覆舟民猶舟也見其息於木下則曰木從繩則正后從諫則聖通鑑百九十七唐太宗傅奕臨終戒其子曰無得學佛書時年八十五通鑑百九十五唐太宗柳玭嘗戒其子曰凡門地高可畏不可恃也立身行己一事有失則得罪重於他人死無以見先人於地下門高則驕心易生族盛則為人所嫉懿行實才人未信之少有疵纇眾皆指之唐書本傳房元齡嘗恐諸子驕侈席勢凌人乃集古今家誡為屏風曰留意於此足以保躬矣唐書房元齡傳柳氏自公綽以來世以孝悌禮法為士大夫所崇玭常戒其子曰凡門地高可畏不可恃也通鑑二百三十九唐昭宗高洋太妃曰汝父如龍兄如虎通鑑百六十三梁高祖李存審出於寒微常戒諸子曰爾父少提一劍去鄉里四十年間位極將相其間出萬死獲一生者非一破骨出鏃凡百餘因授以所出鏃命藏之曰爾曹生於膏粱當知爾父起家如此也通鑑二百七十二後唐莊宗傳記今世小人知讀論語孝經尚為人師雖千載冠冕不曉書記者莫不耕田養馬若能保數百卷書千載終不為小人也諺曰積財千萬無過讀書北齊顏氏家訓鄭奕嘗以文選教其子其兄曰何不教他讀孝經論語免他學沈謝嘲風詠月污人行止外史檮杌互見評文集燕山竇十郎教子有義方靈椿一株老丹桂五枝芳馮道詩辛勤三十年始有此屋廬此屋豈無華於我自有餘韓退之示兒詩凡人不能教其子者非欲陷其罪惡但重於訶怒傷其顏色不忍楚撻其肌膚耳當以疾病為喻安得不用湯藥針艾救之哉顏氏家訓本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳故天下以秦公教子為法神道碑范忠宣戒子弟曰人雖至愚責人則明雖有聰明恕己則昏但當以責人之心責己以恕己之心恕人不患不到聖賢地位也三朝言行錄史范文子暮退於朝武子曰何暮也對曰有秦客廋辭於朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人於朝國語廋隱也謂以隱伏詭譎之言問於朝也石奮子孫有過失不誚讓為便坐對案不食子孫相責因長老謝乃許前漢本傳崔光悌之子鴻弱冠有著述拜給事中光悌謂次子曰阿鴻已摩天去汝可不勉哉元魏集雖有五男兒總不好紙筆阿舒已二八嬾墮固無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓梨與栗陶淵明責子詩互入癡騃史擇子莫若父左昭十三祈奚請老晉侯問嗣曰午也可左傳午奚子陶朱公中男殺人囚於楚朱公曰千金之子不死於市令其少子往視之朱公長男固請欲行朱公不聽長男欲自殺其母為言朱公不得已而遣長子朱公長男竟持其弟喪歸朱公笑曰吾固知必殺其弟也彼非不愛其弟故有所不能忍者也是少與我俱見其為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兔豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也史記越山家伍奢曰尚為人仁呼必來員為人剛戾忍耐能成大事史記本傳趙括少學兵法父奢不能詰然不謂善曰兵死地而括易言之敗趙必括也史記諸葛亮與兄瑾書曰瞻今已八歲而聰慧可愛嫌其早成恐不為重器耳蜀志本傳石苞臨終分財與諸子獨不及崇其母以為言苞曰此兒雖小後自能立晉石崇傳索靖子綝少有逸群之略靖每曰綝廊廟之才州郡吏不足污吾兒也後至尚書左僕射晉書索綝傳王獻之七八歲時學書羲之密從後掣其筆不得嘆曰此兒後當復有大名晉本傳晉王湛有隱德兄弟以為癡父昶獨異焉晉書姚弋仲遣其子襄救趙誡之曰冉閔棄仁背義屠滅石氏汝才十倍於閔若不梟擒以來不必復見我也通鑑九十八晉穆紀帝嘗問顏延之曰竣得臣筆測得臣文㚟得臣義躍得臣酒南史宋顏延之傳初宋維父弁嘗曰維性踈險必敗吾家梁高祖梁彥光岐嶷其母謂所親曰此兒有風骨當興吾家北史帝謂雄曰吾兒更事未多通鑑百七十五隋紀嚴武母裴氏不為其父所荅獨厚其妾英武奮然以鐵鎚就英寢碎其首挺之奇之曰真嚴挺之子新唐書本傳互入有子傳記陳元方季方共論其父寔因曰元方難為兄季方難為弟世說上經人莫知其子之惡記大學互入私意史陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀臺新成太祖悉將諸子登使各賦植賦援筆立成太祖甚異之魏志山簡濤之子也年二十餘濤不之知也簡嘆曰吾年幾三十而不為家父所知晉書謝惠連幼有奇才不為父方明所知族兄靈運謂方明曰阿連才悟如此而尊作常兒遇之南史以太宗之明昧於知子唐書太宗贊令狐綯執政歲久子滈頗招權受賄言事者攻其短綯為其子滈訟冤通鑑二百四九唐宣宗互見護短傳記萬迴師神若遇癡雖父母亦以豚犬畜之兄戍投安西音問隔絕忽一日朝往夕返曰兄平善發書視之乃兄手跡其家以萬里而迴故號萬迴開天傳信記叚文昌鎮成都子承式好獵丞相患之承式以所獲雉兔分送幕僚各致書援引故事甚悉幕僚多不曉其義以呈丞相方知其子博學說聞詞
