body:
  text: 自期遠到經士不可以不弘毅任重而道遠仁以為己任不亦重乎死而後已不亦遠乎語泰伯史鄙沒世而文采不表於後漢書司馬遷書舒吾陵霄羽奮此千里足超邁絶塵驅倏忽誰能逐東漢酈炎傳修翼無卑栖遠趾不步局同上集逸翮思拂霄駿足羡遠遊郭景純遊仙詩指蓬壺而播翰望昆閬而揚音鮑昭合賦非刻金石列圖象揚弘懿崇耿光則顒然衆情孰克慰滿陳子昂集鸞升鴻漸期紫氛兮同上逸翮方翥修途茲始魯頡頏乎九霄將翱翔乎萬里李義山文老驥思千里飢鷹待一呼杜詩願言成羽翼奮翅凌丹梯元微之集竊攀屈宋宜方駕恐與齊梁作後塵杜詩九霄排直上萬里整前期元微之集那得作牛後更擬助鴻飛迅阪看鵬舉高音待鶴鳴所期人拭目焉肯自佯盲鵬翼張風期萬里並同駿足思長阪陸韓卿詩溪澗豈能留得住終歸大海作波濤唐宣宗儤布詩誰謂青雲高鵬飛終背負劉賓客集吾將奮鱗於大空兮奚獨慕此江湖吾將發榮於蟠桃兮奚獨守此蒿蔞吾將蕩其魄兮驂風軔與軋車謁帝於冥冥之天兮秉其生殺之樞皮日休集本朝劉瑀曰騏驥一蹙自造青雲何至與駑馬爭路續世說庶幾垂後世不默死芻豢歐公集世間萬事皆塵土留取功名久遠看蔡君謨詩欲為天下屠龍手肯讀人間非聖書邵堯夫詩集經孔子曰我戰則克祭則受福記禮器考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑記中庸孔子曰十室之邑必有忠信如丘者焉不如丘之好學也語公冶長子曰丘之禱久矣語述而子曰天生德於豫桓魋其如豫何子畏於匡曰文王既沒文不在茲乎天之未喪斯文也匡人其如豫何並同上子聖人復起必從吾言矣孟公孫丑上有王者起必來取法孟滕文公上知我者其惟春秋乎罪我者其惟春秋乎孟滕文公下宋桓魋欲害孔子孔子稱天生德於豫魯臧倉毀鬲孟子孟子曰臧氏之子焉能使豫不遇哉孟序史鄭子産曰禮義不愆何恤乎人言左晉叔向曰祁大夫外舉不棄讎內舉不失親其獨遺我乎左襄二十一年三得相而不喜知其才自得之也三去相而不悔知非己之罪也史孫叔敖傳參聞何薨告舍人趣治行吾將入相居無何使者果召參始參微時與蕭何善及為將相有隙至何且死所推賢唯參通監漢惠紀朱邑且死囑其子曰我故為桐鄉嗇夫其民吏愛我必葬我桐鄉後世子孫奉我不如桐鄉民及死其子葬之桐鄉民果共為邑起冢立祠祭至今不絶西漢本傳互入遺愛王賀為繡衣御史逐捕魏郡盜多所縱捨以奉使不稱免嘆曰吾聞活人子孫有封吾所活者萬餘人後世其興乎通監漢武紀鄧禹嘗謂人曰吾將百萬之衆未嘗妄殺一人後世必有興者叔父陔曰嘗聞活千人者子孫有封兄訓為謁者使修石曰河歲活數千人天道可信家必蒙福通監漢和紀陸元方為宰相每有遷除密封以進未嘗漏露臨終曰吾於人多陰德子孫其未衰乎通監傳記于公築治廬舍謂匠人曰為我高門我治獄未嘗有所冤我後世必有封者說苑貴德篇集履乘石而周公不以為疑文選注乘石王所登車石也自保曾參不殺人元微之文書自傳道奚待史筆垂韓文昔揚子雲著太玄人皆笑之子雲之言曰世不我知無害也後世復有楊子雲必好之矣韓文與馮宿論文書作者不祈人之知也明矣直百世以俟聖人而不惑質鬼神而不疑耳同上人以為拙臣行不疑同上武王周公聖人也率天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有外而為哉信道篤而自知明者也韓文伯夷頌人不易物鍾離委珠而徒為心苟無瑕伯夷飲泉而何爽白樂天事直皇天在同上苟吾道之無爽又何陋於斯土顧言行之有常雖蠻貊兮可處皇甫湜但教方寸無諸毒狼虎叢中也立身馮道詩見青箱雜記本朝平生仗忠信今日任風波唐子方詩人之情諱有而不諱無離婁之明人謂之瞽不慍矣柳下惠之清人謂之污不怍矣涑水迂書故晉國王公嘗手植三槐于庭曰吾子孫必有為三公者已而其子文正公相真宗於祥符景德之間東坡王氏三槐堂記夫寓物於人明日而取之有得有否而晉公修德於身責報於天取必於數十年之後如持左契交手相付吾是以知天之果可必也同上史王莽誅劉棻時揚雄校書天祿閣上治獄使者來欲收雄雄恐不能免乃從閣上自投下幾死西漢本傳互入無定力傳記魯人有與曾子同名族者而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若頃之又一人告之曰曾參殺人其母懼投杼踰墻而走戰國策互入無定力經小人以小善為無益而弗為也易繫辭力不足者中道而廢今女畫語雍也困而不學民斯為下矣語季氏子一羽之不舉為不用力焉輿薪之不見為不用明焉孟梁惠上為長者折枝語人曰我不能是不為也非不能也同上以為無益而捨之者不耘苖者也孟公孫上有是四端而自謂不能者自賊者也同上飽食暖衣逸居而無教則近於禽獸孟滕文公上自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也孟離婁上曠安宅而弗居舍正路而弗由哀哉同上徐行者豈人所不能哉所不為也孟告子下於不可已而已者無所不已孟子盡心上不恥不若人何若人有孟盡心下集如彼梓材弗勤丹漆雖勞朴斫終負素質張茂先勵志詩人非生而知之者孰能無惑惑而不從師其為惑也終不解矣韓文師說本朝班固論劇孟郭解之流皆有絶異之姿而惜其不入於道德苟放縱於末流東坡集
