body:
  text: 譏誚經既微且腫爾勇伊何為猶將多爾居徒幾何詩巧言哀今之人胡為虺蝪詩正月危而不持顛而不扶則將焉用彼相矣語季氏斗筲之人何足算也語子路互見小器原壤夷俟子曰幼而不遜弟長而無述焉老而不死是為賊語憲問子祌禫其辭禹行而舜趍是子張氏之賤儒也正其衣冠齊其顏色默然而終日不言是子夏氏之賤儒也偷懦憚事無廉恥而嗜飲食是子遊氏之賤儒也荀非十二子史鮑莊子之智不如葵葵猶能衛其足左傳國之蠹也左襄公十二郭最謂夙沙衛曰子殿國師齊之辱也左襄十八長木之斃無不標擊也也國狗之瘈無不噬也瘈狂也左哀十二三晉之大臣不如鄒魯之僕妾史魯仲連張耳陳餘始相然信以死及爭權卒相滅殆與泰伯延陵季子異矣史本傳論鼎足不強棟幹微撓西漢佞幸傳灌夫罵李賢曰平生毀程不識不直一錢今日乃效女曹兒呫囁耳語西漢本傳互見面是皆非匹夫之勇婦人之仁也西漢韓信傳有負俗之纍漢武紀寧能為石人耶西漢灌夫傳古者富貴而名摩滅不可勝紀惟俶儻非常之人稱焉西漢司馬遷傳賈詡曰劉表平世之三公也不見事變多疑無決無能為也通鑑東漢孔子曰吾聞鮑叔之進管仲子皮之進子産未聞管仲子産有所進也説苑崔瑗曰此譬猶兒妾屏語耳曹爽進用丁謐何晏鄧揚等于時謗書謂臺中有三狗魏志豈可以白面少年當之通鑑晉穆記苻堅聞亙溫廢立曰六十之叟舉動如此將何以自容於四海乎通鑑晉簡文紀亙榮祖曰昔曹公父子上馬橫槊下馬談詠此於天下可不負飲食矣君輩無自全之伎何異犬羊乎通鑑宋太祖褚淵為司徒淵入朝以腰扇障目征虜功曹劉祥從側過曰作如此舉止羞面見人扇障何益通鑑宋太祖陸機著辨亡之論無救河橋之敗養由基射穿七札不濟鄢陵之師此巳然之明效也通鑑唐高祖袁誼為蘇州刺史自以其先自宋太尉淑以來盡忠帝室謂琅琊王氏雖奕世台鼎而為歷代佐命恥與為比嘗曰所貴於名家者為其世篤忠貞才行相繼故也彼鬻婚姻求祿利者又烏足貴乎時人是其言通鑑氣奪算盡不有人禍則當鬼誅通鑑唐德宗其未得之也則以趍競為心既得之也則以容默為事通鑑周世宗中宗宴近臣國子祭酒祝欽明自請作八風舞盧藏用曰五經掃地盡矣續世説韓思彥曰武子王濟有馬癖君王福畤有譽兒癖王家癖何多耶唐書王勃傳周顒字彥倫隱居蔣山出為臨海令還罷都欲遊舊居孔稚圭作北山移文以譏之曰鐘山之英章堂之靈馳煙驛霧勒移山庭金陵地記出則為宗族患入則為鄉里憂小人之行也韓詩外傳楊炯常呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳朝野僉載互入假易敗五尺童子猶知調笑者矣史通虛無之談無異春蛙秋蟬聒耳而已物理論集緑衣雖多無貴於色邪徑雖利無尚於直晉裴顧女史針生為世笑死為愚鬼選書猛虎雖云惡亦各有匹儕群行深谷間百獸望風低身食黃熊父子食赤豹麛擇肉於熊羆肯視兔與狸正晝當谷眠眼有百步威自矜無當對氣性縱以垂朝怒殺其子暮還食其妃匹儕四散走猛虎還孤棲孤鳴門四旁烏鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頤猛虎死不辭但慚前所為虎兕無助死況如汝細微故當結以信親當結以私親故且不保人誰信汝為韓文秦愛紛奢人亦各念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之女工釘頤磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄橫檻多於九土之城郭管絃嘔啞多於市人之言語杜牧之阿房賦跳躑雖云高意不離濘淖鳴聲相呼和無理祗取鬧同上夫今之人務利而違道其學問以之取名致官而已得一名獲一位則棄其業而役於時權者之門故其事業功德日以忘月以削老而益昏死而遂亡韓文上賈滑州書翳薈生可恥束縛死無名唐文粹清居市不為市之道然而居朝廷居庠序鄉黨以士大夫自名者反爭為之不已悲夫清非異於市人也柳宋清傳鷹隼儀刑螻蟻心雖能戾天何足貴劉賓客童騃無知凶嚚有素雖藉祖父之寵曾微分寸之勞白傳集丈夫不立義豈如鳥獸情劉文梟音不悛鴟張益熾人情共棄國典不容同上難將一人手掩得天下目唐文粹自元和以來有元白詩者纖艷不逞非莊士雅人所為其所破壞流于民間疏于屋壁子父女母交口教授言媟語冬寒夏熱入人肌骨不可除去杜牧之黨錮豈能留漢鼎清談空解識胡兒同上本朝已分將身死勢權惡名磨滅幾何年想君魂魄千秋後卻悔初無二頃田臨川集蘇秦詩汲黯不居中似非朝廷羹山谷詩常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷東坡畢竟英雄誰得似臍脂自照不須燈莫對黃鷂施爪觜同前跨歷商周看盛衰欲將齒髮鬭蛇龜空餐雲母連山盡不見蟠桃著子時東坡彭祖詩世上小人多忌諱東坡經君子萬夫之望易繫辭有無窮之聞書畢命舊有令聞書微子之命造民大譽唐誥令聞令望詩卷阿鶴鳴于九皋聲聞于天詩鶴鳴是以有譽處兮詩蓼蕭聞于四國嵩高聲名洋溢乎中國施及蠻貊記中庸蚤有譽於天下也同上在邦必聞在家必聞語子死有萬世之名列子令聞廣譽施於身所以不願人之文繡也孟子名聲若日月荀王伯名聲之部發於天地之間豈不如日月雷霆哉荀王伯部當為剖史生有嘉問左昭三十二令名德之輿也恕思以明德則令名載而行之左襄二十四名與天壤相弊史記魯仲連傳管仲名高天下同上為令聞嘉譽以聲之國周語陸賈遊公卿間名聲籍甚西漢陸賈傳聲聞梁楚間西漢鄭當時傳名譽日廣西漢韋元成傳四皓采榮於商山西漢揚雄傳榮者謂聲名也聲薰天地東漢馬授傳祭彤威讋北方聲行海表東漢葛龔以善文記知名東漢本傳名侔於父兄吳江表傳令聞令望必與此山俱傳晉羊祐傳謝安雖處衡門其名猶出萬之右自然有公輔之望晉謝安傳時第萬為中郎將少而流聲長而垂名晉潘嶽傳以雅望獲海內盛名晉周顗傳器業殆人望也南史宋柳仲傳江淮草木亦知爾威名唐張萬福傳盧尚書海內大儒之望也通鑑漢獻紀聲出區宇名流海內通鑑集齊名字於天地並光明於列星楚辭名聲若日昭四海德譽配天名聲著而日延布名乎天下聲盈塞於天淵並同上考四海而為雋當中葉而擅名選左太沖蜀都賦流千載之英聲楊修答臨淄侯箋英名擅八區選左太沖詠史詩流聲馥秋蘭潘正叔詩揚聲紫微垂光虹霓文選孔文舉薦禰衡表名若蘭芬選左太沖魏賦芬聲遠暢選禰正平賦清風激萬代名與天壤俱選張景陽詠史以名聲光國選辨亡論金聲玉振寥亮於區宇選褚淵碑譽滿天下選齊故安陸王碑蘭桂有芬清暉自遠文選頭陀碑羹聲塞宇宙魏文帝典論芳烈奮于百世令聞顯於無窮選碑互見傳遠名稱垂於竹帛選自試表白日懸高名李白詩名播天壤間高名動京師天下皆藉藉名與此山俱同上名聲豈浪垂杜詩養聲譽於衆多之口駱賓王名聲照四海韓文宜乎從事於是府而流聲實於天朝也韓文送楊儀之支使赫然千載德譽愈尊韓退之知名針厥聲赫赫滿華遍貊韓愈神道碑自始仕以至沒世未嘗無聞焉柳文如金玉在佩動而有聲白樂天翩翩有聲同上名流襲蘭麝元稹才名天下首同上聲價金應敵元微之聲外金填姓字時同上聲氣朗徹高韻冠于一時劉賓客名聲四馳速如羽檄芒刃愈出素風傳竹帛高價騁琳琅並同上名聲逼楊馬白侍郎名聲動四夷同上兄名之垂星斗之光李習之茂實葳蕤榮聲洋溢李光賓頌聲滿江海古今流不竭劉長卿入海際天知公德音唐文粹擅羹一時流譽千載名飛天京何以得此聲於天壤之間名與日月懸並同上榮聞日流姚崇碑銘名垂星斗聲殫天地李翱祭韓愈文本朝宋州臨汴水公操之譽日與南方之舟造京師歐公與石操書名與謫仙高東坡詩名重沒猶存欒城書經成人有其兄死而不為衰者聞子皋將為成宰遂為衰記檀弓互見敬畏史晉士會將中軍晉國之盜逃奔于秦左宣十六互見政事陰驅默化時冀州飢茺盜賊群起滂按察之登車攬轡慨然有澄清天下之志至州境守令自知贓汙望風解印綬去范滂傳互見望風披靡集預傳籍籍新京兆青史無勞數趙張杜詩實未至而聲先馳劉賓客劍拔蛟知斷弓鳴虎自開張説之義聲如飆馳先詔而至吏人畏服男女相賀唐文粹所謂先聲後實者豈惟兵用之然雖士亦然若今由州郡抵有司求進士者歲數百人咸多為文辭道今古角夸麗務富厚有司一朝而受者幾千萬言讀不能十一即偃仰疲耗目眩而不欲視心廢而不欲營如此而曰吾能不遺士者偽也唯聲先焉者讀至其文辭心目必專以故少不勝柳送韋中立本朝朱輪未及郊清風巳先馳東坡號令聳毛羽先聲落虛絃東坡詩經四十五十而無聞焉斯亦不足畏也巳論語齊景公有馬千駟死之日民無德而稱焉語季氏君子疾沒世而名不稱焉論語史大將軍至尊重而天下之賢大夫毋稱焉史衛青傳論非世所指名西漢項籍傳古者富貴而名摩滅者不可勝記西漢司馬遷傳懷道無聞委身草莽東漢二十八將論集墳土未乾身名俱滅曹子建求自試身死無名諡為至愚司馬長卿
