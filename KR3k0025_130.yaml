body:
  text: 知本經獺祭魚豺祭獸記月令互入微小有知鷹祭鳥同上互見微小有知禮不忘其本古人有言曰狐死正丘首仁也記檀弓上君子已孤不更名注重本也記曲禮下三王之祭川也皆先河而後海或源也或委也此之謂務本源泉之所出也委流所聚也始出一勺卒成不側記學記子我不忍以夫子之道反害夫子孟子清𨠗之美始於耒耜黼黻之美始於杼軸淮南子說林訓史言稱先職不背本也不背本仁也左成九年子雖齊聖不先父食左文二年封平為戶牖侯平辭曰非魏無知臣安得進上曰若子可謂不背本矣前漢陳平傳宋高祖微時躬耕於丹徒及受命耕耨之具頗有存者皆命藏之以留於後南史本紀周盤龍自平北將軍為散騎常侍武帝戲之曰卿著貂蟬何如兜鍪對曰此貂蟬從兜鍪中出耳齊書孫拯門人費慈宰意二人詣獄明拯冤拯曰吾義不負二陸死自吾分卿何為爾耶曰君既不負二陸僕又安可負君通監晉惠紀張超曰子源天下義士終不背本通監漢獻帝紀上至顯仁宮曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎通監唐太宗王師範曰吾敬桑梓所以教子孫不忘本也通監唐僖宗初秦王以大箭射卻突厥後餘大弓一大箭五世寶之郊丘必陳儀物之首以識武功唐書互入功業傳記食其食者不毀其器蔭其樹者不折其枝韓詩外傳服一綵則念女功勞御一穀則恤農夫勤世要論集敢背惠而忘初禰正平賦弱之肉強之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自耶韓文孰豐其川不羡其源同上終朝美飲食終歲好衣裳好衣美食有來處亦須慚愧桑洪羊鹽商婦白侍郎集霜降水返壑風落木歸山苟無先德孰啓後昆並同上苟含天地秀皆是天地身孟東野誰言寸草心報得三春暉同上本朝或勸狄青去鬢間字曰青所以至此者以是耳聞見録范忠宣公貶永州公之諸子欲以忠宣與司馬公議役法不同求歸白公公曰吾用君實薦以至宰相同朝議事不合則可汝輩以為今日之言不可也有愧而生不若無愧而死同上向來一瓣香敬為曾南豐後山集子逢蒙學射於羿盡羿之道思天下惟羿為愈己於是殺羿孟離婁下紀昌學射於飛衛既盡衛之術乃謀殺衛列子貴明珠而賤淵潭愛和璧而惡荊山而不知淵潭者明珠之所自出荊山者和璧之所由生也抱朴子微旨篇食穀而鄙田衣帛而笑蠶是惑也陳子要言冰生於水而冰遏水煙生於火而煙鬱火劉子史諺所謂庇焉而縱尋斧焉者也左傳文公七年因人之力而敝之不仁左傳僖三十年陽球收王甫段熲等送洛陽獄及甫子永樂少府萌球自臨考甫等萌乃謂球曰假借老父球曰爾罪惡無狀死不滅責乃欲求假借耶萌乃罵曰爾則奉事吾父子如奴奴敢反汝主乎今日臨坑相擠行自及也通監漢靈帝紀皇甫酈曰近者董公之強將軍所知也呂布受恩而反圖之通監漢獻帝紀左雄薦周舉為尚書雄舉馮直坐贓舉以此劾奏雄雄曰進君適所以自伐也通監順帝紀永和二年劉湛之入也殷景仁實引之湛既至以景仁位遇本不踰已而一旦居前意甚憤憤使義康毀景仁於帝景仁對親舊歎曰引之令入入便噬人通監晉太祖壞高祖所居陰室床頭有土障壁上挂葛燈籠麻繩拂侍中袁顗因盛稱高祖儉素之德上不答獨曰田舍公得此已為過矣通監宋世祖紀李沖初薦李彪既彪自以結知人主不復藉沖稍稍踈之唯公坐斂袂而已無復宗敬之意通監齊明帝紀初李德裕執政引白敏中為翰林學士及武宗崩德裕失勢敏中乘上下之怒竭力排之使其黨李咸訟德裕罪通監唐武宗崔洪舉郤詵詵後奏洪洪曰我舉郤丞而還奏我是挽弩自射晉書崔洪傳互見坐主如借人之戈持之反剌唐史臣肅宗贊集譬猶鷇卵始生翰毛而陸梁放肆顧行吠主曹公檄吳禽獸飽而忘恩蜂蠆養而成毒燕公集凡號門生而不知恩之所自者非人也柳文食客空多誰報恩劉長卿一一口銜食養得成毛衣到大啾唧解遊揚各自東西南北飛薄暮空巢上羈雌獨自歸王維集本朝王沂公曾屢薦呂夷簡及大拜與沂公不葉東軒筆録呂布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯欒城集經微管仲吾其被髮左衽矣語憲問子相與尸而祝之社而稷之莊子震風凌雨然後知廈屋之為帡幪也楊子史趙盾曰微君姬氏則臣狄人也左傳微楚之惠不及此左僖二十八年微夫人之力不及此左僖三十年微武子之力不及此雖獲歸骨於晉猶子則肉之左昭十三年衛寧子專公孫免餘請殺之公曰微寧子不及此左襄二十七年吾見申叔所謂生死而肉骨也左傳解衣衣我推食食我西漢韓信傳何武每奏事京師戴聖未嘗不造門謝恩西漢何武傳倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報東漢馮異傳羊曇為謝安所愛重安薨輟樂彌年行不由西州路晉書謝安傳馮異曰小臣不敢忘巾車之恩通監光武紀唐李夷簡彈楊憑憑坐貶臨賀尉徐晦獨至藍田與別權德輿曰無乃為纍乎曰晦自布衣蒙楊公知獎今日遠謫豈得不與之別借如明公他日為讒人所逐晦敢自同路人乎通監傳記鮑叔死管仲舉上衽而哭之泣下如雨從者曰非君臣父子也管仲曰生我者父子也知我者鮑子也士為知己者死而況為之哀乎說苑庾太尉少為王武子所知庾過江嘆王曰庇其宇下使人忘寒暑世說中集寸心銘佩牢杜詩昔在韶州之行受命于元兄曰爾幼養于嫂喪服必以期今其敢忘天實臨之韓文互見嫂門縱秋氣之移奪終感恩於篋中張九齡文受曲被之恩私如生羽翼報非次之拔擢宜裂肝腸杜牧之本朝主人覆護恩豈啻一綈袍臨川隕首刳心自知無以報稱同上此生恩未報他日目不瞑後山經無德不報詩抑篇史初周人與范氏田公孫厖稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蜂旗於子姚之幕下曰請報主德左哀二年晉公子重耳曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍僖草二年子犯曰微楚之惠不及此退三舍避之所以報也左僖二十八年魏顆見老人結草以亢杜回杜回躓而顛夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報左宣十五年晉靈公將殺趙盾伏甲而饗之初宣子田於首山舍于翳桑見靈輒餓問其病曰不食三日矣食之既而為公介倒戟以御公徒而免之問何故曰翳桑之餓人也左傳初蘇秦之燕貸百錢為資及得富貴以百金償之遍報所嘗見德者史本傳范睢一飯之德必償史本傳秦亡善馬歧下野人共食之三百餘人吏逐得之繆公曰君子不以畜産害人赦之三百人聞秦擊晉皆推鋒爭死以報食馬之德史秦紀朱亥魏公子無忌客曰所以不報謝者小禮無所用今乃臣效命之秋也史記趙襄子滅智伯其臣豫讓逃遁山中曰嗟乎士為知己者死女為說己者容今智伯知我我必為報讎而死以報智伯則吾魂魄不愧矣同上漢高封項伯等四人為列侯賜姓劉氏先有功於漢者西漢本紀豫子吞炭壞形以奉見異齊客隕首公門以報恩施西漢谷永傳竊嘆古人一飯之報東漢李固傳情為恩使命緣義輕東漢朱暉傳論太史慈避事之遼東北海相孔融遣人訊問其母并致餉遺融為管亥所圍慈單步見融既又求救於劉備得兵解圍吳志郤鑒嘗食周翼鑒薨翼追撫育之恩解職席苫心喪三年晉書陰鏗宴飲見行觴者因回酒灸以授之及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者陳書傳記伍子胥奔吳至溧陽女子擊漂瀨水上子胥乞餐女子簞飯壺漿而食之子胥去五步顧女子已投水中後子胥伐楚師還過溧陽報以百金投瀨水而去吳越春秋隨侯曾得大蛇不殺而遣之蛇後銜明珠以報隨侯盛弘之荊州記楊寶九歲見一黃雀為鴟梟所摶墜樹下為螻蟻所困取之歸置巾箱中以黃花食之百餘日毛成飛去夜有黃衣以白環四枚與寶曰令君子孫潔白位登三事當如此數讀齊諧記集期守死以報德禰正平賦匹夫媵婦尚能致命一餐選與彭寵書鬼亢回以斃秦文選灰軀糜骨以甘心願陳子昂結纓伏劍少謝萬一剖心摩踵以報所天江文通書感君恩重許君命泰山一擲輕鴻毛李太白豈十魚之心能報東海之恩白樂天烏鳥私情得盡歡於長養大馬微力誓效死於酬恩同上重恩山未答杜牧之報恩如皎日武伯蒼禽息之首為知己而必碎豫讓之身感國士而能漆張九齡文嵩岱洪恩終曾酬於蟻垤駱賓王報德空思奉細涓功一作空唐文粹定是酬恩日今朝覺命輕王維集本朝韓愈幼孤見鞠於兄嫂氏嫂卒服期喪以報德祖無擇文公廣記史出因其資入用其寵飢食其粟三施而無報是以來也左傳背施無親民所棄也左僖十四年晉飢秦輸之粟秦飢晉閉之糴左僖十五年背惠食言左僖二十八年王莽使安陽侯舜見太后后曰而屬父子宗族蒙漢家力富貴纍世既無以報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗豬不食其餘天下豈有而兄弟耶通監漢明帝紀集咫尺炎涼變四時出君焦灼君詎知韋應物集本朝未乾薦禰之墨已彎射羿之弓歐公集歐公之士叛公於瞬息俄須之際東坡勤上人詩序經以怨報怨則民有所懲記表記以直報怨論語子趙襄子殺智伯豫讓欲報怨恐人識之乃落其齒以易其貌淮南子史楚伍尚謂其弟員曰我能死爾能報左昭二十年鄭伐宋以報東門之役左隱五年夫差使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越定十四年越伐吳王孫彌庸見姑蔑之旗曰吾父之旗也不可以見讎而勿殺左傳齊哀公亨乎周紀侯譖之襄公將復讎乎紀遠祖九世矣九世猶可以復讎乎雖百代可也家亦可乎曰不可國何以可國君一體也先君之恥猶今君之恥也公羊張儀為秦相為文檄楚相曰始吾從若飲我不盜而璧若笞我若善守汝國我顧且盜而城史本傳怨毒之於人甚矣王者尚不能行之於臣下況同列乎方子胥窘於江上道乞食豈嘗須臾忘郢耶故隱忍就功名非烈丈夫孰能致此耶本傳論勾踐曰孤嘗困於會稽痛入骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也端木賜傳互見怨恨借力以雪父之恥伍子胥傳李廣贖為庶人夜至霸陵尉呵止廣居無何廣拜北平太守廣請霸陵尉至軍斬之本傳我有積怨深怒於齊不論一作量輕弱而欲以齊為事樂毅傳並史記范睢睚眥之怨必報漢本傳張良韓人秦滅韓良以家財求剌客為韓報仇得力士為鐵椎重百二十斤秦始皇遊博浪沙中良與客俱擊秦帝誤中副車西漢本傳漢高祖怨丘嫂之轑釜封其子為羹頡侯西漢楚元王傳報仇過直西漢地理志直當也刷會稽之恥西漢武帝紀發憤快志剡手以衝仇人之胸固為俱靡而已前賈誼傳孫秀為小吏給事潘嶽而狡黠自喜嶽惡其為人數辱之秀常銜忿及趙王倫輔政秀為中書令嶽於省內謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之嶽於是自知不免俄而秀遂誣嶽及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族晉書潘嶽傳趙娥父為李壽所殺娥乃帷車袖劍白日剌壽於都亭魏志互見女門婦人才略二門劉穆之好往妻兄弟乞食多見辱江氏後有慶會屬令勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君常飢何忽須此妻市肴饌為其兄弟以餉穆之穆之為丹陽尹召妻兄弟乃令廚人以金柈貯檳榔一斛進之宋書本傳互見妻家及施報兩夫龐涓自以能不及孫臏以法斷臏兩足涓為魏將軍伐韓韓請救於齊齊田忌以孫子為師涓逐之孫子度其行暮至馬陵可伏兵乃斫大樹白而書之曰龐涓死此樹下涓果夜至斫木下見白書以火燭之讀未畢萬弩俱發涓乃自刎曰遂成豎子之名通監周紀昔齊襄公復九世之讎春秋大之通監武紀朝錯為御史大夫使吏按袁盎受吳王財物抵罪詔赦以為庶人吳楚反錯謂丞史曰袁盎多受吳王金錢言不反今果反欲治盎盎恐夜見竇嬰為言吳所以反願至上前口對狀嬰入言上乃召盎盎對曰方今計獨有斬錯發使赦吳楚三國復其故地上曰吾不愛一人以謝天下召錯斬東市通鑑太子素惡西昌侯鸞嘗謂子良曰我意殊不喜此人不解其故當由其福薄故也及鸞得政太子子孫無遺焉通監齊太祖紀騫味道素不禮於殿中侍御史周矩屢言其不能了事會羅告味道者勑矩按之矩謂味道曰公常責矩不了事今日為公了之味道及其子皆伏誅通監唐武后紀竇參惡左司郎中李巽出為常州剌史及參貶郴州巽為湖南觀察使汴州節度使劉士寧遺參絹五十匹巽奏參交結藩鎮上大怒欲殺參通監唐德宗紀李吉甫為相多修舊怨通監唐憲宗紀汲黯常毀儒面觸弘弘欲誅之請徙黯為右內史同上傳記越王念欲復怨苦思勞心夜以接日夏則握火寒則抱冰吳越春秋子胥闔廬將為之報讎使子胥伐荊子胥操箠笞平王之墓曰吾先人無罪而子殺之今以此報子越絶書精衛赤帝之女名曰女娃遊於東海溺而不反化為冤禽名曰精衛常取西山之木石以堙東海山海經上命李龜年持金花箋宣賜李白立進清平調三篇其略曰可憐飛燕倚新粧高力士終以脫靴為恥異日妃重吟前詞力士曰始謂妃子怨李白入骨髓何乃拳拳如是妃曰何學士能辱人如斯力士曰以飛燕指妃子賤之甚矣上三欲命李白官卒為宮中所捍而止楊妃外傳集精衛銜石償冤魏都賦子復父讎見於春秋見於禮記又見於周官又見諸子史不可勝數未有非而罪之者也韓文復讎義鳥有償冤者終年抱寸誠口銜山石細心望海波平渺渺功難見區區命已輕人皆譏造次我獨償專精豈計休無日惟應盡此生何慚剌客傳不著報讎名韓文數處報讎身不死唐文粹子楚以六千里為讎人役荀子史魯威公十八年會齊侯于濼遂及文姜如齊齊侯通焉公謫之齊侯享公使公子彭生乘公公薨于車莊公九年公及齊大夫盟于蔇十一年齊侯來逆共姬注齊主婚二十三年公如齊觀社二十四年哀姜至使宗婦覿用幣左傳秦召楚懷王會懷王死於秦諸侯不直秦頃襄王復與秦平七年迎婦于秦復結和親史記楚世家反君事讎行若狗彘西漢賈誼傳
