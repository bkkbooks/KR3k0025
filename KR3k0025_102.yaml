body:
  text: 祖父母經逮事父母則諱王父母不逮事父母則不諱王父母禮記曲禮上謂孤幼不及識父母恩不至於祖名父之考為王父父之妣為王母爾雅史鄭當時知友皆大父行西漢本傳賈逵自為兒戲弄常設部伍祖父習異之曰汝大必為將魏志張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有嘉兒憑曰阿翁遽宜以子戲父乎晉書苻生幼而無賴祖洪甚惡之生無一目洪戲之曰吾聞瞎兒一淚生怒引刀自刺出血曰此亦一淚洪鞭之生曰性耐刀槊不堪鞭箠洪曰吾將以爾為奴生曰可不如石勒也本傳范喬祖父馨臨終執其手曰恨不見汝成人因以所用硯與之陳書李百藥為童兒時多疾病祖母趙氏故以百藥為之名唐書傳記潘尼稱祖曰家祖顏氏家訓侯霸子孫稱其祖父曰家公同上集臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命文選李令伯陳情表經家人有嚴君焉父母之謂也易家人卦父兮生我詩蓼莪靡瞻匪父陟彼岵兮瞻望父兮陟岵無父何怙蓼莪父子之天儀禮父子一體喪服父子首足也父至尊也同上由命士以上父子皆異宮崇敬也記內則父之親子也親賢而下無能表記父尊而不親同上父作之子述之中庸為人父止於慈大學母取其愛而君取其敬兼之者父也孝經子父子主恩孟公孫丑父子之間不責善離婁下君子之於子愛之而勿面使之而勿貌面貌謂以顏色慰悅之不欲施小惠也荀子為人父寬惠而有禮君道石奮石建父子之美也無是父無是子無是子無是父揚孝至史子之能仕父教之忠左僖二十二父一而已父慈而教昭六魏奚達驍勇周文曰非此父不生此子北史傳記客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂生於太山之阿上有萬仞之高下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知泰山之高淵泉之深不知有功德與無也世說父子之嚴不可以狎骨肉之愛不可以簡簡則慈愛不接狎則怠忽生焉北齊顏氏家訓陳思王稱其父為家父同上囝別郎罷心摧血下囝音蹇閩俗呼子為囝父為郎罷唐顧況補亡哀閩章經既有肥羜以速諸父詩伐木諸父兄弟備言燕私變小雅楚茨親親則諸父昆弟不怨記中庸父之昆弟先生為世父後生為叔父爾雅子王珪從子求續經子曰叔父通何德以之哉珪曰勿辭也文中子關明篇史荀攸字文達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志曹操少無度叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父以告嵩呼操曰叔父言汝中風已差乎操曰初不中風但失愛叔父故見罔耳晉書曹瞞傳王湛字處沖司徒渾之弟兄子濟輕之嘗詣湛見周易謂曰叔父何用此為湛曰體中不佳時脫復看耳復一作腹恐非濟請言之湛剖析玄微妙有奇趣濟才氣抗邁於湛略無子姪之敬既聞其言心形俱肅王湛有隱德宗族皆以為癡武帝見濟曰癡叔死未濟曰臣叔不癡同稱其美同上經家人有嚴君焉父母之謂也易家人卦母氏劬勞詩凱風母氏聖善同上陟彼屺兮瞻望母兮陟岵靡依匪母無母何恃蓼莪母兮鞠我同上父在為母何以期也屈也至尊在不敢伸其私尊也儀禮喪服父卒繼母嫁從為之服報傳曰何以期也貴終也嘗為母子貴終其恩繼母之配父與因母同故孝子不敢殊也同上注因猶親也子上之母死而不喪門人問子思曰昔者子之先君子喪出母乎子思曰為伋也妻者是為白也母不為伋也妻者不為白也母故孔氏之不喪出母自子思始也記檀弓上伯魚之母死期而猶哭夫子聞之曰誰與哭也門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之同上為父後者為出母無服喪服母親而不尊表記母之親子也賢則親之無能則憐之同上子幼被慈母三遷之教孟子序曾參後母遇之無恩其妻蒸藜不熟出之家語史陸績母截肉未嘗不方斷蔥以寸為度東漢本傳王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數歲每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥俱往及長娶妻母虐使祥妻覽妻亦趨而共之祥漸有時譽母深疾之密使鴆祥覽知之徑起取酒祥爭而不與母遽奪之自後母賜祥饌覽輒先嘗通監魏元帝紀天后上表請自今父在為母服齊衰三年唐高宗紀韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寬唐武后紀李公孝四歲喪母九歲外繼其後父更別娶後妻至是而亡劉炫以為無撫育之恩議不解任劉子翊駁之曰傳云繼母同母也當以配父之尊居母之位齊杖之制皆如親母繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有乎服既有之心喪焉可獨異今言令許不解何其甚繆以親繼親既等故心喪不得有殊如謂繼母之來在子出之後制有淺深考之經傳未見其文昔長沙人王毖漢末為上計詣京師既而吳魏隔絕毖在內國更娶生子昌毖死後為東平相始知吳之母亡便請繫居重不攝事于時議者不以為非然則繼之與前於情無別若要以撫育始生服制王昌復何足云乎又晉鎮南將軍羊祐無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭曰伯生存養已伊不敢違然無父命故還本生尚書彭權議子之出養必由父命無命而出是為叛子於是下詔從之然則心服之制不得緣恩而生也然本父後妻因父而得母稱若如來旨本父亦可無心喪乎何直父之後妻也事奏竟從子翊之議柳文劉子翊傳傳記陳思王稱其母為家母顏氏家訓魯母師魯九子之寡母也穆公賜號母師列女傳集母訓曰慈嵇含賦上堂拜家慶選秋胡詩太夫人御板輿選閑居賦芬芳孟母鄰杜詩經婦人不飾不敢見舅姑記檀弓上婦事舅姑如事父母下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之內則婦將有事大小必請於舅姑不敢專行舅姑之所有命之應唯敬對不敢噦噫嚏咳欠伸跛倚睇眡唾咦寒不敢襲癢不敢搔不敢袒裼舅姑之衣衾簟席枕几不傳移也杖屨勿敢近舅沒則姑老注傳家事於子婦也同上婦盥饋舅姑卒食婦餕餘私之也郊特牲婦稱夫之父曰舅稱夫之母曰姑在則曰君舅君姑沒則曰先舅先姑爾雅子室無空虛則婦姑勃谿莊子外物篇注爭處也吾聞諸先姑國語史婦養姑者也左姑慈婦聽禮也同上禮送女父誡之曰謹從汝舅之言母誡之曰謹從汝姑之言穀梁婦姑不相說則反唇而相稽稽計也西漢賈誼傳顏師古曰尊章猶言舅姑也西漢廣川王傳注舅姑之心豈可失常哉東漢列女曹世叔妻傳傳記古者子婦供事舅姑旦夕在側與男女無異北齊顏氏家訓婦對舅姑之稱同上經為庶母何以小功以慈已加也儀禮喪服士為庶母何以緦也以名服也大夫以上為庶母無服慈母如母傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則葬之三年如母貴父之命也同上諸母不漱裳記曲禮上注庶母也庶母賤可使漱衣不可使漱裳婦謂夫之庶母為少姑爾雅子王子有其母死者其傳為之請數月之喪孟子史母以子貴注妾子立則母得為夫人成風是也公羊隱元王符無外家東漢本傳阮孚之母即姑婢也晉書本傳周顗母李氏字絡秀顗父為安東將軍求絡秀為妾父兄不許絡秀曰門戶殄瘁何惜一女子遂與之生嵩顗曰我屈節為汝家妾同上崔道固諸兄逼道固所生母自致酒炙客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賓汝宜荅拜後魏志李逈秀母氏庶賤而色養過人通鑑唐則天紀下卷傳記裴秀母是婢秀年十八有令望而嫡母妬猶令秀母親下食與眾賓賓見并起拜之荅曰微賤豈宜如此當為小兒故耳於是嫡母乃不敢復役之語林漢中程文矩妻者李法之娣也有二男前妻四子以母非所生憎毀日積而穆姜慈愛溫仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不別居以遠之對曰吾方以義相導使其自遷善也及前妻長子興遇疾困篤母惻隱自然親調藥膳恩情篤密興疾久乃瘳於是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道盡隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之德狀己之過乞就刑辟東漢列女傳經世母叔母何以亦期也以名服也儀禮喪服父之兄妻為世母父之弟妻為叔母爾雅史宗室諸母因酣悅曰文叔少時謹信唯直柔耳今迺能如此後光武紀謝瞻幼孤叔母撫育有恩同於至親宋書傳記羊祜年十五而孤事伯母蔡氏以孝聞三十國春秋經夫夫婦婦而家道正易家人夫婦之道不可以不久也故受之以恒易序卦詩以經夫婦詩關睢宜其室家桃夭穀則異室死則同穴大車女曰雞鳴士曰昧旦子興視夜明星有爛女曰雞鳴虫飛薨薨甘與子同夢同上注云妻子好合如鼓瑟琴棠棣夫婦以禮義合顏色相親亦不可以顏色衰棄其相與之禮邶谷風箋夫婦一體也儀禮喪服夫尊於朝妻貴於室同上夫婦之禮唯及七十同藏無間內則妻將生子及月辰居側室夫使人日再問之同上壹與之齊終身不改郊特牲合巹而飲同上夫義婦聽禮運夫婦和家之肥也禮運君子之道造端乎夫婦同上共牢而食合巹而酳所以合體同尊卑以親之也記昏義日之與月陰之與陽相須而後成也昏義子夫婦有別孟夫婦之道不可不正也荀大略史異缺耨其妻饁之敬相待如賓左僖三十二鳥獸猶不失儷成十一夫和而義妻柔而正昭六為夫婦內外以經二物昭二十五易基乾坤詩始關睢夫婦之際人道之大倫也史外戚世家夫婦之道有義則合無義則離西漢夫婦人倫大綱夭壽之萌也王吉疏夫婦之好父不能得之於子通監漢光武紀何曾閨門整肅與妻相見正衣冠相待如賓己南面妻北面再拜上酒一歲不過再三晉書山濤布衣家貧謂妻韓氏曰忍飢寒我後當作公但不知卿堪為公夫人不耳本傳沈文季飲酒至五斗妻王氏飲亦至三斗常對食竟日宋書夫貴於朝妻榮於室後魏志傳記夫婦之道人倫之始王教之端也吳越春秋惟夫妻為同庖劉向列女傳王渾妻鍾夫人每嘗卿渾渾曰詎可爾妻曰憐卿愛卿是以卿卿我不卿卿誰當卿卿世說集合昏尚知時鴛鴦不獨宿杜詩非是夫不稱是妻白樂天結髮為夫妻恩愛兩不疑蘇子昂詩音容相眷戀羽翮兩迤逶飛翻不異林和鳴多好音陳子卿集雜佩以迎之寶瑟以友之其相得如青鳥翡翠之婉孌矣同上謂言琴與瑟糟糠結久長盧仝文夫婦之道參配陰陽通達神明夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢婦不事夫則義理墮夫婦之好終身不離夫有再娶之義婦無二適之文東漢列女傳經夫子制義從婦凶也易夫者妻之天也儀禮喪服婦人稱夫曰良士昏禮注夫也者以知帥人者也記郊詩註子良人者所仰望而終身也孟為人夫致功而不流致臨而有辨荀君道史夫主嘉美東漢列女傳夫主之不可以不事正色端操以事夫主同上傳記婦人既嫁以夫為天父母降服一等無二天之義列女傳集非是夫不稱是妻白樂天藁砧今何在夫也樂府解題
