body:
  text: 相忘形跡子樂其俗安其居鄰國相望雞狗之聲相聞民至老死而不相往來若此之時則至治已莊胠篋魚相忘乎江湖人相忘乎道術莊大宗師列子乘風而歸曰竟不知風乘我耶我乘風耶列黃帝鄰國相望雞狗之聲相聞民至老不相往來老十章海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數不止列天瑞莊周夢為蝴蝶俄然覺曰不知周之夢為蝴蝶與蝴蝶之夢為周與莊齊物論互入曠達田里相距雞犬相聞人至老死不相往來蓋自足也文中立命史陶潛絕州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反晉書本傳互入不拘形跡傳記堯之時有老人擊壤於路曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉通曆又見帝王世紀司馬德操嘗造龐德公值其渡沔上先人墓徑入其室呼德公妻子皆羅拜堂下奔走供設須臾德公還直入相就不知何者是客也蜀志龐統傳注載襄陽紀集堯民不自知有堯但見安閑聊擊壤元稹集雞息鳥無疑孟浩然生於天地不知天地之高厚飲於江海不知江海之廣深張說之文但請主人空掃地自攜杯酒筦絃來白樂天本朝經年不通書子孰知我懶相期宇宙外肯復較繁簡後山韓魏公喜用知名士或不識其面既用之其人亦不知所薦進也行狀經九載績用弗成書堯典作偽心勞日拙書周官猶無耜而耕也記子猶緣木而求魚也助之長者揠苗者也非徒無益而又害之孟子互入自作不靖及愛適為害朱泙漫學屠龍於支離益單千金之家三年技成而無用其巧推舟於陸勞而無功莊史舌弊耳聾不見成功戰國策係風搏影終不可得前漢郊祀志從之如搏影西漢主父偃傳陸展染白髮欲以媚側室青青不解久星星行復出宋謝靈運傳唇腐齒落而不知益儒林傳梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧祇殫人力以供廟塔及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀𪆪子孫覆亡而不暇社稷俄頃而為墟報施之徵何其謬也通監唐太宗集以直鍼而為釣兮又何魚之能得楚辭雖家置一喙以自稱道詬益甚耳柳文徧啄鄧林求一虫虫孔未穿長觜禿元稹集掬土移山望山盡投石填海望海滿持索捕風幾時得將刀刮水幾時斷韋應物家藏古今帖墨色照箱筥飢來據空床一字不堪煮東坡雖家置一喙以自解市列千金以購人人必不信謗亦不止東坡上皇帝書短綆徒施巧終然莫汲深後山詩炊沙作糜終不飽山谷詩入海筭沙徒自困永嘉證道歌經如取如攜詩子西戎錕鋙之劍用之切玉如切泥焉列湯問庖丁解牛奏刀騞然音麥莫不中音莊養生主薄冰當白日藂毛遇猛火魏子史張耳陳餘杖馬箠下趙數十城酈生伏軾下齊七十餘城史本傳以鴻毛燎於爐炭之上史記荊軻傳譬六驥過決隙也史李斯傳舉秦如鴻毛取楚若拾遺前漢如反覆手西漢陸賈傳腐肉之齒利劍也西漢枚乘傳猶以強弩射且潰之癰前韓安國傳取青紫如拾地芥西漢夏侯勝傳譬之蚊虻之螫敺之而已西漢嚴尤傳摧枯朽者易為力西漢表摧枯折腐東漢耿登傳猶順驚風而遇鴻毛也東漢馮衍傳易於太山破雞子輕如四馬載鴻毛也東漢思王傳猶以利刃齒腐朽東漢宗賢傳鼓洪爐燎毛髮東漢何進傳摧強易於折枯消堅易於湯雪東漢皇甫嵩傳若舉炎火以焚飛蓬覆滄海而注熛炭東海劉表傳陳琳檄無異迅風之振秋葉通監東漢排山壓卵以湯沃雪晉書列女傳勢如沃雪事等注熒晉書侯景傳杜預曰兵威已振譬如破竹數節之後迎刃而解晉書以大吞小猶豺狼之食豚也通監晉穆紀譬如以駒犢鬥虎狼也何懼之有通監晉宋太祖隋帝曰取爾如籠內雞雛耳通監陳紀傳記決江河而灌熒火磨蕭斧而伐朝菌說苑使豺狼逐群羊也戰國策以千鈞之弩射潰癰墮千鈞之重集於鳥卵之上必無幸矣馳韓盧而逐蹇兔也並同上集若縱火於秋蓬楚辭執棠谿以刜蓬利劍也秉干將以割肉亦利劍也同上順風而縱烈火曬白日而掃朝雲也曹植漢二祖論若駭鯨之決細網奔兕之觸魯縞未足以喻其易陳孔璋落葉俟微風以隕而風之力蓋寡陸士衡豪士賦序猶烈火之燔秋蓬衝飆之掃落葉也晉庾闡檄石虎文譬猶迴太陽以消湛露運滄海以灌燎火庾亮表顛木之餘枿痤疽之遺種斧斨欲加而先析鍼石未攻而自潰白傳集因雲灑潤則芳澤易流乘風載響則音徽自遠陸機演連珠必有餘刃如烹小鮮白傳集操刃決滯砉騞有聲白傳集霜風冽冽摧朝菌連年收科第若摘頷底髭韓文眾輕鬥蟻勇劣怒蛙纖縞當強弩之初孤豚僨肥牛之下事同拾芥力易摧枯杪忽蜂腰虛見辱於齊斧突梯鼠首濫欲寄於旄頭柳表餘力一揮應手糜碎柳文洪爐熾炭燎一毛大鼎煩湯沃殘雪韋應物太山壓卵鴻毛在爐陳子昂覆暴如風振槁葉裴度撰李晟碑如淬鋒潰疣決防注水陸宣公文以赤刀效小割皇甫湜互入大才小用摧枯爍雪唐文粹如摧枯株如搏蓄兔如利刃之破罥索並同上史四嶽三塗太室荊山終南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古而然是以先王務脩德音以亨神人不聞其務險與馬也左昭四夫郤昭子其富半公室其家半三軍恃其富寵以泰于國其身尸於朝其宗滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無德也國語互入恃勢穰侯昭王親舅也秦所以東益地稱帝穰侯之功也穰侯貴極富溢一夫開說身折勢奪況於羈旅之臣也史本傳夏桀殷紂手搏豺狼足追四馬勇非微也權非輕也秦二世力非弱也勢非寡也其威盡勢極閭巷之人為敵國史記律書旦握權則為卿相夕失勢則為匹夫西漢楊雄傳解嘲權族好傾東漢陰興贊屈丐蒸土築城而朕滅之豈在城也通監南史宋高祖王晞曰人主恩私何由可保萬一披猖求退無地通監梁紀傳記鴻鵠沖天豈不高哉矰繳尚得而加之虎豹為猛人尚食其肉席其皮說苑正諫魏武侯浮西河而下中流謂吳起曰美哉山河之固此魏之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不脩而禹滅之夏桀之居左河濟而右太華伊闕在南羊腸在北脩政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南脩政不德而武王伐之由此觀之在德不在險若君不修德舡中之人盡敵國也武侯曰善說苑晉有河華九阿而奪於六卿齊有太山巨海而脅於田常亙寬鹽鐵論集隆隆者絕炎炎者滅選解嘲洞庭雖峻負之者北魏都賦不見三公後寒飢出無驢韓文作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬李太白互入儆戒日近恩雖重雲高勢卻孤翻身落霄漢失腳倒泥塗白侍郎榮難久藉唐文粹剪袖恩雖重殘桃愛不終劉遵詩子豈惟形骸有聾盲哉夫知亦有之莊史智者千慮必有一失西漢韓信傳集智有所不明數有所不逮神有所不通楚辭智亦有盲聾劉賓客史眾怒難犯左襄十年犯眾興禍左襄十年眾怒如水火焉不可為謀左昭十三年眾之所為不可奸也左定元年灌夫罵坐西漢本傳眾之所怒在於不平通監子傳說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟告子下互入白屋史方其鼓刀屠狗賣繒之時豈自知附驥之尾德流子孫哉史灌嬰傳司馬喜髕腳於宋卒相中山范睢摺脅折齒於魏卒為應侯百里奚乞食於路繆公委之以政甯戚飯牛專下而桓公任之以國史鄒陽傳劉敬脫輓輅而建金城之安叔孫通舍枹鼓而立一王之儀身名俱榮漢本贊卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜西漢公孫弘傳司馬相如成都人家徒四壁立後數歲為中郎至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵西漢本傳信惟餓隸布實黥徒越亦狗盜芮尹江湖西漢敘傳鄭詹縛於晉終亦無死鍾儀南音卒獲返國叔向囚虜自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寬擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗唐書柳宗元傳集綠驥垂耳於林坰鴻雀戢翼於汙池褻之者固以為園囿之凡鳥外廄之下乘也及整蘭莇揮勁翮陵厲清浮顧盼千里豈可謂其借翰於晨風假足於六駮哉陳孔璋書朝為仇虜夕為上將陳孔璋檄文安國免徒起紆青組張敞亡命坐致朱軒陸士衡不見公與相起身自犁鋤韓文李斯逐焉而為上卿鄒陽囚焉而為上客劉賓客本朝士方窮時困阨閭里庸人孺子皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦高車駟馬旗旄導前騎卒擁後夾道之人相與駢肩累跡瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以悔罪於車塵馬足之間者此一介之士得志當時而意氣之盛昔人比之衣錦之榮者也歐公書錦堂記互入炎涼趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太守之卒史也王尊涿郡之吏佐也出之為將入之為相老蘇集
