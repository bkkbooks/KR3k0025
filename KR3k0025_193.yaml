body:
  text: 順從經婦無所專於家事詩斯于注婦將有事大小必請於舅姑記郊特性婦順備而后內和理內和理而後家可長久也記昏義婦順者順於舅姑和於室人而後當於夫記昏義室人謂女功女叔諸婦也男帥女女從男婦人從人者也幼從父兄嫁從夫夫死從子記郊特性姆教婉娩聽從記內則子女順男子之教無專制之義而有三從之道家語無違夫子以順為正者妾婦之道也孟子滕文公下夫有禮則柔從聽侍荀子君道篇史婦人從人者也不專行必有從也穀梁傳傳記婦人以順從為務故婦事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之義列女傳集婦順夫指韓文經牝雞無晨牝雞之晨惟家之索書牧誓彼童而角詩抑注童羊之無角者也而角自用也童羊譬王后也而角者喻政事有所害也懿厥哲婦為梟為鴟詩瞻卬互見蠱惑婦有長舌維厲之階詩瞻卬子子曰婦人預事而漢道危乎文中子述史篇注呂氏梁后史既云哲婦亦惟家之索矣後漢安帝贊蜺墮雞化皆婦人干政之所致東漢蔡邕傳牝雞司晨家之窮也唐書傳記以妻制夫陽屈於陰風俗通集陰幽坤從維德之常出為辨強乃匪婦能韓文經唯酒食是議詩斯干注婦人之事惟議酒食婦無公事休其蠶織詩瞻卬史哲婦隆家之道東漢列女傳王凝之妻謝道韞居家不嚴而治晉書傳記崔樞夫人治家整肅容儀端麗不許群婢作時世粧因話錄本朝閨門落然不聞人聲續世說經手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮詩碩人彼姝者子詩東方之日揚且之皙也詩若子偕老揚眉上皙白皙顏如舜華詩有女同車有美一人清揚婉兮詩野有蔓草清揚眉目之間鬒髮如雲不屑髢也詩君子偕老邦之媛也同上子柔心而弱骨列子湯問肌膚若冰雪綽約若處子莊子逍遙遊蔡之幼女衛之稚質淮南子脩務訓史宋華父督見孔父之妻于路曰美而艷左威元年驪姬者國色也公羊傳五何休注云其色一國之選嫵媚纖弱便姍嫳屑行步安詳皓齒燦爛宜笑的皪長眉連娟微睇綿藐西漢司馬相如傳趙飛燕體輕能掌上舞絕殊離俗妖冶閑都靚粧刻飾並同上迴眸百萬一笑千金東漢崔駰傳傳記文君眉色不加黛如望遠山臉際常若芙蓉肌膚如脂西京雜記虢國夫人不施粧粉自有美艷常素面朝天子楊妃外傳集朱唇皓齒豊肉微骨嫮目宜笑蛾眉曼只容則秀雅稺朱顏只楚辭滂心綽態小腰秀頸粉白黛黑施芳澤只靨輔奇牙宜笑嘕只體便娟只既含睇兮又宜笑只姱容脩態同上顧盼遺光采長笑氣若蘭曹植美女篇毛嬙鄣袂不足程式西施掩面比之無色選神女賦衛后具於鬒髮飛燕寵於體輕張平子西京賦微眺流睇蛾眉連卷脩袖繚繞羅襪躡蹀並同上衛髮光鑒趙體纖麗潘安仁西征賦東都妙姬南國麗人蕙心紈質玉貌絳唇鮑照賦綽約閑靡陸士衡論文穠不短纖不長宋玉神女賦貌豊盈以莊姝苞溫潤之玉顏眉聯娟似蛾揚朱唇的其若丹動霧縠以徐步兮拂墀聲之珊珊望余帷而延視兮若流波之將瀾陳嘉辭而云對兮吐芬芳其若蘭同上體貌閑麗宋玉好色賦體美容冶不待飾粧含喜微笑竊視流盼並同上東家之子增之一分則太長減之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝嫣然一笑惑陽城迷下蔡宋玉好色賦髣彿兮若輕雲之蔽月飄颻兮若流風之迴雪遠而望之皎若太陽升朝霞迫而察之灼若芙蕖出綠波穠纖得中脩短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鈆華弗御雲髻峨峨脩眉聯娟丹唇外朗皓齒內鮮明眸善睞靨輔承權環姿艷逸儀靜體閑柔情綽態媚於語言奇服矌世骨像應圖竦輕軀以鶴立若將飛而未翔凌波微步羅襪生塵轉盼流精光潤玉顏含辭未吐氣若幽蘭華容婀娜令我亡餐曹子建洛神賦明豔侔朝日顏延年秋胡詩傾城誰不顧同上流盼發姿媚言笑吐芬芳阮嗣宗詠懷詩雅步擢纖腰巧笑發皓齒陸士衡贈婦攘袖見素手皓腕約金環容華耀朝日誰不希令顏美女篇娥娥紅粉粧纖纖出素手選古詩弄姿帷房之裏從容顧盼綽有餘裕趙景真書展如之華實邦之媛宋貴妃誄姿色端麗范蔚宗皇后論玄立絪縕瑤臺降芳唐堂渫雨巫山鬱雲誕發蘭儀望月方娥瞻星比婺並同上南國有佳人容華笑桃李選子建雜詩詳而觀之奪人目睛選神女賦須臾之間美貌橫生燁乎如花溫乎如瑩目流睇而橫波並同上冰華玉儀仙藻靈艷江淹賦都冶嫵媚蔡邕傳賦嬛綿好眉目鮑照詩迴裙轉佩百媚生玉臺後詠楚歌吳女嬌不成似能未能最有情謝公正要東山妓攜手林泉處處行李白青黛畫眉紅錦靴道字不正嬌唱歌李白對酒雲想衣裳花想容春風拂檻露華濃若非群玉山頭見會向瑤臺月下逢李白集眉目豔星月乃知漢地多姝麗胡中無花可比方美人欲醉朱顏酡若無雲間月誰可比光輝並李白集眉目艷青娥劉義動衣香滿路移步襪生塵水下看粧影眉頭畫月新寄言曹子建箇是洛川神駱賓王橫波笑臉艷出浦之輕蓮映渚蛾眉麗穿波之半月同上虢國夫人承主恩平明上馬入宮門卻嫌臙粉涴顏色淡掃蛾眉朝至尊杜詩三月三日天氣新長安水邊多麗人態濃意遠淑且真肌理細膩骨肉勻秋思拋雲髻腰肢賸寶衣並同上幼有玉色發於穠華若彩雲朝升微月宵映陳子昂文艷色驚荷花西門秦氏女秀色如瓊花李白顏如玉不著人家俗衣服白傅集娉婷似不任羅綺忽疑天上落不似人間有看即曲中留不住雲飄雨送向陽臺並同上秀色似堪餐穠華如可掬嫩似花房脆似瓊並同上紅粧逼坐花枝暖元稹集春嬌滿眼睡紅消掠削雲鬟旋粧束同上道子雖來畫得無元微之集皓腕肥來銀釧窄白侍郎嬋娟兩鬢秋蟬翼宛轉雙蛾遠山色迴眸一笑百媚生六宮粉黛無顏色雪膚花貌參差是醉嬌禁不得風嫋牡丹花雨中神女月中仙並白侍郎舞筵須揀腰輕女仙棹難勝骨重人白傅集京江水清滑生女白如脂其間杜秋者不勞朱粉施杜牧之體輕似骨無劉賓客韶嫩冰後水輕盈煙際林容華本南國裝掠學西京並同上翠茁鳳生尾丹葉蓮含跗杜牧之玉質隨月滿艷態逐春舒絳唇漸輕巧雲步轉虛徐露冷侵紅粉春陰撲翠鈿春嫩不禁寒娉娉裊裊十三餘荳蔻梢頭二月初春風十里楊州路捲上珠簾總不如金釵橫處綠雲墮玉筯凝時紅粉和並同上玉筯淚也誰言瓊樹朝朝見不及蓮花步步來李義山文新粧對鏡真無比微笑時時出瓠犀同上南國浣紗伴盈盈天下姝高達夫麗如三五月可望難親近同上長眉入鬢何連娟肌膚白玉秀且鮮盧仝文舞雪佳人玉一團羅隱集醉紅不自力狂艷如索扶孟東野鬢輕全作影嚬淺未成眉溫飛卿愛水看粧坐羞人映花立王維集皓齒初含雪柔枝欲斷風張承吉晚粧留拜月春睡更生香司空表聖點黛方初月縫裙學石榴樂府臉媚奪朝霞蛾眉淡初掃同上紅粉艷青蛾劉義蕙心持靜殊態橫逸宛若迴雪之流風霍若初霞之映日沈雲卿文千金笑裏面一搦掌中腰文粹體弱不勝珠翠繁自矜妖艷色不顧丹青人並同上曲眉豊頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛綠者列屋而閑居韓文體弱力微若不任羅綺光彩煥發轉動照人陳鴻長恨歌傳王昭君以圖當行及辭光彩射人悚動左右人間綽約不粧冰雪顏韋應物本朝絕色天下無一失難再得歐公詩迫而視之靚若星妃臨水而脈脈盈盈遠而望之杳如峽女行雲而朝朝暮暮歐公荷花賦鮮妍皎如鏡裏面綽約對若風中仙歐公對雪憶梅花意態由來畫不成當時枉殺毛延壽臨川集玉腕揎紅袖坡詩吳溪浣紗女不用珠粉施山谷玉釵半脫雲垂耳亭亭芙蓉在秋水坡詩秀色洗紅粧暗香生雪膚不粧艷巳絕無風香自遠並坡詩子許允之婦奇醜交禮竟不復入房郭子史梁鴻妻孟氏女壯醜而肥力舉石臼東觀漢紀傳記齊無鹽之女為人極醜無雙臼頭深目列女傳齊邑之女鐘離為人極醜行年四十無所容入行嫁不售齊採桑之女項有大瘤故曰宿瘤並同上集登徒子妻蓬頭攣耳齞唇歷齒齞張口齒歷猶疏也旁行踽僂又疥且痔宋玉好色賦
