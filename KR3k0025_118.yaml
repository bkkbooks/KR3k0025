body:
  text: 鑒戒經人無於水監當於民監書酒誥殷監不遠在夏后之世詩變大雅子借明為鑑淮南子史前事不忘後事之師史記鄭世家鑑於水者知面容鑑於人者知吉凶史蔡澤傳前車覆後車戒秦世之所以亟絕者其轍跡可見也然而不避是後車又將覆也通監往事所以知今後漢馮異傳明鑑未遠覆車如昨後漢陳蕃傳里語曰明鑑所以照形古事所以知今通監魏邵陵厲公李襲言曰變法不若養人改作寧如舊貫韓建蓄財無數首事朱溫王珂變法如麻一朝降賊中山城非不峻上蔡兵非不多前事甚明可以為戒通監唐昭宗傳記以鏡自照者見形容以人自照者見吉凶太公陰謀集前鑒不遠覆車繼軌選運命論羊腸留覆轍劉長卿集始晉之侈家若欒氏祁氏羊舌氏以十數不能自保以貪國之利五卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣柳漁者對互入貪迷前事之不忘後事之元龜白樂天集明鏡一時覆車千祀王無功經犯時之忌罪不在大失其所適過不在深易略例上惟厥罪無在大亦無在多書康誥刑故無小不忌故犯雖小必刑書大禹謨敗常亂俗三細不宥書君陳史懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名左傳序趙穿攻靈公于桃園宣子未出山而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰左宣二許悼公瘧飲太子止之藥卒書曰弒其君左昭十九宋督殺孔父而取其妻公怒督懼遂弒公君子以督為有無君之心而後動於惡左桓二君親無將將而必誅公羊傳人臣無將將即反罪死無赦史叔孫通傳公孫洪曰解布衣為任俠行權以睚眥殺人解不知此甚於解知殺之西漢郭解傳集春秋書王法不誅其人身韓文讀皇甫湜詩唐崔沆為主罰錄事同年盧彖者俯及關燕請假往洛及還同年已宴於曲江亭彖以雕幰戴妓微服縱觀為團司所發沆判之曰深攙席帽密映氈車紫陌尋春便隔同年之面青雲得路可觀異日之心唐崔沆同年盧彖判教盜穴墻發櫃多得金玉己復不與同挈得不為盜乎杜牧之集本朝蜀李順黨有罪逃亡者張詠知益州許其首身拘其母十日不出釋之拘其妻一宿而來公斷云禁母十夜留妻一宵倚門之望何結髮之情何厚就出斬之語錄延齡之親寵陸贄之廢黜趙憬實為之助憬之罪大矣必若治之以春秋之法憬其為誅首歟范祖禹唐監唐元稹行李從易宗丞制詞云昔劉氏子孫在屬籍者十餘萬人嘗考王莽居攝時作大誥云宗室之雋有四百人孟康注云謂諸劉見在者何多寡不同如此豈莽殘啄之餘所謂四百人者皆贊莽以盜漢媮生嗜欲之徒歟不然安得生存于斯至為莽稱雋耶侯鯖錄無將之戒深著於魯經不道之誅難逃於漢法貶丁謂制子如追放豚既入其笠又從而招之孟盡心下畏馬之蹶蹶一作辟也不敢騎懼車之覆也不敢乘淮南子有以噎死者而禁天下之食有以車馬敗者而禁天下之乘不亦悖哉未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢擢刃者見其有所害也並同上有以咽藥而死者欲禁天下之醫非也有以乘舟而死者欲禁天下之船非也亢倉子兵道篇史人情挫辱則義節之風損後杜林傳羊祜曰當斷不斷天與不取豈非更事者恨於後時哉晉書本傳以饐廢餐梁書賀琛傳韓顯宗曰豈可以世無周召便廢宰相而不置哉後魏杜門齰舌西漢淮夫傳昔人有以一噎而得病乃欲絕食唐書陳子昂傳懲沸羹者吹冷齏傷弓之鳥驚曲木唐書傅奕傳魏元忠自端州還為相不復強諫而與時俯仰中外失望通監唐中宗德裕言昔玄宗以臨淄王定內難自是疑忌宗室不令出閤所以悉為安祿山朱泚所魚肉者由聚於一宮故也通監唐文宗傳記更羸與魏王處廡下有鴈雙飛東方一作從東方來更羸虛發而鴈下魏王曰射可至此乎更羸曰其飛徐其鳴悲飛徐其瘡痛也鳴悲者久失群也故痛未息驚心未去故聞弦音而下戰國策一噎之故絕穀不食一蹶之故卻足不行說苑談叢篇集懲熱羹而吹齏楚辭懲於羹者而吹齏兮何不變此之志也楚辭上傷禽見弦驚倦客惡離身宋鮑昭詩傷禽惡弦驚文選東門行危葉畏風驚禽易落文選策文治病不得真藥合而服之病以浸加不自知為人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡雖死可也王符潛夫論懲殘創酷一噎而絕餱糧謬娶而遠正女並陳子昂集虛弦落驚禽李太白集涸鱗驚照轍墜羽怯虛彎駱賓王如痛定之人思當痛之時不知何能自處也韓文絕口不掛時事務為崇深以拒止嫉之口韓文與李尚書虛弓鴈畏威元微之集聞弦尚驚危心不定垂耳斯久長鳴孔悲遂令後代登壇者每一尋思怕立功並劉賓客空彎而鴈驚虛引而猿泣白侍郎集未聞籠裡鳥飛出肯飛還白樂天集傷弓未息新驚鳥白樂天瘡懼再傷弓劉長卿昔人有因噎而廢食者又有懼溺而自沈者其為矯枉防患之慮豈不過哉陸宣公文有憂社稷心亦噤而不吐唐文粹本朝我遭讒口身落此每聞巧舌宜可憎歐文公集年來效喑啞天靜傷鴻猶戢翼月明驚鵲未安枝並坡詩掃跡滅景於人間如脫兔之投枝也東坡文集蓋世有耕田而以其耜殺人者或者因以耕田為可廢矣久蟄泥塗聞震雷而惕若深囚籠檻得清風而自疑並欒城集經發憤忘食樂以忘憂不知老之將至云耳語子若夫豪傑之士雖無文王猶具孟子盡心上史始雖垂翅終能奮翼東漢馮異傳有志者事竟成後漢景弇傳陶侃在州無事輒朝運百甓於齋外暮運於齋內人問其故荅曰吾方致力中原過爾優游宴逸恐不堪事其勵志勤力皆此類也晉書劉詞以功遷團練使常被甲枕戈而臥曰我以此取富貴豈可一日輒忘之且人情易習若一墮其筋力有事何以報國乎五代史集言未足以動聽故必激發以取異行未足以應遠故必砥礪以沽名劉賓客松柏不幸出於岩穴之內脞脆者則硜然其牙伏死其下矣何自奮之能為是松柏也雖稚氣初拆而正性不辱及其壯也力與石乘陽之威悲己之軋拔而將升卒不勝其壓擁勇鬱遏坌憤激訐然後大醜彰於形質天下指之為怪木吁豈異人乎哉天賦才之盛者蚤不得用於世則伏而不舒薰蒸沈酣日進其道權擠勢奪卒不勝其阨號呼呶拏發越赴訴然後大奇發於文采天下指之為怪民陸龜蒙怪松圖不鼓踴無以起泥塗柳文本朝敢不磨礪淬濯已衰之心紬繹溫尋已廢之學臨川經率德改行書蔡仲之命發憤忘食語述而不憤不啟不悱不發語述而子天將降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性增益其所不能孟子告子下晉公子重耳霸心生於曹越王勾踐霸心生於會稽齊威公小白霸公生於莒荀子宥坐蘇秦若有負郭之田必不佩六國之印主父不為親友所蔑必不窺五鼎之食張儀不有堂下之恥必無入秦之志范睢若無廁中之辱不懷復魏之心甯越激而修文卒為周威之師班超憤而習武終建西域之績皆因窘而發志緣阨而顯名劉子史以夷翟遇秦擯斥之不得與中國之會盟於是孝公發憤強秦通監周紀越王念吳之復夏則握火冬則抱冰吳越春秋痛心疾首左成十三越王勾踐反國乃苦身焦思置膽於坐坐臥即仰膽飲酒亦嘗膽也曰汝忘會稽之恥乎身自耕作食不加肉衣不重采折節下賢人厚遇賓客振貧吊死與百姓同其勞史記越世家蘇秦窮困歸兄嫂姊妹妻皆笑之不為下機秦乃閉室讀周書陰符後合六國從約相六國車騎輜重擬於王者史記荀卿嫉濁世之政於是推儒墨道德之行事著數萬言史記本傳虞卿不得意乃著書世傳曰虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於後世史記不困惡能激乎史蔡澤傳論蘇秦為合從長諸侯各發使送之擬於王者歎曰使我有洛陽負郭田二頃吾豈能佩六國相印乎史本傳西伯拘而演周易仲尼而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子擯腳兵法脩列不韋遷蜀世傳呂覽韓非囚秦說難孤憤詩三百篇大抵賢聖發憤之所為作也左丘明無目孫子斷足終不可用退論書策以舒其憤思垂空文以自見西漢司馬遷傳盱衡厲色西漢王莽傳翟方進給事太守府為小吏數為椽吏所詈辱方進自傷乃西至京師受春秋積十餘年經學明習徒眾日廣諸儒稱之以射策甲科為郎西漢本傳發憤悃愊西漢劉向傳有志者事竟成東漢耿弇傳諸葛瑾曰失旦之雞復思一鳴吳志周處少不修細行州曲患之處自知為人所惡慨然有改厲之志謂父老曰今時和歲豊何不樂耶父老曰三害未除何樂之有處曰何謂也荅曰南山白額猛獸長橋下蛟并子為三矣處乃入山射虎投水殺蛟勵志好學志存義烈克已期年州府交辟晉書本傳互見改過張淳曰讎恥未雪枕戈待旦何自娛之有通監晉成紀瀝膽抽腸梁書傳記葛洪云司馬遷發憤作史記百二十篇史通集焚舟而克手劍而盟者皆敗北之餘也子之厄困久矣霸心勇氣無乃發於是乎柳文世不賤不足以立志地不卑不足以立名皮日休集大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趍也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎韓文送孟東野序
