body:
  text: 物産有地經橘逾淮而北為枳貉逾汶則死周禮考工記燕之角荊之幹妢胡之笴吳粵之金錫鄭之刀宋之斤魯之削吳粵之劍子探明珠不於合浦之淵不得驪龍之夜光也攻美玉不於荊山之岫不得連城之尺璧也抱朴子祛惑論史屈産之乘垂棘之璧左僖元年深山大澤實生龍蛇昭十四地之磽者雖有善種不能生焉江皋河瀕雖有惡種無不猥大西漢賈山傳傳記採明珠求之於蚌或割百蚌不得一珠不可捨蚌求之於魚長沙耆舊傳集渡江之橘逾汶之貉反時易性安能長元稹集黃流玉瓚之寶産於深山清廟夏屋之材秀於中林李義山文如崑丘玄圃積玉相照景山鄧林凡木不殖同上本朝要覓明珠須巨海欲求良玉必崑山邵堯夫經宗廟之器可用也而不可便其利也記郊特牲子夏日不煬非愛火也冬日不盥非愛水也為不適於身不便於體也管子天雄烏喙藥之凶毒也良醫以活人侏儒瞽師人之困憊者也人主以備樂淮南子猒甫繆稱訓面面在頰則好在顙則醜繡以為裳則宜以為冠則譏同上說林訓蓬不可以持屋柱不可以刺齒廣廈闊屋連闥通房人之所安也鳥入之而憂高山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲九韶六英人之所樂也鳥獸聞之而驚深溪峭岸峻木尋枝猿狖之所樂也人上之而栗齊俗訓馬不可以服重牛不可以追速鉛不可以為弩鐵不可以為舟木不可以為釜各用之於其所適施之於其所宜譬如斤斧椎鑿之各有所施也豫拯溺者金玉不若得尋常之繩以上並淮南子水行莫如用舟陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋常莊子天運篇梁麗可以衝城而不可以窒穴言殊器也騏驥驊騮一日而馳千里捕鼠則不如狸狌言殊技也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也同上秋水篇故救餓者以員寸之珠不如與之橡𦫶貽溺者以方尺之玉不如與之短綆各在其所急也劉子互入救援百代之傳寶以之彈鳥則不如泥丸之徑也棠溪之劍天下之銛也用之穫穗曾不如鉤鎌之功也劉子史孫思邈曰膽欲大而心欲小智欲圓而行欲方舊唐書同上傳記珠彈不如泥丸各有所用也前東方朔傳尺有所短寸有所長驊騮騏騄天下之俊馬也使之與狸鼬試於釜竈之上其疾未必能過狸鼬也黃鵠白鶴一舉千里使之與燕服翼試之堂廡之下廬室之間其便未必能過燕服翼也劉向新序和氏之璧價重千金然以之間紛曾不如瓦磚隋侯之珠國之寶也然用之彈鵲曾不如泥丸騏驥騄耳倚衡負軛而趍一日千里此至疾也然使捕鼠曾不如狸干將鏌釾拂鐘之錚試物不知此至利也然以之補履曾不如錐說苑集鼎也不足使柱車馬也不可使守閭佩玉長裾不利走趨韓文子兩堯不能相王管子凡物不並盛陰陽是也韓非子兩貴之不能相事荀子王制近君則威損遠君則勢盛一淵不兩蛟一棲不兩雄一則定兩則爭淮南子日月不並出狐不二雄神龍不匹猛獸不群鷙鳥不雙說林訓月望日奪其光陰不可以乘陽也日出星不見不能與之爭光也並淮南子史都城過百雉國之害也左隱元越不為沼吳其泯矣哀十一崔之薄慶之厚也襄二十七松柏之下其草不殖襄二十九年鄰之厚君之薄也僖三十內寵並后外寵二政嬖子配適大都偶國亂之本也閔二物莫能兩大陳衰此其昌乎莊二十二師服曰國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有二宗士有隸子弟庶人工商各有分親皆有等衰是以民服事其上而下無覬覦威二已上並左蘇秦說楚王曰楚強則秦弱秦強則楚弱其勢不兩立通監兩雄不俱立史酈生傳趙奢曰如兩虎鬭於穴中將勇者勝史同上藺相如曰如兩虎共鬭勢不俱生史同上讒邪進則衆賢退群枉盛則正士消通監漢元紀死者復生生者不愧吾欲全吾言安得全吾身通監周紀是時外戚資千萬者少故少府水衡見錢多也西漢王嘉傳時水衡錢二十五萬萬少府錢十八萬萬事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危劉向傳戴盆望天事不兩施通監漢章紀虞舜先除四凶然後用十六相明惡人不去則善人無由進也同上漢靈紀若客有泰山之安則主有纍卵之危同上漢獻紀藝疑則隙生力侔則亂起東漢馬武傳天下之勢猶持衡此首重則彼尾輕矣唐李石傳正必去邪邪必害正唐李德裕傳傳記天地至貴精不兩明注天精為日地精為月孝經援神契意不並鋭事不兩隆盛於彼者必衰於此長於左者必短於右喜夜臥者不能早起也說苑四時不並盛五行不俱馳陰陽更唱氣有盛衰後漢趙曄吳越春秋集日不雙麗世無兩帝選魏都賦燕秦不兩立柳傳本朝昔師丹之說行則董宏坐其罪董宏之論勝則師丹廢于家呂誨論歐陽修第一狀子彼亦一是非此亦一是非莊子齊物論史君子稱其功以加小人小人伐其技以憑君子左傳互見驕矜季郈之雞鬭季氏芥其雞郈氏為之金距左昭二十五互見好勝秦之群臣曰請以趙十五城為秦王壽藺相如亦曰請以秦之咸陽為趙王壽史同上韓安國坐枉法獄吏田甲辱之安國曰死灰不復燃乎甲曰燃則溺之西漢同上猶連雞之不能俱止於棲也戰國策臧洪復陳琳書曰子謂余身死而名滅僕亦笑子生而無聞通監漢獻紀單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅答對之皆有餘魏志互見談辨董卓按劍叱袁紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀橫揖徑出通監劉琨祖逖並有英氣每相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原晉書祖逖傳互見勢力相敵石勒謂李陽曰孤昔日厭卿老拳卿亦飽孤毒手晉書梅陶鍾雅數說事祖納輒困之因曰君汝穎之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可槌納曰假有神錐亦有神槌晉書祖納傳互見滑稽敏於應對門孫綽性通率好譏調常與習鑿齒俱行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前同上孫綽傳互見滑稽釋道安高才與習鑿齒相見道安曰彌天釋道安鑿齒曰四海習鑿齒同上鍾會聞嵇康名而造之康不為之禮會將去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去晉世祖通監盧循遺劉裕益智粽裕報以續命湯同上晉安紀陸雲與荀隱未相識嘗會張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴同上沈昭略性狂見王約曰汝是王約也何以肥而癡王約曰汝是沈昭略也何乃瘦而狂宋書南牙北司互相矛盾通監唐懿紀韓熙載奔吳密告其友汝陰進士李穀穀送至正陽痛飲而別熙載謂穀曰吳若用吾為相當長驅以定中原穀笑曰中原若用吾為相取吳如探囊中物耳同上唐明宗傳記殷浩語孫安國曰卿莫作強口馬我當穿卿鼻孫曰卿不見決鼻牛人當穿卿頰世說各自彈射互相瘡痏史通集持棋相下莫敢先動猶楚漢之兵相距鞏索也魏應瑒奕勢下之人負其能不肯諂其上上之人負其位不肯顧其下故高才多戚戚之容盛位無赫赫之光韓文文人相輕自昔而然魏文典論本朝宋袁淑文冠當時見謝莊鸚鵡賦曰江東無我卿當獨秀我若無卿亦一時之傑也續世說王文公見東坡醉白堂記曰乃是韓白優劣論東坡聞之曰不若介甫虔州學記乃學校策耳西清詩話經道不同不相為謀語子顏回曰薰蕕不同器而藏堯桀不共國而治家語致思奔蜂不能化藿燭越雞不能伏鵠卵莊子庚桑楚大聲不入於里耳同上天地黃鍾大呂不從煩奏之舞列子楊朱或曰孔子讀而儀秦行曰甚矣鳳鳴而鷙翰也楊淵騫金鉤玉餌雖珍而不能制九淵之沈鱗顯寵豐祿雖貴而不能致無欲之人抱朴子盤旋揖遜非禦寇之容擐甲纓胄非廊廟之飾同上軒車不可以適越冠冕不可以之胡文中子史淳于髡曰孤裘之敝不可補以黃狗之皮史齊世家互見鑒別世之學老子者則絀儒學儒學亦絀老子道不同不相為謀史老子傳孟軻曰持方抐欲納圜鑿其能入乎史孟軻傳猶戎翟之與干越不相入明矣前漢貨殖傳猶以鄉飲酒之禮理軍市也前梅福傳以水投石莫之受也西門造蕭何律於唐虞之世則悖矣作叔孫通儀於夏商之世則惑矣建婁敬之策於成周之世則謬矣談范蔡之說於金張許史之間則狂矣楊雄傳夫邪正之人不宜共國亦猶冰炭不可同器通監漢靈紀李德裕曰正人指邪人為邪邪人亦指正人為邪同上唐文宗紀南衙北司互相矛盾同上唐懿宗紀李綱曰臣言如持水納石唐書時不我容我不時徇同上傳記崔篆曰吾聞伐國不問仁人戰陳不訪儒士東觀漢紀加粉黛於壯夫服紈綺於高士劉知幾史通軍容不入國國容不入軍司馬法集圓鑿而方枘吾固知其齟齬而難入宋玉九辨冰炭其不可以相並兮楚辭方圓之異形勢不可相錯荼薺不同畝同上虐暑熏天不減堅冰之寒涸陰凝地無纍陵火之熱選演連珠梟鸞不接翼運命論代馬不思越越禽不戀燕李太白君平既棄世世亦棄君平同上古詩淡無味不稱今人情白樂天鍾梵避笙歌同上還似今朝歌酒席白頭翁入少年場繁絲與促管不解換漁歌濁水清塵難會合並同上下有矜乎能上有矜乎位雖恆相求而不遇韓文蘭艾不同香自然難為和孟東野市井不容義乃知田家春不入五侯宅並同上一薰一蕕善齊不能同其器方鑿圓枘良工無以措巧心唐文粹本朝先生善鼓琴齊國好吹竽操竽入齊人雅鄭亦復殊臨川集世好競辛鹹古味殊淡泊歐公集古貨今難賣花開少年事不入老夫目並同上學古居今持方入圓同上君子小人如冰炭決不可以同器東坡答黃魯直書不應太玄草晞價咸陽市山谷古來賢達人不爭咸陽市落落與時背並山谷詩張儀說趙曰大王收率天下以擯秦秦兵不敢出函谷關通監周赧王十五年傳記麋鹿成群虎豹避之飛鳥成列鷹鷙不擊說苑劉裕謂沈田子曰猛獸不如群狐卿等十餘人何懼王鎮惡通監晉安集猛虎雖云惡亦各有朋儕群行深谷間百獸望風低自矜無當對氣性縱以垂匹儕四散走猛虎還孤棲狐鳴門四旁鳥鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頤猛虎死不辭但慚前所為韓文
