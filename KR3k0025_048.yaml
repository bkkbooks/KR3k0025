body:
  text: 老成經人惟求舊書盤庚上惟公懋德弼亮四世書畢命詢茲黃髮則罔所愆書秦誓番番良士旅力既愆同上方叔元老克壯其猷詩采芑召彼故老詩正月子非謂有喬木之謂也有世臣之謂也孟年彌高而德彌劭揚史古之人謀黃髮番番則無所過史記秦紀楊騖歷事四朝年耆望重自太宰恪以下皆拜之通監晉海西公紀集皤皤國老班孟堅賦蒼眉皓髯山立時行劉賓客華髮皤皤唐呂溫作李靖贊膚未雞髮未鶴然其心甚老唐文粹本朝元老在位邦之榮華徒以精神折衝非以筋力為禮東坡賜韓絳致仕不允諾古之世臣譬之喬木粵自拱把至于棟梁傑然群才之中夫豈一日之力東坡文以衛武之年踐呂尚之位安然無作則功名自隆默然無言則卿尹自化當以至靖之德坐鎮群動之樞蘇子由文彥博乞致仕不允批答遍閲後生真有道欲談前事恐無人蘇子由送文太師致仕史晉侯在外十九年矣險阻艱難備嘗之矣民之情偽盡知之矣左僖三十八年春秋高閲天下之義理多矣史記漢文紀素官於朝西漢鄒陽傳時朝廷無故典又少舊臣侯霸明習故事收録遺文條奏前世善政法度施行之通監漢光武紀胡廣練達事體明解條章東漢本傳張純在朝歷世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟冠婚喪紀禮儀多所證定東漢本傳黃瓊昔隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪通監漢殤紀前世難易靡所不嘗通監魏明紀刁協久官中朝練諳舊事賀循為世儒宗明習禮學凡有疑議皆取決焉通監東晉元帝王僧綽幼有大成之度衆以國器許之好學有思理練悉朝典通監宋太祖王儉自晉宋以來故事無不諳憶通監齊太祖紀年長識高故知有夷險通監齊紀久處朝廷諳練事體通監唐憲宗李晟曰吾生長西陲備諳虜情通監唐德宗紀蘇環明曉法令多識臺省舊章一朝格式皆所刪正唐書齊浣為中書舍人朝廷大政必資之時號解事舍人同上本朝木經霜雪根無蠹蘇子由集松老知經幾度霜同山身間閲世故山谷經生則逸不知稼穡之艱難不聞小人之勞書無逸子魯哀公曰寡人生於深宮之中長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼家語史公聚朽蠹而三老凍餒道殣相望而女富溢尤左昭三年生長脂腴不知稼穡東漢公孫瓚傳周顗曰君少年未更事晉書本傳晉惠帝時天下荒亂百姓餓死帝曰何不食肉糜晉書陝民訴旱觀察使崔蕘指庭樹曰此尚有葉何旱之有通監唐懿紀本朝妓圍那解思寒谷陳後山詩一曲高歌一束綾美人猶自意嫌輕誰知織女寒窗下幾度拋梭織得成寇萊公詩經庸言之信庸行之謹易乾卦間邪存其誠同上秉心塞淵詩定之方中所謂誠其意者毋自欺也記大學至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以與天地參記中庸惟天下至誠為能化同下誠者非自成己而已也所以成物也誠者不勉而中不思而得從容中道誠則明矣至誠之道可以前知故至誠如神至誠無息不息則久久則徵徵則悠遠悠遠則博厚博厚則高明惟天下至誠為能經綸天下之大經立天下之大本並同上子至誠通於金石家語其誠可比於金石荀大略誠者君子之所守政事之本也荀不苟史王陵讓陳平絳侯曰始與高帝喋血盟諸君不在耶今高帝崩太后女主欲王呂氏諸君縱欲阿意背約何面目見先帝於地下乎通監漢高后衛綰忠實無他腸西漢本傳蕭王推赤心置人腹中後漢光武紀精誠所加金玉為開東漢廣陵思王傳關羽嘆曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留要當立效以報曹公乃去矣通監漢獻紀我要自當以信待人但人不當負我耳我豈可先人生心哉通監魏元紀明山賓貨所乘牛謂買主曰此牛經患漏蹄療瘥已久恐後脫發南史帝曰叔寶全無心肝通監隋高祖旱詔文武官極言得失常何武人不學不知所言馬周代之陳便宜二十餘條上怪其能以問何對曰此非臣所能家客馬周為臣具草矣通監唐太宗郭元振曰吾以誠心待人何所疑懼通監唐中宗張萬福聞諫官伏閣諫趍往至延英門大言賀朝廷有直臣天下必太平矣遂遍拜城與仲舒等已而連呼太平萬歲萬福武人年八十餘自此名重天下通監唐德宗巧不足而諒有餘新唐書集誠恕既敷鉤距靡用齊故安陸碑本朝莊語不加綺黃魯直心豁豁不置墻帷臨川集互入暴白溫公嘗問邵康節曰光如何人康節曰君實腳踏實地人也聞見録劉安世從溫公學者數年一日避席問盡心行己之要可以終身行之者溫公曰其誠乎安世問公行之何先溫公曰自不妄語始三朝言行録金玉比誠心蘇子由集朝無咎言司馬溫公有言吾無過人者但平生所為未嘗有不可對人言者東坡文悃愊無華真漢史東坡詩皮毛剝落盡惟有真實在陳後山詩韓魏公進立于朝與士大夫語退息于家與家人言一出于誠言行録明道先生之學以誠為本同上經今豫其敷心腹腎腸書盤庚周道如砥其直如矢君子所履小人所視詩大東公事無私議記曲禮上君子之過也如日月之蝕焉過也人皆見之更也人皆仰之語子張丘也幸苟有過人必知之語述而子賢者以其昭昭使人昭昭孟曾子曰江漢以濯之秋陽以暴之皓皓乎不可尚已孟滕文公上昭昭然若揭日月而行莊晏子為阿宰三年而毀聞於國景公不悅召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今之所以當賞者當誅是故不敢受晏史詩曰周道挺挺我心扄扄左襄公五年趙武曰夫子之家事治言於晉國竭情無私左昭三十年太子范會也陳平盡護諸將周勃等言陳平受諸將金漢王召讓平平曰臣裸身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者金具在請封輸官通監漢高紀宋昌曰所言公公言之所言私王者無私西漢開心見誠無所隱伏後漢馬援傳其事昭昭日月經天河海帶地不足以比東漢馮衍傳石勒曰大丈夫行事宜礌礌落落如日月然終不效曹孟德司馬仲達欺人孤兒寡婦狐媚以取天下也通監晉書內無關鑰通監三國魏志楚王瑋嘆曰我之赤心可破示天下也通監晉惠紀魏主曰我當顯然往取楊州不若彼翳行竊步也通監宋紀唐太宗曰率土之內皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉唐書傳記楚熊渠子夜行見寢石以為伏虎關弓射之滅矢飲羽下視知石也復射之矢摧無迹熊渠子見其誠心而金石為開況人乎劉向新序集大珠脫玷翳白日當空虛杜詩肺腑都無隔形骸兩不羈白侍郎集互入曠達便共論肝膽何曾異肺腸輸肝寫膽並同上虛懷而襟帶不設弘量而府藏洞開張説之文朗詠豁心胸劉義夫用心如日月唐文粹洞朗軒闢不施戟級晏嬰言笑中無町畦雖鬱蒸霧雨之候無自而入矣並同上一見肺肝盡坦然無滯凝元稹集懸白日於千里推赤心於萬人段文昌平淮西碑本朝心豁豁不置墻帷臨川集歐公襟懷洞然無有城府墓志向人懷抱絶關防魯直經乃諺既誕書無逸其言之不怍語憲問蛇蛇碩言大也出自口矣箋云大言者言不顧其行從口出非由心也詩巧言言不忠信行不篤敬雖州里行乎哉語衛靈公子此非君子之言齊東野人之語也孟萬章上謬悠之説荒唐之言無端崖之辭莊天下鄭有神巫季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣明日又見壺子出而曰幸矣子之先生遇我也有瘳矣全然有生矣明日又見壺子而曰子之先生不齋吾無得而相焉誠齋且復相之明日又見壺子立未定自失而走壺子曰追之列子追之不及莊應帝王篇不稱九天之頂則言黃泉之底淮南修務訓無驗之言之謂妄楊子誕伐者百行之悖也劉子史敢為大言處之不疑史記孝武紀互入無忌憚東方朔曰臣十三學三冬文史足用若此可以為天子大臣文辭不遜高自稱譽西漢阮孚為誕伯晉書漢昭烈曰馬謖言過其實不可大用通監魏明紀杜審言恃才高以傲世嘗語人曰吾文章當得屈宋作衙官吾筆當得王羲之北面其矜誕類此唐書本傳宇文融在相位謂人曰使吾居此數月則海內無事通監唐元紀方士張果自言有神仙術誑人云堯時為侍中於今數千歲多往來恆山中通監唐元紀張果固請歸恆山後卒好異者奏以為尸解同上自古術士妄言致人族滅者多矣非所以靖國家也通監後唐明宗裴延齡奏左藏庫司多有失落近因檢閲置簿書乃於糞土之中得銀十三萬兩其匹假雜貨百萬有餘此皆已棄之物即是羡餘悉應移入雜庫以供別敕支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物請加推驗延齡每奏對恣為詭譎皆衆所不敢言亦未嘗聞者延齡處之不疑上亦頗知其誕妄陸贄上書極陳裴延齡姦詐數其罪惡其略曰延齡以聚斂為長策以詭妄為嘉謀以掊克斂怨為匪躬以靖讚服讒為盡節愚弄朝廷有同兒戲矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為昔趙高指鹿為馬物類猶同豈若延齡掩有為無指無為有通監唐德宗傳記皮日休傲誕自號間氣布衣北夢瑣言隗囂將王元曰請以一丸泥為大王東封函谷關東漢觀記上小堯舜下邈三王劉向戰國策互入無忌憚明皇問富人王元寶家財多少對曰請以一縑繫南山一樹南山樹盡臣縑未窮李元獨異志集是夫喋喋衒玉而賈石者也柳文鑿空駕虛唐文粹經情疏而貌親在小人則穿窬之盜也與記表記素隱行怪記中庸子以母則不食以妻則食之以兄之室則弗居以於陵則居之孟滕文公下史張湯為人多詐舞智以御人史記本傳呂不韋為春秋暴之咸陽市門懸千金其上有能增一字者與之史記懷諼誤國西漢師丹傳上詐諼而棄信西漢藝文志齊人多詐而無情西漢公孫洪傳變詐蜂出西漢東方朔傳繆為恭敬繆詐也西漢司馬相如傳若御史大夫湯乃詐忠通監漢武紀汲黯曰洪位為三公為布被此詐也前漢公孫洪傳季文多詐人不能得其要領通監東漢光武紀凡激詭之行則容隱偽矣通監漢獻紀曹操少好飛鷹走狗遊蕩無度其叔父數言之於高操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操而口貌如故嵩曰叔父言汝中風已瘥乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意魏志曹瞞傳孫峻與滕胤雖內不沾洽而外相包含通監魏高貴鄉公楊素曰但恐富貴來逼臣臣無心圖富貴也通監陳紀安祿山外若癡直內實狡黠又嘗命見太子不拜左右趣之拜祿山拱立曰臣胡人不習朝儀不知太子者何官上曰此儲君也朕千秋萬歲後代朕君汝也祿山曰臣愚嚮者惟知有陛下不知乃更有儲君不得已然後拜通監唐元宗魏杜弼曰毒螫滿懷妄敦戒業躁競盈胸謬治清淨通監梁紀朱滔變詐多端倪唐書朱希彩傳集詡詡強笑語以相取下韓文巧詐百情唐李嶠書
