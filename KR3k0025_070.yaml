body:
  text: 不苟合經衛靈公問陳於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也語衛靈公子御者且羞與射者比孟滕文公下周衰戰國縱橫取士先權孟子以儒道遊於諸侯不肯枉尺直尋時君咸謂之迂闊於事終莫能聽納其說孟序衛靈公問陳於孔子孔子荅以俎豆梁惠王問利國孟子對以仁義同上史陳敬仲為齊工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢左莊二十二年梁惠王謀欲攻趙孟軻稱大王去邠此豈有意阿世俗苟合哉史孟軻傳叔孫通徵魯諸生魯兩生不肯行曰禮樂所由起積德百年而後可興也吾不忍為公所為公往矣無汙我史本傳行不苟合義不取容史朱建傳鳳凰翔于千仞之上兮覽德輝而下之見細德之險微兮搖增翮逝而去之史賈生傳鍾期死伯牙絕絃破琴而不肯與眾鼓獿人亡乃高反古之善塈者匠石輟斤而不敢妄斲西漢揚雄傳任延為武威太守帝戒之曰善事上官無失名譽延曰忠臣不私私臣不忠上下和同非陛下之福善事上官不敢奉詔本傳周璆高潔之士前後郡守招命莫肯至唯蕃能致焉東漢陳蕃傳禰衡始達頴川陰懷一剌既而無所之適至於剌字漫滅東漢本傳裴頠薦韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就之哉通監晉惠紀互入識者所窺王述嘗見王導每發言一坐莫不贊美述正色曰人非堯舜何得每事盡善晉書王述傳殷仲文還姑熟祖送傾朝桓謙要王弘之同行荅曰凡祖離送別必在有情與殷風馬不接無緣陪從沈約宋書互入不隨人轉傳記鍾子期死伯牙終身不復鼓琴以為世無足為鼓者呂氏春秋集鸞鳳循四極而回周兮見盛德而後下楚辭連城之珍俟楚文而乃進崩山之操待鍾期而後發王績文莫將流水引空向俗人彈駱賓王儼有直道侃無媚辭張說之文嗟彼苦節士素於圓鑿方杜工部今所以惡衣食窮體膚麋鹿之與遊猿狖之與居固自以身不能與時從順俯仰故甘心自絕而不悔焉韓文互入寡合所詣小不會意徑還不留雖水禽決起山鹿駭去之不若也陸魯望文寧方為皁不圓為卿寧方為汙辱不圓為顯榮唐文粹性不苟合居常寡徒同上互入寡合我受狷介性立為頑鈍身平生雖寡合今即無緇磷白侍郎本朝當戰國時儀秦以口舌取富貴孟子與公孫丑之徒方且歷論養浩之說宜當時以為迂闊鳴道集棊逢敵手纔堪著琴少知音不願彈邵堯夫經志在隨人所執下也易咸卦互入為物轉移鄉原德之賊也語陽貸注云原人趍向容媚而合之子長君之惡其罪小逢君之惡其罪大孟告子下偷合苟容荀生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也孟盡心下史叔孫通儒服漢王憎之乃變其服服短衣楚製史本傳養安交祿史記叔孫通為綿蕞野外西漢本傳師古曰蕞與蕝同應劭曰立竹及茅索營之習禮儀其中如淳曰以茅剪樹地為纂位尊卑之次也張湯漢武帝時為廷尉即上意所欲辠予監吏深刻者即上意所欲釋予監史輕平者西漢書韓增代張安世領尚書事以溫顏遜辭承上接下無所失意保身固寵不能有所建明漢書韓王信傳公孫弘懷智飾詐以阿人主取容西漢汲黯傳以苟容曲從為賢以阿默尸祿為智西漢鮑宣傳孔光上有所問據經法以心所安而對不希指苟合如不從不敢強諫爭以是久而安通監漢成紀容回而已後漢公卿選懦容頭過身通監漢殤紀鼠雀偷生苟此一活耳晉書王濬傳山濤為吏部尚書濤典選一官闕輒擇才資可為者啟擬數人得詔旨有所向然後顯奏之通監晉世祖楊再思在位累載屈節希旨無所規弼慎畏未嘗忤物或謂再思曰公名高位重何為屈節如此再思曰世路艱難直者受禍苟不如此何以全其身哉唐書本傳蘇味道為相未嘗有所建明脂韋自營而已唐書明皇將廢太子帝召宰相謀之林甫對曰此陛下家事非臣等宜預帝意乃決舊唐書以安祿山兼范陽節度使尚書席建侯稱祿山公直李林甫裴寬皆順旨稱其美同上張良娣產子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之通監唐肅宗側媚取容唐書張仲方傳王播為相專以承迎為事未嘗言國家安危通監唐穆宗紀傳記李豐依違二公之間司馬懿曹爽魏略互入摸稜集懷道以迷國佯愚而不言顛則不能扶危則不能安婉婉以順上逡巡以避患雖保黃耇終壽百年蓋志士之所恥愚夫之所賤也楚辭或推迻古移字而難容同上決耳目之欲以苟容為度選論變音聲以順旨思摧翮而為庸張華賦惜位則偷合而不言愛身則苟容而不諫白傳集公卿大夫偷合苟容持祿養安皇甫湜希仕尺寸徇祿斗升唐文粹史君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專壹誰能聽之同之不可也如是左昭二十年衛侯言計非是而群臣和者如出一口通監周紀君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而群下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生通監周紀雷同相從隨聲是非西漢劉歆傳希指雷同西漢馬宮傳每有一事群臣同聲得無非其美者通監漢成紀上下雷同非陛下之福後漢雷同容容無違而已通監漢靈紀若心知不可而順旨雷同負臣子之義通監漢和紀傳記君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待說苑集萬口和附并為一談韓文和而唱之同然一辭同上經胥動以浮言書盤庚上道聽而塗說德之棄也語陽貨子聽虛而責響視空而索影劉子互入任情不任理四面時言軒轅四面一足夔本非真實玉璞鳳凰不是定名魯人東郭空濫美稱愚谷黃公橫受惡名由此觀之傳聞喪真翻傳名實虛信傳說即以定真聞野丈人藥名謂之田父河上姹女謂之婦人堯漿禹糧謂之飲食龍肝牛膝謂之為肉劉子史聞諸道路左昭十三年流言飛文譁於民間西漢誅名而不察實為善者不必免而犯惡者未必刑也通監漢武紀城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全疋帛東漢馬廖傳傳記訛言難信傳聞多失至於魯參殺人不疑盜㛐翟義不死諸葛猶存此皆得之於行路傳之於眾口史通師曠軒轅並世公明方朔同時堯有八眉夔惟一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈故道聽塗說之違理街談巷議之損實說鳧履登朝則云漢書舊記談蛇劍飛屋必曰晉典明文逆波虛辭成茲實錄並同上古語曰事歷終古以魚為魯白氏六帖一犬吠形百犬吠聲同上江南閭里間士大夫道聽塗說強事飾詞呼徵質為周鄭謂霍亂為博陸上荊州必稱陝西下楊都要云海郡言食則糊口道錢則孔方問移則楚丘論婚則燕爾及王則無不仲宣語劉則無不公幹凡一二百件傳相祖述尋問莫知源由施安時復失所顏氏家訓集隨風靡而成行楚辭街談巷議張平子西京賦聽者不察和而唱之同聲一辭韓文諱辨臆決唱聲萬口和附并為一談牢不可破韓文平淮西碑吠聲者多辨實者寡飛語一發臚言四馳萌芽始發枝葉俄茂方謂語怪終成禍梯劉賓客本朝造謗于下者初若含沙之射影但期陰以中人宣言于庭者遂肆鳴梟之惡音孰不聞而掩耳歐公集經舍車而徒義弗乘也易賁卦君子以立不易方易恒卦無有淫朋無有比德書洪範正色率下書畢命君子不以色親人記表記姦聲亂色不留聰明記樂記非時不見非義不合記儒行儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽記樂記富與貴是人之所欲也不以其道得之不處也語里仁有澹臺滅明者行不由徑非公事未嘗至於偃之室也語雍也子伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟公孫丑上端人也孟離婁下一介不以與人一介不以取諸人孟萬章上不以三公易其介孟盡心上不取於人謂之富不辱於人謂之貴孔叢子葛稚川不以片言半字煩人抱朴子史齊即墨大夫不事左右以求譽毀言自至史記齊世家未嘗卑節下意以求仕也西漢蒯通傳行不苟合義不取容前漢朱建傳申屠嘉曰使君所言公事君且奏之則私吾不受私語西漢爰盎傳申屠嘉為人廉直門不受私謁通監漢文紀尹翁歸之語不及私西漢本傳請謁無所行貨賄無所用通監漢武紀里名勝母曾子不入邑號朝歌墨子回車西漢鄒陽傳不可阿尊事貴西漢劉后傳守經據古不阿當世西漢貢禹傳非其服弗服非其食弗食同上孤立群貴之間東漢馬援傳交趾守張恢坐贓伏法以資物簿入大司農詔賜群臣鍾離意得珠璣悉以委地而不拜曰此贓穢之寶誠不敢拜東漢本傳曼麗之容不悅於目鄭衛之聲不過於耳東漢杜篤傳并丹高潔未嘗脩剌謁人東漢梁鴻尚節介勢家慕其高節多欲女之鴻竝絕不娶楊震舉茂才王密密遺震金曰暮夜無知者震曰天知神知我知子知何謂無知徐穉非其力不食並同上陳泰為并州京邑貴人寄寶貨因泰市奴婢泰皆掛之於壁不發其封三國魏志羊祜不附中朝時人為之語曰二王王戎王衍當國羊公無德通監晉武紀方正亮直介然不群晉書王基傳崔遊自少及長口未嘗語及財利晉書崔洪口不言貨財手不執珠玉同上顏延之子竣貴重凡所資供延之一無所受布衣茅室蕭然如故常乘羸牛笨車逢竣鹵簿即住道側常語竣曰吾平生不憙見要人今不幸見汝通監宋世祖劉行本為左庶子太子得良馬欲令行本乘行本正色曰至尊置臣於庶子者欲令輔導以正道非為作弄臣也隋書惡木垂蔭志士不息盜泉飛溢廉夫不飲新唐書武皇后傳互入疾惡席豫太平公主欲表為諫官豫恥之逃去通監唐中宗嚴挺之拒宰相不肯見李林甫崔隱甫違詔不屈牛仙客信剛者乎唐書本傳李乂進吏部侍郎請謁不行時人語曰李下無蹊徑同上正人一心事君無待於助唐書李德裕傳互入正直松柏之為木孤生勁特無所因依同上耿介之士羞於自拔唐書歸登傳傳記平原君欲封魯仲連辭讓者三終不肯受平原君乃置酒酒酣起前以千金為魯仲連壽魯仲連笑曰所貴於天下士者為人排患釋難解紛亂而無所取也即有所取者是啇賈之人也戰國策鍾離意曰志士忍渴於盜泉之水曾參迴車於勝母之閭惡其名也東漢紀互入疾惡水名盜泉仲尼不漱論語撰考讖郝子廉一介不取諸人曾過姊飲留錢席下而去每行飲水常投一錢井中風俗通集食不媮而為飽兮衣不苟而為溫楚辭互入廉潔恥干媚而求親藝文曹植敘愁賦義分明於霜信行直如弦袁陽源白馬篇渴飲堅冰漿飢待零露餐苦寒行箕山許由有高節湘水屈原有清源陳子昂黃河一直青松萬仞同前松柏青青不受令於霜雪張說之秀木勢怕孤張說集獨立天地間李太白多君秉古節嶽立冠人曹同上以茲悟生理獨恥事干謁兀兀遂至今忍為塵埃沒杜詩物白諱受玷行高無污真同上馬蹄無入朱門跡韓文道不行於主人與之處者非其類雖有享之以季氏之富不一日留也同上古琴無俗韻寒松無妖花李太白勁葉森利劍孤莖挺端標介潔靜專不交勢利並同上高郢規矩自立不干權貴柳文見佞色諂笑者不忍與坐語同上潔性不可污韋應物嶷然如斷山絕巘不可以邪徑造焉穆員作鄭叔則誌獨鶴不群孤松無柯劉長卿靈物本特達不復相纏縈唐文粹直方不偶孤高比雲月並同上宋廣平貞姿勁質剛態毅狀鐵腸石心不解吐婉媚辭皮日休桃花賦本朝冠萊公為相丁謂出其門為參政會食都堂羹染公鬚謂起拂之公正色曰身為執政而親為宰相拂鬚耶遺事觀弼之心鍊金鍜銕石介聖德頌銕即鐵字李及知杭州市白集一部乃為終身之恨筆談王質未嘗折顏色屈語論以合當國者意王質墓誌人嘗與孫之翰一端硯曰此石呵之則水流孫曰一日呵一擔水方直三錢竟不受筆談面目嚴冷東坡陳公弼傳森森直榦百餘尋高入青冥不附林臨川集陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得東坡荅李薦書天地之間物各有主苟非吾之所有雖一毫而莫取東坡赤壁賦堅姿映松柏直節凌榛荊蘇子由集
