body:
  text: 柔懦經巽在床下喪其資斧易巽卦注處巽之極過甚故曰巽在床下也斧所以斷者也過巽失正喪所以斷願而無立志詩見義不為無勇也語為政聞義不能徒不善不能改述而子夏首之南有人曰涓濁梁愚而善畏明月而宵行俯見其影以為伏鬼仰見其髮以為立魅匍踣而走比至其家失氣而死孫卿子怯者夜見立表以為鬼見寢石以為兕淮南子昔徐偃王軟而國滅齊簡公懦而身亡此性柔之失也劉子怯者得馮婦之刀戟不能以格兕虎也抱仆子史畏首畏尾身其餘幾左文十七臧孫見齊侯曰抑君似鼠夫鼠晝伏而夜動不穴於寢廟畏人故也襄二十三脆弱易敗國語選耎師古曰法不前之意也西漢西南夷傳柔和自守不能有所整裁通鑑漢殤帝紀民有百走退死之心而無一前鬭生之計同上漢靈帝紀亙溫來朝或云欲誅王謝王坦之汗流沾衣倒執手版同上晉紀高陽王隆曰溫詳之徒皆白面儒生通鑑晉成帝紀帝弱顏不能諱通鑑陳紀帝自八年以後每夜眠中常驚悸云有賊令數婦人搖撫乃得眠通鑑隋暢帝紀董晉柔仁多可不能集事通鑑唐德宗山人李唐見上唐肅宗上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下然畏張皇后不敢詣西內通鑑武后得志專作威福上欲有所為動為后所制上不勝其忿密召上官儀議之命儀草詔左右奔告于后后遽詣上自訴詔草猶在上羞縮不認因紿之曰我初無此心皆上官儀教我通鑑唐高宗趙宗儒怯懦不任事唐書本傳懦不更事緩急非可倚唐長孫無忌傳安樂公主恃寵驕恣賣官鬻獄勢傾朝野或自為制敕掩其文令上署之上笑而從之竟不視也通鑑唐中宗紀士聞鉦鼓聲皆禠氣不能授甲唐書張介然傳徐溫曰一崔太初不能制如他人何通鑑唐弨宗紀疾走惡跡掩耳畏聲朱敬則魏武帝論傳記任將力薄駑孱思怯如蝟見鵲不敢拒格焦贛易林本朝柔情易遷孔帖經夬決也剛決柔也易夬卦乃有顛越不共我乃劓殄滅之無遺育無俾易種于茲新邑書盤庚上惟克果斷乃罔後艱書周官片言可以折獄者其由也與子路無宿諾語顏淵史吳在蔡蔡必速飛去吳所以剪其翼也朝吳蔡大夫左傳昭十五去疾莫如盡左哀元衛鞅欲變法言於秦孝公曰夫民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於眾通鑑周紀毛遂曰利害兩言而決耳同上子嬰與其子二人謀曰丞相高殺二世望夷宮恐群臣誅之乃詐以義立我今使我齊見廟此欲因廟中殺我我稱疾不行丞相必來來則殺之高使人請子嬰數輩子嬰不行高果自往曰宗廟重事王柰何不行子嬰子剌殺高於齊宮通鑑秦紀讀秦紀至於子嬰車裂趙高未嘗不健其決史記秦始皇本紀斷決敢行鬼神避之史李斯傳操刀必割西漢賈誼疏互見投機決斷狐疑分別猶豫同上劉向傳趙廣漢見事風生無所回避率多果敢之計莫為持難通鑑漢宣帝紀孟賁之狐疑不如童子之必至西漢蒯通傳互見無斷決者智之君也東漢馮衍傳得策輒行應變無窮通鑑漢獻帝紀惟坐待亡孰與伐之蜀志諸葛亮後出師表王敦嘗昏淫於色左右諫之敦曰此甚易耳乃開後閤驅諸妾數十人並放出之晉書本傳苻堅曰築室道旁無時可成吾當內斷於心耳通鑑晉成帝紀吐突承璀修安國寺奏立聖德碑高大一準華嶽碑先構碑樓李絳上言承璀適在旁上命拽倒碑樓承璀言甚大不可拽請徐毀撤冀得延引乘間再論上厲聲曰多用牛拽之承璀乃不敢言凡用百牛拽之乃倒同上唐憲宗傳記削株掘根無與禍鄰戰國策集如風行雨施有往而無返也白傳集子鄧析操兩可之說列子力命史灌夫首鼠兩端西漢灌夫傳韓安國曰魏其言是丞相言亦是同上公孫弘每朝會議開陳其端使人主自擇不肯面折廷爭通鑑漢武帝紀蘇味道為相謂人曰決事不欲明白誤則有悔摸稜持兩端可也故世號曰摸稜手唐書本傳通鑑為蘇摸稜傳記李豐依違二公之間司馬懿曹爽魏略互見苟容集足下旁通多可選嵇康絕交書經蓄疑敗謀書周官猶如麂音几善登木爾雅史齊陳乞曰需事之下也左哀六齊子行曰需事之賊也左哀十四狐疑猶豫後必有悔史李斯傳疑者事之害也通鑑漢秦紀牽制文義優游不斷西漢孝元贊當斷不斷反受其亂同上霍光傳知之而決弗敢行者百事之禍也故猛虎之猶與不如蠭蠆之致蠚孟賁之狐疑不如童子之必至西漢蒯通傳互見果決行之有疑禍如發矢同上淮南王傳依違者連歲不決事之害也同上孔光傳酈食其說齊王曰項氏為人忌刻印刓而不能授西漢本傳文義所牽制故不能斷決西漢元帝紀執狐疑之心者來讒賊之口持不斷之意者開群枉之門同上劉向傳疑者事之役也東漢馮衍傳冘豫未決故事久不發竇武傳亙元曰殷仲堪為人無決當懷成敗之計通鑑晉安帝紀計慮回惑自無所成同上齊東紀下陸俟曰諸君不見毒蛇乎不斷其首猶能為害通鑑宋太祖紀傳記猶則多豫狐則多疑易林集心猶豫而狐疑欲自適而不可楚辭猶如麂性多疑慮常居山中忽聞有聲即恐人來害之每豫上樹久久無度復下須臾復上如此非一故不決者稱猶豫焉文選曹子建洛神賦注經凡民有喪匍匐救之記孔子閒居子越石父凍餓為人臣僕三年矣晏子解左驂贖之晏子春秋史魯朱家所藏活豪士以百數其餘庸人不可勝言然終不伐其能歆其德諸所常施惟恐見之振人不贍先從貧賤起專趍人之急甚己之私史游俠傳且緩急人所有夫一旦有急叩閂不以親為解不以在亡為辭天下所望者獨季心劇孟耳史袁盎傳魏齊窮抵虞卿棄相印與魏齊偕亡至魏通鑑周紀以公子之高誼能急人之困也同上趙午等謀反覺詔捕趙王及群臣趙有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髡鉗隨王至長安趙王敖事白得出白明也西漢田叔傳趙相虞卿棄國捐君以周窮交魏齊之厄信陵無忌竊符矯命戮將專師以赴平原之急通鑑漢武帝紀樓護有故人呂公無子歸護託身護與呂公妻及呂嫗同食護妻子頗厭呂公護聞之流涕責子曰呂公以窮老付託於我義所當奉遂養呂公終身西漢互見付託故舊念舊三門張儉為中常侍俟覽所怨刊章捕儉與孔融兄褒有舊亡抵於褒不遇融曰兄雖在外吾獨不能為君王乎因留舍之後事泄收褒融送獄二人未知所坐融曰保納舍藏者融也當坐之褒曰彼來求我非弟之過請甘罪其吏問其母母曰家事任長妾當其辜一門爭死詔竟坐褒東漢孔融傳朱震收葬陳蕃尸匿其子逸事覺繫獄合門桎梏震受考掠誓死不言逸由是得免通鑑漢靈帝紀馬援曰杜季良好義憂人之憂樂人之樂東漢馬援傳度尚八人世謂八廚言能以財救人者也同上黨錮傳序陳重在郎署有郎負息錢數十萬債主日至煎求無已重乃密以錢代還謝承東漢書太史慈母謂慈曰汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊時慈避事之遼東三國吳志魯肅散財甚得鄉邑忻心周瑜求糧肅家有兩囷米各三千斛肅乃指一囷與瑜同上范叔孫周窮濟急鄉曲貴其義行無有呼其名者宋書集高義驅今古老杜人以義來我以身許褰裳赴急不避寒暑柳文振高義於流俗之外合大度於古人之中同上中山劉夢得禹鍚在遣中當詣播州子厚泣曰播州非人居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州韓文柳子厚墓誌銘本朝范仲淹以言事貶方治黨人甚急公獨扶病率子弟餞于東門留連數日大臣有以讓公曰何苦自陷朋黨公曰范公天下賢者某何敢望之若得為黨人公之賜某厚矣歐公撰王質墓誌范仲淹貶饒州諫官不肯言尹師魯上書言仲淹臣之師友願得俱貶歐公撰尹師魯墓誌經惇敘九族書皋陶謨以親九族九族既睦堯典尊祖故敬宗敬宗所以尊祖禰也記喪服小記君子篤於親語泰伯傳記孔奮篤於骨肉東觀漢紀本朝畢諴既貴所得俸祿養護宗屬之乏無間孔白六帖韋繩撫養宗屬孤幼無異情同上范文正公曰富貴而不恤宗族異日何以見祖宗於地下遺事經夫知保抱攜持厥婦子書召誥嫁女之家三夜不息燭思相離也記曾子問凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其群匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟躕焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人故人於其親也至死不窮記三年問子生三年然後免於父母之懷語陽貨父母唯其疾之憂論語子父子主恩孟子公孫丑上古者易子而教之父子之間不責善離婁上史晉師伐齊范文子後入武子曰無為吾望爾也夫左傳左師觸龍見太后曰老臣賤息舒祺最少臣切憐之願補黑衣之闕后曰丈夫亦愛少子乎對曰甚於婦人又曰父母愛子則為之計深遠史記趙世家骨肉至親敵吾一體西漢戾大子傳張禹曰臣四兒一女愛女甚於愛男西漢楊彪子為操所殺操見彪曰何瘦彪曰猶懷老牛舐犢之愛東漢本傳恩情天至東漢馬后紀母子慈愛始終無纖芥之間通鑑漢明帝衛玠多病體羸母常禁其語晉書本傳互見疾病父之於子當愛之如一通鑑晉紀王述子坦之雖長猶抱置膝上晉書本傳王衍曰情之所鍾正在我輩同上本傳荀羨年七歲其父愛之常置羨於膝上晉書本傳王羲之率諸子抱弱孫一味之甘割而分之以娛目前晉書互見人倫孫門正曇首與兄弟集會子孫任其戲適僧達跳下地作彪子僧處累十博綦既不墜落亦不重作僧綽採蠟珠為鳳凰僧達奪取打壞亦不復惜南史上謂岑文本曰卿弟過爾交結恐為卿累朕欲出為外官何如文本泣曰臣弟少孤老母特所鍾愛未嘗信宿離左右今若出外母必憔悴儻無此弟亦無老母矣通鑑唐太宗紀上曰安有子倒懸而父不為之解哉通鑑周世宗紀端午日肅宗召見山人李唐帝方擁幼女顧唐曰我念之無怪也唐書肅宗張后傳李賀母探囊中見所書詩多即怒曰是兒欲嘔出心乃已耳唐書傳記王孫賈年十五母曰女朝出而晚來則吾倚門而望女暮出而不還則吾倚閭而望戰國策集父母與子雖肝腸腐爛為其掩蔽不欲使鄉黨聞其罪過魏文帝誡子驕兒不離膝杜甫生還對童稚似欲忘飢渴問事競挽鬚誰能即嗔喝同上嬌女未絕乳念之不能忘忽如在我前耳若聞啼聲韓退之今人適數百里出門往往有離別可憐之色持被入直三省丁寧顧婢子語刺刺不能休韓文送殷值使回鶻序昵昵兒女語恩怨相爾汝韓文愛流成海情塵為岳頭陀寺碑雖割慈而不言終蘊結乎中腸白人非木石皆有情白樂天緣情生眾累韋應物集猛虎恣殺暴未嘗囓妻兒唐文本朝虎豹不食子臨川集
