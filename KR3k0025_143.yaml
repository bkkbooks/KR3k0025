body:
  text: 感謝經飲之食之教之誨之詩緜蠻中心藏之何日忘之隰桑史所謂生死而肉骨也左管仲曰生我者父母知我者鮑叔也史管仲傳浹肌膚而藏骨髓董仲舒傳隕首流腸侯景傳周宇文曰生死肉骨豈過今恩負山戴嶽未足勝荷通鑑陳紀衣服之外皆聖恩所賜惟髮與膚生從父母唐楊妃傳集一言之譽東鄰侔於西山一面之榮鄭璞踰於周寶王彥升文集序迴霜收電使不隕越陸機謝表自頂至踵功歸造化任彥昇彈文咳唾為恩盻睞成飾顧己循涯寔如塵忝千載一逢再造難荅同上實佩荊卿黃金之賜卻感豫讓國士之分江文通書惠以恩光顧以顏色同上潤白骨而榮枯木文選曹植表恩隱周渥選白馬賦生繁華於枯荑育豐肌於朽骨勸進表守死陵墓沒齒家園不意慶雲垂澤天漢橫流拂拭霧露生見白日踴躍昭泰情何以勝陳子昂集再造生涯天實為德拔於草野謬齒衣冠私門祖宗幽顯榮慶豈止一身而已肝腦塗地不足塞責特恕萬死賜以再生才本庸微名術無紀皆綠際會叨遇聖明謬得揚歷簪徽陪奉鴛鷺綢繆榮祿荏苒平時摩頂至趾豈足上酬並同上元造曲成大明私照劉賓客來效未聞新恩洊及回一瞬之念致再造之恩群蟄應南山之雷窮鱗得西江之水六律變幽谷之寒一九銷彌年之疹喜心深生懼珍羞出於內府旨酒降於上尊勤勞無展於股肱醉飽有慚於口腹跪奉自天之命遙馳捧日之心鼓舞抃成雷緘藤既開睹彩章之盛飾蹈舞而服發溫燠於祁寒頓驚凡口舉其匕筋若負丘山恩光到敝廬白首垂絲荷不遺糗糧既備永無半菽之虞襦袴足頒遠超挾纊之感並同上德重恩宏身微命輕無階荅謝惟積慚惶韓文受恩益大顧己愈輕蒙生成於天地無裨補於涓塵溫存感深惠琢切奉明戒並同上興哀於無用之地垂德於不報之所柳文泛大鯨之海每覺魂搖戴巨鰲之山未如恩重駑駘蒙錦繡塵土浴潺湲杜牧之如我酬恩合執鞭螢光爝火何裨日月之明弱質孤根但荷乾坤之德並同上成九族之榮盡百年之幸柳文守突奧者忽仰睎於白日負泥塗者遂自濯於清源同上釋于齊斧之下揖于群士之上燕公集涸溜沾濡沫餘光照死灰元稹提攜增善價拂拭長妍姿白侍郎女醜嫁勞媒惠深范叔綈袍贈榮過蘇秦佩印歸天酒來以分甘御羞降而示惠寵過加邊懼多尸素之責榮同置醴悲無麴蘖之功元造曲成榮幸不止於一身感戴實深於萬品既鮮華而駭目亦輕煖而便身祕藏篋笥傳示子孫榮降天上寵驚人間澤及草木秋色變而成春顧陋質而懷慚免非稱服拊微躬而荷寵力不勝衣肉食無謀未展涓埃之報素食有愧難勝醉飽之恩天廚酒脯御府管絃寵賜忽降於寰中慶幸實生於望外念嚴凝而加之煦嫗慮皸瘃而潤以膏脂挾纊之恩所勉和則體舒不龜之澤既沾感而手舞頒御府之酒漿賜太官之餅餌並同上得陪桃李植芳叢別感生成太昊功今日無言春雨後似含冷涕謝東風姚少監旨酒名茶玉食仙果來於天府莫匪天慈杜牧之適口忘憂已滿小人之腹殺身粉骨難酬聖主之恩卵翼不自於他門頂踵實非其已物李義山我蟠濁泥君攝青雲不以升沉塹隔其間誨我如兄煦我如春我何敢忘銘骨書紳孫可之暖乎若冬陽之煦油乎若春澤之浸呂和叔喜過生悲感深以泣同上雕琢只應勞郢匠羅隱感激念知已匣中孤劍鳴錢起文感入心府權載之集本朝摳衣最出諸生後倒屐嘗傾廣坐中丹青至微恐累玉瑩之粹土木至陋猥承綈繡之華臨川集優為體貌略去等夷繄獎予之太隆回皇之失次同上納之天地之量照之日月之明同上功無銖兩恩有丘山類要不虞暗禍陷臣於風波必死之淵尚賴至仁脫臣於蛟鰐垂涎之口歐公集雖父兄所以處臣其僥倖不過如此坡文投畀麋鼯之野保全樗櫟之生天地能覆載之而不能容之於度外父母能生育之而不能出之於死中使破甑弊箒復增九鼎之重使星下燭生蓬蓽之光華天澤旁流失桑榆之枯槁憂深投杼豈無三至之言詔復賜環不待一人之譽既陶甄於頑礦復封殖於散材並同上遺簪以故而見收老馬以病而復養欒城集哀憐廢棄之久誰復肯然綢繆樽俎之歡亦非偶爾衣食有奉已寬盡室之憂道德照人況復終身之幸並同上史子產聞子皮卒哭且曰吾已無與為善矣惟夫子知我左昭十三楚遠子馮曰知我者如夫子則可不然請止左襄二十二年管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也生我者父母知我者鮑子也史管仲傳士為知已用女為說己容西漢司馬遷傳初曹操微時人莫知者嘗往候玄玄見異焉謂曰今天下將亂安生民者其在君乎操常感其知已及後經過玄墓輒悽愴致祭莫自為其文東漢橋玄傳申於知己屈於不知己晉書羊祜表吳嘗置丞相眾議張昭吳王曰孤豈為子布有愛乎顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也通鑑三國魏明紀吉溫常曰若遇知己南山白額虎不足縳也唐元宗紀傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俛而噴仰而鳴聲聞於天若出金石之聲者何也彼見伯樂之知己也戰國策鑿齒有才桓宣武器之未三十用為荊州治中謝牋曰不遇明公荊州老從事耳世說晉伐吳張悌渡江戰吳軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便為卿家丞相所拔常恐不得其死負名賢知故今身殉社稷復何所遁襄陽記集說操築於傳巖兮武丁用而不疑呂望之鼓刀兮遭周文而得舉甯戚之謳兮齊柏聞以該輔楚辭驥躊躇於弊輦兮遇孫陽而得代孫陽伯樂姓名也馬因迴首雖增價桐遇知音已半燋白侍郎士之知已貴知其音特達之分不資於滕口唐文粹喬潭霜鍾賦圭壁無卞和甘與頑石列舜禹無陶堯名隨腐草滅文粹特達而相知者千載之一遇選四子講德論騏驥長鳴伯樂昭其能盧狗悲號韓國知其才是以效之齊楚之路以逞千里之任試之狡兔之捷以驗摶噬之用曹子建自試表盧公天下之賢剌史也未聞有所推引蓋難其人而重其事今子鬱為首選古所謂知己者正如此耳身在貧賤為天下所不知獨見遇於大賢乃可貴耳若自有名聲又托形勢此乃市道之事又何足貴乎韓文知已如麻不患不顯柳文古之知己者不待來求而後施德舉賢而已受德者不待成身而拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚同上經自底不類以速戾于厥躬書太甲中負罪引慝大禹謨子夏投其杖而拜曰吾過矣吾過矣吾離群而索居亦已久矣記檀弓上史絳縣人年長趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才左襄三十年大叔文子曰臣不佞不能負羈絏以從扞牧圉臣之罪一也二十六年廉頗肉袒負荊至藺相如門謝罪遂為刎頸之交通鑑周紀范睢相秦魏使須賈於秦睢謂賈汝罪有幾曰擢賈之髮續賈之罪未足也史李廣曰諸校尉無罪乃我自失道吾今自上簿至幕府西漢本傳車騎將軍王音藉藁請罪王商王立王根皆負斧質謝通監漢成帝紀聞有意督過之高祖紀在大譴大何之域造請室而請辠賈誼傳南山之竹不能載其罪戾魏志塗顏陳情同上君子有過則謝以質小人有過則謝以文史記孔子世家經我心之憂日月逾邁若弗云來書秦誓注云欲改悔自新如日月過不復云來雖欲改悔恐無所益子自怨自艾孟史鄭莊公曰寡人有弟不能和協而使糊其口於四方左隱十一年宣子曰我之懷矣自貽伊戚其我之謂矣宣二年悔禍之延成十三年楚靈王聞群公子之死曰予殺人子多矣能無及此乎昭十二年魯季桓子病輦而見魯城喟然嘆曰昔此國幾興矣以吾獲罪於孔子故不興也謂其嗣康子曰我即死若必相魯必召仲尼史孔子世家悔之折骨東漢李固傳自古但聞漢和番不聞番和漢漢見果能回意我何惜與和通鑑晉高祖紀劉穆之曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得耶晉安紀唐王謂璟曰吾餌金石始欲益壽乃更傷生晉高祖紀王敦殺周顗而王導不言導後告其子曰我雖不殺伯仁伯仁由我而死周顗傳羅紹威曰合六州四十三縣鐵不能為此錯也唐昭宗紀並通監傳記鄧艾引弩射中猿母其子為拔箭以棄塞瘡口艾乃嘆息投弩水中華陽國志集追念往愆寒心飛魄柳文班姐收淚恨妾身我曾排擯無限人元稹集僕在京城一年不一至貴人之門人之所趨僕之所傲與己合者則從之遊不合者雖造吾廬未嘗與之坐此豈徒足致謗而已不戮於人則幸也追思之可為戰慄寒心韓文荅馮宿書斜日早知驚鵩鳥秋風恨不憶鱸魚白侍郎本朝當援琴不鼓人不見虧成臨川集未知道者如醉人方其醉時無所不至及其醒也莫不愧恥人之未知學者自視以為無缺及既知學反思前日所為則駭然矣老泉某少時好議論古人既老涉世更變往往悔其言之過東坡荅王庠書
