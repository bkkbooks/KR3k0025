body:
  text: 兼收並蓄經翕受敷施書皋陶謨子山不辭土石故能成其大管子工之制木也大者以為舟航柱梁小者以為楫楔修者以為櫚榱短者以為侏儒枅櫨無小大修短皆得其所宜同上互見隨材器使以天下為之籠則雀無所逃莊子庚桑楚良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之朴森然陳於目前大廈之器具矣孫子張天下以為籠因江海以為罟又何亡魚失鳥之有乎淮南子史詩曰雖有絲麻無棄菅蒯雖有姬薑無棄蕉萃左成九年匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄通監周紀狗盜雞鳴孟嘗列此二人於賓客賓客盡羞及有秦難卒此二人拔之史孟嘗君傳互見因事見人太山不遜土壤故能成其大河海不擇細流故能就其深史李斯傳譬諸材木洪纖曲直各有所施晉書阮咸傳陶侃為征西大將軍荊州刺史時造船木屑及竹頭悉令舉掌之咸不解後正會積雪始晴廳事餘雪猶濕以屑布地及桓溫伐蜀以侃所貯竹頭作釘裝船其綜理微密皆此類也晉書互入微小有補若榱椽梁柱以成大室義負偃植各安所施而無遺材唐劉弘基贊互入隨材器使元行沖謂狄仁傑曰凡為家者必有儲蓄脯醢以適口參朮以攻疾竊計明公之門珍味多矣請備藥物之末仁傑曰君正吾藥籠中物何可一日無也通監唐紀互見自薦集頓彌天之網收萬仞之魚量之以溪谷數之以陔兆何其壯乎應璩報季然書葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必達陸宣公文水之細者河海假其深材之短者棟梁資其峻唐文粹互見細微有補夫大木為杗細木為桷薄櫨侏儒椳闑扂楔各得其宜以成屋室者匠氏之功也玉札丹砂赤箭青芝牛溲馬渤敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也韓文進學解互入隨材器使丞相方築太平之基架群材立清廟陸魯望占小善者率以録名一藝者無不庸韓文大匠無棄材尋尺各有施況當營都邑杞梓用不疑韓文互見隨材器使會結彌天網盡取一無遺元稹集尺寸之材無所棄元微之集銖銅寸鐵罔有子遺白樂天集曲輪直桷各適於用皇甫湜常思掄群才以為國家治譬如匠見木礙眼皆不棄楣橛與棟梁施之皆有位忽然豎明堂一揮立能致杜牧之集若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏梁不知理道不可與美名而得美仕則自堯已降聖人率多子弟杜牧之集本朝古者至治之世自瞽矇昏聵侏儒籧篨戚施之人上所以使之皆各盡其才臨川集拔十覬五人之用纍百求一梟之精欒城集吾聞調羹鼎異味及枌槿豈其供王羞而棄會稽筍山谷詩經不曰堅乎磨而不磷不曰白乎涅而不緇語陽貨子有人於此藏千鎰之金雖行貸而食人謂之富矣荀子互見不受粗鍾山之玉炊以爐炭三日三夜其色不變淮南子琬琰之玉在汙泥之中雖廉者不釋也美之所在雖汙辱世不能賤同上荊山之玉潛光荊石之中雖有千仞之土不能掩其光抱朴子丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛劉子史如日月之食焉何損於明左宣十二年自漢鑄五銖至宋文帝歷五百餘年制度世有廢興而不變五銖者明其輕重可法得貨之宜故也通監齊太祖白玉投泥豈能相汙北史穆弼傳崔沔舉賢良高第不中者痛訾之武后勑有司覆試沔對益工遂為第一唐書干將雖折不改其光舊唐書楊於陵傳記周有砥厄宋有結緑梁有縣黎楚有和璞此四寶者工之所失也而為天下名器戰國策石可破也而不可奪其堅呂氏春秋良珠度寸雖有百仞之水不能掩其輝韓詩外傳夫良玉徑尺雖千仞之土不能掩其光明珠度寸雖有函丈之石不能戢其曜虞般佑高士傳集毛嬙西施善毀者不能蔽其好選四子講德論薰息猶芳選連珠珠碎無土色玉墜無瓦聲劍折有寸利鏡破有片明元稹集持謝衆人口銷盡猶是金同上神劍土不蝕異布火不燋元微之集金可鎔不可使為汙腐水可濁不可使為塵糞元次山互見有定力白玉雖塵垢拂拭還光輝韋應物集沈璜瘞珮兮孰幽而不光荃蕙蔽匿兮胡久而不芳柳吊屈原文天下英雄氣千秋尚凜然劉賓客珠非塵可昏同上杞梓植於深林人雖不知不妨其為天下之材也歐陽詹文劍雖埋而氣在白樂天不有百鍊火孰知寸金精孟東野鏡破不改光蘭死不改香同上搗麝成塵香不滅拋蓮作寸絲難絶杜牧之照乘之珍難晦符彩唐文粹譬諸日月雖終古常見而光景常新此所以為靈物也同上日月蝕而更明隨和幽而不昧夫豫章珠璣鏌釾毛嬙終不慮隱之櫝之橈之椎之之為患而擁腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳並同上君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工煆鍊凡幾年鑄作寶劍名龍泉何言中路遭棄損零落飄淪古獄邊雖復埋沈無所用猶能夜夜氣衝天郭元振寶劍歌本朝譬如埋金玉不耗精與英歐公集三光萬古不磨滅同上孔孟困一生毀逐遭百端後世苟不公至今無聖賢所以忠義士恃此死不難同上斯文金玉也棄擲埋沒糞土不能消蝕其見遺于一時必有收而寶之于後世者雖其埋沒而未出其精氣光怪已能常自發見而物亦不能掩也故方其擯斥摧挫流離窮厄之時文章已自行于天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毀而掩蔽之也歐公蘇氏文集序金百鍊以為鑑而萬物不能遁其形及為物蝕而蔽其光頑然無異乎瓦甓然而一遇良工之藥磨而瑩之則可以見肝膽而數毛髮蓋其可昏者光不可昏者性歐公祭劉給事文軒昂磊落突兀崢嶸而埋藏於地下者意其不化為朽壤而為金玉之精不然生長松之千尺産靈芝而九莖歐公祭石曼卿文故曰久而無弊者道隱而終顯者誠歐公漢郎中王君碑又知物貴久至寶見百鍊歐公集黑月在濁水何嘗不清明東坡詩骨可朽爛心難窮同上百鍊意不變欒城集靈珠在泥沙光景不可昏臨川集劫火洞然不燼惟玉楊中立吊劉安世文金百死而不化陳瑋文經百鍊而火自銷金不亡是真金也鳴道安正忘筌集師篇子強哭者雖疾不哀強歡者雖笑不樂淮南子羊質而虎皮見草而説見豺而戰忘其皮之虎也楊子史陸展染白髮欲以媚側室青青不解久星星行復出南史謝靈運傳傳記楊炯常呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳朝野僉載集草螢有耀終非火荷露雖圓豈是珠白樂天黔無驢有好事者船載以入至則無可用放之山下虎見之龐然大物也以為神蔽林間窺之稍出近之整整然莫相知他日驢一鳴虎大駭遠遁以為且噬己也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大㘚斷其喉盡其肉乃去柳文本朝如剪綵為花花則無不似只是無他造化不可及處明道二程語録子大聲不入於里耳折揚黃華則嗑然而笑莊子史直道而行多仇少與西漢蓋寬饒傳傳記客有歌於郢中者其始曰下里巴人國中屬而和者數千人其為陽陵採薇國中屬而和者數百人其為陽春白雪國中屬而和者數十人而已有引商刻角雜以流徵國中屬而和者不過數人是其曲彌高者其和彌寡劉向新序集誰鄰松桂性競愛桃李陰韓文齎財入市賣貴者恆難售同上世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴隸之手駢死於槽櫪之間不以千里稱也並同上本朝時無鍾期誰識高山之意人非季札豈知治世之音歐公謝泗倅向都官示詩啓折揚黃華笑者多陽春白雪和者少知音四海無幾人況乃區區郢中小臨川集才大古難用論高常近迀坡詩經夙夜強學以待問懷忠信以待舉力行以待取記儒行欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意大學宜其家人而後可以教國人同上恭近於禮遠恥辱也語學而君子所貴乎道者三動容貌斯遠暴慢矣正顏色斯近信矣出辭氣斯遠鄙倍矣泰伯工欲善其事必先利其器衛靈公子先立乎其大者則其小者弗能奪也孟告子下大人者正已而物正者也孟子周于利者凶年不能殺周于德者邪世不能亂同上寄汲莫若鑿井淮南子臨河欲魚不如退而織網文子人必其自愛也然後人愛諸人必其自敬也然後人敬諸椐吾子大器者其猶規矩準繩乎先自治而後治人楊先知史臧武仲曰在上位者灑濯其心一以待人軌度其信而後可以治人左襄二十一年譬如農夫是穮是蔉雖有飢饉必有豐年左昭元無瑕者可以戮人左昭四臨淵羡魚不如退而結網西漢董仲舒欲人勿聞莫若勿言欲人勿知莫若勿為枚乘傳集高鳥未挂於輕繳淵魚未懸於鉤餌者恐鉤射之術或未盡也選自試表務出人之名安得不厲出人之器戰橫行之陳安得不振橫行之略皇甫湜
