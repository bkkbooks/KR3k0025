body:
  text: 省悟子方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也莊齊物論軒冕在身非性命也物之儻來寄也莊子繕性篇人生天地間若白駒之過隙忽然而已莊田子方互入曠達不可以無涯之智役有涯之身莊史屈原曰眾人皆醉而我獨醒史屈原傳人生如輕塵棲弱草耳何至自苦迺爾通監三國志早知富貴有命恨不十年讀書南史沈攸之傳梁忠烈世子曰吾不及魚鳥遠矣魚鳥飛浮任其志性吾之進退常在掌握若使吾終得與魚鳥同遊則去人間如脫屣耳南史本傳傳記富貴之畏人不如貧賤之肆志皇甫士安高士傳益我財者損我神生我名者殺我身同上集愍流俗之未悟獨超然而先覺成公子安嘯賦富貴苟難圖稅駕從所欲陸士衡招隱詩迷途知反丘希範書既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追寔迷塗其未遠覺今是而昨非陶淵明窮涯而反盈量知歸選王文憲集序知名位之傷德故忽而不營知厚味之害性故棄而弗顧嵇叔夜養生論酒適衷腸神遊異方煙生喉舌惝然如狂爰瞰甃以窺汲俄據河而俯瀆猶胃腸之不浹資宴飲而未足由是奔九江走五湖尋至大溟茫然連清豈爾浩瀚而吾量不盈斟酌未幾焂見涯涘方將尋蟻垤期耿恭問姜母以何在訪舒茹而欲從辨夸父於渭上弔相如於臨卬萬計已盡六腑如燼窗日斜照飛蚊遶鬢既驚既覺可嘆可笑飲不盡器枯腸巳療搘頸沈吟其意逾深以吾此日之一夢見自古不足者之心何諷夢渴賦布衣可終身寵祿豈足賴阮嗣宗詠懷互入安分人生非金石豈能長壽考選古詩當其欣於所遇暫得於巳快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俛仰之間以為陳跡王羲之蘭亭敘互入感歎鍾鼎玉帛非度世之資名位寵章為累真之府未能獨立物表超世長存與日月齊光天地比壽陳子昂集大塊是勞生之機小智非周身之防見螗蜋之抱影怯危機之未安幽貞為虛白之寶靜默為大玄之門知軒冕是儻來悟榮華非力致並駱賓王若待功成拂衣去武陵桃花笑殺人俯仰人間易凋朽並李太白人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟莫憂世事兼身事須著人間比夢間浮生雖多途趍死每一軌雖得一餉樂有如聚飛蚊並韓文一夢悟一生心是主人身是客形質及壽命危脆若浮煙煙一作雲人生大塊間如鳴毛在風乃知名與器得失俱為害亦知恩愛緣乃是憂惱資有侶多憂者非因外火燒恐污清冷波塵纓先斗藪未得無生心白頭亦為夭始知骨肉愛乃是憂悲聚恩愛元是妄緣合暫為親誓以智慧水永洗煩惱塵不將恩愛子更種憂悲根況是血肉身安能長強健外累由心起心寧累自息須悟事皆空無令念將屬艷色即空花浮生乃燋穀障要智燈燒魔須慧刀戮利熏性易染內戰心難衂斷癡求慧劍濟苦得慈航山林初息影朝夕久勞生憂苦皆心火榮枯是眼塵人間所重者相印將軍鉞燋心一身苦炙手旁人熱未必方寸間得如吾快活賓客歡娛僮僕飽始知官職為他人簪纓假合虛名在筋力銷磨實事空但能斗藪人間事便是優游地上仙多見朱門富貴人林園未畢即無身流水光陰急浮雲富貴遲嘉肴與旨酒信是腐腸膏艷聲與麗色真為伐性刀夢中說夢兩重虛但恐人間為長物不如林下作遺民金玉滿堂非己物子孫委蛻是他人只有一身宜愛護少教冰炭逼心神繩外老雞因斷尾盤中鮮鱠為吞鉤誤為世網牽並白侍郎絃管聲非實花鈿色是空假使如今不是夢能長於夢幾多時未問病根深與淺此身應與病齊生並白樂天始知天地間萬物皆不牢孟東野視身如傳舍閱世甚東流色身豈吾寶語到不言時世間人盡睡唯有達生理應無治老方方知醉兀兀應勝走營營盡日笙歌人散後滿江風雨獨醒時並元微之看取蓮花淨應知不染心孟浩然莫問卜人生吉凶皆自速伏羲文王若無死今人不為古人哭劉義文久被浮名繫能無愧海鷗劉長卿漸老知身累同上曉然於厚夜聰然於大醉皇甫湜纓冕猶緇塵有名皆畏途無事乃真筌子不見世風燈槿花並李義山文盡知行處險誰肯載時輕錢起文舡詩幾世身在夢百年雲無根鮑溶文萬里高低門外路百年榮辱夢中身昔日未知名外樂暮年初信夢中忙並許用晦人生能幾何畢竟歸無形王維集向來躐等語長作陷身機杜牧之只知事逐眼前去不覺老從頭上來羅隱集浮生七十今三十已是人間半世人滅得心中火自涼百年身後一丘土貧富高低爭幾多舉世盡從愁裡老誰人肯向死前閑甘醴皆是腐腸物獨有淡泊之水能益人百歲風前短焰燈並杜荀鶴人生非日月光輝豈常在唐文粹本朝運數本來無得喪人生萬事不須謀千載紛爭共一毛可怜身世兩徒勞無人與語劉元德問舍求田意最高何須更待黃糧熟始覺人間是夢間並臨川天下之物無窮而以適意為悅方其得意萬物無以易之及其既厭未有不洒然自笑也回頭自笑風波地閑眼聊觀夢幻身捷徑爭知卻累人欲除苦海浪先乾愛河水非人磨墨墨磨人煩惱初無根恩愛為種子尚有身為患已無心可安並東坡人生一世如屈伸時東坡後杞菊賦我觀此幻身已作露電觀東坡角枕冠頌孰知一世如一夢在夢而覺寧待旦更欲置身須世外世間元自不關人並後山名譽飛蠅過耳聲欒城集富貴於我如浮雲小者譴何大者戮一身畏首復畏尾門多賓客飽僮僕山谷互入與人為地八風之波渺然無涯而以百年有涯之生種種計較同上經亢之為言也知進而不知退知存而不知亡知得而不知喪易乾其欲逐逐頤卦子孔子見羅雀者皆黃口小雀曰小雀貪食而易得家語為上者譬如緣木焉務高而畏下愈甚家語入官篇莊周睹一異鵲自南方來集於栗林周曰此何鳥哉執彈而留之睹一蟬方得美蔭而忘其身螳蜋執翳而摶之見得而忘其形異鵲從而利之見利而忘其真莊山木魚鱉黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀法行見其可欲也則不慮其可惡者也見其可利也則不慮其可害也是以動則必陷為則必辱荀不苟逐獸者目不見太山嗜欲在外則明有所蔽淮南子互入心無二用狗彘不擇甂甌而食偷肥其體而顧近其死淮南子齊人有欲金清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金列子互入心無二用史翠鵠犀象處其勢非不遠死也而所以死者惑於餌蘇秦智伯之智非不足以辟辱遠死也而所以死者惑於貪利不止也史蔡澤傳商君功成而以車裂白起功成而賜劍死吳起功成而卒肢解大夫種功已彰信勾踐終負而殺之此四者功成不去禍至於此同上懷祿耽寵西漢王貢笄贊逐麋之狗當顧菟耶前外戚傳園中有木其端有蟬蟬悲鳴飲露不知螗蜋在其後曲跗欲取其蟬而螳蜋又不知黃雀居其後延頸欲啄之然黃雀又不知臣操彈丸在其下皆務前不顧後患劉向說苑互入有意與無意和嶠有錢癖晉書田豫曰年過七十而居位譬猶鐘鳴漏盡而夜行不休魏志天道惡盈不知自損故至顛仆通鑑漢殤紀董卓築塢於郿高七丈號曰萬歲塢積穀為三十年儲自云事成雄據天下不成守此足以畢老後漢亦猶竊鐘掩耳以眾人為不聞銳意盜金謂市中為莫睹晉武紀張華少子韙勸華遜位華不從曰天道幽遠不如靜以待之通鑑晉惠紀元康之後綱紀大壞魯褒傷時貪鄙乃隱姓名著錢神論以剌之其略曰親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處先錢少者居後錢之所祐吉無不利何必讀書然後富貴無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺諺曰錢無耳可使鬼凡今之人唯錢而已晉書蕭宏性愛錢百萬一聚黃榜標之千萬一庫垂一紫標如此三十餘間南史見黃雀而忘深阱智者所不為通鑑梁高祖沈約貪冒營財通鑑梁高祖王伾以納賄為事作大匱貯金帛夫婦寢其上通鑑互入貪汙如飲醇酒嗜其味而忘其醉矣通鑑唐昭宗李憕并州人頗殖產田疇彌望時謂地癖唐書傳記武后時夏官侍郎侯知一以年老敕令致仕知一乃詣朝堂跳躍馳走以示輕捷朝野僉載互入無恥范氏亡有得其鐘者欲負而走則又不可以椎毀之鐘恍然有聲恐人聞之而奪巳遽掩其耳呂氏春秋集普天之下先競而後遜舉世之士有進而無退晉庾峻君看燈燭張轉使飛蛾密杜詩世上名利人相逢不知老但將膏血求豈覺性命輕並孟東野求食嘔洩間不知臭穢非歲老豈能充上駟力微當自慎前程不知何故翻驤首牽過關門妄一鳴並韓文猛獸搏也拘於檻阱鷙鳥攫也縶於籠樊元龜靈也被髮河津白龍神也挂鱗罝網何不泥潛而穴處何故貪餌而吞鉤駱賓王猩猩見酒及屐知里人設張則知張者祖先姓字乃呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及食其味逮乎醉因取屐而著之及為人之所擒皆輒獲無遺者唐文粹始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利五卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣柳漁者對互入鑒戒蝜蝂者善負小虫也行遇物輒持取卬其首負之背重雖困劇不止也其背甚澀物積因不散卒躓仆不能起人或憐之為去其負苟能行又持取如故又好上高極其力不巳至墜地死今世之嗜取遇貨不避以厚其室不知為己累也唯恐其不積及其怠而躓也黜棄之遷徙之亦以病矣苟能起又不文日思高其位大其祿而貪取滋甚以近於危墜觀前之死亡一本有曾字不知戒雖其形魁然者也其名人而智則小虫也亦足哀哀一作悲夫柳子厚蝜蝂傳零陵永之氓咸善游一日水暴甚有五六氓乘小船絕湘水中濟船破皆游一本作皆浮游其一氓盡力而不能尋常其侶曰汝善游最也今何後為曰吾腰千錢重是以後曰何不去之不應搖其首有頃益怠巳濟者立岸上呼且號曰汝愚之甚蔽之甚身且死何以貨為又搖其首遂溺死吾哀之且若是得不有大貨之溺大氓者乎於是作哀溺柳子厚哀溺文貪目不瞬劉賓客鴟張狼貪老不衰元稹集燭蛾焰中舞繭蠶叢上織多生沈五蘊白頭名利之場並元微之貪卻馨香忘卻身羅隱集利徑前誘多逢覆轍力疲形削然猶役之無藝極並劉賓客觜爪雖欲弊心力不知疲朝露貪名利夕陽憂子孫一興嗜慾然遂為矰繳牽愛利不愛身如何奉一身直欲保千年擬將富貴隨身去或名誘其心或利牽其身商人重利輕別離人心苦迷執慕貴憂貧賤愁色常在眉歡容不上面何異睡著人不知夢是夢何異食蓼虫不知苦是苦多見忙時巳衰病少聞健日肯休閑早夭羨中年中年羨暮齒暮齒又貪生服食求不已並白侍郎互入無厭位高則惜其位身貴則愛其身白樂天兔跡貪前逐梟心不早防張氶吉文互入噬臍何及遍看原上纍纍塚曾是城中汲汲人盡謂黃金堪潤屋誰思荒骨旋成塵杜荀鶴互入儆戒趍榮貪位者若涉懸崖險不能止俾至身危踣蹶然後歎不知稅駕之所焉何及矣唐沈顏登華首互見噬臍何及本朝苦何求而不得乃終日而營營諒雖死而不悔亦可戒夫貪得並歐公集如抱石沈河以其重愈沈終不放下石也老泉腥涎不滿殼聊足以自濡升高不知回竟作粘壁枯蠹魚著文字槁死猶遭卷懷安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私於為身君臣之恩係縻之於前妻子之計推輓之於後至於山林之士猶有降志於垂老而況廟堂之舊欲使辭祿於當年有其言而無其心有其心而無其決愚智共蔽古今一塗東坡多思只恐晚得手未老已聞先白頭邵堯夫人之所不能安其止者動於欲也欲牽於前而求其止者不可得也程易坤卦蝨聞湯沸尚血食飛蛾赴燭甘死禍並山谷不知鍾鳴漏盡續世說第十
