body:
  text: 文章經觀乎人文以化成天下易貫卦吉甫作誦穆如清風詩烝民儒有不祈多積多文以為富記儒行夫子之文章可得而聞也語公冶長斐然成章語公冶長子楊雄作賦有夢腸之談曹植為文有反胃之論言勞神也梁湘東王蕭繹金樓子史嫺於辭令屈原傳文章爾雅前漢儒林序楊具謂賈捐之曰君房筆下言語妙天下前漢賈捐之傳文章則司馬遷相如西漢公孫洪寺傳劉向王褒以文章顯西漢敷文華以緯國典後漢班彪傳二班懷文裁成帝墳後漢本贊咳唾自成珠後漢趙壹傳禰衡為江夏太守黃祖作書記輕重疏密各得體宜祖持其手曰此正得祖意如祖腹中之所欲言東漢本傳互入機鋒相奏陳琳為記室作檄草成呈太祖太祖先苦頭風是日疾發臥讀琳所作翕然而起曰此愈我疾魏志本傳張華謂陸機曰人之為文常恨才少而子更患其多晉書陸機傳文藻宏麗獨步當時高詞遠映如明月之垂光疊意迴舒若重巖之積秀遠超枚馬高躡王劉百代文宗一人而已晉陸雲傳言泉會於九流文律諧於六變晉書縟彩鬱於雲霞逸響振於金石筆有餘力詞無竭源晉書文學序孫綽嘗作天台賦初成以示友人云卿試擲地當作金石聲也晉書本傳左思作三都賦豪貴之家競相傳寫洛陽為之紙貴晉書高言妙句音韻天成蕭介染翰便成文無加點帝曰蕭介之文即席之美也南史梁紀傳劉孝綽辭藻為後進所宗時重其文每作一篇朝成暮遍好事咸誦傳寫流聞河朔亭苑柱壁莫不題之南史本傳邢邵文章典麗每一文出京師為之紙貴讀誦俄遍遠近洛中貴人拜職多憑邵為謝章表後魏書東海徐摛文體輕麗時人謂之宮體通監梁高祖紀江左齊梁競一韻之奇爭一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀通監陳後主文章婉縟唐書虞世南李嶠為文章宿老一時為學者取法唐書本傳自景龍後蘇題與張說以文章顯時號燕許大手筆唐蘇題張說為文得江山助唐本傳陸贄為翰林學士一日之內詔書數百起草思如泉注曲盡事情故奉天書詔雖武夫悍卒無不揮涕感激皆贄所為也本傳賀知章醉後屬辭動成卷軸唐本傳文如瀉河酌之不竭唐王勃傳辭鋒犀利絕人遠甚唐書令狐楚傳王仲舒知制誥文思溫雅制誥出人皆傳寫唐書本傳李杜文章在光焰萬丈長唐書本傳元和主盟實在元白唐書白居易作樂府及詩百餘篇規諷時事流聞禁中上見而悅之召之為翰林學士通監唐憲宗記柳公權工辭賦應聲成文唐文宗曰子建七步爾乃三焉唐書本傳互見敏捷崔元裕訓詞溫厚有典誥風唐書本傳文檄豪健一時推許唐書舒元輿傳馬定能古章句新羅國傳定黑水碑晝鶴記西番寫定商山記於屏其名傳戎夷如此唐本傳李賀辭尚奇詭絕去翰墨畦逕唐本傳天格贍麗意悟沖邁唐書鄧世陸傳附令狐德楚後傳記孟郊死葬北邙山日月風光暫得閑天恐文章聲斷絕固留賈島在人間北夢瑣言崔融司業作武后哀文時人以為三二百年來無此文唐國朝傳蘇生俊贍無敵真文陣之雄帥也開元遺事載張九齡覽蘇頲文卷集文彩燿於玉石楚辭摛藻如春華班固賓戲發藻儒林同上大漢文章煥然與三代同風班孟堅兩都賦序摛藻下筆鸞鳳之文奮矣吳季重荅魏太子牋摛藻掞天庭選左太沖蜀都賦炳若縟繡悽若繁絃陸士衡文賦思風發於胸臆言泉流於唇齒選文賦函綿邈於尺素吐霶霈於寸心言恢之而彌廣思按之而愈深播芳蕤之馥馥發清條之森森陸機文賦被金石而德廣流管絃而日新陸士衡文賦傾群言之瀝液漱六藝之芳潤籠天地於形內挫萬物於筆端配霑潤乎雲雨象變化乎鬼神陸機文賦文不流放言無枝葉傳玄連珠掞藻艷春華潘正叔贈河陽文鋒振奇響調與金石諧思逐風雲上杜詩英辭潤金石謝靈運逸響高韻同上卿雲黼黻河漢劉孝標廣絕交論詞彩精拔跌宕昭彰梁昭明序陶潛集與日月俱垂鬼神爭奧梁蕭統文選序賦成鼓吹詩如彈丸王無功筆湧江山氣文驕風雨神張說之文文鋒迅驅姚崇銘文章峻如嵩華盛如江河清如秋風過物邈不可逮崔祐甫文章昭昭然與金石不朽權德輿翰苑集序陸贄秉筆內翰搉古揚今雄文雅思敷之為文誥伸之為典謨文章與典謨接軫權德輿翰苑集氣劘屈賈壘目短曹劉墻杜詩詞華傾後輩風雅藹孤鶱杜詩詞源倒流三峽水杜詩文章曹植波瀾闊杜詩不盡長江袞袞來斯文散都邑高價越璠璵庾信文章老更成凌雲健筆意縱橫楊王盧駱當時體杜詩前後百卷文枕籍皆禁臠溟漲與筆力波瀾獨老成文章驚海內雄筆映千古壯筆過飛泉杜詩詞林有根柢杜詩聲華當健筆灑落賦清製風流散金石追琢山岳銳杜詩文傳天下口屈平詞賦懸日月並杜詩落筆搖五嶽李白集落筆生錦繡李白集玉佩瓊琚大放厥辭韓愈祭柳宗元文章蔑曹謝韓詩平生十萬篇金薤垂琳琅仙官敕六丁雷電下取將流落人間者太山一毫芒韓愈調張籍互入著書沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所錄子雲相如同工異曲先生之於文可謂閎其中而肆其外矣韓文進學解其文辭引物連類窮情盡變宮商相宜金石諧和寂寥乎短章春容乎大篇如是者閱之累日無窮焉韓文送權秀才崔侯文章苦敏捷高浪駕天輸不盡韓文搖毫擲簡自不供頃刻青紅浮海蜃韓文龍文百斛鼎筆力可獨扛同上文如翻水成初不用意為四座各低面不敢捩眼窺韓文互見心服文章銳氣至輝輝見旌麾韓文芒端轉寒燠韓文互見求援變化若雷霆浩汗若河漢正聲諧韶濩勁氣沮金石豊而不餘一言約而不失一辭韓文鏗鏘發金石幽眇感鬼神韓文窺奇摘海異恣韻激天鯨腸胃遶萬象精神驅五兵大句斡元造高言軋霄琤芒端轉寒燠韓聯句所為文章無世俗氣韓文險語破鬼膽高詞媲皇墳韓文然而必出於己不蹈襲前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海含地負放恣橫縱無所統紀然而不煩於繩削而自合也韓南陽楚紹述墓誌銘操詞握賦為干戈鋒銳森然勝氣多白侍郎掩黃卷之麗藻吐白鳳之奇姿振金聲於寰海增紙價於京師炳如繪素鏗若鐘鼓郁郁哉溢目之黼黻洋洋乎盈耳之韶濩可以凌轢風騷超軼今古潤色帝業發揮皇猷白侍郎賦力凌鸚鵡詞鋒敵轆轤同上高雅閑淡自成一家之體筆力雄健不浮不鄙涉江文一首自可敵公卿並白侍郎海內聲華併在身篋中文字絕無倫制從長慶詞高古詩到元和體始新白侍郎天地粹靈文人得之居多跳珠濺玉驚動耳目白侍郎海岳詞鋒截皇王筆陣敺元微之集思勇曾吞筆詞海跳波湧文星拂座懸並元微之集筆陣詞鋒可以偃干戈而息戎旅中都紙貴能傳後元微之集妍辭一發樂府傳貴劉賓客怪君近日文鋒利新向延平看劍來劉賓客人間無價是文章同上筆底文章夜應星同上新成麗句開緘後便入清歌滿座聽制誥留臺閣歌詞勝管絃文章似錦氣如虹筆端膚寸膏潤天下麗句輕珠玉並劉賓客文翰灑天機韋應物集文如金石韻高文激頹波四海靡不傳同上公鼎侯碑志隧表阡一字之價輦金如山劉禹錫祭韓吏部章妥句適皇甫韓愈墓誌精能之至入神出天同上文能囊括天地皇甫湜肆意文章秋濤瑞錦皇甫湜意語天出皇甫湜作韓愈神道碑互見論詩門文章橫被六合可謂力敵造化李陽冰文五臟皆錦繡耶不然何以開口成文揮翰霧散李陽冰作李白集序文懸日月字動煙霞王維集以文華國如雲漢之為章于上江漢之為紀于下李義山春雲生紙上秋濤起胸中孟東野欲識楚章句袖中蘭茞薰孟東野碑文合遣貞魂謝史筆應令諂骨羞王建集殿前作賦聲摩空筆補造化天無功李賀筆力動乾坤張承吉文文雕玉璽重同上錦心繡口柳文擲地金聲滿劉長卿翰苑飛鸚鵡天池待鳳凰劉義文星斗煥文章唐杜牧華清宮詩近日篇篇欺白雪早年詞賦得黃金羅隱集仙筆驅造化唐文粹詞人咳唾成珠玉唐文粹口吐天上文同上本朝李頻詩曰只將五字句用破一生心北夢瑣言互入精專薛能還劉仁德卷詩云百首如一首卷初如卷終譏其不能變態也北夢瑣言互入精專四六之作起自徐庾盧氏記李商隱為文多檢閱書冊左右鱗次號獺祭魚談苑落筆文章天下知歐公詩眉山在西南數千里外一日父子隱然名動京師而蘇氏文章遂擅天下歐公文給札揮毫聳如墻而駭目奏篇稱善喧貴紙以傳都歐公集談笑樽俎之間舒卷風雲之際成於俄頃蓋其咳唾之餘得而秘藏己如金玉之寶絕去刀尺渾然天質辭窮卷盡含意未卒並歐公集筆陣空來夜斫營坡詩筆端猶自斡千鈞坡詩舌有風雷筆有神月斧雲斤琢肺肝風濤借筆力秋水為文不受塵並坡詩追還正始文章為之一新傳寫都城紙墨幾於驟貴東坡集文章韓杜無遺恨山谷詩文字江河萬古流同上文章生得羽毛飛詩話雄詞大冊破幽昏反覆難窺斧鑿痕僧參寥子
