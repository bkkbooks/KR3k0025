body:
  text: 守正經子曰素隱行怪後世有述焉吾弗為之矣記中庸子曰獲罪於天無所禱也語八佾互入無所逃罪子曰敬鬼神而遠之可謂智矣語雍也子不語怪力亂神語述而淫祀無福記子子曰君子不祈妄福文中子禮樂史魯大旱公欲焚巫尫臧文仲曰天欲殺之則如勿生若能為旱焚之滋甚左傳狐突曰神不歆非類民不祀非族左僖十年寧武子曰鬼神非其族類不歆其祀左僖三年鄭裨竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子産弗與左僖十七年鄭龍鬭國人請禜子産曰吾無求於龍龍亦無求於我乃止左昭十九年祝有益也詛亦有損左昭二十年初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂不祭左哀六年晏子曰使神可祝而來亦可禳而去史齊世家鄒陽枚乘遊於危國然卒免刑戮者以其言正也西漢本贊互入有守班婕妤曰死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為西漢本傳互見婦言明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱奇怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥遙興輕舉黃冶變化之術者皆姦人惑衆挾左道懷詐偽以欺罔世主聽言洋洋滿耳若將可遇求之蕩如係風捕影終不可得通監漢紀魏帝愛女淑卒帝痛之欲幸許陳群諫曰臣以為吉凶有命禍福由人移都求女則亦無益且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心況乃帝王萬國之主行止動靜豈可輕脫哉通監魏明紀時長吏喪官後人惡之多毀壞舊府祜以死生有命非由居室普加禁斷晉書羊祜傳王度曰佛外國之神非天子諸華所應祠奉漢氏初傳其道唯聽西域人立寺都邑以奉之漢人皆不得出家魏世亦然今宜禁公卿以下母得詣寺燒香禮拜其趙人為沙門者皆返初服通監晉成紀郭璞嘗遇顏含欲為之筮含曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞蓍龜同上庾翼在武昌數有妖怪欲移鎮樂鄉王述曰武昌實江東鎮戍之中非但扞禦上流而已達人君子直道而行禳避之道皆所不取通監晉穆紀太史令傅奕上疏請除佛法曰佛在西域言妖路遠漢譯胡書恣其假托使不忠不孝削髮而揖君親遊手遊食易服以逃租賦偽啓三塗謬張六道恐喝愚夫詐欺庸品乃追懺既往之罪虛規將來之福布施萬錢希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章有造為惡逆身墜刑網方乃獄中禮佛規免其罪且死生壽天由於自然刑德威福關之人主貧富貴賤功德所招而愚僧矯詐皆云由佛降自羲黃至于有漢皆無佛法君明臣忠祚長年久漢明帝始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髡髮之事梁武齊襄足為明鏡今天下僧尼數盈千萬剪刻繒綵裝束泥人競為厭魅迷惑百姓通監唐高祖有僧自西域來善咒術能令人立死復咒之使蘇上擇飛騎中壯者試之皆如其言以告傳奕奕曰此邪術也臣聞邪不干正請使咒臣必不能行上命僧咒奕奕初無覺須臾僧忽僵仆若為物所擊遂不復蘇通監唐太宗梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徵何其謬也呂才以為近世巫覡妄分五姓如張王為商武庾為羽似取諧韻至於以柳為宮以趙為用又復不類或同出於一姓分屬宮商或復姓數字莫辨徵羽此則事不稽古義理乖僻者也祿命之書多言或中人乃信之然長平坑卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同祿而貴賤懸殊共命共胎而天壽或異又云古之葬者皆於國都之北兆域有常處是不擇地也夫子文為令尹而三已柳下惠為士師而三黜計其丘隴未嘗改移而野俗無識妖巫妄言遂於劈踊之際擇葬地而希官爵荼毒之秋選葬時而規財利或云辰日不可哭泣遂莞爾而對弔客或云同屬忌於臨壙遂吉服不送其親傷教敗禮莫斯為盛術士皆惡其言而識者以為確論並同上狄仁傑以吳楚多淫祠奏焚其一千七百餘所獨留夏禹吳太伯季札伍員四祠通監唐武后太后造大像狄仁傑上疏諫其略曰今日伽藍制過宮闕功不使鬼止在役人物不天來終須地出不損百姓將何以求又曰遊僧皆托佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘所激切於官徵法事所須嚴於制敕通監唐史宗李雍上疏以為詩三百一言以蔽之曰思無邪若有神仙能令人不死則秦始皇漢明帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已同上姚崇上言佛圖澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃但使蒼生安樂即佛身何用妄度姦人使壞正法命有司沙汰天下僧尼以偽妄還俗者萬二千餘人通監唐玄宗姚崇曰若使殺蝗有禍臣請當之同上張鎬曰帝王當修德以弭亂安人未聞飯僧可致太平也通監唐肅宗上曰建中之亂術士豫請城奉天此蓋天命非杞所能致也李泌曰天命他人皆可言惟君相不可言蓋造命也通監唐德宗上與宰相語及神仙問果有之乎李藩曰秦始皇漢武帝學仙之效具在前史太宗服天竺僧長年藥致疾此古今之明戒也苟道盛德充人安國理何憂無堯舜之盛壽乎通監唐憲宗傳記孔子曰存亡禍福皆在已天災地殃不能殺也説苑集佛者夷狄之一法耳自後漢時流入中國上古未嘗有也昔者黃帝在位百年年一百十歲少昊在位八十年年一百歲顓頊在位七十九年年九十八歲帝舜及禹年皆百歲此時天下太平百姓安樂壽考然而此時中國未有佛也其後殷湯亦年百歲湯孫太戊在位七十五年武丁在位五十九年書史不言其年壽所極蓋亦俱年不減百歲周文王年九十七歲武王年九十三歲穆王在位百年此時佛法亦未至中國非因事佛而致然也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十九年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜果其後竟為侯景所逼餓死臺城國亦隨滅事佛求福反更得禍由此觀之佛不足信事亦可知矣韓文論佛骨表佛如有靈能作禍福凡有殃咎宜加臣身上天鑒臨臣不怨悔同上凡君子行己立身自有法度聖賢事業載在方册可效可師仰不愧天俯不怍人內不愧心積善積惡殃慶自各以其類至何有去聖人之道舍先王之法而從夷狄之教以求福利也韓文與孟尚書假如釋氏能與人為禍福非守道君子之所懼也況萬萬無此理釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在旁又安得因一摧折自毀其道以從於邪也並同上未有恃祥而壽者也商之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽惡在其為符也柳貞符本朝開寶塔災得舊瘞舍利迎入內廷傳言頗有光怪將復建塔余襄公言彼一塔不能衛何福可及於民凡腐草皆有光及珠之圓者夜亦有光烏足畏也筆談王嗣宗為節度使性剛正嘗臥病家人私爇紙幣以祈福嗣宗大呼而止之曰神苟有知豈枉法而受賄耶聖宋掇遺經民興胥漸泯泯棼棼罔中于信以覆詛盟書呂刑非其所祭而祭之名曰淫祀淫祀無福記曲禮下奧者老婦之祭也盛於盆尊於瓶記禮器非其鬼而祭之諂也語八佾互入強自攀附史申繻曰妖由人興也人無釁焉妖不自作人棄常則妖興左莊十四年史嚚曰國將興聽於民將亡聽於神左莊二十三年初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之通監漢明紀初帝奉佛法立精舍於殿內引諸沙門居之通監晉武紀謝萬曰三郤諂於道二何佞於佛晉書自天監中用釋氏法長齋斷魚肉日止一食惟菜羹糲飯而已通監梁高祖上好禨祥小數王劭表上符瑞甚衆又採民間歌謠引圖書讖緯捃托佛經曲加誣飾撰皇隋靈感志上令宣示天下隋文紀隋傅縡曰不虔郊廟大神專媚淫昏之鬼通監隋紀隋程知節曰王世充好為咒誓此乃老巫嫗耳同上楚人信妖言通監唐高祖上好祀神鬼王璵習祠祭之禮以干時璵祈禱或焚紙錢類巫覡習禮者羞之通監唐元宗肅宗代宗皆喜陰陽鬼神事無大小謀之卜祝故王璵黎幹以左道得進通監唐代宗上病甚令僧剃髮遺令為塔以葬同上傳記孫恩攻會稽王凝之謂吏民曰不須預防吾已請大道許遣鬼兵相助賊自破矣既不設備遂為恩所害王氏譜見世説注事鬼求福墨生所信史通集甚矣人之好怪也不求其端不訊其末惟怪之欲聞韓文原道越人信祥而易殺病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飭死事曰神不置我矣因不食蔽面死柳寺記德實受命之符以奠永祀後之妖淫嚚昏好怪之徒乃始陳大電大虹玄鳥巨迹白魚流火之烏以為符斯皆詭譎闊誕其可羞也柳貞符自司馬相如劉向揚雄班彪彪子固皆沿襲嗤嗤推古瑞物以配受命其言類淫巫瞽史誑亂後代不足以知聖人立極之本顯至德揚大功甚失厥趣同上本朝畏鬼神聽巫覡者匹婦之愚也通監唐肅宗史諸葛瞻亮之子亮卒蜀人思亮之德咸愛瞻才敏每有善政佳事雖非瞻所建皆相告曰葛侯所為也是以美譽過實蜀志互入遺愛章華好學善屬文朝臣以華素無閥閲競排詆之通監陳後主集丈人屋上烏人好烏亦好杜詩偶然題作木居士便有無窮求福人韓文必若土之出無不可者則東南之竹箭雖旁歧揉曲皆可以貫犀革北山之木雖離奇液暪空中立枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊墣皆可以備砥礪徐之糞壤皆可以封大社荊之茅皆可以縮酒九江之元龜皆可以卜泗濱之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊關轂而輠輪者皆可以為師儒盧之沽名者皆可以為大醫西子之里惡而矉者皆可以當侯王山西之冒沒輕俯沓貪而忍者皆可以鑿凶門制閫外山東之椎騃朴鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉柳文互入不具眼目本朝韓魏公曰頃時丁寇立朝天下聞一善事皆歸之萊公未必盡出萊公也聞一不善事皆歸之晉公未必盡出晉公也蓋天下善惡爭歸焉遺事
