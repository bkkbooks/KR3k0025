body:
  text: 事必有極經四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣記大傳子君子之澤五世而斬小人之澤五世而斬孟子史一體炫金不及百兩一歲美衣不過數襲通監宋太祖傳記烏獲舉千鈞之重行年八十而求扶持戰國策騏驥盛壯之時一日而馳千里至其衰也駑馬先之同上集延年不死壽何所止楚辭金石終銷毀謝惠連秋懷詩物壯誠有衰勢雄良易極陳子昂集盛色無千年李白鷦鷯巢林不過一枝偃鼠飲河不過滿腹莊子經池之竭矣不云自頻泉之竭矣不云自中詩召旻哲夫成城哲婦傾城詩瞻卬為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之記曲禮下事親有隱而無犯事君有犯而無隱事師無犯無隱同上君子之愛人以德細人之愛人以姑息檀弓上禮之於人也猶酒之有糵也君子以厚小人以薄禮運並記互見同出異趣子曰惟上智與下愚不移語陽貨子同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也孟萬章下盡其道而死者正命也桎梏死者非正命也同上盡心下盜跖名聲若日月與舜禹俱傳然而君子不貴非禮義之中也荀不苟好榮惡辱好利惡害是君子小人之所同也若其所以求之道則異矣荀榮辱方舟而濟於河有虛船來觸舟雖有褊心之人不怒有一人在其上則以惡聲隨之向也不怒而今也怒向也虛而今也實莊子兔走於街百人追之貪人具存人莫之非者以得兔為定分也積兔滿市過不能顧非不欲兔也分定之後雖鄙不爭慎子互入事有定分君子多聞見而心愈真小人多聞見而心愈僞楊子注魚不畏網而畏鵜鶘復讎者不怨鏌釾而怨其人網無心而鳥有情劍無情而人有心也劉子互見有意無意史善人富謂之賞人富謂之殃左襄二十八公甫文伯官於魯病死婦人為之自殺於房中者二八其母聞之不肯哭也相室曰焉有子死而不哭者乎其母曰孔子賢人也逐於魯是人不隨今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言者異則人心變矣戰國策互入婦人識見道高益安勢高益危史日者傳詩曰無酒酤我而論語曰酤酒不食二者非相反也夫詩據承平之世酒酤在官和旨便人可以相御也論語孔子當周衰亂酒酤在民薄惡不誠是以疑而弗食前漢食貨志張釋之為廷尉天下無冤民于定國為廷尉民自以為不冤前漢姚宋二人每進見上輒為之起去則為臨軒送之及李林甫為相雖寵任過於姚宋然禮遇殊卑薄矣通監傳記忠於治世易忠於濁世難呂氏春秋互見事有難易集人固有一死死或重於泰山或輕於鴻毛司馬遷報任安書史臣責錯之父不逮趙括母何其鄙也夫趙括持必敗之勢而母言於趙王不可使將及括失律母以先見獲宥朝錯用至忠之略與必敗之勢異也其父雖懼禍至奈其子所籌國之大事也且使括母言之足稱明婦人也使錯父言之是阻其子為忠也李元賓燕昭築金臺天下稱其賢殷紂作玉柸天下稱其惡蓋為人與為己殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大蓋同利與專利異也陸宣公本朝夜光之與蒸燭互照雖均質則異焉晏公類要以物與人物盡而止以法活人法行無窮東城乞免五穀劄子南面之君雖清遠間放如鶴者猶不得好好之則亡其國而山林遁世之士雖荒惑敗亂如酒者猶不能為害東坡鶴亭記古人謂鵰鶚百鳥望而畏之鸞鳳百鳥望而愛之其服則一其品相遠同上經見同等不起上客起記曲禮下外事以剛日內事以柔日記曲禮上婦人不立乘同上國君下齊牛式宗廟大夫士下公門式路馬臨喪則必有哀色執紼不笑臨樂不歎介胄則有不可犯之色帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔主佩倚則臣佩垂主佩垂則臣佩委居喪不言樂祭事不言凶公庭不言婦女曲禮下君於上不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之大夫私行出疆必請反必有獻士私行出疆必請反必告在官言官在府言府在庫言庫在朝言朝朝言不及犬馬在朝言禮問天子之年對曰聞之始服衣若千尺矣問國君之年長曰能從宗廟社稷之事矣問大夫之子長曰能御矣問士之子長曰能典謁矣問庶人之子長曰能負薪矣問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富以車數對問庶人之富數蓄以對並同上死者北首生者南鄉禮運邇臣守和宰正百官大臣慮四方表記母親而不尊父尊而不親同上女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容問喪君子太牢而祭謂之禮匹士太牢而祭謂之攘禮器攘盜竊也士於大夫不承賀下大夫於上大夫承賀王葆同姓從宗合族屬異姓主名治際會名著而男女有別異姓謂來嫁者也王於母與婦之名耳際會昏禮交接之會也著明也母婦之名不明則人倫亂也大傳樂者為同禮者為異同則相親異則相敬樂記武車不式介者不拜少儀賓客主恭祭祀主敬喪事主哀會同主詡軍旅思險隱情以虞同上門內之治恩掩義門外之治義掩恩聘義子父子主恩君臣主敬孟公孫丑上事生飾歡祭祀飾敬荀子不聰不明不能為王不瞽不聾不能為公慎子道猶金石一調不更事猶琴瑟每終改調淮南子家老異飯而食殊器而享子婦跣而上堂跪而斟羹非不費也然而不可省者為其害義也同上史雖有文母之德必繫於子東漢杜鄴傳夫委大臣以大體責小臣以小事為治之道也通監唐憲宗文舞用功成慶善之樂武舞用神功破陳之樂同上唐高宗杜黃裳曰明主勞於求賢而逸於任人此虞舜所以能無為而治者也至於薄書獄訟煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳飱皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也唐憲宗並同上集家須男子繼國合大夫憂張承吉文集本朝元祐初起文潞公以平章軍國重事召程正叔為崇政殿說書正叔以師道自居每侍上講色甚莊繼以諷諫潞公時年九十對上恭甚進士唱名侍立終日或問正叔正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也聞見録經若網在綱有條而不紊書盤庚居敬行簡以臨其民語雍也故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道也孝經統之有宗會之有元故繁而不亂衆而不惑易略例夫衆不能治衆治衆者至寡者也夫動不能制動制天下之動者貞夫一者也自統而尋之物雖衆則知可以執一御也由本以觀之義雖博則知可以一名舉也處璇璣以觀天運則天地之動未足怪也據會要以觀方來則六合輻湊未足多也少者多之所貴也寡者衆之所宗也約以存博簡以濟衆並同上子守約而施博者善道也孟子總天下之要治海內之衆若使一人故操彌約而事彌大五寸之矩盡天下之方故君子不下堂而海內之情舉積諸此者則操術然也荀不苟欲觀千歲則審今日欲知億萬則審一二故曰以近知遠以一知萬以微知明荀非相舉其綱則衆目張若挈裘領順者不可勝數並荀子事欲鮮者執柄持術得要以應衆執約以治廣處靜持中運於璇樞以一合萬若合符者也淮南子主術訓十圍之木持千鈞之屋五寸之鍵以制開闔豈其材之巨小足哉所居要也淮南子天下為大治之在道四海為遠治之在心楊孝至苟得其要則八極之外如在指掌百代之遠有若同時不必在乎庭宇之左右瞻視之所及然後知之也抱朴子對俗篇舉一綱衆目張文中子史石稱丈量徑而寡失西漢枚乘傳互見事有簡徑探端以知緒前漢善為政者綱舉而目踈晉書劉頌傳聖王不遍窺望而視已明不殫傾耳而聽已聰通監漢宣紀執要而委務於下晉書集統於一而應於萬韓文聖人篤近而舉遠同上原人委群才會衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢慍焉畫宮於堵盈尺而曲盡其制計其毫釐而構其大廈無進退焉既成書于上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其遠邇細大可手據其圖而究焉猶梓人畫宮于堵而績于成也能者進而由之使無所德不能者退而休之亦莫敢慍不衒能不矜名不親小勞不侵衆官日與天下之英材討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傳周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣柳文梓人傳
