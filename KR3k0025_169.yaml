body:
  text: 評詩經詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故永歌之永歌之不足不知手之舞之足之蹈之也詩序正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義風賦比興雅頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之跡傷人倫之廢哀刑政之苛呤詠情性以風其上達於事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也詩大序詩三百一言以蔽之曰思無邪語為政子曰關睢樂而不哀而不傷語八份何晏注言其和也子曰詩可以興可以觀可以群可以怨邇之事父遠之事君多識於鳥獸草木之名語陽貨風雅之詩論功頌德剌過譏失二事耳詩疏子說詩者不以文害辭不以辭害志以意逆志是為得之孟子萬章詩者中聲之所止荀子止怒莫若詩注詩有流風之什管子詩以導志莊子李伯藥見子而論詩退謂薛收曰吾上陳應劉下述沈謝分四聲八病剛柔清濁各有端緒音若塤箎而夫子不應我其未達歟薛收曰吾聞夫子之論詩上明三綱下達五常證存亡辨得失故小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變文中子天地篇史國風好色而不淫小雅怨誹而不亂史記屈原傳詩三百大抵聖賢發憤之所作太史公傳大雅言王公大人而德逮黎庶小雅譏小己之得失其流及上漢書司馬相如謝元暉長五言詩沈約嘗言三百年無此詩也南史謝眺傳沈約郊居請王筠為草木十詠書之壁皆真寫文辭不加篇題約謂人曰此詩指物程形無假題書南史王筠傳王籍為人慕靈運至若耶溪詩云蟬噪林逾靜鳥鳴山更幽劉孺見之擊節不已南史王籍傳時沈約謝眺王融以氣類相推轂周顒善識聲韻約等文皆用宮商將平上去入四聲以此制韻有平頭上尾蜂腰鶴膝五字之中音韻悉異兩句之內角祉不同世稱為永明體南史陸倕傳好詩圓美流轉如彈丸南史能用彊韻南史王筠傳顏延之嘗問鮑照己與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼南史顏延之傳范雲婉轉清便如流風回雪丘遲點綴映媚似落花依草南史梁丘遲江總傷於浮艷南史本傳唐三百年言詩則杜甫李白卓然以所長為一世冠唐文藝傳序張說謫嶽州詩益悽惋人謂得江山助云唐書本傳杜甫又善陳時事律切精深至千言不少衰世號詩史唐書杜甫傳韓愈於文章慎許可至歌詩獨推曰李杜文章在光焰萬丈長唐杜甫贊互見心服唐興詩人承陳隋風流浮靡相競至宋之問沈佺期等研揣聲音浮切不差而號律詩競相沿襲逮開元間稍裁以雅正然恃華者質反好麗者壯違人得一概皆自名所長至甫渾涵汪洋千彙萬狀兼古人而有之它人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子美者唐書杜甫傳高適為詩工每一篇已好事者輒傳布唐書高適傳唐元稹詩與白居易名相埒號元和體唐書白傳白居易工詩雞林行賈售其國相率篇易一金唐書本贊杜牧謂白居易詩纖艷不逞非莊人雅士所為淫言嫌語入人肌骨不可去唐白居易贊白居易推劉禹錫為詩豪又言其詩在處有神物護持唐書劉禹錫傳魏建安後訖江左詩律屢變至沈約庾信以音韻相婉附屬對精密及宋之問沈佺期又加靡麗回忌聲病學者宗之號為沈宋唐書李適傳秦系與劉長卿以詩相贈答權德輿曰長卿自以為五言長城系用偏師攻之唐書秦系傳李益於詩尤長與宗人賀相埒每一篇成樂工爭以賂求取之被聲歌供奉天子至征人等篇天下皆施之圖繪新唐書本傳杜牧詩情致豪邁號為小杜以別杜甫唐書杜牧傳為歌詩情不忘君人憐其忠唐杜甫贊互入愛君上與宰相論詩之工拙鄭覃曰詩之工者無若三百篇皆國人作之以刺美時政王者采之以觀風俗耳後代辭人之詩華而不實無補於事陳後主隋煬帝皆工於詩不免亡國通監唐文宗紀傳記李頻詩曰只憑五字句用破一生心北夢瑣言薛能還劉仁德卷詩云百首如一首卷初如卷終譏其不能變態也同上集退傳有在鄒之作降將著河梁之篇四言五言區以別昭明太子文選序蕭愨有秋詩云芙蓉露下落楊柳月中疏其蕭散宛然在目何遜詩清巧多形似之言恨其每病苦辛饒貧寒氣不及劉孝綽之雍容也孝綽以謝眺詩置几案間動靜輒諷味簡文愛陶淵明文亦復如此顏氏家訓詩之興作兆基邃古唐歌虞詠始載典謨商頌周雅方陳金石其後妍志緣情二京斯甚含毫瀝思魏晉彌繁李都尉鴛鴦之詞纏綿巧妙班婕妤霜雪之句發越清回平子桂林理在文外伯喈翠鳥意盡行間河朔詞人王劉為稱首洛陽才子潘左為覺先若乃子建之牢籠群彥士衡之籍甚當時並文苑之羽儀詩人之龜鑑駱賓王文集為詩格高旨遠若在天上物外神仙會集雲行鶴駕想見飄然之狀李太白集清新庾開府俊逸鮑參軍杜詩遺我行旅詩軒軒有風神譬如黃金盤照耀荊璞珍韓文周詩三百篇麗雅理訓誥魯經聖人手議論安敢到五言出漢時蘇李首更號東都漸彌漫泒別百川導建安能者七卓犖變風操逶迤晉宋間氣象日凋耗中間數鮑謝比近最清奧齊梁及陳隋衆作等蟬噪國朝盛文章子昂始高蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫隩有窮者孟郊受材實雄驁冥觀洞古今象外逐幽好橫空盤硬語妥帖力排奡敷柔肆紆餘奮猛卷海潦韓薦士詩詩文齊六經同上古今詩歌自風騷之後蘇李李陵蘇武始作五言詩以還次及鮑謝徒迄于李杜輩詞人聞知者纍百詩章流傳者巨萬觀其所自多因讒冤譴逐征戍行旅凍餒病老存歿別離情發于中文形於外故憤憂怨傷之作通計今古什八九焉白傳集詩成錦繡文白侍郎元稹在翰林時穆宗前後索詩數百篇左右諷詠宮中呼為元才子自六宮兩都八方至南蠻東夷國皆寫傳之每一章一句出無脛而走疾於珠玉白傳集心之精微發而為文文之神妙詠而為詩猶夫孤桐朗玉自有天律劉賓客片言可以明百意坐馳可以役萬景工於詩者能之劉賓客子美上薄風雅下駭沈宋言奪蘇李氣吞曹劉掩顏謝之孤高離徐庾之流麗唐元稹杜甫墓銘詩訖于周離騷訖于楚是後詩人流為二十四名賦頌銘贊文誄針詩行詠吟題怨嘆章篇操引謠謳歌曲詞調自操而下八名皆是起於郊祭軍賓吉凶苦樂由詩而下九名皆屬事而作雖題號不同而悉謂之詩元稹集韓吏部歌詩纍百首其驅馬氣勢若掀雷決電撐抉於天地之垠司空圖題柳集後序王右丞韋蘇州澄淡精緻格在其中豈妨於道哉賈浪仙誠有警句視其全篇意思殊餒大抵附於寒澀方可致才亦為體之不備也司空圖詩家之景如藍山日暖良玉生煙可望而不可置於眉睫之前也象外之象景外之景豈容易可談哉然題記之作目擊可圖體勢自別不可廢也同上惠休稱謝永嘉如芙蓉出水鍾嶸謂范尚書如流風回雪權載之集少攻歌詩欲與造物者爭柄遇事輒變化不一其體裁始則陵轢波濤穿穴險固囚鎖怪異破碎陳敵卒造平淡而後已陸魯望文發揮造化之微鼓動江山之氣轥轢前古昭彰後葉唐文粹孟浩然匠心獨妙唐王士源孟浩然詩集序鑿天地心胸造生人聞見唐文粹歌詩久矣大抵喪于南朝壞于陳叔寶然今之業是者苟不能求工於建安即江左矣苟不能求麗於江左即南朝矣或遇為艷傷麗病者即南朝之罪人也吾唐來有是業者言出天地外思出鬼神表讀之則神馳八極測之則心懷四溟磊磊落落真非世間語者雕金篆玉牢奇籠怪百煆為字千鍊成句皮日休集李賀元和中韓吏部頗道其歌詩賀能探尋前事今古未嘗經道者賀未苑僕奴命騷可也杜牧之子美之詩可謂無聲無臭也方千文集漱滌萬物牢籠百態唐文粹春杼弄湘綺陽林敷玉英飄然飛動姿邈矣高簡情後輩驚失步前修敢爭衡才兼荊衡秀氣助瀟湘秋釋皎然讀張曲江詩曹植詩其原出於國風其骨氣高奇辭彩華茂情兼雅怨體備文質粲溢今古卓爾不群鐘嶸詩評漢班婕妤詩其源出於李陵團扇短章詞旨清婉得匹婦之致侏儒一節可以知其工矣孔氏之門如用詩則公幹升堂景陽潘陸可坐於廊廡間矣梁征遠詩品任昉動輒用事所以詩不得奇鍾嶸詩品潘安仁詩其源出於仲宣翰林歎其翩翩如翔禽之有羽毛衣帔之有綃縠謝鯤云潘詩爛如錦舒無處不佳陸文如披沙揀金往往得寶豫嘗言陸才如海潘才如江同前張茂先詩其源出於王粲其體華艷興託不奇巧用文字務為妍冶雖名高曩代而疏亮之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體爾同前郭景純詩憲章潘嶽文體相輝彪炳可玩始變中原平淡之體故稱中興第一翰林以為詩首但遊仙之作詞多慷慨垂遠玄宗而云奈何虎豹姿又云戢翼棲榛梗乃是坎壈詠懷非列仙之趣也同前陶彭澤詩其源出於應璩又協左思風力文體省靜殆無長語每觀其文想見其人至如歡言醉春酒日暮天無雲風華清靡豈直為田家語耶古今隱逸詩人之宗也同前小謝才思富捷恨其蘭玉早雕長轡未騁秋懷搗衣之作雖靈運鋭思何以加焉同前謝玄暉詩其源出於謝琨微傷細密一章之中自有玉石然奇章秀句足使叔源失步明遠變色晉宋之際殆無詩乎義熙中以謝益壽殷仲文為華綺之冠不競矣同前本朝梁沈約曰詩病有八一曰平頭第一第二字不得與第六第七字同聲如今日良宴會灌樂難具陳今灌皆平聲二曰上尾第五字不得與第十字同聲如青青河畔草鬱鬱園中柳皆上聲三曰蜂腰第二字不得與五字同聲如聞君愛我甘竊欲自修飾君甘皆平聲欲飾皆入聲四曰鶴膝第五字不得與第十五字同聲如客從遠方來遺我一書札上言長相思下言久離別來思皆平聲五曰大韻如聲鳴為韻上九字不得用驚傾平榮字六曰小韻除本韻一字處凡字中不得有兩字同韻如遙條不同句七曰旁紐八曰正紐十字內兩字雙聲為正紐若不共一紐而有雙聲為旁紐如流久為正紐流柳為旁紐八種惟上尾鶴膝最忌餘病亦皆通本朝李淑詩苑孫昱曰漢自韋孟李陵為四五言之首建安以曹劉為絶唱阮籍詠懷束晢補亡頗得其要永明文章散錯但類物色都乏興寄晚有詞人爭立別體以難解為幽致以難字為新奇攻乎異端斯亦太過李淑詩苑白樂天諷諭之詩長於激間適之詩長於遣感傷之詩長於切律詩百言以上長於贍五字七字百言以下長於情同前古人詩有風定花猶落王荊公以對鳥鳴山更幽本宋王籍詩對蟬噪林逾靜上下句只是一意風定花猶落鳥鳴山更幽則上句靜中有動下句動中有靜沈括存中述筆談吾觀少陵詩謂與元氣侔力能排天斡九地壯顏毅色不可求臨川集觀彭澤詩初若散緩不收反復不已乃識其奇趣東坡集釋皎然曰詩有四不四深二要二廢四離六迷七至七德四不謂氣高而不怒力徑而不犯情多而不暗才贍而不疏四深謂氣象氳氛深於體勢意度盤薄深於作用用律不滯深於聲對用事不直深於義類二要謂要力全而不苦澀要氣足而不怒張二廢謂雖欲廢巧尚直而神思不得直雖欲廢言尚意而典麗不得遺四離謂欲道情而離深僻欲經史而離書生欲高逸而離闊遠欲飛動而離輕浮六迷謂以虛大為高古以緩慢為淡佇以詭差為新奇以錯用意為獨善以爛熟為隱約以氣劣弱為容易七至謂至險而不僻至奇而不差至苦而無跡至近而意遠至放而不迂至難而狀易至麗而自然七德謂識理高古典麗風流精神質幹體裁詩有三偷偷語最是鈍賊如傳長日月光太清陳後主日月光天德是也偷意事雖可罔情不可原如柳渾太液微波起長楊高樹秋沈佺期小池殘暑退高樹早涼歸是也偷勢才巧意精各無朕跡蓋詩人偷狐白裘手也如嵇康目送歸鴻手揮五絃王昌齡手攜雙鯉魚目送千里鴈是也李淑詩苑類格唐上官儀曰詩有六對一曰正名對天地日月是也二曰同類對花葉草芽是也三曰連珠對蕭蕭赫赫是也四曰雙聲對黃槐緑柳是也五曰疊韻對倣徨放曠是也六曰雙擬對春樹秋池是也又曰詩有八對一曰的名對送酒東南去迎琴西北來是也二曰異類對風織池間樹蟲穿葉上文是也三曰雙聲對秋露香佳菊春風馥麗蘭是也四曰疊韻對放蕩千般意遷延一介心是也五曰聯綿對殘河若帶初月如眉是也六曰雙擬對議月眉欺月論花頰勝花是也七曰回文對情新因意得意得逐情新是也八曰隔句對相思復相憶夜夜淚沾衣空歎復空泣朝朝君未歸是也同前王荊公以李太白杜子美韓退之歐陽永叔詩編為四家集以歐公居太白之上公曰太白詞語迅快然十句九句言婦人酒耳冷齊夜話詩者不可言語求而得必將深觀其意焉故其譏刺是人也不言其所為之惡而言其爵位之尊車服之美而民疾之以見其不堪也君子偕老副笄六珈赫赫師尹民具爾瞻是也其頌美是人也不言其所為之善而言其容貌之盛冠佩之華而民安之以見其無愧也緇衣之宜兮敝豫又改為弓服其命服朱蒂斯皇是也東坡集詩欲其好則不能好矣王介甫以工蘇子瞻以新黃魯直以奇而杜子美詩奇常工易新陳莫不好也陳後山集鮑照詩華而不弱陶潛詩切於事情但不文耳同前杜之詩法韓之文法也詩文各有體韓以文為詩杜以詩為文故不工耳蘇子瞻曰子美之詩退之之文魯公之書皆集大成者也學詩當以子羹為師有規矩故可學退之於詩本無解處以才高而好耳淵明之為詩寫其胸中之妙工學杜不成不失為工無韓之才與陶之妙而學其詩終為樂天耳陳後山詩話學老杜詩所謂刻鵠不成尚類鶩也學晚唐諸人詩所謂作法於涼其弊猶貪作法於貪敝將若何黃魯與趙伯充書李白歌詩度越六代與漢魏樂府爭衡黃魯直元祐初與秦少游張文潛論詩二公初謂不然久之東坡先生以為一代之詩當推魯直二公遂捨舊而圖新其初改轅易轍如枯絃敝軫雖成聲而跌宕不滿人耳少焉遂使師曠忘味鐘期改容也同前詩以聲律為竅物象為骨意格為髓梅堯臣公詩周魯後後山晚唐詩多小巧無風騷氣味詩話總龜詩人之作也窮通之分可觀王建詩寒碎故仕終不顯李洞詩窮悴故竟不第韋莊詩壯故至台輔何瓚詩愁未幾而卒同前唐末之詩近於鄙俚墨客揮犀謝眺嘗語沈約曰好詩圓美流轉蓋謂詩貴圓熟也余以為圓熟多失之平易老硬多失之乾枯詩話總龜學詩如學仙時至骨自換同前山谷云詩意無窮人才有限以有限之才追無窮之意雖少陵淵明不得工也然不易其意而造其語謂之換骨法規模其意而形容之謂之奪胎法同前曾子固曰詩當使人一覽語盡而意有餘同前孟郊死葬北邙山日月風雲頓覺間天恐文章聲斷絶故留賈島在人間同前錢惟演劉筠首變詩格同前聖俞子美齊名於當時而二家詩體特異子美筆力豪傑以超邁橫絶為奇聖俞覃思精微以深遠間淡為意各極其長雖善論者不能優劣余水谷夜行詩略道其一二云子美氣方雄萬竅號一噫有時肆顛狂醉墨灑滂沛譬如千里馬已發不可殺盈前盡珠璣一一難揀汰梅公事清淺石齒漱寒瀨作詩三十年視我猶後輩文詞愈清新心意雖老大有如妖饒女老自有餘態近詩尤苦硬咀嚼若難嘬又如食橄欖真味久愈在蘇豪以氣轢舉世徒驚駭梅窮獨我知古貨今難賣語雖非工謂粗得髣佛然不能優劣同上白樂天詩曰無事日月長不羈天地闊此達者之詞也孟東野詩曰出門即有礙誰謂天地寬此褊狹者之詞也青箱雜記互入所見不同史賈島為詩苦吟值公卿不覺新唐書韓愈傳李賀未始立題然後為詩如他人牽合程課者每旦出小奚奴背古錦囊遇所得書投囊中及暮歸足成之新唐書本傳傳記賀知章乘醉賦詩問左右紙多少紙盡思窮博異志賈島一日驢上吟得鳥宿池中樹僧敲月下門初欲著推字又欲著敲字鍊之未定遂於驢上作推敲勢不覺行半坊觀者訝之時韓公權京尹意思清嚴威振紫陌經第三隊呵唱島猶手勢未已俄為官者推下驢擁至馬前島方覺悟顧問欲責之島具對偶得一聯吟安一字未定神遊詩府致衝大官公立馬良久思之謂島曰作敲字佳矣遂與島同入府署後為僧改名無本鑑戒録寶曆中楊相嗣復具慶下繼放兩榜時先僕射自洛入覲嗣復率生徒迎於潼關既回大宴新昌里第諸生翼坐元白俱在賦詩唯楊汝士詩後成最佳元白嘆服醉歸曰我今日壓倒元白其詩警句云文章蒨價留鸞掖桃李新陰在鯉庭托言唐人燕集必賦詩推一人擅場郭曖尚升平公主盛集李端擅場送劉相巡江淮錢起擅場李肇國史張逈少夢五色雲自天而下取一團吞之遂精於詩有寄遠云錦字憑誰達間庭草又枯夜長燈影滅天遠鴈聲孤蟬鬢雕將盡虯髭白也無幾回愁不語因看朔方圖僧齊己改為虯髭黑在無逈遂拜為一字師南唐野史元白酬和千篇元守淅東白牧蘇臺置驛詩筒有云有月多同賞無杯不共持其句暗合處唐潘遠紀聞談集示我百篇文詩家一標準杜詩新詩錦不如杜詩春興不知凡幾首衡陽紙價頓能高詩成覺有神詩卷長留天地間為人性僻貪佳句語不驚人死不休苦思緣詩瘦思飄雲物外律中鬼神驚光祿最能詩賦詩賓客間揮灑動八垠乃知蓋代手才力老益神最傳佳句寰區滿並係杜詩興酣落筆搖五嶽詩成嘯傲凌滄洲李太白集詩成鏘若金和絲白侍郎秋冷切骨玉聲寒剪截五言兼用鋮陶鈞六義別開爐詩鋒森然少有敢當者詩到元和體變新並白侍詩纖新撩造化須洞斡陶甄元微之集開坼新詩展大璆明珠炫轉玉香浮元微之集搜天斡地覓詩情詩新灌王壺牛童馬走能吟元白之詩元稹白集序橫空盤硬語妥帖力排夏韓文雕琢愁肝腎險語破鬼膽高詞媲皇墳韓文金石出聲音宮商發關鍵韓文腸胃繞萬象精神驅五兵韓文及其為詩劌目璽心物迎鏤解鉤章棘句掐擢胃腎神施鬼設聞見層出惟其大玩於詞而與世採掇人皆劫劫我獨有餘韓文貞曜先生墓銘勢吞萬象高秀奪五嶽雄孟東野吟哦無滓韻言語多古腸孟東野新語發宮祉孟浩然詩思清人骨韋應物左攬工部袂右拍翰林肩杜荀鶴集江南煙翠多在句中李義山文麗不葩芬苦不癯棘方雄飛文一日不作詩心源如廢井筆硯為轆轤吟詠作縻綆朝來重汲引依舊得清冷賈浪仙君詩多態度藹藹春空雲韓文詩句遍傳天下口張文昌詠傷松桂青山瘦取盡珠璣碧海愁王建集孤情逈出鸞鳳遠健思潛搜海嶽空王健集自從東野先生死側近雲山得散行同前吟損秋天月不明同前曹劉須至指揮中杜牧之古風無敵手杜牧之欲識為詩苦秋霜若在心同上詩冷語多尖同前命代風騷將誰登李杜壇少陵鯨海動翰苑鶴天寒同前乾坤有清氣散入詩人脾唐文粹撐腸裂月協作者之肝脾司空圖與王賀評詩書逸歌長句駿發蹈厲穿天心出月脅意外驚人語皇甫湜本朝有病瘧者杜子美曰誦吾詩可治乃令誦手提髑髏血模糊疾果愈古今詩話霜寒入毛骨清響哀愈長歐公集空腸出秀句吟嚼五味足坡詩先生筆力吾所畏蹙踏謝鮑跨徐瘐偶然談笑得佳篇便恐流傳成樂府坡詩詩句明朝萬口傳同前新詩嚼雪風坡詩嶮語壓衰翁同上李長吉歌云天若有情天亦老石曼卿對月如無恨月長圓歐公詩詩人雕刻間草木搜抉肝腎神應哭坡詩好語仍破的坡詩公詩句句有絃歌同上苦語涼肝肺同上清詩要淘煉乃得鉛中銀同前脫手新詩萬口傳後山句裏江山隨指顧後山清警殊非俗腑腸僧參寥子白樂天每作詩令老嫗解之問曰解否嫗曰解則録之不解又易之故唐未之詩近於鄙俚也墨客揮犀王仁裕著詩萬首謂之詩窖子亦曰千篇集前進士高若訥後史補鄭谷在袁州齊己攜詩詣之有早梅詩云前村深雪裏昨夜數枝開谷曰數枝非早也未若一枝齊己不覺下拜自是士林以谷為一字師陶嶽五代補世間好句世人共東坡
