body:
  text: 酷虐經夫子曰苛政猛於虎記檀弓子無惻隱之心非仁也孟子史王溫舒為河內守捕郡中豪猾相連坐千餘家大者族小者死流血十餘里會春溫舒頓足嘆曰令冬月益展一月足吾事矣其好殺伐行威不愛人如此史本傳尹齊斬伐不避貴戚政聲甚於寧成史本傳姦猾窮治大抵盡糜爛獄中行論無出者史酷吏楊僕傳法令滋章盜賊多有諸侯二千石盡放溫舒吏民益輕犯法盜賊滋起史記郅都嚴酷貴戚號曰蒼鷹為濟南守族滅𣊺氏史本傳杜周為廷尉詔獄多二千石繫者新故相因不減百餘人史本傳韓非喜刑名極慘礉少恩史記張湯見知之法生窮治之獄用史平準書自郅都杜周十人者皆以酷烈為聲王溫舒為人居廷惛惛不辨至於中尉則心開並史法煩於秋荼網密於凝脂西漢刑法志舞文巧詆以輔法前漢張湯傳杜周內深剌骨前漢本傳駟鈞惡戾虎而冠者也西漢高五王傳獄吏專為深刻殘賊而亡極偷為一切不顧國患此世之大賊也西漢路溫舒傳嚴延年在河南號曰屠伯西漢本傳寧成為關都尉出入關者曰寧見乳虎無值寧成之怒義縱傳搖手觸禁前漢食貸志下以鷹擊毛摯為治為河內都尉族滅其豪穰氏義縱傳尹賞為長安令獄穿地方深各數丈以瓴甓為郭大石覆之名虎穴西漢罔密事叢西漢酷吏傳析律二端深淺不平西漢宣帝紀師古曰分破律條妄生端緒以出入人罪持法文深西漢趙禹傳注文致不可得反西漢嚴延年傳奇請他比日以滋益西漢刑法志師古曰常文之外主者別有所請以定罪也謂引它類以比附之吏民觸法抵禁西漢康衡傳多繫無辜掠立迫恐谷永傳諸犯令相引數千人名曰株送剌爇身無全者西漢張耳傳榜音彭箠慘於炮烙谷永傳寧戚為人上操下急如束溼西漢本傳骨肉親屬莫不股栗杜周傳樊曄為政嚴猛人有犯其禁者率不生出獄涼州歌曰寧見乳虎穴不入冀府寺嗟我樊府君安可再遭值後漢煆鍊之吏持心近薄東漢韋彪傳斷獄者急於榜格酷烈之痛執憲者煩於詆欺行濫之文或因公行私逞恣威福通鑑漢章帝迹涉嫌疑辭相引逮莫不窮捕考案至有姦人熒惑乘險相誣紏告疑似睚眥之嫌即稱有密一人被訟百人滿獄使殺人如麻流血成淵通鑑唐武后王弘義遷殿中侍御史或告勝州都督王安仁謀反敕弘義按之安仁不服弘義即於枷上刎其首又捕其子適至亦刎其首函之以歸道過汾州司馬毛公與之對食須臾叱毛公下階斬之槍揭其首入洛見者無不震栗時制置獄於麗景門內入是獄者非死不出通鑑唐武后周興與索元禮來俊臣競為暴刻興元禮所殺各數千人俊臣所破千餘家元禮殘酷尤甚同上索元禮等競為訊囚酷法作大枷有定百脈突地吼死豬愁求破家反是實等名號或以椽關手足而轉之謂之鳳凰曬翅或以物絆其腰引枷向前謂之驢駒拔橛或使跪棒枷纍甓其上謂之仙人獻果或使立高木之上引枷尾向後謂之玉女登梯或倒縣石縋其首或以醋灌鼻或以鐵圈轂其首而加楔至腦裂髓出者每得囚輒先陳其械具以示之皆戰憟流汗望風自誣通鑑唐武后太白晝見民有仰視之者為邏卒所執史弘肇腰斬之通鑑漢隱帝燕榮為幽州總管按部道次見藂荊堪為笞捶命取之輒以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過將撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾況有過乎榜捶如舊隋書索元禮來俊臣之徒澤吻磨牙噬紳纓若狗彘泥耳籠首枷楔兼暴拉脅截爪懸髮熏目號曰獄持晝禁食夜禁寐敲撲撼搖使不得寐號曰宿囚制獄作鐵籠𩏜囚首加以楔至腦裂死又橫木關手足轉之號曬翅或縳囚梁上縋石於頭唐本傳來俊臣前後夷千餘族生平有纖介皆入於死按事百不一貸鞠囚不問輕重皆注醯于鼻掘地為牢或寢以匽溺或絶其糧大抵非死終不得出唐本傳周與曰囚不服納之大甕熾炭周之何事不承唐本傳王弘義曰我文檄如狼毒野葛始賤時求傍舍瓜不與乃騰言園有白兔縣為集衆捕逐畦瓜無遺內史李昭德曰昔聞蒼鷹獄吏今見白兔御史唐書李嵩王旭李全交皆酷京師號三豹唐書王旭傳宋越御衆嚴酷好行刑誅睚眥之間動用軍法宋書寧飲三斗醋不見崔弘度寧炙三年艾不見屈突蓋北史魏崔弘度傳羊祉天性酷忍所經之處人號天狗唐書以深刻為奉公唐高季倫傳傳記刻深寡恩戰國策秦衛鞅內刻刀鋸之刑外深斧鉞之誅步過六尺者有罰棄灰於道者被刑一日臨渭水而論囚七百餘人渭水盡赤號哭之聲動於天地新序集傷秋荼之密網惻夏日之嚴霜肺石少不冤之民棘林多夜哭之鬼文選王元長策秀才文抉瑕剌骨文粹本朝酷吏所至號鬼車坡詩經蔽芾甘棠勿剪勿伐召伯所苃詩甘棠史士鞅曰武子之德在民如周人之思召公焉左襄十四仲尼曰子産古之遺愛也左昭二十年鄭子産死鄭人丈夫舍玦佩婦人舍珠珥夫婦巷哭三月不聞竽琴之聲説苑趙良曰五羖大夫死秦國童子不歌謠舂者不相杵史商鞅傳桓公友封鄭河洛之間人便思之史鄭世家欒布為燕相燕齊之間皆為立社號曰欒公社漢郊祀志朱邑病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民及死其子葬之桐鄉民歲時祠祭不絶西漢本傳何武為兗州剌史徙京兆尹所居無赫赫名去後常見思西漢劉陶駼除順陽長病免吏民思而歌之曰邑然不樂思我劉君騊駼何時復來安此下民後漢書秦彭為開陽城門候拜穎川太守老弱攀車啼號填道東觀漢記鄧訓遷烏柏校尉卒官吏民羌胡愛惜旦夕臨者數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不號咷或以刀自割又剌殺其犬馬牛羊曰鄧使君巳死我曹亦俱死耳後漢范曄郭伋王莽時為并州牧建武中復為牧伋前在并州素結恩德及後入界有童兒數百各騎竹馬於道次迎拜伋問兒曹何自遠來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還後漢种皓為度遼將軍薨并涼人咸為發哀單于每入朝賀望見墳墓輒哭泣祭祀後漢趙廣漢疑丞相夫人殺侍婢乃將吏卒入丞相府召其夫人跪庭下受辭收奴婢十餘人去帝下廣漢廷尉獄吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使牧養小民通鑑漢宣紀雒陽令廣漢王渙凡所平斷人莫不悅服京師以為有神是歲卒官百姓市道莫不咨嗟流涕喪西歸道經弘農民庶皆設槃按於道路吏問其故咸言平常持米到洛陽為吏卒所鈔常亡其半自王君在事不見侵枉故來報恩雒陽民為立祠作詩每祭輒絃歌而薦之通鑑漢和紀蜀人所在求為諸葛亮立廟漢王不聽百姓遂因時私祭之於道陌上通鑑魏明紀狄仁傑為魏州剌史有惠政百姓為之立生祠後其子景暉為魏州司功參軍貪暴為患人遂毀其像焉通鑑唐中宗劉審交卒吏民詣闕上書以審交有仁政乞留葬汝州得奉事其丘壟詔許之州人相與就哭而葬之為立祠歲時享之通鑑後漢隱諸葛瞻亮之子亮卒蜀人思亮之德咸愛瞻才敏有善政佳事雖非瞻所建皆相告曰葛侯所為也是以美譽過實蜀志羊祜為荊州剌史祜薨立碑峴山百姓見其碑莫不墮淚號為墮淚碑祖逖病卒豫州士女若喪考妣淮梁百姓為之立祠晉書羊祜卒南州人為之罷市巷哭者聲相接晉書王駿都督涼州後薨民吏樹碑讚述德美長老見碑無不拜之言其遺愛如此晉書羊祜卒參佐劉繪箋杜預曰昔召伯所憩愛留甘棠宣子所遊封殖其樹夫思其人尚及其樹況生存所辟之士便當隨例放棄者乎晉書本傳賈敦頤為洛州剌史有惠政百姓植碑頌美及敦美為洛州長史又立頌於兄碑之側號棠棣碑唐書本傳互見兄弟韓愈貶陽山令有愛在民民生子多以姓字之唐書本傳傳記姚元崇牧荊州三年受代日闔境民吏泣擁馬首遮道不使去所乘之馬鞭𩍐民皆截留之天寶遺事集桐鄉建遺烈選詩攀車臥轍之戀爭塗忘遠去思一借之情愈久彌結齊故安陸碑永思清風歎息仁光陳子昂集勿剪棠猶在劉叉文集嘗為縣縣懷其化至于州州濡其澤凡我子孫莫不戴慕柳文蒞止五載飲和革心束馬來朝熊羆隕涕問公還期觸必祝之劉賓客汴人聞公之東近而愈懷翹翹瞿瞿盡西其首同上但愁徵拜日無那借留何劉長卿況茲樂土嘗扇仁風式訪顛毛兼詢憩樹吏盡攀轅之士民皆遮道之人棉以歲時深在肌骨李義山文夢寐仁風花樹前元稹集戎夷野祠氓庶巷祭尚馳作諸葛武侯碑稚老歌思如丹尚存杜牧之韋丹碑本朝韓魏公所歷諸大鎮皆有遺愛人人畫像事之獨魏人於生祠為塑像歲時瞻莫比狄梁公三朝言行録溫公薨京師之民罷市而往弔鬻衣以致奠巷哭以過車者蓋以千萬數神道碑經怨有同是叢于厥身書無逸召敵讎不怠書微子斂怨以為德詩蕩子怨者禍之原也禍之所生必由積怨積怨之成在於慮外防怨不密而禍害臻焉劉子謹隟史華而不實怨之所聚也左文五年怨之所聚亂之本也多怨而階亂何以在位左成十六朝錯父謂錯曰口語多怨公何為也通監漢文紀傳記蓄怨積讎比於丘山新序集間園不解栽桃李滿地惟聞種蒺藜白侍郎互見胎禍禍胎怨府起自十商李商隱經剝床以膚凶易剝卦互見積漸門碩鼠剌重斂也蠶食於民貪而畏人若大鼠也詩擇三有事亶侯多藏詩十月之交箋云皆聚斂之臣小東大東杼柚其空詩幽小雅大東孟獻子曰與其有聚斂之臣寧有盜臣記大學長國家而務財用者必自小人矣同上季氏富於周公而求也為之聚斂而附益之論語互見以水濟水子我能為君辟土地充府庫今之所謂良臣古之所謂民賊也孟子聚斂者召寇肥敵亡國危身之道也荀王制史斬刈民力輸掠其聚左昭二十年頭會箕斂史陳餘傳陸驗徐驎為大市令並以苛刻為務百賈畏之朱異尤與之昵世謂之三蠹南史朱屏傳旁緣苛禁侵刻小民富者不得自保貧者無以自存西漢食貨志賦斂以趣辦西漢薛宣傳言利事析秋毫西漢食貨志熬天下之脂膏斫生人之骨髓東漢王符傳鹽鐵使王播自掌鹽鐵正入不充而羡進相次侵求聚斂迫於星火唐敬宗實録聚斂之臣剝下媚上惟思竭澤不慮無魚通監唐穆宗集刻剝及錐刀杜詩財已竭而斂不休人已窮而賦愈急韓文送許郢州序剝膚椎髓公私掃地赤立新舊不相保持韓文孰知賦斂之毒有甚是蛇者乎柳文捕蛇者説史豪強慹之涉反服之漢朱漙傳又陳咸傳動搖山嶽震懾州縣西漢張良傳豪強脅息嚴延年傳奮髯抵几西漢朱博傳貴遊懾伏臺閣生風晉傅元傳權戚縮氣唐魏謨傳互見敬畏屈突通蒞官徑正有犯法者雖親無所回縱其弟蓋為長安令亦以方嚴顯時為語曰寧食三斗艾不見屈突蓋寧食三斗蔥不逢屈突通新唐書本傳上御五鳳樓酺宴觀者喧隘樂不得奏金吾白挺如雨不能遏上患之高力士奏河南丞嚴安之為理嚴為人所畏請使止之上從之安之以手板繞場畫地曰犯此者死於是盡三日人指其畫以相戒無敢犯者通監唐元宗李巽精於督察吏人居千里之外戰栗如在巽前通監唐憲宗左神策軍吏李昱貸長安富人錢八千緡滿三歲不償京兆尹許孟容收捕械繫立期使償曰期滿不足當死一軍大驚中尉訴于上上遣中使宣旨送本軍孟容不之遣中使再至孟容曰臣不奉詔當死然臣為陛下尹京畿非抑制豪強何以肅清輦下錢未畢償昱不可得上嘉其剛直而許之京城震栗通監唐憲宗山陵為之震動川谷為之蕩波司馬長卿上林賦無假里端之籍而惡子咸誅選碑野無遺寇選銘老姦宿贓消縮摧沮魂亡魄喪影滅迹絶韓文上李尚書當街一叱百吏走馮敬胸中函匕首凶徒側耳潛愜心悍臣破膽皆杜口柳詩擁傳從北來飛霜日千里黠吏斂手劉賓客繡衣柱吏何昂藏鐵冠白筆橫秋霜李太白集四面風動一道地裂文粹本朝奮髯走猾吏嚼齒對姦將坡詩
