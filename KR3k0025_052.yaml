body:
  text: 奔競經高門懸薄無不走也莊達生史宋公子鮑無日不數於六卿之門左文十六年鄒陽曰何王之門不可曳長裾乎西漢本傳王氏方盛賓客滿門五侯各有所厚不得左右唯樓護盡得其歡心前漢互入交結張湯造請諸公不避寒暑鄭當時為太子舍人每五日洗沭常置驛馬長安諸郊請謝賓客夜以繼日至明旦常恐不遍西漢本傳持苞苴而請謁效鷹犬以飛馳奔走權門唐元宗贊唐順宗永貞元年王叔文王伾等任事十餘家之門車馬如市客候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之通監二百二十六互入無恥集抗塵容而走俗狀北山移文朝集金張館暮宿許史廬左太沖詠史詩悠悠風塵皆奔競之士于令升晉紀總論望影星奔藉響川騖雞人始唱鶴蓋成陰高門旦開流水接軫文選劉孝標絶交論出沒風塵之內漂淪名利之間駱賓王朝扣富兒門暮隨肥馬塵出入朱門家杜詩三百六旬長擾擾不衝風雨即塵埃韓文惟名利之都府兮羌衆人之所馳競乘時而射利兮紛變化其難推韓文復志賦蠅營狗苟韓文伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅處汙穢而不羞觸刑辟而誅戮韓文李願序縱談作者之筵曳裾名卿之門抵掌峨辨厚自潤澤進越無恧柳文僧臨大道閲浮生來往憧憧利與名二十八年何限客不曾間見一人行元微之集互入識者所窺抗喉舌胝拇以干東諸侯劉賓客客路如天遠侯門似海深杜荀鶴集觸熱到人家唐陳曉伏日詩到處公卿席無辭酒盞深白樂天互入無恥匣有青萍笥有書何門不可曳長裾呂和叔本朝皇皇走聲利與日爭寸晷歐公集梁何思澄終日造謁每宿昔作名紙一束曉便命駕朝賢無不悉狎所在命食續世說經君子獨立不懼易大過君子以立不易方易常卦不易乎世不成乎名易乾卦不為世俗所移易儒有澡身而浴德世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者記儒行史原憲閭巷讀書懷獨行君子之德義史記游俠傳序絶世而獨立西漢李夫人傳蕭察不好色惡見婦人相去數丈猶聞其臭梁書陽城年長不肯娶謂弟曰吾與若孤惸相育既娶則間外姓雖共處而益疏我不忍弟義之亦不娶遂終身唐書本傳集鷙鳥不群楚辭懷質抱清獨無匹兮金相玉質百歲無匹同上清風激萬代名與天壤俱張景陽詠史詩砥節礪行郭有道碑元大夫生六十餘年而卒未嘗識婦人而視錦繡元次山序士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而已矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亙萬世而不顧者也昭乎日月不足為明崒乎太山不足為高巍乎天地不足為容也韓文伯夷頌子同乎流俗合乎汙世孟盡心下史與世同塵隨波瀾而俱逝北史隱逸序經不役耳目百度惟貞書旅獒儉於位而寡於欲記表記君子之道淡而不厭記中庸子含哺而熙乎淡泊郭莊子序形如槁木心如死灰莊齊物論虛靜恬淡寂寞無為莊天道不與物交淡之至也莊天運史不流世俗不爭勢利上下無所凝滯人莫之害史記太史公滑稽傳序寡欲易足前漢景帝紀廉靜樂道不交接世俗西漢劉向傳清靜無為少嗜欲不汲汲於富貴不戚戚於貧賤西漢揚雄傳攻苦食啖啖當作淡西漢叔孫通傳陶潛間靜少言不慕榮利晉書本傳晉簡文帝性沖淡所居凝塵滿席湛如也晉書宅心事外晉書樂廣傳王導簡素寡欲晉書到溉虛室單床旁無姬侍梁書淡於榮利北史韋瓊傳楊綰性沈靜獨處一室左右圖書凝塵滿席淡如也楊綰清談終日而不及榮利唐書傳記王恭曰恭作人無長物世說上集淡泊為德司馬相如子虛賦慮淡物自輕謝靈運湖中作吾子洗然恬淡自逸潘安仁贈陸機與世無營神氣晏和嵇叔夜幽憤詩林園無世情陶淵明塗口詩輕祿傲世與物無營文選七啓曠然無憂患寂然無思慮嵇叔夜養生論清虛靜泰少私寡欲憎愛不棲於情憂喜不留於意並同上養心淡然不染物纍清節素履並陳子昂惟將淡若水長揖古人風駱賓王吾老世味薄韓文互入晚境門庭畏客頻骨清慮不喧並杜大道本夷曠高情亦沖虛孟東野其如心似不然灰劉賓客面上滅除憂喜色胸中銷盡是非心水能性淡為吾友竹解心虛是我師身靜其身延壽命無求於物長精神五欲已銷諸念息世間無境可勾牽每因齊戒斷葷腥漸覺塵勞染愛輕六賊定知無氣色三尸應恨少恩情互入省悟彼此假名非本物其間何怨亦何恩並白侍郎詩慣無身外事不信世間愁姚少監楚雲淡無心劉長卿其為心必泊然無所起其於世必淡然無所嗜韓文一身已無纍萬事更何欲劉賓客高情雅淡世間希劉長卿深與世情薄委身在丘壑同上以虛舟應物世纍不能干其神惡千金之藏鄙十卿之祿治家無珍産奉身無長物並文粹逢人不說人間事便是人間無事人杜荀鶴不是眼前無俗事不關心事不經心元微之集本朝淡泊味愈長歐詩道味自飴世芬莫嗅東坡祭柳子玉趙清獻公初知成都攜一龜一鶴以行其再任也屏去龜鶴止一蒼頭執事呂氏家孰記遊神清淨之庭守德寂寞之宅東坡外制為嫌歸舍兒童聒故就僧房借榻眠臨川集冷淡為歡意自長東坡詩棊中機械不願看琴裏語言時喜聽邵堯夫平生輕長物身世等鴻毛僧參寥子平生寓物不留物坡詩經飲酒濡首亦不知節也易未濟惟慢遊是好罔晝夜額額書益稷盤遊無度書五子之歌羲和湎淫廢時亂日書胤征沈湎冒色書泰誓玩物喪志書旅獒恆舞於宮酣歌于室殉于貨色恆于遊畋書伊訓內作色茺外作禽茺甘酒嗜音峻宇雕墻有一子此未或不亡書五子之歌惟耽樂之從酗于酒德書無逸士之耽兮猶可說也女之耽兮不可說也詩氓或號或呼俾晝作夜詩蕩流湎以忘本記樂記子從流上而忘反謂之流從流下而忘反謂之連從獸無厭謂之茺樂酒無厭謂之亡孟梁惠王下嗜欲深者天機淺莊鄭公孫穆後庭比房數十皆擇稚齒婑媠者以盈之方其耽於色也屏親昵絶交遊逃於後庭以晝足夜三月一出意猶未愜列欲盡一生之歡窮當年之樂唯患腹液而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也列楊朱酒食聲色之中暪暪然瞑瞑然荀善遊者溺善騎者墮各以其所好反自為禍是故好事者未嘗不中傷也淮南史君多內寵左威十一年鄭伯有嗜酒為窟室而夜飲酒左襄三十年齊惠欒高氏皆嗜酒信內多怨左昭十年說婦人言故多怨尤物足以移人左昭二十七年楚夫人鄭袖所言皆從史記張儀傳娛耳目而樂心意麗靡爛熳於前靡曼美色於後史記司馬相如傳莊王左抱鄭姬右抱越女坐鐘鼓之間史記楚世家商紂好酒淫樂嬖於妲己妲己之言是從史記殷本紀中山王勝為人樂酒好內有子百二十餘本傳後房婦女以百數西漢田蚡傳張敞為京兆尹為婦畫眉長安中傳張京兆眉嫵西漢本傳寧不知傾城與傾國佳人一失難再得前漢外戚傳後堂理絲竹西漢張禹傳前堂羅鐘鼓西漢田蚡傳謝安愛好聲律晉書王垣之傳孟嘉好酣飲愈多不亂亙溫問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳晉書本傳謝安雖放情丘壑然每遊賞必以妓女從同上山簡每至高陽習家池飲酒大醉而歸劉伯倫銜杯漱醪無思無慮其樂陶陶晉書齊東昏侯寵潘貴妃乃於殿中鑿金為蓮以貼地令潘姬行其上曰此步步生蓮花通監李元忠雖處要任不以物務干懷唯飲酒自娛丞相歡欲用為僕射世子澄言其放達常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒通監梁武紀置左右教坊以教俗樂樂工數百人自教法曲於梨園謂之皇帝梨園弟子通監唐元宗傳記鴻臚孔群好飲酒王丞相語云卿恆飲酒不見酒家覆瓶布日月久則糜爛群曰公不見糟中肉乃更堪久世說王孝伯問王大阮籍何如司馬相如王大曰阮籍胸中壘隗故須澆之王大嘆曰三日不飲酒覺形神不復相親王孝伯云名士不須奇才但使常得無事痛飲酒讀離騷便可稱名士也同上文君眉色不加黛飾臉若芙蓉長卿素有消渴疾作美人賦自刺卒以此疾死西漢雜記互入明知故犯上又起明光宮發燕趙美女三千人充之建章未央長樂三宮輦道相續使三婦人知書者為僕射大者領四百人小者領一二百人與上同輦者十六人皆自然美麗不施粉黛上能三日不食不能一日無婦人漢武帝故事集茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲杜詩不解文字飲惟能醉紅裙韓文艷姬踏筵舞清眸刺劍戟同上蓋覆西施鳳花錦身作匡床臂為枕唐文粹花鬚柳眼各無賴紫燕黃蜂俱有情李義山集五斗解酲猶恨少十分飛盞未嫌多元微之集極口腹之欲窮芻豢之味白樂天物有纍而心不間唐文粹本朝聲色相纏心已醉東坡詩
