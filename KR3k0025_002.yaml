body:
  text: 履而後知經學然後知不足教然後知困禮學記知為人子然後可以為人父知事人然後能使人記文王世子子不臨深淵何以知沒溺之患不觀巨海何以知風波之患家語困誓不登高山不知天之高不臨深溪不知地之厚不聞先王之遺言不知學問之為大荀勸學震風凌雨然後知廈屋之為帡幪也虐政虐世然後知聖人之為郛郭也楊吾子文中子曰久久臨事當自知之文中史齊高彊曰三折肱知為良醫左定十三年互入因事長智周勃下廷尉吏稍侵辱之勃以千金與獄吏吏乃書背牘示之勃既出曰吾嘗將百萬軍然安知獄吏之貴乎史記世家互入失勢百聞不如一見臣願馳至金城圖上方略西漢趙充國傳畫地為牢勢不可入削木為吏議不可對西漢司馬遷傳嘗肉一臠識鑊中之味北史魏崔浩傳傳記若不一叩洪鐘伐雷鼓則不識其音響也世說嘗一臠而知一鑊之味一鼎之調呂氏春秋集九折臂而成醫兮吾今而知其然楚辭誰言捐軀易殺身誠獨難曹子建三良詩既傷蔓草別方知枤杜情曹粲詩倦客惡離聲選東門行如痛定之人思當痛之時不知何能自處也及之而後知履之而後難耳韓文答李翱書經事漸知非柳詩不讀關睢篇安知后妃德劉義文入耳淡無味愜心潛有情白侍郎始知為客苦不及在家貧憂方知酒聖貧始覺錢神不窮視世界焉識宇宙廣當時父母念今日爾應知並同上世情間盡見藥性病多諳獲寶於已喪得途於既迷與夫平居不為艱故所激者其味異矣劉賓客不涉太行險誰知斯路難歐陽堅石臨終詩長因送人處憶得別家時唐人詩見冷齊夜話本朝人之未知學者自視以為無缺及既知學反思前日所為則駭然矣老泉嘗鼎一臠旨可知也臨川集多事始知田舍好凶年偏覺野蔬香東坡詩吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也東坡剛說互見事反所料其少時好議論古人既老涉世更變往往悔其言之過東坡答王庠書互入知悔類經弗謹厥德雖悔可追書五子之歌汝悔身何及書盤庚上子有酒食何不日鼓瑟苑其死矣它人入室詩山有樞啜其泣矣何嗟及矣詩中谷有蓷時過然後學則勤苦而難成記學記今不取後世必為子孫憂語季氏互入投機子鯈䱁者浮陽之魚也胠於沙而思水則無逮矣挂於罟而欲謹則無益矣荀榮辱轂既破碎乃大其輻事已敗矣乃重太息其亡益乎荀法行史若不早圖後君噬臍左莊六年不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎史呂不韋傳互入投機覆水不收後悔何及東漢光武紀知財為禍何不早散晉石崇傳齊張敬兒被禍脫冠貂投地曰此物誤我通監傳記夫差帥群臣祠子胥江水濱曰昔不聽相國之言乃用讒佞之言至令相國遠沒江海自亡已來濛濛惑惑如霧蔽日莫誰與言吳越春秋集少壯不努力老大徒傷悲選長歌行毫末不早辨滋蔓信難圖白侍郎兔跡貪前逐梟心不早防張承吉文互入貪迷趍榮貪位者若陟懸崖險不能止俾至身危踣蹶然後嘆不知稅駕之所焉可及矣唐沈顧登華首互入貪迷本朝枯魚雖悔泣何及陳後山經徂來之松新甫之柏是斷是度是尋是尺詩閟宮或以德進或以事舉或以言揚記文王世子子曰君子使人也器之注孔曰度才而官之語子路子工之制木也大者以為舟航柱梁小者以為楫楔修者以為櫚榱短者以為侏儒枅櫨無大小修短皆得其所宜管子互入兼收並蓄良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之朴森然陳於目前大廈之器具矣孫子互入兼收並蓄巧工之制木也規矩方圓各隨所施淮南子史譬諸材木洪纖曲直各有所施晉書阮咸疏互入兼收若榱椽梁柱以成大室義負偃植各安所施而無遺材唐書劉弘基贊互入兼收並蓄韓滉在二浙所辟僚佐各隨所長無不得人嘗有故人子謁之考其所能一無所長滉與之宴竟席未嘗左右視及與並坐交言後數日署為隨軍使監庫門其人終日危坐吏卒無敢妄出入者通監唐德宗集直木不可以為輪曲木不可以為桶文選夫大木為杗細木為桷欂櫨侏儒椳闑居楔各得其宜以成室屋者匠氏之工也玉札丹砂赤箭青芝牛溲馬敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也韓文進學解互入兼收並蓄大匠無棄才尋尺各有施況當營都邑杞梓用不疑韓文量力而任之度才而處之其所不能不彊使為是故為下者不獲罪於上為上者不得怨於下矣韓文上張建封書任有小大惟其所能若器皿焉韓文當時而用任物所長張九齡文尺寸之材無所棄元微之集互入兼收並蓄為棟者資其自天之端為輪者取其因地之屈白侍郎若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名而得仕則自堯已降聖人賢人率多子弟杜牧之互入兼收並蓄子鳧脛雖短續之則憂鶴脛雖長斷之則悲莊取猿狙而衣以周公之服彼必齕齧挽裂盡去而後慊莊天運譬若樹荷山上而蓄火井中操釣上山揭斧入淵欲得所求難也淮南子說山訓責疲者以舉千鈞督跛者以及走兔鄧析子史指金火以求合西漢杜鄴傳傳記舍其所長責其所短堯亦有所不及矣戰國策集猶鏤以鉛刀而望巧不已踈乎仲長統昌言不可以自好章甫強越人以文冕也晉山濤書強人所不能事必不集韓文本朝求朱於藍色何從來類要經未有違謙越禮能全其壯者也易略例用壯處壯則觸藩矣同上子兵彊則滅木彊則折柔弱者生之徒堅彊者死之徒列黃帝堅則毀矣鋭則挫矣莊天下革堅則裂淮南訓道史天為剛德猶不干時況在人乎左文五年其強易弱西漢韓信傳桓公曰金剛則折革剛則裂說苑嶢嶢者易缺皎皎者易污東漢黃瓊傳快牛馬犢多能破車通監八十七卷李雍文名天下盧藏用曰雍如干將莫耶難與爭鋒但虞傷缺耳唐李雍傳互入藻鑑集利劍多缺真玉喜折劉賓客集子天下柔弱莫過於水而攻堅彊者莫之能勝弱之勝強柔之勝剛天下莫不知莫能行老子舌之存也豈非以其柔耶齒之亡也豈非以其剛耶老云積於柔必剛積於弱必強柔勝出於已者其力不可量列天下之至柔馳騁天下之至堅老人之生也柔弱其死也堅強萬物草木之生也柔脆其死也枯槁故堅強者死之徒柔弱者生之徒老紀渻子為齊宣王養鬭雞十日而問雞巳乎曰未也十日又問曰未也十日又問曰幾矣望之侶木雞矣其德全矣異雞無敢應者反走矣莊齒堅於舌而先之弊是故柔弱者生之幹也而堅強者死之徒也淮南訓道山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑽蝎非木之鑿然而能以微脆之形陷堅剛之體豈非積漸之致乎孔叢子互入積漸舌柔軟終以不弊同上傳記韓子問叔向曰剛與柔孰堅叔向曰臣年八十齒再落而舌尚存是知剛不如柔劉向說苑柔能制剛弱能制強黃石公三略劉伶嘗醉與俗人相忤其人攘袂而往必欲歐之伶顧而笑曰雞肋不足以安尊拳其人笑而止竹林七賢篇子故事有鑿一孔而生百隙樹一物而生百葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為滅蘇秦以百詐成一信淮南子秦穰侯與綱壽接境魏冉將以廣其封遂伐綱壽而取之兵回而范睢代其相矣艾子曰真所謂外頭趕兔屋裡失獐也艾子史所獲不如所亡左襄三年所利不能藥其所傷所獲不能補其所亡通監第三招延士大夫常如不足然性嚴峻群臣雖素所愛信者或小有犯法或欺罔輒按誅之通監漢武紀揚雄以為靡麗之賦勸百而諷一猶騁鄭衛之聲曲終而奏雅不已戲乎西漢司馬相如贊所得未毛銖所喪如山崖晉王隱傳一作永嘉傳決江海以救焚焚收而溺至引鴆爵以止渴渴止而身亡書唐書互入區處失當焚系為朱泚撰冊文既成仰藥而死通監唐德宗歲運東方租米至有斗錢運斗米之言同上御史大夫李琪非無文學但不廉耳通監唐明宗唐主謂璟曰吾餌金石始欲益壽乃更傷生通監晉高祖集取之盡錙銖用之如泥沙杜牧之阿房宮賦益之以畎澮而泄之以尾閭稽叔夜養生論本朝挽之不能寸推去輒數尺黃魯直詩史始雖垂翅回溪終能奮翼澠池後漢馮異傳失之東隅收之桑榆同上劉琨長於招懷而短於撫御一日之中雖歸者數千而去者亦相繼通監晉懷紀王叔文至中書見韋執誼時宰相方會食執誼起就閣與語鄭珣瑜等輟餐以待頃之吏白二公同飯矣珣瑜喟然曰吾可復居此乎歸家疾卒唐書鄭珣瑜傳本朝顯禹雲山之罪雖應夷滅光之忠勳不可不祀司馬光編經昔魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也記魯子問子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也記中庸管仲鏤簋而朱紘旅樹而反坫山節藻梲賢大夫也而難為上晏平仲祀其先人豚肩不掩豆一狐裘三十年賢大夫也而難為下記雜記子以為無益而舍之者不耘苗者也助之長者揠苗者也孟公孫丑過則失中不及則不至楊問道昔徐偃王軟而國滅齊簡公懦而身亡此性太柔之失也晉陽處父以純剛取害鄭子陽以嚴猛致斃此性太剛之過也列史矯枉過其正西漢諸侯王表集純柔純弱兮必削必薄純剛純強兮必喪必亡柳佩韋本朝為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人東坡論西羌夏人事宜劄子
