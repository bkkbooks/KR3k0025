body:
  text: 神仙附女仙子藐姑射之山有神人居焉肌膚若冰雪綽約若處子不食五榖吸風飲露乘風氣御飛龍而遊乎四海之外莊至人大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚同上至人倚不拔之柱行不關之塗稟不竭之府學不死之師淮南子公孫卿言仙人好樓居上作蜚廉桂館益壽延壽館通監薊子訓與一老翁摩挲銅人語曰適見鑄此已五百歲矣後漢薊子訓傳傳記食氣者神明而壽不食者不死而神大戴禮易本命篇黃初平丹谿人年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起索之不得見後在市有道士善卜乃就占之道士曰金華山中有牧兒是卿弟非耶初起即隨道士尋見兄弟悲喜問羊何在初平曰近在山東初起往視孑不見羊但見白石無數還曰無羊初平曰羊在耳但兄自不見便乃俱往初平言叱叱羊起初是白石皆起成羊數萬頭曰我弟得神通如此吾可學否初平曰唯好道便得初起便棄妻兒留就初平共服松脂伏苓至千日能坐在立亡日中無影有童子之邑後還鄉諸親死亡略盡乃去以方教授南伯逢易姓為赤初起改為魯班初平改為赤松子其後傳服此藥得仙者數十人神仙傳王喬有三同姓名有王子晉王喬有葉令王喬今食肉芝王喬乃蜀中神僊也王氏神仙傳男之高仙曰真人女曰元君太平廣記蓬萊弱水三十萬里非飛僊莫到續仙傳河東須曼都好道去家三年而反曰去時有數僊人將上天離月數里而止月之旁甚寒悽愴論衡羿請不死之藥於西王母其妻嫦娥竊之奔月宮託身於月是為蟾蜍王充論衡江妃二女皆麗服華裝佩兩明珠遊於江漢之湄逢鄭交甫交甫不知其神也遂下與言曰願請子之佩二女解佩以與交甫受而懷之趨去數十步視而懷空無佩顧二女忽然不見列仙傳毛女字玉姜形體生毛秦始皇宮人也秦亡入山道士教食松葉遂不飢寒在華陰山中列仙傳西王母者金母也厥姓緱氏女子之登仙得道者咸隸焉集仙錄樊夫人者劉綱妻也鬢翠如雲肥潔如雪女仙錄萼綠華者女仙也上下青衣顏色艷整真誥魯妙典女道士生而好道入九嶷仙去三洞珠囊謝自然女道士入洞庭山無疾而化有雲鶴之瑞仙去同上女几者陳市上酒婦也隨仙人居女几山女仙錄麻姑與王方平降於蔡經家麻姑是好女年十八九許於頂上作髻餘髮垂之至腰手似鳥爪神仙傳集飄飄戲九垓選遊仙詩冠霞登綵閣解玉飲椒庭樂府升天行文選神仙排雲出神仙詩風餐委松宿雲臥恣天行升天行飲清岑之玉醴兮飧沆瀣以為糧張衡思玄賦遺世翫道絕粒茹芝孫綽天台賦王喬控鶴以沖天應真飛錫以躡虛尋不死之福庭同上聞至人之休風齊天地於一指秋興賦噓吸沖和吐故納新蟬蛻龍變棄俗登仙東方朔贊至人無己先天地而御六氣列仙神化隘宇宙而遺萬物岑文本有時驅猛虎虛室使仙童杜雲臥游八極玉顏已千霜李白朝食雲母散夜吸沆瀣精白侍郎仙翁已得道混跡尋巖泉肌膚冰雪瑩衣服雲霞仙紺髮絲並緻齠容花共妍方曈點玄漆高步凌飛煙幾見桑海變莫知龜鶴年所憩九清外所遊五岳巔軒昊舊為侶松喬難比肩浩蕩八溟闊志泰心超然形骸既無束得喪亦都捐豈識椿菌異那知鵬鷃懸白傳集吳葛仙翁步行水上衣覆不濕白帖綿日月而不老配日月而長存同如煙非煙不知處韋應物集綠鬢縈雲裾曳霧雙節飄颻下仙步日月分明到世間碧雲何處來時路同上中有一人披霓裳誦經山頂飧霞漿朝入青霄禮玉堂夜掃白雲眠石床劉長卿解形而遺世乘白雲而上賓唐文粹不踐名利道始覺塵土腥不味稻粱食始覺神骨清同上妾巫山之女也朝為朝雲暮為行雨宋玉賦上古既無世所未見環姿偉態不可勝讚神女賦婆娑乎人間同上靈姐顧我笑粲然啟玉齒郭景純游仙詩聘王母於銀臺選思玄賦本朝金鼎銷紅日丹田老紫芝詩話總龜玉宇清風來處遠仙家白日靜中長歐公詩衣裳飄颻薄煙霧汨然沖虛眇無營欒城集至人本無夢其夢本遊仙真人本無睡睡則浮雲煙詩話先生去後應難老乞與貧儒換骨丹同上傳真仙之福庭天帝之下府號曰金庭不死之鄉養真之靈境也仙傳拾遺王屋小有洞天神仙之府五臺山道家紫府洞也東峰有離岳大球西峰有麗農瑤室南峰有洞光珠樹北峰有玉洞瓊芝中峰有自明之金環光之璧集雲生梁棟間風出窗戶內郭景純道仙詩山岳神秀玄聖遊化靈仙窟宅孫綽天台賦洞門無鎖鑰俗客不曾來韓文有地在壺中無人知地脈劉賓客勝景不易遇入門神頓清唐文粹十洲并序序曰漢武帝既聞王母說八方巨海之中有祖洲瀛洲玄洲炎洲長洲元洲流洲生洲鳳麟洲聚窟洲等十洲並是人跡所希絕處又知東方朔非世常人是以延之曲室而親問十洲所在方物之名故書記之方朔云臣嘗隨師之主履行北至朱陵扶桑之闕溽海冥夜之丘純陽之陵始青之下月宮之間內遊七丘中旋十洲踐赤縣而遨五岳行陂澤而息名山臣自少及今周流六天涉歷八極於是矣未若陵靈之子聽真之官上下九天洞視百方北極鉤陳而并華蓋南翔太丹而棲火夏東之通陽之霞西薄寒空之野日月所不逮星漢所不與其上無復物其下無復底臣之所識如此愧不足以酬廣大祖洲祖洲近在東海之中地方五百里去西岸七萬里上有不死之草草形如菰苗長三四尺人死者以草覆之皆當時活也末服之令人長生昔秦始皇苑中多枉死者橫道有鳥如烏狀銜此草覆死人面當起坐而自活也有司聞奏始皇遣使者齎草以問北郭鬼谷先生鬼谷先生云臣聞東海祖洲上有不死之草生瓊田內或名為養神芝其葉似菰苗叢生一株可活一人始皇於是慨然曰可採得之不乃使徐福發童男童女各三百人率載樓船等入海尋祖洲遂不返福道士也字君房後亦得道瀛洲瀛洲在東大海中地方四千里大抵是對會稽郡去西岸七十萬里上生神芝仙草又有高玉石且千丈出泉如酒味名之為玉醴泉飲之數升輒醉令人長生洲上多仙家風俗似吳中山川如中國也玄洲玄洲在北海之中戍亥之地地方七千二百里去南岸三十六萬里有玄都仙伯真公所治多丘山又有風山多風氣響雷電對天西北門上多大玄仙官仙官宮室各異饒金石紫芝又是三天所治之處炎洲炎洲在南海中地方二千里去北岸九萬里上有風生獸似豹青色大如貍張網取之積薪數車以燒之薪盡而獸不燃灰中而立毛亦不燋斫剌不入打之如皮囊即以鐵鎚鍜其頭數千下乃死而張口向風須臾復活以石上菖蒲塞其鼻即死取其腦和黃菊花服之盡十斤得壽五百年又有火林山山中有火光獸大如鼠毛長三四寸或赤或白山可三百里許晦夜常見此山林乃是此獸光照狀如火光相似取其獸毛以緝為布時人號為火浣布也國人衣服之若有垢汙以灰浣之終不潔淨唯以火燒兩食久振擺之其垢自落潔白如雪亦多仙家居處長洲長洲一名青丘在南海辰巳之地地方五千里去岸二十萬里上饒山川又多大樹樹乃二千圍者一洲之上專是林木故一名青丘上有仙草靈藥甘液玉英又有風山山常震聲有紫府宮天真仙女遊於此地元洲元洲在北海中地方三千里去南岸十萬里上有五芝玄澗澗水如蜜漿飲之長生與天地相畢服五芝亦得長生不死上多仙家流洲流洲在西海中地方三千里去東岸十九萬里上多山川積石名為昆吾冶其石成鐵作劍光明洞照如水晶狀割玉如泥亦多仙家生洲生洲在東海丑寅之間接蓬萊七十萬里地方二千五百里去西岸二十三萬里上有仙家數萬天氣安和芝草常生地無寒暑安養萬物亦多山川仙草眾芝一洲之水味如飴酪至良洲者也鳳麟洲鳳麟在西海之中地方一千五百里洲四面弱水繞之鴻毛不浮不可越也洲上多鳳麟數萬各各為群又有山川池澤及神藥百種亦多仙家煮鳳喙及麟角合煎作膠名之為續弦膠或名連金泥此膠能續弓弩巳斷之弦連刀劍斷折之金更以膠連續之處使力士掣之他處乃斷所續之際終無所損也天漢三年帝幸北海祠恒山四月西國王使至獻靈膠四兩及吉光毛裘武帝受以付外庫不知膠裘二物之妙用也以為西國雖遠而上貢者不奇稽留使者未遣久之武帝幸華林園射虎而弩弦斷使者從駕又上膠一分使口濡以續弩弦帝驚曰異物也乃使武士數人共對掣引終日不脫如未續時其膠色青如碧玉吉光毛裘黃色蓋神馬之類也裘入水數日不濡入火不燋帝於是乃悟厚謝使者而遣去又益思方朔之遠見周穆王時西胡獻昆吾刀及夜光常滿盃刀長一尺盃受三升刀切玉如泥盃是白玉之精光明照夜冥夕出盃於中庭以向天比明而水以滿盃中汁甘而香美斯實靈人之器秦始皇時西胡獻切玉刀無復常滿盃耳如此膠之所出從鳳麟洲來劍之所出從流洲來並是西海中所有也聚窟洲聚窟洲在西海中申未地地方三千里北接崑崙二十六萬里去東岸二十四萬里上多神仙靈官宮第比門不可勝數及有獅子辟邪鑿齒天鹿銅頭鐵額之獸洲上有大山形如人鳥象因名之為人鳥山專多大樹與楓木相類而林芳葉香聞數百里此為返魂樹亦能自作聲如群牛吼聞之者皆心振神駭伐其木根置於玉釜之中煮取汁更微火煎如黑錫狀令可丸之名曰驚精香或名之為震靈丸或名之為遠生香或名之為振檀香或名之為人鳥精或名之為卻死香一種六名斯靈物也香氣聞數百里死者在地聞香氣乃卻活不復亡也以香熏死人更加神驗如此之後延和三年武帝幸安定西胡月支國王遣使獻香四兩大如雀卵黑如桑椹帝以其非中國所有以付外庫又獻猛獸一頭形如五六十日犬子似狸而色黃命國使以呈帝見使者抱之以其羸細禿悴怪其所貢之非也問使者曰此物可弄何謂猛獸使者對曰夫威加於百禽者不必計之以大小是以神麟故為巨象之王鸞鳳必為大鵬之宗百足之蟲制於螣亦不在於巨細也臣國去此三十萬里國有常占東風入律百旬不休青雲千呂連月不散者當知中國將有好道之君我王固將賤儒墨而貴道德薄金玉而厚靈物也故搜奇蘊貢神香步天林而請猛獸乘毳車而濟弱淵策驥足以度飛沙契闊遙途辛苦蹊路于今巳十三年矣香神起妖殘之死疾猛獸卻百邪之魅鬼夫此二物實是養生之要助政平化豈圖陛下反不知真乎是臣國占風之繆矣今日仰鑒天姿亦乃非有道之君也眼多視則淫色口多言則犯難身多動則淫賊心多飾則奢侈未有用此四者而成天下之治也武帝忿然不平又問使者猛獸何方而伏百禽食噉何物膂力何取其所生何鄉耶使者曰猛獸所出或出崑崙或生玄圃或生聚窟或生天露其壽不貲食氣飲露解人言語仁惠忠恕當其仁也愛護蠢動不犯虎豹以下當其威也一聲叫發千人伏息牛馬恐駭驚斷絙繫武士奄忽失其勢力當其神也立興風雲吐漱雨露百邪迸走蛟龍騰蛇附處于太山之廄役御獅子名曰猛獸蓋神化無常能為大禽之宗主乃玃天之元王辟邪之長獸者也靈香雖少斯更生之神物也疫病災死者能起之乃聞香氣者即活也芳又特甚故難歇也於是帝使使者令猛獸發聲試聽之使者乃指獸命發一聲獸舐唇良久忽叫如天大雷聲霹靂又兩目䃱磹交光精氣衝天良久方止帝登時顛蹶掩耳震動不能自止時衛者虎賁武士俱失仗伏地諸內外牛馬犬豕之屬皆絕絆離繫放蕩驚駭久許而定帝忌之因以此獸付上林苑令虎食之於是虎聞來乃相窟積聚如死虎伏獸入苑徑上虎頭溺虎口去十步巳來顧視虎虎輒閉目帝恨使者言不遜欲收之明日失使者及猛獸所在遣四出尋討不知所止到後元封元年長安城內病者數千百亡者太半試取月支神香燒之於城內其死未三日者皆活芳氣經三月不歇於是信其神物也乃更秘錄香復一旦又失之檢函封印如初無復香也帝逾時懊恨不禮待使者益貴方朔之遺語自愧求少君之不懃慚衛卿之復去向使厚待使者必有所益也右十洲滄海島滄海在北海中地方三千里海四面繞島各五千里水皆滄色仙人謂之滄海者也島上專是大山積石有名石象八石石腦石桂英流月黃子石膽之輩百餘種皆生於島服之神仙外別有圓海繞山圓水色正黑謂之溟海無風而洪波百丈不可得往上有九老丈人九天真主蓋太上真人之所居唯飛仙能到其處耳崑崙一號曰崑陵在西海戍地北海之亥地地方一萬里去岸十三萬里有弱水周回繞匝山東南接積石圃西北接北戶之室東北臨大活之并西南至承淵之谷此四角大山寔崑崙之支輔也積石圃南頭是王母宮王母告周穆王云山去咸陽三十六萬里山高平地三萬六千里上有三角山方廣萬里形如偃盆下狹上廣故曰崑崙山三角其一角干辰之輝名曰閬風巔其一角正西名玄圃堂其一角正東名崑崙宮其一角有積金為大墉城面方千里城上安金臺五所玉樓十二所其北戶山承淵山入有墉城金臺玉樓相映如流精之闕光碧之堂瓊華之室紫翠丹青景雲燭日朱霞九光西王母之所治也其北海外又有鐘山在北海之子地隔弱水之北一萬九千里高一萬三千里上方七千里周旋三萬里自生千芝及神草四十餘種上有金臺玉闕亦元氣之所舍天帝君治處也鍾山之南有平邪山北有蛟龍山西有郅草山東有束木山四山鍾山之枝幹也四山高鍾山三萬里宮城五所如一登四面山下望見鍾山耳四面山帝君之城域也又仙人出入道徑自一路從平邪山東南入穴中乃至內長生島中紫石室宮九老仙都治處仙官數萬眾記之方丈洲在東海中心西南東北岸正等方丈面各五千里上專是面龍所聚者金玉琉璃之宮三天司命所治之處群仙若欲昇天者往來此洲受太上玄生籙仙家數十萬瓊田芝草課計頃畝如種稻狀亦有石泉山有九原丈人宮主領天下水神及龍蛇巨鯨陰精水獸之輩扶桑在東海之東岸一萬里復得碧海廣狹浩汗與合東岸大碧水既不鹹苦正作碧色甘香味扶桑在碧海之中地方百里上有太上帝太真王父所治處地多林木葉皆如桑又有椹子樹長者數千丈徑三千餘圍樹兩兩同根偶生更相依倚是以名扶桑仙人食其椹一體皆作金色飛翔玄虛其樹雖大其葉如椹如中夏桑也但椹希而赤九千歲一生實耳味絕甘香地生紫金丸玉如諸夏之瓦石其仙官變化萬端蓋無所形或有分形為百身十丈者蓬丘蓬萊山是也對東海之東北岸周迴五千里北到鍾山北阿門外乃天帝君總九天之維貴無比焉山源周回具有四城其中高山當心有似於崑崙也昔禹治洪水既畢乃乘蹻車度弱水而到此祠上帝於北阿歸大功於九天又禹經諸五岳使工刻石識其里數高下其字科斗書非漢人所了今丈尺里數皆禹時書也不但刻劘五岳諸山名亦然其所刻之處獨高耳東方朔十洲三島記
