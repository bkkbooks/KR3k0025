body:
  text: 總論政事經子張問從政子曰尊五美屏四惡斯可以從政矣語政事冉有季路先進子曰因民之所利而利之斯不亦惠而不費乎並同上子衆人熙熙如享太牢如春登臺老子絶學無憂章孟子曰君子乎其政行辟人可也焉得人人而濟之孟子離婁下與物為春莊子大宗師哀公問政子曰政之急也莫大乎使民富且壽也省力役薄賦斂則民富矣敦禮教遠罪戾則民壽矣公曰欲行夫子之言恐吾國貧子曰愷悌君子民之父母未有子富而父母貧者也孔子家語子路治蒲三年孔子入境三稱其善曰入其境田疇盡易草萊甚辟溝洫甚治此其恭敬以信故其民盡力也入其邑墻瓦完固樹木甚茂此其忠信以寬故其民不偷也至於庭甚清間諸下用命此其言明察以斷故其政不擾也同上或曰為政先殺後教曰天先秋而後春乎楊子先知謂之惡政同上史士會將中軍晉國之盜逃奔于秦左宣十六子太叔為政不忍猛而寬鄭國多盜左昭二十子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣襄公二十五年晉趙宣子為國政制事典正法罪辟刑獄董逋逃治舊汙本秩禮續常職出滯淹既成以授太傳陽子與太師賈他使行諸晉國以為常法左文六年伯禽受封之魯三年而報政太公封於齊五月而報政史魯世家子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉索隱曰子産治鄭仁而且明故人不欺之子賤為政清淨惟彈琴三年不下堂而化故人不忍欺之西門豹以威化御俗故人不敢欺之史記滑稽西門豹傳周公曰夫政不簡不易民不有近平易近民民必歸之史魯世家莫不引領而觀其政史秦紀子産相國一年豎子不戲狎班白不提挈僮子不犁畔二年市不豫賈三年道不拾遺四年田器不歸五年士無尺籍喪期不令而治史循吏傳河南守吳公治平為天下第一史賈生傳趙廣漢為京兆尹召亭長西至界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之其發姦擲伏如神皆此類也前漢書黃霸為穎川太守嘗遣廉吏察民事戒吏周密勿泄吏出不敢舍郵亭食於道傍烏攫其肉後吏還霸見迎勞之曰甚苦食於道傍乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢隱前漢書韓延壽守左馮翊民有昆弟訟田延壽閉閣思過於是訟者親族相責此兩昆弟深自悔皆自髡肉袒謝顧以田相移終死不敢爭後民莫敢以辭訟自言者前漢書互見陰驅默化門馮野王弟立治行相似吏民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化均周公康叔猶二君前漢書互見兄弟門張敞守京兆尹市偷盜多敞乃召偷盜酋長數人見之責問因貫其罪令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願權補吏職敞皆以為吏遣歸休置酒小偷悉來賀各飲醉偷長以赭汙其衣裾赭赤土也吏坐里閭閲出者汙赭輒收縛之一日捕得數百人盡行法罰由是市無偷盜前漢互見以毒攻毒門黃霸為穎川太守力行教化而後誅罰外寬內明得吏民心治為天下第一前漢本傳吏民稱之不容口西漢趙廣漢傳善政和氣立致猶桴鼓之相應也西漢李尋傳薛宣所在而治為世吏師西漢本傳王尊為京兆尹拊循貧弱鋤耘豪強西漢本傳龔遂為渤海民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢西漢本傳賈琮為交址刺史巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯通監漢靈紀杜畿在河東十六年常為天下最通監漢獻帝紀張建封為政寬厚而有綱紀不貸人以法故其下無不畏而悅之通監唐德宗紀侯霸為淮平大尹政理有能名更始遣使徵霸百姓老弱相攜號哭遮使者車或當道而臥皆曰願乞侯君復留期年後漢賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當遠視廣聽糾察其美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風竦震其餘臧過者望風解印綬去後漢范邵為浚儀令有二人挾絹於市互爭令斷之各分一半令去後遣人密察之有一喜一慍之色於是擒之伏罪後魏書枹鼓不鳴東漢董宣傳卓茂為密令鄰縣及府官以為不治河南太守為置守令茂治自若數年教化大行路不拾遺袁宏漢紀延篤為京兆尹政用寬仁先是邊鳳為尹亦有能名郡人為之語曰前有張趙三王趙廣漢張敞尊王章王駿王衍為元城令終日清談而縣務亦理晉書本傳曹攄為臨淄令獄有死囚歲夕攄愍之曰卿等不幸致死新歲人情所重豈不欲暫見家耶衆囚泣曰若得暫歸死無恨也攄悉開獄出之吏固爭攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣嘆服晉書夏侯夔為豫州刺史兄亶先經此任並有恩惠百姓歌曰前兄後弟布政優優南史互見兄弟門傳琰父僧祐為山陰令有能名琰為武康令並著能名二縣皆謂之傳聖時云諸傳有理縣譜南史孔顗為長史性使酒每醉輒彌日不醒然明曉政事醒時判決未嘗有壅衆咸云孔公一月二十九日醉勝世人一月二十九日醒也傳琰仕齊為山陰令時有二野父爭雞琰各問何以食一云粟一云豆乃破雞得粟罪言豆者南史宋世良為清河太守善政術獄內穭生桃木蓬蒿亦滿每日衙門虛寂無復訴訟者謂之神門代者至有老人泣而前曰老人年九十經三十五政府君非惟善政清亦徹底今失賢者人何以濟莫不攀轅泣涕北史劉曠為平鄉令在職七年風教大洽囹圄草生庭可張羅北史高謙之為河陰令有人囊盛瓦礫指作錢物詐市人馬因而逃去詔令追捕謙之乃偽枷一囚立於馬市宣言是前詐市馬賊密遣使心腹察市中私議者有二人相見欣然曰無復憂矣執送按問悉獲其黨北史宿姦老蠹為斂迹唐書劉栖楚傳崔咸遷陝號觀察日與賓客僚屬痛飲未嘗醒夜分輒決事裁剖精明無一毫差吏稱為神唐書張允濟為武陽令元武民以牸牛依婦家者久之孳十餘犢將歸而婦家不與牛允濟因令左右縳民蒙其首過婦家云捕盜牛者命盡出民家牛質所來婦家不知遽曰此壻家牛我無預即遣左右撤蒙曰可以此牛還壻家唐書柳仲郢為京兆尹政號嚴明後出為河南尹以寬惠為政或言不類答曰輦轂之下先彈壓郡邑之治本惠養唐書互見因事制宜崔郾為唐州剌史治以寬經月不笞一人及蒞鄂州嚴法峻誅不貸同上互見同子産賢者也為政尚纍年而後成唐書裴琰之為同州司戶吏白積案數百乃命連紙進筆為省決一日畢既豫奪當理而筆詞徑妙名動一州號霹靂手唐書傳記宓子賤治單父彈鳴琴身不下堂而單父治巫馬期戴星而出戴星而入以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任力者勞任人者逸韓詩外傳互見分量不同黃穆為山陽守有德政弟奐為武陵守貪穢無行諺曰天有冬夏人有二黃襄陽耆舊傳李果為洛陽令公正吏民畏之有劉兼者夜宿村邸聞戶外曰古今正人李令見其行事令人破膽我輩可於他縣血食開戶視之無人乃鬼神也漢武故事有一人持一匹絹到市賣遇雨而披覆後一人求庇廕授一人雨霽當別因爭是我縑太守薛宣呼騎吏斷各與半使追聽之後人曰君恩縑主稱冤不巳宣因拷問後人伏罪風俗通集老安少懷途歌里詠選碑垂愛景而字人穆薰風而扇物駱賓王仁風飄十地之雄惠露灑二天之渥同上剸繁決劇以通敏彈豪紏魅以沈斷皇甫湜富庶而教至於無事百姓扶老提稚載路而歌曰昔吏詑詑今吏詹詹公能馭之雄亦為銛跖亦為廉始紲以善終優以恬昔民嗷嗷今民咍咍公能撫之鰥寡有怡流亡既來徭稅先具污茨盡開嚮覆官倉倉無斗糧公來幾時積粟埋梁嚮閲官庫庫無尺繒公來幾時山積層層瑞露溶溶降味公松瑞蓮漪漪合蒂公池公有異政神之祚之民歌路謠冀聞京師皇甫湜政化平如水杜詩頃來樹佳政皆已傳衆口政用踈通合典則並同上賀公溫恭克修儼實有立季野備四時之氣士元非百里之才撥煩彌間剖劇無滯鏑百發克破於楊葉刀一鼓必合於桑林寬猛相濟弦韋適中一之歲肅而教之二之歲惠而安之三之歲富而樂之然後青襟向訓黃髮履禮耒耜就役農無遊手之夫杼軸和鳴機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者遜於道路任者併於輕重扶老攜幼尊尊親親千載百年再復魯道非神明博達孰能契於此乎李白任城縣廳壁記清風動百里惠化聞京師李太白集百里雞犬靜千廬機杼鳴同上地逐名賢好風隨惠化春李白吏無並緣以巧法人無怨讟以苦役柳文宣風一方覃化一州柳文留司業書德風流海外和氣滿人寰柳文宿蠹藏姦吐露首服柳文春生秋殺陽開陰閉令修於庭戶數月之間而人自得於湖山千里之外韓文老姦宿贓消縮摧沮魂亡魄喪影滅迹絶韓文互見風力威行如秋仁行如春韓文斂此大惠施于一州同上持官將身內外斬斬由是朝廷滋欲試之於民使令家聽戶視姦宄無宿府中不聞急步疾呼韓文稅節賦詩韓文櫛垢爬癢民獲蘇醒同上方地數千里不識盜賊山行海宿不擇處所韓文赤車所至如東風變枯劉賓客集責實繩下風稜言言同上黠吏斂手齊民揚眉同上執直筆閲簿書紛拏盤錯一瞬而剖劉賓客集育物如春化人如神唐裴度撰諸葛亮碑歌謠千里春長暖杜牧之集剔刮根節銷磨頑礦日教月化冰順雪釋手攜暴虎貪狼化為耕牛乘馬渤海穎川之治邵父杜母之恩千里封疆一口歌詠壺漿迎路襁屬攀車政聲長與江聲在自到津樓日夜聞印組榮光馬鋒鋩看解牛并閭安樂易冠蓋愜依投政簡稀盈閣功成每運籌並同上廓千里之沴氣白樂天序膏雨吾土襦袴吾人白樂天集廉平清一之政繼聞于京師吏畏如夏日人歸如流水縣道分行百里春膏雨景星所至蒙福並同上人一知教欣欣熙熙然如登春臺矣文粹提封之內無榛灌繩墨之下無姦傲若非袴襦之惠及其幼稚雞豚之養及其耆艾推赤心置人腹中者安能化暴戾之俗西人泣送東人歌迎梁楚千里風交化行並見上臨機決滯有如影響李深之文雨苗均惠風草馳聲李義山文股肱還入郡父母更臨州扇逐仁風轉車零隨雨流張説之文號令所加風清月明孫可之惠化境外春元微之集百城萬井如衆草之得陽春不知其所以然也劉長卿賴有政聲遠時聞行路傳王維集宿訟不決之務餘地剖分疑獄自誣之枉容光立照同上都緣民訟少長覺吏徒間杜荀鶴集唯憑野老口不立政聲碑同上互見務實績最天下唐賈餗傳邑長不聞夜犬之吠選碑君長一城亦盡刊刻之美同上惠露沾吳仁風扇越選齊故安陸碑威令首途仁風載路詠德之聲盈耳並同上本朝富弼移青州會河朔大水民流京東擇所部三州豐稔者勸民出粟得十五萬斛益以官廩隨所在貯之得公私廬舍十餘間散處其人以便薪水官吏自前資待闕寄居者皆給其祿使即民所聚選老弱而病瘠者廩之山林河泊之利有可取之以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝五日遣人以酒肉與糗飯勞之出於至誠人人為盡力流民死者為大冢葬之謂之叢冢自為文祭之明年麥大熟流民各以遠近受糧而歸凡活五十餘萬人募而為兵者又萬餘人富公神道碑趙清獻為武安推官有偽造印者吏皆以為當死公獨曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死一府皆服東坡撰神道碑吳越大飢趙清獻公知越州盡所以救荒之術發廩勸分而以家資先之民樂從焉生者得食病者得藥死者得藏下令修城使民食其力故越人雖飢而不怨同上為政曾幾何清風自無限欒城集誰與長官歌美政風搖松竹是歡聲山谷經子産猶衆人之母也記仲尼燕居子展禽之家有柳樹身行惠德號曰柳下惠淮南子史奉法循理之吏不伐功矜能百姓無稱亦無過行史循吏傳序鄭柏公友封于鄭百姓皆便愛之史鄭世家王成黃霸朱邑龔遂鄭弘召信臣等所居民富所去見思生有榮號死有奉祀廩廩庶幾德遜君子之遺風矣西漢循吏傳安靜之吏悃愊無華日計不足月計有餘後漢章帝紀前有召父後有杜母後漢杜詩傳一夫得情十室鳴絃東漢循吏贊互見影響相應門劉寬仁恕吏人有過但用蒲鞭罰之示辱而已東漢本傳韓韶與同郡荀淑鍾皓陳實皆嘗為縣長所至以德政稱時人謂之穎川四長通鑑漢質紀鄧攸有惠政罷郡日人入水攀其船不忍別晉書崔伯謙除濟北太守改鞭用熟皮為之不忍見血示恥而巳北史本傳陽城左遷道州剌史治民如治家自署其考曰撫字心勞徵科政拙考下下觀察使遣判官督其賦至州城先自囚於獄判官大驚馳入謁城於獄曰使君何罪某奉命來問安否耳留一二日未去城不復歸館門外有門扇橫地城晝夜坐臥其上判官不自安辭去其後又遣他判官往按之他判官載妻子行中道逸去通鑑唐德宗集始公之歷二千石也敦肅風教勞來孤惸決其蘊積灑其煩苛祥風甘雨家濡戶洽李吉甫杜佑碑本朝寧書下下考不奉急急符陳後山看君擁黃紬高臥放早衙坡詩注云文路公為榆次縣令嘗題詩縣樓鼓云置向譙樓一任撾撾多撾少不知它如今幸有黃紬被努出頭來放早衙
