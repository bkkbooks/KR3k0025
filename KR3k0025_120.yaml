body:
  text: 怨望經四方有羡我獨居憂民莫不逸我獨不敢休詩十月之交大夫不均我從事獨賢詩小雅民莫不穀我獨于罹詩小辨何辜於天我罪伊何同上或燕燕居息或盡瘁事國或息偃在床或不已于行或不知叫號或慘慘劬勞或棲遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎幽小雅北山父母生我胡俾我愈不自我先不自我後詩正月東人之子職勞不來西人之子粲粲衣服幽小雅大東於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿於我乎每食四簋今也每食不飽于嗟乎不承權輿詩秦風適彼樂土詩碩鼠貧而無怨難語憲問寧不我顧詩日月子此莫非王事我獨賢勞也孟子萬章上史信而見疑忠而被謗能無怨乎史屈原傳不見用常鞅鞅怨望史記伍子胥傳叩心怨上西漢伍被傳不意君之望臣深也西漢張且傳赦韓信封為淮陰侯信知漢王畏惡其能多稱病不朝從居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍通鑑漢高紀互見失勢黯褊心不能無少望見上言陛下用群臣如積薪後來者居上西漢汲黯傳怨氣滿腹後漢直如絃死道邊曲如鉤反封侯李固外傳陽球曰微蔑斗筲莫不蒙被殊恩通鑑怏怏形於言色通鑑梁武楊儀自謂年官先蔣琬才能踰之於是怨憤形于聲色歎咤之音發於五內時人畏其言語不節莫敢從也對費禕恨望又語禕曰往者丞相亡歿之際吾若舉軍以就魏氏處世寧當落度如此耶令人追悔不可復及禕密表其言漢主廢儀為民自殺通鑑魏明紀互見因言取禍范曄有雋才而薄情淺行數犯名教為士流所鄙性躁競自謂才用不盡常怏怏不得志通鑑宋太祖劉文靜自以才略功勳在裴寂之右而位居其下意甚不平飲酒酣怨望拔刀擊柱曰會當斬裴寂首通鑑唐高祖李密怒曰唐使吾與絳灌同列何以堪之通鑑唐高祖傳記羅友答亙溫書曰旦出門逢一鬼大揶揄云我祗見汝送人作郡何以不見人送汝作郡世說郝隆為南蠻參軍作詩曰陬隅躍清池亙溫曰何為作蠻語隆曰千里投公始得一蠻府參軍那得不作蠻語世說已而失望集悠悠蒼天兮莫我振理楚辭死節勤公爵祿不及偷榮尸祿寵秩或加陳子昂集北里富薰天高樓夜吹笛焉知南鄰客九月猶絺綌杜詩百年歌自苦未見有知音諸公兗兗登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足霄漢瞻佳士泥塗任此身並同上絳灌更能經幾歲賈生何事又三年大造功何薄長平氣尚冤太陽偏不及非是未傾心何意同根本開花每後時應緣去日遠獨自發春遲年光不可待空羡向南枝並劉長卿但令識字者操弄刀筆權征人戰苦束刀鎗主將勳高換羅幕時輩多得途並元稹集無限公卿因戰得與君依舊緑衫行元微之集夔何罰而踸踔蚿何功而扶持相逢滿眼是淒涼並劉賓客上林多少木不得一枝棲唐李義府飛鳥詩若道平分四時氣南枝為底發春偏劉賓客隱隱聚若雷噆膚不知足皇天苦不平微物教食肉貧士無絳紗忍苦臥茅屋何事覓膏腴腹無太倉粟皮日休集側望卿相門難入堅如石王無功太歲只遊桃李徑春風肯管歲寒枝膚公文非有道德智謀承顧問贊教化者乃反得蒙採擢薦進光耀如此柳文不才明主棄多病故人踈孟浩然奪我身上暖買爾眼前恩進入瓊林庫歲久化為塵時傷大野麟今問長沙鵩君恩薄如紙並白侍郎清血灑不盡仰天知問誰空過流年徒生聖代並杜牧之本朝譬如溝中斷誰復強收拾欒城集范諷自給事中謫官數年歸濟南城西張氏園亭飲宴題詩曰園林再到身猶健宮職全拋夢乍醒惟有南山與君眼相逢不改舊時青張師正倦遊緑經葉公之弟后臧從其母於吳不待而歸葉公終不正視左定四獻子曰所不此報無能涉河左宣十七齊侯曰余姑剪滅此而朝食左成三范鞅遇欒樂曰死將訟女於天左襄三十二譬如禽獸臣食其肉而寢其皮矣襄二十一年齊子雅子尾怒盧蒲嫳慶封告之嫳曰譬之如禽獸吾寢處之矣左襄二十八衛子鮮出奔晉不鄉衛國而坐左襄二十七魯昭公曰則不能見夫人己所能見夫人者有如河左昭二十一互入援證袁盎素不好朝錯錯所居坐盎去盎坐錯亦去兩人未嘗同堂語史本傳互入嫌隙趙襄子怨智伯漆其頭以為飲器史豫讓傳日夜扼腕瞋目切齒史記張儀傳勾踐曰日夜焦唇乾舌欲與吳王接踵而死史端木賜傳灌夫橫穎川穎川歌曰穎水清灌氏寧穎水濁灌氏族史本傳自公卿以下至于庶人咸指湯史張湯傳王溫舒誅滅淮陽人甚多及死仇家欲燒其尸史本傳互見嫌隙朱買臣見張湯湯坐床上丞吏遇買臣不為禮買臣楚士深怨常欲死之史張湯傳秦父兄怨此三人痛入骨髓史記皆側目於望之等西漢劉向傳公孫洪亦仄目而事固西漢轅固傳往往指目西漢陳勝傳朝錯父謂錯曰口語多怨公西漢本傳齰舌自殺西漢灌夫傳李文與張湯有隙已而為御史中丞事有可以傷湯者不能為地西漢張湯傳言必切齒西漢王莽傳僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖纍百世詬彌甚矣是以腸一日而九回居則忽忽若有所亡出則不知所如往每念斯恥汗未嘗不發皆霑衣也前漢司馬遷傳齎恨入冥東漢馮衍傳孫秀為小吏給事嶽而狡黯自喜嶽惡其為人數撻辱之秀常御忿及趙王倫輔政秀為中書令嶽於省內謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之嶽於是自知不免俄而秀遂誣嶽及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族晉書潘嶽傳互見惡報張華裴頠之被誅趙王倫孫秀以宿憾收解系兄弟梁王肜救系倫怒曰我於水中見蟹且惡之況此人兄弟輕我耶此而可忍孰不可忍遂害之晉書齏之粉之屠之裂之猶未足以謝通鑑宋太祖侯景謂左右曰我固知吳老公薄心腸通鑑梁高祖盧杞遇赦用為饒州刺史給事中袁高應草制執以白盧翰劉從一曰百辟疾之若讎六軍思食其肉通鑑唐德宗史弘肇尤惡文士常曰此屬輕人難耐每謂吾輩為卒通鑑五代漢隱帝諸葛靚歸于鄉里終身不向朝廷而坐通鑑西晉出祖紀吳謝厲曰潘太常常切齒於君但道無因耳通鑑魏郡陵厲公紀晉李太后在建州臥病無醫藥惟與晉主仰天號泣戟手罵杜重威李守貞曰吾死不置汝通鑑後漢紀劉銖罷青州歸久奉朝請未除官常戟手於執政通鑑後漢紀傳記永言怨恥生死莫云仰天俯地何以為生含齒戴髮何以為見史通吳王賜子胥屬鏤之劍子胥伏劍而死吳王取子胥尸盛以鴟夷之器投之於江子胥因隨流揚波依潮往來蕩激崩岸後漢趙曄吳越春秋越王賜文種屬盧之劍而死越王葬種於國之西山葬一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水候者伍子胥也後重水者大夫種也同上集怒目切齒選酒德頌天道如何吞恨者多選鮑昭賦飲恨吞聲江文通賦經父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讎視父師長之讎視兄弟主犮之讎視從父兄弟周禮父之讎弗與共戴天兄弟之讎不反兵交遊之讎不同國記曲禮史周鄭交惡左鄭息有違言左隱十一公與大夫始有惡左哀二十六韓簡子與趙文子相惡魏襄子亦與范昭子相惡左定十三三家未睦左定十三與我同壤而世為仇讎左哀元減宣嘗與湯有隙窮竟其事史張湯傳王溫舒死仇家欲燒其尸史本傳互見怨恨君臣多間隙也左哀二十七將軍與臣有隙西漢高紀內有纖介西漢孫寶傳朝厝素與吳相袁盎不善錯所居坐盎輒避盎所居坐厝亦避兩人未嘗同堂語通鑑互入怨恨曹參為宰相與蕭何有隙西漢本傳趙溫與郭泛爭睚眥之隙以成千鈞之讎東漢趙溫傳眥睚之恨反成嫌隙魏志王珣娶萬女珉弟娶安女並不終由是與謝氏有隙晉書謝琰傳李抱真馬燧二人怨隙甚深不復相見通鑑唐德宗集同盤飲食常睇相視不交一言杜牧之經往而不來非禮也來而不往亦非禮也記曲禮史報者倦矣施者未厭左僖二十四晉公子重耳及楚楚子饗之曰公子若反晉國則何以報不穀左僖二十三楚令尹子旗有德於王不知度與養氏比而求無厭左昭十四集孰能施於無報楚辭
