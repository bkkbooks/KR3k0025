body:
  text: 閨門經女正位乎內男正位乎外父父子子兄兄弟弟夫夫婦婦而家道正易家人九二家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也同上諸父兄弟備言燕私詩楚茨妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾家室樂爾妻孥小雅棠棣令妻壽母魯頌閟宮父母在閨門之內戲而不嘆記坊記父子篤兄弟睦夫婦和家之肥也記禮運閨門之內有禮故三族和仲尼間居子父詔其子兄教其弟莊盜跖史姑慈婦聽夫和妻柔禮也左父慈子孝夫信妻貞家之福也史蔡澤傳石奮子孫為小吏來謁必朝服見之子孫在側雖宴必冠前本傳張敞曰閨房之內夫婦之私有過於畫眉者本傳云鄧訓於閨門兄弟莫不敬憚諸子進見未嘗賜席接以溫色東漢閨門雍穆三國志陳矯傳司馬防諸子雖冠成人不命曰進不敢進不命曰坐不敢坐不指有所問不敢言父子之間肅如也魏志本傳仇香妻子事之若嚴君妻子有過免冠自責妻子庭謝思過香冠妻子乃敢升堂通鑑漢桓紀盧度世閨門之內和而有禮雖世有屯夷家有貧富百口怡怡豐儉同之宋太祖紀代宗曰不癡不聾不為家翁兒女子閨房之言何足聽也唐紀何曾閨門整肅與妻相見正衣冠相待如賓己南面妻北面再拜上酒一歲不過再三晉書庾亮動由禮節閨門之內不肅而成同上楊遁一家之內男女百口緦服同爨庭無間言魏世以來唯有盧陽烏兄弟及播遁之祖昆季當世莫逮焉北史本傳元暐三世不異居家人怡怡如也唐書本傳博陵崔倕緦麻三世同爨貞元以來言家法者以倕為首生六子一登宰輔五任大僚其昆仲自始仕至貴達亦同居光德里一宅宣宗聞之嘆曰崔鄯家門孝友可為士族師矣崔邠傳傳記父子不和其世破亡兄弟不和不能久同夫婦不和家至大凶説苑集凡人家中門事外人不可周知李翱子嚴父詔婦順夫指韓文羅池廣碑經莊公惑於嬖妾使驕上僣詩碩人子鄭公孫穆後庭比房數十皆擇稚齒婑媠者以盈之列子楊朱篇史齊侯好內多內寵內嬖如夫人者六人左僖十七紂愛妲己妲己之言是從史商紀秦囚孟嘗君使人抵秦幸姬求解獻狐白裘幸姬為言昭王釋孟嘗君本傳楚懷王聽鄚袖之言釋去張儀屈原傳為平陽主謳西漢武衛后傳寵之顓房燕霍后傳石崇有婢曰緑珠孫秀使人求之不得秀怒勸趙王倫誅崇崇謂緑珠曰我為爾得罪緑珠泣曰當效死於君前因自投于樓下而死晉書更衣入侍唐駱賓王檄武后文喬知之有美妾曰碧玉知之為之不婚通鑑唐紀梁故將劉鄩侍兒王氏有美色號花見羞五代史傳記張天錫疾美人閻姬薛姬皆自殺二姬國色並有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊君不諱妾請效死於前灑掃於地下無他志崔鴻十六國春秋前涼録亙溫尚明帝女南康公主溫平蜀以李勢妹為妾甚有寵嘗著別室後主聞與數十婢拔刃襲之值李梳頭髮垂地姿貌端麗乃徐下地結髮斂手向主曰國破家亡無心至此今日若能見殺雖死之日猶生之年神色間正辭氣悽惋主於是擲刃前抱之曰我見汝亦憐何況老奴遂善遇之世説石季倫有愛婢曰翔風妙年別五聲能觀金色翔風年三十妙年者疾之崇乃退翔風為房老拾遺詩寧王有樂妓寵姐一作妲美色善歌客莫見李太白曰王何吝此女示於衆乃設七寶花障召寵姐歌於障後白曰雖不許見面聞其聲亦幸矣王仁裕開元天寶遺事石季倫所愛婢數十人季倫嘗屑沈水香如塵末布象床上所愛者踐之無迹則賜真珠百琲若有迹者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀郍得百琲真珠王子年拾遺記唐申王每冬月苦寒令宮女密圍而坐謂之妓圍天寶拾遺元載納薛瑤英為姬以金絲帳卻塵褥處之以紅綃衣衣之古今詩話元載寵姬薛瑤英能詩書善歌舞仙姿玉質肌香體輕雖旋波移光飛燕緑珠不能過也合撿李太尉為亡姬謝秋娘撰望江南樂府雜録張建封節制武寧納舞妓盻盻燕子樓白樂天經徐與詩曰醉嬌無氣力風裊牡丹花公薨盻盻不他適多以詩代問答有詩三百首名燕子樓集乃和白詩云自守空樓斂恨眉形同春後牡丹枝舍人不會人深意訝道泉臺不去隨麗情集泰娘韋尚書家主謳者又張好好以善歌為沈述師著作以雙鬟納之並同上韓退之二妾一曰絳桃一曰柳枝皆能歌舞柳枝後踰垣走專寵絳桃矣語林潘杭嬖於美妾解愁姓趙母夢海棠花蕊而生外史禱杌集如姬寢臥內中山王妾歌侍者蠱媚巾㡚鮮明選南郊賦秀色燃紅黛嬌香發綺羅鏡前鸞對舞琴裏鳳傳歌妒寵傾新意御恩奈老何張説之文別館覺來雲雨夢後門歸去蕙蘭叢李義山櫻桃樊素口楊柳小蠻腰白居易侍妾本事詩金叉十二行白樂天春從春遊夜專夜白居易長恨歌宴專席寢專房陳鴻長恨歌傳薦枕青娥艷劉長卿後宮佳麗三千人三千寵愛在一身白樂天侍婢艷傾城杜詩此婢嬌嬈惱殺人凝脂為膚翡翠裙盧同文曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妒寵而負恃爭妍而取憐韓文虢國夫人承主恩平明上馬入宮門翻嫌脂粉涴顏色淡掃蛾眉朝至尊杜侍女低鬟落翠花杜牧之嬪嬙左右如花紅杜本朝斂色避新姬歐公詩愛君小鬟新買得如手未觸新開花歐公集列屋間蛾眉坡詩妾薄命主家十二樓一身當三千古來妾薄命事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春妍有聲當徹天有淚當徹泉死者恐無知妾身長自憐葉落風不起山空花自紅捐世不待老惠妾無其終一死尚可忍百歲何當窮天地豈不寬妾身自不容死者如有知投身自相從向來歌舞地夜兩鳴寒蛩后山經嘒彼小星三五在東肅肅宵征夙夜在公實命不同嘒彼小星維參與昴肅肅宵征抱衾與禱實命不同詩小星嘒微兒妾御於君不當夕悼公之母注云哀公之妾也死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我記檀弓妻不在妾御莫敢當夕郊特牲士妾有子而為之緦無子則已記喪服小記買妾不知其姓則卜之坊記子臧獲奴婢也方言謂荊淮海岱之間罵奴曰臧罵婢曰獲燕齊亡奴謂之臧亡婢謂之獲或曰取貨謂之臧笞得謂之獲皆謂奴婢者周禮其奴婢男子入于罪隸女子入于舂藁荀子王霸篇泉丘人有女奔僖子僖子使助薳氏之簉注薳氏之女為僖子副妾故納泉丘之女以副助之左昭十一若以妾為大人則固無其禮也左哀二十五蘇秦曰聞客有遠為吏而其妻私於人者其夫將來其私者憂之妻曰吾已作藥酒待之矣夫至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言則恐其殺主父也於是佯僵而棄酒主父怒笞之妾一僵則覆酒上存主父下安主母史本傳充下陳李斯書願為箕帚妾西漢高紀張蒼妾百數嘗孕者不復幸妾不敢以燕媠見李夫人傳為傳婢所毒王吉傳師古曰凡言傳婢者謂傳相其衣服衽席之事賤婢不可以為主帝賜張志和奴婢各一志和配以為夫婦號漁童樵青新唐書本傳集豈惟炊爨之勞抑亦巾箱之寵白帖越婢脂肉滑元稹集女使護衣李義山文一婢赤腳老無齒韓文傳記鄭元家奴婢讀書一婢不稱旨使人拽著泥中須臾一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒世説周浚過汝南李氏有女絡秀因求為妾同上漢尚書郎入直給女侍使二人皆選端正妖麗執香爐護衣服通典桓玄妾當産畏風應須帳柏曰不須作帳可以到夫人故帳與之類説潞州節度使薛嵩有青衣曰紅錦嵩遣掌箋表號內記室甘澤謠見小名録本朝小婢立我前赤腳兩髻丫歐公真是青裙兩髻丫常呼赤腳婢兩中擷園蔬坡自遣赤腳沽村釀同上經我僕痡矣詩卷耳僕夫況瘁出車徒御不驚車攻趍走給召呼周禮宰夫八職注子子貢曰冉雍仲弓使其臣如借家語史秦伯送衛於晉三千人實紀綱之僕左僖二十四使訓群騶知禮左皂隸輿臺馬有圉牛有牧以待百事負羈絏以從扞牧圉並左傳廝役扈養公羊傳注云析薪為廝炊烹為養高漸離為人庸保匿作史荊軻傳呂不韋家僮萬人本傳西漢衛青傳師古曰婢妾之總稱也張耳陳餘其廝役莫非天下英傑本傳論人之奴得無笞罵足矣衛青傳奴虜使之西漢項籍傳桀黠奴人之所患唯刀間收使之貨殖傳刀間能蓄豪奴愛幸監奴霍光傳師古曰奴之監知家務者也蒼頭盧兒鮑宣傳蒼頭東漢彭寵傳諸史有長史乃帳下吏魏志祖逖有胡奴曰王安逖甚愛之及約之誅安嘆曰豈可使祖士稚無後乎乃往就市觀刑逖庶子道重始十歲安竊取以歸匿之變服為沙門通鑑晉成紀盧懷謹死家無餘蓄惟一老蒼頭請自鬻以辦喪事唐元帝紀蕭穎士有奴事穎士十餘年笞楚嚴慘或勸其去曰非不能愛其才也唐書帝賜張志和奴婢各一志和配以為夫婦號漁童樵青唐本傳傳記晏子曰臣非廚養之臣説苑咸陽郭氏一蒼頭曰捧劍每遭鞭捶一日忽題詩曰青鳥銜蒲萄飛上金井欄美人恐驚去不敢捲簾看其主遂稍容之五雲溪人范據纂雲溪友議集太史公牛馬走選司馬遷報任少鄉書鷹犬之才爪牙可任陳琳檄內無應門五尺之僮李令伯表掃除之隸晉書一奴長鬚不裹頭韓地上蟣虱臣盧同月蝕詩趍廝走養皮日休郢州孟亭記本朝更煩赤腳長鬚老東坡
