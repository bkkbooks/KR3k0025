body:
  text: 獎予後進子竊竊焉欲俎豆予于賢人之間莊子史郭泰好獎訓士類或出於屠沽卒伍因泰獎進成名者甚眾通監漢桓紀荀淑拔李昭於小吏犮叔度於幼童魏志注許靖年踰七十愛樂人物納誘後進蜀志陸玩為公輔性通雅不以名位格物誘納後進謙若布衣由是縉紳之徒莫不蔭其德宇晉書成就後進士往往知名唐韓愈傳陸餘慶於寒品晚進必悉力薦藉唐書宋范泰愛獎後生孜孜無倦南史本傳集單門後進必加善誘任彥升序史上問丙吉誰可自代曰杜延年于定國陳萬年後居位皆稱職西漢本傳呂蒙至都權問誰可代卿者蒙對曰陸遜意思深長才堪負重乃召遜拜偏將軍右部督以代蒙通監東漢獻帝紀互入提拔陳寔出於單微鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我太守以寔為功曹通監漢質紀互入提拔皇甫規為度遼將軍到營數月上書薦奐自代曰奐才略兼優宜任元帥以從眾望朝廷從之以奐代規通監漢桓帝紀呂蒙病篤吳王問曰卿如不起誰可代者蒙對曰朱然吳王假然節鎮江陵通監魏明帝紀周瑜病困上疏曰魯肅智略足任乞以代瑜三國吳志魯肅傳盧毓遷吏部尚書詔使毓自選代曰得如卿者乃可毓舉常侍鄭沖帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝用邕焉魏志羊祜疾篤舉杜預自代通監晉世祖紀集時名年輩俱在臣前擢以代臣必允眾望韓文薦錢徽自代所冀虞丘無蔽賢之咎臧孫無竊位之譏品集經蔡仲克庸祗德周公以為卿士書蔡仲之命篇左傳云己卿士犁牛之子騂且角雖欲勿用山川其舍諸語雍也史不可使恭叔無後於鄭左莊十六年子文無後何以勸善宣四年成季之勳宣孟之忠而無後為善者懼矣成八年齊立敬仲之曾孫酀良敬仲也襄二十九年臼季使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不犮弟不共不相及也文公以為下軍大夫僖三十二年並左傳臼季見冀缺耨以告文公曰其父有罪可乎冀芮曰國之良也減其前惡公見之使為下軍大夫國語晉語復紹蕭何陳平之世增修曹參周勃之屬前漢功臣表帝閱錄故事得楊賜與劉陶所上張角奏乃封賜為臨晉侯陶為中陵鄉侯通監漢靈帝紀楚王立孫叔敖之子封寢丘史記楚宗孫叔顯封厥子岑彭既沒爵及支庶魏志楚子思子文之治復命其胤漢室嘉江公之德用顯其世三國志魏太尉華歆表嵇紹以父得罪靖居私門山濤謂武帝曰父子罪不相及嵇紹賢侔郤缺請為祕書郎帝曰如卿所言乃堪為丞何但郎也乃起家為丞晉書韋嗣立薦廣武令岑羲曰但恨其伯父長倩為累太后曰苟或有才此何所累通監唐中宗紀英衛擢罪亡之餘唐書李靖贊集棄瑕錄用江希範書盛德之胤世業可懷欒郤之家前徽未遠沈休文不欲使勳勞之後栖栖於塵土中白樂天集置射鉤之賊而任其才釋斬祛之怨以免於難此桓文所以弘霸功也張九齡文本朝魏室旌賢特訪康成之後晏公類要經驅而納諸罟擭陷阱之中記中庸子如登高而去其梯孫子楚會諸侯魯趙皆獻酒於楚王楚王酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲淮南互見事出意表史排擠英俊西漢杜欽傳或忮害好陷人於罪康衡傳為之機陷晁錯傳媒孽其短李陵傳相與排擯主父偃傳並西漢賈后以帝命賜太子酒三升使盡飲之后使黃門侍郎潘岳作草書令小婢承福以紙筆及草因太子醉稱詔使書之太子醉迷不覺遂依而寫之其字半不成后補成之以呈帝通監晉惠帝紀監察御史周子諒彈牛仙客上怒㩧於殿庭李林甫言子諒張九齡所薦貶九齡荊州長史通監唐元宗紀或告第五琦受人金二百兩遣御史劉期光追按之琦曰琦備位宰相二百金不可手挈若付受有憑請準律科罪期光即奏琦已服罪通監唐肅宗紀上初踈斥官官親任朝士而張涉以儒學入侍薛邕以文雅登朝繼以贓敗官官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹亂天下豈非欺罔耶於是上心始疑不知所倚仗矣通監唐德宗紀互入乘間集反擠之又下石焉韓文痛無知之相陷呂溫由鹿賦史楚殺伍奢其子員如吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭二十年互見識者所窺秦王年少太后時竊私通呂不韋不韋恐覺禍及己乃私求嫪毒嫪力高反毒於改反詐令人以腐罪告之不韋陰謂太后曰詐腐則得給事中后乃陰賜主腐者詐論之遂侍太后私與通呂不韋傳趙豹曰韓氏所以不入秦者欲嫁其禍於趙也史記趙世家七國反錯欲令上自將兵而身居守通監漢景帝紀公孫敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得於是族陵家通監漢武帝紀楚殺子玉公喜而後可知也曰莫余毒也已公謂晉文公也左宣十二年王甫父子應時或首截路人士女莫不稱善若除父母之讎通監漢靈帝紀呂布刺董卓百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆守尸吏為大炷置卓臍中燃之光明達曙如是積日通監漢獻帝紀吐突承璀首唱用兵疲弊天下上罷承璀中尉降為軍器使中外相賀通監唐德宗紀裴延齡卒中外相賀同上來俊臣棄市時人無不快俊臣讎家爭噉俊臣之肉斯須而盡抉眼剝面披腹出心騰踏成泥士民皆相賀於路曰自今眠者始帖席矣通監唐武后紀貶皇甫鏄為崖州刺史市井皆相賀唐穆宗紀本朝鄭向知杭州王耿為浙漕互有論列而耿死鄭往哭之甚哀或曰龍圖素惡端公今何慟哭也范極曰龍圖待哭斯人久矣張師正倦游錄互見識者所窺史王子頹享五大夫樂及徧舞鄭伯曰王子頹歌舞不倦樂禍也左莊二十年慶鄭曰幸災不仁幸災民所棄也左僖十四年王宏素與司隸校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰胡种樂人之禍禍將及之後漢王允傳好乘人之弊晉書周伯仁傳董養見王彌謂之曰君好亂樂禍若天下有事不作士大夫矣通監晉世祖紀經有酒湑我無酒酤我詩伐木雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞詩車舝醉言舞于胥樂兮詩有駜諸父兄弟備言燕私詩父黨無容記禮器觴酒豆肉記坊記自吾母而不用吾情吾惡乎用吾情記檀弓下殺雞為黍而食之語微子居不容語史子之事父焉得不盡其情東漢傳奕傳謝安嘗詣陸納納殊無供辦所設惟茶菓而已晉書陸納傳集斗酒相娛樂選古詩御盃酒接慇懃之歡司馬遷荅任安書禮有所尚隻雞不薄意有所將生芻為貴張九齡文輸瀉蘊積劉賓客握手出肺肝相示韓文草草具盤饌不持酒獻酬同上約窮歡於一晝雖椽俸之酸寒要拔貧而為富韓祭柳州文情意既深庶乎無間父子直往直來張曲江集本朝司馬溫公在洛為真率會有約酒不過五行食不過五味惟菜無限三朝言行錄互見真率坦率見真情東坡集相從盃酒形骸外笑殺平生醉夢間同上他日過飯隨家風買魚貫柳雞著籠山谷集經有直情而徑行者記檀弓下子直語無藻飾抱朴子黃日篇史衛綰忠實無他腸西漢本傳晉文帝每言王述才既不長直以真率便敵人耳晉書集主人一心好四面無藩籬元稹集內外都無隔帷屏不復張元微之集蹊徑絕縈紆同上不設塹壘杜牧之司馬溫公在洛為真率會有約酒不過五行食不過五味唯菜無限三朝言行錄互見用情
