body:
  text: 物理盈虛經日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉易繫辭日中則昃月盈則食天地盈虛與時消息而況於人乎同上遁者退也物不可以終遁故受之以大壯陽盛陰消君子道長序卦晉者進也進必有所傷故受之以明夷日中則昃月盈則食物不可以終難故受之以解升而不已必困故受之以困並序卦屈伸相推一屈一伸更相推謝易略例財聚則民散財散則民聚記大學子日中則移月滿則虧老子物惡有滿而不覆者哉家語川竭而谷虛丘夷而淵實莊子名遂身退天之道也管子互見知足再實之木其根必傷文子史甚美必有甚惡左昭二十盛之有衰猶朝之必有暮也西漢韓安國傳夫窮高則危太滿則溢月盈則缺日中則移後李固傳福謙忌盛同上傳記太歲在丑乞漿得酒太歲在已鬻妻賣子吉凶代盈縮循環劉知幾史通時屯必亨運蒙必正顏延年釋奠詩人道無久盈齊謳行前榮後枯相翻覆李太白集盈虛倚伏去來之不可常柳書噫天地久否忽泰則平日月久昏忽開則明雷霆久息忽震則驚雲霧久鬱忽散則清仲尼之道否於周秦而昏於漢魏息於晉宋鬱於陳隋遇於吾唐萬世之憤一韓而釋皇甫湜請韓公配享書命屈於當代慶流於後昆白集先緑亦先枯白樂天詩本朝一年辛苦一冬間東坡集善乎司馬光之言曰天地所生萬物止有此數不在民則在官譬如雨澤夏潦則秋旱東坡十年斂積用一朝驚濤破山風動地後山嗚呼行經履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也易坤卦如彼雨雪先集維霰詩頍辨吉夢維何維熊維羆男子之祥維虺維蛇女子之祥詩斯干室家溱溱詩無羊嗜欲將至有開必先記孔子間居天降時雨山川出雲同上禍福將至善必先知之不善必先知之記中庸國家將興必有證祥國家將亡必有妖孽同上子曰余疇昔之夜夢坐奠於兩楹之間豫殆將死矣遂寢疾七日而歿禮記子目將眇者先觀秋毫耳將聾者先聞蚋聲列子人之將疾必先不甘粱肉之味國之將亡必先惡忠直之言晏子一葉落而知天下之秋淮南子史或叫于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災左襄三十年晉文公過衛乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之左傳晉侯疾求醫於秦未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在育之上膏之下攻之不可達之不及藥不至焉不可為也左成十年周幽王二年西周三川皆震伯陽甫曰周將亡矣昔伊洛竭而夏亡河竭而商亡史記周本紀殷說夢發於傅巖周望兆動於渭濱西漢班固敘傳福生有基禍生有胎西漢枚乘傳岷山崩壅江三日江水竭劉向大惡之昔岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭殆必亡矣通監漢成帝紀張掖柳谷口水溢涌寶石負圖狀似靈龜立于川西有石馬七及鳳凰麒麟白虎犧牛璜玦八卦列宿孛彗之象于綽問巨鹿張洊洊密謂綽曰今漢已久亡魏已得之何所追興朕兆乎此石當今之變異而將來之符瑞也通監魏明帝紀孫峻與吳主謀置酒請諸葛恪恪將入之夜精爽擾動通夕不安又家數有妖怪恪疑之魏高貴節公紀諺云雞夜鳴者不利行師大群嗥者宮室將空兵動馬驚軍敗不歸通監晉武帝紀杜淹曰齊之將亡作玉樹後庭花其聲哀思行路聞之皆悲泣通監唐太宗紀楊震不答州郡禮命數十年後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰凡鱣者卿大夫之服象也數三者三台也先生自此升矣後位至太尉東漢本傳孫皓時錢塘湖開或言天下當太平青蓋入洛陽時皓以問陳訓曰青蓋入洛將有輿櫬銜璧之事尋而吳亡晉書孫秀誣潘嶽石崇為亂夷三族石崇已在市嶽後至崇曰安仁亦復爾耶嶽曰可謂白首同所歸嶽金谷詩云投分寄石友白首同所歸乃成其讖晉書潘嶽傳魏武帝嘗夢有三匹馬有一槽中共食其後宣帝及景文相繼為宰相遂傾曹氏宋符瑞志朱異初除中書郎時秋日始拜忽有飛蟬正集冠上時咸以為蟬珥之兆八年改侍中南史本傳王仁裕喜為詩其少也嘗夢人剖其腸胃以西江水滌之顧見江中沙石皆為篆之文由是文思益進五代史傳記有星赤而芒角自東北西南流投于諸葛亮營三投再還往大還小俄而亮卒晉陽秋祥者福之先妖者禍之先呂氏春秋隋煬帝於宮中嘗小會為拆字顧蕭妃曰爾能拆朕字否妃曰移左畫居右豈非淵字乎時人望多歸唐公帝聞之不懌乃言吾不能知此事豈非聖人耶於是姦蠹起於內盜賊攻於外隋大業記乾鵲噪行人至蜘蛛集百事喜西京雜記蜀縣有火井漢室之隆則炎赫驕熾威靈之際火勢漸微諸葛亮一闞而更盛桑榖共生于朝一日而大拱武丁修行諸侯來朝者六國武丁祭有飛雉升鼎耳而雊三年重譯來朝者六國尚書大傳本朝月暈而風礎潤而雨老蘇子禍莫大於不知足老子為善者天報之以福為惡者天報之以禍家語在厄篇禍福無不自己求之者孟子公孫丑上福輕乎羽莫之知載禍重乎地莫之知避莊子福莫長於無禍荀勸學篇互見知足夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰淮南子史卻至曰禍之大者其何福之為左成十二年能者養之以福不能者敗以取禍成十三年禍福無門唯人所召左襄二十三年福之至也人自生之禍之至也人自成之史龜策傳朱英謂春申君曰世有無妄之福又有無女之禍史春申君傳禍自怨起福由德興西漢文帝紀福生有基禍生有胎西漢枚乘傳互見朕兆夫吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉而小人之慮遂以為天道難知為善未必福而為惡未必禍歐陽公唐史中宗贊集福鍾常有兆禍至豈無端君子行詩凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為常君子得福為常而小人得福為不幸以其所為似有以取之也必曰君子則吉而小人則凶者不可也韓文經吾之於人也誰毀誰譽論語子有不虞之譽有求全之毀孟子三代之善千歲之積譽也桀紂之謗千歲之積毀也淮南子譽主則毀隨之同上我未見聞謗而喜聞譽而懼者文中子天地篇史季布曰以一人譽召臣一人毀去臣前漢季布傳互入不審毀譽愛惡之原禍福之機也魏志王昶傳毀譽脅於勢利晉紀總論聞謗而怒者讒之囮也見譽而喜者佞之媒也絶囮去媒讒佞遠矣通監隋高祖紀囮余周切又五戈反集凡人之獲謗譽于人者亦各有道君子在下位則多謗在上位則多譽小人在下位則多譽在上位則多謗柳子厚文謗譽經剝床以膚凶易剝卦地中生木升君子以順德積小以高大易升卦小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易繫辭非一朝一夕之故其所由來者漸矣易坤卦如彼雨雪先集維霰詩頍辨今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉記中庸君子之道造端乎夫婦及其至也察乎天地同上子合抱之木生於毫末九層之臺起於纍土千里之行始於足下老子方寸之木可使高於岑樓孟告子下夫江始出於岷山其源可以濫觴及其至于江津不舫舟不避風不可以涉家語又荀子天道篇江河之水非一源而流墨子丘山積卑而為高江河合水而為大莊徐無鬼日計之不足歲計之有餘莊子山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑽蝎非木之蠹然而能以微脆之形陷堅剛之體豈非積漸之致也乎孔叢子互見柔能勝剛月不足而歲有餘者也管子跬步不休跛鱉千里纍土不輟丘山崇成荀子積土成山風雨興焉積水成淵蛟龍生焉積土謂之山積水謂之海旦暮積謂之歲積善而全盡謂之聖人聖人者人之所積也並荀子不積蹞步無以致千里不積小流無以成江河荀勸學篇蚯蚓穿隄能漂一邑寸煙泄突致灰千室劉子水積則生吞舟之魚土積則生楩楠豫章尹子三代之善千歲之積譽也桀紂之謗千歲之積毀也淮南子互見毀譽善積則功成非積禍極淮南子主術訓江水之始出於岷山也可褰衣而越也及至其下洞庭騖石城經丹徒起波濤舟航一日不能濟也若火之得燥水之得濕浸而益大生木之長不見其益有時而修砥礪磨盤莫見其損有時而薄夫積愛成福積怨成禍並淮南子史階之為禍左隱三年積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也西漢董仲舒傳衆少成多積小致巨同上聚蚊成雷衆煦漂山西漢中山靖王勝傳磨礱砥礪不見其損有時而盡種植畜養不見其益有時而大積德纍行不知其善有時而用棄義背理不知其惡有時而亡西漢枚乘傳太山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡使之然也同上安者非一日而安也危者非一日而危也皆以積漸然不可不察也前賈誼傳壞崖破岩之水源自涓涓干雲蔽日之木起於青蔥後漢丁鴻傳隄潰蟻孔氣泄針芒陳忠傳聚蚊成雷第五倫傳積日成月並後漢積忤生憎積順生愛通監唐元宗紀傳記戎人生乎戎而戎言楚人生乎楚而楚言不知所以受也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言也呂氏春秋互入習慣集水漸成江海洹寬鹽鐵論膚寸自成霖曹子建詩蟻孔潰河溜沈傾山傅子口銘高以下基洪由纖積纍微以著張茂先勵志詩蟻壤漏山河絲淚銷金骨選君子有所思堅冰作於履霜尋木起於翻栽文選還聞膚寸陰能致彌天澤劉賓客集蚊聚雷侵室同上山漸而高澤積而長同上直從萌牙拔高自毫末始白侍郎集千里始足下高山起微塵繡始一縷萬縷相續並同上涓涓不遏終變桑田焰焰不除方燎原野陸宣公文溜之細穿石綆之細斷幹唐文粹雖一勺而進可以浸天壤一拳之積可以鎮方域同上積訛成蠹同上一息之波流於無垠皮日休集本從敲石光遂致烘天熱劉禹錫詩本朝沔彼濫觴蛙跳鯈遊溢而懷山神禹所憂東坡集一炬有燎原之憂而濫觴有滔天之禍同上冉冉百尺松起自一寸根欒城集官者之禍始於明皇盛於肅代成於德宗極於昭宗司馬溫公通監唐昭宗論經卿士師師非度書微子篇互見同惡敝化奢麗萬世同流書畢命商俗靡二利口惟賢餘風未殄同上螟蠕之子蜾裸負之教誨爾子式榖似之詩小宛子與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣家語引而置之莊嶽之間數年雖日撻而求其楚不可得也孟子白泥在沙與之皆黑曾子蓬生麻中不扶自直荀子勸學習俗移志安久移質荀子儒效工匠之子莫不繼事而都國之民安習其服居楚而楚居越而越居夏而夏是非天性積習使然也同上蘭茞槀本漸於蜜醴荀子大略蘭陵多善學蓋以荀卿也荀子後序扁鵲盧人也而醫多盧楊子螟蠕之子殪而逢蜾裸祝之曰類我類我久則肖之矣楊子學行篇今頭虱著身皆稍變而白身虱處頭皆漸化而黑是玄素果無定質移易存乎所漸抱朴子史鄒魯多去文學而趍利者以魯邴氏也史記貨殖傳生子多置之齊魯禮義之鄉史記三王世家互見教子漸靡使然西漢衡山王傳夫習與正人居之不能母正習與不正人居之不能無不正猶生長於楚之地不能不楚言也賈誼傳靈蓍在林林無毒草後漢志學之染人甚於丹青晉虞傳謝安好聲律朞功之慘不廢絲竹士大夫效之遂以成俗通監晉文帝紀性無常守隨化而遷化於敦朴者則質直化於浮澆者則浮薄北史蘇綽傳閭里童昏貴遊總丱未窺六甲先製五言至如羲黃舜禹之典伊傳周孔之說不復關心何嘗入耳通監善惡之習朝夕漸染易以移人通監唐高祖紀陽城有奴都兒化其德亦方介自約時歲飢或哀其餒與之食不納唐書本傳傳記劉子政子駿伯玉三人珍重左氏下至婦女莫不誦讀魏略高祖徙豐沛屠酤商人立為新豐縣故一縣多小人三輔舊事鄭元家奴婢讀書一婢不稱旨使人拽著泥中須臾一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒世紀集京洛多風塵素衣化為緇陸十衡贈婦漸禮樂之膏腴選運命論蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黃蒸性染身莫不相應嵇叔夜養生論淫風大行貞女蒙冶容之悔淳化殷流盜跖挾曾史之情陸士衡瀟湘間無土山無濁水民乘是氣往往清慧而文劉賓客集麗朱者丹附墨者黑蓋纍漸而得之也王無功芳蘭所生其草皆香美玉所積其山有光呂和叔文本朝禮義之家雖奴婢出而之他必能笑人之喪祭無禮者賢者之效不為細也橫渠理窟溫公營獨樂園園子呂直性愚以直名之春時人遊園園子得茶湯錢十千閉園日與主人平分之一日來納公公曰此自汝錢可持去再三欲留公怒遂持去回顧曰只端明不愛錢者後十許日公見園中新創一井亭問之乃前不受十千所創也元城語録太史公曰蓋公言黃老賈誼朝錯明申韓錯不足道也而誼亦為之余是以知邪說之移人雖豪傑之士有不免者東坡六一居士集敘經月盈則食易豐卦滿招損書大禹謨子孔子曰惡有滿而不覆者哉家語滿則覆荀子宥坐篇史盈必毀天之道也左哀公十一年重侯纍將窮貴極富王商等贊經輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要呂刑子珠之走盤橫斜曲直不可盡知所必可知者珠不出於盤也孫子序與時遷徙與世偃仰千舉萬變其道一也荀子儒效本朝如日在天雖光明無所不臨而躔次必有所舍東坡賜奉安神宗御容札使詔經屯見而不失其居易雜卦天下之動正夫一者也易繫辭子心未嘗不動也然而有所謂靜荀子解蔽為無為事無事老子史鄭崇曰臣門如市臣心如水漢書傳記動者靜之基道經集結廬在人境而無車馬喧陶淵明詩蘋末風起有文無聲劉賓客集動兮靜所伏白居易經夫動不能制靜制天下之動者正夫一者也易略例井居其所而遷易繫辭寂然不動感而遂通天下之故同上靜而后能安安而后能慮記大學子道常無為而無不為老子靜為躁君同上尸居而龍見淵默而雷聲莊子虛則靜靜則動動則得矣莊子天道集靜兮動所倚白居易動靜交相養賦經坤至柔而動也剛易坤卦仁者必有勇語憲問子慈故能勇天下柔弱莫過於水而攻堅強者莫之能勝夫慈以戰則勝以守則固並老子風曰豫蓬蓬然起於北海而入於南海然而顧我則勝我鰌我亦勝我雖然夫折大木蜚大屋者惟我能也故以衆小不勝為大勝也莊子坐於室而見四海荀子解蔽篇集憑几看魚樂杜詩本朝解組歸來道益光坐看萬物自炎涼東坡詩松柏生澗壑坐閲草木秋金石在波中仰看萬物流山谷詩遂令高臥人欹枕觀兒戲邵康節
