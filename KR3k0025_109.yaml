body:
  text: 師經德無常師主善為師書師以賢得民禮大宰古者士見於師以菜為贄大胥注禮聞來學不聞往教記曲禮席間函丈同上善待問者如撞鍾叩之以小者則小鳴叩之以大者則大鳴學記篇師嚴然後道尊大學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍不善學者師勞而功半能博喻然後能為師記問之學不足以為人師必也其聽語乎力不能問然後語之語之而不知雖舍之可也學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也並同上孔子之喪門人疑所服子貢曰昔者夫子之喪顏淵若喪子而無服喪子路亦然請喪夫子若喪父而無服檀弓上孔子之喪二三子皆絰而出事師無犯無隱左右就養無方服勤至死心喪三年同上人其父生而師教之禮運師也者教之以事而喻諸德者也文王世子夫子循循然善誘人語三人行必有我師焉溫故而知新可以為師矣並同上子孔子曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也吾將往矣家語觀周子夏教於西河之上同上夫子之設科也往者不追來者不拒孟盡下故人無師而知則必為盜勇則必為賊能則必為亂察則必為怪辨則必為誕有師而知則速通勇則速威能則速成察則速盡辨則速論故有師者人之大寶無師者人之大殃也荀儒效尊嚴而憚可以為師耆艾而信可以為師誦說而不陵不犯可以為師知微而論可以為師師術有四而博習不與焉致仕務學不如務求師師者人之模範也一卷之書必立之師揚學行師之貴也知大知也小知之師亦賤矣同上賈瓊曰夫子文中十五為人師陳留王孝逸先達之傲者也然白首北面豈以年乎立命篇史孔子退而修詩書禮樂弟子彌衆至自遠方莫不受業焉史世家下帷講誦弟子莫見其面西漢董仲舒傳師友淵源所漸同上贊師友必於天下英俊雋不疑傳都授翟方進傳注曰都授謂總集諸生大講授也韓信得廣武君東鄉坐師事之本傳李固少好學步行尋師不遠千里本傳牟長為博士諸生講學者常有千餘人著録前後萬人東漢儒林傳馬融才高博學為世通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也本傳太守黃讜署戶曹吏欲召咸入授其子咸曰禮有來學而無往教讜遂遣其子師之包咸傳孔奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣孔奮傳耆名高義開門受徒者編牒不下萬人後儒林傳邊韶教授數百人嘗晝臥弟子私嘲之韶曰師而可嘲出何典記本傳青成藍藍謝青師何常在明經北李謐傳魏常爽門徒七百餘人京師學業翕然復興立訓甚嚴有勸罰之科弟子事之若嚴君焉本傳文中子著六經北面受學者皆當時偉人隋書陽城遠近慕其行來學者跡接于道唐書經愈指授皆稱韓門弟子韓愈傳陽城為司業出為道州刺史太學諸生何蕃等頓首闕下請留數日為吏遮抑不得上本傳傳記馬融嘗坐高堂施絳帳前授生徒後列女樂東觀漢紀吳商學通五經四方擔囊負笠不可勝數吳具雜記槐市在華嶽西北谷楊震講授學徒成市其處多槐故號焉華山記揚雄死弟子共為起冢號曰揚冢七略集聲名塞於天淵真吾徒之師表也班固賓戲德無常師道在則是選間居賦師氏之選允歸人範行狀弘洙泗之風同上以其餘易其不足亦可交以為師矣柳文馬融鄭玄者二子獨章句師耳柳答嚴厚輿論師道書假令有取亦不敢為人師為衆人師且不敢況敢為吾子師乎柳答韋中立書韓愈作師說因抗顏而為師同上諸生業患不能精無患有司之不明行患不能成無患有司之不公韓文進學解仰執事坐師氏之筵唐田弘正與李渤書古之學者必有師師者所以傳道受業解惑也人非生而知之孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也聖人無常師萇弘師襄老聃郯子之徒其賢不及孔子孔子曰三人行必有我師故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而已韓文師說漢氏已來師道日微然時猶有授經傳業者及于今則無聞矣策問文中子紹明王道游其門皆天下俊傑劉禹錫撰王贊神道碑本朝聚徒從妙齡所至變鄒魯僧參寥子詩經三千之徒並受其義書序善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之記學記夫子之喪顏淵若喪子而無服喪子路亦然檀弓上子仲尼既沒弟子行心喪之禮三年家語昔者孔子沒三年之外門人治任將歸相鄉而哭皆失聲子貢反築室於場獨居三年然後歸孟滕文紀昌學射於飛衛既盡衛之術相遇於野二人交射中途矢鋒相觸墜於地而塵不揚列甘蠅學射於飛衛飛衛高蹈拊膺曰汝得之矣同上弟子通利則思師荀致仕譊譊之學各習其師揚夫子十五為人師王孝逸白首北面文中立命篇房杜諸公不能臻師之美大宣其教王氏續經抑而不振若房杜李魏二溫王陳輩迭為將相實永三百年之業斯門人之功過半矣中說序門人自遠而至董常姚義杜淹李靖程元竇威薛收賈瓊房元齡魏證溫大雅陳叔達咸稱師北面而受王佐之道焉如往來受業者不可勝數蓋千餘人世家門人竇威賈瓊姚義受禮溫彥博杜如晦陳叔達受樂杜淹房喬魏證受書李靖薛方士裴晞王圭受詩叔恬受元經董常仇璋薛收程元備聞六經之義中說先君門人布在廊廟王福畤雜録史自孔子卒七十子之徒散游諸侯大者為師傅卿相小者友教士大夫或隱而不見史記儒林傳申公弟子為博士者十餘人孔安國至臨淮太守周羈夏寬為內史魯賜至東海太守繆生內史徐偃中尉同上受業子思之門孟軻傳齊人以詩顯貴皆轅固之弟子也孔子弟子身通六藝七十有二人孔子世家孔子以詩書禮樂教弟子同上易不與焉汝南應劭自贊於鄭玄曰故太山太守應仲遠北面稱弟子何如東漢鄭玄傳蕭望之詣太常受業如弟子西漢本傳河南太守吳公與李斯同邑嘗學事焉賈誼傳侯芭從揚雄受太玄法言雄卒芭為起墳喪之三年揚雄傳于定國迎師學春秋北面備弟子禮本傳求謝師門後亙榮傳門人郤慮至御史大夫王基崔琰著名於世鄭玄傳田何受易於丁寬學成東歸何謂門人曰易東矣前本傳邊韶教數百人弟子嘲之曰邊孝先腹便便懶讀書但欲眠東漢本傳鄭玄事馬融在門下三年不得見使高業弟子傳授於玄玄日夜尋誦聞玄善算召見於樓上玄因從質諸疑議問畢辭歸融喟然謂門人曰鄭生今去吾道東矣鄭玄傳孫期遠人從其學者皆執經壟畔以追之本傳孫奮少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣東孔奮傳言君魚之道已過於己也延篤為平陽侯相以師喪棄官奔赴本傳執經下座北面受業梁書賈島劉叉皆韓門弟子盧同傳沈重講學授業徐曠從之不數日辭去曰先生所說紙上語耳若奧境彼有所未見者唐史傳記王羲之見前代筆說於其父枕中竊而讀之不數月書大進衛夫人見之流涕曰此子必蔽吾名羊欣筆陳圖衛有一弟子王逸少甚能學衛真書咄咄逼人潭帖李衛夫人帖集宮墻重仞允得其門選郭有道碑弟子不必不如師韓文籍湜輩雖屢指教不知果能不叛去否答孟簡尚書書從師負笈駱賓王嘗聞馬南郡門下有康成劉長卿心增故術腹飽新授劉賓客操篲醫門掬溜蘭室柳宗元啓鄙夫修擁篲之禮唐田弘與李渤本朝編牒師門類要胡安定先生弟子散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問可知為先生弟子胡安定墓表范質即和凝門生先是門生坐主榜上名次第同者謂之衣鉢和之名次范入承之和為相封魯公終太傅范亦封魯公終太傅實為傳衣付鉢而得心印也嵩陽叟秦再思撰紀異録又名佫中紀異經管仲遇盜取二人焉上以為公臣管仲死桓公使為之服記雜記趙文子所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉檀弓下史趙宣子舉韓獻子於靈公以為司馬河曲之役宣子使人以其乘車干行獻子戮之宣子曰可賀我矣吾舉厥而中吾乃知免於罪矣國語應侯任鄭安平王稽皆負重罪於秦史蔡澤傳范睢任鄭安平昭王使將擊趙安平降趙應侯席藁請罪秦之法任人而所任不善者各以其罪罪之史范睢傳何武舉方正之士召見盤辟雅拜有司劾失舉本傳宋弘薦亙談帝令談鼓琴愛其繁聲弘聞之不悅伺談內出正朝服坐府上遣吏召之談至不與席而讓之且曰能自改耶將令相舉以法乎談頓首辭謝良久乃遣之後帝使談鼓琴談見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦亙談者望能以忠直導主而令朝廷耽悅鄭聲臣之罪也通鑑東光武紀李沖初薦李彪既彪自以結知人主不復藉沖稍稍踈之唯公坐斂衽而已無復宗敬之意沖浸銜之乃積其前後過惡禁彪於尚書省上表劾彪專恣無忌尊已忽物聽其言如振古忠恕之賢按一作校其行實天下佞暴之賊齊明紀翰林學士兩省官舉令録除官之日仍署舉者姓名若貪穢敗官並當連坐同上五代周世宗紀初郡將范津薦傅燮及津為漢陽與燮交代合符而出後傅燮傳袁氏樹恩四世門生遍於天下魏志袁紹傳郤詵為尚書左丞推奏吏部尚書崔洪洪曰舉詵而還奏我此所謂挽弓自射晉史嚴綬統臨三鎮皆號雄藩綬所辟士親睹為將相者九人唐書錢徽舉送覆試多不中選貶官賈餗三典貢舉多得名卿宰相本傳馮裔孫即裴皞門生清泰初裔孫知舉放榜後引新進士謝皞皞書一絶曰官塗最重是文衡天與愚夫立盛名三主禮闈今八十門生門下見門生五代史晉相桑維翰裴皞門生嘗謁皞皞不迎不送或問之答云皞見維翰於中書則庶僚也維翰見皞於私館則門生也何迎送之有五代史傳記杜審權大中十二年知舉收盧處權有戲之曰坐主審權門生處權麟符二年崔沆放崔瀣談者稱座主門生沆瀣一氣南部新書唐李逢吉知貢舉榜未放而入相及第人就中書見座主因話録鄭薰主文誤謂顏標乃魯公之後以為狀元或嘲之曰主司頭腦太冬烘錯認顏標一作標作魯公托言狀元已下到主司宅下馬綴行而立斂名紙通呈與舉主對拜主事云謝衣鉢托言集手持文柄高視寰海劉禹錫一日聲名遍天下滿城桃李屬春官劉賓客貞元中奏詔考定賢良草澤之士升名者十七人及禮部擢進士第者七十有二鸞鳳杞梓舉集權公之門所擢登輔相之位者前後十人楊嗣復撰權德輿文集使操刈楚之柄權德輿集本朝欲知君得人失者亦稱善東坡
