body:
  text: 事反所料經眇能視跛能履易履卦家人嗃嗃悔厲吉婦子嘻嘻終吝家人卦天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽卦東鄰殺牛不如西鄰之禴祭實受其福既濟卦互見物薄用車子曰危者安其位者也亡者保其存者也亂者有其治者也係辭並易君子淡以成小人甘以壞記表記莫見乎隱莫顯乎微同上中庸夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉君子之道暗然而日章小人之道的然而日亡並同上齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之語季氏互入富不如貧子以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啓王子比干孟子告子上生於憂患而死於安樂告子下生無一日之歡死有萬世之名列子楊朱篇以瓦注者巧以黃金注者昏莊子以瓦摳者巧以黃金摳者惛列子黃帝篇天下莫相憎於膠漆而莫相愛於冰炭膠漆相賊冰炭相息也淮南子說山訓善游者溺善騎者墮淮南子或欲利之適足以害之或欲害之乃反以利之利害之反禍福之門戶不可不察也淮南子人間訓互見致察史天下君王至于賢人衆矣當時則榮沒則已焉孔子布衣傳十餘世學者宗之史記孔子世家雍造怨而先賞兮丁繇惠而被戮西漢班固傳白頭如新傾蓋如故同上鄒陽傳譬如水火相滅亦相生也仁之與義敬之與和相反而皆相成也西漢藝文志千鈞浮而錙銖沈漢書柔能制剛弱能制強東漢臧宮傳桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有德也通監漢殤紀昔之為我哺乳之子孫者今盡是我飲血之寇讎也同上漢獻紀武后以易得人德宗以精失士唐書陸贄傳傳記昔秦攻齊令曰有敢去柳下季壠五十步而樵採者罪死不赦有能得齊王頊封萬戶由是觀之生王之頭不如死士之壠戰國策馬援以薏苡興謗王陽以囊衣邀名續漢書有聲之聲不過百里無聲之聲延及四海說苑政理篇順帝時京師謠曰直如弦死道邊曲如鉤乃封侯風俗通集桑穀之妖反為福於大戊大鳥之慶竟成禍於帝辛李太白集互入禍福倚伏堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽叟之舜鯀之禹習非不惡也而卒為聖韓文原性自古多有以功德得其位者不得常祀勾龍棄孔子皆不得位而得常祀然皆不如孔子之盛韓文孰謂少者歿而長者存強者夭而病者全耶韓祭文至柔反成堅韋應物篇啇之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽柳文富貴亦有苦苦在心危憂貧賤亦有樂樂在身自由白樂天集蘇武卻生返鄧通終死飢杜牧之百勝難慮敵三折乃良醫劉賓客本朝紛華暫時好俯仰浮雲散淡泊味愈長始終殊不變歐公集物固有以安而生變兮亦有以用危而求安東坡賦吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也東坡剛說互見履而後知凡有物必歸於盡而恃形以為固者尤不可長雖金石之堅俄而變壞至於功名文章其傳世垂後猶為差久東坡墨妙亭記周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足以樂乎此矣東坡上梅直講書稽天之潦不能終朝而一線之溜可以穿石東坡注金無全巧竊發或中鵠山谷后皇蒔嘉橘中歲多成枳同上白頭無故意異代有同音後山互見離合無親踈蔡天申得溫公撰呂獻可墓銘以獻王安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見録信而見疑忠而被謗經遇主于巷易睽卦伊川云巷委曲之塗也不自我先不自我後詩正月胡不自北胡不自南何人斯史遭陽九之厄百六之會西漢王莽傳集正丁厥時選新論適丁民之有是時也韓文子樹欲靜而風不停子欲養而親不待家語致思人莫不欲富貴全壽而未有能免於貧賤死夭之禍也心欲富貴全壽而貧賤死夭是不能至其所欲至也韓非子解老日月欲明浮雲蓋之叢蘭欲秀秋風敗之文子史晉羊祐曰天下不如意常十居七八晉本傳謝安雖受朝寄東山之志始末不汽及鎮新城造泛海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失晉書本傳集值風雲之會時邁齒臷文選吳季重箋可惜歡娛地都非少壯時杜詩耳聾目昏後堂上調絲竹齒牙缺落時盤中堆酒肉彼來此已去外餘中不足白樂天榮名與壯齒相避如朝暮時命始欲來年顏已先去同上繫官于朝願莫之遂韓文虛逢好陽艷其那若昏懵元微之集本朝為政一年疾病半之東坡撰溫公神道碑脂車秣馬試長道一日百里先自期不知中途有陷阱山高日暮多棘茨欒城集書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開後山好景難逢良會少倦游録經苖而不秀者有矣夫秀而不實者有矣夫語子罕子天地無全功聖人無全能萬物無全用列子天瑞故羽翼美者傷骨骸枝葉美者傷根莖能兩美者天下無之也淮南子詮書訓堯無子舜無父不如堯父舜子也楊子史肥義曰吾欲全吾言安能全吾身史記趙世家豫之齒者去其角傳其翼者兩其足西漢董仲舒傳遷之博物洽聞而不能以知自全同上司馬遷贊范滂之母曰既有令名復求壽考可兼得乎東漢范滂傳忠孝之節道不兩立東漢袁紹傳晝長則宵短日南則景北天且不堪兼況以人該之同上張衡傳夫人才行少能相兼通監漢和紀忠臣不為孝子吳志恤遠者略近事外者簡內也通監魏明紀晉羊祐曰天下不如意事十常居七八通監晉武紀互入事與願違周處曰忠孝之道安得兩全既辭親事君父母安得而子乎晉書本傳互見徇公忘私自古忠賢工謀於國則拙於身多矣唐書王忠嗣傳養由基射能穿札不止鄢陵之奔陸機識能辨亡無救河橋之敗唐魏元忠傳傳記意不並鋭事不兩隆盛於彼者必衰於此長於左者必短於右說苑父賢不過堯而丹朱傲子賢不過舜而瞽叟拘兄賢不過舜而象傲弟賢不過周公而管叔誅臣賢不過湯禹而桀紂伐韓詩外傳四足者無羽翼戴角者無爪齒大戴禮易本命篇明月之珠不能無考不平也夜光之璧不能無纇史通取悅小人見嗤君子同上翟備五色而翱翥百步肌豐而力沈也鷹隼無采而翰飛戾天骨徑而氣猛也文心雕龍集尺有所短寸有所長智有所不明數有所不逮神有所不通楚辭甘瓜抱苦蒂美棗生荊棘古詩瞽叟清耳而無伶倫之察選連珠麗物苦僞醜器多牢魏阮瑀文質論良辰美景賞心樂事四者難并謝靈運擬魏太子鄴中詩集序耀乘之珠不能無纇連城之璧不能無瑕陸贄奏議人生半哀樂天地有順逆杜詩荔枝非名花牡丹無甘實白詩郎明月清風三五夜萬人行樂一人愁同上既竊時名又欲叨時之富貴使己為造物者肯兼與之乎白傳集詞人命薄多無位戰將功高少有文同上以楊馬之才則不知教化以荀陳之道則不知文章柳冕論文互見得此失彼同涉于川其時在風沿者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄劉賓客互入所遇不同光武出於支庶少康不及君親王維集日月高明有時傾昃珠玉貞潔不免疵瑕歐陽詹文全功難持大名難堅日赫於晝而乏清媚月皎於夜而無溫照李文饒鵰鷹不傳之以馳騁驊騮不授之以騫翥同上周勃霍光雖有勳伐而不知儒術枚皋嚴忌善為文筆而不至廊廟貴則近禍富多不仁並同上及親之貴自古罕兼老萊則空耀綵衣多慚紱冕潘嶽則惟稱壽酒固乏鼎彝司空表聖文賢不必貴壽不必賢皇甫湜集荊璧不能無瑕隋珠不能無纇唐文粹譽高千載道屈一時天乎與才人乎無命同上本朝君子之學或施之事業或見於文章而常患於難兼也蓋遭時之士功烈顯於朝廷名譽光於竹帛故其常視文章為末事而又有不暇與不能者焉至於失志之人窮居隱約苦心危慮而極於精思與其有所感激發憤惟無所施於世者皆一寓於文辭故曰窮者之言易工也如唐之劉柳無稱於事業而姚宋不見於文章彼四人者猶不能於兩得況其下者乎歐文韓簡肅公文集百世一人千載一時惟時與人鮮儷常奇東坡祭司馬君實文惟有文為不朽與有子為不死雖富貴壽考之人未必皆有此二者也東坡祭柳子厚文耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變東坡詩故教窮到骨要使壽無涯同上漢之賈誼談論俊美止於諸侯相而陳平之屬實為三公唐之韓愈磊落終於京兆尹而裴度之倫實在相府夫陳平裴度未免謂之不文而韓愈賈生亦常悲於不遇蓋人之於世美惡必有所偏而天之於人賦豫亦莫能備欒城集互見事反所料從昔嬋娟多命薄陳後山
