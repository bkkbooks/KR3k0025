body:
  text: 先容子墨者夷之因徐辟而求見孟子孟史衛鞅因景監求見孝公通鑑周顯王紀有人先游西漢鄒陽傳師古曰先游謂進納之也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也前鄒陽傳有人先談則枯木朽株植功而不忘同上經即鹿無虞惟入于林中易屯卦注雖見其禽而無其虞徒入于林中其可獲乎史布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相盻之跡矣西漢鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劍相盻者何則無因而至前也同上莫我為先酈食其傳非有仄室之勢以豫席之也賈誼傳注為之資籍也古今用人必因媒介若行成者無先容也唐張行成傳集無介紹之道安從行乎公卿四子講德論非有因人陳子昂傳無階而進坐致於青雲同上昔殷之高宗得良弼於宵寐孰左右者為之先容信天同而神比韓文感二鳥賦不叩而響不介而合柳啓感激自致其間無因呂和叔文經直往則違易略例上注即鹿無虞之例是也獨行踽踽詩杕杜史無一日之雅左右之介前谷永傳孤特寡助前鄭昌上書訟蓋寬饒曰上無許史之屬下無金張之託通監漢宣紀無公輔一言之薦左右為容之助後馬援傳孤立群貴之間傍無一言之佐東漢傳記被褐懷玉無由自陳史通蓽門寒族百代無聞同上集萬族各有託孤雲獨無依選貧土詩援引乏姻婭韓詩臺閣多官員無地寄一足韓文外無蚍蜉蟻子之援張中丞傳後族親鮮少無扳聯之勢於今不善交人無相生相死之友於朝朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乘機抵巇以要權利同上入門無為言之侶出谷罕求聲之援唐文粹天和蒸物燕谷不被其煦一鄒子尚能恥之柳文攀驥逸而無由仰鵬飛而自失駱賓王鄉曲無知己朝端乏親故伊誰為揚雄一薦甘泉賦孟浩然朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家灌溉所不沾文粹堂上百里鬷明無撤器之因門下三千毛遂乏處囊之地同上駱谷春深未有容元微之集僕短馬瘦言簡行孤為驕閽之所排訶並同上經初登于天後入于地易明夷卦入于幽谷幽不明也困卦子下喬木而入於幽谷孟史長材廣度沈跡下僚唐張淮傳集判司卑官不堪說未免箠楚塵埃間韓文不脫吏部選可見偶與奇同上祿不及伐冰政不及專達柳文本朝只有黃楊厄閏年坡詩史獨湮鬱兮其誰語史賈誼傳莫大扼掔上音厄下古院字西漢郊祀志不得舒憤司馬遷傳戴盆何以望天同上久挫於刀筆之前陳湯傳困於口舌不能以忠自明李光弼傳贊王忱曰阮籍胸中礨隗故須酒澆之世說集池魚籠鳥有江湖山藪之思潘安仁秋具賦習習籠中鳥舉翮觸四隅左太沖詠史詩想崑山之高嶽思鄧林之扶踈顧六翮之殘毀雖奮迅其焉如文選禰正平賦愁洽百年苦溢千歲何異促鱗之遊汀濘短羽之棲翳薈七命朗璞蒙垢不能吐暉連珠看雲一悵望失水任呼號杜晴天欲照盆難及貧女如花鏡不知拖肩吾詩獨結臣舌喑抑銜冤一辭莫宣柳乞巧文譬如囚拘圜土一遇和景負墻搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出豈復能久為舒暢哉柳文懷痛窮天死不瞑目跡卑易枉無路自明並劉賓客應似朱門歌舞妓深藏牢閉後房中白傳集籠禽日月長同上韜舌辱壯心叫閽無助聲杜牧之恨無羽翼高飛翔同上除非吞聲別無赴訴同上聞天無路文粹經困于石據于蒺藜易困卦狼跋其胡載疐其尾詩狼跋老狼有胡進則躐其胡退則跲其尾進退有難上文注子田原不遇歲事君不遇世擯於鄉里逐於州部莊達生史動而見尤司馬遷傳生則為窮人死則為冤鬼天廣而無以自覆地厚而無以自載蹈陸土而有沉淪之憂立巖墻而有鎮壓之患東漢鄧榮傳舉趾觸罘罝動行絓羅網畢網加上機穽在下思飛不得欲鳴不可舉頭畏觸搖足恐墮內獨怖急乍冰乍火東漢趙一傳叫閽弗聽叩鼓弗聞新唐史徐有功傳傳記上畏鷹鸇下畏網羅說苑正諫篇集下堂兮見蠆出門兮見螽楚辭退靜默而莫豫知兮進號呼又莫吾聞同上出門無通路枳棘塞中途左太沖詠史舉手挂羅網動足觸機陷陳孔璋檄每愁悔吝作如覺天地窄杜出門即有礙誰謂天地寬孟郊絶糧於陳畏於匡毀於叔孫奔走於齊魯宋衛之郊韓文荀卿逃讒于楚廢死蘭陵韓文公不見信於人私不見助於友跋前疐後動輒得咎進學解吾蕩而趨不知太行之異乎九衢以敗吾車吾放而遊不知呂梁之異乎安流以沒吾舟吾足蹈坎井頭抵木石衝冒榛枳僵仆虺蜴柳愚溪對如陷還濘動而愈沉劉賓客縱我生羽翼網羅方縶維元微之集一列朝士籍遂為世網拘高有繒繳憂下有陷阱虞每覺宇宙窄未嘗心體舒白侍郎捨虎逢豺狼文粹姜子牙少貧賣漿值天涼屠牛賣肉值天熱而肉敗白帖天上猶有礙何況地上身元微之集本朝顏杲卿張巡之徒世治則擯斥方外沈抑下僚世亂則委棄孤城齏粉寇手通監唐紀司馬溫公論每言處世窮困所向輒值墻谷無一遂者東坡文經我即爾謀聽我囂囂詩板誨爾諄諄聽我藐藐匪用為教覆用為虐詩抑子彼非所明而明之莊子齊物篇注云是猶對牛鼓簧耳彼竟不明宋人資章甫而適諸越越人斷髮文身無所用之莊逍遙遊大聲不入於里耳莊子注非委卷之所尚道堯舜於戴晉人之前莊子徵羽之操不入鄙人之耳淮南子說林訓楚人和氏得玉獻厲王王使玉人相之曰石也王以和為詐而刖其左足及武王又獻之玉使玉人相之曰石也王又以為詐而刖其右足和乃抱璞而泣於楚山之下韓非子夫歌采麥發陽阿鄙人聽之不若延路陽局延路陽局鄙歌曲也非夫歌者拙也聽者異也淮南子人間訓魯人善制冠妻善織履往徙於越而大困窮以其所修而遊不用之卿說山訓史明月之珠夜光之璧以暗投人於道衆莫不按劍相盻西漢鄒陽傳未遇知己道不同耳通鑑漢明帝紀至音不合於衆聽東漢初賈妃之為太子妃也嘗以妬殺數人武帝怒楊后曰賈公閭有大勳又豈可遽忘之耶妃由是得不廢數誡厲妃妃不知后之助己返以后為構己於武帝更恨之及帝即位賈后不肯以婦道事太后通鑑晉惠紀表龍章於祼壤奏韶舞於聾俗晉書傳記雖濬發於巧心反受嗤於拙目史通集受嗤於拙目文選文賦悲楚人之和氏獻寶玉以為石韓文幕中之辨人反以汝為叛臺中之評人反以汝為傾韓文言齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之而能使鬼神上下吾鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利於求韓文答陳商書雖家置一喙以自稱道詬益甚耳柳文居塗泥若蚓蛭然雖鳴其聲音誰為聽之同上雖家至而戶曉秪以招尤而速纍韓文感二鳥賦古調雖自愛今人多不彈向君投此曲所貴知音難劉長卿本朝我持玄圭與蒼璧以暗投人渠不識山谷古調俗不樂正聲公自知詩話經我躬不閲遑恤我後詩子身之不能治而何暇治天下乎莊子天地史吉不能亢身焉能亢宗左昭元年范獻子曰老夫其國家不能恤敢及王室昭二十四年魏主曰龜鱉水豎自救不暇通鑑宋紀本朝先定者可以謀人不先定者自謀常不給東坡思治論
