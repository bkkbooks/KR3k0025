body:
  text: 阿附子為人臣見非不爭以陷主於危亡罪之大者也孔叢子史范宣子天子所右亦右之所左亦左之左襄十一張湯專阿主意主意所不欲因而毀之主意所欲因而譽之史伋黯傳淳于髡以承意觀色為務史本傳趙高獻鹿謂之馬二世問左右此乃鹿也皆曰馬也史李斯傳大將軍以和柔自媚于上史衛青傳阿色人主與俱上下西漢酷吏傳杜周大抵放張湯善候司專以人主意指為獄西漢本傳欲有所為微見風采黨與承意而顯奏之西漢王莽耿育曰隨指阿從以求容媚通鑑本傳湯為人多詐舞智以御人時上方鄉文學湯陽浮慕事董仲舒公孫洪等通鑑漢武帝紀即上意所欲罪與監史深禍者即上意所欲釋與監史輕平者同上谷永知鳳方見柄用陰欲自託同上張禹曰新學小生亂道誤人宜無信以經術斷之上雅信愛由此不疑王氏通鑑漢成帝紀上故令董賢私過孔光光警戒衣冠出門待望見賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賓客均敵之禮上聞之喜通鑑漢平帝紀胡廣遜言恭色以取媚於時旡忠直之風天下以此薄之同上漢靈帝紀弘農太守良承樊豐等旨遣吏於陝縣留停楊震喪露棺道側謫震諸子代郵行書道路皆為隕涕同上漢殤帝紀氶望風旨東漢孔融傳馬融懲於鄧氏不敢復違忤勢家遂為梁冀草奏誣李固又作大將軍西第頌頗為正直所羞東漢本傳班固為竇憲中護軍征胸奴與參議及憲敗固死獄中東漢本傳夏侯玄下廷尉鐘育案治玄正色責育曰吾將何罪卿為今史責人也卿便為吾作育以玄名士節高不可屈而獄當竟夜為作辭令與事附流涕以示玄通鑑高貴鄉公王導每發言一坐莫不贊美晉王述傳上謂劉德願曰卿哭貴妃悲者當厚賞德願應聲慟哭撫膺劈踊涕泗交流上甚悅故用豫州剌史以賞之上又令醫術人羊志哭貴妃志亦嗚咽極悲他日有問志者卿那得此副急淚志曰我爾日自哭亡妾耳通鑑宋世祖徐爰便辟善事人巧於將迎始終無迹同上宋太祖紀刀筆之吏順旨承風舞文弄法曲成其罪同上唐太宗李績入見上問之曰朕欲立武昭儀為后褚遂良固執以為不可遂良既顧命大臣事當且已乎對曰此陛下家事何必更問外人上意遂決許敬宗宣言於朝田舍翁多收十斛麥尚欲易婦況天子立后何豫諸人事而妄生異議乎通鑑唐高宗侍御史傳遊藝帥關中百姓九百餘人詣闕上表請改國號曰周賜皇帝姓武氏太后不許擢遊藝為給事中通鑑唐武后周利用冉祖雍李俊宋之遜姚紹之皆為三思耳目時人謂之五狗通鑑唐中宗紀上官婕妤及後宮多立外第出入無節朝士往往從之遊處以求進達安樂公主尤驕橫宰相以下多出其門通鑑唐睿宗楊回譖太子瑛鄂王瑤光王琚云潛構異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃決通鑑唐元宗高力士於西京作寶壽寺鍾成力士作齋以慶之舉朝畢集擊鐘一杵施錢百緍有求媚者至二十杵少者不減十杵同上太子通事舍人李涉知上於吐突承璀恩遇未衰乃投匭上疏稱承璀有功久委腹心不宜遽棄通鑑唐憲宗李齊運甘言阿匼唐書馮道前事九君未嘗諫諍五代史集依阿無心選論屈節若四體之無骨潘安仁西征賦本朝蘇舜欽監奏院因十月賽神會館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同會者皆坐斥劉謂時宰賈昌朝曰與公一網打盡倦遊録經小人難事而易説也説之雖不以道説也語子路子與讒諂面諛之人居國欲可得乎孟子告子上史沈於諂諛之辭鄒陽傳衛侯言計非是而群臣和者如出一口夫不察事之是非而悅人讚己暗莫甚焉不度理之所在而阿諛取容諂莫甚焉通鑑周紀互見諂諛信椒蘭之唼音妾佞西漢反騷譽諛之聲日滿於耳虛美熏心實禍蔽塞同上路溫舒傳信任親愛者盡佞諂容説之人也通鑑漢獻帝紀文中子曰見譽而喜者佞之媒也通鑑隋紀以百口百心之讒諂蔽兩耳兩目之聰明荀非鐵腸石心安得不惑唐史臣元宗贊集耳飽從諛之説選序諸公貴人既志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶韓文王君墓志孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加遠矣皆好其聞命而奔走者不好其直己而行道者同上上張建封書本朝近者士大夫皆有僣侈無厭之心動輒欲人以周孔譽己自孟子以下者皆憮然不滿也東坡答李豸書經志氣塞乎天地記孔子間居不隕穫於貧賤不充詘於富貴記儒行互見有守衣敝縕袍與衣狐貉者立而不恥者其由也歟論語子罕子居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道孟子古之賢士樂其道而忘人之勢故王公不致敬盡禮則不得亟見之盡心下夫志氣之帥也公孫丑上我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之間同上説大人則藐之勿視其巍巍然盡心下互見藐視彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉公孫丑下志士不忘在溝壑並孟子㫝太行之險猶步仞之丘子華子志意修則驕富貴道義重則輕王公荀子堂高數仞榱題數尺我得志弗為也食前方丈侍妾數百人般樂飲酒驅騁田獵後車千乘我得志弗為也盡心下孟子曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而況可召與同上萬章下互見自負視三釜三千鐘如鸛雀蚊虻相過乎前也莊子旁日月挾宇宙齊物論揮斥八極田子方項羽不學一藝韓信不營一餐劉子比崇高於贅疣方萬物乎蟬翼抱朴子至理論子高遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨別文節流涕交頤子高抗手高揖而巳其徒問之高曰始吾謂二子丈夫耳乃今知其婦人也人豈鹿豕也哉而常群聚乎孔叢子超江淮以為尋常之溝淮南子史子有四方之志左傳僖十四年常有大度不事家人生産作業通監秦紀豪傑吏聞沛令有客皆往賀蕭何為主進令諸大夫曰不滿千錢坐堂下高祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢吾亦欲東耳安能鬱鬱久居於此哉同上漢高紀郭解以軀借交報仇史遊俠傳項籍學劍不成季父梁怒之籍曰劍一人敵不足學學萬人敵耳西漢本傳好倜儻大節西漢朱雲傳趙溫曰大丈夫當雄飛安能雌伏東漢本傳簡易佚蕩西漢楊雄傳互見簡易許汜與劉備語曰陳上龍湖海之士豪氣不除汜過下邳見元龍無客主之意不相與語自上大床臥使客臥下床備曰今天下大亂君須憂國忘家有救世之意乃求田問舍言無可采是元龍所諱也何緣當與君語如我自臥百尺樓上臥君於地下奚但上下床之間哉東漢陳球傳互見藐視後漢誅黨錮李膺杜密等侍御史景毅子事膺而未在録牒不預難毅曰本令子事膺是尊李公之道今遇難豈苟免乎遂自劾同上本傳梁竦曰大丈夫居世生當封侯死當廟食同上本傳延岑曰男兒當死中求生可坐窮乎通鑑漢光武紀大丈夫處世當掃除天下安事一室東漢陳番傳馬實曰幸生盛明之世免磚瓦之姿託為丈夫當建名千載不可為空生徒死之物穢天壤之間後漢謝承傳男兒要當死於邊野以馬革裹尸還葬耳何能臥床上在兒女子手中耶同上馬援傳班超家貧為官傭書嘗輟筆曰丈夫無他志略猶當效傳介子張騫立功異域以取封侯安能久事筆硯間乎左右笑之超曰小子安知壯士志哉東漢本傳鄧艾少家貧每見高山大澤規度指畫軍營處所魏志任城王彰謂左右曰大丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號爾何能作博士耶同上蜀劉巴曰大丈夫當交四海英雄蜀志慨然有飲馬河洛之志同上諸葛亮傳秦王猛倜儻有大志不屑細務人皆輕之猛悠然自得聞亙溫入關被褐詣之捫虱而談當世之務旁若無人通鑑晉書互見藐視周顗曰今年殺賊奴王敦取金印如斗大繫肘晉書本傳勝氣籠霄同上韓伯傳論亙玄曰劉毅家無簷石之儲樗蒲一擲百萬通鑑晉紀用宇宙而成心借風雲以為氣南史隱逸序宗愨常言願乘長風破萬里浪通鑑宋紀曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拓弓弦作霹靂聲箭如餓鴟叫平澤中逐麞數肋射之渴飲其血飢食其肉甜如甘露漿覺耳後塵風鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此邑邑使人氣盡南史齊書本傳裴橫之為吳興太守歎曰大丈夫富貴必作百幅被同上梁書輕天下細萬物北史隱逸序高昂專事馳騁每言男兒當橫行天下自取富貴誰能端坐讀書作老博士也同上本傳李弼曰丈夫生世會須履鋒刃以取功名安能碌碌依階以取仕北史後周本傳李靖常曰丈夫遭遇要當以功名取富貴何至作章句儒唐書本傳丈夫意氣相期勿以小嫌介意吾終不信讒言以害忠良通鑑唐高祖紀馬燧曰丈夫當以功業聞四海渠老一儒哉唐書本傳史弘肇云安朝廷定禍亂直須長鎗大劍安用毛錐子五代史傳記李泌少為詩曰天覆吾地載吾有意無不然絶粒升天衢不然鳴珂遊帝都安能不貴又不去空作昂藏一丈夫李鄴侯家傳韓熙載舉進士投書李升曰釣大鰲者不投取魚之餌斷長鯨者焉用割雞之刀又云腰有劍而袖有捶口有舌而手有筆南唐遺事逄萌為縣亭長縣尉過迎拜問事尉去舉揗擲地嘆曰丈夫安能為人後耶遂去學問東觀漢紀集橫四海兮焉窮楚辭高志局四海左太沖詩何不策高足先據要路津無為守窮賤轗軻長苦辛文選古詩長劍倚天外彎弓挂扶桑宋玉舉泰山以為肉傾東海以為酒文選曹子建書狹六合而隘九州曹子建七啓謂旁若無人左太沖詠史詩長嘯激清風志若無東吳同上吞若雲夢者八九於其胸中曾不帶芥司馬子虛賦猶輕五車富未重一囊貧駱賓王非其道萬鍾不足豐也非其榮五鼎不足餘也陳子昂集丈夫四海志交頤非贈別之資駱賓王氛埃期必掃蚊蚋焉能當杜工部詩氣衝看劍匣穎脫撫錐囊同上丈夫四方志安可辭固窮同上安得覆八溟為君洗乾坤飲酣眠八極俗物都茫茫萬古雲霄一羽毛直氣橫乾坤劉毅從來布衣願家無儋石輸百萬使君意氣凌青霄欲傾東海洗乾坤會當凌絶頂一覽衆山小倚賴天涯釣猶能掣巨鰲飲如長鯨吸百川銜杯樂聖稱世賢氣與嵩華敵赤霄有真骨恥飲汙池津冥冥任所往脫略誰能馴歌笑輕波瀾氣衝星象表氣劘屈賈壘目矩賈釗墻威鳳高其翔長鯨吞九州並同上高視覺天卑元微之集因騎渡海鶻擬殺蔽天鵬一心吞渤澥戮力拔嵩常鋒鋩斷犀兕波浪蓬壺摩天氣直山曾拔並同上巨鰲莫載三山去我欲蓬萊頂上行李太白大鵬一日同風起摶搖直上九萬里假令風歇時下來猶能搊卻滄溟水一擊九千仞相期凌紫氛倒海索明月呼吸走百川燕然可摧傾叱吒開帝業手成天地功雄心日千里欲上青天攬明月意重泰山輕安得倚天劍跨海斬長鯨誓欲斬鯨鯢澄清洛陽水天地賭一擲長揖韓荊州六博爭雄好采來金盤一擲萬人開丈夫賭命報天子當斬胡頭衣錦回猛虎不看几上肉洪爐不鑄囊中錐並李太白踔厲風發率常屈其坐人韓文作柳宗元墓志囊無一金資翻謂富者貧同上爛死於泥沙吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也同上與韓舍人書肝謄一古劍波濤兩浮萍同上擇肉於熊羆肯視兔與狸同上互見決擇排雲叫閶闔披腹呈琅玕徑氣沮金石飲酒寧嫌盞底深題詩尚倚筆鋒徑同上韓文千金散盡還復來李白獨立堂堂高視前古劉長卿自矜倚劍氣凌雲卻笑聞笳淚如雨同上生當為大丈夫斷羈羅出泥塗四散號呶俶擾無隅埋之深淵飄然上浮騎龍披青雲泛覽遊八區經泰山絶大海一長吁西摩月鏡東弄日珠上括天之門直指帝所居皇甫湜我有一寸鉤欲釣千丈流孟郊天地入胸臆同上胸吞百川流孟東野酒腸寬似海詩膽大如天劉義壯志吞鴻鵠孟浩然安得凌風翰肅肅賓天京韋應物高論動侯伯踈懷脫塵喧同上興來書自聖醉後語猶顛高達夫我有醉卿劍玉鋒堪截雲同上入門下馬氣如虹氣如虹蜆飲如建瓴並同上一飲千鍾如建瓴杜牧之不看人面免低眉白樂天踏翻四海生塵埃溫飛卿有氣干斗牛同上江海豁開為氣岸張承吉嚴陵死後到李白布衣長萬乘君同上男兒重意氣百萬呵一擲同上男子受恩須有地平生不受等間恩杜荀鶴男兒兩行淚不欲等間垂同上賭取聲名不要錢劉賓客擲盧誇使氣同上官薄傲公卿同上睡當一席寬覺乃千里窄姚合不以雄名疏野賤唯將直氣折王侯王建詩丈夫非無淚不灑離別間仗劍對樽酒恥為遊子顏蝮蛇一螫手壯士疾解腕所思在功名離別何足歎陸龜蒙蓬萊頂上斡海水水盡到底看海空杜牧之坦腹對宰相岸幘揖天子皮日休五嶽為辭鋒四溟作胸臆同上豈欲皂櫪中爭食籺與葭元次山弄河移砥柱吞日倚扶桑李義山氣蓋全吳胸吞大魏唐尚馳撰諸葛亮碑氣蓋風雲張説撰宋璟碑嬰孩群有唐程浩上天鼓文須鑿燕然山上石登科記裏是間名姚合就中愛讀英雄傳欲立功勳恐不如王建振衣生羽翰高枕出塵埃呂和叔塊視三山杯觀五湖唐文粹悶向酒杯吞日月間將詩句問乾坤杜荀鶴泰山一擲輕鴻毛唐文粹古鐵倚天無處磨志磨青雲蓬視紫闥錙銖九有納陰山於寸眸拳大漠於一掌同上囊包天地渴飲四海同上幼負四方之志家無一擲之資意氣所傾英豪共感司空表堊本朝才大名高乃富貴豈比金紫包愚癡歐公集酒酣氣振猶見鋒鍔同上意氣與日爭光輝臨川集挾才乘氣不媚柔同上要將百篇詩一吐千丈氣東坡詩為君鑄作百鍊刀要斬長鯨為萬假吾豈羽毛為人所鷹安得萬頃池養此橫海鸇麾斥八極隘九州眼高四海空無人氣之所加則己大而物小於是乎受其至大而不為之驚納其至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之於天得之於不可知之間傑然有以蓋天下之人而出萬物之上上劉侍讀並東坡文誓將斬鯨鯢靜此滄海瀾子由詩王元之曰一回酒渴思吞海劉少逸曰幾度詩狂欲上天玉壺清話士生要弘毅天地為蓋軫黃魯直詩志大略細謹同上酒如長虹飲滄海筆若駿馬馳平阪歐公集得錢百萬送酒家一笑不問今餘幾黃魯直安得壯士霍嫖姚縳取呼韓作編戶王直方詩話酒腸天豫渾無敵梁欒城集四大海水一口吞陳後山詩
