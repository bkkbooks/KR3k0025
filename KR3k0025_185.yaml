body:
  text: 住持集緇徒擁膝迎孟浩然居室方丈名聞大千劉賓客方丈了無塵元微之涖法會主僧盟白傳集本朝領袖萬僧坡傳記夏時長養之節恐傷折草木踐履生蟲故九千日安居念道荊楚歲時記四月十五日乃法王禁足之辰釋子護生之日僧尼結夏又謂之結制解夏又謂之解制同上本朝休夏巾鉼誰與共欒城史魏作永寧寺有金像高丈八尺者一如中人者十玉像二為九層浮圖掘地築臺下及黃泉浮圖高九十丈上剎復高十丈每夜靜鈴鐸聲聞十里通鑑梁武帝天監十五年同泰寺浮屠災上曰此魔也宜廣為法事遂起十二層浮屠同上中大同元年集半雲躋寶塔時望盡京華坐覺諸天近空香逐落花孟浩然無憂王之建塔天輒雨花法苑珠林本朝魏明帝時於道東造周閭百舍名為官浮屠精舍見類要高僧傳曰康僧會赤烏十年至建鄴孫權使求舍利既得之即為造塔晉帝過江更修飾之此蓋中國造塔之始也事物紀原洛下齊城丹陽會稽並有阿育王塔類要佛滅後鐵輪王一日一夜役鬼神造八萬四千塔合儉史楚王英奉黃縑白紈贖罪詔還贖以助伊蒲塞桑門之盛饌通鑑東漢明帝紀竟陵王子良篤好釋氏招致名僧講論佛法親為衆僧賦食行水齊武永明二年高力士作寶壽寺鐘成作齋以慶之唐元宗天寶七載李太后在封禪寺曰吾嘗於此飯僧數萬五代晉少帝開運三年集真味推飴露衆香惟菹蘭文苑英華蔡希寂詩傳記寶林曰佛未涅槃時告迦葉曰吾清淨法眼以付汝寶林語録衣法相傳以為符印曹溪已後不聞此事圭峰禪注沙門釋道安立寺於太行弘贊佛法惠遠往歸之廬山記杜注遠法師傳達麼謂門人道育得吾骨慧可得吾髓傳燈録集解髻傳珠袖衣授寶梁陸陲天光寺碑佛法津梁俟子而入張正甫得傳燈之旨嚴郢作不空三藏碑弟子人天遍文苑英華二百二十三卷厥徒蒸蒸維大教是膺維憲言是徵漙慱恢弘如川之增如雲之興如嶽之不崩終古其承之柳文以心傳心天地不知唐蔣防文學徒百千如水歸海由其門而為天人師者皆脈分焉劉賓客傳記沙門衣鉢隨身譬如飛鳥長阿含經集擁錫來遊選寺碑釋子彌天秀獨步漢南來駱賓王其來也雲凝其去也風休韓文送令縱振錫如飛白玉輕劉賓客虛舟不繫物觀化遊江濱杖錫間來往無心到處禪並同上誰識往來意孤雲長自間劉長卿振錫而往其心浩然權載之遠鶴無前侶孤雲寄太虛錢起縱云孤鶴無留滯定恐煙霞不放回方雄飛去住如雲鶴飄然不可留同上間雲與孤鶴何天不可飛僧貫休九天飛錫四海浮杯王文度常住田記史太后欲造大像使天下僧尼日出一錢以助其功通鑑武后傳記度一人出家勝起寶塔至于梵天廣弘明功德經為一切人之檀越經律集一毛之施白集勝因化愚慧力攝慳劉賓客不住聲香味觸法布施故其福德若東南西北方四維上下不可思量矣張圭諫表本朝尋山百衲弊過海一杯輕法照送無著師集清淮無波平如席欄柱傾扶半天赤火燒水轉掃地空突兀便高三百尺影沈潭裏龍驚遁當晝無雲跨虛碧韓文傋樓架閣切星漢同上伐木輦土柳文披山伐木崇構法宇則地得其勝作精室不命而獻力不祈而薦貨並同上本朝曾遭劫滅壞今遇勝緣修臨川閻浮提國中悉皆歡喜兜率陀天上如是粧嚴石敏若文史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之雋甚相知賞晉郤超傳支遁與名士孫綽李光許詢等築室東土與王羲之同志宴集於會稽山蘭亭晉書白居易致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士唐書傳記晉惠遠見廬峰清淨足以息心始住龍泉精舍刺史亙伊乃為遠於山東立房殿即東林也絶塵清信之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢穎之南陽宗炳等凡百有二十三人並棄世遺榮依遠遊止高僧傳支遁在白馬寺與劉系之等談莊子逍遙群儒舊學莫不嘆伏高僧傳竺道生入廬山七年後止青園寺王弘范泰顏延之並挹敬風猷從之高僧傳遠法師送客過虎溪虎輒鳴號昔陶元亮居栗里山南陸修靜亦有道之士遠師嘗送此二人與語道合不覺過之因相與大笑今世傳三笑圖廬山記謝靈運求入淨社師以心雜止之范寧在豫章師請入社范不能從廬山記杜主遠師傳遠師結白蓮社以書招陶淵明陶曰弟子性嗜酒若許飲即往矣遠許之遂造焉因勉令入社陶攢眉而去廬阜雜記劉遺民慕遠公名德欲白首同社廬山記十八賢傳雷次宗立館東林僧房之東與遠公同社宗炳入廬山築室與遠公同社並同上集潮州有老僧號大顛頗聰明識道理實能外形骸以理自勝不為事物侵亂自以為難得因與往來及祭神至海上遂造其廬及來袁州留衣服為別韓文文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志韓文送文暢序昔者桑門上首好與賢士大夫遊晉宋以來有道林道安遠法師休上人其所與遊則謝安石王逸少習鑿齒謝靈運鮑照之徒柳文藩維大臣文武豪士令縱未始不褰衣負業往造其門下韓文他時若寫蘭亭會莫畫高僧支道林柳宗元作徹上人詩本朝白公在廬山與湊滿朗晦四禪師追永遠宗雷之迹為人外之交類要上二十一卷支遁與謝公為山水之遊竺法師與王文度為死生之約同上二十二卷王羲之在會稽聞支遁名未之信後遁還剡王詣遁觀其風力謂遁曰逍遙可得聞乎遁乃作數千言王遂披襟解帶留連不能已乃請住靈嘉寺意存相近同上浮屠祕演與吾友石曼卿交最久亦能遺外世俗以節相高二人歡然無所間曼卿隱於酒祕演於浮屠皆奇男子也然喜為歌詩以自娛一時賢士皆願從其遊歐公祕演詩集序惟儼學于佛而通儒術非賢士不妄交嘗曰吾不妄交人故能得天下士以此一時賢士多從其遊歐公雄儼文集序辨才老師退居龍井不復出入軾往見之常出至風篁嶺左右驚曰遠公復過虎溪矣辨才笑曰杜子美不云乎與子成二老來往亦風流東坡辨才老師詩前序佛者惠廑從歐陽公遊三十餘年公常稱之為聰明才智有學問者尤長於詩東坡廑上人詩集序史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始晉郤超傳傳記昔謝靈運恃才傲物少所推重一見遠公肅然心服乃即寺觀翻涅槃經因鑿為臺植白蓮池中名其臺曰翻經臺因號白蓮社廬山記慧遠法師碑謝靈運撰張野序同上記姚興欽風德遠輸施遺亙玄震主不覺致恭同前杜主遠法師傳遠公卒張野為序稱門人廬山記集歸到雙林親慧遠唐裴休詩嘗讀遠公傳永懷塵外蹤孟浩然詩傳記吳興僧晝字皎然工律詩嘗謁韋蘇州恐體不合乃於舟中作古體數十篇為贄韋公不稱賞明日寫舊製獻之韋大嗟嘆唐因話録集人言澄觀乃詩人一座競吟詩句新韓文戰詩無與敵浩汗橫戈鋋韓文送靈師令縱釋氏之秀者又善為文藩維大臣文武豪士有尊行美德建功樹業令縱從而為之歌頌送令縱無本於為文身大不及膽送無本文暢喜為文章其周遊天下凡有行必請於搢紳先生以求詠歌其所志解其裝得所敘詩纍百餘篇非至篤好其何能致多如是耶送文暢序多生修律業外學得詩名張文昌詩思竹間得道心松下生錢起本朝浮屠祕演喜為歌詩以自娛石曼卿尤稱祕演之作以為雄健有詩人之意歐公祕演詩集序惟儼雖學于佛而通儒術喜為辭章惟儼文集序間中用意歸詩筆臨川佛者惠廑從歐陽公遊三十餘年公嘗稱之為聰明才智有學問者尤長於詩東坡廑上人詩集序清言冰玉質壞衲山水紋後山史佛圖澄卒葬後郭門吏報石季龍云見師攜一履西去季龍發其墓唯見一履與一石趙録集識滅形全異凡死劉賓客燈續生前火爐添沒後香錢起寫留行道影焚卻坐禪身塔院關松雪經房鎖隙塵賈浪仙寶出山枯龍移水涸呂溫彌陀寺碑殘經窗下依然在劉文房寂寂靈塔滔滔逝川恆沙劫壞智月常圓李華碑宴坐示寂同上化緣既周跌坐報盡王諷僧碑飛鳥無迹法雷罷震獨孤及律師銘千載空雲山唐文粹烈烈英風橫飛西土兩楹夢奠雙樹變色同上海山不是吾歸處歸即應歸兜率天白居易詩見太平廣記本朝佛圖澄欲使人辭石虎曰焰幻之軀化期已及見類要上二十二卷昔本無生今亦無滅東坡集隱如寒月墮清晝空有孤光留故躔瑩然摩尼歸真于土霜顱隱白毫鎖骨埋青王皆云似達磨隻履還天竺同上後魏二十八祖達麼端居而逝葬熊耳山起塔於定林寺後三歲魏宋雲奉使西域回遇師于蔥嶺見手攜隻履翩翩獨逝雲問師曰西天去又謂雲曰汝王已厭世雲聞之芒然別師東邁暨復命即明帝已登遐矣逮孝莊即位雲具奏其事帝令啓壙惟空棺一隻革履存焉舉朝為之驚嘆奉詔取遺履於少林寺供養景德傳燈録集薪盡火滅歸真息假梁簡文帝文身壞口不壞舌根如紅蓮白侍郎焚卻坐禪身賈浪仙本朝玉骨隨薪盡空留一分香臨川空房但颼飀云已滅無餘薪盡火不留坡詩集緇素墜心棟梁落構李雍碑紹釋風於西域回佛日於東維李白祭璿和尚師之度世以定以慧為醫藥師救療一切白傳集福智壽臘天下一人靈芝無根霜竹有筠師身是假師心是真白傳集本朝欲向橫堂一揮淚翻思月落不離天可正平史太宗崩武氏隨衆感業寺為尼通鑑唐高宗永徽五年敕禁私度僧尼是歲天下尼一萬八千七百五十六後周世宗顯德二年傳記僧史略曰漢明帝既聽劉峻出家又聽洛陽婦女阿潘等出家此蓋中國尼之始也事物紀原集大明和尚卒弟子尼無染命僧靈嶼為行狀凡葬大浮圖未嘗有比丘尼主碑事今無染實來涕淚以求無染韋氏女世顯貴柳文郭代公愛姐薛氏幼嘗為尼白居易詩曰頭青眉眼細十四女沙彌步慵行道困起晚誦經遲應是仙人子小名仙人子花宮未嫁時長慶集生來未掃眉身輕禮拜穩心慢記經遲王建集女釋者柳文起廢答東晉何充始捨宅安尼此蓋尼寺之起也事物紀原本朝盡出花鈿散寶津雲鬟齊剪向殘春具葉乍翻疑軸錦梵宮音初學誤梁塵從茲艷質成空後湘浦都無解佩人詩話總龜
