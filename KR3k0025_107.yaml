body:
  text: 外氏經為外祖父母何以小功也以尊加也儀禮喪服母之考為外王父母之妣為外王母爾雅史王符無外家東漢本傳荀勗依舅氏十餘歲能屬文從外祖魏太傳鍾繇曰此兒當及其曾祖晉書魏舒少為舅氏寧氏所養營宅相者云當出貴甥魏舒尚幼自言曰當為外氏成此宅相晉書梁王筠清潔好學沈約見以為似外祖袁粲謂張稷曰王郎非惟額類袁公風韻都欲相似南史本傳溫造曰臣外五世祖李靖唐本傳楊於陵生子名嗣復韓滉撫其頂曰名與位皆踰其父楊氏之慶也嗣復傳滉其外祖也集假公威德當流慶於外孫白傳集劉總外祖母李氏制魏舒少孤長於寧氏周翼無託養在郤家白帖扶床小女君先識應此些些似外翁元微之集於僕為外諸翁同上外氏之世德存乎古史揚乎人言柳文內弟序沐外族之休光同上郤公不易勝莫著外家欺王建集本朝外氏清貧類要外家英俊場後山幼嶺詩經從母之夫舅之妻二夫人相為服君子未之言也或曰同爨緦記檀弓上史初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣左傳昭二十八言母多妾媵而庶子鮮少嫌母氏性不曠云云韋縚奏喪服舅絲麻三月從母外祖父母皆小功五月外祖至尊同於從母之服姨舅一等服則輕重有殊堂姨舅親即未踈恩絶不相為服舅母則承外族不如同爨之禮竊以古意猶有所未暢者也請加外祖父母為大功九月姨舅皆小功五月堂舅堂姨舅母並加至袒免通鑑唐紀韋述議曰母黨比於本族不可同貫明矣敕姨舅親既服小功舅母不得全降宜服緦麻堂姨舅宜服袒免唐紀經女子之子為外孫爾雅史楊惲司馬遷女子也惲始讀外祖太史公記頗為春秋西漢本傳司馬遷死外孫祖述其書遂宣布焉本傳諸葛亮誡外甥曰丈夫志當存高遠慕先賢絶情欲棄凝滯廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不強毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣梁王筠清潔好學沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非惟額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娛笑惟此一條不能酷似傳記樊重外孫何氏兄弟爭財重恥之以田二頃解其忿訟東觀漢記集爾為外曾孫倜儻汗血駒杜詩中郎蔡雍餘慶鍾羊祜雍之甥琰之子白傅集假公威德當流慶於外孫白傅集纍纍外孫有攜有嬰扶床坐膝嬉戲歡爭韓文本朝南山新長鳳凰雛眉目分明畫不如年少從他愛梨栗長成須讀五車書臨川贈外孫經渭陽康公念母也我見舅氏如母存焉我送舅氏曰至渭陽何以贈之路車乘黃詩渭陽注母不在既有肥牡以速諸舅寧適不來微我有咎伐禾母之晜弟為舅母之從父晜弟為從舅爾雅男子謂姊妹之子為出同上史陳厲公蔡出也左莊二十二姊妹之子曰出申侯申出也僖七子犯以璧授公子曰臣從君巡於天下臣之罪多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水僖二十四康公我之自出成十三鄭甥可襄十九得備彌甥也左哀二十三注彌遠也父之舅氏故稱彌甥公納夏戊之女為夫人其弟期太叔疾之從孫甥也哀二十五注姊妹之孫為從孫甥與同列汲黯字長孺司馬安是其姊子與黯同為太子洗馬史記霍去病衛青姊子也漢書荀勗父貯早亡勗依于舅氏岐嶷夙成十餘歲能屬文從外祖魏太傅鍾繇曰此兒當及其曾祖既長遂博學達於從政晉書王濟衛玠之舅也俊爽有風姿每見玠輒嘆曰珠玉在側覺我形穢衛玠傳王獻之兄弟自超郤未亡見愔郤嘗躡履問訊甚修舅甥之禮及超死見愔怠屐而候之本傳殷浩廢為庶人徙于東陽浩甥韓伯浩素愛賞之隨至徙所經歲還都浩詠詩曰富貴他人合貧賤親戚離本傳王忱弱冠知名嘗造其舅范寧謂曰卿風流雋望真後來之秀忱曰不有此舅焉有此甥本傳何無忌少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆參議之同上桓元曰何無忌酷似其舅通鑑晉紀舅謂劉牢之也韋縚奏舅小功五月堂舅加至袒免唐紀初陳郡謝重王胡之外孫也於諸舅敬禮多闕重子絢袁湛之甥也嘗於公坐慢湛湛正色謂曰汝便是兩世無渭陽情絢有愧色南史袁湛傳陳江總七歲而孤依于外氏幼聰悟有至性其舅蕭勱名重當時特所鍾愛嘗謂總曰爾操行殊異神采英拔後必知名李靖舅韓擒虎每與靖論兵嘆曰可與語孫吳者非斯人尚誰哉本傳王涯居翰林其甥皇甫湜中選考核之際不先上言坐貶同上傳記晉李繪神情朗俊邢晏曰宅相之寄良在三甥三國典略此館之興情鍾舅氏宜以渭陽為名世説上集賢甥俊彩酷似其舅陳子昂傳我異劉牢不減其舅李義山劉牢出外甥杜寧氏舅甥俱寂寞王建集本朝仍以安石之甥復見劉牢之舅臨川集經從母之夫舅之妻二人相為服君子未之言也或曰同爨緦記檀弓上從母之男子為從母晜弟其女子為從母姊妹爾雅史初臧宣叔娶于鑄生賈及蒍而死繼室以其姪穆薑之姨子也左襄二十三姪穆薑姨母之子與穆薑為姨兄弟符承祖方用事親姻爭趨附以求利其從母楊氏為姚氏婦獨否常謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂姊與之衣服多不受由是符氏內外號為癡姨通鑑齊太祖紀韋縚奏姨小功五月堂姨加至袒免同上唐帝紀經邢侯之姨詩碩人妻之姊妹同出為姨爾雅史蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也左莊十年傳記謝阿蠻善舞上就按於清元殿寧王吹笛上羯鼓妃琵琶秦國夫人端坐視之上戲曰阿瞞樂籍今日幸得供養夫人請一纏頭對曰豈有大唐天子阿姨無錢用耶遂出三百萬為一局楊妃外傳經男女及時也詩標有梅平王之孫齊侯之子何彼穠矣自納采至請期用昕親迎用昏匏有苦葉箋昏禮萬世之始也取於異姓所以附遠厚別也記郊特牲昏禮不賀人之序也序代也昏禮不用樂幽陰之義也同上大昏萬世之序也哀公問國君娶夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也祭統曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔曾子問昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徵請期昏義壻之父為姻婦之父為婚爾雅婦壻之父母相謂為婚姻同上婚禮用昏故經典多止作昏字記昏義箋子任薛王劉崔盧之昏非古也何以視譜任薛出黃帝王劉出舜崔盧出帝文中子史師服曰嘉耦曰妃怨耦曰仇左威二齊侯欲以文薑妻鄭太子忽辭人問其故太子曰人各有耦齊大非吾耦也威六年懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘莊二十二秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也僖二十三公子重耳如舊昏媾隱十一敝無存曰必娶高國左求昏而薦女昭五劉氏范氏世為婚姻哀三禮有納采采擇女之德性也其禮用鴈為贄者取順陰陽往來有問名問女名而卜之知吉凶也禮如納采有納徵徵成也納幣以成婚有告期告迎期四者備而後娶禮也穀梁莊公二十三年婚姻者居室之大倫史儒林傳又見西漢揚雄傳大將軍鳳連昏西漢王商傳如淳曰連昏者婚家之姻親也太后欲為重親孝惠張后傳有葭莩之故王莽傳世俗嫁娶太早未知為人父母之道而有子是以教化不明而民夭死聘妻送女亡節則貧人不及故不舉子西漢王吉傳阮修字宣子居貧四十未有室王敦等斂錢為婚皆名士也時慕之者求入錢而不得晉書本傳王珣娶謝萬女弟珉娶謝安女並不終由是與謝氏有隙謝琰傳侯景請娶於王謝上曰王謝門高非偶可於朱張以下訪之通鑑梁高祖衰世舊門誠何足慕而求與為婚雖多輸金帛猶為彼所偃蹇唐太宗紀山東士人尚閥閲後雖衰猶負世望嫁必多取資故人謂之賣昏唐書高士廉傳鄭崇高密大族世與王家相嫁娶西漢本傳師古曰女嫁王家男又娶也傳記溫嶠喪婦從姑劉氏家有一女甚有姿慧姑以屬公覓婚公報云已覓得婚處門地粗可壻身名宦盡不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜出説上子孫娶妻嫁女必擇孝悌世世有行義者大戴禮逸禮篇北平徐氏有女人多求不許陽公字雍伯試求焉徐氏曰能得白璧一雙來當聽為婚雍伯得五雙白璧徐氏遂以女妻之搜神記齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也風俗通漢武為膠東王年七歲長主抱膝上曰兒欲得婦否曰欲得長主指其女曰阿嬌好不曰好若得阿嬌作婦當作金屋貯之長主大悅乃苦要上定婚焉漢武故事集子當求婦其父如此誰肯嫁之者造求小姓足使生子虞翻與弟書潘楊之穆有自來矣文選潘安仁楊仲武誄孟光儻未嫁梁鴻正須婦王無功云云一村惟兩姓世世為婚姻生者不遠別嫁娶先近鄰白樂天詩徐州有朱陳村世為婚姻頗謂秦晉匹從來王謝郎杜詩不同牛女夜是配鳳凰年賈浪仙橋成烏鵲夜臺起鳳凰年沈雲卿文其女子聞教訓有幽間之德為公擇婦宜莫如盧氏韓文扶風夫人墓銘薦女請婚韓文集許國公本朝交秦晉之歡仰從嘉命望金張之館俯愧衰宗臨川集跂通德之門馳誠數仞敘宜家之慶拜貺尺書同上不將門戶賣崔盧坡詩
