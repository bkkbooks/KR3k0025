body:
  text: 延接經晝日三接易晉卦以貴下賤屯卦主人肅客而入記曲禮子吾所執贄而見者十人還贄而相見者三卜人貌執之士者百有餘人欲言而請畢事者千有餘人吾僅得三士焉以正吾身故上士吾薄為之貌下士吾厚為之貌上士中誠重之故可薄為之貌下士既無執贄之禮懼失賢士之心故厚為之貌尤加謹敬也荀子堯問篇史天下諸公子亦有喜七者矣然信陵君之接岩穴隱者不恥下交有以也名冠諸侯不虛耳史魏無忌傳楊惲好士自喜知人居衆人中常與人顏色史記建元以來侯者年表係孝宣時所封乃褚先生所作孟嘗君客無所擇皆善遇之人人自以為孟嘗君親已史記延為上客史晏平仲傳周公曰我一沐三握髮一飯三吐哺起以待士猶恐失天下之賢孟嘗君好事食客常數千人春申君客三千餘人皆躡珠履並史記公孫洪為宰相起客館開東閣以延賢人西漢本傳鄭當時為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人鄭當時傳于定國為人謙恭尤重經術士雖卑賤徒步輒過定國皆與鈞禮恩敬甚備西漢本傳丞相開東閣以延賢人與參謀議通監漢武帝紀韋元成謙遜下士出遇知識步行輒下從者與載送之西漢本傳謙恭愛士傾身引接慰藉良厚東漢隗囂傳陳寵為司空去籍通賓客以明無所不受論者大之東漢本傳皇甫嵩為三公以身起於汗馬常折節下士謝承傳陳蕃惟徐稚來特設一榻去則懸之陳蕃傳周璆唯蕃能致焉特為置榻去則垂之同上蔡雍見王粲而奇之時雍才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之東漢王符在門皇甫規素聞符名乃驚遽而起衣不及帶屣履出迎本傳士有被其容接者名為登龍門李膺傳揮沐吐餐垂接白屋高彪傳袁紹士無貴賤與之抗禮並東漢羊侃不飲酒而好賓游終日獻酬同其醉醒南史羊侃傳互見好客羊欣嘗詣領軍將軍謝鯤鯤拂席改服然後見之晉書王渾為安東將軍虛懷接納座無空席門不停謁江東之士悅附之晉紀瞻曰先王身下白屋搜揚仄陋使山無扶蘇之子野無伐檀之詠同上賈謐喜延士大夫郭彰石崇陸機弟雲和郁及榮陽潘嶽清河崔基渤海歐陽建蘭陵繆徵京兆杜斌摯虞琅琊諸葛詮弘農王粹襄城杜育南陽鄒捷齊國左思沛國劉讓周恢安平索秀穎川陳眕高陽許猛彭城劉訥中山劉輿輿弟琨皆附於謐號曰二十四友通監晉惠帝紀張建封性樂士賢不肖遊其門者禮必均故其往如歸唐書本傳傳記陳仲舉為豫章太守至便問徐孺子所在欲先看之世說上司農受客戒無留門丞相延賓使常開閣白帖捧銅盤而盟平原之賓二十躡珠履而會春申之客三千同上集重士踰山左太沖魏都賦公子敬愛客終宴不知疲曹子建公宴詩許與氣類王文憲集序年勢不侔公與之抗禮文選序集延之上座韓文主人才且賢重士百金輕韋應物集有地先開閣何人不掃門劉長卿集卻訝繡衣人仍交布衣士同上屈富貴於沈冥雜薜蘿於簪笏陳子昂集見我顏色溫杜詩解榻招徐稚登樓引仲宣元微之集本朝歐陽公喜士為天下第一冷齊夜話互見樂善蘇明允至和間來京師既為歐陽公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為異禮石林燕語子說大人則藐之勿視其巍巍然孟子互見氣概彼以其富我以吾仁彼以其爵我以吾義吾何歉乎哉孟子公孫丑下孟子為卿於齊出弔於滕王使王歡為輔行王歡朝暮見反齊滕之路未嘗與之言行事也同上史毛遂曰公等録録音碌所謂因人成事者也史記平原君傳何足置齒牙間哉西漢叔孫通傳說丞相弘下之如發蒙耳西漢淮南王安傳通監載伍被曰說丞相弘等如發蒙振落耳更始見趙喜曰繭栗犢豈能致遠乎東漢許汜與劉備語曰陳元龍淮海之士豪氣不除汜過下邳見元龍無客主之禮不相與語自上大床臥使客臥下床備曰今天下大亂君須憂國忘家有救世之意乃求田問舍言無可采是元龍所諱也何緣當與君語如我自臥百丈樓上臥君於地下何但上下床之間哉東漢陳球傳注崔琳曰大丈夫為有邂逅耳即如卿諸人良足貴哉通監東漢黃忠為後將軍關羽聞黃忠位與已竝怒曰大丈夫不與老兵同列不肯受拜時拜羽為前將軍也通監漢獻帝紀互入尚氣或問禰衡曰盍從陳長文司馬伯達乎曰吾焉能從屠沽兒耶又問荀文若趙稚長云何曰文若可借面弔喪稚長可使監廚東漢本傳注典略曰衡見荀儀容但有貌耳故可弔喪趙有腹大健噉肉故可監廚也張飛嘗就劉巴宿巴不與語曰大丈夫處世當交四海英雄如何與兵子共語蜀志劉巴傳注司徒蔡謨戲侮王導導怒謂人曰吾往與群賢共遊洛中何曾聞有蔡克兒耶晉書王導傳克謨父也秦王墮曰董龍是何雞狗而令國士與之言乎通監晉紀殷浩才名冠世庾翼弗之重也每語人曰此輩宜束之高閣俟天下太平然後議其任耳晉庾翼傳秦王猛倜儻有大志不屑細務人皆輕之猛悠然自得聞亙溫入關被褐詣之捫虱而談當世務旁若無人通監晉紀互入氣概王徽之為桓沖騎兵參軍沖嘗謂徽之曰卿在府日久比當相料理徽之初不酬答直高視以手板拄頰云西山朝來致有爽氣耳晉本傳謝奕嘗逼亙溫酒溫走避之奕遂引溫一兵帥共飲曰失一老兵得一老兵晉書慕容評真奴才雖億兆之衆不足畏況數十萬乎通監晉海西公紀秦主登聞後秦主萇卒喜曰姚興小兒吾折杖笞之耳晉武帝紀爾刀筆小才正堪供几案之用豈應汙辱門下斁我彝倫梁高祖紀桓範曰曹子丹佳人生汝兄弟㹠犢耳魏邵陵厲公龜鱉小豎自救不暇夫何能為宋太祖紀魏人曰檀道濟死吳子輩不足復憚同上孫晟素輕馮延已謂人曰金杯玉碗乃貯狗矢乎周太祖紀並通監李太白常侍帝醉使高力士脫靴唐書本傳顏師古性簡峭視輩行傲然罕所推接唐書本傳傳記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曹劉沈謝暗中摸索著亦可識國史纂異互見遂非集高眄邈四海左太沖詠史詩客來尚不見肯到權門前韓文奴視法度士韓文互見矌達視天下之勞若觀蟻之移穴玩而不戚柳文書五侯三相家眼冷不見君白侍郎集太倉一稊米大海一浮萍白侍郎集畜之如犬羊視之如蜂蠆同上高視終古一笑昔人唐文粹亦何足齒於吾人同上憂天下無此鼠輩耶劉賓客集本朝下看區區郊與島螢飛露濕迎秋草歐公孤芳陋孤妍同上子猶解倒懸也孟子公孫丑上昏暮叩人之門戶求水火無弗與者盡心上中流失船一壺千金鷃冠子又意林云中河失船一瓠千金出死斷亡以覆救之荀子史簡書同惡相恤之謂左閔元年同恤菑危救備凶患左傳天災流行國家代有救災恤鄰道也僖十三年救患分災左僖元年救人於厄振人不贍史太史公自序季布有名於楚數窘漢王項羽滅高祖求布千金布匿周氏周氏髡鉗季布衣褐衣置廣柳車中并與其家僮數十人之魯朱家所賣之朱家心知是季布乃買而置之田誡其子曰田事聽此奴必與之同食季布傳秦囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之遍問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宮藏中取所獻狐白裘至以獻秦王幸姬姬為言釋孟嘗君孟嘗君即馳出秦昭王後悔出孟嘗君求之已去即使人馳傳逐之孟嘗君至關關法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出本傳李同說平原曰士方其危苦之時易德耳本傳伍子胥奔吳到昭關昭關欲執之伍子胥幾不得脫追者後至江上有一漁父乘船知伍子胥之急乃渡子胥本傳並史記鮑宣下廷尉王咸舉幡太學下曰欲救鮑司隸者會此諸生會者千餘人遮丞相孔光車不得行宣減死一等西漢本傳互見晞慕望氣者言長安獄中有天子氣郭穰夜到郡邸獄丙吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可況親曾孫乎相守至天明不得入通監漢宣帝紀緩急相護漢宣許后傳何顒與袁紹為奔走之交嘗私入洛陽從紹計議為諸名士罹黨事者求救援權計使得逃隱所全免甚衆通監漢靈帝紀初蔡雍與將作大匠陽球有隙球即中常侍程璜女夫使人飛章言雍下雍於雒陽獄劾以仇怨奉公議害大臣不臣不敬棄市事奏中常侍河南呂強愍雍無罪力為伸請陽球使客追路剌雍客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒雍由是得免同上趙岐逃難賣餅北海中孫嵩見岐與共載歸藏岐復壁中數年東漢本傳仇覽等上書告張儉與同郡二十四人為黨於是刊章討捕儉儉困迫遁走望門投止莫不重其名行破家相容其所經歷伏重誅者以數十宗親皆殘滅郡縣為之殘破東漢本傳張儉為中常侍侯覽所怨覽刊章捕儉與孔融兄褒有舊亡抵褒不遇融曰兄雖在外吾不能為君主耶因留舍之後事泄褒坐死東漢孔融傳王祥漸有時譽母深疾之密使鴆祥弟覽知之徑起取酒祥爭而不與母遽奪反之自後母賜祥饌覽輒先嘗通監魏元帝紀互見兄弟李景莊老於場屋每被黜母輒撻景讓景莊兄也宰相謂主司曰李景莊今歲不可不收可憐彼翁每歲受撻由是始得及第通監武宗紀勑曰王衍一行並從殺戮樞密使張居翰就殿柱楷去行字改為家字通監唐明宗紀互入解紛傳記窮鳥入懷仁人所憫死士歸我當棄之乎伍員之託漁舟季布之託廣柳孔融之藏張儉孫嵩之匿趙岐以此得罪甘心瞑目北齊顏氏家訓集蹈水火之求免於人也苟不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也韓文吐飯飽之解衣暖之杜牧之集
