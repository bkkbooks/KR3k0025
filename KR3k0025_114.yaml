body:
  text: 貽禍經今不取後世必為子孫憂語史武子之施沒矣而黶之怨實彰左傳秦始皇宮室之麗使其後曾不得聚廬而託處焉馳道之麗使其後曾不得邪徑而託足焉葬埋之侈使其後曾不得蓬顆蔽冢而託葬焉漢書賈山至言集應劭曰黶惡而害盈見文選幽通賦注燕翼無似終為餒魂劉賓客集閉門不解栽桃李滿地唯聞種蒺藜白集互見報怨經山下有雷頤君子以謹言語節飲食易頤卦君子齊戒處必掩身母躁止聲色母或進薄滋味母致和節嗜欲定心氣記月令仲夏耳目聰明血氣和平記樂記姦聲亂色不留聰明樂慝禮不接心術惰慢邪僻之氣不設於身體同上剛氣不怒柔氣不懾四暢交於中而發作於外同上不使放心邪氣得接焉同上子持其志母暴其氣孟子養心莫善於寡欲孟子存其心養其性孟子無以好惡內傷其身莊德充符篇合六氣之精平易恬淡則憂惡不能入邪氣不能襲故其德全而神不虧又曰純粹而不雜靜一而不變淡而無為動而以天行此養神之道也又曰精神四達無所不極莊子刻意篇邪污之氣何一作無由得接荀子神清者嗜欲弗能亂淮南子俶真訓篇恬和養神則自安於內清虛棲心則不誘於外神恬心清則形無纍矣劉子史子産曰節宣其氣勿使有所壅閉湫底以露其體左昭元養精游神西漢東方朔傳養身者以練神為寶東漢李固孟說曰養性者善言不可離口新唐文孫思邈云養性者先知自謹新唐書柳公度曰吾不以氣海暖冷物熟生物不以元氣佐喜怒年八十九同上孫思邈曰人無故不應餌藥藥有所偏助則藏氣為不平唐裴潾傳傳記夫欲養神必先須養氣修真祕訣集君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不棲於情憂喜不留於意泊然無感而體氣和平嵇叔夜養生論頤性養壽嵇叔夜幽憤詩王其愛玉體俱享黃髮期曹子建贈白馬王彪吾學養生之術外榮華去滋味選絶交論不愛其身而嗇其神選運命論減書存眼力省事養心王劉賓客頤性保命屑瓊飲露唐文粹新浴支體暢獨寢神魂安白樂天漱吮甘液游泳和氣唐文粹葆和嗇神同上凝和葆神同上本朝汛掃身心澡瀹神氣東坡集山芎麥麴都不用泥行露宿終無疾欒城養氣如養兒東坡集子孔子曰人有三死而非其命也己自取也夫寢處不時飲食不節逸勞過度者疾共殺之家語五儀解形勞而不休則弊精用而不已則勞勞則竭莊天運不可以無涯之智役有涯之身莊子互見警戒耳目淫於聲色之樂則五藏動搖而不定矣五藏動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守馳騁於外而不守則禍福之至雖如丘山無由識之矣淮南子精神訓篇神躁則心蕩心蕩則形傷劉子目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼓口貪滋味命曰腐腸之藥鼻悅芳馨命曰燻喉之煙身安輿駟命曰召蹶之機劉子互見警戒史神太用則竭形太勞則敝形神騷動欲與天地長久非所聞也太史公自序盛食珍味以壞其口音樂婦人以壞其耳高堂邃宇倉庫奴婢以壞其腹娛樂親酌以壞其心前漢賈誼五餌書以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也通鑑三十四漢宣紀多記損心多語耗氣心氣內損形神外耗初雖無覺久且為弊唐書劉洎傳世嘗謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也嵇叔夜養生論神躁於中而形喪於外同上五情今已傷安得自能老孟東野世人不察惟五穀是見聲色是耽目惑玄黃耳務淫哇滋味煎其府藏醴醪鬻其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一塗易竭之身而內外受敵身非木石其能久乎同上夫藥以愈疾非朝夕常餌之物況金石酷烈有毒又益以火氣殆非人五臟所能勝也通鑑二百四十一唐穆宗孫思邈有言藥勢有所偏助令人藏氣不平通鑑二百四十三唐穆宗積微成損積損成衰養生論傳記肥肉厚酒務以自強命曰爛腸之食呂氏春秋膚氣內消有似尾閭之波神志外傷同乎牛山之木文心雕龍集出輿入輦命曰蹶痿之機洞房清宮命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥膿命曰腐腸之藥選七發合冰炭以交戰祗自苦乎厥躬白侍郎本朝煎烹心脾擢胃腎自令鬢髮驚秋霜欒城集經申伯忠臣不欲離王室詩嵩高箋雖爾身在外乃心罔不在王室書康王之誥昔先正保衡曰豫弗俾厥后惟堯舜其心愧恥若撻于市書說命下武王有疾弗豫周公為三壇同墠冊祝曰以旦代某之身書金滕子曰事君欲諫不欲陳詩云心乎愛矣遐不謂矣中心藏之何日忘之記表記善則稱君過則稱己記坊記晉世子申生使人辭於狐突曰吾君老矣子少國家多難伯氏不出而圖吾君伯氏苟出而圖吾君申生受賜而死記檀弓上子我非堯舜之道不敢以陳於王前孟公孫丑下豫三宿而出晝於豫心猶以為速王庶幾改之王如改諸則必反豫夫出晝而玉不豫追也豫然後浩然有歸志豫雖然豈舍王哉孟子不得於君則熱中孟子宋國有田夫常衣縕黂僅以過冬暨春東作自曝於日不知天下之有廣廈隩室綿纊狐貉顧謂其妻曰負日之暄人莫知者以獻吾君列子楊朱篇身在江湖之上心居魏闕之下莊子史荀林父進思盡忠退思補過社稷之衛也左宣十二季文子見有禮於其君者事之如孝子之養父母見無禮於其君者誅之如鷹鸇之逐鳥雀也左文十八屈原雖放流眷顧楚國繫心懷王不忘史記本傳不勝犬馬之心史記翟青傳汲黯曰臣常有狗馬病不能任郡事願為中郎出入禁闥補過拾遺史記本傳忠臣不先身而後君史魯仲連傳望之雅意本朝西漢本傳願賜數刻之間極竭毣毣之思退入三泉死亡所恨西漢鮑宣傳史魚既沒餘忠未訖委柩後寢以尸達誠汲黯身外思內發憤舒憂西漢谷永傳忠臣雖在畎畝猶不忘君西漢劉向傳昔周公雖老猶在京師明不離成周示不忘王室也仲山父異姓之臣無親於宣就封于齊獨歎息永懷宿夜徘徊不忍遠去西漢杜欽傳上官桀始以財力得幸為未央廄令上嘗體不安及愈見馬馬多瘦上大怒曰令以我不復見馬耶欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬通鑑二十三漢武紀互見誠實仲尼去魯曰遲遲而行孟子去齊三宿而後出境言忠臣之於主慕戀不已荀悅漢紀忠臣遠不忘君後漢注心皇極結情紫闥神明知之通鑑七十二魏明紀高堂隆疾篤口占上疏曰臣寢疾有增無損常恐奄忽忠款不昭天下乃天下之天下非獨陛下之天下也通鑑七十三魏明纍繭救宋重胝存楚南史梁武紀陽固曰昔龔遂去國猶獻直言韋孟離朝不忘本國後魏書為歌詩情不忘君人憐其忠唐書杜甫傳房元齡寢疾抗表諫征高麗唐書李孝本二女配沒右軍上取之入宮右拾遺魏謨上疏上即出孝本女擢謨為補闕曰可謂愛我不忝厥祖矣通鑑二百四十五唐文宗傳記王猛謂符堅曰臣沒之後願不以晉為圖鮮卑羌虜我之仇讎終為人患宜漸除之十六國春秋集欲闔口無言兮嘗被君之厚德念三年之積思兮願一見而陳辭楚辭馳心輦轂曹子建應詔詩若葵藿之傾葉太陽雖不為之回光然終向之者誠也曹子建投軀報明主身死為國殤選樂府北門行潢污易竭抑有朝宗之願犬馬無識猶知戀主之誠柳表子牟馳心於魏闕汲黯積思於漢廷同上微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深同上揮涕戀行在道途猶恍惚杜工部中原消息斷黃屋今安否同上生逢堯舜君不忍便永訣當今廊廟具構廈豈云缺葵藿傾太陽物性固莫奪同上炙背可以獻天子杜詩獨隨朝宗水赴海輸微涓李太白集萬里納忠一心稟命白樂天報國心皎潔念時涕汍瀾韓文仰長安而就日赴帝鄉以望雲駱賓王集微臣欲獻唐虞壽遙指南山對袞龍王維集平生五色線願補舜衣裳杜牧之簪組赤墀戀禽魚滄海心同上臣心堯日下錢起詩本朝鄭俠雖流落頓挫之餘一話一言未嘗不在君父鄭介夫言行録雖伏櫪之馬悲鳴難戀於君軒而曳尾之龜涵養未離於靈沼歐公謝致任表蹌蹌退舞敢忘堯帝之笙鏞翼翼歸飛亦在文王之靈沼元絳謝致仕表古今詩人衆多而杜子美為首豈非以其流落飢寒終身不用而一飯未嘗忘君也歟東坡集進如孟子之敬王退若蕭生之憂國同上只因未報君恩重清夢時時到玉堂坡詩平生本朝心歲月閩江浪山谷詩去國雖千里分憂即近君山谷詩夕寐北河陰夢還甘泉宮詩集
