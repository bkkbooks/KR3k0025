body:
  text: 不屈子張騫蘇武之奉使執節沒身不屈王命雖古之膚使其猶劣諸楊淵騫史晉使解楊如宋使無降楚鄭人囚而獻之楚楚子厚賂之使反其言遂致其君命曰臣能承命為信信無二命受命以出有死無霣又可賂乎左宣十五年鄭子産爭承貢賦之次自日中以爭至于昏晉人許之左昭十三年田橫客五百人在海上帝使使召至聞橫死皆自殺史記田淡傳大將軍青既益尊姊為皇后黯與亢禮或說黯曰自天子欲令群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重耶西漢汲黯傳蕭望之堂堂折而不撓西漢本傳貢禹為河南令以職事為府官所責免冠謝禹曰冠一免安可復冠也遂去官同上董宣為洛陽令殺湖陽公主奴帝召宣使叩頭謝主宣不從強使頓之宣兩手據地終不肯俯勑彊項令出東漢本傳杜伯山天子所不能臣諸侯所不能友東漢馬良傳越騎司馬鄭衆使北胸奴單于欲令衆拜衆不為屈單于圍守閉之不與水火衆拔刀自誓單于恐臥止乃更發使隨衆還京師通監漢明帝曹操圍廣陵臧洪袁紹邑人陳容謂紹曰今日寧與臧洪同日死不與將軍同日生也東漢本傳王祥與荀顗往謁司馬懿顗曰便當拜也祥曰安有天子三公而輒拜人者獨長揖晉書王祥傳齊王宴會命侍中嵇紹操琴紹對曰公匡復社稷當軌物作則垂之於後紹雖虛鄙忝備常伯腰紱冠冕鳴玉殿省豈可操執絲竹為伶人之事晉書嵇紹傳武陵王晞聞戴逵善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晉書戴逵傳陶潛為彭澤令郡遣督郵至縣吏白應束帶見之潛嘆曰吾不能為五斗米折腰拳拳事鄉里小人晉書陶潛傳卞延為上虞令有剛氣孟顗以令長二之脫幘投地拂衣而去南史魏統軍李佐攻新野獲劉思忌問之曰今欲降未思忌曰寧為南鬼不為北臣乃殺人通監南齊明帝紀齊慕容儼曰吾狀貌如此行望人拜豈可拜人本傳松表歲寒霜雪不能凋其節隋煬帝劉仁軌運糧失船李義府命袁異式鞠之異式曰君與朝廷何人為讎宜早為計仁軌曰當官不職國有常刑無所逃命若使自引決以快讎人切所未甘乃具獄以聞除名通監唐高宗蕭穎士若百鍊之剛不可屈唐書元德秀傳柳公綽為京兆尹公綽初赴府有神策小將躍馬橫衝前導公綽駐馬杖殺之明日入對延英上色甚怒詰其專殺之狀對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於當衢金吾街使當奏在坊內左右巡使當奏上無以罪之退謂左右曰汝曹須作意此人朕亦畏之通監唐憲紀宰相韋貽範母喪詔還位偓當草制上言俟變繵而召可也學士使馬從皓迫偓求草偓曰腕可斷麻不可草新唐書韓偓傳傳記鄭衆謂胸奴曰不忍將大漢節對氈裘獨拜東觀漢紀漢順帝徵樊英詔郡縣駕載上道英不得巳到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴能賤能富能貧君何慢朕英曰臣受命於天盡其命天也死得其命亦天也陛下焉得殺臣臣見暴君如見仇讎立朝猶不肯可得貴乎雖在布衣環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉得賤臣臣非禮之祿萬鍾不受申其志雖簞食弗厭也陛下焉能富臣焉能貧臣帝不能屈漢樊英列傳魏世祖選丁邯為郎邯託疾不就詔問實病羞為郎乎對曰臣實不病恥以孝廉為令史耳世祖怒使虎賁杖之數十詔問欲為郎否對曰能殺臣者陛下不能為郎者臣也詔出不為郎三輔決録李白失意遊華山過縣宰方開門決事白乘醉跨驢過門宰怒不知太白也引至庭下曰汝何輒敢無禮白乞供狀狀無姓名曰曾令龍巾拭吐御手調羹貴妃捧硯力士脫靴天子門前尚容吾走馬華陰縣裏不許我騎驢托遺集天資木強不能屈節權門地隔蓬心不能買名時議駱賓王互入寡合時棄道猶存陳子昂艱危氣益增杜詩至寶有本性精剛無與儔可使寸寸折不能繞指柔白侍郎泥塗不屈青雲心同上若見中丞忽相問為言腰折氣衝天元之本朝王荊公謂孫立節曰吾條例司當得開敏如子者孫笑曰公過矣當求勝我者若我輩人則亦不肯為條例司矣東坡剛說門前萬事不掛眼頭雖長低氣不屈坡微詩集子鄉為身死而不受今為宮室之美為之鄉為身死而不受今為妻妾之奉為之鄉為身死而不受今為所識窮乏者得我而為之孟告子上如委巳而從人雖有規矩準繩焉得而用之楊子史見利則逝見便則奪西漢賈誼傳素無所守持而為好言於下通監紀漢武元稹始言事峭直欲以立名中見斥廢十年信道不堅乃喪所守附官官得宰相位晚節彌沮喪加廉節不飾唐書本傳馮道雖為首相依違兩可無所操決或謂帝曰馮道承平之良相今艱難之際譬如使禪憎飛鷹耳通監五代晉高祖傳記皇甫嵩與董卓為太師嵩中丞見卓拜卓曰可以服未嵩曰安知明公乃至是乎漢晉春秋集凡一人毀之則自以為不足一人譽之則自以為有餘韓退之互入淺中門經君子上交不諂下交不瀆易繫辭不剛不柔厥德允修書畢命維仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏彊禦詩嵩高剛氣不怒柔氣不懾記樂記君子中立而不倚強哉矯記中庸子欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也孟告子上楊子取為我拔一毛而利天下不為也墨子兼愛摩頂放踵利天下為之孟盡心下互入分量不同負石而赴河是行之難為者也而申徒狄能之然而君子不貴者非禮義之中也荀不苟過則失中不及則不至揚問道李仲元不夷不惠可否之間揚淵騫司馬溫公注云有清利之美而無隘與不恭之失動失之繁靜失之寡文中子史矯枉者過直西漢外戚傳傳記昔陶潛賦歸去來即徑歸王羲之乃自誓於父母墳前且仕宦豈不是好事但看行已如何元城語録
