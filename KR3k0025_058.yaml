body:
  text: 正直經柳下惠曰直道而事人焉往而不三黜語微子子黔婁先生死被短露足孔子及門人見之謂其妻曰斜而覆足之其妻曰寧使正之不足不可斜之有餘孔家語孝子不諛其親忠臣不諂其君莊子身之所長上雖不知不以悖君身之所短上雖不知不以取賞長短不飾以情自竭若是則可謂直士矣荀子不苟史孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣春秋公羊傳孔子曰叔向古之遺直也治國制刑不隱於親左昭十四外舉不隱仇內舉不隱子史晉世家為人峭直西漢晁錯傳義形于色同上班固敘傳鞠躬履方同上馮奉出傳贊師古曰踐正直之道也汲黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎本傳汲黯面折不能容人之過合己者善待之不合者弗能忍見本傳龔遂為昌邑王郎中令面剌王過王至掩耳起走曰郎中令善媿人本傳並西漢忠果正直志懷霜雪東漢禰衡傳邢峙以經入授太子峙方正有儒者風廚卒進太子食菜有邪嵩峙令去之曰此菜有不正之名非殿下宜食北史柳彧正直之士國之龜寶隋書唐令則為太子勇所昵狎每令以弦歌教內人右庶子劉行本責之曰庶子當輔太子以正道何有取媚於房帷之間哉令則甚慚而不能改通監隋高祖紀武三思嘗以事屬宋璟璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政獨不見產祿之事乎同上唐中宗正人一心事君無待於助唐書李德裕傳互見端介張昌宗恐太后一日晏駕為魏元忠引張說賂以美官使證元忠說許之宋璟謂說曰名義至重鬼神難欺不可黨邪害正以求苟免若獲罪流竄其榮多矣若事有不測璟當叩閤力爭與子同死努力為之萬代瞻仰在此舉也通監武后紀集桂枝生自直選在公正色選直如朱絲繩鮑明遠白頭吟嶷然如斷山絕巘不可以邪徑造焉穆員鄭叔則誌以直道吹日月之翳以正道立天地之根皮日休集抗危言而無所避秉大節而不可奪唐文粹本朝朝罷人人識鄭崇直聲猶在履聲中東坡詩經反道敗德書大禹鴟義姦宄奪攘矯處呂刑子大姦之人以泣自信孔叢反是獨立此小人之桀雄也荀史掩義隱賊好行凶德醜類惡物頑嚚不友是與比周謂之渾敦注謂驩兜左文十八包藏禍心左昭元左右賣國反覆之臣蘇秦傳秦太子之妃曰華陽夫人無子夏姬生子異人異人質於趙趙人不禮之異人以庶孽孫質於諸侯車乘進用不饒居處困不得志陽翟大賈呂不韋適邯鄲見之曰此奇貨可居乃往見異人說曰吾能大子之門異人笑曰且自大君之門不韋曰子不知也吾門侍子門而大能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西遊立子為嗣乃西見華陽夫人之姊而以奇物獻於夫人因譽子異人之賢以夫人為天夫人喜不韋因使其姊說夫人曰夫以色事人者色衰則愛弛今夫人愛而無子不以繁華時蚤自結於諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎夫人以為然承間問於太子曰願得子異人立以為嗣以託妾身太子許之與夫人刻玉符約以為嗣通鑑周紀不仁而多材國之患也西漢翟方進傳張禹姦人之雄同上杜欽傳諸葛豐之於堪猛前譽而後毀其志非為朝廷進善而去姦也欲比周求進而已矣通鑑漢元帝紀孫寵息夫躬姦人之雄同上漢成帝紀飾偽以要譽約奇以驚俗不食君祿而爭屠沽之利不受小官而規卿相之位名與實反心與跡違漢殤帝紀覘視朝政鳥聲獸心私共鳴呼漢靈帝紀曹操作銅爵臺於鄴操下令曰孤始於譙東築精舍欲秋夏讀書冬春射獵為二十年規待天下清乃出仕耳然不能得如意徵為典軍校尉意遂更欲為國家討賊立功使題墓道言漢故征西將軍曹侯之墓其志也而遭董卓之難興舉義兵後領兗州破降黃巾三十萬眾又討擊袁術使窮沮而死摧破袁紹梟其二子復定劉表遂平天下身為宰相人臣之貴已極意望己過矣設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤強盛恐妄相忖度言不遜之志每用耿耿故為諸君陳道此言皆肝鬲之要也然欲孤便爾委捐所典兵要實不可也何者誠恐以離兵為人所禍己敗則國家傾危是以不得慕虛名而處實禍也東漢獻帝紀李勝出為荊州剌史過辭太傳懿令兩侍婢持衣衣落指口言渴婢進粥懿不持盃而飲粥皆流出露胸勝曰眾情謂明公舊風發動何意尊體乃爾懿使聲氣纔屬說年老枕疾死在旦夕君當屈并州近好為之備恐不復相見以子師昭兄弟為託勝曰忝荊州懿乃錯亂曰君方到并州勝復曰當忝荊州懿曰年老意荒不解君言勝退告曹爽曰司馬公尸居餘氣形神已離不足慮矣故爽等不復設備魏邵陵厲公紀王衍曰荊州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣晉紀安祿山傾巧善事人人多譽之唐元宗蠖屈鼠伏佞辭泉湧同上李訓所獎拔率皆狂險之士然亦取天下重望以順人心如裴度令狐楚鄭覃皆累朝俊彥為當路所軋置之散地訓皆引居崇秩唐文宗並通鑑邪人必更為黨以相欺蔽唐書李德裕傳互見朋比德宗謂李勉曰眾謂盧杞姦邪朕固不知勉曰天下皆知而陛下不知此所以為姦邪也同上李勉傳黃門侍郎裴矩知必將有亂雖廝役皆厚遇之及亂作賊皆曰非裴黃門之罪故得免通鑑唐祖其姦足以亡隋其智足以佐唐姦人多才能與時而成敗也唐書封倫裴矩贊牛僧孺曰帝王立法束縛姦邪同上傳記曹操習噉野葛多飲酖酒博物志魏武曹操常云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者集大姦者材必有過於眾而能自媚於上王符論大則有鯨有鯢小則為梟為獍非玉燭之能調豈璿璣之能正庾信蛛絲小人態曲綴瓜果中杜甫掩人以自售近名以冒進欺謾於言說沓合於求取狎比其瑣細媒孽其僚友矯激以賣直詀讘以取容劉賓客以曲為形以邪為質以仁為凶以僣為吉以諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬭為安佚譖下謾上恒其心術妬人之能幸人之失柳文罵尸蟲包藏禍心素懷梟獍之性彰露凶德思發豺狼之聲白樂天善柔成性佞媚為心唐文粹包狼心發蠆毒舞智以固權張詐以聾上同上本朝曹操夜臥枕圓鼓噉野葛至尺許飲鴆酒至一盞操之負人多矣恐人報己故先揚此聲以誑時人使之無害己意也元城語錄經彼狡童兮詩析言破律亂名改作記王制史無助狡猾左昭二十六共一老禿翁何為首鼠兩端史灌夫傳張湯內懷詐心以御主外挾賊吏以為重西漢汲黯傳朱安世曰南山之竹不足受我辭斜谷之木不足為我械同上公孫賀傳張薿以狡妄為猾伯晉書李密狡猾好反通鑑唐高祖張鎬言許叔翼狡猾多詐同上唐肅宗傳記馮媛謁孟嘗君曰狡兔有三窟戰國策集忿王戎之淫狡文選僄狡鋒協好亂樂禍陳琳檄經雲行雨施天下平也易乾卦君子裒多益寡稱物平施謙鳲鳩在桑其子七贊淑人君子其儀一贊詩鳲鳩注云鳲鳩之養其子朝從上下暮從下上平均如一周道如砥其直如矢君子所履小人所視大東大道之行也天下為公記禮運子曰唯仁者能好人能惡人語八佾子天之道高者抑之下者舉之有餘者損之不足者補之老子七十六章權不能多少其數衡不能輕重其量管子怒不過奪喜不過予荀脩身不下比以闇上不上同以疾下分爭於中不以私害之若是則可謂公士矣不苟君子用公平之道故能百事無過荀注人之不事衡石者非負廉而遠到也石不能為人多少衡不能為人輕重求索不能故人不事也韓子衡之於左右无私輕重故可以為平繩之於內外无私曲直故可以為正人主之於用法无私好憎故可以為命淮南子主術訓篇春雨之灌萬物也洋然而流沛然而施无地而不注无物而不生无所好憎平之至也並淮南子史砥節首公西漢王尊傳衡者所以平萬物也西律歷志董仲舒曰天有所分予予之齒者去其角傳其翼者兩其足西本傳賞不避仇讎罰不擇骨肉西漢據此之公無私如天地賈誼傳並西漢賞不遺遠罰不阿近爵不可以無功得刑不可以貴埶免通鑑魏明帝紀習鑿齒曰諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怒者以其無私也同上吾心如秤不能為人作輕重蜀志諸葛亮傳王弘曰劉粹無私必無憂也通鑑南史宋高祖紀劉子翼性剛直朋友有過常面責之李伯藥常稱劉四雖復罵人人終不恨唐太宗紀上謂房元齡曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者非至公能如是乎通鑑唐太宗集七子均養者鳲鳩之仁也選曹子建責躬詩表靈輝朝覯稱物納照選連珠不別荊棘者慶雲之惠也選責躬詩表澤無不漸螻蟻之穴靡遺選昭王碑大國置衡鏡準平天地心李太白集天布寒暖不私於人品類既一高下以均唐柳公綽太醫箴大明無偏照張蘊古若懸衡然增之銖兩則俯反是則仰無可私者柳文公道世間唯白髮貴人頭上不曾饒杜牧之經子曰君子之於天下也無適也無莫也語里仁子有人方舟而濟於河有虛船來觸舟雖有褊心之人不怒莊山木復讎者不折鏌干雖有忮心者不怨飄瓦達生至人之用心若鏡不將不迎應帝王獨不見夫桔槔者乎引之則俯捨之則仰彼人之所引非引人者也故俯仰而不得罪於人同上夫投鉤分財投策分馬非以鉤策為均使得美者不知所以德得惡者不知所以怨慎子高山深林非為虎豹也大木茂枝非為飛鳥也淮南子鏌釾不為巧者銳而為拙者鈍劉子下同飄瓦擊人虛舟觸已雖有忮心而不怒者以彼無情於擊觸也嬰兒傷人而被傷者不以為怨史利不在身以之謀事則智慮不私己以之斷義必厲東漢傳記明鏡之照物也妍媸必露不以毛嬙之面或有疵瑕而寢其鑒也虛室之傳響也清濁必聞不以綿駒之歌時有誤曲而輟其應也史通集雲無心而出岫陶淵明歸去來詞懸鏡待人駱賓王草不樹榮於春風木不怨落於秋天李白鏡懸肝膽露元積集楚雲澹無心劉長卿本朝發達萬物而天下不以為德摧敗草木而天下不以為怒東坡重巽以申命論泥上偶然留指爪鴻飛那復記東西坡譬如止水之在槃豈復勞心於鑒物坡譬如鴈過長空影沉寒水鴈無留蹤之意水無涵影之心天衣懷禪師語若鑑之照物妍媸在彼隨物以應之明道語錄
