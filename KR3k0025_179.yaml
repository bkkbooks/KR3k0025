body:
  text: 小祥經練而慨然注憂悼在心也記曲禮上期而小祥練冠記間傳小祥者主人練祭記曾子問既練居堊室不與人居喪大記注堊室之飾也練練衣黃裏縓緣注小祥練冠練中衣以黃為內縓為飾黃之色卑於纁縓纁之類明外除記檀弓上練不群立不旅行為其苟語忘哀也記曾子問期而練記喪服四制練冠縓緣要絰不除男子除乎首婦人除乎帶記間傳練而食菜果記喪大記練而弔雜記下殷練而祔記檀弓下子魯大夫練而杖子貢問孔子曰練而杖禮歟子曰非禮也家語子貢問篇魯大夫練而床孔子曰非禮也荀子道本朝練衣必煆煉大功之布以為衣故有言功衰功衰上之衣也以喪久變輕也老泉經喪禮既祥祭而縞冠素紕詩鄶素冠注魯人有朝祥而暮歌者夫子曰又多乎哉喻月則其善也記檀弓上有子蓋既祥而絲屨組纓譏其早也禮既祥白屨無絇縞冠素紕同上顏淵之喪饋祥肉孔子彈琴而后食之以散哀也孔子既祥五日彈琴而不成聲十日而成笙歌祥而縞並記檀弓上又期而大祥記間傳祥而廓然記曲注憂悼在禮下心之貌也祥之日鼓素琴告民有終也以節制者也記喪服四制祥而食肉記喪大記既祥黝堊祥而外無哭者同上集甫及歲期奄過大祥禮制云終追號永遠悲裂肝心白傳集奠筵將徹幃帳一收此生之間豈有見日未死之際應無忘期仰天一號心骨破碎猶異萬一聞吾此言同上雖送終之有已豈孝思之敢志白帖本朝喪紀有終哀懷靡極度新宮而館御諏吉日以徂遷臨川集經玄衣黃裳則是禫祭玄冠矣黃裳者未大吉也既祭乃服禫服記雜記下注禫而從御記喪大記孟獻子禫懸而不樂比御而不入夫子曰獻子加於人一等矣記檀弓上是月禫徙月樂注言禫明月可以用樂同上禫而床記間傳禫而飲醴酒同上禫而內無哭者樂作矣故也記喪大紀禫而纖無所不佩注纖采纓也記間傳集孝無終始喪有祥禫白帖禫祭名與大祥間一月自喪至此凡二十七月禫之言澹澹然平安之意也同上本朝追號罔極實抱終身之憂祥禫有期蓋迫先王之禮東坡集經吉祭而復寢記喪大紀三年之喪二十五月而畢若駟之過隙記三年問喪不過三年記喪服四制免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顏色戚容必有以異於人也記雜記子貢既除喪而見孔子予之琴和之而不和彈之而不成聲作而曰哀未志也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉記檀弓上三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不以送死有已復生有節也哉記三年問去喪無所不佩論語史服除思慕終身如喪南史郭世通傳謝曜卒弟弘微服雖除猶不噉魚肉沙門釋慧琳嘗與之食見其猶䟽素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀實未能已南史宋謝弘微傳集通喪既畢元和制集不幸餘命不殞重冠戴纓元微之集杖絰外除柴瘠加等唐集祥雖除服憂且終身白帖衣裳外除權戴之集日晷奔迅禮經迫促豈圖微生尚留殘喘類要本朝寒暑之變忽焉再期練祥之餘復將三月勉從即吉之典莫遂無窮之哀東坡集喪期有數禫月告終天地之運固代謝於陰陽草木何知徒興悲於霜露並同上祥琴既御吉服以朝臨川集經君子有終身之喪忌日之謂也記忌日不用注不用舉他事如有時日之禁也非不祥也注善也言夫日志有所至而不敢盡其私也注親以此日亡其哀心如喪時記祭義忌日必哀同上忌日不樂注不舉吉事曲禮下子季節見於子順子順賜之酒辭曰今家之忌日也孔叢子史申屠蟠每忌日輒三日不食東漢本傳前輩忌日惟不飲酒作樂王世將以忌日送客世說王脩母以社日亡來年社日脩哀感悲號鄰人罷社蕭廣濟孝子傳本朝慶雲回薄永芘後昆時序徂遷奄更諱日威神在望感怵兼懷臨川集
