body:
  text: 有分史袁盎為太常竇嬰為大將軍兩人素相與善史本傳集舊托於心契劉賓客同學同年又同舍同上半面契終始元稹集半面之故白帖本朝同官同齒復同科朋友婚姻分最多臨川集史非宿素之交無一日之雅西漢谷永傳無雅信西漢杜欽傳集相與昧平生顏延年秋胡詩非有積素纍舊之歡皆塗覯覯一作觀卒遇四子講德論看看未相識脈脈不得語劉子子原泉混混不舍晝夜盈科而後進放乎四海有本者如是孟離婁下史木水之有本原也左傳有基無壞同上基廣則難傾根深則難拔晉孝愍紀有根無葉或可俟時唐柳玭傳集自源發流安得不廣王充論衡流長則難竭柢深則難朽張平子西京賦其植根固其流波漫根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也並韓文本朝枯槎燒盡有根在一洗春雨皆萌芽坡詩吾文如萬斛泉源不擇地而出東坡文經譬彼壞木疾用無枝小雅小辨互見相為表裏類本實先撥詩子苟為無本七八月之間雨集溝澮皆盈其涸也可立而待也孟子離婁下入水之爐火滅而煙不即息既斷之木柯葉猶生二者非不有煙非不有葉而其所以為煙為葉者已先亡矣抱朴子極言篇史本既弱矣其能久乎左桓二是謂蹶其本左襄十九有葉無根膏雨所不能活唐柳玭傳集潢潦無根源朝滿夕已除韓文經心不在焉視之而不見聽之而不聞食而不知其味記子以瓦樞者巧列子黃帝篇以瓦注者巧莊子心不使焉則白黑在前而目不見雷鼓在側而耳不聞荀子解蔽評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜狀既露則內慚而不怨向之評者與鏡無殊然而向之怨今之慚者以鏡無情而人有心也劉子互見事同體異有意門本朝人之所信者手足耳目也目識多寡手知輕重然人未有以手量而目計者必付之度量與權衡豈不自信而信物蓋以為無意無我然後得萬物之情東坡蓮華漏銘深山大澤有天地之寶無意於寶者得之東坡孫武論子以黃金樞者惛列子黃帝篇以黃金注者惛莊子注云所要重則心矜評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜狀既露則內慚而不怨向之評者與鏡無殊然而向怨而今之慚者以鏡無情而人有心也劉子互見事同體異門經包犧氏始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁神農氏作斫木為耜揉木為耒耒耜之利以教天下日中為市致天下之民聚天下之貨黃帝堯舜氏作垂衣裳而天下治刳木為舟剡木為楫舟楫之利以濟不通服牛乘馬引重致遠以利天下重門擊柝以待暴客斷木為杵掘地為臼臼杵之利萬民以濟弦木為弧剡木為矢弧矢之利以威天下上古穴居而野處後世聖人易之以宮室古之葬者厚衣之以薪不封不樹後世聖人易之棺槨古者結繩而治後世聖人易之以書契易繫辭開物成務同上智者創物爍金以為刃凝土以為器作車以行陸作舟以行水此聖人之所作也周禮考工記昔者先王未有宮室夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮後聖有作然後修火之利範金合土以為臺榭宮室牖戶以炮以燔以烹以灸以為醴酪治其麻絲以為布帛以養生送死記禮運作者之謂聖記樂記史至今天下言醫者由扁鵲也史本傳諸葛亮勸農講武作木牛流馬運米集斜谷口通監魏明紀王章掌財賦舊錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌通監周太祖集古之時人之害多矣有聖人者立然後教之相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宮室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠倦為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防韓文本朝至和間富公當國立一舉三十年推恩之法蓋公與河南進士段希元魏升平同場屋相善公作相不欲私之故為天下之制聞見録經太平君子能持盈守成詩大雅鳧鷖巧者述之守之世謂之工周禮考工記祭祀之法居喪之服哭泣之位皆如其國之故謹修其法而審行之凡祭有其廢之莫敢舉也有其舉之莫敢廢也並記曲禮下述者之謂明記樂記史安定者貴順權史記秦始皇紀參曰高帝與蕭何定天下法令既明今陛下垂拱參等守職遵而勿失史蕭何世家蕭何為法講若畫一曹參代之守而勿失西漢曹參傳臣書生唯知謹守歷代成規通監五代晉高祖集纂就前緒遂成考功續初繼業楚辭家承百年之業班固西都賦經天尊地卑乾坤定矣易繫辭子天下言而人推高焉地不言而人推厚焉四時不言而百姓期焉荀子不荀互入素服伯夷叔齊非於死之日而後有名也管子制分互入素服史事成不愆于素左傳集梓人畫宮於堵而績于成柳文梓人傳本朝古之君子如伊尹太公管仲樂毅之流其王霸之略定於畎畝中非仕而後學者也東坡樂全先生文集經足以垂世立教傳之子孫以貽後代並書序克勤無怠以垂憲乃後書蔡仲之命夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也記祭統百世以俟聖人而不惑記中庸刻工姓名於其器以察其信記月令注子聖人百世之師也孟子垂憲言以貽後人仲尼有云我欲托之空言不如載之行事之深切著明也並孟序死有萬世之名列子書之竹帛琢之盤盂傳以遺後世子孫尹鄧子尚賢篇託竹素者為世寶也抱朴子上文云孔鄭之門耳聽口受者滅絶史銘其功烈以示子孫左襄十九互入功業臧文仲既沒其言立左襄二十四孔子布衣傳十餘世學者宗之史記孔子世家贊燕齊之祀與周並傳子繼弟及歷載不墮前漢功臣表雖經千載遺風餘烈尚猶不絶前禮樂志垂功名於竹帛東漢鄧禹傳魏文帝與王朗書曰人生有七尺之形死為一棺之土唯立德揚名可以不朽其次莫如著篇籍魏書播流後之聲晉書禮志遺風餘烈晉書謝靈運傳論王彥章曰豹死留皮人死留名五代史集垂文揚采遺將來兮金相玉質百歲無匹名垂罔極永不刊滅者也並楚辭文章不朽之盛事選典論姬公之籍孔父之書與日月俱垂文選序歷世彌光選張平子東京賦流千載之英聲楊修答臨淄侯箋惟令德為不朽兮身既沒而名存曹大家東征賦悠悠百世後英名擅八區左太沖詠史詩遺烈光篇籍同上銘功景鍾書名竹帛楊德祖賦舄奕乎千載班孟堅典引辭義典雅足傳于後此子孫為不朽矣魏文帝吳質書世彌積而功宣身逾遠而名紹選碑不假良史之辭不託飛馳之勢而聲名自傳於後魏文帝紀芳烈奮于百世令聞顯於無窮郭有道碑互入聞望風流五百年李太白集豐功利生人大地同朽滅同上雄筆映千古盛事垂不朽丈夫垂名記萬年並杜詩君之好修兮企千載其相望惟有令名日高日遠並皇甫湜自古死者非一夫子至今有耿光韓退之祭田橫所言必傳世行後韓文墓志至今照人耳目赫赫若前日事韓文子之自著表表愈偉韓愈祭柳宗元文如日不滅如海不竭唐呂溫傳岩銘綿越千祀至今血食柳漢原廣銘著在國史垂為美談劉賓客集名垂不滅能光萬祀李習之穹壤可弊唯名不息金石垂之以慰罔極呂和叔身沒聲名在多應萬古傳賈島詩激清一時流譽千古不隨世磨滅唐文粹垂示百代佳句久傳芳吟詠流千古懿文茂績斯謂不朽並白樂天死而不朽反貴於生武侯碑傳記其人已亡杳成空寂其事如在皎如星漢朝廷之士山林之客皆圖不朽之事書名竹帛並史通本朝惟有善者能有後而託於文字者可以無窮雖死而不朽愈遠而彌存歐公送徐無黨序凡物有形必有終弊自古聖賢之傳也非皆託於物固能無窮也乃知為善之堅堅於金石死而不朽萬世之傳並歐公集我欲貴子文刻以金石聯金可爍而銷玉可碎非堅不若書以紙六經皆紙傳歐公重讀徂徠集經大豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也記樂記夏道尊命其民之敝憃而愚喬而野朴而不文殷人尊神其民之敝蕩而不靜勝而無恥周人尊禮其民之敝利而巧文而不慚賊而蔽記表記詩之失愚書之失誣春秋之失亂記經解子孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也孟公孫丑下史作法於涼其敝猶貪作法於貪敝將若何左傳昭四互見作俑太史公曰夏之政忠忠之敝小人以野商以敬敬之敝小人以鬼周以文文之敝小人以僿史高紀荊軻見秦王取圖奏之圖窮而心首見因把秦王之袖逐秦王環柱而走群臣皆愕秦法群臣侍殿上者無得持尺寸之兵諸郎執兵皆陳殿下非有詔召不得上方急時不及召下兵以故軻逐秦王引匕首摘秦王不中史記本傳夫置兵所以止亂也及其弊也適足以為亂又其甚也至困天下以養亂唐書兵志本朝太宗平河東立和糴法時米㪷十錢草束八錢民樂與官為市其後物貴而和糴不解遂為河東世世患莊老之後其禍為申韓並東坡集韓魏公嘗謂大臣以李固杜喬為本其弊猶恐為胡廣趙戒以胡趙自處弊可知也遺事儒者潛心正道不容有差其始甚微其終則不可救如師也過商也不及過於厚則漸至於兼愛不及則便至於為我其過不及同出於儒者其末流遂至於楊墨二程語録
