body:
  text: 順便子猶水之就下獸之走壙孟離婁上由水之就下沛然誰能禦之若決江河沛然莫之能禦也並孟子父母於子東西南北惟命之從莊子若挈裘領詘五指而頓之順者不可勝數也荀子勸學勢如決積水於千仞之隄若轉圓石於萬丈之溪淮南子兵略訓猶居高屋之上建瓴水也史記漢高祖紀建音蹇翻瓴水言其向下之勢易也以石投水莫之逆也史記頤指如意西漢賈誼傳快意當前適觀而已矣史李斯傳皆如意指西漢陸賈傳如身之使臂臂之使指莫不制從西漢賈誼傳互入控制有道如阪上走丸西漢蒯通傳飛蓬隨風東漢明帝紀順傾轉圓不足以喻其便東漢蔡雍傳如晨風之鬱北林魚鳥之趣藪澤晉孝愍紀傳記一日之行所欲必成玩好必從珍異是聚説苑權謀篇挹水於河而取火於燧戰國策集翼乎如鴻毛遇順風沛乎如巨魚縱大壑王褒頌翰飛絶迹一舉千里曹植集去馬覺蹄輕姚少監若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也韓文春浪之奔壑夏雲之得龍秋弧之發矢冬爐之納火唐文粹如良庖投刃無復肯綮同上互入自得三昧如矢別絃劉賓客集如刀劍發硎割而無滯如鍾磬在懸動而有聲白樂天勢若舟楫相得當洪流而鼓迅風崇朝千里不足怪也本朝行十里而未嘗齟齬兮其意驕逞而不可摧東坡集如寄諸鄰而取之東坡思治論父命於子惟所東西東坡辭免起居舍人第二狀視客之所居與其凡所資用如官府如廟觀如數世富人之宅東坡經子手拮據豫所捋荼豫所蓄租豫口卒瘏詩鴟梟陟彼砠矣我馬瘏矣我僕痡矣云何吁矣詩卷耳子若負重行而上也莊子盜跖史險阻艱難備嘗之矣左傳蒙霜露沐風雨西漢淮南王安傳逆坂走九迎風縱棹豈云易哉東漢皇甫嵩傳間關險難後漢曹操智計絶人然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後撝定一時耳通鑑魏明帝太和二年集道壅塞而不達兮江河廣而無梁勢不能凌波以徑度兮又無羽翼而高翔車軏折兮馬虺頽願自往而徑遊兮路壅絶而不通欲修道而平驅兮又未知其所從並楚辭投艱履險權載之集百步九折唐文粹紫禁終難叫朱門不易排駱賓王集經惟神也故不疾而速不行而至係辭子發若機栝莊齊物論擊電無餘光疾雷無餘聲公孫子史不崇朝而遍雨乎天下公羊傳至如焱風去如收電西漢韓安國傳揉曲木者不纍日銷金石者不纍月西漢公孫弘傳口雖未言聲疾雷震令雖未出化馳如神西漢蒯通傳韓信曰三秦可傳檄而定西漢本傳天下可傳檄而定後漢耿盒傳見事風生西漢趙廣漢傳言其疾速不可當也主父偃上書闕下朝奏暮召入通鑑漢武紀機事以速為神震雷不及掩耳唐李靖傳集若疾霆轉雷而激迅風也張平子東京賦發膚寸之陰成彌天之澤劉賓客集有如乘風船一縱不可纜韓文秋懷詩本朝須臾慰滿三農望斂卻神功寂似無韓魏公兩詩子董安于性緩故佩弦以自急韓非子史穰侯見事遲史記范睢傳陳寵有智而遲通鑑漢獻帝紀劉備人傑有智度而遲魏志荀彧曰袁紹雖有大志而見事遲同上姚崇曰張丞相説見事常遲於我數日之後舊唐書子三人相視而笑莫逆於心遂相與友莊子適子懷於燕慈母喻於荊情相往來也淮南子史祁奚免叔向不見叔向而歸叔向亦不告免而朝左傳襄三十一子産知然明問為政焉子産喜以語子太叔曰他日吾見蔑之面而已今吾見其心矣左傳吳公子光謂專諸曰光之身子之身也史專諸傳剖心析肝相信豈移於浮辭哉史鄒陽傳孔子過鄭與子産如兄弟兄事子産史鄭世家夏侯嬰過高祖語未嘗不移日史記披心腹見情素隳肝膽西漢鄒陽傳高祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢穀間哉東漢馬援傳母子慈愛終始無纖芥之間通鑑漢明帝尹敏與班彪親善每相過輒日旰忘食夜分不寢自以為鐘期伯牙莊周惠施之相得也東漢尹敏傳互見朋友無纖芥之隙通鑑漢章帝孫盛詣殷浩談論食冷而復暖者數四晉書互入朋友孫權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也通鑑魏文紀孫權曰子瑜與孤從事積年恩如骨肉深相明究孤與子瑜可謂神交非外言所間通鑑三國魏文紀恩如骨肉帳中之飲結帶之言可謂親矣通鑑晉安紀王導曰吾與元規休戚是同悠悠之談宜絶智者之口通鑑晉成紀王戎與阮籍為竹林之遊戎嘗後至籍曰俗物已來敗人意戎笑曰卿意亦復易敗耳晉書王戎傳晉羊祜與陸抗對境使命通抗遺酒飲之不疑抗疾求藥於祜祜即以成藥與之抗即服之人多諫抗抗曰豈有鴆人羊叔子哉通鑑晉武帝紀魏主執彭越王協手曰二曹以才名相忌吾與汝以道德相親通監齊高宗情深魯衛書信恆通通鑑梁高祖韋孝寬與裴文舉談論不覺膝前於席後周書加高熲上柱國帝勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所能問也通鑑隋高祖唐憲宗曰朕諳李絳不如是通鑑唐憲宗郭子儀功蓋天下而主不疑唐書本傳二人深相知同心徇國故唐世稱賢相者帷房杜通鑑唐太宗傳記孫安國往殷中軍兵論往反精苦客主無間世説遠公與十八賢同修淨土于白蓮送客過溪虎輒鳴與陶元亮陸修靜談道不覺過虎溪因相與大笑故作三笑圖廬山記集惠然不疑推置於肺肝間杜牧之疑消破癥弩元微之不以我為貪知我家內貧白樂天肺腑都無隔同上吾與叔堅剖心相知豈以流言相猜耶張奐與延叔堅書經蓄疑敗謀尚書周官子人有亡鈇者意其鄰之子視其行步竊鈇也顏色竊鈇也言語竊鈇也作動態度無為而不竊鈇也列子繼子得食肥而不澤情不相與往來也淮南子謬稱訓史疑行無名疑事無功商鞅傳霍光權益重每朝見上虛己斂容禮下之已甚通鑑漢宣紀景帝居禁中召周亞夫賜食因趍出上目送之曰此怏怏非少主臣也西漢本傳宣帝初立謁見高廟大將軍霍光驂乘上內嚴憚之若有芒剌在背光死而宗族誅俗傳霍氏之禍萌於驂乘通鑑漢宣帝紀崔駰曰未信而納忠者謗也東漢本傳杜預曰疑心而信耳目疑耳目而信簡書通鑑晉紀王濬伐吳不受王渾節制濬常疑渾渾詣濬濬陳武備然後相見晉書猜忍受讒功臣故舊無始終保全者乃至子弟皆如仇敵通鑑隋高祖杜牧曰世稱周召為百代之師周公擁孺子而召公疑之以周公之聖召公之賢少事文王老佐武王能平天下周公之心召公且不知之召公尚爾況其下哉唐書新羅傳上每有寇盜輒命世民討之事平之後猜疑益甚通鑑唐高祖煬帝不信齊王恆有中使察之聞其宴飲則曰彼營何事得遂而喜聞其憂悴則曰彼有他念故爾父子之間且猶如是況他人乎通鑑唐太宗齊王暕素失愛於帝恆相猜忌宇文化及使人就第誅暕竟不知殺者為誰父子至死不相明通鑑隋楊帝心膂之內尚有形迹之拘通鑑唐德宗初王敦之舉兵也周顗上表明導言甚切導不知救已而甚銜之晉書周顗傳唐宣宗素惡德裕即位之日德裕奉册既罷謂左右曰適近我者非太尉耶每顧我毛髮灑淅通鑑唐武宗集群鷗不下衆雀遙驚朱敬則魏武帝論對面九疑峰李白集斗酒強然諾寸心終自疑李太白集疑生所怪柳文不豫衾之眠信豫衾之穿盧同詩疑懼聽冰狐溫飛卿經我聞有命不敢以告人詩唐風揚之水子韓昭侯必獨臥惟恐夢言泄於妻妾韓非子史楚王曰言出於余口入於爾耳左傳昭二十勢不可以多人多人不能無生得失生得失則語泄史聶政傳石建屏人乃言西漢屬其人勿衆謝西漢王嘉傳張安世典樞機周密外內無間西漢本傳孔光休日歸沐兄弟妻子燕語終不及朝省政事或問孔光溫室省中樹皆何木也光默不應更答以他語其不泄如是通鑑漢成紀手書毀草不宣於外東漢皇甫嵩傳荀攸深密有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言魏志本傳注顧雍軍國得失自非面見口未嘗言通鑑三國魏紀陳群前後數陳得失每上封事輒削其草時人及子弟莫能知也同上魏明紀殷景仁臥疾五年雖不見上而密函去來日以十數朝政小大必以咨之形迹周密莫有窺其際者通鑑宋太祖周捨同參國政每有表奏輒焚其藁捨豫機密二十餘年未嘗離左右國史詔誥儀禮法律軍旅謀謨皆掌之與人言謔終日不絶而竟不漏泄機事通鑑梁武紀戴胄奏已藁祕外莫知唐書傅奕性謹密職在占候杜絶交遊所奏災異悉焚其藁人無知者通鑑唐高宗上漏其情則下不敢盡意上泄其事則下不敢盡言劉蕡策集密語誰得知白樂天集經君不密則失臣臣不密則失身幾事不密則害成易繫辭子曰禮之所生也則言語以為階同上子棠溪空見韓昭侯曰為人君漏泄群臣之語猶玉卮無當也韓非子牆有耳微謀外泄管子史祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也左傳桓十五言語漏泄則職汝之由左傳襄十四子貢曰無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也史記端木賜傳恐事未遂而謀泄則禍立至矣通鑑周紀師丹使吏書奏吏私寫其草丁傅子弟聞之使人上書告丹上封事行道人遍持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄通鑑漢成紀互見讒譖陳蕃欲誅官官乃先事露章曰願出臣章示左右令諸姦臣知臣疾之東漢本傳漏泄省中語西漢賈捐之傳才踈意廣東漢孔融傳蜀大將軍費禕與諸將大會於漢壽郭循在坐禕歡沈醉循起剌禕殺之禕資性泛愛不疑於人通鑑邵陵厲公紀甘卓家人皆勸卓備王敦卓不從悉散兵佃作襄陽太守周慮密承敦意詐言湖中多魚勸卓遣左右悉出捕魚慮引兵襲卓於寢室殺之傳首於敦通鑑晉明紀殷仲文素有才望自謂宜當朝政悒悒不得志出為東陽太守東陽何無忌所統仲文許便道修謁無忌喜欲迓之而仲文失志恍惚遂不過府無忌以為薄已大怒通鑑晉安紀劉蕡曰上漏其情則下不敢盡意上泄其事則下不敢盡言劉蕡戒帝漏言而身誦語於庭並新唐書本傳宋申錫欲誅官者王璠漏其謀申錫貶通鑑唐文宗紀齊浣言葛福順典禁兵不宜與王毛仲為婚毛仲小人寵過則生姦不早為之恐成後患又曰君不密則失臣願陛下密之會大理丞麻察坐事左遷浣素與察善出城餞之因道禁中諫語察性輕險遽奏之通鑑信安王禕以軍功有寵於上宇文融疾之禕入朝融使御史李寅彈之泄於所親禕聞之先以白上明日寅奏果入上怒融坐貶同上集不密致危正平賦本朝寇萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正在相府又欲以歲月盡治天下事失於急與不忍小忿故群小人亦急逐去之一去隨不復用以歿其身老泉天禧末真宗寢疾章獻明肅劉太后漸預政真宗意不能平寇萊公探知此意遂欲廢章獻立仁宗尊真廟為太上皇而誅丁謂曹利用等於是引李迪楊億曹瑋盛度李遵勗等葉力處畫已定凡誥命盡使楊億為之且將舉事會寇萊公因醉誤言有人馳報謂夜往利用家謀明日利用入盡以萊公謀白太后詔罷政事真宗上仙遂投公海上其事有類上官儀者三朝言行録
