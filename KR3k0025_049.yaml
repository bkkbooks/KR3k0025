body:
  text: 欺罔經譸張為幻尚書注誑也指欺誑幻惑也以空作見文書與實不相應也周禮宰夫注假於鬼神時日卜筮以疑衆記王制子飾智以驚愚莊狎侮欺紿亡所不為列黃帝向氏以國氏之謬己也以國氏之重罔己也列天瑞互入愚暗燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而歎指舍曰此若先人之廬乃涓然而泣指壟曰此若先人之冢其人哭不自禁同行者啞然大笑曰豫昔紿若此晉國耳列周穆王互入愚暗楚人握山雉者欺路人曰鳳凰也路人曰我聞鳳凰今始見矣請買千金弗與請加倍乃與之尹文史趙高獻鹿謂之馬二世問左右此乃鹿也左右皆曰馬也二世驚自此為惑乃召太卜令卦之太卜曰奉宗廟鬼神齋戒不明乃至於此史記李斯傳互入阿附瞽説欺天西漢谷永傳滿讕誣天谷永傳欺罔也讕萊亶切元光二年李少君以祠竈卻老方見少君善為巧發奇中嘗從武安侯飲坐中有九十餘老人少君乃言與其大父遊射處老人為兒時從其大父識其處一坐盡驚少君言上曰祠竈可致物致物而丹砂可化為黃金壽可益蓬萊仙者可見以封禪則不死黃帝是也居久之李少君病死天子以為化去不死而海上燕齊怪迂之方士更多言神仙事矣通監漢武紀元狩四年齊人少翁以鬼神方見拜少翁為文成將軍居歲餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有奇殺視得書言甚怪天子識其手書問其人果是偽書於是誅文成將軍而隱之元鼎二年丁義薦方士欒大大敢為大言處之不疑大言曰臣嘗往來海中海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也元鼎四年齊人公孫卿曰黃帝仙登于天黃帝採首銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝上騎龍與群臣後宮七十餘人俱登天於是天子曰嗟夫誠得如黃帝吾視棄妻子如脫屣耳元封二年公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城遂至東萊宿留之數日無所見見大人迹云公孫卿言仙人好樓居於是上令長安作蜚廉觀甘泉作益壽延壽觀持節設具而候神人天子病鼎湖甚巫醫無所不致不愈遊水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君言曰天子無憂病病少愈強與我會甘泉病良已置酒壽宮神君非可得見聞其言與人音等時去時來來則神君所言上使人受書其言命之曰畫法其所語世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也上祭黃帝冢橋山釋兵須如上曰吾聞黃帝不死今有冢何也公孫卿曰黃帝已仙上天群臣思慕葬其衣冠情不覆其貌音謂之偽毀譽失其真者謂之誣言事失其類者謂之罔前膠東相王成偽自增加流民八萬口以蒙顯賞是後俗吏多為虛名云並同上昔秦始皇使徐福發男女入海求仙採藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以術窮詐得誅夷伏辜通監漢元紀盜賊始發其源甚微部伍吏人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通監漢平紀譬猶畫工惡圖犬馬而好作鬼魅誠以事實難形而虛偽不窮也通監漢殤紀繁文偽飾欺天罔人通監元黃改色馬鹿易形東漢王逸傳時宦官並起第宅擬則宮室帝常登永安候臺宦官恐望見之乃使趙忠等諫曰人君不當登高登高則百姓離散自是不敢復登臺榭東漢宦者傳武帝下令曰昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女世人謂之撾婦翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黑欺天罔上者也魏志互入妄偽嵩高道士潘誕自言三百歲為帝合鍊金丹常役數千人所費巨萬鑿嵩高大石深百尺者數十處凡六年丹不成通監隋煬紀馹書上聞旬月方報其敗喪則減百而為一其捃獲則張百而成千通監唐德宗祿山奏言去春營州蟲食苗臣焚香祝天云臣若操心不正事君不忠使蟲食臣心臣若不負神祇願使蟲散即有群鳥從北來食蟲立盡請宣付史官通監唐元宗或告第五琦受人金二百兩遣御史劉期光追按之琦曰琦備位宰相二百金不可手挈若付受有憑請準律科罪期光即奏琦已服罪通監唐肅宗高力士有養女嫠居東京頗能言宮中事女官李真一意其為沈太后詣使者具言其狀高氏辭稱實非太后驗視者益疑之徑迎入居上陽宮供奉左右誘諭百方高氏心動乃自言是通監唐德宗肆騁譎怪其進對皆他人莫敢言者延齡言之不疑亦人之所未嘗聞德宗頗知其詐唐書裴延齡傳互入妄誕唐太宗責高德孺曰汝指野鳥為鸞以欺人主取高官唐書豆盧革韋説嘗問郭崇韜曰汾陽王本太原人徙華陰公世家鴈門豈其枝泒耶崇韜曰因遭亂亡失譜諜嘗聞先人言上距汾陽四世耳革曰然則固從祖也有求官者崇韜曰深知公功然門地寒素不敢相用恐為名流所嗤通監唐莊宗傳記江南呼欺曰紿通作詒集韻本朝妄自粉飾欺育聾東坡詩反覆經彼何人斯其心孔艱詩何人斯為鬼為蜮同上情踈而貌親在小人則穿窬之盜也與記表記匿怨而友其人左丘明恥之丘亦恥之語子好面譽人者亦好背而毀之莊互入面是背非孔子曰人心險於山川難於知天天亦有春秋冬夏旦暮之期人者厚貌深情同上互入人心難託若蜚鳥然傾側反覆荀議兵言無常正行無常信唯利所在無所不傾荀不荀口親心踈貌合行離抱朴子史陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧匪屨可也齊侯説執袁濤塗左僖四年公孫洪外寬內深諸常與有卻者雖陽與善陰報其禍殺主父偃徙董仲舒於膠西皆洪之力也史記本傳睢真傾危之士哉通監周紀太史公曰張儀行事甚於蘇秦要之此兩人真傾危之士哉史記貪叨險詖不間義禮前漢禮樂志陰賊感概西漢郭解師古曰陰賊懷害之意也其陰賊著於心本發於眥睚同上天下以酈寄為賣友西漢本傳公孫洪嘗與公卿約議至上前皆背其約以順上旨通監漢武紀鄭朋陰欲附蕭望之上疏言史高遣客為姦利及言許史子弟罪過章視周堪堪令朋待詔金馬門後朋行傾邪望之絶不與通朋與李宮俱待詔堪獨白宮為黃門郎朋怨恨更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之問洪恭石顯恭顯恐望之因訟即挾朋告望之等謀欲罷車騎將軍疏退許史狀西漢蕭望之傳谷永前後所上四十餘事略相反覆西漢本傳石顯為人巧慧習事能深得人主微指內深賊持詭辨以中傷人忤恨睚眥輒被以危法通監漢元紀動靜可識而沈阻難徵深厚之性詭於情貌東漢郭太傳乘人之危非仁也東漢蓋勳傳蜀李嚴用性深刻鄉里曰難可狎李鱗甲江表傳又蜀志陳震傳載諸葛亮與董允書曰陳孝起與吾説李正方腹中有鱗甲鄉黨以為不可近劉曄為帝所親重帝將伐蜀朝臣內外皆曰不可曄入與帝議則曰可伐出與朝臣言則曰不可通監魏明紀晉劉毅曰一人之身旬日異狀通監晉紀劉襲曰事之不可者莫大於反將軍往年反王兗州近日反司馬郎君今復反桓公一人三反何以自立通監晉安紀李義深心胸險峭時人語曰劍戟森森李義深北史李義府貌柔恭與人言嘻怡微笑而陰賊褊忌几忤意者皆中傷之時號義府笑中刀唐姦臣傳李義府柔而害物人謂之人貓唐書本傳封倫資險佞內挾數刺人主意陰導而陽合之人莫能探其膺肺唐書封倫傳鄭愔初附來俊臣俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福竟坐族誅通監唐元宗李林甫城府深密人莫窺其際好以甘言啖人而陰中傷之不露辭色凡為上所厚者始則親結之及勢位稍逼輒以計去之雖老姦巨猾無能逃其術者李林甫為相凡才望功業出己右及為上所厚勢位相將逼己者必百計去之尤忌文學之士或陽與之善啖之李適之性踈率林甫嘗謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛己薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脫適之由是束手矣並同上互入諂諛贄陸與璟稍約至帝前極論延齡裴帝怒形於色璟默而不言舊唐書德宗紀集溪谷不能喻其險鬼神無以究其變文選絶交論惡鳥不鳴文選面從背違意與口戾言如飴蜜心如螫厲晉仲長敖核性賦法吏多少年磨淬出角圭將舉汝愆尤以為已階梯韓退之詩賦性專相醢韓文鼠牙穿屋虺毒吹人李衛公朋黨論人中有獸心孟東野一人千萬心同上方寸地九折阪仲長敖核性賦深心藏陷阱巧言織網羅白侍郎李義府輩笑欣欣笑中有刀潛殺人陰陽神變皆可測不測人間笑是嗔同上梟心獍貌何人覺元稹集爍鐵不在火割肌不在刀險心露山嶽流語翻波濤元微之集肺肝增巧曲同上甜言柔舌杜牧之弗聲弗鳴潛此毒螫唐文粹陸龜蒙蝎賦初即許之以死殉體面俱柔終乃背之而飽飛身名已遂唐文粹互入有始無終一日天無風四溟波盡息人心風不吹波浪開百尺唐于瀆詩傳記含沙射人京房易傳性深阻若有城府晉紀總論經汝無面從退有後言書益稷子好面譽人者亦好背而毀之莊盜跖互入傾險口是心非背面異辭抱朴子面譽而背毀魏證惡之文中子史灌夫罵灌賢曰平生毀程不識不直一錢今日乃效女曹兒呫囁耳語漢書本傳互入譏誚集面從背違晉仲長敖賦晚將未契託年少當面輸心背面笑杜詩反掌背面天遼海隔陸魯望
