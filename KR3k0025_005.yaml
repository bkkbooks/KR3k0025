body:
  text: 同出異趣經性之與情猶波之與水靜則是水動則是波記中庸疏禮之於人也猶酒之有蘗也君子以厚小人以薄記禮運互入事同體異子奕秋誨二人奕一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣孟告子上牟麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也同上干越夷貊之人生而同聲長而異俗教使之然也荀勸學孔子墨子俱法堯舜而取舍不同韓子清之為明杯水而見眸子濁之為暗河水不見泰山淮南揚子曰吾於荀卿見同門而異戶也揚傳記學者如牛毛成者如麟角蔣子萬機論絲俱生於蠶為繪則賤為錦則貴姚信士緯集子雲相如同工異曲韓文進學解少長聚嬉戲不殊同隊魚年至十二三頭角稍相踈二十漸乖張清溝映汙渠三十骨骼成乃一龍一豬飛黃騰踏去不能顧蟾蜍韓文生歸蘇屬國死別李將軍鮑溶詩生為並蒂花亦有先後落唐文粹經投戈散地則六親不能相保同舟而濟則胡越何患乎異心易略例子多助之至天下順之寡助之至親戚叛之孟公孫丑下自其異者視之肝膽楚越也自其同者視之萬物皆一也莊行合趣同千里相從趣不合行不同對門不通淮南子史意合則胡越為昆弟由余子臧是矣不合則骨肉為仇讎朱象管蔡是矣前漢鄒陽書互入間不容髮白頭如新傾蓋如故知與不知也西漢鄒陽傳盡下則胡越同心輕物則六親離德通監唐太宗德澤洽則四夷可使如一家猜忌多則骨肉不免為讎敵同上傳記同聲則異而相應意合則未見而相親大戴禮保傳萹愛而利之四海之內若合一家不愛而利之子或殺父況天下乎韓詩外傳東門先生居蓬戶空穴之中而魏公子一朝以百騎日寵之呂望未嘗與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉東方朔記白頭而新傾蓋而故新序互入事反所料集結交在相知骨肉何必親古歌辭物情苟有合莫問玉與泥韋應物集忐合者蓬心可採情諧者蘭味寧忘駱賓王人生意氣豁不待相逢早杜詩藹藹桑麻交公侯為等倫同上情思附則感而悅之雖仇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣陸宣公集得之者江海比鄰失之者肝膽楚越唐徐彥伯論本朝相知不必因相識臨川集白頭無故意異代有同音陳后山互入事反所料但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條朝董之對則孝宣以致中興東坡進陸贄奏議劄子子越人關弓而射之則己談笑而道之無他疏之也其兄關弓而射之則己垂涕泣而道之無它戚之也孟告子同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也孟經愛而知其惡憎而知其善禮記曲禮上拜下禮也今拜乎上泰也雖違衆吾從下語子罕互入不隨人轉紂之不善不如是之甚也語子張史子貢喜揚人之美不能隱人之惡史記不虛美不隱惡西漢司馬遷贊曹操勳勞宜賞不吝千金無功望施分毫不與通監三國志昔屈到嗜芰屈建去之以為不可以私欲干國之典通監齊太祖傳記所憎者有功必賞所愛者有罪必罰太公六韜集譬如親骨肉寧免相可否韓文當其賞雖三旌之貴萬鍾之祿咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘咸曰宜何也為惡而然也劉賓客集勿矜朱門是陋此白屋非同上登奉常之第者未必盡能文章為牙門之將者未必盡能威敵唐文粹本朝天下之事固有出於不幸者矣苟有可以用於世者不必聖賢之作也𧈪尤作五兵紂作漆器不以二人之惡而廢萬世之利也歐公集君實嘗謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反覆相非終身不能相一溫公行狀若無天下議美惡併成空後山詩經罔水行舟書益稷奡蕩舟語憲問俾出童羖詩賓之初筵子匿為物而愚不識大為難而罪不敢重為任而罰不勝遠其塗而誅不至莊則陽以舟之可行於水也而求推之於陸莊天運兩喜必多溢美之言兩怒必多溢惡之言莊人間世互入私意天下莫大於秋毫之末而泰山為小莫壽乎殤子而彭祖為夭莊齊物論立直木而求其影之枉也立枉木而求其影之直也荀王霸責三光不照於覆盆之內抱朴辨問互入苛責於人責疲者以舉千鈞責兀者以及走兔鄧析子無厚聽虛而責響視空而索影劉子史董仲舒曰不琢玉而求文采西漢本傳以毀譽為榮辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯通監漢光武紀言論者計厚薄而吐辭選舉者度親踈而舉筆善惡謬於衆聲功罪亂於王法通監漢武紀曲表而欲直影郤行而欲求及前人也東漢楊賜傳傳記若夏之日而欲夜之長也說苑前賢群邪相抑以曲為直陸賈新語集謂鏌耶為鈍兮鉛刀為銛賈誼鵬賦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也韓文原道天下無正聲悅耳即為娛人間無正色悅目即為姝白侍郎集蓼蘗為甘山嶽為輕沈下賢日月至明或以為昏秋毫至微或以為繁唐文粹本朝女無美惡富者妍士無賢不肖貧者鄙玉扄文經若火之燎于原不可嚮邇其猶可撲滅書盤庚上若顛木之有由蘗同上雖無老成人尚有典刑詩蕩往者不可諫來者猶可追語子木雖蠹無疾風不折墻雖隙無大雨不壞管史圖王不成其弊猶足以霸東漢隗囂傳補衣猶有完通監四十九傳記晉平公問於師曠曰吾年七十欲學恐已暮師曠曰老而學者如炳燭之明炳燭之明孰與夜行說苑見兔而顧犬未為晚也亡羊而補牢未為遲也春秋後語集典刑未滅故老猶存選辨亡論經若火之燎于原不可嚮邇書盤庚上互入力所不及不可救藥詩板子桀紂在上雖有十堯不能治者勢亂也韓非良匠不能斫金巧冶不能鑄木淮南載重而馬羸雖造父不能以追急同上譬諸琴瑟鄭衛調俾夔因之亦不可以致簫韶矣楊寡見航人無楫如航何同上無聲雖師曠側耳將何聞乎無形雖離婁並照將何覩乎孔叢良工不能琢水文子盛陽不能榮枯朽上智不能移下愚抱朴金丹史疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也左成十年互入疾病本弱者其枝必披非人力所能強為左莊六年注天之所廢誰能興之左襄二十三年大車不較不能載其常任琴瑟不較不能成其五音史齊世家河決不可復壅魚爛不可復全史秦始皇本紀天下無害菑雖有聖人無所施其才上下和同雖有賢者無所立功史東方朔傳羽翼已成難動搖矣西漢張良傳雖有堯舜之德智無所施賁育之勇力不得設通監魏明紀執垂之規矩無工與材坐而待器之成終不可得也通監唐高祖有才無學猶巧匠無楩楠斧斤不能成室唐書劉知幾傳集影不可逐響難為繫文選陸機文賦素冰象玉難可磨蕩文選曹植七發利盡萬物不能睿童昏之心選演連珠毫髮一為瑕丘山不可勝選白頭吟空柯無刃公輸不能以斫但懸曼矰蒲直不能以射四子講德論吞縱之強不能反蹈海之心漂鹵之威不能降西山之節選魯班雖巧不能為乞丐者之顏王郎貧寠語補一壞百無可施功陳子昂集雖令伶倫吹音韻難可改雖令巫咸招冤爽難復在韓文舜之德可以及率土而不化其子柳文與楊誨之書唐虞之仁不能柔秦漢之勇不能威柳文承積弊之餘雖使季冉將不能也皇甫湜天疾難自醫孟東野黃河既濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味唐文粹本朝衝風振河海不能號無竅坡詩互入無罅可及巧手莫為無麵餅陳後山經陰爻雖賤而為一卦之主者處其至少之地也易略例鳳凰鳴矣于彼高岡梧桐生矣于彼朝陽詩卷阿互入得所依托子射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也荀勸學互入其居使然順風而呼聲非加疾而聞者彰登高而招臂非加長而見者遠同上互入其居使然史自繆公以來至於秦王二百餘年常為諸侯雄豈世賢哉其勢居然也史記秦紀百人守險千人不敢過也史蘇秦傳傳記一圍之木持千鈞之屋五寸之鍵而制開闔豈材足任哉所居要也說苑談叢朱買臣曰一人守險千人不得上漢書集儒雅之徒則處龍鳳之署選博奕論劍閣崢嶸而崔嵬一夫當關萬夫莫開李白蜀道難一夫怒臨關百萬未可傍杜詩互入得勢五達之井百汲而盈科未必涼而甘所處之勢然也劉賓客集鬼谷曰子不見嵩岱之松柏乎上枝千於青雲下根通於三泉千秋萬歲不逢斤斧之患此木豈與天地有骨肉所居然也虞般祐高士傳本朝路窮斤斧絶松桂得千霄東坡詩不畏浮雲遮望眼自緣身在最高層臨川集
