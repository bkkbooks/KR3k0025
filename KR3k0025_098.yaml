body:
  text: 徇私忘公附挾公濟私經見利不顧其君其仁不足稱也記檀弓下子百慮其家不一圖國十至私人之門而不一至於庭管明法篇數能至人之門不一至主之庭百慮私家之便不一圖主之國韓非有度史趙充國曰諸君便文自營非為公家忠計也西漢本傳張禹雖家居以特進為天子師國家每有大政必與定議時吏民多上書言災異之應譏切王氏專政所致上意然之未有以明見即車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏通監漢成紀互入阿附谷永前後所上四十餘事專攻上身與後宮而已黨於王氏上亦知之不甚親信也西漢本傳荀悅曰私務眾於官事通監西漢王衍雖居宰輔之重不以經國為念而思自全之計乃以弟澄為荊州族弟敦為青州因謂澄敦曰卿二人在外而吾留此足以為三窟矣晉書本傳李林甫欲杜邊帥入相之路以胡人不知書乃奏言文臣為將怯當矢石不若用寒族胡人胡人勇決習戰寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死帝悅其言始用安祿山至徙諸道節度使盡用胡人精兵咸戍北邊天下之勢偏重卒使祿山傾覆天下皆出於林甫專寵固位之謀也通監唐紀禮部尚書李揆為入蕃會盟使揆有才望盧杞惡之故使之入蕃上曰揆無乃太老對曰使遠夷非諳練朝廷故事者不可且揆行則自今年少於揆者不敢辭遠使矣通監唐德宗李希烈襲陷汝州上問計於盧杞對曰希烈年少驍將恃功驕慢將佐莫敢諫止誠得儒雅重臣奉宣聖澤為陳逆順禍福希烈必革心改悔可不勞軍旅而服顏真卿三朝舊臣忠直剛決名重海內人所信服真其人也命真卿詣許州宣慰希烈詔下舉朝失色李晟嘗將神策軍戍成都及還以營妓高洪自隨西川節度使張延賞怒追而反之由是有隙上召延賞入相晟表陳其過惡上重違其意以延賞為左僕射張延賞與齊映並相映在諸相中頗稱敢言延賞因言映非宰相器映遷夔州刺史盧杞以私隙殺楊炎擠顏真卿於死地激李懷光使叛吐蕃維州副使悉怛謀降盡帥其眾奔成都李德裕遣行維州刺史虞藏儉將兵入據其城庚午一作申具奏其狀且言韋皋沒身恨不能致者也事下尚書省集百官議皆請如德裕策牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢得百維州何所用之詔德裕以其城歸吐蕃執悉怛謀及所與偕來者悉歸之吐蕃盡誅之於境上極其慘酷並同上黃巢北趣襄陽劉巨容拒之大破賊眾或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛官賞事寧則棄之或更得罪不若留賊以為富貴之資眾乃止通監唐僖宗經雨我公田遂及我私詩大田趙文子曰隨武子利其君不忘其身謀其身不遺其友記檀弓事君不敢忘其君亦不敢遺其祖同上事父母能竭其力事君能致其身語學而夫孝始於事親中於事君終於立身孝經無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事毛詩注子公事畢然後敢治私事孟滕文公下今日之事君事也我不敢廢抽矢叩輪去其金發乘矢而後反孟管子曰隰朋之為人也居其家不忘公門在公門不忘其家事君不二心亦不忘其身管子史石奢楚昭王相有殺人者乃其父縱其父自繫使人言之王曰殺人者臣之父也臣罪當死王曰不當伏罪奢曰不私其父非孝子也不奉王命非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死史循吏傳互入循良蘇章遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲酒者私恩也明日冀州刺史按事公法也遂舉正其罪東漢本傳互入徇私忘公苟晞為兗州刺史從母子求為將晞以為督護後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兗州刺史哭弟者苟道將其杖法如此晉書源懷為使持節巡行北邊有懷朔鎮將元尼須與懷少舊貪穢狼籍置酒請懷曰命之長短由卿之口豈可不相寬貸懷曰今日之集乃是源懷與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處尼須揮淚無以對於是表劾尼須北史互入徇公忘私張鎮周拜舒州都督舒州即其本邑鎮周乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕裾敘疇昔之歡十日贈以錢帛既而垂泣謂賓曰比者張鎮周與故人為歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與永訣自是親戚有犯法一無所縱州境肅然唐書本傳陸贄曰吾上不負天子下不負所學唐書陸贄傳山陵近禁人屠宰郭子儀之隸人潛殺羊載以入城右金吾將軍裴諝奏之或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勳高望重上新即位以為群臣附之者眾故吾發其小過以明郭公威權不足畏也如此上尊天子下安大臣通監唐德宗初李懷光之解奉天圍也上以其子璀為監察御史及懷光屯咸陽不進璀密言於上曰臣父必負陛下願早為之備臣聞君父一也但今日之勢陛下未能誅臣父而臣父足以危陛下不忍不言上驚曰知卿大臣愛子當為朕委曲彌縫而奏之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自免對曰臣之進言非苟求生也臣父敗則臣與之俱死矣尚有何策哉使臣賣父求生陛下亦安用之上曰更至咸陽諭卿父使君臣父子俱全不亦善乎李泌曰李璀固賢者必與父俱死矣若其不死則亦無足貴者及懷光死璀先刃其二弟乃自殺同上高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威眾辦事耳以白金數百兩遺之通監梁均王互入徇公忘私晉相桑維翰乃裴皞門生嘗謁皞皞不迎不送或問之荅云皞見維翰於中書則庶僚也維翰見皞於私館則門生也何送迎之有五代史集在家常早起憂國願年豐杜詩互入憂世以孝肥家以忠肥國唐文粹本朝韓魏公言慶曆中與范希文富彥國同在西府上前爭事議論各別下殿不失和氣如未嘗爭也別錄元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官明日交府事以次見府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣聞見錄屬者故敕有司增定蔭補之格必由試藝乃得授官不惟為國造士是乃為臣立家歐公集經時止則止時行則行動靜不失其時其道光明易艮卦用之則行舍之則藏語述而子窮則獨善其身達則兼善天下孟盡心上窮不失義故士得己焉達不離道故民不失望焉同上窮則必有名達則必有力荀子古之得道者窮亦樂通亦樂莊子讓王史張衡云元龍迎夏則凌雲而奮鱗涉冬則淈泥而潛蟠後漢集舒之濟萬民卷之善一身白侍郎施之乃伊呂事業蓄之則莊老道德應而不滯飭躬有則時之來也為雲龍為風鵬勃然突然陳力以出時之去也為霧豹為冥鴻寥兮寂兮奉身而退互入所遇不同達人靜則暗然與陰合跡動則浩然與陽同波並同上隱而晦之則金渾玉璞君子之道也發而明之則龍飛虎變大人之文也唐文粹進為天下利退有百世名顯為諸侯師默成萬世法同上靜則龍蟄存神在一水而無悶動則鳳翔覽德自千仞以來儀李義山文子吞舟之魚不遊枝流鴻鵠高飛不集汙池列楊朱乘雲氣御飛龍而遊乎四海之內莊逍遙遊史自疏濯淖汙泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也推此志也雖與日月爭光可也史記屈原傳鴻鴈高飛一舉千里史張良傳眇然絕俗離世西漢王褒傳傳記神龍不處罔罟之水鳳皇不翔罻羅之鄉人物考集鸞鳳翔於蒼雲兮故繒繳不能加蛟龍潛於旋淵兮身不挂於罔羅楚辭玄鶴兮高飛增逝兮青冥鸞鳳之高翔兮乃集太皇之埜循四極而回周兮見盛德而後下彼聖人之神德兮遠濁世而自藏使麒麟可得羈而繫兮又何以異虖犬羊鴻鵠之一舉兮如山川之迂曲再舉兮睹天地之方圓安能以身之察察受物之汶汶者乎又安能以皎皎之白而蒙世俗之塵埃乎互入不隨人轉當代豈無騏驥見執轡者非其人遂足跳而遠去並同上鳳皇翔于千仞兮覽德輝而下之賈誼賦悲世俗之迫隘朅輕舉而遠遊司馬相如大人賦俯觀萬物擾擾焉如江漢之浮萍晉劉伶酒德頌振衣千仞崗濯足萬里流左太沖詠史詩狹世路之阨僻仰天衢而高蹈成公子安嘯賦高舉磨太清永絕矰繳懼儲光義文決巨壑摩太清塊視三山杯觀五湖李白鵬賦激三千以崛起搏九萬而迅征同上綿綿羅網冥冥高鴻趯趯竹竿穆穆幽龍其禍敗之遼絕胡越哉陳子昂集豈無朝陽鳳恥與微物爭元稹集互入知所愛重長居青雲路彈射無由緣劉賓客集求觀眾丘小必上太山岑求觀眾流細必泛滄海一作滇深韓文誰能駕飛車相從觀海水同上洞視萬古李漢韓文集序靈鳳不啄羶白樂天集黃鵠一去青冥無極柳文下視三界狹但聞五濁腥唐文粹優哉遵渚鴻自得養身旨不啄太倉粟不飲方塘水振羽搴浮雲置羅任從爾孟東野本朝高標不可揖杳若雲間鴻歐公冷看世間人東坡詩超逸絕塵獨立萬物之表馭風騎氣以與造物者遊東坡荅黃魯直書高蹈玩一世過秦漢之故都恣觀終南嵩華之高北顧黃河之奔流慨然想見古之豪傑至京師仰觀天子宮闕之壯與倉廩府庫城池苑囿之富且大也而後知天下之巨麗欒城集扶搖雲漢上睥睨千萬里同上一朝厭蝸角萬里騎鵬背王直方詩話高情如飛鴻未易握粟呼百斛明珠經獨學而無友則孤陋而寡聞記學記子子誠齊人也知管仲晏子而已矣孟公孫丑上陳仲子居於陵耳無聞目無見孟滕文公下少聞曰淺少見曰陋荀修身坎井之蛙謂東海之鱉曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接液一作掖持頤蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎莊秋水互入以己度人款啟寡聞款空也如空之聞所見小也莊達生昔者宋國有田夫常衣蘊黂以過冬暨春東作自曝於日不知天下之有廣廈燠室綿纊狐貉顧謂其妻曰負日之暄夫人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹眾哂而怒一作怨之其人大慚此子類也列楊朱井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也莊秋水夫胡人見麻不知其可以為布越人見毳不知其可以為氈故不通於物者不可與言俗淮南子寸鮹汎跡濫水之中則謂天下無四海之廣芒蝎宛轉菓核之內則謂八極之界盡於茲也抱朴子互入以己度人見虎毛不知其斑金樓子史少見之人如管中闚天也史梁王世家叔孫通綿蕞諸生喜曰叔孫生誠聖人也知當世之急務史本傳守突奧之熒燭未仰天庭而睹白日也遼東有豕生子白頭異而獻之至河東見群豕皆白懷慚而還後漢朱浮傳何異夫虱之處禈中乎晉書阮籍傳生世不學其猶穴處何所見焉北史雷紹傳管中窺豹時見一班世說新語中又晉書王獻之傳傳記胡人見布而疑毳越人見罽而駭毳山海經序釋氏戒世人不可以耳目不及便為虛誕如山中人不信有魚大如木海上人不信有木大如魚漢武帝不識弦膠魏文帝不信火布胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬斛舟船北齊黃門侍郎顏之推顏氏家訓集野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣選嵇叔夜書食芹雖云美獻御固已癡韓文歸趙城詩老子之小仁義非毀之也其見者小也坐井而觀天曰天小者非天罪也韓文原道如龜居殼不知海寬白樂天集醯雞仰甕口亦謂雲漢津劉賓客集本朝俗傳書生入官庫見錢不識或問之曰生固知其為一作謂錢但怪其不在紙褁中耳百斛明珠
