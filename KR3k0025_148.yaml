body:
  text: 推挽史或挽之或推之欲無入得乎左襄十四年田勝為周陽侯遍見湯貴人史張湯傳季布名所以益聞者曹丘揚之也史記引重者相薦達使孔子名布揚於天下者皆子貢先後之也史貨殖傳欲相攀援死而後已西漢翟方進傳援引也音爰相與提衡杜周傳言相攜持也鄭當時推轂士及官屬常引以為賢於已本傳借譽於左右鄒陽傳游揚足下名於天下季布傳並西漢張華性好人物至于窮賤候門之士有一介之善者咨嗟稱詠為之延譽晉張華傳互入樂書士子聲名未立應共獎成無惜齒牙餘論南史謝眺傳傳記士非玉石談者為價物理論集名聲荷朋友韓文縣齊有懷青冥送吹噓韓薦士詩故人相攜直上太階呂溫作杜如晦贊吹噓期指掌元微之本朝乘雪灑潤乘律噓枯臨川經惠康小民書文侯之命君子之於人序其情而閔其勞所以說也詩東山勞來還定安集之至于矜寡無不得其所詩鴻雁老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養記禮運隱惻矜恤於物謂之仁禮記疏子惻隱之心仁之端也孟公孫丑上史昔闔廬在國天有菑癘親巡矜寡而共其乏困左哀公元年民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣榖梁范睢見須賈賈曰范叔一寒如此哉乃取其一綈袍以賜之史本傳蓋寬饒為衛尉司馬躬按行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚恩西漢本傳集以俸錢葬枯而恩浹以家飲救渴而澤周萼合兄弟之析居者而民以養麕復老弱之流庸者而疆以實皇甫湜齊王不忍觳觫牛簡子亦放邯鄲鳩柳詩視人之瘼如熛疽在身不忘決去劉賓客集其心如肺石動必達窮民白侍郎集長安有貧者為瑞不宜多羅隱集本朝我哀籃中蛤閉口護殘汁又哀網中魚開口吐微濕坡詩子孔子將行雨而無蓋門人曰商也有之子曰商之為人也甚短於財吾聞與人交推其長者違其短者故能久也家語史人之有墻以蔽惡也左昭元年曹參見人有過掩匿覆蓋之西漢本傳陳遵入公府日出醉歸曹事數廢西曹請斥之大司徒馬宮重遵謂西曹曰此人大度士奈何以小文責之本傳互見官長黃霸為穎川守許丞老病聾督郵白欲去之霸曰許丞雖老尚能拜起送迎重聽何傷且善助之母失賢者意本傳互見官長包容二類未敢誦言誅之高后紀公言也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾坐汙穢淫亂男女亡別者不曰汙穢而曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以呼之也尚遷就而為之諱故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請罪矣上不執縳係引而行也其有中罪者聞命而自弛上不使人頸而加也其有太罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣賈誼傳並西漢互入禮貌褚彥回有門生盜其衣彥回遇之謂曰可密藏之勿使人見此門生慚而去宋書本傳王僧祐父遠時人為之語曰王遠如屏風屈曲能蔽風露齊書王曰朕好與人較量理致崔祐甫性褊躁朕難之則應對失次朕常知其短而護之通監唐德宗紀初李景略嘗宴僚佐行酒者誤以醯進判官京兆任迪簡以景略性嚴恐行酒者獲罪強飲之通監唐順宗紀傳記牛奇章公帥維楊杜牧在幕中夜微服逸游後牧以拾遺召公以縱逸為戒牧始隱公取一篋皆街子輩報帖云杜書記平善芝田録互見官長集仲尼不假蓋於子夏護其短也嵇叔夜絶交論本朝韓魏公與歐陽永叔相親最深公知永叔不以繫辭為孔子書又多不以文中子為可取中書相會纍年未嘗與之言及也別録韓魏公為丞相每見文字有攻人隱惡者必手自封之未嘗使人見同上子子華子程本返自郯遭孔子於塗傾蓋而顧相語終日甚相親也子華子史吳季札聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉吳地貴縞鄭地貴紵故各獻已所貴左襄二十九年孔子過鄭與子産如兄弟史鄭世家傾蓋如故西漢鄒陽傳周瑜過魯肅求糧肅指一囷與瑜遂相親結定僑札之分吳志一見如舊新唐書房元齡傳傳記傾蓋如故劉向新序盛憲常逢一童容貌非常憲怪而問之是魯國孔融時年十歲餘憲下執融手載歸舍與融談知其不凡便結為兄弟因升堂見親會稽典録集傾蓋雖終朝大分邁疇昔盧子諒詩生平未識一見而交道遂存此日披懷千載之風期坐合陳子昂集相識雖新有故情白樂天集欲迎先倒屣並坐便傾樽劉賓客本朝風期一相許意氣曾誰讓歐陽文子子列子學也上章云列子學乘風之道三年之後心不敢念是非口不敢言利害始得老商一眄而已列子仲尼篇商名容始得夫子一盻而已列子黃帝篇集顧盻增其倍價剪拂使其長鳴文選廣絶交論昔歐冶改視鉛刀易價伯樂所盻駑馬百倍文選曹植表互入因人而重顧盻成飾咳唾為恩駱賓王集猥以疵賤之姿謬奉清通之眄駱賓王集一顧輕千金李太白集一顧生鴻羽孟東野三都時覺重一顧世稱妍元微之集風光一擡舉猶得暫時看同上經拔茅茹以其彙征吉易泰卦儒有內稱不辟親外舉不辟怨推賢而進達之不望其報記儒行趙文子所舉於晉國管庫之士七十有餘家禮記公叔文子之臣大夫僎與文子同升諸公住僎本文子家臣薦之使與己並為大夫同升公朝語憲問子趙武薦白屋之士六十餘家韓子史楚子西曰勝如卵余翼而長之左哀十六年君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類左襄三年絳縣人七十有三年矣趙孟曰不能由吾子使吾子辱在泥塗久矣遂仕之左襄三十年仲尼聞魏子之舉也曰近不失親魏戊遠不失舉可謂義矣左傳昭二十八年韓安國貪嗜於財所推舉皆廉士賢於己者也於梁舉壺遂臧固皆天下名士史本傳薦天下賢俊太史公傳鄭當時推轂士及官屬常引以為賢於己本傳楊興說史高曰匡衡才智有餘經學絶倫但以其無階朝廷故隨牒在遠方將軍誠召置幕府與參事議觀其所有貢之朝廷必為國器匡衡傳稠人廣衆薦寵下輩士亦以此多之灌夫傳何武為人仁厚好進士獎稱人之善為楚內史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此兩人顯於世者何侯力也本傳兩龔勝與舍兩唐林與尊互見樂善田蚡進名士家居者本傳並西漢河南尹羊陟謁造趙一言談至曛夕極歡而執其手曰良璞不剖必有泣血以相明者矣陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采東漢趙一傳第五倫舉人多至二千石本傳胡廣所辟命皆天下名士本傳光武任使諸將多訪於鄧禹禹每有所舉皆當其才鄧禹傳陳實出於單微鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得人西門亭長陳實可實聞之曰鐘君似不察人不知何獨識我太守遂以實為功曹通監漢質帝紀互入自代孔融上疏曰惟嶽降神異人並出竊見平原處士禰衡年二十四字正平淑質貞亮英才卓礫初涉藝文升堂睹奧目所一見輒誦於口耳所暫聞不忘於心性與道合思若有神弘羊潛計安世默識以衡準之誠不足怪忠果正直志懷霜雪見善若驚疾惡若讎任座抗行史魚厲節殆無以過也鷙鳥纍百不如一鶚使衡立朝必有可觀飛辨騁辭溢氣坌涌解疑釋結臨敵有餘昔賈誼求試屬國詭繫單于終軍欲以長纓牽致徑越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫微垂光虹霓足以昭近署之多士增四門之穆穆鈞天廣樂必有奇麗之觀帝室皇居必蓄非常之寶若衡等輩不可多得激楚揚阿至妙之容臺牧者之所貪飛兔騕裊絶足奔放良樂之所急臣等區區敢不以聞禰衡傳並東漢呂蒙至都權問誰可代卿者蒙曰陸遜意思深長才堪負重乃召遜拜偏將軍右部督以代蒙通監漢獻帝紀互入自代門諸葛誕曰今善人單少苟其性不邪便可獎就吳志龐寵曰拔十失五猶得其半蜀志本傳荀令君之舉善不進不休魏志互入樂善荀令君之所舉皆命世之大才同上謝眺好獎與人才曰士子聲名未立宜共獎成無惜齒牙之餘論晉書互見推挽山濤為史部甄拔人物晉本傳初克未仕時河內山簡嘗與琅琊王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人晉書蔡謨傳克謨之父也石苞求為小縣許允曰卿我輩人當相引在朝晉書劉穆之為丹陽尹凡所薦達不納不止宋書劉逖薦辛德源曰弱齡好書晚節逾厲枕籍六經漁獵百氏北史海內賢才起自仄陋外國遠方名士拔而用之皆浩之由也北史魏崔浩金在礦何足貴善冶煆而為器人乃寶之唐書魏證傳互入矯揉魏中尉李彪家世孤微朝無親援李沖薦於魏主且為之延譽於朝公私汲引通監齊高紀房元齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰微公言幾失之通監唐高祖紀拔犀之角擢象之齒唐舒元輿傳古人言拔十得五猶得其半崔祐甫傳太后嘗問狄仁傑朕欲得一佳士用之誰可者仁傑曰文學醞藉則蘇味道李嶠固其選矣必欲取卓犖奇才則有荊州長史張東之其人雖老宰相才也太后擢為洛州司馬數日又問仁傑對曰前薦東之尚未用也太后曰已遷矣對曰臣所薦者可為宰相非司馬也通監唐中宗紀狄仁傑嘗薦數十人卒為名臣或謂仁傑曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也同上李吉甫同平章事謂中書舍人裴垍曰朝廷後進罕所接識君有精鑒願悉為我言之垍取筆疏三十餘人數月之間選用略盡當時翕然稱吉甫為得人通監唐憲宗紀傳記驥躊躇於弊輂兮遇孫陽而得代孫陽伯樂姓名也楚辭集蓋聞繁弱登御然後高庸之功顯孤竹在肆然後降神之曲成伏見處士廣陵戴淵心智足以妍幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有泄并之潔誠東南之貴寶聖朝之奇璞也陸機薦戴若思文蓋聞驪龍之珠必沈紫泉之裏垂天之翼必翔青冥之表竊見處士吳國張道順下筆攄雕龍之文發言吐掞天之藻若得清水淬其鋒越砥斂其鍔必騰躍天路出覿聖世楊方為虞領軍薦張順文東都雖信多士朝取一人焉拔其尤暮取一人焉拔其尢韓文送溫造序好賢樂善孜孜以薦進良士為已任方今天下一人而已文章之尤者有侯喜侯雲長者有劉述古者其文長於為詩當今舉於禮部者無與為比有崔群玉者其文進而未止者也為人賢而有才志剛而氣和凡此四人者皆可以當執事首薦有沈杞張苰尉遲汾李紳張後餘李翊者或文或行皆出群之才也凡此數子與之得以收人望得才實韓愈與陸員外書誠不忍奇寶橫棄道側韓文薦樊宗師於袁滋相公書翼靈鳳於蒼梧起滯龍於潢汙晉陸士衡雲賦賢者之處猶金玉生於沙礫豫章産乎幽谷下不進之於上則無由而至矣鐘子芻蕘論但是粃糠微細物等來擡舉到青雲羅隱詩首光此舉陳子昂集薦長光價同上聽清聲於爨餘枯桐發響收夜光於玄璧怪石騰輝駱賓王集豫章生宇下母使翳蓬蒿劉長卿集汲引之惠如帆得風李習之集故人相攜直上太階呂和叔贊杜如晦生其羽翼長其光價唐文粹春膏時蒸朽葉自滋同上王子師為豫州未下車即辟荀慈明既下車又辟孔文舉李白與韓荊州書山濤為異州甄拔三十餘人或為侍中尚書同上網羅遺賢推轂群英玉不韜輝蘭無沈馨飛鴻出冥振鷺在庭唐呂溫文長得蕭何為國相自西流水盡朝宗王建集假以羽翼俾之騫翥柳文澤潤窮鱗雷使幽蟄呂和叔文本朝斟酌元氣洪纖漙被其仁雕刻衆形妍惡曲成其彙臨川集當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢才當公居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢歐公作晏殊墓銘譬之象犀珠玉雖無補於飢寒要不可使在泥塗中東坡文集互見鑒別
