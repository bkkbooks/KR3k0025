body:
  text: 隱逸經肥遁無不利易遁卦注超然絶志心無疑顧憂患不能纍矰繳不能及伊川云肥者充大寬裕之意遁者窮困之時也善處則為肥也君子獨立不懼遁世無悶易大過不事王侯高尚其事易蠱卦考槃在澗碩人之寬詩考槃儒有上不臣天子下不事諸侯記儒行隱居以求其志又隱居放言語賢者辟世其次辟地語微子子路遇丈人以杖荷蓧子路以告子曰隱者也同上子隱於窮閻漏屋三公不能與之爭名荀棄赫奕之朝華避僨車之險路吟笑蒼崖之間而萬物化為埃氛怡顏豐柯之下而朱戶變為繩樞握耒甫田而麾節忽若執鞭啜荈瀨泉而太牢同乎藜蓼泰爾有餘歡於無為之場欣然齊貴賤於不爭之地含醇守璞無欲無憂全真虛氣居平味淡恢恢蕩蕩與混成等其自然抱朴子楊玄名混朝市心在世外文中注史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季王傳互入無往不自得帝少與嚴光同遊學即位以物色訪之纍徵乃至拜諫議大夫不肯受去耕釣於富春山中以壽終於家通監光武紀四皓潛光隱曜東漢郭玄傳志凌青雲之上身晦泥汙之下後漢逸民傳論法真隱居不仕前後四徵終不屈友人郭正曰法真名可得聞身難得而見逃名而名我隨避名而名我追通監漢順紀互入欲晦而彰枕石漱流恬淡於浩然之域三國蜀志彭羕傳殷浩纍辭徵辟屏居墓所幾將十年時人擬之管葛通監晉穆紀始居塵外高謝人寰笑詠山林遊泛江海當此之時蕭然有陵霞之舉晉書謝安傳名可聞而身不可見德可仰而形不可睹晉書宋纖傳養粹岩阿銷聲林曲晉書隱逸傳贊周顒處山舍王儉問曰卿山中何所食曰赤米白鹽緑葵紫蓼文惠問顒菜食何味最勝顒曰春初早韭秋末晚菘南史岩壑間遠水石清華南史隱逸傳養素丘園周韋敻詩狎玩魚鳥左右琴書拾遺粒而織落毛飲石泉而庇松柏放情宇宙之內自足懷抱之中冥心物表介然離俗北史隱逸傳陸龜蒙嗜茶置園顧渚山下乘馬升車設蓬席齎束書茶竈筆床釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以高士召不至新唐書本傳上焉者身藏而德不晦故自放草野而名往從之雖萬乘之貴猶尋軌而委聘也其次挈治世具弗得伸或峭行不可屈于俗雖有所應其於爵祿也泛然受悠然辭使人君常有所慕企怊然如不足其可貴也末焉者資稿薄樂山林內審其才終不可當世取舍故逃丘園而不返使人常高其風而不敢加訾焉唐書隱逸傳序田遊巖居箕上高宗幸嵩山親至其門遊巖曰臣所謂泉石膏肓煙霞痼疾者新唐書本傳潘師正曰茂松清泉臣所須也同上集處玄舍之幽門兮穴巖石而窟伏楚辭朝飲木蘭之墜露兮夕餐秋菊之落英飲石泉兮蔭松柏並同上棲志浮雲張茂先勵志詩高步追許由左太沖詠史詩高蹈風塵外長揖謝夷齊放情凌霄外嚼蘂挹飛泉郭景純遊仙詩放情青雲外小隱隱林藪大隱隱朝市並王康琚招隱憩石挹飛泉攀林搴落英文選謝靈運嘉遁龍蟠玩世高蹈文選七命潛處蓬室不干勢權文選巖藪知名文選郭有道碑藉草蔭松孫綽天台賦結廬在人境而無車馬喧問君何能爾心遠地自偏陶淵明詩泥蟠不用蜀秦宓論耿介拔俗之標瀟灑出塵之想亭亭物表皎皎霞外孔德垶北山移文漸喜交遊絶幽居不用名雖有車馬客而無人世喧雲臥衣裳冷並杜括囊經世道遺身在白雲投身霄嶺滅景雲林谷汲芝耕山壑高居農野永歲山栖木食負林壑而驕人放身霄嶺宴景雲林卑俗不可得而問時士不可得而見高視終古一笑昔人芝桂為伍麋鹿同曹軒裳鍾鼎如夢中也並陳子昂仙菌靈芝夢搜裏李太白投竿垂餌晦幽迹於渭濱抱甕灌園絶心機於漢渚駱賓王花徑不曾緣客掃蓬門今始為君開懶性從來水竹居野花栽薜葉山酒酌藤花駱賓王白雲深處有巖居杜牧之煙霞老此身柴門嘶馬少藤杖拜人稀人語空山答手栽松樹蒼蒼老身臥桃源寂寂春惟有胡麻當雞黍白雲來往未嫌貧迹遠親魚鳥避世歌芝草休官醉菊花千載空桃花秦人深不見漁竿吾道在鷗鳥世人賖結茅依翠微伐木開蒙籠孤峰倚青霄一徑去不窮桃花洞裏居人滿桂樹山中任日長萬壑千峰獨閉門白雲幽臥處不向世人傳並劉長卿拂衣從此去高步躡華嵩捫蘿亦踐苔昔聞龐德公採藥遂不返金澗餌芝朮石床臥苔蘚松月生夜涼風泉滿清聽結廬就巖崛竹房間虛靜花藥連冬春平石藉琴硯落泉灑衣巾焚香宿華頂裛露采靈芝屢踐莓苔滑將尋汗漫期並劉義詩杜門不復出久與世情踈門無俗士駕人有上皇風並孟浩然惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也韓物外日月本不忙韓文肥遁居貞包蒙養正柳文耕於寬間之野釣於寂寞之濱韓文飲朮煮松柏孟東野且欲遺姓名安能慕竹帛芝朮資餱糧煙霞拂巾幘愛名之世忘名客多事之時無事身笑聽鼕鼕朝莫鼓只能催得市朝人雲深無四鄰並劉賓客南山四皓秦之博士遭世暗昧退而作歌曰莫莫高士深谷迤邐曄曄紫芝可以療飢唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴之留人兮不如貧賤之肆志共入商山崔琦四皓頌山林小羈鞅時人不到處苔石無遺蹤但有雞犬聲不聞車馬喧薜衣換簪組藜杖代車馬偶得幽間境遂志塵俗心始知真隱者不必在山林藥圃茶園為産業野麋林鶴是交遊杜門隱几塊然自居木形灰心雖鵩鳥集於前枯柳生於後不能動於心也人間榮耀因緣少林下幽間氣味深夜後不聞龜喘息秋來堆長鶴精神韜迹匿光銷聲藏影並白侍郎白雲深陋巷衰草遍間居身依泉壑將時背路入煙蘿得地深終歲不知城郭事手栽松竹盡成陰佩蘭蔭竹誅茅席芷並武伯蒼夜眠幽洞石曉飯白雲蔬間雲長在戶並姚少監月明松下房櫳靜日出雲中雞犬喧淡然清德居然素風寂寞柴門人不到空林獨與白雲歸並王維雲山繞屋猶嫌淺欲棹漁舟近釣臺青漢不回駕白雲長掩關香掩蕙蘭氣韻高鸞鶴聲歸臥養天真鹿裘烏角巾茂陵間久病彭澤醉長貧性間鷗自識心遠鶴先知並許用晦自教青鶴舞分採紫芝苖卷簾無俗客應只見雲來並張文昌蘿蔦自為幄風泉何必琴猿鳥聲自呼風泉氣相激麟出無應鴻飛入冥並張九齡地偏芝桂長境勝煙霞異機間魚鳥狎體和芝朮鮮並李義山懷材幽藪藏穎重崖絶望巖廊之榮遺形斤斧之患駱賓王鳥啼花落人聲絶寂寞山窗掩白雲李義山文延白雲為升堂之侶結清風為入室之賓居見青山傲視白雲得喪不可搖其心榮辱不可動其志桎拲冠冕泥滓祿位高名無階級逸迹絶涯涘並皮日休在生未識公卿面至死不離麋鹿群杜荀鶴惟有風流謝安石拂衣攜妓入東山白樂天芝朮夢中春姚少監與松喬為伍是羲皇上人王維集寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親賈浪仙柴門反關無俗客盧同文山棲谷飲王維集寧知市朝變但覺泉石好與麋鹿同群處浪迹於豐草長林石泉可以洗昏蒙雲松可以遺身世俗塵不飛人意自遠並文粹朝飲花上露夜臥松下風王昌齡閎覽古先遐蹈物表芝耕雲臥聲利不入唐文粹手搖白羽扇腳踏青芒履聞道鶴書徵臨流還洗耳孟浩然雖有柴門長不閉片雲孤木伴身間猶嫌住久人知處見擬移家更上山賈浪仙卜築青巖裏雲蘿四布陰虛室若無人喬木自成林時有青風至側聞樵採音儲光羲文煙火晝不盡蓬蒿春更深錢起文落葉遍空山何處尋行迹韋應物集白雲高幾許全屬採芝翁羅隱集傳記亭亭明月遠照山扉肅肅清風旁來澗牖通典許由隱箕山無杯器以手捧水飲之人遺一瓢得以飲飲訖挂於木上風吹嚦嚦有聲猶以為煩遂去之逸士傳龐公至老不入襄陽城襄陽耆舊傳周續之入廬山預遠公淨社又與劉遺民陶淵明號尋陽三隱見廬山記十八賢傳武陵隱士晦迹桃源當此晉年猶謂暴秦之地史通本朝柴荊常自閉花發少人知紫芝可以飽粱肉非所嗜臨川集忍寒苦安淡泊與清泉白石為伍東坡石菖蒲敘清遠間放超然於塵垢之外東坡放鶴亭記體備松柏姿氣含芝朮熏幽人隱几寂無語心在飛鴻滅沒間道人有道山不孤白雲舊有終老約東坡詩山中無曆日寒盡不知年古今詩話不用閉門防俗客愛間能有幾人來呂文靖詩移家尚恐青山淺隱几惟知白日長謝景山詩見古今詩話俗氛無因來煙霧作輿衛黃魯直詩富有林泉樂清無市井忙邵堯夫避世山林中衣草食芋栗寵辱兩志輕世味冰霜不到傲天工蘇子由集經上九不事王侯高尚其事易蠱卦上九鴻漸于陸其羽可用為儀吉易漸卦注云進處高潔不纍於位無物可以屈其心而亂其志峨峨清遠儀可貴也儒有上不臣天子下不事諸侯記儒行不義而富且貴於我如浮雲語述而不降其志不辱其身伯夷叔齊與語微子子祿之以天下弗顧也繫馬千駟弗視也孟萬章上削迹捐勢不為功名莊子山木以榮華為穢污以厚玩為塵壤以聲譽為朝露抱朴子論仙子思曰吾不取於人謂之富不屈於人謂之貴孔叢子史魯仲連不肯仕宦任職好持高節史記本傳莊周曰我寧遊戲汙瀆之中自快無為有國者所羈終身不仕以快吾志同上跨世陵時遠蹈獨遊東方朔贊師友造化而不為世俗所役者也漁釣於一壑則萬物不姦其志棲遲於一丘則天下不易其樂不絓聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉西漢班固敘傳眇然絶俗離世西漢王褒傳雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎後漢樊英傳傳記顧況志向踈遠有時宰招致將命好官況答詩曰四海如今已太平相公何用喚狂生此身還似籠中鶴東望滄溟叫一聲趙郡李綽編尚書故實集鳳不貪餧而妄食楚辭飲余馬於咸池總余轡於扶桑同上蹈鴻崖之遐迹紹巢許之絶軌翔區外以舒翼超天衢以高跱蔡伯喈碑文蟬蛻濁穢之中浮遊塵埃之外皭然泥而不滓推此志與日月爭光可也班孟堅作離騷序不求聞達於諸侯諸葛亮出師表名位為糟粕勢利為塵埃晉潘尼安身論傲世忘榮絶棄人事成公子安嘯賦丘園東國錙銖軒冕齊竟陵王行狀傲墳素之場圃步先哲之高衢潘安仁間居賦封己養高勢動人主文選運命論魯連讓齊爵遺組居邯鄲獨立矯世陳子昂集軒冕猶埃塵駱賓王逸興橫素襟李白喜結海上契自為天外賓李白蕭踈外聲利杜不能隨皂蓋自醉逐浮萍杜詩少室山人李渤索價高兩以諫官徵不起韓文與盧同詩古來濩落者都不事田園道心淡泊對流水生事蕭踈空掩門高曠出塵表逍遙滌心神並韋應物疏傳傲簪纓劉賓客弱齡植操本謝聲名中年誓心不期聞達駱賓王大鵬六月有間意仙鶴千年無躁容劉賓客相對盡日言不及名與利高謝人間鶴唳無凡聲但拂衣冠莫回顧的無官職趁人來上無羅弋憂下無羈鎖牽蘿襟蕙帶竹皮冠雖到塵中不染塵並白樂天四皓有芝輕漢祖功名富貴不能釣之有山水間淡之思心與青雲自有期並杜牧之處世似孤鶴遺榮同蛻蟬皮日休扁舟泛湖海長揖謝公卿劉義粳粃禮義錙銖功名王無功高情自與俗人踈張文昌杜陵解印時賣故陵之瓜彭澤無官詎有公田之黍王維集青山有雪諳松性碧落無雲稱鶴心許用晦味道腴以代膏粱含德輝而輕軒冕遺榮養素恬淡如也柳文公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻冥冥胡可量也張九齡張良郤粒之懷錙銖軒冕范蠡扁舟之志夢想江湖中山寂寞幽蘭自榮雖有矰繳不羈冥冥以聰明為駢枝名聲為纏繳無耗氣無焚和退然葆真獨與道往鷗鳥不動家人忘貧是行也朵頤者知懼矣冥冥翰飛不可及已自觀靈龜不嗅驕餌並李義山肥於貌孰與肥其道求於人孰與求其身孫可之文含風飲露以樂吾道唐文粹海內嫌官只一人姚少監瑞草唯承天上露紅鸞不受世間塵王建消息治亂之際卷舒夷曠之域如雲出於山遊於天復歸於無間不可得而纍也唐肅宗釣臺碑本朝幽間靖節性孤高伯夷心歐公聯句棄官如棄泥東坡詩慕幅巾於衡巷乘下澤於鄉閭晦丘園之養高輕鴈纁而堅臥歐公集爵位利祿蓋古者有志之士所謂鴻毛弊屣也東坡文泛若虛舟之獨往寂如死灰之不然蘇子由文智名勇功不入眼黃魯直詩
