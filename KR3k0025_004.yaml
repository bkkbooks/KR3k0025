body:
  text: 坐以制勝經帝乃誕敷文德舞干羽于兩階七旬有苗格書大禹謨子不出樽俎之間折衝千里之外家語圜居而方正則若盤石然觸之者角摧荀議兵拱揖指麾強暴之國莫不趍使荀真儒無敵於天下楊史吳伐魯魯微虎欲宵攻王舍私屬徒七百人三踊於幕庭吳子聞之一夕三遷左哀八年頰谷之會孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來焉命司馬止之齊侯逡巡而謝曰寡人之過也罷會齊人使優施舞於魯君之幕下孔子曰笑君者罪當死司馬行法焉首足異門而出齊人來歸鄆讙龜陰之田者蓋為此也穀梁傳秦欲伐魏聞干木在魏終不敢發兵史記諸侯以公子賢多客不能加兵謀魏史魏世家互入為世輕重項王願與漢王挑戰漢王曰吾能鬭智不能鬭力史記運籌帷幄之中決勝千里之外前漢高帝紀心有所懷威動千里西漢通傳六國常以十倍之地百萬之軍仰關而攻秦秦人開關延敵九國之師遁巡而不敢進秦無亡矢遺鏃之費而天下已困矣前漢項籍傳不降階序而運天下前漢諸侯王表楚有子玉得臣文公為之側席而坐趙有廉頗馬服疆秦不敢窺兵井陘近漢郅都魏尚匈奴不敢南卿沙漠西漢陳湯傳賢人立朝折衝厭難勝於亡形西漢辛慶忌傳酈食其憑軾下齊七十餘城前漢互入談辨王商有威重長八尺餘身體鴻大容貌甚過絕人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前謁商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣西漢王商傳匈奴素聞郅都節為引兵去竟都死不近鴈門前漢郅都傳魏軍次于興勢假費禕節率眾往禦之光祿大夫來敏至禕話別求共圍基于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退蜀志費禕傳互入處事閑暇劉琨在晉陽嘗為胡騎所圍數重琨乃乘月登樓清嘯中夜奏胡笳向晚復吹之賊棄圍而走晉劉琨傳互入處事閑暇祖逖為鎮西將軍石勒不敢窺兵河南使成皋縣修逖母墓晉書祖逖傳以計伐戰一以當萬晉書杜預傳頡利可汗進至渭水便橋之北遣其腹心執失思力入見以觀虛實上囚思力於門下省上出玄武門與高士廉房玄齡等六騎徑詣渭水上與頡利隔水而語責負約突厥大驚皆下馬羅拜俄而頡利來請和通監唐高祖紀突厥寇并州京師戒嚴世民乃帥騎馳詣虜陳告之曰國家與可汗和親何為負約深入我地我秦王也可汗能鬭獨出與我鬭若以眾來直以此百騎相當耳同上段秀實為涇原節度使三四年間吐蕃不敢犯塞唐書淮南大將王韶欲自為留後令將士推己知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶等懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人通監唐德宗憲宗曰吾倚度足破三賊矣唐書裴度傳李勣治并州唐太宗曰我用勣守并突厥不敢南賢於長城遠矣唐書本傳汲黯在朝淮南寢謀干木處魏諸侯息兵一士止百萬之師一賢制千里之難唐裴度傳傳記甲兵不出於軍而敵國勝衝櫓不施於軍而邊城降戰國策千丈之城拔之樽俎之間百尺之衝折之衽席之上同上虞有宮之奇晉獻公為之終夜不寐楚有子玉得臣文公為之側席而坐遠乎賢者之厭難折衝也說苑羊祜專修德信以懷吳人陸抗告邊戍曰彼專為德我專為暴是不戰而自服也晉陽秋兵不血刃坐以制勝崔鴻十六國春秋集宮奇在虞晉不加戎季梁猶在強楚挫謀文選陳孔璋信陵佩魏印秦兵不敢出文選盧諶詩吾晞叚干木偃息潘魏君吾慕魯仲連談笑卻秦軍左大沖詠史詩三晉之強屈於齊堂之俎千乘之勢弱於陽門之哭陸士衡折衝樽俎間制勝在兩楹文選張景陽詩孝文之得魏尚虜不足憂太祖之得郭嘉知成吾事駱賓王東山謝安石談笑靜胡沙李太白集互入處事閑暇以山河為寶者萬夫不能當以道德為潘者四夷為之守白樂天本朝垂紳正笏不動聲色而措天下於泰山之安書錦堂記經匪我求童蒙童蒙求我易蒙卦闇者諮明明者不諮於闇易蒙卦彖註子曰德不孤必有鄰語里仁子醫門多疾莊人間世肉不慕蟻蟻慕肉莊徐無鬼良醫之門多病人檃括之側多枉木荀川淵深而魚鱉歸之山林茂而禽獸歸之荀樹成蔭而眾鳥息醯酸而蚋聚荀勤學山皋非為鳥植林林茂而鳥自栖之江湖非為魚鑿潭潭深而魚自歸之劉子史郭解入關關中賢豪知聞其聲爭交驩解史記本傳陳平家貧以席為門然門外多長者車轍西漢本傳班彪家有賜書好古之士自遠方至父黨楊子雲以下莫不造門西漢班固敘傳桃李不言下自成蹊前漢李廣贊役物以為養任智而不恃力此其所以為貴也前漢刑法志天下學士靡然嚮風西漢公孫洪傳仲尼修禮興學於洙泗之間四方俊髦靡然向風晉戴邈傳傳記砥礪之旁多頑鈍說苑雜言賈逵口誦經文以教人贈遺者盈積或云逵非力耕舌耕也王子年拾遺記王勃能文請者甚眾金帛盈積人謂心織而衣筆耕而食張著翰林盛事集蓬居窮巷軒冕結轍陳子昂集一時皆慕與之交諸公要人爭欲令出我門下韓愈作柳宗元墓誌衡鏡高懸文武矯首張說之文不鞭而來無脛而至爭奇聘怪為公眼中之物唐文粹本朝此人如精金美玉不即人而人即之東坡荅黃魯直書譬如止水之在槃豈復勞心而鑒物東坡賜呂公著乞罷相不允批荅子為淵敺魚者獺也為叢敺雀者鸇也為湯武敺民者桀與紂也孟將為胠篋探囊發匱之盜而為守備則必攝緘縢扄鐍然巨盜至則負匱揭篋擔囊而趍惟恐緘縢扄鐍之不固也莊互入事出意表鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉順塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之列周穆王六國𧈪𧈪為贏弱姬楊重黎魏田父得玉徑尺以告鄰人鄰人詐之曰此怪石也蓄之非利其家田父猶豫以歸置於廡下其玉明照一室大怖遽棄之於遠野鄰人取之以獻魏王魏王召玉工相之曰此無價魏王賜獻玉者千金食上大夫祿尹文互入愚弄桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝也周生烈子屠者霍羹車者步行陶人用缺盆匠人處狹廬淮南子史忌將士以資敵國此伍子胥所以鞭荊平之墓也史季布傳諸將偶語雍齒先封西漢張良傳秦張誹謗之罔以為漢敺除通監漢成帝謝琨女夫殷叡好樗蒲奪其妻妹及伯母兩姑之分以還戲債或譏之曰謝氏累世財產充殷君一朝戲債通監晉太祖常以三分勞筋苦骨之人奉七分待衣坐食之輩通監唐憲宗隋貯洛口倉而李密因之積布帛東都而王世充據之唐書馬周傳傳記齊欲伐魏淳于髡曰韓盧天下之疾犬東郭逡天下之狡兔盧逐逡環山者三騰山者五兔極於前犬廢於後犬兔各死田父見而擅其功戰國策貪功貪功集董卓稱亂徒藉群雄之手王莽偷安卒成光武之業梁任孝恭檄魏文假手于贏以混諸侯憑力于項以離關東柳漢原廟銘莫養瘦馬駒莫養小妓女後事在目前不信君看取馬肥快行去妓長能歌舞三年五歲間已聞換一主借問新舊主誰樂誰辛苦白侍郎互入儆戒賓客歡娛童僕飽始知官職為它人白集互入省悟及勞己為人歌舞教成心力盡一朝身去不相隨白侍郎匠刀者不必自用割匠弓者不必自用射唐文粹戰士風霜苦將軍雨露新杜荀鶴燕趙之收藏韓魏之經營齊楚之精英幾世幾年剽掠其人倚疊如山一旦有不能輸來其間杜牧之阿房賦蘇代曰臣過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄鷸曰今日不雨明日不雨必見蜯脯蜯亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之春秋後語互入相鬭相損本朝借寇兵而資盜糧東坡集有小丈夫者得一金櫝而藏諸家拒戶而守之鳴呼是求不失富也非求富也大盜至劫而取之又烏知其果不失也老蘇集經維鵲有巢維鳩居之詩鵲巢互入蒙成子未嘗稼穡粟蒲倉未嘗蠶桑絲滿囊淮南子史略其武夫以為己腹心股肱瓜牙左成十三年如杞梓皮革自楚往也雖楚有材晉實用之左襄二十六年鄭國曰臣為韓延數年之命然渠成亦秦萬世之利也通監第六韓盧東郭自困於前而為田父之獲者也東漢袁譚傳蜀楊顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飲食而已通監三國志傳唐高祖曰徐觀蚌鷸之勢以收漁人之功通監隋恭帝紀李密因洛口之食王世充據東都布帛唐書馬周傳鷸蚌相持我乘其敝通監梁高祖傳記兩虎相鬭駑犬受其弊戰國策本朝力生於所激而不自為力故不勞形生於所遇而不自為形故不窮東坡清風閣記秦收鄭渠成晉得楚材多山谷集互入蒙成經天下同歸而殊塗易繫辭下為善不同同歸于治為惡不同同歸于亂書蔡仲之命子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉記檀弓上經禮三百曲禮三千其致一也記禮器或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也記中庸道並行而不相悖同上互入各行其志微子去之箕子為之奴比干諫而死子曰殷有三仁焉語子庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也孟滕文公上禹稷當平世三過其門而不入顏子當亂世居於陋巷孟子曰禹稷顏回同道禹稷顏子易地則皆然孟離婁下夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也孟滕文公上曾子居武城有越寇或曰寇至盍去諸曰無寓人於我室毀傷其薪木寇退則曰脩我墻屋我將反寇退曾子反子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守孟子曰曾子子思同道曾子子思易地則皆然孟離婁下居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者柳下惠也三子者不同道其趍一也一者仁也孟子路拯溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善淮南子齊俗訓互入所見不同蹠越者或以舟或以車雖異路所極一也淮南子說林訓非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也孟公孫丑上臧與榖二人相與牧羊而俱亡其羊臧則挾策讀書榖則博塞以遊二人者事業不同其於亡羊均也莊駢拇比犧尊於溝中之斷美惡有間其於失性一也莊天地柤梨橘柚其味相反而皆可於口莊天運夫織者日以進耕者日以卻事相反成功一也淮南子百川異源同歸於海同上塗雖曲而通諸夏川雖曲而通諸海事雖曲而通諸聖楊問道仲尼之道猶四瀆也經營中國終入大海楊君子史晏子儉矣夷吾則奢齊桓以霸景公亦治史太史公自序廣行無部伍行陣就善水章舍止人人自便不擊刁斗以自衛莫府省約文書然亦遠斥堠未嘗遇害程不識正部曲行伍營陣擊刁斗士吏治軍簿至明軍不得休息然亦未嘗遇害通監漢武紀三仁殊而一致夷惠舛而齊聲西漢班固敘傳魏高允稱常爽訓厲有方曰文翁柔勝先生剛克立教雖殊成人則一通監宋文紀唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸于治唐書宋璟贊互入相資成美巡先死不為遽遠後死不為屈唐書本贊傳記宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治呂氏春秋一見韓詩外傳互入政事集夫沿河而下苟不止雖有疾遲必至於海韓文杞桂殊姿而共芳珪璋異質而同潤呂和叔殊趍而一致異派而同源皇甫湜釋宗稱定慧儒師著誠明派分示三教理詣無二名李義山吾君用大和理萬物動靜各隨其宜則陳力以致用潔身以弘教其致一也同上雖羈鸞冥鴻一飛一籠遐心遠意終共超曠歐陽詹文本朝昔者孟子不願召見而孔子不辭小官夫欲正其所由得之之名是以謹其所以取之之故孟子不為矯孔子不為卑老蘇集陳平聽張辟彊許王諸呂呂后安之故平與周勃得執將相之柄以伺其間唐武后欲以武三思為嗣狄仁傑曰母子與姑姪孰親陛下立廬陵王則千秋萬歲後血食於太廟無祔姑之禮后感悟欒城集牛鐸調與黃鍾同山谷詩小蟲心在一啄間得失與世同輕重同上蜣之丸蟻之粒與夫承蜩貫虱者同一心之功用也螳螂之斧莎雞之羽與夫扛鼎拔山者同一心之力用也工倕之削輪扁之斲庖丁之牛與夫堯舜禹湯之治天下同一心之妙用也鳴道集臧榖雖殊竟兩忘坡詩
