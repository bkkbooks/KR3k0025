body:
  text: 私意經愛惡相攻易略例上人莫知其子之惡記大學互入昧於知子各親其親各子其子貨力為己以功為己禮運愛之欲其生惡之欲其死語顏淵子兩喜必多溢美之言兩怒必多溢惡之言莊子伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多韓子鬻棺者欲民之疾病也畜粟者欲歲之荒饑也淮南子說林訓人各是其所是非其所非楊子吾子史同罪異罰左僖二十八何必瘠魯以肥杞襄公二十九論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧此其所敝也西漢司馬遷贊周湯居二千石所愛者撓法活之所憎者曲法滅之杜欽傳託公報私杜欽傳同上所欲活則傳生議所欲陷則豫死比通鑑漢宣紀所好則鑽皮出其毛羽所惡則洗垢求其瘢痕東漢趙一傳或問倫有私乎對曰昔人有與千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往返而安寢吾子有疾雖不省視而竟夕不眠若是豈可謂無私乎東漢第五倫傳互見無隱昔留侯以為高祖悉用蕭曹故人郭伋亦譏南陽多顯同上二十八將傳論陳壽父為馬謖參軍謖為諸葛亮所誅壽父亦坐髡諸葛瞻又輕壽壽為亮立傳云將略非長無應敵之才言瞻惟工書名過其實議者以此少之晉書陳壽傳庾亮出居外鎮而執朝廷之權王導內不能平嘗遇西風塵起舉扇自蔽徐曰元規塵汙人晉書王導傳宋元嘉時江東王謝諸族方盛北人晚度者朝廷悉以傖荒遇之雖復人才可施皆不得踐清塗通鑑宋紀崔浩曰文士褒貶多過其實同上南史宋高祖紀毀譽由己憎惡任情北史李德裕節制劍南西川吐蕃將悉怛謀以城降德裕既得之即發兵以守且陳出師之利牛僧孺居中沮其功命返於虜德裕終身以為恨唐書李德裕傳又牛僧孺傳云群臣請如李德裕策又云時皆謂僧孺橫議王洪義為侍御史於鄉里求瓜瓜主拒之洪義狀言瓜園有白兔縣官捕逐園苖盡矣同上酷吏傳不知仁義不分枉直惟利是嗜得賂則譽跖蹻為廉良咈意則毀龔黃為貪暴能用傾巧之智構成疑似之端通鑑唐憲宗武三思曰但於我善者則為善人於我惡者則為惡人耳積忤生憎積順生愛唐睿宗紀同上情有愛憎憎者惟見其惡愛者止見其善唐書魏證傳李振舉進士不中深疾縉紳之士言於全忠曰此輩常自謂清流宜投之黃河永為濁流通鑑唐昭宗紀王福畤有子勔勮皆著才名福畤嘗詫韓思彥思彥戲曰君有譽兒癖唐書孔循罵曰天下事一則任圜二則任圜圜乃何人五代史任圜傳傳記談經者惡聞服杜之嗤論史者憎言班馬之失史通劉禹錫謁李德裕曰曾得白居易文集否德裕曰吾於此人不足久矣其章何必覽焉北夢瑣言傅毅之於班固伯仲之間耳而固小之典論集人之情莫不欲耀其所能而黨其所近苟將得志則必快其所蘊微之集曲木忌日影孟東野本朝小篆之法自秦李斯斯之相秦焚棄典籍遂欲滅先王之法而至己之所作則為萬世不可朽之計何其愚哉歐公集怒移水中蟹愛及屋上烏坡詩私於家者隔墻樊而分比鄰私於己者隔形骸而分爾汝諸儒鳴道集子焉有君子而可以貨取乎孟子一介不以取諸人萬章上並孟子廉士重名莊子廉者常樂無求文中子史潔白而不受汙公羊莊二十四年注子罕曰我以不貪為寶左襄十三以不賄聞於諸侯昭公二十八廉如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下史蘇秦傳秋毫無所犯淮陰傳終廣之身為二千石四十餘年家無餘財終不言家産事李廣傳廉士寡欲易足西漢景帝紀志懷霜雪東漢禰衡傳使馬如羊不以入廄使金如粟不以入懷通鑑漢質帝紀張奐劉寵為會稽太守召為將作大匠老叟齎百錢送寵寵為人選一大錢東漢孔奮在姑臧力行清潔為衆人所笑或以為身處脂膏不能以自潤被召奮無資單車就路同上本傳孟嘗遷合浦太守郡出珠寶先時宰守並多貪穢詭人採求不知紀極珠漸徙於交趾郡界嘗到官革易前弊求民病利未踰歲去珠復還同上互見陰驅默化東鄉君卒公私咸謂資財宜歸二女田宅僮役應屬弘微一無所取通鑑宋太祖紀東鄉君者謝混妻弘微謝混之從子也楊震性廉子孫常蔬食步行或令開産業震曰使後世稱為清白吏子孫以此遺之不亦厚乎東漢本傳互見貽後胡質薨無餘財唯有賜衣書篋而已魏志王衍口未嘗言錢晉書王衍傳崔洪口不言貨財手不執珠玉晉書本傳鄧攸為吳郡太守載米之郡不受俸祿唯飲吳水而已晉書清節為百城表南史樂法才甄彬嘗以一束苧就長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受曰五月披羊裘而負薪豈拾遺金者南史陳紀本傳別駕在官水火不與百姓交北史趙軌傳蘇瓊為清河太守郡人趙穎五月中得新瓜一雙自來奉告請遂為留乃致於廳事梁上人聞受趙穎瓜欲貢新果聞瓜猶在相顧而去同上李勉為嶺南節度使居官久未嘗抆飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼盧奐宋璟李朝隱唐書裴寬義不以苞苴汙家有人以鹿為餉寬瘞之同上本傳杜暹為婺州參軍秩滿歸吏以紙贐之暹為受百番同上盧懷謹薨家無餘蓄惟一老蒼頭請自鬻以辦喪事通鑑唐宗紀柳玭為嶺南節度副使廨中橘熟既食乃納直於官唐書蕭倣為嶺南節度使家人病取槁梅於廚以和劑倣知趣市還之唐書歷官有素絲之節居家無匹帛之餘唐書盧坦曰凡居官廉雖大臣無厚蓄新唐書本傳傳記胡威父質為荊州威自京都省之告歸臨辭賜其絹一匹為道路糧威曰大人清高不審於何得此絹質曰是吾俸之餘故以與汝耳晉陽秋周鎮罷臨川丞相王導曰胡威之清何以過此世說厲飲冰之節白氏六帖廉者不受嗟來之食列女傳居家終始廉白秪入俸錢者雖歷大官亦無厚蓄以傳李翱作盧坦傳集食不偷而為飽兮衣不苟而為溫楚辭互見端介清如玉壺冰鮑明遠詩千尋見底清李太白集徹底心清水共虛元微之集江水秋正深清見萬丈底同上公之北歸不載南物奴婢之籍不增一人韓文憂民亦似清吟苦守節還如未達貧方雄飛詩脂膏莫潤圭玉無瑕李義山文外示貞潔內含澄徹無染塵能保其素不納汙能全其潔比玉而白不為蠅點比月而明不為蟾缺劉長卿欲知清與潔明月在澄灣劉義波澄水更清同上冰壑照人鯁介絶倫唐文粹清越而瑕不自掩潔白而物莫能汙劉賓客脂膏有戒冰蘗自規李義山清能律貪夫白集官清馬骨高歐公詩話王質所至有冰蘗聲王質墓志官清貧似舊欒城本朝隋趙軌為齊州別駕文帝令入朝父老將送者各揮涕曰公清如水請酌一杯水奉餞續世說延陵季子適齊見路有遺金有披裘而薪者季子呼薪者取彼地金薪者曰吾當夏五月披裘而薪豈取金者哉唐藝文類聚本朝御覽言出吳越春秋今考之不見冠萊公歷富貴四十年無田宅園邸魏野獻詩曰有官居鼎鼐無地起樓臺顧說湘山野録經具乃貝玉書盤庾中惟貨其吉冏命子非其有而取之者盜也孟萬章下侵人自用謂之貪莊子貪者常憂不足文中子貪者難為惠譙子清訓互見無厭史臧哀伯曰官之失德寵賂章也郜鼎在廟章孰甚焉左威二羊舌鮒瀆貨無厭昭十三陳轅頗為司徒賦封田以嫁公女有餘以為己大器襄十一汝專利而不厭互見無厭並左必以賄死國語趙良曰非其位而居之曰貪位非其名而有之曰貪名史商鞅傳貪如狼西漢項籍傳大臣有不廉曰簠簋不飾同上賈誼傳貪叨不間義理同上禮樂志素無廉聲同上息夫躬傳貪夫徇財賈誼傳並西漢陳湯素貪所鹵獲財物入塞多不法通鑑漢元帝紀韋貽範為相多受人賂許以官既而以母憂罷去日為債家所譟同上唐書昭宗紀諸將多斷盜牢稟私自潤入皆以珍寶貨賂左右同上漢殤帝紀十囊五囊入棗郎同上晉愍帝紀陳壽作魏書或云丁儀丁廙有盛名於魏壽謂其子可覓千斛米當為尊公作佳傳丁不與之竟不為立傳同上本傳庾炳之無文學性彊急輕淺既居選部好詬詈賓客且多納貨賂見人有燭盤佳驢無不乞丐同上宋太祖鄧琬性鄙暗貪吝既執大權父子賣官鬻爵使婢僕出市道販賣同上宋太祖魏右衛將軍元暉與侍中盧昶皆有寵於魏主而貪縱時人謂之餓虎將軍饑鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千匹次郡下郡減其半餘官皆有等差選者謂之市曹梁武紀並通鑑元修義為吏部尚書唯事貨賄官之大小皆有定價呼為京師白劫後魏書魏收納爾朱榮之子金減其惡而增其善北史宇文述貪鄙知人有珍異之物必求取之富商大賈皆恩接之呼之為兒隋書盧坦曰其能積財者必剝下以致如其子孫善守是天富不道之人也不若恣其不道以歸於人新唐書本傳王伾以納賄為事作大匱貯金帛夫婦寢其上通鑑互見貪迷平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給同上唐明宗桑維翰權勢既盛四方賂遺歲積巨萬五代史西京留守同平章事王守恩性貪鄙專事聚斂喪車非輸錢不得出城下至抒廁行丐之人不免課率或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返通鑑後漢隱帝集溪壑為之一罄川瀆為之中貧左太沖吳都賦交疇貨賄選孫皓書貪潤微財取犯朝憲陳子昂傳富己潤屋同上橐奸瀆貨司空表聖文經晏子一狐裘三十年記檀弓下子曰以約失之者鮮矣語里仁禮與其奢也寧儉八佾史御孫曰儉德之共也左莊二十四鄭叔假賦蟋蟀趙孟曰保家之主也襄二十七年季文子無衣帛之妾無食粟之馬無藏金玉無重器備相三君矣而無私積襄五並左衣不兼采食不重味西漢朱家傳朱慱不好酒色游宴自微賤至富貴食不重味同上朕為天下守財豈得妄用之哉通鑑漢殤帝紀魏高允兄弟惟草屋數間而被縕袍廚中鹽菜而已同上宋世祖長孫道生性清儉一熊皮鄣泥數十年不易同上宋太祖庾杲之清貧食唯有韭薤生韭雜菜任昉戲之曰誰謂庾郎貧食常有二十七種言三九也齊書昔楊震趙咨等咸以薄葬知真識去身貴速朽耳夫厚葬之家流于俗以奢靡為孝令死者戮尸暴骸可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩何用破資徇侈乎吾亡斂以常服四時衣各一稱新唐書姚崇傳崔郾處庳陋至霖淖則容蓋而屐以就外位同上盧懷謹門不施箔會風雨至舉席自鄣日晏設食蒸豆兩器菜數杯而已同上傳記唐鄭餘慶清儉有重德一日忽召親友朝官數人會食呼左右曰處分廚家爛蒸去毛莫拗折頸諸人相顧以為必蒸鵝鴨之類已而下粟米飯一器蒸葫蘆一枚而已盧氏雜記集奉身如貧劉賓客尚儉經營少張文昌本朝冠萊公寢處一青幃二十餘年時有破壞益命補葺有靳之笑答曰不忍處之久而以弊棄本傳互見念舊魏李崇家富而儉食常無肉止有韭茹韭菹其客李元祐曰李允公一食十八種人問其故元祐曰二韭十八續世說
