body:
  text: 記纂淵海卷六宋潘自牧撰地理部地經至哉坤元萬物資生乃順承天坤厚載物德合无疆地勢坤君子以厚德載物不習无不利地道光也地道无成而代有終也俯以察於地理俯則觀法於地觀鳥獸之文與地之宜坤者地也萬物皆致養焉易大司徒掌天下土地之圖周知九州地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物周禮地秉隂竅於山川記禮運地載萬物郊特牲地載神氣孔子閒居今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉中庸如地之無不載也左子地載而無棄故安而不動莫不生植管子地者萬物之本原諸生之根苑也管女媧斷鼇足以立四極夫大塊載我以氣勞我以形佚我以老息我以死列子闔四海之内東西二萬八千里南北二萬六千里禹乃使大章歩自東極至於西極二億三萬三千五百里七十五歩使豎亥歩自北極至於南極二億三萬三千五百里七十歩九州之外乃有八殥自東北方曰大澤曰無通東方曰大渚曰少海東南方曰具區曰元澤南方曰大夢曰浩澤西南方曰渚資曰丹澤西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤八殥之外乃有八紘自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆安南方曰都廣曰反戸西南方曰焦僥曰炎土西方曰金丘曰沃野西北方曰一目曰沙所北方曰積氷曰委羽八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門淮南子地形者所以窮南北之脩極東西之廣經山陵之形區山谷之居列山川之數規逺近之路使人通逹周備淮南地者統元形焉非止丘陵山川之謂也文中子史蕭何入秦收圖書藏之以此沛公具知天下阸塞戸口以何得秦圖書也前本紀光武披地圖指示鄧禹曰天下郡國如是今始得其一後鄧禹傳裴秀作地域圖十八篇奏之地圖之體有六一曰分率所以辨廣輪之度也二曰準望所以正彼此之體也三曰道里所以正所由之數也四曰髙下五曰方邪六曰迂直此三者各因地而制以校夷險之數也本𫝊傳記東至於泰逺西至於邠國南至於濮鉛北至於祝栗謂之四極觚竹北戸西王母日下謂之四荒九夷八狄七戎六蠻謂之四海爾雅地者易也言養物懷任交易變化含吐應節故其立字土力於乙者為地春秋地東西為緯南北為經山為積德川為積刑家語地有四遊常動而不止譬如人在大舟中閉牖而坐舟行不覺也尚書考靈曜地有三千六百軸河圖括地象地者萬物之祖元氣所由生也白虎通地以川為脉草木為毛土為肉石為骨博物志九地者一為沙泥二澤浼三沚崖四下田五中田六上田七下山八中山九上山太𤣥注費長房有神術能縮地脈千里聚在目前放之復如舊神異𫝊集八柱何當東南何虧楚詞天問按淮南子云地有八柱康回憑怒地何故以東南傾同上康回共工也按列子云共工怒觸不周之山絶地維東西南北其脩孰多南北順􅀢其衍幾何同上奈何以彈丸地而囷太平之民哉髙適上疏删百代之弊綜羣言之首繁而不亂疎而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由户而覩奥斯乃訓導之明也窮地而述舉世而載事極洪纎理通微昧混一家文軌張大國之襟帶覈人物之虛實總山川之要㑹表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹䘏民之艱覩窮荒大漠則悟秦漢勞師之弊覽齊墟晉壤則想桓文勤王之霸觀洞庭荆門則知苗蜀恃險之敗王者於是明乎得失諸侯於是鑒乎興替斯又懲勸之道也吕溫地志圖序上帝既剖混沌氏以支節為山嶽以腸胃為江河一旦慮其掀然而興則下無生類矣於是孕銅於山澤滓魚鹽於江河俾後人攻取將有以苦混沌之靈而致其不起也嗚呼混沌氏則不起而人力殫焉羅隐蒙叟遺意地形連海盡李白俯入裂厚坤殺氣南行動坤軸開地當天險同上五方亂風土百種分鋤耕韓集稍疑地脈斷桞集本朝彈丸黒子之地趙普𫝊沈僴問何謂四游朱文公曰謂地之四游升降不過三萬里非謂天地中間相去止三萬里也春遊過東三萬里夏遊過南三萬里秋遊過西三萬里冬遊過北三萬里今厯家筭數如此以土圭測之皆合僴曰譬以大盆盛水而以虛器浮其中四邉定四方若器浮過東三寸以一寸折萬里則去西三寸亦如地之浮於水上蹉過東方三萬里則逺去西方三萬里矣南北亦然然則冬夏晝夜長短非日晷出沒之所為乃地之游轉四方而然爾曰然朱文公語錄不有萬物殊豈知方輿大地理山川隔摇蕩山川失維陬歐陽公區區魏中梁一米誰雌雄泰山秋毫兩無窮鉅細本出形相中大千起滅一塵裏未知頏頡誰雌雄門浮一區爾真妄果安在垂慈世人眼俯仰了大塊東坡山經地中有山謙山附于地剥天下有山遯兼山艮艮為山易封十有二山書隨山刋木益稷隨山濬川禹貢九山刋旅同上景山與京我徂東山節彼南山陟彼北山謂山葢卑為岡為陵莫髙匪山髙山仰止信彼南山維禹甸之帝省其山奕奕梁山維禹甸之天作髙山太王荒之於皇時周陟其髙山陟彼景山詩山虞掌山林之禁令周禮山出器車記禮運今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉中庸子孔子登東山而小魯登泰山而小天下孟子山不辭土石故能成其大管子渤海之東有大壑焉其中有五山曰岱輿圓嶠方壺瀛洲蓬莱五山之根無所連著帝命禺强使巨鼇十五舉首而戴之五山始峙而不動而龍伯之國有大人舉足不盈數歩而暨五山之所一釣而連六鼇於是岱輿圓嶠二山沈於大海大行王屋二山本在冀州之南河陽之北北山愚公年九十面山而居懲出入之迂也聚族而謀曰吾與汝畢力平險可乎妻曰焉置土石曰投諸渤海之尾遂率子孫荷擔者三夫鄰人孀妻有遺男往助之寒暑易節始一反焉河曲智叟曰甚矣汝之不慧以殘年餘力曽不能毁山之一毛如大行王屋何愚公曰汝心之固曽不如孀妻弱子雖我之死有子存焉子子孫孫無窮匱也而山不加増何苦而不平操蛇之神聞之告之於帝帝感其誠命夸娥氏負二山一厝朔東一厝雍南自此冀之南漢之隂無隴斷焉列子不登髙山不知天之髙也積土成山而風雲興焉玉在山而木潤並荀子丘陵學山而不至乎山揚子史黄帝披山通道登丸山及岱宗西至於崆峒登雞頭南至於江登熊湘逐葷粥合符釡山而邑於涿鹿之阿史自威宣燕昭使人入海求蓬莱方丈瀛洲三神山諸仙人及不死之藥皆在焉未至望之如雲臨之風輙引􅊑去終莫能至封禪書余南登廬山觀禹疏九江遂至於㑹稽太湟上姑蘇望五湖東闚洛汭大邳逆河行淮泗濟漯洛渠西瞻蜀之岷山及離堆北自龍門至於朔方禹廵狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴河渠書嚴子陵隠於富春山後漢謝安棲遲東山放情丘壑每遊賞必以妓從晉傳羊祜與從事鄒潤甫登峴山垂泣曰自有宇宙有此山由来賢達勝士登此逺望者多意皆湮滅無聞潤甫對曰明公德冠四海令聞令望當與此山俱本傳桓沖謂王徽之曰卿在府日久比當相料理徽之初不酬答直髙視以手扳拄頤云西山朝来致有爽氣耳徽之傳謝靈運好登山嘗著木屐上山則去前齒下山則去後齒南史本傳盧藏用始隠終南山晩乃徇權利司馬承禎嘗召至闕下藏用指終南山曰此中大有佳處禎曰以僕視之此乃仕宦之捷徑耳唐書傳記山者土之聚也國語山三襲陟山之形若三山重累者名陟再成英山形兩重者名英一成坯山上更有一山重累者名坯山大而髙崧山小而髙峯鋭而髙嶠卑而大扈小而衆巋小山岌大山峘岌髙過也言小山與大山相並而小山髙過於大山者名峘也屬者嶧山形相連屬不絶者名嶧獨者蜀山之孤獨者名蜀上正章山形上平者名章宛中隆山形中央藴聚而髙者名隆山脊岡未及上翠㣲未及頂上在旁陂陁之處名翠㣲杜詩華亭入翠㣲山頂冢如防者盛防隄也巒山嶞巒山謂山形狭長也凡物狭而長謂之嶞詩曰嶞山喬嶽重甗隒甗甑也形如累兩甑名曰隒左右有岸厒夾山有岸名曰厒大山宫小山霍大山環遶小山其名曰霍小山别大山鮮小山與大山分别不相連其名曰鮮山絶陘連山中㫁絶名曰陘多小石磝多大石礜山上有水埒山豄無所通谿石戴土謂之崔嵬土戴石為砠山夾水澗陵夾水澞山有穴為曲山西曰夕陽暮乃見日山東曰朝陽旦即見日以上並見爾雅土山多雲鐵山多石博物志大凡天下名山五千三百七十居地大凡六萬四千五十六里地之東西二萬八千里南北二萬六千里出水者八千里受水者八千里出銅之山四千六十出鐵之山三千六百九十青丘之山其陽多土其隂多青艧山海經天下名山八而三在蠻夷五在中國類要五百嵗天下名山一開開時金玉湧出内傳山之為言宣也含澤布氣調五神也春秋説題辭終南山一名地肺中有石室靈芝三秦紀終南一名太一五經通義閔文衍思九華山圖於白綾半臂號九華半臂青陽記驪山有飯禄泉金沙洞玉蘂峯楊妃外傳驪山箏殿側有魏泉堂碑其石瑩徹玻瓈石之碑也同上王烈入太行山見石中有青泥流出烈取摶之隨手堅凝氣味如粳米飯按仙經云此石髓服之壽與天地齊神仙傳李球遊五臺山山中有風穴球墜焉引者曰此山道家紫府洞也五峯之上皆積四海竒寳以鎮峯頂亦如茅山洞鎮以安息之金墉城之寳春山襍玉環水香瓊以固上真之宅廣記荆山為地雌上為軒轅室河圖宋武登八公山劉安故臺曰城郭如匹帛之繞叢花也六帖雲縣有君山大風雨後聞管絃聲其山謂之仙宫南康記崆峒山有三其一在臨洮一在安定一在汝州寰宇記天為蜀王生五丁力士能徙山蜀王本記南方有國土名為勝樂其國有山名曰妙峯華嚴經大小洞天並見前集集青陽縣南有子山山髙數千丈有九峯如蓮花太史公南遊畧而不書雖靈仙徃復而賦詠無聞予乃削其舊號加以九華之目詩云妙有三分氣靈山開九華李太白天河掛緑水綉出九芙蓉太白昔予仰太華以為此外無竒愛女几荆山以為此外無秀今見九華始悼前言之容易也歌云竒峯一見驚魂魄意想鴻爐始開闢疑是九龍夭矯欲攀天忽逢霹靂一聲化為石劉禹錫詠九華北上太行山艱哉何巍巍羊腸阪詰屈車輪為之摧文選蒼山何鬱盤飛閣凌上清韋蘇州詠驪山昔者先王遊髙唐夢一婦人曰妾巫山之女也為髙唐之客妾在巫山之陽髙丘之阻旦為朝雲暮為行雨宋玉髙唐賦散雨收夕臺行雲卷神帳古樂府巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑卷幔山花欲謝似殘粧劉禹錫十二峯前落照㣲髙唐宫暗坐迷歸朝雲暮雨長相接猶自君王恨見稀李義山從有精靈得徃来狖軛鼯軒亦顛隕羅隠上詩以詠巫山兹嶺復巑岏分區奠淮服東限瑯琊臺西距孟諸陸文選雲代之間有靈山焉與竺乾鷲嶺角立相望劉文謂五臺山其山則盤紆岪鬱隆崇嵂崒岑崟參差日月蔽虧文選山逼畫屏新稠疊千萬峯相連入雲去川岳涵餘清寒山饒積翠藍岑竦天壁突兀如鯨額奔蹙横澄潭勢吞落星石積雪曜隂崖飛流敧陽壑參差逺天際縹渺晴霞外疊峯礙河漢秀嶺横牛斗一重一掩吾肺腑山鳥山花吾友于李白潤聚金碧氣却畧羅峻屏大山蟠嵌根清最陪躋攀傲睨俯峭壁崇岡相枕帶那知根無鬼神藏已覺氣與嵩華敵杜詩遥峯出寸碧公乎真愛山看山相連夕猶嫌山在眼不得着脚歴天空浮脩眉韓集積翠浮㶑灔始疑負靈鼇逈窮兩儀際髙出萬象表海畔尖山似劒鋩秋来處處割愁腸若為化得身千億散上峯頭望故鄉栁集檻前山翠茂陵眉杜牧之本朝鴈蕩山永嘉郡其峯巖巒峒皆平地聳起竒秀之狀也甲於天下而謝靈運在永嘉窮訪山水發於吟詠無一字及鴈蕩山者唐時詩人皆不言及蓋徃時為灌木叢宻掩蔽不見至真宗朝造應宫伐木為楹始得此也東軒雜錄溫州鴈蕩山祥符中因造玉清宫伐山取材有人見之按西域書阿羅漢諾矩羅居震亘東南大海際鴈蕩山芙蓉峯龍湫唐僧貫休為諾矩羅贊有鴈蕩經行雲漠漠龍湫宴坐雨濛濛之句此山南有芙蓉峯山頂有大池相傳以為鴈蕩下有二潭水以為龍湫又有經行峡宴坐峯皆後人以貫休名之也筆談始余赴中山連日風埃未嘗了了見大行也今將適嶺表過臨城道中天氣肅然西南草木皆可數忽悟笑曰余南遷其必返乎此退之衡山之祥也東坡西登大行嶺北望清凉山晴空浮五髻晻藹鄉雲間清凉山謂五臺也同上老杜詩云翠屏宜晩對東坡云羊元居山當戸山峯竒秀每據筠床終日笑傲或偃卧謂客曰此翠屏宜晩對爽人心目顔魯公名其隠山為翠屏同上須知我是愛山者無一詩中不説山睡餘敧枕看山橫雪裹山巒開曉幌烟嵐互明滅㸃綴若圖屏山氣無四時人去山自緑山横天地蒼茫外江上孤峯蔽緑蘿縣樓終日對嵯峨巉巉起絶壁蒼翠非刻鏤遥岑聳孤出可愛欣欲就㑹須乗醉攜佳客踏雪来觀羣玉峯島嶼松門數里長懸崖對起碧峯雙南山鬱蒨舊可愛千仭巉巖如刻削林枯山瘦失顔色我意豈能無寂寞千巖萬壑響松檜懸崖巨石飛流淙江上山兮海上峯藹清蒼兮香巑叢霞飛霧散兮青空天思削兮壁立於鴻蒙懸崖磴絶兮險且窮穿雲渡水兮忽得路而不知其幾重中有平田廣谷兮與世隔絶猶有太古之遺風泉甘土肥兮鳥獸雝雝其人麋鹿兮既夀而豊不見人間之幾時兮但見草木華落為秋冬歐陽公循上得勝遊冐曉窮幽邃操戈畏炳彪回峯亂嶂鬱參差雲外髙人世得知山髙惜人力十歩輙一憩却立浮雲端俯視萬井麗槎牙亂峯合晃蕩絶壁横何人守蓬莱夜半失左股浮山若鵬蹲忽展垂天羽根株互連絡崖嶠爭吞吐方其欲化時天匠磨月斧帝觴分餘瀝山骨醉后土峯巒尚開闔澗谷猶呼舞青山滿墻頭髧鬌幾雲髻青山偃蹇如髙人常時不肯入官府髙人自與山有素不待招邀滿庭戸收覽竒秀得十五强飲且為山作主山向吾曹分外清路轉山腰足未移水清石瘦便能竒直視無前氣吐虹五湖三島在胷中樹暗草深人靜處捲簾敧枕卧看山雲間聳孤翠脚力盡時山更好莫將有限趂無窮崖崩路絶𤣥鳥去惟有喬木攙天長峩峩兩烟鬟古鏡開新妝山中亦何有木老石頭頑正頼天日光澗谷紛爛斑南山有佳色無人空自竒清詩為題品草木變芬菲青山自遶廊不要買山錢梯山上巉絶俯視驚谽谺無價青山為我賒我昔曽為徑山客至今詩筆餘山色君住此山三十年妙語應須得山骨山髙無風松自響誤認石齒號驚湍含暉亭上望東溟凌霄峯頭把南嶽每逢佳士與名山何異枯楊便馬疥今朝偶上法華嶺縦觀始覺人寰隘攜琴已尋壑載酒復經丘青山若無素偃蹇不相親横看成嶺側成峯逺近髙低各不同不識廬山真靣目只縁身在此山中以上並東坡嶽經咨四岳書奠髙山大川注云髙山五嶽禹貢考制度於四岳諸侯各朝於方岳周官般巡狩而祀四岳河海也詩序嶞山喬嶽及河喬嶽詩大宗伯以血祭祭五嶽周禮天子祭名山五嶽視三公記王制維嶽䧏神生甫及申維申及甫為周之翰此文武之徳也禮記山嶽則配天左子山有嶽而且大者衆人所不能踰也揚子舜一歳而巡五嶽國不費而民不勞文中子史五嶽四瀆節宣雲雨前漢地有山嶽以宣其氣者也後天文志嶽者靈氣之所宅祭祀志注山嶽磊落而羅峙成公綏傳爰登方岳封禪勒成晉書五嶽唐鑑秦王謂尉遲敬德曰公之心如山嶽然唐書列𫝊韋思謙曰御史出使若不動摇山嶽誠曠職耳本傳集嶽脩貢兮川效珍禀山嶽之孕靈峩峩崇嶽吐符䧏神險資嶽靈文選激神嶽之嶈嶈漢班孟堅賦峻嶽之崇岡兮嵇康賦地有五嶽維天之柱張説遺愛頌自三光五嶽之氣分栁文凝赤聳山岳五嶽祭秩比三公四方環鎮嵩當中韓集髙嶽前嵂崒杜詩東嶽泰山岱山同經嵗二月東巡狩至于岱宗書泰山巖巖魯邦所瞻詩兖州其山鎮曰岱山周禮孔子歌曰泰山其頽乎記檀弓齊人將有事於泰山必先有事於配休郊特牲鄭伯請釋泰山之祀而祀周公以泰山之祊易許田鄭伯使宛來歸祊不祀泰山也左觸石而出膚寸而合不崇朝遍雨天下者惟泰山雲爾公羊季氏旅於泰山子曰曽謂泰山不如林放乎語子挾泰山以超北海泰山之於丘垤類也孔子登泰山而小天下孟子孔子遊泰山見榮啟期列子泰山之容巍巍然髙望之千里不見埵堁逺之故也淮南子逐獸者目不見泰山淮南升東嶽而後知衆山之峛崺也况介丘乎揚子史秦始皇上泰山風雨暴至休於樹下因封其樹為五大夫李斯上秦皇書曰泰山不辭土壤故能成其大史泰山若礪功臣表藺相如名重泰山傳封禪七十二王惟黄帝得上泰山封前郊祀志泰山一名岱宗五嶽之長王者易姓告代之處也五行志武帝封泰山白雲起封中前漢太始二年詔泰山見黄金本紀方將増泰山之封加梁父之髙相如傳天下之安猶泰山而四維之也嚴助泰山之髙不嶕嶢不能浡滃雲雨㪚歊蒸揚雄光武建武三十二年柴望登封泰山禪如梁隂以承靈瑞後紀太宗遣杜正倫行泰山七十二君壇迹唐禮樂志𤣥宗詔張説撰封禪壇頌刻之泰山同上自韓愈殁天下仰之如泰山北斗云本傳贊傳記泰山為東嶽爾雅泰山一曰天孫天帝之孫也主召人䰟魄博物志岱者代也東方萬物始交代之處五經通義泰山盤道屈曲而上凡五十餘盤經小天門大天門西巖為仙人石門東巖為介丘東南巖為日觀雞一鳴時見日出黃河去泰山二百餘里祠所望黃河如帶泰山記泰山南有廟悉種柏大者十五六圍相傳漢武所種同上岱宗石室中上下懸絶其中金牀玉几列仙傳東岱亦曰泰山六帖梁岳即泰山也類要岱宗之洞周回三千里名曰三宫空洞之天茅君内傳集崒乎泰山不足為髙韓文四月上泰山石平御道開六龍過萬壑澗谷隨縈迴李白北眺㠋嶂竒傾崖向東摧洞門閉石扇地底興雲雷天門一長嘯萬里清風来曠然小宇宙棄世何悠哉平明登日觀舉手開雲闗黄河從西来窈窕入逺山憑崖覽八極目盡長空閒李白岱宗夫如何齊魯青未了造化鍾神秀隂陽割昏曉盪胷生層雲決眥入飛鳥㑹當凌絶頂一覽衆山小東嶽雲峯起杜詩本朝岱宗已在眼一徃繼前躅天門四十里夜看扶桑浴回頭望彭城大海浮一粟東坡南嶽衡山經五月南巡狩至於南嶽書岷山之陽至於衡山禹貢荆州其山鎮曰衡山周禮史劉璘之嘗採藥至衡山深入忘返見有一澗水水南有二石囷一開一閉水深廣不得過遇伐薪人問徑得還或説囷中皆仙靈方藥璘之欲更索不復知處也晉書李泌畏禍願隠衡山詔給三品禄賜隠士服為置室廬唐書傳記霍山為南嶽衡山一名􅒖嶁山海經衡山南嶽也至黄帝乃以􅏦霍二山為副衡山記禹傷父功不成乃巡衡山血馬以祭之忽夢𤣥夷蒼水使者謂禹曰欲得我山神書者齊焉齊三日遂獲金簡玉字之書得治水之要吳越春秋漢武南巡以衡山逺道隔江漢乃徙南岳之祭于廬江􅏦山荆州記朱陵之靈臺大虛之寳洞赤帝館其嶺祝融宅其陽自湘川至長沙九向九背然後不見衡山有三峰極秀一名芙蓉峯最為竦傑自非清霽之朝不可望見峯上有泉飛𣲖如一幅絹分映青林直注山下同上朱陵之靈壇太虛之寳洞當翼軫之宿度應璣衡故曰衡山有五峯曰紫盖曰宻雲曰祝融曰天柱曰石廩湘州記湘東姚祖經衡山望巖下數少年並執筆作書未至百歩少年相與飛颺遺一紙書字字皆鳥跡異苑衡山有三峯一曰紫盖每見有雙白鶴回翔其上二曰石囷下有石室三曰芙蓉上有飛泉六帖集衡翟磊落以連鎮郭景純賦五嶽於中州衡山最逺南方之山巍然髙而大者百數獨衡山為宗最逺而獨為宗其神必靈韓送廖道士序衡山蒼蒼入紫冥下看南極老人星李白南嶽配朱鳥秩禮自百王歘吸領地仙鴻洞半焱方祝融五峯尊峯峯次低昻紫盖獨不朝爭長嶪相望南嶽據江湖杜詩委舟湘流往觀南嶽雲壁覃覃穹林悠擢山僧愛山出無期俗士牽俗来何時祝融峯下一回首即是此生長别離火維地荒足妖怪天假神柄專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我来正逢秋雨節隂氣晦昧無清風潛心黙禱若有應豈非正直能感通須臾靜掃衆峯出仰見突兀撑青空紫盖連延接天柱石廩騰擲堆祝融􅒖嶁山尖神禹碑字青石赤形摹竒韓集東南倚盖卑維嶽資柱石前當祝融居上拂朱鳥翮青冥結精氣磅礴宣地脈還聞膚寸隂能致彌天澤劉禹錫本朝不見祝融峯還泝瀟湘去山谷我来萬里駕長風絶壑層雲許盪胷濁酒三杯豪氣發朗吟飛下祝融峯衡嶽千仭起祝融一峯髙羣山畏突兀奔走如曺逃捫天滑清壁俯壑崩銀濤所恨無十犗一掣了六鼇朱文公西嶽華山經八月西巡狩至於西嶽書西傾朱圉鳥鼠至于太華南至於華隂禹貢歸馬於華山之陽武成豫州其山鎮曰華山周禮史秦始皇踐華山為城史始皇三十六年鄭客至華隂望見素甲白馬從山上下知其非人道左止而待之遂持璧與鄭客曰為我遺鎬池明年祖龍死史張楷能為五里霧所居成市徙華山有公超霧市後本傳傳記華山為西嶽爾雅鄧紹入華山見童子以五綵囊盛柏葉露華山記山頂有池生千葉蓮花服之羽化因曰華山同上太華之山削成而四方其髙五千仭其廣千里山海經華山中頂石龜側有飛磴逹背見玉女祠有五石臼號曰玉女洗頭盆廣記太華少華故曰二華華山三峯六帖西方少隂用事萬物生華故曰華山白虎通毛女在華隂山中獵師世世見之體生毛自言秦始皇宫人列仙傳呼子先夀百餘歳臨去呼酒家嫗令急裝便有仙人持二毛狗来因各騎之乃龍也上華隂山嘗於山大呼言子先酒母在此同上集西嶽太華之首峯有五崖比壑破巖而列自下逺而望之偶為掌形舊俗土記之傳者皆曰昔河自積石出而南流既越龍門遂弭南馳者千數百里折波左旋將走東溟連山塞之壅不得去有巨靈於此力擘而剖其中拓而北者為首陽絶而南者為太華河自此洩茫洋下馳故其掌跡猶存巨靈之跡也余往觀曰誕哉此説乎夫所謂神者非人也其動無聲其行無跡若形而無象若色而無色㧞山剖澤而不見其作鼔風奔水而不見其力視不可察名不可及故推而謂之神焉有神之作力而有人之跡乎王涯仙李白登華山落鴈峯曰此山最髙呼吸之氣想通帝座矣恨不持謝朓驚人詩来搔首問青天耳搔首集諒少昊之下都即蓐収之别館張説碑西嶽出浮雲積氣在太清連天擬黛色百里遥青冥王維西嶽崢嶸何壯哉黄河如絲天際来巨靈咆哮擘兩山洪波噴流射東海三峯聳立如欲摧翠崖丹谷髙掌開白帝金精運元氣石作蓮花雲作臺太華三芙蓉明星玉女峯李白西岳峻嶒聳處尊諸峯羅列似兒孫安得仙人九節杖拄到玉女洗頭盆車箱入谷無歸路箭栝通天有一門稍待秋風凉冷後髙尋白帝問真源前軒頽返照巉絶華嶽赤杜詩太華峯頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沉疴痊我欲求之不憚逺青壁無路難夤縁安得憑梯上摘實下種七澤根株連韓集靈蹤露指爪殺氣見稜角劉禹錫本朝李肇國史補載韓愈遊華山窮極幽險心悸目眩不能下發狂號哭投書與家人别華隂令百計取之方能下沈顔作贅書以為肇妄載豈有賢者輕命如此余觀之贈張籍詩云洛邑得休告華山窮絶陘倚巖睨海浪引袖拂天星日駕此回轄金神所司刑泉紳拖修白石劒攢髙青磴蘚達拳跼梯飇颭伶俜悔狂已咋齒垂戒仍鐫銘則知肇記為信然沈顔為妄辯也隠居詩話無為子嘗以事過華山重几日飲酒蓮花峯上東坡北嶽恒山經十有一月朔巡狩至於北嶽書太行恒山至於碣石禹貢并州其山鎮曰恒山周禮子其山北臨代南俯趙東接河海之間早生而晩殺五穀之所蕃熟四種五穫焉管子恒山之蛇名曰率然一身而兩頭擊其一頭則一頭至擊其中則兩頭皆至孫子史趙簡子謂諸子曰吾藏寳符於恒山中徃者立為後諸子競往無所得無恤曰常山臨代代可取也簡子曰是知符矣史傳記恒山為北嶽爾雅北方為恒恒者常也隂終陽始其道常乆故曰恒山白虎通常山髙三千九百丈上方三千里山海經慕容雋恒山上得璧七十二前燕錄昌容者常山道士自稱殷女食蓬蔂根往来山下見者二百餘年顔色如二十許人列仙傳集大哉兹嶽殊於衆山嵩華乃跼其近甸衡岱不踰於方域孰與夫包括綿長經綸中外外夷有四昴宿主胡則延袤以限之中郡有五寳符在岱則髙襄以臨之其頂也上扶乾門黒帝之宫觀其足也下捺坤軸𤣥神之都府豈止劈冀魏截幽燕拒洪河撐大海鴻洞合沓半天下之襟帶嵯峨巉巗一宇宙之標格者也張嘉貞碑中嶽嵩山經崧髙維嶽峻極於天維嶽䧏神生甫及申詩史漢武帝詔曰朕有事華山至於中嶽翌日親登崇崧御史乗屬在廟傍吏卒咸聞呼萬嵗者三登禮罔不答其令祠官加増太室祠禁無伐其草木以山下三百戸為之奉邑名曰崇崧前紀則天改嵩山為神岳唐書李渤隠少室山以右拾遺召謝不起同上傳記中央之嶽居四方之中而髙故曰嵩山白虎通其山三十六峯東曰太室西曰少室嵩其總名也謂之室者以其下各有石室焉西征記岳之西北一峯號望都峯天氣清暖即望見洛陽東北一峯號雞鳴五更之初便見日出紀異東龍門之南有許由山髙大自絶其北有潁水堯聘許由處道書周靈王太子晉遇浮丘公接上嵩山列仙傳嵩髙山北有大穴嘗有人誤墜穴中同輩投食墜者得之為尋穴而行計可十許日忽曠然見明又有草屋中有二人對奕局下有一杯自飲墜者告以飢渇棊者曰可飲此墜者飲之氣力十倍半年許乃出自蜀中歸洛下問張華華曰此仙館所飲者玉漿也所食者龍穴石髓也世説集嵩山有神人焦錬師不知何許婦人也嘗胎息絶穀居無室廬遊行若飛倐忽萬里世或傳其入東海登蓬莱竟亦不能測其徃也李白元丹丘愛神仙朝飲潁泉之清流暮還嵩岑之紫烟三十六峯長周旋躡星虹身騎飛龍耳生風横河踐海與天通我知爾遊心無窮李白本朝嵩峯三十六終日對髙閣隂晴無朝暮紫氣嘗浮泊雄然九州中氣象壓寥廓亦嘗歩其巔培塿視四岳始疑茫昧初混沌死鐫鑿神功夜催就萬仭成一削尤竒十二峯隠見入冥邈顧瞻但徘徊想像逢綽約嵩山近可愛泉石吾已諾終朝有幽人白首老雲壑荆巫惜遐荒詭怪杳難邈况逢秋雨霽濃染新翠濯峯端上明月且可留幽酌嵩峯三十六蒼翠爭聳出嵩嵐久不見寒碧更潺顔歐陽公假山經青州厥貢怪石為山九仭功虧一簣書維石巖巖漸漸之石詩子宋之愚人得燕石而藏之以為寳客見之掩口而笑曰此燕石也其與瓦甓不殊荀子史魏明帝鑿太行之石英採榖城之文石起景陽山於芳林園公卿以下莫不展力帝躬自握土以率之魏志到溉居近淮水齋前山池有竒礓石長一丈六尺梁武帝戯與賭之并禮記一部溉並輸焉石即遷置華林園宴殿前所謂到公石也南史薛元超轉中書舎人𢎞文館學士省中有盤石其祖道衡常據以草制元超每見輙泫然流涕唐書有人獲洛水白石而赤文者獻闕下曰此石赤心故以獻李昭德叱曰洛水餘石豈盡能反邪同上㧞野古有川曰康干河斷松投之三年輙化為石色蒼緻然脈理猶在世謂康干石回紇傳唐莊宗朝張全義為四鎮節度有監軍嘗得李德裕平泉醒酒石德裕孫延古因託全義復求之監軍忿然曰自黄巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在巢賊中以為譏已大怒笞殺之五代史傳記流洲在西海中上多積石名為昆吾石十洲記白樂天作牛竒章石記曰公嗜石以甲乙丙丁為品太為上羅浮次之天竺又次之餘為下李德裕居平泉山誡子弟記曰鬻平泉者非吾子孫也以平泉一石與人者非佳子弟也雞跖李棻好竒有異石髙二尺許嵌硿可愛每至未時節其氣出於石穴中若烟雲之狀因目之為未石揮犀陶淵明所居粟里兩山間中有大石仰視𤣥瀑可坐十人號醉石廬山記華山掌其石如人肉色每太陽對照則見之暮則漸隠不見賈氏談錄王維輞川林下坐用雷門四老石燈滅則石中鑽火事畧集渙若奔雲錯若置棊怒者虎鬬企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交峙環行卒愕疑若搏噬栁萬石亭記有盤㘭秀出如靈丘鮮雲者有端險挺立如真官神人者有縝潤削成如珪瓚者有㢘稜鋭劌如劒㦸者乂有如虬如鳯若跧若動將翔將踴如鬼如獸若行若聚將竦將鬬風烈雨晦之夕洞穴開􅥾若欱雲歕雷嶷嶷然有可望而畏之者烟霽景麗之旦巖㠋霮䨴若拂嵐撲黛靄靄然有可狎而翫之者三山五嶽百洞千壑覼縷簇縮盡在其中百仭一拳千里一瞬坐而得之白樂天客從山来遺我盤石員平膩滑廣袤六尺質凝雲白文坼烟碧莓苔有斑麋鹿無跡置之竹下風掃露滴坐待禪僧眠留醉客清冷可愛肢體甚適便是白家夏天床席盤石銘震澤生竒石沉潛得地靈初辭水府出猶帶龍宫腥發自江湖國采榮卿相庭從風夏雲勢上漢古槎形拂拭魚鱗見鏗鏘玉韻聆烟波含宿潤苔蘚助新青嵌穴狐雛貎纎鋩蟲篆銘潺顔傲林薄飛動向雷霆太湖石詩錯落復崔嵬蒼然玉一堆峰駢仙掌出罅坼劒門開峭頂髙危矣蟠根下壯哉精神欺竹樹氣色壓亭臺隠起磷磷狀凝成瑟瑟肧㢘稜露鋒刃清越叩瓊瑰岌嶪形將動嵬峩勢欲摧竒應連鬼怪靈合蓄風雷黛潤霑新雨斑明㸃古苔未應棲鳥雀不肯染塵埃尖削琅玕筍窪剜瑪瑙罍海神移碣石畫嶂簇天台烟翠三秋色波濤萬古痕削成青玉片截斷碧雲根迴頭問雙石能伴老夫否石雖不能言許我為三友三能為刺史飯水復食蘗唯向天竺山取得兩片石此抵有千金無乃傷清白太湖石詩南曺小司冦舅累土為山一簣盈尺嶔崟嬋娟宛有塵外數致詩云一簣功盈尺三峯意出羣望中疑在野幽處欲生雲江間饒竒石嵑􅠣怪石走杜詩當軒乍駢羅隨勢忽開坼有洞若神剜有巖類天劃終朝巖洞間歌吹宴親戚孰謂衡霍竒近在王侯宅韓詩下同湖嵌費攜擎本朝兖王作假山翊善姚垣曰不見假山惟見血山皆生民膏血所成時太宗為諸王作假山聞語而罷通鑑吳仲庻守金陵夢三舉子求哀曰若不垂佑明日當為煨燼矣公甚異之詰旦兵馬司狀申乞燒三醜石為灰供脩造用公遂悟敕寺僧愛䕶焉楊公筆錄政和間零陵縣貢一巨石舟載至京師毁水門樓以入千夫舁之不能動裕陵親灑宸翰云慶雲萬態竒峯仍以金帶一條挂其上遂即可移頃刻至苑中揮塵錄余家有三峯余愛之非徒愛其似山而又有所感焉非徒愛之而又有所敬焉余見中峯魁岸倨肆意氣端重若有以服其旁之二峯二峯莊栗刻削凛不可犯雖其勢服於中峯而岌然决無阿附意吁可敬也夫其亦有所感也夫老泉木假山記新霜夜落秋雨殘有石露出寒溪垠苔昏蟲食禽鳥啄出没溪水秋復春溪邉老翁生長見疑我来視何殷勤愛之遠徙入幽谷曵以三犢載兩輪行穿城中罷市看但驚可怪誰復珍荒烟野草埋没久洗以石竇清冷泉朱欄緑竹相掩映選致佳處當南軒南軒旁列千萬峯曽未有此竒嶙峋乃知異物世所少萬金爭買傳幾人匠智無遺巧天形窮幽探謂我愛山者為山列前簷頽垣不數尺萬嶮由心潛或開如斷碧或呀若谺􅀈或長隨靡迤或瘦露空嵌險穴虧杳杳髙屏立巉巉後出忽孤聳羣卉沓相參宛若氣融結突如鬼鐫鑱豈知几席間百態生濃纎范成大甘露寺有石如羊相傳謂之狼石云諸葛孔明坐其上與孫仲謀論曺公也詩曰狼石卧庭下穹窿狀伏羱謝安所居有石一株嘗倚杖相對吟嘯終日忘歸北齊謝洙名之為玉筍峯唐栁公權榜其亭曰獨秀峯杜詩云倚杖㸔孤石至揚州獲二石其一緑色岡巒迤邐有穴達於背其一正白可鑒漬以盆水置几案間李正臣蓄異石九峯玲瓏宛轉若牕櫺然予欲以百金買之與仇池為偶名之曰壺中九華且以詩紀之詩云念我仇池太清絶百金來買碧玲瓏僕所藏仇池石希代之寳也詩云海石来珠宫秀色如蛾緑坡陁尺寸間宛轉陵蠻足連娟二華頂空洞三茅腹初疑仇池化又恐瀛洲蹙殷勤嶠南使饋餉揚州牧盛以髙麗盆薦以文登玉靈璧出石多似圖劉氏園中有一株獨反覆可觀作麋鹿可宛頸狀東坡居士欲得之乃畫臨華閣壁作醜石風竹主人喜乃以遺之忽從塵埃中来對氷雪顔瘦骨扶凜凜蒼根漱潺潺但當對石飲萬事付等閒東坡石屛出零陽白鶴山紹興間有宗子於水中得一石光采絢異其文若峯巒聳秀渾然天成自是石工鑿取益衆烟雲雪月之景波瀾龍鳯之象雖巧畫者莫臻其妙零陵志米芾知無為軍初入州廨見立石頗竒喜曰此足以當吾拜命取袍笏拜之每呼曰石丈石林燕語記纂淵海卷六
