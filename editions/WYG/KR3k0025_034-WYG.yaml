body:
  text: 記纂淵海卷三十四宋潘自牧撰職官部監司史刺史銀印青綬位居牧伯分刺諸州百官志王陽為益州刺史行部至卭崍九折坂歎曰奉先人遺體奈何數乗此險及王尊為刺史至其坂問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣黄霸為揚州刺史治有績宣帝詔賜車蓋特髙一丈以彰有徳朱博為冀州刺史博本武吏不更文法行部吏民數百遮道自言從事欲以觀試博博決如神吏民大驚並前漢郭伋為刺史行部到西河美稷有童兒數百各騎竹馬于道次迎拜曰聞使君到喜故來奉迎蘇章遷冀州刺史故人為清河太守章行部請太守為設酒殽甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪郭賀為荆州刺史有殊政顯宗賜以三公之服黼黻冕旒勅行部去襜帷使百姓見其容服賈逵為豫州刺史舉奏二千石以下阿縱不法者帝曰逵真刺史也賈琮為冀州刺史之部言曰刺史當逺聽廣視糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰帷百城聞風竦震諸贓過者望風解印而去謝夷吾為荆州刺史第五倫薦之曰尋功簡能為外臺之表聽聲察實為九伯之冠李膺為青州刺史守令畏其威名聞風棄官种暠為梁州刺史被召當遷吏民詣闕請留之太后嘆曰未聞刺史得人心若是乃許留一年並後漢刺史銅印墨綬晉百官表晉向雄為秦州刺史假赤幢曲蓋鼔吹晉書呉隠之為廣州刺史酌貪泉賦詩地理部楊逸為光州刺史廣設耳目善惡畢聞咸言楊使君有千里眼那可欺之本傳傳記秦置監察御史漢省之後復置文帝以御史不奉法乃遣丞相史出刺并督察御史武帝元封五年初置部刺史掌奉詔條察州以六條問事秩六百石居部九嵗舉為守相成帝更為州牧秩真二千石位次九卿哀帝復為刺史天壽復為牧光武復刺史乗傳周行郡國錄囚徒考殿最舊制州牧奏二千石事皆先下三公光武不復委三府故權歸刺舉之史靈帝改為牧魏晉為刺史持節都督庶姓為單車刺史後魏州置三刺史隋開皇三年罷郡以州統縣自是刺史之名存而職廢後有刺史皆太守之互名理一郡而已煬帝罷州置郡置司𨽻臺大夫一人巡察畿内刺史十四人巡察畿外唐罷郡置州神龍二年分天下為十道置巡察使二十人景雲改置按察使開元改置採訪處置使至徳之後改採訪使為觀察并領都團練治于所部之大郡職源分馳郡國督察在位其敷以言錄見囚徒漢官解詁集周以十聨率諸侯若今之廉察白集廉問七州牛僧孺歴居廉鎮崔鈜制泊廉視浙右李徳裕玉節居分陜金貂總上流麾軍時舉扇作賦且登樓年光徧原隰春色滿汀州日華三翼舸風轉七星斿向解青絲䌫將移丹桂舟梁元帝綉衣春當霄漢立杜詩州家申明使家抑韓集堯置州牧四岳持而綱之柳文本朝初有轉運使淳化及景徳増提刑熙寧又置提舉㑹要督刺之寄南豊委節傳分按州郡公是行周沆制分龍節以典州驟歴劇部公是謝表轉運使副判官史楚漢相距滎陽蕭何轉漕關中給食不乏髙祖曰鎮國家撫百姓給饋餉吾不如蕭何漢書光武謂寇恂曰昔髙祖留蕭何鎮闗中吾今委公以河内堅守轉運給足軍粮光武于是北征恂收租四百萬斛以輦車驪駕轉輸前後不絶後漢書諸葛亮出祁山以木牛運由斜谷出以流馬運蜀志裴耀卿充轉運使置河隂集津二門倉引天下租繇盟津泝流而西三年積七百萬石省費三十萬緡唐書劉晏以轉運為己任凡所經歴必究利病運米數千萬石以濟闗中歴代操利柄為國計者莫不損下益上危人自安變法以弄權斂怨以搆禍皆有之矣如劉晏通壅滯任才能富其國而不勞于民儉其家而歸利于衆第五琦促辦應卒民不加賦而國豐饒亦庶幾矣唐書傳記唐先天二年李傑始為水陸發運使開元二十一年裴耀卿充江南淮南轉運使而崔希逸蕭旻為副天寶以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸道轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆始于此五代罷巡院始置轉運使唐㑹要本朝乾徳以後始置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此其轉運使國初但曰勾當某路水陸計度轉運使官髙者曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與判官焉又置同勾當轉運使尋罷諸路副使真宗毎用兵或令都部署兼轉運使王師征討則有隨軍轉運使慶厯中皆帶按察之任實錄熙寧二年詔轉運使用本資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常唯使副判官常置紹熙以來使副運判不雙除開寶九年詔諸道官吏宜令轉運使廉訪能否第為三等嵗終以聞當行誅賞李士衡為河北漕真宗幸澶州東封西祀供調百萬億士衡有功焉士衡為河北都運使調發得策列郡有數年之積其餘以濟饑民祥符七年詔曰自今轉運副使不限官品並在提㸃刑獄之上咸平元年上謂輔臣曰諸路轉運使按察官吏使權甚重必須平允之吏寛猛適中卿等其慎擇四年查道請自今轉運使副得替先批書一任曽舉若干廉勤才識之士曽按若干貪贓猥濫之人朝廷量其臧否以行賞罰從之吕文靖擢李詢為京西轉運使謂之曰以學士才器髙爽故有此授宜副朝廷之意景祐元年令諸路轉運使副察所部官吏能否分為三等景祐間河北河東陜西三路漕臣賜方勝練鵲錦袍陳堯佐六為運使方嚴清肅使人知畏而重犯法皇祐五年詔轉運之職本以澄清官吏豈可誅求有能盡嵗入以致増盈者留為本路移用毋得進羨實錄哲宗立復以鮮于侁為京東漕司謂人曰以侁之賢不宜使居外顧齊魯之區凋弊已甚須侁為福星救之耳四朝史逺採漢官設刺之使近參唐制考將漕之最胡文恭賦輿衍増分輸錯出同上往總一方之刺督之任張商英出總舟車之餫餉徐彦孚督軍餉朔部唐義問運管運幹集以佐軺車白集本朝熙寧初詔諸路漕司始置屬官勾當兩貟或一貟又置管勾文字實錄元祐中除三路外並罷後復置建炎初避髙廟諱改管勾為主管文字勾當為幹辦公事熙寧中辟唐義問為京西轉運司管當文字神宗因黄好謙領使事諭之曰唐義問風力強敏行且用矣可面詔之四朝史主管帳司本朝熙寧五年詔諸路漕司始置屬官元祐罷管勾文字以帳司兼管後復故㑹要提㸃刑獄公事史暴勝之為直指使者衣繡杖斧以出討盜賊漢書本朝淳化二年遣官分往諸路提㸃刑獄尋消之景徳四年真宗謂王旦曰朕慮四方刑獄官吏未盡得人一夫受冤即召災沴先帝甞選朝臣為諸路提㸃刑獄今可復置仍以使臣副之天禧四年改提㸃刑獄勸農使天聖六年悉罷八年復置嘉祐中罷武臣提㸃刑獄治平元年罷提㸃刑獄而委轉運司職官熙寧二年諸路提㸃刑獄並差文臣十年復置提㸃京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其廉吏以達於朝㑹要宣和初詔廣西江西増置武提刑之貟遇闗帥不許武憲兼攝建炎元年以盜賊未衰諸路無武提刑處權添差一貟專管提刑四年罷之乾道復置武提刑後又罷之中興㑹要慶厯二年詔自今提㸃刑獄朝臣代還列功過三等以聞續㑹要熙寧十年以丁執禮為河北西路使上諭之曰卿職在刑獄盜賊最急宜用捕督髙賦言國家置提刑司蓋欲平反獄訟使民不寃國家惟吏之不平民之失職獄之放紛未能獨察也故設糾度之司使奉欽恤之㫖罷諸路同提㸃刑獄使臣敕督視祥獄田待問按兹祥刑宜得膚使蘇􅒲制操外憲之柄胡文恭讞平犴獄林劭制早稱才名出提憲寄胡宿集提刑司幹官本朝建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許存留文臣一貟㑹要提刑司檢法本朝熙寧六年置諸路提刑司檢法一貟元豐三年罷五年復置四朝史髙賦言自罷武臣以來多止一貟兼河渠盜賊而刑書繁多者閱不給若委之吏則為大弊請逐路置檢法官以專平讞䟽駁本傳熙寧八年詔檢法官今後得隨長官出巡臣寮奏檢法官職專詳讞㑹要提舉常平茶鹽司本朝淳化中建常平倉景祐元年令轉運使司與長吏舉所部官兼領之熙寧遣使提領蓋提舉常平之所始也九年府界亦專置提舉常平倉一貟不令司農丞兼領元祐初置紹聖復置政和改元詔江淮荆浙六路其置茶鹽提舉一貟宣和三年詔河北京東路推行新法鹽鈔可添置提舉一貟此提舉茶鹽之所始也既而諸路皆置建炎元年詔提舉常平司併歸提刑司二年復三年復詔提刑兼四年詔逐路提刑司茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉茶鹽常平等公事為名十五年詔改充提舉常平茶鹽公事等掌常平義倉免役市易坊場河渡水利之法視嵗豐歉而為之斂散以恵農民仍專舉刺官吏之事掌摘山煑海之利以佐國用皆有鈔法視其嵗額之登損以詔賞罰且給之不如期鬻之不如式與州縣之不加恤者皆劾以聞慶元制朕以常平蠲役之政加恵黎元若在神考取成三代制為常平蠲役之政以利天下方畧制提舉司幹官本朝熙寧三年置提舉常平司勾當公事於通判幕職内選差一貟不妨本職紹興三年戸部看詳欲諸路州並以通判充主管官又許于幕職官選差六年復置主管官十五年依舊為幹辦公事此常平幹也宣和三年置茶鹽提舉屬官一貟並㑹要此茶鹽幹也今提舉司存二幹官以此使幹茗局胡文恭總領史劉晏移書於元載曰諸將有不庭邊敵有侵盜聞我貢輸錯入軍食豐衍可以震耀中外劉晏領租庸使租庸得補署積數百人盡當時之選趣督倚辦故能成功李靈耀反河南節帥擅征賦州縣益削劉晏甞以羨補之人不加調而所入自如贊曰劉晏制萬物低昻操贏貲以佐軍興斂不及民而用度足唐中僨而振晏有勞焉論曰劉晏幹萬貨盈虛厥功懋矣君子之治財以仁為本以義為利其為利害而寓之法法成矣巧者不敢過拙者不敢不及又曰斂之於官而下不怨藏之百姓而上不之元琇判度支國無横斂而軍旅濟肅宗駐彭原第五琦謁見陳今之急在兵兵強弱在賦賦所出以江淮為淵若假臣一職請悉東南寶貨飛餉函洛帝拜為勾當江淮租庸使當軍興隨事趣辦人不益賦而國益饒並唐書本朝南渡之初甞命朝臣總領都督府宣撫司財賦未以官名也紹興十一年收諸帥之兵以為御前軍屯駐諸處皆置總領仍帶專一報發御前軍馬文字蓋與聞軍屯不獨職餽餉而已叙位在轉運副使之上鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之十六年四川總司以總領四川宣撫司錢糧所為名十八年詔罷宣撫司始改為四川總領乾道六年詔淮東總領併歸淮西總領所七年復設淮東總領並㑹要總屬本朝紹興十一年初置四川總領官屬有幹辦公事準備差遣四川有主管文字三貟淮東淮西有分差糧料院審計司審計司通判兼𣙜貨務都茶塲御前封樁甲仗庫大軍倉大軍庫贍軍酒庫市易抵當庫恵民藥局湖廣有給納場屬官兼分差糧料院審計司審計以屬官兼御前封樁甲仗庫大軍倉大軍庫贍軍酒庫四川有分差糧料院審計司審計兼大軍倉大軍庫撥發船運官贖藥庫糴買場㑹要都大提㸃茶馬本朝熙寧七年始詔三司鹽鐵判官李杞三司勾當公事蒲宗閔經畫川蜀買茶充秦鳯熙河路博馬就除成都府路買茶公事把于秦州宗閔于成都置司後改名都大提舉茶馬事成都記元豐四年郭茂恂言茶司既不兼買馬遂立法以害馬政恐悮國事乞併茶馬為一司從之掌收摘山之利以佐邦用凡市馬于藩夷以茶易大觀以采川茶不以博馬唯市珠玉故馬政廢缺紹興四年始令四川宣撫司支茶博馬五年宻院言已于永康軍茂州置場舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等乾道元年川秦兩司馬共九千餘匹熙寧十年李稷提舉成都府等路茶場熙河市易事手詔李稷風力固已可任然權勢輕小可依李把例兼三司判官仍委權限貟舉劾官吏初蜀茶額錢三十五萬至稷加至五十萬及陸師閔代稷為百萬李稷言一年通計課利錢七十六萬緡上批云蜀茶變法稷能推原法意日就是切宜速遷擢以勸在官元祐初司馬光為相罷諸路鹽鐵法皆復其舊獨川陜茶以邊用未即罷使相視去其任者紹聖中提舉程之邵以羨茶轉入熙秦市戰騎故馬多而茶息厚之邵革黎州買馬之弊嵗以仲秋為市四月止元符末程之邵召對徽宗詢以馬政之邵言戎俗食肉飲酪故貴茶而病于難得願禁治邊鬻茶以蜀産易上乘詔可未幾易馬萬匹並四朝志淳熙五年茶馬呉總以馬政修舉除敷文閣待制自紹興初至是踰四十年間以次對為茶馬者趙開及呉總二人耳成都記在昔元豐留神武備摘山市駿具著科條乃詔攸司悉遵成憲乃將使指實克推行李昌儒制講摘山之利得充廏之良龍溪除起宗制都大提㸃坑冶傳記開元二十五年羅文信充諸道鑄錢使唐㑹要天寶三載楊睿矜除御史中丞充鑄錢使六載楊釗充諸道鑄錢使永泰元年劉晏充東都淮南浙江東西湖南山南東道鑄錢使第五琦充京畿闗内河東劒南山南西道鑄錢使諸鑄錢監所在州府都督刺史為之副監一人上佐判之續通典本朝開寶置錢監于鄱陽既而江淮荆浙閩廣之地皆有監係發運使兼提㸃咸平三年以馮亮為河南轉運副使兼都大提㸃江南福建路鑄錢事供奉官白丞睿同提㸃鑄錢事實録景祐二年始置江浙荆廣福建等路都大提㸃坑冶鑄錢一貟與提㸃刑獄叙官元豐二年増提㸃一貟定為兩司在饒者領江東浙淮七閩在䖍者領江西荆湖二廣焉職畧元祐元年以坑冶鑄錢通為一司㑹要政和七年置提㸃鑄錢官兩貟于饒䖍州紹興二年置䖍州提㸃司六年銜内添都大二字二十六年詔都大提㸃坑冶鑄錢司官吏並罷令逐路轉運司交割二十七年置提領諸路鑄錢官於行在以提領諸路鑄錢所為名二十九年復置官以江淮荆浙福建廣南路提督坑冶鑄錢公事繫銜與運判序官依舊于饒贑二州置司專以措置坑冶督責鼔鑄為職乾道六年併歸發運司七年復置九年兩司分認課額淳熙二年併贑司歸饒州加都大焉掌收山澤之所産及鑄泉貨以給邦國之用嵗有定數視其登耗而賞罰之四朝志朕修山澤之政令以足國恵民天方降休地不愛寶惟是興利之廣幅貟既長必資能臣以持九路之節徐謹制沿挾銅之令以收七福因採山之法用廣五銖胡文恭行葛源制按南州寶冶之饒佐縣官圜府之用宣勞于外興利在公同上主管提幹檢踏本朝紹興二年鑄錢司言本司昨被㫖許置幹辦公事一貟檢踏官五貟催綱官二貟後來與諸司屬官一例減罷縁所𨽻諸州不可闕官詔復置幹辦公事一貟檢踏官三貟催綱官一貟後檢踏置六貟十一年將檢踏官各分認專管職事一貟在饒州本司一貟在信州一貟在建州一貟在韶州一貟在潭州二十六年官吏並罷二十九年再置提㸃官於饒州置主管文字贑州置幹辦公事一貟韶州建州各置檢踏官一貟别置秤銅官催綱官各一貟續詔饒州添檢踏官一貟並中興㑹要提舉市舶史嶺南市舶使周慶立造竒器以進栁澤上書曰慶立雕製詭物造作竒器用淫巧為珍玩以譎怪為異寶乃治國之巨蠧也𤣥宗稱善盧鈞開成三年為廣州刺史南海有蠻舶之利珍貨輻凑舊帥靡不捆載而還鈞性廉潔請監軍領市舶使已一不干預並唐書傳記張公為安南習于海邦琛珍良貨溢于玉府至殊俗異類盈于藁街職林市舶者其利貲㩁金山珠海天子南庫也百蠻之寶五夫之珍每嵗山積市舶録集扶南雜種安西諸國跨險慿危梯山航海飛艎走浪望䑕島而三休大舶參雲指麟洲而一息鳶波象郡萬舳爭先烏滸狼㬻千艘競進張鷟集本朝開寶四年以同知廣州潘美尹宗珂並兼市舶使通判謝處玭兼市舶判官實録咸平二年令杭州明州各置市舶聽藩官從便長編熙寧變市舶法泉人賈海外者往復必使東詣廣否則沒其貨哲宗即位之二年始詔泉州置市舶舊制市舶司多州郡兼領元豐中始令轉運司兼提舉而州郡不復預矣後專置提舉而轉運亦不復預矣後盡罷提舉官大觀元年復置建炎中興詔罷兩浙福建市舶司歸轉運司時政記而廣南如故明年復置中興㑹要紹興二年廢福建提舉市舶初令提刑兼領旋委提舉茶事十二年朝廷措置蠟茶以茶事歸建州而提舉市舶以次復矣乾道三年詔罷兩浙提舉市舶逐處職事委知通知縣監司同行檢視而總其數令轉運司提督均掌蕃貨海舶征𣙜貿易之事所以來逺人通貨物也㑹要向敏中知廣州兼市舶前後守者多渉譏議敏中無所求索清節益著長編侍御史王絲兼市舶提舉舊蕃舶之來十稅其一必擇精者絲令粗精兼取蕃人悦之目為金珠御史㑹稽圗記市舶司言廣州自祖宗以來興置市舶收課入倍于他路㑹要上曰市舶之利最厚若措置合宜所得動以百萬計朕所以留意于此庶幾可以少寛民力耳又曰市舶之利頗助國用宜循舊法以招倈逺人阜通貨賄紹興二十一年李莊除福建提舉上曰提舉市舶司委寄非輕若用非其人措置失當海商不至矣髙祖問張闡舶市嵗入㡬何闡對抽解與和買以嵗計之約入二百萬緡並同上知西外南外宗正司本朝崇熙元年蔡京乞于兩京置外宗正司當擇宗室之賢者管幹逐處各置一人凡外任宗室事不干州縣者外宗政司受理大觀罷政和復續㑹要中興外宗司無定所後南外置司泉州西外置司福州其丞係兼簿係簽判兼紹興府亦有宗司乾道七年省紹興宗司𨽻行在置四川宗司㑹要宗子有文藝行實衆所共知者許宗正考實以聞㑹要爰俾訓齊往分糾正慶元制睦宗院本朝崇寧元年蔡京請宗室非袒免親以下兩世除北京外欲分于西京近輔或沿流便郡居止自西京為始每處置敦宗院差文臣一貟武臣一貟管幹大觀罷政和復續㑹要中興南外居泉州西外居福州光宗改名睦宗院北置院于别都大觀詔所以親睦宗族愛養孤幼崇寧詔宗教史漢元始五年于郡國置宗師以糾皇室親族世氏致教訓焉選有徳義者為之有冤失職者宗師得因郵亭上書漢書晉咸寧三年置宗師使皇室戚屬奉率徳義有所施行必合諮之晉書唐武徳三年詔天下每州置宗師一人以相統攝唐書本朝崇寧初蔡京請置敦宗院又云令置學立師為量試之法大觀元年南敦宗院大學教授張戣以宗子釋褐教養有方特轉一官大觀三年詔曰比置院于别都増學于官邸廩其無禄而教養其未命者累累于兹宗子之在别都或犯朝法吏弗能禁民以為擾師儒之官殆相倍蓰而就學者寡宜有裁適應西京敦宗院官吏並罷政和二年詔曰宗族蕃衍詔有司分食兩京為立廩稍之格由庠序之教朕心無慊焉宣和三年増置西南司敦宗院教授各一貟時又有博士正録中興後唯置宗教㑹要都統史上元初詔郭子儀為諸道兵馬都統領率諸鎮之師徑抵范陽為朝恩所間事竟不行永泰元年以子儀都統河南節度使行營出鎮河中唐書徳宗置六軍統軍秩視六尚書為節制徊翔之地乾符中黄巢大掠江淮宰相王鐸願自率諸軍盪滌羣寇乃拜荆淮南節度使諸道行營兵馬都統並同上傳記晉太元十九年有河西大都統唐天寶末置天下兵馬元帥都統朔方河東北平盧龍節度使都統之名始此乾元元年李峘除都統淮南江東西節度使都統之官始此唐㑹要唐制或總五道或總三道上元末省大中後討徐州以康承訓討黄巢以王鐸為都統分紀黄巢之難置諸道行營都統掌征伐兵罷則省雖總諸道兵馬不賜旌節同上集宜兼領䕶之權副師貞之吉李若幽制執羈霸府盡忠肅之勤誠聳劍元戎罄旌旄之茂績張巡師制折衝之寄符玉帳而總金壇出總戎麾杜佑制分委戎輅作鎮孟津杜牧行李班册授銅符之律王緒制執節鈴以涖衆杜黄裳主持戎律削奪陳敬宣官制權握兵戎董昌制建牙統衆必藉雄才劉治制出統戎旃廣平集来帥熊羆四方作儀為戎臣師韓文本朝南渡諸路起兵有自稱統制者州縣管押勤王兵亦有稱統制者諸道都總管及諸司便宜差統制者建炎初並罷惟中都主兵朝廷差統制者仍舊紹興十一年韓世忠張俊岳飛除樞宻副使其兵馬就領所部統制官節制是年張俊發張憲事併岳飛賜死俊遂薦其將田師中掌故岳飛之兵又薦王徳住金陵於是並詔為御前都統制師中于鄂州徳于建康府駐劄野紀南按江三州都統司史無見考副都統史唐興元中置副都統唐書集自古軍制必有佐貳逮至漢氏亦循舊章既得將方俾參戎政實資謀策用正紀綱李徳裕夙以驍騎之鋒累佐元戎之斾徳裕行史憲討制副旌麾於戎閫常集辛景宗制參於戎副早參戎秩田承嗣元帥之任實屬于師貞佐軍之選諒資于邦傑李元弼宜副出車之命仍踐分麾之寵翊閫外而專征膺鑿門而受律並同本朝紹興中亦有副統制隆興二年詔應諸軍副都統制並罷乾道三年上謂宰執曰朕欲江上諸軍各置副都統制一員令兼軍事豈惟儲它日統制亦使諸將有所顧忌於是以郭剛為鎮江副都統制張榮為建康副都統制三省樞宻院定制云已復置在外副都統制俾贊主帥商議軍事覺察奸弊所有本司文字與都統連銜調發軍馬並聽都統指揮月旦亦許上表孝宗㑹要都幹集參戎作弼文選楊荆州昔事前軍幕古詩參務戎旃白集軍府之要掌在賔僚路貫制班固傅毅之徒皆置於戎幕以典文章李文饒出官府廷乃佐戎幕韓文初試佐戎祭馬捴文因効策于戎幕衛伯玉制庇身戎幕文粹營開楊柳幕展芙蓉四六集本朝都統制僚屬有計議官一貟主管機宜文字二貟武昌志都總管副總管史長孫晟為秦州道行軍總管出討突厥有達官來降言突厥大畏長孫總管聞其弓聲可謂霹靂見其走馬稱為閃電髙祖詔黎州總管徐世勣本自黎陽擁徒歸順任以藩岳誠效克彰張士貴貞觀中為龔州道行軍總管太宗以其冒矢石先登勞之曰甞聞以忠報國者不顧身於公見之李靖為定襄道行軍總管率勁騎三千由馬邑趣惡楊嶺頡利可汗大驚太宗曰靖以騎三千蹀血敵庭遂取定襄古未有輩薛萬均為沃沮道行軍總管從李靖討吐谷渾斬數千級勇蓋三軍李大亮為河東道大總管出北道與敵遇蜀渾山大戰破之俘其名王並唐書傳記魏黄初始置都督諸州軍事後周改為總管隋文帝以并益荆揚四州置大總管其餘總管府置于諸州列為上中下三等加使持節煬帝改帥都督為旅帥唐諸州復有總管亦加使持節通典武徳初邊要之地亦置摘竒本朝馬歩軍都總管以節度使充副總管以觀察以下充有止一州者有數州為一路者有帶兩路三路者或文臣知州則管軍勾馬事舊相重臣亦為都總管咸平廢三路都總管景徳詔鎮定兩路併為一路諸路並去行營之名止為駐泊總管慶歴三年詔近分陜西縁邊為四路各置經畧安撫招討等使自今路分總管鈐轄以上許與都總管司同議軍事路分都監以下並聽都總管等節制違者以軍法論七年析河北四路各置都總管一貟如無事止以安撫使總制諸路八年諸州部置並改總管軍馬總管副總管分紀建炎元年李綱言守備當于沿河沿淮沿江置帥府要郡以控扼其帥府文臣一貟帶安撫使馬歩軍都總管武臣一貟充副總管改路分為副總管紹興二年要郡守臣罷帶兵職諸路副總管可依舊充路分鈐轄五年詔兩浙江南荆湖福建廣東可依三路置總管于帥府七年淮東置總管十二年諸路並置州總管一貟㑹要淳化間以參政趙昌言為川陜兩路兵馬都總管命招討蜀寇仍御札數幅授以方畧景徳以王欽若判天雄軍兼都總管初帝曰天雄且為重鎮思得熟識機宜行事果斷者蒞之於是欽若請行分紀狄青京師呼為狄天使授涇原路兵馬副總管令圖像以進上觀其儀表曰朕之關張也於是有狄萬人之稱天聖七年劉平上封事言趙元昊必為邊患授邠寧環慶副都總管遣中人就賜黄金一器景祐四年以御製神武秘畧賜沿邊總管鈐轄熙寧五年以燕達權發遣環慶路駐泊總管達有戰功故自鈐轄躐遷然以資淺故令權發遣權發遣自達始也實録總管鈐轄司掌總治軍旅屯戍營防守禦之政令凡符兵𨽻屬者訓練教閱之事皆掌之續㑹要都鈐轄鈐轄本朝國初以朝官及諸司使以上充或一州或一路或兩三路嘉祐詔内臣為鈐轄都監者逐路止置一貟分紀官髙資深者稱都鈐轄官卑資淺者稱鈐轄續㑹要建炎三年要郡守臣兼兵鈐轄以武臣為之副改諸路都監為副鈐轄紹興三年守臣罷兼兵職副鈐轄改為路分都監而帥府如故二十八年鎮江守楊揆言舊法一路分鈐轄一州則有州鈐轄如常秀平江皆有之獨鎮江闕欲添置州鈐轄從之中興㑹要祥符中涇原路都鈐轄曹常乞别差人知渭州臣一面管勾鈐轄司事帝謂王欽若曰邊防軍馬所屯之地若别置知州即各生事可降詔諭以此意職畧曹瑋為環慶路鈐轄帝出其所上涇原環慶兩道圖以示輔臣曰華戎山川戰守之要盡在是矣同上賜御製神武秘畧治平元年以内侍省押班王昭明為環慶路鈐轄帶御器械李若愚為涇原路鈐轄前世以官人預邊事而將帥不盡其用及有是命人不以為便也後卒罷之實録出總州兵孔彦舟制遙剖兵符出鈐尺籍胡文恭草童貫詔往位兵鈐綦史宣制就司鈐䕶余靖制參委戎鈐王興制往涖戎政之重公是劉貽孫制訓齊軍政宣明國威柳渉制兵馬都監本朝兵馬都監有路分掌本路禁旅屯戍邊防訓練之政令以肅清所部建炎三年以要郡守臣帶本路兵馬都監武臣一貟充副都監中興㑹要紹興三年罷守臣兼兵職而副都監如故同上睠典戎之臣任以䕶兵胡文恭諸路將官本朝神宗留意武備本以捍西北二敵而推其法于東南職畧陜西諸路四十二將河北東路三十七將而東南纔十三將淮南東第一西路第二兩浙西路第三東路第四江南東路第五西路第六荆湖北路第七南路潭州第八全邵永三州備廣西應援第九福建第十廣東路第十一西路桂州第十二邕州第十三實録諸路將各有正副中軍行圖陣隊調發賞罰皆闗決于將副宣和詔元祐元年司馬光請盡罷諸路將官樞宻院難之止詔都路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一貟兼本州都監其單將駐劄處勿復差兼宣和五年御筆諸路將副部隊自今並依元豐法選差㑹要乾道四年詔諸州各置凖備將一貟專一管轄日逐訓練揀中弓弩事藝孝宗㑹要諸路將官掌統制所𨽻禁旅以行陣隊伍金鼔旗幟弓矢擊刺之法而教習訓練之别其武藝精強者待次遷補以激勸士卒凡兵仗器甲之數廩禄犒設賞罰約束之禁令皆掌焉副將為之貳續㑹要熙寧初詔求將帥近臣以劉舜卿名聞命總京東九郡將兵訓之三年詔以所部軍閱于内殿神宗歎曰坐作有度其可用也本傳王祖道請宻下諸路經畧監司體量將副第人才為三等職畧太守史漢文帝初與郡守為銅虎符竹使符符合乃聽受之以代古之珪璋史記二千石皆皁蓋朱幡續漢志季布為河東守上曰河東吾股肱郡文翁為蜀郡守起學成都市至今巴蜀好文雅文翁之化也汲黯為東海太守治官理民好清靜黯多病臥閤内不出嵗餘東海大治召信臣為南陽太守興水利吏民信愛號為召父武帝謂朱買臣曰衣錦還鄉遂除㑹稽太守宣帝時渤海嵗饑盜起上選能治者以龔遂為渤海太守召見謂曰君欲何以息其盜賊對曰海瀕遐逺不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜弄兵于潢池中耳今欲使臣勝之耶將安之也上曰選用賢良固欲安之遂曰治亂民猶治亂繩不可急也願得便宜從事上許焉至渤海悉罷捕逐盜賊吏諸持田器者皆為良民吏毋得問持兵器者乃為盜賊遂單車獨行至府盜賊即時解散乃開倉廩假貧民勸民務農桑民有帶刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢黄霸為潁川太守布宣詔令勸務耕桑甞欲有所伺察擇吏遣行屬令周宻吏出食于道旁烏攫其肉後還謁霸勞之曰甚苦食于道旁乃為烏所盜肉吏大驚咸稱神明霸外寛内明得吏民心戸口嵗増治為天下第一韓延夀為東郡太守斷獄大減為天下最入守左馮翊民有昆弟相與訟田延夀傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟傷殘風化是日移病不聽事於是昆弟遜謝不敢復爭延夀恩信周徧二十四縣莫復以辭訟自言者嚴延年為河南太守號曰屠伯延年母從東海來適見報囚大驚遂不肯入府延年出謁母因數責延年曰幸得備郡守專治千里不聞仁愛教化顧乗刑罰多殺人豈為民父母意哉朱邑遷北海太守以治為天下第一尹翁歸拜東海太守東海豪許仲孫為姦猾郡中苦之翁歸至論仲孫棄市一郡股栗莫敢犯禁何武為兖州刺史徙京兆所居無赫赫名去後常見思蕭望之子育為南郡太守上以育耆舊名臣之子乃以三公使車載育入殿守並前漢本傳光武定河内難其守鄧禹曰寇恂有牧人御衆之才乃拜恂河内太守潁川盜賊羣起車駕南征恂從至潁川盜賊悉降百姓遮道曰願從陛下復借寇君一年杜詩為南陽太守性節儉而政治清平南陽為之語曰前有召父後有杜母潁川盜起召郭伋拜潁川太守帝勞曰賢能太守去帝城不逺河潤九里冀京師蒙福郭伋在并州素結恩徳及復入界童兒數百騎竹馬迎于道路張堪拜漁陽太守開稻田八十餘頃百姓歌之曰桑無附枝麥秀兩岐張君為政樂不可支侯霸為臨淮太守被召百姓攀轅臥轍岑熙遷魏郡太守無為而化輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂鮑徳為南陽太守號為神父宋均為九江太守郡多暴虎常設檻穽均至去檻穽虎相為東渡河而去廉范遷蜀郡太守舊制禁民夜作以防火災范乃削先令百姓歌曰廉叔度來何暮不禁火民安作昔無襦今五袴劉寛拜南陽太守温仁多恕吏人有過但以蒲鞭撻之示辱而已朱暉為臨淮太守吏人歌曰強直自遂南陽朱季吏畏其威民服其恵劉寵為㑹稽太守召為将作匠山隂老叟人齎百錢以送曰自明府下車狗不夜吠民不見吏今聞棄去故自扶送寵為人選一大錢受之孟甞遷合浦太守郡不産穀而海出珠與交趾常通商販貨糴糧先守多貪穢珠漸徙于交趾界商旅不至甞革商前弊求民利病未經嵗珠復還稱為神明李元禮祖父修生子亮叔訓秀號四龍俱為牧守劉昆前任江陵反風滅火復守𢎞農虎北渡河楊震為東萊太守故人王宻懐金遺之曰暮夜無知者曰天知神知子知我知宻愧而出楊震為涿郡太守或勸開産業震曰使後世稱為清白吏子孫以此遺之不亦可乎陳蕃為豫章太守不接賔客唯徐穉來特設一榻去則懸之並後漢王衍為青州弟澄為荆州弟敦謂衍曰荆有江漢之固青有附海之險卿二人在外而吾留于此足以為三窟矣劉宏為荆州刺史每手書郡國丁寧疑宻咸曰將劉公一尺書賢於十部從事並晉書顔延之為永嘉太守甚怨憤作五君詠於阮咸曰屢薦不入朝一麾乃出守南史周太祖除裴俠為河北郡守命俠立謂牧守曰俠清謹奉公為天下最衆有如俠者可與俱立衆無應者朝野號獨立使君北史姜謩以平薛仁杲拜秦州刺史髙祖曰衣錦還鄉古人所尚今以本州相授唐書陽城為道州刺史觀察使當上考功第城自署曰撫字心勞催科政拙考下下姚元崇牧荆州受代民擁馬首遮道不肯去乗馬鞭􅌱民皆截留之賈敦頤為洛州刺史百姓共立碑及弟敦實為長史復刻石頌美於兄碑之側時人號為棠棣碑袁滋為華州刺史召拜大將軍耆老遮道不得進楊於陵代之宣言曰於陵不敢易袁公之政李正己反徳宗以張萬福為濠州刺史謂曰朕以江淮草木知卿威名陸長源為汝州刺史清白自將去汝州送車二乗曰吾祖罷魏州有車一乗而圗書半之吾愧不及先人云並同上後唐長興元年給事中崔衍奏當省給納諸州二銅魚一隻長留内庫一在本州庫新除刺史請領左魚到州集官吏取州庫右魚契合即遣差人送左魚納省五代史傳記郡守秦官秩二千石漢景帝更名太守王莾改名大尹晉郡守皆加將軍後魏初郡置三太守北齊制郡為上中下三等後周郡太守各以户多少定品命隋因北齊九等之制唐武徳改為州刺史加號持節天寶改為郡太守開元中定天下州府自京都及都督䕶府之外以近畿為四輔餘為六雄十望十𦂳及上中下之差至徳後諸州始各有州鎮刺史皆加團練使故其任重矣通典集今之郡守縣令民之師帥所使承流而宣化也董策古者參用名儒典領大郡本經術以濟事參禮法以訓人居一州之表為千里之師潁川有封侯之賞膠東有璽書之勞常集賈琮以最于十二州頒之以璽書黄霸以用于二千石寵之以侯印韋處原對䇿今之郡守古侯伯也於吏有君臣之道焉於人有父母之道焉白集得不思勤儉教導勞來安輯膏雨吾土襦袴吾人者乎楊潛制于時州宰髙季通秩映隼旟榮參熊軾徐游藝碑州將李憬閔河承寄以廉能居課最之先顔元孫制丈夫官至刺史亦榮矣韓文斂此大恵施于一方無疾其驅天子有詔嵗㑹課第甲於他州白集亟分符宇于頔制俾從竹使之權王愽制恵露霑呉仁風扇越昭王碑寵冠列藩越敷邦教禇淵碑廊廟之具裴施州宿昔一逢無比流金鐘大鏞在東序冰壺玉衡懸清秋堯有四岳明至理漢二千石眞分憂杜甫寄裴施州人生五馬貴莫受二毛侵送賈汝州京兆先時傑琳琅照一門送鮮于萬州東藩駐皁蓋李邕宴使君騎紫馬捧擁從西來與張留後酒酣誇新尹蓄眼未見有感此氣揚揚須知風化首遭田父泥飲美嚴中丞清髙金莖露正直朱絲絃昔在堯四岳今之黄潁川贈李勉幾分漢庭竹贈李邕刺史諸侯貴郎官列宿應寄劉峽卿卿月昇金掌王春度玉墀送馬大卿分符先令望同舎亦輝光送韋貟外鵬圖仍矯翼熊軾且移輪贈蕭使君北風隨爽氣南斗避文星送季大夫燕寢凝清香兵衛森畫㦸韋蘇州文石陛前辭聖主碧雲天外作冥鴻杜牧鴛鷺差池出建章綵旗朱户鬱相望新恩共理犬牙地昨日同含雞舌香劉禹錫本朝分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉職畧其後文武官參為知軍州事二品以上及帶中書樞宻院宣徽使職事稱判㑹要太守掌總理郡政宣布教條導民以善而糾其姦慝嵗時勸課農桑旌别考第其賦役錢穀獄訟之事兵民之政皆總焉察郡吏徳義材能而保任之若疲軟不任事或姦貪冒法則按劾以聞遇水旱以法賑濟安集流亡無使失所四朝志建炎詔要郡帶本路兵馬鈐轄次要郡帶本路兵馬都監紹興三年罷五年令郡守除授罷任並令上殿九年令郡守並帶提舉學士乾道二年令不任守臣不為郎淳熙中罷帶主管學士中興㑹要張中庸知津州民號為水晶燈籠分紀淳化中何承矩知滄州徙雄州賜御書印紙録其課最仍賜内府弓劍同上王祐知大名太祖謂曰此卿之故鄉所謂晝錦者也職畧太宗謂宰相曰刺史之任最為親切非其人則下受其弊杜衍知乾州命攝治鳯翔二州之民爭于境上乾之民曰天子令杜公撫我彼州之民何可得之鳯翔之民曰今為我公矣汝何有焉並同上分握符書臨長藩服胡文恭制畫鳯仙瀛逺塗雄郡閣開注云塗雄用黄堂事也平江州治因春申君故居塗以雄黄故曰黄堂送王滁州詩沿邊太守史李廣為上谷太守數與匈奴戰材氣天下無雙李廣為右北平太守匈奴號曰飛將軍也避之數嵗不入界郅都為鴈門太守匈奴素聞其節竟都死不近鴈門匈奴至為木偶人像都令共射之莫能中其見憚如此魏尚守雲中匈奴逺避不敢近塞並漢書崔寔為五原太守敵不敢犯常為邊最廉范為雲中太守匈奴不敢犯雲中祭彤為遼東太守邊境肅靜並後漢士燮為交趾太守二十餘年疆場無事呉志羊祜都督荆州朝廷委以方鎮之事祜招攜以禮懐逺以徳呉人恱東晉書李勣治并州太宗曰煬帝不擇人守邊勞中國築長城以備敵今我用勣守并賢長城逺矣唐書傳記桓階為趙郡太守上曰北邊未靖以卿威能震敵徳懐逺人故以相煩漢紀集西川曰益部地有險府有兵礙戎屏華號為難理白集本朝沿邊州郡或當一道衝要者並兼兵馬鈐轄巡檢都監或帶沿邊安撫提轄兵甲沿邊溪谷都巡檢餘州事則否職畧治平三年陸說知延州入見上問當何以施為對曰邊事不可遙度候臣到察審有所見當畫一條奏蔡挺在渭乆鬱鬱不自聊寓意樂府詞有玉闗人老之歎中使至則使倡優歌之達于禁掖天子愍焉遂有樞府之拜四朝史出總邊瑣公是行陳旭制通判史黄霸為刺史詔賜車蓋髙一丈别駕車緹油屏泥于軾前以彰有徳漢書周景辟陳蕃為别駕蕃不就景題駕輿曰陳仲舉坐不復更辟蕃起就職趙温為京兆郎丞嘆曰丈夫當雄飛不當雌伏後漢書龎統守萊陽令不治免官魯肅遺先主書曰龎士元非百里之才使處治中别駕之任始當展其驥足耳蜀志吕䖍有佩刀工相之以為必登三公可服此刀䖍語别駕王祥曰茍非其人刀或有害卿有公輔之量故以相與王祥為徐州别駕糾合義衆州境獲寧人歌之曰海沂之康實賴王祥邦國不空别駕之功桓温辟謝奕為安西司馬奕在温坐岸幘談詠曰我方為司馬也習鑿齒吏才不常桓温深器之用為荆州治中别駕謝牋曰不遇明公荆州從事耳庾亮與郭游書曰别駕舊與刺史同乗流王化于萬里之外任居刺史之半安可非其人並晉書趙執别本作張執為齊州别駕有能名詔徴入朝父老揮涕隨逐曰公清如水請酌一盃水奉餞執受飲之隋書孔昌寓貞觀中對策髙第歴魏州司馬帝為不置刺史為政三年璽書褒美唐書崔神慶則天時擢拜并州長史因謂之曰并州朕之枌榆又有軍馬比日簡擇無如卿者武后求宰相狄仁傑曰荆州長史張柬之其人雖老宰相才也堂吏朱儉為别駕給事中蕭倣駁曰别駕古為治中從事任居刺史之半豈宜以人吏兼副政之名大厯十二年制曰刺史有故及闕本道使不得差攝但令上佐知州事姚崇為揚州長史政條簡肅人為紀徳于碑並同上傳記秦置郡丞以佐守在邊為長史掌兵馬漢因之于定國條州大小為設吏貟治中别駕諸郡從事秩六百石晉因之而省郡丞宋梁以下如之至隋改别駕治中為長史司馬煬帝罷之而置郡贊治後又改為丞位在通守下至唐而郡丞廢矣有長史有别駕别駕以皇族為之開元始通用庶姓以貳都督刺史之職通典漢制從事史一人從刺史行部别乗一乗故謂之别駕孔恂為别駕别駕車舊有屏星如刺史車刺史怒欲去之恂曰撤去屏星毀國舊儀别駕可去屏星不可去蕭遘貶播州司馬道二峽方迫畏不瞑遽有神人曰相公勿憂予為公禦侮遘異之過峽州經白帝祠即所見神人也同上集江州土髙氣清富有佳境刺史守土不逺觀遊郡吏執事不自暇佚惟司馬綽綽可以從容于山水詩酒間於是郡南樓山北樓水湓亭百花亭風篁石岩瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志于吏隠者捨此官何求焉貳藩有職方題别駕與贊郡符才優佐郡大邦端佐並白集半刺上佐得與二千石參校政事短長利病者也杜牧行馬逥制通倅之官朱廣平集通理方州題政佐岳無轉驥之能子昻代表半刺已翺翔杜詩爽氣金天豁清談玉露摶佇鳴南岳鳯欲化北溟鵾贈虞司馬案牘來時惟署字風煙入興便成章劉禹錫本朝藝祖懲五代藩鎮之弊始置諸州通判建隆四年詔知府公事並湏長史通判僉議連書方許行下時大郡置兩貟餘置一貟州不及萬户不置正刺史以上及諸司副使知州者雖小郡亦特置掌倅貳郡政與長史均禮凡兵民錢穀戸口賦稅獄訟聽斷之事可否裁決與守通簽所部官有善否得刺舉以聞四朝志宣和二年詔諸州茶鹽香礬並委通判建炎初諸州通判二貟處減一貟紹興以後施行申請添置㑹要國初設通判以貳州事故常與知州爭權每聞我是監郡朝廷使我來監汝舉動為其所制有錢昆者餘杭人嗜蟹甞求補外郡人問其所欲昆曰但得有螃蟹無通判處則可至今以為口實歸田録知成都廣益奏云州郡置倅所以佐郡守之治入則貳政出則按縣中興㑹要分乗倅車文恭制分駕别車世南制分倅州治陳湜制欲問君王乞符竹但憂無蟹有監州坡詩教授經師嚴然後道尊禮記善待問者如撞鍾叩之以小則小鳴叩之以大則大鳴待其從容然後盡其聲同上史漢郡國有文學文翁起學成都市招下學子弟以為學官弟子武帝時天下郡國皆立學設教官平帝時郡國曰學侯國曰校置經師一人鄉曰庠聚曰序置孝經師一人匡衡補平原文學學者多衡經明當世少雙並漢書光武問武臣曰請卿自度爵禄何所至也鄧禹曰臣少甞學問可郡文學同上傳記魏晉以下郡國並有文學即博士助教之任六典隋潘徽為博士唐府郡置經學士各一人掌以五經教授開元二十六年敇州縣置學仍擇師資令其教授職源集諸公衮衮登臺省廣文先生官獨冷甲第紛紛饜梁肉廣文先生飯不足杜詩本朝慶厯四年詔諸路州軍監各令立學又置教授以經術行藝訓導諸生掌其課試之事而糾正不如規者當時或用兼官或舉士人委于曹司而未𨽻朝廷也熙寧六年詔諸路學官並委中書門下選差至是始命於朝廷矣㑹要建炎教授並罷紹興復置四十二州若試教官則始于元豐添差教授則始于政和慶厯三年臣察言本朝學校興矣未甞設官在泮采芹典教以重其任崇寧四年令教授承務郎以上在本州簽判上選人在本州職官之上政和五年臣寮言見任教授不得為人撰書啓簡牘樂語之類鄒浩調陽州潁昌府教授吕公著范純仁為守獨加禮重純仁常屬撰樂語辭不為純仁曰翰林學士亦作此浩曰翰林學士則可祭酒司業則不可四朝史任諒為懐州教授徽宗見其所作新學碑曰文士也擢提舉蘷路學事紹興十三年宋宙奏乞盡復教官上曰教授須逐州置仍須是擇通經心術正者為之若教官非其人士人心術一壊再整頓費力切宜遴選也宗子師閔訟臨安教授鮑同上曰為教授者須先正己然後可以率人十八年上曰選官教導乃治化本源將來三塲科舉亦有人才以備采擇十八年詔諸州教授並不許差兼他職教授之為職可謂難矣何也曰教授者以天子之命教其邦人凡邦之士廩食縣官而充弟子貟者多至五六百餘少不下百十數皆惟教授者是師其必有以率厲化服之使躬問學蹈繩矩出入不悖所聞然後為稱是可不為難矣哉又先聖先師之典祀廟學圖書服器之藏其體至重下至金穀出内之纎悉亦皆獨任之嗚呼是誠難矣然凡仕於今者無大小莫不有所臨制統攝獨教授官雖有統攝若其任之本諸身者則非簿書期㑹之所能察至其具於有司而可考者上之人又以其儒官優容之雖有不合不問以是為便故今之仕者反利焉而喜為之而孰知所以充其任者如彼其難哉朱文公序記纂淵海卷三十四
