body:
  text: 記纂淵海卷三十八宋潘自牧撰學校部學校經漢室龍興開設學校書序子衿刺學校廢也亂世則學校不修焉詩序有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠記王制米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也泮宫周學也明堂位凡入學以齒文王世子古之教者家有塾黨有庠術有序國有學學記子謹庠序之教申之以孝悌之義孟子設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也同上立太學設庠序修六禮明教所以導之也荀子校學以教之揚子史漢髙祖喟然興於學然尚有干戈亦未遑庠序之事也前儒林傳序成帝朝劉向説上宜設庠序陳禮樂隆雅頌之聲盛揖遜之容以風化天下禮樂志聖主設庠序以教之里有序而鄉有庠序以明教庠以行禮而觀化焉食貨志服儒衣稱先生遊庠序聚黌塾者蓋布之邦學矣後儒林傳論謂光武明帝養三老五更於辟雍然徳化未流洽者以庠序尚未之設故也禮樂志古之建國有明堂辟雍之制鄉有庠序學校之儀皆所以抽導幽滯啓廣才思晉戴邈上疏風化之本在於正人倫人倫之正在乎設庠序庠序之設五教明徳禮洽通彛倫攸叙王導上書昔之明王建庠序於京畿立學校於羣邑見李訢傳延集英儒廣開學校用能闡道義於八荒布盛徳於中國鄭道昭傳崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海髙允傳京邑達乎四方皆啔黌校齊魯趙魏學者尤多負笈從師不逺千里講誦之學道路不絶隋儒林傳永徽以來庠序諸生未聞甄異是奨勸之道未周也唐劉祥道疏元宗朝楊瑒奏國家啓庠序廣化導將有以用而勸進之本傳陸贄請視學校興廢以稽教導本傳傳記鄉曰庠庠者詳禮義也里曰序序者序長幼也白虎通集四海之内學校如林庠序盈門獻酬交錯爼豆莘莘下舞上歌蹈徳泳仁班東都賦歸私暫休假驅駕出庠黌相逢塵埃中相見盡嗟矜栁集本朝陳襄議學校之制以為先求賢徳之士以為師長百度可不勞而成言行録莫嫌學舎官閒冷歐陽公學者得佳士山谷太學經於論鼓鍾於樂辟雍詩靈臺鎬京辟雍文王有聲大司樂掌成均之法周禮天子曰辟雍記王制太學始教皮弁祭菜視敬道也宵雅肄三官其始也入學鼔篋孫其業也夏楚二物収其威也未卜禘不視學游其志也時觀而弗語存其心也幼者聴而弗問學不躐等也學記大學之教時教必有正業退息必有居學太學之禮雖詔於天子無北面所以尊師也並同上子太學曰槐市淮南子辟雍以本之揚子史願造太學修先王之道風行俗成萬世之基定前賈山傳至言太學者賢士之所闗也教化之本原也董仲舒傳對策其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始儒林傳序古之立太學將以傳先王之道流化於天下也漢書成帝紀劉向說上興辟雍以風化天下禮樂志太學者禮義之宫教化所興也後朱浮傳書聖王之建辟雍所以尊崇禮義既富而教之也張純傳議修起大學稽式古典籩豆千戚之容備之於列服方領習矩步者委蛇其中儒林傳記先帝立辟雍恢𢎞大道被之八極明帝紀詔辟雍禮得則太徴諸侯明晉志太宗天下初定增築學舎千二百區唐選本志鼓笥踵堂者八千餘人紆侈袂曳方履誾誾秩秩雖三代之盛所未聞也儒學傳序蕭昕請崇太學以植教本本傳古天子學曰辟雍以制言之壅水環繞如壁然以誼言之以禮樂明和天下云爾在禮為澤宫故前世或曰壁池或曰壁沼亦言學省請以國子監為辟雍省歸崇敬傳議國庠雖設冠履或濫裴抱傳制䇿殄趨競之風勵生徒之制子衿之什不作棫樸之詠有聞同上葺國學振儒風牛僧儒制策太學明教之源也宗策圜水為辟雍古之制也張齊賢傳傳記辟雍天子饗飲處也流轉王道周而復始說文辟積也積天下之道徳也雍壅也壅天下之殘賊也白虎通王者作圎池如壁形實水其中以圜雍之桓譚新論辟雍水四周於外象四海也三輔决録集辟雍海流道徳之富班東都賦乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑皇儀孝友孔明辟雍詩春日載陽合射辟雍張東京賦講曲禮於辟雍曽植七啓兩學齊列雙字如一名延國胄左納良逸辟雍嵓嵓規圎矩方階序牖闥雙觀四張流水湯湯造舟為梁學尤賦太學四年朝韲暮鹽韓文本朝熙寧四年中書門下言近制增廣太學益置生員其生貟分三等以初入學生貟為外舎不限貟自外舎升内舎内舎升上舎上舎以一百貟内舎以二百貟為限其生貟各治一經從所請之官講授至判官直講逐月考試到優等舉業並申約中書㑹要初建太學只有十齋曰服膺禔身習是守約存心允蹈養正持志率履誠意續置七齋曰觀化貫道務本果行謹信時中循理後又申請増置三齋曰節信經徳立禮共二十齋周學士上庠録紹興十三年熊彦逺乞依嘉祐治平故事監學生並給綾紙命詞詔從之言行録幸學經王親視學記王制食三老五更於太學天子􅃝而割牲執醬而饋執爵而酳記祭義史陛下尊敬先聖垂意古典堂室未飾干戈未休而先建太學造立黌舎比日車駕親臨享將以𢎞時雍之化也光武朝朱浮疏漢明帝永平二年二月臨辟雍初行大射禮十月幸辟雍初行養老禮本紀明帝即位盛清道之儀􅃝割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人其圜橋門而觀聽者葢億計儒林傳序晉武帝幸辟雍行鄉飲之禮賜太常博士學生帛本紀太宗幸太學觀釋菜命穎達講經畢上釋奠頌唐孔穎達傳集臨辟雍揚緝熙宣皇風班東都賦於乎辟雍辟雍沈沈天子所臨或弦或歌講古述今其徒八千纓弁森森貊穢羌髳咸詠徳音羽林孤兒亦垂青襟吕温虞世南贊本朝建隆二年帝幸國子監三年又再幸焉太平興國四年駕幸國子監端拱元年幸國子監謁文宣王廟淳化五年亦如之㑹要太宗幸國子監學官孫覺方聚徒講說帝詔覺講泰卦覺因述天地感通君臣相應之㫖帝甚悅同上紹興十四年幸太學命曽開講易百官内外舎人推恩有差復幸養正持志二齋顧覽生徒肄業之所今上嘉熙辛丑幸學講太學罷王荆公従祀詔濂溪明道伊川横渠晦翁五先生繪像於廡諸州縣學凖此邸報武學武成王廟附史開元十九年始置太公尚父廟以留侯張良配仲春秋中上戊祭之牲樂之制如文宣出師命將發日引辭於廟仍以古名將十人為十哲配饗上元元年尊太公為武成王以白起韓信諸葛亮李靖李勣列於左張良田穰苴孫臏吳起樂毅列於右以良為配唐書建中二年詔史館考定可配享者列古今名將六十四人圖形焉同上本朝孔子所以祀於學者禮有先聖先師故也自生民以來未有如孔子者豈太公得與之抗衡哉温公通鑑論建隆二年先是上臨幸武成王廟觀所畫名將指白起曰起殺已降不武命去之乃詔張昭竇儀髙錫等取歴代謀臣各將功業始終無瑕者配享㑹要四年詔曰武成王廟従祀神像齊相管仲宜塑像升於堂西河太守吳起宜畫像降於廡下㑹要大中祥符元年詔尚父宜加諡昭烈武成王慶厯三年詔置武學於武成王廟以阮逸為教授八月罷武學議者以為古名将如諸葛羊祜杜預裴度等豈甞專學孫吳立學無謂故也熙寧五年樞宻院言古者出師受成於學文武弛張其道一也洪惟仁祖甞建武學横議中輟識者悼之欲乞復置武學以追成先朝之志詔於武成王廟置學並同上胡翼之乞興武學講論語使知忠孝之道講孫吳使知制勝之術撰成武學規矩一卷時議難之言行録餘見武博武諭類宗學本朝兩漢宗室設學未聞唐初為皇族子孫别立小學而不及大學皇朝胄監之外復立宗學神宗基之哲宗繼之而最備於崇觀之時肆我寧考再興􅓺宇以迪天枝粹然之習炳然之文宜與帝王盛時同風宗學謝表訓迪天技培植化本之地自南渡草剏為屋數楹乃更化之十載規敞廢於増闢黌舎益聚四方之宗英而追琢之越二年四明羅君仲舒范君楷慨然有感於盛舉之不常見而念壯觀之不可缺也乃條其事以告有㫖遷睦親近屬之居與它所而盡拓故基以為學復増補貟定試額凡陞黜進退之制槩視太學宗學題名宗庠載闢用宏舊規所以昭崇睦廣教育也惟麟趾化行𤓰瓞綿茂雖資稟之攸厚必陶冶而後成俾繇選補著之於籍月書季攷一視賢闗文行相符矩矱是蹈庶益收得人之效强我王室尚其懋哉寧宗御書綾紙贊詞淳祐甲辰之冬皇上奮發英斷更新大化又明年以麟庠之胄苦隳肝膽力扶綱常於是赫奕奎章誕錫黌宇錫之束帛試之春官優之陞擢登科題名嘉定更新宗學置四齋曰貴仁大雅明賢立愛辛巳重廣學舎續添兩齋曰懐徳升俊小録州縣學經泮水頌僖公能修泮宫也思樂泮水薄采其芹思樂泮水薄采其藻魯侯戾止其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒詩既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚翩彼飛鴞集於泮林食我桑黮懐我好音並同上諸侯曰泮宫記王制鄭人游於鄉校以議執政之善否然明謂子産曰毁鄉校如何子産曰夫人朝夕退而㳺焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之左傳史文翁為蜀郡守選郡小吏開敏有才者十餘人遣詣京師受業博士數嵗皆成就還歸文翁以為右職又修起學宫於成都市中繇是大化蜀地學於京師者比齊魯焉武帝時乃令天下郡國皆立學校官漢書平帝詔郡國曰學縣道邑侯國曰校鄉曰庠聚曰序同上明帝永平二年郡縣道行鄉飲酒禮於學校後漢書鮑徳遷南陽太守時郡學乆廢徳乃修起黌舎備爼豆黼冕行禮奏樂諸儒百姓歎服本傳漢耿恭遷常山太守修學校教授不輟本傳寇恂拜汝南太守乃修鄉校教生徒本傳魏武帝令曰喪亂以來後生者不見仁義禮遜之風吾甚傷之其令郡國各修文學縣五百户置校官選其鄉之俊造而崇學之魏本紀虞博除河陽内史大修學校廣招學徒晉虞喜傳范寗在郡立鄉校教授常數百人由是江州人士並好經學范寗傳魏獻文帝時髙允表請郡國立學北史魏以郡國雖有學縣黨亦宜有之乃命縣立講學黨立教學村立小學同上唐開元二十六年敕州縣每鄉之内各置一學仍擇師資令其教授唐書李栖筠為常州刺史大起學校堂上書孝友傳以示諸生為鄉飲酒禮登髙降飲人人知勸本傳常衮為福建觀察使始閩人未知學校為設鄉校始作為文章親加講導由是風俗一變本傳倪若水為許州刺史興州縣學徒廬勸生徒身為教誨風化興行本傳傳記泮宫者明尊卑有差所化少也半於天子之宫也半者象璜也獨南面禮儀之方有水耳白虎通列槐樹數百行諸生朔望㑹此中雍雍揖遜論議槐下藝文類聚本朝國初未建州學乾興元年兖州守臣孫奭私建學舎聚生徒餘鎮未置學也景祐四年詔藩鎮始立學他州勿聽寶元元年穎州守臣蔡齊請立學時大郡始有學而小郡猶未置也慶歴詔諸路州軍監各令立學學者二百人以上許更置縣學於是州郡不置學者鮮矣㑹要安定先生胡瑗典湖學有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如邊防水利之類故天下謂湖學多秀彦家塾記始潮人未知學公命進士趙徳為之師東坡韓文公廟碑書院本朝太平興國二年知江州周述言廬山白鹿洞學徒常數百人望賜九經書使之録習詔從其請㑹要至道二年賜嵩陽書院額及刋本九經咸寧四年潭州守臣李允則奏嶽麓山書院修廣舎宇有書生六十餘人聽誦乞下國子監降釋文等書從之祥符二年應天府新建書院國初有戚同支者通五經業髙尚不仕聚徒教授詳驤郭承範董循陳與王礪滕涉皆其門人至是賜院額並同上此四書院外又有茅山書院石鼔書院安定書院鷺洲書院建安書院象山書院崇文書院蘆峯書院其餘不能盡録承皇后之嘉恵宅廬阜之南疆閔原田之告病惕農扈之非良粤冬孟之既望威余駕乎山之塘徑北原以東騖陟李氏之崇岡揆厥號之所繇得頽址於榛荒曰昔人之隠處至今永乆而流芳自昇元之有土始變塾而為庠儼衣冠與弦誦紾濟濟而洋洋朱文公白鹿洞賦偉章甫之峩峩抱遺經而來集豈顓眺聽之為娛實覬宫牆之可入曰明誠其兩進抑敬義其階立允莘摯之所懐謹卷顔之收執彼青紫之勢榮亦何心乎俛拾並同上記纂淵海卷三十八
