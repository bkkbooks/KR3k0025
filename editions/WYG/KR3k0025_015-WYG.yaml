body:
  text: 記纂淵海卷十五宋潘自牧撰郡縣部廣南東路廣州倚郭二外縣六南海清逺番禺増城懷集東筦新㑹香山清海軍節度廣東經略安撫司轉運司提舉司市舶司郡號番禺五羊南海清海東筦州沿革牽牛婺女之次越分野禹貢揚州之域春秋百越地秦漢南海郡東漢建安魚立交州尋廢之吳分立廣州晉為州治隋廢郡改番州大業復南海郡唐武德立廣州貞觀為都督府開元為嶺南道天寶為南海郡乾寧升清海軍五代南漢劉隠所有地理沿革表縣沿革南海本秦南海郡番禺縣地東漢交州吳廣州皆治此隋改番禺曰南海為州治唐因之五代劉隱分置咸寧常康二縣本朝省之番禺秦初置縣至隋改南海唐長安於江南洲上别置番禺分置郭下清逺本漢南海郡中宿縣地晉屬始興郡梁立西衡州改縣為清逺郡隋廢清逺為縣屬廣州増城本番禺縣地東漢初析置晉成帝分立東官郡宋齊仍屬南海隋廢郡以縣屬廣州懷集本漢南海郡四㑹縣地又蒼梧郡封陽地晉於四㑹地置懷化縣屬新㑹郡宋齊屬南海齊於封陽地置洊安縣隋省二縣後復置懷集縣屬廣州唐武德立威州並置興平霍清威成三縣貞觀州廢省三縣入懷集又置洊安縣開元省永固縣入懷集至德改洊安為洊水本朝省之東筦本漢博羅縣地隋置寶安屬番州唐至德更今名屬廣州新㑹本漢番禺縣地晉恭帝置新㑹縣及郡隋廢郡為封州改允州又改岡州大業州廢屬南海郡唐武德岡州析置封平封樂復二縣正觀州縣並廢尋復立岡州開元州廢以新㑹屬廣州香山本香山鎭在唐南海番禺東筦新㑹之境本朝昇縣地理沿革表形勝番山在南禺山在北金山在新㑹寶山在東筦亷山在清逺西貪泉在番禺西崑山在新㑹上有天井崙山在新㑹有白龍池浴日亭在扶胥鎮南連天觀在提舉司五羊城在南海縣昔有五仙人騎五色羊至此九龍泉在白雲山琵琶洲在南海東珊瑚洲在東筦南珊瑚井在浮丘山鳯凰岩在東筦鷓鴣峰在増城輿地紀勝人物唐區丹從學韓文公五代何澤為洛陽令諫唐莊宗好獵羅威事母至孝黄舒事母至孝人目其居曰參里二人未詳其是何朝代皇朝馮元中甲科能通五經輿地紀勝集番禺軍府盛欲說暫停杯盖海旗幢出連天觀閣開衙時龍戸集上日馬人來風静鶢鶋隐官亷蚌蛤回韓文縣樓重蜃氣邑里襍鮫人海暗三山雨江明五嶺春岑參霧遶龍川暗山連象郡遥劉長卿連天浪静長鯨息映日颿多寶舶來劉禹錫五羊城在蜃樓邉墨綬縋腰正少年山静不應聞屈鳥草深從使翳貪泉皮日休居人愛近沉珠浦候吏多來拾翠洲陸龜蒙番禺萬里路逺客片㠶過盛府依横海荒祠拜伏波劉文房本朝開寳五年省咸寧當康二縣入南海廢番禺省洊水入懷集廢東筦入增城六年復置東筦皇祐三年復置番禺縣紹興二十二年升香山鎮為縣沿革表千年日照珍珠市萬瓦烟生碧玉城山海是為中國藏梯航尤見外夷情程師孟客聽潮鷄迷早夜人瞻􅄓母識隂晴同上番禺二月尾落花已無春惟有薔薇水衣襟四時薰郭詳正岸邉天影随潮入樓上春容帶雨來陳與義韶州倚郭一外縣五曲江翁源樂昌仁化福建乳源廣東路提刑司郡號曲江始興韶石廣興武溪州沿革星土同廣州春秋百越地戰國屬楚秦南海郡地漢桂陽郡地吳分立始興郡屬交州宋改廣興郡齊復始興梁蕭勃置東衡州隋開皇改韶州十一年廢入廣州唐武德立番州尋改東衡州貞觀曰韶州屬嶺南道天寶曰始興郡五代盧光稠據之後入南漢地理沿革表縣沿革曲江縣漢屬桂陽郡吳屬始興晉為郡治隋初置韶州後屬南海郡唐韶州治翁源本漢湞陽縣地梁蕭勃分置翁源縣陳又立清逺郡屬廣州隋廢郡尋省之唐武德復置屬洭州貞觀州廢來屬樂昌本漢曲江縣地梁置梁花縣又分置平石縣隋省平石氏梁花屬廣州後更今名唐武德來屬仁化本漢曲江縣地唐垂拱析置屬廣州後來屬福建本曲江翁源地本朝析置乳源本曲江樂昌地本朝析置地理沿革表形勝浮山在州東北躡之地動曲江乃湞水武水合而曲抱州域芙蓉峰在州西蓮花山在州南松𣲖水在翁源棃溪水在曲江寶石山在州南錦石岩錦石溪在仁化越王山在州北天王嶺在南峰山下靈池在山翁源靈溪水靈君山在樂昌曹溪宣溪靈溪水皆在曲江吳溪水在仁化韶石在曲江二石相峙如雙閭昌山在樂昌有竒石輿地紀勝人物唐張九齡名相號曲江公皇朝余静以直諫著名王陶官至度支郎中五子應舉三人一榜中選蕭雅蕭雄蕭維兄弟俱𨽻上庠登第鄧戡子堂孫弼三世登第譚必應童子舉輿地紀勝集交趾丹砂重韶州白葛輕杜甫炎海韶州牧風流漢署郎同上送韋員外曲江山水聞來乆恐不知名訪倍難願借圗經將入界毎逢佳處便開看韓文南行踰六旬始下樂昌瀧惡不可言狀船石相衝撞同上行舟傍越岑窈窕越溪深水闇先秋冷山晴當晝隂張曲江本朝開寶五年省仁化入樂昌咸平復置崇寧元年以岺水塲置福建縣乾道二年置乳源縣沿革表韶州南國鎮靈蹤傳自曩雙闕倚天秀一逕尋雲上余靖沄沄曲江水天借九秋色樓臺飛半空秀氣盤韶石王介甫首參虞舜叩韶石次謁六祖登南華東坡羣岑合勢曲江頭二水交流夾一州地有九㠜清淑氣人無五嶺鬱蒸愁譚太𫝊肇慶府倚郭一外縣一髙要四㑹肇慶軍節度郡號信女髙要端溪四㑹興慶府沿革星土同廣州春秋百越地秦南海郡地漢蒼梧郡地宋齊屬南海陳立髙要郡隋廢郡立端州大業信女安郡唐端州屬嶺南道五代南海所有地理沿革表縣沿革髙要屬蒼梧郡晉置平興縣屬新寧郡宋齊屬南海又置平興郡梁又置梁秦縣及郡陳立髙要郡隋端州置髙要縣改梁秦省入平興為清泰又置博林縣唐武德尋復置清泰貞觀省博林入髙要省清泰入平興本朝並省平興四㑹秦初置縣漢屬南海郡宋分置化蒙縣屬綏建郡隋二縣屬廣州唐武德立南綏州二縣屬焉觀更名湞州州廢屬廣州本朝省化蒙入四㑹來屬地理沿革表形勝石室山在髙要又名嵩臺山號神仙下都石澗山在四㑹爛柯山在髙要老香山在廢平興縣西端溪山有五色香水端溪水在髙要龍子嶺獅子岡鳯頭岡在四㑹牛鼻山在始昌端溪子石硯可値千金有赤白黄色㸃者謂之鸜鵒眼脉理黄者謂之金線紋輿地紀勝人物皇朝梁順孫兩貢辟雍第譚維寅中梁榜乙科黄執矩從胡致堂張南軒遊輿地紀勝集端州石匠巧如神踏闕磨刀割紫雲李賀端州江口連雲處始信哀猿傷客心李紳本朝元符三年升興慶軍節度政和升興慶府重和改肇慶府肇慶軍開寶五年省平興縣入髙要六年省化蒙縣入四㑹熈寧六年以四㑹屬端州沿革表包孝肅守端州嵗滿不持一硯歸言行録知君今向端溪去願助清風泛怒濤朝僧贈陳堯叟端州正在雙峽間石室嵩臺壓孤壘郭祥正新江自南來西與端江匯屹然鵠奔亭遺音垂千載同上德慶府倚郭一外縣一端溪瀧水永慶軍節度郡號端山開陽瀧水晉康靈陽羅田府沿革牛女分野春秋百越地秦屬南海郡漢屬蒼梧郡晉穆帝分立晉康郡梁别立開陽等郡置雙州隋廢諸郡屬端州大業改雙州為瀧州州廢屬信安永熈二郡唐武德立瀧又立南康州尋廢貞觀置康州天寶曰晉康郡瀧州曰開陽郡並屬嶺南道五代南溪所有地理沿革表縣沿革端溪縣屬漢蒼梧郡晉立晉康郡宋又置樂城都城安遂三縣梁置建州廣熈郡於安遂縣隋端溪樂城並屬端州信安郡都城縣屬蒼梧郡安遂縣屬永熈郡唐武德立南康州治端溪省端州之撫納入焉至德改安遂曰晉康與樂城都城皆屬康州後改樂城曰恱城本朝省諸縣入端溪瀧水本端溪縣地宋置永熈縣梁置開陽平原羅陽三郡三縣隋廢三郡以三縣屬瀧州開皇改平原曰瀧水羅陽曰正義又置安南縣大業以瀧水立永熈郡而省開陽正義入焉又省永安入永熈唐武德立瀧州復置開陽正義尋省正義又析置安南與永熈屬南建州五年更永熈曰永寧貞觀改南建曰藥州州廢以南安永寧屬瀧州天寶改永寧曰建水至德改安南曰鎮南本朝省諸縣入瀧水地理沿革表形勝思耆山在端溪縣思容水思㑹洞在瀧水髙良山平定山在端溪正儀洞在瀧水靈溪水碌溪水在端溪靈陽山在瀧水三洲巖在端溪三􅀢石一名三奠石雲卓洞雲際山在瀧水輿地紀勝集與子避地西康州洞庭相逢十二秋杜甫本朝開寶五年廢康州入端州省恱城晉康都城三縣入端溪屬端州尋復置康州治端溪縣六年廢瀧州入康州省建水鎮南開陽三縣入瀧州屬焉隆興初德慶府沿革表岩岩清峙指仙洞之宛然皓皓恩波與䍧江而共逺余崇龜賀余守居東廣之上游為中興之濳邸同上英德府倚郭一外縣一真陽浛光郡號臯石浛光真陽府沿革牛女分野春秋百越地戰國屬楚秦南海郡地漢屬桂陽郡吳屬始興郡梁立衡州及陽山郡隋廢郡改洭州州廢屬廣州復洭州貞觀州廢屬廣州立南漢地理沿革表縣沿革眞陽本漢桂陽郡湞陽縣吳以後屬始興隋省入曲江後復置曰真陽唐初屬洭州貞觀復曰湞陽屬廣州南漢英州治此浛光本漢桂陽郡含洭縣吳以後屬始興梁治衡州陽山郡隋改􅀈州州廢屬廣州唐置洭州治此州廢屬廣州本朝改今名來屬地理沿革表形勝銀山在真陽有銀江琅溪在縣南通天岩碧落洞在州西相去二三里㴠暉谷有飛霞嶺棲雲洞濳靈洞晞陽島夣弼岩在州南鳴絃峰下真陽峽在真陽東南芙蓉山在州西蓮花峰在鳴絃峰前桃花洞在含暉谷後娥眉岡熊耳嶺皆在浛光輿地紀勝人物皇朝石汝礪問學淹該馮安上父子登科鄭敦義知潮陽上書極論市翠羽黄牛革事詔轉一官鄭準劉緯入元祐黨籍吳其妻譚氏守節罵賊而死輿地紀勝本朝宣和三年賜名真陽郡㑹要今為英德府沿革表乾興元年改湞陽曰真陽為英州治開寶四年改廣州含暉為浛光縣𨽻連州六年來屬並同上越林多蔽天黄柑襍丹橘萬室通釀酤撫逺無禁律醉去不須錢醒來弄琴瑟梅堯臣郡官不患無供給支與真陽幾石山楊誠齊昔仙風冉冉數千載碧落之洞天今佳氣􅀢􅀢五百年濳龍之福地徐相賀王守惠州倚郭一外縣三歸善河源博羅海豐郡號博羅海豐寅山河源州沿革星紀之次春秋百越地以後屬南海郡宋秦齊屬南海東筦二郡隋立循州大業州廢立龍川郡唐武德曰循州天寶曰海豐郡屬嶺南道漢改禎州别立循州於北境地理沿革表縣沿革歸善本漢南海郡博羅縣地宋置歸善縣隋立循州及龍川郡治唐析置龍川縣貞觀省入南漢改禎州治此河源本漢龍川縣地齊置河源縣隋屬循州又省新豐縣開皇改曰休吉大業省入唐武德析置石城縣觀省入南漢屬禎州博羅縣屬漢南海郡隋屬循州唐析置羅陽縣貞觀省入南漢屬禎州海豐宋初置縣屬東筦郡隋置循州唐武德析置陸安縣觀省入南漢屬禎州地理沿革表形勝羅山在博羅浮山云是蓬萊一島堯時洪水浮來合而為一故名羅浮有聚霞蜂飛雲壇錦秀峰金沙洞瑇瑁山瑶石臺香峰亭鉢盂峰刀子峰石臼洞阿耨池羅漢岩佛迹岩通天岩㑹仙峰抛毬峰黄龍洞碧雞山朱明洞凢四百三十二峰係第七大洞天豐湖在郡城西有㸃翠溪漱玉灘平逺臺孤嶼亭平湖閣荔枝圃鰲峰亭輿地紀勝人物皇朝古初之國初充賦梅蟠擢元豐第張宋鄉紹興以春秋魁多士輿地紀勝集君言羅浮上容易見九垠漸髙元氣壯洶湧來翼身夜宿最髙峰瞻空浩無隣海黒天宇曠星辰來逼人劉禹錫本朝天禧五年改禎州為惠州治歸善沿革表浮山若鵬蹲忽展垂天羽東坡羅浮山下四時春盧橘楊梅次第新日啖