縣本朝並省入永淳沿革表形勝秋風江桂榜山在永定縣南寶盖山登髙嶺在寧浦鳯凰巖在城東鸕鷀灘在寧浦震龍山在州北飛龍山龍牙山龍鎮山在寧浦龍章山魚流山在永定秀林山在寧浦洪崖山在城南輿地紀勝本朝開寶五年廢蠻州省武羅靈竹二縣入永定來屬省從化樂山二縣入寧浦熈寧四年省永定入焉元祐復置永定崇寧改永淳沿革表集萬疊山圍城堞古一灣江抱海槎浮徐安國羣嶺中推古鉢尊山川羅列掌中存亭臺突兀聖婆廟丘垤逶迤山子村秀出城南是寶華翠㣲深處衲僧家出郭扶笻上翠屏却從雲隙望莎城並同上化州倚郭一外縣二石龍吳川石城郡號龍化陵水髙興羅水吳川石龍陵羅州沿革牛女之分春秋越地秦屬象郡漢初屬南越後屬合浦郡東漢分屬髙興郡吳晉屬髙凉郡宋立羅州隋末廢屬髙凉郡唐武德析置羅州又置南石州貞觀改辯州天寶改羅州為招義郡辯州為陵水郡乾元復為州朱全忠改辯州為勲州後復故五代地入南漢沿革表縣沿革石龍本漢合浦郡髙凉縣地隋置石龍縣屬羅州州廢屬髙凉郡唐武德為羅州治又析置陵羅慈亷羅肥三縣羅州徙治以四縣屬辯州貞觀省慈亷羅肥本朝省陵羅吳川本漢髙凉縣治宋置吳川縣屬髙凉郡唐武德析石龍置招義零渌二縣與吳川皆屬羅州天寶改招義曰幹水本朝並省入吳川石城本漢髙凉縣地宋檀道濟築石城立羅州隋廢之唐武德析石龍置石城縣復羅州後羅州自石龍徙治此天寶改石城曰亷江沿革表形勝石龍岡在州西南鳯凰井在城南龍化水在羅州界石城岡在舊亷江塲北有石城水石頭山在石龍縣西招義山在廢縣西北近信山在吳川西北銅岡山在石龍東北輿地紀勝人物鞠杲吳川進士上入黨籍輿地紀勝集羅川帶郭古南州陵水環城小庾樓雲淡青山無過鴈雨涵丹荔集鳴鳩郡守不知姓氏本朝開寶五年廢羅州入辯州省陵羅縣入石龍省陵渌幹水石城三縣入吳川太平興國改辯州曰化州乾道復置石城縣沿革表髙州倚郭一外縣二電白信宜茂名郡號髙凉電白西平潘山懷徳潭峩永熈州沿革牛女之分古百越地秦屬南海郡漢初屬南越後合浦東漢兼屬蒼梧桓帝立髙興郡吳置髙凉郡梁析置髙州隋復為髙凉郡又為永熈郡地唐復髙州為都督府永徽析置恩潘二州天寶曰髙凉郡乾元曰髙州五代地入南漢地理沿革表縣沿革電白本漢髙凉縣地晉安寧縣地梁置電白連江二郡又置凉封縣及南巴郡陳于安寧地置務德縣隋廢電白連江為縣又改凉封為義封並屬髙凉郡大業省義封改務德為良德屬永熈郡唐武德三縣並屬髙州開元改連江曰保安至德改保寧州初自髙凉徙治良德大厯又徙電白信宜本漢蒼梧郡端溪縣地晉分置晉康郡梁置良德縣及郡陳於晉康立信義郡隋廢為縣又廢染德郡後改良德縣曰懷德屬瀧州又省信義入焉唐武德立南扶州於懷德尋復置信義徙南扶治焉又分信義置潭峩特亮二縣貞觀更名竇州天寶曰懷德郡本朝並省諸縣廢竇州茂名本春秋西甌地漢髙凉縣地梁置南巴郡隋開皇分置茂名縣屬羅州廢南巴郡大業廢南巴縣及羅州以茂名屬髙州唐武德置南岩州復南巴縣析茂名置潘水縣貞觀茂名屬南岩州又改潘州州廢入髙州後析潘水置毛山縣尋廢潘水永徽以茂名南巴毛山復置潘州開元改毛山曰潘水天寶改州曰南潘郡本朝並省入茂名沿革表形勝毛山在舊縣東毛女隱此潘山在茂名東潘希古煉丹處雲岫山在信宜北霧嶺崗在茂名南畫龍山在信宜北皓鸞山在信宜西龍湫山在郡東龍湫井龍灣井在電白百禄山在茂名千嵗山在電白信義水在信宜特亮江在茂名輿地紀勝人物皇朝梁楚攝亷闕傳白令扞賊遇害陳夀瞽目索塗送母葬兩目頓明李周士兩舉鄉薦有詩名本朝開寶五年廢潘州入髙州省良德保寧二縣入電白省南巴潘水二縣入茂名七年省竇州懷德潭峩特亮三縣入信義太平興國改信宜景德廢髙州入竇州三年復置熈寧廢竇州入髙州以信宜來屬地理沿革表巧妙四山雲岫合要龍雙甑月燈明風土記記纂淵海卷十五
