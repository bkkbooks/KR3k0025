body:
  text: 記纂淵海卷七十宋潘自牧撰叙述部求援經弱者不能自濟必依於强詩序控于大邦詩終夜有求於幽室之中非燭何見禮記子昏暮叩人之門户孟子車轍之中鮒魚曰我東海之波臣也豈有升斗之水而能活我哉荘子史孟獻子曰願借助焉左襄四年甘茂謂蘇秦曰貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一便焉史記雖復零雨自天終待雲興四岳北史魏愷傳蕭炅為河南尹嘗坐事西臺遣吉温徃按之温治炅甚急及温為萬年丞未幾炅為京兆尹温素與髙力士相結力士自禁中歸度炅必徃謝官乃先詣力士與之談謔握手甚歡炅後至温陽為驚避力士呼曰吉士不須避此亦吾故人也召還與炅坐炅接之甚恭不敢以前事為怨他日温詣炅曰曩者温不敢虧國家法自今請洗心事公炅遂與盡歡通鑑唐𤣥宗紀傳記士非玉璧談者為價物理論互見因人而重門集兾宵燭之末光邀潤屋之㣲澤劉孝標廣絶交論寒谷待鳴律文選譬諸蟄蟲坯户而死者與夫槁死亦無以異矣春雷一震必歆然翹首與生為徒况有吹律者召東風以薫之其化也益速宋廣平之沈下僚蘇公味道為使者廣平投以梅花賦蘇盛稱之自是方列於聞人之目是知英賢卓犖可外文字猶用片言借說於先達之口席其勢而後驤首當時矧碌碌者疇能自異互見因人而重施一陽於剝極之際援衆溺於坎深之下夫踣者思起必謼而求拯疾者思愈必呻而求醫劉賔客集孤獸走索羣曹子建贈白馬王彪詩無衆星之明假日月之光魏文帝吳質書願假東壁輝餘光照貧女李白集餘波期救涸巨海能無釣浮雲亦有梯麾下頼君材並美獨能無意向漁樵揚雄更有河東賦惟待吹嘘送上天杜詩儻荆璞不致見疑夜光不逄按劍則沈骸九死終望銜珠俛首三泉猶希結草涸鱗濡沫常觖望於鯨波决羽搶榆頗思遷於鶯樹儻餘光之可照庶寒灰之重然曲逮恩光資餘潤於東里襲承導引輕托夢於南樛奮短翮於搶榆希髙標之餘拂濯鮮鱗於涓滴望鴻浪之㣲沾所兾顧盼曲流剪拂増價則鈆刀起一割之用跛鼈致千里之行互見自薦儻能分其斗水濟濡沫之枯鱗恵以餘光照孀棲之寒女得使伏櫪駑蹇希騏􅂹而蹀足竄迹翩翾排鴛鸞而刷羽互見自薦並駱賔王集蹈水火者之求免於人也不惟其父兄子弟之慈愛然後徃而全之也將有介於其側者雖其所憎怨茍不至乎欲其死者則將大聲疾呼而望其人之救也木在山馬在肆過之而不顧者雖日累千百人未為不才與下乗也及至匠石過之而不睨伯樂過之而不顧然後知其非棟梁之才超逸之足也互見委棄天地之濱大江之濆有怪物焉蓋非常鱗凡介之品彚匹儔其得水變化風雨上下於天不難也其不及水蓋尋常尺寸之間耳無髙山大陵曠途絶險為之闗隔也然其窮涸不能自致乎水為獱獺之笑者蓋八九矣如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俛首帖耳摇尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其有命而且鳴號之者亦命也韓文且天下熈熈然而獨呻吟栁文恩波自觧惜枯鱗銜花縦有報恩時擇木誰容托身處劉長卿見借羽翼王維集折簡能榮瘁遺簮莫棄捐韶光如見借寒谷變風烟温飛卿愧無鵷鷺姿短翮空飛還誰當假羽毛雲路相追攀韋應物集線因針而入矢因弦而發雖有線矢無針弦欲自致焉不可得也白傅集當途訴知已投刺匪求蒙孟浩然朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家溉灌所不沾其濯乃條枚成乃華實者上天至仁之膏澤厚地無際之陽春乎相公為上天霖雨佐厚地無際之陽春發生者也何以處某焉歐陽行周文握風捕影鑄木鏤水敢求恩知但希鐫琢墜井者求出執熱者願濯自愧掃門士誰為乞火人杜牧之遺簮墜履應留念門客如今只下寮宣室夜闌如有問可能全忘未燃灰羅隐本朝無鹽煩刻畫寒谷借吹􅌵歐公集必為鏌鎁盡歸鎔鑄晏公類要儻矜一介之誠願借半辭之助臨川行看富貴逼炙手借餘暖特借齒牙曲成羽翼東坡求哀史楚子圍鄭三月克之鄭伯肉袒牽羊以逆曰孤不天不能事君使君懐怒以及敝邑孤之罪也敢不惟命是聽其俘諸江南以實海濵亦惟命其剪以賜諸侯使臣妾之亦惟命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圗之左宣十二楚莊王伐鄭克之鄭伯肉袒牽羊以逆曰孤不天不能事君君用懐怒孤之罪也敢不惟命是聽擯之南海以臣妾賜諸侯亦惟命是聽若不絶其社稷使改事君孤之願也非所敢望也敢布腹心史楚世家懐朔鎮將元尼須與元懐舊交貪穢狼籍置酒請懐謂懐曰命之短長繫卿之口豈可不相寛貸通鑑梁武帝紀魏齊笞繫范雎折脅摺齒睢佯死卷以簀置厠中使客醉者更溺之范雎謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣通鑑周紀晉王斬劉守光守光曰守光善騎射王欲成伯業何不留之使自効其二妻李氏祝氏讓之曰皇帝事已至此生亦何益妾請先死即伸頸就戮守光至死號泣哀祈不已通鑑後梁均王丁公為項羽將逐窘高祖彭城西短兵接漢王急顧謂丁公曰兩賢豈相戹哉丁公引兵而還西漢季布傳暴勝之欲斬王訢訢曰殺訢不足增威不如時有所寛以明恩貸勝之壯其言而赦之前漢猛虎處深山百獸震恐及其在䧟穽之中搖尾而求食司馬遷𫝊集元相公在浙東賔府有薛書記酒後傷公猶子逐出幕既去作十離詩以獻犬離主筆離手馬離廐鸚鵡離籠燕離巢珠離掌魚離池鷹離羣竹離亭鏡離臺犬詩云馴擾朱門四五年毛香足净主人憐無端咬着親情客不得紅絲毯上眠筆詩云越管宣毫始稱情紅牋紙上撒花瓊都縁用乆鋒頭盡不得羲之手裏擎鸚鵡詩云隴西獨自一孤身飛去飛來上錦䄄都縁出語無方便不得籠中更喚人燕詩云出入朱門未忍抛主人常愛語咬咬銜泥穢汚珊瑚簟不得梁間更壘巢摭言餘不載謁見經見情者獲直徃則違易例既見君子云胡不喜既見君子為龍為光詩聞始見君子者辭曰某固願聞名於將命者敵者曰某固願見罕見曰聞名亟見曰朝夕禮記子不識可以繼此而得見乎孟子願望履幕下侍於下風幸聞咳唾之音荘子史子産曰敝邑不敢寧居來㑹時事逄執事之不閒而未得見又不獲聞命未知見時左襄三十一年鄒陽曰何王之門不可曵長裾乎願有謁也西漢本傳耳餘上謁張耳傳造請諸公張湯傳曠若開雲見日何喜如之東漢袁紹傳伏拜賔阼通爵里之刺魏志吕僧珍生子宋季雅徃賀署函曰錢一千閽人少之不為通强之乃進梁書互見慶賀集承顔下風陸士龍詩獨耻事干謁杜工部詩君出我入如相避然韓文鄭光業有一巨皮箱凡投贄有可嗤者即投其中號曰苦海摭言古者未有紙削竹木以書姓名故謂之刺後以紙書故謂之名紙唐李徳裕為相貴盛人務加禮改具銜候起居之狀謂之門狀集韻得所依託經日月麗乎天百穀草木麗乎土得其所歸者必大故受之以豐並易弱而不懼於敵者得所據也憂而不懼於亂者得所附也易注日月得天而能乆照易魚麗于水獸麗于山易注菁菁者莪在彼中阿鴻雁于飛集于中澤魚在在藻依于其蒲詩子霜雁託於秋風以成輕舉之勢列子投魚于淵寘猿于木文中子大厦成而燕雀相賀淮南子互見第宅門史齊侯使敬仲為卿辭曰覊旅之臣幸若獲宥及於寛政赦其不閑於教訓而免於罪戾君之惠也所獲多矣左荘二十二年社鼷不灌屋䑕不熏何則所託者然也前漢中山王傳巨魚縱大壑前王褒傳星辰之麗天猶萬國之附王後漢袁楷傳如晨風之鬱北林龍魚之趣藪澤也晉書孝愍帝紀魚得水而遊鳥乗風而翔唐書元稹傳鳥生深林獸在豐草白居易傳傳記稷蜂不攻社䑕不熏其所託者然也韓詩外傳鳯凰巢於阿閣通歴集歸鳥赴喬林翩翩厲羽翼曹子建贈白馬王彪庇身有地任彦昇集蝟結蟻聚水草有依文選露淋秋檜鶴聲清杜荀鶴問無恙外不暇出一語且先賀其得賢主人韓退之代張籍團團規内星未必明如月託迹近北辰周天無淪没元稹雄藩車馬地作尉有光華銜泥入華屋韋應物不見千年鶴多栖百丈松獸樂在山谷魚樂在陂池蟲樂在深草鳥樂在高枝白侍郎互見趨向不同水深魚極樂杜詩失所依託經龍戰于野其道窮也易若渉大水其無津涯予將疇依書予羽譙譙予尾翛翛予室翹翹風雨所漂搖鴻飛遵陸不屬于毛不離于裏靡所止戾詩子下喬木而入於幽谷孟子蒙鳩以羽為巢而編之以髮繫之以葦苕風至苕折卵破子死巢非不完也所繫者然也荀子史虢射曰皮之不存毛將安傅左僖十四年容容無所倚史淮隂傳失所為愆史孔子世家曾不得邪徑而託足焉前漢賈山傳宇宙雖廣自容無所通鑑晉穆紀有鳥於此架巢於葭葦之顛天風則葭折而巢毁所托者弱也韓詩外傳集眇眇而無所歸泊楚辭花離蔕而萎條去幹而枯蔡邕釋誨出籠窮短翮委轍涸枯鱗駱賔王行舟楫而不識四方兮渉大水之漫漫韓文閔已賦互入昧於趨向為水不入海安得浮天波為木不在山安得横日柯孟東野枳棘徒棲鳳劉長卿舊時王謝堂前燕飛入尋常百姓家劉賔客百川不朝於海雖狂奔澶漫終為涸土唐田頵移書楊行密纍纍然若䘮家之狗史記孔子世家辨白經無信人之言人實迋女詩子曰二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也語子如使予欲富辭十萬而受萬是為欲富乎予豈好辯哉予不得已也孟史考問左驗明白楊惲傳貫髙怨家知其謀上變告之於是上遣捕趙王及諸反者趙午等十餘人皆自爭剄貫髙獨怒罵曰誰令公為之今王實無謀而並捕王公等皆死誰白王不反者乃詣長安髙對獄曰獨吾屬為之王實不知吏治搒笞數千刺剟身無可擊者終不復言貫髙曰人情寧不各愛其父母妻子乎今吾三族皆以論死豈愛王過於吾親哉顧為王實不反獨吾等為之漢惠帝紀初大司馬冏疑中書郎陸機為趙王倫撰禪詔收欲殺之將軍為之辨理得免死因表為平原内使晉惠帝紀張昌宗曰說嘗謂元忠為伊周伊尹放太甲周公攝王位説曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫臣以郎官徃賀元忠語客曰無功受寵不勝慙懼臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為至忠古今仰慕陛下宰相不使學伊周當使學誰耶且臣豈不知今日附昌宗立取台衡附元忠立致族滅但臣畏元忠寃魂不敢誣之耳唐中宗紀議者或罪張廵以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上以為若不時紀録恐逺而不傳使廵生死不遇誠可悲哉唐肅宗紀帝戲第五倫曰聞卿為吏篣婦翁不過從兄飯寧有之耶對曰臣三娶妻皆無父少遭饑亂實不敢妄過人餐東漢本傳李晟大安園多竹後有為飛語者云晟伏兵大安園謀因倉卒為變晟遂斫伐其竹唐德宗紀張廵死節睢陽人昧其功以為降賊肅宗未及知李翰傳廵功状表之帝因是感悟而廵大節白於世唐李翰傳集刺心以自明刎頸以見志李少卿夫傲雖凶徳必有恃而敢行愈之族親鮮少無扳音班聫之勢於今不善交人無相生相死之友於朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乗機抵戲以要權利夫何恃而傲若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也韓文釋言自古賢人才士秉志遵分被謗議不能自明者百數故有無兄盗嫂娶孤女云撾婦翁者然頼當世豪傑分明辨别卒光史籍堅然相白者無數人栁文西施若觧傾吳國越國亡來又是誰羅隠集陳情史淳于公少女緹縈隨其父至長安迺上書曰妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無繇西漢刑法志隆天重地死無以塞責一日卒有不勝洒掃之職先狗馬填溝渠竊有所恨西漢東方朔傳劉向曰臣幸得託肺腑西漢劉向傳范逵謂陶侃曰欲仕辟乎曰困于無津陶侃傳春不得避風塵夏不得避暑熱秋不得避風雨冬不得避寒凍四時之間無日休息又私自送徃迎來弔死問疾貴粟論本朝曽與蒿藜同雨露終隨松栢耐風霜臨川集豈堪置足青冥上終欲回身寂寞濱少遭閔凶自奮寒苦螢爝殊光不獲干時之譽榱楹近用亦參構厦之功日有簡書之繁乆無竿牘之獻同上范忠宣遺表云葢嘗先天下而憂期不負聖人之學養疴卧治之所蒙成坐嘯之餘信道直前曽無坎井之避立朝寡助誰為先後之容言行隻影自憐命寄江湖之上驚魂未定夢逰縲紲之中疾病連年人皆相傳為己死饑寒併日臣亦自厭其餘生坡集逮親而得斗禄雖慰於子心歛板而揖上官遂成於俗狀學乆矣而將落思兀然而欲枯進無取當塗之資退已失故時之歩歐公集學以父兄為師貧無公卿之助欒城集木雞自笑真無用芻狗何勞收已陳罪積如山命輕如髮同上湔洗經開釋無辜書蟄蟲昭蘇記子息我黥而補我劓荘子史所謂生死而肉骨也左傳振㧞泥塗前漢班固叙傳枯骨復被肉東漢趙傳洗刷疵姤宣暢湮欎雪寃氣於幽泉唐書集使入湯之禽復假羽毛自斷之足復蒙連續蘓武報李陵書塵洗天波謗絶衆口陸機表茍削丹書得夷平民迴霜收電同上㧞泥塗之乆辱文粹窮骸枯骨一朝再生踴躍章惶再崩再殯陳子昂集收骸溝壑返魄幽泉魑魅窮魂重生聖日糞土殘命不滅荒陬再造生涯天實為徳起骨九泉幽魂雪憤遺噍昭蘇天波昭洗更得自新朽骨更肉萬死一生並同上使枯朽之條更與秋蘭垂芳陸沉之羽復共翔鴻撫翼陸士衡洗㧞出泥滓白侍郎出泥騰霄從骨生肉提㧞出泥吹嘘生翅將枯鱗再躍經鎩翼重矯並同上恩波起涸鱗杜詩寃氣初逄渙汗收劉長卿六翮方鎩思重托於扶搖孤桐半焦兾見收於煨燼同上表而出之為生羽翼劉賔客重雲開朗照九地雪幽魂杜牧之藥肉白骨香返逰魂祓拭舊痕湔洗前過必欲牽復用存始終並同上莫因毫髪累長使濺泥沙錢起收召魂魄栁文生繁華於枯荑育豐肌於朽骨劉越石聖代也知無棄物羅隠本朝安得層穹返收拾莫教狼籍渾泥沙僧參廖子雪詩進退難處經云不可使得罪於天子亦云可使怨及朋友詩子與之為無方則危吾國與之為有方則危吾身荘子矰繳機而在上網罟張而在下雖欲翺翔其勢焉得淮南子史齊魯仲連為書約之以矢遺燕將得書泣三日猶豫不能决欲歸燕已有隙恐誅欲降齊所殺虜於齊甚衆恐已降而後見辱曰與人刄我寜自刄乃自殺仲連傳依世則廢道違俗則危殆何武贊文集居閒力不足從事力難任兩事皆害性一生恒苦心韓文公集蒙成經不耕穫不菑畬易史渠成亦秦之利也溝洫志蕭何為法較若畫一曹參代之守而弗失本傳贊馮翊垂拱蒙成薛宣𫝊以杜畿為河東太守鍾繇促王邑交付邑佩印綬畿謂衛固范先曰范衛河東之望也吾仰成而已漢獻紀本朝秦收鄭渠成晉得楚材多山谷集備員經今由與求也可謂具臣矣論語子齊宣王好竽南郭先生不知竽而濫吹於三百人之中以食禄韓非子史魏絳曰日君乏使使臣斯司馬韓厥曰下臣不幸属當戎行攝官承乏蒯瞶不敢自佚備持矛焉並左傳趙使平原君合縱於楚約與食客二十人偕得十九人毛遂自薦曰願備員而行平原君傳雖有姬姜不棄憔悴雖有絲麻無棄菅蒯葢所以代匱也應奉傳貂不足狗尾續晋書備員不復事唐書鍾毓毎與參佐射魏舒常為畫籌而已後遇朋人不足以舒滿數魏明帝記傳記强奏􅅠者特為足曲史通乗間簉乏琴賦集切混吹於齊竽濫飛聲於郢路駱賓王名亦濫吹竽温飛卿本朝衆裏笙歌誰比數東坡詩狼狽經若崩厥角周書史匹馬隻輪無反者左傳掃地盡矣韓信傳奉頭䑕竄以歸蒯通傳託足無所晋書傳記狼狽是兩物狽前足短常駕兩狼失狼則不能動故世言事乖者稱狼狽酉陽雜爼集乾坤之量包含海嶽臣身甚㣲無所投足蟻適於垤蝸休於殻龜黿螺蜯皆有所伏臣物之靈進退惟辱栁乞巧文孑輪無反文粹被䜛經巷伯寺人傷於䜛故作是詩也彼何人斯暴公為卿士而譛蘇公焉故蘇公作是詩以絶之詩序䜛人罔極構我二人青蠅子匡章通國皆稱不孝孟子史日月之明時蔽於浮雲龜莢傳孔墨之辨不能自免於䜛諛鄒陽傳馬援自交趾還載薏苡一車時人以為南土珍怪後有上書譛之者以為明珠文犀本傳困於口舌不能以忠自明李光弼傳贊集巧言易信孤憤難伸劉賔客有無兄而盗嫂娶孤女云撾婦翁詆訶萬端旁午構扇栁文本朝巧語屢曾遭薏苡東坡詩衆口相咻有口難訴欒城集被禍經明夷于飛垂其翼困于石據于蒺藜困于葛藟于臲卼易子禍重乎地莫之知避荘子鳥飛千仞之上獸走叢薄之中禍猶及之又况編户齊民乎俶真訓史昔虞舜窘於井廩伊尹負於鼎爼傅說匿於巖險吕尚困於棘津夷吾桎梏百里飯牛仲尼畏匡菜色陳蔡此皆學士所謂有道仁人也猶遭此菑况以中材渉亂世遇害可勝道哉㳺俠傳人方為刀爼我為魚肉項羽傳景帝没入鄧通家財一簪不得着身佞倖傳龍不隠鱗鳯不藏羽網羅髙懸去將安所東漢傳過誤失言文吏躡尋三王傳明知禍烈及己也晁錯傳張敬兒被收脱冠投地曰用此物誤我齊書烈火燒心衆鏑叢體憲宗紀集秋草榮其将實兮㣲霜下而夜降哀余生之不當兮獨蒙毒而逄尤楚辭妻孥受灰滅之咎陳琳檄潤鑊伏鑕王命論抱不測之罪任安書動足蹈非搖首入禍鶡冠子清霜一委地萬草色不緑狂飇一入山萬葉不着木孟郊網羅未觧縱羽翮而何施嚢檻方堅雖虎豹其焉徃一廢不復曾不若躄足延顙之猶有遭也栁文問牛悲釁鐘說彘驚臨牢栁詩夫鳥俛而啄仰而四顧獸深居而簡出懼物之為己害也猶且不免焉斷鶴兩翅鳴何哀縶驥四足氣空横韓文共展排空翼俱遭繳逺矰㣲之車催太行路劍落酆城獄白侍郎集才展凌雲翼俄成失水鱗同上寄孤經哀此㷀獨詩小雅無父何怙無母何恃詩子老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤四者天下之窮民而無告者孟子史小人老而無子知擠於溝壑矣左集單孑獨立文選揮杯勸孤影陶潛詩弔影慙魂江文通賦零丁孤苦至于成立㷀㷀孑立形影相弔陳情表蚊虻當家口草木是親情盧仝詩衡門獨立惟影與形陳子昻集垂老之嵗棄為窮人白傅集形單影隻韓文舉杯邀明月對影成三人李白詩在抱無兒承家乏祀栁祭文承先人之後在孫惟汝在子惟吾嫂嘗撫汝指吾而言曰韓氏兩世惟此而已韓文萬族各有托孤雲獨無根淵明詩孤桐亦胡為百尺旁無枝踈隂不自覆脩幹欲何施張九齡一身形影單單鳴無應隻影長孤白樂天空牀將影宿李君虞飄蕩經若渉大水茫無津涯蕩析離居罔有定極書譬彼舟流不知所届小弁孔子曰丘也東西南北之人也記史心摇摇然如懸旌而無所終薄蘇秦傳如河中木泛東西東漢陳蕃傳集飄萍浮而蓬轉西征賦似舟飄不定如梗泛何從駱賔王萬里無故人江鷗不相識劉長卿流落感温凉劉賔客飄然隨釣艇雲水是生涯温飛卿蓬生非無根飄蕩隨髙風天寒落萬里不復歸本叢飄蓬踰三年迴首肝肺熱飄飄何所似天地一沙鷗漂梗無安地遊子無根株並杜詩汨東西與南北恒十年而不居絶水草以休息兮常未安而既危並韓文長念蝸牛猶有舍不如碩䑕觧藏身七十無家萬里身弔影分為千里鴈辭根散作九秋蓬白侍郎集去國長為不繫舟李太白江海今為客風波失所依一身不家食萬事從人求並劉長卿身逐閒雲不在家武作營生計如雲無定所窮愁似影巧相隨姚上監本朝井水分四鄰竹隂借東家蕭然行脚僧一身寄天涯東坡寄寓經黎侯寓于衛詩註諸侯不臣寓公禮史羈旅之臣左傳兩君羈旅張耳傳李揆乞衣求食萍寄諸郡唐小史集羈旅無定心張景陽蹔託棟梁何用喜元稹集生計南枝鳥白侍郎醉鄉無迹似閒雲温飛卿人生已如寄在寄復為客李君虞文荒僻經果羸之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠燿宵行詩東山史狐狸所居豺狼所嘷左傳土陿而險山居谷汲地理志窮里空舍趙廣漢傳集落落窮巷士抱影守空廬左太冲采茨葺茅宇剪棘開舊畦顔延年詩小市常爭米孤城早閉門草深迷市井地僻懶衣裳杜詩陋宇荒堦不足回旋劉賔客欲掃柴門迎逺客青苔黃葉滿貧家劉長卿媿非鄭公里歸掃蒙籠室韋應物集青苔依空牆蜘蛛網四屋張景陽里無曲突煙路無行輪聲同上千里蕭條雞犬罕音季友表草合人蹤斷塵濃鳥跡深李太白集周王之馬跡不至謝公之屐齒不及栁集窮陋史敝邑褊小不足以容從者左傳僻陋在夷其孰以我為虞左生於窮巷之中長於蓬茨之下無有逰觀廣覧之知顧有至愚極陋之累王褒傳集煙消日出不見人欸乃一聲山水緑千山鳥飛絶萬徑人跡㓕孤舟蓑笠翁獨釣寒江雪栁詩蹄道補復破絲窠掃還成寂寞之濵韓文落葉滿空山何處尋行跡韋應物蛙聲籬落下草色户庭間張文昌怪禽啼曠野落日恐行人賈浪仙紅葉紛紛葢欹瓦緑苔重重封壊垣元稹孤螢出荒池落葉穿破屋司空圖本朝緑苔人跡少黄葉雨聲多歐陽榮不知人間之㡬時兮但見草木華落為春冬同上虗市無人冷欲氷欒城詩叙述部感謝經飲之食之教之誨之中心藏之何日忘之詩史所謂生死而肉骨也左傳管仲曰生我者父母知我者鮑叔也史管仲傳浹肌膚而藏骨髓董仲舒傳隕首流腸侯景傳周宇文曰生死肉骨豈過今恩負山戴嶽未足勝荷通鑑陳紀衣服之外皆聖恩所賜惟髪與膚生從父母唐楊妃傳集一言之譽東陵侔於西山一盼之榮鄭璞踰於周寳王文憲文集序迴霜收電使不隕越陸機謝表自頂至踵功歸造化咳唾為恩盼睞成飾顧已循涯實如塵忝千載一逄再造難答任昉彈文實佩荆卿黄金之賜却感豫譲國士之分惠以恩光顧以顔色江淹書潤朽骨而榮枯木文選曹植表恩惠周渥赭白馬賦生繁華於枯荑育豐肌於朽骨勸進表守死陵墓没齒家園不意慶雲垂澤天漢横流拂拭霧露生見白日踴躍昭泰情何以勝再造生涯天實為徳㧞於草野謬齒衣冠私門祖宗幽顯榮慶豈止一身而已肝腦塗地不足塞責特恕萬死賜以再生才本庸㣲名術無紀皆縁際㑹叨遇聖明謬得揚歴簮徽陪奉鴛鷺綢繆榮禄荏苒平時摩頂至趾豈足上酬陳子昻集𤣥造曲成大明私照來效未聞新恩洊及回一瞬之念致再造之恩羣蟄應南山之雷窮鱗得西江之水六律變幽谷之寒一丸銷彌年之疹喜心深生懼珍羞出於内府㫖酒降於上尊勤勞無展於股肱醉飽有慙於口腹跽奉自天之命遥馳捧日之心鼓舞忭成雷緘藤既開覩彩章之盛飾蹈舞而服發温燠於祁寒頓驚凢口舉其匕筯若負丘山恩光到敝廬白首垂絲荷不遺糗糧既備永無半菽之虞襦袴足頒逺超挾纊之感劉賔客徳重恩宏身㣲命輕無階荅謝惟積慚惶受恩益大顧已愈輕蒙生成於天地無禆補於涓塵温存感深惠琢切奉明戒韓集泛大鯨之海每覺魂摇戴巨鰲之山未如恩重駑駘蒙錦繡塵土浴潺湲如我酬恩合執鞭螢光爝火何禆日月之明弱質孤根但荷乾坤之徳杜牧之成九族之榮盡百年之幸興哀於無用之地垂徳於不報之所守突奥者忽仰睎於白日負泥塗者遂自濯於清源栁文釋於齊斧之下揖於羣士之上燕公集涸溜沾濡沬餘光照死灰元稹提攜增善價拂拭長妍姿女醜嫁勞媒惠深范叔綈袍贈榮過蘇秦佩印歸天酒來以分甘御羞降而示惠寵過加籩懼多尸素之責榮同置醴悲無麴蘖之功𤣥造曲成榮幸不止於一身感戴實深於萬品既鮮華而駭目亦輕煖而便身祕藏篋笥傳示子孫榮降天上寵驚人間澤及草木秋色變而成春顧陋質而懐慙貎非稱服拊㣲躬而荷寵力不勝衣肉食無謀未展涓埃之報素餐有愧難勝醉飽之恩天厨酒脯御府管絃寵賜忽降於寰中慶幸實生於望外念嚴凝而加之煦嫗慮皸瘃而潤以膏脂挾纊之恩所勉和則體舒不龜之澤既沾感而手舞頒御府之酒漿賜大官之餅餌白侍郎得陪桃李植芳叢别感生成太昊功今日無言春雨後似含冷涕謝東風姚少監㫖酒名茶玉食仙果來於天府莫匪天慈杜牧之適口忘憂已滿小人之腹殺身粉骨難酬聖主之恩卵翼不自於他門頂踵實非其己物李義山我蟠濁泥君躡青雲不以升沉塹隔其間誨我如兄煦我如春我何敢忘銘骨書紳孫可之煖乎若冬陽之煦油乎若春澤之侵喜過生悲感深以泣吕温雕琢只應勞郢匠羅隠感激念知己匣中孤劒鳴錢起感入心府權載之本朝摳衣最出諸生後倒屐嘗傾廣坐中丹青至㣲恐累玉瑩之粹土木至陋猥承綈繡之華優為體貌畧去等夷繄奨予之太隆滋囬皇之失次納之天地之量照之日月之明王介甫功無銖兩恩有丘山類要不虞暗禍䧟臣於風波必死之淵尚賴至仁脱臣於蛟鰐垂涎之口歐公集雖父兄所以處臣其僥倖不過如此投畀麏鼯之野保全樗櫟之生天地能覆載之而不能容之於度外父母能生育之而不能出之於死中使破甑弊箒復増九鼎之重使星下燭生蓬蓽之光華天澤旁流失桑榆之枯槁憂深投杼豈無三至之言詔復賜環不待一人之譽既陶甄於頑礦復封植於散材東坡遺簮以故而見收老馬以病而復養哀憐廢棄之乆誰復肯然綢繆樽爼之歡亦非偶爾衣食有奉己寛盡室之憂道徳照人况復終身之幸欒城集受知史子産聞子皮卒哭且曰吾已無與為善矣惟夫子知我左昭十三楚薳子馮曰知我者如夫子則可不然請止左㐮二十二年管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利有不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也生我者父母知我者鮑子也史管仲傳士為知己用女為悦己容西漢司馬遷傳初曹操㣲時人莫知者嘗徃候𤣥𤣥見異焉謂曰今天下將亂安生民者其在君乎操嘗感其知己及後經過𤣥墓輙悽愴致祭奠自為其文東漢橋𤣥傳申於知己屈於不知己晋書羊祜表吳嘗置丞相衆議張昭吳王曰孤豈為子布有愛乎顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也通鑑三國魏明紀吉温常曰若遇知己南山白額虎不足縛也唐立宗紀傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俛而噴仰而鳴聲聞於天若出金石之聲者何也彼見伯樂之知己也戰國䇿鑿齒有才桓宣武器之未三十用為荆州治中謝牋曰不遇明公荆州老從事耳世説晉伐吳張悌渡江戰吳軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便為卿家丞相所㧞常恐不得其死負名賢知故今身殉社稷復何所遁㐮陽記集説操築於傅巖兮武丁用而不疑吕望之鼓刀兮遭周文而得舉寗戚之謳兮齊桓聞以該輔驥躊躇於弊轝兮遇孫陽而得代孫陽伯樂姓名也楚辭馬因迴首雖增價桐遇知音已半焦白侍郎士之知己貴知其音特達之分不資於滕口唐文粹喬潭霜鍾賦圭璧無卞和甘與頑石列舜禹無陶堯名隨腐草滅文粹特逹而相知者千載之一遇選四子講徳論騏驥長鳴伯樂昭其能盧狗悲號韓國知其才是以效之齊楚之路以逞千里之任試之狡兎之捷以驗搏噬之用曹子建自試表盧公天下之賢刺史也未聞有所推及葢難其人而重其事今子鬰為首選古所謂知己者正如此耳身在貧賤為天下所不知獨見遇於大賢乃可貴耳若自有名聲又托形勢此乃市道之事又何足貴乎韓文知己如麻不患不顯古之知己者不待來求而後施徳舉賢而已受徳者不待成身而拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚栁文謝過經自底不類以速戾于厥躬負罪引慝書子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦已乆矣禮記史絳縣人年長趙孟問其縣大夫則其属也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗乆矣武之罪也敢謝不才左㐮三十年大叔文子曰臣不佞不能負羈絏以從扞牧圉臣之罪一也二十六年㢘頗肉袒負荆至藺相如門謝罪遂為刎頸之交通鑑周紀范睢相秦魏使須賈於秦睢謂賈汝罪有幾曰擢賈之髪讀賈之罪未足也史李廣曰諸校尉無罪乃我自失道吾今自上簿至幕府西漢本傳車騎將軍王音藉藁請罪王商王立王根皆負斧質謝通鑑漢成帝紀聞有意督過之髙祖紀在大譴大呵之域造請室而請辠賈誼傳南山之竹不能載其罪戾塗顔陳情魏志君子有過則謝以質小人有過則謝以文史記孔子世家知悔經我心之憂日月逾邁若弗云來書子自怨自艾孟子史鄭莊公曰寡人有弟不能和協而使餬其口於四方左隠十一年宣子曰我之懐矣自貽伊戚其我之謂矣宣二年悔禍之延成十三年楚靈王聞羣公子之死曰予殺人子多矣能無及此乎昭十二年魯季桓子病輦而見魯城喟然嘆曰昔此國㡬興矣以吾獲罪於孔子故不興也謂其嗣康子曰我即死若必相魯必召仲尼史記孔子世家悔之折骨東漢李固傳自古但聞漢和畨不聞畨和漢漢兒果能囬意我何惜與和通鑑晋髙祖紀劉穆之曰貧賤常思富貴富貴必履危機今日欲爲丹徒布衣豈可得耶晋安紀唐主謂璟曰吾餌金石始欲益夀乃更傷生晉髙祖紀王敦殺周顗而王導不言導後告其子曰我雖不殺伯仁伯仁由我而死周顗傳羅紹威曰合六州四十三縣鐵不能為此錯也唐昭宗紀傳記鄧艾引弩射中猿母其子為㧞箭以葉塞瘡口艾乃嘆息投弩水中華陽國志集追念徃愆寒心飛魄栁文班姬收泪恨妾身我曾排擯無限人元稹集本朝少好議論古人既老渉世更變徃徃悔其言之過東坡先容子墨者夷之因徐辟而求見孟子孟子史衞鞅因景監求見孝公通鑑周顯王紀有人先㳺師古曰先㳺謂進納之也蟠木根柢輪囷離竒而為萬乗器者以左右先為之容也有人先談則枯木朽株植功而不忘西漢鄒陽傳無先容經即鹿無虞惟入於林中易史布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懐龍逄比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相盼之迹矣明月之珠夜光之璧以闇投人於道衆莫不按劍相盼者何則無因而至前也西漢鄒陽傳莫我為先酈食其傳非有仄室之勢以豫席之也賈誼傳注為之資藉也古今用人必因媒介若行成者無先容也唐張行成傳集無介紹之道安從行乎公卿四子講徳論非有因人無階而進坐致於青雲並陳子昂昔殷之髙宗得良弼於宵寐孰左右者為之先容信天同而神比韓文感二鳥賦不叩而響不介而合栁啓感激自致其間無因吕和叔文孤寒經直徃則違易例獨行踽踽詩史無一日之雅左右之介前谷永傳孤特寡助前漢鄭昌上書訟葢寛饒曰上無許史之属下無金張之託通鑑漢宣紀無公輔一言之薦左右為容之助後馬援傳孤立羣貴之門傍無一言之佐東漢傳記被褐懐玉無由自陳蓽門寒族百代無聞史通集萬族各有託孤雲獨無依陶淵明詩援引乏姻婭韓詩臺閣多官員無地寄一足韓文外無蚍蜉蟻子之援族親鮮少無扳聨之勢於今不善交人無相生相死之友於朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乗機抵􅇖以要權利韓文公集釋言入門無為言之侣出谷罕求聲之援唐文粹天和蒸物燕谷不被其煦一鄒子尚能耻之栁文攀驥逸而無由仰鵬飛而自失駱賓王鄉曲無知己朝端乏親故伊誰為揚雄一薦甘泉賦孟浩然朝無一命之親路無囬眸之舊猶孤根寄不食之田也人人耘耨所不及家家灌溉所不沾堂上百里鬷明無撤器之因門下三千毛遂乏處嚢之地文粹駱谷春深未有容僕短馬瘦言簡行孤為驕閽之所排訶元稹集沈埋經初登於天後入於地入於幽谷幽不明也易子下喬木而入於幽谷孟子史長材廣度沈迹下僚唐張淮傳集判司卑官不堪説未免箠楚塵埃間不脫吏部選可見偶與竒韓集禄不及伐氷政不及専達栁集本朝只有黃楊厄閏年坡詩抑鬱史獨湮鬱兮其誰語史賈誼傳莫大搤掔上音厄下古腕字西漢郊祀志不得舒憤戴盆何以望天司馬遷傳乆挫於刀筆之前陳湯傳困於口舌不能以忠自明李光弼傳贊王忱曰阮籍胸中礨磈故須酒澆之世説集池魚籠鳥有江湖山藪之思潘安仁秋興賦習習籠中鳥舉翮觸四隅左太冲詠史詩想崑山之髙嶽思鄧林之扶疎顧六翮之殘毁雖奮迅其焉如文選禰正平賦愁洽百年苦溢千嵗何異促鱗之逰汀濘短羽之棲翳薈七命朗璞蒙垢不能吐暉連珠看雲一悵望失水任呼號杜詩晴天欲照盆難及貧女如花鏡不知施肩吾詩獨結臣舌喑抑衘寃一辭莫宣乞巧文譬如囚拘闤土一遇和景負墻搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出豈復能乆為舒暢哉栁文懐痛窮天死不瞑目跡卑易枉無路自明劉賔客應似朱門歌舞妓深藏牢閉後房中籠禽日月長白傅集韜舌辱壯心呌閽無助聲恨無羽翼髙飛翔除非呑聲别無赴訴杜牧之聞天無路文粹無徃而不失利經困于石據于蒺藜易狼䟦其胡載㚄其尾詩子田原不遇嵗事君不遇世擯於郷里逐於州部荘子史動而見尤司馬遷傳生則為窮人死則為寃鬼天廣而無以自覆地厚而無以自載蹈陸土而有沉淪之憂立巖墻而有顛壓之患東漢鄧榮傳舉趾觸罘罝動行絓羅網畢網加上機穽在下思飛不得欲鳴不可舉頭畏觸摇足恐墮内獨怖急乍氷乍火東漢趙壹傳呌閽弗聽叩鼓弗聞新唐史徐有功傳傳記上畏鷹鸇下畏網羅説􅁐正諫篇集下堂兮見蠆出門兮見蜂退静黙而莫予知兮進號呼又莫予聞楚辭出門無通路枳棘塞中途左太冲詠史舉手挂羅網動足觸機䧟陳孔璋檄毎愁悔吝作如覺天地窄杜詩出門即有礙誰謂天地寛孟郊絶糧於陳畏於匡毁於叔孫奔走於齊魯宋衛之郊荀卿逃讒於楚廢死蘭陵公不見信於人私不見助於友䟦前㚄後動輙得咎韓文吾盪而趨不知太行之異乎九衢以敗吾車吾放而逰不知呂梁之異乎安流以沒吾舟吾足蹈坎井頭抵木石衝冐榛枳僵仆虺蜴栁愚溪對如䧟還濘動而愈沉劉賓客縱我生羽翼網羅方縶維元㣲之集一列朝士籍遂為世網拘髙有繒繳憂下有䧟穽虞毎覺宇宙窄未嘗心體舒白侍郎捨虎逄豺狼文粹姜子牙少貧賣漿值天凉屠牛賣肉值天熱而肉敗白帖天上猶有礙何况地上身元㣲之集本朝顔杲卿張廵之徒世治則擯斥方外沈抑下僚世亂則委棄孤城韲粉冦手通鑑唐紀司馬温公論毎言處世窮困所向輙值墻谷無一遂者東坡文暗投經我即爾謀聽我囂囂誨爾諄諄聽我藐藐匪用為敎覆用為虐詩子彼非所明而明之宋人資章甫而適諸越越人斷髪文身無所用之大聲不入於里耳道堯舜於戴晉人之前荘子徴羽之操不入鄙人之耳淮南子楚人和氏得玉獻厲王王使玉人相之曰石也王以和為詐而刖其左足及武王又獻之王使玉人相之曰石也王又以為詐而刖其右足和乃抱璞而泣於楚山之下韓非子夫歌採菱發陽阿鄙人聽之不若延路陽局延路陽局鄙歌曲也非夫歌者拙也聽者異也魯人善制冠妻善織屨徃徙於越而大困窮以其所脩而逰不用之鄉淮南子史明月之珠夜光之璧以暗投人於道衆莫不按劍相眄西漢鄒陽傳未遇知己道不同耳通鑑漢明帝紀至音不合於衆聽東漢初賈妃之為太子妃也嘗以妬殺數人武帝怒楊后曰賈公閭有大勲又豈可遽忘之耶妃由是得不廢數誡厲妃妃不知后之助己返以后為構己於武帝更恨之及帝即位賈后不肯以婦道事太后通鑑晉惠紀表龍章於裸壤奏韶舞於聾俗晉書傳記雖濬發於巧心反受嗤於拙目文賦集雖家至而户曉祗以招尤而速累悲楚人之和氏獻寳玉以為石幕中之辯人反以汝為叛臺中之評人反以汝為傾齊王好竽有求仕於齊者操瑟而徃立王之門三年不得入叱曰吾瑟鼓之而能使鬼神上下吾鼓瑟合軒轅氏之律吕客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利於求韓文雖家置一喙以自稱道詬益甚耳居塗泥若螾蛭然雖鳴其聲音誰為聽之栁文古調雖自愛今人多不彈向君投此曲所貴知音難劉長卿本朝我持𤣥圭與蒼璧以暗投人渠不識山谷古調俗不樂正聲公自知詩話自謀不給經我躬不閲遑䘏我後詩子身之不能治而何暇治天下乎荘子史吉不能亢身焉能亢宗左昭元年范獻子曰老夫其國家不能恤敢及王室左昭二十四年魏王曰龜鱉丞豎自救不暇通鑑宋紀本朝先定者可以謀人不先定者自謀常不給東坡思治論記纂淵海卷七十
