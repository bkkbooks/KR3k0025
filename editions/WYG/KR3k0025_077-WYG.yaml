body:
  text: 記纂淵海卷七十七宋潘自牧撰禮儀部禮經嘉㑹足以合禮易乾卦文言謙以制禮繫辭修五禮書舜典有能典朕三禮同上謂天地人天秩有禮自我五禮有庸哉臯陶謨宗伯掌邦禮周官六典三曰禮典以和邦國以統百官以諧萬民周禮大宰六職三曰禮職以和邦國以諧萬民以事鬼神小宰以五禮防萬民之偽而教之中大司徒以吉禮事邦國之鬼神以凶禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民大宗伯夫禮者所以定親疏决嫌疑別同異明是非也記曲禮人有禮則安無禮則危同上失之者死得之者生禮運夫禮必本於天殽於地列於鬼神達於喪祭射御冠婚朝聘夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神禮者君之大柄也夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神夫禮必本於天動而之地列而之事變而從時協於分藝所以講信修睦而固人肌膚之㑹筋骸之束也故禮之於人也猶酒之有糵也並同上禮釋囘増美質措則正施則行其在人也如竹箭之有筠也如松栢之有心也故貫四時而不改柯易葉禮器忠信禮之本也義理禮之文也無本不立無文不行經禮三百曲禮三千其致一也禮也者合於天時設於地財順於鬼神合於人心理萬物者也忠信之人可以學禮並同上司徒修六禮以節民性六禮冠昏喪祭鄉飲士相見王制禮者天地之別也樂記大禮與天地同節三王異世不相襲禮並同上簠簋俎豆制度文章禮之器也升降上下周旋裼襲禮之文也哀公問故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序經解禮之正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圓也夫禮禁亂之所由生猶坊止水之所自來也並同上言游曰敢問禮也者領惡而全好者與子曰然仲尼燕居以之居處有禮故長幼辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也同上禮也者因人之情而為之節文以為民坊者也坊記禮儀三百威儀三千待其人而後行中庸禮國之榦也敬禮之輿也左傳禮身之榦也敬身之基也禮政之輿也夫禮天之經也地之義也民之行也禮上下之紀天地之經緯也民之所以生也並同上殷因於夏禮所損益可知也夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也論語子禮門也孟子禮者因人之情縁義之理而為之節文管子夫禮者忠信之薄而亂之首老子以禮為翼所以行於世也莊子國之命在禮荀子禮者治辨之極也强國之本也禮者法之大分類之紀綱也禮者人道之極禮者以財物為用以貴賤為文以多少為異以隆殺為要並同上實無華則野華無實則史華實副則禮揚子禮其皇極之門乎聖人所以嚮明而節天下也其得中道乎故能辨上下定民志文中子史五帝不相復禮前武帝紀詔王恢曰五帝不相襲禮非故相反也各因時宜也韓安國傳五帝不同禮匡衡傳疏余至太行禮官觀三代損益乃知縁人情而制禮依人性而作儀其所由來尚矣史禮書三代不同禮而王商君傳漢髙祖命叔孫通制禮儀本傳孝文即位有司議欲定儀禮孝文好道家之學以為繁禮飾貌無補於治故罷去之禮書武帝元朔五年詔曰蓋聞𨗳民以禮其令禮官勸學講議洽聞舉遺興禮本紀建武初舊章多闕每有疑議輒以訪純自郊廟昏冠喪紀禮儀多所制定後張純傳曹褒從巡狩岱宗定封禪禮還受詔議立七郊三雍大射養老禮儀本傳中元元年初建三雍明帝即位親行其禮坐明堂而朝羣后登靈臺以望雲物袒割辟雍之上尊養三老五更饗射禮畢帝正坐自講儒林傳唐太宗宴羣臣積翠池酣樂賦詩魏徴賦西漢其卒章曰終籍叔孫禮方知皇帝尊帝曰徴言未嘗不約我以禮唐魏徴傳天子乃覽雲臺之議草泥金之禮舊唐史謂𤣥宗傳記朝覲之禮喪祭之禮鄉飲酒之禮婚姻之禮三皇五帝之所化民者如此家語黄帝與蚩尤戰於涿鹿可為軍禮九物倡教可為賔禮通典本朝咸平元年何亮上書乞定禮樂刑法之書文學兵農之典衣冠器皿郊祀宿衛之制言行録熙寧九年詔黄履李清臣王存詳定郊廟奉祀禮文何詢直孫諤充檢討官檢討歴代沿革以攷得失同上禮書經以禮俗之逆順為一書周禮韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也杜氏曰韓子所見盖周之舊典禮經也左傳子居家不暫捨周禮曰如有用我則執此以往文中子史曹褒受命次序禮事撰次天子至於庶人冠昏吉凶終始制度以為百五十卷後本傳唐太宗時房𤣥齡等因隋禮増為吉禮六十一篇賔禮四篇軍禮二十篇嘉禮四十二篇凶禮十一篇是為貞觀禮髙宗又詔長孫無忌等増之為一百三十卷是為顯慶禮終髙宗世貞觀顯慶二禮兼行而有司臨事逺引古義與二禮㕘考増損之無復定制唐禮樂志開元十四年王嵒請删去禮記舊文而益以今事詔付集賢院議張説以為禮記不刋之書去聖久逺不可改易而唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔徐堅等撰定一百五十卷是為大唐開元禮由是五禮之文始備貞元中太常禮院修撰王涇考次歴代郊廟沿革之制及其工歌祝號而圖其壇屋陟降之序為郊祀十卷元和十一年韋公肅録開元以後禮文損益為禮閣新儀三十卷十三年王彦威為曲臺新禮三十卷又採元和以來王公士民昏祭喪𦵏之禮為續曲臺禮三十卷並同上傳記后蒼東海人説禮萬言號曰后氏曲臺記經典序録注云在曲臺校書著記因以為名集漢家禮儀叔孫通所草制皆隨律令在禮官藏於九闕樊長孫與劉元琰書本朝開寳四年命劉温叟等以開元禮重加損益及書成上之凡二百卷號曰開寳通禮㑹要先是周世宗命聶崇義詳定郊廟器玉崇義因取三禮舊圖攷正同異作新圖二十卷太祖乃命竇儀裁處至當乃頒行言行録慶歴四年呉育上新修太常禮四十卷及慶歴祀儀六十三卷治平二年歐陽修奏已編纂禮書成百卷詔以太常因革禮為名並同上大觀中詔禮當追述三代之意開元禮不足法今親製冠禮沿革付議禮局餘五禮視此編次至是書成續㑹要周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義説耳故臣頃在山林嘗與一二學者考訂其説欲以儀禮為經而取禮記及諸經史詩書所載有及於禮者皆以附於本經之下朱文公奏議朝儀經春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同時聘曰問殷頫曰視周禮大宗伯正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕太右太僕從者在路門之左南面西上司士擯孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右司士左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後朝士詔王儀南鄉見諸侯天揖同姓時揖異姓土揖庶姓司儀班朝治軍涖官行法非禮威儀不行記曲禮天子當依而立諸侯北面而見曰覲天子當宁而立諸公東面諸侯西面曰朝同上天子負斧扆南鄉而立三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面西上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上明堂位朝廷之儀濟濟翔翔少儀子朝有定度衡儀以尊主位管子史髙祖悉去秦儀為簡易羣臣飲争功醉或妄呼拔劔擊柱上患之叔孫通曰臣願召魯諸生與臣弟子共起朝儀於是為綿蕞野外習之㑹長樂宫成竟朝置酒無敢諠譁失禮者帝曰吾乃今日知為皇帝之貴也前叔孫通傳申屠嘉為丞相時鄧通方愛幸居上旁有怠慢之禮嘉曰陛下幸愛羣臣則富貴之至於朝廷之禮不可不肅罷朝召通責曰通小臣戯殿上大不敬當斬本史江左則有荀崧刁協損益朝儀晉禮志唐故事天子以竒日聽政對羣臣李遜奏陛下求治而下有所陳當不時上豈宜限以日唐書故事朔望日皇帝御宣政殿謂之大朝𤣥宗始以朔望陵寢薦食其後遂以為常憲宗實録傳記中庭左右謂之位門屏之間謂之宁注云位者羣臣之列位也宁者人君視朝所宁立處爾雅臨三軍者或懼於朝廷之儀王弼易畧例唐制兩省供奉東西對立者謂之蛾眉班筆談唐末朝士中有人物者時號玉筍班北夢瑣言集展名京之初儀即新館而蒞職文選内謁者承㫖喚仗入東西閣門峨冠曳組者皆趨而進文粹閶闔開黄道衣冠拜紫宸杜詩頗怪朝㕘嬾還家初散紫宸朝晝刻傳呼淺春旗簇仗齊並同上本朝皇帝每視長春殿受朝先宰臣列殿奏事次樞密使次三司次開封府次審刑院次羣臣以次升殿既退進食訖易服御崇政殿或承明殿軍頭引見司奏事於殿皆下次三班院次審刑院次流内銓次刑部次諸司既退後有内臣迎職諸路走馬承受奏事謂之後殿再坐若假日則早御崇政殿閲前殿公事既畢移坐臨軒閲後公事焉㑹要太平興國五年詔宜令有司每内殿起居日即須踧踖入門雍容就列稍涉不謹便同失儀大中祥符八年詔百官自拱辰門入詣崇政殿起居俱不舞蹈其鳴鞭立殿文武班一如長春殿之儀並同上本朝視朝之制文徳殿曰外朝凡不釐務朝臣日赴是謂之常朝垂拱殿曰内殿宰臣以下并武班日赴是謂常起居每五日文武朝臣並赴内朝謂之百官大起居是為三等蓋天子坐朝莫先於正衙於禮羣臣無一日不朝者故正衙雖不坐常㕘官猶立班俟放朝乃退退朝録胡翼之當召對例須就閣門習儀翼之曰吾平生所學即事君之禮也何以習為及進對之日容止可觀言行録入閣史自唐末天子未嘗視朝而入閤之制亦廢唐明宗初即位乃詔羣臣五日一隨宰相入見内殿謂之起居御史中丞李琪以為非唐故事請罷五日起居而復朔望入閤明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閤可復然唐故事天子日御殿見羣臣曰常㕘朔望薦食諸陵寢有思慕之心不能臨前殿前御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官因隨以入見故謂之入閤自乾符以後因亂禮闕故正衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤琪皆不能正也五代史傳記唐制自前殿喚仗入便殿為入閤唐末五代出御前殿為入閤雜志唐室常㕘官每日朝退賜食謂之廊餐自乾符亂離惟月旦入閤賜食退朝録本朝沿唐制以月朔御紫宸殿行入閤之儀㑹要建隆中張涓奏曰按今之乾元殿即唐含元殿也在周為外朝在唐為大朝冬正設仗衛朝萬國在此殿也今之文徳殿即唐宣政也在周為中朝在漢為前殿在唐為正衙凡朔望起居册拜后妃太子諸王三公對四夷君長試制舉人在此殿也今之崇徳殿即唐紫宸殿也在周為内朝在漢為宣室在唐為上閤即隻日常朝之殿也東晉太極殿有東西閤唐制紫宸上閤法即此例也所謂入閤者蓋隻日御紫宸上閤之時先於宣政前殿立黄麾金吾仗俟契勘畢喚仗自東西閤門而入故謂之入閤康定二年宋庠奏近奉徳音詢及入閤故事謹按唐有大明宫宫之正南門曰丹鳯内第一殿曰含元第二殿曰宣政第三殿曰紫宸謂之上閤亦曰内衙按唐制凡天子坐朝必須立仗於正衙或乘輿止御紫宸即喚正衙仗自宣政兩門入是謂東西上閤門也今之宣徳門唐丹鳳門大慶殿唐含元殿也文徳殿唐宣政殿也崇徳殿唐紫宸殿也今或欲求本意即須先立仗於文徳之庭如天子止御紫宸即喚仗自東西閤門入如此則差與舊儀相合並同上元㑹史漢制正月旦天子幸徳陽殿臨軒公卿郎將大夫百官各陪朝賀後禮儀志漢儀有正㑹禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄來庭晉禮志漢以髙祖十月定秦為嵗首至武帝改周夏正於十月朔猶常饗㑹同上髙祖七年長樂宫成諸侯王以下以次奉賀禮畢置法酒以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者前本紀魏武帝正㑹文昌殿用漢儀又設百華燈晋禮志先正月一日有司各宿設夜漏未盡十刻羣臣集到庭燎起火上賀同上正旦設白獸樽有獻直言者則發此樽飲酒詩見正旦類唐正旦冬至受羣臣朝賀而㑹前一日尚舍設御幄於太極殿唐禮樂志集春王三朝㑹同漢京是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外接百蠻東都賦龍輅充庭雲旗拂霓夏正三朝廷燎晢晢撞洪鍾伐靈鼓西京賦當三朝獻夀之辰應五紀啟元之始韓文順宗實録本朝天子之服有通天冠絳紗袍正冬大㑹正月朔受朝則服之言行録頒歴靈臺示四方之更始稱觴紫殿祝萬夀以無疆牋表類漢儀髙㑹方登四海之圖周歴俯頒乃憲百官之象同上宴饗經湛露天子燕諸侯也詩小序以享燕之禮親四方之賔客周禮大宗伯大饗尚腵脩而已矣記郊特牲食饗之禮所以仁賔客也仲尼燕居燕毛所以序齒也中庸燕禮者所以明君臣之義也射義諸侯燕禮之義君席阼階之上居主位也君獨升立席上西面特立莫敢適音敵之義也燕義俎豆牲醴薦羞皆有等差所以明貴賤也同上世之治也諸侯間於天子之事則相朝也於是乎有享宴之禮享以訓㳟儉宴以示慈惠共儉以行禮而慈惠以布政左傳虢公晉侯朝王王享醴命之宥王以上卿之禮享管仲管仲辭楚子入享於鄭九獻庭實旅百加籩豆六品王使周公閲來聘享有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之享以象其徳薦五味羞嘉穀鹽虎形以獻其功王享有體薦宴有折俎公當享卿當宴王室之禮也宋人享趙文子司馬置俎禮也定公㑹齊侯於夾谷齊侯將享公孔丘曰犧象不出門嘉樂不野合乃不果享三夏天子所以享元侯也並同上史漢髙祖過沛置酒沛宫前本紀蔡謨曰燕享有樂所以敬賔也晉禮志齊髙帝幸華林宴集使各效伎藝禇彦囬彈琵琶王僧䖍栁世隆彈琴沈文季歌子夜來張敬兒舞王儉曰臣無所解惟知誦書因誦相如封禪書上笑曰此盛徳之事朕何以堪之南史髙允曰大享者所以定禮儀訓萬國故聖王重之北史開元二十年燕百竂於上陽東州醉者賜以牀褥肩輿而歸相屬於路唐書宣宗宴罷見百官與衛士拜舞遺下果實食物上怪之咸曰歸獻父母及遺小兒自後遇宴敕太官給食兩分同上八珍百品以宴賔客示慈惠也韋彤傳傳記酒旗星酒官之旗也主饗燕飲食雞跖集梁王魏嬰觴諸侯於范臺酒酣請魯君舉觴魯君曰昔者儀狄作酒禹飲而甘之遂疏儀狄曰後世必有以酒亡其國者齊桓公夜半不嗛易牙煎熬燔炙而進之桓公食之而飽至旦不覺曰後世必有以味亡其國者晉文公得南之威三月不聽朝遂推而逺之曰後世必有以色亡其國者楚王登强臺其樂忘死曰後世必有以髙臺陂池亡其國者今主君之尊儀狄之酒也主君之味易牙之調也左白台而右閭須南威之美也前夾林而後蘭臺强臺之樂也今主君兼此四者可不戒與梁王稱善戰國策集中坐溢朱組步欄簉瓊弁江淹萬方朝玉帛千品㑹􅅂簪張説饌玉頒王篚摐金下帝鈞堯樽承帝澤禹膳自天來膳降堯厨畢榴開舜酒紅藂觴祝堯夀合鼎獻湯厨並同上本朝凡大宴有司預於殿庭設山樓排場為羣仙隊仗六蕃進貢九龍五鳳之狀司天雞唱樓於其側殿上陳舒繡帷帟垂香毬設銀香獸於楹内藉以文茵宰臣使相㕘政樞密至給諌舍人待制中室遥郡團練使以上坐於殿下卿監至郎中以上坐於朶殿京官任館閤職事諸蕃進奉使坐於兩廊使相以上坐繡墩參政以上用二蒲墩加􅄢毯自朶殿以下皆排縁氈條席㑹要建隆四年宴宰臣王祐等於紫雲樓下同上封禪經嵗二月東巡狩至於岱宗柴望秩於山川書舜典時邁巡狩告祭柴望也詩小序懐柔百神及河喬嶽詩周頌巡狩而祀四岳河海也詩序於皇時周陟其髙山嶞山喬嶽允猶翕河周頌因名山升中於天記禮器升中於天而鳳凰䧏龜龍假同上子古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懐氏虙羲神農炎帝並封泰山禪云云黄帝封泰山禪亭亭顓帝帝嚳堯舜並封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪管子齊桓公欲禪封管仲曰古之禪封鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物不召而自至者十有五焉桓公乃止同上封禪之費非古也徒以夸天下其秦漢之侈心乎文中子史古者封禪為蒲車惡傷山之草木史記封禪七十二君惟黄帝得上泰山封前郊祀志秦始皇上泰山立石封祠祀禪梁父刻所立石史本紀司馬相如家居茂陵天子曰相如病甚可悉徃取其書使所忠徃而相如已死問其妻對曰未死時為一卷書曰有使來求書奏之其遺禮書言封禪事所忠奏焉天子異之前本傳自得汾隂寳鼎上與公卿諸生議封禪尚書周官王制之望祀射牛事注云射牛示親殺也史武帝紀齊人丁公年九十餘曰封者合不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣元封元年上還登封泰山注云王者功成治定告成功於天刻石紀號有金策石函金泥玉檢之封焉並同上天子既聞公孫卿及方士之言黄帝以上封禪皆致怪物與神通遂東幸緱氏祠登中岳太室聞若有言萬嵗云史封禪書天子至梁父封泰山下東方如郊祀太一之禮封廣丈二髙尺其下則有玉牒書書秘禮畢天子獨與侍中上泰山亦有封其事皆禁禪泰山下址東北肅然山其夜若晝有白雲起封中後有星孛於三能音台有司言陛下建漢家封禪天其報徳星云夏旱公孫卿曰黄帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎並同上建武三十年羣臣上言宜封禪詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放何事汙七十二代之編録後光武紀三十二年正月上齋夜讀河圖㑹昌符曰赤龍之九㑹命岱宗乃詔松等復案索河雒䜟文言九世封禪事者松等列奏乃許焉是月辛卯柴登封泰山甲午禪於梁隂以承靈瑞以為兆民郊祀項威曰封泰山告太平升中和之氣於天祭祀志勒功岱岳登封告成晉禮志闕皇代之上儀塞靈祇之欵望同上檢玉岱宗今其時也宋書梁天監八年時有請封㑹嵇禪國山者許懋建議以為舜柴岱宗是為巡狩而鄭引孝經鈎命决云封於泰山考績柴燎禪於梁甫刻石紀號此緯書之曲説非正經之通義也若聖主不須封禪若凡主不應封禪封禪之禮由主好名於上而臣阿㫖於下也南史隋文帝時朝野皆請封禪詔曰以薄徳而封名山用虛言而干上帝非朕攸聞通鑑封禪者髙厚之謂也天以髙為尊地以厚為徳増泰山之髙以報天也厚梁父之基以報地也隋禮儀志唐髙宗乾封元年詔曰古今之制文質不同今封禪以玉牒金繩而瓦樽匏爵秸席宜改從文於是昊天上帝褥以蒼地祇褥以黄配褥皆以紫而尊爵亦更焉天子祀昊天上帝於山下之封祀壇以髙祖太宗配如圓丘之禮親封書册置石䃭聚五色土封之明日封書册於登封壇又眀日祀皇地祇於社首山之降禪壇如方丘之禮以太穆皇后文徳皇后配乃詔立登封降禪朝覲之碑名封祀壇曰舞鶴臺登封壇曰萬嵗臺降禪壇曰景雲臺以紀瑞焉禮樂志天子乃覽靈臺之義草脩泥金之禮封日觀禪雲亭舊史𤣥宗紀贊𤣥宗封禪畢張説詭言聖心誠懇宿齋山下昨夜則祥風助樂今朝則卿雲引燎舊史謝偃撰玉牒貞紀以勸封禪本傳傳記黄帝五十三載有草生於庭佞人入則指之名曰屈軼鳳凰巢於阿閣麒麟遊於苑囿始興封禪之禮通歴王者易姓而起必并封泰山何報告之義也始受命之時改制應天天下太平功成封禪告太平也白虎通封泰山者説山上有金匱玉策能知人夀長短風俗通集爰登方岳封禪勒成文選方將増泰山之封加梁父之事鳴和鑾揚雅頌司馬相如通西南夷書脩禮地祇謁欵天神勒功中岳以彰至尊相如封禪書封神丘兮建隆碣班固銘設壇場於山下受羣方之助祭射封燎於山上冀一獻之通神𤣥宗太山銘禮官不戒而備軍政不整而輯天姥練日雨師洒道六甲案隊八陣警蹕千旗雲引萬㦸林行原野為之震動草木為之風生歴郡縣垂徭俗問百年舉百祀興墜典葺闕政攸徂之人室家相慶張説封禪頌登岱勒封禪云記崇燕公集紀泰山之封鏤白玉之牒鋪張對天之宏休揚厲無前之偉績編之乎詩書之册而無愧措之乎天地之間而無虧韓文宜定樂章以告神明東巡泰山奏功皇天具著顯庸明示得意同上佳氣浮丹谷榮光泛緑坁李義府詩本朝祥符中先是王欽若以封禪當得天瑞之說說上請以人力為天瑞且曰河圖洛書果有此乎聖人以神道設教耳上意未决一日問杜鎬鎬老儒不測上㫖漫應曰此聖人以神道設教耳自是屢稱天書降而封禪矣言行録耕籍經春籍田而祈社稷也詩小序甸師掌率其屬而耕耨王籍周禮擇元辰天子親載耒耜帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推記月令耕籍然後諸侯知所以敬樂記昔者天子為籍千畝冕而朱紘躬秉耒諸侯為籍百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛祭義天子親耕於南郊諸侯耕於東郊以共粢盛並同上天子親耕粢盛秬鬯以事上帝表記史漢文帝詔夫農天下之本也其開籍田朕親率耕以給宗廟粢盛前本紀景帝詔朕親耕以為天下先本紀明帝詔朕親耕籍田以祈農事後本紀章帝籍田儀正月始耕常以乙日祀先農及耕於乙地本紀耕車有三一曰芝車乘耒耜之服上親耕所乘輿服志晉武帝耕於籍田詔曰方今陽春養物東作始興朕親率王公卿士耕籍千畝本紀又詔近臣耕籍有慕古之名無供祀訓農之實今脩千畝之制當與羣公卿士躬稼穡之艱難帥先天下同上金根車天子親耕所乘輿服志貞觀三年太宗將親耕曰書稱平秩東作而青輅黛耜順春氣也五方位少陽田宜於東郊乃耕於東郊唐禮樂志乾元二年上耕籍田有司進耒耜加以雕飾上曰耒耜農夫所執豈宜如此之麗命去之既而耕之九推乃止通鑑明皇欲重勸耕籍遂推耕五十餘步盡數乃止籍田之榖納之神倉以擬耕耨禮樂志傳記宣王即位不脩籍於千畝虢文公諌不聽戰於千畝王師敗績於姜氏之戎國語集農祥晨正土膏脈起乘鸞輅而駕蒼龍介馭間以剡耒耜躬三推於天田脩帝籍於千畝供禘郊之粢盛必致思乎勤已兆人動於疆埸咸懋力以耘耔張平子東京賦躬稼以共粢盛所以致孝也勸耕以足百姓所以固本也潘岳賦紺轅綴於黛耜親率羣后耕於千畝之籍司農撰播植之器挈壺掌升降之節宫正設門閭之蹕青壇蔚其岳立翠幕黕以雲布降靈壇撫御耦並同上祥正而青旗肅事土膏而朱紘戒興將使杏花菖葉耕穫不愆清􅎌泠風述遵無廢文選汜勝之書望杏花落復耕之耕吕氏春秋菖者草之先者也於是始本朝景徳四年孫奭上言按月令云天子以元日祈榖於上帝乃擇元辰躬耕帝籍先儒皆云元日上辛郊天也元辰謂然後擇吉亥享先農而耕籍也伏望改用來年正月上辛後亥日享先農從之㑹要明道二年帝乘玉輅適耕所張士遜奏禮畢帝曰朕志千畝卿等固請遂耕十二有跬詔宰臣吕夷簡㕘政宴殊編籍田記並同上田獵經王用三驅失前禽易比卦田獲三狐得黄矢解卦田獲三品有功也巽卦文王不敢盤於逰田書無逸蒐田以時詩小序因田獵而選車徒焉詩注徒御不驚大庖不盈詩發彼小豝殪此大兕詩大田役以旗致萬民而治其徒庶之政令周禮大司徒凡四時之田前期出田法於州里鄉師若大田獵則萊山田之野及弊田植虞旗於中致禽而珥焉山虞若大田獵則萊澤野及弊田植虞旌以屬禽澤虞大田之禮簡衆也大宗伯凡四時之大甸獵祭表貉則為位肆師木路建大麾以田巾車中春教振旅遂以蒐田火弊獻禽以祭社中夏教茇舍遂以苗田車弊獻禽以享礿中秋教治兵遂以獮田羅弊致禽以祀祊中冬教大閲遂以狩田大獸公之小禽私之獲者取左耳徒弊致禽饁獸於郊入獻禽以享烝大司馬天子諸侯無事則嵗三田一為乾豆二為賔客三為充君之庖無事而不田曰不敬田不以禮曰暴天物記王制春蒐夏苗秋獮冬狩皆於農隙以講事也左傳蒐狩以習用戎事禮之大者也穀梁傳春曰田夏曰苗秋曰蒐冬曰狩同上子先王之法也豺未祭獸罝罘不通於野鷹隼未擊羅網不張於臯文子史春振旅以蒐夏茇舍以苗秋治兵以獮冬大閲以守前志司馬相如嘗從上至長楊獵是時天子方好自擊狶豕馳逐野獸相如因上疏諫本傳元帝幸長楊射熊館布車騎大獵本紀損上林池禦之官廢騁望弋獵之事後循吏傳謂光武明帝車騎校獵上林本紀太宗獵於洛陽苑有羣豕突出林中上引弓四發殪四豕有豕突前及馬􅌱唐儉投馬搏之上笑曰何懼之甚對曰陛下神武豈復騁雄心於一獵乎上大悦為之罷獵通鑑先天二年幸新豐獵於驪山之下魏知古上詩千韻以諫手制答曰余向温陽觀省風俗時因暇景掩渭而畋開三面之羅展三驅之禮無情校獵但慕前禽卿有箴規輔朕不逮今賜物五十段以申勸奬舊史傳記宵田為獠公田為獵爾雅獵捷也言以捷取之蔡邕月令季秋之月天子乃田獵閑習五兵因以順時取禽同上王者所以田狩者何也為田除害也上以供宗廟下以簡示衆也白虎通文王齋三日乘田車駕田馬田於渭陽文韜唐髙祖幸涇陽華池校獵謂羣臣曰今日樂乎蘇代長進曰陛下遊獵薄廢萬㡬不滿十旬未為大樂通典集車騎雷起殷天動地縁陵流澤雲布雨施生貔豹搏豺狼手熊羆足野羊司馬相如上林賦歴吉日以齋戒襲朝服乘法駕建華旗鳴玉鸞游於六藝之囿馳騖乎仁義之塗同上今陛下好陵險阻射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵雖有烏獲逢䝉之伎不得用豈不殆哉諌獵書豈徒欲淫覽浮觀馳騁秔稻之地周流梨栗之林蹂踐芻蕘誇詡衆庶盛􅀈玃之收多麋鹿之獲哉長楊賦鳥驚觸絲獸駭值鋒機不虛掎弦不再控矢不单殺中必疊雙颮颮紛紛矰繳相纒風毛雨血灑野蔽天班西都賦窮虎奔突狂兕觸蹶許少施巧秦成力折掎僄狡扼猛噬天子乃登屬玉之館歴長楊之榭覽山川之體勢觀三軍之殺獲原野蕭條目極四裔禽相鎮壓獸相枕藉然後收禽㑹衆論功賜胙並同上若乃順時節而蒐狩簡車徒以講武則必臨之以王制考之以風雅歴騶虞覽駟驖嘉車攻采吉日禮官整儀乘輿乃出於是發鯨魚鏗華鍾登玉輅乘時龍鳳蓋棽麗和鸞玲瓏天官景從祲威盛容山靈䕶野屬御方神雨師汎灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃霓旌旗拂天東都賦然後舉鋒伐鼓申令三驅輶車霆激驍騎電騖由基發射范氏施御弦不睼禽轡不詭遇飛者不及翔走者不及去指顧倐忽獲車已實樂不極盤殺不盡物馬踠餘足士怒未㳿先驅復路屬車按節同上僵禽斃獸爛若磧礫西京賦上無逸飛下無遺走同上荷垂天之篳張竟埜之罘文選長篳掩壑大羅披澤魯都賦楚王獵於雲夢鼓聲如雷弓聲如霹靂圍内九虎皆下庾信賦箭不麗於六麋弓無驚於九虎同上本朝太平興國二年臘日有司請備冬狩之禮上語近臣曰順時蒐狩為民除害非為樂也寳訓慶歴五年李東之上言祖宗校獵之制所以順時令而訓戎事也乃詔樞密院考詳先朝校獵制度以聞通考射禮經侯以明之注云當行射侯之禮以眀善惡之報書益稷終日射侯不失正兮詩猗嗟發彼有的以祈爾爵賔之初筵敦弓既堅四鍭既鈞舍矢既鈞序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮行葦王大射則共虎侯熊侯豹侯設其鵠周禮司裘鄉師以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞鄉大夫春秋以禮㑹民而射於州序州長以賔射之禮親故舊朋友大宗伯凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節樂師燕射率射夫以弓矢舞同上凡大射率瞽而歌射節太師凡射事飾中舍筭執其禮事太史凡射共獲旌司常大射則合諸侯之大耦大司馬以射法治射儀王三獲三容諸侯二獲二容卿大夫一獲一容射人王大射則以貍步張三侯同上射則贊張侯以旌居乏而待獲服不氏秋合諸射諸子張皮侯而棲鵠則春以功梓人祭侯之禮以酒脯醢其辭曰唯若寧侯毋若女不寧侯不屬於王所故抗而射女强飲强食詔女曽孫諸侯百福同上元日習射上功記月令左射貍首右射騶虞而貫革之射息也樂記射有似乎君子失諸正鵠反求諸其身中庸古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮射義故射者進退周旋必中禮内志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀徳行矣射者所以觀盛徳也古者天子以射選諸侯卿大夫士射者男子之事也因而飾之以禮樂也諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂其中多者得與於祭曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御於君所以燕以射則燕則譽孔子射於矍相之囿蓋觀者如堵牆射之為言繹也或曰舍也繹者各繹已之志也天子之大射謂之射侯射中則得為諸侯故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也射者仁之道也射求正諸己已正而後發發而不中則不怨勝己者反諸己而已矣並同上君子無所争必也射乎揖讓而升下而飲其争也君子論語射不主皮為力不同科古之道也同上子射有張布謂之侯侯中者謂之鵠鵠中者謂之正正方二尺正中者謂之槷槷方六寸孔叢子史大射之禮自天子降及庶人三代之道也前吾丘夀王傳愚聞聖王合射以明教矣未聞弓矢之為禁也同上明帝臨辟雍行大射之禮後本紀每享射禮畢正坐自講雖闕里之化矍相之事誠不足言樊凖傳疏上賜王公以下射楊素箭為第一上手以外國所獻金精盤價直鉅萬以賜之隋書貞觀五年賜羣公大射於武徳殿唐書傳記宣帝時行射禮博士后蒼為之辭至今記之曰曲臺記七畧曲臺天子射宫也天子所以親射何助陽氣達萬物也白虎通天子射熊諸侯射麋大夫射虎豹天子射百二十步諸侯射九十步大夫射七十步士以五十步為節侯者以布為之何布者用人之始也本正則末正矣名之為侯者何諸侯有不朝者則當討之君子重同類不忍射之故畫獸射之並同上本朝淳化五年詔曰古者大射之禮其廢已久宜令有司檢討故事草定儀禮以聞遂采三代以降及唐開元通禮為大射圖其儀皇帝改服武弁射於殿下布七埒於殿下王公已下依品位而射開樂懸於東西廂中設熊虎等侯陳賞物於東階以賚能者設豐爵於西階以罰否者太宗覽而嘉之㑹要咸平四年宴射後苑詔直館各賦射弓詩同上鄉飲酒經魯侯戾止在泮飲酒既醉㫖酒永錫難老詩泮水以禮屬民而飲酒於序以正齒位一命齒於鄉里再命齒於父族三命而不齒周禮黨正鄉飲酒之禮所以明長㓜之序記經解鄉飲酒之禮廢則長㓜之序失而争鬬之獄繁矣同上鄉飲酒之義主人拜迎賔於庠門之外入三揖而後至階三讓而後升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也鄉飲酒儀尊有𤣥酒貴其質也羞出自東房主人共之也洗當東榮主人之所以自潔而以事賔也賔主象天地也介僎象隂陽也三賔象三光也讓之三也象月之三日而成魄也四面之坐象四時也主人者尊賔故坐賔於西北而坐介於西南以輔賔賔者接人以義者也故坐於西北主人者接人以仁以徳厚者也故坐於東南而坐僎於東北以輔主人也祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉飲酒之節朝不廢朝暮不廢夕吾觀於鄉而知王道之易易也烹狗於東方祖陽氣之發於東方也洗之在阼其水在洗東祖天地之左海也尊有𤣥酒教民不忘本也並同上史成帝行鄉飲酒禮有雉蜚集於庭前本紀伏湛奏行鄉飲酒禮後本傳晉武帝臨辟雍行鄉飲酒之禮晉禮志鄉飲禮入門升階折俎執爵祭酒啐酒執觶奠觶升歌間歌唐禮志州貢明經秀才進士孝弟者行鄉飲酒禮主人賔介之儀畧倣於古同上貞觀六年詔天下行鄉飲酒禮唐本紀唐明宗拜李愚為相愚請州縣貢士作鄉飲酒禮時以其迂濶不用五代史傳記鄉飲酒之禮無算樂賔出奏陔儀禮裴耀卿上疏曰切見鄉飲酒禮頒於天下比來惟貢舉之日畧用其儀閭里之間未通其事請令天下轉次造習每年各備禮儀准令式行稍加觀奬通典集臣在州日與百姓勸道行禮奏樂歌至白華華黍由庚等章言孝子養親及羣物遂性之義或有泣者文粹裴耀卿本朝淳化三年詔有司講求鄉飲酒故事命學士承㫖蘇易簡等依古樂章作鹿鳴南陔嘉魚崇丘關雎鵲巢之詩後不果行㑹要投壺經主人請曰某有枉矢哨壺請以樂賔記投壺司射請賔曰順投為入比投不釋勝飲不勝者命弦者曰請奏貍首命酌曰請行觴酌者曰諾當飲者跪奉觴曰賜灌勝者跪曰敬養正爵既行請立馬一馬從二馬以慶慶禮曰三馬既備請慶多馬壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮並同上晉侯以齊侯宴晋平公齊景公中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坁寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之左傳史祭遵為將取士皆用儒術對酒設樂必雅歌投壺後本傳陳留邯鄲淳奏投壺賦魏文帝以為博士給事中賜帛千疋魏志石崇有妓善投壺隔屏風投之晋本傳傳記玉女投壺每投一投千二百裊設有入不出者天為之􅦍噓裊而脱誤不接者天為之笑廣記雉歌曲有驍壺者蓋投壺樂也隋煬帝所造以投壺有躍矢為驍壺武帝時郭舍人善投壺以竹為矢不用棘云西京雜記杜詩云投壺郭舍人薛眘惑者善投壺龍躍隼飛矢矯無遺箭置壺於背後却反矢以投之百發百中僉載投壺實以豆恐其矢躍也今則以躍為貴謂之驕乃有倚竿帶劒狼壺豹尾龍首之名其妙者有蓮花驕又為小障置於外投之顔氏家訓本朝投壺可以治心可以脩身可以為國可以觀人何以言之夫投壺者不使之過亦不使之不及所以為中也不使之偏陂流㪚所以為正也觀夫臨壺荷矢之際性無麤密莫不聳然恭敬志存中正雖不能久可以習焉豈非治心之道歟一矢之失猶一行之虧也豈非脩身之道歟兢兢業業謹終如始豈非為國之道歟君子之為之也確然不動其心儼然不改其容未得之而不懾既得之而不驕小人之為之也俯身引臂挾巧取竒茍得而無愧豈非觀人之道歟世傳投壺皆以竒雋難得者為右是亦投瓊探䦰之類耳非古禮之本意也余今更定新格増損舊圖以精密者為右偶中者為下使夫用機徼倖者無所措手焉司馬文正公邵康節與李君錫投壺君錫末箭中耳曰偶爾中耳康節應聲曰㡬乎敗壺坐客以為的對聞見録記纂淵海卷七十七
