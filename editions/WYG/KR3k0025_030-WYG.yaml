body:
  text: 記纂淵海卷三十宋潘自牧撰職官部御史臺經御史掌邦國都鄙及萬民之治令以賛冢宰周禮史太㣲三光之廷匡衛十二星藩臣西將東相南四星執法中端門史天官書御史大夫秦官佐上卿銀印青綬掌副丞相注云位次上卿職官周昌為御史大夫徙為趙相髙祖持御史大夫印弄之曰誰可以為御史大夫者熟視趙堯曰無以易堯遂拜御史大夫叔孫通起朝儀㑹長樂宫成置酒御史執法舉不如儀者輒引去張蒼秦時為御史大夫主柱下方書張湯為御史大夫舞文巧詆以輔法張敞弟武為梁相敞使吏送至關戒吏問武武曰梁國大都吏民凋敝且當以柱後惠文彈治之耳注應劭曰法冠也以纚裹鐵柱卷秦制執法服今御史服之謂之解廌貢禹為御史大夫潔白亷正經術通明有伯夷史魚之風華隂守丞嘉上封事言御史宰相之副九卿之右不可不選谷永上疏言御史大夫内承本朝之風化外佐丞相統理天下得其人則百姓欣嘉百僚恱服不得其人則王功不興朱博奏言髙祖時御史大夫位次丞相典正法度以職相叅縂領百官上下相監臨又曰臣願盡力以御史大夫為百僚率御史府中列柏木常有野烏數千棲宿其上晨去暮來號曰朝夕烏前漢書北魏崔暹為御史中尉上書移牒索御史監選不與及暹為僕射還索御史宋游道判云崔僕射昔在憲司籠架北省今居禮閣控制南司遂不與北史韋思謙進御史大夫性蹇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶奈何屈以狎之御史大夫李承嘉嘗召諸御史責曰近日御史言事不諮大夫禮乎蕭至忠曰故事臺中無長官御史人君耳目比肩事主得自彈事若先白大夫而許則彈大夫不知白誰也肅宗詔御史臺欲彈事不須進狀仍服豸冠唐書傳記御史周官有之戰國亦有御史皆記事之職至秦漢為糾察之任所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢謂之御史臺亦謂之蘭臺寺梁及後魏北齊或謂之南臺後周曰司憲隋唐皆曰御史臺龍朔改憲臺咸亨復故舊制鞠案禁繫委大理貞觀中中丞李乾祐以囚自大理徃來滋其姦乃奏於臺中置東西二獄以自繫劾開元復罷武后改御史臺為肅政臺置左右左以察朝廷右以澄郡縣二臺迭相糾正龍朔改為左右御史臺睿宗詔二臺並察京師太極元年廢右臺通典御史大夫司寺在司馬門内門無墊門制樹用梓板不起郭邑題曰御史大夫司寺漢官儀至徳後諸道使府叅佐皆以御史為之謂之外臺職林御史為風霜之任彈糾不法百僚震恐官之雄峻莫之比焉貞觀初以法理天下尤重憲官故御史最為雄要通典臺印隨從印左巡印右巡印監倉印監庫印監察印出使印凡八印唐臺義自唐初來歴五院惟二人李尚隠張延賞五院謂監察殿中侍御中丞大夫也南部新書御史故事大朝㑹則監察押班常叅則殿中知班入閣則侍御監奏含元殿最逺用八品宣政殿其次用七品紫宸殿最近用六品殿中得立五花塼綠衣用紫案褥之類號為七貴唐國史補御史臺臨制百司糾繩不法事簡則風憲自肅事煩則紀綱轉輕御史臺紀綱之地唐㑹要事總朝綱職司天憲中朝執憲之司四海繩違之地霜威掃地風憲收聲五代㑹要桂林風俗日日食蛙有來中朝為御史者朝士戯之曰汝之居非烏臺乃蛙臺也承平舊纂御史臺門北開蓋取肅殺就隂之義按鄴都故事云御史臺在宫城西南其門北開又譚賓錄曰或云是隋初移都之時兵部尚書李圓通兼御史大夫欲向省便近故開北門裏行給事員外為合口椒殿中曰生薑侍御史為脆梨漸入佳味賈言忠監察本草集簡上霜凝筆端風起崔篆箴烏臺峻秩望總鐵冠蒼珮崇班威髙石室朱帷霧徹初停州縣之勞白簡霜飛宜屏權豪之氣蘇烟制御史府不以一職名官蓋總察三司典掌衆政元㣲之行髙允恭制漢家授署御史多以立秋蓋以風霜始嚴鷹隼初擊杜牧制稜稜直指烈烈方書蒼玉鳴珮繡衣登車元希聲詩御史府自中執憲暨察視之官皆顯秩也白集總憲度於朝端植風聲於天下栁文秦漢以降御史府莫不用剛果勁正之士維持紀綱季代而還埋輪破柱之徒絶不復出元㣲之行裴洼制前代有埋輪都亭之奏唐朝有戴豸正殿之劾杜牧行李蔚制彰善癉惡激濁揚清景雲詔糾慝繩違謬掌天憲文選盛府持青槖殊章動繡衣風連臺閣起霜就簡花飛蘇味道本朝御史大夫止為兼官中丞除正員外有知雜一員副中丞判臺事其屬有三院一曰臺院侍御史隷焉二曰殿院殿中侍御史隷焉三曰察院監察御史隷焉天禧中始置言事御史元豐三年李定請復六察於是以御史専領六察其後大正官名下除大夫以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史㑹要及四朝志仁宗宣諭宰臣曰諫官御史必用忠厚淳直通世務明治體之人以革浮薄之弊㑹要王素在憲臺風力甚勁時號獨擊鶻言行錄劉剴為御史言事貶蘇軾遺以詩有烏府先生鐵作肝之句世因目為鐵肝御史四朝國史白簡威猶凛青山興已濃柏臺霜氣夜凄凄風動琅璫月向低東坡擊彊如摧枯食檗不知苦御史威降霜行私不容粟山谷御史中丞經小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁周禮史漢元帝擢陳咸為御史中丞總領州郡奏事課第諸御史内執法殿中公卿以下皆畏憚之谷永疏曰薛宣前為御史中丞執憲轂下不吐剛不茹柔舉錯時當漢書光武特詔御史中丞與司𨽻校尉尚書令㑹並專席而坐故京師號曰三獨坐後漢書陳謙拜中丞執憲奉法多所糾正續漢書傅𤣥為中丞每有奏劾或值日暮則捧白簡整襟帶坐以待旦於是貴遊懾伏臺閣生風崔鴻為中丞明法直繩無所阿避周處為中丞正繩直筆權豪震肅晉書宋荀柏子為中丞立朝正色内外憚之南史江淹兼中丞彈劾不避權勢明帝曰自宋以來又復有嚴明中丞君今日可謂近世獨步梁中丞給威儀十人其八人武冠絳韝執青儀囊在前張緬為中丞號為勁直梁武帝遣圖其形於臺省以厲當官後魏御史中丞其出入千步清道與皇太子分道王公遜避李彪為中丞豪右屏跡髙祖謂羣臣曰吾之有李生猶漢之有汲黯也北史唐崔從氣貌孤峻立朝彈奏不避裴度為中丞用以自代髙元裕為中丞風望崚整武元衡遷中丞徳宗曰真宰相持平無私綱條悉舉狄兼謩遷中丞帝曰御史臺朝廷綱紀一臺正則朝廷治朝廷正則天下治牛僧孺遷中丞按治一法内外澄肅魏謩遷中丞發杜中立奸贓權戚縮氣舒元褒上疏曰元和長慶中中丞呵道不過半坊今乃至兩坊謂之籠街喝道但以崇髙自大盧奕懐慎之少子也與兄奐齊名父子三人為中丞清節不易唐書傳記周官小宰即御史中丞之任也漢御史有兩丞一曰中丞亦謂御史執法在殿中蘭臺掌圖籍秘書外督部刺史内領侍御史十五人受公卿奏事舉劾按章哀帝更中丞為御史長史光武復改中丞魏初改宫正後復故通典晉宋以中丞為臺主職林齊梁皆謂之南司後魏為御史中尉後周有司憲中大夫隋省中丞通典置大夫為臺主以治書侍御史二人代中丞之任唐髙宗復號中丞龍朔改司憲大夫咸亨復大事奏裁小事専達職林漢中丞故二千石為之或選侍御髙第執憲中司通典注江左中丞雖一時髦彦然膏粱名士猶不樂宋丞銅印墨綬進賢兩梁冠佩水蒼玉介幘絳朝服通典中丞周淩果毅有才孔顥有才能果勁不撓可御史中丞事山公唘事蘭臺之官監國得失論衡集辟車要秩非徳靡升專席雄班惟賢是屬唐制南憲右掖至於中臺我朝之極選元稹制提糾謬綱白集牛僧孺制執憲凖繩之司所以提振紀綱端肅内外薛存誠制有守者可以執憲無私者可以閑邪栁公綽制國朝自王義方後曠數百年憲署之舉咸無廢職然未有危言激論如此之章灼者也故權右震竦朝野喧騰傳冩彈文為之紙貴徐集江文蔚志煌煌天文宿星是環爰立執法其輝有煥執朝之綱秉國之憲鷹揚虎視肅清違慢憂責有在繩亦必直良農耘穢勿使能殖無禮是逐安措羽翼傅咸箴白簡光朝列彤騶出禁中褚亮本朝自中丞以下掌糾繩内外百官姦慝肅清朝廷綱紀大事則廷辯小事則奏彈兩朝志故事三院御史言事必先白中丞自劉子儀為中丞始榜臺中今後御史有言不須先白中丞至今如此歸田錄孔道輔為中丞論廢郭后事天下聳聞風采張昇為中丞仁宗曰張昇真可任風憲胡宗愈元祐中為中丞首進六事曰端本正志知難加意守法畏天王舉正論張堯佐一日領四史又狄青為樞密使力爭不能奪因請改言職上稱其得風憲之體慶歴二年召御史中丞賈昌朝侍講故事臺丞無在經筵者仁宗以昌朝長於講説特召之曏自禁林入都憲席胡文恭行張方平制憲席持綱亦資糾正栁植制侍御史史嚴延年遷侍御史劾霍光專廢立前漢書陳翔遷侍御史元日朝賀梁冀威儀不整請收理罪時人竒之种暠順帝時為侍御史中常侍髙堯受勅迎太子不賫詔書暠横劒當車罵曰御史受詔監䕶太子太子國之儲副常侍無一尺詔書安知非挾奸邪今日之事有死而已堯不敢爭桓典為侍御史常乗驄馬京都畏之為之語曰行行且止避驄馬御史張綱為侍御史安帝遣八使按行風俗綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸遂奏大將軍梁冀京師震􅋺楊秉拜侍御史京師咸稱其有宰相之才鄭據為侍御史上疏曰斗筲小吏擢在案視之官分當刺邪矯枉大駕屬車八十一乗皆尚書御史所載最後一乘懸豹尾注云侍御史載之後漢書劉暾轉侍御史武庫火尚書郎郭彰率百人自衛暾正色詰之彰怒曰我能截君角也暾勃然曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言晉本傳栁彧為侍御史上嘉之曰栁彧正色之士國之龜寳隋書唐李素立髙祖令授七品清要官所司擬雍州司户上曰此官要而不清擬秘書郎上曰此官清而不要遂授侍御史栁範為侍御史吳王恪好田獵範彈治之太宗曰權萬紀不能輔導恪罪當死範曰房𤣥齡事陛下猶不能諫止田獵豈宜獨罪萬紀王志愔為侍御史以剛鷙為治所居人吏畏讋呼為皂鵰温造授侍御史夏州節度李祐違詔進馬造彈之祐趨出待罪股戰流汗謂人曰吾夜踰蔡州城擒吳元濟未嘗心動今日膽落温御史王𢎞義遷侍御史始賤時求傍舎𤓰不與乃騰文言園有白兎縣集衆捕逐畦蓏無遺内史李昭徳曰昔聞蒼鷹獄吏今見白御史唐書傳記周御史亦謂之柱下史秦改為侍御史漢因秦制置十五員六典後漢亦有之掌察舉非法受公卿郡吏奏事有違失舉劾之二漢所掌五曹令曹印曹供曹尉馬曹乘曹豹尾之内便為禁省魏八人晉九人宋齊十人梁陳皆九人居曹糾察不法隋八人唐四人侍御史號臺端他人稱曰端公其知雜事者謂之雜端最為推劇食坐之南横設榻謂之南床例不出累月遷登南省故號為南床百日通典建中元年以侍御分掌公廨推彈自是雜端之任輕矣職林後漢侍御史威烈赫奕莫之敢犯自漢以來皆朝服法冠太極以前二臺朝列之制侍御史與殿中隨仗入分居兩行通典侍御史職有六一曰奏彈二曰三司三曰西權四曰東權五曰贓賣六曰理匭大事則冠法冠衣朱衣纁裳白紗中單以彈之小事常服而已六典獬豸獸主觸不直故執憲者以為冠六典注每出入行步侍御史在柱裏殿察兩院在柱外唐宣宗欲與韋宙好官拜侍御史職林侍御史為脆梨互見御史臺類集周興鐵柱漢制繡衣簪白筆以繩違取驄馬而明目故能出則督察萬里入則糾劾百僚司馬子瑞爰有貞柏徙植清臺麝條霜勁蠶葉風開始逢鵲喜終見烏來杜易簡侍御史㕔雙柏贊榮服繡衣寵簮白筆持斧埋輪豸角分輝孫樵御史吾耳目官也非清明勁正不泥不撓者安可使辯淑慝振紀綱廣吾之聰明焉白集王申伯制超升憲簡袁幹制峩峩鐵冠皛皛銀印元㣲之制匡拂時病磨切貴近杜牧髙元裕制鷙鳥得秋氣法星懸火旻劉禹錫憲府舊乗驄杜詩繡衣柱史何昻藏鐵冠白筆横秋霜李白本朝天禧置言事御史後乆不除慶歴復置蓋御史得兼諫職也㑹要又吕誨上言風憲糾繩百司刑名出入當舉劾若令判大理寺於體有妨許免處以横榻使叅中司横榻以異庶工簮筆以奏不法往貳中憲曲阜制際曉乘驄入九逵内朝簮筆坐前墀天家御史非凡格曽向崐崙服紫芝楊億班心突兀見長身東坡注云臺吏謂御史立處為班心殿中侍御史史魏大㑹殿中侍御史簮白筆側堦而坐上問此為何辛毗曰此謂御史舊時簮筆以奏不法豈如今者直備位但曠筆耳魏志宋游道為殿中侍御史臺中語曰見惡能討宋游道南史唐張行成為殿中侍御史糾劾不避威權太宗曰若行成朕自舉之無先容也行成常侍宴太宗語山東及關中人意有同異行成曰天子四海為家不容以東西為限是示人以隘矣帝稱善髙宗以雍州司士叅軍韋絢為殿中侍御史或疑非遷上官儀曰御史供奉赤墀下接武䕫龍簉羽鵷鷺豈雍州判佐比唐書傳記魏蘭臺遣御史二人居殿中伺察非法故曰殿中侍御史晉四人東晉二人梁四人後魏北齊皆有隋改殿内侍御史置十二人煬帝省唐武徳置殿中侍御史四員貞觀増二人通典掌殿庭供奉之儀彈舉違失號為副端有離立失列言囂而不肅者則糾罰之正冬大㑹則戴黑豸乘馬加飾通典及職林文明元年又置殿中裏行㑹要掌駕出於鹵簿内糾察與侍御同惟不判事職員令左雍起於卒吏武帝以為能擢為殿中侍御史曹氏傳中書屬通事令史孫綝乆習内事才宜殿中侍御史詔曰可山公啓事武后時或有起家為之而即真者通典監察御史非因奏事不得入至殿庭望殿中侍御史以上從觀象門出若從天降唐㑹要唐法殿中侍御史遷拜及職事與侍御史相亞殿中為蘿蔔亦曰生薑雖辛辣而不為患賈言本草集南臺持斧杜牧崔徳融制暁趨天闕烏紗薄内直空臺古柏寒饒易憲府初收迹丹墀共拜嘉分行叅瑞獸傳㸃亂宫鴉義文本朝殿中侍御史掌言事分糾大朝㑹及朔望六叅官班序四朝志元豐詔殿中御史兼察事續㑹要皇祐中詔中丞孫抃舉御史抃舉吳中復或曰公平生不識中復何由知之抃曰昔人恥為呈身御史今我豈求識面臺官遂除殿中侍御史治平二年以范純仁為殿中侍御史吕大防為監察御史裏行皆内出姓名而命之實錄執法殿中俾專議論曲阜陳師錫制監察御史史大歴十四年監察御史分察尚書省六司號曰六察官興元元年以第一人察禮吏部第二人察兵工部第三人察户刑部唐志監察御史其一察官人善惡其二察户口流散帳籍隠没賦役不均其三察農桑不勤倉廪耗減其四察妖猾盜賊不事生業為私蠧害其五察徳行孝弟茂才異等藏器晦迹應時用者其六察黠吏豪宗兼并縱暴貧弱冤苦不能自伸者百官志髙季輔拜監察御史彈治不避權要本傳𤣥宗時有胡人言市船之利上命監察御史楊範臣偕往求之範臣奏曰夫御史天子耳目之官必有軍國大事臣雖觸冐炎瘴死不敢辭此特胡人眩惑求媚無益聖徳上慰諭而罷通典顔真卿為監察御史辯五原冤獄天方旱獄決乃雨郡人呼為御史雨韓思彦授監察御史直言當世得失髙宗夜召加二階郭𢎞霸自陳討徐敬業臣誓抽其筋食其肉飲其血絶其體武后大恱授監察御史時號四其御史韋思謙拜監察御史常曰御史出使不能動揺山岳震慴州縣為不任職又曰大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳姚崇用齊澣為監察御史彈劾違犯先風教當時以為稱職楊假楊收皆入為監察御史兄弟並居憲府李勉拜監察御史勲臣恃寵多不知禮大將軍管崇嗣背闕而坐勉劾之肅宗歎曰吾有李勉始知朝廷尊矣栁渾為監察御史臺僚以儀矩相繩而渾放曠不樂唐書傳記東晉置檢校御史知行馬外事宋齊以下並置隋改為監察御史唐貞觀又置監察御史裏行察院風采尤峻初學記掌分察百僚巡按郡縣糾視刑獄肅整朝儀六典監察院長與同院禮隔語曰事長如事端職林唐監察御史知朝堂正門非因奏事不得入至殿庭開元七年敕並隨仗入閣察院諸㕔各有他名禮察謂之松㕔㕔南有古松也刑察謂之魘㕔寢者多魘兵察謂之茶缾㕔以其主院中茶茶必以陶器置之躬自監啓故也吏察主朝官名籍謂之朝簿㕔因話錄李義府召見試令詠棲烏立成詩曰日裏颺朝彩琴中伴夜啼上林多少樹不借一枝棲太宗曰我將全樹借汝豈惟一枝遂拜監察新語河南伊闕縣前每僚佐有入臺者即水中灘出石礫金砂清徹可愛牛僧孺為尉一日報灘出縣僚共觀之有老吏曰此必分司御史若是西臺常有一雙鸂鶒僧孺因舉杯祝曰既成有灘何惜鸂鶒言訖一雙鸂鶒飛下不旬日僧孺拜察院劇談唐有監察御史不工文而好作不已每篇輒為宋務先書折以光臺月俸幾盡其妻謂曰此必臺中玩公折俸助厨耳自後不復出光臺錢或問之以妻言對諸御史退相謂曰彼有人焉未可玩也御史臺記唐監察御史李全交專以羅織酷虐為業臺號為鬼面夜义殿中王旭號為人頭羅刹監察為開口椒毒㣲􅀈賈言中監察本草集繡衣始拜珥筆升朝臺閣以之生風豪貴由是歛手陳子昂集峩豸忝備列韓文冠惠文冠察行馬外事劉夢得集本朝天禧元年詔别置御史六員不兼他職有急務聴非時入對百官表嘉祐四年韓絳請置裏行從之熈寜三年除秀州推官李定權監察御史裏行用選人為御史自定始也職官分紀元豐三年詔御史專領六察又詔以三員分領察案三員專言事七年大正官名以言事官為殿中侍御史察官為監察御史八年詔監察御史兼言事續會要張錫為御史京師人曰張御史貌柔和而心剛正真御史也同上宋敏求繳李定詞頭云去嵗驟用京官今又幕職官便昇朝著峻處糾繩之地臣恐未厭衆議同上俾冠惠文往專刺督曲阜除傅楫制御史臺主簿史張忠署孫寳為主簿寳徙入舎祭竈請比鄰忠怪之使所親問曰今兩府髙士俗不為主簿子既為之徙舎甚悦何也寳曰髙士不為主簿而大夫君以寳為可道不可詘身詘何傷忠聞之甚慙薦寳經明質直宜備近臣西漢傳記西漢張忠為御史置孫寳為主簿魏晉以下無聞隋大業始置御史臺主簿二員唐省一員掌付事勾稽省署抄自監印給紙筆貞觀中張𢎞濟為此官遂為美職六典及通典唐主簿管轄臺中雜務每入主簿執黄卷書其譴罰通典唐憲臺之禮雜端在南榻主簿在北榻職林本朝端拱初御史臺置孔目二人淳化四年廢孔目官於幕職官選彊明公幹者二人充臺主簿掌推勘公事後止置一員長編掌受事發辰勾檢稽失兼簿書錢穀之事元豐三年李定請増置一員㸃檢六案文字元祐元年大理寺左㫁刑架閣庫專委主簿主管續㑹要中丞黄履奏本臺主簿檢法官係分掌班籍叅預定刑所領職事與他司不同㑹要勾稽憲府同上記纂淵海卷三十
