body:
  text: 記纂淵海卷八十七宋潘自牧撰伎術部醫經聚毒藥以共醫事周禮四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有𠻳上氣疾以五味五糓五藥養其病以五氣五聲五色眡其死生兩之以九竅之變參之以九藏之動疾醫凡療瘍以五毒攻之以五氣飬之以五藥療之以五味節之瘍醫凡藥以酸飬骨以辛飬筋以鹹飬脉以苦飬氣以甘飬肉以滑飬竅同上醫不三世不服其藥記晉侯有疾晉景公求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也其一曰居膏之下肓之上若我何醫至曰疾不可為也在膏之下肓之上攻之不可達之不及藥不可為也左傳晉侯有疾晉平公也求醫于秦秦伯使醫和視之和至疾不可為也是為近女室疾如蠱非鬼非食惑以喪志又曰天有六氣陰陽風雨晦明也陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生内熱蠱惑之疾今君不節不時能無及此乎三折肱知為良醫同上子魯公扈趙齊嬰二人有疾扁鵲謂公扈曰汝志強而氣弱齊嬰志弱而氣強共換汝之心則均於善矣扁鵲遂飲二人毒酒剖胷探心易而置之投以神藥既寤如初列子秦王有病召醫破癰潰痤者得車一乗䑛痔者得車五乗所治愈下得車愈多莊子魏文侯問扁鵲曰子兄弟三人孰最善對曰長兄視色故名不出家仲兄視豪毛故名不出門鵲鍼人血脉投人毒藥故名聞諸侯鶡冠子子謂北山黄公善醫先寢食而後醫藥文中子史扁鵲見齊桓侯曰君有疾在腠理後五日復見曰君有疾在血脉後五日復見曰君有疾在腸胃後五日望見桓侯退走曰疾居腠理湯熨之所及也在血脉鍼石之所及也在膓胃酒醪之所及也其在骨髓雖司命無柰之何後五日桓侯遂死史記疾有六不治驕恣不論於理一也輕身重財二也衣食不能適三也陰陽并藏氣不定四也形羸不能服藥五也信巫不信醫六也扁鵲過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫虢太子死扁鵲曰尚可活也臣聞上古有俞跗療病不以湯液乃割皮觧肌煎洗腸胃潄滌五臟桑君遇扁鵲竒之乃呼扁鵲出懐中藥與之飲以上池之水三十日當知物矣扁鵲飲藥三十日從此視盡見五臟癥結特以診脉為名耳扁鵲曰越人非能生死人也特當生者能使之起耳同上扁鵲姓秦名越人太古有岐伯俞跗中古扁鵲秦和盖論病以及國原診以知政漢興有倉公漢志髙祖疾甚吕后迎良醫醫入見上嫚罵之曰命乃在天雖扁鵲何益遂不使治疾夲紀華佗精方藥其療疾合湯不過數種當灸不過一兩處當針不過一兩度針藥所不能及者便用其麻沸散須臾醉死無所知因破腹取病若在腸中便斷腸湔洗縫腹膏摩一月之間即平復矣魏志陳登得病佗曰胃中有蠱欲成内疽食腥物所致作湯二升腹吐蠱三升赤頭皆動半身猶是生魚膾曹操苦頭風累書呼之不至操怒殺之佗臨死出書一卷與獄吏曰此可以活人吏畏法不敢受佗索火焚之同上雲長為流矢貫臂每陰雨嘗痛醫曰當破臂刮骨去毒乃可除之也蜀志秦王苻生夜食􅀥多旦而有疾召太醫令程延使診之延曰陛下無他疾食􅀥多矣生怒曰汝非聖人安知吾食􅀥遂斬之通鑑徐熈隠於秦望山有道士留一瓠􅕧與之熙開之乃扁鵲鏡經一卷因精心學之遂名震海内生子秋夫彌工其術夜有鬼言患腰痛死雖為鬼痛難忍秋夫為芻人按孔穴針之明日見一人謝恩忽然不見南史王勃嘗謂人子不可不知醫時長安曹元有秘術從之㳺盡得其要唐書甄權善醫或勸其著書答曰醫特意耳思慮精則得之脉之妙處不得虛著方劑終無益於世此吾所以不著書也同上傳記巫彭初作醫說文神農使岐伯嘗草木典醫療病今經方本草之書咸出焉帝王世紀晉平公疾醫和視之趙子文曰醫及國家乎對曰上醫醫國其次醫人固醫官也國語扁鵲見秦武王示之病扁鵲請除左右曰君之病在耳之前目之下除之未必已也將使耳不聰目不明扁鵲怒而投石曰君與知之者謀之而與不知者敗之戰國䇿殷中軍妙觧經脉有常所給使叩頭云母年垂百嵗抱疾求久活感其至性為診脉處方始服一劑湯便愈世說長安有人家於西市賣飲子不過數味亦不嫺方脉千種之疾入口而愈田令孜有疾國師束手有白田曰西市飲子何不一試遂遣僕取之僕回馬蹶而覆之遂詣染坊丐得池脚一缾子以給其主服之立愈田償藥價甚厚此葢福醫也玉堂閒話集九折臂而成醫楚辭九章岐黄彭扁振揚輔導㤙流含氣本草宋清者長安都藥市人也居善藥有自山澤求者必歸宋清氏清優主之長安醫工得清藥輔其方輒易售咸譽清疾病疕瘍者亦皆樂就清求藥兾速已清皆樂然響應雖不持錢者皆與善藥積劵如山未嘗詣取直或不識遥與劵清不為辭嵗終度不能報輒焚劵終不復言桞文善醫者不視人之瘠肥而察其脉之病否而已脉不病雖瘠不害脉病而肥者死也韓文本朝士大夫多秘所患以驗醫能否使索病於冥漠之中吾平生求醫必盡告以所患然後診之故雖中醫治吾疾常愈吾求疾愈而已豈以困醫為事哉東坡仇池記去嵗在都下見一醫工頗藝而窮謂僕曰人所以服藥端為病耳若欲以適口則莫若芻豢何以藥為今孫氏劉氏皆以藥顯然孫氏蘄於治病而不擇甘苦劉氏專務適口而劉氏冨倍孫氏此何理也東坡書虛實在其脉靜躁在其形榮楛在其色夀夭在其情茍能閱千人望見知死生鍼頭如麥芒氣出如車軸關闕脉絡中性命寄毛粟而况清淨眼内景寒天燭琉璃貯沆瀣輕脆不任觸而子於其間來徃施鋒鏃笑談紛自若觀者頸為縮運針如運斤去翳如拆屋常言子善幻他技雜符祝子言吾有道此理君未矚東坡詩巫經用史巫紛若易司巫掌羣巫之政令記大旱公欲焚巫尫左傳詳見旱類晉侯夢大厲被髪及地曰殺余孫不義公覺召桑田巫巫言如夢荀偃夢與厲公訟不勝公以戈擊之首隊於前奉之以走見梗陽之巫臯他日見諸道與之言同同上子有神巫自齊來䖏於鄭命曰季咸知人死生存亡禍福例詳見相術類史西門豹為鄴令民有言苦為河伯娶婦者豹乃投巫嫗於河史記在男曰覡在女曰巫漢志武帝末衛后寵衰江充用事充與太子及衛氏有隙先於太子宫埋桐人乃白於上曰太子宫有蠱氣上使充治之果掘得所埋桐人漢書東甌王敬鬼命粤巫立粤祝祠而以雞卜上信之粤祠雞卜自此始郊祠志第五倫為㑹稽太守俗多滛祠倫曉告百姓巫祝有依托鬼神詐怖愚民皆按論之後漢徐登本女子化為丈夫善為巫術趙炳能為越方二人遇於烏陽溪水之上曰可各試所能登乃禁溪水使不流炳復禁樹即生荑二人相眎而笑同上陳子昻上言巫鬼熒惑於人者禁之唐書王嶼為祠祭使有所禳祓大抵類巫覡同上傳記大荒中有靈山巫咸巫即巫眠巫彭巫姑巫貞巫禮巫搥巫謝巫羅十人從此升降百藥爰在山海經疾則藥巫酌則曰疾藥巫酌禍可轉也太𤣥楚人名巫為靈子楚辭註集帝告巫陽曰有人在下我欲輔之䰟魄離散女筮予之楚辭詛師毒口牙舌作霹靂聲符師㺯刀筆丹墨交揮横韓集雞骨占年拜水神桞集本朝雷州民康財妻為蠻巫林公榮用雞肉桃生值商人楊一者善醫療與藥服之吐積肉一塊剖開筋膜中有生肉存已成雞形容齋随筆襄陽鄧城縣有巫師能用妖術詣一冨室求錢不與遂買酒一升盛以小缶取糞汚攪雜攜徃林麓禹歩誦呪瘞之地乃去俄酒家列甕盡作糞臭有道士曰吾有術能療即焚香作法半日許臭止同上何人聚衆稱道人遮道賣符色怒嗔宜蠶使汝繭如甕宜畜使汝羊如􅍪路人未必信此語強為買服禳新春道人得錢徑沽酒醉倒自謂吾符神東坡卜經初筮告再三凟凟則不告以卜筮者象其占蓍之徳圎而神幽贊於神明而生蓍並易卜不習吉書大禹謨七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰繹曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言洪範龜筮共違于人用静吉用作凶同上寧王遺我大寳龜紹天明即命大誥乃卜三龜一習吉金縢爾卜爾筮體無咎言詩氓篇卜云其吉終焉允臧定之方中卜筮偕止杕杜我龜既厭不我告猶小旻爰始爰謀爰契我龜緜篇卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆周禮龜為卜筴為筮卜筮者先聖王之所以使人信時日敬鬼神畏法令也所以使民决嫌疑定猶豫也記曲禮卜筮不過三卜筮不相襲同上孟冬命太史釁龜筮占兆審卦吉凶月令易抱龜南靣天子卷冕北靣雖有明智之心必進斷其志焉祭義天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮表記卜以决疑不疑何卜左傳筮短龜長不如從長二國之守龜何事不卜楚靈王卜曰余尚得天下不吉投龜訽天而呼曰是區區者而不余畀余必自取之同上子宋元君夢人窺阿門曰予為清正使河伯之所漁者余且得予元君覺使人占之曰此神龜也今余且獻龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉遂刳龜七十二鑚而無遺筴莊子汾陰侯生善筮先人事而後說卦文中子史宋忠賈誼同遊於卜肆司馬季主閒坐宋忠賈誼曰先生何居之卑何行之汗司馬季主捧腹大笑曰大夫何言之陋也二君曰世皆言曰夫卜者多言誇嚴以得人情虛髙人禄位以恱人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於己此吾之所恥也司馬季主曰今夫卜者必法天地象四時順於仁義分䇿定卦旋式正棊然後言天地之利害事之成敗卜筮有何負哉史日者傳三王不同龜四時各異卜同上蓍百莖共一根其下必有神龜守之其上常有青雲覆之蓍長八尺即難得也滿六十莖已上長滿六尺者即可用矣龜筴傳盎家多怪廼之棓生所問占還刺客遮殺盎漢書嚴君平卜筮於成都市有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠裁日閱數人得百錢足自飬則閉肆下簾而講老子漢書雲長既敗孫權使虞翻筮之遇節之臨翻曰不出二日必當斷頭果如翻言權曰卿不及伏羲可與東方朔為比矣吴志郭公精於卜筮郭璞從之受業公以青嚢中書九卷與之由是遂洞五行天文卜筮之術雖京房管輅不能過也晉書王微工陰陽數術之事文帝賜以名蓍南史有人父為刺史得書云疾是人筮之遇泰筮者曰吉趙輔和曰泰乾下坤上則父入去天豈得言吉果凶同時有人父疾託輔和筮遇乾之晉慰諭令去後告人云乾之遊魂乾為天為父父變為魂而升於天能無死乎亦如其言北史魏孝武即位使吳遵世筮遇否之萃曰先否後喜遵世曰剛决柔則春末夏初也又筮遇明夷之賁曰初登于天後入于地若能謹始謹終不失法度無憂入地矣齊文襄遊東山有雲起恐雨使筮遇剝李業興云艮為山山出雲故知有雨遵世曰坤為地土制水故知無雨湏臾雲散二人各受賞罰同上中宗將祀南郊𤣥宗求朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立其瑞非常也唐書巫咸作筮世本古司怪主卜春秋元命庖犧氏作始有筮古史考孔子使子貢徃外而未來謂弟子占之遇鼎皆言無下足不來顔子曰無足者乗舟而來賜至矣清朝子貢果乗舟至衝波傳子路見孔子曰猪肩牛膞可以得兆何必蓍龜孔子曰蓍者事也龜者舊也狐疑之事當問其舊也北户錄嚴遵字君平富人羅冲問何以不仕為具車馬衣糧遵曰柰何以不足奉有餘冲曰吾有萬金汝無擔石乃云有餘不亦謬乎遵曰不然吾前宿子家人定而役未息晝夜汲汲未嘗有足今我以卜為業不下床而錢自至尚餘數百塵挨厚寸不知所用此非我有餘而子不足耶冲大慚髙士傳晉隗炤善易臨終謂妻子曰後五年詔使龔負吾金以吾所書板告之後如其言使者惘然取蓍筮之卦成曰妙哉隗生吾不負金賢夫自藏金以待太平知吾善易書板寄意金五百斤盛以青甕埋在堂屋去壁一丈入地九尺掘之果得金廣記淳于智能易筮夏侯藻母病忽有一狐當門向之嘷怖藻馳見智智曰君速歸在狐嘷處拊心啼哭令家人驚怪畢出一人不出哭勿止藻如其言母亦扶病出堂屋五間拉然而崩同上京房卜易卦以錢擲以甲子起卦王廷湊微時嘗詣五明道士卜擲卦錢皆三舞三水小牘竹下圍棋卜見八月類嶺表占卜甚多䑕米卜箸卜牛卜骨卜田螺卜雞印卜篾竹卜俗尚鬼故也畨禺雜記洪州何婆善琵琶卜浮休子與郭司法質之問其品秩何婆乃調絃柱和聲曰大夫富貴今年得一品明年得二品後年得三品郭大罵而起僉載集索瓊茅以筳篿兮命靈氛為余占之楚辭詹尹乃端䇿拂龜云云詹尹釋䇿而謝曰夫尺有所短寸有所長物有所不足龜策誠不能知事同上今夫揲之以至刓灼之以殆盡徒與夫蚩蚩者問歉穰占熊虺起頌需食亡牛䘮羊之間耳資其握粟以餬余口烏足為夫子道哉劉夢得集本朝張定公嘗謂予曰某舉進士時與冦莱公詣一卜肆卜者曰二人皆宰相也既出逢張相齊賢王相隨復往詣之卜者大驚曰一日之内而有四人宰相四人相顧一笑而退因是卜者消聲卒窮餓以死而四人者其後皆為宰相今予相又忘其姓名矣亦可哀也哉范蜀公蒙求季札以樂卜趙孟以詩卜襄仲歸父以言卜子㳺子夏以威儀卜沈尹氏以政卜孔成子以禮卜其應也如響無他圗在精誠而已不精誠者不能自卜况吉凶他人乎陸龜䝉相術傳楚司馬子良生子越椒子文曰熊虎之狀而豺狼之聲弗殺必滅若敖氏矣左傳王使内史叔服來㑹𦵏公孫敖聞其能相人也見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯國叔向娶於申公巫臣氏生伯石姑視之聞其聲曰是豺狼之聲也非是莫䘮羊舌氏矣同上子古者有姑布子卿今之世梁有唐舉相人之形狀顔色而知其吉凶妖祥世俗稱之古之人無有也學者不道也昔者衛靈公有臣曰公孫吕身長七尺靣長三尺眉廣三寸鼻目耳具而名動天下楚之孫叔敖突秃長左軒較之下而以楚霸業公子髙微小短瘠行若將不勝其衣誅白公定楚國如反手耳且徐偃王之狀目可瞻焉仲尼之狀面如䝉倛周公之狀身如斷菑臯陶之狀色如削𤓰閎夭之狀面無完膚傅說之狀身如植鰭伊尹之狀面無湏麋禹跳湯偏堯舜參眸子桀紂長巨姣美筋力越勁然身死國亡為天下僇今世俗之亂君鄊曲之儇子莫不美麗姚冶竒衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願得以為士然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友俄則束乎有司戮乎大市莫不呼天啼哭若傷其今而後悔其始荀子有神巫曰季咸知人死生存亡禍福夀夭期以嵗月旬日若神鄭人見之皆避而走列子見之而心醉而歸以告壺丘子壺子曰嘗與俱來以予示之明日與之見壺子出而曰子之先生死矣弗活吾見怪焉見濕灰焉列子入告壺子曰是殆見吾杜徳機也嘗又與來明日又與之見壺子出而曰幸矣子之先生遇我也有瘳矣全然有生矣吾見杜權矣列子入告壺子曰是殆見吾善者機也嘗又與來明日又與之見壷子出而曰子之先生坐不齋吾無得而相焉試齋且將復相之列子入告壺子曰是殆見衝氣機也嘗又與來明日又與之見壺子立未定自失而走列子魏王問子順曰馬回之為人梗梗亮直吾欲以為相可乎答曰聞諸孫卿云其為人也長目而豕視者必體方而心圓每以其法相人千百不失臣見回非不偉其體幹也然甚疑其目孔叢史范蠡遺大夫種書曰越王為人長頸鳥啄可與共患難不可與共安樂史記蔡澤從唐舉相舉曰先生曷鼻巨肩魋顔蹙齃勝攣吾聞聖人不相殆先生乎澤曰富貴吾所自有吾所不知者夀也舉曰從今以徃四十三嵗澤謂其御者曰吾持梁齧肥躍馬疾驅懐黄金之印四十三年矣同上單父人吕公好相人見髙祖狀貌甚敬重之曰君相貴不可言願季自愛臣有息女願為箕箒妾即吕后也前本紀黥布少時客相之曰當刑而王及壯坐法黥布欣然而笑曰人相我當刑而王幾是乎本傳髙祖立濞為吴王相之曰若有反相因拊其背曰漢後五十年東南有亂豈若也然天下同姓一家謹毋反濞曰不敢本傳文帝使善相者相鄧通曰當貧餓死上曰能富通者在我因賜蜀道銅山得自鑄錢景帝即位人有告通盗出徼外鑄錢竟按驗沒入之寄死人家夲傳許負相周亞夫曰君後三嵗而侯侯八嵗為將相後九年而餓死亞夫笑曰既已貴人何說餓死負指其口曰從理入口此餓死法也後下廷尉不食五日死夲傳衛青少為平陽侯家人有一鉗徒相青曰官至封侯青笑曰人奴之生得無笞罵足矣安得封侯乎後為大將軍封長平侯夲傳韋賢有相工相之當至丞相賢有子四人又使相之至第二子𤣥成曰亦當為丞相賢曰有長子在是安得之賢後竟為相既死而長子有罪遂立𤣥成夲傳班超行詣相者相者曰生燕頷虎頭飛而食肉此萬里侯相也後夲傳管輅曰吾額上無生骨眼中無守精鼻無梁柱脚無天根背無三甲腹無三壬此皆不夀之驗卒年四十八魏志鍾繇與族父瑜道遇相者曰此童有貴相然當厄於水行未十里地橋堕水幾死瑜以相者言中益貴之同上潘滔相王敦曰蠭目已露豺聲未振若不噬人亦當為人所噬晉書王敬則母為女巫嘗為人曰敬則生時胞衣紫色應得鳴鼓角人笑曰汝子得為人吹角可矣後果為將有功南史庾夐家富狀貌豐美頥頰開張人皆謂必為方伯及魏克江陵卒餓死又禇羅靣甚尖危有從理入口竟保衣食而終章昭逹少遇相者曰卿貌甚善湏少虧則當富貴侯景之亂昭逹中流矢眇其一目後為司空同上唐太宗四嵗有書生見之曰龍鳯之姿天日之表其年幾冠必能濟世安民唐書王珪與房杜善母曰兒必貴然未知所與逰者何如人試與偕來㑹𤣥齡等過其家母窺大驚曰二客公輔才也汝貴不疑帝在九成宫令袁天罡視岑文本曰學堂瑩夷眉過目故文章振天下肉不稱骨非壽兆也袁天罡見張行成馬周曰馬君伏犀貫腦背若有負貴驗也近世君臣相遇未有及公者然面澤赤而耳無根後骨不隆夀不長也張晩得官終位宰相李勣選將必資相竒龎福艾者遣之曰薄命之人不足與成功名也張憬藏相魏無忠久不答無忠怒曰窮通有命何預君耶拂衣去憬藏遽起曰君之相在怒時位必卿相也張守珪為果毅盧齊卿曰十年内當知節度果如其言時謂齊卿有人倫之鍳蕭嵩與陸象先為僚壻夏榮有相術謂象先曰陸郎十年内位極人臣然不及蕭郎一門盡貴桞渾十餘嵗有巫告曰兒相夭且賤為居僧可緩死諸父欲從其言渾曰去聖教為異術不若速死後至宰相李珏舉明經李綘曰日角珠庭明經碌碌非子所宜乃更舉進士髙第同上傳記顔淵山庭日角曾子珠衡犀角論語摘輔象蒼頡四目春秋孔演圖竇軌問袁天罡天罡曰公額上伏犀貫玉枕輔角又成就從今後十年必富貴定命錄竇軌益州行臺僕射召袁天罡天罡曰骨法不異徃時目色出脉貫瞳子語亦浮靣為將多殺人願深自戒李嶠侍袁天罡連榻而寢袁視嶠無喘息以手候之鼻下氣絶其出入息乃在耳中賀其母曰郎君必大貴夀是龜息也袁天罡有子客師嘗過江曰舟中人皆鼻下黒氣大厄不乆忽見一丈夫跛其一足負杖驅驢登舟客師曰貴人在内吾儕無憂登舟風濤忽見危懼雖甚終濟焉驅驢者乃婁師徳也岑文本見馬周曰鳶肩火色騰上必速但恐不能乆耳數年官至宰相四十八而亡並同上相工相李雄曰此君將貴其相有四目如重雲鼻如龜龍口方如噐耳如相望法為貴人蜀錄劉夀遇師曰君腦有玉枕必至公也後至太尉耆舊傳朱泚眉分凢聚相者告以大貴泚信之金臺錄衡岳寺有僧號懶殘李泌異之一日正潑火煨芋啖之取其半授泌曰勿多言領取十年宰相甘澤謡裴晉公遇相者曰郎君若不至貴即當餓死一日逰香山寺有婦人以父被罪得玉帶三犀帶一以賂津要寘于欄楯忘之度得而授之後見相者曰必有陰徳前途萬里非某所知也唐李參軍善相笏知休咎呼為李相笏逸史宋山陽王休祐屢以言語忤上庾道敏相其手版曰此版極貴然使人多忤王以禇淵詳密換之禇復於帝前稱下官帝不恱魏許允為太尉善相印將拜以印不善命更刻之雞跖集唐貞元末有相骨山人以無目故逢人即手捫之必知貴賤廣記開成中有龍復本者無目善聽聲揣骨凢有象簡竹笏以手捻之必知官禄年夀宗邧蕭寘授以所持竹笏復本執蕭公笏曰宰相笏次至宋笏曰長官笏後蕭公居廊廟宋出為清河縣令如其言劇談錄集世人固有身瘠而志立體小而名髙者於聖則否是以堯眉八彩舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳曺子建論昔之聖者其首有若牛者其形有若蛇者其啄有若鳥者其貌有若䝉倛者彼皆貌似而心不同焉可謂之非人耶即有平脅曼膚顔如渥丹美而狠者貌則人矣其心則禽獸又惡可謂之人也韓文吕公言女當大貴宜以配季季後為天子吕氏復稱制天子隋文帝相工來和輩亦言當為帝者後簒位果得之誠相法之不謬矣而男女族属殺滅殆盡不知一女子為吕氏之福耶為禍耶一男子為楊氏之禍耶為福耶彼知相法者當曰此必為吕氏楊氏之禍乃可謂善相人矣杜牧之今之相工言人相者必曰某相類龍某相類鳳某相類牛馬某至公侯某至卿相類禽獸則富貴也噫立形於天地分性於萬物其貴者不過人焉有真人形而貧賤類禽獸而富貴哉皮日休本朝太宗遣陳摶詣南衙見真宗及門亟還問其故曰王門厮𨽻皆將相也何必見王儲議遂定聞見錄王兾公欽若謁錢希白適希白延一術士以考休咎不容通謁兾公厲聲詬閽人術者聞之曰不知何人耶若形聲相稱世無此貴者希白召之兾公神貌踈瘐復贅於頸而舉止山野希白蔑視之兾公起術人嘆曰人中之貴有此十全者錢戯曰中堂之内便有此等宰相乎術人正色曰此人不作則已若作之則君臣相得至死有慶錢戯曰他日當陶鑄吾輩乎術者曰恐不在他日後希白方為翰林學士兾公已真拜錢公若水見陳希夷於華山有一老僧與希夷擁地爐坐僧熟視若水久之以大箸畫灰作做不得三字徐曰急流中勇退人也若水登科為樞副年才四十而致政老僧葢麻衣道者云种放字明逸徃見希夷先生先生一日令洒掃庭除曰當有嘉客至明逸作樵夫拜庭下希夷曰君豈樵者二十年後當有顕官明逸曰官禄非所問也希夷笑曰君骨相當耳雖晦迹山林竟不能安後以司諌赴召官至工部侍郎李承之因邸報􅊶拯參政或曰朝廷自此多事矣承之正色曰包公無能為今知鄞縣王安石眼多白似王敦他日亂天下者此人也並同上心傳異學不謀身自要清時閱縉紳火色上騰雖有數急流勇退豈無人東坡坐閱諸公半廊廟時看黄色起天庭同上早逢異人得異術窮究休咎出頃刻相逢拍手問由來怪我今年有陰徳后山命術經樂天知命故不憂易君子居易以俟命記得之自是不得自是以聽天命記死生有命富貴在天語子孔子進以禮退以義得之不得曰有命孟求之有道得之有命殀夀不貳修身以俟之所以立命也並同上力謂命曰若之巧奚若我哉命曰汝奚功於物而欲比朕力曰夀夭窮逹貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而夀八百顔淵之才不出衆人之下而夀三十仲尼之徳不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位季札無爵於吴田常專有齊國夷齊餓於首陽季氏富於展禽若是汝力之所能柰何夀彼而夭此窮聖而逹逆賤賢而貴愚貧善而富惡耶力曰此則若命所制耶命曰既謂之命柰何有制之者耶列子東郭先生謂西門氏曰夫北宫子厚於徳薄於命汝厚於命薄於徳汝之逹非智得也北宫子之窮非愚失也皆天也農有水旱商有得失工有成敗仕有愚否命使然也並同上知其不可柰何而安之若命莊子史沈攸之言士之窮逹有命恨不十年讀書南史齊文惠太子惡西昌侯鸞常曰我意中殊不喜此人當由其福薄也同上孫紹善推禄命事驗甚多北史謹案史記宋忠賈誼譏司馬季王云夫卜筮者髙人禄命以恱人心矯言禍福以盡人財又案王充論衡云見骨體而知命禄覩命禄而知骨體此即命禄之書行之久矣多言或中人乃信之今更研尋本非實錄但以積善餘慶不聞建錄之吉積惡餘殃豈有刼殺之哉舊唐書吕才叙錄命長平坑卒未聞共犯三形南陽貴士何必俱當六合今時亦有同年同禄而貴賤懸如共命共胎而夀夭更異同上魏元忠有善相者言公當位極人臣然命多蹇剝但可當事便行聞言則應元忠累遭譴責憶相者之言未嘗少屈其志定命錄唐莊宗時禁旅王慶乞叙功賞莊宗曰知慶薄有功但每見慶則心憤然安得更有賜予之意因舉唐太宗詩曰待余心肯日是汝命通時夫主天下生靈賞罰之柄而所言若此則進退誠有命也翰府名談集公最深於五行書以人之始生年月日所直日辰支干相生勝衰死相王斟酌推人夀夭貴賤百不失一二星官歴翁莫能與其校韓文李虛中誌或曰貴與富在我而已以智求則得之何命之為或曰求之有不得而不求有得之者皆命也人事何為二者之言是皆陷人於不善也以智而求之者盗耕人之田者也皆以為命者弗耕而望收者也李翶予生於角星昴畢於角為第八宫曰病厄宫亦曰八殺宫土星在焉火星繼來星土楊晞曰木在張於角為第十一福徳宫木為福徳大君子救於其房無慮也予自湖守不周嵗遷舍人木還福於角足矣土火還死於角宜哉杜牧自撰墓誌丈夫賭命報天子李白自古聖賢多薄命杜詩文章憎命逹同上本朝韓退之詩云我生之辰月宿直斗乃知退之磨蝎為身宫僕以磨蝎為命宫平生多得謗譽殆同病也東坡仇池記唐六典述五行有禄命驛馬湴河之目筆談段少連與鄉老㑹飲段自吹笛座中有知音者亦以樂器和之有一老儒嘆曰某命中無金星之助是以不能樂藝叚笑曰豈惟金星水星亦不甚得力也東軒秘錄章得象曰生年月日時臨胎有三處合者不為宰相亦為樞副歸田錄僧化成以命術聞京師蔡元長兄弟訪焉卒爾語元長曰此武官大使臣命也餘不可望語元度曰此命今嵗登第十餘年為侍從執政晩年當以使相終既退元度曰觀其推歩鹵莾如此何足信哉旬日復徃僧已不記再以年月語之悉如前說然是年遂同登科相繼貴顕於元長則大謬而元度則無一語之差却掃編古寺相逢亦偶然謾將牛斗話生縁時行時止非人力莫問流年只問天朱文公許子儒冠怨誤身如今投筆說星辰未湏道我何時貴且道何如子脫貧楊誠齋尅擇經榖旦于差詩吉日維戊吉日庚午吉日外事以剛日内事以柔日凡卜筮旬之外曰逺某日旬之内曰近某日䘮事先逺日吉事先近日子邜不樂假於鬼神時日卜筮以疑衆殺並記辰在子卯謂之疾日越得嵗而吴伐之必受其凶同上子芮城府君重陰陽子始著歴日文中史凡占候時日通名日者史日者傳陰陽之術太詳而衆忌諱使人拘而多畏然其叙四時之大順不可失也史自序禇先生曰武帝時聚㑹占家問之某日可娶婦乎五行家曰可堪輿家曰不可建除家曰不吉叢辰家曰大凶歴家曰小凶天人家曰小吉太一家曰大吉辯訟不决以狀聞曰避諸死忌以五行為主史記鄧禹進圍安邑明日癸亥王匡等以六甲窮日不出禹因得更理兵明旦大破之後漢書河南吴雄家貧喪母營人所不封土者擇𦵏其中喪事趣辦時不問日醫巫皆言當族㓕而子訢孫恭三世廷尉下邳趙興亦不䘏諱忌每入官舍輙更繕修故犯妖禁而子孫三世皆為司𨽻汝南有陳伯敬者行必矩歩坐必端膝呵叱狗馬終不言死行路聞凶便觧駕留止還觸歸忌則寄宿鄉亭年老寢滯不過舉孝亷後坐女壻亡吏太守邵夔怒而殺之時人罔忌禁者多談為証焉郭躬傳舊疑嵗辰在邜此宅之左則彼宅之右何得俱忌於東孫邈以為太嵗之属自是逰神譬如日出之時向東皆逆非藏也體中也晋夲傳晉武帝攻慕容起諸將曰徃亡之日兵家所忌帝曰我徃彼亡吉孰大焉本紀晉穆帝納后欲用九月是忌月王給曰若有忌月當復有忌嵗禮儀志宋武帝平司馬休之加領南蠻校尉將拜遇四廢日佐史白遷日不許南史梁元帝時多禁忌墻壁崩倒屋宇傾頽年月不便終不修改庭草蕪沒令鞭去之同上太安四年殷紹上四序堪輿表第一孟序九卷八十一章說陰陽配合之原第二仲序九卷八十一章觧四時氣王休殺吉凶第三叔序九卷八十一章明日月辰宿交㑹相生為表裏第四季序九卷八十一章具釋六甲刑禍福徳北史後魏武帝討賀驎太史令晁崇曰紂以甲子亡兵家忌之曰則周武不以甲子勝乎崇無以對進軍大破之齊文宣令宋景業筮曰宜以仲夏吉辰順天受禪或曰陰陽書五月不可入官犯者卒於其位景業曰王為天子無復下期豈得不終其位並同上徳宗時將奏宣政殿廊壊十月魁罡未可修上曰但不妨公害人則吉矣安得時日即命修之通鑑李愬圍蔡州左右曰以徃亡日請避之愬曰賊以徃亡謂吾不能來正可擊也唐書劉瑑召還宣宗曰為朕擇一令日瑑跪曰某日帝笑曰是日卿可逢相詳見宰相類傳記越王召范蠡曰孤欲上明堂臨國政何日可矣范蠡曰今日丙午日也丙陽將也是日吉矣吴越春秋漢明帝時公車以返支日不受章奏帝曰民廢田桑逺來詣闕復拘以禁忌豈為政之意乎王符潜夫論康節先生出行不擇日或告之以不利則不行葢曰人未言則不知既言則是知而必行故鬼神敵也聞見錄今世俗營建宅舍或小遭疾厄皆云犯土按後漢書安帝時皇太子驚病不安避幸乳母野王聖舍邴吉以為聖舍新繕修犯土禁不可久御然則古有其說矣容齋随筆仕宦多忌兀日不赴官人多不曉兀之義或聞兀兀然諸兀日數說不同最為無據凡上官切忌初四初七十六十九名曰四不祥若用此日鮮有善罷者遯齋閒覧風水經我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食書考卜惟王宅是鎬京維龜正之相其陰陽觀其流泉詩邾文公卜遷于繹史曰利於民而不利於君左傳卜其宅兆而安厝之孝經史陶侃微時將𦵏家中忽失牛遇一老父謂曰前岡見一牛眠山洿中其地若𦵏位極人臣又指一山云此亦當世出二千石言訖不見侃尋牛得之因𦵏其母焉晋書郭璞以母憂去職卜𦵏地於暨陽去水百許歩人以近水為言璞曰當即為陸矣其後沙漲去墓數百里皆為桑田璞嘗為人𦵏明帝微服徃觀之因問主人何以𦵏龍角法當滅族主人曰郭璞云此𦵏龍耳不出三年當致天子也帝曰出天子耶答曰能致天子問耳帝甚異之有善相墓者言羊祜祖墓所有帝王之氣若鑿之則無後祜遂鑿之相者曰猶出折臂三公元帝太興初以王導疾乆方士戴洋曰君本命在申申地有冶金火相爍遂移冶於石城並同上梁昭明太子𦵏其母遣人求墓地之吉者𦵏畢有道士云此地不利長子若厭之或可更延南史温大雅改𦵏祖父卜人占其地曰害兄而福弟大雅曰若家弟永康我將含笑入地嵗餘果卒唐書吕才曰今之喪𦵏吉凶皆依五姓便利古之𦵏者並在國都之北趙氏之𦵏並在九原漢之山陵散在諸䖏大墓小墓其義安在此則五姓之義大無稽古舊唐書傳記凡𦵏龍耳當出五侯相家書𦵏欲得枕龍卧鳳來山去水青瑣高議欲得連岡隠軫伏如亂雲望之翽翽絶而復連圖墓書袁安父卒求𦵏地道逢三書生指一處云𦵏此地當世為上公遂𦵏其地後登司徒四世五公幽冥錄孫鍾家貧種瓜有三人來乞𤓰鍾設𤓰及飯三人謂鍾曰䝉君厚意今示子𦵏地君下山百歩勿反顧鍾不六十歩回㸔並為白鶴飛去鍾遂於此𦵏母塜上有氣属鍾後生堅堅生權權遂稱帝於吴同上徐勣初卜𦵏繇曰朱雀和鳴子孫盛榮張景藏曰所占者過也此所謂朱雀悲哀棺中見灰後其孫敬業反則天怒斷棺焚尸見灰之應也廣記唐智興微時有道士居門側智興每日必掃道士之門智興母死道士曰吾善審墓地他日引智興以竹䇿表一處曰此出兩世方伯智興再徃竹䇿有杖叢生遂𦵏焉同上郝處俊死𦵏訖有書生嘆曰𦵏壓龍角其棺必斷其後象賢坐不道果斷䖏俊棺焚其尸僉載陳愚膺本名聿修有客曰此州上里地形貴不可言若𦵏此可世世為郡守又指一處曰若用此可以一世為都督聿修䘮親遂以都督地𦵏焉他日拜墓見其地生筍甚衆遂採而歸因携入京復有宗人名思膺者以前任誥牒與用易名干執政遂除桂州都督桂林風土記青鳥白鶴經𦵏書也類要集山川精氣上為星象若𦵏得其所則神安後昌𦵏失其宜則神危後損文苑英華陳希夷嘗為种放卜上世𦵏地不定穴既𦵏希夷見之云地固佳安而稍後世世當出名將邵氏錄閩越黄撥沙善視墓畫地為圗即知休咎故號撥沙后山談叢卜其宅兆卜其地之美惡也非陰陽家所謂禍福者也地之美者則其神靈安其子孫盛若培擁其根而枝葉茂理固然矣地之惡者則反是然則曷地之美者土色之光潤草木之茂盛乃其驗也而拘忌者惑以擇地之方位决日之吉凶不亦泥乎伊川𦵏說射覆史上嘗使諸數家射覆置守宫盂下射之皆不能中朔自賛曰臣嘗學易請射之乃揲蓍布卦而對曰臣以為龍又無角為蛇又有足是非守宫即蜥蜴上曰善前東方朔傳武帝時上林獻􅀥上以所持杖擊未央前殿檻呼朔曰叱叱先生來先生知此筐中何等物也朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木兩木林也來來者􅀥也叱叱者四十九也同上徐季龍取十三種物著大篋中使管輅占之輅先說雞子後道蠶蛹遂一一名之唯以梳為笓耳魏志趙逹嘗過知故為之具食食畢謂曰倉卒乏酒又無嘉殽逹因取盤中隻箸再三縱横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人曰以卿善射有無故相試耳吴志傳記有以茱萸令璞射之曰子如赤鈴含𤣥珠案文言之是茱萸洞林丁文果射覆蜂曰蘤蘤華華山中採花雖無官職一日兩衙唐宣宗取金盆覆白鵲召軒轅集速至纔及玉階曰盆下白鵲宜早放之廣記東方朔嘗與郭舍人於帝前射覆郭曰客來東方謳歌且行不從門入踰我垣墻逰戯門庭上入殿堂擊之拍拍死者攘攘格鬬而死主人被創是何物也朔曰長喙細身晝匿夜存嗜肉惡煙常所拍捫臣朔愚戇名之曰蟁舍人辭窮當復脫禈同上遁甲史桑道茂善太一遁甲術建中初上言國家不出三年有厄㑹奉天有王氣宜髙垣堞為王者居徳宗詔京兆尹發衆城之及朱泚反帝䝉難奉天頼以濟唐書傳記遁者隠也幽隠道也甲謂六甲六儀遞為直符天之貴神也常隠居六儀之下故以遁甲為名符應經三遁者天遁地遁人遁也六甲加六丙名青龍廻首六丙加六甲名飛鳥跌穴陽遁九局陰遁九局自冬至後用陽遁夏至後用陰遁遁甲有八門杜景死驚開休生傷也三竒乙丙丁也並遁甲書孤虛史日辰不全故有孤虛注云甲乙謂之日子丑謂之辰六甲孤虛法甲子旬中無戌亥戌亥即為孤辰巳為虛甲戌旬中無申酉申酉為孤寅邜為虛餘倣此劉歆七略有風后孤虛二十卷史記傳記𤣥女謂黄帝曰戰陳之法背孤擊虛則吉黄帝内傳唐髙宗詔曰或申明歴數六甲孤虛風后妙同京管者咸令薦舉登科記六壬傳記吴王伐齊伍子胥曰竊觀金匱第八其可傷也今年七月辛亥平旦大王以首事辛嵗位也亥陰前之辰也合壬子嵗合前也利以行武决勝矣然徳在合斗繫丑辛之本也大吉為白虎而臨辛功曹為太常而臨亥大吉得辛為九醜又與白虎並重有人若以此首事前雖小勝後必大敗天地行殃禍不乆矣吴越春秋越王勾踐入吴吴王置於石室中欲赦之越王召范蠡告之范蠡曰在玉門第一今年十二月戊寅之日時加日出戊囚人也寅陰後之辰也今庚戌嵗後㑹也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝先而臨酉死氣也而克寅是時尅其日用又助之所求之事上下有憂豈非天網四張萬物皆傷者乎王何喜焉果子胥諌吴王復拘越王於石室同上𤣥女曰壬者乾之首居在天門壬者属水水數一成數六故曰六壬也黄帝内傳徐道符作心鏡言起課之例及論吉凶全經玉鑑總論六壬之㫖六壬連珠論課之吉凶畫經以五采彰施于五色書畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黒天謂之𤣥地謂之黄青與赤謂之文赤與白謂之章白與黒謂之黼黒與青謂之黻五采備謂之繡周禮雜四時五色之位以章之謂之功凢畫繢之事後素功同上白受采記子宋元君將畫圖衆史皆至䑛筆和墨在外者半有一史後至儃儃然不趨受楫不立因之舍公使人視之則觧衣槃礴羸君曰可矣是真畫者也莊子史曹不興善畫孫權使畫屏風誤落筆㸃素因就以作蝇既進御權以為生蝇舉手彈之吴志太宗與侍臣泛舟春苑池中詔坐者賦詩而召閻立本侔狀立本已為主爵郎中俯伏池左研吮丹粉望坐者羞恨流汗歸戒其子曰吾少讀書文辭不减儕輩今獨以畫見名與厮役等汝曹慎毋習本傳相又大唐新語云髙宗朝立本為右丞姜恪以邉功為左相時人為之語曰左相宣威沙漠右相馳譽丹青王維畫思入神至山水平逺雲勢石色繪工以為天機所到學者不及也客有以按樂圖示者無題識維徐曰此霓裳第三疊最初拍也客未然引工按曲乃信唐書鄭䖍嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶同上傳記畫有六法一曰氣韻生動二曰骨力用筆三曰應物象形四曰随類賦彩五曰經營置位六曰傳移模冩畫斷秦有烈裔者含丹墨噀壁以成龍獸善畫龍鳯鴛鴦軒軒然惟恐飛躍王子年拾遺上古之畫迹簡而意淡顧陸之迹是也中古之畫細宻而精㣲展鄭之流是也近世之畫煥爛以求備今人之畫錯亂而無㫖名畫記顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳韓曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀顧陸張吴為正經楊鄭董展為三史餘畫為百家董百仁展子竒皆隋之名畫李嗣貞云董有展之車馬展無董之臺閣顧愷之小字虎頭曽以一厨畫暫寄桓𤣥封題之𤣥開取之誑云不開愷之不疑彼竊直云妙畫通神變化飛去愷之有三絶才絶畫絶癡絶瓦棺寺初置僧衆設㑹請朝賢鳴刹注䟽長康注一百萬寺成請勾䟽長康曰宜備一壁遂閉戸畫維摩詰一軀工畢謂寺僧曰第一日開見者責施十萬第二日可五萬第三日可任例責施及開户光明照寺施者填咽俄而果百萬錢也梁江陵天皇寺内有相堂張僧繇畫盧舍那像及仲尼十哲曰後當頼此耳及後周焚天下寺塔獨此殿有宣尼像乃不毁拆鄭法士求田楊畫本楊引至朝堂指宫闕衣冠人馬曰此吾之畫本也吴道𤣥今古獨歩授筆法於張旭比又知書畫用筆同矣張既號書顛吴宜為畫聖並同上閻立本至荆州視張僧繇舊跡曰是虛得名耳明日又徃曰猶是近代佳手明日乂徃曰名下定無虛士坐卧觀之留宿其下十日不能去大唐新語張僧繇作醉僧圗道士每以􅃧羣僧於是聚錢十萬貨閻立本作醉道士圖今並傳於代國史纂異晉以顧長康張僧繇陸探微為畫家三祖因話錄戴安道就范宣學戴好畫范以為無用戴乃畫南都賦圖范看畢甚以為有益始重畫世說范山人能水畫掘地為池及水滿之具丹筆墨硯援臂叩齒縱毫水上經三日榻以緻絹舉出觀之古松怪石人物屋木無不備也雜爼僧楚安每畫一小團扇内安姑蘓臺或畫滕王閣千山萬水盡在目前然湏一季以來方就一扇野人閑話嘗與吴道子論畫此公下筆如有神助二百年畧無比肩是則張僧繇後身也畫品毛稜惠逺子便速有餘真巧未足若比其父則牀上疊牀隋法論筆調精宻方之厥兄恐屋下架屋續畫品詩人以畫為無聲詩詩話集粉壁為空天丹青狀江海逰雲不知歸日見白鶴在李白設色初成象卿雲示國都九天開祕祉百辟賛嘉謨抱日依龍衮非煙近御爐髙標連汗漫向望接虛無列素熒光發舒華瑞色敷恒將配堯徳垂慶代河圖桞觀慶雲圖詩本朝書畫之妙當以神㑹難以形噐求也世之觀畫者多能指摘其間形象位置彩色瑕疵而已至於奥理冥造者罕見其人如彦逺畫評言王維畫物多不問四時徃徃以桃杏芙蓉蓮花同畫一景予家所藏摩詰畫袁安卧雪圖有雪中芭蕉此乃得心應手意到便成故造理入神廼得天意此難以與俗論也筆談吴道子畫人物如以燈取影逆來順徃旁見側出横斜平直各相乗除得自然之數不差毫末出新意於法度之中寄妙理於豪放之外所謂逰刄餘地運斤成風葢古今一人而已余於他畫或不能必其主名至於道子望而知其真偽也東坡何䖏訪吴畫普門與開元開元與東塔摩詰留手痕吾觀畫品中莫如二子尊道子實雄放浩如海波翻當其下手風雨快筆所未到氣已吞亭亭雙林間彩暈扶桑暾中有至人談寂㓕悟者悲涕手自捫蠻君鬼伯千千萬相排競進頭如黿摩詰本詩老佩芷襲芳蓀今觀此壁畫亦若其詩清且敦祗園弟子盡鶴骨心如死灰不復温門前兩叢竹雪節貫霜根交交亂亂動無數一一皆可尋其源吴生雖妙絶猶以畫工論摩詰得之於象外有如仙翮謝籠樊吾觀二子皆神俊又於維也斂袵無間言同上古畫畫意不畫形梅詩詠物無隠情忘形得意知者寡不若見詩如識畫歐陽公冩真經髙宗夢傅說乃審厥象俾以形旁求於天下說命史甘露三年單于入朝上思股肱之美廼圖畫其人於麒麟閣凡十一人漢書顯宗圖畫二十八將於南宫雲䑓後漢書貞觀十七年凌煙閣圖畫勲臣合二十二人唐書傳記漢元帝後宫既多乃令畫工圖形按圖召幸諸宫人皆賂畫工唯王嬙不肯遂不得見後匈奴求美人為閼氏上按圖召昭君行召見貌比後宫第一帝悔之畫工皆棄市西京雜記顧長康畫裴叔則頰上益三毛人問其故顧曰裴楷俊朗有識具正此是其識具看畫者尋之定知益三毛如有神明殊勝世說顧長康好冩人形欲圗殷荆州殷曰我形惡不煩耳顧曰明府正為眼耳但明㸃瞳子飛白拂其上使如輕雲之蔽日耳顧曰康畫謝輿在巖石裏曰此子宜置丘壑中顧長康重嵇康四言詩因為之圗常云手揮五絃易目送歸鴻難顧長康畫人或數年不㸃目睛人問其故顧曰四體妍蚩本無關於妙䖏傳神冩照正在阿堵中並同上顧虎頭為之畫扇作嵇阮而都不㸃眼睛主問之顧曰那可㸃睛㸃睛便語俗說郭令公子婿趙縱嘗令韓絳冩真又請周昉冩未能定其優劣趙國夫人歸省令公問此畫何人對曰趙郎又云何者最似答云前畫得趙郎形貌後者兼得其神氣性情成都畫師姓許善傳神有人敝衣憔悴求傳神許笑之其人以手摩靣則童顔矣引其鬚應手而黒乃一美丈夫也許驚曰不知神仙臨降道人曰君傳吾神置肆中有求售止取千錢後有識者云此神仙朱桃權也求者輻凑括異錄錢鏐鎮吴越使畫工伺北方士子流移來者皆冩貌以似胡岳渡江畫以貌奏鏐曰靣有銀光竒士也即時召用方鎮編年集爾形不長爾貌不揚胡為將胡為相一片靈䑓丹青莫狀裴度自賛本朝世人畫韓退之小靣美髯乃江南韓熈載耳熈載諡文靖亦謂之韓文公因此謬為退之退之肥而寡鬚後世不復辨也沈存中筆談程伊川云今人以影祭或一髭髪不相似則所祭已是别人矣伊川語傳神之難在目顧虎頭云傳形冩影都在阿堵中其次在顴頰吾嘗於燈下顧自見頰影使人就壁模之不作眉目見者皆失笑知其為吾也東坡語歐陽公像公家與蘇眉山皆有之蘓本韻勝而失形家本形似而失韻形而不韻乃所謂畫非傳神也后山云先生常云見於畫者有七分之容見於容者有七分之心七分之容固不可益七分之心猶或可推張思叔祭伊川文體備陽剛之純氣含喜怒之正睟靣盎背吾不知其何樂幽居深念吾不知其何病置之釣臺􅎄不住冩之雲臺捉不定天下之生乆矣以聽上帝之命陳司文所作朱文公畫像賛擴仁義之端至於可以彌六合謹善利之判至於可以析秋毫拳拳乎其致主之切汲汲乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊吕而失蕭曹也耶朱文公作張敬夫畫像賛以一身而備四氣之和以一心而􅆂千古之秘推其有足以尊主而庇民出其餘足以範俗而垂世然而狀貌不逾於中人衣冠不詭於流俗迎之而不見其來随之而莫覩其躅審是丹青孰形心曲惟常見之者於此而復見之焉則不但遺編之可讀而已也吕伯舉畫像賛畫山水傳記宋宗炳善畫好山水歎曰老疾俱至名山恐難徧遊當澄懐觀道卧以遊之凡所遊歴皆圖於壁坐卧向之名畫記吴道𤣥去住於佛寺畫壁縱以怪石崩灘山水之變始於道𤣥成於二李謂李思訓及子昭道樹石之狀妙如韋偃窮於張道又若王右丞之深重楊僕射之竒贍王宰之巧宻劉商之取象同上王右丞維畫輞川圖山谷鬱盤雲水飛動意出塵外怪生筆端畫記𤣥宗思蜀中嘉陵山水令吴道𤣥徃冩貌及囘日奏云臣無粉本並記在心遣於大同殿圖之三百里山水一日而畢時有李將軍亦畫大同殿壁數月方畢𤣥宗云李思訓數月之功吴道子一日之跡皆極其妙也王墨名洽善潑墨每欲圖幛先以墨潑絹脚蹙手抹或拂或斡随其形象為山為石為水為樹應心随意倐若造化並同上畫山水貴乎石老而潤水淡而明泉石分乎髙下山川辨乎逺近野逕迴迂雲煙出沒千里江山盡歸目下青瑣髙議有酒家見樵叟稍異盡禮接之因謂酒家曰我中山劉商也夙攻水墨願留一圗以酬見待之厚使備縑素援毫運思頃刻而千山萬水非世工之所及廣記集十日畫一水五日畫一石能事不受相促廹王宰始肯留真迹壯哉崑崙方壺圗挂居髙堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣随飛鴻舟人漁子入浦溆山水盡亞洪濤風尤工逺勢古莫比咫尺應湏論萬里焉得并州快翦刀翦取吴松半江水杜詩昔遊玉峽見巫山見畫巫山宛相似疑是天邊十二峯飛入君家綵屛裏寒松蕭颯如有聲陽臺微茫如有情錦衾瑶席何寂寂楚王神女徒盈盈其髙咫尺如千里翠屏丹霞燦如綺蒼蒼逺樹圍荆州歴歴行舟泛巴水李白本朝縹緲營丘水墨仙浮空出沒有無間爾來一變風流盡絶見將軍著色山東坡山深岩髙石壁青白日忽變天晦𡨕黒風驅雲走不停驚雷疾雨來如頃山前雨㸃大如手山下水湧危搓横崩崖古樹老有靈吼怒直與風雲争枝披葉偃鬬不怯萬竅却欲藏雷霆鞭驢疾驅者誰子石路險澁驢凌兢目迷心懾愈走愈不及求憇樹下如寒蝇蒼茫直與鬼神接恍惚不保龍蛇驚平居此景忽入眼孫家古圖纔可辨柰何一幅一尺餘欲奪天地之竒變我心愛之良有以昔吾山行親遇此一生兩足不下堂輸爾朱門貴公子張文讃畫龍傳記張僧繇金陵安樂寺畫四龍不㸃眼睛每云㸃之即飛去人以為妄誕因請㸃之湏㬰雷電破壁二龍乗雲騰上天未㸃睛者見在名畫記唐開元於龍池新剏一殿召馮紹正於四壁閣圖一龍紹正乃先於西壁畫素龍竒狀蜿蜒如欲振躍繪事未半風雲随筆而生明皇雜錄劉洞微善畫龍有夫婦造門曰龍有雌雄雄者角浪四峭目深鼻豁鬐尖鱗宻上壯下殺朱火􅂱􅂱雌者角靡浪平目肆鼻直鬐圓鱗薄尾壯於腹乃化為雙龍飛去卓異記畫龍支體骨節一䖏得似真龍用以祈雨甘雨立降異聞錄畫馬傳記唐韓幹𤣥宗召入供奉奏云内廐馬皆臣之師也其後果能狀飛龍之質盡墳玉之竒畫斷韓畫閱馬圖并御馬皆有三花馬三花馬者翦髪為三瓣也樂天詩云馬鬛翦三花詩話寧王善畫馬花萼樓壁上有六馬滚塵圖明皇最眷玉靣花驄風鬃霧鬛纎悉皆備後壁上唯有五馬其一失去異人錄行者牽者奔者渉者陸者翹者鳴者寢者訛者立者齕者飲者溲者陟者降者痒磨樹者嘘者嗅者喜而相戱者怒相踶齧者秣者騎者驟者走者載服物者載狐兎者凡馬之事二十有七馬大小八十有三而莫有同者焉韓文畫記先帝天馬玉花驄畫工如山貌不同是日牽來赤墀下廻日閶闔生長風詔謂將軍拂絹素意象慘淡經營中斯湏九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向至尊含笑催賜金圉人太僕皆惆悵弟子韓幹早入堂入能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋䘮老杜丹青引國初已來畫鞍馬神妙獨數江都王將軍得名三十載人間又要真乗黄曽貌先帝照夜白龍墀十日飛霹靂觀曹將軍畫馬圖引昔日太宗拳毛騧近時郭家獅子花今之新圗有二馬復令識者乆咨嗟同上本朝二馬並驅攅八蹄二馬宛頸駿尾齊一馬在前雙舉後一馬却避長鳴嘶老髯奚官騎且顧前身作馬通馬語後有八匹飲且行微流赴吻若有聲前者既濟出林鶴後者欲渉鶴俛啄最後一匹馬中龍不嘶不動尾摇風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫當誰㸔東坡詠韓幹馬十四匹不如此圖近自然平沙細草荒芊緜驚鴻脫兎争後先至今霜蹄踏長楸圉人困卧沙壠頭沙苑漠漠蒺藜秋風鬃霧鬛寒颼颼並前人畫牛史桓温使王羲之書扇筆誤落因畫作烏駮牸牛甚妙晋書唐戴嵩善畫水牛畫飲水之牛則水中見影畫牧童牽牛則牛瞳子中有牧童摭遺集崑崙兒騎白象時時鏁着獅子項奚奴跨馬不搭鞍立走水牛驚漢官江村小兒好跨騁脚踏牛頭坡上嶺淺草平田攃過時大蟲着鈍㡬落井杜生知我戀滄州畫作一障張床頭八十老婆拍手笑妬他織女嫁牽牛顧况傳記江南李主獻畫牛晝則齧草欄外夜則歸卧欄中莫曉其理僧賛寜曰此幻藥所畫南海倭國有蚌淚和色著物晝隠夜見沃焦山有石摩色染物夜晦晝顯海外記有藏戴松鬬牛者出與客觀旁有牧童曰鬬牛力在前尾入兩股間今畫鬬而尾掉何也仇池記予老於農圃日親梨杷故雖不識畫而知此畫之為真牛也彼其前者却顧而徐行後者驤首而騰赴目光烱然真若相語以雨而相趣以歸者覽者未必知也良工獨苦詎不信然宋文公䟦畫竹集植物之中竹難寫古今雖畫無似者蕭郎手下獨通真丹青已來唯一人人畫竹身肥擁腫蕭畫莖痩節節竦人畫竹梢死羸垂蕭畫枝活葉葉動不根而生從意生不筍而成由筆成嬋娟不生筠粉態蕭瑟盡得風煙情舉頭忽看不似畫低耳静聽疑有聲白樂天本朝墨竹起於近代不知其所師承初吴道子作畫連筆作卷不加丹青予意墨竹之師起於此山谷序竹之始生一寸之萌耳而節葉具焉自蜩蝮蛇蚹以至于劍枝十尋者生而有之也今畫者乃節節而為之葉葉而累之豈復有竹乎故畫竹必先得竹意於胷中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兎起鶻落少縱則逝矣東坡東坡命官奴秉燭捧硯寫風竹一枝題詩云更將掀舞勢把燭畫風篠美人為破顔憐此腰肢裊老可能為竹寫真小坡今與石傳神並同上畫花木傳記黄筌父子畫花妙在賦色用筆極細始不見墨迹但似輕色染成謂之寫生江南徐熈以筆畫之殊草草畧施丹粉而神氣迥出别有生意筌惡其軋已言其粗俗不入格罷之熈之子乃效諸黄格更不用墨筆直以彩色圖之謂之沒骨圖筌不復能疵瑕遂得齒院品然其氣韻皆不及熈逺甚筆談蜀有趙昌善畫花每晨朝露下遶欄捧玩手中調采色自課寫生趙昌其為生菜折枝果尤妙東齊記事世多墨畫山水竹石及人物者未有以畫花者也汴人尹白能之為賦詩云花心起墨暈春色散毫端縹緲形纔具扶踈態自完東坡古來寫生人妙絶誰似昌晨粧與午醉真態含陰陽君看此花枝中有風露香却因梅雨丹青暗洗出徐熈落墨花並前人衡州花光仁老以墨為梅花黄魯直觀之曰如嫩寒春曉行孤山水邊籬落間但欠香耳冷齋夜話筆端喚醒玉梅魂滿䄂春風不見痕未許捲簾新月上却教煙雨惱黄昏張灝記纂淵海卷八十七
