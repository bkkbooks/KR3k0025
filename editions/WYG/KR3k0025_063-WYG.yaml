body:
  text: 記纂淵海卷六十三宋潘自牧撰言語部總叙言語經言行君子之樞機亂之所生也則言語以為階誣善之人其辭游失其守者其辭屈並易惟口出好興戎惟口起羞並書君子約言小人先言言語之美穆穆皇皇並記有徳者必有言有言者不必有徳詩書執禮皆雅言也並語子與人善言煖於布帛傷人之言深於矛㦸荀子孟浪之言荘子言不經非言也言重則有法言輕則招尤並揚子人有多言者猶百舌之聲人有少言者猶不脂之婦也淮南子捈中心之所欲通諸人之㗲㗲者莫如言言心聲也揚子史言身之文也左僖二十八年叔向曰辭之不可以已也如是子産有辭諸侯賴之若之何其釋辭也左襄三十一年貎言華也至言實也苦言藥也甘言疾也商君傳誠有味其言也西漢鄭當時傳臣宣呐鈍于辭鮑宣傳集言語階亂禰正平賦語到磨圭角元微之本朝言不可以不重也子不見鐘鼓乎叩之然後鳴鏗鍧鏜鞳人不以為異也若不叩自鳴人孰不以為妖耶可以言而不言猶叩之不鳴亦為廢鐘鼓矣遷書有意而言意盡而言止者天下之至言也東坡謹言經山下有雷頥君子以愼言語擬之而後言並易猶胥顧于箴言其發有逸口書愼爾出話君子無易由言耳屬于垣並詩君子寡言而行以成其信記君子於其言無所苟而已矣語子多言數窮不如守中老子言有召禍揚子后稷之廟有金人焉三緘其口而銘其背曰古之謹言人也無多言多言多敗口是禍之門家語口可以食不可以言谷子言而非仁之中也則其言不若其黙也其辯不若其呐也荀子非相言語在口譬含鋒刄不可動故天有卷舌之星人有緘口之銘列子言出不復追其猶射也懸機未發則猶可止矢一離弦雖欲反之不得也言者風也無足而行無翼而飛不可易也劉子傳記舌者兵也出言不當反自傷也説苑言猶射也括既離弦雖有所悔不可從而退也同上史口無惡言東漢卓茂傳平均與人言若不出口世號囁嚅翁唐書竇羣䇿傳集白圭尚可磨斯言為易緇選詩舌端之孽慘乎楚鐵劉賔客五刄之傷藥之可平一言成疴智不能明我口之啓爾心之捫無為我兵當為我藩以慎為鍵以忍為閽可以多食不可多言口兵之起其刑渥焉並同上徒見婁敬掉而獲爵不見魏其齰以可悲李徳裕不知言之人烏可與言韓文寡言經吉人之辭寡易君子約言記史顧雍為丞相平尚書事雍為人寡言吳主亦曰顧公在坐使人不樂其畏憚如此吳志徐羡之風度詳整時然後言晉恭紀王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之阮千里見戎戎問曰聖人貴名教老荘明自然其㫖同異瞻曰将無同戎即辟之時謂之三語掾並晋書謝安嘗稱美王濛云王長史語甚不多可謂有令音晉王濛傳衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微瑯琊王澄有髙名毎聞玠言輙歎息絶倒衛玠傳傳記吉人之辭寡若含鋒刄而不敢動也白氏六帖多言經躁人之辭多易小人先言詩子多言數窮老子禍莫大于多言文中子多言徳之賊也多言不可與逺謀機易泄並同上人有多言猶百舌之聲也淮南子蝦蟇蛙鼃日夜而鳴舌乾擗然而人不聴之今鶴經時夜而鳴天下振動多言何益惟其言之時也墨子史子産曰竈焉知天道是亦多言矣左仲尼曰賜不幸而言中是使賜多言者也同上司馬牛多言而躁史記多語耗氣劉洎傳集人有多言者百舌之聲也文粹蛙鼃鳴無謂閤閤祗亂人韓詩言不徒發經弔喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舎君子問人之寒則衣之問人之饑則食之並記子蝦蟇蛙鼃日夜而鳴舌乾擗然而人不聴之今鶴經時夜而鳴天下振動多言何益惟其言之時也墨子得萬人之兵不如聞一言之當淮南子史東方朔曰談何容易西漢晏子曰君子有信其有以知之矣左昭二年衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微琅琊王澄有髙名每聞玠言輒歎息絶倒晉書傳記謝太傅一生言未嘗誤世説集不知言之人烏可與言韓文善於言語經言滿天下無口過孝出其言善則千里之外應之易辭之輯矣民之洽矣辭之懌矣民之莫矣詩子贈人以言重於珠玉荀子魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諌不聴乃以問其傅宰折睢曰吾欲西益宅而史以為不祥子以為如何宰折睢曰天下有三不祥西益宅不與焉哀公大悦而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾無止二不祥也不聴强諌三不祥也哀公黙然深念憤然自反遂不敢西益宅淮南子史楚子玉請戰晉欒枝對曰楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不𫉬命矣敢煩大夫謂二三子敬爾君事詰朝相見左僖二十八年君子曰仁人之言其利博哉晏子一言而齊侯省刑左昭三年晉叔向適鄭鄭鬷蔑立于堂下一言而善叔向曰子若無言吾㡬失子言之不可以已也如是同上趙王新立秦急攻趙趙求救于齊齊曰必以長安君為質兵乃出太后不肯大臣强諫后曰復言者老婦必唾其面左師觸龍見后盛氣而待之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為媪之愛燕后賢於長安君太后曰不若長安君之甚左師曰父母愛子則為之計深逺今媪尊長安君之位而不及今令有功于國一旦山陵崩長安君何以自託于趙老臣以媪為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家王澄曰胡毋彦國吐佳言如鋸木屑霏霏不絶後進領袖也樂廣善談論每以約言析理以厭人之心並晉書趙王閒出為燕軍所獲燕將囚之欲求割地使者往請燕輒殺之有厮養卒走燕壁見燕將曰君知張耳陳餘何欲曰欲得其王耳趙養卒笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面而王豈欲為卿相終已耶今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕况以兩賢王左提右挈而責殺王之罪滅燕易矣燕將乃出趙王養卒為御而歸秦紀焦和清談干雲東漢孔公緒清談髙論噓枯吹生同上曹操執陳宫曰奈卿老母何曰宫聞以孝治天下者不害人之親老母存否在明公不在宫也操曰奈卿妻子何宫曰臣聞施仁政於天下者不絶人之祀妻子存否在明公不在宫也漢獻紀孔融髙談清雅盈溢官曹可玩而誦東漢雍州言新豐縣東南有山踴出俞文俊上書天氣不和而寒暑併人氣不和而疣贅生地氣不和而堆阜出今陛下以女處陽位反易剛柔故地氣隔塞而山變為災陛下謂之慶山臣以為非慶唐武后李昭徳言于太后曰天皇陛下之夫皇嗣陛下之子陛下身有天下當傳之子孫為萬代業豈得以姪為嗣乎自古未有姪為天子姑立廟者也同上上謂李泌曰今用卿欲與卿有約卿慎勿報仇有恩者朕當為卿報之對曰臣素奉道不與人為讐李輔國元載皆害臣者今自斃矣素所善及有恩者率已顯逹或零落臣無可報也泌曰李晟馬燧有大功于國聞有讒之者雖陛下必不聴然臣今日對二人言之欲其不自疑耳晟燧富貴已足苟陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之故臣願陛下勿以二臣功大而忌之二臣勿以位髙而自疑則天下永無事矣晟燧皆起泣謝唐徳宗帝苦溽暑命宫苑使王允平别建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足然陛下雖欲營繕終不可得乃遣中使語之曰今嵗盛暑異常朕昔在河上與梁人相距行營卑濕被甲乘馬親當矢石猶無此暑今在深宫之中而暑不可度奈何對曰陛下昔在河上勍敵未滅深念讐恥雖有盛暑不介聖懐今外患已除海内賔服故雖珍臺閒館猶覺欝蒸也陛下儻不􅁯艱難之時則暑氣自消矣帝黙然唐荘宗以三寸舌為帝者師賈山借秦為諭名曰至言並西漢失言經白圭之玷尚可磨也斯言之玷不可為也詩不可與言而與之言失言言未及之而言謂之躁未見顔色而言謂之瞽並語子未同而言觀其色赧赧然士未可以言而言是以言餂之也可以言而不言是以不言餂之也孟子餂音忝謂取之也一言而非駟馬不能追鄧析子交淺而言深亂也淮南子史墜言於呉西漢鄒陽傳蘇林曰墜失也闗内大雨四十餘日京師民相驚言大水至百姓奔走大将軍鳳以為太后與上及後宫可御船令吏民上長安城以避水王商獨曰何因當有大水暴至此必訛言也有頃長安中稍定問之果訛言鳳大慚自恨失言通鑑漢成紀王渾妻鍾氏嘗與渾共坐子濟趨庭而至渾欣然曰生子如此足慰人心琰笑曰鍾氏名琰若新婦得配參軍渾弟生子固不當如此耳晉書列女傳傳記出言不審駟馬不能追也世説失問子魯侯欲以孔子為司徒将召三桓而議之左丘明曰周人有愛裘而好珍羞者欲為千金之裘而與狐謀其皮欲為少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉符子史内史叔興曰君失問是隂陽之事非吉凶所生左僖十年董仲舒曰昔魯君問栁下惠吾欲代齊曰不可歸曰伐國不問仁人此言何為至於我哉前漢集晉文公既受原於王而難其守問寺人勃鞮以畀趙衰余謂守原政之大也不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣嗚呼得賢臣守大邑則問非失舉也盖失問也然猶羞當時陷後代况於問與舉又兩失者柳文持論經出言有章詩史議論通古今喟然動衆心西漢鮑宣傳為人長美言西漢郊祀志馬援善述前事皇子諸王聞者皆屬耳忘倦後漢子真持論感起昏俗東漢崔寔傳衛玠好言𤣥理遇有勝日親友時請一言無不咨嗟以為入微晉書岑文本謂所親曰馬君論事㑹文切理無一言可損益聴之纚纚令人忘倦蘇張終賈應止此耳唐書李徳裕謀議援古為質滚滚可喜本傳集置言成範選昭王碑立言必雅選集序議論有餘地杜詩持論峯巒峻劉賔客談辯附游説子公孫龍困百家之智窮衆口之辯荘子史有君子甚口左昭二十六年談辯如濤侯公天下辯士所居傾國史記項羽紀毛遂至楚定從而還平原君歎曰毛先生以三寸之舌强百萬之師史記淳于髠多辯數使諸侯未嘗屈辱史滑稽傳齊田單攻聊城不下魯仲連乃為書約之矢以射城中遺燕将書曰吾聞之知者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身忘聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣説士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同燕将見魯連書泣三日乃自殺聊城大亂田單遂屠聊城史記魯仲連飾辯辭設詐謀馳逐於天下以要時勢者謂之游説漢紀荀悦齊王使淳于髠獻鵠於楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺股絞頸而死恐人之議吾王以鳥獸之故令士自殺傷也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過楚王曰善齊王有信士史滑稽傳六國既定從張儀能明其説復解散諸侯太史公自序陸賈天下名為有口辯士使南越尉佗曰越中無足與語至生來令我日聞所不聞賜千金稱臣奉漢約史本傳隋何曰陛下使何淮南至如陛下之意是使何之功賢於歩卒五萬騎五千也史記漢王復使侯公往説項王項王乃與漢約中分天下割鴻溝以西者為漢鴻溝以東者為楚項王許之即歸漢王父母妻子漢王乃封侯公為平國君曰此天下辯士所居傾國故號為平國君史記項羽紀言若懸河通鑑隋煬帝陳餘遺章邯書曰白起為秦将南征鄢郢北伐馬服攻城畧地不可勝計而竟賜死蒙恬為秦将北逐戎人開榆中地數千里竟斬陽周有功亦誅無功亦誅通鑑秦紀游説隋何至九江王見之隋何曰漢王使臣敬進書大王御者竊怪大王與楚何親也楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣請與大王提劍歸漢漢王必裂地而封大王又况九江必大王有也九江王曰請奉命通鑑漢髙紀游説辯士蒯徹説信曰且酈生一士伏軾掉三寸之舌下齊七十餘城将軍以數萬衆嵗餘乃下趙五十餘城為将數嵗反不如一豎儒之功乎同上蒯徹知天下權在信乃説信曰盖聞天與弗取反受其咎時至不行反受其殃韓信曰漢主遇我甚厚吾豈可以鄉利而背義乎蒯生曰始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事常山王殺成安君泜水之南首足異處此二人相與天下至驩也然而卒相擒者何也患生於多欲而人心之難測也通鑑漢髙紀立秦南海尉趙佗為南粤王使陸賈即授璽綬與剖符通使通鑑漢恵紀游説隋何至九江見英布曰臣請與大王提劍而歸九江王曰奉命楚方責布發兵何直入曰九江王已歸漢楚何以得發兵殺楚使西漢本傳飛談卷霧晉書韓伯傳贊裴遐善言𤣥理音辭清暢冷然若琴瑟嘗與河南郭象談論一座嗟服晉書單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅答對之皆有餘至日暮魏志裴頠辭論豐博時人謂頠為言談之林藪晉書本傳裴楷善宣吐左右屬目聴者忘倦同上謝靈運辭義鋒起王惠嘗與之談荀伯子曰靈運固自蕭散直上王郎有如萬頃波焉宋書鄭元璹口伐可斥唐書本傳傳記抵掌而談戰國䇿裴僕射善談名理渾有雅致張茂先論史漢靡靡可聴世説郭子元言議如懸河瀉水注之不竭裴公之談終日不絶同上戰國駟説雲踴人持弄丸之辯家挾飛鉗之術劇談者以譎誑為宗利口者以寓言為主若史記載蘇秦合從張儀連衡范睢反間而相秦魯連解紛而全趙知㡬史通田駢好談論時號曰天口十畧集劇談戯論扼腕抵掌左太冲蜀都賦四海齊鋒一口所敵魏賦剖析毫釐擘肌分理選西京賦飛辯騁辭選薦表離堅合異之談選序片言而求三輔一説而定五州選䇿文辯析天口選令辯言之艷能使窮澤生流枯木發榮選行状飛辯騁辭溢氣坌涌解疑釋結臨敵有餘孔文舉薦禰衡表髙談雄辯驚四筵杜詩談論淮湖渀同上髙談滿四座李太白集詞鋒犀利劉賔客談笑多味詞鋒不可摧並同上辯如懸河文粹五岳為詞鋒其辯若注其論若鋒辭源辯愽馳騖古今之際髙歩天地之間並同上談柄發洪鍾温飛卿一介之辯重於九鼎之寳三寸之舌强於百萬之師蒋子萬機論與之語道理辯古今事當否論人髙下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也韓文送石洪處士序踔厲風發率當屈其座人韓退之作栁宗元墓誌本朝賓主談鋒敵兩都笑談謦欬生風雷談辯如雲玉麈飛髙談破巨浪並東坡詩敏於應對子晉范獻子殺晉大夫欒枝後出遊恐欒枝之子報也行至津所問舟人曰君見欒枝之子乎舟人曰君修晉之政事欒枝子其若君何君若出入無度我舟中之人與欒枝之子無異獻子遂以田萬頃賜舟人以貴其言尸子又見尹子史齊伐魯公使展喜犒師齊侯曰魯人恐乎展喜曰小人恐矣君子則否齊侯曰何恃而不恐對曰恃先王之命楚伍參曰事之捷孫叔為無謀矣不捷參之肉将在晉軍可得食乎楚子問鼎之大小輕重周王孫滿對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其姦回昏亂雖大輕也成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也宋子明謂桐門右師曰吾猶衰絰而子擊鐘何也右師曰已衰絰而生子余何故舎鐘並左傳口對應響無窮者史張釋之傳王孫圉聘于晉趙簡子問曰楚之白珩為寳㡬何曰楚之所寳者曰觀射父能作訓辭左史倚相能道訓典此楚國之寳也若夫白珩先王之玩也何寳之為國語梁王謂齊王曰寡人有徑寸之珠照車前後各十二乘者十王亦有寳乎齊威王曰寡人所以為寳者與王異吾有四臣将以照千里豈特十二乘哉梁王慙齊世家晏子使楚晏子短楚王曰齊無人耶晏子曰齊命使各有所主其賢者使賢主其不肖者使不肖主嬰最不肖固宜使楚耳説苑有專對材西漢王吉傳翔應聲輒對變詐鋒出莫能窮者西漢本傳明帝問張重曰何郡小吏答曰日南吏帝曰日南郡人應向北看日答曰臣聞鴈門郡不見累鴈為門金城郡不見積金為城臣雖居日南未嘗向北㸔日東漢靈帝問侍中楊竒曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比徳唐堯東漢王式曰臣以三百五篇諫是以無諫書通鑑漢宣紀上官桀始以十九得幸為未央廄令上嘗體不安及愈見馬多痩上大怒曰令以我不復見馬耶欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬通鑑漢昭紀祀孔子於闕里及七十二弟子帝謂孔僖曰今日之㑹寜於卿宗有光榮乎對曰親屈萬乘辱臨敝里此乃崇禮先師増輝聖徳至於光榮非所敢承帝曰非聖者子孫焉有斯言通鑑漢和帝紀呉王遣趙咨入謝帝問曰呉如大夫者㡬人對曰聰明特逹者八九十人如臣之比車載斗量不可勝數通鑑三國魏文紀鄧艾見宗預曰禮六十不服戎而卿受兵何也預曰卿七十不還兵我六十何為不受耶蜀志阮孚謂卞壼曰卿常無閒泰如含瓦石不亦勞乎壼曰諸君子以道徳恢𢎞風流相尚執鄙吝者非壼而誰通鑑晉成紀馮延已嘗戯孫晟曰公有何能為中書郎晟曰晟山東鄙儒文章不如公談諧不如公諂詐不如公然主上使公與齊王游戲盖欲以仁義輔導之也豈但為聲色狗馬之友耶晟誠無能如公之能適足為國家之禍耳通鑑五代晉髙紀上嘗與杜坦論金日磾曰恨今無復此輩人坦曰日磾假生今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也坦曰以臣言之臣本中華髙族晉氏䘮亂播遷涼土世業相承不殞其舊直以南渡不早便以荒傖賜隔日磾胡人身為牧圉乃超登内侍齒列名賢聖朝雖復拔才臣恐未必能也上嘿然通鑑宋太祖魏帝甚重齊臣謂羣臣曰江南多好臣李元凱曰江南多好臣嵗一易主江北無好臣百年一易主通鑑齊太祖梁主下詔将還建康胡僧佑宗慄劉穀諫曰建業王氣已盡荆州當出天子周𢎞正王褒曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時羣臣多荆州人皆曰𢎞正等東人也志願東下恐非良計𢎞正面折之曰東人勸東謂非良計君等西人欲西豈誠良策通鑑梁世祖山人李唐見上方抱㓜女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之愛公主也通鑑唐代宗唐僖宗嘗謂優人石野豬曰朕若應擊毬進士舉須為状元對曰若遇堯舜作禮部侍郎恐不免駁放通鑑唐紀太后召徐有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大徳太后黙然通鑑唐武后李希烈謀稱帝遣人問儀於顔真卿對曰老夫嘗為禮官所記惟諸侯朝天子禮耳通鑑唐徳宗紀命蕭復充山南等道宣慰安撫劉従一及朝士往往奏留復上謂陸贄曰朕謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨累日意復悔行使之論奏耶贄奏云蕭復若相屬求則従一等何為容隠従一等稍自回互則蕭復不當受疑陛下何憚而不辯明乃直為悵恨也同上先主以伊籍使呉孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君乎對曰一拜一起未足為勞蜀志鍾㑹造嵇康康不為之禮良久㑹去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去晉書嵇康傳時梅陶鍾雅數説事祖納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如搥持我鈍搥捶君利錐皆當摧矣陶雅並稱有神錐不可得搥納曰假有神錐必有神搥晉書祖納傳袁宏有逸才謝安常賞其機對辯速後宏出為東陽郡安欲以卒廹試之臨别執其手顧左右取一扇授之宏輒曰當奉揚仁風慰彼黎庶晉書顧悦之與簡文帝同年而髪早白帝問其故對曰松栢之姿經霜猶茂蒲栁之質望秋先零晉書本傳孫綽作天台賦示范榮期曰卿試擲地當作金聲榮期曰恐此金石非中宫商同上何承天除著作郎年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母承天曰卿當云鳳凰将九子妳母何言耶宋書文帝嘗與羣臣臨天泉池帝垂綸良久不獲王景文越席曰臣以為垂綸者清故不獲貪餌何偃謂劉瑀曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不着鞭使到千里答曰一蹴造青雲何至與駑馬爭路並同上周盤龍為散騎常侍齊武帝戲之曰卿着貂蟬何如兠鍪對曰此貂蟬從兠鍪中生耳齊書本傳後梁蕭巋降周武帝自彈琵琶令巋舞周武曰梁王乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸後梁書東魏以楊愔典選令史唱名誤以盧士深為士琛深自言其名愔曰盧郎潤朗所以加玉三國典畧互入因誤成誤論難鋒生随方占對北史徐廣傳顔師古仕隋為尉楊素見其年弱曰劇縣子何以治之師古曰割雞焉用牛刀隋書占對華敏唐書宇文融神悟警敏應對如響雖天子不能屈唐書本傳許敬宗孫伯彦昻之子也敬宗晩年不復下筆凡大典册悉伯彦為之常戲昻曰吾兒不及若兒答曰渠父不如昻父新唐書姦臣本傳盧坦為河南尉杜黄裳為尹召坦立堂下曰某家子與惡人游破産盍使察之坦曰凡居官亷雖大臣無厚蓄其能多積蓄者必剝下以致之如其子孫善守是天富不道之家也不若恣其不道以歸於人坦以為宜故不察黄裳驚視新唐書盧坦傳其後李翺作坦傳云吏河南知其捕盜黄裳為河南尹謂坦曰某家子與惡人游破舊産公為捕盜盍察之也坦仰曰凡居官始終㢘白祗入俸錢者雖歴大官亦無厚蓄以傳其能多積財者必剝下以致如其子孫善守之下同見李翺文集髙宗出獵遇雨因問諫議大夫吾那律曰油衣若為不漏對曰以瓦為之必不漏矣新唐書本傳陸機詣武子武子前置數斗羊酪指示陸曰江東何以敵此陸曰有千里蓴羮但未下鹽䜴耳時人以為名對世説孫綽齋前種一株松髙世逺時亦鄰居語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓栁雖合抱亦何所施客有問陳季方曰足下家君有何功徳而荷天下重名季方曰吾家君譬如桂樹生於泰山之阿上有萬仞之髙下有不測之淵上為甘露所沾下為淵泉所潤當此之時焉知泰山之髙淵泉之深不知有功徳與無也並同上衛玠見阮瞻嘲之曰一言可辭何假三阮曰苟是天下名望可無言而辟何假於一言衛玠别傳集應對如轉圜杜詩本朝王荆公初參政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳趙清獻獨折之曰君言失矣臯契之時有何書可讀荆公黙然邵氏晉謝朓知吏部選事有姓譚者乞官朓曰齊桓滅譚那得有君對曰譚子奔莒所以有僕丁用晦芝田錄强辯經禦人以口給屢憎於人語子困百家之知窮衆口之辯荘子秋水强足以拒敵辯足以飾非荘子盜蹠趙公孫龍為堅白異同之辯荀子後序史辭勝於理終必受屈通鑑周紀言足以飾非史記殷紀反言易辭而成文章劉向説苑杜周為廷尉史客曰君為天下决平不循三尺法專以人主意指為獄周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎西漢本傳持詭辯以中人西漢趙王彭祖傳孫楚欲隱居謂王濟曰欲枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒晉書本傳梁蕭琛御宴醉伏武帝以棗投琛琛仍取栗擲上正中面帝曰豈有説耶即對曰陛下投臣以赤心臣敢不報以戰栗南史傳記殷浩語孫安國曰卿莫作强口馬世説唇吻經尚口乃窮也易截截善諞言書口費而煩易出難悔記緇衣口多空言包煩數也子摇唇鼓舌荘子士憎兹多口孟子史釋本而事口舌史蘇秦傳息夫躬既親近數進見言事論議無所避衆畏其口見之側目上疏歴詆公卿大臣曰丞相王嘉健而蓄縮不可用御史大夫賈延堕弱不任職左将軍公孫祿司𨽻鮑宣皆外有直項之名内實騃不暁政事諸曹以下樸遫不足數西漢本傳嗇夫喋喋利口捷給前漢張釋之傳以舌得官西漢婁敬傳灌夫罵坐西漢本傳陳湯利口不軌西漢翟方進傳好訾毁西漢地理志一尊之身三期之間乍賢乍佞豈不甚哉通鑑漢成紀尊王尊也樊伷頗能弄唇吻而實無才略通鑑漢獻紀漢桓帝末年甘陵有南北黨人之議中外承風競以臧否相尚自公卿以下莫不畏其貶議通鑑東漢好議論人長短妄是非正法東漢馬援傳品覈公卿裁量執政東漢黨錮傳集街談巷議彈射臧否剖析毫釐擘肌分理所好生毛羽所惡成創痏東京賦一心百舌何紛紜文粹舌端萬變乘春輝同上利嘴迎人㸔不得劉賔客弄口鳴舌百葉書抄巧言經無以利口亂厥官書盜言孔甘亂是用餤詩巧言如簧顔之厚矣同上巧言亂徳語子惡利口恐其亂信也孟子史巧言醜詆西漢劉向傳李林甫忌文學士啗以甘言而隂陷之通鑑唐𤣥宗紀謗訕經惡居下流而訕上者語史入則心非出則巷議史記秦始皇敢為妖言以亂黔首同上不入言而腹非西漢食貨志流言飛文譁於民間前漢反唇腹誹南史楊震曰損辱清朝塵㸃日月通鑑東漢本朝日月遭虧蔽歐公詩謗毁經流言于國書叔孫武叔毁仲尼語子昔直不疑未嘗有兄而讒者謂其盜嫂第五倫三娶孤女而世人稱其笞婦翁此聴虛而責響悖情倒理誣罔之甚也劉子史鄭子産作丘賦國人謗之曰其父死於路已為蠆尾左傳有蜚語為惡言聞上史灌夫傳灌夫謂李賢曰平生毁程不識不直一錢西漢灌夫傳論議不右方進西漢翟方進傳師古曰毁短也孔子大聖不免武叔之毁子路至賢猶有伯寮之愬東漢列女傳横被口語西漢楊惲傳羊祜不附結王戎王衍二人多毁祜時人為之語曰二王當國羊公無徳通鑑晉武紀樂毅王佐而被謗晉書邢邵善屬文洛中貴人拜職多憑邵作謝表章有一貴勝初授官袁翻與邵俱在坐翻意主人託其為謝表命邵作之翻不悦每告人云邢家小兒當客作表自買黄紙冩送之北史先是䇿賢良李宗閔牛僧孺皇甫湜條對甚直考第其䇿同居第三權幸惡其詆己而不中第者乃注解其䇿同為唱誹唐書傳記魏文侯令樂羊將攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語集玉變為石珠變為礫毁謗使然也論衡積毁銷骨江文通書吠堯謗舜燕公集大聖不過周孔然猶管蔡謗於前叔孫毁於後皮日休緘黙子正其衣冠齊其顔色嘿然而終日不言者子夏之賤儒也荀子人有少言者猶不脂之婦也淮南子史括囊不言西漢公孫賀傳言君臣邪固當諫諍語朋友邪應有切磋豈有知其無成而但萎腇咋舌叉手從族乎東漢馬援傳隱情惜已自同寒蟬東漢杜宻傳上數有宣索仍勅諸道勿令宰相知泌聞之惆悵而不敢言通鑑唐徳宗馬𦙍孫為中書侍郎時人目為三不開口印門也通鑑五代髙祖紀窮治楚王英獄御史寒朗曰歸舎口雖不言仰屋竊歎通鑑後漢集鉗口卷舌江文通書正言不發萬國如封元次山諤諤非周舎容容類胡廣徐陵與楊遵彦書惜身不言仰屋竊歎李深之文滑稽經謔浪笑傲善戲謔兮不為虐兮並詩子艾子見老嫗衣衰哭甚艾子曰嫗夫誰也曰彭祖艾子曰彭子夀八百而死固不為短可以無恨嫗曰然又有夀九百而不死者豈不恨耶艾子艾子海上見一物圜而􅄶且多足曰蝤蛑也又一物差小曰螃蠏也又有一物其状亦類前所見而形劇小曰彭越也艾子曰所謂一蠏不如一蠏也同上依隱玩世詭時不逢其滑稽之雄乎揚子史談言微中亦可解紛太史公滑稽傳序楚優孟嘗以談笑諷諫楚荘王有愛馬死使羣臣哀之欲以棺槨大夫禮葬之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為槨楩楠豫章為題楱發甲卒為穿壙老弱負土齊趙陪立於前韓魏翼衛其後廟食太牢奉以萬戸之邑史記滑稽傳秦二世欲漆城優旃秦倡朱儒曰善漆蕩蕩㓂來不能上即欲就之易為漆耳顧難為䕃室二世笑之同上秦樗里子滑稽多智秦人號曰智囊史記東方朔滑稽之雄西漢本贊朔紿侏儒曰上以若曹無益於縣官耕田力作固不及人臨衆處官不能治民従軍擊虜不任兵事無益於國用徒索衣食今欲盡殺若曹侏儒大恐西漢東方朔傳滑稽則東方朔枚臯西漢公孫𢎞等贊東方朔曰朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十侏儒飽欲死臣朔饑欲死上大笑西漢本傳初曹操攻屠鄴城袁氏父子多見侵掠而操子丕私納袁熈妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大将軍逺征蕭條海外昔肅慎不貢楛矢丁零盜蘇武牛羊可并案也東漢孔融傳初習鑿齒嘗與孫綽共行綽性通率好譏調時綽在前顧鑿齒曰沙之汰之瓦礫在後鑿齒曰簸之颺之糠粃在前晉書太傳始有東山之志桓公見藥中有逺志公問謝此藥又名小草何以一物異稱謝未即答郝參軍答曰處則為逺志出則為小草謝公殊有愧色世説鄧艾口吃語稱艾艾晉文王戯云艾艾為是㡬艾鄧答曰鳳兮鳳兮故是一鳳桓南郡與殷荆州作危語桓曰矛頭淅米劍頭炊殷曰百嵗老翁攀枯枝顧愷曰井上轆轤安嬰兒殷有一參軍在坐曰盲人騎瞎馬夜半臨深池殷曰咄咄逼人仲堪眇目故也並同上沈昭畧性狂見王景文子約曰汝是王約也何乃肥而癡約曰汝沈昭畧也何乃痩而狂昭畧大笑曰痩己勝肥狂又勝癡宋書何承天除著作郎時年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母同上節度李忠臣因奏對徳宗謂曰卿耳甚大貴人也忠臣曰臣聞驢耳甚大龍耳極小臣耳雖大乃驢耳也上悦之唐書李濤喜詼諧不修邊幅通鑑周世宗馮道滑稽多智通鑑周太祖紀傳記徐晦嗜酒沈傳師善飱楊嗣復云徐家肺沈家脾真安穩耶語林李白戯杜甫詩曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太痩生總為從前作詩苦樂府解題本朝祖廣行常縮頭詣桓南郡始下車桓曰天甚晴明祖叅軍如従屋漏下來續世説談詞最詼諧發辯如有神臨川郭祥正出詩一軸示東坡先自吟誦聲振左右謂坡曰􅖤正此詩㡬分來坡曰十分祥正驚問之坡曰七分是讀三分是詩王直方詩話張子野以樂章擅名一時宋子京往見之先令人戯曰尚書欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意閙尚書耶國子博士郭忠恕嘗嘲司業聶崇義云近貴全為聵攀龍只是聾雖然三箇耳其奈不成聰崇義答曰莫笑有三耳全勝蓄二心陳亞性滑稽知潤州幕中有上官弼亞所親信任滿将去亞曰何以見教弼曰郎中才行無玷但調謔過差亞笑曰君乃上官弼也如下官口何弼笑而去進士李居仁盡摘白鬚其友驚曰昔日皤然一翁今則公然一婆並遯齊閒覽善滑稽巧發微中旁人抵掌絶倒而㓜安淡然不變色也東坡集石昌言字㓜安蔡君謨戯陳亞曰陳亞有心終是惡陳曰蔡襄無口便成衰張師正倦㳺録黄魯直戱東坡曰昔右軍字為換鵞字韓宗儒性饕每得君一帖於殿帥姚麟換羊肉數斤可名二丈書為換羊書矣公在翰苑以生辰製撰紛冗宗儒作簡以圗報書來人督索甚急公笑曰傳語本官今日斷屠李宗諤名談錄不輕然諾經君子與其有諾責也寜有己怨記子路無宿諾語史已諾必誠史游俠傳序趙國立名義不侵為然諾者也史陳餘傳載貫髙事已然諾西漢灌夫傳師古謂一許人必信之也自立然諾西漢張耳傳得黄金百斤不如得季布一諾前漢季布傳布衣相與尚有沒身不負然諾之信通鑑漢光武孫䇿曰太史子義其心秉道義重然諾一以意許知已死亡不相負通鑑漢獻紀范式與張元伯為友二人春别京師以暮秋為期元伯以九月十五日殺雞以待母曰相去千里汝何信之也言未卒而至後漢書集共秉延州信無慙仲尼諾選詩然諾之信重於布衣選誄三盃吐然諾五嶽倒為輕文誄不輕許可經孔子曰今吾於人也聽其言而觀其行語史二荀論人久而益信魏志本傳本朝狄青討儂智髙有因貴近求從青行者青曰從青之士能擊賊有功青不敢不為之奏若往而不能擊賊軍中法重青不敢私也君其思之聞者大駭無復敢言求從青行者其所辟皆青素所與以為可用者人望歸矣南豐雜識用舍行藏仲尼獨許於顔子存亡進退義易不及於賢人坡文輕於然諾子輕諾者必寡信老子史凡云食言者終為不信棄其前言如食而盡西漢匈奴傳注集抗爽言以矯情班固幽通賦記纂淵海卷六十三
