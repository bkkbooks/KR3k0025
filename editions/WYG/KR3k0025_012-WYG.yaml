body:
  text: 記纂淵海卷十二宋潘自牧撰郡縣部淮南西路廬州倚郭一外縣二合肥梁縣舒城保信軍節度淮西路安撫司制置司轉運司郡號合肥廬江肥水南豫徳勝軍保信軍州沿革吳地斗分野禹貢揚州之域春秋舒國徐取之楚又取之戰國屬楚秦九江郡地漢廬江九江二郡地魏為揚州治晉淮南廬江二郡地宋齊為廬江郡梁置汝隂郡又改南豫州尋改合州隋開皇改廬州大業為廬江郡唐屬淮南道後唐改長興陞昭順軍節度周改保信軍沿革表縣沿革合肥本漢九江郡合肥縣晉屬淮南郡梁改汝隂縣及置汝隂郡隋廢郡改合肥縣置廬州治焉梁縣本漢浚遒縣屬九江郡晉屬淮南郡東晉改慎縣東魏置平梁郡陳改梁郡隋廢郡以慎州屬廬州舒城本春秋舒國楚滅之漢置廬江郡治舒縣晉後廢縣唐開元析合肥廬江置舒城縣沿革表形勝潛山州治所據巢湖詳見地理部湖類龍潭在梁縣治後鵲岸在舒城春秋吳人敗楚扵此金城河在合肥西金沙灘在藏舟浦鐵索澗金斗城皆在合肥三角山在舒城四頂山在合肥東南桃城鎭在舒城縣北花家城在舒城西舊名竹子市龍舒山在舒城有龍舒水龍眠山鹿起山在舒城金牛山在合肥金雞潭在舒城輿地紀勝人物范增為項羽謀臣文翁化巴蜀好文雅左慈有神術吳周瑜破曹操扵赤壁晉陶侃惜分隂唐萬敬儒三世同居兩賜旌表皇朝馬亮漕西川王均反主將誅戮得亮救免者千數包拯守本州不少屈法天下號曰包家李公麟博學好古輿地紀勝集勝境天然别精藍入畫圖一山分四頂三面瞰平湖羅隠本朝孝宗朝以御名改慎縣為梁縣沿革表集沃壤欲包淮甸盡堅城尤抱蜀山迴栁塘春水藏舟浦蘭若秋風教弩臺晴湖列逺岫萬疊來駿奔横入小蜀岡金友依玉昆肥川勝賞冠他州浦口揚舲得俊逰梅雨正肥江國路蘋風未破洞庭秋朱服蜀山回出千螺秀肥水長縈一帶迴猶合金城藏後浦不惟銅雀起樓臺花島可憐春自媚栁洲遙覺月微眀郭祥正無為軍倚郭一外縣二無為巢縣廬江淮西路提刑司提舉司郡號廬江居巢巢州軍沿革星土分野歴代地理並同廬州本朝置軍沿革表縣沿革無為本漢廬江郡襄安縣梁改蘄縣隋復為襄安屬廬江郡唐為巢縣本朝析置無為縣為軍治巢縣本古南巢地春秋羣舒之邑漢為廬江郡居巢縣三國屬吳後廢之晉復置屬廬江郡隋省入襄安縣唐武徳置巢州七年州廢改襄安為巢縣屬廬州本朝置軍來屬廬江本漢廬江郡龍舒縣南齊改廬江縣梁置湘州北齊廢之隋廢郡𨽻廬州義興移治扵石梁東南唐景隆移治扵今所本朝置軍來屬沿革表形勝杏山在巢縣梅山見左傳楚師伐鄭右回梅山栭山在廬江巢山在巢縣本名道山巢湖在巢縣西一名焦湖孔臺在巢縣云宣聖與羣弟子憇息扵此吕泉在石膏山下云吕仙卓劍而泉湧出三公山九卿山在廬江縣佛足山在無為縣西仙女洞在廬江有仙女臺錦緑溪在城内七寳山在巢縣為西關濡須山為東關輿地紀勝人物東漢毛義以孝行稱皇朝楊傑自號無為子有無為集二十五卷賈易辨韓忠彦援立之功焦蹈元豐魁天下士王之道與兄之義之深同登科名其所居堂曰三桂堂輿地紀勝本朝太平興國三年以巢縣之無為鎭置無為軍以廬州巢縣廬江縣來屬熙寧三年析巢廬江二縣置無為縣治郭下沿革表集荻迸短芽淝水暖荷浮圎葉漅湖清温公此樓此景他州無山川形勝吞三吳惟慿詩老寫竒勝縱有畫筆難工夫此樓此景他州無天髙水濶連平蕪緑楊深處杏花發日暖數聲山鷓鴣楊侍講詠南樓山横大秀一峯髙水隔平湖千里遥楊坎兮林靄波光秀可餐登臨都付一亭間坐違世事塵埃逺静入湖山日月閒對岸鶯花迷閬苑隔煙洲溆砌蓬山習池勝事無多闕只負襄陽倒載還蒲守詠挹秀亭壽春府倚郭一外縣一下蔡霍邱忠正軍節度郡號壽春下蔡壽州忠正軍府沿革禹貢揚州之域戰國屬楚秦九江郡漢髙帝為淮南國武帝復九江郡治壽春縣東漢兼置揚州三國屬魏晉武帝改九江郡為淮南郡宋齊兼置豫州元魏曰揚州梁曰南豫州東魏曰揚州陳曰豫州後周曰揚州隋開皇改壽州治壽春縣置總管府大業為淮南郡唐壽州治壽容縣天寳曰壽春郡屬淮南道後唐陞忠正軍節度周顯徳徙治潁州之下蔡本朝陞府沿革表縣沿革下蔡本春秋州來國漢為沛郡下蔡縣東漢屬九江郡晉置淮南郡梁置汴郡北齊廢之隋屬汝隂郡唐武徳改淮州縣尋復故又置渦州八年州廢屬潁州五代周世宗徙州治此霍邱本春秋蓼國漢為廬江郡松滋縣梁置安豐郡東魏廢之隋置霍邱縣屬壽州唐武徳以松滋霍邱二縣置蓼州七年省松滋州廢屬壽州神功曰武昌景雲復故名沿革表形勝壽春合肥受南北皮革鮑木之輸亦一都㑹也漢志南引汝潁之利東連吳㑹之富北接梁宋平途不過七百里西接陳許水陸不出千里外有江湖之阻内有淮淝之固龍泉之阪良田萬頃舒六之貢利盡南越晉伏滔𫝊峽石山潁水淮水在下蔡豐津在霍邱沿革表八公山在壽春有隠室石井初學記人物秦甘羅年十二為泰上卿皇朝吕夷簡及子公著皆為名相見安豐軍下集不見華胥夢空聞下蔡迷李義山本朝州郡軍額並仍前代政和六年陞壽春府沿革表集珠履繽紛宴壽陽欄干横出白雲傍小艇鬬垂凹鼻釣佳人尤學小梅粧郭祥正安慶府倚郭一外縣四懐寧桐城宿松望江太湖安慶軍節度舊提刑司郡號灊山同安舒皖皖城徳慶桐鄉府沿革星紀之次斗分野禹貢揚州之域春秋羣舒地楚􅂑之戰國屬楚秦九江郡地漢廬江郡地三國屬魏孫權克皖城以為重鎭晉安帝置晉熙郡梁兼置豫州後改晉州北齊改江州陳又改晉州隋開皇廢郡置熙州大業為同安郡唐武徳為東安州五年為舒州天寳曰同安郡至徳為盛唐郡後復故屬江南道五代吳及南唐有之本朝陞府沿革表縣沿革懐寧本漢廬江郡皖縣晉永嘉後廢之安帝復置懐寧縣為晉熙郡治隋初置熙州後為同安郡治唐改舒州治此桐城本春秋桐國漢為廬江郡樅陽縣東漢省之宋置隂安縣屬晉熙郡梁復置樅陽縣郡隂安屬焉隋開皇廢郡省隂安以樅陽屬熙州十八年改同安縣唐屬舒州至徳更今名宿松本漢皖縣地梁置髙塘郡隋開皇廢為縣屬熙州十八年改今名唐武徳置嚴州州廢來屬望江本漢皖縣地晉安帝置新冶縣屬晉熙郡陳置大雷郡隋開皇廢郡改曰義鄉十八年改望江屬熙州唐武徳置髙州尋改智州州廢屬嚴州嚴州來屬太湖本漢皖縣地宋置太湖縣屬晉熙郡齊置龍安郡陳廢之復屬晉熙郡隋改縣曰晉熙後復名太湖屬熙州唐屬舒州沿革表形勝灊山在懐寧西北上有三峯一曰天柱二曰灊山三曰皖山灊水出焉為第十四小洞天南嶽漢武帝以衡山遙逺移祭灊山遂為南嶽龍吟岩虎嘯岩皆在灊山左右龍井在真源宫虎井在中煉丹山三祖山在郡西北有乾元寺七公山在皖山南百子山在懐寧縣東萬嵗峯在玉照峯北多智山在懐寧縣北桃花港去司真洞五里菊花港在懐寧東北桑落洲在宿松縣南麟角峯在皖山頂虎頭岩在懐寧北龍眠山在桐城西北鳳棲山在太湖縣東南玉龍洞在州北七十里金雞石在真源宫後水晶洞在天柱寺中瓊瑶宫在灊山西瑪瑙山在太湖北白雲山在太湖東丹霞峯至皖山二里輿地紀勝人物漢朱邑守東海治行第一南史河尚之子孫多文人仕皆顯達皇朝王珪為相張漢卿為興國管庫與太守論事不合即和陶潛歸去來辭大書扵印紙而去輿地紀勝集疎鐘天柱寺細雨皖溪船張喬縣好也知臨皖水官閒應得㸔灊峯羅隠灊嶽積蒼翠皖溪生素波馬戴本朝政和五年陞徳慶軍節度紹興十七年改安慶軍沿革表集一水碧羅裁繚繞萬峯蒼玉刻孱岩王介甫獨秀司命峯衆立遜髙寒松竹二喬宅雪霜三祖山山谷碧水蒼山照眼青始知朱邑愛桐城郭祥正此山富山水自昔少園池主簿峯髙昔所見司空山深初未㳺白水十丈瀑吳塘千頃波林依玉照逺雲為石盆留虎頭玉照南北嶺麟角石盆三兩峯三百六旬了無事二十七峯常對門横舟千古樅陽水一徑從容達觀臺北峽逺連南峽險小龍峻逼大龍髙徐俯勢參吳楚分作鎭向同安地勝塵寰隔天深洞府寬位將衡嶽獻根與霍山蟠日轉香爐暖風清玉照寒石樓平郡堞天柱倚雲端禪臨祖師塔山接左慈壇𤣥宗曽立廟漢武亦鳴鑾孫倬題灊山蘄州倚郭一外縣四蘄春蘄水羅田廣濟黄梅蘄春郡防禦郡號蘄春蘄水蘄陽南晉州沿革楚地翼軫之分禹貢揚州之域春秋戰國屬楚秦九江郡地漢江夏郡地三國屬魏吳取之置蘄縣晉廢之屬弋陽郡惠帝屬西陽郡孝武屬新蔡郡宋屬西陽郡南齊置齊昌郡北齊置雍州陳為江州後周改蘄州隋開皇置總管府大業為蘄春郡唐屬淮南道沿革表縣沿革蘄春屬漢江夏郡呉為郡治晉屬弋陽尋改蘄陽梁改縣曰蘄水北齊改蘄陽隋復曰蘄春與蘄水並屬蘄春郡唐為蘄春治武徳省蘄水入焉蘄水本漢蘄春縣地宋置浠水縣及永安郡梁置羅田縣及義城郡隋廢郡以二縣屬蘄州唐武徳改浠水曰蘭溪省羅田縣天寳改今名羅田本漢蘄春縣地梁置義成郡隋廢為羅田縣唐武徳省之本朝復置廣濟本漢蘄春縣地唐武徳析蘄春置永寧縣天寳改今名黄梅本漢蘄春縣地晉元帝置新蔡郡及永興縣隋改新蔡又改今名屬蘄州沿革表形勝静眀山在州東有神祠徳章山在黄梅縣東天柱峯在黄梅縣北月頂山在蘄水縣西四祖山大醫禪師道塲五祖山人滿禪師道塲皆在黄梅縣楊梅嶺在黄梅縣黄梅山在縣北石龜山石龍陂在廣濟縣玉鏡山在蘄水玉虹泉在羅田金仙山在廣濟龍平山在黄梅縣鳳棲山在蘄水輿地紀勝人物林敏功弟敏修隠居不仕世號二林龎安時喜讀書治病有竒功呉神紹興間以布衣上書王玠罵叛臣孔彦周全家遇害輿地紀勝集笛愁春盡梅花裏潭冷秋生薤葉中蘭溪春盡碧泱泱映水蘭花雨後香楚國大夫憔悴日應尋此路去瀟湘杜牧蘄水城西向北㸔桃花落盡栁花殘朱旗半捲山川小白馬連錢草樹寒戴叔倫本朝元祐八年以石橋鎭陞為羅田縣紹興五年廢為鎭尋復置㑹要集勝地初無一㸃埃水晶城裏小瑶臺環岸栁弄碧雲合浮島蓮分翠蓋來劉極詠含暉閣甃石封苔百尺深試嘗茶味少知音唯餘半夜泉中月留得先生一片心王元之詠陸羽泉霽容闕態栁藏橋欲到險頭尋怪石夜來春雨漲前溪闕淮南西路和州倚郭一外縣二歴陽含山烏江歴陽郡防禦舊提舉司郡號歴陽濡須烏江東城南豫州沿革天文南斗魁下禹貢揚州之域春秋戰國屬楚秦九江郡地漢末為揚州刺史治三國吳重鎭呉屬淮南郡永興分置歴陽郡宋兼置南豫州北齊置和州隋開皇廢郡大業廢州復歴陽郡唐武徳改和州天寳曰歴陽郡屬淮南道沿革表縣沿革歴陽秦初置縣屬九江郡漢為都尉治東漢為刺史治晉初屬淮南郡後屬歴陽郡北齊置和州隋唐為州治含山本漢歴陽縣地東漢末孫權置濡須塢晉元帝置龍亢縣後周省入歴陽唐武徳析置含山縣八年廢之長安復置更曰武壽神龍復曰含山烏江本秦東城之烏江亭漢屬九江郡晉置烏江縣屬淮南歴陽二郡梁置江都郡北齊改齊江郡陳改臨江郡後周改同江郡隋開皇廢郡以縣屬和州大業為歴陽郡治唐屬和州沿革表形勝𤣥元有臺彭鏗有洞名山曰雞籠名塢曰濡須異有皿閫祥有沸井劉夢得壁記揚山在歴陽南桃塢在紫極觀梁山在歴陽南滁河在歴陽北濡須山在含山西濡須水出焉烏江浦在縣東即亭長艤舟欲渡項羽處白石山在歴陽山下有洞黄龍城在烏江縣白馬河在歴