度太平興國改崇信熙寧五年省光化縣為鎭入隨縣沿革表嘉定年間割徳安府應山縣入隨州邸報集城上春光鶯語亂城下煙波風拍岸錢文僖詩筒相逐到隨城練句揮毫老益精范純仁詩到隨州更老成江山為助筆縱横山谷隨為西楚南郡頗富山水溳水帶西城城髙敞郡亭城隅樓榭與雲平城下流溪見底清邢恕雲山連楚塞夏水暗隨城隨州九十九重山安得鄉人住此間王安中隨州西南多竒峰争髙競秀無終窮衆山迤邐漸行盡始見獨尊惟大洪楊連厥溳雙水抱城隅髙誼前聞季大夫九十九岡風俗厚人人况已握靈珠陳師道均州倚郭一外縣一武當鄖鄉武當軍節度郡號武當鄒城始平鄖鄉齊興豐則州沿革秦韓之交角亢氐東井之分野禹貢豫州之域春秋麋國戰國屬韓秦屬南陽漢屬南陽漢中二郡魏屬南鄉郡晉屬順陽郡宋後置武當郡齊僑置始平郡尋改齊興兼置興州後周改豐州隋廢郡改均州大業州廢屬淅陽郡唐義寧置均州貞觀廢之屬淅川八年復置武當軍地理沿革表縣沿革武當屬漢南陽郡魏南鄉郡晉順陽郡後置武當郡隋治均州州廢屬淅陽郡唐復屬均州鄖鄉本春秋麋國漢錫縣長利縣地屬漢中郡東漢省長利魏屬魏興郡晉復置長利縣太康改錫縣為鄖鄉東置南上洛郡西魏改豐利郡析錫縣置豐利縣後周廢郡隋以豐利屬西域唐屬均州本朝省豐利地理沿革表形勝武當山在縣南二百里中有一峯名參嶺峯上有三十六巖天柱山在鄖鄉上有三石門飛仙徃來寳盖山在鄖鄉金鎖嶺在武當山落㡌峯乃戴将軍上昇落㡌扵此兠鍪山在鄖鄉三生石在武當縣千齡州在鄖鄉一名滄浪州輿地紀勝人物皇朝陳摶號希夷先生隠扵武當山後乃居華山紀勝集我生本似逺行客况是亂離多病身經山渉水向何處㸔見竹林禪定人戴叔倫題武當蘭若本朝宣和元年陞武當節度㑹要乾徳省豐利縣入鄖鄉沿革表集萬事若在手百年聊稱情他時南嶽去記得此巖名陳搏題俞公巖蘇壁留詩志何大可憐泰華老圖南張士遜我愛武當好將軍曾得道蛻舉入雲霄髙岑名落㡌無名氏記纂淵海卷十二
