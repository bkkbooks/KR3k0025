body:
  text: 記纂淵海卷八十八宋潘自牧撰博奕部博子虞氏者梁之富人也登髙樓臨大路設樂陳酒擊博樓上列子史博之所以貴梟者便則食不便則止何用智之不如梟也史記博戲惡業也而栢發用之富同上陳遵祖父遂宣帝微時相隨博奕數負進及帝即位遷遂太原太守迺賜璽書曰官尊祿厚可以償博進矣前陳遵傳注云進會禮之財也張賈出守衢州文宗曰聞卿大善長行賈曰臣公事之餘聊與廣客為戲非有所妨也唐書唐僖宗與諸王賭鵝鵝一頭至百五十緡通鑑傳記六博用十二棊分白黒各半擲之博經今之博戲長行最盛其具有局有子子黒黄各十五擲彩之頭有二其法生於握槊變於雙陸後人新意長行出焉彊名爭勝謂之撩零假借分畫謂之囊家囊家什一而取謂之乞頭國史補貞元中宋清進博經一卷國史纂要天寶中嶺南獻白鸚鵡甚聰慧呼為雪衣女上每與嬪御及諸王博戲上稍不勝左右呼雪衣女必飛局中鼓翼以亂之譚賔錄肅宗與張良娣打博子聲聞于外鄴侯因言及上遂潛令刻乾樹鷄為子不欲有聲良娣尤怨鄴侯家傳桓宣武家貧求救於袁躭躭時居艱迺變服懐布㡌隨温去與債主戲躭素有藝名債主就局曰汝故當不辦作袁彦道耶遂共戲十萬一擲直上百萬數投馬絶叫旁若無人擲布㡌仍對人曰汝竟識袁彦道不世說集箆敝象棊有六博些分曹並進遒相迫些成梟而牟呼五白些楚辭六博争雄好采來金盤一擲萬人開李白有時六博快壯心遶床三匝呼一擲五木思一擲如繩繫窮猿連呼五白行六博分曹賭酒酣馳暉並同上咸陽客舍一事無相與博塞為歡娛慿陵大叫呼五白袒跣不肯成梟盧杜詩昨夜雙鉤敗今朝百草輸關西狂小吏惟喝遶床盧李義山本朝盡日閒窓賭選遷小姓争覔倒盆錢上籌争占蓬萊島一擲乗鸞出洞天王禹玉竟識彦道否絶叫呼百萬東坡摴蒱史陶侃領荆州刺史諸叅佐或以談戲廢事者乃命取其酒器蒱博之具悉投之於江將吏則加鞭撻曰摴蒱者牧猪奴戲耳晉書劉裕於東府聚摴蒱大擲餘人並黒犢唯裕及劉毅在後毅次擲雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳裕因挼五木曰老兄試為卿答即成盧焉劉毅家無擔石之儲一擲百萬並同上劉毅好摴蒱宋武帝與毅斂局各得半積錢毅呼帝併之先擲得雉帝良久答之擲得盧謂帝曰知公不以大坐席與人鄭鮮之大喜徒跣繞床大叫毅甚不平曰此鄭君何為者無復甥舅之敬南史宋明帝大會新亭樓摴蒱李安人五擲皆盧帝大驚曰卿面方如田封侯相也宋孝武嘗與顔師伯摴蒱帝擲得雉大恱師伯後擲得盧帝失色師伯遽斂子曰幾作盧師伯爾日一輸百萬或謂卞彬曰卿都不持操何由得升彬曰擲五木子十擲輒犍豈復是擲子之拙並同上梁主蕭詧曽獻碼碯鍾周文帝顧丞郎曰能擲摴蒱頭得盧者便與鍾已經數人不得至蒒端乃執摴蒱頭而言曰非為此鍾可貴但思露其誠耳便擲之五子皆黒文帝恱即以賜之北史周文帝解所服金帶令諸人徧擲曰先得盧者與之擲將徧至王思政乃誓曰方願盡心效命上報知己若此誠有實願即為盧周文止之已擲為盧矣同上傳記摴蒱其法三分其子三百六十限以二關人執六馬其頭五枚分上為黒下為白黒者刻二為犢白者刻二為雉擲之全黒乃為盧其彩十六二雉三黒為雉其彩十四二犢三白為犢其彩十全白為白其彩八四者貴彩開為十十二塞為十一塔為五秃為四犍為二撅為三六者雜彩貴者得連擲得打馬得囘關餘彩則否國史補有人見洞中二老人摴蒱乃以鞭拄地而觀俄忽鞭爛而鞍朽廣異記王子敬數嵗嘗看諸門生摴蒱見有勝負因曰南風不競門生輩輕其小兒乃曰此郎亦管中窺豹時見一斑耳子敬瞑目曰逺慙荀奉倩近愧劉貞長拂衣而去世說桓宣武與袁彦道摴蒱彦道齒不合遂厲色擲去五木温太真曰見袁生遷怒知顔子為貴同上集成梟而牟呼五白些楚辭十載荒郊任博徒挼莎五木擲梟盧元稹本朝東坡云慕容寶與韓黄李根等欵讌摴蒱誓之曰世言摴蒱有神若富貴可期頻得三盧於是三擲盧寶拜而受賜近從新譜識梟盧擬喚安陽舊博徒只恐分隂閒過了更教人誚牧猪奴雙陸傳記南海獻集翠裘則天以賜張昌宗時狄仁傑入奏事則天命與昌宗雙陸賭之昌宗累局連北狄公對御脫其裘拜恩而出及至光範門遂付家奴衣之促馬而去集異記餘互見賜紫類梁時荆州掾屬雙陸賭金錢盡以金錢花相足魚𢎞謂得花勝得錢雜爼具州潘彦奴雙陸每有所詣局不離身曽泛海遇風船破彦右手挾一板左手抱雙陸局口銜雙陸頭子經二日一夜至岸兩手見骨局終不挫頭子亦在口僉載梁王書曰雙陸乃出天竺涅槃經名為波羅塞戲類要武后自置九勝局形如雙陸其頭加千萬二彩其子三十令文武官分明為此戲同上陸大夫與普願禪師見人雙陸拈起骰子云恁麽不恁麽只恁麽信彩去時如何師拈起骰子臭骨頭十八傳燈錄投子史徐温與劉信博信斂投子祝曰劉信欲背吳願為惡彩茍無二心當成渾化一擲六子皆赤五代史傳記博陸彩名也陳思王置雙陸局置投子二至唐末有葉子之戲遂加投子至六飾四以朱者明皇與貴妃采戰惟重四可轉敗為上擲連呼叱之以投子宛轉而成重四上大恱命髙力士賜四緋也事始張祐客淮南幕中赴宴時杜牧為支使座有美人索投子賭酒牧微唫曰投子逡巡褁手拈無因得見玉纖纖祐應聲答曰但知報道金釵落髣髴還應露指尖摭言有王生與夏侯孜偕遊京西鳯翔連帥館之一日從事有宴召焉酒酣從事以投子祝曰二秀才明年若俱登第當擲堂印王生怒曰吾誠淺薄與夏侯孜同年乎孜及第至宰相王生竟無所聞廣記薛昭遇三美女請擲子遇采强者得薦枕席張雲容采勝同上蜀王建為禁軍都頭與其儕於僧院擲投子六隻次第相重自幺至六人共駭之他日覇蜀北夢瑣言擲投子呪云伊帝彌帝彌靖羅帝念滿十萬遍彩隨呼而成雜爼問和尚年多少師曰始見去年九月九如今又見秋葉黄曰畢竟如何師曰六隻投子滿盆紅傳燈錄集客有以博戲自任者有博齒二異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應朞月視其轉止依以争道是制也通行之久矣莫詳所祖以其用必投擲故以博投詔之是日客抵骨于局且祝之曰其來如趨其去如脫劉夢得集是朽骴者不余畀也同上本朝投子者投擲之義今或作頭子言骨所成非也有作骰子者骰即股字不音投史記蔡澤說范雎曰博者咸欲大投投瓊也則知以玉名為投擲之義資暇集棊經奕者舉棋不定不勝其耦左傳子奕之為數小數也不專心致志不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣孟斷木為棋亦皆有法焉揚棋局謂之奕孔叢子史魏軍次於興勢費褘率衆禦之光祿大夫來敏至褘所别求共圍棋時羽檄交馳褘與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也蜀志王粲觀人圍棋局壊粲為覆之棋者不信以帊蓋局更以他局為之用相比校不誤一道本傳晉武帝與張華圍棋間杜預表適至華推枰斂手曰吳之荒淫驕虛宜亟討之晉書苻堅率衆百萬攻淮淝謝安無懼色旋命駕出圍棋賭別墅至夜乃還指授將帥各當其任旣而兄子𤣥破堅有驛書至安方對圍棋看書了無喜色棋如故客問之徐答云小兒輩已破賊王導嘗與子恱奕棋争道導笑曰相與有𤓰葛那得為爾邪王恬善奕棋為中興第一並同上宋明帝與王抗圍棋每假借之曰皇帝飛棋臣抗不能斷上終不悟好之愈篤通鑑羊𤣥保與宋文帝奕棋賭郡𤣥保戲勝補宣城太守南史琅邪王抗第一品吳郡褚思莊會稽夏赤松第二品齊髙帝使思莊與王抗交賭自食時至日暮一局始竟謝𢎞微性寛博末年與友人棋友人西南棋有死勢傍一客曰西南風急友悟乃救之𢎞微大怒投局於地識者知其暮年之事梁到漑與武帝圍棊達旦或低睡帝嘲曰狀似䘮家狗又似懸風槌並同上陸雲公善奕棋嘗夜侍武帝冠觸燭火帝曰燭燒卿貂帝將用為侍中故以此戲之齊書順宗為太子王叔文以善棋得侍東宫唐書方若棋局圓若棋子動若棋生静若棋死李泌傳傳記堯造圍棋以教子丹朱或云舜以子商均愚故作圍棋以教之博物志人能盡數天星則徧知棋勢述戈集取蛻龍牙一枚手握之臨局自然機變横出李參棋談王積薪夢青龍吐棋經九部授已其藝頓精棋訣王積薪寓宿山中但有姑婦夜䦨忽聞姑與婦曰良宵無以為適與子敵棋共子下三十六子姑曰子已敗矣吾止勝九枰耳積薪遲明問之姑始令案局置子因指示攻守殺奪救應防拒之法曰已無敵於人間矣述異記信安郡石室山晉時王質伐木見數童子棋視斧柯爛盡旣歸無復時人同上一行本不解棋觀王積薪一局遂與之敵笑曰此但争先耳若念貧道四句乗除語則人為國手雜爼日本國王子來朝王子善棋上勅待詔顧師言對手王子出如楸玉棋局冷暖玉棋子言本國有手譚池池中出玉子自然黒白分為冬温夏冷故謂之冷暖玉更産如楸玉狀類楸木師言與之敵手至三十三子即謂之鎮神頭解兩征勢也杜陽編王中郎以圍棋是坐隠支公以圍棋為手談世談石晉陳保性極鄙吝每與人奕棋敗則手亂棋局懼所賭金錢不欲償也續世說李杓值與人棋而敗乃竊數子嚥之反呼尋問乃鼓局大怒棋天洞覽徐峯善棋段成式欲窮其術峯曰子若以墨狻猊與我當令子過我十倍大唐龍髓記集所志不出一枰之上所務不過方罫之間文選圓奩象天方局法地圍棋賦文楸方罫花參差心算未成星滿池温庭筠一木之枰孰與方國之封枯棋三百孰與萬人之將韋曜論初疑磊落曙天星次見博擊三秋兵鴈行布陣衆未曉虎穴得子人皆驚劉禹錫山僧對棋坐局上竹隂清映竹無人見時聞子下聲白樂天對面不相見用心如用兵筭人常欲殺顧已自貪生得勢侵天逺危行打刼贏有時逢敵手當局到深更杜荀鶴本朝太宗時待詔賈𤣥侍上棋太宗饒三子𤣥常輸一路太宗知其挾詐乃曰此局汝復輸我當榜汝旣而滿局不生不死太宗曰汝亦詐也更圍一局汝勝賜汝緋不勝當投汝於泥中旣而不勝不負太宗曰我饒汝子今而局平是汝不勝也命左右抱投之水乃呼曰臣握中尚有一子太宗大笑賜以緋衣荆公詩注吕相留守東都公退必手談會有文簿公罷棋發遣歘見棋者易一子公明日謝客束帛遣之芝田錄林和靖每曰逋世間事皆能之唯不能擔糞著棋黒客揮犀李重恩奕棋與人對奕坐而昏睡人精思久之方下一子重恩開目隨手應之皆出人意表李巖老好睡衆人食飽下棋巖老輒就枕閱數局乃一展轉云我始一局君幾局矣東坡曰巖老常用四脚棋盤著一色黒子昔與邊韶敵手今被陳搏饒先著時自有輸贏著了並無一物腹心受害誠堪懼唇齒生憂尚可醫康節飛雹落文楸山谷彈棊傳記漢成帝好蹙鞠羣臣以為非尊者所宜劉向為彈棋以獻小說彈棋魏宫中用裝器戲也文帝善彈棊能用手巾角時一書生又能低頭以所冠葛巾撇棋世說魏戲法先立一棊於局中餘者間白黒圍繞之同上集莫近彈棊局中心最不平李義山彈棋玉指兩參差背局臨虛鬬打危先打角頭紅子路上三金字半邊垂王建宫詞房生直温與余二弟遊皆好學余病其確也思所以休息之者得木局隆其中以䂓焉其下方以直置棋二十有四貴者半賤者半用朱墨以別焉旣而抵戲者二人則視其賤者而賤之視其貴者而貴之余諦觀之以思其始則皆類也房子一書而輕重若是適近其手而先焉非能擇其善而朱之否而墨之也然則若世之所以貴賤人者其異房子之貴賤於兹棋者歟栁文序棋本朝彈棋局方二尺中心髙如覆盂其顛為小壺四角微隆起今譜中具有此法栁子厚敘棋用二十四棋者即此戲也筆談漢皇初厭蹙鞠勞侍臣始作彈棋戲東方諸公盛得名魏文邇來稱絶技後宫粧奩仍可為低著葛巾尤更竒誰能朱墨異貴賤百世紛紛無己時劉貢父象戲傳記巴卭人剖二大橘每橘有二老叟相對象棋一叟曰橘中之樂不減商山但不能深根固蒂為人摘下耳廣記周武帝始造象戯事始集箆蔽象棋楚辭本朝大都博奕皆戯劇象戯翻能學用兵車馬尚存周戰法偏裨曾備漢官名中軍八面將軍重河外斜尖步卒輕却凭文楸閒自笑雄如劉項亦閒争程明道蹙融史吾丘夀王以善格五召待詔漢書傳記說文云行棋相塞謂之簺鮑宏簺經曰簺有四采塞四乗五是也至五即格不得行故謂之格五類要於奕具一枰各布五子角遲速名蹙融雜爼或謂之蹙戎漢書謂之格五雖止用數棋共行一道亦有能否徐德占善移遂至無敵其法已常欲有餘而致敵人於險墨客揮犀選職集開成三年予舟行次洞庭之陽遇二三子號進士者以穴骰雙雙為戲更投局上以數多少為進身職官之差數豐貴而約賤卒局座客有為尉掾而止者有貴為相臣將臣者有連得美名而後不振者有始甚微而歘升於上位者大凡得失酷似前所謂不繫賢不肖但值其偶不偶耳彼真為貴者乃數年之榮耳吾今之貴者亦數刻之樂耳又安知數刻之樂果不及數年之榮耶房千里選格圖序本朝丁謂叅政楊文公曰骰子選耳何足道哉互見叅政類記纂淵海卷八十八
