body:
  text: 記纂淵海卷五十一宋潘自牧撰識見部委順經樂天知命故不憂遯世無悶不見是而無悶樂則行之憂則違之並易得之自是不得自是以聽天命君子居易以俟命上不怨天下不尤人並記用之則行舍之則藏道之將行也與命也道之將廢也與命也並語子遺佚而不怨阨窮而不憫君子不怨天不尤人行止非人所能也吾之不遇魯侯天也並孟當死不懼在窮而戚知命也列子知命知其不可奈何而安之若命唯有徳者能之子貢曰古之得道者窮亦樂通亦樂所樂非窮通也適來夫子時也適去夫子順也安時而處順哀樂不能入也孔子曰我諱窮久矣而不免命也求通久矣而不得時也並莊子樂天知命吾何憂窮理盡性吾何疑文中子史知命不憂乗流則逝得坎則止並漢賈誼傳君子得時則大行不得時則龍蛇遇不遇命也揚雄傳黄憲隤然其處順東漢本傳郭璞遇顏含欲為之筮含曰自有性命無勞蓍龜人禀命有定分非智力所移唯應恭已守道而闇者不逹妄意僥倖徒虧雅道無關得喪乃以其意命弟子愿著定命論以釋之宋世祖李嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳唐明宗傳記知命之士見利不動臨死不怨劉向新序集委命順理與物無患張華鷯賦鷦齊萬物兮超自得委性命兮任去留嵇康琴賦歸老任乾坤杜詩進取果由命不由趨險難元稹集貧賤非不惡道在何足避富貴非不愛時來當自致寘懐齊寵辱委順隨行止時邪命邪吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能㝠至順而合大和客問樂天憂病否樂天知命更無憂並白侍郎集悠悠天地間委順無不樂張九齡集日有糲食歲有粗衣饑寒獲同骨肉相保此亦熙熙委順之外益自安也白傅集何去何從罷龜䇿之臧否自開自落任天地之榮枯唐文粹本朝齒髪付天公缺壊不可修坡詩待時經君子藏器於身待時而動尺蠖之屈以求信也龍蛇之蟄以存身也並易有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也語子雖有鎡基不如待時孟史姑務修徳以待時乎譬如農夫是穮是蓘雖有饑饉必有豐年並左戢鱗潛翼思屬風雲晉宣帝紀王猛斂翼待時候風雲而後動王猛傳陸法和曰凡人取果宜待熟時不撩自落梁世祖元魏于謹曰州郡之職昔人所鄙台鼎之位須待時來北史本傳集貴賤貧富不可求兮正身履道以俟時曹大家東征賦雖無𤣥豹姿且隱南山霧謝朓詩仲尼旅人文王明夷茍非其時聖賢低眉李太白天馬長鳴待駕馭杜詩未展從東駿空戢圖南翼駱賓王勉哉耘其業以待歲晩收填窓塞户慎勿出暄風暖景明年日並韓詩低囘且向籠間宿奮迅終須天外飛白樂天潛龍須待一聲雷杜牧之六翮未因風武伯蒼龍蟠泥中未有雲不能生彼昇天翼張文昌夭矯太空鱗曾為小泉蟄孟東野夫豫章珠璣鏌鎁毛嬙終不慮隱櫃撓櫃一作樻撓一作燒帷之為患而臃腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳權徳輿蟄龍三冬卧老鶴萬里心唐文粹冬去氷須泮春來草自生馮道本朝徘徊且垂翼㑹有秋風時歐公集龍不冬躍螢能夜飛君子小人各有其時邵堯夫不知命經不知命無以為君子也語子怨夭折者不知命者也怨貧窮者不知時者也並列子史屈原至江濱懐石自投汨羅以死史記本傳知足經孟獻子曰畜馬乘不察於雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣君子仕則不稼田則不漁分無求多並記子知足常足知足不辱老子知者不為不足莊子福莫長於無禍荀子勸學士不通財貨國君不息牛羊錯質之臣不息雞豚大夫不為長圃荀名進身退天之道也管子天下有至富而非金玉也適情知足則富矣淮南子錦繢紛華所服不過温體三牲太牢所食不過充腹知以身取節者則知足矣茍知足則不累其志矣孔叢子知足者則能肥遁勿用頤光山林紆鸞龍之翼養浩然之氣繿縷帶索不以負龍章之暐􅁮也負步杖策不以易結駟之絡繹也抱朴子暢𤣥篇史齊與晏子邶殿弗受曰慶氏之邑足欲故亡吾邑不足欲也不受邶殿非惡富也恐失富也左范蠡曰居家則致千金居官則致卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懐其重寳間行以去止于陶史越世家褚先生曰蘇秦張儀一當萬乘之主而都卿相之位今子積數十年官不過侍郎位不過執㦸意者有遺行耶東方生曰彼一時也此一時也使蘇秦張儀與僕並生於今之世曾不能得掌故安敢望常侍郎乎前漢東方朔傳以齊三萬户封張良良曰臣願封留足矣不敢當三萬户西漢本傳公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵愠而㧞其葵曰吾已食禄又奪園夫紅女利乎前漢董仲舒傳辟彊侯子徳常持老子知足之計西漢楚元王傳疏廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石不知退懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎即日父子俱移病上疏乞骸骨西漢本傳殷興曰外戚家若不知謙退嫁女欲配侯王娶婦盼睨公主愚心實不安富貴有極人當知足漢光武田豫為衛尉乞遜位司馬宣王不聽豫曰年過七十而居位譬猶鐘鳴漏盡而夜行不休是罪人也遂稱疾魏志虞玩之年老請退表曰四十仕進七十懸車壯即驅馳老即休息知足不辱臣知足矣齊書光禄大夫開府儀同三司王僧䖍固辭台府謂兄子儉曰汝任重於朝行登三事我若復有此授乃是一門有二台司吾實懼焉同上韋世康拜吏部尚書前後十餘年間多所進㧞謂子弟曰吾聞功遂身退古人常道今將懸車汝輩謂何子福嗣曰大人澡身浴徳名立官成追蹤二疏伏奉尊命隋書韋世康在吏部十餘年時稱廉平常有止足之志謂子弟曰禄豈須多防滿則退年不待暮有疾便辭隋高祖李義琰宅無正寢弟為市材送之義琰曰既處貴仕又廣居宇非有令徳必受其殃不許舊唐書本傳張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為將相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身没之日適足為無賴子弟酒色之資吾不取也聞者是之唐𤣥宗李日知拜侍中先天中乞骸骨日知將有請不謀于家歸乃治行妻驚曰産利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭於心無日而足也唐書本傳元延祖調舂陵丞輒棄官去曰人生衣食可適饑飽不宜復有所須每灌園掇薪以為有生之役過此吾不思也唐書元結傳有勸岑文本營産業文本曰南方一布衣徒步入關望不過秘郎縣令耳無汗馬之勞以文墨致位中書令亦極矣何得更言産業乎唐書本傳傳記委贄之臣不探市井之利韓詩外傳集畏極位之盛滿潘安仁西征賦上方不足而下比有餘張華鷦鷯賦逹人知止足遺榮忽如無抽簪解朝衣散髪歸海隅張景陽詠史詩伯兄徳行高曉方藥食必視本草年止四十二某疏愚食不擇禁忌位為侍郎年出伯兄十五歲矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣韓愈行狀幸生天下無事時承先人之遺業不識干戈耒耜攻守耕穫之勤韓文感二鳥賦月費俸錢歳縻廩粟子不知耕婦不知織乘馬從徒安坐而食始我來京師止擕一束書辛勤三十年以有此屋廬此屋豈無華於我自有餘中堂高且新四時登牢蔬並韓集栁氏號為大族五六代以來無為朝士者豈容豈容一作豈愚䝉獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受禄位亦所未能栁與楊京兆馮書手不能執殳肩不能荷鋤幸因筆硯工得升仕進途白樂天鬢雪人間壽腰金世上榮子孫無可念產業不能營一日安閒直萬金優游福禄更難銷得年非痩薄長福是單貧設自為化工優饒之如是若比簞瓢人吾今大富貴莫嫌貧活計更富即勞心有帛禦冬寒有榖防歳饑飽於東方朔樂於榮啟期身閒自為貴何必居榮秩心足即非貧豈惟珠滿室並同上團圓便是家肥事何必盈倉與滿箱杜荀鶴一身既飽暖一家無怨咨家雖有􅅵畆手不秉鎡基皮日休集季子今二頃揚雄才一㕓伊予有南畆數已踰先賢李義山集福不可以屢僥倖得不可以常覬覦先生貧而不言利問之對曰利者商也今既士矣奈何亂四民之業乎並陸魯望文於臣一生已為萬足王維集本朝薄酒可與忘憂醜婦可與白頭徐行不必駟馬稱身不必狐裘無辱不必受福甘餐不必食肉山谷易足子榮啟期行乎郕之野鹿裘帶索鼔琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾既得為人是一樂也男女之别男尊女卑吾既得為男是二樂也人生有不見日月不免襁褓吾既得已行年九十五矣是三樂也貧者士之常死者人之終處常得終吾何憂哉家語六本篇饑者易為食渴者易為飲孟鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹莊孔子謂顏淵曰家貧居卑胡不仕乎對曰不願仕囘有郭外之田五十畆足以給饘粥郭内之田十畆足以為絲麻鼔琴足以自娛所學於夫子者足以自樂也囘不願仕莊子蟪蛄不羨大椿而欣然自得斥鷃不貴天地而榮願以足莊齊物論北宫子文其裋褐有狐貉之温進其茂菽有稻粱之味庇其蓬室若廣厦之䕃乘其篳輅若文軒之飾終身逌然庖饌班錯所享不過一味華葢結駟列道警蹕其容不過容膝並列子渇飲河水入腹不過壺漿淮南子史鄭𤣥曰家今差多於昔東漢本傳寒之於衣不待輕暖饑之於食不待甘㫖西漢食貨糲粱之食藜藿之羮夏日葛衣冬日鹿裘西漢司馬遷傳馬援謂兄子少游曰士生一世但取衣食裁足乘下澤車御欵段馬為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳東漢本傳阮孚曰持一皂囊遊㑹稽客問囊中何物但一錢㸔囊庶免羞澁晉書本傳潘師正曰茂林清泉臣所須也既不乏矣本傳傳記國子高子曰臣賴君之賜蔬食惡衣可得而食也駑馬柴車可得而乘也韓詩外傳方丈之食不過一飽綈袍之綉不過一暖袁淮正書集其居易容其求易給巢林不過一枝每食不過數粒文選飲河期滿腹貴足不願餘巢林棲一枝可為逹士模左太沖詠史詩王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍陸士衡池沼足以漁釣舂稅足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之費潘岳閒居賦序一枝之上巢父得安巢之所一壺之中壺公有容身之地庾信小園賦但願守陋巷教子孫時時與親舊叙契闊陳説平生濁酒一盃彈琴一曲志願畢矣晉嵇康與濤絶交書禽鹿志豐草嵇康絶交書蔬食足充饑何必膏粱珍繒絮足禦寒何必錦綉文文選互見實惠篋中有餘衣盎中有餘糧閉門讀書史清風窓户凉韓集此日足可惜詩高嗜緑蔬羮意輕肥膩羊孟東野飲啄既已盈安能勞羽翼劉賓客茍無公私債飲水不為貧元稹集兹焉即可愛何必是吾廬韋應物枯鱗易為水貧士易為施孟東野如鳥擇木姑務安巢白樂天才小分易足心寛體長舒浮榮及虛位皆是身之賓惟有衣與食此事粗關身茍免饑寒外餘物盡浮雲稍無骨肉累粗有漁樵資家田輸歳盡拾此充饑膓並白侍郎日有糲食歳有麄衣饑寒獲同骨肉相保此亦熙熙委順之外益自安也白傅集寛於蝸舍足於容身富於黔婁壽於顏囘飽於伯夷樂於榮啟期健於衛叔寳今何求哉身閒自為貴何必居榮秩心足即非貧豈惟金滿室並同上畦蔬繞茅屋自足媚盤飱老杜集一枝聊暫安駱賓王蓬蒿三畆居寛於一天下杜牧之田家衣食無厚薄不見縣門身即樂王建詩以此心目暢敵彼名利途輕微何為者藜藿自有餘李義山詩每含咀義味獨坐日昃案上有一盃藜羮如五鼎七牢饋於左右加之以撞金石萬羽籥也陸魯望文坐白屋有公侯之資食藜羮有卿相之色皮日休集尚儉經營少居閒意思長張文昌田翁真快活婚嫁不離村州縣供輸罷追隨鼓笛喧盤餐同老小家計共田園畫㦸門前難作客釣漁船上易安身杜荀鶴集本朝生計易足纔蔬畦人生自足乃為娛並歐詩三徑粗成資一枝有餘暖身安一牀足坡詩陋巷開門負朝日小園除雪得春蔬無錢種菜為家事老作諸侯客貧為一飽謀生當得意樂鷗邊何用封侯墮鳶外並後山集茅簷適性輕華屋黍酒忘情敵上尊茹蔬飯糗不願餘並欒城集吾身眠食耳一飽萬想滅坡詩一室可盤蝸山谷無厭經辛未取郜歸於我辛巳取防歸於我春秋子不奪不饜富貴之中有私龍斷焉並孟禍莫大於不知足老子江河不能實漏巵淮南子貪者難為惠譙子法訓史申侯有寵於楚文王文王將死使行曰唯我知汝汝專利而不厭予取予求不汝疵瑕也初虞叔有玉虞公求旃之也既而獻之又求其寳劒曰是無厭也無厭將及我侵欲崇侈不可盈厭聚斂積實不知紀極管仲曰戎狄豺狼不可厭也實有豕心貪惏無厭忿纇無期謂之封豕並左傳谿壑可盈是不可厭也國語田蚡嘗討考工地益宅上怒曰君何不遂取武庫田蚡傳猶未足澹澹音贍其欲西漢食貨志夫已受大又取小天不能足而况人乎此民之所囂囂苦苦一作若不足也漢武安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家童七百人皆有手技作事内治產業累積纖微是以能殖其貨西漢張安世傳夫晉何厭之有既東封鄭又欲肆其西封左嬰兒常病傷於飽也東漢王符傳光武賜岑彭書曰人苦不知足既平隴復望蜀光武紀殷興曰外戚家苦不知謙退嫁女欲配侯王娶婦盼睨王室光武建武宣王破張魯請魏武便討劉備魏武曰人苦無足既得隴復欲得蜀耶王隱晉書車騎將軍張敬兒好信夢初為南陽太守其妻向氏夢一手熱如火及為雍州夢一股熱為開府夢半身熱敬兒意欲無限嘗謂所親曰吾妻復夢舉體熱矣又自言夢舊村杜樹高至天上聞而惡之齊太祖溪壑可盈志欲難滿齊書溪壑之欲發乎無厭唐書元載等贊楊國忠于暄舉明經舉業荒陋不及格禮部侍郎逹奚珣置暄上第及暄為户部侍郎珣始自禮部遷吏部暄與所親言猶歎已之淹囘珣之迅疾唐𤣥宗傳記薛元超曰吾富貴過分然平生有三恨不以進士擢第不得娶五姓女不得修國史劉餗撰隋唐嘉話集華貂深不足之嘆選表江海誠難滿元微之集早夭羨中年中年羨暮齒暮齒又貪生服食求不已白侍郎求多子一人之身而百工之所為備如必自為而後用之是率天下而路也孟史無大功以求大禄國語淳于髠曰臣見道傍有禳田者操一豚蹄酒一盃祝曰甌窶滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而一本無而字所欲者奢史記滑稽傳寗成曰仕不至二千石賈不至千萬安可比於人乎西漢本傳安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家童七百人皆有手技作事内治產業累積纖微是以能殖其貨西漢張安世傳身寵而戴高位家温而食厚禄因乘富貴之資力以與民爭利於下漢武昔秦始皇毀壊諡法以一二數欲至萬世而莽下三萬六千歳之厯言身當盡此度東漢隗囂傳無毛髪之勞而欲求丘山之用漢張奐傳本朝宿鳥一枝足爭林終夜鳴陳後山安分經君子不以小言受大禄記君子素其位而行不願乎其外在下位不援上庸君子下不僭上上不偪下記子監門御旅抱關擊柝而不自以為寡荀古之為道者量腹而食容身而居文中子史公孫免餘曰唯卿備百邑臣六十矣下有上禄亂也受其半齊景公欲更晏子之宅辭曰君之先臣容焉臣不足以嗣之於臣侈矣並左李克曰卑不謀尊疏不謀戚史魏世家龍門王通教授於河汾之間弟子自逺至者甚衆累徵不起楊素甚重之勸之仕通曰有先人之敝廬足以庇風雨薄田足以具􅊡粥讀書談道足以自樂願明公正身以治天下使時和年豐通也受賜多矣不願仕也隋髙祖蔬食以當肉安步以當車無罪以當貴清靜以自虞戰國策集客徒欲朱丹吾轂不知一跌將赤吾之族也文選解嘲布衣可終身寵禄豈足賴阮嗣宗詠懐寧與燕雀翔不隨鴻鵠飛同上茍無凌風翮徘徊守故林陸士衡詩老龜豈羨犧牲飽蟠木寧爭桃李春我本蓬蓽人鄙賤遽泥沙並白侍郎囘瞻順流輩誰敢望同昇元稹集寧為宇宙閒吟客怕作乾坤竊禄人杜荀鶴鳳凰不憎山栖蛟龍不羞泥蟠王無功逍遥飲啄安涯分何假扶摇九萬為王維集身世比行舟無風亦暫休敢言終破浪唯願穢乘流錢起詩却厭長裾曳寧辭短褐穿張丞吉詩驥路未伸雀羅無愠司空表聖文本朝或告狄青當推狄梁公為逺祖青謝曰青出田家少為兵安敢祖梁公哉聞見録茹蔬飯糗不願餘樂城集石守道為舉子時王瀆侍郎以盤餐遺之石謝曰甘脆者亦介之願也但日享之則可若止得一餐則明日將何繼乎朝享膏粱暮厭粗糲人之常情也介所以不敢當倦遊録安貧經君子固窮語衡門之下可以棲遲詩貧而無諂貧而無怨難並語子貧者士之常處常何憂哉列列子窮有饑色有客言於鄭子陽子陽令官遺之粟列子辭莊史揚雄家產不過十金無儋石之儲晏如也西漢本傳藜藿有八珍之甘蓬蓽有藻梲之樂晉書葛洪傳陶潛環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也晉本傳傳記顏蠋曰安步以當車蔬食以當肉戰國策大雪丈餘洛陽令出行見人家皆除路而袁安門無行路謂安死矣令㸔之見安偃臥問之答曰大雪人人皆餓不宜干人後漢注見汝南先賢傳集含歡谷汲行歌負薪陶潛自祭文灌園鬻蔬以供朝夕之膳潘安仁閒居賦食先人之徳無厚生之財陳子昂故園生事微韋應物長安布衣誰比數反掃衡門守環堵長貧任婦愁手自移蒲栁家纔足稻粱並杜詩活計縱貧長淨潔白傅集筆耕為養傭書成學任彥昇表素尚寧知貴清談不厭貧温飛卿本朝貧家何以娛樂但知抺風批雨一本作抺月批風東坡集家徒四壁書侵坐山谷陋巷一生顏氏樂清風千古伯夷貧程顥和邵康節安樂窩不安分經志大心勞所以求者非其道也詩士志於道而恥惡衣惡食者未足與議也語子弓人而恥為弓矢人而恥為矢孟量力經貧者不以貨財為禮老者不以筋力為禮禮陳力就列不能者止語子短綆不可以汲深荀子史量力而動其過鮮矣冉求曰小人慮材而言量力而共者也並左皇甫規對曰徳不稱禄猶鑿墉之趾以益其高豈量力審功安固之道哉漢紀集量力守故轍陶淵明大厦既焚不可洒之以淚長河一决不可障之以手庾信連珠本朝載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登阪險而馬不躓欒城集不量力經徳薄而位尊知小而謀大力少而任重易多見其不知量也語子猶以一杯水救一車薪之火挾泰山以超北海並孟代大匠斵希有不傷手矣老猶涉海鑿河而使䖟負山也莊夸父不量力欲逐日於嵎谷之際道渴而死北山愚公年九十面山而居懲山北之寒出入之迂聚室而謀曰畢力平之可乎髪引千鈞並列子螳蜋怒臂以當車轍莊譬以盲辨色以聾辨聲荀以博塗而塞江海以僬僥而戴泰山短人也荀子猶以錐力墮泰山也荀小敵之堅大敵之擒孫子注言小國不量力與大邦為讐權時堅城固守然終必見擒獲乳狗之噬虎伏雞之搏狸淮南子以一縷之任係千金之重孔叢子策蹇驢而追迅風棹藍舟而濟大川抱朴子以燕雀之羽而慕沖天之迅犬羊之蹄而覬追日之步劉子史君子是以知息之將亡也不度徳不量力左驅羣羊而攻猛虎虎之與羊不格明矣史張儀傳張儀說趙王曰斷右臂而與人鬬欲無危得乎通鑑以桀詐堯若卵投石夫何幸之有前漢刑法志以羔犢之弱而扞虎狼之敵也西鄒陽傳錯之𤨏才智小謀大晁錯傳以一簣障江河西漢何武等贊譬猶鼱鼩之襲狗孤豚之咋虎東方朔傳釋斤斧之用而欲嬰以芒刃臣以為不缺則折賈誼傳張儉以區區一掌而欲獨堙江河終嬰疾甚之亂多見其不知量也東漢本傳投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢夏侯湛傳譬由虻蚋之捕羣牛腐肉之齒利劒也漢書步隲表言北相多作布囊盛沙塞江水向荆州吕範諸葛恪云此江與開闢俱生寧有可以沙塞埋也三國吳志步隲傳注欲以片心除衆弊獨手遏羣邪君子不亮其誠羣小共攻其短舊唐書贄傳論持腐株支大厦之顛唐李順贊夫以蝸蚓之餌雜垂滄海而望吞舟之魚不亦難乎唐書傳記炎帝之女名曰女娃遊于東海溺而不反是為精衛常取西山之木石以填東海山海經集機蓬矢以射革駟跛鱉而上山兮吾固知其不能陞任重載盛兮陷滯而不濟楚辭物勝權而衡殆形過鏡則照窮選演連珠以螳蜋之斧禦鋒車之隧袁紹檄不揆蠛蠓之力强舉千鈞之重宋玉對楚王問何異無足而欲行無翼而欲翔魯褒錢神論微縷懸千金陳子昻集謬持蠡測海杜詩千鈞巨石一髪懸韋應物詩手中無尺鐵徒欲穿重圍劉長卿捧爝火以干日御抱布鼔以詣雷門李義山是猶垂蝸蚓之餌以釣吞舟之魚設弓弋之􅗤以羅垂天之翼李深之施衆網而加一禽尚不能况張一目以羅萬品而望其飛走大小盡出乎其間可乎元微之蚍蜉撼大樹可笑不自量韓文童麋來觸犀徳力不相及何異乎蜉蝣爭長於龜鶴秋毫計大於崐閬者哉逆風撲燎推岸塞河知其難矣並唐文粹難將一人手掩得天下目曹鄴讀李斯傳本朝有時爭勝不量力何異弱魯攻强齊安得獨洒一掬淚欲助河水增滔滔並歐公集司馬公曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉七國紀桓魋武叔不量力欲持一草摇蟠桃臨川譬如敝車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有隂雨之變陵谷之險其患必有不可知者欒城集欲將駒過隙坐待石穿溜東坡集隨宜經深則厲淺則揭豈其食魚必河之魴豈其取妻必齊之姜就其深矣方之舟之就其淺矣泳之游之雖無旨酒式飲庶幾雖無嘉肴式食庶幾雖無徳與女式歌且舞並詩禮從宜子游問喪具夫子曰稱家之有亡君子之於禮也有直而行也有曲而殺也啜菽飲水盡其歡斯之謂孝歛手足形還葬而無槨稱其材斯之謂禮並記子為高必因丘陵為下必因川澤清斯濯纓濁斯濯足並孟夫待腰褭飛兔而駕之則世莫乘車待西施毛嬙而為配則終身不家矣淮南子齊俗訓史何必驊騮騄耳而后行逺乎史記樂書浴不必江海要之去垢馬不必騏驥要之善走史外戚世家未能免俗聊復爾爾晉書集雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情王羲之蘭亭記王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍選連珠聽極於音不慕鈞天之樂身足於䕃不假垂天之雲選稱家隨豐儉盤飱市逺無兼味樽酒家貧只舊醅杜詩稱家開户牖量力置園林白樂天本朝華佗不世出天下未嘗廢醫東坡彊為經志大心勞所以求者非其道也詩序居山以魚鼈為禮居澤以鹿豕為禮記不順其鄉之所有也史王吉王崇皆好車馬衣服自奉養極為鮮明而遷徙去處所載不過囊衣人怪其奢服其儉故俗傳王陽能作金西漢王吉傳本朝事到强為須涉迹邵堯夫曠逹子身非吾有是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也莊生為附贅縣疣死為决􅪵胡玩切潰癰忘其肝膽遺其耳目芒然彷徨乎塵垢之外逍遥乎無為之表墮肢體黜聰明離形去智同於大通此謂坐忘並莊其生若浮其死若休死生同狀並莊吾所以有大患者為吾有身及吾無身吾有何患老無町畦莊人間世莊子將死弟子厚葬之曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下螻蟻食奪彼予此何其偏也莊子妻死惠子弔之方箕倨鼓盆而歌人生天地之間若白駒之過隙忽然而已以死生為寤寐以形骸為逆旅並莊子平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可唯所遇焉死後數百年餘名豈足潤枯骨並列魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉列子子高曰人生有四方之志豈鹿豕也哉而常羣聚乎孔叢子史其生若浮兮其死若休澹乎若深淵之靜氾乎若不繫之舟不以生故自寳兮養空而遊徳人無累兮知命不憂細故蔕芥兮何足以疑史賈生傳達人大觀物亡不可賈誼傳飄飄有凌雲氣游天地之間意司馬相如傳孟敏荷甑墮地不顧而去郭林宗見而問其意對曰甑已破矣視之何益東漢郭泰傳其於胷中曾不芥蔕司馬相如傳飛鳥遺跡蟬蛻亡殻東漢王符論逍遥一世之上睥睨天地之間仲長統傳向長隱居不仕貧無資食好事者更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳後漢趙岐先自為壽藏圖季札子產晏嬰叔向四像居賓位又自圖其像居主位皆為讚頌敕其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩坎本傳劉伶放情肆志常以細宇宙齊萬物為心常乘鹿車擕一壺酒使人荷鍤隨之曰死便埋我晉書本傳畢卓常謂人曰得酒百斛船四時甘味置兩頭右手持酒盃左手持蟹螯拍浮酒船中便足了一生矣晉書本傳張翰縱任不拘因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適意何能覊官數千里以要名爵乎遂命駕而歸晉本傳阮修性簡意有所思率爾褰裳至或無言欣然相對常步以百錢挂杖頭至酒店便酣暢晉書阮籍傲然獨得任情不覊當其得意忽忘形骸郄超卓犖不覊有曠世之度阮孚蓬髪飲酒不以世務嬰心常以金貂換酒並晉本傳張翰曰使我有身後名不如即時一杯酒時人貴其曠達曰人生貴適意耳富貴何為同上王徽之居山隂憶戴逵夜乘小船詣之造門不前而反曰乘興而來興盡而反何必見安道耶晉王徽之傳阮孚曰未知一生能着幾兩屐晉書陶濳為彭澤令在官八十餘日解印去縣未嘗有所造詣所之唯至田舍及廬山遊觀而已阮籍聞步兵㕑營人善釀有貯酒三百斛乃求為校尉遺落世事並晉本傳顧榮素好琴張翰哭之上牀鼓琴數曲撫琴而歎曰顧彥先能復賞此不因又哭不弔喪主而去晉書不事崖檢宋書梁蕭恭曰勞神苦思竟不成名豈如臨清風對明月登山泛水肆意酣歌也南史梁本傳放情事外浮沈讌詠唐書貴賤苦樂更迭為之亦復何傷唐高祖語言之間何足介意唐太宗姚崇孫朂自為壽藏於萬安山崇塋之旁署兆曰寂居穴墳曰復真堂中剟土為臺曰化臺新唐書本傳傳記馬融才高博洽為通儒逹生任性不拘儒者之節東觀漢記澹臺子羽渡水子溺死將葬之滅明曰此命也吾豈與螻蟻為親戚魚鱉為仇讎遂以葬之博物志山巨源舉嵇康自代康曰譬猶禽鹿少見馴育則服教從制長而見覊雖飾以金鑣饗以嘉肴愈思長林而志在豐草高士傳集何所獨無芳草兮爾何懐乎故宇楚辭茍縱心於物外安知榮辱之所如張衡田賦歸丈夫志四海萬里猶比鄰何必同衾裯然後展慇懃曹植微身輕蟬翼潘安仁河陽詩人生如寄多憂何為善哉行身名竟誰辨圖史終磨滅謝靈運遊山以天地為一朝以萬期為須臾日月為扄牖八荒為庭衢行無轍迹居無室廬幕天席地縱意所如止則操巵執觚動則挈榼提壺劉伯倫頌陶子將辭逆旅之館求歸于故宅羞以嘉蔬薦以清酌陶潛自祭文釋域中之常戀暢超然之高情孫綽天台賦放浪形骸之外王羲之蘭亭序一隨徃化滅安用空名揚謝靈運求一日之足當百年之溢晉孫綽蘭亭詩叙窅然遺天地乘化入無窮聖人以萬幾為貴而我以天下為累聖人以大寳為尊而我以天下為煩並陳子昻乾坤水上萍榮貴如糞土是身如浮雲安可限南北此身醒復醉乘興即為家李白自稱酒中仙身世雙蓬鬢乾坤一草亭萬世一骸骨隣家逓歌哭放神八極外俯仰俱蕭瑟萬古一死生胡為足名數並杜詩舉杯邀明月對影成三人月既不解飲影徒隨我身但得醉中趣勿為醒者傳逹士遺天地並李太白起舞先醉長松摧飄然天外步豈肯區中囚與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞奴視法度士高士例須憐麴糵丈夫終莫生畦畛牆頭菊花好沽酒錢帛縱空衣可準安得長翮大翼如雲生我身乘風振迅出六合絶浮塵死生哀樂兩相棄是非得失付閒人江魚不池活野鳥難籠馴並韓集至仁以死生為傳舍以軒冕為儻來留名千代不關身並劉賓客肺腑都無隔形骸兩不覊白侍郎悠悠天地内一死㑹相逢安處即為鄉鄙斗筲之奚筭哂挈瓶之固守身後堆金挂北斗不如生前一杯酒第一莫如禪第二莫若醉禪能冺人我醉可忘榮瘁飄然世塵外鸞鳳如何追形骸屬日月老去何足驚栖心釋梵浪跡老莊汨市朝溺妻子非逹也囚山林擯血屬亦非達也若有人與羣動處一代間彼為彼我為我不自潔不自汚不巢許不伊吕水其心雲其身浮沈消息無徃而不自得者其惟達人乎吾觀九品至一品其間氣味都相似紫綬朱衣青布衫顔色不同而已矣付命有厚薄委心信窮通通當為大鵬舉翅摩蒼穹窮則為鷦鷯一枝足自容茍能知此道身窮心不窮功名斗藪是灰塵其生也浮雲其死也委蛻來何縁去何縁吾性不動吾形屢遷已焉已焉吾安徃而不可又何足厭戀乎其間伯倫每置隨身鍤元亮先為自祭文去有何顧戀住亦無憂撓名為錮身鎻利是焚身火形神兩是幻夢寐俱非實餘年自問將何用恕是人間賸長身相㸔萬里别同是一浮萍並白樂天古之逹人以生為寄為夢以死為歸為魂偶然即冺為大空與不同生杜牧之理涉虛趣心潛潛一作偕靜縁室為為一作惟生白人則思𤣥張說之文勢去未須悲時來何足喜白侍郎惟有不二門其間無壽夭同上富貴何如草頭露杜詩始終者萬物之大歸生死者百年之常分駱賓王存亡去就如九牛一毛長林豐草豈與官署門闌有異乎並王維集第宅非吾廬逆旅暫留止子孫非我有委蛻而已矣有如蠶造繭又似花結子子結花暗凋繭成蠶老死天地為幕席富貴如沙泥白樂天豈戀腰間綬如彼籠中禽韋應物匪傷蜉蝣之夕不羨龜鶴之年得喪雙遺巢由與許史同歸寵辱兩存廟廊與山林齊致並駱賓王身外皆虛名酒中有全徳李義山雲山不求吾是林泉不責吾非元次山但令終日酩酊醉酒不到劉伶墳上土李長吉集棄世酒中老謀身書外貧許用晦集眼豁浮生夢杜荀鶴得即高歌失即休多愁多恨亦悠悠今生有酒今生醉明日愁來明日愁羅隱功名萬里外心事一杯中乍可狂歌草澤中寧堪作吏風塵下並高達夫朝衣在酒家自覺有家非並姚少監喜方外之浩曠嘆人間之窘束腹中書萬卷身外酒千杯並温飛卿天地者萬物之逆旅光隂者百代之過客意逺超超然若萬里之鶴也飄飄然不知冠冕之在已浩浩然不知天地之為大㝠機順道迹繫心曠鴻遡清風凌顥氣翺翔自得於冥冥之間循大小於天倪既齊椿菌忘壽夭於物化寧辨彭殤無春夏秋冬四時之行無得失是非去來之蹟得非我美失非我恥並唐文粹一朝同物化身與糞壤并畢竟金與銀何殊泥與塵貴賤與貧富高下雖有殊憂樂與利害彼此不相踰是以達人觀大物同一途並白侍郎不恨百年促翻悲萬刼長眼前讐敵都休問身外功名一任它雲利何方不是家萬齡龜菌等一死天地平並元微之高士不覊世頗將榮辱齊韋應物本朝食方丈飽止一則瓢飲水樂何涯盧陵集金鐵有時而腐山岳有時而摧凡有形之物即易壊老泉大患縁有身無身則無疾自其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也東坡下眂官爵如泥淤興廢何足弔萬世一俯仰名高不朽終安用有生何處不安生功名一破甑棄置何用顧已向閒中作地仙更於酒裏得天全人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無留者五更待漏靴滿霜不如三丈日高睡足北窻凉珠襦玉匣萬人祖送歸北邙不如懸鶉百結獨坐負朝陽生前富貴死後文章百年瞬息萬世忙夷齊盜跖俱亡羊不如眼前一醉是非憂樂兩都忘愛惜微官將底用它年端好冩旌銘萬古一昏曉平生寓物不留物在家學得忘家禪逸韻謝邊幅升沈何足道等是蠻與觸囘翔天壤間何必懐此都年來萬事足所欠惟一死何必擇所安滔滔天下是譬之􅃄雲之過眼百鳥之感耳豈不欣然接之去不復念也並東坡坐中客滿誰憂百榼之空身後名輕但覺一杯之重東坡濁醪有妙理賦雞蟲得失何須筭鵬鷃逍遥各自知收拾乾坤付一壺世間無物直錙銖並臨川鄉閭等行路何處更為家後山已將世界等微塵空裏浮花夢裏身盛衰閱過君應笑寵辱年來我亦平何侯方丈庾郎三韭較豐約於夢寐卒同歸於一朽百年雖長要有終富死未必輸生窮並東坡記纂淵海卷五十一
