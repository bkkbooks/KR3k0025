髙苑縣東髙雲洞在州東蒼龍峽在淄州縣西古蒲臺秦皇築之以望海蓬萊宮臺上紫蒲係馬蒲生盤如係馬之狀紀勝人物春秋管仲相桓公成霸業晏子齊景公相顯于諸侯漢張軌仕隴右家無餘財藏書數百卷唐段志𤣥資質偉岸以驍果為秦王所識房𤣥齡事太宗為名宰相皇朝麻仲英博學有孝行鄉評重之韓琦薦為國子助教賈同舉進士王欽若方貴盛欲致之不往石昂好學不仕節度使符習髙其行趙師民九歳能文舉進士為國子直講上勸講箴後遷刑部郎中有集二十卷紀勝集積流横地紀䟽派引天潢唐太宗横萬里而極海兮頽風浩其四起柳宗元歇鞍憩古木解帶掛横枝歌鼓川上亭曲度神飈吹雲歸碧海夕鴈沒青天時試登髙而望逺極雲海之微茫雲物不隠象三山共分明奈何疾風怒忽若基柱傾海水雖無心洪溥亦相驚深沉百丈洞海底那知不有蛟龍蟠並李白本朝景徳三年以髙苑置宣化軍熈寧三年廢軍復為縣隷州沿革表新荷出水雙飛鶩喬木成隂百轉鶯載酒未妨佳客醉憑髙仍見老農耕歐陽修公退留賔誇酒美睡餘欹枕看山青同上淮陽軍倚郭一外縣一下邳宿遷郡號下邳軍縣沿革天文斗牛分野禹貢揚州之域本徐州下邳縣後漢為下邳梁為武州唐置邳州後屬泗州又屬徐州下邳縣宿遷春秋時鍾吾子國依宿國所遷地秦置下相縣漢又置􅤌猶縣晉置宿豫郡後魏屬南徐州東魏屬東楚州後周屬泗州隋置下邳郡唐改為宿遷縣沿革表形勝葛嶧山在郡城西禹貢嶧陽孤桐謂出此山之南磬石山在郡城西南上有石其聲清亮可為磬禹貢泗濵浮磬即此山所出者黄石山在下邳城北上有黄石公廟鐵佛山在下邳城北上有三鐵佛馬陵山在宿遷縣北髙阜狀若馬陵峒峿山在宿遷縣北上有石洞鐫七真象舊黄河在郡城南武河在下邳城西北下入黄河氾水在宿遷縣界下邳城在郡治東魏武招呂布于下邳即此圯橋在下邳東南即黄石公授張良素書之所紀勝人物漢嚴延年宣帝時為侍御史劾奏霍光朝廷肅然敬憚之翼奉元帝以諸儒薦徴待詔數言事天子敬焉陳球舉孝亷累官侍御史周紆為洛陽令下車先問大姓主名五代沈贇事晉為祁州刺史契丹䧟城守節而死皇朝劉福以功累官雄州防禦使為政簡易人咸徳之紀勝集初語燕雛知社日習飛鷹隼識秋風波摇珠樹千尋㧞山鑿金陵萬仞空杜詩江漢曽為客相遇每醉還浮雲一别後流水十年間韋詩片雨楚雲暮千家淮水秋開簾見芳草送客上春洲請問山中桂王孫幾度遊嚴君平過淮芳草歇千里又來歸野水呉山出家林越鳥飛荷香隨去棹梅雨濕征衣無數滄州客如君達者稀前人本朝太平興國七年以下邳宿遷二縣建淮陽軍元豐初改屬京都西路沿革表身如𫝊舎任西東夜卧荒郵四壁空鄉夢漸生燈影外客愁多在雨聲中淮南火後居民少河北兵前戰鼓雄萬里别離心正苦帛書何必寄歸鴻汪水雲千年事與浮雲去想見留侯次是非丈夫出身佐明主用舎行藏要自知宋人應天府倚郭一外縣五寧陵宋城榖熟卞邑楚丘虞城郡號睢陽府沿革天文角亢分野本古商丘湯所都亳邑地周封微子于此為宋國春秋鄭衛陳三國之境秦為碣郡地漢為睢陽縣屬梁國又置宋州改縣曰宋城大業初改州曰梁郡唐初曰宋後為睢陽郡五代梁置宣武軍唐改歸徳軍本朝升為南京應天府沿革表縣沿革寧陵本古葛伯地又為寗城宋城㣲子所封之地榖熟古宋襄氏邑唐省入榖熟卞邑戰國時為下邑地漢置縣楚丘朝歌故城在今衛州衛縣虞城本古虞國即禹封商均之地沿革表形勝南湖在府城南上有蘇轍記甘露嶺在寧陵縣西隋文帝幸岱至此因甘露降故名聖水井在寧陵縣長樂鄉漆溝在府城北春秋隕石于宋即此妙孝亭在州境内蘇東坡題榜秦觀詩帝嚳廟在府城東微子廟在府城西莊子祠在府城東雙忠廟在府城東祀唐張廵許遠亳城在府城東契父都亳即此紀勝人物唐魏元忠髙宗時吐畨㓂邊上封事言命將治兵之要累官御史中丞鄭惟忠天授中以制舉召見對武后言甚切直程袁師事母以孝聞母歿負土築墳有白狼黄蛇之異曹華出戎伍而動必以禮士大夫重之皇朝楚昭輔有才幹陳橋推戴時遣入京安母後累官樞宻事劉希古博通經史累官叅知政事貴顯不減寒素劉蒙叟希古之子為太常少卿所註有五運甲子諸書李惟清開寶中以三史解謁涪陵尉累官京西轉運使戚同父㓜孤養祖母以孝聞通五經門人號堅素先生紀勝集暮雨投闗郡春風别帝城東西殊不遠朝夕待佳聲韋詩晩泊水邊驛栁塘初起風蛙鳴蒲葉下雨入稻花中王仲初千里河烟直青楓夾岸長草市迎江貨津橋税海商同上摇落深知宋玉悲風流儒雅亦吾師江山故宅空文藻雲雨荒臺豈夢思杜甫客路徧逢雨香山不入樓故園桃李月伊水向東流同上本朝至道中為京東路景徳三年升為應天府祥符七年建為南京沿革表夜半恩綸出漢宮朝家虛席待燕公春風已徧湖山外元氣還歸鼎鼐中蔡君謨緑野染成延晝永亂紅吹盡放春歸張文潜雪與春歸落嵗前曉開庭樹有餘妍楊花樸樸白漫地蛺蝶紛紛飛滿天梅聖俞曽讀前書笑古今耻隨流俗信浮沈終期直道扶元化敢為虛名役片心冦平仲襲慶府倚郭一外縣六瑕符奉泗水龔仙源萊蕪鄒郡號魯郡府沿革天文奎婁分野禹貢徐兖二州之域春秋時為魯國武王封伯禽于曲阜為魯公本朝為泰寧軍節度升襲慶府沿革表縣沿革瑕漢置瑕丘縣屬山陽郡奉符漢為奉髙及博縣地屬太山郡泗水古下明國春秋時為魯卞邑龔隋置瑕丘縣仙源神農少昊徙都之地周武王以封周公旦萊蕪春秋時為夾谷地漢置萊蕪縣鄒周時為邾國魯繆公改為鄒沿革表形勝泰山在府西南尼丘山在曲阜縣東顔母禱于此山而生孔子仙人山在萊蕪縣南安期生修煉于此顔母山與尼山相對上有聖井四基山在鄒縣東上有孟子墓鳧山在鄒縣西南其陽有伏羲廟昌平山在鄒縣北孔子生昌平鄉即此龜山在泗水東仙源縣有慶源河孔子宅瞿相圃窮桑大庭氏之車泗水在泗水縣北其南為洙水即孔子講學處顔子井在曲阜縣内斷機臺在鄒縣西有孟母教孟子處陋巷在顔子廟前闕里在武城内杏壇在武城境内魯壁在孔子宅内手植檜在孔廟大成門北宣聖手植者也紀勝人物周柳下恵聖之和孔子聖之時顔囬亞聖閔子騫以徳行稱曽參學𫝊一貫冉雍冉求宰予子貢林放樊遲有若申棖公西赤南宫适宓不齊皆聖門髙弟孔鯉孔子之子孔伋孔子之孫秦孔鮒孔子九世孫漢孔貞孔子十世孫髙堂生甞論禮學仕為博士孔安國孔子十二世孫夏侯勝通尚書及洪範五行𫝊丙吉宣帝為相知大體朱雲直諫折檻孔融孔子二十世孫晉孔衍孔子二十二世孫南北朝孔鮮孔子二十六世孫皇朝孔宜孔子四十四世孫孔道輔孔子四十九世孫顔復顔子四十八世孫紀勝集地猶鄒氏邑宅即魯王宮嘆鳳嗟身否傷麟怨道窮今看兩楹奠尚與夢時同唐𤣥宗造化鍾神秀隂陽割昏曉杜甫浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘同上城隅緑水明秋日海上青山隔暮雲李白聖人久已矣游夏遥相望日出見闕里山平知汶陽髙適孔聖家鄒魯儒風藹典墳龍驤過舊宅鳳徳詠餘芬入廟神如在升堂樂似聞縁知一王法今日待明君白樂天憑崖攬八極目盡長空䦨魯客抱白鶴别余往泰山初行若片雲杳在青崖間白詩本朝大觀四年以瑕丘縣為瑕縣政和八年升為襲慶府祥符五年改曲阜為仙源祥符元年改奉符為泰安軍開寶五年奉符移治岱京鎮大觀四年以龔丘縣為龔縣熈寧五年省為鎮入仙源沿革表鳥去蒼烟古木人歸緑野孤舟信美雖非吾土消憂且湏登樓張文潜溪田雨足禾先熟海樹風高葉易秋踈傅閭里詢故老秦皇車駕想東遊同上發典謨訓誥之義振金石絲竹之聲如天地兮否而復泰如日月兮晦而復明王禹偁函丈従容問且酬展才無不至公侯誰如曽㸃推鳴瑟獨對春風詠未休呂大鈞曲阜兮遺墟先師兮闕里神髣髴兮如在涕潺湲兮不已窮天地兮一人掲日月而照臨鮮于侁徐州倚郭一外縣四彭城沛蕭豐滕郡號彭城州沿革天文房心分野禹貢徐州之域古大彭之國春秋為宋地戰國屬楚秦置彭城縣屬泗水郡項羽自立為西楚霸王都于此漢改泗水為沛郡又立楚國知徐州宣帝改為彭城郡晉武帝于淮南僑立徐州安帝時分淮北曰北徐州劉宋改北徐州曰徐州而加淮南曰南徐州後魏于徐州仍立彭城郡隋開皇初郡廢復為徐州大業初改為彭城郡唐置徐州天寶初復改徐州郡後升武寧軍沿革表縣沿革彭城本古大彭氏之國秦置彭城縣漢改為彭城郡晉改徐州後魏仍立彭城郡隋初郡廢唐置彭城屬徐州本朝因之沛本古福陽國地秦置沛縣屬泗水郡漢改泗水為沛郡遷治項而沛縣如故晉屬沛國劉宋屬徐州北齊省隋復置彭城唐以廣戚縣省入本朝因之蕭本蕭國漢為蕭縣屬沛國晉因之隋初屬徐州尋改為龍城縣大業初復為蕭縣屬彭城郡歴唐五代本朝並屬徐州豐秦為沛縣之豐邑屬泗水郡漢以豐為縣屬沛郡北齊屬永昌郡隋屬彭城郡唐本朝並屬徐州滕古小邾子國秦屬薛郡漢置蕃縣屬魯國北齊廢隋改為滕縣屬彭城郡尋陞為滕郡唐復為滕郡屬徐州本朝因之沿革表形勝彭城山在州城東上有二大字雲龍山在州城東南有項羽及宋武戲馬臺大澤在豐縣東即漢高祖微時隠居處厭氣臺秦始皇所築斬蛇溝在豐縣西漢高祖斬蛇處桃山在滕縣東南上有微子墓抱犢山在滕縣南霧猪泉在滕縣南蘇軾祈雨于此沛宫在沛縣西有漢高置酒之所漢祖故宅在豐縣中紀勝人物漢蕭何輔高祖功第一封酇侯王陵平諸呂之難封安國侯樊噲定三秦封舞陽侯申屠嘉為御史大夫責鄧通無人臣禮朝廷敬憚之周昌為御史大夫有功封汾隂侯周勃誅諸呂封絳侯周亞夫為將有紀律文帝稱為真將軍姜肱處兄弟友愛桓帝命畫工圖其形三國劉隗少有文翰累遷散騎常侍唐劉知幾博恰文學舉進士為鳳閣舎人註史通内外四十九篇皇朝李若谷少孤性至孝舉進士累官參知政事顔大初顔子四十七世孫博學俊逸舉進士累官國子監說書所著有朱南子鳬繹集紀勝集曉乗征騎帶犀渠又是都門送别初蓮府望髙秦御史柳營官重漢尚書斬蛇澤畔風烟晩戲馬臺前草木疎尺組掛身何用說古來名利盡丘墟薛陶臣世途非一險俗慮各千結有客步大方驅車獨迷轍故人韓與李逸輪雙皎潔徐方國號在元戎天下傑禰生投刺遊王粲吟詩謁高情無遺照朗抱開曉月並東野本朝元豐元年割彭城郡屬京都西路沿革表行人欲去還徘徊劉項英雄安在哉人間俯仰易陳迹聞身健在須銜杯水脛多長短林枝有直横韓信祠堂古誰將跨下平並雷伯威雨過短亭雲㫁續鶯啼髙柳路西東呂梁水注千尋險大澤龍歸萬古空梅聖俞記纂淵海卷十七
