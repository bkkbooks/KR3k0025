body:
  text: 記纂淵海卷十七宋潘自牧撰郡縣部京畿路開封府倚郭一五開封符外縣十祥尉氏陳留雍丘東封丘扶中牟鄢陽武考延津太長垣明溝陵城康咸平郡號大梁陳留汴梁郡沿革禹貢兖豫二州之域天文角亢分野春秋鄭衞陳三國之境戰國魏都于此號為大梁秦為三川郡地漢為陳留郡地晉改為陳留國東魏廢國置梁州及陳留開封二郡北齊以開封省入陳留郡後周改梁州為汴州隋初廢陳留郡州如故大業初廢州以其地併入滎陽大梁潁川等郡唐武徳初於此置汴州天寶初復改為陳留郡乾元初又為汴州興元初自宋州徙宣武軍於此五代梁都于此號為東京置開封府後唐復為汴州及宣武軍晉漢周皆為東京開封府地理沿革表縣沿革開封本鄭衞陳三國地五代梁置開封祥符附郭漢為浚儀縣屬陳留郡魏晉以後皆因之東魏于此置梁州後周改汴州隋廢陳留郡以縣屬鄭州唐於此置汴州以開封縣省入尋復舊本朝初改祥符尉氏在府城南本春秋鄭大夫尉氏之邑秦始置尉氏縣漢屬陳留郡晉及後魏因之北齊省隋復置屬許州後屬潁川郡唐屬洧川後屬汴州本朝屬開封陳留在府城東古有莘城春秋為留地屬鄭後為陳所併故曰陳留秦始置陳留縣漢為陳留郡治晋末郡縣皆廢隋初復置屬宋州後屬梁郡唐初屬杞州又改屬汴州五代屬開封雍丘古雍國黃帝之後殷周皆以封夏后為杞國漢置雍丘縣屬陳留郡後魏屬陽夏郡隋初置杞州大業初廢州以縣屬梁郡唐復置杞州尋廢五代晋時改杞縣漢周至本朝仍曰雍丘封丘本古封父國漢始置封丘縣屬陳留郡尋析置平丘縣晉省平丘以縣屬陳留國後魏入酸棗縣尋復置北齊省隋復置屬滑州後屬東郡唐屬汴州五代屬開封本朝仍舊中牟本春秋鄭邑漢始置縣屬河南郡晉屬滎陽郡後魏省尋復置東魏増置廣武郡後周徙縣治圃田城隋初廢郡改縣曰内牟屬鄭州後又徙舊治唐復改中牟縣并置牟州尋罷州以縣屬管州龍朔初屬鄭州五代梁屬開封府唐屬鄭州本朝屬開封陽武秦為博浪沙地漢始置陽武縣屬河南郡晉屬滎陽郡東魏屬廣武郡北齊省隋復置屬滎陽郡唐屬鄭州五代屬開封府本朝仍舊延津本春秋鄭之廩延戰國嘗為韓所都秦復置酸棗縣漢屬陳留郡後魏併入小黄後復置屬東郡北齊併入南燕縣隋初復析置酸􅀥縣屬滑州大業初屬滎陽郡唐復屬滑州五代梁屬開封府本朝改延津縣長垣本春秋時衛之匡邑秦屬陳留郡漢置長垣縣王莽改曰長固後漢復舊晉屬陳留國後魏屬東郡隋改為匡城縣唐因之五代梁晉復為長垣屬開封府後唐復改匡城縣本朝初復長垣東明本漢東昏縣王莽改曰東明東漢復曰東昏本朝初置東明縣扶溝本漢舊縣屬淮陽國以小扶亭有洧水之溝因名東漢屬陳留郡晉省後魏復置東魏屬許昌郡隋屬潁川郡唐於此置北陳州尋廢以縣屬洧州後屬許州五代梁屬開封府本朝仍舊鄢陵春秋鄭邑鄭伯克段於鄢即此戰國謂之安陵漢始置鄢陵縣屬潁川郡東魏屬許昌郡北齊省入許昌縣隋復置屬許州唐因之本朝屬開封府考城本周之戴國春秋時鄭取之改名榖城秦置甾縣漢屬梁國東漢始改考城屬陳留郡晉省後魏置考陽縣北齊又改為城安縣屬濟隂郡隋復為考城縣屬宋州唐置梁州尋廢以縣屬曹州五代晉漢屬開封府本朝屬拱州後仍屬開封府太康本夏太康所築城漢置陽夏縣屬淮陽國東漢屬陳國晉屬梁國後魏置陽夏郡隋改縣曰太康屬匡城郡復置陽夏郡改縣曰匡城縣隋末廢唐初復置屬陳州五代梁屬開封府本朝屬拱州咸平本漢陳留扶溝二縣地本朝初始置通許鎮咸平中陞為咸平縣屬開封府同上形勝夷山在府南以山平夷故名黒山在封丘縣北曹操斷袁術糧道處彭祖岡在鄢陵縣北上有彭祖墓黄河在府城北黄池在封丘縣南春秋公㑹呉子于黄池即此逍遥宫在陳留縣南汴宫在府城内望京樓在府城西葵丘在考城縣梁園在府城東南平臺在府城東南封臺在府城南玉津園在府城南夷門即府城東門侯嬴為夷門監即此瓊林苑在府城西青陵臺在封丘縣界宜春苑在府城内衛靈公祠在長垣縣東北蘧伯玉墓在長垣縣南鶴城在長垣縣西衛懿公飬鶴處棲城在長垣縣西邯鄲伐衛取漆即此蒲邑在長垣縣治子路為蒲宰即此龍城在長垣縣東龍逢所居之處上有墓及祠韓宫在延津縣景靈宮在府城内中有藝祖以下御容昇平樓在府城内乃宮中觀宴之所蓮花樓在府城内三槐堂在府城内王佑手植三槐即此拱奎堂在府治信陵臺在府城内本魏公子無忌勝遊之地奉天臺在府治内本祭天之所平臺在府東梁園内本古列仙吹臺迎秋臺在府城内扶臺在扶溝縣治程顥所築百花臺在府城内明道祠在扶溝縣治博浪城在府城北即張良擊秦始皇處同樂園在府東陳橋驛在府城北即宋太祖為衆所擁處輿地紀勝人物周蘧伯玉長垣人為衛賢大夫孔子嘗主其家寗越中牟人發憤好學齊威公師事之田基中牟人不從佛肸之叛楚王髙其義召以為司徒尉繚子尉氏人著兵書五卷號尉繚子公子無忌號信陵君仁而下士食客常三千人侯嬴郡人為夷門監公子無忌延為上客朱亥郡人有力侯嬴薦之魏公子擊殺晉鄙奪兵破秦漢陳平陽武人佐髙祖定天下六出竒計官至丞相封曲逆侯欒布郡人嘗客彭越髙帝義之後以功封鄃侯張蒼陽武人著律例以功封北平侯晉劉昆東昏人初為江陵令後遷𢎞農太守俱有善政有反風滅火虎北渡河之異庾亮鄢陵人風骨峻整仕為散騎常侍南北朝江淹考城人少孤採薪養母仕齊梁累官御史中丞江湛考城人以孝聞為太子舎人唐劉仁軌尉氏人家貧讀書仕為陳倉尉累遷尚書左僕射韋思謙陽武人八歳喪母以孝聞舉進士累官中書門下三品皇朝李穆陽武人性至孝舉進士累官太子中允沈倫太康人講學自給初仕給事中累官右僕射宋準雍丘人舉進士除校書郎文詞清雅為世所重袁逢吉鄢陵人四歳能誦爾雅孝經七歳兼通論語尚書開寶中擢三傳第王徳延東昬人素謹慎事太祖真宗官至東京都廵檢輿地紀勝集望諸列國之相漢主尚求其後夷吾霸者之臣魏君猶禮其墓况乎正直之道邁青松而孤絶忠勇之標掩白玉而振彩者哉唐太宗贈比干詔婦姑城南風雨秋婦姑城中人獨愁岑參詩題雍丘婦姑城陵陽佳地昔年逺謝朓青山李白樓陸龜䝉題尉氏氣酣登吹臺懐古視平蕪芒碭雲一去鴈鶩空相呼杜甫題吹臺荒臺森荆杞蒙籠無上路傳是古人跡阮公甞嘯處包融題嘯臺青陵臺畔日光斜萬古真魂倚暮霞李商隠題青陵臺偷隨栁絮到城外行過水西聞子規李商隠題流杯亭春到三陵淑氣和雪初消䖏翠嵯峨梅花未知開多少䇿杖攜壺試一過胡曽題三陵冡本朝祥符二年改浚儀縣為祥符宣和三年改紂王城為青陽城政和七年改酸棗為延津建隆元年改正城縣為鶴丘後改長垣乾徳元年改東昏鎮為東明縣崇寧四年以考城太康𨽻拱州大觀四年廢州二縣復來𨽻京畿宣和二年復以太康𨽻拱州六年仍𨽻京畿咸平三年以通許鎮置咸平縣沿革表梁園歌舞足風流美酒如刀解斷愁憶得承平多樂事夜深燈火上樊樓劉子翬題豐樂樓嘉節難逢真上已賜筵榮入小瀛洲韓琦題瓊花苑宜春舊臺沼日暮一登臨解帶行蒼蘚移鞍坐緑隂樹疎鳴鳥逺水淨落花深王安石題宜春苑京東東路青州倚郭一外縣五益都夀光臨朐博興千乗臨淄郡號齊郡北海州沿革天文虛危分野禹貢青州之域周禮正東曰青州葢以土居少陽其色青故以名州武王封太公望于此為齊國秦置齊郡漢分置北海郡屬青州東漢為齊北海樂安三國地以青州治臨淄魏為益都城晉為齊樂安二國地安帝時廣陵僑立南青州故於青州加北字劉宋省南青州乃去北字仍曰青州後魏治東陽又改益都郡後周改為齊郡隋復為青州尋改北海郡唐為青州本朝改鎮海郡地理沿革表縣沿革益都本漢廣縣地東漢為益都晉時前趙築廣固城夀光古斟灌氏地漢置夀光縣臨朐本齊伯氏駢邑漢置臨朐縣博興周薄姑地漢為博昌縣千乗古廣饒地東漢屬樂安臨淄本齊國營邱地東漢置臨淄縣同上形勝雲門山在州城南頂中有通穴如門可容百餘人逺望如懸鏡旁有黒龍洞及石井堯山在州城西因堯巡狩所登故名牛山在臨淄縣南齊景公登牛山顧其國而嘆曰美哉國乎即此靈山在臨朐縣東齊大旱景公欲祀靈山即此大峴山在臨朐縣東南宋武帝伐南燕度大峴山上有穆靈闗沂山在臨朐縣南周禮職方氏青州其山鎮曰沂山亦名泰山漢武帝曽祀于此水簾洞在雲門山之隂海在安樂縣東范公泉在州城西門外范仲淹知青州有惠政詳溪側出醴泉人以范公目之紀勝人物列國王燭齊人屢諌湣王不聼樂毅破齊欲以燭為將封萬家不従卒死節田單臨淄人多智習兵守莒用火牛之計敗燕師復齊七十餘城魯仲連義不帝秦不受平原君千金之賜孔順稱為天下髙士漢周堪元帝時擢光禄勲領尚書事帝以師傅見重唐房𤣥齡貫綜墳籍年十八舉進士従太宗征伐獨收人物置幕府後進尚書左僕射居宰相與杜如晦同心輔政唐世首稱皇朝王曽少孤鞠于仲父鄉貢禮部廷對皆第一真宗時累官叅知政事正色立朝不附王欽若與丁謂朝廷倚以為重後拜平章事封沂國公紀勝集力能排南山文能絶地紀孔明境接青疇俯瞰獲麟之野山開翠屺斜連辨馬之峯駱賔王晩登龍門山直上一千尺絶頂彌孤聳盤途幾傾側陽巘靈芝秀隂崖仙乳滴趙居貞岱宗復如何齊魯青未了㑹當凌絶頂一覽衆山小杜甫天門一長嘯萬里清風來李白本朝建隆三年以北海縣置軍淳化五年改軍名慶厯三年初置京東東路安撫使沿革表試掃北臺看馬耳未隨埋沒有雙尖蘇軾孤雲落日在馬耳照耀金碧開煙鬟霜風收緑錦萬頃水雲秋海氣朝成市山光晩對樓並同上人行桑下路日上海邊山軒冕非吾志霜風犯客顔歐陽修密州倚郭一外縣四諸城安邱莒髙宻膠西郡號髙宻州沿革天文虛危分野禹貢青州之域後魏于此置髙宻郡北齊省入東武縣唐置宻州本朝為防禦州開寶五年陞為安化軍沿革表縣沿革諸城本魯諸邑漢置諸縣屬瑯琊郡地晉屬東莞郡隋改為諸城縣安丘古渠丘地漢置安丘縣莒古莒子國漢置莒縣髙宻本齊晏平仲封邑漢置髙宻縣膠西本春秋介國地漢為黔陬縣沿革表形勝雨羅山在安邱縣西上有雲氣羅布天必雨常山在州西南歳旱禱雨輙應盧山在州東南秦人盧敖之所從遁上有盧敖洞聖燈岩九仙山在諸城縣西南竒秀不減鴈蕩浮來山在莒州西春秋書莒人盟于浮來即此孝源泉在莒北唐孝子孫既廬母墓醴泉出墓側因名礪阜山在髙宻縣西産礪石鐵撅山在膠西西南膠水發源于此石臼島在膠西正南海中天澤泉在膠西南三十里九穴泊在髙宻縣西北紀勝人物漢甄宇習嚴氏春秋教授常數百人梁丘賀從京房授易官至少府圖形麟閣南北朝劉勰好學撰文心雕龍臧榮緒純篤好學括東西晉為一書紀録志𫝊五代孫晟仕唐為著作郎後為周世宗所獲欲殺之臨刑神色怡然南望拜曰臣惟以死報國皇朝王子輿舉進士為主簿精敏吏事歴官諫議大夫楊光輔有學行國子丞致仕韓晉卿以明經中第歴官州縣稱為循良第一紀勝集營丘負海曲沃野爽且平洪川控海濟崇山入髙㝠陸機十洲雲霧逺三山波浪髙長瀾疑浴日連島類奔濤隋虞茂洪波迴地軸孤嶼映雲光落日驚濤上浮天駭浪長楊師道髙髙至天門日觀近可攀李白本朝元祐三年以