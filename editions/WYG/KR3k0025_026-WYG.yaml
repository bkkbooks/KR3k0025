body:
  text: 記纂淵海卷二十六宋潘自牧撰職官部三公經節彼南山維石巖巖赫赫師尹民具爾瞻詩兹惟三公論道經邦燮理隂陽官不必備惟其人書春秋漢含孶曰舉三公象五岳史漢丙吉出逢牛喘吉問牛行幾里或以譏吉吉曰方春少陽用事恐有所傷害三公典調和隂陽職當憂漢書成帝時何武建言國之輔佐必得賢聖然猶天之三光備三公官各有分職宜建三公官百官志汲黯責𢎞位三公俸禄甚多然為布被此詐也上問𢎞𢎞謝曰有之夫以三公為布被誠餙詐以釣名漢書蕭望之言三公任非其人則三光為之不明今嵗首日月失光咎在臣等漢書晉諸葛恢為臨沂令名亞王導庾亮謂曰明府當作黒頭三公北史晉王戎雖位總鼎司而委事僚宷間乘小馬從便門而出逰見者不知為三公也本史三公叅議國家之大事置府僚隋百官志三公佐天子平邦國理隂陽無所不統唐百官志傳記三公崇號為上公東漢以後常曰上公初學記其後或置或廢大抵無所統職至後魏特稱三師以正其名正一品然非道德崇重不居其位無其人則闕之六典三公無官有人然後充之舜於堯伊尹之於湯周公召公之於周是也同上周成王立三公而六官不必備惟其人以書傳考之皆兼領六卿未嘗特置也同上三公之任鼎足承君不有建明固守無以居位馬官傳漢哀平間始尊師傅之位雖明天子必有所師法六典荀爽為三公食不過一肉惟脱粟飯荀悦漢記安帝朝陳忠上疏曰三公稱曰冢宰王者改容而禮在輿為下御坐為起入則參對而議政事出則監察而量是非陳忠傳楊震明經愽覽不應州郡禮辟後有鸛雀銜三鱣魚墜堂下都講取魚進曰蛇鱣卿大夫服之象也數三法三台也先生自此升矣後位三公本傳丁固夢松生其腹上謂人曰松字十八公也後十八嵗吾其為公乎卒如夢焉呉嗣主傳集道協陶鈞力恩囘日月光一言歸社稷九命備圭璋楊巨源詩五雲多䖏是三台杜詩明君越羲軒元老坐三台李白詩一為公與相潭潭府中居韓集公望冠巖廊楊巨源詩鐘鼎勲庸大同上天設三光以昭明天子立三公以明理故公卿者四海之表儀神化之丹青鹽鐵論本朝政和二年詔曰太師太傅太保此古三公之官為宰相之任今為三師然古無三師之稱合依三代為三公官不必備惟其人為宰相之任若除三公即為宰相靖康末詔依元豐故事以僕射為宰相三公止為階官不復與三省之政焉職畧昔師尚父秉旄仗鉞猶未告老此諸葛元遜所以屈張昭素也而衛武公百年猶箴儆于國曰無以我老耄而舎我此左史倚相所以誨申公也東坡文集義重股肱望隆堂陛奥廉逺則堂陛峻股肱逸則元首安同上寵辭上宰歸榮故鄉兼兩鎮之節旄備三公之典䇿王安石上韓魏公書太師經太師維垣詩大雅維師尚父時維鷹揚詩大明天子禮樂是經學業不祛凡是之屬太師訓禮禮記尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷詩節南山史元帝即位蕭望之周堪本以師傅見尊重後詔御史國之將興尊師而重傅前將軍蕭望之傅朕八年道以經術厥功茂焉其賜爵關内侯給事中蕭望之傳首三公之職太師居上宋百官志隋髙祖受禪李穆来朝髙祖降坐禮之拜太師賛拜不名子孫雖襁褓悉拜儀同一門執象笏者百餘人貴盛當時無比隋書顔真卿德宗立拜太師立朝正色剛而有禮賛云晩節偃蹇為姦臣所擠毅然之氣折而不阻可謂忠矣唐書裴度拜太師平章事事四朝以全德始終及殁天下莫不思其風烈同上傳記文王得尚父于磻溪以為師史記太師孔光道術通明宜居四輔職導帝躬職畧太師金章紫綬位上太傅通典唐置太師以師範一人儀刑四海分記馮道為太師以舊德自䖏然當世之士無賢愚皆仰道為元老而喜為之稱譽本傳集文武成功後居為百辟師韓集善教邈無跡其流在民心君㸔魯太師廟食猶至今韓維冠三公之首為四逸之儀白樂天周寵元勲任先吕尚漢崇碩德選在孔光同上本朝國初之制以太師太保太傅為三師職畧淳化二年遣右正言張康齎太師趙普生辰器幣鞍馬就西京賜之故事非同平章無生辰國信之例上以普勲舊故特異其禮㑹要文彦博有赴闕司馬公言若令以正太師平章軍國政事亦足以尊老成矣遂詔一月兩赴經筵六日一入朝至都堂商量事事畧器深宏逹業茂經綸弛張文武之才出入將相之任歐楊公囘文太師啟太傅經天子不惠于庻人不信于諸侯不戒于戎事凡是之屬太傅之任去太師審父子君臣之道以示之少師奉世子以觀太傅之德而審喻之太傅在前禮記史後漢胡廣字伯始為太傅年八十四練逹事體明解朝章雖無謇直之風屡有補闕之益漢史明帝以鄧禹元功拜為太傅進見東向甚見尊寵同上和帝即位㓜弱以鄧彪有髙名海内歸仁召為太傅百官總已以聽之恩寵之隆莫與為比通鑑後漢張禹拜太傅録尚書事劉蒼以殤帝㓜育欲令重臣居禁内乃詔禹舎宫中給帷帳牀褥太官朝夕進食五日歸府毎賛與三公絶席同上鍾繇為太傅明帝曰三公者一代之偉人也兼華歆王朗而言魏志後魏淮陽王欣大統中為太傅文帝謂欣曰王欣為太傅再為太師自古人臣未聞有此例欣遜謝而已魏志傳記後漢有太傅上公一人掌以善道無常職通典世祖即位卓茂以德行見拔時年七十餘拜太傅賜几杖卓茂傳周成王即位周公畢公並為太傅史記晉悼公知士貞子之師博聞宣惠于教也使為太傅國語靈帝朝以陳蕃為太傅與胡廣叅録尚書事陳蕃志欲芟夷閹宦以清本朝陳蕃傳逹奚武拜太傅賤時好華飾及居重位不理威儀行常單馬門不施㦸常晝揜一扇或謂武曰公位冠羣后功盖一代出入儀衛不稱具瞻何輕率若是武曰且天下未平國恩未報安事威儀乎言者慙而退本傳集吾愛白樂天逸才生自然誰謂辭翰器乃是經濟賢皮日休白太傅詩賢相謝世運壯圖因事止髙揖七州外拂衣五湖裏謝靈運述祖徳詩負孺子之圖飾縁鶴之鼎軍威重于䕶將國禮貴于塞門陳沈炯為太傅表不以九族囘心意不以百代負國家所期陛下與北極同尊朝廷與南山等固同上本朝紹興十一年少師樞宻使濟國公張浚除太傅進封廣國公係年録張士遜上章請老就拜太傅進封鄧國公致仕宰相謝事自士遜始也就第十年而薨壽八十士遜歸老號退傅啟國于鄧范仲淹適守鄧州士遜還鄉仲淹置酒髙會明日士遜復置會揮金甚盛時人榮之東都事畧増其帝傅之崇歐陽公行李昭亮制太保經王躬是保詩蒸民太保乃作旅獒用訓于王書史周成王時召公為太保漢平帝元始元年始置太保光武中興時省漢書魏置太保以鄭冲為之位在二司之上魏志王祥拜太保詔曰耆艾元老髙行清粹朕所倚毗以崇道𢎞化王隠書晉汝南王亮為録尚書與太保衛瓘對掌朝政晉志晉詔太保何曽曰翼賛先皇光濟帝業同上傳記太保所以訓䕶人主導以德義者也通典太保古官商太甲時伊尹為太保漢平帝用王莽為之晉武初以王祥為太保進爵為公加置七官職通典孔緯進兼太保時天武都頭李順節疏暴人也以浙西節度使兼平章事䑓吏白已謝當班見百官緯判止之明日順節盛服至則無班怏怏去它日見緯以為言緯曰固疑公見望也且百辟卿士天子廷臣班見宰相以宰相為之長公提天武健兒據堂授禮安平子欲用之去都頭乃可順節慙縮不敢言列傳天寳以前唯以其官贈竇季謀一人而已通典集詔出未央宫登壇拜總戎上公周保傅輔相漢司空岑參送李太保司勲宰其鴻烈典冊備其徽章山甫式列羣之功紀績廟器莊叔匡成獻之難昭德彛鼎太保呉武公碑危勁之節貫四序而愈秀堅真之操經百鍊而無銷珠角應期山庭表德出忠入孝自家刑國人物冠冕彛章表則任屬屯警官聯樞侍行部六條議班三史尉遲綱銘本朝天禧元年司徒平章事王旦王元巖同日降制加太保㑹要熈寧元年潞國公文彦博守太保兼侍中再任彦博辭太保止受所加封再任從之同上紹興十年少保萬夀觀使兼三鎮節度使劉光世除太保同上俾陞帝保秩乃冠千公卿李漢行鄭紳制眷言公保宣力維多宣和除董貫制明公身為天下大老誠有憂國之心不當俯及細務願以此意為上一言使幽險之情得以上逹則天下之言皆明公之言而明目逹聰感召和氣皆明公之功矣朱文公荅史太保書太尉史太尉秦官漢因之金印紫綬掌武事髙祖曰周勃重厚少文安劉必勃可令為太尉後以左袒安劉漢史冲帝詔曰李固忠直不撓有史魚風其以固為太尉傳記後漢張顥見一鵲墜地化為石椎破得金印曰忠孝侯印顥奏聞藏之秘府後至太尉博物志唐置太尉為武階之首職畧景帝置太尉尊與丞相等通典集天官冢宰庻僚之率師錫有帝命虞作尉爰叶台極爰平國域崔駰太尉箴天監有漢誕生元輔代作三事勲在王府楊太尉碑銘本朝循歴代之制以太尉與司徒司空並為三公政和時罷之復周制以太師太傅太保為三公少師少傅少保為三孤以太尉本秦主兵官定為武階之首正一品在節度使之上居執政之次司徒經司徒掌建邦土地之圖人民之數周知九州地域周禮帝曰契女作司徒敬敷五教在寛掌邦教敷五典擾兆民書乃詔司徒俾立室家詩綿史漢光武拜鄧禹為司徒䇿曰禹與朕謀謨帷幄决勝千里今授印綬封鄼侯漢史袁安為司徒毎朝㑹憂念王室未嘗不流涕同上杜洗兵馬行司徒清鍳懸明鏡指李光弼也詩話傳記堯時舜為司徒舜攝帝位命禹為司徒秦置丞相省司徒漢初因之後漢大司徒主徒衆教以禮義凡國有大疑大事與太尉同六典魏華歆為司徒家無儋石之儲詔曰司徒國之儁老今大官重膳而司徒蔬食甚無謂也特賜歆及妻男等衣服本傳集天監在下仁德是興乃立司徒治茲黎蒸人具爾瞻四方是維乾乾夕惕靡怠靡違司徒箴敬敷五教九德咸事嗇人用章黔甿是富同上本朝宋置司徒金章紫綬進賢三梁冠佩山𤣥玉掌治民事郊祀則省牲視滌濯大喪安梓宫凡四方功課嵗盡則奏其殿最而行賞罰亦與丞相並置通考宋宰相吕夷簡詔特守司徒三表懇讓上令録詔書頒天下知朝廷有退讓之臣國史司空經掌邦土居四民時地利舜命禹作司空曰汝平水土惟時懋哉書乃召司空詩史少昊氏以鳥名官鳲鳩氏司空也史後漢牟融為司徒數有忠言章帝䇿曰司徒典職六年特加太尉漢史徐邈為司空嘆曰三公論道之官無其人則缺安以老病參之固辭不拜及沒後制賜故司空邈榖二千石錢四十萬本傳房𤣥齡進司空仍總朝政固辭帝遣使詔曰遜誠美德也然國家相眷賴乆一日去良弼如亡左右手顧公筋力未衰勿多辭王思禮代李光弼為河洛節度副使從平禄山守東京上元元年加司空自武德以來三公不居宰輔惟思禮而已長孫無忌進司空知門下尚書省平章軍國重事髙士廉口陳以外戚位三公嫌議者謂天子以私后家帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徴不棄也詔曰五帝後夏禹得咎繇為三王祖齊威得管仲為五伯長朕得公遂定天下公其勿遜列傳天寳十三載冊拜楊國忠為司空其日雨止通典集當歸馬之朝奉鳲鳩之職蘇集分制五服劃為萬國乃立司空厥惟是職司空箴本朝宋制進賢三梁冠佩山𤣥玉掌治水土祠祀掌掃除樂器大喪掌將校復土歴代皆有之至後周為冬官謂之大司空通考風力肅明器質恢傑除文彦博守司空制掌平土之司升文昌之任除吕公著守司空制大司馬史漢初不置武帝元狩四年初罷太尉置大司馬以冠將軍之號霍光以大司馬大將軍輔政武帝又令大將軍驃騎將軍皆有大司馬之號宣帝地節三年置大司馬不冠將軍亦無印綬官屬成帝綏和元年初賜大司馬金印紫綬置官屬禄比丞相去將軍哀帝建平二年復去大司馬印綬官屬冠軍如故元夀二年復賜大司馬印綬置官屬去將軍位在司徒上始置時議者以漢有軍候千人司馬官故加大王莽居攝以漢乃無小司徒而定司馬司空之號並加大後漢光武建武二十七年省大司馬以太尉代之故常與太尉迭置不並列至靈帝末始置焉魏文帝黄初二年復置大司馬以曹仁居之而太尉如故則太尉大司馬大將軍各自為官位在三司上武冠絳朝服金章紫綬佩山𤣥玉與大將軍同並通考本朝唯元嘉中用彭城王義康為之冠玉與晉同國史少師經貳公𢎞化寅亮天地弼予一人書傳記天子燕業及其學左右之習詭其師荅諸侯遇大臣不知文雅之詞法語之道簡文小誦不博習此少師之責漢百官志本朝紹興九年以節度使韓世忠除少師十年少傅節度使張浚除少師二十八年少傅節度使楊存中除少師孝宗即位九月少傅四川宣撫使呉嶙除少師㑹要隆興二年授特進尚書右僕射兼樞宻使張浚可罷右僕射特進少師保信軍節度使判福州以浚自劾求去故也同上極貳公之位叙政和除童貫制少傅史天子居處出入不以禮衣冠冠帶不以制御器列側不以度采服從好不以章忿悦不以義予奪不以節此少傅之責也百官志髙祖欲易太子張良為畫計曰上所不能致者四人今能卑詞厚禮請以為客時從入朝亦一助也及黥布反良説上以太子監關中兵上謂子房雖疾彊令傅太子以良行少傅事及破布歸上欲易太子及晏置酒太子侍四人者從上怪問之四人各言姓名帝大驚曰煩公卒調䕶太子太子竟不易者皆良招四皓力也本傳本朝紹興六年節度使張浚除少傅紹興三十二年孝宗即位張浚封魏國公浚以樞宻使授都督江淮軍馬入朝奏事繼有是命𤣥衮赤舄進次傅之崇名除錢景鑄制少保史天子居處燕私安而易樂而躭飲食不時醉飽不節寢起早晏無常玩好器弄無制此少保之責也百官志本朝紹興元年少保右僕射吕頥浩罷少保除特進先是頥浩言少保之官自陛下臨御未嘗輕授望追寢成命除一階官故有是詔至七年三月自鎮南軍節度使開府儀同三司充浙西安撫制置大使兼知臨安府始除少保會要紹興九年六月武勝定國軍節度使岳飛除少保同上左右丞相經允釐百工庻績咸熈帝曰疇咨若時登庸書實惟阿衡實左右商王詩爰立作相置諸王左右書若濟巨川用汝作舟楫若嵗大旱用汝作霖雨同上衮職有闕惟仲山甫補之詩帝曰臣作朕股肱耳目書元首明哉股肱良哉庻事康哉同上史黄帝得六相而天下治舜命宅百揆成湯始置二相以伊尹為右相仲虺為左相周成王時召公為保周公為師相成王為左右周公位冢宰正百工又作六典冢宰掌邦治統百官均四海史漢髙帝即位置丞相孝惠髙后置左右丞相魏黄初元年改為司徒後復置又有相國晉罷丞相唐世宰名猶不正初以三省長官中書令侍中尚書令共議朝政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相品位既崇不欲輕授常以它官居宰相而假以它官唐百官志張嘉貞天子欲用而忘其名謂韋抗曰朕常記其風操而忘名因閲表疏遂得其名唐志周勃為右丞相問勃一嵗决獄㡬何勃謝不知問錢榖一嵗出入㡬何又謝不知上問陳平曰各有主者上曰君主何事曰宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮四夷諸侯内撫百姓使卿大夫各任其職漢史丙吉代魏相為丞相上寛大好禮讓掾吏有罪贓不稱職終無所案驗同上蕭何薨曹參聞之告舎人曰趣治行吾且入相使者果召參代何為相事無所變更遵何之約束百姓歌之曰蕭何為法較若畫一曹參代之守而勿失載其清静民以寧謐同上公孫𢎞為漢丞相開東閣以招賢漢書漢制常以列侯為相唯公孫𢎞登相位乃封為平津侯其後為故事同上先主即帝位䇿亮為丞相曰丞相其輔朕之闕助宣重光以昭明天下評曰亮之為國也撫百姓示儀軌約官職從權制開誠心布公道可謂識治之良才漢記隋髙熲有文武之大畧明逹政務朝野傾仰識者以為真宰相隋書晉王導為丞相桓彛見導觀其治事還謂周顗曰向見江左夷吾不復憂矣晉傳張説與姚崇有隙崇病謂其子曰我死張説來弔汝具陳吾生平服玩列于前如説屬目即舉以獻之因以神道碑為請若得即模刻以示外此人見服玩若不顧則吾族無遺類矣及崇死子如其言説來果屬目焉去後即以獻之遂求所為文説許之故其碑曰一柱承天髙明之位列四時成嵗亭毒之功深後説悔來索則碑已横刻矣説嘆曰死姚崇猶能算生張説後譛不行張柬之姚崇為靈武軍使後詔舉外司可為相者崇曰張柬之沉厚有謀能㫁大事其人老惟亟用即日召見拜同鳯閣鸞䑓平章事唐書張九齡為相諤諤有大臣節同上房杜當方為相時天下新定䑓閣制度憲物率二人討裁毎議事帝所如晦長于㫁而𤣥齡善謀二人深相知故同心濟謀以左右帝當世語良相必曰房杜同上陸䞇為相所言皆指帝短或規其太過對曰吾上不負天子下不負所學同上唐𤣥宗命相皆先御書其名置案上會太子入侍上舉金甌覆其名而告之曰此宰相名也唐史房𤣥齡為相十五年以權寵隆極累表辭位帝遣使謂曰遜誠美德也國家相眷賴乆一日去卿如亡左右手唐志唐廢帝欲擇宰相問于左右皆言盧文紀及姚顗有人望廢帝因悉書清望官内琉璃瓶中夜焚香祝天以筯挾之首得文紀欣然相之五代史傳記秦悼武二年始置丞相官樗里疾與丼茂為左右丞相史記陳又置相國位丞相上並為贈官自晉魏以來宰相但以它官或闕不置間者自為尊崇之位多非其人臣之職其真宰相者不必居此官也通典隋文帝自大丞相後周遂置内史納言是為宰相亦有它官參與焉同上唐同中書門下三品及平章事知政事參知機務參與政事及平章軍國重事之名是也通典武后龍朔元年改侍中為左相中書令為右相尚書僕射為文昌後復改易同上丞相王商國家之柱石臣也其人守正不詘節前元后傳神龍元年大水宋務光上書今霖雨即閉坊門故里人呼坊門為宰相謂能節宣風雨天工人代乃是虛設宋務光傳唐自武德以來宰相寛厚以陸象先為標首詞翰以姚元崇為標首詞學以張説為標首决遣以張義正為標首通鑑唐紀太宗謂房𤣥齡曰公為僕射當廣朕耳目助訪賢才比閲訟牒日數百豈暇求人哉乃勅細務屬左右丞大關僕射房𤣥齡傳僕射裴遵慶母皇甫氏少時常持經經函中有小珊瑚樹異時忽有小龍骨一具立于側時人以為裴氏祥上元中遵慶遂居宰府廣異記毎元日冬至大朝百官已集而宰相方至珂傘列燭多至數百炬謂之火城宰相火城至則衆皆㓕燭以避之李肇國史補集我愛房與杜魁然真宰輔黄閣三十年清風億萬古皮日休詩大厦須異材廊廟非庸器雜體詩一戰文塲拔趙旗便調金鼎佐無為王仁裕上傅相國旱嵗天教作霖雨明時帝用補山龍王建上張相霖雨思賢佐丹青憶老臣應圖逢駿馬驚代得麒麟沙汰江河濁調和鼎鼐新杜詩左轄頻虛位今年得舊儒相門韋氏在漢臣頌經術杜詩十年紫殿掌洪鈞出入三朝一品身文帝寵深陪雉尾武皇恩厚宴龍津李德裕林舘經春瑞氣浮當時曽約相車逰白樂天清如氷玉重如山百辟嚴趨禮絶班强虜外聞應破膽平人常見盡開顔岑參平生五色線願補舜衣裳杜牧上熈陛下覆幬之恩下遂羣生性命之理以正百度以和四時澄其源而清其流統于一而應于萬為韋相表假三事之崇允萬夫之望故韓信以丞相擊魏樊噲以相國伐燕克成茂功抑有前典元逹制玉鼎昇黄閣金章謁紫宸任師古本朝元祐初司馬公相乃請令三省合班奏事分省治事自紹聖以後皆因之時議者謂門下相凡事既同進呈則不應自駁以行之命是省審之不可廢也蔡京以太師總領三省號公相廢尚書侍中中書令為左輔右弼亦虛而不除改左右僕射仍兼兩省侍郎靖康中何文縝將拜相乃先為僕射呉正仲當制更為丞相不從建炎三年吕元直初相議者請併三省乾道二年十二月詔改左右僕射為左右丞相㑹要冦萊公當國真宗有澶淵之幸而能左右天子不動如山却敵國保宗廟天下謂之大忠范文正公集吕端為相持重識大體毎奏對同列多異議公罕所建明一日内出手札戒曰令中書事必經吕端詳酌乃得聞奏言行録吕䝉正為相遇事敢言上嘉其無隠長編元祐元年司馬光言竊見文彦博沉敏有謀畧知國家治體能斷大事功効顯著此天下所共知也同上熈寧初富弼再相神宗首問邊事公曰臣愚以為首當推恩惠布德澤二十年未可道著用兵二字上問所當先如何公曰阜安宇内為先言行録王旦在相位乆外無疆場之虞兵革不用海内富實羣工百司各得其職故天下稱為賢相王旦傳韓琦為相十年當仁宗末朝廷多故公臨大節處危疑茍利國家知無不為故􅀎光輔三后大濟艱難坐置天下于大寧公之力也言行録王曽毅然大節身係安危事畧朝廷有道青春好門館無私白日長有官居鼎鼐無地起樓䑓魏野上冦萊公風定曉園蝴蝶閙雨餘春圃桔橰閒荆公詩平章事史杜祐拜檢校司空同中書門下平章事嵗餘乞致仕詔三五日一入中書平章政事祐毎進見天子尊禮之官而不名公化裴度太和四年詔進司徒平章軍國重事三五日一入中書狀貎不踰中人而神觀爽邁操守堅正善占對名震四夷同上貞觀八年僕射李靖以疾辭位詔疾小愈三兩日一至中書門下平章事平章之名盖始於此百官志宋璟罷帝欲用張嘉貞而忘其名夜詔韋抗曰朕嘗記其風操今為北方大將姓張而複名嚮夜半因觀文臣表奏而得其名遂以為平章事張嘉貞傳傳記裴冕肅宗至扶風召赴行在拜左相代宗立詔攝冢宰固辭以疾乞間日入政事堂帝優之聽入閣不趨為御小延英召對本傳鄭綮毎以詩託諷中人有誦於上前者昭宗意其有藴未盡因有司上班簿遂署其名曰可禮部侍郎同中書門下平章事鄭綮傳集金鉉重名銀章貴服劉禹錫代平章表本朝元祐中置以文彦博太師吕公著守司空相繼為之序宰臣上所以處老成碩德特命以寵之也或稱平章軍國重事或稱同平章軍國事五日或兩日一朝非朝日不至都堂其後蔡京王黼以太師總三省事三日一朝赴都堂治事開禧元年韓􅇑胄拜平章討論典禮乃以平章軍國事為名盖省重事則所預者廣去同字則所任者專邊事起乃命一日一朝省印亦歸其第宰相不復知印其後賈似道專權竊位日乆尊崇日隆位又在丞相上矣職官志參知政事史魏文帝即位劉放孫孜轉為左右丞參掌機密評曰劉放文翰孫孜勤謹並管喉舌權聞當時三國志後魏古弼太武時為尚書令參知政事方欲奏除减苑囿遇太武與劉樹圍棋弼碎樹頭毆其背大武竒弼公直皆可其奏以與百姓通鑑隋蘓威宇文述裴矩裴藴盧世基參掌朝政時人稱為五貴蘓威傳蘓威與髙熲參掌朝政威見宫中門銀為幔鈎因盛陳節儉之美以喻上上為改容雕飾舊物悉命除毀本傳唐崔日用參機務制曰宜緝台階之政唐太宗詔令唐魏徴知門下省事詔朝章國典參議得失他日宴羣臣帝曰納忠諫正朕違為國家長利徴而已雖古名臣亦何以加親解佩刀以賜本傳唐蕭瑀復參預朝政帝曰武德季太上皇有廢立議瑀於爾時不以利怵死懼社稷臣也因賜詩曰疾風知勁草板蕩識忠臣又曰公守道耿介古無以過然善惡太明或有時而失瑀頓首謝曰既蒙教又許以忠亮雖死日猶生年也本傳魏徴與杜淹等以秘書監參預朝政上問徴與諸葛亮孰賢云云帝曰蹈履仁義以弼朕躬致之堯舜雖亮無以抗本傳傳記唐魏徴字元誠貞觀三年以秘書監參預朝政于是帝即位四年嵗㫁死罪二十九㡬致刑措米斗三錢天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺户闔不閉行旅不齎糧取給于道帝謂羣臣曰此徴勸我行仁義之效矣本傳唐戴胄為吏部尚書參預朝政太宗嘗謂羣臣戴胄于我無骨肉之親但其清直厲行情深體國事有機要無不以聞所以官爵酬厥勞耳本傳魏徴參預朝政帝曰人言徴舉動疎慢我見其嫵媚耳對曰陛下導臣使言臣敢不數批逆鱗哉本傳唐薛稷遷黄門侍郎參知機務與崔日用數爭事于帝前本傳唐楊師道拜侍中參預朝政禮遇寵渥性周慎未嘗語禁省事本傳集春還上林苑花滿洛陽城崔湜詩黄樞萬物俾預訏謨楊億代謝表俾參政論允叶羣心温公賜韓絳詔雍容陪大政宻勿賛鴻鈞唐詩在朝但覺民瞻聳參政從知國勢髙出𤓰囿政事資參决樞機賴典司出德夫顯奉宸綸寵參陪國論公同上由君子之道以相天下則宜不為逺近易慮不以親疎改施如天之無不幬而施之各以其命之所宜如地之無不載而生之各以其性之所有彼常人之心區區好忮而自私不恕己以及物者豈足以量之耶伏惟閣下垂聽而念焉使天下士無復思古之君子而樂出乎閣下之時而又使常人之觀閣下者不能量也豈非君子之所願而樂焉者乎冐凟威尊不任惶恐之至臨溪先生上曽參政書欲餌金鈎深未逹磻溪須問釣魚人䝉正詩本朝乾德二年太祖已相趙普畏其專將擇官以為副而難其名稱召陶榖問曰下丞相一等為何官對曰唐為參知機務參知政事今可用之遂命薛居正吕餘慶為參知政事仍令不押班不知印不升政事堂止令就宣徽使㕔上視事殿廷别設塼位於宰相後勅尾書銜降宰相数字月俸雜給半之盖帝意未欲令居正等名與普齊也㑹要開寳六年詔參政薛居正等於都堂議公事又詔中書門下押班知印宜令與居正等同知雍熈四年御史宣文德殿常朝百官皆有塼位唯參知政事未有詔令依位排砌至道元年詔參政與宰相分日知印押正衙其塼位先異宜合為一並得升都堂二年詔自今參知政事不知印押班塼位列宰相後不升政事堂然押勅齊銜行並馬至今不易參政行丞相事多不踰年淳熈初葉孟錫龔實之行丞相近三年言者以為懐私加俸許深甫為參政命陳勉之兼權又除袁起巖盖三員也亦國朝所未有嘉定初命雷季仲婁彦發樓大防亦三員遂為故事朝野雜記樞宻院史唐以宦官為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏于内中進呈若人主有所分處則宣付中書門下施行吕源明家塾記後梁革唐世宦官之弊開平元年改樞宻院為崇政院分紀其備顧問參謀議于中則有之未始專行事于外也五代史晉天福中以桑維翰知樞宻院事四年廢樞宻院以劉處謙兼樞宻奏議多不稱㫖及處謙丁内憂遂廢院同上傳記唐莊宗同光元年復以崇政院為樞宻院復唐樞宻之名然權侔于宰相矣後世因之遂分為二文事任宰相武事任樞宻樞宻之名既重而宰相自此失其職白孔六帖唐張居翰掖庭令張從政之養子同光中為樞宻偽蜀王衍既降詔遷其族于洛陽行及秦川時關東已亂莊宗慮衍為變遣中官馳騎齎詔殺之詔王衍一行並宜殺戮其詔已經書時居翰在宻地覆視其詔乃揩去行字改為家字及衍就戮于秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰力也同上集用禁林之老典温省之務甫參籌于帷幄承班秩于室家胡文公行狀仍冠中書温公集日愧素餐叠䝉聖訓敢不竭股肱之力言行録北極之􅄤筦於神務二昉之府倚以老成賜張耆詔本朝樞宻院與中書對持文武二柄號為二府會要國初循唐制即中書之北置樞宻院元豐改制遂變於中書西置續㑹要淳化三年復以張遜知院事顯德六年范質王溥並參知樞宻院事本朝亦有院樞宻院但行東院事印李綱知樞宻院奏云祖宗法樞宻院事掌兵籍虎符大全樞宻使史唐代宗永泰中置樞宻使唐書晉復置樞宻院以桑維翰為使事無巨細一以委任之數月之間百度浸理同上莊宗朝郭崇韜為樞宻使崇韜既位極人臣權兼内外謀猷獻納必盡忠規内外翕然稱之五代史梁之崇政使乃唐樞宻之職盖出納之任也至梁始用士人其備顧問參謀議於中則有之未始專行事于外也至崇韜重誨為之始復唐樞宻之名然權侔宰相矣後世因之遂分為二安重誨傳傳記安重誨為樞宻使在位六年以佐命功臣處機宻之任事無大小皆所參决白孔六帖後唐樞宻使凢東西院二員會要舊例樞宻未帶使相省不宣麻至周太祖初潜歴試是任乃宣制於公朝宣麻自周太祖始續翰林志田况拜樞宻使天下顒顒視為宰相以望太平言行録集自賛襄於衮職宜總領於星樞王元之行王隨制賜曽公亮詔宜冠聯于樞省王元之集賜孫固詔位登樞宥之冠蘓魏公集本朝樞宻使國初首命趙韓王普焉號稱二府禮遇無間毎朝奏事共中書先後上所言兩不相知祖宗亦賴此以聞異同用分宰相之權㑹要韓世忠除樞宻使上謂世忠曰朕付卿等以樞府本兵之權甚大卿宜合為一心勿分彼此則兵利全而莫之能禦顧如烏珠者又何足掃除乎言行録至道三年以鎮海節度曹彬兼侍中充樞宻使同上文彦博除樞宻使制乃位冠於中樞温公集樞宻副使傳記熈寧中韓澤遷樞宻副使神宗問天下遺利公對求遺利莫若盡地力退具疏以謂害農之弊莫甚於差役請委從䑓諫集議言行録韓琦為樞宻副使兩府合班奏事琦必盡言雖屬中書琦亦對上陳其實同列尤不悦上獨識之曰韓琦性直同上王文忠公堯臣為樞宻副使持法守正以身任天下事在位六年廢職脩舉皆有條理言行録歐陽公脩為樞宻副使公在兵府與曽魯公取天下兵數及三路屯戍多少地里逺近更為圖籍凢邊防乆闕屯戍者必加蒐補長編吕公著拜樞宻副使初自河陽入朝都人環觀相謂曰此公還朝百姓之幸也至是士民相慶既受命出殿門武夫衛卒皆歡忭咨嘆言行録使相本朝樞宻使帶相印為樞相自後唐始國朝會要國初魏仁浦以宰相兼樞宻使後罷同上慶厯二年二邊用兵富弼言邊事係國安危國初范質王溥以宰相兼參知樞宻事今兵興宜令宰相兼領仁宗然之揮麈録建炎四年以宰相范宗尹兼知樞宻院罷御營以其事歸樞宻院中興會要紹興二十五年詔曰比縁軍興令宰相兼樞宻使典掌機務今邊事已定可依祖宗故更不兼領同上慶厯二年上曰樞宻非古官未欲遽改止令中書同議宻院事長編惟仲淹弼一䕫一契天實賚予予其敢忽曰衍汝來汝予黄髮汝掌樞府兵政無蹶石介慶厯聖德詩知院史晉天福初桑維翰以翰林學士尚書禮部侍郎知樞宻院知院之名始此分紀本朝國初不置淳化二年樞使王顯出鎮始以張遜知樞宻院事續㑹要知樞宻院同知院並正二品知院掌佐天子執兵政而同知院為之副凡邊防軍務常與三省分班稟奏事于體要則宰相執政官合奏神宗正始職官志李諮為知樞宻院事諮性明逹周知世務佐樞府抑僥倖號為稱職東都事畧李綱以右丞被命樞筦奏云伏䝉聖恩除知樞宻院事以被命鴻樞專統兵機宜得魁竒英偉之人以居其任傳信録同知史周顯德六年命司徒平章范質禮部尚書王溥並參知樞宻院五代史本朝初不置淳化二年王顯出鎮張士遜知樞宻院事始以温仲舒冦凖同知院同知之名自此始也會要元豐官制行廢使副存同知職源紹興中髙宗以本兵之地事權宜重依祖宗故事置樞宻使而知院同知院亦仍舊由是並除本朝襍記向敏中同知樞宻院明辨有才畧處事敏速樞宻之任專主謀議至于西北二邊道路斥堠走集之所莫不周知事畧吕公著復同知樞宻院神宗手詔曰顧在廷之人有可以託中外腹心之寄均皇家休戚之重無逾卿者可亟起視事同上元祐中趙瞻拜同知院事制賛一人之休必資耆德握萬兵之本爰賴舊臣盖知其要者可以應務而不窮乆於事者可以臨機而無惑宜賴故臣賛翊洪樞會要簽書本朝簽書無正員為使之貳續㑹要太平興國四年石熈載以樞宻直學士簽書院事簽書之名自此始也職源景德三年韓崇訓檢校太傅馬知節為檢校太保並簽樞宻院事天禧四年以華州觀察使為宣徽北院使鎮國軍留後簽書樞宻院事簽書兼藩鎮自此始也會要馮拯簽書樞宻院事真宗訪以邊事拯謂備邊之要當湏扼襟喉據險隘以制敵之衝若於保州威虜間依徐河以布陳裹糧其勢足以决勝事畧太平興國四年石元懿始以樞宻直學士僉書院事退朝録同簽本朝樞宻院舊制無同簽書樞宻院事者治平中始有以郭逵為之神宗正史職官志元豐官制行使副簽書並罷惟存同知職源太平興國八年張司空齊賢王公沔並以諫議大夫同簽書樞宻院事退朝録簽書大抵以處資淺之人若簽書一經親祠方進同知及樞副若武臣擢預國政只除同簽書職源承㫖本朝熈寧五年以尚書比部員外郎曽孝寛充史館脩撰兼都承㫖文館兼領自孝寛始續㑹要劉安世作都承㫖待制范相純仁之出由安世草疏已而復拜吕相大防遂擬安世真定宣仁難之吕云劉安世曽言范純仁今既復用宜少避之宣仁曰今既不作言事官自不相妨言行録毎崇政殿臨决庶務則承㫖侍立殿前侍衛司奏事則承㫖受而讀之㑹要右府管天下之機務而承㫖左右參總焉除張誠一制陪輔帷幄以承宻㫖除劉奉臣制樞機之地親承宻㫖雖在副介亦湏得人檢詳本朝檢詳之職古無之國初熈寧四年詔以編脩經武要畧官四人王存陳侗陳奉世蘓液檢詳樞宻院諸房文字禮遇視中書檢正官元豐三年詔定置三員及改官制檢詳官尋罷續㑹要乾道二年詔樞宻檢詳係掌朝廷機要文字不許出謁賔客會要吕大忠檢詳樞宻院吏兵房文字令典義勇樞機大忠言養兵猥衆國用日匱漢之屯田唐之府兵善法也弓箭手近于屯田義勇近于府兵擇用一焉兵屯可省矣事畧紹興三十一年完顔亮渝盟時洪文敏公邁任樞宻院檢詳宰相傳㫖令撰書詔榜檄家傳編脩官本朝編脩之職古無之慶厯四年史館王洙承㫖單士寧編脩例冊編脩之名自此始分紀熈寧三年以館職王存顧臨等同編經武要畧兼刪定諸房例冊中興㑹要王銍權樞宻院編脩纂集祖宗兵制書成上覽之稱善命改京官賜名樞廷備檢中興係年録編脩官隨事置無定員以本院官兼者不入衘四朝志神宗朝除周萃樞宻院編脩官制曰樞宻之府自祖宗以來防患持危應變之大計與夫將相議論之臣宻謀要䇿皆具于此而文書貿亂淆雜而無紀綱故擇能臣次第之荆公文集尚書省史漢靈帝時謂之中䑓唐龍朔二年改尚書省為中䑓漢書北齊尚書省謂之都省亦謂之北省張安世拜大司馬車騎將軍領尚書事職典樞機以謹慎周宻而自著張禹録尚書毎朝會與三公絶席前漢書章帝以太傅趙熹太尉牟融録尚書事尚書有録自熹始漢制遂以為常後漢書唐制尚書省都堂居中左右分于司堂東西凢二十四司分曹共理唐書尚書百官之本國家樞機李固疏北斗天之樞機尚書為陛下之樞機晉宗室會稽王道子及世子元顯並録尚書事時道子為東録元顯為西録通志本朝太平興國中徙于利仁坊孟昶舊第頗為宏麗中設都堂左右司左右丞郎中員外郎㕔東西廊分設尚書侍郎㕔事二郎中員外㕔事六掌施行判命舉省内綱紀程式受付六曹文書聽内外辭訴奏御史失職考百官府之治以詔廢置賞罰紹聖二年詔在京官所受傳宣内降隨事申尚書省又詔尚都省弹奏監察御史糾不當者通考尚書令史尚書令一人正二品掌典領百官其制有六尚書百官志後漢衆務悉歸尚書三公但受成事而已尚書令主贊奏事總領紀綱無所不統與司𨽻校尉御史中丞朝會皆專席而坐京師號曰三獨坐故公為令僕射者朝會不陛奏事天子封禪則尚書令奉玉牒檢兼藏封之禮通考傳記武德中太宗初為秦王嘗親其職儀刑端揆唐六典郭子儀至自涇陽恩賚崇縟進拜尚書令懇辭不聽詔趋詣省視事百官往慶勅射士五百騎執㦸寵衛子儀確讓且言太宗嘗踐此官故累聖曠而不置皇太子為雍王定關東乃得授渠可畏私孝臣隳大典云云帝不獲已許之其所讓付史館六帖漢侯霸為尚書令時朝廷少舊臣霸明習故事收錄遺文大全集總百揆之得失管王政之開闢出納王命敷奏萬機屬職萬機總任百揆邢子才謝表邦國政治盖出于中樞朝廷紀綱盡歸于會府除王時制本朝淳化三年升在三師上掌佐天子議大政奉所出命令而行之其屬有六曹凢庻務皆命而决之凢官府之紀綱程式無不總焉大事三省通議則同執政官合班小事尚書省獨議則同僕射丞分班論奏若事由中書門下而有失當應奏者亦如之通考左右僕射史秦官漢因之自侍中尚書博士郎皆有之古者重武官有土射以督課成帝建始元年初置尚書五人以一人為僕射主封門掌授廩假錢榖龍朔二年改左右僕射曰左右匡政光宅元年曰文昌左右相開元年曰左右丞相天寳元年復百官志徐宣左僕射加侍中車駕幸許昌宣總留事帝還主司奏呈文書帝曰吾與僕射何異也魏志房𤣥齡進尚書左僕射帝曰公為僕射當助朕廣耳目訪賢才比聞閲牒訟日數百豈暇求人哉乃勅細務屬左右丞大事闗僕射唐書杜如晦進位尚書右僕射仍領選與房𤣥齡共筦朝政引士賢者下不肖咸得職當時浩然歸重同上傳記建安中以執金吾榮邵為尚書左僕射僕射有左右自此始也百官表王常為左僕射常墮車時人謂之墮車僕射周顥為左僕射深識危亂常飲酒醉三日不醒時人謂之三日僕射世説裴遵度以右僕射後知選事朝廷優其老聽就第注官時以為榮列傳李絳寳厯初拜尚書左僕射絳偉儀質俊以直道進退望冠于一時賢不肖大分屡為䜛邪所中同上裴均元和三年入為尚書右僕射上日唱授按送印皆尚書郎為之文武四品五品郎官御史拜廷下御史中丞左右丞升階荅拜時以為禮太重官志集端揆之司樞機之重尚書令總領衆務舉持綱目僕射貳之誠為崇重天寳元年議本朝制左右僕射掌佐天子議大政二令之職與三省長官皆為宰相之任元豐官制行不置侍中中書令以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令職事寄禄為時進通考中書令史中書省令二人正二品佐天子執大政而總判省事百官志隋中書令為侍中知政事遂為宰相之職隋書唐開元改紫薇令唐書髙允為中書令魏文帝重之不名稱為令公魏史房𤣥齡太宗即位為中書令第功班賞以如晦等功第一餘皆以次叙封拜唐書郭子儀為中書令二十四考以身為天下安危張九齡為中書令時天長節百官多獻珍異惟九齡進金鏡録五卷同上傳記晉和嶠為令荀朂為監不同居嶠嫉朂邪諂先登車席而坐不容朂又乃引備車監令異車自此始也呉隲為中書令父亮為尚書令毎朝會帝以雲母屏風隔其坐也録記薛元超帝嘗宴諸王召元超與從容謂曰任卿中書寧藉多人哉議拜中書令唐紀長孫無忌檢校中書令猶知門下省帝欲立昭儀為后無忌固言不可同上本朝國初官制未定異姓未有兼中書令者太祖太宗時加中書令者惟趙普一人普加中書令再四懇辭上手詔曰開國舊勲惟卿一人毋自固避中書省正一品以檢校官兼中書令謂之使相並國史中書舎人史魏置中書通事舎人東晉省以中書侍郎一人直西省即侍郎兼其職而掌其詔命傅昭為中書通事舎人時居此職者皆權傾天下獨昭廉静無所干預器服率陋帝聞之賜漆合燭盤勅曰卿有古風故賜以古物南史商馮為中書舎人列上玉事唐史虞世南拜内史舎人栁顧博學罕所推許至是與世南相見嘆曰海内當共推此一人同上傳記漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令乃今中書舎人也通典唐武德三年改中書舎人置六員自永淳以來天下文章道德䑓閣髦彦無不以文章逹故中書舎人為文士之極任朝廷之盛選諸官莫比焉通典唐楊綰為中書舎人故事舎人年乆者為閤老其公廨雜料獨取五之四綰悉均給之本傳魏魏收兼中舎與温子升邢子才齊譽世稱三才同上集絲綸閣下文章静鐘皷樓中刻漏長獨坐黄昏誰是伴紫薇花對紫薇郎白居易詩西掖重雲關禁置北山踈雨㸃朝衣干門栁色連烟鎖三殿花香入紫薇岑參西掖深沉大帝居紫薇西省掌文書天堦啓鑰趨朝後侍史焚香起草初古詩上李舎人緑松窻對鳯池開履跡衣香遍上台天意皆從紫毫出宸心盡向紫烟來非時玉案呈宣㫖毎日金堦謝賜囘王建詩今年寒食夜西省鳯池頭誠知視草貴未免對花愁白居易詩本朝中書舎人為所遷官實不任職復置知制誥及直舎人院故事入西閣皆中書召試制誥三篇惟梁周翰不召試而授焉其後薛映梁鼎楊億陳堯佐歐陽修亦如此例長編元豐五年曽鞏陸佃並試中書舎人自是始正官名續㑹要中書侍郎史侍郎二人正三品掌貳令之職朝廷大政參政焉百官志于志寧為中書侍郎太宗常宴近臣問志寧豫宴安在有司奏勅召三品志寧品第四帝悟特詔豫宴裴潜風神髙邁為中書侍郎出入禁門見者皆肅然改容王琚始為中書侍郎母居洛陽來京師讓琚曰爾家上世皆州縣職今汝無攻城野戰勞以諂佞取容海内切齒吾恐汝家墳墓無人復掃除也琚卒不免並列傳傳記魏明帝詔舉中書侍郎為吏部尚書盧毓曰得人與不盧生耳舉選莫取名名如畵作餅不可啖毓舉韓暨敦篤至行帝乃用之劉禕之擢中書侍郎同三品是時詔令叢繁禕之思致華敏裁可占授少選可待也列傳本朝宋制侍郎掌貳令之職參議大政授所宜詔㫖而奉行之官制行以尚書右僕射兼又别置侍郎以代參知政事建炎初復改侍郎為參政續㑹要記纂淵海卷二十六
