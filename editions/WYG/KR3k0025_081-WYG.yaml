body:
  text: 記纂淵海卷八十一宋潘自牧撰閫儀部總論婦人經婦人貞吉從一而終也易恒卦無攸遂在中饋貞吉易家人卦婦人之正義無所必遂職乎中饋而已婦無所専於家事有非非婦人也有善亦非婦人也婦人之事惟議酒食爾無遺父母之憂斯干注婦無公事休其蠶織出瞻仰婦人無預外政蠶織為事詩注女子適人者為父何以期也婦人不貳斬也婦人不貳斬者不貳天也儀禮䘮服篇女子不言外記内則婦人不葛帶記檀弓上婦順備而後内和理内和理而後家可長久也記昏義婦人不越疆而弔人檀弓下婦人送迎不下堂婦人不立乗曲禮上婦人無爵從夫之爵坐以夫之齒婦人從人者也幼從父兄嫁從夫夫死從子記郊特牲其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也記玉藻婦人不居廬不寢苫喪父母既練而歸記䘮大記子順男子之教無専制之義而有三從之道教令不出於閨門事在供酒食而已無閨外之非義者也家語史婦人送迎不出門見兄弟不踰閾左僖二十二年富辰曰女徳無極婦怨無終左僖二十四年注近之不知止足逺之則忿怨無巳女待人婦義事也左襄二十年婦人不専行必有從也榖梁傳孔子曰彼婦之口可以出走彼婦之謁可以死敗史記雖有文母之徳必繫於子杜鄴傳婦人不得與事西漢谷永傳婦人性易悦耳婦人内夫家而外父母家並出通鑑漢武紀女雖貴猶為其國隂西漢杜鄴傳集施衿結褵䖍恭中饋女史箴本朝古者婦人爵因其夫貴以其子雖有過人之才絶俗之行不表於世婦人有徳行才智之能而不得見於事有言語文章之羙而不得聞於人而况仁而不夀賢而不禄者乎此詩人所以賦彤管史氏所以傳列女也擇夫得温嶠生子勝王濟並東坡集婦徳經仲氏任只其心塞淵終温且恵淑慎其身燕燕詩任者以恩相親信也注委委佗佗如山如河君子偕老山無不容河無不潤注莊姜賢而不答碩人静女其孌貽我彤管彤管有煒静女並詩婦人尚専一徳無所兼連禮秋官䟽史婦徳不必才明絶異也清閑貞静守節整齊行已有耻動静有法是謂婦徳東漢列女傳地道柔静隂之常義李柔傳婉静有禮東漢明徳皇后紀傳記東漢一代賢明婦人如秦嘉妻徐氏動合禮義言成規矩史通集遵義方之明訓憲女史之典戒潘安仁寡婦賦姽嫿於幽静宋玉神女賦有淑謹之徳窈窕之賢珠玉翡翠職是其儀而瀚濯蘩蘋不改其操故我君子琴瑟友之姆師酒食之議女工纂組之繁莫不總制清𠂻洪宣懿則茂蘋蘩之雅訓協沼沚之芳猷古稱敬姜詩云淑女論容比徳殆無以過禀柔成性藴粹含章窈窕之秀婉孌之姿貞節峻於寒松韶儀麗於温玉温慈恵和信肅脩睦行有法度動有禮經嚴恪以理家人􅈺瑟以和君子則已含𢎞光大矣若乃宗廟哀敬仁孝也娣姒祗和謙順也蠲潔酒食婦儀也黼黻𤣥黄女工也洪此四徳而務六親可以作範母儀昭宣壼則矣外以賛府君之徳内以光中饋之政遺風素範蕙敷蘭滋恵心光孚氛氲沼沚堂嚴壼訓芬郁母儀中饋柔嘉娣姒有則並陳子昂集睎盼睞者若遲日之泛漣漪瞻詞氣者猶光風之轉蘅蕙張説之文奕葉班姑史芬芳孟母鄰杜詩常自砥礪未嘗以嘯歌廢日動循禮法曽不以嚬笑為容張燕公碑實有全徳為九族宗師一畆之宫言笑不聞於鄰崔氏銘并桞文卑柔莊敬承二尊姑嫂娣姒和無痕韓詩婉約勞謙得六姻之和權載之集墓誌其為妻道也貞順之宜常服於身體疑忌之慮不萌於心術忿􅓰之色不兆於容貌同焉而合於禮婉焉而得其正桞文鵲巢之均一家人之悔厲籩豆敬齊之色琴瑟静好之儀夫人備有焉得内姻外姻之和如恵風甘雨長養萬物致友睦以諧姒娣盡敬愛以安舅姑權載之昔漆室緹縈列女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人為女則孝友為元氏婦則豐潔家祀為母則親執書誨二子皆以通經仕女羙如此婦徳又如此母儀又如此三者具羙可謂冠古今矣白樂天集元夫人墓誌柔明治性温恵保身静脩言容動中規度承訓師氏作嬪良人茂四徳而蘭幽有馨潔百行而玉立無玷發為淑問著為芳猷姻族有輝閨闈是式静無違禮故組織有常訓動必中節故環珮有常聲同上禮容詎假於環珮工藝亦因於組織王維集珠玉滿堂不忘於瀚濯歌鐘成列載翫於圖史沈雲卿文螽斯不妬鳯凰和鳴李太白文言成大家之書行為衆婦之法王維集䖍盥潔饋之勤寒燠匪懈和灰紉鍼之事顧指而具殷祭大賔必躬蘋藻之事夙興夜寐能服瀚濯之衣並出吕和叔集本朝静女不争寵幽姿知自嬉歐公集以孝力事其舅姑為賢婦以柔順事其夫為賢妻以恭儉均一教育其子為賢母歐文少以女士不勤姆師珩璜之節動必以禮蘋藻之薦敬而有儀東坡集柔良靚専来嬪巨室以順為令妻以嚴為賢母並出臨川集象服之盛配徳於山河彤管之嚴比潔於圭璧静而守禮存江漢之風動必有儀儼山河之象並出欒城集自設帨至於屬纊九族無間言類要婦言子許允之婦奇醜交禮竟不復入房許曰婦有四徳卿有㡬荅曰新婦所乏者容耳士有百行君有㡬許曰皆備婦曰君好色不好徳何謂皆備許有慙色遂相敬重郭子史班媫妤曰死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之無益故不為也西漢本傳互見守正婦言不必辯口利辭也擇辭而説不道惡語時然後言不厭於人是謂婦言後漢列女傳武帝嘗與胡貴嬪摴蒱遂傷上指帝怒曰此固將種也貴嬪對曰北伐公孫西距諸葛非將種而何胡貴嬪傳謝道韞為王凝之妻凝之弟獻之嘗與賔客談議辭理将屈道韞遣婢白獻之曰欲與小郎解圍乃施青紗步幛自蔽論獻之前義客不能屈也世説新語唐長孫皇后嘗采自古婦人得失事為女則二十卷唐書劉道真於河側自牽船見一老嫗採梠劉調之曰何不調機利杼而採梠嫗曰丈夫何不跨馬揮鞭而牽船裴啟期語林齊女徐吾者與其鄰婦合燭夜績吾貧而燭不屬鄰婦請無與夜績吾曰妾以貧故起常先去常後掃地陳席以待來者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光莫之能應遂復與夜績列女傳互見識見集范𫝊正亷問宣池訪李白子孫獲孫女二人一為陳雲之室一乃劉勸之妻皆編戸氓也因召至郡庭相見與語衣服村落形容朴野而進退閑雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不禄而卒有兄一人出遊一十二年不知所在父存無官父殁無名有兄不相保為天下之窮人無桑以自蠺非不知機杼無田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷於農夫救死而已乆不敢聞於縣官懼辱祖考鄉閭逼迫忍恥來告言訖淚下李白集附錄婦容經巧笑之瑳佩玉之儺有女同車顔如舜華将翺将翔佩玉瓊琚彼美孟姜洵美且都靜女其姝靜女其孌出靜女並詩史婦容不必顔色美麗也盥浣塵穢服飾鮮潔沐浴以侍身不垢辱是謂婦容後漢列女傳王夫人神清散朗故有林下風氣顧家婦清心玉映自是閨房之秀晉書列女傳互見標致門集鉛華不御芳澤無加選洛神賦著粉則太白施朱則太赤選好色賦秀色掩今古荷花羞玉顔浣沙弄碧水自與清波閒李太白婉娩淑姿鏘翔令容家貧歳不易衣而天姿潔清修嚴常若簮珠璣衣紈縠寥然不易為塵垢雜並出栁文婦功經是刈是濩為絺為綌葛覃婦無公事休其蠶織大雅瞻仰執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆葅醢記内則史婦功不必工巧過人也専心紡績不好戲笑潔齊酒食以奉賔客是謂婦功後漢列女傳傳記呉王趙夫人能於指間織錦號機絶於方寸帛上綉五岳河海號針絶以神膠續髮為㡌仍一髮析為縷號絲絶晉王子嘉拾遺記順宗時南海貢奇女盧眉娘能於一尺絹上綉法華經字如粟米又作飛仙盖以絲一縷為盖五重中有十洲三島唐蘇鶚蘇氏演義集羙人細意熨貼平裁縫滅盡針線跡杜詩縫為絶國衣李白母道經文伯之喪敬姜據其􅇃而不哭曰昔吾有斯子也吾將以為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫記檀弓下子公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早夭吾惡其以好内聞也二三婦人之欲供先祀者請無瘠色無揮涕無拊膺無哀容無加服從禮而静是昭吾子也孔子聞之曰公父氏之婦智矣剖情析禮以明其子為令徳也家語子貢問史芮伯萬之母芮姜惡芮伯之多寵也故逐之出居於魏左桓三年公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母嘆曰魯其亡乎使僮子備官而未之聞耶居吾語女諸侯朝修天子之業命晝考其國職夕省其典刑夜儆百官使無滔淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠國語魯語趙括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善母問奢其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及括將行其母上書言於王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大夫及宗室所賞賜者盡以予軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者所賜金帛歸蔵於家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣趙奢傳陳嬰母謂嬰曰自我為汝家婦未嘗聞先古之有貴者今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也史記項籍傳張湯自殺昆弟諸子皆欲厚葬湯湯母曰為天子大臣被惡言而死何厚葬為載以牛車有棺而無椁上聞之曰非此母不生此子張湯傳雋不疑毎行縣録囚徒還其母輙問不疑有所平反活㡬何人即不疑多有所平反母喜笑為飲食或亡所出母怒為之不食西漢本傳趙母指括以全其宗前漢晁錯傳賛翟方進辭其後母至京師受經母憐其幼随之長安織屨以給西漢本傳項羽取王陵母置軍中陵使至則東向坐陵母以招陵母私送使者泣曰為妾語陵善事漢王毋以老妾故持二心妾以死送使者遂伏劍而死西漢王陵傳嚴延年為河南太守河南號曰屠伯其母從東海来到洛陽見報囚大驚止都亭不入府延年至謁母閉閤不見延年免冠頓首閤下良乆乃見之因數責延年幸得備郡守不聞仁愛敎化以全安愚民顧多刑殺人欲以立威我不意當老見壯子被刑戮行矣去汝東歸掃除墓地耳遂去嵗餘延年坐棄市東海賢其母前漢金日磾母敎誨二子甚有法度上聞而嘉之病死詔圗畫於甘泉宫西漢建寜二年大誅黨人滂聞即自詣獄白母母曰汝今得與李杜齊名死亦何恨東漢范滂傳郭丹後母為鬻衣装賣産業與從師長安後漢廢髙貴鄉公收王經經謝其母母顔色不變笑而應曰人誰不死正恐不得其所以此并命何恨之有通鑑魏文帝紀蘇峻舉兵卞壼死之二子眕盱見父殁相随赴賊同時遇害母裴氏撫二子尸哭曰父為忠臣女為孝子夫何恨乎晋書本傳韋逞年小母宋氏晝則採樵夜則敎逞遂得成名陶侃為潯陽縣吏嘗監魚梁以鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非惟不能益吾乃以増吾憂矣范逵曰非此母不生此子虞潭征蘇峻潭母孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為累也並出列女傳陶侃早孤貧范逵嘗過侃時倉卒無以待賔其母乃截髮得隻髻以易酒肴晉書何無忌夜於屏風裏草檄文其母劉牢之姊也登橙宻窺之泣曰汝能如此吾復何恨問所與同謀者曰劉裕母尤喜因為言𤣥必敗舉事必成之理以勸之通鑑晉安帝紀髙熲初為僕射其母誡之曰汝富貴已極但有一斫頭耳爾其謹之隋書張易之張昌宗居中用事栢彦範謀誅之彦範以事白其母曰忠孝不兩全先國後家可也唐中宗紀李景讓母鄭氏家貧諸子皆幼母自敎之宅墻因雨漬陷得錢盈船奴婢喜走告母母徃焚香祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則願諸孤他日學問有成乃其志也此不敢取遽命揜而築之三子皆進士及第景讓宦達髮已斑白小有過不免笞箠唐武宗紀宣武節度使劉𤣥佐有威畧其母雖貴日織絹一疋謂𤣥佐曰汝本寒微天子富貴汝至此必以死報之故𤣥佐始終不失臣節通鑑唐徳宗紀僕固懐㤙既不為朝廷所用遂與河東都將李竭誠潛謀太原大將白玉殺其子瑒懐㤙入告其母母曰吾語汝勿反國家待汝不薄今衆心既變禍必及我將如之何懐恩不對再拜而出母提刀逐之曰吾為國家殺此賊取其心以謝三軍懐恩疾走得免遂與麾下三百渡河北走通鑑唐代宗紀崔𤣥暐累補員外郎其母盧氏常戒之曰吾見姨兄屯田郎中辛𤣥馭云兒子從宦者有人来云貧乏不能存此是好消息若聞貲貨充足衣馬輕肥此惡消息吾嘗重此言以為確論比見親表中仕宦者将錢物上其父母父母但知喜悦竟不問此物從何而來必是俸禄餘貲誠亦善事如其非理所得此與盗何别縱無大咎獨不内媿於心陶母不受魚鮓之饋蓋為此也汝今坐食禄俸榮幸已多若其不能忠清何以戴天覆地孔子云雖日設三牲之養猶為不孝曰父母唯其疾之憂特宜脩身潔已勿累吾此意也唐書本傳王珪與房杜善過其家珪母闚喜曰二客公輔才汝貴不疑互見識見蕭俛母韋氏賢明治家嚴俛雖宰相侍左右如褐衣唐書傳記孟子既學而歸孟母問學所至孟子自若也孟母以刀斷其織曰子之廢學若吾斷織也楚子反破秦軍而歸母閉門不納使人數之曰越王勾踐伐呉客有獻醇酒一器王使人注上流使士卒飲下流味不加喙異日又有獻一囊糧者王又使以賜軍士分而食之甘不踰嗌今士卒分菽粒而食之子獨朝夕芻豢何也列女傳孟子妻獨居踞孟子入戸視之白母曰婦無禮請去母曰非婦無禮乃汝無禮也禮不云乎將上堂聲必揚將入戸視必下不掩人不備也今汝獨燕私之處入戸不有聲令人踞而視之是汝無禮非婦無禮也於是孟子自責不敢去婦田子為相三年歸休以金百鎰奉其母母曰不義之物不及於館為人臣不忠是為人子不孝子其去田子慙愧走出自歸於王還金請退就獄並出韓詩外傳孟母舍近墓孟子嬉戲為墓間之事孟母曰此非所以居子處也乃去舍市旁其子嬉戲為賈衒孟母又曰此非所以居子處也乃舎學宫之旁其子嬉戲乃設爼豆進退揖讓孟母曰此真可以居子也遂居之及孟子長學六藝卒成大儒列女傳互入鄉里孟仁少從李肅學其母為作厚褥大被曰小兒無徳致客學者多貧故為廣被庶可得與氣類接也除監池司馬捕魚作鮓寄母母責之曰汝為魚官而以鮓寄我非避嫌也呉録集當秦之末豪傑共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤卒富貴不祥嬰從其言而陳氏以寜班叔皮天命論惟習孟氏强為母師桞文本朝脩不幸生四嵗而孤太夫人守節自誓居貧自力以衣以食以長以敎俾至於成人太夫人告之曰汝父為吏亷而好施與喜賔客其俸禄雖薄常不使有餘曰毋以是為我累故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守耶吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也廬陵集瀧岡阡表書其子之賢而有立則見其母之義方歐公作李氏墓銘蓄徳在先以成家室發祥於後以遺子孫臨川集蘇公軾生十年太夫人親授以書嘗讀東漢史至范滂傳慨然太息公侍側曰某若為滂夫人亦許之乎太夫人曰汝能為滂吾固不能為滂母耶子由撰墓誌銘豈惟家室宜夀母實與朝廷生異人坡詩婦道經子不宜其妻父母曰是善事我子婦無私貨無私蓄無私器不敢私假不敢私與注家事統於尊也在舅姑之所不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟凡婦不命適私室不敢退記内則婦人不餙不敢見舅姑記内則互見舅姑婦事舅姑如事父母下氣怡聲問衣燠寒疾痛疴癢而敬抑搔之出入則或先或後而敬扶持之記内則互見舅姑婦將有事大小必請於舅姑記内則史婦聽而婉左昭六年鮑宣妻桓氏與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲脩行婦道鄉邦稱之子永為魯郡太守子昱問少君曰太夫人寜復識挽鹿車否對曰先姑有言存不忘亡安不忘危吾焉敢忘乎班昭作女誡曰頼母師之典訓年十有四執箕箒於曹氏于今四十餘載矣戰戰兢兢常懼黜辱以増父母之羞以益中外之累夙夜劬心勤不告勞班昭年七十餘卒上䟽遺令凡十六篇子婦丁氏又作大家讃焉並出列女傳姜詩事母至孝妻順奉尤篤母好飲江水妻常泝流而汲後值風不時得還母渇詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者乆之姑怪問鄰母鄰母具對姑感慚呼還東漢姜詩妻傳互見人心易感女人之徳嚴奉舅姑夙夜勤事婦之節也唐書𫝊記衛瓘子宣尚繁昌公主黄門讒構於是遂離主與姑書稱故新婦晉諸公賛古者子婦供事舅姑旦夕在側與男女無異北史顔氏家訓互見舅姑奉祭經克羞饋祀書酒誥采蘩夫人不失職也夫人可以奉祭祀則不失其職矣采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣詩注于以奠之宗室牖下誰其尸之有齊季女詩集滌濯静嘉禮義孔明張平子東京賦奉蒸嘗以効順供洒掃以彌載潘安仁寡婦賦春秋祠祭主貴罇奠薦清潔歆明魂韓詩識見經婦人能閔其君子猶勉之以正也詩汝墳序室家能閔其勤勞勸以義也殷其靁序穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣記檀弓史晉公子重耳過齊桓公妻之公子安之從者謀於桑下蠶妾以告姜氏姜氏殺之而告公子曰子有四方之志其聞之者吾殺之矣乃與子犯謀醉而遣之左僖二十三年齊侯遇杞梁之妻於郊弔之辭曰猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室襄二十三年互見弔慰晉伯宗毎朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難左成十五年晉公子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君使婢子侍巾櫛以固子也從子而歸棄君命也不敢從亦不敢言晉趙姬以盾為才固請於公以為嫡子而使其三子下之以叔隗為内子而已下之左僖二十四年僖負覊之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國必得志於諸侯左僖二十三年嫠不恤緯而憂宗周之隕左昭二十四年齊晉戰于鞌齊師敗績齊侯自徐闗入女子曰君免乎曰免矣鋭司徒免乎曰免矣曰茍君與吾父免矣可若何既而問之辟司徒之妻也與之石窌左傳互見封爵晏子為齊相岀其御之妻從門而窺其夫其夫為相御意氣揚揚甚自得也既歸其妻請去曰晏子身不滿七尺身相齊國名顯諸侯今子長八尺乃為人僕御子之意自以為足是以求去史記晏子傳襄王以大史氏為王后襄王卒子建立后事秦謹與諸侯信故四十餘年不受兵始皇嘗使使者遺后玉連環曰齊多知觧此環否后以示羣臣羣臣不知解后引椎椎破之謝秦使曰謹以觧矣公甫文伯官於魯病死婦為之自殺於房中者二八其母聞之不肯哭也相室曰焉有子死而不哭者乎母曰孔子賢人也逐於魯是人不随今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言一也言者異則人心變矣並出戰國策李夫人病篤武帝自臨候之夫人蒙被謝曰妾久病形貌毁壊不可以見帝夫人姊妹讓之曰獨不可一見上屬托兄弟耶夫人曰不見帝者乃欲深托兄弟也以色事人者色衰則愛弛上所戀戀念我以平生容貌也今見我毁壊顔色非昔必且畏惡我尚肯復録其兄弟哉西漢李夫人傳吕禄過其姑吕嬃嬃大怒曰若為將而棄軍吕氏今無處矣乃悉出珠玉寳器散堂下曰毋為他人守也通鑑漢髙后上始為㣲行嘗夜至柏谷投逆旅主人求漿主人曰無漿止有溺耳且疑上為姦盜聚少年欲攻之主人嫗睹上狀貌而異之止其翁曰客非常人也且有備不可圖也翁不聼嫗飲翁以酒醉而縛之少年皆散走嫗乃殺雞為食以謝客通鑑漢武紀秦王好淫聲葉陽后為之不聼鄭衛之樂楚莊王好田獵樊姬為之不食鳥獸肉西漢張敞傳楚莊王好獵夫人樊姬數諌不止不食禽獸之肉二年王感之而勤於王事齊桓公淫樂衞姬為之不聼鄭衛之聲並岀列女傳昔陳嬰之母以嬰家世貧賤卒富貴不祥令嬰勿王王陵之母知漢王必得天下伏劍而死固勉强陵嬰母知廢陵母知興通鑑光武紀宣王晏起姜后脱簮齊桓好樂衛姬不音王逸傳河南樂羊子尋師學一年歸妻跪問其故羊子曰乆行懐思無他意也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈疋今若斷斯織也則捐失前功稽廢時月夫子積學若中道而歸何異斷斯織乎列女傳楚昭王讌遊越姬從謂姬曰願與子生死若此姬曰君王樂遊要妾以死不敢聞命後王病太史請移於將相王曰將相於吾猶股肱也不聼姬曰大哉君王之徳妾請從王死矣昔日遊樂是以不敢聼命今王復禮國人為君王死何况妾乎遂自殺東漢鮑宣妻裝送甚盛宣謂妻曰少君生富驕習羙餙而吾貧賤不敢當禮乃悉歸侍御服餙更着短布之裳東觀漢記應超取趙昂子月為質昂謂妻異曰吾謀如是事必萬全當奈月何異厲聲應曰雪君父之大耻喪元不足為重况一子哉通鑑漢獻紀梁鴻妻装餙入門七日而鴻不答乃跪牀下請罪鴻曰吾欲衣褐之人可與俱隠深山者今乃衣綺縞傅粉墨豈鴻所願哉妻曰妾自有隠居之衣乃更為椎髻著布衣操作而前本傳若欲慕鮑宣梁鴻之妻者妾亦請從少君孟光之事矣東漢列女傳先是丹陽太守李衡數以事侵琅琊王其妻習氏諌之衡不聽及琅琊王即位李衡憂懼謂妻曰吾欲犇魏何如妻曰不可琅琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失明求受罪如此乃當逆見優饒非但值活而已衡從之呉主詔曰丹陽太守李衡以徃事之嫌自拘司獄其遣衡還郡通鑑魏元帝桓範妻曰君前欲斬徐州刺史鄒岐衆人謂君難為作下今復羞為吕屈復難為作上魏志曹爽傳初晉髙祖司馬懿辭仕以風痺不能起居曝書遇雨髙祖起收書家唯一婢見之張后懼言語泄漏乃手殺之而自執爨焉晉書桓𤣥妻劉氏有智鑒謂𤣥曰劉裕龍行虎歩視瞻不凡恐終不為人下不如早除之通鑑晉安帝紀山公與􅄞阮契若金蘭山公妻韓氏覺二人異於常窺之他日二人来妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳王右軍妻郄氏夫人謂二弟愔曇曰王家見二謝安萬傾筐倒屣見汝軰来平平耳世説别互入鑒符承祖方用事親姻争趨附以求利其從母楊氏為姚氏婦獨否嘗謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂姊與之衣服多不受齊太祖皇子詡母胡充華初選入掖庭同列以故事祝之曰願生諸王公主勿生太子充華曰妾之志異於諸人奈何畏一身之死而使國家無嗣乎及有娠同列勸去之充華不可私誓曰若幸而生男次第當長男生身死所不憾也梁髙祖竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄王公主掩其口曰汝勿妄言滅吾族毅由是竒之及長以適唐公李淵通鑑陳紀長孫皇后素好讀書常與上從容商畧古事因而獻替裨益𢎞多上或以非罪譴怒宫人后亦陽怒請自推鞠因命囚繫俟上怒息徐為申理由是宫壼之中刑無枉濫上得疾累年不愈后侍奉晝夜不離側常繫毒藥於衣𢃄曰若有不諱義不獨生后素有疾太子言於后曰醫藥備盡而疾不瘳請奏赦罪人及度人入道庶獲冥福后曰死生有命非智力所移若為善者有福則吾不為惡若其不然妄求何益及疾篤與上訣曰妾於陛下不豫之日誓以死從乗輿不能當吕后之地耳己卯崩於立政殿長孫后嘗采自古婦人得失事為女則三十卷魏徴薨命百官九品以上皆赴喪給羽葆皷吹陪葬昭陵其妻裴氏曰徴平生儉素今葬以一品羽儀非亡者之志悉辭不受布車載柩而葬蕭瑀子銳嗣尚上女襄城公主上欲為之營第公主固辭曰婦事舅姑當朝夕侍側若居别第所闕多矣唐書上營月華宫務令儉約惟所居殿覆以瓦餘皆茅茨充容長城徐恵妃以上東征髙麗西討龜兹翠微玉華營繕相繼又服玩頗華靡上䟽諫其畧曰以有盡之農功填無窮之巨浪圖未獲之他衆䘮已成之我軍昔秦王并吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄徳輕邦圗利忘危肆情縱欲之所致乎是知地廣非常安之之術人勞乃易亂之源也雖復茅茨示約猶甚木石之疲和顔取人不無煩擾之弊珍玩技巧乃喪國之斧斤珠玉錦綉實迷心之酖毒作法於儉猶恐其奢作法於奢何以制後唐太宗紀上林令侯敏素諂事来俊臣其妻董氏戒之曰俊臣國賊指日將敗君宜逺之敏從之俊臣怒岀為武龍令敏欲不徃妻曰速去勿留俊臣敗其黨皆流嶺南敏獨得免通鑑唐武后紀上疾宦官欲請郭太后臨朝稱制太后曰昔武后稱制幾傾社稷我家世守忠義非武后之比也自古豈有女子為天下主能致唐虞之理通鑑唐敬宗紀太宗嘗與后論及賞罸之事后曰牝雞之晨惟家之索妾婦人豈敢與聞政事太宗固與之言竟不荅續世説后長孫氏互見禮法朱温少孤與兄昱存随母王氏依蕭縣劉崇家崇數笞辱之母獨憐之戒家人曰朱三非常人汝曹善遇之通鑑唐僖宗紀周行逢妻勛國夫人鄧氏曰稅官物也公為節度使不先輸税何以率下且獨不記為里正代人輸税以免楚撻時乎蜀李太后以典兵非其人謂蜀主曰今王昭逺岀於厮養伊審㣲韓保真趙崇韜皆膏梁乳臭子素不習兵徒以舊恩寘於人上一旦疆塲有事安能禦大敵乎以吾觀之惟髙彦儔太原舊人終不負汝其餘無足任者通鑑周世宗紀王珪與房杜善過其家珪母闚喜曰二客公輔才汝貴不疑唐書王珪傳互見母道傳記老莱子隠於蒙山楚王親至其門其妻問荅曰楚王妻曰可食以酒肉者可加以鞭箠可受以官禄者可随以鈇鉞先生受人官禄為人所制妾不能為人所制者妻乃去髙士傳魯漆室邑之女過時未適人當穆公時君老太子幼女倚柱而嘯鄰婦曰何嘯之悲子欲嫁耶女曰吾豈為不嫁而悲哉吾憂魯君老而太子幼也列女傳樊嫕進言合徳羙貌帝召入宫合徳新沐膏九迴沉水香為卷髮號新興髻為薄眉號逺山黛施小朱號慵束粧左右嘖嘖稱賞宣帝時披香愽士淖方成白髮敎授宫中號淖夫人在帝後唾曰此禍水也滅火必矣趙后外傳陳子定字子仲楚王遣使持金百鎰聘以為相仲曰僕有箕箒之妻請入計之乃謂妻曰今日為相明日結駟連騎食方於前妻曰今日為相樂在中矣結駟萬騎所安不過容膝食方於前所甘不過一肉今以容膝之安一肉之味而懐楚國之憂亂世多害恐先生不保命也子仲夫妻逃去為人灌園皇甫謐髙士傳陶大夫之治陶三年名譽不興家富三倍妻怒曰子能薄而官大是謂蒙害無功而家昌是謂積殃昔楚令尹治國家貧而國富君敬之民戴之故福禄終於子孫名垂後世今子貪富務大不顧後害請去列女傳周玘字孟玉弟子殺人被罪玘詣府與弟子俱進於獄弟婦不哭其子但哭孟玉由此為髙風俗通齊閔王之后項有大瘤號曰宿瘤初閔王岀遊百姓盡觀宿瘤採桑如故王怪問對曰妾受父母敎採桑不受敎觀大王王命後乗載之女曰父母在内使妾不受敎而随王是奔女也王大慙使使者奉禮加金百鎰徃聘贈之父母驚欲洗浴加衣裳女曰如是見王變容更服不見識也於是如故随使者至閔王以為后列女傳互見堅貞樊姬感莊不食鮮禽衛女矯桓耳忌和音志厲義髙而主易心𤣥熊攀檻馮媛趨進夫豈無畏知死不吝班女有辭割歡同輦夫豈無懐防㣲慮逺張華女史箴集范𫝊正亷問宣池訪李白子孫獲孫女二人一為陳雲之室一乃劉勸之妻皆編戸甿也因召至郡告二女皆改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下里仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞李太白集夫以匹婦之明猶能推事理之致探禍福之機嬰母知廢陵母知興王命論才畧史聶政姊榮曰妾奈何畏殁身之誅終滅賢弟之名乃大驚韓市人大呼天者三而死政之旁晉楚齊衛聞之皆曰其姊烈女也史聶政傳榮一作嫈伍子胥奔呉至溧陽女子擊漂水上子胥過而乞餐女子飯壺漿而食之子胥去女子自投瀬水呉越春秋元帝幸虎圏後宫皆坐熊佚岀圏扳檻左右皆驚走馮媫妤直前當熊而立上問何故前對曰妾聞猛獸得人而止妾恐熊至御前故以身當之漢書丹陽大都督媯覽殺太守孫翊欲逼取翊妻徐氏紿曰乞須晦日設祭除服然後聼命覽許之徐氏潜使所親語翊親近舊將孫髙傅嬰等與共圖覽到晦日設祭徐氏哭泣盡哀畢乃除服薫香沐浴言笑懽悦大小悽愴怪其如此覽宻覘無復疑意徐氏呼髙嬰置戸内使人召覽入徐氏岀戸拜覽適得一拜徐大呼二君可起髙嬰俱岀共殺覽通鑑漢獻紀孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入中心常凛凛蜀志趙娥父為李夀所殺娥乃帷車袖劍白日刺夀於都亭圮詣縣顔色不變曰父讐已殺請受戮縣尹縱之娥不肯遂强載還家㑹赦得免魏志劉氏有膽畧石勒與之參决軍事佐勒建功業有吕后之風而不妬忌更過之孫恩陷㑹稽王凝之岀走恩執而殺之并其諸子凝之妻謝道韞奕之女也聞寇至舉措自若命婢肩輿抽刀立門手殺數人乃被執通鑑晉武紀朱序鎮襄陽苻堅遣將圍序母韓氏自登城行謂西北角當先受弊遂領百餘婢并城中女子於其角斜築城二十餘丈賊攻西北角果潰衆便守新築城賊遂引退人謂此城為夫人城晉成紀周浚嘗岀獵遇雨止李氏家㑹其兄弟不在李氏聞浚至與一婢於内宰猪羊具數十人之饌甚精辦而不聞人聲浚因求為妾生子顗晉書列女傳前凉張天錫疾羙人閻姫薛姫皆自殺天錫誨之曰我死之後更為人妻皆曰尊若不諱請效死於前洒掃於地下無它志十六國春秋陳髙凉太守馮寳妻洗氏懐集部落數州晏然至隋王仲宣反嶺南髙梁洗夫人救廣州獲全冊洗氏為譙國夫人開幕府於嶺南置官屬便宜行事通鑑梁紀互入封爵崔寜與楊子琳戰數不利崔寜妾任氏岀家財數十萬募兵得數千人帥以擊子琳破之子琳走通鑑唐代宗嘿啜攻飛􅈢縣古元應妻能固守詔封循忠縣君史思明之叛衛州女子侯滑州女子唐青州女子王相與㰱血赴行營討賊皆補果毅並出新唐書平陽公主嫁柴紹初髙祖兵興主與紹發家貲招亡命渡河主引精兵萬人與秦王㑹渭北紹及主對置幕府分定京師號娘子軍唐書魏衡妻王氏武徳初為薛仁杲舊將房企地所逼而妻之企地侵梁郡飲酒醉王氏取其佩刀斬之擕其首入城賊散髙祖封為崇義夫人鄒保英妻奚氏萬嵗年契丹賊李盡㓕来寇平縣保英時任刺史領兵討擊既而城孤援寡將陷奚氏乃率家僮及城内女丁相助固守賊退封為誠節夫人舊唐書并列女傳互見封爵建中末李希烈謀襲陳州李侃為項城令以城小欲逃歸楊氏曰縣不守則地賊地也倉廪府庫皆其積也百姓皆其戰士也請募死士賊遂去縣卒完詔遷侃太平令唐書互見助夫竇毅女聞隋髙祖受禪自投牀下曰恨我非男子不能救舅家禍唐書竇后傳朱全忠夫人張氏碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵到中途夫人以為不可遣一介召之全忠立為之返通鑑唐昭宗傳記元載敗妻王氏曰某道節度使女十八年宰相妻今日相公犯罪死即甘心使妾為舂婢不如死也主司上聞俄亦賜死劉禹錫嘉話文學史班彪女名昭一名姬博學髙才兄固著漢書其八表及天文志未及竟而卒和帝詔就東觀蔵書閣踵而成之又作女誡七篇有助女訓所著賦頌銘誄問注哀辭書論上䟽遺令凡十六篇又作大家讃蔡邕女名琰字文姬博學有才辯又妙於音律曹操問曰聞夫人家多文籍猶能憶識之否姬曰昔亡父賜書四千餘卷流離塗炭罔有存者今所誦憶纔四百餘篇耳乞給紙筆真草惟命於是繕書送之文無遺悞後感傷亂離追懐悲憤作詩一章並岀東漢列女傳秦州刺史竇滔妻彭城令蘇道女有才學織錦製迴文詩以贖夫罪循環讀之詞甚清婉太常韋逞母宋氏傳其父業得周官音義苻堅乃就宋氏家立講堂生員百二十人隔絳紗幔而受業號宋氏為宣文君謝道韞聰識有才辯叔父安嘗内集俄而雪下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若桞絮因風起並出晉書列女傳甄后年九嵗喜書用諸兄筆硯兄謂后曰汝當作女博士耶荅曰古者賢女未有不覽前世成敗以為已戒不知書何由見之魏書徐悱妻文尤清㧞所謂劉三娘也劉孝綽妹南史孝綽傳傳記蔡琰夫亡無子歸寜漢末為騎兵所獲在左賢部中春月登臺殿感笳音作詩曰胡笳動兮邉馬鳴蔡琰别傳桞下恵妻誄其夫門人不能竄一字列女傳相如將聘茂陵女為妾文君作白頭吟以自絕相如乃止長卿消渇卒文君誄傳世西京雜記班媫妤能文漢成帝所寵帝後幸趙飛燕媫妤自知見棄求供養王太后於長信宫因為賦及紈扇詩樂府楊盈川姪女曰容華為新粧詩曰宿鳥驚眠罷房櫳乗曉開鳯釵金作縷鸞鏡玉為䑓粧似臨川出人疑月下来自憐終不見欲去復徘徊朝野僉載杜羔妻劉氏善為詩羔累舉不第將至家妻先寄詩曰良人的的有奇才何事年年被放回如今妾面羞君面君若来時傍夜来羔見詩即回去尋登第妻又寄詩云長安此去無多地欝欝葱葱佳氣浮良人得意正年少今夜醉眠何處樓南部新書漢王昭君嫁單于心思不樂乃作怨曠思歌曰我獨伊何改徃變常髙山峩峩河水泱泱父母妻子道路悠長琴操集善筆札讀書通古今桞文崔氏銘本朝漢崔篆母師氏通六經百家之言事物紀原標致史謝道韞風韻髙邁叙致清雅晉書王夫人神清散朗故有林下風氣顧家婦清心玉映自是閨房之秀晉書列女傳集東家之子増一分則太長减一分則太短選宋玉好色賦骨象應圖選洛神賦暇則鳴絃桐諷詩騷以為娯以文雅清秀重於當世桞崔簡女銘本朝謝家夫人澹丰容蕭然自有林下風坡詩褥臥經誕彌厥月不坼不副無菑無害詩生民載生載育居然生子同上妻將生子及月辰居側室記内則史莊公寤生驚姜氏左傳梁嬴孕過期卜之曰將生一男一女左僖十七就館西漢班媫妤傳蘇林曰外舍産子也婦人免乳大故十死一生西漢宣后傳免身同上薄命史奈何妾薄命端遇竟寜前漢書外戚傳集貧女臨水粧徘徊波不定豈敢怨東風自恨䑓無鏡古詩巧婦多薄命白樂天絲蘿無託誰知薄命之由天唐呉融瀟湘逄故人賦本朝芳菲羙艷不禁風未到春殘已墜紅詩話總龜互入悼亡顔色如花命如葉臨川紅顔勝人多薄命後山夫婦之好義同賔友勤瘁相成於艱難之中而死生契濶於安樂之後東坡作司馬光妻贈夫人制互見悼亡家世經齊侯之子衛侯之妻東宫之妹邢侯之姨譚公惟私注云姊妹之夫曰私詩碩人汾王之甥蹶父之子詩韓奕平王之孫齊侯之子注平正也武王女文王孫適齊侯之子詩何彼穠矣史苖夫人其父太師晉卿其舅張河東嘉貞其夫延賞其子𢎞靖其壻韋臯近代婦人之貴無如此李肇國史補集長信宫受冊命之嵗與母於内朝序位環珮之聲相聞權載之集夫尊於朝婦貴於室元稹集封爵經婦人無爵從夫之爵記郊特牲史齊侯戰敗還女子曰君免乎曰免矣鋭司徒免乎曰免矣齊侯以為有禮問之辟司徒之妻也與之石窌左傳漢封蕭何妻為鄼國夫人西漢魏衡妻王氏武徳初為薛仁杲舊將房企地所逼而妻之企地侵梁郡飲酒醉王氏取其佩刀斬之擕其首入城賊散髙祖封為崇義夫人唐書鄒保英妻奚氏萬嵗年契丹賊李盡滅来寇平縣保英時任刺史領兵討擊既而城孤援寡將陷奚氏乃率家僮及城内女丁相助固守賊徒退封為誠節夫人舊唐書列女傳互入才畧史思明之叛衛州女子侯滑州女子唐青州女子王相與㰱血赴行營討賊皆補果毅新唐書互入才畧嘿啜攻飛􅈢縣古元應妻能固守詔封循忠縣君同上本朝漢崔篆母師氏通經學百家之言王莽寵以殊禮賜號義成夫人事物紀原晉虞昌母拜武昌侯太夫人同上宜䟽湯沐之封以稱山河之象東坡集改賜湯沐寵以訓詞庶幾采蘩之遺芳不與宿草而共盡改封大國正位小君同上湯沐從夫寵樂城集父母家經歸寜父母詩葛覃后妃在父母家則志在於女功之事詩序史婦人内夫家而外父母家西漢劉向論王氏䟽擇夫子婦人莫不願得以為夫處女莫不願得以為士士未取妻之稱荀子非相史鄭徐吾犯之妹羙公孫楚聘之矣公孫黒又使强委禽焉子産請使女擇焉子晳盛餙入布幣而出子南戎服入左右射超乗而出女自房觀之曰子晳信羙矣抑子南夫也適子南氏左傳昔賈大夫惡娶妻羙三年不言不笑御以如臯射雉獲之其妻始笑而言左昭二十八互見心随事移孟氏有女狀肥醜擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女曰竊聞夫子髙義簡斥數婦妾亦偃蹇數夫矣東漢梁鴻傳河東刺史徐邈有女才淑擇夫未嫁邈乃大㑹佐吏令女於内觀之女指濬告母邈妻之晉書王濬傳集佳人慕髙義得賢良獨難選美女篇敬夫經不敢懸於夫之楎椸不敢蔵於夫之箧笥記内則子必敬必戒無違夫子孟子請問為人妻曰夫有禮則柔從聴侍夫無禮則恐懼而自悚也荀君道史冀缺耨其妻饁之敬相待如賔左傳梁鴻毎歸妻為具食不敢於鴻前仰視舉案齊眉本傳集承慶雲之光覆兮荷君子之恵渥顧葛藟之蔓延兮託㣲莖之樛木懼身輕而施重兮若履氷而臨谷潘安仁寡婦賦助夫史呉許升妻者吕氏之女升少為博徒不理操行妻嘗數勸升修學毎有不善輙流涕進規升感激自厲乃尋師逺學遂以成名東漢列女傳建中末李希烈謀襲陳州李侃為項城令以城小欲逃歸楊氏曰縣不守則地賊地也倉廪府庫皆其積也百姓皆其戰士也請募死士賊遂去縣卒完詔遷侃太平令唐書互見才畧傳記晉平公使工為弓三年乃成射不穿一札公怒將殺此工其妻見公曰妾之夫造此弓亦已勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以言為儀而穿十札工得賜金三鎰列女傳本朝使吾不以貧賤富貴累其心者吾妻之助也吾嘗與士大夫語謝氏多從戸屏竊聴之聞則能盡商𣙜其人才能賢否及時事之得失皆有條理吾在呉興自外歸必問曰今日孰與飲而樂乎聞其賢者也則悦否則嘆曰君所交皆一時賢俊今與是人飲而歡耶歐公為梅聖俞謝氏撰墓銘慢夫史昔賈大夫惡娶妻羙三年不言不笑御以如臯射雉獲之其妻始笑而言左昭二十八年互見心随事移又擇夫蘇秦説秦王不行歸至家妻不下絍戰國策朱買臣妻謂買臣曰如公等終餓死溝壑矣何能富貴前漢本傳外黄富人女甚羙庸奴其夫西漢張良傳史記曰嫁庸奴亡其夫王凝之妻謝氏道韞奕之女也初適凝之還甚不樂奕之曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿大中郎羣從兄弟則封胡羯末不意天壤之中乃有王郎晉書䘮夫經予羙亡此誰與獨處予美亡此誰與獨息誰與獨旦詩葛生穆伯之喪敬姜晝哭記寡婦不夜哭記坊記一與之齊終身不改故夫死不嫁記郊特牲子子曰昔東夷之子慕諸夏之禮有女而寡為内私壻終身不嫁嫁則不嫁矣亦非清節之義也家語六本篇華周杞梁之妻善哭其夫而變國俗孟子孀寡婦淮南子史於未亡人之側左莊二十八年注婦人既寡自稱未亡也愚公謀平太行之險京城之孀婦有男徃助之列子湯問杞梁死其妻哭之城為之崩公羊禮婦人喪夫自稱未亡人後魏書傳記桞下恵死妻誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之諡宜為恵兮列女傳堅貞經無思犯禮詩漢廣序以禮自防詩草蟲序能循法度詩采蘋序雖速我訟亦不女從出行露有女如玉野有死麕注堅貞㓗白無感我帨兮女也不爽岀氓並詩夫不在斂枕箧簟席襡器而藏之内則史宋火災宋伯姫卒待母也女師左襄傳榖梁傳載伯姬曰婦人之義傅母不在不下堂遂逮於火而死王蠋曰烈女不更二夫通鑑周赧王髙氏有羙女謝鯤嘗挑之女投梭折其兩齒晉書杜􅀈至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不為賊作婦遂自殺焉鄧粲晉記王凝為虢州司戸卒於官凝家貧一子尚幼妻李氏擕其子歸過開封府旅舍主人見其婦人獨擕一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執耶不可以一手并汚吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事於朝官賜藥封瘡厚䘏李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉五代史雜傳傳記貞女不假人以色劉向列女傳蔡人之妻宋女也夫有惡疾其母將改嫁之女曰夫之不幸奈何去之適人之道一與之醮終身不改且夫芣苢之草雖甚惡猶始捋采終懐􅀈之浸以益親况於夫婦同上淑女與哲人烈士争不朽名寒如嚴霜唐列女傳楚昭王夫人齊女也昭王出遊留夫人漸䑓江水大至遣使者迎夫人忘持符夫人曰王與宮人約詔必以符今使者不持符妾不敢行於是使者返取符未還䑓已壊沉水而死陳仲妻張叔明之妹名芝與二嫂被賊恐見侵畧而相謂曰婦人以不汚身為髙不虧節為羙豈可委身待辱哉於是自刺唐列女傳集貞女要名於没世演連珠女有不易之行江文通書玉不厭㓗蘭不厭香晉裴頠女史箴班女不以色事君鮑溶集處貧素而不昧陳子昂羙人出南國灼灼芙蓉枝皓齒終不發芳心空自持李太白詩志在列女籍竹帛已光榮趙女不冶容同上願為連根之秋草不作飛空之落花李太白集寄情人楚辭體玉心皎㓗終不疑同上貞婦貴狥夫孟東野艶女皆妬花静女獨檢蹤任禮耻任装嫁徳不嫁容君子未求聘小人難相從此志誰與説琴絃幽韻重孟郊静女詞夫行竟不歸婦徳轉光明不比山頭石空有望夫名白侍郎共保秋竹心風霜侵不得妾身有存殁妾心無改易同上三秋庭緑盡迎霜唯有荷花守紅死牡牧之波瀾逝不起妾心井中水孟郊本朝娟然如静女不肯旁阡陌歐公集蠱惑經冶容誨淫易繫辭婦有長舌惟厲之階亂匪降自天生自婦人詩瞻仰哲婦傾城同上艷妻煽方處羙色曰艶煽熾也詩十月之交子素顔紅膚惑其目清商流徴亂其聴抱朴子史楚莊欲納夏姬申公巫臣曰是不祥人也是天子蠻殺御叔弑靈侯戮夏南出孔儀喪陳國何不祥如是天下多羙婦人何必是左成二年羙女破舌戰國策桑間濮上鄭衛宋趙之聲内則致疾損夀外則亂政傷民巧偽因而餙之以營亂富貴之耳目前漢禮樂志女子彈弦跕躧游媚富貴前漢地理志北方有佳人絶世而獨立一顧傾人城再顧傾人國西漢李夫人傳梁冀妻孫夀色羙而善為妖態作愁眉嗁粧堕馬髻折腰歩齲齒笑以為媚惑東漢梁冀傳互見粧餙第裯既交則情與愛遷顔辭媚熟則事以私奪唐書后妃列傳資質豐艶倩盼承迎動移上意唐書楊妃傳集擕佳人兮披重幄援綺衾兮坐芳縟燎薫爐兮炳明燭酌桂酒兮揚清曲曲既揚兮酒既陳朱顔􅋳兮思自親願低帷以昵枕念觧佩而禠襟怨年嵗之易暮傷後㑹之無因謝恵連雪賦互入房闈嫣然一笑惑陽城迷下蔡宋玉好色賦願薦枕席宋玉髙唐賦目畧㣲盼精色授宋玉神女賦㣲辭相感動精神相依憑宋玉好色賦色授魂予選注云彼色来授魂徃與接目窕心與枚乗七發回頭一笑百媚生六宫粉黛無顔色長恨歌娥眉􅝇睇使情移劉孝感詩妖紅慘黛生愁色劉言史詩無良媒以接歡兮托㣲波而通辭選洛神賦冶其容敏其詞婉孌萬態以中上意陳馬長恨歌傳美人一笑千黄金千盃緑酒何辭醉一面紅粧惱殺人李白贈段七娘忽然一笑千萬態見者十人八九迷假色迷人猶若是真色迷人應過此女為狐媚害積深日久月長溺人心白侍郎芳情香思知多少惱殺山僧悔出家同上媚語嬌不聞纎腰軟無力歌詞妙宛轉舞態能剜刻笋絃玉指調粉汗紅綃拭元稹集身作􅋌牀臂為枕歸来如夢復如癡同上髙髻雲鬟宮様粧秋風一曲杜韋娘司空見慣渾無事惱斷蘇州刺史腸韋應物夏姬滅兩國逃作巫臣妻西子下姑蘇一舸逐鴟夷杜牧之嬌女不顧身李義山文眼波向我無端艷心火因君特地燃盧仝文美人醉起無次第堕釵遺佩滿中庭王維集却嫌脂粉汙顔色淡掃蛾眉朝至尊杜詩妬寵而負恃争妍而取憐韓文本朝坐来生百媚臨川集換得千金為一笑同上倡蕩經見金夫不有躬易䝉卦注云女先求男也女之為體正行以待命者也見剛夫而求之故曰不有躬也女之耽兮不可説也詩氓不績其麻市也婆娑詩東門之枌女曰觀乎洧之外洵訏且樂詩溱洧史秦王年少太后時竊私通吕不韋不韋乃私求嫪毐以為舍人時縱倡樂太后果欲私得與通絶愛之有身生二子史吕不韋傳外黄富人女甚羙嫁庸奴其夫亡去抵父客史張耳傳卓王孫有女文君新寡好音相如以琴挑之文君從戸窺之心悦而好之夜亡奔相如馳歸成都西漢相如傳賈充辟韓夀為掾充女於青瑣中見夀悦之令婢徃夀家説其光采艶逸夀聞動心夕踰垣而入帷充覺女恱暢異於常日充女盜帝所賜西域香與夀晉書宋山隂公主文帝女適駙馬都尉何戢淫恣嘗謂帝曰妾與陛下男女雖殊俱托體先帝陛下六宫數百而妾惟駙馬一人太不均帝乃為公主置首面左右三十人吏部郎褚淵貌羙公主請以自侍帝許之淵侍十日備見親幸通鑑宋紀唐明皇幸温泉楊妃諸姊妹皆貴從幸為五家隊遺鈿堕珥藉藉道旁唐書集河間淫婦人也雖戚里為邪行者聞河間之名則掩鼻蹙額皆不欲道也桞文河間傳籠鳥無常處風花不戀枝白傅集極意心期卒未休暗中終擬約秦樓光隂負我難相偶情緒牽人不自由遥夜定嫌香蔽膝悶時應弄玉搔頭櫻桃花謝梨花發腸斷青春兩處愁韓渥詩守節經栢舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許作是詩以絶之之死矢靡它詩並序夫者妻之天也婦人不二斬者猶曰不二天也儀禮史楚令尹子元欲蠱文夫人為館於其宮側而振萬焉夫人泣曰先君以是舞也習戎備也今令尹不尋諸仇讐而於未亡人之側不亦異乎注蠱惑以淫事出左莊二十八寡婦清其先得丹穴而擅其利清能守其業用財自衛秦始皇以為貞婦而客之築女懐清䑓史記曹爽從弟文叔妻夏侯令女早寡而無子其父文寜欲嫁之令女刀截兩耳以自誓居常依爽爽誅其家上書絶婚强迎以歸復將嫁之令女竊入寢室引刀自斷其鼻其家驚惋謂之曰人生如輕塵棲弱草耳何至自苦乃爾且夫家夷滅已盡守此欲誰為哉令女曰吾聞仁者不以盛衰改節義者不以存亡易心曺氏前盛之時尚欲保終况今衰亡何忍棄之此禽獸之行吾能為乎司馬懿聞而賢之聽使乞子自養為曹氏後通鑑三國凉楊氏曰大人賣女於氐以圗富貴一之謂甚其可再乎通鑑晉紀郗嘉賔死婦弟欲迎其姊終不肯歸曰生縱不得與郗生同室死寜不同穴也世説傳記魯人秋胡娶妻三日而遊宦三年休還其婦採桑於郊胡至不識而悦之乃遺金一鎰妻曰妾夫遊宦未返於兹三年未有被辱如今日也不顧胡慙而退西京雜記東漢秦嘉妻毁形不嫁哀慟傷生史通魯陶嬰寡魯人將求焉嬰聞之恐不得免乃作歌明已之不二也其詩曰悲黄鵠之蚤寡兮十年不雙宛頭戢翼兮不與衆同時則飛鳴兮獨行惸惸天命令然兮愧獨永傷感鳥愠已兮淚下成行嗚呼悲兮死者不忘飛鳥尚然兮何况貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得也遂不敢復求之劉向新列女傳梁寡婦髙行者早寡不嫁梁貴人争欲取之梁王聞之使聘焉髙行曰妾之夫不幸先犬馬填溝壑妾宜以身薦其棺椁守養孤幼不得専意妾聞婦人之義一徃不改以全貞信之節今忘死而趨生是不信也乃援劒操刃以割其鼻曰妾已刑矣所以不死者不忍幼嗣之衆孤也同上集蹈共姜兮明誓詠栢舟兮清歌潘安仁寡婦賦峻節貫秋霜顔延年秋胡詩兎絲及水萍所寄終不移江文通古别離青松摧折哀斷女蘿之心丹桂孤髙終守栢舟之誓陳子昂集一女事一夫安可再移天孟東野青鏡掩孤鸞權載之集顧影無依倚甘心守静専元微之集義重移天白氏六帖本朝忍着生人衣為人作春妍後山詩失節史文君失身於長卿史記相如傳卓王孫有女文君新寡好音相如以琴挑之文君從戸窺之心悦而好之夜亡奔相如馳歸城都西漢相如傳蔡邕女琰字文姬適河東衛仲道夫亡無子天下喪亂文姬為騎兵所獲在左賢郡十二年生二子曹操以金璧贖之重嫁於董杞後漢列女傳漢劉曜立羊氏為后曜問曰吾何如司馬家兒羊氏曰彼有一婦一子及身三耳曽不得庇妾於爾時實不欲生意謂世間男子皆然自奉巾櫛以来始知天下自有丈夫耳通鑑晉紀傳記董杞妻蔡氏久居異域屈志含羞文詞有餘節槩不足劉知幾史通寛容經言若螽斯不妬忌則子孫衆多也詩螽斯序夫人無妬忌之行恵及賤妾進御於君詩小星序衛莊公惑於嬖妾使驕上僣莊姜賢而不荅詩碩人序史晉趙姬以叔隗為内子而已下之左僖二十四年梁商女為貴人常特被引御從容辭於帝曰夫陽以博施為徳隂以不専為義螽斯則福之所由興也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累東漢梁皇后傳傳記宋鮑蘇之妻不妬宋公表其閭曰女宗列女傳集恩其它姬子雜已子造次莫能辨無忮忌之行無犯迕之氣桞崔銘本朝聞子有賢婦華堂詠螽斯曷不倒嚢槖賣劒買蛾眉東坡妬忌經有嫡不以其媵備數詩小序以色曰妬以行曰忌詩小星注史叔向曰吾母多而庶鮮注言其父多妾媵而庶子鮮少嫌母氏性不曠好女入室惡女如讐史記婦人之所以事夫者色也而妬者其情也戰國策楚王愛新人夫人鄭褏謂新人曰王惡子鼻見王必掩又謂王曰惡王之臭也王令劓之同上馮衍妻任氏悍忌不得蓄媵妾兒女常自操井臼東漢司𨽻馮方女避亂揚州袁術見而悦之遂納焉甚愛幸諸婦害其寵語之曰將軍貴人有志節當時涕泣憂愁必長見於欽重馮氏從之後諸婦因共絞殺繫之厠術誠以為不得志而死龎寵妻棄前子於井中後漢互見殘忍賈充妻郭隗疑充眡乳母笞殺之其子思乳母不食他乳遂死及生小子亦然充遂絶嗣晉書荀朂曰貴妃年少妬者婦人常情長自當差通鑑晉恵紀王導為丞相妻曹氏性妬導甚憚之乃宻營别館以處衆妾曹氏知而將徃焉導恐妾被辱遽命駕晉書干寳父有所寵侍婢母甚妬忌及父亡母生埋婢於墓中寳兄弟年少不之審也晉書傳記房儒復妻崔氏性忌左右婢不得濃粧髙髻酉陽雜爼蜀先主以玉人置甘后側玩之后亦妬玉人拾遺記謝太傅劉夫人不令太傅有别房寵公既深好聲色頗欲立妓妾兄子及外甥㣲達其㫖乃共諌劉夫人稱闗雎螽斯有不妬忌之徳夫人知諷已乃問誰撰此詩荅曰周公夫人曰周公是男子乃相為耳若使周姥撰詩當無此句妬記張䟦欲娶妾其妻曰子試誦白頭吟當聴之䟦慙而止合檢集衆女嫉蛾眉楚辭入門見嫉蛾眉不肯讓人掩袂攻讒狐媚偏能惑主駱賔王集有西施之美容兮讒妬入以自伐楚辭君王雖愛蛾眉好無柰宫中妬殺人李白争知司馬夫人妬花到庭前便不開白侍郎屏風周昉畫纎腰嵗久丹青色半銷斜倚玉窓鸞髮女拂塵猶自妬嬌嬈杜牧之毁拆維鵲巢不行鳲鳩仁盧仝集本朝延平呉氏姊妹六人皆妬悍時號六虎其中五虎尤甚平生手殺婢十餘人凡三適人皆不終夜分常聞堂廡間喧呼聲同室皆懼五虎怒曰狂鬼敢爾邪闢戸移榻中庭持刀獨寢徹旦寂然人謂五虎之威鬼猶畏之陳正閔撰遯齋閒覽順從經婦無所専於家事詩斯干注婦將有事大小必請於舅姑記内則婦順備而后内和理内和理而后家可長久也出昬義婦順者順於舅姑和於室人而後當於夫出昬義室人謂女姒女叔諸婦也男帥女女從男婦人從人者也幼從父兄嫁從夫夫死從子記郊特牲姆教婉娩聽從記内則子女順男子之教無専制之義而有三從之道家語無違夫子以順為正者妾婦之道也孟子夫有禮則柔從聽侍荀子君道篇史婦人從人者也不専行必有從也榖梁傳𫝊記婦人以順從為務故婦事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之義列女傳集婦順夫指韓文專擅經牝雞無晨牝雞之晨惟家之索書牧誓彼童而角詩抑注童羊之無角者也而角自用也童羊譬王后也而角者喻與政事有所害也懿厥哲婦為梟為鴟詩瞻仰互見婦有長舌惟厲之階詩瞻仰子子曰婦人預事而漢道危乎文中子述史篇注吕氏梁后史既云哲婦亦惟家之索矣後漢安帝賛蜺堕雞化皆婦人干政之所致東漢蔡邕傳牝雞司晨家之窮也唐書傳記以妻制夫陽屈於隂風俗通集隂幽坤從維徳之常出為辨强乃匪婦能韓文治家經唯酒食是議詩斯干注婦人之事唯議酒食婦無公事休其蠶織詩史哲婦人隆家之道東漢列女傳王凝之妻謝道韞居家不言而治晉書𫝊記崔樞夫人治家整肅容儀端麗不許羣婢作時世粧因話録本朝閨門寂然不聞人聲續世説艷麗經手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮詩碩人彼姝者子詩東方之日揚且之晳也詩君子偕老揚眉上晳白晳顔如舜華詩有女同車有美一人清揚婉兮詩野有蔓草清揚眉目之間鬒髮如雲不屑髢也邦之媛也詩君子偕老子柔心而弱骨列子湯問肌膚若氷雪綽約若處子莊子逍遥逰蔡之幼女衛之稚質淮南子修務訓史宋華父督見孔父之妻於路曰美而艷左成元年驪姫者國色也公羊傳五何休注云其色一國之選嫵媚纎弱便姍嫳屑行歩安詳皓齒燦爛宜笑的皪長眉連姢㣲睇綿藐西漢司馬相如傳趙飛燕體輕能掌上舞絶殊離俗妖冶閒都靚粧刻餙同上迴眸百鎰一笑千金東漢崔駰傳傳記文君眉色不加黛如望逺山臉際常若芙蓉肌膚如脂西京雜記虢國夫人不施粧粉自有美艷常素面朝天子楊妃外傳集朱唇皓齒豐肉微骨嫮目宜笑蛾眉曼只容則秀雅穉朱顔只滂心綽態小腰秀頸粉白黛黒施芳澤只靨輔奇牙宜笑嘕只體便姢只既含睇兮又宜笑只姱容脩態並出楚辭顧盼遺光采長笑氣若蘭曹植美女詩毛嬙鄣袂不足程式西施掩面比之無色選神女賦衛后興於鬒髮飛燕寵於輕體㣲眺流睇蛾眉連卷脩袖繚繞羅襪躡蹀並出張平子西京賦衛髮光鑒趙體輕麗潘安仁西征賦東都妙姬南國麗人蕙心紈質玉貌絳唇鮑照賦綽約閒靡陸士衡論文穠不短纎不長貌豐盈以莊姝苞温潤之玉顔眉聫姢似蛾揚朱唇的其若丹動霧縠以徐歩兮拂墀聲之珊珊望余帷而延視若流波之將瀾陳嘉辭而云對兮吐芬芳其若蘭並出宋玉神女賦體貌閒麗體美容冶不待餙粧含喜㣲笑竊視流眄臣東家之子増之一分則太長減之一分則太短着粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝嫣然一笑惑陽城迷下蔡並宋玉好色賦髣髴兮若輕雲之蔽月飄颻兮若流風之迴雪逺而望之皎若太陽升朝霞迫而察之灼若芙蕖出緑波穠纎適中脩短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華弗御雲髻峩峩脩眉聫娟丹唇外朗皓齒内鮮明眸善睐靨輔承權瓌姿艶逸儀静體閒柔情綽態媚於語言奇服曠世骨象應圖竦輕軀以鶴立若将飛而未翔凌波㣲步羅襪生塵轉盼流精光潤玉顔含辭未吐氣若幽蘭華容婀娜令我忘餐曹子建洛神賦明豔侔朝日傾城誰不顧並出顔延年秋胡詩流盼發姿媚言笑吐芬芳出阮嗣宗詠懐詩雅歩擢纎腰巧笑發皓齒陸士衡贈婦攘袖見素手皓腕約金環容華耀朝日誰不希令顔美女篇娥娥紅粉粧纎纎出素手選古詩弄姿帷房之裏從容顧盼綽有餘裕趙景真書展如之華實邦之媛宋貴妃誄姿色端麗後漢𤣥丘絪緼瑶臺降芳髙唐渫雨巫山欝雲誕發蘭儀望月方娥瞻星比婺並謝莊宣貴妃誄南國有佳人容華若桃李子建詩詳而觀之奪人目睛須臾之間美貌横生冶乎如花温乎如瑩目流睇而横波並出選神女賦氷華玉儀仙藻靈艶江淹賦都冶嫵媚蔡邕賦嬛綿好眉目鮑昭詩迴裙轉佩百媚生玉臺後詠楚歌呉女嬌不成似能未能最有情謝公正要東山妓攜手林泉處處行青黛畫眉紅錦靴道字不正嬌唱歌對酒雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑶臺月下逢眉目艶星月乃知漢地多姝麗世間無花可比方美人欲醉朱顔酡若無雲間月誰可比光輝並出李白集眉目艶青蛾劉义動衣香滿路移歩襪生塵水下看粧影眉頭畫月新寄言曹子建箇是洛川神横波笑臉艶出浦之輕蓮映渚蛾眉麗穿波之半月並出駱賔王虢國夫人承主恩平明上馬入宫門却嫌脂粉汙顔色淡掃蛾眉朝至尊三月三日天氣新長安水邉多麗人態濃意逺淑且真肌理細膩骨肉勻秋思抛雲髻腰肢賸寳衣杜詩幼有玉色發於穠華若彩雲朝升㣲月宵映艶色驚荷花西門秦氏女秀色如瓊花李白顔如玉不著人家俗衣服娉婷似不任羅綺忽疑天上落不似人間有看即曲中留不住雲飄雨過向陽䑓秀色似堪餐穠華如可掬嫩似花房脆似瓊並出白傅集紅粧逼坐花枝暖元稹集春嬌滿眼睡紅消掠削雲鬟旋粧束同上道子雖来畫得無元㣲之集皓腕肥来銀釧窄嬋娟兩鬢秋蟬翼宛轉雙蛾逺山色迴眸一笑百媚生六宫粉黛無顔色雪膚花貌叅差似醉嬌嬈禁不得風嫋牡丹花雨中神女月中仙並出白侍郎舞筵須擇腰輕女仙棹難勝骨重人白傅集京江水清滑生女白如脂其間杜秋者不勞朱粉施牡牧之體輕似骨無妱嫩氷後水輕盈烟際林容華本南國粧掠學西京並出劉賔客翠茁鳯生尾丹葉蓮含跗玉質随月滿艶態逐春舒綘唇漸輕巧雲歩轉虗徐露冷侵紅粉春隂撲翠鈿春嫩不禁寒娉娉裊裊十三餘荳蔲梢頭二月初春風十里揚州路捲上珠簾總不如金釵横處緑雲堕玉筯凝時紅粉和並出牡牧之注玉筯淚也誰言瓊樹朝朝見不及蓮花歩歩来新粧對鏡真無比㣲笑時時出瓠犀並出李義山文南國浣紗伴盈盈天下姝麗如三五月可望難親近並出髙逹夫長眉入鬢何連姢肌膚白玉秀且鮮盧仝文舞雪佳人玉一團羅隠集醉紅不自力狂艶如索扶孟東野鬢輕全作影嚬淺未成眉温飛卿愛水看粧坐羞人映花立王維集皓齒初含雪柔枝欲斷風張承吉晚粧留拜月春睡更生香司空表聖㸃黛方初月縫裙學石榴臉媚奪朝霞娥眉淡初掃並出樂府紅粉艶青娥劉义蕙心持静殊態横逸宛若迴雪之流風霍若初霞之映日沈雲卿文千金笑裏面一搦掌中腰體弱不勝珠翠繁自矜妖艶色不顧丹青人並出文粹曲眉豐頬清聲而便體秀外而恵中飄輕裾翳長袖粉白黛緑者列屋而閒居韓文體弱力㣲若不任羅綺光彩煥發轉動照人陳鴻長恨歌傳王昭君以圖當行及辭光彩射人悚動左右人間綽約不粧氷雪顔韋應物本朝絶色天下無一失難再得近而視之靚若星妃臨水而脉脉盈盈逺而望之杳如峡女行雲而朝朝暮暮荷花賦鮮妍皎如鏡裏面綽約對若風中仙對雪憶梅花並歐公詩意思由来畫不成當時枉殺毛延夀臨川集玉腕揮紅袖坡詩呉溪浣紗女不用朱粉施山谷玉釵半脱雲垂耳亭亭芙蓉挂秋水秀色洗紅粧暗香生雪膚不粧艷已絶無風香自逺並出坡詩醜惡子許允之婦竒醜交禮竟不復入房郭子史梁鴻妻孟氏壮醜而肥力舉石臼東觀漢記傳記齊無鹽之女為人極醜無雙臼頭深目齊邑之女鍾離為人極醜行年四十無所容入行嫁不售齊採桑之女項有大瘤故曰宿瘤並出列女傳集登徒子妻蓬頭攣耳齞唇厯齒注齞棖口齒厯猶踈也旁行踽僂又疥且痔宋玉好色賦悵望經自伯之東首如飛蓬豈無膏沐誰適為容願言思伯甘心首疾詩伯兮君子于役不知其期曷至哉詩君子于役夏之日冬之夜詩葛生言長也箋懐思者於晝夜之長時尤甚角枕粲兮錦衾爛兮予美亡此誰與獨旦言念君子亂我心曲言念君子載寢載興厭厭良人秩秩徳音詩小戎鸛鳴于垤婦嘆于室洒掃穹窒我征聿至有敦𤓰苦烝在栗薪自我不見于今三年詩東山期逝不至而多為恤詩杕杜注逺行不必如期室家之情以期望之卜筮偕止㑹言近止征夫邇止同上予髮曲局薄言歸沐詩采緑注婦人夫不在則不容餙箋云曲卷其髮思之甚也又云君子將歸者我則沐以待之寤言不寐願言則嚏詩終風注今俗人􅅉云人道我此古之遺風也愛而不見搔首踟蹰詩静女焉得諼草言樹之背願言思伯使我心痗詩伯兮痗病也日月陽止女心傷止征夫遑止詩小雅枤杜箋云婦人思望其君子陽月之時已憂傷矣又云室家踰時則思五日為期六日不詹詩小雅采緑史生世不諧作太常妻一嵗三百六十日三百五十九日齋又云一日不齋醉如泥後漢周澤傳竇滔被徒流沙妻蘇氏思之織錦為迴文旋圖詩以贈宛轉循環以讀之詞甚悽惋晉書列女傳集征夫勞於周行道也處婦憤而長望楚詞目極千里傷春心同上朝雲不歸山曹子建詩春心不自安梁庾肩吾詩盈盈一水間脉脉不得語古詩夜叅半而不寐兮悵盤桓而反側王仲宣登樓賦魂踰佚而不反兮形枯槁而獨居脩薄具而自設兮君曽不肯乎幸臨日黄昏而望絶兮悵獨語於空堂懸明月以自照兮徂清夜於洞房援雅琴以變調兮奏愁思之不可長左右悲而垂淚兮涕流離而縱横無面目之可顯兮遂頽思而就牀忽寐寢而夢想兮魂若君之在旁惕寐覺而無見兮魂迋迋若有亡衆雞鳴而悲予兮起視月之精光夜曼曼其若嵗兮懐欝欝其不可再更司馬相如長門賦陳皇后頗妬别在長門宫愁悶悲思聞蜀郡司馬相如工為文奉黄金百斤因為解悲愁之辭文選長門賦序願保金石軀慰妾長饑渇陸士衡贈顧彦先羣燕辭歸雁南翔何為淹留寄他方賤妾㷀㷀守空房憂来思君不能忘短詠㣲吟不敢長明月皎皎照我牀牽牛織女遥相望爾獨何辜限河梁燕歌行願君垂末光照妾薄暮年塘上行迴身入空房託夢通精神人欲天不違何懼不合并王仲宣雜詩重衾無暖氣挟纊如懐氷寤言莫予應張茂先雜詩昔為倡家女今為蕩子婦蕩子行不歸空牀難獨守古詩君在天一涯妾身長别離願一見顔色不異瓊樹枝江文通古别離弄杼不成藻謝恵連牛女詩弄絃不成曲王景𤣥圍腰無一尺垂淚有千行梁庾信王昭君詩夜漫漫以悠悠寒悽悽以凛凛潘岳寡婦賦秋日苦短促遥夜邈綿綿魏應璩詩寳書為君掩瑶瑟詎能開文選嚬黛含羞竟不言春思秋怨誰能問鮑溶集共金爐之夕香選别賦堂上流塵生庭中緑草滋沈休文擬古詩徒使春𢃄賖空惜紅粧變謝𤣥暉怨情詩孟夏非長夜晦明如嵗隔選詩秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人膓長夜思君心飛揚他人相思君相忘錦衾瑶席誰為芳宋湯恵休白紵舞歌詩與我别所期期在三五夕南樓詩三五明月滿四五蟾兎缺古詩明月照髙樓流光正徘徊選七哀詩霄月皓中閨選擣衣詩春闈閟此青苔色秋帳涵兹明月光夏簟青兮晝不暮冬釭凝兮夜何長織錦曲兮泣已盡迴文詩兮影獨傷江淹别賦從来腰自小衣𢃄就中寛梁鮑泉寒閨詩君言妾貌改妾意君心移梁鄧鑑閨怨詩憶别春花飛已見秋葉稀浹粉羞明鏡愁𢃄減寛衣得書言未反夢見道應歸坐使紅顔歇獨掩青樓扉梁庾成師逺期篇復如東流水未有西歸日夜雨滴空階曉燈暗離室藝文何遜篇昭昭清明月輝光燭我牀憂人不能寐耿耿夜何長㣲風衝閨闥羅帳自飄揚攬衣成長𢃄屣履下髙堂古詩箇日新粧如復罷祗因含笑待君歸錦字迴文欲贈君並出駱賔王夫壻久離别青樓空望歸粧成捲簾坐愁思懶縫衣燕子家家入楊花處處飛空牀難獨守誰為報金徽照水定自愛折花將遺誰愁心極楊栁揺動亂如絲並出孟浩然娟娟心目寢寐見之冬夜抱氷寒不睡文粹梨花寒食夜深閉翠㣲宫沈臣賢逺戍功名薄幽閨年貌傷形影一朝别烟波千里分君看望君處祗是起行雲並出王維集三百六十日日日醉如泥雖為李白婦何異太常妻望夫君兮咨嗟横涕淚兮怨春華遥寄影於明月送夫君於天涯本作一行書殷勤道相憶一行復一行滿紙情何極千里若在眼萬里若在心相思千萬里一字直千金並出李白寫水落井中同泉豈殊波秦心與楚恨皎皎為誰多黄昏望絶見偶語而生疑清旭意新聞疾行而誤喜乃知織迴文之錦無補離憂登望夫之䑓空為廢日並出吕和叔溝水分流西復東九秋霜月五更風别鸞離鳯今何在十二玉樓空更空鶯啼日出不知曙寂寂羅幃春夢長羅衣不忍着羞見繡鴛鴦並出李義山室婦嘆鳴鸛家人祝喜鵲韓集白玉璞裏斵出相思心黄金礦裏鑄出相思淚别淚闗泉脉春愁亂藕絲並出盧仝文早知潮有信嫁與弄潮兒寜從賤相守不願貴相離似將海水添宫漏共滴長門一夜長並出李君虞舞袖朝欹陌上春歌聲夜怨江邉月莫道君恩常不休媫妤團扇苦悲秋李嘉祐纎手縫衣獨苦辛逺因回使寄征人官家亦自寄衣去貴從妾手着君身髙堂姑老無侍子不得自到邊城裏殷勤為看初着時征夫身上宜不宜張文昌樓上殘燈伴曉霜獨眠人起合歡牀唐燕子樓集日日出門望家家行客歸無因見邊使空待寄寒衣張文昌集豈期牛女為參商白樂天去時樓上清明夜月照樓前撩亂花今日成隂復成子可憐春盡未還家淚沾䨇袖血成文不為悲身為别君望鶴眼穿期海外待烏頭白老江濵欲識九迴腸斷處潯陽流水九條分櫻桃花下送君時一寸春心逐折枝别後相思最多處千枝萬片遶林垂無身尚擬䰟相就身在那無夢徃還思牽梳洗懶空㧞緑絲叢並出元微之孤鳥去不還緘情向天末良人久燕趙新愛移平生去年花裏逢君别今日花開又一年丈夫一去花落樹妾獨夜長心未平並出韋應物相見不得親不如不相見玉貌一生啼空流錦字表心素至今緘愁不忍窺織錦作短書腸随迴文結春風復無情吹我夢魂斷並出李太白六宫誰買相如賦團扇恩情日日踈羅隠詩雲去有歸日水分無合時孟東野似把裁刀裁别恨兩人分得一般愁昔是同枝鳥今作萬里分並出姚少監衣寛有剰帶衣上今日淚箧中前日書来如春夢㡬多時塞鴻遇暖猶回處江水因潮亦返波秋思冬愁春悵望大都不稱意時多並出白侍郎雕輦已辭兮金屋何處長信草生兮長門日暮劉賔客閒吟芍藥詩悵望久嚬眉桂席塵瑶歩瓊爐燼水沉凝魂空薦夢低珥悔聽琴和簮抛鳯髻将淚入鴛衾的的新添恨迢迢絶好音隻影隨驚雁單棲鎻畫籠瑶階夜色凉如水坐看牽牛織女星鴛鴦帳裏暖芙蓉低泣關山幾萬重明鏡半邉釵一股此生何處不相逢滿面風流雖似玉四年夫婿恰如雲為報眼波須稳當五陵逰客莫知聞並出杜牧之宮殿生青草君王恩幸踈那堪聞鳯笛門外度金輿王維碧雲千里暮愁合白雪一聲春思長深怨寄清瑟逺愁生翠蛾竹斑歸帝女草緑怨王孫並出許用晦繞欄倚樹更惆悵㣲雨輕寒花落時漏添遲日箭減良宵膚清臂瘦衫薄香銷並出韓偓詩無人觧妾心日夜長如醉妾不是瓊奴意與瓊奴類正是落花寒食雨夜深無伴倚空樓料得他鄉過佳節亦應懐抱暗凄然並出韓偓永安驛東廊柱有女子題云不堪鳴杍日空對白榆秋出楊衡紛紛花落門空閉寂寂鶯啼日更遲鴻雁春歸人未歸劉長卿胡麻好種人無種正是歸時胡未歸古今詩話載朱滔括兵時代妻答夫詩兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路旁結髮為妻子席不暖君牀暮昏晨告别無乃太匆忙君行雖不逺守邉戍河陽妾身未分明何以拜姑嫜父母養我時令我日夜蔵生女有所歸雞狗亦得將君今徃死地沈痛迫中腸誓欲随君去形勢反倉皇勿為新婚念努力事戎行婦人在軍中兵氣恐不揚自嘆貧家女久製羅襦裳羅襦不復施對君洗紅粧仰視百鳥飛大小必雙翔人事多錯忤與君永相望蛾眉愁自結鬢髮沒情梳並出杜子美詩集莫捲龍須席從他生網絲且留琥珀枕還有夢来時李白集藁砧今何在藁砧夫也問夫何在山上更安山重山為出字言不在也何當大刀頭刀頭有環問何時還也破鏡飛上天注月半當来也出樂府解題本朝楊花日日常無定海燕年年却有歸一瞬青春疾如電等閒寛盡縷金衣臨川集佳人痩盡雪膚肌眉斂春愁知為誰坡詩怨恨經及爾偕老老使我怨總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉出氓黽勉同心不宜有怒采葑采菲無以下體徳音莫違及爾同死不我能畜反以我為讐既阻我徳賈用不售昔育恐育鞠及爾顛覆既生既育比予于毒云云宴爾新婚以我御窮云云不念昔者伊余来塈出邶谷風並詩史凄凄重凄凄嫁娶不須啼願得一心人白頭不相離沈約宋書古詞白頭吟或者以為即是文君所作王后及蕭良姊為武后所囚大罵曰願阿武為老䑕吾作猫生扼其喉舊唐書王皇后傳傳記王昭君年十七端正閑麗漢孝元時幸備後宫積五六年心有怨曠不餙其形容琴操集百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴忘我為樂府載百里奚妻辭彼百心之短景乃累恨之長暉鮑昭賦流水何太急深宫盡日閑慇懃謝紅葉好去到人間青瑣流紅記盛年處空房中夜起長歎美女篇過時而不采將随秋草萎詩選君子恩未畢零落在中路出班媫妤常恐秋節至凉飇奪炎熱棄捐笥箧中恩情中道絶文選怨歌行辭寵悲班扇徒使春𢃄賖坐惜紅粧變生平一顧重宿昔千金賤掖庭聘絶國長門失歡宴謝𤣥暉怨情二合兆嘉耦女子禮有行㓗已入徳門終逺母與兄如何耽時寵遊宦忘歸寜雖為二嵗婦顧景愧虗名嵗暮饒悲風洞房凉且清拊枕循薄質非君誰見容晉為陸思逺婦作詩良人遊不歸偏栖獨隻翼空房多悲風中夜起嘆息陸機詩申黜褒女進班去趙姬昇心賞猶難恃貌恭豈易憑文選鮑明逺白頭吟庭絶玉輦迹芳草漸成窠隠隠聞簫皷君恩何處多欲泣不成淚悲来翻强歌庭花芳爛漫無計奈春何春隂正無際獨歩意如何不及閒花草翻承雨露多粧成多自恨夢好却成悲隋煬帝時侯夫人詩見古今詩話但見淚痕濕不知心恨誰妾似井底桃花開向誰笑君如天上月不肯一回照雨落不上天水覆難重收君情與妾意各自東西流昔日芙蓉花今成斷腸草以色事他人能得幾時好月光欲到長安殿别作春光一段愁桂殿長愁不記春黄金四壁起秋塵夜懸明鏡青天上獨照長門宫裏人並出李白君王選玉色侍寢金屛中薦枕嬌夕月捲衣戀春風寜知趙飛燕奪寵恨無窮李白怨歌行深知好顔色莫作委泥沙杜詩緑珠猶得石崇憐飛燕曽經漢皇寵悲鳴五里無人問腸斷三聲誰為續出駱賔王妾顔未改君心改為君熏衣裳君聞蘭麝不馨香為君事容餙君看珠翠無顔色人生莫作婦人身百年苦樂由他人井裏引銀瓶銀瓶欲上絲䋲絶石上磨玉簮玉簮欲成中央折為君一日恩誤妾百年身寄言癡小人家女謹勿将身輕許人昭陽殿裏恩愛絕蓬莱宫中日月長紅顔未老恩先斷雨露由来一㸃恩争能遍布及千門三千宫女胭脂面幾箇春来無淚痕幾度曉粧成君王不言好並出白侍郎娟娟雙青蛾㣲㣲啟玉齒自惜桃李年誤身遊侠子空閨生逺愁韋應物集一家盡是郎腹心妾似生来無目耳為郎忍耐看故面元稹集綉領任垂蓬髻丁香閒結春梢文園終病渇休詠白頭吟三十六宫秋夜深昭陽歌斷信沉沉唯應獨伴陳皇后照見長門望幸心並出杜牧之半月照䨇臉凝腰素一圍有恨簮花懶無聊鬬草稀覽鏡歛青黛挑燈皓腕肌避人匀迸淚拖袖倚殘暉有貌雖桃李單棲足是非出杜牧之早被嬋娟誤欲粧臨鏡慵承恩不在貌敎妾若為容杜荀鶴愛如寒爐火棄若秋風扇山嶽起面前相看不相見不道君心不如石那令妾貌常如玉李君虞朝喜花艶春暮悲花委塵不悲花落早悲妾似花身杜荀鶴自矜妖艶色不顧丹青人那知粉繪能相負却使榮華翻誤身劉長卿恩情隔兮年光度雕輦已辭兮金屋何處長信草生兮長門日暮傒翠華之儻来兮仰𤣥天以自訴劉賔客銀鑰却收金鎖合月明花落又黄昏杜牧之君恩如海深難竭妾命若花輕易絕草緑怨王孫深怨寄清琴許用晦團扇無情不待秋温飛卿羙人歌白苧萬恨在蛾眉曽逐使君歌舞地清聲長咽黛眉顰並出武伯蒼君心匣中鏡一破不復全妾心藕中絲雖斷猶牽連孟東野一代紅顔為君盡唐喬知之婢詩華容芳意改枕席怨情饒錦字沾愁淚羅裙緩細腰不如銀漢女嵗嵗鵲成橋袁暉梨花寒食夜深閉翠㣲宫出沈臣賢互見悵望古来幽怨皆銷骨韓偓苦恨身為女出類要載傅𤣥苦恨篇歌艶露華舞回春雪幸持此枝承君餘恱綺羅脂粉嬌上春自言終世保情親寜知一旦君恩斷繁絃清管為何人張説文本朝天地豈不寛妾身自不容陳後山詩粧飾經副笄六珈詩君子偕老子周文王宫人髻上加珠翠翹花傅之鉛粉其髙髻名鳯髻又有雲髻加之歩歩而揺故曰歩揺始皇宫中梳望仙髻漢宫有迎春髻漢武時諸仙從王母下降皆梳飛仙髻盤龍髻貫以鳯首釵孔雀搔頭雲頭箆掃八字眉漢明帝宫人梳百合分稍髻同心髻掃青黛蛾眉魏武宫人掃蓮頭眉晉恵帝宫人梳芙蓉髻通草五色花子掃黒墨眉一畫連必細長曰仙娥粧隋文帝宫中梳九真髻唐武徳中梳平蕃髻長樂髻開元中梳雙鬟望仙髻貞元作偏髻子出王叡纂炙轂子史張敞為婦畫眉長安中𫝊張京兆眉憮西漢張敞傳憮音詡蘇林音嫵應卲曰嫵大也樊姬為卷髮號新興髻為薄眉號逺山黛施小朱號慵来粧趙后外傳宋武帝女夀陽公主人日卧含章殿簷下梅花落公主額上成五出之花拂之不去皇后留之自後有梅粧又名夀陽粧宋書北周禁天下婦人不得施粉黛自非宫人皆廣眉墨粧通鑑傳記司馬相如妻卓文君眉如逺山時人効之畫逺山眉西京雜記崔樞夫人治家整肅婢妾皆不許時世粧注時世粧叙紅不暈也出因話録互見治家門隋文帝宫中紅粧為桃花面事物紀原蜀後主宫有餙粧盖其髻别為一家之美因施胭脂粉夹連額號曰醉粧見北夢瑣言油頭花鈿滿面不如徐妃半粧出蒋凝宏詞賦見摭言集衣香知歩近湘東王詩㣲汗粉生光選鳯靨蛾眉粧玉面出梁劉遵笑靨人前斂衣香動處来陳後主頭上何所有翠㣲㔩葉垂鬢唇背後何所見珠壓腰衱穏稱身杜詩麗人行翻嫌脂粉汚顔色淡掃蛾眉朝至尊翠翹金雀玉搔頭長恨歌粧成更㸃星徐君情詩盡日弄花梳洗晩元稹詩鬢輕全作影嚬淺未成眉温飛卿装掠學西京劉賔客風流薄梳洗時世寛粧束白侍郎頭上玉燕釵妾小嫁時物李白白頭吟時世粧時世粧自出城中傳四方昂黛内家粧白樂天玉蟬金掌三層挿翠髻髙鬟緑鬢虗蜂鬚蟬鬢薄瓏驄浮動搔頭似有風出王建詩宋家宫粧髻一片緑雲斜白傅集髙髻雲鬟宫様粧出韋應物挿花照鏡千嬌出玉䑓後録紅錦粉絮裛粧啼崔國輔白紵詞皓腕約金環選樂府鈆黛凝春態金鈿耀水嬉風流誇墜髻時世鬬啼眉白樂天㸃黛方初月樂府本朝淡粧濃抹總相宜歐公集随宜梳洗莫傾城臨川集直饒肌骨秀正要畫眉長陳後山鄰家小婦學閒媚靚粧唯有長眉掃樂城集綰結湘蛾十二鬟山谷美人睡起薄梳洗勤把鉛花記宫様並出坡詩衣裳附襪經象服是宜玉之瑱也象之揥也蒙彼縐絺是紲袢也詩君子偕老衣錦褧衣出碩人注夫人嫁則錦衣加褧襜並詩辨外内命婦之服鞠衣展衣緣衣素沙周禮内司服史楊妃死之日馬嵬媪得錦袎襪一隻遇客過一翫百錢前後獲錢無數唐楊太真外傳集披羅衣之璀粲珥瑶碧之華琚戴金翠之首餙綴明珠以耀軀踐逺遊之文履曵露綃之輕裾曹子建洛神賦羅襪躡蹀而容與張衡南都賦巾㡚鮮明選南都賦注曰女服新衣翠粲嵇叔夜琴賦注翠粲衣聲也綉羅衣裳照暮春蹙金孔雀銀麒麟出杜詩麗人行觧藴麝之衣裳出袁淑正情賦顔如玉不着人家俗衣服互見艶麗春衣一對直千金欝衣香汗裛歌巾並出白傅集空見凌波襪出劉禹錫馬嵬行藕花衫子栁花裙多着沉香慢火薫出唐人詩歌舞經歌者纍纍乎端如貫珠出記樂記子撫節悲歌聲振林木響遏行雲韓娥過雍門鬻歌去而餘音繞梁三日不絕曼聲長歌並出列子湯問史趙飛燕體輕能掌上舞漢書為平陽主謳出漢武衛后傳桓温問嘉曰聽伎絲不如竹竹不如肉何謂也曰漸近自然一坐咨嗟出孟嘉别傳麗服靚粧燕歌趙舞觀者忘疲出唐書徐堅傳傳記漢宫人麗娟善歌體弱殆不勝衣常唱迴風曲庭葉翻落如秋出洞真記聲震林木響遏行雲餘音傳林數日不絕出荆州記今日催酒三䑓或曰鄴中有三䑓石崇遊宴之地樂工以促飲又云蔡邕三日之間周厯三䑓樂府以邕曉音律製此曲希其厚遺出李文正資暇集回波樂春鶯囀烏夜啼之屬謂之軟舞柘枝大渭州逹摩枝之屬謂之健舞出教坊記白尚書姬妓樊素善歌小蠻善舞出樂府解題開元中入内人許子和吉州永新縣人樂家女也入宫因名永新能變新聲髙秋朗月唯轉一聲響傳九陌一日大酺於勤政樓萬衆諠譁莫得聞魚龍百戲之音永新乃撩鬢舉袂直奏曼聲廣塲寂寂若無一人舞者樂之容有大垂手有小垂手或象驚鴻或如飛燕婆娑舞態也曼延舞綴也有健舞軟舞字舞花舞馬舞舞曲有緑腰蘇合香屈柘胡渭州團乳旋甘州等字舞以舞人亞身於地布成字也花舞着緑衣偃身合成花字也馬舞者櫳馬人着綵衣執鞭於牀上舞躞蹀皆應節奏也並出樂府雜録集呉歈蔡謳楚詞一唱萬夫嘆再唱梁塵飛擬古詩阿陽奏竒舞洛京出名謳選樂府發妙韻於丹唇激哀音於皓齒飄浮雲於太清集長風乎萬里曲既終而響絕遺餘玩而未巳良自然之至音非竹絲之所擬聲不假器用不借物動唇有曲發吻成音成公安賦呉蔡齊秦之聲鮑昭賦定面凝眸一聲發雲停塵下何勞筭元稹集愛君簾下唱歌人色似芙蓉聲似玉白樂天清歌拂梁塵選靈運詩舞罷錦纒頭杜詩皓齒歌細腰舞李賀將進酒骨氣端翔音情頓挫光英朗練有金石聲陳子昂集衆音不能逐裊裊穿雲衢杜牧之佳人絶代歌獨立發皓齒杜詩青蛾翳長袖韓文醉從趙女舞杜詩清𦂳如敲玉深圓似囀簧一聲腸一斷能有幾多腸一曲萬重情白傅集盼盼善歌舞幽雅多風態同上歌詞妙婉轉舞態能剜刻元稹集歌眉低有思舞態輕無骨出劉賔客清絲妙管從空来出韋應物衛娘清轉遏雲歌出羅隠艶歌能起闗山恨出武伯倉嬌歌自駐壺中景艶舞長留海上春出許用晦珠丳咽歌喉出李義山百金買一聲千金傳一曲出文粹迎娘歌喉玉䆗窱蠻兒舞𢃄金葳㽔出鄭愚津陽門遏雲歌響清迴雪舞腰輕出李義山舞筵須揀腰輕女出白傅集喉囀一聲響𫝊九陌樂石城有女名莫愁善歌謡並出樂府雜録悼亡子莊子妻死恵子弔之方箕踞鼓盆而歌出莊子互見逹理門史長孫后薨太宗曰内失一良佐以此益令人哀耳出唐書集望廬思其人入室想所厯幃屛無彷彿翰墨有餘跡流芳未及歇遺挂猶在壁如彼翰林鳥雙棲一朝隻如彼遊川魚比目中路析衾裳一毁撤千載不復引豈曰無重纊誰與同嵗寒展轉盼枕席長簟竟牀空牀空委清塵空虗来悲風寝興目存形遺音猶在耳明月入綺窻彷彿想恵質夣寐復冥冥何由覿爾形我慙北海術爾無帝女靈雨絶無還雲華落豈留英並出潘安仁悼亡蘭室無容光出張茂先房櫳無形跡出張景陽蘭徑少行跡玉䑓生網絲出唐華帷軒夕改軿輅景遷靈衣虗襲組帳空烟巾見餘軸匣有遺絃庭樹驚兮中帷響金釭暖兮玉座寒出宋貴妃詩重扄閟兮燈已暗幽泉寂兮此夜深響乗氣兮蘭馭風徳音逺兮聲無窮出謝希逸衾袵長塵絲竹罷調出王僧逹羅襪生塵出曹子建洛神賦既將反而復疑如有求而遂失出梁王筠昭文明太子哀策皎皎河漢匹三秋㑹有期嗟嗟琴瑟偶一去無還時暗壁看遺挂虗簷想歩綦流芳行處歇空色夢中疑出梁務先嚴霜降兮青春玉樹摧落成黄塵出陳子昂集宜享偕老胡寜鞠凶羙玉禠顔明珠晦色並出燕公碑畫圖省識春風面環佩空歸夜月魂冥寞憐香骨提攜近玉顔並出杜詩穠華不居松扄永閟陳子昂集羙人在時香滿堂羙人去後餘空牀出李太白情一何長命一何短羲和不駐哀禍翻錦帷悄戚彤史寒夫䘮少婦子失壯母周况妻銘並出韓文丹青畫出竟何益不言不笑愁殺人軒窻簾幙皆依舊只是堂前欠一人舊物零落盡此情安可任魂魄不曽来入夢似葉飄辭樹如雲斷别根念梧桐之早落不及芙蓉芳魂艶色知何在開箱衣𢃄隔年香應生寳瑟塵並出白侍郎芙蓉如面栁如眉對此如何不淚垂春風桃李花開候秋雨梧桐葉落時並出長恨歌孤鸞念其雌見鏡而舞白帖歸来舊香滅出温飛卿玉梳細朶香膠鮮出元微之死後留得生前恩出文粹竹垂哀折節蓮敗惜空房出元徽之鳯樓人已去鸞鏡月空懸出李義山撫存悼亡感今思昔出哀冊流水飄香去不歸出李賀雲貌久已隔玉音無復𫝊元稹本朝鏡下穸䑓衣緘全笥出類要靡及湯沐之封徒切糟糠之感出楊文公行求兮不可遇坐思兮不可知其可見惟夢兮柰寐少而寤多出歐公集晝出門而不敢歸兮畏空室之漫漫忽入門而欲語兮嗟猶意其尚存役魂魄於宵夢兮追彷彿而無縁訪臨卭之道士兮從稠桑之老人縱可得而復見兮恐荒忽而非真出傷春詞記纂淵海卷八十一
