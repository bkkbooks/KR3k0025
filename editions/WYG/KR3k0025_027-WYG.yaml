  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_027-1a, image: WYG0930/WYG0930-0603a.png}
body:
  text: 記纂淵海卷二十七宋潘自牧撰職官部吏部經惟玉建國辨方正位體國經野設官分職以為民極乃立天官冢宰使率其屬而掌邦治以佐王均邦國周禮治官之屬大宰卿一人並周禮夏書曰賦納以言明試以功車服以庸書史漢初置尚書有常侍曹主公卿事後漢改為吏曹主選舉祠祀後又有選部宋武帝大明二年分吏部尚書置二人通鑑唐自貞觀以前尚書掌五品選事至景雲元年宋璟為尚書始通其選而分掌之因為常例開元以前諸司之官兼知政事自開元以來宰相多兼領兵部事通志傳記漢成帝置列曹尚書四人其一曰常侍曹靈帝改吏部為選部魏改選部為吏部通典後周依周六官置大冢宰卿隋復曰吏部唐改選部龍朔間改為司列咸亨初復舊光宅改吏部為天官神龍初復舊天寳初改為文部至徳初復舊掌文官選舉總判吏部司勲司封考功四曹事六典集胷中無氷鑑敢當吏部銓山谷東西兩漢左雄孤絶於前南北二晉山濤莫續于後沈約表性藏於貌才隠於心楚越無以况其逈殊山川未足方其險阻同上漢置天曹魏仍東掾毛孝光以清公見美盧子若以貞固任職張纉表本朝吏部掌文武官吏選試擬註資任遷叙䕃補考課之政令封爵䇿勲賞罰殿最之法本部長貳及所𨽻郎官其屬有曰司封曰司勲曰考功凡官十有三尚書一人侍郎一人郎中員外郎尚書選二人侍郎選各一人司封司勲考功各一人通志吏部尚書經天官太宰掌建邦之六典以佐王治邦國周禮冢宰掌邦理統百官均四海書召公奭為太保兼領冢宰之職書史吏曹尚書典選舉祠祀屬三公曹靈帝末梁鵠為選部尚書後百官志註魏陳羣為尚書制九品官人之法魏志毛玠為吏部尚書無敢好衣美食者魏武嘆曰孤之法不如毛尚書令使吏部用心如玠風俗之易不難同上毛玠雅亮公正在官清恪其典選舉抑阿黨於時四海翕然莫不勵行同上汪湛為吏部尚書家甚貧不營私財饋餉盈門無所受南史隋牛𢎞為吏部尚書其選舉先徳行而後文才進用多稱軄吏隋書唐杜如晦攝吏部尚書與房𤣥齡共執朝政引薦賢士分紀崔琰委授銓衡總齊清議十有餘年文武羣才多所明拔朝廷歸美天下稱平魏志崔洪為吏部尚書舉用甄明門無私謁分紀開元十八年裴光庭兼吏部尚書作循資格賢愚一槩蕭蒿以為非奏罷之選舉志太宗嘗語吏部尚書李清臣曰吏部掌銓衡閲人多宜以名聞清臣乃取百餘人第為徳行政事文學議論四等以進職畧韋巨源以吏部尚書同中書門下三品時要官缺執政以次用其親巨源秉筆當除十人皆諸宰相近屬唐書傳記吏部尚書周之天官卿也六典魏改選部為吏部専掌選職右于諸曹尚書宋置二吏部尚書齊魏皆曰吏部尚書同上自漢及魏授此職者咸云吏部尚書若授諸曹尚書直云尚書然此官歴代班序常尊不與諸曹同也六典鄧攸為吏部尚書牧馬於家庭妻息素食不受一錢於人晉傳山濤為吏部尚書所奏甄拔人物各有題目時稱山公啓事同上裴頠稱嵇紹曰延祖領選可使天下無遺才晉傳袁昻雅有人鑑遊處翫雜為吏部尚書梁帝謂曰齊明帝用卿為黒頭尚書我用卿為白頭尚書同上徐勉為吏部尚書居選官嘗門人夜集客有求詹事官勉正色答曰今夕止可談風月不宜及公事時人服其無私梁傳唐吏部尚書總判吏部司封司勲考成四曹事六典魏知古姚崇所引及同列稍輕之出攝吏部尚書崇二子在洛通餉遺請託知古歸悉以聞姚崇傳集掌文武二選之法而奉行其制命四朝志天官冢宰之崇文昌選部之重牋表類天官之任人物所宗以撥煩治劇之才行激濁揚清之政同上合左右之聨歸簿領者凡六十案舉文武之士在考覈者逾二萬員李清臣謝表射䇿之初既無失于正鵠掄材之際必有適于輪轅同上當垂拱之朝實資共理奉持衡之職必在至公並同上鍾士季曰裴楷清通王戎簡要樂彦輔雍容自守當時恨其寡譽山巨源意在拔竒不免與世浮沉鄧攸牧馬家庭何益止競之操卞壼如含瓦石未聞檢裁之功江總表昔舜舉禹咎繇而雋乂在官湯舉阿衡而不仁流屏無謂隠㣲廢公任私無好自専違衆取怨易貴好爵書慎官人官不可妄授軄不可闇受能者養之致福不能者弊之招咎晉傅𤣥箴漢置五曹方今六尚魏隆八座擬古六卿近喻喉舌逺譬樞斗隋江縂表本朝張昭為尚書獨掌京官七品元豐官制行以審官東院歸吏部尚書左選審官西院歸吏部尚書右選四朝志擬考其閥閲以定可否凡選授封爵功賞課最之事皆所歴郎官驗實而後判成焉若有疑不能决則禀議於尚書省即應論奏與郎官同上殿續㑹要建炎六年詔惟吏部備官餘長貳互置題名入朝登用而抗論極言不以利害之私少有回屈士論益以歸重朱晦菴書進位於輔相之列則所資於天下之才者益衆而所進退於天下之才者益重同上吏部侍郎經小宰之職周禮史裴楷為吏部侍郎風神髙邁容儀俊爽時謂之玉山照人本𫝊吏部侍郎髙孝基鑑賞機悟清謹絶倫房𤣥齡杜如晦與選孝基特加賞異後以為知人隋書陸彦師為吏侍隋承周制官無清濁彦師在職凡所任人頗甄别於士庶同上吕元膺拜吏部侍郎正色立朝有合宰望處事裁宜人服其有體同上髙馮為吏部侍郎凡所銓綜時稱平允太宗賜金背鏡一面以表其精鍳焉唐新語裴行儉馬載為吏部侍郎同時典選十餘年甚有能名時人稱為裴馬唐本傳盧從愿睿宗時拜吏部侍郎中宗之後選司頗失紀綱從愿精心調理大稱平允李朝隐同時典選時人稱曰吏部前有裴馬後有盧李出分紀韋陟常任吏部侍郎有一致仕官叙五品陟判之曰青毡展慶曾不立班朱紱承榮無宜卧拜時推其强直同上傳記隋煬帝三年始置以二尚書之職六品以下銓補多歸之通典唐武徳初因隋舊制吏部尚書掌六品七品選侍郎銓掌八品九品選㑹要李至逺知郎中時有選人姓刁又有王元忠並被放乃宻與令史相知减其㸃畫刁改為丁王改為士議授官後即添成文字至逺一覧便曰今年銓覆萬人總職姓名安有丁士姓者此必刁某也省内以為神明後擢侍郎㑹要唐選部流内六品以下官是為銓衡之任凡初仕進者無不仰屬通典李至逺知選吏肅然歛手時人號曰李下無蹊通典温彦博遷檢校吏部侍郎彦愽欲汰擇士類寡行不能厭衆訟牒盈庭時議煩譏本傳韋𢎞景累遷吏部侍郎銓總平允貴幸憚其嚴不敢私謁本傳集辯論官材澄汰流品栁公綽吏侍制用解樞機之務必居衡鏡之職唐詔令韋貫之吏侍制掌銓衡之品藻宜叙九流楊億代表持衡留藻鑑聽履上星辰杜甫南宫吾故人白馬金盤陀雄筆用千古見賢心靡他杜甫寄吏部賈侍郎吏部古之天官而侍郎小宰之職堯制俞天官四銓總覈人物澄清流品除孫覺制本朝選人屬流内銓小使臣屬三班院元豐官制行以流内銓歸吏部侍郎左選續㑹要初置二員蘇頌左選李承之右選夫以天官之貳制夏卿之選部書煩重條格紛委茍非其人則士之失職而無告者多矣東坡集吏部掌典選舉至於所屬之官有行封爵議勲庸稽功課之事咸以咨焉侍郎實貳其長可不重哉南豐擬制吏部郎中史山濤舉阮咸為吏部郎中曰清直寡欲萬物不能移也世說顧憲之為吏部郎中其祖凱之嘗為吏部于庭中植嘉樹曰吾為憲之植耳後果為此職宋書宋張績遷吏部郎裴子野曰張吏部有喉舌之任已恨其晩同上齊庾果之司空劉勔寄之稍遷吏部郎中叅選大事齊書阮放為吏部郎銓掌之任甚有稱譽本傳王僧綽為吏部郎叅掌大選究識流品諳悉人物抜才舉能咸得其分同上傳記唐吏部郎中有二人龍朔二年改為司列大夫咸亨光宅神龍改復六典一人掌考天下文吏之班秩品命一人掌小選未入仕而吏京司㕘復分九品道謂之行署其應選之人以未入九流故謂之流外銓六典後漢鄭𢎞為僕射奏議台職任尊而賞薄人無樂者諸吏部補二千石自此始也通典後漢吏部郎中典劇多超遷者同上集銓衡庶品歴選賔僚梁陸倕拜吏部郎表序簿書以别淑慝擇刀筆以決臧否剖疑析滯揮翰如流選部以清繄公是賴席豫揚吏部郎中碑銘參我六典冠於諸曹同上六官之屬選曹郎首之歴代以來選諸曹郎之中其踐履乆考第髙加以有氣局律度者遷焉除李建制本朝元豐官制行置吏部郎中四人尚書選二人侍郎選各一人參掌選事而分治之凡序位有品選官有格分任有軄寓禄有階皆以事稽考審核其狀質成於長貳而後行焉四朝志建炎三年詔三選各一員中興㑹要員外郎史吏部員外郎二人掌文選以三銓之法官天下之才其投試銓注與流内畧同謂之小選唐百官制唐吏部郎中二㕔先小銓次格式員外郎二㕔先南曹次廢置舊説吏部為省眼分紀韋陟字商衡為吏部員外郎是曹在南宫為眉目在選士為司命公執直筆問簿書紛掌盤錯一瞬而剖劉禹錫撰神道碑韓滉遷吏部員外性强直明吏事在南曹五年簿最詳緻唐百官志裴遵度遷吏部員外天寳中九流輻凑㑹府遵度敏識强記精覈時稱吏事第一同上傳記吏部貟外郎掌選院謂之六曹六典劉崇望轉吏部員外郎崔安潜為吏部尚書崇望判南曹滌除夙弊復清選部本傳唐牛徽遷吏部員外郎乾符中選曹猥濫吏為奸弊毎歲選人四千餘人徽直剛時為起清由是銓叙稱正能否旌别物議稱之同上集吏部信才傑文鋒振竒響調與金石諧思逐風雲上沈約悼齊謝朓才盛居東之任禮處司南之重髙選髦士以分劇曹常集鄭叔則吏部員外郎制吏部提英鑑片善蒙采録黄山谷今日君先捧紫泥裴度餞栁公綽詩本朝凡郎官並用知府資序以上人充未及者為員外郎建炎四年詔權攝天差郎官並罷初進擬第云吏部郎官及擬先身細銜始直書尚書吏部郎中或員外郎主管尚書某選主管侍郎某選自此相承不改乾道元年詔今後非曾任監司守臣不除郎官著為令自是舘學寺監臣拘礙資格遷除不行郎曹缺員但得兼攝即外補間有不次推用者則自二著躐升二史以至從列其自外召為郎則資級髙不數月必序進卿少而郎有正員者少矣宋史司封郎中史柳公權為司封員外郎入奏帝曰見卿筆蹟久矣因問用筆法權曰心正則筆正乃可法矣本傳楊凝為司封員外郎直聲彰聞桞文貞觀中韋孝武為主爵郎中與兄弟同省時號三列宿唐史司封郎中掌封命朝㑹錫予之級爵凢九等爵唐官志齊置主爵郎中一人隋曰主爵郎中宋為司封郎中參堂官封叙贈之事凡事之可否與司勲通决于尚書侍郎同上傳記晉文公執叙以正其官註云執叙主爵之官漢尚書有封爵之任而無其官後漢書馮勒字韋伯光武以為郎中給事尚書使典諸候封事勒量功次輕重國土逺近地勢豐薄不相踰越莫不厭伏焉自是封爵之制非勒不定晉尚書有左右主客曹北齊河清中改為主爵置郎中一人屬吏部主封爵之事隋初為主爵侍郎煬帝改為主爵郎武徳初為主爵郎中龍朔二年改為司封大夫咸亨元年復舊光宅元年為司封郎中掌封爵皇之枝族及諸親内外命婦告身及道士女官等天寳八載十一月勑道士女官籍每十載一造永為常式出通考集封爵之恩施於内外國之典也主以郎吏寵秩甚優渥除王祖道制以寵左曹之秩用優主爵之名胡文恭制阮咸貞潔屢薦未登陸亮忠心裁居殿職自非季重清識李毅恬正則何以區分管庫式鍳胥吏同上本朝司封判司事一人以無軄事朝官充凡封爵之制一出於中書本司但掌定諡先期解本部赴集而已元豐官制行郎中員外郎始實行本司事初除王祖道為司封郎中參掌官封叙贈之事凡宗室賜官授官親王内外命婦以下封爵諸親保任其宗屬陞朝官褒贈其要皆例焉續㑹要司勲郎中史周官有司勲上士二人凡有功者司勲詔之後周夏官有司勲一人掌功勲之賞隋文帝置司勲侍郎煬帝改為司勲郎武徳初為司勲郎中龍朔元年改為司勲大夫咸亨二年復故掌邦國官人之勲級凡勲有十二等十二轉有功之人合授勲官者皆委之覆定然後奏擬六典傳記張九齡遷司勲員外郎張說謂人曰後来詞人稱首本傳張循憲薦張加正奏對偘偘武后恱擢循憲司勲郎中酬其得人時人謂功狀盈几郎吏不決加正為詳處廷無留牒張加正傳本朝趙忠簡公鼎字元鎮公為司勲郎官乃言自安石用事肆為紛更祖宗之法掃地而生民始病今安石猶配享廟廷而京黨未族何以收人心而致和氣哉言行録陳文正公康伯字長卿自公為卿時為司勲郎官秦檜方擅事公雅有素乃澹然其中檜雖稱公靜重常越用他人公不以為意在省五年始為軍器監同上趙宗儒再遷司勲員外郎貞元六年領考功事自至徳後考績失實内外悉考中上殿最混淆至宗儒黜陟詳當無所回憚同上司書本司無所掌元豐官制行郎中員外郎始實行本司事初除穆洵為參賞勲掌事凡勲十有二級自上柱國至武騎尉自從七品推而上之至正三品三歲一遷必因其除授以加之凡賞格皆設於此以逆其至焉若事應賞從其所𨽻之司考實以報其制命隆興詔省并司勲郎中以司封郎中兼領㑹要考功郎中史考功定課晉史鄭瀚為考功員外郎刺史有馳迫人吏上言政績請刋石紀者瀚探得其情條索廉使巧迹遂露人服其敏識晉紀考功郎中掌文武百官功過善惡之績考法凡百司之長歲較其屬功過善惡九等又令衆官讀之流内之官叙以四善善状之外有二十七最唐百官志穆宗即位召李渤為考功郎校定京官考不避權倖皆行黜陟同上宋之問善為五言詩當時無能出其右者景龍中為考功郎中唐中宗増置修文舘學士擇朝中文學之士之問與薛稷等首膺其薦時以為榮同上傳記漢元帝時京房作考功課吏之法然其軄不在尚書至光武改尚書三公曹主歲書考課課諸州郡通典唐龍朔改為司績大夫咸亨復舊職源裴諝遷考功郎中代宗幸陜諝徒挾考功南曹即赴行本傳王信字成之權考功郎有選人張公選初一年免銓至是改秩吏妄引復令柅之公鈎察其故吏怖服又有三屬七實礙式吏受賂為道地趙衞公為工書以囑公持弗聽已而轉臨天官閱畨成牘拊掌愧嘆嗟謝不已至白于上前他日上謂尚書蔡滉曰考功得王信銓曹遂清邏者私相指為神明同上集稱意新官又少年秋清身健好凉天白樂天送霍考功有意嫌兵部專心望考功誰知脚蹭蹬却落省墻東張恭忠咏主羣吏之課而議其誅賞郎列三台任屬九重南豐除蔡京制計羣吏之治而明黜陟之法台郎典引列于左曹又除吕和卿制本朝以七事考監司一曰舉官當否二曰勸課農桑增墾田疇三曰户口増損四曰興利除害五曰事失案察六曰較正刑獄七曰盜賊多寡以四善三最考守令徳義有聞清謹明著公平可稱恪謹匪懈為四善訟獄無寃催科不擾為治事之最農桑墾闢水利興修為勸課之最屏除姦盜人獲安處賑恤困窮不致流移為撫養之最通善最分三等五事為上二事為中餘為下若能否尤著則别為優劣以詔黜陟宋史户部經惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國周禮史漢置尚書郎四人其一人主財帛委輸至魏文帝置度支尚書等專掌軍國支計而晉有度支皆主筭也宋齊度支尚書領度支金部倉部起部四曹度支統度支倉部左户右户金部庫部六曹後周置大司徒一人如周禮之制隋初有度支尚書則並後周民部之軄開皇三年改度支為民部職官志傳記顯慶元年改户部為度支龍朔二年改度支尚書為司元太常伯咸亨元年復為户部尚書初户部居禮部之後武后改置天地四時之官以户部為地官自是遂居禮部前神龍元年復置地官總判户部度支金部倉部事通典集掌司徒之邦教制民曹之地征總事帥屬居其要㑹幹時通才始可典領常集制翼翼版圗以辨九州之地英英㑹府實總萬事之機長編尚書統庶書官人承法憲應瑒雜詩本朝户部判官事一人以兩制以上充凡户口田産錢榖食貨之政令皆歸於三司本曹但受天下之土貢㑹陳于庭而已續㑹要元豐改官制罷三司歸户部左右曹而三司之名始冺矣四朝志户部掌天下人民錢穀之政令貢賦征役之事以版籍考户口之登耗以稅賦待軍國之歲計以土貢辨郡縣之物宜以征𣙜抑兼并而生調度以孝義婚姻繼嗣之道和人心以田務券責之理直民訟凡此歸于左曹以常平之法平豐凶以義倉賑濟之法救飢饉恤艱厄以豐田水務稼穡以教民勸酬勤勞省科歛凡此皆歸之右曹其屬有三曰度支上供俸賜及邦國經度㑹計之事𨽻焉曰金部貨賄出納之制及權衡度量之令𨽻焉曰倉部凡國之倉廪儲積及給受之事𨽻焉舊三司使即今尚書舊三司副使即今侍郎其權發遣副使即今權侍郎舊三司判官推官即今郎中員外郎之任也續㑹要户部尚書經大司徒之職掌建邦土地之圖與其人民之數以佐王安擾邦國周禮以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵原隰之名物而辨其邦國都鄙之數制其畿疆而溝封之同上史魏文帝置度支尚書專掌軍國之計朝議以征討未息動須節量及明帝嗣欲用安平王帝問左右曰有兄風否答曰似兄帝曰吾得司馬懿一人復何憂轉度支尚書晉安平王傳杜預為度支尚書内以利人外以救邊備物置用濟當時之益者五十餘條本傳晉吳隠之為度支尚書以竹篷為屛風坐無毡席後遷中領軍清儉不改毎月所得禄纔留身糧餘悉分賑親族本傳傳記長孫平開皇三年為度支尚書見天下州縣多罹水旱百姓不給奏令民間毎秋加出粟麥壹石以下貧富為差等儲之閭里以備凶年名曰義倉隋書鄭善果為民部尚書制與裴寂等十人毎奏事及侍立並令升殿與從兄元璹在其數時以為榮分紀劉溉為左民尚書溉美風儀善容止所至以清白自脩性又率儉不好聲色梁書唐髙宗以竇徳𤣥舊臣自殿中少監為御史大夫歲中遷司元大常伯又任十餘人皆帝自擇㑹要集及領地官且司邦賦㑹稽事劇出納孔殷投利刃以皆虛委絲棼而必理白居易行裴垍制徭賦職貢之方經費賙給之算六典亦總地卿嘗㑹計而經國紀綱式叙征賦益饒唐大詔令崔𤣥制地官理財能制輕重崔羣制本朝初除安燾為户部尚書續㑹要國初以天下財計歸之三司本部無職掌止置判簿事一人以兩制以上充以受天下上貢元㑹陳于庭元豐正官名始並歸户部掌天下人户土地錢穀之政令貢賦征役之事職畧尚書掌軍國用度財賦出納州縣廢置升降凡四司所治之事侍郎員外郎參領之獨左曹事弗預專𨽻所掌侍郎若事屬本曹而歴郡縣監司不能直則受其訟焉大享祀薦饌則尚書奉爼飲徹之朝㑹則奉貢物闕則侍郎攝行元祐元年門下侍郎司馬光欲令户部尚書兼領左右曹而舊三司財用事有在五曹寺監者並歸户部則利權歸一詔尚書省立法左右曹錢穀尚書兼總使周知其數量入為出而制國用焉同上户部侍郎經掌土地之圗周禮史後周依周官隋煬帝置民部侍郎唐因之後改曰户部龍朔二年改為司元少常伯咸寧元年復為户部侍郎唐史韋表㣲為中書舍人俄拜户部侍郎職如故時自長慶寳厯國家比多變故凡在翰林例無滿歲由是表㣲自監察六七年間秩正二卿備承恩渥盛于一時本傳楊瑒歴户部侍郎嘗召宰相大臣議天下户版延英殿瑒言利病尤詳帝咨賞於是宇文融建言檢括户口瑒執不便融方貴諸卿緘黙唯唯獨瑒抗議故出華州刺史白居易牛僧孺制李絳遷户部侍郎判本司帝以户部俱有獻而絳獨無何哉答曰凡方鎮有地則有賦或嗇用度易羡餘以為獻臣乃為陛下謹出納焉有羡贏哉若以為獻是徙東庫物實西庫進官物結私恩帝矍然同上傳記唐太宗問盧承慶歴代户口多少之數承慶叙夏以後迄周隋皆有依據本傳王彦威開成初為户侍判度支彦威于儒該邃亦善吏事但經總財用出入米鹽非所長也唐書潘孟陽權知户部侍郎詔馳驛江淮視財賦孟陽恃氣豪倨所至招金錢多補吏譽望大䘮同上李元絃歴工兵吏三侍郎上令宰臣及公卿以下精擇堪為户部者多有薦元絃者乃拜户部侍郎元絃因條奏人間利害及時議得失以奏之上大悦因賜衣一副本傳桞約字元禮權户部侍郎感激奮勵悉力盡言凡利病皆執奏以進周益公集集昔年内署振雄辭今日東都結去思宫女猶傳洞簫賦國人先録衮衣詩劉禹錫送李户部華昌却復文昌伍别鶴重歸太乙池想到金門侍稱籍一時驚喜見風儀同上下制民産上經國用地官之貳實參總焉侍郎擬制地官之職邦教是先選華國以從人望韓退之除崔羣制地卿之貳爰委典司理財先示于簡廉利物毎懲其聚斂唐大詔令李絳制體道履仁外和内敏清而容物善不近名從容禮樂之間特達珪璋之表選賢與能于今雖重擇才均賦自古尤難往慎乃司以服加命韓愈除崔羣制本朝户部之職皆歸三司元豐官制行户部始總邦計置侍郎二員左曹五案右曹五案左曹除陳安石右曹除李定職畧紹興四年七月詔户部侍郎二員通治左右曹職事以權吏部侍郎劉岑有請故有是命中興㑹要户部郎中史漢尚書郎一人主户口墾田吴張温為户曹郎魏有左民郎曹晉兼制右民郎曹東晉而下民部曹唐為郎中髙宗改為户部龍朔為司元大夫後復故掌户口土田賦役貢獻蠲免優復婣婚繼嗣之事以男女之黄小中丁老為帳籍以永業口分園宅均其土田以租庸調歛其物以九等定天下之户以為尚書侍郎之貳其後以諸行郎官判錢穀而户部度支郎官失其職矣事類傳記武儒衡遷户部郎時皇甫鎛以宰相領度支剥下益上乃上䟽論列儒衡氣岸髙雅唐書韋維字文紀為户部郎中善裁剖時員外郎宋之問善詩故稱户部二妙唐書唐虞綸為户部郎中有詩名于貞元中與李端司空曙之徒名貞元十子形于圗畫以美其名同上髙構轉民部郎中時有叔姪爭嫡尚書省不能斷朝臣之議不决構㫁而合理上以為能勞之曰我聞尚書郎中上應列宿觀卿才識方之古人之言信矣隋書集員外由來美郎中望不優寧知粉署裏翻作土山頭詩話參我地官之屬首於時俊之科類要郎官皆為清秩杜牧制本朝國朝淳化中户部郎中張郁父正仕至户部侍郎世尚儒學號書樓張家長編紹興中專置提舉帳司總天下帳状以户部左曹郎官兼之右曹歲具常平錢物總數毎秋季具册以聞初置主管左右曹總稱户部郎官紹興七年閆彦昭以太府寺丞兼左曹郎官紹興三十二年徐康正除左曹郎官自是相承不改又詔户部事有可疑難裁决者許長貳與衆郎官聚議文字皆令連書有定議然後付本曹行宋史員外郎史隋文帝置員外郎煬帝改承務郎唐武徳三年復為員外郎通志唐户部與吏部鄰司吏郎移牒令户部列棘以備交通吕太一為户部員外郎答曰眷彼吏部銓總之司當須簡要清通何必設籬樹棘唐書裴向為渭陽縣令奏課第一朝廷聞其理行擢為户部員外郎狄仁傑薦子光嗣為員外郎涖事有聲同上集千里歸程三伏天官新身健馬翩翩行衝赤日加餐飯上到青雲穏著鞭白居易送白敏中唯求員外置不應列星文趙謙光答賀渉掌户口賦役之事為尚書侍郎之貳唐百官志本朝員外郎掌分曹治事建炎三年詔省併郎曹惟户部五司以職事煩劇不併仍各置一員宋史劉禹錫檢校户部郎中幹池鹽于蒲脩牢盆謹衡石煎和既精飴散乃盈商通而薦至吏懼而循法民不維網而國用益饒歲杪㑹其所入贏羡什百詔下褒其能劉禹錫度支郎中史漢有度支侍郎即郎中之任也歴魏晉宋齊並有度支郎中梁隋為侍郎開皇三年改度支尚書為民部尚書唐因焉崔仁師為度支郎中嘗奏度支財物奏數千言手不執本太宗怪之令杜正倫齎本與仁師對唱一無差殊太宗大竒之唐志張濬為度支郎中黄巢将逼闗輔濬託疾請吿侍其母挈族避亂商州賊犯京師僖宗出幸途無供頓衞軍不得食濬隂令李康獻糗餌數百騾綱軍士始得食僖宗乃召康閣卿為縣令安操心及此對曰臣為塵吏安敢有此進獻張濬郎中教臣也帝異之同上傳記唐龍朔中改度支郎中為司度大夫咸亨復舊六典蘇弁授度支郎中副知度支事仍命立于正郎之首有副知之名自蘇弁始也同上狄梁公以度支之司天下利害部常闕人求之未得乃自職之唐職林寳應元年正月劉宴為户部侍郎度支使二年二月韓滉以宰相加度支使五月二日豆參為中書侍郎平章事度支使自後雖無亦有他官判同上集位參計㑹職綰度支唐張缺集鳴鶴登朝含鷄伏省轉筯之敏未見稱竒聚米之能無聞播美張倉之善筭國用詎肯留情馮勤之力計軍儲曾何介意年支國用為政之嘉猷歲計軍儲邦家之要務同上本朝參掌計度軍國之用量貢賦税租之入以為出乾道四年置㑹稽都籍度支掌之裁减吏額置五十人淳熈十三年又减四人宋史徐宗説在度支㑹右曹金部皆缺官因令兼領三曹金谷纎悉之地而宗説素有心計于天下經費出入盈縮之數莫不通知老吏為之歛手中興係年録參掌計度天下之經費以貢賦租税之入而為之出小事則擬畫大事則諮其長神宗正史職官志財物多寡之數物生豐約之宜司徒之曹典貳為重南豐除陳向制金部郎中經掌凡金玉錫石丹青之戒令周禮史魏尚書有金部郎歴代多有之北齊金部主裁量尺度内外諸庫藏文帳隋祖孝徴薦盧昌衡為尚書金部郎毎謂人曰吾用盧子均為尚書郎真無愧幽明矣隋初為金部侍郎煬帝除侍郎唐武徳中加中字龍朔二年改金部為司珍大夫咸亨初復舊掌庫藏金寳貨物權度尺量等事自開元三年置鑄錢使皆以他官為之通志傳記漢置尚書郎四人其一主財帛委輸蓋金部郎曹之任也職林建中初罷鹽鐵等天下錢穀委金部倉郎中書門下揀兩司郎官准格式調掌蕭頴士終于揚州功曹子存為金部郎中有直諒功曹之風唐書魏晉宋齊後魏北齊並有金部郎梁陳隋為侍郎煬帝但曰郎唐因之武徳三年加中字六典龍朔中為司珍大夫唐職林咸亨復天寳改司金郎中至徳初復舊六典集大寳曰位夏陳納貢之書聚人曰財漢有藏錢之府莫不取之以道用之以時不役人以奉身不遣人以供國自鹿臺重賦東夏為墟鴻都賣官西園成市張鷟集掌庫藏出納之節金寳財貨之用權衡度量之制皆總其文籍而頒其節制唐書本朝金部郎參掌天下給納之泉幣計其歲之所輸歸于受藏之府以待邦國之用勾考平准市舶𣙜易商税香茶鹽礬之數以周知其登耗視歲額盈虧而為之賞罰宋史王師愈召除金部郎中數召對言事上孝宗賜書曰比聞奏對頗及治道之具而未詳也尚有可禆政體而宜于今者亟復條奏其眷待之渥一時在廷之臣莫得望焉晦菴集倉部郎中經廩人掌九穀之數以待國之匪頒賙賜稍食以歲之上下數邦國以知足否以詔國用以昭年之凶豐周禮史孟簡為倉部郎王叔文為户部侍郎簡為其屬中立正色凝然不附唐書魏晋而下皆有倉部郎中梁陳為侍郎宋齊以度支尚書領之後魏有太倉尚書後周有司倉下大夫隋初制倉部侍郎煬帝止曰倉部郎唐武徳三年加中字龍朔二年改司庾大夫咸亨復天寳為司儲郎中至徳復傳記唐畢諴為倉部郎中事要家勢人以倉駕二曹為辱諴沛然如處美官無言宰相知之遷職方郎中兼侍御史職林掌天下儲庫出納租税禄糧倉廪之事六典集出納必恡有司之常貳上下之價則茫昧者受敝雜苦良之貨則豪右者受贏惟一惟公乃㒺不同惟平惟實乃㒺不吉元微之參掌國之倉塲儲積及其給受之事同上本朝倉部判司事一人以無職事充凡倉庾受納租税出給廪禄之事皆歸三司而别置提㸃倉塲官以督察本司續㑹要初除韓正彦焉職畧建炎三年詔罷司農寺本寺諸倉塲事務𨽻倉部紹興三年復舊中興㑹要歲漕東南粟六百萬石以實中都茲用命汝以廪人之職惟當于㑹計則無曠爾官曲阜制記纂淵海卷二十七
