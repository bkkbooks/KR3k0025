body:
  text: 記纂淵海卷四十五宋潘自牧撰性行部奔競經闕子髙門懸薄無不走也荘子史宋公子鮑無日不數於六卿之門左文十六年鄒陽曰何王之門不可曳長裾乎西漢本傳王氏方盛賓客滿門五侯各有所厚不得左右唯樓䕶盡得其歡心前漢互入交結張湯造請諸公不避寒暑鄭當時為太子舍人每五日洗沐嘗置驛馬長安諸郊請謝賓客夜以繼日至明旦常恐不徧西漢本傳持苞苴而請謁效鷹犬以飛馳奔走權門唐𤣥宗贊唐順宗永貞元年王叔文王伾等任事十餘家之門車馬如市客候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之通鑑互入無恥集抗塵容而走俗狀北山移文朝集金張館暮宿許史廬左太沖詩悠悠風塵皆奔競之士于令升晉紀論望影星奔藉響川騖雞人始唱鶴盖成隂髙門旦開流水接軫劉孝標絶交論出没風塵之内漂淪名利之間駱賓王朝叩富兒門暮隨肥馬塵出入朱門家杜詩三百六旬長擾擾不衝風雨即塵埃韓集惟名利之都府兮羌衆人之所馳竸乗時而射利兮紛變化其難推復志賦蠅營狗苟伺候於公卿之門奔走於形勢之途足将進而趑趄口将言而囁嚅處汙穢而不羞觸刑辟而誅戮韓集縦談作者之筵曳裾名卿之門抵掌峩弁厚自潤澤進越無恧栁集僧臨大道閱浮生来往憧憧利與名二十八年何限客不曽閒見一人行元微之集互入識者所規抗喉舌胝敏拇以干東諸侯劉賓客客路如天逺侯門似海深杜荀鶴集觸熱到人家唐陳暁詩到處公卿席無辭酒盞深白樂天互入無恥匣有青萍笥有書何門不可曳長裾吕和叔本朝皇皇走聲利與日争寸晷歐公集梁何思澄終日造謁每宿夕作名紙一束曉便命駕朝賢無不悉狎所在命食續世說卓行經君子獨立不懼君子以立不易方不易乎世不成乎名易儒有澡身而浴徳世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者禮記史原憲閭巷讀書懐獨行君子之徳義史記游俠傳絶世而獨立西漢李夫人傳蕭詧不好色惡見婦人相去數丈猶聞其臭梁書陽城年少不肯娶謂弟曰吾與若孤惸相育既娶則間外姓雖共處而益疏我不忍弟義之亦不娶遂終身唐書本傳集鷙鳥不羣懐質抱清獨無匹兮金相玉質百嵗無匹楚辭清風激萬代名與天壤俱張景陽詩砥節礪行郭有道碑元大夫生六十餘年而卒未嘗識婦人而視錦繡元次山士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者盖天下一人而已矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足為明崒乎太山不足為髙巍乎天地不足為容也韓集同流合汙子同乎流俗合乎汙世孟子史與世同塵隨波瀾而俱逝北史隠逸序澹泊經不役耳目百度惟貞書儉於位而寡於欲禮記君子之道淡而不厭記中庸子含哺而熙乎澹泊郭荘子序形如槁木心如死灰虛靜恬淡寂寞無為不與物交淡之至也荘子史不流世俗不争勢利上下無所凝滯人莫之害史記滑稽傳序寡欲易足前漢景帝亷靜樂道不交接世俗西漢劉向傳清靜無為少嗜欲不汲汲於富貴不戚戚於貧賤揚雄傳攻苦食啖啖當作淡西漢叔孫通傳陶潛閒靜少言不慕榮利晉書本傳晉簡文帝性沖澹所居凝塵滿席湛如也晉書宅心事外晉書樂廣傳王導簡素寡欲晉書到溉虛室單牀旁無姬侍梁書澹於榮利北史韋瓊傳楊綰性沈靜獨處一室左右圖書凝塵滿席澹如也楊綰清談終日而不及榮利唐書傳記王恭曰恭作人無長物世說集澹泊為徳司馬相如子虛賦慮淡物自輕謝靈運湖中作吾子洗然恬淡自逸潘安仁贈陸機與世無營神氣晏和稽叔夜幽憤詩林園無世情陶淵明塗口詩輕禄傲世與物無競文選七啓曠然無憂患寂寞無思慮清虚靜泰少私寡欲憎愛不棲於情憂喜不留於意稽叔夜養生論養心澹然不染物累清節素履陳子昂惟将淡若水長揖古人風駱賓王吾老世味薄韓集互入晚景門庭畏客頻骨清慮不喧杜詩大道本夷曠髙情亦沖虚孟東野其如心似不然灰劉賓客面上滅除憂喜色胷中消盡是非心水能性淡為吾友竹解心虛是我師自盡其心延夀命無求於物長精神五欲已銷諸念息世間無境可勾牽每因齋戒斷葷腥漸覺塵勞染愛輕六賊定知無氣色三尸應恨少恩情互入省悟彼此假命非本物其間何怨亦何恩白侍郎詩慣無身外事不信世間愁姚少監楚雲澹無心劉長卿其為心必泊然無所起其於世必澹然無所嗜韓集一身已無累萬事更何欲劉賓客髙情雅淡世間稀深與世情薄委身在丘壑劉長卿以虛舟應物世累不能干其神惡千金之藏鄙十卿之禄治家無􅎇産奉身無長物並文粹逢人不說人間事便是人間無事人杜荀鶴不是眼前無俗事不闗心事不經心元微之集本朝淡泊味愈長歐詩道味自飴世芬莫嗅東坡祭栁子玉趙清獻公初知成都攜一龜一鶴以行其再任也屏去龜鶴止一蒼頭執事吕氏家塾記遊神清淨之庭守徳寂寞之宅東坡外制為嫌歸舍兒童䀨故就僧房借榻眠臨川集冷淡為歡意自長東坡詩棋中機械不願看琴裏語言時喜聽邵堯夫平生輕長物身世等鴻毛僧參寥子平生寓物不留物東坡詩耽好經飲酒濡首亦不知節也易惟慢遊是好罔晝夜頟頟盤遊無度顛覆厥徳沈亂于酒沈湎冒色玩物喪志恒舞于宫酣歌于室殉于貨色恒于遊畋内作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡惟耽樂之從酗于酒徳書士之耽兮猶可說也女之耽兮不可說也式號式呼俾晝作夜詩流湎以忘本禮記子從流上而忘反謂之流從流下而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡孟子嗜欲深者天機淺荘子鄭公孫穆後庭比房數十皆擇穉齒婑媠者以盈之方其耽於色也屏親昵絶交遊逃於後庭以晝足夜三月一出意猶未惬欲盡一生之歡窮當年之樂惟患腹液而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也列子酒食聲色之中瞞瞞然瞑瞑然荀子善游者溺善騎者墮各以其所好反自為禍是故好事者未嘗不中傷也淮南子史君多内寵左桓十一年鄭伯有嗜酒為窟室而夜飲酒左襄三十年齊恵欒髙氏皆嗜酒信内多怨左昭十年說婦人言故多怨尤物足以移人左昭二十七年楚夫人鄭袖所言皆從史記張儀傳娛耳目而樂心意麗靡爛漫於前靡曼美色於後史記司馬相如傳荘王左抱鄭姬右抱越女坐鐘鼔之間世說楚世家商紂好酒淫樂嬖於妲己妲己之言是從史記殷本傳中山王勝為人樂酒好内有子百二十餘本傳後房婦女以百數西漢田蚡傳張敞為京兆尹為婦畫眉長安中傳張京兆眉嫵西漢本傳寧不知傾城與傾國佳人一失難再得前漢外戚傳後堂理絲竹西漢張禹傳前堂羅鐘鼓西漢田蚡傳謝安愛好聲律晉書王坦之傳孟嘉好酣飲愈多不亂桓温問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳晉書本傳謝安雖放情丘壑然每遊賞必以妓女從本傳山簡每至髙陽習家池飲酒大醉而歸劉伯倫銜盃潄醪無思無慮其樂陶陶晉書齊東昏侯寵潘貴妃乃於殿中鑿金為蓮以貼地令潘姬行其上曰此步步生蓮花通鑑李元忠雖處要任不以物務干懐唯飲酒自娛丞相歡欲用為僕射世子登言其放達常醉不可委以臺閣其子操聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒通鑑梁武紀置左右教坊以教俗樂樂工數百人自教法曲於梨園謂之皇帝梨園弟子通鑑唐𤣥宗傳記鴻臚孔羣好飲酒王丞相語云卿恒飲酒不見酒家覆瓶布日月久則糜爛羣曰公不見糟中肉乃更堪久王孝伯問王大阮籍何如司馬相如王大曰阮籍胷中壘磈故須澆之王大嘆曰三日不飲酒覺形神不復相親王孝伯云名士不須竒才但使常得無事痛飲酒讀離騷便可稱名士也世說文君眉色不加黛飾臉若芙蓉長卿素有消渇疾作美人賦自刺卒以此疾死西漢雜記互入明知故犯上又起明光宫發燕趙美女三千人充之建章未央長樂三宫輦道相續使三婦人知書者為僕射大者領四百人小者領一二百人與上同輦者十六人皆自然美麗不施粉黛上能三日不食不能一日無婦人漢武帝故事集茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲杜詩不解文字飲惟能醉紅裙艷姬踏筵舞清眸刺劎㦸韓集盖覆西施鳳花錦身作匡牀臂為枕唐文粹花鬚栁眼各無賴紫燕黄蜂俱有情李義山淫亂經朋淫于家淫佚于匪彞用燕喪威儀作竒技淫巧書中冓之言不可道也所可道也言之醜也期我乎桑中要我乎上宫送我乎淇之上矣滛荒昏亂游蕩無度詩夫惟禽獸無禮故父子聚麀淫於色而害於徳禮記宣公小大其聲怡恱婦人詩雄雉箋子吳越之俗男女無别同川而浴孔叢子史齊慶封耆酒以其内實遷於盧蒲嫳氏易内而飲酒左傳陳靈公與孔寧儀行父通於夏姬皆衣其衵服以戯於朝洩冶諌曰公卿宣淫民無效焉左宣九年貪色為淫淫為大罰左成二年商紂以酒為池懸肉為林使男女倮相逐於其間為長夜之飲史記殷本紀匈奴父子乃同穹廬而卧史記本傳沈溺放恣西漢景十三王傳贊賓客相過以婦侍宿嫁娶之夕男女無别反以為榮西漢地理志抱哺其子與公併倨坐汙穢者曰帷薄不修賈誼傳設長夜之淫宴東漢邉讓傳帷薄不修袵席無辨東漢皇后紀序楊國忠與虢國夫人居第相鄰晝夜往来無復期度或並轡走馬入朝不施障幕道路為之掩目安禄山得出入禁中因請為貴妃兒上與貴妃共坐禄山先拜貴妃上問何故對曰胡人先母而後父禄山生日上及貴妃賜衣服寶器酒饌甚厚後三日召禄山禁中貴妃以錦繡為大襁褓褁禄山使宫人以綵輿舁之上聞後宫喧笑問其故左右以貴妃三日洗禄兒對上自往觀之喜賜貴妃浴兒金銀錢復厚賜禄山盡歡而罷自是禄山出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲聞於外上亦不疑也通鑑唐𤣥自天寶以来公卿大夫竸為游宴沈酣晝夜擾雜子女不愧左右通鑑唐穆集漸漬荒沈往而不返陳琳檄恬退經君子辭貴不辭賤辭富不辭貧禮記子人皆取先己獨取後荘子史石慶為丞相乞骸骨歸避賢者路史記本傳平當為丞相上召欲封當當病篤不應召或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐責矣起受侯印還卧而死死有餘罪今不起者所以為子孫也前漢互入貽厥後司馬相如任官未嘗肯與公卿國家之事嘗稱疾閒居不慕官爵本傳豈不牽位穢我王朝西漢韋賢傳應劭曰豈不戀此爵位乎疏廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石不去懼有後悔豈如父子相隨出闗歸老故鄉以夀命終不亦善乎即日父子俱移病上疏乞骸骨受乃廣兄之子也西漢本傳互入知足杜門不朝請西漢王陵傳杜字本作􅖏杜篤二十年不闚京師西漢文苑傳不愛權勢聲名東漢馬廖傳任髙百辟情惟一丘謝安傳王奐常賃灌園恥交勢利謝丞後漢書范丹傳張翰曰人生貴得適志何能羈宦數千里以要名爵乎潘岳遷博士輒去官免自弱冠涉於知命之年三遷而已於是退而閒居於洛之涘晉書本傳王導能任真推分澹如也有識皆稱善處興廢通鑑晉紀蔡謨除司徒三年不就職詔書屢下謨終不受命臨軒遣侍中紀據黄門郎丁纂徵謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至詔免謨為庶人通鑑晉穆互入有守謝安少有重名前後徵辟皆不就寓居會稽以山水文籍自娛雖為布衣時人皆以公輔期之士大夫至相謂曰安石不出當如蒼生何通鑑東晉海西公紀沈慶之先有四宅又有園舍在婁湖慶之一夕攜子孫及中表親戚徙居婁湖以四宅輸官非賀朝不出門車馬率素從者不過三四人過之者不知其為公也通鑑宋世祖紀清規懋賞與白雲俱潔厭榮捨紱以松竹為心通鑑辭蟬捨冕遂其沖挹之性東昏侯紀陶𢎞景永平十年脫朝服衣冠挂神武門上表辭禄詔許之齊書本傳蜀王宗弁杜門不出曰亷者足而不憂貪者憂而不足後梁太祖司空圖名亭曰休休作文以見志曰量才一宜休揣分二宜休老而瞶三宜休唐書本傳裴度晚節頗浮沈為自安計唐書本贊逍遥林亭保安宗族通鑑周世宗傳記肅宗既還京師泌辭去云臣有五不可住臣遇太早陛下用臣太重恩太深功太髙而跡太竒鄴侯集脫冠謝朝列謝靈運詩功成不受賞長揖歸田廬左太沖詩閉闗却掃塞門不仕江淹恨賦投簮髙邁陶𢎞景與從兄書抽簮解朝衣文選景陽詠史投冠旋舊墟不為好爵榮陶淵明詩挂冠裂冕已辭榮南畝東華事耕鑿賓階客院常疎散蓬徑柴扉終寂寞自有林泉堪隠構何必山中事丘壑駱賓王解佩收朝帶抽簮换野巾杜詩紅顔棄軒冕白首卧松雲事了拂衣去深藏身與名李白集出車山林揮手青門擁途而祖者唯恐不及非仁聖不能全不奪之操非堅明不能果獨往之志惇史古風復行於今羣公惜别飛盖擁道如漢廷祖二疏故事李義山不矍矍於進取左絃右壺樂以自放栁文鳳閣鸞臺路從教年少争劉賓客隨山歸少海就日背長安劉長卿新辭将印拂朝纓臨水登山四體輕脫屣將相守沖謙唯於山水獨不㢘劉賓客没齒為閒官挂印著公門蒲栁質易朽麋鹿心難馴冝當早罷去收取雲泉身宦情薄似紙漸消名利想無夢到長安厚真退之風遏躁進之俗貂蟬雖未脫鸞鳳已不羈陶君三十七挂綬出都門白侍郎能以功成疏寵位不將心賞負雲霞錢起倒冠落佩兮與世闊疏杜牧之時過無心求富貴身閒不學見公卿王建集本朝曽看元臣調鼎鼐却將田叟問耕耘已上印書辭北闕稍留冠葢餞東門歐公集秋光都似宦情薄山色不如歸興濃張詠詩見機禍福之先脫屣塵埃之外見故人而一笑綽有餘歡念平生之百為一無可恨天眷雖隆莫奪己行之志士流太息共髙難進之風雖外為天下惜老成之去然私喜明哲得保身之全蘇東坡集付青簡以遺事追赤松而並遊斂藏為國之方勉就還家之樂進退有裕卷舒適宜留侯志於赤松晉公安於緑野退居水石之鄉自放簮裳之外優游空寂有以知萬物之輕呼吸清華有以期百年之夀坐而論道本無黄髪之嫌出以濟時何負赤松之約而能去如脫屣名重太山近世以来一人而已方將翺翔嵩少之下泝洄伊洛之間身寄白雲堂開緑野釋鐘鼎之重負收竹帛之餘光髙風所振清議益隆身安氣定色如玉脫遺世俗心浩然蘇子由集薄有田園歸去好苦無官况莫来休陸子履詩躁進經自獻其身記不仁者不可以久處約論語子晉國亦仕國也未嘗聞仕如此其急孟子罪莫大於好進進不以道文中子史衛鞅因嬖臣景監以求見秦孝公說以富國強兵之術通鑑周紀互入由徑中書郎王融自恃門第三十内望為公輔曰車前無八騶何得稱丈夫通鑑南齊武紀本朝蘇易簡特受太宗顧遇性特躁進罷參政知鄧州年纔逾壯有不勝寒冷之歎贈老僧詩曰憔悴貳卿三十六與師氣味不争多又移書親舊曰退位菩薩難做竟不登強仕而卒世言躁進有夏侯嘉正為館職平生好燒銀常曰吾得見水銀一錢知制誥一日無恨矣俱不諧而卒錢僖公惟演自樞密使為使相歎曰使我於黄紙盡處押一箇字足矣魏泰東軒雜録由徑經闚觀女貞亦可醜也易王孫賈曰與其媚於奥寧媚於竈論語皇父卿士番維司徒家伯冢宰仲允膳夫棸子内史蹶維趣馬楀維師氏豔妻煽方處詩注六人相連於朝皇父為首互入交結子不由其道而往者與鑽穴隙之類也舍正路而不由哀哉孟子史衞鞅因嬖臣景監以求見秦孝公說以富國強兵之術通鑑周紀互入躁進蕭至忠自託於太平公主引為刑部尚書唐中宗紀互入交結自大歴以来節度使多出禁軍其禁軍大将皆以倍稱之息貸錢於富室以賂中尉動踰億萬然後得之未嘗由執政至鎮則重斂以償所負及王沛薨裴度韋處厚以髙瑀代之中外相賀曰自今債師鮮矣通鑑唐文紀集捷徑從狹路阮嗣宗詠懐避名經爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳書為人臣之禮不顯諫禮記史臣不專大名善則稱君過則稱已穀梁宣公二年晉師歸范文子後入武子曰無為吾望爾也夫對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢左成二年互入謙抑宋平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執朴以行築者而抶其不勉者左襄十六年箕子曰爲人臣諫不聽而去是彰君之惡而自託於民也吾不忍為也乃被髪徉狂而為奴史記世家魯朱家隂脫季布之阨及布尊貴終身不見史游俠傳孔光有所薦唯恐人聞名張安世常有所薦其人来謝安世大恨以為舉賢達能豈有私謝耶絶弗與通丙吉有舊恩而不言孔光時有所言輒削草稿以為章主之過以干忠直人臣之大罪也西漢本傳陳重在郎署有郎負息數十萬債主日至煎求無已重密以錢代還郎後覺知厚辭謝之重曰非我之為將有同姓名者終不言恵謝丞後漢書韓康採藥賣於長安市三十餘年時有女子買藥康守價不移女子怒曰公是韓伯休那乃不貳價耶康歎曰我本欲避名今小子皆知有我焉用藥為乃遯入霸陵後漢互入欲晦而章諸葛亮茍全性命於亂世不求聞達於諸侯三國魏明紀清畏人知晉胡質傳楊綰不好立名唐書本傳羊祜每薦舉人未嘗知曰拜爵公朝謝恩私室豈人臣之節晉書本傳帝定禍亂而房杜不言功唐書房杜贊婁師徳薦狄仁傑師徳不言仁傑不知武后問仁傑曰師徳賢乎曰不知又問之知人乎曰未聞其知人后曰朕用卿師徳薦也婁師徳傳傳記樂毅曰忠臣之去國也不潔其名戰國策山濤為吏部尚書用人皆先密啓然後公奏通典本朝王旦在相位每薦引人未嘗知薦冦凖同中書門下平章事凖入見曰非陛下知臣何以至此真宗具道公所以薦凖始愧歎以為不可及王旦神道碑范鎮論熙寧法制至廢黜不用公既得謝軾往賀之曰公雖退而名益重矣公愀然不樂曰君子言聽計從消患於未萌使天下隂受其賜夫使天下受其害而吾享其名吾何心哉東坡文范忠宣公在相位凡薦引人才必以天下公議所薦士未嘗知出於公公亦未嘗示恩意於人三朝言行録互入徇公忘私好名子獨弦哀歌以賣名聲於天下者乎荘子好名之人能讓千乗之國孟子史烈士徇名漢賈誼傳互入節操皇甫規自以西州豪傑恥不得與自上書附黨蔡邕曰孤特一身得託名忠臣死有餘榮通鑑杜預好為後世名嘗言髙岸為谷深谷為陵刻石二碑紀其勲績一沈萬山之下一立峴山之上晉書本傳劉晝每言使我數十卷書行於後世不易齊景之千駟也北史揚巳取名唐書房𤣥齡贊熊執易疏論裴延齡相以示歸登登動色曰願竄吾名雷霆之下君難獨處歸登傳互入疾惡傳記謝敷字慶緒隠若耶山初月犯少㣲星少㣲一名處士星時戴逵名著於敷時人憂之俄而敷死故會稽人嘲曰吳中髙士要死不得死孫氏晉陽秋互入失望集賣身買得千年名李太白士生為名累有佀魚中鈎韓集古人貴身没而名存皇甫湜唯將道業為芳餌釣得髙名直至今杜荀鶴掠美經闕子賣聲名於天下荘子史已惡而掠美為昏左傳管晏暴君之過取身後名唐馬周傳市恩經闕子闕史吕相曰我有大造於西也左桓十三年陳氏以家量貸而以公量收左賣弄國恩東漢馮勤傳集奪我身上煖買爾眼前恩白樂天見危者已墜而欲援觀鬬者將死而方救皮日休互入不成恩恵安靜經無作聰明亂舊章罔以側言改厥度君罔以辨言亂舊政書不愆不忘率由舊章詩静而後能安安而後能慮記大學仍舊貫如之何何必改作論語子治國而數變法則民苦之是以有道之君貴虛静重變法也韓子史聖人不易民而教智者不變法而治因民而教者不勞而成功縁法而治者吏習而民安之史商鞅傳不變不革黎庶攸寧太史公自序利不百不變法法古無過循禮無邪史記商鞅參代何為相國舉事無所變更一遵何之約束擇郡國吏長大取年長大者訥於文辭謹厚長者召除為丞相史吏言文深刻欲務聲名輒斥去之曺參傳蕭曺為相鎮以無為漢刑法志蕭何為法較若畫一曹參代之守而勿失載其清浄民以寧一曹參去齊屬其後曰以獄市為寄謹勿擾也本傳為政貴因循而重改作前漢蕭規曹隨揚雄傳循髙祖之法則治不循則亂西漢梅福傳安静之吏悃愊無華東漢章紀襄城令劉方吏民同聲謂之不煩雖未有他異斯亦殆近之矣通鑑漢和紀安静之吏日計不足月計有餘東漢安紀互入不可淺量陸象先曰天下無事當静之於源亦何不簡前後為治其政如一陸象先嘗謂人曰天下本無事但庸人擾之爾苟清其源何憂不治通鑑傳記利不百者不變俗功不什者不易器戰國䇿集無波古井水白侍郎静者心多妙杜詩本朝古井無由波湛然如古井終嵗不復瀾東坡自作不靖經罪自已招無所怨咎易自作弗靖惟汝自生毒乃敗禍姦宄以自灾于厥身起穢以自臭自作孽不可逭書自求辛螫下民之孽匪降自天噂沓背憎職競由人自貽伊慼詩子助之長者揠苗者也非徒無益而又害之孟子所謂無病而自灸者也荘子三王既已定法度制禮樂而傳之有不用而改自作何以異於變易牙之和更師曠之律荀子史沈尹戌曰吾子殺人以興謗今吾子好讒以自危也左傳變古亂常不死則亡史記晁錯傳論互入紛擾何乃取髙皇帝約束紛更之為史記汲黯傳互入紛擾有短垣而自踰之吳語集狐九尾而自擾左太沖魏都艾骨自瘡燕公表遂自顚倒若杵投臼韓集滅六國者六國也非秦也族秦者秦也非天下也杜牧之人養虎被虎嚙人媚蟇被蟇瞎乃知恩非類一一自作孽盧仝無風自飄簸韓南山詩喜功生事經無作聰明亂舊章書互入安静子闕史小人之性釁於勇嗇於禍以足其性而求名焉者左襄二十六年釁動也嗇貪也好興事舞文法史記汲黯傳陸象先曰天下本無事但庸人擾之通鑑唐紀陸長源性剛刻多更張舊事通鑑唐徳宗簡易經夫乾確然示人易矣夫坤隤然示人簡矣易則易知簡則易從易知則有親易從則有功易簡而天下之理得矣易簡之善配至徳易大樂必易大禮必簡禮記子君子之道有四易簡而易用也要而易守也炳而易見也法而易言也揚子史夫政平易近民民必歸之史記魯世家石慶於兄弟最為簡易本傳為人簡易佚蕩揚雄傳互入氣槩莫府省文書李廣傳文書調役務從簡寡通鑑漢光武紛擾經禮煩則亂書蕩而不静水煩則魚鼈不大記子何為紛紛然孟子膠膠擾擾荘子風波駭而魚鼈擾於淵織羅密而羽禽躁於澤豺狼衆而走獸劇於林爨火猛而小鮮糜於鼎也抱朴子史何乃取髙皇帝約束紛更之為汲黯傳互入自作不靖太史公曰變古亂常不死則亡史記晁錯互入自作不靖輷輷殷殷若三軍之衆史記蘓秦傳如蝟毛而起賈誼傳傳記千載遵行持為故事一朝糾正必驚愚俗史通集鼇戴山抃何以安之楚辭洪波振壑川無恬鱗驚飇拂野林無静柯殷仲文表雲海方蕩潏孤鱗安得寧陳子昂互入世路嶮􅇖環四海以為鼎跨九垠以為爐㸑以毒燎煽以虐焰其人沸湧灼爛號呼騰蹈莫有救止栁文本朝擾擾如一鼎之沸安有清冷處諸儒鳴道喧譁經民興胥漸泯泯棼棼書如蜩如螗如沸如羮詩史諸將盡讙通鑑髙紀國中語口籍籍西漢江都王傳一營大譟唐書集衆鳥萃而啾號兮沸洲渚以連山栁文喧啾百鳥羣韓集本朝春蛙夏蜩更嘈雜土蚓壁蟫何碎瑣黄魯直詩荒池暮夜蛙閤閤食案白日蠅營營陸游詩謙抑經善世而不伐謙尊而光卑而不可踰謙謙君子卑以自牧無不利撝謙天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙互入儆戒以貴下賤勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也有大者不可以盈故受之以謙用壯處謙壯乃全也易不自滿假推賢讓能庶官乃和書非其臣則答拜之善則稱人過則稱已不自尚其事不自尊其身儉於世而寡於欲讓於賢卑已而尊人小心而畏義君子不自大其事不自尚其功后稷欲行之浮於名也言其謙君子雖自卑而民敬尊之禮記言謙者所以成其徳子曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也記中庸客車不入大門記孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也不恥下問以能問於不能以多問於寡有若無實若虛論語子損其自多以虚受之故能成其博也富貴而下人何人不與家語附之以韓魏之家如其自視欿然則過人逺矣孟子江海之所以為百谷王者以其善下之也老子盛徳若不足人皆取先己獨取後人皆取實己獨取虛荘子爵益髙者意益下功益大者心益小晏子史晉師歸范文子後入武子曰無為吾望汝也夫對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢左成二年互入避名孔子在位聴訟文辭有可與人共者弗獨有也史記孔子世家温良謙退不以行能驕人漢藝文志尹翁歸温良謙退不以行能驕人衞綰不與他將争有功常遜他將前漢書征西功若丘山猶自以為不足馮異傳趙咨曰吳國如臣之比車載斗量不可勝數三國志唐彬與王濬共伐吳彬知賊冦已殄孫皓将降未至建鄴二百里稱疾遲留以示不竸晉書本傳吳陸抗敗羊祜還貌無矜色謙沖如常晉武紀庾亮嘗謂周顗曰諸生咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也晉書本傳帝命髙熲與賀若弼論平陳事熲曰臣文吏耳焉敢與大將論功通鑑隋髙紀楊盈川曰吾愧在盧前唐王勃傳徐知誥曰吾今老矣猶未徧達時事通鑑唐路王集忌功名之過已惡寵辱之踰量陸士衡賦序師道光而心愈讓人爵貴而心愈恭白傅集誡滿持全居豐守約司空圖文假令有取亦不敢為人師為人師且不敢况敢為子師乎栁文互入師類本朝蘇子容云歐公不言文章而喜談政事君謨不言政事而喜論文章各不矜其所能也蘇子談訓逢場作戯真呈拙誤筆成蠅豈所長陳後山詩經術貂蟬續狗尾文章瓦釡作雷鳴黄魯直詩驕矜經滿招損志自滿九族乃離謂人莫己若者亡互入妄自尊大有其善喪厥善矜其能喪厥功驕淫矜誇將由惡終書互入稔惡子子曰持滿而能久者未嘗有也故曰自賢天下之至善言不聞於耳家語史郤至與單襄公語驟稱其伐左成十六年晉叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道何敵之有牛雖瘠僨於豚上其畏不死左昭十三年君子稱其功以加小人小人伐其技以馮君子左襄十三年互入兩不相下衞侯衎復歸於衞大夫逆於境者執其手而與之言道逆者自車揖之逆於門者頷之而已左襄二十六年互入不能悔禍齊桓公自稱曰寡人兵車之會三乗車之會六九合諸侯一匡天下昔三代受命何以異於此乎史記齊世家范武子謂文子曰爾何知而三掩人於朝國語互入教子國君而驕人則失其國大夫而驕人則失其家通鑑自矜功伐史記項羽伐則掩人前漢五行志桓榮為太子少傅帝賜以輜車乗馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也東漢本傳互入淺中應劭自贊曰故太山太守應中逺北面稱弟子何如𤣥笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色後漢鄭𤣥傳光武謂臧宫云常勝之家難以慮敵後漢張紘見魏陳琳武庫賦與琳書深歎美之琳曰可謂小巫見大巫神氣殫矣吳志互入小巫見大巫石虎曰我家父子自非天壊地陷當復何愁晉書載記司徒義康耳目所經終身不忘好於稠人廣席標題所憶以示聰明宋太祖紀韓顯宗白頃聞鎮南將軍王肅獲賊二三人驢馬數匹皆為露布齊髙祖紀裴植為尚書志氣驕滿每謂人曰非我須尚書尚書亦須我梁髙祖紀後魏楊大眼謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣後魏書李密得唐髙祖書示其下曰唐公見推天下不足定於是不虞義師而專意於世充唐書王福畤少子有文嘗詫韓思彦思彦戯曰君有譽兒癖唐書王勃傳傳記章孝標及第後寄白樂天詩曰及第全勝十政官金湯鍍了出長安馬頭漸入揚州路為報時人洗眼看摭言集百勝難慮敵劉賓客妄自尊大經侮慢自賢自廣以狹人謂人莫己若者亡書子好臣其所教而不好臣其所受教孟子盜跖謂孔子曰長大美好人見而恱者此吾父母遺徳汝雖不吾譽吾不自知耶荘子史以為皆出已下史記殷本紀其辭自稱天地所生日月所置匈奴大單于漢文紀馬援曰子陽井底蛙耳而妄自尊大公孫述郄詵曰臣對䇿為天下第一猶桂林之一枝崑山之片玉晉書本傳宜都王穆夀自恃任位以為人莫己若謂其子師曰但令我兒及我亦足勝人不須苦之後魏書鄭仁表自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表唐書杜審言嘗與人曰吾文章當得屈宋作衙官吾筆當得王羲之北面唐書本傳互入誕妄傳記魏收云我視沈約正如奴耳闗東風俗傳本朝韓浦韓洎咸有詞學浦嘗輕洎語人曰吾兄為文譬如繩樞草舍聊庇風雨予之為文是造五鳳樓手筆談互入譽己毁人雀兒来往颺風髙下視鷹鸇氣意豪自謂能生千里翼黄昏依舊入蓬蒿古今詩話倔彊經愚而好自用賤而好自專記中庸互入専擅子子曰君子而彊氣則不得其死小人而彊氣則刑戮荐臻家語既不能令又不受命是猶弟子而恥受命於先師也孟子人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也勢不在人上而羞為人之下是姦人之心也荀子史既不能強又不能弱左僖七年屈彊於此西漢陸賈傳保殘守缺挾恐見破之私意而無從善服義之公心西漢劉歆傳曺景宗為人自恃尚勝每作書字有不解不以問人皆以意造南齊書本傳遣裴度至魏博宣慰以錢五百萬緍賞軍士六州百姓給復一年軍士受賜歡聲如雷成徳鄆兖使者數輩見之歎曰倔彊者果何益乎通鑑唐憲宗互入人心易感傳記不循經典自任胸懐史通惟蛇舊所識實憚口眼獰開籠聽其去鬱屈終不平韓集集譬猶鷇卵始生翰毛而便陸梁放肆陳孔璋檄韜藏經六四括囊无咎无譽用晦而明聖人以此洗心退藏于密明夷務暗易不顯其光靡哲不愚詩衣錦尚絅惡其文之著也記中庸有美玉於斯韞匵而藏諸邦無道則可卷而懐之論語子大成若缺大盈若沖大直若屈大巧若拙大辯若訥光而不耀老子千金之珠必在九重之淵列子樸素而天下莫能與之争美大白若辱盛徳若不足荘子美珠不文質有餘也淮南子仁哉樂毅善藏其用文中子史子房無知名無勇功太史公自序直不疑所臨為官惟恐人知其為吏跡不好立名稱史記本傳良賈深藏若虛君子盛徳容貌若愚史記老子傳丙吉為人深厚不伐善自曽孫遭遇吉絶口不道前恩故朝廷莫能明其功也通鑑漢宣紀鄧禹勲成智隠静其如愚後漢本傳范􅁮曰黄憲言論風㫖無所傳聞東漢匿景藏采不揚華藻東漢孟嘗傳管寧曰潛龍以不見成徳通鑑後漢諸將每論功伐復未嘗有言帝輒曰賈君之功我自知之通鑑漢光紀假令奮趐則能陵勵𤣥霄騁足則能追風躡景猶欲戢勁翮於鶴鷃之羣藏逸跡於跛驢之伍晉書葛洪傳栁芳曰𤣥齡佐太宗定天下及終相位凡三十二年天下號為賢相然無跡可尋亦至矣故太宗定禍亂而房杜不言功通鑑唐太宗傳記吾聞聖人不居朝廷必在巫醫嵇康髙士傳王湛隠徳人莫之知雖兄弟宗族亦以為癡世說金石生於沙中豫章産於幽谷新語集巧倕不斷楚辭曖曖内含光崔子玉座右銘退不飾詩書以驚愚進不賈名聲於天下江文通書立言必雅未嘗顯其所長王文憲集序緒言餘論藴而莫傳劉孝標書明不外飾黙昭於𤣥機敏實内融養蒙於用晦有天下大名而不以矜人陳子昂集瓊草隠深谷李白集忌滿光恒缺駱賓王韜爾智斧無為自伐劉賓客玉櫝不啓焉能瑕疵劉賓客彼惟恐入山之不深入林之不密其影響昩昩惟恐聞於人也幽塞未光彌縮銛利韓文匿徳藏光退居保和梓人善運衆工而不伐藝栁文且免材為累何妨拙有機杜牧之用光本於藏曜履行期於滅跡張九齡文神醫不言術囊藏透穎錐欲知花好處偏在最深叢元稹集晦即全身藥明為伐性兵互入儆戒廟算無遺䇿天兵不戰功白侍郎集匣刃不試吕和叔文韜用而光潔不喜伐露衆人皆察察而我獨昏昏文粹本朝歐公知潁州吕公著為通判為人有賢行而深自晦黙時人未甚知公後還朝力薦之遺事互入知人乍為含垢千尋濁不作矜人一掬清僧參寥子不求人知經不患人之不已知患不知人也子曰人不知而不愠不亦君子乎論語子芝蘭生於深林不以無人而不芳家語為善於家荀子舟浮江海不為莫乗而沈君子行道不為莫知而止文子荃蓀孤植不以巖隠而歇其芳石泉潛流不以澗幽而不清列子集蘭之猗猗揚揚其香不採而佩於蘭何傷韓文如楩楠生於深林未始自貴而度材者一盼歆然在懐劉賓客無人自芳馨白侍郎本朝不以遊人只自芳陳後山詩表襮經小人之道的然而日亡記中庸子飾智以驚愚修身以明汙昭昭乎如掲日月而行荘子的的者獲提提者射淮南子史為天下表的通鑑漢光武虛名無實徒足為世之質的將安用之晉安紀王勃等有才而浮躁衒露裴行儉傳皓皓者易汙嶢嶢者難全魏徵傳贊揚已取名瞭然使戸曉者盖房杜之細耶唐書傳記鵠的非咎罪於人少長貴賤則同心以貫之何也惡其示人以難也戰國策郝隆七月七日日中仰卧人問其故答曰我晒腹中書世說集露才揚已班固說楚辭木秀於林風必摧之堆出於岸流必湍之李蕭逺運命論互入因才取禍本朝昭昭然自為的於天下使天下之過者莫不欲援弓而射之東坡孟子論衒鬻經自獻其身禮記子自鬻以成其君孟子大冶鑄金金踴躍曰我且必為鏌鋣大冶必以為不祥之金荘子史漢武初即位四方士上書自衒鬻者以千數東方朔傳有郎功髙不調自言安世安世應曰君之功髙明主所知人臣執事何長短而自言乎通鑑漢宣紀謝萬善自􅃷曜晉書本傳舒元輿自負才有過人者銳進取太和中獻文闕下久不得報上書自言馬周張嘉貞代人作奏卒為名臣今臣備位於朝自陳文章凡五晦朔不一報竊自謂才不後周嘉貞也新唐書本傳武后時和逢堯負鼎詣闕下上書自言願助天子和飪百度唐書本傳集自衒自媒者士女之醜行也干時求進者道家之明忌也曺子建求自試表推遜經帝咨禹平水土禹讓於稷契及臯陶咨垂共工垂讓於殳斨暨伯與咨益作虞益讓於朱虎熊羆咨伯作秩宗伯讓於夔龍推賢讓能庶官乃和書互入謙抑善則稱人觴酒豆肉讓而受惡衽席之上讓而坐下朝廷之位讓而就賤君子尊讓則不争不争則逺於鬬辨矣不鬬辨則無暴亂之禍矣斯君子之所以免於人禍也禮記如其禮樂以俟君子論語子辭讓之心禮之端也孟子夫惟不爭故無尤聖人之道為而不争夫惟不争故天下莫能與之争老子如其制作以俟明哲文中子史秦伯享晉公子子犯曰吾不如衰之文也請使衰從公子重耳也衰趙衰也左襄二十三年晉郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉左成二年范宣子讓其下皆讓左互入表率相如退而讓頗名重太山史記本傳論相如每朝會不與亷頗同列望見亷頗引車避匿本傳張儀曰蘇君之時儀何敢言史記張儀傳陳平曰髙祖時勃功不如臣及誅諸吕臣功亦不如勃願以右丞相讓勃通鑑漢髙后舜命九官濟濟相遜前漢劉向傳衛綰有功常讓他將西漢本傳事有功善推之於下通鑑漢宣唐彬與王濬共伐吳彬知賊冦已殄孫皓將降未至建鄴二百里稱疾遲留以示不競果有先到者争物後到者争功晉書本傳以鼎足任重而終辭三事固求罷職晉書載記湯鶩傳臣有何功可以堪之何心可以安之身辱髙任顚覆尋至願守先人之敝廬豈可得哉臣不能推其徳達其功使聖聴知勝臣者多未達者不少假令有遺徳於版築之下有隠才於屠釣之間而朝議用臣不以為非臣處之不以為愧所失豈不大哉臣忝竊雖久未若今日兼文武之極寵等宰輔之髙大也晉書上賞謝朓之功遷尚書吏部郎朓上表三讓上不許中書疑朓之未及讓國子祭酒沈約曰近世小官不讓遂成常俗謝吏部今授超階讓别有意夫讓出人情豈闗官之大小耶南史謝朓傳隋髙熲深避權勢上表遜讓於蘇威通鑑陳紀盧懐慎同平章事自以才不及姚崇事皆推而不專唐書本傳孜孜奉國知無不為臣不如𤣥齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彦博濟煩治劇衆務必舉臣不如胄以諌諍為心恥君不及堯舜臣不如徵唐王珪傳互入明於自知每議事𤣥齡必曰非如晦莫籌之及如晦至卒用𤣥齡䇿也杜如晦傳本朝迺者河決澶淵毒流淮泗百堵皆作盖僚吏之劬勞一版不沈本朝廷之威徳而臣下掠衆美上貪天功獨竊璽書之榮以為私室之寶東坡徐州謝表貪功史貪天之功以為己力左僖二十四年吳起事魯君齊人攻魯魯欲以爲將起娶齊女為妻而魯疑之起欲就名遂殺其妻以明不與齊也史記本傳互入殘忍諸將争功紛紛不已淮安王神通曰房𤣥齡杜如晦等專弄刀筆功居臣上通鑑唐太宗傳記齊欲伐魏淳于髠曰韓盧天下之疾犬東郭逡海内之狡兔盧逐逡環山者三騰山者五兔極於前犬廢於後犬兔俱罷各死其處田夫見而擅其功戰國䇿互入與人為地記纂淵海卷四十五
