body:
  text: 記纂淵海卷四十四宋潘自牧撰性行部欺罔經譸張為幻尚書以空作見文書與實不相應也周禮註假於鬼神時日卜筮以疑衆殺記子飾智以驚愚莊子狎侮欺紿亡所不為向氏以國氏之謬已也以國氏之重罔已也燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而歎指舍曰此若先人之廬乃潸然而泣指壠曰此若先人之塜其人哭不自禁同行者啞然大笑曰予昔紿若此晉國耳列子互入愚暗楚人握山雉者欺路人曰鳳凰也路人曰我聞鳳凰今始見矣請買千金弗與請加倍乃與之尹文子史趙髙獻鹿謂之馬二世問左右此乃鹿也左右皆曰馬也二世驚自此為惑乃召太卜令卦之太卜曰奉宗廟鬼神齋戒不明乃至於此李斯傳互入阿附瞽說欺天西漢郭承傳滿讕誣天谷永傳元光二年李少君以祠竈却老方見少君善為巧發竒中甞從武安侯飲坐中有九十餘老人少君乃言與其大父游射處老人為兒時從其大父識其處一坐盡驚少君言上曰祠竈可致物致物而丹砂可化為黄金夀可益蓬萊仙者可見以封禪則不死黄帝是也居乆之李少君病死天子以為化去不死而海上燕齊恠迂之方士更多言神仙事矣元狩四年齊人少翁以鬼神方見拜少翁為文成將軍居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書言甚恠天子識其手書問其人果是偽書於是誅文成將軍而隱之元鼎二年丁義薦方士欒大大敢為大言處之不疑大言曰臣甞往來海中海中見安期羨門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黄金可成而河決可塞不死之藥可得仙人可致也元鼎四年齊人公孫卿曰黄帝仙登于天黄帝採首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黄帝上騎龍與羣臣後宫七十餘人俱登天於是天子曰嗟夫誠得如黄帝吾視棄妻子如脱屣耳元封二年公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城遂至東萊宿留之數日無所見見大人跡云公孫卿言仙人好樓居於是上令長安作蜚廉觀甘泉作益壽延夀觀持節設具而候神人天子病鼎湖甚巫醫無所不致不愈游水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君言曰天子無憂病病少愈強與我㑹甘泉病良已置酒夀宫神君非可得見聞其言與人音等時去時來來則神君所言上使人受書其言命之曰畫法其語世俗之所知也無絶殊者而天子心獨喜其事秘世莫知也上祭黄帝塜橋山釋兵須如上曰吾聞黄帝不死今有塚何也公孫卿曰黄帝已仙上天羣臣思慕葬其衣冠情不覆其貌者謂之偽毀譽失其真者謂之誣言事失其類者謂之罔前膠東相王成偽自増加流民八萬口蒙顯賞是後俗吏多為虛名云通鑑漢武昔秦始皇使徐福發男女入海求仙採藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以術窮詐得誅夷伏辜通鑑漢元紀盜賊始發其源甚微部伍吏人所能擒也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通鑑漢平紀譬猶畫工惡圖犬馬而好作鬼魅誠以事實難形而虛偽不窮也通鑑漢殤紀繁文偽飾欺天罔人通鑑𤣥黄改色馬鹿易形東漢王逸傳時宦官並起第宅擬制宫室帝常登永安候臺宦官恐望見之乃使趙忠等諫曰人君不當登髙登髙則百姓離散自是不敢復登臺榭東漢宦者傳武帝下令曰昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女世人謂之撾婦翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黒欺天罔上者也魏志互入妄偽嵩髙道士潘誕自言三百嵗為帝合鍊金丹常役數千人所費巨萬鑿嵩髙大石深百尺者數十處凡六年丹不成通鑑隋煬紀驛書上聞旬月方報其敗喪則減百而為一其捃獲則張百而成千通鑑唐徳宗紀禄山奏言去春營州蟲食苗臣焚香祝天云臣若操心不正事君不忠使蟲食臣心臣若不負神祗願使蟲散即有羣鳥從北來食蟲立盡請宣付史官通鑑唐𤣥宗紀或告第五琦受人金二百兩遣御史劉期光追按之琦曰琦備位宰相二百金不可手挈若付受有憑請准律科罪期光即奏琦已服罪通鑑唐肅宗紀髙力士有養女嫠居東京頗能言宫中事女官李真一意其為沈太后詣使者具言其狀髙氏辭稱實非太后驗視者益疑之徑迎入居上陽宫供奉左右誘諭百方髙氏心動乃自言是通鑑唐徳宗紀肆騁譎恠其進對皆他人莫敢言者延齡言之不疑亦人之所未甞聞徳宗頗知其詐裴延齡傳互入妄誕唐太宗責髙徳孺曰汝指野鳥為鸞以欺人主取髙官唐書豆盧革韋說甞問郭崇韜曰汾陽王本太原人徙華隂公世家鴈門豈其枝派耶崇韜曰因遭亂亡失譜諜甞聞先人言上距汾陽四世耳革曰然則固從祖也有求官者崇韜曰深知公功然門地寒素不敢相用恐為名流所嗤通鑑唐莊宗紀傳記江南呼欺曰紿通作詒集韻本朝妄自粉飾欺盲聾東坡詩傾險附反覆經彼何人斯其心孔艱為鬼為蜮詩情疎而貌親在小人則穿窬之盜也禮記匿怨而友其人左丘明恥之丘亦恥之論語子好面譽人者亦好背而毀之互入面是背非孔子曰人心險於山川難於知天天亦有春秋冬夏旦暮之期人有厚貌深情莊子互入人心難托若蜚鳥然傾側反覆言無常正行無常信惟利所在無所不傾荀子口親心疎貌合行離抱朴子史陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧扉屨可也齊侯説執轅濤塗左僖四年公孫𢎞外寛内深諸常與有隙者雖陽與善隂報其禍殺主父偃徙董仲舒於膠西皆𢎞之力也史記本傳睢真傾危之士哉通鑑周紀太史公曰張儀行事甚於蘇秦要之此兩人真傾危之士哉史記貪饕險詖不閑義禮前漢書禮樂志隂賊感概師古曰隂賊懐害之意也其隂賊著於心本發於睚眦西漢郭解天下以酈寄為賣友西漢本傳公孫𢎞甞與公卿約議至上前皆背其約以順上㫖通鑑漢武鄭朋隂欲附蕭望之上疏言史髙遣客為姦利及言許史子弟罪過章視周堪堪令朋待詔金馬門後朋行傾邪望之絶不與通朋與李宫俱待詔堪獨白宫為黄門郎朋怨恨更求入許史推所言許史事曰皆周堪劉更生教我我闗東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之問𢎞恭石顯恭顯恐望之自訟即挾朋告望之等謀欲罷車騎將軍疏退許史狀谷永前後所上四十餘事略相反覆西漢石顯為人巧慧習事能探得人主㣲指内深賊持詭辯以中傷人忤恨睚眦輒被以危法通鑑漢元動靜可識而沈阻難徴深厚之性詭於情貌東漢郭太傳乘人之危非仁也東漢蓋勲傳蜀李嚴用性深刻鄉里曰難可狎李鱗甲江表傳又蜀志陳震傳載諸葛亮與董允書曰陳孝起與吾説李正方腹中有鱗甲鄉黨以為不可近劉􅓮為帝所親重帝將伐蜀朝臣内外皆曰不可􅓮入與帝議則曰可伐出與朝臣言則曰不可通鑑魏明紀晉劉毅曰一人之身旬日異狀劉襲曰事之不可者莫大於反將軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立通鑑晉紀李義深心胷險峭時人語曰劍㦸森森李義深北史李義府貌柔恭與人言嘻怡㣲笑而隂賊褊忌凡忤意者皆中傷之時號義府笑中刀唐奸臣傳李義府柔而害物人謂之人猫唐書本傳封倫資險佞内挾數刺人主意隂導而陽合之人莫能探其膺肺唐書封倫傳鄭愔初附來俊臣俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福竟坐族誅李林甫城府深密人莫窺其際好以甘言啗人而隂中傷之不露辭色凡為上所厚者始則親結之及勢位稍逼輒以計去之雖老奸巨猾無能逃其術者李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而隂陷之李適之性疎率林甫甞謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣乆知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脱適之由是束手矣通鑑唐𤣥宗互入謟諛贄陸與璟趙約至帝前極論延齡裴帝怒形於色璟黙而不言唐書徳宗集溪谷不能喻其險鬼神無以究其變絶交論惡鳥不鳴文選面從背違意與口戾言如飴蜜心如螫厲晉仲長敖覈性賦法吏多少年磨淬出角圭將舉汝愆尤以為己階梯韓退之詩賦性專相醢韓集䑕牙穿屋虺毒吹人李衛公朋黨論人中有獸心一人千萬心孟郊方寸地九折阪仲長敖覈性賦深心藏陷穽巧言織網羅李義府背笑欣欣笑中有刀潛殺人隂陽神變皆可測不測人間笑是嗔白侍郎梟心獍貌何人覺爍鐵不在火割肌不在刀險心露山岳流語翻波濤肺肝増巧曲噂沓言柔舌杜牧之弗聲弗鳴潛此毒螫陸龜蒙蝎賦初即許之以死殉體面俱柔終乃背之而飽飛身名已遂唐文粹務實經不作無益害有益功乃成書恥名之浮於行也禮記非知之艱行之惟艱書欲行之浮於名也脩身踐言有其言而無其行君子恥之喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也君子與其有諾責也寧有已怨禮記已謂不許也言諾而不與其怨大於不許子曰素隠行怪後世有述焉吾弗為之矣記中庸君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其徳恥有其徳而無其行君子不以口譽人則民作忠君子寡言而行以成其言禮記恭儉惟徳無載爾偽書古者言之不出恥躬之不逮也禮與其奢也寧儉喪與其易也寧戚奢則不孫儉則固與其不孫也寧固君子恥其言而過其行子曰知之為知之不知為不知是知也論語子恭儉豈可以聲音笑貌為哉聲聞過情君子恥之孟子下互入有名無實良劍期乎利不期乎莫邪墨子君子行不貴茍難説不貴茍察名不貴茍傳唯其當之為貴聞之而不見雖博必謬見之而不知雖識必妄荀子庖丁解牛適俗所須朱泙屠龍無所用巧茍乖世務雖有妙術歸於無用劉子史婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣本傳子曰我欲載之空言不如見之於行事之深切著明也史記自序使其中有可欲者雖錮南山猶有隙使其中無可欲者雖無石槨又何戚焉通鑑漢文紀申公曰為治者不在多言顧力行何如耳通鑑漢武紀將相皆舊功臣少文多質萬石君無文學而恭謹無與比萬石君家不言而躬行是時吏治皆以慘刻相尚獨内史倪寛擇用仁厚士推情與下不求聲名通鑑漢文上雅不喜聴音樂手不持珠玉羣臣上言宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汙七十二代之編録若郡縣遣吏上夀盛稱虛美必髠令屯田任性而行不自彫飾通鑑漢光武章奏過稱虛譽尚書皆宜抑而不省示不為諂子嗤也通鑑漢明帝蔣琬為政以安民為本不以脩飾為先蜀志魏明帝謂盧毓曰選舉莫取有名如畫地作餅不可啗也魏志武威王利鹿孤欲稱帝鍮勿崙曰虛名無實徒作為世之質的將安用之互入徒勞無補晉魏舒不為皎厲之事年四十郡舉上計宗黨以舒無學業令不就可以為髙舒曰若試而不中其負在我安可虛竊不就之髙以為己榮通鑑晉紀魏舒為事必先行而後言晉書本傳王述毎受職不為虛讓其所辭必於不受及為尚書令子坦之白述故事當讓述曰汝謂我不堪耶坦之曰非也但克讓自美事耳述曰既謂堪之何為復讓人言汝勝我定不及也通鑑晉海西公紀豈須邑至里詣飾其游聲哉通鑑晉武紀秦孝王俊薨王府寮佐請立碑上曰欲求名一卷史書足矣何用碑為若子孫不能保家徒與人作鎮石耳隋書瓦器蚌盤殽核充事而已通鑑陳髙祖隋主不喜辭華詔天下公私文翰並宜實録泗州刺史司馬幼之文表華艷付所司治罪通鑑陳後主楊瑒在官清白吏請立石紀徳瑒曰事益於人書名史氏足矣若碑頌者徒遺後人作鎮石耳唐書本傳元徳秀質厚少飾緣唐書卓行傳互見重厚文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪漢文不封禪後世豈以文帝之賢不及始皇耶通鑑唐太宗廣州吏民為宋璟立遺愛碑璟上言臣在州無他異迹今以臣光寵成彼諂諛欲革此風望自臣始於是他州皆不敢立通鑑李徳裕曰臣祖家不置文選蓋惡其不根藝實唐志集名不可以虚作楚辭不為飾讓文選讓郡公表無使名過實崔子座銘在室如賔寧慙屋漏不貪為寶每畏人知江總作歐陽頠墓誌不懐寶以害賈不飾表以招累靜守約以不矜動因循以簡易任自然以為姿無誘慕於當世張華鷦鷯賦以智謀而進者有時而衰以朴厚而知者無迹而固劉賔客雖有數斗玉不如一盤粟李太白集大農之家不待珠璣然後為富杜牧之淫文艷韵無一字焉白侍郎唯憑野老口不立政事碑杜荀鶴互見政事至寶不雕琢韓集互入不待矯揉多花常早落桃李不如松唐詩本朝詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療饑㫁㫁乎如藥石必可以伐病東坡鳬繹先生集序蒼然澗下松不願世雕刻蘇子由集尚朴經大禮必簡喬而野朴而不文大羮不和貴其質也大圭不琢美其質也汙尊而抔飲蕢桴而土鼓器用陶匏至敬無文父黨無容此以素為貴也至貴不饗味而貴氣臭也禮記先進於禮樂野人也如用之則吾從先進論語子吾將鎮之以無名之樸老子史崔洪手不執珠玉晉書本傳斵雕為樸漢書飾偽經靜言庸違象恭滔天書言共工自為謀起事而違背之貌象恭敬而心傲狠作偽心勞日拙書行偽而堅言偽而辨禮記小人閒居為不善無所不至見君子而後厭然揜其不善而著其善大學互入有忌憚色取仁而行違居之不疑論語子居之似忠信行之似廉㓗衆皆説之自以為是而不可與入堯舜之道故曰徳之賊孟子利心無足而佯無欲者也行偽險穢而強髙言謹慤者也荀子欲售偽者必假真有人則作之無人則輟之之謂偽揚子史鄭伯有既死使太史命伯石為卿辭太史退則請命焉請太史更命已復命之又辭如是三乃受策入拜子産是以惡其為人也左襄三十此飾説也史虞卿傳公孫𢎞習文法吏事縁飾以儒術西漢傳符氏卒羣臣皆含辛以為淚通鑑晉安紀晉王廣彌自矯飾上與后甞幸其第廣悉屏匿美姬於别室唯留老醜者衣以縵綵給事左右屏帳改用縑素故絶樂器之絃不令拂去塵埃上見之以為不好聲色還宫以語侍臣意甚喜通鑑隋高祖韋執誼初為叔文所引用深附之既得位欲掩其迹且迫於公議故時時為異同通鑑唐順宗傳記飾貌者不情大戴禮文王篇齊賀曰公孫𢎞内服貂蟬外衣麻枲内厨五鼎外饍一殽於是朝廷疑其矯西京雜記集誦六藝以飾姦潘安仁賦色厲内荏行僻心堅卑辭作偽陳子昻集今之脂其貌蠟其言以求賈栁文溷䑕虛求㓗元微之集茍作偽而心拙必代斵而手傷白樂天本朝鞠躬便僻不足為恭長號流涕不足為哀弊衣糲食不足為儉飲食之初以為味也適口斯善矣世人取果餌而刻鏤之朱緑之以為盤案之玩豈非以目食者乎涑水迂書夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉老蘇辯姦論沽名矯激經違道干譽書欲㓗其身而亂大倫論語子段干木踰垣而辟之泄栁閉門而不納是皆已甚互入已甚陳仲子以兄之禄為不義之禄而不食也以兄之室為不義之室而不居也孟子買名聲於天下莊子互入好名姦人盜名於晻暗同世故曰盗名不如盜貨田仲史鰌不如盜也荀子史公孫𢎞至宰相封侯食一肉脫粟飯西漢本傳石建之澣衣周仁為垢汙君子譏之前漢本傳公孫𢎞以三公為布被誠飾詐以釣名前漢本傳干名采譽西漢終軍傳純盜虛聲通鑑李固貽書黄瓊云集少室山人索價髙兩以諫官徴不起韓詩山人指李渤也機巧經其民機巧趍利禮子為機變之巧者無所用恥焉孟子有機械者必有機事有機事者必有機心莊子故機械之心藏於胸中則純白不粹神徳不全淮南子史司馬安文深巧善宦四至九卿西漢汲黯傳公孫𢎞奏事有不可不庭辯甞與汲黯請間先發之𢎞推其後通鑑漢武紀何平叔外靜而内躁銛巧好利通鑑魏邵凌厲公紀能移主上意者唯楊素耳通鑑隋髙祖以反道為權以任數為智君上行之必失衆臣下用之必陷身通鑑唐徳宗妄想傳記桓子新論曰闗東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼論衡互入仰羨乆鰥無偶思配織女易林集援北斗兮酌桂漿楚辭過屠門而大嚼雖不得肉貴且快意曹植書本朝饑人忽夢飯甑溢夢中一飽百憂釋東坡詩實意附虛意經君子問人之寒則衣之問人之饑則食之稱人之美則爵之禮記史觥大也飯不及壺餐大飯謂盛饌未具不及壺餐之救饑疾也越語寒之於衣不待輕煖饑之於食不待甘㫖西漢食貨志互入易足傳記衣人在寒食之在饑投虎千金不如一豚肩吕氏春秋墨子語禽滑釐曰凶年與子隋珠又與子一鍾粟子將何所擇釐曰粟可耳説苑互入知所輕重集救死具八珍不如一簞犒韓詩蔬食足充饑何必膏粱珍繒絮足禦寒何必錦繡文白樂天集互入易足經子曰口惠而實不至禮記史諺曰錢不出家言與之東漢集虛名但䝉寒温問泛愛不救溝壑辱杜詩有名無實經維南有箕不可以簸揚維北有斗不可以挹酒漿睆彼牽牛不以服箱詩史猶獲石田也無所用之左哀十一年聴其言洋洋滿耳若將可遇求之盪盪如繫風捕影終不可得漢郊祀志有名無實何異兔絲燕麥南箕北斗通鑑梁武實不應聲者謂之虛通鑑漢武名如畫地作餅不可啖也魏志盧毓傳鍮勿崙曰虛名無實徒足為世之質的通鑑晉紀互入務實集猶木蘭為舟翠羽為楫翫之於陸而無涉川之用唐文粹雷霆空霹靂雲雨竟虛無杜詩初如吉夢終為戯談李義山集牛奮其角箕張其口牛不見服箱斗不挹酒漿韓詩文具史計簿具文而已西漢宣紀秦任刀筆吏爭以苛察相髙其敝徒文具亡實前漢張釋之傳隠逸經肥遯無不利君子獨立不懼遯世無悶不事王侯髙尚其事易考槃在澗碩人之寛詩儒有上不臣天子下不事諸侯禮記隠居以求其志隠居放言賢者辟世其次辟地子路遇丈人以杖荷蓧子路以告子曰隠者也論語子隠於窮閻漏屋三公不能與之爭名荀子棄赫奕之朝華避僨車之險路吟笑蒼崖之間而萬物化為埃氛怡顔豐柯之下而朱户變為繩樞握耒甫田而麾節忽若執鞭啜荈瀨泉而太宰同乎藜蓼泰爾有餘歡於無為之塲忻然齊貴賤於不爭之地含醇中樸無欲無憂全真虚氣居平味淡恢恢蕩蕩與混成等其自然抱朴子名混朝市心在世外文中子史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季主傳互入無往不自得帝少與嚴光同遊學即位以物色訪之累徴乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家通鑑光武紀四皓潛光隠曜東漢郭𤣥傳志凌青雲之上身晦泥汙之下後漢逸民傳法真隠居不仕前後四徴終不屈友人郭正曰法真名可得聞身難得而見逃名而名我隨避名而名我迫通鑑漢順紀互入欲晦而彰枕石潄流恬淡於浩然之域蜀志彭羕傳殷浩累辭徴辟屏居墓所㡬將十年時人擬之管葛通鑑晉穆怡居塵外髙謝人寰笑詠山林遊泛江海當此之時蕭然有凌霞之舉晉謝安傳名可聞而身不可見徳可仰而形不可覩晉宋纎傳養粹岩阿銷聲林曲晉隠逸傳周顒處山舍王儉問曰卿山中何所食曰赤米白鹽緑葵紫蓼文惠問顒菜食何味最勝顒曰春初早韮秋末晩菘南史岩壑閒逺水石清華南史隠逸傳養素丘園周韋夐詩狎玩魚鳥左右琴書拾遺粒而織落毛飲石泉而庇松柏放情宇宙之内自足懐抱之中冥心物表介然離俗北史隠逸傳陸龜䝉嗜茶置園顧渚山下乗馬升車設蓬席齎束書茶竈筆床釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至新唐書本傳上焉者身藏而徳不晦故自放草野而名往從之雖髙乘之貴猶尋軌而委聘也其次挈治世具弗得伸或峭行不可屈於俗雖有所應其於爵禄也汎然受悠然辭使人君常有所慕企慊然如不足其可貴也末焉者資槁薄樂山林内審其才終不可當世取舍故逃丘園而不返使人常髙其風而不敢加訾焉唐書隠逸傳序田遊巖居箕上髙宗幸嵩山親至其門遊岩曰臣所謂泉石膏肓煙霞痼疾者潘師正曰茂松清泉臣所須也新唐書本傳集處𤣥舍之幽門兮穴岩石而窟伏朝飲木蘭之墜露兮夕餐秋菊之落英楚辭飲石泉兮䕃松柏楚辭棲志浮雲張茂先詩髙步追許由左太沖詠史詩髙蹈風塵外長揖謝夷齊放情凌霄外嚼蕋挹飛泉郭景純遊仙詩放情青雲外小隠隠林藪大隠隠朝市王康琚招隠憩石挹飛泉攀林搴落英謝靈運詩嘉遯龍蟠翫世髙蹈文選七命潛處蓬室不干勢權文選岩藪知名郭有道碑藉草䕃松孫綽天台賦結廬在人境而無車馬喧問君何能爾心逺地自偏陶淵明詩泥蟠不用蜀秦宓論耿介拔俗之標瀟洒出塵之想亭亭物表皎皎霞外孔徳璋北山移文漸喜交遊絶幽居不用名雖有車馬客而無人世喧雲卧衣裳冷杜詩括囊經世道遺身在白雲投身霄嶺􅌍景雲林谷汲芝耕山壑髙居農野永嵗山栖木食負林壑而驕人放身霄嶺宴景雲林卑俗不可得而問時士不可得而見髙眠終古一笑昔人芝桂為伍麋鹿同曹軒裳鍾鼎如夢中也陳子昻仙菌靈芝夢魂裏李太白投竿垂餌晦幽迹於渭濵抱甕灌園絶心機於漢渚駱賔王花逕不曽縁客掃蓬門今始為君開懶性從來水竹居杜詩野袍栽薜葉山酒酌藤花駱賔王白雲深處有岩居杜牧之烟霞老此身柴門嘶馬少藤杖拜人稀人語空山答手栽松樹蒼蒼老身卧桃源寂寂春惟有胡麻當鷄黍白雲來往未嫌貧跡逺親魚鳥避世歌芝草休官醉菊花千載空桃花秦人深不見漁竿吾道在鷗鳥世人賖結茅依翠微伐木開䝉籠孤峰倚青霄一徑去不窮桃花洞裡居人滿桂樹山中任日長萬壑千峰獨閉門白雲幽卧處不向世人傳劉長卿拂衣從此去髙步躡華嵩捫蘿亦踐苔昔聞龎徳公採藥遂不返金澗餌芝术石床卧苔蘚結廬就岩窟竹房閉虛靜花藥連冬春平石藉琴硯落泉洒衣巾焚香宿華頂裛露采靈芝屢踐莓苔滑將尋汗漫期劉义詩杜門不復出乆與世情疎松月生夜涼風泉滿清聴門無俗士駕人有上皇風孟浩然惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也物外日月本不忙韓集肥遯居真包蒙養正栁集耕於寛閒之野釣於寂寞之濵韓集飲水煮松柏孟東野且欲遺姓名安能慕竹帛芝术資餱糧烟霞拂巾幘愛名之世忘名客多事之時無事身笑聴鼕鼕朝莫鼓只能催得市朝人雲深無四鄰劉賔客南山四皓秦之博士遭世暗昧退而作歌曰莫莫髙山深谷迤邐􅋫􅋫紫芝可以療饑唐虞世逺吾將何歸駟馬髙蓋其憂甚大富貴之畏人兮不如貧賤之肆志共入商山崔琦四皓頌山林小羈鞅時人不到處苔石無遺蹤但有鷄犬聲不聞車馬喧薜衣換簪組藜杖代車馬偶得幽閒境遂忘塵俗心始知真隠者不必在山林藥圃茶園為産業野麋林鶴是交游杜門隱几塊然自居木形灰心雖鵩鳥集於前枯栁生於後不能動於心也人間榮耀因縁少林下幽閒氣味深夜後不聞龜喘息秋來惟長鶴精神韜跡匿光銷聲藏影白侍郎白雲深陋巷衰草遍閒居身依泉壑將時背路入烟蘿得地深終嵗不知城郭事手栽松竹盡成隂佩蘭䕃竹誅茅席芷武伯蒼夜眠幽洞石曉飯白雲蔬閒雲長在户姚少監月明松下房櫳靜日出雲中鷄犬喧澹然清徳居然素風寂寞柴門人不到空林獨與白雲歸王維雲山遶屋猶嫌淺歌掉漁舟近釣臺青漢不回駕白雲長掩闗香掩蕙蘭氣韻髙鸞鶴聲歸卧養天真鹿裘烏角巾茂陵閒乆病彭澤醉長貧性閒鷗自識心逺鶴先知許用晦自敎青鶴舞分採紫芝苗卷簾無俗客應只見雲來張文昌蘿蔦自為幄風泉何必琴猿鳥聲自呼風泉氣相激麟出無應鴻飛入㝠張九齡地偏芝桂長境勝烟霞異機閒魚鳥狎體和芝术鮮李義山懐材幽藪藏頴重崖絶望岩廊之榮遺形斤斧之患駱賔王鳥啼花落人聲絶寂寞山窓掩白雲李義山延白雲為升堂之侣結清風為入室之賔居見青山傲視白雲得䘮不可摇其心榮辱不可動其志桎拲冠冕泥滓禄位髙名無階級逸迹絶涯涘皮日休在生未識公卿面至死不離麋鹿羣杜荀鶴惟有風流謝安石拂衣攜妓入東山白樂天芝术夢中春姚少監與松喬為伍是羲皇上人王維集寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親賈浪仙柴門反闗無俗客盧仝山棲谷飲王維集寧知市朝變但覺泉石好與麋鹿同羣處浪跡於豐草長林石泉可以洗昏蒙雲松可以遺身世俗塵不飛人意自逺唐文粹朝飲花上露夜卧松下風王昌齡閎覽古先遐蹈物表芝耕雲卧聲利不入唐文粹手摇白羽扇脚踏青芒履聞道鶴書徴臨流還洗耳孟浩然雖有柴門長不閉片雲孤木伴身閒猶嫌住久人知處見擬移家更上山賈浪仙卜築青巖裡雲蘿四布隂虛室若無人喬木自成林時有清風至側聞樵採音儲光羲烟火晝不盡蓬蒿春更深錢起落葉遍空山何處尋行跡韋應物白雲髙㡬許全屬採芝翁羅隠傳記亭亭明月逺照山扉肅肅清風旁來澗牖通典許由隠箕山無盃器以手捧水飲之人遺一瓢得以飲飲訖挂於木上風吹嚦嚦有聲猶以為煩遂去之逸士傳龎公至老不入襄陽城襄陽耆舊傳周續之入廬山預逺公浄社又與劉遺民陶淵明號潯陽三隠廬山記武陵隠士晦迹桃源當此晉年猶謂暴秦之地史通本朝柴荆常自閉花發少人知紫芝可以飽粱肉非所嗜臨川集忍寒苦安淡泊與清泉白石為伍東坡石菖蒲序清逺閒放超然於塵垢之外東坡放鶴亭記體備松柏姿氣含芝术熏幽人隠几寂無語心在飛鴻滅没間道人有道山不孤白雲舊有終老約東坡詩山中無歴日寒盡不知年古今詩話不用閉門防俗客愛閒能有㡬人來李文靖詩移家尚恐青山淺隠几惟知白日長謝景山詩俗氛無因來烟霞作輿衛黄魯直詩富有林泉樂清無市井忙邵堯夫避世山林中衣草食芋栗寵辱兩忘輕世味冰霜不到傲天工蘇子由集髙尚經上九不事王侯髙尚其事上九鴻漸于陸其羽可用為儀吉易儒有上不臣天子下不事諸侯禮記不義而富且貴於我如浮雲不降其志不辱其身伯夷叔齊與論語子禄之以天下弗顧也繫馬千駟弗視也孟子削跡捐勢不為功名莊子以榮華為穢汚以厚玩為塵壤以聲譽為朝露抱朴子子思曰吾不取於人謂之富不屈於人謂之貴孔叢子史魯仲連不肯仕宦任職好持髙節本傳莊周曰我寧遊戲汙瀆之中自快無為有國者所羈終身不仕以快吾志史記跨世陵時逺蹈獨遊東方朔贊師友造化而不為世俗所役者也漁釣於一壑則萬物不奸其志棲遲於一丘則天下不易其樂不絓聖人之罔不齅驕君之餌蕩然肆志談者不得而名焉西漢班固序傳𦕈然絶俗離世西漢王褒傳雖在布衣之列環堵之中晏然自得不易萬乗之尊又可得而賤乎後漢樊英傳傳記顧況志向疎逺有時宰招致將命好官況答詩曰四海如今已太平相公何用喚狂生此身還似籠中鶴東望滄溟呌一聲李綽尚書故實集鳳不貪餧而妄食飲余馬於咸池總余轡於扶桑楚辭蹈洪崖之遐迹紹巢許之絶軌翔區外以舒翼超天衢以髙跱蔡伯喈碑文蟬蛻濁穢之中浮游塵埃之外皭然泥而不滓推此志與日月爭光可也班孟堅作離騷序不求聞達於諸侯諸葛亮出師表名位為糟粕勢利為塵埃晉潘尼安身論傲世忘榮絶棄人事成公子安嘯賦丘園東國錙銖軒冕齊竟陵王行狀傲墳素之塲圃步先哲之髙衢潘安仁閒居賦封已養髙勢動人主文選運命論魯連讓齊爵遺組居邯鄲獨立矯世陳子昻集軒冕猶埃塵駱賔王逸興横素襟喜結海上契自為天外賔李白蕭疎外聲利不能隨皁蓋自醉逐浮萍杜詩少室山人李渤索價髙兩以諫官徴不起韓愈與盧仝詩古來濩落者都不事田園道心淡泊對流水生事蕭疎空掩門髙曠出塵表逍遙滌心神韋應物疏𫝊傲簪纓劉賔客弱齡植操本謝聲名中年誓心不期聞達駱賔王大鵬六月有閒意仙鶴千年無躁容劉賔客相對盡日言不及名與利髙謝人間鶴唳無凢聲但拂衣冠莫回顧的無官職趂人來上無羅弋憂下無羈鎻牽蘿襟蕙帶竹皮冠雖到塵中不染塵白樂天四皓有芝輕漢祖功名富貴不能釣之有山水閒淡之思心與青雲自有期杜牧之處世似孤鶴遺榮同蛻蟬皮日休扁舟泛湖海長揖謝公卿劉义糠粃禮義錙銖功名王旡功髙情自與俗人疎張文昌東陵解印時賣故侯之𤓰彭澤無官詎有公田之黍王維集青山有雪諳松性碧落無雲稱鶴心許用晦味道腴以代膏粱含徳輝而輕軒冕遺榮養素恬淡如也栁文公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻㝠㝠胡可量也張九齡張良郤粒之懐錙銖軒冕范蠡扁舟之志夢想江湖中山寂寞幽蘭自榮雖有繒繳不羈㝠㝠以聰明為駢枝名聲為纒繳無耗氣無焚和退黙葆真獨與道往鷗鳥不動家人忘貧是行也朶頥者知懼矣㝠㝠翰飛不可及已自觀靈龜不齅驕餌李義山肥於貌孰與肥其道求於人孰與求其身孫可之文含風飲露以樂吾道唐文粹海内嫌官只一人姚少監瑞草唯承天上露紅鸞不受世間塵王建消息治亂之際卷舒夷曠之域如雲出於山遊於天復歸於無間不可得而累也唐肅宗釣臺碑本朝幽閒靖節性孤髙伯夷心歐公聯句棄官如棄泥東坡詩慕幅巾於衡巷乗下澤於鄉閭晦丘園之養髙輕鴈纁而堅卧歐公集爵位利禄蓋古者有志之士所謂鴻毛弊屣也東坡文汎若虛舟之獨往寂如死灰之不然蘇子由文智名勇功不入眼黄魯直詩記纂淵海卷四十四
