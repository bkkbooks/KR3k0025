body:
  text: 記纂淵海卷四十六宋潘自牧撰性行部争鬬經嚚訟可乎不和政庬相為敵讐書受爵不讓至於已斯亡詩子惡聲至必反之孟子今有鬬何哉我甚醜之争飲食無亷恥不知是非不避死傷不畏衆強恈恈惟利飲食之見是狗彘也荀子有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與争地而戰伏尸數萬逐北旬有五日而後反荘子史趙奢曰兩䑕鬬於穴中將勇者勝通鑑周紀君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐並生由争善也左襄十三年晏子曰凡有血氣必有争心左昭十年不心競而力争左傳自含血戴角之獸見犯則校而况於人懐好惡喜怒之氣史記律書譬如賈豎女子争言何其無大體也武安侯曰争時急不知出此史記灌夫傳争者事之末也史越世家相與摩牙而争之西漢楊雄傳傳記鬬者忘其身者也忘其親者也忘其君者也行須臾之怒而鬭終身之禍是忘其身也家室離散親戚被戮是忘其親也犯刑法之大禁是忘其君也凡鬬者皆以已為是而以他人為非說苑集力大者搏齒利者囓爪剛者決栁子厚貞符互入勢利相軋本朝投骨於地狺然而争者犬之常也老泉好勝附強梁經子貢曰我不欲人之加諸我也論語子強梁者不得其死好勝者必遇其敵家語無辭讓之心非人也孟子小人致亂而惡人之非已也致不肖而欲人之賢己也心如虎狼行如禽獸而又恐人之賤已也荀子史子晳好在人上左襄十年子玉曰非敢必有功也願以間執讒慝之口左僖二十八年季郈之雞鬬季氏介其雞郈氏為之金距平子怒左昭二十五年互入兩不相下為守視都尉如令為都尉必陵太守奪之治史記周陽由傳寗成為小吏必陵其長為人上者上操下如束濕薪史記本傳藺相如位在亷頗右頗曰吾羞不忍為之下我見相如必辱之本傳田蚡辭不能滿觴灌夫怒西漢桓範持節都督青徐與徐州刺史鄒岐争屋欲斬岐坐免復為兖州刺史屬鎮北将軍吕昭範與妻曰我寧作諸卿向三公長屈耳不能為吕屈也妻曰君前欲斬徐州衆人謂君難為作下今復羞為吕屈是復難為作上魏志曺爽傳樊世本氐豪佐秦王健定闗中謂猛曰吾輩耕之君食之耳猛曰非徒使君耕之又將使君炊之通鑑晉哀紀劉琨曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭耳晉書互見尚氣趨事赴功齊髙徳政恒以精神凌逼人通鑑陳髙祖王彬謂王敦曰卿昔嵗殺兄今又欲殺弟耶本傳傳記杜預書告兒古諺有書借人為可嗤借書送還亦可嗤殷芸小說集譖下慢上恒其心術栁罵尸蟲本朝王荆公在臺閣侍從時每言唐宰相令諫官隨宰相入閣最切於政道後世所當行也及入司政事而孫莘老李公擇在諫職二人者熟荆公此論遂列奏請舉行之荆公不可曰是又益兩參知政事也吕氏家塾記互入私意温粹經言念君子温其如玉温温恭人維徳之基詩即之也温論語史温顔和辭承上接下無所失意韓王信傳互入和易向寵性行淑均諸葛亮出師表何充為劉惔所貴每云見次道飲令人欲傾家釀言其能温克也晉書王景文情度淹粹宋泰始起居注集夷雅之體無待韋絃王文憲集序互入不待矯揉白璧無瑕玷孟浩然狠戾經方命圮族注言鯀性狠戾厥心疾狠不克畏死書勇而無禮則亂論語史富辰曰心不則徳義之經為頑口不道忠信之言為嚚左僖二十四年不可教訓不知話言告之則頑舍之則嚚傲狠明徳以亂天常謂之檮杌左文十八智伯曰難將由我我不為難誰敢興之通鑑周紀天為剛徳猶不干時况在人乎左文五年熊虎之狀豺狼之聲左宣四年狼子野心左昭二十七年膠西王為人賊盭言其性賊害而狠戾西漢膠西王傳貌狠自將王莽傳狠如羊項羽傳灌夫曰今日斬頭穴胷何識程李本傳用氣自行多所陵折馬援傳羊聃以狠戾為瑣伯晉傳傳記苻生麤暴無賴祖洪甚惡之生無一目年七嵗洪戯之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也崔洪十六國春秋本朝睅目知誰嗔皤腹空自脹東坡詩和易經從容以和書載色載笑匪怒伊教輯柔爾顔詩君子和而不流中庸夫敬以和何事不行禮記子冉雍使其臣如借家語和者大同於物物無得傷閡者游金石蹈水火皆可也列子薫然慈仁謂之君子無責於人人亦無責焉荘子史為霽威嚴魏相傳温顔和辭承上接下無所失意韓王傳互入温粹臣生與人無分争漢武紀粲然有文以相接驩然有恩以相愛漢書鄭當時與官屬言若恐傷之本傳卓茂自束髪至白首與人未嘗有争競通鑑漢光武紀性惟遲緩與人無傷後漢孔融傳夷粹無競唐書沈傳師傳樂廣性沖約清逺與物無竸通鑑晉恵紀集温渥浹輿𨽻顔延年詩陽和熈煕貯在顔間睦其仲季施及鄉黨含光不曜煦物如春劉賓客尊已者敬之如臣事君下已者慈之如母畜子敵已者友之如兄弟無不得志者也栁文意氣自春生髙達夫本朝不立異以為髙不逆情以干譽歐文趙清獻公為人和易與人言如恐傷之東坡撰神道碑樂易向人無不可蘇子由文拍拍滿懐俱是春邵堯夫和睦經宜兄宜弟伯氏吹壎仲氏吹箎雝雝喈喈妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥詩互入閨門父子篤兄弟睦夫婦和家之肥也睦於父母之黨禮記史是謂鳳凰于飛和鳴鏘鏘左萬石君居家子孫申申僮僕訢訢西漢石奮傳魏楊播及弟椿津家世孝友緦服同㸑男女百口無間言通鑑梁髙祖紀崔氏四世緦麻同㸑唐書髙崇文七世不異居開元中再表其閭唐書本傳元暐三世不異居家人怡怡如也本傳集塤箎鳴自合杜詩本朝劉君良累代義居尺布斗粟無私焉續世說和光同塵經不惟好異書在彼無惡在此無斁無怨無惡詩君子行禮不求變俗毁方而瓦合去已之大圭角與人小合也修其教不易其俗齊其政不易其宜禮記無可無不可在邦無怨在家無怨麻冕禮也今也純儉吾從衆鳥獸不可與同羣吾非斯人之徒與而誰與論語子栁下恵不羞汙君不辭小官雖袒裼裸裎於我側爾焉能凂我哉魯人獵較孔子亦獵較孟子和其光同其塵老子與物委蛇而同其波聖人處物不傷物不傷物者物亦不能傷也唯無所傷者為能與人相將迎荘子人知所惡者吾亦惡之荀子史聖人與衆同欲是以濟事左成六年子産曰求逞於人不可與人同欲盡濟左昭四年袁盎病免居家與閭里浮沈相隨行史記袁盎傳將相調和則士豫附史記陸賈傳無乖剌之心西漢杜欽傳不夷不恵可否之間聖賢居身之所珍也通鑑漢殤紀卓茂曰人生焉能髙飛逺走不在人間耶東漢本傳無彼此於人通鑑晉武紀集聖人不凝滯於物而能與世推移衆人皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其醨何故深思髙舉自令放為楚辭史記本傳云何故懐瑜握瑾與一世同其波流而悔吝不生􅄞叔夜書時無間言陳子昂集含光混世貴無名何用孤髙比雲月李白集隨時任其卷舒與物同其波流駱賓王願為同社人雞黍燕春秋不為崖岸斬絶之行韓文忍汙雜嚚譁恭其體貌遜其言辭栁文虬龍未化時魚鼈同一波孟東野眼看人盡醉何忍獨為醒王無功恵和得衆司空圖文或慮雷同何傷瓦合白傅集本朝借君拍板與門槌我也逢場作戯東坡集物有圭角刺人眼目亦易玷缺故君子處世常渾然天成則人不厭棄矣龜山語録與時髙下經損益盈虛與時借行時止則止時行則行時有泰否用有行藏易國有道其言足以興國無道其黙足以容中庸君子之於禮也有直而行也有曲而殺也道隆則從而隆道汙則從而汙禮記邦有道危言危行邦無道危行言孫君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之寗武子邦有道則知邦無道則愚論語子時詘則詘時伸則伸荀子史晏平仲在朝君語及之則危言語不及之則危行國有道則順命無道則衡命以此三世顯名於諸侯史記本傳君子得其時則駕不得其時則蓬累而行史記老子傳乗流則逝兮得坎則止一作坻史記賈生傳從容浮湛與時俯仰西漢司馬遷傳王戎作吏部與時浮沈晉書集孔隨時而行藏蘧與國而卷舒潘安仁西征賦伸屈須為蠖窮通莫問龜白樂天集互入委順因俗為禮人用愛戴唐文粹委曲經其次致曲曲能有誠中庸子川雖曲而動諸海塗雖曲而通諸夏揚子史河千里而一曲公羊傳記孟嘗君每與客坐語屏風後常有侍史主記所與客語知其親戚居處客去後使謝餽無所遺失春秋後序集情深禮至欵密重復劉賓客集本朝右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質古之聖賢欲行其意必有以曲成之未嘗直情而徑行也東坡集絶物經我聞其聲不見其身詩子訑訑之聲音顔色距人於千里之外是絶物也孟子史趙禹為吏以来舍無食客公卿相造請禹終不行報謝務在絶知賓友客之請孤立行一意而已西漢本傳鄧榮為人矜潔自貴於人少所與東漢本傳立異經好人之所惡惡人之所好大學子吾聞言於接輿大有逕庭不近人情荘子史諸勢在己之右必陵之士在己之左愈貧賤尤益敬與鈞史記灌夫傳舛忤膠戾乖剌劉向傳師古曰志意不和各相違背趙禹孤立行一意而已西漢本傳上互入絶物嚴延年為河南守衆人言當死者一朝出之言當生者詭殺之前漢違時絶俗為激詭之行東漢范丹傳沈懐文素不飲酒又不好戯調謝荘常戒懐文曰卿每與人異亦何可久懐文曰吾少来如此豈可一朝而變非欲異物性所得也通鑑宋世祖阮瞻素執無鬼論物莫能難晉書本傳集異質忌處羣孤芳難寄林韓集互入儆戒氷雪之交衆裘我絺溽暑之鑠衆從之風而我從之火栁文本朝夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書豈其情也哉老蘇辨姦論恭敬經徳盛不狎侮出入起居㒺有不欽書侍坐於所尊敬無餘席侍坐於先生先生問焉終則對先生與之言則對不與之言則趨而退讓食不唾揖人必違其位侍坐於長者屨不上於堂長者舉未釂少者不敢飲君子之容舒遲見所尊者齊遫謙貌也君子荘敬日強執輕如不克執虛如執盈入虛如有人互見謹畏賓客主恭祭祀主敬禮記孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾入公門鞠躬如也如不容過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者恭則不侮雖蔬食菜羮𤓰祭必齊如也出門如見大賓使民如承大祭有子曰恭近於禮逺恥辱也子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨論語子朝廷不歴位而相與言不踰階而相與揖也孟子擎跽曲拳人臣之禮也荘子史秦哀公賦無衣楚申包胥九頓首而坐左定五管寧五十未嘗箕踞榻上後漢傳記昔禹見耕者耦立而式過十室之邑則下大戴禮陵犯史温季位於七人之下而求掩其上左傳蓽門圭竇之人而皆陵其上其難為上矣左襄十無禮而好陵人怙富而卑其上子産曰子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忘不事長也左昭元石蜡曰少陵長左隠四犯則陵人前漢五行志寗成好氣為小吏必陵其長吏前漢本傳丞相田蚡召客飲坐其兄盖侯北向自坐東向以為漢相尊不可以兄故私撓前漢本傳互見恃勢苻堅曰怒其室而作色於其父其桓温之謂矣通鑑簡文紀互見遷怒周嵩常飲酒瞋目謂兄顗曰君才不及弟何横得重名以所然蠟燭投之顗曰阿奴火攻固出下䇿耳晉書蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中面曰陛下投臣以赤心臣敢報之戰栗梁書李義府典選專以賣官為事上頗聞之謂義府曰卿子及壻頗不謹多以非法義府勃然變色頸頰俱張曰誰告陛下上曰但我言如是何必就我索其所從得耶通鑑唐髙宗韋貽範同平章事屢以大杯獻上不即持貽範舉杯直上頥通鑑唐昭宗傲慢經胡逝我梁不入我門詩互見貴人原壤夷俟論語子嘑爾而與之蹴爾而與之過我門而不入我室孟子互見貴人自得如山忽人如草金樓子史偃蹇左哀二朱買臣見湯湯坐牀上丞史遇買臣弗為禮張湯傳沛公至髙陽見酈食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不宜踞見長者漢書灌夫罵坐不敬汲黯為人性倨少禮西漢本傳蕭望之意嘗輕丙吉遇丞相禮節倨慢通鑑漢宣紀禰衡尚氣剛傲好矯時慢物始達潁川乃隂懐一刺既而無所之適至於刺字漫滅東漢本傳互見尚氣何曽隂駕人物鄉閭疾之如讐永嘉之末何氏滅亡無遺焉晉書互見取禍劉孝綽仗氣負才多所陵忽每於朝集會同處公卿間無所與語反呼騶卒問道途間事南史宋書本傳謝萬矜豪傲物但以嘯詠自髙未嘗撫衆兄安深憂之謂萬汝為元帥宜數接對諸將以恱其心豈有傲誕如此而能濟事也萬乃召集諸将一無所言直以如意指四座云諸将皆勁卒諸将益恨之通鑑晉哀帝紀蕭子明為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一揮而已衣冠切恨之梁書張昌齡詣闕獻頌太宗召試因謂之曰昔禰衡潘岳皆恃才傲物以至隕命汝才不減二賢宜追鑒前轍唐書本傳互見取禍厲色慢辭唐書杜甫常醉登嚴武牀瞪視曰嚴挺之乃有此兒新唐書本傳傳記王澄常之荆州送者傾邑所别樹上有鵲巢澄便脫衣著犢鼻上樹探鵲鷇而弄之傍若無人晉書互見放蕩類王子猷作桓温參軍桓謂王曰卿在府久當相料理王不答直髙視手版拄頰云西山朝来頗有爽氣鍾會見􅄞康旁若無人移時不交一言世說蕭穎士恃才傲物摭言集出山揖牧伯長笑輕衣簮李白傲雖凶徳必有恃而敢行韓文釋言互見恃勢本朝目視飛鴻氣如横蜺酷吏姚紹之意岸軒傲孔帖侮玩經狎侮君子㒺以盡人心玩物喪志書簡兮簡兮詩史陳平貧或問平何肥其嫂疾之曰食糠覈耳西漢本傳上慢侮士西漢張良傳王霸至市中募人擊王郎市人皆大笑舉手揶揄之霸慙遽而反通鑑漢光武紀智者於羣愚如弄一丸於掌上通鑑魏邵陵厲公紀互見愚弄上好狎侮羣臣自太宰義恭以下不免穢辱常呼金紫光禄大夫王𤣥謨為老傖僕射劉秀之為老慳顔師伯為齴其餘短長肥瘦皆有稱目通鑑宋紀王導常枕周顗膝指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人晉書周顗傳崔俊竊言文襄帝為黄口小兒北史崔俊傳杜伏威遺陳稜隋将婦人之服以激怒之唐書傳記諸葛亮致巾幗婦人之飾以侮司馬懿魏氏春秋智伯戯康子而侮段規君子謂其一言而侮人之君相難将至矣本傳愚弄子宋人養猿號曰狙公欲與狙芧先詐之曰朝三而暮四衆狙皆怒又詐曰朝四而暮三衆狙皆喜聖人以智籠愚亦如狙公欺狙也列子史張儀説楚王曰大王誠能聽臣閉闗絶約於齊臣請獻商於之地六百里通鑑周紀嘸然陽應西漢韓信傳湯舞智以御人張湯傳如嬰兒在股掌之上東漢袁紹傳唐髙祖與李宻書曰所望右提左挈戮力同心執子嬰於咸陽殪商辛於牧野通鑑隋恭紀互見同功共事傳記虎得一狐狐曰天令我長百獸見我無不走虎以為然隨而行獸見之皆走虎不知獸畏己而畏狐也劉向新序桓温自以雄姿颯氣是司馬宣王劉越石一輩得一巧作老婢乃是劉越石妓女見温既入潸然而哭泣温問其故曰官家甚似劉司空温大恱即出外修整衣冠又入呼問我何處似司空婢曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是弛冠觧帶不覺惽然而睡不怡者數日語林畏謹經履錯然敬之无咎藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也无有師保如臨父母括囊无咎无譽盖言謹也易夙夜惟寅居寵思危㒺不惟畏怵惕惟厲中夜以興思免厥愆書夙夜匪懈以事一人小心翼翼謂天盖髙不敢不局謂地盖厚不敢不蹐戰戰兢兢如臨深淵如履薄氷温恭朝夕執事有恪不敢暴虎不敢馮河凡百君子各敬爾身温温恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷詩執虛如執盈入虚如有人擇日月以見君入境而問禁入國而問俗入門而問諱君子戒慎不失色於人若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐君言不宿於家禮記子之所慎齊戰疾君命召不俟駕行矣論語子言有招禍也行有招辱也君子其慎所立乎荀子史蕭曺文吏自愛史記漢髙紀内行彌謹武帝紀劉辟彊子徳妻死大將軍光欲以女妻之徳不敢取畏盛滿也漢楚元王孔光沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也光嘿不應西漢本傳洞洞屬屬小心畏忌濟濟謹畏無敖戯驕恣之過谷永傳石建為郎中令奏事建讀之驚恐曰書馬者與尾而五服䖍曰作馬字下曲者而五建時上書誤作四師古曰馬字下曲者曰尾并四㸃為四足凡五今乃四不足一獲譴死矣其為謹慎雖他皆如是西漢本傳霍光出入禁闥二十餘年出則奉車入侍左右小心謹慎未嘗有過為人沈静詳審每出入下殿門止進有常處郎僕射竊識視之不失尺寸通鑑漢武紀金日磾在上左右目不忤視者數十年賜出宫女不敢近上欲内其女後宫不肯其篤謹如此同上斤斤謹質形於體貌後吳漢傳斤音靳闔門自守退無私交三國魏志賈詡傳吳左大司馬朱然内行修潔終日欽欽常若在戰場通鑑魏邵陵公紀文子曰不為福始不為禍終魏明紀殷浩雖被放黜口無怨言晉書本傳口不論世事西晉王衍傳陳顯達自以門寒位重遷官常有愧懼之色戒其子勿以富貴陵人通鑑齊紀李大亮身居三職宿衛兩宫恭儉忠謹每宿直必坐寐達旦通鑑唐太宗岑文本拜中書令有憂色母問之答曰非勲非舊責重位髙所以憂也有来慶者輒曰今日受弔不受賀唐書本傳苗晉卿潞州壺闗人為太守嘗入壺闗望縣門輒步曰公門當下况父母邦乎時美其恭唐書互見恭敬鄉里門陸贄在奉天小心精潔未嘗有過由是帝親倚至解衣衣之同類莫敢望新唐書本傳傳記千仭之牆禍不入門職林成回學於子路恭敬不已子路問其故對曰臣聞之行者比於鳥上畏鷹鸇下畏羅網夫人為善者少為讒者多若身不死安知禍罪不施說苑集保身𠡠行不蹈有過之地吴季重牋臨事若祭視人若嬰陳子昂集三緘謹禍胎駱賓王避權如避虎元稹集眼見心知不敢言白侍郎省中之樹訪猶不言車前之馬數而後對張九齡傳躬雖已安若敵鋒鏑味雖以甘若含氷蘗皮日休安危機鍵之語黙不出口杜牧之本朝身閒曷不長閉口天寒正好深藏手閉口豈非福東坡僭冒經管仲鏤簋朱紘山節藻梲君子以為濫矣庭燎之設由齊桓公始也大夫之奏肆夏由趙文子始也公廟之設於私家由三桓始也冕弁兵革藏於私家非禮也是謂脅君大夫具官祭器不假聲樂皆具非禮也是為亂國朝服之以縞也自季康子始也禮記子曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫孔子謂季氏八佾舞於庭三家者以雍徹臧文仲居蔡山節藻梲何如其知也論語史衣服禮秩如適左荘八商賈乗堅䇿肥履絲曳縞前漢食貨志秦陽以田農而甲一州翁伯以販脂而傾縣邑張氏以賣醬而踰侈質氏以洒削而鼎食濁氏以胃脯而連騎張里以馬醫而擊鐘皆越法矣前貨殖傳杜陵翁仲出入蒼頭盧兒傳呼甚寵前漢今民賣僮者為之繡衣絲履偏諸縁内之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈而富民牆屋被文繡天子之后以縁其領庶人嬖妾縁其履前賈誼傳奢泰則下不遜而國貧前禮樂志互見奢侈陶侃媵妾數千家僮數千珍竒寶玩富於天府晉書本傳楊素貴寵家僮數千後庭妓妾曳綺羅者以千數第宅華侈制擬宫室隋書本傳安禄山起第既成具幄帟器皿充牣其中有帖白檀牀二皆闊丈六尺銀瓶脫屛風帳一方一丈八尺於厨廏之物皆飾以金銀金飯甖二銀淘盆二皆受五斗織銀絲筐及笊篱各一他物稱是雖禁中服御之物殆不如也上每為禄山賜物常戒之曰胡眼大勿令笑我禄山入新第置酒乞降墨勅請宰相至第是日上欲於樓下擊毬遽為罷戯命宰相赴之通鑑唐𤣥宗王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通鑑後周太祖傳記唐王元寶以金銀疊為屋以銅線穿錢甃花徑中泥雨不滑時名為富窟開元遺事正直經栁下恵曰直道而事人焉往而不三黜論語子黔婁先生死被短露足孔子及門人見之謂其妻曰斜而覆足之其妻曰寧使正之不足不可斜之有餘孔家語孝子不諛其親忠臣不諂其君荘子身之所長上雖不知不以悖君身之所短上雖不知不以取賞長短不飾以情自竭若是則可謂直士矣荀子史孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣春秋公羊傳孔子曰叔向古之遺直也治國制刑不隠於親左昭十四外舉不隠仇内舉不隠子史晉世家為人峭直西漢晁錯傳義形於色班固敘傳鞠躬履方馮奉世傳師古曰踐正直之道也汲黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎汲黯面折不能容人之過合己者善待之不合者弗能忍見本傳龔遂為昌邑王郎中令面刺王過王至掩耳起走曰郎中令善愧人本傳忠果正直志懐霜雪東漢禰衡邢峙以經入授太子峙方正有儒者風厨卒進太子食菜有邪蒿峙令去之曰此菜有不正之名非殿下宜食北史栁彧正直之士國之龜寳隋書唐令則為太子勇所昵狎每令以絃歌教内人右庶子劉行本責之曰庶子當輔太子以正道何有取媚於房帷之間哉令則甚慙而不能改通鑑隋髙祖紀武三思嘗以事屬宋璟璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政獨不見産禄之事乎唐中宗正人一心事君無待於助李徳裕傳互見端介張昌宗恐太后一日晏駕為魏元忠引張說賂以美官使證元忠說許之宋璟謂說曰名義至重鬼神難欺不可黨邪害正以求茍免若獲罪流竄其榮多矣若事有不測璟當叩閣力争與子同死努力為之萬代瞻仰在此舉也通鑑武后紀集桂枝生自直在公正色選直如朱絲繩鮑明逺白頭吟嶷然如斷山絶巘不可以斜逕造焉穆員鄭叔則誌以直道吹日月之翳以正道立天地之根皮日休集抗危言而無所避秉大節而不可奪唐文粹本朝朝罷人人識鄭崇直聲猶在履聲中東坡詩姦邪經反道敗徳鴟義姦宄奪攘矯䖍書子大姦之人以泣自信孔叢反是獨立此小人之桀雄也荀子史掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周謂之渾敦注謂驩兜左文十八包藏禍心左昭元左右賣國反覆之臣蘇秦傳秦太子之妃曰華陽夫人無子夏姬生子異人異人質於趙趙人不禮之異人以庶孽孫質於諸侯車乗進用不饒居處困不得志陽翟大賈吕不韋適邯鄲見之曰此竒貨可居乃往見異人說曰吾能大子之門異人笑曰且自大君之門不韋曰子不知也吾門待子門而大能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西遊立子為嗣乃西見華陽夫人之姊而以竒物獻於夫人因譽子異人之賢以夫人為天夫人喜不韋因使其姊說夫人曰夫以色事人者色衰則愛弛今夫人愛而無子不以繁華時早自結於諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎夫人以為然乗間問於太子曰願得子異人立以為嗣以託妾身太子許之與夫人刻玉符約以為嗣通鑑周紀不仁而多材國之患也西漢翟方進傳張禹姦人之雄杜欽傳諸葛豐之於堪猛前譽而後毁其志非為朝廷進善而去姦也欲比周求進而已矣通鑑漢元帝紀孫寵息夫躬姦人之雄漢成帝紀飾偽以要譽釣竒以驚俗不食君禄而争屠沽之利不受小官而規卿相之位名與實反心與跡違漢殤帝紀覘視朝政鳥聲獸心私共鳴呼漢靈帝紀曺操作銅爵臺於鄴操下令曰孤始於譙東築精舍欲秋夏讀書冬春射獵為二十年規待天下清乃出仕耳然不能得如意徵為典軍校尉意遂更欲為國家討賊立功使題墓道言漢故征西將軍曺侯之墓其志也而遭董卓之難興舉義兵復領兖州破降黄巾三十萬衆又討擊袁術使窮沮而死摧破袁紹梟其二子復定劉表遂平天下身為宰相人臣之貴已極意望已過矣設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤強盛恐妄相忖度言不遜之志每用耿耿故為諸君陳道此言皆肝鬲之要也然欲孤便爾委捐所典兵要實不可也何者誠恐以離兵為人所禍已敗則國家傾危是以不得慕虛名而處實禍也漢獻帝紀李勝出為荆州刺史過辭太傅懿令兩侍婢持衣衣落指口言渇婢進粥懿不持盃而飲粥皆流出霑胷勝曰衆情謂明公舊風發動何意尊體乃爾懿使聲氣纔屬說年老枕疾死在旦夕君當屈并州近好為之備恐不復相見以子師昭兄弟為託勝曰忝荆州懿乃錯亂曰君方到并州勝復曰當忝荆州懿曰年老意荒不解君言勝退告曺爽曰司馬公尸居餘氣形神已離不足慮矣故爽等不復設備魏邵陵厲公紀王衍曰荆州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣晉紀安禄山傾巧善事人人多譽之蠖屈䑕伏佞辭泉湧通鑑𤣥宗李訓所奨㧞率皆狂險之士然亦取天下重望以順人心如裴度令狐楚鄭覃皆累朝俊彦為當路所軋置之散地訓皆引居崇秩唐文宗邪人必更為黨以相欺蔽李徳裕傳互見朋比徳宗謂李勉曰衆謂盧杞姦邪朕故不知勉曰天下皆知而陛下不知此所以為姦邪也李勉傳黄門侍郎裴矩知必將有亂雖厮役皆厚遇之及亂作賊皆曰非裴黄門之罪故得免通鑑唐紀其姦足以亡隋其智足以佐唐姦人多才能與時而成敗也唐封倫裴矩贊牛僧孺曰帝王立法束縛姦邪唐書傳記曺操習噉野葛多飲鴆酒博物志曺操嘗云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者世説集大姦者材必有過於衆而能自媚於上王符論大則有鯨有鯤小則為梟為獍非玉燭之能調豈璿璣之能正庾信蛛絲小人熊曲綴𤓰果中杜甫掩人以自售近名以冒進欺謾於言說沓合於求取狎比其瑣細媒孽其僚友矯激以賣直詰讘以取容劉賓客以曲為形以邪為質以仁為凶以僭為吉以淫諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬭為安佚譖下謾上恒其心術妬人之能幸人之失栁文罵尸蟲包藏禍心素懐梟獍之性彰露凶徳思發豺狼之聲白樂天善柔成性佞媚為心包狼心發蠆毒舞智以固權張詐以聾上文粹本朝曺操夜卧枕圓鼓噉野葛至尺許鴆酒至一盞操之負人多矣恐人報已故先揚此聲以誑時人使之無害己意也元城語録狡猾經彼狡童兮詩析言破律亂名改作禮記史無助狡猾左昭二十六共一老禿翁何為首䑕兩端史灌夫傳張湯内懐詐心以御主外挾賊吏以為重西漢汲黯傳朱安世曰南山之竹不足受我辭斜谷之木不足為我械公孫賀傳張嶷以狡妄為猾伯晉書李密狡猾好反通鑑唐髙祖張鎬言許叔冀狡猾多詐唐肅宗傳記馮諼謁孟嘗君曰狡兔有三窟戰國䇿集忿戎王之淫狡文選􅘀狡鋒協好亂樂禍陳琳檄公平經雲行雨施天下平也君子裒多益寡稱物平施易鳲鳩在桑其子七兮淑人君子其儀一兮注云鳲鳩之養其子朝從上下暮從下上平均如一周道如砥其直如矢君子所履小人所視詩大道之行也天下為公禮記子曰唯仁者能好人能惡人論語子天之道髙者抑之下者舉之有餘者損之不足者補之老子權不能多少其數衡不能輕重其量管子怒不過奪喜不過予不下比以闇上不上同以疾下分爭於中不以私害之若是則可謂公士矣君子用公平之道故能百事無過荀子人之不事衡石者非負亷而逺利也石不能為人多少衡不能為人輕重求索不能故人不事也韓子衡之於左右無私輕重故可以為平繩之於内外無私曲直故可以為正人主之於用法無私好憎故可以為命春雨之灌萬物也洋然而流沛然而施無地而不注無物而不生無所好憎平之至也淮南子史砥節首公西漢王尊傳衡者所以平萬物也律歴志董仲舒曰天有所分予予之齒者去其角傅其翼者兩其足本傳賞不避仇讎罰不擇骨肉西漢據此之公無私如天地賈誼傳賞不遺逺罰不阿近爵不可以無功得刑不可以貴勢免習鑿齒曰諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怒者以其無私也魏明帝紀吾心如秤不能為人作輕重蜀諸葛亮傳王𢎞曰劉粹無私必無憂也南史宋髙祖紀劉子翼性剛直朋友有過常面責之李百藥常稱劉四雖復罵人人終不恨上謂房𤣥齡曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者非至公能如是乎通鑑唐太宗集七子均養者鳲鳩之仁也曹子建文集靈輝朝覯稱物納照選連珠不别荆棘者慶雲之恵也責躬詩表澤無不漸螻蟻之穴靡遺選昭王碑大國置衡鏡凖平天地心李白集天布寒暖不私於人品類既一髙下以均栁公綽太醫箴大明無偏照張藴古若懸衡然増之銖兩則俯反是則仰無可私者栁文公道世間惟白髪貴人頭上不曽饒杜牧之無心經子曰君子之於天下也無適也無莫也論語子有人方舟而濟於河有虛船来觸舟雖有褊心之人不怒復讎者不折鏌干雖有忮心者不怨飄瓦至人之用心若鏡不將不迎獨不見夫桔橰者乎引之則俯捨之則仰彼人之所引非引人者也故俯仰而不得罪於人荘子夫投鈎分財投䇿分馬非以鈎䇿為均使得美者不知所以徳得惡者不知所以怨慎子髙山深林非為虎豹也大木茂枝非為飛禽也淮南子鏌鋣不為巧者銳而為拙者鈍飄瓦擊人虛舟觸已雖有忮心而不怨者以彼無情於擊觸也嬰兒傷人而被傷者不以為怨劉子史利不在身以之謀事則智慮不私己以之斷義必厲東漢傳記明鏡之照物也妍媸必露不以毛嬙之面或有疵瑕而寝其鑒也虛室之傳響也清濁必聞不以緜駒之歌時有誤曲而輟其應也史通集雲無心而出岫陶淵明辭懸鏡待人駱賓王草不樹榮於春風木不怨落於秋天李白鏡懸肝膽露元稹集楚雲淡無心劉長卿本朝發達萬物而天下不以為徳摧敗草木而天下不以為怒泥上偶然留指爪鴻飛那復記東西譬如止水之在盤豈復勞心於鑒物東坡譬如鴈過長空影沈寒水鴈無留蹤之意水無涵影之心天衣壤禪師語若鑑之照物妍媸在彼隨物以應之明道語録記纂淵海卷四十六
