body:
  text: 記纂淵海卷七宋潘自牧撰地理部海經予决九川距四海海濵廣斥江漢朝宗于海四海㑹同東漸于海聲教訖于四海書沔彼流水朝宗于海詩東不盡東海記道不行乗桴浮於海論語子挟泰山以超北海禹掘地而注之海觀於海者難為水孟子海不辭水故能就其深管子渤海之東有大壑焉實為無底之谷名曰歸虛八紘九野之水天漢之流莫不注之而無増無减焉列子南溟者天池也南海之帝為儵北海之帝為忽諄芒遇苑風於東海之濵苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將遊焉井蛙不可以語於海天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知計四海之在天地間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎千里之逺不足以舉其大千仭之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損莊子海不辭東流大之至也列子積水謂之海荀子浮滄海而後知江河之惡沱也况枯澤乎百川學海而至於海浩浩之海濟樓船之力也歟水避礙則至於海揚子史中國名曰赤縣神州有大瀛海環其外史以蠡測海東方朔海瀕遐逺不霑聖化龔遂海沆漭而四周成公綏王融作海賦以示顧愷之愷之曰此賦實超𤣥虛但恨不道鹽耳即注曰漉沙搆白熬波出素積雪仲春飛霜暑路南史傳記海晦也主引晦濁其水黒而晦釋名中國者天下八十一分之一有海環之如此者九瀛海環之總曰八極類説凡四海通謂之禆海禆海之外復有瀛海環之山海經扶桑在碧海之中有蓬莱山周迴五十里其海水色正黒謂之冥海無風而洪波百丈惟飛仙能到有鳥名精衛昔赤帝之女遊乎東海溺死其神化為精衛常取西山之木石以填東海山海經天地四方皆有海水相通地在其中葢無幾也四海之外皆復有海東海共稱渤海义謂之滄海南海之别有漲海西海之東有青海北海之别有瀚海博物志東有碧海廣狭與東海等水不鹹苦正作碧色扶桑在碧海中樹長數千丈一千餘圍兩榦同根更相依倚是以名扶桑十洲記沃焦在碧海之東有石濶四萬里厚四萬里居百川之下尾故又名曰尾閭𤣥中記東海波聲如雷廣記海中水遇隂晦波如燃火滿海以物擊之迸散如星火有月即不復見木𤣥虛海賦云隂火潛燃豈謂此乎嶺南異物志麻姑謂王方平曰自接待以来見東海三變為桑田向到蓬莱水乃淺於徃者畧半也豈復為陵乎方平曰東海行復揚塵耳神仙傳海有八德一漸深二不窮底三廣無涯四出珍珠寳五大身衆生所居六無増减七同鹹味八不宿屍海有三德一曰深廣無邊二曰清凈不受襍穢三曰藏積無量珍寳菩薩之德義同海也海有五德一澄浄不受屍二多出妙寳三大龍㴻雨沛如車軸受而不溢四風日不能竭五淵深不測並海志不受毁戒之屍出恵明之寳佛書集波如連山乍合乍散噓吸百川洗滌淮漢大明㩠轡於金樞之穴翔陽逸駭於扶桑之津南澰朱崖北灑天墟東演析木西薄青徐經涂瀴溟萬萬有餘吐雲霓含龍魚隠鯤鱗潛靈居豈徒積太顛之寳貝興隨侯之明珠包乾之奥括坤之區惟神是宅亦祇是廬何竒不有何怪不儲茫茫積流含形内虛曠哉坎德卑以自居𢎞往納来以宗以都品物類生何有何無木𤣥虛海賦吐星出日天與水際總衆流而臣下為百谷之君王王粲賦今夫大海其東無東其西無西其北無北其南無南旦則浴日而出之夜則韜列星涵太隂揚隂火珠寳之光以為明其塵霾之雜不處也必泊之西澨故其大也深也潔也光明也無我若者栁文東海賦大海盪泊兮顛倒日月魚龍傾側兮神怪隳突滄茫無形兮往来遽卒隂陽開闔兮氣霧滃渤招海賈奔螭出抃兮翔鵬振舞天吳九首兮更笑迭怒垂涎閃舌兮揮霍旁午東極傾海流不屬冺冺超忽紛盪沃殆而一跌兮沸入湯谷舳艫霏觧捎若木海若嗇貨號風雷巨鰲頷首丘山頽猖狂震􅊒翻九垓並同上海於天地間為物最鉅韓文鯨鵬之大蝦蠏之細無不容歸以生以食同上川后時安流天吳靜不發揚帆采石華挂席拾海月謝靈運委輸百谷歸朝宗萬川溢分空碧霧晴連州彩雲宻隋煬帝古来海寒多天風白波連山倒蓬壺長鯨噴湧不可渉撫心茫茫淚如珠吾曽弄海水清淺嗟三變四溟揚洪波巨海納百川憑髙逺登覽直下見溟渤李太白溟漲鯨波動胡為慕大鯨輙擬偃溟渤浩蕩乗滄溟杜詩本朝登州海市時有雲氣如宫室臺觀人物車馬歴歴可見謂之海市歐公使河朔過髙唐縣夜有鬼神自空中過人馬之聲可辨父老云二十年前晝過亦彷彿見人物謂之海市筆談趙忠簡公謫朱崖浮海而南張帆早行見波濤間紅旗靡靡極目不斷呼問舟人舟人摇手令勿語急入舟被髪持刃出蓬皆割其舌出血滴水戒使臣閉目坐船内頃間舟人相呼曰更生更生乃言曰朝来所見盖巨鰌也所謂旗者其鬛耳夷堅志始知百川歸因有含容德吾聞海之大物類無窮極潛竒興貝寳萬狀不一識歐陽公眇觀交瀛海坐詠談天翁天外黒風吹海立東海如碧環西北卷登莱雲光與山色直到三山回我觀大瀛海巨津與天並九州居其間無異蛇盤鏡海靜蛟鼉出海若東来氣吐霓東坡黄濁歸大壑山谷瀆經奠髙山大川注云大川曰瀆禹貢司儀天子冬禮四瀆於北郊周禮四瀆視諸侯記王制子川有瀆仲尼之道猶四瀆也經營中國終入大海捨舟航而濟乎瀆者末矣揚子史中國川源以百數莫著於四瀆漢溝洫志東井南垣之東四星四瀆江河淮濟之精也晉天文志川瀆浩瀚而分流成公綏傳百川海瀆萬里交通隋地理志瀆之為言獨也不因餘水獨能赴海唐許敬宗傳傳記江河淮濟為四瀆四瀆者發源注海者也爾雅四瀆何以視諸侯能通百川於海能出雲雨其德甚美説苑四瀆之源最髙而長從髙注下其流激峻桓譚新論河經河出圖易九河既道至于龍門西河導河積石至于龍門南至於華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海書河水瀰瀰河水浼浼誰謂河廣一葦杭之誰謂河廣曽不容刀河水清且漣猗河水清且直猗河水清且淪猗不敢馮河詩兖州其川河泲周禮晉人將有事于河必先有事于滹沱記三王之祭川也皆先河而後海學記俟河之清人夀幾何左子禹疏九河孟子秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬於是河伯欣然自喜以天下之美為盡在已順流而東行至於北海東面而視不見水端河伯始旋其面目望洋向西而嘆曰吾非至於子之門則殆矣吾長見笑於大方之家莊子河水出崑崙東北陬貫東海入禹所導積石山禹為民剔河而導九岐河水九折淮南子河下龍門流駛竹箭駟馬追不可及慎子史禹以為河所從来者髙水湍悍難以行平地數為敗乃厮二渠以引其河北載之髙地過洚水至於大陸播為九河史河渠書漢文帝時河決酸􅀥東潰金隄武帝元光中河決於瓠子東南注鉅野通於淮泗天子使汲黯鄭當時興人徒塞之輙復壞自河決瓠子二十餘年天子乃使汲仁郭昌發卒數萬人塞之於是天子自臨決河沈白馬玉璧於河令羣臣從官皆負薪寘決河天子悼功之不成乃作歌曰瓠子決兮將奈何皓皓旰旰兮閭殫為河殫為河兮地不得寜功無已時兮吾山平為我謂河伯兮何不仁汜濫不止兮愁吾人齧桑浮兮淮泗滿乆不反兮水維緩於是卒塞瓠子築宫其上名曰宣房宫並同上吳起為魏西河守武侯浮西河而下中流顧謂起曰美哉山河之固此魏國之寳也起曰在德不在險史秦皇更名河曰德水本紀黄河為帶前功臣表武帝元光三年河水決濮陽汎郡十六發卒十萬救決河起龍淵宫紀漢武帝曰河乃大禹之所道也聖人作事為萬世功通於神明馮逡言禹非不愛民力以地形有勢故穿九河中國川源以百數莫著於四瀆而河為宗元帝時河決清河靈鳴犢口而屯氏河絶成帝時河決所灌之郡河隄使者王延世使塞三十六日河隄成以五年為河平元年谷永以為河中國之經瀆聖王興則出圖書王道廢則竭絶俱溝洫志三河在天地之中貨殖傳三河未澄光武贊河潤九里郭伋傳襄楷上書按春秋以来自古帝王未有河清者也河者諸侯之位清者屬陽濁者屬隂所當濁而反清者隂欲為陽諸侯欲為帝也傳大禹觀於濁河而受緑字晉地理志周保定二年青州黄河變清十里鏡徹龜兹國南三百里有大河東流號計戍水即黄河也北史唐肅宗乾元二年嵐州合河闗河三十里清如井水四日而變唐書朱全忠聚裴樞等及朝士貶官者三十餘人於白馬驛一夕盡殺之投尸於河初李振屢舉不中第故深疾縉紳之士言於全忠曰此輩嘗自謂清流宜投之黄河使為濁流全忠笑而従之唐書河源所出至于闐外為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異五代史傳記河出崑崙虛色白百里一小曲千里一曲一直爾雅九河一曰徒駭二曰太史三曰馬頰四曰覆釡五曰胡蘓六曰簡七曰潔八曰鉤盤九曰鬲津同上崑崙三層號曰天柱實河源水之靈府爾雅讚砥柱山禹鑿之以通河河水分流包山而過見水中若柱然水經崑崙山河水出焉至葱嶺山于闐國復分流岐山合而東流山海經黄河十二月各有水名正月名凌解水二月三月名桃花水四月名麥黄水五月名𤓰蔓水六月名􅈨山水七八月名荻苖水九月名登髙水十月名復槽水十一月十二月名蹙凌水水衡記河氷始合妖狐先聽方得渡言狐欲渡水先聽無水聲而後過述征記河者經天亘地之水河水清而天下平京房易傳河者水之伯上應天河孝經援神契聖人受命瑞必先於河神靈圖黄河千年一清聖王之大瑞治道記舜與三公臨河黄龍負圖出置舜前以黄金為繩白玉為檢河圖武王沈璧而榮光塞河尚書中候趙王政以白璧沈河有黒公從河出謂政曰祖龍来受天寳河圖考靈曜帝王將起河水先清清變白白變赤赤變黒黒變黄各三日也易乾鑿度魏賈鏘接黄河源水以釀酒詳見水類集與女遊兮九河衝風起兮水横波乗水車兮荷蓋駕兩龍兮驂螭登崑崙兮四望心飛揚兮浩蕩日將暮兮悵忘歸惟極浦兮寤懷魚鱗屋兮龍堂紫貝闕兮朱宫靈何為兮水中乗白黿兮逐文魚與女遊兮河之渚流澌紛兮將来下子交手兮東行送美人兮南浦波滔滔兮来迎魚鱗鱗兮媵予楚詞九歌輝輝洪河家國之濵襟帶晉衞領袖齊秦張暢頌鴻流導積石驚浪下龍門仙槎不辨處沈璧想猶存劉孝孫詩覽百川之𢎞壯兮莫尚美於黄河潛崑崙之峻極兮出積石之嵯峨登龍門而南遊兮拂華隂與曲阿凌砥柱而激湍兮踰汭洛而揚波成公綏賦黄河西来決崑崙咆哮萬里觸龍門黄河之水天上来奔流到海不復回鳴鞭走馬凌黄河㧞劒四顧驚茫然欲渡黄河氷塞川洪河凌競不可以徑渡水龍鱗鱗兮難容船李白誰開崑崙源流出混沌河積雨飛作風驚龍噴為波孟郊解通銀漢應須曲纔到崑崙便不清髙祖誓擬衣帶小仙人占斗客槎輕羅隠本朝張騫使大夏雖號為窮河源實不見河徒見兩水從葱嶺于闐合流入於蒲昌海即以其所出水便謂之河其實不知西南羌中實自有河今吐蕃中河自西南數千里向北流見於積石山相連又吐蕃自言崑崙在國之西南則河之所出也由是觀之則河出於崑崙明矣張騫遂以葱嶺于闐二水為河而太史公班固遂有張騫窮河源惡觀所謂崑崙之説豈其誠然也東坡河決三門合四水徑流萬里東輸海鞏洛之山夾而峙河来齧山作沙觜山形迤邐若奔避河益洶洶怒而詈舟師弭楫不以帆頃刻奔過不及視盖聞河源出崑崙其山上髙大無際自髙瀉下若激箭一曲一直一千里湍雄衝急乃迸溢其勢不得不愁耳前嵗河怒驚滑民浸瀬洋洋淫不止滑人奔走若鋒駭河伯視之以為戯河水激箭險誰言航葦遊堅氷馳馬渡伏浪捲沙流樹落驚樵岸湍奔忽改州鑿龍饒退鯉漲潦不分牛歐陽河伯方夸若靈渦自舞馮無言贈君有長嘆美哉河水空洋洋東坡江江漢附經三江既入江漢朝宗于海岷山導江東别為沱又東至于澧過九江至于東陵東迤北㑹于匯東為中江入于海書美化行乎江漢之域詩序江之永矣不可方思江有汜江有渚江有沱滔滔江漢南國之紀江漢浮浮江漢湯湯如江如漢詩荆州其川江漢周禮揚州其川三江同上江漢淮漳楚之望也左子江漢以濯之禹決汝漢排淮泗而注之江孟子江出岷山東流絶漢江漢以為池淮南子史岷山為大江至九江為中江至徐陵為北江漢地理志注伍子胥奔吳至江江上有漁父乗船乃渡之子胥既渡解其劒曰此劍直百金以與父父曰楚國之法得伍子胥者爵執珪豈圖百金劒耶不受史記魏文帝伐吳至長江見波濤洶湧歎曰固天所以限南北也遂歸吳歩騭表云魏人圖江東多作布囊欲以盛沙塞江孫權曰此江與開闢俱生寜可以沙囊塞每讀此表令人大笑三國志晉祖逖渡江至中流擊楫而誓曰祖逖不能清中原而復濟者有如此江晉書隋文帝謂髙熲曰我為百姓父母豈可限一衣帶水不拯之乎命亟作戰船使投柹於江南史隋楊素帥水軍東下陳後主謂侍臣曰彼何為者邪孔範曰長江天塹古以為限隔南北今日虜軍豈能飛渡邪通鑑傳記江貢也所出珍物可獻貢也風俗通江水始出岷山其源可以濫觴及其至於江津不舫楫不避風不可以渉楚昭王渡江有物大如斗圓而赤直觸王舟王遣使之魯問孔子孔子曰此萍實也可剖而食之童謡云楚王渡江得萍實大如斗赤如日剖而食之甜如蜜家語禹濟江黄龍負舟禹仰天嘆曰吾受命於天竭力以養民死命也余何憂於龍焉龍俛首曵尾而逝吕氏春秋江至潯陽分為九道一白烏江二蚌江三烏土江四嘉靡江五畎江六源江七廩江八提江九菌江初學記集令沅湘兮無波使江水兮安流楚詞九歌吞江納漢吳都賦惟岷山之導江初發源於濫觴衝巫峽以迅激躋江津而起漲極泓量而海運狀滔天以淼茫總括漢泗兼包淮湘并吞沅澧吸引睢漳源二分於崌崃流九派乎潯陽注五湖以漫漭灌三江而漰沛滈汗六州之域經營炎景之外所以作限於華裔壯天地之險介呼吸萬里吐納靈潮激逸勢以前驅乃鼓怒而作濤長波浹渫峻湍崔嵬盤渦谷轉凌濤山頽郭璞賦澄江淨如練謝朓春江壯風濤顔延平江路一悠哉滔滔九派来逺潭昏似霧前浦沸成雷蘓味道風摇蜀棘下日照楚萍開同上長江萬里清長江流寒聲孤帆逺影碧山盡惟見長江天際流江色緑且明茫茫與天平横江西望阻西秦漢水東連揚子津白浪如山那可渡狂風愁殺峭帆人李白江歛洲渚出魚龍寂寞秋江冷江光隠見黿鼉窟江間波浪兼天湧寒江動碧虛江從月窟来春江不可渡二月已風濤峡險江驚急登樓况有江江清心可瑩湛湛長江去杜詩江漢雖云廣乗舟波無艱江作青羅帶韓集澄江抱青灣江流曲似九回腸栁集大江吞天去澄練横秋洙杜牧之本朝秋江湛已清歐陽西江之水何悠哉經歴灨口險且回餘波拗怒猶涵澹渀濤激浪常喧豗有時夜上滕王閣月照淨練無纎埃江如自天傾同上長江連楚蜀萬派瀉東南與君飲酒細論文酒酣訪古江之墳仲謀公瑾不須弔一酹波神英烈魂清江縈山碧玉環浩蕩長江赴滄海此生長江三萬頃只應明月照環空笑看江水拍天流春江緑漲蒲萄醅猶喜大江同一味故應千里共清甘我家峨眉隂與子同一邦相望六十里共飲玻瓈江東坡日暮江空煙水寒注目長江天際流出門一笑大江横山谷淮江淮附經導淮自桐柏東㑹于泗沂東入于海淮沂其乂書淮水湯湯淮水湝湝淮有三洲率彼淮浦詩青州其川淮泗橘逾淮而北為枳周禮子禹排淮泗而注之江孟子今按淮水未嘗入江史漢武招徕南甌事兩粤江淮之間蕭然煩費矣前食貨志元封五年詔朕巡荆揚輯江淮物本紀唐第五琦曰賦之所出以江淮為淵唐本傳傳記淮圍也圍繞揚州北界東至海也釋名淮水出南陽桐柏山其源湧出復潛流三十里然後長騖水經雀入於淮為蜃國語淮水東經淮隂縣韓信釣於此處初學記禹治水至桐柏獲淮渦水神名曰無支祁形如獼猴力踰九象禹乃命庚申制之遂鎻於龜山之下淮水乃安山海經莊周見道牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝詣楚王決江淮以漑汝鮒魚曰今命在盆盎之中爾乃為我見楚王決江淮以漑我汝即索我於枯魚之肆矣説苑集從王師以南征兮浮淮水而遐逝背濁浦之曲流兮望馬丘之髙澨泛洪櫓於中潮兮飛輕舟乎濵濟建衆檣以成林兮譬無山之樹藝王粲賦淮水不絶波瀾髙李白清淮無波平如席淮之水舒舒淮水出桐柏栁集本朝梁武帝欲以淮水灌夀陽乃作浮山堰於鍾離冶鐵器數萬斤益以薪石沈之踰年乃合魏人患之果徙夀陽戍未幾淮暴漲堰壞有聲如雷水之怪妖蔽流而下死者數十萬人初鎮星犯天江而堰成退舎而壞嗚呼異哉秦少遊序淮之水淮之水春風吹春風洗青於藍緑染指魚不来鷗不起㶑㶑灔灔天盡頭祗見孤帆不見舟殘陽欲落未落處盡是人間今古愁徐仲車春風淮水浪崢嶸長淮漸落見洲渚歐陽公長淮乆無風放意弄清快青派連淮上好在長淮水十年三徃来東坡濟經導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北㑹于汶又北東入于海書濟有深渉有瀰濟盈濟盈不濡軌詩鸚鵒不踰濟周禮兖州其川河泲幽州同同上鄭伯之車僨於濟左傳子禹瀹濟漯而注之海孟子濟水通和宜麥淮南子史唐髙宗問許敬宗曰天下洪流巨谷不載祀典濟甚細而在四瀆何哉對曰瀆之言獨也不因餘水獨能赴海者也濟雖細獨而尊也唐書傳記濟濟也言源出河北濟河而南也釋名濟者齊也齊其度量也風俗通濟水出河東垣縣王屋山初名沇水東出温縣始名濟水又東南流入河與河並流過成臯溢出為滎初學記濟水自大伾入河與河水鬬而東流西征記集温方涌瑞沇源導濟引流通滄實侔四體作潤岱坰含雲吐醴淵波湛湛川風瀰瀰魏文帝祭文濁河終不汚清濟杜詩漢沔經嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海書漢廣文德所及也詩序漢之廣矣不可泳思詩楚國漢水以為池蔡昭侯為兩佩與兩裘以如楚獻一裘一佩於昭王子常欲之留之三年蔡侯歸及漢執玉而沈曰余所有濟漢而南者有如大川左子禹決汝漢而注之江孟子漢出嶓冢淮南子史周昭王南巡守渉漢􅊑壞溺死史傳記漢水出隴坻道縣嶓冢山初名漾水東流至武都沮縣始為漢水東南至葭萌與羌水合至江夏安陸縣名沔水故有漢沔之名初學記鄭交甫過漢臯遇二女妖服佩兩珠交甫與之言曰願請子之珮二女解珮與交甫懷之而去十歩探之則亡矣二女亦不見韓詩外傳沔水東經嵩山下有潭杜元凱作兩碑述己功一碑在峴山一碑沉此潭中曰千載之後何知不深谷為陵水經沔水有蛟為害鄧遐守襄陽㧞劍入水截蛟數段流血水丹蛟患遂息荆州記集漢江一帶碧流長兩岸春風起緑楊借問膠船何處沒欲停蘭棹祀昭王胡曽東流既渳渳南紀信滔滔水激沉碑岸波駭弄珠臯含星映淺石浮盖下渀濤李百樂檣烏相背發塞鴈一行鳴南紀連銅柱西江接錦城杜甫涇渭經涇屬渭汭禹貢導渭自鳥鼠同穴東㑹于澧又東㑹于涇又東過漆沮入于河書涇以渭濁湜湜其沚詩雍州其川涇汭其浸渭洛周禮涇晉侯伐秦秦人毒涇上流師人多死左渭秦康公贈送文公於渭之陽詩渭陽序子渭水多力宜黍淮南子史涇秦二世夣白虎囓左驂卜涇為祟乃齊望夷宫而欲祀之史武帝時趙中大夫白公奏穿渠引涇水溉田名白渠人得其饒歌曰田于何所池陽谷口鄭國在前白渠起後舉鍤為雲决渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口漢書渭西伯將出獵卜之曰所獲非龍非螭非熊非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽西伯曰吾太公望子乆矣故號之曰太公望與俱載歸立為師秦始皇復道向阿房宫渡渭屬之咸陽史張釋之為廷尉漢文帝出中渭橋有人從橋下走乘輿馬驚使騎捕屬廷尉釋之奏犯蹕當罰金武帝元光六年穿漕渠通渭漢書傳記涇渭洛為闗中三川初學記涇渭合流二百里清濁不襍二秦記涇周㳟王遊於涇上宻康公從有三女奔之其母曰必致之王康公不許一年恭王滅宻國語韓聞秦之好興利欲罷之無令東伐乃使水工鄭國間説秦令鑿涇自中山西控瓠口為渠溉田戰國䇿渭漢都渭南開北闕以臨渭初學記始皇都咸陽渭水貫都以象天漢三輔黄圖漢武帝時張寛從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車知我所来時張寛在第七車對曰天星主祭祀者齋戒不潔則女人見耆舊傳渭水有忖留神與魯班語班令其出忖留曰我貎醜卿善圖物容我不能出班拱手曰出頭見我忖留乃出首班以脚畫地忖留覺之便還没水水經注項仲山飲馬渭水日以三錢償之三輔決錄陳季卿覊棲輦下常訪僧於青龍寺遇僧他適因憇於煖閣中有終南山翁方擁爐而坐東壁有寰瀛圖季卿嘆曰得自渭泛河濟江達於家亦不悔無成而歸翁乃命僧童折階前一竹葉作舟置圖中渭水上季卿熟視恍若登舟旬餘至家復登葉舟泛江至青龍寺見山翁尚擁褐而坐廣記集涇秦有水犄汨泥淖撓混沙礫視之分寸眙若睨壁淺深險易昧昧不覿乃合清渭以自彰穢跡故其名曰濁涇栁文導源經隴坂屬汭貫瀛都下瀨波常急廻圻溜亦紓毒流秦卒斃泥糞漢田腴獨有迷津客懷歸軫暮途徐珩渭故國流清渭清渭無情極愁時獨向東渭北春天樹清渭東流劍閣深杜詩渭源奔鳥穴輕瀾起客亭淺淺滿澗響蕩蕩竟川鳴潘生稱運石馮子聽波聲斜去臨天半横来對始平合流應不雜方知性本清宇文逌本朝清渭無心映涇濁涇渭清混山谷洛經洛出書易導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河書太康畋于有洛之表昆弟五人須于洛汭書並序天乃錫禹洪範九疇注云天與禹洛出書神龜負文有數至九禹因第之以成九類洪範我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食洛誥瞻彼洛矣維水泱泱詩豫州其川滎雒周禮子洛水輕利而宜禾洛出獵山淮南子史武帝穿渠引洛水岸善崩乃鑿井深四十餘丈徃徃為井井下相通行水漢書李膺郭林宗泛舟洛水望之者以為仙舟後漢黄帝生於元扈洛水之上有鳯凰銜圖置帝前以黄金為匣宋書傳記洛之為言繹也繹光耀也春秋説題辭洛字或作雒初漢火行忌水故雒去水而加佳魏為土行水得土而流土得水而柔故去佳而加水典畧洛水出京兆上洛縣冢嶺山水經注王者盛德之應洛水先温九日乃寒五日變為五色帝王將起河洛龍見首黒者人正白者地正赤者天正乾鑿度黄帝遊洛水之上始得圖書詳見霧類湯沈璧於洛乃獲黄魚黒玉之瑞帝王世紀武王沈璧於河至日旰青雲浮洛尚書中候靈王二十二年榖洛鬬將毁王宫伊洛竭而夏亡國語秦買之山洛水出焉東注于河其中有藻玉山海經洛水底有礜石述征記集余從京師言歸東藩北過伊闕越轘轅經通谷凌景山容與乎陽林流盼乎洛川覩一麗人於巖之畔乃援御者而告之曰彼何人斯若斯之艷也御者對曰臣聞河洛之神名宓妃君王所見毋乃是乎曹植洛神賦湖子夫歴陽之都一夕化而為湖勇力聖知與不肖者同命無遺説也淮南子史三苖氏左洞庭右彭蠡德義不修舜滅之史陳訓少學天文時錢塘湖開或言天下當太平青葢入洛孫皓以問訓訓對曰臣能望氣不逹湖開塞退告友曰青葢入洛將有輿櫬衘璧之事非吉祥也晉書㑹稽太守孟顗事佛精慤而為謝靈運所輕東郭有迴踵湖靈運求決以為田顗堅執不與又求始寜岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生民言論毁傷遂搆讎隙宋書禇無量家近臨平湖湖中有龍鬬傾里閈就觀之無量時年十二讀書晏然不動唐書傳記湖池也廣雅湖大陂也説文湖曰都四靣流瀆所隈都也風俗通由拳縣秦時長水縣始皇時童謡曰城門有血城當陷没有嫗聞之朝徃窺門門將欲縳之嫗言其故後門將以犬血塗門嫗見血走去忽有大水遂淪為湖搜神記懷北縣有蔣公湖先代有祭祀祈請者湖輙下大魚與之永嘉記華容縣東南有雲夢澤一名巴丘湖荆州記交州有湖去合浦四十里毎隂雨日見有銅船出水上以雞酒為祭便大獲魚若此禮不設唯得牛糞交州記桓冲為江州刺史遣人周行廬山冀遇靈異既陟崇巘有一湖中有赤鱗魚使者渇極欲飲有羣白鱗魚張鬐向之使者不敢飲述征記龍目湖秦王東遊觀地勢云有天子氣使赭衣鑿湖中長岡使斷因改為丹徒京記梁武帝望京峴山盤紆似龍掘其右為闕湖梁典潤州遏坡有為湖名龍目湖郡國志子英常於闕湖捕魚得赤鯉持歸以穀養之一年遂生角趐魚云闕迎汝子英騎之即乘風雨騰而上天南徐州記髙沙湖昔陶侃㣲時喪母有二客來弔化為雙白鶴飛去後因以為名郡國志曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上闕承丹徒陳驪覆船山馬林溪水色白味甘輿地志銅船湖馬援鑄銅船五隻一留此湖中四隻將過海征林邑方輿記巢湖即古巢縣一日江漲港有巨魚合縣食之有一老姥獨不食遇老叟曰此吾子也汝獨不食吾厚報汝若東門石龜目出城當陷姥日往視有稚子訝之姥以實告稚子以朱傳龜目姥見而急出城有青衣童子曰吾龍之子也乃引姥登山城遂陷為湖焉青瑣髙議集夫差姑蘇臺東有丹湖萬頃内有金銀塘陸賈新語曰舜藏黄金於巉巖之下捐珠玉于五湖之泉以塞淫邪之路伏滔登臺詩序李白汎沔州郎官湖詩序云白遷夜郎遇故人尚書郎張渭出使夏口沔州牧杜公漢陽宰王公觴于江城之南湖張公曰此湖古來賢豪遊者非一而枉踐佳景寂寥無聞夫子可為我標之嘉名以傳不朽因自舉酒酹水曰郎官湖亦猶鄭囿之有僕射陂也詩云郎官愛此水因號郎官湖風流若未滅名與此山俱湖濶數千里湖光摇碧山南湖秋水夜無煙耐爾乘流直上天明湖映天光徹底見秋色湖清霜鏡曉李白湖色春光凈客船隠見清湖隂湖水林風相與清養拙江湖外湖日落江明杜詩本朝重湖亂水緑渺渺平湖碧玉田平湖十頃碧琉璃歐陽公此生定向江湖老投老江湖終不失東坡太湖經震澤底定書揚州其澤藪曰具區其浸五湖周禮傳記句踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乗扁舟浮五湖而不返先賢傳太湖一名震澤一名笠澤一名洞庭揚州記按張勃吳錄五湖者太湖之别名以其周行五百餘里故以五湖為名或説以太湖射瀆湖上湖洮湖滆湖為五湖按國語吳越戰於五湖直在笠澤一湖中戰耳則知或説非也風俗通夏至前三五日吳都太湖中白魚向湖北淺水菰蒲之上産子民得採之隋大業志湖是仙人浮玉之北堂太湖記震澤中洞庭山有洞穴深百餘尺仰公􅀈誤墮洞中至一龍宫下有青泥晝夜常明飢食青泥味若粳米飯記得歸路得出事聞梁武帝帝問杰公公曰此洞穴有四支一通洞庭湖西岸一通蜀道青衣浦北岸一通浮羅兩山間大谿一通枯桑島東􅂒梁公記集平湖曠復逺髙榭峻而危吳均終當遊五湖濯足滄浪泉李白本朝作隄捍外非吾事閒送苕溪入太湖朅来震澤都如夢只有苕溪可倚樓東坡三萬六千頃湖浸海内田逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豊年羅隠詩杳杳波濤閲古今四無邉際莫知深潤通曉月為清露氣入霜天作瞑隂笠澤魚肥人鱠玉洞庭柑熟客分金風煙觸目相招引聊為停橈一楚吟蘓子美洞庭湖經九江孔殷過九江至於敷淺原過九江至于東陵書按九江即洞庭也東陵今岳州巴陵縣是傳記青草湖一名洞庭湖荆州記巴陵南有青草湖周迴數百里日月出沒其中湖南有青草山故因以為名同上洞庭亦謂之太湖在巴陵郡初學記洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之内中有此洲南名青草北名洞庭所謂重湖也南遷錄湘江北流至岳陽達蜀江夏潦後蜀江漲遏住湘波溢為洞庭凡數百里而君山宛在水中北夢瑣言湖南馬希範入覲莊宗曰湖南有洞庭其波無際是乎希範曰陛下南巡此湖不足飲馬南唐野史唐桞毅應舉下第還至涇陽見一婦人牧羊毅詰之對曰妾洞庭龍君小女嫁涇川次子夫婿厭薄黜以至此聞君將還吳欲以一書寄托君至洞庭橘社擊樹三發當有應者毅如其教俄有武夫出於波間掲水指路引毅以至其宫見一人被紫衣執青珪因取書進之洞庭君覽畢泣曰老夫之罪不謹鑒聽須臾宫中皆慟哭忽有赤龍長萬餘尺擘天飛去俄而紅粧笑語中有一人白齒蛾眉君笑謂毅曰涇水之囚人至矣明日宴毅於凝碧宫毅辭歸贈遺甚厚毅娶盧氏女生一子踰月笑謂毅曰余即洞庭君之女也遂相與歸洞庭莫知其跡異聞集有商人過青草湖遇湖君得如願乃一少婢也嵗時記詳見元日類集嫋嫋兮秋風洞庭波兮木葉下楚詞九歌洞庭西望楚江分水盡南天不見雲且就洞庭賒月色將船買酒白雲邊洞庭湖西秋月輝淡掃明湖開玉鏡丹青畫出是君山帝子瀟湘去不還空餘秋草洞庭間李白鮫室圍青草龍堆擁白沙護江盤古木迎棹舞神鴉破浪南風正迴檣畏日斜湖光與天逺直欲泛仙槎洞庭猶在目青草續為名驛邊沙舊白湖外草新青湖濶兼雲霧昔聞洞庭水今上岳陽樓春近岳陽湖青青洞庭湖東浮滄海脣君山可避暑况此采白蘋杜詩洞庭九州間厥大誰與讓南維羣崖水北注何奔放瀦為七百里吞納名殊狀韓集湖光秋月兩相和潭靣無風鏡未磨遥望洞庭山木翠白銀盤裏一青螺楚望何蒼然層瀾七百里孤城寄逺目一瀉無窮已蕩漾浮天盖回環宣地理積漲在三秋混成非一水冬遊見清淺春望多洲沚雲錦逺沙明風煙青草靡明月出中央青天絶纎滓素光淡無際緑淨平如砥劉夢得本朝南康宜在彭蠡九江敷淺原之間疑晁氏九江東陵之説以為巴陵洞庭者為可信盖江流自澧而東即至洞庭而巴陵又在洞庭之東也若謂九江即今江州之地即其下少東便合彭蠡之口不應言至東陵然後東迤北㑹於匯也敷淺原即今廬阜德安縣敷陽山正在廬山之西南故謂之敷陽朱文公集洞庭青草渺無際東坡出没魚龍聚飛沉日月連夏竦幾處雲藏寺千家月在船范文正公卧聞岳陽城裏鐘歐陽公湖光上下天水融中以日月分西東楊龜山荆湘沅鼎澧合沓五水流李復圭氣凌雲夢吞八九欲與溟渤爭雌雄胡致堂有時風浪戰城西何啻漁陽萬鼔鼙胡五峯彭蠡湖鄱陽湖宫亭湖同經彭蠡既豬東匯澤為彭蠡東迤北㑹于匯書史廬山有神與人語言能令宫亭湖分風船行舉帆相逢欒巴為豫章太守神不復作聲後本傳傳記宫亭即彭蠡澤也謂之彭澤湖一名匯澤宫亭湖廟神甚有靈驗能使湖中分風而船南北荆州記彭蠡湖在潯陽縣東南湖心有大孤山按郡國志彭蠡湖周迴四百五十里内有石髙數十丈大禹刻其石以紀功焉又有乞烏隨船行舟人擲摶飯接之髙下不失一粒九江記集人乘海上月帆落湖中天彭蠡將天合李白本朝茫茫彭蠡春無地白浪春風濕天際東西捩柂萬舟迴千歲老蛟時出戱少年輕事鎮南来水怒如山帆正開中流蜿蜒見脊尾觀者膽墮予方咍衣冠今日龍山路廟下沽酒山前住老矣安能學佽飛買田欲棄江湖去王荆公千越亭前越風起湖入鄱陽三百里曉来一雨洗新秋身在江東圖畫裏王十朋西湖集放水漑田每减一寸可漑十五頃可無凶嵗白居易西湖記孤山寺北賈亭西水靣初平雲脚低最愛湖東行不足緑楊隂裏白沙隄煙波淡蕩摇空碧樓殿參差倚夕陽到岸請君迴首望蓬莱宫在海中央郊外迎人月湖邊醒酒風誰留使君飲紅竹在舟中借問連宵直南省何如盡日醉西湖排比管絃行翠袖指麾船舫㸃紅旌慢牽好向湖心去恰似菱花鏡上行湖上春来似畫圖亂峯圍繞水平鋪松排山面千種翠月㸃波心一顆珠緑藤隂裏鋪歌席紅藕花中泊妓船白居易本朝唐長慶中白居易為刺史方是時西湖漑田千餘頃及錢氏置撈湖兵士千人日夜開浚自國初以来稍廢不治水涸草生漸成葑田熈寜中臣通判本州則湖之葑合者盖十二三年至今纔十六七年之間遂塞其半更二十年無西湖矣使杭無西湖如人之去眉目豈復為人乎東坡奏修西湖狀長憶西湖勝鑑湖春波千頃碧如鋪范文正公行挽秋風入剡溪為君先醉西湖月秦觀門前碧浪家家海樹上青山寺寺雲陳堯佐一川風露荷花曉六月蓬瀛燕坐凉曽南豐西湖直西子煙樹㸃眉目昨夜風月清夢到西湖上吳儂生長湖山曲呼吸湖光飲山緑不論世外隠君子傭兒販婦皆氷玉夏潦漲湖深更幽西風落木芙蓉秋飛雪闇天雲拂地新蒲出水栁映洲湖上四時看不足惟有人生飄若浮菰蒲無邉水茫茫荷花夜開風露香漸見燈明出逺寺更待月黒看湖光水光㶑灧晴偏好山色空濛雨亦竒欲把西湖比西子淡粧濃抹總相宜瓊瑶百頃水仙家風淨湖平響釣車寂歴踈松欹晩照伶俜寒蝶抱秋花東坡水天相映淡溶溶隔水青天無數重白鳥背人秋自逺蒼煙和樹晩来濃春水淨於僧眼碧晩山濃似佛頭青林和靖鑑湖史賀知章請為道士還鄉里詔賜鑑湖剡川一曲唐書傳記後漢㑹稽太守馬臻創立鏡湖築塘蓄水可丈餘田又髙海丈餘若水少則洩湖溉田如水多則閘湖洩田中水入海所以無凶年㑹稽記創湖之始多淹塜宅有千餘人怨訴於臺臻遂被刑於市及臺中遣使按鞫驗籍皆是先死亡之人名同上山隂南湖縈帶郊郭白水翠巖互相映發有若圖畫輿地志集山隂路上行如在鏡中遊王右軍鏡湖三百里菡萏發荷花五月西施採人觀隘若耶李白靈汜橋前百里鏡石帆山掩五雲溪元稹鏡水無風也自波賀知章君在鏡湖西半住四明山下莫經春門前幾箇採蓮女欲泊蘭舟無主人施肩吾本朝湖光如鑑月如珪月下湖中兩槳飛鶴氅四垂氷骨響夜深疑自廣寒歸林㮣記纂淵海卷七
