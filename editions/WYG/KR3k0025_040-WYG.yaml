body:
  text: 記纂淵海卷四十宋潘自牧撰人倫部喪女經女子筓而不為殤禮記殤者女未筓而死可殤者史許嫁筓而字死則以成人之喪治之糓梁女子許嫁不為殤集曽未弱筓無疾而殞潘岳景陵女哀詞本朝􅆊􅆊一作㷀稚魂類要出適經歸妹女之終也嫁也易之子于歸宜其家室宜其家人維鵲有巢維鳩居之之子于歸百兩御之諸侯之子嫁扵諸侯送御者皆百乗女子有行逺父母兄弟齊子歸止其從如雲親結其縭九十其儀諸娣従之祁祁如雲詩男有分女有歸凡女行於大夫以上曰嫁行於士庶人曰適人女子適人者為其父母期女子許嫁笄而字以許嫁為成人納女扵天子曰備百姓於國君曰備酒漿於大夫曰備掃灑女子許嫁繋纓有従人之端也女在塗而女之父母死則女反嫁女之家三夜不息燭思相離也禮子女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也孟人有嫁其女而教之者曰爾為善人疾之對曰然則當為不善乎曰善尚不可為而况不善乎淮南子史凡公子嫁扵敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸侯皆行公不自送於小國則上大夫送之左禮送女父不下堂母不出門父誡之曰謹従汝舅之言母誡之曰謹従汝姑之言諸母誡之曰謹従汝父母之言糓梁婦人許嫁字而筓之公羊張負以女孫予陳平誡曰母以貧故事人不謹事兄伯如父事嫂如母卓王孫分予文君僮百人錢百萬及其嫁時衣被財物史施衿結縭申父母之戒戴良五女並賢每有求姻輒便許嫁練裳布被竹笥木屐以遣之後漢傳記趙母嫁女女臨去敕之曰謹勿為好女曰不為好可為惡也母曰好尚不可為其況惡乎世說少君之裝送甚盛東觀漢紀集辭父母而有行奉君子之清塵如懸蘿之附松似浮萍之托津魏丁廙妻賦二合兆嘉偶女子禮有行潔己入徳門終逺母與兄晉陸機詩辭父母而言歸丁廙婦賦伊女子之有行爰奉嬪於高族潘安仁賦婉彼幽蘭女作嬪君子室顔延年詩齊姜之歸魚軒􅁮以照路張九齡念爾嫁猶近稚年那别親俛首戴荆釵欲拜悽且頻本來儒家子莫恥梁鴻貧劉長卿妾身未分明何以拜姑嫜杜詩長女當及事誰助出帨縭韓集入門而媪御皆喜既饋而公姑交賀墓銘入門上下莫不贊賀楚國夫人誌歸寧經歸寧父母詩父母終思歸寧而不得詩序姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食禮記史把伯姬來歸寧也寧問父母安否凡諸侯之女歸寧曰來夫人歸寧曰如某楚子庚聘于秦為夫人寧禮也夫人父母既没歸寧使卿左婦人反曰來歸糓梁孫經君子抱孫不抱子此言孫可以為王父尸禮記子之子為孫爾雅史于今抱孫焉曽孫體近西漢言曽孫之身於帝為近親云李廣之子當户早死當户有遺腹子陵將兵撃胡本傳李廣有孫陵善騎射帝以為有廣之風使備胡通鑑富平侯者張安世四世孫放也漢成紀裴耀卿叔業之七世孫也郭子儀諸孫數十每問安不能盡辨顔色頷之而已唐徳宗紀鄭𤣥之子益恩赴黄巾之難隕身有遺腹子𤣥以其手文似已名之曰小同後漢臣無祖母無以至今日祖母無臣無以終餘年母孫二人王承㫤之孫清虛寡欲不飾文辭論者以為祖不及孫王羲之率諸子抱弱孫一味之甘割而分之以娛目前張憑數嵗祖鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎晉書謝靈運子鳯鳯子超宗有文辭帝大嗟賞謂謝莊曰超宗殊有鳯毛靈運復出南史員俶九歲升坐詞辯注射帝異之曰半千孫固當然新唐書集籍籍名家孫杜詩玉牙珠顆小男兒羅薦蘭湯浴罷時芣茝春來盈女手梧桐老去長孫枝白樂天承先人之後者在孫惟汝韓文本朝有後慶多孫欒城集姑經問我諸姑父之姊妹稱姑詩房中内賔姑姊妹也儀禮父之姊妹為姑爾雅史姪其從姑謂我姪者我謂之姑左吕禄時出遊獵過其姑吕􅎐大怒曰若為將今棄軍吕氏今無處矣乃悉出珠玉寳器散堂上曰母為他人守也班婕妤彪之姑狄仁傑曰姑姪與母子孰親通鑑張廵姊軍中號陸家姑張巡傳傳記温嶠䘮婦從姑劉氏家有一女甚有姿慧姑以屬公覔婚公報云已覔得婚處門地粗可婿身名宦盡不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴世說兄弟經惟孝友于兄弟書終鮮兄弟鮮寡也忽之兄弟争國寡兄弟之恩今人以無兄弟終鮮恐誤常棣之華鄂不韡韡凡今之人莫如兄弟兄弟䦧于牆外禦其侮脊鴒在原兄弟急難豈伊異人兄弟匪他兄弟既具和樂且孺兄及弟矣式相好矣無相猶矣伯氏吹壎仲氏吹篪此令兄弟綽綽有裕不令兄弟交相為瘉叔兮伯兮倡予和女豈無他人不如我同父詩脤服膰之禮親兄弟之國周禮聞逺兄弟之䘮雖緦必往兄之齒雁行兄弟睦家之肥也禮記男子先生為兄先生為兄之兄恐當作晜字後生為弟晜兄也兄之子弟之子相謂為従父晜弟爾雅司馬牛憂曰人皆有兄弟我獨亡語子為人兄慈愛而見友為人弟敬詘而不悖荀君道史太姒之子惟周公康叔為相睦也吾兄弟比以安尨也可使無吠寡人有弟不能和恊而使餬其口於四方富辰曰兄弟雖有小忿不廢懿親叔出季處有自來矣二恵競爽猶可又弱一个焉貴介弟也兄愛而友弟敬而順左兄弟天倫也榖梁雙生以後生為兄取其居上公羊趙嬰曰我亡吾二昆其憂哉左季心以勇季布以諾著聞關中史本傳馮野王弟立治行相似吏民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恵吏民政如魯衛徳化均周公康叔猶二君兄弟敵吾一體一支姜肱與二弟名聲相次皆不應徴聘賈彪兄弟三人天下稱曰賈氏三虎許劭字子將汝南平輿人也兄䖍亦知名汝南人稱平輿淵有二龍焉漢書姜肱嘗與弟季江俱詣郡夜扵道為盜所刼欲殺之肱曰弟年幼父母所憐又未聘娶願殺身代弟季江曰兄年徳在前家之珍寳國之英俊乞自受戮以代兄命盜遂兩釋焉王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥往及長娶妻母虐使祥妻覽妻亦趨而共之通鑑友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷懽愉之日心乎愛矣書不盡言梁紀隋帝謂羣臣曰五子同母眞兄弟也陳紀牛𢎞寛厚弟弼好酒因醉射殺𢎞駕車牛𢎞還宅其妻迎謂之曰叔射殺牛𢎞無所怪問直答云作脯坐定其妻又曰叔忽射牛死大是異事𢎞曰已知之矣顔色自若讀書不輟隋紀諸王之藩上與之别曰諸子尚可復有兄弟不可復得韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寛韋嗣立為莱蕪令太后召問曰卿父嘗言臣有兩兒堪事陛下卿兄弟在官誠如父言朕今以卿代兄更不用他人即日拜鳯閣舎人兄弟間不榛梗兄弟相攻勝負皆為人笑唐紀閨門雍穆有徳有則吾敬陳元方兄弟三國志荀爽兄弟八人潁川語曰荀氏八龍慈明無雙魏志馬良兄弟五人並有才名鄉里諺曰馬氏五常白眉最良蜀志諸葛瑾事吳弟亮事蜀弟誕仕魏時人謂蜀得龍吳得虎魏得狗三國志王珣弟珉名出珣右時人語曰法䕶非不佳僧彌難為兄僧彌珉小字也王徽之與弟獻之俱病篤有術人云人命應終而有生人樂代者則死者可生徽之曰吾才位不如弟請以餘年代之晉書孔顗為長史弟道存従弟徽頗營産業二弟請假歸輜重十餘船皆綿絹紙席之屬顗正色曰汝輩忝為士流何作賈客也命燒盡而去謝恵連幼有竒才族兄靈運遇恵連大相知賞與為刎頸交每有篇章對恵連輒得佳句夏侯䕫為豫州刺史兄亶先經此任並有恩恵百姓歌曰前兄後弟布政優優南史蘇瑗曰天下難得者兄弟北史有禮有義房家兄弟房景伯傳梁到漑與弟洽梁世祖贈詩曰魏世重雙丁晉朝稱二陸何如今兩到復似凌雲竹蕭介與兄弟文酒㑹賞時人以比謝氏烏衣之逰梁書薛收與従弟元欽及族兄徳音齊名世稱河東三鳯唐書温大雅歴遷黄門侍郎弟彦愽為中書侍郎對居近侍議者榮之高祖従容謂曰我起義晉陽為卿一門耳賈敦頥為洛州刺史有恵政百姓植碑頌美及敦實為洛州長史又立頌扵兄碑之側號棠棣碑杜易簡稱王勔王勮王勃為三珠樹韋叔諧叔謙季武同省時號三列宿兄弟天生之羽翼唐傳張說以趙冬曦韋述兄弟人之杞梓韓穆兄弟皆和粹世以珍味目之竇羣兄弟工辭章為連珠集時稱昆弟若五星然本傳傳記陳寔曰元方難為兄季方難為弟陳元方兄弟恣柔愛之道而二門之裏兩不失雍熈之軌世說李祖仁兄弟十人並慈孝廉讓因此名鄉曰廉讓交州記集天倫之愛振古莫儔文選子之友悌和如琴瑟鴈行有序華萼相光飾文選三荆歡同株樂府雙珠出海底俱是連城珍聰明兩特逹餘耀照傍人英聲振名都髙價出殊鄰李白集桂枝嘗偏折棣萼更相鮮李義山文那知風雨夜復此對床眠韋應物榮聯花萼詩難和樂助塤篪酒易醺白樂天骨肉之恩手足之愛白帖卿家兄弟功名震麒麟閣畫鴻雁行杜詩自古孔懷之痛亦莫我之與劇手足一斷無因重連竒老雖從祖之兄弟甚同氣之天倫白居易綽綽然眞令兄弟劉賓客吳文章少孤與兄伯武相失二十年復㑹下邳市争計共鬬伯武毆文章欲報撃之心中愴悽手不能舉大自恡也因投杖於地相問乃眞兄弟也風俗通古有兄弟忽欲分異出門見三荆同株接葉連隂嘆曰木猶欣然聚况我而殊哉遂還為雍和周景式孝子傳帝遊後苑有竹叢宻筍不出外帝顧諸王曰父子兄弟相親當如此因謂義竹開元天寳遺事本朝世間誰似老兄弟篤愛不復見疵瑕東坡詩萸心萸心二字殊無文理恐當作墓止一枝心自覺舂同㪷粟味尤長欒城集錢希白惟演從兄也惟演拜相希白當制世稱弟拜相兄草麻自古未有惟座主拜相門生草麻前代記之矣金坡遺事慚愧君家好兄弟風流更與晉人并玉秀蘭芳好弟昆僧參寥子陳羣與孔融論汝潁人物羣曰荀文若休若友若仲豫當今無對類要姊妹經房中内賔姑姊妹也姊妹已嫁而反兄弟不與同席而坐弗與同器而食子路有姊之喪可以除之矣而弗除也孔子曰何不除也子路曰吾寡兄弟而弗忍也禮男子謂女子先生為姊後生為妹父之姊妹為姑母之姊妹為従母妻之姊妹同出為姨婦稱夫之姊為女公夫之女弟為女妹爾雅史鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是夏姬也晉公子重耳取季隗趙衰妻叔隗吳伐楚楚昭王取其妹季芉以出涉睢鍾建負之以從復國王將嫁季芈辭曰所以為女子逺丈夫也鍾建負我矣使妻鍾建以為樂尹左聶政為嚴仲子殺韓相俠累因自抉眼出腸以死韓取政屍暴扵市購之曰有能言殺俠累者與千金政姊嫈聞之乃伏屍哭曰是軹深井里聶政也妾柰何畏殁身之誅滅賢弟之名乃三大呼天遂死於政旁李園妹欲進諸楚王春申君納之既而有娠李園使其妹說春申君曰楚王貴幸公雖兄弟不如也今君相楚二十餘年而王無子即千嵗後將更立兄弟兄弟立禍且及身矣今妾有娠而人莫知妾幸君未久誠以君之重進妾扵王王必幸妾妾賴之而有男則是君之子為王也春申君大然之即出李園妹謹舎而言諸楚王王召入幸之遂生男立為太子李園妹為王后史記班超妹曹大家上書曰蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生亂逆之心妾竊聞古者十五受兵六十還之亦有休息不任職也故妾敢觸死為超求哀匄超餘年一得生還復見闕庭漢和紀慕容垂娶段氏字元妃光禄大夫段儀女婉恵有志操常謂妹季妃曰我終不作凡人妻妾季妃曰我亦不作庸夫婦鄰人聞笑之後燕王納元妃范陽王徳聘季妃並如其言王凝之妻謝氏名道韞朗之妹聰明有才辨同郡張𤣥妹亦有才質適顧氏𤣥母稱之以敵道韞有濟尼者遊扵二家或問之答曰謝夫人神清散朗故有林下風味顧家婦清心玉映自是閨房之秀晉書石奮家貧有妹能皷琴高祖召為美人老姊垂白曹壽妻班超之妹也超為都䕶在絶域年老思入闗妹乃上書曰妾兄超延命沙漠三十餘年骨肉生離不復相識書奏徴還漢書宋山隂公主謂帝曰妾與陛下俱託體先帝宋武紀劉孝綽三妹並有才學一適徐悱文尤清拔所謂劉三娘也悱卒為祭文辭甚悽愴悱父欲為哀辭及見此文乃閣筆南史李勣性友愛其姊病嘗自為粥而爇其鬚姊戒止答曰姊多疾而勣且老雖欲數進粥尚幾何張廵姊軍中號陸姑唐書傳記袁彦道有二妹一適殷淵源一適謝仁祖世說賈彦年六歲其姊聞鄰家讀書日日抱彦竊聴之十歳乃暗誦六經王子年拾遺記嫂經嫂者尊嚴之稱嫂叔不通問嫂叔之無服也蓋推而逺之也子思之哭嫂也為位禮記史蘇秦窮困歸嫂笑之不為下機及相六國擬王者歸嫂側目不敢仰視秦曰何前踞而後恭嫂伏地謝史記初髙祖㣲時過其丘嫂食嫂厭叔陽為羮盡轑釡由是怨嫂陳平嫂疾之或問平食何物而肥嫂曰食糠籺耳有叔如此不如無有馬援奉嫂不冠不入漢書王澄衍季弟也衍妻郭氏性貪鄙令婢扵路擔糞澄年十四諫郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣裾欲杖之澄懼走得脫謝道韞為王凝之妻凝之弟獻之嘗與賔客談議辭理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步障自蔽申獻之前議客不能屈晉書事嫂見稱載籍非一鄭仲虞則恩禮甚篤顔𢎞都則竭誠感到馬援則見之必冠孔伋則哭之為位韓愈三歳而孤嫂鄭鞠之唐書傳記阮籍嘗還家籍見嫂與之别或譏之籍曰禮豈為我輩設也晉謝公曰家嫂詞情慷慨致可傳述恨不使朝士見世說集昔在韶州之行受命于元兄曰爾幼養于嫂䘮服必以期今豈敢忘天實臨之韓文子弟經兄弟之子猶子也禮記史定陶王好學多才於帝子行虛譽隆洽傾於諸父黄瓊昔隨父在臺閣習見故事及後居職達練官曹争議朝堂莫能抗奪吳陸遜曰子弟茍有才不憂不用不宜私出以要榮利若其不佳終為取禍通鑑魏舒容貎質樸少號遲鈍人莫知唯叔父衡知其竒每有賔客輩造已常勸使過舒言吾兄子非常人也顧和總角便有清操族叔榮雅重之曰此吾家麒麟興吾宗者必此子也王羲之深為従伯導所器嘗謂羲之曰汝是吾家佳子弟當不減阮主簿阮裕為王敦主簿謝安問諸子弟曰子弟何與人事車騎𤣥答曰譬如芝蘭欲其生於堦庭謝𤣥為叔父安所器苻堅南伐安舉𤣥竟敗堅謝安甞詣陸納而納殊無供辦其兄子俶宻為之具安既至納所設惟茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益父叔乃復穢我素業邪詔求文武良將謝安以兄子𤣥應詔郄超嘆曰安之明乃能違衆舉親𤣥之才足以不負所舉謝朏幼聰慧謝莊器之十歲能屬文莊㳺山使朏命篇攬筆便就王景文曰賢子足稱神童後來復為特達莊曰眞吾家千金振少薄行𤣥不以子妷齒之晉書謝混與族子靈運瞻晦曜以文義賞㑹常共處居在烏衣巷故謂之烏衣之遊謝宻童幼時精神端審時然後言叔父琨見而異之曰此兒深中夙敏可成佳器有子如此足矣南史宗炳問兄子慤所志答曰願乗長風吹破萬里浪炳曰汝若不富貴必破我門户宋書初王𢎞與兄弟集㑹任子孫戲適僧達跳下地作虎子僧綽正坐采蠟燭珠為鳯凰僧逹奪取打壞亦不復惜僧䖍累十二􅀶棊旣不墜落亦不重作𢎞嘆曰僧達俊爽當不減人然恐終危吾家僧綽當以名義見美僧䖍必為長者位至公台已而皆如其言通鑑王渾與婦共坐見武子従庭過渾欣然曰生兒如此足慰人意晉列女傳劉孺七嵗能屬文叔父瑱常置座側謂賔客曰此吾家明珠宋書楊愔幼時庭有柰樹實落羣兒争之愔不動獨坐季父暐大嗟異謂客曰此兒恬裕有我家風宅内有茂竹遂於林邊别葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彦謹慎自得竹林别室銅盤重肉之食杜史楊愔叔父見愔曰愔將相器謂人曰此兒駒齒未落已是我家龍文更十歲當求之千里外本傳任瓌早孤叔父忠每曰吾子雖多庸保耳所以寄門户者瓌也唐書傳記晉林下諸賢各有雋才子籍子渾器量宏曠康子紹清逺雅正濤子簡踈通髙潔咸子瞻虛夷有逺心瞻弟孚爽朗多所遺秀子純悌並淑令有清流戎子萬有大成之風惟劉伶子無聞凡諸子惟瞻為冠紹簡亦見重當世世說集有韋羣玉者在家無子弟之過求子弟之賢而能業其家者韋羣玉也韓文妯娌經介婦請於冢婦介婦無敢敵耦於冢婦不敢並行不敢並命不敢共坐一作不敢並坐娣姒猶兄弟也禮記長婦謂稚婦為娣婦娣婦謂長婦為姒婦注今或云妯娌爾雅史聲伯之母不聘穆姜曰吾不以妾為姒注昆弟之妻相謂姒伯石始生子容之母走謁諸姑曰長叔姒生男兄弟妻相謂曰姒左王渾妻鍾氏字琰禮儀法度為中表所則渾弟湛妻郝亦有徳行琰雖貴門與郝雅相敬重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人之禮郝夫人之法晉書太后以薛顗妻蕭氏及顗弟緒妻成氏非貴族欲出之曰我女豈可與田舎女為妯娌耶或曰蕭氏瑀之姪孫國家舊姻乃止李光進與弟光顔友善光顔先娶其母委以家事母卒光進後娶光顔使其妻奉管鑰籍財物歸于其姒光進反之曰新婦逮事先姑姑命主事不可易也唐紀宗族經以飲食之禮親宗族兄弟周禮五廟之孫祖廟未毁雖為庻人冠娶妻者必告死必赴練祥則告族之相為也宜弔不弔宜免不免有司罰之適子庶子祇事宗子宗婦雖富貴不敢以富貴入宗子之家雖衆車徒舎扵外以寡約入不敢以富貴加扵父兄宗族别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼高祖者五世則遷者也合族以食序以昭穆别之以禮義人道竭矣同姓従宗合族屬四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣其庻姓别扵上而戚單扵下婚姻可以通乎繋之以姓而弗别綴之以食而弗殊雖百世而婚姻不通周道然也親親故尊祖尊祖故敬宗敬宗故收族君子因睦以合族同宗無相賓客之道禮記父之黨為宗族爾雅宗族稱孝焉語史翼九宗五政晉吾宗也豈害我哉左犬牙相制所謂磐石之宗也宗族盤互骨肉之親粲而不殊粲明也當明扵仁恩不離絶也支屬臣幸得聯肺腑肝肺相附著猶言心膂也得託肺腑骨肉天性誠不以逺近為親疎然數見顔色情重昔時禮従祖兄弟别居異財恩義已輕脤屬疎末通鑑武康沈法興世為郡著姓宗族數千家唐張公藝九世同居高祖問其故書忍字百餘以進唐紀集宗黨鄉外少徐騎省紛綸國諜昭晰家聲駱賔王同姓經豈無他人不如我同姓詩君不與同姓同車娶妻不娶同姓同姓従宗合族屬繫之以姓而弗别雖百世而婚姻不通也禮記族晜弟之子相謂為親同姓爾雅子諱名不諱姓姓所同也孟史於諸姬為近左幸得同姓末屬劉向傳初何武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之李宻與唐高祖書曰與兄𣲖流雖異根系本同通鑑閨門經女正位乎内男正位乎外父父子子兄兄弟弟夫夫婦婦而家道正九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也易諸父兄弟備言燕私妻子好合如鼓瑟琴兄弟旣翕和樂且湛冝爾室家樂爾妻孥令妻壽母詩父母在閨門之内戲而不嘆父子篤兄弟睦夫婦和家道之肥也閨門之内有禮故三族和禮記子父詔其子兄教其弟莊史姑慈婦聴夫和妻柔禮也左父慈子孝夫信妻貞家之福也蔡澤傳石奮子孫為小吏來謁必朝服見之子孫在側雖宴必冠本傳張敞曰閨門之内夫婦之私有過於畫眉者本傳鄧訓於閨門兄弟莫不敬憚諸子進見未嘗賜席接以温色東漢閨門雍穆三國志司馬防諸子雖冠成人不命曰進不敢進不命曰坐不敢坐不指有所問不敢言父子之間肅如也魏志仇香妻子事之若嚴君妻子有過免冠自責妻子庭謝思過香冠妻子乃敢升堂通鑑盧度世閨門之内和而有禮雖世有屯夷家有貧富百口怡怡豐儉同之宋紀代宗曰不癡不聾不作阿家翁兒女子閨房之言何足聴也唐紀何曽閨門整肅與妻相見正衣冠相待如賔己南面妻北面再拜上酒一歲不過再三庾亮動由禮節閨門之内不肅而成晉書楊遁一家之内男女百口緦服同爨庭無間言魏世以來惟有盧楊烏兄弟及播遁之祖昆季當世莫逮焉北史元暐三世不異居家人怡怡如也唐書愽陵崔倕緦麻三世同爨貞元以來言家法者以倕為首生六子一登宰輔五任大僚其昆仲自始仕至貴達亦同居光徳里一宅宣宗聞之嘆曰崔邠家門孝友可為士族師矣崔邠傳傳記父子不和其世破亡兄弟不和不能久同夫婦不和家至大凶說苑集凡人家中門事外人不可周知李翺子嚴父詔婦順夫指韓文寵嬖經緑兮絲兮女所治兮詩子鄭公穆孫後庭比房數十皆擇稚齒婑媠者以盈之列子史齊侯好内多内寵内嬖如夫人者六人左紂愛妲己妲己之言是従秦囚孟嘗君使人抵秦幸姬求解獻狐白裘幸姬為言昭王釋孟嘗君楚懷王聴鄭袖之言釋去張儀為平陽主謳寵之顓房燕史記石崇有婢曰緑珠孫秀使人求之不得秀怒勸趙王倫誅崇崇謂緑珠曰我為爾得罪緑珠泣曰當效死於君前因自投于樓下而死晉書更衣入侍喬知之有美妾曰碧玉知之為之不眠唐紀梁故將劉鄩侍兒王氏有美色號花見羞五代史傳記張天錫疾美人閻姬薛姬皆自殺二姬國色並有殊寵天錫每謂之曰汝二人將何以報我我死之後豈可更為人妻皆曰尊君不諱妾請效死於前洒掃於地下無他志崔鴻春秋桓温尚明帝女南康公主温平蜀以李勢妹為妾甚有寵嘗著别室後主聞與數十婢㧞刃襲之值李梳頭髪垂地姿貎端麗乃徐下地結髪歛手向主曰國破家亡無心至此今日若能見殺雖死之日猶生之年神色閑正辭氣悽惋主扵是擲刃前抱之曰我見汝亦憐何况老奴遂善遇之世說石季倫有愛婢曰翔風妙年别五聲能觀金色翔風年三十妙年者疾之崇乃退翔風為房老拾遺記寧王有樂妓寵姐美色善歌客莫見李太白曰王何吝此女示於衆乃設七寳花障召寵姐歌扵障後白曰雖不許見而聞其聲亦幸矣天寳遺事石季倫所愛婢數十人季倫嘗屑沈水香如塵末布象床上所愛者踐之無跡則賜珍珠百琲若有迹者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀那得百琲珍珠王子年拾遺記唐申王每冬月苦寒冷宫女宻圍而坐謂之妓圍天寳拾遺元載納薛瑶英為姬以金絲帳却塵褥處之以紅綃衣衣之古今詩話元載寵姬薛瑶英能詩書善歌舞仙姿玉質肌香體輕雖旋波夷光飛燕緑珠不能過也合檢李太尉為亡姬謝秋娘撰望江南樂府雜録張建封節制武寧納舞妓盻盻燕子樓白樂天經徐與詩曰醉嬌無氣力風裊牡丹花公薨盻盻不他適多以詩代問答有詩三百首燕子樓集乃和白詩云自守空樓歛恨眉形同春後牡丹枝舍人不㑹人深意訝道泉臺不去隨泰娘韋尚書家主謳者又張好好以善歌為沈述師著作以雙鬟納之麗情集韓退之二妾一曰絳桃一曰柳枝皆能歌舞柳枝後踰垣走専寵絳桃矣語林潘杭嬖於美妾解愁姓趙母夢海棠花蕋而生外史檮杌集如姬寢卧内中山王妾侍者蠱媚巾㡚鮮明選南郊賦秀色燃紅黛嬌香發綺羅鐘前鸞對舞琴裡鳯傳歌妬寵傾心意銜思柰老何張說之文别館覺來雲雨夢後門歸去蕙蘭叢李義山櫻桃樊素口楊柳小蠻腰金釵十二行春従春逰夜専夜白居易宴専席寢専房陳洪傳薦枕青娥艶劉長卿後宫佳麗三千人三千寵愛在一身白樂天侍婢艶傾城杜詩此婢嬌嬈惱殺人凝脂為膚翡翠裙盧仝曲眉豐頰清聲而便體秀外而恵中飄輕裾翳長袖粉白黛緑者列屋而閒居妬寵而負恃争姸而取憐韓文虢國夫人承主恩平明走馬入宫門却嫌脂粉汚顔色淡掃蛾眉朝至尊杜詩侍女低鬟落翠花杜牧之嬪嬙左右如花紅杜本朝歛色避新姬愛君小鬟新買得如手未觸新開花歐公集列星閑蛾眉坡詩妾薄命主家十二樓一身當三千古來妾薄命事主不盡年起舞為主壽相送南陽阡忍着主衣裳為人作春妍有聲當徹天有疾當徹泉死者恐無知妾身長自憐葉落風不起山空花自紅捐世不待老恵妾無其終一死尚可忍百嵗何當窮天地豈不寛妾身自不容死者如有知投身自相従向來歌舞地夜雨鳴寒蛩后山婢妾經嘒彼小星三五在東肅肅宵征夙夜在公寔命不同嘒彼小星維參與昴肅肅宵征抱衾與裯寔命不猶詩悼公之母哀公之妾也死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我妻不在妾御莫敢當夕士妾有子而為之緦無子則已買妾不知其姓則卜之禮記子臧獲奴婢也方言謂荆淮海岱之間罵奴曰臧罵婢曰獲燕齊亡奴謂之臧亡婢謂之獲或曰取貨謂之臧答得謂之獲皆謂奴婢闕史泉丘人有女奔僖子僖子使助薳氏之簉注薳氏之女為僖子副妾故納泉丘之女以副助之若以妾為夫人則固無其禮也左蘇秦曰聞客有逺為吏而其妻私扵人者其夫將來其私者憂之妻曰吾已作藥酒待之矣夫至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言則恐其殺主父也扵是佯僵而棄酒主父怒笞之妾一僵覆酒則上存主父下安主母史充下陳李斯書願為箕箒妾張蒼妾百數嘗孕者不復幸西漢妾不敢以燕媠見楚夫人傳為傅婢所毒王吉傳師古曰凡言傅婢者謂傅相其衣服袵席之事賤婢不可以為主帝賜張志和奴婢各一志和配以為夫婦號漁童樵青新唐書集豈惟炊爨之勞抑亦巾箱之寵白帖越婢脂肉滑元稹集女使護衣李義山文一婢赤脚老無齒韓文傳記鄭𤣥家奴婢讀書一婢不稱㫖使人拽着泥中須臾一婢來問曰胡為乎泥中答曰薄言往愬逢彼之怒周浚過汝南李氏有女絡秀因求為妾世說漢尚書郎入直給女侍使二人皆選端正妖麗執香爐護衣服通典桓𤣥妾當産畏風應須帳桓曰不須作帳可以到夫人故帳與之類說潞州節度使薛嵩有妾曰紅線嵩遣掌箋表號内記室侍兒小名録本朝小婢立我前赤脚兩髻丫歐公真是青裙兩髻丫常呼赤脚婢雨中擷園蔬自遣赤脚沽村釀坡僕従經我僕痡矣僕夫况瘁徒御不驚詩趨走給召呼周禮子子貢曰冉雍使其陳如借家語史秦伯送衛於晉三千人寔紀綱之僕使訓羣騶知禮皂𨽻輿臺馬有圉牛有牧以待百事負覊絏以従扞牧圉左厮役扈養公羊傳析薪為厮炊烹為養髙漸離為人庸保匿作吕不韋家僮萬人師古曰婢妾之總稱也張耳陳餘其厮役莫非天下英傑人之奴得無笞罵足矣奴虜使之桀黠奴人之所患也唯刁間收取使之刁能蓄豪奴愛幸監奴師古曰奴之監知家務者也蒼頭廬兒蒼頭漢史諸史有長史乃帳下吏魏志祖逖有胡奴曰王安逖甚愛之及約之誅安嘆曰豈可使祖士稚無後乎乃往就市觀刑逖庶子道重始十嵗安竊取以歸匿之變服為沙門通鑑盧懷謹死家無餘蓄惟一老蒼頭請自鬻以辦䘮事蕭穎士有奴事穎士十餘年笞楚嚴慘或勸其去曰非不能愛其才也帝賜張志和奴婢各一志和配以為夫婦號漁童樵青唐紀傳記晏子曰臣非厨養之臣說苑咸陽郭氏一蒼頭曰捧劍每遭鞭捶一日忽題詩曰青鳥銜葡萄飛上金井欄美人恐驚去不敢捲簾看其主遂稍容之范據集太史公牛馬走司馬遷書鷹犬之才牙爪可任陳琳檄内無應門五尺之童李令伯表掃除之𨽻晉書一奴長鬚不裹頭韓地上蟣虱臣盧仝趨厮走養皮日休記本朝更煩赤脚長鬚老東坡外氏經為外祖父母何以小功也以尊加也禮母之考為外王父母之妣為外王母爾雅史王符無外家東漢荀朂依舅氏十餘歲能屬文従外祖魏太傅鍾繇曰此兒當及其曽祖魏舒少為舅氏寗氏所養營宅相者云當出貴甥魏舒尚幼自言曰當為外氏成此宅相晉書梁王筠清潔好學沈約見以為似外祖袁粲謂張稷曰王郎非惟額類袁公風韻都欲相似南史温造曰臣外五世祖李靖唐本傳楊於陵生子名嗣復韓滉撫其頂曰名與位皆踰其父楊氏之慶也嗣復傳滉其外祖也集段公威徳當流慶於外孫白傅集魏舒少孤長扵寗氏周翼無託養在郤家白帖扶牀小女君先識應此㱔㱔似外翁於僕為外諸翁元㣲之外氏之世徳存乎古史揚乎人言沐外族之休光栁文郤公不易勝莫着外家欺王建集本朝外氏清貧類要外家英俊場後山詩母黨經従母之夫舅之妻二夫人相為服君子未之言也或曰同爨緦禮記史初叔向欲娶扵申公巫臣氏其母欲娶其黨叔向曰吾母多而庻鮮吾懲舅氏矣左傳言母多妾媵而庶子鮮少嫌母氏性不曠云韋縚奏喪服舅絲麻三月従母外祖父母皆小功五月外祖至尊同扵従母之服姨舅一等服則輕重有殊堂姨舅親即未疎恩絶不相為服舅母則承外族不如同爨之禮竊以古意猶有所未暢者也請加外祖父母為大功九月姨舅皆小功五月堂舅堂姨舅母並加至祖免韋述議曰母黨比扵本族不可同貫明矣敕姨舅親既服小功舅母不得全降宜服緦麻堂姨舅冝服袒免唐紀外孫經女子之子為外孫爾雅史楊惲司馬遷女子也惲始讀外祖太史公記頗為春秋司馬遷死外孫祖述其書遂宣布焉西漢諸葛亮誡外甥曰丈夫志當存高逺慕先賢絶情欲棄凝滯廣咨問除嫌吝雖有淹留何損扵美趣何患扵不濟若志不强毅意不慷慨徒碌碌滯於俗黙黙束扵情永竄伏扵凡庸不免於下流矣蜀志梁王筠清潔好學沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非惟額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娱笑惟此一條不能酷似宋書傳記樊重外孫何氏兄弟争財重恥之以田二頃解其忿訟東漢集爾為外曾孫倜儻汗血駒杜詩中郎餘慶鍾羊祐邕之甥琰之子段公威徳當流慶扵外孫白傅集累累外孫有攜有嬰扶牀坐膝嬉戲驩争韓文本朝南山新長鳯凰雛眉目分明畫不如年少従他愛梨栗長成須讀五車書臨川舅甥經渭陽康公念母也見舅氏如母存焉詩序我送舅氏曰至渭陽何以贈之路車乗黄既有肥牡以速諸舅寧適不來㣲我有咎詩母之晜弟為舅母之従父晜弟為従舅男子謂子姊妹之子為出爾雅史陳厲公蔡出也姊妹之子曰出申侯申出也子犯以璧授公子曰臣從君廵扵天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水康公我之自出鄭甥可得備彌甥也彌逺也父之舅氏故稱彌甥公納夏戊之女為夫人其弟期太叔疾之從孫甥也左姊妹之孫為従孫汲黯字長孺司馬安是其姊子與黯同為太子洗馬霍去病衛青姊子也漢書荀朂父貯早亡朂依于舅氏岐嶷夙成十餘歳能屬文従外祖魏太傅鍾繇曰此兒當及其曽祖旣長遂􅀶學達於従政晉書王濟衛玠之舅也俊爽有風姿每見玠輒嘆曰珠玉在側覺我形穢衛玠傳王獻之兄弟自超祁未亡見愔郄嘗躡履問訊甚修舅甥之禮及超死見愔怠屐而候之殷浩廢為庶人徙扵東陽浩甥韓伯浩素愛賞之隨至徙所經嵗還都浩詠詩曰富貴他人合貧賤親戚離王忱弱冠知名嘗造其舅范寗謂曰卿風流雋望眞後來之秀忱曰不有此舅焉有此甥何無忌少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆參議之桓𤣥曰何無忌酷似其舅通鑑晉紀舅謂劉牢之也韋縚奏舅小功五月堂舅加至袒免唐紀初陳郡謝重王胡之外孫也於諸舅敬禮多闕重子絢袁湛之甥也嘗扵公坐慢湛湛正色謂曰汝便是兩世無渭陽情絢有愧色陳江總七歲而孤依于外氏幼聰敏有至性其舅蕭勵名重當時特所鍾愛嘗謂總曰爾操行殊異神采英拔後必知名南史李靖舅韓擒虎每與靖論兵嘆曰可與語孫吴者非斯人尚誰哉王涯居翰林其甥皇甫湜中選考覈之際不先上言坐貶本傳傳記晉李繪神清朗俊邢晏曰宅相之寄良在三甥三國典略此館之興情鍾舅氏宜以渭陽為名世說集賢甥俊彩酷似其舅陳子昂我異劉牢不減其舅李義山劉牢出外甥杜寗氏舅甥俱寂寞王建集本朝仍以安石之甥復見劉牢之舅臨川集從母經従母之夫舅之妻二人相為服君子未之言也或曰同爨緦禮記從母之男子為從母晜弟其女子為従母姊妹爾雅史初臧宣叔娶于鑄生賈及蒍而死繼室以其姪穆姜之姨子也左姪穆姜姨母之子與穆姜為姨昆弟符承祖方用事親姻争趨附以求利其従母楊氏為姚氏婦獨否常謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂姊與之衣服多不受由是符氏内外號為癡姨通鑑韋縚奏姨小功五月堂姨加至􅃝免唐紀姨經邢侯之姨詩妻之姊妹同出為姨爾雅史蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也左傳記謝阿蠻善舞上就按於清元殿寧王吹笛上羯鼓妃琵琶秦國夫人端坐視之上戲曰阿蠻樂籍今日幸得供養夫人請一纒頭對曰豈有大唐天子阿姨無錢用耶遂出三百萬為一局楊妃外傳婚姻經男女及時也平王之孫齊侯之子自納采至請期用昕親迎用昬詩昬禮萬世之始也取扵異姓所以附逺厚别也昬禮不賀生人之序也序代也昬禮不用樂幽隂之義也大昬萬世之嗣也國君娶夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也曾子問曰昬禮既納幣有吉日女之父母死則如之何孔子曰婿使人弔如婿之父母死則女之家亦使人弔昬禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昬禮納采問名納吉納徴請期禮記婿之父為姻婦之父為婚婦婿之父母相謂為婚姻爾雅婚禮用昬故經典多止作昬字記子任薛王劉崔盧之昬非古也何以視譜任薛出黄帝王劉出舜崔盧出帝嚳文中子史師服曰嘉耦曰妃怨耦曰仇齊侯欲以文姜妻鄭太子忽辭人問其故太子曰人各有耦齊大非吾耦也懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘秦伯納女五人懷嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也如舊昬媾敝無存曰必娶高國求昬而薦女劉氏范氏世為婚姻左禮有納采采擇女之徳性也其禮用雁為贄者取順隂陽來往有問名問女名而卜之知吉凶也禮如納采有納徴徴成也納幣以成婚有告期告迎期四者備而後娶禮也榖梁婚姻者居室之大倫史儒林傳大將軍鳯連昬連婚者婚家之姻親也太后欲為重親有葭莩之故世俗嫁娶太早未知為人父母之道而有子是以教化不眀而民夭死聘妻送女亡節則貧人不及故不舉子西漢阮修字宣子貧居四十未有室王敦等歛錢為婚皆名士也時慕之者求入錢而不得王珣取謝方女弟珉娶謝安女並不終由是與謝氏有隙晉書侯景請娶扵王謝上曰謝王門高非偶可扵朱張以下訪之梁紀衰世舊門誠何足慕而求與為婚雖多輸金帛猶為彼所偃蹇山東士人尚閥閱後雖衰猶負世望嫁必多取貲故人謂之賣婚唐書鄭崇高宻大族世與王家相嫁娶西漢傳記温嶠喪婦従姑劉氏家有一女甚有姿慧姑以屬公覔婚公報云已覔得婚處門地粗可婿身名宦盡不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜世說子孫娶妻嫁女必擇孝悌世世有行義者大戴禮北平徐氏有女人多求不許陽公字雍伯試求焉徐氏曰能得白璧一雙來當聴為婚雍伯得五雙白璧徐氏遂以女許之捜神記齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也風俗通漢武帝為膠東王年七歲長主抱膝上曰兒欲得婦否曰欲得長主指其女曰阿嬌好不曰好若得阿嬌作婦當作金屋貯之長主大恱乃苦要上定婚焉漢武集子當求婦其父如此誰肯嫁之者逺求小姓足使生子虞翻潘楊之睦有自來矣文選孟光儻未嫁梁鴻正須婦王無功詩一村惟兩姓世世為婚姻生者不逺别嫁娶先近隣白樂天詩徐州有朱陳村世為婚姻頗謂秦晉匹従來王謝郎杜詩不同牛女夜是配鳯凰年賈浪仙橋成烏鵲夜臺起鳯凰年沈雲卿文其女聞其訓教有幽閑之徳為公擇婦宜莫如盧氏薦女請婚韓文本朝交秦晉之歡仰從嘉命望金張之館俯愧衰宗跂通徳之門馳誠數仭叙冝家之慶拜貺尺書臨川不將門户賣崔盧坡詩婦翁附妻母經妻之父母何以緦報之也昬禮婿親迎見扵舅姑舅姑承子以授婿禮記妻之父為外舅妻之母為外姑爾雅史陳涉旣為王妻之父往依焉陳王以衆賔待之長揖不拜妻之父怒不辭而去通鑑婦父乃是翁比陳紀外黄富人女嫁張耳厚奉給耳史光武謂倫曰聞卿為吏篣婦公寧有之邪倫對曰臣三娶妻皆無父第五倫傳婦翁氷清衛玠傳華廙有才妻父盧毓典選廙年三十五不得調晉書女婿柰何不敬婦翁通鑑傳記甘公之遇恭祖太守之器伯珪白帖王適曰吾求婦氏久矣惟此翁可人意且聞其女賢不可以失韓文青城山為五岳之長故名丈人山青城山記今世俗呼人婦翁為令岳謂妻之伯叔父為列岳往往因此又神仙傳曰太山有老父失其姓名今人稱人婦翁亦曰太山不知何所據或者出此訛以傳訛也集為愛丈人山杜本朝俗呼人之妻父為岳丈以泰山有丈人峯丈人觀似亦有理也而呼妻母為泰水此何義耶晉樂廣衛玠妻父也時稱婦翁氷清女婿玉潤然則俗所謂岳丈當云樂丈耳孫將正訓婿經婿何以緦報之也禮記子謂公冶長可妻也以其子妻之南容三復白圭孔子以其兄之子妻之論語謂我舅者吾謂之甥也爾雅史趙有側室曰穿晉君之婿也左淳于髠齊之贅婿少婿東齊間謂婿為倩禮甚卑有子婿禮史家貧子壯則出贅司徒袁隗欲為従女求姻見黄允嘆曰得婿如是足矣允聞而黜遣其妻漢紀謝安婿王國寳安惡其為人每抑而不用國寳乃譛安于道子使離間之於帝晉紀宇文泰諸子皆幼惟以諸婿為心膂梁紀女夫乃是兒例女婿奈何不敬婦翁陳紀回紇可汗上書言今婿半子也獨孤郁權德輿之婿也上嘆郁之才美曰徳輿得婿我反不及耶唐記武帝為晉陵主求婚王珣曰謝渾雖不及真長不減王子敬帝曰如此便足㑹帝崩袁崧欲以女妻之珣曰卿莫近禁晋書史官李漢蔣係皆愈之子婿唐書姚顗少惷不修容止時人莫之知司空圖一見以為竒以女妻之五代史傳記杜廣初為劉景廏卒景因問廣中一作申未知孰是此字可疑曲有條章景謂妻曰為女求夫三年不覺廏中有麒麟扵是妻之三十國春秋唐郭元振少美風姿宰相張嘉貞欲納為婿曰吾五女各有姿色令人持一線幔前使子取便牽之得者為婦元振牽一紅絲線得第三女開元遺事李膺祖脩以鍾瑾好學似我以膺妹妻之白帖孫雋與李元膺俱娶太尉桓𤣥女時人謂桓兩女俱乗龍言得婿如龍也楚國先賢傳唐張延賞選韋臯為婿臯性高不拘小節公侮之不禮臯乃辭去後自金吾持節兩川為延賞代公曰吾不識人郭圓有詩曰當時甚訝張延賞不識韋臯是貴人雲溪友議楊玠娶􅀶陵崔季讓女崔家富圖籍殆將萬卷玠成婚之後頗亦逰其書齋旣而告人曰崔氏書被人盜盡曽不之知崔遽令檢之玠捫腹曰已藏之經笥矣談藪陳忠女名豐隣人葛勃有美姿豐與村中數女相謂曰若得婿如葛勃無所恨也藝苑集禁臠去東牀門闌多喜氣女婿近乗龍杜愈於處士妹婿也韓文乃命長嗣為君半子劉禹錫人見東方騎皆言夫婿殊王建集既傾南國貎遂坦東牀腹覔得黔婁為妹婿白侍郎本朝昔昌黎為唐儒宗得子婿李漢然後其文益振其道益大臨川集廏下麒麟深知杜廣類要擇婿史懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘左張負歸謂其子仲曰吾欲以女孫子陳平仲曰平貧不事事負曰固有美如陳平而長貧者乎卒與女陳平傳袁隗見黄允曰得婿如此人足矣後漢梁鴻尚節介鄉里一作執家慕其高節多欲女之本傳陶謙年十四猶綴帛為幡乗竹馬而戲邑中兒童皆隨之故蒼梧太守出遇之途見其容貎異而呼之與語而說因許妻以女夫人聞之怒曰陶家兒遨戲無度如何以女許之公曰彼有竒度長必大成遂妻之吳書太尉郄鑒使人求婿扵王導導令就東廂徧觀子弟歸曰王氏諸少並佳聞信至各自矜持惟一人在東牀坦腹食獨若不聞鑒曰此正佳婿訪之乃羲之也遂以女妻之本傳後魏郭瑀有一女欲求一快女婿劉炳曰聞公求快女婿炳其人也北史竇毅有女謂妻長公主曰此女才貎如此不可妄以許人唐史韓滉竒楊於陵謂其妻柳氏曰吾求佳婿無如於陵因以妻之唐書其子嗣復傳載曰吾閱人多矣無如楊生舊唐書楊於陵傳云吾閱人多矣無如楊主簿參軍裴寛義不以苞苴汚家時刺史韋詵有女擇所宜歸語曰嘗求佳婿今得矣寛傳傳記温嶠姑劉氏囑嶠求婿嶠曰佳婿難得但如嶠比如何姑曰何敢希汝比嶠數日白姑已得佳婿聲名盡不減嶠因下玉鏡臺一枚姑大喜交禮女大笑曰吾固疑是老奴集侯處士髙曰吾以齟齬窮悴一女憐之必嫁官人不以與凡子韓文本朝孫明復居泰山李文定廸守兖就見之曰獨居誰事左右不幸風雨飲食成疾吾弟之女甚賢可以奉箕箒先生固辭文定曰吾女不妻先生不過一官人妻先生徳高天下幸婿李氏榮貴莫大扵此先生曰宰相女不以妻公侯貴戚而固以嫁寒谷衰老藜藿不充之人相國之賢古無有也遂妻之澠水燕談晏元獻為相求婿於范文正文正曰公女必求國士無如富弼者元獻一見冨公大愛重之即議婚聞見録韓魏公知中山李清臣謁見其吏報曰太祝方寢清臣為絶句曰公子乗閒臥絳厨白衣老吏慢寒儒不知夢見周公否曽說當時吐哺無魏公見其詩曰吾知此人久矣竟有東床之選青瑣髙議僚婿經譚公維私姊妹之夫曰私瑣瑣姻亞詩女子謂姊妹之夫為私兩婿相謂為亞爾雅子彌子之妻與子路之妻兄弟也孟史晉公子重耳娶季隗以叔隗妻趙衰左嚴助家貧為友婿富人所辱願為㑹稽太守於是拜之漢書周瑜得喬公兩女皆國色也孫䇿自納大喬瑜納小喬孫䇿戲瑜曰喬公二女得吾二人作婿亦足為歡吳親迎經之子于歸百兩御之韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘親迎用昏詩曾子問曰親迎女在塗而婿之父母死孔子曰女改服布深衣縞總以趨喪男子親迎男先於女剛柔之義也婿親迎授綏親之也親之也者親之也言已親之所以使之親已冕而親迎主人筵几於廟婿執雁入揖讓升堂再拜奠雁降出御婦車而婿授綏御輪三周先俟于門外禮記史父親醮子而命之迎子親迎之道重始也親迎之禮父南鄉而立子北面而跪醮而命之往迎爾相成我宗事荀娶妻經取妻不取同姓禮記賀取妻者曰某子使某聞子有客使某羞娶婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭扵禰成婦之義也禮史卓王孫分予文君錢百萬文君歸成都買田宅為冨人相如與卓氏婚饒於財史本傳集不同牛女夜是配鳯凰年賈浪仙橋成烏鵲夜臺起鳯凰年沈雲卿羅帷送上七香車寳扇迎歸九華帳王維詩本朝華岳西臨降明星於玉女巫山南眺逢暮雨於陽臺蘇集内表經舅之子内兄弟也傳曰何以緦従服也禮舅之子為甥爾雅子子有内弟之䘮内表弟不飲酒食肉郡人非之文中子史阮瞻内兄潘岳每令皷琴終日達夜無忤色晉書帝問童子員俶奏臣舅之子李泌新唐書集他鄉惟表弟還家莫辭遥杜外表經姑之子外兄弟也傳曰何以緦報之也禮姑之子為甥爾雅史王晏外弟尉氏阮孝緒知晏必敗屢至其門逃匿不見嘗食醬美問知得於晏家吐而覆之通鑑齊高祖紀孔紹安閉門讀書數十萬言外兄虞世南嘆異之唐書本傳傳記太學博士周拾舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀劉璠梁典韋述元行冲之姑子述好學貫穿經史事如指掌綴文操牘便成行冲大恱引之同榻曰此吾外家之寳也續世說盧少傅𢎞正雷尚書簡求𢎞正簡求皆趙璘姑之子時稱趙家出外甥因話録妻黨史劉穆之好往妻兄弟家乞食多見辱江氏後有慶㑹屬令勿來穆之猶往食畢求㯽榔兄弟戲之曰㯽榔消食君乃常飢何忽須此妻復截髮市肴饌為其兄弟以餉穆之及為丹陽尹召妻兄弟乃令厨人以金柈貯㯽榔一斛以進之宋書本傳何充盧江人王導妻姊之子故少與王導善早歴顯官嘗詣導舎導以麈尾指牀呼充共坐曰此是君坐也晉書柳勣與妻族不恊欲䧟之為飛語勣杖死通鑑師經徳無常師主善為師書師以賢得民禮太宰古者士見扵師以菜為贄大胥注禮聞來學不聞往教記曲禮席間函丈同上善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴學記篇師嚴然後道尊大學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍不善學者師勞而功半能􅀶喻然後能為師記問之學足以為人師必也其聴語乎力不能問然後語之語之而不知雖舎之可也學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者長善而救其失者也學記孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服檀弓孔子之喪二三子皆絰而出事師無犯無隠左右就養無方服勤至死心喪三年人其父生而師教之師也者教之以事而喻諸徳者也記夫子循循然善誘人三人行必有我師焉温故而知新可以為師矣論語子孔子曰吾聞老􅆅􅀶古知今通禮樂之原明道徳之歸則吾師也吾將往矣子夏教於西河之上家語夫子之設科也往者不追來者不拒孟故人無師而知則必為盜勇則必為賊能則必為亂察則必為怪辯則必為誕有師而知則速通勇則速威能則速成察則速盡辯則速論故有師者人之大寳無師者人之大殃也荀子尊嚴而憚可以為師耆艾而信可以為師誦說而不陵不犯可以為師知㣲而論可以為師師術有四而􅀶習不與焉荀務學不如務求師師者人之模範也一卷之書必立之師師之貴也知大知小也知之師亦賤矣楊賈瓊曰夫子文中十五為人師陳留王孝逸先達之傲者也然白首北面豈以年乎文中子史孔子退而修詩書禮樂弟子彌衆至自逺方莫不受業焉史世家下帷講誦弟子莫見其面師友淵源所漸西漢師友必於天下英俊雋不疑傳都授都授謂總集諸生大講授也韓信得廣武君東鄉坐師事之本傳李固少好學步行尋師不逺千里牟長為􅀶士諸生講學者常有千餘人著録前後萬人馬融才髙博學為世通儒教養諸生常有數千涿郡盧植北海鄭𤣥皆其徒也東漢太守黄讜署户曹吏欲召咸入授其子咸曰禮有來學而無往教讜遂遣其子師之包咸傳孔奮少従劉歆受春秋左氏傳歆稱之謂門人曰吾已従君魚受道矣孔奮傳耆名高義開門受徒者編牒不下萬人後漢邊韶教授數百人嘗晝卧弟子私嘲之韶曰師而可嘲出何典記本傳青成藍藍謝青師何常在明經北李謐傳魏常爽門徒七百餘人京師學業翕然復興立訓甚嚴有勸罸之科弟子事之若嚴君焉本傳文中子著六經北面受學者皆當時偉人隋書陽城逺近慕其行來學者跡接于道唐書經愈指授皆稱韓門弟子韓愈傳陽城為司業出為道州刺史太學諸生何蕃等頓首闕下請留數日為諸吏遮抑不得上本傳傳記馬融嘗坐髙堂施絳帳前授生徒後列女樂東漢紀吳商學通五經四方擔囊負笠不可勝數吳興雜記槐市在華嶽西北谷楊震講授學徒成市其處槐多故號焉華山記揚雄死弟子共為起冢號曰揚冢七畧集聲名塞於天淵真吾徒之師表也班固賔戲徳無常師道在則是選閒居賦師氏之選允歸人範𢎞洙泗之風行狀以其餘易其不足亦可交以為師矣柳文馬融鄭𤣥者二子獨章句師耳柳荅嚴書假令有取亦不敢為人師為衆人師且不敢況敢為吾子師乎柳答中立書韓愈作師說因抗顔而為師諸生業患不能精無患有司之不明行患不能成無患有司之不公韓文仰執事坐師氏之筵唐田𢎞正書古之學者必有師師者所以傳道受業解惑也人非生而知之孰能無惑惑而不従師其為惑也終不解矣生乎吾前其聞道也先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也聖人無常師萇𢎞師襄老耼郯子之徒其賢不及孔子孔子曰三人行必有我師故弟子不必不如師師不必賢扵弟子聞道有先後術業有専攻如是而已韓文漢氏已來師道日㣲然時猶有㳺授經傳業者及于今則無聞矣䇿問文中子紹明王道㳺其門皆天下俊傑劉禹錫本朝聚徒従妙齡所至變鄒魯僧參寥詩門弟經三千之徒並受其義書序善學者師逸而功倍又従而庸之不善學者師勤而功半又従而怨之夫子之喪顔淵若喪子而無服喪子路亦然禮記子仲尼旣没弟子行心喪之禮三年家語昔者孔子没三年之外門人治任將歸相鄉而哭皆失聲子貢反築室於塲獨居三年然後歸孟紀昌學射於飛衛既盡衛之術相遇於野二人交射中途矢鋒相觸墜於地而塵不揚甘蠅學射於飛衛髙蹈拊膺曰汝得之矣列弟子通利則思師荀譊譊之學各習其師揚夫子十五為人師王孝逸白首北面文中房杜諸公不能臻師之美大宣其教王氏續經抑而不振若房杜李魏二温王陳輩迭為將相寔永三百年之業斯門人之功過半矣中說序門人自逺而至董常姚義杜淹李靖程元竇威薛收賈瓊房𤣥齡魏徴温大雅陳叔達咸稱師北靣而受王佐之道焉往來受業者不可勝數盖千餘人世說門人竇威賈瓊姚義受禮温彦􅀶杜如晦陳叔達受樂杜淹房喬魏徴受書李靖薛方士裴晞王珪受詩叔恬受𤣥經董常仇章薛收程元備聞六經之義中說先君門人布在廊廟王福史自孔子卒後七十子之徒散㳺諸侯大者為師傅卿相小者友教士大夫或隠而不見申公弟子為博士者十餘人孔安國至臨淮太守周羈夏寛為内史魯賜至東海太守繆生内史徐偃中尉受業子思之門人齊人以詩顯貴皆轅固之弟子也孔子弟子身通六藝七十有二人孔子以詩書禮樂教弟子史記汝南應劭自贊於鄭𤣥曰故太山太守應中逺北面稱弟子何如東漢蕭望之詣太常受業如弟子西漢河南太守吳公故與李斯同邑嘗學事焉賈誼傳侯芭従揚雄受太𤣥法言雄卒芭為起墳喪之三年揚雄傳于定國迎師學春秋北面備弟子禮本傳求謝師門桓榮傳門人郄慮至御史大夫王基崔琰著名扵世鄭𤣥傳田何受易扵丁寛學成東歸何謂門人曰易東矣本傳邊韶教數百人弟子嘲之曰邊孝先腹便便懶讀書但欲眠東漢鄭𤣥事馬融在門下三年不得見使髙業弟子傳授扵𤣥𤣥日夜尋誦聞𤣥善筭召見於樓上𤣥因従質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣鄭𤣥傳孫期逺人従其學者皆執經壟畔以追之本傳孔奮少従劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道也漢紀延篤為平陽侯相以師喪棄官奔赴本傳執經下座北面受業梁書賈島劉義皆韓門弟子盧仝傳沈重講學授業徐曠従之不數日辭去曰先生所說紙上語耳若奥境彼有所未見者唐史傳記王羲之見前代筆說扵其父枕中竊而讀之不數月書大進衛夫人見之流涕曰此子必敝吾名羊欣筆陣圖衛有弟子王逸少甚能學衛真書咄咄逼人潭帖集宫牆重仭允得其門選郭有道碑弟子不必不如師韓文籍湜輩雖屢指教不知果能不叛去否荅孟簡尚書書従師負笈駱賔王嘗聞馬南郡門下有康成劉長卿心増故術腹飽新授劉賔客操篲醫門掬溜蘭室柳宗元啟鄙夫修擁篲之禮唐田𢎞李渤本朝編牒師門類要胡安定先生弟子散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問可知為先生弟子胡安定墓表范質即和凝門生先是門生座主榜上名次第同者謂之衣鉢和之名次范入承之和為相封魯公終太傅范亦封魯公終太傅實為傳衣付鉢而得心印也嵩陽叟秦再思撰紀異録又名洛中紀異座主經管仲遇盜取二人焉上以為公臣管仲死桓公使為之服趙文子所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉禮史趙宣子舉韓獻子於靈公以為司馬河曲之役宣子使人以其乗車干行獻子戮之宣子曰可賀我矣吾舉厥而中吾乃知免扵罪矣國語應侯任鄭安平王稽皆負重罪扵秦范雎任鄭安平昭王使將擊趙安平降趙應侯席藁請罪秦之法任人而所任不善者各以其罪罪之史何武舉方正之士召見盤辟雅拜有司劾失舉本傳宋宏薦桓譚帝令譚皷琴愛其繁聲宏聞之不恱伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之且曰能自改耶將令相舉以法乎譚頓謝良久乃遣之後帝使譚鼔琴譚見宏失其常度帝怪而問之宏乃離席免冠謝曰臣所以薦桓譚者望能以忠直導主而令朝廷耽恱鄭聲臣之罪也通鑑李沖初薦李彪既彪自以結知人主再不復藉沖稍稍疎之唯公坐歛袵而已無崇敬之意沖浸御之乃積其前後過惡禁彪於尚書省上表劾彪専恣無忌尊已忽物聴其言如振古忠恕之賢按一作校其行實天下佞暴之賊齊紀翰林學士兩省官舉令録除官之日仍署舉者姓名若貪穢敗官並當連坐周紀初郡將范津薦傅燮及津為漢陽與燮交代合符而出傅燮傳袁氏樹恩四世門生遍扵天下魏志郄詵為尚書左丞推奏吏部尚書崔洪洪曰舉詵而還奏我此所謂挽弓而射晉史嚴綬統臨三鎮皆號雄藩綬所辟士親睹為將相者九人唐書錢徽舉送覆試多不中選貶官賈餗三典貢舉多得名卿宰相本傳馬裔孫即裴皥門生清泰初裔孫知舉放榜後引新進士謝皥皥書一絶曰官塗最重是文衡天與愚夫立盛名三主禮闈今八十門生門下見門生晉相桑維翰裴皥門生嘗謁皥皥不迎不送或問之答曰皥見維翰於中書則庶僚也維翰見皥於私館則門生也何迎送之有五代史傳記杜審權大中十二年知貢舉放盧處權有戲之曰坐主審權門生處權麟符二年崔沆放崔瀣談者稱座主門生沆瀣一氣南部新書唐李逢吉知貢舉榜未放而入相及第人就中書見座主因話録鄭薰主文誤謂顔標乃魯公之後以為狀元或嘲之曰主司頭腦大冬烘錯認顔標一作摽作魯公狀元已下到主司宅下馬綴行而立歛名紙通呈與舉主對拜主事云謝衣鉢摭言集手持文柄髙眡寰海劉禹錫一日聲名遍天下滿城桃李屬春官劉賔客貞元中奏詔考定賢良草澤之士昇名者十七人及禮部擢進士第者七十有二鸞鳯杞梓舉集權公之門所擢登輔相之位者前後十人使操刈楚之柄權徳輿集本朝欲知君得人失者亦稱善東坡門生史鄭𢎞為太尉時舉薦第五倫為司空班次在下每正朔朝見𢎞曲躬而自卑帝問知其故遂聴置雲母屛風分隔其間東漢天下之人非家吏則門生也吳志宋𢎞薦桓譚帝恱譚鼓琴愛其繁聲宋𢎞聞之不悅伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之且曰能自改耶將令舉以法乎譚頓首辭謝良久乃遣之後帝使譚皷琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷躭恱鄭聲臣之罪也通鑑楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎漢記馬裔孫裴皥門生也清泰初裔孫知舉引新進士謁謝皥皥曰門生門下見門生五代史傳記唐李逢吉知貢舉榜未放而入相及第人就中書見座主時謂好脚踪門生因話録集凡號門生而不知恩之所自者非人也柳文商山四皓雖休去終是留侯門下人令公桃李滿天下何用堂前更種花白傅集至今青雲人猶是門下客髙達夫徐孺子於舉主之喪徒步千里而行弔祭唐崔祐甫鸞鳯把梓舉集權公之門唐楊嗣復門館舊桃蹊劉長卿本朝李翰扵和凝榜及第後與座主同任學士凝作相翰為承㫖適當批詔次日於玉堂輒開和相舊閣悉取圖書器玩留詩云座主登庸歸鳯閣門生批詔主鰲頭玉堂舊閣多珍玩可作西齋潤筆不玉壺清話故吏史胡廣與故吏陳蕃陳咸並為三司蕃每朝㑹稱疾避廣時人榮之梁冀乗勢横暴所在怨毒朱穆自以冀故吏奏記諫不納通鑑劉晏没後掌財賦有聲者多晏之故吏也唐徳宗記吉黄為長陵令時科禁長吏擅去官黄聞司徒趙温薨自以為故吏違科奔喪魏志袁氏植恩四世舊吏遍於天下袁紹傳殷浩被黜放卒故吏顧悅之上疏訟浩疏奏追復浩本官晉史劉晏為度支鹽鐵轉運使其商㩁財用之術者皆一時之選故没後二十餘年韓洄元琇裴睓包佶盧貞李衡相繼分掌財賦皆宴門下唐史傳記鄧訓故吏念訓常所服藥北州少之又知訓好青泥封書従黎陽步推鹿車於洛陽市藥還過趙國易陽井載青泥至上谷遺訓其得人心如是東漢王戎故吏多至大官相逢戎輒下道避之竹林七賢論本朝故吏滿諸方欒城集官長子聖人用之則為官長老子史黄霸守潁川許丞老病聾督郵白欲去之霸曰許丞雖老尚能拜起迎送重聴何傷且善助之毋失賢者意西漢陳遵入公府日出醉歸曹事數廢西曹請斥之大司徒馬宫重遵謂西曹曰此人大度士柰何以小文責之本傳光武戒任延曰善事上官通鑑婁師徳調江都尉揚州長史盧承業異之曰子台輔器也當以子孫相諉詎論僚屬一作吏哉唐史傳記牛竒章公帥維揚杜牧在幕中夜㣲服逸㳺後牧以拾遺召公以縦逸為戒牧始隠諱公取一篋皆街子報帖云杜書記平善芝田録集裹以章服揖拜上官嵇康賀其得賢主人韓文拜迎官長心欲碎唐文粹本朝自言官長如靈運坡僚屬經惟暨乃僚罔不同心六卿分職各率其屬慎簡乃僚書其屬六十一曰官屬以舉邦治以官府之六屬舉邦治禮史參代何為相擇郡縣吏長木訥於文辭謹厚長者為吏言文刻深欲務聲名輒斥去之西漢幽州牧朱浮年少有俊才欲厲風節收士心辟召州中名宿皆引置幕府梁商為大將軍辟漢陽巨覽上黨陳龜為掾屬李固為従事中郎楊倫為長史東漢瑯琊王睿辟掾屬百餘人時人謂之百六掾郄超常為桓温謀主謝安與王坦之見温温使超卧帳中聴其言風動帳開安笑曰郄生可謂入幕之賔矣晉書宜數引見佐史相見不數則彼我不親不親無因得盡人情人情不盡復何由知衆事也宋紀房𤣥齡收人物置之幕府馬燧為河東節度使辟兖州人張建封為判官路岩佐崔鉉扵淮南為支使不十年至宰相鄭従讜為河東節度使詔自擇參佐従讜奏以長安令王調為節度副使前兵部員外郎史館修撰劉崇龜為節度判官前進士劉崇魯為推官人謂之小朝廷言名士之多也韓滉在二浙所辟僚佐各随所長無不得人唐書竇憲平匈奴班固傅毅之徒皆置幕府以典文章東漢晉陶侃鎮武昌軍殷浩庾翼等皆為佐史時武昌號為多士庾亮在武昌諸佐史殷浩之徒登南樓不覺亮至諸人將起避之亮曰諸君少住老子扵此興復不淺便據胡床而坐與浩等談詠晉書杜恕舉劉毅為功曹月餘日三魏稱焉為之語曰但聞劉功曹不聞杜府曹王隠傳桓温逰龍山僚佐畢集有風吹孟嘉㡌墮嘉不之覺羊祜開府累年謙讓不辟士始有所命㑹卒不得除署名故參佐劉儈等牋詣杜預曰生前所辟之士便當隨例放棄者乎乞蒙列上陶侃見諸參佐或以談戲廢事乃取其樗蒲戲具悉以投于江殷浩善𤣥言征西將軍庾亮引為記室參軍晉書王徽之有俊才少為桓沖參軍從沖值雨便下馬入沖車中謂沖曰豈有獨擅一車不容國士乎晉書太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾㑹以中郎任大將軍管記室事為心腹之任時人謂之子房魏志王儉用庾杲之為魏軍將長史蕭緬與儉書曰盛府元僚每難其選庾景行汎渌水依芙蓉何其麗也時人以儉府為蓮花池故緬書美之南史蔡興宗謂諸子曰沈記室人倫師表冝善師之沈傳元稹長扵詩書在越時辟竇鞏鞏工扵詩與之酬和號蘭亭絶唱許孟容韓愈皆奏署幕府有文章傳于時烏重𦙍待官屬有禮當時有名士如温造石洪皆在幕府烏重𦙍鎮河陽求賢者以自重本傳幕府六十餘人後皆為將相顯官郭子儀晏部吏在千里奉教如目前裴度充淮西宣慰招討處置使仍以刑部尚書馬總為副太子右庶子韓愈為彰義行軍司馬司勲員外郎李正封都官員外郎馮宿禮部員外郎李宗閔等為兩史判官書記令狐楚為太原掌書記鄭儋在鎮暴卒不及指撝後事軍中喧譁將變夜忽數十騎持刃迫楚至軍門諸將邀之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重薛收與房杜處心腹之寄薛元敬謹畏未嘗申欵曲如晦曰小記室不可得而親不可得而踈唐書左肅機皇甫公義檢校沛王府長史引韋思謙為同府倉曹謂思謙曰公豈池中之物屈公為數旬之客以望此府舊唐書韋思謙傳新唐書云以重吾府尚父之帥河中也咸寧王渾公佐之不十年按控數州繼踐台庭婁師徳調江都尉揚州長史盧承業異之曰子台輔器也當以子孫相諉詎論僚吏哉裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而逺取居易請従此辭唐史傳記歴城北有使君林魏正始中鄭公慤於三伏之際率賓僚避暑扵此取大荷葉盛酒以簮刺令與柄通屈莖上輪囷如象鼻傳噏之名為碧筒歴下皆效之酒味雜蓮氣香冷勝扵他酧張君房脞說太傅府有三才裴邈清才潘陽仲大才劉慶孫長才語林集婉婉幕中畫謝宣逺詩襄陽幕府天下異入幕如孫楚雲幕随開門杜宜在上位託於幕府書書記之任亦難矣元戎總齊三軍之事統理所部之甿以鎮定邦國賛天子施教化而又與外賔客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記非閎辯通敏兼人之才莫宜居之然皆元戎自辟然後命扵天子茍其帥之不文則其辟或不當亦其理宜也韓文有問湖南賔客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也従軍古云樂談笑青油幕長慚典午非才識韓詩簉俊傑之末跡厮牒計之下列奮六翮翔千里以為轅門大府之重叅帷幕之任董貔虎之威夷俗敬畏革面受事栁文不羡君官羡君幕幕中收得阮元瑜白傳集氷壺幕下清韋應物詩羽儀吾府唐文粹非惜幕間一足地不容也皮日休集賔於幕吏之上同上陳琳書記好王粲従軍樂早晩歸漢庭隨公上麟閣劉長卿以文行謀畫雍容於幕府之間白傳集學業才畫堪置幄中載筆在幕名已重同上少年諸侯府杜牧之望府紅蓮已減花羅隠集本朝范文正公言幕府辟客須可為師者乃辟之雖朋友亦不可辟遺事謝希深歐陽永叔官洛陽時同逰嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至且勞之曰山行良勞當少留龍門府事簡無遽歸也天聖明道中錢文僖留守西都謝希深為通判歐陽永叔為推官尹師魯為書記梅聖俞為主簿皆天下之名士聞見録幕中俊乂閑刀筆帳下驍雄冷劍鐔臨川集幕府稱上賔東坡詩同官經我雖異事及爾同僚詩同寅恊恭書五曰官聨以㑹官治禮史同官為竂吾嘗同竂敢不盡心乎左直不疑為郎同舎有告歸誤持同舎郎金去前漢陳重為郎同舎郎有告歸寧者誤持同舎郎袴以去後漢蕭瑀性狷介與同僚多不合唐紀集濁水汙泥清路塵還曽同制掌絲綸韓文冊庭嘗接武書殿忝連衡劉賔客同年史唐李絳相徳宗人言其私同年許季同徳宗問之曰人扵同年固有情乎絳曰同年乃九州四海之人偶同科第或登科然後相識於情何有若其果才雖在兄弟子姪之中猶將用之況同年乎唐紀傳記神龍以來杏園宴後於慈恩寺㙮下題名同年中推善書者紀之崔沆為主罰録事同年盧彖俯近關宴請假往洛及同年宴于曲江亭彖㣲服縱觀為團司所發進士榜出謝後便往期集院狀元與同年相見請一人為録事其餘主宴主酒主樂探花主茶之類咸以其年辟之俱捷謂之同年既捷列名於慈恩寺㙮謂之題名大宴曲江亭謂之曲江㑹在闗試後謂之闗燕摭言大中以來禮部放榜嵗取二三人姓氏稀僻謂之色目人亦曰榜花南部新書本朝同芳晉堂桂共聴禹門雷趙清獻通家不隔同年面坡詩同庚史漢髙祖與盧綰同日生里中持羊酒賀兩家西漢本傳鍾瑾與李膺同年俱有聲名東漢孫權母曰公瑾周瑜與伯符孫䇿同年小一月耳我視之如子也汝謂孫權兄事之孫䇿與周瑜同年獨相友善有無通共吳志史窣干即思明也與安禄山先後一日生及長相親愛皆為互市牙郎通鑑集許逺與張廵同年生月日後於廵呼之為兄韓退之何事共年壬子歲老於崔相及劉郎白侍郎白與崔劉同年本朝同甲惟君尚黑頭坡公詩文潞公保洛日年七十八同時有司馬光等三人皆年七十八嘗為同甲㑹潞公詩曰四人三百十二嵗况是同生丙午年招得梁園為賦客合成商嶺採芝仙清談亹亹風盈席素髪飄飄雪滿肩此㑹従來誠未有洛中因作畫圖仙沈括筆談同舎史司馬相如因客逰梁孝王令與諸生同舎史陳重為郎同舎郎有告歸寧者誤持同舍郎袴以去東漢陸贄為翰林學士詔書一日數百起草如泉注曲盡事情同舎伏其能唐史集取笑同舎翁杜同門子申屠嘉兀者也而與鄭子産同師於伯昬無人莊徳充符史鄭崇弟立與傅喜同門學相友善西漢同門謂同師也交代經舊令尹之政必以告新令尹語史𤓰時而往及𤓰而代鄭子産疾謂子太叔曰我死子必為政惟有徳者能以寛服民其次莫如猛左蕭望之以韓延壽代己為馮翊而有能名出己之上故忌害之遂令御史案延壽在東郡時事竟坐棄市西漢初郡守范津薦傅燮及津為漢陽與燮交代合符而去傅燮傳徴班超還任尚代為都䕶與超交代曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之河東太守王邑被徴郡椽衛固及闕先詣司𨽻校尉鍾繇請留之繇不従曹操以杜畿為河東太守鍾繇促王邑交符邑佩印綬經從河北詣許自歸衛固等使兵數千人絶陜津畿數月不得度漢記謝方明善治郡所至有能名承代前人不易其政必當改者則以漸移變使無跡可尋張軌病風以秦州刺史賈龕代之龕將受之其兄讓龕曰涼州一時名士威著西河何徳以代之沙之汰之瓦石在後簸之揚之糠粃在前晉書王延之代張緒為中書令何㸃曰後接之者實為未易齊書傅劌代劉元明為山隂令問元明曰願以舊政告新令尹南史集蘇州刺史例能詩西掖今來贊左司劉夢得本朝後功掩前羞歐公詩古人重交代子孫不相忘王元之詩朋友經勿疑朋盍􅆪二人同心其利斷金同心之言其臭如蘭麗澤兊君子以朋友講習易與我同志亦所不隠也書序喪亂既平既安且寧雖有兄弟不如友生詩惠而好我攜手同行詩自天子至於庶人未有不須友以成者詩序相彼鳥矣猶求友聲矧伊人矣不求友生詩朋友攸攝攝以威儀詩朋友皆在他邦袒免歸則已歸有主則止也主若幼小則未止朋友麻朋友雖無親有同道之義相為服緦君子不盡人之歡不竭人之忠以全交也君子之接如水小人之接如醴君子淡以成小人甘以壞相觀而善之謂摩子夏曰離羣索居亦已久矣獨學而無友則孤陋而寡聞曽子曰朋友之墓有宿草而不哭焉禮記合志同方營道同術並立則樂相下不厭久不相見聞流言不信儒行有朋自逺方來不亦樂乎晏平仲善與人交久而敬之孔子曰益者三友損者三友友直友諒友多聞益矣友便辟友善柔友便佞損矣語子孔子曰與人交推其長者違其短者故能久也家語尹公之他端人也其取友必端矣責善朋友之道也友也者友其徳也不可以有挾也孟子合堂同席而坐相視而笑莫逆扵心遂相與為友莊子交深而言深者忠也交淺而言深是亂也淮南史譬諸草木吾臭味也北宫文子曰周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也左亷頗與藺相如為刎頸交不知其人視其友並史記自關以東莫不延頸願交焉鄭當時年少官薄其㳺知友者皆其大父行天下有名之士也魏其灌夫兩人相引重相得甚歡無厭恨相知晩也一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見天下以酈寄為賣友為見利而㤀義也合從締交西漢史傳尹敏與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周恵施之相傳也適陳留則友苻偉明逰大學則師仇季智之陳國則親魏徳公入汝南則交黄叔度交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全之者鮮矣禰衡唯善孔融楊脩常稱曰大兒孔文舉小兒楊徳祖餘子碌碌莫足數融亦深愛其才衡弱冠而融四十遂與為交何顒與蕃膺袁紹結為奔走之交公沙穆來逰太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交扵杵臼之間東漢膠漆自謂堅不如陳與雷雷义傳交淺而言深者愚也崔駟傳華歆與邴原管寧為友時號三友為一龍歆為龍頭原為龍腹寧為龍尾魏志程普曰與周公瑾遊如飲醇醪不覺自醉吳志嵇康阮籍山濤一見便為神交吕安服􅄞康高致每一相思輒千里命駕山濤與􅄞康阮籍等為竹林之交著忘言之契王戎少阮籍二十嵗而籍與之交嵇康臨刑謂子曰山公在汝不孤孫盛與殷浩談論食冷而復暖者數四晉本傳交疎而吐誠今人以為難劉畢芳樽之友本賛謝瞻范秦為雲霞之交南本傳魏元同與裴炎締交能保終始故號耐久朋唐書楊寧有高操擢第棄官與陽城為莫逆交徳宗召城詔寧與俱來薛收與元敬為文學館學士時房杜等處心腹之寄深相友託嚴挺之重交㳺許與生死不易其操陸贄年十八張鎰有重名請為忘年友唐史傳記一面契若金蘭竹林七賢傳集樂莫樂兮新相知楚辭昔日逰處行則連輿止則接席何曽須臾相失魏文帝心同琴瑟言鬱郁於蘭􅊉道叶膠漆志婉孌扵塤篪劉孝標傳心照神交惟我與子遷都賦時復相與舉觴對膝劉琨書數面成親舊況情其過此者乎龎叅軍詩清交素友比景同波王僧逹李郭或同舟潘夏時方駕藝文類聚身雖胡越意存斷金賞心惟良知選交之於人也猶唇齒之相濟劉歆新議僕自少至今往還朋友間一十七年矣日月不為不久所與交往相識者千百人非不多其相與如骨肉兄弟者亦且不少與詹離率不歴時移時則必合合必兩忘其所趨久然後去詩成有共賦酒熟無孤斟韓文締交君贈縞投分我忘筌意氣一言合風期萬里親挹蘭言於斷金交蓬心於匪石共引文江同開筆海千載契風雲一言忘貴賤駱賔王人生交契無老少論交何必先同調忘形向友朋醉眠秋共被攜手日同行與子成二老來往亦風流論交翻恨晩杜攜手慚連璧同心許斷金夙期契合劉賔客分定金蘭契言通藥石規豈無舊交結久别多遷易亦有新往還相見多形迹惟君與我分堅久如金石定交非勢利松筠與金石未足喻堅宻在車如輪轅在身如肘腋淡交唯對水淡水交情老始知豆觴之㑹軒盖之逰多奉光塵最承歡恵行止通塞靡所不同金石膠漆未足為喻平生定交取人窄屈指相知惟五人豈無晩嵗新相識相識面親心不親阿閣鸞鳯野田鶴何人信道是舊羣白居易掘井須到流結交須到頭賈浪仙接枕話通宵劉長卿結交指松栢坐登徐孺榻頻接李膺杯孟浩然不言而信者其分深唐文粹至交淡不疑孟東野與足下義結紈素恩比同生傳幹本朝文章驚世知名早意氣論交相得晩羣居平日幸得肩従齒序跪拜起居竊兄弟行段公集攜被夜語達旦不窮坡文樂天夢得老相従交情舊許雞為具交情淡泊久彌新欒城集擇交經毋友不如己者泛愛衆而親仁可者與之其不可者拒之語子君子必謹其所與處者焉賜也好友勝已者家語其交也以道其接也以禮孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士孟君子逰必就士所以防邪僻而近中正也以勢交者勢傾則絶以利交者利窮則散故君子不與也君子先擇而後交故寡尤文中子史論行而結交者立名之士也史無舊無新惟仁是親趙典閉門却掃非徳不交李膺性簡亢無所交接惟以同郡荀淑陳寔為師友劉陶所交必也同志好尚或殊富貴不求合情趨茍同貧賤不易忘東漢邴原至陳則師韓子助潁川則宗陳仲弓汝南則交范孟􅀶涿郡則親盧士幹魏志陸龜蒙不喜與流俗交雖造門不肯見本傳傳記山濤與阮籍􅄞康皆一面契若金蘭濤妻韓氏嘗問濤曰吾門年可為交者唯二人而已竹林七賢論何晏鄧颺夏侯𤣥並求與傅嘏交而嘏終不許世說集四座無凡賔李白詩懷道守義非其人不交韓愈集種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬氷堅中有潛浪翻惟當金石交可與賢達論孟郊門庭無雜賔孟浩然不善擇交經比之匪人易輕交易絶君子所恥禮子商也好友不勝己者家語小人先交而後擇故多怨文中史親富不親仁焉用之左集交不忠怨長楚辭故舊經伐木燕故舊也不遺故舊則民徳歸厚矣詩序孔子之故人曰原壤其母死夫子助之木槨曰故者無失其為故也記故舊不遺則民不偷故舊無大故則不棄也語史原仲季友之舊也左樓護有故人吕公無子歸護護與吕公妻與吕嫗同食妻子頗厭護聞之責曰吕公以故舊窮老託身於我義所當奉遂奉吕公終身西漢光武引嚴光入道故舊共卧光以足加帝腹太史奏客星犯御坐帝笑曰朕故人嚴子陵共卧耳東漢世契史初楚伍叅與蔡太師子朝友其子伍舉與聲子相善也左何邵袁毅有累世之交晉書嚴武以杜甫世舊待甫甚善王珂曰吾扵諸公有家世事分唐紀傳記融十嵗聞漢中李公膺清節直亮慕之欲往觀其人遂造公門謂門者曰我是公通家子孫孔融别傳集予於崔君有通家之舊栁子厚父執經父黨無容見父之執不謂之進不敢進不謂之退不敢退不問不敢對年長以倍則父事之禮史班彪家有賜書父黨揚子雲已下莫不造門西漢傳馬援有疾梁松來候之獨拜牀下援不答松去諸子問曰梁伯孫帝婿貴重公卿莫不憚之大人獨不為禮援曰我乃松之父友也雖貴何得失其序乎通鑑常林年七歲有父黨造門問林伯先在否汝何不拜林曰臨子字父何拜之有魏志劉孝綽年十四繪常使代草父黨沈約任昉范雲等聞其名命駕造焉父繪時掌詔誥北史集丈人吾父之友崔祜甫講藝記無容之敬常拜牀下權德輿集市交經情疎而貎親在小人則穿窬之盜也歟禮子朋而不心面朋也友而不心面友也揚子以勢交者勢傾則絶以利交者利窮則散文中子史以權利合者權利盡而交疎孟嘗君廢諸客皆去馮驩曰富貴多士貧賤寡友事之固然也獨不見夫朝趨市者乎明旦側肩争門而入日暮之後過市者掉臂而不顧非好朝而惡暮所期物忘其中今君失位而賔客皆去事之固然也史記張耳陳餘始居約時相然信以死豈顧問哉及據國争權卒相滅亡勢利之交古人羞之盖謂是矣忽忘雅素西漢傳傳記以財交者財盡而交絶以色交者華落而愛渝戰國䇿權交者不久貨交者不親戒子拾遺集産空交道絶財殫宻戚疎王詩競毛羽之輕趨錐刀之末扵是素交盡利交興張陳所以凶終蕭朱所以隙末斷可識矣而翟公方規規然勒門以箴客何所見之晩乎劉孝標凡今之交視勢厚薄韓文有財有勢即相識無財無勢同路人近世交道衰青松落顔色孟東野世之言者曰市道交柳文君不見管鮑貧時交此道今人棄如土途窮見交態杜詩故交不過門青草日上堦李白集世情誰是舊雷陳元㣲之交情同市道唐文粹本朝廉頗免長平歸故客盡去及復用為將客又復至頗曰客退矣客曰君何見之晩也天下以市道交君有勢我則従君無勢則去此固其理也有何怒乎晏殊類要當其同利之時蹔相黨引以為朋者偽也及其見利而争先或利盡而交疎則反相賊害雖其兄弟親戚不能相保歐公集鄉曲經維桑與梓必恭敬止詩漫叟詩話以為非鄉曲事今言父母之邦者援此故亦存之一命齒扵鄉里周禮習鄉上齒五十養於鄉六十杖於鄉君子之服也鄉入里必式禮居是鄉也事其大夫之賢者友其士之仁者孔子於鄉黨恂恂如也似不能言者鄕人飲酒杖者出斯出矣何必去父母之邦語子子貢曰禮居是邦則不非其大夫家語孔子之去魯曰遲遲吾行也去父母國之道也鄉黨莫如齒死徙無出鄉鄉田同井出入相友守望相助疾病相扶持孟過故鄉而下車老子君子居必擇鄉禮居是邑不非其大夫荀子越公遇内使薛公曰公見王通乎薛公曰鄉人也文中子史公山不狃曰且夫人之行也不以惡廢鄉左不以私怨惡廢棄鄉黨之好萬石君過里門必下上還過沛故人父老諸母子弟佐酒道舊故為笑樂酒酣上自為歌起舞慷慨傷懷泣數行下謂沛父兄曰㳺子悲故鄉豐沛者吾所生長極不忘耳西漢髙祖禱豐枌榆社西漢郊祀志枌榆鄉名也孫期里落化其仁讓漢書韓安國起自徒中朱買臣出於㣲賤並以才守本邦西漢鑑鄭君鄉名曰鄭公鄉趙壹恃才倨傲為鄉里所擯後漢魯肅大散財貨甚得鄉邑忻心吳志何曽陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書范叔孫周窮濟急鄉里貴其義行宋書苗晉卿為太守嘗入壺闗望縣門輙步曰公門當下况父母邦乎唐書里閈立社用洽鄉黨之歡紀吳團結民兵使之習戰自衛鄉里梁紀鄉村團為義營各立將佐每有盜發則鳴鼓舉火丁壯雲集盜少民多無能脫者通鑑傳記何琦豐約與隣鄉共之晉中興書許允為吏部郎多用其鄉里魏明帝遣虎賁收之旣至帝覈問之允對曰臣之鄉人臣所知也世說集身出禮義之鄉李陵洛中故族體樸厚之洪規稷下遺甿陶禮義之餘化見推里閈譽浹鄉閭駱賔王鄉先生没而可祭於社東漢隠士王烈居祈縣因號所居鄉為君子鄉韓文致敬惟桑梓孟浩然隣里經東鄰殺牛不如西鄰之禴祭易洽比其鄰詩五家為鄰五鄰為里周禮姑姊妹其夫死夫若無族矣則前後家東西家無有則里尹主之記原思與之粟九百辭子曰毋以與爾鄰里鄉黨乎里仁為美語子雞鳴狗吠相聞孟二舎共一井墨子列子與南郭子連牆二十年不相謁請列子君子居必擇鄰可以避患也晏子田里相距雞犬相聞文中子史西隣責言怒隣不義親仁善鄰晏子如晉景公使更其宅還而毁之曰諺曰非宅是卜惟鄰是卜二三子先卜鄰矣左孟子之母三徙擇鄰史記任公為閭里率幸同土壤西漢馬援素與公孫述同里閈相善通鑑宋季雅市宅在吕僧珍宅側吕問宅價曰千一百萬吕怪其貴宋曰一百萬買宅千萬買鄰也南史荀淑有子八人時人謂之八龍所居里舊名西豪渤海范康以為昔高陽氏有才子八人更名其里曰髙陽里通鑑王修年七嵗喪母母社日亡鄰里為之罷社魏志史思明安禄山同里閈張嘉貞所居時號曰鳴珂里劉仁軌所居號三柱里唐書傳記鄰里致饋東漢孟母舎近墓孟子嬉戲為墓間之事孟母曰此非所以居子處也乃去舎市旁其子嬉戲為賈衒孟母又曰此非所以居子處也乃舍學宫之旁其子嬉戲乃設俎豆進退揖讓孟母曰此真可以居子矣遂居之列女傳益州城張儀所築錦城在州南蜀時故宫也其處號錦里益州記買鄰之直貴扵買宅也物理論集偉孟母之擇鄰所以占此里是謂仁智居此里仁所以為美孟母所以三遷選斗酒聚比鄰陶淵明詩居止接近向秀思舊願為同社人鷄豚燕春秋里閈自相賀韓集休怪童兒延俗客不教鵝鴨惱比鄰芬芳孟母鄰王翰願卜鄰相近竹參差相過人不知㸔君多道義従此數追隨闗西得孟鄰杜詩横絶歴四海所居未得隣李白集見擬移居作鄰里不勞時節請開闗務閒酒熟饒經過舎南巷北遥相語柳詩買宅者先定鄰焉物理論本朝新居乃鄰牆鷄黍數往來臨川從兹來往數兒女自譍門坡詩鷄豚不改舊隣里自相歡蒸豚釀酒多為具隣里十年成舊故欒城集鷄犬之聲相聞幅巾杖屨嵗時往來東坡集西洛有五相宅乃文潞公富相王相二張相也諺云吾鄉有宰相坊侍郎里翰府名談賔客經有不速之客來敬之終吉易我有嘉賔皷瑟皷琴和樂且湛我有㫖酒以燕樂嘉賔之心詩鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣詩序主人肅客而入若非飲食之客則布席席間函丈上客起禮史宋公享晉楚大夫趙孟為客左田文主家待賔客賔客日進名聲聞扵諸侯靖郭君使田文主家待賔客賔客争譽其美號曰孟嘗君孟嘗君在薛食客常數千人魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆喜賔客以相傾史樓護谷永為五侯上客遵嗜酒每大飲賔客滿堂輒闗門取客車轄投井中雖有急終不得去西漢崔駰愛士好賔客盛脩殽膳備極滋味不問餘産居常蔬食菜羮而已家無儲石當世清之孔融喜後進賔客日盈其門常嘆曰坐上客常滿罇中酒不空吾無憂矣東漢謝安造桓温温甚喜言平生歡笑竟日既出温問左右頗嘗見我有如此客不晉書袁粲門無雜客文士見遇不過一兩人宋書羊侃不飲酒而好賔遊終日獻酬同其醉醒南史畢坰喜賔客家未嘗以有無計常何曰家客馬周代臣為之唐傳長孫澄好賔客接引忘倦雖不飲而好觀人酣興常恐坐客請歸毎勒中厨别進異饌留之後周書傳記袁紹居洛陽不妄通賔客非海内知名不得相見英雄傳顧榮四代門無雜賔投刺攝齊皆一時英俊蘇州志王仁裕每大雪則自所居至坊巷口掃雪開徑迎接賔客至所居處飲宴謂之暖寒㑹天寳遺事集儋石之儲常空扵私室方丈之食每盛扵賔筵韓文盈門皆食客皇甫湜元次山以不飲者為惡客本集本傳客來留飲不計錢東坡館待經見人不能館不問其所舎禮記史晉鄭同儕其過子弟固將禮焉若出於陳鄭之間共其資糧屝屨可也展喜曰寡君聞君親舉玉趾將辱扵敝邑使下臣犒執事燭之武曰若舎鄭以為東道主行李之往來共其乏困鄭商人曰不腆敝邑為從者之淹居則具一日之積行則備一日之衛鄭皇武子曰吾子淹久扵敝邑唯是脯資餼牽竭矣賔至如歸無寧菑患左孟嘗君食客數千人無貴賤一與文等更舎上舎飾厨傳稱過客令有貴客為具召之夫妻治具厚具樂飲以惡草具進史記傳記館榖底寧白帖集脩薄具而自設兮君曽不肯乎幸臨司馬相如重客至矣授館致餼柳文荆南舊有五花館待客之上地也故將眩上成汭詩曰不是上台憐姓字五花賔館敢從容南部新書孟嘗君食客三千人厨有三列上客食肉中客食魚下客食菜史本朝貧家何以娛客但知抹月批風東坡集賔主經主人不問客不先舉主人興辭於客然後客坐主人敬客則先拜客客敬主人則先拜主人主人親饋則客祭主人不親饋則客不祭並禮記賔主百拜終日飲酒而不得醉焉並禮記史賔有禮主則擇之左傳集主稱千嵗壽賔奉萬年觴樂府主人情更重韓集本朝非公無此客蘇集異姓經以賀慶之禮親異姓之國周禮外親之服皆緦也外親無義正服不過緦麻若公與族燕則異姓為賔異姓主名治際㑹注異姓謂來嫁者也君與異姓同車不同服禮記子異姓之服禮不加緦金樓子史周之宗盟異姓為後左傳記何晏曰異姓不相貫何晏别傳獨居思仁公言言義一日三復白圭之玷是南宫之行也夫子信其仁以為異姓注謂以其兄之子妻之也大戴禮記纂淵海卷四十
