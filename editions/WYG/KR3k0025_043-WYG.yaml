body:
  text: 記纂淵海卷四十三宋潘自牧撰性行部不爭經寛柔以教不報無道南方之強也君子居之記中庸謂犯而不校也犯而不校語君子無所爭同上史人或毀直不疑盜嫂不疑聞曰我乃無兄然終不自明也史記本傳廉頗為趙將藺相如拜上卿位在頗右頗曰我見必辱之相如聞不肯與會每朝時甞稱病不欲與頗爭列已而出望見頗引車避匿相如曰夫以秦王之威而相如廷叱之辱其羣臣吾雖駑獨畏廉將軍哉顧念彊秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬬勢不俱生吾所以為此者先國家之急而後私讎也史記互入狥公忘私門衛綰不與他將爭前漢本傳直不疑為郎同舍有告歸誤持同舍郎金去金主意不疑不疑謝有之買金償後告歸者來歸金而前郎亡金者大慙同上冦恂在潁川賈復部將犯法恂斬之復欲手刃恂恂每避後漢劉寛甞行有人失牛者乃就寛車中認之寛無所言下駕步歸有頃認者得牛送還叩頭謝之寛曰物有相類事容脱誤幸勞見歸何為謝之州里服其不校後漢卓茂事孔光甞出行有人認其馬茂問曰子亡馬㡬何時對曰月餘日茂有馬數年心知其謬黙解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主得亡者乃詣府送馬叩頭謝之陳重在郎舍同舍郎有告歸寧者誤持同舍郎袴以去主疑重所取重不自申說市袴以償之後歸寧者歸以袴還主其事乃顯同上性既遲緩與人無傷雖出胯下之負榆次之辱不知貶損之於己猶蚊虻之一過也東漢孔融傳曹萌字元偉以仁厚稱隣人有亡豕者與萌豕相類詣門認之萌不與爭後所亡豕自還其主大慙送所認豕辭謝萌萌笑而受之後漢弟子賈瓊問息謗通曰無辨問止怨曰不爭通鑑隋髙祖紀直不疑買金以償同舍劉寛下車歸牛鄉人誠知疑事之難明非口之所能勝也唐書栁宗元何必伺其窟穴與螻蟻校長短哉通鑑唐武后紀傳記司馬徽字徳操時人呼為水鏡甞有人妄認徽猪徽便推與之後數日亡猪者以猪還徽乃叩頭謝自責徽又厚謝董正别傳何隨字季業清廉退讓甞有屠者牽猪過隨門索㫁失之彊認隨溷中猪隨牽與之屠人尋自得亡者還隨隨竟以與之華陽國志集虛舟為心白樂天本朝難以口舌爭水清石自見黄魯直詩不爭善勝經汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功書大禹謨子天道不爭而善勝老子夫唯不爭故天下莫能與之爭同上史藺相如退避廉頗名重太山史記本傳輕於喜怒經方茂爾惡相爾矛矣既夷既懌如相醻矣詩節南山進人若將加諸膝退人若將墜諸淵記檀弓下子馬喜則交頸相靡惡則分背相踶大計反莊子輕與茍毀好爭尚怒小人哉文中子互見躁急史喜怒以類者鮮易者實多左傳宣十七年魏收曰舉之則使上天按之當使入地北史本傳好則鑽皮出羽惡則洗垢索瘢新唐書魏徴傳集君心好惡苦不常好生毛羽惡生瘡白樂天深沉經惟深也故能通天下之志易繫辭史靜淵以有謀史記顓頊紀情欲之感無介乎容儀西漢匡衡傳黙而好深沉之思西漢揚雄傳淵哉若人西漢班固叙傳何休質朴訥口而雅有心思東漢本傳互入不以貌取劉儒口訥心辨同上殷浩雖被黜放口無怨言夷神委命談詠不輟雖家人不見其有流放之慼晉書本傳桓彛甞謂褚裒曰季野有皮裏春秋言其外無臧否而内有褒貶也謝安曰裒雖不言而四時之氣已備通鑑晉記游雅曰余與髙子游處四十年未甞見其喜愠之色通鑑宋世祖楊綰性沈靜獨處一室左右圖史凝塵滿席澹如也唐書本傳李藩沈靜有檢局同上宋璟為刑部尚書馳驛詣闕遣内侍將軍楊思勗迎之璟風度凝逺人莫測其際在途竟不與思勗交言通鑑唐𤣥宗紀傳記智深勇沈戰國策集韻宇𢎞深褚淵碑智謀深靜唐文粹淺中子一命而吕鉅再命而於車上儛三命而名諸父莊子小人之學也入乎耳出乎口口耳之間則四寸耳曷足以美七尺之軀哉荀子史富貴不歸故鄉如衣綉而夜行誰知之者史記項羽紀韓信平齊使人言於漢王曰齊偽詐多變反覆之國不為假王以鎮之其勢不定願為假王史記本傳范雎一飯之徳必償睚眦之怨必報同上意氣揚揚甚自得也史記晏子傳夫不足者視人有餘西漢班固傳桓榮為太子少師帝賜以輜車乘馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也東漢本傳互入驕矜一餐之徳睚眦之怨無不報復通鑑漢獻記桑維翰任愛憎一飯之恩睚眦之怨必報人亦以是少之通鑑五代晉髙祖紀楊炎獨任大政以復恩讎為事通鑑唐徳宗紀李訓鄭注平生絲恩髪怨無不報者通鑑唐文宗紀傳記章孝標及第後寄白樂天詩曰及第全勝十政官金湯度了出長安馬頭漸及揚州路為報時人洗眼㸔摭言互入驕矜集詩未有劉長卿一句已呼阮籍為老兵矣筆語未有駱賔王一字已罵宋玉為罪人矣書字未識偏傍髙談稷契讀書未知句讀下視服䖍皇甫湜互入不自揆度内不足者急於人知韓文一人譽之則自以為有餘一人沮之則自以為不足同上不可窺測經君子語大天下莫能載焉語小天下莫能破焉記中庸互入不可形容今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉鮫龍魚鼈生焉貨財殖焉記中庸仰之彌髙鑽之彌堅瞻之在前忽然在後語君子易事而難説也夫子之牆數仭不得其門而入並論語子天俄而可度則其覆物也淺地俄而可測則其載物也㣲揚子水測之而益深窮之而益逺同上大壑之為物也注焉而不滿酌焉而不竭莊子猶河漢而無極莊子逍遙遊無窮如日月不竭如江海孫子不為謀府混然無際劉子史孔子適周問禮於老子孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為罔游者可以為綸飛者可以為矰至於龍吾不知其乗風雲而上天吾今日見老子其猶龍乎史記戴良曰久不見叔度自以為無不及既覩其人則瞻之在前忽然在後固難得而測矣通鑑黄憲傳叔度汪汪若千頃陂澄之不清淆之不濁不可量也同上家人莫見喜怒聲色之異東漢仇覽傳薛收與房杜處腹心之寄更相結附薛元畏未甞申欵曲敬如晦曰小記室不可得而親不可得而疎新唐書本傳孫登性無恚怒或投諸水欲觀其量既出便大笑晉書隠逸傳賈耽自朝歸第接對賔客終日無倦家人近習未甞見其喜怒色古之盛徳君子何以加焉舊唐書本傳風度凝逺人莫測其量唐書宋璟傳杜如晦從太宗征伐叅帷幄機秘方多事裁處無留僚屬共事者莫見所涯唐書杜如晦傳一片靈臺丹青難狀唐書裴度傳周顗指顧和心曰此中最是難測也晉書顧和傳諸諫官紛紛言事細碎天子益厭苦之陽城方與二弟及客日夜痛飲人莫能窺其際皆以為虛得名耳韓愈作爭臣論以譏之城不屑意通鑑唐徳宗紀傳記王戎與嵇康居二十年未甞見其喜愠之色世説上謝太傅無嗔喜劉義慶世説司馬徽與人語莫問好惡皆言好有鄉人問徽安否答曰好有人自陳子死曰大好妻責之曰人以君有徳故相告何忽聞人子死便言好徽曰卿言亦大好殷芸小説猶執盃就江海飲莫知淺深也劉向説苑按太行而北去亦不知山所限極處亦如東海不知所窮博物志集喜愠莫見其際禇淵碑道識虛逺表裏融通淵然萬頃直上千仭僕妾不覩其喜愠近侍莫見其傾弛任彦昇塞鴻絶儔匹海月難等夷孟東野烏可究其津涯而窺其牆仭唐文粹誰辨心與跡非行亦非藏白樂天仰之彌峻巍乎其若山挹之彌深湛乎其若海唐文粹朋友罕聞得喪之言家人莫見喜愠之色吕和叔文徳輝淘然不見其際李義山時人欲識胷襟否彭蠡秋連萬里江杜牧之若躋太華臨溟渤但觀乎巖髙而水深不知磅礴澶漫所為逺大者也同上本朝須臾慰滿三農望却斂神功寂似無韓魏公喜雨詩公之所能我不能知乘雲馭風與汗漫期東坡撰文定神道碑子之心胷蟠屈龍蛇風雲變化雨雹交加咆然揮斧霹靂轟車人有遭之心驚膽落震仆如麻須臾霽止而四顧百里山川草木開發萌芽歐公祭蘇子美招之不來麾之不去不可得而親其可得而疎之乎坡文才如凌雲松豈受尺寸量蘇子由譬如太山喬岳不見其運動而効功利之及於物者不可以數計而周知東坡祭歐公文識者所窺子野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之馮婦攘臂下車衆皆悦之其為士者笑之孟子盡心下南榮趎至老子之所老子曰向見君眉睫之間吾因以得汝矣莊子庚桑楚齊桓公讀書於堂上輪扁斵輪於堂下問曰君之所讀者古人之糟粕也莊子愚公謀平太行之險京城之孀婦有男往助之河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曽不能毀山之一毛其如土石何列子史鬬伯比曰莫敖必敗舉趾髙心不固矣左傳桓十三年齊侯盟諸侯於葵丘宰孔先歸遇晉侯曰可無㑹也齊侯不務徳而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行左傳僖九郤芮曰幣重而言甘誘我也左傳僖十晉陽處父聘于衛反過甯甯嬴從之及温而還其妻問之嬴曰以剛商書沈潛剛克髙明柔克夫子一之其不没乎天為剛徳猶不干時況在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉殺陽處父文五秦伯任好卒以子車氏之三子為殉君子是以知秦之不復東征也左傳士㑹歸晉秦繞朝贈之以䇿曰子無謂秦無人吾謀適不用也左傳文十三年劉康公曰原叔必有大咎天奪之魄矣左傳宣十五年士貞伯曰鄭伯視流而行速不安其位宜不能乆左成六年士鞅曰欒黶汰侈已甚猶可以免其在盈乎左襄十四鄭師慧譏宋曰必無人焉若猶有人豈其以千乘之相易淫樂之矇左襄十五年互見舍大狥小叔向曰伯有已侈所謂不及五稔者左襄二十七互見料度居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患左襄三十一年韓宣子如齊見子旗曰非保家之主也晏子曰君子有信其有以知之矣左昭二年周原伯魯不説學閔子馬曰學殖也不學將落原氏其亡乎左昭十八魯叔孫昭子曰楚不在諸侯矣其僅自完以持其世而已左哀十九楚殺伍奢其子員如吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭二十互見嫁禍叔孫婼聘于宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡左昭二十五年觀其容而知其心矣國語互見料度戎王使由余於秦秦繆公示以宫室積聚由余曰此中國所以亂也史記秦本紀尉繚説秦王王見繚亢禮衣服食飲與繚同繚曰秦王為人蜂準長目鷙鳥膺射聲少恩而虎狼心居約易出人下得志亦輕人我布衣然見我常心自下我誠使得志於天下天下皆為虜矣不可與乆游乃去史記秦始皇本紀伍子胥見吳王説伐楚之利吳公子光曰彼伍員父兄皆死於楚而員言伐楚欲自為報私讎也非能為吳乃止史記刺客專諸傳管仲世所謂賢臣孔子少之史記管晏傳賛范蠡與大夫種書曰越王為人長頸烏喙可與共患難不可與共安樂種稱病王乃賜種劍自殺史記越世家楚有養由基善射去栁葉百步而射之百發而百中左右觀者數千人皆曰善射有一夫立其旁曰可教射矣養由基怒客曰夫去栁葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鈎一發不中百發盡息史記周紀互見一失召百非狂夫之樂智者哀焉史記趙世家吳楚反條侯為太尉至河南得劇孟喜曰吳楚舉大事而不求孟吾知其無能為而已矣史記游俠傳吳季札適晉説趙文子韓宣子魏獻子曰晉國其萃於三家乎史記吳世家周襄王使宰孔賜齊侯胙遇晉侯曰齊侯驕矣第無行史記齊世家景帝曰魏其者沾沾自喜耳多易難以為相持重史記本傳臣見其視臣端而趨疾知臣得其情故也通鑑周紀項王喑嗚叱咤千人皆廢然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有病涕泣分飲食至使有功當封爵者印刓敝忍不能予此所謂婦人之仁也通鑑漢髙帝紀曹操言袁紹志大而智小色厲而膽薄通鑑東漢仲長統謂髙斡曰君有雄志而無雄才甘寧曰劉表慮既不逺兒子又劣非能承業傳基者也同上朱勃小器速成智盡此耳東漢馬援互見料度馬援曰天下雌雄未定公孫不吐哺走迎國士與圖成敗修飾邊幅如偶人形此子何足乆稽天下士乎通鑑漢光武紀京房學易於梁人焦延夀常曰得我道以亡身者京生也通鑑漢元紀樊伷誘道諸夷圖以武陵附漢中劉備權召問潘濬濬答以五千兵往足以擒伷權曰卿何以輕之濬曰伷是南陽舊姓頗弄唇吻而實無才略臣所以知之者伷昔甞為州設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗也通鑑漢獻紀黄允與晉文經並恃其才智曜名逺近徴辟不就託言療病京師不通賔客公卿大夫遣門生旦暮問疾郎史雜坐其門猶不得見符融謂李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賔徒稍省旬日之間慙嘆逃去通鑑漢桓紀或謂袁術曰堅若得洛不可復制此為除狼而得虎通鑑漢獻紀董昭說河内守張楊曰袁曹雖為一家勢不乆羣曹今雖弱然實天下之英雄也袁狹中少親剛而無禮匹夫之雄耳曹操曰吕布一旦得一州不能據東平㫁亢父太山之道乘險要我而乃屯濮陽吾知其無能為也賈翊曰劉表平世三公也不見事變多疑無決無能為也吕布顧謂劉備曰𤣥徳卿為坐客我為降虜繩縛我急獨不可一言邪操命緩布縛劉備曰不可明公不見吕布事丁建陽董太師乎已上並通鑑漢獻紀中常侍趙忠言於省内曰袁本初作聲價好養死士不知此兒終欲作何後漢李瓚曰世將亂矣天下英雄無過曹操袁山松後漢書姚虞俊曰張惠恕才多智少華而無實怨之所聚有覆家禍吾見其兆矣無㡬何敗通鑑三國魏明紀或謂帝曰劉譁不盡忠善伺上意所趨而合之陛下試與譁言皆反意而問之若皆與所問反者是譁常與聖意合也每問皆同者譁之情必無所復逃矣帝如言以驗之果得其情通鑑魏明紀司馬懿謂蔣濟曰智囊往矣濟曰桓範則智矣然駑馬戀棧豆爽必不能用也通鑑魏邵陵厲公管輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候䰟不守宅血不華色精爽烟浮容若槁木此為鬼幽二者皆非遐福之象也通鑑鄧颺何晏初諸葛恪少有盛名文帝深器重之而恪父瑾常以為戚曰非保家之主也父友奮威將軍張承亦以為恪必敗諸葛氏通鑑魏髙貴鄉公紀帝甞問陳矯曰司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也通鑑魏明紀吳主醉問費禕曰楊儀魏延牧豎小人也雖甞有鳴吠之益於時務然既已任之勢不得輕一朝無諸葛亮必為禍亂矣同上陸遜甞謂恪曰在我前者吾必奉之同升在我下者則扶接之今觀君氣陵其上意􅌸乎下非安徳之基也通鑑魏高貴鄉公紀周瑜曰操雖託名漢相其實漢賊桓温請謝安為司馬髙松戲之曰卿髙卧東山諸人每相與言安石不出將如蒼生何蒼生今亦將如卿何安甚有愧色晉書謝安互見責備陳登謂吕布曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不然當如養鷹饑則為用飽則颺去魏志裴頠薦韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就哉通鑑晉恵帝互入不茍合山濤見王衍曰何物老嫗生此寧馨兒然誤天下蒼生必此人也通鑑晉紀王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制通鑑晉紀王澄胡母輔之等以任放為逹或至裸體樂廣聞而笑曰名教中自有樂地何必乃爾晉書樂廣傳羊祜謂賔客曰王夷甫方以盛名處大位然敗俗傷化必此人也晉羊祜傳董養見王彌而謂之曰君好亂樂禍若天下有事不作士大夫矣通鑑西晉世祖陶侃遺荀崧書曰杜曽凶狡所謂鴟梟食母之物此人不死州土未寧足下當識吾言通鑑晉愍紀范通謂王濬曰卿功則美矣然恨所以居美者未盡善也卿旋斾之曰角巾私第口不言平吳之事若有問者輒曰聖主之徳羣帥之力老夫何力之有此藺生所以屈㢘頗也王渾能無愧乎通鑑西晉世祖紀劉琰每奇桓才然知其有不臣之志謂㑹稽王昱曰温不可使居形勢之地其位號常宜抑之通鑑晉紀劉惔曰但恐克蜀之後温終專制朝廷同上王獻之甞與兄徽之操之俱謁謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之晉書本傳何尚之遷吏部郎告休定省傾朝送别及至郡叔度謂曰聞汝來此傾朝相送可㡬客答曰殆數百人叔度笑曰此送吏部郎耳非闗何彦徳也宋書謝𢎞微末甞與友棊友西南棊有死勢復一客曰西南風急或有覆舟者友悟乃救之𢎞微大怒投局于地識者知其暮年之事果以此嵗終南史太尉義恭與義宣書曰往時仲堪假兵靈寶尋害其族孝伯推誠牢之旋踵而敗臧質少無美行弟所具悉今藉西楚之強力圖濟其私凶謀若果恐非池中物也通鑑宋世祖紀蘇湛曰凢謀大事當得天下奇才與之從事今但與長安令博徒謀之此有成理不通鑑梁髙祖紀髙歡謂澄曰景專制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕御也同上李崇國謂游肇曰伯緒即宋維凶疎終傾宋氏若得殺身幸矣通鑑梁紀王晞曰我少年以來閲要人多矣得志少時鮮不顛覆通鑑陳世祖紀傅嘏曰太初志大其量能合虛聲而無實才何平叔言逺而情近好辨而無誠所謂利口覆邦家之人也鄧元茂有為而無終外要利名内無闗鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人者皆將敗家逺之猶恐禍及況眤之乎通鑑魏紀李密狡猾好反今遣之如投魚於泉放虎於山必不反矣通鑑唐髙祖紀盛彦師曰李密聲言向洛實欲出人不意走襄城就張善相耳宻既度陜果踰山南出同上張鎬言許叔冀狡猾多詐臨難必變通鑑唐肅宗紀張九齡言於張説曰宇文融承恩用事辨給多權數不可不備説曰䑕輩何能為融及李林甫彈奏説通鑑唐紀互見患生所忽路巖佐崔鉉於河南為度支使既而入為監察御史不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十巖今已入翰林如何得老皆如鉉言通鑑唐懿宗紀徐曠字文逺博通六經時耆儒沈重講太學授業常千人文逺從之質問曰先生所説紙上語爾若奥境彼有所未見尚何觀焉唐書張昌齡王公謹舉進士皆為王師旦所絀太宗問其故答曰昌齡等華而少實其文浮靡非令器也唐書張昌齡傳元結家瀼濵自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎漫遂顯新唐書本傳裴行儉曰王勃等雖有文華而浮躁淺露豈享爵禄之器耶通鑑唐紀張孝忠曰朱司徒可與共始難與共終也通鑑唐紀盧藏用隠終南山晩乃狥權利司馬承正召至闕下藏用指南山曰此中有大佳處承正徐曰仕宦之捷徑耳藏用慙新唐書本傳互入自紬敗闕岑文本曰馬周鳶肩火色騰上必速恐不能乆唐書本傳傳記慕容垂請至鄴拜墓苻堅許之權翼諫曰垂猶鷹也饑則附人飽則颺去遇風塵之㑹必有凌霄之志唯宜急其羈絆不可任其所欲堅不從晉書載記王敦為太子舍人潘滔見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬晉書載紀集察其志意所望殊髙陳子昻尚不能歴其藩翰況堂奥乎唐文粹言行之間足見真態劉賔客曽臨大道閲浮生來往憧憧利與名二十八年何限客不曽閒見一人行元㣲之集互見奔競吾少時讀醉鄉記私怪隠居者無所累於世而猶有是言豈誠㫖於味耶及讀阮籍陶潛詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顔氏之操瓢與簞曽參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外慕固不暇尚何麴糵之託而昏㝠之逃耶韓文送王含秀才咸陽不留王業已去雖未至於隂陵誰不知其失路李文饒吾今細觀競渡兒何殊當路權相持不知得所各休去㑹到摧舟折楫時薛逢詩本朝面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凢事之不近人情者鮮不為大姦惡老泉辨姦論互見飾偽韓魏公堅請相州上問卿去誰可屬國者金陵何如公曰為翰林學士則有餘處此地則不可後有問公何以識之公曰甞讀金陵答楊忱書窺其心術只為一身不為天下以此知非宰相器遺書仁宗朝王安石知制誥一日賞花釣魚内侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也聞見録富公見張安道曰人固難知也張公曰謂王安石乎亦豈難知者皇祐間方平知貢舉或薦安石有文學宜辟以考校姑從之安石既來一院之事皆欲紛更之方平惡其人檄以出自此未甞與之語也同上陳瓘因朝㑹見蔡京視日乆而不瞬甞以語人曰京之精神如此他日必貴然矜其稟賦敢敵太陽吾恐此人得志必擅私欲無君自肆矣遺事夫好貨天下之賤士也以范蠡之賢豈聚斂積實者何至耕于海濵父子力作以營千畝屢散而復積此何為者豈非才有餘而道不足故功成名遂身退而心終不能自放者乎東坡志林王安石名盛歐陽脩勸蘇洵交遊安石安石亦願交於洵洵曰吾知其人耳是不近人情者鮮不為天下患安石之母死士大夫皆弔之洵獨不往作辨姦論張方平撰蘇洵墓表孟甞君特鷄鳴狗盜之雄耳豈足以言得士不然擅齊之強得一士焉宜可以南面而制秦尚何取鷄鳴狗盜之力哉夫鷄鳴狗盜之出其門此士之所以不至也臨川集韓愈甞有賦矣不過羨二鳥之光榮歎一飽之無時耳推是心使光榮而飽則不復云矣歐公集爵位自髙言盡廢古來何啻萬公卿臨川集温公曰昨㸔三國志識破一事遺令者世所謂遺嘱也必擇𦂳要言語付子孫至纎悉事則或不暇且操身後之事有大於禪代者乎今操之遺令諄諄數百言下至分香賣履之事無不處置詳盡無一語語及禪代之事意謂禪代之事自是子孫所為吾未甞教為之是實以天下遺子孫而身享漢臣之名此遺令之意歴千百年無人識得元城語録蘇明允權書衡論觀其著書之名已非豈有山林逸民立言垂世乃汲汲於用兵如此所見安得不為荆公所薄龜山語録昔者羊叔子見王衍曰誤天下蒼生必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣老泉鄭向知杭州王耿為浙漕互有論列而耿死鄭往哭之甚哀或曰龍圖素惡端公今何慟哭也范拯曰龍圖待哭斯人乆矣張師正倦游録互見暢快嵗寒經晏平仲善與人交乆而敬之語公冶長嵗寒然後知松柏之後彫也語子罕乆要不忘平生之言語憲問史趙午等謀反覺詔捕趙王及羣臣有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髠鉗隨王至長安趙王敖事白得出白明也西漢田叔傳互見髙誼竇嬰失勢諸公引去惟灌夫獨否西漢本傳欒布哭彭越田叔隨張敖西漢欒布傳雖新不改故西漢班婕妤傳主父偃方貴幸時客以千數及族死無一人視獨孔車收焉西漢大將軍日退而驃騎將軍日益貴大將軍故人門下多去事驃騎輒得官爵惟任安不肯同上宋𢎞曰貧賤之交不可忘糟糠之妻不下堂東漢本傳或勸劉備攻劉琮荆州可得備曰劉荆州臨亡託我以孤遺背信自濟吾所不為何面目以見劉荆州乎通鑑漢獻紀梁冀暴固喬尸於城北四衢令有敢臨者加其罪固弟子汝南郭亮尚未冠左提章鉞右秉鐵鎖詣闕上書乞收固尸不報與南陽董班具往臨哭守喪不去夏門亭長呵之曰卿曹何等腐生公犯詔書欲干試有司乎亮曰義之所動豈知性命何為以死相懼邪太后聞之皆赦不誅杜喬故掾陳留楊匡號泣星行到雒陽著故赤幘託為夏門亭吏守䕶尸喪積十二日都官從事執之以聞太后赦之匡因詣闕上書并乞李杜二公骸骨使得歸葬太后許之匡送喬喪還家葬訖行服遂與郭亮董班皆隠匿不仕通鑑漢桓紀吉黄為長陵令時科禁長吏擅去官黄聞司徒趙温薨自以為故吏違科奔喪魏志常林傳互見故吏祖逖有胡奴曰王安逖甚愛之及祖約之誅安嘆曰豈可使祖士稚無後乎乃往就事觀刑逖庻子道重始十嵗安竊取以歸匿之變服為沙門通鑑晉元紀韓愈史𢎞通與人交榮瘁不易唐敬宗實録唐魏元同與裴炎締交能保終始故號耐乆朋唐書嚴挺之重交游生死不易同上集春蘭兮秋菊長絶無兮終古楚辭風雨急而不絶其音霜露零而不渝其色斯賢達之素交歴萬古而一遇文選廣絶交論諸葛亮曰士之相知温不増華寒不改葉貫四時而不衰歴夷險而益固見蓺文粹聚貴賤結交心不移惟有嚴陵及光武李白集升沉不改故人情韋應物集却羨淮南好鷄犬也能終始逐劉安羅隠集肯蹋衡門草唯應是友生劉賔客松筠寒不變膠漆冷彌堅始信淡交宜乆逺與君轉老轉相親同上還有昔時巢燕在飛來飛去畫堂中髙達夫淡交終不散孤達晩相宜鄭守愚我蟠濁泥君躡青雲不以升沉塹隔其間孫可之文嵗晩心誰在青青見此君劉長卿迴㸔後彫色青翠有松筠孟浩然惟有舊巢燕主人貧亦歸唐于凟詩本朝鶯猶求舊友燕不負貧家臨川集惟有南山與君眼相逢不改舊時青范諷詩見倦游録寒心未肯隨春態坡詩炎涼經簡賢附勢書仲虺之誥注賢而無勢則略之不賢有勢則附之史汲鄭之賢有勢則賔客十倍無勢則否況衆人乎翟公為廷尉賔客填門及廢門外可設雀羅翟公復為廷尉賔客欲往翟公乃大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見汲鄭亦云悲夫史記汲鄭贊當其貧困時人莫肯視至貴也乃爭附之史記滑稽傳中東方先生傳主父偃當路諸公皆譽之及名敗身誅士爭言其惡史記蘇秦曰此一人之身富貴則親戚懼之貧則輕易之況衆人乎史記本傳鄭當時與汲黯列為九卿兩人中廢賔客益落西漢本傳司馬相如與卓文君馳歸成都家徒四壁立卓王孫大怒曰女不才我不忍殺一錢不分也王孫恥之杜門不出後數嵗相如為中郎將至蜀太守已下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫因門下獻牛酒以交驩喟然而嘆自以得使女尚司馬長卿晩同上温舒多諂善事權貴無埶者視之如奴有埶家雖有姦如山弗犯無埶雖貴戚必侵辱西漢王温舒傳大將軍日退而驃騎日益貴大將軍故人門下多去事驃騎輒得官爵西漢王獻之兄弟自郄超未死見愔常躡履問訊甚修舅甥之禮及超死見愔慢怠屣而候之晉書郄超傳愔超父也殷浩作豫章定省送别者甚衆及廢徙東陽船泊征虜亭積日親舊無復相窺者宋書傳記迎新千里逺送故不出門東觀漢記蘇秦曰貧窮則父母不子富貴則親戚畏懼戰國策集春榮誰不慕嵗寒良獨難潘安仁金谷詩富貴他人合貧賤親戚離曹顔逺詩廉公失權勢門館有虛盈貴賤猶如此況乃曲池平髙車塵未滅珠履故餘聲賔堦緑錢滿客位紫苔生沈休文詩勢之所集從之如歸市勢之所去棄之如脱遺李蕭逺論大抵當隆赫柄用而蜂附蟻合煦煦趄趄便辟匍匐非乎人而售乎已一旦勢異則電滅飇逝不為門下用矣栁宗元與顧十郎文今之交乎人炎而附寒而棄栁文勢要情所重排斥則埃塵未免骨肉然何況四海人韓詩凢今之交視勢厚薄同上左降去時裴相宅舊來車馬㡬人過元㣲之集人情厚薄苦須臾昔在連環今在玦連環可碎不可移如何物在人自絶韋應物昔日洛陽社貧窮相持攜今日長安道對面隔雲泥白侍郎互見有始無終富貴家人重貧賤妻子欺同上憶昔未出身自賤如埃塵君今纔出身自重如千鈞君今自世情何況天下人姚少監萬世金石交一晌如浮雲盧仝合如市道㢘公之門客虛盈勢迨雀羅廷尉之交情貴賤張九齡文世人交結違寒集温孫可之黄金銷鑠素絲變一貴一賤交情見駱賔王本以勢利交勢盡交情已唐文粹互入市交始若膠附終若冰拆陸魯望花開蝶滿枝花謝蝶還稀唐于凟本朝蓋士方窮時困厄閭里庸人皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦髙車駟馬旗旄導前而騎卒擁後夾道之人相與駢肩累迹瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以自悔罪於車塵馬足之間歐公晝錦堂互見人生罔測昔者在貧賤之辱所有無以異於今一朝居豪傑之先而人然後知其貴東坡答許狀元啟乗衰傳記周伯仁好乗人之弊世説中集陷阱不一引手反擠之又下石焉韓文本朝楊文公億為執政所忌言事者攻之不已公曰已擠溝壑猶下石而不休方困蒺藜尚關弓而相射青箱記互見憂禍始終不渝經終始如一書仲虺之誥有始有卒者其惟聖人乎語子張史叔孫所館者雖一日必葺其牆屋去之如始至左昭二十二年㐲湛髫髪厲志白首不衰東漢本傳武侯所至營壘井竈厠溷藩籬障塞皆應繩墨一月之行去之如始至蜀志注終始一操雖頽嵩岱不吾壓也唐忠義傳序集生以貞兮死以㓗唐文粹本朝范文正公自出守時有三婢至二府不増一人遺事有始無終經凢人未見聖若不克見既見聖亦不克由聖書君陳注凢人有始無終將恐將懼惟予于女將安將樂女轉棄予詩谷風互見急時抱佛門將恐將懼寘予于懐將安將樂棄予如遺同上互見同上昔育恐育鞠及爾顛覆既生既育比予于毒同上於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿於我乎每食四簋今也每食不飽于嗟乎不承權輿詩彼求我則如不我得執我仇仇亦不我力詩正月互入有名無實靡不有初鮮克有終詩蕩史耳餘始居約時相然信及據國爭權卒相滅亡何向者慕用之誠後相背之盩也漢張耳陳餘傳贊徳宗在危難時聴贄謀及己平追仇盡言怫然以讒幸逐猶棄梗唐書陸贄傳贊魏徴上疏以為陛下志業比貞觀之初漸不克終者凢十條通鑑唐太宗紀有言魏徴自録前後諫辭以示起居郎褚遂良者上愈不悦乃罷叔玉尚主而踣所撰碑同上互見信䜛集感平生之遊處若壎篪之相須何今日之兩絶若秦越之異區禰正平賦靡不春華鮮克嵗寒潘岳誄魯武公小人槿花心朝在夕不存孟東野中書君老而秃不任吾用吾甞謂君中書而今不中書耶因不復召韓文毛頴傳員既霸吳钃鏤賜斯既帝秦五刑具長平威振杜郵死垓下敵擒鍾室誅皆用盡身賤功成禍歸劉賔客棄我忽若遺郭泰機答傅咸曩者膠漆契邇來雲雨暌白樂天初則許之以死狥體面俱柔終乃背之而飽飛身名已遂張九齡互見傾險昔年洛陽社貧賤相提攜今日長安道對面隔雲泥唐文粹互見炎涼種徳經積善之家必有餘慶易坤卦互見善良徳垂後裔書微子之命子孫其逢吉書洪範與國咸休永世無窮書微子之命世世享徳同上臯陶邁種徳書大禹謨聿修厥徳詩大雅文王之篇克昌厥後詩保艾爾後詩南山有臺克開厥後詩武錫兹祉福恵我無疆詩周頌烈文子澤及三族而況父母乎莊子徐無鬼積厚者流澤廣荀子禮論史陳侯筮敬仲曰非此其身在其子孫光逺而自他有耀者也初懿氏卜妻敬仲其妻占之曰有媯之後將育于姜五世其昌並于正卿八世之後莫之與京左莊二十二年故襲天禄子孫賴之左昭二十年伍員曰樹徳莫如滋左哀元年盛徳必百世祀左傳太史公曰燕崎嶇彊國之間最為弱小㡬滅者數矣然社稷血食者八九百嵗於姬姓獨後亡豈非召公之烈耶史記盛徳之後必百世祀同上陳世家慶流苖裔前漢蕭何傳宜蒙福祐子孫千億之報漢書哀紀燕齊之祀與周並傳子繼弟及歴載不墮豈無刑辟繇祖之竭力故支庶賴焉西漢高功臣表于公曰我治獄有隂徳未甞有所寃子孫必有興者至定國為丞相永為御史大夫封侯傳世西漢于定國傳積徳累善十餘世西漢婁敬傳鄧禹曰吾將百萬之衆未甞妄殺一人後必有興者其後鄧氏自中興後累世寵貴後漢子孫傳承後祚無疆唐魏徴傳郭子儀子孫多以功名顯蓋盛徳後唐書傳記有隂徳者必享其榮以及其子孫説苑復恩篇集貽祉復集陳子昻千秋萬嵗祚祉無疆同上吾知徐公百不憂積善衮衮生公侯杜詩房氏二相厥家以聞條葉被澤況公其孫韓集善積家肥子孫多材如彼榱棟必生徂徠劉賔客粹氣紆餘鍾于後昆錫羨後大之祥種徳而邁乃生令子並同上仗順積善宜鍾慶於子孫白樂天陸公餘徳機雲在杜牧之積厚昌大唐文粹本朝種徳之深稼而必穡發源之逺流則愈長欒城集休嘉垂延燕及于後臨川集篤行有聞信於鄉國懐道不試遺其子孫東坡贈司馬光曽祖制魏公之業與槐俱萌封殖之勤必世乃成既相真宗四方底平歸視其家槐隂滿庭東坡三槐堂記稔惡經過涉滅頂凶易大過驕淫矜誇將由惡終書畢命元惡大憝書康誥愍不畏死同上天吏逸徳烈于猛火書𦙍征穢徳彰聞書泰誓凶人為不善亦惟日不足商罪貫盈同上方茂爾惡詩變小雅節南山史鄭莊公之弟叔段姜氏愛之祭仲使圖之莊公曰多行不義必自斃子姑待之既而叔段命西鄙北鄙貳於己公子吕請除之公曰無庸將自及太叔又收貳以為己邑子封曰厚將得衆公曰不義不暱厚將崩左隱元年復惡已甚左桓十七年長惡不悛左傳天奪之鑒而益其疾不可以五稔左僖二年此三族也世濟其凶増其惡名左文十八年天之假助不善非祚之也厚其凶惡而降之罸也左昭十八年左師曰縱之使盈其罪重而無基能無敝乎左哀二十六年季氏之惡已熟前漢五行志於易一為過再為涉三而弗改滅其頂凶通鑑漢獻紀竇憲姦惡貫天達地通鑑漢和紀夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脱重梏夕還囹圄嚴明令尹不能使其㫁絶東漢王符傳互入天姿素惡譬如猘狗或能噬人通鑑漢和紀桓温曰男子縱不能流芳百世亦當遺臭萬年晉書杜絶言路掩蔽聰明以成其姦妬賢嫉能排抑勝己以保其位通鑑唐元宗紀集未革狼心仍懐豕突駱賔王未悟傾巢之兆敢懐拒轍之心同上惡稔禍盈親離衆叛人神共棄天地不容白樂天本朝袁紹以十倍之衆大敗於官渡僅以身免而操斂兵不追者何也所以緩紹而亂其國也東坡集善良經積善之家必有餘慶易坤卦互見種徳吉人為善惟日不足書泰誓宗族稱孝焉鄉黨稱弟焉論語子路善人為邦百年亦可以勝殘去殺矣論語子路子天道無親常與善人老子知大怨章史善人天地之紀也左成十五年東平王曰為善最樂後漢本傳馬援曰吾從弟少游曰士生一世但長取衣食裁足乗下澤車御欵段馬為郡掾吏守墳墓鄉里稱善人斯可矣本傳互見易足洗心向善東漢郭太傳良善與人無讎魏志集人而好善雖福未至禍其逺矣徐幹中論云豪彊史三郤族大多怨去大族不逼敵多怨有庸公曰然左成十七年子皮授子産政子産曰族大多寵不可為也左襄三十年羊舌四族皆彊家也左昭五年甯成抵罪歸家持吏短長史記本傳濟南􅗎氏族人三百餘家豪滑二千石莫能制史記郅都傳家富勢足目指氣使西漢貢禹傳田儋弟榮横皆豪傑宗彊能得人西漢本傳班氏逺祖以財雄北邊西漢班固自叙以多財為邊地之雄豪僮僕千指富埓王者西漢班固自叙豪強之徒武斷鄉曲西漢食貨志師古曰恃其饒富則擅行威罰也圉奪成家者為雄傑同上師古曰圉謂禁守人摶掩成富西漢食貨志豪植大強西漢賈誼傳甯成抵罪歸家威重於郡守西漢本傳強者怨之歸也東漢臧宫傳其并兼者則陵横邦邑桀健者則雄張閭里東漢酷吏傳集乗時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌左太沖吳都賦豪家乗勢相扇元㣲之集權勢史灌夫陂池田園宗族賔客為權利横於潁川史記本傳田蚡為相薦人或起家至二千石權移主上上曰君除吏盡未朕亦欲除吏田蚡治第宅甲諸第田園極膏腴市買郡縣器物相屬於道前堂羅鍾鼓立曲旃後房婦女以百數諸侯奉金玉狗馬玩好不可勝數同上熏灼四方西漢班固叙傳公卿以下畏石顯重足斂迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位通鑑漢元紀五人同日封故世謂之五侯通鑑漢成紀代相陳豨從車千乗而吳濞淮南皆招賔客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳譽於閭閻權行州域力折公侯通鑑漢武紀丁傅董賢用事諸附離者或起家至二千石西漢揚雄傳列國公子魏有信陵趙有平原齊有孟甞楚有春申皆藉王公之勢競為游俠通鑑漢武紀黨親連體根據於朝廷通鑑漢宣紀其四方調發嵗時貢獻皆先輸上第於冀乗輿乃其次焉吏民齎貨求官請罪者道路相望百官遷召皆先到冀門牋檄謝恩然後敢詣尚書通鑑漢桓紀黄門常侍及中使伯榮往來甘陵上威儀翕赫震動郡縣王侯二千石至為伯榮獨拜車下通鑑漢殤紀四侯專行天下為之語曰左回天貝獨坐徐臥虎唐兩墮通鑑漢桓紀李固曰中常侍在日月之側聲勢振天下通鑑東漢手握王爵口含天憲運掌則使餓吏富於季孫呼噏則令伊顔化為桀跖東漢朱惲傳指撝足以震風雨叱咤可以興雷電東漢皇甫嵩傳埶家多所宜咳唾自成珠被褐懐金玉蘭蕙化為芻東漢趙壹傳問起居者車如流水馬如游龍東漢皇后紀帝以恵琳道人善談論因與議朝廷大事遂參權要賔客輻輳門常有車數十兩四方贈賂相係方筵七八座上賞酒琳着髙屐披貂裘置通呈書佐㑹稽孔顗詣之遇賔客填咽暄涼而已顗慨然曰遂有黒衣宰相可謂冠屨失所矣通鑑南史宋髙祖紀忤意者嚴霜夏零阿㫖者膏雨冬㴻榮枯由其唇吻廢興候其指麾通鑑隋髙紀竇霍勢傾中外藩鎮將帥多出神策軍臺省清要亦有出其門者矣通鑑唐徳宗紀楊國忠相攘袂扼腕公卿以下頥指氣使莫不震慴通鑑唐紀劉晏任職乆勢軋宰相要官華使多出其門唐書本傳自江淮茗橘珍菓常與本道分獻競欲先至雖封山㫁道以禁前發晏厚貲致之常冠諸府唐書劉晏傳士之浮競甘進者爭出其門赫然勢燄可炙唐書韋渠牟傳當其黨盛門若沸羮唐書王伾傳楊虞卿性柔善諧麗權倖倚為姦利嵗舉選者走門下無不得所欲升沉在牙頰間唐書慕容超時公孫五樓為侍中内外無不憚之王儼諂事五樓時人語曰欲得侯事五樓晉書互入趨時天憲在口勢迴日月舊唐書盧把為相朋附者咳唾立至青雲睚眦者回盻已擠溝壑唐書桑維翰權勢既盛四方賂遺嵗積鉅萬五代晉史舉動回山海呼吸變霜露范蔚宗官者論阿㫖曲求則光寵三族直情忤意則慘夷五宗同上傳記事非權不立非勢不成戰國策集俛仰生榮華咄嗟復彫枯左太沖詠史詩冠蓋輻輳衣裳雲合輜軿擊轊坐客恒滿蹈其閫閾若升闕里之堂入其奥隅謂登龍門之阪文選叙温燠則寒谷成暄論嚴苦則春叢零葉飛沈出其頋指辱榮定其一言文選絶交論寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐𠻳興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼文選劉孝標絶交論服軒乘冕出於言笑之下選恩幸傳論所愛光五宗所惡滅三族陳琳檄冠帶交錯方圓接軫文選張平子西京賦宗黨生光華賔僕逺傾慕選詩況聞内金盤盡在衛霍室杜詩掌握有權柄衣馬日肥輕同上聲馳而響溢風震而影靡可使尺澤之鯢奮鱗而縱海密網之鳥舉羽而翔霄栁文轉盻生光輝唐文粹權傾一國聲振八紘同上本朝吹嘘死灰生氣燄談笑暖律回嚴凝歐公集恃勢經依勢作威倚法以削書君陳席寵惟舊怙侈滅義書畢命季子臯葬其妻犯人之禾申詳以告曰請更之子臯曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也記檀弓史以寵賈怨國語夫郤昭子其富半公室其家半三軍恃其富寵以汰于國其身尸於朝其宗滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無徳也國語互見勢不可恃武安負貴而好權史記灌夫等論傳田蚡為丞相召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓西漢田蚡傳互見陵犯籍倚名族西漢項籍傳恃勢怙寵後漢怙寵矜功前漢竇憲恃宫掖聲勢以賤直請奪沁水公主園田公主逼畏不敢計通鑑漢明帝紀乆依城社不畏熏燒東漢盧延傳城狐社䑕通鑑晉紀杜威乆鎮恒州性貪殘自恃貴戚多不法每以備邊為名斂吏民錢帛以充私藏富室有珍貨或名姝駿馬皆奪取之或誣以罪殺之籍沒其家通鑑五代晉髙祖紀魏宗愛方用事威振四方甞召百官於都坐王公以下皆趨庭望拜通鑑宋世祖紀江表自東晉以來世族陵駕寒門通鑑隋髙紀來俊臣倚勢貪淫士民妻妾有美者百方取之自宰相已下籍其姓名而取之通鑑唐武后紀山東人士崔盧李鄭諸族好自矜地望雖累葉陵替茍他族欲與為姻必多責財幣或捨其鄉里而妄稱名族或兄弟齊列而更以妻族相陵通鑑唐太宗紀虢國尤為豪蕩一旦帥工突入韋嗣立宅撤去舊屋自為新第但授韋氏以隙地十畝而已通鑑唐𤣥宗紀故事諸宰相㑹食中書丞相食時百僚無敢謁者叔文至中書欲與同平章事韋執誼計事令直省通之直省以舊事告叔文怒叱直省懼入白執誼通鑑傳記三貴瞋目張權有噉人勢三國典略集馮藉世資用相陵駕選恩倖論䑕憑社貴狐藉虎威同上夫傲雖凶徳必有恃而敢行韓文釋言互入傲慢廣勢馳聲劉賔客席其勢鼓行人間同上驅駕氣勢若掀雷挾電抉於天地之垠唐文粹本朝依倚秋風氣勢豪似欺黄雀在蓬蒿歐公集勢利相軋經脅權相滅書泰誓中強者脅弱衆者暴寡知者詐愚勇者苦怯記樂記子名也者相軋也莊子人間世以強陵弱以衆暴寡皆亂人之徒也莊子盜跖強以克弱韓非子強者害弱而奪之衆者暴寡而譁之荀子性惡猛獸食顓善鷙鳥攫老弱淮南子強掩弱衆暴寡詐欺愚勇侵怯同上鷄有專栖之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳抱朴子史天下以智力相雄長通鑑周紀衆暴寡大并小西漢天文志孔熈先曰近者殷鐵一言而劉班碎首彼豈父兄之讎百世之怨乎所爭不過榮名勢利先後之間耳及其末也唯恐陷之不深發之不早戮及百舌猶曰未厭是可為寒心通鑑宋太祖紀張𢎞策曰一國三公猶不堪説六貴同朝勢必相圖通鑑齊東昏侯記永元元年時徐孝嗣蕭坦之等交専政也江左自東晉以來世族陵駕寒門通鑑陳紀天后方圖臨朝乃鴆殺太子𢎞立雍王賢賢自知必不保全與二弟無由敢言乃作黄臺瓜詞賢終為后所逐死黔中唐書互相吞噬唯力是視通鑑唐僖宗紀集傾奪相誇侈不知身所終陳子昻弱之肉強之食韓文送文暢序暴寡脅弱栁文力大者搏齒利者齧爪剛者抉羣衆者軋栁文真符爭先利塗虞相軋則釁起劉賔客重厚經君子厚徳載物易坤卦不侵侮不好狎記曲禮天地之道博也厚也記中庸大人不倡游言浮也記緇衣趙文子其中退然如不勝衣其言呐呐然如不出諸口記檀弓下不窺密不旁狎不道舊故不戲色記少儀其徳盛者其志厚記祭統及其廣厚載華岳而不重振河海而不洩記中庸言忠信行篤敬雖蠻貊之邦行矣語衛靈公子水之積也不厚則其負大舟也無力風之積也不厚則負大翼也無力莊子言重則有法行重則有徳貌重則有威好重則有觀揚子脩身史唯厚徳者能受多福國語晉互見福祉周勃厚重少文通鑑漢髙紀絳侯東陽侯稱為長者言事曽不能出口西漢張釋之傳互入長厚李將軍恂恂如凢人口不能出辭前漢李廣贊為人質厚少文造次不能以辭自達東漢吳漢傳李栖筠莊重寡言唐書本傳元徳秀實厚少縁飾唐書卓行本傳互見務實集掘剞劂而不用楚辭言詞純朴古人風韋應物集輕薄經其徳薄者其志輕記祭統言不忠信行不篤敬雖州里行乎哉語衛靈公子鄉曲之儇子荀子言輕則招憂行輕則招辜貌輕則招辱好輕則招淫揚子修身史輕則寡謀左桓十二年輕慮者不可以治國史記蒙恬傳商君天姿刻薄人也史記魏其沾沾自喜多易同上本傳沾沾言自整碩也多易多輕易之行世俗靡薄董仲舒傳馬援戒子孫曰效杜季良不得陷為天下輕薄子東漢本傳暨􅃩多揚人暗昧之失以顯其謫通鑑三國魏明紀魏收昔在京洛輕薄尤甚人號云魏收驚蛺蝶北史本傳王勃等有才而浮躁衒露唐裴行儉傳張昌齡舉進士為考功王師旦所絀太宗問其故答曰昌齡等華而少實其文浮靡非令器也取之則後生慕効亂陛下風雅新唐書杜審言傳韋渠牟志尚浮淺不根於道徳仁義本傳崔信明蹇亢以門望自髙鄭世翼亦傲倨數恌輕忤物崔信明傳傳記牆薄則亟壊繒薄則亟裂器薄則亟毀酒薄則亟酸夫薄物可以曠日持乆者殆未有也劉向新傳梁遣徐陵聘齊時魏收文學為北朝之冠録其文遺陵陵過江沉之曰吾與魏公藏拙唐裴餗傳記長者經徳盛不狎侮書旅熬不侵侮不好狎記曲禮上不窺密嫌伺人之私也記少儀君子不以其所能者病人不以人之所不能者愧人記表記惡稱人之惡者語陽貨君子嘉善而矜不能語子張君子成人之美不成人之惡語顔淵不逆詐不億不信語憲問史壺遂深中隠厚世言梁多長者不虛哉史記韓安國傳論將相皆舊功臣論議務在寛厚恥言人之過失西漢刑法志鄭當時每朝候上問説未甞不言天下長者西漢本傳記人之功忘人之過西漢陳湯傳絳侯東陽侯稱為長者言事曽不能出口西漢張釋之傳互入重厚多所平反罪人西漢劉徳傳蘇林曰幡罪人辭使從輕也曹參為相擇木訥於文辭重厚者召之為吏吏之言文刻深欲務聲名者輒斥去之前漢張歐為御史未甞言按人官屬以為長者西漢本傳馬援曰聞人過失如聞父母之名耳可得聞口不得言也同上詔問劉昆曰前在江陵反風滅火後守𢎞農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆笑其質訥帝嘆曰此乃長者之言也東漢劉昆傳厚性寛中東漢卓茂傳劉寛為太尉甞坐客遣蒼頭市酒迂乆大醉而還客不堪之罵曰畜産寛須臾遣人視奴疑必自殺顧左右曰此人也罵畜産辱孰甚焉故吾懼其死也後漢忠孝之人持心近厚東漢韋彪傳阮籍口不臧否人物晉書本傳羅仇曰寧使人負我我不忍負人也通鑑晉紀什翼犍性寛厚郎中令許謙盜絹二疋什翼犍知而匿之謂左太史燕鳳曰吾不忍視謙之面卿慎勿泄若謙慙而自殺是吾以財殺士也通鑑晉海西公紀謝方明為丹陽尹方明善治郡所至有能名承代前人不易其政必當改者則以漸移變不使有迹可尋通鑑晉恭紀互入交代樂廣凢論人必先稱其所長則所短不言自見通鑑晉本傳有老嫗欲詣劉仁軌陳牒誤詣戴至徳覽之未終嫗曰本謂是解事僕射乃不解事僕射耶歸我牒至徳笑而授之時人稱其長者通鑑高宗寧人負我無我負人通鑑唐徳宗互見自責房𤣥齡不以己長望人唐書本傳賈耽長者不喜臧否人物同上朱渥性通簡不驕飾甞曰士茍有行不必己長形彼短己清形彼濁唐書傳記孔子曰與人交推其長者違其短者説苑雜言厚者不毀人以自益仁者不危人以要名戰國策集不吹毛而求小疵不洗垢而察難知文選持論從容未甞言人所短仕彦昇序深識臧否不以毀譽形言褚淵碑許逺寛厚長者貌如其言韓文張中丞傳後叙致一物於必窮之地君子不為杜牧之互見不為己甚本朝臧否不掛口坡詩韓魏公器量過人性渾厚不為畦畛峭塹行狀以快恩讎矜名譽為可薄歐公集不忽㣲小附㣲小難忽經惟公懋徳克勤小物書畢命在上位不陵下記中庸子夏曰雖小道必有可觀者焉語子張子范氏門徒路逢乞兒馬醫弗敢辱也必下車而揖之列子史臧文仲曰國無小不可易也君其無謂邾小蠭蠆有毒左僖詩曰雖有絲麻無棄菅蒯左成九逸詩薳啟疆曰恥匹夫不可以無備左昭公二年君子能勤小物故無大患通鑑周紀蚋蟻䗦蠆皆能害人同上田琳曰諺稱掩目捕雀夫㣲物尚不可欺以得志況大事乎通鑑漢獻紀芻蕘有可録之事晉書黄犬之皮終補狐裘也晉書慕容超傳郄超曰謝𤣥使才雖履屣間亦得其任晉書謝𤣥傳互入精明傳記芻蕘之言明王必擇葑菲之體詩人所記史通鷄肋是棄能無惜乎同上敵國無小蜂蠆有毒鳥窮則啄獸窮猶觸者皆自衛其生命而求免於禍難也李衛公兵法集不棄菅蒯愛同絲麻任彦昇表刻深經析言破律巧賣法令記史公曰言多忌克忌則多怨又焉能克左僖九年陗直刻深西漢晁錯傳於人之功無所記於人之罪無所忘西漢酈食其傳以刻為明西漢路温舒傳吹毛求疵西漢中山真王傳周亞夫曰極知禹無害然文深不可以居大府西漢趙禹傳張湯趙禹共定諸律令務在深文拘守職之吏作見知法吏傳相監司用法益刻自此始通鑑漢武紀上下相敺以刻為明深者獲公名平者多後患通鑑漢宣紀性刻害好發人隂伏同上翟方進以經術進其為吏用法刻深好任勢立威有所忌惡峻文深詆中傷甚多通鑑漢成紀申韓刻薄傷化通鑑元帝集史叙項籍之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不屬國但聞人過終身不忘陸宣公文殘忍經焚炙忠良刳剔孕婦書泰誓上斮朝涉之脛剖賢人之心書泰誓中子盜跖膾人肝而餔之莊子逮至夏桀殷紂燔生人辜諫者為炮烙鑄金柱剖賢人之心折才士之脛醢九侯之肉爼梅伯之骸淮南子淑真訓篇紂觀炮烙於瑤臺謂龍逢曰樂乎莊子史蠭目而豺聲忍人也左文莒子庚輿虐而好劍茍鑄劍必試諸人左傳紂醢九侯剖比干心史記本紀吕太后㫁戚夫人手足去眼煇耳飲瘖藥使居厠中命曰人彘史記吕后紀吳起事魯齊人攻魯魯欲將吳起起取齊女起欲就名遂殺其妻以明不與齊也魯卒以為將魯人或惡起起殺其謗己者三十餘人出衛聞其母死起終不歸史記本傳項羽攻襄城無噍類史記孫皓剥人之面鑿人之眼吳志赫連勃勃性驕虐視民如草芥常居城上置弓劍於側有所嫌忿手自殺之羣臣迕視者鑿其目笑者決其唇諫者先截其舌而後斬之通鑑晉恭紀宋蒼梧王一日不殺則慘然不樂通鑑宋紀夏王勃勃以叱千阿利領將作大匠阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之射甲不入則斬弓人入則斬甲匠通鑑晉安紀賈妃性酷虐甞手殺數人或以㦸擲孕妾子隨刃墮地晉書本傳苻生錘鉗鋸鑿可以害人之具備置左右即位未㡬后妃公卿以下至于僕隷凢殺五百餘人截脛拉脅鋸項刳胎者比比有之通鑑晉哀紀自去春以來潼闗之西至于長安虎狼為暴凢殺七百餘人秦羣臣奏請禳災苻生曰野獸饑則食人飽當自止何禳之有且天豈不愛民而正以犯罪者多故助朕殺之耳晉哀齊定州刺史南陽王綽喜為殘虐甞出行見婦人抱兒奪以飼狗婦人號泣綽怒以兒血塗婦人縱狗使食之齊主聞之鎖詣行在問在州何事最樂對曰多聚蠍於皿器置狙其中觀之極樂帝即命夜索蠍一斗比曉得二三升置浴斛使人祼臥斛中號叫宛轉帝與綽臨觀喜噱不已因讓綽曰如此樂事何不早馳驛奏聞通鑑陳紀盧把小忤己不傅死地不止唐書武后遣人杖王皇后蕭淑妃各一百㫁去手足投酒瓮中曰二嫗骨醉數日而死又斬之通鑑唐高宗紀則天當其忍㫁雖甚愛不少忍唐書趙思綰好食人肝常面剖而膾之膾盡人未死又好以酒吞人膽謂人曰吞此千枚則可以無敵矣及長安城中食盡取婦人幼稚為軍糧日計數而給之每犒軍輒屠數百人如羊豕法通鑑五代漢隠帝紀傳記宋康王為無頭之冠戰國䇿樂羊為魏文侯將而攻中山其子在中山中山繫其子示之樂羊攻愈急中山烹其子而遺之羮樂羊啜之盡一盃中山見其誠也不忍與之戰果下之文侯賞其功而疑其心説苑亦見戰國策石虎裝飾宫人美淑者斬其首澆血置盤上傳首視之又内諸比丘有姿色者與之䙝後殺之合牛羊肉煮而食亦賜左右所以識其味也崔鴻十六國春秋集雄虺九首吞人以益其心楚辭虎豹九關啄害下人文選招䰟血人于牙不肯吐口韓文元和詩已甚經既破我斧又缺我斨詩破斧人而不仁疾之已甚亂也論語子段干木踰垣而辟之泄栁閉門而不内是皆已甚孟子互見沽名史不為末減左昭十四年趙廣漢疑丞相夫人殺侍婢乃將吏卒入丞相府召夫人跪庭下受辭收奴婢十餘人通鑑漢宣紀以苛為察以刻為明前漢宣紀黨人歸田里書名三府禁錮終身通鑑漢靈紀蹊田之牛奪之已甚後漢皇后紀老成經人惟求舊書盤庚惟公􅅷徳弼亮四世書畢命詢兹黄髪則罔所愆書泰誓番番良士旅力既愆同上方叔元老克壯其猶詩采芑召彼故老詩正月子非謂有喬木之謂也有世臣之謂也孟年彌髙而徳彌劭揚子史古之人謀黄髪畨畨則無所過史記秦紀楊騖歴事四朝年耆望重自太宰恪以下皆拜之通鑑晉海西公紀集皤皤國老班孟堅賦蒼眉皓髯山立時行劉賔客華髪皤皤唐吕温作李靖贊膚未鷄髪未鶴然其心甚老唐文粹本朝元老在位邦之榮華徒以精神折衝非以筋力為禮東坡賜韓絳不允致仕詔古之世臣譬之喬木粤自拱把至于棟梁傑然羣才之中夫豈一日之力東坡以衛武之年踐吕尚之位安然無作則功名自隆黙然無言則卿尹自化當以至靜之徳坐鎮羣動之樞蘇子由文彦博乞致仕不允批答遍閲後生真有道欲談前事恐無人蘇子由送文太師致仕諳練經闕子闕史晉侯在外十九年矣險阻艱難備甞之矣民之情偽盡知之矣左僖三十八年春秋髙閲天下之義理多矣史記漢文紀素宦於朝西漢鄒陽傳時朝廷無故典又少舊臣侯霸明習故事收録遺文條奏前世善政法度施行之通鑑漢光武紀胡廣練達事體明解條章東漢本傳張純在朝歴世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟冠昏喪祀禮儀多所證定東漢本傳黄瓊昔隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪通鑑漢殤紀前世難易靡所不甞通鑑魏明紀刁協乆官中朝諳練舊事賀循為世儒宗明習禮學凢有疑議皆取決焉通鑑東晉元帝王僧綽幼有大成之度衆以國器許之好學有思理練悉朝典通鑑宋太祖紀王儉自晉宋以來故事無不諳憶通鑑齊太祖紀年長識髙故知有夷險通鑑齊紀乆處朝廷諳練事體通鑑唐憲宗李晟曰吾生長西陲備諳敵情通鑑唐徳宗紀蘇瓌明曉法令多識臺省舊章律條格式皆所删正唐書齊澣為中書舍人朝廷大政必咨之時號解事舍人同上本朝木經霜雪根無蠧蘇子由集松老知經㡬度霜同上身閒閲世故山谷不知艱難經生則逸不知稼穡之艱難不聞小人之勞書無逸子魯哀公曰寡人生於深宫之中長於婦人之手未甞知哀未甞知憂未甞知勞未甞知懼家語史公聚朽蠧而三老凍餒道殣相望而女富溢尤左昭三年生長脂腴不知稼穡東漢公孫瓚記周顗曰君少年未更事晉書本傳晉惠帝時天下荒亂百姓餓死帝曰何不食肉糜晉書陜民訴旱觀察使崔蕘指庭樹曰此尚有葉何旱之有通鑑唐憲宗紀本朝妓圍那解思寒谷劉後山詩一曲髙歌一束綾美人猶自意嫌輕誰知織女寒牕下㡬度抛梭織得成冦萊公詩誠實經庸言之信庸行之謹易乾卦閑邪存其誠同上秉心塞淵詩定之方中所謂誠其意者毋自欺也記大學至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以與天地參記中庸惟天下至誠為能化誠者非自成已而已也所以成物也誠者不勉而中不思而得從容中道誠則明矣至誠之道可以前知故至誠如神至誠無息不息則久久則徵徵則悠逺悠逺則博厚博厚則髙明惟天下至誠為能經綸天下之大經立天下之大本並同上子至誠通於金石家語其誠可比於金石荀大略誠者君子之所守政事之本也荀不茍史王陵讓陳平絳侯曰始與髙帝啑血盟諸君不在耶今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約何面目見先帝於地下乎通鑑漢髙后紀衛綰忠實無他腸西漢本傳蕭王推赤心置人腹中後漢光武紀精神所加金玉為開東漢廣陵思王記闗公嘆曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾雖不留要當立效以報曹公乃去矣通鑑漢獻紀我要自當以信待人但人不當負我耳我豈可先人生心哉通鑑魏元紀明山賔貨所乗牛謂買主曰此牛經患漏蹄療瘥已乆恐後脱發南史帝曰叔寶全無心肝通鑑隋髙祖紀旱詔文武官極言得失常何武人不學不知所言馬周代之陳便宜二十餘條上怪其能以問何對曰此非臣所能家客馬周為臣具草耳通鑑唐太宗紀郭元振曰吾以誠心待人何所疑懼通鑑唐中宗紀張萬福聞諫官伏閣諫趨往至延英門大言賀朝廷有直臣天下必太平矣遂遍拜城仲舒等已而連呼太平萬歳萬福武人年八十餘自此名重天下通鑑唐徳宗紀巧不足而諒有餘新唐書集誠恕既敷鉤鉅靡用齊故安陸碑本朝莊綺不加語黄魯直心豁豁不置牆帷臨川集互入暴白温公甞問邵康節曰光如何人康節曰君實脚踏實地人也聞見録劉安世從温公學者數年一日避席問盡心行己之要可以終身行之者温公曰其誠乎安世問公行之何先温公曰自不妄語始三朝言行録金玉比誠心蘇子由集晁無咎言司馬温公有言吾無過人者但平生所為未甞有不可對人言者東坡文悃愊無華真漢吏東坡詩皮毛剥落盡惟有真實在陳後山詩韓魏公進立于朝與士大夫語退息于家與家人言一出乎誠言行録明道先生之學以誠為本同上暴白經今予其敷心腹腎腸盤庚周道如砥其直如矢君子所履小人所視詩大東公事無私議記曲禮上君子之過也如日月之食焉過也人皆見之更也人皆仰之語子張丘也幸茍有過人必知之語述而子賢者以其昭昭使人昭昭孟子曽子曰江漢以濯之秋陽以暴之皜皜乎不可尚已孟子滕文公昭昭然若揭日月而行莊子晏子為阿宰三年而毀聞於國景公不悦召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今之所以當賞者當誅是故不敢受晏子史詩曰周道挺挺我心扃扃左襄公五年趙武曰夫子之家事治言於晉國竭情無私左昭十三年夫子謂范武子陳平盡䕶諸將周勃等言陳平受諸將金漢王召讓平平曰臣祼身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者金具在請封輸官通鑑漢髙紀宋昌曰所言公公言之所言私王者無私西漢開心見誠無所隱伏後漢馬援傳其事昭昭日月經天河海帶地不足以比東漢馮衍傳石勒曰大丈夫行事宜磊磊落落如日月然終不效曹孟徳司馬仲達欺人孤兒寡婦狐媚以取天下也通鑑晉書内無闗鑰通鑑三國志楚王瑋嘆曰我之赤心可破示天下也通鑑晉惠紀魏主曰我當顯然往取揚州不若彼翳行竊步也通鑑宋紀唐太宗曰率土之内皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉唐書傳記楚熊渠子夜行見寢石以為伏虎闗弓射之滅矢飲羽下視之石也復射之矢摧無迹熊渠子見其誠心而金石為開況人乎劉向新序集大珠脱玷翳白日當空虛杜詩肺腑都無隔形骸兩不羈白侍郎集互入曠達便共論肝膽何曽異肺腸輸肝冩膽並同上虛懐而襟帶不設𢎞量而腑臟洞開張説之文朗詠豁心胷劉義夫用心如日月唐文粹洞朗軒闢不施㦸級晏嬰言笑中無町畦雖鬱蒸霧雨之候無自而入矣並同上一見肺肝盡坦然無滯凝元稹集懸白日於千里推赤心於萬人段文昌平淮西碑本朝心豁豁不置牆帷臨川集歐公襟懐洞然無有城府墓誌向人懐抱絶闗防魯直妄誕經乃諺既誕書無逸其言之不怍語憲問蛇蛇碩言出自口矣巧言如簧顏之厚矣詩小雅巧言言不忠信行不篤敬雖州里行乎哉語衛靈公子此非君子之言齊東野人之語也孟萬章上謬悠之説荒唐之言無端崖之辭莊天下鄭有神巫季咸知人之死生存亡禍福夀夭期以嵗月旬日若神鄭人見之皆棄而走列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣明日又見壺子出而曰幸矣子之先生遇我也有瘳矣全然有生矣明日又見壺子而曰子之先生不齊吾無得而相焉試齊且復相之明日又見壺子立未定自失而走壺子曰追之列子追之不及莊應帝王篇不稱九天之頂則言黄泉之底淮南修務訓無驗之言謂之妄揚子誕伐者百行之悖也劉子史敢為大言處之不疑史記孝武紀互入無忌憚東方朔曰臣十三學書三冬文史足用若此可以為天子大臣文辭不遜髙自稱譽西漢阮孚為誕伯晉書漢昭烈曰馬謖言過其實不可大用通鑑昭烈紀杜審言恃才髙以傲世甞語人曰吾文章當得屈宋作衙官吾筆當得王羲之北面其矜誕類此唐書本傳宇文融在相位謂人曰使吾居此數月則海内無事通鑑唐𤣥紀方士張果自言有神仙術誑人云堯時為侍中於今數千嵗多往來恒山中通鑑唐𤣥紀張果固請歸恒山後卒好異者奏以為尸解同上自古術士妄言致人族滅者多矣非所以靖國家也通鑑後唐明宗裴延齡奏左藏庫司多有失落近因檢閲置簿書乃於糞土之中得銀十三萬兩其匹段雜貨百萬有餘此皆已棄之物即是羨餘悉應移入雜庫以供别敕支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物請加推驗延齡每奏對恣為詭譎皆衆所不敢言亦未甞聞者延齡處之不疑上亦頗知其誕妄陸贄上書極陳裴延齡奸詐數其罪惡其略曰延齡以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譖服讒為盡節愚弄朝廷有同兒戲矯詭之態誣罔之辭遇事輒行應口便發靡日不有靡時不為昔趙髙指鹿為馬物類猶同豈若延齡掩有為無指無為有通鑑唐徳宗紀傳記皮日休傲誕自號間氣布衣北夢瑣言隗囂將王元曰請以一丸泥為大王東封圅谷闗東觀漢記上小堯舜下邈三王劉向戰國䇿序互入無忌憚明皇問富人王元寶家財多少對曰請以一縑繫南山一樹南山樹盡臣縑未窮唐文粹集是夫喋喋衒玉而賈石者也栁文鑿空駕虛唐文粹詭詐經情疏而貌親在小人則穿窬之盜也與記表記素隠行怪記中庸子以母則不食以妻則食之以兄之室則弗居以於陵則居之孟滕文公下史張湯為人多詐舞智以御人史記本傳吕不韋為春秋暴之咸陽市門懸千金其上有能増一字者與之史記懐諼誤國西漢師丹傳上詐諼而棄信西漢藝文志齊人多詐而無情西漢公孫𢎞傳季文多詐人不能得其要領通鑑光武紀變詐蠭出西漢東方朔傳繆為恭敬繆詐也西漢司馬相如傳若御史大夫湯乃詐忠通鑑漢武紀汲黯曰𢎞位為三公為布被此詐也前漢公孫𢎞傳凢激詭之行則容隠偽矣通鑑漢獻紀曹操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操而口貌如故嵩曰叔父言汝中風已瘥乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意魏志曹瞞傳孫峻與滕徹雖内不沾洽而外甞相包含通鑑三國吳志楊素曰但恐富貴來逼臣臣無心圖富貴也通鑑陳紀安禄山外若癡直内實狡黠又甞命見太子不拜左右趣之拜禄山拱立曰臣胡人不習朝儀不知太子者何官上曰此儲君也朕千秋萬嵗後代朕君汝也禄山曰臣愚曏者惟知有陛下乃不知更有儲君不得已然後拜通鑑唐𤣥宗紀魏杜弼曰毒螫滿懐妄敦戒業躁競盈胷謬治清淨通鑑梁紀朱滔變詐多端倪唐書朱希彩傳集詡詡强笑語以相取下韓文巧詐百情唐李嶠書記纂淵海卷四十三
