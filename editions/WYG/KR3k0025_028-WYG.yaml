body:
  text: 記纂淵海卷二十八宋潘自牧撰職官部禮部經典朕三禮汝作秩宗並書大宗伯之職掌建邦天神人鬼地祇之禮以佐王保邦國周禮史漢成帝置尚書五人其四曰客曹主外國夷狄事後漢尚書吏部兼掌齊祀亦其職分魏尚書有祠部曹及晉江左有祠部尚書掌廟祧之禮常與右僕射通職不常置以右僕射攝之歴代皆與右僕射通職後周置春官卿又有禮部後改禮部為宗伯又春官之屬有典命後改典命為大司禮俄改大司禮復為禮部謂之禮部大夫至隋置禮部尚書唐因之龍朔中改為司禮大常伯光宅中為春官尚書通志傳記祠部尚書領祠部儀曹二曹齊梁陳皆有祠部尚書後魏為儀曹尚書北齊祠部尚書統祠部主客虞部屯田起部五曹又有儀曹主吉凶禮制屬殿中尚書後周置春官卿又有禮部而不言職事後改禮部為宗伯又春官之屬有典命掌内外九族之差及玉帛衣服之令沙門道士之法總判祠部禮部膳部主客事通典韋受進位禮部尚書帝問所以振災邀福者對曰宋景公以善言退法星三舎漢文除秘祝勅有司祭而不祈此二君皆受自至之福書美前史如失德以却災媚神以求助神而有知且因以譴也時帝不徳故託以為諷白孔六帖集逮及貞觀初尚書踐台斗杜甫送王評事大舜委于伯夷分敕六卿成王任于彤伯建兹嵗首寔曰春官惇叙九族之親欽若五常之教天祀地郊之典率具宏綱朝日夕月之儀撮其機要張鷟集居禮樂之司必資明備白孔六帖本朝禮部判部事二人以兩制及帶職朝官以上􅂶凡禮儀之事悉歸于太常禮院而貢舉之政領于知貢舉本曹但掌制科舉人補奏太廟社齋郎室長掌座都省集議百官謝賀表章諸司申舉祥瑞出納内外牌印之事而兼領貢院焉續㑹要元豐改制職掌如舊凡禮樂有所損益小事則同太常寺大事則集侍從或百官議定以聞若有事于南北郊明堂籍田禘祫太廟薦享景靈宫酌獻陵園及行朝貢慶賀晏樂之禮則承詔舉其儀物職官志尚書經宗伯掌禮典以和邦國以統百官以諧萬民周禮史前期戒有司辨具即上册寳及封册禮命亦如之凡天下選士具注于籍至三嵗貢舉考驗無冐濫乃聽預試凡大禮生辰后妃親王以下所推之恩公主下嫁宗室冠昏䘮𦵏之制及賜旌節章服冠帔旌表孝行之法例皆主行之大祥瑞則朔參官詣閣門表賀餘于嵗終條奏其屬有三曰祠部禮典醫政道釋祠廟之事𨽻焉曰主客蕃國朝貢及國信禮物之事𨽻焉曰膳部牲酒膳羞宴設給賜之事𨽻焉尚書主禮樂祭享貢舉之政令而侍郎為之貳郎中員外郎參領之職官志時雖正名尚書猶未除人續要傳記後魏孝文征馬圏留宋弁兼祠部尚書攝行兵事曰國之大事惟祀與戎故令卿攝二曹大全唐陳叔達初建成元吉疾害太宗隂行譛毁髙祖惑其言將有貶責叔達固諌乃止太宗時拜禮部尚書勞之曰武徳間公有讜言故以報卿唐書李剛字文紀仕隋官不進筮之得鼎卦筮人曰君當為卿輔代易乃如志至唐終禮部尚書唐書集擢登宗伯之曹上應文昌之位類要典禮之于有司非人莫濟秩宗之于省户其選則髙同上俎豆之議著為典常牋奏之文𫝊為口實秩清任重時儒所貴不次之位也上官均制本朝禮部掌國之禮樂祭祀朝㑹燕享學校貢舉之政令祭之名有三天神曰祀地祇曰祭宗廟曰享又有大祀中祀小祀之别幣玉牲牢器服各從其等凡雅樂以六律六同合隂陽之聲為樂律金石絲竹匏土革木為樂器宫架八佾特架六佾分武文先後之序為樂舞其所定儀注以舊章參考其當否上尚書省册寳及封册命禮亦如之宋史侍郎經小宗伯之職掌建國之神位周禮史煬帝初置禮部侍郎唐因之龍朔中為司禮少常伯掌䇿試貢舉及齋郎𢎞崇國子生等事舊制考功員外郎典貢舉開元中李昻為進士李權所詆朝議以考功位輕不足以臨多士次年遂以禮部尚書掌焉唐史唐栁璟字徳輝為禮部侍郎為人寛信好接士稱人長遊其門者他日皆顯于世唐書賀知章從太常少卿遷禮部侍郎兼授學士宰臣源侍中曰學士侍郎孰為美燕公曰侍郎自唐以來為衣冠之華選履歴清要望實具美者居之然終是具員之吏學士者藴揚班之詞彩兼游夏之文學始可處之無愧二美之中此為愈也大全傳記禮部侍郎周之春官小宗伯也六典唐龍朔中改為司禮咸亨復舊六典范質年二十舉進士時翰林學士和凝權知貢舉凝平生以宰輔自期登第姓名在十三及覽質文卷知非常人亦以質為第十三人塲屋間謂之𫝊衣鉢言若禪宗之相𫝊授也其後凝既登庸不十年質亦大拜大全集貳宗伯之掌禮典諸侯之貢士職類可使典禮以和神人可使考文以第俊秀韋貫之制豈惟神人之和兼舉孝秀之目職類一時文柄舉屬公楊大法撰行狀典郊祀之禮獻賢能之書韋貫之本朝劉正夫除禮部侍郎彗見求直言正夫條奏時政十餘事大畧重名器輕賦歛戢干戈節賜予選人材惜民力鑒祖宗成憲謹持盈守成之道徽宗嘉納之東都事畧侍郎奏中嚴外辨同省牲及親視饌腥熟之節祼受瓉奉槃嵗祀昊天上帝祭皇地祇與尚書迭為亞獻祭大社大稷神州地祇則迭為初獻祀九宫貴神五帝感生帝朝日夕月蜡祭東西方亦如之紹興七年禮部置侍郎二員隆興元年詔除尚書不常置外禮部侍郎置一員宋史郎中史隋禮部曹置侍郎一人煬帝除侍字文考儀曹唐因之武徳初改為禮部郎中龍朔二年改為司禮大夫咸亨初復舊其後曹名或改而官號不易掌禮樂學校儀式制度衣冠符印表疏册命祥瑞鋪舎喪𦵏贈賻及宫人等通志孔易為齊尚書儀曹郎屢箴闕禮多見信納上謂王儉曰孔易真所謂儀曹也南史齊書梁武帝問徐勉求一有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事帝即日除儀曹郎每建議訪問前事休源即以所通記隨機斷決曽無疑滯吏部任昉常謂之孔獨誦梁書傳記郎中一人周官春官四師下大夫亦頗同今任魏尚書有儀曹郎掌凶禮制歴代多有例在吏部郎中篇通志劉杳博綜羣書為儀曹郎僕射徐勉以臺閣大儀専委杳焉梁書李翺為禮部郎中性峭鯁論議無所屬見宰相李逢吉面斥其過失唐書唐薛稷字嗣道為禮部郎中以辭章自名同上集南宫舎人士林髙選上官均制太㣲之星郎位甚近宗伯之屬禮為司清謝表賜筆禮闈進席天臺之屬張賈制儀曹之任實藉文雄郎吏之選必資時秀唐制容臺是則仙闥咸推彭景真制本朝元豐郎中參領禮樂祭祀朝㑹宴享學校貢舉之事有所損益則審訂以次諮決凡慶㑹若謝掌撰表文與祠部主客膳部並列為四建炎三年倂省郎曹禮部領主客祠部領膳部隆興元年復詔禮部祠部一員兼領自是併行四司之事矣通置吏五十四人通志禮部元豐官制行謂之名表郎官别有印曰名表郎印石林燕語員外郎史禮部員外郎講議制度損益儀物審覆有司所上之狀而質于尚書省大全大朝㑹則尚書奏藩國貢物慶賀若謝則員外郎分撰表文同上唐李班為殿中侍御史宰相韋處厚曰清廟之器豈撃搏才乎除禮部員外郎唐書崔澹舉止秀峙謂玉而冠者為禮部員外郎當時士夫以流品相尚推名徳者為之首唐書劉禹錫栁文序子厚以文章稱首入為尚書禮部員外郎㑹要栁子厚文章卓偉續要傳記唐韋叔夏授禮部員外郎則天將享明堂受制與當時大儒撰定儀注衆咸推服之職畧劉禹錫為禮部員外郎方與日者從容段文昌入謁既去日者謂禹錫曰員外須待十年之後此客入相方轉正曹郎耳自是禹錫失意連受外官十餘年文昌入相方除禹錫禮部郎中録異記集仙步徐徐整羽衣小儀澄澹轉中儀樺飄紅燼趨朝路蘭縱清香宿省時彩筆煙雲供不足綸闈鸞鳯訝來遲自憐孤宦誰相念禱祝空吟一首詩鄭谷詩惟此禮部公寒泉甃舊井滴此乆羸瓶召還汲脩綆山谷詩本朝禮部員外郎領禮樂祭祀朝㑹宴享學校貢舉之事並損益儀物審覆有司所上之狀宋志汪大猷字仲加除禮部員外郎南宫名表一出士林稱誦之大全祠部郎中史東晉而下逮于北齊皆有祠部郎後周春官府有典祠中大夫隋有祠部郎唐改為郎中龍朔中改為禋大夫後復故唐書徐邈為祠部上言南北郊及言明堂宗廟毁建言皆有證魏志後魏裴修兼祠部郎中每有疑議修撰斟酌咸有故事同上周捨博學精義理梁武帝召拜祠部郎中損益禮儀多自捨出梁書傳記唐開元十一年改祠部為職祠至德初復舊自天寳六載及至徳三年常置祠部使以他官為之晉改立太廟摯虞為祠部郎職其事職類許允之字之竒才應禮樂擢為祠部郎同上謝沈為祠部郎有史才職畧集祠部呼為氷㕔言其清且冷也因話録祭以事神人道之極也祠曹所領體莫重焉南豐除趙令鑠制仰承宗廟懐祗䖍晉祠部嵇含臺中宴㑹又隨急詔朝天去陳后山送鄭祠部本朝祠部判司事一人以無職事朝官充凡祠祀享祭皆𨽻太常禮院而天文刻漏歸于司天監本司但掌祠祭盡日休暇今受諸州僧尼道士女官童行之籍給剃度受戒文牒而已元豐改制郎中員外郎始實行本司事續㑹要陳古靈先生襄字述古判尚書祠部時譯經僧法䕶遺表度十僧趙槩奏列子廟三年度道士襄皆執奏不行神宗實錄兵部經四曰夏官其屬六十掌邦政周禮史唐兵部尚書一人侍郎二人掌武選地圖車馬甲械之政其屬有四一曰兵部二曰職方三曰駕部四曰庫部凡將出征告廟授斧鉞軍不從令大將軍専決還日具上其罪唐百官志傳記魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉太康分中外兵各為左右宋五兵唯領中兵外兵二曹通典大明省昇明復置六典齊梁陳皆有之後魏為七兵北齊為五兵左右中兵左右外兵都兵凡五曹後周大司馬其屬有兵部中大夫小兵部下大夫隋之兵部統兵部職方駕部庫部四曹唐因之龍朔改司戎咸亨復舊光宅改夏官神龍復故天寳改武部至徳復故通典掌天下兵衛武官選授之政令凡軍師戍卒之籍山川要害之圖廐牧甲仗之數六典本朝兵部判部事一人凡兵籍武官軍師卒戎之政令悉歸於樞宻院其選授小者又歸於二班本曹但掌三駕儀仗鹵簿字圖釋奠武成王廟及武舉事嵗終以義勇弓箭手寨兵之數上于朝兩朝志元豐惟民兵馬政權隷樞宻院武官銓選并歸吏部五年詔應縁義勇保甲事並隷樞宻院其餘民兵悉隷兵部續㑹要建炎三年併衛尉寺歸兵部中興㑹要兵部尚書經矧惟若疇圻父薄違司馬掌邦政統六師平邦國書祈父予王之爪牙詩乃立夏官司馬使帥其屬而掌邦政以佐王平邦國大司馬之職掌建邦之九法以佐王平邦國以九伐之法正邦國周禮雎鳩氏司馬也左傳史黄帝夏官為縉雲史記姚崇三為宰相兼兵部尚書屯戍斥堠士馬儲械無不諳記盧承慶檢校兵部尚書知五品選辭曰選事在尚書臣掌之為出位帝曰朕信卿卿何不自信李輔國為兵部尚書南省視事使武士戎裝夾道王起為兵部尚書文宗數訪逮時政起因積雨願寛逐臣李懐逺除兵部尚書雖乆居榮位而彌尚簡率常乗欵段馬左僕射豆盧欽望曰何不買駿馬乘之答曰此馬幸免驚蹶何暇别求朱崔為兵部尚書自得岐路必當大用封川多方沮之唐書傳記兵部尚書周官夏官卿也魏置五兵尚書後魏置七兵尚書周置大司馬卿隋改兵部尚書唐龍朔改司戎太常伯咸亨復光宅改夏官尚書神龍復天寳改武部尚書至徳復六典大司馬者武官也大總武事訓馬為武者取其健行成王時畢公為三公兼領司馬之職釋名黄帝坐𤣥扈之樓上與大司馬容光臨觀鳯凰之至宋司馬名司武類要晉號五兵周稱九法記室新書集緝熈九法董正六師孫逖授李林甫制恭守戎曹訓齊武部簡稽之務軍國是殷許公集周之九法歴代用焉故夏官之重事位乆虛錢翊授陸展制惟兹夏官實掌戎政白居易行栁公綽制卿長夏官李宗閔制本朝尚書掌武舉地圖車輦甲械之政令而侍郎為之貳凡軍民以民籍統隷者閱習按試選募遷補續㑹要文昌七兵之秩夏官掌武超進崇資楊億代表掌國五兵叨進中臺之秩歐公表中臺政事所出兵部司馬之任夏官古卿南豐擬制武選隷於天官兵部摠於樞輔故司馬之職獨省文書東坡表周禮命卿司馬掌國征之事牋表類兵部侍郎經小司馬之職周禮史唐太宗以楊𢎞禮有文武材擢為兵部侍郎入參機務出統衆攻戰太宗曰越公兒郎故有家風矣楊𢎞武為司戎少常伯髙宗嘗誚曰爾在戎司授官多非其材𢎞武曰臣妻剛悍此其所屬不敢違以諷帝用后言帝笑不罪蔣伸為兵部侍郎宣宗每見必咨天下得失伸言比來爵賞稍易人日偷帝愕然曰偷則亂矣伸曰非遽亂但人有覬心亂由是生帝嗟嘆未幾拜相云唐書傳記隋置兵部侍郎唐因之龍朔為司戎少常伯光宅為夏官侍郎後復故職林舊制一員總章加一員通典周官夏官小司馬中大夫也六典韓臯資質重厚有大臣器盧元輔端清介正能紹其祖奕職類崔湜為兵部侍郎父挹為禮部侍郎父子同為南省副貳互見禮侍類集祈父之貳夏卿之亞張曲江集惟兹夏官實貳兵政簡稽調補今方其時司馬貳卿佐平邦國白集栁公綽制入亞六卿共行司馬之法出膺九命俱受元戎之律伯樂川記本朝六卿之亞皆髙選也而夏官實主武事還貳祈父用均爾勞司戎亞卿曲阜除陳軒制夏卿之貳典幹於七兵胡文恭行丁度制惟是夏卿之亞南豐集兵部郎中史兵部郎中二員一員掌判帳及天下武官之階品衞府之名數一員掌判簿以總軍戎差遣之名數唐志魏徴薦杜正倫擢兵部員外郎太宗勞之曰朕舉賢者非朕獨私以能益百姓也裴光庭轉兵部郎中在職公務修整衆所嘆服姚崇為夏官郎中契丹擾河北兵檄叢進崇剖決如流張嘉貞為兵部員外郎時功狀盈几郎吏不能決嘉貞為詳處不閱旬廷無稽牒盧奕所歴有稱唐書傳記魏五兵晉七兵皆置郎中隋初為兵部侍郎煬帝除侍字又改兵曹郎唐武徳改兵部郎中龍朔改司戎大夫咸亨光宅神龍隨曹改復通典及六典周大司馬屬官軍司馬下大夫之任也職林掌武職勲官三衙及兵士簿書朝集祿賜假告差發武職告身之事職員令集既忝夏官之屬夏官之劇既參戎事之殷擢受五兵之部司武之屬重於文昌元和制誥兵部郎中二員一在侍從不居外省元㣲之行楊嗣復制本朝本曹所治之事郎中員外郎參掌之續㑹要七兵之曹郎吏之選甚寵南豐潘良器制姑寵七兵之秩用服一臺之華胡文恭吕公弼制外兵之員郭輔制夏卿首曹中臺妙選張朂制往踐五兵之屬公是行周思永制夏卿之屬陳希亮制職方郎中附員外郎經職方氏掌天下之圖以掌天下之地乃辨九州之國使同貫利周禮史職方郎中員外郎掌地圖城隍鎮戍烽候防人道路之逺近及四夷歸化之事唐書傳記隋開皇置職方侍郎煬帝去侍字唐加中字龍朔改司城大夫咸亨復隋開皇置職方員外郎煬帝改承務郎唐復舊龍朔咸亨隨曹改復六典本朝職方掌受諸州圖及圖經㑹要建炎三年以兵部郎兼職方題名駕部郎中附員外郎經夏官輿司馬周禮史隋辛公義為駕部郎勾檢馬牧所獲十餘萬疋帝嘉曰唯我公義奉國竭忠隋書畢諴為駕部員外郎故事以倉駕二部為辱諴沛然如處美官互見倉部類崔元亮為駕部員外郎清謹介特澹如也隋書傳記周夏官之屬有輿司馬校人牧師巾車皆駕部之本也魏晉尚書有駕部郎宋屬左民尚書齊北魏與北齊並曰駕部郎中隋曰侍郎屬兵部煬帝除侍字唐武徳加中字龍朔改司輿大夫咸亨復天寳改司駕至徳復通典中行刑户不博前行駕庫國史補集從容管劇每識通而理當常衮制惟有南宫老駕兄白居易詩本朝駕部判司事一人輿輦車乗隷於太僕傳驛給受一出於樞宻院廐牧之政總於羣牧司本司無所掌元豐改制郎中員外郎始實行本司事參掌輿輦車馬驛置廐牧之事大禮則戒有司具五輅續㑹要建炎併太僕寺歸駕庫中興㑹要輿馬輦乗之奉郵驛牧圉之治中臺要務主以郎官南豐擬制擢司輿馬之政初寮除季倫制庫部郎中附員外郎史庫部郎中員外郎掌戎器鹵簿儀仗孔若思遷庫部郎中持一石止水滿於座右以示有止足之意唐書傳記周禮夏官有司甲胄弓矢今庫部郎中之任也魏始置庫部郎晉以後有郎中隋初為庫部侍郎煬帝去侍字唐武徳加中字龍朔改司庫大夫咸亨復周禮夏官有司兵後周有小武藏大夫蓋員外郎之任也隋開皇置煬帝為承務郎唐為庫部員外郎龍朔以來隨曹改復六典本朝駕庫二部皆無所掌建炎三年以駕部兼庫部㑹要甲胄弓矢之器乘輿鹵簿之式武藏之任郎選甚髙南豐集刑部經五曰秋官其屬六十掌邦刑周禮史刑部尚書一人侍郎二人掌律令刑法之政徒隷校覆讞禁之事其屬有四一曰刑部二曰都官三曰比部四曰司門唐志傳記漢成帝尚書初置二千石曹主郡國二千石又置三公曹主㫁獄光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹重於諸曹魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄隋開皇改都官為刑部統都官刑部比部司門四曹唐因之龍朔改司刑咸亨復武后改秋官神龍復天寳改憲部至徳復職林本朝刑部判部事二人淳化以刑部覆大辟案増置審刑院凡四方以具獄來上則讞於審刑院大中祥符置糾察在京刑獄司元豐並倂歸刑部五年官制行刑部始得専其官續㑹要刑部尚書經司冦蘇公式敬爾由獄以長我王國書立政司冦掌邦政詰奸慝刑暴亂周官乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國大司冦之職掌建邦之三典以佐王刑邦國詰四方周禮司冦正刑明辟以聴獄訟聴之於棘木之下以獄之成告于王大司冦以其成從質於天子記王制莒太子僕來奔季文子使司冦出諸境子為司冦將盜是務去爽鳩氏司冦也左傳史黄帝秋官為白雲史記羊侃為都官尚書宦者張僧𦙍候侃侃曰我牀非閹人所坐竟不前之時論美其貞正梁書劉祥道遷司刑太常伯每覆大獄必歔欷累嘆奏決之日為之不食李適之拜刑部尚書夜則宴賞晝決公務庭無留事崔祐甫為刑書帝欲相之問曰牛仙客可與語卿嘗見否曰未也他日又問對如初帝乃不用賛曰嚴挺之拒宰相不肯見李林甫崔祐甫違詔不屈牛仙客信剛者乎二人坐是皆不得相彼亦各申其志也顔真卿為檢校刑書元載請百官凡欲論事必先白長官長官白宰相然後聞奏真卿上疏曰天寳後李林甫威權日盛羣臣不先咨宰相輒奏事不過託以他故中傷獨不敢明約百司令先白宰相如今日之事曠古未有陛下不早覺悟漸成孤立矣其激切如此於是中人爭冩内本布於外屈突通為刑書自以不習文故辭改工部唐書傳記刑部尚書周禮之秋官卿也晉依漢置三公尚書宋始置都官尚書皆掌刑獄齊以後皆置後周置大司冦卿隋初曰都官尚書開皇改刑部尚書唐因之龍朔改司刑太常伯咸亨復光宅改秋官尚書神龍復天寳改司憲至徳復六典總制刑部比司事職員令掌其三典詰彼四方記室新書集弼我五教掌兹三典常衮制秋卿恤刑事无枉撓紹蔽芾於謳謡盡侀成於法理杜審權制超司秋典顔魯公集國之二柄在徳與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司冦務在擇人臯陶之作士師期於致理張鷟集本朝尚書掌天下刑獄之政令而侍郎郎中員外郎分治其事設官八刀職以司臬事題名望峻天臺仍忝刑官之重歐陽謝表秋官古卿中臺八座典司邦禁南豐擬制淑問之臣掌秋官曲阜西火清曹丹筆平刑爰副一人之欽䘏牋表類刑部侍郎經小司冦之職掌外朝之政以致萬民而詢焉周禮史刑部侍郎闕唐太宗令執政妙擇其人奏皆不可曰朕得其人矣往者李道裕議張亮反形未具此言當矣遂授之狄仁傑薦張柬之宰相材召為洛州司馬仁傑曰臣薦宰相而為司馬非用也乃授司刑少卿遷秋官侍郎韓愈為刑侍憲宗遣使迎佛骨入禁中愈上表諫王播轉刑侍精於法律法寺議讞科條繁雜播備舉格條置之座右凡有詳決疾速如神僚屬嘆服劉瑑轉刑侍選制勅可用者議其輕重成一家書號大中統類奏行之唐書傳記隋煬帝置刑部侍郎唐因之龍朔改為司刑少常伯光宅為秋官侍郎天寳為憲部侍郎掌律令刑名覆案大理及諸州應奏之事通典及六典周之秋官小司冦中大夫也六典唐有大獄即命御史中丞刑部侍郎大理卿充謂之大三司使寳歴初宣中書以諌議大夫劉栖楚為刑侍丞宣郎授自此始秋卿之貳類要佐平邦憲職林集俾踐白雲之司裴敦復制當宣室受讞之際思滿堂飲酒之言予曰罪爾勿罪予曰寛爾勿寛李從誨制擢亞秋官韓文貳于刑讞劉瑑制本朝沿革詳見前刑部類吕公孺元祐初為刑侍原廟亡珠繫治甚乆公孺言殿中主者不一前後代者未嘗以服御相授且諱日宫嬪往還如織豈可指意吏卒獄雖具顧非聖裁不可上深以為然國史本傳秩貳秋官參執邦典南豐擬制秋官亞卿曲阜峻貳秋卿胡文恭刑部郎中附員外郎史郎中員外郎掌律法按覆大理及天下奏讞為尚書侍郎之貳令狐峘大厯中為刑部員外郎上疏諌山陵事詔答曰古之遺直何以加焉杜景佺為員外郎守法不撓唐書傳記晉宋齊並以三公郎曹掌刑獄置郎中一人隋初省三公曹置形部曹侍郎一人煬帝除侍字又改憲部郎唐因之武徳改郎中龍朔改司刑大夫咸亨光宅神龍並隨曹改復六典及通典周禮有士師下大夫蓋郎中之任六典魏有定科郎晉賈充定律令以裴楷為之職類唐有大獄以刑部員外郎御史大夫理寺官為之以決疑謂之小三司使職林杜牧頃於宰執求小儀又求小秋不遂尚書故實秋官之屬職畧中行刑户不博前行駕部國史補集亟則失情緩則留獄深則礙恕縱則生姦惟是四者持刑之難元稹行馮宿制自居殿中能察非法連鞫庶獄多叶平允加以温敏靜專可當是選一嵗之獄決在秋冬今方其時宜敬乃職白集王鎰制書曰庶獄庶事予罔敢知此乃周文王之政以理天下也惟獄惟事㑹於南宫求郎之難豈敢輕易今者各有所授皆為清秩杜牧制刑官屬郎守法爭兢不阿韓文本朝至道初張昱為刑部員外郎西川安撫奏授昱知雅州上以省郎之重不欲換他職故進秩加賜令服而遣刑者所以助治聖人尤謹中臺參綜郎選甚髙南豐除韓晉卿制宜正秋臺之聨進丞郎之務胡文恭寥詢制丹筆議刑國綱作重白雲司職人命是懸牋表類都官郎中附員外郎經司隷掌五隷之法周禮史都官郎中員外郎掌俘隷簿錄給衣糧醫藥而理其訴冤韋温奏曰國朝以來都官最為清選不可以賞能吏唐書傳記漢置司隷校尉其屬有都官從事一人掌中都官不法因以名官後漢又改二千石曹掌中都官水火賊盜魏晉宋齊都官郎中並掌京師非為得失事非今都官之任後周置司隷掌諸奴男女男子入於罪隷女子入於舂饎之事此今都官之任隋都官侍郎猶掌非違得失開皇改都官尚書曰刑部其都官郎曹遂改掌簿錄配没官私奴婢唐因之武徳加中字龍朔改司僕大夫咸亨復故六典裴秀奏事曰都曹二千石曹司國憲内掌京畿詰姦聴訟外總邉境類要嵇含牋曰今都官中兵三曹郎晝督征戰夜還治事省中司都官屯田虞部主客皆閒簡無事諺曰司門都官屯田水部入省不數南部新書後行祠屯不博中行都門國史補集故薛尚書能李員外頻嘗郎都官皆一時騷雅宗師都官之曹振盛於此余早年請益實受深知今忝此官復是正秩鄭谷自序十倫創制輿臺之號肇興百隷裁䂓僮僕之名斯著蒼頭卑賤匪子宻之封侯㸃面輕㣲殊季珪之貴胄張鷟集本朝都官判司事一人無所掌元豐改制郎中員外郎始實行本司事參掌徙流配隷及吏籍之事續㑹要列四案軍六將案吏籍案配籍案知雜案鄭谷詩名盛於唐末號靈臺編世但稱鄭都官詩梅聖俞官至都官劉原父戯之曰聖俞官止此昔有鄭都官今有梅都官詩話命爾司僕曲阜擢之秋聨典我隷士胡文恭行劉把制進秋臺者以都隷為峻張士奕等制司隷秋聯彭思永制比部郎中史何損奏許都之賊魏明竒之擢為比部郎魏書唐徳宗知武元衡才名召授比部員外郎裴延齡奏京兆府妄破用錢穀請令比部勾覆唐書傳記魏尚書有比部曹晉因之宋比部主法制齊梁陳皆有北齊掌詔書律令勾檢等事後周曰計部中大夫隋為比部侍郎煬帝除侍字唐加中字龍朔改司計大夫咸亨復天寳改司計至徳復掌内外諸司公廨及公私債負徒役工程􅂍物帳及勾用度物通典比部得廊下食以飲從者號壯盤國史補杜牧頃於宰執求小儀小秋皆不遂嘗夢人謂曰辭春不及秋昆脚與皆頭後果得比部員外尚書故實集郎于㑹司栁文位膺列宿職在勾司張鷟集藴籍為郎乆魁梧秉哲尊詞華傾後輩風雅藹孤騫杜詩本朝比部判司事一人無所掌兩朝志自治平至熈寜初凡四年而未勾考帳已逾十有二萬錢帛芻粟虧損不可勝數遂置提舉帳司領之元豐官制行釐其事歸比部郎中員外郎始實行本司事四朝志列五案勾案覆磨勘案理欠案憑由案知雜案比部掌勾稽天下文簿周官宰夫所謂乗其財用之出入也續㑹要内外經費之任總于勾考之司南豐擬制惟是㑹計勾考之事命汝聴之曲阜吳景淵制稍升比計之曹胡文恭行吳伸制比勾劇曹陳象之制進司計於中臺竇平制司門郎中附員外郎經司門掌授管鍵以啓閉國門周禮史郎中員外郎掌門關出入之籍及闌遺之物唐書傳記周禮大司徒屬官有司門下大夫後周依周官隋開皇置司門侍郎煬帝去侍字唐加中字龍朔改司門大夫咸亨復周禮有司門上士後周有小司門上士隋置員外郎煬帝改承務郎唐武徳復故六典掌門籍關棧及道路所闌遺物之事職員令工部經六曰冬官其屬六十掌邦事周禮史唐工部尚書一人侍郎二人掌山澤屯田工匠諸司之事其屬有四一曰工部二曰屯田三曰虞部四曰水部唐書傳記漢成帝尚書有民曹主凡吏民上書光武改民曹主繕修功作鹽池園苑晉宋有起部每營宗廟宫室則惟置之北齊起部亦掌工造屬祠部後周有冬官大司空卿掌五材九範之法其屬有工部中大夫掌百工之籍而理其禁令至隋乃有工部尚書唐因之龍朔改為司平咸亨復武后改為冬官神龍復縂判工部屯田虞部水部事通典本朝工部判部事一人凡城池土木工役程式皆隷三司修造案本曹無所掌元豐官制行掌百工山澤溝洫屯田之政令續㑹要紹興三年併少府監歸工部以文思院屬焉中興㑹要蓋繕修興造程衆藝􅅚五材國家之務不可以不屬之其人今中臺起曹實踐其任矧屯田虞衡平水之職莫不隷焉牋表類工部尚書經舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰疇若予工僉曰垂哉帝曰俞咨垂汝共工宏父定辟司空掌邦土居四民時地利書國有六職百工與居一焉審曲面勢以飭五材以辨民器謂之百工周禮鳲鳩氏司空也五雉為五工正左傳史黄帝冬官為墨雲史記長孫平為工部尚書名為稱職隋書唐閻立本代兄立徳為工部尚書兄弟相代為八座時人榮之鄭善果為工部尚書正身奉法甚著榮績子休烈為工部尚書不治産業樂賢下善推轂士甚衆李大亮為工部尚書惟忠謹外若不能言而内剛烈不可干非其義唐書傳記工部尚書周之冬官卿也後周置大司空卿隋開皇始置工部尚書唐龍朔改司平太常伯光宅改冬官尚書六典司空事官掌監百官者也類要五材是宜百工惟叙城郭都邑合其規士農工商得其所記室新書集冬卿命職汝徃欽哉掌我邦工謹兹藝事程品之重有若百工號令之先尤難六職唐制尚書漢公卿也言動可否屬人耳目固不專於率四屬程百工修位於冬官而已白集韋貫之制平百官之上書飭五材以辨器非國之髦碩詳於典制則不可以綜事訓工建明理本也常集位當𤣥武之官職在司空之任虞舜之代伯禹統其班周成之朝毛公處其地張鷟集本朝沿革詳見前工部類冬卿常伯楊億代表中臺起曹訓匠建事南豐擬制工部侍郎史帝問蘇頲有工部侍郎得中書侍郎者乎對曰陛下任賢惟所命何資之計李栖筠為工部侍郎魁然有宰相望唐書傳記隋煬帝改置工部侍郎唐因之龍朔改司平少常伯咸亨復通典光宅神龍並隨曹改復周之冬官小司空中大夫也六典集百工惟時命汝典制常衮制起曹書殿兼而委之白集工侍兼集賢殿制本朝沿革詳見前工部類共工之貳飭五材程匠事冬官寵列俾介厥司南豐擬制冬卿之貳公是行崔嶧制冬官之貳方此得人疇若予工汝為已試曲阜郭知章制擢貳事官蔡延慶制疇若予工汝往為允紀綱繕修之次杜塞淫巧之作曲阜工部郎中附員外郎史起部郎不常置宋書掌城池土木之工役程式蔣係遷工部員外郎又遷郎中兼史職宰相宋申錫為北軍羅織罪在不測係與諫官崔元亮泣諫玉階之下申錫方减死時論稱之唐書傳記晉宋齊皆有起部郎中梁陳改置起部侍郎隋初為工部侍郎煬帝除侍字改起部唐武徳改工部郎中龍朔改司平大夫咸亨復光宅神龍並隨曹改復周禮司空屬官下大夫即郎中之任也六典掌興造工匠諸公廨舎宇五行紙筆之事職員令開元以後位卑名著者杜工部國史補集不才名位晩敢恨省郎遲杜詩本朝宫室城隍程匠度材之事郎於起部其選甚髙南豐范子竒制中臺起曹郎選尤重曲阜制郎吏令之髙選工官號為劇曹張元方制冬卿之屬公是行李徽之制屯田郎中附員外郎史隋初屯田郎兼掌儀式隋書傳記漢尚書郎四人其一主户口墾田蓋屯田之始也魏有豐部郎曹晉始置屯田郎中東晉宋齊並左民郎中兼知屯田事陳隋並為侍郎煬帝曰屯田郎唐龍朔為司田大夫後復故掌天下屯田及在京文武職田諸司公廨田以品給焉職林後行祠屯不博中行都門國史補閒簡無事八省不數詳見前都官類集出軍西域我君謀之屯田北假我君穫之燕集本朝屯田判司事一人凡屯田之政隷三司本司無所掌元豐改制郎中員外郎始實行本司事兩朝志參掌營屯田官莊塘濼學校職分之田及其租入四朝志元祐改入户部崇寜復續㑹志中興間除題名率屯戍之兵服畎畝之事郎於中臺統其政令南豐擬制臺郎初拜以墾曹為任胡文恭行張靖制俾擢墾屯之曹張道制墾屯冬屬劉述制虞部郎中附員外郎經帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞書山虞掌山林之政令澤虞掌國澤之政令周禮史郎中員外郎掌京都衢閧苑囿山澤草木及百官蕃客時蔬薪炭供頓畋獵之事唐書傳記周禮有山虞澤虞蓋虞部之職也魏始有虞部郎中晉因之宋齊省梁陳為侍郎隋煬帝去侍字唐加中字龍朔為司虞大夫咸亨復虞部員外郎隋煬帝為承務郎唐復故龍朔咸亨隨曹改復六典本朝虞部無所掌㑹要蒐田以時澤梁有禁虞衡之守所以遂嘉生參化育南豐擬制水部郎中經川衡掌巡川澤之禁令周禮史郎中員外郎掌津濟舩艫渠梁隄堰溝洫漁捕運漕碾磑之事唐書傳記後周冬官有司水中大夫隋文帝為水部侍郎煬帝去侍字唐加中字龍朔改司水大夫咸亨復後周冬官有小司水上士則員外之任也隋置水部員外郎煬帝改承務郎唐復故龍朔咸亨隨曹改復六典集省中官最美無似水曹郎李餘慶本朝水部無所掌㑹要六部監門本朝紹興二年詔置六部監門官一員選陞朝文臣有才力人充仍令六部長貳奏差序位請給依寺監丞中興㑹要掌司門鑰之嚴胡文恭行吕性簡制六部架閣本朝元豐有六曹架閣庫續㑹要崇寜元年何執中請置庫架閣命官涖之是時六曹皆建立本傳大觀三年罷内吏部令司封餘部六曹郎官管勾政和三年六曹依舊置管勾架閣庫官宣和罷續㑹要紹興三年立六部架閣庫中興題名十五年詔復置官吏户部各差一員禮兵部共一員刑工部共一員中興㑹要舊制官庫其司置於六部之内或遇其廢則以郎省兼之否則以兼六部監門兼之迨於紹興寺監簿正官俱復然後始置司於外一也舊制金耀門文書庫多藏三司帳籍三司今版曹也自銓曹而下儲藏帳籍之所未之聞焉其後置六部架閣官大抵成案留部二年然後畀而藏之又八年則入之金耀金耀無復曩日則悉藏於架閣庫二也二者不同而至於諸曹二十四司之文書盡歸儲蓄以待有用則今猶昔也李異架閣文題名記其任以周司書漢掌故中興題名記纂淵海卷二十八
