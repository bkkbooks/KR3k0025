body:
  text: 記纂淵海卷二十九宋潘自牧撰職官部門下侍中史門下省侍中二人正二品掌出納帝命相禮儀凡國家之務與中書令參總而顓判省事百官志武徳元年改侍中曰納言三年曰侍中龍朔六年改門下省曰東臺侍中曰左相同上魏徴為侍中尚書省滯訟不法者詔徴平治徴素不習法但存大體處事以情人人悅服進鄭國公六帖傳記晉嵇劭為侍中王師敗百官皆奔惟劭不去被害于帝側血湔御衣及定左右欲浣之帝曰此嵇侍中血令勿去也晉吳郡陸仲元晉太尉玩曾孫也自玩至仲元四代為侍中時人方之金張二族也張文瓘後拜侍中兼太子賓客職司奏議悉心糾駁帝故委之或時有疾他宰相奏事帝必問與文瓘議未若不者曰往共籌之或曰已議則皆報可並本傳集貂蟬之貴金貂之寵入侍帝帷出負國璽本朝制侍中掌佐天子大政審中外出納之事自建隆至熈寜拜侍中纔五人雖有他官兼領而實不任其事官制行以左僕射兼以下侍郎行侍中職則置侍郎以佐之通考侍郎史門下侍郎二人正三品掌侍中之職百官志龍朔二年改黄門侍郎曰東臺侍郎武后垂拱元年曰鸞臺侍郎天寳元年曰門下侍郎同上崔元綜長夀中遷鸞臺侍郎勤於政事每在中書必束帶至晩未嘗休偃張廷珪遷黄門侍郎御史蔣挺以監決杖刑稍輕朝堂杖之廷珪奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖士可殺不可辱也議者以廷珪之言為是並舊史傳記漢成帝拜張禹少子于牀下為黄門侍郎魏夏侯𤣥為黄門侍郎與皇后弟毛曾同坐𤣥恥之明帝恨之左遷羽林監張華為黄門侍郎博覽圖籍四海之内若指掌千門萬户畫地而成白六帖李義改黄門侍郎制勅不便輒駮正貴幸有求官者睿宗曰朕非有靳但李義不可故耳傳本朝制侍郎掌貳侍中之職省中外出納之事元豐官制行以尚書左僕射兼復置門下侍郎一員以代叅知政事中興後宰相罷兼復改門下侍郎為叅知政事給事中史給事黄門侍郎掌侍從左右關通中外及諸王朝見于殿中引王就坐漢書儀曰黄門屬黄門令日暮入對青瑣門拜名曰夕郎後百官志蕭望之漢元帝詔曰望之傅朕八年厥功懋焉可賜爵關内侯給事中賛曰身為儒宗有輔佐之能近古社稷臣也漢史晉武帝詔燕王陳劭清正亷潔博通六籍宜在左右以敦儒訓可給事中晉起居注傳記李渤拜給事中孤特自持不茍合於世人謂之沽直屢以言斥而婞直不少衰守節者尚之職林孔戣為給事中江西觀察使李少和坐貶獄寢不下崔易簡殺從父兄戣乃慷慨論正貶少和殺易簡唐本傳張元素遷給事中太宗詔發卒修洛陽宫元素上書諫之宋璟嘆曰張公論事有回天之力可謂仁人之言其利溥哉本傳李嶠遷給事中時酷吏來俊臣搆陷狄仁傑則天使嶠與大理少卿李徳裕等覆其獄嶠乃與徳裕等列其枉狀由是忤㫖李嶠傳集禁裏疎鐘官舎晩省中啼鳥吏人稀晨揺玉佩登金殿夕奉天書拜瑣闈王維鴛鷺簪裾上龍尾蓬萊宫殿壓鼇頭夕郎夜直吟仙掖天樂和聲下禁樓姚合和盧給事中瑣闥昔年司制誥共嘉文藻類相如太宗賜楊億本朝淳化四年以右諫議大夫魏庠知制誥柴成務同知給事中事凡制勅有所不便宜准故事封駁九年詔停廢知給事封駁公事自是始以封駁司隷銀臺㑹要向敏中張詠兼以樞宻直學士領之時並代都部署張永徳笞小校至死詔按其罪張詠封還詔書不從長編左右散騎常侍史秦置散騎又置中常侍後漢省散騎而中常侍改用宦者漢書孟達字子度自蜀降魏魏文帝善達之姿才容觀以為散騎常侍傅𤣥為散騎常侍與皇甫陶俱掌直諫華嶠字叔駿加散騎常侍班同中書寺為内臺中書散騎著作及歴理音律天文數術兩省文章門下撰集皆典常統之並本傳本朝散騎常侍不常置諫議起居司諫正言皆付兩省班籍通謂之兩省官續㑹要左右諫議大夫經保氏掌諌王惡周禮保氏師氏掌以媺詔王周禮師氏爾有嘉謀嘉猷則入告爾后書史秦置諫大夫掌論議多至數十人漢武帝元狩中更置後漢増為諫議大夫後漢書前漢王褒益州刺史王襄奏褒有軼才乃徴褒既至詔褒作聖主得賢臣頌擢為諌大夫本傳貢禹以明經潔行著聞元帝召為諫大夫虛己問以政事劉向以行修飭擢為諫大夫元帝即位與蕭望之同心輔政並同上蓋寛饒對䇿髙第帝遷諫大夫數上疏諫後奏對事上以寛饒怨謗下其書諫議大夫鄭昌愍傷寛饒忠直憂國上書訟寛饒罪曰臣以諫為名不敢不言漢史褚遂良遷諫議大夫兼知起居事帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾耶遂良曰雕琢害力農纂組傷女工奢侈之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源及其横流則無復事矣帝咨美之唐史王珪太宗召為諫議大夫帝嘗曰正主遇邪臣不可以致治正臣事邪主亦不可以致治唯君臣同徳則海内安朕雖不徳諸公數相諫正庶致天下於平珪乃進曰古者天子有諍臣七人諫不用則相繼以死今陛下開聖徳收采芻言臣願竭狂瞽同上傳記唐龍朔二年改諫議大夫為正諫大夫後又置諫議大夫開元以来廢正諫大夫復諫議大夫貞元四年分為左右右隷中書元和元年勅左諫議大夫宜去左字其右諫議大夫四員續通典漢武帝因集置諫大夫皆名儒宿徳為之初學記陳陶拜諫議大夫靈帝時上疏言宦官云臣恨不列稷契伊周之徒而與龍逢比干為儔同上元和六年御史中丞竇易直奏諫議大夫至拾遺御史中丞至殿中侍御史兼為供奉官續通典唐文宗嘗于便殿召栁公權論事切直忤㫖周墀為之惴慄公權詞氣益堅上徐謂之曰朕知舎人不合却作諫議以卿論事有諍臣之風今擢諫議大夫栁公權傳魏鄭公徴字元誠太宗拜諫議大夫日益親厚或引至卧内訪天下事公亦自以不世遇乃展盡底藴無所隠凡三百餘奏無不剴切當帝心者職林集諫省新登正直臣萬方驚喜捧絲綸則知天子明如日肯放淮南髙卧人劉禹錫詩盛世千齡合宗工四海瞻徳望完圭角儀刑狀陛亷王荆公詩耳目之官獻納之地獻可替否司諫盡忠當休明之代居言用之司職司諫議朝夕論思出入討論並白樂天本朝真宗天禧元年詔兩省置官六員不兼職務三年以李虛己為諫議大夫充職其後員闕不補天聖初上封者以為言詔以孔延魯劉隨並為右正言而諫大夫兼他職猶故也長編靖康元年詔臺諫天子耳目之官宰執不當薦舉當出親擢立為定制續㑹要中興之初因舊制設左右諫議大夫司諫正言屬門下中書建炎二年詔諫議大夫下隷兩省别置局于後省之側許與兩省官相見議事以登聞檢鼓院專隷焉中興㑹要慶歴三年田況言諫諍之臣不得日奉朝請臣在諫院每聞一事皆諸處采問比及論列或至後時今若令諫官日奉朝請則可以日聞朝廷之事矣詔每日赴内朝㑹要數共工之罪不蔽堯聰辨垣平之詐益彰漢徳諫議大夫制左右司諫史韋温為補闕時宋申錫被誣温昌言曰丞相操履有所不宜斥乃奸人陷之吾等諫官豈避一時之雷霆而致賢君賢相蒙過惡之名耶因率同列伏閣切爭之唐書唐文宗以魏謩遷司諫嘗言于宰相曰太宗得徴參裨闕失弼成聖政我今得謩于疑似之間必能極諫庶幾處于無過之地命于狀内備述諫疏激切詔中書為之辭也同上盧景亮遷右補闕朱泚反勸徳宗曰罪已不至則感人不深帝然之志意崒然與穆質同在諫諍地書數上鯁亮無所回同上傳記唐武后垂拱中置左右補闕左右拾遺二官以掌供奉諷諫開元以來尤為清選左屬門下右屬中書通典舒元褒疏遺補官秩雖卑乃陛下侍臣也續通典鄭餘慶子澣為右補闕獻疏切直餘慶入朝憲宗問曰卿之令子朕之直臣可更相加賀遂遷舎人通典李泌為相請罷置補闕拾遺徳宗雖不從亦不以授人故諫司唯韓章歸登而已續通典集獻納開東觀君王問長卿皂雕寒始急天馬老能行杜甫駟馬歸城闕雙鳬去海門還從清切禁再沐聖朝恩韓退之送李補闕吾君英睿相君賢其那寰區未晏然明日翠華春殿下不知何語可聞天詩集朕聞衮職有闕仲山甫補之蓋所以節宣天子之嗜慾而彌縫其不至者也我國家設司諫署以神明其耳目凡在兹選實難其人楊汝士授右補闕勅避人焚諫草騎馬欲雞棲杜甫本朝端拱元年改左右補闕為左右司諫左右拾遺為左右正言是時太宗欲令諫官修職故詔改其官詔曰補闕拾遺位居諫省榮踐清華之列是為獻納之司朝廷之得失須論刑政之煩苛必舉宜更舊號特立新名後亦有兼他官不供諫職者㑹要韓魏公為右司諫王沂公見公論事切直有本末喜謂公曰比年臺諫官多畏避為自安計不則激發近名如君固不負所職諫官宜如此言行錄江公望居司諫言君臣一體人君元首也左右大臣股肱也諫官御史耳目也股肱不力則百事隳耳目不明則四方塞一體病則元首為之不康是職也何可輕付哉同上左右正言史唐王仲舒拜左拾遺徳宗相裴延齡與陽城交章言不可受後入閣帝顧曰是豈王仲舒耶唐劉栖楚為拾遺敬宗畋遊坐朝晩栖楚出班以額叩墀苦諫並本傳李邕少知名長安内史李嶠等薦邕詞髙行直堪為諫諍之官召拜右拾遺唐志唐柏耆志健而望髙急于立名謁裴度願以一節掉舌下王承宗乃以左拾遺往承宗獻徳隷二州以二子入質直擢拾遺由是聲振一時本傳傳記拾遺立𦂳以其行立在北省之次獻可替否也雜記唐通事舎人宣語多不知書至宣讀輒失句讀故用拾遺别句低聲以助之謂把麻六典元和元年元稹為左拾遺稹性鋒鋭見事風生既居諫垣不欲碌碌自滯事無不言續通典唐左拾遺張方國每朝政有失便抗疏論精神昻然進不懼死明皇嘗曰張方國忠賢人也通典唐宋璟劾張昌宗等反狀武后不應李邕為拾遺立殿下大言曰璟所陳社稷大計陛下當聴后乃可璟奏李邕傳白居易後對殿中論執強梗帝未喻輒進曰陛下誤矣帝變色謂李絳曰是子我自拔擢乃敢爾本傳集聨步趨丹陛分曹限紫㣲曉隨天仗入暮惹御香歸聖朝無闕事自覺諫書稀岑參寄左省左拾遺初升諌署是真仙浪透桃花十五年鄭谷賀韋拾遺判事有花皆可錄諫書無草豈求名出南嶽本朝天禧二年左正言劉􅂱請今言事許升殿面對從之長編天禧元年始詔兩省置諫官六員不兼他職考所言以為殿最首擢魯宗道與劉􅂱為右正言先是諫官請須繇閣門進又罕得到者宗道請面論事而奏進遂為故事仁宗實錄夏侯嘉正傳嘗使巴陵作洞庭賦太宗知其名召為左正言東都事畧韓憲肅公絳除右正言時大臣佐佑時政務循故事公一日奏言政事當出聖㫁上曰屢有人言朕少㫁臺諫官見有未便但言來不憚追改也言行錄起居郎史唐鄭朗為起居郎文宗謂宰臣曰云云時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記錄未吾試觀之朗曰臣執筆所記便名為史故事不可取觀帝曰朕恐常時閒語不關理體垂諸將來切以為恥異日臨朝庶幾少改何妨一見以誡醜言朗遂進之唐貞觀有事泰山褚遂良為起居郎諫罷封禪之事並唐史鄭仁表為起居郎文章俊拔自謂門第人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表唐本傳傳記起居郎掌錄天子之動作法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必時書其朔日甲乙以紀歴數典禮文物以考制度遷拜恩賞以勸善誅伐黜免以懲惡季終則受之于國史焉唐六典集含章復記言清秩稱當年㸃筆非常筆朝天又近天鄭谷寄張起居詩風神何藴藉張緒正當年端簡爐烟裏濡毫御案邉鄭谷寄韋起居本朝初修起居郎而彭乗在遷中上指乗曰此老儒也雅有恬退名無以易之及召見諭曰卿先朝舊人乆補外未嘗自言對曰臣生孤逺自諒其分敢過有所望耶上嘉之仁宗實錄元豐蔡京起居郎其弟卞為右史兄弟並入侍立士林竦羨馬文昌雜錄登聞鼓院史古者朝有誹謗之木敢諫之鼓所以通治道而來諫者也漢書唐武后垂拱置肺石函神龍元年九重嚴邃非呌閽之可聞萬邦遐曠因表疏而方達其有冤未申投匭唐太宗詔令申冤制唐太宗建登聞之鼓于時在朝無缺政四海無疲人不遺聴覽其擊登聞鼓者委金吾將軍收進不得輒有傷損亦不須令人擁遮禁止其理匭使但任投匭人移表狀于匭中依常進來不須留副本並妄有止遏唐太宗詔令百官言事詔本朝國初曰司鼔以内臣掌之鼓在宣徳門南街北廊至道三年命太子中書王濟勾當鼓司用朝臣勾當自此始景徳四年詔改為登聞鼓院掌諸上書而進之以達萬人之情㑹要隷司正言續㑹要凡文武臣寮閤門無例通進文字並先經登聞鼓院進狀未經鼓院者不得受接分紀建炎元年因舊置局于闕門之前三年專隷檢院蘇軾登聞鼓院英宗在藩聞軾名欲以唐故事召入翰林宰相韓珂曰蘇軾之才逺大之器天下之士莫不畏慕降伏皆欲其進用然不若朝廷培養而後用也及試之論復入三等得直史館中興㑹要景徳二年改鼓司為登聞鼓院即命周起溢安惠判院㑹十月賜近臣錦袍特預之仁宗實錄檢院經以肺石達窮民周禮史大厯十四年詔天下寃滯于朝堂受詞推決尚未盡者聴撾登聞鼓通鑑田錫字表聖入判登聞檢院因夀寜節獻詩二十韻太宗和賜上東封書翌日命知制誥太宗實錄集獻納司存雨露邉地分清切任才賢舎人退食收封事宫女開函近御筵杜甫贈獻納使田舎人詩達下情于上天儆王言于有位唐文粹本朝雍熈元年改匭為檢景徳四年改為登聞檢院命樞宻直學士張詠判隷諫議大夫掌受文武官及士民章奏表疏凡言朝政得失公私利害軍期機宻陳其恩賞理雪冤濫及竒方異術皆受以通達凡進狀者先鼓院若為所抑則詣檢院淳化三年置理檢校于乾元門之西北廊以知制誥錢若水領之復唐制也至道三年廢天聖七年上因讀唐史見匭函達下民冤枉之事乃謂左右曰天下九州之大豈無冤枉之人若至京師檢院鼓院理雪者必是州縣吏提㸃刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函専命御史丞為理檢使以分紀中興之初因舊制置局于闕門之前建炎三年専隷諌院中興㑹要創治所于和寜移置居雙闕之左中興題名官誥院本朝國初于右掖門置院四司誥身案並集于此以備中書除改本司郎官各主其事淳化五年始専置官司于省内凡官誥各以本司誥身印之文臣用吏部武臣用兵部王公命婦用司封加勲用司勲掌文武官將校誥身及封贈官誥院提舉一人以知制誥充判院一人以帶職朝官充元豐五年行官制文武告身屬吏部蕃官告屬兵部封贈及命婦告屬司封加勲並將校告屬司勲官誥院四部告身案及隷人隨事隷本部七年併司封司勲誥身案入吏部預書庫收掌崇寜四年吏部専制造官誥局五年罷命尚書右選主管大觀元年復置尋改為官誥院仍隷左右司三年復罷歸吏部政和三年六月詔依舊置官誥院差官三員主管少府監鑄印記吏部製造誥身案記為文中興以來因仍不改王介甫用事議論素異還朝置之官誥院介甫欲變更科舉上疑焉公議上上悟曰吾故疑此得軾議釋然矣蘇潁濱集東坡行狀審計院本朝國朝以三司使總邦計司各有院以秉中外錢穀出入之政蓋㑹計之府也淳化三年始用户部使樊知古奏剔其冗籍役别為院置官専領之以聴稍食之要貳置院之初特掌騎兵徒兵給受之數猶未及諸司也元豐三年合步騎兩院為一遂以其一主諸司自宫禁朝廷下至斗食佐使凡賦祿者以式法審其名數而稽其辭名者唯郊賜給已乃審祿有疑予則詔以法凡四方之計籍上于大農則逆其㑹凡有司議調度㑹賦出則諷焉設員二曰左右聴分案六史八人題名舊為諸軍諸司專勾建炎元年避髙宗御諱改諸軍諸司審計司紹興五年臣寮言臣切惟國家之賦祿以糧審為關鍵糧審之勘給以法令為承式中興㑹要辛次膺監諸司審計司未嘗登權要以參知政事孟庾被詔薦其才遂召對是日除駕部員外郎胡澹菴集糧料院本朝國朝仍舊制以三司大將軍為督糧料使自開寳六年以著作佐郎陸光範充改用京官自此始太平興國五年分諸司馬軍步軍為三院八年以馬軍步軍合為一院雍熈四年命供奉官陳處諱勾當諸司糧料供奉官曾祚勾當馬步軍糧料自後復分馬部軍為兩院或以諸司使副分主之端拱二年復以京朝官主之四朝㑹要中興以來行在有諸軍諸司糧料院鎮江建康有分差諸軍糧料院鄂州有分差户部糧料院四川總所有分差户部魚關糧料院分差利州户部糧料院中興㑹要文思院本朝太平興國三年置學造金銀犀玉工巧之物金彩繪素粧鈿之餙以供輿輦册寳法物及凡器服之用隷少府監熈寜三年詔文思院兩界監官立定文臣一員武臣一員並朝廷選差其内侍勾當官並罷四朝㑹要紹興三年詔少府監並歸文思院其上下界監官從工部辟差工部言所轄文思院舊分上下界監官三員内一員文臣係京朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興三年詔並禮物局入文思院中興㑹要左藏庫經掌邦國之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用凡受財者受其貳令而書之周禮傳記内庫曰御府後漢書更始至長安御府帑藏皆按堵如故東觀漢記唐𤣥宗詔公卿百寮觀左藏庫貨幣山積唐徳宗瓊林大盈庫晏公類要本朝左藏止一庫置使領焉題名太平興國三年分為二庫淳化三年分置左右藏各二庫四年廢右併入左政和六年修建新庫以東西庫為名㑹要中興因仍東西庫各以文臣監武臣同監其東幣帛之屬在焉其西金銀絲纊之屬在焉紹興二十七年詔户部于轄下丞簿内選一員兼充左藏庫提轄官此提轄所由始也孝宗即位詔將御前樁管激賞庫撥歸左藏庫以左藏南庫為名中興㑹要進奏院史唐藩鎮皆置邸京師以大將主之謂之上都留後大厯十二年改為上都知進奏院官唐史蘇舜欽字子美仲淹薦其才監進奏院本傳本朝舊制皆本州鎮補人為進奏官其軍監塲務轉運司則差知後官則副知掌之逐州就京師各置進奏院㑹要太平興國六年諸州罷知後之名簡知後官得李楚等百五十人並充進奏官命供奉官張文粲提轄諸道進奏院同上秘書監史魏武帝置秘書令典尚書奏事文帝置中書令而秘書改令為監掌藝文圖籍之事初屬少府自王肅為監乃不屬其蘭臺亦藏書籍而御史掌之晉武帝以秘書并入中書省其秘書制作之局不廢恵帝復别置秘書監並統著作局掌三閣圖書自是秘書之府始居于外職官傳記晉荀朂領秘書監汲郡冢中得竹書朂自撰次時缺文多所證明傅暢晉書荀勉與張華依劉向别錄整治書籍以為中經晉惠帝永平詔曰秘書考校古今監理經籍王隱晉書虞世南為校書監太宗引之談論及古今帝王行政得失必存規諷唐訓唐賀知章授秘書監自號四明狂客本傳晉温嶠舉荀崧為書監曰國史之典將以明得失之迹謂之錄錄使一代之典煥然可觀散騎常侍崧文質彬彬思義通博宜掌秘奥明史籍集天祿圖書府芸籖嵗曝頻幡經窮藏室賜㑹集儒紳顧陸髙標好鍾王妙入神司無槧俗吏來預石渠賓錢穆父詩晏竇追儒雅簮纓成禮容中天開璧府左海見鼇峰漢簡陳三館湘圖焕九重紫薇方思敏十吏筆能供籍之竒暫阻蓬萊客終為大海人題鄭秘監湖上先生去上芸香閣閣老新峩豸角冠留取幽人卧空谷一川風月要人㸔朱晦菴祖餞衣冠滿道周此行誰與話端由心知不作功名計只為蒼生未敢休朱晦菴詩本朝太平興國二年始建崇文院昭文館史館集賢館皆總為崇文院及端拱初建秘閣亦在崇文院中淳化元年詔秘閣次三館秘書省仍隷京百司㑹要時秘書雖有監少監丞郎校書郎正字著作郎佐皆以為寄祿官常帶出入即官至秘書監有特令供職者有以他官兼領者有以判秘閣官兼者麒麟臺故事真宗以楊徽之兼秘書監召謝便殿命坐屏左右上勞問乆之且曰圖書之府清靜無事可以養性也書詔張齊賢改秘書監致仕常出謁其子曰昔賀秘監以道士服東歸㑹稽大人盍衣羽服以優游何必更事請謁齊賢曰且作白頭老秘書而眠何必學賀監作流沙之服時以為名言東都事畧秘書郎史晉掌中外三閣經書校閱譌誤謂之郎中武帝分秘書圖籍為甲乙丙丁四部經書覆校闕遺正定脱誤使秘書郎中四人各掌其一晉書王敬𢎞為秘書郎敬𢎞求為奉朝請與書曰秘書有限故有競朝請無限故無競吾欲處汝無競之地文帝許之漢書李素立武徳初以親喪解起受七品清要有司擬雍州司户參軍帝曰要而不清復擬秘書郎帝曰清而不要乃授侍御史唐書後魏髙謐有文武才度除秘書郎謐以墳典殘闕奏廣訪郡邑大加繕寫由是圖籍稍以審正北史傳記齊梁末多以貴遊子弟為之無其才實北齊又謂之郎中隋祖諱中除中字唐分判校寫工程龍朔中改為蘭臺郎咸亨復舊通典後漢馬融有俊才為秘書郎中詣東觀典校秘書時儒士以為文徳可興武功宜廢遂寢蒐狩之禮戰陳之法融上廣成頌以諷諫忤㫖滯於東觀十年不得調後在東觀著述馬融才髙博洽為世通儒通典晉中興書王謐弱冠與王綏齊名除秘書郎璧記集飛騰知有䇿意度不無伸杜甫漸階羣振鷺入學誨螟蛉韓愈清省宜寒夜仙才稱獨吟俞坦山蘼蕪與丹桂竒心復竒骨已蔽蒼龍門又影鳯凰闕吳得贈栁秘書本朝秘書郎張闡忠肅公時秦檜用事每除臺諫必以其耳目知闡乆以喜論事一日㣲諷闡謂當入臺闡曰丞相茍見知張闡老死足矣檜黙然由是罷去中興係年錄彭忠肅公龜年號正堂除秘書郎時傳召姜特立公白丞相留公恐非虛傳既而果然留公引李絳事求退公率同館論奏且勉樞廷爭之遂寢同上著作郎史漢東京圖書悉在東觀故使名儒直東觀撰述國史謂之著作東觀皆以他官蓋有著作之任而未為官員也蘭臺令史明帝大和中始置著作郎官隷中書省專掌國史後有置佐著作郎亦屬中書省秘書監自調補之通典陸士衡以文學為秘書監虞濬所請為著作郎議晉書限㫁晉史傳記晉孫綽為廷尉卿領著作綽少以文學稱一時文士綽為之冠晉書晉束晢元康四年除著作郎著作西觀撰晉書三帝紀及十志文士傳張載作濛汜賦大僕傳𤣥見其賦嘆息以車迎載言談盡日載遂作賦起家徴為著作郎又作劍閣銘世以為能除著作郎六典集夫子靜且直雍容時卷舒東坡華蓋榮煌天帝座蓬萊縹緲道家山彭汝礪子亦東南珍價重不可筭東坡本朝國初為寄祿官元豐正名始實有職掌修纂日歴祭祀祝辭則著作郎佐之四朝志王安中自號初寮先生政和中以文學知名除宗學博士有密薦於上者除著作左郎㑹要李邴字漢老元祐名士與晁張為徒嘗為柱史邴才學能世其家政和末除書局遷著作郎同上校書郎史漢之蘭臺及後漢東觀皆藏書之室當時文學之士使讐校于其中故有校書之職初漢成帝已命光祿大夫劉向於天祿閣校經傳諸子詩賦步兵校尉任宏校方伎諸永夫揚雄等亦典校于其中後以蘭臺置令史又選他官入東觀皆令典校秘書或撰述傳記蓋有校書之任而未為官也故以郎居其任則謂之校書郎分紀傳記唐房𤣥齡校讐秘書省髙孝基謂裴矩曰僕觀人多矣未有如此郎者當為國器但恨不見其聳壑昻霄唐書前漢劉向字子政遷光禄大夫向方精於詩書觀古文詔誥領校中秘書本傳榮陽鄭君諸父諸兄或解巾以司讎校或決科而登館殿璧記集小富從來慰所望青衫叙進校書郎相公勲業已乆著孫子門闌嘗有光晁以道詩我觀李校書超邁有古風談道屢入㣲閉門長蓬蓬黄山谷漬墨竄舊史磨丹註前經藝苑手秘寳文堂耳驚霆韓集本朝初為寄禄官元豐正名始實有職掌編緝校正定其脱誤則校書郎主之四朝志建炎初罷紹興復置又參酌舊制必召試學士院而後命之中興㑹要鄭鑑試館職上問今合除何官龔茂良對曰前此學官召試徃徃止除正字上曰可除校書郎賞盡其言因曰䇿中所言或是或非大率剴切不易言行錄正字史後漢桓帝初置秘書監掌圖書古今文字考合同異其後監令掌圖籍之紀監述作之事不復専文字之任矣今之正字蓋令監之遺職校書之通制歴代無聞齊集書省有正書秘書省有正字四朝志集杜老趨嚴詔徐行及坐時端能幾字正敢恨十年遲益畏金根繆寜辭温媪譏況來憂畏㫁不盡鹿門期陳後山城南晁正字國器無等雙黄山谷翠木隂隂白玉堂老來方此試文章宫簷日永揮毫罷閒拂塵埃㸔畫墻王仲詩頻憂傷㸃竄竊恐誤流傳改易文辭正増加字數全孫僅詩本朝晏元獻公殊年十三真宗面試詩賦疑其宿構明日再試文采愈美上大竒之即除秘書省正字令于龍圖閣讀司馬温公實錄石悉政和初試中宏詞除館職四六之文有氣燄而務竒怪為詩清逸有橘林集十卷職畧楊億字大年以童子召對試詩賦五篇下筆立成太宗嘆異以為秘書省正字制曰汝方在髫齡不煩師訓精爽神助文字生知越景絶塵一日千里予有望于汝也東都事畧韓昫自布衣有詩名前輩稱許之政和初詣闕上書召試中書特命以官除秘書省正字言者論其進不由科舉責為筦庫范祖禹司馬光辟同編修資治通鑑書成上章稱薦而祖禹安恬靜黙若將終身除秘書省正字並事畧史館經國史明乎得失之迹詩大序外史掌四方之志小史掌邦國之志周禮董狐古之良史也書法不隠左傳子吾見列國春秋子吾觀遷固而下述作何其紛紛乎子謂陳夀有志於史依大義而削異端史之失自遷固始記繁而志寡子謂荀悦史乎失矣文中子史太史公謂子遷曰予先周室之太史也自上世嘗顯功名於虞夏汝復為太史則續吾祖矣遷悉論先人所以舊聞不敢闕卒三嵗而遷為太史紬史記石室金匱之書述陶唐以來至於麟止史自序封遷後為史通子注云以遷世無史官通於古今前司馬遷傳自劉向揚雄博極羣書皆稱遷有良史之才服其善叙事理辯而不華質而不俚其文直其事核不虛美不隠惡故謂實錄遷傳賛遷文直而事覈固文贍而事詳後二班傳論二班懐文裁成帝墳比良遷董兼麗卿雲二班傳賛荀悦依左氏傳體為漢紀三十篇辭約事詳論辯多美本傳陳夀撰三國志叙事有良史才丁儀丁廙有盛名於魏夀謂其子曰可覔千斛米見與當為尊公作佳傳子不與之竟不為立傳晉本傳魏收曰願得直筆東觀早出魏書魏收修國史得楊休之助因曰無以謝徳當為卿作佳傳爾朱榮於魏為賊魏收以髙氏出自爾朱且納榮子金故减其惡而増其善於是衆口喧然號為穢史北齊本傳朱敬則兼修國史乃請髙史官選以求名才韋安石閲其藁嘆曰董狐何以加世人不知史官權重宰相但能制生人史官兼制生死唐本傳劉知幾字子𤣥召至京師領史事時宰相韋巨源蕭至忠等皆領監修子𤣥奏記求罷因為至忠言五不可曰古之國史皆出一家未聞籍功于衆今使司取士滋多人自為荀袁家自為政駿每記一事載一言則閣筆相視含毫不㫁頭白可期汗青無日本傳子𤣥著史通内外四十九篇徐堅讀之嘆曰為史氏者宜署此座右也鄭惟忠嘗問自古文士多史才少何耶子𤣥對曰史有三長才學識世罕兼之故史才少唐書吳兢叙事簡核號良史本傳韋述撰武徳以來國史文約事詳蕭穎士以為譙周陳夀之流本傳蔣偕三世踵修國史世稱良筆本傳劉元濟修國史嘗曰史官善惡必書言成軌範使驕主賊臣懼此權顧輕哉而班生受金陳夀求米僕乃視如浮雲爾本傳沈既濟撰建中實錄體裁精髙本傳史官自黄帝有之夏商太史周太史小史内史外史而侯國亦置秦有太史令漢至武帝始置以司馬談為之談卒子遷嗣宣帝以其官為令行太史公文書修撰之職以它官領於是太史之官唯知占候而已王莽改置柱下五史後漢至隋唯魏明太和中史職隷中書其餘多隷秘書唐武徳初因隋制屬秘書省著作局貞觀移史館於門下省宰相監修自是著作始罷史職職源史官掌修國史凡天地日月之祥山川封域之分昭穆繼代之序禮樂師旅之事誅賞興廢之政皆本於起居六典典籍有國之明訓淵林荀悦紀序晉天福四年史館奏職居刋削事繫編修合舉舊章冀為常典六年趙瑩奏歴覽故事史册之重委在正人編修之官擇諸髦士續通典刻於玉版藏於金匱與天地相終晁錯對䇿劉向父子世典史籍華嶠謝表國史之興將明得失使一代之典煥然可觀温嶠表明乎國史所以𢎞闡大猷觀乎人文所以化成天下自非鈎深學海囊括詞林盛周公之典謨懸仲尼之日月則何以纂叙鴻業紬史䇿之徽烈俾垂作範之規用成不刋之典蕭嵩制懲勸教化在於春秋錯綜裁成必歸良直以中樞之餘力得東觀之全才修明簡䇿惟爾之休齊充制裁成義例之條垂褒貶於國書資刋削之能佇討論之美牛僧孺制總史官之㣲婉比良遷董稽合異同裁成褒貶蕭對制掌東觀陽秋之重蕭遘制遷紫㣲皇極之位總簡書刋集之司孫偓制官當喉舌職重陽秋王鐸制本朝監修國史以宰相為以修撰直館檢討無常員掌修日歴及典司圖籍之事凡史别置院於宣徽北院之東以藏之謂之編修院天聖修真宗史欲重其任降勅宰相為提舉參政樞副為修史續㑹要元豐改官制日歴隷國史案每修前朝國史實錄則别置國史實錄院以首相提舉麟臺故事元祐復置國史院隷門下省明年又置國史院修撰兼知院事紹聖復以國史院歸秘書省題名中興節秘書省復建史館以修神宗哲宗兩朝實錄紹興五年又移史館於省之側别為一所以増重其事至九年修徽宗實錄乃即史館開實錄院明年以未修正史詔罷史館併為實錄院而著作局唯修纂日歴中興㑹要吳育直史館文司雅甚擢自先帝列職史筵曲阜黄庭堅制提舉國史本朝乾興元年命監修國史馮拯專切提舉監修天聖五年宰臣王曾提舉監修真宗實錄修兩朝史時王旦未領監修故特受詔㑹要監修國史國朝舊以宰相為之修日歴也故常帶他銜若修先朝正史則别置編修院宰相為提舉四朝志紹興二十九年詔國史院宰臣提舉中興㑹要乾道元年詔參政虞允文兼權提舉修三朝國史中興以來參政兼提舉始此理孝㑹要監修國史史劉知幾陳五不可唐本傳詳見史館總類傳記北齊詔魏收撰史又詔平原王髙隆之總監之書名而已分紀唐太宗以宰相監修國史及以他官兼領唐制宰相四人内一人帶監修國史職職畧太宗以梁陳齊周隋並未有書乃命學士分修使秘書監魏徴總知其務凡有賛論徴多預焉史通龍朔中許敬宗以太子少師增前作唐史成百卷總統史任類要集舉而則書用存有法書而不法是謂空言蓋褒貶之重權也自非經術文雅進修徳業出忠入孝匡俗佐時為朕寳臣有邦良輔者孰可綜覈班紀發揮蒼籀蘇頲行張説等監修制掌邦國之事明懲勸之道是以政駿𢎞簡茂先博物爰自重臣式膺兼領宋璟蘇頲修國史制監綜史氏潤色大猷李固制史閣要重近代以來率命相臣總統其務令狐綯制主張懲勸總領典墳必使書法彌精動契春秋之㫖鄭明制兼刋綜之榮蕭鄴制踐黄樞之峻級總青簡之刋修丁摶制本朝史館有監修皆宰相兼領開寳中薛居正以參政監修自後參政亦有管勾修國史者不嘗置麟臺故事至道三年修太宗實錄宰臣吕端雖帶監修國史而不預焉其後重修太祖實錄遂詔吕端與錢若水等同修端罷相李沆繼成焉景徳二年畢士安卒遂命參政王旦權領史館事實為監修國史之職慶厯三年吕夷簡罷相帶監修國史優延老臣也㑹要監修國史自元豐王珪後宰輔皆不入衘中興之六年命吕頥浩兼提舉修國史當時國史但指日歴頥浩引元祐故事并及正史自是首相即兼監修紹興二十六年沈該万俟卨並為左右僕射始分監修提舉為二至今因之題名國史修撰史吳兢才堪論撰詔直史館修國史蔣乂外祖吳兢位史官乂幼從外家學得其書該綜羣籍有史才李翺轉史館修撰以史官紀事不實奏曰臣得秉筆以記注為職夫勸善懲惡正言直筆史官之任今善惡皆取行狀諡議蓋行狀多虛美今請但指事實直載事功唐書本傳傳記唐初令狐徳棻請修近代史遂命修撰名始於此職畧貞觀以宰相涖修撰天寳後他官兼史職者曰史館修撰初入為直館大中廢直館二員增修撰四人分掌四季分紀馬融三入東觀漢代稱榮張華再典史官晉朝推美史通牛亨問彤管何也答曰史官載事用彤管以記事古今注貞元十一年史館修撰張薦為左諫議大夫修撰如故裴延齡言於上曰諫議大夫論朝廷得失之官史臣修撰書朝廷得失之事則領史職者不宜為諫議遷秘書少監太和六年以王彦威楊漢公蘇滌裴休並充史館修撰故事史官不過三員兩員至是四人並命時論深以為非晉天福六年詔曰眷言筆削宜屬英髦續通典集可使執簡列為史官記事書法必無所拘立詞措意有班馬之風白集韓愈制竄定闕文裁成義類此仲尼春秋之職業也其可上下心手於愛惡是非乎元㣲之行獨孤朗制臣適執筆隷太史魏博先廟碑凡史氏褒貶大法春秋已備之矣後之作者在據事迹實錄實錄則善惡自見矣然此非淺陋偷惰者所能就況褒貶邪夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉韓文逺取南朝貴公子重修東觀帝王書當時載筆窺金匱暇日登樓到石渠劉禹錫本朝史館有修撰以他官兼領取最上一員判館事大中祥符後領修撰者湏兩省五品以上方掌修撰元豐官制行國史隷秘書省元祐中就門下省置局號國史院紹聖初復還秘書省舊有修撰官改為修國史四朝志紹興初實錄國史皆寓史館後罷史館遇修實錄即置實錄院遇修國史即置國史院二十八年置院修神宗哲宗徽宗正史修史一人同修史二人編修官二人中興㑹要太宗言楊徽之操履無玷州縣非其所長置之館殿正得其宜太宗曰史才甚難在乎善惡必書務摭實而去愛憎斯為良史蘇頌以為五朝正國史二聖編年出宋敏求父子手筆亦儒者盛事職畧淳化元年以梁周翰為史館修撰從翰林學士朱白等薦其有良史之才屬刋集於國典楊億表討論一代之善惡而撰次之荆公行范鎮制國史檢討官本朝淳化二年以郭延澤董元亨並為史館檢討至和二年詔今後檢討更不得舉職館試分紀嘉祐八年兼修國史韓琦奏史記日厯未修者積十餘年今將修先朝實錄而日厯未備檢討闕官請以直秘閤吕夏卿秘閤校理韓維兼職詔夏卿維並兼史館檢討㑹要提舉實錄院史吳兢與劉子𤣥撰定武后實錄叙張昌宗誘張説誣魏元忠事頗言説已然可頼宋璟等激勵苦切故轉禍為忠後説讀之知兢所為屢以情祈改辭曰狥公之情何名實錄卒不改世謂之董狐唐吳兢傳傳記于休烈奏國史實錄聖朝大典續通典本朝治平元年以宰臣韓琦提舉修仁宗實錄熈寜元年以宰臣曽公亮提舉修英宗實錄㑹要紹興九年修三朝實錄以宰臣一員提舉十二年詔史館提舉諸司承受等官吏並一切歸實錄院中興㑹要修玉牒官傳記掌修皇帝玉牒凡編年以紀帝系而載其厯數及朝廷政令之因革者為玉牒唐本宗正之職開成後始别置官續㑹要集生必輝華名於玉牒文選本朝祥符六年始設局置官詔以皇宋玉牒為名八年建玉牒殿于新寺景祐元年詔以編修院㕔西閤子充修纂玉牒之所熈寜三年玉牒於三牒院置局後徙編修院皇帝玉牒十年一進修玉牒官並以學士典領元豐行官制分隷宗正寺官會要紹興十二年宰臣一人提舉修玉牒官一人以侍從官兼二十九年詔玉牒所入宗正寺更不置修玉牒官檢討官以本寺少卿及丞同領編修事尋詔玉牒所宰臣提舉依舊修書官一員同宗正卿丞修纂更不置檢討官中興㑹要三十二年詔尚書左僕射陳康伯提舉編修玉牒後或以參政僉書兼權提舉題名凡玉牒書以銷金花白羅紙金軸銷金紅羅褾帶復黑漆金飾匣紅錦裹金鎖鑰㑹要修日厯官傳記唐貞元初韋執誼奏修撰私家紀錄非是望令各撰日厯月終館中詳定從之此日厯所從起也續通典本朝舊修日厯以時政記起居注㑹集修撰為一代之典舊於門下省置編修院元豐四年廢歸史館官制行屬秘書省國史案六年詔秘書省長貳毋得預著作修纂日厯八年詔吏部郎中曽肇禮部郎中林希亷著作職事官兼職自此始元祐五年移國史案置局専掌國史實錄編修日厯以國史院為名隷門下省紹聖二年詔日厯還秘書省四朝志紹興元年以修日厯所為名又詔秘書長貳通行修纂三年詔日厯所以修國史日厯所為名四年詔以史館為名十年秦檜請下有司討論史館建併之弊禮部看於元豐舊制併歸秘書省國史案以著作郎佐郎修纂日厯中興㑹要修㑹要官傳記唐徳宗貞元間蘇冕始為唐㑹要四十卷武宗時崔鉉又續四十卷㑹要序本朝建隆初王溥取宣宗以後故事并蘇崔所錄共為一百卷本朝㑹要自建隆止慶厯四年成一百五十卷章徳象王宋編修王珪續以慶厯止熈寜十年通舊増减成三百卷國朝㑹要序乾道四年詔尚書左僕射陳俊卿兼提舉編修國朝㑹要五年汪大猷等言蔡攸所修㑹要自元豐至政和止修得帝系后妃吉禮三門攸所修吉禮妄有删改以迎時好乞令本省再加删定今來續修㫁自神宗以續修國朝㑹要為名從之六年中書門下省言國朝㑹要已修至靖康詔令自建炎元年接續至乾道五年九年秘書少監陳騤言編類建炎以後㑹要至紹興三十二年六月十一日成書以中興㑹要為名從之孝宗㑹要提舉修勅令史杜周為廷尉客有謂周曰君為天下決平不循三尺法周曰三尺安出或前主所是著為律後主所是疏為令當時為是何古之法乎漢本傳傳記牙章竹簡之中因於法史類要集金科玉條劇秦美新本朝天聖慶厯嘉祐熈寜編叙及元符勅令格式各差宰提舉詳定官以侍從天法通法令者充政和元年差左僕射何執中提舉重修勅令執中上章力辭於是以兼領為名同提舉為同兼領續㑹要紹興中改為詳定一司勅令所自建炎四年以前著為紹興新法以後續降幾二萬餘前後牴牾乾道詳定一司勅令繫衘詳定官以兼詳定一司勅令繫孝宗比後淳㑹要上淳各熈慶元嘉奏及今有頒降勅令格式删定官本朝舊無常員大觀三年詔六曹删定官併入詳定一司勅令所為一局四朝志後省紹興十二年復置删定官依舊以勅令所為名後省乾道六年復置勅令所汪大猷申諸正差删定官淳熈十五年並省紹熈二年復置局差删修闕良因省去訐捕之條百餘其持法近厚如此似以母老有以慰之乃獨賜公三品服實錄删定官鄭剛中引對顧下詔不得以虛名文具欺罔朝廷翼日進呈上曰朕得珠玉珍玩不足為寳但冀得十數人物乃為寳也令學士降詔出榜朝堂以剛中為左宣教郎充樞宻院編修官中興係年錄金安節入對上三事曰人才當長養成就奏行旬日以為司農丞同上李公麟以陸佃薦為删定官博學好古多識竒字同上史館校勘史省内本統經史及太史歴象之職後並為列曹惟主寫書校勘而已是門可設羅兩京新紀集儒家無外事招客勘青編筆墨東西置朱黄次第研頻憂傷㸃竄竊恐誤流傳改易文辭正増加字數全端坐窮今古披襟見聖賢得興忘昏曉題名記嵗年棲毫思確論廢卷為忘篇魯魚皆删定誰人敢閧然孫僅詩游霧千金字飛雲五色箋銅門初下辟石館始沈研楊烱和鄭校讐詩本朝歐陽修以文章冠天下景祐初召試為館閣校勘東都事畧范鎮舉進士禮部第一釋褐用參知政事薦召試學士院除館閣校勘同上余自荆州還湖隂東至黄州二十里扁舟遡浪來迎者故人談獻可是也握手問無恙命酒相勞遊赤壁泊黄岡望武昌西山獻可又出所作史警十餘篇相示純正剴切得古人議論所未到余三嘆擊節乃因書以冠諸篇首張于湖史警序太史令史秦有太史官漢復置司馬談與子遷相繼為太史令事武帝職官傳記自古太史之職重以著述為宗而兼掌歴象日月隂陽氣數司馬遷既没後之續史記者褚先生劉向馮商揚雄之徒並以别職來知史務于是太史之署非復記言之司故張衡單颺王立髙堂隆等其當官見稱惟知占候而已六典晉太史令第七品宋齊梁陳同隋秘書省太史曹置令二人煬帝改曹為監唐因之武徳改為太史局肅宗改為司天臺六典集秦地立春傳太史漢宫題柱憶仙郎李白詩玉律調元璿璣授厯思舉日官之職用知天道之𤣥廣平集日月星辰乾象不忒分至啓閉嵗功有成掌日之官司天之吏書雲之史窺管之官當同文之朝思禀正朔奉太史之職宜察天時俱六帖本朝司天監或以他官兼判又有同判之名掌察天文祥異鐘鼓刻漏稽定厯數供諸壇祭祀元豐官制行改為太史局有令有判局有同判局選五官正以上業優考深者二人為判及同判政和因仍無所改其别局有天文院鐘鼓院測驗渾儀刻漏所印厯所皆主占驗厯法續㑹要太史正本朝司天監無正元豐官制行太史局置正太史令總一局之事而正與丞為之貳職源五官正史唐乾元三年置春官夏官中官秋官冬官正各一人掌司四時各司其方之變異唐志本朝設五官正至道中詔五官正磨勘至殿中丞止以後只加檢校官元豐無所改續㑹要太史丞傳記漢太史有丞一人秩二百石魏晉宋齊皆同六典隋置二人煬帝减一人唐初不置貞觀改渾儀監始置丞二人長安省景龍復置六典本朝司天監有丞元豐官制行置太史局丞續㑹要太史局直長本朝司天監無直長元豐改太史局有直長自直長至今十年一遷元祐官品直長從八品續㑹要靈臺郎傳記後漢太史下别有靈臺丞掌靈臺掌候日月星辰魏太史有靈臺丞主候望郎隋有天文博士唐初因之長安二年改為靈臺郎乾道元年改五官之名六典本朝司天監有靈臺郎慶厯詔十年一遷續㑹要保章正傳記周禮有保章氏秦漢以來無其職後周春官府有保章上士中士至隋置厯博唐長安四年改厯博士為保章掌教厯生乾元元年加五官之名六典本朝司天監有保章正慶厯詔十年一遷元豐改制掌厯法及測景分至表凖五年一遷官㑹要挈壺正傳記周制夏官挈壺氏下士六人秋官司寤氏春官雞人凡三職咸掌其事自漢以來太史掌之唐長安四年始置挈壺正掌知刻漏孔壺為漏浮箭為刻以考中星昏明之候乾元元年加五官之名六典本朝司天監有挈壺正元豐改太史局官惟挈壺正如故太史局官五年一遷十年一遷試中而遷者惟挈壺正無遷者續㑹要翰林醫官經若藥弗瞑眩厥疾不瘳書無妄之藥不可試也易醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下食醫掌和王之六食六飲六膳百羞百醬八珍之齊周禮集動不肆勤靜不宴逸有疾歸天醫無能恤太上防疾其次萌芽腠理不蠲骨髓奈何崔寔箴記纂淵海卷二十九
