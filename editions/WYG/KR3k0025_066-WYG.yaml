body:
  text: 記纂淵海卷六十六宋潘自牧撰物理部物理盈虛經日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉日中則昃月盈則食天地盈虛與時消息而况於人乎遯者退也物不可以終遯故受之以大壮晉者進也進必有所傷故受之以明夷物不可以終難故受之以解升而不已必困故受之以困易屈伸相推易畧財聚則民散財散則民聚大學子日中則移月滿則虧老子物惡有滿而不覆者哉家語川竭而谷虛丘夷而淵實荘子名遂身退天之道也管子互見知足再實之木其根必傷文子史甚美必有甚惡左昭十一盛之有衰猶朝之必有暮也西漢韓安國𫝊夫窮髙則危太滿則溢月盈則缺日中則移福謙忌盛後漢李固𫝊𫝊記太嵗在丑乞漿得酒太嵗在已鬻妻賣子吉凶逓代盈縮循環劉知幾史通時屯必亨運䝉必正顔延年釋奠詩人道無乆盈齊謳行前榮後枯相翻覆李太白集盈虛倚伏去來之不可常柳書噫天地乆否忽泰則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧乆鬱忽散則清仲尼之道否於周秦而昏於漢魏息於晉宋鬱於陳隋遇於吾唐萬世之憤一韓而釋皇甫湜請韓公配享書命屈於當代慶流於後昆白集先緑亦先枯白樂天集本朝一年辛苦一冬閒東坡集善乎司馬光之言曰天地所生萬物止有此數不在民則在官譬如雨澤夏澇則秋旱東坡十年斂積用一朝驚濤破山風動地後山嗚呼行朕兆經履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也易如彼雨雪先集維霰吉夢維何維熊維羆男子之祥維虺維蛇女子之祥室家溱溱詩嗜欲将至有開必先天降時雨山川出雲禮記禍福将至善必先知之不善必先知之國家将興必有禎祥國家将亡必有妖孽中庸子曰余疇昔之夜夢坐奠於兩楹之間余殆将死矣遂寢疾七日而歿禮記子目将眇者先觀秋毫耳将聾者先聞蚋聲列子人之将疾必先不甘粱肉之味國之将亡必先惡忠直之言晏子一葉落而知天下之秋淮南子史或呌於宋太廟曰譆譆出出鳥鳴於亳社如曰譆譆甲午宋大灾左襄三十年晉文公過衛乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之左傳晉侯疾求醫於秦未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也左成十年周幽王二年西周三川皆震伯陽甫曰周将亡矣昔伊洛竭而夏亡河竭而商亡史記周本紀殷說夢發於傅巖周望兆動於渭濱西漢班固叙𫝊福生有基禍生有胎西漢枚乗𫝊岷山崩壅江三日江水竭劉向大惡之昔岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭殆必亡矣通鑑漢成帝紀張掖柳谷口水溢涌寳石負圖状似靈龜立於川西有石馬七及鳯凰麒麟白虎犧牛璜玦八卦列宿孛彗之象于綽問鉅鹿張洊洊宻謂綽曰今漢已乆亡魏已得之何所追興朕兆乎此石當今之變異而将來之符瑞也通鑑魏明帝紀孫峻與吳主謀置酒請諸葛恪恪将入之夜精爽擾動通夕不安又家數有妖怪恪疑之魏髙貴鄉公紀諺曰鷄夜鳴者不利行師犬羣嘷者宫室将空兵動馬驚軍敗不歸通鑑晉武帝紀杜淹曰齊之将亡作玉樹後庭花其聲哀思行路聞之皆悲泣通鑑唐太宗紀楊震不答州郡禮命數十年後有鸛鵲銜三鱣魚飛集講堂前都講取魚進曰凡鱣者卿大夫之服象也數三者三台也先生自此升矣後位至太尉東漢本𫝊孫皓時錢塘湖開或言天下當太平青盖入洛陽時皓以問陳訓曰青盖入洛将有輿櫬銜璧之事尋而吳亡晉書孫秀誣潘岳石崇為亂夷三族石崇已在市岳後至崇曰安仁亦復爾耶岳曰可謂白首同所歸岳金谷詩云投分寄石友白首同所歸乃成其䜟晉書潘岳𫝊魏武帝嘗夢有三匹馬在一槽中共食其後宣帝及景文相繼為宰相遂傾曺氏宋符瑞志朱异初除中書郎時秋日始拜忽有飛蟬正集冠上時咸以為蟬珥之兆八年改侍中南史本傳王仁裕喜為詩其少也嘗夢神剖其腸胃以西江水滌之顧見江中沙石皆為篆籕之文由是文思益進五代史𫝊記有星赤而芒角自東北西南流投於諸葛亮營三投再還往大還小俄而亮卒晉陽秋祥者福之先妖者禍之先吕氏春秋隋煬帝於宫中嘗小㑹為拆字顧蕭妃曰爾能拆朕字否妃曰移左畫居右豈非淵字乎時人望多歸唐公帝聞之不懌乃言吾不能知此事豈非聖人耶於是姦蠧起於内盜賊攻於外隋大業記乾鵲噪行人至蜘蛛集百事喜西京雜記蜀縣有火井漢室之隆則炎赫驕熾桓靈之際火勢漸㣲諸葛亮一闞而更盛異苑桑榖共生於朝一日而大拱武丁脩行諸侯來朝者六國武丁祭有飛雉升鼎耳而雊三年重譯來朝者六國尚書大𫝊本朝月暈而風礎潤而雨老蘇禍福子禍莫大於不知足老子為善者天報之以福為惡者天報之以禍家語禍福無不自己求之者孟子福輕乎羽莫之知戴禍重乎地莫之知避荘子福莫長於無禍荀子互見知足夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰淮南子史郤至曰禍之大者其何福之為左成十二年能者養之以福不能者敗以取禍成十三年禍福無門唯人所召左襄二十三年福之至也人自生之禍之至也人自成之史龜䇿𫝊朱英謂春申君曰世有無妄之福又有無妄之禍史春申君𫝊禍自怨起福由徳興西漢文帝紀福生有基禍生有胎西漢枚乗𫝊互見朕兆夫吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉而小人之慮遂以為天道難知為善未必福而為惡未必禍歐陽公唐史中宗贊集福種常有兆禍至豈無端君子行詩凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為常君子得福為常而小人得福為不幸以其所為似有以取之也必曰君子則吉而小人則凶者不可也韓文毁譽經吾之於人也誰毁誰譽論語子有不虞之譽有求全之毁孟子三代之善千嵗之積譽也桀紂之謗千嵗之積毁也譽生則毁隨之淮南子我未見聞謗而喜聞譽而懼者文中子史季布曰以一人譽召臣一人毁去臣前漢季布𫝊互入不審毁譽愛惡之原禍福之機也魏志王祖𫝊毁譽脅於勢利晉紀縂論聞謗而怒者䜛之囮也見譽而喜者佞之媒也絶囮去媒䜛侫逺矣通鑑隋髙祖紀囮余周切又五戈反集凡人之獲謗譽於人者亦各有道君子在下位則多謗在上位則多譽小人在下位則多譽在上位則多謗柳子厚文謗譽積漸經剥床以膚凶地中生木升君子以順徳積小以髙大小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解非一朝一夕之故其所由來者漸矣易如彼雨雪先集維霰詩今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉君子之道造端乎夫婦及其至也察乎天地中庸子合抱之木生於毫末九層之䑓起於累土千里之行始於足下老子方寸之木可使髙於岑樓孟子夫江始出於岷山其源可以濫觴及其至於江津不舫舟不避風不可以渉家語又荀子江河之水非一源而流墨子丘山積卑而為高江河合水而為大日計之不足嵗計之有餘荘子山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑚蝎非木之蠧然而能以㣲脆之形陷堅剛之體豈非積漸之致也乎孔叢子互見柔能勝剛月不足而嵗有餘者也管子跬歩不休跛鼈千里累土不輟丘山崇成荀子積土成山風雨興焉積水成淵蛟龍生焉積土謂之山積水謂之海旦暮積謂之嵗積善而全盡謂之聖人聖人者人之所積也不積蹞歩無以致千里不積小流無以成江河荀子蚯蚓穿隄能漂一邑寸烟泄突致灰千室劉子水積則生吞舟之魚土積則生楩楠豫章尹子三代之善千嵗之積譽也桀紂之謗千嵗之積毁也互見毁譽善積則功成非積則禍極江水之始出於岷山也可褰衣而越也及至其下洞庭騖石城經丹徒起波濤舟航一日不能濟也若火之得燥水之得濕浸而益大生木之長不見其益有時而修砥礪磨礱莫見其損有時而薄夫積愛成福積怨成禍淮南子史階之為禍左隠三年積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也衆少成多積小致鉅董仲舒𫝊聚蚊成雷衆喣漂山西漢中山靖王勝𫝊磨礱砥礪不見其損有時而盡種植畜養不見其益有時而大積徳累仁不知其善有時而用弃義背理不知其惡有時而亡太山之霤穿石單極之䋁斷幹水非石之鑚索非木之鋸漸靡使之然也枚乗𫝊安者非一日而安也危者非一日而危也皆以積漸然不可不察也前賈誼𫝊壊崖破岩之水源自涓涓干雲蔽日之木起於青葱後漢丁鴻𫝊隄潰蟻孔氣泄鍼芒陳忠𫝊聚蚊成雷第五倫傳積日成月後漢積忤生憎積順生愛通鑑唐𤣥宗紀𫝊記戎人生乎戎而戎言楚人生乎楚而楚言不知所以受也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言也吕氏春秋互入慣習集水漸成江海桓寛鹽鐵論膚寸自成霖曹子建詩蟻孔潰河溜沈傾山𫝊子由銘髙以下基洪由纎積累㣲以著張茂先勵志詩蟻壤漏山河絲淚銷金骨選君子有所思堅冰作於履霜尋木起於蘖栽文選還聞膚寸隂能致彌天澤蚊聚雷侵室山漸而髙澤積而長劉賓客集直從萌芽㧞髙自毫末始千里始足下髙山起㣲塵繡始一縷萬縷相續白侍郎集涓涓不遏終變桑田燄燄不除方燎原野陸宣公文溜之細穿石綆之細斷幹雖一勺而進可以浸天壤一拳之積可以鎮方域積訛成蠧唐文粹一息之波流於無垠皮日休集本從敲石光遂致烘天熱劉禹錫詩本沔彼濫觴蛙跳鯈逰溢而懐山神禹所憂一炬有燎原之憂而濫觴有滔天之禍東坡冉冉百尺松起自一寸根欒城集宦者之禍始於明皇盛於肅代成於徳宗極於昭宗司馬温公通鑑唐昭宗論漸染經卿士師師非度互見同惡敝化奢麗萬世同流商俗靡靡利口惟賢餘風未殄書螟蛉有子蜾蠃負之教誨爾子式榖似之詩子與善人居如入芝蘭之室乆而不聞其香即與之化矣與不善人居如入鮑魚之肆乆而不聞其臭亦與之化矣家語引而置之荘嶽之間數年雖日撻而求其楚不可得也孟子白泥在沙與之皆黑曽子蓬生麻中不扶自直習俗移志安乆移質工匠之子莫不繼事而郡國之民安習其服居楚而楚居越而越居夏而夏是非天性積習使然也蘭茝槀本漸於蜜醴荀子蘭陵多善學盖以荀卿也荀子後序扁鵲盧人也而醫多盧螟蛉之子殪而逢蜾蠃祝之曰類我類我乆則肖之矣揚子今頭虱著身皆稍變而白身虱處頭皆漸化而黑是𤣥素果無定質移易存乎所漸抱朴子史鄒魯多去文學而趨利者以曹邴氏也史記貨殖𫝊生子多置之齊魯禮義之鄉史記三十世家互見教子漸靡使然西漢衡山王𫝊夫習與正人居之不能無正習與不正人居之不能無不正猶生長於楚之地不能不楚言也賈誼𫝊靈蓍在林林無毒草後漢學之染人甚於丹青晉虞傅𫝊謝安好聲律朞功之慘不廢絲竹士大夫效之遂以成俗通鑑晉文帝紀性無常守隨化而遷化於敦樸者則質直化於浮澆者則浮薄北史蘇綽𫝊閭里童昬貴逰總丱未窺六甲先製五言至如羲黄舜禹之典伊傅周孔之說不復闗心何常入耳通鑑善惡之習朝夕漸染易以移人通鑑唐髙祖紀陽城有奴都児化其徳亦方介自約時嵗飢或哀其餒與之食不納唐書本傳𫝊記劉子政子駿伯玉三人珍重左氏下至婦女莫不誦讀魏畧髙祖徙豐沛屠酟商人立為新豐縣故一縣多小人三輔舊事鄭𤣥家奴婢讀書一婢不稱㫖使人拽着泥中須臾一婢來問曰胡為乎泥中答曰薄言往愬逢彼之怒世説集京洛多風塵素衣化為緇陸士衡贈婦漸禮樂之膏腴選運命論蝨處頭而黑麝食柏而香頸處險而癭齒居晉而黄蒸性染身莫不相應嵇叔夜養生論淫風大行貞女䝉冶容之誨淳化殷流盜跖挾曽史之情陸士衡瀟湘間無土山無濁水民乗是氣往往清慧而文劉賓客集麗朱者丹附墨者黑盖累漸而得之也王無功芳蘭所生其草皆香美玉所積其山有光吕和叔文本朝禮義之家雖奴婢出而之他必能笑人之䘮祭無禮者賢者之效不為細也横渠理窟温公營獨樂園園子吕直性愚以直名之春時人逰園園子得茶湯錢十千閉園日與主人平分之一日來納公公曰此自汝錢可持去再三欲留公怒遂持去回顧曰只端明不愛錢者後十許日公見園中新創一井亭問之乃前不受十千所創也元城語録太史公曰盖公言黄老賈誼晁錯明申韓錯不足道也而誼亦為之余是以知邪說之移人雖豪傑之士有不免者東坡六一居士集序滿盈經月盈則食易滿招損書子孔子曰惡有滿而不覆者哉家語滿則覆荀子史盈必毁天之道也左哀公十一年重侯累将窮貴極富王商等贊變中有常經輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要書子珠之走盤横斜曲直不可盡知所必可知者珠不出於盤也孫子序與時遷徙與世偃仰千舉萬變其道一也荀子本朝如日在天雖光明無所不臨而躔次必有所舎東坡賜奉安神宗御容札使詔動中有静經屯見而不失其居天下之動貞夫一者也易子心未嘗不動也然而有所謂静荀子為無為事無事老子史鄭崇曰臣門如市臣心如水漢書𫝊記動者静之基道經集結廬在人境而無車馬喧陶淵明詩蘋末風起有文無聲劉賓客集動兮静所伏白居易静中有動經夫動不能制動制天下之動者貞夫一者也易畧井居其所而遷寂然不動感而遂通天下之故易静而後能安安而後能慮記大學子道常無為而無不為静為躁君老子尸居而龍見淵黙而雷聲虛則静静則動動則得矣荘子集静兮動所倚白居易動静交相養賦弱中有强經坤至柔而動也剛易仁者必有勇論語子慈故能勇天下柔弱莫過於水而攻堅强者莫之能勝夫慈以戰則勝以守則固老子風曰予蓬蓬然起於北海而入於南海然而指我則勝我鰌我亦勝我雖然夫折大木蜚大屋者惟我能也故以衆小不勝為大勝也荘子以静觀動子坐於室而見四海荀子憑几看魚樂杜詩本朝解組歸來道益光坐看萬物自炎凉東坡詩松柏生澗壑坐閲草木秋金石在波中仰看萬物流山谷詩遂令髙卧人欹枕觀兒戲邵康節記纂淵海卷六十六
