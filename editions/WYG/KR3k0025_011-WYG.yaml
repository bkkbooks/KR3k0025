body:
  text: 記纂淵海卷十一宋潘自牧撰郡縣部江南西路江州倚郭一外縣四徳化徳安瑞昌湖口彭澤定江軍節度江西路安撫司沿江制置司郡號潯陽九江定江彭澤盆城敷淺湖口湓浦定江軍州沿革斗牛之分禹貢荆揚二州之域春秋吳楚之境戰國楚地秦九江郡地漢廬江豫章二郡地吳廬江武昌二郡地晉惠帝置潯陽郡初治豫章成帝移地尋陽兼置江州隋大業改九江郡唐江州潯陽郡屬江南道五代為吳楊氏之地南唐李氏陞奉化軍節度沿革表縣沿革徳化本漢廬江郡潯陽縣又豫章郡柴桑縣吳潯陽屬蘄春郡柴桑屬武昌郡晉復屬廬江永興以二縣置潯陽郡咸康中自豫章徙江州治此義熙省潯陽入柴桑縣梁又立汝南縣隋廢汝南柴桑二縣立潯陽縣開皇改曰彭蠡大業改湓城唐武徳復曰潯別析置湓城尋廢之南唐改今名徳安本漢豫章郡歴陽縣地又云柴桑縣地晉屬鄱陽郡南朝省之五代吳順義七年置徳安縣瑞昌本漢柴桑縣地唐建中置赤烏場南唐置瑞昌縣湖口本漢潯陽縣地唐武徳湖口鎭南唐陞為縣彭澤本禹貢彭蠡澤之西漢置彭澤縣屬豫章晉永嘉屬潯陽郡元帝又置上甲縣義熙省之宋省彭澤後復置梁置太康郡隋平陳郡縣並廢置龍城縣開皇復曰彭澤唐武徳置浩州又置樂城縣八年州廢屬江州沿革表形勝廬山在徳化縣山之南即南康軍濓溪在州南以周茂叔隠居得名有書院大孤山在徳化縣小孤山在彭澤縣龍溪在徳化龍泉在廬山鶴問湖在徳化西蛾眉洲在彭澤縣東柴桑山在徳化西南梧桐嶺在瑞昌東南石鼓山在徳安西北石鐘山在湖口玉峯洞在瑞昌金闕岩正對天子陣彭蠡湖在徳化縣東輿地紀勝人物晉陶侃周訪為友陶潛著五栁先生傳以自况周續之劉遺民與陶潛為潯陽三隠唐元結自號瀼溪浪士皇朝周敦頥本道州人後隠居濓溪上李受李東之告老英宗命朝士賦詩送之時以比漢二疏義門陳氏在徳化縣太宗曰真良臣也陳兢十四世同居輿地紀勝集攀巖照石鏡牽葉入松門三江事多往九𣲖理空存靈運浪生湓浦千層雪雲起爐峯一炷煙來眀廬峯連刻削湓浦帶縈紆劉禹錫樓閣宜賓客江山入好詩大江寒見底康山青倚天深夜湓浦月平旦廬峯煙樂天湓浦逺横簾幕外廬山清落酒盃中李白欲識九回腸斷處潯陽逺水九條分元微之本朝江州舊屬江東路紹興改𨽻西路陞定江軍節度沿革表今上移置帥司扵此兼沿江制置邸報集山為匡仙傳舊姓溪因亷士得清名願持一勺去南海直使貪泉千古清穆傑潯陽欲歸田彭澤先解綬有琴何必弦無詩不言酒秋黄籬下菊春綠門前栁前人題靖節詩夜泊潯陽宿酒樓琵琶亭畔荻花秋雲收鳥沒事已往月白風清江自流王安國隆興府倚郭二外縣六南昌奉新新建豐城分寧武寜靖安進賢郡號南昌豫章洪都豐城鎭南洪井章郡府沿革斗分野又云星分翼軫禹貢揚州之域春秋楚東境吳西境戰國屬楚秦九江郡地漢淮南國分置豫章郡晉元康兼置江州治此後移治武昌潯陽隋平陳廢郡置洪州大業復為豫章郡唐曰洪州天寶曰豫章郡為江南西道採訪使治所咸通陞鎭南軍節度南唐改南昌府曰南郡沿革表縣沿革南昌本秦九江郡南部漢髙帝置為郡治東漢置縣陳分置西昌縣隋開皇改南昌為豫章縣大業復名南昌後廢之唐武徳置南昌縣置孫州六州復置豫章縣後州廢省南昌寶應改豫章曰鍾陵貞元又改南昌新建本東漢南昌縣地陳分置西昌縣大業廢之唐武徳五年復置屬孫州八年州縣並廢本朝置新建縣奉新本漢海昏縣地東漢置新吳縣隋省入建昌唐永淳復置南唐改為奉新縣豐城本南昌縣地吳分置富城縣屬豫章郡晉太康改富城曰豐城梁改屬巴山郡隋省之開皇復置廣豐縣後避諱復為豐城唐改曰吳臯尋復故分寧本漢豫章郡艾縣地東漢建安分置西安縣隋省艾縣入建昌唐貞元析武寧置分寧縣武寧本海昏艾縣地東漢建安中孫權分置西安縣晉太康改豫寧縣隋省入建昌唐長安復置武寧縣景雲改豫寧寶應復今名靖安本東漢建昌縣地唐廣眀分置靖安縣五代吳楊氏廢為場南唐復置進賢本漢南昌縣地晉武帝分置鍾陵縣隋廢之唐武徳復置八年廢為進賢鎭入南昌本朝陞為縣地理沿革表形勝滕王閣在城西唐髙祖子滕王元嬰所建潘公園本宋齊丘園潘修真建清逸樓號一郡之勝西山在新建縣西大江之外許吳真君上昇之處係第十二小洞天南山在分寧縣東湖在郡東南鳳山在分寧多靈草龍湫在豐城有石可琢硯劒池在豐城鐵柱子在城南許真君鑄以鎭蛟龍風雨山在南昌日月湖在進賢北冷暖水在分寧西二泉相去數尺玉隆觀在新建縣界舊名逰帷觀金鍾湖在天寶洞上投書渚在石頭渡即殷洪喬投書處磨劒池在分寧東許真君磨劒扵此紀勝人物漢徐穉字孺子陳蕃在郡特設一榻禮之晉許真君名遜斬蛟而昇天吳真君名猛師事許君飛昇唐謝小娥嫁段居正死扵盜小娥能報讐見唐書列女傳本朝陳恕號真塩鐵使其子執中趙庶眀寶元間上書言趙元旻必叛黄亞夫生子庭堅號山谷先生潘淳師事山谷自稱谷口小隠紀勝集南昌城郭枕江煙漳水悠悠浪拍天芳草綠遮仙子宅落花紅襯賈人船韋莊城樓枕南浦日夕顧西山丹井今猶在洪崖乆不還張曲江洪崖枕上秋月明野客枕底漳江清蓬壺宫闕不可夢一一入樓歸鴈聲陳陶雲歸洪井枚柯斂水下漳江氣色麄羅隠滕閣丹青倚漳江碧玉奔杜牧本朝軍額因唐隆興元年以潛藩昇隆興府太平興國六年析南昌縣置新建縣與南昌分治崇寧二年昇進賢鎭為縣沿革表集南昌為郡好樓閣枕江湄地暖春生早山寒日下遲陳堯佐千里名城楚上逰穴劔龍藏匣池仙羽作裳分野遺荆俗經綸屬漢疆蒲輪徐