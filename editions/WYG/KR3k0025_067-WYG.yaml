body:
  text: 記纂淵海卷六十七宋潘自牧撰人己部人已兩得經觀頥觀其所養也自求口食觀其自養也易謀其身不遺其友禮記惟天下至誠為能盡其性能盡其性則能盡人之性誠者非自成己而已也所以成物也中庸集愷悌以肥家信義以急人唐文粹人已兩失史申叔時曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左𫝊互見施報兩失世之亂也君子稱其功以加小人小人伐其技以馮君子左襄十三丞相田蚡言灌夫家在潁川横甚民苦之灌夫亦持丞相隂事為姦利受淮南王金史灌夫𫝊楚軍食少項王患之乃為髙爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一杯羮通鑑漢髙祖紀集楚則失矣而齊亦未為得也司馬相如上林賦互入此莫笑彼陵雖孤恩漢亦負徳文選李陵書施報兩得經投我以桃報之以李詩以徳報徳論語子君之視臣如手足則臣視君如腹心孟子集美人贈我錦繡段何以報之青玉案美人贈我金錯刀何以報之英瓊瑤文選張平子四愁詩施報兩失經子弗祗服厥父事大傷厥考心於父不能字厥子乃疾厥子於弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友於弟書子惡聲至必反之君之視臣如犬馬則臣視君如國人君之視臣如草芥則臣視君如冦讐殺人之父人亦殺其父殺人之兄人亦殺其兄孟子史牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左宣十一互入人已兩失劉穆之往妻兄家乞食多見辱江氏後有慶㑹属令勿來穆之猶往食畢求梹榔江氏兄弟戲之曰梹榔消食君乃常飢何忽須此妻市肴饌為其兄弟以餉穆之穆之為丹陽尹召妻兄乃令厨人以金柈貯梹榔一斛進之宋書本傳互入妻家及報怨兩門責己恕人經與人不求備檢身若不及書躬自厚而薄責於人則逺怨矣不患人之不己知患不知人也攻其惡無攻人之惡論語史晉敗秦師於殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥公許之秦伯鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪左𫝊僖公三十三年漢主曰孤負黄權權不負孤也通鑑魏文紀劉洪専督江漢謀事有成者則曰某人之功也如有負敗則曰老子之罪陸贄曰寧人負我無我負人通鑑李廣曰諸校尉無罪乃我自失道吾今自上簿至幕府前本傳傳記人之有徳於我也不可忘也吾有徳於人也不可不忘也戰國䇿集君子謹乎約己𢎞乎接物典論古之君子其責己也重以周其待人也輕以約韓文本朝以恕己之心恕人則仁不可勝用矣以責人之心責己則義不可勝用矣言行録恕己責人經縱我不往子寧不嗣音詩非諸人行諸己禮記不能正其身如正人何其身不正雖令弗從論語子身不用禮而望禮於人身不用徳而望徳於人家語吾未聞枉己而正人者也况辱己以正天下乎孟子志不免於曲私而兾人以己為公也行不免於汙漫而兾人以己為修也身不善而怨人不亦反乎荀子行非其所履以督人是猶笞父而責人以大舜之節罵母而規人以曽閔之行唐子史宋子明謂桐門右師曰吾有衰絰而子擊鐘何也右師曰已衰絰而生子余何故舎鐘左定九年互入敏於應對已則無禮而責於有禮者女何故行禮左傳鄧艾謂宗預曰禮六十不服戎而卿受兵何也預答曰卿七十不還兵我六十何為不受耶蜀志曹操曰寧我負人無人負我三國魏志己無能而望他人用己無善而望他人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎唐書柳玭𫝊𫝊記財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君戰國䇿晉平公使工為弓三年乃成射不穿一札公怒将殺工烈女傳集其責人也詳其待己也亷詳故人難於為善亷故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣是不亦待於己者已亷乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是謂不以衆人待其身而以聖人望於人韓文原毁不知清己之慮而惡人之譁柳文譽己毁人𫝊記齊席毗毗一作玭清幹之士􅅓鄙文學嘲劉逖云君輩詞藻譬若朝菌須臾之玩非宏才也豈比吾徒千丈松常有風霜不可彫悴顔氏家訓集辯士多毁訾不聞談己非唐文粹本朝韓浦韓洎咸有詞學浦嘗輕洎語人曰吾兄為文譬如繩樞草舍聊庇風雨予之為文是造五鳳樓手楊文公筆談薄己厚人經君子貴人而賤己先人而後己禮記子勞苦之事則争先饒樂之事則能讓荀子史小自潤之時師古曰言所潤益於己者當減小之西漢谷永傳薛包篤行父母服除子弟求分財異居包不能止乃中分其財奴婢引其老者曰我共事乆若不能使也田廬取其荒廢者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也漢書范震為司徒田不過一頃復推與兄子後漢郭林宗減三牲之具以供賓旅通鑑漢桓紀流民萬餘户入縣界韓韶開倉賑之主者争謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣通鑑温大雅将改𦵏其祖父筮者曰𦵏於此地害兄而福弟大雅曰若得家弟永康我将含笑入地𦵏訖嵗餘而卒唐書弟彦愽也𫝊記閔子騫為後母所苦冬月以蘆花衣之以代絮父知之欲出後母子騫曰母在一子寒母去三子單父遂止孝子傳集劉禹錫刺播州子厚泣曰播非人所居夢得親在堂且萬無母子俱往理将拜疏願以柳易播韓作柳銘削衣貶食不立資遺以班親舊為友為義擔石之儲常空於私室方丈之食每盛於賓筵韓文厚己薄人子豐取刻予荀子史今銅鞮之宫數里而諸侯舎於隷人門不容車而不可踰越左襄三十一勤民以自封國語楚不損用而大自潤西漢谷傳董卓小孫七嵗愛之以為己子至殺人之子如蚤蝨耳本𫝊平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給通鑑後唐明宗互入貪汙本朝有毁其一錢之錐必失色而營䕶之至乃一怒而刀鋸百生一饞而葅醢千命容態恬然曽視一錢之錐不若金玉已生沙礫人命鳴道集利己害人經季武子成寢杜氏之𦵏在西階之下夷人冢墓以為宅禮記子以鄰國為壑孟子史毁人以自成左𫝊集法吏多少年磨淬出角圭將舉汝愆尤以為己階梯韓集為己經貨力為己以功為己禮記子楊子取為我拔一毛而利天下不為也孟子楊子曰世故非毛所濟列子史奉己而已不在民矣左𫝊杜密曰劉勝位為大夫知善不薦聞惡無言隠情惜已自同寒蟬後漢私自潤入通鑑晉紀集入門各自媚誰肯相為言長城窟以己體人經無自廣以狹人書大夫䟦渉我心則憂詩鄰有䘮舂不相里有殯不巷歌禮記所惡於下毋以事上所惡於上毋以使下大學施諸己而不願亦勿施於人中庸己欲立而立人己欲達而達人子食於有䘮者之側未嘗飽也子貢曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人我不欲人之加諸我也吾亦欲無加諸人論語史晉荀吳圍鼓鼔人或請以城叛穆子曰或以吾城叛吾所甚惡也人以城來吾獨何好焉左昭十五楚王曰人之愛其子也亦如余乎左昭十二晉祖逖牙門童建毅殺内使周密降後趙石勒勒輒送首於逖曰叛臣逃吏吾之深仇將軍之惡也猶吾惡也通鑑晉元紀互入疾惡蘧伯玉耻獨為君子東漢顧榮與同寮宴見執炙者有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不知其味庾亮所乗馬有的顱殷浩以為不利於主勸亮賣之亮曰何有己之不安而移之於人晉本傳秦王堅召代長史燕鳳問代所以亂故鳳具以状對堅曰天下之惡一也乃執寔君及斤至長安車裂之通鑑晉武紀隂鏗嘗與賓客宴飲見行爵者因回酒炙以授之曰吾儕終日酣酒而執爵者不知其味非人情也南史山南地熱上以軍士未有春服亦自御裌衣通鑑徳宗集衆鳥欣有託吾亦愛吾廬陶淵明視人之瘼如疽在身劉賓客穏暖皆如我天下無寒人白樂天若知其心安而思所以安人其性適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勞勞一作勤吕和叔文𫝊記晏子曰古之賢者飽而知人飢温而知人寒晏子春秋以己度人子埳井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎荘秋水互入見聞淺狹羣蟻觀鼇隠如岳蟻曰彼之冠山何異我之戴粒逍遙封壤之顛伏乎窟穴也符子集離婁㣲睇兮瞽以為無明楚辭已嗜臭腐養鴛雛以死䑕嵇叔夜書本朝此戰國䇿士以己度伊尹者也東坡臆度經他人有心予忖度之詩億則屢中論語反己經自我致戎又誰咎也易小人怨汝詈汝則皇自敬徳責人斯無難惟受責俾如流是惟艱哉書子曰三人行必有我師焉擇其善者而從之其不善者而改之論語正己而不求於人則無怨記中庸君子求諸己子曰見賢思齊焉見不賢而内自省也君子病無能焉不病人之不己知也不患人之不己知患其不能也内省不疚夫何憂何懼論語互入無愧子吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣荘子愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己自反而不縮雖褐寛博吾不惴焉自反而縮雖千萬人吾往矣射者正己而後發發而不中不怨勝己者反求諸己而已矣有人於此其待我以横逆則君子必自反也孟子曽子曰同逰而不見愛者吾必不仁也交而不見敬者吾必不長也臨財而不見信者吾必不信也三者在身曷怨人見善翛然必有以自存也見不善愀然必有以自省也荀子與其譽堯而毁桀也不如掩聰明而反修其道也淮南子李密問英雄子曰自知曰英自勝曰雄文中子史楚椒舉曰無瑕者可以戮人左昭四年富辰曰吾兄弟之不恊焉能怨諸侯之不睦左𫝊僖二十三心茍無瑕何恤乎無家左閔元年鄭人㳺於鄉校以論執政然明欲毁之子産曰我聞忠善以損怨不聞作威以防怨左襄三十二年縱彼不言籍獨不愧於心乎史記項羽紀臨川羨魚不如歸而結網西漢揚雄𫝊互入先欲自攻聞觀物之智為反己之察東漢馬援𫝊人有毁己當退而求之於身若己有可毁之行則彼言當矣若己無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫如重裘止謗莫如自修斯言信矣通鑑魏明紀顔含曰吾聞伐國不問仁人向馮祖思問佞於我我豈有邪徳耶通鑑晉紀阮裕在剡曽有好車借無不給有人𦵏母意欲借而不敢言後裕聞之歎曰吾有車而使人不借何以車為命焚之晉書楊昭儉曰刻石紀功不若降哀痛之詔染翰稱美不若頒罪己之文通鑑晉髙祖盜發郭子儀父冡捕之不獲人以魚朝恩素惡子儀疑其使之子儀自奉天入朝朝廷憂其為變子儀見上上語及之子儀流涕曰臣乆將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也朝廷乃安通鑑大歴元年集齊生兄為時名相朝之碩臣皆其舊友齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司豈枉我哉我将利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既不得志矣而曰我未至也不以闗於有司其不亦鮮乎哉韓文送齊生下第序本朝君子與小人處為小人侵陵則修省畏避動心忍性増益預防老泉不能反己經不善學者師勤而功半又從而怨之禮記小人求諸人論語集鏡明不自照盧仝集溺井而怨伯益失火而怨燧人同上苛責於人經魯人有朝祥而暮歌者子路笑之夫子曰由爾責於人終無己夫禮記子曰小人使人也求備焉論語子苛煩者難為恭譙子責三光不照於覆盆之内抱朴子史孫季舒與石崇酣燕慢傲過度崇欲表免之裴楷謂崇曰足下飲人狂藥責人正禮不亦乖乎晉裴楷𫝊庫狄伏連居室患蠅杖門者曰何故聽入北史集自拳五色毬迸入他人宅却捉蒼頭奴玉鞭打三百詩話不任己意附虛心經君子以虛受人易舍己從人書子古之王者知雖落天地不自慮也辨雖彫萬物不自說也能雖盖海内不自為也荘子史昔周公朝讀百篇書夕見七十士猶恐不足通鑑惟不自用乃能用人通鑑唐徳宗李絳或乆不諫上輒詰之曰豈朕不能容受耶将無事可諫也通鑑唐憲宗𫝊記以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也太公六韜集虛舟應物駱賓王幽谷無私有至斯響洪鐘虛受無來不應頭陀寺碑本朝萬事轉頭同墮甑獨身浮世若虛舟詩話専擅經權臣擅命詩序愚而好自用賤而好自専中庸子愚者好専事而妬賢能荀子鷄有専栖之雄雉有擅澤之鷮抱朴子史鄭子孔之為政也専國人殺之左襄十九祭仲専鄭伯患之左成十五子産曰衆怒難犯専欲難成左襄十年盧蒲嫳聽政於其家左傳齊髙止好以事自為功且專故難及之左襄二十九年臧文仲曰以人從欲鮮濟左僖二十專聽生姦獨任成亂通鑑梁武紀擅利擅害通鑑秦紀盧把秉政為吏部侍郎闗播為中書侍郎同平章事上嘗與宰相論事播意有所不可起立欲言把目之而止遂至中書把謂播曰以足下端慤少言故相引至此向者柰何發口欲言耶通鑑唐徳宗作威福於廟堂之上前漢諸侯王専則人實敝之前漢五行志専權自恣史趙髙傳春秋之義亡遂事漢家之法有矯制前漢馮奉世𫝊以匹夫之細竊殺生之權西漢㳺俠傳田蚡為丞相薦人或起家至二千石權移主上上曰君除吏盡未吾亦欲除吏嘗請考工地益宅上怒曰君何不遂取武庫西漢田蚡𫝊集専塲誇觜距韓集舍己狥人經舍爾靈龜觀我朶頥凶易子人病舍其田而芸人之田所求於人者重而所以自任者輕為之詭遇一朝而獲十孟子史黄歇與太子謀曰初歇與太子為質於秦不如亡秦與使者俱出臣請以死當之太子因變服為楚使者御以出闗而黄歇守舍常為太子謝病度太子已逺乃自言於王曰楚太子已歸出逺矣歇願賜死通鑑周紀李雲上書帝怒下有司逮雲時𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死通鑑漢桓紀朱震收𦵏陳蕃尸匿其子逸事覺繫獄合門桎梏震受考掠誓死不言逸由是得免通鑑漢靈紀侍御史景毅子顧為李膺門徒未有録牒不及於譴毅慨然曰本謂膺賢遣子師之豈可以脫漏名籍茍安而已遂自表免通鑑漢靈紀集士有經世籌自無活身䇿山谷勞己為人子為淵􅇌魚者獺也為叢􅇌雀者鸇也互入與人為地墨子兼愛摩頂放踵利天下為之孟子史梁武帝曰朕三更出治事事少午前竟事多日昃方食昔腰腹過於十圍今之瘦削裁二尺餘為誰之咎救物故也通鑑本紀集如何織紈素自著藍縷衣孟東野賓客歡娛僮僕飽始知官職為他人白樂天集互入省悟及與人為地年年道我蠶辛苦底事渾身着苧衣杜荀鶴集蠶老繭成不庇身蜂飢蜜熟屬他人白樂天記纂淵海卷六十七
