body:
  text: 記纂淵海卷五十五宋潘自牧撰論議部方興未艾經如川之方至以莫不增詩子曰吾見其進也未見其止也語子若火之始然泉之始達孟刀刃若新發於硎莊日出𤾉谷登於扶桑淮南子赫赫乎日出之光揚子傳記少而學者如日出之光劉向集車輕御良馬力優咄哉識路行未休韓集悠悠指長道去去策髙駕若健者之升梯舉足愈多身愈髙人愈仰之耳栁文鴻漸之姿當從此始白樂天如日不滅如海不竭吕温集觀其逸足駸駸方將摶扶搖而凌泰清獵遺風而薄嵩岱吾見其進未見其止韋應物本朝羨子年少正得路有如扶桑初日升歐公清塗方踐逺業難量東坡光燄不長經否終則傾何可長也枯楊生華何可乆也日昃之離何可乆也並易雨雪瀌瀌見晛曰消詩翰音登于天何可長也易子七八月之間雨集溝澮皆盈其涸也可立而待也孟飄風不終朝驟雨不終日老朝菌不知晦朔朽壤之上有菌芝者生於朝死於晦列雲霧之盛須臾而訖暴雨之盛不過終日魏子史當世則榮沒則已焉史記以色事人者色衰而愛弛愛弛則恩絶朝為榮華夕而憔悴並西漢相聚偷生若魚遊釡中喘息須臾間耳後漢朝華之草夕而零落魏王昶傳傳記老而學者如秉燭夜行劉向江河之溢不過三日飄風暴雨須臾而畢說苑集君寧見階上之白雪豈鮮耀於陽春惠連蕣榮不終朝蜉蝣豈見夕郭景純迫此短景急繁華能㡬時杜朝蠅不須驅暮蚊不可拍得時能㡬何與汝恣啖咋涼風九月到掃不見蹤跡韓詩隨風隔幔小帶雨傍林微十月清霜重飄零何處歸病葉多先墜寒花只暫香並杜以色事他人能得幾時好李白潢潦無根源朝滿夕已除韓􅅲之浮雲上天雨墮地暫時㑹合終離異張文昌危蒂㡬時容元稹寒灰埋暗火曉焰凝殘燭白樂天況君春風面柔促如芳草鏡中桃李色不得十年好幕燕鼎魚偷活頃刻朝為拂雲花暮為委地樵同上頗同狐䑕乘夜睢旴晨光既升勢自跧縮陸宣公亦猶小星將墜則芒焰驟俱司空表聖文過春花自落竟曉月空明許用晦如鳥雀啁啾聲㫁便已皇甫湜偷延晷刻王維本朝草木榮華之飄風鳥獸好音之過耳出歐文浮雲無根蔕潢潦能須臾春冰無貞堅歐文世言春寒秋熱老健為此三者終是不乆長之物並歐試問冰霜堅春來能乆牢欒城集一視同仁經雲行雨施天下平也易普天之下莫非王土率土之濵莫非王臣無此疆爾界並詩大道之行也天下為公故人不獨親其親不獨子其子外户不閉是謂大同故聖人以天下為一家以中國為一人貨惡其棄於地也不必藏於己力惡其不出於身也不必為己並禮四海之内皆兄弟也語子楚王失弓左右請求之王曰楚王失弓楚人得之又何求之孔子曰惜乎其未大也不曰人遺弓人得之何必楚也家語自其同者視之萬物皆一也莊史封略之内何非君土食土之毛誰非君臣左四海之内若一家秦紀六合怡怡比屋為仁一天下之衆異齊品類之萬殊參差同量坏冶一陶後漢集四海皆兄弟誰為行路人蘇武和氏之璧焉得獨耀於郢握夜光之珠何得專玩於隋掌天下之寶當與天下共之劉越石惟同大觀萬殊一轍盧子諒澤無不漸螻蟻之穴靡遺齊故安陸碑桃李有竒質樗櫟無妙姿皆承慶雲沃一種春風吹歐六合棲霖雨萬物無凋枯李安得廣厦千萬間大庇天下寒士皆懽顔杜聖人一視而同仁視外猶視中一家猶一人並韓誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也恵不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也歐慶雲所潤不遺於荆棘王維憶年十五學搆厦有意葢覆天下窮元稹憂人骨肉同姚少監在西而東均處内而外肥惟天之意莫遺於微細如日之輝不隔於幽逺並韓甞欲大潤澤於天下一物枯槁以為身羞臨川畢竟春風不揀擇隨開隨落自勻勻欒城爭得大裘長萬丈與君都葢洛陽城禾黍與稂莠雨來同日滋白侍郎肝膽楚越子自其異者視之肝膽楚越莊史舟中之人盡為敵國史記謝𤣥子煥煥子靈運才藻贍逸𤣥曰我尚生煥煥那得不生靈運晉書集失之者肝膽楚越唐徐彦伯本朝肝膽猶能楚越如東坡不以言取經孔子曰今吾於人也聽其言而觀其行語趙文子其言呐呐然如不出諸其口君子不以辭盡人並禮子曰君子不以言取人語子孔子欲以言辭取人於宰我失之矣家語史相如口吃而善著書史記倪寛敏於文口不能發明也史記儒林傳劉儒口訥而心辨後漢張釋之曰周勃張相如稱為長者兩人言事曽不出口漢文紀以言取人史孔子曰吾以言取人失之宰予史文帝登虎圏問上林尉禽獸簿不能對嗇夫從旁代對響應亡窮詔拜嗇夫為上林令前漢張釋之傳楊愔典選多以言取人後魏朱朴自言得為宰相月餘可致太平上以為然以朴同平章事朴為人庸鄙迂僻無他長制出中外大驚唐昭紀不以貌取經趙文子其中退然如不勝衣其言呐呐然如不出諸其口禮記子孔子欲以貌取人於子張改之矣澹臺有君子之容而行不勝其貌家語相形不如論心荀卿非相徐偃王之狀目可瞻焉不能俯視細物逺望纔見焉仲尼之狀面如􅀈倛方相也周公之狀身如斷菑臯陶之狀色如削𤓰閎夭之狀面無完膚傅說之狀身如植鰭如魚立也伊尹之狀面無須麋禹跳湯偏堯舜參眸子二瞳桀紂長巨姣美天下之傑筋力越勁百人之敵然身死國亡為天下大僇後世言惡則必稽焉今世俗之亂君鄉曲之儇子莫不美麗佻冶竒衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願以為士然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友楚孫叔敖突禿長左而以楚霸葉公子髙微小短瘠行若將不勝其衣而白公之亂誅白公定楚國如反手耳並荀卿史晉叔向聘鄭鄭鬷蔑立於堂下一言而善叔向曰子少不颺子若不言吾㡬失子矣左太史公以為留侯魁梧竒偉至見其圖狀如婦人女子史記嚴延年為人短小精悍敏㨗於事雖子貢冉有通於政事不能過也舜葢重瞳子項羽又重瞳子並西漢何休質朴訥口而雅有心思東漢周燮生而斂頤折額醜狀駭人其母欲棄之而其父曰賢聖多有異貌興我宗者乃此兒也於是養之後漢魏主指崔浩曰汝曹視此人尫纎懦弱不能彎弓持矛然其胷中所懐乃過於甲兵宋紀齊孟業為法曹王岳見其容貌短小笑而不言及尋斷決之處謂業曰卿決斷之明可謂有過軀之用三國典畧侯景右足偏短弓馬非其長而多謀筭梁髙祖虞世南外若不勝衣而中抗烈唐書魏徵容貌不逾中人而有膽略唐紀太學博士周捨舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀劉璠梁典集子雖軀幹小老氣横九州杜脈不病雖瘠不害脈病而肥者死矣韓文雖長不滿七尺而心雄萬夫唐文粹伯倫之形不妨賢士晏子短而相齊蔡義小而佐漢髙柴至惡推至孝於孔門並白帖本朝晏嬰不滿六尺長髙節萬仭陵首陽東坡以貌取人史以貌取人失之子羽史孟甞君之趙趙人出觀之笑曰始以薛公為魁然也今視之眇小丈夫耳史記龔遂召見形貌短小宣帝望見不副所聞心内輕焉前漢江充為人魁岸容貌甚壯武帝望見而異之曰燕趙多竒士息夫躬傳親見揚子雲禄位容貌不能動人故輕其書揚雄傳楊愔典選多以貌取人時謗云尚書典選似貧人買瓜唯取大者後魏書履而後知經學然後知不足教然後知困知為人子然後可以為人父知事人然後能使人並禮子不臨深淵何以知没溺之患不觀巨海何以知風波之患家語不登髙山不知天之髙不臨深溪不知地之厚不聞先王之遺言不知學問之為大荀震風凌雨然後知厦屋之為帡幪也虐政虐世然後知聖人之為郛郭也揚乆乆臨事當自知之文中子史齊髙彊曰三折肱知為良醫左周勃下廷尉吏稍侵辱之勃以千金與獄吏吏乃書背牘示之勃既出曰吾甞將百萬軍然安知獄吏之貴乎史記百聞不如一見臣願馳至金城圖上方略趙充國傳畫地為牢勢不可入削木為吏議不可對司馬遷傳甞肉一臠識鑊中之味崔浩傳傳記若不一叩洪鍾伐雷鼔則不識其音響也世說甞一臠而知一鑊之味一鼎之調吕氏春秋集九折臂而成醫兮吾今而知其然楚辭誰言捐軀易殺身誠獨難曹子建既傷蔓草别方知枤杜情曹粲詩倦客惡離聲選東門行如痛定之人思當痛之時不知何能自處也及之而後知履之而後難耳韓文經事漸知非栁不讀闗雎篇安知后妃徳劉義父入耳淡無味愜心漸有情白侍郎始知為客苦不及在家貧憂方知酒聖貧始覺錢神不窮眡世界焉識宇宙廣當時父母念今日爾應知並同上世情閒盡見藥性病多諳獲寶於已喪得途於既迷與夫貧居不為難故所激者其味異矣劉賔客不涉太行險誰知行路難歐陽長因送人處憶得别家時唐詩本朝人之未知學者自視以為無缺及既知學反思前日所為則駭然矣老泉甞鼎一臠㫖可知也臨川多事始知田舎好凶年偏覺野蔬香東坡吾平生多難甞以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也其少時好論議古人既老涉世更變往往悔其言之過同上噬臍何及經弗慎厥徳雖悔可追汝悔身何及並書子有酒食何不日鼔瑟宛其死矣他人入室啜其泣矣何嗟及矣並詩時過然後學則勤苦而難成記今不取後世必為子孫憂語子鯈䱁者浮陽之魚也胠於沙而思水則無逮矣挂於罟而欲謹則無益矣轂既破碎乃大其輻事已敗矣乃重太息其亡益乎並筍史若不早圖後君噬臍左不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎史吕不韋覆水不收後悔何及光武紀知財為禍何不早散石崇齊張敬兒被禍脫冠貂投地曰此物誤我鑑傳記夫差帥羣臣祠子胥江水濵曰昔不聽相國之言乃用讒佞之言至令相國逺沒江海自亡已來濛濛惑惑如霧蔽日莫誰與言吳越春秋集少壯不努力老大徒傷悲選長歌行毫末不早辨滋蔓信難圖白侍郎兔跡貪前逐梟心不早防張承吉趍榮貪位者若涉懸崖險不能止俾至身危踣蹶然後嘆不知稅駕之所焉可及矣唐沈顧本朝枯魚雖悔泣何及陳後山隨材器使經徂徠之松新甫之柏是斷是度是尋是尺詩或以徳進或以事舉或以言揚記及其使人也器之語子工之制木也大者以為舟航柱梁小者以為檝楔脩者以為櫚榱短者以為侏儒枅櫨無大小脩短皆得其所宜管子良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之朴森然陳於目前大厦之器具矣孫子巧工之制木也規矩方圓各隨所施淮南子史譬諸材木洪纎曲直各有所施晉書阮咸疏若榱椽梁柱以成大室义負偃植各安所施而無遺材唐書劉𢎞基賛韓滉在二浙所辟僚佐各隨所長無不得人甞有故人子謁之考其所能一無所長滉與之宴竟席未甞左右視及與並坐交言後數日署為隨軍使監庫門其人終日危坐吏卒無敢妄出入者唐徳宗集直木不可以為輪曲木不可以為桷文選夫大木為杗細木為桷欂櫨侏儒椳闑店楔各得其宜以成室屋者匠氏之工也玉札丹砂赤箭青芝牛溲馬渤敗鼔之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也大匠無棄才尋尺各有施況當營都邑把梓用不疑量力而任之度才而處之其所不能不彊使為是故為下者不獲罪於上為上不得怨於下矣任有小大惟其所能若器皿焉並韓集當時而用任物所長張九齡尺寸之材無所棄元微之為棟者資其自天之端為輪者取其因地之屈白侍郎若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名而得仕則自堯以降聖人賢人率多子弟也杜牧之强其所難子鳬脛雖短續之則憂鶴脛雖長斷之則悲取猿狙而衣周公之服彼必齕齧挽裂盡去而後慊並莊譬若樹荷山上而蓄火井中操鈎上山揭斧入淵欲得所求難也淮南子責疲者以舉千鈞督跛者以及走兔鄭析子史指金火以求合西漢杜鄴傳傳記舎其所長責其所短堯亦有所不及矣戰國策集猶鏤以鈆刀而望巧不已踈乎仲長統不可以自好章甫強越人以文冕也晉山濤強人所不能事必不集韓文本朝求朱於藍色何從來類要太剛必折經未有違謙越禮能全其壯者也用壯處壯則觸藩矣並易略子兵強則滅木彊則折柔弱者生之徒堅彊者死之徒列黄老堅則毁矣銳則挫矣莊革堅則裂淮南子史天為剛徳猶不干時況在人乎左其強易弱韓信傳桓公曰金剛則折革剛則裂說苑嶢嶢者易缺皦皦者易汚漢書傳快牛馬犢多能破車通鑑李邕文名天下盧藏用曰邕如干將莫耶難與爭鋒但虞傷缺耳李邕傳集利劍多缺真玉喜折劉賔客集柔能勝剛子天下柔弱莫過於水而攻堅彊者莫之能勝弱之勝強柔之勝剛天下莫不知莫能行舌之存也豈非以其柔耶齒之亡也豈非以其剛耶並老子積於柔必剛積於弱必強柔勝出於已者其力不可量列天下之至柔馳騁天下之至堅人之生也柔弱其死也堅強萬物草木之生也柔脆其死也枯槁至堅強者死之徒弱柔者生之徒並老子紀渻子為齊宣王養鬬雞十日而問雞已乎曰未也十日又問曰未也十日又問曰㡬矣望之似木雞矣其徳全矣異雞無敢應者反走矣莊齒堅於舌而先之敝是故柔弱者生之榦也而堅強者死之徒也淮南山霤至柔石為之穿蝎蟲至弱木為之敝夫霤非石之鑽蝎非木之鑿然而能以微脆之形陷堅剛之體豈非積漸之致乎孔叢子舌柔軟終以不敝同上傳記韓子問叔向曰剛與柔孰堅叔向曰臣年八十齒再落而舌尚存是知剛不如柔劉向柔能制剛弱能制強黄石公劉伶甞醉與俗人相忤其人攘袂而往必欲毆之伶顧而笑曰雞肋不足以安尊拳其人笑而止竹林七賢篇得不償失子故事有鑿一孔而生百隙樹一物而生百葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為滅蘇秦以百詐成一信淮南子秦穰侯與綱夀接境魏冉將以廣其封遂伐綱夀而取之兵囘而范雎代其相矣艾子曰真所謂外頭趕兔屋裏失獐也文子史所獲不如所亡左所利不能藥其所傷所獲不能補其所亡通鑑招延士大夫常如不足然性嚴峻羣臣雖素所愛信者或少有犯法或欺罔輒按誅之漢武紀揚雄以為靡麗之賦勸百而諷一猶騁鄭衛之聲曲終而奏雅不已戲乎司馬相如贊所得未毛銖所喪如山崖晉王隠傳決江海以救焚焚收而溺至引鴆爵以止渴渴止而身亡舊唐書樊系為朱泚撰􅁽文既成仰藥而亡嵗運東方租米至有斗錢運斗米之言並唐徳宗御史大夫李琪非無文學但不㢘耳唐明宗唐主謂璟曰吾餌金石始欲益夀乃更傷生晉髙祖集取之盡錙銖用之如泥沙杜牧之益之以畎澮而泄之以尾閭嵇叔夜養生傳本朝挽之不能寸推去輒數尺黄魯直得失相補史始雖垂翅囘谿終能奮翼澠池失之東隅收之桑榆並馮翼傳劉琨長於招懐而短於撫御一日之中雖歸者數千而去者亦相繼晉懐紀王叔文至中書見韋執誼時宰相方㑹食執誼起就閣與語鄭珣瑜等輟餐以待頃之吏白二公同飯矣珣瑜喟然曰吾可復居此乎歸家疾卒唐鄭珣瑜傳本朝顯禹雲山之罪雖應夷滅光之忠勲不可不祀司馬光篇過猶不及經昔魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也記子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也中庸管仲鏤簋而朱紘旅樹而反坫山節藻梲賢大夫也而難為上晏平仲祀其先人豚肩不揜豆一狐裘三十年賢大夫也而難為下記子以為無益而舎之者不耘苗者也助之長者揠苗者也孟過則失中不及則未至揚問道昔徐偃王軟而國滅齊簡公懦而身亡此性太柔之失也晉陽處父以純剛取害鄭子陽以嚴猛至斃此性太剛之過也列史矯枉過其正諸侯王表集純柔純弱兮必削必薄純剛純強兮必喪必亡栁佩韋本朝為國不可以生事亦不可畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人東坡得此失彼經豐其屋蔀其家易蔀覆也闇之甚也子見牛未見羊也孟人有濵河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半本學泅不學溺而利害如此列史祝有益也詛亦有損左袁紹見人饑寒恤念之形於顔色其所不見慮或不及漢獻帝魏曹冏曰猶芟刈股肱獨任胷臆觀者為之寒心魏志翟荘常弋釣及長不復獵或問漁獵同是害生何止去其一莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鈎豈我哉晉書傳記夫知古不知今謂之陸沉然則儒生所謂陸沉者也王充論衡集工於瑟而不工於求齊也韓文揚馬之才不知教化荀陳之道不知文章栁冕論一字低心翰墨塲箭靫抛盡負書囊元微之君耳惟聞堂上言君眼不見門前事白侍郎徐鉉不信佛酷好鬼神之說楊億談苑強本抑末經家不寶龜記子家不藏甲家語史五大不在邊五細不在庭國家之立也本大而末小是以能固故天子建國諸侯立家並左大夫無百雉之城史世家徙齊諸田楚昭屈燕趙韓魏後及豪傑名家居闗中無事可以備邊諸侯有變亦足率以東伐此強本弱末之術也劉敬傳太宗别置府兵分隷禁衛大凡諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中則居重馭輕之意明矣唐徳宗紀傳記臣無富於君都無大於國太公六韜集理天下者若身之使臂臂之使指則小大適稱不悖焉身所以能使臂者身大於臂故也臂所以能使指者臂大於指故也陸宣公末能勝本子楚人賣珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玟瑰緝以翡翠鄭人買櫝而還珠田鳩曰昔者秦伯嫁女於晉公子為之飾裝媵七十人至晉晉人愛其妾而不愛其公女此可謂善嫁妾矣未可謂善嫁女也並韓非子史晉甸侯也而建國本既弱矣其能乆乎末大必折尾大不掉並左以利相傾千里游遨冠葢相望乗堅策肥履絲曳縞此商人所以兼并農人所以流亡者也漢文紀支大於榦脛大於股不折必披灌夫傳如下有泰山之安則上有累卵之危劉向傳唐魏元忠曰言文者則以詞華為首而不及經綸言武者則以騎習為先而不知方略唐紀傳記脛大於股者難以歩指大於臂者難以把本小末大不能相使也說苑集母瘦雛漸肥白樂天成難壊易子今盆水在庭清之終日未能見目睫濁之不用一撓而不能察方圓人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎夫樹本灌以潦水疇以肥壤千人養之一人拔之則必無餘蘖並淮南子史凡事易壊而難成蒯轍曰功者難成而易敗髙紀以衆賢舉而用以一人毀而棄積年信而任一朝疑而斥魏徴傳百年勞之一日失之匈奴傳十譽之未信一毀之可疑趙璟傳百年累之一朝毀之竇融傳五薦不入朝一麾乃出守顔延之傳昔齊桓一矜其功而叛者九國曹操暫自驕伐而天下三分皆勤之於數十年之内而棄之於俯仰之頃豈不惜乎漢獻紀夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛栁玭傳傳記譬如十夫樹楊一夫拔之無得以成大也戰國策集綴縫難成裁破易元稹取之難梯天失之易反掌杜牧之本朝夫事不患於不成而患於易壊葢作者未始不欲其乆存而繼者常至於殆廢自古賢哲之士為其民捍患興利其遺跡往往而在使其繼者皆如始作之心則民到于今受其賜天下其有遺利乎歐以四時之功而成之以數日之雨而壊之歐公求晴祭文善百譽而不進兮一毀終世以顛隮歐蘇子美墓銘易成易壊子其進銳者其退速孟無故以合者則無故以離莊史物暴長者必夭折功卒成者必亟壊朱浮傳致貴無漸失必暴受爵非道失必疾並翟輔傳夫物速成則疾亡晩就則善終朝華之草夕而零落晉明帝無所逃罪經獲罪於天無所禱也語子知而使之是不仁也不知而使之是不知也孟史欲加之罪其無辭乎進退罪也並左不有人禍則當鬼誅唐紀魏元忠曰臣猶鹿耳羅織之徒欲得臣肉為羮臣安避之唐武后紀集豈不在遐逺虞羅所見尋陳子昻不有人禍則有天刑韓文罪有所歸經虎兕出於柙龜玉毀於櫝中是誰之過歟語子行脩而名不章友之罪也家語夫舟浮於水車轉於陸此勢之自然也木擊折轊水戾破舟不怨木石而罪巧拙者知故不載焉淮南子史鄭棄其師春秋申子卑卑施之於名實韓子引䋲墨切事情明是非其極慘礉胡革切少恩皆原於道徳之意韓非傳論王恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也上曰首為馬邑事者恢不誅恢無以謝天下是時小旱上令官求雨卜式言曰縣官當食租衣稅而已今𢎞羊令吏坐市列肆販物求利烹𢎞羊天乃雨並漢武紀時以浮虛相扇儒雅日替范寗謂其源始於王弼何晏二人之罪深於桀紂范寗傳桓温過淮泗踐北境與諸寮屬登平乗樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責晉書武后見駱賔王檄曰宰相之過也安有如此才而使之流落不偶乎唐紀陸贄上疏以為陛下有股肱之臣有耳目之任有諌諍之列有備衛之司見危不能竭其誠臨難不能效其死臣所謂致今日之患羣臣之罪者豈徒言歟謂禍福由人不言盛衰有命人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也唐徳宗譬如操兵以刃人天下不委罪於兵而委罪於所操之主蓄毒以殃物天下不歸咎於蠱而歸咎於所蓄之家裴延齡傳傳記以徴為羽非絃之罪也以甘為苦非味之罪也説苑集教盜穴牆發櫃多得金玉已復不與同挈得不為盜乎杜牧之集本朝百鍊之剛日膾千牛匣而不用非我之羞民勞吏宜羞並坡集詩發縱指示經昭然若發矇矣記子孔子見老子曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊史師之耳目在吾旗鼔左獵追殺獸者狗也而發縦指示獸處者人也漢蕭何傳同功共事經同力王室胥及逸勤並書史譬如捕鹿晉人角之諸戎掎之左笙磬同音惟房與杜舊唐書唐髙祖與李宻書曰所望在左提右挈戮力同心執子嬰於咸陽殪商辛於牧野隋恭紀坐以制勝經帝乃誕敷文徳舞干羽于兩階七旬有苗格書子不出樽爼之間折衝千里之外家語圜居而方正則若盤石然觸之者角摧拱揖指麾強暴之國莫不趨使並荀子真儒無敵於天下揚子史吳伐魯魯微虎欲宵攻王舎私屬徒七百人三踊於幕庭吳子聞之一夕三遷左夾谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歴階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來焉命司馬止之齊侯逡巡謝曰寡人之過也罷命齊人使優施舞於魯君之幕下孔子曰笑君者罪當死司馬行法焉首足異門而出齊人來歸鄆讙龜隂之田者葢為此也榖梁傳秦欲伐魏聞干木在魏終不敢發兵史記諸侯以公子賢多客不能加兵謀魏史魏世家項王願與漢王挑戰漢王曰吾能鬬智不能鬬力史記運籌帷幄之中決勝千里之外髙帝紀心有所懐威動千里西漢通傳六國常以十倍之地百萬之軍仰闗而攻秦秦人開闗延敵九國之師逡巡而不敢進秦無亡矢遺鏃之費而天下已困矣項籍傳不降階序而運天下諸侯王表楚有子玉得臣文公為之側席而坐趙有廉頗馬服彊秦不敢窺兵井陘近漢郅都魏尚匈奴不敢南嚮沙漢漢陳湯傳賢人立朝折衝厭難勝於亡形辛慶忌傳酈食其憑軾而下齊七十餘城前漢王商有威重長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前謁商起離席與言單于仰視商貌大畏之遷延却退天子聞而嘆曰此真漢相矣王商傳匈奴素聞郅都節為引兵去竟都死不近鴈門郅都傳魏軍次于興勢假費褘節率衆往禦之光禄大夫來敏至褘話别求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖褘與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退費禕傳劉琨在晉陽甞為羣騎所圍數重琨乃乘月登樓清嘯中夜奏金笳向晩復吹之賊棄圍而走晉劉琨傳祖逖為鎮西將軍石勒不敢窺兵河南使成臯縣修逖母墓晉書祖逖傳以計伐戰一以當萬晉書杜預傳頡利可汗進至渭水便橋之北遣其腹心執失思力入見以觀虛實上囚思力於門下省上出𤣥武門與髙士㢘房𤣥齡等六騎徑詣渭水上與頡利隔水而語責負約突厥大驚皆下馬羅拜俄而頡利來請和突厥寇并州京師戒嚴世民乃帥騎馳詣敵陳告之曰國家與可汗和親何為負約深入我地我秦王也可汗能鬭獨出與我鬭若以衆來直以此百騎相當耳並唐髙祖紀段秀實為涇原節度使三四年間吐蕃不敢犯塞唐書淮南大將王韶欲自為留後令將士推已知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶等懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人唐徳宗憲宗曰吾倚度足破三賊矣裴度傳李勣治并州唐太宗曰我用勣守并突厥不敢南賢於長城逺矣唐書本傳汲黯在朝淮南寢謀干木處魏諸侯息兵一士止百萬之師一賢制千里之難裴度傳傳記甲兵不出於軍而敵國勝衝櫓不施於軍而邊城降戰國策千丈之城拔之樽爼之間百尺之衝折之衽席之上同上虞有宫之竒晉獻公為之終夜不寢楚有子玉得臣文公為之側席而坐逺乎賢者之厭難折衝也說苑羊祜專修徳信以懐吳人陸抗告邊戍曰彼專為徳我專為暴是不戰而自服也晉陽秋兵不血刃坐以制勝崔鴻十六國春秋集宫竒在虞晉不加戎季梁猶在強楚挫謀文選陳孔璋信陵佩魏印秦兵不敢出文選盧諶詩吾晞段干木偃息藩魏君吾慕魯仲連談笑却秦軍左太冲三晉之強屈於齊堂之爼千乗之勢弱於陽門之哭陸士衡折衝樽爼間制勝在兩楹張景陽詩孝文之得魏尚敵不足憂太祖之得郭嘉知成吾事駱賔王東山謝安石談笑靜胡沙李太白以山河為寳者萬夫不能當以道徳為藩者四遠為之守白樂天本朝垂紳正笏不動聲色而措天下於泰山之安晝錦堂記坐以致人經匪我求童䝉童䝉求我易闇者諮明明者不諮於闇易疏子曰徳不孤必有隣語子醫門多疾肉不慕蟻蟻慕肉並莊良醫之門多病人櫽括之側多枉木川淵深而魚鱉歸之山林茂而禽獸歸之樹成䕃而衆鳥息醯酸而蚋聚並荀山臯非為鳥植林林茂而鳥自棲之江湖非為魚鑿潭潭深而魚自歸之劉子史郭解入闗闗中賢豪知聞其聲爭交驩解史記陳平家貧以席為門然門外多長者車轍西漢班彪家有賜書好古之士自逺方至父黨揚子雲以下莫不造門班固叙傳桃李不言下自成蹊李廣贊役物以為養任智而不恃力此其所以為貴也漢刑法志天下學士靡然嚮風公孫𢎞傳仲尼修禮興學於洙泗之間四方俊髦靡然向風晉戴邈傳傳記砥礪之旁多頑鈍說苑賈逵口誦經文以教人贈遺者盈積或云逵非力耕舌耕也王子年拾遺記王勃能文請者甚衆金帛盈積人謂心織而衣筆耕而食張著翰林盛事集蓬居窮巷軒冕結轍陳子昻一時皆慕與之交諸公要人爭欲令出我門下韓愈衡鏡髙懸文武矯首張說之不鞭而來無脛而至爭竒騁怪為公眼中之物唐文粹本朝此人如精金美玉不即人而人即之譬如止水之在槃豈復勞心而鑒物並東坡與人為地子為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也孟將為胠篋探囊發匱之盜而為守備則必攝緘縢扄鐍然巨盜至則負匱揭篋擔囊而趨惟恐緘縢扄鐍之不固也莊鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉順途而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之列周穆王六國蚩蚩為嬴弱姬楊重黎魏田父得玉徑尺以告隣人隣人詐之曰此怪石也蓄之非利其家田父猶豫以歸置於廡下其玉明照一室大怖遽棄之於逺野隣人取之以獻魏王魏王召玉工相之曰此無價魏王賜獻玉者千金食上大夫禄尹文桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝也列屠者藿羮車者步行陶人用缺盆匠人處狹廬淮南子史忌將士以資敵國此伍子胥所以鞭荆平之墓也季布傳諸將偶語雍齒先封張良傳秦張誹謗之網以為漢敺除漢成帝謝琨女夫殷叡好樗蒲奪其妻妹及伯母兩姑之分以還戲債或譏之曰謝氏累世財産充殷君一朝戲債晉太祖常以三分勞筋苦骨之人奉七分待衣坐食之輩唐憲宗隋貯洛口倉而李宻因之積布帛東都而王世充據之馬周傳傳記齊欲伐魏淳于髠曰韓盧天下之疾犬東郭逡天下之狡兔盧逐逡環山者三騰山者五兔及於前犬吠於後犬兔各死田父見而擅其功戰國䇿集董卓稱亂徒藉羣雄之手王莽偷安卒成光武之業梁任孝恭檄魏文假手于嬴以混諸侯凴力於項以離闗東栁漢原廟銘莫養瘦馬駒莫養小妓女後事在目前不信君看取馬肥快行去妓長罷歌舞三年五嵗間已聞換一主借問新舊主誰樂誰辛苦白侍郎賔客歡娱童僕飽始知官職為他人白集歌舞教成心力盡一朝身去不相隨白侍郎匠刀者不必自用割匠弓者不必自用射唐文粹戰士風霜苦將軍雨露新杜荀鶴燕趙之收藏韓魏之經營齊楚之精英㡬世㡬年剽掠其人倚疊如山一旦不能有輸來其間杜牧之蘇代曰臣過水見小蚌方出暴而鷸啄其肉蚌合而挾其喙鷸曰今日不雨明日不雨必見蚌脯蚌亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之春秋後語本朝借寇兵而資盜糧東坡有小丈夫者得一金櫝而藏諸家拒户而守之嗚呼是求不失富也非求富也大盜至刼而取之又烏知其果不失也老蘇坐享人利經維鵲有巢維鳩居之詩子未甞稼穡粟滿倉未甞蠶桑絲滿囊淮南子史略其武夫以為己腹心股肱爪牙如把梓皮革自楚往也雖楚有材晉實用之並左鄭國曰臣為韓延數年之命然渠成亦秦萬世之利也通鑑韓盧東郭自困於前而為田父之獲者也漢袁譚傳蜀楊顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容髙枕飲食而已三國志傳唐髙祖曰徐觀蚌鷸之勢以收漁人之功隋恭帝紀李宻因洛口之食王世充據東都布帛唐書馬周傳鷸蚌相持我乗其敝梁髙祖傳記兩虎相鬬駑犬受其斃戰國策本朝力生於所激而不自為力故不勞形生於所遇而不自為形故不窮東坡秦收鄭渠成晉得楚材多山谷殊塗同歸經天下同歸而殊塗易為善不同同歸於治為惡不同同歸于亂書子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見子之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉記經禮三百曲禮三千其致一也並記或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也道並行而不相悖並庸微子去之箕子為之奴比干諫而死子曰殷有三仁焉語子庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也禹稷當平世三過其門而不入顔子當亂世居於陋巷孟子曰禹稷顔囘同道禹稷顔子易地則皆然夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也曽子居武城有越寇或曰寇至盍去諸曰無寓人於我室毀傷其薪木寇退則曰脩我牆屋我將反寇退曽子反子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守孟子曰曽子子思同道曽子子思易地則皆然居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者栁下恵也三子者不同道其趨一也一者仁也並孟子路拯溺而受牛謝孔子曰魯國必救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受其勸徳子贛讓而止善蹠越者或以舟或以車雖異路所極一也並淮南子非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以乆則乆可以速則速孔子也皆古聖人也孟臧與穀二人相與牧羊而俱亡其羊臧則挾策讀書穀則博塞以遊二人者事業不同其於亡羊均也比犧尊於溝中之斷美惡有間其於失性一也柤梨橘柚其味相反而皆可於口並莊夫織者日以進耕者日以却事相反成功一也百川異源同歸於海並淮南子塗雖曲而通諸夏川雖曲而通諸海事雖曲而通諸聖仲尼之道猶四瀆也經營中國終入大海並揚史晏子儉矣夷吾則奢齊桓以霸景公亦治太史公自序李廣行無部伍行陣就善水草舎止人人自便不擊刁斗以自衛幕府省約文書然亦逺斥堠未甞遇害程不識正部曲行伍營陣擊刁斗士吏治軍簿至明軍不得休息然亦未甞遇害漢武紀三仁殊而一致夷恵舛而齊聲班固傳魏髙允稱常爽訓勵有方曰文翁柔勝先生剛克立教雖殊成人則一宋文紀唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸於治宋璟贊巡先死不為遽逺後死不為屈唐書本贊傳記宓子賤治單父彈鳴琴聲不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治吕氏春秋集夫㳂河而下茍不止雖有疾遲必至於海韓文杞桂殊姿而共芳珪璋異質而同潤吕和叔殊趍而一致異𣲖而同源皇甫湜釋宗稱定慧儒師著誠明𣲖分示三教理詣無二名吾君用太和理萬物動靜各隨其宜則陳力以致用潔身以𢎞教其致一也並李義山雖羈鸞冥鴻一飛一籠遐心逺意終共超曠歐本朝昔者孟子不願召見而孔子不辭小官夫欲正其所由得之之名是以謹其所以取之之故孟子不為矯孔子不為卑老蘇陳平聽張辟疆許王諸吕吕后安之故平與周勃得執將相之柄以伺其間唐武后欲以武三思為嗣狄仁傑曰母子與姑姪孰親陛下立廬陵王則千秋萬嵗後血食於太廟無祔姑之禮后感悟欒城木鐸調與黄鍾同小蟲心在一喙間得失與世同輕重並山谷蜣之丸蟻之粒與夫承蜩貫虱者同一心之功用也螳螂之斧莎雞之羽與夫扛鼎拔山者同一心之力用也工倕之削輪扁之斵庖丁之牛與夫堯舜禹湯之治天下同一心之妙用也明道集臧穀雖殊竟兩忘坡同出異趣經性之與情猶波之與水靜則是水動則是波中庸疏禮之於人也猶酒之有糵也君子以厚小人以薄記子奕秋誨二人奕一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣麰麥播種而耰之其地同樹之時又同浡然而生至於日至之時皆熟矣雖有不同則地有肥磽雨露之養人事之不齊也並孟于越夷貊之人生而同聲長而異俗教使之然也荀孔子墨子俱法堯舜而取舎不同韓子清之為明杯水而見眸子濁之為闇河水不見泰山淮南子揚子曰吾於荀卿見同門而異户也揚傳記學者如牛毛成者如麟角蔣子萬機論絲俱生於蠶為繒則賤為錦則貴姚信士緯集子雲相如同工異曲少長聚嬉戲不殊同隊魚年至十二三頭角稍相疎二十漸乖張清溝映汙渠三十骨骼成乃一龍一猪飛黄騰踏去不能顧蟾蜍並韓集生歸蘇屬國死别李將軍鮑溶詩生為並蔕花亦有先後落唐文粹離合無親疎經投戈散地則六親不能相保同舟而濟則胡越何患乎異心易畧例子多助之至天下順之寡助之至親戚叛之孟自其異者視之肝膽楚越也自其同者視之萬物皆一也莊行合趣同千里相従趣不合行不同對門不通淮南子史意合則胡越為昆弟由余子臧是矣不合則骨肉為仇讐朱象管蔡是矣鄒陽書白頭如新傾葢如故知與不知也漢鄒陽傳盡下則胡越同心輕物則六親離徳唐太宗徳澤洽則四夷可使如一家猜忌多則骨肉不免為讐敵同上傳記同聲則異叩而相應意合則未見而相親大戴禮愛而利之四海之内若合一家不愛而利之子或殺父況天下乎韓詩外傳東門先生居蓬户空穴之中而魏公子一朝以百騎日寵之吕望未甞與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉東方朔記白頭而新傾盖而故新序集結交在相知骨肉何必親古歌辭物情茍有合莫問玉與泥韋應物志合者蓬心可採情諧者蘭味寧忘駱賔王人生意氣豁不待相逢早藹藹桑麻交公侯為等倫並杜詩情思附則感而恱之雖仇讐化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣陸宣公集得之者江海比隣失之者肝膽楚越唐徐彦伯論本朝相知不必因相識臨川白頭無故意異代有同音陳后山但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條晁董之對則孝宣以致中興東坡進陸贄奏議劄子責望有重輕子越人闗弓而射之則已談笑而道之無他疏之也其兄闗弓而射之則已垂涕泣而道之無他戚之也同室之人鬬者救之雖被髮纓冠而救之可也鄉隣有鬬者被髮纓冠而往救之則惑也雖閉户可也並孟任理不任情經愛而知其惡憎而知其善記拜下禮也今拜乎上泰也雖違衆吾從下紂之不善不如是之甚也並語史子貢喜揚人之善不能隠人之惡史記不虛美不隠惡司馬遷贊曹操勲勞宜賞不吝千金無功望施分毫不與三國志昔屈到嗜芰屈建去之以為不可以私欲干國之典齊太祖傳記所憎者有功必賞所愛者有罪必罰太公六韜集譬如親骨肉寧免相可否韓集當其賞雖三旌之貴萬鍾之禄咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘咸曰宜何也為惡而然也勿矜朱門是陋此白屋非並劉賔客登奉常之第者未必盡能文章為牙門之將者未必盡能威敵唐文粹本朝天下之事固有出於不幸者矣苟有可以用於世者不必聖賢之作也蚩尤作五兵紂作漆器不以二人之惡而廢萬世之利也歐君實常謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反覆相非終身不能相一温公行狀若無天下議美惡併成空後山任情不任理經罔水行舟書奡盪舟語俾出童羖詩子匿為物而愚不識大為難而罪不敢重為任而罰不勝逺其塗而誅不至以舟之可行於水也而求推之於陸兩喜必多溢美之言兩怒必多溢惡之言天下莫大於秋毫之末而泰山為小莫夀乎殤子而彭祖為夭並莊立直木而求其影之枉也立枉木而求其影之直也荀責三光不照於覆盆之内抱朴子責疲者以舉千鈞督跛者以及走兔鄧析子聽虛而責響視空而索影劉子史董仲舒曰不琢玉而求文采西漢本傳以毀譽為榮辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯漢光武紀言論者計厚薄而吐辭選舉者度親疎而舉筆善惡謬於衆聲功罪亂於王法漢武紀傳記若夏之日而欲夜之長也說苑羣邪相仰以曲為直陸賈新語集謂鏌耶為鈍兮鈆刀為銛賈誼鵩賦責冬之裘者曰曷不為葛之之易也責饑之食者曰曷不為飲之之易也韓文天下無正聲悅耳即為娛人間無正色悅目即為姝白侍郎蓼蘗為甘山岳為輕沈日月至明或以為昬秋毫至微或以為繁唐文粹本朝女無美惡富者妍士無賢不肖貧者鄙玉局文尚有容力經若火之燎于原不可嚮邇其猶可撲滅若顛木之有由蘖並書雖無老成人尚有典刑詩往者不可諌來者猶可追語子木雖蠧無疾風不折牆雖隙無大雨不壊管史圖王不成其弊猶足以霸隗囂傳補衣猶有完通鑑傳記晉平公問於師曠曰吾年七十欲學恐已暮師曠曰老而學者如秉燭之明秉燭之明孰與夜行說苑見兔而顧犬未為晩也亡羊而補牢未為遲也春秋後語集典刑未滅故老猶存選辨亡論無所用力經若火之燎于原不可嚮邇書不可救藥詩子桀紂在上雖有十堯不能治者世亂也韓非良將不能斵金巧冶不能鑄木載重而馬羸雖造父不能以追急並淮南子譬諸琴瑟鄭衛調俾䕫因之亦不可以致簫韶矣揚航人無楫如航何同上無聲雖師曠側耳將何聞乎無形雖離婁並照將何覩乎孔叢良工不能琢冰文中子盛陽不能榮枯朽上智不能移下愚抱朴史疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也本弱者其枝必披非人力所能強為天之所廢誰能興之並左大車不較不能載其常任琴瑟不較不能成其五音齊世家河決不可復壅魚爛不可復全秦始皇本紀天下無害菑雖有聖人無所施其才上下和同雖有賢者無所立功東方朔傳羽翼已成難動搖矣張良傳雖有堯舜之徳智無所施賁育之勇力不得設魏明紀執垂之規矩無工與材坐而待器之成終不可得也唐髙祖有才無學猶巧匠無楩楠斧斤不能成室劉知㡬傳集影不可逐響難為繫陸機文賦素冰象玉難可磨蕩曹植七發利盡萬物不能叡童昬之心選演連珠毫髮一為瑕丘山不可勝白頭吟空柯無刃公輸不能以斵但懸曼矰蒲苴不能以射四子講徳論吞縦之強不能反蹈海之心漂鹵之威不能降西山之節選魯班雖巧不能為乞丐者之顔王郎貧窶語補一壊百無可施功陳子昻雖令伶倫吹音韻難可改雖令巫咸招魂爽難復在韓舜之徳可以及率土而不化其子唐虞之仁不能柔秦漢之勇不能威並栁承積弊之餘雖使季冉將不能也皇甫湜天疾難自醫孟東野黄河既濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味唐文粹本朝衝風振河海不能號無竅坡巧手莫為無麵餅陳後山處得其地經隂爻雖賤而為一卦之主者處其至少之地也易略鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽詩子射干莖長四寸生於髙山之上而臨百仭之淵木莖非能長也所立者然也順風而呼聲非加疾而聞者彰登髙而招臂非加長而見者逺並荀史自繆公以來至於秦王二百餘年常為諸侯雄豈世賢哉其勢居然也秦紀百人守險千人不敢過也蘇秦傳傳記一圍之木持千鈞之屋五寸之鍵而制開闔豈材足任哉所居要也說苑朱買臣曰一人守險千人不得上漢書集儒雅之徒則處龍鳳之署博奕論劍閣崢嶸而崔嵬一夫當闗萬夫莫開李白一夫怒臨闗百萬未可傍杜五逹之井百汲而盈科未必涼而甘所處之勢然也劉賔客集鬼谷曰子不見嵩岱之松柏乎上枝干於青雲下根通於三泉千秋萬嵗不逢斤斧之患此木豈與天地有骨肉所居然也盧盤祐髙士傳本朝路窮斤斧絶松桂得干霄東坡不畏浮雲遮望眼自縁身在最髙層臨川處非其地子如以朝衣朝冠坐於塗炭孟處勢不便未足以逞其能莊尋常之溝巨魚無所旋其體而鯢鰌為之制步仭之丘巨獸無所隠其軀而孽狐為之祥莊庚桑楚篇水之勝火亦明矣然而斧鬲間之水煎沸盡其上而火得熾盛焚其下水失其所以勝者矣韓非子使目在足下則不可以視尹子史吳季札曰夫子孫文子之在此也猶燕之巢於幕上左漢武曰生子當置之齊魯禮義之邦乃置之燕趙果有爭心不讓之端見矣三王世家褚先生論負下未易居下流多謗議司馬遷傳揚雄作酒箴曰觀瓶之居居井之湄漢書處髙臨深動常近危一旦叀上絹反礙為瓽所轠身提徒計反黄泉骨肉為泥陳遵傳儒者當謀謨廟堂反在朝歌耶虞詡傳時詡為朝歌長蜀先主曰芳蘭當門不得不鋤蜀志晉趙王與嵇叔夜書曰植橘柚於𤣥朔蔕華藕於脩陵晉書王羲之與謝萬書曰以君邁往不屑之韻而俯同羣辟誠難為意也晉書紀傳記鬼谷曰子不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也髙士傳吞舟之魚陸處不勝螻蟻吕氏春秋集騁騏驥於中庭兮焉能極夫逺道置猿狖於櫺楹兮夫何以責其捷巧楚辭劍閣雖嶛憑之者蹶非所以深根固蒂也魏都賦步武之間不足以騁跡吳季重書魚遊於沸鼎之中燕巢於飛幕之上丘希範書所棲不足恃鷹隼縦横來栁詩金屑雖珍在眼為病白侍郎孤松停翠葢託根臨廣路不以險自防遂為明所誤栁本朝神竒之産銷藏委翳於蒿藜榛莽之間而山岩野叟不復知其為瑞也臨川勢力不敵經湛湛露斯匪陽不晞雨雪瀌瀌見晛曰消並詩子猶以一杯水救一車薪之火一齊人傅之衆楚人咻之雖日撻而求其齊也不可得矣並孟日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎莊猶烏獲與焦僥搏也以桀詐堯若卵投石並荀撮壤不能填決河升水不能冷原火抱朴史牛雖瘠僨于豚上其畏不死雖其善祝豈能勝億兆人之詛並左驅羣羊而攻猛虎虎之與羊不格明矣張儀傳齊景公二十二年彗出公曰可禳乎晏子曰使神可祝而來也亦可禳而去也百姓怨以萬數而君令一人禳之安能勝衆口乎史記齊世家垂千鈞之重於鳥卵之上必無幸矣漢景紀此難以口舌爭也張良傳猶鼱鼩之襲狗音精劬孤豚之咋虎至則靡耳何功之有東方朔傳萬鈞所壓無不糜滅賈山傳羔犢之弱而扞虎狼之敵漢景紀雖有孫吳將賁育士若入水火往必焦沒智勇亡所施漢成紀賈誼曰淮陽之比大諸侯僅如墨子之着面適足以餌大國而不足以有所禁禦漢文紀劉陶曰猶冰霜見日必至消滅東漢本傳以嬰孺鬭賁育也陸贄傳論傳記猶棘林螢耀與夫撏木龍燭也山海經夫鵬雛之始飛為鷹所制孔氏志集河決潰金堤隻手不能障晉傅𤣥塵篇大厦既焚不可洒之以淚長河一決不可障之以手庾信連珠一君子愛之百小人妬之一愛固不勝於百妬皮日休威力不敵羣噪無益唐文粹醯雞不能混雷霆嬰兒不能抗烏獲者響於力懸故也陸魯望捧爝火以干日御動已光銷抱布鼔以詣雷門忽然聲寢李義山勢均力敵經諸侯不臣寓公下大夫於上大夫承賀並記子天下地醜徳齊莫能相尚孟兩堯不能相王兩桀不能相亡管兩貴之不能相事兩賤之不能相使荀兩智不能相救兩貴不能相臨兩辨不能相屈力均勢敵故也尹子智均不相使力均不相勝申子兩堅不能相加兩強不能相伏淮南子史我能往寇亦能往宣伯曰魯之有季孟猶晉之有欒范也並左太尉丞相尊等耳魏其傳力敵勢均終相吞噬晉安紀劉琨祖逖並有英氣每相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原耳晉書祖逖傳人得抗衡莫相稟屬唐徳宗中尉大臣也宰相亦大臣也唐文紀獨力難舉子一薛居州獨如宋王何一齊人傳之衆楚人咻之雖日撻而求其齊不可得矣萬室之國一人陶則可乎子欲手援天下乎並孟千鎰之裘非一狐白墨子任一人力者則烏獲不足恃淮南王術史千金之裘非一狐之腋索榭之榱非一木之枝叔孫通傳大樹將顛非一繩所維徐穉傳傳記一目眡則不明一耳聴則不聰太公金匱衆力易成經為命禆諶草創之世叔討論之行人子羽脩飾之東里子産潤色之語子馬蚿斬足而復行何也以其輔之者衆家語在王所者長幼卑尊皆薛居州也王誰與不善孟萬人彎弧以向一鵠能無中乎劉子積力之所舉則無不勝也衆智之所為則無不成也淮南江河之水非一源之流墨史衆心成城國語吐谷渾王阿柴疾召諸子二十人各獻一箭與其弟使折之其弟折之又取十九箭使折之不能折阿柴曰汝知之乎孤則易折衆則難摧汝曹戮力一心然後可以保國寧家晉紀傳記天下無粹白之狐而有粹白之裘吕氏春秋集百足之蟲至死不僵以扶之者衆也曹冏六代論猶衆壑合注霈為大川羣山出雲混成一氣吕和叔以粗化精經他山之石可以攻玉詩子塵垢粃糠將猶陶鑄堯舜者也莊史攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣王符傳本朝與善人處壊了人須是與不善人處方成就得人伊川君子與小人共處為小人侵陵則脩省畏避動心忍性増益預防老泉化惡為美經翩彼飛鴞集于泮林食我桑葚懐我好音周原膴膴堇荼如飴並詩子雖有惡人齊戒沐浴則可以祀上帝孟子史沙礫化為南金瓦石變為和玉劉陶傳夫飛鴞天下賊鳥及其在林食椹則懐我好音魏志本朝自古竒偉之士如周處戴淵之流皆出於羣盜改惡修善不害為賢東坡鈆鐵性殊㸃化為金則不辨鈆鐵之性鳴道集妙理不傳經民可使由之不可使知之語子梓匠輪輿能與人規矩不能使人巧孟鑿枘之麄伎而輪扁有不傳之妙掇蜩之薄術而傴僂有入神之巧抱朴對俗輪扁曰得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣莊史李廣天性善射雖子孫他人學者莫能及西漢本傳心之精㣲口不能言也言之微妙書不能文也張敞傳垂能目制方圎心度曲直然不能以教人唐太宗傳記司馬太傅問謝𤣥恵子五車何以無一言入𤣥謝曰當是妙理不傳世說埒有常徑的有常所雖每發輒中非至妙也若馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣典論隋末王靈學射於督謨以為盡妙欲射殺謨獨擅其美謨持短刀箭來輒截之惟有一矢謨張口承之遂齧其鏑笑曰學射三年未教汝齧鏃法段成式酉陽雜爼集妙不可盡之於言事不可窮之於筆郭璞賦輪扁不能言微於其弟伯樂不能語妙於其子阮籍古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道韓文本朝糟粕所傳非粹美丹青難寫是精神如蕭何之識韓信此豈有法而可傳者哉並東坡丹青妙處不可𫝊輪扁斵輪如此用山谷自得三昧子理義之恱我心猶芻豢之悅我口孟庖丁曰始臣解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視庖丁為文恵君解牛手之所解肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之㑹並莊得之於轡應之於手得之於手應之於心列郢人堊墁其鼻若蠅翼使匠石斵去之匠石運斤成風盡堊其鼻不傷梓慶削木為鐻見者驚猶鬼神並莊屠牛坦一朝解九牛而刃可以剃毛庖丁為刀十九年刃如新硎淮南般之運斤羿之激矢揚淵騫史介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信左屠牛坦一朝解十二牛而芒刃不頓所排擊剥割皆中理解也賈誼傳牙曠清耳於管絃離婁眇目於毫分逢蒙絶技於弧矢班輸推巧於斧斤良樂軼能於相馭烏獲抗力於千鈞龢鵲發精於鍼石研桑心計於無垠西漢班固叙傳謝安每言陶公雖用法而恒得法外意晉成紀裴子野曰為文人皆得於手我獨得於心南史本傳賈堅字世固彎弓三石餘烈祖以堅善射故親試之乃取一牛置百步上召堅使射曰能中之乎堅曰少壯之時能令不中今已年老正可中之恪大笑射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為竒中之何難一發中之堅時年六十餘矣觀者咸服其妙燕書傳記長沙僧懐素好草書自言得草書三昧李肇國史補廣漢翁偉能聽鳥獸之音乗蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中蹇馬蹇馬亦罵之曰眇馬御者不信使往視之馬目果眇論衡集弓不虛發應聲而倒司馬相如子虛賦畫宫於堵盈尺而曲盡其制計其毫釐而搆大厦無進退焉栁弓矢入養叔之手徽絃在師曠之膝何微之不中何妙之不盡歐陶士冶鑄匠成於心崔黯韓幹之馬籍籍知名薛稷之鶴翩翩有聲白侍郎如良庖投刃無復肯綮唐文粹本朝至哉天下樂終日在几案歐吳道子畫人物如以燈取影逆來順往旁見側出横斜平直各相乗除得自然之數不差毫髮出新意於法度之中寄妙理於豪放之外所謂遊刃餘地運斤成風付八音於師曠孰敢爭能捐六轡於王良坐將致逺並東坡信手斫方圎規矩一中節山谷事理倒置經以妾為妻以孽代宗詩序俾晝作夜詩故不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮孝經子庖有肥肉廏有肥馬民有饑色野有餓莩孟史賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也婦養姑者也虧姑以成婦逆莫大焉並左鸞鳳伏竄兮䲭梟翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒置謂伯夷貪兮謂盜跖㢘賈生傳章甫薦屨賈誼傳猶塞川原而為潢汙食貨志本末舛逆首尾衡決賈誼傳荀恱曰簡父兄之尊而崇賔客之禮薄骨肉之恩而篤朋友之愛略脩身之道而求衆人之譽割衣食之業以供饗宴之好西漢汲黯曰陛下用羣臣如積薪後來者居上西漢本傳羣小得志士大夫皆喪氣漢靈紀足反居上首顧居下倒懸如此莫之能解猶為國有人乎非亶師古音但倒懸而已賈誼傳今世俗謂不智者為能謂智者為不能鮑宣傳聽納小吏雕琢大臣朱雲傳鷹隼横厲鸞徘徊兮息夫躬傳論大道則先黄老而後六經司馬遷傳賛楊賜曰冠屨倒易陵谷代處通鑑保字螟蛉剿拉同氣宋紀魏徴曰隋末百姓彊而陵官吏唐太宗倒持太阿授之以柄唐吳兢傳啖糟粕棄醇醪傳記直如絃死道邊曲如鈎反封侯李固外傳集衆鳥皆有行列兮鳳獨翔而無所薄鳳凰不翔兮鶉鷃飛揚蔡女黜而出帷兮戎婦入而綵繡服菽藟兮蔓衍芳虈兮挫枯鵠竄兮枳棘鵜集兮帷幄腥臊並御芳不得薄兮嫫母衣錦西施負薪李白鳳凰在笯兮籠也雞鶩翔舞並楚辭停潦魚招獺空倉䑕敵猫元微之鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條左太冲詠史羣沙穢明珠衆草凌孤芳李白蘋蘭憔悴兮稂莠繁滋麟鳳匿跡兮梟獍騰威憒匠罷斧兮拙者搆之離婁閉目兮瞽者揚眉子都蒙袂兮敦冶騁姿皮日休幽桂遺蓁菅馬厭穀兮士不厭糠籺土被文綉兮士無短褐並韓本朝駑駘自飽方爭路騕褭長饑不在閑臨川清濁不分經火炎崑岡玉石俱焚書子駑驥同轅玉石相揉孔叢子史牛驥同皁鄒陽傳李膺謂鍾覲曰公何太無皁白後漢書黄金與土同價南史冠冕隷皂混為一區唐書傳記從風縱火荻芝俱死焦氏易林集玉與石而同櫃貫魚眼與珠璣駑駿雜而不分服罷牛而驂驥并茅絲以為索菎蕗雜於靡蒸以留切麻莖皮茅絲兮同綜冠屨兮共絇同揉玉石兮一槩而相量苦稱量之不審兮同權槩而就衡並楚辭鳳闕悲巢鵩鵷行亂野麏元微之火炎崑嶽礫石與琬琰俱焚嚴霜夜零蕭艾與芝蘭同盡劉孝標論齊竽混夏韶燕石厠琳琅白樂天濫吹混奏於齊竽駱賔王昔虞阪之上逸驥與駑駘俱疲吳竈之中孤桐共樵蘇並爨韋緇本朝家雞野騖同登爼天邊鴻鴈不易得便令作對隨家雞並坡詩心無二用經采采卷耳不盈頃筐嗟我懐人寘彼周行終朝采緑不盈一掬終朝采藍不盈一襜並詩子百里奚爵禄不入於心故飯牛而牛肥莊山木采易得之物實易滿之器以懐人寘周行之心貳之則不能滿荀齊人有欲金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金列白刃捍乎胷則目不見流矢目不兩視而明耳不兩聽而聰並荀逐獸者目不見太山嗜欲在外則明有所蔽夫目察秋毫之末而耳不聞雷霆之聲耳調金石之聲而目不見太山之髙小有所志則大有所忘並淮南使左手畫方右手畫圎令一時俱成雖執規矩之心迴剟劂之手而不能者由心不兩用則手不並運離婁察秋毫之銳不聞雷霆之聲季子聽清角之韻不見嵩岱之形劉子史明有所不見聴有所不聞雖賢不能左畫方右畫圎史記董仲舒下帷講誦三年不窺圎西漢本傳劉峻勤學行常讀書不息地有坑坎每常倒蹶然後始悟梁書傳記目察秋毫之末者視不能見太山耳聴清濁之調者聴不聞雷霆之聲何也唯其意有所偏也說苑賈島為詩當其苦吟雖逢公卿貴人皆不之覺一日見京兆尹跨驢不避呼詰之乆乃釋韓愈傳禇遂良為太宗哀􅁽自朝還馬誤入人家而不覺隋唐佳語集仰面貪看鳥囘頭錯應人杜詩本朝方其得意於五物也太山在前而不見疾雷破柱而不驚六一居士傳吾將使世人左手運斤而右手執削目數飛鴈而耳節鳴鼓首肯旁人而足識梯級雖有智者有所不暇矣東坡心隨事移子事物交滑如理亂棼如渉驚浸一則以之怵惕一則以之忌諱一則以之懲剏是則一日之間一時之頃而徑寸之地如炎如冰矣子華子人有亡鈇者意在隣之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇音拙其谷而得鈇他日復見其隣之子動作態度無似竊鈇者列心憂恐則口銜芻豢而不知其味耳聴鍾鼓而不知其聲目眡黼黻而不知其狀輕煖平簟而體不知其安荀昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是甞矯駕吾車也韓昔彌子瑕有寵於衛君與君遊於果園食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛弛得罪於君曰是固甞啖我以餘桃同上史昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑左田單將攻狄見魯仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乗之燕復齊之墟今攻狄不下何也仲連曰將軍之在即墨坐則織蕢立則仗鍤為士卒倡當此之時將軍有死之心士卒無生之氣所以破燕也今將軍東有澠池之奉西有淄上之娱黄金横帶而騁乎淄澠之間有生之樂無死之心所以不勝也周赧王子夏聖門之髙弟也猶且出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自決而況中庸以下漸潰於失教被服於成俗乎史記禮書李廣出獵見草中石以為虎而射之中石沒矢視之石也他日射之終不能入矣西漢本傳物之興衰情之起伏理有固然矣而崇替去來之甚者必唯寵惑乎當其接牀第承恩色雖險情贅行莫不徳焉及至移意愛析嬿私雖恵心妍粧愈獻醜焉愛升則天下不足容其髙歡墜故九服無所逃其命東漢皇后紀論韋曜素飲酒不過二升孫皓初見禮異時常為裁減或宻賜茶茗以當酒至於寵衰便見逼強輒以為罪吴志樂廣甞有親客乆闊不復來廣問其故答曰前在坐蒙賜酒方飲見盃中蛇意甚惡之既飲而疾于時河南㕔事壁上有角漆畫作蛇廣意盃中蛇即角影也復置酒於前處謂客曰盃中復有所見不答曰所見如初廣乃告其所以客豁然意解沉疴頓愈晉書苻堅敗于淝水衆奔潰聞風聲鶴唳皆以為王師至此謝𤣥傳傳記熊渠子夜行見寢石以為伏虎彎弓而射之沒金引羽下視知其石也因復射之矢躍無跡韓詩外傳應郴為汲令請主簿杜宣賜酒時北壁上有掛赤弩照于盃中其影如蛇宣惡之便得疾云蛇入腹後郴使宣於故處設酒盃中復有蛇因謂宣曰此乃壁上弩影耳非有他怪宣意遂解風俗通芭蕉葉上無愁雨自是多情聴斷腸雅言系述集服藥求汗或有弗獲而愧情一集渙然流離終朝未餐則囂然思食而曽子銜哀七日不饑夜分而坐則低迷思寢内懐殷憂則達旦不瞑勁刷理鬢醇醴發顔僅乃得之壯士之怒赫然殊觀植髮衝冠嵇康養生論昔賈氏之如臯姑解顔於一箭醜夫為之改貌憾妻為之釋怨謝雉賦居懽惜夜促在戚怨宵長選情詩匪外物兮或改固懽哀兮情換潘安仁自縁今日人心别未必秋香一夜衰鄭谷詩謂十日菊花澗谷之水深不過咫尺丘垤之山髙不踰尋丈人則狎而玩之及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悸慄眩惑自失所觀變於前所守易於内韓文始知無正色愛惡隨人情白樂天舉食於人當饑渴之望也一飯千金及飫而進於前雖海陸備鼎顧與糠籺齒沈下賢本朝唐莊宗問郭崇韜曰昔吾與梁對壘於河上雖祁寒盛暑披甲跨馬不以為勞今吾居深宫䕃廣厦不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意艱難逸豫為慮不同勢自然也續世說論八珍者必嚥言糞􅁾者必唾二者未甞與我接也唾與嚥何從生哉東坡食中有蛆人之見者必嘔也其不見而食者未甞嘔也同上不拘形跡經同聲相應髙下不必均也同氣相求體質不必齊也易略史祁大夫外舉不棄讎内舉不失親左晉魏獻子為政魏戊為梗陽大夫獻子庶子庾亮在武昌諸佐吏殷浩之徒乗秋夜往共登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺便據胡牀而坐與浩等談詠晉書吳中大夫家有好竹王徽之欲觀之便造竹下諷嘯良乆主人洒掃請坐徽之不顧將出主人乃閉門徽之以此賞之盡懽而去王徽之傳陶潛既絶州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反晉書本傳或告右丞相魏徴私其親戚上使温彦博按之曰徴不存形跡逺避嫌疑心雖無私亦有可責唐太宗崔祐甫作相未逾年凡除吏㡬八百多稱允當上曰有人謗卿除擬官多涉親故如何祐甫曰進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲譴之由實在於此舊唐本傳髙元裕為中丞文宗難其代表言兄逸少才可任因以命之同上傳記晉王徽之有雋才少為桓沖參軍從沖值雨便下馬入沖車中謂曰豈有獨擅一車不容國士乎世說集古之知己者不待來求而後施徳舉能而已其受徳者不待成身而後拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚栁文啓本朝王子猷之愛竹造門不問於主人陶淵明之臥輿遇酒便留於道上歐公記纂淵海卷五十五
