body:
  text: 記纂淵海卷八十四宋潘自牧撰民業部治家經閑有家悔亡易家用平康書治家者不敢失於臣妾而况於妻子乎孝經子嚴家無格虜韓非子教護其家父母之則也管子王凝御家以四教勤儉恭恕正家以四禮冠㛰喪祭三年之蓄備則散之親族聖人之書及公服禮器不假垣屋什物必堅朴曰無茍費也門巷果木必方列曰無苟亂也文中子史趙武曰夫子之家事治左傳夫子謂范㑹也田嬰使文主家史記本傳夫纎嗇筋力治生之正道也史記貨殖傳教笞不可廢於家史記律書人棄我取人取我與歲熟取穀予之絲繭凶取帛絮與之食欲長錢取下穀長石斗取上種能薄飲食忍嗜慾節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法故其智不足以與權變勇不足以決斷仁不能以取予彊不能以有所守雖欲學吾術終不告之矣盖天下言治生祖白圭史記貨殖傳鞭扑不可㢮於家前漢刑法志范蠡之陶為朱公治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再散後遂至巨萬漢書貨殖傳萬石君居家子孫申申僮僕訢訢西漢石奮本傳任氏折節力田蓄富者數世然任公家約非田蓄所生不衣食公事不畢則不得飲酒食肉以此為閭里率西漢貨殖傳李通之父守為人嚴毅居家如官庭東漢本傳華歆遇子弟甚整雖閒室之内嚴若朝典蜀王顒曰今有人使奴執耕稼婢典炊爨鷄主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容高枕飲食而已忽一日盡欲以身親其役不復付任勞其體力為此碎物形疲神困終無一成豈其智之不若奴婢鷄犬哉失為家主之法也通鑑三國戒束子孫雖朱紫羅列無敢犯其法度者通鑑晉海西公紀貞元間言家法者尚韓穆二門李巽雖在私家亦置案牘簿書勾檢公署焉唐書閨門落然不聞人聲唐憲宗紀房𤣥齡治家有法度新唐書集善統其家慈訓其子白傅集囊篋細碎無所遺漏韓文屋舎經上棟下宇以待風雨易君子將營宫室宗廟為先廐庫次之居室為後晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱禮記魯共王好治宮室壊孔子舊宅以廣其居尚書序子大厦成而燕雀相賀淮南子史齊景公謂晏子曰子之宅近市湫隘囂塵不可以居請更諸爽塏者左傳開第康莊之衢史記孟子傳詔為列侯食邑者賜大第室食二千石從之長安受小第室前漢高紀住有甲乙次第故曰第也宣帝賜霍光家第一區前漢傳平恩侯許伯入第葢寛饒徃賀西漢葢寛饒傳新第成功堅西漢董賢傳紀瞻立宅於烏衣巷晉書郭洋為太尉長史起大宅在高陵城西世稱曰長史宅三輔决録楷營新宅基宇甚麗當移住與兄遊行牀帳儼然櫺軒疎朗兄心甚願之而口不言楷心知其意便使兄住裴楷别傳魏舒少孤為外家甯氏所養甯起宅相者云當出貴外甥舒曰當為外家成此宅相王隠晉書石崇有别館在河陽之金谷一名梓澤晉書本傳高門邃宇北史虢國中堂既成召工圬墁約錢二百萬復求賞技虢國以絳羅五百段賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受賞通鑑唐𤣥宗紀大臣將帥宦官競治第宅各窮其力而後止時人謂之木妖唐代宗紀裴度治第石林幽勝燠館涼臺號緑野堂度野服瀟散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事唐書本傳傳記廣室多陰逺天地之和也故聖人弗為春秋繁露陳秀公治第潤州池館綿亘數百步宅成公已疾甚肩輿一登西樓而已人謂之三不得居不得修不得賣不得沈括存中述筆談集夏屋廣大沙堂秀尺高堂邃宇層臺累榭網戸朱綴砥室翠翹楚辭幽堂晝宻文選七命仰視兮雲屋班媫妤賦羣窈窕之華麗嗟内顧之所觀故其館室次舎采飾纖縟西京賦十廡萬室蜀都賦金鋪交映玉題相輝蜀都賦累棟重霤葺墻羃室左太沖魏都賦既節比而攅集又宏璉以豐敞温房承其東序涼室處其西偏何晏賦邃宇列綺忩蘭臺接羅幕甲第崇高闥有所思行青樓臨大路高門結重關美女篇神靈扶其棟宇歴千載而彌堅王延夀賦為之者勞居之者逸大厦耽耽東西膠轕南北崢嶸土木丹彩光色如新陳子昻賦高樓對紫陌甲第連青山太白集高飛燕雀賀新成杜詩四壁含清風韋應物集樓閣玲瓏五雲起白侍郎高樓大觀金堂玉戸唐李愈東都集經之營之門房洞褰列舉豐厨危危掀掀皇甫湜廊腰縵囘簷牙高啄杜牧之園池經始命有園囿之樂焉詩註史楚子成章華之臺願與諸侯落之左傳深林絶澗有若自然東漢馮異傳竒禽馴獸飛聲其間同上襄陽諸習氏荆土豪族有佳園池晉書山簡傳宋簡文入華林園顧謂左右曰㑹心處不必在逺翳然林木便自有濠濮間想也世說上美榭高墉北史穿池種木小寄情賞南史徐勉傳裴度治第石林幽勝燠館涼臺號緑野堂度野服瀟散與白居易劉禹錫為文章把酒窮書夜相歡不問人間事唐書本傳林薄蒙翳唐書孟郊傳文宗用鄭注言即命左右神䇿軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞唐書集余旣滋蘭之九畹兮又樹蕙之百畆楚辭爰定我居築室穿池長楊映沼芳枳樹籬遊鱗瀺灂菡萏數披竹木蓊鬱靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之􅀥房陵朱仲之李靡不畢植三桃表櫻胡之别二李耀丹白之色石榴蒲萄之珍磊落蔓衍乎其側梅杏郁棠之屬繁華藻麗之飾華實照爛言所不能極也菜則葱韭蒜芋青筍紫薑堇薺甘旨蓼荽音綏芬芳蘘荷依隂蒔藿向陽緑葵含露白薤負霜潘岳閒居賦園日涉而成趣門雖設而常關歸去來辭盧園栖巖文選詩築山擬蓬壺穿池類溟渤鮑明逺代君子行岸旁花柳㸔勝畫浦上樓臺望是仙張九齡詩香泉草豐潔杜詩瞰臨𦕈空闊緑淨不可唾韓詩水容與天色此處皆緑淨斬茅而嘉樹列發石而清泉激輦糞壤焚椔翳却立而視之出者突然成丘陷者岈然成谷窪者為池而缺者為洞若有鬼神異物陰來相之韓文將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在見公之作知公之志公之因土而得勝豈不欲因俗以成化公之擇惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立亷公之居高而望逺豈不欲家喻而戸曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟以白雲為籓籬碧山為屏風昭其儉也决疏沮洳捜剔山麓萬石如林清風自生翠煙自留綿谷跨􅀈皆大石林立渙若奔雲錯若置碁怒者虎鬭企者鳥厲决其穴則鼻口相呀捜其根則蹄股交峙環行卒愕疑若摶噬於是刳闢朽壤剪焚榛薉决澮溝導伏流散為疎林洄為清池寥廓泓渟若造物者始判清濁效竒於兹地非人力也豈天墜地出設兹神物栁文春之日衆木華拆岸鋪島織沈浮照耀其水五色於是乎襲馨摘竒方舟逶迤樂魚時翻飄蕋雪飛沂㳂環迴隠映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松密竹深大柳起風甘棠垂隂於是乎濯纓漣漪解帶升堂畏景火雲隔林無光虛甍沈沈皓歴如霜羽扇不揺南軒清凉此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬱洞開太華爽氣出關而來於是乎絃琴端若景物廓如月委浩素水涵空虛鳥驚寒沙露滴高梧境隨夜深疑與世殊此則庾公西樓未足以澹神慮也冬之日彤雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰裳憑軒倚楹瑶堦如眞玉樹羅生日暮天霽雲開月明氷泉潺潺終夜有聲此則子猷山陰未足以暢吟嘯也呂温作虢州三堂記豐而不侈約而不陋以琴竹詩書之幽素易綺紈鐘皷之繁喧惟林池煙景不讓呂叔和文春有錦綉谷花夏有石門洞雲秋有虎溪月冬有爐峯雪隂陽顯晦昬旦含吐千變萬狀不可殫紀覼縷而言白樂天集四垂無蔽萬景坌入落花芳草無人處劉賓客花香逐陶令草色對王孫劉長卿峯奪香爐巧池偷明鏡圎沈文卿當門竹勝簾姚少監俗塵不飛人意自逺劉賓客本朝温公營獨樂園在洛中諸園景最為簡素人以公之故春時必遊明道集朝遊北城中囘首見脩竹下有朱門家破墻圍古屋舉鞭叩其戸幽響荅空谷入門所見多十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深牎户緑水光兼竹凈時有獨立鵠林中百尺松歲久蒼鱗蹙言惟此地少意恐關中獨小橋過南圃夾道多喬木隠如城百雉渥若丹千斛陰陰日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅棃驚合抱映島孤雲馥春光水溶漾雪陣風翻撲其北臨長溪波聲捲平陸我時來周覽問此誰所築云昔李將軍負險乗衰叔此亭破千家鬱鬱城之麓何嘗載美酒來此駐車轂人生營居止竟為何人卜何當辦一身永與清景逐東坡李氏園詩農經不耕穫不菑畬易无妄神農氏作斵木為耜揉木為耒繫辭平秩東作平秩西成書堯典若農服田力穡乃亦有秋盤庚惰農自安不昬作勞不服田畆越其罔有黍稷同上厥父菑厥子乃弗肯播矧肯穫大誥若稽田旣勤敷菑惟其陳修為厥疆畎梓材三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜詩七月晝爾于茅宵爾索綯亟其乘屋其始播百穀同上我田既藏農夫之慶彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利大田載芟載柞其耕澤澤載芟其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼良耜三農生九穀周禮太宰飭力以長地財謂之農夫考工記孟春王命布農事命田舍東郊善相丘陵阪險原隰土地所宜五穀所殖以教道民記月令為國家者見惡如農夫之務去草焉左傳政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔譬如農夫是穮是蓘雖有饑饉必有豐年並同上樊遲請學稼子曰吾不如老農論語長沮桀溺耦而耕丈人植其杖而芸並同上子不違農時穀不可勝食也孟子夫以百畆之不易為已憂者農夫也農夫豈為出疆舍其耒耜哉深耕易耨並同上事農則田墾田墾則粟多粟多則國富管子上農挾五中農挾四下農挾三農有常業一農不耕民有為之饑者同上良農不為水旱輟耕荀子史神農教民耕農故號曰神農史黄帝紀陳勝少時與人傭耕嘗輟耕之隴上悵然曰茍富貴無相忘傭者笑曰若為傭耕何富貴也勝太息曰嗟呼燕雀安知鴻鵠之志哉本傳楊惲報孫㑹宗書曰田家作苦歲時伏臘烹羊炮羔斗酒自勞酒後耳熱仰天拊缶而歌嗚嗚前本傳農夫父子暴露中野不避寒暑捽山把土手足胼胝漢書農之良者善養禾賈山至言諸葛亮躬耕隴畆好為梁父吟蜀本傳明宗問馮道今歲雖豐百姓贍足否道曰農家歲凶則死於流殍歲豐則傷於穀賤豐凶皆病惟農夫為然臣記聶夷中詩云二月賣新絲五月糶新穀醫得眼前瘡剜却心頭肉語雖鄙俚曲盡田家之情狀上命録其詩嘗諷誦之五代史傳記周家以農事開國國語旦暮從事於田野霑體塗足同上農不失時則成之農失其時則敗之六韜集雉雊麥苖秀蠶眠桑葉稀王維日出布穀鳴田家擁鋤犁李白歸閒事耦耕同上卜宅從兹老為農去國賖杜詩農月須知課田家敢忘勤同上刈熟擔肩頳韓詩為農信可樂柳詩穡人先耦耕九扈鳴已晩楚鄉農事春並同上倉廩無宿儲徭役獨未已方慚不耕者禄食出閭里韋應物老翁家貧在山住耕種新田三四畆苗疎稅多不得食輸入官倉化為土歲暮鋤犁倚空室呼兒登山收橡實江西賈客珠百斛船中養犬食粱肉張籍凌晨起飯牛雙駕耕東菑儲光羲日旰嬾耕鋤登高望川陸空山足禽獸墟落多喬木同上父耕原上田子斸山下荒六月禾未秀官家已修倉聶夷中本朝田家何所樂臺笠日相親六一集菖葉侯耕辰同上西崦人間應最樂煑葵燒筍餉耕人東坡卷野畢秋穫殷床聞夜舂歲晏風日暖人牛相對閒勸農使者古大夫不惜春衫踐泥塗千人耕種萬人飡一年辛苦一冬閒但令黄犢無人佩布穀何勞也勸耕脫冠還作扶犂叟並同上水秧綿綿復多稌龍骨長乾桂梁梠鮒魚出網蔽洲渚荻笋肥甘勝牛乳王介甫南村北村同一犂新婦餉姑翁哺兒山谷看人秧稻午風凉同上圃經折柳樊圃詩東方未明二曰園圃毓草木周禮太宰任圃以樹事貢草木閭師樊遲請學為圃曰吾不如老圃論語子子貢南遊於楚過漢隂見一丈人方將為圃畦鑿隧而入井抱瓮而出灌搰搰然用力甚勞而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多為圃者曰柰何曰鑿木為械後重前輕挈水若抽數如泆湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備吾非不知羞而不為也莊子傳記張老者楊州六合縣園叟也韋恕有女既笄張老延媒媪求娶之媪曰豈有衣冠子女肯嫁圃叟耶張老強之媪不得已入言之韋恕怒曰為吾報之今日内得五百緡即可未幾車載納於韋氏諸韋大驚曰吾度其必無今不移時而錢到當如之何遂許焉張老既取韋氏園業不廢鬻蔬不輟親戚惡之張老曰某王屋山下有一莊明旦當歸耳他日可令大兄徃天壇山南相訪後如其言訪之盖仙云廣記有一秀才求㛰卜人曰君之室方二歲在滑州郭南姓某氏其父母見灌園為業秀才不樂徑詣滑訪之一日伺其父母出引女嬰使前以細針内其􅀈中而去女竟無恙後秀才登第娶亷使女其妻每天氣陰晦輒發頭痛醫者以藥封腦上有頃肉潰出一針遂愈因訪問女之所出方知本圃者之女云玉堂閒話劉晏少妙道術遇道流三人飲酒極歡曰世間還得似我輩否一人曰王十八後晏於衡山縣喫冷淘香菜芳潔劉公問此菜何所得答曰縣有官園子王十八能種此莱劉公訪王十八與俱歸其後劉公病已屬纊得王十八藥三丸灌之蹶然而起逸史集幾道泉澆圃交横落幔坡杜詩圃畦新雨潤媿子廢鋤來連筒灌小園並同上蠶經桑土既蠶書禹貢有鳴倉庚女執懿筐遵彼微行爰求柔桑詩七月蠶月條桑同上十畝之間兮桑者閑閑兮十畝之間婦無公事休其蠶織禁原蠶者周禮原再也季春戴勝降於桑具曲植籧筐后妃齋戒東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服記月令天子諸侯必有公桑蠶室卜三宫夫人世婦之吉者使入蠶於蠶室桑於公桑子五畆之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣孟子食桑而吐絲前亂而後治夏生而惡暑喜晴而悲雨蛹以為母以為父三俯三起事乃大已夫是之謂蠶理荀子賦篇史正月上甲風從東方來冝蠶史天官書光武時野蠶成繭被於山阜後本紀武德五年梁州野蠶成繭唐書尹思正為青州刺史蠶至歲四熟本傳傳記東郭採桑之女項有大瘤齊閔王遊至東郭百姓盡觀瘤女採桑如故王怪問之對曰父母教採桑不受教觀大王王曰此竒女也遂聘為后齊國大治列女傳蜀之先有蠶叢帝又高辛時蜀有蠶女父為人所掠惟所乘馬在其母誓曰有得父還者以此女嫁之馬聞言驚躍而去數日父乃乘馬歸自此馬嘶鳴不肯齕草母以告父父曰誓於人不誓於馬安有人而偶非類乎馬跑父怒射殺之曝其皮於庭皮蹶然而起卷女飛去棲於桑上女化為蠶食桑吐絲成繭蜀人塑女象披馬皮謂之馬頭娘以祈􅁞焉圗經張成見一婦人立宅東南角曰此地是君蠶室正月半日可作白粥膏泛於其上以祭之當令君家蠶業百倍成如其言果大得蠶續齊諧記園客美姿貎常種五色香草忽有五色蛾集其上客收之生花蠶焉有一女自來養蠶以香草飼之得繭百二十枚大如瓮繰訖此女與園客倶去濟隂今有華蠶祠焉女仙録集緑條映素手採桑向城隅李白三日開箔雪團團先將新繭送縣官已聞鄉里催織作去與誰人身上著王建本朝桑城日暖蠶浴六一集車鳴繅白繭桑葉正肥蠶食飽並同上野人香火祝春蠶東坡扶桑大繭如瓮盎天女織綃雲漢上同上當須了租賦豈暇恤􅃭袴前知寒切骨甘心兩骭露文與可樵經翹翹錯薪言刈其楚詩漢廣薪是穫薪尚可載也大東樵彼桑薪白華問士之子長㓜長曰能負薪㓜曰未能負薪禮記請無扞采樵者以誘之左傳其父析薪其子弗克負荷同上史朱買臣常刈薪賣以給食妻亦負戴相隨妻羞之求去買臣曰吾年五十當富貴今四十餘年矣姑待之妻詈曰如公終餓死溝中耳何能富貴買臣不能留乃聽其去後買臣為㑹稽太守云前本傳傳記郎詠隠西昌採樵為業或擔至郡中人買之則曰我西昌逸士酒中人也今獻公所缺公當惠我所好廬陵記王質入山採樵見二童子奕棋所持斧置坐而觀之童子曰汝斧柯爛矣質歸鄉閭無復時人述異記見謀類集或山而樵韓文雪逕抵樵叟同上採薪隴坂長李白樵蘇逺相號柳詩野迴樵唱來同上谷口樵歸唱杜詩本朝行歌採樵去六一集薪歌曉入浦同上樵童忽兩三東坡偶隨樵父採都梁竹屋松扉試乞漿有如採樵子入洞聽琴筑尋山跨坑谷騰趠筋骨強並同上牧經爾牧來思伺蓑何笠或負其餱詩無羊牧人乃夣衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱同上在坰之野坰四曰藪養蕃鳥獸周禮太宰牧人掌牧六牧而阜蕃其物以共祭祀之牲牷牧人牛有牧馬有圉左傳子今有受人之牛羊而為之牧之者則必為之求牧與芻矣孟子孔子嘗為乘田矣曰牛羊茁壯長而已矣同上君見牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣列子百里奚爵禄不入於心故飯牛而牛肥使穆公忘其賤而與之政莊子臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問榖奚事則􅀶塞以遊二人者事業不同其於亡羊均也同上史卜式不願為郎上曰吾有羊在上林子為牧之式乃布衣草履而牧羊歲餘羊肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗羣上竒其言漢書匈奴徙蘇武置北海上使牧羝羝乳乃得歸公孫𢎞牧豕海上並同上李密感厲讀書以蒲韀乘牛掛漢書一帙於牛角上行且讀唐書傳記甯戚俟齊桓公出扣牛角歌曰南山燦白石爛生不遭堯與舜禅短布衣單纔至骭從昬飯牛至夜半長夜漫漫何時旦桓公召之因以為相三齊畧記初平牧羊有道士將入金華山石室中四十餘年其兄初起尋之道士引至山中相見兄問羊何在初平曰近在山東初起徃視但見白石無數還曰無羊初平與兄倶徃叱之云羊起於是白石俱起成羊闕牧歌竹枝詞者乘牛扣角至寺而歌闕公家貧自牧牛與里中兒更甘為牛師廣記集閒時田畝中搔背牧鷄鵝李白驪山茂陵盡灰滅牧牛之子來攀登同上斜陽照墟落窮巷牛羊歸野老念牧童倚杖候荆扉王維牛羊晩自歸兒童戲野田王貞白稼穡既自務牛羊還自牧儲光羲牛羊識童僕向夕自相呼杜詩草肥朝牧羊鄭谷本朝乞我一牧童林間聽横笛山谷漁經包羲氏作結繩而為網罟以佃以漁易繫辭其釣維何維絲伊緡詩何彼穠矣毋逝我梁毋發我笱谷風及小弁敝笱在梁敝笱魚麗於罶魚麗南有嘉魚烝然罩罩南有嘉魚之子於釣言綸之繩其釣維何維魴及鱮采緑􅈄人掌以時􅈄與梁春獻王鮪辨魚物為鱻薧以共王膳羞周禮公矢魚於棠公羊曰公如棠觀魚登來百金之魚而張之注云張網羅也登來美問大得也春秋公羊傳子釣而不綱論語子數罟不入洿池魚鼈不可勝食也孟子漁之為事也有鈎網罟笙罛罶岺罾笱攭梁罨箅􅩬銛之類尸子渤海之東有五山焉曰岱輿貟嶠方壺瀛洲蓬萊帝使巨鼇十五舉首而戴之迭為三畨而龍伯之國有大人一釣而連六鼇於是岱輿貟嶠二山沉於大海列子詹何以獨繭絲為綸芒鍼為鉤荆蓧為竿剖粒為餌引盈車之魚於百仭之淵綸不絶鉤不申竿不撓同上任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海期年不得魚已而大魚食之牽巨鈎陷没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神燀赫千里自淛河以東蒼梧以北莫不厭若魚者莊子莊子釣於渭水楚王使大夫二人徃先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生莊子曰徃矣吾將曵尾於塗中同上子思居衛衛人釣於河得鮦魚焉其大盈車子思問何以得之對曰吾一釣而垂一魴之餌鮦過而弗餌更以豚之半體則吞之子思曰鮦雖難得貪以死餌士雖懷道貪以死禄孔叢子太公釣隠溪五十六年矣而未嘗得一魚魯連徃而觀之太公跪石隠崖且不餌而釣仰詠俯吟及暮而釋竿符子聖人以道德為竿綸以仁義為鈎餌投之天地間萬物孰非其有哉淮南子史舜漁雷澤雷澤之人皆讓居史記吕望窮困年老以漁釣干周西伯同上詳見琴操類韓信至淮陰城下釣有一漂母哀之與之食前本傳臨川羡魚不如退而結網禮樂志又董仲舒傳作臨淵嚴光字子陵少與光武同遊帝思其賢令物色訪之齊國上言有一男子披羊裘釣澤中乃聘之除諌議不屈耕於富春山後名其釣處為嚴陵瀨後漢書左慈字元放嘗在曹公座公曰今日髙㑹所少者呉松江鱸魚為鱠耳元放因求銅盤貯水以竿餌釣於盤中須㬰引一鱸魚出方術傳翼莊惟以弋釣為事及長不復獵或問漁獵曰是害生之事而先生止去其一何哉莊曰獵自我釣自物且夫貪餌忘釣豈我哉晉書陶侃少時漁於雷澤嘗網得一織梭以掛於壁有頃風雷化為龍而去同上宋文帝嘗與羣臣臨天泉池垂綸良久不獲景文越席曰臣以為垂綸者清故不獲貪餌南史王𢎞之性好釣或問曰漁思得魚賣否曰亦自不得得亦不賣同上傳記善釣者引魚於千仞之下餌香也吕氏春秋太公釣於慈泉同上吕望釣於渭渚三日三夜魚無食者農人曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其言初下得鮒次得鯉刳腹得書曰呂望封於齊藝文類聚周文王至磻溪見呂望文王拜之尚曰望釣得玉璜刻曰周受命呂佐尚書帝命驗宓子賤為單父宰陽晝曰有釣道二焉請以送子投綸餌迎而吸之者陽鱎魚也薄而不美若亡若存若食不食者魴魚也薄而厚味子賤未至單父冠葢交接於道子賤曰車驅之陽晝所謂陽鱎者至矣說苑揚州太守閭丘㑹僚友於轉沙亭令漁户曰得魚多者有賞有一漁人以肉物作塊散懸於網上凡十網得魚三千六百太守詢之曰魚喜鹿胎香適散懸者乃此物也楊州事迹楚江邊有漁者或問之曰君之漁隠人之漁邪漁人之漁邪漁者曰昔姜牙之漁嚴子陵之漁書於青史皆以為隠人之漁也殊不知不釣其名耶若以漁人之漁但以月白風和浪靜得魚供庖宰一身足餘則易酒獨醉又焉知隠人之漁漁人之漁也瀟湘録張志和居江湖自稱煙波釣徒著𤣥眞子以自號垂釣不設餌志不在魚也魚歌録集屈原既放行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故至於斯屈原曰舉世皆濁而我獨清衆人皆醉我獨醒是以見放漁父曰世皆濁何不淈其泥而揚其波衆皆醉何不餔其糟而啜其醨屈原曰新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎漁父皷枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足楚辭綿州江水之東津魴魚鱍鱍色勝銀漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉騰出如有神潛龍無聲老蛟怒迴風颯颯吹沙塵杜詩蒼江漁子清晨集設網提綱萬魚急能者操舟疾若風撑突波濤挺义入小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈強泥沙有時立強擬晴天理釣絲接縷垂芳餌試問垂綸客把釣待秋風並同上狂歌從此别垂釣滄浪前李白羽沉知食駛緡細覺牽難韓詩坐厭親刑柄偷來傍釣車吾黨侯生字叔起呼我持竿釣温水平明鞭馬出都門盡日行行荆棘裏温水微茫絶又流深如車轍闊容輈蝦䗫跳過雀兒浴此縱有魚何足求我為侯生不能已盤針擘粒投泥滓晡時堅坐到黄昬盡日持竿方一起暫動還休未可知蝦行蛭度似皆疑忽然舉線若有得一寸纔分鱗與鬐君欲釣魚須逺去大魚豈肯居沮洳义魚春岸闊此興在中宵中鱗憐錦碎當目訝珠銷競多心轉細得雋語時囂潭罄知存寡舷平覺獲饒盈車欺故事飼犬驗今朝獺去愁無食龍移懼見燒如棠名既誤釣渭日徒消並同上漁澤從鰌魴柳詩去來伊洛上相待安笟單柳詩我為一寸鉤欲釣千丈流魚翁夜傍西巖宿曉汲清湘燃楚竹煙銷日黯不見人欸乃一聲山水緑並同上雨來蓴菜流船滑春後鱸魚墜釣肥皮日休西塞山邊白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣春江細雨不知歸又曰釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不曽憂張志和本朝陸龜蒙升舟設蓬席齋束書茶竈筆牀釣具徃來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人自叙采江之魚兮朝船有鱸采江之蔬兮暮筐有蒲左圗且書右瑟與壺陸龜蒙笭箵苦難滿六一集笭箵取魚器也向暮卷空罾同上漁蓑句好眞堪畫東坡還有江南風物好流水鱖魚肥仰㸔雲天真篛笠旋收江海入簑衣千首新詩一竿竹不應空釣漢江槎何日西湖尋舊賞淡煙踈雨暗漁蓑漁父飲誰家去魚蟹一時分與酒無多少醉為期彼此不論錢數漁父醉簔衣舞醉裏却尋歸路孤舟短棹任縱横醒後不知何處漁父醒春江午夢斷落花飛絮酒醒還醉醉還醒一笑人間今古漁父笑輕鷗舉漠漠一江風雨江邊騎馬是官人借我孤舟南渡並同上一江風月趂漁船山谷寕容網目漏吞舟誰能烹鮮作苛碎后山獵見禮儀部田獵類工經若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹雘書梓材五曰百工飭化八材周禮太宰攻木之工七輪輿弓廬匠車梓攻金之工六築冶鳬㮚段桃攻皮之工五函鮑韗韋裘設色之工五畫繢鍾筐㡛刮摩之工五玉櫛雕矢磬摶埴之工二陶旊考工記百工之事皆聖人之所作也同上天子之六工曰土工金工石工木工獸工草工典制六材記曲禮子為巨室則必使工師求大木孟子離婁之明公輸子之巧不以規矩不能成方圎梓匠輪輿能與人規矩不能使人巧大匠不為拙工改廢繩墨大匠誨人必以規矩學者亦必以規矩並同上梓慶削木為鐻見者驚猶鬼神莊子鄭人堊漫其鼻端若蠅翼使匠石斵之匠石運斤成風盡堊而鼻不傷工倕旋而葢規矩指與物化而不以心稽輪扁曰斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪並同上周穆王廵狩有獻工人名偃師王問曰若有何能曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫鎭其頥則歌合律捧其手則舞應節千變萬化惟意所適穆王曰人之巧乃可與造化者同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也聞偃師之巧終身不敢語藝而時執規矩列子史申屠蟠家貧傭為漆工郭林宗見而奇之後漢書宋武平關中得姚興指南車有外形而無機杼每行使人於内轉之昇明中齊高帝使祖冲之改造銅機圎轉不窮而向方如一馬均以來未之有也南史祖冲之以諸葛亮有木牛流馬乃造一器不用風水施機自運不勞人力冲之有造千里船於新亭江試之日行百餘里並同上隋煬帝北廵宇文愷造觀風行殿上容衛者數百人下施輪軸推移倐忽有若神功北史裴延齡大搜市㕓逮捕匠徒迫脅就工號曰敕索弗讎其直名曰和顧弗與之庸唐書虢國中堂既成召工圬墁約錢二百萬虢國以絳羅五百段賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受直𤣥宗紀傳記始皇起雲明臺窮四方珍木天下巧工有二人皆虛騰縁木運斤斧於雲中子時起工至午時已畢故云子午臺也拾遺録凌雲臺樓觀極精巧恒隨風揺動而終無崩隕魏文帝懼其勢危别以大材扶持之樓即傾壊論者謂輕重力偏故也世說魯般燉煌人巧侔造化於涼州造浮屠作木鳶每擊揳三下乘之以歸六國時公輸班亦為木鳶以窺宋城雜爼北齊有沙門靈昭有巧思武成帝令於山亭造流杯池船每至帝前引手取杯船即自徃上有木小兒撫掌遂與絲竹相應飲訖放杯便有木人刺還飲若不盡船終不去廣記集班倕棄其剞劂兮王爾投其鉤繩甘泉賦夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其冝施以成室者匠氏之工也韓文木之就規矩在梓匠輪輿不善為斵血指汗顔巧匠旁觀縮手袖間並同上裴封叔之第在光德里有梓人欵其門願傭隟宇而處焉所軄尋引規矩繩墨家不居礱斵之噐其後京兆尹將飾官署委羣材㑹衆工梓人左執引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者趨而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列柳文本朝開寳寺塔都料預浩所造塔初成望之勢傾西北人問之浩曰京師多西北風吹之不百年當正也國朝以來木工一人而已有預都料木經三卷行於世闕商賈經日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑易繫辭懋遷有無化居書益稷六曰商賈阜通貨賄注云行曰商處曰賈周禮太宰以商賈阜貨而行市司市或通四方之珍異以資之考工記秦師伐鄭商人弦高遇之以乘韋先牛十二犒師且使遽告於鄭左傳韓宣子有玉環其一在鄭商宣子請之子産不與韓子買諸賈人既成價矣賈人曰必以聞子産曰昔我與商人皆出自周世有明誓以相信也曰爾無我叛我無強賈爾有利市寶賄我勿與知今吾子以好來辱敝邑而謂敝邑強奪賈人是教敝邑背明誓也同上子商賈皆欲藏於王之市行旅皆欲出於王之塗孟子市㕓而不征法而不㕓則天下之商皆恱而願出於其路矣古之為市也以其所有易其所無者有司者治之耳有賤丈夫焉必求壠斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣並同上良賈不為折閲不市荀子楚人有賣其珠於鄭者為木蘭之櫃薫桂椒之櫝綴以珠玉飾以玫瑰輯以翠羽鄭人買其櫝而還其珠此可為善賣櫝矣未可謂善鬻珠也韓子市井相與言則以財與利揚子史貪賈三之㢘賈五之史記孔氏用冶鐵致富因通商賈之利故南陽行賈盡法孔氏之雍容天下熈熈皆為市來天下穰穰皆為市往史貨殖傳序百里不販樵千里不販糴同上商賈大者積貯倍息小者坐列販賣操其竒贏日遊都市乘上之急所賣必倍前食貨志乗堅䇿肥履絲曵縞此商人所以兼并農人所以流亡也同上灌嬰以販繒為業漢書張湯始為小吏乾没與長安富賈田甲魚翁叔之屬交私漢高祖令賈人不得衣綵乘車重租税以困辱之孝惠高后時為天下初定復弛商賈之律並同上富商賈或滯財役貧轉轂百數廢居居邑前食貨志宋劉伯龍歴位九卿郡守貧窶尤甚嘗在家慨然將營什一之利一鬼在傍撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所笑南史何妥父細脚胡通商入蜀因致巨富號為西州大賈北史傳記段干木晉國之大駔呂氏春秋柳仲郢有婢失意鬻之女儈導於刺史藍巨源他日巨源召鬻綾羅者酬酢可否柳婢失聲而仆命輿還女儈家翌日詰其所苦曰某雖賤人曽為柳家細婢死則死矣安能事賣綾羅牙郎乎廣記有貧人止販隻瓮夜宿瓮巾心計曰此瓮賣之其息已倍遂可販二瓮自二而四其利無窮遂喜而舞不覺瓮破小記集商賈百族禆販夫婦鬻良雜苦蚩眩邊鄙西京賦巷列千所羅居百族則能目語額瞬談智於尺寸之間窺窬於分毫之際成伯陽賦吏非商也吏而商汙吏之為商未若亷吏之為商也柳文五方之賈以財相雄而鹽賈尤熾或云賈雄則農傷予感之作賈客詞劉禹錫冒良芳之巧言斁量衡於險手抄忽之差鼔舌傖獰詆欺相高詭態横出同上天外賈客歸李白本朝晨裝赴徒旅夕宿訪閭井六一集門前商賈負椒菽山後咫尺連巴蜀東坡未能逐什一安得摶九萬同上記纂淵海卷八十四
