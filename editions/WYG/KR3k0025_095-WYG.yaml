body:
  text: 記纂淵海卷九十五宋潘自牧撰木部雜木見五行部木類松松栢松脂茯苓附經青州厥貢鉛松怪石書山有喬松詩如松栢之茂蔦與女蘿施于松栢徂徠之松陟彼景山松栢丸丸詩如松栢之有心也故貫四時而不改柯易葉禮記培塿無松栢松栢之下其草不殖左傳哀公問社於宰我宰我對曰夏后氏以松嵗寒然後知松栢之後凋也論語子受命於地惟松栢獨也在冬夏青青天寒既至雪霜既降吾是以知松栢之茂也莊子嵗不寒無以知松栢事不難無以知君子荀子千嵗之松下有茯苓上有兎絲淮南子松三千嵗者皮中有聚脂如龍形名曰飛節芝玉策記千嵗松樹望之如偃盖其中有物或如青牛青羊青犬或如人服之皆壽萬嵗大陵偃盖之松與天齊其長地等其久也謂冬必凋而松栢茂抱朴子史松栢為百木長也史記庾顗見和嶠嘆曰嶠森森如千丈松雖磥砢多節施之大厦有棟梁之用王隱晉書陶𢎞景特愛松風庭院皆植松每聞其響欣然為樂有時獨遊泉石望見者以為仙人梁書彭城王勰從幸代都次于上黨之銅鞮山路傍大松樹十數株帝行而賦詩令人示勰曰吾作詩雖不七步亦不言逺汝可作之勰去帝十餘步未至帝所而就詩曰松林經幾冬山川何如昔後魏書傳記松脂淪入地中千嵗為茯神茯苓𤣥中記温山松栢常茂不落焦贑易林松脂一名松膏一名松肪久服輕身延年本草嵩山有大松樹或百嵗千嵗其精變為青牛或為伏龜採食其實得長生嵩山記永寧縣界海中有松門島嶼上皆生松王羲之逰郡記石門岩即松林也南臨石門澗澗中仰視之離離如駢麈尾號麈尾松西嶺松如馬鬛又葉五粒者名五粒松服之長生廬山記松凡言兩粒五粒粒當言鬛段成式修行里私第大堂前五鬛松五鬛皮不鱗唐仇士良水嵦亭子有兩鬛皮不鱗者又有七鬛者不知自何而得俗謂孔雀三鬛松也松根下遇石則偃盖不待千年也廣記南岳百里有福地松髙數千尺圍即數尋而蘂甘採此松膏而服不苦澁與諸處松别十道記秦始皇封禪泰山風雨暴至休於松樹下因封其樹為五大夫漢官儀丁固夢松樹生腹上謂人曰松字十八公也後十八年為公遂如夢吳録松栢之地其土不肥説苑百仭之松本傷于下而末槁於上呂氏春秋伏生者當湯時為木正常食松脂偓佺好食松實能飛行逮走馬以松子遺堯不能服列仙傳漢末大亂宮人小黄門避兵食松栢實遂不復飢舉體生毛魏武聞而始收養還食穀米齒落髪白異苑李元禮冽冽如長松下風周君颼颼如小松下風世説東都龍興觀有古松樹枝偃倒垂相傳云已經千年常有白鶴飛止其間西京雜記沙門𤣥装大唐武德中將徃西域取經於龍岩寺前見一松樹以手摩其枝曰吾西去求佛教汝可西長若吾歸即却東回及去年果西指一年忽東回果東歸衆謂此松為摩頂松廣記朝真觀九星院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香逰之不數日松皆半枯事畧集流潤飛津沉精幽結貞㽔含芳仰拂素雪庾肅之賛南山石嵬嵬松栢何崔崔上枝拂青雲中心十數圍扶風歌撫孤松而盤桓懷此貞秀姿卓為霜下傑陶詩松數千株切切交呼如冠劒大臣國有疑難庭立而議杜牧賦亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁風霜正慘悽終嵗恒端正豈不罹霜雪松栢有本性劉公幹松栢本孤直錯落千丈松虬龍盤古根松栢雖寒苦羞逐桃李春隂生古苔緑色染秋煙碧何當凌雲霄直上數千尺南窓蕭瑟松聲起憑誰一聽清心耳李白大哉霜雪榦嵗久為寒材疎松隔水奏笙簧松林駐逺清偃盖反走虬龍形中有松栢參天長黛色參天二千尺幽色幸秀發踈柯亦昂藏未見紫煙集虛䝉清露沾何當一百丈欹盖擁髙簷兩株慘列白蘚皮新松恨不髙千尺落落出羣非桃栁青青不朽豈楊梅欲存老盡千年意為覓霜根數寸栽杜詩藍田丞崔斯立痛掃溉對植二松日吟哦其間藍田丞行壁記日出霧露餘青松如膏沐積雪表明秀寒花助窓籠幽真如有慕恃以延秋風竒姿來逺山勁色不改舊芳心誰與榮清韻動竽笙諧此風中聲商山臨路有孤松往來斫以為明好事者憐之編竹成援遂其生植感而賦詩云孤松挺翠盖託根臨廣路不以險自防遂為明所誤幸逢仁惠意重以籓籬䕶猶有半心存時將承雨露韓詩翠盖煙籠密花幢雪壓低與僧清影坐借鶴穩枝棲白居易本朝松鳴澗底自風寒青松守節見臨危正色凛凛不可犯松老無風韻自寒六一集虬角龍鬚不可攀亭亭千丈䕃南山應嗟無地逃斤斧豈願争明爝火間此詩為道傍大松人取為明作萬壑風生成夜響千山月照掛秋隂豈因糞壤栽培力自得乾坤造化心王介甫朅來齊安野夾路鬚髯蒼㑹開龍蛇窟不惜斤斧瘡縱未得茯苓且當拾流肪東坡坐待老龍蛇清䕃滿南臺孤根裂山石直榦排風雷我今百日客養此千嵗材天公不救斧斤厄野火解憐氷雪姿已負梁棟質肯為兒女悲林中百尺松嵗久蒼龍蹙松花釀仙酒養此霜雪根遲待鸞鳯吟欝欝蒼髯真道友十年春雨養髯龍澗底松根劚雪腴並同上喬松千尺老不僵兮流膏入土龜蛇藏兮欝欝蒼髯千嵗姿肯來杯酒作兒嬉醉裏便成歌雪舞醒時喚作嘯風詞上有百尺絲兎絲也下有千嵗苓老松閲世卧雲壑晩著滄江舞萬牛蟠空作風雨發地鳴鼓吹太邱心灑落古松韻清深聊持不俗耳靜聴無絃琴老去惟心在相依到嵗寒山谷松生隂隘岩嶽穴械病乎不快卒以為怪擁腫支離神羞鬼疑道人咨嗟筆傳其竒或怪于形或竒于辭吾為怪魁是以讃之陸龜䝉怪松圖賛連根欲鬭岩巒力一盖常涵雨露清曽映月明留鶴宿近經雷霹𢃄龍腥劉屏山椿子上古有大椿樹以八千嵗為春八千嵗為秋列子又莊子傳記盧攜夢人贈句曰若問登庸日庭椿不染風後拜相庭下古椿一株雖狂風驟雨不濕不摇鳯池集檜經杶榦栝栢注云栢葉松身曰栝書檜楫松舟詩傳記檜栢葉松身爾雅李徳裕平泉莊有鴈翅檜葉婆娑如鴈翅也花木記本朝亳州太清宫殿前有老檜南枝礙簷以真宗將幸欲加斤斧一夕大風雷及曉檜枝已轉而北矣真宗甚愛之因謂之御愛檜青瑣髙議夜深蒼檜起天風蜂採檜花村落香檜為凌雲材累此孤髙榦雪霜不改終古色風雨有聲當夏寒六一集汝隂多古檜處處屯蒼雲體備松栢姿氣含芝术薰初扶鶴骨立未出龍纒筋團團山上檜嵗嵗閲榆栁天才固已殊安得同永久當年雙檜是雙童相對無言禮更恭庭雪到腰埋不死如今化作兩蒼龍凛然相對敢相欺直榦凌空未足竒根到九泉無曲處世間唯有蟄龍知依依古仙子欝欝緑毛身栽培一寸根寄子百年心東坡植檜三尺强已有凌雲氣􅃡懷萬仞巔千大欝蒼翠蟠根泉石底用意霜雪外後山深盖屈蟠青麈尾老皮張展黑龍鱗惟將寒色資琴興不放秋聲染俗塵秦韜玉栢經荆州厥貢杶榦栝栢書汎彼栢舟詩新甫之栢詩子栢經冬而不凋䝉霜而不變可謂得其貞矣荀子大谷倒生之栢與天齊其長地等其久也抱朴子史朱博為御史大夫府中列栢有野烏數千栖其上詳見御史臺類漢武帝造栢梁殿昭帝時長安諸陵栢樹枯倒者悉起生葉蟲食作字云曽孫病已立後昭帝崩昌邑王被廢迎立宣帝名病已漢書栢者鬼之庭也東方朔傳魯郡孔子舊廟有栢樹二十株經歴漢晉莫犯也江夏王義恭悉遣人取之父老皆歎息宋書王晏之為員外郎也父普曜齋前栢樹忽成梧桐論者以為梧桐雖有棲鳯之美而失後凋之節齊書魏蘭根丁母憂郡境有董卓祠祠有栢樹蘭根以卓凶逆無道不應立祠乃伐栢以為椁材北齊書長壽二年萬象神宮側有檉松栢唐書傳記栢椈也爾雅栢曰蒼官三水小牘華山生文栢地理志甲申天子升於大北之隥而降休於兩栢之下穆天子傳磅山之北有穴穴上有栢昔李少翁於閬隂移來此穴種此栢已見扶桑三枯海水涸竭洞冥記泰山廟中栢皆三十餘圍赤眉嘗斫一樹見血而止今斧印猶在從征記廣成子好食栢實齒落更生列仙傳栢谷漢武帝㣲行所至處述征記盧氏縣有盧君古塜傍古栢二樹文隱起皆龜甲堅如鐵石述異志李徳裕平泉莊有珠子栢實如珠子生葉上花木記集既殊羣而抗立亦含貞而挺正豈春日之自芳亦霜下而為盛烈風不能摧其枝積雪不能改其性雖坎􅇄於當年庶後凋之可詠齊江夏王鋒修栢賦信松茂而栢悦文選孔明廟前有老栢柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺崔嵬枝榦郊原古窈窕丹青户牖空落落盤据雖得地冥冥孤髙多烈風扶持自是神明力正直元因造化功苦心豈免容螻蟻香葉終經宿鸞鳯錦官城外栢森森凌雲翠不奪有栢生崇岡童童狀車盖偃蹇龍虎姿生當風雲㑹翠栢深留景杜詩幽幽太華側老栢如建纛龍皮相排戛翠羽更蕩掉李賀題處尚尋王内史畫時應是鮑參軍長廊夜静聲疑雨古殿秋深影勝雲温庭筠詠晉栢本朝㓂萊公知巴東縣嘗手植䨇栢於縣庭至今民以比甘棠謂之萊公栢澠水燕談孤山有陳時栢二株其一為人所薪山下老人自為兒已見其枯矣然堅悍如金石愈於未枯者僧志詮作堂於其側名之曰栢堂枝撑雲峯裹根入石窟蟠瘦皮纒鶴骨髙頂轉龍腰蒼龍轉玉骨黑虎抱金柅道人手種幾生前鶴骨龍姿尚宛然東坡集凛凛節竒霜澗栢六一集嵗月那能記風霜亦飽經槁乾仍故節潤澤出新青秀色有新古英姿無暑寒後山槐經面三槐三公位焉周禮趙宣子驟諌公患之使鉏麑賊之麑觸槐而死左傳子五沃之土其木宜槐管子水中有火乃焚大槐莊子槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬葉成淮南子槐子服之補腦令人髪不白而長抱朴子史建始四年山陽社中大槐樹吏人伐斷之其夜復自立如故漢書大司馬府有老槐樹殷仲文歎曰此樹婆娑生意盡矣晉書庾肩吾甞服槐實年七十餘目看細字鬢皆黒梁書貞元中度支欲取兩京道中槐樹為薪先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊逰豈宜斬伐虢州刺史蕭祐奏湖城縣百姓閻酆五代同居家内槐一本再生枝葉唐書傳記櫰槐大葉而黑守宮槐葉晝聶宵炕爾雅槐木者虛星之精春秋説武王問太公曰天下神來甚衆恐有試者何以待之太公曰請樹槐於王門内有益者入無益者距之太公金匱齊景公有所愛槐令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐隣國聞之謂君愛槐而殘人可乎晏子入言之公罷其禁晏子春秋廣陵王元淵夢著衮衣倚槐樹立問於楊元慎元慎曰三公之祥退而告人曰廣陵死矣槐字木傍鬼死後當得三公廣陵討葛榮果為所殺追贈司徒洛陽伽藍記淳于棼嘗夢入大槐安國其王以棼為南柯太守及覺尋其所經由乃宅南大槐下一蟻穴耳廣記甘泉北有槐今謂玉樹三輔黄圖集樹以青槐𤣥隂耽耽文選夾道疎槐出老根夏槐作雲屯韓詩毿毿金蘃撲晴空舉子魂驚落照中鄭谷本朝晉國王公祐嘗手植三槐於庭曰吾子孫必有為三公者已而其子文正公旦相真宗於景徳祥符之間細細槐花暖欲零緑槐髙處一蟬吟東坡曉日宫槐影山谷漢家宮殿䕃長槐嫩色葱葱不染埃天仗龍旗穿影去鈎陳豹尾拂枝來梅堯臣楊栁經枯楊生稊老夫得其女妻枯楊生華老婦得其士夫易折栁樊圃東門之楊其葉牂牂昔我徃矣楊栁依依北山有楊菀彼栁斯有菀者栁詩子五沃之土宜栁管子支離叔觀於㝠伯之丘崑崙之墟黄帝之所休俄而栁生其左肘莊子夫木槿楊栁斷而植之更生倒之亦生横之亦生抱朴子史周亞夫屯軍細栁營漢書王恭美姿容或目之曰濯濯如春月栁太康末京洛為折楊栁之歌是時三楊貴盛而被族㓕太后幽死宮中折楊之應也晉書陶潜有髙趣宅邊植五栁樹故嘗著五栁先生傳南史劉俊之獻蜀栁數株條甚長狀若絲縷武帝植於靈和殿前嘗翫嗟曰此楊栁風流可愛似張緒當時見賞如此齊書栁機在周與族人昂俱歴顯要及機昂並為外職楊素方用事因上賜宴素戲機曰二栁俱摧孤楊獨聳髙熲初孩孺時家有栁樹髙百許尺亭亭如盖里中父老曰此家當出貴人後熲果至宰相煬帝自坂渚引河築街道植栁名曰隋堤隋書中書省有栁樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞栁梁修仁監造蓬萊宮列種白楊示契苾何力曰此木易成不數十年可庇何力不答但誦白楊多悲風蕭蕭愁殺人之句修仁驚悟更植以桐唐書傳記檉河栁旄澤栁楊蒲栁爾雅楊蒲栁也從木易聲檉河栁也從木聖聲栁小楊也從木夘聲説文鵲巢栁樹鳩奪其處焦贑易林正月栁稊稊者發葉也大戴禮均萑谷其木多栁鳯伯之山熊山直陵之山木多栁平丘山爰有楊栁沃民之國有白栁山海經栁華一名栁絮本草展禽家有栁樹身行惠徳故號栁下惠許慎淮南子注漢苑中有栁狀如人一日三起三倒號曰人栁侯鯖録陶侃明識過人武昌道上通種楊栁人有竊之植於家侃見識之問何以盗官所種時以為神晉中興書栁汁染衫三峯集見狀元類李將失名以幸姬栁氏與韓翊天寶末盗覆二京洎宣皇帝反正翊乃遣人間行求栁氏以練囊盛麩金而題之曰章臺栁章臺栁昔日青青今在否縱使長條似舊垂也應攀折他人手栁氏答之曰楊栁枝芳菲節所恨年年贈離别一葉隨風忽報秋縱使君來豈堪折本事走張敞為京兆尹馬街有栁市故號章臺栁杜詩云京兆空栁市集在余年之二七植斯栁乎中庭始圍寸而髙尺今連拱而九成魏文帝賦垂楊䕃御溝文選溧陽酒樓三月春楊花茫茫愁殺人楊花滿江來疑是龍山雪栁色黄金嫩花飛玉關雪葉暖金牕煙河堤栁弱欝金枝昨夜東風入武陽陌頭楊栁黄金色池南栁色半青青縈煙裊娜拂綺城垂絲百尺掛雕楹上有好鳥相和鳴李白顛狂栁絮隨風舞糝徑楊花鋪白氊輕輕栁絮㸃人衣市橋官栁細髙栁半青天隔溪楊栁弱嫋嫋恰似十五女兒腰青歸栁葉新岸容待臘將舒栁漏泄春光有栁條枝枝總到地葉葉自開春紫燕時翻翼黄鸝不露身杜詩栁花閒度竹栁巷還飛絮栁色壓城勻雨多添栁耳别來楊栁街頭樹擺撼春風秪欲飛韓詩栁州栁太守種栁栁江邊好作思人樹慙無惠化傳栁詩青青東門栁嵗晏必憔悴李泌譏楊國忠也鳯闕輕遮翡翠幃龍池遥望麯塵絲御溝春水相輝映狂殺長安年少兒花萼樓前初種時美人樓上鬭腰肢如今抛擲長街裏露葉如啼欲恨誰御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離劉夢得柳枝詞色映妖韶栁不比禁中人栁終朝剩得三眠絮飛藏皓蝶帶弱露黄鸝灞岸已攀行客手楚宫先騁舞姬腰已帶黄金縷仍飛白玉花長時須拂馬密處更藏鴉曽逐東風拂舞筵樂遊春􅁐斷腸天如何肯到清秋日已帶斜陽又帶蟬李義山灞上漢南千萬樹幾人逰宦别離中緑隂未覆長堤水金穗先迎上􅁐風杜牧半煙半雨江橋畔映杏映桃山路中㑹得離人無限意千絲萬絮惹春風鄭谷自家飛絮猶無定争把長條絆得人羅隱楊栁千條拂面絲緑煙金穗不勝吹温庭筠栁意不勝春韋蘇州本朝栁絮已將春去逺落絮風捲盡春歸不留迹六一集為問如何挿楊栁明年飛絮作浮萍長恨漫天栁絮輕只將飛舞占清明東坡栁送腰肢日幾囬更教飛絮舞樓臺顛狂忽作髙千丈風力㣲時穏下來陳去非桑桑柘附蠶事詳見民業部經其亡其亡繫於苞桑易桑之未落其葉沃若于嗟鳩兮無食桑葚桑之落矣其黄而隕星言夙駕説於桑田無踰我墻無折我樹桑肅肅鴇行集於苞桑交交黄鳥止於桑隰桑有阿翩彼飛鴞集於泮林食我桑黮懐我好音詩季春命野虞毌伐桑柘記晉重耳將行謀於桑下趙宣子田於首山舍於翳桑左傳子子産開畆樹桑鄭人謗訾韓子季夏取桑柘之火鄒子史齊魯千畆桑其人與千户侯等史記張堪為漁陽太守百姓歌曰桑無附枝麥秀兩岐陳􅁮為巫令桑旅生二萬餘株民以為給後漢書先主舍有桑樹生髙丈餘遥望如小車盖或謂當出貴人先主少時與宗中諸兒於樹下戲言吾必當乘此羽葆車盖蜀志齊太祖宅南有桑樹擢本三丈横出四枝狀如車盖上年數嵗逰於其下從兄敬宗謂曰此樹為汝生也齊書傳記女桑桋桑俗呼小桑長條者為女桑樹檿桑山桑書曰厥篚檿絲詩曰其檿其柘是也桑栁醜條妸娜垂條也並爾雅宣山上有桑髙五千尺圍五丈其枝四衢葉大尺赤理青葉名曰帝女之桑東北海外圓丘有三桑無枝皆髙百仭山海經東方有樹焉髙八千丈葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸神異經桑木者箕星之精典術伊尹之母孕伊尹夢神告之曰臼出水而東走無顧明日視臼果出水告其隣東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒於空桑之中獻之於君命之曰伊尹吕氏春秋楚邊邑之女與吳邊邑處女争界上之桑二家相攻吳國不勝遂伐楚二都吳越春秋東華夫人設珍肴有扶桑丹椹廣記集出自薊北門遥望胡地桑枝枝自相值葉葉自相當曺植歌緑葉興而盈尺崇條蔓而増尋陸機賦上似華盖紫極比形下象鳯闕萬桷一楹樊欽賦桑柘起寒煙謝眺嫋嫋桑柘葉桑柘羅平蕪李白桑柘葉如雲舍西柔桑葉可拈杜詩桑葉忽蕪蔓韓詩官罷得絲髪好買百樹桑杜牧嫋嫋陌上桑䕃陌復垂塘長條繫白日細葉隱鸝黄古樂府本朝桑枝生椹鳥啁啾兩岸桑柘雜耕耘風勁野田桑柘折緑桑髙下映平川桑柘千疇富六一集去年東坡拾瓦礫自種黄桑三百尺傳云古隆中萬樹桑柘美東坡梧桐經梧桐生矣于彼朝陽詩子舍其梧檟養其樲棘孟子據槁梧而瞑棲鵷鶵非梧桐不棲莊子傳記梓實桐皮曰椅今民云梧桐也詩義疏櫬梧也爾雅君乘火而王其政平梧桐為常生禮斗威儀王者任用賢良則梧桐生於東廂瑞應圖梧桐不生則九州異注云梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二月有閏則十三葉視葉小者則知閏何月也不生九州各異君天下不同也遁甲經梧桐生於嶧山陽岩石之上採東南孫枝為琴聲甚清雅風俗通梧桐有白者驃國有白桐木其華有白毳取其毳淹漬緝織以為布廣志益州有梧桐木其華采如絲人績以為布名曰華布華陽國志梧桐生山石間者為樂器則鳴齊民要術梧桐園在吳夫差舊國一名琴川梧園宮在句容縣古樂府云梧宫秋吳王愁是也述異記人有折博陵君豹山園桐枝者公曰何為傷我鳯條雜爼桐乳桐子也似乳著葉而生婁要集爰有梧桐生於北谿傅根朽壤託險生危七蠲井梧棲靈鳯古詩寒井落梧桐文選梧桐落金井一葉飛銀床梧桐巢燕雀今兹大火落秋葉黄梧桐梧桐識佳樹秋色老梧桐李白青梧日夜凋碧梧棲老鳯凰枝杜詩霜風侵梧桐衆葉著樹乾空堦一片下琤若摧琅玕摵摵井梧疎更殞韓詩秋雨梧桐葉落時白樂天髙梧一葉下空齋歸思多參差剪緑綺瀟洒覆瓊柯韋蘇州本朝猗猗井上桐花葉何衰衰下䕃百尺泉上聳凌雲材翠色洗朝露清隂當午階斯梧乃佳樹意若名吾齊六一集卧聞踈響梧桐雨露葉耿髙桐東坡庭梧自黄隕風過成夜雨風梧有先聲秋色傍梧桐眼趂髙梧上碧蘿後山桐經徐州嶧陽孤桐書季春之月桐始華記子五沃之土其木宜桐管子拱把之桐梓人茍欲生之皆知所以養之者孟子智者有所不足故桐不可以為弩夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招摇挾刑徳而弗能破者以其無勢也淮南子史蔡邕聞吳人燒桐以㸑者聞火烈聲因請以為琴漢書詳見琴賦豫章王於邸起山列種桐竹號為桐山齊書傳記榮桐木爾雅有青桐白桐赤桐白桐宜琴瑟詩義䟽桐枝濡毳而又空中難成易傷湏成氣而後華易緯吹臺有髙桐皆百圍嶧陽孤桐方此為劣逰名山志成王與唐叔虞燕居剪桐葉以為珪曰以此封汝虞喜以告周公周公請封虞成王曰余與虞戯也周公曰天子無戯言遂封叔虞於晉吕氏春秋北宗雅禪師建蘭若庭多古桐一年中桐始華有異蜂聲如人禪師網獲一焉寘紗籠中忽有數人集籠外曰予與青桐君奕勝得琅玕紙數幅雜爼集龍門之桐髙百尺而無枝中欝結而輪囷根扶疎以分離七發寒山之桐出自大冥含黄鍾以吐榦據蒼岑而孤生十合䨇桐生空井枝葉自相和通泉溉其根𤣥雨潤其柯魏明帝孤桐北窗外髙枝百丈餘葉生既婀娜葉落更扶疎謝𤣥暉昔也植朝陽傾枝俟鸑鷟今者絶世用倥偬見迫束班匠不我顧牙曠不我録焉得琴瑟成何由揚妙曲司馬彪分根䕃玉池欲待髙鸞集沈約桐香待鳯池李賀樹暗惜桐孫杜牧一株青玉立千葉緑雲委山木多蓊欝兹桐獨亭亭葉重碧雲片花簇紫霞英為君布緑隂當暑䕃軒楹為君發清韻風來如叩瓊受君陽和徳不獨含芳榮戒君無戯言剪葉封弟兄受君嵗月功不獨資生成為君長髙枝鳯凰上頭鳴白居易本朝疎柯青玉聳密葉翠羽䝉午景凝餘清夕照留殘紅雨響甍棟外風生户牖中司馬公梓經維桑與梓必恭敬止詩子拱把之桐梓孟子史子胥將死告其舍人曰必樹吾墓上以梓令可以為器而抉吾眼懸吳之東門上以觀越兵之入吳也史記應順遷東平相有梓樹生於㕔事室上順事後母至孝衆以為孝感之應後漢書傳記楰䑕梓爾雅七詩義疏曰今永昌人謂䑕梓漢人謂之楰君乘火而王其政和平楸梓為常生禮斗威儀玉山碧山多梓木雞山美梓山海經太姒夢太子發取周庭之梓樹於商闕間化為松柏竹書康叔伯禽問於商子商子曰南山之陽有木名橋北山之隂有木名梓二子盍徃觀焉二子往觀見橋木髙而仰梓木晉而俯反以告商子曰橋者父道也梓者子道也尚書大傳秦文公造長安宫終南山有梓樹䕃宫中公惡而伐之輙大風雨夜夢有鬼謂梓樹曰近者使三百人被頭以絲繞樹豈不敗汝樹黙然不應明日秦王依此言伐之中有青牛逐之入澧水𤣥中記松陽門内有大梓樹先枯永嘉中忽更榮花元帝果繼大業豫章記集斬泗濵之梓以為筝文選柟傳記黄金山有柟樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓樹者此是也潯陽記馮大亮見樵叟八人各出柟木一截纔五六寸栽於庭中曰此樹徑尺則家財百萬旬日而樹已凌空大徑尺其金玉自至廣記集柟樹色冥冥江邊一盖青上枝摩皇天下根盤厚地凍雨落流膠衝風奪嘉氣猶含棟梁其無復霄漢志杜詩本朝國寧觀有古柟四皆千嵗木也枝擾雲漢聲挾風雨根入地不知其幾百尺而隂之所庇車且百兩正晝日不穿漏夏五六月暑氣不至凛如九秋有石刻立廡下曰是仙人蘧君手植陸放翁古柟記記纂淵海卷九十五
