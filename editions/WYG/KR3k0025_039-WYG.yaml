body:
  text: 記纂淵海卷三十九宋潘自牧撰人倫部祖父母經逮事父母則諱王父母不逮事父母則不諱王父母記父之考為王父父之妣為王母爾雅史鄭當時知友皆大父行西漢本傳賈逵自為兒戲弄常設部伍祖父習異之曰汝大必為將魏志張憑字長宗祖鎭蒼梧太守憑年數嵗鎮謂其父曰我不如汝有嘉兒憑曰阿翁詎宜以子戲父乎晉書苻堅幼而無賴祖洪甚惡之生無一目洪戲之曰吾聞瞎兒一淚生怒引刀自刺出血曰此亦一淚洪鞭之生曰性耐刀槊不堪鞭箠洪曰吾將以爾為奴生曰可不如石勒也本傳范喬祖父馨臨終執其手曰恨不見女成人因以所用硯與之陳書李百藥為童兒時多疾病祖母趙氏故以百藥為之名唐書傳記潘尼稱祖曰家祖顔氏家訓侯霸子孫稱其祖父曰家公同上臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命文選李令伯陳情表父經家人有嚴君焉父母之謂也易父兮生我詩靡瞻匪父陟彼岵兮瞻望父兮無父何怙同上父子之天父子一體父子首足也父至尊也同上由命士以上父子皆異宫記父之親子也親賢而下無能父尊而不親同上父作之子述之中庸為人父止於慈大學母取其愛而君取其敬兼之者父也孝經子父子主恩孟父子之間不責善離婁下君子之扵子愛之而勿面使之而勿貎面貎謂以顔色慰恱之不欲施小恵也荀子為人父寛恵而有禮君道石奮石建父子之美也無是父無是子無是子無是父楊孝至傳子之能仕父教之忠左僖二十二父一而已父慈而教昭六魏奚達驍勇周文曰非此父不生此子北史傳記客有問陳季方曰足下家君有何功徳而荷天下重名季方曰吾家君譬如桂生扵太山之阿上有萬仭之高下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知泰山之高淵泉之深不知有功徳與無也世說父子之嚴不可以狎骨肉之愛不可以簡簡則慈愛不接狎則怠忽生焉北齊顔氏家訓陳思王稱其父為家父同上囝别郎罷心摧血下囝音蹇閩俗呼子為囝父為郎罷唐顧况補亡哀閩章諸父經既有肥羜以速諸父詩諸父兄弟備言燕私變小楚親親則諸父昆弟不怨記中庸父之昆弟先生為世父後生為叔父爾雅子王珪従子求續經子曰叔父通何徳以之哉珪曰勿辭也文中子闗朗篇史荀攸字文達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志曹操少無賴叔父數言之扵嵩操患之後逢叔父扵路乃陽敗面喎口叔父以告嵩呼操曰叔父言汝中風已差乎操曰初不中風但失愛叔父故見罔耳晉書曹瞞傳王湛字處沖司徒渾之弟兄子濟輕之嘗詣湛見周易謂曰叔父何用此為湛曰體中不佳時脫復看耳復一作腹恐非濟請言之湛剖析𤣥㣲妙有竒趣濟才氣抗邁扵湛畧無子姪之敬既聞其言心形俱肅王湛有隠徳宗族皆以為癡武帝見濟曰癡叔死未濟曰臣叔不癡同稱其美同上母經家人有嚴君焉父母之謂也易母氏劬勞詩母氏聖善同上陟彼屺兮瞻望母兮靡依匪母無母何恃母兮鞠我同上父在為母何以期也屈也至尊在不敢伸其私尊也儀禮䘮服父卒繼母嫁従為之服報傳曰何以期也貴終也嘗為母子貴重其恩繼母之配父與因母同故孝子不敢殊也同上注因猶親也子上之母死而不䘮門人問子思曰昔者子之先君子䘮出母乎子思曰為伋也妻者是為白也母不為伋也妻者不為白也母故孔氏之不䘮出母自子思始也記檀弓上伯魚之母死期而猶哭夫子聞之曰誰與哭也門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之同上為父後者為出母無服䘮服母親而不尊表記母之親子也賢則親之無能則憐之同上子幼被慈母三遷之教孟曽參後母遇之無恩其妻蒸藜不熟出之家語史陸續母截肉未嘗不方㫁葱以寸為度東漢本傳王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥俱往及長娶妻母虐使祥妻覽妻亦趨而共之祥漸有時譽母深疾之宻使鴆祥覽知之徑起取酒祥争而不與母遽奪之自後母賜祥饌覽輒先嘗通鑑魏元帝紀天后上表請自今父在為母服齊衰三年唐髙宗紀韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寛唐武后紀李公孝四歲䘮母九歲外繼其後父更别娶後妻至是而亡劉炫以為無撫育之恩議不解任劉子翊駁之曰傳云繼母同母也當以配父之尊居母之位齊杖之制皆如親母繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有乎服既有之心䘮焉可獨異今言令許不解何其甚繆以親繼親既等故心䘮不得有殊如謂繼母之來在子出之後制有淺深考之經傳未見其文昔長沙人王毖漢末為上計詣京師既而吳魏隔絶毖在内國更娶生子昌毖死後為東平相始知吳之母亡便請繋居重不攝事于時議者不以為非然則繼之與前於情無别若要以撫育始生服制王昌復何足云乎又晉鎭南將軍羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭田伯生存養也伊不敢違然無父命故還本生尚書彭權議子之出養必由父命無命而出是為叛子扵是下詔従之然則心服之制不得縁恩而生也然本父後妻因父而得母稱若如來㫖本父亦可無心䘮乎何直父之後妻也事奏竟従子翊之議栁文劉子翊傳記陳思王稱其母為家母顔氏家訓魯母師魯九子之寡母也穆公賜號母師列女傳集母訓曰慈嵇含傳上堂拜家慶選秋胡詩太夫人御板輿選閒居賦芬芬孟母鄰杜詩舅姑經婦人不飾不敢見舅姑記婦事舅姑如事父母下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之内則婦將有事大小必請扵舅姑不敢専行舅姑之所有命之應唯敬對不敢噦噫􅅉咳欠伸跛倚睇眡唾咦寒不敢襲癢不敢搔不敢袒裼舅姑之衣衾簟席枕几不傳移也杖屨勿敢近舅没則姑老注傳家事扵子婦也同上婦盥饋舅姑卒食婦餕餘私之也郊特牲婦稱夫之父曰舅稱夫之母曰姑在則曰君舅君姑没則曰先舅先姑爾雅子室無空虛則婦姑勃豀莊子外物篇注争處也吾聞先生姑國語婦養姑者也左姑慈婦聴禮也同上禮送女父誡之曰謹従汝舅之言母誡之曰謹従汝姑之言榖梁婦姑不相說則反唇而相稽稽計也西漢賈誼傳顔師古曰尊章猶言舅姑也西漢廣川王傳注舅姑之心豈可失常哉東漢列女曹世叔妻傳傳記古者子婦供事舅姑旦夕在側與男女無異北齊顔氏家訓婦對舅姑之稱同上庻母附所生母及慈母經為庶母何以小功以慈已加也儀禮䘮服士為庶母何以緦也以名服也大夫以上為庶母無服慈母如母傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則葬之三年如母貴父之命也同上諸母不漱裳記曲禮上注庶母也庶母賤可使漱衣不可使漱裳婦謂夫之庶母為少姑爾雅子王子有其母死者其傅為之請數月之䘮孟子史母以子貴注妾子立則母得為夫人成風是也公羊隠元王符無外家東漢本傳阮孚之母即姑婢也晉書本傳周顗母李氏字絡秀顗父為安東將軍求絡秀為妾父兄不許絡秀曰門户殄瘁何惜一女子遂與之生嵩顗曰我屈節為汝家妾同上崔道固諸兄逼道固所生母自致酒炙客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賓汝冝荅拜後魏志李迥秀母氏庶賤而色養過人通鑑唐則天紀下卷傳記裴秀母是婢秀年十八有令望而嫡母妬猶令秀母親下食與衆賓賓見竝起拜之答曰㣲賤豈冝如此當為小兒故耳於是嫡母乃不敢復役之語林漢中程文矩妻者李法之娣也有二男前妻四子以母非所生憎毁日積而穆姜慈愛温仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以逺之對曰吾方以義相導使其自遷善也及前妻長子興遇病困篤母惻隱自然親調藥膳恩情篤宻興疾久乃瘳扵是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道盡隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之徳狀已之過乞就刑辟東漢列女傳諸母經世母叔母何以亦期也以名服也儀禮䘮服父之兄妻為世母父之弟妻為叔母爾雅史宗室諸母因酣恱曰文叔少時謹信唯直柔耳今迺能如此後光武紀謝瞻幼孤叔母撫育有恩同於至親宋書傳記羊祜年十五而孤事伯母蔡氏以孝聞三十國春秋夫婦經夫夫婦婦而家道正易夫婦之道不可以不久也故受之以恒同上宜其室家宜其家人詩桃夭糓則異室死則同穴詩女曰雞鳴士曰昧旦子興視夜明星有爛詩蟲飛薨薨甘與子同夢同上妻子好合如鼓瑟琴常棣夫婦以禮義合顔色相親亦不可以顔色衰棄其相與之禮邶谷風箋夫婦一體也儀禮䘮服夫尊於朝妻貴於室同上夫婦之禮唯及七十同藏無間内則妻將生子及月辰居側室夫使人日再問之同上一與之齊終身不改郊特牲合􅈟而飲同上夫義婦聴記夫婦和家之肥也君子之道造端乎夫婦同上共牢而食合􅈟而酳所以合體同尊卑以親之也記日之與月隂之與陽相須而後成也記子夫婦有别孟子夫婦之道不可不正也荀大畧史冀缺耨其妻饁之敬相待如賔左僖三十二鳥獸猶不失儷成十一夫和而義妻柔而正昭六為夫婦内外二經二物昭二十五易基乾坤詩始闗雎夫婦之際人道之大倫也史外戚世家夫婦之道有義則合無義則離西漢夫婦人倫大綱夭壽之萌也王吉䟽夫婦之好父不能得之於子通鑑漢光武紀何曽閨門整肅與妻相見正衣冠相待如賔己南面妻北面再拜上酒一嵗不過再三晉書山濤布衣家貧謂妻韓氏曰忍饑寒我後當作公但不知卿堪為公夫人不耳本傳沈文季飲酒至五斗妻王氏飲亦至三斗常對食竟日宋書夫貴扵朝妻榮扵室後魏志傳記夫婦之道人倫之始王化之端也吳越春秋惟夫妻為同庖劉向列女傳王渾妻鍾夫人每嘗卿渾渾曰詎可爾妻曰憐卿愛卿是以卿卿我不卿卿誰當卿卿世說集合昏尚知時鴛鴦不獨宿杜詩非是夫不稱是妻白樂天結髪為夫妻恩愛兩不疑蘓子卿詩音容相眷戀羽翮兩逶迤飛翻不異林和鳴多好音陳子昂集雜佩以迎之寳瑟以友之其相得如青鳥翡翠之婉孌矣同上謂言琴與瑟糟糠結久長盧仝詩夫婦之道參配隂陽通逹神明夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢婦不事夫則義禮堕夫婦之好終身不離夫有再娶之義婦無二適之文東漢列女傳夫經夫子制義従婦凶也易夫者妻之天也儀禮䘮服婦人稱夫曰良士昏禮注夫也者以知帥人者也記郊特牲子良人者所仰望而終身也孟為人夫致功而不流致臨而有辨荀君道史夫主嘉美東漢列女傳夫主之不可以不事正色端操以事夫主同上傳記婦人既嫁以夫為天父母降服一等無二天之義列女傳集非是夫不稱是妻白樂天藁砧今何在夫也樂府解題妻經唯酒食是議詩妻子好合如鼔瑟琴同上父在則為妻不杖儀禮䘮服為妻何以期也妻至親也記檀弓為伋也妻者是為白也母不為伋也妻者是不為白也母同上大夫内子註適妻也記曽子問不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席韣器而藏之内則子甚宜其妻父母不說出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰同上妻也者親之主也敢不敬與哀公問子為人妻夫有禮則柔従聴侍夫無禮則恐懼而自悚荀君道列子之妻曰妾聞有道之士妻子皆得佚樂莊子史叔向對齊晏嬰曰撫有晉國賜之内主左昭三婢子侍巾櫛僖二十二有息女願為箕箒妾西漢髙紀妻者夫之隂杜欽傳東方朔割名扵細君揚雄傳解嘲師古曰以肉歸遺細君是損割其名宋𢎞曰糟糠之妻不下堂東漢本傳黄承彦者高爽開朗為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黄頭黑色而才堪相配孔明許即載送之時人以為樂鄉里為之諺曰莫作孔明擇婦正得阿承醜女三國志註襄陽記賈充前妻李氏坐徙後娶郭氏赦得還詔充置左右夫人郭氏怒為李築舘舎於外晉書禮義有愆夫則薄之東漢列女傳夏侯道遷不聘正室後魏書傳記妻齊也共奉祭祀樊英列傳謝太傅兄奕女名道藴王凝之妻也世說謝羯絶重其婦張𤣥常稱其婦同上集東方朔割炙於細君漢揚雄解嘲作名選作各有注作嬪君子室秋胡詩爰奉嬪於髙族寡婦賦中饋酒食之事總論細君知蠶織韓集卓文君作白頭吟諷相如樂府出妻經有女仳離詩子甚宜其妻父母不說出記妻出夫使人致之曰某不敏不能従而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命如舅在則稱舅舅没則兄無兄則稱夫雜記下子婦有七出不順父母者無子者淫僻者嫉妬者惡疾者多口舌者竊盜者家語本命篇曽參後母遇之無恩供養不衰其妻以蒸藜不熟因出之人曰非七出也參曰蒸藜小物耳吾欲使熟而不用吾命況大事乎七十二弟子解自叔梁紇始出妻及伯魚亦出妻至子思又出妻故稱孔氏三世出妻後序孟子惡敗而出妻荀子解蔽注惡其敗徳而出妻傳王吉妻取東家棗啖吉乃去婦西漢本傳鮑永事後母至孝妻嘗於母前叱狗永即出其妻東漢本傳姜詩事母至孝妻奉順尤篤母好飲江水妻常泝流而及值風不時得還母渇詩責而遣之列女傳黄允遣妻夏侯氏集客二百人數允隠匿事十五而去允遂廢見本傳李迥秀母氏族賤而色養過人其妻崔氏嘗叱其媵婢母聞之不恱迥秀即時出之或止之曰賢室雖不避嫌疑然過非出狀何遽如此迥秀曰娶妻本以承順顔色茍違何敢留也舊唐書本傳大戴婦有七去不順父母去無子去淫去妬去有惡疾去多言去竊盜去不順父母為其逆徳也無子為其絶世也淫為其亂族也妬為其亂家也有惡疾為其不可與共粢盛也多言為其離親也盜竊為其反義也大戴禮本命篇集姜詩出婦盖為小瑕鮑永去妻亦非大過白樂天判反目經輿脫輻夫妻反目不能正室也易傳謝朓妻常懷刃欲殺朓不敢相見通鑑齊高宗集昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦蘇武詩畏内經夫子制義従婦凶也易繫于金柅柔道牽也同上惟婦言是用書牧誓史牽扵帷廧之制西漢鄒陽傳讀作牆孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆執刀侍立先主每入中心常凜凜蜀志王導為丞相妻曹氏性妬導甚憚之乃宻營别館以處衆妾曹氏知而將往焉導恐妾被辱遽命駕晉書子經子克家易幹父之蠱幹母之蠱同上嗣續妣祖詩父為長子不言適者通上下也亦言立適以長傳曰何以三年也正體於上又乃將所以傳重也庶子不得為長子三年不繼祖也儀禮䘮服男子冠而不為殤注云殤者男未冠而死可殤者男子二十冠而字記大夫之子長曰能御矣士之子長曰能典謁矣庻人之子長曰能負薪矣同上男子生設弧於門左内則子也者親之後也哀公問已冠而字之成人之道也冠義男子生桑弧蓬矢六以射天地四方射義父母生之續莫大焉孝經子遺腹子不思其父無貎扵心也不夢見像無形扵目也淮南子說林訓繼子得食肥而不澤情不相往來也適子懷扵燕慈母喻於荆情相往來也列子傳鄭文公有妾夢天與己蘭曰以是為而子以蘭有國香人服媚之如是左宣二以母貴隠元注以母秩决立也家有長子曰家督史越世家子者父之隂也西漢杜欽傳奉先人之遺體王尊傳自季至雄五世而傳一子故雄無他揚扵蜀揚雄傳李宻曰為人子者願為人兄不願為人弟兄事親之日長弟事親之日短蜀志郤志傳注集十子若不肖不如一女英李白集通子繼餘塵揚杯祝願無他語特勿頑愚似汝爺同上繼體承家白氏六帖驥子好男兒杜詩大兒九齡色清徹秋水為神玉為骨小兒五歲氣食牛滿堂賔客皆回頭徐卿二子歌閩俗呼子為囝音蹇顧况補亡本朝何如陶家兒繞舎覔梨栗坡詩羲之生五子同上大兒踉蹡越門限小兒咿啞語繡帳坡詩子道經凡為人子之禮冬温而夏凊昬定而晨省在醜夷不争記曲禮夫為人子者三賜不及車馬夫為人子者所逰必有常所習必有業恒言不稱老為人子者居不主奥坐不中席行不中道立不中門不登髙不臨深不茍訾不茍笑不服闇不登危懼辱親也父母存不許友以死不有私財父母存冠衣不純素父母有疾冠者不櫛行不翔言不隋琴瑟不御食肉不至變味飲酒不至變貎笑不至哂怒不至詈同上子之事親也三諫而不聴則號泣而隨之記曲禮下親有疾飲藥子先嘗之同上事親有隠而無犯左右就養無方服勤至死致䘮三年檀弓上未仕者不敢稅人如稅人則以父兄之命不専家財也稅謂遺于人同上父母之衣衾簟席枕几不傳移也杖履勿敢近内則在父母之所有命之應唯敬對不敢噦噫􅅉咳欠伸跛倚睇眡不敢唾咦寒不敢襲癢不敢搔不敢袒裼父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫不說與其得罪扵鄉黨州閭寧熟諫父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果子甚宜其妻父母不說出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰父母之所愛亦愛之父母之所敬亦敬之至扵犬馬盡然同上親在行禮於人稱父人或賜之則稱父拜之事統於尊記玉藻父命召唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時親癠色容不盛同上身者父母之遺體也行父母之遺體敢不敬乎祭義父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆一舉足而不敢忘父母是故道而不徑舟而不㳺不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出扵口忿言不反扵身不辱其身不羞其親孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容父母既没謹行其身不遺父母惡名可謂能終矣父母全而生之子全而歸之可謂孝矣同上子之事親有三道焉生則養沒則䘮䘮畢則祭祭統父母在不敢有其身不敢私其財坊記善則稱親過則稱己君子弛其親之過而敬其美従命不忿㣲諫不倦勞而不怨父母在不稱老言孝不言慈閨門之内戲而不嘆父母在饋獻不及車馬同上仁人之事親也如事天哀公問身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本同上不敢擅重事所以自卑而尊先祖也冠義事父母幾諫見志不従又敬不違勞而不怨語故當不義則子不可以不争於父孝經子曰父母其順矣乎中庸子孝子不諛其親莊孝子不生慈父之家順子為人子敬愛而致文荀従義不従父同上孝子不從命有三従命則親危不従命則親安孝子不従命乃禮従命則親辱不從命則親榮孝子不従命乃義從命則禽獸不從命則修飭孝子不従命乃敬子道傳子孝而箴左昭六聶政曰母在政身未敢以許人也史本傳親有嚴客帣攸衣䙝也韝音備鞠曲也􅎽其紀反與跪同謂小跪也侍酒於前史淳于髠傳得子經維熊維羆男子之祥乃生男子載寢之牀載衣之裳載弄之璋詩史徐陵母臧氏嘗夢五色雲化而為鳯集左肩上已而誕陵焉時有寳誌上人者世稱其有道陵年數嵗家人攜以候之寳誌手摩其頂曰天上石麒麟也南史傳記王鎭惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒興吾宗以鎮惡為名宋略集男兒當門户堕地目生神傅𤣥豫章行門衰祚薄晩有兒息選陳情表玉樹長新枝韋應物詩豈料鬢一作髮成雪方看掌弄珠白傅集何時能反哺共養白頭烏且有承家望誰論得子遲同上掌珠一顆兒三嵗鬢雪千莖父六旬同上未知門户誰為主且免詩書與别人劉長卿老子釋氏親抱送盡是天上麒麟兒杜詩驥之子鳯之雛渥洼汗血種天上麒麟兒衆中見毛骨猶是麒麟兒一毛生鳯穴掌中貪得一珠新同上馬梵賀人有子曰欣得掌中之一珠見杜詩注去嵗生兒名添丁意令與國充耘耔韓寄盧仝詩乳下秀嶷嶷椒蕃泣喤喤韓詩姆抱幼子立側眉眼如畫髪漆黑肌肉玉雪可憐韓文兒生三日掌中珠燕頷猿肱穠李膚文苑英華頭玉嶢嶢眉刷翠骨重神寒天廟器一雙瞳人剪秋水竹馬梢梢摇翠尾李賀詩閙來案上翻筆墨塗抹詩書如老鴉盧仝添丁詩添丁莫撓爺劉乂詩本朝虎兕可愛光陸離開眼已有百步威歐公洗兒歌不惜金錢散閭里同上南山新掌鳯凰雛眉目分明畫不如臨川有子經子克家易國人稱願然曰幸哉有子如此所謂孝也已記祭義父有争子則身不陷扵不義孝經史田嬰有賤妾子名文承間問其父嬰曰子之子為何曰為孫孫之孫為何曰為𤣥孫𤣥孫之孫為何曰不能知也曰君用是相齊至今三王矣齊不加廣而君私家富累萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺繡而士不得短褐僕妾餘糓肉而士不厭糟糠今吾又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之史記本傳荀淑在朗陵涖事明治稱為神君有子八人並有名稱時人謂之八龍通鑑漢質紀侍御史母丘甸謂父儉曰大人居方嶽重任國家傾覆而晏然自守將受四海之責矣儉然之魏高貴鄉公紀梁帝曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳五代梁紀袁術見孫䇿嘆曰使術有子如孫郎死復何恨東漢本傳謝鳯之子超宗有文辭帝大嗟賞謂謝莊曰超宗殊有鳯毛南史戴碩子法興延壽延興竝儕立善書好學山隂有陳戴者家冨有錢三千萬人或云戴碩兒子敵陳戴三千萬錢宋書王昕生九子並風流藴藉世號王氏九龍北齊非此父不生此子北史嚴武母裴氏不為其父所答獨厚其妾英武奮然以鐵鎚就英寢碎其首挺之竒之曰真嚴挺之子新唐書本傳憲宗謂鄭餘慶之子涵為令子本傳傳記顔延之少有令名太祖問其父延之曰諸子誰得卿風延之曰竣得臣筆測得臣聞夐得臣義姓氏英賢録竇禹鈞有子五人俱進士及第馮道詩曰丹桂五枝芳時號竇氏五龍類說集一園水竹今為主百卷文章更付誰李白賀兄榮是見兒榮杜荀鶴吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此名位豈肯卑㣲休杜詩少年嶄然見頭角衆謂柳氏有子美韓愈撰柳宗元墓誌本朝方公之輝華顯赫之跡而其親享壽考康寧之福夫得禄及親人以為幸也而公以榮名顯仕為之養綵衣而戲昔以為孝也而公以金章紫綬恱其顔使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也歐公集温公誌吕獻可墓未成河南監牧使劉航自請書石既見其文遲回不敢書航之子安世曰成吾父之名可乎代書之聞見録有兒真驥子一噴羣馬倒杜詩惟要得家好兒子有子還應不死同挽梅聖俞生男已當户後山無子史齊大倉令淳于公無子有女五人有罪當刑罵曰生女不生男緩急非有益史記樓護有故人吕公無子歸護西漢本傳魏太祖時征漢中聞王粲子死嘆曰孤若在不使仲宣無後三國魏志王粲傳皇天無知使鄧伯道無兒晉書鄧攸傳傳昔有人無男而養七女父亡七女負土葬父方輿記集樂天無子以姪孫阿新為之後見長慶集醉吟先生墓誌下無嗣紹隂宰漫韓集中郎有女能傳業伯道無兒可保家韓退之䘮子經子夏䘮其子而䘮其明記子負建鼓而求亡子莊集鴟梟啄母腦母死子始蕃蝮蛇生子時拆裂腸與肝好子雖云好未還恩與勤惡子不可說鴟梟蝮蛇然有子且勿喜無子固勿嘆韓集慰孟東野失子慈淚隨聲迸悲腸遇物牽白樂天詩傷心自嘆鳩巢拙長堕春雛養不成同上本朝顧况䘮子悲傷作詩曰老人䘮愛子日夜泣成血老人年七十不作多時别孔帖我淚猶可拭日逺當日忘母哭不可聞欲與汝俱亡故衣尚懸架張乳已流牀仍將恩愛刄割此衰老腸坡詩女經維虺維蛇女子之祥乃生女子載寢之地載衣之裼載弄之瓦詩歸妹女之終也注女終於出嫁也易雜卦漢有㳺女不可求思詩誰其尸之有齊季女有女懷春有女如玉顔如舜華同上女子許嫁笄而字記曲禮上女不言外内則女子十年不出姆教婉娩聴従執麻枲治絲繭織絍組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾同上女雖未許嫁年二十而筓記婦人許嫁不為殤記子女子生而願為之有家孟史臣有息女西漢高紀淳于公無男有五女當刑公迺罵其女曰生子不生男緩急非有益其小女緹縈自傷悲泣迺隨其父至長安上書願没入為官婢以贖父刑罪使得自新刑法志張禹曰臣有一女愛女甚扵愛男逺嫁張掖太守蕭咸不勝父子私恩願與相近即徙咸為𢎞農太守西漢盜不過五女門以女貧家也東漢陳蕃傳蔡邕女琰字文姬博學有才辯又妙於音律列女傳戴良五女並賢每有求姻輒便許嫁練裳布被竹笥木屐以遣之五女並能遵其訓皆有隠者之風本傳古者女生三日卧之床下弄之瓦磚而齊告焉卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主繼祭祀也列女傳孝女曹娥者父盱於縣江泝濤迎神婆娑溺死不得屍骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死同上孔融被誅女年七歲幼弱得全寄尼舎主人有遺男欲娶之女曰豈得久活或言曹操收之女曰若死而有知得見父母豈非志願乃延頸就刑同上喬公兩女皆國色也吳周瑜傳甄后年九嵗喜書輒用諸兄筆硯兄言當作女愽士耶魏志甄后傳郭永竒其女曰此吾女中書同上王肅女文義過目則識祖司徒異之曰興吾家者必此女矣惜不為男王隱書晉文明皇后荀崧都督荆州江北諸軍屯宛杜曽引兵圍之崧小女灌年十三帥勇士數千人踰城突圍夜出且戰且前又為崧書求救扵南中郎將周訪通鑑晉愍帝紀竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族毅由是竒之及長以適唐公李淵陳紀謝道韞聰識有才辯叔父安嘗内集俄而雪下安曰何所似也安兄子朗曰撒鹽空中差可擬道韞曰未若柳絮因風起晉列女傳傳記昔有人無男而養七女父亡女負土𦵏父方輿記下堂必從傅母保阿進退則鳴玉佩環列女傳北平有女甚有咎行人多求不許搜神記張氏有處子小字酥香見才人所為歌曲悉能諷之麗情集集吾家有驕女皎皎頗白晳左思詩弱女雖非男慰情良勝無陶淵明詩唧唧復唧唧木蘭當户織不聞機杼聲惟聞女嘆息問女何所思問女何所憶女亦無所思女亦無所憶昨夜見軍帖可汗大㸃兵軍書十二卷卷卷有爺名阿爺無大兒木蘭無長兄願為市鞍馬従此替爺征晉木蘭詩木蘭代父去秣馬備戎行易却紈綺裳洗却鉛粉妝馳馬赴軍幕慷慨攜干將同上十子若不肖不如一女英李白集顧復長之如滋芳蘭之易茂姆師教之如琢美玉之易成吕温集學母無不為曉妝隨手抹移時施朱鉛狼藉畫眉闊杜詩生女冨貴傾邦國杜詩嗟汝未嫁女秉心鬱沖沖防心動如律竭力機杼中雖無姑舅事敢昧織作功同上文姬才稚齒白樂天集非此父不生此女同上一女憐之必嫁官人不以與凡子韓文王通誌中郎有女能傳業韓退之詩歸弄小女姹同上女中誰是衛夫人柳集夫人在家以孝友聰明為父母所偏愛選所冝歸以適韓氏韓文楚國夫人墓誌記纂淵海卷三十九
