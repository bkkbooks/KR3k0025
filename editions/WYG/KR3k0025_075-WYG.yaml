body:
  text: 記纂淵海卷七十五宋潘自牧撰著述部著書經芟夷煩亂翦截浮辭舉其宏綱撮其機要足以垂世教尚書序研精覃思博攷經籍採摭羣言以立訓𫝊約文申義敷暢厥㫖庶幾有補於將來同上子孔子自衛反魯然後樂正雅頌各得其所乃删詩定書繫周易作春秋孟子退自齊梁述堯舜之道而著作焉此大賢擬聖而作者也孟子與髙第弟子公孫丑萬章之徒難疑荅問又自撰其法度之言著書七篇二百六十二章三萬四千六百八十五字包羅天地揆叙萬類仁義道徳性命禍福燦然靡所不載帝王公侯遵之則可以致隆平頌清廟卿大夫士蹈之則可以尊君父立忠信守志厲操者儀之則可以崇髙節抗浮雲有風人之托物二雅之正言可謂直而不倨曲而不屈命世亞聖之才者也孟子序余之抄畧譬猶摘翡翠之藻羽脫犀象之牙角金樓子文中子曰甚矣王道之難行吾家頃銅川六世矣未嘗不篤於斯然亦未嘗得宣其用退而咸有述焉則以志其道也盖先生之述曰時變論六篇其言化俗推移之理竭矣江州府君之述曰五經决錄五篇其言聖賢著述之意備矣晉陽穆公之述曰政大論八篇其言帝王之道著矣同州府君之述曰政小論八篇其言王霸之業盡矣安康獻公之述曰皇極讜義九篇其言三才之去就深矣銅川府君之述曰興衰要論七篇其言六代之得失明矣子謂董常曰吾欲脩元經稽諸史論不足徵也吾得皇極讜義焉吾欲續詩考諸集記不足徵也吾得時變論焉吾欲續書按諸載録不足徵也吾得政大論焉文中子史老子著書上下篇言道徳之意五千餘言莊子著書十餘萬言大抵率寓言其洸洋自恣以適已韓非作孤憤五蠧内外諸說林說難十餘萬言史本傳蒯通論戰國時說士權變亦自序其說凡八十一首號曰雋氷西漢本傳虞卿非窮愁亦不能著書以自見於世史本傳陸賈著書號曰新語每奏一篇髙帝稱善史陸賈傳公孫𢎞著公孫子言刑名謂字直百金也漢書公孫𢎞傳淮南王安為人好書鼓琴不喜弋獵狗馬馳騁招致賓客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術亦二十餘萬言前淮南王傳百三十篇五十二萬六千五百字為太史公書序略成一家言恊六經異傳齊百家雜語蔵之名山副在京師史記太史公自序究天人之際通古今之變成一家之言史司馬遷自序劉向以為王教由内及外自近者始於是採取詩書所載賢妃貞婦興國顯家及孽嬖亂政者序次為列女傳凡八篇及採傳記行事著新序說苑凡五十篇通鑑漢成帝紀揚雄欲以文章成名於後世作法言訓纂離騷四賦前漢傳劉歆集六藝羣書種别為七略西漢劉本傳班彪著王命論東漢班本傳班固所著典引賓􅃧應譏詩賦銘誄頌書文記論議六言在者凡四十一篇王符隠居著書三十餘篇以譏當時得失不欲章顯其名故號曰潜夫論東漢本傳王通隋蜀都司户書佐大業末棄官歸以著書講學為業依春秋體例自獲麟後歴秦漢至於後魏著紀年之書謂之元經又依孔子家語揚雄法言例為客主對荅之說號曰中說皆為儒士所稱唐書王勃傳歐陽詢作藝文類聚一百卷唐書本傳傳記吕不韋為秦相國集諸儒史著其所聞為十二紀八覽六論合十餘萬言名為吕氏春秋暴之咸陽市門懸千金於上有能増損一字者與之金時人無能増减者以為非不能也盖憚相國畏其勢耳然其書以道徳為凖的以無為為紀綱以忠義為品式以公方為檢格與孟軻孫卿相表裏也吕氏春秋帝命虞世南等四十人選文章自楚詞訖大業共為一部五千巻號文章總集大業拾遺虞世南於省後堂集羣事可為文用者號北堂書抄唐劉餗傳記古者著述多矣雖復門千戸萬波委雲集而言皆瑣碎事必叢殘固難以接光塵於五傳並輝烈於三史彊著一書受嗤千載淮南子牢籠天地博極古今史通集記事者必提其要纂言者必鈎其𤣥韓文進學觧平生十萬篇金薤垂琳琅仙官勅六丁雷霆下取將流落人間者大山一毫芒韓集著書逾十年幽賾靡不推栁集著書者盖道充積既推於時身處卑下澤不能潤物耻灰泯而燼又無聖人為之發明故假空言是非一代以傳無窮自光耀於後李習之本朝白居易作六帖以陶家缾數千各題門目作七層列齋中命諸生求集事類投中倒取抄録成書故記代無次談苑載貞觀中魏徵撰文思博要一千二百巻義出六經闕而裁其失也俗榖梁序屈平之作離騷盖自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣史記屈原傳相如雖多虛辭濫說然要其歸引之於節儉此與詩之風誎何以異揚雄以為靡麗之賦勸百而諷一猶騁鄭衛之聲曲終而奏雅西漢司馬相如賛枚臯為文疾受詔輙成故所作多司馬相如善為文而遲故所作少而善於臯其文骫骳不甚閒雅枚臯傳二班懐文裁成帝墳比良遷董兼麗卿雲後漢班固賛孔璋章表殊健㣲為繁富公幹有逸氣但未遒耳元瑜書記翩翩致足樂也仲宣獨自善於詞賦惜其體弱不起其文至其所善古人無以逺過魏書孔璋傳張說與徐堅論近世文章曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨如孤峯絶岸壁立萬仭濃雲鬱興震雷俱發誠可畏也若施於廊廟則駭矣閻朝隠如麗服靚妝燕歌趙舞觀者忘疲若類之風雅則罪人矣堅問今日柰何說曰韓休之文如大羮𤣥酒有典則而薄滋味許景先如豐肌膩體雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊盃玉斚雖爛然可珍而多玷缺堅謂篤論唐書唐有天下三百年文章無慮三變髙祖太宗大難始夷㳂江左餘風摛句繪章揣合低昂故王楊為之伯𤣥宗好經術羣臣稍厭雕琢索理致崇雅黜浮氣益雄渾則燕許擅其宗是時唐興已百年諸儒争自名家大歴貞元間美才輩出嚌嚅道真涵泳聖涯於是韓愈唱之栁宗元皇甫湜李翺等和之排逐百家法度森嚴抵轢晉魏上軋漢周唐之文宛然為一王法此其極也若侍從酬奉則李嶠宋之問沈佺期王維制册則常衮楊炎陸贄權徳輿王仲舒李徳裕言詩則杜甫李白元稹白居易劉禹錫譎怪則李賀杜牧之李商隠皆卓然以所長為一世冠唐書文藝傳序葛洪稱機文猶𤣥圃積玉無非夜光焉五河之吐流泉源如一焉其𢎞麗妍贍英銳飄逸亦一代之絶乎晉書陸機傳晉孫綽重張衡左思之賦每云三都二京六經鼓吹也晉書文章者情性之風標神明之律吕晉書文苑傳元魏祖瑩嘗語人曰文章須自出機杼成一家風骨何能共人同生活也北史祖本傳筆有餘力詞無竭源南史文學自漢至魏四百餘年文體三變相如工為形似之言二班工於情理之說子建仲宣以氣質為體所始莫不同祖風騷沈休文宋書謝靈運傳江左宫商發越貴於清綺河朔詞義正剛重乎氣質梁自大同之後争馳新巧簡文湘東啟其淫放徐陵庾信分路揚鑣㫖淺而繁文匿而彩詞尚輕險情多哀思隋書永嘉以來𤣥風既扇辭多平淡文寡風力隋經籍志張說曰楊盈川之文如懸河注水酌之不竭既優於盧亦不减王耻居王後則信然愧在盧前謙也舊唐書楊炯李商隠能為古文不喜偶對從令狐楚慕楚能章奏遂以其道授商隠自是始為今體章奏唐書文苑韓愈評其文曰雄深雅健似司馬子長崔蔡不足多也唐書栁宗元傳貞元元和間以文學聳動縉紳之伍者宗元禹錫而已其巧麗淵博屬辭比事誠一代之宏材如俾之歌詠帝載黼黻王言足以平揖古賢氣吞時輩唐史臣舊劉紀傳李觀屬文不旁沿前人時謂其與韓愈相上下陸希聲以為李觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老終不能加觀之辭觀後愈死亦不能加愈之質唐李觀傳其文鍛鍊精粹出入古今唐書傳許舍人之文雖乏峻峯激流然辭㫖豐美得中和之氣唐書景先李白曰古人因事而文今人以文害事唐書傳渾涵汪茫兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣杜甫傳卓然植立成一家言其原道原性師説等數十篇皆奥衍宏深與孟軻揚雄相表裏而佐佑六經云至他文造端置辭要不為蹈襲前人者然惟愈為之沛然若有餘至其徒李翺李漢皇甫湜從而效之遽不及逺甚唐韓愈傳文章與時髙下變態百出不可窮極唐藝文志愈以六經之文為諸儒唱障隄末流反刓以樸剗偽以真粹然一出於正刋落陳言横騖别區汪洋大肆無牴牾聖人者唐書傳賛元和之後文章學竒於韓愈學澁於樊宗師歌行則學放於張籍詩則學矯激於孟郊學淺於白居易學淫靡於元稹俱名元和體大抵天寳之風尚黨大歴之風尚浮貞元之風尚蕩元和之風尚怪也李肇國史裴子野論曰夫有逸羣之才必思冲天之據盖俗之量則憤常均之下其能守之以道將之以禮殆為鮮乎通鑑集仲宣獨歩於漢南孔璋鷹揚於河朔偉長擅名於東土公幹振藻於海隅徳璉發蹤於北魏足下髙視於上京曹建與楊子修書魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒徳璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸以自騁驥騄於千里仰齊足而並馳文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳于後夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同而能之者偏也唯通才能備其體文以氣為主氣之淸濁有體不可彊而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟魏文帝詩縁情而綺靡賦體物而瀏亮碑披文而相質誄纒綿而悽愴銘博約而温潤箴頓挫而清壯頌優游以彬蔚論精㣲而朗暢奏平徹以閒雅說煒炳而譎誑其㑹意也尚巧其遣言也貴妍立片言而居要乃一篇之警䇿雖衆辭之有條必待茲而效績陸機文相如工於形似之言仲宣以氣質為體選賦序爛若縟綉悽若繁絃陸機文賦陶匏異噐並為入耳之娱黼黻不同俱為恱目之玩梁昭明文選陳思之文章也譬人倫之有周孔鱗羽之有鳳麟音樂之有笙竽女紅之有黼黻若孔子之門如用詩則公幹升堂思王入室潘陸自可坐於廊廡之間劉楨文體出於古詩仗氣愛竒動多震絶貞骨凌霜髙風跨俗但氣過其文而雕潤恨少然自陳思已下楨稱獨歩鍾嶸詩評屈宋已降為文者本於哀艷務於恢誕亡於比興騷人起而淫麗興文與教分而為二栁冕論文處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注于手也惟陳言之務去戞戞乎其難哉必出於己不蹈襲前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海涵地負放恣縱横無所統紀然而不煩於繩削而自合也惟古於詞必已出降而不能乃剽賊後皆指前公相襲後漢迄今用一律龍文百斛鼎筆力可獨扛天子曰王某之文最宜為誥有古風為詞章汎濫停蓄深博無涯涘漢朝人莫不能為文獨司馬相如太史公劉向揚雄為之最然則用功深者其收名也逺若皆與世浮沉不自樹立雖不為當時所怪亦必無後世之傳也夫和平之音淡薄而愁思之聲要妙懽愉之辭難工而窮苦之言易好也是故文章之作恒發於羈旅草野至若王公貴人氣得志滿非性能而好之則不暇以為韓文登文章之籙波及後代髙視於萬物之中雄峙於百代之下栁論文書號為文章家栁上楊憑書漢魏風骨晉宋莫傳齊梁詩彩麗競繁而興寄都絶陳子昂集士大夫掉鞅於文囿者咸不得攀而倫之文有二道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流盖出於書之謨訓易之象繫春秋之筆削其要在於髙壯廣厚詞正而理備謂宜藏於簡冊者也比興者流盖出於虞夏之詠歌商周之風雅其要在於麗則清越言暢而意美謂宜流於謡誦者也兹二者考其㫖義乖離不合商周之前其文簡而野魏晉以降則蕩而靡得其中者漢氏漢氏之東則既衰矣退之所敬者司馬遷揚雄遷於退之固相上下若雄者如太𤣥法言及四愁賦退之獨未作爾决作之加恢竒至他文過揚雄逺甚雄文遣言措意頗短局滯澁不若退之猖狂恣肆參之穀梁以厲其氣參之孟荀以暢其文參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史公以著其潔栁文騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎詐之文也自為一家不是正氣賈誼之文化成之文也鋪陳帝王之道昭昭在目司馬遷之文裁成之文也馳騁千載若有餘力董仲舒劉向之文通儒之文也發明經術究極天人文之異在氣格之髙下思致之淺深不在磔裂章句隳廢聲韻也裴度文章如千兵萬馬風恬雨霽寂無人聲盖謂是也文之為物自然靈氣恍惚而來不思而至李徳裕文章論八音與政通而文章與時髙下三代之文至戰國而病渉秦漢而起漢之文至列國而病唐興復起夫政龎而土裂三光五嶽之氣分太音不完故必混而後一唐定天下驟示以文韶英之音與鉦鼔相襲故起文章大臣者魏文貞以諫諍顯馬髙唐以智畧奮岑江陵以潤色聞無草昩汗馬之勞而遇任在功臣上唐之貴文至矣得董生之詞杳如摶翠屏浮層欄視聽所遇非風塵間物亦猶明金綷羽得于遐裔欲勿寳可乎其詞甚約而味大淵然以長氣為幹文為枝詞賦詔誥封章啟事歌詩贈牋金石颺功洪鍾駭聽瑶瑟清骨感人肺肝毛髪皆聳丹青景化焜燿藩方如霏煙祥風縁飾萬物觀其發徳音福生人沛然如時雨褒元老諭功臣穆然如景風命相之冊和而莊命將之誥昭而毅劉賓客集李白尚不能歴其藩翰况堂奥乎元稹作杜子美墓誌銘建武以還文卑質喪儷花鬬葉顛倒相尚及兄為之思動鬼神撥去其華得其本根闗合怪驟驅濤湧雲六經之風絶而復新學者有歸大變於文李翺祭韓愈孔子殁二百嵗而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成人之風長卿子雲之儔瑰詭萬變亦竒特之士也惜其王公大人之言溺於浮辭而不顯其後班張崔蔡曹劉潘陸接彼而作雖大雅不足然其遺風餘烈尚有典刑宋齊以來盖顦顇逶迤陵頺流靡至于徐庾天之將喪斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣唐盧藏用論文評文下傳記揚雄曰軍旅之際飛書馳檄用枚臯廊廟之中髙文大册用相如西京雜記庾信自南朝至北方惟愛温子昇所作韓山寺碑或問信曰北方何如曰惟韓山一片石堪共語餘若驢鳴狗吠耳玉泉子鄭奕常以文選教其子兄曰何不教他讀孝經論語免他學沈謝嘲風詠月汙人行止外史檮杌唐張九齡嘗覽蘓廷碩文卷謂同列曰蘓生之俊贍無敵真文陣雄師也帝命虞世南等四十人選文章自楚詞訖大業共為一部五千卷號文章總集又擇能書二千人為御書生翻抄書南部煙花記夫文章者原出五經詔命策檄生於書者也序述論議生於易者也歌詠賦頌生於詩者也祭祀哀誄生於禮者也書奏箴銘生於春秋者也朝廷憲章軍旅誓誥敷暢仁義發明功徳牧民建國不可暫無一本作施用多途至於陶冶性靈從容諷誦入其滋味亦樂事也行有餘力則可習之然而自古文人多䧟輕薄屈原露才揚已顯暴君過宋玉體貌容冶見遇俳優東方曼倩滑稽不雅司馬長卿竊貲無操王褒過章僮約揚雄徳敗美新李陵降辱外國劉歆反覆莽世傅毅黨附權門班固盗竊父史趙元叔抗䟽過度馮敬通浮華擯壓馬季良佞媚獲誚蔡伯喈同惡受誅吴質詆斥鄉里曹植悖慢犯法杜篤乞假無厭路粹隘狹已甚陳琳實號麄踈樊歆性無檢恪劉楨屈彊輸作王粲率躁見嫌孔融禰衡誕傲致殞楊脩丁廙扇動取斃阮籍無禮敗俗􅄞康凌物凶終傳𤣥忿鬬免官孫楚矜誇陵上陸機犯順履險潘岳乾沒取危顔延年負氣摧黜謝靈運空踈亂紀王元長凶徒自貽謝元暉侮嫚見及凡此諸人皆其翹秀者不能悉紀大槩如此凢為文章猶乗騏驥雖有逸氣當以銜䇿制之勿使流亂軌躅放意填坑岸也文章當以理致為心腎氣調為筋骨事義為皮膚華麗為冠冕今世相承趨末棄本率多浮艷辭與理競辭勝而理伏事與才争事繁而才損放逸者流宕而忘歸穿鑿者補綴而不足時俗如此安能獨違但務去太甚耳沈隠侯曰文章當從三易易見事一也易識字二也易讀講三也顔之推家訓翬翟備色而翔翥百歩肌豐而力沉也鷹隼無采而翰飛戾天骨勁而氣猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿若藻曜而髙翔固文章之鳴鳳也章奏表議則凖的乎典雅賛頌歌詩則羽儀乎清麗符檄書移則楷式於明斷史論序注則軌範於覈要箴銘碑誄則體制於𢎞深連珠七辭則從事於工艷此脩體而成變隨變而立功者雖復契㑹相參節文互離譬五色之錦各以本采為地矣文心雕龍文章沿學能在天資故才自内發學以外成有學飽而才餒才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此内外之殊分也戰國以降詞人屬文偽立主客假如酬荅史通所謂文者非徒執卷於儒生之門攄筆於翰墨之采乃貴其造化之淵禮樂之盛也陸景典誥自梁室之季雕蟲道喪平頭上尾尤忌於時對語儷辭盛行於俗詩有韋孟諷諌賦有趙壹嫉邪篇則賈誼過秦論則班彪王命張華述箴於女史張載題銘於劒閣諸葛表主以出師王昶書家以戒子劉向谷永之上䟽晁錯李固之對䇿荀伯子之彈文山巨源之啟事此皆言成軌則為世龜鑑史通趙牧效李長吉為短歌可謂蹙金結綉而無痕跡摭言沈光有洞庭樂賦韋岫曰此賦乃一片宫商北夢𤨏言集文病而後竒不竒不能駭俗陸龜蒙公之文蹴楊墨於不毛之地蹂釋老於無人之境皮日休請韓愈配享詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔李漢作韓文集序其所為文未嘗效前人之言而固與之並自貞元末後進之士有志於古文者莫不視公以為法韓愈行狀茹古涵今無有端涯渾渾灝灝不可窺校及其酣放毫曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗宻窈𦕈章妥句適精能之至入神出天韓文公墓誌銘梁陳之間率不過嘲風雪詠花草文猶戰也一鼔作氣再而衰三而竭白傅集清愁素艷幽快古秀皆得芝蘭之芬芳鸞鳳之羽儀也皮日休雲煙綿聮不足為其態也水之迢迢不足為其情也春之盎盎不足為其格也風檣陣馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘隴不足為其怨恨悲愁也鼇吸鯨擲牛鬼蛇神不足為其虗荒誕幻也杜牧之燕公之文如梗木枝幹締構大厦上棟下宇孕育氣象可以變隂陽而閱寒暑坐天子而朝羣后如應鍾鼗皷笙簧錞磬崇牙樹羽考以宫縣可以奉神明享宗廟李北海之文如赤羽𤣥甲延亘平野如風如雲有貙有虎闐然鼓之誠可畏也賈常侍之文如髙冠華簮曳裾鳴玉立於廊廟非法不言可以望為羽儀資以道義李員外之文如金輿玉輦雕龍彩鳳外雖丹青可掬内亦體骨不凡獨孤尚書之文如危峯絶壁穿倚霄漢長松怪石傾倒溪壑然而畧無和暢雅徳者避之楊崔州之文如長橋新搆鐵騎夜渡雄震威厲動心駭耳然而皷作多容君子所謹權文公之文如朱門大第氣勢宏敞廊廡廪廐戸牖悉周然而不能有新規勝槩令人竦觀韓吏部之文如長江秋注千里一道衝飈激浪放流不滯然而施於灌溉或爽於用李襄陽之文如燕市夜鴻華亭暁鶴嘹唳亦足驚聽然而才力偕鮮突然髙逺沈諮議之文則隼擊鷹揚滅沒空碧崇蘭繁榮曜光揚􅅋雖迅舉秀擢而能沛文艷景其他握珠璣奮組綉者不可一二而紀矣皇甫湜凡為文以意為主氣為輔以辭彩章句為之兵衛未有主彊盛而輔不飄逸者兵衛不華赫而莊整者四者髙下圓折歩驟隨主所指如鳥隨飛鳯魚隨龍師衆隨湯武騰天湧泉横裂天下無不如意茍意不先立止以文彩辭句繞前捧後是言愈多而理愈亂如入門闠紛紛然莫知其誰暮散而已是以意全勝者辭愈樸而文愈髙意不勝者辭愈華而文愈鄙杜牧之自漢明帝後文體寖弱以至於魏晋宋齊梁陳隋嫣然華媚無復筋骨唐興猶襲隋故至天后朝陳伯玉始復古制當世髙之雖博雅典質猶未能全去其諧靡退乃大革流弊落落有老成之風而元賓則不古不今卓然一體激然超越若絲竹中有金石聲每篇得意處如健馬在御蹀蹀不能止陸希聲作李元賓文集序文似相如而檢度過之李義山陳拾遺横制頽波天下質文翕然一變李白集玉川子月蝕詩韓吏部進學解莫不拔地倚天句句欲活讀之如赤手捕長蛇不施控勒騎生馬急不得暇孫樵與王霖書自三代以來風騷之後驅馳屈宋鞭撻楊馬千載獨歩唯公一人而已李陽氷作逸歌長句駿發踔厲若穿天心出月脇意外驚人語非尋常所能及皇甫湜本朝李白落筆生雲烟千竒萬險不可攀自唐以來言文章者惟韓栁栁豈韓之徒哉真韓門之罪人也世俗不知其所學第以當時流輩言之耳歐公詩人之優游騷人之清深孟韓之温淳遷固之雄剛孫吴之簡切投之所向無不如意孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉黿鼉蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆徐委備徃復百折而條達踈暢無所間斷氣盡語極急言竭論而容與簡易無艱難勞苦之態此三者皆斷然自為一家文也惟李翺之文其味黯然而長其光油然而幽俯仰揖遜有執事之態陸贄之文遣言措意切近的當有執事之實老泉上歐陽内翰書晉無文章惟陶淵明歸去來辭唐無文章惟韓愈送李愿歸盤谷序雖江山之勝莫適為主而竒麗秀絶之氣常為能文者用故以為西湖盖公几案間一物耳諸葛孔明出師表簡而盡直而不肆大哉言乎與伊訓說命相為表裏非秦漢以下以事君為恱者所能志也詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療飢斷斷乎如藥石必可以伐病如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態横生歐陽文忠公言文章如精金美玉市自有價非人所能以口舌貴賤也蘓東坡太史公行天下用覽四海名山大川與燕趙間豪傑交遊故其文踈蕩頗有竒氣此豈嘗執筆學為如此之文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也欒城上韓太尉書近世之文以襞積故實為有學以雕繪語句為清新譬之擷竒花之英積而玩之雖光華馨采鮮縟可愛求其根柢濟用則蔑如也臨川集侈能盡之約逺能見之近大能使之㣲小能使之著煩能不亂肆能不流其雄壯俊偉若决江河而下也其輝光明白若引星辰而上也曽南豐作老泉哀辭文章自唐之末日淪淺俗浸以大敝本朝栁仲塗始以古道發明之卒不能振天聖初尹師魯與穆伯長矯時所尚以古文為主次得歐陽永叔以雄詞鼓動之文風一變五朝言行録歐公之文粹如金玉東坡之文浩如河漢鳴道集三百年來文不振直從韓栁到孫丁山谷云西漢文章雄深雅健其氣長故也江左風流乆已零落士大夫人品乆不髙故音韻絶滅東晉韻人勝士無出安石之右東坡云凡人做文字須是筆頭上挽得數百斤起歐公云興來筆力千鈞重詩話總龜文章有兩等山林草野之文其氣枯槁著書立言者之所尚也朝廷臺閣之文其氣温潤演綸視草者之所尚也王安國曰文章調格須是官様今樂藝亦有兩般教坊則婉媚風流外道則麤野嘲哳下則村歌社舞抑又甚矣亦與文章相類吴處厚青箱雜記古人文章自應律度未嘗以音韻為主自沈崇韻學論文則欲宫羽相變低昂殊節若前有浮聲則後須切響一篇之内音韻盡殊兩句之中輕重各異妙達此㫖始可言文自後浮巧之語體制漸多如傍犯蹉對假對雙聲疊韻之類詩文有正格偏格三十四格十九圖四聲八病之類如徐陵云陪遊馺娑騁纎腰於結風長樂鴛鴦奏新聲於度曲又云厭長樂之踈鍾勞中宫之緩箭雖兩長樂意義不同此類焉如九歌蕙殽蒸兮蘭藉奠桂酒兮椒漿當蒸蕙殽對奠桂酒今倒用之謂之蹉對如自朱耶之狼狽致赤子之流離又如厨人具雞黍稚子摘楊梅皆為假對如幾家村草裏吹唱隔江聞幾家村草吹唱隔江皆雙聲如月影侵簮冷江光逼履清皆疊韻第二字側入謂之正格如鳳歴軒轅紀龍飛四十春第二字平入謂之偏格如四更山吐月殘夜水明樓唐明賢詩多正格如杜甫律詩用偏格者十無一二沈括筆談文章自東漢以來氣象則已卑矣分為三國又裂為南北天下大亂士氣不振而又雜以穠纎輕淫靡嫚之風亂以鄙俚悍魯暴悖之氣至於唐而大壞矣雖人才衆多如貞觀風俗平治如開元而惟文章之衰未有能振其弊者愈當貞元中獨却而揮之上窺典謨中包遷固下逮騷雅沛然有餘浩乎無窮是愈之才有見於聖賢之文而後如此其在夫子之門將追游夏而及之而比之於漢以來齷齪之文人則不可張右史韓愈論或傳王荆公稱竹樓記勝歐陽公醉翁亭記或曰此非荆公之言也某以為荆公出此言未失也荆公之評文章常先體製而後工拙盖觀蘓子瞻醉白堂記􅃧曰文辭雖極工然不是醉白堂記乃是韓白優劣論耳以此考之優竹樓記而劣醉翁亭記是荆公之言不疑也好作竒語自是文章一病要當以理為主理得而辭順文章自然出羣觀杜子美到䕫州後詩韓退之自潮州還朝後文章皆不煩繩削而合矣陳履常作文深知古人之闗鍵其論事救首救尾如常山之蛇凡為文須讀司馬子長韓退之文每作一文皆有宗有趣終始闗鍵有開有闔如四瀆雖納百川或匯而為廣澤汪洋千里要自發源徃海耳罵人文雖竒不作可也東坡文章妙天下其短處在好罵切勿襲其軌也凢為文自作語最難老杜詩退之作文大抵無一字無來處盖後人讀書俱少故謂韓杜自作此語耳古之能為文章者真能陶冶萬物雖取古人之陳言入於翰墨如靈丹一粒㸃鐵成金也文章雖為儒者末事然既學之又不可不知其曲折至於推之使髙如太山之崇崛如垂天之雲作之雄壯如滄江八月濤海運吞舟之魚又不可守繩墨使儉陋也黄魯直余以古文為三等周為上七國次之漢為下周之文雅七國之文壯偉其失騁西漢之文華贍其失緩東漢而下無取焉永叔謂為文有三多看多做多啇量多也退之作記記其事耳今之記乃論也少游謂醉翁記亦用賦體揚子雲之文好竒而卒不能竒也故思苦而詞難善為文者因事以出竒江河之行順下而已至於觸山赴谷風摶物激然後盡天下之變子雲唯好竒故不能竒也韓退之上尊號表曰鈎陳太㣲星緯咸若崑崙渤澥濤波不驚世莫能輕重之也國初士大夫例能四六然用散語與故事耳楊文公筆力豪贍體亦多變而不脫唐末五代之氣又喜用古語以切對為工乃進士賦體耳歐陽公始以文體為對屬文善叙事不用故事陳言而文益髙次退之云凡為文寧拙無巧寧樸無華寧粗無弱寧僻無俗作詩亦然也陳後山詩話賈誼鵩賦源流自檀弓來歐文長於陳情如瀧岡阡表甚勝里客談吾嘗聞唐人論文章下韓退之為栁子厚下栁子厚為劉夢得下劉夢得為杜牧下杜牧為李翶皇甫湜最下者為元稹白居易盖白以澄澹簡質為工而流入於鄙近譬如淫哇之歌雖足以快心便耳不可頏之韶濩翺湜優柔泛濫而詞不掩理杜牧清深勁峻而體乏歩驟夢得俊逸麗縟而時窘邉幅子厚雄健飄肆有懸崖峭壁之勢不幸而不發於仁義而發於躁誕至退之然後淳粹温潤駸駸乎為六經之苗裔何則文章者天地之竒氣造物者常嗇於與人故愚者終身而不得智者得其幽㣲之思勇者得其果敢之氣雕者得其玲瓏之聲巧者得其藻繪之容是數者得不能盡然猶足以取髙於天下盖必兼是數者之才而後得其純全中正之氣錦繡五藏雕鏤萬化明以寓物象之形容幽以露鬼神之竒怪小而歌詠乎蟲魚鳥獸之情大而羽翼乎禮樂刑政之具隨時抑揚為歌頌譏刺之音以舒發其懽愉愁歎湮鬱之志而始終出入於仁義為禹稷之謨伊周之訓箕子之疇伏羲之易孔子之春秋而天地之藴始盡矣子厚文辭醇正雖不及退之至氣格雄絶亦退之所不及然子厚論著大抵非怨憤必刺毁辯論語下篇尤害道文章渉秦漢而病夫六經之於道譬猶一氣之運産出萬化孟軻揚雄為之五行四時之用盖書道治亂興廢之迹故其辭顯春秋賞善辨惡歸諸正故其辭㣲易以四象告吉凶故其辭深而通禮以齋莊恭敬之心達於籩豆玉帛故其辭典而嚴詩以君臣父子之情詠於竹絃於絲故其辭婉而順下三代而道徳之意不傳在戰國則蘓秦張儀以縱横病韓非申商以刑名病莊周列禦冦又取仁義法度搥提絶滅之為窈窕荒怪之說漢司馬遷得其汪洋峻逸之氣以馳騁上下數千載而顛倒横斜識不逮理歴晉魏齊梁而光鋩氣焰埋藏腐蝕頽波横流淫靡一轍唐興三光五嶽之氣不分文風復起韓愈得其温潤深淳以為貫道之噐栁子厚得其豪健雄肆飄逸果决者僅足窺馬遷之藩鍵而類發於躁誕下至孫樵杜牧峻峰激流景出象外而窘裂邉幅李翺劉禹錫刮垢見竒清勁可愛而體乏雄渾皇甫湜白居易閒澹簡質斵出雕篆而拙迹每見回宫轉角之音隨時間作類乏韶夏皆淫哇而不可聽李樸杜預製二碑一沉水中盖慮數百年從水為陵則碑出預但知陵谷有遷變而不知石亦有磨滅此一說也然深谷為陵則必實以土然後為陵谷既為陵則石亦埋沒豈復可見此又不達物理或曰莊子之辯雖當世宿學不能自解迂夫曰佞人也堯之所畏舜之所難孔子之所患是青蠅之變白黑者也子獨恱之乎或曰莊子之文人不能為也迂夫曰君子之學為道乎為文乎文勝而道不至者君子惡諸東坡云李陵答蘓武書其詞猥淺乃齊梁間人擬作蕭統不之悟而劉子元獨知之據宋史江淹獄中上書云此少卿所以仰天搥心泣盡而繼之以血也正引陵書中語是又非齊梁間人所作明矣年世既逺真偽難辨如此者多如繫辭歐公尚疑非仲尼所作荆公以詩序非子夏之文禮記多漢儒所增五經如此况其餘哉宋咸以私意改周易正經數十處多見其不知量也陳政敏撰遯齋閒覽盧照隣弱冠拜鄧王府典籖王府書記一以委之王有書十二車隣披覽畧能記憶楊炯為文好以古人姓名連用如張平子之談略陸士衡之所記潘安仁宜其陋矣仲長統何足知之則號為㸃鬼簿駱賓王好以數對如秦地重闗一百二漢家離宫三十六時號筭博士朝野僉載文章經觀乎人文以化成天下易吉甫作誦穆如清風詩儒有不祈多積多文以為富記夫子之文章可得而聞也斐然成章語子揚雄作賦有夢腸之談曹植為文有反胃之論言勞神也梁湘東王蕭繹金樓子史􅈺於辭令屈原傳文章爾雅前漢儒林序楊興謂賈捐之曰右房筆下言語妙天下前漢賈捐之傳文章則司馬遷相如劉向王褒以文章顯西漢敷文華以緯國典後漢班彪傳二班懷文裁成帝墳後漢本賛咳唾自成珠後漢趙壹傳禰衡為江夏太守黄祖作書記輕重踈宻各得體冝祖持其手曰此正得祖意如祖腹中之所欲言東漢本傳陳琳為記室作檄草成呈太祖太祖先苦頭風是日疾發卧讀所作翕然而起曰此愈我疾魏志本傳張華謂陸機曰人之為文常恨才少而子更患其多文藻宏麗獨歩當時髙詞逺映如明月之垂光疊意迴舒若重巗之積秀逺超枚馬髙躡王劉百代文宗一人而已陸雲言泉㑹於九流文律諧於六變縟彩鬱於雲霞逸響振於金石筆有餘力詞無竭源孫綽嘗作天台賦初成以示友人云卿試擲地當作金石聲也左思作三都賦豪貴之家競相傳寫洛陽為之紙貴晉書髙言妙句音韻天成蕭介染翰便成文無加㸃帝曰蕭介之文即席之美也南史梁紀傳劉孝綽詞藻為後進所宗時重其文每作一篇朝成暮遍好事者咸誦傳寫流聞河朔亭苑柱壁莫不題之南史本傳邢邵文章典麗每一文出京師為之紙貴讀誦遍逺近洛中貴人拜職多憑邵為謝章表後魏書東海徐陵文體輕麗時人謂之宫體梁髙祖紀江左齊梁競一韻之竒争一字之巧連篇累牘不出月露之形積案盈箱盡是風雲之狀陳後主文章婉縟唐書虞世南李嶠為文章宿老一時為學者取法唐書本傳自景龍後蘓頲與張說以文章顯時號燕許大手筆唐蘓頲張說為文得江山􅂇唐本傳陸贄為翰林學士一日之内詔書數百起藻思如泉注曲盡事情故奉天書詔雖武夫悍卒無不揮涕感激皆贄所為也本傳賀知章醉後屬辭動成卷軸唐本傳文如瀉河酌之不竭唐王勃傳辭鋒犀利絶人逺甚唐令狐楚傳王仲舒知制誥文思温雅制誥出人皆傳寫李杜文章在光焰萬丈長唐書本傳元和主盟實在元白唐書白居易作樂府及詩百餘篇規諷時事流聞禁中上見而恱之召之為翰林學士唐憲宗紀栁公權工辭賦應聲成文唐文宗曰子建七歩爾乃三焉崔元裕訓詞温厚有典誥風唐書本傳文檄豪健一時推許唐書舒元輿傳馮定能古章句新羅國傳定黑水碑畫鶴記西畨寫定商山記於屛其名傳逺方如此李賀辭尚竒詭絶去翰墨畦逕唐本傳天格贍麗意悟冲邁唐書鄧世陸傳傳記孟郊死𦵏北邙山日月風雲暫得閒天恐文章聲斷絶固留賈島在人間北夢𤨏言崔融司業作武后哀文時人以為三二百年來無此文崔融傳蘓生俊贍無敵其文陣之雄師也張九齡覽蘓題文卷集文彩耀於玉石楚辭摛藻如春華發藻儒林大漢文章煥然與三代同風班孟堅兩都賦序摛藻下筆鸞鳳之文奮矣吴季重荅魏太子牋摛藻掞天庭選左太冲蜀都賦炳若縟繡悽若繁絃陸士衡文賦思風發於胷臆言泉流於脣齒選文賦涵綿邈於尺素吐霶霈於寸心言恢之而彌廣思按之而愈深播芳􅅋之馥馥發清條之森森陸機文賦被金石而徳廣流管絃而日新陸士衡賦傾羣言之瀝液潄六藝之芳潤籠天地於形内挫萬物於筆端配霑潤乎雲雨象變化乎鬼神陸機文賦文不流放言無枝葉傅𤣥連珠掞藻艷春華潘正叔贈河陽文鋒振竒響調與金石諧思逐風雲上杜詩英辭潤金石逸響髙韻謝靈運卿雲黼黻河漢劉孝標廣絶交論詞彩精㧞跌宕昭彰梁昭明序陶潜集與日月俱垂鬼神争奥梁蕭統文選序賦成鼔吹詩如彈丸王無功筆湧江山氣文驕風雨神張說之文文鋒迅驅姚崇銘文章峻如嵩華盛如江河清如秋風過物邈不可逮崔祐甫文章昭昭然與金石不朽陸贄秉筆内翰㩁古揚今雄文雅思敷之為文誥伸之為典謨文章與典謨接軫權徳輿翰苑集氣劘屈賈壘目短曹劉墻詞華傾後軰風雅藹孤騫詞源倒流三峽水文章曹植波瀾濶不盡長江滚滚來斯文散都邑髙價越璠璵庾信文章老更成凌雲健翼意縱横楊王盧駱當時體前後百卷文枕籍皆禁臠溟漲與筆力波瀾獨老成文章驚海内雄筆映千古壯筆過飛泉詞林有根柢文傳天下口屈平詞賦懸日月杜詩落筆摇五嶽落筆生錦繡李白集玉佩瓊琚大放厥辭韓愈祭栁宗元文章篾曹謝韓詩平生十萬篇金薤垂琳琅仙官敕六丁雷電下取將流落人間者太山一毫芒沉浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣其文辭引物連類窮情盡變宫商相宜金石諧和寂寥乎短章舂容乎大篇如是者閱之累日無窮焉崔侯文章苦敏㨗髙浪駕天輸不盡摇毫擲簡自不供頃刻青紅浮海蜃龍文百斛鼎筆力可獨扛文如翻水成初不用意為四座各低面不敢捩眼窺文章銳氣至輝輝見旌麾浩汗若河漢正聲諧韶濩勁氣沮金石豐而不餘一言約而不失一辭鏗鏘發金石幽渺感鬼神窺竒摘海異恣韻激天鯨腸胃遶萬象精神驅五兵大句斡元造髙言軋霄琤芒端轉寒燠變化若雷霆所為文章無世俗氣險語破鬼膽髙詞嫓皇墳韓集然而必出於己不蹈襲前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海含地負放恣横縱無所統紀然而不煩於繩削而自合也韓南陽楚紹述墓誌銘操詞掘賦為干戈鋒銳森然勝氣多掩黄卷之麗藻吐白鳳之竒姿振金聲於襄海増紙價於京師炳如繪素鏗若鐘鼓郁郁哉溢目之黼黻洋洋乎盈耳之韶濩可以凌轢風騷超軼今古潤色帝業發揮皇猷賦力凌鸚鵡詞鋒敵轆轤髙閒雅淡自成一家之體筆力雄健不浮不鄙渉江文一首自可敵公卿海内聲華併在身篋中文字絶無倫制從長慶詞髙古詩到元和體始新天地粹靈文人得之居多跳珠濺玉驚動耳目白侍郎海岳詞鋒截皇王筆陣敺思勇曽吞筆詞海跳波湧文星拂座懸筆陣詞鋒可以偃干戈而息戎旅中都紙貴能傳後元㣲之集妍辭一發樂府傳貴怪君近日文鋒利新向延平看劍來人間無價是文章筆底文章夜應星新成麗句開緘後便入清歌滿座聽制誥留臺閣歌詞勝管絃文章似錦氣如虹筆端膚寸膏潤天下麗句輕珠玉劉賓客文翰灑天機文如金石韻髙文激頺波四海靡不傳韋應物集公鼎侯碑志隧表阡一字之價輦金如山劉禹錫祭韓吏部章妥句適韓愈墓誌銘精能之至入神出天文能􅇸括天地肆意文章秋濤瑞錦皇甫湜意語天出皇甫湜作韓愈神道碑文章横被六合可謂力敵造化五臓皆錦繡耶不然何以開口成文揮翰霧散李陽氷作李白集序文懸日月字動煙霞王維集以文華國如雲漢之為章于上江漢之為紀于下李義山春雲生紙上秋濤起胷中欲識楚章句袖中蘭茝薰孟東野碑文合遣貞魂謝史筆應令諂骨羞王建集殿前作賦聲摩空筆補造化天無功李賀筆力動乾坤文雕玉璽重張承吉文錦心繡口栁文擲地金聲滿劉長卿翰苑飛鸚鵡天池峙鳳凰星斗煥文章唐杜牧華清宫詩近日詩篇欺白雪早年詞賦得黄金羅隠集仙筆驅造化詞人咳唾成珠玉口吐天上文唐文粹本朝李頻詩曰只將五字句用破一生心北夢𤨏言薛能還劉仁徳卷詩云百首如一首卷初如卷終譏其不能變態也北夢𤨏言四六之作起自徐庾盧氏記李商隠為文多檢閱書冊左右鱗次號獺祭魚談苑落筆文章天下知歐公詩眉山在西南數千里外一時父子隠然名動京師而蘓氏文章遂擅天下歐公文給札揮毫聳如墻而駭目奏篇稱善喧貴紙以傳都談笑樽爼之間舒卷風雲之際成於俄頃盖其咳唾之餘得而秘藏已如金玉之寳絶去刀痕渾然天質辭窮卷盡含意未卒歐陽集筆陣原來夜斫營筆端猶自斡千鈞舌有風雷筆有神月斧雲斤琢肺肝風濤借筆力秋水為文不受塵追還正始文章為之一新傳寫都城紙墨幾於驟貴東坡集文章韓杜無遺恨文字江河萬古流山谷詩文章生得羽毛飛坡詩雄詞大冊破幽昏反覆難窺斧鑿痕僧參寥子評詩經詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故咏歌之咏歌之不足不知手之舞之足之蹈之也詩序正得失動天地感鬼神莫過於詩先王以是經夫婦成孝敬厚人倫美教化移風俗故詩有六義風賦比興雅頌上以風化下下以風刺上主文而譎諫言之者無罪聞之者足以戒故曰風至于王道衰禮義廢政教失國異政家殊俗而變風變雅作矣國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以風其上達於事變而懐其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛徳之形容以其成功告於神明者也是謂四始詩之至也詩大序詩三百一言以蔽之曰思無邪子曰闗雎樂而不淫哀而不傷子曰可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名語風雅之詩論功頌徳刺過譏失二事耳詩䟽子說詩者不以文害辭不以辭害志以意逆志是為得之孟子詩者中聲之所止荀子止怒莫若詩注詩有流風之什管子詩可以導志莊子李伯藥見子而論詩退謂薛收曰吾上陳應劉下述沈謝分四聲八病剛柔清濁各有端緒音若塤箎而夫子不應我其未達歟薛收曰吾聞夫子之論詩上明三綱下達五常證存亡辨得失故小人歌之以貢其俗君子賦之以見其志聖人採之以觀其變文中子史國風好色而不淫小雅怨誹而不亂史記詩三百大抵聖賢發憤之所作太史公傳大雅言王公大人而徳逮黎庻小雅譏小民之得失其流及上漢書司馬相如謝元暉長五言詩沈約嘗言三百年無此詩也南史謝朓傳沈約郊居請王筠為草木十詠書之壁皆真寫文辭不加篇題約謂人曰此詩指物程形無假顯書王筠傳王籍為人慕靈運至若耶溪詩云蟬噪林逾静鳥鳴山更幽劉孺見之擊節不已王籍傳時沈約謝朓王融以氣類相推轂周顒善識聲韻約等文皆用宫商將平上去入四聲以此制韻有平頭上尾蜂腰鶴膝五字之中音韻悉異兩句之内角徵不同世稱為永明體陸倕傳好詩圓美流轉如彈丸能用彊韻王筠傳顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩如鋪錦列繡亦雕繢滿眼顔延之傳范雲婉轉清便如流風回雪丘遅㸃綴映媚似落花依草梁丘遅傳江總傷於浮艷南史唐三百年詩則杜甫李白卓然以所長為一世冠唐文藝傳序張說謫岳州詩益悽惋人謂得江山􅂇云唐書本傳杜甫又善陳時事律切精深至千言不少衰世號詩史杜甫傳韓愈於文章少許可至歌詩獨推曰李杜文章在光焰萬丈長杜甫賛唐興詩人承陳隋風流浮靡相競至宋之問沈佺期等研揣聲音浮切不差而號律詩競相沿襲逮開元間稍裁以雅正然恃華者質反好麗者壯違人得一槩皆自名所長至甫渾涵汪洋千彚萬狀兼古人而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子美者杜甫傳髙適為詩工毎一篇已好事者輙傳布髙適傳唐元稹詩與白居易名相埒號元和體白傳白居易工詩雞林行賈售其國相率篇易一金杜牧謂白居易詩纎艷不逞非莊人雅士所為淫言媟語入人肌骨不可去白居易賛白居易推劉禹錫為詩豪又言其詩在處有神物䕶持劉禹錫傳魏建安後訖江左詩律屢變至沈約庾信以音韻相婉復屬對精宻及宋之問沈佺期又加靡麗回忌聲病學者宗之號為沈宋李適秦絲與劉長卿以詩相贈荅權徳輿曰長卿自以為五言長城絲用偏師攻之秦絲傳李益於詩尤長與宗人賀相埒每一篇成樂工争以賂求取之被聲歌供奉天子至征人等篇天下皆施之圖繪新唐書本傳杜牧詩情致豪邁號為小杜以别杜甫杜牧傳為歌詩情不忘君人憐其忠唐杜甫賛上與宰相論詩之工拙鄭覃曰詩之工者無若三百篇皆國人作之以刺美時政王者采之以觀風俗耳後代辭人之詩華而不實無補於事陳後主隋煬帝皆工於詩不免亡國通鑑唐文宗傳傳記李頻詩曰只憑五字句用破一生心北夢𤨏言集退傳有在鄒之作降將著河梁之篇四言五言區以别矣昭明太子文選序蕭慤有秋詩云芙蓉露下落楊栁月中踈其蕭散宛然在目何遜詩清巧多形似之言恨其每病苦辛饒貧寒氣不及劉孝綽之雍容也孝綽以謝朓詩置几案間動静輙諷味簡文愛陶淵明文亦復如此顔氏家訓詩之興作兆基邃古唐歌虞詠始載典謨商頌周雅方陳金石其後妍志緣情二京斯甚含毫瀝思魏晉彌繁李都尉鴛鴦之詞纒綿巧妙班媫妤霜雪之句發越清迴平子桂林理在文外伯喈翠鳥意盡行間河朔詞人王劉為稱首洛陽才子潘左為覺先若乃子建之牢籠羣彦士衡之籍甚當時並文苑之羽儀詩人之龜鑑駱賓王文集為詩格髙㫖逺若在天上物外神仙㑹集雲行鶴駕想見飄然之狀李太白集清新庾開府俊逸鮑參軍杜詩遺我行旅詩軒軒有風神譬如黄金盤㸃耀荆璞珍韓集周詩三百篇麗雅理訓誥曽經聖人手議論孰敢到五言出漢時蘓李首更號東都恣彌漫𣲖别百川導建安能者七卓犖變風操逶迤晉宋間氣象日凋耗中間數鮑謝比近最清奥齊梁及陳隋衆作等蟬噪國朝盛文章子昂始髙蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫隩有窮者孟郊受材實雄驁冥觀洞古今象外逐幽好横空盤硬語妥帖力排奡敷柔肆紆徐奮猛卷海潦韓薦士詩詩文齊六經同上古今詩歌自風騷之後蘓李李陵蘓武始作五言詩以還次及鮑謝徒迄于李杜軰詞人聞知者累百詩章流傳者鉅萬觀其所自多因䜛寃遣逐征戍行旅凍餒病老存歿别離情發于中文形於外故憤憂怨傷之作通計古今什八九焉白傅集詩成錦繡文白侍郎元稹在翰林時穆宗前後索詩數百篇左右諷詠宫中呼為元才子自六宫兩都八方至南蠻東夷國皆寫傳之每一章一句出無脛而走疾於珠玉白傅集心之精㣲發而為文文之神妙詠而為詩猶夫孤桐朗玉自有天律片言可以明百意坐馳可以役萬景工於詩者能之劉賓客子美上薄風雅下駭沈宋言奪蘓李氣吞曹劉掩顔謝之孤髙離徐庾之流麗唐元稹杜甫墓銘詩訖于周離騷訖于楚是後詩人流為二十四名賦頌銘賛文誄箴詩行詠吟題怨嘆章篇操引謡謳歌曲詞調自操而下八名皆是起於郊祭軍賓吉凶苦樂由詩而下九名皆屬事而作雖題號不同而悉謂之詩元稹集韓吏部歌詩累百首其驅馬氣勢若掀雷决電撐抉於天地之垠王右丞韋蘓州澄澹精緻格在其中豈妨於道哉賈浪仙誠有警句視其全篇意思殊餒大抵附於寒澁方可致才亦為體之不備也詩家之景如藍山日煖良玉生煙可望而不許置於眉睫之前也象外之象景外之景豈容易可譚哉然題記之作目擊可圖體勢自别不可廢也司空圖恵休稱謝永嘉如芙蓉出水鍾嶸謂范尚書如流風迴雪權載之集少攻歌詩欲與造物者争柄遇事輙變化不一其體裁始則陵轢波濤穿穴險固囚鏁怪異破碎陣敵卒造平淡而後已陸魯望文發揮造化之㣲鼓動江山之氣􅀈轢前古昭彰後葉唐文粹孟浩然匠心獨妙唐王士源孟浩然詩集序鑿天地心胷造生人聞見唐文粹歌詩乆矣大抵喪于南朝壊于陳叔寳然今之業是者茍不能求工於建安即江左矣茍不能求麗於江左即南朝矣或遇為艷傷麗病者即南朝之罪人也吾唐來有是業者言出天地外思出鬼神表讀之則神馳八極測之則心懐四溟磊磊落落真非世間語者雕金篆玉牢竒籠怪百鍛為字千錬成句皮日休集李賀元和中韓吏部頗道其歌詩賀能探尋前事今古未嘗經道者賀未死僕奴風騷可也杜牧之子美之詩可謂無聲無臭也方干文集潄滌萬物牢籠百態唐文粹春杼弄湘綺陽林敷玉英飄然飛動姿邈矣髙閒情後軍驚失歩前脩敢争衡才兼荆衡秀氣助瀟湘秋釋皎然讀張曲江詩曹植詩其原出於國風其骨氣髙竒辭彩華茂情兼雅怨體備文質燦溢今古卓爾不羣鍾嶸詩評漢班媫妤詩其源出於李陵團扇短章詞㫖清婉得匹婦之致侏儒一節可以知其工矣孔氏之門如用詩則公幹升堂景陽潘陸可坐於廊廡間矣梁征逺詩品任昉動輙用事所以詩不得竒潘安仁詩其源出於仲宣翰林歎其翩翩如翔禽之有羽毛衣皮之有綃縠謝鯤云潘詩爛如錦舒無處不佳陸文如披沙揀金徃徃得寳予嘗言陸才如海潘才如江張茂先詩其源出於王粲其體華艷興託不竒巧用文字務為妍冶雖名髙曩代而䟽亮之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體爾郭景純詩憲章潘岳文體相輝彪炳可玩始變中原平淡之體故稱中興第一翰林以為詩首但遊仙之作詞多慷慨乖逺𤣥宗矣而云柰何虎豹姿又云戢翼棲榛梗乃是坎􅇄詠懐非列仙之趣也陶彭澤詩其源出於應璩又恊左思風力文體省静殆無長語每觀其文想見其人至如懽言醉春酒入暮天無雲風華清靡豈直為田家語耶古今隠逸詩人之宗也小謝才思富㨗恨其蘭玉早彫長轡未騁秋懐搗衣之作雖靈運銳思何以加焉同前謝𤣥暉詩其源出於謝混㣲傷細宻一章之中自有玉石然竒章秀句足使叔源失歩明逺變色晉宋之際殆無詩乎義熈中以謝益壽殷仲文為華綺之冠不競矣鍾嶸詩品本朝梁沈約曰詩病有八一曰平頭第一第二字不得與第六第七字同聲如今日良宴㑹懽樂難具陳今歡皆平聲二曰上尾第五字不得與第十字同聲如青青河畔草欝欝園中栁皆上聲三曰蜂腰第二字不得與五字同聲如聞君愛我甘竊欲自修飾君甘皆平聲欲飾皆入聲四曰鶴膝第五字不得與第十五字同聲如客從逺方來遺我一書札上言長相思下言乆離别來思皆平聲五曰大韻如聲鳴為韻上九字不得用驚傾平榮字六曰小韻除本韻一字外九字中不得有兩字同韻如遥條不同句七曰旁紐八曰正紐十字内兩字雙聲為正紐若不共一紐而有雙聲為旁紐如流乆為正紐流栁為旁紐八種惟上尾鶴膝最忌餘忌亦皆通孫昱曰漢自韋孟李陵為四五言之首建安以曹劉為絶唱阮籍詠懐束晢補亡頗得其要永明文章散錯但類物色都乏興寄晩有詞人争立别體以難解為幽致以難字為新竒攻乎異端斯亦太過白樂天諷諭之詩長於激閒適之詩長於遣感傷之詩長於切律詩百言以上長於贍五字七字百言以下長於情李淑詩苑古人詩有風定花猶落王荆公以對鳥鳴山更幽本宋王籍詩對蟬噪林逾静上下句只是一意風定花猶落鳥鳴山更幽則上句静中有動下句動中有静沈括存中述筆談吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求臨川集觀彭澤詩初若散緩不收反復不已乃識其竒趣東坡集釋皎然曰詩有四不四深二要二廢四離六迷七至七徳四不謂氣髙而不怒力勁而不犯情多而不暗才贍而不踈四深謂氣象氲氛深於體勢意度盤薄深於作用用律不滯深於聲對用事不直深於義類二要謂要力全而不苦澁要氣足而不怒張二廢謂雖欲廢巧尚直而神思不得直雖欲廢言尚意而典麗不得遺四離謂欲道情而離深僻欲經史而離書生欲髙逸而離濶逺欲飛動而離輕浮六迷謂以虗大為髙古以緩慢為淡竚以詭差為新竒以錯用意為獨善以爛熟為隠約以氣劣弱為容易七至謂至險而不僻至竒而不差至苦而無迹至近而意逺至放而不迂至難而狀易至麗而自然七徳謂識理髙古典麗風流精神質幹體裁詩有三偷偷語最是鈍賊如傳長日月光太清陳後主日月光天徳是也偷意事雖可罔情不可原如栁渾太液㣲波起長楊髙樹秋沈佺期小池殘暑退髙樹早涼歸是也偷勢才巧意精名無朕跡盖詩人偷狐白裘手也如􅄞康目送歸鴻手揮五絃王昌齡手攜雙鯉魚目送千里鴈是也唐上官儀曰詩有六對一曰正名對天地日月是也二曰同類對花葉草芽是也三曰連珠對蕭蕭赫赫是也四曰雙聲對黄槐緑栁是也五曰疊韻對彷徨放曠是也六曰雙擬對春樹秋池是也又曰詩有八對一曰的名對送酒東南去迎琴西北來是也二曰異類對風織池間樹蟲穿葉上文是也三曰雙聲對秋露香佳菊春風馥麗蘭是也四曰疊韻對放蕩千般意遷延一介心是也五曰聯綿對殘河若帶初月如眉是也六曰雙擬對議月眉欺月論花頰勝花是也七曰迴文對情新因意得意得逐情新是也八曰隔句對相思復相憶夜夜淚沾衣空歎復空泣朝朝君未歸是也李淑詩苑類格王荆公以李太白杜子美韓退之歐陽永叔詩編為四家集以歐公居太白之上公曰太白詞語迅快然十句九句婦人酒耳冷齋夜話詩者不可言語求而得必將深觀其意焉故其譏刺是人也不言其所為之惡而言其爵位之尊車服之美而民疾之以見其不堪也君子偕老副笄六珈赫赫師尹民具爾瞻是也其頌美是人也不言其所為之善而言其容貌之盛冠佩之華而民安之以見其無媿也緇衣之宜兮敝予又改為兮服其命服朱芾斯皇是也東坡集詩欲其好則不能好矣王介甫以工蘓子瞻以新黄魯直以竒而杜子美詩竒常工易新陳莫不好也鮑昭詩華而不弱陶潜詩切於事情但不文耳杜之詩法韓之文法也詩文各有體韓以文為詩杜以詩為文故不工耳蘓子瞻曰子美之詩退之之文魯公之書皆集大成者也學詩當以子美為師有規矩故可學退之於詩本無解處以才髙而好耳淵明之為詩冩其胷中之妙耳學杜不成不失為工無韓之才與陶之妙而學其詩終為樂天耳陳後山詩話學老杜詩所謂刻鵠不成尚類鶩也學晩唐諸人詩所謂作法於涼其弊猶貪作法於貪弊將若何李白歌詩度越六代與漢魏樂府争衡元祐初與秦少游張文潜論詩二公初謂不然乆之東坡先生以為一代之詩當推魯直二公遂捨舊而圗新其初改轅易轍如枯絃敝軫雖成聲而跌宕不滿人耳少焉遂使師曠忘味鍾期改容也黄魯直詩以聲律為竅物象為骨意格為髓梅堯臣公詩周魯後後山晩唐詩多小巧無風騷氣味詩人之作也窮通之分可觀王建詩寒碎故仕終不顯李洞詩窮悴故竟不第韋莊詩壯故至台輔何瓉詩愁未幾而卒詩話總龜唐末之詩近於鄙俚墨客揮犀謝朓月嘗語沈約曰好詩圓美流轉盖謂詩貴圓熟也余以為圓熟多失之平易老硬多失之乾枯學詩如學仙時至骨自換山谷云詩意無窮人才有限以有限之才追無窮之意雖少陵淵明不得工也然不易其意而造其語謂之換骨法規模其意而形容之謂之奪胎法曽子固曰詩當使人一覽語盡而意有餘孟郊死𦵏北邙山日月風雲頓覺閒天恐文章聲斷絶故留賈島在人間錢惟演劉筠首變詩格聖俞子美齊名於當時而二家詩體特異子美筆力豪傑以超邁横絶為竒聖俞覃思精㣲以深逺閒淡為意各極其長雖善論者不能優劣余水谷夜行詩略道其一二云子美氣方雄萬竅號一噫有時肆顛狂醉墨灑滂沛譬如千里馬已發不可殺盈前盡珠璣一一難揀汰梅公事清淺石齒潄寒瀬作詩三十年視我猶後輩文詞愈清新心意雖老大有如妖嬈女老自有餘態近詩尤苦硬咀嚼若難嘬又如食橄欖真味乆愈在蘓豪以氣轢舉世徒驚駭梅窮獨我知古貨今難賣語雖非工謂粗得髣髴然不能優劣詩話總龜白樂天詩曰無事日月長不羈天地濶此達者之詞也孟東野詩曰出門即有礙誰謂天地寛此褊狹者之詞也青箱雜記不同詩史賈島為詩苦吟值公卿不覺李賀未始立題然後為詩如他人牽合程課者每旦出小奚奴背古錦􅇸遇所得書投􅇸中及暮歸足成之新唐書本傳傳記賀知章乗醉賦詩問左右紙多少紙盡思窮傳異志賈島一日驢上吟得鳥宿池邉樹僧敲月下門初欲着推字又欲着敲字鍊之未定遂於驢上作推敲勢不覺行半坊觀者訝之時韓公權京尹意思清嚴威振紫陌經第三隊呵唱島猶手勢未已俄為官者推下驢擁至馬前島方覺悟頋問欲責之島具對偶然一聯吟欠一字未定神遊詩府致衝大官公立馬良乆思之謂島曰作敲字佳矣遂與島同入府署後為僧改名無本鑑戒録寳歴中楊相嗣復具慶下繼放兩榜時先僕射自洛入覲嗣復率生徒迎於潼闗既回大宴新昌里第諸生翼坐元白俱在賦詩唯楊汝士詩後成最佳元白嘆服醉歸曰我今日壓倒元白其詩警句云文章舊價留鸞掖桃李新隂在鯉庭摭言唐人燕集必賦詩推一人擅塲郭曖尚升平公主盛集李端擅塲送劉相廵江淮錢起擅塲李肇國史張逈少夢五色雲自天而下取一團吞之遂精於詩有寄逺云錦字憑誰達閒亭草又枯夜長燈影滅天逺雁聲孤蟬鬢彫將盡虬髭自此無幾回愁不語因看朔方圖僧齋已改為虬髭黒在無逈遂拜為一字師南唐野史元白酬和千篇元守浙東白牧蘓䑓置驛逓詩筒有云有月多同賞無盃不共持其句暗合處唐潘逺紀聞談集示我百篇文詩家一標凖新詩錦不如春興不知凡幾首衡陽紙價頓能髙詩成覺有神詩卷長留天地間為人性僻躭佳句語不驚人死不休苦思緣詩痩思飄雲物外律中鬼神驚光禄最能詩賦詩賓客間揮洒動八垠乃知盖代手才力老益神最傳佳句寰區滿杜詩興酣落筆摇五岳詩成嘯傲凌滄洲李太白集詩成鏘若金和絲秋冷切骨玉聲寒翦截五言兼用鉞陶鈞六義别開爐詩鋒森然少有敢當者詩到元和體變新白侍郎詩纎新撩造化澒洞斡陶甄開拆新詩展大璆明珠炫轉玉香浮捜天斡地覔詩情詩新灌玉壺牛童馬走能吟元白之詩元稹白集序横空盤硬語妥帖力排奡雕琢愁肝腎險語破鬼膽髙詞嫓皇墳金石出聲音宫商發闗鍵腸胃遶萬象精神驅五兵及其為詩劌目鈢心物迎鏤解鈎章棘句搯擢胃腎神施鬼設聞見層出惟其大放厥詞而與世採掇人皆刼刼我獨有餘韓集勢吞萬象髙秀奪五岳雄吟哦無滓韻言語多古腸孟東野翰墨動新文孟浩然詩思清人骨韋應物左攬工部袂右拍翰林肩杜荀鶴集江南煙翠多在句中李義山文麗不葩芬苦不癯棘方雄飛文一日不作詩心源如廢井筆硯為轆轤吟詠作縻綆朝來重汲引依舊得清冷賈浪仙君詩多態度藹藹春空雲韓集詩句遍傳天下口張文昌詠傷松桂青山痩取盡珠璣碧海愁孤情逈出鸞凰逺健思潜捜湖海愁自從東野先生死側近雪山得散行吟損秋天月不明王建詩曹劉須在指揮中古風無敵手欲識為詩苦秋霜若在心詩冷語多尖命代風騷將誰登李杜壇少陵鯨海動翰苑鶴天寒杜牧之乾坤有淸氣散入詩人脾唐文粹撐腸裂月恊作者之肝脾司空圖與王駕評詩書逸歌長句駿發蹈厲穿天心出月脇意外驚人語皇甫湜本朝有病瘧者杜子美曰誦吾詩可治乃令誦手提髑髏血模糊疾果愈古今詩話霜寒入毛骨淸響哀愈長歐公集空腸出秀句吟嚼五味足先生筆力吾畏蹙􅂿倒謝鮑跨徐庾偶然談笑得佳篇便恐流傳成樂府詩句明朝萬口傳新詩嚼雪風嶮語壓衰翁坡詩李長吉歌云天若有情天亦老石曼卿對月如無恨月長圓歐公詩詩人雕刻閒草木捜抉肝腎神應哭好語仍破的公仍句句有絃歌苦語凉肝肺清詩要淘煉乃得鉛中銀坡詩脫手新詩萬口傳句裏江山隨指顧後山淸警殊非俗腑腸僧參寥子白樂天每作詩令老嫗解之問曰解否嫗曰解則錄之不解又易之故唐末之詩近於鄙俚也墨客揮犀王仁裕著詩萬首謂之詩窖子亦曰千篇集前進士髙若訥後史補鄭谷在袁州齊已攜詩詣之有早梅詩云前村深雪裏昨夜數枝開谷曰數枝非早也未若一枝齊已不覺下拜自是士林以谷為一字師陶岳五代補世間好句世人共東坡史筆經動則左史書之言則右史書之記國史明乎得失之迹詩大序子孟子太熈之後述史者幾乎詈矣故君子沒稱焉使陳壽不美於史遷固之罪也使范寗不美於春秋歆向之罪也史之失自遷固始也記繁而志寡子曰非至公不及史也文中子史春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以記逺近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之志諸侯亦各有國史大事書之於䇿小事簡牘而已孟子曰楚謂之檮杌晉謂之乗而魯謂之春秋其實一也周徳既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章仲尼因魯史䇿書成文考其真偽而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刋而正之以示勸戒其餘皆即用舊史史有文質辭有詳畧不必改也故傳曰其善志也又曰非聖人孰能修之盖周公之志仲尼從而明之左丘明受經於仲尼以為經者不刋之書也故傳或先經以始事或後經以終義或因經以辨理或錯經以合異隨義而發其例之所重舊史遺文畧不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其㫖逺將令學者原始要終尋其枝葉究其所窮優而游之使自求之厭而飫之使自趨之若江海之津膏澤之潤渙然氷釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其㣲顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此盖春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰㣲而顯文見於此而起義於彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參㑹不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱避璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻㨗之類是也五曰懲惡而勸善求名而亡欲盖而彰書齊豹盗三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義者也先儒所傳者不盡然荅曰春秋雖以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者有十數家大體轉相祖述進不得為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆沒而不說而更膚引公羊穀梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必出於傳傳之義例總歸諸經凡推變例以正褒貶簡二傳而去異端盖丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿剏通大義賈景伯父子許惠卿皆先儒之美大者也末有頴子嚴者雖淺近亦復名家故特舉劉賈許頴之違以見異同分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又别集諸例及地名譜第歴類數相與為部凡四十五部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚同異之說釋例詳之也左傳杜預序一字之褒寵踰華衮之贈片言之貶辱過市朝之撻徳之所助雖賤必申義之所抑雖貴必屈故附勢匿非者無所逃其罪潜徳獨運者無所隠其名范寗春秋榖梁傳司馬遷據左氏國語采世本戰國䇿述楚漢春秋接其後事訖于大漢其言秦漢詳矣至於采經摭傳分散數家之事甚多䟽略或有抵牾亦其渉獵者廣博貫穿經傳馳騁古今上下數千年間斯以勤矣又其是非頗謬於聖人論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事核不虗美不隠惡故謂之實録西漢司馬遷傳司馬喜生談為太史公談生遷為太史令紬史記石室金匱之書前漢本傳武帝始置太史天下記書先上太史副上丞相故司馬談父子世居此職得撰史記本傳古之王者世有史官君舉必書左史記言右史記事事為春秋言為尚書前漢藝文班彪續司馬遷後傳數十篇未成而明帝命其子固續之固以史遷所記乃以漢氏記百王始末非其義也大漢當可獨立一史故上自髙祖下至王莽為記表傳志九十九篇後漢本傳司馬遷班固父子其言史官載籍之作大義燦然著矣議者咸稱二子有良史之才遷文直而事覈固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭信哉其能成名也東漢班固傳二班懐文裁成帝墳比良遷董兼麗卿雲東漢二班古者天子諸侯有事必告於廟廟有二史左史記言右史記動得失一朝榮辱千載後漢荀恱韋昭領國史吴主欲為其父作紀昭曰文皇不登帝位當為傳不當為紀通鑑晉世祖陳壽撰魏吴蜀三國志丁儀丁廙有盛名於魏壽謂其子曰若覔千斛米見與當為尊公作佳傳丁不與之竟不為立傳晉書陳壽傳陳壽為諸葛書佐得撻后論武侯云應變將畧非其所長後魏書魏收納爾朱榮之子金减其惡而増其善衆口喧然號為穢史收所引史官恐其陵逼唯取學流先相依附者其房延祐辛元稹陸仲讓雖夙渉朝位並非史才刁柔裴昂之以儒業見知全不堪編緝髙孝幹以左道求進修史諸人宗族姻戚多被書録飾以美言收頗急碎不甚能平夙有怨者多沒其善每言何物小子敢共魏收作色舉之則使上天按之當使入地魏收曰願秉直筆東觀北史魏收傳宋魏以降南北分治各有國史互相排黜南謂北為索虜北謂南為島夷唐李延壽記晉秘書監太原孫盛作晉春秋直書時事大司馬温見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言若此史遂行自是闗君門戸事其子遽拜請改之時盛年老家居性方嚴有軌度諸子乃共號泣稽顙請為百口計盛大怒不許諸子遂私改之盛已寫别本傳之外國晉海西公記王韶之私撰晉陽秋成時人謂之宜居史職即除著作郎使續後事訖義熈九年叙事辭論可觀為後世佳史裴松之字世期注陳壽三國志松之鳩集傳記廣増異聞既成奏之上覽之曰裴世期為不朽矣宋書元魏髙允曰夫史籍帝王之實録將來之炯誡今之所以觀徃後之所以知今是以言行舉動莫不備載故君人謹焉崔浩私欲沒其公亷愛憎蔽其直理此浩之責也至於書朝廷起動之跡言國家得失之事此為史之本體未易多違北史本傳劉泊曰使遂良不記天下亦記之矣唐書上謂監修國史房𤣥齡曰前世史官所記皆不令人主見之何也對曰史官不虗美不隠惡若人主見之必怒故不敢獻也唐太宗吴競撰則天實録言宋景激張說使證魏元忠事說修史見之知競所為謬曰劉五殊不相假借競起曰此乃競所為史草具在不可使明公枉怨死者同僚皆失色其後說隂祈競改數字競終不許曰若狥公請則此史不為直筆何以取信於後世吴競叙事簡核號良史唐書本傳古之國史皆自出一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽蔵諸名山未聞籍以衆功方云絶筆唯後漢東觀大集羣儒著述無主條章靡立由是伯度譏其不實公理以為可焚張蔡二子訊之於當代傳范兩家嗤之於後葉今史司取士有倍東京人自以為荀袁家自稱為政駿每欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前後郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博原自近古此道不行史臣編録自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡聽視不該討㳂革於臺閣簿籍難見雖使尼父再世猶且成其管窺况限以中才安能遂其博物其不可二也昔董狐之書弑也執簡以徃而近代史局皆通籍禁門幽居九重欲人不見尋其義者由杜彼顔面防諸請謁故也然今館中作事多士如林皆願長喙無聞􅀈舌倘有五始初成一字加貶言未絶口而朝野具知筆未棲毫而縉紳咸誦夫孫盛實録取嫉權門王邵直書見讐貴族人之情也能無畏乎其不可三也古者刋定二史纂成一家體綂各殊指歸咸别夫尚書之教以䟽通知逺為主春秋之義以懲惡勸善為先史記則退處士而進姦雄漢書則抑忠臣而飾主闕斯並曩賢得失之例良史是非之筆作者言之詳矣頃者史臣多取監修楊令公則云必須直詞宋尚書則謂宜多隠惡十羊九牧其事難行一國三公適從焉在其不可四也切以史置監修雖無古式尋其名號可得而言矣言監者盖總領之義耳如剏紀編年則年有斷限草傳叙事則事有豐約或可畧而不畧或應書而不書此刋削之任也屬詞比事勞逸宜均揮鈆奮墨勤惰須等某表某篇付之此職某記某傳歸之此官此詮配之理也斯並宜明立例條審定區域儻人思自勉則書可立成今監之者既不指受修之者又無遵奉用使争學茍且務相推避坐變炎凉徒延嵗月其不可五也鄭惟忠嘗問劉子𤣥曰自古以來文士多而史才少何也對曰史才須有三長謂才也學也識也夫有學而無才亦猶有良田萬頃黄金滿籯而使愚者營生終不敢致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩楠斧斤終不果成其宫室者矣舊唐劉子𤣥傳史官權重宰相能制人主史官兼制死生唐書朱敬則蔣楷三世修國史世稱良筆劉允濟修國史嘗曰史官善惡必書使驕主賊臣懼而班生受金陳壽乞米唐李延壽本魏登國元年盡隋義寧二年作記傳謂之北史本宋永初元年盡陳禎明三年作記傳謂之南史凡八代合二書百八十篇其書頗有條理刋落穰辭過本書逺甚唐書本傳韓愈為順宗實録議者閧然不息卒竄定無完篇唐栁芳賛李翺以史官記事不實奏曰凡人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀為據今之行狀者多是其門生故吏莫不虗美於受恩之地唐書上就起居舍人魏謩取記注觀之謩不可曰記注兼書善惡所以謹戒人君陛下但力為善不必觀史上曰朕向嘗觀之對曰此向日史官之罪也若陛下自觀史則史官必有所諱避何以取信於後上乃止通鑑唐文宗紀傳記太史公發憤作史記一百三十篇西京雜記自昔史氏所書兩人一事則曰語某人傳晉書載王緼陳祖訥奕棋一段幾二百字兩傳俱在焉此文煩矣孔氏雜記英賢書之則與日月長懸不書則與煙塵俱滅彰善癉惡不避強禦晉之董狐齊之南史此其上也史通自永和以來三百餘年稱王者十六君皆目睹其事國亡之後史書皆非實録今人亦生愚死智惑已甚矣生時庸人其死也碑文墓誌窮天地之大徳盡生民之能事生為盗跖沒為夷齊妄言傷正華詞損實後魏楊衍之吹霜煦露寒暑筆端文心雕龍論史傳沈約修宋史書裴子野父子殊無令譽云自松之已下無聞焉子野乃撰宋畧書沈約家世備有醜聲某年某月斬旴􅇇太守沈璞於建鄴市璞約之父也約見之乃削宋書子野亦削宋畧隋後松芥八代談藪憎愛出於方寸與奪由其筆端謬彼虗譽定為實録子長立記蔵於名山班固成書出自家庭陳壽為志刋於私室得失秉於片言是非由於一句談何容易可不謹哉史通集世人論司馬遷班固之優劣多以固為勝余以為史遷叙三千年事五十萬言固叙二百年事八十萬言煩省不敵固之不如遷也良史述事善足以奬勧惡足以鑒戒人道之常中流小事無足論又因循難易益不同矣又遷為蘓秦張儀范雎蔡澤作傳逞辭流離亦足明其大才也此真所以為良史也張甫名士優劣論自史記班漢以來秉史筆者予盡知其人矣言東漢有若陳宗尹敏伏無忌邉韶崔寔馬日磾蔡邕盧植司馬班彪華嶠范􅁮袁寵言三國志有若衛顗繆襲應璩王沈傳𤣥茅矔薛瑩華覈陳壽言晉洛京史有若陸機史晳王詮子隠言江左史有若鄧燦孫盛王韶之檀道鸞何法盛臧榮緒言宋史有若何承天裴松之蘓寳圭沈約裴子野言齊史有若江文通吴均言梁史有若周興嗣鮑行卿何之元劉璠言陳史有若顧野王傳宰陸瓊姚察察子思㢘言十六國史有若崔鴻言魏史有若鄧淵崔浩浩弟覽髙允張偉劉横李彪鄭巒温子昇魏收言北齊史有若祖孝徵陸元規楊休之杜台卿崔子發李徳林徳林子百藥言後周史有若栁虬牛𢎞令狐徳棻岑文本言隋書有若王邵王胃顔師古孔頴達于志寧李延壽言皇家受命有若温大雅魏鄭公房梁公長孫趙公許敬宗劉𦙍之楊仁卿顧𦙍牛鳳及劉子𤣥朱敬則徐堅次而修者亦近耳目劉軒作唐之一經垂之於無窮誅姦䛕於既死發潜徳之幽光今之所以知古後之所以知今不可口傳必憑諸史孔子作春秋也諸侯用夷禮則夷之夷而進於中國則中國之孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史兄弟幾盡左丘明紀春秋時事以失明司馬遷作史記刑誅班固瘐死陳壽起又廢卒亦無所至王隠謗退死家習鑿齒無一足崔浩范曄亦族魏收夭絶宋孝王誅死足下所稱吴競亦不聞身貴而後有聞也夫為史者不有人禍必有天刑豈可不畏懼而輕為之哉韓文何不自著書實録彼善人編為一家言以備史闕文白集顯筆有流史于千祀杜牧之宰相升沉人於數十年間史官出沒人於千百歳下是史官與宰相分挈死生權也孫可之文文敵遷固直如南董皇甫湜筆端膚寸澤及天下唐文粹史筆應令謟骨羞王建集馬遷班固咸有述作庶幾聖賢其於斟酌典謨表章㣲絶曽不能觸其籓籬者也魏晉之際失何足云中原板蕩史道息矣陳叔達本朝聊借舊史誅姦彊坡詩新唐書叙事好簡畧其詞簡故其事多鬱而不明此作史之弊也且文章豈有繁簡必欲多則文冗而不足讀必欲簡則僻澁令人不喜假令新唐書載卓文君事不過止曰少嘗竊卓氏如此而班固載此事乃近五百字讀之不覺其繁也且文君之事亦何補於天下後世哉作史之法不得不如是故謂文如風行水上出於自然也若不出於自然而有意於繁簡則失之矣唐書進表云其事則増於前其文則省於舊且新唐書所以不如兩漢文章其病正在此兩句也劉語之唐李延壽著南北史粗傳作史之體故唐書本傳亦謂其過本書逺甚然好述妖異兆祥謡䜟特為棄猥晉書為極多有甚害名教者如鄧攸棄子則攸之滅天性何足為賢列女傳王渾見王濟趨庭曰生子如此足慰人意妻鍾琰曰新婦得配參軍生子不翅如此何等語乃載之史冊謂之列女乎謝安捷書至還内屐齒折謂之矯情鎮物安之過海風起浪湧諸人皆懼而安自若又桓温欲害安與王坦之倒執手板而安神色不變苻堅入冦獨無懼色如此之類也矯可乎故荆公詩云彼哉斗筲人得喪皆驚怯妄言屐齒折吾欲刋史牒盖深嫉作史者之謬也遯齋閒覽范蔚宗黄憲傳最佳憲初無事迹蔚宗直以語言模寫叔度形容體段使後世見之此最妙處其他傳即馮衍馬援滕盖得二人文字照映便覺此傳不同以知班固前書不可及者亦得司馬賈董諸人文字作皮草歩里客談辨訛史顔師古曰發縱讀為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也西漢蕭何傳註周處風俗記仲夏端五謂五月初五也今書端午其義無取予家元和中端五詔書並無作午字唐李正文資暇集近世作文者多以青紫荷􅇸作使從使不知其誤晉輿服志曰八座尚書則荷上聲紫以生紫為拾􅇸綴之服外加於左肩至南史周捨問劉杳曰尚書著紫荷􅇸相傳云挈􅇸竟何所出杳曰張安世傳云持槖簮筆今世以侍從為持槖則誤矣風俗通曰無恙俗說疾也凡人相見及書問曰無疾耶按上古之時草居霧宿恙噬蟲也食人心凡相勞問者曰無恙乎非為疾也藝文類聚南史顔延之詩曰五薦不入朝一麾乃出守延之攸賓以此自托古今詩話亦載此事唯杜牧之為登樂詩亦云擬把一麾江海去因此遂為故事今世以守郡謂之把麾其誤有自來矣于􅀈以樂曲有想夫憐其名不雅客曰南朝相府曽有瑞蓮故號相府蓮後語訛矣國史補本朝毛詩出車曰畏此簡書者治竹然青作簡以書耳今人直用紙名曰簡以通慶弔之禮說苑曰越襲吴吴王將死曰吾不用子胥之言至於此死者有知吾何面以見子胥也遂蒙絮覆面以死今人死以方帛覆面者誤也唐避代宗嫌名故民間呼山藥為薯藥又避英宗嫌名遂改曰山藥自此全失其本稱矣晉右軍王羲之好鵝後世以鵝為右軍事物紀原惟桑與梓必恭敬止謂桑梓以人賴其用故養而成之莫肯凌踐則有恭敬之道父子相與豈特如人之親桑梓今乃言父母之邦者必稱桑梓非也温叟詩話山東曰朝陽山西曰夕陽故詩曰度其夕陽又曰梧桐生矣于彼朝陽山西曰耳後人便用夕陽忽西流然古人亦誤用乆矣宋子京作筆記髙山仰止景行行止景明也髙山則仰之明行則行之耳魏晉間所謂景莊景儉等從一人差誤遂相承謬如郡守為一麾也山谷俗呼人之妻父為嶽丈以泰山有丈人峯丈人觀似亦有理也而呼妻母稱泰水此何義也晉樂廣衛玠妻父也時稱氷清玉潤然則俗所謂岳丈當云樂丈耳本朝孫正訓文渭陽秦康公念母之詩也我見舅氏若母存焉今世俗母在稱舅氏亦曰渭陽非也鄭風揚之水云終鮮兄弟註云鮮寡也言忽兄弟争國寡於兄弟之恩後世無兄弟者則稱終鮮失詩人之意凡冬至啟閉必書雲物今世以冬至為書雲節而夏至二分皆未嘗用豈未知道歟管見荀子云蘭槐之根為芷蘭芷自兩物又云蟹六跪而二􅚺蟹實八足不應言六跪荀卿楚人蘭芷蟹皆楚地所有著書者既借物以為喻當能辨物之形性不知何以致誤如此遯齋閒覽􅄞叔夜與山巨源絶交書云野人有快炙背而美芹子者欲獻之至尊後世遂有獻芹之說予讀列子楊朱篇但云宋國有田夫曰負日之暄人莫知之以獻吾君其室告之曰昔人有美戎葵與芹子者對鄉豪稱之鄉豪聞之蜇於心惨於腹衆哂之此獻芹之說實無所出特􅄞叔夜合快炙背美芹子者而言之耳管見記纂淵海巻七十五
