body:
  text: 記纂淵海巻九十宋潘自牧撰飲食部酒經需于酒食易有孚于飲酒濡其首未濟若作酒醴爾惟麴蘖書厥父母慶自洗腆致用酒不腆于酒罔敢湎于酒矧汝剛制于酒並同上微我無酒以遨以遊詩子有酒食何不日鼔瑟為此春酒以介眉夀朋酒斯饗我有㫖酒嘉賔式燕以敖以宴樂嘉賔之心釃酒有藇釃酒有衍有酒醑我無酒沽我君子有酒㫖且多君子有酒嘉賔式燕以樂嘉賔式燕以衎嘉賔式燕綏之嘉賔式燕又思酒旣和止飲酒孔偕飲酒孔嘉維其令儀凡此飲酒或醉或否旣立之監或佐之史王在在鎬豈樂飲酒君子有酒酌言獻之酌言酢之酌言醻之或獻或酢洗爵奠斝曾孫維主酒醴維醹酌以大斗以祈黄耉旣醉以酒旣飽以德清酒百壺旣飲㫖酒永錫難老並詩酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰漿四曰酏周禮夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮壹獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也禮記酒者所以養老也所以養病也射義奉酒醴以告曰嘉栗㫖酒左傳有酒如淮有酒如澠酒以成禮不繼以淫並同上不為酒困唯酒無量不及亂並語子禹惡㫖酒而好善言孟日昃不飲酒酒必酸賔主百拜而酒三行不已華乎揚室酒不絶文中公孫朝好酒聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻列魯趙皆獻酒于楚王主酒吏求酒於趙不獲乃以趙厚酒易魯薄酒奏之楚王以趙酒薄遂圍邯鄲淮南史禹時儀狄作酒禹飲而甘之遂疏儀狄絶㫖酒通鑑外紀大宛有蒲萄酒史貨殖傳魯正曰酒者天之美祿帝王所以順養天下前食貨志酒百藥之長嘉會之好同上齊威王問淳于髠曰先生能飲幾何而醉對曰臣能一斗亦醉一石亦醉王問故髠曰賜酒大王之前執法在前御史在後不過一斗隨醉矣若乃履舄交錯杯盤狼籍堂上燭盛主人留髠而送客當此時髠心最懽能飲一石史記曹參為相國日夜飲酒賔客見參不事事皆欲有言參輒飲以醇酒醉而後去終莫得開說漢書武帝初𣙜酒酤昭帝罷酒酤買酒升四錢司馬相如與文君俱之臨卭賣酒舍乃令文君當罏相如自滌器於市中並同上徐邈為尚書郎私飲沈醉校尉趙達問曹事邈曰中聖人達白之太祖太祖甚怒鮮于輔曰醉客謂酒清者為聖人濁者為賢人邈性修謹偶醉言耳後文帝問邈曰頗復中聖人不對曰臣不能自懲時復中之魏志晉孫季舒與石崇酣飲慢遊過度崇欲表免之裴楷曰足下飲人狂藥責人正禮不亦乖乎晉裴楷傳陶潛逢酒熟取頭上葛巾漉之畢還復著之本傳畢卓嘗曰得酒滿數百斛船四時美味置兩頭右手持酒盃左手持蟹螯便足了一生矣本傳嵇康醉倒如玉山之將頽本傳劉伶曰天生劉伶以酒為名一飲一石五斗解醒本傳山濤飲酒至八斗方醉帝欲試之乃以酒八斗飲濤宻益其酒濤極本量而止本傳阮孚以金貂換酒為所司彈劾帝宥之本傳陳睻嗜酒與兄子秀曰江諮議有言酒猶兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉速營糟丘吾將老焉南史本傳周伯仁渡江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為多南史賀知章見李太白呼為謫仙人因解金龜換酒為樂唐李白傳王績待詔門下省官給酒日三升或問何樂答曰美醖三升差可戀耳陳叔達聞之日給一斗稱一斗學士嘗著醉鄉記本傳德宗即位劒南貢生春酒本紀憲宗遣使者賜李絳酴醿酒李絳傳于闐以蒲萄為酒又有紫酒青酒味尤美五代史傳記酒為歡伯除憂來樂焦贑易林晉劉白墮能釀酒暴於日中經旬不變又謂之擒奸酒有毛鴻賔逢盜以酒飲之即醉皆被擒語曰不畏張弓挾矢唯畏白墮春醪洛陽伽藍記蘭生漢武帝百味㫖酒名玉薤隋煬帝酒名異人錄魏左相能治酒其名有醽醁翠濤太宗嘗賜詩曰醽醁勝蘭生翠濤過玉薤千日醉不醒十年味不敗同上暑月候雷霆時收雨水淘米炊飯釀酒名曰霹靂酒醉郷日月凡酒以色清味重者為聖色如金而醇苦者為賢墨色酸醨者為愚以家醪糯釀醉人者為君子以家醪黍釀醉人者為中人以巷醪黍釀醉人者為下人凡醉有所宜醉花宜晝襲其光也醉雪宜夜消其潔也醉樓宜暑資其清也醉水宜秋泛其爽也凡飲以一人為明府主斟酌之宜酒懦為曠官謂冷也酒猛為苛政謂熱也以一人為錄事以糾坐人須擇有酒材者飲器大者曰武小者曰文並同上桓温有主簿善别酒好者為青州從事惡者為平原督郵注云青州有齊郡從事謂到臍下也平原有革縣督郵言在鬲上住也世說廬山有桑落洲多美酒同上索郎酒桑落時美因以為名續古今注滎陽之土窟春富平之石梁春酒色也國史補酒有京城之郎官清同上劉袚命酒為玉友仍為作傳百家詩序烏孫國有青核大如六升瓢貯水俄而成酒名青田壺酒曰青田酒古今注頓逢國有樹似石榴採其花汁停瓮中數日成酒甘美通典房夀六月𢷬蓮花製碧芳酒叩頭錄滄州出菖蒲花桃花酒飲之神氣清爽南昌國酒山有泉其味如酒飲之經月不醒魏賈捋有奴常乗舟於黄河中流接河源水以釀酒名崑崙芳味絶妙互見水類劉𤣥石從中山沽酒酒家與之千日酒至家而死以棺斂葬之酒家計千日滿憶𤣥石醒矣徃視之其家云死已三年於是開棺醉始醒博物志葉法善與朝士會忽有一人叩門自稱麴生秀才言語不凡葉疑其非人飛劍擊之應手墮地乃一酒榼中有美醖飲之同坐曰麴生風味不可忘也開元傳信汝陽王飲葉静能静能曰有一生能欽當令來謁翊日有通謁者曰進士常持滿飲以酒五斗而醉倒乃一瓮耳何東記集奠桂酒兮椒漿楚辭四酎并孰不歰嗌只清馨凍飲不歠役只吳醴白糵和楚瀝只瑶漿蜜勺實羽觴些挫糟凍飲酎清涼些華酌旣陳有瓊漿些並同上天垂酒星之曜地列酒泉之郡堯不千鍾無以見太平孔非百斛無以堪上聖樊噲解厄鴻門非鍾酒無以奮其怒趙之厮養東迎其主非巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪無以脫其命定國非酣飲壹斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔糟啜醨取困於楚由是觀之酒何負於政哉孔融與曹操書捧罌承槽銜盃潄醪奮鬛箕踞枕麴藉糟無思無慮其樂陶陶劉伶酒徳頌三杯通大道五斗合自然但得酒中趣勿為醒者傳李白蘭陵美酒鬱金香玉椀盛來琥珀光蟹螯即金液糟丘是蓬萊蒲萄酒金叵羅吳姬十五細馬駞遥看漢水鴨頭綠恰似蒲萄初潑醅此江若變作春酒壘麴便作糟丘臺並同上琉璃鍾琥珀濃小槽酒滴真珠紅李賀麴神寅日合酒聖夘時歡白樂天何不飲美酒胡然自悲嗟俗號銷憂藥神速無以加一杯驅世慮兩杯反天和三杯即酩酊或笑任狂歌同上得錢即相覔沽酒不復疑忘形到爾汝痛飲真吾師杜詩春酒杯濃琥珀薄冰漿椀碧瑪瑙寒無人竭浮蟻有待至昏鴉並同上酒味旣冷冽酒氣又氤氲性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛長安衆富兒盤饌羅羶葷不解文字飲唯能醉紅裙韓文本朝頻頻到口微成醉拍拍滿懐都是春醺酣情味難名狀醖釀工夫莫指陳斟有淺深存燮理飲無多少寄經綸邵康節上樽白日㵼黄封坡詩注云都下以黄封酒為貴蓋重内醖也典衣剰買河源水屈指新篘作上元老怯香泉灧寶樽花前白酒傾雲液龍根為脯玉為漿下界寒醅亦謾嘗未能頳我頰良復濡子唇飲中真味老更濃醉裏狂言真可怕應傾半熟鵝黄酒照見新晴碧水天曉日著顔紅有暈春風入髓散無聲春杯浮竹葉時復中之徐邈聖毋多酌我次公狂萬斛羈愁都似雪一壺春酒若為湯真珠為漿玉為醴白酒潑春瓮並同上酒面潑醅浮大白六一集瓮面浮蛆潑已香同上饌經炰鼈膾鯉詩肴核維旅雖無嘉肴式食庶幾有兔斯首燔之炙之或燔或炙嘉殽脾臄爾殽旣嘉爾殽旣馨燔炙芬芬其肴維何炰鼈鮮魚並詩珍用八物注云淳熬淳毋炮豚炮牂𢷬珍漬熬肝膋也狼去腸狗去腎狸去正脊兔去尻狐去首豚去腦魚去乙鼈去醜肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟鷄野豕為軒兔為宛脾並記子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑左傳宰夫胹熊膰不熟殺之同上膾不厭細魚餒而肉敗不食有盛饌必變色而作並語子至於味天下期於易牙耆秦人之炙無以異於耆吾炙魚我所欲也熊掌亦我所欲也並孟史晉元帝始鎮建業公私窘罄每得一㹠以為珍膳項上一臠尤美輒以薦帝于時呼中禁臠故王珣呼謝鯤為禁臠晉書何曽性豪侈蒸餅上不作十字不食一食萬錢猶曰無下箸處王愷有牛名八百里王武子與射賭得趣左右探心作炙一啖而去並同上傳記江南人善作膾名郎官膾因張翰思膾得名每物異名記南人魚膾以細縷金橙拌之號為金虀玉膾隋時吳郡獻松江鱸鱠煬帝曰東南佳味也隋唐嘉話漢婁君卿遊五侯之門每旦五侯饋餉之君卿乃合五侯所餉為鯖鯖與􅙰同音征蓋煎和之名廣記將軍曲良翰作駝峯炙甚美雜爼蓴龜羮之絶美江南謂之一蓴龜飲食有杏炙龜炙安祿山寵愛莫比其所賜品目有馬駱野猪鮓南孝亷善作鱠縠薄絲縷輕作吹起並同上王逺至蔡經家設麟肉脯神仙傳謝𤣥卿遇神仙設素麟脂斑螭髓續神仙傳有人遺張華鮓華曰此龍肉也遂以苦酒沃之鮓中有五色光世說晉人飲食中有寒具者乃今環餅也鷄跖集駱賔王謂盛饌為炊金饌玉拾遺唐御厨進饌有九飣盤明皇雜錄李林甫壻鄭平鬢斑林甫曰上明日賜甘露羮鄭郎食之能烏髪食之果然同上明皇命射鹿取血煎鹿腸食之謂之熱洛河盧氏雜錄盧懐慎為相清儉召客食曰爛蒸去毛莫拗折項疑為鵞鴨已而下粟米飯一器及盛葫蘆一枚同上侯思止食籠餅必令縮葱如肉號縮葱侍郎籠餅即今饅頭也僉載懿宗迎佛骨入内道塲薦瓊膏乳訶陵國所獻也杜陽編同昌公主上賜御饌有龍虬脯同上宣宗賜韋澳孫宏銀餅餤食之甚美皆乳酪膏腴之所為摭言栁公權以隔風紗作龍城記及八朝名品號錦様書以進上方御剪刀麫月兒羮即命分賜公權雲仙散錄洛陽人家七夕裝同心膾同上房州六月調羊酪造含風鮓叩頭錄王晉飯酒非鴨肝猪肚筋輒不舉醉仙圖集蕙肴烝兮蘭藉楚辭肥牛之腱臑若芳些和酸若苦陳吳羮些臑鼈炮羔有柘漿些鶴酸臇鳬煎鴻鶬些露鷄臛蠵厲而不爽些粔籹蜜餌有餦餭些鼎臑盈望和致芳只内鶬鴿鵠味豺羮只鮮蠵甘鷄和楚酪只醢豚苦狗膾苴蓴只吳酸蒿蔞不沾薄只炙鴰烝鳬煔鶉敶只煎鰿􅌜雀遽爽存只並同上臣䱉言伏覩除書以臣為糝缶將軍油蒸校尉臛州刺史者臣聞髙沙老嫗非有意於綺羅白鮪女兒豈留心於珠翠常恐鮥朘之誚懼詒鼈岩之譏梁韋琳作䱉表注云髙沙白鮪並地名其中多魚與鮮同且食雙魚美誰看異味重杜詩䜴化蓴絲熟刀鳴鱠縷飛鮮鯽銀絲鱠香芹碧澗羮勸客駝蹄羮霜橙壓香橘並同上長安衆富兒盤饌羅羶葷韓文本朝江南人好作盤遊飯鮓脯鱠炙無不埋下飯下諺曰掘得窖子羅浮穎老取凡飲食雜烹之類名谷薫羮陸道士作一聨云投醪薫谷羮鍋内掘窖遊盤飯椀中仇池筆記爛蒸桐州羔灌以杏酪食以匕不以筯南都撥心麫作槐芽温淘糝以襄邑抹猪炊共成香稻薦蒸鵝吳興厨人砭松江鱸魚鱠繼以康王谷水烹増坑鬬品茶焉解衣少卧使誦東坡赤壁賦足以一笑也志林唐人謂之饆飥今俗謂之餺飥晉束晢餅賦有饅頭薄持起溲牢久之號今起溲牢久皆莫曉為何物薄持荀氏謂之薄夜亦莫知其何物湯餅温麫也歸田錄一饌費千金百品羅成行六集玉食謝故吏風飱便逐臣東坡蔗漿酪粉金盤冷通印子魚猶帶骨披綿黄雀謾多脂剰與故人尋土物臘糟紅麴寄駝蹄今君坐致五侯鯖盡是猩唇與熊白並同上糓經黍稷非馨明德維馨書稷降播種農殖嘉穀吕刑黍稷稻梁農夫之慶誕降嘉種維秬維秠維糜維芑稼穡維寶代食維好貽我來牟帝命率育降之百福黍稷重穋稙穉菽麥有稷有黍有稻有秬並詩三農生九穀注云稷秫黍稻麻大小豆大小麥食用六穀注云稻黍稷梁麥􅋎菽麥蕡稻黍梁秫唯所欲孟夏農乃登麥仲夏農乃登黍孟秋農乃登穀仲秋以犬嘗麻季秋以犬嘗稻並記子不違農時穀不可勝食也孟大庭氏號曰神農播穀因苗以為教管神農氏之治天下也甘雨以時五穀蕃殖淮南吾欲取天地之精以佐五穀莊莊周家貧故徃貸粟於監河侯同上得時之禾長秱大穗圜粟而薄穅米粘而香舂之易而食之强亢倉子得時之稻莖葆長穗穗如馬尾同上史武王伐紂伯夷叔齊叩馬諫武王平殷亂伯夷叔齊恥之不食周粟而餓死史記武帝太倉之粟陳陳相因充溢露積于外腐敗不可食末年悔征伐之事下詔以趙過為搜粟都尉漢書吳全琮父柔為桂陽守使琮齎米數千斛至吳交易琮皆賑給士大夫空船而還柔竒之吳志陶淵明為彭澤令公田悉令種秫稻妻子固請種粳乃使二百五十畆種秫五十畆種粳宋書齊劉懐惠為齊郡守人有餉新米一斛者懐惠出所食麥飯示之曰食有餘幸不煩此南史梁張率為新安太守遣家僮載米三千石還宅及至遂耗其半率問其故答曰䑕雀耗率笑曰壯哉䑕雀竟不研問庾詵嘗乗舟從山舍還載米百五十石有人寄載三十石至宅寄載者曰君三十石我百五十石詵黙然不辨恣其取足沈絢少貧于宗黨得米數百斛為宗人所侮覆米而去並同上隋季士謙望見盜割其禾黍者黙而避之家僮執盜者士謙曰窮困所致也遂放之隋書陽城嘗遣奴求米奴以米易酒醉卧于路城與弟負之以歸及覺痛咎謝城曰寒而飲何害焉唐書傳記粢稷爾雅注云今江東人呼粟為粢衆秫衆一名秫謂粘粟也戎菽胡豆也虋赤苗今之赤梁粟芑白苗今之白梁粟秬黒黍黒黍一名秬黍秠一稃二米秠是黒黍之中一稃有二米者徐稻糯也並同上大豆菽也小豆荅也豆角謂之莢其葉謂之藿廣雅來小麥也牟大麥也同上禾之秀實者為稼一曰在野曰稼說文以大暑而種故謂之黍粟禾子也嘉穀實也粟之為言續也禾嘉穀也稷五穀之長也並同上稻之粘者為秫古今注禾之粘者為黍亦謂之穄亦曰黄黍同上西北曰蜜山多玉膏以灌丹禾山海經飯之美者𤣥山之禾吕氏春秋東華夫人設龍睛之稻廣記虎掌稻紫芒稻同上元和八年大軫國進碧麥紫米杜陽編杜甫在蜀日以七金買黄兒米半籃院花旋地志紫沈麻其實不沈有雲水麻實冷而光宜為油澤有光通麻食者行不待燭則巨勝也食之延夀拾遺大厯中日本國獻靈光豆大小類中華之菉豆其色殷紅而光芒可長數尺本國人亦謂之詰多珠和石上菖蒲葉煑之即大如鵝􅆑帝啖一丸歎其香美無比而數日不復言饑渇杜陽編有含露麥穗中有露甘如飴拾遺胡中有指星麥四月火星出穫麥而食之俗人呼為鷄鳴麥同上集稻梁穱麥挐黄梁些楚辭五穀六仭設菰梁只同上白露黄梁熟分張素有期已應舂得細頗覺寄來遲味豈同金菊香宜配綠葵老人他日愛正想滑流匙杜詩香稻三秋末平田百頃間喜無多屋宇幸不礙雲山御裌侵寒氣嘗新破旅顔紅鮮終日有玉粒未吾慳滑憶雕胡飯嘗稻雪翻匙崆峒小麥熟且願休王師細麥落輕花並同上種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸陶潛淅玉炊香粳韓文本朝今年秋應熟過從飽鷄黍東坡浮大甑常炊玉同上都城一飯炊白玉山谷菜經參差荇菜于以采蘩于沼于沚于以采蘋南澗之濵于以采藻于彼行潦采葑采菲誰謂荼苦其甘如薺其䔩維何維筍及蒲山有蕨薇隰有把荑思樂泮水薄采其芹並詩韭菹昌本菁菹茒菹葵菹芹菹深蒲菭菹筍菹仲秋命有司趣民務畜菜並記雖疏食菜羮𤓰祭必齊如也語子孔子窮於陳蔡之間顔囘擇菜徐無鬼見魏武侯武侯曰先生居山林食芋栗厭葱韭以賔寡人久矣夫並莊昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口􅃤於腹衆哂而怨之列史公儀休為魯相食葵而美拔其園葵而棄之不與人争利史記張騫使西域始得大蒜苜蓿漢書張翰秋風起乃思吳中蓴羮鱸魚晉書蘇峻之亂庾太尉南奔見陶公陶性儉吝及食啖薤庾因留之陶問用之何為庾公曰故可種於是大歎同上蔡樽為吳興守齋前自種白莧紫茄詔褒其清南史王儉謂周顒曰卿山中何食顒曰赤米白鹽綠葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晩菘庾杲清貧食唯有韭菹㵸韭生韭或戲之曰誰謂庾郎貧食常有二十七種言三九也張融食炙欲求鹽蒜口終不言方摇食指半日乃息並同上孟信為趙平太守山中老人以㹠酒饋之信乃自出酒以鐵鐺温之素木盤盛蕪菁菹而已北史邢峙以經入侍皇太子厨宰進菜有邪蒿峙令去之曰此菜有不正之名非殿下所宜食同上傳記晉咸寧中芳圃於金墉城多種異菜名曰雲薇又曰雲芝其種有三謂之三蔬其香歴月不歇拾遺始皇遣徐福入海求金菜玉蔬金樓子合觀菜每節四葉相對夜合晝開番禺雜記東華夫人設黒河菜廣記唐太宗時健達獻佛土菜一莖五葉花赤心中正黄而蘂紫色類要宋宇種蔬三十品時雨之後案行園圃曰天茁此徒助于鼎爼豫章記諸葛亮所止令兵士獨種蔓菁菜今三蜀人呼為諸菜江陵亦然嘉話錄掌中芥出末多國取子置掌中吹之一吹一長三尺乃植於地雜爼馬自然見一家好菘菜求之不得於是取筆畫一白鷺飛入菜畦中啄菜又畫一猧子走捍捉白鷺共踐其菜廣記韮一剪一加糞一嵗之中不過五剪鷄跖集五光七曰靈蔬者薤也十籖姚興𢎞始三年逍遥園葱變為􅊉以為美瑞謂智人應入五月鳩摩羅什入關廣記渾提葱其狀猶葱而甘辛類要菜之波稜者西國中有僧自彼將其子來本是頗陵國將來語訛耳嘉話錄劉崇龜以清儉自居嘗召同列食苦蕒北夢瑣言菜之美者有雲夢之芹吕氏春秋段成式食茄子偶問張周封茄子故事張云一名落蘇事具食療本草成式記得隠侯行園詩云寒𤓰方卧壟秋􅋎正滿陂紫茄紛爛漫綠樹鬱參差又一名崑崙𤓰雜爼宋𤣥曰食彘肉以蒜虀一盆喫畢飲酒二斗人有求得其一片蒜食之有如異香終日在齒舌間香不歇廣記南越志云石蓴似紫菜泮水詩云采其茒鳬葵也疏云江南謂之蓴菜或謂之水葵又名水芹鷄跖集蓴根羮之絶美江東謂之蓴龜雜俎蓴至冬為猪蓴又云龜蓴又云七八月以前曰絲蓴秋末初曰瑰蓴本草四月蓴生莖而未葉名雉尾蓴鷄跖集猿啼之地厥乃多有每啼一聲遞生萬莖窮幽記王鯨逢賣蕨姥黄衣破結鯨憫之乃以千錢買蕨姥謝而去及歸蒸于烏頭甑盡成金釵清異志魯漆室之女曰昔客舍我繫馬跌殘余葵使余經嵗不飽葵列女傳苦菜河北謂之龍葵顔氏家訓李華燒三城絶品炭以龍腦褁芋魁煨之擊爐曰芋魁遭遇矣三賢典語集紫菜熒􅁮以叢被綠苔鬖髿乎研上文選菜則葱韭蒜芋青筍紫薑堇薺甘㫖蓼荽芬芳蘘荷依䕃時藿向陽綠葵含露白薤負霜潘安仁賦秋黄之蘇白露之茹七發芳菰精稗霜蓄露葵七啓歡言酌春酒摘我園中蔬陶詩柔蔬傲霜而秀拆劉禹錫賦畦蔬遶茅屋自足媚盤飱杜詩自鋤稀菜甲小摘為情親園蔬抱金玉並同上本朝秋風吹折碧削玉茹芳根應傍鵝池發中懐酒墨痕茭白分得蹲鴟種連根占地腴曉炊粘玉糝深椀啖模糊芋肉食嘲三九終憐氣韻清一畦春雨足翠髪剪還生韭漑釡熟輪囷香清味仍美一線解瓊瑶中有佳人齒瓠葉實抱芳辛氣烈銷煩滯登爼效微勞乍食驚頻􅅉芥周郎愛晩菘對客蒙稱賞今晨喜薦新小嚼冰雪嚮菘金鏇因形製臨畦發永歎時危思纈佩楚客莫紉蘭波稜新芽肌理膩映日浄如空拾似匀妝指柔尖帶淺紅子薑宻壤穿根蔕風霜亦飽經如何純白質近蔕染㣲青蘿蔔雖無適口味暖益功稀比菜苦不登盤言忠多逆耳苦薺並係劉屏山園蔬詠清朝薦蔬盤乳餅有真味不用精瓊靡無勞爛羊胃乳餅翛翛江上林白日暗風雨下有萬玉虯三冬卧寒土筍誰將紫芝苗種此槎上土便學商山翁風餐謝肥羜紫蕈薑云能損心此謗誰與雪請論去穢功神明看朝徹子薑寒茭翳秋塘風葉自長短刳心一飽餘并得牀敷軟茭筍黄龍記昔遊園客有佳遺不為洛生吟輟餐時擁鼻南荷小草有真性託根寒澗幽懦夫曽一嘬感憤不能休􅀈菜蔬腸久自安異味非所􅀈樹耳黒垂耼登盤今亦乍木耳紛敷剪翠叢津潤擢玉本寂寞並文園吟餘得染齦蘿蔔沃野無凶年正得蹲鴟力區種萬葉青深煨奉朝食芋魁南山春筍多萬里行枯腊不落盤餐中今知綠如簀筍脯種豆豆苗稀力竭心已腐早知淮南荒安坐獲泉布豆腐聞說閬風苑瓊田産玉芝不收雲表露烹瀹詎相宜白蕈已上繫朱文公次劉秀野蔬食十三詠茶𣙜茶已見都大茶馬類史陸羽字鴻漸嗜茶著經三篇言茶之原之法之具後著毁茶論唐本傳傳記茶上者生爛石中者生礫壤下者生黄土茶經沫餑者湯之華也華之薄者為沫厚者為餑輕細花者曰花茶有九難一曰隂採夜焙非造也二曰嚼味嗅香非別也三曰膩鼎腥甌非器也四曰膏薪庖炭非火也五曰飛湍擁潦非水也六曰外熟内生非炙也七曰碧粉縹塵非末也八曰操艱攪遽非煮也九曰夏興冬廢非飲也並同上王子尚訪曇濟道人於八公山道人設茗子尚味之云此甘露也何言茶名也陸羽顧渚山記唐制湖州造茶最多謂之顧渚貢焙嵗造一萬八千四百餘斤南部新書唐德宗好煎茶加酥椒之類李泌戲為詩曰旋沫翻成碧玉池添酥散作琉璃眼鄴侯家傳顧渚山有鳥每至正二月作聲春起也至三月止春去也採茶人呼為報春鳥顧渚山茶記王濛好茶人至輒飲之士大夫甚以為苦每欲候濛必云今日有水厄世說覺林僧志崇收茶三等待客以驚雷莢自奉以萱草帶供佛以紫茸香赴茶者以油囊盛餘瀝歸蠻甌志白樂天訪劉禹錫正病酒禹錫乃饋菊苗虀蘆服鮓換取樂天六班茶二囊以自醒酒同上同昌公主上每賜饌其茶則有綠華紫英之號杜陽編江左有蠟面之號李氏别命其乳作片或號曰京挺的乳二十餘品名乳蠟面龍鳯茶等又有研膏茶即龍品也談苑蜀雅州濛嶺産茶最佳其常在春夏之交方茶生常有雲霧覆其上若有神物䕶持云圖經集山石東吳秀茶稱瑞草魁杜詩楚老卷綠葉枝枝相接連曝成仙人掌似拍洪崖肩李白芳叢翳湘竹零露凝清華復此雪山客晨朝掇露芽蒸煙俯名瀨咫尺凌丹崖圓方麗其色圭玉無纖瑕呼兒㸑金鼎餘馥延幽遐滌慮發其照還源蕩昏邪猶同甘露飯佛事薫毗耶咄此蓬瀛客無為貴流霞栁文聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羨茶百草不敢先開花仁風暗結珠琲瓃先春抽出黄金芽盧仝嫩芽香且靈吾謂草中英夜臼和煙𢷬寒爐對雪烹鄭愚本朝顧况論茶云煎以文火細煙又以小鼎長泉蔡君謨茶錄謝宗論茶云候蟾背之芳香觀蝦目之沸湧建人謂鬬茶為茗戰建安鬬茶以水痕先退者為負耐久者為勝故較勝負之說相去一水兩水耳並同上爾雅云苦茶注似梔子今呼早採者為茶晩採者為茗蜀人名曰苦茶故坡詩云周詩記苦茶茗飲出近世初緣厭梁肉假此雪昏滯苕溪詩話北苑在富沙之北隸建安縣去城二十五里乃龍焙造貢茶之處亦名鳯凰山龍焙泉即御泉也北苑造貢茶社前芽細如針用御水研造其色如乳乃至精也並同上南劍有濛頂石花湖州有顧渚紫筍峽州有碧澗明蔡寛夫詩話顧渚湧金泉每嵗造茶時太守先祭拜然後水漸出造貢茶畢水稍減至恭堂茶畢已減半矣太守茶畢遂涸同上茶之品莫貴於龍鳯團蔡君謨為福建運使始造小片龍茶其品絶精謂之小龍圑凡二十餘餅重一斤其價值金二兩然金可有而茶不可得歸田錄熈寧中有㫖下建州製蜜雲龍其品又髙張舜民小說茶之佳者造在社前其次火前謂寒食前也學林新編乃知此為最靈物宜其獨得天地之英華六一集西江水清江石老石上生茶如鳯𤓰共約試春茶槍旗幾時綠摘處兩旗香可愛貢來雙鳯品尤精並同上春濃睡足午牕明想見新茶如潑乳東坡紫椀鋪粟盤龍茶赤泥開方印紫餅絶圓玉蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠落眩轉遶甌飛雪輕並同上記纂淵海卷九十
