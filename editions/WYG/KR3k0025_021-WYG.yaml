又置深州本朝因之饒陽本漢舊縣屬涿郡隋屬瀛川唐為深州治所本朝仍屬深州武强漢為武隧縣地屬河間國晉析置武强縣屬長樂國唐屬深州後屬冀州本朝屬深州同上形勝武强山在武强縣境内漢置縣取此紫金山在深州北五十里即舊捍水隄嵗乆頽敗惟存二阜巉然屹立束鹿巖在束鹿縣北外隘内廣可容千餘人滹沱河在束鹿南三十里饒河在饒陽縣西南漢置縣取此鴉兒河在束鹿南十里輿地紀勝人物漢崔駰安平人愽學有才時薦其宿徳大儒遷濟北相官至尚書崔琦安平人文章􅀶通梁冀行多不軌琦作外戚箴以諷冀隂使人害之晉馮沈安平人􅀶涉經史仕魏為魏郡太守入晉累遷御史中丞隋孫萬夀武強人􅀶渉子史善屬文隋初徴拜豫章王長史有文集十三卷崔頥安平人七嵗能屬文開皇初射䇿髙第居母憂水漿不入口五日後奉詔與諸儒撰區宇圖志唐張進饒陽人少負竒質有膽氣唐初謀擒劉黒闥以功授開府儀同三司張鷟深州人少聰慧絶倫為文下筆輒成舉進士累官學士時稱其文猶青銅錢萬選萬中人號為青錢學士魏知古深州人幼有才雅擢進士第後拜黄門侍郎皇朝周仁美深州人開寳中征契丹有功累官右班都知戍環州李昉饒陽人和厚多恕不念舊惡太宗嘗稱為善人君子李宗諤昉第三子七嵗能文舉進士累官翰林院學士事繼母以孝聞與弟宗諒友愛所著有文集次子昭述賜進士官至尚書從子昭遘能文授舘閣校理累官工部郎中同上集村落人家起曙烟凌霄危度至今𫝊石宇本朝太平興國七年以深州𨽻静安郡雍熙二年廢三年又廢四年復置改今治沿革表蕪蔞問古亭春入饒陽城豆粥君王逺壺漿刺史迎梅聖俞磁州倚郭一外縣二滏陽邯鄲武安郡號滏陽州沿革天文室壁分野禹貢冀州之域本秦邯鄲郡地漢為魏郡武安縣地後魏析置臨水縣後周割臨水置滏陽縣及成安郡隋罷郡於滏陽置磁州後罷唐改為惠州後復為磁州沿革表縣沿革滏陽本漢邯鄲郡地後周置以其在滏水之南故名邯鄲本戰國時趙都秦為邯鄲郡漢廢郡為縣武安漢置屬魏郡曹魏屬廣平郡隋屬武安郡唐初屬洺州後屬磁州本朝因之同上形勝賀蘭山在州西北四十里紫山在邯鄲縣西北三十里嘗有紫氣趙奢封於此粟山在武安東十二里相傳白起拒趙亷頗於此積粟山上玉峯山在武安西南二十里有白石如玉鼔山在武安南二十里亦名滏山上有二石如鼔鳴則兵起聲聞數百里磁山在武安西南三十里土産磁石州名取此滏水源出磁州湧沸如湯白龜泉在武安東北上有廟龜見即雨吕仙祠在邯鄲東二十里即盧生遇吕仙處王郎城在邯鄲西三里光武時詐稱成帝子卜者王郎所築周昌墓在滏陽縣境内即漢御史大夫前有祠藺相如墓在邯鄲縣境内輿地紀勝人物列國李同邯鄲人同趙平原君與秦戰却秦兵同戰死封其父為侯劉劭邯鄲人魏文帝時為尚書郎授詔集五經羣書凡所著作皆寓諷諌又有人物志行於世賜爵闗内侯唐王及善邯鄲人以父爵錫邢國公為人清正有大臣節崔𤣥亮磁州人舉進士為監察御史清介自持朝廷推為宿望皇朝韓令坤武安人有才畧為天平軍節度加侍衛同平章事屢立竒功韓令贇武安人少有勇力仕為都校防禦使屢立戰功贈侍中子崇訓官至太傅崇業官至大將軍蔡審廷武安人善騎射初授冀州刺史從征太原訓練士卒甚整後為鎮州兵馬都鈐轄蘇寀滏陽人擢進士第嘗使契丹聞英宗晏駕遂徹樂不飲燕累官給事中知審刑院長於刑名受詔奬張君平滏陽人以父承訓與契丹戰沒平屢戰功遷右班殿直後治河遷鈐轄子拱為河隂判嗣其父秩同上集客從長安来驅馬邯鄲道秦兵益圍邯鄲急魏王不救平原君並王維子真河朔尉邑里𢃄清漳春草迎袍色晴花拂綬香岑參送鄭少府兵符刼晉鄙匕首刺秦人報士非無膽高堂念有親鄭從邯鄲城南遊侠子自矜生長邯鄲裏千塲縱􅀶家仍富幾處酬恩身不死髙逹夫雲起龍沙暗木落雁行秋輕生狥知己非是為身謀虞世南五陵豪俊多買酒黄金賤揮劍邯鄲市走馬梁王苑韋端已家住叢臺下門前漳水流喚人呈楚舞借客試吴鈎鄭錫本朝武和三年改作磁州熈寜六年省昭徳縣為鎮入滏陽沿革表數㸃寒峯擁翠嵐叢臺日落見漳南回仙逆旅今存否世上黄梁夢正酣陳剛中邯鄲懷古邯鄲居民苦坐甑大梁公子思要君張楷朝别鄴中人暮走邯鄲道同上邯鄲今日題詩客猶是黄梁夢裏人遺山祁州倚郭一外縣二蒲隂鼓城深澤郡號蒲隂州沿革天文尾箕兼昴畢分野禹貢冀州之域本漢中山國安國縣地晉屬􅀶陵郡北齊省隋置義豐縣屬􅀶陵郡唐改為立節縣神龍初復曰義豐屬定州景福初於此置祁州本朝改蒲隂縣沿革表縣沿革蒲隂春秋時曲陽城地隋為義豐縣唐置祁州宋改蒲隂縣鼔城本漢涿郡地本朝置鼔城縣深澤本漢舊縣屬涿郡東漢屬安平國晉屬􅀶陵後魏因之隋屬定州唐因之本朝省入鼔城沿革表形勝鼔城山在縣境廣谷大川春月有聲相呼應清漳水在鼔城境滹沱河在危渡口光武為赤眉所追馳至滹沱吏言水深無舟上使王霸視之乃言氷堅可渡渡畢冰解因名沙河在州西南十里東入易水磁河在州西南二十里東流入海八角井在深澤縣西其水大旱不渇一名龍井輿地紀勝人物皇朝盧之翰少篤學家貧太宗朝登第歴遷殿中丞通判洺州契丹入㓂决漳御河以固城敵不能攻召還歴西京轉運副使建議導潩河入於淮逹許州以便漕運齊恢蒲隂人唐宰相映之裔登進士第通判陳州臨政簡約州人愛之韓琦薦其賢擢太子左諭徳神宗時以天章閣待制知相州召紏察在京刑獄同上集佳人擕瑟漳河曉壯士悲歌易水秋薛大拙本朝端拱初以鎮州鼔城来屬景徳元年移治於定州蒲隂以無極𨽻定州熈寜六年省深澤縣為鎮入鼔城元祐元年復置沿革表慶源府倚郭一外縣六平棘寜晉臨城高邑隆平栢鄉贊皇郡號趙郡郡沿革天文昴畢分野禹貢冀州之域春秋屬晉國戰國屬趙秦為邯鄲鉅鹿二郡地漢初立趙國治邯鄲縣晉亦為趙國治房子後魏廢國為趙郡治平棘北齊置趙州隋置灤州後改為趙州大業初改趙郡仍治平棘唐復為趙州治栢鄉縣尋復治平棘天寳初改趙郡後復為趙州本朝置慶源府沿革表縣沿革平棘春秋時晉地戰國屬趙後魏置平棘寜晉春秋晉楊氏邑漢屬鉅鹿郡晉為廮陶唐改寜晉臨城戰國屬趙為房子縣唐改臨城縣髙邑本晉鄗邑漢為鄗縣屬常山郡光武改為髙邑隆平本漢廣阿縣隋為象城唐為昭慶本朝為隆平栢鄉本春秋晉鄗邑地隋置栢鄉賛皇東漢高邑縣屬常山國隋置賛皇取山為名同上形勝檀山在賛皇縣東十里髙百餘丈周穆王嘗駐蹕於此五馬山在賛皇東十里上有五石馬故名賛皇山在縣西南十里高百餘丈縣名取此十八盤山在賛皇六十里上下十有八盤龍井在州北思賢堂在隆平縣治西祀宓子賤卓茂魯恭環山亭在賛皇治西環亭皆山故名望臺在州東南漢時耿弇築此以望光武千秋臺在髙邑南二里漢光武至鄗因諸將請築臺遺趾猶存安濟橋在州南五里洨河上即大石橋昔張果嘗騎驢過此河踏跡尚存永通橋在州西清平河上槐水橋在栢鄉縣六里漢光武廟在栢鄉縣北十五里内有石人唐祖陵在隆平縣南十五里唐祖宣皇帝塟此象城在隆平縣三十五里舜弟象嘗居於此輿地紀勝人物南北朝李靈平棘人魏道武時以才俊被徴拜中書􅀶士累官洛州刺史贈鉅鹿郡公李順靈從父弟多計策仕魏征伐有功賜爵平棘子李璨靈之弟仕魏為中書郎以定淮北功賜爵始豐侯子二元茂宣茂曾孫名槩俱有文學李謐孝伯從孫十嵗喪父哀毁動人事兄極恭十三通詩書厯數鄉人以神童號之魏文徴拜著作郎不就賜號貞静處士隋李徳饒璨四世孫好學有至性仕為監察御史唐李思行州人髙祖起兵時以賛大議受左統軍累功遷嘉州刺史樂安郡公李素立髙邑人擢監察御史有犯法不至死者髙祖欲殺之素立堅執不可帝嘉納之累爵髙邑侯李嶠賛皇人十五通五經舉進士任給事嘗辨狄仁傑寃獄李華賛皇人舉進士累官吏部貟外郎李翺州人中進士第初為國子􅀶士嘗面斥宰相李逢吉之過後拜諌議大夫李吉甫栖筠子為翰林院學士擢中書侍郎引薦賢士時稱賢相李絳賛皇人舉進士官翰林學士後與李吉甫同相甚鯁直獻宗稱為真宰相李徳裕吉甫子初為翰林學士曽上丹扆六箴後拜封衛國公皇朝宋綬平棘人性孝謹清介擢進士累官資政殿學士叅知政事李京州人中進士第遷監察御史數上書言事切直王徳用州人累功遷集慶軍節度使名聞四夷時號黒王相公郭諮平棘人舉進士𨽻殿中丞嘗陳治水禦戎之䇿時論偉之同上集夜渡濁河津衣中劍滿身昨縁秦苦楚来往大梁頻鄭縱黄雲同入塞白首獨還家同上天官動將星漢地桞條青萬里鳴刁斗三軍出井陘王摩詰忘身辭鳳闕報國取龍廷不學書生輩窻中老一經並同上本朝大觀三年陞為大藩崇寜四年賜軍額宣和元年陞為府熈寜六年省隆平縣為鎮入臨城元祐元年復熈寜五年省栢鄉賛皇二縣為鎮入高邑元祐元年皆復沿革表川原落落曙光開四顧山河亦快哉遺山歴代遷闗河雁風吹寒秋文山保州倚郭一保塞郡號上谷清苑州沿革天文尾箕兼昴畢分野禹貢冀州之域戰國時屬趙秦為上谷鉅鹿二郡地漢為涿郡及信都中山國地晉屬范陽髙陽中山安平河間國後魏為樂浪北平上谷郡地隋屬上谷􅀶陵河間三郡始於此置清苑縣唐時其地屬莫定滿瀛等州五代晉割屬契丹於此置秦州後移州治蒲城而舊州仍為清苑縣本朝即縣置保塞軍沿革表縣沿革保塞本漢樊輿縣屬涿郡北齊省入永寜軍隋改為清苑縣屬河間郡以境内有清苑河故名唐屬莫州五代因之本朝改保塞縣同上形勝郎山在郡西北五十里其峯尖鋭如削松山在保塞縣西北七十里山多松樹每風雨摗之若笙簧然百花嶼在郡城西北九十里髙數仭百花繁盛清苑河在保塞縣西二里遶城南北至東合流入黄狗窊石橋河在郡城南梁河在郡城東三十里東流入於海蓮花池在郡治南中有看花亭龍井在郡城南相傳有龍居焉龍泉井在郡東北八十里相傳井甃於秦漢時後人浚井得觀音像及水瓶因水常泛溢立觀音祠鎮之横翠樓在郡東萬卷樓在郡治内臨漪亭在郡内澄瀾蕩漾簾户疏越魚泳鳥翔雖城市囂囂而得三湘七澤之樂髙陽城在郡東南七十里相𫝊顓頊所築輿地紀勝人物皇朝孫友行莫州保塞人常聚衆郎山屢敗契丹仕漢周累官定州留後本朝加同平章事遷左龍武軍大將軍孫全照友行姪以廕補殿直從田仲進擊賊有功後敗契丹累加檢校工部尚書劉渙文質子有才氣遇事敢為天聖中上疏請太后還政尋通判磁州累官工部尚書弟滬有智畧仕至西路都廵檢張玉郡人𨽻狄青麾下善用鐵簡仁宗稱為真勇將從征儂知髙有功河北三十七將推玉為第一後為馬步軍都虞候同上集北風鳴晚角雨雪塞雲低丁稜夜救龍城急朝焚虜帳空虞臣汗馬牧秋月疲卒卧霜風劉灣塞外虜塵飛頻年出武威死生随王劍辛苦向金㣲郭元振本朝建隆初置保塞軍太平興國六年建為州政和三年賜郡名曰清苑太平興國八年析馬州蒲城之南境入保塞沿革表我行保州塞御河直其東山川猶有靈佳氣何欝葱文山顧我巾車囚乘風轉秋蓬辦香欲往拜惆悵臨長空前人記纂淵海卷二十一
