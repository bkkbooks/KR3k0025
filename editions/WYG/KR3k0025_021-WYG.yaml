body:
  text: 記纂淵海卷二十一宋潘自牧撰郡縣部河北西路真定府倚郭一外縣八真定藁城欒城元氏井陘獲鹿平山行唐靈夀天威軍郡號常山郡沿革天文昴畢分野禹貢冀州之域周為并州地春秋為鮮虞國戰國屬趙秦為鉅鹿郡地漢初置恒山郡後避諱改曰常山武帝置真定國常山屬焉東漢建武間併真定屬常山國魏復為郡晉因之治真定後魏移治真定又復移治安樂壘後周於郡置恒山隋廢郡存州大業間省州以縣屬高陽郡唐復置恒州開元間改恒州郡置大都督府元和中改鎮州後升成徳軍節度五代時梁改武順軍唐復成徳軍後又為鎮州晉改順徳軍漢復成徳軍周改為鎮州本朝為真定府成徳軍節度沿革表縣沿革真定本戰國楚之東垣邑漢改為真定縣屬常山郡藳城漢舊縣屬真定國本朝因之欒城本春秋晉欒武子封邑東漢置欒城縣元氏本趙公子元之封邑漢置元氏縣屬常山郡井陘漢舊縣屬常山郡獲鹿本戰國趙之石邑唐改名獲鹿𨽻恒州平山本春秋晉之蒲邑唐改為平山縣屬恒州行唐隋割真定地置行唐縣漢屬常山國靈夀本戰國時中山國地漢置靈夀縣同上形勝抱犢山在府西南昔韓信伐趙持赤幟登山而望即此横山在真定縣南劍山在井陘縣東其形似劍雲鳳山在井陘東北神山在井陘縣東射挅山在井陘縣東南秦將王剪伐趙下井陘於此射挅蒼巖山在井陘縣東上有海山龍堂西屏山在獲鹿縣西高聳為一郡竒景神巖山在元氏西南無極山在元氏縣西有漢時碑封龍山在元氏西北楸山在靈夀縣西北上多楸樹東林山在平山縣北上有千佛堂玉女山在行唐縣北試劍石在元氏縣境唐郭元振得寳劍即此滹沱河在武城南為九河第一流天寜閣在府治東高一百三十尺中有銅鑄觀音像欒武臺在欒城縣境晉大夫欒武子所築白鹿臺在平山縣西漢武帝登此有白鹿至故名淮隂侯廟在獲鹿縣西王滹南祠在藁城縣學董王趙三氏勲閥子弟祀其師王若虛麥飯亭在滹沱河馮異進麥飯於光武即此輿地紀勝人物周郤縠行唐人悦禮樂敦詩書常為晉文公將中軍列國樂毅靈夀人燕昭王以為亞卿伐齊下七十餘城漢李左車行唐人韓信用其策下燕齊諸城田叔井陘人常薦孟舒朝廷稱其知人三國趙雲真定人為漢昭烈將累樹竒功封永昌亭侯南北朝張彫武中山人通五經尤明三𫝊弟子就業者以百數事北齊遷平原太守隋李知本元氏人愽學性孝友子孫百數庭無間言大業末盗賊過閭不入相戒曰無犯義門唐倪若水藳城人擢進士嘗為汴州刺史政尚清浄累官尚書右丞劉禹錫中山人擢進士宏詞科累官集賢直學士劉栖楚真定人累官右拾遺常諌敬宗遊畋碎首玉階帝為動容皇朝髙懷徳常山人從太祖征澤潞及揚州以功封冀國公曹彬靈夀人太祖命為都監伐蜀回囊中惟圖書而已及下江南不妄殺一人以功封魯國公曹璨彬長子習知韜畧屢戰有功授同平章事曹瑋彬第三子沉勇有謀通春秋三𫝊年十九舉措老成累立戰功為都指揮使賈昌朝獲鹿人登進士為崇政殿説書拜中書門下平章事同上集光武經營業未興王郎兵革暫憑陵須知後漢功臣力不及滹沱一片氷肅氣闗河暮屯烟部落晴旂彩秋燒去甲色夜光横石曼卿吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終陳伯玉士喜擊中鼔虜疑聞後鉦無私乃時雨不殺是天聲石曼卿贈曹彬寒逾博望塞春燕隗囂城外使戎心伏旁資帝道平同上本朝開寳六年廢九門石邑二縣端拱初以鼓城𨽻祁州淳化九年以束鹿𨽻深州慶厯八年初置真定府路安撫使統真定府磁相邢趙洺六州熈寜六年省井陘入獲鹿平山八年復置徙治天武軍即縣治置軍使𨽻府有天威軍小作口王家谷二砦熈寜六年省靈夀為鎮入行唐八年復冇赤陘飛吳二砦沿革表萬人背水亦書意獨驅市人收萬全黄魯直君不見滹沱流澌車折軸公孫倉皇送豆粥濕薪破竈自燎衣饑時頓解劉文叔身經戎馬心逾壯天入風霜氣更豪横槊賦詩男子事征西誰為謝諸曹並東坡夷門一把平安火定遂恒山候騎来李長源破趙降燕漢業成兎亡良犬日圖烹功盖一時誠不滅恨埋千古欲誰明韓稚圭相州倚郭一外縣三安陽湯隂臨章林慮郡號鄴郡州沿革天文室壁分野禹貢冀州之域商河亶甲居相即此春秋為晉之東陽地戰國為魏之鄴地秦為上黨邯鄲二郡地漢置魏郡治鄴東漢末冀州徙治鄴魏曹操受封於此後稱為鄴都晉仍為魏郡屬冀州後趙石虎前燕慕容雋並都之後魏於此置相州東魏静帝徙都之改曰司州北齊武帝又都之改為清都尹後周復改為相州及魏郡治安陽隋初置郡為相州大業初復改魏郡唐為相州天寳初改鄴郡乾元初復為相州五代梁置昭徳軍節度晉改彰徳軍本朝復相州屬河北道縣沿革安陽本紂都之地左傳羛陽即此秦更名安陽湯隂古羑里地戰國為魏湯隂地漢置湯隂縣臨漳縣本鄴地魏文侯始封於此晉改為臨漳縣林慮縣本漢隆慮縣屬河北郡後漢改林慮縣沿革表形勝韓陵山在郡東北魏高歡破爾朱榮于此蒙賚山在郡西南魏孝文帝遷洛陽頒賚衆臣因名龍山在郡西魏都𫝊虎澗龍山即此銅山在安陽西北山舊産銅魯山在安陽西北相傳春秋時魯般居其下髙望山在安陽西北飛鳳山在湯隂縣西其形似鳳淺山在湯隂縣西南與太行山相接鶴山在湯隂縣西昔有雙鶴棲其上東崓山在臨漳西南東魏高澄於此鑿池以為遊玩之所太行山在林慮縣西羣山一帶為中州巨鎮黄華山在林慮西上有仙人樓玉女臺魯般門下有黄華谷瀑布泉隆慮山在林慮西北有竒景玉泉山在林慮西南有泉清㓗如玉將軍山在林慮西南昔齊侯伐晉駐兵於此龍井昔晉孫登常醫病龍即痊龍穿此井以報登㧞劍泉在郡西韓琦以劍揷地泉水湧出九華宫在臨漳縣西後趙石虎所建紫陌宫披雲樓逍遥樓玳瑁樓俱在臨漳縣治皆石虎所建晝錦堂在郡治北韓琦以宰相判鄉郡建於居地歐陽修記蔡襄碑尚存忘機堂醉白堂俱在府治雙桂堂在湯隂縣㑹盟亭在洹水上狎鷗亭觀魚亭俱在忘機堂前廣脊亭在府治東樂山亭在林慮西登此亭以望西山歴歴可指五松亭在林慮縣西銅雀臺在臨漳西曹操所築中懸大銅雀高一丈五尺其瓦可以為硯堯廟在府城湯廟在林慮縣文王廟在湯隂縣張騫廟岳飛廟扁鵲墓俱在湯隂縣曹操疑塜在講武城外太甲舊都在郡西南羑里在湯隂縣魏徴宅在安陽縣浣衣里在湯隂縣境晉嵇紹血濺御衣在此浣之輿地紀勝人物漢霍諝鄴人為北海相常言梁冀専權桓帝嘉其忠焉魏桓安陽人朝廷召之不應舉世稱高之杜喬林慮人少舉孝㢘遷南郡太守東海相梁冀専權正色不撓卒為所害晉邵續安陽人愽覧經史初為成都王叅軍後為樂陵太守累官冀州刺史南北朝孔伯恭鄴人事魏累官鎮樂將軍唐傅奕鄴人仕為太史丞常上書詆浮圖法戴胄安陽人為秦王府叅軍犯顔諌諍遷尚書左丞叅知政事杜正倫相州人初置文學舘魏徴薦其才累遷中書侍郎杜羔正倫孫舉進士性至孝官至工部尚書皇朝韓國華安陽人舉進士性純直累官左司諌子珫賜進士出身琚璩琦並進士及第韓琦國華子弱冠舉進士方唱名太史奏五色雲見歴仕中外朝廷倚重封魏國公韓忠彦琦子舉進士初為樞宻丞拜右僕射數進讜言大有忠益封儀國公岳飛湯隂人少負氣節好左氏春秋􅊎以忠義報國為秦檜所害追封鄂王諡武穆同上集禮樂儒家子英豪燕趙風鳴琴當理邑走馬却從戎白刄千夫闢黄金四海同鄴州新騎滿魏帝舊臺空望闕應懷戀遭時貴立功並韋應物朝光耀庭雪宿凍聚池寒正色臨㕔事疑詞定筆端張説魏帝當年銅雀臺黄花深映菊叢開薛能金鳳隣銅雀漳河望鄴城劉方平士苦形骸黒林踈鳥獸稀那堪往来戍恨解鄴城圍杜甫本朝熈寜五年省氷和縣入安陽宣和二年以湯隂縣𨽻濬州尋復𨽻相州熈寜五年省鄴縣入臨漳沿革表甘棠猶茂應存愛植栁堪驚近過圍魚遊藻間適物性月沉波底發禪機韓魏公遷鶯賀燕翩翩集嘉樹甘棠次第春宋子京黄昏日傍霜臺落緑樹人穿廢苑行劉彦冲白首三朝社稷臣壺漿夹道擁如雲金貂争看真宰相竹馬猶迎舊使君韓魏公中山府倚郭一外縣六安喜無極曲陽唐望都新樂北平郡號􅀶陵郡沿革天文昴畢分野禹貢冀州之域漢為中山郡後改中山國魏改定州晉慕容垂都地隋改􅀶陵郡唐改定州天寳初改􅀶陵郡乾元初復為定州建中間改義武郡節度本朝改定武軍政和間陞中山府沿革表縣沿革安喜漢中山郡地後魏屬定州本朝陞州為府以安喜附焉無極本漢毋極縣唐武后時改毋作無曲陽漢置上曲陽縣以在太行之陽轉曲處故名唐漢常山國地本朝改為縣望都亦漢常山國本朝置縣新樂漢新市縣屬中山國本朝因之北平漢薊州地李廣出獵暮遇石以為虎射之沒羽即此同上形勝嘉山在州西唐郭子儀敗史思明於此少容山在曲陽殷女昌容隐居之所上有八㑹寺利民侯祠恒山在曲陽西北恒為北嶽盖五嶽之一也辰星主焉雙嶺山在唐縣西北水豆巖在曲陽西北上有潄玉亭並蘇軾書浮休二大字雪浪石在郡文廟前狀如雪浪鑿石盆為芙蓉形以盛之沙河在新樂西南東流入海黒水在郡界地深而不流閲古堂在郡治後園韓琦率武定時建傍書歴代良守將事績凡六十條問山堂在無極縣境内春露亭在新樂縣南義臺在新樂縣南燕慕容麟戰於義臺即此倒馬闗在郡西龍泉關在曲陽縣西韓魏公祠在文廟西蘇東坡祠在郡境内堯城在郡東北固城在郡城東相傳禹治水所築苦陘城在無極縣東魏李克為中山相知縣吏之貪而免之輿地紀勝人物南北朝魏季景曲陽人􅀶學有文才仕魏為中書侍郎家無餘財所著文筆二百卷魏釗曲陽人􅀶涉羣書仕齊為建忠將軍子長賢􅀶涉經史為著作郎隋魏澹季景子世業文章仕為禮部侍郎唐張行誠郡人少師劉兹兹稱其器宇方正宰相才也高宗補侍御史崔𤣥暉郡人武后時為天官侍郎後封􅀶陵郡王李百藥郡人七嵗能文魏立為鳯閣舎人與裴炎結交能保終始號耐乆朋陽城郡人徳宗召拜諌議大夫后遷國子司業崔湜郡人舉進士累官中書令與弟液澄從兄涖並以文學顯甄濟無極人知禄山將叛隐居不仕後肅宗召為太子舎人五代杜審琦郡人昆弟五人世以積善聞其妹即太祖母昭憲太后太祖贈審琦神武大將軍諸子弟并姪顯於朝皇朝劉斌郡人性至孝嘗手仞父讐朝廷義之釋其罪王安中曲陽人進士及第累官翰林院學士尚書左丞所著書七十餘卷同上集對敵六竒峯臨戎八陣張唐太宗晏中山旌旃朝􅃋氣笳吹夜邉聲坐覺烟塵掃秋風古北平杜必蕳王師非樂戰之子慎甲兵海氣侵南部邉風掃北平陳伯玉天開還白日風動散晴雲紈扇情初㫁黄花興欲醺杜牧之月浪衝天天宇濕凉蟬落盡水星入但聞北斗聲回環不見長河水清淺並李義山戍樓吹角起征鴻獵獵寒旌背晚風千里暮烟愁不盡一川秋草恨無窮張泌山本朝建隆元年以易北平併來屬太平興國軍改武定軍節度本定州慶厯八年始置定州路安撫使統保定深祁安肅順安永寜八州政和三年升為府改賜郡名曰中山沿革表孤雲落日在馬耳照耀金碧開烟鬟東坡太行西来萬馬屯勢壓岱嶽争䧺尊飛狐上黨天下􅆃半掩落日先黄昬畫師争摹雪浪勢天工不見雪斧痕同上中山䧺北邉地得要害扼烽警昔未徹民日困兵革中山古戰國殺氣浮高牙並韓魏公信徳府倚郭一外縣七邢臺沙河任堯山平郷内丘南和鉅鹿郡號鉅鹿襄國郡