body:
  text: 記纂淵海卷六十八宋潘自牧撰接物部延接經晝日三接以貴下賤易主人肅客而入記子吾所執贄而見者十人還贄而相見者三十人貌執之士者百有餘人欲言而請畢事者千有餘人吾僅得三士焉以正吾身故上士吾薄為之貌下士吾厚為之貌荀子史天下諸公子亦有喜事者矣然信陵君之接岩穴隠者不耻下交有以也名冠諸侯不虛耳楊惲好士自喜知人居衆人中長與人顔色並史記孟嘗君客無所擇皆善遇之人人自以為孟嘗君親已延為上客周公曰我一沐三握髪一飯三吐哺起以待士猶恐失天下之賢也孟嘗君好士食客常數千人春申君客三千餘人皆躡珠履並史公孫𢎞為宰相起客館開東閣以延賢人鄭當時為大使戒門下客至亡貴賤亡留門者執賔主之禮以其貴下人于定國為人謙恭尤重經術士雖卑賤徒歩輒過定國皆與鈞禮恩敬甚備丞相開東閣以延賢人與叅謀議韋元成謙遜下士出遇知識歩行輒下從者與載送之並西漢謙恭愛士傾身引接慰藉良厚陳寵為司空去籍通賔客以明無所不受論者大之東漢皇甫嵩為三公以身起于汗馬常折節下士謝承傳陳蕃惟徐穉來特設一榻去則懸之周璆唯蕃能致焉特為置榻去則垂之陳蕃傳蔡邕見王粲而竒之時邕才學顯著貴重朝廷常車騎塞巷賔客盈坐聞粲在門倒屣迎之王符在門皇甫規素聞符名乃驚遽而起衣不及帶屣履出迎揮沐吐餐垂接白屋袁紹士無貴賤與之抗禮並東漢羊侃不飲酒而好賔㳺終日獻酬同其醉醒南史羊欣常詣領軍將軍謝鯤鯤拂席改服然後見之王渾為安東將軍虛懐接納座無空席門不停謁江東之士悦附之晉紀瞻曰先王身下白屋搜揚仄陋使山無扶蘇之子野無伐檀之詠並晉書賈謐喜延士大夫郭彰石崇陸機弟雲和郁及滎陽潘岳清河崔基渤海歐陽建蘭陵繆街京兆杜斌摯虞瑯琊諸葛詮𢎞農王粹襄城杜育南陽鄒㨗齊國左思沛國劉讓周恢安平索秀潁川陳眕髙陽許猛彭城劉訥中山劉興興弟琨皆附于謐號曰二十四友惠帝紀張建封性樂士賢不肖逰其門者禮必均故其徃如歸唐書傳記陳仲舉為豫章太守至便問徐孺子所在欲先看之雜記司農受客戒無留門丞相延賔使常開閤捧銅盤而盟平原之賔二十躡珠履而㑹春申之客三千白帖集重士踰山魏都賦公子敬愛客終宴不知疲子建詩許與氣類文憲集年勢不侔公與之抗禮文選集延之上座韓文主人才且賢重士百金輕應物集有地先開閤何人不掃門却訝繡衣人仍交布衣士劉長卿屈富貴于沉𡨕雜薜蘿于簮笏子昂集見我顔色温杜甫解榻招徐穉登樓引仲宣元微之集本朝歐陽公喜士為天下第一冷齋夜語蘇明允至和間來京師既為歐陽公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為異禮石林燕語藐視子說大人則藐之勿視其巍巍然彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉孟子為卿於齊出弔於滕王使蓋大夫王驩為輔行王驩朝暮見反齊滕之路未嘗與之言行事也孟子史毛遂曰公等碌碌所謂因人成事者也史記何足置齒牙間哉説丞相𢎞下之如發蒙耳並西漢更始見趙熹曰繭栗犢豈能致逺乎許汜與劉備語曰陳元龍無客主之禮不相與語自上大牀卧使客卧下牀備曰今天下大亂君須憂國忘家有救世之意乃求田問舍言無可采是元龍所諱也何縁當與君語如我自卧百尺樓上卧君於地下何但上下牀之間哉崔琳曰大丈夫為有邂逅耳即如卿諸人良足貴哉黃忠為後將軍闗公聞黄忠位與己並怒曰大丈夫不與老兵同列不可受拜或問禰衡曰盍從陳長文司馬伯達乎曰吾焉能從屠沽兒耶又問荀文若趙稚長云何曰文若可借面弔䘮稚長可使監厨並東漢張飛嘗就劉巴宿巴不與語曰大丈夫處世當交四海英雄如何與兵子共語蜀志司徒蔡謨戯侮王導導怒謂人曰吾徃與羣賢共逰洛中何曾聞有蔡克兒耶秦王墮曰董龍是何雞狗而令國士與之言乎殷浩才名冠世庾翼弗之重也每語人曰此輩宜束之髙閣俟天下太平然後議其任耳秦王猛倜儻有大志不屑細務人皆輕之猛悠然自得聞桓溫入闗被褐詣之捫虱而談當世務旁若無人王徽之為桓冲騎兵參軍冲嘗謂徽之曰卿在府日乆比當相料理徽之初不酬答直髙視以手板柱頰云西山朝來致有爽氣耳謝奕嘗逼桓溫酒溫走避之奕遂引溫一兵帥共飲曰失一老兵得一老兵慕容評真奴才雖億兆之衆不足畏况數十萬乎秦主登聞後秦王萇卒喜曰姚興小兒吾當折杖笞之耳並晉紀爾刀筆小才正堪供几案之用豈應汙辱門下斁我彛倫梁紀桓範曰曹子丹佳人生汝兄弟㹠犢耳魏志龜鼈小豎自救不暇夫何能為魏人曰檀道濟死吳子輩不足復憚宋紀孫晟素輕馮延已謂人曰金盃玉盌乃貯狗矢乎周太祖紀李太白常侍帝醉使髙力士脫靴顔師古性簡峭視輩行傲然罕所推接唐書傳記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曹劉沈謝暗中摸索着亦可識國史纂異集髙眄邈四海詩客來尚不見肯到權門耶奴視法度士韓集視天下之勞若觀蟻之移穴翫而不戚栁文五侯三相家眼冷不見君太倉一稊米大海一浮萍畜之如犬羊視之如蜂蠆白侍郎集髙視終古一笑昔人亦何足齒于吾人唐文粹憂天下無此鼠輩耶劉賔客本朝下看區區郊與島螢飛露濕迎秋草孤芳陋孤妍歐公捄援子猶解倒懸也昬暮叩人之門户求水火無弗與者孟子中流失舡一瓠千金鶡冠子出死斷亡以覆救之荀子史簡書同惡相恤之謂同恤菑危救備凶患天災流行國家代有救菑恤鄰道也救患分菑並左傳救人於戹振人不贍季布有名於楚數窘漢王項羽滅高祖求布千金布匿周氏髠鉗季布衣褐衣置廣栁車中并與其家僮數十人之魯朱家所賣之朱家心知是季布乃買而置之田誡其子曰田事聽此奴必與之同食季布傳秦囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姫求解幸姫曰妾願得君狐白裘此時孟嘗君有一狐白裘價值千金天下無雙入秦獻之昭王更無他裘孟嘗君患之徧問客莫能對最下坐有能為狗盗者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦王幸姬姬為言釋孟嘗君孟嘗君即馳出秦昭王後悔出孟嘗君求之已去即使人馳傳逐之孟嘗君至闗闗法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴遂發闗出本傳李同説平原曰士方其危苦之時易得耳伍子胥奔吳到昭闗昭闗欲執之伍子胥幾不得脫追者後至江上有一漁父乗船知伍子胥之急乃渡子胥本傳鮑宣下廷尉王咸舉幡太學下曰欲救鮑司𨽻者㑹此諸生㑹者千餘人遮丞相孔光車不得行宣減死一等望氣者言長安獄中有天子氣郭穣夜到郡邸獄丙吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可况親曾孫乎相守至天明不得入緩急相䕶西漢何顒與袁紹為犇走之交嘗私入洛陽從紹計議為諸名士罹黨事者求捄援權計使得逃隠所全免甚衆東漢初蔡邕與將作大匠陽球有隙球即中常侍程璜女夫使人飛章言邕下邕於雒陽獄劾以􅄷怨奉公議害大臣不臣不敬棄市事奏中常侍河南吕强愍邕無罪力為伸請陽球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕由是得免漢靈帝紀趙岐逃難賣餅北海中孫嵩見岐與共載歸藏岐複壁中數年侯覽等上書告張儉與同郡二十四人為黨於是刋章討捕儉儉困迫遁走望門投止莫不重其名行破家相容其所經歴伏重誅者以數十宗親皆殘滅郡縣為之殘破張儉為中常侍侯覽所怨覽刋章捕儉與孔融兄褒有舊亡抵褒不遇融曰兄雖在外吾不能為君主耶因留舍之後事泄褒坐死並東漢王祥漸有時譽母深疾之宻使鴆祥弟覽知之徑起取酒祥争而不與母遽奪反之自後母賜祥饌覽輒先甞魏元帝紀李景莊老於塲屋毎被黜母輒撻景譲荘兄也宰相謂主司曰李景莊今嵗不可不收可憐彼母每嵗受撻由是始得及第武宗紀勅曰王衍一行並從殺戮樞宻使張居翰就殿柱揩去行字改為家字唐明宗紀傳記窮鳥入懐仁人所憫死士歸我當棄之乎伍員之託漁舟季布之託廣栁孔融之藏張儉孫嵩之匿趙岐以此得罪甘心瞑目顔氏家訓集蹈水火之求免於人也茍不至乎欲其死者則將狂奔盡氣濡手足焦毛髪救之而不辭也韓文吐飯飽之解衣煖之牧之推輓史或輓之或推之欲無入得乎出左㐮田勝為周陽侯徧見湯貴人季布名所以益聞者曹丘揚之也使孔子名布揚於天下者皆子貢先後之也史記欲相扳援死而後已西漢相與抗衡杜周傳鄭當時推轂士類及官屬常引以為賢於己本傳借譽于左右鄒陽傳㳺揚足下名於天下季布傳張華性好人物至於窮賤候門之士有一介之善者咨嗟稱詠為之延譽晋士子聲名未立應共奨成無惜齒牙餘論南史謝朓傳傳記士非玉石談者為價物理論集名聲荷朋友韓集青㝠送吹嘘詩故人相攜直上太階吕溫贊吹噓期指掌元㣲之本朝乗雪洒潤秉律嘘枯臨川軫恤經勞來還定安集之至于矜寡無不得其所詩序老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養記隠惻矜恤于物謂之仁禮史昔闔廬在國天有菑癘親廵矜寡而共其乏困左民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣穀梁范雎見須賈賈曰范叔一寒如此哉乃取其一綈袍以賜之史記蓋寛饒為衛尉司馬躬按行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚恩西漢集以俸錢𦵏枯而恩浹以家飲救渇而澤周萼合兄弟之析居者而民以養麕復老弱之流庸者而疆以實皇甫湜齊王不忍觳觫牛簡子亦放邯鄲鳩栁詩視人之瘼如熛疽在身不忘决去劉賔客其心如肺石動必逹窮民白侍郎長安有貧者為瑞不宜多羅隠集本朝我哀籃中蛤閉口䕶殘汁又哀網中魚開口吐微濕坡詩覆蓋子孔子將行雨而無蓋門人曰商也有之子曰商之為人也甚短於財吾聞與人交推其長者諱其短者故能乆也家語史人之有牆以蔽惡也左曹參見人有過掩匿覆蓋之陳遵入公府日出醉歸曹事數廢西曹請斥之司徒馬宫重遵謂西曹曰此人大度士奈何以小失責之黄霸為潁川守許丞老病聾督郵白欲去之霸曰許丞雖老尚能起拜送迎重聽何傷且善助之毋失賢者意並西漢未敢誦言誅之髙後紀古者大臣有坐不㢘而廢者不謂不㢘曰簠簋不飾坐汙穢淫亂男女亡别者不曰汙穢而曰帷簿不脩坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以謼之也尚遷就而為之諱故其在大譴大呵之域者聞譴呵則白冠㲠纓盤水加劍造請室而請辜矣西漢禇彦回有門生盗其衣彦回遇之謂曰可宻藏之勿使人見此門生慙而去宋書王僧祐父袁時人為之語曰王袁如屏風屈曲能蔽風露齊書王曰朕好與人較量理致崔祐甫性褊躁朕難之則應對失次朕常知其短而䕶之唐紀初李景畧嘗宴僚佐行酒者誤以醯進判官京兆任迪簡以景畧性嚴恐行酒者獲罪强飲之唐順紀傳記牛竒章公帥維揚杜牧在幕中夜㣲服逸遊後牧以拾遺召公以縱逸為戒牧始隠公取一篋皆街子輩服帖云杜書記平書芝白録集仲尼不假蓋於子夏䕶其短也嵇叔夜本朝韓魏公與歐陽永叔相親最深公知永叔不以繫辭為出孔子書又多不以文中子為可取中書相㑹累年未嘗與之言及也又韓魏公為丞相毎見文字有攻人隠惡者必手自封之未嘗使人見並筆談傾蓋子程子返自郯遭孔子于塗傾蓋而顧相語終日甚相親也子華子史吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉左孔子過鄭與子産如兄弟史鄭世家傾蓋如故鄒陽傳周瑜過魯肅求糧肅指一囷與瑜遂相親結定僑札之分吳志一見如舊𤣥齡傳傳記傾蓋如故劉向新序黄憲常逢一童容貌非常憲怪而問之是魯國孔融時年十嵗餘憲下執融手載歸舍與融談知其不凡便結為兄弟因升堂見親㑹稽録集傾蓋雖終朝大分邁疇昔盧子諒詩生平未識一見而交道遂存此日披懐千載之風期對坐陳子昂集相識雖新有故情白樂天欲迎先倒屣並坐便傾樽劉賔客本朝風期一相許意氣曽誰讓歐陽文顧盼子列子學乗風之道三年之後心不敢念是非口不敢言利害始得光商一盼而已列子集顧盼増其倍價剪拂使其長鳴昔歐冶改視鈆刀易價伯樂所盼駑馬百倍並文選唾為恩猥以庇賤之姿謬奉清通之盼駱賔王集一顧輕千金李太白一顧生鴟羽孟東野三都時覺重一顧世稱妍元㣲之風光一擡舉猶得暫時看同上提㧞經㧞茅茹以其彚征吉易儒有内稱不辟親外舉不辟怨推賢而進達之不望其報記趙文子所舉於晉國管庫之士七十有餘家同上子趙武薦白屋之士六十餘家韓子史楚子西曰勝如卵余翼而長之君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類絳縣人七十有三年矣趙孟曰不能用吾子使吾子辱在泥塗乆矣遂仕之並左仲尼聞魏子之舉也曰近不失親魏戊逺不失舉可謂義矣左傳韓安國貪嗜於財所推舉皆㢘士賢於己者也於梁舉壺遂臧固皆天下名士薦天下賢俊鄭當時推轂士類及官屬常引以為賢於己本傳楊興說史髙曰匡衡才智有餘經學絶倫但以其無階朝廷故隨牒在逺方將軍誠召置幕府與參事議觀其所有貢之朝廷必為國器匡衡傳稠人廣衆薦寵下輩士亦以此多之灌夫傳何武為人仁厚好進士奨稱人之善為楚内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此兩人顯於世者何侯力也田蚡進名士家居者本傳河南尹羊陟謁造趙壹言談至曛夕極歡而執其手曰良璞不剖必有泣血以相明者矣陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采東漢第五倫舉人多至二千石本傳胡廣所辟命皆天下名士本傳光武任使諸將多訪於鄧禹毎有所舉皆當其才鄧禹傳陳寔出於單㣲鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得人西門亭長陳寔可寔聞之曰鍾君似不察人何獨識我太守遂以寔為功曹漢紀孔融上疏曰惟嶽降神異人並出竊見平原處士禰衡年二十四字正平淑質貞亮英才卓躒初渉藝文升堂覩奥目所一見輒誦於口耳所蹔聞不忘於心性與道合思若有神𢎞羊潛計安世黙識以衡凖之誠不足怪忠果正直志懐霜雪見善若驚疾惡若讎任座抗行史魚勵節殆無以過也鷙鳥累百不如一鶚使衡立朝必有可觀飛辯騁辭溢氣坌涌觧疑釋結臨敵有餘昔賈誼求試屬國詭繫單于終軍欲以長纓牽致勁越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫㣲垂光虹蜺足以昭近署之多士増四門之穆穆鈞天廣樂必有竒麗之觀帝室皇居必蓄非常之寳若衡等輩不可多得激楚揚阿至妙之容掌技者之所貪飛兎騕褭絶足犇放良樂之所急臣等區區敢不以聞禰衡傳吕蒙至都權問誰可代卿者蒙曰陸遜意思深長才堪負重乃召遜拜偏將軍右部督以代蒙漢獻帝諸葛誕曰今善人單少茍其性不邪便可奨就吳志龎統曰㧞十失五猶得其半蜀志荀令君之舉善不進不休魏志荀令君之所舉皆命世之大才謝脁好奨與人才曰士子聲名未立宜共奨成無惜齒牙之餘論山濤為吏部甄㧞人物初克未仕時河内山簡嘗與瑯琊王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字㧞人石苞求為小縣許允曰卿我輩人當相引在朝並晉書劉穆之為丹陽尹凡所薦達不納不止宋書劉逖薦辛徳源曰弱齡好書晩節逾厲枕籍六經漁獵百氏北史海内賢才起自側陋外國逺方名士㧞而用之皆浩之由也同上金在礦何足貴善冶鍛而為器人乃寳之唐書魏中尉李彪家世孤㣲朝無親援李冲薦于魏主且為之延譽於朝公私汲引齊髙紀房𤣥齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰㣲公言㡬失之唐高紀㧞犀之角擢象之齒古人言㧞十失五猶得其半太后嘗問狄仁傑朕欲得一佳士用之誰可者仁傑曰文學醖藉則蘇味道李嶠固其選矣必欲取卓犖竒才則有荆州長史張柬之其人雖老宰相才也太后擢為洛州司馬數日又問仁傑對曰前薦柬之尚未用也太后曰已遷矣對曰臣所薦者可為宰相非司馬也狄仁傑嘗薦數十人卒為名臣或謂仁傑曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也李吉甫同平章事謂中書舍人張垍曰朝廷後進罕所接識君有精鑑願悉為我言之垍取筆疏三十人數日之間選用殆盡當時翕然稱吉甫為得人唐紀傳記驥躊躇於弊輂兮遇孫陽而得代楚辭集蓋聞繁弱登御然後髙墉之功顯孤竹在肆然後降神之曲成伏見處士廣陵戴淵心智足以妍幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之竒璞也陸機文蓋聞驪龍之珠必洗紫泉之裏垂天之翼必翔青㝠之表竊見處士吳國張道順下筆攄雕龍之文發言吐掞天之藻若得清水淬其鋒越砥斂其鍔必騰躍天路出覿聖世楊方文東都雖信多士朝取一人焉㧞其尤暮取一人焉㧞其尤好賢樂善孜孜以薦進良士為己任方今天下一人而已文章之尤者有侯喜侯雲長者有劉述古者其文長於為詩當今舉於禮部者無與為比有崔羣玉者其文進而未止者也為人賢而有才志剛而氣和凡此四人者皆可以當執事首薦有沈把張苰尉遲汾李紳張後餘李翊者或文或行皆出羣之才也凡此數子舉之足以收人望得才實誠不忍竒寳横棄道側並韓文翼靈鳳於蒼梧起滯龍於潢汙晋賢者之處猶金玉生於沙礫豫章産乎幽谷下不進之於上則無由而至矣鍾子但是粃糠㣲細物等閒擡舉到青雲羅隠詩首光比舉子昻集薦長光價同上聴清聲於㸑餘枯桐發響收夜光於𤣥璧怪石騰輝駱賔王豫章生宇下毎使翳蓬蒿劉長卿汲引之惠如帆得風李習之故人相攜直上太階吕和叔贊杜如晦生其羽翼長其光價唐文粹春膏時蒸朽葉自滋同上王子師為豫州未下車即辟荀慈明既下車又辟孔文舉山濤為冀州甄㧞三十餘或為侍中尚書李白書網羅遺賢推轂羣英玉不韜輝蘭無沈馨飛鴻出㝠振鷺在庭吕溫文長得蕭何為國相自西流水盡朝宗王建集假以羽翼俾之騫翥栁文澤潤窮鱗雷使幽蟄吕和叔文本朝斟酌元氣洪纎溥被其仁彫刻衆形妍惡曲成其彚臨川集當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢才當公居相府時范仲淹韓琦富弼皆進用至於臺閣一時之賢晏殊譬之象犀珠玉雖無補於飢寒要不可使在泥塗中東坡文奨予後進子竊竊焉欲爼豆予於賢人之間荘子史郭泰好奨訓士類或出於屠沽卒伍因泰奨進成名者甚衆漢桓紀荀淑㧞李昭於小吏友叔度於幼童魏志許靖年踰七十愛樂人物納誘後進蜀志陸玩為公輔性通雅不以名位格物誘納後進謙若布衣由是縉紳之徒莫不䕃其徳宇唐書成就後進士徃徃知名韓愈傳陸餘慶於寒品晩進必悉力薦籍唐書宋范泰愛奨後生孜孜無倦南史集單門後進必加善誘任彦升序自代史上問丙吉誰可自代曰杜延年于定國陳萬年後居位皆稱職西漢吕蒙至都權問誰可代卿者蒙對曰陸遜意思深長才堪負重乃召遜拜偏將軍右部督以代蒙漢獻帝紀陳寔出於單㣲鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得其人西門亭長陳寔聞之曰鍾君似不察人不知何獨識我太守以寔為功曹漢質紀皇甫規為度遼將軍到營數月上書薦奐自代曰奐才畧兼優宜任元帥以從衆望朝廷從之以奐代規漢桓帝紀吕蒙病篤吳王問曰卿如不起誰可代者蒙對曰朱然吳王假然節鎮江陵魏明帝紀周瑜病困上疏曰魯肅智畧足任乞以代瑜吳志盧毓遷吏部尚書詔使毓自選代曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝用邕焉魏志羊祜病篤舉杜預自代晋世祖紀集時名年輩俱在臣前擢以代臣必允衆望韓文所兾虞丘無蔽賢之咎臧孫無竊位之譏一品集録用經蔡仲克庸祗徳周公以為卿士書史不可使共叔無後于鄭左荘子文無後何以勸善宣成季之勲宣孟之忠而無後為善者懼矣成齊立敬仲之曽孫鄭良敬仲也襄臼季使過冀見冀缺耨其妻饁之敬相待如賓與歸言諸文公公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也文公以為下軍大夫左傳臼季見冀缺耨以告文曰其父有罪可乎臼季曰國之良也减其前惡公見之使為下軍大夫國語復紹蕭何陳平之世增修曹參周勃之属前漢功臣表帝閲録故事得楊賜與劉陶所上張角奏乃封賜為臨晉侯陶為中陵郷侯漢紀楚王立孫叔敖之孫封寢丘史記楚宗孫叔顯封厥子岑彭既没爵及支庶魏志楚子思子文之治復命其𦙍漢室嘉江公之徳用顯其世三國志嵇紹以父得罪靖居私門山濤謂武帝曰父子罪不相及嵇紹賢侔郤缺請為秘書郎帝曰如卿所言乃堪為丞何但郎也乃起家為丞晋書韋嗣立薦廣武令岑羲曰但恨其伯父長倩為累太后曰茍或有才此何所累中宗英衛擢罪亡之餘李靖贊集盛徳之𦙍世業可懐欒郤之家前徽未逺沈休文不欲使勲勞之後栖栖於塵土中白樂天罪射鉤之賊而任其才釋斬袪之怨以免於難此桓文所以𢎞霸功也張九齡本朝魏室旌賢特訪康成之後晏公類要擠陷經驅而納諸罟擭陷穽之中庸子如登髙而去其梯孫子楚㑹諸侯魯趙皆獻酒於楚王楚王酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯郸淮南史排擠英俊杜欽傳或忮害好陷人於罪匡衡傳為之機陷晁錯傳媒蘖其短李陵傳相與排擯主父偃傳賈后以帝命賜太子酒三升使盡飲之后使黄門侍郎潘岳作草書令小婢承福以紙筆及草因太子醉稱詔使書之太子醉迷不覺遂依而寫之其字半不成后補成之以呈帝晉惠帝紀監察御史周子諒彈牛仙客上怒㩧於殿庭李林甫言子諒張九齡所薦貶九齡荆州長史唐𤣥宗紀或告第五琦受人金二百兩遣御史劉期光追按之琦曰位宰相二百金不可挈若付受有慿請凖律科罪期光即奏琦已服罪肅宗紀上初疎斥宦官親任朝士而張渉以儒學入侍薛邕以文雅登朝繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我亂天下豈非欺罔耶於是上心始疑不知所倚仗矣唐徳宗紀反擠之又下石焉韓文集痛無知之相陷吕溫田鹿賦嫁禍史楚殺伍奢其子員如吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭秦王年少太后時竊私通吕不韋吕不韋恐覺禍及己乃私求嫪毐嫪力髙反毐於改反詐令人以腐罪告之不韋隂謂太后曰詐腐則得給事中后乃隂賜主腐者詐論之遂侍太后私與通不韋傳趙豹曰韓氏所以不入秦者欲嫁其禍於趙也趙世家七國反錯欲令上自將兵而身居守漢景帝紀公孫敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得族陵家武帝紀快讐史楚殺子玉公喜而後可知也曰莫余毒也已左宣公王甫父子應時馘截路人士女莫不稱善若除父母之讐靈帝吕布刺董卓百姓歌舞於道長安中士女賣其珠玉衣装市酒肉相慶者填滿街肆守尸吏為大炷置卓臍中燃之光明達曙如是積日獻帝紀吐突承璀首唱用兵疲弊天下上罷承璀中尉降為軍器使中外相賀徳宗紀裴延齡卒中外相賀同上來俊臣棄市時人無不快俊臣讎家争噉俊臣之肉斯須而盡抉眼剥面披腹出心騰踏成泥士民皆相賀於路曰自今眠者始帖席矣武后紀貶皇甫鏄為崖州刺史市井皆相賀穆宗紀本朝鄭向知杭州王耿為㳺漕互有論列而耿死鄭徃哭之甚哀或曰龍圖素惡端公今何慟哭也范極曰龍圖待哭斯人乆矣倦㳺録樂禍史王子頽享五大夫樂及徧舞鄭伯曰王子頽歌舞不倦樂禍也左荘公鄭慶曰幸災不仁幸災民所棄也左僖王宏素與司𨽻校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰胡种樂人之禍禍將及之王允傳好乗人之弊周伯仁傳董養見王彌謂之曰君好亂樂禍若天下有事不作士大夫矣晋世祖紀用情經有酒湑我無酒酤我雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無徳與女式歌且舞醉言舞于胥樂兮諸父兄弟備言燕私詩黨無容觴酒豆肉自吾母而不用吾情吾惡乎用吾情記殺雞為黍而食之居不容並語史子之事父焉得不盡其情傅奕𫝊謝安嘗詣陸納納殊無供辦所設惟茶菓而已晋書集斗酒相娛樂選古詩銜盃酒接慇懃之歡司馬遷書禮有所尚隻雞不薄意有所將生芻為貴九齡文輸㵼藴積劉賔客握手出肺肝相示草草具盤饌不持酒獻酬韓集約窮歡於一晝雖掾俸之酸寒要㧞貧而為富韓祭栁州文情意既深庶乎無間父子直徃直來曲江集本朝司馬温公在洛為真率㑹有約酒不過五行食不過五味惟菜無限言行録坦率見真情東坡集相從盃酒形骸外笑殺平生醉夢間同上他日過飯隨家風買魚貫栁雞着籠山谷集真率經有直情而徑行者記子直語無藻飾抱朴子史衛綰忠實無他腸西漢晉文帝毎言王述才既不長直以真率便敵人耳晋書集主人一心好四面無藩籬元稹集内外都無隔帷幈不復張元㣲之蹊徑絶縈紆同上不設塹壘杜牧之司馬温公在洛為真率㑹有約酒不過五行食不過五味唯菜無限言行録期待經後生可畏焉知來者之不如今也語子子曰義也清而荘姚義靖也惠而㫁李靖威也和而博竇威收也曠而肅薛收瓊也明而毅賈瓊淹也誠而厲杜淹𤣥齡志而宻房喬徴也直而遂魏徴大雅深而𢎞温大雅叔達簡而正陳叔達若逢其時不減卿相天地篇史吕不韋曰吾門待子門而大本傳張負曰固有美如陳平長貧者乎卒與女陳平傳長卿雖貧其人材足依也相如傳初何武為郡吏時事太守何夀夀知武有宰相器故厚之西漢賈復少事李生生竒之曰賈君容貎志氣如此而勤於學將相之器也後漢本傳王允仕州郡郭林宗見而竒之曰一日千里王佐才也遂與之友同上馬援兄况謂援曰汝大才當晩成馬援傳吕䖍遷徐州刺史請王祥為别駕民事一以委之初䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰茍非其人刀或為害卿有公輔之量故以相與蔡邕倒屐迎王粲曰此王公孫有異才並魏志吕蒙曰士别三日則刮目相待吳志庾亮謂諸葛恢曰明府當作黒頭三公晋書王導少有識量陳㽜高士張公見而竒之謂其兄敦曰此兒容貎志氣將相之器也晋王導傳何充嘗詣王導導以麈尾指牀呼充共坐曰此是君座也及導薨充參録尚書事何充傳王珣與謝𤣥為桓溫掾温嘗謂之曰謝掾年四十必擁旄杖節王掾當作黒頭公晋書劉裕謂義隆曰王曇首沈毅有器度宰相才也晉帝紀王儉幼篤學王粲見之曰栝栢豫章雖小已有棟梁氣矣終當任人家國事徐勉好學宗人徐孝嗣見之曰此謂人中麒麟必能致千里並南史徐陵年數嵗家人攜以候沙門寳誌寳誌摩其頂曰天上石麒麟也南史髙孝基見房𤣥齡曰僕觀人多矣未有如此郎當為國器但恨不見其聳壑昂霄云唐書崔宏見髙允曰髙子黄中内潤文明外照必為一代偉器本傳楊素引封倫為土木監毎與論宰相之事終日忘倦因撫其床曰封郎必當據吾此座稱薦於文帝隋書集利觜長距終得擅場東京賦圖南未可料變化有鵾鵬君有長才不貧賤杜詩豈是池中物由來席上珍同上勉君振羽翰蚤取凌青㝠劉賔客集寄之垂天翼早朝起滄溟亦當蒲其輪鶴其書矣並同上足下年尚强嗣徳有繼將大書特書不一書而已韓退之答元稹書知君志不小一舉凌鴻鵠劉長卿幽姿閒自適逸翮當一逞如有長風吹青雲在俄頃同上禁林聞得長棲鳯池水那能乆滯龍元㣲之集落落精神終有立飄飄才思杳無窮杜牧之蛟龍可是池中物鳯鳥無非閣上音張函吉文混溪既琢必見山川之精樹羽已懸行嗣雲韶之響駱賓王期君蟠桃枝千嵗終一甞東坡集傳記杜如晦少聰悟髙孝基深器重之曰公有應變之才為棟梁之用丁重能閲人觀于琮謂路巖曰于侍郎如百斛重器尚空其半安使不益於禄位哉並世説從兹穏上青雲去萬里誰能測羽翰玉壺清話淺量子孔子厄於陳蔡七日不食顔囘仲由炊之有埃墨墮飯中顔囘取而食之子貢見之不恱以為竊食也家語公孫丑曰夫子當路於齊管仲晏子之功可復許乎孟子去齊充虞路問曰夫子若有不豫色然孟子用管窺天用錐指地荘子立尺度以度天直寸指以測淵孔叢子以指測河荀子指測海指極則謂水盡猶目察百歩而云見極也抱朴史趙平原君以千金為魯連夀仲連傳張儀嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行此必盗相君之璧共執掠笞數百本傳趙人方與公謂御史大夫周昌曰君之吏趙堯年雖少竒士君必異之是乃代君之位昌笑曰堯年少刀筆吏耳何至是乎堯後為御史大夫西漢周昌傳以蠡測海方朔傳應龍潛於潢汙魚黿媟之不覩其能奮靈徳合風雲超忽而躋顥蒼也和氏之璧韜於荆石隋侯之珠藏於蜯蛤歴莫旴不知其將含景耀吐精英曠千嵗而流光也並班固傳楚龍且曰韓信無兼人之勇不足畏也為人易與耳本傳王叡與長沙太守孫堅共擊零桂賊以堅武官言頗輕之獻帝紀陸玩有徳望遷侍中有詣之者索酒㵼梁柱之間呪曰當今乏才以爾為柱石莫傾人梁棟耶晋書秦王興令羣臣舉賢梁喜曰未得其人可謂世之乏才興曰卿自識㧞不明豈得逺誣四海乎安帝紀太宗令封徳彛舉賢乆無所舉上詰之對曰非不盡心但于今未有奇才耳上曰君子用人如器各取所長正患己不能知安可誣一世之人唐太宗紀傳記以小人之慮度君子之心世説集翫其磧礫而不窺玉淵者未知驪珠之所蟠也左太冲吳都賦籠雞與梁燕不信有冥鴻白樂天淮隂市井笑韓信李太白本朝以孟軻之聖而弟子所願止於管仲晏嬰臨川妄議經子曰事君盡禮人以為諂也陽貨曰懷其寳而迷其邦可謂仁乎好從事而亟失時可謂智乎叔孫武叔語大夫於朝曰子貢賢於仲尼㣲生畝謂孔子曰丘何為是栖栖者與無乃為佞乎子禽謂子貢曰子為恭也仲尼豈賢於子乎並論語非聖人者無法孝經子陳臻問曰前日於齊王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳賈曰周公使管叔監殷管叔以殷叛知而使之是不仁也不知而使之是不智也仁智周公未之盡也屋廬子曰夫子之任見季子之齊不見儲子為其為相與魯平公將見孟子臧倉曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後䘮踰前䘮君無見焉人有言伊尹以割烹要湯或謂孔子於衛主癰疽於齊主侍人瘠環萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也並孟子鵬徙九萬里鳩與鸒鳩笑之曰我决起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而下翺翔蓬蒿之間此亦飛之至也而彼且奚適也荘子小辯而毁大道孔叢子人各是其所是非其所非將誰使正之妄譽仁之賊妄毁義之賊揚子俗人未嘗見龍麟鸞鳯乃謂天下無有此物以為古人虛設瑞應抱朴子史鄭子産作丘賦鄭人謗之曰已為蠆尾昭四年季康子將召仲尼公之魚曰昔吾先君用之不終為諸侯笑今又用之不能終是再為諸侯笑必召冉求孔子世家孔子適鄭鄭人或曰纍纍若䘮家之狗子貢以告孔子曰形狀末也而似䘮家之狗然哉史記世家莊子作漁父盗跖胠篋以詆訾孔子之徒本傳拜陳平為都尉使為參乗䕶軍諸將盡讙曰大王一日得楚之亡卒未知其髙下而即與同載反使監䕶長者髙帝紀龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之䇿受辱於跨下無兼人之勇不足畏也同上大抵詆訾聖人即為怪迂揚雄傳安其所習毁所不見藝文志姍笑三代諸侯王表絳灌曰平雖美丈夫如冠玉耳其中未必有也陳平傳孔子大聖不免武叔之毁子路至賢猶有伯寮之愬東漢庸可以水旱而累堯湯乎蔡邕傳今之少年喜謗前輩孔融傳好議論人長短妄是非攻發馬援傳俗論皆言處士純盗虛聲武帝下令曰昔直不疑無兄世人謂之盗嫂第五倫三娶孤女世人謂之撾婦翁王鳳擅權谷永比之申伯王商忠臣張匡謂之左道此皆以白為黑欺天㒺君者也魏志桓冲曰謝安石有廟堂之量不嫺將畧今大敵垂至方逰談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左袵矣孝武紀史思明曰李光弼長于慿城今出在野此成擒矣唐紀集街談巷議西京賦稱堯見囚小儒之虛誕為禹所放曲士之穿鑿虞帝碑是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也老子之小仁義非毀之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也韓文人生未鵾化物議如鴻毛劉長卿醯雞之議大鵬夏蟲之議層氷文粹本朝無異於鼓井淖而議東海坐蚊睫而笑九萬之圖南也汪民表心説尊禮經作賔于王家書貴貴為其近于君也記尊長于己踰等不敢問其年大夫七十而致事若不得謝必賜之几杖乘安車國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾羣居五人則長者必異席謀於長者必操几杖以從之並禮子齊管夷吾任國政號曰仲父枉千乘於陋巷列子史宋先代之後也於周為客天子有事膰焉有喪拜焉左傳魯荘公使束縛管仲以予齊使齊使受而退比至三釁以香塗者三浴之桓公親逆之於郊國語周文王得吕望於磻溪武王以為師謂之太公號曰尚父項羽尊敬范增為亞父史記魏公子無忌仁而下士魏有隠士曰侯嬴公子從車騎虛左自迎侯生侯生攝敝衣冠直上載上坐不譲公子執轡愈恭周紀大將軍青侍中上踞厠視之丞相𢎞晏見上或時不冠至如見黯不冠不見上嘗坐武帳黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此汲黯傳曹參為齊相聞膠東有蓋公善治黄老言厚幣請之參於是避正堂舍蓋公焉本傳擁篲而先驅暴勝之望見雋不疑容貌尊嚴勝之躧履起迎並西漢大將軍袁紹總兵冀州遣使要鄭𤣥大㑹賔客𤣥最後至乃延升上座東漢傳孔融深敬於鄭𤣥倒屣造門告髙宻縣為𤣥特立一鄉曰昔齊置善鄉越有君子軍皆異賢之意也今鄭君鄉宜曰鄭君鄉後漢興席改容吳張昭吳中謂之仲父吳志傳徐庶曰此人可就見不可屈致也備由是詣亮凡三徃乃見漢獻紀萬章為京兆尹門下督從至殿中諸侯貴孫䇿擊豫章先遣虞翻詣華歆歆葛巾迎䇿謂歆府君徳望逺近所歸䇿年幼稚宜修子弟之禮便向歆拜胡冲吳書孫䇿曰昔管子相齊一則仲父二則仲父而桓公為霸者宗吳書許靖年踰七十愛樂人物納誘後進清談不倦丞相諸葛亮皆為之拜蜀志晉王導任丞相元帝委之為好日隆朝野傾心號為仲父郭奕為野王令羊祜嘗過之奕歎曰羊叔子去人逺矣遂送祜出界數百里坐此免官並晉書虞翻在吳魏文帝嘗為翻設虛坐吳志唐郭子儀徳宗時賜號尚父代宗不名呼為大臣唐書魏徴曰人言陛下欲幸南山外皆嚴装已畢而竟不行何也上笑曰初實有此心畏卿輩故中輟耳上嘗得佳鷂以徴坐乆竟死懐中唐太宗紀太后信重内使梁文惠公狄仁傑羣臣莫及常謂之國老而不名曰毎見公拜朕亦身痛武后紀𤣥宗尊遇姚崇毎見便殿必為之興去輙臨軒以送它相莫如也唐書龎徳公素有重名諸葛亮毎至其家獨拜牀下三國志王維名盛於開元間豪貴人虛左以迎唐書帝如曲阜謁孔子祠帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓禁孔林樵采訪孔子顔淵之後以為曲阜令及主簿周太祖紀樊宗師見劉义獨拜唐書傳記范逵既去陶侃追送不已且百里許世說集子夏處西河之上而文侯擁篲鄒子居黍谷之隂而昭王陪乗文選燕王尊樂毅分國願同歡子昂集朕屈韓愈為尹宜令無叅御史不得為故常韓愈神道碑李白所適二千石郊迎李白集本朝牀前時得拜龎公康節記纂淵海卷六十八
