body:
  text: 記纂淵海卷三十二宋潘自牧撰職官部祭酒經帝曰夔命汝典樂教胄子書史漢置博士至東京凡十四人而聰明有威重者一人為祭酒漢書晉咸寜四年立國子學置祭酒一人永嘉中又置儒林祭酒一人以杜夷為之當為訓範總統學中衆事晉書荀卿年五十始来學於齊襄王時最為老師三為祭酒焉史記南齊何𦙍為國子祭酒與太子中庶子王瑩並為侍中時𦙍輩作祭酒疑所服陸澄博古亦不能定遂以𤣥服臨試後羣議乃用朱衣自此始南史晉袁瓌為國子祭酒時喪亂之後禮教陵遲瓌上疏云請得給其宅地備其學徒帝從之國學之興自瓌始晉史傳記隋元善賜江楊縣公後遷國子祭酒時帝親臨􅇚奠命善講孝經於是敷陳義理兼之諷諫上大恱曰聞江楊之說更起朕心續通典唐賀徳仁少與從兄徳基俱為國子祭酒時人語曰學行可師賀徳基文質彬彬賀徳仁楊嶠為國子祭酒引尹知章范行恭趙𤣥黙為學官皆名儒冠並同上楊汪為國子祭酒帝令百僚就學與汪講論通儒碩論雖鋒起皆不能屈陳先生行狀集冠帶橋門路雍容俊士闗微言尊噩噩小道屏閒閒禮樂髙千古詩書到百蠻斯文知未冺璧水尚如環朱行中詩㡬度見詩詩總好及觀標格過於詩平生不㑹藏人善到處逢人說項斯楊祭酒詩聖恩若許留太學諸生講解得切磋韓愈本朝國子監有判監事有管勾監事侍制以上則為判餘為管勾㑹要熙寜初詔用經術取士廣闢黌舎分為三學增置生徒總二千八百人朝廷育才於斯為盛續㑹要及元豐中復正官名置國子監祭酒掌三學之教法政令同上楊龜山兼國子祭酒上喜曰老成無逾卿者言行錄馮元仁宗朝判國子監故事國子監必宿儒典領元與孫奭並命輿論大服東都亊略國子司業史唐陽城為司業直言得罪太學諸生何蕃季償等二百人頓首闕下請留城唐書孔頴達子志終志終子恵元三世司業時人美之並唐書張參為國子司業年老嘗手寫九經以為讀書不如寫書唐史韓愈為國子司業竇公墓誌云公誨於國學也嚴以得禮扶善遏過明上下之分以躬先之恂恂愷悌得師之道同上郭山暉累遷國子司業景龍中帝昵狎近臣及修文學士詔徧為伎餘臣各有所陳而暉乃誦鹿鳴蟋蟀篇未畢中書令李嶠以近規諷止之帝嘉其直下詔褒唐書凡六學生每歲有業成上於監者以其業與祭酒司業試之隋志傳記隋煬帝大業三年於國子監初置司業一人唐置二人從四品副貳祭酒通判監事龍朔二年改為少司成咸亨初復舊凡祭酒司業皆儒重之官非其人不居通典唐陽僑為國子司業好學喜勤善誘後生修講舎人以為善職分紀陽城引諸生告之曰學者所以學為忠孝也諸生有乆不省親者乎明日還養者二十輩有三年不歸侍者斥之簡孝秀徳行升堂上沈酗不率教者罷之生徒斤斤皆有法度通典集才難孰為吾君惜果漏寜容我輩先熟路長驅聊緩步百金一發不虛弦陳後山送詹司業詩命樂正之官輔司成之教往祇厥職母使陽城韓愈之流專美前世欒城徐盛喬制司業武公少儀於是總太學儒官三十有六人列燕於祭酒之堂韓文公聽琴序本朝元豐正名置司業掌三學之教法政令續㑹要初除朱服職略建炎三年省紹興十二年復置中興㑹要隆興併省司業不許與祭酒並除乾道七年欲除劉焞孝宗曰司業乃祭酒之貳並置何妨於是始並置孝宗㑹要師氏之位惟其能南豐擬制王大寶知袁州暇日尋理舊所著述得周易證義十卷毛詩國風證義六卷表進上謂宰相曰王大寶所進書深得經㫖其以國子司業兼崇政殿說書召賜五品服胡澹菴集監丞傳記隋置三人唐一人掌判監事凡六學生每歲有業成上於監者以其業與司業祭酒試之登第者白祭酒上於尚書禮部六典集設屬成均參釐政令庶事之務惟丞是司胡端平制靈臺崇崇兮洞膠轕以綿延中有珍木兮鬱森森以芊芊王履員賦學為教原丞為糾局生於學者表王化之大同植於㕔者知宦政之無曲樂我皇道彰我聖年依君仁義之圃對君翰墨之筵並同上本朝景祐二年孫祖徳請於直講京官内差一員充監丞詔學官兼領掌錢穀出納之事四朝志元豐定制置祭酒司業掌三學之教法政令而監之事則丞與焉續㑹要建炎三年省紹興十二年復置中興㑹要趙鼎先是國子監丞張戒上書幾八千言自謂恐聖意上謂宰執曰朕熟覽之其憂國愛君之心誠可嘉朕大開言路以防壅蔽自欲賞之趙鼎不答沈與求曰陛下如此何患不聞盡言言行錄博士史六國時有博士掌通古今後漢博士凡十四人叔孫通為博士初制漢禮漢書賈誼頗通諸書召為博士同上董仲舒為景帝時博士下帷講誦三年不窺園非禮不行漢紀漢賈誼年二十餘文帝召為博士年最少有詔議諸先生未能言誼盡為對人人各如其意所出諸生於是以為能文帝恱之超遷一歲至太中大夫漢書後漢朱浮以國學既興廣博士之選上書曰博士之官為天下宗師使孔聖之言傳而不絶本傳後魏崔逸為國子博士每公事逸常被詔獨進博士特命自逸始魏史唐李絳請崇國學上䟽曰博士有倚席之譏唐書傳記晉咸寜四年初置國子博士一人皆取履行清淳通明典義梁置五經博士各一人唐增置二人孔子之後孔忠生武及安國武生延年延年生霸安國延年皆為武帝博士霸亦昭帝末為博士霸生光成帝初舉為博士漢文帝時申公為詩最精以為博士申公為詩傳號曰魯詩京房受易梁人焦延夀房授東海殷喜河東姚平河南𢎞乗皆為郎由是易有京氏之學魯國先賢傳漢文帝時博士朝服𤣥端章甫冠通典唐盖文懿武徳初歴國子助教時髙祖引於秘書省學教授王公之子時文懿為博士文懿常開講發毛詩題公卿咸更相問難文懿發揚風雅甚得人之致敬唐大厯初禮部侍郎許善心舉徐文逺與包愷褚徽陸徳明魯達為學館遂擢文逺國子博士愷等並為太常博士皆一時之最唐書集諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭梁肉廣文先生飯不足先生有道出羲皇先生有才過屈宋徳尊一代常坎軻名垂萬古知何用先生蚤賦歸去来石田茅屋荒蒼苔儒術於我何有哉杜甫詩儒庠恣游息聖籍飽商確韓詩本朝國子監無博士有直講八人熙寜改為太學博士元豐定制亦無國子博士大觀元年薛昻乞置國子博士四員國子正錄各二員與太學官分掌教道從之建炎併國子監於禮部紹興三年詔駐蹕所在因國子監量養生徒置博士二員中興㑹要楊萬里詔為國子博士上疏乞留左司員外郎張栻除軍器少監韓玉上罷之由是名重朝廷言行錄太學博士史漢太學置五經課試之法置春秋穀梁博士漢官儀公孫𢎞對䇿時百餘人太常奏𢎞第居下天子擢為第一召見容貌甚麗拜為博士待詔金馬門光武起太學博士諸生横卷為海内所集桓榮拜博士車駕幸太學博士論難於前榮温恭藴藉以禮遜相厭不以詞長勝人並漢書王恭少篤學教授鄉閭弟子數百人貞觀初詔拜太學博士講二禮别為義證甚精博盖文懿文達當時大儒每講便舉先儒義必暢恭所說唐書樂祇黄初中徵拜博士十餘人文多偏僻不敢親教具員而已惟樂祇五業并授魏志唐鄭覃既以名儒故領祭酒請太學五經置博士祿秩比王府官唐書傳記東晉増置國子博士十六人謂之太學博士北齊國子寺有太學博士隋罷國子惟立太學置博士五人唐增置三人掌教六武五品以上郡縣公子孫六典馬光為太學博士嘗因釋奠髙祖親幸國子學王公以下畢集光升坐講禮諸儒生以次論難皆當時碩學光析剖凝滯論者咸服通志唐韓愈為四門博士作進學觧招諸生立館下誨之同上集才名十四年坐客寒無氊賴有蘇司業時時遺酒錢杜甫飄飄凌雲章强禦莫能懾辟雍海環流用汝作舟楫開胷出妙義可發蒙起魘詞如太阿鋒誰敢觸其鋏王荆公半生湖海㸔青山慣佩笭箵攬轡艱曉起初馳朱雀路霜嚴慙綴紫宸班百僚卑處瞻丹陛五色光中望玉顔浪說書名落人世非公那解徹天闗元章除書學博士初朝謁呈時宰詩仁義途中馳騁詩書府裏從容頭角驚殺蝦蟹學海波中老龍爪距逐出狐聖人門前大蟲推倒楊朱墨翟扶起仲尼周公杜黙本朝熙寜四年詔相度錫慶院建太學從鄭綰所請也元豐三年詔改國子監直講為太學博士職源秦觀元祐初蘇軾賢良方正薦於朝除太學博士東都事畧渟化三年楊徽之上言文士雖多而通經甚少精選五經博士各專業教胄子此風化之本也慶厯五年上幸國子監命直講孫明復講易乾卦言王者當法乾元以攬威福漢元帝優游不斷失乾剛之道也上善之賜五品服國史國子正傳記北齊國子寺有正錄員隋一人唐因之六典集禁掖人知連狀薦國庠官滿一家貧清儀都道蓬瀛客直氣堪為諫諍臣釋無可贈敬睦助教本朝國初闕大觀元年薛昻乞置國子博士國子正録與太學官分掌教導從之自是始置正錄凡二貟學正掌行學規凡諸生之戾規者待以五等之罸學錄掌佐學正糾不如䂓者續㑹要建炎三年國子監並歸禮部官省紹興十三年詔置國子監正錄各一貟隆興元年復置二貟中興㑹要太學正傳記北齊國子寺有錄事貟隋一人唐因之六典集重登太學領儒流學海詞鋒壓九州王建上韓愈詩本朝仁宗朝胡瑗掌太學其正錄第補諸生熙寜末興三舍始選官為正録如學官之制職畧凡有職于成均皆士之秀欒城除游酢制國子監簿傳記北齊國子寺置主簿隋一人唐因之掌印勾檢監事凡六學生有不率師教者則舉而免之六典集忽領簿書游太學時楊書為國子主簿也劉賓客列廣成均典司簿最除徐永制本朝國子監主簿一人以京官或選人充掌文簿或勾考其出入焉兩朝志元豐元年詔省主簿三年罷書庫官後置主簿續㑹要郭忠恕太宗聞其名詔為國子監主簿令刋定字書東都亊略韓維仁宗患縉紳奔競諭近臣曰恬退者旌擢則躁進者自知恥文彦博等言公好學嗜古安於静退乞甄錄以厚風俗除國子監主簿言行錄國子書庫官本朝淳化五年判國子學李至言監中印書亦主掌錢物凡有公文其所屬止以印書錢物所名稍為近俗今乞改國子監書庫官從之太宗實錄書庫官以京朝官充掌印經史羣書以備朝索賜予之用及出鬻而收其直以上於官元豐三年省續㑹要建炎三年並國子監歸禮部管紹興十三年詔復置一貟三十一年减罷㑹要隆興元年詔主簿兼書庫乾道七年復置一貟孝宗㑹要記纂淵海卷三十二
