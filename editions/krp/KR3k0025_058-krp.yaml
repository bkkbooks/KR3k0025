body:
  text: 記纂淵海卷五十八宋潘自牧撰論議部因事思人經君子聽鍾聲則思武臣聽磬聲則思死封疆之臣聽琴瑟之聲則思志義之臣聽竽笙簫管之聲則思蓄聚之臣聽鼓鼙之聲則思將帥之臣記樂記史越子使后庸來聘且言邾田封于駘上盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰固將召之文子曰他日請念左哀二十七越敗呉遷呉王夫差於甬東予百家居之呉王曰孤老矣不能事君王也吾悔不用子胥之言自令䧟此史記呉世家家貧則思良妻國亂則思良相史魏世家上至廣武赦劉敬曰吾不用公言以困平城通鑑漢髙紀張敞免為庶人亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者詣公車天子引見敞拜為冀州刺史敞到部盜賊屏迹同上漢宣紀潁川盜賊羣起河東守兵亦叛京師騷動帝聞之言吾悔不用郭子横之言同上漢光武紀馬援南擊交趾從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣薫蒸仰視飛鳶跕跕堕水中卧念少游平生語何可得也後漢本傳漢王伐呉而敗時法正已卒亮歎曰孝直若在必能制主上東行就使東行必不傾危矣通鑑三國王獻之兄弟自郄超未亡見愔常躡履問訊甚脩舅甥之禮及超死見愔慢怠屐而候之愔每慨然曰使嘉賔不死鼠子敢爾耶晉書郄超傳愔超父也互入炎凉宋文帝曰檀道濟若在豈使胡馬至此通鑑宋紀呉已平羣臣上夀帝執爵流涕曰此羊太傅之功也同上晉武太康元年突厥圍鴈門煬帝歎曰向使長孫晟在不令匈奴至此隋書劉行本太子少庶子太子勇虛襟敬憚後卒及太子廢上曰劉行本在勇當不及於此元嵓為蜀王長史後王漸以非法得罪上曰元嵓若在吾兒豈有是乎同上張九齡奏安禄山有逆相請因罪戮之上放歸九齡既死上皇在蜀思九齡之先覺詔哀贈唐書征髙麗班師上以不能成功深悔之歎曰魏徵若在不使我有是行也命馳驛祀徵以少牢復立製碑召其妻子詣行在勞賜之通鑑唐太宗刑部郎中闕上曰朕得其人矣往者李道裕議張亮獄云反形未具此言當矣朕雖不從至今悔之遂以道裕為刑部郎中同上李沆先識丁謂之奸及謂用事排擠正人王旦嘆曰李文靖真聖人本傳傳記祭遵死後每朝㑹上常歎曰安得奉公憂國如祭征虜者東觀漢紀集霖雨思賢佐丹青憶老臣杜詩因詠霜雪句永懐鸞鶴姿白樂天徽績空存書旗常而播美音容不見聽鼙鼔以增思同上聞鼓鼙而憶名將鑒丹青而思老臣李文饒湘竹舊班思帝子江蘺初緑哀騷人劉長卿本朝韓魏公死士大夫歎曰天何不為我留歐陽公為魏公作誌文而後死也韓魏公别錄盧仝韓愈不在此彈壓百怪無雄文歐公集因難見人經萬夫之長可以觀政書咸有一德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不已詩風雨觀其器而知其工之巧觀其發而知其人之知記禮器嵗寒然後知松栢之後彫也語子罕子不容然後見君子家語互見不茍合及道大不容六親不和有孝慈國家昏亂有忠臣老子逺使之而知其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以酒而觀其量雜之以處而觀其色臨之以危而觀其節莊子養生不足以當大事惟送死可以當大事孟子離婁下窮觀其所為逹觀其所與列子貧則見亷富則見義生則見愛死則見哀尹鄧子脩身嵗不寒無以知松栢事不難無以知君子荀子大畧舟覆乃見善游馬奔乃見良御淮南子説訓林如鍾山之玉寒嶺之松比之瓀珉梓桞無殊也及其燒以爐炭三日而色潤不改處於積氷終嵗而枝葉不彫然後知其異於他玉衆木也列子史李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取史魏世家互見致察舉世混濁清士乃見史記伯夷傳肥義曰正臣難至而節見忠臣累至而行明同上趙世家淮隂黥布等皆已誅滅而何之勲爛焉蕭何世家天下昏濁忠臣乃見魏王豹傳狗盜雞鳴孟嘗君列此二人於賔客盡羞及有秦難卒此二人救之孟嘗君傳互入兼收並蓄已上並史記劇孟愽徒母死客送䘮千餘乗此亦有過人者西漢袁盎傳不遇盤根錯節何以别利器後漢虞詡傳王祥之薨奔赴者非朝廷之賢則親戚故吏而已門無雜吊之賔晉書本傳王湛曰直行平路何以别馬唯當於蟻封晉紀鄧粲傳唐李夷簡彈楊憑坐貶臨賀尉徐晦獨至藍田與别後夷簡薦晦為御史晦曰平生未嘗望公顔色公何從而取之夷簡曰君不負楊臨賀肯負國乎通鑑互見狥公忘私當一生一死間而後見其節唐元徳秀傳疾風知勁草板蕩識誠臣唐太宗賜蕭暢詩見本傳李世勣常侍宴上從容謂曰朕求羣臣可托孤者無以踰公公往不負李宻豈負朕㦲通鑑唐太宗馬文舉曰不遇勍敵何以顯壯士同上集寧知霜雪後獨見竹栢心江淹詩時危見臣節世亂識忠良選鮑明逺詩扶顛始知籌策長杜詩驛騷之際鯁亮彌彰劉賔客火後見琮璜霜餘識松栢同上士窮乃見節義韓文雨晦識雞鳴之信風髙見隼擊之威白樂天磨涅始彰其堅白杜牧之㣲風但覺杉香滿烈日方知竹氣寒吕和叔文不有百鍊火孰知寸金精孟東野互見是真難㓕破松見貞心裂竹㸔直文唐文粹天若無雪霜青松不如草地若無山川何人重平道唐于瀆詩衆木盡摇落始見竹色真孟東野詩互見事物相形本朝揮毫更想能一戰數窘乃見詩人才臨川集馬之在厩也駑驥雜處飲水食芻嘶鳴蹄齧求其所以異者蔑矣及其引重車取夷路不屢策不煩御一頓其轡而千里已至矣當是時駑馬並驅則雖傾輪絶勒敗筋傷骨不舎晝夜而追之遼乎其不可以及也臨川文得路方知異日心東坡詩萬木嵗寒配喬松於巨栢衆星夜艾凛明月於長庚東坡賀林待制啓互見事物相形火數四百炎靈消誰其代者當塗髙窮姦極酷不易取始知文景基局牢同上古硯歌欒布惟不廢彭越之命故髙祖知其賢李勣惟不利李宻之地故太宗許其義欒城集受人恩而不忍負者其為子必孝為臣必忠鳴道集不經大火燒孰得真黄金欒城集請觀風急天寒夜誰是當門定脚人邵堯夫詩因事長智經知不足然後能自反也知困然後能自强也記學記子孔子欲以顔狀取人也於㓕明改之矣欲以言辭取人也於宰我改之矣欲以容貎取人也於子張改之矣家語所以動心忍性增益其所不能人恒過然後能改困於心衡於慮而後作徵於色發於聲而後喻孟子告子下人之有德慧術智者恒存乎疢疾獨孤臣孽子其操心也危其慮患也深故逹孟子盡心下晉公子重耳霸心生於曹越王勾踐霸心生於㑹稽齊威公小白霸心生於莒荀子老子學商容見舌而知守柔矣列子學壺子觀景柱而知持後矣淮南子繆稱訓注先有形而後有影堯遭洪水而貴陸湯大旱而重水淮南子史齊髙疆曰三折肱知為良醫左定十三互見履而後知髙宗遭鳴雉之戒飭已正道享百年之夀西漢杜欽傳木不生庭太戊無以隆雉不鳴鼎武丁不為宗晉書郭璞傳集九折臂而成醫楚辭三折乃良醫劉賔客因人而重經蔽芾甘棠勿翦勿伐召伯所茇詩甘棠子無仲尼則西山之餓夫與東國之絀臣惡乎聞揚子連城之璧瘞影荆山夜光之珠潜輝欝浦玉無翼而飛珠無脛而行揚聲於章華之臺炫耀於綺羅之堂者盖人為之舉也列子栁下恵不遇仲尼則貞潔之行不顯未免於三黜之臣季布不遇曹丘則百金之諾不揚未離於凡虜之人同上史伯夷叔齊雖賢得夫子而名益彰閭巷之人欲砥行立名者非附青雲之士烏能施於後世哉史記伯夷傳毛先生遂一至楚使趙重於九鼎大吕同上平原傳庾乗游學宫為諸生傭後能講誦自以卑第每處下坐諸生愽士皆就讐問之由是學中以下坐為貴後漢本傳河南尹羊陟謁造趙壹言談至曛夕極歡陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采同上趙壹傳阮籍見張華鷦鷯賦曰王佐才也由是聲名始著晉書左思作三都賦成人未之重思以示張華深稱賛之兼作序豪貴競冩都下為之紙貴晉書許詢移居臯屯之嵓常與沙門支遁及謝安石王羲之等同遊往來今臯屯呼為許度嵓謝安有盛名時人愛慕有罷縣還安問其歸資荅曰有蒲葵扇五萬安乃取其中者握之士庶競市價增數倍晉書揚雄作太𤣥晩遭陸續𤣥道遂明王長文傳王導為司徒時帑藏空竭庫中惟有練數千端鬻之不售乃與朝賢俱制練布單衣於是士人翕然服之練遂涌貴主者出賣端直一金其為時所慕如此王羲之見一姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百金價姥如言人競買之已上晉書傳記人有市駿馬者三旦立市人莫之知伯樂一顧之一旦而馬價十倍戰國䇿郭林宗游洛陽始見河南尹李膺膺大竒之遂相友善於是名震京師郭林宗别傳慈亷江者昔有李祖仁居此兄弟十人並慈孝亷讓因此名江交州記梁顧總始為縣吏一夕遇二人稱是王粲徐幹云昔與公同舟公劉楨也乃誦其遺文總悟以遺文數萹投令令待之甚厚時謂死劉楨猶庇得生顧總太平廣記士非玉璧談者為價物理論互見求援白樂天以詩謁顧况因為延譽聲名大振幽閒鼔吹集昔歐冶改視鉛刀易價伯樂所盻駑馬百倍文選曹植表夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭藝文類聚載應璩薦和慮則牋一經品題便作佳士李白一顧之隆駘足逾於仙鹿片言之重魚目軼於靈蛇駱賔王一言之譽東陵侔於西山一面之榮鄭璞踰於周寳王彦升文集序互見感謝昔虞阪之上逸驥與駑駘俱疲呉竈之中孤桐共樵蘓並爨遇王良伯喈遂騰聲於千古此詩若不遇王君乃數十張故紙耳唐韋縚作孟浩然集序處州本王君名士源天寳中獲孟浩然文集士源為之序宋廣平之沉下僚蘓公味道為使者廣平投以梅花賦蘓盛稱之自是方列于聞達人之目由是知英賢犖犖可外文字猶用片言借説於先逹之口席其勢而後驤首當時矧碌碌者疇能自異劉賔客互見求援夫美不自美因人而彰蘭亭不遭右軍則清湍脩竹蕪沒於空山矣栁文本朝鵝毛贈千里所重以其人歐公峴山臨漢上望之隱然盖諸山之小者而其名特著於荆者豈非以其人哉其人謂誰羊祜叔子杜預元凱是也峴山亭記溫公營獨樂園在洛中諸園最為簡素人以公之故故春時必逰鳴道集互入生理門園池類黄叔度澹然無作郭林宗一言至今以為顔子叔度之賢無一見於外者而後世猶信徒以林宗之重東坡謝太保撰先人墓碣書因惡累美經今衆人之命儒也妄常以儒相詬病記儒行如有周公之才之美使驕且吝其餘不足觀也已語㤗伯子西子蒙不潔人皆掩鼻而過之孟子五榖者種之美者也茍為不熟不如荑稗同上告子下槃水正錯而勿動則湛濁在下清明在上足以見鬚眉而察理㣲風過之湛濁動乎下清明亂於上則不可以得大形之正也荀子蘭槐之根是為芷其漸之滫君子不近同上勸學萹注滫溺也水之性清所以濁者土渾之也林之情靜所以動者風摇之也人之心正所以邪者欲昡之也劉子河水欲清沙壤穢之淮南子史一薰一蕕十年尚猶有臭左傳莠盛苖穢何不鋤也西漢嚴延年傳忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如子政一離刀鋸沒世不齒東漢郭㤗傳涇以渭濁同上賈彪傳山有朽壤雖大必虧木有蠧蟲其榮易落唐史臣元宗贊集聫蕙芷以為佩兮過鮑肆而失香楚辭資髙明之質而未免卑濁之累選吊文青蠅一相㸃白璧遂成寃陳子昂集本朝君子小人如氷炭决不可以同器若兼收並用則小人必勝薰蕕雜處終必為臭東坡富鄭公神道碑性之有喜怒猶水之有波否曰湛然平靜如鏡者水之性也及過沙石或地勢不平便有湍激或風行其上便為波濤洶湧此豈水之性哉鳴道集因麤見精子故雖有珉之彫彫不若玉之章章荀子百星之明不如一月之光十牖畢開不如一户之明淮南子豹裘而雜不若狐裘而粹同上史趙良曰千羊之皮不如一狐之腋史記商君傳鷙鳥累百不如一鶚孔文舉薦禰衡表一見西漢鄒陽傳玉以礫貞東漢賈彪傳傳記張巨魚者垂其千鈎而得之在於一筌捕髙鳥者張其萬罝而獲之由一目史通集雀喧知鶴靜髙逹夫因精見麤經若苖之有莠若粟之有秕書仲虺之誥子飲玉􅏁則知漿荇之薄味抱朴子集虎豹之文炳於犬羊鸞鳯之音鏘於鳥鵲金玉之光炫於瓦石皇甫湜互見事物相形因術累已子矢人惟恐不傷人孟子史治獄之吏皆欲人死非憎人也自安之道在人之死通鑑漢宣紀互見其勢使然魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸磴書之比訖鬚髮盡白裁餘氣息還語子弟宜絶此法晉王獻之傳秦王苻生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無他疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之通鑑晉哀紀太宗與侍臣泛舟春苑苑池見異鳥容與波上悦之詔坐者賦詩而召閻立本侔狀閣外傳呼畫師立本是時已為主爵郎中俯伏池左研丹粉望坐者羞恨流汗歸戒其子曰吾少讀書文辭不减儕輩今獨以畫見名與厮役等若曹慎母習唐本傳本朝昔閻立本始以文學進身卒蒙畫師之耻東坡書呉道子畫後自相矛盾經于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟書互見無情子人有鬻矛楯者譽之曰吾楯之堅物莫能䧟也又譽其矛曰吾矛之利於物無不䧟也或曰以子之矛䧟子之楯何如其人弗能應也韓非子使人之子孫自賊其父母也荀子為人父而𣙜其子縱利如子何揚子斷根以續枝割背以禆腹抱朴子山生木反自刻木生蠧反自食人生事反自賊淮南子史楚昭王曰除腹心之疾而置諸股肱何益左傳昔髙辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討左傳助秦自攻史虞卿傳劉向受榖梁春秋其子歆乃大好左氏傳以左丘明好惡與聖人同親見夫子而公羊榖梁七十子後傳聞之與親見其詳畧不同歆數以難向向不能非間也前漢書李固曰刻割心腹以補四支東漢本傳魏曹冏曰猶芟刈股肱獨任胸臆觀者為之寒心通鑑三國志刖趾適履刻肌傷骨魏志借子之矛刺子之楯晉天文志唐髙祖謂侍臣曰刻民以奉君猶割肉以充腹腹飽而身斃通鑑唐紀傳記漢書孝成紀贊曰成帝善脩容儀升車正立不内顧臨朝淵嘿尊嚴若神可謂穆穆有天子之容貎矣又五行志曰成帝好㣲行選私奴客十餘人自稱富平侯或乗小車御者偕騎出入由斯而言則成帝㣲服嫚遊鳥集無度雖外飾威重内肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者也史通班固稱項羽弑義帝自取㓕亡又云于公髙門以待封嚴母掃地以待䘮如固斯言則深信夫天怨神怒福善禍滛者矣至於其賦幽通也復以天命久定非理所移故善惡無徵報施多爽斯則同理異說前後自相矛盾者焉同上集昆弟自相傾韋應物集肝膽反為賊文粹自相背馳經或錫之鞶帶終朝三禠之易其車既載乃棄爾輔詩子惡辱而居不仁是猶惡濕而居下也孟子互入明知故犯惡死亡而樂不仁是猶惡醉而强酒同上猶欲其入而閉之門也同上猶立枉木而求其影之直也荀子欲夀而刎頸同上伏而咶夭救經而引其足經縊也引其足愈急也愈務而愈逺同上欲㓕跡而走雪中淮南子譬如拯溺錘之以石救火投之以薪尹鄧子病熱而强之以餐救暍而飲之以寒救經而引其索拯溺而授之石欲救之反為惡淮南子説林訓披裘而扇淮南子史今有二命其誰不解體左猶治絲而棼之也左傳互見躁急首尾衡决西漢賈誼傳行危而求安造禍而求福史荆軻傳濁其源而求其清流前禮樂志是猶紲韓盧而責之獲也班固傳時成帝無嗣政由王氏劉向遂上封事極諫王氏與劉氏不並立如下有泰山之安則上有累卵之危向卒子歆王莽舉為侍中王莽持政留歆為右曹建平元年改名秀及王莽簒位歆為國師西漢本傳互入不克紹猶郤行而求及前人也楚元王傳欲湯之滄音愴悽愴之愴寒也一人炊之百人揚之無益也枚乗傳譬猶抱薪而救火同上狐白之裘而反衣之也匡衡傳互見愚暗前漢自吉至崇皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣天下服其亷而怪其奢前漢王吉傳陳琳曰掩目捕雀通鑑劉炫曰相期髙於周孔相待下於奴僕三國蜀志互見自相背馳郄愔遺桓溫牋欲共奬王室請督所部出河上愔子超為溫參軍取視寸寸毁裂乃更作愔牋自陳非將帥才不堪軍旅老弱乞閑地自養勸溫并領已所統通鑑晉海西公紀互見趨向不同將適越者指沙漠以遵途欲登山者渉舟航而覔路所趣逾逺所向轉難南北倍殊髙下相反求其至也不亦難乎晉武紀如室斯構而去其鑿契如水斯積而决其隄防如火斯蓄而離其薪燎也晉書于令升緫論崔浩性不好莊老之書每讀不過數十行輒棄之非毁佛法因欲脩服食養性術天師冦謙之有神中籙圖新經因師事之北史本傳張九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦勁然蕭軟美可喜方召蕭李泌在旁率爾曰公起布衣以直道至宰相而喜軟美者者乎唐書李泌傳伐根以求木茂塞源而欲流長同上魏徵傳迂訪道之車築禮神之舘棲心𤣥化物色幽人將致仙於大庭欲希蹤於姑射於是削浮圖之法懲游惰之民志欲矯歩丹梯求珠赤水徒見蕭衍姚興之謬學不悟秦皇漢武之非求盖惑於左道之言偏斥異方之説舊唐書武宗紀論武宗奮然除去浮圖之法而躬受道家之籙服藥以求長生新唐書本紀集絆良驥之足而責以千里之任檻猿猴之勢而望其巧捷之能呉季重書猶適于南而北轅其到也無日矣唐文粹北轅適楚圓鑿方枘北轅適楚南轅適晉猶航斷港絶潢以望至於海也唐文粹疑似相亂經若苖之有莠若粟之有秕書仲虺之誥互入因精見麄惡徼以為智者惡不孫以為勇者惡訐以為直者論語夫樂者與音相近而不同記樂記子惡似而非者惡莠恐其亂苖也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也孟盡心若初真得鹿妄謂之夣真夣得鹿妄謂之實列子懦弱易奪似仁而非悍戇好鬬似勇而非荀子白石似玉姦佞似賢抱朴子魯人縫掖實非儒行東郭吹竽而不知音列子史孔子過匡匡人以為陽虎陽虎嘗暴匡人匡人止孔子孔子狀類陽虎拘五日史孔子世家陳遵字孟公時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云西漢本傳杜欽字子夏少好經書家富而目偏盲茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆迺為小冠髙廣財二寸由是京師謂欽為小冠杜子夏而鄴為大冠杜子夏云西漢本傳市虎成於三夫孝子疑於屢至後漢蔡謨初渡江見彭蜞大喜曰蟹有八足加二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟㡬為勤學死晉書傳記夫以曾參之賢與其母之信也而三人疑之則慈母不能信也戰國䇿物多相類而非也幽莠之㓜也似禾驪牛之黄也似虎白骨疑象碔砆類玉此皆似之而非者也同上相玉者患石似玉吕氏春秋魯有兩曾參趙有兩毛遂昔南曾參殺人見捕人告北曾參母母見以疑野人毛遂墜井而死客以告平原君平原君曰嗟乎天䘮予矣既而知非平原君客西京雜記陳國張伯諧弟仲諧婦炊於竈下至井上謂伯諧曰我今日粧好否伯諧曰我伯諧也婦大慙愧其夕時伯諧到更衣婦復逐牽其背曰今旦大誤謂伯諧為卿荅曰我故伯諧也風俗通集若青蠅之偽質偽猶變也蠅變白使黑變黑使白楚辭衆偽冒真文選毛遂不墮井曾參不殺人虛言誤公子投杼惑慈親李白似錦言應巧如絲數易欺元㣲之人之至信者心目也天性者父子也不惑者聖賢也然而於竊鈇而知心目之可亂於掇蜂而知父子之可間於拾煤而知聖賢之可疑劉賔客積異以生疑積疑以生惑白樂天外容閑暇中心苦似是而非誰得知白樂天鷺詩祥禽之類凡羽而凡羽混之神芝之類腐菌而腐菌混之嘉蕙之類棼芻而棼芻混之唐文粹本朝聞之曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊鈇而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑東坡辨試舘職䇿問孔子事物相形子子貢結駟連騎以造原憲衣冠敝子貢慙家語好女之色惡者之孽也荀子史文帝常病癰鄧通常為帝唶吮之太子入問病帝使唶癰而色難之已而聞通常為帝唶吮之心慙史佞幸傳美女入室惡女之仇史記外戚世家上自勞軍至灞上及棘門軍直馳入將已下送迎已而之細栁不得入使使持節入帝曰此真將軍耳灞上棘門軍若兒戱耳其將固可襲而虜也史周勃世家王蠋布衣義不北靣於燕况在位食禄者乎史田單傳後張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓謁大將軍光問千秋戰鬬方畧山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才漢書魏明帝使后弟毛曾與夏侯𤣥共坐時人謂之蒹葭倚玉樹㤗初如朗月入懷魏志王濟雋爽有風姿每見衛玠輒歎曰珠玉在側覺我形穢晉書本傳潘岳美姿儀常出婦人遇之者皆連手縈繞投之以果時張載甚醜每行小兒以瓦石投之委頓而反晉書潘岳傳互見所遇不同阮咸與籍居道南諸阮居道北北阮富南阮貧七月七日北阮盛曬衣服皆錦繡粲目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳晉本傳時人謂道子為東錄元顯為西錄西府車騎填湊東第門可張羅通鑑晉安紀晉恭帝禪位于宋祕書監徐廣流涕哀慟侍中謝晦謂之曰徐公得無小過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同通鑑文德皇后之𦵏段志𤣥與宇文士及分統士馬守章武門太宗夜使宫官至將軍所士及開營納使者志𤣥閉門不納停使者至曉太崇曰此真將軍也唐書互見紀律姚崇常有子䘮謁告十餘日政事委積盧懷慎不能决惶恐入謝於上上曰朕以天下事委姚崇以卿坐鎮雅俗耳崇既出須臾裁决俱盡通鑑唐𤣥宗傳記陳遵闗西大俠友人䘮遵親為䕶䘮事贈助甚厚王丹乃懷縑一疋陳於主人之前曰如丹此縑出自機杼遵聞而有慙色東觀漢紀中宗嘗召宰相蘓瓌李嶠子進見上曰宜意所通盡奏頲曰木從䋲則正后從諫則聖嶠子迹進曰斮朝渉之脛剖賢人之心上曰蘓瓌有子李嶠無兒松窻雜錄㝠鴻跡在煙霞上燕雀休誇大厦梁綺言雜錄集見西施之容歸憎其貎楊德祖箋西施出帷嫫母侍側呉季重書南鄰擊鍾磬北里吹笙竽寂寂揚子宅門無卿相輿左太冲詠史詩虎豹之文炳於犬羊鸞鳯之音鏘於鳥鵲金玉之光炫於瓦石皇甫湜互見因粗見精無貴賤不悲無富貧亦足杜詩衆星羅青天朗者獨有月李白互見分量不同二十漸乖張清溝映汙渠三十骨骼成乃一龍一豬韓文冬之為候也霜雪飄暴凍入肌髮夏之為用也金流石爍火走膚脉如陽春髙秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如洛陽咸秦者㡬焉李文饒集衆木盡摇落始見竹色真孟東野互見因事見人醜婦競簪花花多映愈醜唐文粹衆花盡處松千尺羣鳥喧時鶴一聲髙逹夫雀喧知鶴靜鳬戯識鷗閑同上本朝萬木嵗寒配喬松於巨栢衆星夜艾凜明月與長庚東坡賀林待制啓互見因難見人試㸔青松鶴何似珠門客歐公集互見趣向不同君㸔花枝朝露何如松上霜風山谷詩影響相應經子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎易鳴鶴在隂其子和之易隆墀永歎逺壑必盈處髙墀而長歎逺壑之中盈響而應易畧例善邇而逺至命宫而商應修下而髙者降與彼而取此者服矣同上恵迪吉從逆凶惟影響書卿士師師非度小民方興相為敵讐書建無窮之基亦有無窮之聞畢命作善降之百祥作不善降之百殃書鼔鍾于宫聲聞于外詩衛文公臣子多好善賢者樂告以善道也鄘干旄内和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於内而民莫不承聽理發諸外而民莫不承順記樂記下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也緇衣上好仁則下之為仁爭先人同上上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情語子路子以富貴而下人何人不尊以富貴而愛人何人不親家語互見施報愛人者人恒愛之敬人者人恒敬之孟子夫茍好善則四海之内皆將輕千里而來告之以善同上生於其心害於其政發於其政害於其事公孫丑文武興則民好善幽厲興則民好暴告子上有好者下必有甚焉者矣滕文公上夫人必自侮然後人侮之家必自毁然後人毁之國必自伐而後人伐之離婁上訑訑之聲音顔色拒人於千里之外德之流行速於置郵而傳命孟子大人之教若形之於影聲之於響莊子别契劵者所以為信也上好權謀則誕詐之人乗是而後欺探籌投鈎者所以為公也上好曲私則下乗是而後偏衡石稱懸者所以為平也上好傾覆則下乗是而後險勝斛敦槩者所以為均也上好貪利則下乗是而後鄙豐取吝與以無度取於人荀子楚王好細腰故朝有餓人同上善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也同上夫下之於上猶響之應聲影之像形也聽唱而應視儀而動上好富者民死利矣荀子齊桓好服紫一國盡服十紫不得一素公患之管仲曰試勿衣也謂左右曰甚惡紫桓公諾三日莫有衣紫者韓文鄒君好長纓左右皆服纓甚貴公患之因先自斷其纓而出國中皆不服同上人主之情上通于天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不改則多滛雨淮南子鄒衍盡忠於燕恵王王信讒繫之鄒子仰天而哭正夏而天為之降霜淮南子有隂德者必有陽報有隂行者必有昭名同上湯去三面之網歸之者四十國文王𦵏城隅之枯骨天下懷其仁傅子體痛者口不能不呼心說者顔不能不笑尹子從道必吉反道必凶如影如響也同上史齊桓公復㑹諸侯於葵丘益有驕色諸侯頗有叛者史齊世家口雖未言聲疾雷震令雖未行化馳如神史記漢女居東海養姑姑女讒之於姑姑經太守訴而殺之五月下雪漢書東海有孝婦少寡無子養姑甚謹姑死姑之女告吏婦殺我母吏捕孝婦自誣服太守竟殺婦郡中枯旱三年漢書上自初即位詔選天下文學材智之士待以不次之位四方士多上書言得失自衒鬻者以千數通鑑漢武紀猶桴鼓之相應前漢李㝷傳宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舎西漢杜欽傳呉王好劍客百姓多瘡瘢楚王好細腰宫中多餓死同上匡衡傳朝有變色之言則下有爭鬬之患上有自專之士則下有不遜之人上有克勝之任則下有傷患之心上有好利之臣則下有盜竊之民周南召南被聖賢之化深故篤於行而亷於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好滛巫而民滛祀晉侯好儉而民蓄聚太王躬仁邠國貴恕由此觀之治天下者審所上而已同上善惡之報各如其事西漢梅福傳車駕自幸洛陽獄錄囚徒理出千餘人時天旱大雨通鑑為善者天報之以福為非者天報之以殃西漢景帝紀下之應上猶景嚮也西漢正史嚮讀曰響自永平以來臣民雖有習浮屠術者而天子未之好至帝始篤好之常躬自禱祠由是其法浸盛通鑑漢桓紀猶叩木本百枝皆動東漢李固傳互見事同一體舉中於禮則强梁褫氣片言違正則厮臺解情東漢循吏傳贊一夫得情千室鳴絃同上互見循良姜詩母嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舎側忽有湧泉味如江水每旦輒出雙鯉魚以供二母之膳同上姜詩妻列傳魏武好法律而天下貴刑名魏文慕通逹而天下賤守節通鑑殷紂好色妲己是出葉公好龍真龍游廷通鑑漢桓紀王者心有所想雖未形顔色而五星以之推移隂陽為之變度漢靈紀謝安好聲律期功之慘不廢絲竹士大夫效之遂以成俗晉海西公紀秦劉蘭討蝗經秋多不能㓕有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是嵗秦大熟晉武紀作解散髻斜挿簮朝野慕之相與倣傚齊王儉齊帝既殘忍有司訊囚莫不嚴酷或燒犂耳使立其上或燒車釭使以臂貫之梁敬帝紀以上並通鑑裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠通鑑唐太宗上入苑中見蝗掇數枚祝之曰民以糓為命而汝食之寧食吾之肺腸舉手吞之是嵗蝗不為災同上夫人之慕名如水趍下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣同上髙祖唐張楚金魏元忠臨刑太后使鳯閣舎人王隠客馳騎傳聲赦之是日隂雲四塞既釋楚金等天氣晴霽通鑑武后傳記行非為影也而影隨之呼非為響也而響和之許氏説文蟊吏抵冐取民財則生蟘吏乞貸則生螟吏𠖇𠖇犯法則生許氏説文宋景公時熒惑在心公召子常問焉子常曰禍在君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於嵗公曰嵗饑人餓必死焉為人君而㣲其人誰以我為君乎子常曰君有至德之言三天必三賞君熒惑必徙三舎後果三徙吕氏春秋齊景公時熒惑守虛期年晏子曰虛齊之分野當强為善公乃去寃獄振孤敬老行之三日而熒惑遷其守春秋周公下白屋之士七十人而天下之士皆至晏子與同衣食百人而天下之士亦至仲尼脩道行理文章而天下之士亦至説苑集爾形信直影亦不曲爾聲信清響亦不濁晉裴顔安吏箴互入瑞本澄源庶女告天振風襲於齊堂建平王上傳媱風大行貞女蒙冶容之誨淳化殷流盜跖挾曾史之情陸士衡演連珠賤臣叩心飛霜擊於燕地選江文通上書珠玉無脛而自至者以人好之也孔融本傳宋景公時大旱三年卜之以人祠乃雨公下堂頓首曰所以求雨將自當之言未卒大雨藝文類聚强於内者外必勝殖不固者發必隳皇甫湜匹婦含怨三年亢陽匹夫結憤六月飛霜唐文粹漢髙帝大度故其時多魁傑不覊之才孝武好英風故其時富瑰琦立名之士孝宣精吏治故其時萃循良核實之能陸宣公集誠信大虧則百事無不紕繆同上本朝六國合從而辨説之材出劉項並世而籌畫戰鬬之徒歸唐太宗欲治而謀謨諫諍之佐來臨川集唐太宗朝將相固不可及至技藝之士醫有孫真人隂陽有李淳風吕才相法有袁天罡後世不可及也明道集武帝好四夷之功而勇鋭輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘亦被其利此一君之身趣好殊别而士輒應之司馬溫公通鑑論機鋒相凑經子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎語憲問子曰參乎吾道一以貫之曾子曰唯里仁子犁然有當於人之心莊山木子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子史禰衡為江夏太守黄祖作書記輕重踈宻各得體宜祖持其手曰此正得祖腹中之所欲言也東漢本傳互入文章王儉令任昉作一文及見曰正得吾腹中之欲任昉傳集堯心惟舜㑹元稹集光隂與時節先感是詩人白樂天杜詩韓集愁來讀似倩麻姑癢處􅎲杜牧之物理相資經若金用汝作礪書惟木從䋲則正同上鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章記學記無本不立無文不行禮器子無君子莫治野人無野人莫養君子孟滕文公上以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉同上勞心者治人勞力者治於人治於人者食人治人者食於人同上金石有聲不考不鳴莊子有刀者礲諸有玉者錯諸楊季行烏號之弓谿子之弩不能無弦而發越舲蜀航不能無水而浮淮南子史陽不得隂之職亦不能獨成嵗終前漢董仲舒䇿水火相濟鹽梅相成唐王義方傳傳記干將莫耶非得人力則不能割堅箭利金不得𤣥機之利則不能逺戰國䇿龍非風不舉龜非天不兆曽子集塤箎相須選雲龍之所能使為靈也然龍弗得雲無以神其靈矣韓文襍説經非權則泥權非經則悖栁斷刑物類相感經同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也易鳴鶴在隂其子和之易召雲者龍命吕者律易命宮而商應同上有豕白蹢烝渉波矣詩喓喓草蟲趯趯阜螽以燧取明火於日以鑒取明水於月周禮天降時雨山川出雲記孔子閒居方以類聚樂記子陽燧見日則然為火莊子鄭師文學琴於師襄當春而叩商絃以召南宫凉風緫至草木成實及秋而叩角絃以激夾鍾溫風徐廻草木發榮當夏而叩羽絃以召黄鍾霜雪交下川池暴沍及冬而叩徵絃以激𬎼賓陽光熾烈堅氷立散將終命宫而總四絃則景風翔慶雲浮甘露降醴泉涌外湯問施薪若一火就燥也平地若一水就濕也草木疇生禽獸羣焉物各從其類也荀子天之且雨也隂曀未集而魚已噞矣山雲蒸柱礎淮南子抱薪加火燥者必先然平地注水偏者必先濡鄧子史蟋蟀俟秋唫蜉蝣出以隂虎嘯而風冽龍興而致雲王褒頌南風至則黄鍾應融風動而魚上氷後蔡邕傳威蒸在野野集仁獸後漢應龍之翔雲霧滃然而從震風薄怒萬竅不約而號物有自然相動耳唐裴寂贊影之像形響之赴聲動而相隨各以類應唐書傳記呉牛見月而喘世説蛤蟹珠龜與月盛衰㑹稽先賢傳蚌蛤龜珠與月盛衰月者太隂之中故龜蛤之屬因之以盛虧吕氏春秋日月望則蚌蛤實月晦則蚌蛤虛大戴後霜降則鳴山海經陽出雞鳴以類感也春秋說蟻封宂户大雨將至焦貢易林唐樂懸散失獨無徵音李嗣貢求得䘮車一鐸入而振之於東南隅果有應也遂掘之得石一段為四具補樂懸之散闋周正集同音者相和同類者相似飛鳥號其羣鹿鴻求其友楚辭叩宫而宫應彈角而角動虎嘯而谷風生龍舉而景雲往聲音之相叩兮言物類之相感也同上鳴聲相應仇偶相從選詩蚌蛤珠胎與月虧全選呉都賦隠雷自天昆蟲已聽浮隂在漢柱礎先霑任孝恭啓相資成美經若作酒醴爾惟麴蘖若作和羔爾惟鹽梅書惟周公克慎厥始惟君陳克和厥中惟公克成厥終畢命為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之語見衆力易成史晏子曰和如羔焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心左傳昭二十智者應勇者行仁者守榖梁傳金木水火剛柔相濟然後克得其和能為之用東漢桓譚傳聚精㑹神相得益彰雖伯牙操􅂒鐘逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其德聖主得賢臣頌樂廣善清言而不長於筆將遜尹請潘岳為表時人咸云若廣不假岳之筆岳不取廣之㫖無以成斯美晉書唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸于治唐書宋璟傳互見殊塗同歸李華為元德秀碑顔真卿書李陽氷篆額後人爭摹寫之號為三絶碑唐書互見希慕王義方曰天子置公卿大夫士俾其水火相濟鹽梅相成不得獨是獨非也唐書本傳傳記珍裘以衆腋為溫廣厦以羣材合構史通天下無粹白之狐而有粹白之裘取之於衆白也吕氏春秋一入衆力易成集士夫之能享大名顯當世者莫不有先進之士負天下之望者為之前焉士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也韓文上于頔布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不謟王公大人雖甚貴而不驕其事勢相須其先後相資也同上與鳯朔刑尚書先進之士得人而託之則道德彰而名聞流後進之士得人而説之則事業顯而爵位通同上送許郢州序武丁賢君也傅說賢相也而武丁引金作礪以命其相説喻木從䋲則正以戒其君陸宣公文善為國者宣恵以養威養威以尊恵威而能養則不挫恵而見尊則有恩同上絲桐本異質音響合自然韋應物集氷玉相輝椒蘭同馥張九齡文氷置白玉壺始見清皎潔珠穿殷紅縷始見明洞徹元稹集猶衆壑合注霈為大川羣山出雲混成一氣吕和叔文集互見衆力易成本朝端溪石硯宣城管王屋松烟紫兎豪更得孤卿老書札人間無此五般髙欒城集相鬬相損史今兩虎共鬬其勢不俱生通鑑互見勢不兩立朱彭冦費為世莊士愛惡相攻能為國憂猶昆虫之相齧適足還害其身也後漢孔融傳角智者皆窮角力者皆負通鑑漢獻紀傳記韓盧天下之疾犬東郭逡天下之狡兎盧逐逡環山者三兎極於前犬廢於後犬兎各死戰國䇿卞莊子方刺虎卞竪子曰両虎方食牛牛甘必爭爭必鬬鬬則大者傷小者死從傷而刺之一舉必有獲兩虎之名有頃兩虎果鬭大者傷小者死春秋後語蘓代曰臣過易水見小蜯方出爆而鷸啄其肉蚌合而箝其啄鷸曰今日不雨明日不雨必有死蚌蚌亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之戰國策各行其志經君子之道或出或處或黙或語易道並行而不相悖記中庸互入殊塗同歸子曰道不同不相為謀語㣲子去之箕子為之奴比干諫而死語史伍員與申包胥友其亡也謂包胥曰我必覆楚國包胥曰勉之子能復之我必能興之左傳定公子罕曰我以不貪為寳爾以玉為寳若以與我皆䘮寳也不若人有其寳左襄十五年分量不同楚伍尚謂其弟員曰爾適呉我將歸死我能死爾能報左傳昭公張竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣西漢陳遵傳互入各有所長蕭望之以射策為郎署小苑東門候王仲翁傳呼甚寵顧謂望之曰不肯錄錄反抱闗為望之曰各從其志同上蕭望之傳王陽為益州刺史行部至卭郲九折坂嘆曰奉先人遺體奈何數乗此險後以病去及尊為刺史至其坂問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣王尊傳武盡善矣終全孤竹之潔後漢逸民傳袁覬說蔡興宗曰舅今宜出居陜西覬在襄沔若有事可以共立桓文之功興宗曰女欲在外求全我欲居中免禍各行其志不亦善乎通鑑宋明紀沈慶之死子侍中文叔欲亡謂其弟中書郎文季曰我能死爾能報遂飲慶之之藥而死文季操刀馳馬而去同上宋太祖馬樞曰貴爵禄者以巢由為桎梏愛山林者以伊吕為管庫求名實則芻芥柱下之言翫清虛則糠粃席上之説陳書本傳或與世同塵隨波瀾而俱逝或違時矯俗望江湖而獨往北史隠逸序集樂於用則豫章貴厚其生則社櫟賢劉賔客百獸與鳯凰同於簫韶中知各極其懽心耳又何暇自審其形容之不類哉元㣲之集太公戰牧野伯夷餓首陽同時號賢聖進退不相妨白樂天集君知天地中寛窄鵰鶚鸞鳯各自飛雙鳯棲梧魚在藻飛沉隨分各逍遥同上本朝鵬鷃逍遥各自知臨川集各有所長經䕫逹於樂而不逹於禮記仲尼燕居德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語先進孟公綽為趙魏老則優不可以為滕薛大夫語憲問又入分量不同臧武仲之智公綽之不欲卞莊子之勇冉求之藝語子驊騮騏驥一日而馳千里捕鼠不如狸狌莊子相髙下視磽肥序五種君子不如農人相美惡辨貴賤君子不如賈人設䂓矩陳䋲墨便備用君子不如工人荀儒效日不知夜月不知晝日月為明而非能兼也淮南子奚仲不能為逢蒙造父不能為伯樂同上史禆諶能謀於野則獲謀於邑則否左襄三十一孔子曰良農能稼而不能為穡良工能功而不能為順史孔子世家宋義謂項羽曰被堅執銳義不如公坐運籌策公不如義通鑑秦王世紀范蠡曰四封之内百姓之事蠡不如種也四封之外敵國之制立斷之事種亦不如蠡也國語黄霸材長於治民及為丞相風采不及邴魏功名損於治郡東漢黄霸傳張竦謂陳遵曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣同上陳遵傳薛宣起佐史登宰相為世吏師及居大位以苛察失名器誠有極也西漢本傳陳平曰於今靣折庭爭臣不如君全社稷定劉氏後君亦不如臣同上陳平傳曾子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之茍有可觀内必有闕通鑑漢順紀諸葛亮治戎為長竒謀為短理民之幹優於將畧蜀志本傳吕義為政簡而不繁號為清能然居大官名聲損於郡縣同上臨郡則垂稱處朝則被損同上陳夀評孫策謂弟權曰舉江東之衆决機於兩陣之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿呉志本傳摰虞太叔廣並為列卿每至公座廣談虞不能對虞筆廣不能答樂廣善清言而不長於筆將遜尹請潘岳為表時人咸云若廣不假岳之筆岳不取廣之㫖無以成斯美晉書謝鯤曰端委廟堂使百僚準則鯤不如亮庾亮一丘一壑自謂過之晉書褚䂮以幹用稱為縣吏事有不合令欲鞭之䂮曰物各有所施榱桷之材不合以為藩落晉書互見大才小用古人有云耕當問奴織當問婢此言各有所能也隋書史思明曰李光弼長於憑城今出在野此成擒矣通鑑諸葛亮明於治國而為相雲長張飛勇冠三軍而為將同上漢獻紀傳記曹沫之奮三尺之劍一軍不能當使曹沫釋其三尺之劍而操銚鎒與農夫居壠畆之中則不若農夫戰國策猿獮猴錯木據水則不若魚鱉歷險乗危則騏驥不如狸狐同上顧劭與龎士元曰吾與足下孰愈曰陶冶世俗與時浮沉吾不如子論王霸之餘策覽倚伏之要害吾似有一日之長劭亦安其言世説集琴待嵇中散杯思阮歩軍元㣲之集子長在筆予長在論劉實客亷頗解武文無説謝聎能文武不通杜荀鶴集天之生物為用罕兼性有所長必有所短才有所合亦有所睽曲成則器物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良馭適險易之宜故駑驥無失性陸宣公文互見隨材器使本朝倕工於為弓而不能射奚仲工於為車而不能御歐公作梅聖喻集叙物有所不可則亦有所宜警夜偷者不以馬司晝漏者不以雞山谷文各為其主史蒯通曰跖之犬吠堯非其主也史記晉㓕欒氏執政使欒氏之臣勿行欒氏之臣辛俞行使執而獻公曰國有大令何故犯之對曰自臣之祖以無大援於晉國世𨽻欒氏於今三世矣臣故不敢不行國語滕公曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶通鑑漢髙祖紀臣各為其主耳同上跖之狗吠堯堯非不仁狗固吠非其主當是時臣惟獨知韓信非知陛下也同上漢髙紀桀之犬可使吠堯跖之客可使刺由西漢鄒陽書闗公殺顔良拜書辭曹操而犇劉備左右欲追之操曰彼各為其主勿追也通鑑漢獻紀什翼犍嘗討西部獲射者邵臣欲臠割之什翼犍曰彼各為其主鬬耳何罪遂釋之同上晉海西公紀羣士陳力各為其主三國魏明帝紀傳記魏勃曰跖之犬吠堯非貴跖而賤堯狗自吠非其主也春秋後語記纂淵海卷五十八
