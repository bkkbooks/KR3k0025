body:
  text: 記纂淵海卷九十九宋潘自牧撰水族部龍經乾初九潛龍勿用九二見龍在田九五飛龍在天上九亢龍有悔用九見羣龍无首吉時乘六龍以御天雲從龍龍戰于野其血𤣥黄震為龍易龍以為畜故魚鮪不淰記鄭大水龍鬬于時門之外洧淵國人請為禜焉子産不許曰我鬬龍不我覿也龍鬬我獨何覿焉禳之則彼其室也吾無求于龍龍亦無求於我乃止龍見于絳郊魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏左傳子龍被五色而遊故神欲小則如蠶蠋欲大則極天地欲上則凌雲欲沉則伏泉蛟龍水蟲之神者也乘水則神立失水則神廢管子墨子北之齊遇日者曰帝以今日殺黒龍於北方先生色黒不可以北墨子曰帝以甲乙殺青龍於東方丙丁殺赤龍於南方庚辛殺白龍於西方壬癸殺黒龍於北方若用子言則禁天下之行也墨子龍合而成體散而成章乘乎雲氣養乎隂陽朱泙漫學屠龍於支離益殫千金之家三年伎成而無所用其巧也河上有家貧恃緯蕭而食者其子沒淵得千金之珠其父曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也莊子夫龍可狎而騎也然㗋下有逆鱗徑尺若嬰之則殺人韓子龍舉而景雲属人不見龍之飛舉而能高者風雨之奉也淮南子山中辰日稱雨師者龍也抱朴子史黄帝得土徳黄龍見夏得木徳青龍止於郊夏后氏之衰有二神龍止於帝庭而言曰余褒之二君也夏帝卜殺之徙去之留之莫吉卜請其漦而蔵之吉史記惠帝二年丙龍見蘭陵人家井中文帝十五年黄龍見成紀漢書葛陂竹杖化龍見竹類龍見武庫井中百官將賀劉毅獨曰昔龍降鄭時門之外子産不賀龍降夏庭沬流不禁卜蔵其沫至周幽王禍釁乃發證據舊典無賀龍之禮陸機甞餉張華鮓華曰此龍肉也試以苦酒濯之必有異既而五色光起雷渙之子渡延平津腰間劍躍入水化為龍晉書劉穆之嘗夢與高祖俱泛海俯視船下見有二白龍挾舡既而至一山峯崿聳秀林樹繁宻意甚悅之沈約宋書梁江陵城壕中有龍騰出煥爛五色竦躍入雲南史大象中榮州有黒龍見與赤龍鬬於汴水之側黒龍死禇無量好學臨平湖中有龍鬬里閭就觀之無量時年十三讀書宴然不動唐書太和二年五龍㑹於宻州次第而至五方之色具焉後周書傳記鱗蟲三百六十而龍為之長大戴禮有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍龍未昇天曰蟠龍說文太皥有景龍之瑞故以龍紀官黄帝采首山銅鑄鼎荆山下有龍垂胡髯下迎黄帝帝王世紀禹南濟江黄龍負舟禹笑曰吾受命於天竭力以養人柰何憂于龍龍弭首而逝吕氏春秋禹誅防風氏二龍降之禹使范氏御之以行括地圖昔夏后啓夢乘龍飛以登于天睪陶占之曰吉歸蔵明夷卦吳王欲從民飲酒伍子胥諌曰昔白龍下清冷之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰魚固人之所射也豫且何罪夫白龍天地貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣說苑葉公好龍室屋彫文盡以為龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之逺而還走是葉公非好龍也好夫似龍而非真者也劉向新序宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯢豈能料江海之大哉先賢傳漢和帝元年有一青龍墮於宫中帝命烹之賜群臣龍羮各一杯故李尤七命曰味兼龍炙述異記陶侃嘗捕魚得一織梭還挂於壁有頃雷雨梭變成赤龍而去異苑世言乘龍苦於行雨而雷神捕之洛中有祠穴曽有誤墜其中行數里漸明見有宫殿人物又有大羊羊髯有珠人取食之後出以問張華華曰大羊名曰癡龍北瑣孫思邈隠居終南山時大旱西域僧請於昆明池結壇祈雨凡七日縮水數尺池龍化為老人求救于思邈思邈謂曰我知昆明池有仙方三十首留傳與予予將救汝老人曰此方上帝不許妄傳今急矣固無所吝有頃捧方而至思邈曰爾第還無慮自是池水忽漲溢岸數日胡僧羞恚而死雜爼集龍嘘氣成雲雲固弗靈於龍也然龍乘是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣韓文扶風馬孺子言年十五時在澤州與羣兒戯郊亭上頃然有竒女墮地有光曄然被緅裘白紋之裏首歩搖之冠貴游少年駭且悅之稍狎焉女頩爾怒曰不可吾故居鈞天帝宫下上星辰呼嘘隂陽薄蓬萊羞崑崙而不即者帝以吾心侈大怒而謫來七日當復今吾雖辱塵土中非若儷也吾復且害若衆恐而退遂入居佛寺講室焉及期進取杯水飲之嘘成雲氣五色翛翛也因取裘反之化為白龍徊翔登天莫知其所終栁文本朝神物生天擾可騎如何孔甲但能羈當時若更無劉累龍意茫然豈得知山腰石有千年澗石眼泉無一日乾天下蒼生待霖雨不知龍在此中蟠王介甫魚經包有魚无咎不利賔包无魚起凶豚魚吉信及豚魚也易淮夷蠙珠暨魚書魴魚赬尾豈其食魚必河之魴豈其食魚必河之鯉魚麗于罶南有嘉魚魚在于渚或潛在淵魚在于沼亦匪克樂魚在在藻有頒其首有莘其尾依于其蒲魚躍于淵王在靈沼於牣魚躍猗與漆沮潜有多魚有鱣有鮪鰷鱨鰋鯉詩􅘋人辨魚物為鱻薧周禮槀魚曰商祭鮮魚曰脡祭孟春魚上氷獺祭魚季春薦鮪于寝廟羞濡魚者進尾冬右腴夏右鰭禮記公將如棠觀魚臧僖伯諌公曰吾将畧地焉遂往陳魚而觀之劉子曰微禹吾其魚乎左傳子昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉孟子魚不可脫於淵老子川廣者魚大文子八􅀈之北有溟海有魚焉其廣數千里其長稱焉列子泉涸魚相與處於陸相呴以濕相濡以沬不如相忘於江湖惠子與莊子遊于濠梁之上莊子曰鯈魚出遊從容是魚之樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂吞舟之魚蕩而失水則螻蟻能苦之筌者所以在魚得魚而忘筌也莊子見車轍中有鮒魚鮒魚曰我東海之波臣也君豈有升斗之水而活我哉莊子曰待我激西江之水而逆子鮒魚曰不如早索我於枯魚之肆莊子公儀休相魯而嗜魚一邦皆争買魚而獻之公儀子不受曰夫唯嗜魚固不受也韓子水濁則魚噞水積而魚聚使水濁者魚撓之月虧則魚腦減宋君亡其珠池魚為之殫畜池魚者必去猵獺争魚者濡淮南子史武王白魚入舟見祥瑞類陳勝吳廣舉大計以丹書帛曰陳勝王置所罾魚腹中使買魚見書漢書羊續為南陽太守府丞嘗獻其生魚續懸之於庭後漢書王延性仁孝繼母卜氏嘗盛冬思生魚延叩凌而哭忽有一魚長五寸躍出冰上延取以進母吳隠之為廣州刺史帳下人進魚每剔去骨隠之罰而黜焉晉書明帝幸華林園天淵池白魚躍入御舟沈約宋書王固嘗聘魏魏人以南人嗜魚大設網罟固以佛法呪之遂一鱗不獲梁書陸政性至孝其母好食魚後宅忽有泉出而魚遂得以供膳北史太宗觀書于西宫見魚躍焉問其故漁者曰此當乳也於是中網而止唐書傳記魚有力者鰴魚枕謂之丁魚腸謂之乙魚尾謂之丙爾雅孔子之楚有漁者獻魚曰天暑市逺無所鬻之思欲棄之糞壤不若獻之君子孔子再拜而受埽地祭之家語楚人有獻魚於楚王者曰今日獲魚食之不盡賣之不售棄之可惜故來獻之左右曰鄙哉辭也楚王曰漁者仁人也盖聞廩倉粟有餘者國有饑民後宫多幽女者下民多曠夫餘衍之蓄聚於府庫者境内多貧乏之民漁者知之其以喻寡人也於是乃遣使恤鰥寡楚國頼之新序葛𤣥見賣大魚者謂曰暫煩此魚到河伯處魚主曰魚已死𤣥曰無苦乃以丹書紙内魚口中擲水中有頃魚還擲上岸得書神仙傳吳王江行食膾有餘棄於江中流化而為魚今江中有名吳王膾餘魚者猶作膾形博物志魚復溪中有魚其頭似羊豐肉少骨美於餘魚扶南國有鮮巴魚頭如馬首伺人入水便來為害水經瀛洲有洞淵廣千里有魚身長千丈拾遺録武陽小魚大如針號一斤千頭蜀人以為醤廣志彭蠡之濵以魚食犬城門失火禍及池中魚俗說池中魚人姓字居近城門城失火延及其家非也謹按百家書宋城門失火因汲池中水以沃之魚悉露死喻惡之滋并中傷重謹也論衡集彼尋常之汙瀆兮何以容吞舟之魚横江湖之鱣鯨兮固將制夫螻螘賈誼沛乎如巨魚之縱大壑王褒北溟有巨魚身長數千里仰噴三山雪横吞百川水憑陵隨海運烜赫因風起吾觀摩天飛九萬方未已魯國一杯水難容横海鱗李白潛鱗輸駭浪紫鱗衝岸躍水深魚極樂潜波想巨魚白魚如切玉泉出巨魚長比人丹砂作尾黄金鱗白小群分命天然二寸魚細微沾水族風俗當園蔬魚知丙穴由來美杜詩輕浪參差魚動鏡羣鱗沸池羹沈細抽潛腥韓詩澗急驚鱗奔沉景照文鱗每憶纎鱗逰尺澤栁詩香餌見來湏閉口大江歸去好藏身盤渦峻激多傾覆莫學長鯨擬害人白居易本朝火鬐錦鬛鱗雪霜紅眼照曜珠夜光若無鯤鮞與蝦蚪安見品格非尋常劉貢父秋水澄清見髪毛錦鱗行處水紋搖岸邊人影驚還去時向緑荷深處跳溪鱗佳味自可愛何異鱣魴争尺水巨魚先已化風雷六一集江水深成窟潛魚大似犀赤鱗如琥珀老枕勝琉璃三年京國厭藜蒿長羡淮魚壓楚糟東坡偶思煖老庖𤣥鯽公遣霜鱗貫栁來山谷寧容網目漏吞舟誰能烹鮮作苛碎后山河豚傳記河豚有毒以盧根及橄㰖等解之肝有大毒又名䂓魚䂓魚吹肚魚也本草本朝河之魚有豚其名者遊於橋間而觸其柱怒其柱之觸已也則張頰植鬛怒腹而浮於水飛鳶過而攫之磔其腹而食之因逰而觸物不知罪已妄肆其忿至於磔腹而死悲夫東坡集歐公謂河豚出於暮春食栁絮而肥殆不然今浙人食河豚於上元前江隂冣先得方出時一尾直千錢二月後一尾纔百錢耳栁絮時人已不食謂之班子或言腹中生蟲故惡之石林詩話東坡詩云竹外桃花三兩枝春江水煖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時此正是二月景致是時河豚已盛矣欲上之語似乎未穏漁隠叢話經筵官㑹資善堂東坡盛稱河豚之美吕元明問其味曰直那一死聞見録河豚盛氣善怒毎伏水底必設網于上故以物就而觸之彼將奮怒而上遂為所獲吳人目其腹腴為西施乳藝苑雌黄春洲生荻芽春岸飛楊花河豚當是時實不數魚蝦東坡忿腹若封豕怒目猶吳蛙庖煎茍失所入喉為鏌鎁梅聖俞非鱗亦非介芒刺皮如蝟觀形固可憎况復論腸胃曽南豐烏賊傳記世謂烏賊懐墨而知禮故俗云是海若用事小吏或曰性嗜烏常暴水上飛烏過謂其已死便往啄之乃捲取烏故謂烏賊南越記海人言昔秦王東遊棄筭於海化為此魚形如筭袋兩帶極長烏賊舊名河伯度事一名從事小吏江東人取其墨書契以脫人財踰年字消惟空紙耳舊說烏賊有矴遇風則虬前一鬚下矴一名纜魚風波稍急即以其鬚粘石為纜雜爼本朝海之魚有烏賊其名者呴水而水烏懼物之窺已也則呴水以自蔽海烏知其魚而攫之嗚呼徒知自蔽以求全不知滅迹以杜疑哀哉東坡集腹膏為飯嚢鬲胃貯飲墨出沒上下波厭飫吳越食梅聖俞蝦史滕脩為廣州刺史或語脩蝦長一丈修不信其人至東海取蝦鬚長四五尺封以示脩脩乃服王隠晋書傳記鰝大蝦也爾雅蝦種多􅀈最大中作脯異物志南海以蝦頭為杯鬚長數尺金銀鏤之南越志馬稜為廣陵太守蝗蟲飛入海化為魚蝦東觀記虞嘯父為孝武侍中帝曰卿在閣下初不聞有獻替對曰天時尚煖魚鼈蝦蚱未可致尋有所獻帝大笑世說水母傳記東海有物状如凝血名曰水母無頭目所處則衆蝦附之博物志水母如羊胃可生切食廣志廣州謂之水母閩人謂之蛇其形乃渾然凝結一物有淡紫色者腹下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮泛水上捕者或遇之即歘然而沒盖蝦有所見耳嶺表録異龜經舍爾靈龜觀我朶頥凶或益之十朋之龜天生神物聖人則之離為龜易昆命于元龜九江納錫大龜寧王遺我大寳龜書爰契我龜我龜既厭詩鼈人秋獻龜魚龜人掌六龜之属天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁属南龜曰獵屬北龜曰若屬凡取龜用秋時攻龜用春時周禮季秋登龜龜以為畜故人情不失龜為前列先知也青黒緑者天子之寳龜也禮記臧武仲自邾使告臧賈且致大蔡焉臧昭伯如晋臧㑹竊其寳龜僂句以卜為信與僣僣吉㑹曰僂句不余欺也左傳龜青純公羊傳臧文仲居蔡山節藻梲論語子仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑚而無遺筴而不能免刳腸之患龜曵尾塗中荘子龜三千歲蜉蝣不過三日以蜉蝣而為龜憂養生之具人必笑之淮南子千載靈龜人言浮於蓮葉之上或在叢蓍之下山中已日稱時君者龜也郄儉少時行獵墮空冢中見大龜張口吞氣乃試隨龜所為遂不復饑抱朴子史禇先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜各有文在腹下有神龜在江南嘉林中常巢於芳蓮之上南方老人用龜支牀足行二千歲老人死後移牀龜尚生能行氣導引史記永嘉元年有玉龜出於灞水苻堅末高陸人穿井得龜大三尺堅命太卜池養之及死藏其骨於太廟是夜廟丞高虜夢龜曰我本出將歸江南遭時不遇殞命秦庭又有人夢於虜曰龜三千六百嵗終必妖興亡國之象也晉書永明間唐潜獻青毛神龜一頭南齊書武帝章皇后母嘗遇道士以小龜遺已光彩五色及朞后生紫光照室因失龜所在陳書開皇中掖廷毎夜有人來挑宫人宫人抽刀斫之其物落牀而走因入池而沒明日涸池得一龜其上有刀迹殺之遂絶隋書先天二年江州獻靈龜六眸腹下有𤣥文象卦文唐書傳記龜三足賁龜俯者靈仰者繹前弇諸果後弇諸獵左倪不靁右倪不若一曰神龜二曰靈龜三曰攝龜四曰寳龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜爾雅甲蟲三百六十而神龜為之長大戴禮龜一名𤣥衣督郵一名元緒古今注龜百嵗一尾千嵗則十尾六韜靈龜五色似玉背隂向陽上隆象天下平法地轉運應四時蛇頭龍脰左睛象日右睛象月知存亡吉凶之變說苑龜三百嵗大如錢遊蓮葉上三千歲則青邊有距論衡靈蓍四十九莖下有千歲神龜守之京房易傳龜厭江海陸行不止自令枯藁失其都市焦贑易林天子龜尺二寸諸侯八寸大夫六寸士民四寸龜者隂蟲之老也逸禮神龜之象上圓法天下方法地背上有盤法丘山𤣥文交錯以成列宿五光昭若𤣥錦文運轉應四時禮統孫權時永康人入山遇一大龜即束之歸龜便言曰遊不良時為君所得人甚怪之載出欲上吳王夜泊越里䌫船於大桑樹宵中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘繫方見烹臛雖盡南山之樵不能潰我對曰諸葛元遜博識必致相苦令求如我之徒計從安出龜曰子明無多辭禍將及爾樹寂而止既至權命煮之焚柴萬車語猶如故諸葛恪曰燃以老桑乃熟獻人仍說龜樹共言權登使伐取煮龜立爛異苑孔愉見人籠龜於路買而放諸溪中龜反顧視愉及封北亭而鑄印龜左顧者三有似昔龜之顧後賢傳毛寳戍邾城有一軍人買得白龜長五寸寳便買取持歸養之漸大放江中後邾城遭石勒敗毛寳被鎧投江中覺如墮一石上視之乃是先放白龜既抵岸回顧而去續搜神記集有緇衣之大夫兮衣𤣥繡之衣裳乘輜車之岌岌兮駕雲霧而翺翔風雨為之電奮兮五色赫以焜煌孫惠賦質應離象位定坎居賤彼朶頥賁我靈符浮洛川見緯書洞秘賾通𤣥虛李顒賦本朝自從九江納錫罷衆漁賤棄秋不登卜人官廢亦已乆果獵誰復知殊稱搘牀纔堪比瓦礫當粟孰肯捐斗升糝頭腥臊何足嗜曳尾穢汚適可憎盛溲除聾豈必騐蹈背出險安可憑刳腸以占幸無事卷殻而食病未能如聞翕息可視効往乃有墜岸千層仰窺朝陽俯引氣亦得難老如岡陵諒能學此真壽類世論妄以類蟲冰王介甫鼇子渤海之中有五山帝使巨鼇十五舉首而戴之龍伯之人一釣而連六鼇列子東海鼇冠蓬莱㳺滄溟蛭蟻聞而悅之相邀海畔觀鼇群蟻曰彼冠山何異我戴粒逍遥於封壌之巔伏乎窟穴也管子傳記有巨靈之鼇背負蓬萊之山而飛舞戯滄海之中列仙傳巨鼇以背負山周廽千里𤣥中記集鼇戴山抃何以安之楚辭巨鼇贔屭首冠靈山吳都賦積翠浮澹灔始疑負靈鼇栁詩突兀海底鼇首冠三神丘鈎網不能制其來非一秋或者不量力謂兹鼇可求贔屭牽不動綸絶沈其鈎一鼇既頓頷衆鼇齊掉頭噴風激蜚亷鼓浪怒陽侯鯨鯢得其便張口欲吞舟萬里無活鱗百川多倒流白居易本朝方壺蓬萊負巨鼇山谷黿經季秋取黿禮楚人獻黿於鄭靈公公子宋與子家將見子公之食指動曰他日我如此必嘗異味及入宰夫將解黿相視而笑左傳子大黿作魅行病道士戴炳以越章封沉遍擲潭中良乆有大黿浮出乃格殺之而病者愈抱朴子史靈帝時黄氏之母浴而化為黿初浴時簮一銀釵及見猶在其首續漢書韋丹少在東路嘗至中橋見漁者網得大黿繫之橋柱引頸四顧有求救之意於是以所乘驢易之放黿於水徒歩而歸唐史傳記黿似鼈而大說文黿為河伯使者古今注齊景公渡河黿銜左驂沒之古冶子㧞劍從斜行五里逆三里至于砥柱之下左手持黿頭右手挾左驂鷰躍鵠踊而出捜神記范獻子獵占之曰君子得黿小人遺冠獻子獵而不得遺其豹冠璅語集乗白黿兮逐文魚楚辭鼉經鼉鼔逢逢詩季秋取鼉禮史孫亮初公安有白鼉鳴謠曰鼉鳴龜背平南郡城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安被收刮金印龜背一服而死吳志傳記鼉水蟲從龜單聲說文鼉魚長三尺有四足髙尺餘尾如蝘蜓而大方嫁娶必得食之廣志張福行船夜有女子乘小舟就福寝中夜月照乃見一白鼉枕福臂福驚起而鼉去搜神記廣陵王家女病邪召竺僧瑤治之瑶入門便大驚老魅敢干犯人女在内大喚云人殺我夫鬼在側曰吾命盡於今可為痛心於是化為老鼉走出中庭瑶撲殺之許氏志怪鼈經離為鼈易炰鼈膾鯉詩鼈人秋獻鼈蜃周禮子東海之鼈莊子跬歩不休跛鼈千里荀子鄭縣人卜子毒妻之市買鼈以歸潁水以為渴因縱而飲之遂失鼈韓子鼈無耳而目不可以瞥精於明也援兩鼈而失靈龜淮南子史崔𢎞度每期戒僚吏曰無得欺誑後嘗食鼈侍者八九人𢎞度一一問之曰鼈美乎皆云鼈羙𢎞度罵曰傭奴何敢誑我汝初未嘗食鼈安知其美俱杖之隋書傳記鼈三足能爾雅鼈目白腹下王字者不可食雜爼鼈一名河伯從事古今注公父文伯飲南宫敬叔酒露賭父為客羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂出國語汝南郡中常有鬼怪導從威儀如太守入府打鼓周行内外後費長房詣郡正值此鬼至府郡門而不敢前長房厲聲呼便促前來鬼化作老翁叩頭乞得自改長房曰復汝真形此鬼即成大鼈如車輪頸長一丈許長房復令還就人形以一札符付之令送與葛陂君鬼持符去至陂邊以頸繞株而死神仙傳昔有人與奴俱得心腹病奴死割腹視之得一白鼈以諸藥内鼈口中終不死後有乘白馬來者馬溺濺鼈縮頭藏脚乃試取馬溺灌之豁然消成水主者頓飲一升遂愈志怪集方銜鈎以振掉吁駭人而可惡既顛墜於岩岸乃蹣跚而跬歩或延首以鶴顧或頓足而鷹距或曳尾于泥中或縮頭于殻裏潘尼賦螺經離為蠃易鼈人祭祀供􅀢蠃蚳周禮傳記海文蠡數種其大者容一升南人以為酒杯廣志馬軻蠃大者圍九寸長四寸細者圍七寸長三寸南方說鸚螺狀如覆杯頭如鳥頭向其腹視似鸚鵡故以名吒螺著海邊樹上見人吒如人聲可食蒼螺江東人以為椀假猪螺日南有之靨為甲香異物志謝端少孤得一大螺置瓮中每早至野還見有飲飯湯火端從籬外窺之見一少女從瓮中出燃火便入問之女答曰我天漢中白水素女天帝使我為守舍炊煮今無故相伺不宜留此忽有風雨而去搜神記蚌蜃附經離為蚌易孟冬雉入大水化為蜃禮子楚之明月出於蚌蜃墨子明月之珠蜃龍之病而我之利淮南子史元將仲將不意雙珠近出老蚌魏志太宗謂侍臣曰蜃性含水待月而水生唐書傳記蜃小者䖴注云䖴即小蚌爾雅齊趙將伐燕蘇代說趙王曰今者臣來見小蚌方出暴而鷸啄其肉蚌合而挾其啄鷸曰今日不雨明日不雨必見蚌脯蚌曰今日不出明日不出必見死鷸漁父得而併擒之今燕趙相攻臣恐強秦之為漁父也趙王乃止戰國䇿南方林邑有大蚌盈車明珠至寸不以為貴拾遺録集蚌蛤珠胎與月虧全左思賦蛤蛤蜊附經季秋雀入大水為蛤禮子盧敖俯而視之方卷龜殻而食合梨淮南子傳記東越海蛤汲冢周書仙家之藥有白水靈蛤梁武内傳凡蛤之属開口聞雷鳴則不復閉南越志有人患足腫疾醫莫能識徐之才視之曰蛤精疾也得之當由乘船入海垂脚入水中之才為剖之得蛤子二大如榆筴三國典畧本朝飲者憐渠有典刑見渠借箸眼偏青莫遣下塩傷正味不曽著蜜若為甜雪楷玉質全身瑩金線氷鈿半縷纎誠齋車螯史廬陵王義真出為南豫州刺史居髙祖憂長史劉湛入見煗酒炙車螯湛正色曰公當今不冝有此設義真曰旦甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮處人沈約宋書傳記車螯形如蚌蛤而大說文本朝璀璨殻如玉斑斕㸃上花含漿不肯吐得火遽已呀六一集素脣紫錦背漿味壓蚶菜梅聖俞珠宫新沐浄瓊沙石鼎初燃瀹井花紫殻旋開微滴酒玉膚莫熟要鳴牙誠齋蠣傳記南海謂蠣為蠔甲為牡蠣合澗州圓蠣土人重之語曰得合澗一蠔雖不足豪亦可以高也南越志蠔生海島邊如拳石四面漸長有高一二丈者每一房内蠔肉一片海夷以斧揳取殻燒以烈火蠔即啓房挑取其肉趣市以易醑嶺表録異集蠔相粘為山十百各自生韓詩本朝薄宦遊海鄉雅聞静康蠔中厨烈熖炭燎以柴與蒿委質已就烹鍵閉猶遁逃稍稍窺其戸青欄流玉膏人言噉小魚所得不償勞况此鐡石頑解剥煩錐刀戮力効一割功烈纔牛毛若論攻取難飽食未為饕梅聖俞蓬山側畔屹蠔山懐玉深蔵萬壑間誠齋蚶傳記瓦屋子南中舊呼為蚶子盧鈞尚書作鎮以其殻上有稜如瓦壠故名焉廣人尤重之俗呼為天臠炙嶺表録異鱟傳記鱟形如惠文冠青黒色十二足腹中有子如麻子取以作醤尤美吳録地理志鱟形如熨斗頭似蜣螂南人重之以為鮓廣州記鱟魚其殻瑩浄如青甆盌𨫼背眼在背上口在腹下尾長尺餘三稜如梭莖雌常附雄而行若摘去雄者雌者即自止腹中有子如菉豆嶺表録異集鱟實如惠文骨眼相負行韓詩本朝忽有缾罌至捲將江海來𤣥霜束龜殻紅霧染珠胎誠齋蟹經離為蟹易蠶則績而蠏有匡禮子蠏六蛫而二螯非蛇蟺之穴無所寄托者用心躁也荀子夫釋大道而任小數無異於使蠏捕鼠淮南子山中稱無腸公子者蠏也抱朴子史解系免官還第及張華裴頠之被誅也倫秀以宿憾收系兄弟梁王彤救系等倫怒曰我於水中蠏且惡之况此人兄弟輕我耶遂害之晉書傳記蠏蚭也其雄曰蜋螘其雌曰轉帶爾雅蟹二螯兩端傍行孝經援神契蠏漆相合成水博物志水蠏螯殻内皆鹹水自有味廣人取之淡煮吸其鹹汁下酒膏蠏殻内有膏如黄酥加以五味和殻􅘤之赤母蠏殻内黄赤膏如雞鴨子黄内白以和膏實其殻中淋以五味蒙以細麫為蠏饆饠紅殻蠏殷紅色巨者可以裝為酒杯虎蠏殻上有虎斑可装為酒噐嶺表録異蠏之小者每潮欲來出穴舉螯迎之名招潮子海物異名記蔡司徒渡江見蟛蜞大喜曰蠏有八足二螯令烹之既食委頓吐下方知非蠏後向謝仁祖說此事謝曰卿讀爾雅不熟幾為勤學死世說畢卓嘗曰左手持蠏螯右手執酒杯泊浮酒池中足了一生矣郭子集未遊滄海早知名有骨還從肉上生莫道無心畏雷電海龍王處也横行杜牧紺甲青筐染苔衣島夷初寄北人時離居定有石㠶覺失伴惟應海月知族類分明連􅜽􅀈形容好箇似蟛蜞病中無覔雙螯處寄與夫君左手持蠏因霜重金膏液皮日休本朝仁宗内宴有蠏二十八枚帝曰吾尚未知一枚直幾錢左右對直一千帝不悅曰數戒汝軰無侈靡一下箸為錢二十八千吾不忍也遂不食聞見錄陶穀使吳越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蠏蚎凡十餘種以進糓曰真所謂一蠏不如一蠏掇遺有蠏無監州見通判類半殻含黄宜㸃酒兩螯斫雪勸加餐東坡相憶樽前把蠏螯海饌糖蠏肥霜臍嘗食新形模雖入婦人笑風味可解壯士顔怒目横行與虎争寒沙奔火禍胎成雖為天上三辰次未免人間五鼎烹山谷滿腹紅膏肥似髓貯盤青殻大於杯梅聖俞横行湖海浪生花糟粕招邀到酒家酥片滿螯疑作玉金穣鎔腹未成沙誠齋記纂淵海卷九十九
