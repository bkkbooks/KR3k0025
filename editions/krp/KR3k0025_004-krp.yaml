body:
  text: 記纂淵海卷四宋潘自牧撰祥瑞部芝草史漢武帝元封二年詔甘泉宫中産芝九莖連葉作芝房之歌前本紀芝房歌云齋房産草九莖連葉宫童効異披圗按諜𤣥氣之精回復此都蔓蔓日茂芝成靈華禮樂志宣帝神爵元年詔金芝九莖産於函徳殿銅池中本紀明帝永平十七年芝草生殿前後本紀章帝建初三年零陵獻芝草五年同本紀章和元年詔芝草之類嵗月不絶同上順帝時臨城縣生紫芝宋書武帝時㐮陽獲紫芝齊書隋文帝開皇十九年朱雀等十六門生芝草隋書唐太宗貞觀十七年安禮門御榻産靈芝五莖又太子寝室中産紫草十四莖並為龍興鳳翥之形又滁州言所部川源徧生芝草舊唐本紀𤣥宗天寳中有玉芝産于大同殿之柱礎一本兩莖神光照於殿本紀肅宗上元中延英殿御座生玉芝一莖三花御製玉靈芝詩本紀張九齡母喪有紫芝産座側本傳傳記王者慈仁則紫芝生食之令人延年孫氏瑞應圗王者寵近耆老養有道則芝莢生同上摇光則陵山𤣥芝生春秋運斗樞王者徳至草木則芝草生孝經援神契漢桓帝時芝草生中黄藏府東觀漢記唐貞觀十九年李樹生芝英赤蓋紫光色鮮麗唐春秋肅宗上元二年皇后奏含暉院生金芝同上梁大同九年金芝二十八莖生平水署少府卿蕭介以聞大同起居注王者徳至于山則芝實茂白虎通黄帝以五芝為房宫張厯食芝延年不終與真人同瑞令記漢建初三年零陵泉陵縣女子博寜宅内生芝草五本莖葉紫色論衡芝草一年三花食之令人眉夀度世栽紫芝者其栽如豆並同上集武帝之世芝房寳鼎之歌薦于郊廟班固西都賦序魏文帝青龍元年神芝産于長平之習陽許昌𢎞農中郎蔣充奉表以聞其色丹紫其質光耀上别為三榦分為九枝散為三十六莖妥綏連屬有似珊瑚之状考圗按譜蓋美乎前代矣繆襲神芝賛濯靈芝於朱柯張平子賦玉芝含秀而晨敷孫綽賦煌煌靈芝一年三秀嵇康詩蓂莢史蓂莢生於階下隨月盈虧依厯開落晉天文志詳見儀象類傳記堯時瑞草號蓂莢生於階下每朔日生一葉月半至十五葉自十五日已後日落一葉月終而盡落月小盡則餘一葉厭而不落帝王世紀蓂莢者葉圓而五色一名厯莢聖明之瑞也孫氏瑞應圗周公輔幼主不矜則蓂莢生尚書大傳周公作樂而治蓂莢生尚書中候老人星臨國則蓂莢生春秋運斗樞箕星得則蓂莢生同上王者徳至于地則蓂莢生孝經援神契按孝經説古太平蓂莢生階其味酸王者取以調味後以醯醢代之風俗通黄帝之時有蓂莢者瑞草也葢神靈之嘉應也徐整正厯王者考厯得其分度則蓂生于階莢者樹名也白虎通連理木史漢武帝幸雍得竒木枝旁出復合上異之終軍曰衆枝内附示無外也殆将有削左衽而蒙化者漢書明帝永平十七年樹枝内附西南夷慕義貢獻西域諸國遣子入待後漢宋文帝元嘉中有榖櫟二樹連理宋書盩厔縣獻連理樹植之宫庭隋書貞觀十八年山南獻木連理交錯玲瓏有同羅目一丈之榦并枝者二十餘所唐書又二十一年玉華宫李樹連理隔濶合枝同上傳記王者徳化洽八方合為一家則木連理孫氏瑞應圗王者不失民心則木連理同上王者徳至草木則木連理白虎通連理者或枝還合或兩樹合拱晉中興證祥説集皇樹嘉徳風靡雲披有木連理别榦同枝将承大同應天之規曹植魏徳論司空咸寜王尹蒲之七年連理生于河之東邑野夫来告且曰吾不知古殆氣之交暢也維吾王之徳交暢者有五云云殊本連理之柯同榮異隴之禾吾徯之産兹土也久矣願記頌詞長言之于康衢頌曰木何為兮此祥洵厥美兮在吾王願封植兮永固俾斯人兮不忘韓文咸寜王渾瑊也朱草子太清之世四時不失其序日月揚光五星循軌則朱草生淮南子朱草状似小桑纔長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及金石銀投其中立可為丸泥以金投其中名曰金漿以玉投之名曰玉漿服之皆長生也抱朴子聖人至徳上及太清下及太寜中及萬靈則朱草生鶡冠子史光武時朱草生於水涯後漢書武帝時朱草生晉書傳記朱草百草之精也聖人之徳無所不至則生孫氏瑞應圗又曰王者徳無所不通四方有歌咏之聲大戴禮王者徳下究地之原則朱草生尚書大傳帝命周公踐祚朱草暢生同上文命咸得俊乂在官則朱草在郊尚書中候堯徳清平比隆伏羲故朱草生郊同上君乘火而王其政訟平則地生朱草禮斗威儀王者徳洽于地則朱草生食之令人不老春秋感精符樞星正則朱草生運斗樞君勸農事無奪民時使之嵗不過三日行什一之税進經術之士開通障塞恩及草木則朱草生繁露王者徳至草木則朱草生孝經援神契朱草赤色也可以染絳别成黼黻之服則為尊卑之差白虎通魏文帝欲受禪朱草生於文昌殿側魏畧嘉禾經唐叔得禾異畆同穎獻諸天子王命唐叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾亡書序誕降嘉種維秬維秠維穈維芑詩史宣帝元康四年嘉穀𤣥稷降於郡國前本紀安帝時九真嘉禾生五百六十本七百六十八穂後本紀魯恭拜中牟令嘉禾生恭便坐庭中本傳魏文帝欲受禪郡國三嘉禾生魏志㑹稽南始平言嘉禾生明年改元曰嘉禾孫權傳元帝初藉藁草悉成禾晉書文帝時醴湖生嘉禾一莖九穂宋書元嘉三十五年嘉禾生華林園十株七百穂孝武帝大明元年嘉禾生清暑殿鴟尾中一株六穂並同上武帝時固始縣嘉禾一莖六穂新蔡縣又獲一莖九穂一莖七穂齊書開元十九年揚州奏魯生稲二百一十五頃再稻一千八百頃其粒與常稻無異唐書太子生之嵗豫州獻嘉禾乃更名豫代宗紀宣宗大中二年福建進瑞粟十五莖莖有五六穂同上郭子儀言寜朔縣界荒地十五里有黒禾穀出徧地掃盡經宿復生其禾圎實味甘美臣以為天啟聖主先瑞百穀故漢稱雨粟周頌来牟豈若瑞禾自出家給人足蓋陛下務本重農之應也本傳傳記嘉禾五穀之長盛徳之精也文者則異本而同秀質者則同本而異秀此夏殷時嘉禾也孫氏瑞應圗周時嘉禾三本同穂貫桑而生其穂盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之徳乃獻文王之廟同上成王有苗異畆同穂王召周公問之對曰三苗為一穂抑天下其和為一乎尚書大傳嘉禾莖長五尺三十五穂尚書大𫝊神農作耒耜天應以嘉禾禮含文喜綏五器明五禮則五禾應以大豐同上人君乘土而王其政昇平則嘉穀並生禮斗威儀堯時嘉禾七莖連三十五穂詩含神霧璇生得嘉禾液春秋運斗樞王者徳至于地則嘉禾生孝經援神契光武生于濟陽縣舍時有嘉禾一莖九穂縣境大熟因名曰秀東觀漢記章帝時嘉禾嘉麥日月不絶同上梁大同六年始平獻嘉禾一莖十七穂梁起居注嘉禾者大禾之為美瑞者也白虎通王者徳盛則嘉禾生嘉禾者仁卉也其大盈箱一稃二米國政質則同本而異穎國政文則同穎而異本晉證祥説集嘉禾六穂我穡曷蓄文選共穂之禾史不絶書同上嘉穀順成靈貺昭格天人合應遐邇栁文賀嘉禾表植物知仁祥圗應聖靈嶽不愆於賛佑燕谷用遂于生成豐稔既均知朔南之被澤休嘉克叶見天地之同和六穂慙稱於漢臣異畝恥書於周典同上豐年經乃亦有秋書嵗則大熟金縢華黍時和年豐宜黍稷也亡詩序牧人乃夢衆維魚矣大人占之實維豐年詩自古有年詩曽孫之稼如茨如梁曽孫之庾如坻如京乃求千斯倉乃求萬斯箱詩綏萬邦屢豐年詩豐年秋冬報也豐年多黍多稌亦有髙廪詩並序穫之挃挃積之栗栗其崇如墉其比如櫛詩自今以始嵗其有詩自天降康豐年穣穣詩順豐年周禮魯桓公冬有年注云五榖皆熟為有年也公羊傳曰僅有年也春秋宣公冬大有年注云五穀大熟為大有年公羊傳曰大豐年也春秋三時不害而民和年豐也左傳昔周饑克殷而年豐春秋譬如農夫是穮是蓘雖有饑饉必有豐年同上國無道而年穀和熟天贊之也鮮不五稔同上子樂嵗終身飽樂嵗粒米狼戾富嵗子弟多賴俱孟子風雨常均年穀常豐列子使物不疵癘而年熟穀荘子寒暑和節而五穀以時熟荀子黄帝之治天下風雨節五穀登淮南子嵗時熟而不凶同上嵗星所居而五穀豐昌同上史五星不失行則年用豐昌前天文志文帝時天下殷富粟至十餘錢史律書是以元年膏雨降五穀登此天所以相陛下也前賈山傳至言武帝元鼎五年詔巡祭后土以祈豐年本紀景星歌云上天布施后土成穣穣豐年四時榮禮樂志甘露降五穀登此和之至也公孫𢎞傳賢良䇿宣帝元康四年比年豐穀石五錢本紀百姓安之嵗數豐稔榖至石五錢農人少利食貨志詔上帝之祠朕親奉祀為百姓獲豐年焉郊祀志以四時祠江海為天下祈豐年焉同上光武建武三年野穀旅登麻菽尤盛後本紀明帝永平九年大有年本紀十年詔昔嵗五穀登衍今兹蠶麥足収其赦天下十二年嵗比登稔百姓殷富粟斛三十並同上章帝詔増脩羣祀以祈豐年本紀嵗星守心年穀豐後郎顗傳斗覆豐穣隋文帝志唐太宗貞觀初户不及三百萬絹一匹易粟一斗至四年米斗四五錢人行數千里不齎糧民物蕃息唐食貨志五六年頻嵗豐稔一匹絹易粟十餘斛馬周傳𤣥宗海内富實米斗之價十一二青齊間斗纔三錢食貨志集憂國願年豐杜詩本朝有年秋屢實歐陽公惟幸嵗之穣兹惠豈人力非徒給租調且可銷盜賊從今潔鬴廪相與飽麰麥至治臻無事年豐樂有成豐年氣候和年豐千里無夜驚嘉瑞奏豐年歸田仍值嵗豐穣老農亦豈知帝力聽我歌此豐年詩相隨簫鼔樂豐年並同上此生已覺各無事今嵗仍逢大有年東坡聖功恵我豐年食未有涓埃可報名山谷堆塲結藁騐豐年陳後山勸相秋郊開稔熟麥秀知春力時和騐嵗豐並同上麒麟經黄帝時麒麟在囿書傳麟之趾振振公子吁嗟麟兮詩西狩獲麟春秋天不愛道地不愛寳人不愛情故麟在郊藪禮子麒麟夀千嵗抱朴子叔孫氏子鉏商獲麟以為不祥孔叢子王者好生故麒麟逰其郊野孫卿子麟者𤣥枵之獸隂之精也徳能致之其精畢至鶡冠子麟之為靈昭昭也韓子史刳胎殺夭則麟不至也史章帝時麟五十一見終軍從幸雍獲白麟一角五蹄漢史吕光入姑臧時麟見百獸從之光以為瑞晉史晉愍帝時有白麒麟神璽出於江寜其文曰長夀萬年晉史齊中興二年宣城内鑿井得鏤麒麟一枚齊史蜀王建武成元年麟見璧州永平二年麟見文州三年麟見永泰四年麟見昌州天祐二年有獸入吳興一角而麟趾宋史傳記麟水精也鬭則日無光孔演圗記麒麟麕身牛尾含仁懐義音中律吕歩中規矩不履生蟲不踐生草牡曰麒牝曰麟王者之嘉瑞也漢苑麟牡鳴曰逰聖牝鳴曰歸和夏鳴曰扶㓜秋鳴曰養緩祥瑞記麟一角明海内共一主也春秋傳麟生於火㳺於土故修其母致其子五行之精月令傳記王濬平吳被謗上表曰夫猛獸當塗麒麟恐懼晉記孔子夜夢豐沛有赤煙顔回子貢徃觀之至楚西北范氏之廟有芻兒麟伏其前折左足束薪而覆之孔子發薪下麟視孔子趨而往蒙其耳吐三卷書孔子精而讀之捜神記大道盛兮麟鳳逰今非其時兮来何求麟兮麟兮我心憂孔子使麒麟可得繫而羈兮又何以異乎犬羊賈子皇矣大角降生靈獸視明禮修麒麟来孚春秋既書爾來告就庶士鉏商獲諸西狩蔡邕麟頌懿哉麒麟惟獸之伯屏營唐日帝堯保禄天作聖帝享兹萬國薛綜麟頌㳺必擇地翔而後出徳無不王為之折服武昭王麒麟頌早聞黄閣畫麒麟衆中見毛骨猶是麒麟兒杜甫本朝麟有趾而不踶仁哉麟哉有角而不抵仁哉麟哉有額而不觸仁哉麟哉今之人一朝之忿以觸人滅身辱親嗚呼人中有獸獸中有人矣山谷麟趾賦騶虞經吁嗟乎騶虞詩武王克殷後散軍郊射左射貍首右射騶虞禮子白虎黑文不踐生草不食生物也騶虞之化行則人倫正朝廷治庶類蕃殖蒐田以時則王道成矣朱子史漢宣帝時東立宗廟告祠仁獸銜肉致於殿前神雀元年詔曰南郡獲白虎朕之不明震於珍物漢史宋元嘉十六年琅邪有虎從騶虞宋史騶虞吾不知其何物也賈誼以謂騶者文王之囿虞者虞官也然則以之為獸者其出於近世之説乎五代史傳記騶虞如虎五色尾長於身日行千里人君有至信之徳則應之山海經女華之妃曰扶始升丘見白虎其上有雲感以生咎繇元命苞文王拘羑里散宜生等得白虎以獻紂免西伯之難尚書大傳前蜀永平三年騶虞見璧山有二鹿隨之蜀傳集騶虞不折生草莖梁甫吟騶虞不虛来李白般般之獸樂我君囿白質黒章其儀可嘉旼旼穆穆君子之態蓋聞其聲今親其來厥塗靡蹤天瑞之徵司馬相如孟山有獸仁心為質有道則見非時不出白居易賛獬豸子堯時有獬廌緝其尾為帝帳史侯思止髙元禮宻教曰上不次用人如問君不識字宜對獬廌不學而能觸邪陛下用人安事識字無何后問思止以對后大悦史獬廌神竒之獸一名任法狀如羊古者決訟令之以觸不直黄帝時有遺者帝問何食飲曰食薦春夏處水澤秋冬處松栢説文傳記東北荒中有獸如牛一角尾青四足如熊見人鬬則觸不直聞人論則咋不正名獬豸一名任法獸神異經獬豸神羊也輿服志殿中侍御史朝㑹乘馬具服戴黒豸升殿百官志𤣥宗時富平縣産一神羊肉角當頂白毛上捧議者以為獬豸酉陽雜爼鳳凰附鸞鸑鷟鵷雛神爵經簫韶九成鳳凰来儀書鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽翽翽鸞聲詩羽蟲三百六十而鳳凰為之長禮子少皡之立也鳳鳥適至故為鳥師剡子鳳鶉火禽陽之精徳能致之其精畢至鶡冠子昔者三皇鳳至於庭三代鳳至於門周室鳳至於澤淮南子南方有鳥名鵷雛非梧桐不棲非竹實不食非醴泉不飲荘子鸞鳥似鳳而白纓聞樂則節而舞至則國安寜抱朴子史黄帝服齋於宫中有大鳥備五色文巢於阿閣史堯敷政七十載鳳凰来巢舜好生惡殺鳳凰巢其樹文王鳳鳴於岐山史漢武帝時神爵集郡縣因改元神爵宣帝祀后土鸞鳥集長樂宫史韓瑗與禇遂良相繼去内外以言為諱帝造奉天宫御史李善感始上䟽極言時人謂之鳳鳴朝陽唐史傳記周昭王以青鳥之毛為二裘後人得之片羽則準千金拾遺記石季龍皇后有詔書五色紙着鳳口中銜之鄴中記揚雄著太𤣥夢吐白鳳西京雜記蕭史與其妻㺯玉吹簫於鳳凰臺引鳳凰至夫婦乘之飛去列仙傳薛元敬與收及徳音齊名世稱河東三鳳唐書鳳有六象頭象天目象日背象月翼象風足象地尾象緯其徳九苞其文五采傳明皇逰月宫見素娥皆皓衣乘白鸞舞於大桂下龍城錄集晨逰紫霧夕飲𤣥霜資長風以舉翰戾天衢而逺翔西翥則烟氛閟色東飛則日月騰光唐太宗賦神鸞垂玉音陶潜朝鳴崑崙丘夕飲砥柱湍歸飛海路逺獨宿天霜寒鸞乃鳳之族翺翔紫雲霓文章輝五色棲在瓊樹枝靈鳳託髙梧凌風何翩翩鳳飛九千仞五章備綵珍李白一毛生鳳鵷杜甫朝餐琅玕實夕飲玉池津江文通本朝應升中而降止覽徳輝而下之嘗逰郊藪詎集藩籬則有揚雄之吐蕭史之吹賞僧綽之戯奪荀朂之池呉淑賦記纂淵海卷四
