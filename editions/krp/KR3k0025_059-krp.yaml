body:
  text: 記纂淵海卷五十九宋潘自牧撰論議部事難定論子仁義道徳常安術也然而未必不危也汙漫突盜常危術也然而未必不安也荀榮辱謂夏必長而麥枯冬必凋而竹栢茂又盛陽宜暑而夏未必無涼日也極隂宜寒而冬未必無暫温也抱樸子水主純冷而有温谷之湯泉火體宜熾而有蕭丘之寒焰重類應沈而南海有浮石之山輕物當浮而䍧柯有沈羽之流同上史晉司馬侯曰或多難以固其國啟其疆土或無難以䘮其國失其守宇齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦䘮之左昭四年孔子曰使仁者而必信安有伯夷叔齊使智者而必行安有王子比干孔子世家智者千慮必有一失愚者千慮必有一得西漢韓信傳馬或奔踶而致千里士或有負俗之累而立功名漢武帝紀韓明宗曰茍有竒才雖屠釣奴虜之賤亦可用之茍非其人雖三后之胄自墜扵皂𨽻矣後魏書夫吉凶之扵人猶影響也為善者得吉常多其不幸而罹扵凶者有矣為惡者未始不及扵凶其幸而免者亦時有焉新唐書集盛衰無常惟受所丁東都賦不見公與相起身自犂鋤不見三公後寒飢出無驢韓集事有定分經死生有命富貴在天語顔淵子分定故也孟子楚王後車千乗非知也君子啜菽飲水非愚也荀天道兎走於街百人追之貪人具存人莫之非者矣得兎為定分也積兎滿市過不能顧非不欲兎也分定之後雖鄙不争慎子互入事同體異史庶人之富者或累巨萬而貧者或不厭糟糠史平準書布帛尋常庸人不釋鑠金百鎰盜跖不摶非庸人之心重尋常之利深而盜跖之欲淺也史李斯傳竇姬入侍太后出宫人賜諸侯竇姬在行中姬家在清河欲如趙請其主遣宦者使置我趙籍中宦者忘之誤置代籍中至代王獨幸生兩男及文帝立姬立為皇后長男為太子史外戚世家漢文使善相者相鄧通相曰當貧餓死上曰能富通者在我何說貧於是賜通蜀道銅山得自鑄錢景帝立有告通徼外鑄錢案没入之竟不得一錢寄死人家西漢佞幸傳班彪曰饑饉流𨽻飢寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也通鑑萬人逐兎一人獲之貪者悉止分定故也東漢袁紹傳集浮生有定分飢飽豈可逃杜工部高馬達官厭酒肉此輩杼軸茅茨空同上中人愛富貴高士慕神仙神仙須有兼富貴亦在天白樂天或有終老者沈賤如泥沙或有始壯者飄忽如風花同上所賦有厚薄不可移者命鵬鷃高低事皆定茍無金骨相不列丹臺名同上顔回簞瓢纔自給肥膿不到口年不登三十張蒼幸愛浩無際妾媵填後房竟壽百餘歲白樂天互入分量不同事難詰問萬户侯須骨上來劉賔客貴人自貴貧自貧元㣲之集蓬累江湖坎壈中歳衣不襲突不黔彼乗堅驅良滅没扵康莊者復何人哉繇是而言可以言命權載之譬之求珠扵海而徑寸先得則餘皆決然罷去知竒寳之有歸也柳文髙流之為徐州刺史河决水繞城破一古墓得銘曰死後三百年背底生流泉賴逢高流之遷吾上髙原流之為造棺槨改𦵏之朝野僉載事難詰問經伯牛有疾子問之曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也語雍也子冉耕字伯牛以徳行著名而有惡疾子曰命矣夫家語彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽十八仲尼之徳不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位季札無爵扵吴田恒専有齊國夷齊餓扵首陽季氏冨扵展禽列子兎絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴淮南子夫顔回季路子夏冉伯牛孔子之通學也然顔淵殀死季路葅扵衛子夏失明冉伯牛為厲同上精神訓史伯夷叔齊積仁累行如此而餓死回也屢空而卒早殀盗跖暴戾恣睢横行天下竟以夀終史記伯夷傳伯竒孝而棄於親子胥忠而誅於君西漢諸葛豐傳長平坑卒未必盡犯三刑南陽貴人豈必俱當六合通鑑唐紀康澄上䟽曰雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長同上後唐明宗紀傳記天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動說苑集日何為兮右轉天何為兮左旋磐石何神兮立天地巨靈何聖兮造山川螟何細兮師曠清耳而不聞離朱拭目而無見鵬何壯兮摶扶摇而翔九萬運海水而撃三千龜與蛇兮異其長短之質椿與菌兮殊其小大之年鐘可鳴兮應霜氣劔何伏兮動星躔列子何方兮御風而能行師丹何術兮驗火而登仙魯陽揮戈兮轉于西日陶侃折翼兮登乎上𤣥女何寃兮化精衛帝何恥兮化杜䳌唐文粹楊伯渾天賦以為天不知人事耶則周公有風雷之災宋景有三次之福以為知人事乎則楚昭有弗禜之應邾文無延朝之報曹植相論天意高難問杜工部自古聖賢多薄命奸雄惡少封公侯同上金張世禄原憲貧白樂天人生少滿百不得長歡樂誰謂天地心千齡與龜鶴同上愚者多貴壽賢者多賤殀謂天不愛人胡為生其質謂天果愛人胡為奪其年並同上當秦之敗亂得一士而可王何五百人之擾擾而不能脫夫子扵劍鋩抑所寳之非賢亦天命之有常韓愈祭田廣文自古賢者少不肖者多自省事以來又見賢者恒不遇不賢者比肩青紫賢者恒無以自存不賢者心得意滿賢者雖得卑位則旋而死不賢者或終眉壽不知造物者竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生壽殀耶未可知也韓文與崔書羣顔淵簞瓢纔自給肥膿不到口年不登三十張蒼幸愛浩無際妾媵填後房竟壽百餘歳白樂天互入分量不同事有定分叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匐匍也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎韓文豈蕩而為太空與化無窮也將結而為耀光以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳯為麟為景星為卿雲以冩其神乎將為金為銀為圭為璧以栖其魄乎豈復為賢人以績其志乎將奮為神明以遂其義乎不然是昭昭其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎柳文互見弔祭門貴不必賢壽不必仁天之不可恃也乆矣柳文孰致也而生孰召也而死焉従而來焉往而止交州産多竒怪草木亦殊異吾怪陽徳之炳耀獨滿扵芬葩濃麗而罕鍾乎人氣之靈不為偉人而獨為是物故楚之南少人而多石同上殀顔病冉孔不知其故杜牧之集信乎天地鬼神之無情扵善人為善者將安所歸乎李習之集天道之用莫神於龍受戮為醢不知其凶王者之瑞莫聖扵麟遇害於野不知其仁元㣲之集誰知天地意獨與龜鶴年白樂天謂善之福夷死何餓謂惡之禍跖死何肥皇甫湜何聖者千年而愚者其麻鳯凰不下而雞滿家何草木不芝盡野而莎何虫不龍盡水而蝦玉何為而脆石何為而頑明允何蹙宵小何蕃何麟而怪何鶴而軒同上何闔閭之死金玉其墓何黔婁之死手足不覆孰主張其事而顛倒其數直道天何在同上本朝顔回飲瓢水陋巷卧曲肱盜跖厭人肝九州恣横行回仁而短命跖壽死免兵愚夫仰天呼禍福豈足憑歐公集人獸生而有知死則無知矣蓍龜生而無知死然後有知也是皆不可窮詰同上行豐而腴乃享其癯莖華雖敷不的而枯歐公祭質夫文世之言曰死者漸之今之來兮是耶非耶歐公集豈有聲名髙後世遂無饘粥永今朝臨川集胡為而然胡負扵天誰不壽考獨嗇其年誰不富貴使終賤寒老蘇集如海上沙是誰磋磨而能勻平無有麄細如空中雨是誰揮灑自然蕭散無有踈宻東坡書若達經將軍百戰竟不侯伯郎一斛得凉州東坡淮山邃秀鍾草木不産英髦産嘉卉梅聖俞事難強為經凡居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜五方之民皆有性也不可推移記王制子物之不齊物之情也或相倍蓰或相什百或相千萬子比而同之是亂天下也孟子滕文上性長非所斷性短非所續杜子駢拇篇謂鳬脛短鶴脛長強哭者雖疾不哀強歡者雖笑不樂淮南子史貴逰之子未必有斬將搴旗之才従軍征伐之役通鑑晉元集方鑿不受圓直木不為輪韋應物互兩不相與莫將山下松結託水上萍白樂天事有簡徑子夫水勢勝火章華之臺燒雖涸井而渇池無柰之何也舉壺榼盆盎而以灌之其滅可立而待也淮南子史畧訓史重人曰待我不如捷之速也左成五石稱丈量徑而寡失西漢枚乗傳互見操約馭詳董卓曰揚湯止沸莫如去薪通鑑後漢蘇威嘗言於帝曰臣先人每戒臣云唯讀孝經一卷足以立身治國何用多為通鑑傳記百人舉瓢而趨不如一人持而疾走戰國䇿集寸管下傃天地不能以氣欺尺表逆立日月不能以形逃陸機欲湯之凔一人炊之百人揚之無益也不如絶薪止火而已枚乘投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也事反所料經眇能視跛能履易履家人嗃嗃悔厲吉婦子嘻嘻終吝家人天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽卦東鄰殺牛不如西鄰之禴祭實受其福既濟子曰危者安其位者也亡者保其存者也亂者有其治者也易君子淡以成小人甘以壞記莫見乎隠莫顯乎㣲同上夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉君子之道闇然而日章小人之道的然而日亡同上齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓于首陽之下民到于今稱之語季氏子以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有㣲子啓王子比干孟子生於憂患而死於安樂告子下生無一日之歡死有萬世之名列子以瓦注者巧以黄金注者昬莊子以瓦摳者巧以黄金摳者惽列子天下莫相憎扵膠漆而莫相愛於氷炭膠漆相賊氷炭相息也淮南子善㳺者溺善騎者堕淮南子或欲利之適足以害之或欲害之乃反以利之利害之反禍福之門户不可不察也淮南子史天下君王至于賢人衆矣當時則榮没則已焉孔子布衣傳十餘世學者宗之史記孔子世家雍造怨而尤賞兮丁繇恵而被戮西漢班固白頭如新傾盖如故同上鄒陽傳譬如水火相滅亦相生也仁之於義敬之於和相反而皆相成也西漢藝文志千鈞浮而錙銖沈漢書柔能制剛弱能制強東漢臧宫傳桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯争與為伍者以其有徳也通鑑漢殤紀昔之為我哺乳之子孫者今盡是我飲血之冦讎也同上漢獻紀武后以易得人徳宗以猜失士唐書陸贄傳傳記昔秦攻齊令曰有敢去柳下季壠五十步而樵採者罪死不赦有能得齊王頭封萬户由是觀之生王之頭不如死士之壠戰國䇿馬援以薏苡興謗王陽以囊衣邀名續漢書有聲之聲不過百里無聲之聲延及四海說苑順帝時京師謡曰直如弦死道邊曲如鈎乃封侯風俗通集桑穀之妖反為福扵太戊大鳥之慶竟成禍扵帝辛李太白集堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖韓文原性自古多有以功徳得其位者不得常祀勾龍棄孔子皆不得位而得常祀然皆不如孔子之盛韓文孰謂少者殁而長者存强者殀而病者全耶韓祭文至柔反成堅常應篇商之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黄犀死莽郤文富貴亦有苦苦在心憂危貧賤亦有樂樂在身自由白樂天集蘇武却生返鄧通終死飢杜牧之百勝難慮敵三折乃良醫劉賔客本朝紛華暫時好俯仰浮雲散淡泊味愈長始終殊不變歐公集物固有以安而生變兮亦有以用危而求安東坡賦吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也東坡凡有物必歸於盡時恃形以為固者尤不可長雖金石之堅俄而變壞至於功名文章其傳世垂後猶為差久東坡周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其冨貴而夫子之所與共貧賤者皆天下之賢才則亦足以樂乎此矣東坡稽天之潦不能終朝而一綫之溜可以穿石東坡注金無全巧竊發或中鵠山谷后皇蒔嘉橘中嵗多成枳同上白頭無故意異代有同音後山互見離合無親疎蔡天申得温公撰吕獻可墓銘以獻王安石天申初欲中温公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見録事有凑偶經遇主于巷易不自我先不自我後詩胡不自北胡不自南同上史遭陽九之阨百六之㑹西漢王莽傳集正丁厥時選新論適丁民之有是時也韓文事與願違子樹欲靜而風不停子欲養而親不待家語人莫不欲冨貴全壽而未有能免扵貧賤死殀之禍也心欲冨貴全壽而貧賤死殀是不能至其所欲至也韓非子日月欲明浮雲蓋之叢蘭欲秀秋風敗之文中子史晉羊祜曰天下不如意常十居七八晉本傳謝安雖受朝寄東山之志始末不渝及鎭新城造汎海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失晉書集值風雲之㑹時邁齒耋文選吴季重牋可惜歡娱地都非少壯時杜詩耳聾目昬後堂上調絲竹齒牙缺落時盤中堆酒肉彼來此已去外餘中不足白樂天榮名與壯齒相避如朝暮時命始欲來年顔已先去同上繫官扵朝願莫之遂韓文虛逢好陽艶其那苦昏懵元㣲之集本朝為政一年疾病半之東坡撰温公神道碑脂車秣馬試長道一日百里先自期不知中途有陷穽山髙日暮多棘茨欒城集書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開後山好景難逢良㑹少倦㳺録事無全美經苗而不秀者有矣夫秀而不實者有矣夫語子天地無全功聖人無全能萬物無全用列子故羽翼美者傷骨骸枝葉美者傷根莖能兩美者天下無之也淮南子堯無子舜無父不如堯父舜子也揚子史肥義曰吾欲全吾言安能全吾身史記趙世家予之齒者去其角傅其翼者兩其足西漢董仲舒傳遷之博物洽聞而不能以知自全同上司馬遷賛范滂之母曰既有令名復求壽考可兼得乎漢范傳忠孝之節道不兩立東漢袁紹傳晝長則宵短日南則景北天且不堪兼况以人該之同上張衡傳夫人才行少能相兼通鑑孔明紀忠臣不為孝子吳志䘏逺者略近事外者簡内也通鑑漢和紀晉羊祜曰天下不如意事十常居七八通鑑晉武紀互人事與願違周處曰忠孝之道安得兩全既辭親事君父母安得而子乎晉書本傳互見狥公忘私自古忠賢工謀扵國則拙於身多矣唐書王忠嗣傳養由基射能穿札不止鄢陵之奔陸機識能辨亡無救河橋之敗唐魏元志傳傳記意不並說事不兩隆盛於彼者必衰扵此長扵左者必短於右說苑父賢不過堯而丹朱傲子賢不過舜而瞽瞍拘兄賢不過舜而象傲弟賢不過周公而管叔誅臣賢不過湯禹而桀紂伐韓詩外傳四足者無羽翼戴角者無爪齒大戴禮易本命明月之珠不能無考不平也夜光之璧不能無纇史通取恱小人見嗤君子同上翟備五色而翔翥百步肌豐而力沉也鷹隼無采而翰飛戾天骨勁而氣猛也文心雕龍集尺有所短寸有所長智有所不明數有所不逮神有所不通椘辭甘𤓰抱苦蔕美棗生荆棘古詩瞽瞍清耳而無伶倫之察選連珠麗物苦偽醜器多牢魏阮瑀文質論良辰美景賞心樂事四者難併謝靈運擬魏太子郢中詩集序耀乗之珠不能無纇連城之璧不能無瑕陸質奏議人生半哀樂天地有順逆杜詩荔枝非名花牡丹無甘實白侍郎明月清風三五夜萬人行樂一人愁同上既竊時名又欲叨時之富貴使已造物者肯兼與之乎白傅集詞人命薄多無位戰將功高少有文同上以揚馬之才則不知教化以荀陳之道則不知文章柳見論文互見得此失彼同涉于川其時在風㳂者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄劉賔客光武出於支庻少康不及君親王㣲集日月髙明有時傾冥珠玉貞潔不免疵瑕歐陽詹文全功難持大明難堅日赫扵晝而乏清媚月皎扵夜而無温煦李文饒鵬鷹不傳之以馳驟驊騮不授之以鶱翥同上周勃霍光雖有勲伐而不知儒術枚臯嚴助善為文筆而不至廊廟貴則近禍冨多不仁同上及親之貴自古罕兼老莱則空耀綵衣多慚紱冕潘岳則惟稱壽酒固乏鼎彛司空表聖文賢不及富壽不及賢皇甫湜集荆璧不能無瑕隋珠不能無纇唐文粹譽髙千載道屈一時天乎與人才乎無命同上本朝君子之學或施之事業或見之文章而常患扵難兼也盖遭時之士功烈顯於朝廷名譽光於竹帛故其常視文章為末事而又有不暇與不能者焉至於失志之人窮居隠約苦心危慮而極力精思與其有所感激發憤惟無所居扵世者皆一寓於文辭故曰窮者之言易工也如唐之劉柳無稱於事業而姚宋不見扵文章彼四人者猶不能扵兩得况其下者乎歐文韓簡肅公文集百世一人千載一時惟時與人鮮儷常竒東坡祭司馬君實文惟有文為不朽與有子為不死雖冨貴壽考之人未有皆有此二者也東坡祭柳子厚文耕田欲雨刈欲晴去得順風來者怨若使人人禱輙遂造物應須日千變東坡詩故教窮到骨要使壽無涯同上漢之賈誼談論俊美止於諸侯相而陳平之屬實為三公唐之韓愈磊落終於京兆尹而裴度之倫實在相府夫陳平裴度未免謂之不文而韓愈賈生亦常悲於不遇盖人之於世美惡必有所偏而天之於人賦予亦莫能備欒城集互見事反所料従昔嬋娟多命薄陳後山事難遥度經如匪行邁謀是用不得于道詩小旻箋不行而坐謀逺近是於道路無進於跬步史傳聞不如親見東漢馬援傳傳聞與指實不同懸筭與臨事有異通鑑趙充國曰百聞不如一見兵難遥度臣願馳至金城圖上方略西漢趙充國傳事有難易經天下國家可均也爵禄可辭也白刄可蹈也中庸不可能也記子曰貧而無怨難冨而無驕易語子挾㤗山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也孟子先甲一日易後甲一日難揚先知客有為齊王畫者問之畫孰最難曰狗馬最難孰最易曰鬼魅最易狗馬人所知也旦暮扵前不可類也故難鬼魅者無形無形者不可覩故易韓子禹能决江䟽河以為天下興利不能使水西流稷能闢田墾草以為百姓力農而不能使冬生禾淮南子史鐫金石者難為功摧枯朽者易為力吏道以法令為師可問而知及能與不能自有資材何可學也通鑑言成事者以功著易顯謀幾初者以理隠難照東漢邳彤傳魏韓顯宗曰使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而說通鑑宋紀傳記忠於治世易忠於濁世難吕氏春秋集危於累卵難於上天易於反掌安於㤗山選書儀天步晷而修短可量臨淵揆水而淺深難察選演連珠夫力易强而有功也心難强而有智也韓文將新變故易持故為新難東野本朝道可以講習而知徳可以勉強而能惟知人之明不可學必出乎天資而蕭何之識韓信此豈有法而可傳者哉東坡擬對䇿譬如江河之徙移順其所欲行而治之則易為功强其所不欲而復之則難為力東坡議學校貢舉狀事皆有法子離婁之明公輸子之巧不以規矩不能成方圎師曠之聰不以六律不能正五音孟離婁上盗亦有道莊子公輸不能加於繩墨荀法行釋法而為治堯不能正一國使中正守法拙匠執規矩尺寸則萬不失一也韓非子無準繩雖魯班不能以定曲直淮南子斷木為棋捖革為鞠亦皆有法揚子史譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左襄十三不習為吏視已成事西漢賈誼傳謀事必就祖發政占古語西漢韓安國傳事有次第經若升髙必自下若陟遐必自邇書太甲下君子將營宫室宗廟為先廐庫為次居室為後記曲禮下凡畫繢之事後素功周禮考工記凡家造祭器為先養器為後同上未有入室而不由户者記禮運君子之道譬如行逺必自邇譬如升髙必自卑中庸物有本末事有終始知所先後則近道矣大學子曰繪事後素語八佾子堂上不糞則郊草不瞻曠云荀強國注堂上惜未糞除則不可瞻曠郊野之草也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此故先後上下不可不審淮南子史僑聞學而後入政未聞以政學者也左襄三十一譬猶行舟雖不横截迅流然當漸靡而往稍向所趨然後得濟也通鑑集春雨潤木自葉流根文選将欲茂枝葉必先救根株白樂天本朝今世稱善草書者或不能真行此大忌也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡書唐六家書後事久論定子人有亡鈇者意其隣之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而相其谷而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子史臧文仲既没其言立左襄二十五子産從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之左襄三十子順曰民之不可與慮始乆矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及賢庸知謗乎通鑑子順曰先君相魯人誦曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰衮衣章甫實獲我所章甫衮衣恵我無私同上張湯既死家産直不過五百金昆弟諸子欲厚葬母曰湯為天子大臣被汙惡言而死何厚𦵏乎載以牛車有棺無槨天子聞之乃盡案誅三長史通鑑漢武紀劉敬使匈奴還言不可擊時漢兵已發上怒械繫敬至平城匈奴圍帝七日得解帝赦敬曰吾不用公言以困平城吾已斬前使十輩言可擊者矣乃封敬為侯史本傳充國奏每上輙下公卿議臣初是充國計者什三中什五最後什八西漢本傳所居無赫赫名去後常見思西漢何武傳要之死日然後是非乃定司馬氏傳王邑嚴尤謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也自雄之沒至今四十餘年其法言大行揚雄傳昔卞和獻寳以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善東坡班固傳陳寔為功曹中常侍侯覽託太守髙倫用吏倫教署為文學寔知非其人懷檄請見曰此人不宜用而侯常侍不可違寔乞従外署倫從之鄉論訕其非舉倫後為人言曰吾前為侯常侍用吏陳君宻持教還而於外自署比聞議者以此少之此咎由故人畏憚強禦陳君可謂過則稱已者也寔因自引愆聞者方歎息同上本傳互入分謗論者或譏陳羣居位拱黙正始中詔撰羣臣上書以為名臣奏議朝士乃見羣諫事皆歎息焉通鑑三國魏明記樂廣為尚書令所在無當時之功譽然去後為後人所思晉書初王敦之舉兵也周顗表救王導言甚切至導不知救而甚銜之既誅顗導後料檢中書故事見顗表救己殷勤欵切執表流涕周顗事王導曰人言伐貴貴後人當思此憒憒世說在官無當時譽去後為人所思謝安傳晉王珣曰王陵廷争陳平謹黙但問歳晏何如耳通鑑陽城處諫諍官士望其死職天下益憚之及受命也諫官論事苛細紛紛帝厭苦而城寝聞得失且熟猶未肯言韓愈作諍臣論譏切之居位八年而人不能窺其際及裴延齡誣逐陸贄等帝怒甚無敢言城上䟽論極延齡罪慷慨引義申直贄等累日不止聞者寒慄城愈勵唐書本傳互入不可淺量及不可窺測賢者不得志扵今必取貴扵後古之著書者皆是也唐柳宗元傳傳記天漢二年恒山西國獻續弦膠及火浣裘帝受以付庫不知二物之妙也以上貢不竒稽留使未遣㑹帝幸華林苑射虎而弩斷弦使者従駕上膠一分使口濡以續弦帝驚乃使武士數人對掣終日不斷毛裘入水經月不沈入火不焦帝重之厚賂使者而遣之十洲記豫章之木生七年而材始辨廣志集春華雖美期扵秋實水璧雖澤期扵見日晉裴頠女史箴文仲沒而其言立子産終而遺愛存張曲江集桃李盛時雖寂寞雪霜多後始青葱李義山集一發之初雖失正鵠百鍊之後方辨精鋼白帖試玉要燒三日滿辨材須待七年期周公恐懼流言日王莽謙恭未簒時假使當時身便死一生真偽有誰知白樂天千陶萬灑雖辛苦汰盡狂沙始到金劉賔客福不在於其身慶必流扵後嗣唐文粹大抵生則不遇死而垂聲者衆焉揚雄没而法言大興馬遷生而史記未振柳子厚集凡人可以言古不可以言今桓譚亦云親見揚子雲外貎不能動人安肯傳其書誠使博如莊周哀如屈原奥如孟軻壯如李斯峻如馬遷冨如相如明如賈誼専如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未嘗不薄扵當世而榮於後世也韓文本朝譬如磨鑑不滅愈光一世之短萬世之長歐公祭蘇子美文良藥不甘口厥功見沉疴忠言初厭之事至每若何歐公集又如食橄欖真味久愈在同上後世茍不公至今無賢聖同上松柏生於山林其始也困扵蓬蒿厄扵牛羊而其終也貫四時閱千年而不改者其天定也東坡三槐堂記一時之屈萬世之信東坡王元之畵像賛序始以帝堯之聰姑試伯鯀終為孔子之聖不信宰予東坡責吕恵卿文人去方知徳業尊欒城集端如嘗橄欖苦過味方永山谷詩難以口苦争水清自見石同上和氏有尺璧楚國無人知但知玉非石果有遭逢時同上互見解寃是真難滅事變無常經城復于隍易悠悠蒼天曷其有常詩髙岸為谷深谷為陵詩子臭腐化為神竒神竒復化為臭腐莊子傳記麻姑謂王方平曰自接侍以來見東海三為桑田向聞蓬萊水亦淺於往者㑹時畧半也顔真卿麻姑壇記集悲㤗山之為隍注城下地也楚辭繁華有憔悴堂上生荆杞阮嗣宗詠懷詩空桑之里變成洪川歴陽之都化為魚鼈劉孝標論循環飜覆迅若波瀾選廣絶交論人間百年物理千變名利寵辱之情立愛憎毁譽之迹生駱賔王東海波連天三度成桑田髙岸髙突兀斯須變谿谷天地猶尚然人情難乆全夜半白刃銛旦來金石堅盧仝本朝芙蓉芰荷之的歴幽蘭白芷之芬芳與夫佳花美木列植而交䕃此前日之蒼煙白露而荆棘也高甍巨棟水光日影動而下上其寛閒深靚可以荅逺響而生清風此前日之頺垣斷塹而荒墟也嘉時令節州人士女笑歌而管絃此前日之晦㝠風雨鼪鼯鳥獸之嘷音也歐文昔者荒草野田霜露之所蒙翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毁相尋扵無窮則臺之復為荒草皆不可知也東坡凌虛臺記世道如奕棋變化不容覆坡詩事出意表子螣蛇無足而飛荀子虞氏者登高樓臨大路設樂陳酒擊博樓上俠客相隨而行鳶適墜其腐䑕而中之俠客相與言吾不侵犯之而乃辱我必滅其家至期日之夜聚農積兵以攻㓕虞氏列子為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍然已盜至則負匱掲篋擔囊而趨惟恐緘縢扃鐍之不固也莊子魯酒薄而邯鄲圍同上藏舟於壑藏車於澤謂之固矣夜半有力者負之而走莊子毁譽萌生而不能照也淮南子日照天下蝕扵蟾蜍螣蛇㳺露而殆扵蝍蛆烏力勝日而勝扵鵻鴀同上楚㑹諸侯魯趙皆獻酒扵楚王楚王酒吏求酒於趙不與吏乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲淮南子史陳涉甕牖繩樞之子甿𨽻之人而遷徙之徒才能不及中庸非有仲尼墨翟之賢陶朱倚頓之冨躡足行伍之間而倔起阡陌之中率罷散之卒將數百之衆轉而攻秦斬木為兵掲竿為旗天下雲集響應贏糧而景従山東豪俊遂並起而亡秦族矣史記秦紀賈生論諸將皆以為得大將至拜大將乃韓信也一軍皆驚西漢韓信傳楚使者在九江方急責布發兵隨何直入坐楚使者上曰九江王已歸漢楚何人得發兵布愕然楚使者起何因說布曰事已構可遂殺楚使者無使歸而疾走漢并力布曰如使者教於是殺楚使者因起兵而攻楚通鑑漢高祖相國何以長安地陿上林中多空地棄願令民得入田毋收藁為禽獸食上大怒曰相國多受賈人財物乃為請吾苑下相國廷尉械繋之通鑑漢高紀晁錯為國逺慮禍反及身兩漢荆燕傳諸家子弟見光武絳衣大冠驚曰謹厚者亦復為之東漢光武紀諸葛亮卒于軍中長史楊儀整軍而出百姓犇告司馬懿懿追之姜維令儀反旗鳴鼓若將向懿懿斂軍退不敢偪諺曰死諸葛走生仲達懿聞之笑曰吾能料生不能料死故也通鑑魏明紀高蟬處乎輕隂不知螳蜋襲其後也晉書石苞傳蜂蠆作於懷䄂勇夫為之驚駭晉書顧禍生不意雖有智勇無所施耳通鑑晉元紀王朗言於趙王虎曰盛冬雪寒而皇太子使人伐宫材役者數萬吁嗟滿道太子宣怒㑹熒惑中房宣遂使太史令趙攬言於虎曰宜以貴臣王姓者當之虎曰誰可者攬曰無貴於王領軍虎意惜朗使攬更言其次唯中書監王波耳虎乃下詔追罪波前議楛矢事腰斬之及其四子同上晉穆紀瞻素執無鬼論忽有一客通名詣瞻寒温畢聊譚名理客甚有材辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無耶僕便是鬼於是變為異形須臾消滅晉書阮瞻傳魏杜弼曰楚國亡猿禍延樹木城門失火殃及池魚通鑑梁紀互見連累魏杜弼曰禍生骨肉釁起腹心通鑑隋帝曰譬如猛虎物不能害反為毛間蟲所損食耳同上陳紀互見禍生所忽震霆不及塞耳唐書李清傳幽州都督王君廓在州驕縦多不法徴入朝長史李𤣥道房𤣥齡従甥憑君廓附書君廓私發之不識草書疑其告已罪行至渭南殺驛吏而逃通鑑唐太宗姚崇與張說同為宰相張銜崇崇病戒諸子曰張為人好服玩吾身没之後汝其陳吾平生服玩寳帶重器羅列殮帳前張若不顧汝家事産族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時録進仍先礱石以待至便鐫刻張丞相見事常遲扵我數日之後必當有悔若徴碑文以刋削為辭當引使視其鐫仍告以昇聞上崇没張果至目其服玩者五四不數日文成叙述該詳後數日果遣使取本以為辭未周宻欲加刪改姚氏子引使者視其碑乃告以奏御使復命焉張悔恨撫膺曰死姚崇能筭生張說吾今日方知才之不及逺矣舊唐書本傳互見心服料度二類張巡守雍丘令狐潮引兵圍之城中矢盡巡縳藁為人千餘被黑衣夜縋城下潮兵争射之久乃知藁人還得數千萬矢其後復夜縋人賊笑不設備乃以死士五百斫潮營軍大亂唐書互見出竒門李繫者泌之子也陽城盡䟽延齡姦惡欲宻論之以繫故人子使之繕冩繫徑以告延齡延齡先詣上一一自解䟽入上以為妄不之省通鑑唐徳宗傳記蠧蝝仆柱梁䖟蚊走牛羊說苑集是胡越起於輦下而羌夷接軫也司馬相如諫獵互見禍生所忽梁之亂兮陸受其毒徐之難兮鄭罹其殃唐文粹互見連累魯酒致邯鄲之圍飛鳶生博者之禍劉賔客本持鄉曲譽肯料泥途辱劉長卿百鳥畏人林野宿翻遭網羅爼其肉韋應物解帶翻成結同上疾雷不及掩耳卒電不及瞑目大公六韜本朝夫以斧析薪可謂必克然不循其理則斧可折薪不可破白鷗生意在滄浪不謂風塵有網羅臨川集謾說罷侯能置守趙髙元不是封侯邵堯夫秦詩事出望外經枯揚生荑易魚網之設鴻則離之詩發彼小豝殪此大兕詩子有不虞之譽孟離婁下麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同牀食芻豢而後悔其泣也莊子史秦燔書而易為卜筮之事傳者不絶西漢藝文志方其鼓刀屠狗賣繒之時豈自知附驥之尾垂名漢庭徳流子孫哉史記灌嬰傳互見人生明則解裋褐而襲黼黻委臿築而據文軒後漢元載在中書有丈人來投載贈河北一書丈人至幽州拆視之更無一詞惟署名而已大悔怒欲回試謁院吏斯須請書館之上客留連數日奉絹千疋通鑑華誠入翰林為學士党項擾河西宣宗召訪邊事誠援質古今條破伏𦍑甚悉帝恱曰吾將擇能帥者孰謂頗牧在吾禁署卿為朕行乎新唐書本傳傳記以一壺飱得士二人戰國䇿燕太子丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而嘆烏頭生白馬即生角秦王乃放歸吕氏春秋顧聰為縣吏數被鞭棰因逃墟墓之間有二黄衣人曰劉君頗憶昔日周旋否僕二人乃王粲徐幹君前身是劉楨因出袖中書曰此君集也聰省覽了然明悟乃攜集見孫宰宰大驚曰不可使劉公幹為小吏即以賓禮待之時謂死劉楨猶援得生顧聰牛僧儒幽怪録集離蔬釋屩而享膏梁人情駭觀如見買臣之綬梁劉孝儀謝啓尋聲得器虛求實歸唐文粹事在目前經殷鑒不逺在夏后之世詩伐柯伐柯其則不逺伐柯道不逺人記子目撃而道存莊子史馬援於帝前聚米為山谷指畫形勢開示衆軍所従道徑往來分析曲折昭然可睹帝曰敵在吾目中矣後漢互見黙㑹事莫至盡經罰弗及嗣書大禹謨殱厥渠魁脅從罔治書𦙍征無忿疾于頑無求備於一人書鴟鴞鴟鴞既取我子無毁我室詩君子不盡人之歡不竭人之忠以全交也記國君春田不圍澤大夫不掩羣士不取麛卵同上有餘不敢盡記君子以人治人改而止同上君子以義度人則難為人以人望人則賢者可知也矣記子釣而不綱弋不射宿語子仲尼不為己甚者孟子尅核太至則必有不肖之心應之莊子水至清則無魚人至察則無徒家語魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚昔舜巧扵使民而造父巧扵使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也并馬執轡銜體正矣步驟馳騁朝禮畢矣歴險致逺馬力盡矣然而其心猶乃求馬不已家語察見淵魚者不祥智料隠暱者有殃列子焚林而田後必無獸以詐遇民後必無民韓子焚林而獵愈多得獸後必無獸淮南子史御者不盡馬之情史記夫差智伯極武而亡西漢陸賈傳黄霸曰凡治道去其太甚者耳本傳物禁太甚馮奉世傳聰明流通者戒扵太察匡衡傳董卓曰窮冦勿逼歸衆勿追後漢皇甫嵩傳太剛則折至察無徒晉劉隗鼓繁氣易衰呌數力易竭通鑑宋太祖常獻曰為將當矢石時不可專勇通鑑梁武紀善惡太明亦有時而失通鑑唐太宗霆碎電射天怒也不能終朝聖人在上安有必世而怒人臣耶唐書吳武陵傳惡衣之垢而焚之患木之蠧而伐之其為害豈不益多哉通鑑唐昭宗傳記樂毅曰君子交絶不出惡聲忠臣去國不潔其名戰國䇿出妻令其可嫁同上晉雍季曰竭澤而漁豈不得魚而明年無魚焚林而田豈不得獸而明年無獸詐偽之道雖今可偷後將無獲非其長術也吕氏春秋集許其後效以補前非白樂天不當束縳之馳騁之使若牛馬然急則敗矣韓文致一物扵必窮之地君子不為杜牧之互見長厚物之精華天地所秘惜故蒙金以沙錮玉以璞瑰瑚之木必茂重溟夜光之珠必頷驪龍抉而不止不窮則禍文章亦然所取者亷其得必多所取者深其身必窮孫樵集本朝聖人之行法也如雷霆之震草木威怒雖甚而歸於欲其生人主之罪人也如父母之譴子孫鞭撻雖嚴而不忍致之死東坡美酒飲教㣲醉後好花看到半開時邵堯夫事當可繼經弁人有其母死而孺子泣者孔子曰哀則哀矣而難於繼也夫禮為可傳也為可繼也故哭踊有節記檀弓上子魯法贖人取金於府子貢不取孔子曰自今以後魯不復贖人於諸侯矣家語史鼓繁氣易衰呌數力易竭通鑑宋太祖紀事有反報經老馬反為駒不顧其後詩言悖而出者亦悖而入貨悖而入者亦悖而出記大學子出乎爾者反乎爾者也孟子君之視臣如犬馬則臣視君如國人君之視臣如草芥則臣視君如冦讎同上人有送其妻適私家者道見桑婦悅而與言顧視其妻亦有招之者也列子菑人者人必反菑之莊子故商鞅立法而支解呉起刻削而車裂淮南子史楚靈王聞羣公子之死曰余殺人子多矣能無及此乎左昭十二商君亡至闗下欲舎客舎客舎人不知其是商君也曰商君之法舎人無驗者坐之商君曰為法之敝一至此哉去之魏史本傳衛鞅内刻刀鋸外深鈇鉞論囚渭水盡赤所逃莫之隠所歸莫之容身死車裂史記商君傳注禍莫大扵殺已降此將軍所以不得侯也史記廣傳三代之將道家所忌自廣至陵遂亡其宗同上義縦誅殺甚多上幸鼎湖甘泉道多不治上怒曰縦以我為不復行此道耶嗛之棄縦市鄉秦之禁適所以資豪傑而還自斃也前漢袁盎傳掩人者人亦掩之陵人者人亦陵之魏志王㫤傳程普殺降者數百人皆令投火即自病瘖而卒吳志庾懌以酒餉江州刺史王允之允之覺其毒飯犬犬斃宻奏之帝曰大舅已亂天下小舅復欲爾耶二月懌飲鴆卒通鑑晉殤紀劉毅夜投牛牧佛寺初桓蔚之敗也走投牛牧寺僧昌保藏之毅殺昌至是寺僧拒之曰昔亡師容桓蔚為劉衛軍所殺今實不敢容異人毅歎曰為法自弊一至於此遂縊而死通鑑晉安紀魏城陽王徽走至南抵前洛陽令冦祖仁家祖仁一門三刺史皆徽所引㧞以有舊㤙故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千户侯今日冨貴至矣乃怖徽云官捕將至令其逃於他所使人扵路邀殺之送首於兆兆夢徽謂已曰我有金二百斤馬百匹在冦祖仁家卿可取之兆既覺意所夢為實即掩捕祖仁徴其金馬祖仁謂人客告望風欵服云實得金百斤馬五十匹疑其隱匿依夢徴之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首高樹大石棰足摇之至死通鑑梁髙祖王皇后無子蕭淑妃有寵王后疾之隂令武氏長髪勸上納之後宫欲以間淑妃之寵武氏巧慧多權數初入宫卑辭屈體以事后后愛之數稱其美於上未幾大幸通鑑唐高祖索元禮武后時為推使作鐵籠箍囚首加以揳至腦裂死後以苛猛復受賕收下吏不服吏曰取公鐵籠來元禮乃服罪死獄中唐書周興習法為秋官後有告興謀反詔來俊臣鞠狀初興未知被告方對俊臣食俊臣曰囚多不服柰何興曰易耳内之大甕熾炭周之何事不承俊臣乃命取甕熾火徐謂曰有詔按君請嘗之興叩頭伏罪唐書元載専横上欲誅之收載扵政事堂賜載自盡扵萬年縣載請主者願得快死主者曰相公須受少汚辱勿怪乃脫穢韈塞其口而殺之通鑑唐代宗盗發郭子儀父冢儀見上流涕曰臣久將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也同上誣善者亦反其辜通鑑唐僖宗路岩為相宻奏三品以上賜死皆令使者剔取結喉三寸以進驗其必無詐岩自罹其禍所死之處乃楊救賜死之榻也通鑑唐懿宗楊行宻曰吾好寛而袁襲每勸我以殺此其所以不壽通鑑唐僖宗傳記好稱人惡者人亦道其惡好憎人者亦為人所憎說苑張易之兄弟競為豪侈後被誅百姓臠割其肉時謂走馬報朝野僉載傷賢者殃及三代蔽賢者身當其害黄石王略集韓設辯以激君吕居貨以賣國說難既遒其身乃囚秦貨既貴厥宗亦墜班孟堅賔戲班姬收淚抱妾身我曽排擯無限人元微之本朝盧多遜貶朱崖李符見趙普言朱崖雖海外而水土無惡地春州在内至者必死普頷之後符坐貶宣州上怒未已普具述其事即以知春州半歳而卒談苑冦忠愍之貶時丁晉公馮拯在中書丁當秉筆初欲貶崖州丁忽自疑乃擬雷州丁之貶也馮遂擬崖州當時好事相語曰若見雷州冦司户人生何處不相逢歐公歸田録丁謂為相逐李迪時宋紱知制誥請罪名謂曰春秋無將漢法不道及謂貶朱崖宋猶當制誥即為之詞曰無將之戒深著扵魯經不道之誅難逃於漢法天下快之就川志石介既卒夏竦言扵英宗曰介實不死走北邊矣乃出字便發介棺以驗虛實其後夏竦之死呉奎曰夏竦多詐今死矣仁宗至其家命左右去竦面羃而視之世謂剖棺之與去面羃其為人主之疑一也亦所謂報應者耶東軒筆報曹丕當時不自恥敢謂舜禹傳之堯得之以此失亦此誰知三馬同一槽歐公集以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果扵殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴東坡文吕布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯吕布見誅於曹公而牢之見殺扵桓氏欒城文事同一體經同舟而濟則胡越不患乎異心畧例百姓足君孰與不足百姓不足君孰與足語子下貧則上貧下冨則上冨荀富國吳越之人同舟濟江中流遇風波其相救如左右手者所患同也孔叢子同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悅者顔不能不笑鄧析子史鄭伯謂燭之武曰鄭亡子亦有不利焉左僖三年輔車相依脣亡齒寒其虞虢之謂乎左僖五年蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也左傳左師曰大臣不順國之恥也左傳子産謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉左襄三十君之卿佐是謂股肱股肱或虧何痛如之左傳叔孫氏之司馬唆口鬲戾言於衆曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也左昭二十五年成孟氏之保障也無成是無孟氏也左定十二夫魯齊晉之脣齒脣亡齒寒左哀八宋樂豫曰公族公室之枝葉也君去之則本根無所庇䕃矣左傳民實瘠矣君安得肥國語漢王曰吾翁即若翁漢書淮南王反令尹曰往年殺彭越前年殺韓信此三人者同體之人也自擬禍及身故反耳通鑑漢高紀枝葉落則本根無所庇䕃西漢劉向傳將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之後漢朱穆田蚡曰程不識李廣俱東西宫衛尉令衆辱程將軍仲孺獨不為李將軍地乎西漢淮史傳李固曰譬猶一門之内一家之事安則共其福慶危則通其禍敗通鑑東漢紀猶叩樹本百枝皆動也東漢李固傳互見影響相應猶頭之與足相資也通鑑漢桓紀吕範曰譬猶同舟渉海一事不牢即均受其敗同上東漢紀慕容垂曰秦晉瓦合相待為彊一勝則俱豪一敗則俱弱晉武紀君臣猶父子也休戚同之唐高祖紀上常謂公卿曰茍其君愎諫自賢其臣阿諛順㫖君既失國臣豈能獨全如虞世基等諂事煬帝以保冨貴煬帝既弑世基等亦誅唐太宗紀傳記若同舟而濟濟則皆同其利敗則皆同其害太公六韜未見子富而父貧也通典事權不一經謀夫孔多是用不集發言盈庭誰敢執其咎詩子大道以多岐亡羊列子百醫守痛適足致疑而不能一愈也莊子大臣内權而魏命亂矣司馬宣王與曹爽權相須文中子史狐裘尨茸一國三公吾誰適従左僖五齊簡公之在魯也闞止有寵焉及即位使為政陳成子常憚之諸御缺言扵公曰陳闞不可並也君其釋焉弗聽左哀十四楚子之為令尹也為王旌以朝尹無芋曰一國兩君其誰堪之左傳韓宣王欲兩用公仲公叔為政問扵繆留對曰不可晉用六卿而國分齊簡公用陳成子及闞止而見殺魏用犀首張儀而西河之外亡今君兩用之其多力者内樹黨寡力者藉外雄羣臣有内樹黨以驕主有外為交以削地君之國危矣通鑑周顯王紀九卿更進用事事不闗决扵丞相同上漢武紀政出多門勢位之家更相薦托有如互市晉恵紀刑法不一獄訟繁滋劉頌上䟽曰自近世以來法漸多門令甚不一吏不知所守下不知所避奸偽者因以售其情居上者難以檢其下同上二分政權鮮不階禍晉成紀時宰相無常官唯人主所與論議政事委以機宻者皆宰相也南史宋高祖紀張𢎞䇿曰一國三公猶不堪况六貴同朝勢必相圗齊東昏侯紀天下大權悉歸中宫黜陟生殺決扵其口天子拱手而已中外謂之二聖唐高宗紀斜封官皆不由兩省而授兩省莫敢執奏通鑑唐睿宗傳記百人舉瓢瓢必裂戰國䇿集一國三公十羊九牧陸宣文公事不相干史齊伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也左僖四鄭龍鬬國人請為禜焉子産曰我鬬龍不我覿也龍鬭我獨何覿焉吾無求扵龍龍亦無求扵我左昭十九集鯨吞蛟鬬波成血深澗㳺魚樂不知白樂天越人視秦人肥瘠忽然不加喜戚扵其心韓文事窮勢迫子鳥窮則啄獸窮則搏家語人窮則詐馬窮則佚同上魚相呴以濕相濡以沫莊天運此惟救死而恐不贍奚暇治禮義哉孟梁恵王上史鄭子家曰鹿死不擇音左文十七年鋌而走險急何能擇同上宋使華元夜入楚師登子反之牀曰寡君使元以病告曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能従也左宣十五年人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也史屈原傳無所容跡史犀首傳寒者利短褐飢者甘糟糠史秦始皇紀秦之季世焚詩書坑儒士六藝従此闕焉陳涉之王也而魯諸儒持孔氏之禮器往歸陳王孔甲為陳王博士史儒傳序丁公為項羽將逐窘高祖彭城西短兵相接漢王急顧謂丁公曰兩賢豈相戹哉西漢季布傳樊噲曰如今人方為刀几我方為魚肉何辭焉通鑑漢高紀上居晉陽聞冒頓居代谷欲撃之使人覘匈奴冒頓匿其壯士肥牛馬但見老弱及羸畜使者十輩來皆言匈奴可撃冒頓縱精兵四十萬騎圍帝扵白登七日帝用陳平祕計使使間厚遺閼氏従解角直出同上魏勃曰失火之家豈暇先言大人後救火乎西漢高祖五王傳互入權變人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈父不能保其子通鑑漢文紀寒之扵衣不待輕暖飢之扵食不待甘㫖飢寒至身不顧廉恥前漢食貨志棰楚之下何求而不得西漢路温舒傳善人在患飢不及餐通鑑漢順紀夫居萬死之地必有死争之心同上漢獻紀桑落瓦解其勢可見東漢馬融傳桓𤣥僣位劉裕劉毅何無忌等共謀興復𤣥駭入蜀費恬毛祐撃之𤣥被箭子昇輙㧞去之益州都䕶馮遷抽刀而前𤣥曰是何人邪敢殺天子遷曰殺天子賊耳遂斬之昇曰我是豫章兒諸君勿見殺至江陵斬之晉書桓𤣥傳竇建徳戰數不利中槊楊武威追之建徳墜馬曰勿殺我我夏王也武威擒之通鑑唐高祖紀傳記奉漏甕沃燋釜戰國䇿窮猿奔林豈暇擇木世說上奔逃之士不避斧鉞王逸正陳思王曰寒者不望尺玉而思短褐飢者不願千金而羨一食物時有所急也後魏賈思勰齊民要術互見齊重明輕伍員之託漁舟季布之入廣栁顔氏家訓集魚由泉涸而喣沫鳥因將死而鳴哀劉孝標論療飢必期於鼎食拯溺無待扵規行選䇿文爨鑊之魚期扵消爛選檄喪精亡魄失歸亡趣東京賦互見恐懼胡危命在破竹中杜工部詩衣食闕少家雖嚴父慈母不能制其子白傅集獸窮搏人鹿急走隘杜牧之魚窮爨鼎蟻懼捜穴司空表聖文本朝不有猛虎彼怯者肯越淵谷乎老蘇集人情不問賢愚莫不畏天而嚴父然而疾痛則呼父窮窘則號天盖情發扵中言無所擇豈以號呼之故謂無嚴畏之心東坡記纂淵海卷五十九
