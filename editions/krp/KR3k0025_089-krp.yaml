body:
  text: 記纂淵海卷八十九宋潘自牧撰雜戲部鞦韆傳記宫中寒食競立鞦韆為樂帝呼為半仙之戲開元天寶遺事鞦韆北方山戎之戲以習輕趫者古今藝術圖案詞人髙無際鞦韆賦序云鞦韆漢武帝後庭之戲本云千秋祝夀之詞也語訛轉為秋千後人乃旁加革青箱雜記每春節懸長繩於髙木士女咸集並立其上共推引之名曰鞦韆楚俗亦謂之施鈞涅槃經謂之罥索嵗時記集萬里鞦韆習俗同杜詩綵索拂庭柯輕毬滿鄰圃温庭筠䩔鞦藤索拼韓文􅀈繩覲娥婺同上本朝綠蹊出鞦韆六集鞦韆索掛人何所東坡拄杖閒挑菜鞦韆不見人同上蹴鞠史蹴鞠足蹴之也鞠以韋為之中實以物蹴蹋為樂也漢書注穿地蹋鞠注云穿地作鞠以皮為之實以毛蹴蹋以為也霍去病傳傳記蹴鞠起於戰國案鞠與毬同古人蹋蹴以為戲劉向別錄唐僖宗在藩邸好築毬有鍊腿之語商云小說集永日迢迢無一事隔牆聞築氣毬聲韋莊打毬史蜀王衍常列錦步障擊毬其中爇諸香晝夜不絶通鑑唐僖宗尤善擊毬嘗謂優人石野猪曰朕若應擊毬進士舉須為狀元對曰若遇堯舜作禮部侍郎陛下不免駮放僖宗令陳敬瑄等四人擊毬賭三川敬瑄第一籌即以為西川節度使並同上西川節度使杜元穎進罨畫打毬衣五百事敬宗實錄郭英義拜劍南節度使教女伎乗驢擊毬鈿鞍寶勒唐書傳記上嘗三殿打毬榮王墮馬悶絶移時黄番綽奏曰大家如今年紀不小聖體又重不宜自勞何不看女婿等與諸人為之如臣坐對食盤口眼俱飽此為樂耳旁觀大家馳逐忙遽何暇知樂上曰爾言大有理後不復自為也教坊記淮南陽渥居䘮晝夜酣飲然十圍之燭以擊毬續世說集以擊毬事諫執事者多矣諫者不休執事不止其意必曰進若習熟則無危墮之憂避能便捷則免激射之虞小何傷於面目大何累於形軀者哉愈今所言特以擊毬之間之事明之耳馬之與人情性殊異至於筋骸之相束血氣之相持安佚則適勞頓則疲者同也以之馳毬于場蕩摇其心腑振撓其筋骨氣不及出入走不及迴旋逺者三四年近者一二年無全馬矣然則毬之害於人也决矣韓文上張僕射書分曹决勝約前定百馬攅蹄近相映毬驚杖奮合且離紅牛纓拂黄金羈側身轉臂著馬腹霹靂應手神珠馳贈張僕射毬簇桃花騎白樂天舞劍子昔趙文王喜劍劍士夾門而客三千餘人莊史沛公見項羽鴻門羽因留飲項莊入為夀夀畢曰軍中無以為樂請以劍舞因拔劍舞欲擊沛公項伯亦起舞常以身翼蔽沛公漢書傳記將軍裴旻請吳道𤣥畫東都天宫寺壁道𤣥曰聞將軍善舞劍觀其壯氣可助揮毫旻欣然為舞𤣥奮筆立成若有神助明皇雜錄開元中公孫大娘舞劍器僧懐素草書遂長蓋觀其頓挫之勢樂府雜錄老杜見臨潁李十二娘舞劍器曰余公孫大娘弟子也開元三載余尚童稚記於郾城觀公孫氏舞劍器渾脫瀏灕頓挫獨出冠時徃者吳人張旭善草書數於鄴觀公孫大娘舞西河劍器自此草書長進豪蕩感激即公孫可知矣詩云昔有佳人公孫氏一舞劍器動四方觀者如山色沮䘮天地為之久低昂㸌如羿射九日落矯如羣帝驂龍翔來如雷霆收震怒罷如江海凝清光鬬草傳記謝靈運鬚美臨刑施於南海祇洹寺為維摩詰鬚中宗安樂公主五日鬬百草欲廣其物色令馳取之又恐為他人所得因剪棄其餘國史纂異集若是吳王鬬百草不如應是欠西施劉禹錫競渡史唐杜亞為淮南節度方春南民為競渡戲亞欲輕駛乃髹船底使篙人衣油綵衣没水不濡李衡在坐曰使桀紂為之不是過也唐書傳記端午俗謂是屈原死汨羅日人傷其死並以舟楫拯之至今競渡是其遺俗荆楚記競渡者治其舟使輕利謂之飛鳬又曰水車又曰水馬嵗時記越人為競渡有輕薄少年為鶩没之戲有至水底然後魚躍而出御覽集楚俗不愛力費力為競舟買舟俟一競競斂貧者賕元微之祭船如祭祖習競如習讎畫鷁四來合大競長江流建標明取舍勝負死生求並同上沅江五月平堤流邑人相將浮綵舟靈均何年歌已矣哀謡振楫從此起揚枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動蝃蝀飲河形影聨劉禹錫競渡曲注云競渡始於武陵至今舉楫而相和之其音咸呼云何在斯招屈之義也綵旗夾岸照蛟室羅襪凌波呈水嬉曲中人散空愁暮招屈亭前水東注同上鼓聲三下紅旗開兩龍躍出浮水來陣影斡波飛萬劍鼔聲劈浪鳴千雷文苑英華本朝淳化三年幸金明池觀水嬉命為競渡之戲擲金甌於波間俾軍人撇波争取之會要藏鉤傳記按漢武故事云上巡守河間見清光屬天望氣者云下有貴子上求之見一女子姿色殊絶兩手皆拳擘之莫舒上自披即舒號鉤弋夫人後人見其手拳因為藏鉤之戲嵗時記藏鉤剰一人則來徃於兩朋謂之餓鴟雜爼藏鉤之戲分二曹以較勝負若人偶則敵對若竒則使一人為遊附或屬上曹或屬下曹為飛鳥今為此戲必於正月舊說藏彄令人生離齊人髙映善意彄段成式嘗於荆州藏彄每曹五十人十中其九映言但意舉止辭色若察囚視盜也並同上嵗前又為藏鉤之戲荆楚記傀儡傳記傀儡子起漢祖平城之圍其城一面即冐頓閼氏兵强於三面陳平知閼氏妬忌造木偶人運機關舞埤間閼氏謂是生人慮下城冐頓必納之遂退軍後翻為戲具引歌舞有郭郎者禿髪善優笑凡戲塲必在俳兒之首樂府雜錄窟􅓓子亦曰魁􅓓作偶人以戲善歌舞本䘮家樂也漢末始用之嘉會北齊後主尤所好髙麗亦有之今閭市盛行焉通典上皇幸華清宫但吟刻木牽絲作老翁鷄皮鶴髪與真同須臾弄罷寂無事還似人生一世中楊妃外傳學士初入院賜内軍傀儡子弄胡孫等翰林故事杜司徒常言我致政之後必乗小駟入市看盤鈴傀儡即足矣劉禹錫嘉話角觝史武帝元封二年初作角觝戲通鑑隋栁彧見都邑百姓正月十五日作角觝戲上奏請禁之互見上元類唐莊宗少好角觝嘗與王郁較而屢勝頗以自矜因顧李存賢曰你能勝我與你一鎮存賢搏而勝之莊宗病篤顧存賢曰角觝之勝吾不食言即以為盧龍節度使五代史傳記江陵顔雲偶收諸葛亮兵書自言可用十萬軍每至論兵必攘袂叱咤若對大敵時人謂之檢譜角觝也北夢瑣言俳優經及優侏儒獳雜子女記樂記齊魯會于頰谷齊人使優施舞于魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出穀梁傳史開元中宋璟疾負罪而妄訴不已者付御史臺治之會天旱有優人作魃戲於上前問魃何為出對曰負寃者二百餘人相公悉以繫獄故魃不得不出未幾罷璟相通鑑諧臣談官怡愉天顔元結傳唐莊宗好俳優别為優名以自目曰李天下常身與俳優雜戲於廷伶人由此用事五代史莊宗嘗與羣優戲于庭伶人敬新磨批其頰羣伶驚駭共持新磨詰曰汝奈何批天下頰新磨曰李天下者一人而已復誰呼耶莊宗大恱吳王楊隆演㓜懦徐氏專政嘗飲酒樓上命優人髙貴卿侍酒徐知訓為叅軍隆演鶉衣髽髻為蒼鶻並同上傳記晉獻公之優曰施通於驪姬國語女伶謝阿蠻善舞凌波曲開元天寶遺事本朝髙懐德節制睢陽宋城南抵汴渠五里有東西二橋倡優亦衆率多鄙俚為髙之伶人所輕誚每宴飲樂作必效其朴野之態以為戲玩謂之河市樂迄今俳優常有此戲沂公筆談百戲史漢武帝饗四夷之客極漫衍魚龍角觝之戲漢書衛綰以戲車為郎事文帝注云若今弄車之技同上羊侃姬妾孫荆玉能反腰帖地得席上玉簪南史後魏孝武帝増脩雜戲造五兵角觝麒麟鳯凰仙人長蛇巨象及諸異獸魚龍辟邪鹿馬仙車髙絙百尺跳丸以備百戲北史北齊神武平中山有魚龍爛漫俳優侏儒山車巨象拔井種𤓰殺馬剝驢等竒怪百端名為百戲同上煬帝上巳日會羣臣於曲水為百戲跳劍舞輪昇準擲繩之類隋書張說言乞寒潑戯未聞典故裸體跳足盛德何堪揮水投泥失容斯甚唐書唐隆二年作乞寒潑戲吕元泰上書曰比見坊邑相說為渾脫隊駿馬炫服名曰蘇莫遮旗鼔相當軍陣也勢騰逐喧噪戰争象也錦繡夸競害女工也督斂貧弱傷政體也炫服相勸非雅樂也渾脫為號非美名也並同上含利獸從西方來戲於殿前激水成比目魚跳躍潄水作霧翳日化成黄龍脩八丈出水遊戲輝曜日光繩繫兩柱相去數丈二倡女對舞䋲上切肩而不傾如是雜變總名百戲舊唐書傳記百戲起於秦漢有魚龍蔓延髙絙鳯凰案息五案都盧尋橦走丸跳劍戲車山車興雲動雷跟挂腹旋吞刀履素吐火激水轉石潄霧扛鼎象人怪獸含利之戲纂要梁有髙絙伎蓋今之戲繩也梁有舞輪伎蓋今之戲車輪者也透三峽伎蓋今之透飛梯者也類要吞刀吐火植𤓰種樹之術皆從西域來苻堅嘗得西域倒舞伎漢世有撞末伎梁有長蹻伎跳鈐伎擲倒伎跳劍伎又有梁竿伎獮猴緣竿伎漢世有盤舞者晉世加之以杯謂之杯盤舞梁謂之舞盤伎並同上唐宴吐蕃使作蹀馬之戲景龍文館記石虎製皮兒作獮猴之形走馬上或在馬脇或在馬頭或在馬尾馬走如故名曰猨騎鄴中記龜兹樂戲有五蹄獅子樂府雜錄弄叅軍始自漢館陶令石耽有贓和帝惜其才每宴樂令衣白夾衫命優伶戲弄辱之大中以夾弄假婦人又弄婆羅門戲有代面者始自齊神武之弟善鬬戰以其顔雌無威於敵每入陣即著並同上記纂淵海巻八十九
