body:
  text: 記纂淵海卷五十七宋潘自牧撰論議部㣲小必報經敝帷不棄為埋馬也敝盖不棄為埋狗也記檀弓下迎貓為其食田䑕也迎虎為其食田豕也郊特牲子馬免人於難者其死也𦵏之以帷牛有德於人者其死也𦵏之以大車之薦牛馬有功猶不可忘又况人乎淮南史田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非也於是收贖而養之史記犬馬有勞於人尚加帷盖之報前漢陳湯傳㣲小有知經獺祭魚豺祭獸鷹祭鳥記月令今是大鳥獸則失䘮其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之三年問子鳥髙飛於層漢之上以避矰弋之害鼷䑕深穴乎神丘之下以避熏鑿之患莊子瓠巴鼔瑟而流魚出聽伯牙鼓琴而六馬仰秣荀子管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水韓非子烏鵲識嵗之多風去喬木而巢扶枝淮南子鵲巢知風之所起獺穴知水之髙下暉日知晏鴆鳥也隂諧知雨雌也淮南子鷄有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計抱朴子鶴知夜半燕識戊己抱朴子智禽含蘆以逆網水牛結陣而却虎抱朴狂馬不自觸於木猘狗不自投於河淮南子史巢居知風穴居知雨西漢翼奉傳機心内萌則鷗鳥不下魏志髙柔傳注孫堅於西華失利被鎗墮馬卧草中軍衆分散不知堅所在堅所騎騘馬馳還營踣地嗚呼將士隨馬於草中得堅呉書孫峻謀誅諸葛恪恪將見之夜精爽擾動通夕不寢嚴蹕趨出犬衘引其衣恪曰犬不欲我行乎還坐有頃乃復起犬又衘其衣恪令從者逐犬遂升車呉志劉備屯樊城潜遁所乗馬名為的顱騎走墮襄城西檀溪水中溺不得出備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過世語裴子野曰夫噬虎之獸知愛己子摶狸之鳥非䕶異巢通鑑宋紀張彪敗後與妻楊氏去唯常所養一犬黄倉在彪前後未曾舎離乃還入若邪山中沈秦説陳文遣章眧逹領千兵重購之并圖其妻彪眠未覺黄倉驚吠刼來便噬一人中喉即死及彪被害黄倉嘷呌宛轉血中陳書犬馬戀主晉書石勒傳傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俛而噴仰而鳴聲達於天若出金石者何也彼見伯樂之知己也戰國䇿齊廣寧王孝珩嘗蓄一犬守外人不得趣近孝珩每射令其取箭亦解呼召左右牽衣而進三國典畧蜂有兩衙應潮稗雅亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也論衡鄭子陽之難猘狗潰之齊髙固之難失牛潰之當其時狗牛猶可以為人唱吕氏春秋陸機犬名曰黄耳機往仕路常將自隨此犬黠慧能解又嘗借人三百里外犬識路自還一日至家機羈官京師久無家問機戱語犬曰我家絶無書信汝能賫書馳還取消息不犬喜摇尾作聲應之機試為書盛於竹筒繫之犬頸犬出驛路疾走向呉饑入草噬肉取飽每經大水輒依渡者彌耳掉尾其人憐愛因呼上船載近岸犬即騰上速去如飛逕至機家口衘竹筒作聲示人機家開筒取書㸔畢犬又向人作聲如有所求其家作答内竹筒中復繫其犬頸犬既得答仍馳還洛計人程五旬而犬往還裁半述異記㑹稽句章民張然滯役在都經年不得歸家有少婦遂與奴私通然在都養一狗甚􅀈名烏龍後假歸奴與婦謀欲殺然作飯食共坐下食未得噉奴當户倚張弓挾箭拔刀然以盤中肉飯與狗不噉惟注睛䑛唇視奴然亦覺之奴催食轉急然决計拍髀大呼曰烏龍狗應聲傷奴奴失刀伏倒地狗遂咋奴頭然因取刀斬奴以婦付官殺之續搜神記苻堅為慕容冲所襲堅馳馬墮澗追兵㡬及計無由出馬踟蹰臨澗垂鞚與堅不能及馬又跪而授焉堅攀之得登岸西走廬江異苑知太嵗之所在燕作巢知戊己説文鄧芝射中猿母其子以葉塞瘡華陽國志集疲馬戀君軒選樂府東武吟師曠奏清徵之音而𤣥鵠下舞謝靈運擬詩注混雞犬以亂放各識家而竟入西征賦蜂蠆螗蜋頗亦自負杜牧之集攘螗臂而戰蝸角唐文粹本朝可憐蝸角能多少獨與區區觸事爭臨川集物有自得天理者如蜂蟻知衛其君豺獺知祭祖鳴道集豺獺祭天葵藿向陽蜂蟻之有君臣喬梓之有父子同上黄蜂衙退海潮上白蟻戰酣山雨來談苑㣲小有補子千鈞之重加銖兩而移家語管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壌一寸而仭有水乃掘地遂得水以管仲隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎韓非子齊興兵伐楚子發將師以當之兵三却楚賢良大夫皆盡其計而悉其誠齊師愈强於是市偷進請曰臣有薄伎顧為君行之子發曰諾不問其辭而遣之偷則夜解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明日又復往取其枕子發又使人歸之明日又復往取其簪子發又使歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去故曰無細而能薄在人君用之耳淮南子史猶塵加岱嶽霧集淮海雖未有益不為損也後漢楊倫傳陶侃為征西大將軍荆州刺史時造船木屑及竹頭悉令舉掌之咸不解正㑹積雪始晴㕔事前積雪猶濕於是以屑布地及桓温伐蜀以侃所貯竹頭作釘裝船其綜理㣲宻皆此類也晉書集勿言分寸鐵為用乃長兵白樂天水之細者江海假其深材之短者棟梁資其峻唐文粹本朝王安石曰權者與物相為輕重雖千鈞之重物所加損不過銖兩而移三朝言行錄罕得為貴經有以少為貴者記禮器史堯作大章一䕫足矣後漢曹褒傳傳記黄河千年一清王子年拾遺記集王鮪登爼不假吞波之魚選演連珠賈餗為禮部朝士以進士干賈公不獲有强毁嘲者賈公曰我祇以杜顗敵數百輩足矣杜牧之集才而竒者不獨地上少耶天上亦不多耶唐文粹聖人不世出賢人不時出同上本朝黄河千年始一清岐山鳴鳯不再鳴歐公集今如晨星存者㡬人孰知我公碩大光明導日而昇燦焉長庚東坡集罕見為異經此日而食于何不臧詩十月之交子田父晨出夜入自以性之恒啜水茹藿自以味之極一朝處以柔毛綈幕薦以粱肉蘭橘心病體煩列子夫星之墜木之鳴物之罕至者也怪之可也荀子山出嘄陽水生罔象木生畢方井生羵羊人怪之聞見鮮而識物淺也淮南子去國期年見似人者而喜逃虛谷者聞人足音跫然喜莊子史春生秋殺天道之常春一物枯即為災秋一物華即為異東漢張敏傳作奉天宫李善感諫自遂良死無敢直諫㡬二十年及善感始諫天下皆喜謂之鳯鳴朝陽通鑑唐武后紀集邑犬之羣吠兮吠所怪也楚辭韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎栁文荅韋中立書蜀之南常雨少日日出則犬吠大雪南越數州之犬皆蒼黄吠噬狂走累日同上多不足貴子荆人不貴玉鮫人不貴珠符子史趙王倫簒位奴卒厮役亦加爵位每朝會貂蟬盈坐故時諺曰貂不足狗尾續晉書安禄山反時郭子儀為元帥大將軍告身一通纔易一醉通鑑唐紀傳記鍾山之上以玉抵鵲彭蠡之濵以魚食犬論衡黎洞之人以香代爨畨禺雜記集物以多為賤雙錢易一束白樂天家有千里驥不珍焉人懷盈尺和氏無貴矣曹子建書道大不容子不容然後見君子家語夫子之道大天下莫能容同上子思好大世莫能容孔叢子集古來才大難為用唐文粹氣逸何人識才髙舉世疑髙逹夫本朝信哉天下竒落落不可拘歐公集材大古來無適用東坡詩物之所受者異則其自處必髙自處既髙則必趯然有所不合於世俗欒城集小器易盈子薛譚學謳於秦青未窮青之伎自謂盡之遂辭歸列子鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹莊子豈如鷦鷯者一粒有餘資恵子渇飲河水入腹不過壺漿淮南子史黥布與隨何俱歸漢漢王方踞床洗而召入見布大怒悔來欲自殺出就舎張御飲食從官如漢王居布又大喜過望前漢黥布傳李宻曰唐公見推顧天下無可慮者唐書本傳集方當洪爐燃益見小器盈韓集石鼎聯句舎大徇小子不能三年之䘮而緦小功之察放飯流歠而問無齒决是之謂不知務孟子殺戎馬而求狐狸援兩鼈而失靈龜斷右臂而爭一毛折鏌鎁而爭錐刀用智如此豈足髙乎淮南子捨茂木而集於枯不弋鵠而弋烏難與有圖同上史鄭師慧譏宋曰必無人焉若猶有人豈其千乗之相易滛樂之矇左傳襄十五師曠曰臣不心競而力爭不務德而爭善襄公二十六年欒貞子曰思小恵而忘大耻僖公二十八年楚子伐蔡以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言左傳今不獵猛獸而獵田彘不搏反冦而搏蓄菟西漢賈誼傳方今豺狼當路而狐狸是先通鑑漢獻帝紀羊祜都督荆州有并吞之心每與呉人交兵尅日方戰不為掩襲之計將帥有欲進譎詐之策者輒飲以醇酒使不得有言畧呉二兒為俘者送還其家出軍行呉境刈榖為糧皆計所侵送絹償之游獵常止晉地若禽獸為呉人所傷而為晉兵所得者皆封還之晉書魏元忠上封事言理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不知方畧通鑑唐髙宗舎小取大附忍小圖大舎短取長經用人之知去其詐用人之勇去其怒用人之仁去其貪記禮運子夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子而已矣孟子大匠之用木也取其所長棄其所短故杞梓連抱而有數尺朽良工不棄何也知其所妨者細也卒成不貲之器孔叢子夫顔啄聚梁父之大盜也而為齊忠臣段干木晉國之大駔也而為文侯師孟卯妻其嫂有五子焉而相魏寕其危解其患景陽滛酒被髮而御婦人威服諸侯此四人皆有所短然而功名不减者畧得也淮南子亡羊而得牛斷指而免頭同上史不以一𤯝掩大德左僖三十二曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不還踵刎而死則亦名不免為敗軍禽將矣曹子棄三北之耻而退與魯君計拉桓公於壇坫之上三戰之所亡一朝而復之若此者非不能成小廉而行小節也以為殺身亡軀絶世㓕後功名不立非智也故去感忿之怨立終身之名棄忿狷之節定累世之功史記魯仲連忍小圖大管仲不耻身在縲紲之中而耻天下之不治不耻不死公子糾而耻威之不信於諸侯同上向令伍子胥之世從奢俱死何異螻蟻棄小義雪大耻名垂於後世史伍子胥傳忍小圖大大行不顧細謹大禮不辭小讓史項羽本記范增因説項羽曰沛公居山東時貪財好色今入闗財物無所取婦女無所幸此其志不小通鑑漢髙紀李斯曰成大功者在因瑕釁而遂忍之史本傳季布以勇顯名及至困厄奴僇茍活而不變何也彼自負其才受辱不羞欲有所用而未足者故終為漢名將西漢本傳贊大漢方制萬里豈其與水爭咫尺之地哉前地理志論大功者不錄小過舉大羙者不疵細瑕前漢陳湯傳班固曰孝文時天下以酈寄為賣友夫賣友者為見利而忘義也若寄父為功臣而又執刼雖摧吕禄以安社稷誼存君親可也通鑑漢文紀韓信為楚王召辱已少年告諸將曰方辱我時寕不能死死之無名故忍而就此前漢本傳春秋之義以功覆過通鑑漢宣紀舉大事者不思小怨通鑑光武紀齊桓忘管仲之奢僭而錄其匡合之大謀漢髙舎陳平之汙行而取其六竒之妙筭陳書譬諸射者百發百中而一失可以謂之拙乎通鑑晉成帝紀豈以小疵棄其大德唐韋思謙傳蒙耻奮忠以權大謀唐狄仁傑贊傳記人有置係蹄者而得虎虎怒决蹯而去虎之情非不愛其蹯也然而不以環寸之蹯而害七尺之軀者權也戰國策集磨劔莫磨錐磨錐成小利元稹集吞八荒者不咀蟣蝨楊偉時務論因小失大經小不忍以致大亂焉詩民之失德乾餱以愆伐木詩見小利則大事不成語子路小不忍則亂大謀衛靈公一朝之忿忘其身以及其親語子養其一指而失其肩背孟子一不成而萬有餘䘮矣莊子爭利如爪甲而䘮其掌荀子利夫秋豪害靡國家荀大畧削足而適履殺頭而便冠淮南子治鼠穴而壞里閭潰小􅂒而發痤疽同上是見朱橘一子之蠧因剪樹而棄之覩縟錦一寸之㸃乃全疋而燔之劉子羊羮偏而宋師敗郈孫以鬬雞身亡齊侯以笑嬪破國列子謹巢史宋華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民左宣公二年一慙之不忍而終身慙乎昭三十一年爭尋常以盡其民成十二年初武城人拘鄫人之漚菅者曰何故使吾水滋及呉師至拘者道之以伐武城克之哀公年並左傳石祈子曰得一夫而失一國與惡而棄好非謀也左莊公晉使郤克於齊郤克僂齊頃公母從樓上觀而笑之郤克怒曰不報齊者河伯殛之後與魯衛共伐齊史記褒姒不好笑幽王為烽燧大鼔有冦至則舉烽火諸侯悉至至而無冦褒姒乃大笑幽王悦之為數舉烽火其後不信諸侯盖亦不至史記周本紀有躄者槃散平原君美人笑之躄者至平原君門曰士不逺千里而至者以君能貴士而賤妾也願得笑臣者頭平原君不殺嵗餘賔客舎人稍稍引去者過半史本傳陶朱公中男殺人囚於楚朱公遣長子為一封書遺故所善莊生進千金長男至莊生家莊生非有意受之也欲以成事後歸之莊生入見楚王言某星宿某害楚王乃封三錢之府楚貴人告長男曰王且赦長男以為赦弟固當出也重千金虛棄莊生無所為也乃復見莊生曰初為求免弟今議自赦故辭生去莊生知其意欲復得金曰若自入室取金長男即自入至取金持去莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以脩德報之今臣出道路皆言陶之富人朱公子殺人囚楚其家多持金錢賂左右故王非能恤楚國而行赦乃為朱公子故也楚王大怒令論殺朱公子明日下赦史越世家規小節者不能成榮名惡小耻者不能立大功史魯仲連傳以二卵棄干城之將通鑑戰國翫細娯而不圖大患西漢賈誼傳爭睚眦之隙以成千鈞之讐東漢趙温傳庾悦㕑饌甚盛不及劉毅從悦求子鵝炙悦不與毅由是銜之解悦都督通鑑晉安紀石崇有妓曰緑珠美而艷善吹笛中書令孫秀使人求之崇勃然曰緑珠吾所愛不可得也秀怒乃勸趙王倫誅崇詔收之晉書楚之邊邑脾梁之女與呉邊邑處女蠶爭界上之桑二家相攻呉國不勝遂更相伐㓕呉之邊邑呉怒伐楚取二邑而去呉越春秋傳記以一杯羊羹亡國戰國䇿忿爨之未熟覆甑而棄之所害多矣物理論集失意杯酒間白刃起相讐選少年行惡衣之垢而焚之患木之蠧而伐之其為害豈不益多哉通鑑唐昭宗紀因小累大經不矜細行終累大德為山九仭功虧一簣書旅熬子曰士志於道而耻惡衣惡食者未足與議也語里仁子百發一失不足為善射千里跬歩不至不足為善御荀子千里之堤以螻蟻之穴漏而百尋之屋以突郄之熛焚淮南子以分寸之瑕弃盈尺之夜光以蟻鼻之缺損無價之淳鈞抱朴子史一舉不得前功盡廢史周紀東方朔割名於細君西漢揚雄解朝顔師古曰以肉遺細君是割損其名互入妻門三公鼎足承君一足不任則覆亂美實西漢彭宣傳北朝周樂遜曰棊刼相持爭行先後君一行不當或成彼利通鑑李泌有謀畧而好談神仙詭誕故為世所輕唐德宗髙𢎞本正衙奏事自理逋債詔公卿庶僚自今勿令正衙奏事議者以為正衙奏事自武德以來未之或改所以達羣情講政事𢎞本無知黜之可也不當因人而廢事唐順宗時承平日久子弟為武官父兄擯不齒猛將精兵皆聚於西北邊中國無武備矣通鑑唐𤣥宗紀集玉巵無當去聲底也雖寳非用張平子南都賦京師人多言足下家有積貨士之好廉名者皆畏恐不敢道足下之善栁文賀王參元失火書朱絃二十五闕一不成曲劉賔客得一時之貴㓕百世之族杜牧之因大陋小子仲尼之徒無道桓文之事者是以後世無傳焉孟梁恵王上登東山而小魯登太山而小天下故觀於海者難為水游於聖人之門者難為言盡心下升東岳而知衆山之迤邐也列子由天地之道觀恵施之能其猶一蚊一䖟之勞者也莊子自以此形於天地而受氣於隂陽吾在於天地之間猶小石小木之在大山也方存乎見小又奚以自多計四海之在天地之間也不似罍罌之在大澤乎計中國之在海内不似稊米之在太倉乎莊秋水射者扞烏號之弓彎棊衛之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也淮南子窮鄉之社扣甕拊􅀈相和而歌自以為樂也嘗試為之擊建鼓撞巨鐘乃知夫瓮􅀈之足羞也同上魚失水則死水失魚猶為水也墨子大不假小升東岳而知衆山之峛左紙切崺移迩切也况介丘乎浮滄海而知江河之惡沱也况枯澤乎揚子仰聖人而知衆説之小也視日月而知衆星之蔑也揚子仰天庭而知天下之居卑也同上觀崑崙則覺丘垤之卑抱朴子聞雷霆而覺布鼓之陋見巨鯨而覺寸介之細同上史思唐虞於上古乃知小道足羞也荀悦傳夫置器廣庭則函牛之鼎如釜堂崇十仭則八尺之人猶短隋天文志聽黄鍾之音知擊缶之細習庠序之教知不學之困徐幹中論傳記釣大鼇者不投取魚之餌斷長鯨者焉用割雞之刀南唐野史小才不可大用集浮海難為水游林難為觀選詩文章薄伎固棄於髙賢刀筆小能不容於先達陳子昂集鴻鍾在聴不足論擊缶之音大牢斯烹安可薦藜藿之味同上試登山岳髙方知草木㣲孟東野崇蘭散馥掩蕭艾於芳春朗月揚輝蕩雲霧於清夜唐文粹如河入海無復水名劉賔客集明庭集孔鸞曷取於鳬鷖樹以松與栢不宜問蒿藜韓文本朝登太山者小天下在培塿以宜慙奏咸池而張洞庭非哇咬之可度歐公集因小見大經觀其舞知其德記樂記居家理故治可移於官孝經子射者扞烏號之弓彎棊衛之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎淮南子集求忠臣於孝子求良婦於篤女食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賔客本朝夫人君用人欲其忠信於己必取仁於父兄信於師友然後付之以事故放麛違命也而推其仁則可以托國食子徇君也而推其忍則至於弑君欒城集小巫見大巫子公孫龍問於魏牟曰龍合同異離堅白困百家之智窮衆口之説吾自以為至逹已今聞莊子之言無所開吾喙口呿起據切開也而不合舌舉而不下乃逸而走莊子小巫見大巫拔茅而棄唐歐陽率更以為出於莊子今攷不見但應帝王萹䟽中一云豈小巫能測又云小巫近見不能測逺鄭有神巫曰季咸知人之死生禍福期以嵗月若神列子與之見壺子立未定自失而走莊子兩爵相與鬬未有死者也鸇鷹至則為之解淮南子兵畧訓史孔子為春秋筆則筆削則削子夏之徒不能贊一辭史記孔子世家漢有善射曰樓煩項羽嗔目叱之樓煩目不能視手不能舉發走還入壁不敢復出項羽本紀張綋見陳琳武庫賦與琳書深嘆美之琳曰可謂小巫見大巫神氣殚矣呉志互入驕矜大鵬從南來衆鳥皆戢翼晉書老羆當道卧貛子那得過北史王羆傳集湛露之晞朝陽衆星之拱北辰揚雄甘泉賦西施且一笑衆女安得妍韋應物集龍騰魚鼈踔然驚驥盼驢騾少顔色元稹集蹇驢避路立肥馬當風嘶唐文粹舌端萬變乗春輝南方朱鳥一朝見索漠無言蒿下飛賔客百舌詞和風既揚昏祲自歛陸宣公文小不足以知大經公山弗擾以費畔召子欲往子路不悦曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎語子見南子子路不悦同上子君子之所為衆人固不識也孟告子下智者之言固非愚者之所曉列子井蛙不可以語海夏蟲不可以語氷莊子朝菌不知晦朔蟪蛄不知春秋莊逍遥遊淺不足與測深愚不足以謀知井蛙不可語東海之樂荀子正論量粟而舂數米而炊可以治家而不可以治國淮南子使桀度堯猶以升量石也同上史燕雀安知鴻鵠之志哉史記陳世家公等喁喁何知長者史記日者傳語曰以管窺天以蠡測海以筳撞鍾豈能通其條貫考其文理發其聲音哉前東方朔傳夫移風易俗使天下回心鄉道者類非俗吏之所能為也賈誼傳以管窺天豈能照一隅後漢操遣使辟田疇田疇戒其門下趣治嚴門人曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇笑曰此非君所識也通鑑漢獻紀子貢曰臣終身戴天不知天之髙也終身踐地不知地之厚也臣事仲尼如飲江海腹滿而去又安知江海之深乎韓詩外傳蘙薈之翔無以論垂天之凌蹄涔之游無以知綘虬之騰鈞天之庭豈伶人之所躡山海經序集尺寸之魚豈能量江海之大選對楚王問借問蜉蝣輩寧知龜鶴年郭景純游仙詩小人自齷齪安知壯士懷放歌行二禽已登於寥廓而尺鷃之輩空見笑於藩籬李白大鵬賦丈夫志氣事兒女安得知劉禹錫作吕温文集序見吕科叔文坐井而觀天曰天小者非天之小也韓文原道衆鳥那知一鶚情方雄飛詩炯若深井之下仰視白日之正中也唐文粹大凡受褊狹者不可以語大持盃榼而承澍雨自滿而止又安能測其霶霈之所至哉元㣲之集斗水不能評巨壑之量隙光未足議大明之體何者見褊而守隘也張説之文本朝蜉蝣蔽朝夕蟪蛄知春秋臨川集蠛蠓何足知天髙同上鷃疑鵬萬里蚿笑䕫一足東坡詩小不足以處大子故夫牛蹄之涔不能生鱣鮪而蜂房不容鵠卵小形不足以包大體也淮南子牛蹄之涔無尺之鯉頹府之山無丈之材何也皆其營守狹小而不能容巨大淮南子坎井之無黿鼉隘也江湖鱣鯨非溝瀆所容也蹄窪之内不生蛟龍培塿之上不植松栢列子史部婁無松栢左襄二十四尋常之汙瀆兮豈容吞舟之魚西漢賈誼傳枳棘非鸞鳯所棲百里豈大賢之路東漢仇覽傳傳記坎井無黿鼉談苑華譚曰枯澤非應龍之淵棘林非鸞鳯之窟晉中興書集清源無增瀾安得運吞舟選郭景純遊仙詩井谷不可以遊龜龍蟻垤不可以栽松栢唐文粹蹄窪之内不生蛟龍韓文大魚豈肯居沮洳同上本朝尺水無長瀾蛟龍豈其容歐公集合抱之木不生於歩仭之丘千金之子不出於三家之市東坡文勺水安足容神龍乎東都事畧濁水難藏許氏龍贈參寥子詩大才小用史宋義曰搏牛之蝱不可以破蟣蝨史記項羽本紀蔣琬除廣都長衆事不理先主將加罪諸葛亮曰蔣琬社稷之器非百里之才也蜀志蔣琬傳呉魯肅遺先主書曰龐士元非百里才使處治中别駕之任始當展其驥足耳蜀志集執棠谿以刜蓬秉干將以割肉皆利劍也破荆和以繼築楚辭一旅之衆不足以揚名選書胡為射小盎此用無乃輕徒沾一㸃血虛污箭頭腥白居易屈長才於短用者猶騎搏鼠而􅀈剪毛也白居易策審官互入處事失當函牛之鼎以烹小雞劉賔客烹雞屈函牛之量駱賔王君有百鍊刃堪斷七重犀誰開太阿匣持割武城雞張九齡以赤刃效小割皇甫湜集截橑為􅀈櫨斷楹以為椽韓文將吾劔首切淤泥盧仝文本朝不惜牛刀時一割已因颷鼠發千鈞欒城集小才不足大用經子曰德薄而位尊智小而謀大力小而任重易繫辭子細枝拳曲不可以為棟梁莊子賈精於市不可以為賈師農精於田而不可以為田師荀子此係小才不可大用史費充伐呉秦秀曰充文案小才居國大任三國志釣大鼇者不投取魚之餌斷長鯨者焉用割雞之刀南唐野史小才不可大用集栥梲之才不荷棟梁之任班叔皮王命論任小能於大事猶狸摶虎而刀伐木也白居易小才大用本朝以尋尺之材居棟梁之任以升斗之量受鍾鼎之藏欒城集勇大怯小經陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娯易畧例上史秦民勇於公戰怯於私鬬通鑑周顯十年漢髙祖不能將兵而善將將西漢韓信傳諸部曰劉將軍平生見小敵怯今見大敵勇甚可怪也東漢光武紀君材簡畧堪大不堪小晉書劉卞傳集孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其内栁文不及於一國而被於天下不洽於一時而沛于萬世皮日休名聞天下而不達於堂上智周萬物而不適乎一人文粹本朝尹師魯凡事有小而可矜者必惻然不忍發見顔貌及臨大節斷大事則心如金石雖鼎鑊前列不可變也歐公集互見深識大体積輕勝重子金重於羽者豈謂一鉤金與一輿羽之謂哉孟告子下鴻毳情輕積之沈舟魯縞質薄疊之折軸列子史積羽沈舟羣輕折軸史記張儀傳集衆輕積而折軸文集將輕易重子齊宣王見牽牛而過堂下者王曰以羊易之孟子曰王無異於百姓之以王為愛也以小易大孟子梁恵王史鄭伯以璧假許田左桓公元年孟佗以葡萄酒一斛遺張讓即拜佗凉州刺史後漢舉重明輕經其所厚者薄而所薄者厚未之有也大學子忠孝者百行之寳忠孝不脩雖有他善猶玉屑盈匣不可琢為珪璋列子史周不愛鼎鄭敢愛田左昭十二年有盜髙廟坐前玉環文帝欲族之張釋之曰假令愚民取長陵一抔土陛下且何以加其法乎西漢張釋之傳劉陶曰萬人鑄之一人奪之猶不能給况一人鑄之萬人奪之通鑑東漢陳思王曰寒者不貪尺玉而思短袍饑者不顧千金而羡一食物時有所急也後漢賈思勰齊民要術互事窮勢廹本朝夫以英雄之才尚有溺情愛而不能自守况弱柔之人其能勝妻子之情乎伊川家人卦解舉輕明重經與其殺不辜寧失不經書經䘮禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也記檀弓與其有聚歛之臣寧有盜臣記大學非專為飲食也為行禮也鄉飲酒義爾愛其羊我愛其禮語子寧百刺以針無一刺以刄寧一引重無久持輕寧一月饑無一旬餓淮南子史施衆網以加一禽尚不能得况張千目以羅萬品而望盡出乎其間可得哉唐元稹傳漢武帝置恊律歌天瑞非不羙也不能免哀痛之詔王莽建羲和考律吕非不精也不能救漸臺之禍晉武帝制笛尺調金石非不詳也不能弭平陽之災梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏濩武之音具存於世茍其餘不足以稱之曾不能化一夫况四海乎通鑑唐太宗傳記今為濡足之故而不救人溺乎劉向新序昔孔子力可翹闗不以力稱何則大聖之德具美者衆不可以一介末事持為百行端首史通集日受千金之賜一嵗九遷其官感恩則有之矣將以稱於天下曰知己則未也韓愈上張建封書萬不試而一出焉猶為當世甚重若使幸得出其十二三則巍然為偉人與世無窮其可涯也栁文物極則反經賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復易序卦泰者通也物不可以終通故受之以否同上無平不陂無往不復㤗卦互入儆戒樂極則憂記樂記子游曰事君數斯辱矣朋友數斯疏矣語里仁甚美必有甚惡左昭二十七子其進鋭者其退速孟子盡心上美好者不祥之器老子刻核太至則必有不肖之心應之莊子人衆者勝天天定亦能應人荀子千嵗必反古之常也荀子物盛而衰樂極則悲淮南子烟生於火而烟欝火氷生於水而氷遏水故烟㣲而火盛氷泮而水通列子史防民之口甚於防川川壅而潰傷人必多國語滿而不損則覆盈而不持則傾史記樂書物盛則衰時極則轉史平準書酒極則亂樂極則悲萬事盡然言不可極極之而衰史滑稽傳炎炎者㓕隆隆者絶西漢揚雄傳秦為宫室之麗至於此使其後世曾不得聚廬而托處焉為馳道之麗至於此使其後世曾不得邪徑而托足焉為𦵏埋之侈至於此使其後世曾不得蓬顆蔽冡而托𦵏焉西漢賈山傳髙位實疾顛厚味實腊毒前漢權族好傾東漢隂興贊昔戰國之世處士横議列國之主至為擁篲先驅卒有坑儒燒書之禍東漢申屠蟠傳貧生於富弱生於强危生於安王符傳峻髙者潰葉茂者摧日中則移月滿則虧呉越春秋集歡樂極兮哀情多漢武帝秋風辭盛時一去貴反賤桃笙葵扇安可常栁文至損當受益苦寒必生溫韋應物本朝東漢之末尚節行太甚須有東晉放曠其勢必然鳴道集美物必甚惡厚味生五兵黃魯直物無遁形經權衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓記經解子聽其言也觀其眸子人焉廋哉孟子離婁上水靜則明燭鬚眉莊天道髙垂大鏡坐見四隣淮南子史清水明鏡不可以形遁韓安國傳集登鍾山藍田之上則夜光璠璵之珍可觀矣文選李蕭逺運命論物薄用重經東隣殺牛不如西隣之禴祭實受其福易既濟樽酒簋貳用缶納約自牖終無咎坎卦注明信顯著不存外飾雖復一樽之酒二簋之食瓦缶之器納此至約自進於牗乃可以羞之於王公薦之於宗廟茅之為物薄而用可重也易繫辭黍稷非馨明德惟馨書君陳泂酌彼行潦挹彼注茲可以餴饎詩子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮語祭服敝則焚之祭器敝則埋之記曲禮上夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神禮運君子不以菲廢禮坊記子魯有儉嗇者瓦鬲煑食食之自謂其美盛之土硎之器以進孔子孔子愛之歡然而悦如受太牢之饋子路曰瓦甂陋器也煑食薄膳也夫子何喜之子曰吾非為饌具之厚以其食厚而我思焉家語宋國有田夫常衣縕黂僅以過冬暨東作自曝於日顧謂其妻曰負日之暄人莫知者以獻吾君列子史茍有明信澗溪沼沚之毛蘋蘩薀藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公左隠三年行潦之蘋藻季蘭尸之敬也左襄二十八年本朝鵝毛贈千里所重以其人歐公集假物為用經譬如中夜有求於幽室之中非燭何見記仲尼燕尼子假輿馬者非利足也而致千里假舟楫者非能水也而絶江河善假於物也荀子造父者天下之善御也無輿馬則無所見其能羿者天下之善射也無弓矢則無所見其巧儒効弓矢不調則羿不能中六馬不和則造父不能以致逺議兵必將假物以為用者也荀子行海者坐而致越有舟也行陸者立而至秦有車也慎子傳記鴻毛之囊可以渡江淮南五華術以物制物經惟木從繩則正書説命伐柯如之何匪斧不克詩齊南山析薪如之何匪斧不克同上衡之於輕重也繩墨之於曲直也規矩之於方圓也記經解子木受繩則直金就礪則利荀子火炎上而受制於水水趨下而得志於火文中子史度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫西漢律歴志衡者所以平萬物權者所以權萬物也同上攻玉以石洗金以鹽濯錦以鹵浣布以灰王符傳良工須利器巧匠待繩墨晉阮种傳物産有地經橘逾淮而北為枳貉逾汶則死周禮考工記燕之角荆之幹妢胡之笴呉粤之金錫鄭之刀宋之斤魯之削呉粤之劍同上子探明珠不於合浦之淵不得驪龍之夜光也攻美玉不於荆山之岫不得連城之尺璧也抱朴子祛惑論史屈産之乗垂棘之璧左僖元年深山大澤實生龍蛇昭十四地之磽者雖有善種不能生焉江臯河瀕雖有惡種無不猥大前漢賈山傳傳記採明珠求之於蚌或割百蚌不得一珠不可捨蚌求之於魚長沙耆舊傳集渡江之橘逾汶之貉反時易性安能長元稹集黃流玉瓚之寳産於深山清廟廈屋之材秀於中林李義山文如崑丘𤣥囿積玉相照景山鄧林凡木不殖同上本朝要覔明珠須巨海欲求良玉必崑山邵堯夫物各有宜經宗廟之器可用也而不可便其利也記郊特牲子夏日不煬非愛火也冬日不盥非愛水也為不適於身不便於體也管子天雄烏喙藥之凶毒也良醫以活人侏儒瞽師人之困憊者也人主以備樂淮南子厭甫繆稱訓面面在頰則好在顙則醜綉以為裳則宜以為冠則譏同上説林訓蓬不可以持屋拄不可以刺齒廣堂厦屋連闥通房人之所安也鳥入之而憂髙山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲九韶六英人之所樂也鳥獸聞之而驚深谿峭岸峻木尋枝猨狖之所樂也人上之而慄齊俗訓馬不可以服重牛不可以追速鈆不可以為弩鐵不可以為舟木不可以為釡各有之於其所適施之於其所宜譬如斤􅀈椎鑿之各有所施也予拯溺者金玉不若得尋文之繩以上淮南子水行莫如用舟陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋文莊子梁麗可以衝城而不可以窒穴言殊器也騏驥驊騮一日而馳千里捕鼠則不如狸狌言殊技也鴟鵂夜撮蚉察毫末晝出瞑目而不見丘山言殊性也同上故救餓者以員寸之珠不如與之橡芋貽溺者以方尺之玉不如與之短綆各在其所急也列子百代之傳寳以之彈鳥則曾不如泥丸之勁也棠谿之劍天下之銛也用之穫穂曾不如鈎鎌之功也列子史孫思邈曰膽欲大而心欲小智欲圓而行欲方舊唐書傳記珠彈不如泥丸各有所用也前東方朔傳尺有所短寸有所長驊騮騏騄天下之俊馬也使之與狸鼬試於釜竈之上其疾未必能過狸鼬也黃鵠白鶴一舉千里使之與燕服翼試於堂廡之下廬室之間其便未必能過燕服翼也劉向新序和氏之璧價重千金然以之間紛曾不如瓦磚隋侯之珠國之寳也然用之彈鵲曾不如泥丸騏驥騄耳倚衡負軛而趨一日千里此至疾也然使捕鼠曾不如狸干將鏌鎁拂鍾之錚試物不知此至利也然以之補履曾不如錐説苑集鼎也不足使柱車馬也不可使守閭佩玉長裾不利走趨韓文物莫兩大附勢不兩立子兩堯不能相王管子凡物不並盛隂陽是也韓非子兩貴之不能相事荀子近君威損逺君則勢盛一淵不兩蛟一棲不兩雄一則定兩則爭淮南子日月不並出狐不二雄神龍不匹猛獸不羣鷙鳥不雙説林訓月望日奪其光隂不可以乗陽也日出星不見不能與之爭光也淮南子史都城過百雉國之害也左隠元越之不為沼呉其泯矣哀十一崔之薄慶之厚也襄二十七松栢之下其草不殖襄二十九年鄰之厚君之薄也僖十二内寵並后外寵貳政嬖子配適大都偶國亂之本也閔二物莫能兩大陳衰此其昌乎莊二十二師服曰國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室大夫有貳宗士有𨽻子弟庶人工商各有分親皆有等差是以民服事其上而下無覬覦左桓公二年蘓秦説楚王曰楚强則秦弱秦强則楚弱其勢不兩立通鑑兩雄不俱立史酈生傳趙奢曰如兩虎鬬於穴中將勇者勝史同上藺相如曰如兩虎共鬬勢不俱生史同上讒邪進則衆賢退羣枉盛則正士消通鑑漢元紀死者復生生者不愧吾欲全吾言安得全吾身通鑑周紀是時外戚貲千萬者少故少府水衡見錢多也西漢王嘉傳時水衡錢二十五萬石少府錢十八萬石事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危劉向傳戴盆望天事不兩施通鑑漢章紀虞舜先除四凶然後用十六相明惡人不去則善人無由進也同上漢靈紀若客有泰山之安則主有累卵之危同上漢獻紀勢疑則隙生力侔則亂起東漢馬武傳天下之勢猶持衡此首重則彼尾輕矣唐李石傳正必去邪邪必害正唐李德裕傳傳記天地至貴精不兩明注天精為日地精為月孝經援神契意不並鋭事不兩隆盛於彼者必衰於此長於左者必短於右喜夜卧者不能早起也説苑四時不並盛五行不俱馳隂陽更唱氣有盛衰呉越春秋集日不雙麗世無兩帝選魏都賦燕秦不兩立栁傳本朝昔師丹之説行則董宏坐其罪董宏之論勝則師丹廢於家吕誨論歐陽脩第一狀兩不相下子彼亦一是非此亦一是非莊子齊物論史君子稱其功以加小人小人伐其技以憑君子左傳互見驕矜季郈之雞季氏介其雞郈氏為之金距左昭二十五秦之羣臣曰請以趙十五城為秦王夀藺相如亦曰請以秦之咸陽為趙王夀史同上韓安國坐枉法獄吏田甲辱之安國曰死灰不復然乎甲曰燃則溺之西漢同上猶連雞之不能俱止於棲也戰國䇿臧洪復陳琳書曰子謂余身死而名㓕僕亦笑子生而無聞通鑑漢獻紀單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅荅對之皆有餘魏志互見談辯董卓按劍叱袁紹曰䜿子敢然天下之事豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀揖徑出通鑑劉琨祖逖並有英氣每相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原晉書祖逖傳石勒謂李陽曰孤昔日厭卿老拳卿亦飽孤毒手晉書梅陶鍾雅數説事祖納輒困之因曰君汝頴之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可捶納曰假有神錐亦有神槌晉書祖納傳互見滑稽敏於應對門孫綽性通率好譏調常與習鑿齒俱行綽在前頋謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前同上孫綽傳釋道安髙才與習鑿齒相見道安曰彌天釋道安鑿齒曰四海習鑿齒同上鍾㑹聞嵇康名而造之康不為之禮㑹將去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去晉世祖通鑑盧循遺劉裕益智粽裕報以續命湯同上晉安記陸雲與荀隠未相識嘗㑹張華坐華曰今日相遇可勿為常談雲因手曰雲間陸士龍隠曰日下荀鳴鶴同上沈昭畧性狂見王約曰汝是王約也何以肥而癡王約曰汝是沈昭畧也何乃痩而狂宋書南牙北司互相矛盾通鑑唐懿宗紀韓熙載奔呉宻告其友汝隂進士李糓糓送至正陽痛飲而别熙載謂糓曰呉若用吾為相當長驅以定中原糓笑曰中原若用吾為相取呉如探囊中物耳同上唐明宗紀傳記殷浩語孫安國曰卿莫作强口馬我當穿卿鼻孫曰卿不見决鼻牛人當穿卿頰世説各自彈射互相瘡痍史通集持棊相下莫敢先動猶楚漢之兵相距鞏索也韋應物論勢下之人負其能不肯謟其上上之人負其位不肯顧其下故髙才多戚戚之容盛位無赫赫之光韓文文人相輕自昔而然魏文典論本朝宋袁淑文冠當時見謝莊鸚鵡賦曰江東無我卿當獨秀我若無卿亦一時之傑也續世説王文公見東坡醉白堂記曰乃是韓白優劣論東坡聞之曰不若介甫處州學記乃學校䇿耳西清詩話兩不相入經道不同不相為謀語子顔回曰薰蕕不同器而藏堯桀不共國而治家語致思奔蜂不能化藿蠋越雞不能伏鵠卵莊子庚桑楚大聲不入於里耳同上天地黃鍾大吕不從煩奏之舞列子或曰孔子讀而儀秦行曰甚矣鳯鳴而鷙翰也揚淵騫金鈎玉餌雖珍而不能制九淵之沈鱗顯寵豐禄雖貴而不能致無欲之人抱朴子盤旋揖遜非禦冦之容擐甲纓胄非廊廟之飾同上軒車不可以適越冠冕不可以之胡文中子史淳于髠曰狐裘之敝不可補以黄狗之皮史齊世家世之學老子者則絀儒學儒學亦絀老子道不同不相為謀史老子傳孟軻曰持方枘欲納圜鑿其能入乎史孟軻傳猶戎翟之與於越不相入明矣注闕猶以鄉飲酒之禮理軍市也前梅福傳以水投石莫之受也西門造蕭何律於唐虞之世則誖矣作叔孫通儀於夏商之世則惑矣建婁敬之策於成周之世則謬矣談范蔡之説於金張許史之間則狂矣揚雄傳夫邪正之人不宜共國亦猶氷炭不可同器通鑑漢靈紀李德裕曰正人指邪人為邪邪人亦指正人為邪同上唐文宗紀南衙北司互相矛盾同上唐懿宗紀李綱曰臣言如持水納石唐書時不容我我不時徇同上傳記崔篆曰吾聞伐國不問仁人戰陣不訪儒士東觀漢紀加粉黛於壯夫服紈綺於髙士劉知㡬史通軍容不入國國容不入軍司馬法集圓鑿而方衲吾固知其齟齬而難入宋玉九辨氷炭其不可以相並兮方圓之異形勢不可相錯荼薺不同畆同上虐暑熏天不减堅氷之寒涸隂凝地無累陵火之熱選演連珠梟鸞不接翼運命論代馬不思越越禽不戀燕李太白君平既棄世世亦棄君平同上古詩淡無味不稱今人情白樂天鍾梵避笙歌同上還似今朝歌酒席白頭翁入少年場繁絲與促管不解換漁歌濁水清塵難㑹合同上下有矜乎能上有矜乎位雖恒相求而不相遇韓文蘭艾不同香自然難為和孟東野市井不容義乃知田家春不入五侯宅同上一薫一蕕善齊不能同其器方鑿圓枘良工無以措巧心唐文粹本朝先生善鼔瑟齊國好吹竽操竽入齊人雅鄭亦復殊臨川集世好競辛鹹古味殊淡泊歐公集古貨今難賣花開少年事不入老夫目同上學古居今持方入圓同上君子小人如氷炭决不可以同器東坡荅黄魯直書不應太𤣥草晞價咸陽市山谷古來賢逹人不爭咸陽市落落與時背山谷詩强不敵衆史張儀説趙曰大王收率天下以擯秦秦兵不敢出函谷闗通鑑周赧王十五年傳記麋鹿成羣虎豹避之飛鳥成列鷹鷙不擊説苑劉裕謂沈田子曰猛獸不如羣狐卿等十餘人何懼王鎮惡通鑑晉安集猛虎雖云惡亦各有朋儕羣行深谷間百獸望風低自矜無當對氣性縱以乖匹儕四散走猛虎還孤棲狐鳴聞四旁烏鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頥猛虎死不辭但慙前所為韓文因文致窮集相如逸才親滌器子雲識字終投閣杜詩但㸔古來盛名下終日坎壈纒其身本賣文為活翻令室倒懸文章憎命逹杜詩詩人多蹇如陳子昻杜甫各授一拾遺而迍剝至死李白孟浩然不及一命窮悴終身近日孟郊六十終協律郎張籍五十未離一太祝白樂天愛詩愛酒愛琴客多賤多愁多苦辛中散步兵終不貴孟郊張籍過於貧同上詩人多蹇厄文士多數竒詩人尤命薄方知自殘者為有好文章不用更教詩過好折吾官職是聲名同上六經作孔子削跡不粒矣孟子述子輿坎坷齊魯矣馬遷以史記禍揚雄以太𤣥法言窮杜甫李白王江寕皆相望於窮者也孫可之文吾聞淫畋漁者謂之暴天物天物既不可暴又可擿刻削露其情狀乎使自萌卵至於槁死不得隠伏能不致罰耶長吉死東野窮玉谿生不掛朝籍而死正坐是哉陸魯望倚詩為活計從古無多肥孟東野本朝至於文人其窮也固宜勞心以耗神盛氣以忤物未老而先病無惡而得罪鮮不以文者東坡邵茂誠詩集序詩人例窮蹇秀句出寒餓東坡詩騷人長負一秋悲詩人固長貧古來百巧出窮人詩從肺腑出出輒愁肺腑並同上好衣不近節士體梁肉似怕腹中書魯直管城子無食肉相同上因才取禍子夫柤棃橘柚果蓏之屬實則熟剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是莊子人問世豐狐文豹棲於山林伏於巖穴靜也然且不免於網羅機辟之患者其皮為之灾也莊子山林自冦也膏火自煎也桂可食故伐之漆可用故割之同上直木先伐甘井先竭山木呉王浮于江豋乎狙之山有一狙焉委蛇攫􅎲見巧乎王王射之敏給摶捷矢王命相者趨射之狙就死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖予以至此殛也戒之哉雜篇並莊子强自取柱柔自取束荀子質的張而弓矢至焉林木茂而斧斤至焉同上其文好者身必剝其角美者身見殺文子鐸以聲自毁膏燭以明自爍故子路以勇死萇𢎞以智困淮南子翠飾羽而體分象美牙而身喪蚌懐珠而致剖蘭含香而遭焚金樓子翠以羽自殘龜以智自害若欲翠歛翮於剛丘之林則解羽之患永脱龜曳尾於𤾉谷之泥則鑽灼之悲不至列子山狙見巧終必招害含竒佩美衒異露才者未有不以此傷性毁命者也同上鳴鐸以聲自毁膏燭以明自消文中子史子産曰象有齒以焚其身賄也左襄二十四賈生以為漢興當改正朔易服色定官名興禮樂悉草具其事悉更秦之法諸律令所更定及列侯悉就國其説皆自賈生發之絳灌之屬盡害之天子乃以為長沙王太傅史記本傳屈原博聞强識明於治亂為憲令草藁未定上官大夫欲奪之平不與因讒之王怒疏平作離騷既疏不復在位頃襄王立遷之江南史記同上呉起相楚明法審令捐不急之官廢公族疏逺者以撫養戰鬬之士要在强兵破馳説之言從横者南平百越北并陳蔡却三晉西伐秦楚之貴戚盡害呉起史記同上勇畧震主者身危功蓋天下者不賞史淮隂傳楊脩有俊才為丞相曹操主簿嘗出行籌操有問外事乃逆為答記勅守舎兒若有令出依此通之既而果然操怪其速亷之知狀忌脩後因事殺之後漢薰以氣自燒膏以明自銷西漢兩龔傳傳記晁錯以智死漢書桓譚傳姦人多才未必不為患故酆舒以俊死而鄧祈以辨亡漢書桓譚傳姦人折枝膏腴壞骨文心雕龍清受塵白受垢青蠅所汚常在練素論衡有髙世之功者必負遺俗之累有獨知之慮者必被庶人之怨戰國策天寳中劉希夷王昌齡祖詠張若虛孟浩然常建李白杜甫雖有文名俱流落不偶恃才浮誕而然也明皇雜錄木摧於秀蘭燒以薰晉書安平王孚贊集行髙於衆人必非之文選李蕭逺運命論木秀於林風必摧之堆出於岸流必湍之同上咸美羽以豐肌孔翠故無罪而皆斃徒銜蘆以避繳終為戮於此世蒼鷹鷙而受緤鸚鵡慧而入籠張華鷦鷯賦蘭薫而摧玉縝則折物忌堅芳人諱明㓗選祭屈原文薰膏自消鑠唐文粹麝懐香以賈害狙伐巧而招射象之有齒以焚其身魚之貪餌必曝其鱗同上子胥既弃呉江上屈原終投湘水濵陸機雄才豈自保李斯税駕苦不早華亭鶴唳詎可聞上蔡蒼鷹何足道李太白漆有用而割膏以明自煎杜詩有味之物蠧蝕必生有才之人讒言必至劉賔客老龜被刳腸不如無神靈白樂天多材非福禄薄命是聰明同上因知早貴多才子不得多時在世間膏明自爇縁何事同上士脩而謗興德髙而毁來韓文凡物之生不願為材犧尊青黄乃木之灾韓公祭栁子厚寳玉忌出璞出璞先為塵松栢忌出山出山先為薪孟東野木直先自冦石堅亦他攻張九齡玉堅而折膏明自焚齒由剛折膏為明鑠同上本朝山雞照緑水自愛一何愚文采為世用適足累形軀臨川集木有癭石有暈犀有通以取妍於人皆物之病也東坡膏明蘭臭俱自焚象牙翠羽殘其身同上因言取禍經禍從口出易頥卦正義惟口起羞書説命中匪舌是出維躬是瘁詩口費而煩易出難悔易以溺人記緇衣君子溺於口同上溺口舌所覆也禦人以口給屢憎於人語子多言多敗口是禍之門也家語語及所匿之事如此者身危矣韓子言有召禍荀子傷人之言深於矛㦸同上禍莫大於多言文中子言怪則招憂揚子口舌者患禍之宫亡㓕之府也家語言失之害非惟鋒刃列子史叔向曰小人之言僣而無證故怨咎及之左昭八晉伯宗每朝其妻必戒之曰子好直言必及於難後晉三郤害伯宗左成十五三家以國人圍而灌之城不浸者三版民無叛意智伯行水曰吾乃知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也趙襄子夜使人决水灌智伯軍智伯軍救水而亂遂殺智伯通鑑互見自納敗缺昔者鄭武公欲伐胡乃以其子妻之因問羣臣吾欲用兵誰可伐者闗其思曰胡可伐乃戮闗其思曰胡兄弟之國也子言伐之何也史韓非傳過誤失言文吏躡辱西漢文三王傳口語致罪漢書李陵降匈奴上問太史令司馬遷盛言陵事親孝與士信奮不顧身以徇國家之急今舉事一不幸全軀保妻子之臣隨而媒糵其短誠可痛也上以遷誣㒺為陵游説下遷腐刑西漢李陵傳僕以口語遭此禍重為鄉黨戮汙辱先人同上司馬遷傳張敞掾絮舜私歸其家曰五日京兆耳安能復案事敞聞舜語收繫獄死通鑑漢宣紀連率韓博上言有竒士長丈大十圍來臣府曰欲奮擊胡虜自謂巨無霸出於蓬萊軺車不能載三馬不能勝卧則枕鼔以鐵箸食此皇天所以輔新室也願迎之京師門户不容者開髙大之以視百蠻鎮安天下博意欲以風莽莽聞惡之召霸在所更其姓曰巨母氏謂因文母太后而霸王符也徵博下獄以非所宜言棄市西漢王莽傳言者不蒙延納之福旋被䧟破之禍今皆杜口結舌以臣為戒東漢蔡邕傳董卓誅蔡邕在司徒王允坐殊不意言之而歎有動於色允勃然斥之收廷尉治罪邕遂死獄中同上蔡邕曰夫君臣不宻上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者側目思報通鑑漢靈紀以言獲罪同上竇融與隗囂書云袁紹復説何進曰前竇武欲誅内寵而反為所害者但坐言語漏泄陳琳曰諺稱掩目捕雀夫微物尚不可欺以得志况大事乎同上漢獻紀許攸恃功驕慢嘗於衆坐呼曹操小字曰某甲卿非我不得冀州也操笑曰汝言是也然内不樂後竟殺之同上孔融以對孫權使有誹謗之言坐棄市東漢帝游後園曲宴極樂郭夫人請延皇后帝弗許因禁左右使不得宣后知之明日謂帝曰昨日游宴北園樂乎帝以左右泄之所殺十餘人賜后死通鑑三國魏明紀嵇康與山濤書自説不堪流俗而非薄湯武司馬昭聞而怒之遂殺康同上晉元紀周顗曰今年殺賊奴取金印如斗大係肘王導甚銜之顗為王敦所害晉書周顗傳初拓䟦窟咄之伐珪也莫題以珪年少潜以箭遺窟咄曰三嵗犢豈能勝重載耶珪心銜之至是使人以箭示題而謂之曰三嵗犢果何如題父子對泣詰朝廷斬之通鑑晉安紀互入不可淺量秦王墮性剛峻或謂墮曰董君貴幸無比公宜小降意接之墮曰董龍是何雞狗而令國士與之言乎㑹有天變龍言於秦主生曰今天譴甚重宜以貴重臣應之乃殺王墮謂之曰今日復敢比董龍雞狗乎同上晉哀紀太子素惡西昌侯鸞嘗謂子良曰我意中殊不喜此人不解其故當由其福薄故也及鸞得政太子子孫無遺焉齊髙宗紀多言多釁梁武紀賀若弼怨望上下弼獄謂之曰我以髙熲楊素為相汝毎昌言曰此二人惟堪㗖飯耳是何意也隋髙祖紀賀若弼父敦臨刑呼弼曰吾志欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐刺弼舌出血戒以謹口隋書蘓安恒矜髙好竒太子重俊之誅武三思也安恒自言此我之謀太子敗或告之伏誅通鑑唐中宗國家大事嫌不當位而言實有罪故作罪言新唐書杜牧杜甫嘗醉登嚴武牀瞪視曰嚴挺之乃有此兒武銜之一日欲殺甫集吏於門武將出冠鉤於簾三左右白其母奔救得止新唐書杜甫傳傳記言失者身棄出言不當反自傷也説苑集鵲鳴聲揸揸烏噪聲擭擭爭鬬庭宇間持身博彈射韓文幕中之辨人反以汝為叛臺中之評人反以汝為傾汝不懲耶而呶呶以害其生耶同上言葴言既我禍即無以掩其辭能不罹其失者亦鮮矣言觧好盡言以招人過國武子之所以見殺於齊也諫臣論互入取禍並韓文不擇言以危肆兮固羣禍之際也栁懲咎賦一言成痾智不能明劉賔客口兵之起其刑剭焉同上智伯失灌水之言白帖記纂淵海卷五十七
