body:
  text: 記纂淵海卷三十六宋潘自牧撰仕宦部赴召經賁於丘園束帛戔戔易季春出幣帛聘名士記凡君召以三節二節以走一節以趨在官不俟屨在外不俟車玉藻翹翹車乘招我以弓旃以召大夫弓以召士左傳君命召不俟駕行矣論語子庶人以旃士以旂大夫以旌孟子伯夷篇湯之於伊尹桓公之於管仲則不敢召管仲且猶不可召孟子聘人以珪問人以璧召人以瑗絶人以玦反絶以環荀子史蕭何薨曹參聞之告舎人趣裝治行吾且入相居無何使相且召參四皓隠商山恵帝為太子為書卑辭安車迎以為客乃至賈誼為長沙太傅文帝思誼徴之入見上方受釐坐宣室上因問鬼神之本誼具道其所以然之故至夜半文帝前席曰吾乆不見賈生自以為過之今不及也武帝遣使者安車蒲輪束帛加璧召魯申公汲黯召為淮陽太守黯泣曰願為中郎出入禁闥補過拾遺上曰君薄淮陽耶吾今召君矣平帝徴天下通知逸經古記厯筭五經者所在為駕一封軺車遣詣京師漢書光武備安車𤣥纁遣使聘嚴光三返而後至後漢安帝時陳忠薦周燮馮良學行深純帝以𤣥纁羔幣聘之通鑑晉義陽成王望字子初時魏髙貴鄉公好才愛士望與裴秀王沉鍾㑹並見親待公性急秀等居内職急有召便至以望外官特置追風車一乗毎有宴集望奔馳而至魏書太宗召馬周未至間遣使者四輩敦趨唐書集鶴書赴隴北山移文束帛旅于丘園旌命交乎途巷選辨亡論鳳凰初下紫泥詔謁帝稱觴登御筵謬忝燕臺詔叨陪郭隗蹤骯髒辭故國昻藏入君門李白風雲入壯懐泉石别幽耳濯纓起江湖韓集除書忽到門冠帶便拘束愧忝郎署迹謬蒙君子錄俯仰垂華纓飄風翔輕轂韋應物本朝還朝似夢中雙闕眩金碧復穿鵷鷺行強寄麋鹿迹還朝暫接鵷鷺翼便合劍佩趨明光忽然眉上有黄氣吾君漸欲收英髦行聞宣室召歸近御爐煙東坡召還汲脩綆南歸脫毒蠱入對隨孔鸞漢庭日日召嚴徐山谷赴官經齊侯使連稱管至父戍葵丘曰𤓰時而往左傳史客曹郎主治羌胡事劇遷刺史其公遷縣令詔書賜錢三萬與三臺祖餞治裝一月凖謁公卿凌朝乃發後漢百官志注張輔為東郡太守賜裝錢三十萬以之官鍾離意上書薦劉平等有詔徴平等特賜辦裝錢後漢集牽絲及元興解龜在景平謝靈運詩云牽絲謂牽王如絲之言而仕也元興晉安帝年號景平宋少帝年號交承經舊令尹之政必以告新令尹論語史曹參代蕭何為相舉事無所變更壹遵何之約束百姓歌曰蕭何為法較若畫一曹參代之守而勿失又揚雄傳曰蕭規曹隨功若泰山曹參去位屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大于此者乎參曰夫獄市者所以并容也今君擾之姦人何所容乎黄霸代韓延夀居潁州因其迹而大治延夀代蕭望之為左馮翊而望之為御史大夫㑹御史當問事東郡望之因令並問延夀在東郡時放散官錢千餘萬延夀竟坐弃市漢書傅燮為漢陽太守初范津舉燮孝㢘及為漢陽與交代合符而去任尚代班超為都護謂超曰小人猥承君後宜有以誨之後漢謝方明善治郡承前代人不易其政必當改者則以次漸移變使無迹可尋晉書楊於陵不敢易袁公之政詳見太守類本朝歐陽公知開封府所代包孝肅公以威嚴御下公簡易循理不求赫赫之譽有以包公之政勵公者公曰凡人才性不一吾亦任吾所長耳神道碑王文正公曽李文定公迪皆狀元及罷相領青又為交承故文正送文定詩有錦標得雋曽相繼金鼎調元亦踐更之句詹堅老下大理李端初為少卿詬曰子嘴尖如此誠姦人也後十年堅老代端初為淮南漕端初頗省其面目因曰郎中若有素者豈甞邂逅朝路中耶風采堂堂非曩日比也堅老答言風采堂堂固非某所見但不知比往時嘴尖否端初愧怍而悟揮塵録同僚之契交承之分有兄弟之義至其子孫亦世講之前輩專以此為務今人知之者蓋少矣童蒙訓薦舉經拔茅連茹以其彚征吉易趙文子所舉於晉國管庫之士七十餘家記檀弓儒有内稱不避親外舉不避怨推賢而進達之不望其報儒行君子謂祁奚能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨左子玉之敗子之舉也舉以敗國將何賀焉夫舉無他唯善所在親䟽一也同上仲弓問政子曰舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸論語子趙簡王問于解狐曰孰可以為上黨守對曰荆柏柳可趙簡王曰非子之讐乎對曰忠臣舉賢不避仇讐趙武薦白屋之士六十家韓子史韓信亡去蕭何追之因薦於漢王曰必欲爭天下非信無可與計事者鄭當時為司農其推轂士及官屬丞史誠有味其言也聞人之善言進之上唯恐後山東諸公以此翕然稱鄭莊韓安國嗜于財然推舉皆㢘士賢于己者也於梁舉壺遂臧固郅佗皆天下之名士張安世甞有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪何武為楚内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也漢書宋宏薦桓譚召拜議郎給事中光武每醼輒令鼔琴宏聞之悔於薦舉召譚讓之後大㑹帝使譚鼔琴宏曰臣所以薦桓譚者望能以中正導主而令朝廷躭恱鄭聲臣之罪也帝從容謝之劉勝知善不薦聞惡不言隱情惜已自同寒蟬後漢龐統性好論人每所稱述多過其才人怪問之曰當今雅道陵遲善人少惡人多今拔十得五猶可以崇勵世教蜀志荀彧前後所舉皆命世大才終為卿相者十數人魏志凌寶移書大常薦同郡張贍曰方今太清闢宇四門啓鑰晉書裴頠薦韋忠於張華忠不起曰裴逸民每有心託我我甞恐其溺于深淵而餘波及我況乃褰裳就之哉通鑑狄仁傑為相婁師徳實薦之仁傑不知數擠師徳於外武后問仁傑曰師徳知人乎曰未聞武后以告仁傑嘆曰婁公盛徳我為所容仁傑薦張柬之姚崇桓彦範敬暉數人卒為名臣或曰天下桃李盡在公門仁傑曰薦賢為國非為私也武后詔丞相各舉尚書郎一人仁傑薦子光嗣後稱職后曰祁奚内舉果得人崔祐甫當國薦舉惟其人未踰年除吏幾八百員莫不諧允唐書傳記楚莊王罷朝而晏樊姬問之王曰與賢相虞丘子語樊姬掩口而笑曰虞丘子為相數年未甞進一賢不智知而不進不忠王以告虞丘子虞丘子辭位而進孫叔敖楚莊以霸劉向新序殷中軍稱劉尊祖於庾公使取為佐既見與語殊不稱庾大失望遂名之為羊公鶴昔羊叔子有鶴善舞甞向客稱之客試使驅來氃氋而不肯舞故稱比之世說集朝取一人焉拔其尤暮取一人焉拔其尤誠不忍竒寶横弃道側昔人有鬻馬於市者知伯樂之善相也從而求之伯樂一顧價増倍屢為丞相言雖懇不見録殿前羣公賜食罷驊騮踏路驕且閒稱多量少裁鑑宻豈念幽桂遺榛菅㡬欲犯顔出薦口氣象硉砈未可攀韓集唯待吹噓送上天杜詩本朝王太尉薦寇萊公為相萊公數短太尉于上前上謂太尉曰卿雖稱其美彼專談卿惡太尉曰臣在相位久政事闕失必多凖對陛下無所隠益見其忠直此臣所以重凖也上由是益賢太尉言行録孫杵薦唐介呉中復為御史孫晩為執政甞嘆曰吾何功以輔政惟薦二臺官為無愧耳東軒筆録吕蒙正為相夾袋中有册子四方人謁見必問其有何人才客去隨即䟽之或有一人而數人稱之者必賢也朝廷求賢取之囊中故文武百官各稱職巵史范忠宣公薦引人才必以公議未甞示恩恵於人王沂公擢用人才絶口未甞言子弟曰獨不使之知乎公曰若使之知是我徇私情而市私恩也恩欲歸已怨使誰歸言行録韓魏公喜用知名士或不識其面既用之其人亦不知為所薦者李師錫改京官仁宗覧其薦者三十二人師錫乃使相王徳用甥壻上曰保任之法欲以盡天下之才但薦勢要孤寒何以進乃令師錫循資吕公著薦張載脩身講學為闗右士人師表且深知邊境利害上以為崇文院校書吕正獻公與温公同舉程頥乞特加召命待以不次拜崇政殿說書程伊川與韓持國范夷叟泛舟須㬰客將去有一官員上書謁見求知己頥云大賢居位不去求人乃使人倒來求己是甚道理夷叟云求薦章常事也頥云不然只為曽有不求者不與求者與之遂致人如此語錄范文正公知杭州蘇鱗為屬縣巡檢城中兵官往往皆獲薦書鱗在外邑未見收録獻詩曰近水樓臺先得月向陽花木易為春文正薦之況子多才兼美行薦書期即達承明籄櫝瓦礫遺琳球薦書轉石古所尤歐陽都邑正喧收把梓囘㸔世上無伯樂都道鹽車勝月題東坡書考經以參互攷日成以月要攷月成以嵗㑹攷嵗成周禮史京房對曰古帝王以功舉賢則萬化成瑞應著宜令百官各試其功災異可息詔使房作其事房奏考課吏法漢書劉邵作都官考課法七十二條魏志杜預受詔為黜陟之法曰莫若委達官各考所統在官一年以後每嵗言優者一人為上第劣者一人為下第因計偕以名聞按其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之晉書上考第羣臣以李綱孫伏伽為第一盧承慶考内外官有一官督運遭風失米盧考之曰監運損糧考中下其人容止自若無一言而退盧改注曰非力所及考中中既無喜容亦無媿辭又改曰寵辱不驚考中上唐鑑陽城自署曰撫字心勞催科政拙考下下互見太守類唐臨自述其考曰形如死灰心若鐵石張說為中書令𤣥宗詔曰動惟直道累開獻替之誠言則不諛自得謨猷之體才望兼著理合褒陞考中上唐書傳記周李詳解褐鹽亭尉因考為録事所擠詳謂刺史曰録事持銓曹之權當要害之地為其妄褒貶耳若使詳秉筆頗亦有詞刺史遂授筆詳即書録事考曰怯斷大案好勾小稽自隠不清言他總濁堦前兩競鬭困方休獄裏囚人非赦不出天下以為談笑之最焉御史臺記本朝元祐四年吏部言州令罷任委知州通判考察課績以徳義有聞清謹明著公平可稱恪勤匪懈為四善以獄訟無寃催科不擾稅賦無陷失宣敕條貫按帳簿書齊整差役均平為治事之最農桑墾殖野無曠土水利興修民賴其用為勸課之最屏除奸盜人獲安處賑恤貧窮不致流移而能招誘復業為撫養之最仍通取善最為上中下三等限次月申監司類聚每年一次同行審覆若有能否允著者别為優劣等上半年限八月下半年限二月保明以聞㑹要受代經及𤓰而代左傳史任昉為呉興太守清潔友人劉溉與弟洽從昉為山澤逰被代而還無衣沈約為裙衫迎之梁書宋世良為清河太守及代至傾城祖道有老人曰老人年九十記三十五政府君非惟善政清亦徹底申徽為襄州刺史及代還人吏送者數十里不絶徽賦詩於清水亭長㓜皆競來就讀遞相謂曰此是申使君手迹並寫誦之北史傳記李元紘治潤有恵政代去吏民遮留烏鵲羣飛翔集以擁行車姚崇牧荆州受代吏民擁馬截鐙留鞭開元天寶遺事集解龜在景平謝靈運詩解龜謂解去所佩龜印也景平宋少帝年號本朝士人歴官一任得外無官謗中無所愧於心釋肩而去如大熱逺行雖未到家得清涼館舍一解衣潄濯已足樂矣東坡章服經以訟受服亦不足敬也易天命有徳五服五章哉惟衣裳在笥書服其命服詩傳記唐初品官舊服止黄紫貞觀四年詔三品以上服紫四品五品已上服緋六品七品以緑八品九品以青永徽二年京官文武職事四品五品並給隨身魚袋天夀中改佩魚為龜神龍依舊景雲赦文魚袋著紫者金裝著緋者是時正貟官始佩魚其離任及致仕即去魚袋貟外判試并檢校等官並不佩魚開元中張嘉貞奏請致仕官及内外官五品以上檢校試判及内供奉官見占闕者聽凖正貟例許終身佩魚以理去任亦許佩魚自後恩制賞緋紫謂之章服凡服飾差等上得兼下下不得僭上唐㑹要及職林本朝雍熈初郊祀慶成始詔升朝官緋緑二十年叙賜緋紫真宗東封西祀赦書京朝官並以十五年為限太平興國二年詔朝官出知節鎮及轉運使副借紫知防團刺史州借緋衣緋者借紫其知通判知軍監止借緋魚袋之制國初多闕雍熙元年南郊畢内出魚袋以賜近臣由是内外升朝文武官皆佩魚㑹要舊制借服者但稱借紫借緋而已初不佩魚醫官職雖髙亦不佩魚政和初王詔上言於是始佩魚稱借紫金魚袋而醫官隨服色佩魚矣國史後補賜緋史李子慎誣告其舅以獲五品其母見其著緋衫泣曰此是汝舅血染者邪張宿賜緇青裴度欲為請銀緋太和三年中書門下奏參戎要但官至侍御史以上者雖偕考未至亦量許奏緋唐書傳記張鷟初為岐王屬夜夢著緋乗驢睡中有怪我衣緑乘馬何為衣緋却乗驢其年應舉及第授鴻臚丞未經考而授五品以其應也張鷟為鴻臚丞帽帶及緑袍並䑕嚙有蜘蛛大如粟當寢門懸絲上經數日大赦加階授五品周朱前因上書賜緋魚袋未入五品於緑衫上帶之朝野莫不怪笑僉載張嘉貞開元中書令著緋傅游藝武后時居相位著緋南部新書沈佺期以罪謫遇恩復官而未還朱衣因内晏羣臣皆歌迴波詞佺期曰身名已蒙齒緑袍笏未賜牙緋中宗即賜之本事詩緋袍子紛紛見下賜紫類集朱紱白銀章李白扶病垂朱紱銀章付老翁杜詩朱衣象笏承命以行朱衣象板賜服朱銀加賜朱衣銀魚韓文彩動綾袍鴈趂行白集注云緋多以鴈御瑞莎為之也腰白金服赤紱徒使花袍紅似火其如蓬鬢白如絲魚綴白金隨步躍鶻銜紅綬遶身飛榮傳錦帳花聨萼彩動莎衫鴈趂行聞弟行簡並蒙恩賜章服入賜朱衣銀印劉夢得集腰垂魚印首帶武冠令狐楚代表賜紫史馮伉為皇太子諸王侍讀殿中賜金紫服太和三年中書門下奏檢校四品兼中丞先賜緋經三周年以上者兼許奏紫唐書傳記武后以南海獻集翠裘賜張昌宗狄仁傑入奏事后令爭三籌賭昌宗所衣裘卿以何物為對狄因指所衣紫駝袍曰臣以此敵則天笑曰此裘價逾千金卿之所指為不等矣狄對曰臣此袍乃大臣朝見奏對之服也集異記李泌起家金紫為帝王師廣記顔真卿問范氏尼曰吾得五品否尼指座上紫絲布云顔郎衫色如此遺事或有客譏來濟近日白袍子紛紛濟曰正由緋袍子紫袍子紛紛國史補崔日用為中丞賜紫是時佩魚須有特恩日用因内宴撰迴波詞中宗以金魚賜之本事詩集恩降重霄榮沾陋質虛黷陟明之典恐興彼己之詩劉禹錫表金章紫綬照青春杜詩封爵經列爵惟五書一曰爵以馭其貴周禮以徳詔爵同上史昔周爵五等春秋三等注云春秋變周之文從殷之質合伯子男為一則殷爵三等者公侯伯也史記爵一級曰公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乗九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關内侯二十徹侯皆秦制以賞勞功漢百官表項王使人有功當封爵刻印刓忍不能予漢書樊噲破李由軍上聞賜爵明帝詔民爵過公乗得移與子若同産爵過公乗得移其親漢書建安二十六年始制名號侯置五大夫與舊列侯關内侯凡十六等以置軍功注置名號侯爵十八級關中侯爵十七級皆金印紫綬又置闗内外侯十六級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬皆不食租與舊列侯闗内外侯凡十六等今之虛封自此始魏志唐之封爵皆設虛名其食實封者給繒布而已唐書集漢髙祖甞詔天下凡以戰得爵七大夫公乘以上令丞與亢禮故為吏益難栁文本朝唐制王食邑五千户郡王國公三千户開國郡公二千户縣公千五百户縣侯千户伯七百户子五百户男三百户又有食實封者户給縑帛毎賜爵遞加一級唐末及五代始有特加邑户而罷實封之給本朝㑹要封王史髙祖定天下功臣異姓王者八國咸得裂土南面稱孤韓信平齊使人言漢王曰齊夸詐多變不為假王以鎮之其勢不定請自立為假王漢王罵曰大丈夫定諸侯即為真王何以假為髙祖四年立韓信為齊王徙為楚王五年以九江王英布為淮南王盧綰為燕王韓王信為代王彭越為梁王吕后臨朝封諸吕為王太后病戒産禄曰髙祖與大臣約非劉氏王者天下共擊之今王吕氏大臣不平我即崩大臣恐為變必據兵衛宫毋為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等誅諸吕使人迎立代王前漢書匈奴攻耿恭單于遣使招恭曰若降者當封為白屋王後漢尉景之子粲性麄武天保初封庫狄干等為王粲以景不預王爵大恚恨閉門不朝帝怪遣就宅問之隔門謂使人曰天子不封粲父作王粲不如死文宣親詣其宅慰之方復朝請北齊書本朝中書令趙普封韓王諡忠獻太尉髙瓊封衛王諡烈武國史顓班帝制榮啓國封六集金劵玉册虎符龍節東坡表忠觀碑遂膺典册進位真王衮衣繡裳既極公台之貴金印盭綬肈開王社之封土宇分封位列真王之貴牋表類郡王史天寶九載賜安禄山爵東平郡王唐將帥封王自此始通鑑上元二年李光弼兵敗河陽失守又河中軍亂殺其帥李國貞太原節度使鄧景山亦為部下所殺遂用郭子儀進封汾陽郡王出鎮絳州子儀擒其殺國貞賊首王元振數十人並誅之太原辛雲京亦誅害景山者由是河東諸鎮悉皆奉法渾瑊父釋之積戰功累遷至開府儀同三司寧朔郡王徳宗幸奉天瑊率家人子弟以拒朱泚賊平徳宗封瑊為咸寧王馬燧少讀書輟卷歎曰丈夫當建功於昭代以濟四海安能矻矻為一儒哉燧姿度魁異沉勇多智畧朱泚之亂燧守太原引晉水而注城之東渚以為池寇至計省守陴者萬人封北平郡王唐書集功業汾陽異姓王杜詩本朝曹彬追封濟陽郡王諡武恵國史宗室近親承襲特㫖封郡王兩朝志光奉制書峻膺寵數六一集囘皇子淮陽王啓開國郡縣公經諸公之地封疆方五百里其食者半公執桓圭上公九命為伯周禮史咸熙元年相國晉王奏建五等諸公地方七十五里邑一千八百户置相一人典祠典書典衛典禮各一人妾六人車前司馬十人旅賁四十人魏志上公九命則劍履上殿有善相者師圭謂陶侃曰君左手中指有堅理當為公若徹於上貴不可言侃以針決之見血洒壁而為公字以紙裛手公字愈明晉書許洛陽為鴈門太守家田三生嘉禾皆異壟合穎世祖善之進爵北地公北史傳記公直也取其正直無私釋名本朝皇屬有特封郡公縣公或贈侯者無開國字三朝志國公本朝舊制將相食邑萬户即封國公王旦過萬户而謙抑不請封慶厯七年南郊中外將相惟夏竦滿萬户中書請封英國公因詔使相未滿萬户者皆得封宋敏求録國朝之制食邑滿萬户乃封國公惟宰相三公則通計實封滿萬户便封國公杜衍既致仕因郊祀當加恵而食邑未滿萬户特詔封祁國公蓋異禮也其後遺奏有曰非萬户而忝賜履之封自三少而席司成之重蓋謂是云徐度編遇恩及宗室祖宗後承襲及特㫖者封國公三朝志開國侯經屯利建侯豫利建侯行師易諸侯之地封疆方四百里其食者參之一侯伯七命侯執信圭周禮史髙帝初封侯者皆賜丹書鐵券曰使黄河為帶泰山為礪漢有宗廟爾無絶世漢封功臣張良未有戰鬬功髙帝曰運籌帷幄之中決勝千里之外子房功也乃封良為留侯上在洛陽南宫從複道望見諸將相與坐沙中語上曰此何語留侯曰此謀反耳上曰為之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒留侯曰今急先封雍齒以示羣臣上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣韓王信入匈奴與太子俱至頽當城生子因名頽當至文帝時降封功髙侯頽當孽孫嫣貴幸顯當世嫣弟説以校尉征匈奴封龍額侯漢書馮石襲母公主封獲嘉侯為安帝所寵常幸其府留飲十日許賜駮犀具劍佩刀紫紋綬玉玦各一光武封功臣令各言所樂諸將皆占豐邑美縣惟丁綝願封本鄉曰昔孫叔敖敕其子受封必受墝埆之地今綝能薄功微得封鄉亭侯足矣光武封景丹櫟陽侯帝曰富貴不歸故鄉如衣錦夜行故以封卿耳詔曰竇融執志忠孝扶微救危仇疾反膚隗囂率勵五郡精兵羌胡畢集兵不血刃而虜土崩瓦解朕甚嘉之其以六安安豐陽原蓼安凡四縣封為安豐侯班超詣相者相者曰生燕額虎頸飛而食肉此萬里侯相也班超定西域五十餘國封為定逺侯後漢書曹沐自荆州北歸太祖曰此吾家千里駒也封為東亭侯咸熙元年晉王奏建五等諸侯地七十里邑千六百户官屬同諸公妾五人車前司馬八人旅賁三十六人魏志相工指吕僧珍曰此兒有竒聲封侯相也宋明帝目李安仁曰卿面方如田封侯相也南史李崇以父賢勲封迴樂縣侯時年尚小親族相賀崇獨泣賢怪而問之對曰無勲於國而幼小封侯當報主恩不得終於養是以悲耳賢由是大竒之隋書傳記列侯金印紫綬功大者食縣邑小者食鄉亭漢官解詁孔愉以討華軼功封餘不亭侯初愉少時甞得一龜於餘不溪中流左顧者數四及鑄侯印而龜左顧更鑄猶然愉悟遂佩焉晉中興書本朝制度見後食邑實封類開國伯經諸伯之地封疆方三百里其食者參之一伯執躬圭侯伯七命周禮史咸熙元年晉王奏建五等伯地方六十里邑千二百户官屬同諸公妾四人車前司馬八人旅賁二十八人魏志王勇論討茹茹功别封永固伯邑五百户時有别封者例聽迴授次子勇獨請封兄子元興時人義之後周書傳記伯白也孝經援神契本朝制度見後食邑實封類開國子經諸子之地封疆方二百里其食者四之一子執穀璧子男五命周禮史咸熙五年晉王奏五等諸子地方五十里邑八百户官屬同諸公妾三人車前司馬四人旅賁二十人咸熙中改封蔣愷為下蔡子魏志王敬則封崇安縣子敬則幼時於草中射獵有蟲如烏豆集其身摘去乃脫脫處皆流血敬則惡之詣道士卜道士曰此封侯之瑞也齊書傳記子獨孳孳栖下之稱也環齊要略本朝制度見後食邑實封類開國男經諸男之地封疆方百里其食者四之一男執蒲璧子男五命史咸熙元年晉王奏建五等諸男地方三十五里邑四百户妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百户魏志傳記男任也任治事受王命為君也環齊要略本朝制度見後食邑實封類食邑實封經晉於是乎作爰田注云分公田之稅應入公者爰之于所賞之衆晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣衛侯與免餘邑六十辭曰唯卿備百邑臣六十矣下而上禄亂也魯昭公孫于齊齊侯曰自莒疆以西請致千社左傳子公子開方以書社七百下衛矣管子史秦以吕不韋為丞相封文信侯食河南洛陽十萬户史記今濟南中山王幸以支庶享食大國衍食佗縣後漢景龍二年韋嗣立上䟽以為食封之家其數甚衆昨問户部云用六十餘萬丁一丁絹兩疋凡百二十餘萬疋臣頃在太府每嵗庸調絹多不過百萬少則六十萬疋比之封家所入殊少不若悉記丁輸之太府使封家於左藏受之為愈上弗聽通鑑開元十年初令宰相共食實封三百户以七丁為限元和五年應給實封例節度使兼宰相每食實封百户嵗給八百端疋若是絹加給綿六兩節度使不兼宰相每百户給四百疋軍使諸衞大將軍每百户給三百五十端匹唐書宋齊丘罷相願復歸九華山賜號九華先生食青陽一縣五代史傳記北齊以後功臣多食郡縣輸若髙徳正封藍田公食勃海郡輸雞跖集本朝凡加食邑宰相千户實封四百户餘降麻官七百户實封三百户直學士以上五百户實封二百户舎人待制散尚書至少卿監以上三百户實封一百户凡食邑三百户封縣開國男五百户封子七百户封伯千户封郡侯二千户封公千五百户以上始加實封惟將相食邑萬户即開國㑹要皇朝沿唐制文臣少卿監以上武臣副率以上内殿崇班以上有封爵丞郎學士刺史大將軍諸司使以上有實封但以増户數為差不係爵級邑過其爵則並進爵焉止于郡公三朝志昔在前代凡食邑民户給其税賦後以食實封方給之本朝悉為虛名而制詞尚以實封為真賦云官制舊典錫土非所以逮無功割户實所以褒有徳茍有寵過其量是謂食浮于人李清臣表俄奉璽書驟加井賦邑衍真租食倍多賦仍増勲秩倍衍户封陪食爰田衍封真賦加以爰田衍之真食寵章非次衍食有加真食爰田併加於上賦陪敦邑采増衍井腴申錫爰田陪敦多賦牋表類加恩本朝倣隋唐官制設階謂文武兩階官勲謂上柱國柱國上䕶軍䕶軍上輕車都尉輕車都尉上騎都尉騎都尉騎驍都尉飛騎尉雲騎尉武騎尉凡十二等謂之勲封爵謂王郡王國公郡公及開國公侯伯子男凡九等謂之封爵食邑實封為降赦加恩之數應宰臣親王使相執政官前任同加恩四種尚書以下至諌議大夫學士待制大卿監加三種少監以下至朝臣加二種京官選人加一種稱種者謂階勲爵食邑實封各為一種也京官選人初命官便帶階每加恩如上件之數加焉祖宗用此以别仕進之新舊蓋祖宗用人必擇歴試之才能自非士取殊科在三人之列及制科入等方不次擢任然亦須先歴一任倅幕使知州縣事方登館閣擢言路自餘皆以資歴選任故以階勲别之熙寧王安石當國之初喜用新進以行法不次擢任猶然開陳其人之才能稟上而進擬逮元豐判乃以階為寄禄官故只加勲而已至政和以後蔡京用事專選新進之附已者不次擢用慮人君檢察同列梗議當職人言遂削去勲毎有恩霈只云合加恩人並無加恩乃立司封法暗理加勲之數加至上柱國方封爵加食邑云官制舊典任子經賞延於世世選爾勞予不掩爾善書古之仕者世禄詩序史袁盎兄噲任盎為郎汲黯以父任為太子洗馬王吉曰今使俗吏得任子弟率多驕傲不通古今至於積功治人無益于民此伐檀所由作也宜明選賢才除任子之令漢書各以品之髙卑䕃其親屬多者及九族少者三世宗室國賔先賢之後及士人子孫亦如之晉書嚴父弱冠以門䕃䇿名李徳裕以䕃補校書郎後為名宰相唐書傳記漢制二千石九卿得資䕃為郎皆為三省郎悉屬光禄勲更直執㦸宿衛及其髙第有亷茂可察四行可舉乃出補長及丞自魏晉迄唐臣僚有功利及民勞效在國始賜其子官至唐開元三品以上許䕃子孫降子一等曽孫又降一等散官同執事䕃四品五品以降臣早以門資初登官叙通鑑世臣門子􅉏御之族天隆其祐主豐其禄蔡邕集以門功拜為太子舍人韓文公初為吏亦以門庇房公墓銘東隂令于興宗生於公侯家以覆䕃入仕劉夢得本朝太平祥符二年邢昺言欲望自今補䕃出身人並須先於國學聽書二年候滿日本學牒送審官院依條試驗方與差遣㑹要世宦經官人以世書古者臣有世功世其官邑詩䟽世禄之家鮮克由禮畢命春秋譏世卿公羊五世其昌並於正卿八世之後莫之與京左傳陳厲公生敬仲筮之曰此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也左子所謂故國者非謂有喬木之謂也有世臣之謂也孟子子華之門徒皆世族也縞衣乗軒濶步緩視列子史孟嘗君曰文聞將門必有將相門必有相史記汲黯濮陽人其先有寵于古之衛君至黯十世世為卿大夫漢興以來侯者百數保國持寵未有若富平者也路温舒辭順而意篤遂為世家宜哉漢書隂識傳贊云恂恂苗𦙍注云公侯皆傳龜襲紫紫綬龜紐後漢王訓年十六召見文徳殿應對爽徹武帝謂朱異曰可謂相門有相梁書博陵崔倕緦麻親三世爨貞元以來言家法者以倕為首生六子一登輔相五任大僚太常卿邠太府卿酆外臺尚書郎郾庭尉卿郇執金吾鄯左僕射平章事鄆宣宗聞之嘆曰崔鄯家門孝友可為士族師法矣鄯甞構小齋于别寢御筆題額賜號曰徳星堂今京兆民因崔氏舊里立徳星社唐書傳記金日磾忠勤之節七葉侍中三輔故事唯金張子弟世履忠篤故保貴恃寵祚鍾昆嗣藝文類聚通侯百數富平最盛于西京類要謂張安世子孫東京楊氏累世宰相為漢名族然袁氏車馬衣服極奢僭能守家風為世所貴不及楊氏也望豐屋知名家類要公門有公卿門有卿王沉釋時論衣冠盛事傳記前漢金日磾張安世七葉珥貂為侍中張氏自昭帝封安世至吉傳國八世歴莽簒二百年間未甞遣黜封者莫與為比韋賢及子元成平當及子晏唐劉祥道及子齊蘇瓌子頲李吉甫子徳裕房融子琯皆父子為相後漢竇巖為司空子畧少保略子熾太傅略孫毅大司馬楊氏自震至彪四世太尉徳業相繼為東京名族袁安為司徒子敞為司空孫湯為太尉湯子逢為司空逢弟遇為司徒晉謝安子琰琰子混三世僕射中書令王述述子坦之坦之子愉三世中書僕射梁謝覽為吳興守與祖宋中書莊父齊太子詹事􅀢伯父司徒朏侍中敬三代五人為此郡謝𢎞子微微子莊莊子朏朏孫哲五世為侍中後魏宇文裘太尉子測少保深少師深子孝伯少冢宰又晉荀勗司徒子萍太保組太尉萍子遂太保皆三世四公後魏李沖沖子延寔延寔子彧又西魏長孫雅為太師子紹逺大司馬紹逺子覽大司徒皆三世三公北齊賀拔允為太尉弟勝為太師丘為太保勝堂弟仁為太師一門四人為三公後周于謹為太師二子寔為司空翼為太尉一門三人為三公唐蕭瑀子嵩華二子並為相張嘉禎子延賞延賞子宏靖又蕭復子寘寘子遘崔沔子祐甫祐甫子植並三世為相貞觀中顔師古相時勤禮三人皆𢎞文館學士開元中鄭齊景齊丘齊望兄弟並為著作郎裴諝為河南尹此官諝五世為之諝坐未甞當正位為政以和易為理韋氏東眷有逍遙公夐鄖公孝寛西眷有平齊公瑱固安公法保並為盛門至今稱為四公之後已上並雜見史傳前職官部中亦多收載恐難檢尋今復類聚于此父子同朝經父子並為周司徒鄭武公莊公是也武公莊公為平王卿士左傳史成王於周公子父俱延拜而受之注云周公拜前魯公拜後漢書䟽廣䟽受父子並為師傅朝廷以為榮本傳蘇頲遷給事中拜中書舍人父瓌同中書門下三品父子同在禁苑朝廷榮之貞元四年詔以太尉中書令西平郡王晟長子愿為銀青光禄大夫太子賓客賜勲上柱國與晟門並列㦸唐書傳記崔湜弱冠登科不十年掌貢舉遷兵部父揖亦甞為禮部至是父子累日同省為侍郎翰林盛事集近世勲將尤貴富者言李郭而汾陽西平猶不得父子並為節制公與子布同日登將壇田宏正墓誌父子相繼史杜延年周之子也為御史大夫延年居父官府不敢當舊位坐臥皆易其處漢書畢衆敬子元賔父子相代為兖州當世榮之北史傳記韋康代父為涼州刺史父出止傳舍康入官宇時人榮之三輔決錄集大許公為相於武后朝小許公佐𤣥宗杜牧之集謂蘇瓌蘇頲也兄弟同朝史張綰為中丞兄纘為僕射元日舊制僕射中丞坐為東西時百司就列導騶分趨兩途前代未有時人榮之梁書劉偉之為左史懿之為給事中兄弟並居兩省論者美之唐書兄弟相繼史馮立與兄野王相代為西河上郡太守民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恵吏民政如魯衛徳化鈞周公康叔猶二君漢書夏侯䕫為南豫州刺史兄亶先經此任並有恩恵百姓歌曰我之有州頻得夏侯前兄後弟布政優優南史賈敦頤為洛州刺史其弟敦實後繼鎮之並有恵政百姓前後立碑於東京唐書入貲史張釋之以貲為騎郎卜式上書願輸家半財助邊上使使問式式曰天子誅匈奴愚以為賢者宜死節有財者宜輸之如此而匈奴可滅也是時富豪者皆爭匿財唯式尤欲助費上乃拜為中郎賜爵左庶長田十頃布告天下尊顯以風百姓漢書崔烈因傅母入錢五百萬得為司徒及拜日帝曰悔不少靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是豈不知足也皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如逢掖漢書中宗時安樂公主等用事請謁受賄雖屠沽臧獲用錢三十萬則别降墨敕除官斜封付中書時人謂之斜封官通鑑傳記劉陶為京兆尹到職當出脩官錢千萬陶清貧而恥以錢買職稱疾不聽政雞跖崔烈買司徒問子均曰人謂何如對曰海内嫌其銅臭九州春秋納粟史晁錯説文帝曰欲民務農在于貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富民有官農民有錢粟有所渫夫爵者上之所擅出於國而無窮粟者民之所種出於地而不乏使天下入粟於邊以受爵免罪不過三嵗塞下之粟必多矣於是文帝令民入粟於邊六百石爵上造四百石為五大夫漢食貨志改官本朝天聖前諸路使者薦舉未有定限選人止用四考改官然是時吏部選人磨勘嵗纔數十人慶歴以後増為六考知州等薦吏部皆視屬邑多寡裁為定數於是舉者皆以應格充數為意遂數倍于前避暑錄元祐二年詔吏部選人改官每嵗以百人為額從孫覺之請也紹聖元年詔引見磨勘改官人權依元豐令五日引一甲毎甲引三人每年不得過一百四十人俟後次不及百人取㫖中興㑹要邊邑備員蔑聞善狀大庭偶見賜與階升龍墀引對叨被寵陞俄應格于天官遂進階於文散俾脫迹於銓衡獲陞名於京籍偶嵗成之及格蒙序法之推恩校課中銓方上六年之最拜恩宸陛濫沾八品之階牋表類公子亦改官三就繁馬頭坡詩遷除史田蚡為丞相薦人或起家至二千石權移主上上迺曰君除吏盡未吾亦欲除吏漢書亦有少負令譽弱冠超越清級者南齊丘巨源為江夏王掌書記平除奉朝請南史延昌二年崔鴻建議曰竊見景明以來考格三年成一考一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如襲黄才史如班馬文章如張蔡得一分一寸必為常流所攀選曹官抑為一槩不曽甄别雖明㫖已行猶宜消息不從北史傳記凡言除者除故官就新官也漢書音義陳依梁制若有遷授吏部先為白牒列數十人尚書與參掌者共署奏敕或可或否其可者則下於選曹以貴賤别内外隨才補用以黄紙録名八座通署奏可乃出以付與典書其名貼鶴頭板修整容儀送所授之家其别發詔除者即宣付詔局章奏聞敕下黄紙冩出門下答詔請付外施行通典郭汾陽每遷官則靣長二寸額有光氣事已乃復隴上書集光隂荏苒遷授頻仍李義山恩光照拙薄雲漢希騰遷李白本朝叨膺渙渥叙進官聨六一醫是肱三折官多嵗九遷山谷罷免經狼瞫曰吾以勇求右無勇而黜亦其宜也謂上不我知黜而宜乃知我矣左傳令尹子文三已之無愠色栁下恵為士師三黜論語史荀卿適楚春申君以為蘭陵令春申君死而荀卿廢史漢髙赦韓信為淮隂侯信居常鞅鞅與絳灌等列過樊將軍噲噲跪拜送迎言稱臣曰大王肯臨臣信出門笑曰生乃與噲等伍孫㑹宗與楊惲書云大臣廢退當闔門皇懼為可憐之意李廣贖為庶人屏居藍田南山中射獵飲還至亭灞陵尉醉呵止廣曰故將軍尉曰今將軍尚不得夜行何故也哀帝時册免孔光曰君其上丞相博山侯印綬罷歸光退閭里杜門自守漢書栁渾罷政事後數日置酒召故人出遊酣肆乃還曠然無黜免意時李俛盧翰皆以舊相闔門奉朝請嘆曰吾等視柳宜城真拘俗之人哉唐書傳記鄧竟陵免官後見桓公公問之曰卿何以更痩鄧曰有愧于叔達不能不恨于破甑殷中軍廢後恨簡文止云上人著百尺樓上儋梯將去世說集坎壈兮寒士失職而志不平宋玉本朝人事雖好乖吾生亦多忤才如得風鷁已復觸藩羝中道勒囘奔電足留滯常思動艱危却悔來珉賤易為價玉弃乆埋塵陳后山鹽車屈騏驥烈火廢珪瓚蘇東坡貶竄經流宥五刑舜流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山五流有宅五宅三居書屏之逺方終身不齒記舜臣堯流四㐫族渾敦窮竒檮杌饕餮投諸四裔以禦魑魅周公殺管叔而囚蔡叔君曰余不女忍殺宥女以逺逸速行乎左傳史屈原既放行吟澤畔作懐沙之賦沉汨羅而死賈誼謫為長沙王太傅有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也誼居長沙卑濕自傷夀不得長乃為賦以自廣史虞翻放棄南方云犯上獲罪當長沒海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨以典籍自慰作易設象以占吉凶吳志齊髙帝敕劉祥曰我當原卿性命令卿萬里思愆乃徙廣州南史楊憑貶臨賀尉姻友憚累無往候者獨徐晦至藍田慰餞宰相權徳輿謂曰無乃為絫乎晦曰方布衣時臨賀知我今忍遽棄也有如公異時為奸邪譖斥又可爾乎徳輿嘆其直李夷簡表為監察御史晦過謝夷簡曰君不負楊臨賀肯負國乎徳裕貶潮州著𫐠雜序數十篇號曰窮愁志其論𡨕數曰予自荆楚保釐東周于路出方城有隱者謂方城長曰此官人居守後二年南行萬里則知憾予者必因天譴譖予者乃自鬼謀雖抱至寃固不為恨唐書傳記殷浩被黜夷神委命雅詠不輟雖家人不見其流放之戚續晉陽秋殷中軍被廢在信安終日常書空作字揚州吏民尋義逐之竊視唯作咄咄怪事四字而已世說陸宣公至忠州土塞其門鹽菜由狗竇中端坐抄藥方兒姪亦罕與語丁用晦芸田録新繁縣有東湖李徳裕為宰日所鑿夜夢一老父曰某潛形其下幸庇之明府富貴今鼎來七九之年當相見于萬里外後于土中得一蟇徑數尺投之水中而徳裕以六十三卒于朱崖果應七九之䜟北夢瑣言集屈原既放三年不得復見竭智盡忠而蔽障於讒心煩意亂不知所從乃往見太卜鄭詹尹曰云云俗溷濁而不清蟬翼為重千鈞為輕黄鍾毁棄瓦釜雷鳴讒人髙張賢士無名楚辭卜居恭承嘉恵兮待罪長沙側聞屈原兮自沉汨羅造託湘流兮敬弔先生遭世㒺極兮迺隕厥身嗚呼哀哉兮逢時不祥鸞鳳伏竄兮䲭鴞翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂隨夷溷兮謂跖蹻㢘鏌鋣為鈍兮鉛刀為銛吁嗟黙黙生之無故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳伏鹽車兮章甫薦屨漸不可乆兮嗟若先生獨罹此咎兮賈誼弔屈原賦賈生西望憶京華湘浦南邊莫怨嗟聖主恩深漢文帝憐君不遣到長沙去嵗左遷夜郎道屈平顦顇滯江潭竒伯流離放遼海遷人發佳興我是瀟湘放逐臣天外常求太白老金陵捉得酒仙人一為遷客去長沙西望長安不見家李白萬里傷心嚴譴日百年垂死中興時杜詩孤臣昔放逐泣血追愆尤謂言即施設乃反遷炎州朝為青雲士暮作白首囚靜思屈原沉逺憶賈誼貶翻飛乏羽翼指摘困瑕玷一封朝奏九重天夕貶潮陽路八千欲為聖明除弊事肯將衰朽計殘年雲横秦嶺家何在雪擁藍闗馬不前前年出官日此禍最無妄韓集匪兕吾為柙兮匪豕吾為牢積十年莫吾省兮増蔽吾以蓬蒿始驚陷世議終欲逃遷刑風波一跌逝萬里壯心瓦解空縲囚未競遷喬樂俄成失路嗟别怨秦城暮途窮越嶺斜沉埋全死地流落半生涯獨棄傖人國難窺夫子牆鳴玉機全息懐沙事不忘十年顦顇到秦京誰料翻為嶺上行一身去國六千里萬死投荒十二年栁集栁子厚斥已十二年程劉二韓皆已抆拭獨子厚與猿鳥為伍吳武陵與孟簡書咋舌驚魂分終裔壤劉夢得啟沉舟側畔千颿過病樹前頭萬木花前人詩一去一萬里千知千不還崖州在何處生度鬼門闗李徳裕本朝盧多遜貶朱崖李符見趙普雖在海外而水土無他惡春州雖在内地而至者必死望追改前命以外彰寛宥乃寘于必死之地普頷之後符坐事貶上怒未已令再貶海外普具述其事即以符知春州到郡月餘卒言行録寇凖貶雷州司户及境吏以圖獻抵海岸凡十里公恍然曰少時有到海祇十里過山應萬重之句乃今日意耳人生得喪豈偶然哉寇公之貶也丁晉公與馮相拯在中書丁當秉筆初欲貶崖州忽自疑語馮曰崖州再涉鯨波如何馮唯唯而已丁乃徐擬雷州丁之貶也馮遂擬崖州當時好事者曰若見雷州冦司户人生何處不相逢丁謂既逐李文定因肆行貶竄時王沂公參政不平之曰責太重矣謂熟視乆之曰居停主人恐亦不免也沂公懼因宻謀去之以擅移山陵劾謂雖沂公以計傾之而公議不以為非也龍州志丁謂謫崖州甞謂客曰天下州郡孰為大客曰京師也謂曰不然朝廷宰相為崖州司尸則崖州為大也聞者絶倒陳瑩中云嶺南人見逐客不問官之尊卑盡呼相公豈非相公愛逰此乎近日瑩中赴龍城士美相繼過桂又報伯紀來因念瑩中言發一笑折彦質記劉器之謫嶺外盛夏奉老母以行一日行山中憇樹下有大蛇冉冉而至若相向者久之乃去村民羅拜器之曰官異人也蛇吾山之神見官喜相迎耳聞見録蘇轍謫雷不許占官舍遂僦民屋章子厚以為強奪民居下州追民究治以僦劵甚明乃已及章子厚謫雷州亦問舍于民民曰前蘇公來為章丞相㡬破我家今不可也人以為報秦㑹之千鬼萬怪如不樂這人貶竄將去却與他殷勤不絶一日忽招胡和仲飯意極拳拳比其還家則臺章已下又送白金為贐如欲論其人章䟽多是自為以授言者朱文公行見江山且吟詠不因遷謫豈能來得罪宜投裔六一集逐客何人着眼看東坡山憶喜歡勞逺夢地名皇恐泣孤臣蜀中鋪名贑中灘名吏民驚怪坐何罪父老相攜迎此翁佗年誰作輿地志海南萬里是吾鄉九死南荒吾不恨兹逰竒絶冠平生公方占賈鵩我正買龔牛逐客不妨員外置詩人例作水曹郎夢遶雲山心似鹿魂飛湯火命如雞山僧有味寧知子瀧吏無言只笑儂逢人瘴髮黄入市胡眼碧屢作退飛鷁羞看乾死螢孤鴻方避弋老驥猶在埛謫恵州東坡謫嶺南時宰欲殺之飽喫恵州飯細和淵明詩淵明千載人東坡百世士出處雖不同氣味乃相似山谷人鮓瓮中危萬死鬼門闗外更千岑問君底事向前去要試平生鐵石心答劉文學去國行萬里淡如雲水僧安知隴鳥樊籠宻更覺南鵬羽翼低並前人去國一身輕似葉髙名千古重於山李師中送唐介起廢史以貴戚廢錮當復以貴戚浣濯之猶解酲以酒也後漢第五倫䟽魏愷積年沉廢遇楊愔於路微自陳愔曰咸由中㫖愷曰雖復零雨自天終待雲興四岳愔忻然曰此言極簡要數日除霍州刺史北史張威在青州侵擾百姓坐廢於家後從上祠泰山上曰今還公笏於是復拜洛州刺史隋書賈誼謫長沙文帝思之召見宣室問鬼神之本文帝前席見赴召類汲黯坐免官隱於田園者數年召為淮陽太守本傳集茍削丹書得夷平民則塵洗天波謗絶衆口陸士衡表柳先生遊于愚溪之上黧老進而言曰今兹是州起廢者二焉東祠躄浮圖中廏病顙之駒躄浮圖有師道少而病躄居東祠十年今年他有師道者悉以故去學者倀倀無所師遂相與出躄浮圖以為師中廏病顙駒顙之病亦自十年不得齒他馬食斥棄異皁凡廏之馬無肯為伍今刺史來涖吾邦將至無以為乗於是衆牽駒上燥土大廡下浴剔蚤鬋刮惡除殘莝以雕胡秣以香萁御夫盡飾然後敢持豈不曰宜乎今先生來吾州亦十年曽不若躄足涎顙之猶有遭也興哀於無用之地垂徳于不報之所栁集而我竄逐者龍鍾初得歸韓集本朝暫著南荒不到頭却隨北鴈與歸休老去甞憂伴新鬼歸來且喜是陳人誤辱使君相抆拭寧知老鶴更乗軒流落生還真一芥何時曠蕩洗瑕謫與君歸駕相追攀初起湘纍復佩銀肯留歸闕斾坐待逆風船東坡寄語諸公肯湔祓昨夜風雷震海隅天心急擬活焦枯山谷萬里早歸來九折慎馳騖后山起復經子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也子夏曰金革之事無辟也者非與孔子曰吾聞諸老􅖫曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也記曽子問春秋不以家事辭王事閔子騫曰若是乎古之道不即人心退而致事公羊史張華為度支尚書母憂詔令攝事晉書王叔文丁母憂日夜圖起復唐書張茂宗起復尚義章公主詳見駙馬類傳記蘇頲父瓌卒有勅起復頲固辭不起時人語曰蘇瓌有子李嶠無兒侯知一年老勅放致仕上表不伏張琮丁憂自請起復髙筠母喪親戚為舉哀筠曰我不能作孝子張栖貞被訟詐遭母憂不肯起對臺中為之語曰侯知一不伏致仕張琮自請起復髙筠不肯作孝張栖貞情愿遭憂皆非名教中人並是王化外為獸心人面不其然乎僉載集金革奪情葢有通式宜自抑割即膺往㫖韋沖起復詔丁所生母憂爰降詔書敦還攝任文選禇淵碑敦諭起復衰麻外墨欒棘内毁張說姚崇碑本朝先公周顯徳末翰林學士起復裹素紗軟脚幞頭慘紫公服毎入朝猶佩魚袋或曰魚袋以金為飾亦身之華也居喪奪情不當有金寶之飾公遽謝不敏李宗諤先公談録太平興國六年詔曰三載通喪百王達禮近朝已降急於用人凡踵艱疚之臣多行抑奪之命自今並許一百日後來赴朝謝㑹要起從哀次雖孝性之隆專據經而守禮而權時之制或以義而斷恩六一集宜復寵名式從權制出居喪次非王事不談退倚丘廬讀喪祭之禮則忠孝兩得人無間言永惟狥國忘家之義非有食稻衣錦之嫌東坡記纂淵海卷三十六
