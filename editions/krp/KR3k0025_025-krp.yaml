旱中敏上䟽陳時政得失文宗嘉納之皇朝王君萬寧逺人以殿中侍為秦鳯指揮使積功擢熈河路鈐轄累官副總管同上集隴西將軍號都䕶樓蘭校尉稱嫖姚王褒囬風吹雨渭城西細草新花踏作泥岑參借問隴西行何當驅馬征草合前迷路雲濃後暗城庾慎之漢國臨清渭京城枕蜀河望極闗山逺秋深烟霧多楊烱隴陂常無極蒼山望不窮花開緑野霧鶯囀紫岩風盧果之本朝熈寧五年以秦州古渭砦為軍崇寕三年陞為州元祐五年増置隴西縣崇寕三年陞永寕砦為縣又陞寧逺砦為縣沿革表秋色滿秦川登臨渭水邉極浦涵秋月孤㠶沒逺烟潘閬隴雲連塞起渭水入關流梅聖俞渭水秋天白驪山晩照紅霜雪滿歸鬢乾坤猶轉蓬刁晋卿岷州倚郭一外縣二祐川大潭長道郡號和政西和郡沿革天文井鬼分野禹貢雍州之域周為西羌地秦為臨洮縣䝉恬築長城始于此西漢魏晋俱因之西魏始置岷州以南有岷山故名隋以其地置臨洮縣義寕二年復置岷州唐仍為岷州和政郡後陷于吐蕃本朝收復置岷州地理沿革表縣沿革祐川本西魏溢樂縣地後周置基城縣唐改為祐川後没于吐蕃本朝改為大潭長道本後魏上禄縣地隋改為長道唐天寳末廢後復置本朝屬岷州同上形勝岷山在州北洮水經其下夏禹見長人受黒玉書于此遮陽山在州東板寕山貴清山人投山俱在州東金童山樺林山露骨山崆峒山冷落山分水嶺闊博山氆氌嶺摩雲嶺俱在州境賢隠山舊有三閣姚大師讀書于此仙人崖九天聖母石洞宣澤大王石洞黒水龍王石洞八龍神王石洞俱在州境芸叟洞下有溪張舜民嘗遊此良恭河臨江河布衫川平泉金紫池俱在州境珎珠池嵗旱禱雨有應千丈潭在遮陽山下人物皇朝馬堃州人一家父叔兄弟皆以忠勇為名將堃以六郡鎮撫使守咸淳府元將楊文安與堃同里諭使降元堃不從文安乃列柵攻城潜遣勇士躡雲梯宵登斬關納外兵堃悉力向戰死之馬塈堃弟撫諸蠻治關隘皆有條理邉陲晏然後留靜江元將隅里海牙以兵夾攻三月使人招降不屈後城破塈率死士向戰被執殺之斷其首猶握拳大奮起立踰時方仆並輿地紀勝集重嵠既下潄峻嶺亦上干隴頭聞戍鼓嶺外咽飛湍瑟瑟松風急蒼蒼山月團盧杲題分水嶺塞雲多斷續邊日少光輝警急烽常報傳聞檄屢飛杜甫已喜皇威清海岱還期仙杖過崆峒同上伯夷竄首陽老耼伏柱史放神青雲外絶迹窮山裏王康居題賢隠山詩凝霜凋朱顔寒泉傷玉趾歸來安所期與物齊終始同上雄叔意同芸叟觀王資題千丈潭本朝熈寧六年復和政軍為州崇寕三年復唐縣為祐川建隆三年合良㳟大潭兩鎮置縣𨽻秦州熈寧七年自秦州來𨽻又以長道縣自秦州來𨽻沿革表樓外青山半夕陽寒鴉翻墨㸃林霜平河細草三千里一笛西風人斷腸邢嵓夫過岷州詩一江白浪摩雲嶺萬樹青松閭井河常子枕眠髙卧處月明人唱定羌歌同上河湟形勝壓西陲忽覺連營列漢旗天子坐籌星兩兩將軍解佩印纍纍王禹玉和蔡樞宻恢復洮岷蘭州倚郭一蘭泉郡號金城郡沿革天文井鬼分野禹貢雍州之域秦為隴西郡地漢置金城郡東漢省入隴西郡隋初廢郡為蘭州大業初廢州置金城郡唐復置蘭州天寳初改金城郡乾元初復為蘭州本朝置蘭泉縣地理沿革表縣沿革蘭泉本在西羗地隋置五泉縣本朝崇寕間始置蘭泉縣為蘭州治同上形勝蘭臯山在州南乃州之望山也栁溝山在州東南有溝亦名栁溝白石山在州東南以山多白石故名九州臺山在州南其形峭㧞直上如臺登之可以望逺摩雲嶺在州南其髙峻入雲中故名東岡坡在蘭泉縣東二十五里相傳唐太宗獲禇亮于此金城闗在州北二里黄河北岸黄河在州北五里阿干河在州西神泉在州西俗呼為獅跑泉水深莫測遇旱禱雨多應萬眼泉在州東北泉湧甚多可資灌溉輿地紀勝人物唐辛雲京州人有膽决以擒生斬馘常冠諸軍積功授開府儀同三司右僕射同平章事渾釋之州人有才武世為本州都督從朔方軍戰功居多累遷開府儀同三司封寧朔郡王渾瑊釋之子年十一善騎射後勇冠三軍從郭子儀復兩京積功官至檢校尚書右僕射同平章事同上集莫把阿膠向北傾此中天意固難明解通銀漢應須曲纔出崑崙便不清羅隠題黄河三年南渉河源水西出崑崙萬里餘同上金城闗上晩徘徊一笑凭欄望眼開丹硤重重抱地險黄河滚滚自天来潘若水金城宫闕聳岧嶤形勢由來勝虎牢一水自天歸大海兩山從地挿層霄李文本朝元豐四年収復金城軍為州崇寕三年置蘭泉為倚郭沿革表金城闗上望臯蘭嶺勢根磐復遶環王欽臣石磴盤雲到上頭風髙五月已驚秋李文題臯蘭山金城天險控邉關有客慿髙落照間粉堞鴉啼風滿樹碧潭魚躍水平灘丁晋戍樓築向石巖間俯瞰河流九曲灣人自玉門來上國地從紫塞設重闗黄諫記纂淵海卷二十五
