body:
  text: 記纂淵海卷二十五宋潘自牧撰郡縣部秦鳯路秦州倚郭一外縣三成紀清水天水伏羌郡號天水郡沿革天水井鬼分野禹貢雍州之域本西戎地周孝王封非子於此秦屬隴西郡漢置天水郡治平襄魏置秦州晉改漢陽為天水郡治上邽尋廢復置秦州宋齊復為天水郡隋廢郡為秦州大業初復為天水郡唐初復置為秦州天寳初改為天水郡乾元初復為秦州後移治成紀本朝因之地理沿革表縣沿革成紀本伏羲氏所生之地漢置縣屬天水郡晋以後皆因之天水唐置縣後廢本朝復置清水本漢舊縣屬天水郡晋屬畧陽郡後魏分畧陽置清水郡尋廢隋屬天水郡唐初置邽州於清水城尋廢州以縣屬秦州本朝仍舊伏羌本冀戎地秦武公伏冀戎置冀縣東漢于此置漢陽郡晉屬天水郡後魏改當亭縣後周改冀城縣隋改為伏羌縣兼置伏州尋廢州以縣屬秦州本朝為伏羌縣屬秦州地理沿革表形勝麥積山在州東南九十里狀如麥積岳平山在州西南上有龍王廟闗山在清水縣東即龍山也石皷山在伏羌縣南山有石皷不撃自鳴鳴則兵起大像山在伏羌縣西南上有石佛像寳盖山在清水縣北仙泉嶺在州東南其土中常出藥丸色黒相傳服之可以療病赤谷在州西南十二里鐵堂峽在天水東五里峽有石笋清翠清水在清水縣境縣因以名馬跑泉在州東四十里唐尉遲敬徳與畨將戰士卒罷敬徳馬忽跑出泉昇仙臺在州西南世傳老子于此昇仙瑞應寺在麥積山上隗囂宫在州東北杜甫草堂在州東五十里輿地紀勝人物周石作蜀成紀人孔子弟子唐贈石邑伯漢紀信成紀人項羽圍漢王滎陽信誑楚漢王得脱羽燒殺信李廣成紀人文帝時擊匈奴以功為散騎常侍武帝時為北平太守匈奴畏之號飛將軍隗囂天水人素有名好經書又謙恭下士名震四州三國姜維天水人仕昭烈累遷征西將軍封平襄侯唐李白成紀人唐宗室性倜儻善詩歌才思飄逸天寳初為翰林有詩集三十卷皇朝尹崇珂天水人為淄州刺史有善政後以功遷保信軍節度使劉仲武成紀人資貌雄偉累官東上閣門使以功累遷瀘川軍節度使張俊成紀人好騎射負才氣政和中以討河朔羣冦為都指揮使後以功累遷太傅封清河郡王輿地紀勝集麝香眠石竹鸚鵡啄金桃杜甫題麥積山自開茅屋趣只想竹窓眠歸谷山雲起侵籬澗水懸同上晨發赤谷亭艱險方自兹杜甫過赤谷詩峽形藏堂隍壁色立積鉄杜甫秦州城北寺勝跡隗囂宫月明垂葉露雲色度溪風同上本朝建隆中酋長上波了獻地為伏羌砦屬清水縣熈寧三年為伏羌城屬秦州沿革表路入青松翠靄間斜陽倒影下溪灣李師中題麥積山重臺猶在碧山層想象真仙為勉登蔣之竒題昇仙臺清甘一派古祠邊昨日親烹小鳯團却恨黄陵無品目煩君精鍳為當㸔㳺師雄題馬跑泉鳳翔府倚郭一外縣六天興岐山扶風郿寳雞麟游普潤郡號扶風岐陽郡沿革天文井鬼分野禹貢雍州之域周為岐周地春秋戰國為秦地始皇并天下以屬内史漢初更内史名中地郡後復故景帝分屬右内史武帝更曰右扶風與京兆左馮翊為三輔三國魏為扶風郡晋為秦國後魏置平秦郡又于郡東置雍城鎮後改鎮為岐州西魏為岐陽郡隋初為岐州大業初改為扶風郡唐初復為岐州天寳初改扶風郡至徳初改鳯翔郡尋改鳯翔府號西京寶應間罷京名屬闗内道五代時屬關西道本朝仍為府屬秦鳯路地理沿革表縣沿革天興春秋時為故雍秦置雍縣漢屬右扶風唐析置天興縣改省鳯翔屬天興岐山古岐周地漢為雍縣地唐時移治不一本朝屬鳯翔府扶風周為岐陽鎮漢為羙陽縣地唐貞觀中改為扶風縣本朝仍舊郿本秦縣漢屬右扶風西魏郿城縣唐改為郿縣屬鳯翔府本朝因之寳雞本秦陳倉縣漢屬右扶風唐至徳初因秦文公獲石雞之異改為寳雞縣本朝因之麟逰本漢右扶風之杜陽地隋置鳯棲郡尋因獲白麟更名麟逰縣唐初廢郡為麟州貞觀初州廢以縣屬鳯翔府本朝因之普潤本漢漆縣地隋為普潤縣唐并本朝仍舊同上形勝岐山在岐山縣東北文王時鳯鳴岐山即此雍山在府西北雍水所出故名梁山在岐山東太王去邠踰梁山即此陳倉山在寳雞東南上有石類山雞晨鳴山頭聲聞三十里茂陵山在扶風東北林壑秀美漢末馬超居此鳴鳯山在麟遊西舊傳常有鳯鳴其上周原在岐山東北詩曰周原膴膴即此青峰山在寳雞東南峰巒蒼翠故名龍尾坡在岐山東鄭畋嘗破巢兵于此磻溪石在寳雞東南即周太公釣處渭河在寳雞縣治東湖在府治東魚龍川在府境潤徳泉在岐山西北相傳時平則流亂則竭九成宫在麟逰縣西本隋仁夀宫唐太宗脩以避暑更名九成宫石鼻寨在寳雞東諸葛亮所築以拒郝昭紀勝人物周周公旦岐山人生有聖徳輔成王制禮作樂召公奭輔武王定天下又輔成王以成聖治白起郿人善用兵秦昭王用為左庶長戰勝攻取後封武安君漢井丹郿人通五經善談論隠居不仕當世髙之南北朝蘇孝慈扶風人少沉謹有器局為中侍上士後以功進位開府爵靈水縣公唐楊炎天興人性至孝父喪廬墓號慕時切有紫芝白雀之祥詔表其閭唐徳宗時拜相皇朝張載郿人舉進士為神州司法召為崇文殿校書同知太常禮院與執政不合告歸居横渠教人以禮闗西之士翕然宗之所著有東銘西銘正蒙諸書張戬載弟篤行不茍為一時師表闗中稱為二張輿地紀勝集西京無暑氣夏景似清秋江山通蜀國日月近神州李徳新水落魚龍夜杜甫題魚龍川詩蒼山入百里岸斷如杵臼層宫憑風迴岌嶪土囊口立神扶棟梁鑿翠開戸牖其陽産靈芝其隂宿牛斗題九成宫關山陵旦開石路無塵埃重門臨去壑連棟起崇隈王勃題大散關本朝乾徳初置崇信縣淳化中割崇信屬儀州熈寧五年廢乾州以好疇縣来𨽻沿革表聞昔周道興翠鳯棲孤嵐飛鳴飲此水照影弄毿毿扶風古三輔政事豈汝諳聊為湖上飲一縱醉後談並蘇軾題東湖詩聞道磻溪石猶存渭水頭蒼崖雖有跡大釣本無鈎山頭孤月耿猶在石上寒波暁更喧並題磻溪石翠鳯舊依山硉兀清泉長與世窮通蘇軾題潤徳泉詩此臺一覧秦川水不待傳經意已空題授經臺隴州倚郭一外縣三汧源汧陽吳山隴安郡號汧陽郡沿革天文井鬼分野禹貢雍州之域周為岐隴之地春秋屬秦國秦并天下屬内史漢為汧縣屬右扶風西魏改隴州因山為名後周省入岐州尋復置隋省入扶風郡復置隴東郡唐改汧陽郡後復為隴州治汧源縣本朝屬鳳翔路地理沿革表縣沿革汧源在隴州治東南後魏為汧隂縣隋改曰汧源唐本朝並為州附郭縣汧陽本漢隃糜縣地屬右扶風後周置汧陽郡及縣以古汧水之陽故名尋廢郡以縣屬隴州唐本朝仍舊吳山本漢隃麋縣地後魏置長蛇縣隋改吳山縣唐改華山縣尋復舊本朝因之隴安本唐汧陽縣地本朝置隴安縣同上形勝隴山在州西北六十里山髙而長其頂有泉吴嶽山在州南比諸山最秀異頂有龍湫小隴山在縣西岩障髙峻不通軌轍龍盤山在吴山縣東南為一州之勝西秦山在隴安北内有秦王試劒崖景福山在隴州西北亦名龍門山卧虎山在汧陽東以形似名天池溝在汧陽東水流不涸珍珠泉在汧陽南泉湧如珠故名汧陽閣在汧陽縣治隴亭在山旁八卦亭在州西北有仙人鍾離權洞賓遺跡苦寒亭在州西輿地紀勝人物周非子汧陽人伯益之後善養馬為孝王主馬于汧渭之間馬大蕃息秦使叙嬴氏之祀漢郭欽州人哀帝時為丞相以㢘直名唐段秀實汧陽人征討有功累拜涇原節度使贈太尉同上集吳嶽曉光連翠巘李善正我所思兮在漢陽欲往從之隴坂長張衡汧水悠悠去似絣逺山如畫翠眉横僧尋野渡歸吴嶽鴈帶斜陽入渭城韋莊秦隴無人塞草腥將軍一去泣空營漢家天子東巡狩行到江南又起兵隴亭童謡憶昨逰隴坂髙秋視吳嶽杜甫本朝熈寧八年改秦州定邉砦為隴西鎮𨽻縣開寳二年析汧陽縣四鄉置隴安縣沿革表凍雲凝白雪漫漫不是寒亭分外寒六月大雹天不雨請君來此凭䦨干王庶題苦寒亭隴山如碧環缺處蒼崖開當年造物手辦此何神哉劉昻雷鳯州倚郭一外縣二梁泉河池兩當郡號河池郡沿革天文井鬼翼軫分野禹貢梁雍二州之域春秋時氐羌所居秦為隴西郡地漢為故道河池二縣後魏于此置梁泉縣西魏改為鳯州隋廢州置河池郡唐初復鳯州天寳初改河池郡乾元初復為鳯州五代時蜀置武興軍本朝仍為鳯州地理沿革表縣沿革梁泉本氐羌故地秦為隴西郡漢為故道縣後魏置梁泉又更名凉泉尋復為梁泉河池春秋時氐羌所居秦為隴西郡地漢為河池縣屬武都郡晋䧟于氐羌後魏置廣化郡及縣隋初郡廢以縣屬鳯州仁夀初復名河池縣本朝因之兩當本漢故道縣地屬武都郡晉䧟于氐羌後魏置兩當郡及縣因界内兩當水為名隋廢郡以縣屬鳯州本朝因之同上形勝鳯凰山在州東鳯凰嘗棲此紫栢山在州東南上有一十七洞異人多隱於此南岐山在州南上有竹雲洞内有湫池君子山在州西南上有靈惠廟御愛山在州東北唐徳宗巡幸至此愛玩故名豆積山在州北上有不老泉仙人洞唐張果之隠處一名遯迹山文子谷唐僖宗幸蜀至此武休闗在州東馬嶺闗畫眉關大散川黄花川斜谷河鳴玉泉連雲棧橋并在州境和尚原在州東即吳玠敗烏珠處鐵山在河池縣東南天門山在河池東南伶倫山在河池南天池山在河池南青泥山在河池南木皮嶺在河池西銀椿崖在河池東北金蓮洞在河池西髙數十仭首陽洞在卧龍山畔仇池石在天池山仙人闗在河池東小河闗在河池南嘉陵江在河池南忠義水在河池南鸑鷟山在兩當縣東上有登真洞董真峪在兩當東南上有真人庵分水嶺在兩當縣東獅子川在兩當縣境輿地紀勝人物皇朝文彦博邠州人㣲時寓居兩當縣富民郇氏之家教授生徒邵雍河南人嘗寓居鳯州同上集寒城朝烟積山谷落葉赤隂風千里來吹汝江上宅杜甫題吴郁宅溪從沮水流嶓􅜗嶺接青泥入劒天史瑜首路栗亭西尚想鳯凰村南登木皮嶺艱險不易論始知五嶽外别有他山尊杜甫題木皮嶺山城薄酒不堪飲勸君且吸杯中月李太白鳯州詩楊栁垂青絲風動入飛蓋邵堯夫鳯州飛蓋亭詩古時應是山頭水自古流来江路深元稹題嘉陵江借問嘉陵江水湄東川東去爾西之薛逢題鑿崖泄奔湍稱古神禹蹟韋應物題嘉陵江本朝乾徳五年降防禦為團練開寳五年移河池治故鎮至道元年移兩當治唐鄉鎮沿革表里數三千七百餘兩當冬夜宿中途舉朝五往来西蜀還有區區似我無趙抃赴益州猿啼鬼迷店馬噤飛石鋪陸㳺過鳯州嘯歌山水重黄庭堅嘯歌臺當日蒙塵極險艱正由蒼翠强開顔吾皇髙拱巖廊上只愛生靈不愛山王素題御愛山不是當時經御愛此山還與衆山同趙抃題御愛山豆積更名為遯迹西康麥積合如何袁桂題豆積山我携此石歸袖中有仇池東坡鳥去林自空雲移山不礙塞目烟岑宻都城若天外邵雍登鳯州城詩階州倚郭一外縣一福津將利郡號武都郡沿革天文井鬼分野禹貢雍州之域戰國時白馬氐居焉漢武為武都郡魏置武階郡改置武州唐為行州後復立武州更名曰階州本朝初𨽻秦鳯路地理沿革表縣沿革福津本後魏覆津縣屬武階郡隋屬武州唐改曰福津本朝因之將利本後魏石門縣西魏改安育後周又改今名唐武州治于此同上形勝石雞山在州東有石雞神廟盤堤山在州東南近有盤堤城鳯凰山在州東南漢世曾有鳯凰棲其上有鳯凰臺鹿玉山在州東山下溪中水潄石如玉故名仇池山在州西北四面壁立峭絶醉仙崖在州南連鳯