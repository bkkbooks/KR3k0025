body:
  text: 記纂淵海卷八十五宋潘自牧撰釋部佛史漢驃騎將軍霍去病出隴西過焉支山收休屠祭天金人顔師古曰今佛像是其遺法也西漢初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不減隨復受形生時所行善惡皆有報應故所貴修煉精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圗其形像而王公貴人獨楚王英最先好之通鑑漢明紀專尚釋氏逺近成風無不事佛梁高祖客問三教李士謙曰佛日也北史魏本傳隋初民間佛書多於六經數十百倍通鑑隋紀功德使上言鳯翔法門寺塔有佛指骨相傳三十年一開開則歲豐人安上遣中使僧衆迎之通鑑唐憲宗元和十三年傳記浮屠佛也佛者漢言覺也將以覺悟羣生也沙門者漢言息也盖息意去欲而歸于無為也袁宏漢記集相貎既闢睟容已安選碑金姿寶相永藉安選行狀佛法入中國邇來六百年庶民逃賦役高士著幽禪韓詩佛之道轉惑見為真智即羣迷為正覺捨大闇為光明柳文西軒記國無有三惡八難人無有十纒九惱柳文永州龍興寺記信士圗為佛像法相甚具焉浮圗事神而語大金仙氏之道葢本於孝敬而後積以衆德歸於空無其敷演教戒於中國者離為異門曰禪曰法曰律以誘掖迷濁並栁文仲尼之有十哲猶如來之有十大弟子迦葉阿難須菩提舍利佛迦旃延目乾連阿那律優婆離羅候羅是也白傅集是法平等故所至為淨土是身應供故隨念降生劉賓客清淨不染花中蓮捧持世界百億千同上晬容瑞相並同上三十二相具八十一種好備歐陽行周金蓮捧足寶珠垂髻王建集本朝金仙氏之教有自來矣天毒之國實紀於山經竺乾之師嘗聞于柱史西京名將得休屠天祭之人東漢諸王為蒲塞桑門之饌楊文公處州金沙院記佛晦靈迹骨生舍利應現無方佛之靈骨金剛不朽刼火不燒金剛之骨賁育擊以千鈞之力終莫能毁類要吴孫權時僧㑹所言僧史初帝聞西域有神其名曰佛遣使之天竺求其道得其書及沙門以來其書善為宏闊勝大之言精於其道者號沙門通鑑漢明帝紀趙主石勒以天竺僧佛圗澄預言成敗數有驗敬事之及虎即位奉之尤謹衣以綾綿乘以雕輦明㑹之日太子諸公五日一朝國人化之率多事佛澄之所在無敢向其方面涕唾者爭造寺廟削髪出家通鑑晉成紀秦王興以鳩摩羅什為國師奉之如神親率羣臣及沙門聽羅什講佛經三百餘卷大營寺塔沙門坐禪者嘗以千數公卿以下皆奉佛由是州郡化之事佛者十室而九晉安紀帝以惠琳道人善談論因與議朝廷大事遂叅權要賓客輻輳門車嘗有數十兩四方贈賂相係方筵七八座上賞酒琳著髙屐披貂裘置通呈書佐㑹稽孔顗嘗詣之遇賓客填咽暄涼而已顗慨然曰遂有黑衣宰相可謂冠屨失所矣通鑑南史宋髙祖紀時佛教盛於洛陽中國沙門之外自西域來者三千餘人通鑑梁武帝天監八年魏自正光以後僧尼至二萬人通鑑梁髙祖閩王延鈞度民二萬為僧由是閩中多僧唐明宗紀勅天下寺院非勅額者悉廢之禁私度僧尼是嵗天下見僧四萬二千四百四十四周世宗顯徳二年傳記晉道安受業於佛圖澄澄姓帛氏以師莫過於佛遂以釋為姓類記事始四姓為沙門皆稱釋種增一阿含經沙門有三坐禪為上輩助衆為下輩無為經僧曰苾芻本是草名有五義一生不背日二冬夏常青三體性柔軟四香氣逺騰五引蔓旁布為佛弟子理義亦然其精至者號為沙門尊勝經百尺竿頭須進步十方世界是全身傳燈錄後漢明帝遣蔡愔等天竺訪僧見摩騰乃要還漢地此中國有僧之始史略曰明帝聴陽城侯劉峻等出家此又中國人為僧之始事物紀原集法輪明智日慧海度慈航梁昭明太子詩戒珠靡鐵忍鎧無違智燈含影慧駕馳騑梁簡文帝慧日低輪下禪枝而返照法雲凝葢浮定水以涵光駱賓王燒葉成香早得熏修之漸拂花為供都忘染著之疑崔融懐素律師碑擯俗捨家投簪落采衣屏繒纊食惟菰麥同上惟有牟尼珠可照濁水源杜戒珠如水獨潔麒麟之行法寶如山普聞獅子之吼燕公集梵旅時出寺杜禪師都未知名姓始覺空門氣味長同上願將功德水從此灌塵機孟浩然法雨晴飛去天花晝下來同上百千萬刼菩提種八十三年功德林八十三歲若不乘持僧行苦將何得荅佛恩深慈悲不瞬諸天眼清淨無塵幾地心每歲入關家九度戒律慇懃一戒重千金白傅集以無為為心地以不二為法門口藏宣傳十二部心臺照耀百千燈以眞如不二之宗助清淨得一之化蓮花法藏心懸悟貝葉經文手自書蓄為道粹掲作僧豪道塲半夜香花冷猶在佛前禮佛名並同上錫杖隨縁草廬入定行止依頭陀之法住持逺聲利之嫌裴休元和尚碑講法則金蓮冬敷頓錫則靈泉湧溢李華徑山碑晉宋尚法故為碑者多法梁尚禪故碑多禪法不周施禪不大行而律存焉故近世碑多律柳宗元道源生之善根宿植深嗜法語忘甘露之味脩最上乘解第一義無體空折色之跡而造乎真源通假有借無之名而入於實相並同上燈前便是觀心處元微之心超幾地行無處雲到何天住有期頓見佛光身上出已蒙衣内綴牟尼同上八部天人入道塲劉賓客慕道遵壊削之儀同上同翻貝葉文劉長卿逺岳廻飛錫空門卧白雲山僧獨住山中老惟有寒松見少年作梵連松韻焚香入桂叢惟將舊瓶鉢却寄白雲中花門午時飯雲外青山鐘滿腹萬餘卷息機三十年身隨敝履經殘雪手綻寒衣入舊山獨向清溪依樹下空留白日在人間老鶴無衰貎寒松有本心並同上秖恐為僧心不了為僧得了盡輸僧杜荀鶴童子為僧今白首暗鋤心地種閒情時將舊衲添新線披坐披行過一生同上韓愈貶潮州浮圗之士歡快獨師憤起求序以資適潮不顧險毒皇甫湜自翻貝葉偈人施福果衣姚少監上人從儒至道從道至釋如歴星月以得白日若棄扇翣而洒清風歐陽行周寂寂方丈内瑩然虛白門千燈智慧心片玉清羸顔同上登滿足地超究竟天王建法向空林說心隨寶地平王建欲結三天社初降十地魔許用晦心出是非外跡辭榮辱中禪心空已寂世路任為岐到院客長見閉關人不知寺喧聽講絶厨逺送齋遲並同上水月通禪觀魚龍聽梵聲錢起獨樹月中鶴孤舟雲外人榮華長指幻衰病久觀身張承告師步有雲隨師情惟鶴知方雄飛讀盡龍王宮裏書劉禹錫善師了逹無牽束竹徑生苔晝掩門方雄飛佛不逺人即心而證法無所著究境皆知權載之雖然到城郭衣上不棲塵孟東野駕横海之大航拯迷塗於彼岸唐文粹闡律藏而日月光明騁辨才而龍象蹴踏同上千峯明一燈愛僧不愛紫衣僧鄭谷一瓶一鉢垂垂老唐僧貫休詩空門氣味長同上本朝清譽落人間臨川如不動山如常撞鐘如一水月如萬竅風東坡領䄂萬僧同上開不二門設無盡藏道價喧宇宙陳後山人皆趨世出世者誰人皆遺世世誰為之爰有大處比兩間非濁非清非律非禪東坡集心開寶月嬋姢處身寄浮雲出没間欒城集臨夏巾鉼誰與共迎秋水石不勝閒師始以法教人叩之必鳴如千石鐘來不失時故人皆以辯名之及其退居此山閉門燕座寂黙終日葉落根榮如冬枯木風止波定如古澗水故人以訥名之並同上彼有釋氏子願力何堅固疏食十四春蓮經一萬部戸庭未嘗出唇齒欲爛腐邇來功行滿漸覺休息處閒詠詩逺公初度江道譽藹東晉參寥子詩講説史秦王興以鳩摩羅什為國師親帥羣臣及沙門聽羅什講佛經又命羅什翻譯經論三百卷通鑑晉安帝紀據法座講大覺凡在瞻聽塵蔽俱開梁武天監八年支道林許椽共在㑹稽支為法師許為都講支通一義四座莫不厭心許送一難衆人莫不忭舞世説傳記以智慧刀裂煩惱網金光明經以智慧劒破煩惱宅維摩經聽聞妙法如飲甘露本淨禪師曰若欲求佛即心是佛若欲㑹道無心是道傳燈録集能令梵志達亦使羣魔驚梁元帝聽講詩以智慧火燒煩惱薪陳徐陵長干寺碑仗智慧劒破煩惱軍盧藏用説法動海岳遊方化公卿微言注百川亹亹信可聴一風皷羣有萬籟各自鳴李白黄金獅子承高座白玉麈尾談重𤣥同上登法席居講坐緇素觀聽天龍圍繞揺麈尾而析理風生弄象鼻而吐辭河注震雷霆之法皷聾俗知驚整日月之慈燈幽途識曉崔法雄碑抉開生育眼擺去煩惱塵燭以智慧日灑之甘露津千界一時度萬快無與隣白傅集口藏宣傳十二部同上開善誘之門方便之力白帖拯苦海之沉溺救火宅之燒焚啟覺路之緘縢發空門之扄鐍並同上髙筵談柄一麾拂講下聽徒如醉醒劉賓客十方傳句偈八部㑹壇塲外道邪山千萬重眞言一掃盡摧鋒並同上講席邀談柄孟浩然詩觀中人滿坐觀外後至無地無由聽韓愈華山女詩一雨普沾於衆縁萬籟各吹於本分張説之晉逺法師作念佛三昧詠大勸于時其後天台顗大師著凈土十疑論𢎞宣其教周密微妙迷者咸頼焉柳文龍興寺記由其内者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之言道要莫不悽欷欣踴如獲赦宥同上釋第一義開不二門王維集談𤣥漸入微闕本朝法師説法臨泗州無數天花隨麈尾坡詩揮麈空山亂石聽同上戒律傳記精進持淨戒猶如護明珠法華經受諸飲食當如服藥勿生増減如蜂採花但取其味不損色香教戒經律師持戒自縛𫝊燈録集閑邪以律謝靈運作惠逺碑守律䕶戒燕公集戒月如珠獨潔麒麟之行燕公集究律藏持範之軌峻僧法集止之儀裴休碑戒得長天秋月明心如水上青蓮色李太白得徑入大道乘此不退轉白侍郎恩愛捨骨肉飲食斷腥膻同上八戒堅持用戒脩心白帖未及超於解脱且當攝於威儀同上脩整觀行尊嚴法容以儀範於後學者以為持律之宗焉柳文嗚呼無得而脩故念為實相不取於法故律為大乘壊衣不飾揣食不味覆薦取役凡出於生物者擯而勿用不自知其慈攝取調御凡歸於正眞者動而成羣不自知其教萬行方厲一性恒如柳文儒以禮立仁義無之則壊佛以律持定慧去之則喪故離禮於仁義者不可與言儒異律於定慧者不可與言佛同上非獨心長凈衣無一㸃塵姚少監天與出家腸一食齋不飢同上旣飽心頭飯不醉聲文酒王建年到白頭日行如新戒時方雄飛本朝寒守三衣法飢傳一鉢歌臨川禅定史秦王興大營塔寺沙門坐禪者常以千數通鑑晉安帝紀魏主建鹿野浮圗於苑中之西山與禪僧居之通鑑宋明帝紀集攝亂以定謝靈運作惠逺碑燈影照無睡心清聞妙香杜身猶縛禪寂禪翕只宴如苔蘚滿藤鞋荀鶴我心無我亦無君元微之禪僧偶向花前定滿樹狂風滿樹花蓮花舊是無波水莫逐狂風起浪心並同上苦海莫能漂刼火不能焚白樂天乘不退之輪證無生之觀白帖宻行傳人少禪心對虎閒劉長卿光明偏照智見獨存王維禪房空掩白雲飛劉文房禪心三界外宴坐天地中孟東野趺座簷前日焚香竹下煙王建老僧齋罷閉門睡不管波濤四面生羅隠久披山衲壊孤坐石牀寒文苑英華始覺禪門氣味長杜牧之本朝老僧獨得無生樂終日焚香坐結跏歐公集蘧蘧未必都非夢了了方知不落空坡詩靜故了羣動空故納萬境同上僧定端居不計年欒城詩蒲團布衲一藤床心地虛明睡自亡同上莫怪道人口掛壁桃花燕子自能禪語録參請傳記洞山云這裏合下得一轉語有一上座語九十六轉不愜師意傳燈錄百千法門同歸方寸河沙妙德總在心源守清禪師有僧問末後一句師曰塵中人自老天際月常明問如何是和尚家風曰一缾兼一鉢到處是生涯問佛法大意曰擾擾匆匆晨鷄暮鐘同上集四時長者頻叅白露之溪三月蒲輪屢問梧桐之水庾信碑翼亮緇徒發揮元極陳子昻彫談全奥旨妙辯潄𤣥津駱賓王吾師雨花外杜詩欲離煩惱三千界不在禪宗八萬條元微之遍將死苦救人間今因為説無生死並同上所示廣大深迥非造次可諭韓文與顚師書由其内者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之稱道要莫不悽欷欣踴如獲赦宥柳文傳佛與心元臣碩老稽首受教髮童齒毁踴躍執役並同上一言頓悟不踐初地五師相承授以寶噐劉賓客以智月開瞽法鼓破聾李華塔紀以心傳心天地不知唐蔣防文問者廓然自得佛味盧肇所至之邦被蒙法味權載之凡一燈所傳一雨所潤入法界者不可勝書同上本朝却為叅禪買得癡臨川禪指未終千偈子坡詩為公分作無盡燈照破十方昬闇鎖巉巉玉為骨凜凜霜入齒法師自有衣中珠不用辛苦泥沙底萬象入我牟尼珠機鋒不可觸千偈如翻水憑師為作鐵門限準備人間請話人並同上修行傳記晉沙門惠逺於廬山集一時名士高僧㑹於般若臺精舍立誓同修凈行俱為佛國之遊本傳廬山記云因號曰白蓮社集遣十纒之繫縳袪五惑之塵滓江總文室空無侍者巾屨唯掛壁一飯不願餘跏趺便終夕柳詩四祖數十年中脅不至席圭峯禪詮超悟傳記虛幻非實身喻芭蕉之形明徹無瑕心學琉璃之地白帖超大塵之境獨步迦羅㑹一乘之旨隨機化物聖教序五藴皆空諸漏已盡高僧傳手提諸佛直指本來面目諸方尊宿無能出其右𫝊燈録永嘉𤣥覽禪師初謁六祖問荅相契便欲辭去祖留一宿覺同上集遂掲無生之筌而時超有漏之句顓潔道行受蓮華經經極翻三心滅不二形妄縁盡歸眞化冥陳子昻湛心觀心煉性見性李邕四禪合真如一切是虛假孟浩然傳千燈于智種了萬法於眞空李白崇法寺文眞機澄天光獨朗謝垢氣李白已窮佛根源韓送文暢詩外形骸以理自勝不為事物侵亂韓文生而未始來殁而未始徃柳文脩最上乘解第一義無體空折色之迹而造乎眞源通假有借無之名而入於實相永州寺記脱去穢累超詣覺路同上性眞悟幻泡行潔離塵滓白侍郎心中眼觀心外相只有觧脱門能度衆苦厄以無相為心地以不二為法門契心則離於文字得意則假於筌蹄悟本生不滅之義證心地無相之宗㧞有漏之身超無量之法並同上心臺照耀百千燈白贈宗宻上人詩一悟寂為樂此生閒有餘王維五藴本空六塵非有於多刼來植衆德本於般若力坐菩提家心主自在萬有皆如頂法眞空一乘不立並同上中止水外浮雲權載之嘗欲出健羡遺名聲不使塵機世想滑湣靈府同上情超五濁志悟三明劉禹錫求法不二解空第一逹無量義轉不退輪李嶠碑我無生滅隨世縁李華碑萬縁盡空一切不動李適之禪師法顯碑光陰難駐跡如客許用晦心火自生還自滅元微之因知萬法刼盡與浮雲齊劉文房悟色身無染觀空事不爭道心長日笑覺路幾年行張承吉見性覺經繁姚少監㑹理却無我觀空厭有形孟東野行高識逺超悟辨達唐文粹從見在身盡未來際同上百丈得大用黄蘖得大機唐録眞空洞照熱惱頓盡水其性雲其身歐陽行周本朝浮雲掃盡但掛孤月坡詩古佛既手提諸方皆席卷如蟲得羽化已脱安用繭同上具正法眼超然無累於物樂城集定力傳記晉惠逺居廬阜三十餘年影不出山跡不入俗每送客以虎溪為界高僧傳廬山記云昔逺師過此虎輒號嗚遂為名焉身影不落俗家釋氏㑹要穏披雲衲坐藤床杜荀鶴集隆安六年桓温遣書於惠逺令致敬王者惠逺荅書論不可致之意又言袈裟非朝廷之服鉢盂非廊廟之器軍國非沙門之像遂著沙門不敬王者論五篇惠逺集三濁四染不能渝其質崔融律師碑雙舄不踐居士之門六根不染欲界之塵獨孤及作律師銘八風吹不動寒山子詩自負史釋道安曰彌天釋道安晉書傳記晉沙門釋道安自號彌天模楷三寶記晉慧逺既入道常以大法為已任廬山逺法師傳僧補朝官史廬陵王義眞欲以慧琳為西像都督通鑑宋文帝元嘉元年帝以慧琳美談論與朝廷大事遂參權要賓客輻輳孔顗曰遂有黒衣宰相可謂冠屨失所矣同上傳記隋文帝以沙門彦琮為翻經館學士後始命僧以事事物紀原僧贈諡史興善寺胡僧不空卒贈開府儀同三司司空諡曰大辨正廣智不空三藏和尚通鑑唐太宗大歴十年傳記後魏太祖時僧法果卒贈老夀將軍諡趙胡靈公此僧賜諡之始也事物紀原僧賜紫史大唐三年僧惠崇賜紫袈裟代宗實録傳記僧史略曰則天朝僧法朗等賜紫袈裟僧之賜紫自天后始事物紀原集愛僧不愛紫衣僧鄭谷詩論法集大千入毫髪李太白説十善法為小乘説四諦法為中乘説十二因縁法為大乘白居易與清法師書未悟病時須去病已知空後莫依空白戒生定定生慧慧生八萬四千法門同上百千聞法咸蒙離垢億萬同㑹俱證無生李華浮圗之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不遂困窮之謂慈劉賓客其道以無為為有以空洞為實以廣大不蕩為歸柳文性海吾鄉也法界吾宇也戒為之墉惠為之戸以守則固以居則安動無不虛靜無不為生而未始來殁而未始徃也同上度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也權載之文桑門之患有二焉未得之患為外見所雜既得之患為内見所縳十二因縁之中生死循環憂悲藴聚非大聖以利刃斷之慈航濟之則淪胥顚没之不給矣同上積苦為海舉足見溺積邪為山舉足見礙文粹本朝震雷霆之法皷聾俗知驚整日月之慈燈幽途識曉類要笑謂西來意雖空亦不空臨川文萬事都從刼火燒同上童子畫沙已具佛智維摩無語猶步二門東坡若造法界本造於心則雖凡夫皆具此理外道壊法如刀截空壊者既妄護者亦空論道無大小雖至於大菩薩其視如來猶若水淵然及其以無所故而得則承蜩意鉤毁瓦畫墁未有不與如來同者也爾以捨來我以慈受各獲其心寶訓誰有室空無有獨設一榻空毗邪城奔走竭蹙二士共談心説妙法彈指千掲了無所説有言皆幻無起不滅問我何為鏤氷雕雪佛以一口而説千法千佛千口則為幾説我法不然非千非一如百千燈共炤一室各雖徧滿不相壊雜世人視身如金玉不旋踵為糞土至人反是予以是知一切法以愛故常壊以捨故常在學者以成佛為難乎累土畫沙童子戯也皆足以成佛以為易乎受記得道如菩薩大弟子皆不任問疾是義安在方其迷亂顚倒流浪苦海之中一念正眞萬法皆具及其厪苦為山九仞之後毫釐差失千刼不復竹中一滴曹溪水漲起西江十八灘未能轉千佛有主還須更有賓不如無鏡自無塵並同上論經傳記經卷雖小佛口所説續高僧説集具葉傳金口駱賓王以正義度無邊以圎教垂無窮莫尊於妙法蓮花經凡六萬九千五百言證無生忍造不二門住不可思議觧脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘湼槃實無得度者莫先於金剛般若波羅宻經凡五千二百八十七言壊罪集福凈一切惡者莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀眞相莫出於觀音普賢菩薩行法經凡六千九百九十言詮自性本覺莫便於實相法宻經凡三千一百五十言空法塵依佛智莫過於般若波羅宻多心經凡二百五十八言是八種經共十二部合一十一萬六千八百五十七言三乘之要指萬佛之秘藏盡矣佛湼槃後世界空虛惟是經與衆生俱設有人書貝葉上藏檀龕中非堅非久如蠟印空假使人刺血為墨剥膚為紙即滅如筆畫水畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付嘱之心白傅集法之至莫尚乎般若經之大莫極乎湼槃柳文本朝釋迦以文教其譯於中國必託於儒之能言者然後傳逺故大乘諸經至楞嚴則委曲精盡勝好獨出者以房融筆授故也坡詩僧寺史後趙石勒奉佛國人爭造寺廟通鑑時佛教盛於洛陽中國沙門之自外域來者三千餘人魏主别為之立永明寺千餘間以處之北及延昌州郡共有一萬三千餘寺梁武帝天監八年魏世宗作瑶光寺胡太后又作永寧寺皆在宮側又作石窟寺於伊闕口皆極土木之美而永寧尤盛佛殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也天監十五年元魏自正光以後寺有三萬餘區梁高祖魚朝㤙奏以所賜莊為章敬寺以資章敬太后冥福唐代宗天歴二年吐突承瓘領功德使盛修安國寺奏立聖德碑唐憲宗元和三年王智興以上生日請於泗州置戒壇度僧尼以資福唐穆宗長慶二年祠部奏括天下寺四萬六百蘭若四萬僧尼二十六萬五百上惡僧尼耗蠧天下欲去之道士趙國眞等復勸之乃先毁山野蘭若至是敕上都東都兩街各留二寺每寺留僧三十餘人僧及尼大乘穆護祅僧皆勒歸俗僧尼二十六萬五百人唐武宗紀武宗毁招提蘭若四萬唐食貨志勅於兩街四寺各置戒壇度人三七日唐懿宗咸通三年勅天下寺院非勅額者悉廢之是嵗天下寺院存者二千六百九十四廢者三萬三百六十三周世宗顯德三年傳記尚書御史所止皆曰寺故後代道場及寺宇皆取其稱焉應劭風俗通舍黧國有維摩故宅顯慶中王𤣥䇿以笏量基止有十笏故號方丈室唐高僧傳漢明帝於東都門外立精舍以處攝歴騰竺法蘭即白馬寺也騰始自西域以白馬䭾經來初止鴻臚寺遂取寺名剏置白馬寺即僧寺之始也事物紀原東晉何充始捨宅安尼之起也同上集崇基表刹立禪誦之堂焉選寺碑法皷琅以振響衆香馥以揚煙天台賦傍見精舍開長廊飯僧畢孟浩然野寺垂楊裏杜詩野寺殘僧少上方重閣晩百里見秋毫野寺江天豁杜林蘭若秋風晩更宿招提境金刹青楓外同上窕窈青蓮宇元微之寺之殿臺與城之樓交錯相輝綉于碧霄望之如崑閬間物劉賓客躋閣謁金像攀雲叩禪扄韋應物岧嶢青蓮界同上片雲生半壁萬壑遍千鐘劉長卿禪房空掩白雲中同上發地結青茅團圎抱空白山花落幽户中有忘機客柳詩南岳長老代宗名其居曰般舟道塲同上招提精舍梵宮祗園凈土並寺名白帖松日明金像苔龕響木魚司空圖林是㫋檀更無雜樹花惟薝蔔不嗅餘香王建僧居隨處好温飛卿郭裏雲山全占寺方雄飛何如一衲塵埃外日日香煙夜夜燈羅隠八功德水波動青蓮之池七寶香花光映黄金之地唐文粹蓮花天晝浮雲卷貝葉宮春好月停僧皎然詩本朝青松行盡到山門亂峰深處開方丈已能宴坐老山中何用聲名傳海上歐公詩踈鐘挾谷響悲梵入樵歌臨川滿院秋光濃欲滴老僧倚杖青松側只怪高聲喚不譍嗔人踏破蒼苔色㑹要僧寶磨詩又見坡詩注武宗㑹昌五年八月毁招提蘭若四萬餘區㑹要元和二年薛平奏諸請賜中條山蘭若額為大和寺葢官賜額者為寺私造者為招提蘭若杜牧杭州南亭記所謂去其山臺野色四萬所是也温公通鑑考要夜凉疑有雨院靜似無僧坡詩精廬髣髴類天宮欒城詩相貌集老鶴無衰貎劉長卿伏犀挿腦高頰顴韓退之晢晢肌骨松寒玉清歐陽行周千燈智慧心片玉清羸顔同上道成神氣閒劉賓客靄然之和登於眉宇得其道者不待言説權載之生有異表㓜無兒戲嶷如山立湛如川停舌廣長以覆準足文理而成字權載之山貎自高古杜牧之戒臘集臘數等松椿賈浪仙山僧獨在山中老惟有寒松見少年劉長卿披剃史吳夷狄之國祝髪穀梁范甯曰祝斷也後趙石虎奉佛國人削髪出家通鑑魏主親為沙門師賢等下髪以師賢為道人統宋文帝紀祝髪事浮屠唐書傳記投簮落髪委命受業廬山記集行行入幽荒甌駱從祝髪選景陽雜詩慕道尊壊削之儀劉賓客西晉已上不許中國削髪石苻亂華乃弛厥禁事物紀原本朝覆以慚愧之衣落其煩惱之髪見類要住持集緇徒擁膝迦孟浩然居室方丈名聞大千劉賓客方丈了無塵元微之涖法㑹主僧盟白傅集本朝領䄂萬僧坡詩結夏傳記夏時長養之節恐傷折草木踐履生蟲故九十日安居念道荆楚歲時記四月十五日乃法王禁足之晨釋子䕶生之日僧尼結夏又謂之結制解夏又謂之解制同上本朝休夏巾鉼誰與共欒城集浮屠史魏作永寧寺有金像高丈八尺者一如中人者十玉像二為九層浮圖掘地築臺下及黄泉浮圗高九十丈上刹復高十丈每夜靜鈴鐸聲聞十里通鑑梁武帝天監十五年同泰寺浮屠災上曰此魔也冝廣為法事遂起十二層浮屠同上中大同元年集半雲躋寶塔時望盡京華坐覺諸天近空香逐落花孟浩然無憂王之建塔天輒雨花法苑珠林本朝魏明帝時於道東造周閭百舍名為官浮屠精舍見類要高僧傳曰康僧㑹赤烏十年至建鄴孫權使求舍利旣得之即為造塔晉帝過江更修飾之此葢中國造塔之始也事物紀原洛下齊城丹陽㑹稽並有阿育王塔類要佛滅後鐵輪王一旦夜役鬼神造八萬四千塔合檢齋供史楚王英奉黄縑白紈贖罪詔還贖以助伊蒲塞桑門之盛饌通鑑東漢明帝紀竟陵王子良篤好釋氏招致名僧講論佛法親為衆僧賦食行水齊武永明二年高力士作寶夀寺鐘成作齋以慶之唐𤣥宗天寶七載李太后在封禪寺曰吾嘗於此飯僧數萬五代晉少帝開運三年集眞味推飴露衆香惟􅉅蘭文苑英華蔡希寂詩師弟子傳記寶林曰佛未湼槃時告迦葉曰吾清淨法眼以付汝寶林語録衣法相傳以為符印曹溪已後不聞此事圭峯禪注沙門釋道安立寺於太行𢎞賛佛法惠逺徃歸之廬山記杜注逺法師傳逹摩謂門人道育得吾骨慧可得吾髓傳燈録集解䯻傳珠䄂衣授寶梁陸倕天光寺碑佛法津梁俟子而入厥徒烝烝維大教是膺維憲言是徵漙博恢𢎞如川之増如雲之興如嶽之不崩終古其承之柳文以心傳心天地不知唐蔣防文學徒百人如水歸海由其門而為天人師者皆脈分焉劉賓客雲遊傳記沙門衣鉢隨身譬如飛鳥長阿含經集擁錫來遊選寺碑釋子彌天秀獨漢南來駱賓王其來也雲凝其去也風休韓文送令縱振錫如飛白玉輕劉賓客虛舟不繫物觀化遊江濱杖錫閒來徃無心到處禪並同上誰識徃來意孤雲長自閒劉長卿振錫而徃其心浩然權載之逺鶴無前侶孤雲寄太虛錢起縱雲孤鶴無留滯定恐煙霞不放囘方雄飛去住如雲鶴飄然不可留同上閒雲與孤鶴何天不可飛僧貫休九天飛錫四海浮盃王文席常住囘記縁化捨施史太后欲造大像使天下僧尼日出一錢以助其功通鑑武后傳記度一人出家勝起寶塔至於梵天唐𢎞明功德經為一切人之檀越經律集一毛之施白律勝因化愚慧刀攝慳劉賓客不住聲香味觸法布施故其福德若東南西北四維上下不可思量矣張珪諌表本朝尋山百衲敝過海一盃輕法照送無著師修造集清淮無波平如席欄柱傾扶半天赤火燒轉掃地平空突兀便髙三百尺影沉潭裏龍驚遁當晝無雲跨虛碧韓詩構樓架閣切星漢同上伐木輦土柳文披山伐木崇構法宇則地得其勝作精室不命而獻力不忻而薦貨並同上本朝曽遭刼滅壊今遇勝縁脩臨川閻浮提國中悉皆歡喜兠率陁天上如是粧嚴石敏若文與士夫交遊史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之雋甚相知賞晉郄超傳支遁與名士孫綽李光許詢等築室東土與王羲之同志宴集於㑹稽山蘭亭晉書白居易致仕與香山僧如滿結香火社每肩輿徃來白衣自稱香山居士唐書傳記晉惠逺見廬峯清淨足以息心始住龍泉精舍刺史桓伊乃為逺於山東立房殿即東林也絶塵清俗之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢穎之南陽宗炳等凡百有二十三人並棄世遺榮依逺遊止高僧傳支遁在白馬寺與劉桑之等談莊子逍遥羣儒舊學莫不嘆伏高僧傳竺道生入廬山七年後止青園寺王𢎞范泰顔延之並挹敬風猷從之高僧傳逺法師送客過虎溪虎輒鳴號昔陶兀亮居栗里山南陸修靜亦有道之士逺師嘗送此二人與語道合不覺過之因相與大笑今世傳三笑圗廬山記謝靈運求入淨社師以心雜止之范甯在豫章師請入社范不能從廬山記社主逺法師逺師結白蓮社以書招陶淵明陶曰弟子惟嗜酒若許飲即徃矣逺許之遂造焉因勉令入社陶攅眉而去廬阜雜記劉遺民慕逺公名德欲白首同社廬山記十八賢傳雷次宗立館東林僧房之東與逺公同社宗炳入廬山築室與逺同社並同上集潮州有老僧號大顚頗聰明識道理實能外形骸以理自勝不為事物侵亂自以為難得因與徃來及祭神至海上遂造其廬及來袁州留衣服為别韓文文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志韓文送文暢序昔者桑門上首好與賢士大夫遊晉宋以來有道林道安逺法師休上人其所與遊則謝安石王逸少習鑿齒謝靈運鮑照之徒柳文藩維大臣文武豪士令縱未始不褰衣負業徃造其門下韓文他時若冩蘭亭㑹莫畫高僧支道林柳宗元作徹上人詩本朝白公在廬山與奏滿朗晦四禪師追逺宗雷之迹為人外之處類要支遁與謝公為山水之遊竺法師與王文度為死生之約同上王羲之在㑹稽聞支遁名未之信後遁還剡王詣遁觀其風力謂遁曰逍遥可得聞乎遁乃作數千言王遂披襟解帶留連不能已乃請住靈喜寺意存相近同上浮圗秘演與吾友石曼卿交最久亦能遺外世俗以節相交二人歡然無所間曼卿隠於酒秘演隠於浮屠皆竒男子也然喜為歌詩以自悟一時顯士皆願從其遊歐公秘演詩集惟儼學於佛而通儒術非賢士不妄交嘗曰吾不妄交人故能得天下士以此一時賢士多從其遊歐公惟儼文集序辨才老師退居龍井不復出入軾徃見之常出至風篁嶺左右驚曰逺公復過虎溪矣辨才笑曰杜子美不云乎與子成二老徃來亦風流東坡辨才老師詩前序佛者惠厪從歐陽公遊三十餘年公常稱之為聦明才智有學問者尤長於詩東坡厪上人詩集序為士大夫崇敬史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始晉郄超傳傳記昔謝靈運恃才傲物少所推重一見逺公肅然心服及寺觀翻涅槃經因鑿為臺植白蓮池中名其臺曰翻經臺因號白蓮社廬山記慧逺法師碑謝靈運撰張野序同上姚興欽風德遠愈施桓𤣥震主不覺致恭同前社主逺法師傳逺公卒張野為序稱門人廬山記集歸到雙林親慧逺唐裴休詩嘗為逺公傳永懐塵外蹤孟浩然詩詩僧傳記僧晝字皎然工律詩嘗謁韋蘇州恐體不合乃於舟中作古體數十篇為贄韋公不稱賞明日冩舊製獻之韋大嗟嘆唐因話録集人言澄觀乃詩豪一座競吟詩句新韓詩戰詩無與敵浩汗横戈鋋韓詩送靈師令縱釋氏之秀者又善為文藩維大臣文武豪士有尊行美德建功樹業令縱從而為之歌頌送令縱無本於為文身大不及膽送無本文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志解其裝得所叙詩累百餘篇非至篤好其何能致多如是耶送文暢序多生修律業外學得詩名張文昌詩思竹間得道心松下生本朝浮屠秘演喜為歌詩以自娛石曼卿尤稱秘演之作以為雄健有詩人之意歐公秘演詩集序惟儼雖學于佛而通儒術喜為辭章惟儼集序閒中用意歸詩筆臨川佛者惠厪從歐陽公游三十餘年公嘗稱之為聦明才智有學問者尤長於詩東坡厪上人詩集序清言氷玉質壊衲山水紋後山圓寂史佛圗澄卒𦵏後郭門吏報石季龍云見師攜一履西去季龍掲其墓唯見一履與一石趙録集識滅形全異凡死劉賓客燈續生前火爐添没後香錢起冩留行道影焚却坐禪身塔院關松雪經房鎖隙塵賈浪仙寶山枯龍移水涸呂温彌阿寺碑殘經窓下依然在劉文房寂寂靈塔滔滔逝川恒沙刼壊智月常圎李華碑宴坐示寂同上化縁既周跌坐報盡王僧碑飛鳥無跡去雷罷震獨孤及律師銘千載空雲去唐文粹烈烈英風横飛西土兩楹夢奠雙樹變色同上海山不是吾歸處歸即應歸兠率天白居易詩見太平廣記本朝佛圗澄欲使人辭石虎曰燄幻之軀化期已及見類要昔本無生今亦無滅東坡集隠如寒月堕清晝空有孤光留故躔瑩然牟尼歸眞于土霜顱隠白毫鎖骨埋青玉皆云似達摩隻履還天竺同上後魏二十八祖達摩端居而逝葬熊耳山起塔於定林寺後三嵗魏宋雲奉使西域廻遇師于葱嶺見手攜隻履翩翩獨遊雲問師曰西天去又謂雲曰汝王已厭世雲聞之芒然别師東還暨復命即明帝已登遐矣迨孝莊即位雲具奏其事帝令啟壙惟空棺一隻革履存焉舉朝為之驚嘆奉詔取遺履於少林寺供養景德傳燈録茶毗集薪盡火滅歸眞息煆梁簡文帝文身壊口不壊舌根如紅蓮白侍郎焚却坐禪身買浪仙本朝玉骨隨薪盡空留一分香臨川今年復扣門空房但颼飀云已滅無餘薪盡火不留東坡祭挽集緇素墜心棟梁落構李邕碑紹釋風於西域廻佛日於東維李白祭睿和尚師之度世以定以慧為醫藥師救療一切白傅集福智夀臈天下一人靈芝無根霜竹有筠師身是假師心是眞白傅集本朝欲向横堂一揮淚翻思月落不離天何正平尼史太宗崩武氏隨衆感業寺為尼通鑑唐髙宗永徽五年勅禁私度僧尼是歲天下尼一萬八千七百五十六後周世宗顯德二年傳記僧史略曰漢明帝既聽劉峻出家又聽洛陽婦女阿潘等出家此葢中國尼之始也事物紀原集大明和尚卒弟子尼無染命僧靈嶼為行狀凡塟大浮圖未嘗有比丘尼主碑事今無染實來涕涙以求無染韋氏女世顯貴柳文郭代公愛姫薛氏㓜嘗為尼白居易詩曰頭青眉眼細十四女沙彌步慵行道困起晩誦經遲應是仙人子小名仙人子花官未嫁時長慶集生來未掃眉身輕禮拜穏心慢記經遲王建集女釋者柳文起廢荅東晉何充始捨宅安尼此葢尼寺之起也事物紀原本朝盡出花鈿散寶津雲鬟齊剪向殘春貝葉乍翻疑軸錦𣑽音初學誤梁塵從兹艷質成空後湘浦都無解佩人詩話記纂淵海卷八十五
