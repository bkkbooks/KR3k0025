body:
  text: 記纂淵海卷四十一宋潘自牧撰人道部家世經惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常亦惟先王克左右昭事厥辟書周公之孫荘公之子詩子周公曰我文王之為子武王之為弟成王之為叔吾扵天下不賤矣荀子薛公曰是其家傳七世矣家傳儒業皆有經濟之道薛公曰王氏有祖父焉有子孫焉文中子史叔禽叔椒子羽皆大家也羊舌四族皆彊家也左萬石君及四子皆二千石人臣尊寵乃集其門號萬石君本傳項氏世世為楚将項羽紀蘇武曰武父子位列将爵通侯兄弟親近本傳太傅在前少傅在後父子並為師傅朝廷以為榮疏廣傳時廣為太傅廣兄子受為少傅太子每朝太傅在前少傅在後累世名貴人秦紀鄧氏累世寵貴凡侯者二十九人公二人大将軍以下十三人其餘不可勝數東京莫盛於此鄧禹傳王僧䖍戒子書曰王家門中優者如龍鳯劣者猶虎豹南史傳龜襲紫隂識傳五世相韓張良傳汲黯之先有寵於古之衛君至黯十世世為卿大夫西漢本傳自楊震至彪四世太尉徳業相繼與袁氏俱為東京名族東漢本傳漢興惟韋平父子至宰相西漢平當傳金日磾世名忠孝七世内侍西漢本傳耿氏自中興後訖建安之末大将軍二人将軍九人卿十三人列侯十九人中郎将刺史二千石數十百人與漢興衰耿恭傳世吏一千石至祜九世並以清徳聞晉羊祜傳陸機曰我父祖名播四海晉書本傳中興桓氏尤盛自榮至典世宗其道父子兄弟代作帝師范曄傳伏生自東西京相襲為名儒以取爵位後漢魏主雅重門族魏韓顯宗曰門望者乃其父祖之遺烈齊紀崔儼諫議大夫其羣從數十人自興寧里謁大明宫冠盖騶從相望每嵗時宴于家以一榻置笏猶重積其上琳與弟太子詹事珪光禄卿瑶俱列棨㦸世號三㦸崔家新唐書張潜官至魏州刺史沛同州刺史洽衛尉卿涉殿中監父子兄弟五人皆至三品官時人謂之萬石張家張文瓘傳王從易昆仲三人開元中鳯閣舎人故號鳯閣王家本傳自李徳林至百藥安期三世掌制詔唐書自蕭瑀逮遘凡八葉宰相名徳相望與唐盛衰世家之盛古未有也本賛唐袁明逺祖滂為漢司徒自滂至明凡十二世其間位司徒司空者四世唐書本傳杜氏大族尊行不翅數十人唐鑑則天以王方慶家多書籍訪求右軍遺跡方慶奏曰臣十代從伯祖羲之書先有四十餘紙貞觀十三年太宗購求先臣並已進之唯有一卷見在今又進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寳五代祖騫髙祖規曽祖裒并九代三從伯祖晉中書令獻之已下二十八人書共十卷舊唐書本傳徳宗召温造至謂之曰卿誰家子曰臣五代祖大雅外五代祖李勣本傳竇氏自武徳以來尚主者八人女為王妃者六人唐世貴盛莫與為比崔湜遷兵部侍郎父挹為吏部侍郎父子同為南省副貳自唐以來未有是事唐書世祖問天下諸杜何處望髙崔浩曰京兆為美後魏書戴胄子至徳父子繼為宰相世詫其榮韋思謙子承慶嗣立父子並為宰相世罕其比張嘉貞子延賞延賞子𢎞靖時號一門三相唐書傳記竇禹鈞有子五人俱進士及第馮道詩云燕山竇十郎教子有義方靈椿一株老丹桂五枝芳時號竇氏五龍類説世重髙門人輕寒族競以姓望所出邑里相矜若仲逺之尋鄭𤣥先云汝南應劭文舉之對曹操自謂魯國孔融史通集幸賴先君之靈免負擔之勤選書忝籍世賢選彈文金張藉舊業七葉珥漢貂左太沖詩席寵門緒實公侯之子孫有山河之氣象家世以清白崇徳陳子昻蟬聮珪組世為顯著李太白門閥冠雲霄名家莫出杜陵人家聲盖六合杜詩世言氏族者署為闗内甲姓劉賓客荘憲皇太后之弟今天子之舅太師之子太尉之孫司徒之曽孫韓文公道碑路氏得姓歴二千年凡二十三世世稱徳門人不得並房故為宦族稱世有人自太尉琯以徳行為相相𤣥宗肅宗名聲益彰徹太行世號其門為太尉家宗族子弟皆法象其賢韓文昔韋孟以詩禮傳楚而郊廟之制卒正於𤣥成鄭𤣥以箋注師漢而禪代之儀卒集於小同賈誼以經術起而嘉最好學盧植以儒學用而諶為祭酒舊史咸以為榮漢司徒禹之世也栁文奕奕四世崔為之冠劉賓客言冠冕者許為世雄言門閥者許為時表家聲烜赫冠前賢劉賓客世家表甲第白樂天清望標門榮冠山東之族同上杜氏大族枝蔓蟬聮朝廷典章飽於聞見名卿賢相之家清風素範之族子孫森羅髦俊並作杜牧之晉室簮纓宋朝人物謝萬已稱富貴孟視尋處威權而安石東山尚為匹士彦重白屋猶是布衣未有鴻鴈成行鶺鴒接翼李義山文鄭晦族清胄貴杜牧之集地甲門闌大元㣲之世禄金張貴孟浩然鍾石享於祖考帶礪傳於子孫一門四節輝耀當時徳門之裔門為上族唐文粹簮笏自懐綳祖孫相望韓文庭列鍾彛笥傳組綬司空表聖文杜氏大家世有顯人韓文墓誌欒郤門風大羅隠集子父諸孫盈于室堂公姑悦喜五福具有大夫士家孰不榮羨韓祭文本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳天下以陳氏世家為榮神道碑漢諸袁之父子四世繼出五公唐諸温之弟子同時並列三省東坡集家聲奕奕盖并凉東坡詩南齊栁元伯之子五人皆領郡號五馬史元之見程厚東坡寒食詩注君家兄弟真連璧門十朱輪家萬石靈運子孫俱得鳯慈明兄弟孰非龍坡詩族大徽音逺欒城集閥閲子弟經闕子闕史太史公曰平原君翩翩濁世之佳公子也史記世家子弟如淳曰世世有禄秩家也宛孔氏有㳺閒公子之名西漢食貨志師古曰言其舉動性行有以似之也李徳裕曰朝廷顯官須公卿子弟為之何者少習其業目熟朝廷之事臺閣之儀不教而自成寒士縱有出人之材固不能閑習也則子弟未易可輕唐選舉志越公兒郎故有家風隋書楊洪傳傳記王謝家子弟奕奕皆有一種風氣隋僧智果評書集王孫公子不鏤自彫非鸞則鳯魏王問表觀者尚識承平王孫故態栁文貞房太尉家子孫也韓墓碑本朝蘭砌傳芳鯉庭稟訓臨川集東山子弟家風在歐公詩閨庭蘭玉照鄉閭東坡集白屋子傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟子史甘茂起下蔡閭閻顯名諸侯本傳陳涉非王公大人名族之後主父偃傳陳涉甕牖繩樞之子非有陶朱猗頓之富項籍傳諸儒生多窶人子漢書卜式拔扵芻牧𢎞羊擢於賈豎衛青奮扵奴僕日磾出於降虜西漢公孫𢎞傳千秋無閥閲田千秋傳黄憲世貧賤父為牛醫本傳康成無紱冕之緒後漢沈約曰太公起屠釣為周師傅説去版築為殷相胡廣累世農夫致位公相黄憲牛醫之子名重京師通鑑蕭曹樊灌皆起閭閻布衣至今推仰以為英賢豈在世禄乎通鑑牛仙客初為縣小吏開元二十四年為尚書馬周一介草茅言天下事若素宦于朝唐書本傳陳湯吕蒙馬隆孟觀悉出貧賤而勲伐甚髙不聞其家世将帥也唐魏元忠封事唐𤣥宗謂張九齡曰卿嫌仙客寒㣲如卿有何閥閲通鑑傳記進士多貧士秦中嵗時記集仲蔚孤緒元卿末裔任昉表不見公與相起身自犂鋤韓詩本朝起扵閭巷大其家室臨川有種經闕子虎豹未成文而已有食牛之氣鴻鵠之鷇羽翼未合而已有四海之心尹子史李廣世世受射本傳将門必有将相門必有相孟嘗君傳朱虛侯章曰臣将種也通鑑吕后紀諸葛恪少有名孫權見其父瑾曰藍田生玉真不虚也本傳王猛之孫鎮惡善論軍國大事或薦鎮惡扵劉裕與語説之曰吾聞将門有将鎮惡信然晉鑑謝荘七嵗能屬文宋文帝曰藍田生玉南史本傳達奚震驍勇走及奔馬周文曰非此父不生此子北史傳記慧種生聖癡種生狂桂實生桂桐實生桐越絶書本朝鳯雛驥子生有種毛骨往往傳諸郎觀君崛鬱負竒表便合劒佩趍明光東坡集汗血固應生有種坡詩無種經有教無類犂牛之子騂且角論語子以瞽叟為父而有舜以紂為兄之子且以為君而有微子啓王子比干孟子明月之珠出扵蠬一作蜯蜄周之簡圭生扵㻈石大蔡神龜出扵溝壑淮南子史陳涉曰王侯将相寧有種乎史記虞世南子昶無才術歴将作少匠工部侍郎主工作許敬宗曰䕶兒兒作相世南男作匠文武豈有種耶新唐書來濟傳陳湯吕蒙馬隆孟觀悉出貧賤而勲伐甚髙不聞其家世将帥也唐魏元忠封事集天其福人不在舊族揚雄之才非出孔氏芝草無根醴泉無源虞翻書靈珠産無種彩雲出無根亦如彼姝子生此遐陋村白詩克紹經子克家裕父之蠱幹父之蠱易篤前人成烈公劉克篤前烈無忝祖考汝克紹乃顯祖書召公是似維其有之是以似之纘戎祖考詩國人穪願然曰幸哉有子如此所謂孝也已良冶之子必學為裘良弓之子必學為箕禮子譬之若山木枝葉必類本荀史洪宣祖業無廢先君之功世濟其美不隕其名謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也左趙括能讀其父書傳史記田叔為魯相卒魯人以百金祠少子仁不受曰無以百金傷父名史記田叔傳董仲舒子及孫皆以學至大官儒林傳靈帝謂楊震孫竒曰卿强項真楊震子孫後漢鮑永子昱拜司𨽻光武曰吾欲令天下知忠臣子復為司𨽻後漢夏侯霸曰榮立家門通鑑山簡性温雅有父風晉書劉孝綽七嵗能屬文父繪齊時掌詔誥孝綽年十四繪常使代草之南史宋書世祖甞問王儉當今誰能作五言詩對曰謝朏得父之膏腴齊書越公兒郎故有家風隋書小家畜産百萬之􅓵子孫尚恥愧失其先業李廣有孫陵為侍中善騎射愛人下士帝以為有廣之風為騎都尉通鑑隋賀若弼父敦仕周為金州總管臨刑呼弼曰吾将平江南此心不果汝當成吾志後弼與韓擒虎同平陳隋書馬璘讀馬援傳至丈夫當死邊野慨然曰使吾祖勲業墜地下乎卒為中興名将新唐書柳玭有父風唐書本傳陳餘慶方稚有祖風歐陽通詢之子母徐氏教以父書晝夜無倦遂亞扵詢唐書謩之論議挺挺有祖風烈魏徴傳宋之問父令文富文辭且工書有力絶人世稱三絶既之問以文章起其弟之悌以蹻勇聞之遜精草𨽻世謂皆得父一絶趙道興遷左武侯明閑宿衛太宗曰卿父為隋武侯有當官之譽卿今克傳弓冶可謂不墜家聲柳公綽之子仲郢有父風牛僧孺曰非積習名教何以致此李晟克京師市不改肆愬平蔡亦如之功名之竒近世所未有唐書集各紹堂構能負析薪陳琳檄箕裘之業載隆燕翼之謀不隕陳子昻家聲器宇存家聲肯墜地利器當秋毫杜詩籍籍名家孫杜詩烜赫舊家聲克家何妙年嶷然大賢後復見透骨清杜詩益求發聞去聲俾家聲不頺劉賓客集公胚胎光前生長食息不離典訓之内目濡耳染不學以能太師之平汴州年老益髙挈持維綱耡削荒類納之太和而已其囊篋細碎無所遺漏繄公之功見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子姢姢静秀瑶環瑜珥蘭茁其芽稱其家兒也韓文懿哉能世其家劉賓客襲弓裘而稟詩禮以水木之有本源服名教乃保家之子白樂天生扵清談克肖素風清風素範克肖家聲杜牧之紹復丕績不墜厥祀柳漢銘楊公莫訝清無業家有驪珠不復貧元微之身雖不貴有後斯榮唯公之嗣實大家聲李習之韋𤣥方繼相荀爽復齊名張九齡趙孟慕成季之勲復能霸晉亞夫紹絳侯之武亦克擒吳唐淮西碑本朝克家傳衆子欒城集承家從昔如君少陳後山諸郎有父風山谷能蓋前愆經蔡仲克庸祗徳周公以為卿士叔卒乃命諸王邦之蔡王若曰惟爾率徳改行克謹厥猷爾尚蓋前人之愆惟忠惟孝書史沈勁充之子也勁以其父死扵逆亂志欲立功以雪舊恥燕人逼洛陽陳祐留勁以五百人守洛陽勁喜曰吾欲致命今得之矣恥父之惡致死以滌之變㐫逆之族為忠義之門通鑑盧元輔杞之子簡潔貞方人不以父之醜行為累人人歸美舊唐書不克紹經女雖湛樂從弗念厥紹于嗟乎不承權輿詩子孫弗率不徳罔大墜厥宗忝厥祖子弗祗服厥父事大傷厥考心厥父母勤勞稼穡厥子乃不知稼穡之艱難書遏佚前人光絶失也若考作室既底法厥子乃弗肯堂矧肯搆厥父菑厥子乃弗肯播矧肯穫荒墜厥緒覆宗絶祀書史其父析薪其子弗克負荷左行莫醜扵辱先李陵生降隤音頽其家聲並史記時漢成帝無嗣政由王氏劉向遂上封事極諌王氏與劉氏不並立如下有泰山之安則上有累卵之危向卒子歆王莽舉為侍中莽持政留歆為右曹建平元年改名秀及莽簒位歆為國師西漢本傳為人後嗣守人功業如此豈不負哉通鑑祖約逖之弟也逖卒代逖為西平将軍豫州刺史王敦舉兵約歸衞京師自以名輩不後郄卞久望開府及所表請多不見許遂懐怨望及蘇峻舉兵遂推崇約約聞大喜峻剋京都以約為侍中後奔石勒而死晉書本傳房杜平生勤苦僅能立門户遭不肖子蕩覆無餘通鑑李勣疾謂弟弼曰我見房𤣥齡杜如晦髙季輔皆辛苦立門户亦望貽後悉為不肖子敗之新唐書狄仁傑為魏州刺史有惠政百姓為之立生祠後其子景暉為魏州司功曹參軍貪暴人患之遂毁其像焉唐鑑房𤣥齡之子遺愛尚唐太宗女遺愛驕恣謀黜其兄遺直奪其封爵永徽中誣告遺直無禮扵已髙宗令長孫無忌鞫其事因得公主與遺愛謀反之状遺愛伏誅杜如晦子構襲爵慈州刺史坐弟荷謀逆徙於嶺表唐書傳記韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實不肖子弟有三變第一變為蝗蟲謂鬻庄而食第二變為蠧魚謂鬻書而食第三變為大蟲謂賣奴婢而食三食之輩何代無之北夢瑣言集門緒不昌任彦昇書咨汝之胄出門户何巍巍不修其操行賤薄似汝稀何不忝厥祖靦然不知歸韓文陵替經遭家不造詩史欒郤胥原狐續慶伯降在皂𨽻叔向曰肸之宗十一族惟羊舌氏在而已左魏徴𤣥孫稠貧甚以故第貸錢扵人帝停叔玉婚而仆所為碑顧其家衰矣唐魏徴傳集門衰祚薄陳情表承先人之後者在孫惟汝在子惟吾韓氏兩世惟此而已韓文自揚家醜經其父攘羊而子證之語史欒盈曰陪臣書能輸力扵王室其子黶不能保任其父之勞宋華耦曰君之先臣督得罪扵宋殤公名在諸侯之䇿左貽後經貽厥孫謀以燕翼子詩垂裕後昆書克昌厥後詩邁迹自身克勤無怠以垂憲乃後身其康强子孫其逢吉書子不為子孫留財列子史故襲天禄子孫賴之左晏子将死鑿楹納書謂妻曰楹記日也子壮而示之晏子春秋叔向曰昔欒武子無一卒之田其官不備其宗器宣其徳行順其憲則以免扵難及桓子驕泰奢侈貪欲無藝宜及於難而賴武之徳以沒其身晉國語平當為相上欲封當病篤不應召或謂當不為子孫耶當曰吾居大位已負素餐起受侯印還卧而死死有餘罪今不起者所以為子孫也前漢疏廣乞骸骨上賜黄金二十斤或勸廣以其金頗為子孫立産業者廣曰吾豈老誖不念子孫哉頋自有舊田廬令子孫勤力其中足以供衣食與凡人齊今復増置之以為贏餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨西漢韋𤣥成繼父賢為相鄒魯謳曰遺子黄金滿籯不如教子一經西漢文帝戒太子曰即有緩急周亞夫真可任将兵及七國反書聞上乃拜中尉周亞夫為太尉将軍往擊吳楚薛廣徳歸縣其安車以傳示子孫為榮漢鑑龎公釋耕扵壟上妻子耘扵前劉表問先生苦扵畎畆而不肯官禄後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也後漢楊震性廉子孫常蔬食步行或欲令開産業震曰使後世稱為清白吏子孫以此遺之不亦厚乎東漢宋髙祖微時躬耕於丹徒及受命耕耨之具頗有存者皆命藏之以留於後張緒謂齊栁世隆曰君以清名遺子孫耶答曰一身之外亦復何須子孫不才将為争府如其才也不如一經南史髙歡曰堪敵侯景者唯有慕容紹宗我故不貴之留以遺汝通鑑房彦謙謂子𤣥齡曰今皆因禄富吾獨以官貧所遺子孫在於清白耳隋本傳上謂太子曰李世勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行候我死汝扵後用為僕射親任之若徘徊顧望當殺之耳通鑑張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子孫酒食之􅓵吾不取也聞者是之通鑑夫名門右族莫不由祖考忠孝恭儉以成立之栁玭傳集應劭曰書賢而覆黶幽通賦注家世貧儉先人遺訓常恐置産怠子孫故家無樵蘇之地元微之後貴有金玉必不為汝藏崔昭生崔芸李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵杜牧之貽禍經今不取後世必為子孫憂論語子闕史武子之施沒矣而黶之怨寔彰左傳秦始皇宫室之麗使其後曽不得聚廬而託處焉馳道之麗使其後曽不得邪徑而託足焉葬埋之侈使其後曽不蓬顆蔽塚而託葬焉賈山至言集應劭曰黶惡而害盈幽通賦注燕翼無似終為餒魂劉賓客集閉門不解栽桃李滿地唯聞種蒺藜白集攝養經山下有雷頤君子以慎言語節飲食易君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣耳目聰明血氣和平姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體剛氣不怒柔氣不懾四暢交扵中而發作扵外不使放心邪氣得接焉禮記子持其志毋暴其氣養心莫善扵寡欲存其心養其性孟子無以好惡内傷其身荘子合六氣之精平易恬淡則憂惡不能入邪氣不能襲故其徳全而神不虧又曰純粹而不雜靜一而不變淡而無為動而以天行此養神之道也又曰精神四達無所不極荘子邪汚之氣何由得接荀子神清者嗜欲弗能亂淮南子恬和養神則自安扵内清虚養心則不誘扵外神恬心清則形無累矣劉子史子産曰節宣其氣勿使有所壅閉湫底以露其體左養精㳺神西漢東方朔傳養身者以煉神為寳東漢孟説曰養性者善言不可離口新唐書孫思邈云養性者先知自謹栁公度曰吾不以氣海暖冷物熟生物不以元氣佐喜怒年八十九唐書孫思邈曰人無故不應餌藥藥有所偏助則臟氣為不平唐裴潾傳傳記夫欲養神必先須養氣修真祕訣集君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不接於情憂喜不留於意泊然無感而體氣和平嵇叔夜養生論頤性養夀嵇叔夜幽憤詩王其愛玉體俱享黄髮期曹子建吾學養生之術外榮華去滋味不愛其身而嗇其神文選減書存眼力省事養心田劉賓客頤性保命屑瓊飲露唐文粹新浴肢體暢獨寝神魂安白樂天漱吮甘液㳺泳和氣葆和嗇神凝和葆神唐文粹本朝汛掃身心澡瀹神氣東坡集山芎麥麯都不用泥行露宿終無疾欒城養氣如養兒東坡詩不善攝養經闕子孔子曰人有三死而非其命也已自取也夫寝處不時飲食不節逸勞過度者疾共殺之家語形勞而不休則弊精用而不已則勞勞則竭不可以無涯之智役有涯之身荘子耳目淫於聲色之樂則五臟動摇而不定矣五臟動摇而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣精神馳騁於外而不守則禍福之至雖如丘山無由識之矣淮南子神躁則心蕩心蕩則形傷劉子目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼔口貪滋味命曰腐腸之藥鼻悦芳馨命曰燻喉之煙身安輿駟命曰召蹶之機劉子史神太用則竭形太勞則弊形神騷動欲與天地長久非所聞也太史公盛食珍味以壊其口音樂婦人以壊其耳髙堂䆳宇倉庫奴婢以壊其腹娯樂親酌以壊其心前漢賈誼五餌書以耎脆之玉體犯勤勞之煩毒非所以全夀命之宗也通鑑多記損心多語耗氣心氣内損形神外耗初雖無覺久且為弊唐書世嘗謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也神躁於中而形喪於外嵇叔夜五情今已傷安得自能老世人不察惟五穀是見聲色是躭目感𤣥黄耳務淫哇滋味煎其腑臟醴醪鬻其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而内外受敵身非木石其能久乎孟東野藥以愈疾非朝夕常餌之物况金石酷烈有毒又益以火氣殆非人臟所能勝也通鑑積微成損積損成衰養生論傳記肥肉厚酒務以自强命曰爛腸之食吕氏春秋膚氣内消有似尾閭之波神志外傷同乎牛山之木文心雕龍集出輿入輦命曰蹷痿之機洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥文選合冰炭以交戰祗自苦乎厥身白侍郎本朝煎烹心脾擢胃腎自令鬢髮驚秋霜欒城集愛君經申伯忠臣不欲離王室詩雖爾身在外乃心罔不在王室昔先正保衡曰予弗俾厥后惟堯舜其心愧恥若撻於市武王有疾弗豫周公為三壇同墠册祝曰以旦代某之身書子曰事君欲諫不欲陳詩云心乎愛矣遐不謂矣中心藏之何日忘之善則稱君過則稱已晉世子申生使人辭於狐突曰吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死禮記子我非堯舜之道不敢以陳扵王前予三宿而出晝於予心猶以為速王庶幾改之王如改諸則必反予夫出晝而王不予追也予然後浩然有歸志予雖然豈舎王哉不得於君則熱中孟子宋國有田夫常衣緼黂僅以過冬暨春東作自曝扵日不知天下之有廣厦隩室綿纊狐狢顧謂其妻曰負日之暄人莫知者以獻吾君列子身在江湖之上心居魏闕之下荘子史荀林父進思盡忠退思補過社稷之衛也季文子見有禮扵其君者事之如孝子之養父母見無禮扵其君者誅之如鷹鸇之逐鳥雀也左屈原雖放流睠顧楚國繫心懐王不忘不勝犬馬之心汲黯曰臣常有狗馬病不能任郡事願為中郎出入禁闥補過拾遺史記忠臣不先身而後君魯仲連傳望之雅意本朝西漢本傳願賜數刻之間極竭毣毣之思退入三泉死亡所恨鮑宣傳史魚既沒餘忠未訖委柩後寝以屍達誠汲黯身外思内發憤舒憂谷永傳忠臣雖在畎畆猶不忘君劉向傳昔周公雖老猶在京師明不離成周示不忘王室也仲山甫異姓之臣無親扵宣就封於齊獨歎息永懐夙夜徘徊不忍逺去杜欽傳上官桀始以財力得幸為未央廏令上嘗體不安及愈見馬馬多瘦上大怒曰令以我不復見馬耶欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬通鑑仲尼去魯曰遲遲而行孟子去齊三宿而後出境言忠臣之於主慕戀不已荀悦忠臣逺不忘君後漢注心皇極結情紫闥神明知之通鑑髙堂隆疾篤口占上疏曰臣寝疾有増無損常恐奄忽忠欵不昭天下乃天下之天下非獨陛下之天下也通鑑累繭救宋重胝存楚南史陽固曰昔龔遂去國猶獻直言韋孟離朝不忘本國後魏書為歌詩情不忘君人憐其忠杜甫房𤣥齡寝疾抗表諌征髙麗唐書李孝本二女配沒右軍上取之入宫右拾遺魏謩上疏上即出孝本女擢謩為補闕曰可謂愛我不忝厥祖矣通鑑傳記王猛謂苻堅曰臣沒之後願不以晉為圖鮮卑羌虜我之仇讐終為人患宜漸除之十六國春秋集欲闔口無言兮嘗被君之厚徳念三十年之積思兮願一見而陳辭楚辭馳心輦轂應劭詩若葵藿之傾葉太陽雖不為之迴光然終向之者誠也曹子建投軀報明主身死為國殤選樂府北門行潢汚易竭抑有朝宗之願犬馬無識猶知戀主之誠子牟馳心扵魏闕汲黯積思扵漢庭微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深栁文揮涕戀行在道途猶恍惚中原消息斷黄屋今安否生逢堯舜君不忍便永訣當今廊廟具搆厦豈云缺葵藿傾太陽物性固莫奪杜工部炙背可以獻天子杜詩獨隨朝宗水赴海輸微涓李太白集萬里納忠一心稟命白樂天報國心皎潔念時涕汎瀾韓詩仰長安而就日赴帝鄉以望雲駱賓王集㣲臣欲獻唐虞夀筵指南山對衮龍王維集平生五色線願補舜衣裳簮組赤墀戀禽魚滄海心杜詩臣心堯日下錢起詩本朝鄭俠雖流落頓挫之餘一話一言未嘗不在君父鄭介夫録雖伏櫪之馬悲鳴猶戀於君軒而曳尾之龜涵養未離於靈沼歐公表蹌蹌退舞敢忘虞帝之笙鏞翼翼歸飛亦在文王之靈沼元絳表古今詩人衆多而杜子美為首豈非以其流落饑寒終身不用而一飯未嘗忘君也歟進如孟子之敬王退若蕭生之憂國蘇文只因未報君恩重清夢時時到玉堂坡詩平生本朝心嵗月閩江浪去國雖千里分憂即近君山谷詩夕寐北河隂夢還甘泉宫詩集憂世經我瞻四方蹙蹙靡所騁憂心如惔不敢戲談憂心如酲心之憂矣疢如疾首不遑假寐癙憂以痒䑕思泣血無言不疾並詩一夫不獲則曰時予之辜書雖危起居竟信其志猶将不忘百姓之病也禮記子孟子周流憂世思濟斯民經營八紘之内心勦形瘵何勤如焉孟序有安社稷臣者以安社稷為悦也思天下之民有不被堯舜之澤者若已推而納之溝中憂以天下孟子今世之仁人蒿目而憂世之患荘子周行天下上説下教雖天下不取强聒而不舎荘子楊子見路逵而哭為其可以南可以北墨子見練絲而泣為其可以黄可以黒神農憔悴堯痩臞舜黴黒禹胼胝由此觀之則聖人之憂勞亦甚矣淮南子目若營四海文中子史楚子囊死遺言謂子庚必城郢君子謂子囊忠将死不忘衛社稷嫠不恤其緯而憂宗周之隕左憂國如饑渴鮑宣傳孔席不煖墨突不黔西漢陳蕃曰當今之世三空田野空朝廷空倉庫空後漢劉寛任重責大憂心如醉本傳陳蕃曰鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎續漢書王坦之卒臨終與謝安桓冲書惟以國家為憂言不及私晉鑑昔腰腹過於十圍今之瘦削裁二尺餘舊帶猶存非為妄説救物故也梁鑑吳漢病篤車駕親臨問所欲言對曰臣愚無所知識惟願陛下慎無赦而已漢鑑房𤣥齡留守京師疾篤語諸子曰今天下無事惟東征未已乃上表諫上謂公卿曰彼病篤如此尚能憂我國家温彦博薨上謂侍臣曰彦博以憂國之故精神耗竭上将發兵討新羅侍中張文瓘卧疾在家自輿入見諫上乃止晉州男子郇模以麻編髮持竹筐葦席哭於東市人問其故對曰願獻三十字一字為一事若言無所取請以席裹尸貯筐中棄扵野其言團者請罷諸州團練使也監者請罷諸道監軍使也唐鑑傳記家國愔愔如日将暮潘佑表集生逢堯舜君不忍便永訣當今廊廟具搆厦豈云缺葵藿傾太陽物性固莫奪賢有不黔突聖有不煖席安得壮士挽天河浄洗甲兵長不用幾時髙議排金門各使蒼生有環堵安得大厦千萬間盡庇天下寒士皆歡顔杜詩自古聖人賢士皆非有心求於聞用也憫其時之不平人之不義得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇煖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也韓文豈無成都酒憂國只細傾杜工部集前古之興亡未嘗不經於心韓文疾與憂積栁文惟歌生民病願得天子知未得天子知甘受時人嗤藥良氣味苦瑟淡音聲稀但自髙聲歌庶幾天聽卑但傷民疾痛不識時忌諱安得萬里裘盖褁周四垠穏暖皆如我天下無寒人一夫不獲若納之於隍我若未忘世雖閒心亦忙世若未忘我雖退身難藏白樂天遂我一身逸不如萬物安元稹集以生人為心唐文粹負其道以環軫於諸侯皇甫湜志士白髪早孟東野夫仲尼之悲不在麟也墨翟之泣不在絲也且阮籍縱車於途途窮輒慟豈始慮不至耶蓋假事諷時致意於此耳沈顔登華㫖心為四海懸袁陽源本朝貌先年老因憂國事與心違始乞身歐公白髮憂民雖種種丹心許國尚桓桓歐公進不知富貴之為樂退不忘天下以為心歐公中原未得平安報醉裏眉攅萬國愁介甫詩吕獻可病卧洛陽猶旦夕憤嘆以天下事為憂過於在位任其責者吕誨墓誌士當先天下之憂而憂後天下之樂而樂也范文正公要君經臧武仲以防求為後扵魯雖曰不要君吾不信也論語子曰事君三違而不出境則利禄也人雖不曰要吾弗信也禮記史建章宫有物出状似麋詔東方朔視之朔曰願賜美酒麋肉飲飱臣乃言詔曰可已飱又曰某所有公田魚池蒲葦數頃願以賜臣臣乃言詔曰可於是朔乃言史姚崇知帝鋭於治乃先設十事以堅帝意即陽不謝帝怪之崇因疏奏臣願以十事聞陛下度不可行臣敢辭帝曰朕能行之崇乃謝翌日同中書門下三品唐書愛親附奉親經靡瞻匪父靡依匪母詩肇牽車牛逺服賈用孝養厥父母書親有疾飲藥子先嘗之啜菽飲水盡其歡斯之謂孝下氣怡聲問所欲而敬進之柔色以温之滫髓以滑之腴膏以膏之㫖甘柔滑禮記子子路曰昔者由也事二親之時常食藜藿之羮為親負米百里之外齊聘曽子為卿曰吾不忍逺親而為人役家語以孝敬易以孝愛難曽子曰吾及親仕三釜而心樂後仕三千鍾而不洎吾愁愁一本作悲荘子史孝如曽參義不離其親一宿於外蘇秦傳穎考叔曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之左傳旦夕得甘毳以養親而供養備聶政傳李密曰為人子者願為人兄不願為人弟兄者事親之日長弟者事親之日短蜀志視省席褥燥濕數奉甘毳食物丙吉傳黄香九嵗失母思慕號泣事父竭力致養冬無被袴而盡滋味暑扇床枕寒則以身温席後漢郄超黨桓氏温不令其父愔知之将亡出一箱書付門生曰本欲焚之恐尊公以傷愍為弊我亡後若大損眠食可呈此箱不爾便燒之愔後果哀悼成疾門生呈之則悉與温往反密計愔於是大怒曰小子死恨晩矣更不復哭晉書本傳潘岳退居于洛之涘㣲雨新晴六合清朗太夫人乃御板輿升輕軒昆弟班白兒童稚齒稱萬夀以獻觴咸一懼而一喜夀觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他晉書浩父病篤乃剪爪截髪夜在庭中仰禱斗極為父請命求以身代叩頭流血嵗餘不息家人罕有知者崔傳承順顔色唐書傳記子春孝道義感神明方駕曽閔連蹤丁郭史通老萊子楚人養親極甘脆年七十父母猶存萊子服斑斕之衣為嬰兒戲於親前髙士傳集凡侍父母得如曽參可以無譏也韓文忘身展孝白樂天眷戀庭幃心不遑安馨爾夕膳潔爾晨飱文選白華増勤綵衣是慕朝盥夕膳候色承顔䕫䕫齋慄烝烝不匱有若楚老萊子之為嬰兒也陳子昻承歡膝下馭潘輿於家園駱賓王慢親經子弗祗服厥父事侮厥父母書子好貨財私妻子不顧父母之養孟子妻子具而愛衰於親荀子史借父耰鋤慮有徳色母取箕箒立而誶語西漢本朝譬如人子得過於父母惟有恭順静思引咎自責庶幾可解今乃詰責奴婢恣行箠楚以此事親未有見赦於父母者東坡集教子經教誨爾子式穀似之詩子君子之於子愛之而勿面使之而勿貌導之以道而勿彊荀人有教其子曰爾行矣慎無為善曰不為善将為不善耶應之曰善且猶弗為况不善乎此全其大器者也淮南子史狐突曰子之能仕父教之忠古之制也䇿名委質貳乃辟也父教子貳何以事君石碏曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也左漢孝武曰生子當置之齊魯禮義之邦史記樊宏戒子曰富貴盈溢未有能終者吾非不喜榮勢也保身全已豈不樂哉後漢鄭𤣥以書戒子益恩曰入此嵗來已七十矣宿素衰落仍有失誤按之禮典便合傳家今我告爾以老歸爾以事将閑居以安性覃思以精業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之家今差多於昔勤力務時無恤饑寒菲飲食薄衣服節夫二者尚可令吾寡悔悔一作恨若忽忘不識亦已焉哉東漢傳范滂謂其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡通鑑傳記王昶名其兄子曰黙曰沈名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越夫物速成則疾亡晩就則善終朝華之草夕而零落松栢之茂隆冬不衰夫能屈以為伸讓以為得弱以為强鮮不遂矣通鑑魏明魏文帝誡子曰父母於子雖肝腸腐爛為其掩蔽不欲鄉黨士友聞其罪過然行之不改人自知之見太平御覽馬援戒兄子曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非政法此吾所大惡也寧死不願聞子孫有此行也龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也馬援傳鄧禹内行淳備有子十三人各使守一藝脩整閨門教養子孫皆可以為後世法漢鑑竇融曰臣有子朝夕教導以經藝不令觀天文見䜟記誠欲令恭肅畏事恂恂守道不願其有才能漢鑑王昶戒子曰未有千名要利不厭而能保世持家永全福禄者也魏本傳王昶明帝時為揚威将軍嘗為書誡其子及其兄子曰吾與時人從事雖出處不同然各有取潁川郭伯益好尚通達敏而有知其為人洪曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以是親之昵之不願兒子為之北海徐偉長不沽髙名不求茍得澹然自守惟道是務其有所是非則託古人以見意當時無所褒貶吾欽之重之願兒子師之東平劉公幹博學才髙識逺有大志然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道内敏外恕推遜恭謙處不避洿而義勇在朝忘身為國吾友之善之願兒子遵之魏三國志劉殷有七子五子各授一經一子授太史公一子授漢書一門之内七葉俱興北州之學殷門為盛晉書顔延之嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎通鑑蔡王智積帝之弟子也有五男止教讀論語孝經不令交通賓客或問其故智積曰卿非知我者其意恐諸子有才能致禍也隋鑑朱仁軌嘗誨子弟終身遜路不枉百步終身遜畔不失一段唐書上謂侍臣曰朕自立太子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乗馬則曰汝知其勞逸不竭力則常得乗之矣見其乗舟則曰水所以載舟亦所以覆舟民猶舟也見其息於木下則曰木從繩則正后從諫則聖唐鑑傅奕臨終戒其子曰無得學佛書時年八十五唐鑑栁玭嘗戒其子曰凡門第髙可畏不可恃也立身行已一事有失則得罪重於他人死無以見先人於地下門髙則驕心易生族盛則為人所嫉懿行實才人未信之少有疵累衆皆指之唐書本傳房𤣥齡嘗恐諸子驕侈席勢凌人乃集古今家誡為屏風曰留意於此足以保躬矣唐書房𤣥齡傳栁氏自公綽以來世以孝弟禮法為士大夫所宗玭嘗戒子弟曰凡門地髙可畏不可恃也唐鑑髙洋太妃曰汝父如龍兄如虎通鑑李存審出於寒㣲常戒諸子曰爾父少提一劒去鄉里四十年間位極将相其間出萬死獲一生者非一破骨出鏃凡百餘因授以所出鏃命藏之曰爾曹生於膏粱當知爾父起家如此也唐鑑傳記今世小人知讀論語孝經尚為人師雖千載冠冕不曉書記者莫不耕田養馬若能保數百卷書千載終不為小人也諺曰積財千萬無過讀書北齊鄭奕嘗以文選教其子其兄曰何不教他讀孝經論語免他學沈謝嘲風詠月汚人行止外史集辛勤三十年始有此屋廬此物豈無華於我自有餘韓退之詩凡人不能教其子者非欲陷其罪惡但重扵呵怒傷其顔色不忍楚撻其肌膚耳當以疾病為喻安得不用湯藥針艾救之哉顔氏家訓本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳故天下以秦公教子為法神道碑范忠宣戒子弟曰人雖至愚責人則明雖有聰明恕己則昏但當以責人之心責己以恕己之心恕人不患不到聖賢地位也二朝言行録責子史范子暮退扵朝武子曰何暮也對曰有秦客廋辭於朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人於朝國語廋隠也謂以隠伏詭譎之言問之於朝中也石奮子孫有過失不誚讓為便坐對案不食子孫相責因長老謝乃許前漢本傳崔光悌之子鴻弱冠有著述拜給事中光悌謂次子曰阿鴻已摩天去汝可不勉哉元魏集雖有五男兒總不好紙筆阿舒已二八懶惰固無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔梨與栗陶淵明責子詩知子史擇子莫若父祁奚請老晉侯問嗣曰午也可左傳陶朱公中男殺人囚扵楚朱公曰千金之子不死於市令其少子往視之朱公長男固請欲行朱公不聽長男欲自殺其母為言朱公不得已而遣長子朱公長男竟持其弟喪歸朱公笑曰吾固知必殺其弟也彼非不愛其弟故有所不能忍者也是少與我俱見其為生難故重棄財至如少弟者生而見我富乗堅驅良逐狡兔豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也史記越世家伍奢曰尚為人仁呼必來員為人剛戾忍訽能成大事史記本傳趙括少學兵法父奢不能詰然不謂善曰兵死地而括易言之敗趙必括也史記諸葛亮與兄瑾書曰瞻今已八嵗而聰慧可愛嫌其早成恐不為重器耳蜀志本傳石苞臨終分財與諸子獨不及崇其母以為言苞曰此兒雖小後自能立石崇傳索靖子綝少有逸羣之畧靖每曰綝廊廟之才州郡吏不足汚吾兒也後至尚書左僕射晉書王獻之七八嵗時學書羲之密從後掣其筆不得嘆曰此兒後當復有大名晉本傳晉王湛有隠徳兄弟以為癡父昶獨異焉晉書姚弋仲遣其子襄救趙誡之曰冉閔棄仁背義屠滅石氏汝才十倍於閔若不梟擒以來不必復見我也通鑑帝嘗問顔延之曰竣得臣筆測得臣文㚟得臣義躍得臣酒南史初宋維父弁嘗曰維性踈險必敗吾家梁髙祖梁彦光岐嶷其母謂所親曰此兒有風骨當興吾家北史帝謂雄曰吾兒更事未多通鑑嚴武母裴氏不為其父所答獨厚其妾英武奮然以鐵槌就英寝碎其首挺之竒之曰真嚴挺之子新唐書本傳傳記陳元方季方共論其父寔因曰元方難為兄季方難為弟世説上昧於知子經人莫知其子之惡大學史陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀臺新成太祖悉将諸子登使各賦援筆立成太祖甚異之魏志山簡濤之子也年二十餘濤不之知也簡嘆曰吾年幾三十而不為家父所知晉書謝惠連幼有竒才不為父方明所知族兄靈運謂方明曰阿連才悟如此而尊作常兒遇之南史以太宗之明昧於知子唐書太宗賛令狐綯執政嵗久子滈頗招權受賄言事者攻其短綯為其子滈訟寃唐鑑傳記萬迴師初若愚癡雖父母亦以豚犬畜之兄戍役安西音問隔絶忽一日朝往夕返曰兄平善發書視之乃兄手迹其家以萬里而迴故號萬迴開天傳段文昌鎮成都子承式好獵丞相患之承式以所獲雉兔分送幕僚各致書援引故事甚悉幕僚不曉其義以呈丞相方知其子博學説聞詞記纂淵海卷四十一
