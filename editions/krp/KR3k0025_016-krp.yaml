body:
  text: 記纂淵海卷十六宋潘自牧撰郡縣部廣南西路雷州倚郭一外縣二海康遂溪徐聞郡號海康驚雷徐聞鐵把合州州沿革斗牛之分古越地秦屬象郡漢合浦郡徐聞縣地梁置合州後改南合州隋曰合州大業廢屬合浦郡唐武徳復南合州為徐聞郡貞觀改東合州又改雷州天寶曰海康郡屬嶺南道五代地入南漢沿革表縣沿革海康本漢徐聞縣地梁立南合州隋開皇置海康縣大業屬合浦郡唐復置州治此遂溪本漢徐聞縣地南齊置椹縣隋置鐵把縣後改椹縣曰椹川並屬合浦郡唐武徳屬南合州觀屬雷州後省二縣置遂溪縣徐聞漢初置縣齊改曰齊康縣置郡隋廢郡改縣曰隋康觀復漢置舊名沿革表形勝擎雷山在海康縣被雷震成水曰驚雷水思靈島在海烏蛇山在海康老鵶州抵瓊州界四里虎頭山英髙山徒㑹山螺岡鹿洲卵洲皆在海康輿地紀勝又雷州春夏多雷秋日則伏地中其形如彘人取而食之國史補人物皇朝呉國鑑為太廟齋郎蘇子由貶雷州為創一小閣鑑坐編管輿地紀勝本朝開寶四年省遂溪徐聞二縣入海康乾道復置徐聞紹興復置遂溪沿革表集百尺危樓四逺明人従鼇背戲滄溟乾坤到處皆在目山海何人更作經死誦憐忠愍生還喜子由荒祠連舊宅幾見白雲秋更說此州竒特事冦公歸後二蘇来梁山欽州倚郭一外縣一安逺靈山郡號寧越欽水安京欽江靈山南賓州沿革牽牛星紀之次古越地秦象郡地漢屬合浦郡宋分置宋夀郡梁兼置安州隋廢郡改安州曰欽州大業改寧越郡唐置欽州析置玉田南亭州貞觀州廢天寶曰寧越郡乾元曰欽州五代地入南漢沿革表縣沿革安逺本漢合浦縣地梁分宋夀郡置安京郡隋廢為縣屬欽州唐改保京縣本朝更今名靈山本漢合浦縣地宋置宋夀宋廣二郡隋廢宋廣為新化縣宋夀為欽江縣開皇改新化曰内亭又置南賔縣後又置遵化縣唐初治欽江武徳以南賔置玉州以内亭遵化置南亭州觀州廢並來屬後更南賔曰靈山自欽江徙治焉本朝徙置安逺沿革表形勝三山在安遠南五湖在州城外羅浮山在州西北三海岩在靈山縣境日岩月岩龜岩醉石卧石並在江濵輿地紀勝人物唐寗悌原修國史以直筆忤㫖致仕皇朝黄渙建炎死於王事輿地紀勝本朝開寶五年省欽江内亭遵化三縣入靈山景徳三年更保京縣名安逺沿革表集僧憐海石為碁子客懼蠻雷作酒杯陶弼商誇合浦珠胎賤民樂占城稻米豐火炬影沈江岸北潮聲流過郡城東三石禊橋春㑹永五湖吟舫夜歸遲寧越佳山水並同廉州倚郭一外縣一合浦石康郡號合浦珠官禄川合州珠池州沿革牛女之分百越地秦屬象郡漢合浦郡呉改珠官郡後復故宋兼置越州及臨瘴郡隋廢郡大業改越州為禄州尋改合州又改合浦郡唐武徳復越州又置姜州貞觀改越州曰廉州廢姜州入焉天寶曰合浦郡屬嶺南道五代地入南漢地理沿革表縣沿革合浦本漢合浦縣治呉珠官晉合浦宋以後越州唐廉州皆置此武徳置安昌髙城大廉等縣屬焉又置梁州及封山東羅蔡龍等縣觀置珠池縣尋廢姜州以縣來屬省安昌珠池入合浦髙城入蔡龍乾元後又廢東羅本朝省入合浦石康本漢欝林郡治隋末蕭銑分興徳縣置安樂縣唐觀省安樂乾封重置屬欝林州調露割横貴二州地置岩州及石岩髙城思封三縣永隆以安樂𨽻岩州天寶曰安樂郡至徳改常樂郡更安樂縣為常樂以岩州為常樂州本朝並省置石康縣沿革表形勝明月溪緑雲溪在合浦五黃山昔樵夫見五人黃冠談笑於此百良山在合浦象鼻山在合浦狼頭山在九域志輿地紀勝本朝開寶五年廢常樂州入廉州以常樂思封髙城石岩四縣地併慱龜零渌鹽埸置石康縣來屬省封山蔡龍大廉入合浦太平興國廢廉州以海門鎮置太平軍省合浦入石康咸平復置廉州治合浦沿革表集合浦還珠舊有亭使君方似古人清沙中蚌蛤胎常滿潭㡳蛟龍睡不驚陶弼昔時孟太守忠信行海隅不賊蚌蛤胎水底多還珠同上欝林州倚郭一外縣二南流興業博白郡號尹州寒山西甌建寧南流興業州沿革牛女分野一云翼軫古蠻夷地春秋西甌地秦置桂林郡又象郡地漢平南越為欝林合浦二郡地梁置定州改南定州陳置石南郡隋廢郡改尹州大業改欝林尋又為郡唐武徳置牢州永淳置黨州麟徳置欝州乾封改欝林州天寶改定州寧林欝林二郡屬嶺南五代地入南漢地理沿革表縣沿革南流本漢合浦郡合浦縣地梁置定川縣隋廢郡以縣屬合州開皇置南流縣尋廢唐武徳置義州貞觀復南流又以潘之定川及置岩川𨽻焉改牢州永淳置黨州撫康善勞善文寧仁安寧懐義福陽古符八縣尋割仁安以下四縣立平琴州至徳更仁安曰容山後廢平琴入黨州省善文寧仁福陽古符四縣本朝並省入南流興業本陳石南郡隋廢為縣屬欝林郡蕭銑併置興徳縣唐觀石南屬貴州麟徳置欝州於此又析置興業潭栗縣及欝林興徳屬焉乾封徙置欝林縣建中省石南入興業徙州治焉又省潭栗愽白本漢合浦縣地隋置南昌縣屬合浦郡唐析置南州愽白周羅建寧三縣治愽白縣尋改白州後以南昌來屬本朝併省入博白沿革表形勝凝霧山飛雲山紫陽岩緑秀嶺陵青山愽白溪鳳飛山龍蟠山馬騎山皆在愽白縣萬石山在興業萬禄山在愽白東斗山在舊州東南斗山在舊州南銅鼓山在南流銅鼔潭在愽白五龍山在南流六熊山在愽白輿地紀勝本朝開寶五年省鬰林興徳入興業縣廢白州省周羅建寧南昌入愽白𨽻廉州七年復立白州廢牢黨二州省撫康善勞容山懐義定州宕川皆入南流來屬至道二年自興業徙州治南流政和廢白州後復置紹興又廢白州以縣來屬沿革表集日將先聖詩書教暫作文翁守鬰林楊叔賢南流底處所絳帳居尊嚴李鼎送髙補之漢令班南海蠻兵避鬰林天涯柱分界徼外貢輸金坐失姦臣意難明報國心一棺忠勇骨漂泊瘴江深温公馬伏波詩賀州倚郭一外縣二臨賀富川桂嶺郡號賀山賀水臨賀桂嶺臨慶州沿革星紀鶉尾之次秦屬南海郡漢屬蒼梧郡呉分立臨賀郡宋改臨慶國齊復臨賀郡隋廢郡為賀州大業廢屬始安郡唐武徳置賀州綏越郡天寶曰臨賀郡五代馬氏有之後入南漢沿革表縣沿革臨賀漢屬蒼梧郡又封陽縣呉以臨賀為郡治封陽屬焉隋立賀州大業廢屬始安郡省臨賀置綏越蕩山二縣尋皆省封陽屬蒼梧郡唐復臨賀縣為州治封陽來屬天寶置蕩山縣本朝並入臨賀富川漢屬蒼梧郡又馮乗縣地隋富川屬賀州始安郡馮乘屬零陵郡唐武徳二縣來屬天寶改富川曰富永後復故桂嶺本漢臨賀縣地呉置建興縣屬臨賀郡晉改興安隋更今名屬熈平郡唐武徳來屬沿革表形勝橘山在臨賀桂山在桂嶺龍溪山在富川龍門灘至州城八里白雲山碧雲岩仙溪水靈溪水皆在富川錫溪水在臨賀銀殿山在富川甑山州西髙千餘丈臨賀嶺五嶺之一也輿地紀勝人物皇朝毛温交冦竊發温以主簿紏土豪戰勝挫賊毛士毅為石城令李接反士毅戰死毛塤居䘮毁瘠十年不調林動獻本政書十五篇五輪受薦憲臺俄以爭獄事還其薦章岳飛為中興名將同上本朝賀州初𨽻廣東大觀改𨽻西路開寶四年省封陽蕩山縣入臨賀省馮乗入富川沿革表集賀州城西丹甑山一亭摇挿紫雲間龍墀讓䇿名猶在鶴馭臨風去不還郭祥正羽客朝元地遺壇古樹中煉成丹竈在騎去鶴巢空陶弼瓊州倚郭一外縣四瓊山澄邁文昌臨髙樂㑹靖海軍節度郡號曽口靖海瓊山容瓊州沿革牛女之分南裔蠻夷之地漢珠崖郡地武帝置珠崖儋耳二郡後皆廢東漢置珠崖縣屬合浦郡呉改珠崖郡晉廢之梁立崖州隋大業更珠崖郡唐初為崖州貞觀析置瓊州後廢又置天寶改瓊山郡屬嶺南五代地入南漢地理沿革表縣沿革瓊山本漢瑇瑁曋都二縣地隋置顔盧縣屬珠崖郡大業於曋都地置舎城縣唐武徳於舎城置崖州顔盧屬焉貞觀改顔城後於瑁瑇地置瓊山縣為郡州治析置甑口顔羅容瓊三縣開元省顔城貞觀省容瓊入瓊山屬崖州五代省甑口顔羅本朝廢崖州以縣來屬澄邁本漢茍中縣地隋大業置澄邁縣屬珠崖郡唐屬崖州文昌本漢紫具縣地唐武徳置平昌縣屬崖州貞觀更今名臨髙唐武徳分平昌縣置臨機縣屬崖州貞觀來屬開元更今名樂㑹唐顯慶初置屬瓊州沿革表形勝瓊山白玉乃奉化鄉二村名澄邁山在本縣毗耶山在臨髙隂陽山在樂㑹雲露山在瓊山西南三坑水在文昌五指山在臨髙七星山在瓊山紫具蒼錫山在文昌輿地紀勝人物皇朝姜唐佐従東坡學陳孚従宋公貫之學郡人得進士出身自孚始杜介之真純野逸有隠士風王進慶事母至孝同上本朝開寶五年廢舊崖州以舎城澄邁文昌三縣來屬熈寧省舎城入瓊山大觀三年以樂㑹縣屬萬安軍尋復故政和元年升靖海軍節度沿革表集適従瓊管魚龍窟秀出羊城翰墨場蒼海何曽斷地脉白袍端合破天荒東坡贈姜唐佐瓊崖千里環海底民夷錯居古相蒙方壺蓬萊此别宮峻靈獨立秀且雄為帝守寶甚嚴恭東坡昌化軍倚郭一外縣二宜倫昌化感恩郡號儋耳宜倫毗耶昭山倫江南崖軍沿革星土同瓊州漢武置儋耳郡梁屬崖州隋珠崖郡治大業分置儋耳郡唐武徳立儋州天寶改昌化郡屬嶺南五代地入南漢沿革表縣沿革宜倫本漢儋耳郡地隋義倫縣為珠崖郡治唐武徳置儋州本朝廢為縣昌化本漢至來縣地隋大業置昌化縣屬珠崖郡唐武徳來屬貞觀析置吉安縣乾元省之感恩本漢九說儋耳二縣地隋大業改今名又置毗善縣並屬珠崖郡唐武徳來屬更毗善曰富羅乾元立洛場縣南漢省富羅本朝並省入感恩沿革表形勝昭山在宜倫明山二石如人形號兄弟石乳泉在天慶觀東坡有賦相泉趙相所鑿徳義山黎曉山黎毗山皆在宜倫黎虞山在感恩黎母山黎粉山見寰宇記輿地紀勝人物皇朝王霄以貢士住辟雍王公輔曉天文東坡甚重之同上本朝太平興國改義倫縣曰宜倫省洛場縣熈寧六年降儋州為昌化軍省昌化縣入宜倫又省感恩縣元豐復置二縣紹興五年廢軍入瓊州十三年復置沿革表集竒峰望黎母何異松與邙飛泉㵼萬仞舞鶴雙低昂芋魁儻可飽無肉亦奚傷不用長愁掛月村㯽榔生子竹成孫潮聲捲海千峰雨月色侵門滿地霜儋耳道中還可樂東坡安用嘆窮途胡銓萬安軍倚郭一外縣一萬寕陵水郡號萬寧萬全陵水赤隴金山軍沿革星土同瓊州隋屬珠崖郡唐貞觀屬瓊州後屬崖州龍朔立萬安州天寶曰萬安郡至徳改萬全郡屬嶺南五代地入南漢沿革表縣沿革萬寧本漢紫具縣地唐貞觀置萬安富雲博遼三縣屬瓊州後屬崖州龍朔萬安州治此開元省治陵水至徳改萬安曰萬全貞元復故名又自陵水徙治焉本朝改今名陵水本漢臨振縣地隋大業治縣唐初屬振州後來屬開元為州治後復遷沿革表形勝南山靈山聲山在陵水金仙水在萬寧北金牛嶺在城西北赤龍山在萬安東南清溪水在萬寧縣北獨洲山在城東南雙女石在城南輿地紀勝本朝熈寧六年改為萬安軍改萬全縣為萬寧省富陽博遼二縣入焉七年省陵水縣入萬寧元豐復置紹興五年廢軍屬瓊州十三年復置沿革表集萬安無市井斗水寛百憂天低瘴雲重地薄海氣浮東坡吉陽軍倚郭一寧逺郡號延徳寧逺朱崖臨振軍沿革星土同瓊州漢朱崖郡及臨振縣隋大業置臨振郡唐武徳改振州寧逺郡天寶曰延徳郡屬嶺南五代地入南漢地理沿革表縣沿革寧逺縣隋大業分臨振郡置縣屬珠崖郡尋割屬臨振郡又置延徳臨川二縣唐貞觀分寧逺置吉陽縣永徽分吉陽置洛屯縣並屬振州治寧逺本朝並省入