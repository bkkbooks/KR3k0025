仲與譙定為青城二隠士同上集竹覆青城合江從灌口來杜詩蠶崖鐵馬痩灌口米船稀自為青城客不唾青城地為愛丈人山丹梯近幽意同上蜀西南山千萬重仙經最說青城峯青城嶺岑倚空碧逺壓峩眉吞劒壁錢起本朝乾徳四年置永安軍治灌口鎮以彭州導江蜀州青城一縣來屬熈寧郡廢元祐復置沿革表雲霞揖神仙烟火認城郭范蜀公青城山繞上清宮靣面看成第一峯午夜林蠻御斗柄半天樓觀鎖青容張震一百八景蟠絶三十六峯面環胡有開短笻穿白雲直入孤峯頂下看六時崖前臨七折嶺鄭廷芳仙人有宫號儲福藏在千山萬山曲王溉十丈牡丹如錦盖人間姚魏却争春范成大咏牡丹平石泉軍倚郭一外縣二石泉龍安神泉郡號金川神泉軍沿革井鬼之分禹貢梁州職方雍州之域秦蜀郡地漢屬廣漢郡地東漢屬汶山郡晉屬汶山巴西郡後周屬汶州隋屬汶山金山郡唐屬茂州綿州本朝置軍沿革表縣沿革石泉本漢汶山漢柔二縣地後周汶州汶山縣地隋開皇置金川縣屬㑹州仁夀改通化縣唐分汶山地置石泉縣與通化縣並屬茂州五代廢通化本朝置軍來屬龍安本漢廣漢郡涪縣地晉桓温置益昌晉興二縣屬巴西郡西魏省晉興後周又置金山縣隋省益昌入金山屬金山郡唐武徳改曰龍安屬綿州永淳増置西昌縣本朝省之神泉本漢涪縣地晉僑置西充國以縣屬巴西郡隋屬金山郡開皇改今名唐屬綿州本朝置軍來屬沿革表形勝赤溪在神泉縣黒水在石泉縣神泉在西平池飲者愈疾醴泉在龍安縣玉峯山銀線潭在神泉縣白馬津白半岡松嶺山茶川水皆在龍安縣三面山五頂山在石泉縣輿地紀勝人物王仲華以直諫聞於時同上本朝熈寧九年以茂州石泉縣屬綿州政和七年置石泉軍治此熈寧五年省西昌縣為鎮入龍安政和置軍以綿之龍安神泉二縣來屬政和改龍安曰安昌後復故沿革表記纂淵海卷十六
