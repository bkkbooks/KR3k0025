body:
  text: 記纂淵海卷六十二宋潘自牧撰問學部總叙學問子孔子謂伯魚曰可以與人終日不倦者其惟學乎家語學問之道無他求其放心而已矣孟子君子之學非為通也為窮而志不困憂而意不衰也真積力久則入學至乎沒而後止也君子之學也入乎耳著乎心布乎四體形乎動靜學者固學一之也一出焉一入焉塗巷之人也荀子史范獻子曰人之有學猶木之有枝葉也國語東方朔曰臣學書三冬足用漢書本傳游衍乎六藝之圃馳騖乎仁義之塗覽觀乎春秋之林修容乎禮園翶翔乎書圃相如傳學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也虞溥傳陶鑄神情啟悟耳目北史仲尼積學成聖唐書傳記學者猶種樹也春翫其華秋取其實講説文章春之華也修身利行秋之實也顧氏家訓集考覈仁義之林藪班固典引茹古含今無有端倪皇甫湜撰韓愈墓誌天然生知姿學立游夏上杜詩沉潜乎訓義反復乎句讀磨礱乎事業而奮發乎文章人之能為人由腹有詩書學問藏之身身在則有餘並韓集好學附精專經君子進徳修業欲及時也易惟學遜志務時敏厥修乃來念終始典于學厥徳修罔覺書説命下惟日孜孜無敢逸豫書君陳夙夜强學以待問記儒行子流水之不腐以其逝故也戸樞之不蠧以其運故也子華子用志不分乃凝於神列子好書者衆矣而倉頡獨傳者一也好稼者衆矣而后稷獨傳者一也好樂者衆矣而䕫獨傳者一也倕作弓浮㳺作矢而羿精於射奚仲作車乘杜作乘馬而造父精於御天下未嘗有兩而能精者也荀子解蔽君子强學而力行揚子修身辰乎辰曷來之遲去之速君子競諸揚子問明周公上聖日讀百篇仲尼天縦韋編三絶墨翟大賢載文盈車仲舒命世不窺園圃倪寛帯經以耘耡路生截蒲以冩書黄霸桎梏以受業寗子夙夜以倍功抱朴子聞所不聞見所不見揚子宣尼臨沒手不釋卷仲舒垂卒口不輟誦有子惡卧自悴其掌蘇生患睡親錐其股以聖賢之性猶好學無倦劉子心若醉六經文中子史孔子晩著易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我于易則彬彬矣史孔子世家董仲舒耽學下帷讀書十年不窺園圃其精如此前漢本傳倪寛帶經而鋤前漢書亹亹不舍晝夜漢張蒼傳潛于篇籍以章厥身西漢班固傳叙枕經籍書西漢賔戲劉向專積思於經籍書傳夜觀星宿或不寐逹旦西漢本傳榮學長安精力不倦十五年不窺家園後漢桓榮傳光武正旦朝賀禮畢令羣臣能説經者更相詰難義有不通輒奪其席戴憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中後漢閉戸講誦絶人間事每嘗昧爽櫛梳坐于客堂朝則誦羲文之易虞夏之書歴公旦之典禮覽仲尼之春秋夕則逍遥内階詠詩南軒百家衆氏投間而作洋洋乎其盈耳也煥爛乎其溢目也紛紛欣欣兮其獨樂也當此之時不知天之為葢地之為輿不知世之有人己之有軀東漢延篤傳李固郃之子也少好學常改易姓名䇿杖驅驢負笈従師不逺千里遂究覽墳籍為世大儒每到太學密入公府定省父母不令同業諸生知其為郃子也通鑑漢安紀皇甫謐耽玩經籍忘寢與食時人謂之書海晉書本傳車𦙍家不長得油夏日則練囊盛數十螢火以照書以夜繼日晉書左思專思三都賦杜絶人事杜預耽思經籍為春秋左氏傳集解自言有左傳癖並同上江泌随月光讀書斜則握卷升屋南史李鉉以鄉里寡文集來遊京師讀所未見書北史李邕自言讀書未遍願直秘閣李嶠曰秘閣萬卷豈時日能習耶邕固請乃假直秘書杜佑嗜學雖貴猶夜分讀書栁仲郢嗜學嘗和熊膽丸夜嚥以助勤並唐書陸龜䝉勤學卷不去手新唐書本傳傳記褚陶清談閒黙以墳典自娯語所親曰聖賢備在黄卷中舎此何求世説善學者若齊王之食雞必也食其跖數千而後足吕氏春秋孫康家貧無油映雪讀書孫氏世錄李頻曰只将五字句用破一生心北夢𤨏言互入詩門劉向校書天祿閣夜有老人著黄衣植青藜杖授向五行洪範云我是太乙之精天帝聞卯金之子有博學者下而觀焉晉王嘉拾遺傳匡衡勤學無燭鄰有燭乃穿壁引其光而讀之西京雜記管寜隱居好學藜床半穿髙士傳張儀蘇秦傭書遇聖人之文無題記則以墨書掌内股裏夜還折竹冩之王子拾遺殷亮建武中為博士諸儒勝者賜席亮重席至八九帝曰學不當如是耶殷氏世傳集諷誦詩書百家之言唇腐齒落服膺不失選東方朔答客難集螢映雪編蒲緝栁選薦表筆耕為養選表書秃千兔毫詩裁兩牛腰李太白集白髪死章句同上朝馳騖乎書林夕翺翔乎藝苑韓文復志賦互入頃刻不忘善口不絶吟於六藝之文手不停披于百家之編記事者必提其要纂言者必鈎其𤣥貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年補苴罅漏張皇幽𦕈尋墜緒之茫茫獨旁搜而逺紹古史散左右詩書置後前豈殊書蠧蟲生死文字間並韓集平居雖寢食未嘗去書息以為枕餐以飴口墓誌弋志書林咀風騷于七畧耕情義圃偃圗籍于九流駱賔王屢益蘭膏燈猶硏兎枝墨元稹躭嗜文籍注意鑽礪栁文鑽仰沈硏僅於不窺園井元微之開卷有益便欣然忘食陶淵明以道為飲以文為食聰察嗜學不肯為凡夫劉賔客貫穿學問骨唐文粹退公猶筆耕劉賔客讀書眼欲暗下筆手生胝白侍郎堯舜癯瘠大禹胼胝彼聖人焉吾布衣耳不勤劬何以為妻子之天乎陸魯望猶波之委於瀆瀆之注於溟晝夜何曾知息之時唐文粹本朝農馬智專吾不讓後山詩騷人思苦骨巖巖欒城集天以日運故無疾器以日用故不蠧東坡集尚有讀書清浄業未嘗春睡敵千鍾東坡詩徐鉉黜邠州年七十手不釋卷常親𨽻書寫許慎説文一帙宋拾遺不學經不學墻面書周官雖有至道弗學不知其善也記學記玉不琢不成器人不學不知道同上互入矯揉子卜商反衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥扵是衛以子夏為聖家語七十二子篇人而不學雖無憂如禽獸何揚子學行几薄之徒懐抱空虛有似蜀人匏壺之喻胷中無一紙之識不過酒炙所謂冒于貨賄貪於酒食左氏所載不才之子抱朴子互入不才史周原伯魯不説學閔子馬曰學殖也不學将落原氏其亡乎左昭十八年互入識者所窺范獻子聘于魯問具山敖山魯人以鄉對獻子曰不為具敖乎曰先君獻武之諱也獻子歸曰吾名其二諱為笑矣惟不學也國語互見明於自知秦有司奏太白罰星東井秦分必有暴兵起京師秦主苻生曰太白入井自為渴耳何所怪乎通鑑晉紀江州刺史陳伯之目不識書得文牒辭訟惟作大喏而已通鑑梁髙祖北齊源師攝祠部嘗白髙阿那肱龍見當雩阿那肱驚曰何處龍見其色何如師曰龍星初見禮當雩祭非真龍也阿那肱怒曰漢兒多事强知星宿遂不祭陳紀又見三國典畧選人入等者六十四人上召面試之張爽手持紙終日不成一字時人謂之曳白唐𤣥宗紀光不學無術西漢霍光傳生世不學其猶穴處何所見焉北史雷紀傳戸部侍郎蕭炅言烝嘗伏臘為伏獵嚴挺之白張九齡曰省中而有伏獵侍郎乎唐嚴浚傳李林甫無學術時選人嚴逈判語杕杜二字林甫不識謂吏部侍郎韋陟曰此云杖杜何也陟俛首不敢言唐書臧希讓無學術公卿間强引古言以自賢而所聞知多道途得之發必差謬為士子所笑同上任圜曰天下皆知崔協不識文字而有表號為沒字碑五代史任圜傳傳記韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實互見不克紹霍光無學不知一經史通桓帝時有辟公府椽者倩人作奏記邯鄲氏笑林互見代筆張由古無學業對衆歎班固文章不入文選衆對以兩都賦燕然銘由古曰此是班孟堅非固也唐温庭筠乾􅀈子李建勲罷相江南出鎮豫章一日逰西山田間茅舎有老叟教村童公觴於其廬連食數棃賔僚有曰梨號五臟刀斧不宜多食叟笑曰鶡冠子云五藏離别之離非梨也葢離别胷懐有若刀斧遂就架取小冊振拂以呈丞相乃鶡冠子也吳僧文瑩湘山野錄江南有一權貴讀誤本蜀都賦注解蹲鴟芋也芋乃為羊字人饋羊肉答書云損惠蹲鴟顔氏家訓太常少卿姜度生子李林甫手書慶之曰聞有弄麞之慶客視之掩口續說記强勉經君子以自强不息易乾卦功崇惟志業廣惟勤書周官子道雖邇不行不至事雖小不為不成荀子修身鍥而不舎金石可鏤荀子勸學史子順曰人皆作之作之不止乃成君子作之不變習與體成則自然也通鑑强勉學問則聞見博而智益明强勉行道則徳日起而大有功西漢董仲舒傳傳記蘇秦讀書欲睡引錐自刺其股血流至足戰國䇿孫敬嘗閉戸讀書睡則以繩繫頭懸之梁上先賢傳集䇿駑磨鈍陳子昻磨鉛重剸割䇿蹇再奔馳白侍郎無若泰山之麓止而不得升也其惟川之不已乎栁文偷堕經惰農自安不昏作勞不服田畆越其罔有黍稷書盤庚中人之性好逸豫無逸注弗為胡成太甲下安肆日偷記表記逸豫無期詩白駒子子貢曰賜倦于學困于道矣願息可乎家語處身而常逸者則志不廣同上一進一退六驥不致荀子修身其為人也多暇日者其出入不逺矣偷懦憚事無㢘恥而嗜乎飲食則可謂惡少者也並同上肉腐出蟲魚枯生蠧怠惰忘身禍災乃作荀子勸學史懐與安實敗名左僖二十三年管敬仲曰宴安酖毒不可懐也左閔元年吾儕偷食朝不謀夕左昭元年主民翫嵗而愒日左昭元年愒若葢切雀䑕貪生茍乞一活耳通鑑東漢世祖紀相聚偷生如魚逰釜中知其不可久且以喘息湏臾間耳通鑑漢殤紀集怠者不能修韓文原毁本朝坐棄時日臨川筆硯生塵空度日欒城集矯揉經玉不琢不成器人不學不知道記學記子子路曰南山有竹不揉自直斬而用之逹于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入不亦深乎家語子路篇純璞不殘孰為犧樽白玉不毁孰為圭璋紀渻子為齊宣王養鬬雞十日而問雞已乎曰未也方虛憍而恃氣十日又問曰未也猶應響景十日又問曰未也猶疾視而盛氣十日又問曰㡬矣雞雖有鳴者已無變望之似木雞矣其徳全矣並荘子西門豹性急故佩韋以自緩董安于性緩故佩絃以自急韓子木直中繩揉以為輪其曲中規雖有槁暴不復挺者揉使之然也荀子勸學枉木必得櫽括然後直鈍金必得礱厲然後利荀子性惡玉不雕璵環不作器揚子海蚌未剖則明珠不顯崐竹未斷則鳳音不彰劉子呉竽質勁非楛羽而不美越劍性利非淬礪則不銛同上候自直之箭則百代無一矢候自員之木則千嵗無一輪韓子假儒衣書服而讀之三月不歸孰曰非儒也揚子史虎豹馬牛禽獸之不可制也及其教馴服習之至牽持駕服惟人之從西漢公孫𢎞傳治性之道審己之所有餘而强其所不足聰明疏通者戒于太察寡聞少見者戒于壅蔽勇猛剛强者戒于太暴仁愛温良者戒于無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘匡衡傳金在礦何足貴善冶鍛而為器人乃寳之魏徴傳集刓方以為圜楚辭若金受礪若泥在鈞張茂先礪志詩木以繩直金以淬剛必須砥礪就其鋒鋩蔡邕勸學不自朱藍何遷素絲之質晉王儉表木之性直匠者揉以為輪金之性剛工人理之成器豈人事也惟上智下愚特禀異氣中庸之才全由訓習虞世南刻意厲行如奉商鞅之法而懼秦刑皇甫湜唐太宗性本强悍勇不頋親而能畏義好賢屈己從諌刻厲矯揉力于為善此所以致貞觀之治也范唐鑑博洽經君子多識前言往行易大畜好古博雅君子書序君子之學也博儒有博學而不窮記儒行博學無方記内則子多聞曰博多見曰閒荀子修身史鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣今夢黄熊入于寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黄熊以入羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間左傳晉悼夫人食輿人之城把者絳縣人或年長矣無子而往與于食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子於承匡之嵗也七十三年矣史趙曰亥有二首六身下二如身是其數也士文伯曰然則二萬六千六百有六旬也杜註云亥字二畫在上併三六為身如筭之六也同上呉伐越堕㑹稽得骨節專車呉使使問仲尼骨何者最大仲尼曰禹致羣臣于㑹稽山防風氏後至禹殺而戮之其節專車此為大也史記有隼集於陳庭而死楛矢貫之石砮矢長尺有咫陳湣公使問仲尼仲尼曰隼來逺矣此肅慎氏之矢也昔武王克商通道九夷八蠻使各以其方賄來貢于是肅慎貢楛矢石砮長尺有咫先王以分大姬配虞胡公而封諸陳試求之故府果得之同上莊子其學無所不窺史本傳禇先生好讀外家傳語史滑稽傳東方朔多所博觀外家之語索隱曰外家非止經史即傳記雜説之書史滑稽傳田蚡學盤盂諸書本傳劉向揚雄博極羣書西漢司馬遷為太史令紬史記石室金匱之書太史公自序其渉獵者廣博貫穿經傳馳騁古今班固贊五經紛綸井大春後漢周舉博洽為儒者所宗京師為之語曰五經縦横周宣光後漢沉淪典籍為儒家文林後漢崔寔傳仲尼恥一物之不知晉張衡傳所觀彌博所習彌多日聞所不聞日見所不見晉虞溥傳巨骨出呉隼集陳庭黄熊入夢亥有二首非夫洽聞者莫識其端也東漢謝該傳晉杜預朝野號為武庫言其無所不有也晉書本傳王粲博物强記問無不對魏志裴頠博學稽古周弼見而歎曰若武庫五兵縱横一時之傑也荀朂于路逢趙賈人牛鐸識其聲及掌樂音未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飰謂在坐人曰此勞薪所炊帝遣問膳夫實用故車脚舉世服其明識並晉書天下竒秘世所希有者悉在華所由是博物洽聞世無與比惠帝中人有得鳥毛三丈以示華華見惨然曰此謂海鳬毛也出則天下亂矣陸機嘗餉華鮓于時賔客滿坐華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中芽積下得一白魚質状殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化為雉也開視雉側果有蛇蜕焉呉郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻為魚形叩之則鳴矣于是如其言果聲聞數里初呉之未滅也斗牛之間常有紫氣道術者皆以呉方强盛未可圗也惟華以為不然及呉平之後紫氣愈明華聞豫章人雷煥妙逹緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰是何祥也煥曰寳劍之精上徹于天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劍佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石圅光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒豔發大盆盛水置劍其上視之者精芒眩目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公其可欺乎煥曰本朝将亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服也華得寳劍愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劍倍益精神華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽于腰間躍出堕水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而返須臾光彩照水波浪驚沸于是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多類此不可詳載焉張華博物洽聞世無與比符元逹善識味鹹酢及肉皆别所由或人殺雞以食之元逹曰此雞栖常半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無差時人以為知味並同上李守素通姓氏學世號肉譜虞世南曰昔任彦昇通經時稱五經笥今以倉曹為人物志可乎唐書王元感為五經指南同上殷踐猷博學賀知章號為五總龜謂龜千年五聚問無不可知也新唐書劉杳博聞多識江右舊事緘青箱世謂之王氏青箱學南史澄博覽無所不知王儉自以博聞多識過澄澄俟儉語畢然後談所及遺漏數百十條皆儉所未覩儉乃歎服曰陸公書厨也南史陸澄傳劉孝綽子諒悉晉代故事時人號曰皮裏晉書南史本傳朱异遍治五經渉獵文史博奕書筭皆其所長沈約曰卿年少何乃不亷异未逹約曰天下惟有文義棋書卿一時將去可謂不㢘梁書房暉逺世傳儒學牛𢎞稱為五經庫隋書本傳古事問仲舒髙仲舒今事問琳尚何疑唐書崔琳傳常爽為儒林先生北史谷律那淹識羣書褚遂良稱為九經庫唐書本傳傳記揚雄懐鉛抱槧從計吏訪四方語作方言西京雜記漢武帝時未央宫殿前鍾無故自鳴詔問東方朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鍾先鳴三日南郡上言山崩東方朔外傳徐堅多識典故七入書府大唐遺事互見際遇總括方珠包吞九府史通時無逺近事無巨細必藉多聞以成博識史通集并包書林揚雄兵法五十家爾腹為篋笥杜詩収百世之闕文采千載之遺韻觀古今於須臾撫四海于一瞬陸士衡文賦文學穰穰囷倉稠韓集枯腸惟文字五千卷盧仝茶歌凡自唐虞以來編簡所存大之為河海髙之為山嶽明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奥㫖靡不通逹韓集書無所不讀然正用資以為詩同上鈎引貫穿舉大包小若太倉之蓄崇山之載浩浩乎不可知也栁文藝邃六書學該七錄栁祭文武庫則矛㦸森然文房則禮樂盡存姚崇銘本朝晏公所為類要上中下帙總七十四篇六藝太史公百家之言騷人墨客之文章至於地志族譜佛老方技之衆説旁及九州之外遐僻荒忽詭變竒跡之序錄皆披尋紬繹而於三才萬物變化情偽是非興壊之理顯隱細鉅之委曲莫不究盡老泉竒書可學知子雲之苦心亡書復存賴安世之黙識東坡集互見强記撐腸拄腹文字五千卷學如富賈在博収仰取俯拾無遺籌並東坡詩强記史漢武幸河東亡書三篋詔問莫能知惟張安世識之具作其事後購求得書以相校無所遺失霍光問張千秋戰鬬方畧山川形勢千秋口對兵事畫地成圖無所遺失並西漢張安世傳黄祖長子射嘗與彌衡俱游共讀蔡邕所作碑文還恨不繕冩衡曰吾雖一覽猶能識之惟其中石缺二字為不明耳因書出之射馳使冩碑還校如衡所書彌衡目所一見輒誦于口耳所暫聞不忘于心並東漢禰衡傳王起天下書無不讀一經目弗忘新唐書費禕為尚書令識悟過人每省讀舉目暫視已究其意㫖其速數倍於人終亦不忘通鑑魏卲陵厲公紀唐邕練習軍書自督将以下勞效本末及四方軍士强弱多少番代往還器械精粗儲蓄虛實靡不諳悉通鑑梁世祖劉輿密視天下兵簿及倉庫牛馬器械水陸之形皆黙識之通鑑晉懐紀楊愔性强記一見皆不忘其姓名選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊乘短尾牡驢見我不下以方麴障面我何為不識卿漫漢驚服通鑑梁敬帝王粲觀人圍棊局壊粲為覆之不悞一道其强記如此魏志本傳王粲與人共行讀道邊碑人問曰卿能闇誦乎曰能因使背而誦之不失一字同上朱桓强識與人一面數十年不忘部曲妻子悉識之呉志本傳張華强記黙識帝問漢宫室制度及建章千門萬戸華應對如流畫地成圗强記黙識四海之内若指諸掌晉本傳唐太宗寫列女傳於時無本虞世南暗疏之無一字謬本傳張廵讀書不過三復終身不忘唐書本傳張廵初守睢陽時城中居人亦且數萬廵一見問姓名其後無不識者通鑑唐肅宗紀蘇頲一覽至千言輒覆誦唐書本傳李邕自言讀書未遍乃假直秘書未㡬辭去李嶠驚問隱篇隱帙了辨如響唐書傳記晉羅友為人强記從桓宣武伐蜀按行蜀道阡陌菓竹皆黙記之世説開元中常敬忠十五嵗上書言能一過誦千言張燕公召問曰能十過誦萬言乎曰能以萬言試之七過已誦熟御史臺記太宗征遼碑在水中張建章帛包麥屑置水中摸而讀之不欠一字北夢𤨏言集為人强記覽過眼不再讀偉哉羣聖文磊落載其腹韓詩經目所渉莫不精詣唐文粹廵曰吾於書讀不過三遍終身不忘也因誦于嵩所讀書盡卷不錯一字嵩驚以為廵偶熟此卷因亂抽他帙以試無不盡熟嵩又取架上諸書以問廵廵應口誦無疑嵩從廵久亦不見廵常讀書也韓文張中丞後序本朝昔賢書曹娥碑後蔡邕夜闇手摸其文而讀之見山谷詩張安道家貧無書常就人借三史旬日輒歸之曰得其詳矣凡書皆一覽終身不再讀屬文未嘗起草東坡撰墓誌膚淺經記問之學不足為人師記學記子鼯䑕五技而窮荀子勸學末世窮年不免為陋儒同上史章句小儒破碎大道前漢夏侯勝傳傳記屢舉舊事不知所出史通知古而不知今謂之陸沉同上開元中馮先進入院校文選兼復注釋解蹲鴟云今之芋子即是著毛蘿葡院中學士向外説之蕭嵩聞之拊掌大笑新唐書莊生有乘時鵲起之説故謝朓詩曰鵲起登呉臺有人作七夕詩云今夜呉臺鵲亦共往填河羅浮山記云望平地樹如薺有人詠樹詩云遥望長安薺又嘗見謂矜誕為夸毗髙年為富有春秋皆耳學之過也顔氏家訓集末學膚受張子平賦蹈襲附代筆經遞相祖述殆且百家孝經序史葛龔者善為文奏或有請龔奏以干人者龔為作之其人寫之忘自寫其名并寫龔名以進東漢葛龔傳試之日旁坐假手或借人外助多非其實新唐書選舉志舒元輿上書馬周張嘉貞代人作奏卒為名臣新唐書傳傳記王維有詩名然竊人詩句如行到水窮處坐看雲起時英華集中詩也漠漠水田飛白鷺隂隂夏木囀黄鸝李嘉祐詩也李肇國史補葛龔善為文奏或有請龔奏以干人者龔為作之因并冩龔名以進之時人為之語曰作奏雖工宜去葛龔裴筞笑林又見史通漢桓帝時有人辟公府請人作奏記邯鄲笑林互入不學不出胷臆非由機杼史通集遞相祖述杜詩沿襲傷剽盜韓薦士詩惟古於詞必己出降而不能乃剽賊後皆指前共相襲從漢迄今用一律韓愈樊宗師墓誌銘互入評文襲蹈前人言句韓文樊紹述墓誌窺陳篇以盜竊進學解得毋假之人耶韓滂墓誌為文之士多漁獵前代戕賊文史抉其意抽其華置齒牙間遇事蠭起金聲玉耀誑聾瞽之人邀一時之聲雖終淪棄而其奪朱亂雅為害己甚栁集答友人求文章書本朝段成式父之蜀以雉兔遍遺幕府請人囘書孔帖祥符中命詞臣撰日本國祥光記當直者學不優常以張君房代之既得宣甚急張醉飲樊樓紫微大窘後錢楊二公作閒忙令大年曰世上何人號最閒司諫拂衣歸華山謂种放也希白曰世上何人號最忙紫微失却張君房湘山野錄醇正經非法不言非道不行孝經子君子正而不它揚子問道非正不視非正不聽非正不言非正不行夫能正其視聽言行者昔吾先師之所畏也揚子淵騫史非聖哲之書不好西漢揚雄傳仲舒推明孔氏抑黜百家本傳遭漢承秦滅學之後六經離析下帷發憤潛心大業今後學者有所統一為羣儒首董仲舒傳抑抑仲舒為世醇儒西漢叙傳韓愈自比孟軻以荀況揚雄為未醇唐書韓愈贊愈以六經之文為諸儒倡障隄末流返刓以樸剗偽以真其所得粹然一出於正同上集非三代兩漢之書不敢觀非聖人之志不敢存韓文學者尚知宗孔氏崇仁義貴王賤霸吐辭為經舉足為法孟氏醇乎醇者也並同上駁雜子奕之為數小數也不專心致志則不得也孟子告子上無冥冥之志者無昭昭之明無惛惛之事者無赫赫之功荀子勸學自古及今未嘗有兩而能精者也荀子解蔽行衢道者不至荀子勸學夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之内一舉千萬里淮南子孔子讀而儀秦行何如也曰甚矣鳳鳴而鷙翰也惜乎衣未成而轉為裳也並揚子史淳于髠博聞强記學無所主史本傳谷永于經書汎為疏逹與杜欽杜鄴畧等不能浹洽如劉向父子及揚雄也前漢賈山渉獵書記不能為醇儒本傳夏侯勝從始昌受尚書從子建師事勝建又從五經諸儒問與尚書相出入者牽引以次章句具文飾説勝非之曰建所謂章句小儒破碎大道並本傳本朝多好竟無成不精安用夥東坡詩涵養經蒙以養正易䝉卦徳潤身心廣體胖大學澡身浴徳記儒行君子之于學也藏焉修焉息焉遊焉記學記子養心莫善於寡慾持其志毋暴其氣我善養吾浩然之氣存其心養其性所以事天也並孟子瞻彼闋者虛室生白宇泰定者發乎天光疏瀹而心澡雪而精神並莊子齊心服形列子禮義文理以養情虛一而靜謂之清明並荀子史原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然氷釋怡然理順然後為得也左傳序味道之腴班固嚅嚌道真涵泳聖涯唐文藝傳集澄心清魄儲精垂思甘泉賦修性以保神安心以全身養生論神清氣茂允迪中和任彦昇澡身𤣥淵宅心道秘顔延年漸漬徳義之淵棲遲道義之域文選清虛靜泰少私寡欲嵇叔夜行之乎仁義之塗游之乎詩書之源無迷其塗無絶其源終吾身而已矣種學績文以蓄其有泓涵演迤日大以肆養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄並藍田記沉浸醲郁含英咀華磨礱去圭角並韓集公之徳善灌注心耳孕和含粹濯潤本根並劉賔客以貞和陶其性白樂天神全而正氣凝宇定而天光發李文饒本朝信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末此古之人所以大過人東坡雜記知寳玉璠璵難得而易毁故篋櫝以養其全知楩楠豫章積嵗而後成故封殖以待其長奏啟此老如松柏不受雪霜槁直従毫末中自養至合抱東坡詩虛室清泠都是白靈臺瑩浄别生光邵堯夫集醖藉經居上位而不驕在下位而不憂易乾卦瑟彼玉瓚黄流在中詩旱麓人不知而不愠不亦君子乎語學而不患人之不己知同上互入盡其在我令尹子文三仕為令尹無喜色三己之無愠色論語史薛廣徳為人温雅有醖藉西漢薛廣徳本傳桓榮温恭有醖藉東漢桓榮本傳杜如晦以風流自命唐書權徳輿醖藉風流自然可慕元和間為縉紳羽儀唐書權徳輿本傳張九齡體約有醖藉帝後每用人必曰風度能若九齡否通鑑唐𤣥宗紀操修經剛健篤實光輝日新其徳易大畜卦君子以懲忿窒慾易損卦閑邪存其誠易乾卦不逺之復以修身也易損卦君子進徳修業忠信所以進徳也修辭立其誠所以居業也易乾卦如琢如磨者自修也記大學率性之謂道中庸修身則道立非禮不動所以修身也好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人君子所不可及者其惟人之所不見乎並同上姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義記樂記修身踐言謂之善行曲禮敖不可長欲不可從志不可滿樂不可極同上曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎言寡尤行寡悔敏於事而慎於言就有道而正焉志於道據於徳依於仁游於藝篤信好學守死善道克己復禮為仁克伐怨欲不行焉並論語言思可道行思可樂非先王之法服不敢服非先王之法言不敢道非先王之徳行不敢行孝經子君子博學而日三省乎己則知明而行無過矣見善修然必以自存也見不善愀然必以自省也善在身介然必以自好也不善在身菑然必以自惡也並荀子夫能正其視聽言行者昔吾先師之所畏也揚子淵騫互入醇正集斧藻至徳琢磨令範選詩序戕賊經枝葉未有害本實先撥詩大雅傷其本枝從而亡記哀公問子苟得其養無物不長苟失其養無物不消雖有天下易生之物也一日暴之十日寒之未有能生者也戕賊把栁而以為杯棬今茅塞子之心矣並孟子木雖蠧無疾風不折牆雖隤無大雨不壊管子史兹心不爽而昏亂百度左昭元年頃刻不忘善經道也者不可須臾離也可離非道也中庸禮樂不可斯須去身記樂記君子無終食之間違仁造次必於是顛沛必於是語里仁集口不絶吟於六藝之文手不停披於百家之編朝馳騖乎書林夕翺翔乎藝苑並韓文並互入好學行之乎仁義之塗逰之乎詩書之源韓文中輟經為山九仞功虧一簣書旅獒為禮不本于義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也記禮運子掘井九仞而不及泉猶為棄井也孟子盡心上丘陵學山而不至于山是故惡夫畫也揚子學行集方伐柯而捨其斧可乎文粹勇於為善經吉人為善惟日不足書秦誓見善如不及為仁由己而由人乎哉並論語子聞一善言見一善行若决江河沛然莫之能禦也孟子仰而思之夜以繼日幸而得之坐以待旦同上史從善如流左傳上問東平王處家王言為善最樂東漢本傳好問經好問則裕書仲虺舜好問而好察邇言中庸不恥下問論語以能問於不能以多問於寡同上子孔子適周問禮於老耼訪樂於萇𢎞家語受書於李育學詩於夏琠問禮於闗子明正樂於霍汲考易於仲華文中子史郯子來朝昭子問少皥氏鳥名官郯子曰吾祖也故知之仲尼聞之見于郯子而學之左昭十七年孔子學鼓琴於師襄子史孔子世家問事不休賈長頭後漢賈逵傳傳記仲尼之聖訪諸郯子始聞少皥之官叔向之賢詢彼國僑載辨黄熊之祟史通集靡事不咨楊荆州誄為善不篤經擇乎中庸而不能期月守也中庸其餘則日月至焉而已矣中庸之為徳也其至矣乎民鮮久矣並論語子五榖不熟不如荑稗孟子改過經顔子有不善未嘗不知知之未嘗復行也不逺復無祗悔君子有過則改无咎者善補過也並易改過不吝書不貳過過則勿憚改並論語子子路鼓瑟孔子聞之曰習亡國之音能保六尺之體乎冉有以告子路子路懼而自悔靜思不食以至骨立家語互入勇於改過晉人有馮婦者善搏虎卒為善士孟子萬章上子路人告之以有過則喜孟子公孫丑上聞過而有喜色程元能之文中子史呉季札如晉將宿于戚聞鍾聲焉曰夫子獲罪於君而在此懼猶不足而又何樂文子聞之終身不聽琴瑟人誰無過過而能改善莫大焉君子能知其過必有令圗天所贊也並左傳改往反過前漢谷永傳有盜牛者主得之盗請曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懐恥惡必能改過故以此激之後有老父遺劍於路行道一人見而守之至暮老父還尋得劒怪而問其姓名以事告烈使推求乃先盜牛者也東漢王烈傳周處少不修細行州里患之自知為人所惡慨然有改勵之志曰今時和嵗豐何不樂耶父老曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處乃入山殺虎沒水殺蛟勵志好學志存義烈克己朞年州府交辟晉書本傳互入發憤智者改過而遷善則其徳日新通鑑唐徳宗紀陸贄曰臣聞仲虺贊揚成湯不稱其無過而稱其改過吉甫歌頌周宣不美其無闕而美其補闕是則聖意較然明甚惟以改過為能不以無過為貴同上集克己自懲創事多改前好顔子不貳過者葢能止之於始萌絶之於未形不貳之言行也並韓集馮婦好搏虎卒為善士周處狂横一旦改節皆能自克栁文本朝今當痛自改三釁復三湔山谷改過不勇經法語之言能無從乎改之為貴從而不改吾末如之何也已矣語子有人日攘其鄰之雞者或告之曰是非君子之道請損之月攘一雞以待來年然後己如知其非義斯速已矣何待來年孟子史朕見前世帝王拒諫者多云業已為之或云業已許之終不為改如此欲無危亡得乎通鑑唐太宗紀集人患不知其過既知之又不能改是無勇也韓文遂非附文過經小人以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易恥過作非書子醜必託善以自為解邪必䝉正以自為辭游不論國仕不擇官行不辭汚曰伊尹之道也分别爭財親戚兄弟搆怨骨肉相殘曰周公之義也行無㢘恥辱而不死曰管子之趣也行貨賂趨勢門立私廢公比周而取容曰孔子之術也淮南子史過而不改而又久之以成其悔何利之有焉左宣十七年言足以飾非史商紀子獨不見家人寡婦耶始自約敕之時意廼慕宋伯姬及陳孝婦不幸一為盜賊所汚遂行淫佚知其非禮然不得自還吾猶此矣西漢原渉傳互入因誤成誤竇嬰曰侯自我得之自我失之無所恨西漢田蚡傳互入自為成敗漢髙帝曰吾繫相國欲令百姓聞吾過也通鑑漢髙紀愚者恥過而遂非遂非則其惡彌積通鑑唐徳宗紀公孫𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠通鑑漢武紀梁武帝遭臺城之變歎曰自我得之自我失之亦復何恨本紀翟莊曰貪餌吞鈎豈我也哉晉書本傳謝鯤字㓜輿挑鄰家女髙氏投梭折其兩齒時人為之語曰任達不已㓜輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌晉書孫子荆謂王武子曰當枕流潄石武子曰石非可潄流非可枕孫曰流欲洗其耳所以枕石欲礪其齒所以潄晉書王隱傳互入因誤成誤李林甫子岫見權勢熏灼曰大人居位久枳棘滿前一旦禍至若欲比若人可得乎林甫不樂曰勢已然可奈何唐書傳記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曹劉沈謝暗中摸索着亦可識國史賈充問孫皓曰何以剝人面皓曰憎其顔之厚耳語林本朝仁宗朝王安石知制誥一日賞花釣魚宴内侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也聞見錄自是經自用則小書匪先民是程匪大猷是經具曰予聖自獨俾臧自有肺腸抑此皇父豈曰不時並詩愚而好自用賤而好自專生乎今之世反古之道中庸子宋之愚人得燕石藏之以為大寳周客聞而觀焉主人端冕𤣥服以發寳匱十重緹巾十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固闞子不是師法而好自用譬以盲辨色以聾辨聲今之處士無能而云能無知而云知者也並荀子史呉起為人剛勁自喜通鑑周紀奮其私知而不師古史項羽紀事不師古而能長久者非所聞也史李斯傳輦上君子自以為堯舜之世何敢妄言晉書子思曰君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非通鑑上曰吾業已授之不可追也通鑑唐髙祖紀宗慤為豫州呉喜為典籖慤刑政所施喜毎多違執慤大怒曰宗慤年将六十為竭命止得一州如斗大不能復與典籖共臨之通鑑宋世祖自用不能聽大度之言通鑑秦紀䕶短經人莫知其子之惡大學史令狐綯執政嵗久子滈頗招權受賄言者攻其短令狐綯為滈訟寃通鑑唐宣宗人有愛其狗者狗常溺井其鄰人見欲入言之狗當門而噬之通鑑周紀集桓侯抱将死之疾而怒扁鵲之先見嵇叔夜本朝今人有過不喜人規如䕶疾而忌醫寜滅其身而無悟也通書怙終經怙終賊刑罔晝夜頟頟凶人為不善亦惟日不足穢徳彰聞狃于姦宄驕淫矜侉将由惡終並書方茂爾惡相爾矛矣多將熇熇不可救藥並詩史長惡不悛徒自及也左隠六年不思謗讟不憚鬼神神怒民痛無悛于心左昭二年宋子魚曰禍猶未也未足以懲君左僖二十一年於易一過為過再為渉三而弗改滅其頂凶魏志傳記蜂蠆不棄毒於人則不靜説苑集雖九死其猶未悔楚辭蜂蠆終懐毒杜詩梟音不悛鴟張益熾白傳集不能悔過史呉季札将宿於戚聞鍾聲焉曰夫子獲罪於君以在此懼猶不足而又何樂焉左襄公衛侯衎復歸于衛大夫逆于境者執其手而與之言道逆者自車揖之逆于門者頷之而已左襄二十六年齊王出亡之衛衛君辟宫舎之稱臣而共具齊王不孫衛人侵之齊王去奔鄒魯有驕色鄒魯弗内遂走莒通鑑周紀項王渡淮有二十八騎漢騎追者數千人項王自度不能脱謂曰吾起兵七十餘戰所當者破未嘗敗北遂霸有天下今卒困此此天亡我非戰之罪也今日願為决戰斬将搴旗令諸君知天亡我非戰之罪也史項羽紀集小人在辱亦克知悔及其既寜終莫能戒韓文記纂淵海卷六十二
