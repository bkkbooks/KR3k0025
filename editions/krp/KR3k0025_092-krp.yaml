body:
  text: 記纂淵海卷九十二宋潘自牧撰果食部果經雷雨作而百果草木皆甲拆易果臝之實亦施于宇詩甸師供野果蓏之薦周禮賜果於君前其有核者懐其核記果實未熟不鬻於市同上子趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之使擇其果之繁者伐之其父曰果之茂者猶伐之况其人乎吾將以爾為累矣去之則免乃攜老持子逃趙栖於白雲之岩終身不返趙人思之符子史桓榮為博士會庭中詔賜竒果受賜竒果受賜者懐之以拜光武笑指之曰此真儒生也華嶠後漢書劉祐仕郡為主簿郡將小子嘗出錢付之市買果實祐悉以買筆墨書具與之謝承後漢書後魏淮陽王欣好營産業多所樹藝京師名果皆出其園北史李泳為河陽令所至以貪殘為務犒宴所陳果實以木刻彩繪之唐書傳記織女星主果春秋元命苞在木曰果在草曰蓏說文不周之山爰有嘉果其實如桃李其葉華赤跗食之不飢山海經種名果法取好直枝内著芋塊中種之食經舍衛國在月氏南萬里果大如三斗盆闞駰十三州記石虎有華林園種衆果民間有名果虎作蝦蟇車四搏握根面去一丈深一丈合土載之植之無不生鄴中記嵇昌蓄採星盆夏月漬果則倍冷叙聞錄李直方嘗第果實以綠李為首楞梨為副櫻桃為三甘子為四蒲桃為五或薦荔支曰寄舉之首國史補集百果甲拆異色同榮左思賦芳果萬名攅羅廣庭霜滋露熟時至則零劉禎賦雜果幾乎萬株石崇金谷詩序竒樹珍果鉤盾所職張平子賦天淵地東南角有果各作一林無處不有縱横成行陸機書於焉摘朱果兼得養𤣥牝李白山果多瑣細苦甘齊結實或紅如丹砂或黒如㸃漆杜詩葉心朱實堪時落朱果爛枝繁並同上篚實摘林珍韓集本朝凡果實久不熟者以祭社餘酒洒之則繁茂倍常用生人髪掛枝上則飛鳥不敢近方結實時最忌白衣人過則其實盡落遯齋閒覽江南有蜀士桑果已許乞東坡栖禪晩置酒蠻果粲蕉荔同上荔支史汝南唐羌為臨武縣長接交州舊獻荔支羌上書諫乃止謝承後漢魏文帝詔羣臣曰南方有龍眼荔支寧比西國蒲萄石蜜乎今以荔支賜將吏則知其味薄矣魏志楊妃嗜荔支必欲生致之乃置驛傳送走數千里味未變已至京師唐書白居易為忠州刺史在郡為木蓮荔支圖曰荔支生巴峽間形圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴如酪若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣同上傳記南越王尉佗獻髙祖鮫魚荔支髙祖報以蒲萄錦四疋西京雜記單于來朝賜橙橘龍眼荔支東觀漢記蒼梧多荔支生山中人家亦種之吳錄犍為僰道南荔支熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈比三種為美次鼈卵大而酸率生稻田間廣志荔支壺橘南珍之同上荔支南中之珍果也梧州江前有火山上有荔支四月先熟核大而味酸其髙新州與南海産者最佳五六月方熟形若小鷄子近蔕稍平皮殻殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有蠟荔支黄色味稍劣於紅者嶺表錄集今人主不思神芝朱草而患枇杷荔支之腐亦鄙矣仲長統昌言其形也暖若朝雲之興森如横天之彗角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之著天王逸賦傍挺龍目側生荔支布綠葉之萋萋結朱實之離離左思賦雖受氣于震方實禀精于火離張九齡賦下合圍以擢犀傍䕃畆而抱規紫文紺理黛葉緗枝蔕葯房而捽萃皮龍鱗以駢比膚玉英而含澤色江蓱以吐日信琱盤之仙液實玳筵之綺繢並同上素華春漠漠丹實夏煌煌白居易星綴連心朶珠排耀眼房紫羅裁襯殻白玉裹填囊燕脂掌中顆甘露舌頭漿並同上封開玉籠鷄冠澁葉襯金盤鶴頂鮮韓偓巧裁縫片裹神漿崖蜜天然有異香應是仙人金掌露待成冰入茜羅裳同上輕紅擘荔支杜詩本朝閩中唯四郡有之福州最多而興化軍最為竒特泉漳時亦知名列品雖髙而寂寥無紀將尤異之物昔所易有乎蓋亦有之而未始遇乎人也蔡君謨荔支譜夫以一木之實生於海濵岩險之逺而能名徹上京外被夷狄其於果品卓然第一興化軍大重陳紫富室大家嵗或不嘗雖别品千計不為滿意陳氏欲採摘必先閉户隔牆入錢度錢與之得者自以為幸不敢較其直之多少也其樹晩熟其實廣上而圓下大可徑寸有五分香氣清逺色澤鮮紫殻薄而平瓤厚而瑩膜如桃花紅核如丁香母剝之凝如水精食之銷如絳雪此所以為天下第一也福州江家綠為州之第一並同上莆田荔支名品皆出天成雖以其核種之初不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過牆則為小陳紫矣此果形狀變態百出不可以理求或似龍牙或類鳯𤓰釵頭紅之可簪綠珠子之旁綴是豈人力所能加哉容齋隨筆永元荔支來交州天寶嵗貢取之涪至今欲食林甫肉無人舉觴酹伯游我願天公憐赤子莫生此物為瘡痏雨順風調百穀登民不飢寒為上瑞東坡獨使皴皮生弄色暎琱爼同上炎精孕秀多靈植荔子佳名聞自昔絳囊剖雪出琱盤尋常百果無顔色閩天六月雨初晴星火熒煌耀川澤歘如彩鳯戲翺翔爛若彤雲堆翕赫中郎裁品三十三陳紫方紅冠儔匹陳去非筆下丹青千品色釵頭風露一枝香鷄冠借喻何輕許馬乳争名固不量劉屏山錦筵火齊堆金盤五月甘漿破齒寒劉貢父龍眼史交趾七郡獻龍眼謝承後漢傳記益智龍眼也廣雅龍眼一名比目吳氏本草龍眼一名益智蓋甘味歸脾而能益智非今益智子也本草龍眼樹葉似荔支蔓延緣木生子大如酸棗色味純甜無酸廣志龍眼子樹如荔支葉小殻青黄色形圓如彈丸大核如木槵子而不堅内白帶漿其甘如蜜一朶常三二十顆荔支方過龍眼即熟南人謂之荔支奴嶺表錄異集傍挺龍目左思賦本朝閩越之人髙荔子而下龍眼吾為評之荔子如蝤蛑大蟹斫雪流膏一嘬可飽龍眼如食蟛􅒹石蟹嚼嚙久之了無所得然酒闌口爽饜飽之餘則咂啄之味石蟹有時而勝蝤蛑也東坡亷州龍眼質味殊絶可敵荔支龍眼與荔支異生同父祖端如甘與橘未易相可否異哉西海濵琪樹羅𤣥圃纍纍似桃李一一流膏乳坐移星殞空又恐珠還浦圖經未嘗說玉食逺莫數獨使皴皮生弄色映琱爼蠻荒非汝辱幸免妃子汚並同上幽株傍挺綠婆娑啄咂雖微奈美何香割蜜脾知韻勝價輕魚目為生多劉屏山棗經八月剝棗詩子曾晳嗜羊棗而曽子不忍食羊棗孟史李少君以却老方見上少君曰臣曾遊海上見安期生食巨棗大如𤓰史記廣陵厲王胥宫園中棗樹乃生十餘莖莖正赤葉白如素玉坐呪咀自殺漢書王吉居長安其東家有棗樹垂吉庭中吉婦取棗以㗖吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還安邑千樹棗此其人皆與千戸侯等並同上孟節能含棗核不食可至五年謝承後漢李郁因晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象將不免乎未幾而卒晉史傳記棗壺棗也今江東稱棗大而銳上者為壺邊要棗細要棗也今謂之鹿盧棗櫅白棗即今棗子樲酸棗樹小實酸孟子曰養其樲棘遵羊棗俗呼為羊矢棗洗大棗今河東猗氏出蹶泄苦棗子味苦也晳無實棗不著子也還味稔棗還味短味也已上並爾雅北山有棗使叔夀考焦贑易林握棗與錯金以示嬰兒必取棗而不取金春秋繁露魏文帝忌弟任城王饒壯因在卞太后側共圍棋並啖棗文帝以毒置諸棗蔕中自選可食者而王弗悟遂雜進之中毒遂卒世說王大將軍嘗至石崇家如厠見漆箱中盛乾棗本以塞鼻王遂食盡羣婢莫不笑同上景公謂晏子曰東海之中有棗花而不實何也晏子曰昔者秦穆公乗龍治天下以黄布裹蒸棗至海而投其布故水赤蒸棗故花而不實公曰吾佯問子對曰嬰聞佯問因佯對之晏子春秋七月七日西王母當下為帝設玉門之棗漢武内傳北極有岐峯之隂多棗樹百尋其實長尺核細而柔百嵗一實拾遺記老子西遊省大真王母共食玉文之棗其實如缾關令尹内傳沈羲為仙人所迎上天云老君賜棗二枚大如鷄子神仙傳馮明生為縣吏捕賊為賊所傷殆死遇神女以藥與服即愈明生隨神女還岱宗見安期生曰共與女即遊於安息西母之際食棗異美此間棗小不及意此棗未久已二千年矣神女云昔與君共食一枚乃不盡此間小棗那可相比也馮明生別傳東郡穀城棗長二寸西王母棗大如李核三月熟河内汲郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗單父棗梁園國夫人棗大白棗一名曰慼咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗牙鷄心牛頭羊矢猴細腰之名又有𤣥棗﨑亷棗桂棗廣志景陽山南有百果園果别作一林林各有一堂有仙人棗長五寸把之兩頭俱出核細如針霜降乃熟食之甚美洛陽伽藍記􅝜嵣細棗出􅝜嵣之山山臨碧海萬年一實子如今軟棗笮之有膏膏可燃燈西王母握核以獻帝因名曰握核棗洞㝠記大業二年信都獻仲思棗長四寸五寸圍勝於青州棗洞𤣥錄初脩上林苑羣臣各獻名果樹有弱枝棗西王母棗棠棗王門棗青華棗梬棗赤心棗西京雜記波斯棗廣州所種者或三五年一番結子亦似此中青棗但小耳嶺表錄異蒲中多大棗嵗中不過一二無核者廣記滄州有碧棗大如梨梁武帝以棗擲蕭琛琛取栗擲帝正中面曰陛下投臣以赤心臣敢不戰栗於陛下並同上北方有七尺棗述異記集安平好棗何晏論素華離離朱實甚脫色如霜雪甘如含蜜傅𤣥賦黄葉離髙柯丹棗坐自零不摘棗自零念我少弟兄前人歌詞棗下纂纂朱實離離宛其落矣化為枯枝潘岳笙賦周文弱枝之棗閒居賦信都之棗左思魏都賦美棗生荆棘古詩赤心鯁直郭璞賛垂花臨碧澗結翠依丹巘吳筠外雖多荆棘内實有赤心趙整浮華齊水麗垂彩鄭都竒白紛英靡靡紫子標離離風摇羊角樹日映鷄心枝穀城踰石蜜蓬岳表仙儀已聞安邑美永茂玉門垂梁簡文帝紅皺曝簷瓦韓集棗圃落青璣同上本朝秋來紅棗壓枝繁堆向君家白玉盤六一集甘心楚國赤萍實磊落韓嫣黄金丸同上風包墮朱繒日顆皺紅玉王介甫胡桃傳記上林苑有胡桃西京雜記陳倉胡桃皮薄多肌隂平胡桃大而皮脆急捉則破廣志張騫使西域還得胡桃博物志山胡桃皮厚而堅底平如㯽榔以斧搥之方破嶺表錄異集三桃表櫻胡之别潘岳閒居賦胡桃本生西羌外剛内柔質似賢劉滔母答吳國書榧子本朝彼美玉山果粲粲金盤實瘴霧脫蠻溪清樽奉佳客客行何以贈一語當加璧祝君如此果得膏以自澤驅攘三彭仇已我心腹疾願君如此木凛凛傲霜雪斷為君倚几滑浄不容拭物微興不淺此贈無虛擲東坡送鄭户曹栗經樹之榛栗詩經東門之栗詩鄭風隰有栗詩秦風女贄不過榛栗棗脩以告䖍也左傳哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗語子莊周遊乎調陵之樊睹一異鵲感周之顙而集於栗林莊子史燕秦千樹栗此其人與千户侯等漢書東夷韓國出大栗如梨魏志劉秀之從叔穆之為丹陽㕔事柱有一穿穆之謂子弟曰汝等試以栗遥擲柱入穿者必得此郡唯秀之獨入焉其言果驗晉書王泰年數嵗時祖母散栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之同上沈約嘗侍宴會豫州獻栗徑寸半竒之問衆栗事少多與約各疏所知梁書傳記五方皆有栗周秦吳揚特饒唯漁陽范陽栗甜美長味倭韓國上栗大如鷄子亦短味不美桂陽有栗藂生大如杼子詩義疏八月栗零零也者降也零而後取之故不言剝大戴禮果之美者箕山之栗吕氏春秋上林苑有侯栗榛栗瑰栗嶧陽栗西京雜記漢武帝果園有大栗十五枚及一升三秦說東北荒有栗樹髙三十丈栗徑三尺其殻赤肉黄白味甜神異經諸暨如拳之栗地理誌廣州無栗唯勒州山中有石栗一年方熟皮厚而肉少味似胡桃仁熟時或為羣鸚鵡至啄食畧盡嶺表錄異汝水灣中有栗園數貢三百石以充天府水渚即栗洲也水經注王可交掉漁舟遇道士與栗青赤色如棗長二寸許非人間之栗肉脆而甘如飴廣記有佐酒倡優侮殷七七乃白主人欲以栗為令乃以栗巡行笑七七者作石綴於鼻掣拽不落滄州有丹栗大如梨並同上鄴中産巨栗脫其殻可以為杯鄴中記集穰多栗過拳杜詩山家蒸栗暖羅生雜橡栗嵗拾橡栗隨狙公並同上採栗𤣥猿窟韋蘇州王檀侯栗王彪之賦人有折蔡氏祠前故栗者故作此賦蔡邕傷故栗賦中山好栗何晏論本朝夜火爆山栗六一集老去自添腰脚病山翁服栗舊傳方客來為說晨興晩三咽徐收白玉漿蘇子由榛經山有榛疏云榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木藂生髙丈餘作胡桃味遼代上黨皆饒詩榛楛濟濟旱麓女贄不過榛栗棗脩左傳傳記榛似梓實如小栗說文枝葉似栗樹小似橡子味似栗枝莖可以為燭詩義疏上市之山下多榛楛山海經漢末楊氏家園中産神榛二株述異記集寒梨乾榛七辨櫻桃經仲夏之月天子羞以含桃先薦寢廟記史惠帝出離宫叔孫通曰今櫻桃熟可獻陛下宜以櫻桃獻宗廟上許之漢書太宗將致櫻桃於酅公稱奉則以尊言賜又以卑虞監曰昔梁帝遺巴陵王稱餉遂從之唐書中宗遊芳林園命公卿馬上摘櫻桃𤣥宗紫宸殿櫻桃熟命百官口摘之蕭穎士李林甫欲用之乃召見時穎士居母䘮即縗麻而謁林甫林甫素不識遽見縗麻即令斥去穎士乃為伐櫻桃賦以刺林甫云擢無庸之瑣質因本枝而自庇泊羣材而非據居階庭之右地雖先寢而或薦豈和羮之正味文宗嘗因内園進新櫻桃將以賜二宫上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常並同上傳記楔荆桃爾雅注曰今櫻桃含桃櫻桃為鳥所含故曰含桃吕氏春秋注孟夏祭用櫻桃范注祠祭櫻桃大者如彈丸有長八分者白色多肌者凡三種廣志櫻桃或如手指春秋冬夏華實竟嵗博物志櫻桃一名朱桃一名麥英本草實深紅色者謂之朱櫻正黄明者謂之蠟櫻同上漢明帝於月夜讌賜羣臣櫻桃盛以赤瑛盤羣臣視之月下以為空盤帝笑之拾遺錄景龍四年上與侍臣於樹下摘櫻桃恣其食大陳宴席至暝每人賜朱櫻二籠景龍文館記上幸兩儀殿命侍臣食櫻桃盛以琉璃和以杏酪飲酴醿酒同上黎舉欲令橙子臣櫻桃但恨時不同耳金城記韓約能作櫻桃饆饠其色不變雜爼集惟櫻桃之先熟兆百果而含榮鳥纔食而便墮雨薄灑而皆零後梁宣帝賦櫻桃為樹則多䕃為果則先熟𫝊咸賦集繁星而積曜栁文西蜀櫻桃也自紅野人相贈滿筠籠數囘細㵼愁仍破萬顆匀圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬杜詩崖蜜松花熟赤墀櫻桃枝隠映銀絲籠干春薦陵寢永永垂無窮並同上漢家舊種明光殿炎帝還書本草經豈若滿朝承雨露共看傳賜出青冥香隨翠籠擎初重色照銀盤㵼未停韓集合充鳯食留三島誰許鸎偷過五湖苦筍恐難同象匕酪漿無復瑩蠙珠韓偓披香殿下櫻桃熟温庭筠空看翠幄成隂日不見紅珠滿樹時宜男謾作後庭草不似櫻桃千子垂並同上矮墮綠雲髻欹危紅玉篸李義山珠實雖先熟瓊莩縱早開流鸎猶故在争得諱含來同上新果真瓊液來應宴紫蘭圓疑竊龍頷色已奪鷄冠杜牧白玉牕中起草臣櫻桃初赤試嘗新殿頭傳語金階逺因進詞來謝聖人王建本朝杜牧之詩云忍用烹酥酪從將洗玉盤遂知唐人已用櫻桃薦酪也作錄東坡橄欖詩曰待得微甘囘齒頰已輸崖蜜十分甜見鬼谷子曰崖蜜櫻桃也墨客揮犀紫櫻桃熟麥風涼六一集獨遶櫻桃樹酒醒喉肺乾莫除枝上露從向口中傳東坡傾籃的皪沾朝露出袖熒煌得寶珠會薦瑛盤傾一座莧腸藜口未良圖陳后山梅經若作和羮爾惟鹽梅書摽有梅其實七兮摽有梅其實三兮詩子百梅足以為一人酸一梅不足為百人酸淮南傳記梅柟爾雅梅杏類也樹及葉皆如杏而黒詩義疏靈山其木多梅山海經魏武帝興軍士失道大渇而無水遂令曰前有梅林結子甘酸可以止渇士卒聞之皆口中水出遂得及泉原世說五月有落梅風江淮以為信風又有霖霪號為梅雨霑衣服皆敗黦風俗通上林苑有朱梅同心梅紫蔕梅燕支梅麗枝梅紫花梅侯梅西京雜記夏至之雨名為黄梅雨風土記蜀名梅為􅀢大如鴈子梅􅀢皆可以為油脯黄梅以熟􅀢作之廣志晉范汪能啖生梅人嘗致一斛奩須臾啖盡詩林集亦果中之嘉實吳淑賦紅綻雨肥梅杜詩四月熟黄梅梅杏半傳黄並同上好忻待賔侣金盤薦紅瓊庾信齒軟越梅酸韓偓天賜烟脂一抹腮盤中磊落笛中哀雖然未得和羮便曾與將軍止渇來羅隠本朝吳人謂梅子為曹公以嘗望梅止渇也筆談江梅有佳實託根桃李場山谷古來和鼎實此物升廟廊青莎徑裏香未乾黄鳥隂中實已團蒸豆作烏鹽作白屬聞丹杏薦牙盤北客未嘗眉自顰南人誇說齒生津磨錢和蜜誰能許去蔕供鹽亦可人並同上楊梅傳記地有章名則生楊梅博物志故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也吳興記楊梅其子如彈丸正赤五月中熟熟時似梅其味甜酸臨海異物志盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下廣州記楊脩七嵗甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔用指以示兒曰此真君家果兒應聲答曰未聞孔雀是夫子家禽世説新語趙綸妻死遺雪竹搔頭階下不數日化為楊梅花朶如撒時人異之姑臧記陸展郎中見楊梅歎曰此果恐是日精然若無蜂兒採香誰勝難和之味即以竹絲籃貯千枝并茶花蜜送衡山道士湘潭記黎舉常云楊梅枇杷幸為執友金城記集懐蘂挺實涵黄橘丹鏡目綉壑照霞綺蠻江淹頌玉盤楊梅為君設吳鹽如花皎白雪李白本朝南村諸楊北村盧白花青葉冬不枯垂紅綴紫煙雨裏特與荔支為先驅東坡羅浮山下四時春盧橘楊梅次第新同上楊出稽山世少雙情知風味勝他楊玉肌甫醉生紅粟墨暈微深染紫囊火齊堆盤珠徑寸醴泉繞齒柘為漿楊誠齋越絶諸楊盛一時也解過江尋德祖政緣作尹是丘遲渠伊不是南村𣲖未免先驅是荔支並同上杏子五沃之土其木宜杏管子孔子休坐杏壇之上莊子史馬燧之子暢以第中大杏饋竇文場文場以進德宗德宗未嘗見頗怪令中使就封杏樹暢懼進宅廢為奉誠園唐書傳記杏木者東方嵗星之精典術杏多實不蟲者來年秋善師曠占靈山之下其木多杏山海經夏祠用杏盧諶祭法張元性亷潔南隣有杏二樹杏熟多落元園中元所得者悉以還主董奉居廬山為人治病得愈者令種杏數年成林奉語買杏者不須來報但自取之一器榖便得一器杏有人少穀徃而取杏多即有虎逐之奉悉以杏所得穀賑救貧窮神仙傳仙人有三𤣥紫杏南岳夫人傳上林有文杏蓬萊杏西京雜記滎陽有白杏鄴中有赤杏有榛杏廣志嵩髙山東北有牛山多杏百姓饑饉資此為命嵩山記杏園洲南海中多杏海上人云仙人種杏處漢時嘗有人舟行遇風泊此洲食杏免死云洲中有冬杏述異記范蠡宅在湖中有海杏大如拳賴鄉老子祠有縹杏並同上北齊仙都苑有合歡杏花木錄齊南郡東南杏大如梨色黄如橘土人謂之漢帝杏亦曰金杏雜爼集冬實之杏王充賦魏土送西山之杏王逸荔支賦豹祠赤杏王廙賦越魏都之赤杏胡道安賦光武墳邊杏甚美今奉送其核朱起石與兄書本朝貢杏初嘗酒正醇六一集芳枝結青杏翠葆新奕奕同上酒䦨紅杏闇東坡大杏金黄小麥熟同上屬同丹杏薦牙盤山谷里中饋杏得嘗新后山意行到南園杏子半紅碧誠齋小苦已自正未酸政堪喫聊將挿鬢歸空樽有餘瀝同上桃經桃之夭夭有蕡其實投我以木桃報之以瓊瑶投我以桃報之以李並詩子五沃之土其木宜桃管昔彌子瑕有寵於衛君食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕得罪於君曰是固嘗啖我以餘桃韓子五原蔡誕入山而還欺其家云到崑崙山有玉桃須玉井水洗之便軟而可食抱朴子史貞觀十一年康國獻金桃銀桃詔令植之於苑囿唐書莊宗年邁多疾馮道奏曰臣願陛下寢膳之間動留調衛因指御前果實曰如食桃不康翊日見桃而思戒可也五代史傳記六月煮桃以為豆實大戴禮玉衡星散為桃春秋運斗樞旌冬桃子冬熟也椃桃山桃並爾雅玉桃服之長生不死神異經關令尹喜從老子西遊省大真王母共食碧桃内傳孔子侍坐於魯哀公哀公賜之桃與黍仲尼先飯黍而後食桃公曰以黍雪桃也對曰黍五穀之長果六而桃為下君子不以貴雪賤家語公孫接田開强古冶子事景公勇而無禮晏子言於公請公饋之二桃曰三子計功而食公孫接田開强先言功援桃而起古冶子又言其功令二子反桃二子慙而自殺古冶子曰恥人以言夸其聲不義也亦反其桃契領而死晏子春秋魏文侯見箕季從者食其功而箕季禁之文侯曰豈愛桃哉是教我下無犯上也劉向新序上林苑有秦桃櫻桃緗核霜桃金城桃胡桃綺葉桃含桃紫文桃西京雜記東郡獻短人武帝呼東方朔短人指朔曰王母種桃此兒三偷之矣後西王母下出桃七枚自㗖其二以五枚與帝帝留核欲種之母歎曰此桃三千年一著子非下土所植也漢武故事張陵服丹能變化有趙升就陵受學陵與諸弟子登雲臺山有桃樹旁生石壁下桃大有實陵曰得此者當告以道升乃從上自擲正投桃樹得二百枚陵分賜諸弟子餘二枚陵自食一留一以與升神仙傳桓𤣥素輕柏崖崖有好桃𤣥連就求之不得佳者𤣥與殷仲文書曰德之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得也世說積石山桃實大如十斛甕𤣥中記磅磄山有桃樹千圍萬嵗一實拾遺記漢明帝時嘗獻巨核桃霜下結花隆暑方熟常使植於霜林園俗謂相陵聲之誤也同上石虎苑中有勾鼻桃重二斤鄴中記景陽山有仙人桃得霜乃熟一曰西王母桃也洛陽伽藍記剡縣劉晟一作晨阮肇入天台山迷路乏糧各啖數桃而不饑下大溪邊有二女邀還家遂停半年懐土思歸女曰罪牽君如何便語大路幽㝠錄王㻌入王屋洞室遇東極真人贈以桃出融臯澤廣記集有東園之珍果兮承隂陽之靈和結柔根以列樹兮横長畆而駢羅𫝊𤣥賦李經投我以木李報之以瓊玖丘中有李投我以桃報之以李詩子陳仲子居於陵三日不食井上有李螬食實者過半矣匍匐徃將食之孟子五沃之土其木宜李管子五原蔡誕入山而還欺其家云到崑崙山有玉李以玉井水洗之便軟可食張助耕於白田有一李栽掘之置空桑中其里人見桑中生李謂之神有病目痛祝之偶愈殺㹠祭之傳者便言此樹能令盲者得視互來祈福抱朴子史王戎年七嵗道邊李樹子多折枝小兒競取之戎曰樹在道邊而子多必苦李也取之信然王戎家有好李賣之恐人得種常鑽其核和嶠家有好李帝求之不過數十王武子率少年持斧詣園飽啖畢伐之送與嶠問何如君李晉書王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先嘗齊書傳記休無實李一名趙李座接慮今之麥李駮赤李子赤色爾雅邊春之山多李山海經李少君謂鍾山之李大如瓶仙之上藥有圓丘紅李漢武内傳華林園有春李冬華春熟鄴中記南居細李四月先熟風土記五靈丹山上有𤣥雲之李食之得仙王褒内傳上林苑有紫李青綺李黄李青房李綠李顔淵李合枝李羌李朱李車下李燕李侯李蠻李西京雜記䑕李朱李可以染麥李最細小溝道李黄建李青皮李馬肝李赤房陵李䭞李其肌粘茹之似䭞柰李離核李似柰劈李熟必先劈裂經李又一名老李杏李味小酢似杏黄扁李夏李春李冬李廣志琳國多生玉葉李五千嵗一熟韓終常食之亦名韓終李洞賔記魏文帝安陽殿前天降朱李八枚今安陽李大而甘者即其種也房陵朱仲有李園三十六所林陵有金李其大者為夏李尤小者為䑕李述異記東都嘉慶坊有李甚鮮故稱嘉慶李今人但言嘉慶子西京記長靈安丘生病篤弟子沙都來省之共坐庭樹下見雙朱李著枯皮自墮掌中安食之所苦除盡髙士傳崔奉國家一種李肉厚而無核識者曰天罰乖龍割其耳耳血墮地故生此李琴莊美事西王母居龍月城城中産黄中李花實上皆有黄中二字王母惜之過於蟠桃集真記王母遺帝上清玉文之李黄帝内傳集仙李縹而神李紅李果賦中山之縹李陸士衡賦房陵湘李王廣賦接朱李於黄泉庾𤣥黙賦朱李零於桂囿張載𤓰賦沈朱李於寒冰魏文帝與吳質書李下不整冠占樂府種别分類或朱或黄𫝊𤣥記色潤房陵縹味奪寒水朱沈約朱李沈不冷杜詩冰盤夏薦碧實脆韓集本朝青李扶疎禽自來東坡道傍多苦李山谷柰史王祥後母不慈庭有丹柰結實使守視之祥晝則驅鳥雀夜則驚䑕時雨忽至祥抱樹至曙本傳楊愔家甚隆盛庭前有柰樹實落地羣兒皆争之愔巋然獨坐其季父偉見之大用嗟異北史傳記上林苑有白㮏紫㮏綠㮏西京雜記㮏有白赤青三種張掖有白㮏酒泉有赤㮏廣記摘圜丘之紫㮏漢武故事㮏油𢷬㮏實也㮏脯切㮏曝乾之如脯也釋名夏祠用白㮏秋祠用赤㮏盧諶祭法太始二年嘉㮏一蔕十五實生於酒泉起居注崑崙山上有㮏須玉井之水洗之方可食拾遺記有紫㮏大如升甜如蜜洞賔記東華夫人設𤣥洲白㮏廣記白㮏出涼州大如兔頭脂衣㮏其汁可染著衣不可浣雜爼貞觀中有於黄河上拾得一樹栽子歸蒔之三年乃結子進之號曰朱㮏僉載河州靈岩寺每七月十五日溪穴流出聖㮏大如盞洽聞記承光寺㮏味冠京師伽藍記華陽雷平山地美可種㮏所謂福卿之㮏以除災異類要集素㮏夏成左思賦二㮏耀丹白之色潘安仁賦投素㮏於清渠潘岳賦𤓰州素㮏張載經輕籠熟㮏香杜詩林檎傳記黒琴似赤㮏廣志林檎亦名黒琴林檎果實可佳比榅桲榅桲果名實微大其狀醜其味香輔關有之江淮南少述真記華林園有林檎十二株晉宫闕記永徽中王方於河灘上拾得一小樹栽埋之及長乃林檎也王懼得之獻於髙宗又為朱㮏又名五色林檎洽聞記張李二公相與學道李思仕宦而歸奉使至揚州遇張子張邀李備珍膳命妓女五人中有持筝者酷似李妻張以林檎繫裙帶上然後使去張已得仙矣廣記僧問靈雲如何是西來意師曰井底種林檎傳燈錄王内史書帖子與蜀郡太守書求櫻桃來禽來禽言味甘來衆禽也俗作林檎尚書故事集枇杷林檎帶谷映渚謝靈運賦本朝東坡先生未歸時自種來禽與青李東坡泥塗無去馬夏木有來禽后山粲粲來禽已著花芳根誰徙向天涯好尋青李相遮映風味應同逸少家劉屏山枇杷史建中元年詔山南之枇杷江南之柑橘嵗為次第貢者取一次以供廟饗唐書傳記孟夏祭用枇杷范注祠制枇杷葉似栗子似葯四月熟風土記南安縣出好枇杷南中八郡志宜都出大枇杷荆州土地記華山講堂西頭有枇杷園華山記枇杷冬華實黄大如鷄子小者如杏味甜酢四月熟出犍為廣記黎舉常言楊梅枇杷幸為執友金城賦集盧橘夏熟上林賦今人主不思甘露醴泉而患枇杷荔枝之腐亦鄙仲長統昌言枇杷寒暑無變負雪揚華余植之庭圃遂賦之云名同音器質異真松四序一采素華冬馥周祗賦盧橘為秦樹李白枇杷樹樹香杜詩夏首薦枇杷栁集本朝東坡詩云廬橘楊梅常帶酸張嘉甫問曰盧橘何種果類曰枇杷是也事見相如賦嘉甫曰盧橘夏熟黄柑橙榛枇杷橪柿亭柰厚朴不應四句重用應劭注曰伊尹書曰箕山之書青鳥之所有盧橘常夏熟不據依何也東坡曰意不欲耳冷齋夜話枇杷已熟燦金珠坡詩萬斛金丸綴樹稠遺根漢苑識風流也知不作清明瑞朽腐聊關聖主憂劉屏山大葉聳長耳一稍堪滿盤荔枝分與核金橘却無酸雨壓低枝重漿流冰齒寒長卿今在否莫遣作園官誠齋柿傳記俗謂柿有七絶一夀二多隂三無鳥窠四無蟲蠧五霜葉可翫六嘉實七落葉肥大雜爼柿有小者如小杏廣志孟冬祭用柿范注祠制集宛中朱柿王逸賦梁侯烏椑之柿潘岳賦故並丹柿王廙賦鴻柿若𤓰七疑勅㫖垂賜華林園柿出自神苑滋味絶劉義恭啓然雲燒樹大實駢金鳥下啄赬虬卵韓集本朝韓退之青龍寺詩終篇言赤色莫曉其故嘗見小說鄭䖍寓青龍寺無紙取柿葉書九月柿葉赤而實紅則退之詩乃謂此也東坡唐鄧間多大柿初生澁堅實如石凡百十柿以一櫨桲久放則紅熟爛如泥而可食土人謂之烘柿者非用火乃用此爾歸田錄秋林黄葉晩霜嚴熟蔕甘香味獨兼火傘赬虬浪褒拂風標却似邑中黔劉屏山椑傳記梁侯園有烏椑八稜大如酒盞地理志宜都出大椑荆州記孟冬祭用椑范注祠制集椑柿披實於長浦謝靈運賦後園樹烏椑潘岳賦梨史淮北滎南河濟之間千樹梨其人皆與千户侯等漢書孔融與諸兄食梨取小者人問其故曰小兒法當取小者後漢真定郡梨大如拳甘若蜜脆若菱魏文帝詔王𤣥謨征滑臺一疋布買民八百大梨張敷小名楂父邵小名梨文帝常戲謂之曰查何如梨楂曰梨百果之宗查何敢比之宋書扶桑國有赤梨經年不壊崔逺文才清麗風神峻整當時目為飣坐梨言為席上之珍齊書傳記梨山摛爾雅洞庭之中其木多梨山海經常山好梨盧毓論上林有紫梨芳梨青梨大谷梨金柯梨縹蔕梨紫條梨瀚海梨玉梨西京雜記洛陽北邙張公夏梨海内唯有一樹常山真定梨山陽鉅野梨梁園睢陽梨齊郡臨淄梨鉅野棠梨上黨楟梨小而甘新豐箭谷梨關以西𢎞農京兆右扶風界谷中梨多供御廣都梨重陸斤可數人分食之廣志漢武帝園一名樊川一名禦宿有大梨如升落地則破取者以布囊盛之名含消梨三秦記吕光時燉煌太守宋歆獻同心梨凉州記青田村民家多種梨樹名曰官梨恒以供獻名為御梨梨實落至地即融釋永嘉記塗山之北有梨大如斗千年一花食者身輕亦曰紫輕梨洞㝠記東方有樹曰梨其子徑三尺食之為地仙神異經宋廢帝太始年江南盛傳種蕭梨先無此樹百姓争欲植之識者曰當有姓蕭人王者後齊受禪廣五行記歡農里報德寺有含消梨世云報德之梨洛陽伽藍記老子西遊省太真王母共食紫梨關令尹内傳陜州深岩中有梨樹一株相傳云貞觀初有鳯上此樹其後結實尤大諸果之王也因號鳯栖梨洛中記異九成宫有梨上有爪甲迹號曰一搯梨金柯梨出琅琊王野家洽聞記桓南仲每見人不快輒嗔云君得哀家梨復蒸食否舊說稜陵有哀仲家梨入口消釋言愚人不别好梨蒸食之世說唐肅宗嘗夜坐召穎王等三弟同坐地爐時李泌多絶粒上自燒二梨以賜之穎王等曰臣等請聨句以為他年故事穎王曰先生年幾許顔色似童兒信王曰夜抱九僊骨朝披一品衣穎王曰不食千鍾粟唯餐兩顆梨上曰天生此間氣助我化無為鄴侯家傳王公達尚夀春公主聞真定有紫花梨就加封檢洎秋實公主必親選而進之耳目記李建勲出鎮豫章遊西山田間茅舍有老叟教授村童公觴于其廬連食數梨賔僚有曰五臓刀斧不宜多食叟笑曰鶡冠子云五臓刀斧乃離别之離非梨也蓋離别戕伐胷懐有若刀斧耳東軒錄集紫梨津潤左思賦果則昫山之梨齊都賦張公大谷之梨潘岳賦茂林列芳梨金谷園賦紫梨甜脆孫楚賦梨則大谷冬紫張公秋黄王廙賦山盤薦霜梨紅梨逈得霜張梨不外求山梨結小紅李白霜亦染梨腮韓集紫實已含津梁宣帝本朝嗟予久苦相如渇却憶冰梨慰齒寒六一集勸君莫食金花梨勸君須食紅消梨金花紅消兩般梨一般顔色如胭脂紅消食之甘如飴金花食之先皺眉似此誤人多少事未食之前寧辨之康節霜降紅梨熟柔柯已不勝未嘗蠲夏渇唯見助冬冰東坡丹腮曉露香猶薄玉齒寒冰嚼欲無舊有嘉名傳大谷誰分靈種下仙都劉屏山珍實渾疑露結成香葩况是雪儲精乍驚磊落堆盤出旋剖輕盈照骨明盧橘謾勞除夏熱柘漿未許析朝酲啖餘更檢桐君錄快果知非浪得名朱文公柤傳記柤似棃說文箕山之東有甘柤吕氏春秋平丘有楊栁甘柤洞庭之山其木多柤山海經南方大荒有樹曰柤三千嵗作花九千嵗作實長九尺無核割之如凝蜜神異經江淮南人至北見榅桲香以為柤子蓋實異之耳述異記集甘柤引於崑山傅𤣥賦橄欖傳記有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹金樓子橄欖澁酢廣州記如大鷄子交州以飲酒廣志橄欖子大如棗二月華八九月熟生食味酢蜜藏乃甜美交趾武平與古九真有之南州草木狀橄欖閩中尤重云咀之香口勝含鷄舌香解酒毒樹峻不可梯但刻其根下方寸許内鹽其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之和其皮葉煎如黒餳謂之橄欖糖嶺表錄異本朝江南多果實橄欖稱珍竒北人將就酒食之先顰眉皮核苦且澁歴口復棄遺良久有迴味始覺甘如飴我今何所喻喻彼忠臣辭直道逆君耳斥退投天涯世亂思其言噬臍焉能追寄與采詩者無輕橄欖詞王黄州五行居四時維火盛南訛炎焦凌木氣橄欖得之多酸苦不相入初争久方和霜苞入中洲萬里來江波幸登君子席得與衆果羅六一集紛紛青子落紅鹽正味森森苦且嚴待得餘甘還齒頰已輸崖蜜十分甜東坡青膚鏤瓊瑩翠顆森菡萏苦為幽人貞久見君子淡甘壊彼包羞日新此剛敢清泉薦芳茗具味獨潛感澡雪清煩酲滌隂瑩𤣥覽劉貢父想共餘甘有𤓰葛苦中真味晩方囘山谷餘甘傳記髙涼安寧縣有餘甘吳錄瀘水南岸有餘甘子樹色微黄味酸苦核有五稜雲南記餘甘如彈丸大視之理如定陶𤓰片初入口如苦忽咽中乃更甜美鹽而蒸之尤美可多食之異物志朱崖果有餘甘朱崖故事菴摩勒餘甘子也本草芳馥餘甘註云餘甘子出廣州四方多菴摩勒果也佛書集其果則丹橘餘甘荔枝之林左吳都賦本朝方懐味諫軒中果注云戎州蔡次律家軒外有餘甘余名之曰味諫山谷石榴史晉安帝時武陵臨沅獻安石榴一蔕六實沈約宋書元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏宋書齊安德王延宗納李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前帝以問祖收收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜北史傳記若榴石榴也廣雅石虎苑中有安石榴子大如盌盞其味不酸鄴中記張騫使西域還得安石榴種博物志安石榴有甜酢二種廣志石榴一名丹若石榴甜者謂之天漿能已丹石毒雜爼白馬寺浮屠前柰林蒲桃異於他處京師語曰白馬甜榴一實直牛洛陽伽藍記劉馮學道於樓丘子常服中岳石榴神仙傳崔𤣥徽常遇數美人其一曰石阿措即石榴也小說李漢碎胡碼瑙盤盛送王莒曰安石榴莒見之不疑旣食乃覺之揚州事迹集若榴競裂蜀都賦接翠萼於綠蔕冐紅牙於丹鬚赩然含㽔璀爾散珠夏侯孝賦味滋芳柚色耀瓊蘂若榴者天下之竒樹九州之名果也遥而望之煥若隋珠耀重淵詳而察之灼若列宿出雲間千房同模十子如一御饑療渇解酲止醉天迴節移龍火西没流風晨激含露朝白紫房獨熟赬膚自拆剖之則珠散含之則水釋充嘉味於庖籠極酸甜之滋味上薦清廟之重下羞玉堂之客金谷石榴木滋之最膚如凝脂汁如清瀨渇者所思銘之衣帶潘岳賦乃剖乃析金房緗隔張協賦或珠離於璇椀或玉碎於雕觴璘彬洒映曄紫嬰緗璀若瑶英之攅巘粲若靈蚌之含珠股安元賦惟木之珍莫美石榴擢鮮葩於青春結芳實於素秋徐澡妻賦庭榴剖朱實江總潛苞絳實拆韓集流霞包染紫鸎粟黄蠟紙裹紅瓠房皮日休本朝秋雷石罌破曉日丹砂爛梅聖俞晴林紫榴析六一集試剖紫金椀滿堆紅玉珠鄭獬庭榴結實墊芳叢一夜飛霜染茜容萬子同包無異質金房玉隔謾重重劉屏山深著紅藍染暑裳琢成文玳敵秋霜半含笑裏清冰齒忽綻吟邊古錦囊霧縠作房珠作骨水晶為醴玉為漿誠齋楊桃傳記雲母山多白雀素質凝映三亷五距注云三亷果名晉安謂之楊桃也南越志楊桃似南方橄欖子其味甜常五月十月熟諺言楊桃無蹙一嵗三熟楊桃子生晉安侯官縣實大三寸可蜜藏之臨海異物志橘經厥包橘柚錫貢書橘踰淮而北為枳周禮子夫橘樹之江北化而為橙淮南子史江陵千樹橘其人皆與千戸侯等漢書亷范為成都太守部人楊由善占候嘗有風吹削哺曰當有薦木實者其色黄赤頃之五官椽獻橘數包後漢書陸績年六嵗見袁術術出橘績懐三枚拜而墮地術謂曰陸郎作賓客而懐橘乎績曰欲歸遺母術大竒之吳志虞愿始數嵗家中橘樹冬熟諸兒競求取之愿獨不取家人皆異之南史傳記北山有菜橘柚所聚荷囊載畚盈我筐筥焦贑易林璇樞星散為橘運斗樞洞庭之山其木多橘山海經吳山饋魏文帝大橘魏文帝詔羣臣曰南方有橘酢正裂人牙時甜耳魏文帝詔咸和六年庾亮有橘十二實共同一柢以為瑞異百官畢賀建武故事王僧辯獻嘉蔕二十子於湘東王王國典畧晏子使楚楚王遺橘置削晏子并食不割王曰橘當去割對曰臣聞之賜人主前者瓜桃不削橘柚不割今者萬乗無教故不敢割臣非不知也晏子春秋甘橘大釐城有之其味甚酸穹有橘大如覆杯南夷志羅浮山有橘夏熟實大如李廣州記橘為樹白花而赤實皮旣馨香又有善味交趾有橘置長官主嵗貢御橘異物志宣城秦精入武昌山中採茗忽見一人身長一丈通體皆毛探懐中二十枚橘與精甘美異常續搜神記越中有王氏橘園述異記巴卭人橘樹有二大橘如三四斗盎剖開每橘有二叟相對象棋一叟曰橘中之樂不減商山但不得深根固蔕為遊人摘下耳幽怪錄李衡作宅種橘千枝敕其子曰吾有千頭木奴可以不貧襄陽耆舊傳江陵進乳甘橘上種於蓬萊宫結一合歡實上與妃子持翫曰此果似知人意楊妃外傳王母遺黄帝以崑山交枝萬年之橘黄帝外傳右軍帖云奉橘三百顆霜未降未可多得故韋蘇州詩云書後欲題三百顆洞庭猶待滿林霜詩話集后皇嘉樹橘來服兮受命不遷生南國兮深固難徙更壹志兮綠葉素榮紛其可喜兮層枝剡棘圓果摶兮青黄雜糅文章爛兮精色内白類任道兮紛緼宜脩姱而不醜兮楚辭橘柚芬芳子虛賦播萬里而遥望列銅雀之園亭背江川之暖氣處𤣥朔之肅清曹植賦屈平見朱橘而申貞臣之志傅𤣥賦戸有橘柚之園左思賦橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾古詩碧葉獨潤金衣更鮮李徳裕賦天寒橘柚垂嘗聞蓬萊殿羅列瀟湘姿此物嵗不稔玉食失光輝應訝耽湖橘此郊千樹橘不見比封君朱橘不論錢杜詩橘柚懐真質受命此炎方栁集本朝陸吉隠於蕭山楚王召之封洞庭春陸吉曰齊楚約西擊秦吾引兵踰關身犯霜露與枳棘最下者同甘苦率家奴千人戰甘洲之上拓地至漢南而歸子功孰與甘曰不如也吉曰神農氏之有天下也吾剝膚刻肝怡顔下氣以固蔕之術獻上上喜之命記注官陶洪景狀其方畧以付國史出為九江守宣上徳澤使兒童亦懐之子才孰與甘曰不如也吉之子為下邳侯以美湯藥官至陳謝治中東坡陸吉傳洲中奴長足為生鳯室堂前野橘香坡詩柑史張盤為廬江太守潯陽令嘗餉一奩柑其小兒就取一枚盤奪取付外卒以兩枚與之盤奪兒柑鞭卒曰何故行賄於吾子謝承後漢彭城王義康時四方獻饋皆以上品獻義康而以次者供御上嘗啖柑嘆其味並劣義康在坐曰今年柑殊有佳者遣人還東府取柑大三寸宋書羅浮柑子開元始有山僧種於南樓寺其後嘗資進獻幸蜀幸奉天之嵗皆不結實初開元末江陵進乳柑橘上以十枚種蓬萊宫至天寶十年結實上宣示羣臣曰朕近於宫内種柑子數株今秋結實乃與江南所進無別宰臣賀曰雨露所均混天區而齊被草木有性慿地氣以潛通故得兹江外之珍果為宫中之華實荆州進黄柑帝以紫幅包賜蕭嵩唐書傳記柑橘有黄者有赬者赬者謂之壺柑風土記柑有二十一核有成都平蔕柑大如升又犍為南安縣出黄柑唐宣宗嘗賜軒轅集柑子曰臣山下有者味愈於此遂取御前碧玉甌以寶盤覆之俄而徹盤柑子至矣芬馥滿殿廣記東方朔云東南外有建春山其山多美柑樹神異經冬祠用柑盧諶祭法枝江有名柑宜都郡舊江北有其園名宜都柑荆州記柑實形如石榴者謂壺柑也真柑一名乳唯泥山為最生枝柑鄉人以其耐久留之枝間俟其味變柑帶葉而拆故名生枝柑橘錄李衡於武陵龍陽洲上種柑千樹臨死敕兒曰吾州里有千頭木奴不責汝衣食嵗征一疋絹亦足用矣及柑成嵗得絹四十疋襄陽記集披黄苞以授柑潘安仁賦厥包橘柚精者曰柑郭璞賛煌煌嘉實磊如景星南金其色隨候厥形宗炳頌在南稱柑渡北則橙文選甜逾萍實冷亞冰壺劉孝儀啓名傳地里逺自武陵之淵族茂神經遥聞建春之嶺王逸為賦取對荔枝張衡製詞用連石蜜庾肩吾登爼黄柑重破柑霜落爪白露團柑子岑寂雙柑樹娑婆一院香園柑長成時三寸如黄金諸侯舊上計厥貢傾千林春日清江岸千柑二頃園青雲羞葉宻白雪避花繁結子隨邊使開筒近至尊後於桃李熟終得獻金門杜詩手種黄柑三百株春來新葉徧城隅方同楚客憐皇樹不學荆州利木奴數嵗開花聞噴雪何時摘實見垂珠若教不待成林後滋味還堪養老夫栁集本朝安定郡王以黄柑釀酒名曰洞庭春色黄柑隠於泥山楚王聞其名遣使召之拜温尹平陽侯甘謂陸吉曰每嵗太守勸駕乗傳入金門上玉堂與虞荔甲棖梅福棗嵩之徒列侍上前使數子者口呿舌縮不復上齒牙間更封甘子為穰侯東坡傳一雙羅帕未分珍林下先嘗愧逐臣雲葉霜枝剪寒碧金盤玉指破芳辛清泉潄潄先流齒香霧霏霏故噀人坐客慇勤為收子千枝盈掬為吾貧歸來一㸃殘燈在猶有傳柑遺細君燕南異事真堪記三寸黄柑擘永嘉侍史傳柑玉座傍人間草木盡天漿坡詩君家秋實羅浮種已作累累半拂牆假作肅霜金弄色匀添寒日與争黄色深林表風霜下香著樽前指爪間山谷橙子夫橘樹之淮北化而為橙淮南子傳記橙橘屬也說文橙皮可為醬虀風俗通橙橘屬也而葉正圓風土記成都廣都郫新繁江源臨卭六縣生給橙夏秋冬或華或實大如櫻桃小者或如彈丸或有年華實竟嵗博物志橙子木有刺香氣馥馥可以薫袖可以芼鮮可以漬蜜真佳實也橘錄黎舉常欲令橙子臣櫻桃但恨時不同金城記集穰橙鄧橘蜀都賦在南稱柑渡北則橙文選襄隂大橙胡道安賦細雨更移橙霜橙壓香橘杜詩鵠殻攅瓌韓文本朝嘉樹團團俯可攀壓枝秋實漸斕斑朱欄碧瓦青霜曉粲粲繁星綠葉間六一集一年好景君須記正是橙黄橘綠時西風初作十分涼喜見新橙透甲香金橙縱復里人知不見鱸魚價自低須是松江煙霧裏小盤燒薤𢷬香虀東坡柚經厥包橘柚錫貢書子吳越之間有木焉其名曰櫾碧樹而冬青實丹而味酸度淮北而化為枳焉列子傳記柚條也爾雅詩云有條有梅果之美者雲夢之柚吕氏春秋洞庭之山綸山銅山賈超之山其木多櫾山海經成都有柚大如升廣志廣州别有雷柚廣州記柚大橘也赤黄而酢風土記東方建春山外多柚神異經集紫葉𤣥實綠裏朱莖七蠲橘柚芬芳子虛賦枸櫞傳記枸櫞樹似橘如柚大而頗長味竒酢廣州記枸櫞大如飯筥皮不香味不美異物志枸櫞子形如瓜皮似橙而金色故人重之愛其香氣京輦豪貴家飣盤筵憐其逺方異果南中女工競取其肉雕鏤花鳥浸蜂蜜㸃以胭脂亦不讓湘中人鏤木瓜也嶺表錄異金橘本朝金橘産於江西都人初不識明道景祐初始與竹子俱至京師竹子味酸人不甚喜後遂不至而金橘香清味美置之樽爼間光彩灼爍如金彈丸誠珍果也都人初不甚貴後因温成皇后尤好食之由是價重京師歸田錄苑臣初摘置琱盤口敕宣恩賜近官氣味豈同淮枳辣皮膚不作楚梅酸參差翠葉藏珠琲錯落黄金鑄彈丸安得一株擎雨露畫圖傳與世人看李清臣霜枝摇落黄金彈山谷銀杏傳記唐鄭光讌飲把酒曰某改令身上取果子名云膍臍薛保遜還令云脚杏滿座大笑盧氏雜說本朝鴨脚生江南名實未相浮致逺有餘力好竒自賢侯因令江上根結實夷門秋始摘纔三四金奩獻凝旒公侯不及識天子百金酬嵗久子漸多纍纍枝上稠鵝毛贈千里所以重其人鴨脚雖百箇得之誠可珍六一集秋盤堆鴨脚后山鴨脚類緑李其名因葉髙今喜生都下薦酒壓蒲萄初聞帝苑誇又復主第褒纍纍誰採掇玉腕上金鼇梅聖俞蓮實史張承業權貴任事人皆脅肩低首候之唯馬郁以滑稽侮狎每賓僚宴集承業出異方珍果當郁前者食必盡承業私戒主膳者曰他日馬監至唯以乾藕子置前而已郁知不可啖異日鞾中置鐵鎚出以擊之承業大笑曰為公易饌勿敗吾桉五代後唐書傳記蓮荷實曰菂薂說文其實蓮其中菂菂中薏爾雅菂五月中生生噉脆至秋表皮黒菂成可食或可磨以為飯輕身益氣令人强健詩疏西王母進素蓮一房百子拾遺記宋元嘉十八年揚州刺史王濬州治後池有兩蓮駢生雙房分體泰始二年嘉蓮雙葩並實合跗同莖生豫州澧湖宋起居注周平齊齊幼主胡太后等並歸於長安初武成殂後有謡云千錢買果園中有芙蓉樹破劵不分明連子隨他去至是應焉三國典畧集綠房紫菂窟咤垂珠文選露冷蓮房墜粉紅杜池蓮折秋房韓集青房圓實齊戢戢張藉水中蓮子懐芳心温庭筠本朝蓮房前後熟供噉不須齊肉嫩山蜂子稜深天馬蹄尚連餘蘂在深映亂荷低脆美如新采近根猶帶泥司馬公半脫蓮房露壓欹綠荷深處有遊龜東坡蓮實大如指分甘念母慈共房頭􅋾􅋾更深兄弟思實中有幺荷拳如小兒手念我憶衆雛迎門索梨棗蓮心政自苦食苦何能甘甘飱恐腊毒素食則懐慙蓮生於泥中不與泥同調食蓮誰不甘知味良獨少吾家雙井塘十里秋風香安得同袍子歸製芙蓉裳美物有嘉實翦房助加籩欲煩春笋手且為剝蓮蓬山谷藕史蘇州進藕其最上者名傷荷藕或云荷名或云葉甘為蟲所傷或云故傷其葉以長其根近多重臺荷蓋蓮實中又生花亦甚異也唐書傳記荷美芙蕖其根藕荷根也一曰蔤乃莖下白蒻在泥中者說文碧藕白橘皆神仙之物廣記西王母進千年碧藕拾遺記碧衣女子詠云藕隠玲瓏玉樹萱錄集秋藕折輕絲謝朓踏藕野池中佳人雪藕絲杜詩太華峰頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沈痾痊韓集紅藕香中萬㸃珠不知淮水濁丹藕為誰開魚尾迸圓沙千珠落相藕温庭筠本朝平生冰雪姿七星羅心胷豈無有絲毫上禆天子聰而不自薦達胡為乎泥中沈痾正無賴安得若從容其子亦可憐風味如乃翁胡致隆荷衣芰製雪為容家住雲煙太華峯外面看來真璞玉胷中琱出許玲瓏楊誠齋菱芰同經加籩之實菱芡㮚脯周禮子楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食菱飲水枕塊而死淮南子史魚𢎞為湘東王鎮西司馬述職西上道中乏食緣路采菱作菱飯給所部梁書傳記菱厥樚注云今水中芰也爾雅鉅野菱尚書大傳䔖菱也說文淮漢以南凶年以菱為蔬廣志孟秋之祭菱芡范注祠制綏寧縣元龜淵中出菱甚為甘㫖羅浮山記𤣥都觀有翠水水有菱狀如飛鷄謂之飛鷄菱㓊㝠記屈到嗜菱有疾召其宗老而屬之曰祭我必芰及祥宗老將薦芰屈建命去之曰夫子不以私欲干國之典也國語漢武帝穿池有倒生菱莖如亂絲一花千葉根浮水上實沈泥如紫色謂之紫泥菱拾遺錄芰一名水粟一名薢茩漢武昆明池中有無根菱亦曰青水芰𤣥都有菱碧色狀如鷄飛名翻鷄芰今人但言菱芰諸解草木書亦不分别唯伍安貧武陵記言四角三角曰菱今蘇州折要菱多兩角荆州有僧遺段成式一斗郢城菱三角而無傷可以挼莎雜爼集夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜嘆巧言之亂徳仲尼惡紫之奪朱林恕篤論加籩之品菱芡存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝旣毁就養無方之禮又失奉死如生之義奪乎素欲建何忍焉孫楚論屈建其沃羸則有綠菱紅蓮左思賦採菱花而結辭曹植九愁忽忘食而宵歸詠採菱以叩舷郭璞江賦紫菱生軟角庾信水果剝菱芡採菱寒刺上杜詩菱葉亂穿萍菱翻紫角利韓集朶頥進芰實栁集白馬湖平秋日光紫菱如錦綵鸞翔盪舟遊女滿中央采菱不顧馬上郎劉夢得本朝烏菱白芡不論錢亂絲素菰滿綠盤東坡幸自江湖可避人懐珠隠玉冷無塵何須抵死露頭角荇葉荷花老此身柄似蟾蜍股様肥葉如蝴蝶翼相差蟾蜍翹立蝴蝶起便是菱花著子時鷄頭吾弟藕吾兄頭角嶄然也不争白璧中藏煙水晦紅裳左袒雪花明一生子木非知己千載靈均是主盟每到炎官張火傘西山未當聖之清楊誠齋芡鷄頭同經加籩之實菱芡㮚脯周禮子鷄頭已瘻注云瘻頸腫疾也鷄頭水中草幽州謂之鴈頭淮南子傳記芡鷄頭也葉圓而大葉上蹙衂如沸實有芒刺其裏如味可以療饑止渇古今注鷄頭一名鴈實生雷澤本草經䓈芡鷄頭也北燕謂之䓈青徐淮泗之間謂之芡方言南楚江湘之間謂之鷄頭或謂之鴈頭廣雅集鴻頭刺芡實平池散芡盤風能折炎水韓集繡頸金鬚蕩倒光團圓皺綠鷄頭葉温庭筠本朝六月京師暑雨多夜夜南風吹芡觜凝祥池鎖會靈園僕射荒陂安可擬争先園客採新苞剖蚌得珠從海底都城百物貴新鮮厥價難酬與珠比金盤磊落何所為滑臺潑醅如玉醴六一集樓中煮酒初嘗芡東坡蝟毛蒼蒼磔不死銅盤矗矗釘頭生吳鷄鬬罷絳幘碎海蚌扶出真珠明梅聖俞芡葉初生皺如縠南風吹開輪脫輻紫苞青刺攅蝟毛水面放花波底熟森然赤手初莫近誰料明珠藏滿腹子由剖蚌煮鴻頭剝芡珠走盤明珠論斗煮鷄頭千頭剖蚌明珠熟山谷龍宫失曉惱江妃也養鳴鷄報早暉要啄稻梁無半粒只敎滿頷飽珠璣江妃有訣煮真珠菰飯牛酥軟不如手擘鷄腮金五色盤傾驪頷琲千餘夜光明月供朝嚼水府靈宫恐久虛好與藍田飱玉法編餘辟穀赤松書楊誠齋茨菰傳記烏芋一名藉姑本草注云一名茨菰日華子云又名燕尾草及烏芋本草注集菰葉風翻綠翦刀白樂天鳬茈史王莽末南方饑饉民庶羣入野澤掘鳬茈而食之後漢書傳記芍鳬茈也爾雅瓜經以把包瓜易七月食瓜緜緜瓜瓞詩為天子削瓜者副之巾以絺為國君華之巾以綌為大夫累之士㚄之庶人齕之禮齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代左傳子五原蔡誕入山而還欺家人云至崑崙山有玉瓜其形如世間瓜但為光明洞徹而堅須以玉井水洗之便軟而可食枹朴子史邵平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜史記燉煌古瓜州地生美瓜漢書施延家貧母老嘗役力供養種瓜自給後漢書安帝元初三年有瓜異本共生一瓜蔕續漢書建和二年河東瓜兩本共蔕袁崧後漢書步隲避難江東與衛旌同年相善俱以種瓜自給晝勤四體夜誦經傳吳志咸寧二年嘉瓜同蔕生於成都桑虞有園宅北數里瓜果初熟有人踰園偷之虞以園多荆棘乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盜瓜叩頭請罪歡然盡以瓜與之晉書郭原平種瓜大觀七年大旱瓜賣不復通船縣令劉僧秀下水與之原平曰豈可減漑田之水以通運瓜之船乃涉他道往錢塘貨賣齊書王羆性儉率嘗有客與羆食瓜客削瓜侵膚稍厚及瓜皮落地羆引手取而食之客甚有愧色後周書宋瓊以孝稱母曾病季秋月思瓜瓊夢想見之求而遂獲時人異之北史貞元四年右神䇿軍獻瑞瓜三蔓合為一蔕而生三瓜德宗幸梁道有獻瓜果者帝欲授以職官陸贄曰爵位不可輕也今獻瓜一器果一盛則授之彼忘軀命者何勸哉元稹倚宦官知制誥武儒衡鄙厭之會食瓜蠅集其上儒衡揮以扇曰適從何來遽集於此一座皆失色唐書傳記瓞瓝其紹瓞注云俗呼瓝瓜為瓞紹者瓜蔓緒亦著子但小如瓝耳爾雅五月乃瓜乃者治瓜之辭也瓜者始食瓜八月剝瓜蓄瓜時也大戴禮瓜之所出以遼東廬江燉煌之種為美有鳥瓜狸頭瓜蜜筩瓜女臂瓜龍蹄瓜羊髓瓜又有魚瓜大瓜如斛出涼州陽城有青登瓜大如三升斗有桂枝瓜長二尺餘蜀地食瓜冬至熟有春日瓜細小小辦宜藏正月種三月成有秋泉瓜秋種十月熟形如羊角色蒼黒廣志龍肝瓜長一尺花紅葉素生於冰谷素葉之瓜洞㝠記吳相王時會稽生五色瓜今吳有五色瓜嵗充貢獻述異記曽子耘瓜而誤斫其根曽晳怒以大杖擊其背曽子仆地有頃乃蘇孔子聞之告門弟子曰參來勿内也曾子使人請孔子孔子曰舜之事瞽瞍小杖則受大杖則走參委身以待暴怒身死而陷父於不義不孝孰大焉家語昔梁大夫宋就為邊縣令與楚隣界梁亭楚亭皆種瓜梁亭數灌其瓜美楚亭稀灌其瓜惡楚令怒因往夜竊搔梁瓜梁亭欲就搔楚瓜宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其瓜瓜日以美楚亭察之則梁亭之為也楚令以聞楚王楚王聞之恱乃謝以重幣而友於梁王賈誼新書孫鍾種瓜為業有三人來乞瓜鍾設瓜及飯詳見伎術部風水類韓靈敏早䘮父其兄靈珍至孝母亡家貧無以葬與靈珍種瓜靈敏朝採暮還復生葬事由此舉沈約齊記西王母謂上元夫人曰後造朱炎山陵食靈瓜其味甚好比來已七千嵗矣仙之上藥有空同靈瓜四劫一實也漢武内傳集含金精之芳流冠種瓜而作珍投諸清流一浮一沈斫以金刀四剖三離承以雕盤幕以纎絺甘牟蜜房冷甚冰圭劉楨賦𤣥表丹裏呈素含紅豐敷外偉綠瓤内醲張載賦夫其種族頭數則栝樓定桃黄扁白榑金釵蜜筒小青大斑𤣥骭素腕狸首虎蹯東陵出於秦谷桂體起於巫山陸機賦摘虎掌拾黄斑落蔕離母漬以寒泉夏侯孝若賦瓜則桂枝栝樓綠瓤青肌消暑蕩暍解渇療饑王廙賦傾筐蒲鴿青滿眼顔色好沈浮亂冰玉愛惜如芝草落刃嚼冰霜開懐慰枯槁破瓜霜落刃瓜嚼水精寒杜詩瓜畦爛文貝韓詩本朝蘚井筠籠浸蒼玉金盤碧筯薦寒冰田中誰問不納履座上適來何處蠅山谷故人夙有瓜畦約走送筠籠百里間翠甒瓊罌纔一握極知風味勝黄斑柘漿溜溜香浮玉蘇水沈沈色弄金那似甘瓜能破暑一盤霜雪沍清襟劉屏山木瓜經投我以木瓜報之以瓊琚詩傳記楙木瓜爾雅魚復縣地多木樹瓜有子大如甒白黄實甚苦香爾雅之所謂楙也水經木瓜生夷陵吳氏本草虎丘山三面悉有木瓜虎丘山疏華林園有木瓜五株觀音閣記集惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有曜何承天賦本朝沈沈黛色濃糝糝金沙絢却笑宣州房競作紅粧面范至能天下宣城多木瓜日華露液繡成花何須堠子强呈界自有瓊琚先報衙楊誠齋甘蔗史顧愷之每食蔗自尾至本曰漸入佳境晉書宜都王鏗善射取甘蔗挿地百步射之十發十中齊書庾沙彌性至孝母劉氏好噉甘蔗及母亡沙彌遂不食焉梁書傳記藷蔗也說文交趾勾漏縣甘蔗大數寸其味醇美笮以為餳曝之凝如冰破如薄棊入口沙釋吳錄甘蔗其餳為石蜜廣志南方荒内􅦠􅀈林其髙百丈圍三丈促節多汁甜如蜜神異經孫亮使黄門就中藏吏取交州所獻甘蔗餳黄門以䑕矢投餳中啓言吏不謹亮呼吏曰此器旣蓋之且有油覆無緣有此也黄門將有恨汝耶叩頭曰常就臣求莞席不敢與亮曰必是此也即於廷前加髠鞭外付江表傳集有柘漿些楚辭諸柘巴苴諸柘甘蔗也出相如子虛賦挫斯柘而療渇若潄醴而含蜜清滋津於紫梨溜液豐於朱橘張梅賦都蔗雖甘杖之必折巧言雖美用之必滅曹植纖液玉津㫖於飴蜜李伯仁本朝甘蔗只生於南方北人嗜之而不可得魏太祖至彭城遣人於武陵王處求酒及甘蔗郭汾陽在汾上代宗賜甘蔗二十條子虛賦所賦諸柘者甘蔗也蓋相如指言楚雲夢之物漢郊祀歌泰尊柘漿亦謂取甘蔗汁以為飲蔗有四色曰杜蔗曰西蔗曰艻蔗本草所謂荻蔗也曰紅蔗本草所謂崑崙蔗也紅蔗止堪生啖艻蔗可作砂糖西蔗可作霜色淺土不甚貴杜蔗綠嫩味極厚專用作霜容齋隨筆瑶池宴罷王母還九芝飛入三仙山空餘絳節留人間雲封露洗無時閒節旄落盡何斕斑野翁提攜出茅管吳刀戛戛鳴雙環截斷寒水何潺潺舒亶記纂淵海卷九十二
