body:
  text: 記纂淵海卷五十三宋潘自牧撰識見部知人經知人則哲書晉人謂文子知人記樊遲問知子曰知人語子知莫難於知人家語知賢之謂明荀子君子不可欺以人吾洒然異之莊子聽之於未聞察之於未形而鑒其神智識其才能可謂識人若功成事遂然後知之者何異耳聞雷霆而稱為聰目見日月而謂之明乎劉子史子桑之忠也其知人也能舉善也孔子聞衛亂曰柴也其來由也死矣左鮑叔進管仲以身下之天下不多管仲之賢而多鮑叔能知人也史本傳上問丙吉誰可自代曰杜延年于定國陳萬年後居位皆稱職上稱為知人西漢本傳第五倫舉人多至二千石世以為知人後漢呉季英祐有知人之明東漢本傳司馬徽清雅有知人之鑒龎德公嘗謂德操司馬徽也為氷鑑通鑑泰性明知人獎訓士類天下咸稱許郭之鑒荀淑遇黄憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰吾之師表也東漢司馬徽曰龎士元非百里之才使處治中别駕之任當展其驥足諸葛亮曰蔣琬社稷之器非百里之才也蜀志周弼見裴頠嘆曰若武庫五兵縱横一時之傑王戎有人倫見識王導少有風鑒識量清逺年十四髙士張公見而竒之謂其從兄敦曰此兒容貌志氣宰相之器也謝安弱冠詣王濛清言既去濛曰此子亹亹逼人時太尉郄鑒使門生求女婿於王導令就東廂徧觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹食獨若不聞鑒曰此正佳婿也訪之乃羲之也王羲之年十二周顗異之時重牛心炙坐客未噉顗先割噉羲之羲之由是知名晉書仁傑所薦進若張柬之桓彦範敬暉姚崇等皆為中興名臣唐書則天問狄仁傑思得竒才用之仁傑曰荆州長史張柬之其人雖老真宰相才也續世説李邕文名天下盧藏用曰邕如干將莫邪難與爭鋒但虞傷缺耳獨孤信見孫思邈曰器大難為用耳席豫拔寒逺士多至臺閣當時推知人王起典貢舉貢舉皆知名者人服其鑒賈餗三典貢舉多得名卿宰相唐書集明月山濤鑒杜詩夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也韓文本朝王沂公作有物混成賦識者知其決為宰相晏元獻為相求婿於范文正文正曰公女必求國士無如富弼者聞見録歐公知潁州吕公著為通判為人有賢行而深自晦黙時人未甚知公後還朝力薦之遺事知音經審聲以知音審音以知樂記子孔子在衞昧旦晨興顔回侍側聞哭者之聲甚哀子曰回汝知此哭何者曰此哭之聲非但為死者而已矣又為生離别者子曰何以知之對曰囘聞恒山之鳥生四子焉羽翼既成將分乎四海其母悲鳴而送之哀聲有似於此為其往而不返囘竊以音類知之孔子使問哭者果曰夫死家貧賣子葬之與之長訣子曰囘善於識音矣家語伯牙善鼓琴鍾子期善聽伯牙鼓琴志在髙山子期曰善哉峩峩乎若太山志在流水子期曰善哉洋洋乎若江河伯牙所念子期必得之列子子㳺汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子史晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功伯石始生姑視之聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣左孔子學鼔琴於師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰有所穆然深思焉有所睪然髙望而逺志焉曰丘得其為人黯然而黒頎然而長眼如望羊心如王四國非文王其誰能為此也師襄子辟席再拜曰師盖云文王操也史孔子世家蔡邕有以酒食召者客有彈琴於屏邕至門潛聽之曰以樂召我而有殺心何也遂返主追問其故邕具以告彈琴者曰我向見螳螂方向鳴蟬將去而未飛螳螂為之一前一卻吾心聳然唯恐螳螂之失蟬此豈為殺心而形於聲乎邕嘆曰此足以當之矣東漢蔡邕夜鼓琴絃絶琰曰第二絃邕曰偶得之矣故斷一絃問之琰曰第四絃後漢本傳周瑜少精意於音樂三爵之後其有闕誤瑜必知之知之必顧時人謡曰曲有誤周郎顧呉志開皇十四年詔行新樂萬寳常聽太常所奏泫然泣曰樂聲淫厲而哀天下不久將盡時四海全盛皆謂不然大業之末其言卒驗通鑑韓滉知音律甞觀彈琴至止息歎曰妙哉嵇生之為是曲也其當晉魏之際乎其音主商商為秋秋者摇落肅殺其嵗之晏乎又晉乘金運商金聲此所以知魏之季而晉將代也慢其商絃與宫同音是臣奪君之義也所以知司馬氏之將簒也季瑀常早朝過永興里聞笛音顧左右曰是太常工乎曰然他日識之曰何故臥吹笛工驚謝又聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絃大絲也樂家以自下逆鼓曰琵自上順鼓曰琶云唐書荀朂於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣下郡國悉送牛鐸果得調者晉書傳記孔子鼓瑟曽子聽曰夫子瑟聲有貪狠之志邪僻之行何其不仁趨利之甚子貢入以告子曰參天下賢人也其習知音矣向者丘鼓瑟有䑕出逰狸見屬屋循梁獲而不得丘以瑟為其音參以丘為貪狠邪僻不亦宜乎韓詩外傳吴人有燒桐以爨者蔡邕聞其爆聲曰此良桐也因請之削以為琴捜神記于頔令客彈琴其嫂知音曰三分中一分筝聲二分琵琶全無琴韻國史補集識曲聽其真選古詩古調雖自愛今人多不彈向君投此曲所貴知音難劉長卿評論經子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣語子淮南説之用不如太史公之用也太史公聖人將有取焉乍出乍入淮南也文麗用寡長卿也多愛不忍子長也仲尼多愛愛義也子長多愛愛竒也法言君子篇史龍且口尚乳臭不能當韓信馮敬雖賢不能當灌嬰項它不能當曹參荀悦曰趙兵出國迎戰見可而進知難而退懐内顧之心無出死之計韓信軍孤在水上士卒必死無有二志此信之所以勝之也漢王深入敵國置酒髙㑹士卒逸豫戰心不固楚以强大之威而䘮其國都士卒皆有奮激之氣救敗赴亡之急以決一旦之命而漢以怠惰之卒應之此同事而異情也子房蕭何韓信三者皆人傑吾能用之此吾所以取天下也項羽有一范増而不能用此所以為我擒也通鑑晁錯鋭於為國逺慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗前漢本贊王貢之材優於龔鮑守死善道勝實蹈焉通鑑太丘長陳寔寔子鴻臚紀紀子司空羣羣子泰四世於漢魏三朝並有重名而其德漸少減時人為其語曰公慙卿卿慙長夫王肅亮直多聞能析薪哉劉實以為肅方於事上而好下佞已此一反也唯嗜榮貴而不求茍合此二反也吝惜財物而治身不穢此三反也三國志王㫤為魏司空開濟識度湛沖素簡淡器量隤然有公輔之望承清虛寡欲不飾文詞晉渡江名臣王導衛瓘周顗庾亮之徒皆出其下自㫤至承世有高名論者以為祖不及孫孫不及父晉書范隆曰吾嘗恥隨陸無武絳灌無文隨陸遇髙帝而不能建封侯之業絳灌遇文帝而不能興庠序之教通鑑張輔嘗著論以為管仲不如鮑叔班固不及司馬遷魏武不及劉備樂毅減於諸葛亮晉書崔浩曰王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓𤣥興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎胡藩言於裕曰公謂劉衛軍終能為公下乎裕黙然久之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅固以此服公至於涉獵傳記一談一咏自許以為雄豪公殆不如也隋髙孝基鑒賞機悟清謹絶倫然爽俊有餘迹似輕薄王通嘗稱無赦之國其刑必平重斂之國其財必窮通鑑或言李宻佀項羽非也羽興五年伯天下宻連兵数十百戰不能取東都自立亦不能鼓而西其亡冝也唐李宻贊昔晉武帝平呉之後志意驕怠何曽位極台司不能直諫乃私語子孫自矜明智此不忠之大者也裴行儉曰士之致逺者當先器識而後才藝潘好禮設客問曰徐公有功於今誰與為比主人曰四海至廣人物至多或匿迹韜光僕不敢誣若所聞見則一人而已當於古人中求之客曰何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣張公逢漢文之時天下無事至如盜髙廟玉環及渭橋警馬守法而已豈不易哉徐公逢革命之秋屬維新之運唐朝遺老或包藏禍心使人主有疑如周興來俊臣乃堯年之四凶也崇飾惡言以誣盛德而徐公守死善道深相明白㡬䧟囹圄数挂網羅此吾子所聞豈不難哉通鑑孫逖掌制誥為時流嘆服議者以為自開元以來蘇頲齊澣蘇晉賈曽韓休許景先及逖為立言之最唐書上所用之相姚崇尚通宋璟尚法張嘉貞尚吏張説尚文李元紘杜暹尚儉韓休張九齡尚直各具所長也通鑑德行文學為根株正直剛毅為柯葉有根無葉或可候時有葉無根膏雨所不能活也唐書傳記裴延裕乾寧中在内庭文書敏捷號下水船姚洎號急灘頭上水船羊祜鑿墓陶侃決指二人正相反廢莊論詆譏子休而多竊其言操戈入室文章之最病韓退之晩年有聲樂而服金石藥張籍祭文曰乃出二侍女合彈琵琶筝既而公疾浸加孺人侍湯藥白樂天思舊詩云退之服硫黄一病訖不痊微之煉秋石未老身溘然退之嘗譏人不解文字飲而自敗於女妓乎作李博士墓銘戒人服金石藥而自餌硫黄乎孔氏雜説集兩漢之酤屠販𨽻出以為公侯卿相無他焉彼固公侯卿相器也遭時之非是以詘其始之不幸非遭髙光而以為幸也漢晉之末公侯卿相刼戮困餓伏墻壁以死無它焉彼固刼戮困餓器也遭時之非是以出獨其始之幸非遭卓曜而後為過也柳論周仁以重臣為二千石許靖以人譽而致位三公近世尤好此類以為長者也自抱闗擊柝以往最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱闗擊柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上蒙以衮冕翼以徒𨽻趨走其左右豈有補於萬民之勞苦哉桞文風雅則諸葛瑾張承步隲以名聲光國政事則顧雍潘濬呂範呂岱以器任幹軄竒偉則虞翻陸績張温張惇以諷議舉正奉使則趙咨沈珩以敏達延譽術数則呉範趙達以禨祥恊徳陸機辨亡論本朝唐諸子號詩人者僻固而狹陋韓愈嘗有賦矣不過羨二鳥之光榮嘆一飽之無時耳推是心使光榮而飽則不復云矣若翺獨不然其賦曰衆囂囂而獨處兮咸嘆老而嗟卑慨予心之不然兮慮行道之猶非怪神堯以一旅取天下後世子孫不能以天下取河北以為憂嗚呼使當時君子皆易其嘆老嗟卑之心為翺所憂之心則唐之天下豈有亂與亡哉歐文羊祜陸遜送絹償米之事甚好至遜飲祜藥則不可羊祜雖不是鴆人底人然兩軍相向其所餉藥自不當飲老泉文今世稱善草書或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也永禪師書骨氣深穏體兼衆妙精能之至返造深淡如觀陶彭澤詩初若散緩不收反復不已乃識竒趣霏霏乎其若卿雲之蔽月也翻翻乎其若長風之卷斾也倚倚乎其若逰絲之牽柳絮也褭褭乎若流水之舞荇𢃄也離離乎其逺而相屬縮縮乎其近而不隘也東坡文讀文選恨其編次無法去取失當齊梁文字衰陋蕭統尤為卑弱如李陵五言皆後人所擬淵明集可喜者甚多而獨取数篇淵明作閑情賦正所謂國風好色而不淫正使不及周南與屈原所諫何異而統大譏之此小兒强解事也筆紀唐人工於為詩而陋於聞道梁城集六經已後便有司馬遷三百五篇之後便有杜子美文當學司馬遷詩當學杜子美唐文司馬遷敢亂道却好班固不敢亂道却不好不亂道又好是左傳亂道又不好是唐書同上王右軍蘭亭天朗氣清自是秋景以此不入選然絲竹管絃語亦重復遯齋閒覽東坡云書之美者莫如顔魯公然書法之壞自魯公始詩之美者莫如韓退之然詩格之變自退之始王貞方詩話決擇經人無於水監當於民監書回之為人也擇乎中庸誠之者擇善而固執之者也中庸多聞擇其善者而從之語子君請擇於斯二者觀水有術必觀其瀾孟子善擇者制人不善擇者人制之荀子人莫鑑於流水而鑑於止水鵷雛非梧桐不止非練實不食非醴泉不飲莊子或問人有倚孔氏之墻誦韓莊之書則引諸門乎曰在夷貉則進之倚門墻則麾之揚子人不照於昧金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於靜水者以靜能清也劉子史筮短龜長不如從長臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石鳥則擇木左范文子曰擇福莫若重擇禍莫若輕晉國語注云有二福擇取其重有二禍擇取其輕也饑人所以不食烏啄者為其愈充腹而與餓死同也史記士宜以才行為先不可純以閥閲懇懇用刑不如待恩孳孳永好未若禮賢通鑑傳記寧為雞口無為牛後戰國策得十良馬不如得一伯樂得十良劍不如得一歐冶呂氏春秋食其自匿監門非髙祖不長揖孔明躬稼南陽非劉氏不馳驅晉書集挽弓當挽强用箭當用長射人先射馬擒賊先擒王杜詩養禽當養鶻磨劔莫磨錐磨錐成小利元微之詩擇肉於熊羆肯視兎與狸韓詩率性飭躬立志希古當以聖人為準的中庸為慕尚清與和皆非中道皇甫湜本朝故窮山水登臨之美者必之乎寛閒之野寂寞之鄉而後足焉覽人物之盛麗夸都邑之雄富者必據乎四達之衝舟車之㑹而後足焉歐公有美堂記料度經他人有心予忖度之詩陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也孔子聞之曰善哉覘國乎觀其舞知其徳聞其諡知其行記有子曰其為人也孝悌而好犯上者鮮矣不好犯上而好作亂者未之有也語子未有仁而遺其親者也未有義而後其君者也枉已者未有能直人者也子貢曰見其禮而知其政聞其樂而知其德孟子千嵗之事今日是也荀子人能為其主亦必能為人劉子史卜偃曰畢萬之後必大齊仲孫湫來省難歸曰魯不棄周禮未可動也晉文公曰得臣猶在憂未歇也孟獻子曰晉帥乘和師必有大功士鞅曰欒黶汰虐已甚猶可以免其在盈乎欒黶死盈之善未能及人武子所施没矣而黶之怨實彰晉囚叔向樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫樂王鮒從君者也何能行祁大夫外舉不棄仇内舉不失親其獨遺我乎周王曰韓氏其昌阜於晉乎季武子曰晉未可媮也有趙孟以為大夫其朝多君子其庸可媮乎叔向謂伯有已侈所謂不及五稔者楚執伍奢費無極曰奢之子材若在呉必憂楚國盍召之員適呉奢聞員不來曰楚君大夫其旰食乎呉二千里不三月不至何及於我楚子西曰夫差其將自敗也已安能敗我魏子其長有後於晉國乎伍員曰越十年生聚而十年教訓二十年之外呉其為沼乎子胥曰越在我心腹之疾也季札曰衛多君子未有患也左傳觀其容而知其心矣國語伍子胥諫曰越王勾踐食不重味衣不重采弔喪問疾且欲有所用其衆此人不死必為呉患今越在心腹疾而王不先不亦謬乎史呉世家侯嬴曰吾聞晉鄙兵符在王臥内而如姬最幸力能竊之嘗聞公子為如姬報其父仇如姬欲為公子死無所辭公子誠一開口則得虎符奪鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通鑑龎涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大砍樹白而書之曰龎涓死此樹下於是令齊軍善射者萬弩夾道而伏期日暮見火起而俱發龎涓夜至砍樹下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發魏軍大亂龎涓自知勢窮兵敗乃自刎曰遂成豎子之名楚南公曰楚雖三户亡秦必楚史記房君平諫陳餘曰秦未亡而誅武信等此生一秦也陳平曰項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過数人耳英布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝敗之数未可知也出於下計陛下安枕而卧矣上曰何謂上計對曰東取呉西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取呉西取楚并韓取魏據敖倉之粟塞城皋之口勝敗之数未可知也何謂下計東取呉西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣上曰是計將安出對曰出下計通鑑晁錯曰呉削亦反不削亦反削之其反亟禍小不削之其反遲禍大前漢荆燕呉傳朱勃小器速成智盡此耳丙吉有隂德夏侯勝識其當封及子孫東漢幽州刺史馮煥𤣥菟太守姚光数糾發姦惡怨者詐作璽書譴責煥光賜以歐刀下遼都尉龎奮使速行刑書奮即斬光收煥煥欲自殺其子緄疑詔文有異止煥曰大人在州志欲去惡實無它故必是㓙人妄詐規肆姦毒願以事自上甘罪無晩煥從其言上書自訟果詐者所為通鑑孫䇿將襲許衆懼郭嘉料之曰䇿新得江東所誅者英髦雄傑輕而無備雖有百萬無異獨行中原若刺客伏起一人之敵爾果為刺客所殺魏志袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓死通鑑蛟龍得雲雨恐非池中物三國志衛公子開方仕齊積年不返管仲以為不懷其親安能愛君是以求忠臣必於孝子之門郭嘉曰袁紹性遲而多疑來必不速諸葛亮至郿軍於渭水之南司馬懿引軍度渭背水為疊陣以拒之謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原諸將無事矣亮果出五丈原通鑑魏文帝欲伐呉蜀賈詡曰呉蜀依阻山水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢皆難卒謀魏志邢貞曰江東將相如此非久下人者也三國司馬懿告人曰諸葛孔明食少事煩其能久乎魏明紀索靖知天下將亂指雒陽宫銅駝嘆曰㑹見汝在荆棘中耳朝廷初聞燕王雋卒皆以為中原可圖桓温曰慕容恪尚在憂方大耳桓𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒲一擲百萬何無忌酷佀其舅共舉大事何謂無成劉裕伐燕過大峴曰虜已入吾掌中矣通鑑于謹曰曜兵漢沔席卷渡江直據丹陽是其上策移郭内居人退保子城以待援至是其中策若難於移動據守羅郭是其下䇿長孫儉曰裁繹蕭繹也出何䇿謹曰必用下策北史本傳隋軍臨江髙熲謂行䑓吏部郎中薛道衡曰今兹大舉江東必可克乎道衡曰克之嘗聞郭璞有言江東分王二百年復與中國合今此數將周一也主上恭儉勤勞叔寳荒淫驕侈二也國之安危在所寄任彼以江總為相唯事詩酒㧞小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之勇耳三也我有道而大彼無德而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑通鑑李敬元盛稱王勃楊炯盧照鄰駱賔王之才裴行儉曰勃等雖有才而浮躁衒露豈享爵禄者哉唐書使者所薦唯得文辭千進之士耳安有有道賢人肯隨牒舉選乎裴度曰朱克融譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴李𢎞曰鄭注姦猾無雙卵鷇不除使成羽翼必為國患一日狼煙百餘舉帝曰此虜將遁張虛勢也通鑑傳記可食以梁肉者可加以鞭捶可受以官禄者可隨以鐵鉞髙士傳望影揣情文選陸士衡頌有志氣而能思富貴者必能建功業有志氣而能輕爵禄者必能立名節李衛公君子論季札以樂卜趙孟以詩卜襄仲歸父以言語卜子游子貢以威儀卜沈尹戍以政卜孔成子以禮卜其應也如響無他在精誠而已不精誠者不能自卜况吉㓙他人乎陸魯望文若燭照數計而龜卜也韓文不具眼目經莫赤匪狐莫黒匪烏謀之其臧則具是違謀之不臧則具是依謀臧不從不臧復用聽言則對誦言如醉詩桑柔箋云見道聽之言則應荅之見誦詩書之言則宜臥如醉此宜無罪女反收之彼宜有罪女覆説之詩不親其所賢而信其所賤端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦不知聲者不可與言音不知音者不可與言樂記子無是非之心非人也孟以盲為明以聾為聰以危為安以吉為㓙螭龍為蝘蜓鴟梟為鳯凰非是是非謂之愚荀子以徴為羽非弦之罪以甘為苦非味之過楚人有烹猴而召其鄰以為狗羮也而甘之後聞其猴也據地而吐之盡㵼其食此未始知味者也邯鄲師有出新曲者托之李竒諸人皆爭學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寳而藏之以示人人以為石也因而棄之此未始知玉者也淮南子農夫得彤弓以驅鳥南威得衮衣以負薪抱朴子史叔孫穆子好善而不能擇人魯有子家羈弗能用也左人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國累世而不一見者其所為忠者不忠而所謂賢者不賢也史記項羽有一范増而不能用前漢髙紀魏文侯最為好音而謂子夏曰聽古樂則欲寐聞鄭衛之音則不知倦焉漢書禮樂志曲突徙薪亡恩澤燋頭爛額為上客霍光傳謂不智者為能謂智者為不能是末世而非往古和氏之璧韜於荆石隋侯之珠藏於蜯蛤歴世莫眡不知其將含景曜吐英精曠千載而流夜光也郡縣擇便巧史書習於計簿能欺上府者以為右軄姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕官何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳西漢廊廟之寳棄於溝渠東漢聚斂整辨為賢能奉理循法為文治通鑑管寧留依黄祖三年祖以凡人蓄之同上李膺謂鍾覲曰公何大無皂白魏志抵金玉於砂礫碎圭璧於泥塗東漢傳劉元海匈奴人王渾屢言於武帝帝大恱之王濟渾子曰若任以東南之事呉㑹不足平也孔恂楊珧曰臣觀元海之才平呉之後恐其不復北度也非我族類其心必異齊王攸曰不除元海恐并州不得久寧王渾曰元海長者渾為君王保之永興元年元海僣位晉書王恭以劉牢之為爪牙而但以部曲將遇之牢之負其才深懷恥恨將適千里殺騏驥而䇿蹇驢可悲之甚也呉興章華好學善屬文朝臣以華素無閥閲競排詆之指儒素為古拙用詞賦為君子令封德彛舉賢久無所舉上詰之對曰非不盡心但於今未有竒才耳上曰君子用人如器各取所長正患已不能知安可誣一世之人張九齡曰禄山失律喪師於法不可不誅且臣觀其貌有反相不殺必有後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之通鑑棄蘇合之丸而取蜣螂之轉五代史傳記鳥不為鳥鵲不為鵲戰國䇿牛僧孺詣襄陽于頔求知頔以門客遇之牛怒而去後召客將問牛秀才發未曰已去立命小將齎書絹五百疋追之僧孺不啟封揖囘幽閒鼔吹芻蕘鄙説刋為竹帛正言時無識寳世缺知音珍瓴甋而賤璠璵策駑駘而捨騏驥燕石妄珍齊竽混吹史通集為鳯凰而作鶉籠兮雖翕翅而不容非俊疑傑兮固庸態也漸藁本於洿瀆淹芳芷於腐井悲楚人之和氏獻寳玉以為石方世俗之幽昏眩白黒之美惡委玉質於泥塗放山淵之龜玉相與貴夫礫石斥逐鴻鵠兮近習鴟梟斬伐橘柚兮列樹苦桃蓬艾親入御於床第兮棄捐葯芷與杜蘅西施媞媞而不得見兮嫫母醜婦人也勃肖而日侍閭謂娵好女為醜惡江蘺棄於窮巷蒺藜蔓乎東廂卻騏驥而不乘兮策駑駘而取路騕褭奔亡兮騰駕槖駞鈆刀進御兮遥棄太阿拔搴𤣥芝兮列樹芰荷橘柚萎枯兮苦李旖旎甂甌登於明堂兮周鼎潛乎深淵潛周鼎於江淮兮爨土鬵於中宇鬵音尋釡也惡虞氏之簫韶兮好遺風之激楚淫泆之音也反表以為裏顛裳以為衣藏琘石於金匱捐瑜瑾於中庭卻騏驥以轉運驣驢羸以馳逐折芳芝與瓊華兮樹枳棘與新柴握荃蕙與射干兮耘藜藿與衰荷寳彼兮沙礫捐此兮夜光擬楚辭謂莫邪為鈍兮鉛刀為銛弔屈原賦蟬翼為重千鈞為輕黄鐘毁棄瓦釡雷鳴楚辭譬如去日之明于庭而就火之光於室也藝文類聚嗾羣犬以逼騶虞縱炎火以焚瑾瑜劉賔客集乃知尋常鑒照影不照神孟東野秪今市駿憑毛色緑耳驊騮賺殺人縣宰不仁工部餓酒家無識翰林醒杜荀鶴集宋人不識玉而寳珉石陳子昂集楚人不識鳯重價求山雞李太白集和璞之真不能識齊竽之濫何由知白樂天聞善不慕與聾聵同見善不敬與昏瞽同栁文必若土之出無不可者則東南之竹箭雖旁岐揉曲皆可以貫犀革北山之木雖離竒液樠空中立枯者皆可以梁百尺之觀航千仭之淵冀之北土馬之所生凢其大耳短脰拘攣踠跌薄蹄而曵者皆可以勝百鈞馳千里雍之瑰璞皆可以備砥礪徐之糞壤皆可以封大社荆之茅皆可以縮酒九江之元龜皆可以卜泗濵之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊闗轂而輠輪者皆可以為師儒盧之沽名皆可以為大醫西子之里惡而矉者皆可以當侯王山西之冒詭輕俛沓貪而忍者皆可以鑿㐫門制閫外山東之椎騃樸鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉啄以為羞兮焚棄稷黍犴獄不知避兮宮庭之不處除一作滔塗籍穢兮榮若繡黼禳祈火烈兮娯娯笑舞䜛巧之嘵嘵兮感以為咸池便媚鞠恧兮美愈西施謂謨言之怪誣兮反寘瑱而逺違匿重痼以諱避兮進俞緩之不可為桞文西施作嫫母美顔不如醜白樂天相馬失於痩遂遺千里足元微之集張延賞選婿韋臯性髙不拘小節公侮之不禮臯辭去後白金吾持節西川為延賞代公曰吾不識人從西門而出郭園詩曰當時甚訝張延賞不識韋臯是貴人雲溪友議本朝古人相馬不相皮痩馬雖痩骨法竒世無伯樂良可悲千金市馬惟市肥歐公以李林甫楊國忠為周召以安禄山哥舒翰為方虎司馬温公論不信䜛經豈弟君子無信䜛言詩浸潤之譛膚受之愬不行焉可謂明也已矣語史智者除䜛以自安也左上官桀怨霍光令人詐為燕王上書言光出都羽林道上稱蹕又擅調益幕府校尉光聞之不入上問大将軍安在桀對以燕王告其罪不敢入有詔召光光免冠上曰将軍冠朕知是書詐也将軍無罪将軍調校尉未十日燕王何以知之龎冕等短髙熲於上上怒皆黜之因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明通鑑唐太宗曰我終不以䜛害良士新唐書傳記魏文侯令樂羊將而攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語集杜兼在濠州有鍾離令盧某者宰相戚也而䜛且䛕日狀其僚之過愆以致於兼兼得之大怒罰令因擯令終不得面䜛䛕大息栁文信讒經采苓刺晉公也獻公好聽䜛言采苓采苓首陽之顛詩并序君子信䜛如或醻之亂之又生君子信䜛君子信盜亂是用暴維邇言是聽詩無道並進䜛巧敗國詩序子與䜛諂面䛕之人居國欲治可得乎孟子䜛嫉之人必好聞人惡劉子史楚令尹子常賄而信䜛沈尹戍言於子常曰知者除䜛以自安也今子愛䜛以自危也左呉大宰嚭既與子胥有隙因䜛曰子胥為人剛暴少恩今不見用常鞅鞅怨望其主乃使使賜子胥屬鏤之劔以死史本傳屈原為憲令上官大夫見而欲奪之不與因䜛之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平同上范雎日益親用事因乘間䜛王曰聞秦有太后穰侯不聞有王王於是廢太后逐穰侯項王為人意忌信䜛通鑑偏聽生姦西漢漢安昌王盛謂劉和曰陛下勿信䜛夫之言以疑兄弟兄弟尚不可信他人誰足信哉通鑑魏徴曰君所以暗偏信也秦二世隱藏其身以信趙髙天下潰叛而不得聞梁武信朱异侯景向闕而不得聞隋煬帝信虞世基賊遍天下而不得聞故曰君能兼聽則姦人不得壅蔽而下情通矣新唐書有言魏徴自録前後諫辭以示起居郎禇遂良者上愈不恱乃罷叔玉尚主而踣所撰碑通鑑集君含怒而待臣兮不清徹其然否楚辭操縱經予以馭其幸奪以馭其貧周禮一張一弛文武之道也記史許無刑而伐之服而舍之度徳而處之量力而行之貳而執之伏而舍之徳莫厚焉刑莫威焉左帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度東漢傳記諸葛亮至南中所在戰捷聞孟獲者為夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虛實故敗亮笑縱使更戰七擒七縱而亮猶遣獲獲止不去曰公天威也南人不復反矣漢晉春秋集舒則彌綸覆四海卷則消液入無形文選舒之彌宇宙卷之不盈分陳子昂舒之則雲蒸雨降以救大旱卷之則天倪道樞不盈一握獨狐及集淮蔡為亂天子伐之既伐而饑天子活之韓文姑息經細人之愛人也以姑息子産猶衆人之母也能食之不能教也記子子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政為政者每人而悦之日亦不足矣孟夫惜草茅者禾不穗惠盜賊者傷良民今緩刑罰行寛惠是利姦邪而害善人也此非所以為善也韓非子姑息敗德楊問明史項王見人言語嘔嘔有人疾病涕泣分食飲此所謂婦人之仁也范増曰君王為人不忍張良曰今釋弗擊此養虎自遺患也惠加姦宄而害及良善通鑑恩不忍悔義不忍割東漢丁鴻傳衰世之君率多柔懦凡愚之佐唯知姑息是以權幸之臣有罪不坐豪猾之民犯法不誅仁恩所施止於目前奸宄得志紀綱不立通鑑賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣惡人髙會而誇咤老賊服贓而過門孝子見讐而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠奸軌者賊良民東漢一嵗再赦好人喑啞凢養莠者傷禾稼惠奸宄者賊良民知幾上書譏每歳一赦或一歳再赦小人之幸君子之不幸唐書為天下之事而專事姑息其憂患可勝校乎時藩鎮各擁勁卒自署將吏不供貢賦朝廷專事姑息不能復制雖名藩臣羈縻而已通鑑䕶養孽萌以成禍根唐書欲賞一有功翻慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯通鑑豢豐而犬豕轉獰肉飽而虎狼貪暴唐史贊守正經子曰素隱行怪後世有述焉吾弗為之矣中庸子曰獲罪於天無所禱也子曰敬鬼神而逺之可謂智矣子不語怪力亂神語淫祀無福記子子曰君子不祈妄福文中子史魯大旱公欲焚巫尫臧文仲曰天欲殺之則如勿生若能為旱焚之滋甚左傳狐突曰神不歆非類民不祀非族左僖十年寗武子曰鬼神非其族類不歆其祀左傳鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓉鄭必不火子産弗與左傳鄭龍鬭國人請禜子産曰吾無求於龍龍亦無求於我乃止左昭十九年祝有益也詛亦有損左傳初楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂不祭左傳晏子曰使神可祝而來亦可禳而去史記鄒陽枚乘游於危國然卒免於刑戮者以其言正也通鑑班婕妤曰死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為西漢本傳明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭事之方求報無福之祠及言世有仙人服食不終之藥遥興輕舉黄冶變化之術者皆奸人惑衆挾左道懐詐偽以欺罔世主聽其言洋洋盈耳若將可遇求之盪盪如係風捕影終不可得魏帝愛女淑卒帝痛之欲幸許陳羣諫曰臣以為吉㓙有命禍福由人移都求安則亦無益且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心况乃帝王萬國之主行止動靜豈可輕脱哉通鑑時長吏喪官後人惡之多毁壞舊府祜以死生有命非由居室普加禁斷晉書王度曰佛外國之神非天子諸華所應祠奉漢氏初傳其道雅聽西域人立寺都邑以奉之漢人皆不得出家魏世亦然今宜禁公卿以下毋得詣寺燒香禮拜其漢人為沙門者皆返初服郭璞嘗遇顔含欲為之筮含曰年在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜庾翼在武昌數有妖怪欲移鎮鄉土王述曰武昌實江東鎮戍之中非但扞禦上流而已達人君子直道而行禳避之道皆所不取太史令傅奕上疏請除佛法曰佛在西域言妖路逺漢譯蕃書恣其假托使不忠不孝削髪而揖君親游手游食易服以逃租賦偽起三塗謬張六道恐喝大詐妄欺庸品乃追既徃之罪虗規將來之福布施一錢希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章有造為惡逆身墜刑網方及獄中禮佛規免其罪且死生壽夭由於自然刑德威福闗之人主貧富貴賤功德所招而愚僧矯詐皆云由佛降自羲黄至於有漢皆無佛法君明臣忠祚長年久漢明帝始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髠髪之事梁武齊襄足為明鏡今天下僧尼數盈千萬剪刻繒綵裝束泥人競為厭魅迷惑百姓有僧自西域來善咒術能令人立死復呪之使蘇上擇飛騎中壯者試之皆如其言以告傅奕奕曰此邪術也臣聞邪不干正請使呪臣必不能行上命僧呪奕奕初無覺湏㬰僧忽僵仆若為物所擊遂不復蘇梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祗殚人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘䰟於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徴何其謬也呂才以為近世巫覡妄分五姓如張王為商武庾為羽似取諧韻至於以栁為宮以趙為角又復不類或同出於一姓分屬宮商或複姓數字莫辨徴羽此則事不稽古義理乖僻者也禄命之書多言或中人乃信之然長平坑卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同禄而貴賤懸殊共命共胎而夭壽或異又云古之葬者皆於國都之北兆域有常處是不擇地也夫子文為令尹而三已柳下惠為士師而三黜計其丘隴未嘗改移而野俗無識妖巫妄言遂於躃踊之際擇葬地而希官爵荼毒之秋選葬時而規財利或云辰日不可哭泣遂莞爾而對弔客或云同屬忌於臨壙遂吉服不送其親傷教敗禮莫斯為甚術士皆惡其言而識者以為確論狄仁傑以呉楚多淫祠奏焚其一千七百餘所獨留夏禹呉太伯季札伍員四祠太后造像狄仁傑上疏諫其畧曰今日伽藍制過宮闕功不使鬼正在役人物不天來終湏地出不損百姓將何以求又曰游僧皆托佛法詿誤生人里陌動有經坊閭門亦立精舎化誘所激切於官徴法事所湏嚴於制敕李邕上疏以為詩三百一言以蔽之曰思無邪若有神仙能令人不死則秦始皇漢武帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已姚崇上言佛圖澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃但使蒼生安樂即佛身何用妄度奸人使壊正法命有司沙汰天下僧尼以偽妄還俗者萬二千餘人通鑑姚崇曰若使殺蝗有禍臣請當之張鎬曰帝王當修德以彌亂安人未聞飯僧可致太平也上曰建中之亂術士豫請城奉天此蓋天命非己所能致也李泌曰天命他人皆可言唯君相不可言命盖造命也上與宰相語及神仙問果有之乎李藩曰秦始皇漢武帝學仙之效具在前史太宗服天竺僧長年藥致疾此古今之明戒也茍道盛德充人安國理何憂無堯舜之盛壽乎通鑑傳記孔子曰存亡禍福皆在已天災地殃不能殺也説苑集佛者夷狄之一法耳自後漢時流入中國上古未嘗有也昔者黄帝在位百年年一百十歳少昊在位八十年年一百嵗顓頊在位七十九年年百八歳帝舜及禹年皆百歳此時天下太平百姓安樂壽考然而此時中國未有佛也其後殷湯孫太戍在位七十五年武丁在位五十九年書史不言其年壽所極蓋亦俱年不減百歳周文王年九十七歳武王九十三歳穆王在位百年此時佛法亦未至中國非因事佛而致然也漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十七年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死臺城國亦隨滅事佛求福反更得禍由此觀之佛不足信事亦可知矣佛如有靈能作禍􅑂茍有殃咎冝加臣身上天鑒臨臣不怨悔凡君子行已立身自有法度聖賢事業載在方册可效可師仰不愧天俯不怍人内不愧心積善積惡殃慶自各以其類至何有去聖人之道舎先王之法而從夷狄之教以求福利也假如釋氏能與人為禍福非守道君子之所懼也况萬萬無此理釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壊之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在旁又安得因一摧折自毁其道以從其邪也韓文未有恃祥而壽者也商之王以桑榖昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黄犀死莽惡在其為符也栁貞符本朝開寳塔災得舊瘞舎利迎入内廷傳言頗有光怪將復建塔余襄公言彼一塔不能衛何福可及於民凡腐草皆有光及珠之圓者夜亦有光烏足畏也筆談王嗣宗為節度使性剛正嘗卧病家人私爇紙幣以祈福嗣宗大呼而止之曰神茍有知豈枉法而受賄耶聖宋掇遺信邪經民興胥漸泯泯棼棼㒺中於信以覆詛盟書非其所祭而祭之名曰淫祀無福奥者老婦之祭也盛於盆尊於瓶禮非其鬼而祭之諂也語史申繻曰妖由人興也人無釁焉妖不自作人棄常則妖興史嚚曰國將興聽於民將亡聽於神左初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為宏闊誇大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之初帝奉佛法立精舎於殿内引諸沙門居之通鑑謝萬曰王郄諂於道士何佞於佛晉書自天監中用釋氏法長齋斷魚肉日止一食惟菜羮糲飯而已通鑑上好禨祥小數王劭表上符瑞甚衆又採民間歌謡引圖書䜟緯捃摭佛經曲加誣飾撰皇隋靈感志上令宣示天下隋文紀隋傅緯曰不䖍郊廟大神專媚淫昏之鬼隋程知節曰王世充好為呪誓此乃老巫嫗耳同上楚人信妖言上好祀神鬼王璵習祠祭之禮以干時璵祈禱或焚紙錢類巫覡習禮者羞之肅宗代宗皆喜隂陽鬼神事無大小謀之卜祝故王璵黎幹以左道得進上病甚令僧剃髪遺令為塔以葬通鑑傳記孫恩攻㑹稽王凝之謂吏民曰不湏預防吾已請大道許遣鬼兵相助賊自破矣既不設備遂為恩所害王氏譜求福墨生所信史通集甚矣人之好怪也不求其端不訊其末惟怪之欲聞韓文越人信祥而易殺病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飭死事曰神不置我矣因不食蔽面死德實受命之符以奠永祀後之妖婬嚚昏好恠之徒乃始陳大電大虹𤣥鳥巨跡白魚流火之鳥以為符斯皆詭譎闊誕其可羞也司馬相如劉向揚雄班彪彪子固皆沿襲嗤嗤推占瑞物以配受命其言類淫巫瞽史誑亂後代不足以知聖人立極之本顯至德揚大功甚失厥趣栁記本朝畏鬼神聴巫覡者匹婦之愚也通鑑隨邪史諸葛瞻亮之子亮卒蜀人思亮之德咸愛瞻才敏每有善政佳事雖非瞻所建皆相告曰葛侯所為也是以美譽過實蜀志章華好學善屬文朝臣以華素無閥閲競排詆之通鑑集丈人屋上烏人好烏亦好杜詩偶然題作木㞐士便有無窮求福人韓集必若土之出無不可者則東南之竹箭雖旁岐揉曲皆可以貫犀革北山之木雖離竒液樠空中立枯者皆可梁百尺之觀航千仭之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊璞皆可以備砥礪徐之糞壤皆可以封大社荆之茅皆可以縮酒九江之元龜皆可以卜泗濵之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊闗轂而輠輪者皆可以為師儒盧之沽名者皆可以為大醫西子之里惡而矉者皆可以當侯王山西之冒詭輕俛沓貪而忍者皆可以鑿凶門制閫外山東之椎騃樸鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉栁文本朝韓魏公曰頃時丁冦立朝天下聞一善事皆歸之萊公未必盡出萊公也聞一不善事皆歸之晉公未必盡出晉公也蓋天下善惡事皆歸焉遺事審於取捨經擇其善者而從之其不善者而改之暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也可者與之其不可者拒之語子非其道則一簟食不可受於人如其道則舜受堯之天下不以為泰今有同室之人鬬者救之雖被髪纓冠而救之可也鄉隣有鬬者被髪纓冠而往救之則惑也雖閉户可也魚我所欲也熊掌亦我所欲也二者不可得兼舎魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舎生而取義者也言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也求則得之舎則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也可以取可以無取取傷亷可以與可以無與與傷惠孟與其屈已以富貴不若抗志以貧賤屈已則制於人抗志則不愧於道孔叢三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎莊子釣於濮水楚王使二大夫往先焉曰願以境内累耳莊子曰吾聞楚有神龜死已三千年矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生而曵尾塗中莊子曰往矣吾將曳尾於塗中莊人之情於害之中爭取小焉於利之中爭取大焉淮南子史為人主計者莫如先審取舎取舎之極定於内而安危之萌應於外矣秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百歲而弗失秦王治天下十餘嵗則大敗此亡他故矣湯武之定取舎審而秦王之定取舎不審矣趙充國曰窮冦不可迫也緩之則走不顧急之則還致死通鑑於心有猜則簋飱饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之義重於生舎生可也生重於義全生可也東漢夫雞肋食之則無所得棄之則如可惜後漢思樹芳蘭剪除荆棘三國名臣贊寧飲建業水不食武昌魚寧還建業死不止武昌居通鑑仁道不逺則殺身以狥義重於生則捐軀以踐北史傳記良商不與人爭買賣之賈而謹伺時時賤而買雖貴已賤時貴而賣雖賤已貴戰國䇿集寧作清水之汙泥不為濁路之飛塵曹植人固有儒名而墨行者問其名則是校其行則非可以與之逰乎如或墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則麾之在夷狄則進之吾取以為法焉比於東都畧見顔色未得接言語心固已相信不敢果以貌定知人堯舜所難又嘗服宰予之誡故未敢決然挹亦不敢忽然忘也善雖不吾與吾將强而附不善雖不吾惡吾將强而拒與其譽於前孰若無毁於其後與其樂於身孰若無憂於其心韓文寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎柳文養隼者誠欲其鷙於鳥鳶乎鷙於鸞鳯乎唐文粹本朝范文正公言幕府辟客湏可為師者乃辟之雖朋友亦不可辟遺事與其貴而拘孰若肆而賤臨川未應遺合抱取用及把拱東坡詩知所輕重經不作無益害有益功乃成不貴異物賤用物民乃足書父母存不許友以死為宮室不斬於丘木陳乾昔疾屬其子尊已曰如我死必大為我棺使吾二婢子夾我乾昔死其子曰殉葬非禮也弗果殺毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士儒有不寶金玉而忠信以為寳不祈土地立義以為土地不祈多積多文以為富已聘而還圭璋此輕財而重禮之義也大夫祭器未成不造燕器禮記廏焚子退朝曰傷人乎不問馬君子謀道不謀食君子憂道不憂貧語子孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也鄉人長於伯兄酌則誰先曰先酌鄉人無以小害大無以賤害貴禮與食孰重曰禮重色與禮孰重曰禮重孟子宓子賤為單父宰齊人攻魯道由單父父老請曰麥已熟矣今齊冦至請放民皆使出穫附郭之麥可以益糧且不資冦三請而宓子不聴曰今兹無麥明年可樹若使不耕者得穫是民樂有冦也且單父一嵗之麥於魯不加强䘮之不加弱使民有自取之心其瘡必數世家語人之情雖桀跖豈肯為其所惡賤其所好哉拔㦸加乎首則十指不辭斷非不以此為務也緩急之有相先者也荀聖人不貴尺之璧而重寸之隂林囘棄千金之璧負赤子而趨莊子兕虎在於後隋侯之珠在於前弗及掇者先避患而後就利割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也饑而大餐非不贍也然而弗為者害於性也淮南子昔荆卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈㦸於豺狼之羣抱朴子史晉魏武子有嬖妾無子命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也左孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言史記沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先收秦相府圖籍藏之此沛公得具知天下阨塞户口多少强弱之處通鑑明君貴五榖而賤金玉前漢食貨志遺子黄金滿籯不如教子一經漢書藺相如不畏秦王而屈於亷頗為國也就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲饑無所食雖皇羲之純德唐虞之文明猶不能以保蕭墻之内也蓋民可百年無貨不可一朝有饑張綱分行州郡埋其車輪於雒陽都亭曰豺狼當路安問狐狸東漢本傳蔡邕曰夫邊陲之患手足之疥搔中國之困胷背之瘰疽帝使人以馬易珠璣翡翠玳瑁於呉呉主曰此皆孤所不用而可以得馬孤何愛焉皆以與之石勒曰吾不喜得幽州喜得二子燕王子寳言於垂曰願不以意氣微恩忘社稷之重通鑑李謐曰丈夫擁書萬卷何假南面百城北史上謂薛仁貴曰朕諸將皆老思得新進驍勇者將之無如卿者朕不喜得遼東喜得卿也通鑑狄仁傑曰黄卷中方與聖賢對何暇偶俗吏語邪同上唐明皇欲取石堡城王忠嗣不可李光弼勸之忠嗣曰石堡城非殺數萬人不可取忠嗣今不奉詔不過得罪天子以一將軍歸宿衛不者黔中上佐耳又云吾忍數萬人命易一官哉唐書記曰寧畜盜臣盜臣誠可惡然一人之害耳聚斂之臣用則經常之法壞而下不勝其弊焉唐書食貨志李絳曰錢用盡更來機事一失不可復追通鑑傳記衛嗣君時胥靡有罪賢臣逃之魏衛贖之百金不與乃請易以左氏衛邑羣臣曰以百金之地贖一胥靡無乃不可乎君曰治無小亂無大教化喻於民三里之城足以為治民無亷恥雖有十左氏將何以用之聶政曰老母在政身未敢以許人也戰國䇿墨子語禽滑釐曰㐫年與子隋珠又與子一鍾粟子將何擇釐曰粟可耳劉向説苑文公用舅犯之言而敗楚於城濮反而為賞雍季在上左右諫曰城濮之功舅犯之謀也君用其言而後用其身乎文公曰雍季之言百代之利也舅犯之言一時之務也焉有以一時之務先百代之利乎呂氏春秋集係蹄在足猛虎絶其蹯蝮蛇在手則壯士斷其節何則以其所全者重所棄者輕陳琳檄齊桓公不以射鈎而致嫌故能成九合之功秦穆不以一眚而掩德故能復九敗之辱陸宣公文重名不重官李太白人各有一死死或重於泰山或輕於鴻毛也故非其義君子不輕其生得其所君子不愛其死白集歐陽詹閩越人也父母老矣捨朝夕之養以來京師其心將必有得而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟韓文肥於貌孰與肥於道求於人孰與求於身孫可之文本朝富公使敵功甚偉而每不自以為功至知青州活饑民四十餘萬則每自言之曰過於作中書令二十四考矣虎方捕鹿羆據其穴搏其子虎安得不置鹿而返近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之不以一日之快而易終身之憂千金之子不死於盜賊何者其身之可愛而盗賊之不足以死也蘇文歐公曰文章止於潤身政事可以及物張芸叟集不識輕重子今恩足以及禽獸而功不至扵百姓者獨何歟子何尊梓匠輪輿而輕為仁義者哉人有雞犬放則知求之有放心而不知求拱把之桐梓人茍欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉今有場師舎其梧檟養其樲棘則為賤場師焉養其一指而失其肩背而不知也則為狼疾人也不能三年之喪而緦小功之察放飯流歠而問無齒決孟以隋侯之珠彈千仭之雀世必笑之所用者重而所要者輕也莊殺戎馬而求狐狸援兩鼈而失靈龜斷右臂而爭一毛折鏌鎁而爭錐刀用智如此豈足髙乎淮南子外疾之害輕於秋毫人知避之内疾之害重於太山而莫之避劉子史得一夫而失一國與惡而棄好非謀也以千乗之相易淫樂之矇初楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀余余賜女孟諸之麋弗致也大心與子西使榮黄諫弗聴榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也左氏簡父兄之尊而崇賔客之禮薄骨肉之恩而篤朋友之愛忘修身之道而求衆人之譽割衣食之業以供享宴之好塞川原為漢潦趙壹曰文籍雖滿腹不如一囊錢帝使人以馬易珠璣翡翠玳瑁於呉呉主曰此皆孤所不用而可以得馬孤何愛焉皆以與之傅緯曰不䖍郊廟大神專媚淫昏之鬼鄧景山有禆將抵罪當死諸將請之不許其弟請代兄死亦不許請入馬以贖罪乃許之諸將怒曰我軰曽不及一馬乎通鑑本朝持千金之璧以求于瓦釡㡬何其不舉而棄諸溝也老泉審於去就經君子三揖而進一辭而退同而進不同而退記色斯舉矣翔而後集直道而事人焉往而不三黜枉道而事人何必去父母之邦語子庶人召之役則往役君欲見之召之則不往見所就三所去三孟子史小國之事大國也德則其人也不德則其鹿也鳥則擇木木豈能擇鳥費無極曰奢之子材若在呉必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾貰而父棠君尚謂其弟員曰爾適呉我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也必死不辟勇也父不可棄名不可廢爾其勉之相從為愈左氏集吾寧悃悃欵欵朴以忠乎將送往勞來追俗人也斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗冨貴以媮生乎寧超然髙舉以保真乎將哫訾慄斯承顔色也喔吚嚅唲以事婦人乎寧亷潔正直以自清乎將突梯滑稽如脂如韋以絜楹乎寧昻昻若千里之駒乎將汎汎若水中之鳬乎與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之迹乎寧與黄鵠比翼乎將與雞鶩爭食乎楚辭繞樹三匝何枝可依魏武短歌行明月難暗投郭景純遊仙詩須知世路難輕進豈是君門不大開杜牧之審於趨向子非其往不往非其居不居適堯舜文王者為正道非堯舜文王者為他道揚子史效伯髙不得猶為謹飭之士所謂刻鵠不成尚類鶩也效季良不得陷為天下輕薄子所謂畫虎不成殆類狗也東漢馬援傳宋袁淑賦詩曰種蘭忌當門懷璧莫向楚楚少別玉人門非種蘭所續世說昧於趨向經譬彼舟流不知所届詩譬猶瞽之無相倀倀乎其何之譬如終夜有求於幽室之中非燭何見禮子曠安宅而弗居舍正路而不由孟子楚人和氏得玉獻厲王王使玉人相之曰石也王以和為詐而刖其左足及武王又獻之王使玉人相之又以為詐而刖其右足和乃抱璞而哭於楚山之下韓非子擿埴索塗冥行而已矣捨舟航而濟乎瀆者昧矣捨五經而濟乎道者末矣棄常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其識道也揚子集昔齊王好竽有求仕於齊者操瑟而往立王之門三年不得入韓文行舟楫而不識四方兮涉大水之漫漫泣漣三獻玉劉長卿深識大體經公事不私議公庭不言婦女喪具君子恥具一日二日而可為也者君子弗為也禮子宓子賤為單父宰齊人攻魯道由單父父老請放民皆使出穫附郭之麥可以益糧且不資冦三請而宓子賤不聽曰今兹無麥明年可樹若使不耕者得穫是民樂有冦也單父一嵗之麥於魯不加强喪之不加弱使民有自取之心其瘡必數世家語若曽子則可謂養志也孟季孫相魯六月掘長溝子路私飯之孔子覆其飯曰魯有民焉輒愛一作受之何也韓非子史楚成得臣伐陳城頓還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有㡬鄭簡公卒將為葬除司墓之室有當道者毁之則朝而塴不毁則日中而塴子大叔請毁之曰無若諸侯之賔何子産曰諸侯之賔能來㑹吾喪豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬君子謂子産知禮禮無毁人以自成也左晉韓宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君弗知左昭十六年韓昭侯有敝袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者沛公至咸陽諸將爭走金帛財物之府蕭何獨收秦圖書上令周昌選趙壯士可令將者白見四人封各千户以為將左右諫上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟曹參去齊屬其後曰以獄市為寄謹勿橈也文帝問天下一嵗決獄幾何錢穀一嵗出入㡬何陳平曰各有主者上曰主者為誰乎曰陛下即問決獄責廷尉問錢穀責治粟内史有獻千里馬者帝曰鑾旗在前屬車在後吉行五十里師行三十里朕乘千里馬獨先安之於是還其馬田叔按梁事來還至霸昌廏取火悉燒梁之獄辭空手來見帝曰梁事有之乎對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味卧不安席此憂在陛下也其治務在無為引大體不拘文法明有所不見聰有所不聞馮奉世以衛侯使持節送大宛諸國遂以節諭告諸國王因發其兵南進擊莎車攻拔其城諸國悉平上甚悦議封奉世蕭望之以為奉世奉使擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比爭遂發兵要功百里之外為國家生事於夷狄漸不可長奉世不宜受封丙吉為丞相上寛大好禮讓不親小事時人以為知大體用匡衡議罷甘泉泰畤劉向曰家人尚不欲絶種嗣况於國之神寳舊時且甘泉汾隂及雍五畤始立皆有神祗感應然後營之非茍而已也武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祗舊位誠未易動前始納貢禹之議後人相因多所動摇易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之又以久無繼嗣冬十月庚辰上曰太后令詔有司復甘泉泰畤汾隂后土如故及雍五畤陳寳祠長安及郡國祠著明者皆復之帝王之意不窺人閨門之私聴聞中冓之言何武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一馬援為隴西太守任吏以職但總大體諸曹時白外事援輒曰此丞掾之任何足相煩若大姓侵小民黠吏不從令此乃太守事耳設法禁者非能盡塞天下之奸皆合衆人之所欲也大抵取便國利事多者則可矣宋均曰文吏習為欺謾而亷吏清在一已無益百姓流亡盗賊為害也下邳周紡為雒陽令一下車先問大主姓名吏數閭里豪强以對紡厲聲大怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清務舉大綱簡略苛細昔文帝之於鄧通可謂至愛而猶展申屠嘉之志夫見任如此則何患於左右小臣哉諸葛亮嘗自校簿書主簿楊顒直入諫曰為治有體上下不可相侵古人稱坐而論道謂之三公作而行之謂之士大夫故丙吉不問横道死人而憂牛喘陳平不肯知錢糓之數云自有主者彼誠達於位分之體也明公為治乃躬自校簿書流汗終日不亦勞乎楊阜召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎初丞相亮時有言公惜赦者亮荅曰治世以大德不以小惠故匡衡呉漢不願為赦先帝亦言吾周旋陳元方鄭康成間毎見啟告治亂之道多矣曽不語赦也若劉景升季玉父子嵗嵗赦宥何益於治魏舒為司馬昭叅軍府朝碎務未嘗是非至於廢興大事衆人莫能斷者舒徐為籌之多出衆議之表顧和謂王導曰明公作輔寧使網漏吞舟何縁採聴風聞以察察為政邪王彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣謝安為政務舉大綱不為小察時人比安於王導通鑑桓𤣥嘗欲以謝安宅為營謝琨曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅耶𤣥聞慙而止晉書謝𢎞微曰親戚爭財為鄙之甚今内人尚能無言豈可導之使爭乎魏源懐性寛簡不喜煩碎常曰為貴人當舉綱維何必事事詳細譬如為屋但望髙顯楹棟平正其壁完牢足矣斧斤不平斵削不密非屋之病也徐勉為吏部尚書嘗與文臣夜集客虞蒿求詹事五官勉正色曰今宵止可談風月不可及公事時人服其無私魏大旱散騎常侍邢巒奏昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐵為轡勒府藏之金裁給而已不復買積以費國資逮景明之初承升平之業四境清晏逺邇來同於是貢篚相繼商估交入諸所獻納倍多於常金玉常有餘國用常不足茍非為之分限但恐嵗計不通自今請非要湏者一切不受魏主納之屈突通往隴西檢覆羣牧得隱匿馬二萬餘匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下柰何以畜産之故殺千餘人臣敢以死請又頓首曰臣一身分死就陛下丐千餘人命帝感悟悉達等皆減死論牛𢎞問劉炫曰周禮士多而府史少今令史百倍於前減則不濟其故何也炫曰古人委任責成嵗終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿恒慮覆治若鍜鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由省官不如省事百事不省而望從容其可得乎秦王世民毎破軍克城諸將佐爭取寶貨𤣥齡獨取采人物致之幕府益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時出䑕竊乃其常俗守茍能撫以恩信自然率服安可輕動干戈漁獵其民比之禽獸豈為民父母之意耶竟不許杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彛對曰設官分職各有所司果有愆違御史自應糾舉若徧歴諸司捜擿疵纇大為煩碎長樂公主將出降勅有司資送倍於永嘉長公主魏徴諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎鄧世隆表請集上文章上曰朕之辭令有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無德政文章何為上謂房𤣥齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職比聞聴受詞訟日不暇給安能助朕求賢乎自今尚書細務屬左右丞唯大事應奏者乃闗僕射尚書左丞韋悰論司農求橦價貴於民間奏其隱没上召大理卿孫伏伽書司農罪對曰只為官橦貴所以私橦賤向使官橦賤私橦無由賤矣但見司農識大體不知其過也張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭章然其體輕薄終不成令器若置之髙第恐後進效之劉曉上疏論禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何闗理體文成七步未足化人况盡心卉木之間極筆煙霞之際以斯成俗豈非大謬戴至德為右僕射劉仁軌為左僕射更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有寃結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取之選將當以智畧為本勇力為末今朝廷用人類取將門子弟及犯事之家彼皆庸人豈足當閫外之任李左車陳湯呂䝉孟觀皆出貧賤而立殊功未聞其家代為將也少府監裴匪舒善營利奏賣苑中馬糞嵗得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也尚方監裴匪躬檢校京苑行鬻苑中蔬果以收其利蘇良嗣曰昔公儀休相魯能拔葵去織婦未聞萬乗之主鬻蔬果也乃止狄仁傑同平章事太后謂仁傑曰卿在淮南甚有善政卿欲知譛卿者名乎仁傑謝曰陛下以臣為過臣請改之知臣無過臣之幸也不願知譛者名禁天下屠殺右拾遺張德生男三日私殺羊㑹同僚補闕杜肅懐一餤上表告之明日太后對杜謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭伏罪太后曰朕禁屠宰吉㐫不預然卿自今召客亦須擇人出肅表示之肅大慚舉朝欲唾其面劉知幾表陳四事其一以赦令不息近則一年再降逺則每嵗無遺元日之朝指期天澤重陽之節佇降皇㤙如其忖度咸果釋免或有名垂結正罪將斷決竊行貨賄隨方規避故致稽違幸霑寛宥為善者不預恩光作惡者獨承徼幸古語曰小人之幸君子之不幸斯之謂也太后問鸞臺侍郎同平章事陸元方以外事對曰臣備位宰相若大事不敢不以聞人間細事不足煩聖聴由是忤㫖朱敬則為相以用人為先自餘細務不之視宗楚客令袁守一奏言則天昔在上陽宮不豫狄仁傑奏請陛下監國元忠宻奏以為不可上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎楊孚彈糾不避權貴權貴避之上曰鷹捕狡兎須急救之不爾必反為所噬御史繩奸慝亦然茍非人主保衛之則亦為奸慝所噬矣並通鑑上命宋璟蘇頲為諸皇子制名及國邑之號又令別制一佳名及佳號進之璟等上言七子均養著於國風今臣等所制名三十餘輒混同以進以彰陛下覆幬無偏之德上甚善之山東大蝗盧懐慎以為殺蝗太多恐弗利姚崇曰昔楚莊吞蛭而愈疾孫叔殺蛇而致福奈何不忍於蝗而忍人之饑死乎若使殺蝗有禍臣請當之皇后妹夫尚衣奏御長孫昕以細故與御史大夫李傑不恊昕與其妹夫楊仙玉於里巷伺傑而歐之傑上表上大怒命於朝堂杖殺以謝百僚以書慰傑上欲加牛仙客尚書張九齡曰不可李林甫言於上曰仙客宰相才也何有於尚書九齡書生不達大體上悦明日上曰卿嫌仙客寒微如卿有何閥閲九齡曰臣嶺海孤賤不如仙客生於中華然臣出入臺閣典司誥命有年矣仙客邊隅小吏目不知書若大任之恐不愜衆望前廣州都督裴伷先下獄上與宰相議其罪張嘉貞請杖之張説曰臣聞刑不上大夫為其近於君且所以養亷恥也故士可殺不可辱臣曏巡北邊聞杖姜皎於朝堂皎官登三品亦有微功有罪應死則死應流則流豈可輕加笞辱以皂𨽻待之乎事往不可復追伷先據狀當流豈可復蹈前失上深然之上嘗從容與李泌語及李林甫欲敕諸將克長安發其冢焚骨揚灰泌曰陛下方定天下奈何讐死者彼枯骨何知徒示聖德之不𢎞耳上又謂李泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宮以慰上皇心對曰宜待上皇之命不過晩嵗月之間耳上從之王去榮以私怨殺本縣令當死上以其善用礟免死中書舎人賈至不即行下上表以為去榮無狀殺本縣之君若以礮石一能則免殊死今諸軍技藝絶倫者其徒實繁必恃其能所在犯上復何以止之今惜一去榮之才而不殺必殺十如去榮之才者不亦其傷益多乎裴諝入奏事上問𣙜酤之利嵗入㡬何諝久之不對曰臣自河東來所過見菽粟未種農民愁怨臣以為陛下召臣必先問人之疾苦乃責以營利臣是以未敢對也京兆尹黎幹奏秋霖損稼韓滉奏幹不實渭南令劉澡阿附度支稱縣境苗不損上曰霖雨溥博豈得渭南獨無命御史視之損三千餘頃代宗嘆息久之曰縣令字人之官不損猶應言損乃不仁如是乎不癡不聾不為阿家翁兒女閨房之言何足聴也朱泚獻猫䑕同乳不相害者以為瑞常衮帥百官稱賀中書舎人崔祐甫獨不賀曰物反常為妖猫捕鼠乃其職也今同乳妖也何以賀爲代宗將發引上送之見輼輬車不當馳道稍指未丁之間問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行天不以地有惡木而廢發生天子不以時有小人而廢聴納以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之奸邪役智彌精失道彌逺項籍納秦卒二十萬慮其懐詐復叛一舉而盡坑之其於防虞亦已甚矣漢髙豁達大度天下之士至者納用不疑其於備虞可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荆軻奮其隂計光武寛容博厚而馬援輸其欵誠豈不以虛懐待人人欲思附任數裁物物終不親情思附則感而悦之雖冦讐化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣智出庶物有輕待人臣之心思周萬幾有獨馭區宇之意謀吞衆畧有過慎之防明照羣情有先事之察嚴束百辟有純任刑政之規威制四方有以力勝殘之志劉從一詣蕭復曰欽緒宣旨令從一與公議朝來所言事即奏行之勿令李盧知復曰李盧不堪為相乃罷之既在相位安得不與之同議李泌曰宰相之職不可分也非如給事則有吏過兵過舎人則有六科至於宰相天下之事咸共平章若各有所主是乃有司非宰相也裴垍為相奏天下留州送使物垍一切用省估宰相議誅李錡大功以上親兵部郎中蔣義曰錡大功親皆淮安靖王之後也淮南有佐命之功陪享廟堂豈可以末孫為惡而累之乎又欲誅其兄弟又曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎宰相以為然盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房𤣥齡康誥曰父子兄弟罪不相及李絳言魏博五十餘年不霑皇化一旦舉六州之地來歸刳河朔之腹心傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四隣勸慕請發内庫錢百五十萬緡以賜之左右官宦以為所與太多後有此比將何以給之上以語絳絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下柰何愛小費而遺大奸不以收一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取期年而克之其費豈止百五十萬緡而已乎通鑑李愬既執送元濟裴度建彰義軍節擁降卒萬餘人以入焉李愬具櫜鞬候度馬首度將避之愬曰此方不識上下等威之分久矣請公因以示之度以宰相禮受愬謁衆聳觀焉明日愬以師還文成柵度乃視節度使觀察及刺史事蔡人大悦髙郢掌制誥家無留稾或勸盍如前人傳制集者荅曰王言不可藏私家唐書上謂宰相薦人勿問親疏朕聞竇易直為相未嘗用親故果賢避嫌而棄之是亦不為至公也上對栁公權等於便殿上舉衫袖示之曰此衣已三澣矣衆皆美上之儉德公權獨無言上問其故對曰陛下貴為天子冨有四海當進賢退不肖納諫諍明賞罰乃可以致雍熈服澣濯之衣乃末節矣通鑑李師道上私錢六百萬為魏徴孫贖故第白居易言陛下宜以賢者子孫贖而賜之師道人臣不宜掠美唐書樂工羅程善琵琶恃恩暴横以睚眦殺人繫京兆獄諸樂工欲為之請曰羅程負陛下萬死然臣等惜其天下絶藝不復得奉宴遊上曰汝曹所惜者羅程藝朕所惜者髙祖太宗法竟笞殺之通鑑李德裕節制西川吐蕃以維州降牛僧孺曰吐蕃失一維州未足損其勢得百維州何所用之徒使棄信有害無利此匹夫所不為詔使德裕反降者唐書衡王友諒貴重李振等見皆拜之李愚獨長揖帝聞而讓之曰衡王於朕兄也朕猶拜之卿長揖可乎對曰陛下以家人禮見衡王無私故不敢妄有所屈遇赦則曲者幸免直者銜寃怨氣升聞乃所以致災非所以弭災也或言營田鬻之可得錢十萬緡以資國帝曰利在於民猶在國也朕用此錢何為帝政事無小大皆親決百官受成於上而已河南推官髙錫上書諫以為四海之廣萬㡬之衆雖堯舜不能獨治必擇人而任之今陛下以一身親之天下不謂陛下聰明睿智足以兼下官之任皆言陛下褊迫疑忌舉不信羣臣也不若選能知人公正者以為宰相能愛民聽訟者以為守令能豐財足食者使掌金榖能原情守法者使掌刑獄陛下何必降君尊而代臣職無乃失為政之本乎通鑑集天子不問有無諸侯不言多少百乗之家不畜聚斂之臣昔人所以掩絶纓而飲盜馬者豈必忘其情愛蓋知為君之體然也陸宣公文善醫者不視人之瘠肥察其脈之病否而已矣善計天下者不視天下之安危察其紀綱而已矣是故四肢雖無故不足恃也脈而已矣四海雖無事不足矜也紀綱而已矣以志為養兮何有牛羊周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曽參之父名晳曽子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也唯宦官宮妾乃不敢言諭及機以為觸犯士君子立言行事宜何所法守也凡事父母得如曽參可以為孝矣作人得如周公孔子亦可以止矣今世之士不務行曽參周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也夫周公孔子曽參卒不可勝勝周公孔子曽參乃比於宦官宮妾則是宦官宮妾之孝於其親賢於周公孔子曽參者耶韓文本朝仁宗初立英宗為皇子令中書召學士草詔學士王珪當直召至中書諭之王曰此大事也必須面奉聖旨於是求對明日面稟得旨乃草詔羣公皆以王珪真得學士體師魯凡事有小而可矜者必惻然不忍發見顔貌及臨大節斷大事則必如金石雖鼎鑊前列不可變也朝議在官年七十而不致仕有司以時按籍舉行胡宿以為養亷恥厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸賢之意當少緩其事使人得自言而全其美節歐公文陳執中為相范蜀公嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今隂陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所責宰相識者韙之范鎮墓誌歐陽修余靖蔡襄王素欲引石介范文正公曰介為諫官必以難行之事責人君以必行少拂其意則引裾折檻叩頭流血無所不為主上無失德政事自修安用如此諫官諸公伏其言東軒筆録韓魏公為相日曽公為亞相趙康靖與歐陽公為叅政凢事該政令則曰問集賢該典故則曰問東㕔該文學則曰問西㕔至於大事則自決之人以為得宰相體史有人欲為范希文買緑野堂希文不肯曰在唐如晉公者是可尊也一旦取其物而有之如何得安寧使耕壊及他有力者致之已則不可取言行録日月經天大可以被四海而小或不能入一屋之下彼固無用此區區之小明也老泉昔謝安破苻堅書至安與客圍棊不輟曰小兒輩遂已破賊安亦非矯情蓋萬目觀望事體應爾東坡論寜容網目漏吞舟誰能烹鮮作竒碎後山周世宗嘗作詩以示學士竇儼曰此可宣布否儼曰詩專門學王者若勵精功課在機務茍切磋失至又不盡善世宗解其意遂不作詩楊億劉綽天聖中為京西漕分遣屬官盤量諸郡在庾之糧凡收十餘萬石歸朝上殿具劄子乞付三司收繫時章獻太后垂簾問曰已盤量者條貫許再盤量否曰向來盤量官多徇顔面不肯盡收入歴又曰卿識王曽張知白呂夷簡魯宗道否此四人者皆不因盤量收出斛斗致身於此劉大慚謂人曰當是時殿上壁隙可入我亦入矣史不識大體子主好詳則百事荒凡人之患蔽於一曲而暗於大理荀子史平原君未觀大體史本傳好荷禮酈食其傳大臣特以簿書不報期㑹之間以為大故夫移風易俗使天下囘心而向道類非俗吏之所能為也俗吏之所務在於刀筆簿書而不知大體韓安國謂田蚡曰今人毁君君亦毁之譬如賈豎女子爭言何其無大體也朱買臣吾丘壽王司馬相如東方朔枚皋終軍等並在左右每令與大臣辨論中外相應以義理之文大臣數屈焉務在於簿書期㑹斷獄聽訟而已有司無仲山甫將相之才不能為一代之制而徒鈎摭細㣲毛舉數事以塞詔而已元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分寸節度窮極幽眇大司農江馮上言宜令司𨽻校尉督察三公蜀楊顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容髙枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也帝嘗卒至尚書門陳矯曰此自臣職分非陛下所宜臨也臣若不稱其職則請就黜退陛下宜還帝慙而反石越退告人曰公父子好為小仁不顧大計終當為人擒耳殷仲堪雖有英鑒資望猶淺議者不以為允到官好行小惠綱紀條目不能舉乃至營造細小之事出納輕微之物一日之内酬答百司乃日旰忘食夜分未寢帝善屬文不欲人出其右薛道衡死帝曰更能作空梁落燕泥否王胄死帝誦其佳句曰庭草無人隨意緑復能作此語耶房𤣥齡王珪掌内外官考權萬紀劾其不平魏徴奏萬紀闇於大體近月征伐虛有賞格而無事實蓋由小才之不知大體徒惜勲庸妄虛倉庫不知士不用命所損㡬何髙𢎞本正牙奏事白理逋負詔公卿百僚自今勿令正牙奏事議者以為正牙奏事自武德以來未之或改所以達羣情講政事𢎞本無知黜之可也不當因人而廢事杜黄裳曰明主勞於求人而逸於任人此虞舜所以能無為而治者也至於簿書獄訟煩碎之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳餐皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也或者不知體要衒能矜名親小勞侵衆官聽聽於府廷而遺其大者是不知相道者也通鑑亦有西漢列傳集其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊收六職百役之事聽聽於府廷而遺其大者逺者所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不以謬與栁子厚集刀筆之吏寡大方陳子昻集瑣細經旅瑣瑣斯其所取災易禮煩則亂書水煩則魚鼈不大禮子數粒而炊簡髪而櫛莊子簡絲數米秤薪而爨數米而炊可以治小淮南子史其細已甚民弗堪也左襄二十九年銖銖而稱之至石必差寸寸而度之至丈必過律令煩多苛請它比日以益滋自明習者不知所由欲以曉諭衆庶不亦難乎宣為内史其治米鹽事皆闗其手鈎摭細微毛舉數事公孫述為政苛細察於小事如為清水令時諸葛亮罰二十以上皆親覽北齊肅宗即位尤自勤勵時人服其明而譏其細嘗問舎人裴澤對曰有識之士咸言傷細厙狄顯安亦曰陛下太細天子乃更似吏御史中丞姚廷筠奏豈有修一水竇伐一枯木皆取斷宸衷搜擿疵纇大為煩碎通鑑集推得失去就於方寸銖黍間苛察子水至清則無魚人至察則無徒家語察見淵魚者不祥智料隱匿者有殃列史衛嗣君好察微隱縣令有發褥而席敝者嗣君聞之乃賜之席又使人過闗市而賂之金既而召闗市問有客過與汝金汝囘遣之秦任刀筆之吏爭以亟疾苛察相髙其敝徒文具而無實通鑑吹毛求疵苛察徼繞披抉其閨門而殺之西漢列傳性褊察好以耳目隱發為明東漢鍾離意傳杜林曰大漢初興蠲除苛政及至其後漸以滋章吹毛索疵果桃菜茹之饋集以成贓梁賀琛曰惟務吹毛求疵擘肌分理以深刻為能以繩逐為務上書字誤者即治其罪考校簿領毫釐不差然皆不達大體督責苛碎李輔國置察事數十人潛令於人間聽察細事即得推按陳敬瑄多遣人歴縣鎮詗事謂之尋事通鑑徇公忘私經以公滅私書靡室靡家玁狁之故王事多難不遑啟居豈不懷歸畏此簡書王事靡盬不遑啟處不遑將父不遑將母詩言公事不言家事内稱不避親外舉不避怨推賢而進達之不望其報苟利國家不求富貴禮子君子能以公義勝私欲公道達而私門塞公事明而私事息荀子為國薦賢滅身無憾劉子史楚鬬榖於菟為令尹自毁其家以紓楚國之難子太叔曰周公殺管叔而放蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸游先國後巳惠伯曰公事有公利無私忌仲尼曰叔向古之遺直也治國制刑不隱於親不以家事辭王事昔趙衰以壺飱從徑餒而弗食左趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其乘車千行獻子執而戮之宣子召而禮之曰吾言汝於君懼汝不能也吾故以是觀汝告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣國語晉李離為晉文公理過聴殺人自劾當死文公曰非子之罪也離曰理有法失刑則刑失死則死公以臣能聽微決疑故使為理今過聽殺人當死伏劔而死史循良傳亷頗為趙將藺相如拜上卿位在頗右頗曰我見必辱之相如聞不肯與㑹毎朝時嘗稱病不欲與頗爭列已而出望見頗引車避匿相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏廉將軍哉顧念强秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生吾所以為此者先國家之急而後私讎也史記趙奢受命之日不問家事史趙世家參聞何薨告舎人趣治行吾將入相居無何使者果召參參微時與蕭何善及為相有隙至何且死所推賢唯參薄昭殺漢使者帝不忍加誅使公卿與之飲酒欲令自飲酖昭不肯使羣臣喪服往哭之乃自殺主爾忘身國爾忘家公爾忘私金日磾長子為帝弄兒甚愛之其後弄兒壯大不謹自殿下與宫人戱日磾適見之惡其淫亂遂殺弄兒夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然通鑑趙禹為吏以來舎無食客公卿相過禹禹終不報謝務在絶知友賔客之請孤立行己意而已通鑑問遺無所受請寄無所聴常自稱曰巳倍親而事國身當奉職死節官下終不顧妻子矣郅都奮不顧身以殉國家之急李陵武帝為霍去病治第令視之對曰匈奴不滅無以家為也尹翁歸抱公潔已為近世表抱公絶私西漢尹翁歸傳王章素剛直敢言雖為鳯所舉非鳯專權不親附鳯乃奏封事言日食之咎鳯專權蔽主之過通鑑漢成紀禽息憂國碎首不恨賈復部將殺人於潁川潁川太守冦恂捕得繫獄戮之於市復以為恥還過潁川謂左右曰吾與冦恂並列將相而為其所陷今見恂必手劍之恂知其謀不與相見姊子谷崇曰崇將也得𢃄劔侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於亷頗者為國也通鑑隂興與同郡張崇上谷鮮于裒不相好知其有用猶稱所長而達之友人張把杜禽與興厚善以為華而少實但私之以財終不為言呉漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已祭遵為征虜將軍同産弟遜以遵無子取妾送遵不受曰自以身任於國不敢慮絶嗣之計後漢本傳羣臣朝賀大將軍梁冀帯劔入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劔冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖百僚肅然河南尹不疑嘗舉陵孝亷乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色左雄薦周舉為尚書雄舉故冀州刺史馮直嘗坐贓受罪周舉以此劾奏雄雄曰進君適所以自罰一作伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不悟君之意與宣子殊也遼西太守趙苞到官遣使迎母及妻子垂當到郡道經栁城值鮮卑萬餘人入塞冦鈔苞母及妻子遂為所刼質載以擊郡苞率騎二萬與戰對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微禄奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母妻皆為所害苞葬訖謂鄉人曰食禄而避難非忠也殺母以全義非孝也如是有何面目立於天下遂嘔血而死通鑑橋𤣥與陳琳有隙及在公位薦琳為廷尉後漢君子仕不為己職思其憂東漢文紀蘇章遷冀州刺史故人為清河太守章行部按其姦賍乃請太守為設酒餚陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪諸葛瑾毎奉使至蜀與其弟亮但公㑹相見退無私面董尋曰臣聞古之直士盡言於國不避死亡故周昌比髙祖於桀紂劉輔譬趙后於人婢天生忠直雖白刄沸湯往而不顧者誠為時王憂惜天下也臣自比於牛之一毛生既無益死亦何損李憙在朝姻親故人與之分衣共食而未嘗私以王官通鑑氐人齊萬年反朝臣惡周處強直使𨽻夏侯駿西征孫秀謂之曰卿有老母可以此辭處曰忠孝之道安得兩全既辭親事君父母安得而子乎晉書何充所選用皆以功効不私親舊王坦之卒臨終與謝安桓沖書惟以國家為憂言不及私通鑑郄超卒郄愔哀悼成疾門生呈與桓温往反宻計愔於是大怒曰小子死恨晩矣更不復哭王文度言不及私晉書魏源懷按朔鎮將元尼湏與源懐舊交貪穢狼籍置酒請懐曰命之短長由卿之口豈可不相寬貸懐曰今日源懐與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處耳尼須揮淚無以對案劾抵罪魏崔楷為殷州刺史或勸楷留家單騎之官楷曰吾聞食人之禄者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身速戰不息死者相枕終無叛志通鑑屈突通從討王世充時通二子在洛陽帝曰以今東路委公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死報國今日之行正當先驅二兒死自其分終不以私害義新唐書莅官勁正有犯法者雖親無囘縱上悉以軍中資糧器械簿書委岑文本夙夜勤力躬自科配籌筆不去手精神耗竭言辭舉措頗異平日上見而憂之謂左右曰文本與我同行恐不與我同返是日遇暴疾而薨通鑑王義方彈李義甫義甫謂之曰王學士得御史是義甫所舉今日之事豈無愧乎對曰義方為公不為私張易之張昌宗居中用事桓彦範謀誅之彦範以事白其母母曰忠孝不兩全先國後家可也太后之遷上陽宮也姚元之獨嗚咽流涕曰元之前日從公誅姦逆人臣之義也今日別舊君亦人臣之義也雖獲罪實所甘心同上丈夫當敢言地要須明目張膽以報天子焉能碌碌以保妻子耶推誠蹇諤不私形骸唐書皇后妹夫奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而毆之傑上表上大怒命於朝堂杖殺以謝百僚李國貞治軍嚴朔方將士不樂皆思郭子儀故王元振為之作亂子儀至軍元振自以為功子儀曰汝臨賊境輒害主將若賊乗其釁無絳州矣吾為宰相豈愛一卒之私邪收元振及其同謀者四十人皆殺之通鑑郭子儀禁無故軍中走馬南陽夫人乳母之子犯禁都虞候杖殺之諸子泣訴於子儀且言都虞候之横子儀叱遣之明日以事語僚佐而嘆息曰子儀諸子皆奴材也不賞父之都虞候而惜母之乳母子非奴材而何李晟曰幸得備將相茍容身不言豈可謂有犯而無隱耶崔祐甫作相未逾年凡除吏㡬八百員多稱允當上曰有人謗卿所除擬官多涉親故何也祐甫曰進擬必須諳其材行臣若與之相識方可粗諳若素不知聞何以知其言行獲謗之由實在於此唐書裴晉公遺言不及家事唐書吕夷簡彈楊憑貶臨賀尉親友無敢送者徐晦獨至藍田與别權徳輿謂之曰母乃為累乎對曰晦自布衣䝉楊公知奬今日逺謫安得不與之別後數日夷簡奏為監察御史晦謝曰平生未嘗得望公顔色公何從而取之夷簡曰君不負楊臨賀豈負國乎裴垍器局峻整人不敢干以私嘗有故人自逺詣之垍資給優厚從容欵狎其人乗間求京兆判司垍曰公才不稱此官不敢以故人之私傷朝廷至公他日有盲宰相憐公者不妨得之垍則必不可唐書李固言薦崔求為起居舎人鄭覃再三以為不可曰公事勿相違覃曰宰相盡同則事必有欺陛下者矣李德裕以栁仲郢為京兆尹素與牛僧孺善謝德裕曰不意太尉恩奬及此仰報恩德敢不如竒章公門館德裕不以為嫌髙季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之緩杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威衆辦事耳以白金數百兩遺之劉仁瞻幼子崇諫夜泛舟渡淮北為小校所執仁瞻命腰斬之周廷搆求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面見將士也輒命斬之然後成喪通鑑傳記晉文公問咎犯誰可為西河守對曰子羔曰非汝之仇歟曰君問誰守者非問臣之仇也子羔見而謝之咎犯曰薦子者公也吾不以私事害公議説苑許允為吏部郎多用其鄉里魏明帝遣虎賁收之允曰臣之鄉人臣所知也世説燕梁琛使秦琛從兄奕先在秦為尚書郎㑹罷秦王欲令琛止奕舎琛語有司曰昔諸葛兄弟各處三國及其聘集公朝相見退無私面奕數就邸問東國起居琛曰今三方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞何以見問十六國春秋魏文侯問解狐曰將定西河之守誰與用對曰荆伯栁賢人文侯曰是非子之讐耶對曰君問守非問讐也伯栁見解狐而謝之狐曰言子者公也怨子者私也韓詩外傳集棄身鋒刃端性命安可懐父母且不顧何言子與妻名編壯士籍不得中顧私捐軀赴國難視死忽如歸白馬篇丈夫誓許國憤惋復何有杜詩知事君以道無憚殺身慕當官而行不求利己韓文孔席不暇暖墨突不得黔欲為聖明除弊事豈將衰老計殘年韓詩螻蟻之命甚輕社稷之計甚重白樂天不厚於身而厚於君不潤於家而潤於國唐文國計已推肝膽計家財不為子孫謀羅隱集本朝韓魏公喜用知名士或不識其面既用之其人亦不知所薦進也富公使契丹始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之神道碑孔道輔卒客謂德用曰此害公者也公曰彼以職言事何為害我可惜朝廷亡一直臣於是言者終身以為愧歐公作王德用銘范忠宣公在相位凡薦引人才必以天下公議所薦士未嘗知出於公公亦未嘗示恩意於人三朝言行録張知白語同僚曰吾曹本書生致位至此唯徇公滅私可以報國聖宋掇遺記纂淵海卷五十三
