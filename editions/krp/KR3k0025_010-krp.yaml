body:
  text: 記纂淵海卷十宋潘自牧撰郡縣部兩浙東路温州倚郭一外縣三永嘉平陽瑞安樂清郡號東甌鴈蕩東嘉永嘉東海州沿革斗牛須女之分野星紀之次禹貢揚州之域春秋戰國並屬越秦屬閩中郡漢屬㑹稽郡呉屬臨海郡晉明帝太寧元年置永嘉郡隋平陳廢郡屬處州大業復永嘉郡唐武德五年置永嘉州貞觀廢之屬括州上元元年置温州天寳曰水嘉郡石晉陞靖海軍節度地理沿革表縣沿革永嘉本漢東甌國惠帝封閩君睡為東越王都此後為閩越所攻國徙東淮之間此為治縣地東漢改治縣為章安縣以縣之東甌鄉置永寕縣屬㑹稽郡呉屬臨海郡晉置永嘉郡於此隋平陳廢郡改永嘉縣大業屬永嘉郡唐初置嘉州後屬括州上元為温州治所平陽晉太康元年分安固南横嶼屯置始陽縣後改横陽屬臨海郡太寧改屬永嘉郡宋省之唐武德復置横陽屬東嘉州貞觀省之大足元年析安固復置屬温州後梁改曰平陽瑞安本東漢章安縣地呉置羅陽縣又改安陽晉改安固屬臨海郡太寧屬永嘉郡隋省之唐武德復置屬永嘉州貞觀屬括州上元屬温州五代改曰瑞安樂清晉孝武分永寧縣置樂城縣屬永嘉郡隋廢之唐武德復置屬東嘉州七年省之載初復置屬温州五代改曰樂清沿革表形勝東山一名海壇山去子城西南二里西山去城三里為永嘉登覧之勝趣西湖在州南一里南塘在鴈山之南道敬亭山在鴈池之南思逺樓瞰㑹昌湖龍潭在瑞安東北象浦鹿岩在樂清鴈池在敬亭西鴈南蕩在平陽縣北鳯凰岩在平陽之鳯林鄉石馬岩在瑞安之崇泰鄉石龜池在榕城洞前白鶴山在樂清有白鶴寺仙岩山在瑞安東北仙壇山在平陽東㑹昌湖在州西南飛霞洞在積榖山明月洞在平陽羅浮山在州北八里華葢山在永嘉縣為第十八小洞天自應山以下潭有八自玉女而下洞有九在永嘉歸仁鄉輿地紀勝人物皇朝王景山發明景衡作儒志一編為永嘉開山祖林石元豐間不為新經獨以春秋教授鄉里王公彦元符末上書論司馬光無罪中宫廢立事禁錮二十餘年劉安節與弟安上俱從伊川學周行已從伊川學戴述與弟迅俱以文學稱號二戴又有戴溪號岷隠先生陳侃至孝五世同居詔表門閭陳鵬飛字少南林艾軒稱為宇宙中第一輩王十朋紹興掄魁陳傅良號止齋先生蔡幼學弱冠於春魁秋魁蘭宮葉適號水心先生輿地紀勝集䟽峯抗髙館對嶺臨迴谿池塘生春草園栁變鳴禽莓莓蘭渚急藐藐苔嶺髙石室貫林陬飛泉發山椒謝靈運衆山遙對酒孤嶼共題詩孟浩然東甌傳舊俗風日江邉好顧况孤嶼亭何處天涯水氣中杜詩本朝太平興國三年降靖海軍額政和七年陞應道軍額建炎罷之沿革表洞中花木何曽老月畔樓臺轉更寒楊蟠題仙岩不知康樂後池草幾逥春一片繁花海上頭從來喚作小杭州水如棊局分香陌山似屏風遶畫樓思逺城南曲西岑今渡頭緑觴春送酒紅燭夜行舟楊蟠鴈山新入春逰眼却笑平生未見山王十朋東海獨來觀出日石橋先去踏長虹東坡净名庵下靈巖路峻壁層崖半倚空我愛老僧年八十一生常在翠屏中吕夷簡婺州倚郭一外縣六金華東陽義烏蘭溪永康武義浦江保寧軍節度郡號東陽金華婺女寳婺雙溪武勝軍州沿革粤地星紀之次牽牛婺女之分野禹貢揚州之域春秋戰國皆屬越秦以後屬㑹稽郡漢西部都尉治此呉孫皓寳鼎元年分置東陽郡梁置金華郡陳置縉州隋平陳置婺州大業為東陽郡唐武德置婺州天寳曰東陽郡屬江南道石晉陞武勝軍節度沿革表縣沿革金華本漢㑹稽烏傷縣地東漢初平三年分烏傷南鄉置長山縣呉為東陽郡治梁置金華郡隋置州改長山縣為呉寧開皇十二年改東陽十八年改金華東陽本漢烏傷縣地唐垂拱二年分義烏縣初置隋改舊東陽縣為名義烏本漢烏傷縣屬㑹稽郡呉以後屬東陽郡唐武德四年置綢州並析置華川縣七年廢州省華川改烏傷為義烏縣蘭溪本金華縣地唐咸亨五年析金華西置蘭溪臨浙江永康本漢烏傷縣地呉赤烏中分烏傷縣上浦初置屬東陽郡唐武德置麗州八年廢州以其縣屬婺州武義本漢烏傷縣地唐天授二年分永康西界置武義縣改曰武成天祐年復名武義浦江唐天寳十三年分義烏蘭溪及杭州富陽置浦陽縣後改曰浦江沿革表形勝雙溪在州前有八詠樓三山在義烏縣東山之北三峯聳立四井郭璞所鑿曰富井貴井貧井賤井富貴二井人競飲之金華山有金華洞亦名三洞在金華縣為第三十六小洞天金山繡川在義烏縣銅山榖水在金華縣蘭溪在縣南流入東陽江梅溪在蘭溪龍山在金華虎峯豹山在東陽石室山在永康東北二穴相通石巖在金華巖下有洞白雲洞在東陽紫㣲巖在金華石鵝巖在武義其側有金雞巖輿地紀勝人物漢顔烏父亡負土成塜烏銜土助之其吻皆傷因名烏傷縣呉斯敦父偉罪當死乞以身代呉王赦偉罪仍表其閭晉許孜人號所居為孝順里梁何千齡四世同居旌表門閭唐張志和金華人自稱烟波釣徒皇朝宗澤義烏人靖康起兵勤王東萊吕祖謙中詞科陳亮武康人上孝宗萬言書言恢復後中掄魁輿地紀勝集明月雙溪水春風八詠樓嚴維徑入梅花橋雙溪納歸潮若㠶金華岸赤松若可招李白天清婺女出土厚絳人多劉文房黛色晴峯雲外出縠紋江水縣前流越起江天婺女分風月隠侯詩包何東陽本是佳山水何况曽經沈隠侯化得郡人好吟詠如今縣令亦風流劉禹錫本朝淳化元年改保寧軍節度沿革表集大野幾星分婺女清風萬古感顔烏類苑天下東陽山水國星分寳婺斗牛區米元章休文詩債滿東呉八詠篇章意思殊見説當年清瘦甚不知全為苦吟無趙渭南水通南國三千里氣壓江城十四州李易安東陽美山水知子本風流稍去何平叔還追沈隠侯梅聖俞送祝熈末繇金華郡抽還石室書山谷衢州倚郭一外縣四西安江山龍逰常山開化郡號三衢西安太末太蔑姑蔑信安郡州沿革星紀之次牽牛須女之分禹貢揚州之域春秋為越西鄙秦屬㑹稽郡漢為㑹稽郡太末縣呉東陽郡地晋為東陽郡信安郡唐武德四年析婺州之信安置衢州六年没于輔公祐州遂廢垂拱二年復置天寳曰信安郡屬江南道五代屬呉越錢氏地理沿革表縣沿革西安本春秋越國姑蔑之地漢為太末縣地東漢初平三年析置新安屬㑹稽郡呉又分新安置定陽縣晉太康元年改曰信安屬東陽郡宋省定陽縣入信安唐武德置衢州治此又置定陽尋省之如意元年析龍丘置盈川縣元和省之咸通中改信安為西安江山唐武德四年析信安初置須安縣八年省之永昌元年復置五代呉越改為江山縣龍遊本姑蔑地秦以後為太末縣屬㑹稽呉以後屬東陽隋平陳省太末入東陽郡長山縣唐武德四年復置太末又置榖州治之八年並省入信安貞觀復置更名龍丘𨽻婺州垂拱改屬衢州呉越改名龍遊常山亦漢太末縣地咸亨三年析信安初置屬婺州垂拱二年𨽻衢州乾元間屬信州尋又來屬開化本常山縣地本朝初置沿革表形勝龜峯在郡治後鳯山在西山之溪源雞岩在山上水簾在江山仙居院前仙霞嶺在江山甚髙峻烟蘿洞在江山縣南三里頭有趙清獻留題有三石峯景星岡乃黄在戰塲爛柯山在西安一名石室山又名石橋山乃清霞第八洞天浮葢山在江山西南有山洞石壁容車山在常山北有碧玉蓮花二洞紫㣲山翠微山在西安翠光山在龍遊江郎山在江山縣南有三峯屹立下有江郎神洞山在縣東三十里頂有大湖多巨魚青雲洞白雲岩在江山碧雲洞在西安鳥石山在龍遊近逝兩界輿地紀勝人物晉王質以樵者入山見二童子對奕以所持斧置坐童子曰汝斧柯爛矣質歸鄉里云已百嵗齊徐伯珍兄弟四人皆白首呼為四皓皇朝趙抃諡清獻公御書旌表忠孝之家又有徐惠諲鄭崇徐知新三人與公號邑中四孝周沂自號白雲先生清獻甚敬之周頴江山人從胡安定學以行義稱毛㮚為歙之士曹睦冦攻城不降罵賊遇害徐揆遊太學靖康中上書責敵人遂遇害方允武為宜興巡檢與金人戰死于梅嶺徐徽言為晋軍守城陷抗敵而死輿地紀勝集靈境偶一集洞天碧雲上爛柯遺跡處羽客何由訪劉侍御仙界一日内人間千嵗窮雙棊未變局萬物皆為空樵客返歸路斧柯爛從風惟餘石橋在猶自凌丹虹孟郊浮石潭邉停五馬望濤樓上得雙魚白居易本朝宣和三年改龍遊縣曰盈川後復故乾德三年置開化塲太平興國六年陞為縣沿革表集軒外長溪溪外山捲簾空曠水雲間髙齋有問如何樂清夜安眠白晝閒趙清獻晴波一片如鋪錦浮石江心徹底清濯纓亭對岸烟林雙佛寺隔灘風笛一漁村同上西望柯山正蔚藍衢州只在此山南却愁路盡風猶劇回納清風與破㠶楊誠齋天上樓臺山上寺雲邉鐘鼓月邉僧四時爽氣來無際一㸃紅塵到不能邵康節處州倚郭一外縣六麗水松陽遂昌龍泉縉雲青田慶元郡號括蒼古括縉雲括州州沿革呉地斗分野上應牽牛之宿下當少陽之位處士星見禹貢揚州之域春秋戰國並屬越秦屬㑹稽郡漢東甌地後屬㑹稽呉屬臨海郡晋太寧後永嘉郡隋平陳置處州十二年改為括州後廢屬永嘉郡唐武德復置括州天寳曰縉雲郡大厯避諱改今名屬江南道沿革表縣沿革麗水本漢回浦縣地東漢章安縣地呉臨海郡松陽縣地晉屬臨海又屬永嘉隋平陳分松陽東界置括蒼縣為處州治所唐大厯十四年改今名松陽本漢回浦縣地呉置松陽縣屬臨海郡晉初屬臨海後屬永嘉唐武德中置松州八年廢州屬括州呉越錢氏改曰長松又曰白龍遂昌本漢太末縣地東漢建安十三年置遂昌縣屬㑹稽郡呉赤烏二年改平昌縣晉太康元年復名遂昌屬東陽郡宋省而復置唐武德八年省入松陽景雲二年復置龍泉本晉遂昌松陽二縣地唐乾元二年析置縉雲本隋括蒼縣地唐萬嵗登封元年析置屬括州青田亦隋括蒼縣地唐景雲二年析置慶元本龍泉之松源鄉吏侍胡絃奏置沿革表形勝錦坊在通坊門内多蒔桃銀嶺在遂昌抵婺州境鏡岩在縉雲亦名仙水洞鼎湖在仙都山頂雙溪在遂昌三峯在麗水曰靈峯翠峯岑峯三岩在麗水曰清虗白雲晨曦小括山州治在其上仙都山在縉雲有玉虗宫為第二十九小洞天青田山在青田縣為第三十小洞天縉雲在麗水縣豫章山龍泉湖在龍泉縣石門山在青田縣謝靈運題詩於此紫極宫在遂昌瑞山下緑岩洞在麗水有石洞三金龍洞在玉虗宫後石馬山在龍泉石龜峯在青田白馬山在麗水黄鶴嶺在龍泉輿地紀勝人物皇朝周啓明賜號處州居士何處中登甲科官至太宰呉村居太學號八儁季陵靖康之變遷九廟神主至行在李洞麗水人洪再陷郡父没於冦洞隨官軍收復得殺其父者手刃之呉安國充金國賀正使敵欲脅降之終不屈趙文澤六嵗喪父廬墓有羣䑕銜花白鶴來巢之異楊富老七嵗喪父廬墓感烏鵲來巢木生連理祝公明父子死國輿地紀勝集青溪道士人不識上天下天鶴一隻洞門深鎖碧牕寒滴露研硃㸃周易唐明皇贈葉法善登臺閣瀑布聲中閲簿書唐詩黄帝旌旗去不回空餘片石碧崔嵬有時風捲鼎湖浪散作晴天雨㸃來徐凝杉蘿色裏縉雲川谷灘石門最可觀李白福州倚郭二一閩縣清侯官安外縣十福懐長溪福安源連江德古田羅寜長樂永福閩清威武軍節度福建安撫司提刑司西外宗正司郡號三山福唐閩中七閩閩山合沙長樂郡福山閩越州沿革星紀之次斗牛須女之分禹貢揚州之域春秋七閩地戰國越地楚滅越子孫分散或居閩地秦閩中郡漢髙帝五年閩越王都此武帝時閩越反國除以其地為治縣屬㑹稽郡呉分