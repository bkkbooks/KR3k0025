縣地吳分置觀陽隋省入湘源大業蕭銑置灌陽縣屬永州唐武德省之上元復置石晉置州灌陽屬焉地理沿革表形勝湘水在其北灕水在其南黄華山在湘源青田巖在清湘巖净水在灌陽凍青水玉髄泉在清湘龍川山在灌陽龍隱巖獅子巖華嚴巖波斯巖皆在清湘輿地紀勝人物皇朝朱孝誠母卒結庵墳域冬笋生瑞竹以盖其墳其後郡守碣孝誠之墓曰朱孝子墓其子揚善又於墓側為庵以守其孫浩以母多病終身不娶不飲酒食肉蔣舉居母喪結廬墳側芝生於拳石詔旌表門閭輿地紀勝集殘陽楚水畔獨弔舜時人不及廟前草至今江上春竇羣題二妃廟本朝南北東西幾萬峰郡城如在畫屏中何人截斷湘妃竹半醮秋江作釣筒陶弼嶺開蠻壤斷北路下湘川緑水紋如染丹楓色欲燃同上湘是相分義灕為離别名宋成眷彼湘源之逺實惟嶺管之衡余元一風生化於中區郡境亘於南粤沈現撰璧記武岡軍倚郭一外縣二武岡新寧綏寧郡號都梁夫夷武強武攸軍沿革楚地翼軫之分禹貢荆州之域歴代地理並同寶慶府本朝置軍地理沿革表縣沿革武岡本漢零陵郡都梁縣吳屬邵陵郡晉武帝分都梁置武岡縣又别置建興縣屬邵陽郡宋省武岡入都梁又省建興隋省都梁入長沙郡邵陽縣後復置武攸縣唐武徳改武攸曰武岡又置建興縣屬南梁州後屬邵州七年省建興入武岡本朝置武岡軍治焉新寧本漢零陵郡夫夷縣吳屬邵陵郡隋省入長沙郡邵陽縣五代地入於溪蠻本朝收復置新寧縣綏寧本溪峒地本朝置縣地理沿革表形勝日華山月華山在武岡之雲山明月池深百丈見底寳方山在濟川門外有八嚴洞金城山在武岡縣界金洞驛在綏寧縣紫陽山有周諫議讀書堂滄浪水屈原見漁父處投龍洞在雲山放鶴坡梁崔穆於此羅得二鶴放之得玉璧一雙芙蓉洞在綏寜縣薔薇水見類要都梁山在縣東一百三十里武岡因漢伐五溪蠻保此岡故曰武岡左右二岡對峙輿地紀勝人物五代鄧處訥為邵州刺史㑹節度使閔育為周岳所殺處訥興兵問罪攻岳斬之皇朝周儀為嘉祐名臣輿地紀勝集黔山之巑巫水之磻栁文武岡銘願銘武岡以慰我心同上本朝崇寧四年以郡州疆境廣漠析武岡綏寧二縣置武岡軍熈寧七年得洞蠻徽州之地建蒔竹縣屬邵州元豐六年廢之崇寜二年復置為綏寧縣屬武岡軍又臨口闕亦化外琴州之地崇寧四年置臨岡縣紹興省入綏寧復為寨紹興二十五年收復晩洞徭楊再興所據地置新寧縣屬武岡軍沿革表控制溪洞彈壓諸蠻崇寧敕牒疆境闊户口繁市井稠宻商旅往還楚際南壤元㝠無所不統並同上杏花洞大路﨑嶇曾見千年石斛奴試問金城山裏事只言仙境似蓬壺李思聽杏花塢接投龍洞瀑濺蒼崖鶴骨寒同上黛染峰巒水染藍右分湖北左湖南前江後嶺通雲氣萬壑千林送雨聲陳簡齊山中八洞列天巧於此覷誰謂寶方小方是洞天數鄭汝諸桂陽倚郭一外縣二平陽藍山臨武郡號平陽藍山南平小桂郡軍沿革楚分野於辰在已禹貢荆州之域歴代地理並同郴州本朝置軍地理沿革表縣沿革平陽本漢桂陽郡郴縣地晉置桂陽縣屬平陽郡陳郡縣俱廢隋大業末蕭銑復置唐武德十年省之八年復置屬郴州五代廢之本朝復置𨽻桂陽藍山本漢桂陽郡南平縣地宋省之唐咸亨復置屬郴州天寳改今名本朝改屬桂陽臨武本漢桂陽郡臨武縣隋屬郴州唐如意改曰隆武神龍復舊名五代廢之本朝復置屬桂陽地理沿革表形勝藍嶺在平陽跨藍山縣界藍山在本縣鑑湖在軍治盛夏不涸豐湖源岀寶積山前金粟巖在臨武西北寳山廟在軍治西芙蓉山在城西下有蒙泉楊梅山在臨武鹿頭山在東門獅子巖在平陽白竹岡下襄陽山華隂山晉平山皆在藍山縣輿地紀勝人物晉谷儉為甘卓所舉恥州少士試髙第除郎中唐劉景擢第劉禹錫以詩送之皇朝葉盖以賦魁上庠見者目為南瑞黄照隣為職方郎中有讀書堂在郡西二里邦人號曰職方岩輿地紀勝集秦雲連天海相接桂水横烟不可涉李白千里楓林烟雨深無朝無暮有猿吟元微之本朝天禧元年置桂陽監復置平陽縣治郭下紹興三年升桂陽郡復置臨武縣𨽻焉景德元年以郴州藍山縣𨽻桂陽監沿革表一從投迹三湘外兩度登髙五嶺間張舜民嶺開越嶠通交趾路轉荆門入九疑潘正夫鹿頭屹立青疑染龍渡横飛勢欲來杜圭官中逐月催租税不征榖帛只征銀侁章記纂淵海卷十三
