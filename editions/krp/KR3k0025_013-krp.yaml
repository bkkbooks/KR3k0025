body:
  text: 記纂淵海卷十三宋潘自牧撰郡縣部京西南路房州倚郭一外縣一房陵竹山保康軍節度郡號房陵防渚上庸白馬庸國竹山州沿革楚地翼軫分野鶉尾之次禹貢梁州之域春秋麋庸二國戰國屬楚秦以後屬漢中郡魏置新城郡晋新城上庸二郡梁立岐州後魏改光遷國後周改遷州隋大業廢州為房陵郡唐武德曰遷州又於竹山縣置房州貞觀廢遷州移治房陵為房陵郡地理沿革表縣沿革房陵漢屬漢中郡東漢屬新城郡後魏分置大洪縣後周改永清改房陵縣為光遷唐貞觀改光遷曰房陵為房州治本朝省永清入焉竹山本古庸國漢為漢中郡上庸縣魏分置上庸郡南朝廢之梁置安城新豐二縣西魏改安城曰竹山置羅州改新豐為上庸後周改孔陽隋改羅州曰房州孔陽復曰上庸唐貞觀徙房州治房陵一縣屬焉本朝省上庸入竹山地理沿革表形勝方城山在竹山縣東左傳云楚國方城以為城庸城山在竹山縣西舊名垂鼓山龍祗山在竹山縣南云王若冲於此昇天雞鳴山馬息山馬盤山馬塞山皆在房陵横鞍山與庸城山相連建鼓山爛柯山覆船山停舟山皆在房陵鳯溪鰲水在竹山青峯赤崖白谷皆在房陵又房陵有三十四山三十五溪見寰宇記輿地紀勝人物周尹吉甫有廟在城西房之人尹姓為多後漢黄香有至孝名輿地紀勝集惟君固房陵節誠貫古今李白贈韋房州本朝雍熈三年升保寧軍節度開寶中省永清上庸二縣沿革表有客常談解散川偶因晴景到山前溪流似鏡清無底石壁如門翠挿天夜氣結成三洞雨春渠飲盡一川田臨行始覺房陵好更欲遲留住一年張舜民度險聊憑九節杖凌虛來謁三花岩章獬女媧山下少人行澗谷聲中一鳥鳴劉光祖房陵郡僻皆山川竹山更在房西偏道由房城絶險阻髙崖峻嶺相綿延邵勉十里平郊連郡堞一溪清水溉民田周絢郢州倚郭一外縣一長夀京山富水郡防禦郡號富水石城效郢郢都州沿革楚分野鶉尾之次禹貢職方皆荆州之域春秋戰國屬楚秦屬南郡漢屬江夏郡晋竟陵郡地梁屬南司北新二州西魏屬安州後周置石城郡兼置郢州隋廢州置竟陵安陸二郡唐武德置温州又置郢州州廢𨽻部州貞觀廢温州復郢州天寶曰富水郡地理沿革表縣沿革長壽本漢江夏郡竟陵縣地晉元康分江夏西部置竟陵郡治此宋置長夀縣屬竟陵後周置石城郡長夀𨽻焉唐屬郢州京山本漢江夏郡雲杜安陸二縣地東漢置富水鎮於南新市縣地晋置新陽縣梁置新州梁寧郡西魏改角陵改南新市為富水縣置富水郡隋改角陵曰京山屬安陸郡唐武德以京山富水置温州貞觀州廢屬郢州本朝省富水入京山地理沿革表形勝石城在長夀縣羊祜鎮荆州立石城以為固今港源出樠木山内方山又名章山西魏於此立郡京源山在京山縣東武陵山又名樠木山七寶山五華山多寶潭皆在京山縣龍鳯港在城南鶴池在長夀鳯凰池在京山寶香山在長夀縣北輿地紀勝人物春秋申包胥吳伐楚入郢包胥求救於秦哭七日七夜不絶聲戰國宋玉師事屈原唐陸羽廬於太門山乃舊京山縣境唐書以為復州竟陵人非也輿地紀勝集郢客吟白雪遺響飛青天徒勞歌此曲舉世誰為傳誠為巴人唱和者乃數千吞聲何足道嘆息空凄然李白雪中梅下與誰期梅雪相兼一萬枝若是石城無艇子莫愁鄉自有愁時李商隱善石城有女子居白雪樓歌唱名莫愁石城昔為莫愁鄉莫愁魂散石城荒江人依舊棹江岸江岸還飛雙鴛鴦鄭谷故郢生秋草寒江淡落暉劉文房賴得竟陵守時聞建安吟贈别折楚芳楚芳摇衣襟孟東野白雪樓中一望鄉青山簇簇水茫茫白樂天本朝乾德三年省富水縣沿革表折楊黄華笑者多陽春白雪和者少知音四海有幾人况乃區區郢中小王介甫石城目斷空殘照白雪非人只麗譙魏泰陽春樓側春方到白雪樓邉雪未殘范純仁三峽雲烟繞郢水兩川風月接荆門同上蒼茫遺珮憐交甫零落清歌送莫愁孔夷傷心白雪陽春麗極目朝雲暮雨非張衆村近莫愁連竹場人歌楚些下蘋洲任璜唐州倚郭一外縣四泌陽桐柏比陽方城湖陽郡號淮安泌陽泌水方城桐柏州沿革禹貢豫州之域春秋屬楚戰國屬韓秦以後屬南陽郡元魏置東荆州西魏改淮州為重鎮隋改顯州州廢置淮安郡唐武德曰顯州貞觀改唐州天寶曰淮安郡天祐曰泌州五代後唐復舊名石晋又為泌州後漢仍舊地理沿革表縣沿革泌陽本漢南陽郡舞隂平氏二縣地晋改平氏為西平氏屬義陽郡復置漢廣郡元魏置石馬縣隋置舂陵郡廢漢廣以平氏屬淮安郡唐屬唐州貞觀省石馬入湖陽開元復置天寶改泌陽天祐州自比陽徙治于此改泌州後復故湖陽本春秋蓼國漢為南陽郡湖陽棘陽二縣晉並省之元魏復湖陽置西淮安郡及南襄州後郡廢改州為南平州西魏改昇州又改湖州後周改置昇平郡隋開皇廢仁夀改昇州州廢以湖陽屬舂陵郡唐屬唐州比陽本漢南陽郡舞隂縣地元魏置陽平縣及東荆州西魏改淮州又分置江夏郡尋廢為戍隋開皇為顯州改陽平為饒良以江夏戍為慈丘縣大業改饒良為比陽縣唐二縣屬顯州貞觀屬唐州五代後周省慈丘入比陽桐柏本漢南陽郡平氏縣地梁置義鄉縣及華州上川郡西魏改淮州後改純州尋廢之隋廢郡改縣曰桐柏唐武德屬純州貞觀州廢屬唐州方城本漢南陽郡堵陽及葉二縣也晉後皆廢西魏置方城縣及襄邑郡隋屬淯陽郡唐武德屬兆澧州貞觀屬唐州地理沿革表形勝泌水在泌陽縣南方城山自比陽至方城縣相比連百里桐柏山在桐柏縣淮水出焉黄城山在方城縣西沮溺耦耕之所有水東注乃子路問津之處西唐山在泌陽髙鳯隠居漢書鷰子山在泌陽醴水源出桐柏山太湖在比陽縣天目山蠙珠潭在桐柏縣又隋開皇中置蠙珠觀並見贅錄本朝開寶五年省平氏縣入泌陽沿革表光化軍倚郭一光化郡號酇城隂國隂城軍縣沿革韓地角亢氐分野禹貢豫州之域漢為南陽郡隂酇二縣晋置順陽郡治酇縣西魏治酇城郡後周郡廢屬襄州省酇入隂縣隋曰隂城縣屬㐮陽郡唐後省隂城入谷城屬襄州本朝乾德三年以舊谷城地置光化軍及乾德縣熙寧軍廢縣屬襄州後復舊地理沿革表形勝固封山在城西北本名崇山小江河在城西北四十里朱寨河在城東六十里孟樓河在城東北五十里温水河在城南三里五百洲在城西南四里白河在城東南一百五十里泌河地理同與白河對輿地紀勝人物漢蕭何就封于此有廟在城内皇朝張士遜為宰相石衆有文十卷名滄浪集輿地紀勝本朝紹興十一年復置光化軍領光化縣又以光化軍為通化軍其後逆亮叛盟復為軍縣如初沿革表層樓壓清漢初上便忘歸夕靄藏平野晴烟漏翠微城昬晩鴉集江静野鷗飛何日賦招隱行吟傍釣磯李豸谷伯故國鄼侯所封雖曰小邦實為要地光化守啓棗陽軍倚郭一棗陽郡號棘陽白水舂陵軍縣沿革本漢南陽郡蔡陽舂陵二縣東漢改舂陵為章陵晉屬義陽郡後廢之置廣昌縣及廣昌郡又舂陵置安昌郡元魏置南荆州西魏改昌州隋開皇廢二郡仁夀改廣昌曰棗陽大業置舂陵郡唐武德廢郡改昌州為唐州省唐州清覃入此貞觀省舂陵縣入焉又以棗陽屬隋州本朝升棗陽軍治棗陽縣地理沿革表形勝紀山在城南一百五十里霸山自随州撥𨽻棗陽資山在州北劉白河發源于白水牡丹山在縣南白水山白河所出也有光武廟赤眉山在縣東北甘泉山在縣東北地肥而水甘獅子山在縣南石虎山一名東石虎山又有西石虎山四望山團石山皆在縣東北輿地紀勝人物漢岑彭光武功臣岑熈尚安帝妹涅陽公主魏鄧艾平蜀唐岑文本孫峰羲輿地紀勝荆湖南路潭州倚郭二外縣十長沙衡山善化安化醴陵攸縣寧湘鄉鄉湘潭益陽瀏陽湘隂武安軍節度湖南安撫司轉運司郡號長沙湘城臨湘湘州武安軍州沿革鶉尾之次翼軫之度長沙自有一星在軫中古三苖國之地禹貢荆州之域春秋戰國屬楚秦置長沙郡漢髙帝為長沙國東漢長沙郡吳分置衡陽郡晉兼置湘州尋廢之宋復置湘州隋置潭州大業廢為長沙郡唐武德曰潭州貞觀屬江南道天寳曰長沙郡中和升欽化軍節度景福改武安軍節度五代馬殷據之為長沙府後入南唐李氏地理沿革表縣沿革長沙秦以青陽地置湘縣漢為臨湘縣東漢為長沙郡治宋為國齊以後為郡治隋為潭州治改臨湘縣曰長沙善化本漢臨湘縣地本朝析置衡山南岳之地漢為湘南縣地吳析置衡陽縣及置衡陽郡晋改曰衡山縣屬衡陽郡隋屬潭州神龍屬衡州石晋屬潭州後復屬衡州本朝改屬潭州安化本漢益陽縣地本朝析置醴陵本漢臨湘縣地東漢置醴陵縣屬長沙郡隋省入長沙縣唐武德復置攸縣本漢長沙國地東漢屬長沙郡南齊屬湘東郡陳改為攸水縣隋省入湘潭後復置唐武德置雲州貞觀州廢屬衡州後梁屬潭州後又屬衡州本朝來屬湘鄉本漢湘南縣之湘鄉東漢置縣屬零陵郡吳屬衡陽郡晉為郡治隋省入衡陽縣屬長沙郡唐武德復置屬潭州湘潭本漢湘南地為長沙國東漢屬長沙郡吳屬衡陽郡梁廢湘南縣而置湘潭縣衡陽志云陳置隋屬衡山郡唐元和屬潭州益陽本漢屬長沙國東漢屬長沙郡吳屬衡陽郡隋屬長沙郡唐屬潭州瀏陽本漢臨湘縣地吳置瀏陽縣屬長沙郡隋廢為歸仁鎮入長沙縣唐景龍復置屬潭州湘隂春秋羅國秦羅縣屬長沙郡漢屬長沙國東漢分置漢昌縣吳改漢昌曰吳昌並屬長沙郡宋元徽析置湘隂縣屬湘東郡梁置羅州及岳陽郡二縣屬焉陳廢置州隋平陳羅縣岳州省湘隂入岳陽尋改岳陽為湘隂省吳昌入羅縣唐武德省羅縣入湘隂屬岳州本朝改𨽻潭州寧鄉本漢益陽縣地吳分置新陽縣屬衡陽郡晉改為新康隋省入益陽縣唐武德復置新康屬潭州七年省之本朝置寧鄉縣地理沿革表形勝南岳衡山在縣西第三小洞天詳見前集仙道部及後集地理部大圍山在醴陵縣第十三小洞天洞陽山在長沙縣係第二十四小洞天洞庭湖青草湖詳見地理部嶽麓山在衡陽之足有書院係御書扁額龍山犀峰皆在湘鄉鸞山鳯嶺皆在攸縣虬淵在醴陵山中有洞穴玉潭在寧鄉有鎮金井在長沙醴泉在醴陵鹽井在湘鄉清風峽在岳麓寺下明月山在醴陵玉笥山在湘隂金簡峰在南岳小廬山在益陽大溈山在寧鄉王喬山丁仙山在安化浮丘山在益陽輿地紀勝人物楚屈原忠而被放投汨羅以死著離騷諸賦漢古初為長沙孝子蜀蔣琬為廣都長諸葛亮稱為社稷之器唐歐陽詢善書皇朝朱昻與其弟協俱請老時人榮之比漢二䟽丁儁四世同處旌表門閭瞿景鴻累世同居旌表門閭徐偉有八子號徐氏八龍譚世勣以張邦昌僭位不食而死張栻槐公之子南軒先生靖康之變譚延康以節聞寇敵之來孫方武以義顯輿地紀勝集征鞍窮郢路歸棹入湘流兩邉楓作岸數處橘為洲張九齡風清長沙浦霜空雲夢田李白湘水回九曲衡山望五峰同上夜醉長沙酒曉行湘水春杜詩秋曉岳増翠風髙湖湧波同上楚岫千峰翠湘潭一葉黄韋迢長沙十里平勝地猶在險韓詩班竹泣舜婦青湘弔楚臣同上湘淚淺深滋竹色楚歌重疊怨蘭叢李義山本朝乾德元年削軍額端拱復武安軍乾德三年以長沙縣常豐塲置縣開寶省之紹聖四年析長沙置善化縣分治郭下乾德三年以衡州衡山縣𨽻潭州淳化二年還衡州四年來屬熈寧六年分益陽湘鄉地置安化縣乾徳三年以衡州攸縣𨽻潭州紹興三年以益陽縣屬鼎州尋復故淳化四年以岳州湘隂縣𨽻潭州太平興國二年以長沙縣玉潭鎮置寧鄉縣沿革表洞庭青草渺無際天柱紫盖森