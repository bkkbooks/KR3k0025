body:
  text: 記纂淵海卷九十四宋潘自牧撰草部草經天地變化草木蕃易兖州厥草惟繇徐州草木漸包揚州厥草惟夭庶草蕃廡書野有蔓草零露漙兮蓼彼蕭斯零露漙兮湛湛露斯在彼豐草周家忠厚仁及草木詩園圃毓草木春始生而萌之夏日至而夷之秋䋲而芟之冬日至而耜之周禮草木零落然後入山林孟春草木萌動季春生氣方盛勾者畢出萌者盡達孟夏靡草死季夏大雨時行燒薙行水利以殺草季秋草木黄落禮記為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖無使滋蔓蔓難圖一薫一蕕十年尚猶有臭松栢之下其草不殖左傳子草木暢茂孟子逮至衰世草木之勾萌銜華佩實而不死者不可勝數淮南子展禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯符子史元帝永光二年天雨草葉相糾結如彈丸漢書靈帝中平元年東郡陳留濟陽長垣濟隂諸縣界有草生莖其大如指狀似鳩爵龍蛇鳥獸之形五色各如其毛羽頭目足翅皆具續漢書宕昌𦍑俗無文字但候草榮落以記嵗時後周書傳記草卉也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英爾雅草盛曰菶木茂曰葆風俗通凡生草而初達謂之䓲䓲小也荄杜根也齊東曰杜或曰苃方言堯時有屈佞草佞人入朝則屈而指之又名指佞草博物志魏興錫義山多生薇蘅草其草有風不掩無風獨摇水經魯城北孔子塋中不生刺人草木金樓子生而無識者草木是也古今注秦皇時大宛中多枉死者横道有鳥如烏銜草以覆死人面遂活鬼谷先生曰此草是爼洲不死草也生瓊田中亦名養神芝東華夫人宮中有異草葉如芭蕉花正黄色光可鑑日此金明草也廣記東方朔曰臣有吉雲草種於九景山東二千嵗一花臣種一千九百九十九年矣明年應生臣走往刈之以飼馬馬食不饑帝許之朔平旦去至暮而返背負數束其形葉似麥而金色剉以飼馬即不覺饑甜溪水如蜜瑶琨有碧草如麥剉之以釀則味如酒而釅烈飲一合則三旬不醒飲甜水則隨飲隨醒也洞冥記不其城東有鄭𤣥教授山山下生草如薤葉土人名作康成書𢃄三齊畧記席萁一名塞盧生湖北地古詩云千里席萁草秦趙間有相思草狀若石竹而節節相續一名斷腸草又名愁婦草亦名孀草人呼為寡婦莎述異記太極山西有采華之草服之乃通萬里之言括地圖太原晋陽已北生屏風草天姥曰太陽之草名曰黄精餌而食之可以長生太隂之草名曰鈎吻入口立死海上有蒒草其實食之如大麥名曰自然榖或曰禹餘糧博物志霍山上有神草四十三種靈山記壽榮草出少室金山丘下服之令人不老典術餌玉長生草一名通天日再服之令人得仙嵗欲豐甘草先生甘草者薺也嵗欲儉苦草先生苦草者葶藶也嵗欲惡惡草先生惡草者水藻也嵗欲旱旱草先生旱草者蒺藜也嵗欲潦潦草先生潦草者蓬也師曠占午橋莊小兒坡茂草盈里晋公每使數羣白羊散於坡上曰芳草多情賴此粧㸃窮幽記元和時館閣湯飲煎騏驎草鳳翔退耕傳集何所獨無芳草爾何懷乎故宇楚辭折芳馨兮遺所思九歌春草生兮萋萋招隱春草碧色江淹賦四顧何茫茫東風摇百草新樹蘭蕙枝雜用杜蘅草終朝採草榮日暮不盈抱採之欲遺誰所思在逺道青袍似春草長條從風舒青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感以人含氣血古詩池塘生春草謝靈運池草暗生春緑蘿紛葳蕤繚繞松栢枝草木有所託嵗寒尚不移草不謝榮於春風芳草換野色飛蘿摇春煙瑶草映髙堂春風如有情山中尚含緑春草如有意羅生玉堂隂芳草歇柔艷李白汀草亂青袍草見踏青心忘機對芳草宮草霏霏承委佩映堦碧草自春色草敵虛嵐翠碧知湖外草春泥百草生百草競春華方期拾瑶草杜詩白露下百草蕭蘭共憔悴青青四墻下已復生滿地野草花葉細不辨薋菉葹草珠競駢晴韓詩隂草濕翠羽栁詩五陵愁碧春萋萋温庭筠芳草復芳草斷腸還斷腸自然堪下淚何必更殘傷杜牧憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早館娃宮外姑蘇臺欝欝芊芊掇不開劉禹錫本朝楚辭所詠香草曰蘭曰蓀曰茞曰葯曰虈曰芷曰荃曰蕙曰薫曰蘼蕪曰江蘺曰杜若曰杜蘅曰揭車曰留夷釋者但一切謂之香草而已如蘭一物或以為都梁良或以為澤蘭或以為猗蘭草今當以澤蘭為正山中又一種大葉蘭冬春開花極香此别名幽蘭非真蘭也蓀則今人所謂石菖蒲者茞葯虈芷雖有四名秪是一物今所謂白芷是也蕙即零陵香一名薰蘼蕪即芎藭苗也一名江蘺杜若即山薑也杜蘅今人呼為馬蹄香惟荃與揭車留夷終莫能識余他日當徧求其本列植欄檻間以為楚香亭漸覺東皇意思勻陳根初種夜來新忽驚平地有輕緑已覺六街無舊塵莫為榮枯吟野草且憐愁醉軛香輪詩人空怨王孫逺極目萋萋又一春遯齋閒覧似嫌車馬繁華處纔入城門便不生劉原父光耀發幽叢秋草風吹春復緑芳草留人意自閒草木本無情及時如自得六一集草木含幽香芳草不鋤當户長並東坡菖蒲石菖蒲附經王使周公閲來䀻饗有昌歜左傳史梁太祖后張氏忽見庭前菖蒲生花因取食之生髙祖詳見莖節類傳記玉衡星散為菖蒲春秋運斗樞菖蒲放花人得食之長年風俗通菖蒲生石上一寸九節者久服輕身明耳目不忘不迷菖蒲亦有一寸十二節者本草菖蒲一名堯時薤吳氏本草聖王仁功濟天下者堯也天降精於庭為薤感百隂為菖蒲焉典術宣山中菖蒲一寸二十節堅芬之極羅浮山記文王好食菖蒲葅説苑王興採菖蒲食得長生神仙傳王徽之以菖蒲映竹曰菖蒲只以九節為貴而此君面目聳焉菖蒲正當再拜此君而此君亦安得不受之耶髙士春秋僧普寂大好菖蒲房中以菖蒲種成獅子鸞鳳仙人之狀海墨㣲言成都營妓薛濤元微之使蜀屢陪讌笑元後寄詩云别後相思隔煙水菖蒲花發五雲髙牧䜿閒談集菖蒲從短出平沙菖蒲花紫茸李白水長减蒲芽青青水中蒲長在水中居寄語浮萍草相隨我不如韓詩本朝九節菖蒲石上仙菖蒲人不識生此亂石溝山髙雪霜苦苗葉不得抽下有千嵗根蹙縮如蟠虬春荑秋莢兩須臾神藥人間果有無無鼻何由識薝蔔有花今始信菖蒲芳心未飽兩蝴蝶寒意知鳴幾蟪蛄記取明年十二節小兒休更籋霜鬚詠菖蒲花斕斑碎玉養菖蒲一勺清泉半石盂碧玉盌盛紅瑪瑙青盆水養石菖蒲也知供法無窮盡試問禪師得飽無其延年輕身之功既非昌陽之所能及至於思寒苦安淡泊與清泉白石為伍不待泥土而生者亦豈昌陽之所能髣髴哉東坡閒行澗底採菖蒲千嵗龍蛇抱石臞明朝却覓黄州路飛下山巔不用扶陳與義芭蕉傳記芭蕉一曰苞苴或曰甘蕉子兩兩共對剥其皮色黄白味似蒲萄甜而脆其莖解散如絲績以為葛謂之蕉葛廣志每花一闔各有六子先後相次子不俱生花不俱落有三種一種子大如拇指長而鋭有似羊角名羊角蕉味最甘好一種子大如鷄卵有似牛乳味㣲减羊角蕉一種大如藕子長六七寸形正方少甘味最弱取鑊煮之為絲可以紡績女工以為絺綌今交趾葛也南州異物志赤岩山水石之間唯有甘蕉林深者十丈遊名山志路德延數嵗能詩嘗賦芭蕉詩曰一種靈苗異天然體性虛葉如斜界紙心似倒抽書廣記僧懷素貧無紙可書甞於故里種芭蕉萬餘以供揮洒陸羽作懷素傳集扶踈似樹質則非木卞敬宗賛芭蕉葉大梔子肥韓集晩英值窮節緑潤含朱光以兹正陽色窈窕凌清霜逺物世所重旅人心獨傷回暉眺林際摵摵無遺芳栁詩芭蕉不展丁香結同向春風各自愁芭蕉開緑扇李義山本朝芭蕉一枕西窻雨王介甫更展芭蕉看學書山谷骨相玲瓏透八窻花頭倒挿紫荷香繞身無數青羅扇風不來時也覺凉誠齋水草經參差荇菜左右流之于以采蘩于沼于沚于以采蘋南澗之濵于以采藻于彼行潦思樂泮水薄采其芹薄采其茆詩季春萍始生禮記蘋蘩蕰藻之菜可薦於鬼神可羞於王公左傳傳記苹萍也無根浮水而生説文水藻一名水簾生池澤中水上葉圓小一莖一葉吳氏本草水萍一名水華久服輕身本草經萍麄大者為蘋季春生可糝蒸為茹詩義疏穀雨之日萍始生萍不生隂氣貫盈逸周書菜之美者崐崘之萍焉吕氏春秋楚昭王渡江江中有一物大如斗圓而赤直觸王舟王使人問孔子孔子曰是謂萍實可剖而食之王遂食大美又遣人問孔子何以知之子曰吾甞過陳之野童謡曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜家語東華夫人設珍殽有黒河文藻廣記漢宫甘露池西有靈池方四百歩中有連錢荇浮根菱倒枝藻連錢荇葉如錢大洞㝠記藫水苔也一名石髪江東食之爾雅苔水衣也説文海藻一名海菭南粤志集靡萍九衢楚辭充饑憶楚萍旅從一浮萍㣲馨借渚蘋處處清江𢃄白蘋風起青蘋末江潭隱白蘋寒魚依密藻杜詩南湖采白蘋雙萍易飄轉李白風約半池萍萍盖汙池净蘋藻滿盤無處奠韓詩春風無限瀟湘意欲采蘋花不自由栁詩本朝緑池萍錦翻殘花㸃緑萍六一集曉來風約半池明重疊侵沙緑罽成不用臨池重相笑最無根蔕是浮萍陸龜䝉東池浮萍半䊀塊裂碧跳青出魚背廢沼粘枯萍雨過浮萍合五年不踏江頭路夢逐東風泛沚蘋投篙披緑荇猗猗水荇長西池秋水尚横空舞濶摇深吹荇帶東坡記纂淵海卷九十四
