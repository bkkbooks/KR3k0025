body:
  text: 記纂淵海卷二十宋潘自牧撰郡縣部河北東路大名府倚郭一一元城外縣十革大名内黄成安氏魏一舘陶冠宗城臨清夏津清平郡號天雄郡沿革禹貢冀兖二州之域天文室壁分野本商舊都周封武庚於此春秋為晉地戰國為魏衛二國之境秦屬東郡漢置魏郡治東漢分魏郡為東西部置都尉魏置陽平郡晉因之劉宋嘗置東陽平郡前燕於此置貴鄉郡尋省後周置魏州隋改州為武陽郡唐武徳中復為魏州治貞觀初置都督府龍朔初改為冀中咸亨中復為魏州天寳初改為魏郡屬河北道魏博節度治此乾元初復為魏州號曰天雄軍地理沿革表縣沿革元城春秋時沙麓地漢置元城縣莘春秋衛地隋置莘縣大名本漢貴鄉地五代唐改為廣晉縣漢改大名縣内黄殷河亶甲居相春秋時襄公㑹於柯皆此地漢置内黄縣成安本春秋晉乾侯地後魏置成安縣魏周時地名洹水戰國時為魏武侯别郡漢置魏縣舘陶本春秋晉㓂氏邑漢置舘陶縣臨清本漢清源縣地後魏置臨清縣夏津本漢鄃縣唐為夏津縣清平本漢清陽縣地隋改為清平縣冠氏本春秋晉冠氏邑隋置冠氏縣宗城本漢廣宗縣隋改宗城縣地理沿革表形勝沙麓山在府東春秋沙麓崩晉史卜之後六百年當生聖母後漢王翁孺一門二后果應此兆惬山在大名縣北漢王延世於此築丘塞河惬人心故名弇山在莘縣北山有顯仁廟左傳齊閭丘嬰出奔於弇即此博望岡在内黄縣東南其上髙平可逺望也陶山在舘陶縣南禹貢導水東至舘陶即此琉璃井在臨清西南甃以琉璃泉甚清烈成安君廟在成安治西北祠陳餘於此鄃城在夏津縣界漢封吕陀欒布為鄃侯皆此地黄河故道在舘陶西南漢河决於舘陶即此漳河在元城西南其流衝濁遷徙不常衛河在府南其流頗清騎僊樓喜雨亭雪香亭晩香亭許公亭歸雁亭望春亭百花塢東園梨園並在府治金堤在府東延袤千餘里漢時築以障河者輿地紀勝人物漢馮楊宣帝時為𢎞農太守有八子皆為二千石人號萬石君家蓋寛饒以明經為郡文學舉方正對䇿髙第奉公不避權要終司𨽻校尉杜鄴為荆州刺史􅊩政寛厚元夀初以貴戚封侯馮勤楊曽孫光武時為郎中精勤進忠賜爵闗内侯欒巴博通經典有技術為永昌太守嘗噀酒救成都之火其事竒驗晉束晳性寡欲不營貲産舉孝亷茂才皆不就太康中旱為邑人請雨雨三日如注官至尚書郎唐沈佺期舉進士為脩文舘學士弟全交全寜皆有文學郭震少有逸材為太學生常捐錢四十萬助貧人之喪年十八舉進士後封代國公栢良器少有異質王奐常稱額似臨淮王面似顔平原後為將年二十四身經戰陣六十二次以功封平原王圖形凌烟閣張萬福三世明經少學騎射徳宗朝拜濠州刺史嘗因陽城等論事大言曰朝廷有直臣官至左金吾將軍圖形凌烟閣皇朝李繼勲性質直初加檢校太尉累遷至同平章事弟繼偓亦武勇官至都指揮使曹翰少為小吏從太祖太宗征伐四方皆有大功歴千牛衛上將軍栁開幼警悟豪勇舉進士歴官諸州皆有政績太宗以文臣有武畧擢知寜邉軍有著書行世劉安世登進士第不就選從司馬光學問盡心行已之要光教之以誠自不妄語始調洛州司法歴臺諌言事剛直時人目之為殿上虎嘗自歎曰吾欲為元祐全人見司馬光於地下輿地紀勝集百代功勲一日成三年五度換雙旌閒来不對人論戰難處長時自請行旗下可聞誅敗將陣頭多是用強兵當朝面受新恩去為報妖星不教生功成誰不擁藩方富貴還須是本鄉並王建漢家簫鼔空流水魏國山河半夕陽白樂天魁宿絢光臨分野台星煥彩燭名都前人漢家東郡國唐代義成軍日月乾坤裏山河晉魏分一書褒美徳九錫賛殊勲二傑今安在西山空白雲龎雲卿本朝慶厯二年建為北京八年始置大名府路熙寜六年省大名縣為鎮入元城治政和六年徙大名縣治為南樂鎮熙寜六年省洹水縣為鎮入成安熙寕五年省永濟為鎮入舘陶熙寕二年割博平縣𨽻清平熙寕五年省臨清為鎮以宗城縣入沿革表長河終嵗足悲風亭古臺荒半倚空惟有燕歸時最早栁含㣲緑杏粘紅東風楊栁杏花飛曽伴先生酒一巵前軰風流那復見小亭烟雨謾相思沙麓百戰塲舄鹵不敏樹並歐陽脩開徳府倚郭一外縣六濮陽觀城臨河清豐衛南朝城南樂鎮寜軍節度郡號澶淵郡沿革天文室壁分野禹貢冀兖二州之域春秋時地名澶淵屬衛秦為東郡地漢為頓邱縣地屬魏郡晉為頓丘郡及魏郡地隋為東郡及武陽郡地唐置澶州又分置澶水縣貞觀中廢州以縣屬魏州後復置五代晉陞鎮寜軍本朝陞為開徳府沿革表縣沿革濮陽古顓頊之墟曰帝丘晉徙治濮陽觀城本古之觀國隋改觀城縣臨河以地近黄河故名清豐古頓丘地唐改為清豐縣以孝子張清豐故名衛南以地在衛水之南朝城本春秋衛國東北地唐改為朝城以縣東有古廟古城故名南樂本漢樂昌縣五代唐改南樂縣同上形勝洪洋山在郡東南秀麗崚嶒為一郡之望衛陽山在府東南居衛之陽秋山在清豐縣西山海經云帝嚳塟於此山淇水在臨河東南綿麗太行而東入於海澶水在清豐西伏流至古繁水城西南謂之繁泉御井泉在府治南放鶴池在觀城境相傳衛靈公養鶴之所二賢堂在朝城縣境上有臧洪陳榮祠人物上古蒼頡生而神聖有四目始製文字以代結䋲之政漢索盧放以尚書教授子弟千餘人光武徴為諌議大夫數獻忠讜成公蕳家世二千石與周馥齊名官至散騎常侍南北朝李崇性寛厚有謀事魏為荆州刺史氐人作亂討平之累遷徐州大都督董徴身長七尺博通經史事魏四門小學博士教授諸王累遷光禄大夫隋華秋家貧傭賃以養母母終負土成墳郡縣以事聞旌表之唐張公瑾貞觀初為代州都督有惠政南霽雲同張廵守睢陽城陥死節皇朝陳興事太宗屢從征伐斬獲甚衆官至都指揮使陳琰進士及第累官監察御史父喪哀毁墓上生連理枝孝感所致趙延進從太宗討幽州以督造戰具有功遷大將軍張田登進士第以歐陽脩薦通判廣信軍歴知數州政有賢績常作歛忠堂繪古清刺史像日夕拜之官至龍圖閣學士並輿地紀勝集南星中大火將子涉清淇西林映㣲月征斾空自持碧潭去已逺瑶華折遺誰君問遼陽戍摇摇天際旗陳子昂古塔對河堧長林幽淇口髙適溟漫望雲海蕭條聼風水蠶農有時節田野無閒人臨水狎漁商望山懷隐倫野寺荒臺晩天寒古木悲空階有鳥迹猶似造書時並同上本朝建寕四年建為北輔五年陞為輔郡宣和二年罷輔郡仍𨽻河北東路皇祐元年省觀城入濮陽四年復慶厯四年徙清豐縣治徳清軍即縣置軍使𨽻州熙寕六年省頓邱入清豐崇寕四年以朝城南樂来𨽻開徳府沿革表祖帳飄揚堤栁邉北来飛盖復翩翩追随不忍輕言别回首城樓沒晩烟梅絜能吏於今少春令及此行英雄餘戰伐犴獄寄亷平陳無已滄州倚郭一外縣四清池無棣塩山樂陵南皮横海軍節度郡號景城郡沿革天文箕尾分野禹貢冀州之域春秋戰國時為燕齊二國境漢置渤海郡治浮陽東漢徙治南皮晉為渤海國宋為渤海郡後魏置滄州隋為渤海郡治陽信地後徙治清池唐改滄州天寳初改景城郡乾元初復為滄州唐末置義昌軍五代梁為順化軍唐改横海軍本朝省長蘆入渭地沿革表縣沿革清池漢渤海郡地隋改為清池縣無棣本春秋無棣邑漢屬渤海郡塩山本漢髙城縣隋置浮水縣尋改塩山縣以地有塩山故名樂陵周時為齊北境漢為陽信縣地屬渤海郡隋置樂陵縣南皮本漢舊縣因章武有北皮亭故此曰南皮同上形勝箧山在塩山縣東南四十里一名峡山塩山在縣東南以地産塩故名漢武臺在鹽山縣相傳漢武帝所築燕友臺在南皮縣東魏文帝築臺於此以燕友故名觀臺在南皮縣曹操擒袁譚處浮河在州南浮水之陽毛河在州西南東北入海湯通河在清池縣東唐開元中開尹吉甫墓在南皮縣西三十里趙武靈王墓在州城東南有廟雋不疑墓在南皮縣東南木門城在州西北春秋魏侯弟鱄出奔晉托於木門即此丱兮城在塩山縣東北秦始皇發童男女千人至海求蓬莱仙因築此城五壘城在清池縣西南漢宣帝封河間獻王子雍為景城侯五子分居城中俗呼五壘城盟亭在州境内燕齊二國常結盟於此鐡獅子在州城内開元寺五代周世宗時所鑄紀勝人物漢鮑宣好學漢成帝朝舉孝亷為郎官至諌議大夫以直忤宰相下廷尉太學儒生救者千餘人巴肅值竇武謀誅宦官遇害甚多肅自詣縣死賈琮立碑記之雋不疑治春秋為郡文學進退必以禮昭帝時擢京兆尹吏民敬其威信其母甚賢常教戒故不疑為吏嚴而不殘晉石苞雅曠有智而容儀偉麗累官大司馬其子崇為脩武令有能名財業豐積室宇宏麗庖膳窮水陸之珍南北朝李鉉家素貧常春夏務農秋冬入學從李用仁受毛詩尚書北齊時遷國子博士唐髙適𤣥宗時舉有道科官至諌議大夫負氣敢言權近側目五十始學詩即工傳布甚廣賈耽天寳中舉明經遷汾州刺史政有異績累官尚書同平章事耽嗜觀書老益勤尤悉地里世謂淳徳有常者皇朝索相開寳舉進士釋褐鄆州司理叅軍州有大獄千五百人相按鞫事随以白撫愛閭閻興利革弊民甚便之張知白同中書平章事在位重名器無毫髪之私雖貴顯清約如寒士張凝少勇武倜儻為殿前都虞候善撫士卒賞賜多以犒師家無餘貲贈章徳軍節度同上集自歎馬卿長𢃄病還嗟李廣未封侯棠梨宫裏瞻龍衮細柳营前着豹裘芳草伴人還易老落花随水亦東流山當睥睨常多雨地接瀟湘畏及秋惟羡君為周柱史手持黄紙到滄州並李從一本朝熙寕四年省饒安縣為鎮入清池政和二年改巷姑曰海清治平中徙無棣縣治保順軍即縣治置軍使𨽻州熙寕二年徙樂陵治咸平郡熙寜六年省臨津縣入南皮沿革表解組滄溟畔擕家紫翠間地臨雙巷勝天與兩年閒茅屋静聞雨竹籬疎見山陳伯和滄城近河嵗増隄防猶懼奔溢矧妄有開鑿乎髙賦上三塘泊賦瀟水悠悠天際來夾江古木抱山廻柵中人物不滿把日晏市散多蒼苔九嶷巉天古雲埋遥想帝子龍車迴沈睿逹荒灣野水氣象古高林翠阜相回環新篁抽筒添夏影老卉亂發争春妍歐陽永叔一麾新命古三齊白首滄州願已違軒冕從來為外物山川信美獨思歸長天極目無飛鳥積雪生光射落暉同上冀州倚郭一外縣五信都南宫蓚棗強武邑衡水郡號信都州沿革天文昴畢分野禹貢冀州之域春秋晉東陽地秦屬鉅鹿郡漢為信都縣立信都國於此景帝時改廣川國後復信都國東漢名安平國後置冀州治此晉改長樂國後魏改長樂郡隋為信都郡唐改冀州尋改魏州後復舊名天寳初改信都郡乾元初復冀州治信都縣本朝増置武安軍沿革表縣沿革信都春秋時晉東陽地漢𨽻信都國蓚漢脩縣隋改為蓨縣南宫本漢舊縣隋屬冀州棗强本漢舊縣其地棗木強盛故名武邑漢舊縣北齊廢晉置武邑縣衡水漢信都國桃縣地隋屬冀州同上形勝棗山在州城武強山在武強縣境内漢置縣取此義紫薇山在信都東北洚水在州治北百花樓在州治東避暑亭在信都西郊賣漿臺在棗強縣北相傳姜太公未遇時賣漿於此棘津城在棗强縣境内左傳晉荀吴率師涉自棘津即此觀津城在武邑縣東南即趙國封樂毅處扶栁城在縣西即劉植據城以迎世祖處桃城在州西北南亭在南宫縣漢光武遇大雨入此亭馮異鄧禹抱薪爇火對竈燎衣即此輿地紀勝人物周吕望隐東海聞文王善養老来歸佐武王取天下封太師卻缺晉大夫芮之子窮居耨於野其妻饋之相敬如賓臼季見之言諸文公用為下軍大夫復與之冀為采邑因以為氏漢董仲舒為漢大儒武帝時上天人三策南北朝蘓侃少涉獵書傳事南齊為冠軍參軍深自刻勵為髙帝委用劉蘭年三十始受學遂以儒學名聚徒二百人長於左氏精博經史為儒者所宗孟信家貧寒從孝武入朝官至陳州太守尚寛和居官清介室無餘貲隋孫萬夀幼學五經博涉子史善屬文隋初拜豫章王長史有文集十三卷唐蘇定方太宗時為將有功平三國皆生執其主累遷幽州都督孔頴逹孔子三十二世孫日記千餘言善屬文累官國子祭酒纂五經正義其子志孫惠俱為司業時人美之葛文逺博涉羣書尤精春秋太宗時與十八學士之選其宗人文懿亦以儒學稱時號為二葛蘇安恒武后時嘗上書勸太后歸政於太子且曰天下者髙祖太宗之天下非李氏不王時論稱之杜景儉性嚴正舉明經中第為司刑丞與来俊臣同治獄時人稱之曰遇杜者生遇来者死累官同平章事武后稱其為真宰相劉幽求舉制科為朝邑尉嘗恨桓彦範不誅武三思以為必有後患果如其言官至中書三品田神功初為縣吏後以破賊有功累遷太子太師且事親至孝官至司徒孔巢父孔子三十七世孫少力學薦為叅軍徳宗時與李白韓凖裴政張叔明陶渑號竹溪六逸皇朝荆嗣祖為晉州兵馬鈐轄嗣以應募累立戰功太宗時遷都指揮使傅思讓有力善射以破契丹功四遷容州觀察使田况少卓犖有大志舉進士甲科嘗上治邉十四事李濬父超有隂徳濬舉進士為御史屢上言事臺中稱直後擢樞宻直學士同上集魚下碧潭當鏡躍鳥還青嶂拂屛飛去時未免人来往欲買嚴公舊釣磯髙適初年三十拜將軍近代英䧺獨未聞向國報恩心比石辭天作鎮氣凌雲逆風走馬貂裘卷望塞懸弧雁陣分空擁節麾從此去安西大破犬羊羣李徳新赤羽千夫膳黄河十月氷横行沙漠外神速至今稱杜甫燕趙悲歌士相逢劇孟家寸心言不盡前路日將斜錢仲文雙旌漢飛將萬里獨横戈春色臨闗盡黄雲出塞多鼔鼙悲絶漠烽戍隔長河想到隂山路天驕已請和郎士元本朝慶厯八年陞武安軍節度皇祐四年升新河鎮為縣廢南宫六年省新河為鎮入焉熙寜元年省棗強入信都十年復置沿革表莫嫌此壘是邉州試聼山河説上游帳下文書三幕府馬前鞾靺五諸侯王藩故社經徐國侠窟餘風觧報仇四十年来民緩𢃄使君何事不輕裘宋子京地凉宜牧馬塞近慣調兵為寄井泉石老来思目明王正美河間府倚郭一外縣二河間樂夀東城瀛海軍節度郡號河間瀛海郡沿革天文禹貢冀州之域箕尾分野春秋時為晉樂陽地戰國時為燕趙齊三國之境秦為鉅鹿上谷二郡地漢置河間國東漢入信都和帝時復舊後魏於樂城縣立瀛州後置河間郡隋罷郡置瀛州大業初改為河間郡唐改瀛州天寳初仍為河間乾元初復為瀛州五代晉初入遼周復取之本朝陞為河間府沿革表縣沿革河間周為唐叔封邑漢為周鄉侯國魏置河間縣樂夀本隋樂城縣唐改樂夀東城在河間縣本漢束州縣隋置東城縣同上形勝瀛臺在郡城東南髙五丈四望極逺其下有濠水之沠高陽臺在河間縣東與瀛臺相望天王臺在郡城門内上有古殿壇并像毛公書院在河間縣尊福鄉祀漢毛萇下有萇墓束州城在河間縣如林鄉武垣城在郡西南漢武帝初廵狩至此望氣者言有異女訪之得趙氏以為鈎弋夫人麴義壘在河間東漢公孫瓉破黄巾遣人来此為令袁紹令麴義攻之即此毛精壘在河間縣因有毛萇宅故名輿地紀勝人物漢劉輔漢宗室舉孝亷擢諌議大夫成帝欲立趙倢伃為后封倢伃父為列侯輔上疏言腐木不可以為柱卑人不可以為主上怒繫獄羣臣救之得減死邢顒舉孝亷司徒聘之皆不就時人稱之曰徳行堂堂後仕魏遷尚書僕射南北朝馬敬徳好儒術北齊時宣至都授國子助教尋陞為祭酒朝廷師事之信都芳少習筭書嘗集五經筭事及古今樂事為書又聚渾天欹器以諸巧藝稱楊慶祖𤣥父剛並以至孝馳名慶美姿儀頗涉書記郡舉孝亷慶以事養不就母有疾不解𢃄者七旬母卒哀毁骨立負土成墳北齊旌表其門隋授平陽太守卒年八十五隋尹式博學善屬文仁夀中官至漢王記室其族人正卿彦卿俱有俊才並顯於世劉善經博物洽聞歴官太子舎人著述甚富盧大翼七嵗日誦數千言州里號神童既長博綜羣書隐林慮山中授業者自逺方来其所言天文事多應驗煬帝重之唐張濬汎知書史官至度支貟外黄巢作亂僖宗召拜諌議大夫時王敬武欲臣賊濬喻以君臣大義且謂諸將曰何不共誅大盗奉迎天子敬武愧服賊平拜中書門下平章事皇朝張昭十嵗誦書數萬言及長博洽經史太祖時拜吏部尚書嶺南平遣使就卧疾處問獻俘禮昭可否以對皆有證據時人服其該博李璘因契丹犯邉陳友妄殺璘父及家屬三人後報父仇手刄友而不遁去朝廷壯而釋之張慤元祐中進士累遷龍圖閣學士都轉運使髙宗為大元帥諸道勤王慤飛輓踵道聞二帝北狩極言中原不可一日無君又募民合力抗敵在朝諤諤有大臣節及卒朝廷稱為古之遺直權邦彦崇寕中以上舎登第累官簽樞宻院事嘗獻十議以圖中興著書十卷號瀛海殘編集王子賔仙去飄颻跨鶴飛徒聞滄海變不見白雲歸宋延清鳥歸沙有迹帆過浪無痕同上倉卒滹沱渡如何便合氷非干權濟事天佐漢中興堯䧺我恨身不翼飛騰上蓬瀛封囬烟霞壁立水溶溶路轉崖囬旦暮中鸂鶒畏人沉澗底山羊投石掛巖松薛陶臣星河似向簷前落鼔角驚從地底廻元㣲之夜乆潮侵岸天寒月近城常建繞郭烟嵐新雨後滿山樓閣上燈初人聲曉動千門闢海色霄涵萬象虛元㣲之浮槎萬里過滄溟徧禮名山適性靈深夜降龍潭水黒新秋放鶴野田青劉夢得沙村好處多逢寺山葉紅時覺勝春同上層城𣺌𣺌人傷别芳草凄凄