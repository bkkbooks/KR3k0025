東平舒縣五代周屬霸州同上形勝莫金山在州城東南南山在州城東其山喬松脩竹周匝十數里内有臺榭為一郡之望雁頭山在州城東南巨馬河在州南自直沽入於海文安潭在縣北髙橋淀在霸州東周延三十里安信城左州東古為峪口闗圻城在州東楊彦朗屯兵於此以拒契丹廣陵城在文安縣西北輿地紀勝人物漢周堪宣帝時論經石渠惟堪最高元帝時與蕭望之並領尚書以師傅見尊重後遷太子太傅南北朝周惠逹文安人後周文帝時進爵為公兼尚書僕射謙退下人喜㧞良士當時重之皇朝張暉大城人太祖時從征澤潞并蜀躬撫士卒人忘其勞同上集雨露從邉起旌旗上隴遥暮天沙漠漠空磧馬蕭蕭塞路随河水闗城外栁條和戎先罷戰知勝霍嫖姚皇甫孝常雲静妖星落秋高塞馬肥據鞍雄劍動摇筆羽書飛方期成獻凱歌舞共春暉杜必簡五原烽火急六郡羽書催氷狀飛狐冷霜濃候雁哀沈佺期將軍朝受鉞戰士夜啣枚紫塞金河裏葱山鐡勒隈同上燕郊芳嵗晚殘雪動邉城露重寳刀濕沙虛金鼔鳴崔顥本朝政和三年賜郡曰永清景祐二年廢永清入文安元豐四年割鹿角砦𨽻信安軍政和三年改劉家窩砦曰安平阿翁曰仁孝雁頭曰和寜喜渦曰喜安沿革表重闗深鎻白雲收天際諸峯黛色流北枕龍沙通絶漠南臨鳳闕壯神州煙生睥睨千巖曉露濕芙蓉萬壑秋王氣自應成五彩龍文長傍日光浮並曽棨亂山環合疑無路小徑縈廻長傍溪蘇子瞻徳州倚郭一外縣一安徳平原郡號平原州沿革天文危分野禹貢青州之域本齊郡地漢析置平原郡治平原縣東漢晉魏俱為平原國後魏改為郡又置安徳郡隋置徳州屬平原郡唐置徳州尋改平原郡乾元初復為徳州治安徳縣五代晉移治長河縣本朝移治安徳沿革表縣沿革安徳本夏鬲侯國漢為平昌縣唐改為徳安本朝省為安徳平原漢置縣為平原郡治晉屬平原國後魏徙置聊城而以縣屬清州尋屬安徳郡又改屬徳州同上形勝望逺臺在平原縣平原嶺可望百餘里安徳城在徳州境漢所置衛河在州城西經河間界入海廣川樓在州境内陳公堤在州東南北底大海董子讀書臺在徳州境内基山在安徳西二十里篤馬河在州城東龍泉井在安徳縣寺内其水甘㓗雖大旱不竭黒水潭在安徳縣西望之其水如黛上有龍王廟長魁臺在安徳縣東觀蓮臺在安徳西相𫝊昔劉闗張至此見池蓮盛開築臺起樓東方朔畫像賛在平原縣治内晉夏侯湛譔唐顔真卿書紀勝人物漢東方朔平原人武帝時上書稱㫖待詔金馬門遷大中大夫給事中高詡平原人世𫝊魯詩以清操知名光武徴拜大司農成翊世平原人好學明道術除尚書正色立朝百寮敬憚三國管輅平原人明周易精天文每言輙應晉劉寔平原人博通古今累官吏部郎叅相國軍事南北朝劉杳平原人伯懷珍父懷慰皆至顯宦杳博綜羣書事梁官至尚書左丞著書甚多明亮平原人有識幹仕魏遷陽平太守清白愛人甚有惠政皇朝張雍安徳人開寳中進士累官右諌議大夫尚書右丞蒞事勤恪集㑹賔座糲食而已單煦平原人舉進士歴數州皆有政績累遷光禄卿同上集柴門豈㫁施行馬魯酒那堪醉近臣頼有軍中遺令在猶將談笑對風塵鮑子慎秋日平原路蟲鳴桑葉飛李從一江涵秋影雁初飛與客擕壺上翠㣲塵世難逢開口笑菊花湏揷滿頭歸杜牧之古往今來只如此牛山何必淚沾衣天接海門秋水色煙籠隋苑暮鐘聲同上本朝景祐二年廢安陵縣入將陵又後割屬永静軍熈寜六年省徳平縣為鎮入安徳沿革表栁摇楚舘牽新恨花落吳宫憶舊游渇想和羮梅已熟饑思進飯麥初收汪水雲青徐氣接川原秀常碣風連草木薫曽子固平原太守顔真卿長安天子不知名一朝漁陽動鼓􅤯大河以北無堅城君家兄弟奮戈起一十七郡連夏盟文天祥公死於今六百年精忠赫赫雷行天同上濵州倚郭一外縣一渤海招安郡號渤海州沿革天文危分野禹貢青州之域春秋時齊地晉屬樂陵國隋屬渤海郡唐屬樂安郡五代唐置𣙜鹽務漢改贍國軍周改濱州治渤海縣沿革表縣沿革渤海本漢之溼沃縣地隋廢縣置永利鎮唐置渤海縣招安亦漢溼沃縣地唐置渤海縣本朝改為招安縣同上形勝東海在州及渤海招安境秦臺在州東北高八丈周回二百步秦始皇東遊築此以望海茅焦臺在州治東焦事秦以諌顯乆山在招安縣東北七十里秦始皇築以鎮海輿地紀勝人物秦公晳哀齊人不仕家臣孔子賢之茅蕉始皇時直諌遷太后於雍始皇悟子母復合如初皇朝胡旦渤海人少有俊才太宗時舉進士累官秘書少監劉蒙渤海人恥為辭賦後舉遺逸試第一知胡陽縣時行免役法即投劾而去門人稱為正思先生同上集珠寳之光以明塵霾之雜不處桞宗元東海歌九天之雲下垂四海之水皆立杜甫賦海神来過惡風廻浪打天門石壁開李白詩本朝大觀二年賜渤海郡名祥符五年廢蒲臺縣慶厯三年升招安鎮為縣熈寕六年省為鎮入渤海元豐二年復為縣沿革表雲破孤峯出潮平兩漿飛東溟看月上西渡認僧歸魚龍臨海窟鷄犬隔淮圻草色迷千古波聲蕩四圍廢興懷霸業融結想天機浩浩羣流㑹沉沉百恠依並晁君成横風吹雨入樓斜壯觀應湏好句誇雨過潮平江海碧電光時掣紫金蛇蘇東坡恩州倚郭一外縣二清河武城歴亭永平軍節度周為防禦郡號清河州沿革天文胃昴畢分野禹貢兖冀二州之域春秋時屬齊其後屬晉七國時屬趙秦為鉅鹿郡漢分置清河郡後漢為清河國晉因之後魏北齊並為清河郡後周兼置貝州隋初郡廢煬帝初復置清河郡而廢州唐為清河郡屬河北道本朝因之沿革表縣沿革清河漢縣唐屬貝州天寳元年改州為清河郡縣仍屬焉武城本七國時趙封平原君地歴亭隋開皇十六年置屬清河郡同上形勝西山在州西四十里津期在州南二十里溢涸無常不通舟楫絃歌臺在武城縣西上有子游祠隂山在州境林木深阻孫伏伽墓在武城東北鄃城屬清河在夏津縣界漢封吕陀欒布為鄃侯即此四女樹在州西北五十里有古槐俗傳四女同植輿地紀勝人物澹臺滅明武城人子游稱其行不由徑非公事不見邑宰漢趙苞東武城人靈帝時為遼西大守遣使迎母及妻子道值鮮卑刼質苞率衆禦之㓂出母以示母曰毋虧忠義苞遂力戰母妻為賊所害及塟母訖苞曰食禄而避難非忠也殺母以全義非孝也遂嘔血死崔琰東武城人少樸訥好擊劍年三十九乃從鄭𤣥學初從袁紹尋歸曹操為尚書三國崔林武城人為政多推誠存大體仕魏為幽州刺史遷至司空南北朝崔宏東武城人林六世孫少有俊才號冀州神童崔浩宏子博極羣書識天文歴官著作郎崔逞琰五世孫好學有文才仕慕容暐補著作郎崔彧逞曽孫善醫術性仁恕官至冀州别駕崔休逞𤣥孫公平清潔甚得時譽仕魏歴幽青二州刺史以清白著稱張彛東武城人性公强有風槩歴覧經史仕魏散騎常侍後為安西將軍崔亮琰之後為吏部尚書奏為格制以停觧日月為㫁後世賢愚同滯自亮始崔光清河鄃人好學晝耕夜誦仕魏為中書博士撰國書孝文稱其才曰浩浩如黄河東注今日之文宗也崔鴻光從子博綜經史官至平州刺史崔靈恩武城人編習五經尤精三禮三傳為國子愽士授徒數百儒者論天執渾盖之説恩立義以渾盖為一張晏之彛之孫仕北齊官至刺史百姓為製清徳頌以揚之唐孫伏伽武城人武徳初上言三事髙祖為侍御史太宗時累遷大理少卿崔隠甫以亷潔自守累官刑部尚書崔羣累官吏部尚書崔邠三世同居累官吏部尚書其弟郾郇鄲郾中進士第官禮部尚書鄲中進士第文宗末同平章事宣宗為一門孝友題其齋居曰徳星堂皇朝田祚清河人十世同居張美清河人事周世宗為樞宻承㫖因征淮南有功升左驍衛上將軍同上集魯客多歸興居人悵别情雨餘衫袖冷風惹馬蹄輕韓雄余亦東蒙客憐君如弟兄醉眠秋共被擕手月同行入門髙興發侍立小童清落景開寒杵屯雲對古城不願論簮笏悠悠滄海情並杜甫本朝初為節度慶厯八年改州名罷節度端拱元年徙治清河治永寜鎮淳化五年徙今治熈寜四年省清陽縣入焉至和元年廢漳縣入歴亭沿革表釋褐来城武始知為政難每簽逃户狀羞作字人官王禹偁古砌緑苔徧荒城草木寒拂榻驚巢燕陳書起蟻蛾並同上永静軍倚郭一外縣二東光將陵阜城郡號景州軍縣沿革天文箕尾分野禹貢冀州之域本漢景城侯國後置渤海郡隋開皇初廢唐復置觀州治弓髙貞觀中州廢貞元初始置景州再廢復置東光縣五代周改定逺軍本朝改永静軍東光本漢舊縣屬渤海郡後魏徙渤海郡治此隋初郡廢置州大業州罷屬平原郡以安陵縣省入唐屬滄州貞元初改屬景州五代周以弓髙縣省入本朝入永静軍治將陵本隋舊縣屬平原郡唐屬徳州本朝屬景州阜城漢舊縣屬渤海郡本朝改名阜城沿革表形勝盧師谷在郡東天胎山在東光縣南臨靳河劉麟河在阜城縣北因偽齊劉豫子麟為名胡盧河在阜城縣西北即衡漳之别名有王莽故河在永濟渠在東光西其深莫測千頃窪在郡東凡河決即導入此渠民免水患董子書院在郡廣川鎮祀董仲舒華陽亭在阜城相𫝊晉嵇康嘗學琴於此胡蘇亭在東光境以古河為名廣川臺在郡治東髙三丈上有董子祠周亞夫廟在郡西亞夫封條侯即此地弓髙城在郡東北漢封韓増為龍額侯今有龍額村即此簡子城在阜城縣東趙蕳子所築澹臺故居在故城縣西董家里在郡西即仲舒下帷讀書處輿地紀勝人物漢董仲舒治春秋三年不窺園度越諸子為漢醇儒隋公孫景茂阜城人博涉書史時稱書庫遷西州刺史教化大行吏民思之劉炫郡人閉户讀書十年不出奉勅同脩國史旋直門下省唐袁恕巳東光人歴官司刑少卿與誅二張以功封郡王其孫袁髙擢進士為給事中論盧杞當國朝廷壯之王晙郡人明經擢第除殿中侍御史授桂川都督皇朝周螢郡人習知水利累官杭州都監遷知樞宻院學士劉摯東光人登進士第為御史神宗朝上書請辨君子小人又論常平免役法十害官至中書舎人劉甲摯之子舉進士累遷國史編脩後拜寳謨閣學士晝之所為夜必書之名曰自鑒同上集親友送予邁揮淚廣川隂撫膺解擕手永歎結遺音吳岫雨來溪鳥浴楚江雲暗嶺猿吟並陸士衡野人寜憶滄洲畔㑹待吹嘘定至音許用晦本朝太平興國六年以軍直屬京淳化元年以冀州阜城来屬景徳元年改軍名景祐元年移將陵於長河鎮嘉祐八年省阜城為鎮入東光熈寜十年復為縣沿革表瀛洲歸去琅玕長月朗風薫十二樓汪水雲霜㪚月明誰㸃綴天容海色本澄清蘇軾記纂淵海卷二十
