body:
  text: 記纂淵海卷六十一宋潘自牧撰論議部袖手旁觀史利不在身以之謀事則智慮不私己以之斷義必厲東漢馬援傳互入無心門集坐觀垂釣者空有羨魚情孟浩然巧匠旁觀縮手袖間韓集自彈不若聽人彈白集本朝望室而知四隅者必超室表舉輿而知輕重者必在輿外老泉操舟常患不見水道之曲折而水邊之立觀者常見之奕棊之形雖國工有所不盡而袖手旁觀者常得之東坡秉燭者不如随燭之明奕棊者不如觀棊之精通鑑論篤間不容髪經差若毫釐繆以千里記經解財聚則民散財散則民聚大學子孔子曰舟非水不行水入舟則舟沒家語六本篇仲尼曰吾終身與汝交一臂而失之謂顔回也莊子自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊子徳充符人之所以異於禽獸者㡬希庶民去之君子存之孟子離婁上善擇者制人不善擇者人制之茍子王伯時之反側間不容息淮南子原道訓適堯舜文王者為正道非堯舜文王者為他道揚子問道先甲一日易後甲一日難揚子先知御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵揚子互入在人所為開之廓然見四海閉之閛匹庚切然不覩墻之裏揚子問道由其徳舜禹受天下不為泰不由其徳五兩之綸半通之銅亦泰矣揚子孝至史先則制人後則為人所制史記太尉令軍中曰為吕氏右袒為劉氏左袒軍中皆左袒史記吕后紀意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣西漢鄒陽傳互入離合無親踈先發制人後發制於人西漢陳勝傳行之有疑禍如發矢不可追也前漢淮南王傳係絶於天不可復結墜入深淵難以復出其出不出間不容髪西漢枚乘傳上呉王書譬之操鏌鎁執其柄則人莫敢抗失其柄還見害也東漢崔寔傳政論千里之差興於毫端東漢匈奴傳上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也秦始皇營宫室而民怨叛者病人以利己故也通鑑唐太宗機靜則有福機動則有禍通鑑唐武后帝曰丈夫得則為王失則為虜通鑑梁均王石敬塘曰夫事成於果決而敗於猶豫通鑑傳記中山君曰吾以一杯羊羮亡國以一壺餐得士二人戰國策集必若所為危於累卵難於上天變所以為易於反掌安於太山選枚乘上呉王書互入在人所為用之則為虎不用則為䑕選答客難出其言善千里應之苟違此義同衾以疑張華女史箴聽受一繆差以千里齊竞陵王行状君失臣兮龍為魚權歸臣兮鼠變虎李白火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣韓集先謀後事者逸先事後謀者失文粹珠璣雜於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不逺矣鏌鎁卧於鉛鈍之中下工覩之固亦知矣一有不知則必自與鉛鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也唐文粹猛虎所以使物畏而不敢犯者以能威自居也故盤林横谷奮睛以拏怒掉尾以倚嘯厭食於羆豕麏麚之肉及棄其所長而欲弭目委首以待餒是知命懸於執者之手雖鹿麑得以狎而摶而申歩於咫尺安得自遂也同前非以智免則將禍随劉長卿南軍不袒左邊袖四老安劉是滅劉杜牧之佞媚之言出如絲棼一入於人治亂不分間諜之言出如鷹鸇鷹鸇之迅一舉凌天皮日休集本朝權衡之平物動則輕重差其於靜也錙銖不失水之鑒物動則不能有睹其於静也毫髪可辨歐公非非臺記聚則為君臣散則為仇讎聚散之間不容毫釐故天下歸往謂之王人失其心謂之獨夫東坡上皇帝書此等棄而不用則作賊収而用之則捉賊東坡代李宗論東京盜賊状順水而行雲駃鳥集維水之利千里咫尺亂流而渉過膝則止維水之害咫尺千里東坡何公橋亭詩若己為君子而使人為小人是亦去小人無㡬矣東坡文譬諸草木種子若置之虛空不投地中雖經百千嵗何縁得産若種之地中潤之以雨露暵之以風日則開花結子數日可待欒城集鋒不可當經若火之燎于原不可嚮邇書盤庚上燎之方揚寜或滅之詩小雅正月子故仁人之兵聚則成卒散則成列延則若莫耶之長刃嬰之者斷鋭則若莫耶之利鋒當之者潰圜居而方正則若盤石然觸之者角摧荀子義兵臣之劍十歩一人千里不留行王曰天下無敵矣曰此劍直之無前舉之無上案之無下運之無旁上絶浮雲下絶地紀荘子說劍史以此衆戰誰能禦之以此攻城何城不克左僖四年鼓行而西西漢張良傳觸之者碎犯之者焦通鑑一卒畢力百夫不當萬夫致死可以横行後漢鄭泰曰譬猶驅虎兕以赴犬羊鼓烈風以埽枯葉誰敢禦之通鑑漢獻紀一夫荷㦸千人莫當晉書羊祐傳盧蔵用曰君如干將莫耶難與爭鋒通鑑唐紀若虎狼之得獸也何以當之通鑑唐代宗傳記干將鏌鎁所刺無前論衡集一夫揮㦸萬夫不得進選陳孔璋書先鋒孰敢爭杜詩先難後獲經若農服田力穡乃亦有秋書盤庚上若藥弗瞑眩厥疾弗瘳書説命上先知稼穡之艱難乃逸書無逸思其艱以圗其易民乃寜書君牙子無冥冥之志者無昭昭之名無惽惽之事者無赫赫之功荀子忍痛苦之藥石者所以除伐命之疾韓非子史不一勞者不久怢不暫費者不永寜西漢匈奴傳集孰不實而有獲楚辭欲晦而彰經濳雖伏矣亦孔之昭詩正月君子之道闇然而日章中庸子鄭子真耕乎岩石之下名振京師揚子問神自後者人先之自下者人髙之揚子寡見史法真隱居不仕前後四徴終不屈友人郭正曰法真名可得聞身難得而見逃名而名我随避名而名我追通鑑漢紀互入隱逸韓康採藥賣於長安市三十餘年時有女子買藥康守價不移女子怒曰公是韓伯休那乃不二價耶康歎曰我本欲避名今小女皆知有我焉用藥為乃遯入霸陵後漢書互入避名傳記魏武將見匈奴使自以形陋不足雄逺因使崔季珪代當自捉刀立牀頭曰魏王何如匈奴使答曰王雅望非常然牀頭捉刀人此乃英雄也王馳遣殺使世説互入因言取禍集蘭芷幽而有芳楚辭居蔽而聞章同上無往不自得經素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難記中庸道不行乘桴浮於海語公冶長子欲居九夷或曰陋如之何子曰君子居之何陋之有語子罕樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也語子路言忠信行篤敬雖蠻貊之邦行矣語衛靈公子人知之亦囂囂人不知亦囂囂孟子盡心篇靜而與隂同徳動而與陽同波上際於天下蟠於地莊子刻意史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季主傳互入隱逸寐與周公通夢靜與孔子同意東漢邊韶傳集採於山美可茹釣於水鮮可食起居無時惟適之安韓文若有人於羣動處一代問彼為彼我為我不自潔不自汚不巢許不伊吕水其心雲其身浮沉消息無往而不自得其為逹人乎白樂天互入曠逹居不必野惟性之寂止不必廣惟心之適皮日休集月異而嵗不同經婉兮孌兮總角丱兮未㡬見兮突而弁兮詩甫田子日改月化莊子山水史積善在身猶長日加益而人不知也西漢董仲舒傳魯肅拊吕蒙背曰吾謂大弟但有武畧耳至於今日學識英博非復吳下阿蒙蒙曰士别三日即更刮目相待吳志本傳注得魚亡筌經言者所以明象得象而忘言象者所以存意得意而忘象猶蹄者所以在兔得兔而忘蹄筌者所以在魚得魚而忘筌者也易畧例子筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄莊子外物篇女因媒而嫁不因媒而親淮南子史蜚鳥盡良弓蔵狡兔死走狗烹史越世家四時之序成功者去通鑑秦紀弓蔵鳥盡信匪虛言通鑑唐代宗傳記濟川得岸何假舟焉祕要經推波助瀾經毋敎猱升木詩角弓季氏富於周公而求也為之聚斂而附益之語先進子孟子曰求也為季氏宰而賦粟倍他日孟子離婁上君不鄉道不志於仁而求富之是富桀也孟子告子下虎哉虎哉角而翼者也揚子始皇方斧將相方刀揚子互入同惡推波助瀾文中子史猶抱薪救火薪不盡火不滅通鑑周紀人不勝天子天定亦能勝人荀子史天之棄商久矣君將興之弗可左僖二十一年天之所啟人弗及也左僖二十三年天之所置其可廢乎左僖二十八年天方授楚未可與爭雖晉之彊能違天乎左宣十五年力田不如逢年善仕不如遇合史佞倖傳秘記云唐三世之後女主武王代有天下上惡之密問太史令李淳風秘記所云信有之乎對曰臣仰稽天象俯察歴數其人已在陛下宫中為親属自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶㡬頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣通鑑唐太宗尊無二上經君所無私諱記曲禮注尊無二上父前子名君前臣名注曰至尊無大小皆名記曲禮上從於先生不越路而與人言注尊不二也記曲禮上夫為人子者三賜不及車馬不受不敢以成尊比踰於父記曲禮上孔子曰天無二日民無二王嘗禘郊社尊無二上記曾子問雖有三命不踰父兄記文王世子子云天無二日民無二王家無二主尊無二上示民有君臣之别也記坊記國無二君家無二尊以一治之也父在為母齊衰期者見無二尊也䘮服四制子孔子曰天無二日民無二王孟子萬章上大夫之臣拜不稽首非尊家臣也所以辟君也荀子大畧君者國之隆也父者家之隆也隆一而治二則亂未有二隆爭重而能長久者荀子史周宰渠伯糾來聘父在故名左成四年欒書將載晉侯鍼曰書退時鍼為晉侯右書将中軍國有大任焉得專之注云在君前故子名其父左成十六年惟賢知賢經抜茅連茹以其彚征吉易泰卦子天下之至明能舉天下之至賢家語惟君子為能知類荀子楊素曰素聞惟賢知賢敢問夫子文中子王道篇史惟善故能舉其類詩云惟其有之是以似之左襄三年孝文召田叔問曰公知天下長者乎對曰臣何足知之上曰公長者宜知之田叔曰孟舒長者也西漢田叔傳賢人在上位則引其類而聚之於朝在下位則思與其類俱進在上則引其類在下則推其類以類相致也前漢劉向傳惟賢知賢為朕求可以自輔者通鑑漢成紀夫惟賢知賢惟聖知聖凡人安能知非凡人耶通鑑漢獻紀武后謂仁傑曰朕用卿師徳薦也誠知人矣唐書傳記同聲則異類而相應意合則未見而相親賢者立於本朝而天下之豪相率而趨之也従其類也故詩有伐木之歌易有拔茅之喻也大戴記保傳篇不謀而同經飲食男女人之大欲存焉死亡貧苦人之大惡存焉記禮運如惡惡臭如好好色記大學子所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心孟子公孫丑上若合符節先聖後聖其揆一也孟子離婁下孩提之童無不知愛其親也及其長也無不知敬其兄也孟子盡心上夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五者人情之所必不能免也茍子王伯人之情雖桀紂又豈肯為其所悪賊其所好者哉荀子議兵凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨黑白美惡耳辨聲音清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾癢是又人之所當生而有也是無待而然者也是禹桀之所同也荀子榮辱凡人之情得所欲則樂逢所惡則憂見利莫能勿就見害莫能勿避管子禁蔵民之去就如火之於燥濕水之於髙下同上琬琰之玉存泥沙之中雖㢘者不釋淮南子史夫不令之臣天下之所惡也左宣十年互入疾惡曾參孝其親天下願以為子子胥忠於君天下願以為臣史記陳軫傳和氏璧天下所共傳寳也司馬相如傳猶子弟之衛父兄手足之捍頭目前漢刑法志人情憚難而趨易好同而惡異通鑑魏明紀集至於稻也粱也膾也炙也豈聞有不嗜者哉韓文儒墨同是堯舜同非桀紂同上麟之為靈雖婦人小子皆知其為祥也同上劉伶今日意異代是同聲栁詩本朝韓魏公嘗言仁廟配享清議皆與沂公不與申公誠意不可欺如此遺事人情不問賢愚莫不畏天而嚴父東坡巧反成拙子宋人有憫其苗之不長而揠之者芒芒然歸謂其人曰今日病矣子助苗長矣其子趨而往視之苗則槁矣孟子公孫丑上伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患後有鞭䇿之威馬之死者已過半矣荘子史新垣平所言皆詐史記畫虎不成反類狗東漢馬援傳反裘負薪存毛實難宋書范泰傳殷浩答桓温書慮有謬誤開閉者十數竟逹空圅通鑑晉穆紀傳記楚舎人相謂曰各畫地為蛇蛇先成者飲酒一人先成曰吾能為之足未成一人後成奪其巵曰蛇故無足子安能為之足遂飲其酒為蛇足者終亡其酒戰國䇿田子方使人遺子思狐白之裘恐其不受因謂之曰吾與人也如棄之子思辭曰伋聞妄與不如遺棄於溝壑伋雖貧不忍以身為溝壑也劉向説苑畫蛇而添足反失盃中之酒史通集金石而服食説自何世起殺人不可計而世慕向之蘄不死乃得速死謂之智可不可也韓文李君墓誌飲藥本攻病毒腸翻自殘韋應物本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入自納敗闕愛適為害子宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趨而往視之苗則槁矣夫助之長者揠苗者也非徒無益而又害之孟子互見徒勞無補繆公之於子思也亟問亟餽鼎肉子思不恱於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋孟子萬章下南海之帝為鯈北海之帝為忽中央之帝為渾沌鯈與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之徳曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死荘子應帝王篇鷦鵬冲天不在六翮乎㧞而傅鳲鳩其累矣夫揚子寡見史鄭武公武姜生莊公及共叔段愛共叔段欲立之亟請於武公公弗許及莊公即位為之請京使居之太叔完聚將襲鄭夫人將啟之公命伐京太叔出奔共左隱元年鄭子皮欲使尹何為邑子産曰猶未能操刀而使割也子之愛人傷之而已其誰敢求愛於子左襄三十一年漢王愛幸趙隱王如意太子弱帝欲廢之而立如意髙祖崩吕后召趙王誅之西漢吕后傳漢宣帝任刑法信中官尚書葢寛饒奏封事曰今以刑餘為周召以法律為詩書又言五帝官天下三王家天下家以傳子官以傳賢執金吾奏寛饒指意欲求禪大逆不道諌大夫鄭昌上書訟寛饒曰上無許史之属下無金張之託許伯宣帝皇后父史宣帝外家金張日磾安世也上不聽遂下寛饒吏寛饒引佩刀自剄北闕下西漢本傳位過其任莫能有終所謂愛之適足以害之也西漢佞倖傳贊厚之如此反所以害之也西漢鮑宣傳丁公為項羽將逐窘髙祖髙祖曰兩賢豈相阸哉丁公引兵還及羽滅丁公謁髙祖髙祖以丁公徇軍中曰丁公為臣不忠使項王失天下者也遂斬之通鑑髙祖鄭武姜之幸叔段衛莊公之寵州吁愛而不敎終至凶戾愛子若此猶飢而食之以毒適所以害之也東漢何敞傳愛之不以道適所以害之也通鑑東晉成紀傳記魏武曹操常云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者世説輕詆篇互入姦邪尹吉甫子伯竒至孝事後母母取蜂去毒繫於衣上伯竒前欲去之母便大呼曰伯竒牽我吉甫見疑伯竒自死列女傳人之愛子罕亦能均有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之劉表之傾宗覆族袁紹之地裂兵亡可為龜鑑也北齊顔氏家訓魏文侯出逰見路人反裘而負芻文侯問之對曰臣愛其毛也文侯曰若不知裏盡而毛無所恃耶新序永有某氏愛䑕不畜猫又禁僮勿擊䑕倉廪庖厨悉以恣䑕不問由是飲食大率䑕之餘也數嵗某氏徙居他州後人來居䑕為態如故假五六猫闔門撤瓦灌宂購僮羅捕之殺䑕如丘栁文永某氏之䑕㡬許平生歡無限骨肉恩結為腸間痛聚作鼻頭辛白樂天集櫪馬非不肥所苦長繫維豢豕非不飽所憂竟為犧文粹槖駝種木其蒔也若子其置也若棄它植者則不然愛之太過憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯摇其本以觀其疎密而木之性日已離矣雖曰愛之其實害之雖曰憂之其實讎之唐栁宗元郭槖駝傳本朝東坡下獄張安道致仕在南京上書令其子恕持至登文院恕不敢投久之東坡出獄其後東坡見其副本因吐舌動色曰獨不見鄭昌之捄葢寛饒云上無許史下無金張正激宣帝之怒元城語錄煩惱初無根恩愛為種子東坡詩捨失求得子管子以小辱成大榮淮南子史李同説平原曰家之所有盡散以饗士士方其危苦之時易徳耳於是平原君説之得敢死之士三千人史本傳人爭取賤賈任氏獨取貴西漢貨殖傳陷之死地而後生投之亡地而後存西漢韓信傳互入反鋒而用不入虎穴不得虎子東漢班超傳不探虎穴安得虎子三國呉吕蒙傳因誤成誤史絳灌等譛陳平受諸將金漢王召讓之平曰臣躶身來不受金無以為資史陳平世家子獨不見家人寡婦耶始自約敕之時意乃慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣西漢原渉傳互入遂非無顧藉許后當娠病女醫淳于衍者霍氏所愛因投毒藥加煩懣崩諸醫皆収繫顯恐急即以狀具語光光大驚欲自發舉不忍猶與會奏上光署衍勿論顯因勸光内其女入宫通鑑漢宣紀𢎞為布衣食不重肉汲黯曰𢎞位在三公奉祿甚多然為布被此詐也上問𢎞𢎞謝曰有之誠中𢎞之疾夫以三公為布被與小吏無差誠飾詐欲以釣名如汲黯言且無汲黯忠陛下安得聞此言天子以為謙遜愈益厚之通鑑漢武紀晉司徒賈充辟韓夀為掾讌賔僚女從青瑣中窺見夀悦之竊帝所賜充香遺夀充覺問女遂妻之晉書桓温嘗使王獻之書扇筆落因畫作牛甚妙晉書本傳孫子荆誤謂王武子曰當枕流潄石武子曰石非可潄流非可枕孫子曰所以枕流洗其耳潄石礪其齒晉書王隱互入遂非東魏以王愔典選令史唱名誤以盧士深為士琛士深自言其名愔曰盧郎朗潤所以加玉王國典畧互入敏於應對姚崇二子分司東都恃其父有徳於魏知古頗招權請知古歸悉以聞他日上従容問崇卿子才性何如今何官也崇揣知上意對曰知古微時臣卵而翼之臣子愚以為知古必徳臣容其為非故敢干之耳上於是以崇為無私而薄知古負崇通鑑唐𤣥宗傳記孫權使曹再興畫屏風誤落筆㸃素因就成蠅状權疑其真以手彈之名畫記識者難欺子淄澠之合易牙嘗而知之列子説符伯樂不可欺以馬荀子劍工惑劍之似莫耶者惟歐冶能名其種玉工眩玉之似碧盧者惟猗頓不謬其情淮南子識珍者必拾濁水之明珠抱朴子以趙曲為雅聲者惟鍾期不溷其音以燕石為美玉者惟猗頓不謬其真以郢賦為麗藻者惟相如不濫其賞同上史叔孫通初制定禮儀見非於齊魯之士前漢禮樂志美玉藴於碔砆凡人視之藐焉良工眡之然後知其為和寳也精鍊藏於鑛璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳斛律金用匈奴望塵知馬歩多少嗅地知軍度逺近北本傳傳記師曠識㸑薪易牙别淄澠晏子春秋集坐中亦有江南客莫向春風唱鷓鴣鄭谷非道難罔經小人閒居為不善無所不至見君子而後厭然揜其不善而著其善人之視己如見其肺肝然則何益矣大學君子可欺也不可罔也語雍也子君子可欺以其方難罔以非其道孟子萬章上有人於此蔵千鎰之金雖行貸而食人謂之富矣荀子互入真不可滅愛人及烏史士鞅曰武子之徳在民如周人之思召公焉愛其甘棠況其子乎左襄十四年互入遺愛傳記愛其人者兼屋上之烏説苑立節篇太公曰愛人者兼其屋上之烏尚書大傳大戰篇集愛子及室言鴟鴞詩也張士然表丈人屋上烏人好烏亦好杜詩憎人及胥子庾公名位漸重足傾王公庾公在石頭王公在城忽風起揚塵王公以扇拂之曰元規塵汙人郭子元規庾亮字王公導也又見通鑑傳記憎人甚惡其餘胥尚書大傳大戰篇互入遷怒衆目難掩經人之視己如見其肺肝然記大學曽子曰十目所視其嚴乎同上史欲蓋而章左傳序劉洎曰借使遂良不記天下亦皆記之通鑑唐書郜鼎在廟章孰甚焉左桓二年寗殖曰吾得罪於君名蔵在諸侯之䇿左襄二十年陳軫曰非獨儀知之也行道之人盡知之矣史本傳互入無隱司馬昭之心路人所知也通鑑晉書集萬目睽睽韓文西子不華嫫女錦縠是不能易其美惡難將一人手掩得天下目並唐文粹當局者迷子夫以一縷之任繫千鈞之重上懸之於無極之髙下垂之於不測之深旁人皆哀其絶而造之者不知其危孔叢子史虞卿料事揣情而為趙畫䇿何其工也及不忍魏齊卒困於大梁庸夫且知其不可况賢人乎史本傳論韓子為説難而卒不能自脱史本傳太史公曰春申君説秦昭王何其智之明也後至於李園繆矣史記援戒子之禍智矣而不能自免於讒言後漢馬援傳論傳記天下無窮者才智也陳平嘗出六竒燕居深念恐禍及已陸賈教之交驩太尉又為畫吕氏數事平従之卒誅諸吕則賈之智又在平之右矣孔氏雜説互入强復遇强及智慮兩門集睫在眼前常不見杜牧之本朝操舟者常不見水道之曲折而水濵之立觀者常見之弈碁之形雖國工有所不盡而袖手旁觀者常得之東坡朝辭赴定州論状互入袖手旁觀不識廬山真面目只緣身在此山中蘇詩交臂而失經執柯以伐柯睨而視之猶以為逺記中庸互入愚暗人莫不飲食也鮮能知味也記中庸雖有嘉肴弗食不知其旨也記學記子道在邇而求諸逺孟子離婁上仲尼謂顔淵曰吾終身與汝交一臂而失之荘子山水史平原君定從而歸曰勝相士多者千人寡者百數自以不失天下之士今於毛先生失之矣史平原君傳曹操攻吕布軍敗布騎得操而不識詢曰曹操何在操曰乘黄馬走者是也乃釋操而追黄馬者操突出引還通鑑漢獻紀互入反鋒而用晉武帝曰吾獨不得如亮者而臣之乎樊建曰陛下知鄧艾之寃而不能直雖得亮得無如馮唐之言乎通鑑晉紀魏舒為鍾毓長史毓初不知其善射後遇射人不足以舒滿數舒發無不中舉坐莫敵毓歎而謝曰吾之不足以盡卿才有如此射矣晉書本傳宇文泰與侯景戰堕馬失所之左右皆散李穆罵曰隴東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸通鑑梁武紀互入反鋒而用漢文帝知李廣才而不能用乃歎其生不逢時唐魏元忠傳本朝唐李程貞元中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰公今須作狀元翌日無名於陵深不平乃於故册子末繕冩而斥其名氏攜之以訴主文主文歎賞不已於陵曰當今塲中若有此賦侍郎何以待之答曰非狀元不可也於陵曰苟如此侍郎已遺賢矣此乃李程所作亟命取李程所納卷對不差一字主文因謀之於陵擢為狀元見東坡與李廌詩注互入轉禍為福五色賦事北夣瑣言亦載新唐書李程傳載程試日五色賦擢進士駕艅艎而索舟䇿飛黄而問駿鳥道集平時謾説古戰場過眼空迷日五色坡詩貴耳賤目子境内之傑不愛而求邦外之士尸子史漢文曰吾不得㢘頗李牧為將哉馮唐曰魏尚守雲中匈奴逺避以差功六級削爵雖得頗牧不能用也前漢馮唐傳凡人賤近而貴逺親見揚子雲祿位容貎不能動人必輕其書昔老耼著虛無之言薄仁義非禮樂然後世好之者尚以為過於五經西漢揚雄傳凡人情忽於見事而貴於異聞通鑑漢光武紀崔寔曰俗士拘文牽古不逹權制竒偉所聞簡忽所見烏可與論國家之大事哉東漢本傳互入窒泥庾征西善書少時與右軍齊名右軍後進庾尤不忿在荆州與都下人書小兒輩賤家雞愛野雉晉書薛謙光上疏昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令通鑑唐武后韋處厚曰陛下有一裴度不能用乃當饋而歎恨無蕭曹唐裴度傳傳記田饒事魯哀公而不見察謂哀公曰夫雞有五徳猶日瀹而食之者以其所從來者近也黄鵠一舉千里止君園池啄君稻粱君猶貴之以其所從來者逺也韓詩外傳集陋今榮古張平子東京賦耀所聞而疑所覿班孟堅賔戯凡人可以言古不可以言今桓譚亦云親見揚子雲容貎不能動人安肯傳其書誠使博如莊周哀如屈原奥如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未有不薄於當時而榮於後世也栁文聞道近來諸子弟臨池尋已厭家雞栁詩貴耳賤目榮古陋今人之大情也白傅集逺物皆重近皆輕雞雖有徳不如鶴唐文粹視近易忽史裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近舎湜而逺取居易請從此辭唐書本傳互見自負集當仲尼在時世人不言為聖人也伐檀削迹於七十二君不一值或以為東家丘或以為䘮家狗沈約辨聖論文選以何水部在世不錄南薫集序本朝君家自有元和譜莫厭家雞更問人東坡詩習熟難忘子庖丁曰臣始解牛所見無非牛者荘子養生篇史楚鍾儀囚於晉晉人與之琴操南音左傳互入懐鄉李廣居則畫地為軍陳射闊狹以飲專以射為戯史本傳越人荘舄仕楚病楚王曰舄越之鄙人必思於越使人往聽之果為越吟史記互入懐鄉殷仲堪曰三日不讀道徳論便覺舌本間強晉書互入習慣義貞曰靈運空疎延之隘薄魏文帝所謂古今文人類不䕶細行者也但性情所得未能忘言於悟賞耳通鑑宋髙祖紀唐𤣥宗問姚崇曰公知獵乎對曰少為獵師老而猶能唐書本傳傳記髙祖既作新豐并徙舊社放犬羊雞鴨於通途亦競識其家西京襍記伯樂相馬所見無非馬吕氏春秋上皇居南内夜登勤政樓聞里中隱如歌聲顧力士潛召果棃園弟子也楊妃外傳越王曰躃者不忘走盲者不忘視後漢趙曄吳越春秋集魚意思在藻鹿心懐食苹張九齡風情雖老未全消白樂天聞休戰鬬心還癢見説鏖塵眼即開王建集商女不知亡國恨隔江猶唱後庭花杜牧之詩互入懐鄉惟有詩魔降不得每逢風月一閒吟白集本朝書生習氣未能無東坡詩剩員呈武藝老妓舞柘枝古今詩話至今清夜夢尚驚冠壓頭坡詩互入閒適投紱歸來萬事輕消磨未盡秪風情鳥囚不忘飛馬繫常念馳並東坡詩舊態難改經驕淫矜夸將由惡終雖収放心閑之惟艱書畢命商俗靡靡利口惟賢餘風未殄同上傳記梟欲東徙曰鄉人皆惡我鳴鴂曰子能更鳴可矣不能更鳴東徙猶惡子之聲説苑談叢集雖漸斂束故態未鋤司空表聖互入習慣不自覺醜子今以其昏昏使人昭昭孟子猶人不能行而賣躄藥劉子史陳遵常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮沉俗間官爵功名不減於子而差獨樂顧不優乎西漢陳遵傳以鴟鴞而笑鳳凰執蝘蜓而嘲龜龍西漢揚雄傳北山有鴟不潔其翼饕餮貪汙臭腐是食長鳴呼鳳謂鳳無徳東漢朱暉傳注互入居邪惡正固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也范曄賛班固互入此無彼誚唐太宗曰人苦不自覺通鑑本紀集家有敝帚享之千金斯不自見之患也魏文帝典論本朝韓子論荀揚之疵而韓子之疵有甚於荀揚荀卿譏六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試䇿問互入此無彼誚此無彼誚子唯之與呵相去㡬何同為應對而相去㡬何老子異俗篇或百歩而後止或五十歩而後止以五十歩笑百歩則何如曰直不百歩耳是亦走也孟子梁惠王上史齊使跛者逆跛者禿者逆禿者眇者逆眇者公羊固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫後漢范曄贊班固互入不自覺醜武宗奮然除去浮圗之法甚鋭而躬受道家之籙唐武宗贊無異於避湯入火通鑑梁紀傳記土偶人方與木梗人語木梗謂土偶人曰子先土也持子以為偶人遇天大雨水潦並至子必沮壊應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止説苑尊賢優孟謂趙襄子曰今天下盡桀也而君紂之桀紂並世焉能相亡然亦殆矣新序集楚則失矣而齊亦未為得也司馬長卿上林賦李赤善為歌詩類李白名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其属意明白今世皆知笑赤之惑也及至是非取予向背決不為赤者㡬何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉栁文李赤傳互入昧於自知似同浴而譏裸裎也韓文豹則虎之弟鷹則鷂之兄古樂府本朝徐鉉不信佛酷好鬼神之説筆談韓子論荀揚之疵而韓子之疵有甚於荀揚荀卿議六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試䇿問互入不自覺醜五技鼯䑕笑鳩拙百足馬蚿憐鼈跛山谷詩牀上施牀經如塗塗附小雅角弓傳屋重架屋牀上施牀史通本朝屋上架屋牀上疊牀鳴道集以水濟水子方其夢也不知其夢也夢之中占其夢焉莊子以水救水以火救火名曰益多莊人間世以水投水淮南子史以水濟水左傳以暴易暴史記伯夷傳又見唐書魏徴傳如以湯止沸前漢禮樂志如以血止血汙益甚耳通鑑唐紀以亂易亂唐書魏徴傳如以蒿箭射蒿中耳通鑑唐髙祖集𤣥文處幽楚辭𤣥墨也如以膏濯衣每漬垢愈染借聽於聾求道於盲並韓文青勝於藍經子謂仲弓曰犂牛之子騂且角論語子青出於藍而青於藍氷水為之而寒於水荀子勸學以湼染緇則黑於湼以藍染青則青於藍淮南子俶貞訓明月之珠出於蚌蜄周之簡圭生於垢石大蔡神龜出於溝壑淮南子説山訓史孔融見韋元將仲將與其父端書曰不意雙珠近出老蚌後漢陸卬之子雲少機悟好學邢劭曰老蚌遂出明珠晉書本傳禇淵卒世子侍中賁恥其父失節服除遂不仕以爵讓其弟蓁屏居墓下終身通鑑齊太祖監察御史許逺敬宗之曽孫也通鑑唐𤣥宗盧元輔簡潔貞方歴踐清貴人亦不以其父把之醜行為累人士歸美舊唐書本傳傳記山公大兒武帝欲見之山公不敢辭問兒兒不肯行時論乃云勝山公世記集椎輪為大輅之始大輅寜有椎輪之質增氷為積水所成積水曽微增氷之凛並文選序龢氏之璧韞於荆石隋侯之珠藏於蚌蛤班孟堅答賔戲金生沙礫珠出蚌泥蔡伯喈青衣賦雛鳳清於老鳳聲李義山集惡木生槎枿之英虎穴之中生此騏驥並唐文粹羸牛生健犢杜牧之集本朝淤泥生蓮花糞壤出菌芝東坡詩枯朽猶能出菌芝同上互入自負引凡入聖經出自幽谷遷于喬木詩伐木子百川學海而至于海揚子出潢汙而浮滄海背螢燭而向日月抱朴子金丹篇集本是南山松今為宫殿梁古樂府如河入海無復水名劉賔客互入因小陋大江出汶山水力才能汎觴至於并大川三百小川三千然後與洞庭彭蠡同波下而與南溟北海同味黄魯直與何静翁書以毒攻毒史以蠻夷攻蠻夷西漢晁錯傳張敞守京兆尹市偷盜多敞乃召偷盜之長數人見之責問因貰其罪令致諸盜以自贖偷長曰今一旦召詣府恐諸偷驚駭願權補吏職敞皆以為吏遣歸休置酒小偷悉來賀各飲醉偷長以赭汙其身衣裾吏坐里閭閲出者汙赭輙収縳之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事三輔議論者至云貴戚廢錮當復以貴戚浣之猶解醒當以酒也通鑑東漢章紀第五倫傳本朝醫者之視堇也使其毒可以治病而不至於殺人也老泉文惟姦識姦史張湯為人多詐丞相𢎞數稱其美西漢本傳張敞守京兆尹市偷盜多敞召偷盜之長數人見之責問因貰其罪令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀飲且醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒収縳之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事以毒攻毒兩門桓温經王敦墓望之曰可人可人其心迹若是晉書桓温傳魚朝恩執易升髙座講鼎覆餗以譏宰相王縉怒元載怡然朝恩謂人曰怒者常情笑者不可測也通鑑富不如貧經齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之論語互入事反所料子布衣紃履之士雖在窮閻漏屋而王公不能與之爭名荀子富國無置錐之地而公侯不能與之爭名仲尼是也荀子史梁齊楚趙之君非不富且貴也惡乎成名谷口鄭子真不屈其志耕於岩石之下名震于京師西漢王貞等傳序向長讀易至損益卦曰吾已知富不如貧矣東漢集齊景公之千駟不如顔回原憲之約其身文選李蕭逺運命論本朝惟富貴者之不得兼然後貧賤之士有以自足而髙世歐公桴槎出水記智不若愚子以為舟則沉以為棺椁則速腐以為器則速毁以為門戸則液漏以為柱則蠧不材之木也無所可用故能若兹之夀夫柤棃橘柚果蓏之属實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭荘子巧者勞而智者憂無能者無所求饒食而遨汎若不繫之舟也同上螾無爪牙之利筋骨之强上食埃土下飲黄泉用心一也蟹八跪而二螯非蛇蟺之穴無所寄託者用心躁也荀勸學巧詐不如拙誠傳子史十語九中不如一黙史記互見謹言攖拏者亡黙黙者存西漢揚雄智者以有餘為疑而朴者以不足取信東漢呉漢左雄曰白璧不可為容容多後福通鑑東漢周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子曰伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容於世惟阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也晉書周顗傳傳記黙無過言慤無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背説苑集何巧智之不足而拙艱之有餘潘安仁閒居賦牛之為物日耕百畆人不慚愧利滿天下皮角見用肩􅥑不保不如羸驢服逐駑馬不耕不駕藿菽自與騰踏康莊出入輕舉當道長鳴聞者驚辟牛雖有功於己何益命有好醜非若能力栁牛賦今者無端讀書史智慧祗自勞精神凡物之生不願為材犧尊青黄乃木之災並韓集老龜被刳膓不如無神靈白侍郎互入招禍門巧婦才人常薄命莫敎男女苦多能蟲全性命縁無毒木盡天年為不才鐵馬因疲退鉛刀以鈍全並白侍郎本朝癡人自得終天命智士死智寃莫雪皎皎千丈清不如尺水渾先竭是甘井得全如苦李人人生子欲聰明我被聰明害一生但願我兒愚且魯無災無難到公卿並東坡詩信有千丈清不如一尺渾後山巧者言拙者黙巧者勞拙者逸巧者賊拙者徳巧者凶拙者吉周茂叔拙賦智不終智經子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也記中庸子魚鼈黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀子法行篇互入貪迷神蛇能斷而復續而不能使人勿斷也淮南子智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見爆列子集猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人所擒皆獲輒無遺者唐文粹裴炎猩猩銘互入貪迷本朝老狐足姦計安居穴垣墻窮冬聽氷度思慮豈不長引身入扱引也中將死猶跳踉歐公集虎終機械得烏亦彈丸随臨川集彊復遇彊經趯趯毚兔遇犬獲之詩子夫火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之淮南子主術論今夫虎豹便㨗熊羆多力然而人食其肉而席其革淮南子史宋公兼享晉楚之大夫趙孟為客子木與之言不能對使叔向侍言焉子木亦不能對也左襄二十七年寗成家居南陽及縱至闗寗成側行送迎然縦氣盛弗為禮至郡遂案寗氏盡碎破其家史義縦傳蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀遊諸侯無所遇困於楚蘇秦故召而辱之舎人曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉給君資盡蘇君之計謀也張儀曰嗟乎此在蘇君術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言通鑑周紀漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射項羽羽大怒瞋目叱之樓煩目不能視手不能發走還入壁不復敢出西漢項羽傳汲黯為忮師古曰忮意堅也音章豉反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵憑前漢寗成傳東魏丞相髙歡攻王壁韋孝寛隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乘之以入城上先有二樓孝寛縳木接之令常髙於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾通鑑梁髙祖傅奕謂其子曰吾聞有金剛石者性至堅物莫能傷惟羚羊角能破之通鑑唐太宗安祿山於公卿皆慢侮之獨憚李林甫每見雖盛冬嘗汗沾衣林甫乃引與坐於中書㕔撫以温言自解披袍以覆之祿山忻荷言無不盡通鑑唐𤣥宗秦系與劉長卿善以詩相贈答權徳輿曰長卿自以為五言長城系用偏師攻之唐書本傳傳記天下無窮者才智也陳平嘗出六竒燕居深念恐禍及已陸賈敎之交驩太尉又為畫吕氏數事平從之卒誅諸吕則賈之智謀又在乎平之右矣孔氏雜説互入當局者迷又入智慮集鹿畏貙貙畏虎虎畏羆栁文本朝羔豚窘虎豹鳩雀窮鷹鸇巧者具機弋勢猛還拘攣臨川集王荆公初參政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書趙清獻獨折之曰君言失矣臯䕫稷契之時有何書可讀荆公黙然邵氏後錄互入敏於應對一輿薪之火衆人之所憚而不敢犯也舉而投之河則何熱之能為老泉集居邪惡正經不懲其心覆怨其正箋云不懲女之奸心而反憎其正詩節南山彼醉不臧不醉反恥詩賔之初筵子鄉原曰言不顧行行不顧言曰古之人行何為踽踽涼涼孟子盡心衆曲不容直衆枉不容正淮南子直繩者枉木之所憎抱朴子史惡直醜正已則無禮而討於有禮者曰汝何故行禮並左傳盜憎主人左成十五年晋伯宗之妻曰盜憎主人别見於家語闒茸佞讇抱虛求進殘賊酷虐若此人徒嫉善憎忠西漢李尋傳北山有鴟不潔其翼饕餮貪汚臭腐是食長鳴呼鳳謂鳳無徳東漢朱暉傳注互入不自覺醜妄論二門後漢孔奮為武都郡丞力行清潔為衆人所笑以為身處脂膏不能自潤通鑑羊祜不附結中朝權貴荀朂馮紞之徒皆惡之通鑑晉世祖佞邪醜正西漢張華傳燕封裕曰已無骨鯁嫉人有之通鑑晉紀互入嫉妬便佞之徒謂彊直為擅權唐書傳記趙簡子曰美女者醜之仇也盛徳之士亂世所疏也正直之行邪枉所憎也説苑集學者以莊老為宗而黜六經談者以虛薄為辯而賤名撿行身者以放濁為通而狎節性進仕者以苟得為貴而鄙居正當官者以望空為髙而笑勤恪其倚仗虛曠依阿無心者皆名重海内若夫文王日昃不暇食仲山甫夙夜匪懈盖共嗤㸃以為灰塵相垢病矣晉紀干寳總論孤直者衆邪之所憎公正者羣惡之所嫉陳子昂集奴顔婢膝真丐乞反以正直為狂癡陸魯望本朝在位而不肯自憂又禁他人使皆不得憂可嘆也歐公集渉水惡濕子是猶惡濕而居下孟子蒙塵而欲毋昧渉水而欲毋濡不可得也淮南子繆稱篇吹灰而欲毋昧渉水而欲毋濕不可得也淮南子史賈而欲贏而惡囂乎左昭元年集是徒渉而恥濡足也唐文粹勢不自由子樹欲靜而風不停家語政思犧牛衣文綉食芻菽入太廟雖欲為孤犢其可得乎列子象以牙䘮身不能去其白薫以芳自燒不能去其香蘇子史李斯臨刑謂其子曰吾欲與若復牽黄犬俱出上蔡東門逐狡兔豈可得乎史本傳夫士修之於家而壊之於天子之庭通鑑譬如磑石之上行蟻蟻行遲而磑轉疾後漢王充論衡宋劉穆之曰貧賤常思富貴富貴必履危機今日而欲為丹陽布衣豈可得耶通鑑晉書涼吕超曰如乘龍上天豈可中下通鑑晉紀獨孤后曰騎獸之勢必不得下隋書目見可欲何能自窒於心已與交私何能中絶其意通鑑唐徳宗李泌歸謂子弟曰吾本不樂富貴而命與願違今累汝曹矣同上傳記牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭䇿痛矣袁淮正書集女辭家而適人臣出身而事主禰正平賦遊山澤觀魚鳥心甚樂之一行作吏此事便廢晉嵇康與山濤絶交書去住與願違仰慙林間翮杜工部譬如籠中鶴六翮不自摇騎虎不敢下並韓集心雖出雲鶴身尚觸籠鷹心源雖了了塵世苦憧憧並元微之開卷不及顧沉埋案牘間世事波上舟沿洄安得主意有清夜戀身為符守嬰並韋應物一落名宦途酷如乘風􅊑奔走情波不自由並劉賔客驛馬走四蹄痛酸無歇期磑牛封兩目昏閉何人知樹欲靜而風不止並白樂天自嫌如疋素刀尺不由身杜牧之隨牒牽黄綬孟浩然雖百諾之自我終一呼而在君髙逹夫互入控制有道本朝始知鎖向金籠聽不及林間自在啼歐公集飄零不自由盛衰非汝能我生天地間一蟻寄大磨區區欲右行不救風輪左並東坡詩一被簮裳裹長遭羅網牽欒城集力所不及經巧歴不能定其算數聖明不能為之典要法制所不能齊度量所不能均也周易畧例若火之燎于原不可嚮邇書盤庚上互入無所用力我躬不閲遑恤我後言我今尚恐不能自容何暇憂我後之人乎毛詩成事不説遂事不諫既往不咎論語子目之明能見於百歩之外而不見其背帷墻之外則無睹也子華子萬室之國一人陶則可乎孟子告子下猶七年之病求三年之艾也孟子世固非一毛之所濟列子楊朱篇古人目短於自見故以鑑觀面韓非子瞽者無以與乎文章之觀聾者無以與乎鍾磬之聲莊子逍遥逰盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀莊子大宗師離朱之明察毫末於百歩之外下水尺不能見淺深非目不明其勢難覩也慎子朝露之繭工女不能治淄澠之沙計兒不能數魯連子躄者見虎不走非勇也淮南子離朱之明察毫末於百歩之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外淮南子訓道篇故君子能為善而不能必其得福不忍為非而未能必免其禍淮南子繆稱訓瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊呼覽切狄牙不能齊不齊之口揚子問神歐冶不能鑄鉛錫為干將抱朴子阿膠三寸不足止黄河之濁毁箄三尺不足救鹽池之鹹傅子史晉伯宗曰雖鞭之長不及馬腹左宣十五年晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也左成十年互入病疾飄風之末不能舉鴻毛國語彊弩之極矢不能穿魯縞衝風之末不能漂鴻毛非初不勁末力衰也史韓安國傳死病無良醫通鑑周紀昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也同上覆水不収東漢光武紀蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也通鑑漢桓紀徐穉曰夫大木將顛非一繩所維通鑑漢桓紀隄防穿漏萬夫同力不能復救通鑑漢殤紀若河決金堤火炎崑岡雖神禹之乘四載𤣥冥之洒八瀛亦不能湮洪濤而撲烈燄者何也良以勢既壊而不能遽救也唐史臣代宗贊傳記騏驥盛壯之時一日而馳千里至其衰老駑馬先之戰國䇿互入事必有極猶渴而穿井臨難而鑄兵雖疾從而不及也説苑雜言篇互入逺水不救近火尺水不能却簫丘之熱意林集孰江河之可涸楚辭譬猶疾疚彌年而欲一丸銷之選詩集序沈寒凝海不能結風烈火流金不能焚景選連珠鞭長不及馬腹風末不舉鴻毛朱敬則宋武論譬如心中疾箴石非所砭韓集獵客張兎罝不能挂龍虎李太白集短線無長縫月中有桂樹無翼難上天海底有驪珠下隔萬丈淵並唐文粹轆轤無繩井百尺盧仝詩索過風於前林求往夢於既寤不可及也穆元同徳寺㑹集序本朝疾風無末勢陳後山心至力不及子譬猶好聲色而無耳目也荀子王伯臨河羨魚而無網罟抱朴子釋滯篇傳記猶鴻鵠之無羽翼也雖有千里之望不能致其意之欲至説苑尊賢集潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲謝𤣥暉首燕徒有心局歩何由騁梁劉孝綽詩我欲横天無羽翰孟東野時危思報主衰謝不能休致君時已晩懐古意空存並杜詩喑人食太牢信知其味而不能形於言劉賔客虛逢好陽艷其柰苦昬懜元微之互入事與願違遥看雲路心空在同上本朝巧舞苦短袖東坡詩逺水不救近火子莊周貧往貸粟於監河侯侯曰諾我將得邑金貸子二百金可乎莊周忿然作色對曰昨來有中道而呼者周顧視車轍中有鮒魚周曰激西江之水而迎子可乎莊子外物失火而取水於海水雖多火必不滅矣逺水不救近火也韓非子焦喉之渴遥指滄海指氷室不能起暍死之熱望炎冶不能止噤凍之寒大厦既燔而運水於滄海此無及也並抱朴子穿井而救火則熛颺棟焚矣鑿舟而拯溺則葬江魚之腹中矣劉子史周詩曰俟河之清人夀㡬何左襄八年及溺呼船吳志譬如火發於家安能候逺水乎通鑑唐昭宗傳記猶渴而穿井臨難而後鑄兵雖疾從而不及也説苑雜言篇互入力所不及集桃實千年非易得駱賔王本朝不應逺水救近渴陳後山刮毛龜背集獵人箭底求傷鴈釣戸竿頭乞活魚王建本朝刮毛龜背上何時得成氈枯松强鑽膏槁竹欲瀝汁並東坡詩兩窮相值子泉涸魚相與處於陸相呴以濕相濡以沫荘子大宗師假榖於夷齊之門告寒於黔婁之家所得者不過橡樑緼褐必無太牢狐裘矣抱朴子袪惑史自屈原沉汨羅後百有餘年漢有賈生為長沙王太傅過湘水投書以弔屈原史記屈平傳本朝枯松强鑽膏槁竹欲瀝汁兩窮相值遇相哀莫相濟東坡詩一失召百非經君子惡居下流天下之惡皆歸焉語子張史去栁葉百歩而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鈎一發不中者百發盡息史記周本傳下流之人衆毁所歸西漢楊惲傳貧下未易居上流多謗議西漢司馬遷傳互入處非其地自為成敗經心以體全亦以體傷記緇衣子趙孟之所貴趙孟能賤之孟子水能載舟亦能覆舟荀子史自我得之自我失之亦復何恨通鑑梁武帝紀侯自我得之自我捐之無所恨前漢田蚡傳夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下谿谷亦能朝之聖人能従衆亦能使之後漢趙曄呉越春秋集淮隂之禍寃在神理通説且拒豨謀寜起堂堂蕭公實曰知己給致鍾室胡寜忍此吕和叔文相時處事經有其禮而無其財君子弗行也有其財而無其時君子弗行也記檀弓下子為可為於可為之時則從為不可為於不可為之時則凶揚子在夷貉則引之倚門墻則麾之揚子修身世治則以義衛身世亂則以身衛義文中子史陸賈曰馬上得之寜可馬上治之乎西漢書孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也通鑑漢質紀禮敎榮辱以加君子化其情也桎梏鞭扑以加小人化其形也通鑑漢獻紀崔郾為廣州刺史治以寛經月不笞一人及涖鄂州嚴法峻誅不貸唐書天下未定則專取其才不考其行䘮亂既平則非才行兼備不可用也通鑑唐太宗栁仲郢為京兆尹政號嚴明後出為河南尹以寛惠為政或言不類答曰輦轂之下先彈壓郡邑之治本惠養唐書互入政事集理在將順怡然而奉旨事當正色偘然而犯鱗唐文粹君子救時雖切必相時度力以致其用不可則靜而鎮之以道訓服司空表聖集本朝人臣納説於君因其既厭而止之則易為力迎其方鋭而折之則難為功東坡代張方平諫用兵書明知故犯子惡辱而居不仁是猶惡濕而居下也孟子互入自相背馳惡死亡而樂不仁是猶惡醉而强酒孟子互入自相背馳史𤣥宗曰是子惡賢嫉能舉無比者裴士淹曰陛下誠知之何任之久耶帝黙不應新唐書李林甫傳中宗親遭母后之難而躬自蹈之唐史中宗贊吉頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子已立而外戚猶為王此陛下驅之使他日必爭兩不得安也太后曰朕亦知之然業如是不可如何通鑑唐武后右補闕辛替否上䟽曰口説不如身逢耳聞不如目覩且陛下與太子當韋氏用事之時日夕憂危切齒於羣凶今幸而除之乃不改其所為臣恐復有切齒於陛下者也通鑑唐𤣥宗楊國忠謂客曰吾本寒家一旦縁椒房至此未知税駕之所然念終不能致令名不如且極樂耳同上傳記文君眉色不加黛飾臉若芙蓉長卿素有消渴疾作美人賦自刺卒以此疾死西京雜記互入耽好集睹前車之傾覆而不改其轍迹選六代論小蟲水草楂棃橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者栁文序是悔其覆車不易前轍之失唐文粹本朝唐王涯自以留心太𤣥經久矣乃有甘露之變文宗時且太𤣥惟以進退消息為説涯知其説而不能行何也鳴道集此孟子所謂知兄臂之不可紾而姑勸以徐知隣雞之不可攘而月取其一東坡法明禁之而人明犯之是不有天子之法也老泉自納敗闕子猶傴僂而好升髙也指其頂者愈衆荀子效儒史適足以發笑而自㸃耳司馬遷傳智伯曰吾乃今知水可以亡人國也襄子夜使人決水灌智伯軍軍亂殺智伯通鑑互入因言取禍李吉甫言天下已太平陛下宜為樂上謂左右曰吉甫專為悦媚通鑑唐憲宗太后習猫使與鸚鵡共處出示百官傳觀未遍猫飢搏鸚鵡食之太后甚慙通鑑唐武后盧藏用隱終南山晩乃狥權利司馬承正召至闕下藏用指南山曰此中大有佳處承正徐曰仕宦之捷徑耳藏用慙新唐書本傳互入識者所窺傳記謝𤣥以八萬當苻堅百萬之衆其勢不敵若苻堅逼肥水而陳必保萬全惟麾軍却退衆亂不能止故敗世謂謝𤣥能走苻堅者此耳孔氏雜説集虎見驢鳴大駭然往來視之覺無異能益習其聲稍近驢怒蹄之虎曰技止此耳因斷其喉盡其肉乃去噫形之厖也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫栁子厚黔之驢本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入巧反成拙臨危抱佛經既輸爾載將伯助予詩正月注言國危而求賢者已晩矣將恐將懼惟予與女將安將樂女轉棄予將恐將懼寘予于懐將安將樂棄予如遺詩小雅谷風史越子使后庸來聘且言邾田封于駘上欲使魯還邾田封境至駘上􅉀于平陽三子皆從季康子叔孫文子孟武伯皆従后庸盟康子恥従蠻夷盟言及子貢思子貢曰若在此吾不及此失不及與越盟武伯曰然何不召曰固將召之文子曰他日請念言季孫不能用子貢臨難而思之左哀二十七年互入因事思人公曰吾不能早用子今急而求子是寡人之過也左僖三十年人窮則反本故勞苦倦極未嘗不呼天地疾痛慘怛未嘗不呼父母也史屈原傳寛則寵名譽之人急則用介胄之士史韓非傳孔融為賊管亥所圍遣太史慈求救於劉𤣥徳劉𤣥徳曰孔北海乃復知天下有𤣥徳耶東漢孔融傳李克用曰當阽危之時託為股肱伊吕及既安之後則心膂視為土芥寇讎通鑑僖宗紀黄巢北趨襄陽劉巨容拒之大破賊衆或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存将士不愛官賞事寜則棄之或更得罪不若留賊以為富貴之􅓵衆乃止通鑑唐僖宗飢則為用飽則颺去魏志傳記飢則附人飽則髙飛十六國載記集計窮然後賽後賽竟何恩元㣲之集臨老抱佛脚教妻讀黄經唐文粹獻豕遼東史遼東有豕生子白頭異而獻之至河東見羣豕皆白懐慙而還若以子之功論於朝廷則為遼東豕也後漢朱浮傳互入聞見淺狹集楚翠丹質在荆南以多慙遼東白頭望河東而載恧劉賔客集本朝雕琢肝脾欲報公還如獻豕過河東僧參寥子詩有意對無意子孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣及文馬四十以遺魯君魯君觀之終日怠於政事三日不聽國政孔子遂行家語以瓦摳者巧以黄金摳者惽列子黄帝篇以瓦注者巧以金注者惽荘子逹生有情於譽飽雖蒙惠而非徳無情於傷辱雖獲毁而無憾劉子去情史劉棻從揚雄學竒字雄不知情顔師古曰古文之異者不知獻符命之事也棻乃劉歆之子初莽以符命自立即位之後欲絶其原以神前事棻後獻之投棻四裔西漢揚雄傳李廣見草中石以為虎而射之中石沒矢視之石也他日射之終不能入西漢李廣傳蔡裔有勇氣聲若雷震嘗見三盜入室裔拊床一呼而盜俱殞晉書互入勇敢鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懐袖勇夫為之驚愕出於意外故也晉書傳記楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無跡韓詩外傳園中有木其端有蟬蟬悲鳴飲露不知螳蜋在其後曲跗欲取其蟬而螳蜋不知黄雀在其後延頸欲啄之然黄雀又不知臣操彈丸在其下皆務前不顧後患劉向説苑互入貪迷本朝人能碎千金之璧而不能無失聲於破釜能搏猛虎而不能無變色於蜂蠆東坡黠䑕賦泰山覆於前而色不變麋鹿興於左而目不瞬老泉不成恩惠子投鈎分財投䇿分馬得美者不知所以徳慎子媒揚譽人而受譽者不以為徳臣虜强飯而䝉飽者不以為惠劉子去情篇集若自有聲名又託形勢此乃市道之事又何足貴乎韓文薦侯喜状見危者已墜而欲援觀鬬者將死而方救皮日休互入市恩本朝譬如傭力之人計工而受直雖與之千萬豈知徳其主哉老泉文無鏬可入子吾不見震風之能動聾聵也揚子問明史太子仁孝謹静張垍髙力士常保䕶於上前故林甫終不能間也通鑑唐𤣥宗楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至國忠之言不能入矣同上集烝不能潤灼不能熱杜牧之春花與秋月不感無情人白侍郎臣有大拙智所不化醫所不攻威不能遷寛不能容栁乞巧文本朝衝風震河海不能號無竅東坡互入無所用力鑽灼不燃誰似我東坡詩記纂淵海卷六十一
