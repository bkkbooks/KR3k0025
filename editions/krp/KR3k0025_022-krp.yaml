body:
  text: 記纂淵海卷二十二宋潘自牧撰郡縣部燕山府路燕山府倚郭一外縣八析津昌平良鄉潞武清安次永青香河漷隂郡號廣陽燕山郡沿革天文尾箕分野禹貢冀州之域周置幽州武王封堯後於薊封召公於燕即此秦為上谷漁陽二郡地漢初為燕國又分置涿郡元鳳初改為廣陽郡東漢省廣陽合上谷永光初復立廣陽郡三國魏為燕國晋改范陽國後周改置燕及范陽二郡兼立總管于幽州唐改州為范陽郡乾元初復為幽州遼陞幽州為南京幽都府後改幽都為析津府本朝宣和中改燕山府沿革表縣沿革析津本秦薊縣地属上谷郡漢至唐皆仍舊遼改為析津昌平漢為軍都縣属上谷郡晋為昌平縣本朝仍舊良鄉春秋時燕中都地漢為良鄉縣潞秦属漁陽郡漢置潞縣武清漢雍奴縣𨽻漁陽郡属燕國天寳初改為武清縣安次漢舊縣唐武徳間移治石梁永清本秦上谷郡地漢属渤海郡唐改為永清縣香河本武清縣地遼于新倉置𣙜鹽院因居民聚集遂置香河縣漷隂漢泉州縣地属漁陽遼改為漷隂縣本朝因之同上形勝天壽山在府北一百里羣峰聳㧞為一郡之勝槩西山在府西三十里為太行山之首玉泉山在府西北上有芙蓉殿韓家山在府西上有韓延夀墓仰山在府西七十里中有平頂如蓮花傍有五峰上多禪刹西湖山在府西一百里下有溪潭因名綿山在昌平縣東十二里上有古道塲玉𢃄山在昌平東北山腰有白石若𢃄故名燕山在府東自西山一𢃄迤邐東来延袤數百里抵海岸分水嶺在府西諸水至此分而為二摘星嶺在府西髙入雲霄吕公巖在玉泉山相𫝊吕仙往来處弹琴峽在居庸闗中水流石罅聲若弹琴海子在府西三里汪洋如海中有芰荷鷗毛可玩西湖在玉泉山下環湖十里為一郡之勝觀太湖在府西南傍有二泉湧出經冬不凍玉河流出郡城東南注大通河盧溝河在府西南亦曰小黄河榆河源出昌平縣黄花鎮河自塞外流入琉璃河在良鄉南即古聖水延芳淀在漷隂西廣數百畆中多菱芡魚鴈九龍池在天壽山西南泉出九穴鑾石為龍吻水萬桞崖在府南銅馬門在舊燕城東南隅即古薊城門居庸闗在府北一百二十里天津闗在良鄉縣北白楊口在昌平縣西黄花鎮在昌平東北九十里樂毅墓在良鄉南三里竇禹鈞墓在府西二十里輿地紀勝人物周左伯桃羊角哀燕山人二人為友聞楚王善待士同入楚值雨雪粮少伯桃餓死哀至楚為上大夫乃厚塟伯桃秦蔡澤燕山人戰國𢎞辯智士嘗勸應侯以成功當退秦王與語悦拜客卿尋為相漢韓嬰郡人文帝時為愽士作韓詩内外𫝊韓延壽郡人為吏崇禮義好古教化所至令行禁止為天下最冦恂昌平人光武時為偏將軍有牧民御衆之才拜為潁川太守當遷百姓遮道曰願復借冦君一年後封雍奴侯圖形雲臺南北朝張曜昌平人仕北齊以清白稱歴官尚書右丞隋慕容三蔵郡人聰慧多武畧仕為廓州刺吏招納流亡百姓襁負日至唐盧照隣郡人與王楊駱四人以文章齊名號為四傑劉怦昌平人為范陽禆將積功至䧺武軍使後遷涿州刺史蔡廷玉昌平人朱泚為幽州節度使謀不軌廷玉不從被囚將殺之廷玉對曰不殺我公得名殺我我得名泚不能屈待之如初髙崇文郡人七世不異居髙霞寓郡人五世不異居嘗從髙崇文擒劉闢有功拜彭州刺史劉蕡昌平人明春秋擢進士第文宗時舉賢良方正士對策専論親近嬖倖言極切直遂被黜時論稱屈扈䝉安次人少以文學名仕周為右拾遺知制誥其從弟載為翰林學士並掌内外制時號二扈皇朝呂餘慶安次人重厚簡易事太祖以幕府舊僚参預大政歴知数州官至尚書左丞宋琪郡人舉進士太祖時為左補闕累遷同平章事進僕射吕端餘慶弟事太祖累官大理少卿後為相持重識大體子藩蔚藹皆仕于朝孫誨登進士第累官御史中丞同上集十月北風燕草黄燕人馬飽弓力強虎皮裁鞍鵰羽箭射殺隂山雙白狼張子潛兒童能走馬婦女亦腰弓歐公度鴈山横岱北狐塞接雲中勿使燕然上惟留漢將功陳伯玉陣去金河冷書歸玉塞寒駱賔王隂雲興巖側悲風鳴樹端陸士衡燕䑓一去客心驚笳鼓喧喧漢將營萬里寒光生積雪三邉曙色動危旌祖詠寒深沙草白都䕶領燕兵放火燒奚帳分旗築漢城張文昌本朝宣和四年改燕京為燕山府又改郡曰廣陽節度曰永清軍沿革表燕山如長蛇千里限夷漢首衝西山麓尾掛東海岸㑹當挽天河洗此生齒萬並東坡萬里鉏耰接塞垣幽燕桑葉暗川原王安石草自岡長暮驛賖朔風終日起平沙韓稚圭黄金䑓下古燕都潭碧淵淪粉堞隅朱弁邉日照人如月色野風吹草似泉聲范純仁涿州倚郭一外縣三范陽歸義固安新城郡號涿鹿郡沿革天文尾箕分野禹貢冀州之域春秋戰國皆燕之涿邑秦為上谷郡地漢置涿郡曹魏改為范陽郡晋改為范陽國後魏復為范陽郡隋為涿郡唐初廢郡為范陽縣屬幽州大厯中又於縣置涿州遼置永泰軍本朝改為涿水郡沿革表縣沿革范陽春秋戰國為燕之涿邑唐置范陽縣歸義本漢易縣地唐置歸義縣本朝改歸信固安本漢方城縣屬廣陽國後屬涿郡新城本漢新昌侯國屬涿郡同上形勝獨鹿山在州城西十五里下有鹿鳴澤石虎山在州城西上有二石其形如虎龍安山在州城西北五十里時有雲氣騰繞宛若龍然白溝河在新城南淇溝在州西南督亢陂燕太子使荆軻齎督亢圖即此今有督亢亭月池在州西南廣三頃其形如月展䑓在州西南燕昭王嘗展禮于此華陽䑓在州境燕太子丹與樊將軍置酒華陽館出羙人竒馬即此袁天綱墓在州東北浮落岡樓桑村在州西南即漢昭烈故居東南舊有桑髙五丈如車盖然人異之因號其里曰樓桑南三里有酈亭即後魏酈道元故居也輿地紀勝人物漢蒯徹范陽人楚漢説士盧植郡人剛毅有大節官至尚書董卓欲廢立植抗義不從彭伯稱其為海内大儒三國張飛郡人與闗雲長輔昭烈時稱萬人敵封西鄉侯晋張華范陽人學業優愽賛伐吳功成封廣武侯南北朝酈道元郡人仕魏為御史中丞執法清烈為時所忌遣為闗右大使註水經四十卷隋祖君彦范陽人有才學李宻禮重之唐盧承慶范陽人學博才辨累官至户部尚書賈島范陽人舉進士有詩名累官司戸五代張藏英范陽人後唐末舉族為賊孫居道所害藏英襲殺居道以祭其父母時稱為孝子後屡敗契丹官至瀛州團練使竇禹鈞范陽人有隂徳事周累官諫議大夫五子皆登進士時號為燕山五桂皇朝竇儀禹鈞子學問優愽官至禮部尚書竇儼儀弟好賢樂善累官禮部侍郎其弟侃官起居郎儞叅知政事僖左補闕子姪八人俱顯于朝董遵誨范陽人太祖命守邉畨漢悦附上嘗觧所服盤龍服以賜之邵雍范陽人髙明英邁遷居河南事李之才洞見天地古今事變遂衍宓羲先天之旨著皇極經世諸書程子稱為振古之豪傑張世傑范陽人有忠義累官至保康軍節度使後死國難同上集胡風吹朔雪千里度龍山鮑明逺度闗行照月乗障坐消烟徐知仁鞞鼓黿鼉振旌旗鳥獸懸由来詞翰簡今見勒燕然同上方消塞北祲還静漠南塵李巨山本朝宣和四年金將郭藥師以州降賜名曰涿水陞威勝軍節度沿革表我瞻涿鹿野古来戰蚩尤軒轅此立極玉泉朝諸侯文山曠野風多勁范純仁涿州沙上望桑乾鞍馬春風特地寒王介甫樓桑大樹翠繽紛鳯鳥鳴時曽一聞合使本支垂百世詎知功業只三分朱熹燕山竇十郎教子以義方靈椿一株老丹桂五枝芳馮道誰將家集過幽都每被行人問大蘇莫把文章動蠻貊恐妨談笑卧江湖李宗易寄子瞻檀州倚郭一外縣一宻雲行唐郡號宻雲白檀郡沿革天文尾箕分野禹貢冀州之域秦漢時為漁陽郡地後魏置宻雲郡領白檀要陽宻陽三縣兼置安州後周改安州曰𤣥州隋置檀州後改安樂郡唐為檀州遼為武威軍本朝號為檀州沿革表縣沿革宻雲本秦漢漁陽郡地五代時魏置宻雲縣行唐本真定舊地秦割為南行唐縣後魏去南字為行唐縣同上形勝宻雲山在縣南十五里昔燕趙伏兵於此大獲遼衆白檀山在縣南山陽古有白檀故名曹操歴白檀破烏丸于栁城即此霧靈山在宻雲縣東北山擁祥光如霧每于六月六日現栢山在行唐西北三十里上有古栢大數十圍栢上有鉄環相𫝊竇建徳椓以繫馬者箕山在行唐西北其峰若箕形相𫝊許由隠此上有許由墓棄瓢巖洗耳溪巢父問答碑毘山在行唐西北四十里峰巒若列屏障相𫝊毘盧佛化身之所上有禅刹掛甲谷在宻鄉東北楊彦朗北征嘗掛甲于此廣􅛜水在宻雲東北道人溪在宻雲東北告河在行唐縣南倒馬闗水在行唐東二十里古北口在宻雲北一百二十里峩嵋山塞在宻雲東北楊令公祠在古北口共城在檀州乃舜流共工于幽州之地輿地紀勝人物周郤縠行唐人趙衰稱其説禮樂敦詩書知御兵之道晋文公使作元帥將三軍南北朝鮮于世榮郡人沉敏有器幹事北齊為太子太傅周武帝入代遺以寳噐不受後被執不屈而死五代趙玉郡人嘗客滄州依節度使吕兖劉守光破滄州盡戮兖親屬玉負兖之子琦逃至太原後琦仕後唐官至兵部侍郎時人以玉能存吕氏之孤皆稱其義皇朝髙彦暉漁陽人太祖時從王師伐蜀為先鋒又討王師雄之難力戰而死集閩烽指荆闗代馬属幽燕横海咸飛騎絶漢皆控弦韓延年簫鼓流漢颸旌甲被邊霜疾風衝塞起沙礫自飄揚鮑明逺接鏑赴陣首卷甲起行前韓延年征路出窮邉孤吟傍戍煙河光深蕩塞磧色逈連天許文化本朝宣和四年金人以州来歸賜名曰横山陞鎮逺軍節度沿革表行祠寂寞寄闗門野草猶知避血痕東坡驅馳本為中原用嘗享能令異域尊蘇轍題楊公祠亂山環合疑無路小逕縈迴長傍溪髣髴夣中尋蜀道興州東谷鳯州西同上平州倚郭一外縣二盧龍石城馬城郡號孤竹北平盧龍郡沿革天文尾分野禹貢冀州之域初虞分冀州東北為營州即此商為孤竹國周屬幽州春秋時為山戎肥子二國地秦為遼西右北平二郡地漢末為公孫度所據魏改盧龍郡北燕置平州及樂浪郡後魏改樂浪為北平郡隋改為平州後廢州為郡唐後改為平州天寳初改為北平郡乾元初復為平州五代唐為遼興郡本朝為平州沿革表縣沿革盧龍古肥子國漢為肥如縣屬遼西郡開皇中省肥如入新昌後為盧龍郡治唐武徳初移平州治此改為盧龍縣石城東漢為海陽縣地晋屬遼西郡後魏因之隋唐為北平平州之境五代時始析其地置石城馬城本盧龍地唐開元中析置馬城縣同上形勝陽山在州東南峯巒髙聳下多溪谷西有李廣射虎石雙子山在州西山有孤竹長君之墓其西北馬鞭山有孤竹少君墓團子山在州西北有孤竹次君之墓横山在馬城西四里下有深潭石井射虎石在州南八里漢李廣夜出見虎彎弓射之至沒羽比明乃知為石海在郡南一百六十里東連遼東西抵直沽譙樓井在郡治南每天將雨有氣自井中出扶蘇井在馬城泉甚甘羙秦太子扶蘇北築長城嘗駐此湯泉在郡北桃林口闗在盧龍縣北伯夷叔齊廟在舊州治西漆河之濵輿地紀勝人物商伯夷叔齊孤竹君二子兄弟讓國逃之首陽采薇以食武王伐紂扣馬而諫紂滅耻食周粟餓死首陽之下南北朝段永石城人孝武時討賊有功拜平東將軍唐田𢎞正盧龍人忠孝畏慎為魏博節度使封沂國公周寳盧龍人仕武宗為工部尚書後以功封汝南郡王皇朝郭瓊盧龍人太祖時領軍衛上將軍尊禮儒士孜孜樂善盖武臣之賢者也姚丙斌盧龍人為慶州刺史在郡十數年西夏不敢犯塞號為姚大蟲子承賛為閤門祗候死于陣承鍳殿中丞同上集塞漠風沙外邉城雨雪間遼水三千里盧龍數萬山王懋建不知馬骨傷寒水惟見龍城起暮雲王摩詰莫賣盧龍塞歸邀麟閣名陳伯玉石城昔為莫愁鄉莫愁魂散石城荒鄭守愚本朝宣和四年賜郡名漁陽陞撫寜節度五年遼將張覺據州来䧏尋為金所破沿革表遜國同来訪聖謨適觀争國誓師徒恥生湯武干戈日寜死唐虞揖譲區石曼卿大義充身安是餓清魂有所未應無始終天地無前後名骨雖雙此行孤同上易州倚郭一外縣二易水淶水容城郡號遂武郡沿革天文尾箕兼昴畢分野禹貢冀州之域秦為上谷郡漢為涿郡故安易縣地隋置易州大業初罷州置昌黎郡尋改為上谷郡唐初復為易州天寳初置上谷郡乾元初復為易州遼置髙陽軍本朝號為遂武郡縣沿革易水本秦上谷郡地漢為涿郡本朝置為易水縣淶水本漢涿郡遒縣地後周置永陽縣後改涞水縣容城本漢舊縣屬涿郡唐屬易州本朝因之並沿革表形勝龍跡山在州城西南石上有仙人及龍跡西麓有坑大如車輪中有四穴春則風東出夏出南秋出西冬出北龍宫山在淶水縣西北三十里中有石洞泉水匯石井中大寜山在易水西中有大寜寺五迴嶺在州西南委折五迴下望層山若蟻垤然星月巖在州城西山頂有二穴望之隠然如星月狀黄金䑓在易州東南燕昭王所築置千金于䑓以延天下士故名石獸岡在州城西南上有石似虎易水在縣境縣名取此涞水在縣東北三十里雷溪在州西南即徐河上流灘石湍急聲聞數里若雷鳴然五龍池在州西北燕昭王引山泉注池栽蓮建亭于上以為遊觀之所馬跑泉在州東北唐太宗征遼駐蹕於此馬跑地出泉故名五華樓在州治即燕候雲物䑓候䑓在州治周武王所築為日者占候之所王公䑓在州東南燕昭王所築樂毅劇辛鄒衍嘗遊於此處仙䑓在州境燕平曽學仙於此吟詩䑓在州大寜山五代馮道吟詩於此紫荆闗在州西八十里歴代為扼塞之所燕昭王廟在州東南二十里四賢祠在易水傍祠郭隗樂毅劇辛鄒衍樊將軍廟在州西即秦樊于期古燕國在州東南廣袤六十里召公之後都於此武陽城在州東南故燕之下都也三䑓城在容城縣燕魏分易水為界築三䑓登䧏以耀武紀勝人物周郭隗郡人昭王招賢隗曰必欲致士先從隗始昭王築宫師事之未幾樂毅等諸賢俱歸燕遂併強齊隗之力也田光郡人不慕仕進為人智深而勇太子丹聞其賢願與之交與圖國事光曰臣聞騏驥盛壯之時一日而馳千里及其衰老駑馬先之今太子聞光盛壮之時不知臣精已消亡矣因薦荆軻太子曰願先生勿泄也光出而嘆曰夫為行而使人疑之非節俠也遂自刎以明不言同上集雄髪指危冠猛氣衝長纓飲餞易水上四座列群英陶潛荆軻飲燕市酒酣氣益震左太沖此地别燕丹壯髪上衝冠駱賔王匹馬東歸羨知己燕王䑓上結交新髙千里長虹貫白日易水急寒風陽縉洛陽為易水嵩嶽是燕山俗變羌胡語人多沙塞顔李白誰言行遊近張掖至幽州饑食首陽薇渴飲易水流陶潛雙旌過易水千騎入幽州塞草連天暮邉風動地秋皇甫茂政本朝雍熈四年陷於契丹宣和四年金人以州来歸賜郡名曰遂武防禦沿革表荆軻一去不復返易水東流無盡期馮戴燕山不改色易水無新聲誰知數尺䑓中有萬古情中有學仙䑓燕平欲升天林壑少佳色風雷有清秋太行千萬里瀟湘横中洲並劉因郭君自舉先羣豪樂生獨歩超凡曹酬恩一雪伯國恥建功並倚雲天髙吴師道郭隗獨為天下始樂生還自魏中來齊城下後讒夫起易水歌長壯士哀董儒薊州倚郭一外縣二漁陽三河玉田郡號廣川郡沿革天文尾箕分野禹貢冀州之域本秦漢漁陽郡魏晋屬幽州隋初徙𤣥州於此後復置漁陽郡唐置薊州取古薊門闗以名天寳初改漁陽郡乾元初復為薊州本朝改廣川沿革表縣沿革漁陽本漢舊縣屬漁陽郡後廢唐為漁陽縣之大王鎮三河本漢臨泃縣地唐析潞縣地置三河縣屬幽州以地近七渡鮑丘臨泃三水故名玉田本春秋無終國地漢為無終縣魏屬漁陽郡後省唐復置屬幽州後改為玉田縣因漢楊雍伯種石得玉故名同上形勝崆峒山在州東北五里黄帝嘗問道於崆峒山上有府君廟存焉盤山在州西北山北數峯陡絶桃花山在州西南魏志漁陽有桃花山即此甘泉山在州西北七十里山下有泉極甘羙故名瑞屏山在漁陽縣北二十里連峯聳㧞秀若列屏碣山在漁陽縣東峰巒峭峻林谷深䆳華山在三河縣北三十里上出花斑石聖水山在三河縣西北上有聖水可愈眼疾城山在漁陽縣東山中平如城有石室僅容一人棲卧相𫝊孫真人修行於此徐無山在玉田縣東北後漢田疇避難於此小泉山在玉田縣東北三十里有泉出石罅間故名無終山在玉田東北三十里乃古無終子國金泉河在州城北龍池河在州南周村河在漁陽縣西光沙泉在玉田南溪澗中泉湧沙而出碎若飛雪輿地紀勝人物三國徐邈州人仕魏歴譙相平陽安平太守所在著稱後為梁州刺史風化大行累官司空晉劉沉州人博學好古仕至侍中喜薦賢士為時所重南北朝平恒州人為幽州别駕亷貞寡慾衣食常不足後遷秘書丞平鍳郡人少聰敏有豪俠氣以軍功累遷㐮州刺史後遷懐州築城以防冦城内井竭鍳衣冠而祝泉即湧出唐魯炅州人至襄鄧節度使後以禦賊有功封岐國公五代李承約郡人後唐明宗拜為陘州節度使見毛璋諭以祸福璋即從之明宗大悦遷黔南節度使累官左衛上將軍皇朝趙普州人仕太祖初為掌書記後拜相又相太宗拜太師追封韓王許驤州人風骨秀異十三能文善辭賦與吕䝉正齊名擢進士歴御史中丞用法寛恕時稱仁厚長者楊崇勲州人知兵法真宗時為郡牧使仁宗時拜同平章事判定州集北登薊丘望求古軒轅䑓應龍已不見牧馬空黄埃陣子昻鴈足牽情逺漁陽入望頻王懌征戍在桑乾年年薊水寒李君虞去嵗荆南梅似雪今年薊北雪如梅邉鎮戍歌連日動京城燎火徹明開張道濟沙場烽火侵胡月海畔雲山擁薊城少小雖非投筆吏論功直欲請長纓祖詠望薊門詩李相將軍擁薊門白頭惟有赤心存杜子羙惆悵秦城送獨歸薊門烟樹逺依依李君虞今朝薊城北又見塞鴻飛張文昌沙塞礙飛蓬張蠙禄山北築雄武城杜甫漁陽本朝宣和四年金人以州来歸賜郡名曰廣川團練七年金人破之沿革表十載歸來對故山山光依舊白雲間不湏更讀元通偈始信人間是夣間王子慎三河道中樓外青山半斜陽寒鴉翻墨㸃林霜邢嵓夫景州倚郭一遵化郡號灤川郡沿革天文尾箕分野禹貢冀州之域本春秋無終國地漢為右北平之境唐於此置馬監及鐵冶居民稍聚因置遵化縣清安軍本朝號灤川郡沿革表縣沿革春秋時為無終國地漢置遵化縣同上形勝南龍山在州南八里北又有北龍山兩山相望蜿蜒如龍明月山在遵化西南清風山在縣南髙三百餘仭五峯山在縣東北山磅礴突起五峯三䑓山在縣東北其山盤曲三層磨䑓山在縣南四十里山髙聳頂圓如磨五里河在州北五里梨河在縣西南大喜峰口在縣北龍門在縣南十里山間上合下開髙六丈許水自懸崖傾瀉而下轟然若雷石門在縣西北山勢峭絶漢張純叛靈帝遣將征之即此人物漢田疇郡人董卓之亂率親族隠居徐無山躬耕飬親曹魏時屢徴不出後文帝髙其義賜從孫闗内侯晉陽騖郡人器識沉逺始為平州别駕屢獻安時強國之術後以太尉致仕南北朝陽尼郡人博通羣籍仕魏為幽州中正朝廷嘗命其舉賢尼乃舉其子朝廷稱其不蔽賢輿地紀勝集白雲初下天山外浮雲直向五原間盧思道殘日沉鵰外驚蓬到馬前許文化風卷常山陣笳喧細桞营明餘慶吴師驚燧象燕將警奔牛若使三邉定當封萬里侯孔紹安朝見馬嶺黄沙合夕望龍城陣雲鮮庭中竒樹已堪攀塞外征人殊未還盧思道本朝宣和四年金人以州來歸賜郡名曰灤川軍使沿革表記纂淵海卷二十二
