body:
  text: 記纂淵海卷十八宋潘自牧撰郡縣部京東西路興仁府倚郭一外縣三濟隂苑亭乗氏南華郡號濟隂府沿革天文奎婁分野禹貢屬豫州之域昔唐堯所居在周為曹國之地周武王封弟振鐸為曹國戰國屬齊漢為濟隂郡晉為濟陽郡後周改為曹州隋改為濟隂郡唐復為曹州天寶初改濟隂郡乾元初復為曹州五代晉置威信軍周改彰信軍本朝為興仁府沿革表縣沿革濟隂本漢濟隂郡之定陶地隋置濟隂縣唐徙曹州本朝置濟隂為附郭宛亭唐為寃句縣本朝改為苑亭乗氏古乗丘在唐為縣南華在唐為縣本朝𨽻河南路而宛亭乗氏南華三縣皆為黄河水渰廢形勝曹南山在濟隂縣南一百里春秋盟于曹南是也三艐亭在濟隂縣之東北景山在州東四十里廢楚丘城北衛文公徙居楚丘測日影于此髣山在州十五里乃曹國十五世葬地汜水在府西南三十里漢高帝即位汜水之陽在此菏澤在府境内禹貢導菏澤被孟瀦又濟水東至于菏大禰溝在府界内詩出宿于泲飲餞于禰披雲樓在濟隂北上有陳師道記三賢堂在濟隂北舊城内中塑范蠡魏冉魏相像髣山廟在縣東上祀曹叔振鐸翰林王禹偁有碑漆園城在濟隂西北莊周為漆園吏即此濟陽城在濟隂縣西南光武誕于此盤庚村在濟隂東南舊有盤庚祠受命壇在濟隂東南漢髙祖受命於此沙溝在南華境内上有莊周釣臺寃句城在宛亭境内莊周為吏之所阿谷水在濟隂郡東孔子至此見處子佩瑱是也輿地紀勝人物戰國范蠡既雪㑹稽之耻變姓名為陶朱公扁舟遊五湖漢魏相事宣帝為高平侯唐李勣事太宗為功臣後圖形凌烟閣王雄膂力絶人功授歙州總管賈敦頥歴任數州刺史每入朝敝車羸馬人不知其為刺史劉晏事𤣥宗時八嵗獻頌拜度支郎中累遷同中書門下平章事皇朝張齊賢太祖幸西都以布衣獻䇿上還與太宗曰幸西都惟得一張齊賢太宗朝累官吏部侍郎同平章事任仲正舉進士累官參知政事任仲師仲正弟舉進士累官樞宻副使太子太傅王博文年十六善屬文舉進士累官樞宻院事劉潜少有大志舉進士知蓬萊縣聞母死一痛遂絶其妻哭潜亦死時人稱為孝義輿地紀勝集詞藻世𫝊平子賦園林人比鄭公鄉門前墜葉浮秋水籬外寒華待夕陽浦外野風吹入户窻中曉月早知秋滄江一望通千里畫角三聲起百憂並皇甫茂政天眷君陳久在東歸朝人看大司空黄河岸畔常無事滄海東邊獨有功已變畏途成雅俗仍過舊里揖秋風一門累葉凌烟閣次第儀刑漢上公楊累山淮月未明先倚檻海雲初起更維舟朱用晦本朝靖國元年賜軍曰興仁軍崇寧元年升為興仁府大觀二年升為都督府政和元年罷都督為府沿革表淮岑日對朱檻出江岫雲齊碧瓦浮墟落耕桑公愷悌杯觴談笑客風流一曲平蕪連古樹半分殘日帶明霞並張子野促轡數殘更似聞雞一鳴春風馬上夢沙路月中行笳鼓逺多思衣裘寒始輕稍知田父穏燈火閉柴荆王安石東平府倚郭一外縣五須城陽榖中都夀張東阿平隂郡號東平府沿革天文奎婁分野禹貢青兖二州之域秦屬碭郡又為薛郡地漢為東平國取禹貢有東原底平之義後為濟東國又改大河郡東漢仍為東平國後魏為東平郡後周置魯州隋置鄆州後改東平郡唐復鄆州天寶初復改東平郡元和中置天平軍本朝徙治國故城後復改為東平府地理沿革表縣沿革須城春秋時為須句國戰國屬宋陽榖春秋時齊地僖公與齊宋江黄㑹于陽榖即此中都古厥國春秋時為魯中都地夀張春秋時為良邑漢為夀張縣東阿春秋時齊柯邑漢置東阿縣平隂齊地春秋魯襄公㑹諸侯伐齊齊侯禦諸平隂即此同上形勝瓠山在府北上有漢東平王墓蠶尾山在府北有唐蘓原明詩記鳳山在須城北騷人墨客題詠甚多金螺山在須城東采山在中都縣東上有草木望之若五采碻磝山在東阿縣南即檀道濟唱籌量沙之所石門山在平隂西上有石門東西相向孔子山在平隂南上有孔子教書堂梁山在夀張縣南漢梁武王葬于此濟河在中都縣北禹貢濟水即此南旺湖在中都縣南梁山濼在郡西中有黒風洞栢公溝在須城境内管仲井在東阿縣城内阿膠井在陽榖縣東煮革為膠可以愈疾古長城在平隂縣北輿地紀勝人物三國劉楨以文章見重于魏文帝號建安七子晉劉卞由縣吏累遷州刺史魏浚為度支校尉永嘉末東保河隂所得榖麥悉獻于河隂南北朝劉兆安貧樂道三徴博士皆不就唐程知節從太宗東征以功封宿國公張公藝九世同居髙祖幸其宅書忍字百餘以獻五代王彦章性忠烈事梁為招討使後被唐執不屈自殺追贈太師王朴舉進士獻安邊䇿累官户部侍郎皇朝馬伸舉進士為西京法曹從伊川學常自謂朝聞道夕死可矣紀勝集玉壺挈美酒送别强為歡大火南星月長郊北路灘殷王期負鼎汶水起垂竿莫學東山卧參差老謝安李白廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人王摩詰吾兄詩酒繼陶君試宰中都天下聞東樓喜奉連枝㑹南陌愁為落葉分城隅緑水明秋日海上青山隔暮雲李白追問何時㑹要我以陽春望慕結不解貽爾新詩文勉哉修令徳北面自寵珍君侯多壯思文雅縱横飛並劉楨亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁氷霜正慘悽終嵗常端正豈不羅凝寒松栢有本性鳳凰集南嶽徘徊孤竹根於心有不厭奮翅凌紫氛豈不常勤苦羞與黄雀群何時當來儀將須聖明君並同上本朝慶厯三年初置京東西路安撫使大觀九年升大都督府政和四年移安撫使于應天府宣和九年改為東平府陽榖縣景徳中徙孟店沿革表玉軸牙籖煥寶幢籍伸侍列映秋光宴開芸閣儒風盛坐對蓬山逸興長宋孝宗適興野情愜千山髙復低好風隨處改幽逕獨行迷張文潜濟州倚郭一外縣三鉅野任城金鄉鄆城郡號東魯州沿革天文奎婁分野禹貢徐兖二州之域春秋時為魯國戰國屬宋秦屬東郡漢屬山陽郡晉為高平劉宋屬濟北郡後魏置濟州隋改為濟北郡唐初復為濟州後廢五代周復置濟州本朝因之沿革表縣沿革鉅野禹貢大野既瀦即此地漢置鉅野縣任城古任國大皥之後所封地金鄉古緡國鄆城本魯地漢為夀良縣同上形勝兩城山在州南金鄉山在鉅野南上有石洞十餘丈鉅野澤在縣東南池在州境李白酒樓在州城南講文亭在金鄉縣學獲麟臺在鉅野縣東即魯哀公狩獲麟處落鳳臺在鉅野縣南朝天橋在州北女媧陵在州境内紀勝人物漢周仁以醫見景帝拜郎中令鄭均好義篤實官至尚書章帝重之東巡幸其第何休精研六經世無及之者晉魏舒對䇿登第為冀州刺史以簡恵稱後拜司徒郗鑑為車騎將軍輔少主誓赴國難以功拜司徒郗隆為尚書左丞有直諒匪躬之節百寮敬憚南北朝檀超好文學自比晉郗超事南齊為博士兼左丞皇朝翟守素太宗時為天雄軍兵馬鈐轄知太名府事性寛仁謹慎所至有政績王禹偁九嵗能文舉進士嘗獻端拱箴及禦戎十䇿累官學士著文集五十餘卷子嘉祐為館職嘉言舉進士曽孫份仕至户部侍郎晁補之才氣俊逸蘇東坡愛之舉進士官至京兆府有文集榮諲舉進士官廣東路轉運使常作棧道以通往來李邴舉進士累官學士苗劉作亂邴責賊當以大義後拜叅知政事紀勝集秋水通溝洫城隅集小船晩凉看洗馬森木亂鳴蟬菱熟經時雨蒲荒八月天晨朝白露降遥憶舊青氊杜甫身着紫衣趨闕下口銜丹詔出闗東蟬聲驛路秋山裏草色河橋落照中韓君平欲報東山客開闗掃白雲不到東山久薔薇㡬度花白雲還自散明月落誰家初謂鵲山近寧知湖水遥此行殊訪戴自可緩歸橈東林送客處月出白猿啼笑别龍山逺何必過虎溪並李白本朝靖康二年髙宗自濟入沿革表川流為瀦鉅野濶水色天容兩開豁山隨水逺勢奔騰駿馬西來銜轡脫山前雲水散不收坐看水末來歸舟党世傑臺邊昨夜西風來壯遊羈宦心悠哉豈無瓊艘百柂載春色堤中可以忘形骸同上寒林殘日欲棲烏壁裏青燈乍有無晁端友單州倚郭一外縣三單父碭山武城魚臺郡號濟陽州沿革天文奎婁分野禹貢徐兖二州之域漢為縣屬山陽郡東路為侯國晉屬濟陽郡後魏置北濟隂郡隋初廢郡以縣屬戴州大業初州罷以縣屬曹州唐屬宋州後自碭山縣徙輝州治此五代唐改為單州本朝因之沿革表縣沿革單父本魯單父邑漢為縣碭山秦置碭郡及縣漢于縣置梁園東漢遷治下邑而改為碭山縣武城漢舊縣屬山陽郡魚臺春秋時魯棠邑隠公觀魚于棠即此同上形勝棲霞山在州東世𫝊梁孝王甞游此呂井在單父東俗𫝊呂仙公到此黄良泉在魚臺縣東北泉從石竇湧出梁山在碭山縣境内觀魚臺在魚臺縣北隠公與戎㑹盟于此雞鳴臺在魚臺東半月臺在單縣東百靈山在州北孝武治園囿于此二賢祠在單縣琴臺上祀宓子賤巫馬期湖陵城在魚臺縣東漢沛公攻湖陵即此紀勝人物周澹臺滅明行不由徑非公事未甞見邑宰漢呂公善于風鑑識漢髙於微時以女妻之即呂后也三國崔琰少樸訥好擊劒年三十就鄭𤣥學仕魏為别駕南北朝崔彧有才學官至冀州别駕崔悛有文學初為魏散騎侍郎加驃騎大將軍唐李師中舉進士厯青兖二州有政績官至團練使龎籍舉進士屢上書言事切中時弊後官至侍郎諡莊敏皇朝馬黙仕至寶文閣待制父老頌其為政愛民紀勝集陶人有逸興不與常人俱築臺像半月迴向髙城隅對酒與山雲商飈起寒梧秋山入逺海虹石曠平蕪水色緑且明令人思鏡湖終當過江去愛此暫踟蹰李白白玉仙臺古丹丘别望遥山川亂雲氣臺榭入烟霄鶴舞千年樹虹飛百尺橋還逢赤松子天路坐相邀陳伯玉香閣東山下烟花象外幽懸燈千嶂夕捲幔五湖秋畫壁餘鴻鴈紗窻宿斗牛更疑天路近夢與白雲遊春水經梁宋晴山入海沂莫愁東路逺四牡正騑騑並孫逖本朝建隆元年升為團練沿革表亭館連城敵謝家四時園色鬬明霞窻迎西渭封侯竹地接東隣隠士𤓰石延年淮海風濤真有道麒麟圖畫豈無時今朝有客𫝊河尹是處逢人說項斯陳師道漢公事業比阿衡純用詩書致太平它日何人頌功徳至今嘲笑亦諸生鮑欽止濮州倚郭一外縣三鄄城雷澤臨濮范郡號濮陽州沿革天文危室分野禹貢兖州之域古顓頊之墟曰帝丘夏為昆吾氏所居春秋衛成公遷都此地漢置鄄城縣屬濟隂郡東漢末於此置兖州晉徙置濮陽郡隋置濮州尋廢唐復置天寶初為濮陽郡乾元初復為濮州沿革表縣沿革鄄城古顓頊之域漢置鄄城縣雷澤亦顓頊之域在州境内本夏澤以其有雷神故名臨濮春秋邑漢屬范縣范晉大夫士㑹之邑沿革表形勝歴山在州東南舜耕之所上有舜祠黄河在州東南黒龍潭在范縣南潭有龍能興雲雨釣臺在鄄城東南即莊子釣魚處陳臺在鄄城東北魏曹子建封鄄城侯于此築臺讀書仲山甫墓在雷澤舊縣西北閔子騫墓在范縣南姚墟在州南舜生於姚墟即此顧城在范縣東南詩云韋顧既伐即此廩邱在范縣東春秋齊烏餘以廩邱奔晉即此雷澤城在州東南魯西門在范縣東北舊有石門乃魯衛之郊後為里人所廢紀勝人物戰國孫臏孫武子之後善兵法為齊大將漢汲黯性忠直為東海太守武帝稱其為社稷臣三國呉隠之博涉文史為中書侍郎有清操嘗至廣州不飲貪泉之水唐王元感擢明經髙第所撰凡數十篇魏知古稱其為五經指南杜暹五世同居事繼母孝累官西安大都䕶封魏縣侯杜鴻漸暹族子肅宗朝因禄山大亂勸上幸靈武後拜相吳湊徳宗初為福建觀察使又為京兆尹後遷兵部尚書本朝李廸少從栁開學開稱其為公輔器舉進士第一累官資政殿大學士張詠太宗時進士兩知益州威恵及民遷禮部尚書有文集十卷髙弁舉進士性孝友為文章多祖六經著帝則三篇行於世馬元方以進士累遷户部判官嘗上言方春民貧請預貸庫錢至冬夏以絹輸官其法行之公私俱便徐起舉進士累遷徐州轉運使覓富民出米賑急全活甚衆李及之廸子登第通判安肅軍後以大中大夫致仕嘗著君臣規諌八十卷紀勝集青春行役去悠悠一曲汀蒲濮水流正見途中龜曵尾令人特地感莊周胡曽拂漢星旗轉分霄日羽明將追㑹阜跡更勒岱宗銘林戈咽濟岸鼉鼓震河庭葉箭凌寒矯烏弓望曉驚蕭楚才黄鳥翩翩楊柳垂春風送客使人悲怨别自驚千里外論交却憶十年時雲開汶水孤㠶逺路遶梁山匹馬遲此地従來可乗興留君不住益凄其髙適吾愛元紫芝清介如伯夷三年魯山民豐稔不暫飢三年魯山吏清慎各自持只飲魯山泉只採魯山薇一室氷蘗苦四逺聲光飛皮襲美本朝大觀中升為濮州沿革表波函雷澤棹雨足歴山耕王禹偁位卑松在澗俸薄菜經霜逕擁寒荷緑門横古木蒼冠纓塵已滿未敢濯滄浪同上秋天廖廓使星明光動山東七十城玉署文章厭閒冷繡衣風采試澄清人隨白鴈霜前到詩繞青山馬上程王子端拱州保慶軍倚郭一外縣一襄邑柘城郡號東輔軍縣沿革天文角亢分野禹貢兖豫二州之域春秋鄭魏陳三國之地戰國魏都于此秦為三川郡地漢為陳留郡地晉改為陳留國隋初廢陳留郡併州以其地併入滎陽梁潁川等郡本朝置拱州保慶軍襄邑古朱襄氏邑春秋時為陳株野地柘城漢屬淮陽國以邑有柘溝故名沿革表形勝首山在襄邑縣南黄帝甞遊首山即此仙翁山在襄邑縣西南上有葛仙翁道庵蛟龍池在襄邑縣北鄭大水龍鬬于城門外即此徐君墓在襄邑北即季札掛劒處葵丘在州治東春秋諸侯㑹盟於此紀勝人物三國梁翼事魏累遷下邳令所至有政聲皇朝常思徳累官左神武大將軍常従曹彬北征不利左右皆愧思徳獨整戎伍誓與主帥同死太宗聞之深嘉奬郭贄乾徳中進士累官叅知政事常對太宗曰臣惟以愚直報上鄭雍進士甲科累官御史中丞以資政殿學士知陳州許翰舉進士通經術正直不撓累官資政殿學士所著有論語解春秋傳紀勝集旅客三秋至層城一望開楚山横地出漢水接天迴冠葢非新里章華即舊臺有池風景異歸路滿塵埃杜必簡周楚仍連接川原乍屈盤雲垂天不暖塵漲雪猶乾印綬歸台室旌旗别將壇欲知迎候盛騎火萬里攅韓退之昨夜輕隂結夕霏城南十里有香泥初聞山鳥驚新弄遥見林花識舊蹊蕩槳逺従芳草渡墊巾還傍緑楊堤胡宿本朝崇慶建為拱州大觀四年廢拱州復為襄邑縣宣和二年罷輔郡沿革表月臨風林静斗垂霜夜清疎燈隔樹小暗水歴船鳴學字聲形苦紬書卜築輕此身南北慣隨處有平生張文潜欲雪日易晩不風寒更清崩橋㫁官道積水入宮城屏翳野初燒降丘民弩耕柘城道中同上三月宮桃滿上林林花千蕚費春心葉公城外襄河北一樹無人色更深陶弼廣濟軍倚郭一定陶郡號濟隂郡縣沿革天文奎婁分野禹貢徐兖二州之域春秋時為魯國戰國屬楚秦置定陶縣漢初封彭越為梁王都此屬濟隂國宣帝時為定陶縣後魏為西堯州治隋屬濟隂郡唐屬曹州尋降為鎮本朝置廣濟軍定陶本堯所居故名陶丘沿革表形勝髣山在郡北乃曹國十五世葬地積壤之髙彷彿如山故名蠡湖在定陶西南俗𫝊為范蠡飬魚之所濟堤在定陶縣境内即故濟水堤也梁王臺在定陶縣東世𫝊為漢梁王之臺魯太史墓在定陶縣陶丘之顛陶朱公墓在定陶治北剛城在定陶縣境内即魯國之闡邑戚姬村在定陶北漢戚夫人生此孝子村在定陶北里人孟昌宗割股養母之地紀勝人物漢魏相少舉賢良為茂陵令後拜御史大夫言霍氏驕放宜削其權及入相白去副封以防壅蔽三國董昭事魏常上疏諫末流之弊後拜司徒皇朝王能事太宗于晉邸及即位遷殿前左班都虞候真宗時累遷彰信軍節度贈太尉劉潜少舉進士歴知蓬萊聞母喪慟哭遂絶時人以孝稱之紀勝集我歌白雲倚窻牖爾聞其聲但囘首長風吹月渡海來遥勸仙人一杯酒舉觴酬堯堯可聞何不令臯擁篲横八極直上青天揮浮雲堯沒三千嵗青松古廟存秋波落泗水海色明徂徠並李白執政方持法明君無此心閭閻河潤上井邑海雲深王摩詰本朝乾徳元年置法運務開寶元年改轉運司太平興國二年建為軍四年割漕澶濮濟四州地復置縣以𨽻焉熈寧四年廢軍以定陶縣𨽻曹州元祐元年復為軍沿革表促轡數殘更似聞雞一鳴春風馬上夢沙路月中行笳鼓逺多思衣裘寒始輕稍知田父穏燈火閉柴荆燈火匆匆出定陶囘看永濟日初髙似聞空舎鳥烏樂更覺荒陂人馬勞並王安石記纂淵海卷十八
