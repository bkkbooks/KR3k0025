仙居郡號回浦仙居臨海天台章安黄岩丹丘赤城州沿革南斗須女之分上應台星禹貢揚州之域春秋戰國皆越地秦屬閩中郡漢東甌地後屬㑹稽郡南部都尉治此呉建中置臨海郡梁為赤城郡隋平陳廢郡屬處州後屬永嘉郡唐武德四年置台州天寳曰臨海郡屬江南道沿革表縣沿革臨海本漢㑹稽郡回浦縣地東漢改章安縣呉分置臨海郡晉亦為臨海郡治隋改章安曰臨海縣屬永嘉郡唐武德四年復増置章安八年省之黄岩唐上元二年分臨海置永寧縣屬台州天授元年改今名寧海本漢㑹稽郡鄞縣地晉永和三年置寧海縣屬臨海郡隋省之唐武德四年析臨海復置七年省之永昌初又置天台本東漢章安縣地呉分置始平縣晋太康元年改曰始豐屬臨海郡陳至德九年徙郡於此隋平陳廢郡以其縣入臨海唐武德四年復置始豐八年省之貞觀復置上元改曰唐興後梁改曰天台後唐改唐興石晉改台興仙居晉永和三年分始豐南鄉置樂安縣屬臨海郡隋開皇九年廢之唐武德析臨海復置八年省之上元二年又置五代改為永安沿革表形勝天台山在天台縣西一百一十里天姥峯在天台西北一峯孤秀峭峻與天台相對天門山在寧海縣北天柱山在寧海縣西其南有黄水峯丹霞洞在天台觀東北葛仙翁煉丹處丹霞小洞在天台縣北黄巖山在黄岩縣神仙王方平所號黄岩溪出焉丹崖山在黄岩縣南崖石皆赤丹青泉在寧海天慶觀白岩山白鶴山白鵠山皆在臨海白嶠山白龍潭皆在寧海赤城與瀑布號為二竒國清寺與齊州靈岩荆州玉泉潤州栖霞號為四絶金山在黄岩上鋭下濶宛若金字銀山在天台日山在臨溪西雲岩在臨海東靈岩在黄岩縣北又名鷲峯後有飛瀑瑞峯在仙居委羽山在黄岩縣為第二大洞天赤城山在天台縣為第六大洞天括蒼山在天台縣為第十大洞天葢竹山在黄岩縣為第十九小洞天夀星岩摘星巖閬風臺在寧海景星巖在仙居劉阮洞麻姑巖在天台輿地紀勝人物梁庾肩吾隠居號天台逸民皇朝楊蟠臨海人有文號章安集郭琮黄岩人絶暈醴三十年以祈母夀詔表門閭余元卿黄岩人宣和冦亂負母而逃仰天誓曰若全我母當焚身以報冦定欲償前誓母止之乃燃一指節婦陳氏夫亡有欲奪其志者引刀欲剄姑亟奪之乃免事父母姑舅至孝詔表門閭輿地紀勝集天台隔三山風浪無晨暮台州地濶海㝠㝠雲外長和島嶼青杜詩天台山最髙動躡赤城霞孟郊緬尋滄海趣近愛赤城好孟浩然上逼青天髙俯臨滄海大雞鳴見日出每與神仙㑹來去赤城中逍遥白雲外莓苔異人間瀑布作空界浩然遂登天台望衆壑皆嶙峋夜宿最髙頂舉頭㸔星辰光茫相照燭南北争羅陳韓集天台隣四明華頂髙百越門標赤城華樓棲滄海月凭髙登遶覽直下見溟渤雲垂大鵬翻波動巨鼇沒風濤争洶湧神怪何翕忽五峯轉日色百里竹松聲李白願將花贈天台女留取劉郎到夜歸白樂天路入仙溪氣象清垂邉樹石􅖣中行霧昏不見西陵岸風急先聞瀑布聲逺近常時皆藥氣髙低無處不泉聲方干尋花洞裏連春醉望海樓中徹曉吟杜荀鶴本朝建隆元年以台興縣復為天台縣景德四年以永安縣為仙居縣沿革表集天台瓊臺標竒状赤城瀑布懸千丈王欽若明年採藥天台去更欲題詩滿浙東東坡穹窿台岳壓重溟中起青鴛接福庭錢惟演赤城霞標雲半中巖扉洞戸凌太空錢惟演台嶺攀仙桂桃源訪舊花水流玉洞桃花出風過星壇桂子飄章得象天台峻極横海濵金庭紫洞多真人安道四郭青山連市合一江寒水抱城斜赤城山下萬人家隠隠烟霄隔海霞石上仙書皆鳥跡盃中佛供薦天花舒亶赤城道逺霞明畫瀑布聲寒月照氷張師德記纂淵海卷九
