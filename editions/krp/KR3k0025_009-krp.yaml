body:
  text: 記纂淵海卷九宋潘自牧撰郡縣部兩浙西路臨安府倚郭二外縣七仁和餘杭錢塘臨安富陽於潛新城昌化鹽官行在所寧海軍節度浙西路安撫司兩浙轉運司郡號餘杭寧海杭州錢塘武林天目臨平府沿革牽牛婺女呉地斗分野禹貢揚州之域春秋越國西境戰國屬楚地秦漢屬㑹稽郡東漢順帝以後屬揚州呉郡三國増置呉興郡陳置錢塘郡隋廢郡置杭州大業廢州置餘杭郡唐武德杭州屬江南道天寳改餘杭郡升鎮海軍節度五代呉越王錢氏都之地理沿革表縣沿革仁和本漢錢塘縣屬㑹稽郡東漢廢之其地有臨平湖自漢末穢塞呉孫皓天璽元年湖開晋復置錢塘縣屬呉地陳置錢塘郡隋開皇平陳自餘杭徙州治此五代石晉避諱改曰錢江後别置錢塘與錢江分治錢塘本漢錢塘縣地五代析錢江爲錢塘縣餘杭秦始皇南逰至浙江水波惡乃西百二十里從狹中渡因置餘杭縣漢屬㑹稽郡東漢屬呉郡三國以後屬呉興郡隋置杭州於此後乃徙治錢塘唐屬杭州臨安本漢餘杭縣地呉分置臨水縣屬呉郡後屬呉興晉武改曰臨安隋廢之唐武德復臨水縣𨽻潛州後省入於潛垂拱中復置臨安縣屬杭州五代後梁改曰安國僞唐置衣錦軍縣屬焉富陽本漢富春縣屬㑹稽郡東漢屬呉郡呉孫權置安東郡晉避皇后諱改曰富陽隋屬餘杭郡唐屬杭州於潛本漢於朁縣屬丹陽郡呉寳鼎元年屬呉興隋屬餘杭郡爲於灊縣唐武德七年置潛州領於潛臨水二縣八年州廢屬杭州新城本漢富春縣地呉置新城縣尋廢之晉咸和中復置隋平陳省入錢塘後復置唐武德廢之永淳復置屬杭州五代後梁改曰新登縣呉越王分臨安縣地置南新塲鹽官本漢海鹽縣地有鹽官呉王煮海之地呉置鹽官縣屬呉郡隋屬餘杭郡唐屬杭州武德七年省入錢塘貞觀四年復置昌化本漢於朁縣地唐垂拱二年析於朁置紫溪縣萬嵗通天改曰武龍神龍改曰唐山大歴省之長慶復置五代後梁改曰金昌後唐同光復故名石晉改曰横山地理沿革表形勝西湖在城西周囬三十里元祐間東坡重開築堤其上號蘇公堤孤山在湖中獨立一峯林和靖隠居所南髙峯在南山石塢煙霞山後北髙峯在靈隠山後與南髙峯頂皆有古塔飛來峯在靈隠寺前晉咸和中有僧曰是中天竺國靈鷲山不知何年飛來乃創靈隠寺靈隠寺在九里松之西三天竺在靈隠之西冷泉亭在靈隠寺前飛來峯下胥山在城中即呉山也有泉在山北龍山在城南十里龍井在夀山院六和塔在龍山下浙江亭在江下雷峯塔在西湖南山之黄皮園煙霞洞在錢塘南十六里風水洞在錢塘之楊林慈恩院水樂洞在煙霞嶺下彗日峯在净慈寺巨石山在錢塘縣南三里九里松在西湖上九仙山在臨安縣百丈山在昌化縣一名潛山千頃山在新城縣西北六十里赤松山在富陽縣東九里娥眉山在城中鳯凰山在城中下瞰大江黄鶴山在仁和縣東北白鹿山在餘杭縣循虎巖在洞霄宫蛻龍洞在新城縣西十八里保叔塔在西湖大佛頭之上净慈寺在南山頭洞霄宮在餘杭縣南十八里紫盖山在餘杭縣爲第三十三小洞天天目山在臨安縣爲第三十四小洞天輿地紀勝人物漢嚴光富春人光武徴之不仕耕於富春山呉孫堅富春人晉禇陶錢塘人年十二作鷗鳥水磑二賦唐禇亮錢塘人瀛洲學士遂良父羅隠新城人呉越王錢鏐臨安人皇朝錢維演仕至使相林逋結廬西湖之孤山沈括錢塘人明歴數周邦彦字美成錢塘人進汴都賦號清真居士張九成紹興二年掄魁輿地紀勝集萬株松樹青山上十里沙堤明月中望海樓邉照晩霞䕶江堤白踏晴沙濤聲夜入伍員廟柳色春藏蘇小家遶郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇山名天竺堆青岱湖號錢塘瀉緑江三年悶悶在餘杭曽為梅花醉幾塲伍相廟邊繁似雪孤山園裏䴡如粧踏隨逰騎心長惜折贈佳人手亦香笙歌縹緲虗空裏風月依稀夢想間吏稀秋税畢客㪚晩庭空霽後當樓月潮來滿座風北郭沙堤尾西湖石岸頭俱白樂天外邑宵濟漁浦澤暮及富春郭文選本朝太平興國元年呉越王納土爲杭州餘杭郡淳化五年改寧海軍額紹興駐蹕改曰臨安府沿革表太平興國四年改錢江爲仁和太平興國三年改衣錦軍爲順化軍縣曰臨安五年廢郡以臨安縣屬杭州太平興國四年復置新城縣淳化五年以南新場置昭德縣尋改南新縣熈寧五年省入新城太平興國四年改横山縣曰昌化沿革表地有湖山美西南第一州仁宗御製怪石蒼崖映翠霞梅花踈瘦正横斜得因祀事來尋勝試探春風第一花髙宗御製夢遶呉山却月廊白梅盧橘覺猶香海門浸坤軸湖尾抱雲巘葱葱城郭麗淡淡煙村逺惆悵沙河十里春一番花鳥一番新沙河燈火照山紅歌吹喧喧笑語中十里珠簾半上鈎朝見呉山横暮見呉山從呉山故多態轉側爲君容天外黒風吹海立浙東飛雨過江來東坡林巒臘雪千家水城郭春風二月花萬屋相誇漆與丹笑歌長在綺羅間綵船春戲城邉水畫燭秋尋寺裏山王介甫繚繞峯巒饒野色參差樓閣起晴煙湖光争照山間寺江浪遙連海外天謝㓜槃武林天下竒㢲亭景中絶胡宿暑月芙蓉秋月濤截斷風光三百里丘濬神都魏闕移郊域龍飛鳯舞來呉山周邑外邑我昔常爲徑山客至今詩筆餘山色師住此山三十年妙語應須得仙骨徑山寺問牒知秦過㸔山識禹功餘杭法喜院古邑居民半海濤塩官千佛閣風巖水洞舊聞名只隔山溪夜不行風水洞虎移泉眼趂行脚龍作浪花供撫掌虎跑泉含暉亭上望東溟凌霄峯頭挹南嶽含暉亭以上並東坡人行山頂半天上舟遶溪流亂石中汪藻詠餘杭江湖西湖並見前地理類平江府倚郭二外縣四呉縣崑山長洲常熟呉江嘉定平江軍節度浙西路提刑司提舉司郡號呉郡蘇州呉㑹姑蘇勾呉夫椒府沿革呉地斗分野星紀之次禹貢揚州之域周封㤗伯於此春秋呉國所都爲越勾踐所滅楚伐越取之秦置㑹稽郡漢髙祖爲荆國十二年復爲㑹稽郡復屬揚州東漢順帝永建四年分浙江以西置呉郡三國時呉郡與呉興丹陽爲三呉晉以後爲呉郡陳置呉州隋平陳改曰蘇州大業初爲呉州尋爲呉郡唐蘓州呉郡屬江南爲東道採訪使治所南唐陞爲中呉軍節度地理沿革表縣沿革吳縣㤗伯奔荆蠻居之秦置㑹稽郡漢髙帝以封呉王濞國除復爲㑹稽郡呉縣東漢順帝置呉郡治此唐蘇州所治長洲本漢呉縣地呉封長沙王果於此唐萬嵗通天元年析呉縣置長洲縣在州郭與呉縣分治崑山本漢㑹稽郡婁縣東漢屬呉郡梁大同元年分婁縣置崑山縣隋平陳省之開皇十八年復置唐屬蘇州常熟本漢呉縣地晉分呉縣置海虞縣屬呉郡成帝又置南沙縣屬晉陵郡梁分置常熟縣及信義郡隋平陳徙常熟於南沙省海虞南沙入焉唐屬蘇州呉江本春秋竺澤地漢屬呉縣後梁開平三年錢鏐奏於松江置呉江縣嘉定本崑山縣地嘉定十年知府趙彦橚提刑王棐奏崑山縣地界濶逺其東瀕海多盜祈割崑山縣就練祈要㑹之地置立縣治以嘉定爲名從之沿革表形勝太湖在呉縣南禹貢謂之震澤周官爾雅謂之具區史記國語謂之五湖劒池在長洲縣虎丘山胥門伍子胥家於此後以諌死命抉其目垂於此門觀越兵之入呉江源出太湖一名松江又名松陵江又名笠澤胥山在呉縣西崑山在縣西北陸機陸雲生於此時人比之崑山出玉因以名焉林屋山在太湖水中爲第九大洞天鶴市在閶闔門外魚城在呉縣雞陂呉王養雞之所鴨城在呉縣呉王養鴨之所豨巷在呉縣東南蠡塘在長洲界鹿湖在呉縣下華山在呉縣西頂上有池生千葉蓮花姑蘇山在呉縣西有姑蘇臺洞庭山在太湖中海隅山在常熟縣靈巖山在呉縣西南明聖湖在呉縣南湖中有金牛常見鳯凰山在呉縣西南馬鞍山在崑山縣西北有静濟侯廟輿地紀勝人物呉公子季札呉人言偃孔門弟子范蠡平呉扁舟泛五湖不返甪里先生呉人隠商山漢嚴助朱買臣後漢陸續懷橘遺母呉陸遜陸抗晉陸機陸雲生崑山縣張翰爲齊王曹掾思故鄉蓴鱸唐陸德明著釋文陸龜蒙自號江湖㪚人張旭善草書酒中八仙陸贄相德宗以直諌著名皇朝范文正公米元章善書輿地紀勝集山澤多藏育土風清且嘉㤗伯導仁風仲雍揚其波髣髴谷水陽婉孌崑山隂八族未足侈四姓實名家陸機四姓謂朱張顧陸也崑山積瓊玉文選夜月紅甘樹秋風白藕花水通山寺笙歌去騎過紅橋劒㦸隨劉禹錫花邉妓引尋香徑月下僧留宿劒池黄鸝巷口鶯欲語烏鵲橋頭冰未消緑浪東西南北水紅欄三百九十橋長洲花緑柳萬樹齊雲樓春酒一杯閶門曉嚴旗鼓出臯橋夕閙船舫回館娃宫深春色長烏鵲橋髙秋夜凉茂苑綺羅佳麗地女湖桃李艶陽春半酣憑檻起四顧七堰八門六十坊遠近髙低寺間出東西南北橋相望姑蘇臺榭倚蒼靄太湖山水含清光版圖十萬戸兵籍五千人闔閭城碧鋪秋草烏鵲橋紅帶夕陽處處樓臺飄管吹家家門外泊舟航雲埋虎寺山藏色月耀娃宫水放光俱白樂天山川表明麗湖海吞大荒韋蘇州荒臺麋鹿争新草空苑鳬鷗占淺沙許渾閶門柳色煙中樹茂苑鶯聲雨後春張籍廣庭遥對舊娃宫竹島蘿溪委曲通茂苑臺池低檻外太湖魚鳥徹池中煙水呉都郭閶門架碧流緑楊淺深巷青翰往來舟朱户十萬室丹楹百尺樓水光搖極浦草色辨長洲皮日休本朝太平興國改曰平江軍政和三年陞爲府寧宗増嘉定一縣見前縣沿革下白傅林塘傳畵去呉王花草入詩來醉眼朦朧覔歸路松江煙晩鎻踈林呉興溪山興未窮又扶衰病過垂虹浮天自古東南水送客今朝西北風東坡梵客江山供逸興呉王風月屬髙才胡宿季鷹死後無歸客江上鱸魚不直錢夏英公笠澤鱸肥人膾玉洞庭柑熟客分金蘇舜欽昨夜虎丘山上望一輪明月照蘇州虎丘僧上太守浪迹姑蘇人不管春風吹笛酒家樓僧仲殊嘉興府倚郭一外縣三嘉興華亭海塩崇德郡號嘉禾檇李秀州華亭府沿革呉地斗分野星紀之次禹貢揚州之域春秋呉越分境於此呉亡屬越楚滅越取之秦漢屬㑹稽郡東漢以後屬呉郡隋唐屬蘇州五代石晉天福四年錢元瓘奏置秀州地理沿革表縣沿革嘉興本春秋檇李地吳之南境秦為長水縣改曰由拳漢屬㑹稽郡東漢屬呉郡呉時有嘉禾生改為禾興後避諱改嘉興宋省之唐武德復置屬蘇州八年省入呉縣貞觀八年復置五代屬杭州呉越錢元瓘置秀州於此華亭本春秋呉子夀夢所築秦為婁縣地漢屬㑹稽郡東漢屬呉郡唐天寳十年析嘉興縣置華亭縣屬蘇州五代呉越屬秀州海塩本春秋越地秦置海塩縣屬㑹稽郡東漢屬呉郡順帝時縣陷為當湖乃移治今所宋省之唐景雲二年分嘉興復置屬蘇州先天元年省之開元五年復置五代呉越屬秀州崇德本春秋越北境三國時呉嘉興縣地五代呉越析嘉興九鄉置縣因崇德鄉為名屬秀州地理沿革表形勝胥山在嘉興縣東南于山在華亭縣崑山在華亭縣西二十三里蘇秀二州之境也殳山在嘉禾縣南金山在華亭縣東南當湖在海塩縣北柘湖在華亭縣南瑁湖在華亭鶴坡在華亭縣東北地出鶴俗謂之鶴窠陸機臨刑有華亭鶴唳之嘆謂此也海塩縣北有孔子宅寒穴在華亭竹嶼山在華亭縣東南海中陸寳山在華亭縣北金城山在華亭縣南金粟山在海塩白龍洞在華亭縣雲横山頂白蜆湖在華亭縣西白牛村在華亭金牛山在海塩縣西南金魚院在嘉興縣西北有金魚池養魚池在府城外蟠龍塘在華亭縣東北鳯凰山在華亭縣鴛鴦湖即郡之南湖鸕鷀湖在海塩縣西羔羊堰在崇德縣西龍吟寺鳯鳴院在崇德縣西北輿地紀勝人物漢朱