body:
  text: 記纂淵海卷九十六宋潘自牧撰竹部竹經震為蒼筤竹易揚州篠簜既敷荆州厥貢惟􅙪簵楛書瞻彼淇澳緑竹猗猗緑竹青青緑竹如簀籊籊竹竿如竹苞矣詩孤竹之管孫竹之管隂竹之管周禮仲冬取竹箭如竹箭之有筠也禮記史渭川千畆竹其人與千户侯等史記上使發卒數萬人塞瓠子河下淇園之竹以為楗梁孝王脩兎園多植竹秦地有鄠杜竹林漢書費長房從壺公入深山幾得道長房辭歸翁與一竹杖曰騎此任其所之則自至矣至則以竹杖投葛陂也長房至家以杖投葛陂顧視則龍也後漢方術傳杜預曰譬如破竹數節之後皆迎刃而解王徽之常借居空宅中便令種竹徽之嘯詠指竹曰不可一日無此君晉書扈載因游相國寺見庭竹可愛作碧鮮賦題其壁五代史傳記少室之山大竹堪為釡甑孝經河圖長石之山西有共谷其中多竹衞丘山南帝俊竹林在焉大可為舟帝俊即帝舜竹生花其年便枯竹六十年一易根易根必經結實而枯死實落土復生山海經東南之美有㑹稽之竹箭焉爾雅竹曰青士三水小牘竹得風而體夭屈謂之竹笑説文蓬萊有浮筠之􅀢葉青莖紫子如大珠有青鸞集其上風吹竹葉聲如鐘磬之音拾遺記羅浮山生竹謂之龍鍾南越志邵陵髙平縣有文竹山上有石牀四面緑竹扶疎常隨風委拂此牀湘州記陽嶼仙山有平石名仙壇有一筋竹垂壇上永嘉記江寧縣慈姥山生簫管竹自伶倫採竹嶰谷其後惟見於此俗呼曰鼓吹山丹陽記雲南有實心竹文采斑駮可為器物雲南記南方荒中有􅀢竹可以為船湘水有相思營望帝臺舜南廵不返後塟於蒼梧之野堯之二女娥皇女英追之不及相思慟哭淚下沾竹文悉為之斑斑然神異經昔黄帝命伶倫為律伶倫自大夏之西至沅渝之隂取竹於嶰谷斷兩節間而吹之吕氏春秋𢎞農宜陽縣金門山竹可為律管楊子子路見孔子孔子曰君子不可不學子路曰南山有竹不揉自直斬而為用逹於犀革以此言之何學之為孔子曰栝而羽之鏃而礪之其入不益深乎家語南中生子母竹今慈竹是也漢章帝三年子母竹筍生白虎殿前謂之孝竹羣臣作孝竹頌述異記帝遊後苑有竹叢密筍不出外帝顧諸王曰父子兄弟相親當如此竹因謂義竹天寶遺事王子猷嘗過吳中見一士大夫家極有好竹主人知子猷當往洒掃施設在㕔事坐相待王肩輿徑造竹下諷嘯良久遂欲出門主大不堪遂令左右閉門不聽出王更以此賞主人乃盡歡而去阮籍嵇康山濤劉伶阮咸向秀王戎七人常集於竹林之下肆意酣暢故世人謂之竹林七賢世説唐貞元中有遊羅浮山第十三嶺遇巨竹圍二丈餘有三十九節節二丈餘予嘗覧竹譜曰雲丘帝竹一節為船南海以竹為甑皆羅浮之竹也嶺表録異李衞公言北都惟童子寺有竹一窠纔長數尺令傳其寺每日報竹平安雜爼潤州甘露寺僧某者李徳裕以方竹杖留贈出大宛國堅實而正萬節眼鬚牙四面對出公再鎮浙右問僧曰竹杖無恙否曰已規圓而漆之矣叢談唐天復甲子嵗自隴而西亢陽竹皆放花結子饑民採之舂米而食珍於粳糯其味更馨香可謂百萬圓顱活於貞筠之下玉堂閒話舊稱竹實鸞鳯所食今近道竹結實如小麥無氣味近有餘干人言彼有竹實大如鷄子竹葉層層包裹味甘勝蜜因知鸞鳯之食必非常物也本草竹有生日即五月十三日也文心雕龍岳人以五月十三日謂之龍生日可種竹即齊民要術竹醉日也岳陽風土記五月十三日移竹神日也四時纂要集便娟之竹寄生江潭上葳㽔而防露下泠泠而來風七諫含虛中以象道體圓質以儀天江淹賦或茂沙水或挺岩陸條暢紛敷青翠森肅戴凱之竹譜竹則包笱抽節徃徃縈結緑葉翠莖冒霜停雪吳都賦風篁成韻文選翠葆隨風金戈動日謝朓檀欒嬋娟玉潤碧鮮初篁包緑籜文選長淇園貞榦臣脩竹稽首沈約脩竹彈甘焦文竹本固固以樹徳君子見其本則思善建不㧞者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者日出有清隂風來有清聲白樂天養竹記勁本堅節不受雪霜剛也緑葉萋萋翠筠浮浮柔也虛心而直無所隱蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣上終不與衆木鬬榮謙也四時一貫榮衰不殊常也垂賁實以延鳯樂賢也嵗擢筍以成榦進徳也羣居不亂獨立自持振風㧞屋不為之傾大旱乾物不為之瘁堅可以配松栢勁可以凌霜雪密可以泊晴煙踈可以漏霄月文苑英華翠色落波深虛聲帶寒早龍吟曽未聴鳯曲吹應好野竹分青靄緑竹助秋聲窗竹夜鳴秋李白竹光團野色我有江隂竹能令朱夏寒籠竹和煙滴露稍風含翠篠娟娟净竹細野池幽種竹交加翠愛竹遣兒書霜埋雪竹根脩竹不受暑叢篁低地碧錦竹亭亭出縣髙賞靜連雲竹緑竹半含籜新稍纔出墻色侵書帙暗隂過酒樽凉雨洗娟娟净風吹細細香但令無剪伐㑹見拂雲長杜詩竹影金瑣碎孟郊折篁嘯遺笙誰家有竹門可欵藹藹溪流慢稍稍岸篠長穿沙碧榦净落水紫苞香筍添南堦竹日日成清閟縹節已儲霜黄苞猶揜翠髙標凌秋嚴貞色奪春媚風枝未飄吹露粉先涵淚韓詩風篁冒水逺迸籜分苦節輕筠抱虛心栁詩停車欲去繞藂竹偏愛新筠十數竿莫遣兒童觸瓊粉留待幽人回日看韋蘇州本朝司馬公獨樂園有竹一本去地二尺分為兩榦並生六節節間容線復合為一洛中號為瑞竹李方叔西㳺記茲軒最灑落歴歴種琅玕翠隂凉宴坐疎韻成清歡錦籜裁夏扇玉筍供春盤司馬公竹比君子徳猗猗寒更緑嫰籜筠粉暗虛心髙自擢勁節晩愈瘦雖慙桃李妖寧愧松栢後猗猗色可飱滴滴翠欲溜粉籜春苞解六一集雪節貫霜根解籜呈新緑鄰里亦知偏愛竹春來相與䕶龍雛斫得龍光竹兩竿千林玉槊攙空立醉裏曽看碧玉椽卧聴謖謖碎龍吟俯看蒼蒼立玉身解籜新篁不自持嬋娟已有嵗寒姿可使食無肉不可居無竹無肉令人瘦無竹令人俗人瘦尚可肥人俗不可醫東坡卧龍偃蹇雷不驚公與此君俱忘形此君傾盖如故舊骨相竒怪清且秀山谷筍經其蔌維何維筍及蒲詩史沈道䖍有人㧞其屋後筍令人止之曰惜此筍欲令成林更有佳者相與乃買大筍與之盗者慙不取道䖍使置其門内而還南史傳記筍竹萌爾雅筍一名萌一名蒻一名䈚一名䕌一名竹胎一名竹牙一名茁一名初篁筍者竹之蒻也竹之醜節種厥性弱於木而强於草實草木中别類也筍譜竹子乃筍也神異經服日月之精華欲得常食竹筍者日華之胎也一名大明道書嶺南山谷茅地中生筍甚大籜皆竹而根乃茅也土人食之名聖筍紺珠集竹之美者越駱之莔吕氏春秋髙秀曰莔筍也馬援至荔浦見冬筍名苞筍其味美於春夏筍東觀漢記何隨有竹園人盗其筍隨行見之恐驚乃挈履而歸華陽國志孟宗至孝母好食竹筍宗入林中哀號方冬筍為之出時人皆以為孝感所致先賢傳漢人適吳吳人餽筍問何物曰竹也歸煮其牀簀而不熟曰吳人欺我哉壁顧録皮藩去北而復來鄱陽食竹筍曰三年不見羊角衰矣叩頭録集岸筍開新籜李白緑垂風折筍舍下筍穿壁春筍滿林生杜詩筍添南階竹稀生巧補林迸出疑争地竹亭人不到新筍滿前軒乍出真堪賞初多未覺煩見角牛羊没看皮虎豹存身寧虞瓦礫計擬掩蘭蓀外恨包藏密中仍節目繁韓詩紫籜折故錦素肌擘新玉白樂天嫰籜香苞初出林於陵論價重如金皇都陸海應無數忍剪凌雲一寸心李義山萬籜抱龍兒攅迸溢林薮盧仝稚子脱錦綳駢頭香玉滑唐詩本朝東坡曽邀劉器之同參玉版和尚至廉泉寺燒筍而食之器之覺筍味勝問何名也東坡曰名玉版也此老師善説法要能令君得禪説之味於是器之乃悟其戲為之大笑東坡作偈曰不怕石頭路來參玉版師聊憑栢樹子與問籜龍兒冷齋夜話東坡云文與可嘗令余作洋州三十詠篔簹谷其一也予詩曰漢川脩竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濱千畆在胷中與可是日與其妻㳺谷中燒筍晩食發函得詩大笑噴飯滿案畫篔簹谷記故人知我意千里寄竹萌駢頭玉嬰兒一一脱錦綳東坡隣里亦知偏愛竹春來相與䕶龍雛數里春畦獨自尋迸屖抽錦亂森森田文死去賔朋散抛擲三千玳瑁簮王元之繭栗戴地翻觳􅑌觸墻壞南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束明日風雨吹成竹山谷竹君家多材楚楚皆席珍成竹著錦袍玉色映市人陳去非急喚蒼頭斸煙雨明朝吹作碧參差朱喬年下有萬玉虬三冬卧寒土朱文公江西猫筍未出尖雪中土膏養新甜誠齋記纂淵海卷九十六
