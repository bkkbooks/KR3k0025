body:
  text: 記纂淵海卷五十宋潘自牧撰性行部有忌憚經豈敢愛之畏我父母仲可懐也父母之言亦可畏也豈敢愛之畏我諸兄仲可懐也諸兄之言亦可畏也豈敢愛之畏人之多言仲可懐也人之多言亦可畏也豈不懐歸畏此罪罟豈不懐歸畏此簡書並詩十目所視十手所指其嚴乎記君子有三畏畏天命畏大人畏聖人之言語史豈不欲徃畏我友朋左上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰唐太宗本朝家有主母而豪奴悍婢不敢與弱子抗老泉無忌憚經不惕予一人乃㒺畏畏謂已有天命謂敬不足行謂祭無益謂暴無傷狃于姦宄敗常亂俗以蕩陵徳實悖天道並書小人而無忌憚也記不愧于天不畏于人乘我乘駒朝食于株胡不相畏不畏于天匪先民是程匪大猶是經並詩小人不知天命而不畏也狎大人侮聖人之言語子出則為宗族患入則為鄉里憂小人之行也家語事君無義進退無禮言則非先王之道者猶沓沓也孟齊人有欲金者清旦衣冠之市適鬻金者之所攫金而去列好憎尚怒小人哉文中子史殺人不忌為賊肆行無度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心單旗劉狄剥亂天下帥羣不弔之人以行亂於王室侵欲無厭規求無度貫瀆鬼神慢棄刑法傲狠威儀並左李斯曰三代之事何足法也李斯請史官非秦語皆燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市並秦紀敢為大言處之不疑漢武紀秦滅六國上古遺烈掃地盡矣史田儋傳宋康王欲霸之亟成故射天笞地斬社稷而燒滅之以示威服鬼神為長夜之飲於室中室中人呼萬歲則堂上應之堂下之人又應之門外之人又應之以至於國中無敢不呼萬歳者天下之人謂之桀宋周紀矯制以令天下漢高五王傳姍笑三代蕩滅古法西漢表顓作威福廟堂之上西漢諸侯王表觸情妄行淮南王方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之郡蹈籍名都大羣求黨與索隨和而亡逃匿之意此皆輕量大人亡所畏忌國家之權輕故匹夫欲與上爭衡也漢梅福傳横厲無畏忌欲以熏轑天下漢杜欽傳梁冀暴李固杜喬尸於城北四衢令有敢臨者如其罪漢質紀吳樹為荆州刺史辭梁冀冀鴆之出死車上遼東太守侯猛初拜不謁冀託以他事腰斬之漢桓紀戲弄神祇歌頌禍殃東漢隗囂傳杜塞天下之口聾盲一世之人漢陳蕃傳入吾室操吾戈以伐我漢鄭𤣥傳祖珽私謂和士開曰君之寵幸振古無比宫車一日晩駕何以克終宜令皇太子早踐大位以定君臣之分若事成中宫少主皆徳君此萬全計也請君説主上令粗解當自外入表諭之於是上書齊主從之傳位於太子緯陳世祖阮佃夫人納貨賄所餉減二百疋絹則不報書宋太祖右司郎中馮翊喬知之有美妾曰碧玉知之為之不昬武承嗣借以教諸姬遂不還知之作緑珠怨詩以寄之碧玉赴井死承嗣得詩於裙帶大怒諷酷吏羅吉族誅之唐武后來俊臣倚勢貪淫士民妻妾有美者百方取之自宰相以下籍其姓名而取之同上武三思嘗言我不知代間何者謂之善人何者謂之惡人但於我善者則為善人於我惡者則為惡人耳唐中宗盧把秉政薦吏部侍郎關播為中書侍郎平章事上嘗從容與宰相論事播意有所不可起立欲言把目之而止還至中書把謂播曰以足下端慤少言故相引至此曏者奈何發口欲言耶唐徳宗小人之慮遂以為天道難知為善未必福而為惡未必禍也唐中宗贊李振曰此輩自謂清流宜投黄河為濁流唐紀傳記上小堯舜下邈三王劉向戰國䇿序集白晝攫金顔魯公坐位帖行與義乖言與法違韓文本朝小人不主於禮義則無忌憚所以反中庸也二程語録安石謂天變不足畏祖宗不足法人言不足䘏實録本傳有顧藉子齊景公問晏子曰為人何患曰患社䑕出竊於外入託於社灌之恐壊牆熏之恐燒木家語史鄧侯曰人將不食吾餘左欲投䑕而忌器䑕近於器尚憚不投西漢賈誼傳社鼷不灌屋䑕不熏西漢靖王勝傳孔融薦禰衡於曹操衡乃著布單衣持三尺梲杖坐大營門以杖捶地大罵操怒曰禰衡豎子孤殺之猶雀䑕耳顧此人素有虛名逺近將謂孤不容之東漢妻子以累其心産業以重其志舍此以為非者有必不多矣漢殤紀羅仇曰吾家世以忠孝著於西土寧使人負我我不忍負人也晉安紀傳記稷蜂不攻社䑕不熏唐詩外傳集薙草恐傷蕙孟東野無顧藉經子曰小人不恥不仁不畏不義易繫辭史史舉以茍賤不亷聞於世史甘茂傳吾日暮途逺故倒行逆施之漢主父偃傳子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣漢原涉傳且被刑之人心不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患孔融傳傳記楊國忠謂客曰某起家細微因縁椒房以至於是未知稅駕之所終不能致令名更當取樂於富貴耳明皇雜録表裏相應經君子黄中通理正位居體美在其中而暢於四支發於事業易和順積中而英華發外其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔清明在躬志氣如神君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之徳富潤屋徳潤身心廣體胖並記子中心逹於面目胷中正則眸子瞭焉胷中不正則眸子眊焉仁義禮智根於心其生色也睟然見於靣盎於背施於四體有諸内必形諸外並孟源清則流清源濁則流濁文貌情用相為内外表裏並荀體痛者口不能不呼心恱者顏不能不笑尹鄧子鄧析子篇威儀文辭表也徳行忠信裏也楊仲黎史心和則氣和氣和則形和公孫𢎞傳愛待敬而不敗徳須威而久立故制禮以崇敬作刑以明威前漢刑法志形氣發於根柢兮柯葉彚而靈茂西漢班固傳表曲者影必斜源清者流必潔猶叩樹本百枝皆動也漢紀木心不正則脈理皆斜唐紀根朽者葉枯源涸者流竭唐書吳兢集滿内而外揚楚辭厭着也白玉以為面懐琬琰以為心同上泉竭則源涸根朽則葉枯枝繁者䕃多條落者本孤六代論氣水也言浮物也水大而物之浮者小大畢浮氣之與言猶是也氣盛則言之短長與聲之高下皆宜未嘗聞有響大而聲微也夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不揜本深而末茂形大而聲閑行峻而言厲心醇而氣和昭晰者無疑優游者有餘體不備不可以為成人辭不足不可以為成文並韓文温潤發於外其間韜璵璠言者志之苗行者文之根所以讀君詩亦知君為人並白侍郎粹和絪緼積于中鏗鏘發越見乎文五行秀氣得之居多者其色㶑灧於顏間其聲發而為文章既禀之而生亦有涯而落其文章貴壽之氣焰歟孝弟為根柢神明枝葉之直方為天質禮讓縁飾之並劉賓客神歡體自輕韋應物集藴為志氣播為事業唐文粹本朝栁公權曰用筆在心心正則筆正孔氏續世說腹有詩書氣自華歐公集人之不學者照鏡則面目可憎對人則語言無味山谷集表裏不副經象恭滔天書枝葉未有害本實先撥詩色取仁而行違居之不疑語色厲而内荏譬諸小人其猶穿窬之盜也與語子聲聞過情孟羊質而虎皮見草而說見豺而戰揚魯人縫掖實非儒行劉史外強中乾左宋肥義曰公子章聲善而實惡周紀絳灌曰平雖美丈夫如冠玉耳其中未必有也漢陳平傳多聲過實史記袁紹色厲而膽薄高幹有雄志而無雄才東漢張磔綱羅而自理甚踈高獻紀高仙芝謂程千里曰公面雖男子心如婦人唐紀迺䃉中而玉表唐賈耽傳齊著作郎祖珽有文學多技藝而踈率無行嘗為高祖中外府功曹因宴失金叵羅於珽髻上得之陳世祖本朝潘郎曉踏河陽春明珠白璧驚市人那知望拜馬蹄下胷中一斛泥與塵坡詩言行相顧經有其言無其行君子恥之記可言也不可行君子弗言也可行也不可言君子弗行也記緇衣注言不高於行行不高於言言行相副言顧行行顧言君子胡不慥慥爾記中庸注慥慥言行相應之貌子曰先行其言而後從之古者言之不出恥躬之不逮也君子恥其言而過其行並語子聖人言行不失毫釐荀子言取而行違温彦博惡之文中子能言不能行經靜言庸違書有其言無其行君子恥之記其言之不怍則為之也難語子言不顧行行不顧言孟口言善身行惡國妖也荀孔子讀而儀秦行揚淵騫史羣臣上言宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汚七十二代之編録若郡縣逺遣吏上壽盛稱虛美必髠令屯田既上讀河圖㑹昌符幸泰山禪祭地於梁隂漢光武魏比年將帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懐雄圖銳氣一朝頓盡梁高祖牛僧孺口道先王語行如市人唐書本贊集遇客多言愛山水逢僧盡道厭囂塵玉潭泉畔松間宿要見經年無一人白樂天相逢盡道休官去林下何曽見一人唐僧靈徹矜持經率履不越詩燕處則聽雅頌之音行步則有環珮之聲升車則有和鸞之音居處有禮進退有度砥礪廉隅君子言不過辭動不過則不戲色致禮以治躬則莊敬莊敬則嚴威君子無故玉不去身君子於玉比徳焉行中規還中矩君子不失足於人不失色於人不失口於人是故貌足畏也色足憚也言足信也今世行之後世以為楷並記君子矜而不爭語子君子言有壇宇行有防表荀儒效為冠所以莊其首也為履所以重其足也衣裳襜如劒佩鏘如皆所以防其躁也文中子史斷斷自修整榖梁傳莊公如布帛之有幅左君子目以定體足以從之人之有冠猶宫室之有牆屋也糞除而已並國語進退容止非禮不行西漢董仲舒霍光出入省殿門止進有常處郎僕射竊識眂之不失尺寸西漢本傳矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表東漢張堪傳陳登處身循禮非法不行東漢陳球傳雖在燕居必以禮自整東漢仇覽君子當正威儀何有蓬頭跣足自謂宏逹耶九十三謝𢎞微精神端審時然後言婢僕之前不妄語笑南史宋高祖傳記南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也烈女傳楊愔曰裴讓兄弟都無鄉音三國典畧集余好修以為常雖體解吾猶未變新沐者必彈冠新浴者必振衣並楚辭與人有畛域不為戲狎韓文本朝趙光逢規矱自持栁仲郢私居束帶正色並孔六帖持重經虎視眈眈易重其體貌也正色率下書其容不改出言有章詩坐如尸立如齊君子不失足於人不失色於人不失口於人是故貌足畏也色足憚也言足信也君子之容舒遲足容重手容恭目容端口容止聲容靜頭容直氣容肅立容徳色容莊山立時行揚休玉色不旁狎並記夫子時然後言人不厭其言樂然後笑人不厭其笑君子正其衣冠尊其瞻視儼然人望而畏之並語集與人有畛域不為戲狎唐文粹本朝包孝肅未嘗有笑容人謂包希仁笑比黄河清筆談放蕩經欲敗度縱敗禮不矜細行並書不知其秩常也詩載號載呶同上子猖狂妄行莊史使酒難近西漢季布傳數以酒失過丞相西漢灌夫跅弛之士西漢武紀師古曰無檢局也弛者放廢不遵禮度也儻􅛅音蕩西漢陳湯傳師古曰無行檢也為人失音鐵蕩西漢揚雄傳不修廉隅以徼名當世同上何晏與夏侯𤣥荀粲王弼之徒競為清談尚虛無謂六經為聖人糟粕天下士大夫爭慕效之遂成風流魏邵陵厲公譙郡嵇康文辭壯麗好言老莊而尚竒任俠與陳留阮籍兄子咸河内山濤河南伺秀琅邪王戎沛人劉伶特相友善號竹林七賢皆崇尚虛無輕蔑禮法縱酒昏酣遺落世事魏元紀放者因斯或悖吉凶之禮忽容止之表瀆長㓜之序混貴賤之級甚者至於裸裎䙝慢無所不至晉惠紀時王澄胡毋輔之等皆以放任為逹或至裸體晉書樂廣傳文帝求婚於籍籍醉六十日不得言而止晉書阮籍傳隣家少婦美色當壚沽酒籍嘗詣婦飲醉便卧其側籍既不自嫌其夫察之亦不疑也同上阮咸素幸姑之婢姑當歸於夫家初云留婢既而自從咸聞之借馬追既及與婢累騎而還晉書本傳王獻之卒徽之奔䘮不哭直上靈牀取獻之琴彈之晉書王徽之傳謝鯤任逹不拘鄰家高氏女有美色鯤嘗挑之女投梭折其兩齒鯤傲然長嘯曰猶不廢我嘯歌晉書本傳謝安愛好聲律朞功之慘不廢妓樂晉書王坦之傳秘書監謝靈運好稱疾不朝時或出郭遊行且二百里經旬不歸既無表聞又不請急以貴陵物物不服以威加人人不厭宋太祖温庭筠薄於行無檢幅多作側辭艷曲唐書本傳脫冠露髻諠譁自恣唐莊宗傳記阮籍嫂嘗歸家籍相見與别人或譏之曰禮豈為我輩設耶世說王澄嘗之荆州送者傾邑所别樹上有鵲巢澄便脫衣着犢鼻上樹探鵲􅑹而弄之旁若無人晉中興書謝郎中云王修載樂託之性出自門風王武子好驢鳴既𦵏文帝臨其䘮顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴並世說史丹儻蕩無檢阮籍不拘禮教孔白帖縱逸類華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時迴杜牧之為御史分務洛陽有李司闕者罷鎮閒居聲妓為當時第一嘗開筵以杜持憲不敢邀致杜遣客達意李馳書招之杜聞命遽來時女妓百餘人皆絶藝殊色杜獨坐南行注目瞻視引滿問李曰聞有紫雲者杜凝睇良久曰名不虛得宜以見惠李大笑諸妓亦皆囘首破顏杜又自飲三爵即吟而起本事詩杜牧佐宣城幕聞湖州多竒麗往遊之刺史崔君張水嬉使州人畢觀令杜牧閱之牧因見一女娃期之曰吾不十年來守此郡不來從適洎牧守湖州女已從人三載矣牧因賦詩曰自是尋春去較遲不須惆悵怨芳時雜記張祜客懐南幕中赴宴杜牧同坐有所屬意索骰子賭酒微吟曰骰子逡巡裹手拈無因得見玉纎纎祜曰但知報道金釵落髣髴還應露指尖摭言集觀古今文人類不護細行鮮能以名節自立魏文帝與呉質書幕天席地縱意所如文選以莊老為宗而黜六經以虛薄為辨而賤名檢以放蕩為通而狹節信以茍得為貴而鄙居正以望空為高而笑勤恪干令升總論少年氣真狂有意與春競韓集野鳥終難縶元微之醉來擬共天公爭杜茍鶴酒腸寛似海詩膽大如天劉叉本朝醉後粗狂膽滿軀東坡詩威儀經威儀棣棣不可選也威儀反反重慎威儀抑抑謹宻抑抑威儀維徳之隅顒顒卬卬如圭如璋令儀令色並詩威儀容止宣著端行頤霤如矢朝廷濟濟翔翔君子之容舒遲山立時行揚休玉色注揚讀為陽赫兮喧兮者威儀也並記趨進翼如也君子正其衣冠尊其瞻視儼然人望而畏之並語容止可觀進退可度孝經子步中武象趨中韶濩荀君子貌重則有威揚史劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也北宫文子有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家君子在位施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也並左魯徐生善為容為禮官史霍光每出入省殿門止進有常處郎僕射竊識視之不失尺寸西漢霍光傳威儀之盛如圭如璋西漢班固叙傳進止皆有表識東漢馮異傳儀貌堂堂國之輝光東漢舒紳緩佩鳴玉以步綽有餘裕後漢蔡邕傳温彦博進止詳華人拭目觀張垍舉止都雅裴休為人醖藉進止雍閒馮定端凝若植權徳輿動止外飾其醖藉風流為縉紳羽儀並唐書集風儀與秋月齊明文選褚淵碑賀琛為散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之藝文志巉巖容儀削成風骨李白文風儀甚雅劉賓客日光玉潔李漢韓文序無威儀經而無望兮相鼠有皮人而無儀人而無儀不死何為威儀不類威儀幡幡並詩史視流而行速邾子執玉高其容仰公受玉卑其容俯子貢曰高仰驕也卑俯替也驕近亂替近疾並左張敞為京兆尹無威儀罷朝走馬章臺街自以便面拊馬西漢本傳羞怍俛首刮席不敢視東漢劉𤣥傳李程簡脫無威儀韓思彦儀矩梗野並唐書本傳傳記王戎簡脫不持儀刑好乘巴滇馬雖為三司率爾私行巡省園田不從一人以手巾揷腰戎故吏多至大官相逢戎輒下道避之竹林七賢話風度史王商為人多質有威重身體鴻大容貌甚過絶人單于來朝仰視商貌大畏之遷延却退天子聞而嘆曰此真漢相矣西漢本傳為人明徹鬚髪眉目如畫東漢馬援傳燕頷虎頸飛而食肉此萬里封侯相也東漢班超蔡邕狀異常人每行觀者盈集東漢本傳凛凛皜皜焉其與崑玉秋霜比質可也東漢孔融裴楷目夏侯𤣥云肅肅如入宗廟中但見禮樂器衛瓘見樂廣而奇之曰此人如氷鏡見之瑩然夏侯湛美容觀與潘岳友善每行止同輿接茵京師謂之連璧王戎神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電裴楷風神高邁容儀俊爽時人謂之玉人衛玠風神秀異見者以為玉人王濟俊爽有風姿每見玠輒嘆曰珠玉在側覺我形穢又語人曰與玠同遊若明珠之在側恍然照人嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳳姿天質自然並晉書本傳王衍神姿高徹如瑶林瓊木自然風塵表物晉書王戎顧榮少有珪璋符采爽徹五行晉書王衍每持玉柄麈尾與手同色晉王衍王羲之見杜乂而目之曰膚若凝脂眼如㸃漆此神仙中人也晉書本傳王恭美姿儀人目之云濯濯如春月栁晉王恭桓𤣥曰劉裕風骨不常蓋人傑也晉紀褚彦囘美儀貌善容止俯仰進退咸有風則每朝㑹百僚國使莫不延首目送之宋書本傳姿貌修潔與圭璧等質王智宋紀齊和士開曰琅琊王儼眼光奕奕數歩射人陳紀李繪儀貌端偉邢晏曰若披雲霧如對珠玉北史李渾風神洒落南史宋璟風度凝逺唐書本傳王彧美風姿為一時推許袁粲見之嘆曰景文非但風流可恱乃哺歠亦復可觀宋書本傳上嘗陳樂於勤政樓下垂簾觀之兵部侍郎盧絢謂上已起垂鞭按轡横過樓下絢風標清粹上目送之唐𤣥宗李義琛神情爽㧞唐書本傳帝每用人必曰風度能如九齡否唐書張九齡日角珠庭非庸人相唐李珏郭子儀風姿若神人望之岩岩如華山郭子儀家傳鄭畋姿采如峙玉蕭遇風采整峭崔澹舉止秀峙時謂玉而冠者並唐書本傳孔季翔永昌初擢制科陳子昂常稱其神清韻逺可比衛玠唐書房琯見徳秀歎曰見紫芝眉宇使人名利之心都盡唐元徳秀姿宇魁秀唐書魏謩崔逺風姿峻整世目為飣坐梨新唐書本傳傳記衛玠從豫章下都人久聞其姿容觀者如堵牆見裴叔則如玉山上行光照映人山公曰嵇叔夜之為人也岩岩若孤松之獨立其醉也傀俄若玉山之將崩時人目王右軍飄如遊雲矯若遊龍岩岩清峙壁立千仞並世說張緒少而閒雅風流吐納觀者忘疲永明主見靈和殿前栁條嫩弱披靡可愛嗟賞曰此楊栁風流可愛似張緒少年楊松玠談藪唐蔣凝美風標每到朝士家以為祥瑞朝士中號為玉筍班北夢瑣言李白神氣高朗軒軒若霞舉酉陽雜爼集情純潔而罔薉兮姿盛質而無愆金相玉質並楚辭天姿玉裕應瑒建章臺詩江漢炳靈文選清如玉壺氷鮑明逺白頭吟河目龜文公侯之相劉孝標辨命論金昭玉粹顏延年曲水詩風標秀舉清暉映世齊故安陸碑天骨踈朗牆宇高巍文選三國名臣贊姿狀嶽立靡然屬目陳子昻風情踈朗霜明月湛之姿氣骨端嚴雪白氷清之潔駱賓王秋水為神玉為骨眉宇真天人魏侯骨聳精神𦂳華嶽峯尖見秋隼炯如一段清水出萬壑置在迎風寒露之玉壺符彩高無敵玉府標孤映並杜詩皎皎鸞鳳姿飄飄神仙氣符彩照滄溟精輝陵白虹裴公有仙標㧞俗數千丈並李太白愛其風骨粹美無可揀韓文見王馬燧也於北亭猶高山深林龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙幼子娟好静秀瑶環瑜珥蘭茁其芽並韓文人之異在乎風神之清濁不在於倒置眉目反易冠帶也裴度寄李朝書觀者識承平王孫故態分明氷玉容並栁集珠生照乘光氷瑩環坐熱星辰讓光彩並元稹集若霜鴻清唳松雪孤映李義山石骨無濁肉飄飄鶴骨仙並孟東野神仙餘氣色列宿炳輝光劉叉文秀氣獨禀皇甫湜祭栁宗元文眸子瞭然炯炯清立望之真白圭振鷺也皇甫湜風儀秀偉神氣深厚即之如鏡望之如春杜牧之眉宇儼圖畫神秀謝朝輝同上清潤潘郎玉不如唐楊巨源生而美姿河目海口王維集玉山迥立瓊樹無對劉長卿明眸白晳玉潤珠輝美秀備於儀容風流發於言笑王建集英盼横溢神鋒秀發孫可之丈野鶴無俗質唐文粹孟浩然骨貌清淑風神散朗唐楊士源孟浩然詩序本朝氣剛而毅望之可畏色粹而仁近之可親歐公集紫芝眉宇傾一坐笑語但聞雞舌香韓侯氷玉人不可塵土雜並臨川集風采鑠雲烟氷壺貯秋水並東坡詩醜惡經六極五曰惡書乃見狂且詩子厲之人夜半而生子遽取火而視之汲汲然惟恐其似已也莊史賈大夫惡娶妻而美三年不言不笑左今子少不颺注顔貌不揚顯左田蚡為人貌侵短小也西漢本傳蔡義為丞相短小無鬚眉貌似老嫗行歩俛僂兩吏扶夾乃能行西漢本傳張孟陽醜每出人惡之擲瓦礫盈車孫秀形陋短小奴僕之下者也並晉書歐陽詢貌甚侵陋唐書本傳盧把貌陋而色如藍人皆鬼視之舊唐書本傳傳記劉伯倫形小貌醜書林本傳云容貌甚陋文雅經好古博雅君子書序子君子安雅雅文辨惠之君子知之曰知之不知曰不知内不自以誣外不自以欺以是尊賢畏法而不敢怠傲是雅儒者也並荀史大雅卓爾不羣河間獻王近之矣前漢河間獻王贊儒雅則公孫𢎞董仲舒西漢經書文雅足以謀王體㫁國論西漢薛宣傳劉愷辭氣高雅後漢山簡性温雅有父風晉書雅有逺韻晉書庾凱傳謝安文雅過於王𨗳晉書張九齡文雅為帝知唐書本傳集文雅涉風騷杜詩霜松貞雅節月桂朗冲襟駱賓王笑語和風騷雍容事文墨皇甫湜本朝文采風流諸謝上陳後山詩鄙俗經鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣語子有俗人者有俗儒者荀史家累萬金門下不見一賢者史記孟嘗君傳俗吏之所務在於刀筆筐篋西漢賈誼傳俗儒不逹時宜西漢宣紀集抗塵容而走俗狀文選揚善經君子遏惡揚善易彰人之善美人之功記子不没纖芥之善不掩螢爝之光劉史子貢喜揚人之美史記本傳曹丘生謂季布曰僕將捉足下之名於梁楚間漢書丙吉為丞相於官屬掾吏務掩惡揚善西漢本傳禰衡稱劉表之美盈口漢獻紀房𤣥齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰微公言幾失之唐高祖禮部侍郎崔郾試進士公卿咸祖道武陵後至謂郾曰君方為天子求奇才敢獻所益出袖中書搢笏為郾讀之乃杜牧所賦阿房宫武陵曰請以第一人處之郾謝已得其人至第五郾未得武陵曰不爾宜以賦見還新唐書吳武陵傳集東野吃吃說足下不離口韓文栁惟深充江東路判官出巡其有非常之政裕於人者必舉其課績又以文采殷勤歌詠之俾其風謡頌聲聞于他部達于京師而後已栁丈栁渾行狀本朝唐楊敬之贈項斯詩曰幾度見詩詩盡好及觀標格過於詩平生不解藏人善到處相逢說項斯南部新書錢易撰勸善史子文無後何以勸善叔向社稷之臣也猶將十世宥之以勸能者並左蔽賢經臧文仲其竊位者與知栁下惠之賢而不與立也語子言無實不祥不祥之實蔽賢者當之孟史夫十室之邑必有忠信三人並行厥有我師今或闔郡至不薦一人是積行之君子壅於上聞也蔽賢蒙顯戮古之道也漢武紀何以知朝廷之衰人人自賢不務於通人故世陵夷西漢李尋傳通人謂薦逹賢才也杜宻曰劉勝知善不薦自同寒蟬東漢書唐彬當世英彦見彬莫不欽恱稱之於文帝帝問孔顥顥忌其能良久不答陳騫曰彬為人勝騫甚逺帝辟彬為屬他日謂孔顥曰近見唐彬卿受蔽賢之責矣晉書集好蔽賢而嫉妬楚辭知善不言與嚚瘖同栁文序嫉妬經人之有技冐疾以惡之人之彦聖而違之俾不達書子愚者好專事而妬賢能抑有功而濟有罪士有妬友則賢交不親君有妬臣則賢人不至小人不能則嫉妬怨誹以傾覆人害良曰賊隱良者謂之嫉並荀日月欲明浮雲蔽之藂蘭欲茂秋風敗之文中子史屈原入則與王圖議國事以出號令出則接遇賔客應對諸侯王甚厚之上官大夫與之同列爭寵而害其能王使屈原為憲令屬草藁未定上官大夫見而欲奪之不與因讒之藺相如為上卿在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且素賤人吾羞不忍為之下宣言曰我見必辱之韓非使秦王未之信用李斯姚賈害毁之王以為然下吏治非李斯使人遺非藥自殺並史記本傳妬賢嫉能有功者害之賢者疑之史記漢高紀天子議以賈生為公卿絳灌馮敬之屬盡害之乃短賈生曰洛陽之人年少初學專欲擅權紛亂諸事於是天子䟽之不用其議史記本傳翟方進舉明經遷議郎時宿儒有胡常與方進同經名譽出方進下乃心害其能論議不右方進西漢本傳公孫為人意忌史記本傳女無美惡入宫見妬士無賢不肖入朝見嫉西漢鄒陽傳初孫臏與龎涓俱學兵法涓自以能不及臏乃以法斷其兩足而黥之欲使終身廢棄周紀有妬􅎱之心西漢五行志王式為博士諸大夫博士共持酒肉勞式皆注意高仰之博士江公世為魯詩宗心嫉式謂歌吹諸生曰歌驪駒式曰聞之於師客歌驪駒主人歌客無庸歸今日諸生為主人日尚早未可也江公曰經何以言之式曰出曲禮江公曰何拘曲也式恥之陽醉逿墬古地字式客罷讓諸生曰我本不欲來諸生彊勸我竟為豎子所辱西漢王式傳董仲舒言道徳見妬於公孫李廣奮節於匈奴見排於衛青東漢馮衍傳唐彬當世英彥見彬莫不欽恱稱之於文帝文帝問孔顥顥忌其能良久不答陳騫曰彬為人勝騫逺甚帝辟彬為屬他日謂孔顥曰近見唐彬卿受蔽賢之責矣晉書燕封裕曰已無骨鯁嫉人有之晉紀外似柔謹内實忌克梁高祖孔頴達老師宿儒恥出其下隂遣客刺之隋書本傳李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而隂陷之世謂李林甫口有蜜腹有劒唐書傳記馬融筭渾天不合召鄭𤣥令一筭便決及𤣥歸融心忌焉𤣥亦疑有追者乃坐橋下在水上據屣融果欲追之左右曰𤣥亦疑下土下水上據木此必死矣遂罷追語林天寳初帝顧林甫曰嚴挺之安在其材可用林甫退召其弟損之與道舊諄復欵曲且許美官因曰天子視絳州挺之也厚要當以事自解歸得見上且大用因紿挺之使稱疾願就醫京師林甫已得奏即言挺之春秋高有疾幸閒官得就養唐書嚴挺之傳盧把居相忌能妬善小不附者必致之於死惡顏真卿之直言令奉使李希烈竟殁於賊唐書本傳集世溷濁而嫉妬衆僉諧以妬賢孤聖特而易傷並楚辭人惡俊異俗疵文雅斵善害能醜正惡直肆其噤害則皆妬之徒也妨功害能之臣盡為萬户侯並選文靜思屈原沈逺憶賈誼貶椒蘭爭妬忌絳灌共讒諂妬腸務生敵忌者畏人修事修而謗興徳高而毁來並韓集來時畏有他人上截斷龍胡斬鵬翼元稹集權臣妬逸才心如斗筲窄文粹讒譖經誣善之人其辭游易讒說殄行起信險膚協比讒言並書萋兮斐兮成是貝錦彼譖人者亦已大甚哆兮侈兮成是南箕箋云箕星舌廣彼譖人者誰適與謀緝緝翩翩謀欲譖人捷捷幡幡謀欲譖言取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊營營青蠅止于樊豈弟君子無信讒言注蠅之為蟲汚白使黒汚黒使白喻佞人變亂善惡也營營青蠅止于棘讒人㒺極交亂四國盜言孔甘亂是用餤無罪無辜讒口囂囂並詩浸潤之譖膚受之愬語子傷良曰讒荀摇唇鼔舌擅生是非莊墨子所以悲絲楊朱所以泣岐路以其變為青黄迥為左右也點素為緇並劉讒妬之人必好聞人惡惡聞人善讒邪之蔽善人也猶朝日洞明霧甚則不見天沙石至淨流濁則不見地雖有明淨之質而不發明霧水蔽之也並劉賓客昔直不疑未嘗有兄而讒者謂之盜嫂第五倫三娶孤女而世人云笞婦翁此聽虛而責響悖情倒理罔之甚也劉傷讒史猶有内讒毁信廢忠崇飾惡言靖譖庸囘服讒蒐慝以誣盛徳謂之窮奇並左若衆口之鑠金國語言之太甘其中必苦譖在中矣國語晉吳太宰嚭既與子胥有隙因譖曰子胥為人剛暴少恩今不見用常鞅鞅怨望吳王乃使使賜子胥屬鏤之劒以死史記本傳屈原為憲令上官大夫見而欲奪之不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而䟽屈平史記屈平傳積毁銷骨史記張儀傳范雎謬曰秦安得王秦獨有太后穰侯耳臣居山東時齊知有孟嘗君不聞有王聞秦有太后穰侯不聞有王大其都者危其國尊其臣者卑其主今自百秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝周紀田蚡曰魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而心謗不仰視天而俯畫地睥睨兩宫幸天下有變而欲有功史記灌夫傳絳灌讒陳平曰平雖美丈夫如冠玉耳其中未必有也居家盜其嫂今大王令護軍受諸將金漢文紀張湯曰嚴助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市漢武紀孔墨之辯不能免於讒䛕西漢鄒陽傳師丹使吏書奏吏書冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄漢成紀讒言蠶生西漢中山王傳馬援在交趾嘗以薏苡實能輕身省慾以勝瘴氣援欲以為種軍還載之一車時人以為南土珍怪卒後有人上書譖之者以為前所還載皆明珠文犀東漢本傳邪徑敗良田讒言敗善人荀恱漢紀周公大聖而四國流言樂毅王佐而被謗騎刼巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之晉書𤣥宗曰是子妬賢嫉能舉無比者新唐書李林甫傳傳記三人成虎十人撓椎衆口所移毋翼而飛戰國策衆口鑠金俗說有美金衆人咸共詆訾言其不純賣金者欲其售因取鍜以見真偽此為衆口鑠金風俗衆口所毁浮石沈木陸賈集䲭鴞鳴衡軛豺狼當路衢蒼蠅間白黑讒巧令親䟽曹子建贈白馬王彪詩飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳晉傅𤣥飛塵篇積毁銷金積讒磨骨江文通書飛金沈羽蔣子萬機論欲搆南箕成貝錦文選青蠅一相點白璧遂成冤羣誣成罪聖人不能救並陳子昂集讒口到骨杜甫祭房相文黄金銷衆口白璧竟難投白璧何辜青蠅屢前羣輕折軸下沈黄泉衆毛飛骨上凌青天萋斐暗成貝錦粲然泥沙聚埃珠玉不鮮交亂四國播于八埏拾塵掇蜂疑聖猜賢擢髪數罪罪乃孔多傾海流奔惡無以過積毁銷金沈憂作歌並李太白集有道士言人皆有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏睡出䜛于帝以求饗以是人多謫過疾癘夭死栁文罵尸蟲側肩帖耳有舌如刀韓文喑嚙堪銷骨潛飛有禍胎蚊蚋與利嘴枳棘與鋒鋩巧隨清影觸處行好學春鶯百般囀讒譖消骨髓並元稹集巧言構人罪至死人不疑如有膚受譖久則瘡痏成並白侍郎蒼蠅難袪貝錦方織好丹非素變白成黑李義山白璧衆求瑕素絲易成汚韋應物人或罹譖比肩狐疑借有解紛毁輒隨之劉賓客蒼蠅點垂棘巧舌成錦綺盧仝常恐衆毁至春葉成秋黄孟東野微瑕懼掩瑜温飛卿能用傾巧之智構成疑似之端李深之鑠肉銷骨皇甫湜每被銷於㕳初因起毫髪漸可離骨肉嘉木忌深蠧哲人悲巧誣並唐文粹本朝自從蒙衆說日月遭蔽虧歐公詩積毁銷骨巧言鑠金市虎成於三人投杼起於屢至東坡文天螻伏隙録人語射工含沙須影過黄魯直詩止棘之詩垂之六經宜乎以爾刺讒人之亂國誠可嫉而可憎歐陽公蒼蠅賦樂善經人之有技若已有之人之彦聖其心好之不啻如自其口出書衛文公臣子多好善愛莫助之好賢如緇衣彰人之善美人之功推賢而進逹之不望其報並記君子成人之美見善如不及並語子樂善不倦得天下英才而教育之三樂也並孟史晉叔向適鄭鄭鬷蔑立於堂下一言而善叔向下執其手以上曰子若無言吾幾失子矣左鮑叔既進管仲以身下之史記鄭當時推轂士及官屬丞吏常引以為賢於己聞人之善言進之上惟恐後諸公以此翕然稱鄭莊前漢本傳何武為人好奬人之善為内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也漢武帝讀相如賦而善之曰朕不得與此人同時哉並同上聞人之善若出諸口言有可采必演而成之薦逹賢士多所奬進知而未言以為己過孔融傳天下之寳故為天下所惜王坦之荅謝安書好賢樂善情如饑渇通鑑楊敬之推愛項斯為詩所至稱之唐書本傳荀文若之進善不進不休通鑑集田文之愛士鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉扺掌嵇叔夜絶交書片善經心揖虞宣於蔡席一言合道接然明於鄭階片善必甄揖虞翻於東箭一言可紀許顧榮以南金並駱賔王集執事好賢樂善孜孜以薦進良士為己任方今天下一人而已韓愈與陸員外書一字愜心金玉不顧片言合趣布褐無間吕和叔文本朝文忠公見子瞻書語聖俞曰老夫當避此人放出一頭地蘇子由集歐陽文忠公喜士為天下第一冷齋夜話冦萊公聞一善薦𨗳推輓不進用不已五朝言行録服善子孔子見老耼出以告顏囘曰丘之於道其猶醯雞歟微夫子之發吾覆也吾不知天地之大全也莊項槖年七歳為孔子師孔子有以聽其言也淮南史見有禮於其君者事之如孝子之養父母也自今請雖吾家聽子而行並左韓信募生得廣武君者有縛致麾下信解其縛東鄉坐師事之西漢信傳漢文帝曰吾久不見賈生自以為過之今不及也西漢本傳上曰吾久不見班生今日復聞讜言漢成紀魏徵曰文宣狂暴然人與之爭事理屈則從之唐太宗上說曰理到之語不得不服朕以私愛忘公議曏者之忿自謂不疑及聞徵言方知理屈同上杜淹對太宗曰天下之務當盡至公善則從之徳彛所言直得大體臣誠心服不敢遂非唐太紀蕭至忠素有雅望嘗自公主第門出遇宋璟璟曰非所望於蕭君也至忠笑曰善乎宋生之言遽策馬而去唐𤣥宗蘇廷碩為中書舍人李嶠曰舍人思若湧泉吾所不及唐書本傳傳記李相讀春秋誤以叔孫婼勅畧反呼為勅晷有小吏曰某縁師受誤呼文字今聞相公呼婼為姼方悟之耳公曰不然因檢釋韻果勅畧反公大慚號小吏為一字師摭言集僕嘗好人譏彈其文有不善者應時改定文集選生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎韓文衆口貪歸美何顔敢妬姝元微之集本朝温公退居洛陽每論當世人物必曰吕獻可之先見范景仁之勇决皆予所不及心誠服之劉諌議集蔡天申得温公撰吕獻可墓銘以獻王安石天申初欲中温公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見録昔吾舉進士試於禮部歐陽文忠公見吾文曰此我輩人也吾當避之東坡文竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經効於世間不必皆從於已出東坡進陸贄奏議不服善史藺相如為上卿位在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且賤人吾羞不忍為之下宣言曰我見必辱之史記本傳揚雄著太𤣥劉歆觀之曰吾恐後人用覆醬瓿也西漢本傳孔頴逹議論為冠又年最少老師宿儒恥出其下隋書本傳傳記揚雄作太𤣥造法言張伯松不肯一觀論衡疾惡經噬膚滅鼻无咎易除惡務本狃于姦宄敗常亂俗三細不宥報虐以威遏絶苗民無世在下並書夫也不良人而無禮胡不遄死取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊並詩公家不畜刑人大夫弗養士遇之途弗與言也屛之四方唯其所之屏之逺方終身不齒惡惡如巷伯並記子曰非吾徒也小子鳴鼓而攻之可也惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者見不善如探湯並語子孔子謂子路曰見長者不能黜其色見幼者不能盡其辭雖有疾風暴雨吾不入門矣家語立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟姦人之雄聖主所以先誅荀為不善乎幽闇之中者鬼得而誅之莊草茅不去則害禾稼盜賊弗誅則傷良民管明法梟鳴出聲人皆惡之魯連墨子非樂不入朝歌蝮蛇不可為足虎豹不使縁木並淮南史祭仲曰不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎周任有言曰見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣石祈子曰天下之惡一也惡於宋而保於我保之何補不如殺之無聚慝焉除君之惡惟力是梘季文子曰見無禮於其君者誅之如鷹鸇之逐鳥雀也投諸四裔以禦魑魅右師為已短策茍過華臣之門必騁鄭然明曰見不仁者誅之如鷹鸇之逐鳥雀也子產曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎春秋書齊豹曰盜三叛人名以懲不義不令之臣天下之所惡也去疾莫如盡以上並左傳君子惡惡疾其始榖梁五子貢不能匿人之過史記肥義曰姦臣在朝國之殘也䜛臣在中主之蠧也史趙世家舜有四放之罰而孔子有兩觀之誅漢劉向傳面折不能容人之過漢武紀灌夫潁川人宗族豪横潁川謡曰潁水濁灌氏族西漢本傳里名勝母曽子不入邑號朝歌墨子囘車西漢鄒陽傳注曽子至孝以勝母之名不順故不入紂作朝歌之音不時也朱雲欲以上方斬馬劒斷佞臣頭西漢本傳車如雞栖馬如狗疾惡如風朱伯厚東漢朱震傳越楚之竹不足以書其惡東漢隗囂傳張綱分行州郡埋其車輪於雒陽都亭曰豺狼當道安問狐狸東漢本傳清心忌惡范滂張儉東漢黨錮序王允剛稜疾惡東漢本傳范滂曰臣之所舉自非叨穢姦暴深為害民豈以汙簡札哉漢桓紀農夫去草嘉穀必茂忠臣除姦王道以清同上李膺復拜司𨽻校尉時小黄門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付洛陽獄受辭畢即殺之漢紀宗資以范滂為功曹滂尤剛勁疾惡如讐漢桓紀太原太守劉瓆南陽太守成瑨志除姦邪其所誅剪皆合人望漢靈紀陽球見帝曰臣無清高之行横蒙鷹犬之任前雖誅王甫段熲葢狐狸小醜未足宣示天下願假臣一月必令豺狼䲭梟各服其辜同上荀公逹之去惡不去不止荀攸祖逖牙門童建殺新蔡内史童宻降于後趙勒斷之曰逃吏吾之深仇將軍之惡猶吾惡也逖深徳之通鑑晉傅𤣥每有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴游懾伏臺閣生風晉書𤣥傳疾惡如仇同上葅筋醢骨抽舌探肝南史侯景傳罄南山之竹書罪無窮决東海之波流惡難盡隋恭紀惡木垂䕃志士不息盜泉飛溢廉夫不飲唐后妃傳王義方乞誅姦臣於白日唐書天后時酷吏放歸草澤終身不齒唐𤣥宗熊執易疏論裴延齡相以示歸登登動色曰願竄吾名雷霆之下君難獨處唐歸登傳䞇上言裴延齡妄誕小人用之交駭物聽唐徳宗徳宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壊之唐書陽城傳元稹倚宦官知制誥武元衡厭鄙之食𤓰蠅集其上元衡揮以扇曰適從何處來遽集於此唐書武元衡傳傳記水名盜泉仲尼不漱語撰考䜟耳聞所惡不如無聞目見所惡不如無見吕氏春秋盧奐累任大郡凡治姦惡既斷罪又以所犯刻石竪其門時謂記惡碑王元祐開元天寳遺事鍾離意曰孔子忍渴於盜泉之水曾參囘車於勝母之閭惡其名也東漢紀集要領不足以膏蕭斧名字不足以汙簡墨陳琳檄鷹揚虎視肅清違慢傅咸中丞箴剛腸疾惡山巨源絶交書簡上霜飛筆端風起崔彖御史箴董卓稱亂徒藉羣雄之手王莽偷安卒成光武之業故市耀臍燈府傳飲器梁任孝恭檄文𢎞量不以容非文選王文憲集序渴不飲盜泉水熱不息惡木隂猛虎行疾惡懐剛腸杜詩人其人火其書廬其居韓原道守正為心疾邪不懼栁文魯司冦三日之間戮正卯於兩觀之下漢司𨽻一旬之内取張朔於合柱之中李義山文聞惡若已讐栁文暴虐得於天生憸悍著於心中扺冐刑憲縱盜胷臆法所惡者爾皆為之白晝九衢指憎萬手杜牧之膚革既平雖疥癬而必去豺狼已斃在狐鼠而宜除栁文本朝常情共惡人將不食其餘歐公集世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣東坡書唐六家書後聊借舊史誅姦強雖無尺箠當寸刃口吻排擊含風霜並東坡詩有刀難割公閭腹無木可梟元海頭邵堯夫詩懲惡經怙終賊刑降霍叔于庶人三年不齒三細不宥並書史裴豹𨽻也著於丹書左懸頭槀街西漢陳湯傳集聲其惡於天下也栁文辯侵伐論黨惡經為天下逋逃主萃淵藪書教猱升木詩子是輔桀也孟史助桀為虐西漢張良傳日夜縱臾西漢衡山王傳假賊兵為虎翼者也西漢賈誼傳養稂莠者傷禾稼惠姦宄者殘良民後漢王符傳見非不舉聞惡不察漢殤紀是為虎傅翼也通鑑三國魏史傳記籍賊兵而齎盜食者也戰國䇿本朝蘇舜欽監奏院因十月賽神㑹館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同坐者皆坐斥劉謂時相賈昌朝曰與公一網打盡張師正倦游録同惡經莫赤匪狐莫黑匪烏注君臣相承為惡如一詩衛君無道夫人無徳詩序相覿以貨相賂以利記史同惡相求如市賈焉左凶徳參㑹西漢灌夫等贊招呼元惡以自營衛專為羣逆主萃淵藪東漢孔融傳傳記豹則虎之弟鷹則鷂之兄古樂府掩惡史為賢者諱也穀梁孔子曰臣子不可以言君親之惡為諱者禮也史巫馬期傳大臣有坐不廉者不曰不廉曰簠簋不飭坐汙穢淫亂者不曰汙穢曰帷簿不修坐罷軟不勝任者不謂罷軟曰下官不職西漢賈誼傳張安世為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不翻水漿耶如何以小過成罪郎淫官婢婢兄自言安世曰奴誣汙衣冠其隱人過失皆類此西漢本傳丙吉為丞相於官屬掾吏務掩過揚善同上戴聖九江守行治多不法何武為刺史廉得其罪聖懼自免後為博士毁武於朝廷武聞之終不揚其惡西漢何武傳傳記忠臣令誹在己譽在上宋君奪民時以為臺而民非之無忠臣以掩葢之也子罕執朴為司空民非子罕而善其君桓公宫中七市女閭七百國人非之管仲為三歸之臺以掩桓公之非戰國䇿揚惡子言人之不善當如後患何孟史欲摘觖以揚我惡西漢孫寳傳觖謂挑發之也訐揚幽昧之過西漢趙后傳集好蔽美而稱惡楚辭不遷怒經罰弗及嗣書顏囘不遷怒語子罪人不孥孟史敵怨不在後嗣忠之道也左集不遷怒以臨下文選書遷怒史大旱公欲焚巫尩當其時不能治也後之人何罪室於怒市於色並左司徒期作亂攻衛侯出適城鉏曰期則為此令茍有怨於夫人者報之夫人期姊期聘於越公攻而奪之幣期告王王命取之公怒殺期之甥之為太子者注忿期而及其姊為夫人者遂及夫人子左信襲破齊歴下軍遂至臨淄齊王以酈生為賣已乃烹之漢高紀趙王倫怒解系曰我於水中見蟹尚惡之况此人兄弟輕我耶此而可忍孰不可忍遂害之晉書苻堅聞桓温廢立謂羣臣曰温前敗灞上後敗枋頭不能思愆自貶方便更廢君以自説諺曰怒其室而作色於其市其温之謂矣晉簡文紀李振屢舉進士竟不中第故深疾縉紳之士言於全忠曰此輩常自謂清流宜投之黄河使為濁流唐昭宗傳記太公曰不愛人者盡其胥餘胥餘里落之壁也尚書大傳大戰篇遷怒所至毁及高曾史通憎其人者惡其餘胥説苑立則篇晉新安王遵曰我聞人姓木邊便欲殺之况諸桓乎晉中興書本朝怒移水中蟹坡詩記纂淵海卷五十
