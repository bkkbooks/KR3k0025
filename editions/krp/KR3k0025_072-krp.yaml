body:
  text: 記纂淵海卷七十二宋潘自牧撰人事部波潤經澤潤生民四夷左衽罔不咸賴書膏潤天下詩序芃芃黍苖隂雨膏之詩經子松柏茂而隂成於林塗之人䕃矣子華子一本人字下有則字膏澤下於民孟子河潤千里澤及三族莊子玉在山而木潤淵藏珠而崖不枯荀子澤及百里而潤草木者唯江河也揚子史葛藟猶能庇其本根左傳若江海之浸膏澤之潤左傳序晉公子重耳曰其波及晉國者君之餘也左傳潤於千里公羊管仲光燭隣國史記魯仲連傳一人有子三人緩帶榖梁文十八沐浴膏澤史記樂書取尊官厚禄以為宗族交遊光寵西漢司馬遷傳天地之間被潤澤而大豐美西漢董仲舒策河潤千里京師蒙福後漢郭伋傳張讓父死歸𦵏潁川雖一郡畢至而名士無往者讓甚耻之陳寔獨弔焉及誅黨人讓以寔故多所全宥通鑑漢靈紀互入先見南燕汝水竭河凍皆合而澠水不冰李宣曰澠水無冰良由逼帶京城近日月也通鑑晉安紀殘膏賸馥沾丐後人多矣唐書杜甫傳集石韞玉而山輝水懐珠而川媚晉陸士衡賦桑梓有餘暉王仲宣從軍詩濡沫窮鱗栁文餘波徳照隣老杜詩筆端膚寸澤及九垓劉賔客百川承少海之潤劉賔客垂䕃萬畆懸映九霄駱賔王光榮照四隣白侍郎風煙借顔色雨露助恩光白樂天一士登甲科九族光彩新王建詩接楚地之餘波仰晉國之膏雨李義山文草木蒙雨露之澤皆被鮮輝煙霞照日月之光盡成綵繪李文饒鄰斗極之光輝邇天漢之波潤唐文粹一人在朝百人緩帶一人貴而親友皆榮之也唐文本朝夫玉韞石而珠藏淵其光氣常見於外也故山輝如白虹水變而五色歐文公之在内自泉流瀕其在四方自葉流根金錫圭璧之所在瓦石草木被其光澤餘膏所燭常分無盡之光蒙霧而行坐獲不知之潤並東坡集桃李終不言朝露借恩光山谷僥倖經小人行險以僥倖記中庸㒺之生也幸而免語子千金之珠在九重之淵驪龍頷下子能得者必遭其睡也列子料虎頭編虎鬚幾不免虎口哉莊子宋王而寤子為虀粉莊天下若逐野獸而皆有分肉之心太公武韜以百誕成一信佐祭者得嘗並淮南子魏田父得玉徑尺以告鄰人隣人詐之曰此怪石也蓄之非利其家田父猶豫以歸置於廡下其玉明照一室大怪遽棄之於野隣人取之以獻魏王魏王召玉工相之曰此無價寳魏王賜獻玉者千金長食上大夫禄尹文子史孔子曰賜不幸言而中是使賜多言也左定十五年叔孫通曰我幾不脱於虎口史本傳郭解適有天幸窘急常得脱若遇赦史游俠傳龎涓曰遂成䜿子之名史記楚葉公子髙曰以險徼倖者其求無饜左哀十六無徳而富貴謂之不幸漢書據徼乘邪以求一日之富貴班固叙傳為惡未始不及於凶幸而免者亦時有焉唐武后賛唐昌儀為洛陽令請囑無不從嘗早朝有選人姓薛以金五十兩并狀邀其馬而賂之昌儀受金至朝堂以狀授天官侍郎張錫數日錫失其狀以問昌儀昌儀罵曰不了事人我亦不記但姓薛者即與之錫懼僥倖退索在銓姓薛者六十餘人悉留注官通鑑唐武后竈下養中郎將爛羊胃騎都尉爛羊頭關内侯東漢劉𤣥宋張瓌以百口一擲出手得盧通鑑宋紀傳記桓温伐蜀敗於笮橋衆懼欲鳴退鼓吏誤鳴進鼓於是攻之李勢大潰乃以衆降孔氏雜記集出萬有一危之塗以為娛司馬長卿諌獵書本朝庶幾徼倖不種而獲偶然連六鼇便為此手妙治病不知其所當用之藥而百藥皆試以僥倖於一物之中譬如匠慶之山而得成簴豈可常也哉東坡觸類經引而伸之觸類而長之天下之能事畢矣易刑于寡妻至於兄弟以御於家邦詩愛親者不敢惡於人敬親者不敢慢於人資於事父以事母而愛同資於事父以事君而敬同孝經貴老為其近於親也記子貢曰回也聞一以知十賜也聞一以知二論語子老吾老以及人之老㓜吾㓜以及人之㓜人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也人能充無受爾汝之實無所往而不為義也推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣孟子通於一而萬事畢莊子見瓶中之氷而知天下之寒淮南子兵畧見窾木浮而知為舟見飛蓬轉而知為車見鳥跡而知著書以類取之淮南子史求忠臣必於孝子之門通鑑漢武帝推㣲達著尋端究緒履霜知冰踐露知暑蔡邕傳釋誨見瓶水凍而知天下之寒嘗肉一臠而識鑊中之味物有其類可推而釋北史崔浩傳傳記覩一字於句中反三隅於字外史通集求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賔客互見因小見大本朝放麛違命也而推其仁則可以託國食子狥君也而推其不仁則至於殺君欒城集持久經聖人久於其道而天下化成易誰夙知而暮成詩悠久所以成物也中庸子曰善人為邦百年亦可以勝殘去殺矣子曰茍有用我者期月而已可也三年有成子曰無欲速欲速則不達論語子大器晩成老子美成在久真積力久荀子史天地之功不可倉卒艱難之業當累日也東漢朱浮論大才當晚成東漢馬援傳非若京房劉邵之法校其米鹽之課責其旦夕之効也通鑑魏明紀慕容農謂慕容垂曰取果於未熟與自落不過旬日之間然其難易美惡相去逺矣通鑑晉紀互見間不容髪盧懐慎曰子産賢者也為政累年而後成唐書崔周度曰魯詩書之國自伯禽以來不能伯諸侯然以禮義守之可以長世通鑑周太祖集嘉榖不夏熟大器當晚成干將百煉其良可用和璞三獻而其寳乃真歐陽詹養材三十年方成棟梁姿白侍郎本朝東坡試中制科英宗便欲授知制誥相國韓公曰蘇軾之才逺大之器也他日自當為天下用要在朝廷培養之使天下莫不歸慕降伏皆欲朝廷進用然後取而用之則人人無復異辭矣李薦談記怱遽史相見日淺卒卒無須㬰之間西漢司馬遷傳事薄遽注薄廹也遽速也西漢嚴助傳王彪之謂殷浩曰奈何無故怱怱先自猖蹶通鑑晉穆紀傳記匆州里所建旗所以趣民故遽稱怱怱説文世稱匆匆不知所由據説文匆者州里之旗所以趣民事故怱遽者稱為匆匆北齊顔氏家訓躐等子位卑而言髙罪也孟子位卑而圖大孔叢子史猶未能操刀而使割也譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左傳以匹夫徒歩之人而超九卿之位非所以重國家而尊社稷也西漢朱雲傳集陵邁超越不拘資次于令升晉總論乘間經心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣禮記史羣小窺見間隙縁飾文字巧言醜詆流言飛文譁於民間通鑑漢文紀間隙一開則邪人動心後漢互見嫌隙百家衆氏投間而作後漢延篤傳上初踈外宦官親任朝士而張渉以儒學入侍薛邕以文雅登朝繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹濁亂天下豈非欺罔耶於是上心始疑不知所以倚仗矣通鑑唐徳宗紀妖禽孽狐當晝則伏自如得夜乃為之祥唐封倫賛集白鶴未輕舉衆鳥争浮沉孟東野本朝譬如深淵大澤龍亡而虎逝則變怪雜出舞鰌鱓而號狐狸東坡集物必先腐也而後蟲生之人必先疑也而後讒入之東坡文首亂經無拳無勇職為亂階誰生厲階至今為梗詩史晉國有命始禍者死左定十三秦失其政陳渉發迹諸侯作難風起雲蒸天下之禍自渉發難太史公自序奮臂為天下倡始西漢張耳傳楚首事西漢陳勝傳公孫𢎞曰主父偃本首惡陛下不誅偃無以謝天下通鑑漢武紀戰國一百三十六載劉元海為之禍首元海自晉惠帝時稱漢見晉書表章署用輙使首名附下罔上奸以事君東漢孔融傳當為誅始選内史表吳楚唱謀選六代論蒙蔽附壅遏子兩葉蔽目不見泰山兩豆塞耳不聞雷霆鶡冠子史上下相蒙左僖二十四年屏王之耳目使不聰明左昭二十年章邯使長史欣請事咸陽留司馬門三日趙髙不見史記項羽紀郎中令趙髙恃恩專恣以私怨誅殺人衆恐大臣入朝奏事言之乃説二世曰天子所以貴者但以聲聞羣臣莫得見面故也且陛下富於春秋未必盡通諸事今不如深拱禁中與臣及侍中習法者侍事事來有以揆之如此則大臣不敢奏疑事李斯就獄乃從獄中上書書上趙髙使吏棄去不奏曰囚安得上書髙皆妄為反辭以相傅㑹通鑑秦紀壅閼不得聞西漢中山靖王傳壅於上聞西漢武帝紀髙門去省户數十歩求見出入二年未省欲使海瀕仄陋自通逺矣西漢鮑宣傳虗美熏心實禍蔽塞漢書鄱陽王範宻啟侯景謀反時上以邊事專委朱异動靜皆關之异以為必無此理通鑑梁髙祖紀楊義臣破降河北賊數十萬上曰我初不聞賊頓如此義臣破降何多也虞世基對曰小竊雖多未足為慮侍御史韋雲起劾奏世基及裴藴四方告變不即奏聞賊數實多裁减言少通鑑隋煬帝紀上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對策斥言其姦惡建言舉人多卑賤愚瞶恐有俚言汚濁聖聽乃令郡縣長官精加試練灼然超絶者具名送省委尚書覆試上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然上過便橋老父郭從謹進言曰闕門之外陛下皆不得而知九重嚴邃區區之心無路上達事不至此臣何由得覩陛下之面而訴之乎通鑑唐𤣥宗紀元載專權恐奏事者攻訐其私乃請百官凡論事皆先白長官長官白宰相然後奏聞顔真卿上䟽以為論事者先白宰相是自掩其耳目也太宗署司門式云其無門籍人有急奏者皆令門司與仗家引奏無得關礙所以防壅閉也天寳以後李林甫為相深疾言者道路以目上意不下逮下情不上達蒙蔽喑嗚卒成幸蜀之禍陵夷至于今日其所從來者漸矣通鑑唐代宗紀軒陛之間且未得諭宇宙之廣何由自通通鑑唐穆宗紀鮮于仲通討南詔大敗士卒死者六萬人仲通僅以身免楊國忠掩其敗狀乃叙其戰功李宓擊南詔被擒全軍皆沒國忠隠其敗更以捷聞舊唐書昧離婁之目則天地四方之位不分充子野之耳則雷霆蒼蠅之聲莫辨房𤣥齡奏議以百口百心之讒諂蔽兩耳兩目之聰明唐𤣥宗讃有言朱泚為亂兵所立盧杞切齒曰朱泚忠直羣臣莫及臣請以百口保其不反帝以為然泚自將逼奉天舊唐書魏徴曰秦二世隠藏其身以信趙髙天下潜叛而不得聞梁武信朱异侯景向闕而不得聞隋煬帝信虞世基賊徧天下而不得聞故曰君能兼聽則姦人不壅蔽而下情通矣新唐書本傳裴度曰天顔不咫尺此尚未能决千里單言可悟聖聽哉唐書本傳集蔽晦君之聰明兮虗惑誤又以欺浮雲陳而蔽晦兮使日月之無光楚辭間諜子用間有五有因間有内間有反間有死間有生間孫子史昌他亡西周之東周盡輸西周之情西周大怒馮旦曰臣能殺之君與金三十斤馮旦使人操金與書間遺昌他曰事可成勉成之不可成亟亡事久且泄毋令身死東周立殺昌他戰國策項王與范増急圍滎陽漢王患之乃用陳平計間項王項王使者來為太牢具欲進之見使者佯驚愕曰吾以為亞父使者乃項王使者更持去以惡食食項王使者使者歸報項王項王乃疑范増與漢有私稍奪之權史記項羽紀互入反鋒而用漢王與陳平金四萬斤以間踈楚君臣史記漢髙紀秦穆公問内史廖曰由余賢戎人寡人之害奈何廖曰戎王處辟匿未聞中國之聲君試遺其女樂為由余請以䟽其間留而莫遣以失其期戎王怪之必疑由余君臣有隙乃可虜也穆公以女樂二八遺戎王戎王受而悦之終年不還於是秦乃歸由余由余數諫不聽穆公又數使間要由余遂去降秦史記秦紀秦攻趙趙亷頗堅壁以待秦數挑戰趙兵不出趙王數讓頗秦相使人行千金趙為反間曰秦之所惡獨懼馬服君子趙括將耳亷頗易與且降矣趙王怒頗不戰又聞反間之言因使趙括代亷頗括敗卒四十萬人降武安君史白起傳魏公子無忌威振天下秦王患之行金毁公子於魏王曰諸將徒聞魏公子不聞魏王公子亦欲因此時定南面而王數使反間偽賀公子得立為魏王未也魏王自聞其毀不能不信後果使人代公子將史本傳燕惠王自為太子時嘗不樂於樂毅齊將田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早㧞者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患惟恐他將之來惠王已疑樂毅得齊反間乃使騎刼代將史樂毅傳趙李牧大破秦軍秦多與趙王寵臣郭開金為反間言李牧欲反趙乃使顔聚代牧捕斬之史本傳分謗史韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以狥告其僕曰吾以分謗也左成三年宋城謳者曰澤門之晢實興我役邑中之黔實慰我心子罕聞之親執扑以行築者而抶其不勉者乃止左傳分謗生民宣十二年韓厥曰事之不捷惡有所分與其專罪六人同之不猶愈乎左傳毋令獨蒙惡聲史記蘇秦傳賛見辨白陳寔為功曹掾中常侍侯覽託太守髙倫用吏倫教署為文學掾寔知非其人懐檄請見曰此人不宜用而侯常侍不可違寔乞從外署倫從之鄉論怪其非舉倫後為人言曰吾前為侯常侍用吏陳君宻持教還而於外白署比聞議者以此少之咎由故人畏憚彊禦陳君可謂過則稱己者也寔故自引愆聞者方歎息東漢本傳互見事久論定傳記忠臣令誹在已譽在上宋君奪民時以為臺而民非之無忠臣以掩盖之也子罕執扑為司空民非子罕而善其君齊桓公宫中七市女閭七百國人非之管仲為三歸之家以掩桓公之非自傷於民也春秋記臣弑君皆大臣之見譽者也大臣得譽非國家之美戰國策本朝妖尼為鬼所憑言事或騐士庶輻湊事之後以傳習妖教下獄詔差官按之得諸公書自韓曽之下皆有之文潞公獨無上問其故公曰臣但不知耳知之亦當有書時人美其分謗温公日録晏元獻公曰臣非不樂宴遊者若有錢亦須往但無錢不能出耳筆談推惡經季氏將伐顓臾冉有季路見於孔子曰季氏將有事於顓臾孔子曰求無乃爾是過與夫顓叟昔者先王以為東蒙主且在邦域之中矣是社稷之臣也何以伐為冉有曰夫子欲之吾二臣者皆不欲也論語子人死則曰非我也歳也是何異於刺人而殺之曰非我也兵也孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣凶年饑歳子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也孟子史公孫敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于馬兵以備漢軍故臣無所得上於是族陵家通鑑漢武紀又嫁禍桓温伐燕不利温深耻䘮敗乃歸罪於真奏免真為庶人通鑑晉海西公紀解紛子梁鱣年三十未有子欲出其妻商瞿曰吾恐子自晩生耳未必妻之過從之二年而有子家語今有同室之人鬬者救之雖被髪纓冠而往救之可也猶解倒懸也孟子解其紛老子昔市南宜僚弄丸而兩家之難解莊子史如熱之有濯也濯以救熱何患之有左襄三十一年談言㣲中亦可以解紛史滑稽傳魯仲連曰所貴乎天下之士者為人排難解紛史本傳里婦亡肉姑以為盗姑逐之婦所善里母曰我令而家追女矣即束緼請火於亡肉家曰昨暮夜犬爭肉相殺請火治之亡肉家遽追呼其婦西漢蒯通傳上曰先帝置孟舒雲中十餘年虜常一入孟舒不能堅守無故士卒戰死數百人田叔曰孟舒知士卒敝不忍出言士卒爭臨城死敵如子為父以故死者數百人孟舒豈敺之哉上覆召舒為雲中守本傳魯連辨言而退秦包胥單辭以存楚後漢崔駰傳黨事起賈彪謂同志曰吾不西行大難不解即入闗設方畧天子為之大赦袁崧後漢書謀解時紛三國名臣賛謝安為王國寳所讒孝武召桓伊飲讌安侍坐伊撫筝而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言安泣下沾衿乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色晉桓伊傳孫亮出西苑方食生梅使黄門至中藏取蜜漬梅蜜中有鼠屎召主藏吏吏叩頭亮問吏曰黄門從汝求蜜耶向求實不敢與黄門不服侍中刁𤣥張邠啟黄門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎裡燥亮大笑謂𤣥邠曰若久在蜜中中外當俱濕今裏燥必黄門所為黄門首服左右莫不驚悚吳歴互見致察帝詔允謂曰國書皆浩作否曰先帝紀及今紀臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作允竟得免北史髙允傳孫子答齊威王曰解雜亂紛糾者不控拳救鬬者不摶撠批亢擣虗形格勢禁則自為解耳通鑑周紀槐里令朱雲上書曰臣願賜尚方斬馬劍斬佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒御史將雲下雲攀殿檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已通鑑漢成紀互見忠鯁袁術遣將紀靈等攻𤣥徳求救於布布謂靈等曰𤣥徳布弟也為諸君所因故來救之布性不喜合鬬喜解鬬耳乃今軍候植㦸於管門布彎弓顧曰諸君觀布射㦸小枝中者當各解兵不中可留决鬬布即一發正中㦸支靈等皆驚言將軍天威也通鑑漢紀諸葛亮曰如何禁止孝直使不得少行其意漢獻帝紀應奉上䟽曰馮緄前討蠻荆均吉甫之功劉祐數臨督師有不吐茹之節李膺著威幽并遺愛度遼今三垂蠢動王旅未振乞原膺等以備不虞書奏乃悉免其刑久之李膺復拜司𨽻校尉漢桓帝紀孫權欲斬蘇飛甘寧為權言飛疇昔舊恩寧不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今為君置之獻帝紀初大司馬冏疑中書郎陸機為趙王倫擬禪詔収欲殺之大將軍穎為之辨理得免死因表為平原内史晉恵帝紀解鬬不可以不離唐徳宗紀辛京杲以私忿杖殺部曲有司奏京杲罪當死上將從之李忠臣進曰京杲當死久矣上問其故忠臣曰京杲諸兄弟皆戰死獨京杲至今尚存故以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類諸王傳議者言韓滉脩石頭城隂蓄異志上疑以問李泌泌退遂上章請以百口保滉妖僧李軟奴謀作亂其黨告之上命捕送内侍省推之李晟聞之遽仆於地曰晟族滅矣李泌問其故晟曰晟新罹謗毁中外有家人千餘若有一人在其黨中則兄亦不能救矣泌乃宻奏大獄一起所連引必多外間人情恟懼請出付臺推上從之朝廷之臣無連及者唐徳宗紀杜兼誣奏李藩於張建封之薨摇動軍情上大怒宻詔杜祐使殺之祐素重藩懐詔旬日不忍發因引藩出詔示藩藩神色不變祐曰君慎勿出口吾已宻論用百口保君矣召藩詣長安上見藩儀度安雅乃曰此豈為惡者耶即除祕書郎唐徳宗紀互入轉禍為福權善才范懷義誤砍昭陵柏罪當除名上特命殺之狄仁傑奏二人罪不當死上曰善才等砍陵柏我不殺則為不孝仁傑固執不已上作色命出仁傑曰犯顔直諫自古以為難臣以為遇桀紂則難遇堯舜則易張釋之有言設有盗長陵一抔土陛下何以處之今以一株柏殺二將軍後代謂陛下為何如臣不敢奉詔者恐陥陛下於不道且羞見釋之於地下故也上怒稍解二人除名流嶺南唐髙宗紀互入轉移人心韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輙私自杖母乃為之漸寛唐武后紀互入兄弟處士韋月將上書言武三思潜通宫掖上大怒命斬之宋璟奏請推按曰必欲斬月將請先斬臣不然臣終不敢奉詔唐中宗紀勅曰王衍一行並從殺戮已印畫樞宻使張居翰就殿柱揩去行字改為家字後唐明宗紀互入求援竇建徳䧟京城執户曹何東張𤣥素將殺之縣民千餘人號泣請代其死曰户曹清慎無比大王殺之何以勸善唐髙祖紀張九齡事無細大皆力爭惠妃泣訴於上曰太子固結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之九齡曰太子天下本不可動摇昔晉獻公聽驪姬之讒殺申生國乃大亂漢武帝信江充之誣罪戾太子京城流血晉惠帝用賈后之譛廢愍懐太子中原塗炭隋文帝納獨孤后之言廢太子勇立煬帝遂失天下由此觀之不可不慎陛下必欲為此臣不敢奉詔故訖九齡罷相太子得無動唐𤣥宗紀李徳裕為兵部尚書初李宗閔與徳裕有隙及徳裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能杜悰嘗詣宗閔曰悰有一策可平宿憾恐公不能用宗閔曰何如悰曰徳裕有文學而不由科第常用此為慊若使之知舉必喜矣宗閔黙然有間曰更思其次悰曰不則用為御史大夫宗閔曰此則可矣悰乃詣徳裕徳裕迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意即以大夫之命告之徳裕驚喜泣下曰此大門官小子何足以當之通鑑唐文宗紀劉仁軌運糧失船李義甫使袁異式鞠之具獄以聞義甫言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及乃除名通鑑唐髙祖集解疑釋結解紛挫鋭選薦士表本朝白樂天為王涯所讒謫江州司馬甘露之禍樂天有詩云當君白首同歸日是我青衫獨往時不知者以為幸亡樂天豈幸人之禍者哉葢非也仇池筆記捄弊經國奢則示之以儉國儉則示之以禮禮記子掃地而求更新文子史除煩解嬈西漢晁錯傳破觚為圜斵琱為璞酷吏傳興滯補弊舉其偏以補其弊為政不行甚者必變而更化之乃可理也董仲舒策譬兩衣敗壊以一相補猶有完若不如此將兩無所保東漢虞翊傳補綻破壊枝柱邪傾東漢崔寔傳治荒剔蠧反刓以樸剗偽以真自晉訖隋佛老顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖争四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時韓愈傳鄭覃救世之弊在責實唐書三王之道所祖不同非其相反將以救溢扶衰所遭之變然也夏尚忠殷尚質周尚文者所繼之救當用此也通鑑漢武紀凡欲拯其弊須求致弊之由時弊則但理其時法弊則合革其法唐太宗紀開元中天下鑄錢七十餘爐歳八百萬今纔十餘爐歳八十五萬又積於商賈之室流入四夷又大歴以前淄青原魏博貿易雜用鉛鐵嶺南雜用金銀丹砂象齒今一用錢如此則錢焉得不輕今宜使天下輸税課者皆用榖帛廣鑄錢而禁滯積及出塞者則錢日滋矣唐穆宗紀集八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春生秋殺陽開隂閉令修於户庭數月之間而人自得於湖山千里之外韓文新修滕王閣記補苴鏬漏進學解韓愈轉吏部侍郎凡令史皆不鎖聽其出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏矣選人不得見令史故勢重聽其出入故勢輕皇甫湜作韓愈墓誌公之來思如古醫之治劇病宜先頥養氣還神復劉賔客百祀之弊一朝而去唐文粹本朝三聖既沒邪詖幅裂鼎沸莫敢誰何孔子出焉氣足以壓其聲燄量足以吞其區穴排異如摧枯拉朽引同如川流海㑹崇安靈傳論鳴道集坐視經燎之方揚寧或滅之發言盈庭誰敢執其咎詩危而不持顛而不扶論語子嫂溺不援是豺狼也孟子觀孺子之入井非仁者之意視瞽人之觸柱非兼愛之意抱朴子史人溺不拯則非人也東漢崔駰傳視漏弗填恣傾弗支唐崔羣傳政令玩垢上下懈隋通鑑集懐道以迷國佯愚而不言顛則不能扶危則不能安楚辭有觀溺於水而爇於火者有可救之道而終莫之救也韓文今陽子實一匹夫在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於心問其官則曰諫議也問其禄則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉韓文凡吏於土者葢民之役非以役民而已也凡民之食於土者出其什一傭乎吏使司平於我也今受其直怠其事者天下皆然豈惟怠之又從而盗之向使傭一夫於家受若直怠若事又盗若貨器則必甚怒而黜罰之矣栁文知本經獺祭魚豺祭獸互入㣲小有知鷹祭鳥互見㣲小有知禮不忘其本古人有言曰狐死正丘首仁也君子已孤不更名三王之祭川也皆先河而後海或源也或委也此之謂務本禮記源泉之所出也委流所聚也子我不忍以夫子之道反害夫子孟子清酤之美始於耒耜黼黻之美始於杼軸淮南子史言稱先職不背本也不背本仁也左成九年子雖齊聖不先父食左文二年封平為户牖侯平辭曰非魏無知臣安得進上曰若子可謂不背本矣陳平傳宋髙祖㣲時躬耕於丹徒及受命耕耨之具頗有存者皆令藏之以留於後南史本紀周盤龍自平北將軍為散騎常侍武帝戲之曰卿着貂蟬何如兠鍪對曰此貂蟬從兠鍪中出耳齊書孫拯門人費卿宰意二人詣獄明拯寃拯曰吾義不負二陸死自吾分卿何為爾邪曰君既不負二陸僕又安可負君通鑑晉惠紀張超曰子源天下義士終不背本漢獻帝紀上至顯仁宫曰朕昔過此買飯而食僦舍而宿今供頓如此豈猶得言不足乎唐太宗王師範曰吾敬桑梓所以教子孫不忘本也唐僖宗初秦王大箭射却突厥後遺大弓一大箭五世保之郊祀必陳儀物之首以識武功唐書互入功業傳記食其食者不毁其器䕃其樹者不折其枝韓詩外傳服一彩則念女功勞御一榖則恤農夫勤世要語集敢背惠而忘初禰正平賦弱之肉强之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自也孰豐其川不羡其源韓文終朝美飽食終歳好衣裳好衣美食有來處亦須慙愧桑𢎞羊霜降水返壑風落木歸山茍無先徳孰啟後昆白侍郎茍含天地秀皆是天地身誰言寸草心報得三春暉孟郊本朝或勸狄青去鬢間字曰吾所以至此者以是耳范忠宣公貶永州公之諸子欲以忠宣與司馬公議役法不同求歸白公公曰吾用君實薦以至宰相同朝議事不合則可汝輩以為今日之言不可也有愧而生不若無愧而死聞見録向來一瓣香敬為曽南豐後山集忘本子逢蒙學射於羿盡羿之道思天下惟羿為愈己於是殺羿孟子紀昌學射於飛衛既盡衛之功乃謀殺衛列子貴明珠而賤淵潭愛和璧而惡荆山而不知淵潭者明珠之所自出荆山者和璧之所由生也抱朴子食榖而鄙田衣帛而笑蠶是惑也陳子要言冰生於水而冰遏水烟生於火而烟鬱火劉子史諺所謂庇焉而縱尋斧焉者也左傳文公七年因人之力而敝之不仁左僖三十年皇甫酈曰近者董公之强將軍所知也吕布受恩而反圖之通鑑漢獻帝紀左雄薦周舉為尚書雄舉馮直坐賍舉以此劾奏雄雄曰進君適所以自伐也通鑑順帝紀劉湛之入也殷景仁寔引之湛既至以景仁位遇本不踰已而一旦居前意甚憤使康義毀景仁於帝景仁對親舊歎曰引之令入入便噬人通鑑晉太祖壊髙祖所居隂室床頭有土障壁上挂葛燈籠麻䋲拂侍中袁顗因盛稱髙祖儉素之徳上不答獨曰田舍公得此已為過矣宋世祖紀李冲初薦李彪既彪自以結知人主不復藉冲稍稍踈之唯公坐斂袂而已無復宗敬之意齊明帝紀初李徳裕執政引白敏中為翰林學士及武宗崩徳裕失勢敏中乘上下之怒竭力排之使其黨李咸訟徳裕罪唐武宗崔洪舉郄詵詵後奏洪洪曰我舉郄丞而還奏我是挽弩自射晉崔洪傳互見坐主如借人之戈持之反刺唐史肅宗賛集譬猶鷇卵始生翰毛而陸梁放肆顧行吠主曹公檄吳禽獸飽而忘恩蠭蠆養而成毒燕公集凡號門生而不知恩之所自者非人也食客空多誰報恩劉長卿一一口銜食養得成毛衣到大啁啾解遊颺各自東西南北飛薄暮空巢上羈雌獨自歸王維集本朝王沂公曽屢薦吕夷簡及大拜與沂公不叶東軒筆錄吕布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯欒城集知恩經㣲管仲吾其被髪左衽矣論語子相與尸而祝之社而稷之莊子震風凌雨然後知夏屋之為帡幪也揚子史趙盾曰㣲君姬氏則臣狄人也左傳㣲楚之惠不及此左僖二十八年㣲夫人之力不及此左僖三十年㣲武子之賜不至於今雖獲歸骨於晉猶子則肉之左昭十三年衛寗子專公孫免餘請殺之公曰㣲寗子不及此左襄二十七年吾見申叔所謂生死而肉骨也左傳解衣衣我推食食我西漢韓信傳何武毎奏事京師戴聖未嘗不造門謝恩西漢何武傳倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報東漢馮異傳羊曇為謝安所愛重安薨輟樂彌年行不由西州路晉書謝安傳馮異曰小臣不敢忘巾車之恩通鑑光武紀唐李夷簡彈楊憑憑立貶臨賀縣尉徐晦獨至藍田與别權徳輿曰無乃為累乎晦曰布衣蒙楊公知奬今日逺謫豈得不與之别借如明公也日為讒人所逐晦敢自同路人乎通鑑傳記鮑叔死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也管仲曰生我者父母也知我者鮑子也士為知已者死而况為之哀乎説苑庾太尉少為王武子所知庾過江歎王曰庇其宇下使人忘寒暑世説中集寸心銘佩牢杜詩昔在韶州之行受命於元兄曰爾㓜養於嫂䘮服必以朞今其敢忘天實臨之韓文互見嫂門縱秋氣之移奪終感恩於篋中張九齡文受曲被之恩私如生羽翼報非次之㧞擢宜裂肝腸杜牧之本朝主人覆䕶恩豈啻一綈袍隕首刳心自知無以報稱臨川此生恩未報他日目不瞑後山報恩經無徳不報詩史初周人與范氏田公孫尨税焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下曰請報主徳左哀二年晉公子重耳曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍左傳僖二十二子犯曰㣲楚之惠不及此退三舍辟之所以報也左僖二十八年魏顆見老人結草以亢杜囬杜囬躓而顛夜夣之曰余而所嫁婦人之父也爾用先人之治命余是以報左宣十五年晉靈公將殺趙盾㐲甲而饗之初宣子田於首山舍於翳桑見靈輒餓問其病曰不食三日矣食之既而為公介倒㦸以遇公徒而免之問何故曰翳桑之餓人也左傳初蘇秦之燕貸百錢為資及得富貴以百金償之徧報所嘗見徳者史本傳范雎一飯之徳必償史本傳秦亡善馬岐下野人共食之三百餘人吏逐得之繆公曰君子不以畜産害人赦之三百人聞秦擊晉皆推鋒爭死以報食馬之徳朱亥魏公子無忌客曰所以不報謝者小禮無所用今乃臣效命之秋也趙襄子滅智伯其臣豫讓逃遁山中曰嗟乎士為知己者死女為悦己者容今智伯知我我必為報讎而死已報智伯則吾魂魄不愧矣史記漢髙封項伯等四人為列侯賜姓為劉氏先有功於漢者西漢本紀豫子吞炭壊形以奉見異齊客隕首公門以報恩施西漢谷永傳竊歎古人一飯之報東漢李固傳情為恩使命縁義輕東漢朱暉傳論太史慈避事之遼東北海太守孔融遣人詢問其母並致餉遺融為管亥所圍慈單騎見融既又求救於𤣥徳得兵解圍吳志郄鑒嘗食周翼粟鑒薨翼追撫肓之恩解職席苫心䘮三年晉書隂鏗宴飲見行觴者因囬酒以授之及侯景之亂鏗嘗為賊所擒救之獲免鏗問其故乃前所行觴者陳書傳記伍子胥奔吳至溧陽女子擊絮灘水上子胥乞餐女子簞瓢壺漿而食之子胥去五歩顧女子已投水後子胥伐楚師還過溧陽報以百金投瀨水而去吳越春秋隋侯曽得大蛇不殺而遣之蛇後銜明珠以報隋侯荆州記楊寳九歳見一黄雀為䲭梟所搏墜樹下為螻蟻所困取之歸置巾箱中以黄花食之百餘日毛羽成飛去夜有黄衣人以白環四枚與寳曰令君子孫潔白位登三公當如此數續齊諧記韓愈㓜孤見鞠於兄嫂氏嫂卒服期䘮以報徳祁無釋文公廟記集期守死以報徳禰正平賦匹夫媵婦尚能致命一餐選與彭寵書鬼亢囘以斃秦文選灰軀糜骨以甘心願陳子昂結纓仗劍少謝萬一剖心摩踵以報所天江文通賦感君恩重許君命泰山一擲輕鴻毛李太白豈鮒魚之心能報東海之恩烏鳥私情得盡歡於長養犬馬㣲力誓效死以酧恩白樂天重恩山木荅杜牧之報恩如皎日武伯蒼禽息之首為知己而必碎豫讓之身感國士而能漆張九齡文嵩岱洪恩終難酧於蟻垤駱賔王報徳空思奉細涓唐文粹定是酧恩日今朝覺命輕王維集背恩史出因其資入用其寵飢食其粟三施而無報是以來也左傳背施無親民所棄左僖十四年晉饑秦輸之粟秦饑晉閉之糴左僖五年背惠食言左僖二十八年王莽使安陽侯舜見太后后曰而屬父子宗族蒙漢家力富貴累世既無以力報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗猪不食其餘天下豈有爾兄弟耶通鑑漢平帝紀集咫尺炎凉變四時韋應物詩本朝未乾薦禰之墨已彎射羿之弓歐公集歐公之士叛公於瞬息俄頃之際東坡勤上人詩序報怨經以怨報怨則民有所懲禮記以直報怨論語子趙襄子殺智伯豫讓欲報怨恐人識之乃落其齒以易其貌淮南子史楚伍尚謂其弟員曰我能死爾能報左僖二十年鄭伐宋以報東門之役左隠五年夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越定十四年越伐吳王孫彌庸見姑蔑之旗曰吾父之旗也不可以見讐而勿殺左傳齊哀公享乎周紀侯譛之襄公將復讎乎紀逺祖九世矣九世猶可以復讎乎雖百代可也家亦可乎不可國何以可國君一體也先君之耻猶今君之耻也公羊張儀為秦相為文檄楚相曰始吾從若飲我不盗而璧君笞我若善守汝國我顧且盗而城史本傳怨毒之於人甚矣王者尚不能行之於臣下况同列乎方子胥窘於江上道乞食豈嘗須臾忘郢耶故隠忍就功名非烈丈夫孰能致此耶本傳論勾踐曰孤嘗困於㑹稽痛入骨髓日夜焦唇乾舌徒欲與吳王接踵而死孤之願也端木賜傳互見怨恨借力以雪父之耻伍子胥傳李廣贖為庶人夜至霸陵尉呵止廣居無何廣拜北平太守廣請覇陵尉至軍斬之本傳我有積怨深怒於齊不論一作量輕弱而欲以齊為事史樂毅傳范睢睚眦之怨必報范本傳張良韓人秦滅韓良以家財求刺客為韓報讎得力士為鐵椎重百二十斤秦始皇遊博浪沙中良與客俱擊秦帝誤中副車西漢本傳漢髙祖怨丘嫂之轑釜封其子為羮頡侯西漢楚元王傳執讎過直西漢地理志直當也刷㑹稽之耻漢武帝紀發憤快志剡手以衝讎人之胷固為俱靡而已前賈誼傳孫秀為小吏給事潘岳而狡黠自喜岳惡其為人數辱之秀常銜忿及趙王倫輔政秀為中書令岳於省内謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂告岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族晉書潘岳傳趙娥父為李夀所殺娥乃幃車袖劍白日刺夀於都亭魏志互見女門婦人才畧二門劉穆之好往妻兄家乞食多見辱其妻江嗣女毎禁不令往後江氏有慶㑹穆之猶往食畢求梹榔江氏兄弟戲之曰梹榔消食君乃常飢何忽須此妻市殽饌為其兄弟以餉穆之穆之為丹陽尹召妻兄弟乃令厨人以金柈貯梹榔一斛進之宋書本傳互見妻家及施報兩失龎涓自以能不如孫臏以法斷臏兩足㳙為魏將軍伐韓韓請救於齊齊田忌以孫為師㳙逐之孫子度其行暮至馬陵可伏兵乃砍大樹白而書之曰龎㳙死此樹下果夜至砍木下見白書以火燭之讀未畢萬弩皆發㳙乃自刎曰遂成䜿子之名通鑑周紀昔齊襄公復九世之讎春秋大之通鑑武紀晁錯為御史大夫使吏按袁盎受吳王財物抵罪詔勅以為庶人吳楚反錯謂丞史曰袁盎多受吳王金錢言不反今果反欲治盎盎恐夜見嬰言為言吳所以反願至上前口對狀嬰入言上乃召盎盎對曰方今計獨有斬錯發使勅吳楚二國復其故地上曰吾不愛一人以謝天下召錯斬東市通鑑太子素惡西昌侯鸞嘗謂子良曰我亦殊不喜此人不解其故當由其福薄故也及鸞得政太子子孫無遺焉齊太祖紀蹇味道素不禮於殿中侍御史周矩屢言其不能了事㑹羅告味道者勅矩按之矩謂味道曰公責矩不了事今日為公了之味道及子皆伏誅唐武后紀竇參惡左司郎中李巽出為常州刺史及參貶郴州巽為湖南觀察使汴州節度使劉士寧遺參絹五十匹巽奏參交結藩鎮上大怒欲殺參李吉甫為相多修舊怨唐徳宗紀汲黯常毁儒而觸𢎞𢎞欲誅之請徙黯為右内史漢武紀傳記越王念欲復怨苦思勞心夜以接日夏則握火寒則抱冰吳越春秋子胥闔廬將為之報讎使子胥伐荆子胥操箠笞平王之墓曰吾先人無罪而子殺之今以此報子越絶書炎帝之少女名曰女娃遊於東海溺而不反化為寃禽名曰精衛嘗銜西山之木石以堙於東海山海經上命李龜年持金花牋宣賜李白白立進清平調三篇有句曰可憐飛燕倚新粧髙力士終以脱靴為耻異日妃重吟前詞力士曰始謂妃子怨李白入骨髓何乃拳拳如是曰何學士能辱人如斯力士曰以飛燕指妃子賤之甚矣上三欲命李白官卒為宫中所捍而止楊妃外傳集􅖬􅖬精衛銜木償寃魏都賦子復父讎見於春秋見於禮記又見於周官又見諸子史不可勝數未有非之者也鳥有償寃者終年抱寸誠口銜山石細心望海波平渺渺功難見區區命以輕人皆譏造次我獨賞專精豈計休無日惟應盡此生何慙刺客傳不著報讎名韓集數處報讎身不死唐文粹事讎子楚以六千里為讎人役荀子史魯桓公十八年㑹齊侯於濼遂及文姜入齊齊侯通焉公謫之齊侯享公使公子彭生乘公公薨於車莊公九年公及齊大夫盟於蔇十一年齊侯來迎共姬注齊主婚二十三年公如齊觀社二十四年哀姜至使宗婦覿用幣左傳秦召楚懐王㑹懐王死於秦諸侯不直秦頃襄王復與秦平七年迎婦於秦復結和親史記楚世家反君事讎行若狗彘西漢賈誼傳記纂淵海卷七十二
