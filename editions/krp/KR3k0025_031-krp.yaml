body:
  text: 記纂淵海卷三十一宋潘自牧撰職官部翰苑史學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮尤寵而翰林院者待詔之所也唐志李白天寶初至長安往見賀知章知章見其文而歎曰子謫仙人也言於𤣥宗召見金鑾殿論當世事奏頌一篇有詔供奉翰林本傳翰林院者在麟徳殿西重廊之後盖天下以伎術召見者之所處也學士院者開元二十六年之所置在翰林院之南貞觀中虞世南等一十八人皆以𢎞文館學士㑹於禁中當時號十八學士其後永徽中黄門侍郎顧崇復有麗正之稱開元初中書令張說等又有集仙之目𤣥宗始選朝官有辭藝學識者入居翰林供奉别㫖於是吕向尹愔首充焉至二十六年始以翰林供奉改稱學士由是遂别建學士院俾專内命至徳以後軍國務殷其入直者並以文詞共掌詔勅自此翰林院始兼學士之名其後又置東翰林院於金鑾殿之西隨上所在而遷取其便近翰林故事翰林每下直出門謂之小三昧出銀臺門上馬謂之大三昧言出纒縛而就解脫也學士初入院賜馬一疋謂之長借馬登翰林者謂之凌玉清翔紫霄初選者召令赴銀臺試制書批答三首内庫給青綺被紫絲履之類端午賜青團扇貞元中由此而居輔弼者十有二焉元和中由此而膺大用者十有六焉翰林志唐制駕在大内則明福門内置學士院駕在興慶宫則金明門内置院徳宗移院於金鑾坡上續志路延年少自監察入翰林崔鉉曰路十如今便入翰林如何到老玉泉子記集每宴飲無不先及每慶賜無不先霑中廏之馬代其勞内厨之膳供其食白集晨趨紫禁中夕待金門詔李白李侯金閨彦老杜贈李白君王曉坐金鑾殿只待相如草詔來李商隠銀花懸院牓李徳裕謬入金門侍玉除苑花似雪同隨輦宫月如眉伴直廬白樂天本朝太宗皇帝曰詞臣實神仙之職也玉堂東西壁悉畫水以布之風濤浩渺瀛洲之象也脩篁鵠鶴悉圗廊廡風傳禁漏月色滿庭真人世之仙境李昉赴玉堂賜宴詩後序云今日之盛其事七新賜衣帶鞍馬十月朔錦袍特定草麻例物改賜内庫法酒俸給見錢給親事官隨從就院敕設玉堂後廡建二閤畫煙嵐曉景續翰林志太宗謂宰臣曰蘇易簡乞御飛白書玉堂之署四字今付宰臣李昉以下喚来於中書堂面宣賜職任之親切曹局之凝嚴禮遇優渥賜與繁縟金坡遺事政和五年御書摛文堂賜學士院院中有雙鵲栖於玉堂之後海棠樹或鳴噪必有大詔及宣召之事續㑹要學士院牕格上有火燃處太宗嘗幸玉堂蘇易簡已寢遽起無燭宫嬪自牕格引燭入照之至今不欲更易以為玉堂一盛事學士院北扉者為其在浴堂之南便於應召故事堂中設視草臺每草制則具衣冠據臺而坐學士院第三㕔學士閤堂前有一巨槐素號槐㕔舊傳居此閤者多至入相翰林院在禁中玉堂承明金鑾殿皆在其間筆談衣惹御香拖瑞錦筆宣皇澤洒春霖李助青輪輝映輕前古丹地深嚴隔世塵賈黄中日上花磚簾捲後栁遮鈴索雨晴初錢若水宸章照耀詠辭林李沆六鼇雲海冠蓬莱玉署深嚴枕斗魁楊文公翰林學士承㫖史令狐綯遷翰林學士承㫖夜對禁中燭盡帝以乘輿金蓮花炬送還院吏望見以為天子来及綯至皆驚沈傳師為學士翰林缺承㫖次當傳師穆宗欲面命辭曰學士院長㕘天子密議次於宰相自知必不能因稱疾出常澳為承㫖與同僚蕭寘為宣宗器遇召見詢訪時事每有大事中使傳宣草詞澳心欲論諫即曰此一事須降御劄方敢施行遲留至旦必論其可否穆宗以杜元頴多識朝章拜為中書舎人學士承㫖韓偓進承㫖宰相韋貽範母喪詔還位偓當草制曰腕可斷麻不可草唐書後唐明宗勅令後學士入院並以先後為定惟承㫖一員不計官資先後在學士上同光中賜承㫖盧質論思翊佐功臣旋授節制河中鴻瀛王詩送之曰視草北来唐學士擁旌西去漢將軍五代史傳記憲宗永貞元年始命鄭絪為承㫖位在諸學士上居東第一閤大誥令大廢置置相之宻畫内外之宻奏上之所甚注意者莫不專受專對自鄭絪為承㫖十七年間由鄭至杜十一人而九㕘大政若此則安可以昧陋不肖之稹繼居九丞相二名節之後哉承㫖院記鄭絪為内廷之老首定大計翰林志翰林院學士六人内年深徳重者一人為承㫖所以獨承宻命故也貞元以後為學士承㫖者多至宰相焉通典集禁林分直法本六人帝語親承舊惟一老冠内朝侍奉之班極儒者遭逢之盛承明三人謹比古人大雅一門無慙舊史唐制本朝承㫖不常置以院中久次者一人充續㑹要太宗賜蘇易簡詩云翰林承㫖貴清浄玉堂中張方平為承㫖神宗親劄曰卿文章典雅煥然有三代之風而又善以多為少意博辭寡雖書訓誥無以加也本傳金鑾玉堂親被絲綸之宻北㕔東閤獨稱年徳之尊東坡表宜還與於禁逰且進承於宻㫖牋表類粉署重来憶舊遊蟠桃開盡海山秋寜知不是神仙骨上到鼇山最上頭宋祁翰林學士史陸贄為學士從幸奉天時機務填委詔書數百贄揮翰起草思如泉注初若不經思逮成皆周盡事情他學士閣筆不得下而贄沛然有餘畢諴為翰林學士党項羌擾河西宣宗召學士對諴論破羌之狀上曰不期頗牧在吾禁中栁公權為翰林學士上嘗夜召對於亭燭窮而語未盡宫人以蠟液濡紙繼之李紳穆宗召為學士與李徳裕元稹同在禁署時稱三俊李徳裕擢翰林學士凡號令大典冊皆更其手陸扆為翰林學士工文辭敏速若注射然昭宗嘗金鑾作賦命學士和扆先成帝曰朕聞貞元時有陸贄吳通元能作内廷文書今得卿斯文不墜矣北㕔前階有花甎道冬日以日影及五甎為入直之候李程性懶常過八甎乃至衆呼為八甎學士李絳為翰林學士孜孜以正諌為己任徳宗以段文昌張仲素為學士韋貫之以為學士所以備顧問不宜專取辭藝奏罷之韋綬為翰林學士宻政多所㕘逮帝嘗幸其院韋妃從㑹綬方寢時大寒以妃蜀纈袍覆而去趙宗儒父驊徳宗欲寵其門使一時並命于休烈及二子益蕭相繼為翰林趙光逢為學士光裔知制誥兄弟對掌内外命書劉瑑始在翰林帝素器遇至是手詔追還帝視案上厯謂瑑曰為朕擇一令日瑑跽曰某日良帝笑曰是日卿可遂相杜讓能以學士從僖宗在蜀闗東用兵書詔雲委讓能詞才敏速筆無㸃竄動中事機僖宗嘉之唐書傳記唐太宗時名儒學士時召草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表䟽批答應和文章繼以制敕文誥悉由中書多壅滯始選朝官入居翰林供奉别㫖然亦未定名制詔書敕猶㦯分在集賢開元二十六年翰林供奉改稱學士翰林志選用益重而禮遇益親至號為内相又以為天子私人晉天福五年詔翰林學士院公事宜並歸中書舎人自是舎人晝直者當中書制夜直者當内制開運元年復詔翰林學士與中書舎人分為兩制職源睿聖登極段文昌杜元頴不離内庭便至公輔及寳厯以後韋處厚恩深授選亦自翰林由是稍為故事或不至拜者以為深恥翰林内志姚元崇為翰林學士明皇在便殿甚思元崇論時務七月十五日苦雨泥濘上令侍御者擡步輦召學士中外榮之李白於便殿對明皇撰詔誥時十月大寒筆凍莫能書字帝敕宫嬪十人侍白左右令各執牙筆呵之白遂受而書其受聖眷如此開元遺事李琪每臨流坐石摘木葉試草制詞朱梁時果為翰林學士瓚言姚洎為學士梁祖問及裴延裕曰頗知其人思敏洎曰向在翰林號下水船梁祖曰卿便是上水船也洎甚慚摭言偽蜀辛夤遜夢掌中抽草占者曰君必遷翰林學士未㡬果然同上集唐之貴文至矣哉後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相器者貯之内廷由是釋筆硯而操化權者十八九劉禹錫李絳集記自入為學士至宰相以往所執筆皆經綸制置裁成潤色之詞也以識度為宗觀其發徳音福生人沛然如時雨褒元老論功臣穆然如景風命相之冊和而莊命將之誥昭而毅劉賔客集常厚集記視草北宫常衮制何處春深好春来學士家鳳書裁五色馬鬛薦三花元和六學士五相一漁翁白樂天學士金鑾殿後居天中行坐侍龍輿承恩不許離床謝宻㫖長教倚案書王建本朝翰林學士掌内制淳化二年以翰林學士賈黄中蘇易簡同管勾差遣院自是學士兼領他司止與職名同元豐官制行始專典内制乾徳元年竇儀為翰林學士太祖曰深嚴之地當以宿儒處之又曰禁中非此人不可故事學士在内中院吏朱衣雙引李昉以太宗在南衛朱衣一人前引昉亦去其一太宗謂近臣曰學士之職清切貴重非他官可比玉署之設宻邇紫闈每夜漏既上宫鑰並入有大號令大除拜邉境急奏惟天子與學士知之居是職者豈不貴重乎金坡遺事王旦為翰林學士中外皆以為宰相器真宗曰為朕致太平必斯人也李迪真宗時為學士上問陜西兵㡬何對曰臣向在本道以小冊書兵馬糧草之數以備調發今猶置佩囊中帝令探取之曰不意頗牧復在吾禁中本傳鼂宗慤一夕草除將相五制真宗作歌一首賜新除學士陳彭年因謂向敏中曰頃命學士罕曾賜歌詩天聖元年詔學士遇雙日至晩方下直盖故事以雙日鎻院隻日除麻故也實錄非徒翰墨之選乃是將相之儲東坡謝表有同在翰林而大拜者王禹偁以啓賀之云三神山上曾陪鶴駕之逰六學士中猶有漁翁之歎廣記直學士院權直本朝開寳二年李昉盧多遜並直學士院直院之名始此六年張澹權直翰林院權直之名始此凡他官入院未除學士謂之直院學士俱闕他官暫行文書謂之權直㑹要乾道九年以崔端詩為翰林權直孝宗㑹要李昉入直翰林先是盧多遜己任學士太祖見昉在多遜下問其故宰相曰昉以本官直學士院未即真拜真拜學士在多遜之上開寶二年李文正盧相並直學士院太平興國元年湯恱徐鉉直學士院王克正張洎直舍人院四公皆江南文士也退朝錄經筵史宣帝召韋𤣥成與五經諸儒雜論於石渠閣成帝嚮學鄭寛中張禹說尚書於金華殿中詔頒白綬焉漢書光武好經術每朝㑹令桓榮敷奏經義章帝㑹諸儒白虎觀講論五經同異帝好古文尚書左氏傳又詔賈逵班固入講北宫白虎觀南宫雲臺後漢書太宗即位於殿左置𢎞文館悉詔内學士更番直宿討論文籍𤣥宗詔羣臣及郡府舉通經學士而褚無量馬懷素等勸講禁中天子尊禮不敢盡臣開元十三年改麗正書院為集賢殿書院選耆儒一人侍讀以質史疑唐書本朝太祖置講席於便殿聖政仁宗天聖中雙日御筵休務之日亦不廢仁宗初御延義閣每初講論或講讀終篇則宣二府同聽賜飛白書或賜宴其後專御邇英東齊記事英宗詔以九月五日開講至重陽罷先是仁宗率二月開經筵至重午罷八月復開冬至罷吕公著乞依先帝故事上從之哲宗詔開講筵進讀寳訓講讀日赴資善以雙日講論仍輪一員宿直范祖禹節尚書論語孝經訓戒之言名曰三經要法進之行狀髙宗建炎二年謂宰執曰故事自五月至八月罷講朕欲勿罷可乎自是勿罷聖政侍讀侍講史肅宗嘗言張酺入侍講屢有諌正可謂有史魚之風本傳孟侯經傳侍言帝幕張酺贊楊賜侍講華光殿中本傳唐開元三年上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入内侍讀乃以馬懷素褚無量更日侍讀通鑑十三年置集賢院侍講學士侍讀直學士百官志開元中王志愔表薦白履忠隠居讀書正苦守操堪代褚無量馬懷素入閤侍讀徐岱少好學多所探究侍讀兩宫謹守過人韋處義以穆宗沖怠不向學即與路隋合六經掇其粹要題為六經法言二十篇冀助省覽帝稱善韋處厚路隋為侍講穆宗召入太液亭命分講毛詩闗雎尚書洪範等篇訪以理體處厚等演經義以廣規諷之道鄭澣文宗時為侍讀學士帝使搜擷經史為要錄舉諸條摘問之隨即酧析無留王起文宗時侍講時或僻字疑事令中使口宣即以牓子寫對故起著口宣十卷文宗召王起許康佐為侍講學士栁公權為書學士每有疑義即召入便殿顧問討論謂之三侍學士唐書傳記馬懷素禇無量同為侍讀更畨日入既叩閤肩轝以進宫中每宴見帝目送迎以師臣禮職林集授道帷幄師範之功贈司空臨晉侯冊虎觀諸儒許丁鴻之博學唐制詞賦成於鼓吹典墳富於泉海馬懷素制殿横儒席中宗哀冊祇事穆宗侍經内殿敷堯舜之大典暢周禮之遺風雅言玉音奥義氷釋路隋制本朝太平興國八年始因吕文仲為侍讀尋又為翰林侍讀咸平二年以楊徽之夏侯嶠為翰林侍讀學士邢昺為翰林侍講學士始建學士之職㑹要景徳四年以翰林侍講學士邢昺知曹州侍講學士外使自昺始也天禧三年張知白充翰林學士知天雄軍府翰林學士外使自知白始也元豐官制廢翰林侍讀侍講學士以為兼官元祐七年復增學士之號元符元年省去續㑹要明道五年馮元侍講上金華五箴本傳趙元昊反罷進講趙師民獻勸講箴至是復命講讀經史慶厯二年召御史中丞賈昌朝侍講故事臺臣無在經筵者以昌朝長於講說特召之帝學舊制坐而論道别置書冊於御前仁宗富於春秋令儒臣立就御案便於指示神宗朝王安石侍讀以為道之所存禮亦加重請復賜坐不行元祐初程頤為侍講復請坐不從元祐間蘇頌為侍講請遇不講日各進漢故實二事仍於逐事後畧論得失大㫖吕氏家塾廣記錢象先自講筵出知蔡州帝諭之曰大夫行有日矣宜講徹一編元祐初將啓講筵宣仁諭執政云啓與蔡卞皆少年宜用老成端士乃以彦博兼侍讀四朝史西學上賀玷侍臣之髙選奉天子五學之遊日奉講幄望西清之帷幄久立仿徨聽長樂之鼓鐘恍如夢寢日奉講帷久視經幄師氏之官職在講說東坡儒學之臣入閤侍讀所以考質疑義南豐擬制露門勤講賈昌朝制金華經幄曲阜周常記虎觀清閒之燕誦說古今以廣見聞傅堯俞制崇政殿說書本朝景祐元年置四年改為天章閤侍讀慶厯二年復為崇政殿說書分記盖秩卑資淺則為說書不兼侍講元祐間范純仁司馬公皆以著佐兼侍講前此所未有也闕中初除說書二人皆以隠逸起蔡崈若瓘詔以士服隨班朝謁入侍吕氏家塾記賈昌朝為說書說講明白昌朝請歲終以付史館熙寜中呂惠卿為說書召見奏對引經稱㫖程頤召充崇政殿說書一日講罷未退上忽起憑檻戲折栁枝先生進曰方春發生不可無故摧折經筵承受張茂則嘗招講官啜茶觀畫先生曰吾平生不啜茶亦不識畫竟不往文潞公嘗與吕范諸公入侍經筵聞先生講說退相與歎曰真侍講也伊川年譜哲宗幼冲召程正叔為崇政殿說書正叔以師道自居每侍上講色甚莊繼以諷諫上畏之正叔曰吾以布衣為上師傅其敢不自重言行録哲宗嗣位召程頤將以為崇政殿說書上奏論經筵三事其一以上富春秋宜選賢徳以輔講官因使陪侍宿直講說道義所以涵養氣質薰陶徳性其二請上左右内侍宫人皆選老成厚重之人不使侈靡之物淺俗之言接於耳目仍置經筵祇應内臣十人使上在宫中動息以語講官其三請令講官坐講以養人主崇徳重道之心既而命下以通直郎充崇政殿說書實錄吕希哲字原明為說書凡二年日夕勸導人主以修身為本修身以正心誠意為主心正意誠天下自化不假他術身不能修雖左右之人且不能論况天下乎言行錄景祐元年以賈昌朝為崇政殿說書昌朝講說明白上喜之多所質問昌朝悉記錄歳終以付史館事畧近制兼職雖宰相領國史實錄院勅令所玉牒所降勅而已惟講讀官下至說書皆命詞給告可見崇儒重道之典也周益公文集總九卿史夏商九卿周六官是為六卿又立少師少傅少保是為三孤與六卿為九前漢百官志後漢左雄言九卿位亞三事班在六官行有珮玉之節後漢書三公比三星曰九卿隋志二千石以下六百石佩兩印皆以黑犀司馬彪漢書九卿位為列棘南史齊侯使敬仲為卿敬曰羇旅之臣敢辱髙位以速官謗史記傳記長慶元年給事韋景封還駙馬劉士涇為太僕卿制惟月膺名象河稱重續通典齊侯使管夷吾平戎于王王以上卿之禮享管仲仲受下卿之禮而還史記集獻納開東觀君王問長卿杜詩卿月昇金掌王春度玉墀杜送馬大卿赴闕紈扇朱輪參差交映藻衣花綬焜爚生光初學記本朝雖設九卿皆以為命官之品秩而無職事元豐正名始有職掌中興以来冗職除太常寺大理寺不罷外宗正以太常兼而衛尉併兵部太僕併駕部太府司農併户部光祿鴻臚併禮部紹興復置宗正太府司農餘遂廢中興㑹要太常卿經有能典朕三禮僉曰伯夷汝作秩宗書大宗伯掌六樂周禮史漢初置太常以列侯忠孝恭謹者居之秩中二千石桓榮遷太常明帝尊以師禮乗輿每幸太常府令榮東面坐設几杖㑹百官本傳和合為太常清貧守分至賣田宅以自給明帝加賜穀帛魏史北齊趙彦深拜卿不脫朝服先入見母跪陳幼小孤露蒙訓至此北史張奐拜太常立節可否之間强禦不敢奪漢書劉愷論議常引正大義諸儒為之語曰難經伉伉劉太常後漢傳記唐龍朔二年改太常為奉常咸亨復舊卿一人總判寺掌禮樂郊廟社稷總太樂鼓吹太醫太卜廩犧諸司廟等署通典趙君錫同知太常禮院時近臣有請祀英宗於明堂配昊天上帝及五帝君錫與禮官建言請專配上帝以稱嚴父之意事畧趙與為太常雖身處上卿而布被瓦器耆舊傳集太常卿位任特隆學冠儒林藝通禮樂者可以居之職員令居九寺之先冠九列之首六帖氣藐神仙逈恩承雨露低相門清議重儒術大名齊軒冕羅天闕琳琅識介珪通籍踰青瑣亨衢照紫泥杜詩寵新卿典禮㑹盛客微文白居易詩正名推五字貴仕仰三珪權徳輿詩平生秉周禮投老奉龍旂張文潛太常有感本朝太常寺皆以禁林之長主判續㑹要中興併省寺監獨存太常又命太常兼宗正紹興復中興㑹典隆興元年詔光祿寺併歸太常寺兼領掌社稷及武成王廟諸壇齋宫習樂之事丞一員罷孝宗㑹要太常總禮樂之政兼伯夷后蘷之事趙君錫討論故實已成綿蕞之儀牋表類太常少卿經小宗伯中大夫二人周禮史後魏太和初置少卿一人唐貞觀置二人龍朔改為奉常大夫帝使少卿祖孝孫以樂律授宫中音樂伎不進數被讓王珪與温彦博同進曰孝孫修謹士陛下使教女樂又責誚之天下其以士輕乎通鑑唐薛稷遷太常少卿會鍾紹京為中書令稷諷使讓因入言於帝曰紹京本胥吏無素才望今特以勲進師長百僚恐非朝廷具瞻之美帝然之遂許讓中令同上傳記唐元儋景雲中授少卿行中以系出拓䟦恨史無編乃撰魏典二十篇學者向之有人得銅器似琵琶人莫能辨行中曰此阮咸所作也雅樂家遂謂之阮咸北史斛斯證博覽羣書尤精三禮兼解音律自謂雅樂廢證博采遺逸始備又樂有錞于者或自蜀得之皆莫識證見之曰此錞于也並職林集帝命詩書將壇登禮樂卿杜牧送崔少卿響切晨趨佩煙濃近侍香司儀六禮冷論將七兵揚合樂来儀鳳尊祠重餼羊卿材優柱石公器擅巖廊栁子厚素尚寜知貴清談不厭貧温庭筠詩奉常之職非特以治郊廟之度服器之數而已國有大政事大議論必稽焉鮮于侁可詔立國之本禮樂為先今之太常實兼其職守兹職者不亦重乎歴代迄今謂之清選職林本朝少卿無職事以為階序品秩元豐正名始有職掌元祐元年吕純禮為少卿御史論門䕃得官不可任奉常於是外補續㑹要中興建炎三年詔太常少卿貟兼宗正少卿中興㑹要寺丞史奉常秦官有丞漢多以博士議郎為之後漢諸丞皆掌行禮及祭祀小事總署曺事皆銅印墨綬歴代皆有唐因隋太常丞從五品下凡享太廟則修七祀於兩門之内分判寺事通典韋宏為丞父賢以宏當嗣太常職掌陵廟煩劇多過教宏自免懷嫌不去官及賢疾篤宏坐廟事繫獄漢書傳記太常丞視尚書則銅印黄綬一梁冠宋百官春秋晉宋九卿置丞進賢一梁冠介幘衣皂文唐天后時李嗣真聞東夷三曲一遍授胡琴彈之無一聲遺忘並職林陶覆之凡宗廟疑義多所決定時人為之語曰定禮決疑問陶覆之陶氏家傳集臨風曲臺淨對月璧池寒權徳輿詩暫輟清齋出太常重攜詩卷赴甘棠劉禹錫詩五兵不用百度載光誕敷文教式奏薰弦命太常以修樂將享帝而配天六變而天神可禮九成而帝徳惟休唐馬周本朝皇祐中詔差禮官一貟兼丞事李泌之請也建炎三年省丞紹興三年復置范希純為太常丞舊制太廟薦享逐室設席食一牙盤元豐四年奏罷之希純奏請復舊制易其名曰薦羞事畧陳文惠公堯佐居官不妄進取屢為太常丞十三年不遷言行錄寺簿傳記主簿漢有之鹵簿之制太常駕四馬主簿前八乘魏晉亦有之唐置二人掌付事勾稽省置抄目監印給紙筆等事餘寺主簿並同㕔通典職林龍溪除蘇良治簿領雖卑然𨽻於太常與聞禮樂之事非他官比也職畧集聞道甘泉能獻賦懸知獨有子雲才王維和太常韋主簿詩曲臺簿正多廊廟西府璇樞第一人詩集本朝皇祐中宋祁乞增置一貟勾檢在寺文書及掌出納遂除胡瑗後詔更不置元豐正名初除王子琦職畧李浩除太常寺簿輪對陳無逸之戒且論宿衛大將恩寵太過髙宗感其言宿將旋就第自檜扼塞言路士風寢衰至是與王十朋馮方查籥胡憲始相繼有所開陳號五賢聞者興起太學之士至為五言詩以述其事言行錄籍田令經春籍田而祈社稷也詩序甸師帥其屬以掌耕耨也周禮史周為甸師漢文帝感賈誼之言始開籍田置令丞掌耕國廟社稷之田春始東耕於籍田祀先農大賜三輔二百里孝弟力田三老帛種百榖收萬斛立為籍田館榖皆以給祭天地宗廟羣神之祀漢書傳記晉武置籍田令江左省宗元嘉中又置通典集帝籍開千畝農功先九州王孫守耒耜吏隠極風流黄山谷規地餘千畝三推示勸耕廩犧猶故宇潑麥有新楹日至土膏動雪消泉脉生城中若羈束野徑得閒行蔣之竒本朝元豐三年詔籍田令𨽻太常寺續㑹要渡江初闕紹興十五年初除康與之為籍田令三十一年詔田籍司權罷官吏並罷後復置中興㑹要宗正卿史劉向蕭望之薦向宗室忠直明經有行拜為宗正漢書劉般在朝竭忠盡節夙夜不怠拜宗正同上晉羊祜忠厚篤重然不長於理劇宗正卿秩不知可轉作否晉書後魏世祖謂崔浩曰天下諸社何處最欲取一人以為宗正浩曰中書博士杜銓合為諸社之最即命召之既見銓器貌瓌雅世祖謂浩曰此真吾所欲也以為宗正魏史唐宗室司訓棄官中宗即位以耆舊擢為宗正卿唐書傳記秦置宗正掌親屬漢因之以叙九族唐武徳置宗師龍朔改曰司宗開元二十五年置宗正寺官屬皆以皇秩為之通典宗正星在帝座之東南職林宗正寺卿一人少卿二人掌天子族親屬籍以別昭穆通典集丈人領宗卿杜甫詩宗正為冷卿東坡詩巍巍帝堯欽親九族經哲宗伯禮為攸訓屬有攸籍各有胄子世以不錯伯臣司宗敢告執政揚雄宗正箴本朝宗正寺判寺事二人以宗姓兩制以上充闕則以朝官以上知丞事掌奉宗廟諸陵薦享之事司皇族之籍職略建炎三年九月宗正殿曰玉牒殿堂曰屬籍堂㑹要宗正少卿史後魏太和中初置宗正少卿北齊亦然隋皆有職官唐李漢為少卿通古博學屬辭雄蔚唐史本朝祥符中給舎以下兼少卿元豐始正名焉中興罷寺監詔太常少卿兼宗正少卿紹興三年復置少卿六典宗正寺丞史秦宗正掌親屬有丞漢用皇族後漢一人劉茂為宗正丞歴代皆有之隋有二人唐一人掌判司事通鑑漢劉徳召見甘泉宫武帝謂之千里駒昭帝時為宗正丞復為卿漢書集清時為丞郎氣力侔陶鈞劉禹錫本朝元豐五年正名初除趙君錫明年以楊畏為宗正寺丞詔宗正寺除長貳外自今後更不專差國姓續㑹要建炎三年罷紹興五年復置中興㑹要宗正寺簿傳記梁天監七年置北齊隋皆有唐因之通典主簿一人掌印及勾檢稽失分紀開元加一人並於宗室中擇才行者補受六典本朝天禧改元以衛尉丞趙鼎兼宗正寺簿元豐正名初除楊完職略元祐元年宗正寺言既許主簿通管寺事竊恐亦合依太常寺國子監例正通管雜務其編纂圗書乞依舊例丞專修從之㑹要大理卿經帝曰臯陶汝作士五刑有服帝曰臯陶惟兹臣庶罔或干於正汝作士明于五刑以弼五教書史秦置廷尉掌刑辟有正左右監漢因之景帝更名大理武帝復為廷尉宣帝置左右廷尉平哀帝復為大理卿于定國父于公其門閭壞父老方與共治于公曰可髙大其門令容駟馬髙車我治獄多隂徳子孫必有興者至定國為丞相于公為郡曺決獄稱平漢書于定國為廷尉其決獄平反務在哀鰥寡加謹審之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃當漢張釋之為廷尉周亞夫見釋之持義平乃結為親友由此天下稱之前漢書漢宣帝路温舒為廷尉吏上言秦有十失其一尚存治獄之吏是也同上王殷為大理務在寛恕與鍾繇以治獄見稱魏志傳記大理古官也舜命臯陶作士正五刑隋為大理寺唐因之卿一人少卿二人龍朔二年改為詳刑寺咸亨復職略孔坦遷廷尉卿獄多囚繫坦到官躬執辭狀口辯曲直每臺司錄獄無所顧問皆面決當時之事初學記鄭善果為大理卿奉法持正風稜顯於公卿范說為卿持法明審並職林集上卿才大名不朽早朝至尊暮求友髙適晏大理寺卿憐君獨守廷尉法知君決獄有隂功蘇東坡送蔡冠卿恩霑庶類道格𤣥功化覃於萬國之間苛慝不作鳥巢於圜扉之内囹圄知空足驗時清可知刑措韓鎡賦蒼鷹莫鷙寜懷獄吏之憂踈網無寃豈有虞人之懼同上本朝大理寺以朝官一貟或二貟判寺官一貟兼少卿事建隆二年以工部尚書竇儀判寺事㑹要太和四年大理卿崔杞奏大理寺卿陛下守法之司卿設官之重揺動若朝示而暮改同罪而異刑則人何所措其手足哉續通典以五聽察其情氣色視聲辭以三慮盡其理明謹以獻疑獄哀矜以去寃獄公平以鞫庶獄六典少卿史開元初班景倩自揚州採訪使入為少卿過州倪若水餞於郊顧左右曰班公是行若登仙吾恨不得為騶未㡬入為戸部韓瑗武徳初為大理少卿受詔掌定律令瑗言於髙祖曰官吏至公自當奉法髙祖然之於是採定開皇律並唐書唐太宗謂侍臣曰大理之職人命所懸當選正人用心存法無過戴胄者乃以為少卿唐書唐孫伏伽為少卿帝數出馳射伏伽諫之唐史傳記後魏置少卿北齊及隋因之唐置二人六典唐徐有功轉司刑少卿皇甫文備誣有功縱逆黨久之文備坐事下獄有功出之或曰彼嘗陷公於死今生之何也對曰爾所言者私忿我所守者公法不可以私害公白帖集佐棘竟誰同因思證聖中事雖無復報理合有隂功韓詩居屈亞卿未副羣情韓文本朝以朝官一貟兼少卿事神宗置大理獄少卿二貟以蹇周輔楊汲為之分左斷刑右治獄四朝志建炎中興省大理卿而少卿二貟如故中興㑹要仁宗時陳大素權大理少卿又判大理寺號為明習法令長編參典之官貳正之選南豐擬制大理正經成獄辭史以獄成告於正正聽之禮記史秦置廷尉正一人漢廷尉正監及平謂之廷尉三官秩千石職官分紀宣帝聞黄霸持法平易為正數決獄廷中稱平漢書晉顧榮以南土秀望累遷廷尉正晉志正志暗為大理正奏言法令者人之隄防不立則人無所禁竊見大理官貟多不奉法以縱罪為寛恕以守文為苛刻遂上應正論以見志唐書大理正掌參議詳正科條之事唐志傳記龍朔改為詳刑大夫光宅中為司刑正後復故掌議獄正科條凡丞斷罪有不當者則以法正之唐紀視南臺持書以為晉制通典天隂雨比干夢貴客車騎滿門覺以語妻語未已有老嫗謂比干曰公有隂徳今天賜君䇿因出懷中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此自汝隂徙平陵代為名族何氏家傳集古風真往哲雅道濫朝聞活獄威豪右銷時賴典墳垂銀棘庭印持斧栢臺綱范咸送大理正攝御史詩本朝神宗復置大理獄後置寺正元豐五年刑部奏乞分評事司直與正為斷司丞與長貳為議司凡斷案先上正㸔詳當否論難改正然後過議司覆續㑹要建炎併省斷刑治獄寺正各置一貟中興㑹要范旻判大理正事持法平允太宗實錄正於理官參贊為正南豐陳林純制司直史唐王祚為司直馳傳決獄所至仁平唐書傳記後魏永安三年髙穆奏置司直十人位在正監上不署曺事惟覆理御史檢劾事六典司直凡承制而出先請魚書以往白帖司直凡大理斷獄皆連署同上集清絶聞詩語䟽通豈法流傳家有衣鉢斷獄盡春秋東坡不耻青袍故尤宜白髮新李嘉祐送韋司直驊騮事天子辛苦在道路司直非冗官荒山甚無趣杜甫本朝熙寜中置大理寺獄至元豐五年始命程嗣先四人為司直續㑹要建炎三年詔斷刑司直兼治獄司直其治獄司直罷中興㑹要評事史漢宣帝地節三年初于廷尉置左右平貟四人漢書馬宫行能髙潔遷廷尉平漢書漢宣帝詔曰吏用法巧文滋深其為置廷平務平之於是選用于定國黄霸等同上何攀上便宜十事除廷尉平晉史唐姚正操云自餘以評事入臺後相繼不絶韓琬以為不然自則天好法刑曹望居九寺之首以此評事多入臺迄今為雅例唐志傳記魏晉以来無左右而直謂之廷尉評隋置大理評事六典唐貞觀二十二年褚遂良議重法官奏置評事十貟掌出使推覆後加為十二貟通典王敬由為評事奉使河南叱咤風生到廣陵訪裴諶諶曰評公使車留此一宿得無驚郡將乎廣記漢公孫𢎞舉何比干為廷尉右評獄無寃民號曰何公三輔决録寺簿史陳希㸃為太學博士遷大理寺簿人為之憤然公忻然就職素不讀律而原情引經法家自以為不及本傳傳記晉初置廷尉主簿六典後齊九寺各有主簿唐置二人掌印省置抄目勾檢稽失同上薛季宣為大理主簿是歲江湖大旱流民往往北渡江邊吏復奏淮民多欵塞者遣公行淮西收以實邊公持節勞来吕東萊集集法吏多少年磨淬出角圭將舉汝愆尤以為已階梯韓愈本朝元豐正名初除二貟建炎三年省後復中興㑹要司農卿經太府掌九賦九貢禮史秦為治粟内史主穀貨韓信歸漢為治粟内史即其任也景帝更名大農令武帝太初更名大司農漢書魏梁習為并州二十餘年政治為天下最召拜大司農魏志鄭當時為大司農門下客亡貴賤亡留門者山東諸公翕然稱鄭莊武帝曰吾聞鄭莊行千里不齎糧漢書朱邑治行第一為大司農居處節儉漢書後漢鄭衆為司農在位以清正稱趙典為大司農閉門却掃非德不交並後漢書傳記少皥氏以九扈為九農正通典唐有司農卿一人少卿二人龍朔二年改為司稼咸亨復卿掌邦國倉儲委積之事通典牟融為大司農性明達稱為名卿東觀漢記陳寵為廣漢太守風聲大行入為大司農張播記唐杜中立遷司農卿初度支度六宫餐錢移司農季一出付吏大吏盡舉所給於人權其子錢以給之既不以時黄門来督責慢罵中立取錢納帑舎率五百一出吏不得為奸遂以為法唐書集以清明之徳掌周稷之粟國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不作兹選假以秩崇之榮用制國泉之重裴司農制本朝司農寺判寺事二人以兩制或朝官以上充熙寜二年立常平斂散法三年詔以新法付司農寺而農田水利免役保甲等法悉自司農講行建炎三年詔罷司農寺紹興四年復置司農寺卿少各特置一貟中興㑹要少卿史後魏北齊司農寺置少卿隋唐因之職官唐韋機拜少卿有宦者於苑中犯法機杖而後奏髙宗嗟賞賜絹數十疋唐書韋機受詔檢授東郡營田苑囿之事髙宗謂之曰宫館隋代所造漸將摧毁頻修費財力如何機奏曰臣任司農向已十年前後省費今見貯錢三十萬貫可以供葺理上恱同上本朝元豐間置少卿為卿之貳建炎三年省紹興四年後置司農卿少各一員中興㑹要熊本判司農寺丞神宗曰熊本不傷財不害民一旦去百年之患檄奏詳明可嘉也東都事畧寺丞史秦治粟内史有兩丞漢司農丞亦二人或謂之中丞耿夀昌為大司農中丞奏設常平倉給北邉省轉運又桑𢎞羊為大司農中丞管諸㑹計事唐有丞六人掌判寺事凡天下租稅及折造轉運於京師皆閱而納之以供國用以祿百官百官志本朝呂惠卿請置司農寺丞一貟熙寜五年增置丞四貟元豐四年舒亶請止留丞一貟餘並罷續㑹要建炎二年詔罷司農寺紹興三年復置寺丞二貟中興㑹要寺簿傳記晉太康中置主簿一人自後無聞梁陳又有北齊亦然唐主簿二人掌印署抄目勾檢稽失出納通典本朝治平中已置主簿熙寜新法行詔增置一貟五年增至四貟後又置六貟續㑹要建炎三年罷司農紹興十年復置中興㑹要太府卿史太府之職以二法平物一曰度量二曰權衡唐百官志李襲譽召為太府為人嚴慤以威肅聞本傳楊崇禮開元為少卿雖錢帛充牣丈尺皆躬自省閱時以為前後無與為比擢拜太府卿本傳傳記周官太府下大夫掌九貢九賦之貳九功受其貨賄之入頒其貨於受藏之府秦漢以下不置唐初置之龍朔二年改太府為外府正卿咸亨復楊國忠判度支𤣥宗觀左藏庫喜其財幣山積面賜國忠金紫權太府卿國忠專於左藏府而太府四時以數聞通典集領貢獻於四方杜彼虛耗掌財用於五庫職有司存白樂天居監臨之官典出入之務同上㑹帑藏出入之要修權量平校之法同上本朝太府寺判寺事一人以兩制或帶職朝官充凡財貨廩藏貿易四方貢賦百官俸秩皆𨽻三司本寺但掌供祠祭香帛帨巾神位席及造斗秤升尺而已元豐改制始正職掌四朝志財賦掌於他官而太府司其出納非明於金谷之要不在兹選南豐集少卿史後魏孫詔為少卿帝問卿何年老對曰臣年雖老臣節尚少北史尹思貞為司府少卿時侯知一亦厲威嚴吏人為之語曰不畏侯卿杖惟畏尹卿筆唐書傳記後魏孝文帝改少府為太府置少卿一人北齊因之隋煬帝加至二人唐減一人貞觀初龍朔咸亨光宅神龍並隨寺改復六典集出納之地眷求惟精兼領三尚之班以榮四至之列白樂天制本朝太府寺同判寺一人以京朝官充元豐正名置少卿一人以為卿之貳元祐三年詔太府長貳並置餘則否續㑹要建炎中興省紹興四年復㑹要九賦領受之政百貨貿遷之法典領之任位次列卿南豐集寺丞傳記丞於周官為太府上士之任梁選部太府丞一人陳因之後魏亦一人後周曰太府上士隋又曰太府丞六人唐四人通典太府掌邦國之出入而丞屬分治衆務職略本朝元豐改制置丞二人元符中增一貟宣和中省一貟紹興三年詔復置㑹要太府受邦國之出入而設丞屬俾預叅贊欲勝是任必惟其人國朝制寺簿傳記主簿亦周太府下士之任梁置一人陳因之後魏一人隋四人唐二人掌印省署抄目勾檢稽失通典本朝元豐改制置主簿二人續㑹要建炎三年罷太府寺紹興十年復置中興㑹要光禄卿史光禄寺卿一人從三品少卿二人從四品百官志龍朔二年改光祿寺曰司宰寺光宅元年曰司膳寺同上杜林為光祿勲内奉宿衛外總三署周密敬慎選舉稱平漢書王肅為光祿勲時有魚集武庫肅辨之曰魚生於泉而見於庫失其所也邊將殆有棄甲之變後果有東闗之敗魏志傳記光祿卿漢官也齊職儀云初秦置郎中令掌宫殿門戸及主諸郎之左殿中侍衛故曰郎中令漢因之至武帝更名光祿勲至梁加卿字初學記孫湛為光祿以清廉見稱東觀漢記集經兆宫室畫為中外廊殿門闥限以禁衛楊䧺光祿箴德人立朝義士充庭祿巨司光敢告執經同上本朝光祿寺判寺事一人以朝官以上充元豐官制行置卿少卿丞主簿各一人中興後廢光祿併入禮部通考太僕卿史太僕寺卿掌廏牧輦輿之政總乗黄典廏典牧車府四置及諸監牧行幸供五路屬車百官志永徽中太僕司曰司馭光宅元年改曰司僕寺同上夏侯嬰為沛公太僕常奉車嬰自上初起常為太僕竟髙祖以太僕事惠帝髙后漢書石慶為太僕御出上問車中㡬馬慶以䇿數馬舉手曰六馬慶於兄弟中最為簡易而猶如此同上晉郭展為太僕心精於養畜是以馬充盛其後伐吳得以濟事晉史傳記太僕周官也秦因之掌輿馬歴漢後魏及晉兩朝咸置之初學記穆王命伯冏小大之臣咸懷忠良其侍御僕從罔匪正人外記後漢祭彤字次孫膂力過人入為太僕從上至魯昭帝入孔子廟至子路室曰此太僕之室也太僕吾之禦侮東觀漢記集周用忠良任先伯冏漢推廉正選在萬年守清近之臣居僕御之任白樂天朝欽厥庸出尹京畿迴授太僕四牡騑騑騄耳盈箱翠華葳㽔勲齊庭實增國之輝孫楚本朝太僕寺判寺事一人以朝官以上充凡邦國廏牧車輿之政令今分𨽻郡牧司騏驥院諸坊監本寺但掌天子五輅屬車后妃王公車輅給大中小祀牛羊通考鴻臚寺史鴻臚寺卿一人掌賓客及凶儀之事百官志漢郭况為鴻臚上數幸其宅飲酒賞金帛甚豐京師號况家為金穴漢書劉義節為鴻臚卿時傾府庫為軍賞帑財大乏義節曰今京師屯兵多樵貴帛賤若伐街苑樹為薪以易布帛歲數十萬可致唐史郭晞為鴻臚卿河中軍亂父子儀召首惡誅之其支黨猶反及晞選親兵巡警以備非常奸人不得發以功拜殿中監本傳傳記鴻臚卿漢官也周禮大行人掌賔客及諸侯朝覲事即其任也漢因之景帝更名大行令武帝改曰大鴻臚初學記韓宣為大鴻臚始南陽曲阜韓暨以宿徳在宣前為大鴻臚及宣在官亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行相何如魏略集漢尚勲賢寵崇郭况魏惟恒准選在崔林况當柔逺之朝宜遵典屬之任白樂天大小上下不可奪倫鴻臣司爵敢告在隣揚雄鴻臚箴本朝鴻臚寺判寺事一人以朝官以上充凡四裔朝貢燕享迎送之事分𨽻國信所都亭懷逺驛禮賔院本寺但掌祭祀朝㑹喪塟之事中興後併廢入禮部㑹要記纂淵海卷三十一
