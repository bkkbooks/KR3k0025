body:
  text: 記纂淵海卷三十五宋潘自牧撰職官部幕官枚乗為大國上賓與英俊並㳺漢書虞翻㑹稽人太守王朗㑹接以交友之禮魏志陶侃鎮武昌軍殷浩庾翼等皆為佐史時武昌號為多士晉書謝安王坦之甞詣桓温論事温令郄超帳中臥聽之風動帳開安笑曰郄生可謂入幕之賓矣同上王儉用庾杲之為衛將軍長史蕭緬與儉書曰盛府元僚實難其選庾景行泛緑水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之南史王子猷為桓温車騎參軍温謂曰卿在府久此當相料理初不答以手板拄頤云西山朝來有爽氣晉書郭子儀幕府六十餘人皆為將相顯官李藩在徐州辟為從事居幕中謙謙未甞論細微劉三復長於章奏李徳裕期待之鎮浙西及畿甸皆參佐賓筵崔衍為宣歙池觀察使其所擇從事皆得名流劉蕡對策極言中官權盛令狐楚牛僧孺辟為從事待如師友權徳輿未冠以文章稱韓洄李兼杜佑裴胄交辟之唐書傳記李逢吉始從事振武日金城寺僧忽見一人介胄持斧由門而入俄聞報李判官來僧具以告自是逢吉每造其室即見其人先至率以為常故逢吉出入將相二十餘年廣記集翹車著詠戔帛垂文式重弓旌以光樽俎允奉幕中之畫以稱席上之珍乾祐勅烏重𦙍鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以温生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤送温造序忽騎將軍馬自號報恩子風雲入壯懐泉石别幽耳送石處士赴河陽幕從軍古云樂談笑青油幕郾城夜㑹城上赤烏呈瑞氣眉間黄色見歸期幕中無事惟須飲即是連鑣向闕時韓愈歸路芙蓉府離堂玳瑁筵劉禹錫送陸侍郎安西幕府多才雄喧喧惟道三數公繡衣貂裘明積雪飛書走檄如飄風李白數論封内事揮發府中趨杜詩直道事人男子事異鄉加飯弟兄心還須整頓韋絃佩莫獨吟誇玳瑁簪杜牧送弟顗文苑臺中妙冰壺幕下清韋應物本朝晏元獻延賓客一時名士多出其門為西京留守幕下士王琪張亢最為上客分紀簽判史唐令狐楚辟為太原從事自書記至節度判官才思清麗每太原奏至徳宗能辨楚之所為武元衡節度劍南柳公綽裴度俱為判官鄭從讜為河東節度表王調劉崇龜趙崇李渥崔澤等為判官書記支使皆一時選唐書本朝有兩使防團軍事推判官皆以選人充太平興國中以贊善大夫十五貟充諸州節度判官以王化基韋亶武元穎等為之且令綿歴觀其佐治之才也蓋太宗以諸州戎幕缺官選朝士補之俾分理事且試其才能此簽判所由始也蓋選人則為判官京官則為簽判或謂簽書判官之名不正政和初改為司録建炎復舊職源簽盛府之元僚胡文恭行周詢制推官判官史大厯中東都留守楊再思王方慶共引徐堅為判官方慶學禮常就堅釋疑晦堅屬文典厚再思每目為鳯閣舎人様李瓊鎮桂管奏柳璧為判官軍政不愜璧極言不納拂衣而去狄仁傑孫兼謨元和末解褐襄陽推官言行剛直使府知名韓退之為武寧張建封府推操行堅正鯁言無所忌裴度東都留守辟皇甫湜為判官度脩福先寺求碑文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之湜援筆立就度曰不羈之才也崔造與韓㑹盧東美張正則三人友善皆自謂王佐才故號四䕫浙西觀察李栖楚辟為判官唐書後唐長興詔推判官各限年任惟績效拔異文學超邁擢任不限年五代史傳記唐天寶後有判官之名後唐長興二年始有兩使判官防團推官軍事判官等是時判官多本州自辟舉清泰中始擇朝士用之職源張建封奏李藩為判官有新羅僧能相人李判官至僧降階迎曰判官是紗籠中人宰相冥司必以紗籠䕶之恐為異物所擾也互見宰相類集今之俊乂先辟為征鎮次升於朝廷故幕府之選下臺閣一等異日入為大夫公卿者十八九焉千里之行始於足下苟自強不息亦何逺而不届哉温堯卿制學業才畫堪置幄中李石等制佐相幕府孫簡制藩隅之重委以侯伯軍府之要掌在賓僚佐廉問澄清之務撫華夷錯雜之人俾其乂安實在參贊路費制並白集以佐賓幕杜牧行馮軒制運籌盛府言必端詳出保傅之重鎮之以屏王室擇賓從之賢佐之以齊政經俾陟賓階奉我元老俆騎省集樽前失詩流塞上得國寶送長孫判官生知七曜歴手畫三軍勢冰雪凈聰明雷霆走精銳幕屬輟諫官朝廷無此例送樊侍御為判官吾聞駕鼔車不合用騏驥送從弟亞珊瑚市則無騏驥人得有早年具標格秀氣衝牛斗贈判官入幕未展才秉鈞孰為偶崆峒使節上清霄杜甫將取離魂隨白騎三台星裡拜文星送斛斯判官燕臺上客意何如寄浙西李判官處士聞名早逰秦獻疏囘腹中書萬卷身外酒千杯江雨春波濶園林客夢催今君拜旌㦸凛凛近霜臺杜牧本朝兩使置判官推官各一人餘州置推判官各一人政和初自判官至諸曹改為士户儀兵刑工曹掾建炎復舊職源結綬賓筵夏英公除李象之制豫籌幕府胡文恭行朱逵制擢參賓謀陸起等制書記支使史魏陳琳阮瑀並為管書記室太祖先苦頭風臥讀琳所作檄頭風頓愈又太祖適近出瑀於馬上具草書成太祖覽畢欲有所定竟不能増損魏志梁建王以江革為征比記室參軍弟觀兼書記沈約任昉與革書曰雍州妙選英才文房之職總卿兄弟可謂駕二龍於長途騁騏驥於千里梁書陳武帝引趙知禮為書記為文甚速毎占受軍書下筆便就南史韋陟奏常元甫充支使元甫有器局精於簡牘所蒞有聲裴度表舒元輿掌書記文檄豪健一時推許文宗謂侍臣曰近日諸侯奏語太浮華有過典實宜罰掌書以戒其流李石曰古人因事為文今人以文害事牛僧孺鎮揚州辟杜牧為節度府書記數年召拜侍御史僧孺餞之曰以侍御史風槩逺馭固當自極夷塗李商隠能為古文不喜對偶始為今體章奏博學強記下筆不能自制唐書傳記書記支使自魏以來有其名陳有文房書記之任唐景龍中元帥府置掌書記一人節度使亦置焉掌朝覲聘問慰薦祭祀祈祝之文與號令陞黜之事後唐長興中有書記支使職源蕭穎士止陳留逆旅有一老人目之曰君一似鄱陽王蕭驚問老人曰某姓左昔為鄱陽書佐同安志集書記之任亦難矣元戎總齊三軍之事統理所部之甿以鎮定邦國贊天子施教化凡文辭之事皆出書記非閎辨通敏兼人之才莫宜居之志同而氣合魚川泳而鳥雲飛樂是賔主之相得也儀之智足以造謀才足以立事忠足以勤上恵足以存下而又侈之以詩書六藝之學先聖賢之徳言以成其文以輔其質宜乎從事於是府而流聲實於天朝也韓文夫幕使之道有事必言知無不為杜牧行韋瓊制續漢百官制三公大將軍皆有記室主上表章報書記雖列於上宰之庭然本為從事之職揚雄稱軍旅之際飛書馳檄用枚臯非天機殊健學源濬發含思而九流委輸揮毫而萬象駿奔如庖丁提刀為之滿志師文鼔瑟效不可窮則不能稱是職也其簡才之用亦金馬石渠之亞僕射髙貞公節度令狐公以人文掌宸翰國子司業鄭公給事河南尹杜公以才華登貴仕繼斯躅者不亦盛歟李文饒集軍旅之事不可無佐奏記之任不可非才侯藩載筆徐騎省集書記赴三捷公車留二年杜詩本朝乾徳二年詔立兩任有文學者許兩使留後奏充掌書記太平興國六年詔諸節度州依舊置觀察支使一貟凡書記支使不得並置有出身曰書記無出身曰支使㑹要以幹力參幕書公是行趙庶明制參畫之筵胡文恭行蘇澄制録事參軍史杜景佺性嚴正為益州録參逆折房司馬之不視事吏歌之曰録事意與天通州司馬折威風由是寖知名裴澥為陜府録參李勉除觀察召澥曰素聞公名朝中親友話公美事請置在賓席顔杲卿為魏府録參振舉綱目政稱第一唐書傳記後漢有郡主簿官在漢魏間及江左為督郵主簿掌總録衆曹文簿舉彈善惡後魏洎隋皆有録事參軍煬帝置郡有東西曹掾及主簿唐武徳復為録事參軍開元改司録參軍掌正違失蒞符印後唐應順間州置録事參軍職源道州録參王沼與楊炎有微恩及炎入相舉沼拜監察御史始減公議南部新書喬琳歴果綿遂懐四州刺史甞謂録事參軍任紹業曰子綱紀一州能劾刺史乎紹業出條所失示之驚曰能知吾失御史才也分紀孫卲為孔融功曹融曰廊廟才也後為呉相呉録録事參軍務舉善彈非書抄督郵郡之極位漢官儀大和七年中書門下奏録事參軍糾察屬縣課責下僚一郡紀綱藉其提舉續通典掌總録衆曹管其文案自上佐法意違失者彈正以法掌凡諸司察之事平寶司徒儀集君為京兆司録諸曹白事不敢平面視揖起趨去無敢間語縣令丞尉如嚴京兆事以幹治公為京兆府司録與一府政故相崔圎尤狎愛州民丁某至親省其家後大衙㑹日司録君趨以前曰請舉公過公與小民狎至其家害於政圎驚謝乃自罰韓文君轉隴州録參時劉仁軌以宰相之貴持節此州坐帷中主諾責下君提綱未幾羣轄載孚劉公坐嘯以為能也陳子昻集王符君志往參都録雅有能名宜列府聨之職俾展官常之效紀綱大府利可析滯明可照奸常集為樞為相何莫由斯權集向事圭符實司綱紀徐騎省集操持紀綱地喜見朱絲直杜詩本朝諸府為司録諸州為録事不盡置也乾興元年諸州始各置録事參軍慶歴二年河西河東陜西諸州權令京官知録事參軍㑹要政和三年尚書省言參軍之稱起於行軍之際恐不當襲奉聖㫖參軍改為掾職畧建炎復舊掌州縣庶務糾諸曹稽違中興㑹要元符中陳察乞監司嵗舉明謹端慤善治獄充録事政和尚書省言録參充近上曹官續㑹要任紀綱於州事胡文恭行尹立制擢從州簿唐節制馴致州綱張日嚴制表率諸曹樊克明制督郵綱掾之峻閻仲宣制司理參軍本朝五代以來諸州皆有馬步獄以牙校充馬步都虞候掌刑法謂之馬步院太祖慮其任私髙下其手開寶六年始置諸州司寇參軍後改為司理掌獄訟勘鞫之事職源國朝别置以專鞫獄事劇者置二人太平興國九年詔曰司理參軍專於推鞫研覈情實尤在得人宜令本州於見任簿尉判司内選明敏有官業者充分紀雍熙詔不得與帑藏之事自端拱淳化以來皆上躬自選擇仍詔掠囚皆依律令祥符五年薛顔請自今司理誤入人徒已上罪者令批歴依例守選庶有所懲職畧鮮于侁為江陵右司理慶歴旱求言侁條當世之失有四其語切直唐介稱其名於上官交章乞薦侁盛言左參軍李景陽之美乞移與之介益以為賢四朝史司户參軍史張元素仕隋為景城縣户曹竇建徳陷景城將殺之邑人千餘請代曰此清吏殺之是無天也李素立髙祖令授七品清要官所司擬雍州司户上曰此官要而不清裴琰之為同州司户年少刺史李崇義輕之州中積年舊案數百道崇義促琰之判琰之命書吏數人連紙筆湏臾剖判盡畢由是大知名謂之霹靂手李元紘遷雍州司户時太平公主與僧爭碾磑元紘判還僧寺長史竇懐貞促令改判元紘大署判後曰南山可移此判終無搖動唐書傳記曹羣也户曹民所羣聚釋名漢魏以下有户曹掾主民户北齊以下與功曹同隋有户曹參軍文帝時為司户參軍煬帝為司户書佐唐開元復為户曹參軍掌户口籍帳婚姻田宅雜徭道路之事梁開平省六曹掾屬留户曹一貟通判六曹通典及分紀王宗銖謫授雍州司户參軍問吏曰參軍何官衣何衣吏曰下州判司緑衫槐笏而已宗銖大笑曰若頭更斬去吾何能作措大官耶九國志集祠曹賦籍之要司以三語自試白侍郎集本朝掌户籍賦稅倉庫受納職畧乾道六年汪大猷乞令司户專主倉庫中興㑹要司法參軍史張湯以倪寛為奏讞掾以古義決獄漢書郭洪為潁川郡決曹掾治獄四十年用法平正郡内比之東海于公後漢書韋仁夀大業末為蜀郡司法書佐斷獄平恕得罪者曰韋君所斷罪死而無悔隋書狄仁傑為并州法曹親在河陽仁傑登太行山及見白雲孤飛謂左右曰吾親舍其下藺仁基曰狄公之賢北斗以南一人而已鄭從質母老當使絶域仁傑謂曰太夫人有危病而公逺使豈可貽親萬里之憂乃請代行徐有功累轉蒲州司法不行杖罰吏人感其恩信遞相約曰若犯司法徐參軍杖者必斥罰之終於代滿不戮一人顔杲卿為遂州司法性剛正蒞事明濟甞為刺史詰讓正色别白不為屈唐書傳記兩漢有決曹賊曹掾主刑法歴代皆有唐掌律令定罪盜賊之事職源集公為京兆法曹日伏階下與大尹爭是非大尹屢詘己見惟是鄙鈍不通曉於時事學成而道益窮年老而身益困棲身法曹掾何處事卑陬州家申明使家抑坎軻祇得移荆蠻判司卑官不堪說未免捶楚塵埃間法曹貧賤衆所易腰腹空大何能為韓愈文集官決平之司無舞文之過杜牧行楊元汶制本朝掌議法斷刑紹興三年罷後復舊中興㑹要賈易調常州司法自以書生不閑法令每議獄必求合於人情曰人情所在法亦在焉郡中稱平四朝史參法律之曹胡文恭行朱逵制往司三尺之律陳元良制州都監本朝掌本城屯住兵甲訓練差使之事兼在城巡檢資淺者為監押續㑹要四朝志長樂郡夫人髙氏為其弟求亳州兵馬監押真宗曰䕶戎之任實司軍旅趙用為界河巡檢都監虜人畏之以其常乘虎頭船故謂之趙虎頭分紀外領屯衆公是行陳欽明制䕶州藩之兵胡文恭行全克懃制巡檢本朝巡檢司有沿邊溪洞都巡檢或藩漢都巡檢或數州數縣管界或一州一縣巡檢掌訓練甲兵巡邏州邑擒捕盜賊事又有刀魚船戰棹巡檢江湖淮海置捉賊巡檢及巡馬遞舗巡河巡捉私茶鹽等各視其名分以脩舉職業皆掌巡邏議察之事四朝志郭進為西山巡檢有誣告其隂通劉繼元有異志者太祖怒命付其人於進進曰爾能為我取繼元一城一寨不止贖爾死罪請貴爾一官嵗餘其人誘其一城來降進請賞以官太祖曰賞不可濫得也進曰使臣失信則不能用人矣遂賞以一官分紀景徳三年封事者言諸處巡檢務在武勇強明乞不以閩楚江浙川陜人為之上曰人之勇怯豈拘南北若此區别非任人之道職畧當道之衡俾邏四封之警胡文恭行鄭從政制居警邏之司髙尊望制材著幹勤職司警邏能發擿於隂伏多剪除於寇攘林友制排岸司本朝開封府置排岸東西南北四司掌諸路綱船輸納及糧運至京師分定諸倉交卸領各處交卸役卒指揮以備卸綱牽駕以京朝官充二人或一人所貴主轄得雜般舟船催驅卸綱稍㑹要政和六年浙西諸州各置排岸一貟從兩浙運副應安道之請也紹興三年知臨安梁汝嘉請專置行在排岸司又詔添文官一貟七年詔行在建康府置文臣排岸司監官一貟以行在排岸司為名二年為任係京官中興㑹要知縣經縣正各掌其縣之政令周禮子皮欲使尹何為邑曰愿吾愛之使夫往而學焉子産曰今吾子愛人則以政猶未能操刀而使割也其傷實多子有美錦不使人學製焉譬如田獵射御貫則能獲禽若未甞登車射御則敗績壓覆是懼何暇思獲左傳求也千室之邑可使為之宰也子㳺為武城宰子曰女得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也子路使子羔為費宰子曰賊夫人之子子路曰有民人焉有社稷焉何必讀書然後為學子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀論語史子産治鄭民不能欺子賤治單父民不忍欺西門豹為鄴令民不敢欺史記西門豹為鄴令河伯娶婦豹投巫嫗于河西門豹鑿十二渠引河水灌民田至今皆得水利趙簡子使尹鐸為晉陽將行請曰為繭絲乎為保障乎曰保障哉呉芮秦時為番陽令甚得江湖間心號曰番君史記魏襄王以史起為鄴令引漳水灌鄴以富魏之河内民歌曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻梁卜式牧羊上林中上喜之式曰治民亦猶是矣以時起居惡者輒去毋令敗羣試其治民拜緱氏令汲黯遷滎陽令黯恥為令稱病歸田里焦延夀補小黄令愛養吏民化行縣中前漢書卓茂遷宻令吏人親愛而不忍欺教化盛行道不拾遺天下大蝗獨不入宻縣界漢書明帝謂羣臣郎官上應列宿出宰百里苟非其人民受其殃互見郎中類王喬為葉令每月朔望必㑹朝帝怪其來數而不見車騎宻令太史伺望之言其臨至有雙鳬從東南來於是候鳬至舉羅張之但得一雙舄焉第五倫補新都令三年之間鄰縣歸之戸口十倍魯恭拜中牟令郡國螟傷稼不入中牟河南尹袁安使肥親往察之恭隨行阡陌俱坐桑下有雉止其旁旁有兒童親曰何不捕之兒言雉方雛親矍然起曰所以來者察君之政迹耳今蟲不犯境一異也化及禽獸二異也童子有仁心三異也後漢書劉備以龐統為棗陽令魯肅曰士元之才百里不足以展驥足蔣琬除廣都長諸葛亮請曰琬社稷之器非百里之才蜀志潘岳為河陽令植桃李人號曰河陽一縣花陶潛為彭澤令門種五柳郡遣督郵至縣吏白應束帶見之潛嘆曰吾豈能為五斗米折腰事鄉里小兒耶解印去縣乃賦歸去來辭王衍為元城令終日清談縣政亦理晉書丘仲季遷山隂令百姓謠曰二傅沈劉不如一丘前傅琰父子沈憲劉元明相繼宰山隂有政聲仲季長於撥煩吏人號稱神明政為天下第一顧愷之為山隂令晝日垂簾門階閑寂務簡而事理南史房彦謙為長葛令百姓號為慈父立碑頌徳開元初韋濟調鄄城令有詔問所以安人者對凡二百人惟濟居第一馮元叔歴清漳浚儀始平三令右善去惡人稱為神明蔣欽緒子沇歴陸渾盩厔咸陽髙陵四令美政流行郭子儀軍出其縣敕麾下曰蔣賢令也供億得蔬飯足矣毋撓其清唐書傳記周官有縣正春秋時縣大而郡小縣邑之長曰宰曰尹曰公曰大夫其職一也戰國郡大而縣小漢縣令長皆秦官掌治其縣萬户以上為令減萬戸為長侯國為相後漢令掌治民顯善勸義察姦罰惡理訟平賦恤民時務晉制大縣令有治績者報以大郡不經宰縣不得入於臺郎宋諸縣署令銅印墨綬進賢兩梁冠北齊制上中下九等唐制縣有六等之差掌導揚風化撫字黎氓敦四民之業崇五土之利養鰥寡恤孤窮審察寃屈躬親獄訟通典分紀五代任官齷齪無能者始注為縣令職源子路治蒲三年孔子入其境曰善哉恭敬以信矣入其邑曰忠信以寛矣至其庭曰明察以斷矣子謂宓子賤曰子治單父衆說何施而得之也對曰不齊之治也父恤其子子恤諸孤而哀喪紀子曰小節也曰不齊所父事者三人所兄事者五人所友者十一人子曰中節也曰此地有賢於不齊者五人不齊事之而稟度焉孔子歎曰其大者乃此乎惜乎所治者小也宓子賤為單父宰請君之近吏二人戒其邑吏令二吏書方書輒掣其肘書不善則從而怒之二吏歸報於君魯君以問孔子子曰意者以此為諫乎公歎曰寡人亂宓子之政而責其善者數矣遽發使告宓子曰自今以往有便於民者子決為之於是單父治焉巫馬期入單父見夜漁者得魚輒舎之而問焉漁者曰魚之大者名為䲖吾大夫愛之其小者名鱦吾大夫欲長之吾是以得二者輒舎之巫馬返以告孔子曰誠於此者形於彼宓子行術於單父也家語宓子賤治單父彈琴不下堂而單父治巫馬期戴星而出戴星而入以身親之而單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者故勞任人故逸吕氏春秋集縣令民之師帥董䇿詳見太守類明明君侯臨下有赫克隆有光恵我咫尺乃冰其清乃玉其白風抗其髙雲垂其澤君有餘愛民有餘徳江革作傅渾頌於穆君侯英才宣朗聲之所震下應如響明斷決疑易於反掌野有寇盜惟侯屛之我有田疇惟侯闢之古人謹獄惟侯平之凡此三恵如何勿思孫楚梁令孫侯頌荆玉不足喻其徳南金未能方其勵徐卓孔之陽像賛導王者之澤以被于下求庻人之瘼以聞于朝陸宣公草詔用重典以威奸暴鋪太和以恵鰥嫠柳文未下車人懼之既下車人恱之恵如春風三月大化奸吏束手豪宗側目同上吾愛崔秋浦宛然陶令風門前五楊柳井上二梧桐山鳥下㕔事夜蟾落酒中見客但傾酒為官不愛錢河陽花作縣秋浦玉為人范宰不買名弦歌對前楹為邦黙自化日覺氷壺清百里雞犬靜千廬機杼鳴開宰江陽邑剪棘樹蘭芳城門何肅穆五月飛秋霜李白東陽本是佳山水何況曽經沈隠侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雍州落在尋常畫工手猶能三伏凛生秋劉禹錫答于興宗連城為重寶茂宰得才新山雉迎舟楫江花報邑人故人有孫宰髙義薄青雲看君宜著王喬履真賜還疑出上方杜甫本朝建隆元年應諸縣除赤畿外四千戸為望三千戸以上為𦂳二千戸以上為上千戸以上為中不滿千戸為中下五百戸以下為下掌總治民政勸課農桑凡戸口賦役錢穀賑濟及給納之事皆掌之政和二年詔縣令以十二事勸課農桑一曰敦本業二曰興地利三曰戒㳺手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤佃戸十二曰無妄誕㑹要續㑹要乾道二年御筆今後非兩任縣令不除監察御史孝宗㑹要尹洙知河南伊闕縣與穆脩以古文革崑體之弊天下翕然宗之王禹偁知長洲羅處約知呉縣相與日賦五題太宗聞其名召試館職燕肅知臨邛縣民苦吏擾公削木為牘民訟有連逮者書其姓名使召之如期而至通鑑葉庭直知光化縣豐稷知穀城縣人歌之曰葉光化豐榖城清如水平如衡四朝史佩懸銅墨胡文恭行陳亢制施字人之縣譜姚偘制寄懸銅之任劉棻制給懸銅之綬王昭制宜從健令之遷趙況制京畿令史董宣為洛陽令搏擊豪強莫不震慄京師號臥虎民歌曰桴鼔不鳴董少平後漢書顧憲之為建康令性清介強力為政清且美也樂法才為建康令不受俸秩梁武帝嘉其清節曰居職若斯可為百城表矣南史唐貞元間上召京兆府諸縣令對於延英訪以人之疾苦各賜衣一襲韋昭為永昌令輦轂繁要不事威刑而治李頻為武功令畿民多横頻治之無所貸豪猾大驚懿宗嘉之賜緋衣銀魚髙宗擢權懐恩為萬年令賞罰明時人曰寧食三斗塵無逢權懐恩屈突蓋為長安令以威嚴顯時為語云寧食三斗艾不見屈突蓋寧食三斗葱不見屈突通穆宗時京邑多盜賊王正雅為萬年令威震豪強尹公綽言其能就賜緋魚張杜夀為長安令時人以為神明唐書傳記明帝臨觀見洛陽令車騎意河南尹及至而非尤其太盛敕去軒綏漢官儀李果為洛陽令吏民畏之有劉兼者過其境夜聞戸外語聲曰古今正人李令是也見其行事令人破膽我輩可於他縣血食兼開門視之無物乃鬼神也孔六帖集貞元初以甸服長吏天下理本於是親擇郎吏分宰於京師栁文歴宰京劇元和制化神臯之俗常集漢以四科取士求多畧不惑強明決斷者任三輔令漢朝郎官出宰百里故今京邑令缺多令尚書郎補能佩弦以自導帶星以自勤白集輦轂之下豪黠僄輕擾之則獄市不容緩之則囊槖相聚故前代京令得與御史丞分進道路以其捕逐之急也元集赤縣官曹擁材傑杜詩本朝紹聖間詔開封祥符知縣今後差通判以資序充四朝史縣丞史縣丞長吏也縣百戸以上皆有丞尉是為長吏黄霸守潁川許丞年老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起漢書桓譚數言事忤㫖出為安陵丞忽忽不樂張元遷陳倉縣丞清净無欲專心經書後漢書唐臨為萬泉丞有輕囚十數人㑹春暮時雨臨白令請出之悉令歸家耕種與之約令歸繫囚至期畢集詣獄臨由是知名陸景倩為扶溝丞按察使覆州縣殿最有吏言狀曰某清某詐清惟景倩真清宋安恭為龍門丞年已五十八數年而登列岳每謂僚屬曰公輩但守清白何憂不遷唐書傳記漢氏縣丞尉多以本部人為之諸縣皆有主刑獄囚徒後漢署文書典知倉獄署諸曹掾吏自晉後無丞宋惟建康有獄丞隋氏盡用他郡人六典唐髙宗始為品官吏部選授為縣令之貳職林縣有七司丞為副貳如州上佐隋及大唐縣丞各一人通判縣事通典州有上佐縣有丞簿俗謂閒官不領公事殊乖制作之本意續通典裴子雨為下邳令張晴為縣丞二人俱有聲氣而善言語曽論事移時人吏竊相謂曰縣官甚不和長官稱雨贊府道晴終日如此不和也南部新書集丞之職所以貳令於一邑事無所不當問藍田丞㕔壁記丞位髙而偪例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾鴈鶩行以進平立睨丞曰當署丞涉筆占位署唯謹博陵崔斯立種學績文以蓄其有泓涵演迤日大以肆再轉而為丞兹邑既噤不得施用喟然曰丞哉丞哉余不負丞而丞負余庭有老槐四行南牆鉅竹千挺儼立若相持水㶁㶁循除鳴斯立痛掃溉對植二松日哦其間有問者輒對曰余方有公事子姑去韓文丞之位八品以下述六職以輔其治也栁文武功丞㕔壁紀謳吟者不歌其宰頌議者必歸於丞以管輅之才從趙典之任陳子昻集九千里之丹鳳自下升髙七十日之黄龍從微至著張鷟集本朝天聖中開封兩縣始各置丞一貟在簿尉之上熙寧四年編脩條例所言諸路州軍繁劇縣令户二萬以上増置縣丞一貟㑹要元祐元年詔應因給納常平免役置丞並行省罷崇寧二年蔡京言熙寧脩水土之政行市易之法興山澤之利皆王政之大請縣並置丞一貟以掌其事大觀三年詔除舊額萬户以上縣令委是事務繁冗并雖非萬户實有山林坑治之利可以興脩去處依舊存留外餘皆減罷續㑹要建炎元年詔縣丞係嘉祐以前貟缺並萬户處存留一貟餘盡罷中興㑹要主簿史仇覽字季智一名香考城令王渙署為主簿謂覽曰主簿聞陳元之過而不罪得無少鷹鸇之志耶覽曰以為鷹鸇不如鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里非大賢所托乃以月俸資遣入太學其名大振後漢書桓温辟習鑿齒為西曹主簿極為親宻時語曰徒三十年看儒書不如一詣習主簿晉書李畬歴泥水主簿遇事鋒銳徐浩張說見其喜雨五色鴿賦咨嗟曰後來之英也李栖筠有王佐才士多慕向為寇氏簿太守李峴視若布衣交顧少連登封主簿邑有虎孽民患之少連移文岳神虎不為害唐書傳記漢晉有之至隋始復置唐赤縣置二人他縣一人髙宗始以為品官吏部選授掌付事勾稽省署抄目糾正縣内非違唐主簿上轄主諸簿目通典張彖為華隂簿而為守令所抑歎曰丈夫有凌雲蓋世之志而拘於下位若立身矮屋之下使人擡頭不得乃棄官而歸開元天寶遺事閒官不領公事詳見縣丞類集職司符印主掌簿書鳳棲之位鴻漸之資唐制俾之糾邑旌其忠藎之心委以髯鬚之職白集脫身簿尉間始與箠楚辭杜詩本朝開寶三年詔諸縣千户以上置令簿尉四百户以上置令尉令知主簿事四百户以下置簿尉主簿兼知縣事咸平四年王欽若言川陜縣五千户以上請並置簿其餘仍舊以尉兼從之天禧以後諸州縣以漸増置熙寧三年王廣淵請令主簿管稽簿書尉專管督盜依舊外縣事並令通管實録簿尉佐理縣務張昇為楚丘主簿王曽識其有公輔器呉仁澤為雍丘主簿范純仁異之曰簿領中乃有是人耶四朝史善勾邑版之曹能盡地力之教胡文恭行吕英制勾稽之局蘇澄制往勾簿邑之稽段林制勾較簿籍均壹政賦公是馬維震制縣尉史梅福補南昌尉後去官棄妻子去九江至今傳以為仙漢書尉主盜賊凡盜賊發主名不立則推索行尋按察奸宄以起端緒後漢百官制隋仁夀中顔籀按安養尉楊素見籕年弱貌羸因謂曰安養劇縣何以克當對曰割雞焉用牛刀素竒其對到官以幹理聞貟半千授武陟尉嵗旱勸縣令開倉賑貧不從㑹令赴州半千便發粟以給饑人刺史按之存撫使薛元超曰公不能救之而使恵歸於一尉豈不愧也遽令釋之劉仁軌轉陳倉尉部人折衝都尉魯寧縱狠仁軌約不再犯而寧暴横自如仁軌殺之州以聞太宗以為剛正擢咸陽丞蘇珦調鄠尉時李義琰為雍州長史鄠多訟日至長史府珦裁決明辨義琰顧㕔事曰此公坐也恨吾齒晩不及見婁師徳補江都尉揚州長史盧承業竒其才謂曰吾子台輔之器當以子孫相託何可以官屬常禮待也陸贄補渭南尉徳宗立遣黜陟使庾何等十一人行天下贄說使者請以五術省風俗八計聽吏治三科登俊乂四賦經財貨六徳保疲瘥五要簡官事白居易調盩厔尉月餘召入翰林為學士郭元振初為通泉尉任侠使氣武后欲詰與語竒之索所為文章上寶劍篇后覽嘉之唐書傳記漢大縣兩尉小縣一人歴代因之銅印黄綬朝服武冠北齊郡縣置三尉隋改為正後置尉又分為户曹法曹唐初因隋制武徳中復改為正七年復為尉分判諸司事通典髙宗時始為品官吏部遷授職林唐尉分理諸曹如州判司通典按李白贈瑕丘王少府别西河劉少府贈秋浦栁少府杜甫貽華陽李少府當是唐時縣尉多稱少府也類要牛僧孺為伊闕尉縣前灘出不旬日拜察院詳見監察御史類漢雍仲進南海香拜洛陽尉號曰香尉述異記集隠吏逢梅福逰山憶謝公杜詩皎皎鸞鳳姿飄飄神仙氣梅生亦何為來作南昌尉世人若醯雞安可識梅生仙尉趙家玉英風凌四豪搖扇對酒樓持袂把蟹螯李白操斷舉措通乎細大潔㢘檢守形於造次栁文栁渾行狀心不掛細務口不言人非李白為李錫元去思碑黄綬位輕而青雲望重陳子昻送齊少府本朝建隆三年每縣置尉一貟實録元豐五年詔並差使臣元祐元年詔除沿邊縣尉依舊外餘並差選人崇寧元年詔重法地縣尉舊差武臣處並依元豐法續㑹要乾徳元年以大名府元城縣尉張義元為本縣令賞捕盜之功也天下縣尉久廢其任是嵗復置義元首該賞典以激勸之寶元初有明州慈溪尉倜儻不羣雖處賤官而有憂天下之心屢上書言事至和中山陽尉李宗嗔百姓申蝗抑令食之提刑奏劾上怒曰縣尉亦親民之官謂其能慰安於民而不與民除害反傷民命削其官事類守在尉察善於追胥胡文恭行王徳梲制曩居尉督解懐徳制京畿尉史曹操年二十舉孝㢘為郎除洛陽北部尉太祖初入尉廨造五色棒垂門左右有犯禁者皆棒殺之魏志韋貫之自長安尉不數年拜相陸操補長安尉以清幹稱李程為藍田尉有滯獄十年程單言輒判京兆狀最拜監察御史唐書傳記漢長安有四尉分為左右部城東南置廣部尉是為左部城西北置明部尉是為右部黄綬大冠主追捕盜賊伺察姦非六典注魏因之晉洛陽建康皆置六部尉宋齊梁陳並因之唐赤縣置六貟通典嚴安之崔譚俱為赤尉安之令五伯執大杖譚益大其杖如椽安之復令執小杖譚益小其杖至如節安之令五伯空手行乃不能學見聞紀畿尉入御史為佛道入評事為仙道入京尉為人道入畿丞為苦海道入縣令為畜生道入判司為餓鬼道御史臺紀拾遺立𦂳評事出𦂳赤尉坐𦂳俗號為三𦂳官西京記本朝建隆初置尉一貟至和二年開封祥符二縣増置一貟㑹要尉於北部著發奸擿伏之能胡文恭行陳禹臣制監當官集以幹蠱之才領鹽鹵之務管摧條制動皆得宜白集裴𢎞泰制榷東池鹵生息倍稱元集唐慶制鹽鐵榷束之籍杜牧行李鄠制公幹池鹽於蒲脩牢盆謹衡石煎和既精斂散乃盈商通而荐至吏懼而循法㡬不絓網而國用益饒嵗杪㑹其所入贏羨什百劉禹錫崔公垂碑本朝監當官掌塲務庫藏出納之事其征榷塲務嵗有定期以登耗為殿最賞罰凡課利所入日具數申於州四朝志太平興國三年詔諸路轉運副使常體量部内監當官公勤㢘幹顯有勞績者具名聞奏與親民差遣慶歴四年詔舊制諸道榷酤滿三萬貫舉官監臨嵗滿而課贏者升用之㑹要劉摯責監衡州鹽倉悉意核視弊減什七父老目為學士監四朝史臨榷木之酤及連敖之賞胡文恭行何世昌制領筭商車典臨茗局孫詔制當庾氏之掌裴士傑制局課衍盈姚預制商利局者以饒衍名最賈程制征筭之饒衍於局次王拱辰等制臨筦榷之局筭無遺力沛有衍緡毛維藩制往幹牢盆之入頗増近監之饒劉雝制監司商筭假政制服勞廩委公是行劉詰制錢監史王莾時主鑄錢官曰鍾官後漢志集筦官錢曰圜府之職文選本朝開寶鑄錢監於文番陽既而江淮荆浙閩廣之地皆有監職畧泣全冶之别司胡文恭行成有宗制沿挾銅之令以收七福因採山之法用廣五銖司南州寶冶之饒佐縣官圜府之用宣勞於外興利在公葛源制官曹自是錫與銅東坡送王怡江淮鐵錢官傳記唐西北邊州禁人無置鐵冶續通典本朝舊制主鐵冶者得補班行陳升之奏下議省之既定稿呉及與沈起輒増注興國軍磁湖鐵冶如舊制國史呉及傳巡轄馬遞舖史唐劉晏初州縣取富人主郵遞謂之捉驛大厯十有一年華原封侯莫等以主郵傳優改長安尉唐書記纂淵海卷三十五
