body:
  text: 記纂淵海卷八十六宋潘自牧撰仙道部神仙子藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五榖吸風飲露乗風氣御飛龍而遊乎四海之外莊子至人大澤焚而不能熱河漢沍而不能寒疾雷破山狂風振海而不能驚同上至人倚不㧞之柱行不關之塗禀不竭之府學不死之師淮南子公孫卿言仙人好樓居上作蜚亷桂館益夀延夀館通鑑薊子訓與一老翁摩挲銅人語曰適見鑄此已五百嵗矣後漢薊子訓傳傳記食氣者神明而夀不食者不死而神大戴禮易本命篇黄初平丹谿人十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起索之不得見後在市有道士善卜乃就占之道士曰金華山中有牧兒是卿弟非耶初起即随道士尋見兄弟悲喜問羊何在初平曰近在東初起徃視了不見羊但見白石無數還曰無羊初平曰羊在耳但兄自不見便乃俱徃初平言叱叱羊起初是白石皆起成羊數萬頭曰我弟得神通如此吾可學否初平曰唯好道便得初起便棄妻兒留就初平共服松脂伏苓至千日能坐能立在日中無影有童子之色後還鄉諸親死亡畧盡乃去以方教授南伯逢易姓為赤初起改為魯班初平改為赤松子其後傳服此藥得仙者數十人神仙傳王喬有三同姓名有王子晋王喬有葉令王喬令食肉芝王喬乃蜀中神仙也王氏神仙傳男之髙仙曰真人女曰元君太平廣記蓬萊弱水三十萬里非飛仙莫到續仙傳河東須曼都好道出家三年而反曰去時有數仙人將上天籬有數里而止月之旁甚寒悽愴論衡羿請不死之藥於西王母其妻嫦娥竊而食之奔入月宮託身於月是為蟾蜍王充論衡江妃二女皆麗服華裝佩兩明珠逰於江漢之湄逢鄭交甫交甫不知其神也遂下與言曰願請子之佩二女觧佩以與交甫受而懐之趨去數十歩視而懐空無佩顧二女忽然不見列仙傳毛女字玉姜形體生毛秦始皇宫人也秦亡入山道士教食松葉遂不飢寒在華隂山中列仙傳西王母者金王母也厥姓緱氏女子之登仙得道者咸𨽻焉集仙録萼緑華者女仙也上下青衣顔色艷整真誥魯妙典女道士生而好道入九嶷山仙去三洞珠囊謝自然女道士入洞庭山無疾而化有雲鶴之瑞仙去同上女几者陳市上酒婦也随仙人居女几山女仙録麻姑與王方平降於蔡經家麻姑是好女年十八九許於頂上作髻餘髮垂之至腰手似鳥爪神仙傳集飄飄戲九垓選逰仙詩冠霞登綵閣解玉飲椒庭樂府升天行文選神仙排雲出神仙詩風餐委松栢雲卧恣天行升天行飲清岑之玉醴兮餐沆瀣以為糧張衡思𤣥賦遺世翫道絶粒茹芝孫綽天台賦王喬控鶴以冲天應真飛錫以躡虛尋不死之福庭同上聞至人之休風齊天地於一指秋興賦嘘吸冲和吐故納新蟬蜕龍變棄俗登仙東方朔贊至人無已先天地而御六氣列仙神化隘宇宙而遺萬物岑文夲有時驅猛虎虚室使仙童杜詩雲卧逰八極玉顔已千霜李白朝餐雲母散夜吸沆瀣精白侍郎仙翁已得道混跡尋巖泉肌膚氷雪瑩衣服雲霞鮮紺髪絲並緻韶容花共妍方瞳㸃𤣥漆髙歩凌飛煙幾見桑海變莫知龜鶴年所憇九清外所逰五岳巔軒昊舊為侣松喬難比肩浩蕩八溟濶志泰心超然形骸既無束得䘮亦都捐豈識椿菌異那知鵬鷃懸白傅集呉葛仙翁歩行水上衣履不濕白帖綿日月而不老配日月而長存同上如煙非煙不知處韋應物集緑鬢縈雲裾曳霧雙節飄颻下仙歩日月分明到世間碧雲何處來時路同上中有一人披霓裳誦經山頂餐霞漿朝出青霄禮玉堂夜掃白雲眠石牀劉長卿觧形而遺世乗白雲而上賔唐文粹不踐名利道始覺塵土腥不味稲梁食始覺神骨清同上妾巫山之女也朝為行雲暮為行雨宋玉賦上古既無世所未見瓌姿偉態不可勝讃神女賦婆娑乎人間同上靈姬顧我笑粲然啓玉齒郭景純逰山詩聘王母於銀臺選思𤣥賦本朝金鼎銷紅日丹田老紫芝詩話縂龜玉宇清風來處逺仙家白日靜中長歐公詩衣裳飄颻薄煙霧泊然冲虛𦕈無营欒城集至人本無夢夢則亦逰仙真人本無睡睡則浮雲煙詩話先生去後應難老乞與貧儒換骨丹同上洞府傳真仙之福庭天地之下府號曰金庭不死之鄉養真之靈境也仙傳拾遺王屋山有洞天神仙之府五臺山道家紫府洞也東峯有離岳大球西峯有麗農瑶室南峯有洞光珠樹北峯有玉洞瓊芝中峯有自明之金環光之璧並列仙傳集雲生梁棟間風出窓戸内郭景純逰仙詩山岳神秀𤣥聖逰化靈仙窟宅孫綽天台賦洞門無鎖鑰俗客不曽來韓文有地在壺中無人知地脉劉賔客勝景不易遇入門神頓清唐文粹十洲并序序曰漢武帝既聞王母說八方巨海之中有祖洲瀛洲𤣥洲炎洲長洲元洲流洲生洲鳯麟洲聚窟洲等十洲並是人跡所希絶處又知東方朔非世上人是以延之曲室而親問十洲所在方物之名故書記之方朔云臣甞随師之主履行北至朱陵扶桑之厥渠海冥夜之丘純陽之陵始青之下月宫之間内逰七丘中旋十洲踐赤縣而逰五岳行陂澤而息名山臣自少及今周流六天渉歴八極於是矣未若陵靈之子聽真之官上下九天洞視百方北極鉤陳而并華葢南翔太丹而棲大夏東之通陽之霞西薄寒空之野日月所不逮星漢所不與其上無復物其下無復底臣之所識如此愧不足以酬廣大祖洲祖洲近在東海之中地方五百里去西岸七萬里上有不死之草草形如菰苗長三四尺人死者以草覆之皆當時活研末服之令人長生昔秦始皇苑中多枉死者横道有鳥如烏狀銜此草覆死人面當時起坐而自活也有司聞奏始皇遣使者賫草以問北郭鬼谷先生鬼谷先生云臣聞東海祖洲上有不死之草瓊田内或名為養神芝其葉似菰苗叢生一本可活一人始皇於是慨然曰可採得之否乃使徐福發童男童女各五百人率載樓船等入海尋祖洲遂不返福道士也字君房後亦得道瀛洲瀛洲在東大海中地方四千里大抵對㑹稽郡去西岸七十萬里上生神芝仙草又有髙玉石且千丈出泉如酒味名之為玉醴泉飲之數升輒醉令人長生洲上多仙家風俗似吳中山川如中國也𤣥洲𤣥洲在北海之中戌亥之地地方七千二百里去南岸三十六萬里有𤣥都仙伯真公所治多丘山又有風山多風氣響雷電對天西北門上多大𤣥仙官宫室宫室各異饒金石紫芝又是三天所治之處炎洲炎洲在南海中地方二千里去北岸九萬里上有風生獸似豹青色其大如貍張網取之積薪數車以燒之薪盡而獸不燃灰中而立毛亦不焦斫刺不入打之如皮嚢即以鐵鎚鍛其頭數十下乃死而張口向風湏臾復活以石上菖蒲塞其鼻即死取其腦和黄菊花服之盡十斤得夀五百年又有火林山山中有火光獸大如䑕毛長三四寸或赤或白山可三百里許晦夜常見此山林乃是此獸光照狀如火光相似取其獸毛以緝為布時人號為火光浣布也國人衣服之若有垢汙以水浣之終不潔浄唯以火燒兩食乆振擺之其垢自落潔白如雪亦多仙家居處長洲長洲一名青丘在南海辰已之地地方五千里去岸二十萬里上饒山川又多大樹樹有二千圍者一洲之上專是林木故一名青丘上有仙草靈藥甘液玉英又有風山山常震聲有紫府宫天真仙女逰於此地𤣥洲𤣥洲在北海中地方三千里去南岸十萬里上有五芝𤣥澗澗水如蜜漿飲之長生與天地相畢服五芝亦得長生不死上多仙家流洲流洲在西海中地方三千里去東岸十九萬里上多山川積石名為昆吾冶其石成鐵作劍光明洞照如水晶狀割玉如泥亦多仙家生洲生洲在東海丑寅之間接蓬萊七十萬里地方二千五百里去西岸二十三萬里上有仙家數萬天氣安和芝草常生地無寒暑安飬萬物亦多山川仙草衆芝一洲之水味如􅀈酪至良洲者也鳳麟洲鳳麟洲西海之中地方一千五百里洲四面弱水繞之鴻毛不浮不可越也洲上多鳳麟數萬各各為羣又有山川池澤及神藥百種亦多仙家煮鳳喙及麟角合煎作膠名之為續弦膠或名連金泥此膠能續弓弩已斷之弦連刀劍斷折之金更以膠連續之處使力士掣之他處乃斷所續之際終無所損也天漢三年帝幸北海祠恒山四月西國王使至獻靈膠四兩及吉光毛裘武帝受以付外庫不知膠裘二物之妙用也以為西國雖逺而上貢者不竒稽留使者未遣久之武帝幸華林園射虎而弩弦斷使者從駕又上膠一分使口濡以續弩弦帝驚曰異物也乃使武士數人共對掣引終日不脱如未續時其膠色青如碧玉吉光毛裘黄色葢神馬之類也裘入水數日不濡入火不焦帝於是乃悟厚謝使者而遣去又益思方朔之逺見周穆王時西胡獻昆吾刀及夜光常滿盃刀長一尺盃受三升刀切玉如泥盃是白玉之精光明照夜冥夕出盃於中庭以向天比明而水以滿盃中汁甘而香美斯實靈人之噐秦始皇時西胡獻切玉刀無復常滿盃耳知此膠之所出從鳳麟洲來劍之所出從流洲並是西海中所有也聚窟洲聚窟洲在西海中申未地地方三千里北接崑崙二十六萬里去東岸二十四萬里上多神仙靈官宫第比門不可勝數及有獅子辟邪鑿齒天塵銅頭鐵額之獸洲上有大山有鳥如人象因名之為人鳥山旁多大樹與楓木相類而林芳葉香聞數百里此為返魂樹亦能自作聲如羣牛吼聞之者皆心振神駭伐其木根置於玉釡之中煮取汁更微火煎如黒錫狀令可丸之名曰驚精香或名之為振檀香或名之為人鳥精或名之為却死香一種數名斯靈物也香氣聞數百里死者在地聞香氣乃活不復亡也以香熏死人更加神騐如此後延和三年武帝幸安定西胡月支國王遣使獻香四兩大如雀卵黒如桑椹帝以其非中國所有以付外庫又獻猛獸一頭形如五六十日犬子似狸而色黄命國使以呈帝見使者抱之以其羸細禿悴怪其所貢之非也問使者曰此物可弄何謂猛獸使者對曰夫威加於百禽者不必計之以大小是以神麟生為巨象之主鸞鳯必為大鵬之宗百足之蟲制於螣亦不在於巨細也臣國去此三十萬里國有常占東風入律百旬不休青雲干吕連月不散者當知中國將有好道之君我王固將賤儒墨而貴道徳薄金玉而厚靈物也故捜竒藴貢神香歩天林而請猛獸乗毳車而濟弱淵䇿驥足以度飛沙契闊遥途辛苦蹊路于今七十三年矣香神起妖殘之死疾猛獸却百邪之魅鬼夫此二物實是飬生之要助政平化豈圖陛下反不之貴乎是臣國占風之謬矣今日仰鍳天姿亦乃非有道之君也眼多視則滛色口多言則犯難身多動則滛賊心多餙則奢侈未有用此四者而成天下之治也武帝忿然不平又問使者猛獸何方而伏百禽食噉何物膂力何取其所生何鄉耶使者曰猛獸所出或出崑崙或生𤣥圃或生聚窟或生天露其夀不貲食氣飲露觧人言語仁惠忠恕當其仁也愛護蠢動不犯虎豹以下當其威也一聲呌發千人伏息牛馬恐駭驚斷絆繫武士奄忽失其勢力當其神也立興風雲吐潄雨露百邪迸走蛟龍騰蛇附處于太山之厩役御獅子名曰猛獸葢神化無常能為大禽之宗主乃玃天之元王辟邪之長獸者也靈香雖少斯更生之神物也疫病災死者能超之乃聞香氣者即活也芳又特甚故難歇也於是帝使使者令猛獸發聲試聽之使者乃指獸命發一聲獸䑛唇良久忽呌如天大雷聲霹靂又兩目䃱磹交光精氣衝天良久方止帝登時顛蹶掩耳震動不能自止時衛者虎賁武士俱失仗伏地諸内外牛馬犬豕之属皆絶絆離繫放蕩驚駭久許而定帝忌之因以此獸付上林苑令虎食之於是虎聞來乃相屈積聚如死虎伏獸入苑徑上虎頭溺虎口去十歩已來顧視虎虎輒閉目帝恨使者言不遜欲收之明日失使者及猛獸所在遣四出尋討不知所止到後元封元年長安城内病者數千百亡者大半試取月支神香燒之於城内其死未三日者皆活芳氣經三月不歇於是信其神物也乃更秘錄香復一旦又失之檢函封印如初無復香也帝逾時懊恨不禮待使者益貴方朔之遺語自愧求少君之不懃慚衛卿之復去向使厚待使者必有所益也右十洲滄海島滄海在北海中地方三千里海四面繞島各五千里水皆滄色仙人謂之滄海者也島上專是大山積石有名石象八石石腦石桂英流月黄子石膽之軰百餘種皆生於島服之得神仙外别有圓海繞山圓水色正黒謂之溟海無風而洪波百丈不可得徃上有九老丈人九天真主葢太上真人之所居唯飛仙能到其處耳崑崙一號曰崑陵在西海戌地北海之亥地地方一萬里去岸十三萬里有弱水周回繞匝山東南接積石圃西北接北戸之室東北臨大活之井西南至承洲之谷此四角大山寔崑崙之支輔也積石圃南頭是王母宫王母告周穆王云山去咸陽三十六萬里山髙平地三萬六千里上有三角山方廣萬里形如偃盆下狹上廣故曰崑崙山三角其一角千辰之輝名曰閬風巔其一角正西名𤣥圃堂其一角正東名崑崙宫其一角有積金為大墉城面方千里城上安金䑓五所玉樓十二所其北戸山承淵山入有墉城金䑓玉樓相映如流精之闕光碧之堂瓊華之室紫翠丹青景雲燭日朱霞九光西王母之所治也其北海外又有鍾山在北海之子地隔弱水之北一萬九千里髙一萬三千里上方七千里周旋三萬里自生千芝及神草四十餘種上有金䑓玉闕亦元氣之所舍大帝君治處也鐘山之南有平邪山北有蛟龍山西有勁草山東有束木山四山鐘山之枝幹也四山髙鍾山三萬里宫城五所如一登四面山下望見鍾山耳四面山帝君之城域也又仙人出入道徑自一路從平邪山東南入宂中乃至内長生島中紫石室宫九老仙都治處仙官數萬衆記之方丈洲在東海中心西南東北岸正等方丈面各五千里上面專是龍所聚者金玉琉璃之宫三天司命所治之處羣仙若欲昇天者徃來此洲受太上𤣥生籙仙家數十萬瓊田芝草課計頃畆如種稻狀亦有石泉山有九原丈人宫主領天下水神及龍蛇巨鯨陰精水獸之軰扶桑在東海之東岸一萬里復得碧海廣狹浩汗與合東岸大碧水既不鹹苦止作碧色甘香味扶桑在碧海之中地方百里上有太帝太真王父所治處地多林木葉皆如桑又有椹子樹長者數千丈徑三十餘圍樹兩兩同根偶生更相依倚是以名扶桑仙人食其椹一體皆作金色飛翔𤣥虛其樹雖大其葉其椹如中夏桑也但椹希而赤九千嵗一生實耳味絶甘香地生紫金玉如諸夏之瓦石其仙官變化萬端葢無所形或有分形為百身十丈者蓬丘蓬萊山是也對東海之東北岸周回五千里北到中山北阿門外乃天帝君總九天之維貴無比焉山源周回其外四城其中髙山當心有似於崑崙也皆禹治洪水既畢乃乗蹻車度弱水而到此祠上帝於此阿歸大功於九天禹經諸五岳使工刻石識其里數髙下其字科斗書非漢人所了今丈尺里數皆禹時書也不但刻劘五岳諸山名亦然其所刻之處獨髙耳東方朔十洲三島記十大洞天本朝十大洞天者處大地名山之間是上天遣羣仙統治之所雲笈七籖天地宫府圖第一王屋山天檀峯絶頂髙一百二十里洞周回一萬里名小有清虛之天即杜仲王褒為小有天王清虛真人所理在洛陽河間兩界去王屋縣六十里雲笈云西城王君治之第二委羽山洞周回一萬里名大有空明之天即司季王為大有仙人所理係台州黄巖縣雲笈云清童君治之第三西城山髙二千丈洞周回三千里名太𤣥總真之天即王方平真人所理在梁州成都府西一千里接西界雲笈云未詳所在登真隐訣云疑終南太一山是属上宰王君第四西𤣥山髙二千七百丈洞周回一千里名三𤣥極真之天即裴真人所理係華州入西畨界雲笈云恐非人跡所及第五青城大面山髙三千六百丈洞周回二千里名寳仙九室之天即甯真人所理黄帝問道於希夷真君授黄帝龍蹻經之處在蜀州青城縣雲笈云青城丈人治之第六天台赤城山髙一萬八千丈洞周回五百里名上清玉平之天即桐栢王真人所理葛𤣥仙翁煉丹得道䖏上應台宿故名天台在台州天台縣雲笈云台州唐興縣属𤣥州仙伯治之第七羅浮山髙三千六百丈洞周回五百里名朱明曜真之天是蓬萊之一島也堯時洪浮海而來泊於羅山二山相合故曰羅浮山即抱朴子葛翁煉丹得道處在惠州博羅縣雲笈云青精先生治之第八茅山髙一千七百丈洞周回一千五百里名金壇華陽之天洞中有生黄金壇髙一百丈紫玉宫室皆上清真人逰息之境昔名句曲山因茅君煉丹得道故曰茅山在昇州句容縣雲笈云紫陽真人治之第九林屋山洞周回四百里名左神幽墟之天一名包山在太湖水中夏禹治水平後藏靈寳五府於此洞中今在蘇州洞庭湖口雲笈云属北岳真人治之第十括蒼山洞周回三百里名成徳隐真之天即徐來勤真人所理在台州仙居縣雲笈云號成徳隐𤣥之祠在處州右李思聰洞淵集三十六小洞天其次三十六小洞天在諸名山之中亦上仙所統治之處雲笈七籖第一霍桐山髙三千四百丈洞周回三千里名霍林之天即鄭思逺韓衆許映真人為司命府君所理在福州長溪縣雲笈云仙人王緯治之第二東岳太山髙四千丈洞周回一千里名蓬𤣥空峒之天即太昊為青帝治東岳主萬物發生考校死魂鬼神之所歴代帝王封報功封禪之岳上應娄奎之精下鎮魯地之分野係在兖州奉符縣雲笈云乾封縣第三南岳衡山髙四千丈洞周回二千里名朱陵太虛之天即神農為赤帝治南岳者上帝降玉册寳印賜注生真神永鎮靈岳即吾皇比夀之山上應翼軫璣衡之