設厨㑹數千人通鑑宋营陽王紀客問三教優劣李謙曰佛日也北史魏本傳上召天台道士司馬承禎問以陰陽數術睿宗紀睿宗崩以上女萬安公主為女官欲以追福通鑑唐𤣥宗開元二年楊妃乞為女官號太真天實三年上受三洞法籙於衡山道士劉女静唐武宗㑹昌六年唐主問道士王棲霞何道可致太平晋紀天福八年並同上傳記風局清古集異記集風餐委松栢雲卧恣天行選樂府升天行𤣥真髙蹤萬古同徳陳子昂喘息餐妙氣歩虛吟真聲道與古先合心將元化并李太白集茹芝煉玉學輕身元次山嚥𠻳元和津所思煙霞微杜張道士嵩南之有道者通古今學有文武長材跡寄老子法中為道士韓送張道士序院閉青霞入松髙老鶴尋猶疑隐形坐敢起竊桃心尋流尊師不遇洗粧拭面着冠帔白咽紅頰長眉青華山女詩真風道骨𤣥格髙情冥鴻孤鶴不可云喻元微之見韓文送毛仙翁十八凡序注書出歩虛三百韻蕊珠文字在人間元微之嵗計芝田熟晨裴月帔寒李義山詩叶潤靈津凝華霄極同上如來鑿七竅若都遺四肢白侍郎性靈閒似鶴顔狀古如松道心精微真學奥秘為仙列上首與儒流争衡並同上得崆㠓之道與汗漫之逰白帖藉草飯松屑焚香讀道書王維集有道者其神則清雙眸朗暢四氣和平長江月影太華松聲同上古木無人地來尋羽客家道書堆玉案仙帔叠青霞鶴老難知嵗松寒未作花洞中不可見何處化丹砂劉長卿蘿月延虛歩松花醉宴閒同上道士無白髪語音靈泉清青松多夀色白石常夜明放歩霽霞起振衣華風生孟東野松骨輕自飛鶴心髙不羣日下鶴過時人間空落影同上聞煉師之名者足以激勵風俗睹錬師之容者足以脫落氛埃唐文粹𤣥標仙骨偕真道冥錬形逰化逰心於千載之表騁思於九流之域水其心雲其身素琴在右黄庭在左徜徉髙空軒裳鐘鼎於我如浮雲大位遐年在生為逆旅鶴骨松貌並同上白髪道心熟黄衣仙骨輕王建集道士冩將行氣法家童授與歩虛詞同上泥竈煮靈液掃壇朝玉真張文昌餐空御白雲賈浪仙綵雲不散燒丹竈白鹿時藏種玉田錢起詩君有出俗志不貪英雄名傲然脫冠帶改換人間情道士司馬退之詩不踐名利道始覺塵土腥同上樓觀本記曰周穆王因尹真人草樓之觀召逸人居之謂之道士平王東遷置七人漢明帝永平七年置三十七人晋惠帝度四十九人審此則是自周而有也事物紀原本朝百尺松梢幾飛歩鶴棲枝上禮虛皇詩話脩養子吹呴呼吸吐故納新熊經鳥伸為夀而已矣莊子史沐浴𤣥徳禀仰太和班孟堅叙傳華佗曰人體欲得勞動但不當使極耳動揺則穀氣得消血脉流通病不得生譬猶戸樞終不朽也古之仙者為導引之事熊經鴟顧引接腰體動諸關節以求難老吾有一術名五禽之戯一曰虎二曰鹿三曰熊四曰猿五曰烏佗别傳曰吴普從佗學微得其力魏明帝呼之使為禽獸普以年老手足不能及粗以其法語諸醫今年將九十耳不聾目不冥牙齒完全飲食無損東漢本傳王真年百嵗視之面有光澤似未五十者云周流登五岳名山悉能行胎息之方𠻳舌下泉咽之後漢本傳傳記食氣者常有少容玉符經志若流水居若空城妙真經真人道士常吐納以和六液太上三元經斷穀茹芝茅君内傳集含天地之醇和吸日月之光采嵇康琴賦挹以𤣥玉之水𠻳以華池之漿孫綽天台賦化心養精魄隠几習天真李太白鍊氷雪之容延金石之夀納沆瀣之精率逍遥之性緘縢六志扃鐍百骸吸新吐故以鍊藏專志積精以專心鄭君得自然虛白生心胷吸披沆瀣精凝為氷雪容飲咽日月精茹嚼沆瀣芬棲山卧雲鍊氣絶食滋味不接於口塵埃不染於心齋心受籙服氣鍊形暑不流汗冬不挾纊膚體顔色氷清玉温未識者望之疑神仙中人也並出白帖委氣荣衛和咽津顔色好元㣲之集萬過黄庭經一食青粮稻同上食栢鍊玉顔元稹集叩爾𤣥關保其真宅桞文齋心已恬愉澡身自光明沈沈簾幃下藹藹燈燭青四支動用息一室虛白生収視忘趣捨叩齒集神靈伊子嗜慾寡居常痾恙輕三尸既伏竄九藏乃和平無令耳目勝則使性命傾窅然深夜中若與元氣并李義山詩精神如太陽霍然照清都四支為琅玕五藏為璠璵顔如芙蓉頂為醍醐天地相終始浩漫為娱下顧人間溷糞蝇蛆皇甫湜修行近日形如鶴導引多時骨似綿王建集骨換肌膚膩心靈氣色真姚少監講論叅同深到底停騰姹女立成銀方雄飛不味稲粱食始覺神骨清道士司馬退之詩本朝服餌既久毛骨清丹顔益少方瞳明緑髪方瞳痩骨輕並歐公集槁死三彭仇澡換五滑腸清骨凝緑髓丹田發幽光東坡詩丹鼎一丸深自秘紫芝三葉却先知欒城得道子夫道在太極之先而不為髙在太極之下而不為深先天地生而不為久長於上古而不為老狶韋氏得之以挈天地伏羲得之以襲氣毋維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以逰大川肩吾得之以處泰山黄帝得之以登雲天顓頊得之以處𤣥宫禺強得之以立乎北極西王母得之坐乎少廣莫知其終彭祖得之上及有虞下及五伯傅說得之以相武丁奄有天下乗東維騎箕尾而比於列星莊子大宗師偃其聰明而抱其太素淑真訓體本抱神以逰於天地之樊淮南子精神訓史履操夷簡徳業冲粹屏棄塵雜栖志虛𤣥吐故納新食芝餌术念衆妙於三清之表返華髮於百靈之外道邁前烈聲髙自古舊唐書道士知逺傳集歩八閑而為宇節四運之常氛魏文帝大暑賦貫元虛於太素薄紫微而踈戾澄神元漠流棲心太素域俱陸機賦頥神太素逍遥方外阮藉詩恣語樂以終日等寞於不言孫綽天台賦道風秀出任彦昇表夜後不聞龜喘息秋來惟長鶴精神白樂天贈王山人詩身輕得道羽化升天白帖鶴骨松貌泉停谷虛寓形人間天地無累與扶桑公陶隐居遥為師友矣唐蔣防文鍊丹子合金丹之大藥錬八石之精英尤忌凡俗聞見則仙物不成丹砂服之令人飛行長生九丹仙藥之上俱抱朴子史寡婦清得丹穴而擅其利史記葛洪聞跤趾出丹求為勾漏令晋書陶洪景既得神符秘訣以為神丹可成而苦無藥物帝賜黄金硃砂雄黄等後合飛丹色如霜雪服之體輕梁書髙宗時道士劉合還丹成而上之咸亨中卒惟有空皮而背上開拆有似蝉脱唐書山人桞泌能合長生藥詔泌居興唐觀煉丹藥通鑑唐憲宗紀傳記成王時濮人獻丹砂周書仙藥之上者丹砂孝經援神契羿請不死之藥於西王母妻嫦娥竊以奔月託身於月是為蟾蜍張衡靈憲丹砂木精得金乃并參同契魏伯陽撰參同契以周易爻象論作丹之意三洞珠囊丹砂朱之朴廣志服之一月三䖝出太上元變經丹砂外包八石内含金精先禀氣於甲受氣於丙出胎見壬結魄成庚太清煉靈丹經丹砂服火化為黄銀能輕能神能黒能白能暗能明一斛人擎力難勝舉萬斤遇火輕速上騰鬼神尋求莫知所在青霞子論馬明王服丹半劑為地仙展轉百餘年乃白日升天也神仙傳魏伯陽與弟子三人作丹成與犬犬死弟子曰先生可服之而死二人下山求𦵏具伯陽即起再以丹納犬及弟子口中皆起仙去葛洪神仙傳變凡為仙丹之力也太平廣記身生羽翼飛行輕舉莫不皆因服丹五靈三使之藥九光七曜之丹神仙大丹異名三十四種出世十三種非世所用二十種孫思邈太清丹經要訣集夫交梨火棗者是飛騰之藥也君侯若能剪除荆棘絶去人我冺是非則二樹生君心中矣亦能開花結實葉茂枝繁食之一枚則景光萬里許逺逰與王逸少書守丹竈而不顧煉金鼎而方堅選别賦方士煉玉液雜體詩安期鍊五石逰山詩逺慙勾漏令不得問丹砂家事丹砂訣杜金丹别後知傳得乞取刀圭救病身韓集淮南王仙去雞犬䑛藥噐以升仙白帖將延金石之夀以煉氷雪之膚吸而蟬脫吞則翼生與我一丸藥光輝有五色服之四五日身輕生羽翼白帖載古詩應得丹霜餌春來黒髪新長生只要一丸丹王建金丹駐少年洞裏丹砂日採還姚合道士補朝官史墨敕以鄭普思為秘書監葉靜能為國子祭酒通鑑唐中宗紀傳記史崇𤣥附太平公主授鴻臚卿朝野僉載唐髙宗時葉静能入直翰林為國子祭酒唐𤣥宗時葉法善授銀青光禄大夫鴻臚卿尹愔拜諫議大夫事物紀原觀宇史公孫卿言仙人好樓居上作蜚亷桂館益夀延夀館通鑑漢武魏主起天師道場㓂謙之重壇五層同上宋营陽王詔山人桞泌居興唐觀煉藥唐憲宗紀傳記列真之宇白帖列仙㳺館同上周穆王尚神仙召尹軌杜仲居終南山尹真人草樓所因號樓觀葢道觀之初也隋煬帝改為𤣥壇後復曰觀事物紀原集精廬陳伯玉集碁聲花院閉幡影石壇髙司空圖詩道士授封傳記後周武帝時衛元嵩封蜀郡公事物紀原唐𤣥宗時葉法善封越國公事物紀原道士賜紫傳記唐中宗神龍初加葉靜能金紫之階未頒紫衣事物紀原朝野僉載曰史崇𤣥附太平公主衣紫羅裙帔唐代宗時李泌乞為道士賜紫衣道士賜紫自李泌始並同上道士賜諡傳記後漢張道陵有天師之稱梁陶洪景死賜諡貞白先生元魏世祖賜冦謙之天師之號唐王知逺贈昇𤣥先生唐𤣥宗賜李含光曰𤣥靜先生並出事物紀原道術子左慈以氣禁水水為逆流一二丈禁水著中庭露之大寒不氷抱朴子史王喬有神術為葉縣令每月晦望自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來於是候至舉網張之但得一雙舄焉乃詔尚方診視則四年中所賜尚書官属履也當朝時掖門下皷不擊自鳴聞於京師王喬傳道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱入尺許以氣吹之便可躍出射去如弩箭之發異苑云趙侯以盆盛水吹氣作禁魚龍立見越方善禁呪也東漢徐登傳注事出抱朴子左慈字元放廬江人也少有神通嘗在司空曹操坐操從容顧衆賔曰今日髙㑹珍羞畧備所少吳松江鱸魚耳元放於下座應曰此可得也因求銅盆貯以水竹竿餌釣於盤中湏臾引一鱸魚出操拊掌笑㑹者皆驚操曰一魚不周坐席可更得乎元放乃更餌鈎沈之湏臾復引出長二尺餘生鮮可愛操使自前鱠之周浹㑹者操又謂曰既已得魚恨無蜀中生薑耳元放曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過勅使者増市三端語頃即得薑還并獲使報命後操使自蜀反驗問増錦之數及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為賫酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸壚悉亡其酒脯矣操懐不喜因坐上收欲殺之慈郤入壁中霍然不知所在或見於市者又捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之走入羊羣操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前两膝人立而言曰遽如許即競徃赴之而羣羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉本傳解奴辜張貂者亦不知其何郡國人也皆能隠淪出入不由門戸奴辜能變易物形以誑幻人又河南有麴聖卿善為丹青符刻厭殺鬼神而使命之又有編肓意亦與鬼神交通觧奴辜傳孟節能含棗核不食可至五年十年又能結氣不息身不動揺狀若死人可至百日半年王貞傳張楷性好道術能作五里霧本傳並東漢吳猛因還豫章江波甚急猛不假舟楫以白羽扇浮水而渡觀者異之順陽樊長賔為建昌令發百姓作官船於建城山中吏命人各作箸一雙幸靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃愈甚靈曰爾若不以情告我今真死矣竊者甚懼乃自首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此已過足但部分未至耳靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神本傳僧渉者西域人也不知何姓少為沙門苻堅時入長安虛静服氣不食五榖日能行五百里言未然之事驗若指掌能以秘咒下神龍毎旱堅使之咒龍請雨俄而龍下鉢中天輒大雨堅與羣臣親就鉢中觀之卒於長安夲傳沙門曇霍者或遺以衣服受而投之於河後皆以還其本主衣無所汚行歩如風雲夲傳晋書傳記費長房遇壺公有神術能縮地脉千里聚在目前放之如舊葛洪神仙傳後漢欒巴漢帝召為尚書正朝大㑹巴獨後到頗有醉色不飲而以酒望西南噀之有司奏巴大不敬詔問巴巴對曰臣鄊里以臣能治鬼䕶病為立廟今旦耆老皆入廟致饗是以來遲臣本縣成都失火臣噀酒為雨以㓕火災詔原罪即遣使徃驗其言荅云正旦失火食時有大雨從東北來乃息雨皆酒氣後一旦大風天霧暗失巴所在尋問之具曰還成都與親戚别去而昇天矣左慈㧞簪以畫杯酒即中斷分為两向左慈明六甲能役鬼神坐致行厨劉政有道術能以一人作千人千人作萬人又能噓水興雲聚壌成山刺地成淵同上仙翁為客設酒不令人傳之見盃自至人前若不盡者則杯不去葛仙翁傳琴弹碧玉調藥煉白硃砂觧醸頃刻酒能開非時花續仙傳劉綱有道術能檄召鬼神禁制變化之事嘗與妻樊夫人校其術俱坐堂上綱作火燒碓屋從東起夫人禁之火即滅庭中两株桃夫妻各咒一株使相鬬擊良久綱所呪者不如數走出籬外綱唾盤中即成鯉魚夫人唾盤中成獺食魚綱與夫人入四明山路阻虎綱禁虎伏不敢動適欲徃虎即喊之夫人徑前虎即靣向地不敢仰視夫人以䋲繫虎牽歸繫於床脚下將昇天綱仕上虞縣㕔事側先有大皂莢樹綱升樹數丈方能飛舉夫人平坐冉冉如雲氣之昇同昇天而去女仙傳集吞刀弄火易貌分形選西京賦劉根丹篆二千字郭璞青囊兩卷書杜牧之長䋲繋白日大藥駐朱顔唐文粹尸解史宋母忌王伯僑充尚羡門韋昭曰皆效古人名效神仙者子髙最後皆燕人為方仙道形解銷化服䖍曰尸解也張宴曰人老如解去故骨則變化也今山中有龍骨世人謂之龍解骨化為之見史記封禅書葛洪卒年八十一視其顔色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解晋書夲傳唐髙宗時道士劉合還丹成而上之咸亨中卒唯有空皮而背上開坼有如蝉蛻唐書互見煉丹傳記費長房隠變觧化神仙傳分形散影集仙錄道中有尸觧劍觧水觧火觧實繁有徒嵇康郭璞非受戕害者以此委蛻廣異記形如生人者尸觧也足不青皮不皺者尸觧也目光不落無異生人者尸觧也髪盡落而失形骨者尸觧也有死而更生者有未斂而失其尸者有衣存而形去者有髪脫而形飛者皆尸觧也白日觧者為上夜半觧者為下向曉向暮去者為地下主者此皆得道之差降也集仙錄南海太守鮑靚通靈士也東海徐寕師之寧夜聞静室有琴聲怪其妙而問焉靚曰嵇叔夜寜曰嵇臨命東市何得在兹靚曰叔夜雖示終而實尸觧顧愷之嵇康賛集觧形而遺世乗白雲而上賔陳子昂集白日尸觧得為飛仙尸觧本真人之錬蛻也五屬之隠適也並出寳劍上經記纂淵海卷八十六
