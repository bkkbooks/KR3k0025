body:
  text: 記纂淵海卷九十三宋潘自牧撰花卉部花史胡嶠入契丹亡歸中原能道所見云渡黑水至湯城淀地氣最温多異花記其二種一曰旱金大如掌金色爍人一曰青囊如中國金燈而色類藍可愛五代史傳記少室山有木其花五衢山海經唐太宗時伽失畢國獻泥樓鉢羅花葉類荷葉其花色碧而蘂黄香芳數十歩又罽賔國獻俱物頭花丹白相間而香逺聞則天臘月詔花見季冬婁寜王花時綴金鈴於花下掣之以驚禽謂之䕶花金鈴開元天寶遺事楊國忠以花木植檻中下設輪脚挽以緑絙所至之處牽檻在前號移春檻學士許慎與親友宴花圃中聚花鋪坐曰吾自有花裀何須坐具穆宗每宫中花開則以重頂帳䝉蔽欄檻置惜春御史掌之號曰括香互見春婁唐相石泉公王方慶著花木疏賛皇公李德裕著花木記花木録李德裕作平泉花木記其遺戒有云壞一草一木非吾子孫集古録楊恂遇花時就花下取蘂粘綴於婦人兼採花浸酒以快一時之意玉堂徃事集宫花争笑日秋風吹霜月凋此簷下芳折芳獻嵗晩林吐破顔花山花如綉頰李白白花簷外朶香傳小樹花窈窕桃李花渚花張素錦美花多映竹霏紅洲蘂亂紫萼扶千蘂黄鬚照萬花忽疑行暮雨何事映朝花亂蘂裹江濵杜詩浮花浪蘂鎮長有纔開還落瘴霧中雜花粧林草蓋地晨逰百花林朱朱兼白白翡翠開園英萎蕤綴藍瑛凌花咀粉蘂乘枯摘野艷怪花醉魄馨韓集芳朽自為别無心乃𤣥功夭夭日放花榮耀將安窮栁集朝日花底常㑹客花撲玉缸春酒香岑參恨紫愁紅滿平野温庭筠鸎啼如有淚為濕最髙枝苦無江氏五色筆争染河陽一縣花李義山紫蠟粘為蔕紅酥㸃作㽔成都新夾纈梁漢醉臙脂白居易津橋春水浸紅霞煙栁風絲拂岸斜翠輦不來金殿閉宫鸎銜出上陽花唐詩選本朝楊州后土廟有瓊花一株潔白可愛嵗久木大而花繁俗目為瓊花不知實何木也世以為天下無之唯此株孫冕鎮淮陽使訪之山中甚多但嵗苦樵斧毁燒故木不得大而花不能盛遂不為人貴孫傷之以詩曰可憐遐僻地常化燎原灰近京師亦有之或云乃李文饒所賦玉蘂花也僶水燕談淺深紅白相宜間先後仍須次第栽我欲四時攜酒去莫教一日不花開天匠染青紅花妖呈裊娜翠芽紅粒迸條出纎枝嫩萼如剪裁野花紅紫相斕斑凍卉意初回幾日春隂養花魄山花徒能笑不解與我言春枝將裊娜羣花媚春陽清香肯以無人減幽艷惟應有蝶知春深雨露新洗濯日煖金壁相輝華造化未嘗私一物各隨妍醜自芳菲六一集紅英掃地風驚曉緑葉成隂雨洗春芳心困落日薄艷戰春靁纎纎翠蔓詩催發皎皎霜枝髪鬬新東坡紅紫争春觸處開風簾㸃汚青春面自汲寒泉洗醉紅羅幃翠幔深調䕶已被逰蜂探得知山谷新緑葱葱紅䔩䔩却成粧面映青紗后山牡丹傳記白木牡丹也廣雅唐人謂之木芍藥花譜牡丹一名百兩金人曰䑕姑本草牡丹花世謂近有蓋以隋時文士集中無牡丹歌詩則楊子華有畫牡丹處極分明子華北齊人則知牡丹花亦已久矣尚書故事謝康樂集言竹間水際多牡丹而隋朝種植法不説牡丹者則隋朝花藥中所無也開元末裴士淹奉使幽薊回至汾州象香寺得牡丹一窠植於長興私第天寶中為都下竒賞唐至徳馬僕射總太原得紅紫二色牡丹元和中猶少今與戎葵較多長安興唐寺有牡丹一窠唐元和中著花一千二百朶其色有正暈倒暈淺紅深紫黄白檀等獨無深紅又有重臺花花有面徑八寸者長安興善坊素師院牡丹絶佳元和末一枝花合歡雜爼開元間禁中初重木芍藥得四本紅紫淺紅通白者上因移植於興慶池東沉香亭前花開上乘照夜駒太真妃以步輦從遂命李龜年持金花牋宣賜李白進清平調詞三章辭曰雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑶臺月下逢一枝紅艷露凝香雲雨巫山枉斷腸借問漢宮誰得似可憐飛燕倚新粧名花傾國兩相歡長得君王帶笑看解釋春風無限恨沉香亭北倚欄杆上命梨園弟子調撫絲竹促龜年歌太真妃持玻瓈七寶盞酌西涼州蒲萄酒笑領歌意甚厚飲罷斂繡巾重拜韓愈外甥能染花與吏部染白牡丹一叢云來春必作含稜碧内合有金含稜紅間暈者四面各合有一朶五色者明年開花亦如其説每一葉花中有楷書十四字曰雲横秦嶺家何在雪擁藍關馬不前廣記髙宗宴羣臣賞雙頭牡丹賦詩惟上官昭容一聫絶麗云勢如連臂友心似臭蘭人宋單父能種藝術牡丹變易千種上皇召至驪山種花萬本色様各不同内人呼為花師異人録明皇賞牡丹問侍臣曰牡丹詩何詩為妙奏云李正封詩曰國色朝酣酒天香夜染衣帝謂妃子曰粧臺前飲一紫金盞酒則正封之詩可見矣松窻録上賜楊國忠木芍藥國忠以百寶為欄沉香亭木芍藥朝紅暮黄午碧夜白帝曰此花木之妖也開元天寶遺事唐明皇時有獻牡丹者謂之楊家紅乃楊勉家花貴妃勻面口脂在手印於花上上詔於仙春館栽來嵗花開上有指印紅迹帝名為一捻紅明皇時民間貢牡丹帝未及賞為鹿銜去有佞人奏云釋氏有鹿銜花以獻金仙帝私曰野鹿逰宮中非佳兆也殊不知應禄山之亂青瑣髙議黎舉常云牡丹酴醿幸為執友金城記集幸自同開俱隱約何須相倚鬭輕盈凌晨併作新粧面對客偏含不語情雙燕無機還拂掠逰蜂多思正經營長年是事皆抛盡今日欄邊眼暫明韓集近來無柰牡丹何數十千錢買一窠今朝始得分明見也共戎葵不較多栁渾徑尺千餘朶人間有此花今朝見顔色更不向諸家偶然相遇人間世合在増城阿姥家有此傾城人家色天教晩發賽諸花劉禹錫賃宅得花饒初開恐是妖粉光深紫膩肉色退紅嬌且願風留著唯愁日炙銷可憐零落蘂收取作香燒王建若教解語應傾國便是無情也動人芍藥與君為近侍芙蓉何處避芳塵羅隱錦幃初捲衛夫人繡被猶堆越鄂君垂手亂翻雕玉珮折腰争舞鬱金裙石家蠟燭何曽剪荀令香爐可待薫我是夢中傳彩筆欲書花葉寄朝雲李義山牡丹芳牡丹芳黄金蘂綻紅玉房千片赤英霞爛爛百枝絳艷燈煌煌白樂天本朝牡丹花之富貴者也濓溪邵康節訪商守趙郎中與章子厚同㑹議論縱横不知敬康節語中因及洛人以見根撥而知花之髙下者上也見枝葉而知者次也見蓓蕾而知者下也章黙然童䝉訓洛陽舊不進花自李相迪留守時始進御嵗差衛校一員乘驛馬一日一夕至京師所進不過姚黄魏紫三數朶用菜葉實竹籠子籍覆之使馬上不動摇以蠟封花蔕乃數日不落六一集洛陽風土記牡丹出丹州延州東出青州南亦出越州而出洛陽者今為天下第一洛陽所謂丹州花延州紅青州紅皆彼土之尤傑者然纔得備衆花之一種列第不出三已下不能與洛陽敵而越之花以逺罕識不見齒是洛陽為天下之第一也洛陽亦有黄芍藥緋桃瑞連千葉李紅郁李之數皆不減他出者而洛陽人不甚惜之謂果子花曰某花云云至牡丹則不名直曰花盖謂天下真花獨牡丹其名之者不假曰牡丹而可知也其愛重之如此予所見而今人多稱者纔三十餘種故今所録但取其特著而次序之姚黄牛魏紫紅家黄細葉緋夀安花鞓潜溪左獻来紅朱砂紅葉底紫珠鶴翎紅紅深色紅紫倒暈檀心安九蘂真延州多葉麄葉夀胎丹州紅草蓮華萼捻一百五版鹿花甘黄一紅玉白姚黄者千葉黄花出於民姚氏牛黄比姚黄差小真宗幸汾隂牛氏獻此花魏紫者千葉紅花出於魏相仁浦家錢思公曰人謂牡丹花王今姚黄真為王而魏乃后也鞓紅者單葉深紅花獻來紅者多葉淺紅花深色紅者多葉花始開而白經日漸紅至落乃深紅鶴翎紅者多葉花其末白本肉紅如鴻鵠羽毛細葉麄葉壽安者皆千葉肉紅出壽安縣錦屏山倒暈檀心者葉紅自外深色近萼反淺白而深檀㸃其心一捻紅者多葉淺紅花葉杪深紅一㸃如人以十指捻之九蘂真珠紅者千葉紅花葉上有一白㸃如珠蹙其蘂為九叢一百五者多葉白花落花以穀雨為開候而此花常至一百五日開丹州延州紅者皆千葉紅花蓮花萼者多葉紅花青趺三重如蓮花萼左花千葉紫花朱砂紅多葉紅花葉底紫千葉紫花其色如墨花在叢中旁心生一大枝引葉覆其上玉版白者單葉長如拍板之狀色如玉深檀心潛溪緋花葉緋色出於潛溪寺本是紫花忽於叢中特出緋者不過一兩朶明年移在他枝洛人謂之轉枝花鹿胎花多葉紫花有白㸃如鹿胎之紋花品敘洛陽地脉花最宜牡丹尤為天下竒我昔所記數十種於今十年皆忘之開圖又見故人面其間數種昔未窺客言近嵗花特異徃徃變出呈新枝洛人驚誇立名字買種不復論家貲比新較舊難優劣争先擅價各一時題牡丹圖蟾精雪魄孕雲荄春入香腴一夜開宿露枝頭含玉塊暖風庭外揭銀杯紫檀金粉香未吐緑萼紅苞露猶浥一朶妖紅翠欲流春光回照雪霜羞化工只欲呈新巧不放閒花得少休有僧閉門手自栽千枝萬葉巧剪裁一叢一叢何所似瑪瑙盤盛金縷杯霏霏雨霧作清妍爍爍明燈照欲燃明日春隂花木老故應未忍著酥煎東坡書孟蜀時兵部尚李吳每將牡丹數枝分遺朋友以興平酥同贈且曰俟花凋謝即以酥煎食之無棄濃艷盡日玉盤堆秀色滿城綉縠走春風司馬公妍麗色殊衆栽培功倍深矜誇傳萬里圖寫費千金難就朱欄賞徒勞逺客心范堯夫聞道潛溪千葉紫主人不剪要題詩欲搜佳句恐春老試遣七言賒一枝承君接送魏家紫令我發興郎官清山谷東陽封作萬花王更賜珍華出尚方白玉盃傳青玉案碧羅領襯白羅裳古來洛陽元無種今去天心别得香攜取歐陽家記看此花未出説姚黄誠齋芍藥經贈之以芍藥詩史王筠字元禮年十六為芍藥賦梁書傳記黑孿夷芍藥也廣雅牛亨問曰將離贈之以芍藥者何答曰芍藥一名將離故將别贈之亦猶相招召贈以蘼蕪蘼蕪一名當歸古今注集紅藥當堦翻謝元暉傍砌看紅藥杜詩翠莖紅蘂天力與此恩不屬黄鍾家浩態狂香昔未逢紅燈爍爍緑盤龍覺來猶對忽驚恐身在仙宫第幾重韓集凡卉與時謝妍華麗兹晨欹紅醉濃露窈窕留餘春孤賞白日暮暄風動摇頻夜牕靄芳氣幽卧知相親願致溱洧贈悠悠南國人栁集背日房微斂當堦朶旋開葶抽碧股粉蘂撲黄絲釵勾漏丹砂裹焦燒火焰旗彤雲賸根蔕絳幘欠纓珠况有晴風動仍兼宿露垂疑香薫罨畫似淚著臙脂白居易芍藥和金鼎王維結綺樓前芍藥開温庭筠本朝花之名天下者洛陽牡丹廣陵芍藥耳紅葉而黄腰號金帶圍無種有時而出則城中當有宰相韓魏公守廣陵日一出四枝選客賞之王岐公荆公皆在座而闕其一公私自念今日有過客不問如何召使當之及暮陳太傅來亟使召之乃秀公也明日酒半折花歌以挿之其後四公皆為首相后山談叢揚州芍藥為天下冠蔡京為守始作萬花㑹用花十餘萬枝既而諸邑吏縁為姦予首罷之仇池記揚州芍藥名於天下四方市種以師者多矣吾見其一嵗而小變三嵗而大變卒與常花無異由是芍藥之美益專於揚州焉大抵粗者先開佳者後發髙至尺餘廣至盈手其色以黄為最貴所謂緋紅千葉乃其下者孔常父序劉貢父記廣陵芍藥三十一種冠羣芳疊賽羣芳積空粧成醉盡天工道晩粧新掬㸃粧紅香英嬌紅西施粧成香瓊妬素粧殘縷試梅粧怨粧淺勻妬醉嬌紅蘸擬香英嬌紅金囊春紅鵝黄金香試濃粧奶殷粧宿粧殷㑹三英取次粧合歡芳聚香絲擬綉韉簇紅絲銀含陵王觀新收芍藥八名御衣黄子黄樓子冠澠池紅黄胡纈袁黄冠峽石子鮑冠子楊花冠子朱氏之園最為冠絶南北二圃所種幾於五六萬株當其花之盛開飾亭宇以待來逰者揚之人與西洛不異故開明橋之間方春之月拂旦有花市焉州宅舊有芍藥㕔聚一州絶品於其中不下龍興朱氏之盛王觀後序東武舊俗每嵗四月大㑹於南禪資福兩寺以芍藥供佛今嵗最盛凡七千餘朶皆重跗累萼繁麗豐碩有白花正圓如覆盂下十餘葉稍大承之如盤姿格絶異獨出於七千朶之上因名曰玉盤盂乃為之詩云兩寺粧成寶瓔珞一株争看玉盤盂直待瓊舟覆玉彛倚竹佳人翠袖長天寒猶著薄羅裳揚州近日紅千葉自是風流時世粧東坡集九十風光次第分天憐獨得殿殘春一枝䞉欲簮雙髻未有人間第一人后山醉紅如墮珥柰此惱人香正爾無言笑未應吳國亡前人詠醉西施春風十里朱簾捲彷彿三生杜牧之紅藥稍頭初蠒粟揚州風物鬢成絲山谷過廣陵梅花經終南何有有條有梅山有嘉卉侯栗侯梅詩史武帝壽陽公主為梅花粧宋書詳見人日類何遜作揚州法曹廨舍有梅花一株遜吟詠其下後居洛思梅再請其任抵揚州花方盛遜對花徬徨終日梁書傳記越使使登執梅一枝以遺梁王梁臣韓子曰烏有以一梅枝遺列國之君者乎説苑陸凱自江南寄梅花一枝與范曄并詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春荆州記趙師雄遷羅浮一日天寒日暮於松竹林間酒肆旁舍見美人淡粧素服出迎時殘雪未消月色微明師雄因與之叩酒家門共飲少頃一緑衣童子笑歌戲舞師雄醉寢但覺風寒相襲久之東方已白起視在大梅花樹下上有翠羽啾嘈相顧月落參横但惆悵而已龍城記李白逰慈恩寺寺僧獻緑英梅海墨徽言黎舉常云欲令梅聘海棠但恨時不同耳金城記袁豐之居宅後有六株梅開為隣屋煙炁所爍豐即團泥塞竈張幙蔽風嘆曰氷姿玉骨世外佳人但恨無傾城笑耳即使妓秋蟾出比之乃云可與比軀争先然脂粉之徒正當在後桂林志大庾嶺上梅南枝落北枝開六帖南方梅繁如北杏十二月開嶺表録異記集余嘗慕宋廣平璟之為相貞姿勁質剛態毅狀疑其鉄心石膓不吐軟媚詞觀其梅花賦清便富艷得南朝徐庾體殊不類其為人也皮日休梅花賦序衝霜當路發映雪擬寒開枝横却月觀花繞凌風臺何遜昨日北湖梅開花已滿枝梅花南嶺頭聞道春還未相識走傍寒梅訪消息李白東閣官梅動詩興還如何遜在揚州廵簷索共梅花笑冷蘂疎枝半不禁山意衝寒欲放梅雪籬梅可折雪岸叢發梅蘂臘前破梅花年後多何當看花蘂欲發照江梅杜詩朔風飄夜香繁霜滋曉白韓集何處拂胷資蝶粉幾時塗額藉蜂黄李義山若在秦樓畔堪為弄玉媒杜牧梅花不肯傍春光自向春冬看艷陽羌笛逺吹胡地月燕釵初試漢宮粧風雖强暴翻添思雪欲侵凌更助香應笑暫時桃李樹盜天和氣作年芳韓偓香中别有韻清極不知寒崔道融本朝今日梅花詩詞多用參横字蓋出栁子厚龍城録所載趙師雄事其語云東方已白月落參横且以冬半視之黄昏時參已見至子夜則西没矣安得將旦而横乎秦少逰詩月落參横畫角哀暗香浮盡令人老承此誤也唯東坡云紛紛初疑月掛樹耿耿獨與參横昏乃為精容齋隨筆東坡梅詞云髙情已逐曉雲空不與梨花同夢後見王昌齡詩云落落漠漠路不分夢中喚作梨花雲東坡引用此詩也王文正公曽嘗賦梅花詩云雪中未問和羮事且向百花頭上開大魁相業已卜於此林和靖詩云疎影横斜水清淺暗香浮動月黄昏王晉卿以為疎影暗香之句杏與桃李皆可用也蘇子瞻云但恐李花桃花不敢承當耳詩話凡詠梅多詠白而荆公詩獨云鬢撚黄金色欲墮蔕團紅蠟巧能粧不惟造語巧麗可謂能道人不到處矣遯齋閒覽崢嶸突兀茹鉄為骨凛然氷姿氣壓羣木近似則然孰知其真儲萬斛香先天下春洪景蘆粉蘂自折清香繁窮冬萬木立枯死玉艷獨發凌清寒鮮妍皎如鏡裏面綽約對若風中仙雪裏花開人未知摘來相顧共驚疑便當索酒花前醉初見當年第一枝六一集雪後園林纔半樹水邊籬落忽横枝池水倒窺疎影動屋簷斜入一枝低霜禽欲下先偷眼粉蝶如知合斷䰟堪笑胡雛亦風味醉將聲調角中吹蘂訝粉綃裁太碎葉疑紅蠟綴初乾林和靖真態生香誰畫得玉奴纎手嗅梅花玉奴東昏侯妃潘氏也海南仙雲嬌墮砌月下縞衣來叩門羅浮山下梅花村玉雪為骨氷為魂人間草木非我對奔月偶桂成幽昏氷盤未薦含酸子雪嶺先開耐凍枝應笑春風木芍藥豐肌弱骨要人醫絞綃劈碎玉簮輕檀暈粧成雪月明天教桃李作輿臺故遣寒梅第一開洗盡鉛華見雪肌要將真色鬬生枝檀心已作龍涎吐玉頰何勞獺髓醫慇懃更下山隂雪要與梅花作伴來數枝殘緑風吹盡一㸃芳心雀噪開江頭千樹春欲暗竹外一枝斜更好風清月落無人見洗粧自趂霜鍾早唯有飛來雙白鷺玉羽瓊林鬬清好東坡漢宮嬌額半塗黄粉色凌寒透薄粧好借月魂來映燭恐隨春夢去飛揚風亭把盞酬孤艷雪徑回輿認暗香從教臘雪埋藏得却遇春風漏泄香不御鉛華如國色秖裁雲縷想仙裝額黄映日明飛燕肌粉含風冷太真玉笛悲凉吹易徹氷紈生澁畫難親王介甫莫遣朔風吹飄零成玉唾洪龜父數㸃深藏碧玉枝翠峰十二擁瑶姬憑君說與凡桃李徹骨清寒不觧枝陳無已細挿斜枝惱意香謝無逸紅梅史關令尹喜謝關景仁送紅梅栽史記傳記蜀州有紅梅數本郡侯建閣扄鑰㳺人莫得見一日有兩婦人髙髻大袖凭欄語笑郡侯啟鑰間不見人唯東壁有詩曰南枝向暖北枝寒一種春風有兩般憑仗髙樓莫吹笛大家留取倚欄杆摭遺集春半花纔發多應不耐寒北人初未識渾作杏花看古詩江上紅梅欲放春杜詩本朝紅梅粉紅色標格猶是梅而繁密如與江梅同開紅白相映園林初春絶景也承平時此花猶盛姑蘇晏元獻云始移梅西岡圃中一日貴㳺賂園吏得一枝分接由是都下有一本嘗與客飲花下賦詩云若更開遲三二月北人應作杏花看客曰公詩固佳待北俗何淺耶晏笑曰傖父安得不然王琪君玉時守吳郡聞盗花種事以詩遺公曰館娃宫北發精神粉瘦瓊寒露業新園吏無端偷折去鳳城從此有雙身當時罕得如此比年不可勝數矣范至能梅譜怕愁貪睡獨開遲自恐氷容不入時故作小紅桃杏色尚餘孤瘦雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老不知風格在更看紅葉與青枝石曼卿紅梅詩云認桃無緑葉辨杏有青枝坡云此至陋淺村李堂中語也雪裏花開却是遲如何猶占上春時也知造物含深意故與施朱發妙姿細雨裛殘千顆淚輕寒瘦損十分肌不應更雜夭桃李半㸃微酸已著枝幽人自恨探春遲不見檀心未吐時丹鼎奪胎那是寶玉人頩頰更多姿抱叢暗蘂初含子落盞濃香已透肌乞與徐熈畫新様竹間璀璨出斜枝年年芳信負紅梅江半垂垂又欲開珍重多情關令尹直和根撥送春來東坡紫府與丹來換骨春風吹酒上凝脂方子適路入君家百步香隔簾初識漢宫粧直疑夢到昭陽殿一簇輕紅繞淡黄韓子倉蠟梅本朝京洛間有一種花香炁似梅花而不能晶明類女工撚蠟所成京洛人因謂之蠟梅詩云金蓓鎖春寒惱人香未展雖無桃李顔氣味極不淺又云體薫山麝臍色染薔薇露披拂不盈襟時有暗香度山谷集山谷初見蠟梅戲作二絶縁此盛於京師詩話蠟梅凡三種以子種出不經接花小香淡其品最下俗謂之狗蠅梅經接花疎雖盛開花常半含名磬口梅言似僧磬之口也最先開色深黄如紫檀花密香濃名檀香梅此品最佳蠟梅香極清芳殆過梅香初不以形狀貴也范至能梅譜天宫㸃酥作梅花此有蠟梅禪老家蜜蜂採花作黄蠟取蠟為花亦此物萬松嶺上黄千葉玉蘂檀心兩竒絶東坡天公戲剪百花房奪盡人工更有香埋玉地中成故物折枝鏡裏憶宫粧香蜜染成宫様黄卧雲荏上殘花笑香似早梅開不遲山谷寒裏一枝放白間千㸃黄色輕花更艷體弱香自永玉質金作裳山明風弄影化作巧湘様相花何年落子空王家羽衣霓裳涴香蠟從此人間識尤物異色深宜晩生香故觸人不施千㸃白别作一家春花裏重重葉釵頭㸃㸃黄秪應報春信故作著人香后山花房小如許銅砌黄金塗中有萬斛香與君細細輸奕奕金仙面排行立曉情慇懃夜來雪少住作珠瓔家家融蠟作杏蔕嵗嵗紅梅是蠟化世間真偽非兩法映日細開真是蠟我今嚼蠟已甘腴况此有韻蠟不如陳去非未教落素混氷池且看經花綴雪衣晁無咎蜜蜂底物是生涯花作餱糧蠟作家嵗晩畧無花可採却將香蠟吐成花粟玉團雕蕾金鍾細著行來從真蠟國自號小黄香夕吹撩寒馥晨曦透暖光南枝本同姓喚我作他揚楊誠齋桃花經桃之夭夭灼灼其華何彼穠矣華如桃李詩仲春之月桃始華禮史桃李不言下自成蹊史記文帝六年十月桃李華漢書北齊盧士琛妻崔氏春日以桃花和雪敷面云取白雪作光悦取桃花作妍華史畧傳記驚蟄大壯初九候桃始華桃不華倉庫多火易通卦驗春桃生華季女宜家焦贑易林三月桃花盛農人候時而種也崔寔月令晉太元中武林人捕魚從溪而行忽逢桃花林夾兩岸芳華鮮美林盡得山行四五步屋邑相接鷄犬相聞男女見漁父驚為設酒食云先世避秦難至此既出白太守遣人隨往尋之迷不復得桃源記景龍四年上宴於桃花園學士李嶠等獻桃花詩上令宫女歌之辭既清婉歌仍妙絶上敕太常簡二十篇入樂府號曰桃花行景龍文館記明皇御苑千葉桃花盛開帝折一枝挿於妃子寶冠曰此花亦能助嬌態又曰不獨萱草忘憂此花亦能銷恨開元遺事劉禹錫作贈看花諸君子詩云紫陌紅塵拂面來無人不道看花回𤣥都觀裏桃千樹盡是劉郎去後栽自敘云正元二十一年春除為屯田員外此觀未有花是嵗出牧連州居十年詔至京師人人皆言有道士植仙桃滿觀遂有前篇以志一時之事旋又出牧於今十四年重逰𤣥都蕩然無復一樹惟兎葵燕麥動摇春風耳因再題曰百畆庭中半是苔桃花净盡菜花開種桃道士今何在前度劉郎今又來本序詩崔䕶清明日逰都城南得居人莊叩門求飲女子獨倚小桃斜柯佇立屬意殊厚及來嵗清明日徑往尋之門院如故而扄鎖崔因題詩左扉曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風廣記青齊間有一種桃花盛開時垂絲至二三尺採之鍊以松脂遞相纒結可織成鞋履青州雜記集素練輕而玉顔半酡近榆錢兮粧翠靨映楊栁兮顰愁眉或臨金塘或交綺井皮日休桃花賦桃花開東園含笑誇白日偶蒙春風榮生此艷陽質李白紅入桃花嫩輕薄桃花逐水流桃花氣暖眼如醉㸃注桃花舒小紅桃花一簇開無主可愛深紅映淺紅杜詩桃枝綴紅糝種桃處處惟開花川原逺近蒸紅霞百葉雙桃晩更紅臨牕映竹見玲瓏應知侍史歸天上故伴仙郎宿禁中韓集况是青春日將暮桃花亂落如紅雨李賀桃散武陵霞李義山逰女花簮紫蔕桃紫洞香風吹碧桃亡國亡家為顔色露桃猶自恨春風杜牧桃花㸃地紅班班髙適剪絹裁綃一重重白樂天本朝緋桃一樹獨後發意若待我留芳菲清香嫩蘂含不吐日日怪我來何遲六一集未放小桃紅入萼夭桃弄春色上苑夭桃自作行劉郎去後幾回芳我觀解語花粉色如黄土桃花忽成隂争開不待葉密綴欲無條竹外桃花三兩枝東坡小桃源口雨繁紅山谷青青千里亂青袍宿雨催紅出小桃春風過栁緑如繅晴日蒸紅出小桃王介甫李花經華如桃李詩史桃李不言下自成蹊史記武徳中有獻李樹連理蟠屈如龍貞觀中玉華宫李樹連理隔澗合枝神龍陳州官舍中有李樹黄落將盡忽更鮮茂而生花焉唐書傳記終南及廬岳出好李花兩市貴侯富民以千金買種有致富者耕種偶記蕭瑀陳叔達於龍昌寺看李花相與論李有九標謂香雅細淡潔密宜月夜宜緑鬢宜泛酒無異色永平舊纂元㣲之白樂天兩不相下一日同詠李花㣲之先成曰葦綃間萬朶樂天乃服綃練也葦白而綃紅髙隱外書伍貫卿居沅陵家有李花一枝月夜奴婢遥見花作數團如飛仙狀上天去花上露水倐然作雨數千㸃花則亡矣樞要録集平旦入西園棃花數株若矜誇旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百匝至日斜忽憶前時經此樹正見芳意初萌芽奈何趂酒不省録不見玉枝攅霜葩泫然為汝下雨淚無由返斾羲和車當春天地争奢華洛陽園苑尤紛華誰將平地萬堆雪剪刻作此連天花夜領張徹投盧仝乘雲共至玉皇家長姬香御四羅列縞裙練帨無等差風揉雨練雪羞比白花倒燭天夜明韓集本朝西園有千葉淡佇更纎濃不及棃英軟應慙梅萼紅東坡嘉李繁相倚園林澹日春齊紈剪衣薄吳紵下機新色與晴光亂香和露氣勻望中皆玉樹環堵不為貧羽蓋夢餘凭畫立縞衣風急過墻東司馬公杏花傳記三月杏花盛可播白沙輕土之田雀寔四民月令杏始華趣耕輕土杏華落趣耕䦨汜勝之書揚州太守圃中有杏花數十㧣每至爛開張大宴一株令一娼倚其傍立館曰争春開元中宴罷夜䦨人咸云花有嘆聲揚州事迹裴晉公午橋莊有文杏百株其處立碎錦坊曹林異景阮文姬挿鬢用杏花陶溥公呼曰二花河東備録集居鄰北郭古寺空杏花兩株能白紅曲江滿園不可到看此寧避雨與風豈如此樹一來翫若在京國情何窮韓集煙濕杏花鬚李賀紅簇交枝杏怪君把酒偏惆悵曽是貞元花下人自别花來多少事東風二十四回春白樂天春意竟相妬杏花應最嬌紅輕欲愁殺粉薄似啼消願作白華夢翩翩遶此條吳融香屬登龍客煙籠宿蝶枝鄭谷本朝蓓蕾枝稍雪㸃乾粉紅腮額露春寒不禁煙雨輕欺著秪好亭臺愛惜看偎栁傍桃斜欲墜等鸎期蝶猛成團京師巷陌新晴後賣得風流更一般林和靖姹然山杏開最早其餘紅白各自媒何如艷風日獨自占芳辰得晴丹杏不勝紅杏花妍媚逞春酣六一集零露滋月蘂温風散晴葩春工了不睡連夜開此花芳心誰剪刻天質自清華惱客香無有弄粧影横斜杏花飛簾散餘春天工剪刻為誰妍東坡天晴日煖籠紫煙鏡裏紅粧獨帶酒江梅已盡桃李遲此時此花即吾友山谷垂楊一徑紫苔封人語瀟瀟院落中獨有杏花如喚客倚墻斜日數枝紅王介甫未央宫裏紅杏羯鼓三聲打開陳去非曽見乾條撼雪時一暄曝出萬餘枝從今日日須來看看到紅紅白白時紅藍紙細糝紅苞紫玉森森走膩條楊誠齋棃花傳記洛陽棃花時人多攜酒其下曰為棃花洗粧或至買樹唐餘録九仙殿銀井有棃花二株枝葉交結宫中呼為雌雄樹銀鑾記梁緒棃花時折花簮之壓損㡌簷至頭不能舉祥雲志集棃花白雪香棃花千樹雪李白洛陽城外清明節百花寥落棃花發今日相逢瘴海頭共驚爛燦開正月聞道郭南千樹雪欲將君去醉如何棃花數株若矜誇韓集曲水飄香去不歸棃花落盡成秋苑李賀玉容寂寞淚䦨杆棃花一枝春帶雨風寒露重濕棃花白樂天月黑見棃花鄭谷棃花院落溶溶月唐詩滿樓明月棃花白温庭筠本朝日煖棃花催美酒歸去棃花禁籞殘此樹生此處絶艷無人顧春風吹落復吹開山鳥飛來自飛去風輕絳雪樽前舞日煖繁香露下聞六一集棃花淡白栁深青栁絮飛時花滿城惆悵東欄數株雪人生看得幾清明尚記棃花村依依聞暗香共藉棃花作寒食東坡剪剪輕風漠漠寒玉肌瀟索粉香殘一枝帶雪墻頭出不用行人著眼看冷香銷盡晩風吹黙黙無言對落暉謝無逸櫻桃花集櫻桃千萬枝照耀如雪天王孫燕其下隔水疑神仙宿霧發清香初陽動暄妍妖姬滿髻挿酒客折枝傳劉夢得本朝櫻桃花發滿晴柯不賭妖嬈只賭多落盡江梅餘半朶依前風韻合還他楊誠齋海棠傳記明皇登沉香亭召太真妃子妃子時卯醉未醒命力士從侍兒扶掖而至妃子醉顔殘粧鬢亂釵横不能再拜上皇笑曰此真海棠睡未足耳楊妃外傳賈眈著百花譜以海棠為花中神仙花木録杜子美母名海棠故集中無海棠詩詩話黎舉嘗云欲令梅䀻海棠但恨不同時耳金城記集蕭颯海棠枝李白穠麗最宜新著雨妖嬈全在欲開時朝醉暮吟看不足羡他蝴蝶宿深枝濃淡芳春滿蜀鄉半隨風雨斷鸎腸鄭谷昔聞逰客話芳菲濯錦江頭幾萬枝縱使許昌持健筆可憐終古愧幽姿名園封殖幾經春露蘂煙稍畫不真賈島海棠花在否側卧捲簾看韓偓本朝真宗御製後苑雜花十題以海棠為首賜近臣唱和花木以海為名者悉從海外來唯紫錦色者謂之海棠餘悉棠棃花耳沈丘海棠記張冕賦蜀海棠詩云山木𤓰開千顆顆水林檎發一攅攅注云大約木𤓰林檎花初發皆與海棠相類若冕言則江西人正謂棠棃花耳按沈丘記其花五出初則極紅如臙脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉審此則似林檎木𤓰二花者非真海棠明矣復齋謾録淵材嘗恨海棠無香李丹受昌州倅以去家逺改鄂倅淵材曰昌佳郡也柰何棄之卒曰何以知其佳淵材曰海棠無香昌州海棠獨香非佳郡乎墨客揮犀摇摇墻頭花笑笑弄顔色荒凉衆草中露此紅灼皪六一集東風嫋嫋泛崇光香霧霏霏月轉廊只恐夜深花睡去髙燒銀燭照紅粧江城地瘴蕃草木只有此花苦幽獨嫣然一笑竹籬間桃李漫山總麄俗也知造化有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑東坡海棠院裏尋春色日炙嫣紅滿院香山谷靚粧濃淡蘂蒙茸吳中復要使吳同蜀須看線海棠胭脂色欲滴紫蠟蔕何長梅聖俞蔕江浙間有一種柔枝長顔色淺紅垂英向下謂之垂絲海棠幽姿淑態㺯春晴梅借風流栁借輕剰種直教圍野水半開長是近清明幾經夜雨香猶在染盡臙脂畫不成詩老無心為題拂至今惆悵似含情劉屏山亂英深淺色香氣有無中朱文公落日争明那肯暮艷粧一出更無春銀燭不燒渠不睡稍頭恰恰掛氷輪已折未開渾是韻乍濃還淡總由春無波可照底須窺與栁争妍也學垂不關殘醉未醒鬆不為春愁懶散中自是新晴生睡思起來無力對東風垂絲别是一風光誰道全輸蜀海棠風攪玉皇紅世界日烘青帝紫衣裳懶無氣力仍春醉睡起精神欲曉粧舉似老夫新句子看渠桃李敢承當楊誠齋酴醿傳記棃舉嘗云牡丹酴醿幸為執友金城記本朝瓊林殿側玉鈎欄雪覆新花四月寒密影能容千客坐柔條何啻萬龍盤注云瓊林苑中宴殿中此花最盛劉原父酴醿不争春寂寞開較晩青蛟走玉骨羽盖蒙翠幰不粧艷已絶無風香自逺長憶故山寒食夜野酴醿發暗香來無分素手簮螺髻且折霜麩浸玉醅東坡漢宫嬌額半塗黄入骨濃薫買女香日色漸遲風力細倚欄偷舞白霓裳肌膚氷雪薫沉水百草千花莫比芳露濕何郎試湯餅日烘荀令炷爐香風流徹骨成春酒夢寐宜人入枕囊輸與能詩王主簿瑶臺影裏據胡床天遣酴醿玉作花紫揉錦色染金沙憑君著意樽前看便與春工立等差沉水香籠白玉苗不蒙湔沸苦無聊名字因壺酒風流付枕幃十年翠錦幄酴醿照金沙山谷青天映妙質白日照繁香影動春微透花寒韻更長陳去非平生為愛此香濃仰面常迎落絮風韓持國十萬青條寒挂雨三千粉面笑臨風莫將擬雪才情賦盖與觀梅興味同劉屛山酴醿珍重不浪開晩惟緑雲㸃氷玉體薫山麝非一臍水洗銀河費千斛滴成小蓓密於糝亂走長條柔可束醉眸須及月下來破鼻試從風處觸為憐壓架十萬枝小立傍邊領新馥剩拚好語寵瓊𬎼更掇清英釀醽醁楊誠齋薔薇傳記薔薇一名薔麻一名生棘一名薔蘼其子名榮實本草集不向東山久薔薇幾度花李白一丈紅薇擁翠筠羅窻不識曉階塵薔薇泣幽素翠帶花鈿小李義山似錦如霞色連春接夏開劉禹錫濃隂似悵紅薇晩温庭筠晩紅抹破胭脂顆夜雨催成蜀錦機張祐朶朶精神葉葉柔雨晴山拂醉人頭石家錦障依然在寒倚東風夜不收杜牧裊裊長數尋青青不作林一莖獨秀當庭心數枝分作滿庭隂春日遲遲欲將半庭影玲玲正堪翫枝上嬌鶯不畏人葉底飛蛾自横亂秦家兒女愛芳菲畫眉相喚採萎蕤髙處紅鬚欲就手低邊緑刺已牽衣儲光羲紫薇集曉迎瑞露一枝新不占園中最上春桃李無言又何在向風偏笑艷陽人杜牧紫薇花對紫薇郎白樂天詳見中書舍人類明麗碧天霞丰茸紫綬花香聞荀令宅艷入孝王家紫茸垂組綬金縷攅鋒頴露溽暗傳春風輕徐就影劉夢得一樹濃姿獨看來秋庭暮雨洗塵埃天涯地角同榮謝豈要移根上苑栽李義山本朝虛白堂前合抱花秋風落日照横斜閲人此地知多少物化無涯生有涯折得芳㽔兩眼花題詩相報字傾斜篋中尚有絲綸句坐竟天光照海涯東坡禁中五月紫薇樹閣後近聞新著花薄薄嫩膚搔鳥𤓰離離碎蘂剪城霞梅聖俞朱槿傳記嶺表朱槿莖葉皆如桑樹南人謂之佛桑自二月開花至于仲冬方歇其花深紅色則荳䓻紅梅無以資其色矣嶺表録異自正月迄十二月常開秋冬差小耳嶺南異物志本朝焰焰燒空紅佛桑東坡朱槿移栽釋梵中老僧非是愛花紅朝開暮落渾閒事秪要人知色是空僧紹隆木槿經有女同居顔如舜華注云舜木槿也詩仲夏之月木槿榮記傳記汝陽王璡嘗戴砑硝㡌打曲上自摘紅槿花一朶置於㡌上詳見羯鼓類集飄零日及之萼注云日及槿也朝生暮落一名王蒸劉禹錫傷性賦本朝槿艷繁開照日紅旭日暎簾生流輝槿艷明紅顔易零落何異此花榮六一集山茶本朝葉厚有稜犀甲健花深少態鶴頭丹誰憐兒女花散火氷雪中掌中調丹砂染此鶴頂紅逰蜂掠盡粉絲黄落蘂猶收蜜露香待得春風幾枝在年來殺菽有飛霜山茶相對本誰栽細雨無人我獨來説似與君渾不見爛紅如火雪中開東坡山丹本朝堂前種山丹錯落瑪瑙盤亭下佳人錦綉衣滿身瓔珞綴明璣晩香銷歇無尋處花已飄零露已晞煙紅露緑晩風香燕舞鶯啼春日長誰道使君貧且老綉屏錦帳咽笙簧盆裏千枝錦被堆東坡春去無芳可得尋山丹最晩出雲林沛然一色明羅袖金粉羣蟲進寳簮花似鹿葱還耐久葉如芍藥不多深青泥瓦斛移山蘤聊著書窻伴小吟楊誠齋水仙本朝早於桃李晩於梅氷雪肌膚姑射來明月寒霜中夜靜素娥青女競徘徊劉貢父水仙花木水仙栽靈種初應物外來碧玉簮長生洞府黄金盃重壓銀臺錢穆父凌波仙子生塵襪水上輕盈歩㣲月是誰招此斷腸魂種作寒花寄愁絶含香體素欲傾城山礬是弟梅是兄坐對真成被花惱出門一笑大江横折送南園栗玉花并移香本到寒家何時持上玉宸殿乞與宫梅定等差得水能仙天與竒寒香寂寞動氷肌仙風道骨今誰有淡掃娥眉簮一枝借水開花自一竒氷沉為骨玉為肌暗香已壓酴醿倒只比寒梅無好枝錢塘昔聞水仙廟荆州今見水仙花暗香晴色撩詩句宜在林逋處士家淤泥解作白蓮藕糞壤能成黄玉花可惜國香天不管隨縁流落小民家山谷仙人湘色裘縞衣以裼之青幌紛委地獨立春風時陳去非紛敷翠羽帔温靚白玉相黄冠表獨立淡然水仙粧弱植愧蘭蓀髙操摧氷霜湘君謝遺褋漢水羞捐璫朱文公薤葉葱根兩不差萎蕤風味猶清嘉薄挼肪玉圍金細淺染鵝黄剰素紗臺琖元非千葉種丰容要是小蓮花誠齋自序云世以水仙為金琖銀臺盖单葉者至千葉水仙其中花片捲皺密蹇一片之中下輕黄而上淡白如染一截者與酒盃之狀殊不相似如千葉者乃水仙云山礬本朝江湖南野中有一種小白花木髙數尺春開極香野人號為鄭花王荆公嘗欲作鄭花詩而陋其名予請名曰山礬野人採鄭花葉以染黄必借礬而成色故名山礬海岸孤絶處補陀落伽山説者以為小白花山予疑即此山礬花爾不然何以觀音老人堅坐不去耶詩曰北嶺山礬取意開輕風正用此時來平生習氣難料理愛著幽香未擬回又曰髙節亭邊竹已空山礬獨自倚春風二三名士開顔笑把斷花光水不通山谷集唐人題唐昌觀玉蘂花詩云一樹瓏鬆玉刻成飄廊㸃地色輕盈女冠衣覓香來處惟有堦前碎月明今楊花即玉蘂花魯直又更名山礬楊汝士與白帖云唐昌以玉蘂少故見貴耳自來江南山有之則知楊花之為玉蘂斷無疑矣髙齋詩話梔子花傳記陶真白言梔子剪花六出刻房七道其花香甚相傳即西域薝蔔也雜爼集梔子比衆木人間誠未多於身色有用與道氣傷和紅取風霜實青看雨露柯無情移得汝貴在映江波杜詩色疑瓊樹倚香似玉宫來劉夢得本朝白薝蔔花即今山梔子花也東坡云薝蔔花與雪花同六出似未極其趣按染梔子花六出雖香不濃郁山梔子花八出一株可香一園山谷集六花薝蔔林間拂薝蔔林中無别香東坡刺桐集猗猗小艷夾通衢晴日春風笑越姝只是紅芳移不得刺桐屏障滿中都東陶蓮花荷附經隰有荷華彼澤之陂有蒲與荷有蒲菡萏詩子五沃之土生蓮管子史鄭敬為新遷坊曹嘗與同郡鄧敬因折芰荷為坐以荷獻肉瓠瓢盛酒言談彌日謝承後漢元嘉二十二年天泉池樂逰苑池𤣥圃池生蓮同榦沈約宋書又蓮生建康額擔湖一莖兩華宋記東昏侯鑿金蓮花以貼地令潘妃行其上曰此歩歩生金蓮花也齊書傳記荷芙蕖其莖茄其葉葭其本蔤其華菡萏其實蓮其根藕其中菂菂中薏爾雅江東呼荷華為芙蓉廣雅其華未發為菡萏已發為芙蕖毛詩義疏芙蓉一名荷華生池澤中一名澤芝一名水仙古今注茄芙蕖莖也荷芙蕖實也蓉芙蕖本也說文北及𤣥阪有紫荷萬里中有寒荷霜下方香茂漢昭帝逰栁池有芙蓉紫色大如斗花葉柔甘可食芬氣聞十里之内洞㝠記又昭帝穿林池中植分枝荷一莖四葉日照而葉低䕃根名曰低光荷靈帝引渠水以遶砌渠中植蓮大如盖根長一丈其葉夜舒晝卷一莖有四蓮叢名曰夜舒荷拾遺録華山頂有池池中生千葉蓮花服之羽化華山記九疑山青澗中有黄色蓮神境記麻姑得道處壇東南池中有紅蓮近忽變碧今有白矣麻姑山記南海有睡蓮則花低入水雜爼泰始二年嘉蓮一雙生豫州澧湖宋起居注齊太和二年烏程縣閣下生蓮華萬嵗厯佛圖澄以鉢盛水燒香呪之須臾青蓮華出澄傳王敦在武昌鈴下儀仗生蓮華五六日而落説者曰易稱枯楊生華何可久也今華生枯木敦終逆而身死搜神記唐太液池千葉白蓮開明皇與妃子共賞指妃子曰何如此解語花耶天寶遺事元載芸輝堂前有池中有碧芙蓉香潔菡萏偉於常者暇日凭欄忽聞歌聲其曲則玉樹後庭花也載審聴之則芙蓉中也剖其花一無所見杜陽編馬士良至炭谷湫岸纔曉五色雲自空降仙女在中水濵有金槌玉板連扣數下青蓮湧出仙女取食之廣記三堂使宅有釣仙池蓮花香兼桃梅茰菊郡人傳分香蓮不論錢三堂往事房壽六月召客擣蓮花製碧芳酒鄭公慤避暑取大蓮葉盛酒以簮刺葉令與柄通持噏之號碧筒酒鷄􅀈集芬陀利華白蓮華也優鉢羅花青蓮華也波頭摩花赤蓮華也佛書餌𤣥洞之紫蕖大洞真經集懷芰荷以為衣兮集芙蓉以為裳荷衣兮蕙蔕搴芙蓉兮木末芙蓉始發雜芰荷些楚辭黄螺圎出垂蕤散舒纓以金牙㸃以素珠張奐賦其始榮也皦若夜光尋扶木其揚輝也晃若九日出暘谷芙蓉騫産菡萏星屬縣條垂珠丹莖茄緑曹植賦或擢莖以髙立似雕輦之翠盖或委波而布體擬連璧之攅㑹潘尼賦江南可採蓮蓮葉何田田古詩曲池何澹澹芙蓉蔽清涼榮華盛壯時見者誰不嘆一朝光采落故人不迴顔傅𤣥歌朱花冐緑池曹植菡萏溢金塘文選湘蓮兮映渚江淹賦青荷盖緑水芙蓉發紅鮮下有並根蔕上有同心蓮玉臺咏雨駛房紅落晩芙蓉江總碧荷生幽泉朝日艷且鮮荷花嬌欲語愁殺蕩舟人荷花鏡裏香渉江翫秋水愛此紅蕖鮮攀荷弄其珠蕩漾不成圓李白雨浥紅蕖冉冉香城邊野池蓮欲紅菱葉荷花争如拭㸃溪荷葉疊青錢白種陸家蓮紅膩小湖蓮水花晩色静江蓮摇白羽片片晩旗紅圓荷浮小葉雨過亂紅蕖杜詩太華峯頭玉井蓮開花十丈藕如船曲江千頃波秋靜平鋪紅蕖蓋明鏡荷折碧圎傾菡萏寫紅調韓文應為洛神波上襪至今蓮蘂有芳塵丹藕為誰開温庭筠都無色可並不奈此香荷菡萏薦紅衣唯有緑荷紅菡萏卷舒開合任天真此花此葉長相映翠減紅衰愁殺人李義山泄香銀槖破㵼露玉盤傾花葉媚清漣白樂天白玉花開緑錦池吳融本朝予獨愛蓮出淤泥而不染濯清漣而不夭中通外直不蔓不支香逺益清亭亭净植可逺觀而不可䙝翫焉蓮花之君子者也濓溪披紅衣而耀彩寄清流以託根白玉菡萏吹髙秋靚容新麗一何姝清池翠蓋擁芙蓉畫盆圍處花光合紅袖來時酒令行採本掇芳陂移根向玉池暗香滋白露翠色弄清漪漢宫姊妹争新寵湘浦皇英望舊思天下從來無定色况將鉛黛比天姿詠雙蓮池面風來紋艷艷波間露下葉田田誰家水上張青蓋罩却紅粧唱採蓮六一集貪看翠蓋擁紅粧不覺湖邊一夜霜日日移床趂下風清香不盡思何窮荷背風翻白蓮腮雨退紅遶郭荷花一千頃誰知六月下塘春東坡水風荷氣浮紅粧倚荷蓋水鏡寫明蠲荷花稱意紅卜立近幽香心與晩色靜四顧山光接水光凭欄十里芰荷香清風明月無人管併作南來一味凉山谷藕花無數滿汀洲參寥平池碧玉秋波瑩緑雲擁扇青油柄水宫仙女鬬新粧輕歩凌波踏明鏡張文潜蕖仙初出没照日穉猶怯密排碧羅蓋低護紅玉頰館之水晶宫環以琉璃堞珠明浮盤戲酒漾流杯曄青筆尖欲試緑箋皺還摺楊誠齋榴花傳記新羅多海石榴李徳裕言花中帶海字者悉從海東來也雜爼崖州以石榴花香著瓮中經旬即成酒郡國志香爐峯頭山石榴三月中作花色似石榴而小淡紅敷紫萼輝曄可愛廬山記上發馬嵬道傍見石榴愛之呼為瑞正樹楊妃外傳集虎寅中而纎條結龍辰升而丹華繁其在晨也灼若旭日栖扶桑其在夕也爽若燭龍吐潜光𫝊𤣥賦逺而望之粲若螭賁被山阿迫而察之赫若龍輝耀緑波庾鯈賦脩條外暢縈榦内樛丹輝綴於朱房緗的㸃於紅鬚煌煌煒煒熠耀委累似長離之栖鄧林若珊瑚之映流水潘岳賦紅鬚内艷頳牙外標似華燈之映翠幕若丹瓊之側碧瑶張協賦只為來時晩開花不及春孔記珊瑚映緑水未足比光輝李白五月榴花照眼明可憐此地無車馬顛倒青苔落絳英韓集幾年對植愛芳叢冶艷朱顔競不同從此休論春上事看成古木對衰翁栁集一朶佳人玉釵上秪疑燒却翠雲鬟杜牧天芭妬石榴温庭筠何年安石國萬里貢榴花迢遞河源道因依漢使槎元稹本朝荆公作内相時翰苑中有石榴一叢枝葉甚茂但只發一花荆公題云萬緑叢中紅一㸃動人春色不須多余每以不見全篇為恨王直方夸話紅緑㸃綴如裙腰緑葉曉鶯啼處密紅芳初日照時繁六一集絳裙深樹出幽菲東坡葉葉自相偶重重久更鮮流珠沾暑雨改色淡朝煙后山葵花傳記荆葵一名茙葵一名芘芣花色奪目有紅有白有赤但花異葉不殊也古今注集流月照西園曄曄榮紫葵陶淵明本朝葵花雖粲粲蔕淺不勝簮東坡紅葵旌節花子由葵葉為誰傾太陽后山蜀葵傳記菺茙葵也郭璞曰今蜀葵花似木槿爾雅集惟兹珍草懷芬吐榮挺河渭之膏壤吸昴井之𤣥精繞銅雀而䟽植映昆明而羅生虞繫賦本朝眼前無柰蜀葵何淺紫深紅數百窠能共牡丹争幾許得人輕處秪縁多陳標弱質困夏水竒姿蘇晩凉東坡低昂黄金杯照耀初日光檀心自成暈翠葉森有芒晨粧與午醉真態含隂陽君看此花枝自有風露香山谷鹿葱經焉得諼草言樹之背詩傳記萱忘憂草也説文鹿葱宜男草也宜懷妊婦人佩之必生男風土記萱草一名紫萱又名忘憂草吳中書生謂之療愁嵇康養生論云萱草忘憂述異記欲蠲人之憂則贈以紫棘一名忘憂欲蠲人之忿則贈以青裳一名合歡嵇康種之舍前古今注集猗猗令草生於中方華曰宜男號膺禎祥傅元賦宜男花者世有之久矣多植幽臯曲隰之地或華林𤣥圃非衡門蓬宇所宜樹也荆楚之土號曰鹿葱根苗可以薦於爼世人多女欲求男者取此草服之尤良也嵇含序其葉四垂其跗六出亦曰宜男嘉名斯言徐勉萱草賦忘憂當樹萱李白御案迷萱草宜男謾作後庭草不似櫻桃千子紅温庭筠萱草含丹粉春醉後堂萱李義山輕馥起孤萱劉言萱草生堂階逰子行天涯慈親倚堂前不見萱草花聶夷中本朝我非兒女萱鄭詩注云萱草兒女花萱草雖㣲花孤秀能自㧞亭亭亂葉中一一芳心挿東坡人心與草不相同安有樹萱憂自釋若言憂及此能忘乃是人心為物易梅聖俞鷄冠本朝神農記百卉五色味甘酸乃有秋花實全如鷄幘丹籠煙何聳聳泣露更團團赤玉書留魏丹沙句誦韓誠能因物比誰謂入時難梅聖俞紫冠黄鈿網絲窠山谷金鳳本朝憶繞朱欄手自栽緑叢髙下幾番開中庭雨過無人迹狼藉深紅㸃緑苔九苞顔色春霞悴丹穴威儀秀氣殫六一集杜鵑躑躅附傳記潤州鶴林寺杜鵑花髙丈餘相傳外國僧自天台鉢盂中以藥養其根來種之廣記詳見重陽記南方花紅赤惟躑躅為勝山谷間悉生二月發時照耀如火月餘不歇嶺南異物志集山石榴一名山躑躅一名杜鵑花詩云杜鵑啼時花撲撲又云千房萬葉一時新嫩紫殷紅鮮麯塵淚痕浥損胭脂臉剪刀裁破紅綃巾山榴花發似紅巾朱艷新妍不占春一叢千朶壓欄杆剪碎紅綃却作團風裊舞腰香不盡露消粧臉淚新乾漸綻臙脂萼猶含琴軫房絳焰燈千炷紅裙妓一行好差青鳥使封作百花王白樂天躑躅初開艷艷花韓集江風吹巧剪露綃花上千枝杜鵑血温庭筠本朝物以稀見為珍不必異種也鶴林寺杜鵑乃今映山紅又名紅躑躅者在江東彌亘山野殆與榛莾相似而鶴林之花至以為外國僧鉢盂中所移上𤣥命三女下司之已踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宫詞云大儀前日暖房來囑向昭陽乞藥栽敕賜一窠紅躑躅謝因未了奏花開其重如此盖宫禁中亦鮮云容齋隨筆南漪杜鵑天下無披香殿上紅氍毹鶴林兵火真一夢不歸閬苑歸西湖楓林翠壁楚江邊躑躅千層不忍看東坡瑞香本朝厭從年少追新賞閒對宫花識舊香幽香結淺紫來自孤雲岑骨香不自知色淺意殊深移栽青蓮宇遂冠薝蔔林結為楚臣佩散落天女襟東坡聞道仙花玉蘂紅别留春色在壺中瑶臺若見飛瓊面不與人間夢寐同李太白香密綴紅糝寶薫羃宫羅為君泛作錦薫籠陳子昂碧團欒裏筍成束紫蓓蕾中香滿襟别派近傳廬阜頂孤芳元是洞庭心織錦天孫矮作機紫茸翻了白花枝更將沉水濃薫却日淡風㣲欲午時誰將玉膽薔薇水新濯瓊膚錦綉禪同花異葉株株異一種欒枝節節欒誠齋含笑本朝涓涓泣露紫含笑而今只有花含笑笑道秦皇欲學仙東坡大笑何如小笑香紫花争似白花粧不知自笑還相笑殺笑人來斷殺腸誠齋茉莉本朝靈種傳聞出越裳何人提挈上蠻航他年我若修花史列作人間第一香應是仙娥燕歸去醉來遺下玉搔頭江奎翠葉光如沃氷葩淡不粧劉屏山密葉低層幄氷㽔亂玉英不因秋露濕誰識此香清朱文公長春本朝長春如稚女飄摇倚輕絮卯酒暈玉頰紅綃卷生衣幽芳本長春暫瘁如蝕月且將付造物未易料枯枿也知宿根深更將紫荀出乘時出婉娩為我暖栗烈聊將玉蘂新挿向綸巾折東坡夜合傳記合歡夜合花也人間多植庭除間一名合昏其葉至昏即合本草集合歡尚知時鴛鴦不獨宿杜詩紅開杪秋日翠合欲昏天白露滴不死凉風吹更鮮白樂天玉簮集宴罷瑶池阿母家飛瓊扶上紫雲車玉簮墜地無人拾化作東南第一花古詩金錢傳記梁時荆州掾屬雙陸賭金錢錢盡以金錢花相足魚𢎞謂得花勝得錢雜爼互見雙陸類集名貴已居三品上價髙仍在五銖先春來買斷深紅色燒得人心似火燃石礬金沙本朝海棠開後數金沙髙架層層吐絳葩咫尺西城無力到不知誰賞魏家花王介甫金燈集蘭膏爇處心猶淺銀燭燒殘焰不馨好向書生牕畔種免教辛苦更囊螢李義山巖桂子月中有桂樹淮南子史郄詵猶桂林之一枝晉書詳見賢良類垂拱四年三月雨桂子於台州唐書傳記梫木桂注云桂樹一名木犀葉似枇杷而小花淡白其淡紅者謂之丹桂黄花者能著子叢生岩嶺爾雅岱輿北有玉梁千丈駕𤣥流之上岸傍有丹桂拾遺記桂陽郡有桂嶺放花遍白林嶺盡香地理記君乘金而王其政訟平芳桂常生禮斗威儀杭州靈隱山多桂寺僧云月中種也至今中秋夜往往子墜招賢寺僧植桂香紫可愛郡守白公名曰紫陽花南部新書仙桂五枝芳竇禹鈞事見及第類吳剛斫桂見月類集南州之炎徳兮麗桂樹之冬榮楚辭桂樹藂生兮山之幽偃蹇連踡兮枝相樛攀援桂枝兮聊淹留南州實炎德桂樹凌寒山謝靈運豈若瓊樹枝終嵗正翕赩安知南山桂緑葉垂芳根青隂亦可托何惜樹君園桂枝日已緑拂雪凌雲端幽桂有芳根秋風生桂枝沈休文賞月延秋桂有客留攀桂攀桂仰天髙斫却月中桂清光應更多丹桂風霜急幽佳乃芬芬韓集霧密前山桂栁集山頭老桂吹古香李賀未植銀宫裏寧移玉殿幽枝生無限月花滿自然秋李嶠忽逢幽隱樹如見獨醒人于武陵玉階桂影秋綽約天風為捲浮雲幕嬋娟醉眠水晶殿老蟾不守餘花落蒼苔忽生霜月裔仙芬凄冷真珠萼娟娟石畔為誰妍香霧著人清入膜夜深酹月寒相就荼䕷却作傷心瘦弄雲仙女淡紵衣煙裙不著鴛鴦綉眼中寒香同誰惜冷吟徑召梅花魄小蠻為洗玻瓈盃晩來秋甕葡萄碧毛澤民清香一日來天闕水上龍涎不敢香鄧志宏本朝有客賞芳叢移根自幽谷為表山中趣愛此岩下緑曉露秋暉浮清隂藥欄曲更待繁花白邀君尋芳馥植桂比芳操嵗晩翫幽芳六一集鷲峰子落驚前夜蟾窟枝空記昔年破裓山僧憐耿介練裙溪女鬭清妍願君採綴紉蘭佩莫遣孤芳老澗邊天台桂子為誰香倦聴空堦夜㸃凉堦前合抱香入雲月裏仙人親手植東坡國香薫舍先生醉秋葉藏花客子迷陳去非氤氲寒岩桂髙韻盖羣馥凄凉楚山秋樛枝吐金粟淺水映輕明㣲飈發含蓄孤根抱寒石劉屏山山中緑玉樹瀟洒向秋深小閣芬㣲度書帷氣欲深披懷清露曉遇賞夕嵐隂珍重王孫意天涯淚滿襟朱文公瀹雪凝酥㸃嫩黄薔薇清露染衣裳西風掃盡狂蜂蝶獨伴天邊桂子香輕薄西風未辨霜夜揉黄雪作秋光吹殘六出猶餘四匹似天花更著香謝無逸雪花六出剪鵝黄金粟千麩糝露囊身在廣寒銀世界覺來簾外木犀風誠齋木芙蓉集芙蓉秋霜老李白新開寒露叢逺比水邊紅艷色寧相妬嘉名偶自同採江官渡晚搴木古祠空願得勤來看無令便逐風四隅芙蓉花擢艷皆猗猗韓集新亭俯朱檻嘉木開芙蓉清香尋風逺縟彩寒露濃瀟灑出人世低昂多異容麗景移寒水穠芳委前軒芰荷諒難比反生此髙原栁集莫怪秋無伴醉物水蓮開盡木蓮開白樂大本朝種處雪消春始動開時霜落鴈初過誰栽金菊叢相近織出新畨蜀錦窠芳菲能幾時顔色如自愛鮮鮮弄霜曉裊裊含風態六一集千林掃作一畨黄只有芙蓉獨自芳喚作拒霜知未稱細思却是最宜霜溪邊野芙蓉花水相媚好半看池蓮盡獨伴霜菊稿湖上野芙蓉含思愁脈脈娟娟如静女不肯傍阡陌東坡水邊無數木芙蓉露滴臙脂色未濃正似佳人初醉著强擡青鏡照粧慵王介甫濃露濕丹臉西風吹緑裳陳去非蘭經其臭如蘭易佩帨茝蘭記蘭有國香人服媚之如是左傳史袁淑詩曰種忌當門種懷楚莫向楚南史傳記蘭香草也説文蘭與澤蘭相似生水傍紫莖赤節髙四五尺緑葉光潤尖長有岐隂小紫花紅白黑而香五六月盛佩飾也本草芝蘭生於深林不以無人而不芳與善人居如入芝蘭之室久而不聞其香家語集紉秋蘭以為佩余既滋蘭之九畹歩余馬於蘭皋户服艾以盈要兮謂幽蘭其不可佩蘭芷變而不芳離騷浴蘭湯兮沐芳沅有芷兮澧有蘭秋蘭兮蘼蕪羅生兮堂下緑葉兮素華芳菲兮襲予秋蘭兮青青緑葉兮紫莖九歌光風汜崇蘭招魂踐蘭唐羽獵賦注云蘭生唐中也懷蘭英兮把瓊若九思禀國香於自然顔思古賦蘭以秋芳文選孤蘭生幽園衆草共蕪没雖照春陽暉復悲髙秋月淅瀝飛霜早緑艷恐休歇若無秋風吹香氣為誰發謬接瑶華根結根君王池李白蘭催白露下猗蘭奕葉光杜詩清露被皋蘭阮嗣宗風蘭舞幽香孟遲蘭之猗猗揚揚其香不採而佩於蘭何香逕蘭銷晩馥韓集本朝蘭蕙名物本草言之甚詳劉次莊云今沅澧所生花在春則黄在秋則紫而春黄不若秋紫之芬馥又黄魯直云一榦一花而香有餘者蘭一榦數花而香不足者蕙今按本草所言之蘭雖未之識然而云似澤蘭則今處處有之可推其類以得之矣蕙則自為之零陵香而尤不難識其與人家所種葉類茅而花有兩種如黄說者皆不相似劉說則又詞不分明大抵古之所謂香草必其花葉皆香而燥濕不變故可刈而為佩若今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萎皆非可刈而佩者也朱文公楚辭辨證蘭臯動芳氣佩蘭思潔身搴蘭流水曲徑蘭欲謝悲零露六一集春蘭如美人不採羞自獻時聞風露香蓬艾深不見東坡蘭似君子蕙似士大夫大槩山林十蕙而一蘭也離騷曰既滋蘭之九畹又植蕙之百畆則知楚人賤蕙而貴蘭也山谷集秋至百草晦寂寞寒露滋蘭臯一以悴蕪穢不能治端居念離索無以遺所思願言托孤根嵗宴以為期朱文公雪徑偷開淺碧花氷根亂吐小紅芽生當桃李春風面名在山林處士家欲吐國香到朝市不容霜節老雲霞江蘺蕙圃非吾耦付與騷人定等差誠齋蕙傳記蕙薫草也生下濕地麻葉而方莖赤花而黒實氣如蘼蕪可以已癘本草陳藏器云即苓陵香集又樹蕙之百畆豈惟紉夫蕙茝既替余以蕙纕兮又申之以攬茝離騷光風轉蕙招魂竊悲夫蕙華之曽敷兮紛旖旎乎都房何曽華之無實兮從風雨而飛颺以為君獨服此蕙兮𦍑無異於衆芳九辨蕙草留芳根李白碧蕙捐微芳寵光蕙葉與多碧杜詩本朝蕙本蘭之族依然臭味同曽為水仙佩相識楚詞中幻色雖非實冥香亦竟空云何起㣲馥鼻觀已先通東坡菊經季秋之月菊有黄華記月令子日精更生周盈皆一菊也而根莖花實異名或無效者以由不得真菊菊花與薏花相似直以甘苦别之耳菊甘而薏苦今所在真菊但為少耳抱朴子傳記菊治牆馬蘭為紫菊瞿麥為大菊烏喙苗為鴛鴦菊旋覆花為艾菊爾雅日精治牆皆菊花莖之别名九月律中無射而數九俗尚九日而用候時之草也風土記菊有筋菊有白菊黄菊一名節花一名傅公一名延年一名白花一名日精一名更生一名隂威一名朱嬴一名女節其菊有兩種一種紫莖氣香而味甘美葉可作羮一種青莖而大作蒿艾氣味苦不甘食名薏非真菊也本草菊華一名女華一名女室吳氏本草女几之山其草多菊山海經滎陽郡西靈源山岩有菊神境記南陽酈縣有甘谷谷中水甘美云其山上有大菊落水從山流下得其滋液谷中三十餘家仰飲此水上夀百二三十其中百餘七十八十名之為夭風俗通酈縣北八里有菊水其源悉芳菊被崖水甚甘馨胡廣久患風羸恒汲飲水後疾遂瘳年及百嵗荆州記道士朱孺子吳末入玉笥山服菊花乘雲升天名山記康風子服甘菊花柏實散得仙神仙傳集夕餐秋菊之落英春蘭兮秋菊楚辭蘭有秀兮菊有芳秋風辭縹榦緑葇青柯紅芒華實規圓芳頴四張故夫菊有五美焉圓華髙縣唯天極也純黄不雜后土色也早殖晩登君子徳也冒霜吐頴象勁直也流中輕體神仙食也鍾㑹賦汎流英於青醴似浮萍之隨波潘尼賦翠葉雲布黄蘂星羅盧諶賦煌煌丹菊暮秋彌榮親尊是御永祚億齡嵇含銘既低其枝又弱其榦豈弟君子佩服攸宜蕭穎士采菊東籬下悠然見南山芳菊開林耀青松冠岩列懷此真秀姿卓為霜下傑秋菊有佳色挹露綴其英汎此忘憂物遣我遺世情陶淵明寒花發黄采文選輕露西叢菊張景陽叢菊兩開他日淚籬邊老却陶潜菊故里樊川菊重岩細菊班菊蘂凄疎放杯迎露菊新采采黄金花何由滿衣袖杜詩鮮鮮霜中菊既晩何用好揚揚弄芳蝶爾生還不早園菊茂新芳少年飲酒時踴躍見菊花今來不復飲每見恒咨嗟佇立摘滿手行行把歸家韓集家家菊盡黄梁國白如霜瑩淨真棋樹分明對玉堂仙人披鶴氅素女不紅粧詠白菊面風摇羽扇含露滴瓊漿髙艷遮銀井繁枝覆象牀桂叢慙並發梅萼妬先芳劉夢得暗暗淡淡紫融融冶冶黄陶令籬邊色羅含宅裏香李義山陶詩只作黄金實郢客新傳白雪英素色不同籬下發繁花疑似月中生前人詠白菊節去蜂愁蝶不知曉庭還繞折殘枝自縁今日人心别未必秋香一夜衰鄭谷雪裁新蘂密金圻小苞香千載白衣酒一生青女霜羅隱本朝菊花之隱逸者也濓溪江南地煖百草造化無時而菊獨不然攻其理菊唯介烈髙潔不與百卉同其盛衰必待霜降草木黄落而花始開嶺南冬至始有㣲霜故也菊花有落者有不落者盖花瓣結密者不落花瓣扶疎者多落王介甫殘菊詩云黄昏風雨打園林殘菊飄零滿地金歐陽永叔戲曰秋花不比春花落為報詩人仔細吟介甫笑曰豈不見楚辭云夕餐秋菊之落英與夫却遶東籬嗅落英亦用此辭語耳二公文章擅一世而左右劒佩彼此相笑豈非於草木之名猶有未盡識之而不知有落有不落者耶史正志韓魏公在北門重陽有詩云不羞老圃秋容淡且看寒花晩節香類苑秋盡不見東籬花籬菊催佳節共坐欄邊日欲斜更將金蘂泛流霞欲知却老延齡藥百草摧時始見花野逕冷香黄菊秀擷其黄金蘂泛此白玉巵踏泥自採籬邊緑六一集千花萬卉雕零後始見閒人把一枝王介甫况此霜下傑清芬絶蘭茞氣禀金行秀徳備黄中美老泉坤裳有正色鞠衣亦令名霜菊晩愈好孤根䕃長松獨秀無衆草晨光雖照耀秋雨半摧倒堂後種秋菊碎金收碎寒粲粲秋菊色卓為霜中英野菊生秋澗芳心空自知休拈霜蘂嚼黄金菊殘猶有傲霜枝東坡黄花已戒寒黄菊逢辰滿意開后山青叢馥郁早抽芽金蘂斑爛晩著花秋意秪應宜淡泊化工可是惜鉛華輕烟細雨重陽節曲檻踈籬五栁家暮醉朝吟供採摘更憐寒蝶共生涯劉屏山鶯様衣裳錢様裁冷霜凉露濺秋埃比他紅紫開差晩時節來時畢竟開誠齋紅蓼集蓼雜芳菲疇韓集蓼花被堤岸栁集雨濕蓼花千蕙紅温庭筠白蘋紅蓼對江湄呂洞賔本朝叢蓼雖可喜輕紅隨秋藻秋歸南圃蟪蛄鳴霜落横湖沙水清卧雨幽花無限思抱叢寒蝶不勝情東坡記纂淵海卷九十三
