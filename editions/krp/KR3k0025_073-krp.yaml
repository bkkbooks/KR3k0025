body:
  text: 記纂淵海卷七十三宋潘自牧撰人事部順便子猶水之就下獸之走壙由水之就下沛然誰能禦之若決江河沛然莫之能禦也孟子父母於子東西南北惟命之從荘子若挈裘領詘五指而頓之順者不可勝數也荀子勢如決積水於千仭之隄若轉圓石於萬丈之谿淮南子史猶居髙屋之上建瓴水也史記漢祖紀建音蹇翻瓴水言其向下之勢易也以石投水莫之逆也史記頥指如意漢賈誼傳快意當前適觀而已矣史李斯傳皆如意指陸賈傳如身之使臂臂之使指莫不制從賈誼傳互入控制有道如坂上走丸蒯通傳飛蓬隨風史明帝紀順傾轉圓不足以喻其便漢蔡邕傳如晨風之鬱北林龍魚之趣藪澤晉孝愍紀傳記一日之行所欲必成玩好必從珍異必聚説苑挹水於河而取火於燧戰國䇿集翼乎如鴻毛遇順風沛乎如巨魚縱大壑王褒頌翰飛絶跡一舉千里曹植集去馬覺蹄輕姚少監若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也韓文春浪之奔壑夏雲之得龍秋弧之發矢冬爐之納火如良庖之投刃無復肯綮文粹互入自得三昧如矢别弦劉賔客集如刀劒發硎割而無滯如鐘磬在懸動而有聲白樂天勢如舟楫相得當洪流而鼓迅風崇朝千里不足怪也同上本朝行千里而未嘗齟齬兮其意驕逞而不可摧如寄諸鄰而取之父命於子惟所東西視客之所居與其凡所資用如官府如廟觀如數世富人之宅東坡艱難經予手拮据予所捋荼予所蓄租予口卒瘏陟彼砠矣我馬瘏矣我僕痡矣云何吁矣詩子若負重行而上也荘子史險阻艱難備嘗之矣左傳蒙霜露沐風雨西漢淮南王安傳逆坂走丸迎風縱棹豈云易哉皇甫嵩傳間闗險難後漢曹操智計絶人然困於南陽險於烏巢危於祁連偪於黎陽幾敗北山殆死潼闗然後偽定一時耳通鑑魏明帝集道壅塞而不達兮江河廣而無梁勢不能凌波以徑度兮又無羽翼而髙翔車軏折兮馬虺隤願自徃而徑逰兮路壅絶而不通欲修道而平驅兮又未知其所從楚詞投艱履險權載之集百歩九折唐文粹紫禁終難叫朱門不易排駱賔王神速經惟神也故不疾而速不行而至易子發若機栝荘子撃電無餘光疾雷無餘聲公孫子史不崇朝而徧雨乎天下公羊傳至如猋風去如收電西漢韓安國傳揉曲木者不累日銷金石者不累月西漢公孫𢎞傳口雖未言聲疾雷震令雖未出化馳如神蒯通傳韓信曰三秦可傳檄而定本傳天下可傳檄而定後漢耿弇見事風生西漢趙廣漢傳言其疾速不可當也主父偃上書闕下朝奏暮召入通鑑漢武紀機事以速為神震雷不及掩耳唐李靖傳集若疾霆轉雷而激迅風也張平子東京賦發膚寸之陰成彌天之澤劉賔客集有如乗風船一縱不可纜韓集秋懐詩本朝須臾慰滿三農望斂却神功寂似無韓魏公雨詩緩慢子董安于性緩故佩弦以自急韓非子史穰侯見事遲史記范睢傳陳寵有智而遲通鑑漢獻帝紀𤣥徳人傑有智度而遲荀彧曰袁紹雖有大志而見事遲魏志姚崇曰張丞相説見事常遲於我數日之後舊唐書相孚子三人相視而笑莫逆於心遂相與友荘子適子懐於燕慈母喻於荆情相往来也淮南子史祁奚免叔向不見叔向而歸叔向亦不告免而朝左傳襄三十一子産知然明問為政焉子産喜以語子太叔曰他日吾見蔑之靣而已今吾見其心矣左傳吳公子光謂專諸曰光之身子之身也史專諸傳剖心析肝相信豈移於浮辭哉史鄒陽傳孔子過鄭與子産如兄弟兄事子産史鄭世家夏侯嬰過髙祖語未嘗不移日史記披心腹見情素隳肝胆西漢鄒陽傳髙祖嘗與陳平金四萬斤以間楚軍不問出入所為其復疑以錢穀間哉東漢馬援傳母子慈愛終始無纎介之間通鑑漢明帝尹敏與班彪親善每相過輒日旰忘食夜分不寢自以為鐘期伯牙莊周惠施之相得也東漢尹敏傳互見朋友無纎介之隙漢章帝孫盛詣殷浩談論食冷而復暖者數四晉書互入朋友孫權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也通鑑魏文紀孫權曰子瑜與孤從事積年恩如骨肉深相明究孤與子瑜可謂神交非外言所間三國魏文紀恩如骨肉帳中之飲結帶之言可謂親矣晋安紀王𨗳曰吾與元規休戚是同悠悠之談宜絶智者之口晋成紀王戎與阮籍為竹林之逰戎嘗後至籍曰俗物已来敗人意戎笑曰卿意亦復易敗耳晋書王戎傳晉羊祜與陸抗對境使命通抗遺酒飲之不疑抗疾求藥於祜祜即以成藥與之抗即服之人多諫抗抗曰豈有酖人羊叔子哉晉武帝紀魏主執彭城王勰手曰二曹以才名相忌吾與汝以道徳相親北魏書情深魯衛書信恒通梁髙祖紀韋孝寛與裴文舉談論不覺膝前於席後周書加髙熲上柱國帝勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所能間也通鑑隋髙祖唐憲宗曰朕諳李絳不如是唐憲宗紀郭子儀功盖天下而主不疑唐書本傳二人深相知同心狥國故唐氏稱賢相者惟房杜通鑑唐太宗傳記孫安國往殷中軍共論往反精苦客主無間世説逺公與十八賢同修淨土於白蓮送客過虎溪虎輒鳴與陶元亮陸静修談道不覺過虎溪因相與大笑故作三笑圖廬山記集惠然不疑推寘於肺肝間杜牧之疑消破癥弩元微之不以我為貪知我家内貧肺腑都無隔白樂天吾與叔堅剖心相知豈以流言相猜耶張奐與延叔堅書猜疑附不相孚經蓄疑敗謀書子人有亡鈇者意其鄰之子視其行歩竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也列子繼子得食肥而不澤情不相與往来也淮南子史疑行無名疑事無功商鞅傳霍光權益重每朝見上虛己斂容禮下之已甚通鑑漢宣紀景帝居禁中召周亞夫賜食因趨出上目送之曰此怏怏非少主臣也西漢本傳宣帝初立謁見髙廟大将軍霍光驂乗上内嚴憚之若有芒刺在背光死而宗族誅俗傳霍氏之禍萌於驂乗漢宣帝紀崔駰曰未信而納忠者謗也東漢本傳杜預疑心而信耳目疑耳目而信簡書通鑑晉紀王濬伐吳不受王渾節制濬常疑渾渾詣濬濬陳武備然後相見晉書猜忍受讒功臣故舊無始終保全者乃至子弟皆如讎敵通鑑隋髙祖杜牧曰世稱周召為百代之師周公擁孺子而召公疑之以周公之聖召公之賢少事文王老佐武王能平天下周公之心召公且不知之召公尚爾况其下哉唐書新羅傳上每有冦盜輒命世民討之事平之後猜疑益甚通鑑唐髙祖煬帝不信齊王恒有中使察之聞其宴飲則曰彼營何事得遂而喜聞其憂悴則曰彼有他念故爾父子之間且猶如是況他人乎唐太宗齊王暕素失愛於帝恒相猜忌宇文化及使人就第誅暕竟不知殺者為誰父子至死不相明隋煬帝心膂之内尚有形迹之拘唐徳宗初王敦之舉兵也周顗上表明𨗳言甚切𨗳不知救已而甚銜之晋周顗傳唐宣宗素惡德裕即位之日德裕奉冊既罷謂左右曰適近我者非太尉邪每顧我毛髪洒淅通鑑唐武宗集羣鷗不下衆雀遥驚朱敬則魏武論對靣九嶷峯斗酒强然諾寸心終自疑李太白集疑生所怪栁文不予衾之眠信予衾之穿盧仝疑懼聽氷狐温飛卿機宻經我聞有命不敢以告人詩子韓昭侯必獨卧惟恐夢言泄於妻妾韓非子史楚王曰言出於余口入於爾耳左傳昭二十年勢不可以多人多人則不能無生得失生得失則語泄史聶政傳石建屏人乃言西漢屬其人勿衆謝西漢王嘉傳張安世典樞機周宻外内無間西漢本傳孔光休日歸沐兄弟妻子燕語終不及朝省政事或問孔光温室省中樹皆何木也光黙不應更答以他語其不泄如是通鑑漢成紀手書毁草不宣於外東漢皇甫嵩傳荀攸深宻有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言魏志本傳顧雍軍國得失自非靣見口未嘗言三國魏紀陳羣前後數陳得失每上封事輒削其草時人及子弟莫能知也魏明紀殷景文卧疾五年雖不見上而宻函去来日以十數朝政大小必以啓之形迹周宻莫有窺其際者通鑑宋太祖周捨同參國政每有表奏輒焚其藁捨豫機宻二十餘年未嘗離左右國史詔誥儀禮法律軍旅謀謨皆掌之與人言謔終日不絶而竟不漏泄機事通鑑梁武紀戴胄奏已藁秘外莫知唐書傅奕性謹密職在占候杜絶交逰所奏灾異悉焚其藁人無知者通鑑唐髙宗上漏其情則下不敢盡意上泄其事則下不敢盡言劉蕡策集密語誰得知白樂天集踈畧經君不密則失臣臣不宻則失身機事不宻則害成子曰亂之所生也則言語以為階易子棠谿公見韓昭侯曰為人君漏泄羣臣之語猶玉巵無當也韓非子牆有耳微謀外泄管子史祭仲專鄭伯患之使其壻雍糾殺之将享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告仲曰雍氏舎其室而将享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也左傳桓十五言語漏泄則職汝之由左傳襄十四子貢曰無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也史記端木賜傳恐事未遂而謀泄則禍立至矣通鑑周紀師丹使吏書奏吏私寫其草丁傅子弟聞之使人上書丹上封事行道人徧持其書上以問将軍中朝臣皆對曰忠臣不顯諌大臣奏事不宜漏泄通鑑漢成紀互見讒譖蕃欲誅宦官乃先事露章曰願出臣章示左右令諸姦臣知臣疾之東漢本傳漏泄省中語西漢賈捐之傳才疎意廣東漢孔融傳蜀大将軍費禕與諸将大㑹於漢夀郭循在坐禕歡沈醉循起刺禕殺之禕資性汎愛不疑於人通鑑蜀後主紀甘卓家人皆勸卓備王敦卓不從悉散兵佃作襄陽太守周慮密承敦意詐言湖中多魚勸卓遣左右悉出捕魚慮引兵襲卓於寢室殺之傳首於敦通鑑晉明紀殷仲文素有才望自謂宜當朝政悒悒不得志出為東陽太守東陽何無忌所統仲文許便道修謁無忌喜欲迓之而仲文失志恍惚遂不過府無忌以為薄已大怒通鑑晋安紀劉蕡曰上漏其情則下不敢盡意上泄其事則下不敢盡言劉蕡戒帝漏言而身誦詔於庭新唐書本傳申錫欲誅宦者王璠漏其謀申錫貶通鑑唐文宗紀齊澣言葛福順典禁兵不宜與王毛仲為婚毛仲小人寵過則生姦不早為之恐成後患又曰君不密則失臣願陛下密之㑹大理丞麻察坐事左遷澣素與察善出城餞之因道禁中諫語察性輕險遽奏之信安王禕以軍功有寵於上宇文融疾之禕入朝融使御史李寅彈之泄於所親禕聞之先以白上明日寅奏果入上怒融寅坐貶通鑑集不密致危正平賦本朝冦萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正在相府又欲以嵗月盡治天下事失於急與不忍小忿故羣小人亦急逐去之一去遂不復用以殁其身老泉天禧末真宗寝疾章獻明肅劉太后漸預政真宗意不能平冦莱公探知此意遂欲廢章獻立仁宗尊真廟為太上皇而誅丁謂曹利用等於是引李迪楊億曹禕盛度李遵朂等叶力處畫已定凡誥命盡使楊億為之且将舉事㑹冦莱公因醉誤言有人馳報謂夜往利用家謀明日利用入盡以莱公謀白太后詔罷政事真宗上仙遂投公海上其事有類上官儀者三朝言行錄有分傳傾蓋如故史袁盎為太常竇嬰為大将軍兩人素相與善史本傳集舊托於心契同學同年又同舎劉賔客半靣契終始元稹集半靣之故白帖本朝同官同齒復同科朋友婚姻分最多臨川集無分史非宿素之交無一日之雅西漢谷永傳無雅信西漢杜欽傳集相與昧平生顔延年秋胡詩非有積素累舊之歡皆塗覯卒遇四子講徳論看看未相識脉脉不得語劉子有本子原泉混混不舎晝夜盈科而後進放乎四海有本者如是孟子史木水之有本原也有基無壊左傳基廣則難傾根深則難㧞晋孝愍紀有根無葉或可俟時唐栁玭傳集自源發流安得不廣王充論衡流長則難竭柢深則難朽張平子西京賦其植根固其流波漫根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也韓文本朝枯槎燒盡有根在一洗春雨皆萌芽吾文如萬斛泉源水不擇地而出東坡無本經譬彼壞木疾用無枝本實先撥詩子苟為無本七八月之間雨集溝澮皆盈其涸也可立而待也孟子入水之爐火滅而煙不即息既斷之木柯葉猶生二者非不有煙非不有葉而所以為煙為葉者已先亡矣抱朴子史本既弱矣其能乆乎左桓二年是謂蹷其本左襄十九有葉無根膏雨所不能活唐栁玭傳集潢潦無根源朝滿夕已除韓集無意經心不在焉視而不見聽而不聞食而不知其味大學註心有不存則無以檢其身子以瓦摳者巧列子以瓦注者巧荘子心不使焉則白黑在前而目不見雷鼓在側而耳不聞荀子評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜状既露則内慙而不怨向之評者與鏡無殊然而向怨而今慙之者以鏡無情而人有心也列子本朝人之所信者手足耳目也目識多寡手知輕重然人未有以手量而目計者必附之度量與權衡豈不自信而信物盖以為無意無我然後得萬物之情深山大澤有天地之寳無意於寳者得之東坡文有意子以黄金摳者惛列子以黄金注者惛荘子注云所要重則心矜評人好醜雖言得其實彼必嫌怨及其自照明鏡摹倒其容醜状既露則内慚而不怨向之評者與鏡無殊然而向怨而今慚之者以鏡無情而人有心也列子互見事同體異門創始經包犧氏始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁神農氏作斵木為耜揉木為耒耒耜之利以教天下日中為市致天下之民聚天下之貨黄帝堯舜氏作埀衣裳而天下治刳木為舟剡木為楫舟楫之利以濟不通服牛乗馬引重致逺以利天下重門撃柝以待暴客斷木為杵掘地為臼臼杵之利萬民以濟弦木為弧剡木為矢弧矢之利以威天下上古穴居而野處後世聖人易之以宫室古之葬者厚衣之以薪不封不樹後世聖人易之以棺槨古者結繩而治後世聖人易之以書契開物成務易智者創物爍金以為刃凝土以為器作車以行陸作舟以行水此聖人之所作也周禮昔者先王未有宫室夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮後聖有作然後修火之利範金合土以為臺榭宫室牖户以炮以燔以烹以炙以為醴酪治其麻絲以為布帛以養生送死作者之謂聖禮記史至今天下言醫者由扁鵲也史本傳諸葛亮勸農講武作木牛流馬運米集斜谷口通鑑魏明紀王章掌財賦舊錢出入皆以八十為陌章始令入者八十出者七十七謂之省陌通鑑周太祖集古之時人之害多矣有聖人者立然後教之相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防韓文本朝至和間富公當國立一舉三十年推恩之法盖公與河南進士段希元魏升平同場屋相善公作相不欲私之故為天下之制聞見錄守成經太平君子能持盈守成詩序巧者述之守之世謂之工周禮祭祀之法居䘮之服哭泣之位皆如其國之故謹修其法而審行之凢祭有其廢之莫敢舉也有其舉之莫敢廢也述者之謂明禮記史安定者貴順權史記秦始皇紀參曰髙帝與蕭何定天下法令既明今陛下垂拱參等守職遵而勿失史蕭何世家蕭何為法較若畫一曹參代之守而勿失曹參傳臣書生唯知謹守厯代成規五代晋髙祖集纂就前緒遂成考功續初繼業楚辭家成百年之業班固西都賦素定經天尊地卑乾坤定矣易子天不言而人推髙焉地不言而人推厚焉四時不言而百姓期焉荀子互入素服伯夷叔齊非於死之日而後有名也菅子互入素服史事成不愆於素左傳集梓人畫宫於堵而績於成栁文本朝古之君子如伊尹太公管仲樂毅之流其王霸之略定畎畝之中非仕而後著也東坡樂全先生文集𫝊逺經克勤無怠以垂憲乃後書夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也禮記百世以俟聖人而不惑中庸子聖人百世之師也孟子垂憲立言以貽後人仲尼有云我欲托之空言不如載之行事之深切著眀也孟序死有萬世之名列子書之竹帛琢之盤盂傳以遺後世子孫尹鄧子託竹素者為世寳也抱朴子史銘其功烈以示子孫左襄十九互入功業臧文仲既没其言立左襄二十四孔子布衣傳十餘世學者宗之史記孔子世家燕齊之祀與周並傳子繼弟及厯代不墮西漢功臣表雖經千載遺風餘烈尚猶不絶前禮樂志垂功名於竹帛東漢鄧禹傳魏文帝與王朗書曰人生有七尺之形死為一棺之土唯立德揚名可以不朽其次莫如著篇籍魏書播畱後之聲晋書禮志遺風餘烈晉書謝靈運傳王彦章曰豹死畱皮人死畱名五代史集垂文揚采遺将來兮金相玉質百嵗無匹名垂㒺極永不刋滅者也楚辭文章不朽之盛事選典論姬公之籍孔父之書與日月倶垂文選序厯世彌光選張平子東京賦流千載之英聲楊修答臨淄侯牋惟令德為不朽兮身既没而名存曹大家東征賦悠悠百世後英名擅八區遺烈光篇籍左思咏史銘功景鐘書名竹帛楊德祖賦舄奕乎千載班固典引辭義典雅足傳於後此子為不朽矣魏文帝世彌積而功宣身逾逺而名昭選碑不假良史之辭不托飛馳之勢而聲名自傳於後魏文帝紀芳烈奮於百世令聞顯於無窮郭有道碑互入聞望風流五百年豐功利生人天地同朽滅李白雄筆映千古盛事垂不朽丈夫垂名記萬年杜詩君之好修兮企千載其相望唯有令名日髙日逺皇甫湜自古死者非一夫子至今有耿光所言必傳世行後至今照人耳目赫赫若前日事子之自著表表愈偉韓愈文如日不滅如海不竭唐吕温傳岩銘綿越千祀至今血食栁漢原廟銘足以垂世立教傳之子孫以貽後代孔穎逹書序著在國史垂為羙談劉賔客集名垂不滅能光萬祀李習之穹壤可弊唯名不息金石垂之以慰㒺極吕和叔身没聲名在多應萬古傳賈島詩激清一時流譽千古不隨世磨滅唐文粹垂示百代佳句乆傳芳吟咏流千古懿文茂績斯謂不朽白樂天死而不朽反貴於生武侯碑刻工姓名於其器以察其信記月令注傳記其人已亡杳成空寂其事如在皎如星漢朝廷之士山林之客皆圖不朽之事書名竹帛史通本朝惟有善者能有後而託於文字者可以無窮雖死而不朽愈遠而彌存凡物有形終必有弊自古聖賢之傳者非皆託於物固能無窮也乃知為善之堅堅於金石死而不朽萬世之傳我欲貴子文刻以金石聨金可爍而銷玉可碎非堅不若書以紙六經皆紙傳歐公集流弊經夫豢豕爲酒非以爲禍也而訟獄益繁則酒之流生禍也夏道尊命其民之敝蠢而愚喬而野樸而不文殷人尊神其民之敝蕩而不静勝而無恥周人尊禮其民之敝利而巧文而不慙賊而蔽詩之失愚書之失誣春秋之失亂禮記子孟子曰伯夷隘栁下惠不恭隘與不恭君子不由也孟子史作法於涼其弊猶貪作法於貪弊将若何左傳昭四互見作俑太史公曰夏之政忠忠之敝小人以野商以敬敬之敝小人以鬼周以文文之敝小人以僿史髙帝紀荆軻見秦王取圖奏之圖窮而匕首見因把秦王之䄂逐秦王環柱而走羣臣皆愕秦法羣臣侍殿上者無得持尺寸之兵諸郎執兵皆陳殿下非有詔召不得上方急時不及召下兵以故軻逐秦王引匕首擲秦王不中史記本傳夫置兵所以止亂也及其弊也適足以為亂又其甚也至困天下以養亂唐書兵志本朝太宗平河東立和糴法時米斗十錢草束八錢民樂與官為市其後物貴而和糴不解遂為河東世世患荘老之後其禍為申韓東坡集韓魏公嘗謂大臣以李固杜喬為本其弊猶恐為胡廣趙戒以胡趙自處弊可知也遺事慣習經習與性成世禄之家鮮克由禮位不期驕禄不期侈書子居移氣養移體孟子嬰兒生無名師而能言與能言者處也荘子越人安越楚人安楚荀子蓼蟲在蓼則生在芥則死非蓼仁而芥惡本不可失文子九疑之南陸事寡而水事衆於是民人被髮文身以像麟䖝短綣不絝以便渉㳺短袂攘卷以便刺舟因之也鴈門之北狄不穀食賤長貴壮俗尚氣力人不弛弓馬不解勒便之也淮南子訓道篇史譬如田獵射御貫則能獲禽左襄二十五年少而習焉其心安焉不見異物而遷焉國語齊習貫如自然西漢賈誼傳吳地以船為家以魚為食五行志胡越之人生而同聲嗜欲不異及其長而成俗累數譯而不能相通行有雖死而不相為者則教習然也習與智長故切而不媿化與心成故中道若性賈誼傳秦使趙髙傅胡亥而教之獄所習者者非斬劓人則夷人之三族也胡亥今日即位而眀日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若刈草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也通鑑漢文紀傳記戎人生乎戎而戎言楚人生乎楚而楚言不知其故也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言矣吕氏春秋集蓼蟲不知徙乎葵菜楚辭蓼蟲忘辛左太冲魏都賦蓼蟲避葵堇習苦良可哀鮑昭放歌行食辛能避蓼元微之鮑肆不知其臭翫其所以先入張平子東京賦生長太平日不知太平歡韋應物本朝寖乆之俗益薄惡而可嗟習慣為常遂安恬而不怪歐文冰蠶不知寒火䑕不知暑東坡醉中不以鼻飲夢中不以趾捉天機之所合不彊而自記也東坡書李伯時山荘圖後嘗食芻豢者難以食菜嘗衣錦者難以衣布為其大者不屑為其小者此天下之通患也東坡集食蘗不知苦山谷詩凡人之情於憂樂之事初遇之則其心變焉次遇之則其心微變三遇之則其心如常矣元城語錄誘進經衡門誘僖公也詩序夫子循循然善誘人互鄉難與言童子見門人惑子曰與其進也譬如平地雖覆一簣進吾往也論語集單門後進必加善誘選集序講評孜孜以磨諸生使皆誘義忘歸韓文開以昏蒙示以階漸甘或可和白或可染李義山集傳記香餌之下必有懸魚重賞之下必有死夫七略潤飾經賁者飾也物相合則須飾以脩外也易若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹雘書東里子産潤色之論語嫌疑經男女非有行媒不相知名禮記互見避嫌類事兩君者不容荀子史父子之間人所難言也前漢車千秋傳楊忠曰兩姑之間難為婦通鑑陳紀施報經投我以木𤓰報之以瓊琚匪報也永以為好也投我以桃報之以李無言不讐無德不報詩其次務施報禮尚往來往而不来非禮也來而不往亦非禮也禮記子出乎爾者反乎爾者也愛人者人恒愛之敬人者人恒敬之孟子互見影響相應以富貴而下人何人不尊以富貴而愛人何人不親家語互入影響相應昔予為禾耕而鹵莽之則其實亦鹵莽而報予耘而滅裂之則其實亦滅裂而報予荘子有隂德者必有陽報有隠行者必有昭名淮南子有而不施窮無與也荀子史富辰曰報者倦矣施者未厭左傳僖二十四李陵素與士大夫絶甘分少能得人之死力西漢司馬遷傳盖寛饒為衛司馬躬案士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歲終交代衛卒數千人叩頭請願復更畱一年以報寛饒厚德西漢本傳陳蕃出為豫章太守性方峻不接賔客徴為尚書令送者不出郭門後漢書掩人者人亦掩之陵人者人亦陵之魏王昶傳傳記豫讓曰范中行衆人遇我我以衆人報之智伯國士遇我我以國士報之戰國䇿集恨無隋侯珠以酬荆文璧選盧子諒詩人微惠重答施何階陳子昂明珠青玉不足報贈子相好無時衰韓詩拔人於死者必捨生而報恩榮人於辱者必居節而雪耻張説之舉人表本朝人情貴往還不報生禍根東坡被以卵翼之恩收其鷹犬之效蘇子由付託經可以託六尺之孤論語子有託其妻子於其友而之楚逰者孟子史初晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫息曰臣竭其股肱之力不濟則以死繼之左僖九年穆嬴日抱太子以嗁於朝頓首於宣子曰先君奉此子也而屬諸子曰此子才也吾受子之賜不才吾唯子之怨今君雖終言猶在耳左文七年子胥使齊託其子於鮑氏史記越世家樓䕶有故人吕公無子歸護託身護與吕公妻及吕姬同食護妻子頗厭吕公護聞之流涕責子曰吕公以窮老付託於我義所當奉遂養吕公終身漢書互入髙誼薛宣字贛君為不其丞瑯琊太守趙貢見宣悦其能還至府舎令妻相見戒曰贛君至丞相我子亦中丞相史西漢本傳丙吉聞史良姊有母貞君及兄恭乃載皇曾孫以付之通鑑漢宣帝紀傅燮謂其子曰主簿楊㑹吾之程嬰東漢本傳初李固既策罷知不免禍乃遣三子基兹燮皆歸鄉里時燮年十三姊文姬為同郡趙伯英妻見二兄歸具知事本黙然獨悲曰李氏滅矣宻與二兄謀豫藏匿燮託言還京師有頃難作州郡收基兹皆死獄中文姬乃告父門生王成曰今委君以六尺之孤李氏存滅其在君矣成乃将燮乗江東下入徐州界變姓名為酒家傭而成賣卜於市各為異人隂相往來積十餘年通鑑漢桓紀晉謝琨尚晉陵公主琨死詔公主與謝氏絶婚公主悉以琨家事委琨從子𢎞微𢎞㣲為之經理生業一錢尺布有文簿九年而髙祖即位公主降號東鄉君聽還謝氏之門室宇倉廩不異平日田疇墾闢有加於舊通鑑晋太祖太后與劉仁軌書曰昔漢以關中之事委蕭何今託公亦猶是矣仁軌上䟽辭以衰老不堪居守因陳吕后禍敗之事以規戒太后通鑑唐武后王敦之舉兵也劉隗勸帝盡除諸王司空𨗳呼周顗曰伯仁以百口累卿晋書本傳嵇康臨刑謂子曰山公在汝不孤晋書髙孝基見杜如晦謂曰君必任棟梁以子孫託之通鑑李勣疾謂弟弼曰我見房𤣥齡杜如晦髙季輔皆辛苦立門户亦望貽後悉為不肖子敗之我子孫今以付汝可謹察有不厲言行交非類者急榜殺以聞勿令後人笑吾猶吾笑房杜也唐書本傳太宗謂太子曰無忌遂良在國家之事汝無憂矣唐書勣之功見於黎陽故太宗拳拳以託孤唐書李勣讚王勮蘇味道未知名裴行儉謂之曰僕有弱息願以為託通鑑傳記甘茂逢蘇代曰茂之妻子在秦願君以餘光振之代許諾春秋後語晉大夫伯宗妻曰子之性不可易國家危可立待伯宗乃得畢羊而友之及欒不忌之難三郤害伯宗簡讚之畢羊乃送州犁於荆遂得免焉列女傳集徧告諸友以寄厥子不鄙謂余亦託以死韓作栁祭文昌黎先生以疾免書喻湜曰死能全我躬所以不隨世磨滅者惟子以為囑韓愈墓志憑恃經表裏山河必無害也左傳僖十八年史漢武以汲黯為淮陽太守曰徒得君重卧而治之前漢本傳詔裴度節度河東度辭老疾帝曰為朕卧䕶北門可也唐書集惟鄆也截然中居四鄰望之若防之止水恃以無恐韓文徒得君重剛吾四支劉賔客攀附經蔦與女蘿施於松栢南有樛木葛藟纍之南有樛木甘瓠纍之詩史田蚡以肺附為相本傳如肺肝之相附着也攀龍附鳯並乗天衢西漢序讚皇甫䂓自以西州豪傑耻不得與自上書附黨通鑑東漢互見好名女蘿弱不能立必附他木唐李徳裕傳集蚉䖟終日經營不能越階附驥尾則渉千里攀鴻翮則翔四海選四子講德論託徽莖於樛木潘安仁寡婦賦逺近乗風一朝景附攀日月之末光繼螢爝之微照陳子昂兎絲附蓬麻杜詩願連光於咳唾之餘元微之集依倚子泄栁申詳無人乎繆公之側則不能安其身孟子史周之東遷晉鄭焉依左隠六年輔車相倚左傳晉吾宗也豈害我哉左傳依日月之末光前漢蕭何傳曾孫因依倚廣漢兄弟及祖母家史氏通鑑漢宣紀攀龍鱗附鳳翼以成其所志耳東漢光武紀倚以為北道主人東漢彭寵紀如鳥有翼如魚有水失之則死不可暫無通鑑唐紀集願為雙飛燕銜泥巢君屋古詩龍無雲雨不能參天論衡寄松為女蘿依水如浮萍曹植詩依水類浮萍寄松如懸蘿潘安仁河陽詩塵附泰山文選䑕憑社貴選恩倖傳自慙青蒿倚長松韓詩一身相倚千里徒渉劉長卿一榻偶依陳太守羅隠集衆星傅月之光也因其波瀾不逢髙枝引未得凌空上何處堪托身為君長萬丈唐文粹效尤史先軫曰效尤禍也尤而效之罪又甚焉原伯曰鄭伯效尤其亦將有咎左荘二十一年衛公叔文子曰尤人而效之非禮也左定六年傳記秦世之所以亟絶者其轍迹可見也然而不避是後車又将覆也賈誼至周之末世大為無道以失天下秦繼其後獨不能改又益甚之重禁文學不得挟書棄捐禮誼而惡聞之其心欲盡滅先聖之道而專為自恣茍簡之治故立為天子十四歳而國破亡矣自古以来未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冐殊扞熟爛如此之甚者也董仲舒朝有變色之言則下有爭鬬之患上有自專之士則下有不讓之人上有好利之臣則下有盜竊之民作俑經苖民作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥書庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也公廟之設於私家由三桓始也孔子謂為俑者不仁禮記子仲尼曰始作俑者其無後乎有賤丈夫焉必求龍斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此賤丈夫始矣孟子史作法於涼其弊猶貪作法於貪弊将若之何左昭四互見流弊沈約曰開端樹隙通鑑宋紀時以浮虛相扇儒雅日替范甯謂其源始於王弼何晏二人之罪深於桀紂晋書范甯傳互入罪有所歸德宗貞元九年初稅茶嵗得四十萬貫從鹽鐵使張榜所奏茶之有税自此始徳宗實錄通鑑云州縣産茶及茶出外要路皆估值十税二茶之有税自王涯始唐書兩書異同今並載之初行税間架除陌錢法所謂税間架者每屋兩架為間上屋税錢二千中税千下税伍百吏執筆握算入人室廬計其數或有宅屋多而無他資者出錢數百緡敢匿一間杖六十賞告者錢伍拾緡所謂除陌錢者公私給與及賣買每緡官畱伍十錢給他物及相貿貿一作貸易者約錢為率敢隱錢百杖六十罰錢二千賞告者十緡其賞錢皆出坐事之家通鑑唐徳宗連累經鼎折足覆公餗易火炎崑岡玉石倶焚延及於平民書若此無罪淪胥以鋪詩傷其本枝從而亡禮記民之無辜併其臣僕詩雖在縲絏之中非其罪也論語子湛濁動乎下清明亂於上荀子救鬬者傷蔭不詳之木為雷電所撲淮南子史同類相推俱入禍門史記趙世家事連汙條侯史記條侯周勃世家令民為什伍而相收司連坐通鑑周紀始皇幸梁山宫從山上見丞相車騎甚盛不喜中人或告丞相後損車騎始皇怒曰此中人洩吾語案問莫服捕時在旁者盡誅之秦紀淮南衡山二獄所逮引列侯二千石豪傑等死者數萬人漢武紀王莽誅甄豐辭所連及便收不請西漢揚雄傳無罪而坐率石奮傳如淳曰率家長也師古曰㓜年無罪坐為父兄所率諸犯令相引數千人名曰株連食貨志師古曰言被引牽者為其根株梁冀所連朝廷為之一空後漢事發相重劉澤傳重猶累也狧糠及米古􅜻字前漢荆吳傳黨事起張儉亡命望門投止其所經厯伏重誅者以千數連引收考布徧天下宗親並皆族滅郡縣為之殘破夏馥嘆曰一人逃死禍及萬家通鑑漢靈帝袁紹誅閹官或有無鬚而誤死者後漢何進傳辭所連染無辜者衆通鑑漢殤紀窮治楚王英獄遂至累年其辭語相連自京師親戚諸侯州郡豪傑及考案吏阿附坐死徙者以千數而繋獄者尚數千人諸所連及率一切陷入無敢以情恕者御史韓郎曰考一連十考十連百歸舎雖不言而仰屋竊歎莫不知其多寃通鑑漢明帝紀猶張瑟琴大絃急者小絃絶後漢陳寵傳石鑒僣位石閔及率趙人誅諸胡羯子時髙鼻多鬚濫死者半晋載記灼火攻蠧蠧盡木焚唐書宦者傳逮捕黨人其辭所連及大僕潁川杜密御史中丞陳翔及陳寔范滂之徒二百餘人通鑑漢桓紀魏杜弼曰楚國亡猿禍延林木城門失火殃及池魚通鑑齊紀互入事出意表崔仁師曰古者父子兄弟罪不相及奈何以亡秦酷法變隆周中典且誅其父子足累其心此而不顧何愛兄弟通鑑唐太宗迹渉嫌疑辭相逮引莫不窮捕考案至有姦人熒惑乗險相誣糾告疑似睚眦之嫌即稱有密一人被訟百人滿獄使殺人如麻流血成澤唐武后一夫不率闔境罹殃一境不寧普天致擾唐徳宗王涯有再從弟沐家於江南老且貧聞涯為相跨驢詣之欲求一簿尉畱長安二嵗餘始得一見涯待之殊落寞乆之沐因嬖奴以道所欲涯許以微官自是朝夕造涯之門以俟命及涯家被收沐適在第與涯俱腰斬唐文宗有書尚書省門為詩以嘲賊者尚讓怒應在省官及門卒悉抉目倒懸之大索城中能詩者盡殺之識字者給賤役凡殺三十餘萬唐懿宗宦者怨李訓等凡與之有𤓰葛親者誅貶不已通鑑傳記巨防容螻而漂邑殺人突泄一熛而焚宫燒積吕氏春秋集剖髪及首翦爪侵膚應休璉書犠尊青黄乃木之災韓祭栁子厚文援證經謂予不信有如皦日詩予所否者天厭之天厭之論語子顧曰為私誓州綽曰有如日左襄十八晉荀偃卒而視不可含范宣子撫之曰主茍終所不嗣事於齊有如河左襄十九晉斐豹曰苟焚丹書我殺督戎宣子曰而殺之所不請於君焚丹書者有如日襄公二十三年齊晏子曰嬰所不唯忠於君利社稷者是與有如上帝襄二十五蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川左定三晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風左僖十五縱子忘之山川鬼神其忘諸乎左定九晉郤克曰所不此報無能渉河左宣十七所不與舅氏同心者有如白水投其璧於河左襄十四則不能見夫人已所能見夫人者有如河左昭三十一互入怨恨孟孫謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君左定六齊子行抽劒曰所不殺子者有如陳宗宋公曰所難子者上有天下有先君左哀十四郤克曰不報齊者河伯視之史記晉世家祖逖曰祖逖不能清中原而復濟者有如大江晋愍帝建興元年宋文帝指蔣山曰必無此慮若違今誓便是負於寧陵元嘉十七賜王衍詔略曰三辰在上一言不欺通鑑後唐明宗大夫文種曰越王謹上刻青天敢不如命吳越春秋集援青松而示心指白水而旌信劉孝標絶交論待余異日弟妹婚姻畢司馬歳秩滿出處行止得以遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言白居易草堂記出肺肝相示指白日涕泣韓文要約經死生契闊與子成説詩乆要不忘平生之言論語子書契所以識公信也慎子史晉欒書中行偃逆周子於京師而立之周子曰二三子用我今日否亦今日左成十八申之以盟誓重之以婚姻左成十三昭大神要言焉左襄九年傳記越人結交約曰卿雖乗車我戴笠後日相逢下車揖不稱經易曰負且乗致冦至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣易維鵲有巢維鳩居之互見非據彼其之子不稱其服詩子取猨狙而衣周公之服荘子史服之不衷身之災也齊慶封来聘其車羙叔孫曰服羙不稱必以惡終左傳德不稱禄猶鑿墉之址以益其髙皇甫規傳龜兹来朝樂漢衣服制度歸其國治宫室作徼道周衞出入傳呼撞鐘鼔如漢家儀外國胡人皆曰驢非驢馬非馬若龜兹王所謂驘也西漢龜兹傳侍中有封侯賜爵者士君子皆耻與為列焉通鑑漢靈紀婢作夫人不堪位置絳帖梁武評書集峨峨進賢冠耿耿水蒼佩服章豈不好不與德相對顧影聽其聲赬顔汗浹背韓詩紫綬裹文身白侍郎本朝附鳴鷄以隼翼披羊羔以豹文類要冒濫史衞懿公好鶴鶴有乗軒者左荘二十七漢武時大農經用耗竭有請置賞官名曰武功爵得至樂卿案漢書音義曰名樂卿者朝位從九卿加樂者别正卿又十九爵為樂公食公卿禄以顯軍功軍功多用超等大者封侯卿大夫小者郎吏吏道雜而多端則官職耗廢除故鹽鐵家富者為吏吏道益雜不選而多賈人矣史記平準書賦六百餘萬錢乗傳而行郡國如淳曰此言富者出錢榖得髙爵或乃為使者乗傳車循行郡國以為榮也西漢賈誼傳西園弄狗著進賢冠帶印綬通鑑漢靈紀更始官爵皆賈豎羣小語曰竈下養中郎将爛羊胃騎都尉爛羊頭闗内侯後漢賣闗内侯假金印紫綬傳世入錢五百萬後漢靈紀金紫佩士卒之身符䇿委僕𨽻之門非所以重名器正紀綱也通鑑晋帝紀緋服衆於青衣象板多於木笏通鑑唐武后晉趙王倫奴卒厮後亦加爵位每朝㑹貂蟬盈坐時人語曰貂不足狗尾續晋書互入非據北齊蒼頭皆開府封王狗馬及鷹亦有儀同郡君之號有鬬雞號開府通鑑陳紀員外常侍路上比肩諮議參軍市中無數豈是朝章固應如此陳世祖栁澤曰神龍以来賣官鬻爵妃主之門有同商賈舉選之曹實均闤闠屠販之人悉由邪而忝官黜斥之人咸因姦而冐進舊唐書本傳上以舞胡安叱奴為散騎侍郎李綱曰古樂工不與士齒惟齊末封曹妙逹為王安馬駒為開府有國家者以為殷鑑先是階無泛加皆以勞考敘進至五品二品仍奏取進止至是始有泛濫之階比及末年服緋者滿朝矣通鑑唐髙祖紀屠沽臧獲用錢三十萬則别降封勅除官斜封付中書時人謂之邪封官通鑑唐中宗馬周曰騶子倡人鳴玉曵履與朝賢君子比肩而立同坐而食舊唐書本傳非據經或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也注以訟受錫榮何可保易曰負且乗致冦至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣互入不稱非所據而據焉身必危徳薄而位尊包羞位不當也易維鵲有巢維鳩居之詩互見不稱子不仁而在髙位是播其惡於衆也孟子史受爵非道殃必疾東漢翟酺傳費充位居人上智居人下三國志互入不稱趙王倫簒位奴卒厮役亦加爵位每朝㑹貂蟬盈坐時人為之語曰貂不足狗尾續本傳互入冐濫集牧守由将校以授皆虎而冠子男由胥徒以出皆鶴而軒劉賔客蚤虱名器䑕雀倉庾陸魯望文記纂淵海卷七十三
