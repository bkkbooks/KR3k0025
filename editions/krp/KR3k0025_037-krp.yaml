body:
  text: 記纂淵海卷三十七宋潘自牧撰科舉部科舉經大司徒以鄉三物教萬民而賔興之一曰六徳二曰六行三曰六藝鄉大夫此謂使民興賢出使長之使民興能入使治之周禮命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論記子須以發策決科揚子史漢高祖詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我遊者吾能尊顯之以布告天下其有稱明詔者御史中執法郡守必身勸為之駕遣詣丞相府武帝詔吏民有明當世之務習先聖之術者縣次續食令與計偕今至闔縣不舉一人其與中二千石禮官博士議不舉者罪今欲以三代選舉之法取當世之士猶察伯樂之圖求騏驥於市而不可得亦明矣韋彪上議國以簡賢為務賢以孝行為首是以求忠臣必於孝子之門故士宜以孝行為先然其要在於選二千石二千石賢則貢舉得其人矣漢書杜正𤣥舉秀才試策髙第楊素怒曰周孔更生尚不得為秀才刺舉何忽妄舉此人乃以策抵地使擬司馬相如上林賦等五篇素讀數遍大驚曰誠好秀才北史隋時重舉秀才天下不十人而杜正倫一門三秀才唐制取士之科多由隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升于有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明筭有一史有三史有開元禮有道舉有童子而明經之别有五有三經有二經有學䆒一經有三禮有三傳有史科此嵗科舉之常選也太宗朝張昌齡王公瑾並有俊才時考功王師旦不署以第太宗問其故對曰此輩體性輕薄文章浮艷必不成令器臣若擢之恐後生相效有變風雅帝以為名言武后以吏部選人多不實乃令試日自糊其名暗考以定等第開元五年始令鄉貢明經進士見訖國子監謁先師學官開講問義五品以上及朝皆往閱理焉寶厯二年楊綰上䟽言進士科起於隋大業中是時猶試策髙宗朝劉思立加進士雜文明經填帖故為士者皆稱當代之文而不通經史明經者但記帖括非側席求賢之道請依古察孝㢘其鄉閭孝友信義㢘恥而通經者縣薦之州試其所通之學送於省乃詔明經進士與孝㢘兼行陸贄奏曰前代有鄉舉里選之法所以明歴試廣旁求厚行能息馳騁也薛登言方今舉士尤乖其本明詔方下固已驅馳府寺之庭出入王公之第陳篇希恩奏記誓報故俗號舉人皆稱覔舉李徳裕甞論公卿子弟艱於科舉武宗曰向聞楊虞卿兄弟朋比貴勢妨平進之路昨黜楊知至等抑其太甚有司不識朕意不放子弟即過矣但取實藝可也唐書傳記漢射策與對策不同按蕭望之傳謂為難問疑義書於策量其大小署為甲乙之科不使彰顯射者隨其所問而釋之對者顯問以政事經義觀其所對文詞定髙下孔氏征說武徳以來禮部閱試之日皆嚴設兵衛薦棘闈之搜索衣服譏伺出入以防假濫焉通典唐張倬柬之之孫舉進士不第捧登科記頂上戴之曰此千佛名經摭言盧肇赴舉先達問所從來曰某袁民也先達曰袁出舉人耶答曰袁之舉人亦猶沅江鼈甲九肋者稀摭言集操數寸之管書盈尺之紙髙可以釣爵位若循次而進亦不失於甲科擇吉日余西征兮亦既至乎京師君之門不可逕而入兮遂從試於有司韓文白蓮千朶照廊明一片承平雅頌聲更報第三條燭盡文塲風景冩難成薛能蓬巷幾時聞吉語棘籬何日免重來三條燭盡鐘初動九轉丹成鼎未開韋承矩含吐一腹文八音兼五色馮異本朝唐制取士惟進士明經二科本朝初惟用進士嘉祐三年始復明經科而限以間嵗取士避暑録唐制禮部試舉人夜以三鼔為限本朝率用白晝不復繼燭國朝事實司馬温公欲令進士召朝官保任然後應舉又更貢舉法范純仁曰舉人難得朝士相知士族近京猶可疎逺之人尤不易矣兼今之朝士未必能過京官選人京官選人未必能如布衣徒令求舉未必能有益既欲不廢文章則雜文四六之科不如設在衆人場中不須别設一科也温公從之言行録今議者欲變改不過數端或曰鄉貢徳行而略文章或曰專取策論而廢詩賦或曰舉唐室故事兼採譽望而罷封彌或欲變經生朴學不用帖墨而考大義此數者皆知其一而未知其二也夫欲興徳行在於人君若欲設科名以取之則是教天下相率為偽也上以孝取人則勇者割股懦者廬墓上以㢘取人則弊車羸馬惡衣菲食凡可以中上意者無所不至徳行之弊一至於此自文章言之則策論為有用詩賦為無益自政事言之則均為無用然而祖宗以來莫敢廢者以為設法取士不過如此而已而議者必欲以策論決能否請有以質之近世士大夫文章華麗者莫如楊億使億尚在則忠清鯁亮之士也豈得以華麗少之通經學者莫如孫復石介使孫復石介尚在則迂濶矯誕之士也又可施於政事之間乎東坡議貢舉職程伊川曰或謂科舉事業奪人之功是不然且一月之中十日為舉業餘日足可為學然人不志於此必志於彼故科舉之事不患相妨唯患奪志外書篇陳彭年詣政府王文正公旦延見之陳起呈其狀曰科舉條貫公投之於地曰内翰做官㡬日待隔絶天下進士陳惶懼而退遺事寇萊公年十九舉進士時太宗取人多問其年年少者往往罷遣或教公増其年公曰吾初進取可欺君耶言行録王荆公改科舉暮年覺其失曰本欲變學究為秀才不謂變秀才為學究蓋舉子專誦王氏章句而不解義正如學究誦注疏耳談筆今欲以易書詩為一科而子年午年試之周禮儀禮及二戴禮為一科而卯年試之春秋及三傳為一科而酉年試之諸經皆兼大學論語中庸孟子論則分諸子為四科而分年以附焉策則諸史時務亦然則士無不通之經無不習之史而皆可為當世之用矣朱文公議天子昔取士先俾分媸妍濟濟兼俊秀師師驎與鸞蘇易簡科目史陽嘉元年以太學新成試明經下第者補弟子増甲乙科員各千人注云射策上者為甲次者為乙後漢以光禄四行取士漢官儀曰四行敦質朴遜上儉也黄瓊以前左雄所上孝㢘之選專用儒學文吏於取士之義猶有所遺乃詔増孝弟及能從政者為四科後漢書凡舉試之制其科有六一曰秀士二曰明經三曰進士四曰明法五曰書六曰筭凡此求人之本必須精究理實而昇為第舊唐書職官志貞觀十一年詔河北淮南舉孝弟敦篤㢘閑時務儒術該通可為師範文詞秀美才堪著述明識政體可委字人并志行修立為鄉閭所推者詣洛陽宫麟徳元年應銷聲幽藪科一人儀鳳元年崔融應辭彈文筆科乾封元年應幽素舉及第一十三人永昌元年應學綜古今科一人唐書陳子昻奏武后八科一措刑二官人三知賢四去疑五招諫六勸賞七息兵八安宗子本傳沈既濟曰夫古今選用之法九流常叙有三科而已曰徳也才也勞也而今選曹皆不及焉且吏部甲令雖曰度徳居任量才授職計勞升叙然考校之法皆在書判簿歴言辭俯仰之間則安行徐言非徳也空文善書非才也累資積考非勞也況衆流茫茫耳目有不及者乎選舉志三科登雋又曰俊異賢才斡蠱陸贄傳漢興雜三代之政𢎞四科之舉西京始振經術之學東漢終持名行之節楊琯傳疏所舉四科必以公㢘孝弟為之質素然後别精藝能之科第耳裴垍賢良策張鷟陽矯陸元芳貟半千皆試中八科崔融擢八科髙第本傳傳記漢建初以來詔書辟士四科一曰徳行髙妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案草覆問文任御史四曰剛毅多略遭事不惑明足照姦勇足決疑才任三輔漢官儀唐有直言極諫科哲人竒士科逸淪屠釣科良才異等科文儒異等科博學優通科文辭清麗科將帥科武足安邊科髙才沉淪草澤自學科才髙未達沉迹下僚科博學宏詞科多才科王霸科智謀將帥科文詞清逸科樂道安貧科諷諫主文科譚賔録調露元年詔曰今年冬至有事嵩岳令諸州明揚側陋或文武兼資財堪將相或學藝該博業標儒首或藻思宏麗辭擅文宗或洞曉音律識均牙曠或深明歴數妙同京管者咸令薦舉登科記知貢舉史王師旦知貢舉進士張昌齡王公瑾並有俊才師旦考其文策全下詳見前科舉類王起前後四典貢部精鑑狥公所選皆當代詞藝之士有名於時李宗閔典貢舉所取多知名士世謂之玉筍張楚金與兄越石同舉所司以兄弟不可兩收將罷越石楚金進曰以順則越石長以才則楚金不如請俱退李勣時在中書難曰國家貢舉本求才行何妨雙舉遂俱進士擢第賈鋉三典貢舉得士七十五人多名卿宰相髙湜為禮部侍郎時取士多由權要干請湜抵㡌於地曰吾決以至公取之得譴固吾分唐書裴皥以文學在朝廷文章相馬𦙍孫桑維翰皆皥禮部所取進士也後𦙍孫知貢舉引新進士詣皥皥作詩曰門生門下見門生世傳以為榮五代史傳記唐初貢舉主之考功開元考功員外郎李昻為舉人詆訶帝以員郎望輕遂移貢舉於禮部以侍郎主之士有姻舊悉試考功謂之别頭後齊抗為相奏罷之職林李逢吉知貢舉榜未放而入相王播代放榜及第人就中書見座主時稱好脚跡門生南部新書父子知舉者三家髙鍇子相于邵子允躬崔郾子瑤唯崔氏相去只二十年同上崔湜弱冠登科十年内掌貢舉翰林盛事崔羣知貢舉歸其妻勸令求田羣曰予有美莊三十所榜所取三十人是也妻曰君非陸贄門生乎君掌文柄約其子簡札不令就試如以君為良田則陸氏一莊荒矣羣無以對唐餘録權徳輿不由科第掌貢舉三年門生相繼為公相因話録後周范質年二十舉進士和凝權知貢舉平生以宰輔自期登第之嵗姓名在第十三及覽質文卷知非常人也洎放榜亦以質為第十三場屋間謂之傳衣缽言若禪宗之相付受也其後凝既登庸不數年間質亦大拜聞見録集凡執文章權衡以揣量多士披沙剖璞由我而顯者落落然居多推是風鑒移於大冶則鎔範之内無非祥金劉夢得所考試士踵相躡為宰相達官韓文典貢春闈杜牧禮闈新榜動長安九陌人人走馬看一日聲名徧天下滿城桃李屬春官劉夢得本朝禮部貢院以朝官一員主判若遣官知貢舉即主判官罷舉事畢復别遣官主判㑹要慶厯二年富弼上言南省主文者四五人皆兩制宗匠國家申命邇臣往司貢舉慶厯詔知舉差四員元祐詔賈黄中兩知貢舉趙安仁三典春闈職類楊大年為翰林學士適禮部試天下士一日㑹鄉里待試者或云學士必持文衡幸預有以教之大年乃作色拂衣而入則曰丕休哉大年果知貢舉凡程文之用丕休哉者皆中選而當時坐中之客亦半有不以為意而不用者聞見録歐陽公知貢舉毎遇考試卷坐後常覺一朱衣人時復㸃頭然後其文入格不以則無復與考及囘視之一無所見侯鯖録簪紱近臣當顯任絲綸深㫖諭丹衷旰宵汲汲予有念威風孜孜爾狥公名實豈遺衡鑑内賢能皆萃網羅中盛時選士貢闈開罄宇聞風獻藝來心似權衡求實效勿教蓬蓽有遺才真宗御製主文傳記李昻主俊秀科集貢士曰文之美惡悉之矣如有請託當悉黜之既而程外舅薦李權於昻昻惡召權庭數之且斥其章句之疵權曰鄙文不臧已聞命矣執事詩云耳臨清渭洗心向白雲閒今天子春秋鼎盛不揖遜天下而洗耳何哉大唐遺事鄭薰主文舉人有顔標者薰誤謂是魯公之後以為狀元及謝恩問及廟院標曰標寒進也未嘗有廟院薰始大悔無名子嘲曰主司頭腦太冬烘錯認顔標作魯公摭言劉虚白昔與裴令公同硯席及公主文虛白猶是舉子簾前獻一詩云二十年前此夜中一般燈燭一般風不知嵗月能多少猶著麻衣侍至公詩話李程試日五色賦初出試塲楊於陵遇程詢其所試程誦之其破題曰徳動天鑒祥開日華於陵曰公今須作狀元翌日無名於陵深不平乃故將李子文繕冩攜之以謁主文主文嘆賞不已於陵曰當今塲中若有此賦侍郎何以待之主文曰非狀元不可也於陵曰苟如此侍郎巳遺賢矣此乃李程所作亟命取程所納卷對之不差一字主文因謀之於陵擢為狀元詩話本朝士人劉幾驟為險怪之語歐公深惡之㑹公主文有一舉人論曰天地軋萬物茁聖人發公曰此劉幾也戲續之曰秀才刺試官刷乃以大朱筆横抹之自首至尾謂之紅勒帛判大紕繆字榜之既而果幾也後數年公為御試考官試堯舜性仁賦有曰靜而延年獨髙五帝之夀動而有勇形為四罪之誅公大稱賞擢為第一人及唱名乃劉煇人有識之者曰此劉幾也易名矣公愕然乆之夢溪筆談考官史孫逖為考功選貢士多得俊才初年杜鴻漸至宰相顔真卿為尚書後年拔李華蕭穎士趙驊登上第逖謂人曰此三人堪掌綸誥韋執誼從祖兄夏卿為吏部侍郎執誼為翰林學士受財為人求科第夏卿不應乃探出懐中金以納夏卿袖夏卿擺袖引身而去劉蕡對策詆宦官考官馮宿等見劉蕡策歎伏而畏宦官不敢取唐書傳記盧渥曽於迎旅遇宣宗微行請詩卷袖之他日令主司擢第至後知舉遇黄巢犯闕不及終塲趙崇戲之曰出腹不生養主司也北夢瑣言集諸生業患不能精毋患有司之不明行患不能成毋患有司之不公韓文肯與斗筲者决得失於一夫之目而為之欣戚哉與崔立之書吾以是知齊生異日誠良有司也送齊錦序本朝建炎初戎務擾擾適當廷對姑令有司試策一道不經御覽潭州何烈只依常式於卷子内稱臣聞及聖問浮溪為考官坐不舉覺除集撰奉祠謝表曰謂子路使門人為臣雖誠悖理而徐邈云酒中有聖初亦何心筆談平生謾說古戰塲過眼還迷日五色坡詩剖蚌得珠難揚沙見金少諸生程藝文承詔當品目變名混甲乙謄冩失句讀晝忩過白駒夜几跛紅燭釣深思嘉魚攻璞願良玉山谷陳彭年有親戚為命首司供食既暮而罷其詞藻宏麗策外更試詩賦各一道制舉試詩賦自此始代宗御宣政殿試制舉人至夕策未成者令大官給燭俾盡其力皇甫鎛第進士又權制科由聚斂為相雖市道者嗤之元稹舉制科第一其進非公議為士類訾薄附宦貴得宰相晩節彌阻喪加㢘節不飾云元和元年策試制舉之士於是白居易等出焉通鑑傳記陛下親臨前殿俯加明試坐之裀褥覆以幄幕酒食賜與慰問紛綸自質明洎於夜分聖躬不移御座恩深禮備未有盛於兹舉也唐試制科故事如此見類也永昌元年應舉綜古今科一人張說第一等考策日封進令曰洛州人張說文詞清典藝能優裕金門對策已居髙科之首銀牓效官宜加一命之秩登科記集憶獻三賦蓬萊宫自怪一日聲烜赫集賢學士如堵牆觀我落筆中書堂杜工部君門起天中多士如星攅烟霞覆雙闕忭舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰金牓錯落飛濡翰古來長策人所嘆遭時難一鳴從此始相望青雲端劉夢得送道中本朝宋興以來御試制科舉人無登等者惟吳育第三等餘皆四等除此則落之東軒筆録國初制科有賢良方正能直言極諌經學優深可為師法詳閑吏理達於教化凡三科應内外職官前資見任黄衣草澤人並許諸州及本司解送上吏部對御試第一道以三千字以上取文理優者為入等景徳二年詔尚慮清介之秀遺逸於丘園髙尚之姿隱淪於屠釣今復置賢良方正能直言極諫博通文典達於教化才識兼茂明於體用武足安邊洞明韜畧運籌決勝軍謀宏逺材任邊寄等科四年中書門下言考試應試科陳絳夏竦史良三人詞理稍優帝曰比設此科欲求才識若但考文義則積舉者方能中選茍有濟時之用安得而知朕以六經之㫖聖人用心固於子史異矣今策問宜用經義參之時務因命兩制各上策問而擇用之並選舉志天聖七年復置賢良方正等六科應上件科目者先進所業策論五十首試論六首以三千字以上為合格㑹要蘇轍舉直言考官以為不當收司馬公言轍於同科四人言最切直不可不收仁宗曰求直言而以直棄之天下其謂朕何坡集溫公行状仁宗即位八年以制策取人一舉而得富弼再舉而得公張方平誌錢希白賢良方正擢第子明逸彦逺相繼登制科蘇軾蘇轍兄弟同年制策入等故彦逺謝啓曰兩朝之間相繼者父子十年之内並進者弟兄子瞻啓曰兄弟同竊於賢良衣冠或以為盛事希白從孫藻後復登進士第復登制科其謝啓云十年二第屢玷於主司一門四人無慙於祖烈渑水燕談夏竦舉制科庭下有老宦者以吳綾手巾乞詩公題曰殿上衮衣明日月階前旗影動龍蛇縱横禮樂三千字獨對丹墀日未斜李太伯素不喜孟子以孔子尊王孟子教諸侯為王甞試制科六論不得其一曰吾書未甞不讀必孟子註疏也擲筆而出因為檢視之果然筆談賢良科史文帝二年詔十一月晦日食舉賢良方正能直言極諫者以正朕之不逮賈山至言曰使天下舉賢良方正之士天下皆訢訢然曰將興堯舜之道矣武帝建元元年丞相衞綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政者請皆罷元光二年策賢良明於古今王事之體受策察問咸以書對董仲舒以賢良對制曰朕廣延四方之豪雋公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕垂聼而問焉晁錯習申商刑名武帝詔有司舉賢良文學之士錯在選中時對策者百餘人太常奏公孫𢎞第居下天子擢𢎞為第一召見容貌甚麗拜為博士待詔金馬門昭帝始元中召文學賢良問以治亂皆對願罷鹽鐵酒𣙜均輸成帝建始三年冬日食地震詔舉方正賢良之士劉慶忌舉谷永待詔公車西漢永初元年詔舉賢良方正有道術之士後漢郤詵遷雍州刺史帝曰卿自以為如何對曰臣舉賢良對策第一猶桂林之一枝崑山之片玉帝笑之武帝詔各賢良方正直言㑹東堂策問晉書張柬之以賢良召對時年七十對策者千餘柬之為第一唐本傳正元元年策賢良方正得穆質裴復栁公綽崔邠韋純魏洪簡勲執易等世美防知人鮑防傳牛僧孺元和初以賢良方正對策與李宗閔皇甫湜俱第一其言鯁訐不避宰相僧孺傳文宗太和二年帝引諸儒百餘于庭策之賈餗龐年見劉蕡對嗟伏以為過古賈董而畏中官睚眦不敢取士人讀其辭至感慨流涕李郃曰劉蕡下第我輩登科能無厚顔通鑑國之選士必籍賢良蓋取孝友純備及言行篤實居鄉育徳動不違仁如是率巳從政化人鎮俗楊綰傳集漢庭以賢良文學徴有道之士公孫𢎞條對第一席其勢鼓行人間取丞相且侯使漢有得人之聲伊𢎞發也皇唐文物與漢同風故天后朝燕國張公說以詞標文苑徴𤣥宗朝曲江張公九齡以道侔伊吕徴徳宗朝天水姜公公輔杜陵韋公執誼河東裴公垍以賢良方正徴憲宗朝河南元公稹京兆韋公淳以才識兼茂徴隴西牛公僧孺李公宗閔以能直言極諌徴咸用對策甲於天下繼為有聲宰相古今相望落落然如騎星辰與夫起版築飯牛者異矣劉禹錫集本朝富公弼初遊塲屋穆伯長謂之曰進士不足以盡子之才當以大科名試公果禮部試下范文正公遣人追公曰有㫖以大科取士可亟還公辭以未甞為此學文正曰已聞諸公薦君矣乆為君闢一室皆大科文字可往就館時晏元獻公為相求壻於文正文正曰公女若嫁官人某不敢知必欲國士無如富弼者即議壻公遂以賢良方正登第聞見録吳奎將舉賢良夢入魏文帝廟升殿問羣臣優劣衆未對對曰韓延夀為最是夕書吏楊間亦夢公讀楊阜傳翌日告公公學二傳及試六論一乃韓延夀楊阜孰優公果中首選澠水燕談張賢良咸應茂才科過䕫州郡將厚待之因問曰四科優劣之差見於何書張無以對守曰載孟子注中張道中謾思索著論咸至都閣試六論以此為首題張更不注思而就主文覽之大喜過閤第一張即魏公之翁也揮塵録自賢良設科文苑立傳而後無益之言滿天下朱文公語宏詞科史唐設博學宏詞科選舉志栁宗元少精敏絶倫為文章卓偉精緻一時輩行推仰第進士博學宏詞科唐書集聞吏部有以博學宏詞選者人尤謂之才且得美仕就求其術凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月既己為之則欲有所成就書所謂恥過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於是選必知其懐慙乃不自進而已耳設使與夫今之善進取者競於䝉昧之中僕必知其辱焉然彼五子者且使生乎今之世其道雖不顯於天下其自負何如哉肯與夫斗筲者決得失於一夫之目而為之欣戚哉韓文崔立之書及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉其一人者則莫之聞矣實與華違行與時乖果竟退之與崔虞部書本朝國初立宏詞拔萃科紹聖立服勤詞學科大觀改詞學兼茂科紹興改博學宏詞科國史紹聖二年禮部言宏詞除詔誥赦敕不試外今擬合程試考校格一試格十條章表依見行體式賦如唐人斬白蛇幽蘭渥洼馬之類頌如韓愈元和聖徳詩栁宗元平淮夷雅樂之類箴如揚雄九州箴之類銘如栁宗元塗山銘張孟陽劍閣之類誡諭如近體誡諭風俗百官之類露布如唐人破蕃賊露布之類檄書如司馬相如喻蜀檄書之類序如顔延之王融曲水詩序之類記亦用四六以上考試官臨時取三題各一塲試其章表頌檄書露而誡諭序記並限三百字以上成箴銘並限一百字以上成賦八韻限三百字以上成一考格五條詞理俱優者為二等詞理次優者為次等詞格超異者取㫖上等循兩資次等循一資承務郎以上比類推恩續㑹要正月二十八日再立到考試格章表露布檄書以上用四六頌箴誡諭序記以上依古今體亦許用四六考官臨時此四題作兩塲引試並限三百字以上箴銘限一百字以上成同上試宏詞乃是以文字自售古今得已似不如此楊龜山語洪景伯兄弟應博學宏詞以克敵弓銘為題洪不知所出有巡捕老卒問洪曰官人欲知之否洪笑曰非爾所知卒曰不然我本韓太尉世忠之部曲從軍日見有人以神臂弓舊様獻於太尉太尉令如其制度製以進御賜名克敵併以嵗月告之洪盡用其語首云紹興戊午五月大將云云主文驚喜遂中科目若有神助焉李平叔云刑法科史漢髙祖初定闗中與秦父老約法三章命蕭何定律令鄭昌上疏云若開後嗣不若定律令律令一定愚民知所避姦吏無所㺯矣成帝詔今大辟之刑千有餘條律令煩多百餘萬言自明習者不知所由以羅元元之民大絶亡辜漢書律令成杜預為之注解曰法者繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡晉書裴𢎞獻駁律令四千餘事髙宗詔律學之士撰律疏張戣以刑律分類為門而附以格敕為大中刑律統類詔刑部頒行之唐書本朝雍熙二年詔曰法家最切於時廢之已乆可復置明法一科㑹要童子科史任延年十二明詩易春秋顯名大學學中號任聖童漢本傳司馬朗十二嵗試經為童子郎監試者以其身體壯大疑朗匿年朗曰朗之内外累世長大朗雖稺弱無仰髙之風損年以求早成非志所為也魏本傳楊收年十三善屬文吳人號神童里人多造門觀詩賦至壓敗其藩收嘲之曰爾非羸角者奚用觸吾藩唐本傳𤣥宗封泰山劉晏始八嵗獻頌行在上竒其幼命張說試之說曰國瑞也即授太子正字號神童名震一時引晏殿内坐貴妃膝上親為畫眉總髻宫人遺花投果本傳李泌七嵗能為文𤣥宗召之帝方與張說觀奕因使說試其能請賦方圓動靜泌曰願聞其略說曰方若棋局圓若棋子動若棋生靜若棋死泌即答曰方若行義圓若用智動若騁才靜若得意說因賀帝得竒童帝大恱本傳孔穎達八嵗就學記誦日千餘言詔國子祕書學士與論議穎達為冠儒學傳集張童子生九年自州縣達禮部一舉而進立於二百人之列愈將進童子於道使人謂童子求益者非欲速成者韓文本朝楊億年十一以童子召對試詩賦五篇下筆立成太宗歎異授正字制曰汝方在髫齓不煩師訓精爽神助文學生知越景絶塵一日千里予有望於汝也晏殊七嵗善屬文號神童張知白薦之得召試真宗置之祕閣使得悉讀祕閣書祥符八年以童子蔡伯希為祕書省正字伯希纔四嵗誦詩百餘篇上召入禁中應對周詳所誦詩精因命以官又作詩以賜郭中恕善屬文及書史小學通九經七嵗舉童子言行録試館職史韓忠獻公宋景文公同召試中選王徳用帶平章事例當謝二公有空疎之謙徳用曰亦曽見程文誠空疎少年更宜廣問學二公大不堪景文曰吾屬見一老衙問是納侮也後二公俱成大名忠獻謂景文曰王公雖武人尚有激厲成就後學之意不可忘也聞見録苗振第四人及第召試館職晏相曰宜稍溫習振曰豈有二十年為老娘而倒綳孩兒者乎既試果不中選公笑曰苗君竟倒綳孩兒矣倦遊録吕公著既登第詔嵗次所業以進將召試館職公謙避終無所進朝廷知其意不復索所業令徑就試亦不赴故仁宗心重之何澹試館職策上録其策中所言堂闕歸部亦有未便曰恐所言有可採不欲遣之言行録試教官史伏見太學試博士第子皆以意說不修家法臣以為博士及甲乙策試宜從其家章句開五十難以試之解釋多者為上第引文明者為髙說若不依先師義有相代者皆以為罪後漢書本朝元豐七年立法試學官上等為博士下等為正録願授教授者聽四史元符元年詔學官嵗一試四朝史紹興五年罷試學官科十五年詔試諸州教授自來春始中興㑹要鄉舉經大司徒以鄉三物教萬民而賔興之三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏興其衆寡以賔禮禮之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之此謂使民興賢出使長之使民興能入使治之周禮命鄉論秀士升之司徒曰選士記王制諸侯嵗貢士於天子天子試之於射宫射義史御史中執法郡守必身勸為之駕縣次續食令與計偕武帝議不舉者罪有司議曰古者諸侯貢士一適謂之好徳再適謂之賢賢三適謂之有功迺加九錫不貢士一則黜爵再則黜地三而黜爵地畢矣注云適得其人漢議章帝詔鄉舉里選必累功勞每尋前世舉人貢士或起畎畆不繫閥閱敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之後漢書古者諸侯嵗貢士進賢受上賞非賢貶爵左雄傳古之取士必使諸侯嵗貢蔡邕傳魏明帝詔郡國貢士以經學為先魏志王元曽與劉巘父恵書曰比嵗賢子充秀州閭南史由州縣者曰鄉貢天寶十二年敕天下罷鄉貢十四年復鄉貢士唐志李琪既貴乃刻牙拔為金字曰前鄉貢進士置之坐側五代史傳記槐花黄舉子忙南部新書文宗曽言進士之盛宰相對曰舉塲中自云鄉貢進士不博上州刺史喬彛京兆府解試渥洼馬賦奮筆斯須而就試官便欲首送京兆曰喬彛崢嶸甚以解副薦之可也廣記髙郢夜課於豐亭忽見一鼈在案上視之石也郢異其事取千題散置禇中禱祝令石鼈銜之以卜來試既而石鼈舉頭乃是沙洲獨鳥賦題出果然其年首送湘潭記盧肇就江西解試為試官末送肇以啓事謝曰巨鼇屭贔首冠蓬山試官謂之曰昨恨以人數擠排深慙名第奉凂焉得翻有首冠蓬山之語肇曰頑石在上巨鼇戴之豈非首冠耶一坐聞之大笑神州解送自天寶開元之際率以上十人謂之等第必求名實相副者或至渾化不然十得七八茍異於是牒貢院請落由故有神州等第録以記得人之盛摭言荆州解送舉人多不成名號天荒解江西節帥鍾傳孜孜以薦賢為急務求貢於有司者莫不盡禮接之考試之辰設㑹供帳甲於治平行鄉飲之禮復大㑹以餞之筐篋之外率皆資以桂玉解元三十萬解副二十萬自餘皆不減十萬瑣言張楚金與兄越石同預鄉貢進士談賔録咸通中楊𤣥翼怒舉子衣服太盛欲令騎驢時有詩曰看看詔下盡騎驢紫軸緋氈滿九衢清瘦兒郎猶自可就中愁殺鄭昌圖盧氏雜記王維素為岐王所知將應舉告王為地王令作琵琶曲引至貴戚家自彈其曲曰鬱輪袍貴戚大愛之王曰此非伶人乃能文之士遂為因縁是年為舉首廣異劉鶚就鄉舉體貌瘠黑或被襴鞹人謂之白雲抱幽石江南野史開元二十五年敕諸州貢士上州嵗貢三人中州二人下州一人必有才行不限其數解送之日行鄉飲禮牲用少牢以官物充登科記其不在館學而舉者謂之鄉貢通鑑外府不試而貢者謂之拔解國史補集朝廷用文字求士每嵗布衣束帶偕計吏而造有司者僅半孔徒之數春官上大夫擢甲乙而升司徒者於孔氏髙弟亦再倍然栁文詔下諸郡國嵗貢鄉曲英韓集雨中粧㸃望中黄勾引蟬聲送夕陽憶得當年隨計吏馬蹄特特為君忙翁承贊對雖希鼔瑟名亦濫吹竽温庭筠本朝秦少游夢發殯而葬之皆云劉發之柩是嵗發首薦坡集孫山應舉綴名牓末朋儕以書問得失答曰解名盡處是孫山餘人更在孫山外覧者大笑載色載笑有同於泮水一觴一詠無愧於山隂真禮義之遺風正太平之盛舉東坡鹿鳴燕序監舉史天寶十三載敕舉人不由國子及郡縣學者勿舉送唐志本朝伏覩解文濫應名薦肄三合雅方别於黨庠旅百在庭遽陪於方貢惟遴柬之彌衆叨首舉以為榮飾讓無從循涯有愧夫何濫吹之曲誤入程文之規用冠譽髦越陞士級六一集鄭毅夫國子監以第五人送意甚不平謝主司啓事有李廣事業自謂無雙杜牧文章止得第五又云騏驥已老甘駑馬以先之巨鼇不靈因頑石之在上主司銜之沈存中筆談漕舉鎖㕔附傳記建中三年敕禮部應進士舉人等自今以後如有試官及不合選并諸色出身人有應舉者宜先於舉司陳狀凖例考試如才堪及第者送名中書門下重加考覈如實才堪凖例與及第至選日仍稍優與處分其正員官不在此限㑹要黄通累舉不第作官數任年將耳順鎖㕔應舉或嘲曰老妓舞柘枝剰員呈武藝雜志本朝先朝時鎖㕔舉進士者時有一人以為竒異試不中者皆有責罰為私罪其後詔文官聽兩舉武官一舉不中者不復責罰景祐中詔今後鎖㕔應舉人與白衣别試各十人中解三人在外者衆試於轉運司不復限此舉數涑水記聞武舉史漢成帝令北邊二十二郡郡舉勇猛知兵法者各一人哀帝詔舉明兵法有大慮者平帝時舉勇武有節明兵法郡一人詣公車安帝詔舉列將子孫明曉戰陣任將帥者順帝令舉剛毅武猛有謀謨任將帥者又詔選武猛試用有明効任為將校者靈帝詔舉列将子孫吏民有驗戰陣之略者漢書晉武帝詔舉猛勇秀異晉書唐詔至軍謀將略翹闗拔山絶藝竒技莫不兼取武舉蓋起於武后之時長安二年始置武舉其制有長垜馬射步射平射箇射又有馬搶翹闗負重身材之選翹闗長丈七尺徑三寸矛凡十舉後手持闗距出處無過一尺負重者負米五斛行五十步皆為中第亦以鄉飲酒禮送兵部其選用之法不足道故不復書郭子儀以武舉異等補左衛長史後為大臣以身為天下安危者二十年校中書令考二十四婁師徳以紅抹額應勇士詔顧圓好讀兵書有經濟宇宙之心以銓謀射策甲科授執㦸自負文藝獲武職頗不得意貞觀十四年曰敷奏武舉人持弓挾矢數十百人入皇城恐非所宜也上聞之矍然命停武舉唐書集周官考藝國子置車甲之司漢道推恩孤兒備羽林之用栁文田承嗣請隨軍状本朝寶元三年詔自今武舉人程試並以策問定去留弓馬定髙下㑹要省試經大樂正論造士之秀者以告於王而升諸司馬曰進士記王制史開元二十五年敕應進士等送中書門下詳覆長慶元年詔今後禮部舉人宜凖開元二十五年敕及第人所試雜文并策先送中書門下詳覆開成三年敕禮部貢院進士舉人嵗限放三十人及第長慶三年王起奏曰伏以禮部放牓之後逺近誤傳非便臣請今年進士堪及第者本司考試訖其詩賦先送中書門下詳覆候敕却下本司然後凖例大字放牓從之舒元輿舉進士見有司鈎校苛切既試尚書雖冰炭脂炬飡具皆人自將吏一唱名乃得入列棘圍席坐廡下因上書言古貢士未有輕於此者羅棘遮截疑其為姦非所以求心直也唐書和凝知貢舉舊例放牓日設棘於門及閉院門以防下第不逞者凝徹棘啟門是日他無諠者所放多才能之士時議以為得人五代史傳記貞觀初放牓日太宗私幸端門見進士於牓下綴行而出喜謂侍臣曰天下英雄入吾彀中矣進士牓頭監粘黄紙四張以氈筆淡墨衮轉書禮部貢院四字或曰文皇頃以飛白書之又云象隂注陽受之狀摭言貢院牓右語及貢院宇用淡墨氈書李竚侍郎將放舉人命吏書榜未及填右語貢院字吏暴卒令史王㫤終其事㫤善書被酒染筆不能加墨一牓之内濃淡相間及視甚妍遂成故事賈氏雜録唐大中以來禮部放牓嵗取二三人姓氏稀僻者謂之色目人亦曰榜花南部新書唐舊制都省考試南院放牓南院東牆别築起一堵髙丈餘未辨色自北院將牓南院張之國史補本朝開寶五年禮部奏名合格進士帝詔對於講武殿始下詔放榜新制也㑹要國初州郡貢士猶未限數目太宗始有意廣收文士淳化三年試禮部者遂㡬二萬人自後未有如是盛者南省試進士有教無類賦王沂公為第一有云神龍異禀猶嗜欲之可求纎草何知尚薫蕕而相假有輕薄子云相國寺前熊翻筯斗望春門外驢舞柘枝議者曰言雖鄙俚事亦着題歸田録黄魯直得洪州解頭赴省試與侯希聖諸人待榜魯直置酒有僕自門被髮大呼而入舉三指問之乃同舎三人魯直不與飲酒自若飲罷看榜不少見顔色孫公談圃别院史初禮部侍郎親故移試考功謂之别頭貞元十六年中書舎人髙郢奏罷議者是之元和十三年庾承宣復奏考功别頭試太和三年姚中立又奏停别頭試六年賈餗又奏復之齊抗為相先是每年吏部選人試判别覆中書門下復擇官覆定抗奏不宜别差官俾吏部侍郎自覆故事禮部侍郎掌貢舉其親故即試於考功謂之别頭舉人抗亦奏罷之唐書覆試史左雄前議舉吏先試於公府又覆之於端門後尚書張盛奏除此科瓊復言覆試之作不宜改章帝乃止後漢黄瓊傳初開元中禮部考試畢送中書門下詳覆其後中廢元和十三年錢徽所舉送覆試多不中選由是貶官唐書傳記唐大中中天官奏云文屋暗科場當有事後更三科盡覆試復落考官皆罰俸僉載本朝太祖詔親覆試於殿庭詳見下殿試類陶穀子邴登第上曰穀不能訓子安得登第遽命中書覆試詔自今舉人凡闗食禄之家皆令覆試國史殿試史永始三年詔舉敦朴遜讓有行義者州各一人譙𤣥詣公車對策髙第拜義郎上盡召直言之士詣白虎殿對策馬融舉敦朴對策於北宫端門漢書則天永昌元年策問貢舉人於洛城殿前殿試自此始開元十年𤣥宗御洛城門試文章及第二十人考功戸部郎中蘇晉刑部員外郎席懐侍御史陳希烈於化城院考大厯六年御宣政殿試舉人至夕策未成者令大官給燭唐書傳記北齊選舉多沿後魏之制皇帝出坐於朝堂中楹其有濫劣者使飲墨水一升文理孟浪者奪席脫容刀通典武徳以來制詔舉者有常科皆標其目而搜揚之日或在殿廷天子親臨觀之已試糊其名於中考之文策髙者特授以美官其次為出身同上唐熊執易通九經當時設科取士題目甚多執易俱中等章武皇帝詔就殿試以二論一簡易而知險阻一五運相承是非執易前論書三千字五運相承論於卷首題云五運相承出於遷史非經典明文又唐方承土運故不對朝廷賞其才授西川節推該聞録集射策君門期第一射策君東堂宗匠集精選制可題未訖一科已大闡杜詩本朝國初廷試進士多不過二十人少或六七人自建隆至太平興國元年更十五榜所得宰相畢文簡公一人而已自後太宗始欲廣致天下士以興文治是嵗取一百九人遂得吕文穆公為舉首與張僕射齊賢二人自是取人益廣得士益多避暑録開寶五年禮部籍奏進士安守亮等及諸科二十八人太祖召對於講武殿始下詔放牓六年太祖御講武殿覆試進士宋凖等先是禮部放凖等及第謝於講武殿進士武濟川等人質叢陋占對失次命黜去又下第進士徐士㢘訴知舉官取捨非當即詔親覆於殿廷御試舉人自此始也㑹要太宗自淳化三年賜進士孫何等及第出身後五年不降詔御試自徐士㢘伐鼔訟不公始賜詩自太平興國二年吕蒙正榜始分甲次自八年王世則榜始及第日賜袍笏自祥符中姚曄榜始賜宴自吕蒙正榜始賜同進士出身自王世則榜始唱名自雍熙二年梁顥榜始封彌謄録覆考編排皆始於祥符景徳之間皇朝事實祖宗以來進士過省赴殿試尚有被黜者逺方寒士貧不能歸有赴河而死者仁宗聞之惻然自此殿試不黜落雖雜犯亦收之末名國史吕公著知貢舉宻奏曰天子臨軒策士而用詩賦非舉賢求治之意今來庭試乞出自宸衷唯以詔策咨訪治道自是上臨軒始以策試進士家傳正奏名第一甲賜進士及第第二甲同進士及第三甲第四甲賜進士出身第五甲同進士出身進士第一人丞事郎第二第三人文林郎第四第五人從事郎以下至第五甲並迪功郎官品唱名本朝天聖五年仁宗初臨軒試進士唱名第一甲方終太史奏日下五色雲見左右從官皆賀范鎮禮部奏名第一故事唱第過三人則禮部第一人者必抗聲自陳因擢寘上第鎮不肯自言至第七十九人乃出拜退就列無一言故事進士唱名宰職從官侍立左右有子弟預選者唱名之次必降階稱謝建炎初楊中立龍圖以侍讀侍立而其子適以持奏名預唱名中立亦降階稱謝國史及第史夏侯勝為太子太傅每講授常謂諸生曰士病不明經術經術苟明取青紫如俛拾地芥耳漢書交州記有龍門水深百尋大魚登此化成龍不得過曝腮㸃額血流此水恒如丹池後地理志注又謂龍門今在絳州李膺傳注元結少不羈十七乃折節向學天寶十三載舉進士楊浚見其文曰一第溷水耳有司得子是賴果擢上第唐本傳張鷟字文成登進士第應下筆成章及才髙位下詞翰文苑等科凡應八舉皆登科甲本傳歐陽詹與韓愈李觀李絳崔羣王涯聫第進士皆天下選時稱龍虎榜詹本傳楊敬之兼太常少卿是日二子戎載登科時號楊家三喜本傳李嶧曰余少舉進士登科蓋偶然耳後生可畏來者未可量五代史傳記都㑹謂之舉塲通稱謂之秀才投刺謂之鄉貢得第謂之前進士互相推敬謂之先輩俱㨗謂之同年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之拔解將試相保謂之合保羣居而賦謂之私試造請權要謂之闗節激揚聲價謂之還往既㨗列姓名於慈恩寺塔謂之題名大醼於曲江亭謂之曲江㑹籍而入選謂之春闗不㨗而醉飽謂之打眊燥匿名造榜謂之無名子退而肄業謂之過夏執業以出謂之夏課挾策入試謂之書策國史補新進士及第以泥金書帖子報其家謂之喜信開元天寳遺事新進士每及第鄉曲親戚例以聲樂相慶傳衣鉢見知貢舉類放榜後狀元以下到主司宅謝名曰謝衣鉢衣鉢謂得主司名第其或主司先人同名第即謝太衣鉢也張曙與崔昭緯同赴舉問卜者卜者殊不顧曙曙有愠色卜者曰郎君亦及第但崔家郎君拜相當於此時過堂既而張果不第崔有官後七年大拜曙果於崔公下過堂薛逢晩年厄於宦途策羸馬赴朝值新進士綴行而出圑司所由數十人見逢行李蕭然前導曰囘避新郎君逢遣价語曰莫貧相阿婆三五少年時也曽東塗西抹來苗台符年十六年讀年十七同年進士甞列題西明寺中或竊注曰一雙前進士兩箇阿孩兒劉業時賜及第韋岫賀之曰三十浮名每年皆有九重知之曠代所無摭言術士相牛僧孺若青蠅拜賀方能及第及登科訖歸至家庭有青蠅作人行立約數萬折躬再三良乆方去青陽記劉蕡楊嗣復之門生也既直言忤㫖中尉仇士良謂嗣復曰奈何以國家科第與此風漢耶嗣復懼答曰昔與蕡及第時猶未風耳唐記許裳晩年登第甞曰自得一第筋骨輕健愈於多年則知一名乃孤進之還丹金華子裴元質舉進士夜夢一狗從竇出挽弓射之摸箭遂撆以為不祥夢神解之曰笱第字頭也弓者第字身也箭者第字竪也有撆為第也尋唱第僉載唐太和八年放進士多貧士無名子作詩曰乞兒還有大通年六十三人籠仗全薛庶凖前騎瘦馬范鄼依舊益番氈秦中記喬舞知舉進士及第者五人皆舉數升降等甲無名子謂喬之榜類陳橘皮年多者居上南唐近事白樂天與弟敏中行簡三人相繼皆中第樂天作詩云自憐郡姓為儒少豈料詞塲中第頻桂折一枝先與我楊穿三葉盡驚人漁隠元和十三載李源公榜三十三人皆取寒素時有詩曰元和天子丙申年三十三人盡得仙袍似爛銀衣似錦相將白日上青天竇禹鈞有子五人俱登科馮道贈詩曰靈椿一株老仙桂五枝芳詩話集蛟龍得雲雨鵰鶚在秋天攀桂仰天髙有喜留攀桂變化有鵾鵬龍門客又新青雲動髙興勲業青㝠上甫昔少年日早充觀國賔天老書題目春官驗討論倚風遺鵬路隨水到龍門杜詩佳句衆喧口考功敢瑕疪連年收科第若摘頷下髭二十五而擢第於春官韓文歸去惟將新誥牒後來爭取舊衣裳張籍三春省壁鶯遷榜一字天津馬渡橋劉夢得湘中才子是劉郎望在長沙住桂陽昨日鴻都新上第五陵年少讓清光贈劉景朝衣歸來晝錦榮登科記上更無兄贈勝庶子何處春深好春深唱第家名傳一紙榜興管九衢花春風得意馬蹄疾一日看盡長安花孟郊長樂遙聴上苑鍾彩衣稱慶桂香濃李義山花錦文章開四面天人科第正三頭文苑英華今央取科者交貴勢倚親戚合則插羽翮生風濤沛然而有餘栁文本朝太祖幸西都張齊賢獻十策帝歸謂太宗曰吾幸西都為汝得一張齊賢宰相也太宗即位齊賢方赴廷試帝欲其居上第有司置於丙科帝不恱有㫖一榜盡除京官通判齊賢通判衡州不十年位宰相聞見録淳化三年賜楊億進士及第億時年十三讀書袐閣作東西京賦太宗覽而喜之詔舉士院試舒州進甘露頌即時而就帝益賞其俊才故有是命端拱二年劉少逸年十三中禮部之選㑹要國初猶襲唐士子皆曳袍重戴出則席帽自隨李選累舉不第鄉人曰李秀才不知甚時席帽離身及第後乃遺鄉人詩曰當年蹤跡困泥塵不意乗時亦化鱗為報鄉閭親戚道如今席帽已離身張師錫年八十餘喜子及第詩云御榜今朝至見名心始安爾能俱中第吾遂可休官賀客留連飲家書反覆看世科雖不繼得慰二親難雜記艾預赴鄉舉遇一村儒謂之曰君此行登第矣吾有書一卷授君乃左傳第十也曰宜熟讀取富貴後四十年亦有人因此書登甲科然齡禄俱不及君記之艾頗為異時復諷誦李㑹愚知舉試鑄鼎象物賦事在卷中一揮而就擢甲科後四十年御試此題徐奭為狀元艾後以户部侍郎致仕年七十八徐四十為翰林學士卒澠水燕談慶歴五年仁宗臨軒賜進士第祝諫侍庭中男唐次諮季許及二壻皆擢第每唱一名祝即稱謝是日諫五拜殿下仁宗賞之嘉祐二年歐陽永叔知舉曽子固兄弟四人同登科周師厚在鄭獬榜及第只壓得陳傳自賦詩云有眼不堪看鄭獬囘頭猶喜得陳傳紹興丙午正奏名第一人王十朋特奏名第一人李三錫時宗室子居綴榜尾不樂或以詩戲之曰舉頭不敢窺王十伸脚猶能踏李三閒思蓬㠀㑹神仙二百同年最少年利市襴衫挑白紵風流名字冩紅牋王元之青雲隨步登華榻紅雪飄香入杏園宋定國文甲第叨薦名髙飛便淩煙遂使拜扆坐果得超神仙蘇易簡雲龍山下試春衣放鶴亭前送夕暉一色杏花紅十里新郎君去馬如飛東坡囊空不辨尋春馬服亂行看擇壻車黄帕開封出奏篇銀袍二百玉階前威顔咫尺瞻衮扆名姓傳呼下九天宫筆旋題黄甲字禁門已蔟杏花韉蔡特正洎春闈之較藝云叨陞以策名六集三元及第本朝王曽青州發解及南省廷試皆為首冠中山劉子儀為翰林學士戲語之曰狀元試三塲一生喫着不盡沂公正色答曰曽平生之志不在溫飽東軒筆記馮京自鄉選至廷對俱策名第一張堯佐倚外戚欲妻以女使擁入其家示以奩具甚厚京不肯就馮京預鄉薦至大江波濤洶湧㡬至沉沒來春南省廷試為第一復過大江風微浪穏公題詩云江神也世情為我風色好雲霽廣録狀元及第傳記李固言未第前行古栁下聞有彈指聲固言問之應曰吾栁神九烈君已用栁汁染子衣矣果得藍袍當以棗餻祠我固言許之未㡬狀元及第三峯集李固言下第遇一老姥言郎君當芙蓉鏡下及第明年果狀元及第詩賦有人鏡芙蓉之目裴思謙狀元及第作紅牋名紙十數詣平康里因留宿賦詩曰銀缸斜背解鳴璫小語偷聲賀玉郎從此不知蘭麝貴夜來新惹桂枝香摭言孫渥夢積木數百踐其上自謂必作狀元居衆材之上已而果然雜爼盧肇黄頗皆宜春人同舉郡守獨餞頗明年肇狀元及第歸郡守㑹肇觀競渡肇即席作詩云報道是龍君不信果然奪得錦標歸太守大慙詩話李翺牧江淮郡進士盧儲投卷來謁李禮待之置文卷几案間長女及筓見文謂小青衣曰此人必作狀元李公聞之乃覔為壻來年果狀元及第遂成佳姻詩曰昔年曽去玉京遊第一仙人許狀頭今日已成秦晉約果教鸞鳳下粧樓南部新書集春來無處不閒行楚國相看别有情好是五更殘酒醒耳邊聞喚狀元聲鄭谷本朝狀元年三十以下者王拱辰汪應辰年十八沈遘莫儔年二十二梁顥張孝祥王佐皆二十三楊訪蘇易簡宋待問皆二十四王曽王堯臣張唐卿賈黯彭汝礪衛徑皆二十五何㮚趙汝愚皆二十七蔡齊宋祥馮京楊寘姚穎王昻皆二十九陳堯叟張觀詹騤許奕皆年三十建隆以來狀元大拜者七人吕䝉正王曽李迪宋庠何㮚梁克家趙汝愚是也近年吳潛亦以状元大拜執政十一人楊礪王嗣宗蘇易簡陳堯叟張觀蔡齊王堯臣馮京許將陳誠之鄭僑是也節度使二人陳堯咨王拱辰是也外此則何文縝自登第至大拜十二年梁克家自登第至大拜十三年吕䝉正丁丑榜癸未年參政凡七年董徳元丁夘榜甲戌年參政凡八年梁克家庚辰榜己丑年簽書凡十年何㮚自及第至給事中凡二年蘇易簡霍端友自及第至知制誥凡四年陳堯咨自及第至知制誥凡五年秦伯陽以右通直郎登第二年而禮部侍郎三年而知樞宻院事並朝野雜記太宗朝王嗣宗與趙昌言爭狀元於殿前乃命二人手搏約勝者與之昌言髮秃嗣宗敺其幞頭墜地趍前曰臣勝矣上笑以嗣宗為狀元記聞真宗東封放梁固以下進士及第祀后土于汾隂放張師徳以下進士及第固狀元梁灝子師徳亦狀元張去華子魏野以詩賀曰封禪汾隂連嵗榜狀元俱是狀元兒真宗臨軒策士夜夢殿下有菜一苗與殿基相髙及拆第一卷乃蔡齊上曰得人矣詔金吾給衛士七人清道尋命今後第一人及第令給七人當直許出入則兩對引喝傳呼狀元始於此也東齊遺事咸平元年二年皆放進士舉孫僅孫暨相繼魁天下百姓皆以大狀元小狀元呼之嘉祐八年許將治平四年許世安時謂大許小許王黄州覽孫僅文篇書其後曰明年再就堯階試應被人呼小狀元僅果第一王黄州後以詩寄之曰病中何事忽開顔記得時稱小狀元粉壁每題龍虎榜錦標終屬鶺鴒原澠水燕談宋郊兄弟同行逢一異僧相曰小宋當大魁天下大宋亦不失甲科後十年大宋復遇諸塗僧乃大驚曰公風神特異如此豈活數萬命者乎宋良乆曰比堂有蟻穴忽為大雨所浸某尋編竹為橋以渡豈此是也僧曰必是也小宋合當首魁公終不出其下比唱第小宋果大魁章獻乃謂弟不可以先兄因命大宋為第一小宋為第十胡旦有俊才甞曰應舉不作狀元仕宦不為宰相乃虛生也及隨計之秋適坐中聞鴈乃題詩曰明年春色裏領取一行歸果魁天下吕文穆公未第時薄逰一縣時胡旦隨其父宰是邑遇吕甚薄客有喻胡曰吕公能詩宜少加禮胡問警句客舉詩曰挑盡寒燈不成夢胡笑曰乃一渴睡漢耳吕甚恨而去明年首中甲科寄聲於胡曰渴睡漢狀元及第矣胡曰待我明年第一人及第輸君一籌既而次榜亦中首選文穆公蒙正也歸田録王拱辰與歐公同年進士文忠自監元省元赴廷試銳意魁天下明日當唱名備新衣一襲拱辰輒先衣以入文忠怪焉拱辰笑曰為狀元者當衣此唱名果第一邵氏後録皇祐五年廷試進士前一日取首選卷焚香祝之曰願得忠孝狀元洎唱名乃鄭獬也故鄭謝啓云何以副上心忠孝之求是也麈史蔡嶷崇寧五年廷試第一上甚喜其文以御寶封試卷付國子監頒示四方李迪夢被人剃削髭髯俱盡心惡之解者曰必為狀元縁今嵗省元是劉滋已替滋矣果狀元及第鄭僑夢空中一梯雲氣圍繞俄登之及髙層仰面則有大石蒼然正懼壓已忽冉冉升立于石上驚覺自喜既而為天下第一其次曰石起宗先是考官編排石君當居上臨唱名始易之云容齋隨筆嘉祐末京師傳王俊民為狀元及御試王荆公楊樂道為詳定官荆公以覆考官所定第一人未當别取一人樂道不可遂各以已意進稟詔從荆公之請發卷乃王俊民也筆談黄冕仲常有魁天下之志元豐四年南劍州譙門一柱忽為迅雷所擊冕仲占成四句云風雷昨夜破枯株借問天工有意無莫是卧龍縦跡困放開頭角入雲衢次年對策為天下第一王沂公與李文定公連榜取殿魁又相繼秉鈞軸詳見職官部宰相類元豐八年禮部貢院夜火其後别試焦蹈為魁諺云不因南省火安得狀元焦梁灝年八十二雍熙二年狀元及第謝啓曰白首窮經少伏生之八嵗青雲得路多太公之二年後終祕書監卒年九十餘遯齋閒覽果先羣彦榮中甲科六一集昔者處貧賤之辱所有無以果於今日朝居豪傑之先而入然後知其貴坡集擢冠掄魁益公集三年而奉詔策固南宫進士之所同一朝而冠儒科蓋東閤郎君之未有汪藻賀秦相前名及第傳記李慶顯徳中舉進士工詩有云醉輕浮世事老重故鄉人樞宻王朴以此一聮薦於知舉遂為第三人玉壺清活孟賔于與李昉同擢第後昉寄賔于詩曰初攜寶劍别湘潭金榜標名第十三昔日聲名喧洛下只今詩句滿江南江南野史選年最少者三人為探花使世謂之探花郎東軒筆録本朝胥偃應舉時夢徐將軍斬下頭項作詩云昔作樹頭花今為塜中骨以為不祥明年徐奭榜第二人及第南郡新書劉沆赴省夢被人砍落頭甚惡之人解曰狀元不到你只得第二人公詰曰雖斫却頭留項在裏項沆劉留同音果第二人及第青箱雜記天聖五年試進士韓魏公名在第二時唱名第一甲方終太史奏五色雲見家傳李昌武宗諤之子昭遘十八嵗鎖㕔及第昭遘子杲卿子士㢘皆不逾是嵗登甲科凡三世俱為探花郎揮麈録張文景以古文馳名第四人登第不厭所望有詩云驚天動地張文景只得南宫第四人續歸田録袁郭初應舉夢立北斗下果第七人及第同上醼集史大中初敕自今放進士牓後杏園仍舊宴集唐書傳記宴名有九一曰大相識主司在具慶者二曰次相識主司在偏侍者三曰小相識主司有兄弟者四曰聞喜敕下宴五曰櫻桃六曰月燈七曰牡丹八曰看佛牙九曰闗宴最大即離筵者新進士尤重櫻桃宴櫻桃之熟和以糖酪摭言進士榜出便往期集院狀元請一人為録事其餘主宴主酒主樂探花主茶之類主樂兩人一人主飲妓放榜後大科頭兩人第一部也小科頭一人第二部也常宴小科頭主之大宴大科頭主之唐進士命宴曲江崔彖不赴乃以雕幰載妓遊觀為團司所發崔沆為主罰録事判云深攙席帽宻映氈車紫陌尋春便隔同年之面青雲得路可知異日之心曲江亭子燼於兵火唯尚書省亭獨存進士開醼常寄其間既徹饌則移樂泛舟其日公卿家傾城縦觀於此東榻之選者十八九鈿車珠瑛櫛比而至並同上進士杏園初㑹謂之探花宴以少後二人為探花使徧遊名園若他人先折得名花則二人被罰秦中記士人初登第必展歡宴謂之燒尾說者云虎化為人惟尾不化須得燒去乃化又説新羊入羣羊抵觸須燒其尾乃定又說魚躍龍門化為龍時必雷為燒其尾乃得化聞見録本朝太宗好文每進士及第賜聞喜宴御製詩遂為故事仁宗時詩尤多古今詩話溫公曰吾性不喜華靡二十忝科名聞喜宴獨不簪花同年曰君賜不可違也乃簪一花家傳唐進士開宴曲江亭既徹饌移樂泛舟又有燈閣打毬之㑹故東坡有曲江船舫月燈毬之句詩話題名史唐有曲江㑹題名席李徳裕奏罷之唐書傳記唐進士自神龍以來杏園宴後皆於慈恩寺塔題名他時有將相則朱書之或未及第時題名字添前進士國史補特科子大器晩成老子史馬援兄況謂援曰汝大器當晩成初平四年試儒生四十餘人上第賜位即中次太子舍人下第者罷之詔曰今耆儒年踰六十去離本土結髮入學白首空歸長委農野永絶榮望朕甚愍之其依科罷者聴為太子舎人後漢書傳記天復元年杜徳祥牓放曹松王希羽劉象柯崇鄭希顔等及第時上新平内難特敕授官松希羽皆七十餘象崇希顔亦年踰耳順時謂五老榜摭言本朝開寶三年詔曰禮闈籍到十五年以上貢士司馬浦等一百六人皆困頓風塵老倒塲屋學固不講業亦難專非以特恩終成瑕器宜各賜本科出身後不為例㑹要景徳元年詔曽經先朝御試及後來殿試進士二舉之科五舉幷進士五舉幷年五十以上諸科六舉六十以上者雖試不合格特許别作一甲奏名天聖二年上新放進士及第是月授六舉進士八舉諸科李宗道等百二十八人諸州司士參軍試將作監主簿等上曰此雖所試非熟然白首無成困於塲屋殊可矜憫並同上至和間富公當國立一舉三十年推恩之法蓋公與段希元魏升平同塲屋相善公作相不欲私之故為天下制至今行之聞見録恩榜得官之人在於州縣例皆垂老别無進望惟望黷貨以為歸計貪冒不職十人而九朝廷所放恩榜㡬千人矣何曽見一人能自奮勵有聞於時而殘民敗官者不可勝數以此知其無益不言可知東坡冗官議特奏名第一等二名附前五甲餘並登仕郎第二等京府助教第三等上州文學第四等下州文學並郊第五等諸州助教官品白髮青衫晩得官瓊林頓覺酒腸寛平康夜過無人問留得宫花醒後看特奏状元徐遹詩下第史匡衡數射策不中至九乃中丙科漢書徳宗試賢良方正科畢詔曰昔公孫𢎞猶聞十上失之正鵠合反諸身凡為多士各宜自勉唐書潭州判官皇甫鎮舉進士二十三上不中第刺史李詢辟之通鑑傳記梁試進士不中程者飲以墨水坡詩注張鷟號青錢學士謂萬選萬中時有董方九舉不第號白蠟明經與鷟為對僉載唐制進士科甚重其老死文塲者亦無恨故有詩云太宗皇帝真長策賺得英雄盡白頭國史補進士不第者親知供酒肉費號買春錢承平舊纂打眊燥詳見及第類髙蟾未第有詩云天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上不向東風怨未開令狐楚録張祜詩三百首表薦之值元稹在内庭上問祜詩髙下稹曰張祜雕蟲小巧恐變陛下風雅由是失意祜以詩自悼云賀知章口徒勞說孟浩然身更不疑張濆陳商下狀元及第翰林覆落趙嘏以詩貽之曰莫向春風訴酒杯謫仙真个是仙材猶堪與世為祥瑞曽到蓬山頂上來摭言沈彬甞夢著錦衣貼月飛識者謂身不入月不中第果然曹鄴未第時詩云一辭岩桂叢九泣都門月年年孟春至看花不如雪雅言參述唐士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣云舊室危巢泥已落今年故向社前歸連雲大厦無栖處更傍誰家門户飛雲溪友議盧仝不及第出都投逆旅有一人附火吟曰學織錦綾功未多亂投機杼錯抛梭莫教宫錦行家見把似文章笑殺他因問之云舊𨽻宫錦坊近以薄技投本行云如今花様不同且東歸也盧氏雜記潘賁每至廷試以疾不能終塲故五舉猶為白丁既入京師復應三舉不第甞與故舊書曰三叨試殿八對天顔疾作謂人曰八舉進士而不登一第天命也江南野史馮藻應二十五舉姻親勸合罷舉求官藻曰譬如一生無成更應武舉北夢鎖言集舊穿楊葉直自知暫蹶霜蹄未為失杜詩棄置復棄置情如刀劍傷孟郊兩度長安陌空將淚見花同上氣味如中酒情懐似别人唐人不第詩六載辛勤九陌中却尋岐路五湖東名慙桂苑一枝緑膾憶松江滿筯紅浮世到頭湏適性男兒何必盡成功唯應鮑叔深知我他日蒲㠶百尺風羅隱翰苑何時休嫁女文章早晩罷生兒上林新桂年年發不許凡人折一枝胡曽本朝李才叔為東坡客坡知貢舉才叔下第詩有云平生謾說古戰塲過眼竟迷日五色詩話蜀人石楊休屢拔鄉薦常屈春官蜀人比之綱官蓋謂校部上共入京師只空歸也續歸田録劉昌言下第詩云唯有夜來蝴蝶夢翩翩飛入刺桐花青箱雜記千金弊箒誰人買半額蛾眉世所妍顧我自為都眊燥憐君欲鬬小嬋姢青雲豈易量他日黄菊猶應似去年醉裏未知誰得喪滿江風月不論錢東城一生不得文章力欲上青天未有因聖主不勞千里召嫦娥何惜一枝春鳳凰詔下須沾命豺虎叢中也立身啼得血流無落處朱衣騎馬是何人年去年來來去忙為他人嫁作衣裳仰天大笑出門去獨對春風舞一塲石曼卿下第集句曳白傳記苗晉卿典選御史中丞張倚男奭參選居其首𤣥宗乃集登科人於花萼樓前重試奭竟日不下一字時人謂之拽白上大怒貶倚敕曰庭闈之間不能訓子選調之際仍以託人天下以為戲談盧氏雜說唐策市鐵行有苑生卜舉人連中成敗每卦一縑榮陽鄭羣玉賷緡三千詣苑生苑喜於異禮卦成曰秀才萬全矣羣玉之氣益髙比入試以至繼燭乃步於庭曰吾今下筆一字不得鐵行苑生須一眷二十突明竟掣白而出乾撰字士人家小子弟忌用熨斗時把帛慮有曳白之嫌貽子録記纂淵海卷三十七
