body:
  text: 記纂淵海卷四十七宋潘自牧撰性行部私意經愛惡相攻易人莫知其子之惡大學互入昩於知子各親其親各子其子貨力為已以功為已禮記愛之欲其生惡之欲其死論語子兩喜必多溢美之言兩怒必多溢惡之言荘子伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多韓子鬻棺者欲民之疾病也畜粟者欲嵗之荒饑也淮南子人各是其所是非其所非揚子史同罪異罰左僖二十八年何必瘠魯以肥把襄公二十九年論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也司馬遷贊張湯居二千石所愛者撓法活之所憎者曲法滅之漢書託公報私杜欽傳所欲活則傅生議所欲陷則予死比通鑑漢宣紀所好則鑽皮出其毛羽所惡則洗垢求其瘢痕東漢趙壹傳或問倫有私乎對曰昔人有與千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往返而安寝吾子有疾雖不省視而竟夕不眠若是豈可謂無私乎第五倫傳互見無隠昔留侯以為髙祖悉用蕭曺故人郭汲亦議南陽多顯二十八將傳論陳夀父為馬謖參軍謖為諸葛亮所誅夀父亦坐髠諸葛瞻又輕夀夀為亮立傳云將畧非長無應敵之才言瞻惟工書名過其實議者以此少之晉書陳夀傳庾亮出居外鎮而執朝廷之權王導内不能平常遇西風塵起舉扇自蔽徐曰元規塵汙人王導傳宋元嘉時江東王謝諸族方盛北人晩度者朝廷悉以傖荒遇之雖復人才可施皆不得踐清塗通鑑宋紀崔浩曰文士褒貶多過其實南史宋髙祖紀毁譽由己憎惡任情北史李徳裕節制劎南西川吐蕃將悉怛謀以城降徳裕既得之即發兵以守且陳出師之利牛僧孺居中沮其功命返於虜徳裕終身以為恨唐書李徳裕傳又牛僧孺傳云羣臣請如李徳裕䇿又云時皆謂僧孺横議王洪義為侍御史於鄉里求𤓰𤓰主拒之洪義状言𤓰園有白兔縣官捕逐園苗盡矣唐酷吏傳不知仁義不分枉直惟利是嗜得賂則譽盜跖為賢良咈意則毁龔黄為貪暴能用傾巧之智搆成疑似之端通鑑唐憲宗武三思曰但於我善者則為善人於我惡者則為惡人耳唐書積忤生憎積順生愛唐睿宗紀情有愛憎憎者惟見其惡愛者止見其善唐魏徵傳李振舉進士不中深疾縉紳之士言於全忠曰此輩嘗自謂清流宜投之黄河永為濁流唐昭宗紀王福畤有子勔劇皆著才名福畤嘗詫韓思彦戯曰君有譽兒癖唐書孔循罵曰天下事一則任圜二則任圜圜乃何人五代史任圜傳傳記談經者惡聞服杜之嗤論史者憎言班馬之失史通劉禹錫謁李徳裕曰曽得白居易文集否徳裕曰吾於此人不足久矣其章何必覽焉北夢瑣言傅毅之於班固伯仲之間耳而固小之典論集人之情莫不欲耀其所能而黨其所近苟将得志則必快其所藴微之集曲木忌日影孟東野本朝小篆之法自秦李斯斯之相秦焚棄典籍遂欲滅先王之法而至已之所作則為萬世不可朽之計何其愚哉歐公集怒移水中蟹愛及屋上烏東坡私於家者隔牆樊而分比鄰私於己者隔形骸而分爾汝諸儒鳴道集廉潔子焉有君子而可以貨取乎一介不以取諸人孟子亷士重名荘子亷者常樂無求文中子史潔白而不受汙公羊荘二十四年注子罕曰我以不貪為寶左襄十三以不賄聞於諸侯昭公二十八年亷如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下史蘇秦傳秋毫無所犯淮隂傳終廣之身為二千石四十餘年家無餘財終不言家産事李廣傳廉士寡欲易足漢景帝紀志懐霜雪禰衡傳使馬如羊不以入廏使金如粟不以入懐漢質帝紀張奐劉寵為會稽太守召為將作大匠老叟齎百錢送寵寵為人選一大錢本傳孔奮在姑臧力行清潔為衆人所笑或以為身處脂膏不能以自潤被召奮無資單車就路本傳孟嘗遷合浦太守郡出珠寶先時宰守並多貪穢委人採求不知紀極珠漸徙於交趾郡界嘗到官革易前弊求民病利未踰嵗去珠復還本傳互見隂驅黙化東鄉君卒公私咸謂貨財宜歸二女田宅僮役應屬𢎞㣲一無所取宋太祖紀東鄉君者謝混妻𢎞微謝混之從子也楊震性亷子孫常蔬食歩行或令開産業震曰使後世稱為清白吏子孫以此遺之不亦厚乎東漢本傳互見貽後胡質薨無餘財惟有賜衣書箧而已魏志王衍口未嘗言錢晉書王衍傳崔洪口不言貨財手不執珠玉晉書本傳鄧攸為吳郡太守載米之郡不受俸禄惟飲吳水而已晉書清節為百城表南史樂法才甄彬常以一束苧向長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受曰五月披羊裘而負薪豈拾遺金者南史陳紀本傳别駕在官水火不與百姓交北史趙軌傳蘇瓊為清河太守郡人趙穎五月中得新𤓰一雙自来奉告請遂為留乃致於㕔事梁上人聞受趙穎𤓰欲貢新果聞𤓰猶在相顧而去本傳李勉為嶺南節度使居官久未嘗抆飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼盧奐宋璟李朝隠唐書裴寛義不以苞苴汙家有人以鹿為餉寛瘞之本傳杜暹為婺州參軍秩滿歸吏以紙贐之暹為受百番本傳盧懐慎薨家無餘蓄惟一老蒼頭請自鬻以辦喪事唐書盧本傳栁玭為嶺南節度副使廨中橘熟既食乃納直於官蕭倣為嶺南節度使家人病取槁梅於厨以和劑倣知趣市還之歴官有素絲之節居家無疋帛之餘並唐書傳記延陵季子適齊見路有遺金有披裘而薪者季子呼薪者取彼地金薪者曰吾當夏五月披裘而薪豈取金者哉吴越春秋胡威父質為荆州威自京都省之告歸臨辭賜其絹一疋為道路糧威曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳晉陽秋周鎮罷臨川丞相王導曰胡威之清何以過此世說厲飲冰之節白氏六帖亷者不受嗟来之食列女傳居家終始亷白祇入俸錢者雖歴大官亦無厚蓄以傳李翺作盧坦傳集食不媮而為飽兮衣不茍而為温楚辭互見端介清如玉壺氷鮑明逺詩千尋見底清李白集徹底心清水共虛江水秋正深清見萬丈底元稹公之北歸不載南物奴婢之籍不増一人韓文憂民亦似清吟苦守節還如未達貧方雄飛詩脂膏莫潤圭玉無瑕李義山文外示貞潔内含澄徹無染塵能保其素不納汙能全其潔比玉而白不為蠅㸃比月而明不為蟾缺劉長卿欲知清與潔明月在澄灣波澄水更清劉义氷壺照人鯁介絶倫唐文粹清越而瑕不自揜潔白而物莫能汙劉賓客脂膏有戒氷蘗自規李義山清能律貪夫白集本朝官清馬骨髙歐公詩話王質所至有氷蘗聲王質墓誌官清貧似舊欒城隋趙軌為齊州别駕文帝令入朝父老將送者各揮涕曰公清如水請酌一杯水奉餞續世說冦莱公歴富貴四十年無田宅園邸魏野獻詩曰有官居鼎鼐無地起樓臺湘山野録貪汙經具乃貝玉惟貨其吉書子非其有而取之者盜也孟子侵人自用謂之貪荘子貪者常憂不足文中子貪者難為恵譙子清訓互見無厭史臧哀伯曰官之失徳寵賂章也郜鼎在廟章孰甚焉左成二年羊舌鮒瀆貨無厭昭十三陳轅頗為司徒賦封曰以嫁公女有餘以為已大器哀十一汝專利而不厭互見無厭並左必以賄死國語趙良曰非其位而居之曰貪位非其名而有之曰貪名史商鞅傳貪如狼西漢項籍傳大臣有不亷曰簠簋不飭賈誼傳貪饕不閑義理禮樂志素無亷聲息夫躬傳貪夫徇財賈誼傳陳湯素貪所鹵獲財物入塞多不法通鑑漢元帝紀韋貽範為相多受人賂許以官既而以母憂罷去日為債家所譟唐書昭宗紀諸将多斷盜牢稟私自潤入皆以珍寶貨賂左右漢殤帝紀十囊五囊入棗郎晉愍帝紀陳夀作魏書或云丁儀丁廙有盛名於魏夀謂其子可覔千斛米當為尊公作佳傳丁不與之竟不為立傳本傳庾炳之無文學性彊急輕淺既居選部好詬詈賓客且多納貨賂見人有燭盤佳驢無不乞丐本傳鄧琬性鄙闇貪吝既執大權父子賣官鬻爵使婢僕出市道販賣宋太祖魏右衛將軍元暉與侍中盧昶皆有寵於魏主而貪縱時人謂之餓虎将軍飢鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千疋次郡下郡遞減其半餘官皆有等差選者謂之市曺梁武紀元修義為吏部尚書惟事貨賄官之大小皆有定價呼為京師白刧後魏書魏收納爾朱榮之子金減其惡而増其善北史宇文述貪鄙知人有珍異之物必求取之富商大賈皆恩接之呼之為兒隋書盧坦曰其能積財者必剥下以致如其子孫善守是天富不道之人也不若恣其不道以歸於人新唐書本傳王伾以納賄為事作大匱貯金帛夫婦寝其上通鑑互見貪迷平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給唐明宗桑維翰權勢既盛四方賂遺嵗積鉅萬五代史西京留守同平章事王守恩性貪鄙專事聚斂喪車非輸錢不得出城下至抒厠行丐之人不免課率或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返通鑑後漢隠帝集谿壑為之一罄川瀆為之中貧左太沖吳都賦交醻貨賂選孫皓書貪黷微財敢犯朝憲富已潤屋陳子昂集槖奸瀆貨司空表聖文儉約經節以制度不傷財不害民易慎乃儉徳書儉徳之恭也禮唐俗勤儉詩序史御孫曰儉徳之共也左荘二十四鄭叔段賦蟀蟋趙孟曰保家之主也襄公二十七年季文子無衣帛之妾無食粟之馬無藏金玉無重器備相三君矣而無私積襄公五年衣不兼采食不重味西漢朱家傳朱博不好酒色游宴自㣲賤至富貴食不重味本傳朕為天下守財豈得妄用之哉通鑑漢殤帝紀魏髙允兄弟惟草屋數間而被緼袍厨中鹽菜而已宋世祖長孫道生性清儉一熊皮鄣泥數十年不易宋太祖庾杲之清貧食惟有韮薤生韭雜菜任昉戯之曰誰為庾郎貧食常有二十七種言三九也齊書昔楊震趙咨等咸以薄塟知真識去身貴速朽耳夫厚塟之家流於俗以奢靡為孝令死者戮尸暴骸可不痛哉死者無知自同糞土豈煩奢塟死其有知神不在柩何用破貲徇侈乎吾亡斂以常服四時衣各一稱新唐書姚崇傳崔郾處庳陋至霖淖則容盖而屐以就外位盧懐慎門不施箔會風雨至舉席自鄣日晏設食蒸豆兩器菜數杯而已本傳本朝冦莱公寝處一青幃二十餘年時有破壊益命補葺有靳之笑答曰不忍處之久而以敝棄本傳互見念舊奢侈經怙侈滅義書子情所欲好耳所欲聽目所欲視口所欲嘗雖殊方徧國非土之所産育者無不致之猶藩牆之物也庖厨之下不絶煙火堂廡之上不絶聲樂列子史宫室崇侈左昭八侈惡之大也左荘二十四齊慶封獻車季武子美澤可以鑑左襄二十八侈將以其力斃左襄二十九治宅甲諸第前田蚡傳奢泰則下不遜而國貧西漢禮樂志互見僭冒以酒為池懸肉為林史記殷本紀春申君客三千餘人其上客皆躡珠履史本傳易傳曰上不儉下不節孽火燒其室通鑑魏明帝紀劉穆之性奢食必方丈旦輒為十人饌未嘗獨餐晉安帝紀何曽性奢豪每燕見不食大官所設食日萬錢猶曰無下筯處何邵驕奢簡貴亦有父風食必盡四時之珍異一日之供以錢二萬為限晉本傳石崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沈香汁有如厠者皆易新衣而出王敦傳劉寔嘗詣石崇家如厠見有絳紋帳裀褥甚麗兩婢持香囊寔便退笑謂崇誤入卿内崇曰是厠耳本傳石崇與貴戚王愷羊琇之徒以奢靡相尚愷以􅏁澳釡崇以蠟代薪愷作朱絲步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂石崇財産豐積室宇宏麗後房百數皆曳綺繡金翠絲竹盡當時之選庖膳窮水陸之珍本傳魏髙陽王雍一食直錢數萬李崇曰髙陽一食敵我千日通鑑梁武紀韋陟窮治饌羞擇膏腴地蓺穀苗以鳥羽擇米每視庖中所棄其直猶不減萬錢宴公侯家雖極水陸曽不下筯唐書本傳傳記楊國忠子弟上元夜各有千炬燭圍天寶遺事李徳裕奢侈每食一杯羮其費約錢三萬雜珠玉寶貝朱砂煎汁為之過三煎即棄其滓獨異志元載造芸輝堂芸草香也白如玉入土不朽為屑以塗壁設紫綃帳凝冬風不入盛夏自清涼唐蘇鶚蘇氏演義韓嫣好彈以金為丸一日所失者十餘長安為之語苦飢寒逐彈丸京師兒童毎聞嫣出彈輒隨之望丸所落便拾取焉西京雜記楊氏子弟暑月大氷琢山周圍宴席楊國忠冬月選婢妾肥大者列行於前令遮風謂之肉陣開元遺事集木衣綈繡土被朱紫張平子東京賦春衣一對直千金白侍郎山珍海錯棄藩籬烹犢炰羔如折葵韋應物首飾載千金一膳傾千家唐文粹忠鯁經王臣蹇蹇匪躬之故易子忠臣不諂其君荘子史韓信曰乗人之車者載人之患衣人之衣者懐人之憂食人之食者死人之事史本傳上所幸慎夫人在禁中嘗與皇后同席坐及坐郎署袁盎引却慎夫人坐曰陛下所以為慎夫人適所以禍之也通鑑漢紀忠臣不避重誅而直諫西漢主父偃傳忠臣蒙死而竭知宣帝紀獨有極言待死五行志忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何耶君臣義重有不得已也後漢何敞傅漢成帝欲御樓船薛廣徳諫言宜從橋陛下不聽臣臣自刎以血汚車輪本傳槐里令朱雲上書曰臣願賜尚方斬馬劎斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣廷辱師傅罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左将軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死争慶忌叩頭流血上意解然後得已通鑑漢成帝紀大司徒韓歆好直言無隠諱於上前證嵗将饑凶指天畫地言甚剛切通鑑漢光武紀衞覬上疏曰非破家為國殺身成君者誰能犯顔色觸忌諱建一言開一說也魏志崔洪清厲骨鯁好面折人過而退無後言通鑑晉武紀古弼入見魏主帝方與給事中劉樹圍棊志不在弼弼入侍坐良久不獲陳聞忽起捽樹頭掣下牀搏其背曰朝廷不治實爾之罪通鑑宋太祖上以舞胡安叱奴為散騎侍郎禮部尚書李綱諫曰古者樂工不與士齒雖賢如子野師襄皆終身繼世不易其業唯齊末封曺妙達為王安馬駒為開府有國家者以為殷鑒唐髙祖魏徵容貌不逾中人而有膽畧善回人主意每犯顔苦諫或逢上怒甚徵神色不移上亦為之霽威唐太宗褚遂良曰陛下必欲易皇后伏請妙擇天下令族何必欲武氏武氏經事先帝衆所共知天下耳目安可蔽也唐髙宗魏帝謂羣臣曰如髙允者乃真忠臣也朕有過未嘗不面言至有朕所不堪聞者允皆無所避朕聞其過而天下不知可不謂忠乎宋世祖額叩龍墀唐書劉栖楚徳宗欲遂相裴延齡陽城顯語曰延齡為相吾當取白麻壊之哭於廷帝不相延齡城力也陽城傳褚遂良鯁亮唐書本傳集悉心以諫極言無隠選䇿文正言不諱以危身選騷經氣藴逆鱗色形匪躬唐文粹守節没齒忠莫至焉選豪士賦序納忠為争臣之表盧景亮奏事如水赴壑栁文匡拂時病磨切貴近罔有顧慮知無不為杜牧之為負剛腸譽還追強項名張說諫舌切切上磨帝缺孫樵苦隳肝膽而言天下之事元微之忤英主之龍鱗蹈姦臣之虎尾唐張說宋璟遺愛碑本朝魯宗道為參政以忠鯁自任時人謂曰魚頭公盖以骨鯁目之聖宋掇遺諂諛經巧言令色便僻側媚書籧篨嘗觀人顔色而為之辭故不能俯戚施下人以色故不能仰也詩新臺注巧言令色鮮矣仁論語籧篨口柔也夸毗體柔也爾雅子脅肩諂笑病于夏畦閹然媚於世者是鄉原也孟子秦王有病召醫䑛痔者得車五乗希意導言謂之諂荘子不度理之所在而阿諛求容諂莫甚焉孔叢子以不善先人者謂之諂以不善和人者謂之諛荀子史楚析父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲左昭十二陳勝起山東二世召諸生問叔孫通曰此特羣盗狗偷䑕竊耳何足置之齒牙間郡守尉今捕論何足憂史本傳卑疪而前纎趨而言日者傳非有材能徒以婉佞貴幸佞幸傳衞侯言計非是而羣臣和者如出一口夫不察事之是非而恱人讚已闇莫甚焉不度理之所在而阿諛求容諂莫甚焉通鑑周紀互見阿䛕黄霸為相鶡雀飛丞相府霸以為神雀欲以聞西漢傳回面汙行以事諂諛之人鄒陽傳順㫖為邪平恩侯許伯入第丞相御史將軍中二千石皆賀長信少府檀長卿起舞為沐猴與狗鬬從諛承意以順上㫖宦媚邪臣欲以僥倖翟方進傳司馬長卿居茂陵未死時為一卷書曰有使来求書奏之其遺札書言封禪事司馬相如傳卑身賤體說色微辭愉愉呴呴志士仁人不忍為也東方朔傳曲辭諂媚東漢潘岳與石崇諂事賈謐每候其出與崇輒望塵而拜晉潘岳傳司馬昭封晉王荀顗謂王祥曰相國尊重今日便當相帥而拜王祥傳有二孔雀自西苑飛集寶城朝堂前親衞校尉髙徳孺等十餘人見之奏以為鸞通鑑隋紀如脂如韋俯僂匍匐噉惡求媚䑛痔自親美言諂笑助其愉樂詐泣佞哀恤其喪紀盧思勞生論張昌宗以姿媚倖武后楊再思每曰人言六郎似蓮花非也正謂蓮花似六郎耳唐書楊再思傳唐明皇将幸東都而太廟屋壊姚崇曰此苻堅故殿也山有朽壤而崩木蠧而折理無足怪本傳太史令袁充表稱隋興以後晝日漸長景短日長振古希有是後百工作役並皆程課日長故也通鑑互觀顔面多不盡公唐太宗太常博士蕭楚材等以為豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕唐髙宗太子洗馬劉訥言嘗撰俳諧集以獻太子賢上謂侍臣曰朕嘗虛心求諫而竟無諫者何也李勣對曰陛下所為盡善羣臣無得而諫御醫沈髙璆得幸於太后懐義心愠是夕密燒天堂延及明堂劉承慶請輟朝停酺以答天譴太后将從之姚璹曰昔成周宣榭卜代愈隆漢武建章盛徳彌永唐武后楊再思為御史專以諂媚取容張同休戯再思曰楊内史面似髙麗再思欣然即翦紙帖巾反披紫袍為髙麗舞舉坐大笑宫中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下唐中宗薛謙光獻武后所製豫州鼎銘其末云上𤣥降鑒方建隆基以為上受命之符姚崇表賀請宣示史官頒示中外李適之性疎率李林甫常謂適之曰華山有金礦採之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脫適之由是束手矣唐書太清宫奏學士李琪見𤣥元皇帝乗紫雲告以國祚延昌唐𤣥宗上嘗謂佛言報應果為有無元載等以國家運祚靈長非宿植福業何以致之福業已定雖時有小灾終不能為害所以安史悖逆方熾而皆有子禍僕固懐恩稱兵内侮出門病死回紇吐蕃大舉深入不戰而退此皆非人力所及豈得言無報應也唐代宗李兼在江西有月進韋臯在西川有日進刺史進奉自兼始幕僚進奉自臯始唐徳宗上御延英問宰相曰天下何時當太平牛僧孺對曰太平無象今四夷不至交侵百姓不至流散雖非至理亦為小康陛下若别求太平非臣等所及唐文宗蝗自東而西蔽日所過赤地京兆尹楊知至奏蝗入京畿不食稼皆抱荆棘而死宰臣皆賀唐懿宗太史奏太陽應虧不虧姚崇表賀請書之史冊唐𤣥宗傳記談主上之聖明則君盡三五述宰相之英偉則臣皆二八史通集睮睮諛夫選風諫詩折枝䑛痔選絶交論吐言如傷屈體無骨梁張纘謝僕射表入門自媚駱賓王諂媚相與千顔一容元次山為人恵口而柔顔奴顔婢膝真乞丐陸龜蒙小人趨事必變顔色唐文粹本朝冦莱公為相丁謂出其門為參政會食都堂羮染公鬚謂起拂之遺事俯仰隨人如桔橰東坡詩中宗宴近臣祝欽明自請作八風舞摇頭轉目備諸醜態則天不豫令閻朝隠往少室山祈禱朝隠乃曲申恱媚以身為犧牲請代上所苦魏元忠疾卧諸御史盡往省之郭霸獨居後請視便液曰大夫糞味甘或不瘳今味苦當即愈矣蠖屈䑕伏佞辭泉湧續世說記纂淵海卷四十七
