body:
  text: 記纂淵海卷四十八宋潘自牧撰性行部阿附子為人臣見非不爭以陷主於危亡罪之大者也孔叢子史范宣子天子所右亦右之所左亦左之左傳張湯専阿主意主意所不欲因而毁之主意所欲因而舉之史汲黯傳淳于髠以承意觀色為務史本傳趙髙獻鹿謂之馬二世問左右此乃鹿也皆曰馬也史李斯傳大將軍以和柔自媚于上史衛青傳阿色人主與俱上下西漢酷吏傳杜周大抵放張湯善候伺専以人主意指為獄西漢本傳欲有所為惟見風采黨與承意而顯奏之西漢王莾耿育曰隨指阿從以求容媚通鑑本傳湯為人多詐舞智以御人時上方鄉文學湯陽浮慕事董仲舒公孫𢎞等即上意所欲罪與監史深禍者即上意所欲釋與監史輕平者谷永知鳳方見柄用隂欲自托並漢武帝紀張禹曰新學小生亂道誤人宜無信以經術斷之上雅信愛由此不疑王氏漢成帝紀上故令董賢私過孔光光警戒衣冠出門待望見賢至中門光入閤既下車乃出拜謁送迎甚謹不敢以賔客均敵之禮上聞之喜漢平帝紀胡廣遜言恭色以取媚於時無忠直之風天下以此薄之漢靈帝紀𢎞農太守良承樊豐等㫖遣吏於陜縣留停楊震喪露棺道側謫震諸子代郵行書道路皆為隕涕漢殤帝紀承望風㫖東漢孔融傳馬融懲於鄧氏不敢復違忤勢家遂為梁冀草奏誣李固又作大將軍西第頌頗為正直所羞班固為竇憲中䕶軍征匈奴與叅議及憲敗固死獄中並東漢本傳夏侯𤣥下廷尉鍾毓案治𤣥正色責毓曰吾將何罪卿為令吏責人也卿便為吾作毓以𤣥名士節髙不可屈而獄當竟夜為作辭令與事附流涕以示𤣥髙貴卿公王導每發言一坐莫不贊美晉王導傳上謂劉德願曰卿哭貴妃悲者當厚賞徳願應聲慟哭撫膺擗踊涕泗交流上甚悅故用豫州刺史以賞之上又令醫術人羊志哭貴妃志亦嗚咽極悲他人有問志卿那得此副急淚志曰我爾日自哭亡妾耳宋世祖徐爰便辟善事人巧於將迎始終無迹宋紀刀筆之吏順㫖承風舞文弄法曲成其罪唐太宗李勣入見上問之曰朕欲立武昭儀為后褚遂良固執以為不可遂良既顧命大臣故當且已乎對曰此陛下家事何必更問外人上意遂決許敬宗宣言於朝曰田舎翁多收十斛麥尚欲易婦況天子立后何豫諸人事而妄生異議乎唐髙祖侍御史傅遊藝帥關中百姓九百餘人詣闕上表請改國號曰周賜皇帝姓武氏太后不許擢遊藝為給事中唐武后周利用冉祖雍李俊宋之遜邵紹之皆為三思耳目時人謂之五狗唐中宗紀上官婕妤及後宫多立外第出入無節朝士徃徃從之遊處以求進幸安樂公主尤驕横宰相以下多出其門唐睿宗楊回譛太子瑛鄂王瑶光王琚云潜搆異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃決髙力士於西京作寳夀寺鍾成力士作齋以慶之舉朝畢集擊鍾一杵施錢百緡有求媚者至二十五杵錢不减其杵並唐𤣥宗太子通事舍人李渉知上於吐突承瓘恩遇未衰乃投匭上疏稱承瓘有功乆委腹心不宜遽棄唐憲宗李齊運甘言阿匿唐書馮道前事九君未嘗諫諍五代史集依阿無心選論屈節若四體之無骨潘安仁西征賦蘇舜欽監奏院因十月賽神㑹舘中同列御史劉元瑜彈繫下獄坐監主自盜削籍同㑹者皆坐斥劉謂時宰賈昌朝曰公一網打盡倦遊錄好諛經小人難事而易說也說之不以道說也語子與䜛諂靣䛕之人居國欲治可得乎孟史沈於諂䛕之辭栁陽傳衞侯言計非是而羣臣和者如出一口夫不察事之是非而悅人讚已闇莫甚焉不度理之所在而阿䛕取容諂莫甚焉周紀信椒蘭之唼音佞西漢譽䛕之聲日滿於耳虛美熏心實禍蔽塞路温舒傳信任親愛者盡佞諂容說之人也漢獻帝紀文中子曰見譽而喜者佞之媒隋紀以百口百心之䜛諂蔽兩耳之聰明茍非鐡腸石心安得不惑唐史臣𤣥宗贊集耳飽從䛕之説選序諸公貴人志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶韓文孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者上張建封書近者士大夫皆有僣侈無厭之心動輒欲人以周孔譽已自孟以下皆憮然不滿也東坡答李廌書氣槩經志氣塞乎天地不隕穫於貧賤不充詘於富貴並記衣敝緼袍與衣狐貉者立而不耻者其由也歟語子居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道古之賢士樂其道而忘人之勢故王公不致敬盡禮則不得亟見之夫志氣之帥也我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之間説大人則藐之勿視其巍巍然彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉志士不忘在溝壑並孟眡太行之險猶數仭之丘子華子志意修則驕富貴道義重則輕王公荀子堂髙數仭榱題數尺我得志弗為也食前方丈侍妾數百人般樂飲酒驅騁田獵後車千乗我得志弗為也孟子曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可與我友千乗之君求與之友而不可得也而況可召與並孟視三釡三千鍾如鸛雀蚊蝱相過乎前也莊子傍日月挾宇宙齊物論揮斥八極田子方項羽不學一藝韓信不營一飡劉子比崇髙於贅龐方萬物乎蟬翼抱樸子子髙遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頥子髙抗手髙揖而已其徒問之髙曰始吾謂二子丈夫耳乃今知其婦人也人豈鹿豕也哉而常羣聚乎孔叢超江淮以為尋常之溝淮南子子有四方之志左史常有大度不事家人生産作業秦紀豪傑吏聞沛令有客皆往賀蕭何為主進令諸大夫曰不滿千錢坐堂下髙祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢吾亦欲東耳安能欝欝乆居於此哉漢髙紀郭解以軀借交報仇游俠傳項籍學劒不成季父梁怒之籍曰劒一人敵不足學學萬人敵耳西漢本傳好倜儻大節朱文傳趙温曰大丈夫當雄飛安能雌伏東漢本傳簡易佚蕩揚雄傳許汜與劉備語曰陳元龍湖海之士豪氣不除汜過下邳見元龍無客主之意不相與語自上大床卧使客卧下床備曰今天下大亂須憂國忘家有救世之意乃求田問舎言無可采是元龍所諱也何縁當與君語如我自卧百尺樓上卧君於地下奚但上下床之間哉陳球傳後漢誅黨錮李膺杜宻等侍御史景毅子事膺事未在錄牒不預難毅曰本令主事膺是尊李公之道今遇難豈茍免乎遂自劾梁竦曰大丈夫居世生當封侯死當廟食並同上延岑曰男兒當死中求生可坐窮乎漢光武紀大丈夫處世當掃除天下安事一室陳蕃傳馬實曰幸生盛明之世免磚瓦之姿託為丈夫當建名千載不可為空生徒死之物穢天地之間謝承傳男兒要當死於邉野以馬革褁屍還𦵏耳何能卧床上在兒女子手中耶馬援傳班超家貧為官傭書嘗輟筆曰丈夫無他志畧猶當效傅介子張騫立功異域以取封侯安能乆事筆硯間乎左右笑之超曰小子安知壯士志哉東漢本傳鄧艾少家貧每見髙山大澤規度指畫軍營處所魏志任城王章謂左右曰大丈夫宜為衛霍將十萬騎馳沙漠驅戎狄立功建號爾何能作愽士耶同上蜀劉巴曰大丈夫當交四海英雄蜀志慨然有飲馬河洛之志諸葛亮傳秦王猛倜儻有大志不屑細務人皆輕之猛悠然自得聞桓温入關被褐詣之捫虱而談當世之務旁若無人晉書周顗曰今年殺賊奴王敦取金印如斗大繫肘晉書本傳勝氣籠霄韓伯傳論桓𤣥曰劉毅家無檐石之儲樗蒲一擲百萬晉書用宇宙而成心借風雲以為氣南史隱逸傳宗慤常言願乗長風破萬里浪宋紀曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拓弓絃作霹靂聲箭如餓鴟呌平澤中逐麞數肋射之渴飲其血饑食其肉甜如甘露漿覺耳後生風鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦比悒悒然使人氣盡南史齊書本傳裴横之為吳興太守嘆曰大丈夫富貴必作百幅被梁書輕天下細萬物北史隠逸序髙昻専事馳騁每言男兒當横行天下自取富貴誰能端坐讀書作愽士也同上李弼曰丈夫生世㑹須履鋒刃以取功名安能碌碌依階以取仕北史後周本傳李靖常曰丈夫遭遇要當以功名取富貴何至作章句儒唐書本傳丈夫意氣相期勿以小嫌介意吾終不信䜛言以害忠良唐髙祖紀馬燧曰丈夫當立功業聞四海渠老一儒哉唐書本傳史𢎞肇云安朝廷定禍亂直須長鎗大劍安用毛錐子五代史李泌少為詩曰天覆吾地載吾天地生吾有意無不然絶粒升天衢不然鳴珂遊帝都安能不貴又不去空作昻藏一丈夫李鄴侯家傳韓熈載舉進士投書李昇曰釣大鰲者不投取魚之餌㫁長鯨者焉用割雞之刀又云腰有劒而袖有槌口有舌而手有筆南唐遺事逢萌為縣亭長縣尉過迎拜問事尉去舉楯摘地嘆曰丈夫安能為人後耶遂去學問東觀漢紀集横四海兮焉窮楚辭雲中君髙志局四海左太沖詩何不䇿髙足行據要路津無為守窮賤轗軻長苦辛古詩長劒倚天外彎弓掛扶桑宋玉舉泰山以為肉傾東海以為酒曹子建詩狹六合而隘九州曹子建七啓謂旁若無人左太沖詠史註長嘯激清風志若無東吳同上吞若雲夢者八九於其胷中曽不蔕芥司馬子虛賦猶輕五車富未重一囊貧駱賓王非其道萬鍾不足豐也非其榮五鼎不足餘也陳子昻集丈夫四海志交頥非贈别之資駱賓王氛埃期必掃蚊蚋焉能當杜工部詩氣衝看劒匣頴脫撫錐囊丈夫四方志安可辭固窮安得覆八溟為君洗乾坤飲酣眠八極俗物都茫茫萬里雲霄一羽毛直氣横乾坤劉毅從來布衣願家無儋石輸百萬使君意氣凌青霄欲傾東海洗乾坤㑹當凌絶頂一覽衆山小倚賴天涯釣猶能掣巨鰲飲如長鯨吸百川衘盃樂聖稱世賢氣與嵩華敵赤霄有真骨恥飲洿池津冥冥任所往脫俗誰能馴歌笑輕波瀾氣衝星象表氣劘屈賈壘目短曹劉墻威鳳髙其翔長鯨吞九州並同上髙眠覺天卑元微之集因騎渡海鶻擬殺蔽天鵬一心吞渤澥戮力拔嵩華鋒鋩㫁犀兕波浪没蓬壺摩天氣直山曽拔並同上巨鰲莫載三山去我欲蓬萊頂上行李太白大鵬一日同風起摶摇直上九萬里假令風歇時下來猶能搊却滄溟水一繫九千仭相期凌紫氣倒海索明月呼吸走百川燕然可摧傾叱咤開帝業手成天地功雄心日千里欲上青天攬明月澄清洛陽水天地賭一擲長揖韓荆州陸愽爭雄好采來金盤一擲萬人開丈夫賭命報天子當斬樓蘭衣錦迴猛虎不堪几上肉洪鑪不鑄囊中錐並同上踔勵風發率常屈其坐人囊無一金資翻謂富者貧爛死於泥沙吾寜樂之若俛首帖耳摇尾而乞憐者非我之志也肝膽一古劒波濤兩浮萍擇肉於熊羆肯視兎與狸排雲呌閶闔披腹呈琅玕勁氣沮金石飲酒寜嫌琖底深題詩尚倚筆鋒勁並韓文千金散盡還復來李白獨立堂堂髙眂前古劉長卿自矜倚劒氣凌雲却笑聞笳淚如雨同上生當為大丈夫㫁羈羅出泥塗四散號呶俶擾無隅埋之深淵飄然上浮騎龍披青雲汎覽遊八區經太山絶大海一長吁西摩月鏡東弄日珠上括天之門直指帝所居皇甫湜我有一寸鈎欲釣千丈流天地入胷臆並孟郊胷吞百川流孟東野酒腸寛似海詩膽大如天劉義壯志吞鴻鵠孟浩然安得凌風翰肅肅賔天京髙論動侯伯疎懐脫塵喧並韋應物興來書自聖醉後語猶顛我有醉鄉劒玉鋒堪截雲入門下馬氣如虹氣如䖵蜺飲如建瓴並髙達夫一飲千鍾如建瓴杜牧之不看人面免低眉白樂天踏飜四海生塵埃有氣干斗牛並温飛卿江海豁開為氣岸嚴陵死後到李白布衣長揖萬乗君男兒重意氣百萬呵一擲並張承吉男子受恩須有地平生不受等閑恩男兒兩行淚不欲等閑垂並杜荀鶴賭取聲名不要錢擲盧誇使氣官薄傲公卿並劉賔客睡當一席寛覺乃千里窄姚合不以雄名䟽野賤唯將直氣折王侯王建詩丈夫非無淚不洒離别間仗劒對樽酒恥為游子顔蝮蛇一螫手壯志疾解腕所志在功名離别何足嘆陸龜蒙蓬萊頂上幹海水水盡到底㸔海空杜牧之坦腹對宰相岸幘揖天子皮日休五嶽為辭鋒四溟作胷臆同上豈欲皂櫪中爭飲籺與葭元次山弄河移砥柱吞日倚扶桑李義山氣蓋全吳胷吞大海唐尚馳撰諸葛亮碑氣蓋風雲張説撰宋璟碑嬰孩羣有唐程浩上天皷文須鑿燕然山上石登科記裏是閑名姚合就中愛讀英雄傳欲立功勲恐不如王建振衣生羽翰髙枕出塵埃吕和叔塊視三山杯觀五湖唐文粹悶向酒杯吞日月閑將詩句問乾坤杜荀鶴泰山一擲輕鴻毛古鐡倚天無處磨志磨青雲蓬視紫闥錙銖九有納隂山於寸眸拳大漢於一掌囊包天地渴飲四海並唐文粹㓜負四方之志家無一擲之資意氣所傾英豪共感司空表聖才大名髙乃富貴比金紫包愚癡歐公集酒酣氣振猶見鋒鍔同上意氣與日爭光輝挾才乗氣不媚柔並臨川集要將百篇詩一吐千丈氣東坡詩為君鑄作百鍊刀要斬長鯨為萬段吾豈羽毛為人所鷹安得萬頃池養此横海鸇麾斥八極隘九州眼髙四海空無人氣之所加則已大而物小於是乎受其至大而不為之驚納其至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之於天得之於不可知之間傑然有以蓋天下之人而出萬物之上上劉侍讀並東坡文誓將斬鯨鯢靜此滄海瀾子由詩王元之曰一回酒渴思吞海劉少逸曰幾度詩狂欲上天玉壺清話士生要𢎞毅天地為蓋軫志大略細謹並黄魯直詩酒如長虹飲滄海筆若駿馬馳平阪歐公集得錢百萬送酒家一笑不問今餘幾黄魯直安得壯士霍嫖姚縳取呼韓作編户王直方詩話酒腸天予渾無敵欒城集四大海水一口吞陳後山詩尚氣子不膚撓不目逃思以一毫挫於人若撻之於市朝惡聲至必反之並孟視泰山如彈丸抱朴子有死之榮無生之辱吳子史一飯之徳必償眦睚之怨必報史范雎傳丈夫生不五鼎食死即五鼎烹男子之所死者一言耳並主父偃傳薛宣為丞相朱雲往見之宣曰田野無事且留我東閣可以觀四海竒士雲曰小生欲相吏耶宣不復言朱雲傳大將軍青既尊黯與抗禮汲黯傳頡頏以傲世東方朔傳東方朔云如以臣言無可用則宜捐棄無空索長安之米西漢袁紹曰天下徤者豈惟董公引佩刀横揖徑出用氣自行多所陵折其敗宜也並東漢陳容曰仁義豈有常蹈之則君子背之則小人今日寜與臧洪同日死不與將軍同日而生也孔融負才髙氣志在靖難而才疎意廣訖無成功禰衡少有才名而尚氣剛傲孔融薦之於曹操並漢獻帝紀袁紹坐作聲價而輕死重氣怨惠必讎黨錮傳序太常种拂與李儒戰而死子劭徴為少府鴻臚皆不受曰我父盡忠於朝而為時所妬至以身殉國為賊臣所害為臣子不能除賊何面目復覲聖主張璠漢紀尚氣剛傲矯時慢物禰衡傳漢拜關公為將軍公聞黄忠為後將軍怒曰丈夫終不與老兵同列不肯拜三國志立氣勢作威福結私交以立彊於世者謂之遊俠西漢武帝紀卞延之為上虞令有剛氣㑹稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勲門而傲天下國士拂衣而去齊書䇿既被創醫言可治當好自將䕶百日勿動䇿引鏡自照謂左右曰面如此當可復建功立事乎推几大奮創皆分裂其夜卒吳志秦樊世謂王猛曰吾輩耕之君食之耶猛曰非徒使君耕之又將使君炊之晋紀蔡廓初召為吏部尚書與傅亮曰選事若悉以見付不然不能拜也亮以語録尚書徐羨之羨之曰黄散以下悉以委蔡自此以上宜共參同異廓曰我不能為徐干木書紙尾遂不拜同上殷羨為豫章太守都下人因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵殷浩傳劉琨與祖逖為友聞逖用曰吾常恐祖生先吾着鞭晉書吞胡虜無異口中搔虱王莾傳宋蕭惠開曰人生不得志與死人何異通鑑北齊元景曰丈夫寜可玉碎何能瓦全同上崔湜自比東晉王導謝安之家謂人曰吾之門及出身歴官未嘗不為第一丈夫當先據要路以制人豈能黙黙受制於人唐書崔儦每以讀書為務忽略世人大署其户曰不讀五千卷書者不得入此室隋書劉义持韓愈金數斤去曰此䛕墓中人得耳不若與劉君為夀愈不能止唐書髙恭之曰人生當夕脫羊裘朝佩珠玉後魏漢髙祖過陳留酈生求見上曰吾方以天下為事未暇見大儒酈生自言髙陽酒徒非儒者也楚漢春秋公孫瓚曰天下兵起我謂可唾掌而決九州春秋夏侯稱每讌氣陵一座世說苻堅議伐晉曰吾之衆投鞭於江足㫁其流吾當内㫁於心矣崔鴻前秦録性耐刀槊不堪鞭捶同上李元忠初謁齊髙歡未即見之謂門者曰公今方召英俊聞國士到不能吐哺輟洗其慢可知可還吾刺勿通也雞跖集皇甫湜為裴度作福先寺碑度約千緍酬之湜怒曰何相待之薄也某之文非常流之文也曽與顧況為序外未嘗輒許人其碑約三千字每字三疋絹今减五分錢不得裴令依數酬之湜受之無愧色舊唐書李稹嘗以爵位不如族望官至刺史與人書唯稱關西李稹李肇國史補生以辱不如死以榮大戴禮張祐謁李紳自稱釣巨鰲客李盛怒曰以何為竿曰以虹為竿以何為鈎以月為鈎以何為餌以短李為餌紳黙然厚贈之大唐遺事集重氣輕命感分遺身文選七啓雖死之日猶生之年庾元規表負材矜地自謂坐致雲霄劉孝標辨命論意氣之間靡軀不悔盧子諒書挽弓當挽強用箭須用長杜甫詩英心甘鬬死義肉耻庖宰罷出如棄涕唾無一分顧藉心居十日而不敢進謁者誠以左右無先為容也懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮並韓文野夫怒見不平事磨損胷中萬古刀義死天亦許利生天亦嗔並劉义人生須氣徤饑凍縳不得姚合不作浮萍生寜為藕花死杜牧之江東進士李飛赴吏部試吏大呼其名飛因袖手不出明日返江東同上伊昔臯澤之時亦有雲霄之志茍效用之得所雖殺身而何計張九齡文不欲曲肱安榖終兒女子手孫可之酒酣氣振求試自矜傍如無人中若有憑劉賔客輕生一劒知劉長卿一言知已重片義殺身輕同上可使寸寸折不能繞指柔唐文粹名盛氣髙少所卑下劉賔客千鈞之弩一發不中則當摧橦折牙永息機用安肯効碌碌者蘇而復上哉范傳正死辱片時痛生辱長年羞唐文粹唐進士張彖氣髙大未嘗低折於人嘗曰大丈夫有蓋世之志而拘於下位若立身矮屋中使擡頭不得遂拂衣遯於嵩山東坡書注慷慨史意豁如也常有大度不事家人生産作業西漢髙祖紀一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟袁盎傳細故芥蔕何足以疑賈誼傳大人者不牽小名以成大功西漢内無關鑰三國志蔣濟志節慷慨常有超越江湖吞吳㑹之志魏志張嘉貞性簡䟽與人不疑内曠如也唐詩本傳丈夫以氣自許小嫌不足寘胷中尉遲敬徳傳臧希讓骯髒好談時政代宗實錄並唐書王述為楊州刺史初至主簿請諱報曰亡祖先君名播海内逺近皆知内諱不出門餘無所諱晉書本傳集慷慨則氣成虹蜺文選顔公三十萬盡付酒家錢李白破産供酒錢盈門皆食客皇甫湜意氣相許駱賔王神傾意豁眞佳士杜甫詩心事犖犖開口一吐出胷中之竒韓文俸祿入門與其所過逢飲酒髙舞連日夜不厭或分挈以去一無所愛惜不為後日毫髮計留也鄭郡墓誌家散萬金酬士死身持一劒答君恩劉長卿襟韻苦超越杜牧之季布金諾延陵劔許其容温然而不修邉幅其中曠然而不施扄鐍並李義山氣將然諾重心向友朋開張說詩授舘不為他日計解衣眞出故人情後山李晟曰釋舊惡於酒杯之間續世說退縮集今日廷論局趣效轅下駒張晏曰俯頭於車轅下隨母而已西漢灌夫傳蓄縮不可用息夫躬傳縮首不出猶鼎鱉耳縮縮循墻兒並杜牧之勇敢經鷙蟲攫摶不程勇者引重鼎不程其力記衽金革死而不厭北方之強也中庸子子路曰由願得一隊而敵之必也攘地千里搴旗執馘惟由能之夫子曰勇哉家語勇士不忘喪其元孟子史齊國固入晉師曰欲勇者賈余餘勇左傳晉魏犨傷束胷見使者距躍三百曲踊三百僖二十八楚白公曰市南有熊宜僚者若得之可以當五百人矣哀十六年吳伐魯魯㣲虎欲宵攻王舍私屬徒七百人三踊於幕庭吳子聞之一夕三遷哀公八年勇士不避難史記勇士不怯死而滅名魯仲連傳燕國有勇士秦舞陽年十三殺人人不敢忤視荆軻傳趙毛遂至楚歴階而上楚王怒叱曰胡不下遂按劒而前曰王之所以叱遂者以楚國之衆也今十步之内王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也周紀項羽喑嗚叱咤千人皆廢西漢本傳瞋目張膽張耳傳梟俊禽敵西漢傅介子至樓蘭王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屛語壯士二人從後刺之通鑑豬突豨勇以為銳卒漢平帝紀操謂賈詡曰程昱之膽過於賁育矣漢獻帝紀袁紹遣其將顔良攻東郡關羽望見良麾蓋䇿馬刺良於萬衆之中斬其首而還紹軍莫能當者劉備明旦自來至趙雲營視昨戰處曰子龍一身都是膽也並同上關羽張飛萬人之敵蜀志本傳肝腦塗中原膏液潤草野而不辭也司馬相如傳勇者臨敵不悅生吳志蔡裔有勇氣聲若雷震嘗有三盜入室裔拊床一呼而盜俱隕晉書馬仙琕曰有前死一尺無却生一寸梁武紀韓長鸞瞋目張拳有噉人之勢陳紀髙開道有矢鏃在頰召醫取之乃鑿骨置褉其間骨裂寸餘竟出其鏃開道奏妓進膳不輟漢髙祖攘袂狥國天下風靡李光弼傳鼓行海内麾定四方唐書李靖傳集荆次非得寳劒渉江至中流有兩蛟夾繞其船次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劒而已遂攘臂却衣拔劒赴江刺蛟殺之而復上舟中之人皆獲全吕氏春秋勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣響動於天説苑義勇冠三軍李陵書威噞秋霜選左太沖魏賦威懾兕虎莫之敢伉張平子西京賦樊伉憤以巵酒咀彘肩以激揚潘安仁西征賦眥血下沾襟怒髮上衝冠盧子諒覽古詩鋒捍特起選檄趫材悍壯同上控劒叱咤八荒奔馳雷電之震虎豹之擊並陳子昻傳千里霧合一呼雲屯擁拔山超海之雄驅躍景騰霄之騎並駱賔王子雖軀幹小老氣横九州挺身艱難際張目眂冦讎杜詩吹噓而霜露變化叱咤而風塵消弭唐文粹掣開流電有輝光突過浮雲無定跡元稹名冠壯士籍元微之勢猛破堅摧剛排徤合檢有力經有力如虎執轡如組詩奡盪舟語子力能裂犀兕之革曵九牛之尾猶憾其弱觸不周山力折天柱絶地維並列千鈞之重烏獲舉之而輕多力耳千鈞之輕烏獲之力也並揚史犖有力焉能投蓋于稷門叔山冉摶人以投中車折軾齊髙固入晉師桀石以投人禽之而乗其車晉伐偪陽懸門發聊人紇抉之以出門者狄􅫧彌建大車之輪而蒙之以甲以為櫓左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也並左楚子期抉豫章以殺人注以效其多力豫章大木左惡來有力手裂虎兕秦紀朱亥力士袖四十斤鐡椎椎殺晉鄙周紀武力鼎士西漢鄒陽傳力扼虎李廣傳力拔山兮氣蓋世項籍傳大力扛鼎空手摶熊彘猛獸戾太子傳投石拔距絶於等倫甘延夀傳許褚勇力絶人漢末汝南賊萬餘人攻褚飛石擲之所值皆摧碎偽與賊和以牛與賊易食賊來取牛牛輒奔還褚乃出陣前一手逆曵牛尾行百餘步三國魏志本傳晉石䖍趫捷絶倫於獵圍中見猛獸被箭而伏石䖍因急往拔得一箭猛獸跳石䖍亦跳髙於猛獸猛獸伏復拔一箭以歸晉書秦淮南王苻生力舉千鈞手格猛獸走及奔馬擊刺騎射冠絶一時晉哀帝紀羊侃膂力絶人所用弓至二十石馬上用六石梁書蒼頭犀角大刀其鋒甚銳陳宣帝紀北齊事集奡能陸地行舟烏獲扛鼎舉千鈞並白帖批熊碎掌拉虎摧班文選七啓攫戾執猛納堅摧剛張平子南都賦迴天倒日之力力盪海而拔山選弔文力排南山李白梁甫吟握鈎伸鐡撫梁易柱皮日休鹿門隠書擊強如摧枯山谷力能抉關孔帖柔懦經巽在牀下喪其資斧易處巽之極過甚故曰巽在牀下也斧所以㫁者也過巽失正喪所以㫁愿而無立志詩序見義不為無勇也聞義不能徙不善不能改並語子夏首之南有人曰涓濁梁愚而善畏明月而宵行俯見其影以為伏鬼仰見其髮以為立魅匍踣而走比至其家失氣而死孫卿子怯者夜見立表以為鬼見寢石以為兕淮南子昔徐偃王軟而國滅齊簡公懦而身亡此性柔之失也劉子怯者得馮婦之刀㦸不能以格兕虎也抱朴子史畏首畏尾身其餘幾臧孫見齊侯曰抑君似鼠夫鼠晝伏而夜動不穴於寢廟畏人故也並左脆弱易敗國語選愞師古曰怯不前之意也西漢柔和自守不能有所整裁漢殤帝紀民有百走退死之心而無一前鬭生之計漢靈帝紀桓温來朝或云欲誅王謝王坦之汗流沾衣倒執手版晉紀髙陽王隆曰温詳之徒皆白面儒生晉成帝紀帝弱顔不能諱帝自八年以後每夜眠中常驚悸云有賊令數婦人摇撫乃得睡隋煬帝紀董晉柔人多不能集事唐徳宗山人李唐見上上方抱㓜女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計如陛下之念公主也上澘然泣下然畏張皇后不敢詣西内唐肅宗武后得志専作威福上欲有所為動為后所制上不勝其忿宻召上官儀議之命儀草詔左右奔告于后后遽詣上自訴詔草猶在上羞縮不忍因紿之曰我初無此心皆上官儀教我唐髙宗趙宗儒怯懦不任事唐書本傳懦不更事緩急非可倚唐長孫無忌傳安樂公主恃寵驕恣賣官鬻獄勢傾朝野或自為制敕掩其文令上署之上笑而從之竟不視也唐中宗紀士聞鉦鼓聲皆禠氣不能授甲唐書張介然傳徐温曰一崔太初不能制如他人何唐昭宗紀疾走惡跡掩耳畏聲朱敬則危武帝論集任將力薄駑孱思怯如蝟見鵲不敢拒格焦贛易林柔情易遷孔帖果決經夬決也剛決柔也易乃有顛越不恭我乃劓殄滅之無遺育無俾易種于兹新邑惟克果㫁乃罔後艱並書片言可以折獄者其由也與子路無宿諾語史吳在蔡蔡必速飛去吳所以剪其翼也韓吳蔡大夫左去疾莫如盡左哀十衛􅀈欲變法言於秦孝公曰夫民不可與慮始而可與樂成論至徳者不和於俗成大功者不謀於衆毛遂曰利害兩言而決耳並周紀子嬰與其子二人謀曰丞相髙殺二世望夷宫恐羣臣誅乃詐以義立我今使我齋見廟此欲因廟中殺我我稱疾不行丞相必來來則殺之髙使人請子嬰數輩子嬰不行髙果自往曰宗廟重事王奈何不行子嬰子刺殺髙於齋宫秦紀讀秦紀至於子嬰車裂趙髙未嘗不徤其決史記秦始皇本紀㫁決敢行鬼神避之史李斯傳操刀必割賈誼䟽決㫁狐疑分别猶豫劉向傳趙廣漢見事風生無所迴避率多果敢之計莫為持難漢皇帝紀孟賁之狐疑不如童子之必至西漢蒯通傳決者智之君也馮衍傳得䇿輒行應變無窮漢獻帝紀惟坐待亡孰與伐之蜀志諸葛亮後出師表王敦嘗昏淫於色左右諫之敦曰此甚易耳乃開後閤驅諸妾數十人並放出之晉書本傳苻堅曰築室道旁無時可成吾當内㫁於心耳晉成帝紀吐突承璀修安國寺奏立聖徳碑髙大一準華嶽碑先構碑樓李綘上言承璀適在旁上命拽倒碑樓承璀言甚大不可拽請徐毁撤冀得延引乗間再論上厲聲曰多用牛拽之承璀乃不敢言凡用百牛拽之乃倒唐憲宗集削株掘根無與禍隣戰國䇿如風行雨施有往而無返也白傅集摸稜子鄧析操兩可之說列子力命史灌夫首鼠兩端灌夫傳韓安國曰魏其言是丞相言亦是同上公孫𢎞每朝㑹議開陳其端使人主自擇不肯面折廷諍漢武帝紀蘇味道為相嘗謂人曰決事不欲明白誤則有悔摸稜持兩端可也故世號曰摸稜手唐書本傳李豐依違二公之間選畧足下旁通多可選嵇康絶交書猶豫無斷經蓄疑敗謀書猶如麂音几善登木爾雅齊陳乞曰需事之下也齊子行曰需事之賊也並左史狐疑猶豫後必有悔史李斯傳疑者事之害也漢秦紀牽制文義優游不㫁孝元贊當㫁不㫁反受其亂霍光傳知之而決弗敢行者百事之禍也故猛虎之猶豫不如蠭蠆之致螫孟賁之狐疑不如童子之必至蒯通傳行之有疑禍如發矢淮南王傳依違連嵗不決事之害也孔光傳酈食其説齊王曰項氏為人忌刻印刓而不能授西漢本傳文義所牽制故不能㫁決元帝紀執狐疑之心者來䜛賊之口持不㫁之意者開羣枉之門劉向傳疑者事之役也東漢馮衍傳猶豫未決故事乆不發竇武傳桓𤣥曰殷仲堪為人無決嘗懐成敗之計晉安帝紀計慮回惑自無所成齊東昏王陸侯曰諸君不見毒蛇乎不㫁其首猶能為害宋太祖紀集猶則多豫狐則多疑易林心猶豫而狐疑欲自適而不可楚辭猶如麂性多疑慮常居山中忽聞有聲即恐人來害之每豫上樹乆乆無度復下須臾復上如此非一故不決者稱猶豫焉文選曹子建洛神賦注髙誼經凡民有喪匍匐救之詩越石父凍餓為人臣僕三年矣晏子解左驂贖之晏子春秋魯朱家所藏活豪士以百數其餘庸人不可勝言然終不伐其能飲其徳諸所常施惟恐見之賑之不贍先從貧賤起専趨人之急甚已之私史游俠傳且緩急人所有夫一旦有急叩門不以親為解不已在亡為辭天下所望者獨季心劇孟耳史袁盎傳魏齊窮抵虞卿棄相印與魏齊偕亡至魏通鑑周紀以公子之髙誼能急人之困也同上趙午等謀反覺詔捕趙王及羣臣趙有敢隨王罪三族惟田叔孟野等十餘人赭衣自髠鉗隨王至長安趙王敖事白得出白明也西漢田叔傳趙相虞卿棄國捐君以周窮交魏齊之厄信陵無忌竊符矯命戮將専師以赴平原之急漢武帝紀樓䕶有故人吕公無子歸䕶託身䕶與吕公妻及吕嫗同食䕶妻子頗厭吕公䕶聞之流涕責子曰吕公以窮老付託於我義所當奉遂養吕公終身西漢張儉為中常侍侯覽所怨刋章捕儉與孔融兄褒有舊亡抵於褒不遇融曰兄雖在外吾獨不能為君主乎因留舎之後事泄收褒融送獄二人未知所坐融曰保納舎藏者融也當坐之褒曰彼來求我非弟之故請甘坐其吏問其母母曰家事任長妾當其辜一門爭死詔竟坐褒孔融傳朱震收葬陳蕃尸匿其子逸事覺繫獄合門桎梏震受考掠誓死不言逸由是得免漢靈帝紀馬援曰杜季良好義憂人之憂樂人之樂馬援傳度尚八人世謂八厨言能以財救人者也黨錮傳序陳重在郎署有郎負息錢數十萬債主日至煎求無已重乃宻以錢代還謝承東漢書太史慈母謂慈曰汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊時慈避事之遼東三國吳志魯肅散財甚得鄉邑忻心周瑜求糧肅家有兩囷米各三千斛肅乃指一囷與瑜同上范叔孫周窮濟急鄉曲貴其義行無有呼其名者宋書集髙義驅今古老杜人以義來我以心許褰裳赴急不避寒暑栁文振髙義於流俗之外合大度於古人之中同上中山劉夢得禹錫在遣中當詣播州子厚泣曰播州非人居而夢得親在吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜䟽願以柳易播雖重得罪死不恨適有以夢得事白上者夢得於是改刺連州韓文栁子厚墓志銘范仲淹以言事貶方治黨人甚急公獨扶病率子弟餞于東門留連數日大臣有以讓公曰何苦自陷朋黨公曰范公天下賢者某何敢望之若得為黨人公之賜某厚矣歐公撰士質墓志范仲淹貶饒州諫官不肯言尹師魯上書言仲淹臣之師友願得俱貶歐公撰尹師魯墓志睦族經惇叙九族書以親九族九族既睦堯典尊祖故敬宗敬宗所以尊祖禰也記君子篤於親語史孔奮篤於骨肉漢記集畢諴既貴所得俸禄養䕶宗屬之乏無間韋繩撫養宗屬孤㓜無異情並六帖范文正公曰富貴而不恤宗族異日何以見祖宗於地下情愛經夫知保抱攜持厥婦子書嫁女之家三夜不息燭思相離也記曽子問凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今視夫鳥獸則失喪其羣匹越月踰時則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫智於人故人於其親也至死不窮記子生三年然後免於父母之懐父母惟其疾之憂並語子父子主恩古者易子而教之父子之間不責善並孟史晉師伐齊范文子後入武子曰無為吾望爾也夫左左師觸龍見太后曰老臣賤息舒祺最少臣竊憐之願補黑衣之闕后曰丈夫亦愛少子乎對曰甚於婦人又曰父母愛子則為之計深逺史記趙世家骨肉至親敵吾一體戾太子張禹曰臣四兒一女愛女甚於愛男西漢楊彪子為操所殺操見彪曰何瘦彪曰猶懐老牛䑛犢之愛東漢本傳恩情天至東漢馬后記母子慈愛始終無纎芥之間漢明帝衛玠多病體羸母常禁其語晉書本傳父之於子當愛之如一晉紀王述子坦之雖長猶抱置膝上晉書本傳王衍曰情之所鍾正在吾輩荀羨年七嵗其父愛之常置羨於膝上並同上王羲之率諸子抱弱孫一味之甘割而分之以娛目前晉書王曇嘗與兄弟集㑹子孫任其戱適僧達跳下地作彪子僧䖍累十愽棊既不墜落亦不重作僧綽採蠟珠為鳳凰僧達奪取打壊亦不復惜南史上謂岑文本曰卿弟過爾交結恐為卿累朕欲出為外官何如文本泣曰臣弟少孤老母特所鍾愛未常信宿離左右今遣出外母必憔悴儻無此弟亦無老母矣唐太宗紀上曰安有子倒懸而父不為之解哉周世宗紀端午日肅宗召見山人李唐帝方擁㓜女顧唐曰我念之無怪也肅宗張后傳李賀母探囊中見所書詩多即怒曰是兒欲嘔出心乃已耳唐書王孫賈年十五母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭而望戰國䇿集父母與子雖肝腸腐爛為其掩蔽不欲使鄉黨聞其罪過魏文帝文集驕兒不離膝生還對童稚似欲忘饑渴問事競挽鬚誰能即嗔喝並杜甫驕女未絶乳念之不能忘忽如在我前耳若聞啼聲韓退之今人適數百里出門惘惘有離别可憐之色持被入直三省丁寜顧婢子語刺刺不能休昵昵兒女語恩怨相爾汝並韓文愛流成海情塵為岳頭陀寺碑雖割慈而不言終藴結乎中腸人非木石皆有情白樂天緣情生衆累韋應物猛虎恣殺暴未嘗嚙妻兒唐文虎豹不食子臨川集念舊子楚昭王與吳戰軍敗走昭王亡其踦屨已行三十步復還取之左右曰大王何惜於此昭王曰楚國雖貧豈無此一踦屨哉吾悲與之偕出而不與偕反於是楚俗無相棄者賈子史綈袍戀戀有故人意史范睢傳上還過沛故人父老諸父母弟設酒道舊故為笑樂酒酣上自為歌起舞慷慨傷懐泣數行下謂沛父兄曰遊子悲故鄉漢高帝紀樓護有故人吕公無子歸護託身護與吕公妻及吕嫗同食護妻子頗厭吕公護聞之流涕責子曰吕公以窮老付託於我義所當奉遂養吕公終身西漢馮異自長安入朝帝謂公卿曰是我起兵時主簿也為吾披荆棘定關中既罷賜珍寳錢帛詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意乆不報漢光武紀帝幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔少時謹信與人不欵曲惟直柔耳今乃能如此漢光武紀仲尼不失舊於原壤東漢朱穆傳何晏遷侍中主選曹宿與有舊者多擢用之魏志本傳孫權欲斬蘇飛甘寜為權言飛疇昔舊恩寜不值飛固已捐軀於溝􅊤不得致命於麾下今知罪當夷戮特從将軍乞其首領權感其言謂曰今為君置之漢獻帝唐文宗云故笏乃今甘棠唐書魏謩傳上曰昔漢光武與嚴子陵共寢子陵加足於帝腹今諸公皆名德舊齒平生親友宿昔之歡何可忘也唐髙祖紀唐公踐天子位多引貴臣共榻劉文靜諫帝曰我雖應天受命宿昔之好何可忘唐書安重誨諷馮道趙鳳奏縱阿失守宜加罪上曰朕昔為少校家貧賴此小兒拾馬糞自贍以至今日為天子曽不能庇之耶通鑑本傳上命起居舎人魏謩獻其祖文正公笏鄭覃曰在人不在笏上曰亦甘棠之比也唐文宗漢宣帝詔求㣲時故劒大臣知指白立許婕妤為皇后傳記孔子出遊有婦人哭甚哀問之婦人曰刈蓍薪亡吾簮是以哀也非傷亡簮不忘故也韓詩外傳無忘半面記室新書集漢江之君悲其墜屨少原之婦哭其亡簮選演連珠留簮屨之舊愍降帷蓋之餘矜栁僕射讓光祿表念我一朝意遺我千載恩元稹集秋涼捲朝簟春暖撤夜衾雖是無情物欲别尚沉吟白侍郎曽經爛熳三年着欲棄空箱似少恩白𫝊集冦萊公寢處一青幃二十餘年時有破壊益命補葺有靳之笑答曰不忍處之乆而以敝棄也遺事崇篤經親親以睦不遺故舊詩睦於父母之黨記親者無失其為親也故者無失其為故也檀弓君子篤於親語傳記惠顧先君之好照臨敝邑鎮撫其社稷左杜甫依嚴武於劒南武以世舊待甫甚善唐書杜甫傳李晟篤於義隆于故舊劉仁軌雖貴顯不自矜踞接故舊如布衣時岑文本生平故人雖羈賤必鈞禮並唐書集許允之為吏部多用鄉黨里人記室新書綢繆之㫖有同骨肉文選盧子諒書尹洙與狄青同經略招討事洙以貶死厚恤其家墓志韓公少善尹師魯師以貶死其子朴方襁褓既長公聞於朝命以官薦為屬教育之如子弟聞見錄歐公平生篤於朋友如尹師魯梅聖俞孫明復既卒其家貧公力經營之使皆得以自給又表其子於朝悉祿以官墓志吳奎初與鄉人王彭年善彭年客死於京師奎使長子理喪事周恤其家嫁二女焉吳奎墓志無情經于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟並書亦有兄弟不可以據薄言往愬逢彼之怒乃如之人兮誓不相好乃如之人兮德音無良不我能慉反以我為讎兄弟不知咥其笑矣角弓父兄刺幽王也不親九族骨肉相怨並詩不能晏樂同姓親睦九族宰我問三年之喪期已乆矣君子三年不為禮禮必壊三年不為樂樂必崩舊穀既没新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安語子魏人有東門吳者年四十有一子喪子而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾當無子之時不憂今子死乃與向無子同又奚憂焉列子於所厚者薄無所不薄也孟為人父而㩁其子縱利如子何揚子寡見秦人父子兄弟無父兄之恩箕踞反目有若禽獸賈誼史居喪而不哀在慼而有嘉容晉叔向曰魯公室其卑乎並左一斗粟尚可舂一尺布尚可縫兄弟二人不相容淮南王傳薄骨肉之恩西漢借父耰鋤慮有德色母取箕箒立而誶語西漢賈誼傳司徒袁隗欲為從女求婚見王允嘆曰得婿如是足也允聞而黜其妻漢桓帝紀初晉髙祖司馬懿辭以風痺不能起居曝書遇雨髙祖起收書家唯一婢見之張后懼言語泄漏乃手殺之而自執爨焉帝由是重之其後桓夫人有寵后罕得見帝疾后省病帝曰老物可憎何煩出也后慙不食之子亦不食帝謂人曰老物不足惜慮困我好兒耳晉書姜維自魏詣蜀與母相離失後得母書令求當歸維曰良田百頃不在一畝但有逺志不在當歸也三國志本傳骨肉恩薄北史蘇綽傳晉王劉夫人最有寵父聞其貴詣魏宫謁夫人夫人方與諸夫人爭寵門地相髙恥其家寒㣲大笑曰妾去鄉時略可記憶妾父不幸死亂兵妾守屍哭之而去今何物田舎翁敢至此命笞劉叟于宫門後漢梁均王王戎儉恡其從子婚與一單衣裁後更責之戎女適裴氏貸錢數萬女歸寜戎色不説女還錢乃懌世説既彰尋斧之醜豈慙尺布之謡六帖魏文帝令東阿王作詩七步不成當行法即應聲為詩曰煑豆燃豆萁冽豆取其汁萁在豆下燃豆在釡中泣本自同根生相煎何太急帝深有慙色世説集自昔把臂之英金蘭之友曽無羊舌下泣之仁寜慕郈成分宅之德劉孝標廣絶交論視若游塵遇同土梗莫肯費其半菽罕有落其一毛同上同胞之徒無所容居答客難昔我同門友髙舉振六翮不念攜手好棄我如遺跡古詩綈袍匪舊白首如新駱賓王忘情於骨肉是殆於恩也忘情於朋友是殆於義也栁文冕論書骨肉且相薄它人安得忠元微之集餓虎不食子人無骨肉恩孟東野故當結以信親當結以私親故且不保人誰信汝為韓文樂施經積而能散記分散者仁之施也儒行子分人以財謂之惠孟樂分施而恥積藏荀大畧史欒懐子好施士多歸之凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟並左愛施者仁之端史記魏成食祿千鍾什九在外什一在内史魏世家范蠡之陶為朱公十九年之中三致千金再分散與貧交疏昆弟史貨殖記傳李陵與士大夫絶甘分少西漢原涉身衣服車馬纔具妻子内困専以振施貧窮赴人之急為務西漢本傳初百姓饑荒張儉資計差温乃傾竭財産與邑里共之賴其存者以百數後漢本傳馬援少年處田牧至有牛馬羊數千頭榖萬斛既而嘆曰凡植財産貴其能施賑也否則守錢虜耳乃盡散以頒昆弟故舊東漢馬援傳魯肅大散貨賂甚得鄉邑忻心吳志范叔孫周窮濟急鄉曲貴其義行宋書尚書令符雅為人樂施乞人填門嘗曰天下物何常吾今富後日貧耳忽一人不施則意不泰後秦書樊重假貸人間數百萬臨終遺令焚削文契債家皆慙爭往償之諸子從勑竟不受晉陽秋梁商嘗曰多藏厚亡為子孫累每租奉到及兩京賞賜便置中門外未嘗入藏悉分與昆弟中外東觀漢紀集飫飽其義陳子昻集薄倖不自貴傾家共人費劉長卿出貨利猶棄粃粺栁文小惠經屯其膏施未光也易子絜瓶丐水執罐求火而人不恡劉子子産聴鄭國之政以其乗輿濟人於溱洧孟史魯莊公曰衣食所以安弗敢専也必以分人曹劌曰小惠未徧民弗從也左鄙吝子楊子取為我拔一毛而利天下不為也孟纎吝者義之蠧也文中子魏相篇數粒而炊折薪而爨非茍為艱難由性偏恡而細碎也列子史不分孤寡不恤窮匱左家富萬金門下不見一賢者史孟嘗君傳瘉於纎嗇西漢貨殖傳顔師古曰纎細也嗇恡也魯人儉嗇而丙氏尤甚周人既纎而師史尤甚西漢貨殖傳社門不通水火西漢孫寳傳注謂雖隣伍亦不往來也吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目東漢夏侯湛傳寜見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一粒骨肉怨望於家細人謗讟於道東漢王符傳馬援曰凡植財産貴其能施賑也否則守錢虜矣東漢本傳曹洪家富而性吝嗇魏明帝紀王戎家有好李賣之恐有得種常鑚其核晉紀和嶠富擬王者而至吝人謂之有錢癖晉書本傳王戎性貪吝田園徧天下每自執牙籌晝夜㑹計常若不足晉惠帝紀為人父母而吝其醯醢富有羣生𣙜其一物梁髙祖紀韋莊性慳數米而炊秤薪而㸑唐書吏部侍郎張允家貲以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮周太祖紀傳記王戎儉吝其從子婚與一單衣裁後更責之戎女適裴氏貸錢數萬歸寜戎色不説女還錢乃懌世説集酒庫封瓶生綠苔白樂天愚者愛惜費但為後世嗤古詩隘陋經苦節不可貞易卦節注為節過苦則物不能堪也儉不中禮詩序晏平仲祀其先人豚肩不掩豆澣衣濯冠以朝君子以為隘矣記禮運力量經君子以厚徳載物易大車以載積中不敗也大有地之廣厚載華嶽而不重振河海而不洩記子天不能死地不能埋桀跖之世不能汙非大儒莫之能立天下者至重也非至重莫之能任並茍傳記王嘉為丞相數言不宜封董賢上怒召丞相詣廷尉詔獄掾吏涕泣共和藥進嘉引藥盂擊地謂官屬曰丞相幸得備位三公負國伏刑都市以示萬衆豈兒女子耶何謂咀藥而死嘉出見使者受詔西漢本傳苻堅衆號百萬次淝水謝𤣥入問計謝安無懼色方與客圍碁遊陟至夜乃還晉書確乎不動如棟處屋如骨在身隋書房彦謙傳張公論事有回天之力唐書張元素傳集昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼操劒斬蛟蛟死波休乃投璧於河三投而輒躍乃毁璧而去示無􅪟意水經注斡坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下功參造化道恊先天天地之内指麾無前屹屹中立為天一柱雷崩山谷貔虎頓伏颷倒溟波鯨鯢蹉跎長轡利䇿横制宇宙據長河如指盃擘太華若破塊㫁鼇補天大與地角壯與天勍横流之中一斥而定乾坤為之坱軋河嶽為之震蕩並唐文粹障百川而東之回狂瀾於既倒韓文鼇怒則蹴翻五嶽鯨擊則掉破百川皮日休韓魏公知北都有獻二玉杯公答以百金乃開宴召延貴客特設一棹致杯其上將酌酒遍勸坐客俄為吏誤觸棹倒玉杯俱碎坐皆失色吏伏待罪公神色不動曰玉杯破亦自有時汝誤也非故也何罪之有劉斧翰府名談韓魏公鎮相州祀宣尼齋夜宿省偷兒入室挺刃曰不能自濟求濟於公公曰几上器具可直百千盡以與汝偷兒曰願得公首以獻西人公即引頸偷兒稽顙曰以公量過人欲來試公几上之物已荷公賜願無泄也公曰諾終不以語人其後為盜者以他事坐罪當死於市中備言其事曰慮吾死後惜公之遺徳不傳於世也遯齋閒覽冦準在澶淵每夕與楊億飲博歌謳諧謔歡呼常達旦或就寢則鼻息如雷上使人視之喜曰得渠如此吾復何憂五朝信行冦萊公之貶雷州也丁謂遣中使齎勑往授之公方與郡官飲上下皆惶恐公神色自若使人謂之曰朝廷若賜準死願見勑書公乃從錄事借綠衫着之拜受於庭升階復飲至暮而罷記問臨大事決大議垂紳正笏不動聲色而措天下於泰山之安歐公傳韓魏公晝錦堂記孤舟倒江河赤手攬犀象坡萬牛挽不前公乃獨力扛倒海取明月並黄魯直鎮定大事子魯燒積澤天北風火南向恐燒國哀公自将衆趨救火人人盡逐獸而火不救及仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣韓非子史吕太后立諸吕為王陳平偽聴之及太后崩平與太尉勃合謀卒誅諸吕史陳平本傳不易太子者留侯招此四人之力也留侯本傳上欲廢太子吕后恐良曰上有所不能致之者四人令太子為書固請太子迎此四人至上置酒太子侍四人者從太子上怪問四人前對曰聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰願公等卒調護太子上召戚姬曰我欲易之四人為之輔羽翼已成難動搖矣西漢張良傳上居南宫見諸將偶語以問張良對曰陛下與此屬共取天下而所封皆故人所誅皆仇怨今恐以過失及誅故相聚謀反耳上曰奈何良曰取上素所不快計羣臣所共知最甚者一人先封以示羣臣上封雍齒羣臣皆喜曰雍齒且侯吾屬亡患耳初雍齒不欲屬沛公沛公怨齒田延年前離席按劒曰先帝屬將軍以㓜孤寄將軍以天下以將軍忠賢能安劉氏也今羣臣鼎沸社稷將傾且漢之傳諡帝為孝者以長有天下令宗廟血食也如漢家絶祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵羣臣後應者請劒斬之漢宣帝紀關内大雨四十餘日京師民相驚言大水至百姓奔走大將軍鳳以為太后與上及後宫可御船令吏民上長安城以避水王商獨曰何因當有大水暴至此必訛言也有頃長安中趙定問之果訛言鳳大慙自恨失言漢成帝卧赤子天下之上而安朝委裘而能天下不亂賈誼傳變所欲為易於反掌安於泰山枚乗傳太子幸酒樂燕上不以為能有意欲以山陽為嗣上間獨寢時史丹直入卧内頓首伏青蒲上涕泣言曰道路流言以為太子有動摇之議臣願先賜死以示羣臣太子由是遂定為嗣漢元帝紀灼曰幸酒好酒也樂燕沈讌也王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至滹沱河還白河水流澌無船不可渡官屬大懼光武令王霸往視之霸恐驚衆欲且前阻水還即詭曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前北至河河氷亦合乃令霸護渡未畢數騎而氷解光武謂霸曰安吾衆得濟免者卿之力也東漢本紀誅王郎收文書得吏人與郎交關謗毁者數千章光武不省㑹諸將軍燒之令反側子自安同上初陸遜為大都督諸將或討逆時舊將或公室貴戚各自矜恃不相聴從遜按劒曰諸軍並荷國恩當相輯睦共剪此虜上報所受而不相順何也僕雖書生受命主上國家所以屈諸君使相承望若以僕尺寸可稱能忍辱負重故也各任其事豈復得辭軍令有常不可犯也及至破備計多出遜諸將乃服三國魏文帝紀蔣琬為尚書時新喪元師琬出類拔萃處羣僚之右既無戚容又無喜色神守舉止有如平日由是衆望漸服魏明帝紀桓温入赴山陵止新亭大陳兵衛將移晉室恐謝安及王坦之欲於坐害之安從容就席坐定謂曰安聞之諸侯有道守在四隣明公何須壁後置人耶温笑曰正自不能不爾遂笑語移日苻堅百萬之衆已瞰吳江桓温九五之心將移晉鼎衣冠易慮逺邇萌心從容而杜姦謀宴衎而清羣冦並謝安本傳慕容根言於燕王暐曰太宰太傅將謀不軌臣請帥禁兵以誅之可定渾氏將從之暐曰二公國之親賢先帝選之託以孤婺必不肯爾安知非太師欲為亂也乃止晉海西公燕新遭大喪内外恟懼大宰恪舉止如常人不見其有憂色每出一人步從或說以宜自嚴備恪曰人情方懼當安定以鎮之奈何復自驚擾衆將何仰由是人心稍定帝崩羣臣未敢立嗣或曰當須大司馬處分王彪之曰天子崩太子代立大司馬何容得異並同上魏有新徙勑勒千餘家苦於將吏期以草生牛馬肥亡歸漠北劉潔安原奏請徙之河西魏王曰此曹習俗放散日乆譬如囿中之鹿急則奔突緩則自定吾區處自有道不煩徙也宋太祖後周文帝崩孝閔帝尚㓜中山公護雖受顧命而名位卑下羣公各圖執政護深憂之宻訪於謹謹曰夙蒙丞相殊眷今日必以死爭之若對衆定䇿公必不得讓明日羣臣㑹議謹曰昔帝室傾危丞相志存匡救今上天降禍奄棄百僚嗣子雖㓜而中山公親則猶子兼受顧託軍國大事理須歸之辭色抗勵衆皆悚動護曰此是家事護何敢有辭謹暨周文等夷護每申禮敬至是謹乃言曰公若統理軍國謹等便有所依遂再拜羣公迫於謹亦拜衆議始定北史于謹本傳或説上曰突厥所以屢冦關中者子女玉帛皆在長安故也若徙長安而不都則突厥自息矣上以為然遣中書侍郎宇文士及踰南山至樊鄧擇可居之地將徙都之太子建成齊王元吉裴度各皆賛成其䇿秦王世民諫曰邉隅為患自古有之陛下以聖武龍興光宅中夏精兵百萬所征無敵奈何以突厥擾邉遽遷都以避之貽四海之羞為萬世之笑乎乃止唐髙祖紀馮盎本北燕人以軍功進總管或告盎叛太宗詔發兵討之魏徴諫曰當懐之以徳帝乃遣韋叔諧諭盎盎遣子智戴入侍帝曰徴一言賢如十萬衆唐書上謂侍臣曰術者言五日中當有急兵入宫卿等為朕備之張説曰此必䜛人欲離間東宫願陛下使太子監國則流言自息矣唐𤣥宗民間訛言上採擇女子以充掖庭上聞之令有司具牛車於崇明門自選後宫無用者載還其家敕曰燕寢之内尚令罷遣閭閻之間自可知悉同上郭晞在邠州縱士卒為暴節度使白孝徳患之段秀實自請補都虞候既署一月晞軍士十七人入市取酒以刀刺酒翁壊釀器秀實列卒取十七人首注槊上植市門晞一營大譟盡甲孝徳恐召秀實曰奈何秀實曰無傷也請往解之孝徳使數十人從行秀實盡辭去請老躄者一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰常侍負若屬耶副元帥負若屬耶奈何欲以亂敗郭氏晞出秀實讓之曰副元帥勲塞天地當念始終今常侍恣卒為暴行且致亂亂則罪及副元帥亂由常侍出然則郭氏功名其存者幾何言未畢晞再拜曰公幸教晞以道恩甚大敢不從命顧叱左右皆解甲散還大伍中敢譁者死回紇吐蕃合兵圍涇陽郭子儀曰今衆寡不敵難以力勝昔與回紇契約甚厚不若挺身往説之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓貫矢立於陣前子儀免胄釋甲投鎗而進回紇諸酋長相顧曰是也皆下馬羅拜藥葛羅曰懐恩欺我言天可汗已晏駕令公亦捐舘中國無主我是以敢與之來今天可汗在上都令公復總兵於此懐恩又為天所殺我曹豈肯與公戰乎涇州王童之謀作亂期以辛酉旦警嚴而發前夕有告之者段秀實陽召掌漏者怒之以其失節令每更來白輒延之數刻遂四更而曙童之不果發容管經畧使王翊為河中少尹知府事部將凌正暴横翊抑之焉其徒乗夜作亂翊知之故縮漏數刻以差其期賊驚潰走並唐代宗裴度平章中書失印度自如左右白復如故處得印度不應或問其故曰此必吏人盜之以印書劵耳急之則投水火緩之則復還故處人服其識量通鑑訛言有冦士民驚譟縱横走塵埃四起兩省諸司官聞之皆奔走今力固不敵至諴感神況虜乎諸將請選鐡騎五百為衛子儀曰適足為害也即傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免胄而勞之曰安乎乆同忠義何至於是回紇皆舍兵下馬齊拜曰果吾父也子儀召其首領各飲以酒與之羅錦勸言如初乃遣首領入朝舊唐書本傳陜虢都知兵馬使逹奚抱暉鴆殺節度使張勸代總軍務上謂李泌曰不得不煩卿往以泌為陜虢都防禦水陸運使上欲以神䇿軍送泌之官問須幾何人對曰臣請以單騎入之上曰單騎如何可入對曰陜城之人不實逆命此特抱暉為惡耳若以大兵臨之彼閉壘走矣臣今單車騎抵其近郊彼舉大兵則非敵若遣小校來殺臣未必不更為臣用也上曰朕方大用卿寜失陜州不可失卿對曰他人必不能入泌見陜州進奏官及將吏在長安者語之曰主上以陜虢饑故不受泌節而領運使欲令督江淮米以賑之耳陜州行營在夏縣若抱暉可用當使將之有功則賜旌節矣抱暉覘者馳告之抱暉稍安因疾驅而前抱暉不使將佐出迎惟偵者相繼泌宿曲沃將佐不俟抱暉之命來迎抱暉亦出謁泌稱其攝事保完城隍之功入城視事由是反側者皆自安抱暉遂亡命不知所之唐徳宗張從賓引兵入洛陽從官在大梁者無不悚懼獨桑維翰從容指畫軍事神色自若接對賓客不改常度衆心差安五代晉髙紀東山謝安石談笑靜胡沙李太白京師訛言冦至鄭覃李石在中書顧吏卒稍逃去覃謂石曰耳目頗異宜且出避之石曰宰相位尊望重人心所屬不可輕也今事虛實未可知堅坐鎮之庶幾可定若丞相亦走則中外亂矣且果有禍亂避之亦不免覃然之坐視文案自若左金吾大將軍陳君賞率其衆立望仙門下謂勑使曰賊至閉門未晩請徐觀其變不宜示弱至脯後乃定是日非石與君賞鎮之京師幾再亂矣唐文宗傳記錢鏐封吳越王役大興士卒嗟怨或夜書府門曰没了期没了期修城纔了又開池鏐出見之命吏書曰没了期没了期春衣纔罷又冬衣嗟怨頓息陶岳集眉如松雪齊四皓調笑可以安儲皇李太白以忠義感脅從之伍以含洪安反側之徒劉賓客天步艱難海内崩離六合恟然一言安之劉長卿洒掃垢汙以為萬世安杜牧之有妄言南詔欲來冦蜀蜀守調兵築城民大驚擾朝廷聞之詔張文定公移鎮西蜀公言此必妄也當以靜鎮之入境下令曰冦來吾自當之妄言者斬悉歸所調兵罷築城之役㑹上元觀燈城門皆通夕不閉蜀遂大安東坡撰公墓志如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身狥義招之不來麾之不去正色而立于朝則豺狼狸狐自相吞噬故能消禍於未形救危於將亡王元之畫像賛張乖崖守成都兵火之餘人懐反側一日合軍旅大閱始出衆遂嵩呼者三乖崖亦下馬東北望而三呼復攬轡行衆不敢讙王清臣塵史處事閒暇史晉伐齊州綽門于東閭左驂迫還于門中以枚數闔左襄十八年注云示不恐吳楚兵乏糧饑欲退數挑戰終不出夜軍中驚内相攻擊擾亂至於帳下周亞夫堅卧不起頃之復定西漢本傳祭遵為將軍取士皆用儒術對酒設樂必雅歌投壺東漢本傳諸將見戰不利多懼吳漢意氣自若整厲器械激揚士吏帝曰吳公差強人意隠若一敵國同上張奐為中郎将烏桓叛燒軍門奐帷中與弟子講論若無事衆稍安東漢魏軍次于興勢費褘即率衆往禦之光祿大夫來敏至褘話别求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖褘與敏留意對戱色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也褘至敵遂退蜀志費褘傳費褘代蔣琬為尚書令以朝晡聴事其間接納賓客加博奕不廢同上晉羊祜都督襄陽在軍常輕裘緩帶身不被甲鈴閣之下侍衛不過數十人晉武紀劉疇避亂塢壁賈敵百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其遊客之思於是皆涕泣去謝艾距石季龍將麻秋艾乗軺車冠白㡌鳴鼓而行秋大怒馳擊之左右大擾勸艾乗馬艾不從乃下車踞胡床指麾處分賊不敢進並晉書柴紹討吐谷渾敵據髙射紹軍士失色紹安坐遣人彈胡琵琶使二女子舞敵疑之休射而觀唐書僕固懐恩誘吐蕃等南下急詔郭子儀屯涇陽回紇曰謂令公亡矣令公誠存安得而見之子儀將出諸將請無往劉賓客集轉移人心子趙文王喜劒太子悝患之募左右能悦王之意止劒左右曰莊子當能見王曰有天子之劒有諸侯之劒天子之劒一用匡諸侯天下服諸侯之劒如雷霆之震四封之内無不賓服庶人之劒無異於鬬雞一旦命以絶矣無所用於國事今大王有天子之位而好庶人之劒竊為大王薄之於是文王不出宫三月劒士皆服斃其處也莊子説劒魯哀公欲益宅史諫之以為益宅不祥哀公作色而怒左右數諫不聴乃以問其傅宰折睢曰吾欲西益宅而史以為不祥子以為何如宰折睢曰天下有三不祥而益宅不與焉哀公大悦而喜頃復問曰何謂三不祥對曰不行仁義一不祥也嗜欲無止二不祥也不聴強諫三不祥也哀公黙然深念憤然遂自反遂不敢西益宅淮南子史楚人伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊宋平公築臺妨於農收築者謳子罕聞之親執朴以行築者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役謳者乃止並左晉平公謝鷃不死使射襄搏之失公怒拘將殺之叔向曰必速殺之無令逺聞君忸怩于顔乃趣舍之國語楚優孟嘗以談笑諷諫楚莊王有愛馬死使羣臣喪之欲以棺槨大夫禮𦵏之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮𦵏之薄請以人君禮𦵏之王曰何如曰臣請以雕玉為棺文梓為槨楩楓豫章為題奏發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛於後廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬王曰寡人之過一至此乎乃使以馬屬大官令無令天下乆聞也史滑稽趙王新立秦急攻趙趙求救於齊齊曰必以長安君為質兵乃出太后不肯大臣彊諫后曰復言者老婦必唾其面左史觸龍見后盛氣而須之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為父母愛之則為之計深逺今媪尊長安君之位而不及今有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家茅焦曰陛下有狂悖之行不自知耶車裂假父囊撲二弟遷母於雍桀紂之行不至於是矣令天下聞之盡瓦解無嚮秦者王下殿手自執之曰先生趨起就衣今願受事王自駕虛左方往迎太后歸於咸陽復為子母如初秦紀上居南宫見諸將偶語以問張良良曰陛下與此屬共取天下而所封皆故人所誅皆讎怨今恐以過失及誅故相聚謀反耳上曰奈何良曰取上素所不快計羣臣所共知最甚者一人先封以示羣臣上封雍齒羣臣皆喜曰雍齒且侯吾屬亡患矣初雍齒不欲屬沛公沛公怨齒良因事納忠以變移帝意使上無阿私之失下無猜懼之謀國家無虞慮及後世若良者可謂善諫矣漢髙紀冐頓為書䙝慢樊噲曰臣願得十萬衆横行匈奴季布曰噲可斬也前匈奴圍髙帝於平城漢兵三十二萬噲為上將軍不能解圍今呻吟之聲未絶傷夷者甫起而噲欲摇動天下妄言以十萬衆横行是面謾也且冒頓之横久矣得其善言不足喜惡言不足怒也髙后曰善漢惠馮唐曰陛下雖得亷頗李牧弗能用也上怒召讓唐曰公奈何衆辱我獨無間處乎唐曰鄙人不知忌諱魏尚坐上功首虜差六級陛下削其爵而罰之上説令唐持節赦魏尚復以為雲中守漢文帝縣官無錢從民貰馬民或匿馬不供上怒欲斬長安令右内史汲黯曰長安令無罪獨斬臣黯民乃肯出馬上黙然漢武紀上從容謂虎賁中郎將馬援曰吾甚恨前殺守相多也對曰死得其罪何多之有但死者既往不可復生也上大笑漢光武紀嶺南舊獻生龍眼荔枝十里一置五里一候晝夜傳送唐羌上書曰臣聞上不以滋味為徳下不以貢善為功伏見交趾七郡獻生龍眼等南州土地炎熱惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此一物升殿未必延年益夀詔勅大官勿復受獻漢和紀復㫁大臣行三年喪陳忠上疏臣愿陛下登髙北望以甘陵之思揆度臣子之心則海内咸得其所東漢殤帝紀河間王政慠狠不奉法順帝以侍御史沈景有強能稱故擢為河間相景到國謁王王不正服箕踞上殿侍郎賛拜景峙不為禮問王所在虎賁曰是非王耶景曰王不正服常人何别今相謁王豈謁無禮者耶王慙而更服東漢河間本傳時文帝為五官將臨淄侯植才名方盛有奪宗之議太祖嘗屛除左右問賈詡詡黙然不對太祖曰與卿言而不答何也詡曰屬適有思故不即對耳太祖曰何思曰思袁本初劉景升父子也太祖大笑於是太子遂定魏志關公聞黄忠位與己並怒曰大丈夫終不與老兵同列不肯受拜費詩謂公曰丈夫立王業者所用非一蕭曹與髙祖不少親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨且王與君侯譬猶一體同休等戚禍福共之君侯不受拜如是便還但相為惜此舉動恐有後悔耳公大感悟遽即受拜漢獻帝帝謂侍中蘇則曰前西域通使燉煌徑寸大珠可復求市益得不則對曰若陛下化洽中國徳流沙漠即不求自至求而得之不足貴也帝嘿然魏文三國志魏明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射殺其子因涕泣帝以此建樹之意定魏志帝好土功陳羣曰人之所欲莫不有辭況乃天王莫之敢違前欲壊武庫謂不可不壊也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也帝為之少有減省魏明紀帝嘗着㡌披縹綾半袖楊阜問帝曰此於禮何法服也帝黙然不答自是不法服不以見阜同上過江之人士每至暇日出新亭飲宴周顗中坐而歎曰風景不同舉目有山河之異皆相視流涕惟王導愀然變色曰當共戮力王室尅復神州何至作楚囚相對泣耶衆收淚而謝之晉書王導傳劉疇避亂塢壁賈人百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其遊客之思於是皆涕泣去晉書劉琨在晉陽嘗為朔騎所圍窘迫無計琨乃乗月登樓清嘯衆聞之皆悽然長嘆中夜奏胡笳乃流涕欷歔向曉復吹之衆並棄圍而走晉書本傳秦王堅與羣臣飲酒以秘監朱彤為正命人人以極醉為限秘書侍郎趙整作酒徳之歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悦命整書之以為酒戒自是宴羣臣禮飲而已通鑑桓𤣥得志常欲以謝安宅為營謝琨曰召伯之仁猶惠及甘棠文靜之徳更不保五畝宅耶𤣥聞慙而止晉書魏崔楷為殷州刺史或勸楷留家單騎之官楷曰食人之祿者憂人之憂若吾獨往則將士肯誰固志哉遂舉家之官葛榮逼州城楷勸勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕終無叛志通鑑梁髙祖蘇瓊為清河太守有兄弟爭田積年不決各相援據乃至百人瓊召而諭之曰天下難得者兄弟易求者田地假令得地失兄弟心如何因下淚兄弟叩頭乞謝更分異十年遂還同居北史屈突通往陜西檢覆羣牧得隠匿馬二萬匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜産之故殺千餘人臣敢以死請又頓首曰臣一身分死就陛下乞千餘人命帝感悟悉達等皆減死論通鑑隋髙祖文徳皇后既𦵏帝即苑中作層觀以望昭陵引徴同升熟視曰臣眊昏不能見帝指示之徴曰臣以為陛下為望獻陵若昭陵臣固見之帝泣為毁觀新唐書魏徴傳上出畋遇雨問諫議大夫昌樂谷那律曰油衣若何為則不漏對曰以瓦為之則不漏上悦為之罷獵權善才范懐義誤斫昭陵栢罪當除名上特命殺之狄仁傑奏二人罪不當死上曰善才等斫陵栢我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顔直諫自古以為難臣以為遇桀紂則難遇堯舜則易張釋之有言設有盜長陵一抔土陛下何以處之今以一株栢殺二將軍後代謂陛下為如何矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下者也上怒稍解二人除名流嶺南並唐髙祖上造鏡殿成上與劉仁軌觀之仁軌驚趨下殿上問其故對曰天無二日民無二王適視四壁有數天子不祥孰甚焉上遽令剔去上遣宦者縁江徙異竹欲種苑中宦者科舟載竹所在縱暴過荆州長史蘇良嗣囚之上疏切諫手詔慰諭良嗣令棄竹江中並同上太后謂侍臣曰自周興來俊臣死不復有反者姚元崇曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動摇所問者若有翻覆懼遭慘毒不若速死賴天啓聖心興等伏誅臣以百口為陛下保自今内外之臣無復反者若㣲有實狀臣請受知而不告之罪太后悦曰向時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心李昭徳言於太后曰天皇陛下之夫皇嗣陛下之子陛下身有天子當傳於子孫為萬代業豈得以姪為嗣乎自古未聞姪為天子而為姑立廟者也樂思晦男未十嵗沒為司農上變得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反状以付俊臣無不承受矣太后始稍寤並唐武后大雪蘇味道以為瑞百官入賀殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷惟味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂諛之士也太后為之罷朝鄭普思謀作亂事覺西京留守蘇瓌窮治之普思妻弟五氏以鬼道得幸於皇后上敕瓌勿持之御史范獻思進曰請斬蘇瓌上曰何故對曰瓌為留守大臣不能先斬普思然後奏聞使之熒惑聖聴其罪大矣流普思並唐中宗唐武后欲以武三思為太子以問宰相狄仁傑曰姑姪與母子孰親立廬陵王則千秋萬嵗後常享宗廟三思立廟不祔姑后感悟即日追迎廬陵王唐書狄仁傑傳端午日肅宗詔見山人李唐帝方擁㓜女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下帝澘然泣下新唐肅宗張后傳承天皇帝倓既為張良娣所搆肅宗怒而賜死又欲摇動代宗李泌入朝從容語及倓事曰臣念得黄臺𤓰辭曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚自可四摘抱蔓歸今已一摘矣謹無再摘上愕然自是奪宗之計不行唐書李光弼代郭子儀於方營壘士卒麾幟無所更而光弼一號令之氣色乃益精明唐書本傳回紇吐蕃合兵圍涇陽郭子儀曰今衆寡不敵難以力勝昔與回紇契約甚厚不若挺身往説之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓注矢於陣前子儀免胄釋甲投槍而進回紇諸酋長相顧曰是也皆下馬羅拜葛羅曰懐恩欺我言天可汗已晏駕令公亦捐舘中國無主我是以敢與之來今知天可汗在上都令公復總兵於此懐恩又為天所殺我曹豈肯與公戰乎唐代宗朱泚反諸生將從亂太學何蕃正色叱不聴故六舘士無受汚者唐何蕃傳辛京杲以私杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死乆矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣以為當死乆矣上憫然左遷京杲諸王傅忠乗機救人多此類唐徳宗韓思彦巡察劒南益州髙貲兄弟相訟累年不決思彦敕厨宰飲以乳二人悟泣曰公將以兄弟共乳而生邪乃請輟訟唐書帝問公權用筆法對曰心正則筆正筆正乃可法矣時帝荒淫故公權及之帝改容悟其以筆諫也新唐書本傳髙仁厚圍梓州乆不下乃為書射城中遺其將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功若十日不送楊師立者當分見兵為五畨畨分晝夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於衆曰天子所誅者元惡耳他人無預也衆呼萬嵗唐僖宗帝嘗畋於中牟踐民稼中牟令當馬前諫曰陛下為民父母奈何毁其所食使轉死溝壑乎帝怒叱去將殺之敬新磨追擒至馬前責之曰汝為縣令獨不知吾天子好獵耶奈何從民耕種以妨吾天子之馳騁也汝罪當死因請行刑帝笑而釋之後唐莊宗景公使人養所愛馬馬病死公怒令人殺養馬者晏子請數之曰爾有三罪使汝養馬殺之一當死也又殺公素所喜馬二當死也使公以一馬之故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之晏子春秋魏武行役失道三軍皆渴乃令曰前有大梅林梅子甘酸可以解渴世説鎮州亂殺其帥田𢎞正詔公徃宣武既行疾驅入公告兒郎等以天寳來禍福為兒郎等明之安祿山史思明李希烈梁崇義朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎衆皆曰無又曰令公以魏博六州歸朝廷為節度使後至中書令父子皆授旌節子與孫雖在㓜童者亦為好官窮貴極寵榮耀天下劉悟李祐皆居大鎮王承宗年始十七亦杖節此皆三軍所共聞也衆乃讙曰侍郎語是皇浦湜作韓汝行狀李懐光反所率皆朔方兵公知其謀與朱泚合也患之造懐光言曰公之功天下無與敵公之過未有聞於人主某至上所言公之情上寛明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君茍得志於公何有公既為太尉矣彼雖寵公何以加此彼不能事君能以事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉公之敵彼有餘力不如明告之絶而起兵襲取之清宫而迎天子庶人服而請罪有司雖有大過猶將揜焉如公則誰敢議語已懐光拜曰天賜公活懐光之命喜且泣公亦泣則又語其將卒如語懐光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懐光卒不與朱泚韓文贈董太傅行狀人變愁為喜嵗易歉為豐劉賓客懐梟䲭以好音清祲沴為和氣唐文粹嚴冬變為韶景寒風欝為和氣同上文潞公知益喜遊晏嘗晏鈴轄舎夜乆不罷從卒輒拆馬廐為之薪不可禁遏軍校白之坐客股栗公曰天實寒可拆與之神色自若飲晏如故卒氣沮無以為變記聞文彦博知永興軍或言陜西鐡錢不便乞一切廢之朝廷雖不從人多知之爭以鐡錢買物賣者不肯受長安民多閉肆僚屬請禁之彦博曰如此是愈使惑擾也乃招絲絹行人出其家縑白數百疋使買之日納其直盡以鐡錢勿以銅錢也以是衆知鐡錢不廢市肆復安同上慶厯中廣州有蕃商死珍珠没官上命取珠出禁中鐡易之以賜張貴妃時禁中同列者有於上前乞㫖和買縁此京師珠價騰踊上頗知之一日上於别殿賞牡丹妃嬪畢集貴妃最後至乃以前日珍珠為首餙以誇同輩上望見以袖掩面曰滿頭白紛紛更没些忌諱妃慙赧起易之乃大悦自是禁中更不載珠珠價大減鳴道集一語徑破千言牢東坡集前漢武帝時人有殺上林鹿者下有司殺之東方朔曰是人有三當死使陛下以鹿之故殺人一也使天下聞重鹿賤人二也匈奴即有急推鹿觸之三也武帝黙然乃赦之記纂淵海卷四十八
