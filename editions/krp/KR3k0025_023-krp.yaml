body:
  text: 記纂淵海卷二十三宋潘自牧撰郡縣部河東路太原府倚郭一外縣九陽曲太谷榆次夀陽盂交城文水祁清源平晉郡號晉陽太原冀寜郡沿革天文參井分野禹貢冀州之域舜初以冀州地廣分置并州後復省入冀周置并州成王封弟叔虞於此為唐國春秋時為晉國戰國時屬趙秦置太原郡治晉陽漢兼置并州東漢末省并入冀三國魏復置并州改太原郡為國晉為劉淵所據後沒於石勒後魏仍為太原郡後周置并州總管府隋初郡廢大業初罷州為太原郡唐為并州後置大都督府開元中改并州為太原府屬河東道天寳初加號北京五代時唐為西京又改北京本朝為太原府太原郡河東節度沿革表縣沿革陽曲本秦太原郡狼孟縣漢置陽曲縣本朝因之太谷本晉大夫陽處父邑隋改為太谷縣以縣西有大谷故名本朝仍舊榆次春秋時晉魏榆邑漢置榆次縣夀陽春秋時晉馬首邑晉始置夀陽縣盂本春秋時仇猶國晉為大夫盂丙邑名曰㿻交城本漢晉陽縣西境隋始置交城縣因縣界有古交石城故名文水春秋時為晉平陵邑魏置受陽縣隋改曰文水取縣西文谷水為名祁春秋時晉大夫祁氏邑漢為祁縣清源春秋時晉地名清源又名梗陽隋置清源縣以水為名平晉周唐叔虞始封之地秦置晉陽縣本朝以縣為平晉軍尋罷軍為縣同上形勝亭子山在府北三十里下有桃花三洞乃白翺讀書處石尖山在府城西六十里有孤石立於汾水側髙十餘丈罕山在府城東北五十里榆次縣北比諸山獨為壯麗繫舟山在府城北九十里禹治水繫舟其上故名石室山在平晉縣西南七十里上有石室壁間篆字人莫能測鳯凰山在太谷縣南十里相傳拓䟦珪時鳯見此仇猶山在盂縣北七里上有仇猶君廟藏山在盂縣北五十里相傳程嬰公孫杵臼藏趙孤處上有二人廟隠泉山在文水縣西南二十五里卜子夏退老西河之上即此旁有子夏室汾河在府西二里晉水在平晉縣西南二十里即智伯遏水以灌趙城者夀水河在夀陽縣西二里孔河出交城縣北一百二十里晉陽宫在故唐城内春秋時董安于理晉陽公宫即此至今宫殿甚多籌邉樓在府治内馮京守太原時所建天門關在府城北四十里隋煬帝所開石嶺闗在府城東北一百二十里馬陵闗在馬嶺伏馬闗在盂縣東北七十里榆棗闗在盂縣東一百一十里赤橋在平晉縣西南臺駘廟在平晉縣境祀金天氏之子漢文帝廟在陽曲東北諸葛孔明廟在太谷縣陶唐城在清源縣俗謂之姚城唐城即平晉城治本唐叔虞子燮父徙都之所輿地紀勝人物周狐突晉大夫懷公初立突之子從重耳公令突召之不從而死狐偃突之子相文公伯天下其功甚多公孫杵臼程嬰二人皆趙朔客保全趙氏孤兒後世賢之漢常惠平晉人武帝時隨蘇武使匈奴留十餘年始歸朝廷嘉其忠勤拜光祿大夫郇越平晉人明經飭行舉孝廉茂才以病去官散其家財千餘萬以贍九族顯名當世温序平晉人為侍御史遷護羌校尉為隗囂將所執迫令從已序誓不貪生伏劒而死王允郡人家世仕宦郭林宗見而竒之以為王佐才累官豫州刺史王烈郡人少師陳寔以孝友稱鄉里有争訟質於烈咸服三國郭淮陽曲人舉孝廉事魏屢立戰功累遷征西將軍都督雍梁諸軍事孫資平晉人曹操聘之不應荀彧常稱曰北州賢智惟孫彦龍耳王昶晉陽人事魏累官兖州刺史賜爵闗内侯常為書程教子弟方嚴温恢祁人舉孝廉事魏為侍中子六人並知名世號六龍晉温羨恢之孫少聰敏拜豫州刺史以功封大陵縣公郭奕陽曲人少負重名山濤稱其髙簡有雅量官至尚書王渾昶長子遷徐州刺史破吳有功官至司徒郭澄之陽曲人少有才思相劉裕封南豐侯王承濟之子弱冠知名為東海太守政尚清浄為中興名臣第一王述澄之子幼孤事母以孝聞時為臨海太守累官尚書令王坦之述之子少與郄超俱負重名封安北將軍弟褘之尚德陽公主歴中書侍郎温嶠羨從子愽學能文拜大將軍為劉琨所禮討除叛亂皆嶠之謀累遷開府儀同三司南北朝王𤣥謨祁人事宋為彭城太守遷豫州刺史加都督唐温大雅祁人髙祖時定儀典拜黄門侍郎禮部尚書封黎國公弟彦愽累官中書令彦將以功封清河郡公武攸緒文水人武后之兄武后專制攸緒棄官歸隠終身不仕狄仁傑平晉人舉明經常登太山見白雲曰吾親舎其下悵望久之後勸武后歸政太子人稱其取日虞淵斗南一人累官平章事封梁國公王維平晉人舉進士第一善詩常因禄山反傷感有百僚何日再朝天之句官至尚書右丞武元衡為御史中丞德宗稱其為真宰相噐後拜相其弟儒衡亦髙雅官至戸部左侍郎温造姿表魁傑初為殿中侍御史劾李祐違制進馬祐曰吾膽落於温御史皇朝楊業平晉人屢立戰功時號為楊無敵屢敗契丹卒贈太尉呼延贊平晉人以積功累官至康州團練使同上集塞外悲風切交河氷已結潮海百重波隂山千里雪逈戍危烽火層巒引髙節唐太宗金闕九層鄙蓬莱之已陋玉樓千仭恥崑閬之非竒落月低於桂筵流星起於珠樹唐太宗霜威出塞早雲色渡河秋夣遶邉城月心飛故國樓思歸若汾水無日不悠悠李太白隂壑生虛籟月林散清影天闕象緯逼雲卧衣裳冷杜甫還㩦堂邸向并州將相兼權是武侯時難獨當天下事功成却進手中籌再三陳乞爐烟裏前後分張玉桉頭王建解放角鷹逐塞鳥能將代馬獵秋田山頭野火寒多燒露裏孤峰濕作烟崔顥邑傳榆石在路遶晉山微别意方蕭瑟新秋一葉飛韋應物本朝太平興國四年平劉繼元降為𦂳州軍事毁其城移治於榆次又廢太原縣以平定樂平二縣屬平定軍交城屬大通監七年移治唐明監舊領河東路經畧安撫使元豐為次府大觀元年陞大都督府開寳元年自大通監来𨽻交城熙寜三年廢晉平入陽曲政和五年復沿革表并州自古多豪傑戰争五代㡬百年天開地闔真主出猶須再駕方凱旋并人昔遊晉水上清澈照耀涵朱顔晉水今入并州裏稻花漠漠澆平田並歐陽修風劈面疑裂凍粘髭有聲太陽過午暗暮雪照人明沙平寛似海鵰逺立如人絶域居中土多年息塞塵並王正羙隆徳府倚郭一外縣七上黨屯留襄垣潞城壺闗長子涉黎城郡號上黨郡沿革天文參井分野禹貢冀州之域商時為黎國書曰西伯戡黎即此後為赤狄潞子嬰兒復立黎國戰國初為韓之别都後屬趙秦置上黨郡治長子晉徙治潞縣後周始置潞州領上黨襄垣二郡隋初郡廢大業初改州為上黨郡併置上黨縣唐復為潞州天寳初改上黨郡乾元初復為潞州後置昭義軍節度屬河東道五代時梁改匡義軍唐改安義軍晉復昭義軍本朝改昭德軍後陞為隆德府沿革表縣沿革上黨商時為黎國地秦置上黨郡本朝為上黨縣屯留春秋晉余吾邑又名屯留漢置縣襄垣秦始置縣屬上黨以趙襄子所築故名潞城本春秋時潞子嬰兒國晉滅之漢置潞縣後魏改刈陵縣隋初廢後置潞城縣壺闗本黎國地春秋時屬晉漢始置壺闗縣長子本周史辛甲所封之地左傳晉人執衛行人石買于長子即此漢置長子縣涉古沙侯國地漢置漠縣後因漳水人民徒涉遂名涉縣黎城古黎侯國隋始置黎城縣形勝壺闗山在郡城東南十三里山形似壺漢於此置闗栢谷山在郡城東北十三里與太行山相連山多栢樹五龍山在上黨東南二十五里時有五色雲見於此上有五龍祠雄山在上黨城東六十里比諸山特為雄壯故名紫雲山在長子縣東四十里唐明皇濳於潞重九日與群臣登山見有紫雲氣故名疑山在屯留縣西十里魏孝文帝幸潞見此山有伏龍疑而不進其後唐𤣥宗自潞入盖其應也鹿臺山在襄垣縣南二十里羊腸坂在壺闗東南一百六十里盤曲如羊腸絳水出盤秀山下神農井在羊頭山後即神農得嘉穀處長平闗在長子南四十里即秦白起坑趙卒四十萬處吾峪闗在黎城北二十里丹朱城在長子縣治堯子丹朱所築微子城在潞城東十五里殷微子所封之處黎侯城在黎城東南三十里春秋荀侯滅潞立黎侯即此輿地紀勝人物周豫讓上黨人為智伯臣簡子滅智氏讓為報仇不忘國士之遇漢馮奉世上黨人學春秋善兵法韓曾舉為衛侯使擊莎車威震西域賜爵闗内侯馮野王奉世次子為隴西太守以治行髙入為左馮翊遷大鴻臚鮑永屯留人性至孝更始中遷尚書僕射行大將軍以破青犢功封中陽侯晉續威上黨人愽覽經籍仕為東安太守有治績南北朝堯暄長子人羙貌恭慎仕魏累官大司農三子二孫俱膺顯職唐苗晉卿壺闗人舉進士累官中書舎人知吏部後為魏郡太守政化大行肅宗時拜左相皇朝李崇矩上黨人有志行鄉里推服平澤潞征揚州皆有功累官太傅張延通潞城人性頴悟有才幹初為通使舎人歴官兵馬都監李處耘上黨人初𨽻太祖帳下臨機决事謀無不中後以功遷樞宻副使李繼昌崇矩子性謹厚官至連州刺史李繼隆處耘子善騎射征伐四方皆有功累遷鎮安軍節度使同上集倚天長劍截雲孤報國縱横見丈夫五載登壇真宰相九重分閫正司徒曽聞轉戰平堅冦共說題詩笑腐儒料敵知㡬在方寸不勞心力講隂符鼓角因風飄朔氣旌旗映水發秋光河源收地心猶壯笑向天西萬里霜並楊景山天晴紅幟當山滿日暮清笳入塞長年少功髙人最羙漢家壇樹月蒼蒼同上悠悠捲斾旗飲馬出長城寒沙連騎迹朔吹斷邉聲胡笳清玉塞羌笛韻金鉦絶漠干戈戢車徒振原隰都尉反龍堆將軍旋馬邑揚麾氛霧静紀石功名立唐太宗盛德雄名逺近知功髙先乞守藩維銜恩暫遣分龍節署勅還同在鳳池天子親臨樓上送朝官齊出道傍辭明年塞北清藩落應起生祠請立碑張文昌本朝太平興國初改昭德舊領河東路兵馬鈐轄兼提舉澤晉絳州威勝軍屯駐伯本城兵馬巡檢事本潞州監中靖國元年改為軍崇寜三年陞為府仍還昭德舊節天聖三年徙黎城於涉之東南白馬驛熙寜五年省入潞城縣元祐元年復沿革表地形西控三秦逺河勢南吞二華秋晉魏兵争一春夢漢唐壇祀幾荒丘披圗弔古令人慨不必重登鸛雀樓馮叔獻秦兵伏甲武安西趙將非材戰士擕千里陣雲沉曉日萬家屋瓦震秋鼙蕭真卿平陽府倚郭一外縣九臨汾洪同襄陵神山趙城汾西霍邑冀氏岳陽和川郡號平陽河東晉寜郡沿革天文觜參分野禹貢冀州之域堯都平陽即此以其地在平水之陽故名春秋屬晉戰國屬韓後屬趙秦漢皆為河東郡地三國魏始置平陽郡晉仍舊後趙兼置東雍州孝昌中改唐州建義初又改晉州隋改郡曰平河尋廢郡為州大業初改臨汾郡義寜初復改平陽郡唐改為晉州天寳初改平陽郡乾元初復為晉州五代梁置定昌軍節度改建雄軍節度本朝州軍仍舊政和中陞州為平陽府沿革表縣沿革臨汾本漢舊縣屬河東郡晉改曰臨汾縣洪洞春秋時楊侯國隋改為洪洞縣以鎮為名襄陵本晉大夫郤犨食邑以襄公陵在此故名神山本漢河東郡唐武徳中始析置浮山縣尋改神山縣趙城周穆王封造父之地春秋時趙簡子居之隋為霍邑地後乃分置趙城縣汾西本漢彘縣地後魏置汾西郡隋初改為汾西縣霍邑禹貢岳陽即此地隋置霍邑縣以霍山為名冀氏漢河東郡地後魏置冀氏縣岳陽亦漢河東郡地禹貢岳陽即此和川本後魏義寜縣隋改為和川縣後廢唐復置本朝因之同上形勝平山在郡城西南二十五里即姑射山之支也平水出焉卧虎山在府城東三里以形似名石孔山在郡城西三十五里九孔相通深不可測姑射山在郡城西五十里上有姑射蓮花二洞即莊子所謂有神人居焉者三磴山在襄陵縣西南十五里上有龍祠崇山在襄陵縣東四十五里山頂有塔並卧