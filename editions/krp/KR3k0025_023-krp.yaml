蒲子山在州東北五十里世傳為堯之師蒲伊子隠處五鹿山在州東七十里上有五鹿大夫廟白衣山在州東三十五里有白衣居士藏於此妙樓山在州北七十里内有石室前有龍池水泉冬夏不竭黄雲山在石樓縣東六十里翠金山在石樓縣南三十里上有臺駘神廟團圓山在石樓西北三十里上有漢髙祖廟翠屏山在蒲縣西南山勢圓聳上有經閣雙山在永和縣東南兩峯並秀故名樓山在永和縣兩山相對其形如樓捕狐山在大寜縣北三十五里上有捕狐神祠仙芝谷在永和縣北五里嘗産芝草故名第一河在峽流經蒲縣西至大寜縣界入河龍子湫在隰州南十里亦名瀑布泉嘗有龍見故名靈液池在永和縣東南仙芝坊明月泉在州北八里蒼崖之下崖上白石如月影落泉中故名屈産泉在石樓縣東南晉時有馬飲此泉而生龍駒崖上有晉公子廟輿地紀勝人物周欒枝事文公為大夫將下軍趙衰讓之為卿靈輙永和人趙宣子田於首山舎於翳桑見輒饑食之輒舎其半問其故請以遺母因厚待之後公伏甲攻宣子輒倒㦸以禦公徒而免之晉韋忠隰州人少慷慨有志武帝朝為鎮西大將軍討叛者矢盡不屈而死李矩初領河東太守時饑矩悉心撫恤百姓賴焉後封平陽侯唐敬暉隰州人累官侍中留守長安以治幹聞誅二張迎復中宗以功封平陽侯吕諲第進士肅宗拜御史中丞所陳事皆納出為江陵尹治有威惠民歌詠之五代劉訓永和人仕唐至彰武軍節度丹陽等州觀察使後封開國侯本朝趙友隰州人七世同居真宗時特加旌表仍蠲其課調侯仲良大寜人學宗孔孟時人欲館仲良者仲良見其家壁垂佛像几積佛書即去之朱子稱其學清白勁正趙鼎蒲人崇寜中進士隨髙宗南渡累官殿中侍御史同上集黄雲隨寳鼎紫氣逐真人東詠唐虞迹西觀周漢塵張道濟胡人南牧馬漢將日徵兵霧重寳刀濕沙虛金鼔鳴李白本朝熙寜五年以温泉大寜石樓𨽻隰州即縣治吉鄉軍使元祐元年復吉鄉軍為隰州沿革表平沙細草散羊牛一簇征人在戍樓陳剛中功髙寜在我陣沒與招魂塞色干戈采軍容喜氣屯僧德隠威勝軍倚郭一外縣三銅鞮武鄉沁源綿上郡號銅鞮義寜陽城軍縣沿革天文參分野禹貢冀州之域春秋晉銅鞮地戰國屬韓後屬趙秦漢皆上黨郡地魏晉因之後魏置義寜郡隋初郡廢置沁州治沁源縣大業初罷州為沁源縣屬上黨郡義寜初復置義寜郡唐初復為沁州屬河東路天寳初改陽城郡乾元初復為沁州本朝於銅鞮縣界置威勝軍武鄉本漢涅縣地屬上黨郡晉始置武鄉縣後魏去武字改鄉縣隋初屬潞州唐仍名武鄉縣本朝𨽻威勝軍沁源本漢谷逺縣地後魏置沁源縣大業初廢州後屬上黨郡唐初復置沁州屬陽城郡本朝改沁源縣綿上在州城北七十里本後魏陽城縣隋改曰甲水縣後廢沿革表形勝龜山在州城西北五里以形似故名堯山在州城西三十里銅鞮山在州城南四十里西有石梯山琴泉山在沁源縣東下有靈泉綿山在沁源縣北相傳介之推自焚之所有廟在焉鞞山在武鄉縣西相傳石勒微時於此聞鞞鐸之聲故名沁河在沁源縣城東青龍河在沁源縣東涅水在武鄉縣西寒泉在沁源縣北五十里輿地紀勝人物晉石勒武鄉人生有豪志後因晉亂起兵割據都襄國自稱趙王李熹銅鞮人少有髙行累辭徵辟初仕晉拜御史中丞當官正色百僚震肅後仕魏為太子太傅遷尚書僕射五代郭延魯綿上人父饒仕晉為沁州刺史延魯累遷鄜州刺史廉平自勵民甚頼之秩滿州人遮道攀號當時父子以善政聞同上集君不見銅鞮觀數里城池已蕪蔓君不見虒祈宫幾重臺榭亦微濛杜頠赤日欲落峴山西倒着接䍦花下迷襄陽小兒齊拍手攔街争唱白銅鞮李白襄陽行樂處歌舞白銅鞮江城囘渌水花月使人迷同上本朝太平興國三年於潞州銅鞮縣亂栁石圍中建為軍太平興國初銅鞮與武鄉自潞州来𨽻熙寜七年廢遼州以榆社縣為鎮入武鄉太平興國六年廢沁州為沁源縣寳元二年綿上自大通監来𨽻威勝慶厯六年徙置軍西北大覺寺地沿革表岢嵐軍倚郭一嵐谷郡號居順軍縣沿革天文參井分野禹貢冀州之域本春秋晉地後為樓煩胡所據趙滅樓煩以為邑秦置縣屬太原郡漢為汾陽縣曹魏屬新興郡後魏於此置嵐州因山為名隋為岢嵐鎮屬樓煩郡唐置岢嵐軍及嵐谷縣本朝因之沿革表形勝長城山在軍東三里乏馬嶺在郡東巨麓山在嵐谷縣西南上多松又名萬松嶺雪山在郡北東西二山對峙霸王山在軍北七十里岢嵐山在軍北一百里髙二千丈十里巖在軍東十里形如飛簷黄峴山在嵐谷縣西銅鼔山在縣南四十里舊有銅皷雙松山在軍北上有雙松大萬山在軍西南六十里嵐漪河源出縣東西流入黄河蔚汾河在嵐谷縣南大賢河在縣南四十里輿地紀勝人物皇朝王中立郡人博學强記家富於財待賔客豐腆而自奉甚儉妻死不再娶亦不就舉居一室如衲僧數年乃出人覺其談吐詩翰異常問之不言晩年易名雲鶴自號擬栩同上集繞郭煙嵐新雨後滿山樓閣上燈初元微之將軍分虎竹戰士卧龍沙邉月随弓影胡霜拂劒花李白本朝太平興國五年以嵐州嵐谷縣𨽻為軍熙寜三年廢嵐州元豐六年復置沿革表煙嵐一簇峙崔巍到此令人心自灰上有神仙不知姓洞門閑倚白雲開邵堯夫煙嵐自古人難畫逺即深深近却無邢仲闕日斜汾沁催驛馬雪暗岢嵐傳酒盃塞上金湯惟粟粒胷中水鏡是人才黄山谷勸課農桑真有道折衝樽俎不臨邊同上憲州倚郭一靜樂郡號汾源州沿革天文參井分野禹貢冀州之域本漢汾隂縣地屬太原郡東漢末廢入九原縣隋為岢嵐縣尋改汾源縣大業間改為静樂縣屬樓煩郡唐於縣置管州後廢以縣屬嵐州本朝咸平中置静樂軍尋廢軍徙憲州治縣沿革静樂本漢汾陽縣地隋大業中改静樂縣沿革表形勝天柱山在静樂縣南後魏天柱將軍爾朱榮過此故名馬頭山在静樂縣南上有魏文帝廟黒風山在静樂縣西北山側有一竅秋冬出黑風上有神祠石峽山在静樂北晉人假道於虞在此周公山在縣西相傳宇文周巡狩至此故名輿地紀勝人物任𤣥妻劉氏静樂人年十八而寡勵志守節姑欲奪其志劉自刎幾死後數年夫弟隂受富室聘劉度不能全竟自縊同上集夜吟闗月静秋望塞雲髙許用晦送李别駕促駕逾三水長驅望五原天街分斗極地理接樓煩駱賓王戍古秋塵冷沙寒宿霧繁同上本朝咸平五年移治静樂軍縣遂廢軍又廢熙寜三年廢憲州為静樂縣𨽻嵐州十年復憲州仍領静樂縣政和五年賜郡名沿革表慈州倚郭一吉鄉郡號文成州沿革天文觜參分野禹貢冀州之域春秋時晉屈邑即公子夷吾所居漢為北屈縣屬河東郡魏屬平陽郡後魏置定陽郡及定陽縣東魏置南汾州後周改汾州後齊改西汾州隋改耿州及改定陽為吉昌鄉大業初置文成郡唐置南汾州治吉昌後改慈州復改文成郡又為慈州本朝熙寜中州罷以縣屬隰州尋置吉鄉軍復慈州沿革表形勝掛甲山在州南昔尉遲恭過此掛甲包山在州東風山在州境有穴如車輪風氣蕭瑟壺口山在州西禹貢既載壺口即此孟門山在州西明珠山在州東北清水河在州北流入黄河耿城在州南殷祖乙遷耿即此姚襄城在州西乃周齊交争之地紀勝人物唐崔元亮州人擢進士第初為駕部員外郎清慎自持每遷官必退讓朝廷推為夙望後官至虢州刺史集絶塞隂無草平沙去盡天下營㸔斗建傳號信狼煙劉司南五道分兵去孤軍百戰塲王少伯本朝熙寜五年廢州以吉鄉𨽻隰州即縣治置吉鄉軍使仍省文成為鎮𨽻焉又以鄉寜𨽻晉州襄陵縣元祐元年改吉鄉軍為慈州沿革表平定軍倚郭一外縣一平定樂平郡號西陽軍沿革天文參井分野禹貢冀州之域春秋時晉地秦屬太原上黨二郡漢為上艾縣地東漢屬恒山國晉屬樂平郡後魏為西陽郡改上艾曰石艾縣隋屬遼州後屬太原郡唐屬遼州後屬并州又改為廣陽縣本朝改為平定軍沿革表縣沿革平定本春秋晉地本朝為平定縣樂平本漢沾縣地晉置樂平郡本朝為樂平縣同上形勝鵲山在州西北上有扁鵲廟冠山在州西南其形似冠嘉山在州西以草木暢茂故名白鷄山在州東北上有晉王廟蒲臺山在平定縣西上産蒲浮化山在平定東上有女媧廟石馬山在樂平縣西松子山在樂平縣南孔子巖在樂平縣東上有孔子顔曽遺像郗家泊在州北上有昭濟聖母祠靈應池在州西上有神應王廟澤發水源出平定縣平地穴起下赴絶澗懸流千尺石甕潭在樂平縣東上覆巨石深不可測承天鎮在州北流盃池在州南郡人修褉之所輿地紀勝人物皇朝常延信樂平人歴襄鄧等州都巡檢著偉績任山樂平人有大志不仕作通紀並井田圖嘗應召言事富弼厚遇之同上集再宿殊鷂舎相㸔獨鵲山斾沾新雨過鳥逐暮雲還周昻彎弓辭漢月挿羽破天驕陣觧星芒盡營空海霧消李白本朝太平興國二年以鎮州廣陽砦建為軍四年以并州平定二縣来屬太平興國四年改平定縣沿革表冠山移得近城頭王問記纂淵海卷二十三
