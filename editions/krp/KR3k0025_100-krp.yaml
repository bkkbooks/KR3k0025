body:
  text: 記纂淵海卷一百宋潘自牧撰蟲豸部蛇經維虺維蛇女子之祥詩初内蛇與外蛇鬭於鄭南門中内蛇死六年而厲公入有蛇自泉宫出如先君之數聲姜薨毁泉臺呉為封豕長蛇以薦食上國左傳子吾待蛇蚹蜩翼耶莊子騰蛇逰霧慎子䲭夷子皮謂田成子曰子獨不聞涸澤之蛇乎小蛇謂大蛇曰大蛇行而小蛇隨之必有殺子子不如相銜負我以行人必以我為神也乃相負越公道而行人皆避之韓子越人得蚺蛇以為上肴中國得而棄之無用神蛇能斷而復續而不能使人勿斷也淮南子史秦文公夢黄蛇自天下屬地其口出於鄜衍於是作鄜畤史記高祖夜行澤中大蛇當道拔劍斬之後人至蛇所有一老嫗夜哭曰吾子白帝子也化為蛇當道今者赤帝子斬之漢書杜預醉臥齋中外人聞嘔吐聲竊窺於戸見一大蛇垂頭而吐聞者異之樂廣嘗有親客久闊不復來廣問其故答曰前蒙賜酒見杯中有蛇既飲而疾時㕔事壁上有角漆弓畫作蛇廣意杯中蛇即角弓影也復置酒謂客曰酒中復有所見否答曰如初廣乃告其所以客豁然頓愈晉書劉秀之十許嵗時與諸兒戯於前渚忽有大蛇來勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉沈約宋書翟讓初見李宻衣在格上宻腰帶化為赤蛇讓心異之竟為宻所殺隋書元和中五坊小使毎羣聚於賣酒食家肆情飲啖將去留蛇一篋誡之曰吾以此蛇致供奉鳥雀可善飼之主人賂而謝之方肯擕去唐書周太祖嘗寢柴后見五色小蛇入鼻間心異之知其必貴敬奉愈厚五代史傳記螣騰蛇王蛇爾雅善用兵者譬如率然率然常山之蛇也撃其首則尾至撃其尾則首至擊其中身則首尾俱至孫子兵法楚有祠者賜其舍人酒一巵舍人相謂曰請各畫地為蛇先成者飲酒一人先成乃左手持巵右手畫蛇曰吾能為之足一人後成奪其巵曰蛇故無足子安能為之足遂飲其酒戰國䇿巴蛇吞象三嵗而出角君子服之己心腹之疾山海經晉文公出田前有大蛇其高如隄其御請攻之文公曰不可我有失行而天惑我以妖我若攻之是逆天令也乃歸齋宿而請於廟退而修政居三日夢天誅蛇曰爾何敢當聖君之路文公覺令人視之蛇已魚爛矣賈誼書隋侯行見大蛇傷救而治之其後蛇銜珠以報之搜神記晉吳興太守袁𤣥瑛嘗之官請郭璞筮吉凶璞曰至官當有赤蛇為妖不可殺之後到府果有赤蛇在銅虎符首上蟠家人撾殺之其後𤣥瑛為徐馥所害廣五行記兩頭蛇嶺外多一頭有口眼一頭似頭而無口眼昔孫叔敖見之不祥乃殺而瘞之南人見之為常其禍安在嶺表録異集蝮蛇蓁蓁封狐千里靈蛇吞象厥大何如楚辭獨不見翠蛇絳螭之將登天乎必聳身於蒼梧之朔階浮雲翼疾風而上揚雄嘉茲蛇靈斷而能續飛不須翼行不假足𫝊𤣥蚺惟大蛇既洪且長采色駮犖其文錦章食灰吞鹿腴成養創賔享嘉宴是豆是觴楊氏異物志讃永州之野産異蛇黒質白章觸草木盡死以齧人無禦之者然得而腊之以為餌可以已大風踠攣瘻厲去死肌殺三蟲栁文吾悲夫天形汝軀絶翼去足無以相扶曲膂屈脅惟行之紆目兼蜂蠆色混泥塗其頭蹙恧其腹次且褰鼻鈎牙穴出㯦居蓄怒而蟠銜毒而趨志蘄害物隂蠧潛狙草搖風動百毒齊起首卷脊努吐舌搖尾不足其凶若病乎已宥蝮蛇文本朝欲知垂盡歳有似赴壑蛇修鱗半已沒去意誰能遮况欲繋其尾雖勤如奈何東坡鼃經蟈氏掌去鼃黽焚牡蘜以灰洒之則死周禮仲夏之月螻蟈鳴禮子井蛙不可以語於海者拘於虛也子獨不聞塪井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頥蹶泥則沒足滅跗塪井之樂此亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡巡而却告之海塪井之蛙聞之適適然驚規規然自失也莊子越王勾踐欲伐吳出見鬭鼃乃軾從者曰王何敬也曰以其勇氣故也其後國人輕命死戰韓子蝦蟇蛙龜且夜恒鳴口乾舌檘然布不聽管子史元鼎五年秋蛙與蝦蟇俱鬭漢書馬援為隗囂使公孫述歸謂囂曰子陽井底蛙耳而妄自尊大不如専意東方後漢書有蛙鳴于華林園恵帝問曰為官乎為私乎賈𦙍對曰在官地為官在私地為私晉書沈僧照别名法朗少事文師道士梁武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聽僧照呪厭便息日晩王欲其復鳴僧照曰王歡已闌令女恣鳴即便喧聒齋書丘傑遭母喪以熟菜有味不嘗於口忽夢見母曰汝噉生菜遇蝦蟇毒靈床前有三丸藥可取服之傑驚起得藥服之下蝌蚪子數升南史傳記蟼蟇蝌蚪活東爾雅蝌蚪蝦蟇子也一名𤣥針一名𤣥魚古今注燕太子與荆軻之東宫臨池而觀軻拾磚投蛙太子令人奉槃金燕丹子懐州擬貞觀東廊下柱有蝦蟇聲後因柱朽壞斫之得一蝦蟇其柱又無孔隙廣五行記集蝦蟇雖水居水特變形貌强號為蛙蛤於實無所校雖然兩股長其奈脊皴皰跳擲雖云高意不離濘淖鳴聲相呼和無理祇取閙周公所不堪灑灰垂典教端能敗笙磬仍工亂學校雖蒙句踐禮竟不聞報效大戰元鼎年孰強孰敗撓居然當鼎味豈不辱釣罩韓文蠢蠢水族中無用者蝦蟇形穢肌肉腥出沒于泥沙六月七月交時雨正滂沱蝦蟇得其志快樂無以加地既蕃其生使之族類多天又與其聲得以相喧譁豈惟西池上汙君清泠波何獨瑤琴前亂君鹿鳴歌白居易本朝悍目知誰瞋皤腹空自脹慎勿困蜈蚣饑蛇不許放東坡越國車前矜勇甚子陽井底太驕生乘時不羡雲溟樂口作儀同皷吹聲宋子經坎井我自足跳梁而持頥鼈笑色無愠鶉化理莫推月下聲喧青草岸雨餘響徹緑荷洲雖蒙黄金擲荆卿空爾為或以白玉琢形模妙工倕咄爾百醜質詎辱五鼎脂浪號土底鴨雄誇水中雞何足汙帝筋但可充蛇饑洪駒父蟋蟀經蟋蟀刺晉昭公也七月在野八月在宇九月在戸十月蟋蟀入我牀下詩季夏蟋蟀居壁禮史蟋蟀俟秋唫漢書秋風厲而蟋蟀吟蓋氣使之然也後漢書傳記蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬一名蜻蛚楚人謂之王孫幽州人謂之促織督促之言也里語曰趣織鳴懶婦驚詩義疏蟋蟀之蟲隨隂迎陽居壁向外趣婦女織績女工之象易通系卦立秋蜻蜒鳴白露下蜻蛚上堂易通卦騐朽葦為蛬捜神記蟋蟀集天子無逺兵春秋潛潭巴莎雞一名促織一名絡緯促織謂鳴聲如急織也絡緯謂其聲如紡績也促織一曰促機絡緯一名紡緯古今注集澹容與而獨猗兮蟋蟀鳴此西堂楚辭何兹蟲之資生亦靈智之攸授享神氣之么眇體形容之㣲陋厲清響於長宵激悲聲以迄曙虞諶賦開秋肇凉氣蟋蟀鳴牀帷阮籍促織甚㣲細哀音何動人草根吟不穏牀下夜相親久客得無淚故妻難及晨悲絲與急管感激異天真杜詩本朝是固夫霜凄露感而恤緯征人之裳者歟身勤心苦而提耳女工之荒者歟晝閴宵喧自基而徂堂者歟多言强聒身隠而聲彰者歟若悲若怨若憤若歎而吟嘯秋夕之清長者歟一聲能遣一人愁終夕聲聲曉未休不解繅絲替人織强來出口促衣裘誠齋賦蟻經饋食之豆蚔醢注云蚔蟻子也周禮蛾子時術之禮子羊肉不慕蟻蟻慕羊肉羶也吞舟之魚蕩而失水則螻蟻能苦之莊子桓公伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤寸而有水乃掘遂得水千丈之隄以螻蟻之穴而潰以骨去蟻蟻愈多韓子蟻有兼弱之智抱朴子傳記蚍蜉大螘小者螘蠪虰螘螱飛螘其子蚳爾雅蟻封户穴大雨將集焦贑易林朱蟻其狀如蟻在崑崙之墟山海經飛蟻有木蟻古曰𤣥駒者也廣志蚍蜉齊魯之間謂蚼蠓西南梁益之間謂之𤣥駒燕謂之蛾蛘楚郢以南蟻土謂之封方言殷仲堪父病虛悸聞牀下蟻動云是牛鬬世説桓謙太元中忽有人皆長寸餘悉被鎧持槊縁機登竈或有切肉輒以槊刺取徑入穴道士朱應子令以沸湯澆所入處掘之有斛許大蟻死窟中謙後以門釁同滅異苑淳于棼夢入蟻穴見木部槐類交廣溪洞間酋長多收蟻卵鹵以為醬非官客親友不可得也嶺表録異集南方豈螘若象楚辭節殷人之喪輿在四隅而交結濟齊桓之窮師由山東之高垤感萌陽以潜步知將雨而封穴伊斯蟲之愚昧乃先識而似哲郭璞嘗濟齊師之乏亦聞媯徳之羶覩封穴而知雨驗寸壤而得泉出以時而不息故學者得而稱焉戴粒而逰若巨鼇之冠神岳繞磨而行若日月之麗清天李徳裕本朝哲宗在宫中潄水必避螻蟻聖政大宋編竹渡蟻見狀元及第類偶爾相逢試問途不知何事數遷居㣲軀所饌能多少一獵歸來滿後車一騎初乘隻又雙全軍突出陣成行䇿勛急報千夫長渡水還争一葦航誠齋蜘蛛經蠨蛸在户詩子晉公子重耳奔齊見蜘蛛布網曵蠅執豸而食之謂舅犯曰此蟲也智之薄者矣人之有智而不能廓垂天之綸布絡地之網以供方丈之御是曽不如蜘蛛之智也舅犯曰君將行之則有邦有嗣矣管子太昊師蜘蛛而結網抱朴子史葛原取燕卵蜂巢蜘蛛著器中使管輅射覆輅曰第三物觳􅑌長足吐絲成羅尋網求食利在昏夜魏志傳記蟏蛸一名長腳荆州河内謂之喜子云此蟲來著人當有親客至詩義疏蜘蛛作網以司行旅蜘蛛南北巡行罔罟焦易湯出見羅者命解其三面更教之祝曰昔蛛螯作網今人學結欲左者左欲右者右吾取其犯命者帝王世紀龔舍初隨楚王朝宿未央宫見赤蜘蛛四面縈羅網有蟲觸之而死者舎乃歎曰仕官者人之網羅也於是掛冠而退時人謂舎為蜘蛛之隠金樓子觀夫蜘蛛之絲以網飛蟲也人之用詐安過之論衡集獨高懸以浮處遂設網於四隅南連大廡北接華堂左憑廣厦右依高廊吐絲屬緒目引結網纎羅絡漠綺錯交張雲舉霧綴以待無方成公綏伊蜘蛛之為蟲縱㣲性乎天壤稟妙造於化靈忽無擬而無想吐自然之纎緒先皇羲而結網憑輕羅以隠顯應大明之幽朗張望映日張網羅遮天亦何别倘居要地門害物可堪説網成雖福已網敗還禍爾蘇極物之小者近網而斃物之大者兼網而逝網也者繩其小而不繩其大吾不知爾身之危兮腹之餧兮吁羅隠本朝日結一尺網知吐㡬尺絲百蟲為爾食丸腹尚若饑梅聖俞静看簷蛛結網低無端妨礙小蟲飛蜻蜓倒掛蜂兒窘催喚山童為解圍范至能網羅滿腹輸渠巧也只蠅蚊命屬渠網羅最宻是蛛絲却被秋蚊探得知粘著便飛來不再蛛絲也解有疎時誠齋織絲來往疾如梭長愛騰空作網羅害物身心雖甚小謾天綱紀亦無多翟嗣宗蚯蚓經孟夏蚯蚓出仲冬蚯蚓結禮子上食槁壤下飲黄泉孟子蚯蚓見軍中尤多者軍罷又宜備反叛抱朴子傳記蚯蚓一名䖤蟺一名曲蟺善長吟於地中江東謂為歌女或謂鳴砌古今注螾無爪牙之利筋脉之强上食睎土下飲黄泉者用心一也大戴禮黄帝時螾大如虹帝王世紀陳後主時隋軍至江蚯蚓盡出森然如値箭陳氏水鄉蚯蚓土蟲象陳氏自稱土徳盡出明傾其窟穴以曲歸直是嵗隋平陳大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓為羮以食之未㡬雷震其婦俄而從空落身如故而易頭為白狗頭廣五行記集蚯蚓土精無心之蟲交不以分婬於阜螽觸而感物無乃常雄郭璞蚯蚓上深堂杜詩本朝蚓食土而飲泉其為生也簡而易足然仰其穴而鳴若號若呼若嘯若歌其亦有所求耶抑其求易足而自鳴其樂耶其生陋而自悲其不幸耶將自喜其聲而鳴其類耶豈其時至氣作不自知其所以然而不能自已致耶何其聒然而不止耶吾於是乎有感六一集蝶子昔莊周夢為蝴蝶栩栩然蝴蝶也不知周也俄然覺則蘧蘧然周也不知周之夢為蝴蝶歟蝴蝶之夢為周歟莊子鳥足之根為蠐螬其葉為蝴蝶列子史魏收在洛京輕薄尤甚人號云魏收驚蛺蝶北齊書傳記蛺蝶一名野蛾一名風蝶江東人號為撻末色白背青者是也其大有如蝙蝠者或黒色或赤斑名曰鳯子一名鳯車一曰鬼車古今注唐穆宗禁中花開夜有蝴蝶數萬集花間宫人以羅巾撲之無獲者上令張網空中得數百遲明視之皆庫中金玉錢杜陽雜編嘗有人浮南海泊於孤嶼忽有物如蒲帆飛過海將到舟競以物撃之盡破碎墜地視之乃蛺蝶也海人去其翅足秤之得肉八十斤噉之極肥美異物志鶴子草蔓上春生雙蟲越女收於粧奩中摘其葉飼之蜕為蝶赤黄色婦女收而帶之謂之媚蝶嶺表録異集野畦連蛺蝶沙晩低風蝶風輕粉蝶喜穿花蝴蝶深深見留連戯蝶時時舞娟娟戯蝶過閑慢杜詩揚揚弄芳蝶韓文尋艶復穿香似閒還似忙暖煙沉蕙徑㣲雨宿花房書幌輕隨夢歌樓誤採粧王孫深屬意繡入舞衣裳鄭谷飛來繡户隂穿過畫樓深重傳秦臺粉輕塗漢殿金相憐惟栁絮所得是花心可要凌孤客邀為子夜吟李嶠本朝蝴蝶雙飛得意偶然畢命網羅羣蟻争收墜翼䇿勲歸去南柯山谷翅輕於粉薄於繒長被花牽不自勝若信莊周尚非夢豈能投死為韓憑王介甫蝴蝶新生未解飛鬚拳粉濕睡花枝夜來借得風光力不記如癡似醉時誠齋蠭經莫予荓蜂自求辛螫詩蜂蠆有毒而况國乎左傳子奔蜂不能化藿蠋莊子蜂房不容鵠卵蜂蠆螫指而神不能怡淮南子蜂有攻寡之義抱朴子史豫章嚴豐為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徴萌不従果見殺謝承陶侃表袁謙為高凉太守有蜜蜂蔽日而下謙船上㑹得留郡文書賊欲乘虛攻郡謙欲速赴卒遇大風飛沙不得復還浦遂沒海中鄒湛對武帝曰蜂蠆作於懐袖勇夫為之驚駭王隠傳記蜂燕趙之間謂之蠓螉或謂之蚴蛻其大有蜜謂之壺蜂方言蜂蠆埀芒孝經援神契細腰無雌蜂類也取桑蠶或阜螽子抱而成己子詩曰螟蛉有子蜾蠃負之博物志尹吉甫子伯竒後母取蜂去毒繋於衣上伯竒前欲去之母便大呼曰伯竒牽我吉甫見疑伯竒自死列女傳葛仙翁與客對食吐口中飯盡成飛蜂滿屋皆不螫人良久仙翁張口蜂還飛入口中成飯别傳元嘉元年建安郡山賊百餘人入浮圗剽掠財寳忽有蜜蜂從衣簏出噬螫羣賊身首腫痛先諸所掠皆棄而走蜂飛邀逐噬擊彌絡賊遂惶懼從便道而去宣驗己雖無官職一日兩衙見射覆類集𤣥蜂若壺楚辭仰蝶粘落絮花蘂上蜂鬚花暖蜜蜂喧花底山蜂逺趂人蜜蜂為主各磨牙咬盡村中萬木花逰蜂多思正結營韓文本朝空中蜂隊如車輪中有王子蜂中尊分房减口未有處野老解與蜂語言前人傳蜜延客住後人秉艾催客奔布囊包褁閙如市坌入竹屋新且完小􅐼出入旋知路幽圃首夏花正繁相逢處處命儔侣共入新宅長子孫蜂王舉家千萬口黄蠟為糧蜜為酒口銜澗水拾花鬚沮洳滿房何不有蘇子由蜜蜂不食人間倉玉露為酒花為糧作蜜不忙採花忙蜜成猶帶百花香蜜成萬蜂不敢嘗要輸蜜國供蜂王蜂王未及享人已割蜜房誠齋蟬經五月鳴蜩鳴蜩嘒嘒詩仲夏蟬始鳴季秋寒蟬鳴范則冠而蟬有緌禮子仲尼見痀僂者承蜩猶掇之也仲尼曰用志不分乃凝於神其痀僂丈人之謂乎莊子曜蟬者務明其火振其樹荀子蟬無口而鳴蟬飲而飲食三十日而蜕淮南子史朱异除中書郎始拜有飛蟬正集异武冠上時咸謂蟬珥之兆梁書後周宣帝汰侈嘗自帶綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之傳記鳴蜩蟬也宋衛謂之螗蜩陳鄭云蜋海岱之間謂之蟬詩疏義姤上九候蟬始鳴不鳴國多妖言易通卦騐牛亨問董仲舒曰蟬為齊女何答曰昔齊王后怨王而死屍變為蟬登庭樹嘒唳而鳴王悔之故曰齊女古今注集蟬寂漠而無聲楚辭吸清露於丹園抗喬枝而理翮曹大家飲露非表清輕身易知足禇雲蘭棲朝咽露樹隠瞑吟雲方干本朝引清風以長嘯抱纎柯而永歎嘒嘒非管泠泠若弦裂方號而復咽凄欲斷而還連吐孤韻以難律含五音之自然豈非因物造形能變化者耶出自糞壤慕清虛者耶凌風高飛知所止者耶嘉木茂樹喜清隂者耶呼吸風露能尸解者耶六一集蜕形汚濁中羽翼便翾好秋來間何闊已抱寒莖槁東坡一殻空空紙様輕風前却有許多聲呌來呌去渾無事呌到詩人白髮生説露談風有典章詠秋吟夏入宫商蟬聲無一些煩惱自是愁人枉斷腸誠齋螢經熠燿宵行詩季夏腐草為螢禮史張讓段珪刼少帝及陳留王協走小平津帝與王夜步逐螢火光行數里得民家露車同乗還宫後漢書煬帝幸景華宫徴求螢火得數斛夜出逰山而放之光徧岩谷隋書傳記螢文即炤爾雅螢一名輝夜一名景火一名熠熠一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蜹古今注丹鳥羞白鳥丹鳥謂丹良也白鳥謂蚊蜹也大戴禮車𦙍好學家貧不常得油夏月則以練囊盛數十螢火夜以繼日焉續音陽秋務成子螢火丸方武威太守劉子南合而佩之永平中為虜所圍矢下如雨終不能中傷虜以為神人乃解圍去神仙感應篇集不以姿質之鄙薄兮欲増輝乎泰清雖無補於日月兮期自照於陋形當朝陽而戢景兮必宵昧而是征進不競於天光兮退在晦而能明傅咸著人疑不熱集草訝無煙到來燈下暗翻在雨中燃梁元帝幸因腐草出敢近太陽飛未足臨書卷時能㸃客衣隨風隔幔小帶雨傍林㣲十月清霜重飄零何處歸杜詩本朝夜深風露滿中庭時見孤螢自開闔熠燿亦求偶高屋飛相追定知無㡬見迫此清霜期東坡却馬已録仙人方映書曽登君子堂不畏月明見陋質但畏風雨難為光陳去非熠熠孤光動翩翩渡水來后山蠅經匪雞則鳴蒼蠅之聲營營青蠅止于樊豈弟君子無信䜛言營營青蠅止于棘䜛人罔極交亂四國營營青蠅止于榛䜛人罔極搆我二人詩子以魚敺蠅蠅愈至符子或問蒼蠅紅紫揚子注云蒼蠅間乎白黒紅紫似朱而非朱也史成帝建始元年青蠅萬數集未央宫朝者坐昌邑王賀夢青蠅積西階可五六石以問龔遂遂曰䜛人衆多宜皆放逐之賀不用其言卒至於廢也漢書眧明太子食中頻得蠅蟲之類宻置柈邊恐厨人獲罪梁書庫狄伏連居室患蠅杖門者曰何故聽入北史蠅集𤓰上唐書傳記蠅宋齊謂之羊陳楚之間謂之蠅自關而西秦晉之間謂之蠅方言光武與隗囂書曰蒼蠅之飛不過十步托驥之尾得以絶羣東觀記王思嘗執筆作書蠅集筆端驅去復來思怒取筆擲地踏壞之魏畧苻堅蒼蠅報赦見赦㤙類虞翻放棄南方自恨沒海隅生無可與語死以青蠅為弔客别傳何晏夢青蠅數十來自鼻上揮之不肯去明年晏伏誅廣五行記牛僧孺青蠅賀及第見及第類集青蠅嗜肉汁而忘溺死衆人貪世利而䧟罪禍班固本朝觸頻苒苒朋飛薨薨竊羶而蠧芳筵預登當是之際無不憎我疑奸人之魂佞人之魄堙鬰不散托蠅寄跡不然者何以變白為黒變黒為白所以恣其㸃染所以遂其䜛慝張乖崖爾形至眇爾欲易盈杯盂殘瀝砧几餘腥所希抄忽過則難勝苦何求而不足乃終日而營營逐氣尋香無所不到頃刻而集誰相告報尋頭撲面入袖穿裳或集眉端或沿眼眶目欲瞑而復警臂已掉而猶攘或醉醇醪因之沒溺或投熱羮遂喪其魄尤忌赤頭號為景跡一有霑汚人皆不食歐陽公蟁子江浦之間生麽蟲名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也列子蚊蟁噆膚則通宵不寐矣猶鑿海涉河而使蚊負山也莊子蟁䖟噆膚而性不能平淮南子史中山靖王曰臣聞衆喣漂山聚蚊成雷漢書趙炳有道術章安令殺之人為立祠至今蚊蚋不能入也後漢書江東有吐蚊鳥夏夜吐蚊於蘆荻中唐史傳記秦謂之蚋楚謂之蚊説文丹鳥羞白鳥大戴禮齊桓公謂仲父曰一物失所寡人猶為之於邑白鳥營飢而求飽寡人因之開翠紗之帷進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱公之肉而退其蚊有不知足者遂長嘘短吸而食之及其飽也腹腸為之破潰公曰嗟夫民生亦猶是矣金樓子吳猛小兒時在父母邊臥夏時多蚊蚋而終不摇扇恐蚊蚋去已而及父母捜神記東方朔覆射蚊子見射覆類集雖得一餉樂猶如聚飛蚊韓文五月中夜息飢蚊尚營營但將膏血求豈覺性命輕顧己寧自愧飲人以偷生願為天下㡡一使夜景清孟郊沉沉夏夜空堂開飛蚊伺暗聲如雷嘈然倐起初駭聽殷殷若自南山來喧騰鼔舞喜昏黒昧者不分聰者惑露花滴瀝月上天利嘴迎人看不得我軀七尺爾如芒我孤爾衆能我傷天生有時不可遏為爾設幄潜匡牀清商一來秋日曉羞爾㣲形飼丹鳥劉夢得本朝薰簷苦煙燼燎壁疲照燭翾翾伺昏黒稍稍出壁屋填牕來若翳聚隙多可掬叢身疑䧟圍聒耳如遭哭猛攘欲張拳暗中甚飛鏃手足不自救其能營背腹六一集飽去櫻桃重飢來栁絮輕但知求旦暮休更問前程范文正蝨子紀昌學射於飛衛以氂懸蝨於牖南面而望之二年之後如車輪焉乃以燕角之弧孤蓬之簳射之貫蝨之心而懸不絶列子濡需者豕蝨是也擇疏鬛自以為廣宫大囿奎蹄曲腲乳間股脚自以為安室利處不知屠者之一旦布草操煙火而已與豕俱焦也莊子三蝨食彘相與訟一蝨遇之曰奚訟三蝨曰争肥饒者一蝨曰若爾不患臘之將至而烹之也乃相與聚其目而食之彘瘦人乃不殺韓子湯沐既具蟣蝨相弔淮南子夫蝨生於我我非蝨之父母蝨非我之子孫也抱朴子史獨不見羣蝨之處禈中逃乎深縫匿乎壞絮自以為吉宅行不敢離縫動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都羣蝨處於褌中而不能出也君子之處域内何異乎蝨之處禈中乎晉書江泌性行仁義衣敝蝨多綿褁置壁上恐蝨飢死乃置衣中終身無復蝨齊書傳記蝨齧人蟲也蟣蝨子也説文馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之蕩蕩然蟣蝨無所復依上悦因出小黄門頭有蝨者皆剃之東觀記王猛被縕袍而詣桓温談當世之事捫蝨而言傍若無人續隂陽秋趙仲讓為梁冀從事冬月坐庭中向日解壞裘捕蝨襄成君使推問之冀笑曰此我従事絶清高士也風俗通集危坐一時痺不得搖性復多蝨爬搔無已而當襲以車服揖拜上官不可堪也嵇康本朝咀嚼侵膚未云已爬搔刺骨終無奈時時對客輒自捫十百所除纔幾箇皮毛得氣强復活爪甲流丹身暫破未能湯沐取一空且以火攻令少挫踞鑪熾炭已不暇對竈張衣誠未過飄零乍若蛾赴燈驚擾端如蟻旋磨王介甫蚤子韓昭侯搔而痒亡一蚤求之甚急左右因取其蚤蝨而殺之昭侯以此察左右不誠也韓子釋大道任小技無異使蟾蜍捕蚤淮南子傳記蚤齧人蟲也説文集丹鴻可殺蚤也趙一解擯賦得蚤者莫不磨之齒牙為害身也曺植記纂淵海卷一百
