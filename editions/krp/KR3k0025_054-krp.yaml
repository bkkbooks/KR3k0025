body:
  text: 記纂淵海卷五十四宋潘自牧撰識見部狥私忘公附挾公濟私經見利不顧其君其仁不足稱也記子百慮其家不一圖國十至私人之門而不一至於庭管明法數能至人之門不一至主之庭百慮私家之便不一圖主之國韓非有度史趙充國曰諸君便文自營非為公家忠計也西漢本傳張禹雖家居以特進為天子師國家每有大政必與定議時吏民多上書言災異之應譏切王氏專政所致上意然之未有以明見即車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏通鑑漢成紀互入阿附谷永前後所上四十餘事專攻上身與後宮而已黨於王氏上亦知之不甚親信也西漢本傳荀恱曰私務衆於官事通鑑西漢王衍雖居宰輔之重不以經國為念而思自全之計乃以弟澄為荆州族弟敦為青州因謂澄敦曰卿二人在外而吾留此足以為三窟矣晉書本傳李林甫欲杜邊帥入相之路欲以固位專寵乃奏言大臣為將怯當矢石不若用寒族邊人邊人勇决習戰寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死帝恱其言始用安禄山至徙諸道節度使盡用邊人精兵咸戍北塞天下之勢偏重卒使禄山傾覆天下皆出於林甫專寵固位之謀也通鑑唐紀禮部尚書李揆為入蕃㑹盟使揆有才望盧把惡之故使之入蕃上曰揆無乃太老對曰使逺方非諳練朝廷故事者不可且揆行則自今年少於揆者不敢辭逺使矣通鑑唐德宗李希烈襲䧟汝州上問計於盧把對曰希烈少年驍將恃功驕慢將佐莫敢諫止誠得儒雅重臣奉宣聖澤為陳逆順禍福希烈必革心改悔可不勞軍旅而服顔真卿三朝舊臣忠直剛決名重海内人所信服真其人也命真卿詣許州宣慰希烈詔下舉朝失色李晟嘗將神策軍戍成都及還以營妓髙洪自隨西川節度使張延賞怒追而反之由是有隙上召延賞入相晟表陳其過惡上重違其意以延賞為左僕射張延賞與齊映並相映在諸相中頗稱敢言延賞因言映非宰相器映遷䕫州刺史盧把以私隙叙楊炎擠顔真卿於死地激李懷光使叛吐蕃維州副使悉怛謀降盡帥其衆奔成都李德裕遣行維州刺史虞藏儉將兵入據其城庚午一作申具奏其狀且言韋皋没身恨不能致者也事下尚書省集百官議皆請如德裕策牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢得百維州何所用之詔德裕以其城歸吐蕃執悉怛謀及所與偕來者悉歸之吐蕃盡誅之於境上極其慘酷並同上黄巢北趣襄陽劉巨容拒之大破賊衆或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛官賞事寧則棄之或更得罪不若留賊以為富貴之資衆乃止通鑑唐僖宗公私兩全經雨我公田遂及我私詩趙文子曰隨武子利其君不忘其身謀其身不遺其友事君不敢忘其君亦不敢遺其祖並記事父母能竭其力事君能致其身語夫孝始於事親中於事君終於立身孝經無私㤙非孝子也無公義非忠臣也君子不以私害公不以家事辭王事詩箋子公事畢然後敢治私事孟今日之事君事也我不敢廢抽矢扣輪去其金發乗矢而後反孟管子曰隰朋之為人也居其家不忘公門在公門不忘其家事君不二心亦不忘其身管史石奢楚昭王相有殺人者乃其父縱其父自繋使人言之王曰殺人者臣之父也臣罪當死王曰不當伏罪奢曰不私其父非孝子也不奉王命非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死史循吏傳互入循良蘇章遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲酒者私恩也明日冀州刺史按事公法也遂舉正其罪東漢本傳互入徇公忘私茍晞為兖州刺史從母子求為將晞以為督䕶後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兖州刺史哭弟者茍道將其仗法如此晉書源懷為使持節巡行北邊有懐朔鎮將元尼湏與懐少舊貪穢狼藉置酒請懐曰命之長短由卿之口豈可不相寛貸懐曰今日之集乃是源懐與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處尼湏揮淚無以對於是表劾尼湏北史互入狥公忘私張鎮周拜舒州都督舒州即其本邑鎮周乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髪箕踞叙疇昔之歡十日贈以錢帛既而垂泣謂賔曰比者張鎮周與故人為歡今日以後舒州都督治百姓耳君民禮隔不得交逰因與永訣自是親戚有犯法一無所縱州境肅然唐書本傳陸贄曰吾上不負天子下不負所學唐書陸贄傳山陵近禁人屠宰郭子儀之𨽻人潛殺羊載以入城右金吾將軍裴諝奏之或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勲髙望重上新即位以為羣臣附之者衆故吾發其小過以明郭公威權不足畏也如此上尊天子下安大臣通鑑唐德宗初李懐光之解奉天圍也上以其子璀為監察御史及懐光屯咸陽不進璀宻言於上曰臣父必負陛下願早為之備臣聞君父一也但今日之勢陛下未能誅臣父而臣父足以危陛下不忍不言上驚曰知卿大臣愛子當為朕委曲彌縫而奏之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自勉對曰臣之進言非茍求生也臣父敗則臣與之俱死矣尚有何策哉使臣賣父求生陛下亦安用之上曰更至咸陽諭卿父使君臣父子俱全不亦善乎李泌曰李璀固賢者必與父俱死矣若其不死則亦無足貴者及懐光死璀先刄其二弟乃自殺同上髙季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威衆辦事耳以白金數百兩遺之通鑑梁均王互入狥公忘私晉相桑維翰乃裴皥門生嘗謁皥皥不迎不送或問之答云皥見維翰於中書則庶僚也維翰見皥於私館則門生也何送迎之有五代史集在家常起早憂國願年豐杜詩互入憂世以孝肥家以忠肥國唐文粹本朝韓魏公言慶歴中與范希文冨彦國同在西府上前爭事議論各别下殿不失和氣如未嘗爭也别錄元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官明日交府事以次見府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣聞見録屬者故敕有司増定䕃補之格必由試藝乃得授官不惟為國造士是乃為臣立家歐公集窮達兩得經時止則止時行則行動靜不失其時其道光明易用之則行舎之則藏語子窮則獨善其身達則兼善天下孟窮不失義故士得巳焉達不離道故民不失望焉同上窮則必有名達則必有力荀古之得道者窮亦樂通亦樂莊史張衡云元龍迎夏則凌雲而奮鱗涉冬則淈泥而潛蟠後漢集舒之濟萬民卷之善一身白侍郎施之乃伊吕事業蓄之則莊老道德應而不滯飭躬有則其時之來也為雲龍為風鵬勃然突然陳力以出時之去也為霧豹為冥鴻寥兮寂兮奉身而退互入所遇不同達人靜則暗然與隂合跡動則浩然與陽同波並同上隱而晦之則金渾玉璞君子之道也發而明之則龍飛虎變大人之文也唐文粹進為天下利退有百世名顯為諸侯師黙成萬世法同上靜則龍蟄存神在一水而無悶動則鳯翔覽德自千仭以來儀李義山文髙舉逺覽子吞舟之魚不逰枝流鴻鵠髙飛不集汙池列楊朱乗雲氣御飛龍而逰乎四海之内逍遥逰史濯淖汙泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也推此志也雖與日月爭光可也史記屈原傳鴻鴈髙飛一舉千里張良傳眇然絶俗離世西漢傳傳記神龍不處罔罟之水鳯凰不翔罻羅之鄉人物考集鸞鳯翔於蒼雲兮故繒繳不能加蛟龍潛於旋淵兮身不挂於網羅楚辭𤣥鶴兮髙飛増逝兮青冥鸞鳯之髙翔兮乃集太皇之埜循四極而囘周兮先盛德而後下彼聖人之神德兮逺濁世而自藏使麒麟可得羈而繫兮又何以異虖犬羊鴻鵠之一舉兮如山川之迂曲再舉兮覩天地之方圓安能以身之察察受物之汶汶者乎又安能以皎皎之白而蒙世俗之塵埃乎互入不隨人轉當代豈無騏驥驥見執轡者非其人遂足跳而逺去並同上鳯凰翔于千仭兮覽德輝而下之賈誼賦悲世俗之迫隘朅輕舉而逺逰相如大人賦俯觀萬物擾擾焉如江漢之浮萍晉劉伶酒徳頌振衣千仭岡濯足萬里流左太沖詠史詩狹世路之阨僻仰天衢而髙蹈成公綏嘯賦髙舉摩太清永絶矰繳懼儲光羲詩決巨壑摩太清塊視三山杯觀五湖李白鸚鵡激山岳以崛起搏九萬而迅征同上綿綿羅網冥冥髙鴻趯趯竹竿穆穆幽龍其禍敗之遼絶秦越哉陳子昂集豈無朝陽鳯恥與微物爭元稹集互入知所重愛長居青雲路彈射無由縁劉賔客集求觀衆丘小必上太山岑求觀衆流細必泛滄海一作溳深韓詩誰能駕飛車相從觀海水同上洞視萬古李漢韓文集序靈鳯不啄氊白樂天集黄鵠一去青冥無極栁文下視三界狹但聞五濁腥唐文粹優哉遵渚鴻自得養身㫖不啄太倉粟不飲方塘水振羽搴浮雲罝羅任從爾孟東野本朝髙標不可揖杳若雲間鴻歐公冷看世間人東坡詩超逸絶塵獨立萬物之表馭風騎氣以與造物者逰東坡荅黄魯直書髙蹈玩一世過秦漢之故都恣觀終南嵩華之髙北顧黄河之奔流慨然想見古之豪傑至京師仰觀天子宮闕之壯與倉廩府庫城池苑囿之富且大也而後知天下之巨麗欒城集扶摇雲漢上睥睨千萬里同上一朝厭蝸角萬里騎鵬背王直方詩髙情如飛鴻未易握粟呼百斛明珠聞見淺狹經獨學而無友則孤陋而寡聞記子子誠齊人也知管仲晏子而已矣孟陳仲子居於陵耳無聞目無見孟少聞曰淺少見曰陋荀坎井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接液一作掖持頤蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨時埳井之樂此亦至矣夫子奚不時來入觀乎莊秋水欵啟寡聞欵空也如空之聞所見小也莊達生昔者宋國有田夫常衣緼黂僅以過冬暨春東作自曝於日不知天下之有廣厦隩室綿纊狐貉顧謂其妻曰負日之暄世人莫知以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對卿豪稱之卿豪取而嘗之蜇於口慘於腸衆灑而怒一作怨之其人大慙此子類也列楊朱井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也莊子夫北人見麻不知其可以為布越人見毳不知其可以為氊故不通於物者不可與言俗淮南寸鮹汎迹濫水之中則謂天下無四海之廣芒蝎宛轉果核之内則謂八極之界盡於兹也抱朴子互入以見度人見虎一毛不知其斑金縷子史少見之人如管中闚天也史梁王世家叔孫通綿蕞諸生喜曰叔孫生誠聖人也知當世之急務史本傳守窔奥之熒燭未仰天庭而覩白日也遼東有豕生子白頭異而獻之至河東見羣豕皆白懐慙而還後漢朱浮傳何異夫虱之處褌中乎晉書阮籍傳生世不學其猶宂處何所見焉北史雷記傳管中窺豹時見一斑世説新語中又晉書王獻之傳傳記北人見布而疑麻越人見罽而駭毳山海經序釋氏戒世人不可以耳目不及便為虛誕如山中人不信有魚大如木海上人不信有木大如魚漢武帝不識弦膠魏文帝不信火布北人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氊帳及來河北不信有萬斛舟船北齊黄門侍郎顔之推顔氏家訓集野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣選嵇叔夜書食芹雖云美獻御固已癡韓集歸趙城詩老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也韓集原道如龜居殻不知海寛白樂天集醯雞仰甕口亦謂雲漢津劉賔客集本朝俗傳書生入官庫見錢不識或問之曰生固知其為一作謂錢但怪其不在紙裹中耳百斛明珠明於自知經子謂子貢曰女與囘也孰愈對曰賜也何敢望囘囘也聞一以知十賜也聞一以知二語子使漆雕開仕對曰吾斯之未能信叔孫武叔語大夫於朝曰子貢賢於仲尼子貢曰譬之宫墻賜之墻也及肩窺見室家之好語子自知者明老吾長見笑於大方之家莊厲之人惡人也夜半生其子遽取火而眡之汲汲然唯恐其似巳也莊史克於先大夫無能為役左成二年吾無其功敢有其實乎吾小人不可以厚誣君子范獻子聘於魯問具山敖山魯人以鄉對獻子曰不為具敖乎曰先君獻武之諱也獻子歸曰吾名其二諱為笑矣唯不學也國語互入不學參曰陛下觀臣與蕭何孰賢上曰似不及也參曰是也史曹參世家絳侯自知其能不如平逺矣通鑑漢髙紀陳平曰我多隂謀道家之所禁吾世即廢亦已矣不能復起以吾多隂禍也西漢本傳金日磾曰臣外國人不如光且使匈奴輕漢矣通鑑漢武紀汲黯曰臣常有狗馬病力不能任郡事史本傳盧植曰豈可横叨天功以為巳力乎通鑑後漢紀是時宦官競賣恩勢唯大長秋良賀清儉退厚及詔舉武猛賀獨無所薦帝問其故對曰臣生自草茅長於宮掖既無知人之明又未嘗交於士類昔衛鞅因景監以見有識知其不終今得臣舉者匪榮伊辱是以不敢通鑑漢殤紀楊賜陳耽每拜公卿羣僚畢賀輒嘆陳寔大位未登愧於先之通鑑漢靈紀陳蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣東漢黄憲傳費禕曰吾等不如丞相才知逺矣丞相猶不能定中夏况吾等乎不如且保國治民謹守社稷如其功業以俟能者無為希兾徼倖通鑑魏髙貴鄉公紀董允代費禕為尚書令旬日之間事多停滯允歎曰人材力相懸若此非吾所及蜀志本傳互入心服徐邈拜司空歎曰三公論道之官無其人則缺豈可以老病荒一作忝之哉固辭不受蜀志本傳互入恬退晉沙汰郎官魏舒曰吾即其人也襆被而出同僚咸有愧色晉書本傳石勒曰人豈不自知若遇漢髙祖當北面事之與韓彭比肩通鑑晉書王導初拜司徒謂人曰劉子喬若過江我不得拜公也晉書劉隗傳隗子疇字子喬周嵩曰嵩性抗直不容於世晉書王濟俊爽有風姿每見玠輒歎曰珠玉在側覺我形穢晉書衛玠傳淮南袁甫嘗詣何朂自言能為劇縣朂曰唯欲宰縣不為臺閣職何也甫曰人有能有不能晉書本傳蔡謨遷司徒上疏固讓謂所親曰我若為司徒將為後代所哂義不敢拜也陸玩遷司空謂賔客曰以我為三公是天下為無人並同上魏元順曰刀筆小才堪供几案之用豈應汙辱門下通鑑梁紀岑文本拜中書令有憂色母問之答曰非勲非舊責重位髙所以憂也有來慶者輒曰今日受弔不受賀唐書本傳互入畏謹孜孜奉國知無不為臣不如𤣥齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彦博濟煩治劇衆務畢舉臣不如胄以諫諍為心恥君不及堯舜臣不如徴唐書王珪傳互入推遜盧懐慎同平章自以才不及姚崇事皆推而不專唐書本傳許逺自以為才不及巡請稟軍事而處其下唐書張巡傳程异亦自知不合衆心為相月餘不敢知印秉筆通鑑唐憲宗李德裕曰臣無名第不當非進士唐史選舉志鄭綮同平章事笑曰歇後鄭五作宰相時事可知矣唐書本傳劉蕡對策第一考官不敢取被選者李郃曰蕡逐我留吾顔其厚耶乃上疏曰臣所對不及蕡逺甚内懐愧恥自謂賢良奈人言何乞囘所授以旌蕡直新唐書本傳栁璨臨刑呼曰負國賊栁璨死其宜矣通鑑唐昭宗傳記城北徐公齊國之美麗者鄒忌謂其妻妾賔客曰吾孰與徐公美皆以為徐公不若明日徐公來孰眡之自以為不如窺鏡而自眡之弗如逺甚戰國䇿王夷甫自歎我與樂令談不覺我言為煩世説中本朝梁邵陵王讓丹陽尹表曰審已循涯自知莫可街談巷議尤見不勝太平御覽昧於自知子神龜能見夢於元君而不能避余且之網知能七十二鑚而無遺筴不能避刳腸之患莊外物萇𢎞周宣之執數者也天地之氣日月之行風雨之變律歴之數無所不通也然不自知車裂而死淮南子大夫種知所以強越而不知所以存身萇𢎞知周之所以存而不知身所以亡淮南子説山訓史栢公知項之可滅也而不知己之不可滅也穀梁傳如目見毫毛而不見其睫也史越世家孫子籌策龎涓明矣然不能蚤救患於被刑呉起説武侯以刑勢不如德然行之於楚以暴刻少恩忘其軀史孫呉列傳以遷之博物洽聞而不能以自全西漢司馬遷傳固傷遷愽物洽聞然亦身陷大戮此古人所以致論於目睫也東漢班固傳論戒人之禍智矣而不能自免於讒隙東漢馬援傳論王晏從弟思逺謂晏曰凡人多拙於自謀通鑑齊髙祖紀工於料人拙於謀已唐書李光弼贊唐太宗曰人苦不自知耳通鑑本紀劉蕡戒帝漏言而身誦語于庭新唐書本贊傳記家有敝帚享之千金斯不自見之患也魏文帝典論互入不自覺常人闇於自見謂己為賢同上集李赤善為歌詩效李白名聞江湖間其始為士無以異於人一惑於恠而所為若是乃反以世為溷溷為帝居為清都其屬意明白今世皆知笑赤之惑也及至是非取與向背決不為赤者㡬何人耶反修而身無以慾利好惡遷其神而不返則幸耳又何暇赤之笑哉桞李赤傳互入此莫笑彼種知呉之可以取知越之可以彊而不知身之進退存亡李元賔集秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也杜牧之青銅不自見只擬老他人羅隱集笑前人之未工忘己事之已拙史通本朝高宗責義琰為宰相而陵其母家然己以讒殺元舅恣意而不自知其惡何以責臣之不薄於母黨范祖禹唐鑑知有分守經長者賜少者賤者不敢辭諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯記士於大夫不承賀士有慶事不聴大夫親來賀已不敢變動尊也記玉藻賤不誄貴幼不誄長記族人不得以其戚戚君位也記不在其位不謀其政語君子思不出其位語子齊景公田招虞人以旌不至孟庖人雖不治庖尸祝不越樽俎而代之矣莊史齊侯欲使敬仲為卿辭曰羈旅之臣幸若獲宥所獲多矣敢辱高位以速官謗左莊二十二年卿非君命不越境左莊二十七年王以上卿之禮享管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉陪臣敢辭受下卿之禮而還左僖十二年衞甯武子曰陪臣來繼舊好其敢干大禮以自取戾左文四年鬷戾曰我家臣也不敢知國左昭二十五年冠雖敝必加於首履雖新必關於足上下之分也史儒林傳互入名分人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷逺地則堂髙陛無級亷近地則堂卑通鑑漢文紀等級分明而天子加焉故其尊不可及也同上衛青曰臣雖當斬將以臣之尊寵而不敢自擅誅於境内而具歸天子自裁之於以見為人臣不敢專權不亦可乎通鑑漢武紀尊尊卑卑强幹弱枝也通鑑漢和紀李愬入蔡州翌日裴度至愬具櫜鞬候度馬首唐書限則經女正位乎内男正位乎外易喪服凶器不入宮僣服賊器不入宮奇服怪民不入宮周禮父子不同席記父不祭子夫不祭妻禮不下庶人刑不上大夫犬馬不上於堂註非贄幣也外言不入於梱内言不出於梱並同上支子不祭祭必告於宗子記曲禮下又喪服小記云庶子不祭禰者明其宗也無田禄者不設祭器袗絺綌不入公門苞屨衱衽厭冠不入公門並同上君子非有大故不宿於外記庶羞不踰牲燕衣不踰祭服寢不踰廟記有田則祭無田則薦道路男子由右女子由左並同上由命士以上父子皆異宮記男不言内女不言外大夫燕食有膾無脯有脯無膾士不貳羮胾庶人耆老不徒食尊卑差也家不寳龜不藏圭不臺門歌者在上匏竹在下自仁率祖等而上之至於祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也用㤙則父母重而祖輕用義則祖重而父母輕㤙重者為之三年義重者為之齊衰絶族無移服父不次于子兄不次于弟制國不過千乘都城不過百雉家富不過百乗父子不同位禮義立則貴賤等矣並記子持手而食者不得立宗廟外屏不欲見外内屏不欲見内也並荀史先王之制大都不過參國之一中五之一小九之一左隱元年在禮家施不及國大夫不收公利左昭二十六年賈人不得衣繡乘車市井之子孫不得仕宦為吏史平準書漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽後漢紀不知分守經畔官離次書子位卑而言髙罪也孟史欒鍼曰侵官冒也失官慢也離局姦也左成十六年鄭駟秦嬖大夫而常陳卿之車服於其庭左哀三年區處得當子絶長補短孟井井然有條理荀史親不在外羈不在内左昭十二年蘇秦曰聞客有逺為吏而其妻私於人者其夫將來其私者憂之妻曰吾已作藥酒待之矣夫至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言則恐其殺主父也於是佯僵而棄酒主父怒笞之妾一僵而覆酒上存主父下存主母史本傳互入妾田叔按梁事來還至霸昌廏取火悉燒梁之獄辭空手來見帝帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味臥不安席此憂在陛下也通鑑漢武互入深識大體舅后之家但當養育以恩而不當假借以權通鑑漢文紀有男子乗黄犢車詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀數萬人至者並莫敢發言京兆尹不疑後到叱從吏收縳或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯瞶違命出犇輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之廷尉驗治竟得姦詐通鑑漢昭紀䍐羌豪靡忘使人來言願得還復故地趙充國以聞未報靡忘來自歸充國飲酒遣還䕶種人䕶軍以下皆爭之曰此其人不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘贖論後䍐羌竟不煩兵而下通鑑漢宣紀郡國羣盜處處並起羣盜自相糾擿五人共斬一人者除其罪吏雖逗遛回避故縱者皆勿問聴以擒討為効牧守令長坐界内有盜賊而不收捕者及其畏愞捐城委守者皆不以為負但取獲賊多少為殿最為蔽匿者乃罪之於是更相追捕賊並解散通鑑漢光武竇太后崩曹節王甫欲用貴人禮殯廷尉陳球曰皇太后以盛德良家母臨天下宜配先帝是無所疑於是公卿以下皆從球議通鑑漢靈紀韓彭專征伐蕭曹守管籥内外之任各有攸司通鑑晉穆紀李泌知貢使留長安久者或四十餘年皆有妻子買田宅檢括其中有田宅者停其給凡得四千將停其給其人皆詣政府訴之泌曰此皆從來宰相之過豈有外國朝貢使者留京數十年不聴歸乎今當假道於囘紇或有自海道各遣歸國有不願歸者當於鴻臚自陳授以職位給俸禄為唐臣人生當乗時展用豈可終身客死耶於是衆人無一人願歸者泌皆分𨽻神䇿兩軍鴻臚所給者不過十餘人嵗省度支錢五十萬緡市人皆喜通鑑唐德宗紀淄青李正已畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答崔祐甫曰正巳誠詐不如因遣使勞其軍以所獻就賜將士若正己奉詔是陛下恩洽士卒若不用彼自歛怨軍且亂又使諸藩不以朝廷為重賄帝曰善正已慚服時議者韙其謀謨唐書本傳互入謀畫涇原節度使馬璘疾亟以行軍司馬段秀實知節度使事付以後事秀實嚴兵以備非常璘薨軍中奔哭者數千人喧咽門屛秀實悉不聽入命押牙馬蝢治喪事於内李漢惠接賔客於外妻妾子孫泣一作位於堂宗族泣於庭將佐泣於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之非䕶喪從行者無得逺送致祭拜哭皆有儀節送喪近逺皆有定處違者以軍法從事通鑑唐代宗王承宗李師道謀緩蔡兵乃伏盜京師刺用事大臣已害宰相元衡又擊度議者欲罷度安二鎮反側憲宗怒曰度得全天也若罷之是賊計適行吾倚度定破三賊矣新唐書裴度傳横海節度使烏重𦙍奏河朔藩鎮所以能旅拒朝命六十餘年者由諸州縣各置鎮將領事收刺史縣令之權自作威福向使刺史各得行其職則雖有姦雄如安史必不能以一州獨反也臣所領德棣景三州已舉牒各還刺史職事應在州兵並令刺史領之夏四月詔諸道節度都團練都防禦經畧等使所統支郡兵馬並令刺史領之自至德以來節度使權重所統諸州各置鎮兵以大將主之暴横為患故重𦙍論之其後河北諸鎮惟横海最為順命由重𦙍處之得宜故也通鑑唐憲宗盧坦為宣歙觀察使到日值旱饑穀價日増或請折其價坦曰宣歙土狹穀少所仰四方之來者若價賤則商船不復來益困矣既而米斗二百商旅輻輳民賴以生上欲用王承宗為成德留後割其德棣二州更為一鎮以離其勢并使承宗輸二税請官吏一如李師道李絳等對曰願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聴命於理固順若其不聴體亦無損上乃遣京兆少尹裴武詣真定慰承宗受詔甚恭曰三軍見逼不暇俟朝旨請獻德棣二州以明懇欵並同上先是朝廷遣中使賜朱克融時服克融以為疎惡執留敕使又奏當道今嵗將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宮闕上患之以問宰相欲遣重臣宣慰仍索敕使裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲治之已令處分其將士春衣從來非朝廷徴發皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助修宫闕皆是虛語若欲直挫其姦宜云丁匠速來彼必蒼黄失圖若且示含容則云修宫闕事在有司不假丁匠逺來如是而已不足勞聖慮也通鑑唐敬宗紀呉同平章事徐知訓驕倨淫暴威武節度使知無為州李德誠有家妓數十知訓求之德誠遣使謝曰家所有皆長年或有子不足以侍貴人當更為公求少而美者通鑑後梁均王曹彬使於呉越事畢亟返不受饋遺呉越人以輕舟追與之至於數四彬曰吾終不受是竊名盡籍其數歸而獻之帝曰向之奉使乞匄無厭使四方輕朝命卿能如是善甚然彼以與卿卿自取之彬始拜受悉以散於親識家無留者通鑑周世宗集無侈前人無廢後觀唐文粹尊己者敬之如臣事君下己者慈之如母蓄子敵己者友之如兄弟無不得其志也栁文本朝西夏趙德明言民饑求糧百萬斛真宗問於王旦旦請敕有司具粟百萬於京師詔德明來取德明得詔書慙曰朝廷有人王旦神道碑元昊遣使求通而契丹與元昊搆隙使求約我請拒絶之時主者欲拒契丹而納元昊張文定公與東祈公上議曰如此是得新附之小羌而失久和之强敵也當賜元昊詔曰朝廷納卿誠欵本縁契丹之請今聞卿失舅甥之歡契丹遣使為言卿宜審處其事但嫌隙朝除則封册暮行如此於西北為兩得時人服其精識東坡撰張安道墓誌蔡確知安州作詩借郝處俊以譏刺時事大臣議遷之嶺南蘇公密疏言朝廷若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后為小累謂宜皇帝降敕置獄逮治而太皇太后出手敕赦之則仁孝兩得矣蘇氏子由撰朝廷命君以潁州推官甞辭而不聴君以為辭益切則名益髙而未必從也既受命而以疾辭於吏部則有司之事耳故迹不近名而終自全其志歐陽棐撰邵康節諡議區處失當經絺兮綌兮凄其以風詩緑衣註絺綌所以當暑今以待寒喻其失所也糾糾葛屨可以履霜詩子以戈舂黍以錐飱壺荀田鳩曰昔者秦伯嫁女於晉公子為之飾裝媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣未可謂善嫁女也韓非子互入末能勝本載鼷以車馬樂鷃以鐘鼓也莊使蝱負山莊是猶貫甲胄而入宗廟披羅紈而從軍旅淮南子主術訓史子産謂子皮曰子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎襄三十年賈誼曰釋斧斤之用而欲嬰以芒刃臣以為不缺則折本傳劉陶曰猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生用之不時必至焦爛通鑑東漢國輔大臣未褒而昌邑小輩先遷通鑑漢宣紀是猶種枳棘於良田養虺蛇於室内也東漢段熲傳餓狼守庖厨饑虎牧牢豚後漢仲長統理亂篇慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎𫝊翼也丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變今逺之於外不猶愈乎通鑑晉武紀此無異解衣包火張羅捕虎通鑑晉恭紀沈慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟通鑑宋文帝上每命將出師常授以成律交戰日時亦待中詔是以將帥趦趄莫敢自決通鑑宋文帝建成夜召世民飲酒而酖之世民暴心痛吐血數升上幸西宮問世民疾曰首建大謀削平海内皆汝之功吾欲立汝為嗣汝固辭且建成年長為嗣日久吾不忍奪也觀汝兄弟似不相容同處京邑必有紛競當遣汝還行臺居洛陽自陜以東皆主之仍命汝建天子旌旗如漢梁孝王故事通鑑唐髙祖可謂薦圭璧於房闥以脂澤汙漫之已唐書陳子昻傳陸贄上奏其畧曰太宗列置府兵分𨽻禁衛大凡諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中則居重馭輕之意明矣承平漸久武備寖微雖府衛具存而卒乘罕習故禄山竊倒持之柄乗外重之資一舉滔天兩京不守尚賴西邊有兵諸牧有馬每州有糧故肅宗得以中興乾元之後繼有外虞悉師東討邊備既弛禁戎亦空吐蕃乗空深入為冦是皆失居重馭輕之權忘深根固蒂之慮通鑑唐紀決江海以救焚焚收而溺至引鴆爵以止渴渴止身亡新唐書如寄珠於盜跖之門蓄水於瓦閭之上唐書昭宗贊傳記以狐白補犬羊説苑貴德篇孫興公曰如着幣絮衽荆棘中觸也挂閡世説使武士宰民如使狼牧羊使膺養雛也物理論集騏驥于中庭兮焉能及夫逺道致猿狖於櫺檻兮夫何以責其捷巧楚辭互入處非其地為鳯凰而作鶉籠兮雖翕翅其不容同上互入不具眼目任小能於大事猶狸搏虎而刀伐木也屈長才於短用猶驥搏䑕而斧剪毛也白居易杖秀才審官互入大才小用小才大用百鍊之金而不鑄干將十圍之木而不作棟樑白樂天集沉玉在弱泥泥弱玉易沉元稹集有木有木碩大而長破為桷杙不作棟樑有驥有驥規行矩步辱在短轅不駕大輅唐文粹本朝繡繪錦縠衣服之窮美者也尺寸而割之錯而紉之以為服則綈繒之不若老泉文昔漢武嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰東坡文進退得當經三揖而進一辭而退其行本方立義同而進不同而退並記子進以禮退以義治則進亂則退並孟君子以禮動以義止合則進否則退揚史義則進否則奉身而退左襄二十六年進退失據經觸藩羸其角不能退不能遂易注云持疑志無所定進退維谷匪鶉匪鳶翰飛于天匪鱣匪鮪潛逃于淵詩狼跋其胡載㚄其尾注進則躐其胡退則跲其尾進退有難並詩子壽陵餘子之學行於邯鄲未得其能又失其故行矣直匍匐而歸爾莊注以此效彼兩失之傳進退不可周旋不能左傳僖公十五年進退罪也左昭三年昔有學步邯鄲者曽未得其彷彿又復失其故步遂匍匐而歸前漢書欲儃佪低佪也以干求也傺往也兮恐重患而離尤欲髙飛而逺集兮君㒺無也謂汝何之楚辭跋前㚄後動輒得咎韓文進學解不隨人轉附不随事轉經拜下禮也今拜乎上泰也雖違衆吾從下語衆惡之必察焉衆好之必察焉語子流言止於智者天不為人之惡寒也而輟冬地不為人之惡逺也而輟廣良農不為水旱不耕並荀史君之仇讐我之婚姻也左成十三年執此之政堅如金石西漢賈誼傳莊助言汲黯於武帝曰招之不來麾之不去通鑑西漢孤立羣邪之間前漢鄭崇曰臣門如市臣心如水前漢本傳戰國儒術既絀然齊魯之間學者獨不廢史記儒林班樨獨不上嘉瑞及歌謡通鑑漢平紀朝廷爭為嚴切以避誅責唯鍾離意獨敢諫爭數封還詔書臣下過失輒救解之通鑑漢明紀岑晊之亡也親友競匿之賈彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝要君致釁自遺其咎吾已不能奮戈相待反可容隱之乎於是咸服其裁正通鑑漢桓紀詔書下舉鈎黨郡國所奏相連唯平原相史弼獨無所上曰他郡自有平原自無胡可相比通鑑漢靈紀王衍妻試衍以錢繞床使不得行衍曰舉阿堵物却晉書殷仲文還姑孰祖送傾朝桓謙要王𢎞之同行荅曰凡祖離送别必在有情與殷風馬不接無縁陪從沈約宋書互入不苟合崔浩性不好莊老之書每讀數十行輒棄之曰此矯誣之説不近人情必非老子所作老聃習禮仲尼所師豈設敗法之言以亂先王之教袁生所謂家人筐篋中物不可揚於王庭魏史崔浩傳太宗謂尉遲敬德曰公心如山岳雖積金至斗知公不移通鑑唐髙祖紀互入有守上曰人言魏徴舉止疎慢我視之更覺娬媚通鑑唐太宗時法官競為深刻唯司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生通鑑唐武后韋况不為聲利所遷唐書傳記庾子嵩謂王渾曰我自用我家法卿自用卿家法世説當風鼔箑向日燃爐而天終不為夏冬易氣論衡集舉世皆濁我獨清衆人皆醉我獨醒楚辭安能以身之察察受物之汶汶者乎又安能以浩浩之白而蒙世俗之塵埃乎同上互入髙舉遠覽雖飾以金鑣享以嘉殽逾思長林而志在豐草也嵇叔夜書風雨急而不輟其音雪霜零而不渝其色劉孝標絶交書如聞風過塵不動井中水陳子昻集處腴能不潤居劇體常閒孟浩然生長紈綺内辛勤筆舌間劉長卿佀彼白蓮花在水不着水白侍郎雖居世網常清浄韋應物主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽劉賔客守法持正嶷如秋山市井生而雲鶴性並同上玉立孤潔無緇磷遷染之譏唐文粹不為物遷不為波流同上惟憐一𣲖温泉水不逐人心冷煖移唐杜正倫詩本朝士之進顯於榮禄者莫不欲安享於豐腴公為輔弼飲食起居如陋巷之士環堵之儒他人不堪公處愉愉歐公集祭杜祁公文百人譽之不加宻百人毁之不加疎老泉文世人共棄君獨厚東坡詩身為玉雪不汙青蠅東坡祭黄㡬道文納之煩劇而不亂湼於渾濁而不緇欒城集終守金石之姿不為燥濕所變同上白蓮生淤泥清濁不相干欒城集為事轉移附為人轉移經惟民生厚因物有遷君陳人生而靜天之性也感於物而動性之欲也記夫民有血氣心知之性無哀樂喜怒之常應感起物而動然後心術形焉記身有所忿則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正大學子從物如流不知所執家語今始人生而未嘗睹芻豢稻梁也惟菽藿糟糠之為睹則以至足為在此也俄而粲然有秉芻豢稻梁而至者則瞲然視之曰此何恠也彼臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不棄此而取彼矣荀子榮辱篇罔兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶莊史郄超王珣為桓大司馬主簿記室人為之歌曰髯叅軍短主簿能令公喜能令公怒世説傳貧賤則懾於饑寒富貴則流於逸樂魏文典論皎皎練絲得藍則青得丹則赤得蘗則黄得泥則黒楚辭集偭音面規矩而改錯背繩墨以追曲楚辭蘭芷變而不芳兮芝一作荃蕙化而為茅何昔日之芳草兮今直為蕭艾也楚辭情因所習而遷移物觸所遇而興感故振轡於朝市則充詘之心生閒步於林野則遼落之志興晉孫綽蘭亭序己悲素質隨時染杜詩小人移時必變顔色棄瘠涵腴乃虱之賊陸龜䝉布鼓隨椎響坯泥仰匠圓元微之集無異盧狗之遇嗾呀呀而走不顧險阻唯嗾者之從何無巳之心也桞文一日看除目終年損道心姚少監本朝衣冠所以為容也稱禮斯美矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎涑水迂書一逢蘭蕙質稍回鐵石心東坡詩丈夫剛鐵腸因花反柔弱翰林名談重義輕利經不義而富且貴於我如浮雲語見利思義義然後取人不厭其取同上子非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也孟先義而後利者榮茍從士以上皆羞利而不與民爭業荀大畧義之所在不傾其權不顧其利舉國而與之不為改視重死持義而不撓茍榮辱道義重則輕王公矣茍修身不為利遷莊為義者不可刼以兵不可縣以利文中士有一飱而倒㦸義所驅也莊史呉伐楚入郢申包胥乞師於秦以救楚楚子入于郢賞申包胥申包胥曰吾為君也非為身也遂逃賞左定五年末世爭利維彼奔義讓國饑死天下稱之史太史公作伯夷傳序趙平原君以千金為魯連壽連笑曰所貴於天下之士者為人排患攘難解紛亂而無取也即有取者是商賈之事連不忍為也史記魯仲連傳魯連飛一矢而蹶千金虞卿以顧盼而捐相印西漢班固一矢事見史記魯仲連傳相印事見史記虞卿傳集君於為義若嗜慾勇不顧前後於利與禄則畏避退處如怯夫然韓文孔君墓誌銘輕財抵一銖白樂天集本朝呉奎以錢二千萬買田北海名曰義莊以賙親戚朋友之貧乏者終之日家無餘財諸子無宅以居呉奎墓銘逐利經機巧趨利詩序放於利而行多怨語小人喻於利同上子後義而先利不奪不饜孟王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為歟有賤丈夫焉必求龍斷而登之以左右望而㒺市利為人臣者懐利以事其君為人子者懐利以事其父為人弟者懐利以事其兄同上保利棄義謂之至賤茍惟利所在無所不傾茍不茍凢人之情見利莫能勿就故利之所在雖千仭之山無所不上深源之下無所不入管近藏秦王有病召醫䑛痔者得車五乗莊史惟利是視左成十二年叔向曰錐刀之末將盡爭之左昭六年太史公曰利誠亂之始也史孟子傳序利令志昬平原君傳好利無信不識禮義德行茍有利焉不顧親戚兄弟若禽獸耳史魏世家吕不韋販賤賣貴家累千金史本傳子貢鬻財於曹魯之間史貨殖傳行賈丈夫賤行也而雍樂成以饒販脂辱處也而雍伯千金賣漿小業也而張氏千萬灑削薄技也而郅氏鼎食由是觀之富無經業則貨無常主能者輻凑不肖者瓦解天下熙熙皆為利來天下攘攘皆為利往夫千乗之王萬家之侯百室之君猶尚患貧而况匹夫編户之民乎並同上匹夫專利謂之盜史記周紀苟利所在不知禮義史匈奴傳樂毅入臨淄取寶物祭器輸之於燕通鑑周紀頑頓嗜利西漢陳平傳逐利不耳慮非顧行也西漢賈誼傳注言其所追逐利唯計利與不耳桑𢎞羊洛陽賈人子善心計年十三侍中言利事析秋毫通鑑漢武絶趨利如水走下四方無擇前漢食貨傳商賈乗上之急所賣必倍習於商功分銖之事牟利取也富商大賈亡所牟利並同上刺繡文不如倚市門西漢貨殖傳序義路閉則利門開東漢李固傳司徒袁隗欲為從女求姻見黄允歎曰得婿如是足矣允聞而黜遣其妻通鑑漢桓紀互入婿門并無情王戎性好興利每自執牙籌晝夜算計恒若不足晉書本傳魏城陽王㣲走至山南抵前洛陽令冦祖仁家祖仁一門三刺史皆徽所引拔以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千户侯今日富貴至矣乃怖徽云官捕將至令其逃於他所使人於路邀殺之送首於兆通鑑梁髙祖諸道廵院皆募駛足置驛相望四方貨殖低昻及他利害雖甚逺不數日即知每朝謁馬上以鞭算唐書劉晏傳初吉温因李林甫得進及楊釗恩遇浸深温遂去林甫而附之為釗畫代林甫執政之策通鑑唐𤣥宗傳記大王之狗卧起行止母相與鬬投之一骨輕起相牙戰國䇿田英曰義死者不避鈇鉞之威義窮者不受軒冕之賜無義而生不如有義而死説苑求利下交曽無愧色分銖之利知而必爭同上集目語額瞬動頤塞鼻談智於尺寸之間窺窬於分毫之利晉成伯陽平樂市賦競羽毛之輕趨錐刀之利劉孝標廣絶交論利重太山道輕鴻毛周祗執友箴市人日中集於利競錐刀杜詩醫善吮人瘍含人血非有肌骨之親也利之所加也韓文質劑之曹較固之倫合彼此而騰躍之曷良苦之巧言致量衡於險手杪忽之差鼓舌傖儜詆欺相髙詭態横出鼓囂譁坌烟霧劉賔客集子本頻蕃息貨販日兼并求珠駕滄海採玉上荆行北買党項馬西擒吐蕃鸚炎州布火浣蜀地錦織成元微之集舳艫爭利涉來往接風潮劉义詩本朝彼佞人者不知義之所在而惟利之從故也利在君父則從君父利在權臣則附權臣利在敵國則交敵國利在遠方則親遠方利之所在則從之利之所去則違之范祖禹通鑑知所重愛經不登髙不臨深記諸侯不下漁色君子頃歩而弗敢忘孝也一舉足而不敢忘父母是故道而不徑舟而不游道途不爭險易之利冬夏不爭陰陽之和愛其死以有待也養其身以有為也君子不以一日使其躬儳焉如不終日不敢以先父母之遺體行殆惡言不出於口忿言不反於身不辱其身不羞其親身也者親之枝也敢不敬與同上君子不重則不威語豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也同上子無尺寸之膚不愛焉則無尺寸之膚不養也知命者不立於巖墻之下並孟周公曰君子力如牛不與牛爭力走如馬不與馬爭走荀有于越之劒者神而藏之不敢用也寳之至也莊奔車之上無仲尼覆舟之下無伯夷韓非史千金之子不死於市史記人人自愛而重犯法史平準書百金之子不騎衡漢袁盎傳王陽為益州長史行至九折阪陽曰奉先人之遺體柰何數乗此險西漢本傳千鈞之弩不為鼷䑕發機萬石之鍾不以筳撞起音通鑑漢獻紀傳記南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也列女傳集家絫千金坐不垂堂司馬相如諫獵疏努力自愛選李陵荅蘇武書以明月珠彈千仭雀吾不能也陳子昻肯與夫斗筲者決得失於一夫之目而為之憂樂哉韓文不曽妄與燕雀羣王維集豈無朝陽鳯羞與微物爭唐文粹互入髙舉遠覽本朝韓魏公言始學行已當如金玉不受微塵汙也遺事范忠宣公曰文輅與柴車較逐鸞鳯與䲭梟爭食連城與瓦石爭觸君子與小人鬭力不惟不能勝兼亦不可勝不惟不可勝雖勝亦非也范忠宣公行狀懍懍乎若處女之在閨也兢兢乎若懐千金之璧而行也東坡楊薦字説俗言彭祖觀井自係大木之上以車輪覆井而後敢觀東坡集射䑕何勞挽六鈞同上千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也東坡留侯論互入知所輕重明珠自有千金價莫與遊人作彈丸百斛明珠不知愛重經諸侯非問疾弔喪而入諸臣之家是謂君臣為謔禮運下堂而見諸侯天子之失禮也記郊特牲暴虎馮河死而無悔者語子以隋侯之珠彈千仭之雀莊史虞翻性疎直數有酒失又好抵忤人多見謗毁通鑑魏明紀集子厚少年勇於為人不自貴重顧籍謂功業可立就韓文墓誌控制有道經柔而不憂於斷者得所御也易畧例子邶詩曰執轡如組兩驂如舞孔子曰為此詩者其知政乎夫為組者総紕於此成文於彼言其動於近行於逺也執此法御民豈不化乎家語三恕周宣王之牧正役人梁鴛者能養禽獸雖虎狼無不柔馴鴛曰養虎之法順之則喜逆之則怒有血氣者之性也食者不敢以生物與之為其殺之之怒也不敢以全物與之為其辟之之怒也時其饑飽達其怒心虎之與人異類而媚養巳者也列聖主之治也順猶造父之御也和輯乎轡銜之際而緩急乎唇吻之和正度乎胷臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進能退履繩而還曲中規矩取道致逺氣力有餘誠得其術也淮南御得其道則天下狙詐咸作使揚子史車軌塵馬候蹄御者不失其馳榖梁英布與隋何歸漢至漢王方踞床洗而召布入見布大怒悔來欲自殺出就舎張御食飲從官如漢王居布大喜過望西漢英布傳韓信之下魏破代漢輒使人收其精兵滎陽以拒楚通鑑漢髙紀夫與人鬭不搤其亢音剛喉嚨也附其背未能全勝西漢婁敬傳韓信曰陛下不能將兵而善將將西漢韓信傳欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海内之勢如身之使臂臂之使指莫不制從通鑑漢文紀夫泛駕之馬跅弛之士亦在御之而已西漢武紀虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從西漢公孫𢎞傳羈縻勿絶西漢司馬相如傳冦鄧之髙勲耿賈之洪烈分土不過大縣數四所加特進朝請而已東漢二十八將論曹操曰吾任天下之智力以道御之無所不可通鑑漢獻紀呂布降曹公縳之呂布曰䋲縳我急曹公曰縳虎不得不急魏書魏劉曄曰釣者如中大魚則縱而隨之須可制而後牽之則無不得也通鑑魏紀崔浩曰夫擊蛇者先擊其首首破則尾不能掉通鑑宋太祖李崇徙兖州刺史兖土舊多刼盜崇命村置一樓樓皆懸鼓盜發之處亂擊之旁村始聞者以一擊為節次二次三俄頃之間聲聞百里皆發人守險要由是盜發無不擒獲通鑑齊太祖爾朱榮廏有惡馬榮命髙歡剪之歡乃不加羈絆而剪竟不蹄齧已而起曰御惡人亦如此馬北齊書豢擾虎狼而不拂其心則忿氣不萌通鑑勇者好行其志貪者急趨其利愚者不計其死通鑑唐太宗宿將教士皆王侯貴重子儀頤指進退若部曲唐書郭子儀傳荒服之外其叛不為之勞師其降不為之釋備嚴守禦使其為冦不能為臣不得唐突厥傳序傳使智使勇使貪使愚黄石公三畧十圍之牛為牧豎所驅論衡百馬齊轡御由造父魏明帝善哉行集射人先射馬擒賊先擒王杜詩閩悍而囂夷風脆急恩信綏之安然如蟄劉賔客帝王之任英傑皆御之以氣結之以恩不以英氣折之而寵以姑息則驕不可任不以恩愛結之而肅以禮貌則怨不為用李文饒集夫御英傑使猛將與見道義之人接方正之士不同也不可以繁禮飾貌游辭足去聲言是宜動開胷懐令見肺肝氣懾其勇恩結其心同上本朝千鈞之牛制於三尺之童弭耳而下之曽不如狙猿之奮擲於山林此其故何也蘇文嘗觀世之養物者不以全物與之牧羊者去其敗羣視其後者而鞭之養鷹者饑之山谷文控制失道經上失其道民散久矣論子張子譬猶御馬去其銜勒而專用箠策其不可制也必矣家語急轡數策者非千里之御也淮南御失其道則天下狙詐咸作敵揚子史晉郤缺曰叛而不討何以示威服而不柔何以示懐非威非懐何以示德左文七年内寵之妾肆奪於市外寵之臣僣令於鄙左昭二十年操持悖繆失其統與前漢倒持大阿授楚其柄西漢梅福傳撫御乖方通鑑唐德紀集駕蹇驢之無策又何路之能極楚辭執組者不制兮必折軛而摧轅同上記纂淵海卷五十四
