body:
  text: 記纂淵海卷八十二宋潘自牧撰字學部字經五曰六書注云六書象形會意轉注指事假借諧聲也周禮保氏子蒼頡觀鳥迹而成字鬼乃夜哭淮南子史蒼頡作書止戈為武漢書字有六義一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧效其形也形聲者以類為形配以聲也會意者止戈為武人言為信也轉注者以老為考也假借者數言同字其聲雖異其文意一也晉書自秦壊古文有八體一曰大篆史籀書二曰小篆李斯書三曰刻符即古繆篆四曰蟲書即鳥書書幡首象勢而書五曰摹印秦璽文也六曰署書漢蕭何所定以題蒼龍白虎二闕七曰殳書殳有八觚隨其勢書八曰𨽻書程邈所作徒𨽻之書王莽時使司空甄豐改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者也三曰篆書秦篆書也四曰佐書即𨽻書也五曰繆篆所以摹印也六曰鳥書所以書幡信也及許慎説文用篆書為正以為體例最可得而論也同上傳記則天好改新字有言國中有或或者惑也乞一武鎮之乃改作復言武在口中與困何異乃改作圀正字通篆籀八分𨽻章草草書飛白行書通謂之八體尚書故實鶴頭蚊脚二書皆漢詔板所用各象形也書法苑百體有懸針書垂露書秦王破塜書金鵲鵠頭書虎爪書倒薤書偃波書信幡書飛白書籀書繆書𫝊書制書列書日書月書風書署書蟲書葉書明書逢書天竺書楷書芝英𨽻花草𨽻鐘鼓𨽻仙人𨽻龍麒麟篆仙人魚蟲篆鳥篆鼠篆科斗篆復有大小篆牛書蟲書草書龍書猴書犬書雞書雲書雨書行書押書檝書藁書半草書奏召用虎爪為不可學以防詐偽告下用偃波書謝草用蚋脚書節信用鳥書朝賀用填書亦施於婚姻西域書起屍書右旋書蓮花書節分書大秦書䭾乗書牸牛書樹葉書闕覆書天書龍鳥等書六十四種簡秦書兼素書捨此之外書存猶一百二十體闕注五十六體書晉徐安子撰五十一體書勢蕭子雲撰隂陽分則有三元八會之文又有八龍雲篆光明之章也其後三皇之世演八會之文為龍鳳之章拘省雲篆之迹以為順形梵書破分二道壊真從易乃為六十四種之書遂播之三十六天上下也今三元八會太極清山之所用雲篆光明今所見神靈符書之字是也真誥書有十體較其優劣差之為神妙能之品居神品者二十有五妙品九十有八能品一百有七古今善書盡於是矣書斷真生行行生草真如立行如行草如走未有未能立能行而能妙於走者也志林集師宜八分之巧元帝三昧之章史籀李斯之篆梁鴻曹喜之書莫不總華桂宫盈滿甲館竊以為鸞驚之勢既聞之於索靖鷹踀之巧又顯之於蔡邕是以遊霧重雲𫝊敬禮之法鳥鵠魚鵷表揚泉之賦頗好六文多慙三禮尚方大篆既甚牢落柱下方書何曾髣髴空慕河間之聚書竟徴東平之獻表齊收尺牘顧已缺然北海楷𨽻終成難擬梁元帝上東宫古跡啟本朝古之字書皆從左文凡字其類在左其義在右如木類其左皆從木所謂右文凡如戔小也水之小者曰淺金之小者曰錢貝之小者曰賤皆以戔為義也筆談荆公著字説言一大為天一土為王日月為明且如以竹䇿馬如何不是篤東坡戲之曰以竹䇿犬有甚好笑同上評字史齊髙帝與王僧䖍賭書畢帝曰誰為第一對曰臣書臣中第一陛下書帝中第一帝笑曰卿可謂善自謀矣南史一或云帝問我書何如卿荅曰正書第一草書第二陛下草第二正書第三臣無第三陛下無第一帝大笑曰卿善為辭梁徐希秀謂王志為書聖蕭引善書陳宣帝嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其毛羽耳並同上沙門智永善王羲之書虞世南師焉妙得其體舊唐書歐陽詢初效王羲之書後險勁過之因自名其體尺牘所𫝊人以為法禇遂良亦以書自名嘗問虞世南曰吾書何如智永荅曰吾聞彼一字直五萬君豈得比遂良曰孰與詢曰吾聞詢不擇紙筆皆得如志君豈得比唐書貞觀永徽間虞世南禇遂良以書顓家後莫能繼薛稷外祖魏徵家多藏虞禇書稷鋭情臨倣結體遒麗遂以書名天下徐浩嘗書四十二幅屏八體皆備世狀其法曰怒猊抉石渴驥奔泉穆宗問栁公權用筆法對曰心正則筆正筆正乃可法矣帝改容悟其筆諫也其書法結體勁媚自目一家文宗命題殿壁歎曰鍾王無以加之嘗書京兆西明寺金剛經有鍾王歐虞禇陸諸家法自為得意吕向工草𨽻能一筆環寫百字若縈髮然世號連錦書並同上𫝊記梁武帝評書云鍾繇書如雲鵠遊天羣鳬戲海王羲之字勢雄逺如龍跳天門虎卧鳳闕書斷衛夫人正書入妙品如玉壺之氷瑶臺之月婉然芳樹穆若清風法書苑王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悦而舉體躁跳殊不可耐羊欣書如大家婢為夫人雖處其位而居止羞澁終不似真徐淮南書如南岡士大夫徒好尚風軌終不免寒乞阮研書如貴胄失品次不能復排突英賢王儀同書如晉安帝非不處尊髙而都無神施吳興書如新亭傖父一往見似揚州人共語便音態出陶隠居書如吳興小兒形雖未成長而骨體甚駿快殷均書如髙麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發如論經道人無細不言崔子玉書如危峰阻日孤松一枝有絶望之意師宜官書如鵰羽未息翩翩自逝韋誕書如龍威虎振劍抜弩張蔡邕書骨氣風逺爽爽為神鍾司徒書字十二種意外殊妙實亦多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衛常書如插花美人舞笑鏡臺孟光禄書如崩山絶崖人見可畏張芝驚奇鍾繇特絶逸少鼎能獻之冠世四夷其頽洪芳不滅羊真孫草蕭行范篆各一時妙絶鍾繇書若飛鴻戲海舞鶴遊天行間希宻實亦難過蕭思話書若墨連綿衣勢屈强若龍跳淵門虎卧鳳闕薄紹之書字勢蹉跎如舞妓低聲仙人嘯樹袁昂古今書評王子敬𨽻行草章草飛白五體俱入神八分入能書斷集智永禪師書骨氣深隠體兼衆妙精能之至反過疎淡歐陽率更書研𦂳抜羣尤工於小楷禇河南書清逺蕭散微雜𨽻體張長史草書頽然天放畧有㸃畫處而意態自足號稱神逸今世稱善草書者或不能真行此大妄也今長安有長史真書郎官石柱記作字簡逺如晉宋間人顔魯公書雄秀獨出一變古法如杜子美詩格尤天縱奄有漢魏晉宋以來風流後之作者殆難復手栁少師書本出於顔而能自出新意一字百金非虛語也東坡題唐六家書後楊凝式筆蹟雄强往往與顔行相上下今世多稱李建中宋宣獻書宋寒而李裕殆是浪得名惟蔡君謨書姿格既髙而學亦至當為本朝第一仇池筆記歐陽文忠言蔡君謨獨步當世此為至言君謨行書第一小楷第二草字第三大字為少疎也東坡蘭亭繭紙入昭陵世間遺墨猶雲騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山𫝊刻典刑在千載筆法留陽氷杜陵評書貴痩硬此論未公吾不憑短長肥痩各有態玉環飛燕誰敢憎同上篆書𫝊記按大篆者周宣王太史史籀所作也書斷籀文者史籀所作也與古大文篆小異後人以名稱書謂之籀文六書二曰奇字是也小篆者秦丞相李斯所作也增損大篆異同籀文亦曰秦篆並同上古文可為上古大篆為中古小篆為下古書評李斯妙篆省改之為小篆著蒼頡篇七章始皇以和氏之璧琢而為璽令李斯書其文今泰山及泰皇等碑並其遺跡李斯小入神大篆入妙蔡伯喈嵩山學書於石室内得一素書八角垂芒寫李斯并史籀用筆勢並同上石鼓文謂之周宣王獵共有十鼓其文則史籀大篆也法書苑梁昇卿善小篆吕總云如落玉隨珠皆得其妙同上蕭何善籀為前殿成覃思三月以題其額筆陣圖李陽氷善小自言斯翁之後直至小生國史補集緬想聖達立制造書之意於天地山川得方圓流峙之形於日月星辰得經緯昭回之度於雲霞草木得霏布滋漫之容於衣冠文物得揖讓周旋之體於鬢眉口鼻得喜怒慘舒之分於蟲魚禽獸得屈伸飛動之理於骨相齒牙得擺拉咀嚼之勢隨手萬變任心所成可謂通三才之氣象備萬物之情狀者矣李陽氷論古字體不類𨽻與科韓石鼔歌本朝秦始皇初并天下登瑯琊臺刻石頌秦徳二世復刻詔書其旁今頌詩亡矣而二世詔書具在江文勛好古善篆𨽻有絶人者其文字之工世亦莫及皆不可廢東坡集𨽻書𫝊記按𨽻書者秦下邽人程邈所作也邈得罪雲陽獄中覃思十年益小篆方圖而為𨽻書三千字奏之始皇用以為𨽻人佐書故曰𨽻書書斷鍾會尤工𨽻書飄然有凌雲之志嘗詐為荀勗書就勗母鍾夫人取寳劍同上王次仲者古之神仙也得李斯用筆意乃摹諸石置之超然臺上夫秦雖無道然當戰國之時以為世之篆文難於速就乃為𨽻書廣記庾肩吾按酈善長水經注臨淄人發古塜得銅棺棺外書齊太公六代孫胡公之棺唯三字古文餘同今書按胡公在春秋前即𨽻書興於周代明矣當時猶與古文相參程邈始廢古文而全用𨽻又丘光遲以𨽻書之興於周代謂亥有二首六身如布算之狀按此亥文則春秋已有𨽻書矣法書苑唐太宗工𨽻書師虞世南嘗患難於戈法一日書戩字乃空其落虞世南取筆填之帝以示魏鄭公曰朕學世南似盡其法鄭公曰仰觀聖作唯戩字戈法頗逼真上深嘆其藻識同上𨽻有繫石波最為難作書訣八分傳記按八分者秦羽人王次仲所作也王愔云王次仲以𨽻楷藏古今法書法書苑行書傳記按行書者後漢潁川劉徳升所造也行書即正書之小偽務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書著名鍾元常善行押書是也爾後王羲之獻之並造其極焉書斷胡昭與鍾繇並師劉徳升俱善於行草而胡肥鍾痩同上行書非草非真離方遁圓在乎季孟兼真謂之真行帶草謂之行草法書苑吳皇象善行草書世稱沉著痛快同上鍾胡二家為行書法今大行於世類要草書史漢興而有草書至章帝而齊相杜度號善作篇崔瓊崔寔亦皆稱工杜氏投字甚安而書體微痩崔氏甚得筆勢而結字小疎𢎞農張伯英因而精轉甚巧至今猶寳其書韋仲将謂之草聖伯英弟文舒者次伯英又有姜孟穎梁孔達田彦和及韋仲将之徒皆伯英弟子有名於世羅叔景趙元嗣者與伯英並時或云伯英自稱上比崔杜不足下方羅趙有餘張旭嗜酒每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼張顛初任為常熟尉有老人陳牒求判宿昔又求旭怒老人曰觀公筆奇妙欲以藏家耳因問所藏盡出其父書旭覽之天下奇筆也自是盡其法唐書傳記按草書者後漢徴士張伯英所造也梁武帝草書狀曰蔡邕云秦時諸侯相長羽檄相傳遂作赴急之書蓋今之草是也書斷長沙僧懐素自言草聖三昧國史補索靖草聖絶代名曰銀鉤蠆尾鄭䖍草書如風送雲收霞催月上張芝剙草作楷法字方八分書斷師宜官南陽人靈帝好書徵天下攻書於鴻都門至數百人八分稱宜官為最鍾頴書最妙者八分有魏受禪碑此為最也同上蔡邕工書篆𨽻尤得八分之精微書斷蔡文姬曰臣父云割𨽻字八分取二分割篆二分取八分故名八分張懐瓘云本楷字漸若八字分散故名八分法書苑八分有隼尾波最為難作書談韓擇木工八分師蔡邕法風流閑媚號伯喈中興蕭子良云漢靈帝時上谷王次仲與秦時同姓名也亦依八分書集碑之所形将垂久逺篆籀即至朴昧者難知行𨽻又太見涉於非敬惟八分得文質之至中二妙相兼經古今而不惑令狐楚與嚴少保書蒼頡鳥迹既茫昧字體變化如浮雲陳倉石鼓文已訛大小二篆生八分秦有李斯漢蔡邕中間作者寂不聞杜詩惜哉李蔡不復作吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元以來數八分潮也奄有二子成三人八分一字值萬金蛟龍盤挐肉屈强並同上阿買不識字頗知書八分詩成使之寫亦足張吾軍韓集楷書史上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小者方寸千言甚矜其能或不時前詣酒家飲因書其壁顧觀者以讐酒討錢足而滅之每書輒削其柎梁鵠乃益為版而飲之酒俟其醉而竊其柎晉書傳記秦羽人王次仲以𨽻書作楷法書斷王獻之字子敬幼學於父後改變制度率爾師心冥合天矩年五六嵗時學書右軍從後潛掣其筆不脱乃嘆曰此兒當有大名遂書樂毅論與之學竟能極小真書可謂窮微入聖書斷隋文帝曰妙書冠絶古今字之體勢一筆而成衛瓘索靖號一臺二妙瓘云我得伯英之筋恒得其骨靖得其肉恒謂衛恒杜預三世善草書並同集悲風生微綃萬物起古色杜甫詠張旭草書圖嗚呼東吳精逸氣感清識同上本朝顛張醉素兩禿翁追逐世好稱書工何曽夢見王與鍾妄自粉飾欺盲聾有如市井倡抹紅妖歌慢舞眩兒童謝家夫人淡丰容蕭然自有林下風天風蕩蕩驚跳龍山林飛鳥一掃空為君草書續其終待我他日無匆匆東坡題王逸少帖章草傳記按章草漢黄門令史史游所造也愔云漢元帝時史游作急就章解散𨽻體麄書之漢俗隨漸以行之是也書斷崔瓊善章草書師於杜度而媚輒過之㸃畫精微神變無礙王隱謂之草賢張伯英尤善章草韋仲将謂之草聖書評張旭章草類伯英時人謂之亞聖書斷史游作急就章蓋插𨽻之規矩存字之梗槩本草創之義謂之草書至建初中杜度善草章帝詔上章表令作草體始號章草法書苑羲之常以章草答庾亮亮示翼翼因與羲之書云吾昔有伯英章草數紙過江顛沛遂至忘失常歎妙迹永絶忽見足下答家兄書恍若神明還舊觀圖書薈粹飛白𫝊記按飛白書者後漢左中郎蔡邕所作也王隠王愔並云飛白變楷制也本是宫殿題署勢勁文字宜輕微不滿名既為飛白王僧䖍云飛白八分之輕者邕在鴻都門見匠人施堊帚遂創意焉書斷李嗣真云王逸少飛白猶霧縠卷舒煙空炤灼長劍耿介而倚天勁矢超忽而無地可謂飛白之仙法書吳張敬禮善飛白以為飄若浮雲激如驚電晉王廙善飛白書若鵰鶚之翅羽旌旗之卷舒蕭侍中飛白浄可愛令取掃帚沾泥汁中以書壁為方丈一字晻曖斐亹極有體勢㑹萃梁武帝謂蕭子雲曰蔡邕飛而不白羲之白而不飛飛白之間在卿斟酌耳尚書故實梁武帝造寺令蕭子雲飛白大書蕭寺至今一字存焉國史補集秋毫精勁霜素凝鮮玷此瑶波染彼松煙超工八法盡竒六文輕如遊霧重似崩雲鮑照翠箔映雪羅衣隨風崩雲委地游霧縈空類要煙霧交霏虯鸞縈動同上本朝仁宗飛白尤妙李唐卿撰飛白三百㸃以進上乃為清浄二字賜之其六㸃尤為竒絶又出三百㸃之外歸田録霏霏乎其若輕雲之蔽月翻翻乎其若長風之卷斾也猗猗乎其若遊絲之縈栁絮裊裊乎其若流水之舞荇蔕也東坡贊金牋洒飛白瑞霧縈長虹同上硯史栁公權嘗評硯以青州石未為第一言墨易冷絳州墨硯次之唐書𫝊記漢武帝賜青鐵硯是于闐國所獻博物志漢制天子以酒為書滴以玉為硯取其不氷西京雜記唐李衞公收硯至多其尤妙者名結鄰言與相結為鄰也開元錄内中有七寳硯鑪冬寒氷自消開元天寳遺事薛稷為硯封九錫拜離石鄉侯使持節即墨軍事兼鐵面尚書雲仙散錄徐𤣥之夜讀書見人物如粟米數百皆具甲胄擁一紫衣者行案上𫝊呼曰蚍蜉王欲觀魚於紫石潭漁具數十入硯中皆獲小魚異聞錄許漢陽遇龍女以白玉為硯玻瓈為匣硯中皆貯銀水博異志集採隂山之潛璞傅𤣥賦即方圓以定形鍛金鐵以為池木貴其能軟石美其潤堅加采漆之膠固含沖徳之清𤣥同上琉璃硯水長枯槁李白巨璞禹鑿餘杜詩其光或雷電其滑乃波濤同上文字之祥君家其曰韓髙仙君硯銘𢎞農陶泓毛穎傳栁州龍壁多秀石可觀栁文端州石工巧如神踏天磨刀割紫雲傭刓抱水含滿唇暗洒萇𢎞冷血㾗李賀紗帷晝暖墨花春輕漚漂沬松麝薰同上本朝硯四十餘品以青州紅絲石第一斧柯山第二龍尾石第三餘皆在中下雖銅雀臺古瓦硯列於下品特存古物耳端所出有四品嵓石為甲石屋次之西坑又次之後埜為劣而嵓石又分上下又有活眼死眼之别圓暈相重黄黑相間黳精在内晶瑩可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形體略具内外皆白殊無光彩謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼蘇易簡硯譜歙州石出於龍尾溪以金星為貴虢州澄泥唐人品硯以為第一今人罕用澤州道人吕翁作澄泥硯堅重如石上著名字李充伯得玉材琢為硯發墨可愛青州以熟鐵為硯甚發墨有柄可執世言端溪水中石其色青山半石其色紫山絶頂者尤潤如猪肝色者佳其貯水處有白黄色㸃者謂之鴝鵒眼脉理黄者謂之金線紋其山號斧柯端溪石硯之美正在於眼如木之有節今不知者乃以為石病吁可痛哉惟上嵓有眼眼之美者青緑黄三色相重多者自外至心凡九重其生於墨池之外者謂之髙眼生於内者曰低眼髙眼尤可尚以其不為墨漬常可睹也或云石有金線為美正其病也端溪有斧柯茶園将軍池同是一溪惟斧柯出者佳茶園次之将軍又次之並同上端石本以子石為上流俗𫝊訛遂以紫石為上然十無一二發墨者但充玩好而已歙石大抵多發墨以金星為貴端溪以北嵓為上龍尾以深溪為上較其優劣龍尾逺出端溪上而端溪以後出見貴爾歐公硯譜端溪有三種曰上嵓曰西坑曰後埜西坑硯三當嵓石之一後埜三當西坑之一東軒筆録唐林夫與余端硯一枚極佳但小而凸磨墨不甚便作硯者意待數百年後硯平乃便墨耳一硯猶須作數百年計而作事乃不為明日計可不謂大惑耶東坡淄石號韞玉硯發墨而損筆端石非上嵓者宜筆而褪墨二者當安所去取用褪墨硯如騎鈍馬數步一鞭數字一磨不如騎騾用瓦硯也澤州金道人澄泥硯多作投壺樣其首有吕字非刻非畫堅緻可以試金並同上君看龍尾豈石材玉徳金聲寓於石與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知東坡贈龍尾硯羅文歙人也上世隠龍尾山漢武帝召見叩擊之其音鏗鏗可聴上喜曰古所謂玉質而金聲者子真是也使待詔中書久之更拜舎人東坡萬石君羅文傳玉堂新樣世争𫝊况以蠻溪緑石鐫王荆公江上有石形色類石以為硯蘇子美詩云我疑此山石久為月照著老蚌吸月月降胎水犀望星星入角彤霞爍石變丹砂白虹貫岩生美璞子美集久聞閩石鴨頭緑可磨桂溪龍文刀莫嫌文吏不知武要識飽霜秋兔毫山谷琢雕山骨秀磨礲發光炯體潤雲氣生寒泉冽幽井平生心腹交陳𤣥與毛頴徳重不傾側中虛但明静置之几案上吾方日三省同上筆史晉王珣夢人以一大筆如椽與之既覺語人曰當有大手筆事晉書江淹夢人與五色筆由是文藻日新後又夢郭璞取去自後為詩絶無美者本傳歐陽通詢之子也以狸毛為筆覆以兔毫管用象犀非是未嘗書唐本傳和凝夢人以五色筆一束與之自是才思敏贍十九登進士第五代史史洪肇曰安朝廷定禍亂直須長鎗大劍毛錐子安足用哉同上傳記𤣥龜負圖出周公援筆以時文寫之尚書中候畨禺諸郡多以青羊毛為筆或用山雉豐狐之毫鼠鬚麝毛狸毛為被以為筆樹萱録有人以緑沉漆竹管及鏤管見遺斯亦可玩詎必以金玉哉嘗答牛亨之問曰蒙恬以枯木為管鹿毛為柱羊毛為被王羲之筆經昔人有以琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣同上紀少瑜嘗夢陸倕以一束青鏤管筆授之曰卿自擇其善者其文因此大進青箱雜記漢制天子筆以錯寳為跗毛皆以秋兔之毫西京雜記漢末一筆之匣雕以黄金飾以和璧綴以隋珠文以翡翠傅子石晉之末有一髙士每夜作筆付其家室至曉闔户而出以竹筒銜壁外向如引水者置錢其中則一管躍出筆盡雖官府勢要求之無復有也時人謂之仙筆四譜宣州諸葛氏能作筆栁公權求之先與二管語其子曰栁學士如能書當留此筆不爾退還即以常筆與之未幾果退還先與者二筆非右軍不能用也同上晉韋日好作筆王子敬得其筆歎為絶世書斷許漢陽遇龍女觀其筆白玉為管博異志智永禪師學書有秃筆頭十瓮取瘞之謂之退筆塜尚書故實嶺南嘗有郡牧得兔皮使工人製筆醉失之因剪已鬚為筆甚善便使為之工者以實對遂下令使一户輸人鬚或不能致輒責其直異物志有書生謁李林甫曰管子文後化為筆大唐遺事有僦馬生甚貧遇人與虎毛紅筆管一枝曰所須但呵筆即得之然夫妻之外令一人知則殆矣時方暑欲凝煙帳風篁扇皆呵而得之一日晩思兔頭羮連呵得數盤夫妻不能盡以與鄰家自是呵之無應纂異記薛稷為筆封九錫拜墨曹都統墨水郡王兼毛州刺史雲仙散録李仲甫賣筆遼東市一筆三錢如無錢亦與筆神仙傳集毛頴者中山人也秦始皇時蒙将軍恬南伐楚次中山圍毛氏之族抜其豪載頴以歸秦皇使恬賜之湯沐而封諸管城號曰管城子累拜中書令上嘗呼為中書君頴與絳人陳𤣥𢎞農陶泓及會稽楮先生友善其出處必偕後因進見上将有任使拂拭之因免冠謝上見其髮秃笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書耶因不復召歸封邑終於管城其子孫甚盛惟居中山者能繼祖父業韓毛頴傳韡韚彤管冉冉輕翰正色𤣥墨銘心寫言傅𤣥筆銘英華表玉笈佳麗稱珠網無如兹制奇彫飾雜衆象仰出寫含花横插舉仙掌幸因提拾用遂厠璇臺賞梁簡文帝夢筆深藏五色毫李義山截玉銛錐作妙形貯雲含霧到南溟尚書舊用裁天詔内史新将寫道經栁文本朝宣州諸葛氏筆擅名天下久矣縱其間不甚佳者終有家法如北茶内庫酒教坊樂雖弊精疲神欲强學之而草野終不可脫東坡一沐管城頴為把栗尾書溪藤蒼鼠奮鬛飲松腴並同上墨𫝊記楚王靈䕫造紅白二墨及書寫衣服黑衣用白書白衣用紅書自成一家大唐龍髓記盧杞與馮盛相遇於道各攜一囊杞發盛囊有墨一枚杞大笑盛正色曰天峰煤和針魚腦入金溪子手中録離騷古本比公日提綾文刺三百為名利奴顧當孰勝已而捜杞囊果是三百刺許芝有妙墨八㕑巢賊亂瘞於善和里第事平取之墨已不見唯石蓮匣存焉並同上𤣥宗御案墨曰龍香劑一日見墨上有小道士如蠅而行上叱之曰臣墨之精黒松使者也凡世人有文者其墨上皆有龍賔十二上神之乃以墨分掌文官陶家瓶餘事墨文如履皮磨之有油暈者一兩可染三萬筆成老相墨經墨染三年字紙不能昬暗者為上同上李廷珪造墨其堅如玉其紋如犀文房四譜懐化郡掘塹得石墨甚多精好可寫書廣州記漢尚書令僕丞郎月給隃麋墨大小二枚西京雜記南朝以墨為螺為量為丸為枚陸雲與兄書送墨二螺梁科律御墨一量十二丸漢官儀令僕丞郎賜墨一枚北户録薛稷為墨封九錫拜松燕督䕶𤣥香太守兼亳州諸郡平章事是日墨吐異氣結成樓臺雲仙散録集故藉翰林以為主人子墨以為客卿以風長楊賦上黨碧松煙夷陵丹砂末蘭麝凝珍墨精光乃堪發古詩絳人陳𤣥韓文墨則上黨松心江淹賦本朝陸士衡與士龍書云登銅雀臺得曹公所藏石墨數瓮今分渠一螺沈郎中師鄜延以石燭作墨堅重而黒在松煙之上曹公所藏豈此物耶仇池筆記王晉卿造墨用黄金丹砂墨成價與金等同上唐末墨工李超與子庭邽本姓奚江南賜姓李氏庭珪字者偽也遯齋閑覽石昌言蓄李庭珪墨不許人磨或庭邽始名庭珪故世有奚庭珪墨又有李庭邽墨人或戲之曰子不磨墨墨将磨子今昌言墓木拱矣墨固無恙可為好事之戒坡集庭珪墨有劍脊圓餅面多為龍紋嘉祐中仁宗以此墨賜近臣曰新安香墨其後翰林承㫖賜者皆雙脊龍樣尤為佳品涑水燕談山谷取小錦囊中有墨半丸以示潘谷谷隔囊手之曰天下之寳也出之乃李庭珪墨又别取小錦囊有墨一丸谷手之如前歎曰今老矣不能為之出之乃谷少所作墨其精如此邵氏後錄此墨足支二十年但恐風霜侵髮齒非人磨墨墨磨人缾應未罄罍先恥坡詩徂徠無老松易水無良工珍才取樂浪妙手惟潘翁魚胞熟萬杵犀角盤雙龍墨成不敢用進入蓬萊宫書牕拾輕煤佛帳拂餘馥辛勤破千夜收此一寸玉並同上紙史自古書契多編以竹簡蔡倫乃造意用樹膚麻頭及敝布魚網以為紙故天下咸稱蔡侯紙後漢書傳記左伯字子邑甚能造紙漢興有紙代簡至和帝時蔡倫工為之而子邑尤得其妙書斷南朝以紙為畨為幅為枚湘東王上荆武紙萬幅筆四百枝簡文帝奉紅牋二千畨又云送四色紙三萬枚荅湘東王也比户録晉宋間有一種紙長丈餘世謂前紙同上宋亳間有紙織成界道者謂之烏絲欄紙國史纂要紙取東陽魚卵虛柔而滑浄者墨藪蕭成採野麻土榖作五色斑紋紙法書苑陟釐乃水中苔取以為紙名苔紙青黄色晉武帝賜張華側理紙即陟釐也語訛謂之側理本草楊炎在中書後閤糊忩用桃花紙塗以水油鳳池篇毛重教授於道江春日主人宴之賦散語曰蟣肝之奉何堪龍首之攀可望主人曰吾勸以陸源鯖賞以栁綿紙文房寳飾治紙之昬而不染墨者用雨㸃螺磨紙左右三千計其病去矣姜澄十嵗時父苦無紙澄乃燒糠熁竹為之以供父澄小字洪兒鄉人號洪兒紙童子通神録紙之善者蜀之金花魚子十色版皆為佳矣國史補澄心堂紙為天下之冠硯譜石虎詔書以五色紙著鳳雛口中鄴中記琅玕紙十幅可為禮墨子嗣雜俎薛稷為紙封九錫拜楮國公白州刺史統領萬字軍畧道中郎将雲仙散録集皎白猶霜雪方正若布棊宣情且記事寧同魚網時後梁宣帝三十六鱗充使時數畨猶得寄相思段成式與温庭筠云藍紙詩會稽楮先生韓文剡溪多古藤樹方春且死問溪人有言溪中多紙工斬代無時今士人自言能文者其數與麻竹相多孰非書剡藤者耶雖舉以天下為溪猶不給況一溪也予謂今錯為文者皆閼剡藤者也舒元輿悲剡溪古藤文雖復鄴殿鳳銜漢朝魚網平準桃花中宫榖樹同以慙兹靡滑謝此鮮華劉孝威謝官紙啓本朝昔人以海苔為紙今無復有今人以竹為紙亦古所無有也東坡山谷為范子黙求染鴉青紙詩云學似貧家老破除古今迷望失三餘極知鵠白非新得謾染鴉青襲舊書山谷深如女髮蘭膏罷明似山頭夜月餘為染溪藤三百个待渠湔拂一床書同上陽山老藤截玉昉烏孫翠竹避寒光羅侯包贈室生白明於機上之流黄愧無征西蠆尾手為寫黄門急就章變溪印藤卷盈百側理羞滑繭羞白並前人剡藤開玉板坡詩牋史陳後主常使張貴妃等八人夾坐江總孔範等十人預宴號曰狎客先令婦人襞采牋製五言詩十客一時繼和南史韋陟常以五色牋為書記使侍妾主之其裁荅受意而已唐書𫝊記柏𤣥詔平準作桃花牋及縹緑青赤者法書苑武公愛妾曰非煙以金鳳牋寫詩寄象象以剡溪玉葉紙賦詩以謝之非煙傳非煙授趙象以連蟬錦香囊并碧苔牋同上薛濤好製小詩惜其幅大乃狹小之後減諸牋皆小名曰薛濤牋雞肋集明皇命李龜年持金花牋宣賜李白開元天寶遺事蜀中有松花牋金沙紙流沙紙彩霞紙金粉紙龍鳳紙近年皆盡唯十色牋尚在牧堅談閑又王廷詩有五色板羅隠喜筆工萇鳳即贈鴈頭牋百幅龍鬚記本朝川紙取布頭機餘經不受緯者治作之故名布頭牋此紙冠天下六合人亦作終不及爾東坡筆架𫝊記蘇頲有一錦紋花石鏤為筆架每天欲雨即津出如汁開元天寶遺事李白遊慈恩寺寺僧捧牌乞詩白題訖僧獻𤣥沙鉢緑英梅檀香格海墨徵言集管插銅龍還笑王生之壁庾肩吾謝啓若九疑之争出吳均賦琉璃硯格終日隨身翡翠筆牀無時離手玉臺序水滴𫝊記廣州王去疾發晉靈公塜得玉蟾蜍一枚大如拳容五合水光潤如新玉西京雜記秦嘉婦與嘉書曰今奉金錯盌一枚可以盛書水世説集鑄兹靈龜體象自然含源吐水有似清泉潤彼𤣥墨染此柔翰申情寫意經緯羣言傅𤣥水龜銘宫硯玉蟾蜍杜詩玉蠩吐水霞光静彩翰揺風絳錦鮮劉禹錫本朝上賜羅文髙麗所獻銅瓶為飲器東坡著羅文傳界方筆槽集有借界尺筆槽而破其槽者白其主人曰韓直木如常孤竹君無恙但半面之交忽然折節矣主人大笑王維集記纂淵海卷八十二
