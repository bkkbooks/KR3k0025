body:
  text: 記纂淵海卷九十一宋潘自牧撰香藥部香傳記沈香青桂香馬蹄香鷄骨香煎香同是一本細枝緊實為青桂香黒而沈水為沈香半沈浮為鷄骨香最麄為煎香又云沈者為沈浮者為檀似鷄骨為鷄骨香似馬蹄為馬蹄香似牛頭為牛頭香最麄者為踐香本草薫陸出天竺單于二國其木生于海邊沙上盛夏木膠流出沙上乳香亦其類也廣志波斯國松木脂有紫赤如櫻桃者名乳香薫陸之類也今人無復别通謂乳香為薫陸耳又云乳香是薫陸中乳頭也今松楓脂亦皆如是檀香生南海有黄白紫之異蘇合香從西域及崑崙來又云大秦國採得蘇合香先煎其汁以為香膏乃賣其滓然則廣南貨者其經煎煉之餘乎或云師子矢北人欲貴重之故飾其名耳降真香出黔南拌和諸香燒煙直上天召得鶴盤旋於上並同上婆利國有婆律樹髙八九丈瘦者出龍腦肥者出婆律香又云一木五香根旃檀節沈香花鷄舌膠薫陸雜爼龍腦香出婆律斯國木形如杉木木中脂似白松脂作木膏乃根下液亦謂之婆律膏同上龍涎香出大食國國人候島林上有異禽翔集下有羣魚游泳則有伏龍吐涎浮水上舟人或探而得之則為巨富其涎如膠髙竇等州産生結香山民見香木曲榦以刀斫損經年香溜復鋸取之刮去白木其香結為斑㸃名鷓鴣斑倦游錄取大甲香如崑崙耳者酒煮蜜入諸香中用四時纂要本朝山谷論香有謂聞思香取楞嚴經觀音所言從聞思修入三摩地因以名香螺生雲南者大如掌青黄色取黶燒灰合香者多用之謂能發香也山谷詩注天香滿袂人知否曾到旃檀小殿來東坡早知百和俱煨燼未信人言弱勝剛詠沈香石銀葉燒香見客邀水沈煙斷佩聲微薫衣漸歎衙香少東夷初識令君香㐮陽記季和事旃檀婆律海外芬西山老臍栢所薫嵇康云麝食香故香也並前人床帷夜氣馥衣桁晩煙凝並前人生藥經醫師聚毒藥以供醫事記子堇也桔梗也鷄壅也豕零也莊子堇烏頭也鷄壅鷄頭也豕零木猪苓也神農嘗百草之滋味一日而七十毒淮南子又孔叢子作七十二毒大㦸去水葶藶愈脹用之不節乃反為病同上史陸彰曾嬰重病藥中須桑螵蛸不忍害物遂不服焉北史傳記神農以赭鞭鞭百草盡知其毒及寒温氣味所主搜神記椒薑禦温蒲益聰巨勝延年威喜辟兵孝經援神契藥有宣通補泄輕重澁滑燥濕十種如宣可去壅即薑橘之屬是也通可去滯即通草防己之類是也補可去弱即人參羊肉之類是也泄可去閉即葶藶大黄之屬是也輕可去實即麻黄葛根之屬是也重可去怯即磁石鐵粉之屬是也澁可去脫即牡礪龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也補注本草陶隱居云藥有宣通補泄輕重澁滑燥濕十種今解之惟寒熱二種何獨見遺如寒可去熱大黄朴消之屬是也如熱可去寒附子桂之屬是也同上上藥養命謂八石鍊形六芝延年也中藥養性謂合歡蠲忿萱草忘憂也下藥除疾謂大黄除實當歸止痛也博物志藥者五行之英華地之津液也十纖芳草之氣美石藥之氣悍二者其氣急疾堅勁故非緩心和人不可以服此二者素問集食豆令人重榆令人瞑合歡蠲忿萱草忘憂嵇康養生論玉札丹砂赤箭青芝牛溲馬勃敗鼔之皮俱收並蓄待用無遺者醫師之良也韓文是訾醫師以昌陽引年欲進其豨芩也同上是故經中黄苓以類馬尾蠶首言人參者似人形附子八角甘遂赤膚若果土宜乃善則當云某所某所不當又云某者良也栁文論石鍾乳書余病痞且悸謁醫視之曰唯茯神為宜明日買諸市烹而餌之病加甚召醫而尤其故醫求觀其滓曰吁盡老芋也彼鬻藥者欺子而獲售子之懵也而反尤於余不以過乎余蔑然慙慨然憂推是類也以徃則世之以芋自售而病乎人者衆矣又誰辨焉辨茯神文本朝我夢羽人頎而長兮惠而告我藥之良兮喬松千尺老不僵兮流膏入土龜蛇藏兮得而食之夀莫量兮於此有草衆所嘗兮狀如狗虱其莖方兮夜炊晝曝久乃藏兮茯苓為君此其相兮我興發書若何符兮乃瀹乃烝甘且腴兮補填骨髓流髪膚兮東坡服胡麻賦明年採藥天台去更欲題詩滿浙東靈苗與毒草疑似在毫髪細斸黄土栽三稏人參也小圃傍城郭閉門芝术香芎藭生蜀道白芷來東南地黄食老馬可使光鑒人掃白非黄精輕身豈胡麻巧語屢曽遭薏苡廋辭寧復托芎藭並同上熟藥經若藥弗瞑眩厥疾弗瘳書君有疾飲藥臣先嘗之親有疾飲藥子先嘗之記許悼公瘧飲世子止之藥卒左傳康子饋藥拜而受之曰丘未達不敢嘗語子南榮趎曰里人有病里人問之病者能言其病病然其病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已莊羿請不死之藥於西王母姮娥竊以奔月淮南史灌夫身中十創適有萬金良藥故不死前漢韓康字伯休采藥名山賣於長安市口不二價三十餘年時有女子就康買藥康守價不移女子怒曰公是韓伯休那乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為遁入山中後漢羊祜與吳將陸抗對壘使命交通抗嘗病祜饋之藥抗飲之無疑心人多諫抗抗曰豈有酖人羊叔子乎通鑑傳記周昭王晝夢羽人以指畫王心應手而裂王乃驚悟因患心疾旬日忽見所夢者來語王曰先欲易王之心乃出方寸綠囊之中有藥以摩王臆王疾即愈拾遺記願諸衆生得阿伽佗藥以是藥力能除一切無量惡毒涅槃經凡散藥有云刀圭者十分方寸之一准如梧桐子大也本草刳麝剸犀驅曳邪惡飛丹煉石引納清和同上大荒中日月所入有靈山十巫百藥爰在類要王孫綽一劑藥可以愈偏枯欲倚之以生殊死之人則不可也同上或戲賣藥翁有大還丹賣否曰有一粒一千貫錢皆笑之又謂人曰無人肯把錢買今須自喫却藥纔入口足下五色雲生飛而去廣記集藥餌扶吾隨所之杜詩藥殘他日裹看題檢藥囊多病所須惟藥物悵望金匙藥囊中藥未傳藥纂西極名並同上本朝良藥不甘口厥功免沈痾六一集探懐得真藥不待君臣佐東坡千金得竒藥何須魏帝一丸藥悟彼善知識妙藥應所投並同上巫師司民命藥石不入市山谷記纂淵海卷九十一
