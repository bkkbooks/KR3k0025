body:
  text: 思想經寤言不寐願言則嚏詩終風箋云今俗人嚏云人道我古之遺語也愛而不見搔首踟躕詩靜女瞻彼日月悠悠我思道之云遠曷云能來詩雄雉瞻望弗及實勞我心詩燕燕莫往莫來悠悠我思詩終風云誰之思西方美人詩簡兮中心搖搖中心如醉中如噎詩黍離誰謂河廣一葦杭之誰謂宋遠跂予望之詩何廣子心若懸於天地之間莊子外物去人滋久思人滋深莊子六國時張敏與高惠二人為友每相思不能得見敏便於夢中往尋但行至半道即迷不知路遂回如此者三韓非子史引領北望日月以冀左昭七無日忘之閔閔焉如農夫之望歲左昭三十心搖搖如懸旌而無所終薄戰國策今吾每飯意未嘗不在鉅鹿也通監漢文紀隔闊相思發於寤寐東漢臧洪傳劉惔夜在簡文座愀然嘆曰清風朗月恨無玄度晉書玄度高士許詢也鏡與人俱去鏡歸人不歸無復嫦娥影空餘明月輝世說范蠡既去越越王乃使良工鑄金象范蠡置之坐側後漢趙曄吳越春秋集覽涕而佇眙楚辭夜炯炯而不寐魂營營而至曙楚辭望孟夏之短夜何晦明其若歲惟郢路之遠兮魂一夕而九逝楚辭望風懷想荅蘇武別如俯仰脫若三秋選子建朔風詩神往同逝感形留悲參商陸雲詩每一念來忽若有遺文選江文通雲中辨江樹天際識歸舟文選搔首訪行人引領冀良覿謝靈運詩離居幾何時鑽燧忽改火選詩顧望脰懸文選視陰數箭周弘讓書岐路分襟易風雲促膝難駱賓王風月虛心形留神往山川在目室邇人遠駱賓王故人不可見漢水日東流王維集願作陽臺一片雲李太白集相思無晝夜東泛似長川相思相見知何日此時此夜難為情太白千里若在眼萬里若在心相思千萬里一書直千金天涯有度鳥莫絕瑤華音李太白集相思望斗牛孟浩然渭北春天樹江東日暮雲何時一樽酒重與細論文杜詩山岳移可盡江海不可絕離恨若空虛窮年思不徹元微之朝朝寧不食日日願見君一日不得見愁腸坐氤氳如何遠相失各作萬里雲萬一樓頭望還應望我愁殷勤眼前水千里到河陽安得故人生羽翼飛來相伴醉如泥元微之思君秋夜長一夜魂九升思君春日遲一日腸九迴白侍郎自從花顏去秋水無美蓉蛾眉別久心知否兩處春光同日盡居人思客客思家風波不見三年面書信難傳萬里腸遠地官長親故少些些談笑與誰同遊山弄水攜書卷看月尋花把酒杯六事盡思君作伴幾時歸到洛陽來並白侍郎悠悠我之思擾擾風中纛韓文居閑處獨時往日來于懷也韓文與足下別久矣以余心之思足下知足下懸懸於余也韓文孟東野書嶺樹重遮千里目江流曲似九回腸柳詩感時江海思劉賓客料得孟光今日語不曾春盡不歸來元微之久別思款顏承歡懷接袂劉義南望空垂淚天邊鴈一行許用晦往款良未遂來覿曠無音韋應物離心與潮信每日到潯陽劉長卿相思煙水外唯有心不隔劉長卿潮歸人不歸劉長卿時復一延首憶君如眼前劉長卿從此日相思空令減衣帶徘徊正佇想髣彿如蹔覿心目徒自親風波尚相隔劉長卿君意如鴻高的的我心懸旆正搖搖杜牧之舊國日邊遠故人江上稀張承吉文相思巫山渚悵望雲陽臺休上人怨昔時初種庭前樹樹已勝巢人未歸方雄飛文本朝雖大旱望雲執熱思濯未喻其急也東坡集歸舟天際常回首從此頻書慰斷腸山谷寸步不往來千里常夢思山谷三歲公門不屢過作牋詩復問如何及茲去去翻為恨向使常常肯謂多後山百書不如一見面後山經秋以為期詩氓昏以為期詩東門之楊五日為期六日不詹詩采綠期逝不至小雅杕杜史魏文侯與群臣飲酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可以一會期哉通監威烈王紀范式與張元伯為友二人春別京師以暮秋為期元伯以九月十五日殺雞以待母曰相去千里汝何信之也言未卒而至後漢互見不輕然諾經我徂東山滔滔不歸我來自東零雨其濛詩東山式微式微胡不歸詩式微豈不懷歸畏此簡書詩小雅出車子在陳曰歸與語公冶長狐死正丘首記檀弓下子去魯曰遲遲吾行也去父母國之道也孟子章下去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣去人滋久思人滋深莊子徐無鬼鳥飛反鄉依其所生文子鳥飛反鄉兔走歸窟狐死首丘淮南子說林訓史楚鍾儀囚於晉與之琴操南音左傳互見熟如難忘越人莊舄仕楚在病楚王曰舄越之鄙人必思於越使人往聽之果為越吟史記互見熟如難忘項王欲東歸曰富貴不歸故鄉如衣繡夜行漢書遊子悲故鄉萬歲後吾魂魄猶樂思沛漢書高紀願為黃鵠兮歸故鄉前漢西域傳班超久在絕域年孝思土上疏曰臣不敢望酒泉郡但願生入玉門關東漢本傳飛鳥過故鄉猶躑躅徘徊唐書傳記太上皇不樂關中思慕鄉里高祖徙豐沛立為新豐縣三輔舊事陸機夏在洛忽思東頭竹篠之飲語劉寶曰吾思鄉轉深矣語林集狐死必首丘兮夫人孰能不反其真情楚辭注念舊居也過故鄉而一顧兮泣歔欷而霑衿楚辭歸骸舊邦莫誰語者楚辭鳥飛反故鄉楚辭悲故鄉而發憤去余邦之彌久楚辭遊子悲其故鄉心愴悢以傷懷班彪北征賦詠南音以顧懷選南都荊南非我鄉何為久留滯七哀貽此越鄉憂還都道中營營懷茲土贈從兄雖信美而非吾土兮曾何足以少留王仲宣賦音尼父之在陳有歸與之歎音鍾儀幽而楚奏莊舄顯而越吟人情同於懷土豈窮達之異心王粲登樓賦孤獸思故藪離鳥悲舊林陸士衡贈從兄願假歸鴻翼翻飛浙江汜陸士衡贈顧彥先詩感念桑梓域髣彿眼中人陸士衡荅張士然丘去魯而顧嘆季過沛而涕零潘安仁西征賦豈伊不懷歸于枌榆選西京賦流波戀舊浦行雲思故山張景陽雜詩誰能久京洛緇塵染素衣謝元暉酬王晉安人情懷舊鄉客鳥思故林王正良詩故鄉籬下菊今日為誰開江摠永懷戀故園選謝靈運擬詩王鮪懷河岫晨風思北林選詩刷羽同搖漾一舉還故鄉文選詩徒懷越鳥志眷戀想南枝文選詩有情知望鄉誰能鬒不變謝靈運戀本難為思文選詩願言還故鄉畏此簡書忌鄉夢隨魂斷駱賓王青山白日非舊國之春秋翠斝清樽是他鄉之杯酒同前馬上逢寒食途中屬莫春可憐江浦望不見洛橋人宋之問詩嶺外逢寒食他鄉不見餳洛陽新甲子何日是清明沈佺期詩長安如夢裏何日是歸期李太白不見鄉書傳鴈足王維集吳越數千里夢寐今夕見形骸非我親衾枕即鄉縣張九齡文心逐書郵去離魂今夕夢先繞舊林飛同前月是故鄉明杜詩成都萬事好豈若歸吾廬杜詩安得如鳥有羽趐託身白雲還故鄉杜詩青紫雖被體不如早還鄉杜詩夢鄉歸未得不用楚詞招杜詩歸心折大刀杜詩眉間黃色見歸期韓文如何連曉語柢是說家鄉韓文鄉禽何事日來此令我心憶桑梓間柳詩海畔尖山似劍鋩秋來處處割愁腸若為化得身千億散上峰頭望故鄉柳詩萬里望枌榆之鄉劉禹錫如何春來夢合眼在鄉社白樂天故鄉貧亦安白侍郎鄉思急於絃白傳集春來愛有歸鄉夢一半猶疑夢裏行元微之互入別离迢旅魂歸去遠元微之集鄉心正欲絕何處擣寒衣劉長卿望家千里劉長卿賓館有魚為客久鄉書無鴈到家遲許用晦關河萬里秋風急望見鄉山不到家許用晦向夜欲歸心萬里故園松月更蒼蒼孤夢家山遠獨眠秋夜長同前春風一夜吹鄉夢夢逐春風到洛城武伯蒼何時得鄉信每日筭歸程王建詩一夕九起嗟夢短不到家孟郊故國春歸未有涯小欄高檻別人家五更惆悵回孤枕猶自殘燈照落花司空圖鄉思楚雲間錢起文憑君莫射南來鴈恐有家書寄遠人杜牧之巫峽啼猿數行淚衡陽歸鴈幾封書高達夫青山無限好猶道不如歸唐詩人言落日是天涯望斷天涯不到家巳恨碧山相隱映碧山更被暮雲遮江南李覯詩本朝旅病愔愔如困酒鄉愁脈脈似連環臨川三年無日不思歸夢裏還家旋覺非坡詩萬里家山一夢中人貪歸路好坡詩樂莫樂於還故鄉東坡互見還舍徂年慕桑梓歸念寄鴻鵠欒城集歸鴈南飛盡無因寄此情山谷深知報消息不忍問何如後山久客登樓目中年懷舊心後山初聞北人語意作故鄉聲後山望鄉仍受歲後山元日詩未有一夜夢不歸千里家零陵總記經瞻望弗及泣涕如雨詩燕燕遵大路兮摻執子之手兮詩遵大路子子高遊趙有鄒文李節者與相友善及將還魯文節送行三宿臨別流涕交頤子高抗手而已謂其徒曰始吾謂二子丈夫耳乃今知其婦人也人豈鹿豕也哉而常群聚乎孔叢子史馬為立踟躕車為不轉轍觀者皆歔欷行路亦嗚咽東漢列女傳王猛將行造慕容垂飲酒從容謂垂曰今當遠別何以贈我使我睹物思人通監晉海西公下謝安嘗謂王羲之曰中年傷於哀樂與親友別輒作數日惡羲之曰年在桑榆自然至此當藉絲竹常恐兒輩覺損其歡樂之趣晉王羲之傳集悲莫悲兮生別離楚辭離家日趣遠衣帶日趣緩心思不能言腸中車輪轉古樂府歌詩遊子嘆黍離處者嘆式微曹子建作詩別如俯仰脫若三秋曹子建朔風詩送君南浦傷如之何江文通賦黯然銷魂者唯別而巳知離夢之躑躅意別魂之飛揚分手而銜涕攀桃李兮不忍別惟世間兮重別驅征馬而不顧意奪神駭心折骨驚江文通賦離別腸應斷相思骨合銷陳後主侍兒碧王詩互入張望行舟有限嗟此會之難留別日無期嘆分岐之易遠陳子昂集雲離雨散奔馳於宇宙之間朱遠燕遙泣別於關山之際陳子昂集雲雨俄別風壤異鄉駱賓王流水不窮浮雲自遠霑襟此別把袂何時駱賓王黯然銷魂豈非生離之恨駱賓王故人樽酒掩離涕於交頤駱賓王互入祖餞嗟別路之難駐惜離樽之易傾駱賓王互入祖餞數年同筆硯茲日間衾禂孟浩然送別彊為歡李太白軔識怨兮方緩駟知愁兮復鳴李太白斷腸聲裏唱陽關李商隱丈夫非無淚不洒離別間杖劍對樽酒恥為游子顏蝮蛇一螫手壯士疾解腕所思在功名離別何足嘆陸昌蒙生別古所嗟發聲為爾吞杜詩朔鴈傳書絕湘筠染淚多李義山文人世死前唯有別同前別腸車輪轉一日一萬周離思春冰泮瀾漫不可收韓文萬里尚能來遠道一程那忍便分頭元微之集遠征不必戍長城出門便不知生死元稹集丈夫雖鯁介遠別多苦顏韋應物集別離何從生乃在親愛中從此一分手緬想吳與秦韋應物集但令此身健不作多時別白傳集風煙里數少雲雨別情多劉賓客黃葉一離一別青山暮暮朝朝明日行人已遠空餘淚逐歸潮劉長卿江海逢君少東南別處長獨行風嫋嫋相去水茫茫劉長卿想到郵亭愁駐馬不堪西望見風塵離心日遠如流水回首長川共落暉離別寒江上潺湲若有情離心與流水萬里共朝昏劉長卿獨過潯陽去潮歸人不歸手折衰楊悲老別故人零落已無多劉長卿少年輕會復輕離老大關心總是悲李嘉祐文互見趍向不同別家三日幾般心杜荀鶴集離歌漸怨如留客歸夢初驚似到家許用晦文離情雨飄斷不異風中絲張文昌萬里故人去一行新鴈來張承吉文楚岸柳何窮別愁紛若絮杜牧之遠風南浦萬重波未似生離恨別多杜牧之願得雙車輪一夜生四角唐文粹別腸多鬱紆豈能肥肌膚始知相結密不及相結踈踈別恨應少密離恨難袪唐文粹預愁更漏促離別在明朝唐人詩本朝群鷺方盛集離鴻獨高翔歐公集
