body:
  text: 失機經由辯之不早辯也易坤卦今不取後世必為子孫憂語季氏互入噬臍何及子慮不先定臨事而謀不亦晚乎家語夫鴻鵠之未孚於卵也一指蔑之則靡而無形矣及至其筋骨之已就而羽翮之所成也則奮翼揮𦒎凌乎浮雲背負青天膺摩赤霄翱翔乎荒忽之上掀揚乎虹蜺之間雖有勁弩利矰微繳蒲沮之子巧亦弗能加也淮南子史一日縱敵數世之患也左僖三十二臧宣叔曰當其時不能治後之人何罪左宣十六亡羊而補牢戰國策子胥不蚤見主之不同量是以至於入江而不化史樂毅傳不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎史呂不韋傳張耳曰吾聞天與不取反受其殃咎通鑑秦紀本無殃字張良陳平說曰漢有天下太半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也通鑑漢高祖互入投機晁厝為內史東出不便更穿一門南出南出者太上皇廟堧垣也申屠嘉請誅厝厝恐夜入宮上謁上曰厝所穿非真廟垣故冗官居其中且又我使為之嘉謂長史曰吾悔不先斬厝乃請之為厝所賣通鑑漢文紀張良曰不因其幾而取之所謂養虎自遺患也前漢高紀袁紹多謀少決失在後事通鑑漢獻紀所謂一日縱敵患在數世也通鑑三國魏文初劉備在許與曹公共獵獵中眾散關羽勸備殺公備不從及至夏口飄颻江渚羽怒曰往日獵中若從羽言可無今日之困蜀志羊祜曰當斷不斷天與不取豈非更事者恨於後時哉晉書本傳互入懲創集差池一步一生休元微之集一失毫釐千萬年韋應物集傳記操刀不割太公六韜本朝方籍之渡河沛公始整兵向關籍於此時若急引軍趍秦及其鋒而用之可以據咸陽制天下不知出此而區區與秦將爭一旦之命既全鉅鹿而猶徘徊河南新安間至函谷則沛公入咸陽數月矣而卒都彭城使沛公得還定三秦楚雖百戰百勝尚何益哉老泉集經擬之而後言議之而後動君子安其身而後動易其心而後語定其交而後求並易繫辭若虞機張往省括于度則釋書太甲上慮善以動動惟厥時書說命中詳乃視聽書蔡仲之命醫不三世不服其藥記曲禮上可言也不可行君子弗言也可行也不可言君子弗行也記緇衣文理密察記中庸季文子三思而後行語公冶長子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行語雍也康子饋藥拜而受之曰丘未達不敢嘗翔而後集並語鄉黨注回翔審觀而後下止夫子時然後言樂然後笑義然後取語憲問子智不務多必審其所知家語知不務多務審其所知言不務多務審其所謂行不務多務審其所由荀子史非死者難處死者難史藺相如傳上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此西漢石奮傳度不中不發發即應弦而倒前漢李廣傳聖人萬舉而萬全前漢伍被傳傳聞不如親見視景不如察形東漢馬援傳吳呂岱戒諸葛恪曰世方多難子必每事十思吳志周于謹曰三思而言九慮而行通鑑梁紀非萬全不謀非百克不鬭唐書陸贄傳集夫子曰片言折獄者其由也與夫子之言蓋非之也後之人不窮聖旨以為夫子美於季路任一時之見輕而折獄者十有八九焉古之帝王將刑一人猶歷三槐歷九棘訊群臣訊群吏訊萬民億兆絕議然後致刑猶於朝於市於野昭然與眾棄之所以不易也歐陽詹集鋤艾恐傷蘭溉蘭恐滋艾白樂天文本朝夫人固有一死兮處死之為難東坡屈原廟賦熟路長驅聊緩步百金一發不虛弦後山詩經若跣弗視地厥足用傷書說命上史楚王昧於一來左襄二十五晉叔向曰無釁而動可謂無謀左昭十三互入無謀以一人譽召臣一人毀去臣恐天下有識者聞之有以窺陛下前漢季布傳談何容易前漢東方朔傳丁綝卒子鴻當襲封上書稱病讓國於弟盛不報既葬乃挂衰絰於冢廬而逃去友人九江鮑駿遇鴻於東海讓之曰昔伯夷季札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絕父不滅之基可乎鴻感悟垂涕乃還就國通鑑漢明紀以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪通鑑唐德宗集不量鑿而正枘楚辭擇焉而不精語焉而不詳韓文原道經知進退存亡而不失其正易乾卦括囊無咎易坤卦全身遠害王風君子陽陽既明且哲以保其身詩訪落國無道其默足以容記中庸邦無道則愚語公冶長危邦不入亂邦不居語泰伯邦無道危行言孫語憲問邦無道卷而懷之語衛靈公子功成名遂身退天之道出老子魚鼈黿鼉猶以淵為淺而掘其中鷹鳶猶以山為卑而巢其上荀子法行持寵處位終身不厭之術主尊貴之則恭敬而僔卑道也主信愛之則謹慎而嗛興歉同主專任之則拘守而詳謹守戢事主安近之則慎比而不邪荀子仲尼可以保身可以全生可以盡年莊子養生鳥獸不厭高魚鼈不厭深莊子庚桑楚鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患莊子應帝王鴻飛冥冥弋人何慕焉楊子遜于不虞以保天命揚子問明史祭仲以智免左傳子產曰無過亂門左昭十九賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也賓孟曰雞其憚為人用乎左昭二十三生於亂世貴而能貧民何求焉可以後亡左襄二十二范蠡事越王滅吳反國以為大名之下難以久居乃浮海出齊變姓名自謂鴟夷子史記鄒陽枚乘浮於危國然卒免刑戮者以其言正也史本贊秦始皇使王剪伐蜀請美田宅園池甚眾或曰將軍之乞貸甚矣剪曰秦王怚音粗而不信人今空秦國甲士而專委我我不多請田宅為子孫之業以自堅固令秦王坐而疑我矣史本傳蘇秦說燕王曰臣居燕不能使燕重而在齊則燕重通鑑周紀聞大王有意督過之脫身獨去史項羽紀張耳以智全史本贊張良入謝曰沛公不勝杯杓不能辭通鑑漢高紀箕子佯狂接輿避世史鄒陽傳願棄人間事欲從赤松子遊耳史張良傳呂須數讒陳平於呂后曰丞相不治事日飲醇酒戲婦人人一作女平聞日益甚漢書李邑盛稱班超擁愛妻抱愛子安樂外國無內顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻通鑑漢章紀梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變姓名為吳市門卒云通鑑漢平紀北海逄萌謂友人曰三綱絕矣不去禍將及人即解冠掛東都城門歸將家屬浮海客於遼同上東平王蒼自以至親輔政聲望日重意不自安前後累上疏稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就蕃國辭甚懇切帝乃許蒼還而不聽上將軍印綬通鑑漢明紀北海敬王睦少好學光武及上皆愛之嘗遣中大夫詣京師朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣敢不以實對睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰墮聲色是娛犬馬是好乃為相愛耳其智慮畏謹如此通鑑漢明紀夏馥聞張儉亡命嘆曰孽自己作空汙良善一人逃死禍及萬家何以生為乃自剪鬚變形入林慮山中范滂謂殷陶等曰今子相隨是重吾禍也通鑑漢靈紀司馬懿少聰達多大略操聞而辟之懿辭以風痺操怒欲收之懿懼就職通鑑漢獻紀申屠蟠曰當戰國之世處士橫議列國之王至為擁篲先驅卒有坑儒焚書之禍今之謂矣乃絕跡於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮受刑者數百人唯蟠超然免於疑論後漢申屠蟠傳或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也後漢郭太傳雲中白鶴非鶉鷃之網所能羅也魏志邴原傳北海王袞謹慎好學文學防輔遂具表稱陳袞美袞聞之大驚懼責讓文學曰脩身自守常人之行耳而諸君乃以上聞是適所以增其負累也通鑑三國魏又互入遠慮少府蒯欽楊駿之姑子也數以直言犯駿它人皆為之懼欽曰楊文長雖闇猶知人之無罪不可妄殺不過踈我我得踈乃可以免不然與之俱族矣通鑑晉惠帝紀汜騰屬天下兵亂去官還家歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族晉書阮籍本有濟世志屬魏晉之際天下多故名士少有全者由是不與世事遂酣飲為常晉書本傳互入知幾後周于謹自以久當重權功名既立願保優閑乃上先所乘駿馬及所著鎧甲等北史本傳互入知幾侍中謝朏求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹為書曰可力飲此勿豫人事通鑑齊高宗王晏外弟尉氏阮孝緒亦知晏必敗晏屢至其門逃匿不見嘗食醬美問知得於晏家吐而覆之通鑑齊高宗互入遠慮楊慎矜知御史中丞事時李林甫專權公卿之進有不出其門者必以罪去之慎矜由是固辭不敢受通鑑唐元宗上就李泌飲酒同榻而寢泌曰臣今報德足矣復為閑人何樂如之上曰柰何遽欲去乎泌曰臣有五不可留願陛下聽臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太高跡太奇此其所以不可留也通鑑唐肅宗郭子儀為上將擁強兵程元振魚朝恩讒謗百端詔書一紙徵之無不即日就道由是讒謗不行通鑑唐德宗郭子儀遭讒惎奪兵柄朝聞命夕引道無纖介自嫌全身高節爛然獨著唐書郭子儀贊互入無愧裴度晚節頗浮沉為自安計唐書本贊蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊讒間將興繕甲訓士非吾輩之所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已通鑑後梁均王互入遠慮魏公子無忌自知再以毀廢乃謝病不朝與賓客為長夜飲飲醇酒多近婦人日夜為樂飲史本傳傳記司馬徽居荊州以劉表必有變思退縮以自全每與語但言佳其妻責以無別徽曰如汝所言亦復甚佳終免于難襄陽記孔鳥愛羽虎豹愛爪所以輔其身也說苑王允之年在摠角為從伯敦所知嘗夜宴允之辭醉眠在別床敦與鳳謀逆允之悉聞其語便於眠處大吐敦以為大醉不復疑晉中興書互入穎悟集鸞鳳翔於蒼雲兮故繒繳不能加蛟龍潛於旋淵兮身不挂於網羅知貪餌而近死兮不如下游於清波全命避害不受世患並楚辭鳳鳴高岡以遠罻羅選陳琳檄不懷寶以招害不飾表以招累張華鷦鷯賦游必擇地翔而後處不入陷阱不離網罟西涼武王麒麟頌蕭條兩翅蓬蒿下縱有鷹鸇柰爾何李白集宿鳥擇深枝潛魚不銜鉤走鹿無反顧短翮惟願巢深叢並杜詩螻蟻謀深穴鳥得辭籠不擇林並白傳集冥鴻不下非吾意杜牧之常恐性坦率失身為杯酒近辭痛飲輩折節萬夫後杜工部青雲上了無多路卻要徐驅穩著鞭白侍郎本朝黠蠶不作繭未老輒自僵永謝湯火厄冷然超無方東坡詩
