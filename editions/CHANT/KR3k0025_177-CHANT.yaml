body:
  text: 思慕經哀哀父母生莪劬勞詩蓼義無父何怙無母何恃出則銜恤入則靡至同上詩云明發不寐有懷二人謂父母也記祭義君子已孤不更名記曲禮下先王之孝色不忘乎目聲不絕乎耳心志嗜欲不忘乎心致愛則存致愨則著著存不忘乎心思念也記祭義霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵愓之心如將見之同上其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已故哭泣辟踊盡哀而止矣記問喪三年之喪二十五月而畢哀痛未盡思慕未忘記三年問思其居處思其笑語思其志意思其所樂思其所嗜記祭義孝子親死悲哀志懣故匍匐而哭之若將復生然安可得奪而歛之也故曰三日而后歛者以俟其生也記問喪子仰視榱桷俯察几筵其器皆存而不覩其人以此思哀則哀可知矣家語五儀互入感傷樹欲靜而風不停子欲養而親不待往而不來者年也不可再見者親也家語致思史服除思慕終身如喪南史郭世通傳金日磾母教子有法上嘉之母死詔圖畫於甘泉宮日磾每見畫常拜嚮之涕泣乃去西漢本傳集臨穴呼蒼天涕下如綆縻選詠史邈終天其不返文選念過隙之焂忽悲逝川之不停踐霜露之悽愴懷燧榖而涕零梁武孝思賦膝下之歡已同過隙几筵之慕幾何可憑任彥昇啟露往霜來日月其除左太沖吳都賦永懷鞠養之恩長增思慕之痛駱賓王濡露踐霜誰無永懷劉賓客霜降露濡孝思罔極白傳集詞意書䟽無不宛然惟是魂神不知去處每開一卷刀攪肺腸每讀一篇血滴文字同上音容若在曷日而志李習之怵愓乎霜露唐文粹金日磾見圖而泣元稹集經春秋匪懈享祀不忒詩吉蠲為饎是用孝享禴祠烝嘗于公先王詩天保祭以清酒從以騂牡享于祖考小雅信南山苾苾芬芬祀事孔明詩薦歲事於皇祖儀禮春秋薦其時食中庸祭之日入室僾然必有見乎其位周還出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎歎息之聲孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之此猶先時也虛中言不兼念餘事以其恍惚以與神明交庶或饗之仲尼嘗奉薦而進其親也愨其行也趍趍以數祭者所以追養繼孝也並記祭義薦新如朔奠記檀弓上春秋祭祀以時思之孝經注寒暑變易益用增感時祭展其孝思也子祭祀事其神也荀子禮論能存亡形屬荒絕者惟齋乎注祭如在楊孝至史祀者所以昭孝事祖通神明也西漢郊祀志經適墓不登隴記曲禮上適墓不歌孔子曰古不脩墓並同上孔子既合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺記曲禮下葬於墓所以即遠也記檀弓上延陵季子子死葬於嬴博之間其坎深不至於泉既葬而封廣輪揜坎其高可隱也既封左袒號者三曰骨肉復歸于土命也記檀弓下孔子曰衛人之祔也離之祔謂合葬也離之有以間其槨中魯人之祔也合之善夫墟墓之間未施哀於民而民哀骨肉歸于土並記檀弓下墳墓不培記喪服四制成子高曰生有益於人死不害於民吾其可以死害於人乎哉我死則擇不食之地而葬我焉記檀弓上夫子曰吾見封之若堂者矣築上為壟見若坊者矣形旁殺平上見若覆夏屋者矣茨瓦也夏屋今之門廉也見若斧者矣形旁殺刃上而長從若斧者焉孔子以刃上難登狹又易為功馬鬣封之謂也俗名記檀弓上易墓非古也芟治草木同上卜其宅兆而安厝之孝經子淪於無形之中甘瞑大宵之宅淮南子史白楊多悲風蕭蕭愁殺人史記韓信葬母行營高燥地令旁可置萬家西漢本傳積貯炭葦諸下里物西漢延年傳孟康曰死者歸蒿里葬地下故曰下里趙臺卿先自為壽藏圖季札子產晏嬰叔向四像居賓位又自畫其像居主位東漢趙岐傳范訓母亡以布囊盛土負以成壙謝永後漢書原涉自以為前讓南陽賻送身得其名而令先人墳墓儉約非孝也乃大治起冢舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏阡費用皆是富人長者西漢本傳地底冥冥長無曉期東漢張奐傳負土成墳謝永後漢書初陶侃微時丁艱將葬家中忽失牛而不知所在遇一老父謂曰前崗見一牛眠山汙中其地若葬位極人臣矣又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因葬其處以所指別山與訪訪父死葬焉果為刺史自訪以下三世為益州四十一年如言云晉書周虓傳晉許孜親沒柴毀負土成墳晉書負土作墳宋躬孝子傳石室號曰千里堂後魏書窀穸既終求安體魄唐呂才論通監唐紀互入葬溫大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我將含笑入地唐書感慕之所魂神之宅新唐書呂才傳傳記凡葬必於高陵之上以避狐狸之患水泉之濕則善矣呂氏春秋凡葬而無墳謂之墓方言言不封也德音未遠拱木已積建康實錄滕公往東門馬跼不進跑地成坎公命掘之得石郭銘文曰佳城鬱鬱三千年見白日吁嗟滕君居此室歎曰天也後葬其地西京雜記連堈隱幹狀如亂雲望之翽翽絕而復連小頓大起千里相牽壽過期頤世世登仙圖墓書集窈窈玄宇三光不入潛闥一扄尊靈永蟄曹植誄墳壟日月多松柏鬱茫茫文選車馬行埋魂幽石委骨窮塵鮑照賦荒草何茫茫白楊亦蕭蕭幽室一已閉千年不復朝陶淵明挽詩殯宮已肅清松柏轉蕭瑟潘黃門詩閟重扄於穸壤蕭昕昭明太子哀策壽宮寂遠文選策文夷體壽原同上墓門兮肅肅脩壟兮峨峨潘安仁寡婦賦蔓草縈骨拱木歛魂江文通恨賦閉骨泉裏同上松檟成行文選碑且為樹枌檟文選覩陳根宿草而哭同上東首瑩園即宮長夜文選齊故安陸碑開石室營壽宮陳子昂集荒郊踈古木寒隧積陳荄駱賓王千秋掩夜臺佳城無白日並同上晨登太山北望蒿里松楸骨寒草宿墳毀李白擬恨賦去夏屋之渠渠即孤丘之峨峨權載之集惟餘松柏隴朝夕起餘煙張說之互見挽死生何所道託體同山阿陶潛瞻望不見寂寥空山唐文粹手足胼胝成此高墳排土濡涕頓首成墳陷膺腐眥寒暑在廬草木悴死鳥獸蜘蟵殊類異族亦相其哀並同上佳城日易曛劉長卿怜君孤冢在雙峰埋骨窮泉復幾重白露空沾九原草青山獨閉數株松劉長卿夜臺茫昧亦知否李白集竟埋岱北骨不返巴東魂白侍郎夜入壽宮長同上光照幽壤白傳集墳荒草已陳墓濕土猶新窅窅窮泉埋寶玉並同上蒿閉不復開孟東野龍門原上土埋骨不埋名劉賓客陰堂是夜古木非春文苑英華楊盈川詩日月照臨於佳城煙雲變態於神道唐文粹黃泉無曉日青草自知春寒山詩本朝土山宛轉屈蒼龍下有槃槃蓋世翁後山外大父墓詩瀧岡阡歐公集阡名載版圖東坡崗連夏屋木拱秦原晏類要過而下馬空瞻董相之陵酹以隻雞誰副橋公之約東坡集程德林求先墳思成堂歸真亭詩又葉待制求先墳求慕亭詩並見東坡詩敘新阡長宿草行路拜豐碑欒城經魯人之贈三玄二纁儀禮賵奠於死生兩施同上既夕禮注孔子過衛遇舊館人之喪夫子入哭之出使子貢脫驂而賻之禮記弔喪弗能賻不問其所費記曲禮上子柳之母死子碩欲以賻布之餘具祭器子柳曰不可吾聞之也君子不家於喪請班諸兄弟之貧者記檀弓上讀賵非禮也伯高之喪孔子之使者未至冉子攝束帛乘馬而將之孔子曰異哉徒使我不誠於伯高並記檀弓上子吾惡乎涕而無以將之家語子貢問賻賵所以佐生贈禭所以送死荀子大略史原涉父死讓還南陽賻送西漢本傳車馬曰賵衣衾曰禭錢財曰贈公羊傳錢財曰賻穀梁傳傳記知生則賻知死則賵賻之為言助也賵之為言覆也輿馬曰賵貨財曰賻玩好曰贈決其意也衣被曰禭養死具也贈稱也禭遺也春秋說題辭經古之葬者不封不樹後世聖人易之以棺椁易繫辭改葬緦謂墳墓以他故崩壞將亡失尸柩也必服緦者親見尸柩不可以無服緦三月而除之儀禮喪服夫子制於中都四寸之棺五寸之椁記檀弓送形而往迎精而反記問喪篇國子高曰葬者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁記檀弓專道而行記雜記上助葬必執紼記曲禮送葬不避塗潦同上葬日虞弗忍一日離也是日也以虞易奠記檀弓上葬不為雨止記王制柩不早出不暮宿記曾子問季武子成寢杜氏之葬在西階之下請合葬焉武子曰合葬非古也自周公以來未之有改也記檀弓上季子皋葬其妻犯人之禾記檀弓下塗車芻靈自古有之束茅為人馬謂之靈者神之類禮記檀弓竹不成用尾不成味木不成斲琴瑟張而不平笙竿備而不和有鐘磬而無簨簴其曰明器神明之也銘明旌也以死者為不可別已故以其旗識之並記檀弓既夕哭請啟期告于殯宿與設盥于祖廟門外儀禮子及至葬四方來觀之顏色之戚哭泣之哀弔者大悅孟子滕文公上葬埋其形也荀禮論史己丑葬我小君敬嬴兩不克葬庚寅日中而克葬春秋宣七年鄭簡公卒將為葬除及游氏之廟子產使辟之司墓之室有當道者子太叔請毀之子產弗毀左傳昭十二年兩不克葬禮也禮卜葬先遠日左傳宣公七年孔光薨上賜轀輬及副各一乘輓送車萬餘兩道路皆舉音以過喪西漢劇孟母死自遠方送葬蓋千乘西漢本傳啟滕公之佳城西漢韋元成庾亮將葬何充會之歎曰埋玉樹於土中晉書本傳玄甲啟路郭子儀家傳孔子葬母於防墳四尺延陵季子葬其子封墳掩坎其高可隱故仲尼孝子而延陵慈父其葬君親骨肉皆微薄矣非苟為儉誠便於體通鑑漢成紀德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚立隴彌高發掘必速同上昭明太子葬其母丁貴殯遣人求墓地之吉者葬畢有道士云此地不利長子若厭之或可申延通鑑梁高祖窀穸既終永安體魄通鑑唐太宗互見阡隴昔楊震趙咨等咸以薄葬知其識去身貴易朽耳夫厚葬之家流于俗以侈靡為孝令死者戮尸暴骸可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩何用破貲徇侈乎吾亡歛以常服四時衣各一稱新唐書姚崇傳互入儉約傳記祖於庭何奪孝之思也祖始始載於庭也乘車辭祖禰故為祖載也白虎通集祖莫斯開容車戒路潘岳誄公主明燎守夜竦紼俟晨同上埏埴為塗車束薪作芻靈陸機詩先遠戒日文選行狀魂輿寂無響文選挽歌輤裧就路張薦誌去夏屋之渠渠即孤丘之峨峨權載之集互見阡隴大夜有行白傳集遠日有時同上有翩其旗爰舉裳帷行道遲遲望墓而婦柳宗元靈車遠去玄堂蹔開同上笳簫喧曉葆輅翳陌李吉甫作杜佑碑悲風吹雨濕銘旌方雄飛文集互見挽靈輀迴軌白驥悲鳴王仲宣誄文哀嗟道路涕慕里鄰柳文紼翣交橫逐去魂杜牧之自從儀仗辭蘭路風引笳簫入柏城白集本朝千兩鄉人會葬車歐公集
