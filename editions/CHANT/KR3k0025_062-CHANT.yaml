body:
  text: 尚氣子不膚撓不目逃思以一豪挫於人若撻之於市朝孟子惡聲至必反之並孟視泰山如彈丸抱朴子有死之榮無生之辱吳子史一飯之德必償眥睚之怨必報史范睢傳丈夫生不五鼎食死即五鼎烹西漢主父偃傳男子之所死者一言耳同上薛宣為丞相朱雲往見之宣曰田野無事且留我東閣可以觀四方奇士雲曰小生欲相吏耶宣不復言朱雲傳大將軍青既尊黯與亢禮汲黯傳頡頑以傲世東方朔傳東方朔云如以臣言無可用則宜捐棄無空索長安之米並西漢同上袁紹曰天下健者豈惟董公引佩刀橫揖徑出通鑑東漢用氣自行多所陵折其敗必也同上陳容曰仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日而生也漢獻帝紀孔融負其高氣志在靖難而才踈意廣訖無成功禰衡少有才辯而尚氣剛傲孔融薦之於曹操同上袁紹坐作聲價東漢輕死重氣怨惠必讎黨錮傳序太常种拂與李儒戰而死子劭徵為少府鴻臚皆不受曰我父盡忠於朝而為時所妬父以身殉國為賊臣所害為臣子不能除賊何面目復覲明主張璠漢紀尚氣剛傲矯時慢物禰衡傳漢拜關羽為將軍羽聞黃忠為後將軍怒曰丈夫終不與老兵同列不肯拜三國蜀志互入藐視立氣勢作威福結私交以立彊於世者謂之遊俠通鑑西漢武帝紀卞延之為上虞令有剛氣會稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今已投之卿以一世勳門而傲天下國士拂衣而去齊書策既被創醫言可治當好自將護百日勿動策引鏡自照謂左右曰面如此當可復建功立事乎椎几大奮創皆分裂其夜卒吳志秦樊世謂王猛曰吾輩耕之君食之耶猛曰非徒使君耕之又將使君炊之通鑑晉紀蔡廓初召為吏部尚書與傳亮曰選事若悉以見付不然不能拜也亮以語錄尚書徐羨之羨之曰黃散以下悉以委蔡自此以上宜共參同異廓曰我不能為徐干木書紙尾遂不拜同上殷羨為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沈者自沈浮者自浮殷洪喬不為致書郵殷浩傳劉琨與祖逖為友聞逖用曰吾常恐祖生先吾著鞭晉書吞胡虜無異口中蚤虱東漢王莽傳宋蕭惠開曰人生不得志與死人何異通鑑北齊元景曰丈夫寧可玉碎何能瓦全同上崔湜自比東晉王導謝安之家謂人曰吾之門及出身歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人唐書崔儦每以讀書為務忽略世人大署其戶曰不讀五千卷書者不得入此室隋書劉又持韓愈金數斤去曰此諛墓中人得耳不若與劉君為壽愈不能止唐書高恭之曰人生當夕脫羊裘朝佩珠玉後魏傳記漢高祖過陳留酈生求見上曰吾方以天下為事未暇見大儒酈生自言高陽酒徒非儒者也楚漢春秋公孫瓚曰天下兵起我謂可唾掌而決九州春秋夏侯稱每讌氣陵一座世說苻堅議伐晉曰吾之眾投鞭於江足斷其流吾當內斷於心矣崔鴻前秦錄互見自負性耐刀槊不堪鞭捶同上李元忠初謁齊高歡未即見之謂門者曰公今方召英俊聞國士到不能吐哺輟洗其慢可知可還吾刺勿通也雞跖集皇甫湜為裴度作福先寺碑度約千緍酬之湜怒曰何相待之薄也某之文非常流之文也曾與顧況為序外未嘗輒許人其碑約三千字每字三疋絹今減五分錢不得裴令依數酬之湜受之無愧色唐闕史李稹嘗以爵位不如族望官至刺史與人書唯稱關西李稹李肇國史補生以辱不如死以榮大戴禮曾子制言篇張祐謁李紳自稱釣巨鰲客李盛怒曰以何為竿曰以虹為竿以何為鉤曰以月為鉤以何為餌曰以短李相為餌紳默然厚贈之大唐遺事集重氣輕命感分遺身文選七啟雖死之日猶生之年廋元規表互見節操負材矜地自謂坐致雲霄文選劉孝標辨命論意氣之間靡軀不晦同上盧子諒書挽弓當挽彊用箭當用長杜甫詩英心甘鬭死義肉恥庖宰韓文罷去如棄涕唾無一分顧藉心同上居十日而不敢進謁者誠以左右無先為容也懼閣下以眾人視之則殺身不足以滅恥徒悔恨於無窮與鳳翔邢尚書書並韓文野夫怒見不平事磨損胸中萬古刀劉義義死天亦許利生天亦嗔同上人生須氣健飢凍縳不得姚合不作浮萍生寧為藉花死杜牧之江東進士李飛赴吏部試吏大呼其名飛因袖手不出明日返江東同上伊昔皋澤之詩亦有雲霄之志苟效用之得所雖殺身而何計張九齡文不欲曲肱安穀終兒女子手孫可之酒酣氣振求試自矜傍如無人中若有憑劉賓客輕生一劍知劉長卿一言知已重片義殺身輕同上可使寸寸折不能繞指柔唐文粹名盛氣高少所卑下劉賓客千鈞之弩一發不中則當摧橦折牙永息機用安肯效碌碌者蘇而復上哉范傳正作李白墓銘死辱片時痛生辱長年羞唐文本朝唐進士張彖氣高大未嘗低折於人嘗曰大丈夫有蓋世之志而拘於下位若立身於矮屋中使抬頭不得遂拂衣遯於嵩山東坡詩注史意豁如也常有大度不事家人生產作業西漢高祖紀一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟袁盎傳互見高誼細故芥蔕何足以疑賈誼傳大人者不牽小名以成大功同上並西漢內無關鑰通鑑三國魏志蔣濟志節慷慨常有超越江湖吞吳會之志魏志張嘉貞性簡疏與人不疑內曠如也唐書本傳丈夫以氣相許小嫌不足置胸中尉遲敬德傳臧希讓骯髒好談時政代宗實錄並唐書王述為楊州刺史初至主簿請諱報曰亡祖先君名播海內遠近皆知內諱不出門餘無所諱晉書本傳集慷慨則氣成虹蜺文選顏公三十萬盡付酒家錢李白破產供酒錢盈門皆食客皇甫湜意氣相許駱賓王神傾意豁真佳士杜甫詩心事犖犖開口一吐出胸中之奇韓文俸祿入門與其所過逢飲酒歌舞連日夜不厭或分挈以去一無所愛惜不為後日毫髮計留也鄭郡墓誌同上家散萬金酬士死身持一劍荅君恩劉長卿襟韻苦超越杜牧之季布金諾延陵劍許其容溫然而不修邊幅其中曠然而不施侷鐍並李義山氣將然諾重心向友朋開張說之文本朝授館不為他日計解衣真出故人情後山李晟曰釋舊惡於杯酒之間續世說史今日廷論局趣效轅下駒張晏曰俯頭於車轅下隨母而已西漢灌夫傳蓄縮不可用同上息夫躬傳集縮首不出猶鼎鱉耳縮縮循墻兒並杜牧之經鷙蟲攫摶不程勇者引重鼎不程其力記儒行衽金革死而不厭北方之強也記中庸子子路曰由願得一隊而敵之必也攘地千里搴旗執馘惟由能之夫子曰勇哉家語勇士不忘喪其元孟子史齊國固入晉師曰欲勇者賈余餘勇左傳晉魏犨傷束胸見使者距躍三百曲踊三百僖二十八楚白公曰市南有熊宜僚者若得之可以當五百人矣哀十六吳伐魯魯微虎欲宵攻王舍私屬徒七百人三踊於幕庭吳子聞之一夕三遷哀八勇士不避難史記勇士不怯死而滅名魯仲連傳燕國有勇士秦舞陽年十三殺人人不敢忤視荊軻傳趙毛遂至楚歷階而上楚王怒叱曰胡不下遂按劍而前曰王之所以叱遂者以楚國之眾也今十步之內王不得恃楚國之眾也王之命懸於遂手吾君在前叱者何也通鑑周紀項羽喑鳴叱咤千人皆廢西漢本傳瞋目張膽同上張耳傳師古曰勇甚梟俊禽敵通鑑西漢傳介子至樓蘭王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之通鑑豬突豨勇以為銳卒同上漢平帝紀操謂賈詡曰程昱之膽過於賁育矣同上漢獻帝紀袁紹遣其將顏良攻東郡關羽望見良麾蓋策馬刺良於萬眾之中斬其首而還紹軍莫能當者同上劉備明旦自來至趙雲營視昨戰處曰子龍一身都為膽也同上關羽張飛萬人之敵蜀志本傳肝腦塗中原膏液潤埜屮而不辭也西漢司馬相如傳勇者臨敵不悅生吳志蔡裔有勇氣聲若雷震嘗有三盜入室裔拊床一呼而盜俱隕晉書互見有意對無意馬仙碑曰有前死一尺無卻生一寸通鑑梁武紀互見英烈韓長鸞瞋目張拳有噉人之勢同上陳紀高開道有矢鏃在頰召醫取之乃鑿骨置揳其間骨裂寸餘竟出其鏃開道奏妓進膳下輟通鑑唐高祖攘袂徇國天下風靡唐書李光弼傳鼓行海內麾定四方唐書李靖傳傳記荊次非得寶劍涉江至中流有兩蛟夾繞其船次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劍而已遂攘臂祛衣拔劍赴江刺蛟殺之而復上舟中之人皆獲全呂氏春秋勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣響動於天說苑集義勇冠三軍李陵書威噞秋霜選左太沖魏賦威懾兕虎莫之敢伉張平子西京賦樊抗憤以卮酒咀彘肩以激揚潘安仁西征賦眥血下沾襟怒髮上衝冠盧子諒覽古詩鋒捍特起選檄趫材悍壯同上控劍叱咤八荒奔馳陳子昂集雷電之震虎豹之擊同上千里霧合一呼雲屯駱賓王擁拔山超海之雄驅躍景騰霄之騎同上子雖軀幹小老氣橫九州挺身艱難際張目眡寇讎杜詩互見不以貌取吹噓而霜露變化叱咤而風塵消弭唐文粹掣開流電有輝光突過浮雲無定跡元稹名冠壯士籍元微之勢猛破堅摧剛排健合檢經有力如虎執轡如組詩簡兮奡盪舟論語憲問子力能裂犀兕之革曳九牛之尾猶憾其弱列子觸不周之力折天柱絕地維同上千鈞之重烏獲舉之而輕多力耳楊子脩身篇注千鈞之輕烏獲力也楊子史犖有力焉能投蓋于稷門左莊三十二叔山冉摶人以投中車折軾成十六齊高固入晉師桀石以投人禽之而乘其車成二晉伐偪陽懸門發聊人紇抉之以出門者狄虒彌建大車之輪而蒙之以甲以為櫓左執之右拔戟以成一隊孟獻子曰詩所謂有力如虎者也襄十楚子期抉豫章以殺人注以效其多力豫章大木哀十六年惡來有力史秦紀注手裂虎兕朱亥力士袖四十斤鐵椎椎殺晉鄙通鑑周紀武力鼎士西漢鄒陽傳力扼虎李廣傳力拔山兮氣蓋世項籍傳力扛鼎空手摶熊彘猛獸戾太子傳投石拔距絕於等倫甘延壽傳許褚勇力絕人漢末汝南賊萬餘人攻褚飛石擲之所值皆摧碎偽與賊和以牛與賊易食賊來取牛牛輒奔還褚乃出陳前一手逆曳牛尾行百餘步三國魏志本傳亙石虔趫捷絕倫於獵圍中見猛獸被箭而伏石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸晉書秦淮南王苻生力舉千鈞手格猛獸走及奔馬擊剌騎射冠絕一時通鑑晉哀帝紀羊侃膂力絕人所用弓至二十石馬上用六石梁書蒼頭犀角大刀其鋒甚銳通鑑陳宣帝紀北齊事傳記奡能陸地行舟白帖烏獲扛鼎舉千鈞白帖集批熊碎掌拉虎摧斑文選七啟攫戾執猛納堅摧剛張平子南都賦迴天倒日之力力盪海而拔山選吊文力排南山李白梁甫吟握鉤伸鐵撫梁易柱皮日休鹿門隱書本朝擊強如摧枯山谷力能抉關孔帖
