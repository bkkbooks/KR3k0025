body:
  text: 壽考經綏我眉壽黃耇無疆詩烈祖黃髮台背閟宮黃髮兒齒同上俾爾壽而臧俾爾耆而艾萬有千歲眉壽無有害同上壽考維祺以介景福行葦永錫難老伴水令德壽豈蓼蕭九十雖得人不煖百年曰期頤壽考曰卒記曲札九十飲食不離寢膳飲從於遊可也九十者其家不從政九十者天子欲有問焉則就其室以珍從王制仁者壽語子長於上古而不為壽莊天道壽者期之遠耳無期故無所稱壽長於上古而不為老大宗師道之無不在也在老為無老廣成子脩身千二百歲形未嘗襄壽則多辱楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋逍遙遊篇人中有老彭猶木中之有松柏抱朴子彭祖堯臣經虞夏商壽七百歲荀脩身注史蕃祉老壽左昭二十喬松之壽史蔡澤傳春秋高閱天下之義理多矣西漢文帝紀張蒼老口中無齒食乳女子為乳母年百餘歲而卒本傳年壽永究鮑宣傳四人須眉皓白張良傳羅結為侍中摠三十六曹事時年一百七精爽不襄魏主以其忠愨親任之使兼長秋卿監典後宮出入臥內年一百十歸老朝廷每有大事遣訪焉又十年乃卒通監晉紀互入精強白居易宴集皆高年人慕之繪為九老圖唐書傳記北極永無窮南山何足擬通典嘗以皓皓是以眉壽大戴禮集天錫難老如岳之崇陸士雲讌會詩羡門比壽王喬爭年稽康養生論南極老人應壽昌杜詩後天而老凋三光李太白集金骨既不毀玉顏長自春不知幾甲子猶帶冰霜顏同上與大椿齊其年壽駱賓王歲年雖變貌長新劉賓客集既至于年乃靜于懷衣柔膳甘子侍孫攜柳文獨有冰雪容纖華奪鱗縞元微之童顏稚齒王無功長眉留桂綠丹臉寄蘭紅高達夫老鶴無襄貌劉長卿龐眉皓髮唐文粹頤神遠壽暢其天和同上本朝張蒼事秦柱下而至漢孝景思邈生隋開皇而及唐永淳東坡文文潞公保洛日年七十八同時有司馬旦等三人皆年七十八嘗為同甲會潞公詩曰四人三百十二歲況是同生甲午年招得梁園為賦客合成商嶺採芝仙清談亹亹風盈席素髮飄飄雪滿肩此會從來誠未有洛中應作畫圖傳沈存中述筆談經一曰凶短折書洪範短折曰不祿祿謂任為大夫士而不為者記曲禮子人生有不見日月不免襁褓者家語朝菌不知晦朔蟪蛄不知春秋故不終其天年而中道夭莊子育而不苗吾家之童烏乎楊子集草未素而先凋選顏延年秋胡詩如何短折背世湮沉楊仲武誄長筭屈於短日遠跡頓於促路齊竟陵王行狀惜其齡促名臣贊夭閼紛綸選論華繁中零誰謂不傷曹植誄王仲宣蓮初開月梵蕣已落朝榮元微之集飛霜肅其早零兮意慘慘而不長俄消鑠以委絕兮還四氣之無常皇甫湜琱月始生不見其盈瓊枝方秀不見其茂燕公集降年不永玄首未華選誄經日昃之離不鼓缶而歌則大耋之嗟易離卦正義曰既老當委事任取逸樂若不然至於耋老而咨嗟耆耋好禮不從流俗記射義旄期稱道不亂同上老者不以筋力為禮曲禮上六十不毀七十唯襄麻在身飲酒食肉處於內六十不與服戎七十不與賓客之事八十齊喪之事弗及也六十曰耆指使七十曰老而傳傳家事任子孫八十九十曰耄大夫七十而致事若不得謝則賜之几杖並同上五十無車者不越疆而吊人六十宿肉七十貳膳八十常珍王制六十不親學七十致政惟襄麻為喪六十非肉不飽七十非帛不煖八十非人不煖六十杖於鄉七十杖於國八十杖於朝七十不俟朝士之老者揖君則退八十月告存每月致膳八十者一子不從政君子耆老不徒行庶人耆老不徒食並同上血氣既襄戒之在得語子氣幹將老棄其家事不班白不知道人年五十嗜欲已襄心已近道列子五十不成喪不備哭踊之節荀大略齫然而齒墜矣君道年彌高而德彌邵楊子史諺所謂老將知而耄及之左昭元余髮如此種種余奚能為知伯曰余羸老也可重任乎襄十年互見怨恨自揆宰孔曰伯舅耋老絳縣人年長矣有與疑年使之年曰臣小人也不知紀年臣生四百有四十五甲子矣師曠曰七十三年矣士文伯曰二萬六千六百有六旬襄三十年燭之武曰臣之壯也猶不如人今老矣無能為也已僖三十年石碏曰老夫耄矣無能為也隱四建老白首萬石君尚無恙本傳祝噎在前祝鯁在後前賈生傳師古曰以老人好饐鯁故為備以祝之陸賈有五男乃出所使越橐中裝賣千金分其子子二百金為生產賈常乘安車駟馬從歌鼓瑟侍者十人寶劍直百金謂其子曰與女約過女女給人馬酒食極欲十日而更所死家得寶劍車騎侍從者一歲中以往來過他客率不過再過數擊鮮母久溷女為也本傳犬馬齒載孔光傳載一作臷戴白之老嚴助傳晚節末路漢書含飴弄孫不復關政東漢馬皇后紀宗世林年老婆娑晉書抱子弄孫日以為樂晉載記傳記亘帝侍中迺存年老口臭上出雞舌香與含之雞舌頗小辛螫不敢咀咽嫌有過賜毒藥歸舍辭決就便宜家人哀泣不知其故僚友求眡其藥出在口香咸嗤笑之應劭漢官儀集年在桑榆間影響不能追曹子建贈白馬王彪從容養餘日取樂於桑榆張茂先荅何劭壯齒不常居文選星星白髮垂同上日昃景西潘岳作楊仲武誄四肢委隨筋骨挺解選七發手足墮窳同上來日苦短去日苦長陸機短歌襄容不還稚鮑昭詩草忌霜而逼秋人惡老而逼襄同上鳩杖扶老鄒陽書煖老須燕玉杜詩暮顏靦青鏡几杖將襄齒但遇新少年少逢舊親友後生血氣豪舉動見老醜白頤搔更短渾欲不勝簪惟將遲暮供多病未有涓埃荅聖朝白髮千莖雪丹心一寸灰花飛有底急老去願春遲可惜歡娛地都非少壯時萍蓬風波急桑榆日月侵自知白髮非春事人情老易悲並杜詩久知老會至不謂便見侵今年宜未襄稍已來相尋齒踈髮就種奔走力不任柳覺襄詩玄花著兩眼視物隔褷䙰燕席謝不詣游鞍懸莫騎韓文髮之短者日益白齒之搖者日益脫聰明不及於前時道德日負於初心兩目眵昏頭雪白頭童齒豁吾老世味薄互見怨恨淡泊老大百無益並韓文老色日上面歡情日去心今既不如昔後當不如今白集漠漠病眼花星星愁鬢雪白髮逐梳落朱顏辭鏡去所怪少年心銷磨落何處蹇步何堪鳴佩玉襄容不稱著朝衣夜昏乍似燈將滅朝暗長疑鏡未磨心灰不及爐中火鬢雪多於砌下霜萬病皆可治惟無治老藥漸恐少年場不容垂白叟老耳倦聲樂急景凋年急於水夜鏡藏鬚白秋泉漱齒寒白頭雖強醉不似少年歡欲隨年少強遊春自覺風光不屬身歌舞屏風花幛上幾時曾畫白頭人老心歡樂少走趁風光應不稱閑尋松竹正相當風光不屬白鬚人金帶縋腰衫委地年年襄瘦不勝衣桑榆坐已暮鍾漏行將曉即先朝露歸夜泉前歲二毛生今年一齒落夜寢與朝食其間味亦薄失卻少年無覓處朱顏消不歇白髮生無處霜侵殘鬢無多黑酒伴襄顏只蹔紅並白集白頭非是翠娥鄰元微之晚歲多衰柳先秋愧大椿老嗟去日光陰促並同上老骨懼秋月孟東野疲牛舐犢心猶切陰鶴鳴鶵力已襄羅隱身瘦帶頻減髮稀冠自偏廢書緣惜眼多灸為隨年劉賓客煙霞為老伴蒲柳任先凋筋力上樓知並同上年老銷蹇步秋氣入襄情劉長卿年襄憶故鄉顧影無如白髮何鏡中無復少年時欲並老容羞白髮每看兒戲憶青春並同上優游暮齒唐文粹末路多是非同上霜氣入病骨老人身生冰孟東野白日將頹青山行暮駱賓王春來點檢閑遊數猶自多於年少人白樂天丘園自得性婚嫁不嬰心錢起之圍減帶緩髮稀弁傾李義山本朝老來光景似奔輪歐陽集自是老年遊興少春風何處不堪行臨川嗟我與公皆老矣拂天松柏見栽時細書妨夜讀長簟怯昏眠取簟且一息拋書還少年並同上好去上天辭將相歸來平地作神仙坡詩老去雍容平地仙老來漸減金釵興襄髮不到耳老人無睡漏聲長幅巾藜杖願為二老之風流甲第高門坐看諸郎之富貴老去怕看新曆日退歸擬作舊桃符人老簪花不自羞花應羞上老人頭白髮不遺窮並同上老境難為節陳後山莫年貪佛替論文風竹莫年須杖藜矜矍鑠老覺山林可避人正須麋鹿與同群卻嫌鳥語猶多事強管陰晴報客聞老眼尚堪看細字白頭寧復要時名並後山集渥然丹者為槁木黟然黑者為星星秋聲賦種種春風吹不長星星明月照還稀臨川
