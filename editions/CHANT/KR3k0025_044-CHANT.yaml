body:
  text: 識者所窺子野有眾逐虎虎負嵎莫之敢攖望見馮婦趍而迎之馮婦攘臂下車眾皆悅之其為士者笑之孟子盡心下南榮趎至老子之所老子曰向見君眉睫之間吾因以得汝矣莊子庾桑楚齊威公讀書於堂上輪扁斲輪於堂下問曰君之所讀者古人之糟粕也莊子愚公謀平太行之險京城之孀婦有男往助之河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曾不能毀山之一毛其如土石何列子史鬥伯比曰莫敖必敗舉趾高心不固矣左傳威十三年齊侯盟諸侯于葵丘宰孔先歸遇晉侯曰可無會也齊侯不務德而勤遠略故北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤於行左傳僖九卻芮曰幣重而言甘誘我也左傳僖十晉陽處父聘于衛反過甯甯贏從之及溫而還其妻問之贏曰以剛商書曰沈潛剛克高明柔克夫子一之其不沒乎天為剛德猶不干時況在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉殺陽處父文五秦伯任好卒以子車氏之三子為殉君子是以知秦之不復東征也左傳文六士會歸晉秦繞朝贈之以策曰子無謂秦無人吾謀適不用也左傳文十三年劉康公曰原叔必有大咎天奪之魄矣左傳宣十五年士貞伯曰鄭伯視流而行速不安其位宜不能久左成六士鞅曰欒黶汰虐已甚猶可以免其在盈乎左襄十四鄭師慧譏宋曰必無人馬若猶有人豈其以千乘之相易淫樂之矇左襄十五年互見舍大徇小叔向曰伯有巳侈所謂不及五稔者左襄二十七互見料度居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患左襄三十一韓宣子如齊見子旗曰非保家之主也晏子曰夫子有知其有以知之矣左昭二年周原伯魯不說學閔子馬曰學殖也不學將落原氏其亡乎左昭十八魯叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已左昭九楚殺伍奢其子員如吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭二十互見嫁禍叔孫婼聘于宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡左昭二十五年觀其容而知其心矣國語互見料度戎王使由余於秦秦繆公示以宮室積聚由余曰此中國所以亂也史記秦本紀尉繚說秦王王見繚亢禮衣服食飲與繚同繚曰秦王為人蜂準長目鷙鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我誠使得志於天下天下皆為虜矣不可與久游乃去史記秦始皇本紀伍子胥見吳王說伐楚之利吳公子光曰彼伍員父兄皆死於楚而員言伐楚欲自為報私讎也非能為吳乃止史記剌客專諸傳管仲世所謂賢臣孔子少之史記管晏傳論范蠡與大夫種書曰越王為人長頸鳥喙可與共患難不可與共樂種稱病王乃賜種劍自殺史記越世家楚有養由基善射去柳葉百步而射之百發而百中左右觀者數千人皆曰善射有一夫立其旁曰可教射矣養由基怒客曰夫去柳葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中百發盡息史記周記互見一失召百非狂夫之樂智者哀焉史記趙世家吳楚反條侯為太尉至河南得劇孟喜曰吳楚舉大事而不求孟吾知其無能為而巳矣史記游俠傳吳季札適晉說趙文子韓宣子魏獻子曰晉國其萃於三家乎史記吳世家周襄王使宰孔賜齊侯胙遇晉侯曰齊侯驕矣第無行史記齊世家景帝曰魏其者沾沾自喜耳多易難以為相持重史記本傳臣見其視臣端而趍疾知臣得其情故也通監周紀項王喑嗚叱咤千人皆廢然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有病涕泣分食飲至使有功當封爵者印利敝忍不能予此所謂婦人之仁也通監西漢高紀曹操言袁紹志大而智小色厲而膽薄通監東漢仲長統謂高幹曰君有雄志而無雄才甘寧曰劉表慮既不遠兒子又劣非能承業傳基者也同上朱勃小器速成智盡此耳東漢馬援互見料度馬援曰天下雌雄未定公孫不吐哺走迎國士與圖成敗修飾邊幅如偶人形此子何足久稽天下士乎通監漢光武紀京房學易於梁人焦延壽常曰得我道以亡身者京生也通監漢元紀樊伷誘道諸夷圖以武陵附漢中劉備權召問潘濬濬荅以五千兵往足以擒伷權曰卿何以輕之濬曰伷是南陽舊姓頗弄脣吻而實無才略臣所以知之者伷昔嘗為州設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗也通監漢獻紀黃允與晉文經並恃其才智眶名遠近徵辟不就託言療病京師不通賓客公卿大夫遣門生旦暮問疾郎吏雜坐其門猶不得見符融謂李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慚歎逃去通監漢桓紀或謂袁術曰堅若得洛不可復制此為除狼而得虎通監漢獻紀董昭說河內守張楊曰袁曹雖為一家勢不久群曹今雖弱然實天下之英雄也夫布粗中少親剛而無禮匹夫之雄耳曹操曰呂布一旦得一州不能據東平斷亢父太山之道乘險要我而乃屯濮陽吾知其無能為也賈詡曰劉表平世三公也不見事變多疑無決無能為也見呂布顧謂劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操命緩布縛劉備曰不可明公不見呂布事丁建陽董太師乎已上並通監漢獻紀中常侍趙忠言於省內曰袁本初坐作聲價好養死士不知此兒終欲作何後漢李瓚曰世將亂矣天下英雄無過曹操袁山松後漢書姚虞俊曰張惠恕才多智少華而無實怨之所聚有覆家禍吾見其兆矣無幾何敗通監三國魏明紀或謂帝曰劉曄不盡忠善伺上意所趍而合之陛下試與曄言皆反意而問之若皆與所問反者是曄常與聖意合也每問皆同者曄之情必無所復逃矣帝如言以驗之果得其情通監魏明紀司馬懿謂蔣濟曰智囊往矣濟曰桓範則智矣然駑馬戀棧豆爽必不能用也通監魏邵陵厲公管輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候則魂不守宅血不華色精爽煙浮容若槁木此為鬼幽二者皆非遐福之象也通監鄧颺何晏初諸葛恪少有盛名文帝深器重之而恪父瑾常以為戚曰非保家之主也父友奮威將軍張承亦以為恪必敗諸葛氏通監魏高貴卿公帝嘗問陳矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也通監魏明紀吳主醉問費禕曰楊儀魏延牧豎小人也雖常有鳴吠之益於時務然既已任之勢不得輕若一朝無諸葛亮必為禍亂矣同上陸遜嘗謂恪曰在我前者吾必奉之同升在我下者則扶接之今觀君氣陵其上意蔑乎下非安德之基也通監魏高貴鄉公周瑜曰操雖托名漢相其實漢賊桓溫請謝安為司馬高松戲之曰卿高臥東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色晉書謝安互見責備陳登謂呂布曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不然當如養鷹飢則為用飽則颺去魏志裴顧薦韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就哉通監晉惠帝互入不苟合山濤見王衍曰何物老嫗生此寧馨兒然誤天下蒼生必此人也通監晉書王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制通監晉紀王澄胡毋輔之等以任放為達或至裸體樂廣聞而笑曰名教中自有樂地何必乃爾晉書樂廣傳羊祜謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也晉羊祜傳董養見王彌而謂之曰君好亂樂禍若天下有事不作士大夫矣通監西晉世祖陶侃遺荀崧書曰杜曾凶狡所謂鴟梟食母之物此人不死州土未寧足下當識吾言通監晉愍紀范通謂王濬曰卿功則美矣然恨所以居美者未盡善也卿旋旃之日角巾私第口不言平吳之事若有問者輒曰聖主之德群帥之力老夫何力之有此藺生所以屈廉頗也王渾能無愧乎通監西晉世祖紀劉惔每奇桓才然知其有不臣之志謂會稽王昱曰溫不可使居形勝之地其位號常宜抑之通監晉穆紀劉惔曰但恐克蜀之後溫終專制朝廷同上王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而巳既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之晉書本傳何尚之遷吏部郎告休定省傾朝送別及至郡叔度謂曰聞汝來此傾朝相送可幾客荅曰殆數百人叔度笑曰此送吏部郎耳非關何彥德也宋書謝弘微未年嘗與友棊友西南棊有死勢復一客曰西南風急或有覆舟者友悟乃救之弘微大怒投局於地識者知其暮年之事果以此歲終南史太傳義恭與義宣書曰往時仲堪假兵靈寶尋害其族孝伯推誠牢之旋踵而敗臧質少無美行第所具悉今藉西楚之強力圖濟其私凶謀若果恐非池中物也通監宋世祖紀蘇湛曰凡謀大事當得天下奇才與之從事令但與長安博徒謀之此有成理不通監梁高祖高歡謂澄曰景專制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕御也同上李崇郭祚游肇曰伯緒即宋維凶踈終傾宋氏若得殺身幸矣通監梁紀王晞曰我少年以來閱要人多矣得志少時鮮不顛覆通監陳世祖傳嘏曰太初志大其量能合虛聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆邦家之人也鄧玄茂有為而無終外要利名內無關鑰貴同惡異多言而妒前多言多釁妒前無親以吾觀此三人者皆將敗家遠之猶恐禍及況眤之乎通監魏紀李密狡猾好反今遣之如投魚於泉放虎於山必不反矣通監唐高祖盛彥師曰李密聲言向洛實欲出人不意走襄城就張善相耳密既度陝果踰山南出同上張鎬言許叔冀狡猾多詐臨難必變通監唐肅宗張九齡言於張說曰宇文融承恩用事辯給多權數不可不備說曰鼠輩何能為融及李林甫彈奏說通監唐紀互見患生所忽路岩佐崔鉉於淮南為度支使既而入為監察御史不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十巖今已入翰林如何得老皆如鉉言通監唐懿宗徐曠字文遠博通六經時耆儒沈重講太學授業常千人文遠從之質問曰先生所說紙上語爾若奧境彼有所未見尚何觀馬唐書張昌齡王公謹舉進士皆為王師旦所絀太宗問其故荅曰昌齡等華而少實其文浮靡非令器也唐書張昌齡傳元結家瀼濱自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎漫遂顯新唐書本傳裴行儉曰王勃等雖有文華而浮躁淺露豈享爵祿之器耶通監唐紀張孝忠曰朱司徒可與共始難與共終也通監唐紀盧藏用隱終南山晚乃徇權利司馬氶正召至闕下藏用指南山曰此中大有佳處氶正徐曰仕官之捷徑耳藏用慚新唐書本傳互入自納敗闕岑文本曰馬周鳶肩火色騰上必速恐不能久唐書本傳傳記慕容垂請至鄴拜墓苻堅許之權翼諫曰垂猶鷹也飢則附人飽則颺去遇風塵之會必有凌霄之志唯宜急其羈絆不可任其所欲堅不從晉書載紀王敦為太子舍人潘滔見而目之曰處仲蜂目巳露但豺聲未振若不噬人亦當為人所噬晉中興書集察其志意所望殊高陳子昂尚不能歷其藩翰況堂奧乎唐文粹言行之間足見真態劉賓客僧臨大道閱浮生來往憧憧利與名二十八年何限客不曾閑見一人行元微之集互見奔競吾少時讀醉鄉記私怪隱居者無所累於世而猶有是言豈識旨於味耶及讀阮籍陶潛詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顏氏之操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麴糵之託而昏冥之逃耶韓文送王含秀才咸陽不留王業已去雖未至於陰陵誰不知其失路李文饒吾今細觀競渡兒何殊當路權相持不思得所各休去會到摧舟折楫時薛逢詩本朝夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦惡老泉辨姦論互見飾偽韓魏公堅請相州上問卿去誰可屬國者金陵何如公曰為翰林學士則有餘處此地則不可後有問公何以識之公曰嘗讀金陵荅楊忱書窺其心術只為一身不為天下以此知非宰相器遺書仁宗朝王安石知制誥一日賞花釣魚內侍各以金楪盛釣餌藥置兒上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也聞見錄富公見張安道曰人固難知也張公曰謂王安石乎亦豈難知者皇祐間方平知貢舉或薦安石有文學宜辟以考校姑從之安石既來一院之事皆欲紛更之方平惡其人檄以出自此未嘗與之語也同上陳瓘因朝會見蔡京視日久而不瞬嘗以語人曰京之精神如此他日必貴然矜其稟賦敢適太陽吾恐此人得志必擅私欲無君自肆矣遺事夫好貨天下之賤士也以范蠡之賢豈聚歛積實者何至耕于海濱父子力作以營千畝屢散而復積此何為者豈非才有餘而道不足故功成名遂身退而心終不能自放者乎東坡志林王安石名盛歐陽脩勸蘇洵交遊安石安石亦願交於洵洵曰吾知其人矣是不近人情者鮮不為天下患安石之毌死士大夫皆吊之洵獨不往作辨姦論張方平撰蘇洵墓表孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之強得一士焉宜可以南面而制秦尚何取雞鳴狗盜之力哉夫雞鳴狗盜之出其門此士之所以不至也臨川集韓愈嘗有賦矣不過羡二鳥之光榮歎一飽之無時耳推是心使光榮而飽則不復云矣歐公集爵位自高言蓋廢古來何啻萬公卿臨川集溫公曰昨看三國志識破一事遺令者世所謂遺囑也必擇緊要言語付子孫至纖悉事則或不暇且操身後之事有大於禪代者乎今操之遺令諄諄數百言下至分香賣履之事無不處置詳盡無一語語及禪代之事意謂禪代之事自是子孫所為吾未嘗教為之是實以天下遺子孫而身享漢臣之名此遺令之意歷千百年無人識得元城語錄蘇明允權書衡論觀其著書之名已非豈有山林逸民立言垂世乃汲汲於用兵如此所見安得不為荊公所薄龜山語錄昔者羊叔子見王衍曰誤天下蒼生必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣老泉鄭向知杭州王耿為浙漕互有論列而耿死鄭往哭之甚哀或曰龍圖素惡端公今何慟哭也范拯曰龍圖待哭斯人久矣張師正倦游錄互見暢快
