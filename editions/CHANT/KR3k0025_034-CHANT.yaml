body:
  text: 巧反成拙子宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趍而往視之苗則槁矣孟子公孫丑上伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患後有鞭策之威馬之死者已過半矣莊子鼯鼠五技而窮荀勸學畫虎不成反類狗東漢馬援傳反裘負薪存毛實難宋書范泰傳殷浩荅亙溫書慮有謬誤開閉者十數竟達空函通鑑晉穆紀傳記楚舍人相謂曰各畫地為蛇蛇先成者飲酒一人先成曰吾能為之足未成一人後成奪其卮曰蛇故無足子安能為之足遂飲其酒為蛇足者終亡其酒戰國策田子方使人遺子思狐白之裘恐其不受因謂之曰吾與人也如棄之子思辭曰伋聞妄與不如遺棄於溝壑伋雖貧不忍以身為溝壑也劉向說苑畫蛇而添足反失盃中之酒史通集余不知服食說自何世起殺人不可計而世慕向之蘄不死乃得速死謂之智可不可也韓文李君墓誌飲藥本攻病毒腸翻自殘韋應物集本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歷數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入自納敗闕子宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趍而往視之苗則槁矣夫助之長者揠苗者也非徒無益而又害之孟子互見徒勞無補繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋孟子萬章下南海之帝為鯈北海之帝為忽中央之帝為渾沌鯈與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死莊子應帝王篇鷦朋沖天不在六翮乎拔而傳鳲鳩其累矣夫揚子寡見鄭武公莊姜生莊公及共叔叚欲立之亟請於武公公弗許及莊公即位為之請京使居之太叔完聚將襲鄭夫人將啟之公命伐京太叔出奔共左隱元鄭子皮欲使尹何為邑子產曰猶未能操刀而使割也子之愛人傷之而已其誰敢求愛於子左襄三十一漢王愛幸趙隱王如意太子弱帝欲廢之而立如意高祖崩呂后召趙王誅之西漢呂后傳漢宣力任刑法信中尚書官蓋寬饒奏封事曰今以刑餘為周召以法律為詩書又言五帝官天下三王家天下家以傳子官以傳賢執金吾奏寬饒指意欲求擅大逆不道諫大夫鄭昌上書訟寬饒曰上無許史之屬下旡金張之託許伯宣帝皇后父史宣帝外家張金張目磾安世也上不聽遂下寬饒吏寬饒引佩刀自剄北闕下西漢本傳位過其任莫能有終所謂愛之適足以害之也西漢佞倖傳讚厚之如此反所以害之也西漢鮑宣傳丁公為項羽將逐窘高祖高祖曰兩賢豈相阨哉丁公引兵還及羽滅丁公謁高祖高祖以丁公徇軍中曰丁公為臣不忠使項王失天下者也遂斬之通鑑高紀鄭武姜之幸叔段衛莊公之寵州吁愛而不教終至凶戾愛子若此猶飢而食之以毒適所以害之也東漢何敞傳愛之不以道適所以害之也通鑑東晉成紀傳記魏武曹操常云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者世說輕詆篇互入姦邪尹吉甫子伯奇至孝事後母母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑伯奇自死列女傳人之愛子罕亦能均有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之劉表之傾宗覆族袁紹之地裂兵亡可為龜鑑也北齊顏氏家訓魏文侯出遊見路人反裘而負芻文侯問之對曰臣愛其毛也文侯曰若不知裡盡而毛無所恃耶新序永有某氏愛鼠不畜貓又禁僮勿擊鼠倉廩庖廚悉以恣鼠不問由是飲食大率鼠之餘也數歲某氏徙居他州後人來居鼠為態如故假王六貓闔門撤瓦灌穴購僮羅捕之殺鼠如丘柳文永某氏之鼠幾許平生歡無限骨肉恩結為腸間痛聚作鼻頭辛白樂天集櫪馬非不肥所苦長縶維豢豕非不飽所憂竟為犧文粹橐駝種木其蒔也若子其置也若棄它植者則不然愛之太過憂之太勸旦視而暮撫巳去而復顧甚者瓜其膚以驗其生枯搖其本以觀其踈密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之唐柳宗元郭橐駝傳本朝東坡下獄張安道致仕在南京上書令其子恕持至登聞院恕不敢投久之東坡出獄其後東坡見其副本因吐舌動色曰獨不見鄭昌之捄蓋寬饒云上無許史下無金張正激宣帝之怒元城語錄煩惱初無根恩愛為種子東坡詩子管子以小欲成大榮淮南子史李同說平原曰家之所有盡散以饗士士方其危苦之時易德耳於是平原君說之得敢死之士三千人史本傳人爭取賤賈任氏獨取貴西漢貨殖傳陷之死地而後生投之亡地而後存西漢韓信傳互入反鋒而用不入虎穴不得虎子東漢班超傳不探虎穴安得虎子三國吳呂蒙傳絳灌等譖陳平受諸將金漢王召讓之平曰臣躶身來不受金無以為資史陳平世家子獨不見家人寡婦耶始自約敕之時意乃慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣西漢原涉傳互入遂非無顧藉許后當娠病女醫淳于衍者霍氏所愛因投毒藥加煩懣崩諸醫皆收繫顯恐急即以狀具語光光大驚欲自發舉不忍猶與會奏上光署衍勿論顯因勸光內其女入宮通鑑漢宣紀弘為布衣食不重肉汲黯曰弘位在三公奉祿甚多然為布被此詐也上問弘弘謝曰有之誠中弘之疾夫以三公為布被與小吏無差誠飾詐欲以釣名如汲黯言且無汲黯忠陛下安得聞此言天子以為謙遜愈益厚之通鑑漢武紀晉司徒賈充辟韓壽為椽讌賓僚女從青瑣中窺見壽悅之竊帝所賜充香遺壽充覺問女遂妻之晉書亙溫嘗使王獻之書扇筆誤落因畫作牛甚妙晉書本傳孫子荊誤謂王武子曰當枕流漱石武子曰石非可漱流非可枕孫曰所以枕流洗其耳漱石礪其齒晉書王隱互入遂非東魏以王愔典選令史唱名誤以盧士深為士琛士琛自言其名愔曰盧郎朗潤所以加玉三國典略互入敏於應對姚崇二子分司東都恃其父有德於魏知古頗招權請知古歸悉以聞它日上從容問崇卿子才性何如今何官也崇揣知上意對曰知古微時臣卵而翼之臣子愚以為知古必德臣容其為非故敢干之耳上於是以崇為旡私而薄知古負崇通鑑唐元宗傳記孫權使曹不興畫屏風誤落筆點素因就成蠅狀權疑其真以手彈之名畫記子淄澠之合易牙嘗而知之列子說符伯樂不可欺以馬荀子劍工惑劍之似莫耶者唯歐冶能名其種玉工眩玉之似碧盧者唯猗頓不謬其情淮南子識珍者必拾濁水之明珠抱朴子以趙曲為雅聲者唯鐘期不溷其音以燕石為美王者唯猗頓不謬其真以逞賦為麗藻者唯相如不濫其賞劉子史叔孫通初制定禮儀見非於齊魯之士前漢禮樂志美玉蘊於碔砆凡人視之藐焉良工眡之然後知其為和寶也精鍊藏於鐮璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳斛律金用匈奴法望塵知馬步多少嗅地知軍度遠近北本傳傳記師曠識爨薪易牙別淄澠晏子春秋集坐中亦有江南客莫向春風唱鷓鴣鄭谷經小人間居為不善無所不至見君子而後厭然揜其不善而著其善人之眡巳如見其肺肝然則何益矣太學君子可欺也不可罔也並語雍也子君子可欺以其方難罔以非其道孟子萬章上有人於此藏千鎰之金雖行貸而食人謂之富矣荀子互入真不可滅史士鞅曰武子之德在民如周人之思召公焉愛其甘棠況其子乎左襄十四互入遺愛傳記愛其人者兼屋上之烏說苑立節篇太公曰愛人者兼其屋上之烏尚書太傅大戰篇集愛子及室言鴟鴞詩也張士然表丈人屋上烏人好烏亦好杜詩子庚公名位漸重足傾王公庚公在石頭王公在城忽風起揚塵王公以扇拂之曰元規塵汙人郭子元規庚亮字王公導也又見通鑑傳記憎人甚惡其餘胥說苑立節篇互入遷怒不愛人者盡其咠餘注咠餘里落之壁也尚書大戰篇互入遷怒大傳經夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨書君牙夏日暑雨小民惟曰怨咨音至冬祁寒小民亦惟曰怨記緇衣如彼築室于道謀是用不潰於成詩小旻注人之多言亦可畏也詩將仲子謀夫孔多是用不集詩小旻天地之大也人猶有所憾記中庸天地至大無不覆載人尚有所恨況於聖人能盡備乎子眾議成林無翼而飛三人成市虎一里橈椎淮南子史眾口禍福之門國晉語作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下堯作大章一夔足矣范瞱後漢曹褒傳傳記眾口所毀浮石沈木陸賈新語集若眾口之鑠石楚辭黃金爍眾口李太白譬之於食物至於遐方異味則有嗜者有不嗜者韓文經人之視已如見其肺肝然曾子曰十目所視其嚴乎並禮記大學史欲蓋而章左傳序劉洎曰借使遂良不記天下亦皆記之通監唐書郜鼎在廟章孰甚焉左威二甯殖曰吾得罪於君名藏在諸侯之策左襄二十陳軫曰非獨儀知之也行道之人盡知之矣史本傳互入無隱司馬昭之心路人所知也通鑑晉書集萬目睽睽韓文西子不華嫫女錦縠是不能易其美惡難將一人手掩得天下目並唐文粹子夫以一縷之任繫千鈞之重上懸之於無極之高下垂之於不測之深旁人皆哀其絕而造之者不知其危孔叢子史虞卿料事揣情為趙畫策何其工也及不忍魏齊卒困於大梁庸夫且知其不可況賢人乎史本傳論韓子為說難而不能自脫史記本傳太史公曰春申君說秦昭王何其智之明也後至於李園旄矣史記援戒之禍智矣而不能自免於讒言後漢馬援傳論傳記天下無窮者才智也陳平嘗出六奇燕居深念恐禍及己陸賈教之交驩太尉又為畫呂氏數事平從之卒誅諸呂則賈之智又在平之右矣孔氏雜說互入強後遇強及智慮兩門集睫在眼前常不見杜牧之集本朝操舟者常不見水道之曲折而水濱之立觀者常見之弈碁之形雖國工有所不盡而袖手旁觀者常得之東坡朝辭赴定州論事狀互入袖手旁觀不識廬山真面目只緣身在此山中經執柯以伐柯睨而視之猶以為遠記中庸互入愚暗人莫不飲食也鮮能知味也記中庸雖有嘉肴弗食不知其旨也記學記子道在邇而求諸遠孟離婁上仲尼謂顏淵曰吾終身與汝交一臂而失之莊子山木史平原君定從而歸曰勝相士多者千人寡者百數自以不失天下之士今於毛先生失之矣史平原君傳曹操攻呂布軍敗布騎得操而不識詢曰曹操何在操曰乘黃馬走者是也乃釋操而追黃馬者操突出引還通監漢獻紀互入反鋒而用晉武帝曰吾獨不得如亮者而臣之乎樊建曰陛下知鄧艾之冤而不能直雖得亮得無如馮唐之言乎通鑑晉紀魏舒為鍾毓長史毓初不知其善射後遇朋人不足以舒蒲數舒發無不中舉坐莫敵毓嘆而謝曰吾之不足以盡卿才有如此射矣晉書本傳宇文泰與侯景戰墮馬失所之左右皆散李穆罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸通監梁武紀互入反鋒而用漢文帝知李廣才而不能用乃嘆其生不逢時唐魏元忠傳本朝唐李程貞元中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰公今須作狀元翌日無名於陵深不平乃於故冊子末繕寫而斥其名氏攜之以訴主文主文嘆賞不已於陵曰當今場中若有此賦侍郎何以待之荅曰非狀元不可也於陵曰苟如此侍郎已遺賢矣此乃李程所作亟命取李程所納卷對不差一字主文因謀之於陵擢為狀元見東坡與李廌詩注互入轉禍為福五色賦事北夢瑣言亦載新唐書李程傳載程試日五色賦擢進士駕餘皇而索舟策飛黃而問駿鳴道集平時謾說古戰場過眼空迷日五色坡詩子境內之傑不愛而求邦外之士尸子史漢文曰吾不得廉頗李牧為將哉馮唐曰魏尚守雲中匈奴遠避以差功六級削爵雖得頗牧不能用也前漢馮唐傳凡人賤近而貴遠親見楊子雲祿位容貌不能動人必輕其書昔老聃著虛無之言薄仁義非禮樂然後世好之者尚以為過於五經西漢楊雄傳凡人情忽於見事而貴於異聞通鑑漢光武紀崔寔曰俗士拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉東漢本傳互入窒泥庚征西善書少時與右軍齊名右軍後進庚猶不分在荊州與都下人書小兒輩賤家雞愛野雉晉書薛謙光上疏昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令通監唐武后韋處厚曰陛下有一裴度不能用乃當饋而歎恨旡蕭曹唐裴度傳傳記田饒事魯哀公而不見察謂哀公曰夫雞有五德猶日瀹而食之者以其所從來者近也黃鵠一舉千里止君園池啄君稻粱君猶貴之以其所從來者遠也韓詩外傳集陋今榮古張平子東京賦耀所聞而疑所覿班孟堅賓戲凡人可以言古不可以言今恒譚亦云親見楊子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如楊雄猶為今之人則世之高者至少矣由此觀之古之人未有不薄於當世而榮於後世也柳文聞道近來諸子弟臨池尋巳厭家雞柳詩貴耳賤目榮古陋今人之大情也白傳集遠物皆重近皆輕雞雖有德不如鶴唐文粹史裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近舍湜而遠取居易請從此辭唐書本傳互見自負集當仲尼在時世人不言為聖人也伐樹削跡于七十二君而不一值或以為東家丘或以為喪家狗沈約辨聖論文選以何水部在世不錄南熏集序本朝君家自有元和腳莫厭家雞更問人東坡詩
