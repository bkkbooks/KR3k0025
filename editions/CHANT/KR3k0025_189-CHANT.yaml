body:
  text: 總論婦人經婦人貞吉從一而終也易常卦無攸遂在中饋貞吉易家人卦婦人之正義無所必遂職乎中饋巽順而已婦無所專於家事有非非婦人也有善亦非婦人也婦人之事惟議酒食爾無遺父母之憂斯于注婦無公事休其蠶織出瞻仰婦人無預外政蠶織為事詩注女子適人者為父何以期也婦人不貳斬也婦人不貳斬者不貳天也儀禮喪服篇女子不言外記內則婦人不葛帶記檀弓上婦順備而后內和理內和理而后家可長久也記昏義婦人不越彊而吊人檀弓下婦人送迎不下堂婦人不立乘曲禮上婦人無爵從夫之爵坐以夫之齒婦人從人者也幼從父兄嫁從夫夫死從子記郊特牲其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也記玉藻婦人不居廬不寢苦喪父母既練而歸記喪大紀子順男子之教無專制之義而有三從之道教令不出於閨門事在供酒食而已無閨外之非義者也家語史婦人送迎不出門見兄弟不踰閾左僖二十二年富辰曰女德無極婦怨無終左僖二十四年近之不知上足遠之則忿怨無已女侍人婦義事也左襄二十年婦人不專行必有從也榖梁傳孔子曰彼婦之口可以出走彼婦之謁可以死敗史記雖有文母之德必繫於子杜鄴傳婦人不得與事西漢谷永傳婦人性易悅耳婦人內夫家而外父母家並出通鑑漢武紀女雖貴猶為其國陰西漢杜鄴傳集施衿結褵虔恭中饋女史箴本朝古者婦人爵因其夫貴以其子雖有過人之才絕俗之行不表於世東坡集婦人有德行才智之能而不得見於事有言語文章之美而不得聞于人而況仁而不壽賢而不祿者乎此詩人所以賦彤管史氏所以傳列女也擇夫得溫嶠生子勝王濟並東坡集經仲氏任只其心塞淵終溫且惠淑慎其身詩燕燕注云任者以恩相親信也委委佗佗如山如河詩君子偕老注山無不容河無不潤莊姜賢而不荅詩碩人靜女其孌貽我彤管彤管有煒詩靜女婦人尚專一德無所兼連禮秋官疏史婦德不必才明絕異也清閑貞靜守節整齊行己有恥動靜有法是謂婦德東漢列女傳地道柔靜陰之常義東漢李尋傳婉靜有禮東漢明德皇后紀傳記東漢一代賢明婦人如秦嘉妻徐氏動合禮儀言成規矩史通集遵義方之明訓憲女史之典戒潘安仁寡婦賦姽五累切嫿於幽靜宋玉神女賦有淑謹之德窈窕之賢珠玉翡翠職是其儀而澣濯蘩蘋不改其操故我君子琴瑟友之陳子昂集姆師酒食之議女工纂組之繁莫不總制清衷洪宣懿則茂蘋蘩之雅訓協沼沚之芳猷古稱敬姜詩云淑女論容比德殆無以過稟柔成性蘊粹含章窈窕之秀婉孌之姿貞節峻於寒松韶儀麗於溫玉溫慈惠和信肅修睦行有法度動有禮經嚴恪以理家人嫺瑟以和君子則已含弘光大矣若乃宗廟哀敬仁孝也娣姒祗和謙順也蠲潔酒食婦儀也黼黻元黃女工也洪此四德而務六親可以作範母儀昭宣壼則矣外以贊府君之德內以光中饋之政遺風素範蕙敷蘭滋惠心光孚氛氳沼沚堂嚴壼訓芬郁母儀中饋柔嘉娣姒有則並陳子昂集睎眄睞者若遲日之泛漣漪瞻詞氣者猶光風之轉蘅蕙張說之文奕葉班姑史芬芳孟母鄰杜詩常自砥礪未嘗以簫歌廢日動循禮法曾不以嚬笑為容張燕公碑實有全德為九族宗師柳文一畝之宮言笑不聞于鄰柳文崔氏銘卑柔莊敬承二尊姑嫂娣姒和無痕韓詩婉約勞謙得六姻之和權載之集墓誌其為妻道也貞順之宜常服於身體疑忌之慮不萌於心術忿懥之色不兆於容貌同焉而合於禮婉焉而得其正柳文鵲巢之均一家人之悔厲籩豆敬齊之色琴瑟靜好之儀夫人備有焉權載之得內姻外姻之和如惠風甘雨長養生物致友睦以諧姒娣盡敬愛以安舅姑同上昔漆室緹縈列女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人為女則孝友為元氏婦則豊潔家祀為母則親執書誨二子皆以通經仕女美如此婦德又如此母儀又如此三者具美可謂冠古今矣白樂天集元夫人墓銘柔明治性溫惠保身靜脩言容動中規度承訓師氏作嬪良人茂四德而蘭幽有馨潔百行而玉立無玷發為淑問著為芳猷姻族有輝閨闈是式靜無違禮故組紃有常訓動必中節故環佩有常聲並同上禮容詎假於環佩工藝亦因於組織王維集珠玉滿堂不忘於澣濯歌鍾成列載靚於圖史沈雲卿文螽斯不妬鳳凰和鳴李太白文言成大家之書行為眾婦之法王維集虔盥絜饋之勤寒燠匪懈和灰紉緘之事顧指而具呂和叔集殷祭大賓必躬蘊藻之事夙興夜寐能服澣濯之衣同上本朝靜女不爭寵幽姿如自喜歐公詩以孝力事其舅姑為賢婦以柔順事其夫為賢妻以恭儉均一教育其子為賢母歐文少以女士不勤姆師東坡集珩璜之節動必以禮蘋藻之薦敬而有儀同上柔良靚專來嬪巨室臨川集以順為令妻以嚴為賢母同上象服之盛配德於山河彤管之嚴比潔於圭璧欒城靜而守禮存江漢之風動必有儀儼山河之象同上自設帨至於屬纊九族無間言類要子許允之婦奇醜交禮竟不復入房許曰婦有四德卿有幾荅曰新婦所乏者容耳士有百行君有幾許曰皆備婦曰君好色不好德何謂皆備許有慚色遂相敬重郭子史班婕妤曰死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之無益故不為也西漢本傳互見守正婦言不必辯口利辭也擇辭而說不道惡語時然後言不厭於人是謂婦言後漢列女傳武帝嘗與胡貴嬪樗蒲遂傷上指帝怒曰此固將種也貴嬪對曰北伐公孫西距諸葛非將種而何晉胡貴嬪傳謝道韞為王凝之妻凝之弟獻之嘗與賓客談議辭理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步障申獻之前議客不能屈晉書列女傳互見嫂門傳記劉道真遭亂於河側自牽舡見一老嫗搖櫓曰女子何不調機利杼而搖櫓女荅曰丈夫何不跨馬揮鞭而牽舡裴啟期語林互見納侮齊女徐吾者與其鄰婦合燭夜績吾貧而燭不屬鄰婦請無與夜徐吾曰妾以貧故起常先去常後掃陳席以待來者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光莫之能應遂復與夜績列女傳互見識見集范傳正廉問宣池訪李白子孫獲孫女二人一為陳雲之室一乃劉勸之妻皆編戶甿也因召至郡庭相見與語衣服村落形容朴野而進退閑雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出遊一十二年不知所在父存無官父歿無名有兄不相保為天下之窮人無桑以自蚕非不知機杼無田以自力非不知稼穡況婦人不任布裙糲食何所仰給儷於農夫救死而已久不敢聞於縣官懼辱祖考鄉閭逼迫忍恥來告言訖淚下李白集經巧笑之瑳佩玉之儺有女同車顏如舜華將翱將翱佩玉瓊琚彼美孟姜洵美且都靜女其姝靜女其變出靜女並詩史婦容不必顏色美麗也盥浣塵穢服餚鮮潔沐浴以待身不垢辱是謂婦容後漢列女傳王夫人神清散朗故有林下風氣顧家婦清心玉映自是閨房之秀晉書列女傳互見標致門集鉛華不御芳澤無加選洛神賦著粉則太白施朱則太赤選洛神賦秀色掩今古荷花羞玉顏浣沙弄碧水自與清波閑李太白婉娩淑姿鏘翔令容家貧歲不易衣而天姿潔清修嚴常若簪珠璣衣紈縠寥然不易為塵垢雜並出柳文經是刈是獲為絺為綌葛覃婦無公事休其蠶織大雅瞻仰執麻枲治絲繭織紝組紃學女事以供衣服觀於祭祀納酒漿籩豆葅醢記內則史婦功不必工巧過人也專心紡績不好戲笑絜齊酒食以奉賓客是謂婦功後漢列女傳傳記吳王趙夫人能於指間織錦號機絕於方寸帛上繡五岳河海號針絕以神膠續髮為帽仍一髮析為縷號絲絕晉王子嘉拾遺記順宗時南海貢奇女盧眉娘能於一尺絹上繡法華經字如粟米又作飛仙蓋以絲一縷為蓋五重中有十洲三島唐蘇鶚蘇氏演義集美人細意熨貼平裁縫滅盡針線跡杜詩縫為絕國衣李白經文伯之喪敬姜據其床而不哭曰昔吾有斯子也吾將以為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮夫記檀弓下子公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好內者女死之今吾子早夭吾惡其以好內聞也二三婦人之欲供先祀者請無瘠色無揮涕無拊膺無哀容無加服從禮而靜是昭吾子也孔子聞之曰公文氏之婦智矣剖情析禮以明其子為令德也家語子貢問史芮伯萬之母芮姜惡芮伯之多寵也故逐之出居于魏左威三年公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事王乎其母嘆曰子其忘乎使僮子備官而未之聞耶居吾語汝諸侯朝修夫子之業至晝考其國職夕省其典刑夜儆百官使無滔淫而後即安卿大夫朝考其職晝誦其庶政夕序其業夜在其家而後即安士朝受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠國語魯語趙括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能奪然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及括將行其母上書言於王曰括不可使將王曰何以對曰始妾事其父為將身所奉飯而進食者以十數所友者以百數大夫及宗室所賞賜者盡以予軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者所賜金帛歸藏於家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣史記趙奢傳陳嬰母謂嬰曰自我為汝家婦未嘗聞先古之有貴者今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也史記項籍紀張湯自殺昆弟諸子欲厚葬湯湯母曰為天子大臣被惡言而死何厚葬為載以牛車有棺而無椁上聞之曰非此母不生此子西漢張湯傳雋不疑每行縣錄囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為飲食或亡所出母怒為之不食西漢本傳趙母指括以全其宗前漢晁錯傳贊翟方進辭其後母至京師受經母憐其幼隨之長安織屨以給方進西漢項羽取王陵母置軍中陵使至則東向坐陵母以招陵母私送使者泣曰為妾語陵善事漢王毋以老妾故持二心妾以死送使者遂伏劍而死西漢王陵傳嚴延年為河南太守河南號曰屠伯其母從東海來到洛陽見報囚大驚止都亭不入府延年至謁母閉閤不見延年免冠頓首閤下良久乃見之因數責延年幸得備郡守不聞仁愛教化以全安愚民顧多刑殺人欲以立威我不意當老見壯子被刑戮行矣去汝東歸掃除基地耳遂去歲餘延年坐棄市東海賢其母前漢金日磾母教誨二子甚有法度上聞而嘉之病死詔圖書於甘泉宮西漢建寧二年大誅黨人滂聞即自詣獄白母母曰汝今得與李杜齊名死亦何恨東漢范滂傳郭丹後母為鬻衣裝賣產業與從師長安後漢廢高貴鄉公收王經經謝其母母顏色不變笑而應曰人誰不死正恐不得其所以此并命何恨之有通鑒魏文帝紀蘇峻舉兵卞壼死之二子眕盱見父沒相隨赴賊同時遇害母裴氏撫二子尸哭曰父為忠臣女為孝子夫何恨乎晉書本傳韋逞年小母宋氏晝則採樵夜則教逞遂得成名陶侃為潯陽縣吏嘗監魚梁以鮓遺母湛封鮓及書責侃曰爾為吏以官物遺我非惟不能益吾乃以增吾憂矣范逵曰非此母不生此子虞潭征蘇峻潭母孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為累也並出列女傳陶侃早孤貧范逵嘗過侃時倉卒無以待賓其母乃截髮得隻髻以易酒肴晉書何無忌夜於屏風里草檄文其母劉牢之姊也登凳密窺之泣曰汝能如此吾復何恨問所與同謀者曰劉裕母尤喜因為言玄必敗舉事必成之理以勸之通鑒晉安帝紀高頻初為僕射其母誡之曰汝富貴已極但有一斫頭耳爾其謹之隋書張易之張昌宗居中用事柏彥範謀誅之彥範以事白其母曰忠孝不兩全先國後家可也唐中宗紀李景讓母鄭氏家貧諸子皆幼母自教之宅墻因雨潰陷得錢盈船奴婢喜走告母母往焚香祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則愿諸孤他日學問有成乃其志也此不敢取遽命揜而築之三子皆進士及第景讓官達髮已班白小有過不免笞箠通監唐武宗紀宣武節度使劉玄佐有威略其母雖貴日織絹一匹謂玄佐曰汝本寒微天子富貴汝至此必以死報之故玄佐始終不失臣節通鑑唐德宗紀僕固懷恩既不為朝廷所用遂與河東都將李竭誠潛謀太原十將白玉殺其子瑒懷恩入告其母母曰吾語汝勿反國家待汝不薄今眾心既變禍必及我將如之何懷恩不對再拜而出母提刀逐之曰吾為國家殺此賊取其心以謝三軍懷恩疾走得免遂與麾下三百度河北走通鑑唐代宗紀崔玄暐累補員外郎其母盧氏嘗戒之曰吾見姨兄屯田郎中辛玄馭云兒子從官者有人來云貧乏不能存此是好消息若聞貲貨充足衣馬輕肥此惡消息吾嘗重此言以為確論比見親表中仕官者多將錢物上其父母父母但知喜悅竟不問此物從何而來必是俸祿餘資誠亦善事如其非理所得此與盜何別縱無大咎獨不內媿於心孟母不受魚鮓之饋蓋為此也汝今坐食祿俸榮幸已多若其不能忠清何以戴天履地孔子云雖日設三牲之養猶為不孝曰父母惟其疾之憂特宜修身潔己勿累吾此意也唐書本傳王珪與房杜善過其家珪母闚喜曰二客公輔才汝貴不疑同上互見識見蕭俛母韋賢明治家嚴俛雖宰相侍左右如褐衣唐書傳記孟子既學而歸孟母問學所至孟子自若也孟母以刀斷其織曰子之廢學若吾斷織也列女傳楚子反破秦軍而歸母閉門不納使人數之曰越王勾踐伐吳客有獻醇酒一器王使人注上流使士卒飲下流味不加喙異日又有獻一囊糧者王又使以賜軍士分而食之甘不踰嗌今士卒分菽粒而食之子獨朝夕芻豢何也同上孟子妻獨居踞孟子入戶視之白母曰婦無禮請去母曰非婦無禮乃汝無禮也禮不云乎將上堂聲必揚將入戶視必下不掩人不備也今汝獨燕私之處入戶不有聲令人踞而視之是汝無禮非婦無禮也於是孟子自責不敢去婦韓詩外傳田子為相三年歸休以金百鎰奉其母母曰不義之物不及於館為人臣不忠是為人子不孝子其去田子慚愧走出自歸於王還金請退就獄同上孟母舍近墓孟子嬉戲為墓間之事孟母曰此非所以居子處也乃去舍市旁其子嬉戲為賈衒孟母又曰此非所以居子處也乃舍學宮之旁其子嬉戲乃設俎豆進退揖讓孟母曰此真可以居子也遂居之及孟子長學六藝卒成大儒列女傳互入鄰里孟仁少從李肅學其母為作厚蓐大被曰小兒無德致客學者多貧故為廣被庶可得與氣類接也除監池司馬捕魚作鮓寄母母責之曰汝為魚官而以鮓寄我非避嫌也吳錄集當秦之末豪傑共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤卒富貴不祥嬰從其言而陳氏以寧班叔皮王命論惟習孟氏強為母師柳文本朝脩不幸生四歲而孤太夫人守節自誓居貧自力以衣以食以長以教俾至于成人太夫人告之曰汝父為吏廉而好施與喜賓客其俸祿雖薄常不使有餘曰毋以是為我累故其亡也無一瓦之覆一壟之植以庇而為生吾何恃而能自守耶吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也廬陵集隴岡阡表書其子之賢而有立則見其母之方歐公作李氏墓銘蓄德在躬以成家室發祥于後以遺子孫臨川集蘇公軾生十年太天人親授以書嘗讀東漢史至范滂傳慨然太息公侍側曰某若為滂夫人亦許之乎太夫人曰汝能為滂吾固不能為滂母耶子由撰兄墓銘豈惟家室宜壽母實與朝廷生異人坡詩
