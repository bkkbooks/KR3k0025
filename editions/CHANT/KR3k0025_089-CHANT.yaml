body:
  text: 取禍經患至掇也易訟卦斯其所取災易旅卦羝羊觸藩羸其角易大壯慢藏誨盜冶容誨淫德薄而位尊知小而謀大力少而任重鮮不及矣負且乘致寇至盜之招也並易繫辭晉者進也進必有所傷易序卦受爵不讓至于己斯亡詩角弓子曰口惠而實不至怨菑及其身記表記愚而好自用賤而好自專烖及其身者也記中庸好人之所惡惡人之所好是謂拂人之性菑必逮夫身記大學子曰放於利而行多怨語里仁羿善射奡盪舟俱不得其死然語憲問子譬若載無轄之車以臨千仞之谷欲其不顛覆難也家語寶珠玉者殃必及身孟盡心下邪穢在身怨之所構荀子勸學言有召禍同上位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也荀子仲尼以卵投石以指撓沸若赴水火入焉焦沒耳荀子議兵山木自寇莊子虞氏者登高樓臨大路設樂陳酒擊博樓上俠客相隨而行飛鳶適墜其腐鼠而中之俠客相與言吾不侵犯之而乃辱我必滅其家至期日之夜聚眾積兵以攻滅虞氏列子說符互見事出意表乘奔而去轡履冰而負重鄧析子齎不貲之寶獨宿曠野其危甚於累卵傳子蹈薄冰以待夏日登朽枝而須勁風抱朴子虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身之可保也同上禍之所生必由積怨劉子史兵猶火也弗戢將自焚左傳隱公四年匹夫無罪懷璧其罪左威十無德而祿殃也左閔二互入踰分服之不衷身之災也適也左僖二十四互入不稱華而不實怨之所聚也犯而聚怨不可以定身左文六今夫子傲取禍之道也左威十四鄭子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚群不逞之人以作亂殺子駟左襄十小人懷璧不可以越鄉左襄十五孔子曰有臧武仲之智而不容於魯國抑有由也作不順而施不恕也左襄二十三齊莊公鞭侍人賈舉而又近之乃為崔子崔杼間公左襄二十五互入不能防閑齊慶封獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也左襄二十八齊高止好以事自為功故難及之左襄二十五叔向曰汰侈已甚身之災也左昭五無大功而求大祿皆怨府也積貨滋多蓄怨滋厚八郤五大夫三卿其寵大矣一朝而滅惟無德也並國語勇略震主者身危功蓋天下者不賞西漢蒯通傳所謂探虎口者也史酈生傳好聲矜賢竟以名敗史晁厝傳論居君子之位而為庶人之行者患禍必至也通鑑漢武紀知眾嫭之嫉妒兮何必颺纍之蛾眉眉音眉譏屈原自舉蛾眉合眾嫉之西漢揚雄傳湯數行丞相事知三長史素貴故陵折丞吏遇之三長史皆怨恨通鑑漢武紀張湯下令不便顏異不應微反唇湯奏異腹非論死前漢食貨志鼠不容穴衘窶藪也西漢楊惲傳顏師古曰窶藪者載器也昔國武子好招人過以致怨惡通鑑漢質紀昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難通鑑漢桓紀陳蕃欲誅宦官乃事露章曰願出臣章宣示左右令諸姦臣知臣疾之已上互入踈略聞者莫不震恐謀未及發為曹節王甫等矯詔殺之東漢本傳臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身淫刑禍及朋友士類殲滅而國隨以亡通鑑漢靈紀孔融棄市融恃其才望數侮戲曹操通鑑漢獻紀關羽剛而自矜張飛暴而無恩以短取敗通鑑三國魏文張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右此取禍之道也飛不悛其帳下將殺飛蜀志何曾陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書互入傲慢匹夫獨立結恨彊宗通鑑西晉世祖紀謝靈運恃才放逸多所陵忽故及於禍通監宋太祖崔浩書魏之先世事皆詳實列於衢路往來見者咸以為言北人無不忿恚帝怒殺之通鑑宋太祖李延壽論曰凶人之濟其身非世亂莫由焉曹爽以亂世之情而行之於平日其取敗也宜哉通監宋太祖魏崔浩曰張虛聲而召實禍通監宋太祖紀劉孝綽仗氣負才多所陵忽每於朝集會同處公卿間無所與語反呼騶卒訪道途間事由此多忤於物前後凡五免南史宋紀劉孝綽傳賀若弼復坐事下獄上數之曰公有三太猛嫉妬心太猛自是非人心太猛無上心太猛通監王義方以疾惡不容於時唐書本傳如火投泉安得不敗唐書則天贊王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通監後周太祖庇朽木乘膠舡唐韋承慶傳互入愚暗張昌齡獻頌太宗謂之曰昔禰衡潘岳皆恃才傲物以至非命唐書傳記多藏不用是謂怨府說苑叢談周伯仁為人志大而才短名重而識闇好乘人之弊此非自全之道嵩性狼抗亦不容於世世說中集累卵於疊棊左太沖魏賦財居權寵四海側目庾元規表守孤直以見嫉觸姦邪而結釁劉長卿何異登膠舩而汎巨浸操朽索以馭奔駟若飛蛾之赴明燭破塊之落空谷殊不知坐致燋爛而莫能自出並唐文粹愚觸駭機迸落深泉劉賓客鵲巢聲楂楂烏噪聲擭擭爭鬭庭宇間持身慱彈射韓文互入因言好盡言以招人過國武子所以見殺於齊也韓文同上不擇言以危肆兮固群禍之際也御長轅之無撓兮行九折之峨峨卻驚棹以橫江兮泝凌天之騰波柳懲咎賦多藏潤屋賈禍危身白樂天足踐禍門皮日休得一時之貴滅百世之族杜牧之本朝靡然如蛟龍釋其風雲之勢而安於豢養之樂終以不悟使其腹披股裂登於匹夫之俎東坡上韓太尉書經其心愧恥若撻于市書說命上缾之罄矣惟罍之恥詩蓼莪君子有五恥居其位無其言無其行君子恥之記雜記下君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德恥有其德而無其行使民有所勸勉愧恥以行其言並記表記知恥近乎勇記中庸巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之語公冶長邦有道貧且賤焉恥也邦無道富且貴焉恥也語子路邦有道穀邦無道穀恥也語憲問子羞惡之心義之端也孟公孫丑上喍爾而與之行道之人弗受蹴爾而與之乞人不屑也孟告子下君子恥不修不恥見污恥不信不恥不見信恥不能不恥不見用荀子非十二子恥不從枉管子史隨會能賤而有恥左文十二每念斯恥汗未嘗不發背霑衣也西漢司馬遷傳赧然流汗會稽之恥漢書君子雖貧不受亂君之祿說苑集死辱片時痛生辱長年羞孟東野互見尚氣門經小人不恥不仁易繫辭有靦面目詩何人斯白華廢則廉恥缺矣詩六月殷人之敝勝而無恥記表記子無羞惡之心非人也孟公孫丑上徧國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之它此其為饜足之道也孟離婁下無恥之恥無恥矣孟盡心上恥之於人大矣為機變之巧者無所用恥焉不恥不若人何若人有同上其無愧而不知恥也甚矣莊子在宥厚顏而忍詬荀子解蔽辱莫大於不知恥文中子關朗篇秦太后與嫪力高切毐於改切私通事皆決於嫪毐諸客求官為嫪毐舍人千餘人史呂不韋傳棄禮義捐廉恥日甚西漢賈誼傳頑頓亡恥奊音胡結切詬音后亡節廉恥不立且不自好苟若而可同上鮮廉寡恥則俗不長厚西漢司馬相如傳飢寒至身不顧廉恥前漢食貨志回面汙行以事諂諛之人而求親近於左右史鄒陽傳司馬長卿竊貲於卓氏東方朔割名於細君西漢楊雄傳梁孫廉性巧佞善宦時人為履謎以譏之曰刺鼻不知嚏蹋面不知嗔嚙地作步數持此得勝人刺其不避恥辱以求名位也南史本傳齊著作郎祖珽有文學多技藝而踈率無行嘗為高祖中外府功曹因宴失金叵羅於珽髻上得之通監陳世祖互入表裏不副梁主入朝于鄴周主自彈琵琶梁主起舞曰陛下既親撫五絃臣何敢不同百獸通監陳紀崔日用燕內殿酒酣起為回波風舞求學士唐書楊再思為內史專以諂媚取容張同休戲再思曰楊內史面似高麗再思欣然即剪紙帖巾反披紫袍為高麗舞舉坐大笑通監唐中宗互入諂諛唐順宗永貞元年王叔文王伾等任事十餘家之門車馬如市賓客候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之通監互入奔競馮道累朝不離將相三公三師之位浮沉取容嘗著長樂老敘自述累朝榮遇之狀通監五代後周太祖傳記王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴世說互入放蕩武后時侯知一年老敕令致仕知一乃詣朝堂跳躍馳走以示輕捷朝野僉載互入貪迷進士王元遠干索權豪無厭或遭撻辱略無悔悟時人云王元遠慚顏厚如十重鐵甲王仁裕開元天寶遺事經女正位乎內男正位乎外男女正天地之大義閑有家悔亡並易家人重門擊柝以待暴客易繫辭以禮自防詩淇奧牙璋以起軍旅以治兵守周禮典瑞姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食記曲禮上互入歸寧姊妹兩門外言不入於梱內言不出於梱記曲禮上互見限則男女不雜坐不同椸枷不同巾櫛不親授嫂叔不通問記曲禮上互入避嫌僕御婦人則進左手後右手記曲禮上刑人不在君側同前注為紀恨審也男女不通衣裳男子入內不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止記內則夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族則前後家東西家無有則里尹主之記雜記下大為之防禮以坊德刑以防淫命以防欲記坊記君不與同姓同車與異姓同車不同服同上先王因為酒醴壹獻之禮賓主百拜終日飲酒而不得醉焉此先王所以備酒禍也記樂記夫禮禁亂之所由生猶坊止水之所自來也記經解子外屏不欲見外也內屏不欲見內也荀子大略互入限則為冠所以莊其首也為履所以重其足也衣裳襜如劍佩鏘如皆所以防其躁也文中子史婦人送迎不出門見兄弟不踰閾左僖二十二女有家男有室無相瀆也左威十八諸侯相見軍衛不徹警也左宣十二趙孟曰床第之言不踰閾況在野乎左襄二七孔子曰犧象不出門嘉樂不野合左定十漢初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之西漢孝文紀劉郃曰凶豎多耳目恐事未會先受其禍通監漢靈紀譬如養鷹飢則附人每聞風飆之起常有凌霄之志正宜謹其絛籠豈可解縱任其所欲哉通監晉武紀或謂常山王演曰鷙鳥離巢必有探卵之患今日王何宜出通監陳紀崔神慶曰五品以上佩龜者蓋防徵召之詐內出龜以命之新唐書本傳李林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜街前驅在數百步外一夕屢徙床雖家人莫知其處通監唐元宗互入自歉唐高祖改隋竹使符為銀菟符後改為銅魚符以起軍旅易守長新唐書車服志懷重寶者不以夜行戰國策集虎豹九關天門九重使神虎豹執其關楚詞今人有宅於山者知猛獸之為害則必高其柴援而外施窞阱以待之宅於都者知穿窬之為盜則必峻其垣牆而內固扄鐍以防之韓文守戒傳記千仞之牆禍不入門焦贛易林史齊莊公鞭侍人賈舉而又近之乃為崔氏崔杼間公左襄二十五互入取禍岑彭所營時攻公孫述地名彭亡聞而惡之欲徙會日暮蜀刺客詐為亡奴降夜刺殺彭東漢本傳來歙攻公孫述蜀人大懼使刺客刺歙未殊自書表曰臣夜人定後為何人所賊傷中臣要害本傳昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難通監漢桓紀互入取禍張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右取禍之道也飛不悛其帳下將殺飛蜀志互入取禍蜀大將費禕與諸將大會於漢壽郭循在坐禕歡飲沈醉循起刺禕殺之禕資性汎愛不疑於人張嶷嘗以書戒之曰昔岑彭帥師來歙使節咸見害於刺客今將軍位尊權重待信新附太過宜鑒前事少以為警禕不從通監魏紀義康自謂兄弟至親不復存君臣形跡率心而行曾無猜防通監宋太祖齊王晏輕淺無防與賓客語好屏人請間明帝聞之疑遂有誅晏之意通監齊紀
