body:
  text: 以己度人子埳井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖扶頤蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎莊秋水互入見聞淺狹群蟻觀鼇隱如岳蟻曰彼之冠山何異我之戴粒逍遙封壤之顛伏乎窟穴也符子集離婁微睇兮瞽以為無明楚辭已嗜臭腐養鴛雛以死鼠嵇叔夜書本朝此戰國策士以已度伊尹者也東坡經他人有心予忖度之詩巧言億則屢中語自我致戎又誰咎也易解卦小人怨汝詈汝則皇自敬德書無逸責人斯無難惟受責俾如流是惟艱哉書秦誓子曰三人行必有我師焉擇其善者而從之其不善者而改之語述而正己而不求於人則無怨記中庸君子求諸己衛靈公子曰見賢思齊焉見不賢而內自省也君子病無能焉不病人之不己知也並語里仁不患人之不己知患其不能也語憲問內省不疚夫何憂何懼語顏淵互入無愧子吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣莊駢拇篇愛人不親反其仁治人不治反其智禮人不荅反其敬行有不得者皆反求諸己孟離婁上自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣孟公孫丑上射者正己而後發發而不中不怨勝己者反求諸己而已矣同上有人於此其待我以橫逆則君子必自反也孟子曾子曰同遊而不見愛者吾必不仁也交而不見敬者吾必不長也臨財而不見信者吾必不信也三者在身曷怨人荀法行見善翛然必有以自存也見不善愀然必有以自省也荀脩身與其譽堯而毀桀也不如掩聰明而反脩其道也淮南子李密問英雄子曰自知曰英自勝曰雄文中子史楚椒舉曰無瑕者可以戮人左昭四富辰曰吾兄弟之不協焉能怨諸侯之不睦左傳僖二十三心苟無瑕何恤乎無家左閔元鄭人游于鄉校以論執政然明欲毀之子產曰我聞忠善以損怨不聞作威以防怨左襄三十一縱彼不言籍獨不愧於心乎史記項羽紀臨川羡魚不如歸而結網西漢楊雄傳互入先欲自攻聞觀物之智為反己之察東漢馬援傳人有毀己當退而求之於身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫如重裘止謗莫如自脩斯言信矣通鑑魏明紀顏含曰吾聞伐國不問仁人向馮祖思問佞於我我豈有邪德耶通監晉紀阮裕在剡曾有好車借無不給有人葬母意欲借而不敢言後裕聞之嘆曰吾有車而使人不借何以車為命焚之晉書楊昭儉曰刻石紀功不若降哀痛之詔染翰稱美不若頒罪己之文通鑑晉高祖盜發郭子儀父冢捕之不獲人以魚朝恩素惡子儀疑其使之子儀自奉天入朝朝廷憂其為變子儀見上上語及之子儀流涕曰臣久將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也朝廷乃安通監大曆元年集齊生兄為時名相朝之碩臣皆其舊友齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司豈枉我哉我將利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者眾矣亦莫計其身之短長也若齊生者既不得志矣而曰我未至也不以閔於有司其不亦鮮乎哉韓文送齊生下第序本朝君子與小人處為小人侵陵則修省畏避動心忍性增益預防老泉互入以粗達精經不善學者師勤而功半又從而怨之記學記小人求諸人語衛靈公集鏡明不自照盧仝文溺井而怨伯益失火而怨燧人經魯人有朝祥而暮歌者子路笑之夫子曰由爾責於人終無已夫記檀弓上子曰小人使人也求備焉語子路子苛煩者難為恭譙子法訓責三光不照於覆盆之內抱朴子辨問篇史孫季舒與石崇酣燕慢傲過度崇欲表免之裴楷謂崇曰足下飲人狂藥責人正禮不亦乖乎晉裴楷傳庫狄伏連居室患蠅杖門者曰何故聽入北史集自拳五色毬迸入他人宅卻捉蒼頭奴玉鞭打三百詩論經君子以虛受人易咸卦舍己從人大禹謨子古之王者知雖落天地不自慮也辨雖彫萬物不自說也能雖蓋海內不自為也莊子天道篇史昔周公朝讀百篇書夕見七十士猶恐不足通鑑惟不自用乃能用人通鑑唐德宗李絳或久不諫上輒詰之曰豈朕不能容受耶將無事可諫也通鑑唐憲宗傳記以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也太公六韜集虛舟應物駱賓王幽谷無私有至斯響洪鍾虛受無來不應頭陀寺碑本朝萬事轉頭同墮甑獨身浮世若虛舟詩話經權臣擅命詩狡童愚而好自用賤而好自專記中庸子愚者好專事而妬賢能荀儒效雞有專栖之雄雉有擅澤之鷮抱朴子史鄭子孔之為政也專國人殺之左襄十九祭仲專鄭伯患之左威十五子產曰眾怒難犯專欲難成左傳襄十盧蒲嫳聽政於其家左傳齊高止好以事自為功且專故難及之左襄二十九臧文仲曰以人從欲鮮濟左傳二十專聽生姦獨任成亂通鑑梁武紀擅利擅害通監秦紀盧杞秉政為吏部侍郎關播為中書侍郎同平章事上嘗與宰相論事播意有所不可起立欲言杞目之而止遂至中書杞謂播曰以足下端愨少言故相引至此向者柰何發口欲言耶通監唐德宗作威福於廟堂之上前漢諸侯王表專則人實敝之前漢五行志專權自恣史趙高傳春秋之義亡遂事漢家之法有矯制前漢馮奉世傳以匹夫之細竊殺生之權西漢游俠傳田蚡為丞相薦人或起家至二千石權移主上上曰君除吏盡未吾亦欲除吏嘗請考工地益宅上怒曰君何不遂取武庫西漢田蚡傳集專場誇觜距韓文經舍爾靈龜觀我朵頤凶易頤卦子人病舍其田而芸人之田所求於人者重而所以自任者輕孟子盡心下為之詭遇一朝而獲十孟子滕文公上黃歇與太子謀曰初歇與太子為質於秦不如亡秦與使者俱出臣請以死當之太子因變服為楚使者御以出關而黃歇守舍常為太子謝病度太子已遠乃自言於王曰楚太子已歸出遠矣歇願賜死通監周紀李雲上書帝怒下有司逮雲時弘農五官椽杜眾傷雲以忠諫獲罪上書願與雲同日死通監漢桓紀朱震收葬陳蕃尸匿其子逸事覺繫獄合門桎梏震受考掠誓死不言逸由是得免通監漢靈紀侍御史景毅子顧為李膺門徒未有錄牒不及於譴毅慨然曰本謂膺賢遣子師之豈可以脫漏名籍苟安而已遂自表免通監漢靈紀集士有經世籌自無活身策姚仝子為淵敺魚者獺也為叢敺雀者鸇也孟子離婁上互入與人為地墨子兼愛摩頂放踵利天下為之孟子史梁武帝曰朕三更出治事事少午前竟事多日昃方食昔要腹過於十圍今之瘦削裁二尺餘為誰之咎救物故也通鑑本紀集如何織紈素自著藍縷衣孟東野賓客懽娛僮僕飽始知官職為他人白樂天集互入省悟及與人為地年年道我蚕辛苦底事渾身著紵麻杜荀鶴集蚕老繭成不庇身蜂飢蜜熟屬他人白樂天
