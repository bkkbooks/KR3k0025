body:
  text: 兵法經險野人為主易野車為主周禮大司馬子知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必殆孫子夜戰多火鼓晝戰多旌旗所以變人之耳目也故朝氣銳晝氣惰暮氣歸故善用兵者避其銳氣擊其惰歸無邀正正之旗無擊堂堂之陣同上鼓鞞金鐸以威耳旄麾旗章以威目禁令刑罰以威心吳子用兵之法佯北勿從銳卒勿攻餌兵勿食歸師勿遏圍師必闕窮冠勿迫孫子易則用車險則用騎涉水則多弓隘則用弩晝則多旌夜則多火晦冥多鼓此善為設施者也淮南子詮言訓金鼓以聲氣也左僖二十二年兵法曰陷之死地而後生置之亡地而後存西漢韓信傳趙涉曰兵事上神密西漢周亞夫傳上兵伐謀其次伐交知敵有外交相援者則誤之令其解散也西漢息夫躬傳兵法曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主與敵也君不擇將以其國予敵也四者兵之至要也通監漢文紀夜戰聲相知則足以相救晝戰目相見則足以相識同上虞詡為武都太守兵不滿三千攻羌眾萬餘人後漢諸葛孔明八陣聚細石為之各高五丈棊布相當中間相去九尺正中開南北巷悉廣五尺或為人散亂為夏水所沒至冬水退依然如故三國志荊州記曰八陣既成自今行師不復敗後見莫能子之夫用兵之道攻心為上攻城為下心戰為上兵戰為下通鑑魏明紀兵法曰巧遲不如拙速梁書侯景傳盛彥師曰兵法尚詐通鑑唐高祖王君廓以十三人破賊一萬自古以少擊眾未之前聞唐書兵法避實擊虛唐書劉仁軌傳馬燧曰兵法善於致人而不致於人唐書樂毅以弱燕破齊七十餘城者齊無法故也孫武以三萬破楚二十萬者楚無法故也韓信以寡眾破趙二十萬者趙無法故也近者曹操以八千破袁紹五萬者袁無法故也此五子能以少剋多者軍有法故也合儉王尋徒百萬光武只三千張承吉傳記其正如山其奇如雷七書以一擊十莫善於阨以十擊百莫善於險以千擊萬莫善於阻用眾者務易用少者務阨也六韜太宗將討高麗曰兵少地遙以何術臨之靖曰臣以正兵太宗曰平突厥用奇兵今言正兵何也曰諸葛亮七擒孟獲正兵而已自黃帝以來先正後奇先仁義而後權譎霍邑之戰師以義舉者正也建成墜馬右軍少郤者奇也李衛公問對太宗曰天地風雲龍虎鳥蛇斯八陣何謂也靖曰傳者之誤也古人秘藏此法詭設八名本一也分為八焉天地者本乎旗號風雲者本乎旛名龍虎鳥蛇本乎隊伍之別後世詭設物象何止八乎太宗曰數起於五而終於八則非設象實古制也太宗曰製六花陣法出何術乎李衛公曰諸葛亮八陣法也大陣包小陣大營包小營隅落鉤連曲折相對古制如此臣為圖因之故外畫之方內環之圓是成六花俗所號耳苻堅總百萬之眾而敗於淝水此兵合而不能分而吳漢討公孫述與副將劉尚分屯相去二十里述來攻漢尚出合擊大破之此兵分而能合者也已上並李衛公問對本朝古人以少擊眾袁紹以百萬阻官渡曹操以十萬取之王莽百萬之眾光武昆陽之眾有八千取之苻堅下淮百萬謝玄才二萬人一麾而亂鳴道集經師出以律易師卦今日之事不愆于六步七步乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子書牧誓蕭蕭馬鳴悠悠旆旌之子于征有聞無聲詩車攻軍旅令銜枚周禮銜枚氏子孔子曰明王之征猶時雨之降是過師於衽席之上也家語秦之銳士不可以當威文之節制荀子議兵鼓所以任也起也進也金所以造也退也免也旗所以立兵也偃兵也此之謂三官有三令而兵法治也管子兵法將受命於君君命有所不受孫子夫金鼓旌旗者所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退同上史張侯曰師之耳目在吾旗鼓進退從之左成二年少長有禮其可用也左僖二十八年勾踐患吳之整也使死士者再禽焉不動左定十四年號令不煩師徒向之史太公自序孫子武者以兵法見於吳王闔廬闔廬曰可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可出宮中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長皆令持戟約束既布乃設斧銊即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃遂斬隊長二人以徇史記孫子傳部署諸將漢高紀上自勞軍細柳軍士被甲持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍令不聞天子詔上至不得入使使持節亞夫乃開壁士吏謂從屬車騎曰將軍約軍中不得馳驅天子乃按轡徐徐至營曰此真將軍矣史記周勃世家李陵擊匈奴夜擊鼓起士鼓不鳴曰吾士氣少衰而鼓不起何耶軍中豈有女子乎搜軍中得卒妻皆斬之漢書從枕席上過師西漢趙充國傳趙充國行必為戰備止必堅營壁西漢本傳世祖謂景純曰大軍不可夜動故不相救後漢鄧禹乘勝獨克而師行有紀通鑑漢光武紀呂蒙軍容鮮整士卒練習通鑑漢獻紀呂蒙入江陵約令軍中不得干歷人家有所求取蒙麾下士與蒙同郡人取民家一笠以覆官鎧蒙猶以為犯軍令不可以鄉里而廢法遂垂涕斬之同上慕容恪軍令嚴明秋豪不犯通鑑晉穆紀文德皇后之葬叚志玄統士馬出宿於章武門太宗夜使宮官至營志玄閉門不納曰軍門不可夜開使者曰有勑志玄曰夜中不辨真偽竟停使者至曉太宗聞而嘆曰此真將軍也周亞夫何以加焉唐書光弼令諸將曰爾輩望吾旗而戰吾颭旗緩任爾擇利而戰吾急颭旗三至地則萬眾齊入死生以之少退者斬通鑑唐肅宗臨淮王用郭汾陽部曲一經號令氣色益精明唐書郭子儀麾下老將若李懷光輩數十人皆王侯重貴子儀順指進退如僕隸焉幕府之盛近代無比舊唐本傳指顧諸將不敢仰視唐李光弼傳李晟討朱泚至師入長安人不知唐本贊樵蘇無犯唐李晟傳李晟收復京城左右呼曰相公來賊皆驚潰秋毫無犯遠坊有經宿乃知官軍入城者通鑑唐德宗李晟克京師市不改肆愬平蔡亦如之功名之奇近世所未有唐書互見克紹柳公綽鎮鄂州軍士之妻冶容不謹者沈之于江行卒相感曰中丞為我輩治家事何以報效故鄂人戰每剋捷舊唐本傳瀛州剌史劉澭將部兵千五百人男女萬餘口詣京師號令嚴整在道無一人敢取人雞犬者通鑑唐德宗宣祖皇帝為馬軍副都揮使引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命明旦乃得入通監五代周世宗傳記句踐更陳嚴法復誅其有罪者五人徇曰吾愛士也雖吾子不能過也及其犯誅自吾子亦不能脫也後漢趙曄吳越春秋集出必以律錙銖無爽選奏彈歷百城而饋餼皆辭居一夕而墻宇必葺憩林適去墜果猶存徑田疾趍滯穗不犯呂和叔民老幼婦女不驚市買不變田之菓榖下無一跡韓退之器用犀利斥候精明李深之文旗幟鮮潔戈甲犀利李深之文本朝赴敵之兵銜枚疾走不聞號令但聞人馬之行聲歐公集旗幟精明鼓角驩亮東坡將賢士氣振令肅軍聲悄欒城集史亂次以濟遂無次且不設備左桓十三年中軍下軍爭舟舟中之指可掬也左宣十二年楚子圍宋宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告左宣十五年其行速過險而不整速則失志不整喪列志失列喪將何以戰左成十六年楚子為舟師以伐吳不為軍政無功而還左襄二十四年鄭陣而不整蠻軍而不陳在陳而囂合而加囂各顧其後莫有鬭心左成十六年漢王晨自稱漢使馳至壁張耳韓信未起即其臥奪其印符麾召諸將易置之耳信起乃知獨漢王來大驚西漢韓信傳上自勞軍至霸上及棘門軍直馳入將已下騎送迎文帝曰霸上棘門軍若兒戲其將固可襲而取也史周亞夫傳程不識曰李廣軍極簡易然虜卒犯之無以禁也通監漢武紀祖逖進據大丘樊雅遣眾夜襲逖入壘拔戟大呼直趍逖幕軍士大亂晉書本傳渡險而囂是無政令唐太宗紀方陣而囂不足虞也新唐李光弼傳經如山之苞詩常武子圓居而方正則若盤石然荀子議兵史晉欒書伐楚晨壓晉軍而陣范忙曰楚師輕窕固壘而待之三日必退左傳任大功者不以輕敵戰國策轅生說漢王深壁勿戰羽引兵南漢王堅壁不與戰通監漢高紀漢王欲與楚戰鄭忠使高壘深塹勿與戰漢王聽其計同上吳楚乏糧欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下周亞夫堅臥不起頃之復定西漢本傳互入處事間暇韓安國曰用兵者以飽待飢正治以待其亂定舍以待其勞西漢本傳趙充國遠斥候尤能持重羌數挑戰充國堅守同上周亞夫堅壁以挫吳楚司馬懿閉營而困葛亮北齊通每向必持重雖不大克亦不敗負新唐書屈突通傳王忠嗣為將能持重安邊唐書本傳夫為將當務填重審巳量敵非萬全不可動通監晉成紀經一月三捷詩采薇師有功則左執律右秉銊周禮大司馬戰功曰多周禮司勳史季武子以所得於齊之兵作林鐘而銘魯功焉左襄十九年楚子敗晉師于邲潘黨曰盍築武軍而收晉尸以為京觀左宣公十二年乘利席勝西漢蒯通傳衛青霍去病絕幕擊匈奴匈奴遠遁幕南無王庭史匈奴傳犁其庭掃其閭郡縣而置之雲徹席卷後無餘菑西漢匈奴傳砰轒轀破穹廬分犁單于磔裂屬國西漢楊雄傳腦沙幕髓夷吾西匈奴傳竇憲登燕然山刻石勒功令班固作銘有曰斬溫禺以釁鼓血尸遂以染鍔皆匈奴王號躡冒頓之區落焚老上之龍庭上以攄高文之宿憤光祖宗之玄靈下以安固後嗣恢拓境土振大漢之天聲東漢本傳竇憲一舉而空朔庭後漢割裂王庭席卷漠北東漢杜篤傳挂旆天山封泥函谷晉武紀乘勝席卷晉羊祜傳摧鋒越河掃清異朔晉祖狄傳宇文泰敗高歡於渭曲乃於戰所人種柳一株以旌武功通鑑梁武帝紀英衛依乘風雲勒功帝籍唐李勣贊秦叔寶隨太宗破尉遲敬德功最多高祖遣人賜以金瓶勞之曰朕肉可為卿用者割以賜卿況子女玉帛乎唐書尉遲敬德之來桑蔭不徙而大功立唐書贊薛仁貴擊九姓突厥三矢射殺三人軍人歌曰將軍三箭定天山唐書戰功推為軍中第一唐李光弼傳國家再造卿之力也唐郭子儀傳李晟帝紀其功自文于碑唐書傳記軍賞不踰月司馬法集滅跡掃塵斬其梟將使三軍之士視死如歸選李少卿滅跡掃塵若風霜之捲秋籜駱賓王倬焉勳烈孰與齊躅柳文驩聲治於萬夫勝氣橫於千里鯨鯢已戮見東海之無波氛氣盡銷仰太陽之普照共集堂堂之陣用成善善之功以此鼓行坐觀盡敵並同上指北海而封燕然中西域而立幕府杜牧之經衽金革死而不厭記中庸史躬擐甲冑左成十二年親受矢石左襄十年郤克傷於矢流血及屨未絕鼓音左成二年張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病同上簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下群子勉之死不在寇又曰吾伏弢嘔血鼓音不衰左哀二年陳書曰此行也吾聞鼓而已不聞金矣左哀十一年穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身史本傳段熲與先零戰虜兵盛熲眾皆恐熲謂將士曰今去家數千里進則事成走必盡死努力共功名因大呼眾皆應聲騰赴突擊虜眾大潰通鑑漢靈帝觸白刃冒流矢後漢劉琨曰吾枕戈待旦志梟逆虜晉書李晟擊李懷光朱泚下令曰公等此時不誅元凶非豪也渭橋斷賊首尾吾欲與公戮力一心建不世之功可乎士皆雪泣曰惟公命唐書本傳傳記良將之趍時也衣不解帶履不遺躡三略集肝腦塗中原膏液潤野草而不辭也文選司馬長卿檄鞮鍪生蟣虱介冑被沾汗楊雄長楊賦汗馬出長城選北伐詩胡茄門下思羌笛隴頭鳴同上朝馳左賢陣夜薄休屠營范彥龍效古千金買馬鞍百寶裝刀頭杜詩服金革而無辭當矢石而有勇白傳集晝不釋刃夜不釋甲柳文子聲名足以暴灸之威強足以捶楚之拱揖指麾而強暴之國莫不趍使荀子富國史項羽已殺卿子寇軍召見諸侯將入轅門無不膝行而前莫敢仰視史記羽紀兵固有先聲而後實者史韓信傳郅都為鴈門太守匈奴素聞都節舉邊為引去竟都死不近鴈門匈奴至為偶人象都令騎馳射莫能中見憚如此西漢丕傳李廣居右北平匈奴聞之號曰漢之飛將軍避之數歲不敢入右北平史本傳名聲暴於夷貉威稜憺乎鄰國西漢李廣傳檀道濟宋元嘉中與魏軍三十餘戰多捷雄名大振魏甚憚之圖之以禳鬼南史突厥大畏長孫晟聞其弓聲謂為霹靂見其走馬稱為閃電隋書突厥畏韓擒虎之名不敢仰視同上郝玼每獲虜必刳剔而歸其屍虜大畏道其名以怖啼兒贊普鑄金像令于國曰得生玼者以金玼償之唐書德宗謂張萬福曰朕以為江淮間草木亦知卿威名同上傳記宋質直破虜有威名虜相恚曰使汝行逢宋督燉煌實錄古之至兵士民未合而威已諭矣已服矣豈必用旌旗干戈哉故善諭威者於其未發也於其未通也呂氏春秋集威令首塗選東京賦威風先逝選書兵貴先聲陳子昂集成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊惟多昂始輕杜詩兵氣回飛鳥威聲沒巨鰲同上指鄭則三軍白首麾晉則千里流血白帖互見為國所倚軍聲遠屆先路以風行白集聲有聞於天下氣無敵於荒野白傳集以虛聲破精勁唐文粹雖李廣材能充國沈勇但能閉壘豈敢交綏杜牧之史穰苴曰將在軍君令有所不受史記本傳有前一尺無郤一寸魏志先主大會群臣問魏延曰今委卿以重任對曰若曹操舉天下而來請為大王距之偏將十萬之眾至請為大王吞之蜀志突厥入寇王君廓擊之憤發大呼目及鼻一時流血此之壯氣何謝古人唐書尹子琦謂張巡曰聞君每戰眥裂嚙齒皆碎舊唐書本傳傳記雖有江河之險則凌之雖有太山之塞則陷之并氣摶精心無有慮目無有視耳無有聞一諸武而已矣呂氏春秋集將軍死綏咫尺無郤任彥昇齒刃餘魂死綏亡魄陳子昂集願死藝於伏弢誓殺身於鳴轂王維集
