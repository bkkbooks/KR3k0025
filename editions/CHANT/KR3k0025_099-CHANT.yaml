body:
  text: 明於自知經子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二語公冶長子使漆雕開仕對曰吾斯之未能信同前叔孫武叔語大夫於朝曰子貢賢於仲尼子貢曰譬之宮墻賜之墻也及肩闚見室家之好語子張子自知者明老知人者智吾長見笑於大方之家莊厲之人惡人也夜半生其子遽取火而眡之汲汲然唯恐其似己也莊天地史克於先大夫無能為役左成二年吾無其功敢有其實乎吾小人不可以厚誣君子同上范獻子聘於魯問具山敖山魯人以鄉對獻子曰不為具敖乎曰先君獻武之諱也獻子歸曰吾名其二諱為笑矣唯不學也國語互入不學參曰陛下觀臣與蕭何孰賢上曰似不及也參曰是也史曹參世家絳侯自知其能不如平遠矣通監漢高紀陳平曰我多陰謀道家之所禁吾世即廢亦已矣不能復起以吾多陰禍也西漢本傳金日磾曰臣外國人不如光且使匈奴輕漢矣通監漢武紀汲黯曰臣常有狗馬病力不能任郡事史本傳盧植曰豈可橫叨天功以為己力乎通監後漢紀是時宦官競賣恩勢唯大長秋良賀清儉退厚及詔舉武猛賀獨無所薦帝問其故對曰臣生自草茅長於宮掖既無知人之明又未嘗交於士類昔衛鞅因景監以見有識知其不終今得臣舉者匪榮伊辱是以不敢通監漢殤紀楊賜陳耽每拜公卿群僚畢賀輒嘆陳寔大位未登愧於先之通監漢靈紀陳蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣東漢黃憲傳費禕曰吾等不如丞相才知遠矣丞相猶不能定中夏況吾等乎不如且保國治民謹守社稷如其功業以俟能者無為希冀徼倖通監魏高貴卿公紀董允代費禕為尚書令旬日之間事多停滯允歎曰人材力相懸若此非吾所及蜀志本傳互入心服徐邈拜司空歎曰三公論道之官無其人則缺豈可以老病荒一作忝之哉固辭不受魏志本傳互入恬退晉沙汰郎官魏舒曰吾即其人也襆被而出同僚咸有愧色晉書本傳石勒曰人豈不自知若遇漢高祖當北面事之與韓彭比肩通監晉書王導初拜司徒謂人曰劉子喬若過江我不得拜公也晉書劉隗傳隗子疇字子喬周嵩曰嵩性抗直不容於世晉書王濟俊爽有風姿每見玠輒歎曰珠玉在側覺我形穢晉書衛玠傳淮南袁甫嘗詣何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能晉書本傳蔡謨遷司徒上疏固讓謂所親曰我若為司徒將為後代所哂義不敢拜也陸玩遷司空謂賓客曰以我為三公是天下為無人並同上魏元順曰刀筆小才堪供几案之用豈應汙辱門下通監梁紀岑文本拜中書令有憂色母問之荅曰非勳非舊責重位高所以憂也有來慶者輒曰今日受弔不受賀唐書本傳互入畏謹孜孜奉國知無不為臣不如元齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟煩治劇眾務畢舉臣不如胄以諫諍為心恥君不及堯舜臣不如證唐書王珪傳互入推遜盧懷謹同平章自以才不及姚崇事皆推而不專唐書本傳許遠自以為才不及巡請稟軍事而處其下唐書張巡傳程異亦自知不合眾心為相月餘不敢知印秉筆通監唐憲宗李德裕曰臣無名第不當非進士唐史選舉志鄭綮同平章事笑曰歇後鄭五作宰相事可知矣唐書本傳劉蕡對策第一考官不敢取被選者李郃曰蕡逐我留吾顏其厚耶乃上疏曰臣所對不及蕡遠甚內懷愧恥自謂賢良奈人言何乞回所授以旌蕡直新唐書本傳柳璨臨刑呼曰負國賊柳璨死其宜矣通監唐昭宗傳記城北徐公齊國之美麗者鄒忌謂其妻妾及客曰吾孰與徐公美皆以為徐公不若明日徐公來熟眡之自以為不如窺鏡而自眡之弗如遠甚戰國策王夷甫自嘆我與樂令談不覺我言為煩世說中本朝梁郡陵王讓丹陽尹表曰審已循涯自知莫可街談巷議尤見不勝太平御覽子神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺筴不能避刳腸之患莊外物萇弘周宣之執數者也天地之氣日月之行風雨之變律曆之數無所不通也然不自知車裂而死淮南子大夫種知所以強越而不知所以存身萇弘知周之所以存而不知身所以亡淮南子說山訓史桓公知項之可滅也而不知己之不可滅也穀梁傳如目見毫毛而不見其睫也史越世家孫子籌策龐涓明矣然不能蚤救患於被刑吳起說武侯以形勢不如德然行之於楚以暴刻少恩亡其軀史孫吳列傳以遷之博物洽聞而不能以自全西漢司馬遷傳固傷遷博物洽聞然亦身陷大戮此古人所以致論於目睫也東漢班固傳論戒人之禍智矣而不能自免於讒隙東漢馬援傳論王晏從弟思遠謂晏曰凡人多拙於自謀通監齊高祖紀工於料人拙於謀己唐書李光弼贊唐太宗曰人苦不自知耳通監本紀劉蕡戒帝漏言而身誦語于庭新唐書本贊傳記家有敝帚享之千金斯不自見之患也魏文帝典論互入不自覺常人闇於自見謂己為賢同上集李赤善為歌詩類李白名聞江湖間其始為士無以異於人一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取與向背決不為赤者幾何人耶反脩而身無以慾利好惡遷其神而不返則幸耳又何暇赤之笑哉柳李赤傳互入此莫笑彼種知吳之可以取知越之可以彊而不知身之進退存亡李元賓集秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也杜牧之青銅不自見只擬老他人羅隱集笑前人之未工忘己事之己拙史通本朝高宗責義琰為宰相而陵其母家然己以讒殺元舅無忌而不自知其惡何以責臣下之薄於母黨范祖禹唐監經長者賜少者賤者不敢辭記曲禮上諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯記王制士於大夫不承賀士有慶事不聽大夫親來賀己不敢變動尊也記玉藻賤不誄貴幼不誄長記曾子問族人不得以其戚戚君位也記大傳不在其位不謀其政語泰伯君子思不出其位語憲問子齊景公田招虞人以旌不至孟萬章下庖人雖不治庖尸祝不越樽俎而代之矣莊史齊侯欲使敬仲為卿辭曰羈旅之臣幸若獲宥所獲多矣敢辱高位以速官謗左莊二十二年卿非君命不越境左莊二十七年王以上卿之禮享管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭受下卿之禮而還左僖十二年衛甯武子曰陪臣來繼舊好其敢干大禮以自取戾左文四年鬷戾曰我家臣也不敢知國左昭二十五年冠雖敝必加於首履雖新必關於足上下之分也史儒林傳互入名分人主之尊譬如堂群臣如陛眾庶如地故陛九級上廉遠地則堂高陛無級廉近地則堂卑通監漢文紀等級分明而天子加焉故其尊不可及也同上衛青曰臣雖當斬將以臣之尊寵而不敢自擅誅於境內而具歸天子自裁之於以見為人臣不敢專權不亦可乎通監漢武紀尊尊卑卑強幹弱枝也通監漢和紀李愬入蔡州翌日裴度至愬具櫜鞬候度馬首唐書經女正位乎內男正位乎外易家人喪服凶器不入宮潛服賊器不入宮奇服怪民不入宮周禮閽人父子不同席記曲禮上父不祭子夫不祭妻禮不下庶人刑不上大夫犬馬不上於堂註非贄幣也外言不入於梱內言不出於梱並同上互入防閑支子不祭祭必告于宗子記曲禮下又喪服小記云庶子不祭禰者明其宗也無田祿者不設祭器袗絺綌不入公門苞屨扱衽厭冠不入公門並同上君子非有大故不宿於外記檀弓上庶羞不踰牲燕衣不踰祭服寢不踰廟記王制有田則祭無田則薦道路男子由右婦人由左並同上由命士以上父子皆異宮記內則男不言內女不言外大夫燕食有膾無脯有脯無膾士不貳羹胾庶人耆老不徒食尊卑差也並同上家不寶龜不藏圭不臺門記禮器歌者在上匏竹在下記郊特牲自仁率祖等而上之至於祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也用恩則父母重而祖輕用義則祖重而父母輕恩重者為之三年義重者為之齊衰記大傳絕族無移服同上父不次於子兄不次於弟記喪大記制國不過千乘都城不過百雉家富不過百乘記坊記父子不同位同上禮義立則貴賤等矣記樂記子持手而食者不得立宗廟荀禮論外屏不欲見外內屏不欲見內也荀大略互入防閑史先王之制大都不過參國之一中五之一小九之一左隱元年在禮家施不及國大夫不收公利左昭二十六年賈人不得衣繡乘車市井之子孫不得仕宦為吏史平准書漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽後漢紀經畔官離次書胤征子位卑而言高罪也孟史欒鍼曰侵官冒也失官慢也離局姦也左成十六年鄭駟秦嬖大夫而常陳卿之車服於其庭左哀三年子絕長補短孟滕文公上井井然有條理荀史親不在外羈不在內左昭十二年蘇秦曰聞客有遠為吏而其妻私於人者其夫將來其私者憂之妻曰吾已作藥酒待之矣夫至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言則恐其殺主父也於是佯僵而棄酒主父怒笞之妾一僵而覆酒上存主父下存主母史本傳互入妾田叔按梁事來還至霸昌廄取火悉燒梁之獄辭空手來見帝帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上母以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味臥不安席此憂在陛下也通監前漢互入深識大體舅后之家但當養育以恩而不當假借以權通監漢文紀有男子乘黃犢車詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀數萬人至者竝莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出犇輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之廷尉驗治竟得姦詐通監漢昭紀䍐羌豪靡忘使人來言願得還復故地趙充國以聞未報靡忘來自歸充國飲酒遣還護種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘贖論後䍐羌竟不煩兵而下通監漢宣紀郡國群盜處處並起群盜自相糾擿五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討為效牧守令長坐界內有盜賊而不收捕者及其畏懦捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散通監漢光武竇太后崩曹節王甫欲用貴人禮殯廷尉陳球曰皇太后以盛德良家母臨天下宜配先帝是無所疑於是公卿以下皆從球議通監漢靈紀韓彭專征伐蕭曹守管籥內外之任各有攸司通監晉穆紀李泌知胡客留長安久者或四十餘年皆有妻子買田宅檢括胡客有田宅者停其給凡得四千將停其給胡客皆詣政府訴之泌曰此皆從來宰相之過豈有外國朝貢使者留京數十年不聽歸乎今當假道於回紇或有自海道各遣歸國有不願歸者當於鴻臚自陳授以職位給俸祿為唐臣人生當乘時展用豈可終身客死耶於是胡客無一人願歸者泌皆分隸神策兩軍鴻臚所給胡客纔十餘人歲省度支錢五十萬緡市人皆喜通監唐德宗紀淄青李正已畏帝德宗威斷表獻錢三十萬緡以觀朝廷帝意其詐未能荅崔祐甫為相曰正已誠詐不如因遣使勞其軍以所獻就賜將士若正已奉詔是陛下恩洽士卒若不用彼自歛怨軍且亂又使諸藩不以朝廷為重賄帝曰善正已慚服時議者韙其謀謨唐書本傳互入謀畫涇原節度使馬璘疾亟以行軍司馬叚秀實知節度使事付以後事秀實嚴兵以備非常璘薨軍中奔哭者數千人喧咽門屏秀實悉不聽入命押牙馬蝢治喪事於內李漢惠接賓客於外妻妾子孫泣一作位於堂宗族泣於庭將佐泣於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之非護喪從行者無得遠送致祭拜哭皆有儀節送喪近遠皆有定處違者以軍法從事通監唐代宗王承宗李師道謀緩蔡兵乃伏盜京師剌用事大臣已害宰相元衡又擊度議者欲罷度安二鎮反側憲宗怒曰度得全天也若罷之是賊計適行吾倚度足破三賊矣新唐書裴度傳橫海節度使烏重胤奏河朔藩鎮所以能旅拒朝命六十餘年者由諸州縣各置鎮將領事收刺史縣令之權自作威福向使刺史各得行其職則雖有姦雄如安史必不能以一州獨反也臣所領德棣景三州已舉牒各還刺史職事應在州兵並令刺史領之夏四月詔諸道節度都團練都防禦經略等使所統支郡兵馬並令刺史領之自至德以來節度使權重所統諸州各置鎮兵以大將主之暴橫為患故重胤論之其後河北諸鎮惟橫海最為順命由重胤處之得宜故也通監唐憲宗盧坦為宣歙觀察使到日值旱饑穀價日增或請抑其價坦曰宣歙土狹穀少所仰四方之來者若價賤則商船不復來益困矣既而米斗二百商旅輻湊民賴以生上欲用王承宗為成德留後割其德棣二州更為一鎮以離其勢并使承宗輸二稅請官吏一如李師道李絳等對曰願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聽命於理固順若其不聽體亦無損上乃遣京兆少尹裴武詣真定慰承宗受詔甚恭曰三軍見逼不暇俟朝旨請獻德棣二州以明懇款並同上先是朝廷遣中使賜朱克融時服克融以為踈惡執留敕使又奏當道今歲將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宮闕上患之以問宰相欲遣重臣宣慰仍索敕使裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲治之已令處分其將士春衣從來非朝廷徵發皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助脩宮闕皆是虛語若欲直挫其姦宜云丁匠速來彼必蒼黃失圖若且示含容則云脩宮闕事在有司不假丁匠遠來如是而已不足勞聖慮也通鑑唐敬宗紀吳同乎章事徐知訓驕倨淫暴威武節度使知撫州李德誠有家妓數十知訓求之德誠遣使謝曰家所有皆長年或有子不足以侍貴人當更為公求少而美者通監後梁均王曹彬使於吳越事畢亟返不受饋遺吳越人以輕舟追與之至於數四彬曰吾終不受是竊名盡籍其數歸而獻之帝曰向之奉使乞匄無厭使四方輕朝命卿能如是甚善然彼以與卿卿自取之彬始拜受悉以散於親識家無留者通監周世宗集無侈前人無廢後觀唐文粹尊己者敬之如臣事君下己者慈之如母蓄子敵己者友之如兄弟無不得其志也柳文本朝西夏趙德明言民飢求糧百萬斛真宗問王旦旦請敕有司具粟百萬於京師詔德明來取德明得詔書慚曰朝廷有人王旦神道碑元昊遣使求通而契丹與元昊搆隙使來約我請拒絕之時主者欲拒契丹而納元昊張文定公與宋祈公上議曰如此是得新附之小羌而失久和之強虜也當賜元昊詔曰朝廷納卿誠款本緣契丹之請今聞卿失舅甥之歡契丹遣使為言卿宜審處其事但嫌隙朝除則封冊暮行如此於西北為兩得時人服其精識東坡撰張安道墓誌蔡確知安州作詩借郝處俊以譏剌時事大臣議遷之嶺南蘇公密疏言朝廷若薄確之罪則於皇帝孝治為不足若深罪確則於太皇太后為小累謂宜皇帝降敕置獄逮治而太皇太后出手敕赦之則仁孝兩得矣蘇子由撰東坡墓誌方朝廷命君以穎州推官嘗辭而不聽君以為辭益堅則名益高而未必從也既受命而以疾辭於吏部則有司之事耳故跡不近名而終自全其志歐陽棐撰邵康節謚議
