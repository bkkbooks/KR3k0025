body:
  text: 避嫌經豈不夙夜謂行多露詩行露無使厖也吠詩野有死麕男女不雜坐不同椸枷不同巾櫛不親授嫂叔不通問記曲禮上互入防閑寡婦之子非有見焉弗與為友同上君大夫之子不敢自稱曰余小子大夫士之子不敢自稱曰嗣子某不敢與世子同名記曲禮下婦人疾問之不問其疾嫌媚略之也記坊記寡婦不夜哭嫌思人道記坊記為人臣者無外交不敢貳君也記郊特牲子魯有獨處室者鄰之嫠婦亦獨處室夜暴風雨室壞趍而託之魯人閉門不受家語史衛青為大將軍尊寵不敢自擅專誅於境外西漢本傳父子之間人所難言也前漢車千秋傳互見嫌疑孫會宗與楊惲書曰大臣廢退當闔門惶懼為可憐之意不當治產業通賓客有稱譽西漢楊惲傳闔門高枕為知者首西漢谷永傳既還私第闔門養威重通鑑漢光紀吳祐父恢為南海太守祐隨從到官恢欲殺青簡以寫經書祐諫曰其俗舊多珍怪此書若成則載之之兼兩昔馬援以薏苡興謗王陽以囊衣徼名嫌疑之間誠先賢所慎也恢乃止東漢本傳魏文為五官邴原不謁魏武使人問之原曰吾聞國危不事家宰君老不奉世子三國魏志杜錫補吏部郎不敢用鄉曲一人晉書李靖闔門稱疾畏遠權逼功大而主不疑唐書本傳贊郭子儀遭程元振魚朝恩短毀時握兵處外然詔至即日就道無纖芥顧望故讒間不行唐書本傳陸贄既放荒遠常闔戶人不識其面避謗不著書唐書本傳裴度不復有經濟意乃治第東都野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事唐書本傳傳記顏叔子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壞婦人趍而至叔子納之而使執燭放乎旦蒸盡縮屋而繼之毛公詩傳王右軍年少時大將軍敦甚愛之恒置帳中眠未起錢鳳入屏人謀逆右軍覺既聞所論知無活理乃剔吐汙頭面被褥詐熟眠敦開帳乃見吐唾縱橫於是得全世說下劉孝標注按諸書皆云王允之事此言羲之疑謬集賓接門下推舉人士侍側無虛日退而見其人淡若與之無情者韓文丞之職貳令丞位偪例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾鴈鶩行以進平立睨丞曰當署丞涉筆占位署惟謹目吏問可不可吏曰得則退不敢略省漫不知何事韓文藍田記京城人多言足下家有積貨士之好廉名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多嫌也一出口則嗤嗤者以為得重賂柳文與王參元失火書史絳侯周勃既就國每河東守尉行縣至絳勃自畏恐誅常被甲令家人持兵以見之其後人有上書告勃欲反下廷尉通鑑漢文紀田蚡為相薦人或起家至二千石權移主上上曰君除吏盡未吾亦欲除吏漢竇嬰傳衛青曰自魏其武安之厚賓客天子常切齒西漢本贊楊惲免為庶人家居治產業起室宅以財自娛其友人孫會宗戒之為言大臣廢退當闔門惶懼為可憐之意西漢本傳經水在火上既濟君子以思患而預防之易既濟重關擊柝以待暴客蓋取諸豫易繫辭君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易繫辭互入遠慮惟事事乃其有備有備無患書說命中迨天之未陰雨徹彼桑土綢繆牖戶詩鴟鴞三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色記王制其備豫有如此者記儒行凡事豫則立不豫則廢記中庸子孔子曰有文事必有武備有武事必有文備家語圖難於其易為大於其細老子強本而節用則天不能貧養備而動時則天不能病故水旱不能使之飢渴寒暑不能使之疾祅怪不能使之凶荀子天論先患慮患謂之豫豫則禍不生荀子大略事無備則廢是以聖王務其大備管子霸言夫天地之大計三年耕而餘一年之食率九年而有三年之蓄十八年而有六年之積二十七年而有九年之儲雖沴旱災害之殃民莫窮困流亡也淮南子主術訓史魏絳曰抑臣願君安其樂而思其終也書曰居安思危思則有備有備無患左襄十一備豫不虞古之善教也左文六年備豫不虞善之大者也左成九年凡百君子莫不代匱言備之不可以己也同上士季曰諸侯相見軍衛不徹警也左宣十二互入防閑智者備禍於未形史趙世家夫積貯者天下之大命苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至通鑑堯有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也通鑑漢文紀絕其綿綿塞其涓涓東漢樂恢傳互入謹微防隄完全雖遭雨水霖潦不能為變通鑑顏真卿為平原守安祿山逆節頗著真卿以霖雨為託修城浚壕無幾祿山果反河朔盡陷獨平原城守具備唐書互入先見善治病者不使至危憊善救災者勿使至賑給故賑給少則不足活人活人多則闕國用國用闕則復重歛矣唐書劉晏傳傳記陶公作荊州敕船官使鋸木屑不限多少悉藏之時咸不解此意後正會值積雪會日始晴廳事前除雪地甚潤濕於是用木屑覆之都無所妨世說集服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煖者不憂至寒之悽愴何則有其具者易其備也王褒聖主得賢臣頌一歲之旱人斯具舟三月之熱人斯具裘劉賓客蓄穀者不病凶年蓄珠玉者不虞殍死柳文本朝如儲藥石以待疾病如種梓漆以備器用東坡韓維父億制經易而無備也易大有子事無備則廢管子霸言篇故國無九年之蓄謂之不足無六年之積謂之閔急無三年之蓄謂之窮乏淮南子主術訓大寒而後索衣裘不亦晚乎楊子史不備不虞不可以師左傳隱公五年莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫左傳成九年城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢左昭五無備而言辦者猶拾瀋也汁也言不備而責辦不可治左哀二恥匹夫不可以無備況恥國乎左傳昭五物不素具不可以應卒史記秦世家公家無一年之蓄百姓無旬日之儲上下俱匱無以相救西漢谷永傳李左車曰千里餽糧士有飢色樵蘇後爨師不宿飽韓信傳集嘗思世人居平不讀一方病則委千金於庸夫之手劉賓客本朝國之用兵正如私家之造屋凡屋若干材石之費穀米為錢若干布筭而定無所嬴縮矣工徒入門斧斤之聲鏗然而百用毛起不可復計此慮不素定之過也既作而復聚糧既斲而復求材其費必倍其工必不堅東坡荅李琮書經遇其憂悔吝之時其介不可慢也注悔吝纖芥雖細不可慢易而不謹也怨豈在明不見是圖書五子之歌怨不在大書康誥念慮幾微以保其安書注相在爾室尚不愧于屋漏無曰不顯莫予云覯詩抑能謹微接下詩吉日聽於無聲視於無形記曲禮上禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也易曰君子謹始差若毫釐繆以千里記經解君子戒謹乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子謹其獨也知微之顯可與入德矣並記中庸子夫牆之壞必於隙劍之折必有齧聖人見之蚤故萬物莫能傷也淮南子君子微慎厥德悔吝不至楊子脩身智者識輕小之為善故謹微細之危劉子謹隙史無使滋蔓蔓難圖也左隱元君親無將將而誅焉公羊莊三十二紂始為象箸箕子歎曰彼為象箸必為玉杯為杯則必思遠方珍怪之物輿馬宮室之漸自此始不可振也史宋世家明者遠見於未萌而知者避危於無形禍固多藏於隱微而發於人之所忽者也通鑑漢武紀春秋之義君親無將將而必誅通鑑漢明紀凡患生於所忽禍發於細微後漢馮衍傳輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒明者謹微智者識淺東漢陳忠傳絕其綿綿塞其涓涓東漢樂恢傳互入豫備政令猶汗往而不反東漢胡廣傳君子推微達著尋端見緒履霜知冰踐露知暑後漢蔡邕傳喜怒怨愛禍福所因可不謹歟東漢孔融傳當及其根柢未深而撲取之此救火貴速之勢也通監魏文紀互入投機百尋之屋突直而燎樊千里之堤蟻垤而穿敗古人防小以全大謹微以杜萌晉書陳頵傳魏證上言比者弟子陵師奴婢忽主下多輕上皆有為而然漸不可長通鑑唐太宗褚遂良曰諫臣必諫其漸及其蒲盈無所復諫唐書沛王賢聞王勃善屬文召為修撰時諸王鬭雞勃戲為檄周王雞文上見之怒曰此乃交構之漸斥勃出沛府通鑑唐高宗互入遠慮小者大之漸微者著之萌故君子謹初聖人存戒唐書陸贄傳隙不在大唐書柳公綽傳傳記諺曰教婦初來教兒嬰孩顏氏家訓狐鼠微物亦蠹大猷選彈文經由辯之不早辯也易坤卦小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可揜罪大而不可解易繫辭差若毫釐繆以千里記經解子子曰蒼梧嬈娶妻而美讓其兄矣然非禮之讓也不謹其初而悔其後何嗟及矣家語六本篇焰焰不滅炎炎若何涓涓不壅終為江河綿綿不絕或成網羅毫末不札將尋斧柯家語涓涓源水不壅不塞轂既破碎乃大其輻事以敗矣乃重歎息其亡益乎荀子木之折也必通蠹牆之壞也必通隙韓非子亡徵史為虺弗摧為蛇將若何國語綿綿不絕蔓蔓柰何毫釐不伐將用斧柯史蘇秦傳盜賊始發其源甚微部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通鑑漢平紀互入欺罔高恭之曰養虺成蛇悔無及矣北史本傳上初苦風眩頭重目不能視百司奏事上或使皇后決之后性敏涉獵文史處事皆稱旨由是始委以政事權與人主侔矣通鑑唐高宗紀集涓涓不遏終變桑田燄燄靡除卒燎原野陸贄奏議毫釐之差或致弊於寰海晷刻之誤或遺忘於歷年韓愈為宰相表本朝白起發一疑心坑虎士如蟣蝨石崇發一快心截蛾眉如芻俑李斯發一忍心橫屍四海楊國忠發一疾心激禍百年其端甚微其流甚廣鳴道集卵𪆪不除使成羽翼續世說十二
