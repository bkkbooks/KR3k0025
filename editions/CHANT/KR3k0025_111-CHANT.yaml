body:
  text: 擇交經母友不如己者論語汎愛眾而親仁同上可者與之其不可者拒之同上子君子必謹其所與處者焉家語賜也好友勝己者同上其交也以道其接也以禮孟子萬章下孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士同上君子遊必就士所以防邪僻而近中正也荀勸學篇以勢交者勢傾則絕以利交者利窮則散故君子不與也文中子君子先擇而後交故寡尤文中子魏相篇史論行而結交者立名之士也史樂毅傳無舊無新惟仁是親後漢申屠剛傳趙典閉門卻掃非德不交續漢書李膺性簡亢無所交接惟以同郡苟淑陳寔為師友同上劉陶所交必也同志好尚或殊富貴不求合情趍苟同貧賤不易忘東漢邴原至陳則師韓子助頴川則宗陳仲弓汝南則交范孟慱涿郡則親盧士幹魏志陸龜蒙不喜與流俗交雖造門不肯見本傳傳記山濤與阮籍嵇康皆一面契若金蘭濤妻韓氏嘗問濤曰吾門年可為交者唯二人而已竹林七賢論何晏鄭颺夏侯玄並求與傳嘏交而嘏終不許世說中集四座無凡賓李白集懷道守義非其人不交韓愈集種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬冰堅中有潛浪翻惟當金石交可與賢達論孟郊審交門庭無雜賓孟浩然經比之匪人易比卦輕交易絕君子所恥記表記注子商也好友不勝己者家語小人先交而後擇故多怨文中魏相史親富不親仁焉用之左定九年集交不忠兮怨長楚辭經伐木燕故舊也不遺故舊則民德歸厚矣詩伐木孔子之故人曰原壤其母死夫子助之沐椁曰故者無失其為故也記檀弓下故舊不遺則民不偷論語故舊無大故則不棄也語微子史原仲季友之舊也左莊二十七年樓護有故人呂公無子歸護護身與呂公妻與呂嫗同食妻子頗厭護聞之責曰呂公以故舊窮老託身於我義所當奉遂奉呂公終身西漢本傳互入念舊付託兩門光武引嚴光入道故舊共臥光以足加帝腹太史奏客星犯御坐帝笑曰朕故人嚴子陵共臥耳東漢嚴光傳初楚伍參與蔡太師子朝友其子伍舉與聲子相善也左襄二十六年何劭袁毅有累世之交晉書嚴武以杜甫世舊待甫甚善新唐書杜甫傳王珂曰吾於諸公有家世事分通監唐昭宗紀傳記融十歲聞漢中李公膺清節直亮慕之欲往觀其人遂造公門謂門者曰我是公通家子孫孔融別傳集予於崔君有通家之舊柳子厚送崔群序經父黨無容記禮運見父之執不謂之進不敢進不謂之退不敢退不問不敢對記年長以倍則父事之記曲禮上史班彪家有賜書父黨揚子雲已下莫不造門西漢敘傳馬援有疾梁松來候之獨拜床下援不荅松去諸子問曰梁伯孫帝婿貴重公卿莫不憚之大人獨不為禮援曰我乃松之父友也雖貴何得失其序乎通監光武紀常林年七歲有父黨造門問林伯先在否汝何不拜林曰臨子字父何拜之有魏志本傳劉孝綽年十四繪常使代草父黨沈約任昉范雲等聞其名命駕造焉父繪時掌詔誥北史宋書本傳集丈人吾父之友崔祐甫穆氏四子講藝記無容之敬常拜床下權德輿集經情疏而貌親在小人則穿窬之盜也歟禮記表記子朋而不心面朋也友而不心面友也揚子法言以勢交者勢傾則絕以利交者利窮則散文中子史以權利合者權利盡而交踈史記鄭世家孟嘗君廢諸客皆去馮諼曰富貴多士貧賤寡友事之固然也獨不見夫朝趍市者乎明旦側肩爭門而入日暮之後過市者掉臂而不顧非好朝而惡暮所期物忘其中今君失位而賓客皆去事之固然也史記張耳陳餘始居約時相然信死豈顧間哉及據國爭權卒相滅亡勢利之交古人羞之蓋謂是矣漢書忽忘雅素西漢張禹傳傳記以財交者財盡而交絕以色交者華落而愛淪戰國策權交者不久貨交者不親戒子拾遺集產空交道絕財殫密戚踈王詩競毛羽之輕趍錐刀之末於是素交盡利交興劉孝標絕交論張陳所以凶終蕭朱所以隙末斷可知矣而翟公方規規然勒門以箴客何所見之晚乎同上凡今之交視勢厚薄韓文互見炎涼有財有勢即相識無財無勢同路人孟東野近世交道衰青松落顏色同上世之言者曰市道交柳文宋清傳君不見管鮑貧時交此道今人棄如土杜詩途窮見交態同上故交不過門青草日上階李白集世情誰是舊雷陳元微之交情同市道唐文粹本朝廉頗免長平歸故客盡去及復用為將客又復至頗曰客退矣客曰君何見之晚也天下以市道交君有勢我則從君無勢則去此固其理也有何怒乎晏殊類要互見炎涼當其同利之時蹔相黨引以為朋者偽也及其見利而爭先或利盡而交踈則反相賊害雖其兄弟親戚不能相保歐公文經維桑與梓必恭敬止詩小弁漫叟詩話以為非鄉曲事今言父母之邦者援此故亦存之一命齒于鄉里周禮黨正習鄉上齒記王制篇五十養於鄉六十杖於鄉同上君子之服也鄉記儒行入里必式記曲禮上居是鄉也事其大夫之賢者友其士之仁者語衛靈公孔子於鄉黨恂恂如也似不能言者語鄉黨鄉人飲酒杖者出斯出矣語何必去父母之邦語微子子子貢曰禮居是邦則不非其大夫家語孔子之去魯曰遲遲吾行也去父母國之道也孟子鄉黨莫如齒同上死徙無出鄉鄉田同井出入相友守望相助疾病相扶持孟子過故鄉而下車老子君子居必擇鄉荀子勸學禮居是邑不非其大夫荀子君道越公遇內史薛公曰公見王通乎薛公曰鄉人也文中禮樂史公山不狃曰且夫人之行也不以所惡廢鄉左哀八年注不以私怨惡廢棄鄉黨之好萬石君過里門必下西漢上還過沛故人父老諸母子弟佐酒道舊故為笑樂酒酣上自為歌起舞慷慨傷懷泣數行下謂沛父兄曰游子悲故鄉豐沛者吾所生長極不忘耳漢高祖紀高祖禱豐枌榆社西漢郊祀志枌榆鄉名也孫期里落化其仁讓後漢本傳韓安國起自徒中朱買臣出於微賤並以才守本邦通監互入微賤鄭君鄉宜曰鄭公鄉東漢鄭玄傳互入尊禮趙壹恃才倨傲為鄉里所擯後漢魯肅大散財貨甚得鄉邑忻心吳志何曾陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書范叔孫周窮濟急鄉里貴其義行宋書苗晉卿為太守嘗入壺關望縣門輒步曰公門當下況父母邦乎唐書里閈立社用洽鄉黨之歡通監唐高祖紀吳團結民兵使之習戰自衛鄉里通監梁均王紀鄉村團為義營各立將佐每有盜發則鳴鼓舉火丁壯雲集盜少民多無能脫者通監周世宗傳記何琦豐約與鄰鄉共之晉中興書許允為吏部郎多用其鄉里魏明帝遣虎賁收之既至帝覈問之允對曰臣之鄉人臣所知也魏氏春秋見世說集身出禮義之鄉李陵荅蘇武書洛中故俗體朴厚之洪規稷下遺甿陶禮義之餘化駱賓王見推里閈譽浹鄉閭同上鄉先生沒而可祭於社韓文送楊巨源序東漢隱士王烈居祈縣因號所居鄉為君子鄉韓文王公袖道碑致敬惟桑梓孟浩然經東鄰殺牛不如西鄰之禴祭易既濟洽比其鄰詩小雅正月五家為鄰五鄰為里周禮遂人姑姊妹其夫死夫若無族矣則前後家東西家無有則里尹主之記雜記原思與之粟九百辭子曰母以與爾鄰里鄉黨乎語里仁為美語子雞鳴狗吠相聞孟公孫丑上二舍共一井墨子列子與南郭子連墻二十年不相謁請列子仲尼篇君子居必擇鄰可以避患也晏子田里相距雞犬相聞文中子立命篇史西鄰責言左僖十五年怒鄰不義僖十四年親仁善鄰左隱六年晏子如晉景公使更其宅還而毀之曰諺曰非宅是卜惟鄰是卜二三子先卜鄰矣左昭公孟子之母三徙擇鄰史記任公為閭里率西漢貨殖傳幸同土壤西漢孫寶傳馬援素與公孫述同里閈相善通監漢光武紀宋季雅市宅在呂僧珍宅側呂問宅價曰千一百萬呂怪其貴宋曰一百萬買宅千萬買鄰也南史荀淑有子八人時人謂之八龍所居里舊名西豪渤海范康以為昔高陽氏有才子八人更名其里曰高陽里通監王脩年七歲喪母母以社日亡鄰里為之罷社魏志史思明安祿山同里閈通監唐元宗張嘉貞所居時號曰鳴珂里唐書劉仁軌所居號三柱里唐書傳記鄰里致饋東觀漢記孟母舍近墓孟子嬉戲為墓間之事孟母曰此非所以居子處也乃去舍市旁其子嬉戲為賈衒孟母又曰此非所以居子處也乃舍學宮之旁其子嬉戲乃設俎豆進退揖讓孟母曰此真可以居子矣遂居之列女傳互入母道益州城張儀所築錦城在州南蜀時故宮也其處號錦里益州記買鄰之直貴於買宅也物理論集偉孟母之擇鄰選所以占此里是謂仁智居選百一詩此里仁所以為美孟母所以三徙選潘安仁閑居斟酒聚比鄰陶淵明詩居止接近向秀思舊賦願為同社人雞豚燕春秋韓退之詩里閈自相賀同上休怪童兒延俗客不教鵝鴨撓比鄰杜詩芬芳孟母鄰王翰願卜鄰相近竹參差相過人不知看君多道義從此數追隨關西得孟鄰並杜詩橫絕歷四海所居未得鄰李白集見擬移居作鄰里不勞時節請開關務閑酒熟饒經過舍南巷北遙相語柳詩買宅者先定鄰焉物理論本朝新居乃鄰墻臨川集雞黍數往來同上從茲來往數兒女譍自譍門坡詩雞豚不改舊鄰里自相歡欒城集蒸豚釀酒多為具鄰里十年成舊故同上雞犬之聲相聞幅巾杖屨歲時往來東坡集西洛有五相宅乃文潞公富相王相二張相也諺云吾鄉有宰相坊侍郎里劉斧翰府名談經有不速之客來敬之終吉易需卦我有嘉賓鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賓之心詩鹿鳴鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣同上主人肅客而入記曲禮上若非飲食之客則布席席間函丈同上上客起敬尊者同上史宋公享晉楚大夫趙孟為客注云客一坐所尊左傳田文主家待賓客賓客日進名聲聞於諸侯史本傳靖郭君使田文主家待賓客賓客爭譽其美號曰孟嘗君通監周紀孟嘗君在薛食客常數千人史本傳魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆喜賓客以相傾史呂不韋傳樓護谷永為五侯上客漢書遵嗜酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去西漢陳遵傳崔駰愛士好賓客盛脩肴膳單極滋味不問餘產居常蔬食菜羹而已家無儲石當世清之東漢本傳孔融喜後進賓客日盈其門常歎曰坐上客常滿罇中酒不空吾無憂矣東漢本傳謝安造桓溫溫甚喜言平生歡笑竟日既出溫問左右頗嘗見我有如此客不晉書本傳袁粲門無雜客文士見遇不過一兩人宋書本傳羊侃不飲酒而好賓遊終日獻酬同其醉醒南史本傳畢坰喜賓客家未嘗以有無計新唐書常何曰家客馬周教臣為之唐馬周傳互見無隱長孫澄好賓客接引忘倦雖不飲而好觀人酣興常恐坐客請歸每勒廚別進異饌留之後周書傳記袁紹居洛陽不妄通賓客非海內知名不得相見英雄傳顧雍四代門無雜賓投剌攝齊皆一時英俊蘇州志王仁裕每大雪則自所居至坊巷口掃雪開徑迎接賓客至所居處飲宴謂之暖寒會天寶遺事集儋石之儲常空於私室方丈之食每盛於賓筵韓祭裴太常文盈門皆食客皇甫湜元次山以不飲者為惡客本集本朝客來留飲不計錢東坡經見人不能館不問其所舍禮記史晉鄭同儕其過子弟固將禮馬左僖二十四年若出於陳鄭之間共其資糧扉屨可也左僖四年展喜曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事左僖二十六年燭之武曰若舍鄭以為東道主行李之往來共其乏困僖三十年鄭商人曰不腆敝邑為從者之淹居則具一日之積行則備一夕之衛僖三十三年鄭皇武子曰吾子淹久於敝邑唯是脯資餼牽竭矣同上賓至如歸無寧菑患左襄三十一年孟嘗君食客常數千人無貴賤一與文等史本傳更舍上舍史記秦紀飾廚傳稱過客西漢宣紀令有貴客為其召之司馬相如傳夫妻治具維夫傳厚具樂飲陸賈傳以惡草具進陳平傳並西漢傳記館穀底寧白帖集修薄具以自設兮君曾不肯乎顧臨司馬相如長門賦重客至矣授館致餼柳文荊南舊有五花館待賓之上地也故將眩上成汭詩曰不是上台憐姓字五花賓館敢從容南部新書孟嘗君食客三千人廚有三列上客食肉中客食魚下客食菜本朝貧家何以娛客但知抹月批風東坡經主人不問客不先舉主人興辭於客然後客坐主人敬客則先拜客客敬主人則先拜主人並禮記曲禮上主人親饋則客祭主人不親饋則客不祭記祭義賓主百拜終日飲酒而不得醉焉記樂記史賓有禮主則擇之左傳集主稱千歲壽賓奉萬年觴選樂府主人情更重韓文本朝非公無此客經以賀慶之禮親異姓之國周禮注昏姻甥舅外親之服皆緦也外親異姓正服不過緦麻儀禮喪服若公與族燕則異姓為賓記文王世子注同宗無相賓客之道異姓主名治際會記大傳注異姓諧來嫁者也君與異姓同車不同服記坊記子異姓之服禮不加緦金樓子史周之宗盟異姓為後左隱十一年傳記何晏曰異姓不相貫何晏別傳獨居思仁公言言義一日三復白圭之玷是南宮之行也夫子信其仁以為異姓注謂以其兄之子妻之也大戴禮衛將軍文子篇
