body:
  text: 人己兩得經觀頤觀其所養也自求口食觀其自養也易頤卦謀其身不遺其友記檀弓下惟天下至誠為能盡其性能盡其性則能盡人之性記中庸誠者非自成已而已也所以成物也同上集愷悌以肥家信義以急人唐文粹史申叔時曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左傳互見施報兩失世之亂也君子稱其功以加小人小人伐其技以憑君子左襄十三丞相田蚡言灌夫家在穎川橫甚民苦之灌夫亦持丞相陰事為姦利受淮南王金史灌夫傳楚軍食少項王患之乃為高俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一杯羹通監漢高祖紀集楚則失矣而齊亦未為得也司馬相如上林賦互入此莫笑彼陵雖孤恩漢亦負德文選李陵書經投我以桃報之以李詩以德報德論語子君之視臣如手足則臣視君如腹心孟子集美人贈我錦繡段何以報之青玉案張平子四愁詩美人贈我金錯刀何以報之雙瓊瑤選古詩經子弗祗服厥父事大傷厥考心于父不能字厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟書康誥子惡聲至必反之孟子君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎殺人之父人亦殺其父殺人之兄人亦殺其兄並孟子史牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰亦重矣左宣十一互入人己兩失劉穆之往妻兄家乞食多見辱江氏後有慶會屬令勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻市肴饌為其兄弟以餉穆之穆之為丹陽尹召妻兄乃令廚人以金柈貯檳榔一斛進之宋書本傳互入妻家及報怨兩門經與人不求備檢身若不及伊訓躬自厚而薄責於人則遠怨矣衛靈公不患人之不己知患不知人也學而攻其惡無攻人之惡語顏淵史晉敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥公許之秦伯鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪左僖二十三漢主曰孤負黃權權不負孤也通鑑魏文紀劉弘專督江漢謀事有成者則曰某人之功如有負敗則曰老子之罪通鑑陸贄曰寧人負我無我負人通鑑李廣曰諸校尉無罪乃我自失道吾今自上簿至幕府前本傳傳記人之有德於我也不可忘也吾有德於人也不可不忘也戰國策集君子謹乎約己弘乎接物典論古之君子其責己也重以周其待人也輕以約韓文本朝以恕己之心恕人則仁不可勝用矣以責人之心責己則義不可勝用矣言行錄經縱我不往子寧不嗣音詩子衿非諸人行諸己記祭統不能正其身如正人何語子路其身不正雖令不從語子身不用禮而望禮於人身不用德而望德於人家語顏回篇吾未聞枉己而正人者也況辱己以正天下乎萬章上志不色於曲私而冀人以己為公也行不免於汙漫而冀人以己為脩也荀儒效身不善而怨人不亦反乎荀法行行非其所履以督人是猶笞父而責人以大舜之節罵母而規人以曾閔之行唐子史宋子明謂桐門右師曰吾猶衰絰而子擊鍾何也右師曰己衰絰而生子余何故舍鍾左定九互入敏於應對己則無禮而責於有禮者女何故行禮左傳鄧艾謂宗預曰禮六十不服戎而卿受兵何也預荅曰卿七十不還兵我六十何為不受耶蜀志曹操曰寧我負人無人負我三國魏志己無能而望他人用己無善而望他人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎唐書柳玭傳傳記財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君戰國策晉平公使工為弓三年乃成射不穿一札公怒將殺工列女傳集其責人也詳其待己也廉詳故人難於為善廉故自取也少己未有善曰我善是是亦足矣己未有能曰我能是是亦足矣外以欺於人內以欺於心未少有得而止矣是不亦待於己者已廉乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不許其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是謂不以眾人待其身而以聖人望於人韓文原毀不知清己之慮而惡人之譁柳文傳記齊席毗毗一作玭清幹之士嗤鄙文學嘲劉逖云君輩詞藻譬若朝菌須臾之玩非宏才也豈比吾徒千丈松常有風霜不可彫粹顏氏家訓集辯士多毀訾不聞談己非唐文粹本朝韓浦韓洎咸有詞學浦嘗輕洎語人曰吾兄為文譬如繩樞草舍聊庇風兩予之為文是造五鳳樓手楊文公筆談經君子貴人而賤己先人而後己記坊記子勞苦之事則爭先饒樂之事則能讓荀脩身史小自潤之時師古曰言所潤益於己者當減小之西漢谷永傳薛包篤行父母服除弟子求分財異居包不能止乃中分其財奴婢引其老者曰我共事久若不能使也田廬取其荒廢者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也漢書范震為司徒田不過一頃復推與兄子後漢郭林宗減三牲之具以供賓旅通鑑漢柏紀流民萬餘戶入縣界韓韶開倉賑之主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣通監溫大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我將含笑入地葬訖歲餘而卒唐書弟彥博也傳記閔子騫為後母所苦冬月以蘆花衣之以代絮父知之欲出後母子騫曰母在一子寒母去三子單父遂止孝子傳集劉禹錫刺播州子厚泣曰播非人所居夢得親在堂且萬無母子俱往理將拜疏願以柳易播韓作柳銘削衣貶食不立資遺以班親舊為友為義擔石之儲常空於私室方丈之食每盛於賓筵並韓文子豐取刻予荀子君道史今銅鞮之宮數里而諸侯舍於隸人門不容車而不可踰越左襄三十一勤民以自封國語楚不損用而大自潤西漢谷永傳董卓小孫七歲愛之以為己子至殺人之子如蝨虱耳本傳平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給通監後唐明宗互入貪行本朝有毀其一錢之錐必失色而營護之至乃一怒而刀鋸百生一饞而葅醢千命容態恬然曾視一錢之錐不若金玉已生沙礫人命並鳴道集經季武子成寢杜氏之葬在西階之下夷人冢墓以為宅檀弓子以鄰國為壑孟告子史毀人以自成左傳集法吏多少年磨淬出角圭將舉汝愆尤以為己階梯韓文經貨力為己以功為己記禮運子楊子為我拔一毛而利天下不為也孟子盡心上楊子曰世故非一毛所濟列子史奉己而已不在民矣左傳杜密曰劉勝位為大夫知善不薦聞惡無言隱情惜己自同寒蟬後漢私自潤入通監晉紀集入門各有媚誰肯相為言長城窟經無自廣以狹人書咸有一德大夫跋涉我心則憂詩載馳鄰有喪舂不相里有殯不巷歌記曲禮上所惡於下毋以事上所惡於上母以使下記大學施諸已而不願亦勿施於人記中庸已欲立而立人已欲達而達人語雍也子食於有喪者之側未嘗飽也語子貢曰有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人語衛靈公我不欲人之加諸我也吾亦欲無加諸人公冶長史晉荀吳圍鼓鼓人或請以城叛穆子曰或以吾城叛吾所甚惡也人以城來吾獨何好焉左昭十五楚王曰人之愛其子也亦如余乎左昭十三晉祖逖牙門童建殺內史周密降後趙石勒勒輒送首於逖曰叛臣逃吏吾之深仇將軍之惡猶吾惡也通鑑晉元紀互入疾惡遽伯玉恥獨為君子東漢顧榮與同寮宴見執炙者有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不知其味晉本傳庾亮所乘馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有已之不安而移之於人晉本傳秦王堅召代長史燕鳳問代所以亂故鳳具以狀對堅曰天下之惡一也乃執寔君及斤至長安車裂之通監晉武紀陰鏗嘗與賓客宴飲見行觴者因回酒炙以授之曰吾儕終日酣酒而執爵者不知其味非人情也南史山南地熱上以軍士未有春服亦自御裌衣通監德宗傳記晏子曰古之賢者飽而知人飢溫而知人寒晏子春秋集眾鳥欣有託吾亦愛吾廬陶淵明視人之瘼如熛疽在身劉賓客集穩暖皆如我天下無寒人白樂天若知其心既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勞勞一作勤呂和叔文
