body:
  text: 戒律傳記精進持凈戒猶如護明珠法華經受諸飲食當如服藥勿生增減如蜂採花但取其味不損色香教戒經律師持戒自縛傳燈錄集閑邪以律謝靈運作惠遠碑守律護戒燕公集戒月如珠獨潔麒麟之行燕公集究律藏持範之軌峻僧法進止之儀裴休碑戒得長天秋月明心如世上青蓮色李太白得徑入大道乘此不退輪白侍郎恩愛捨骨肉飲食斷腥膻同上八戒堅持用戒脩心白帖未及超於解脫且當攝於威儀同上脩整觀行尊嚴法容以儀範于後學者以為持律之宗焉柳文嗚呼無得而修故念為實相不取於法故律為大乘壤衣不飾揣食不味覆薦服役几出於生物者擯而勿用不自知其慈攝取調御凡歸於正真者動而成群不自知其教萬行方厲一性恒如柳文儒以禮立仁義無之則壞佛以律持定慧去之則喪故離禮於仁義者不可與言儒異律於定慧者不可與言佛同上非獨心長凈衣無一點塵姚少監天與出家腸一食齋不飢同上既飽香積飯不醉聲聞酒王建年到白頭口行如新戒時方雄飛本朝寒守三衣法飢傳一缽歌臨川史秦王興大營塔寺沙門坐禪者常以千數通鑑晉安帝紀魏主建鹿野浮圖於苑中之西山與禪僧居之通鑑宋明帝紀集攝亂以定謝靈運作惠遠碑燈影照無睡心清聞妙香社身猶縳禪寂禪龕只晏和苔蘚滿藤鞋荀鶴我心無我亦無君元微之禪僧偶向花前定滿樹狂風滿樹花蓮花舊是無波水莫逐狂風起浪心並同上苦海不能漂劫火不能焚白樂天乘不退之輪證無生之觀白帖密行傳人少禪心對虎閑劉長卿光明徧照智見獨存王維禪房空掩白雲飛劉文房禪心三界外宴坐天地中孟東野趺坐簷前日焚香竹下煙王建老僧齋罷閉門睡不管波濤四面生羅隱久披山衲壞孤坐石床寒文苑英華百二十三卷始覺禪門氣味長杜牧之本朝老僧獨得無生樂終日焚香坐結跏歐公集蘧蘧未必都非夢了了方知不落空坡詩靜故了群動空故納萬境同上僧定端居不計年欒城詩蒲團布衲一藤床心地虛明睡自亡同上莫怪道人口掛壁桃花燕子自能禪語錄傳記洞山云這裏合下得一轉語有一上座語九十六轉不愜師意傳燈錄百千法門同歸方寸河沙妙德總在心源守清禪師有僧問末後一句師曰塵中人自老天際月常明問如何是和尚家風曰一缾兼一缽到處是生涯問佛法大意曰擾擾匆匆晨雞暮鍾並同上集四時長者頻參白露之溪三月蒲輪屢問梧桐之水庾信碑翼亮緇徒發揮元極陳子昂彫談全奧旨妙辨漱玄津駱賓王吾師雨花外杜詩欲離煩惱三千界不在禪門八萬條元微之遍將死苦救人間今因為說無生死也同上所示廣大深逈非造次可諭韓文與顛師書由其內者聞大師之言律義莫不震動掉懼如聽誓命由其外者聞大師之稱道要莫不悽欷欣踴如獲赦宥柳文傳佛與心元臣碩老稽首受教髮童齒毀踴躍執役並同上一言頓悟不踐初地五師相承授以寶器劉賓客以智月開瞽法鼓破聾李華塔記以心傳心天地不知唐將防文問者廓然自得佛味盧肇所至之邦被蒙法味權載之凡一燈所傳一雨所潤入法界者不可勝書同上本朝卻為參禪買得癡臨川彈指未終千偈了坡詩為公分作無盡燈照破十方昏闇鎖巉巉玉為骨凜凜霜入齒法師自有衣中珠不用辛苦泥沙底萬象入我摩尼珠機鋒不可觸千偈如翻水憑師為作鐵門限準備人間請話人並同上傳記晉沙門惠遠於廬山集一時名士高僧會於般若臺精舍立誓同修凈行俱為佛國之遊本傳廬山記云因號曰白蓮社集遣十纏之繫縳祛五惑之塵滓白摠賦室空無侍者巾屨唯挂壁一飯不願餘跏趺便終夕柳文四祖數十年中脅不至席圭峰禪詮傳記虛幻非實身喻芭蕉之形明徹無瑕心學琉璃之地白帖超六塵之境獨步迦維會一乘之旨隨機化物堊教序五蘊皆空諸漏巳盡高僧傳手提諸佛直指本來面目諸方尊宿無能出其右傳燈錄永嘉玄覽禪師初謁六祖問荅相契便欲辭去祖留一宿時謂一宿覺同上集遂揭無生之筌將遺有漏之句顓潔道行受蓮華經理極翻三心滅不二形妄緣盡歸真化冥陳子昂湛心觀心了然見性李邕四禪合真如一切是虛假孟浩然傳千燈於智種了萬法於真空李白崇法寺文冥機登天光獨朗謝垢氛李白巳窮佛根源韓送文暢序外形骸以理自勝不為事物侵亂韓文生而未始來歿而未始往柳文修最上乘解第一義無體空物色之跡而造乎真源通假有借無之名而入於實相永州寺記脫去穢累超詣覺路同上性真悟幻泡行潔離塵滓白侍郎心中眼觀心外相只有解脫門能度衰苦厄以無相為心地以不二為法門契心則離於文字得意則假於筌蹄悟本生不滅之義證心地無相之宗拔有漏之身超無量之法並同上心臺照耀百千燈白贈宗密上人詩一悟寂為樂此生閑有餘王維五蘊本空六塵非有於多劫來植眾德本於般若力坐菩提家心王自在萬有皆如頂法真空一乘不立並同上中止水外浮雲權載之嘗欲黜健羨遺名聲不使塵機世想滑湣靈府同上情超五濁志悟三明劉禹錫求法不二解空第一達無量義轉不退輪李嶠碑我無生滅隨世因緣李華碑萬緣盡空一切不動李適之祥師法顯碑光陰難駐跡如客許用晦心火自生還自滅元微之因知萬法幻盡與浮雲齊劉文房悟色身無染觀空事不爭道心長日笑覺路幾年行張承吉見性覺經繁姚少監師經非紙上師佛在心中姚少監會理卻無我觀空厭有形孟東野行高識遠超悟辨達唐文粹從見在身盡未來際同上百丈得大用黃蘗得大機語錄真空洞照熱惱頓盡水其性雲其身歐陽行周本朝浮雲掃盡但掛孤月坡詩古佛既手提諸方皆席卷如虫得羽化已脫安用蠒同上具正法眼超然無累於物欒城傳記晉惠遠居廬阜三十餘年影不出山跡不入俗每送客常以虎溪為界高僧傳廬山記云昔遠師過此虎輒號鳴遂為名焉身影不落俗家釋氏會要穩披雲衲坐藤床杜荀鶴集隆安六年亙溫遣書於惠遠令致敬王者惠遠荅書論不可致之意又言袈裟非朝廷之服缽盂非廊廟之器軍國非沙門之像遂著沙門不敬王者論五篇惠遠集三濁四染不能渝其質崔融律師碑雙舄不踐居士之門六根不染欲界之塵獨孤及作律師銘八風吹不動寒山子詩本朝禪心已作沾泥絮不逐春風上下狂詩話參寥詩史釋道安曰彌天釋道安晉書傳記晉沙門釋道安自號彌天模楷三寶記晉慧遠既入道常以大法為己任廬山遠法師傳史廬陵王義真欲以慧琳為西豫州都督通鑑宋文帝元嘉元年帝以慧琳善談論與議朝廷大事遂參權要賓客輻湊孔顗曰遂有黑衣宰相可謂冠屨失所矣同上傳記隋文帝以沙門彥琮為翻經館學士後始命僧以官事物紀原史興善寺胡僧不空卒贈開府儀同三司司空謚曰大辨正廣智不空三藏和尚通鑑唐代宗大歷十年傳記魏後太祖時僧法果卒贈老壽將軍謚趙胡靈公此僧賜謚之始也事物紀原史大唐三年僧惠崇賜紫袈裟代宗實錄傳記僧史略曰則天朝僧法朗等賜紫袈裟僧之賜紫自天后始事物紀原集愛僧不愛紫衣僧鄭谷詩大千入毫髮李太白說十善法為小乘說四諦法為中乘說十二因緣法為大乘白居易與清法師書未悟病時須去病巳知空後莫依空白戒生定定生惠惠生八萬四千法門同上百千聞法咸蒙離垢億萬同會俱證無生李華浮圖之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不遂困窮之謂慈劉賓客其道以無為為有以空洞為實以廣大不蕩為歸柳文性海吾卿也法界吾宇也戒為之墉惠為之戶以守則固以居則安動無不虛靜無不為生而未始來歿而未始往也同上度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也權載之文桑門之患有二焉未得之患為外見所雜既得之患為內見所縳十二因緣之中生死循環憂悲蘊聚非大聖以利刃斷之慈航濟之則淪胥顛沒之不給矣同上積苦為海舉足見溺積邪為山舉足見礙文粹本朝震雷霆之法鼓聾俗不驚整日月之慈燈幽途識曉類要笑謂西來意雖空亦不空臨川文萬事都從劫火燒同上童子畫沙已具佛智維摩無語猶涉二門東坡若造法界本造於心則雖凡夫皆具此理外道壞法如刀截空壞者既妄護者亦空論道之大小雖至於大菩薩其視如來猶若天淵然及其以無所故而得則承蜩意鉤毀瓦畫墁未有不與如來同者也爾以捨來我以慈受各獲其心寶訓誰有室空無有獨設一榻空毗耶城奔走竭蹙二士共談心說妙法彈指千揭竿無所說有言皆幻無起不滅問我何為鏤冰雕雪佛以一口而說千法千佛千古則為幾說我法不然非千非一如百千燈共照一室各雖偏滿不相壞雜世人視身如金玉不旋踵為糞土至人反是予以是知一切法以愛故常壞以捨故常在學者以成佛為難乎累土畫沙童子戲也皆足以成佛以為易乎受記得道如菩薩大弟子皆不任問疾是義安在方其迷亂顛倒流浪苦海之中一念正真萬法皆具及其廑苦為山九仞之後毫釐差失千劫不復竹中一滴曹溪水漲起西江十八灘未能轉千佛且從千佛轉有主還須更有賓不如無鏡自無塵並同上傳記經卷雖小佛口所說續高僧說集貝葉傳金口駱賓王以正義度無邊以員教垂無窮莫尊於妙法蓮花經凡六萬九千五百言證無生忍造不二門住不可思議解脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅密經凡五千二百八十七言壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願生極樂土莫疾於阿彌陁經凡一千八百言用正見觀真相莫出於觀音普賢菩薩行法經凡六千九百九十言詮自性任本覺莫便於實相法密經凡三千一百五言空法塵依佛智莫過於般若波羅密多心經凡二百五十八言是八種經具十二部合一十一萬六千八百五十七言三乘之要指萬佛之秘藏盡矣佛涅槃後世界空虛惟是經與眾生俱設有人書貝葉上藏檀龕中非堅非久如蠟印空假使人剌血為墨剝膚為帋即壞即滅如筆畫水畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付囑之心白傳集法之至莫尚乎般若經之大莫極乎涅槃柳文本朝釋迦以文教其譯于中國必託於儒之能言者然後傳遠故大乘諸經至楞嚴則委曲精盡勝好獨出者以房融筆授故也坡集史後趙石勒奉佛國人爭造寺廟通鑑九十五卷時佛教盛於洛陽中國沙門之外自西域來者三千餘人魏主別為之立永明寺千餘間以處之北及延昌州郡共有一萬三千餘寺梁武帝天監八年魏世宗作瑤光寺胡太后又作永寧寺皆在宮側又作石窟寺於伊闕口皆極土木之美而永寧尤盛佛殿如太極殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也天監十五年元魏自正光以後寺有三萬餘區梁高祖魚朝恩奏以所賜庄為章敬寺以資章敬太后冥福唐代宗天曆二年吐突承墔領功德使盛修安國寺奏立聖德碑唐憲宗元和三年王智興以上生日請於泗州置戒壇度僧尼以資福唐穆宗長慶一年祠部奏括天下寺四萬六百蘭若四萬僧尼二十六萬五百上惡僧尼耗蠹天下欲去之道士趙歸真等復勸之乃先毀山野蘭若至是敕上都東都兩街各留二寺每寺留僧三十餘人僧及尼大乘穆護祅僧皆勒歸俗銅象鐘磬以鑄錢天下所毀寺四千六百餘區歸俗僧尼二十六萬五百人唐武宗紀武宗毀招提蘭若四萬唐食貨志敕於兩街四寺各置戒壇度人三七日唐懿宗咸通二年敕天下寺院非敕額者悉廢之是歲天下寺院存者二千六百九十四廢者三萬三百六十三後周世宗顯德三年傳記尚書御史所止皆曰寺故後代道場及祠宇皆取其稱焉應劭風俗通舍黧國有維摩故宅顯慶中王玄策以笏量基正有十笏故號方丈室唐高僧傳漢明帝於東都門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬馱經來初止鴻臚寺遂取寺名刱置白馬寺即僧寺之始也事物紀原東晉何充始捨宅安尼蓋尼寺之起也同上集崇基表剎立禪誦之堂焉選寺碑法鼓琅以振響眾香馥以揚煙天台賦傍見精舍開長廊飯僧畢孟浩然野寺垂楊裏杜詩野寺殘僧少上方重閣晚百里見秋毫野寺江天豁杜林蘭若秋風晚更宿招提境金剎青楓外並同上窈窕青蓮宇元微之寺之殿臺與城之樓交錯相輝繡于碧霄望之如崑閬間物劉賓客躋閣謁金像攀雲叩禪扄韋應物岧嶢青蓮界同上片雲生半壁萬壑遍千鍾劉長卿禪房空掩白雲中同上發地結菁茅團團抱空白山花落幽戶有忘機客柳文南岳長老代宗名其居曰般舟道場同上招提精舍梵宮祇園凈土並寺名白帖松日明金像苔龕響木魚司空圖林是旃檀更無雜樹花惟薝蔔不嗅餘香王建僧居隨處好溫飛卿郭裏雲山全占寺方雄飛何如一衲塵埃外日日香煙夜夜燈羅隱八功德水波動青蓮之池七寶香花光映黃金之地唐文粹蓮花天晝浮雲卷貝葉宮春好月停僧皎然詩本朝青松行盡到山門亂峰深處開方丈已能宴坐老山中何用聲名傳海上歐公詩踈鍾挾谷響悲梵入樵歌臨川滿院秋光濃欲滴老僧倚杖青松側只怪高聲喚不應嗔人踏破蒼苔色僧寶磨詩又見坡詩注武宗會昌五年八月毀招提蘭若四萬餘區會要元和二年薛平奏諸請賜中條山蘭若額為大和寺蓋官賜額者為寺私造者為招提蘭若杜牧杭州南亭記所謂去其山臺野色四萬所是也溫公通鑑考異夜涼疑有雨院靜似無僧坡詩精廬髣髴類天宮欒城集老鶴無衰貌劉長卿伏犀插腦高頰顴韓退之晢晢肌骨松寒玉清歐陽行周千燈智慧心片玉清羸顏同上道成神氣閑劉賓客靄然之和登於眉宇得其道者不待言說權載之生有異表幻無兒戲嶷如山立湛如川停舌廣長以覆準足文理而成字權載之山貌日高古杜牧之臘數等松椿賈浪仙山僧獨在山中老惟有寒松見少年劉長卿史吳夷狄之國祝髮榖梁范甯曰祝斷也後趙石虎奉佛國人削髮出家通監九十五卷魏主親為沙門師賢等五人下髮以師賢為道人統宋文帝紀祝髮事浮圖唐書傳記投簪落髮委命受業廬山記集行行入幽荒甌駱從祝髮選景陽雜詩慕道尊壞削之儀劉賓客西晉已上不許中國削髮石苻亂華乃弛厥禁事物紀原本朝覆以慚愧之衣落其煩惱之髮見類要上二十二卷
