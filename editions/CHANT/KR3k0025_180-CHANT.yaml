body:
  text: 稱誦子夫是之謂天下之將通神明矣荀子議兵大將民之司命抱朴子內精八陣之變外盡九成之宜傅子史晏嬰薦穰苴曰文能附眾武能威敵史穰苴傳吳起善用兵司馬穰苴不能過也史本傳韓千秋軍鋒之冠史尉佗傳此真將軍西漢周亞夫傳漢飛將軍同上李廣傳將軍者國之瓜牙也怒形則千里悚威震則萬物伏是以名聲暴於夷貉威靈憺乎鄰國同上真將軍亞夫何以加唐段志元傳攬轡安閑光弼長於憑城通鑑唐肅宗落落有將帥之風李晟舊贊櫛沭風雨暴露郊原披荊榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京唐書宣宗紀鄭畋號疾雷將唐書本傳集性行淑均曉暢軍事選諸葛出師表擁旌為漢將汗馬出長城選詠霍將軍詩轅門有光武旅增氣劉賓客忠憤暗彰義勇潛發變疾風雨謀先鬼神中推赤心前蹈白刃白傳集戰功足以冠當時壯節足以垂後代忠信以為幹義勇以為器器與幹合鬱成將材仗忠履義體仁養勇學究韜略藝窮騎射負幽燕之勁氣有將相之長才內作心腹外張瓜牙身作師律心為戰鋒金方之氣凝為將星學劍讀書鬱然將材伐謀而事有成筭剋日而動不愆期聲動冠戊塵清封略江南別有樓舡將燕頷虯鬚不姓楊夙負氣概早習騎射材推燕趙之士學究孫吳之書已上並白傳集先入賊城擒首惡盡封官府讓元功張文昌刁斗更嚴軍耳目戈鋌長控國咽喉高達夫矛戟蘊器風雲馳聲同上衽帶過兵之處咽喉制敵之衝威懷啟閉之方耕戰疾徐之節莫不封章定計裂素成圖呂和叔文中襟湯湯應變弛張開則雷電閉則金湯同上介子討罪於龜茲班超行誅於鄯善未足儔也唐文粹即墨龍文光照曜常山蛇陣勢縱橫落鵰都尉萬人敵黑槊將軍一鳥輕杜牧之天下無雙將關西第一雄受符黃石老學劍白猿翁矯矯雲長勇恂恂郤縠風同上本朝論兵魁然萬人敵臨川集為國所倚經赳赳武夫公侯干城詩兔罝祈父予王之爪牙詩祈父閫外之事將軍所裁易師卦䟽子國家安危之主孫子史吳起所在寇不敢敵得之國強失之則亡是為良將史記廉頗傳互見良將藺相如曰強秦不敢加兵以吾兩人也史本傳閫以外將軍制之西漢馮唐傳為國柱石前漢辛慶忌傳羌豪相數責曰語汝無反今天子遣將軍來年八九十矣善為兵前漢趙充國傳互入老將將軍國之爪牙也西漢李廣傳祭彤武節剛方動用安重雖條侯穰苴之倫不能過也臥鼓邊亭滅烽幽障東漢本傳隱若一敵國後漢吳漢傳國之心膂後漢李膺傳帝使羊祐臥護諸將晉書帝謂紀瞻曰卿為朕臥護六軍所益多矣同上賢於長城遠矣唐李勣傳帝幸陝倚以為重唐李光弼傳持重安邊唐書王忠嗣傳提孤軍抗群賊身佩安危而氣不少衰唐李晟傳選將必擇其奇厖福艾李靖對唐太宗傳記國之大事存亡之道在於命將六韜將者國之輔也授之以斧曰從此至天將軍制之授之以鉞曰從此至地將軍制之並同上集指鄭則三軍白首麾晉則千里流血七命互見威聲馬服為趙將疆場得清謐盧諶雜體詩趙奢正疆場秦人折北虜選詩臨危奮節保國全城同上四夷聞風失匕筋劉賓客經進厥虎臣闞如虓虎詩常武子勇士不忘喪其元孟子白刃交於前視死若生者烈士之勇也莊子楚人輕利僄遫卒如飄風荀子議兵史齊高固曰欲勇者賈余餘勇左傳廣自請曰臣結髮而與匈奴戰今乃一得當單于願居前先死單于史本傳軍中服其勇史李廣傳張空弮空弮弓也冒白刃西漢司馬遷傳布常冠軍西漢伍被傳言其驍勇為眾軍之最攻城先登陷陣卻敵斬將搴旗前蒙矢石不避湯火史貨殖傳勇於當敵史太史公自序斬將搴旗追奔逐北西漢李陵傳梟俊禽敵之臣西漢楊雄傳麾城慚邑下將降旗西漢楊雄傳九江王布楚梟將西漢張良傳身履軍搴旗者數矣西漢欒布傳指揮足以展風雲叱咤可以興雷電後漢祭肜為遼東太守肜有勇力虜每犯塞常為士卒先鋒數破走之通監漢光紀互入師先群帥賈其餘壯東漢臧宮傳蜀張飛雄壯威猛魏程昱等咸稱飛萬人之敵蜀志本傳張遼為孫權所圍遼潰圍出復入權眾破走由是震威江東魏志杜曾勇冠三軍能被甲游於水中通監晉愍紀燕冠軍將軍宜都王鳳每戰奮不顧身前後大小二百五十七戰未嘗無功通監晉武紀薛安都北征至陝下魏多縱突騎眾軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳紗兩襠衫馬亦去具裝馳入賊陣猛氣咆哮所向無敵當其鋒者無不應刃而倒如是數四每入眾無不披靡宋書宋魯爽世梟猛咸云萬人敵薛安都單騎直入斬之皆云關羽斬顏良不是過也齊書陳慶之四十七戰所向無前南史東魏丞相宇文泰常謂人曰諸將對敵神色皆動唯賀拔公臨陳如平時真大勇也通鑑梁武紀羊侃膂力絕人所用弓馬上六石梁書飛鋋雷擊鋒無前對南史摧鋒陷陣後魏書耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須左手拔刀右手把槊直斫慎勿皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪歿俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不爾若不能殺賊又不能為人所傷何異逐坐人乎後周書武冠六軍後魏楊大眼齊神武遣韓軌濟華州襲王羆羆不覺比曉軌眾已乘梯入城羆尚臥未起聞閤外匈匈有聲便袒身露髻徒䟽持一白梃大呼而詬曰老羆當道臥貛子那敢過敵見驚退北史李弼弟檦身小而勇每躍馬陷陣隱身鞍甲之中敵見皆曰避此小兒宇文泰曰膽決如此何必八尺之軀耿令貴殺傷多甲裳盡赤泰曰觀其甲裳足知令貴之勇何必數級通鑑梁武紀衝梯竿長十五丈驍果吳興沈光升其端臨城與高麗戰短兵接殺數十人高麗人競擊之而墜未及地適遇竿有乘絙光接而復上通鑑隋煬帝尉遲敬德戰善避槊每用單騎入賊群剌之不能傷又能奪取賊槊還剌之新唐書本傳單雄信驍捷善用馬槊名冠諸軍軍中號曰飛將通鑑唐太宗太宗征遼東薛仁貴白衣腰鞬兩弓呼而馳唐本傳喜得虓將唐書婁師德與吐蕃戰八遇八克同上一鼓而破一麾而奔唐李晟傳橫當冠鋒李晟提孤軍抗群賊同上馬璘武藝絕倫在涇八年虜不敢犯為中興銳將唐書馬璘轉鬭至鳳翔值吐蕃圍城璘單騎先士卒奮擊俘斬千計明日虜復請戰璘開懸門以待之虜引退曰此將軍不惜死宜避之遂去通鑑唐代宗紀搴旗蹈軍出入若神唐李光顏傳戰無前敵唐龜茲傳善射者謂之挽強通鑑唐順宗集睚眥則挺劍喑嗚則彎弓麾城若振槁搴旗若顧指左太沖吳賦將軍死綏咫尺無卻選奏彈所向風靡同上百樓忽起登雲霄而俯臨萬弩俱發隨雷霆而並震揚兵於九天之上決勝於千里之中徐陵作章昭達誌棄身鋒刃端白馬行芒氣彌銳文選雲撤叛渙席卷處劉吳都賦決命爭首陷陣摧兇陳子昂集氣騰青雲精貫白日陷陣摧鋒戈飛番落日刃決浮雲氣橫遼碣志掃獯戎並同上拔距從軍揚麾挑戰征旆凌沙幕戎衣犯霜霰戈文耿耿懸落星馬足駸駸擁飛電終取俊而先鳴豈論功而後殿駱賓王叱咤則江山搖蕩指揮則林壑飛騰舉鵬力以揚威耀犀渠而賈勇擁拔山起海之雄驅籥景騰雷之騎齎霜戈而直進指雲陣以長驅並同上裂眥大怒磨牙欲吞不待成師固將身先士卒常思盡敵不以賊遺君父矢集月窟劍斬天驕䟽崑崙使西倒縛呼韓令北面王維集目無先零氣射西旅大小獨當三白陣縱橫只用五千兵刃樓蘭之腹繫郅支之頸骨風猛毅同上掉倚天之劍彎落月之弓李白殺氣橫千里軍聲動九區同上射穿七札劍敵萬人張說判身入矛戟輕敵比錙銖元微之罙入其阻大挫其鋒白傳集所用皆鷹騰破敵過箭疾杜詩將軍膽氣雄臂懸兩角弓貫穿百萬眾短小精悍姿屹然強寇散同上橫殺氣而獨往杜雕賦春秋方壯雄武才彎弧叱浪連山開韋應物集劍揮雷霆旆卷風雨唐文粹火千旗而四面風動雷萬鼓而一道地裂金鼓所向冰消草靡同上威陳八陣役風雨劉賓客眥血橫灑朱殷金甲𢰸戟而墜應弦而倒者數千萬人可謂三軍之絕也唐文粹勇冠三軍眾無一旅橫倚天之劍揮駐日之戈吟嘯四顧熊羆兩集上可以決天雲下可以絕地維翕振虎旅赫張王師退如山立進若電逝氣鎮三軍力崩大敵雲麾鐵騎山動地湧率偏軍橫絕漠策匹馬陷重圍搖轆轤而百萬洞開驅橐駝而沙場一掃聲振北狄氣慴東胡已上並唐文粹季心之氣蓋關中陳安之勇聞壟上爾乃萬死不顧一奮無前奇兵徑衝驍騎橫挑杜牧之眥裂肝膽橫趫捷超崢嶸柳文本朝田單掃敵如風旋臨川集上黨良家子挽強如屈肘黃魯直詩臂弓腰箭事戎裝遠山沙場恣遊獵參寥子史晉作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣說禮樂而崇詩書左僖二十七年祭遵為將軍皆用儒術對酒設樂必雅歌投壺在軍旅不忘俎豆後漢張奐為北中郎將匈奴烏桓燒度遼將軍門眾大怒奐安坐帷中與弟子講誦自若軍士稍安通鑑漢成帝紀魯肅治軍手不釋書吳志羊祐在軍常輕裘緩帶身不披甲晉書杜預身不跨馬射不穿札而每有大事必居將率之列晉書本傳謝玄破符堅於淝水裴度平元濟於淮西未必儒臣不如武將通鑑唐僖宗曹景宗大破魏愷入宴華光賦詩云去時兒女悲歸來笳鼓競借問路行人何如霍去病梁書上馬能擊賊下馬作露版惟傳脩期耳通監休璟以儒者號知兵唐書唐休璟傳集讀書五車運籌百勝王維集樽前失詩流塞上得國寶杜詩贈長孫侍御發身學劍餘力知書白傳集彎弧學劍用無出於一夫悅禮崇詩道可洪於七德晉謀中軍選於義府漢求上將舉在儒流白傳集從此世人聞耳目始知名將出書生劉賓客集子良將剛則法天可望而不可干柔則法淵可觀而不可入去如收電可見而不可追留如丘山可瞻而不可動抱朴史吳起所在寇不敢敵得之國強失之國亡是為良將史廉頗傳互見為國所倚李牧者趙之北邊良將也常居代鴈門備匈奴以便宜置使市租皆輸入幕府為士卒費日擊數牛饗士習射騎謹烽火多間諜厚遇戰士為約曰匈奴即入盜急入收保有敢捕虜者斬匈奴每入烽火謹輒入收保不敢戰如是數歲亦不亡失史本傳充國常以遠斥堠為務行必為戰備止必堅營陣尤能持重愛士卒先計而後戰通鑑漢宣紀漢邊郡李廣程不識皆為名將史本傳李陵提步卒不滿五千轉鬭千里矢盡道窮士張空拳冐白刃北首爭死敵得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下西漢本傳唐興其名將曰英衛唐書本傳光弼生戎虜之緒沈毅有守制敵策勝賞信罰明士卒爭奮毅然有古良將風唐李光弼傳贊唐之良將李晟馬燧渾瑊通鑑唐德宗本朝狄青字漢臣元昊叛屢將兵出戰四年間大小二十五陣八中流矢人呼為狄天使上觀其儀表曰朕之關張也於是有狄萬之稱以一足以敵萬也初青在軍伍間韓魏公范文正一見皆稱其有將相之器果能為國立功為時名將名臣傳經維師尚父時維鷹揚詩大明方叔元老克壯其猶詩采芑史羌豪相數責曰語汝無反今天子遣趙將軍來年八九十善為兵前漢互見為國所倚馬援曰臣雖老尚能披甲上馬援據鞍顧盻以示可用上笑曰矍鑠哉是翁也東漢馬援傳畢眾敬年七十鬚髮皓白而氣力未衰據鞍馳騁有若少壯後魏書賀若誼年老而筋力不衰猶能重鎧上馬為北夷所憚隋書吐谷渾寇邊帝謂侍臣曰靖能復起為帥乎靖往見房元齡曰靖雖老尚堪一行帝以為西海大總管靖決策深入踰積石山大戰數十多所殺獲殘其國國人多降吐谷渾自剄死新唐書本傳王弘贄宿將習事通鑑二百七十八集聞休鬭戰心還癢見說煙塵眼卻開王維集本朝宿將何承矩摧鋒百戰場欒城集臂健尚嫌弓力軟眼明猶識陣雲高青箱雜記史項羽世世為楚將人曰項氏世世將家有名於楚並史記項羽紀李晟克京師市不改肆愬平蔡亦如之唐書李愬傳集北方之強世雄朝野劉賓客旌幢獨繼家聲外竹帛新添圖史中張文昌家呼小太尉國號大涼公杜牧之子兵刃既接棄甲曳兵而走孟梁惠王下史桓子不知所為鼓於軍中曰先濟者有賞左宣十二年邲之戰口尚乳臭前漢高紀一敗塗地同上折北不救西蒯通傳起兵不知其埶戰則為人禽屯則卒積死通鑑漢文紀無橫草之功西漢終軍傳謝萬受任北征嘗以嘯詠自高未嘗撫眾兄安謂曰諸將宜數接對以悅其心乃集諸將以如意指四座云諸將皆勁卒諸將益恨之晉書帥臣身不臨邊而以偏師城守士之犀銳悉選以自奉委疲羸者以守要衝寇至而不支則執劫芟蹂恣所欲得唐書陸贄傳集曾隻輪之不返選西征賦敗軍之將身死家戮選彈文邊兵喪律選誄自貽虧衂任彥昇彈文顧望避適逗撓有刑東關無一戰之勞並同上子善用兵者如常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至孫子史見可而進知難而退左傳上兵伐謀榖梁注臨武君曰兵之所貴者勢利也所行者變詐也善用兵者感忽焂闇莫知所從出孫吳用之無敵於天下通鑑六秦紀料敵合變出奇無窮聲震天下史白起等贊略不世出史蒯通傳匈奴畏李廣之略史本傳李廣行無部伍行陣就善水草屯舍止人人自便不擊刁斗以自衛幕府省約文書籍事然亦遠斥候未嘗遇害軍極簡易虜卒犯之無以禁也而士卒亦佚樂咸樂為之死史本傳漢武欲教霍去病孫吳兵法對曰顧方略如何耳不至學古兵法前漢本傳料敵制勝威謀靡亢前趙充國傳充國曰臣願至金城圖上方略本傳先計而後戰帝王之兵以全取勝是以貴謀而賤戰並同上趙充國曰兵以計為本故多筭勝少筭西漢本傳謀如湧泉勢如轉規兵動有功師進輒克通鑑漢明帝耿秉擊匈奴簡易於事休止不結營部有警急軍陣立成後漢諸葛亮至南中所在戰捷聞孟獲者為夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虛實故敗亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣漢晉春秋吳朱然無事每朝夕嚴鼓兵在營者咸行裝就隊以此玩敵使不知所備故出輒有功通鑑魏邵陵厲公軍中謠曰以計代戰一當萬晉書杜預傳諸葛亮造八陣於平沙上壘石八行相去二丈桓溫見之曰此常山蛇勢晉書賀若弼請沿江防人每至交代之際必集廣陵於是大列旗幟營幕被野陳以為隋兵大至急發兵為備既知防人交代其眾復散後以為常不復設備又使兵緣江時獵人馬喧譟故弼之濟江陳人不覺通鑑隋高祖張巡用兵未嘗依古法勒大將教戰各出其意唐本傳李泌曰料敵者料將不料兵通鑑唐紀楊行密謂諸將曰孫儒之眾十倍於我吾戰數不利欲退保銅官何如劉威李神曰儒掃地遠來利在速戰宜屯險要堅壁清野以老其師時出輕騎抄其饋餉奪其俘掠彼前不得戰退無資糧可坐擒也通鑑唐昭宗集料敵制變萬里無差任彥昇彈文無攻不克百蠻皆墮於計中王維集慷慨謀義折天口之是非指畫山川知地形之要害同上中有奇謀前無強敵白傳集坐恃龍豹韜全輕蜂蠆毒劉長卿本朝韜鈐在心類要
