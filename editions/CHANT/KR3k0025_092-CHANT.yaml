body:
  text: 知人經知人則哲書皋陶謨晉人謂文子知人記檀弓樊遲問知子曰知人語顏淵子知莫難於知人家語弟子行知賢之謂明荀子解蔽篇君子不可欺以人吾洒然異之莊子聽之於未聞察之於未形而鑒其神智識其才能可謂知人若功成事遂然後知之者何異耳聞雷霆而稱為聰目見日月而謂之明乎劉子史子桑之忠也其知人也能舉善也左文三年孔子聞衛亂曰柴也其來由也死矣左哀十五年鮑叔進管仲以身下之天下多管仲之賢而多鮑叔能知人也史本傳上問丙吉誰可自代曰杜延年于定國陳萬年後居位皆稱職上稱吉為知人西漢本傳互入自代第五倫舉人多至二千石世以為知人後漢吳季英祐有知人之明東漢本傳司馬徽清雅有知人之鑒龐德公嘗謂德操司馬徽也為冰一作水鑑通監泰性明知人獎訓士類天下咸稱許郭之鑒東漢本傳荀淑遇黃憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰吾之師表也東漢司馬徽曰龐士元非百里之才使處治中別駕之任當展其驥足蜀志龐統傳諸葛亮曰蔣琬社稷之器非百里之才也蜀志本傳周弼見裴頠嘆曰若武庫五兵縱橫一時之傑晉書王戎有人倫鑒識晉書本傳王導少有風鑒識量清遠年十四高士張公見而奇之謂其從兄敦曰此兒容貌志氣宰相之器也同上互見期待謝安弱冠詣王濛清言既去濛曰此子亹亹逼人同上時太尉郄鑒使門生求女婿於王導導令就東廂徧觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹食獨若不聞鑒曰此正佳婿耶訪之乃羲之也晉書王羲之傳互見擇婿王羲之年十二周顗異之時重牛心炙坐客未噉顗先割噉羲之羲之由是知名晉書仁傑所薦進若張柬之桓彥範敬暉姚崇等皆為中興名臣唐書本傳則天問狄仁傑思得奇才用之仁傑曰荊州長史張柬之其人雖老真宰相才也續世說李邕文名天下盧藏用曰邕如干將莫耶難與爭鋒但虞傷缺耳唐書本傳互見剛大必折獨孤信見孫思邈曰器大難為用耳席豫拔寒遠士多至臺閣當時推知人王起典貢舉貢舉皆知名者人服其鑒互見座主門賈餗三典貢舉多得名卿宰相並同上集明白山濤鑒杜詩夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也韓文互入鑒別本朝王沂公作有物混成賦識者知其決為宰相聞見錄晏元獻為相求婿於范文正文正曰公女必求國士無如富弼者同上歐公知頴州呂公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之遺事經審聲以知音審音以知樂記樂記子孔子在衛昧旦晨興顏回侍側聞哭者之聲甚哀子曰回汝知此哭何者此哭之聲非但為死者而已矣又為生離別者子曰何以知之對曰回聞恒山之鳥生四子焉羽翼既成將分乎四海其母悲鳴而送之哀聲有似於此為其往而不返回竊以音類知之孔子使問哭者果曰夫死家貧賣子葬之與之長訣子曰回善於識音矣家語伯牙善鼓琴鍾子期善聽伯牙鼓琴志在高山子期曰善哉峨峨乎若太山志在流水子期曰善哉洋洋乎若江河伯牙所念子期必得之列子子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子互入機鋒相湊門史晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功左襄十八年伯石始生姑視之聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣左昭二十八年孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰己習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰有所穆然深思焉有所怡然高望而遠志焉曰丘得其為人黯然而黑幾然而長眼如望羊如王四國非文王其誰能為此也師襄子辟席再拜曰師蓋云文王操也史孔子世家蔡邕有以酒食召者客有彈琴於屏邕至門潛聽之曰以樂召我而有殺心何也遂返坐人追問其故邕具以告彈琴者曰我向見螳蜋方向鳴蟬將去而未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋之失蟬此豈為殺心而形於聲乎邕歎曰此足以當之矣東漢蔡邕夜鼓琴絃絕琰曰第二絃邕曰偶得之矣故斷一絃問之琰曰第四絃後本傳周瑜少精意於音樂三爵之後其有闕誤瑜必知之知之必顧時人謠曰曲有誤周郎顧吳志開皇十四年詔行新樂萬寶常聽太常所奏泫然泣曰樂聲淫厲而哀天下不久將盡時四海全盛皆謂不然大業之末其言卒驗通監隋文紀韓滉知音律嘗觀彈琴至止息歎曰妙哉嵇生之為是曲也其當晉魏之際乎其音主商商為秋秋者天將搖落肅殺其歲之晏乎又晉乘金運商金聲此所以知魏之季而晉將代也慢其商絃與宮同音是臣奪君之義也所以知司馬氏之將篡也舊唐書韓滉傳李瑀常早朝過永興里聞笛音顧左右曰是太常工乎曰然他日識之曰何故臥吹笛工驚謝又聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絃大絲也樂家以自下逆鼓曰琵自上順鼓曰琶云唐書合檢荀勗於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者晉書傳記孔子鼓瑟曾子聽曰夫子瑟聲有貪狼之志邪僻之行何其不仁趍利之甚子貢入以告子曰參天下賢人也其習知音矣向者丘鼓瑟有鼠出遊狸見屬屋循梁獲而不得丘以瑟為其音參以丘為貪狼邪僻不亦宜乎韓詩外傳吳人有燒桐以爨者蔡邕聞其爆聲曰此良桐也因請之削以為琴搜神記于頔令客彈琴其嫂知音曰三分中一分箏聲二分琵琶全無琴韻國史補集識曲聽其真選古詩古調雖自愛今人多不彈向君投此曲所貴知音難劉長卿互見暗投經子曰若臧武仲之知公綽之不欲卞莊子之勇冉求之藝文之以禮樂亦可以為成人矣語憲問子淮南說之用不如太史公之用也太史公聖人將有取焉乍出乍入淮南也文麗用寡長卿也多愛不忍子長也仲尼多愛愛義也子長多愛愛奇也楊淵騫史柏直口尚乳臭不能當韓信馮敬雖賢不能當灌嬰項它不能當曹參通監漢高紀荀悅曰趙兵出國迎戰見可而進知難而退懷內顧之心無出死之計韓信軍孤在水上士卒必死無有二志此信之所以勝之也漢王深入敵國置酒高會士卒逸豫戰心不固楚以強大之威而喪其國都士卒皆有憤激之氣救敗赴亡之急以決一旦之命而漢以怠惰之卒應之此同事而異情也通監子房蕭何韓信三者皆人傑吾能用之此吾所以取天下也項羽有一范增而不能用此所以為我擒也同上晁錯銳於為國遠慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗前漢本贊王貢之材優於龔鮑守死善道勝實蹈焉通監漢平紀太丘長陳寔寔子鴻臚紀紀子司空群群子泰四世於漢魏二朝並有重名而其德漸小減時人為其語曰公慚卿卿慚長三國魏陳群傳注夫王肅亮直多聞能析薪哉劉寔以為肅方於事上而好下佞已此一反也惟嗜榮貴而不求苟合此二反也吝惜財物而治身不穢此三反也三國魏王肅傳評王昶為魏司空開濟識度湛沖素簡淡器量隤然有公輔之望承清虛寡欲不飾文詞晉渡江名臣王導衛玠周顗庾亮之徒皆出其下自昶至承世有高名論者以為祖不及孫孫不及父晉書范隆曰吾嘗恥隋陸無武絳灌無文隋陸遇高帝而不能建封侯之業絳灌遇文帝而不能興庠序之教通監晉世祖張輔嘗著論以為管仲不若鮑叔班固不及司馬遷魏武不及劉備樂毅減於諸葛亮晉書崔浩曰王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也通監晉紀魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎通監晉恭紀互見品藻胡藩言於裕曰公謂劉衛軍終能為公下乎裕默然久之曰卿謂何如藩曰連百萬之眾攻必取戰必克毅固以此服公至於涉獵傳記一談一詠自許以為雄豪公殆不如也通監晉安紀隋高孝基鑒賞機晤清謹絕倫然爽俊有餘跡似輕薄通監隋紀王通嘗稱無赦之國其刑必平重歛之國其財必貧通監隋高祖或言李密侶項羽非也羽興五年伯天下密連兵數十百戰不能取東都自立亦不能鼓而西其亡宜也唐李密贊昔晉武帝平吳之後志意驕怠何曾位極台司不能直諫乃私語子孫自矜明智此不忠之大者也通監唐太宗裴行儉曰士之致遠者當先器識而後才藝通監唐紀潘好禮設客問曰徐公有功於今誰與為比主人曰四海至廣人物至多或匿跡韜光僕不敢誣若所聞見則一人而已當於古人中求之客曰何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣張公逢漢文之時天下無事至如盜高廟玉環及渭橋驚馬守法而已豈不易哉徐公逢革命之秋屬惟新之運唐朝遺老或包藏禍心使人主有疑如周興來俊臣乃堯年之四凶也崇飾惡言以誣盛德而徐公守死善道深相明白幾陷囹圄數掛網羅此吾子所聞豈不難哉通監唐武后孫逖掌制誥為時流嘆服議者以為自開元以來蘇頲齊澣蘇晉賈曾韓休許景先及逖為王言之最唐書上所用之相姚崇尚通宋璟尚法張嘉貞尚吏張說尚文李元紘杜暹尚儉韓休張九齡尚直各其所長也通監唐元紀德行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏雨所不能活也唐書柳玭傳傳記裴延裕乾寧中在內庭文書敏捷號下水船姚洎號急灘頭上水船摭言羊祜鑿墓陶侃決指二人正相反王戎好聚歛常手執牙籌王衍口不言錢謂阿堵物二人正相反坦之作廢莊論阮籍作達莊論正相反廢莊論詆譏子休而多竊其言操戈入室文章之最病孔氏雜說韓退之晚年有聲樂而服金石藥張籍祭文曰乃出二侍女合彈琵琶箏既而公疾浸加孺人侍湯藥白樂天思舊詩云退之服硫黃一病訖不痊微之元稹也煉秋石未老身溘然退之嘗譏人不解文字飲而自敗於女妓乎作李博士墓銘戒人服金石藥而自餌硫黃乎同上集兩漢之始屠販徒隸出以為公侯卿相無他焉彼固公侯卿相器也遭時之非是以詘其始之不幸非遭高光而以為幸也漢晉之末公侯卿相劫戮困餓伏牆壁間以死無它焉彼固劫戮困餓器也遭時之非是以出獨其始之幸非遭卓曜而後為禍也柳咸宜論周仁以重臣為二千石許靖以人譽而致位三公近世尤好此類以為長者也自抱關擊柝以往最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱關擊柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上蒙以袞冕翼以徒隸趍走其左右豈有補於萬民之勞苦哉柳文風雅則諸葛瑾張承步騭以名聲光國政事則顧雍潘濬呂範呂岱以器任幹職奇偉則虞蕃陸績張溫張焞以諷議舉正奉使則趙咨沈珩以敏達延譽術數則吳範趙達以禨祥協應陸機辨亡論本朝唐諸子號詩人者僻固而狹陋歐公文集韓愈嘗有賦矣不過羡二鳥之光榮一飽之無時耳推是心使光榮而飽則不復云矣若翱獨不然其賦曰眾囂囂而獨處兮咸嘆老而嗟卑視予心之不然兮慮行道之猶非怪神堯以一旅取天下後世子孫不能以天下取河北以為憂嗚呼使當時君子皆易其歎老嗟卑之心為翱所憂之心則唐之天下豈有亂與亡哉歐公讀李翱文羊祜陸遜送絹償禾之事甚好至祜飲遜藥則不可陸遜雖不是鴆人底人然兩軍相向其所餉藥自不當飲老泉文今世稱善草書或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡集永禪師書骨氣深穩體兼眾妙精能之至返造深淡如觀陶彭澤詩初若散緩不收反復不己乃識奇趣同上霏霏乎其若卿雲之蔽月也翻翻乎其若長風之卷旆也猗猗乎其若遊絲之牽柳絮也裊裊乎若流水之舞荇帶也離離乎其遠而相屬縮縮乎其近而不隘也東坡文與可飛白贊敘讀文選恨其編次無法去取失當齊梁文字衰陋蕭統尤為卑弱如李陵五言皆偽今日觀淵明集可喜者甚多而獨取數篇淵明作閑情賦正所謂國風好色而不淫正使不及周南與屈原所陳何異而統大譏之此小兒強解事也仇池筆記唐人工於為詩而陋於聞道欒城集六經已後便有司馬遷三百五篇之後便有杜子美文當學司馬遷詩當學杜子美唐庚文司馬遷敢亂道卻好班固不敢亂道卻不好不亂道又好是左傳亂道又不好是唐書同上王右軍蘭亭天朗氣清自是秋景以此不入選然絲竹管絃語亦重複遯齋閑覽東坡云書之美者莫如顏魯公然書法之壞自魯公始詩之美者莫如韓退之然詩格之變自退之始王直方詩話經人無於水監當於民監書酒誥回之為人也擇乎中庸記中庸誠之者擇善而固執之也同上多聞擇其善者而從之語述而子君請擇於斯二者孟子觀水有術必觀其瀾同上善擇者制人不善擇者人制之荀子人莫鑑於流水而鑑於止水莊子鵷雛非梧桐不止非練實不食非醴泉不飲莊秋水或問人有倚孔氏之牆誦韓莊之書則引諸門乎曰在夷貉則進之倚門牆則麾之揚子人不照於昧金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於靜水者以靜能清也劉子史筮短龜長不如從長左僖四年臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石左襄二十三年鳥則擇木左哀十一年范文子曰擇福莫若重擇禍莫若輕國晉語注云有二福擇取其重有二禍擇取其輕也飢人所以不食烏喙者為其愈充腹而與餓死同也史記士宜以才行為先不可純以閥閱通監漢章帝懇懇用刑不如行恩孳孳求奸未若禮賢通監漢相紀傳記寧為雞口無為牛後戰國策得十良馬不如得一伯樂得十良劍不如得一歐冶呂氏春秋食其自匿監門非高祖不長揖孔明躬稼南陽非劉氏不馳驅晉中興書集挽弓當挽強用箭當用長射人先射馬擒賊先擒王杜詩養禽當養鶻元稹集磨劍莫磨錐磨錐成小利同上互見捨小圖大擇肉於熊羆肯視兔與狸韓文互見氣概率性飭躬立志希古當以聖人為準的中庸為慕尚清與和皆非中道皇甫湜本朝故窮山水登臨之美者必之乎寬閑之野寂寞之鄉而後足焉覽人物之盛麗夸都邑之雄富者必據乎四達之衝舟車之會而後足焉歐公有美堂記經它人有心予忖度之詩小雅巧言陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也孔子聞之曰善哉覘國乎禮記檀弓觀其舞知其德聞其謚知其行記樂記有子曰其為人也孝悌而好犯上者鮮矣不好犯上而好作亂者未之有也語學而子未有仁而遺其親者也未有義而後其君者也孟梁惠王上枉己者未有能直人者也孟滕文公下子貢曰見其禮而知其政聞其樂而知其德孟公孫丑上千歲之運今日是也荀子人能為其主亦必能為人列子力命史卜偃曰畢萬之後必大左閔元年齊仲孫湫來省難歸曰魯不棄周禮未可動也同上晉文公曰得臣猶在憂未歇也左宣十二年孟獻子曰晉帥乘和師必有大功左成十三年士鞅曰欒黶汰虐已甚猶可以免其在盈乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實彰左襄十四年晉囚叔向樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫樂王鮒從君者也何能行祁大夫外舉不棄仇內舉不失親其獨遺我乎左襄二十一年周王曰韓氏其昌阜於晉乎左襄二十八年季武子曰晉未可媮也有趙孟以為大夫其朝多君子其庸可媮乎左襄三十年叔向曰伯有已侈所謂不及五稔者左襄二十七年互見識者所闚楚執伍奢費無極曰奢之子材若在吳必憂楚國盍召之員適吳奢聞員不來曰楚君大夫其吁食乎左昭二十年吳二千里不三月不至何及於我左定七年楚子西曰夫差其先自敗也已安能敗我左哀元年魏子其長有後於晉國乎魏子魏舒也左昭二十年伍員曰越十年生聚而十年教訓二十年之外吳其為沼乎左哀元年子胥曰越在我心腹之疾也左哀十一年季札曰衛多君子未有患也左襄二十九年觀其容而知其心矣國語互見識者所窺伍子胥諫曰越王勾踐食不重味衣不重采弔喪問疾且欲有所用其眾此人不死必為吳患今越在心腹疾而王不先不亦謬乎史吳世家侯嬴曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之嘗聞公子為如姬執其父仇如姬欲為公子死無所辭公子誠一開口則得虎符奪鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通監周紀龐涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐涓死此樹下於是令齊軍善射者萬弩夾道而伏期日暮見火起而俱發龐涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自刎曰遂成豎子之名史記楚南公曰楚雖三戶亡秦必楚史項籍紀房君諫陳餘曰秦未亡而誅武信等此生一秦也通監秦紀陳平曰項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳通監漢高紀英布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而臥矣上曰何謂上計對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣上曰是計將安出對曰出下計通監十二晁錯曰吳削亦反不削亦反削之其反亟禍小不削之其反遲禍大前漢荊燕吳傳朱勃小器速成智盡此耳東漢愋傳互見識者所窺邴吉有陰德夏侯勝識其當封及子孫東漢袁安傳論幽州刺史馮煥玄菟太守姚光數糾發姦惡怨者詐作璽書譴責煥光賜以歐刀下遼都尉龐奮使速行刑奮即斬光收煥煥欲自殺其子緄疑詔文有異止煥曰大人在州志欲去惡實無它故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所為通監漢殤紀孫策將襲許眾懼郭嘉料之曰策新得江東所誅者英髦雄傑輕而無備雖有百萬眾無異獨行中原若刺客伏起一人之敵爾果為刺客所殺魏志袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絕其哺乳立可餓殺通監漢獻紀蛟龍得雲雨恐非池中物吳志周瑜傳互見識者所窺衛公子開方仕齊積年不返管仲以為不懷其親安能愛君是以求忠臣必於孝子之門通監漢獻紀郭嘉曰袁紹性遲而多疑來必不速同上諸葛亮至郿軍於渭水之南司馬懿引軍渡渭背水為壘以拒之謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原諸將無事矣亮果出五丈原通監魏明紀魏文帝欲伐吳蜀賈詡曰吳蜀依阻山水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢皆難卒謀魏志邢貞曰江東將相如此非久下人者也三國司馬懿告人曰諸葛孔明食少事煩其能久乎魏明紀索靖知天下將亂指雒陽宮銅駝嘆曰會見汝在荊棘中耳通監晉紀互入憂世及先見朝廷初聞燕王雋卒皆以為中原可圖桓溫曰慕容恪尚在憂方大耳通監晉海西公紀桓玄曰劉裕足為一世之雄劉毅家無擔石之儲樗蒲一擲百萬何無忌酷侶其舅共舉大事何謂無成通監晉安紀劉裕伐燕過大峴曰虜已入吾掌中矣同上于謹曰曜兵漢沔席卷度江直據丹陽是其上策移郭內居人退保子城以待援至是其中策若難於移動據守羅郭是其下策長孫儉曰裁繹蕭繹也出何策謹曰必用下策北史元魏本傳隋軍臨江高熲謂行臺吏部郎中薛道衡曰今茲大舉江東必可克乎道衡曰克之嘗聞郭璞有言江東分王三百年復與中國合今此數將周一也主上恭儉勤勞叔寶荒淫驕侈二也國之安危在所寄任彼以江揔為相唯事詩酒拔小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之用耳三也我有道而大彼無德而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑通監陳長城公紀李敬元盛稱王勃楊炯盧照鄰駱賓王之才裴行儉曰勃等雖有才而浮躁衒露豈享爵祿者哉唐書裴行儉傳互入識者所窺使者所薦唯得文辭干進之士耳安有有道賢人肯隨牒舉選乎通監唐德宗裴度曰朱克融譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴通鑑唐肅宗李弘曰鄭注姦猾無雙卵𪆪不除使成羽翼以為國患通鑑唐文紀一日狼煙百餘舉帝曰此虜將遁張虛勢也通鑑五代漢高祖傳記可食以粱肉者可加以鞭捶可受以官祿者可隨以鈇鉞高士傳望影揣情文選陸士衡頌有志氣而能思富貴者必能建功業有志氣而能輕爵祿者必能立名節李衛公君子論季札以樂卜趙孟以詩卜襄仲歸父以言語卜子游子貢以威儀卜沈尹戍以政卜孔成子以禮卜其應也如響無他在精誠而已不精誠者不能自卜況吉凶他人乎陸魯望文若燭照數計而龜卜也韓文
