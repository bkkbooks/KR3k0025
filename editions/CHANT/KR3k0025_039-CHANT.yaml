body:
  text: 偉傑經維此仲行百夫之防維此鍼虎百夫之禦維此奄息百夫之特詩黃鳥邦之桀兮詩伯兮子俊傑在位孟智過萬人謂之英千人謂之俊百人謂之豪十人謂之傑淮南史江充為人魁岸西漢本傳師古曰廉稜如崖岸之形魁梧奇偉西漢張良贊俶儻奇偉西漢揚雄傳為人精悍西漢嚴延年傳踔絕之能西漢孔光傳識時務者在乎俊傑蜀志諸葛亮傳注凜凜與秋霜爭嚴真丈夫哉唐卓行傳贊集直若砥矢言若丹青進下隱其謀退不顧其命此誠絕世之行俊彥之英也楚辭丈夫之雄也孔文舉書史中行說曰必我也為漢患者中行說既至因降單于單于甚親幸之通監漢文紀清名之士紀逡兩唐林尊皆仕王莽西漢鮑宣傳漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬烏北地人習胡俗去其節黥面入廬西漢匈奴傳齊明帝即位徵沈約為五兵尚書國子祭酒帝崩為司徒初梁武在西邸與約遊舊勳業既就天人允屬約常扣其端帝默然而不應他日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳳者皆望有尺寸之功以保其福祿今童兒牧豎悉知齊祚之終帝曰吾方思之約曰公初起兵樊沔此時應思今日王業已就何所復思若天子還都公卿在位則君臣分定無復異圖君明於上臣忠於下豈復有人方更同公作賊帝然之約出召范雲告之帝受禪為尚書僕射奉策之日吏部尚書范雲等二十餘人咸來致拜南史沈約傳馬仙琕曰小人如失主犬後主飼之則復為用矣通監齊和紀下盧藏用始隱有意當時世人目為隨駕隱士晚乃徇權利務為驕縱素節盡矣唐書本傳委靡輕熟偷生自私唐書忠義傳鄭韜以戶部尚書致仕自襁褓迨於縣車事真偽十一君凡七十載五代史馮道事晉晉滅又事契丹耶律德光於京師德光責道事晉無狀道不能對又問曰何以來朝對曰無城無兵安敢不來德光誚之曰爾是何等老子對曰無才無德癡頑老子五代史馮道傳馮道之為相歷五朝八姓若逆旅之視過客朝為仇敵暮為君臣易面變辭曾無愧怍大節如此雖有小善庸足稱乎通監集何意百鍊剛化為繞指柔文選古詩對穹廬以屈膝丘希範書臣雄作劇秦美新一篇文選云配五帝冠三王開闢以來未之有也本朝末路喪初心東坡詩經美如英萬人為英美如玉詩汾沮洳故建邦能命龜田能施命作器能銘使能造命升高能賦師旅能誓山川能說喪紀能誄祭祀能語君子能此九者可謂有德音可以為大夫也詩定之方中注子刀刃若新發於硎莊養生互入方興未艾應當時之變如數一二荀史高陽氏有才子八人齊聖廣淵明允篤誠高辛氏有才子八人忠肅恭懿宣慈惠和左文十八年吳中賢士大夫皆出項梁下每吳中有大繇役及喪項梁常為主辦史記項羽本傳登高能賦可以為大夫言感物造端材知深美可與圖事故可以為列大夫也西漢藝文志鄧禹曰寇恂文武備足有牧民御眾之才通監漢平紀器局方概有萬夫之望晉書筆敷華藻吻縱波濤方駕搢紳足為翹楚晉庾亮等贊風力局幹冠冕一時通監宋文紀桓榮祖曰昔曹公父子上馬橫槊下馬談詠此於天下可不負飲食矣通監宋紀互入稱誦上馬能擊賊下馬作露板唯傳脩期爾通監齊明紀下卷又本朝續世說第四卷版字作布字帝謂周捨曰柳惲可謂具美分其才藝足了十人梁書崔孝伯才浩浩如黃河東注北史本傳劉晏有精力變通有無曲盡其妙募善走者置相望覘報四方物價雖遠方不數日皆達食貨輕重之權悉制在掌握勾檢簿書出納錢穀事雖至細必委之士類吏惟書符牒不得輕出一言晏始為轉運使時天下見戶不過二百萬其季年乃三百餘萬在晏所統則增非晏所統則不增也其初財賦歲入不過四百萬緡季年乃千餘萬緡其始江淮鹽利不過四十萬緡季年乃六百餘萬緡通監唐德宗上顧張鎰曰才兼文武望重內外無以易卿同上兼資文武出將入相唐王珪傳盧藏用謂李邕如干將莫耶難與爭鋒唐書本傳一日千里唐書蘇廷碩傳德裕廊廟老手弦鳴鴈落刃往牛解唐元稹論衡集長松在林利錐處囊森踈穎脫鋒幹獨見歐陽詹雄推三虎賈秀擢八龍荀元微之斧刃迎皆碎逸俊雄姿逈同上處繁應卒鋩刃不頓凌雲羽翮掞天才劉賓客才名括天下白樂天雅有器幹精彊博敏有才子之稱金劍淬來長透匣駭足逸翮天驥冥鴻始擅文三捷終兼武六韜並同上世上五百年吾家一千里高達夫利刃新磨一匣霜張承吉文桂枝片玉光生于家柳文處劇不繁事業皆辦杜牧之臨事無全牛劉長卿本朝後發先至者驥之良歐公集鋒錐必脫穎安肯久處囊僧參寥子君如汗血駒轉盻略燕楚東坡詩報功經功加于時書微子之命厥有成績紀于太常書君牙王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書于王之太常祭于大烝周禮司勳名與功偕記樂記后稷天下之為烈也豈一手一足哉記表記子功積如天地荀王伯史勳在王室藏於盟府左僖五年晉俟以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧魏絳於是有金石之樂左襄十九年銘其功業以示子孫左襄十九年互入傳遠克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣隸圉免左哀二年樂毅六月之間下齊七十餘城通監周紀何之勳爛焉與宜生等爭烈矣史記蕭何世家卞莊子一舉有兩虎之功史記陳軫傳夷萬乘之彊國收八百之蓄積史記樂毅傳齊器設於寧臺大呂陳於元英故鼎反乎磨室薊丘之植植於汶篁自五伯以來功未有及先王者也同上封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔前漢功臣表功光王府前漢表銘勳彝器歷世彌光聲溢金石前漢書匈奴遠遁而幕南無王庭通監漢武紀漢功臣皆剖符世爵受山河之誓存以著其號亡以顯其魂前漢功臣表立千載之功建萬世之安群臣之勳莫大焉昔周大夫方叔吉甫為宣王誅玁狁而百蠻從通監漢元紀休烈垂於不朽東漢鄧騭傳建天地之功增日月之耀後漢郎顗傳垂功名於竹帛東漢鄧禹傳伊霍之功不下席而立東漢崔瑗傳功名重山岳東漢酈炎傳馮異功若丘山東漢寇鄧之高勳耿賈之鴻烈東漢二十八將論勳效傳於百世晉書士稚葉跡中興克復九州之半晉書祖逖贊勳高一代勳力之盛無人倫比唐書初秦王以大箭射卻突厥後餘大弓一大箭五世寶之郊丘必陳儀物之首以識武功唐書子儀功蓋天下唐書賜鐵券藏名太廟畫像凌煙同上李晟破朱泚帝紀其功自文于碑敕皇太子書立于東渭橋以示後世唐書本傳吳元濟平帝美裴度功命韓愈為平淮西碑唐書尉遲敬德桑蔭不徙而大功立新唐書本傳贊李克用時年二十八於諸將最少而破黃巢復長安功第一諸將皆畏之時人謂之獨眼龍通監唐僖宗郭子儀收東都代宗迎灞上勞之曰國家再造卿之力也唐書本傳集業類補天功均柱石文選銘功銘著於景鍾名績垂於竹帛文選自試表當令麟閣上千載有雄名文選廿伐詩勳超邃古文選記室牋驃騎發跡於祈連文選解嘲茂勳格於皇天文選建丘山之功文選檄文刈單于之旗勦閼氏之首探符離之窟掃五王之庭文選典論銘功景鍾書名竹帛選臨淄侯牋勳業青冥上杜詩功業汾陽異姓王同上赫赫乎洸洸乎功業逐日以新韓文嗣德有繼將大書特書屢書不一書而己也韓文荅元微之取日虞淵洗光咸池潛授五龍夾之以飛唐呂溫作狄仁傑頌神發響效謨成天功唐文粹功名滿青史劉長卿記能事載盛德渭川之竹不足簡終南山之木不足軸唐文粹策功第一承恩莫二勒函谷之關刊燕然之石鼓行海內麾定四方並同上凡下子齪齪焉自保不足以發也文中述史史毛遂曰公等碌碌所謂因人成事者也通監周赧王紀委瑣握𪘏西漢司馬相如傳智不足以權變勇不足以決斷仁不足以取予彊不能以有守西漢貨殖傳錄錄未有奇節西漢蕭何贊互入自揆今巳虧形為埽除之吏在闒茸之中西漢司馬遷傳啙音紫窳音庾偷生西漢地理志為人在下中西漢李廣傳師古在下輩之中僕遫不足數西漢息夫躬傳非有踔絕之能西漢孔光傳娖娖廉謹備位而已無所能發明功名有著於當世者西漢申屠嘉傳樊伷嘗為州人設饌比至日中食不可得而十餘自起通監漢獻紀宋蒼梧王凡諸鄙事裁衣作帽過目則能未嘗吹箎執管便韻通監專習小人賤事以為己能通監唐憲紀委靡軟熟唐書忠義傳集百不逮人所尚業復不能尺寸銖兩自彊自進乃庸人輩也杜牧之齊澣劾奏裴談神昏形滓孔白六帖經明作晢聰作謀書洪範子曰浸潤之讚膚受之愬不行焉可謂明也已矣語顏淵子詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮孟鑑明則塵垢不止莊德充符論冥冥之中獨見曉焉無聲之中獨聞和焉莊明哲煌煌旁燭無疆揚子史延陵季子見微而知清濁史記吳世家聰者聽於無聲明者見於未形西漢伍被傳清水明鏡不可以形逃西漢韓安國傳互入物無遁形明者睹未萌後漢班超傳標鑒通晤唐王珪傳馬周言天下事若素宦于朝明習憲章者唐書本傳吐突承璀欲希上意奪裴垍權自請將兵討王承宗上疑未決宗正少卿李拭奏稱承宗不可不討承璀親近信臣宜委以禁兵上以拭狀示諸學士曰此姦臣也知朕欲將承璀故上此奏卿曹記之自今勿令得進用通監唐憲宗傳記明如日月難為蓋藏史通集光明於日月楚辭注云聰明如日月智燭千里動必察微心鏡萬機物來斯應李文饒水鏡澄花炫金波於靈府冰壺徹鑒朗玉燭於神機駱賓王飛聰馳明無遠不察李白明堂賦本朝讀書眼如月罅隙靡不照東坡詩
