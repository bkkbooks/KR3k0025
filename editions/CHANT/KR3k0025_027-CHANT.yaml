body:
  text: 事有反報經老馬反為駒不顧其後詩角弓箋不自顧念後至年老人之遇己亦將然言悖而出者亦悖而入貨悖而入者亦悖而出記大學子出乎爾者反乎爾者也孟子梁惠下君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎同上离婁下人有送其妻適私家者道見桑婦悅而與言顧視其妻亦有招之者矣列子說符篇菑人者人必反菑之莊子人間世故商鞅立法而支解吳起刻削而車裂淮南子繆稱訓史楚靈王聞群公子之死曰余殺人子多矣能無及此乎左昭十二互見知悔類商君亡至關下欲舍客舍客舍人不知其是商君也曰商君之法舍人無驗者坐之商君曰為法之敝一至此哉去之魏史本傳衛鞅內刻刀鋸外深鈇鉞論囚渭水盡赤所逃莫之隱所歸莫之容身死車裂史記商君傳注禍莫大於殺已降此將軍所以不得侯也史李廣傳三代之將道家所忌自廣至陵遂亡其宗同上義縱誅殺甚多上幸鼎湖甘泉道多不治上怒曰縱以我為不復行此道耶嗛之棄縱市史本傳鄉秦之禁適所以資豪傑而速自斃也前漢袁盎傳互見與人為地掩人者人亦掩之陵人者人亦陵之魏志王昶傳程普殺降者數百人皆令投火即自病瘖而卒吳志庚懌以酒餉江州刺史王允之允之覺其毒飲犬犬斃密奏之帝曰大舅已亂天下小舅復欲爾耶二月懌飲鴆卒通監晉穆紀劉毅夜投牛牧佛寺初桓蔚之敗也走投牛牧寺僧昌保藏之毅殺昌至是寺僧拒之曰昔亡師容桓蔚為劉衛軍所殺今實不敢容異人毅歎曰為法自弊一至於此遂縊而死通監晉安紀魏城陽王徽走至山南抵前洛陽令寇祖仁家祖仁一門三刺史皆徽所引拔以有舊恩故投之徽齋金百斤馬五十疋祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戶侯今日富貴至矣乃怖徽云官捕將至令其逃於他所使人於路邀殺之送首於兆兆夢徽謂己曰我有金二百斤馬百匹在寇祖仁家卿可取之兆既覺意所夢為實即掩捕祖仁徵其金馬祖仁謂人密告望風款服云實得金百斤馬五十匹疑其隱匿依夢徵之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首高樹大石墜足捶之至死通監梁高祖王皇后無子蕭淑妃有寵王后疾之陰令武氏長髮勸上內之後宮欲以間淑妃之寵武氏巧慧多權數初入宮卑辭屈體以事后后愛之數稱其美於上未幾大幸通監唐高祖索元禮武后時為推使作鐵籠聲囚首加以楔至腦裂死後以苛猛復受賕收下吏不服吏曰取公鐵籠來元禮乃服罪死獄中唐書周興習法為秋官後有人告興謀反詔來俊臣鞠狀初興未知被告方對俊臣食俊臣曰囚多不服柰何興曰易耳內之大甕熾炭周之何事不承俊臣乃命取甕熾火徐謂曰有詔按君請嘗之興叩頭伏罪唐書元載專橫上欲誅之收載於政事堂賜載自盡於万年縣載請主者頭得快死主者曰相公須受少污辱勿怪乃脫穢韤塞其口而殺之通監唐代宗盜發郭子儀父冢儀見上流涕曰臣久將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也同上誣善者亦反其辜通監唐德宗路岩為相密奏三品以上賜死皆令使者剔取結喉三寸以進驗其必死至是自罹其禍所死之處乃楊收賜死之榻也通監唐懿宗楊行密曰吾好寬而袁襲每勸我以殺此其所以不壽通監唐僖宗傳記好稱人惡者人亦道其惡好憎人者亦為人所憎說苑談叢篇張易之兄弟競為豪侈後被誅百姓臠割其肉時謂走馬報朝野僉載傷賢者殃及三代蔽賢者身當其害黃石三略集韓設辯以徼君呂行詐以賣國說難既道其身乃囚秦貨既貴厥宗亦墜張孟堅賓戲班姬收淚抱妾身我曾排擯無限人元稹集互見知悔本朝盧多遜貶朱崖李符見趙普言朱崖雖海外而水土無他惡春州在內至者必死普頷之後符坐貶宣州上怒未已普具述其事即以知春州到郡而卒談苑寇忠愍之貶時丁晉公馮拯在中書丁當秉筆初欲貶崖州丁忽自疑乃擬雷州丁之貶也馮遂擬崖州當時好事相語曰若見雷州寇司戶人生何處不相逢歐公歸田錄丁謂為相逐李迪時宋綬知制誥請罪名謂曰春秋無將漢法不道及謂貶朱崖宋猶掌制誥即為之詞曰無將之戒深著於曾經不道之誅難逃於漢法天下快之龍州志石介既卒夏竦言於英宗曰介實不死比走胡矣乃出中使發介棺以驗虛實其後夏竦之死吳奎曰夏竦多詐今死矣仁宗至其家命大閹去竦面冪而視之世謂剖棺之與去面冪其為人主之疑一也亦沂謂報應者耶東軒筆錄曹丕當時不自恥敢謂舜禹傳之堯得之以此失亦此誰知三馬同一槽歐公集以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果於殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴東坡文呂布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯呂布見誅於曹公而牢之見殺於桓氏欒城文經同舟而濟則胡越何患乎異心易略例百姓足君孰與不足百姓不足君孰與足語顏淵子下貧則上貧下富則上富荀富國吳越之人同舟濟江中流遇風波其相救如左右手者所患同也孔叢子論勢同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悅者顏不能不笑鄧析子篇史鄭伯謂燭之武曰鄭亡子亦有不利焉左僖三十輔車相依唇亡齒寒其虞號之謂乎左僖五蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也左傳左師曰大臣不順國之恥也左傳子產謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉左襄三十君之卿佐是謂股肱股肱或虧何痛如之左昭九叔孫氏之司馬鬷戾言於眾曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也左昭二十五成孟氏之保障也無成是無孟氏也左定十二夫魯齊晉之唇齒唇亡齒寒左哀八宋樂豫曰公族公室之枝葉也若去之則本根無所庇蔭矣左傳民實瘠矣君安得肥國語漢王曰吾翁即若翁漢書淮南王反令尹曰往年殺彭越前年殺韓信此三人者同體之人也自疑禍反身故反耳通監漢高紀枝葉落則本根無所庇蔭西漢劉向傳將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之後漢朱穆田蚡曰程不識李廣俱東西宮衛尉今眾辱程將軍仲孺獨不為李將軍地乎西漢灌夫傳李固曰譬猶一門之內一家之事安則共其福慶危則通其禍敗通監東漢紀猶叩樹本百枝皆動也東漢李固傳互見影響相應猶頭之與足相資也通監漢桓紀呂範曰譬猶同舟涉海一事不牢即俱受其敗同上東漢紀慕容垂曰秦晉瓦合相待為彊一勝則俱豪一敗則俱潰晉武紀君臣猶父子也休戚同之唐高祖紀上嘗謂公卿曰苟其君愎諫自賢其臣阿諛順旨君既失國臣豈能獨全如虞世基等諂事焬帝以保富貴焬帝既弒世基等亦戮唐太宗紀並同上傳記若同舟而濟濟則皆同其利敗則皆同其害太公六韜未見子富而父貧也通典經謀夫孔多是用不集發言盈庭誰敢執其咎詩小雅子大道以多歧亡羊列子說符篇百醫守病適足致疑而不能一愈也莊子人間世大臣均權而魏命亂矣司馬宣王與曹爽權相傾文中子史狐裘龍茸一國三公吾誰適從左僖五齊簡公之在魯也闞止有寵焉及即位使為政陳成子常憚之諸御鞅言於公曰陳闞不可並也君其擇焉弗聽左哀十四楚子之為令尹也為王旌芋尹無宇曰一國兩君其誰堪之左傳韓宣王欲兩用公仲公叔為政問於繆留對曰不可晉用六卿而國分齊簡公用陳成子及闞止而見殺魏用犀首張儀而西河之外亡今君兩用之其多力者內樹黨寡力者藉外權群臣有內樹黨以驕主有外為交以削地君之國危矣通監周顯王紀九卿更進用事事不關決於丞相同上漢武紀政出多門勢位之家更相薦托有如互市晉惠紀刑法不一獄訟繁滋劉頌上疏曰自近世以來法漸多門令甚不一吏不知所守下不知所避好偽者因以售其情居上者難以檢其下同上二政分權鮮不階禍晉成紀時宰相無常官唯人主所與議論政事委以機密者皆宰相也南史宋高祖紀張弘策曰一國三公猶不堪況六貴同朝勢必相圖齊東昏侯紀天下大權悉歸中宮黜陟生殺決於其口天子拱手而已中外謂之二聖唐高宗紀斜封官皆不由兩省而授兩省莫敢執奏唐睿宗已上並通監集一國三公十羊九牧陸宣公文史齊伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也左僖四鄭龍鬭國人請為禜焉子產曰我鬭龍不我覿也龍鬭我獨何覿焉吾無求於龍龍亦無求於我左昭十九互見守正集鯨吞蛟鬭波成血深澗游魚樂不知白樂天越人視秦人肥瘠忽然不加喜戚於其心韓文子鳥窮則啄獸窮則摶家語人窮則詐馬窮則佚同上魚相呴以濕相濡以沫莊天運此帷救死而恐不贍奚暇治禮義哉孟梁惠王上史鄭子家曰鹿死不擇音左文十七年鋌而走險急何能擇同上宋使華元夜入楚師登子反之床曰寡君使元以病告曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能從也左宣十五年人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也史屈原傳無所容跡史犀首傳寒者利短褐飢者甘糟糠史秦始皇紀秦之季世焚詩書坑儒士六藝從此闕焉陳涉之王也而魯諸儒持孔氏之禮器往歸陳王孔甲為陳王博士史儒林傳序丁公為項羽將逐窘高祖彭城西短兵相接漢王急顧謂丁公曰兩賢豈相戹哉西漢李布傳樊噲曰如今人方為刀俎我方為魚肉何辭焉通監漢高紀上居晉陽聞冒頓居代谷欲擊之使人覘匈奴冒頓匿其壯士肥牛馬但見老弱及贏畜使者十輩來皆言匈奴可擊冒頓縱精兵四十萬騎圍帝於白登七日帝用陳平祕計使使間厚遺閼氏從解角直出同上魏勃曰失火之家豈暇先言大人後救火乎西漢高五王傳互入權變人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈父不能保其子通監漢文紀寒之於衣不待輕煖飢之於食不待甘旨飢寒至身不顧廉恥前漢食貨志棰楚之下何求而不得西漢路溫舒傳善人在患飢不及餐通監漢順紀夫居萬死之地必有死爭之心同上漢獻紀桑落瓦解其勢可見東漢馬融傳桓玄僣位劉裕劉毅何無忌等共謀興復玄駭入蜀費恬毛祐之擊玄被箭子昇輒拔去之益州都護馮遷抽刀而前玄曰是何人邪敢殺天子遷曰殺天子賊耳遂斬之昇曰我是豫章王諸君勿見殺至江陵斬之晉書柏玄傳竇建德戰數不利中槊楊武威追之建德墜馬曰勿殺我我夏王也武威擒之通監唐高祖紀傳記奉漏甕沃燋釜戰國策窮猿奔林豈暇擇木世說上奔逃之士不避斧鉞王逸正部陳思王曰寒者不貪尺玉而思短褐飢者不願千金而美一食物時有所急也後魏賈思勰齊民要術互見舉重明輕伍員之託漁舟季布之入廣柳顏氏家訓集魚以泉涸而煦沬鳥因將死而鳴哀劉孝標論療飢不期於鼎食拯溺無待於規行選策文爨鑊之魚期於消爛選檄喪精亡魄失歸亡趣東京賦互見恐懼胡危命在破竹中杜工部詩衣食闕少家雖嚴父慈母不能制其子白傳集獸窮摶人鹿急走隘杜牧之魚窮爨鼎蟻懼搜穴司空表聖文本朝不有猛虎彼怯者肯越淵谷乎老蘇集人情不問賢愚莫不畏天而嚴父然而疾痛則呼父窮窘則號天蓋情發於中言無所擇豈以號呼之故謂無嚴畏之心東坡
