body:
  text: 失言經白圭之玷尚可磨也斯言之玷不可為也詩不可與言而與之言失言語衛靈公言未及之而言謂之躁未見顏色而言謂之瞽語季氏子未同而言觀其色赧赧然孟子士未可以言而言是以言餂之也可以言而不言是以不言餂之也孟子餂音忝課取之也一言而非駟馬不能追鄧析子交淺而言深亂也淮南子史墜言於吳西漢鄒陽傳蘇林曰墜失也關內大雨四十餘日京師民相驚言大水至百姓犇走大將軍鳳以為太后與上及後宮可御舡令吏民上長安城以避水王商獨曰何因當有大水暴至此必訛言也有頃長安中稍定問之果訛言鳳大慚自恨失言通監漢成紀王渾妻鍾氏嘗與渾共坐子濟趍庭而至渾欣然曰生子如此足慰人心琰笑曰鍾氏名琰若新婦得配參軍渾弟生子固不當如此耳晉書列女傳傳記出言不審駟馬不能追也世說子魯侯欲以孔子為司徒將召三桓而議之左丘明曰周人有愛表而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉符子史內史叔興曰君失問是陰陽之事非吉凶所生左僖十六年董仲舒曰昔魯君問柳下惠吾欲伐齊曰不可歸曰伐國不問仁人此言何為至於我哉前漢集晉文公既受原於王難其守問寺人勃鞮以畀趙襄余謂守原政之大也不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宮不博謀於卿相而獨謀於寺人雖或襄之賢足以守國之政不為敗而賊賢失政之端由是滋矣嗚呼得賢臣以守大邑則非失舉也然猶羞當時陷後代況問舉又兩失者柳文經出言有章詩都人士史議論通古今喟然動眾心西漢鮑宣傳為人長羹言西漢郊祀志馬援善述前事皇子諸王聞者皆屬耳志倦後漢子真持論感起昏俗東漢崔寔傳衛玠好言玄理遇有勝日親友時請一言無不咨嗟以為入微晉書岑文本謂所親曰馬君論事會文切理無一言可損益聽之纚纚令人志倦蘇張終賈正應此耳唐書李德裕謀議援古為質袞袞可喜本傳集置言成範選昭王碑立言必雅選集序議論有餘地杜詩持論峰巒峻劉賓客子公孫龍困百家之智窮眾口之辯莊子史有君子甚口左昭二十六年談辯如濤波班固敘傳侯公天下辯士所居傾國史記項羽紀毛遂至楚定從而還平原君歎曰毛先生以三寸之舌強百萬之師史記淳于髡多辯數使諸侯未嘗屈辱史滑稽傳齊田單攻聊城不下魯連乃為書約之矢以射城中遺燕將書曰吾聞之知者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣說士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同燕將見魯連書泣三日乃自殺聊城大亂田單遂屠聊城史記魯仲連飾辯辭設詐謀馳逐於天下以要時勢者謂之游說荀悅漢紀齊王使淳于髡獻鵠於楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺股絞頸而死恐人之議吾王以鳥獸之故令士自傷殺也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過楚王曰善齊王有信士史滑稽傳六國既定從張儀能明其說復解散諸侯史太史公自序陸賈天下名為有口辯士使南越尉佗曰越中無足與語生來令我日聞所不聞賜千金稱臣奉漢約史本傳隋何曰陛下使何使淮南至如陛下之意是何之功賢於步卒五萬騎五千也史記漢王復使侯公往說項王項王乃與漢約中分天下割鴻溝以西者為漢鴻溝以東者為楚項王許之即歸漢王父母妻子漢王乃封侯公為平國君曰此天下辯士所居傾國故號為平國君史記項羽紀言若懸河通監隋煬帝陳餘遺章邯書曰白起為秦將南征鄢郢北伐馬服攻城略地下不可勝計而竟賜死蒙恬為秦將北逐戎人開榆中地數千里竟斬陽周有功亦誅無功亦誅通監秦紀游說隋何至九江王見之隋何曰漢王使臣敬進書大王御者竊怪大王與楚何親也楚不如漢其勢易見也今大王不與萬全之漢而自托於危亡之楚臣請與大王提劍歸漢漢王必裂地而封大王又況九江必大王有也九江王曰請奉命通監漢高紀游說辯士蒯徹說信曰且酈生一士伏軾掉三寸之舌下齊七十餘城將軍以數萬眾歲餘乃下趙五十餘城為將數歲反不如一豎儒之功乎同上蒯徹知天下權在信乃說信曰蓋聞天與弗取反受其咎時至不行反受其殃韓信曰漢主遇我甚厚吾豈可以鄉利而倍義乎蒯生曰始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事常山王殺成安君泜水之南首足異處此二人相與天下至驩也然而卒相禽者何也患生於多欲而人心之難測也並同上立秦南海尉趙佗為南粵王使陸賈即授璽綬與剖符通使通監漢惠紀游說隋何至九江見英布曰臣請與大王提劍而歸九江王曰奉命楚方責布發兵何直入曰九江王已歸漢楚何以得發兵殺楚使西漢本傳飛談卷霧晉書韓伯傳贊裴遐善言玄理音辭清暢冷然若琴瑟嘗與河南郭象談論一座嗟服晉書單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅荅對之皆有餘至日暮魏志互見兩不相下裴頠辭論豐博時人謂頠為言談之林藪晉書本傳裴楷善宣吐左右屬目聽者忘倦同上謝靈運辭義鋒起王惠嘗與之談荀伯子曰靈運固自蕭散直上王郎有如萬頃陂焉宋書鄭元璹口伐可汗唐書本傳互入坐以制勝傳記抵掌而談戰國策裴僕射善談名理混有雅致張茂先論史漢靡靡可聽世說郭子元言議如懸河寫水注之不竭世說中裴公之談終日不絕同上戰國駟說雲踴人持弄瓦之辯家挾飛鉗之術劇談者以譎誑為宗利口者以寓言為主若史記載蘇秦合從張儀連衡范睢反間而相秦魯連解紛而全趙知幾史通田駢好談論時號曰天口十略集劇談戲論扼腕抵掌左太沖蜀都賦四海齊鋒一口所敵同上魏賦剖析毫釐擘肌分理選西京賦飛辯騁辭選薦表離堅合異之談選序片言而求三輔一說而定五州選策文辯析天口選令辯言之艷能使窮澤生流枯木發榮選行狀飛辯騁辭溢氣坌涌解疑釋結臨敵有餘孔文舉薦禰衡表高談雄辯驚四筵杜詩談論淮湖奔同上高談滿四座李太白集詞鋒犀利劉賓客談笑多味同上詞鋒不可摧並同上辯如懸河文粹五岳為詞鋒其辯若注其論若鋒辭源辯博馳騖古今之際高步天地之間並同上談柄發洪鐘溫飛卿一介之辯重於九鼎之寶三寸之舌強於百萬之師蔣子萬機論與之語道理辯古今事當否論人高下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也韓文送石處士序踔厲風發率常屈其座人韓退之作柳宗元墓誌本朝賓主談鋒敵兩都笑談謦欬生風雷談辯如雲玉塵飛高談破巨浪並坡詩子晉范獻子殺晉大夫欒枝後出遊恐欒枝之子報也行至津所問舟人曰君見欒枝之子乎舟人曰君脩晉之政事欒枝子其若君何若出入無度我舟中之人與欒枝之子無異獻子遂以田萬頃賜舟人以貴其言尹子又見尹子史齊伐魯公使展喜犒師齊侯曰魯人恐乎展喜曰小人恐矣君子則否齊侯曰何恃而不恐對曰恃先王之命左僖二十六年楚伍參曰事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎左傳楚子問鼎之大小輕重周王孫滿對曰在德不在鼎昔夏之方有德也遠方圖物貢金九枚鑄鼎象物桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也左宣三年宋子明謂桐門右師曰吾猶衰絰而子擊鐘何也右師曰巳衰絰而生子余何故舍鐘左定九年口對響應無窮者史張釋之傳王孫圍聘於晉趙簡子問曰楚之白珩為寶幾何曰楚之所寶者曰觀射父能作訓辭左史倚相能道訓典此楚國之寶也若夫白珩先王之玩也何寶之為國語梁王謂齊王曰寡人有徑寸之珠照車前後各十二乘者十王亦有寶乎齊威王曰寡人所以為寶者與王異吾有四臣將以照千里豈特十二乘哉梁王慚齊世家晏子使楚晏子短楚王曰齊無人耶晏子曰齊命使各有所主其賢者使賢主其不肖者使不肖主嬰最不肖固宜使楚耳說苑奉使篇有專對材西漢王吉傳翔應聲輒對變詐鋒出莫能窮者西漢本傳明帝問張重曰何郡小吏荅曰日南吏帝曰日南郡人應向北看日荅曰臣聞鴈門郡不見累鴈為門金城郡不見積金為郡臣雖居日南未嘗向北看日東漢靈帝問侍中楊奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯東漢王式曰臣以三百五篇諫是以無諫書通監漢宣紀上官桀始以才力得幸為未央廄令上嘗體不安及愈見馬多瘦上大怒曰令以我不復見馬耶欲下吏桀頓首曰臣聞聖體不安日夜憂欋意誠不在馬通監漢武紀祠孔子於闕里及七十二弟子帝謂孔僖曰今日之會寧於卿宗有光榮乎對曰親屈萬乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝曰非聖者子孫焉有斯言通監漢和帝紀吳王遣趙咨入謝帝問曰吳如大夫者幾人對曰聰明特達者八九十人如臣之比車載斗量不可勝數通監三國魏文紀鄧艾見宗預曰禮六十不服戎而卿受兵何也預曰卿七十不還兵我六十何為不受耶蜀志互見恕己責人阮孚謂卞壺曰卿常無閑泰如含瓦石不亦勞乎壺曰諸君子以道德恢弘風流相尚執鄙吝者非壺而誰通監晉成紀馮延巳嘗戲孫晟曰公有何能為中書郎晟曰晟山東鄙儒文章不如公談諧不如公諂詐不如公然主上使公與齊王游戲蓋欲以仁義輔導之也豈但為聲色狗馬之友耶晟誠無能如公之能適足為國家之禍耳通監五代晉高紀上嘗與杜坦論金日磾曰恨今無復此輩人曰日磾假生今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也坦曰以臣言之臣本中華高族晉氏喪亂播遷涼土世業相承不殞其舊直以南渡不早便以荒傖賜隔日磾胡人身為牧圉乃超登內侍齒列名賢聖朝雖復拔才臣恐未必能也上嘿然通監宋太祖魏帝甚重齊臣謂群臣曰江南多好臣李元凱曰江南多好臣歲一易主江北無好臣百年一易主通監齊太祖梁主下詔將還建康胡僧祐宗慄劉穀諫曰建業王氣巳盡荊州當出天子周弘正王褒曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時群臣多荊州人皆曰弘正等東人也志願東下恐非良計弘正面折之曰東人勸東謂非良計君等西人欲西豈成良策通監梁世祖山人李唐見上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之愛公主也通監唐代宗唐僖宗嘗謂優人石野豬曰朕若應擊毬進士舉須為狀元對曰若遇堯舜作禮部侍郎恐不免駁放通監唐紀黃明元年太后召徐有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大德太后默然通監唐武后李希烈謀稱帝遣人問儀於顏真卿對曰老夫嘗為禮官所記惟諸侯朝天子禮耳通監唐德宗紀命蕭復充山南等道宣慰安撫劉從一及朝士往往奏留復上謂陸贄曰朕謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨累日意復悔行使之論奏耶贄奏云蕭復若相屬求則從一等何容為隱從一等稍自回互則蕭復不當受疑陛下何憚而不辯明乃直為悵恨也同上先主以伊籍使吳孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君乎對曰一拜一起未足為勞蜀志鍾會造嵇康康不為之禮良久會去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去晉書嵇康傳時梅陶鍾雅數說事祖納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌晉書祖納傳互入兩不相下袁宏有逸才謝安常賞其機對辯速後宏出為東陽郡安欲以卒迫試之臨別執其手顧左右取一扇授之宏輒曰當奉揚仁風慰彼黎庶晉書顧悅之與簡文帝同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲柳之質望秋先零晉書本傳孫綽作天台賦示范榮期曰卿試擲地當作金石聲榮期曰恐此金石非中宮商同上何承天除著作郎年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母承天曰卿當云鳳凰將九子妳母何言耶宋書文帝嘗與群臣臨天泉池帝垂綸良久不獲王景文越席曰臣以為垂綸者清故不獲貪餌宋書何偃謂劉瑀曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不著鞭使到千里荅曰一蹙造青雲何至與駑馬爭路宋書周盤龍為散騎常侍齊武帝戲之曰卿著貂蟬何如兜鍪對曰此貂蟬從兜鍪中生耳齊書本傳後梁蕭巋降周武帝自彈琵琶令巋舞周武曰梁王乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸後梁書東魏以楊愔典選令吏唱名誤以盧士深為士琛深自言其名愔曰盧郎朗潤所以加玉三國典略互見將錯就非論難鋒生隨方占對北史徐廣傳顏師古任隋為尉楊素見其年弱謂曰劇縣子何以治之師古曰割雞未用牛刀隋書占對華敏唐書李善傳宇文融神用警敏應對如響雖天子不能屈唐書本傳許敬宗孫伯彥昂之子也敬宗晚年不復下筆凡大典冊悉伯彥為之常戲昂曰吾兒不及若兒荅曰渠父不如昂父新唐書姦臣本傳盧坦為河南尉杜黃裳為尹召坦立堂下曰某家子與惡人游破產盍使察之坦曰凡居官廉雖大臣無厚蓄其能多積蓄者必剝下以致之如其子孫善守是天富不道之家也不若恣其不道以歸於人坦以為宜故不察黃裳驚視新唐書盧坦傳其後李翱作坦傳云吏河南知捕盜杜黃裳為河南尹謂坦曰某家子與惡人游破舊產公為捕盜盍察之也坦仰曰凡居官終始廉白祗入俸錢者雖歷大官亦無厚蓄以傳其能多積財者必剝下以致如其子孫善守之下同見李翱文集高宗出獵遇雨因問諫太夫谷那律曰油衣若為不漏對曰以瓦為之必不漏矣新唐書本傳陸機詣武子武子前置數斗羊酪指示陸曰江東何以敵此陸曰有千里蓴羹但未下鹽豉耳時人以為名對世說孫綽齋前種一株松高世遠時亦鄰居語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓柳雖合抱亦何所施世說上客有問陳季方曰足下家君有何功德而荷天下重名季方曰吾家君譬如桂樹生於泰山之阿上有萬仞之高下有不測之淵上為甘露所沾下為淵泉所潤當此之時焉知泰山之高淵泉之深不知有功德與無也山說互入父門衛玠見阮瞻嘲之曰一言可辟何假三阮曰苟是天下名望可無言而辟何假於一言衛玠別傳集應對如轉圓杜詩本朝王荊公初參政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳趙清獻獨折之曰君言失矣皋契之時有何書可讀荊公默然邵氏晉謝朓知吏部選事有姓譚者乞官眺曰齊桓滅譚那得有君對曰譚子奔莒所以有僕丁用晦芝田錄
