body:
  text: 審於取捨經擇其善者而從之其不善者而改之語述而互入決擇暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也同上可者與之其不可者拒之語子張子非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰孟子今有同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而往救之則惑矣雖閉戶可也同上互入事同體異魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也孟告子上言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也同上求則得之舍則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也孟盡心上可以取可以無取取傷廉可以與可以無與與傷惠孟離婁下與其屈己以富貴不若抗志以貧賤屈己則制於人抗志則不愧於道孔叢子互入有守三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎莊子讓王莊子釣於濮水楚王使二大夫往先焉曰願以境內累耳莊子曰吾聞楚有神龜死已三千年矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中莊秋水人之情於害之中爭取小焉於利之中爭取大焉淮南子繆稱訓史為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百歲而弗失秦王治天下十餘歲則大敗此亡他故矣湯武之定取舍審而秦王之定取舍不審矣通監漢文紀趙充國曰窮寇不可迫也緩之則走不顧急之則還致死通監漢宣紀於心有猜則簋飧饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之東漢張衡傳義重於生舍生可也生重於義全生可也東漢李固傳論夫雞肋食之則無所得棄之則如可惜後漢揚脩傳思樹芳蘭剪除荊棘三國名臣贊寧飲建業水不食武昌魚寧還建業死不止武昌居通監晉武帝仁道不遠則殺身以徇義重於生則捐軀以踐北史傳記良商不與人爭買賣之賈而謹司時時賤而買雖貴己賤時貴而買雖賤己貴戰國策集寧作清水之汙泥不為濁路之飛塵曹植人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如或墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則麾之在夷狄則進之吾取以為法焉韓文比於東都略見顏色未得接言語心固已相奇但不敢果以貌定知人堯舜所難又嘗服宰予之誡故未敢決然挹亦不敢忽然忘也善雖不吾與吾將強而附不善雖不吾惡吾將強而拒與其譽於前孰若無毀於其後與其樂於身孰若無憂於其心並韓文互入曠達寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎柳文養隼者誠欲其鷙於烏鳶乎鷙於鷥鳳乎唐文粹本朝范文正公言幕府辟客須可為師者乃辟之雖朋友亦不可辟遺事與其貴而拘孰若肆而賤臨川未應遺合抱取用及把拱東坡詩經不作無益害有益功乃成不貴異物賤用物民乃足書旅獒父母存不許友以死記曲禮上互入子道為宮室不斬於丘木記曲禮下陳乾昔疾屬其子尊己曰如我死必大為我棺使吾二婢子夾我乾昔死其子曰殉葬非禮也弗果殺記檀弓下毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士記緇衣儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富記儒行已聘而還圭璋此輕財而重禮之義也記聘義大夫祭器未成不造燕器記王制廄焚子退朝曰傷人乎不問馬語鄉黨君子謀道不謀食君子憂道不憂貧語衛靈公子孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也孟萬章下鄉人長於伯兄酌則誰先曰先酌鄉人孟告子上無以小害大無以賤害貴禮與食孰重曰禮重色與禮孰重曰禮重並同上宓子賤為單父宰齊人攻魯道由單父父老請曰麥已熟矣今齊寇至請放民皆使出穫傅郭之麥可以益糧且不資寇三請而宓子不聽曰今茲無麥明年可樹若使不耕者得穫是民樂有寇也且單父一歲之麥於魯不加強喪之不加弱使民有自取之心其瘡必數世家語互入深識大體人之情雖桀跖豈肯為其所惡賊其所好哉荀議兵拔戟加乎首則十指不辭斷非不以此為務也緩急之有相先者也荀強國聖人不貴尺之璧而重寸之陰淮南林回棄千金之璧負赤子而趍莊子兕虎在於後隋侯之珠在於前弗及掇者先避患而後就利淮南子說稱訓割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也飢而大餐非不贍也然而弗為者害於性也淮南子詮言訓荊卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈戟於豺狼之群抱朴子史晉魏武子有嬖妾無子命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也左宣十五年孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言史記陳世家沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先收秦相府圖籍藏之此沛公得具知天下阨塞戶口多少強弱之處通監漢高紀明君貴五穀而賤金玉前漢食貨志遺子黃金滿籯不如一經漢書藺相如不畏秦王而屈於廉頗者為國也東漢寇恂傳就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以保蕭墻之內也蓋民可百年無貨不可一朝有飢東漢劉陶傳張綱分行州郡埋其車輪於雒陽都亭曰豺狼當路安問狐狸東漢本傳互入疾惡蔡邕曰夫邊陲之患手足之疥搔中國之困胸背之瘭疽通監東漢帝使人以馬易珠璣翡翠玳瑁於吳吳主曰此皆孤所不用而可以得馬孤何愛焉皆以與之通監魏明紀石勒曰吾不喜得幽州喜得二子王憲孫綽也通監晉愍紀下燕主子寶言於垂曰願不以意氣微恩忘社稷之重通監晉武紀李謐曰丈夫擁書萬卷何假南面百城北史上謂薛仁貴朕諸將皆老思得新進驍勇者將之無如卿者朕不喜得遼東喜得卿也通監唐書本傳狄仁傑曰黃卷中方與聖賢對何暇偶俗吏語耶同上唐明皇欲取石堡城王忠嗣不可李光弼勸之忠嗣曰石堡城非殺數萬人不可取忠嗣今不奉詔不過得罪天子以一將軍歸宿衛不者黔中上佐耳又云吾忍以數萬人命易一官哉唐書記曰寧畜盜臣盜臣誠可惡然一人之害耳聚歛之臣用則經常之法壞而下不勝其弊焉唐書食貨志李絳曰錢用盡更來機事一失不可復追通監唐紀互入投機傳記衛嗣君時胥靡有罪賢臣逃之魏衛贖之百金不與乃請以左氏衛邑群臣曰以百金之地贖一胥靡無乃不可乎君曰治無小亂無大教化喻於民三百之城足以為治民無廉恥雖有十左氏將何以用之戰國策聶政曰老母在政身未敢以許人也同上互入子道墨子語禽滑釐曰凶年與子隋珠又與子一鍾粟子將何擇釐曰粟可耳劉向說苑互入實惠文公用咎犯之言而敗楚於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而後用其身乎文曰雍季之言百代之利也咎犯之言一時之務也焉有以一時之務先百代之利乎呂氏春秋集係蹄在足則猛虎絕其蹯蝮蛇在手則壯士斷其節何則以其所全者重所棄者輕陳琳檄齊桓公不以射鉤而致慊故能成九合之功秦穆不以一眚而掩德故能復九敗之辱陸宣公文重名不重官李太白人各有一死死或重於太山或輕於鴻毛若死重於義則視之如太山也若義重於死則眡之如鴻毛也故非其義君子不輕其生得其所君子不愛其死白傳集歐陽詹閩越人也父母老矣捨朝夕之養以來京師其心將必有得而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟韓文肥於貌孰與肥於道求於人孰與求於身孫可之文本朝富公使虜功甚偉而每不自以為功至知青州活飢民四十餘萬則每自言之曰過於作中書令二十四考矣聞見錄虎方捕鹿羆據其穴摶其子虎安得不置鹿而返老泉集近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之不以一日之快而易終身之憂東坡集千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也東坡留侯論歐公曰文章止於潤身政事可以及物張芸叟集子今恩足以及禽獸而功不至於百姓者獨何歟孟梁惠王上子何尊梓匠輪輿而輕為仁義者哉孟滕文公下人有雞犬放則知求之有放心而不知求孟告子上拱把之桐梓人苟欲生之皆知所以養之者至於身而不知所以養之者豈愛身不若桐梓哉今有場師舍其梧檟養其樲棘則為賤場師焉養其一指而失其肩背而不知也則為狼疾人也並同上不能三年之喪而緦小功之察放飯流歠而問無齒決孟盡心上以隋侯之珠彈千仞之雀世必笑之所用者重而所要者輕也莊讓王殺戎馬而求狐狸援兩鱉而失靈龜斷右臂而爭一毛折鏌釾而爭錐刀用智如此豈足高乎淮南子說山訓外疾之害輕於秋豪人知避之內疾之害重於太山而莫之避劉子史得一夫而失一國與惡而棄好非謀也左莊十二年以千乘之相易淫樂之矇左襄十五年初楚子玉自為瓊弁玉纓未之服也先戰夢河神謂己曰畀余余賜女孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也左僖二十八年簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛忘修身之道而求眾人之譽割衣食之業以供享宴之好通監漢武紀塞川原為潢潦前漢食貨志趙壹曰文籍雖滿腹不如一囊錢東漢本傳帝使人以馬易珠璣翡翠玳瑁於吳吳主曰此皆孤所不用而可以得馬孤何愛焉皆以與之通監魏明紀互入知所輕重傳縡曰不處郊廟大神專媚淫昏之鬼通監陳後主鄧景山有裨將抵罪當死諸將請之不許其弟請代兄死亦不許請入馬以贖罪乃許之諸將怒曰我輩曾不及一馬乎通監唐代宗本朝持千金之璧以求一瓦釜幾何其不舉而棄諸溝也老泉經君子三揖而進一辭而退記表記同而進不同而退記儒行色斯舉矣翔而後集語鄉黨直道而事人焉往而不三黜枉道而事人何必去父母之邦語微子子庶人召之役則往役君欲見之召之而不往見孟萬章下所就三所去三孟告子下史小國之事大國也德則其人也不德則其鹿也左文十七年鳥則擇木木豈能擇鳥左哀十一年費無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也必死不辟勇也父不可棄名不可廢爾其勉之相從為愈左昭二十年集吾寧悃悃款款朴以忠乎將送往迎來追俗人也斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗富貴以媮生乎寧超然高舉以保真乎將咒訾慓斯承顏色也喔咿嚅唲以事婦人乎寧廉潔正直以自清乎將突梯滑稽隨俗如脂如韋乎柔弱寧昂昂若千里之駒乎將汜汜若水中之鳧乎與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之跡乎寧與黃鵠比翼乎將與雞鶩爭食乎楚辭繞樹三匝何枝可依魏武短歌行明月難暗投郭景純遊仙詩須知世路難輕進豈是君門不大開杜牧之
