body:
  text: 強辯經禦人以口給屢憎於人語公冶長子困百家之知窮眾口之辯莊子秋水強足以拒敵辯足以飾非莊盜跖趙公孫龍為堅白異同之辯荀子後序史辭勝於理終必受屈通監周紀言足以飾非史記殷紀反言易辭而成文章劉向說苑杜周為廷尉史客曰君為天下平不循三尺法專以人主意指為獄曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎西漢本傳持詭辯以中人西漢趙王彭祖傳孫楚欲隱居謂王濟曰欲枕石漱流誤云漱石枕流濟曰流非可枕石非可漱楚曰所以沈流欲洗其耳所以漱石欲厲其齒晉書本傳梁蕭琛預御宴醉伏武帝以棗投琛琛仍取栗擲止正中面帝曰豈有說耶即荅曰陛下投臣以赤心臣敢不報以戰栗南史互入陵紀傳記殷浩語孫安國曰卿莫作強口馬世說經尚口乃窮也易困卦截截善諞言書秦口費而煩易出難悔記緇衣口多空言且類數也子搖唇鼓舌莊子士憎茲多口孟子盡心下史釋本而事口舌史蘇秦傳息夫躬既親近數進見言事論議無所避眾畏其口見之側目上疏歷詆公卿大臣曰丞相王嘉健而蓄縮而不可用御史大夫賈延墮弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遫不足數西漢本傳嗇夫喋喋利口捷給前漢張釋之傳以舌得官西漢婁敬傳灌夫罵坐西漢本傳陳湯利口不軌西漢翟方進傳好訾毀西漢地理志一尊之身三期之間乍賢乍佞豈不甚哉通監漢成紀尊王尊也樊胄頗能弄唇吻而實無才略通監漢獻紀漢桓帝末年甘陵有南北黨人之議中外承風競以臧否相尚自公卿以下莫不畏其貶議通監東漢好議論人長短妄是非正法東漢馬援傳品覈公卿裁量執政東漢黨錮傳集街談巷議彈射臧否剖析毫釐擘肌分理所好生毛羽所惡成創痏東京賦一心百舌何紛紜文粹舌端萬變乘春輝同上利觜迎人看不得劉賓客弄口鳴舌百葉書抄經無以利口亂厥官書周官盜言孔甘亂是用餤詩巧言如簧顏之厚矣詩巧言亂德語衛靈公子惡利口恐其亂信也孟子盡心下史巧言醜詆西漢劉向傳李林甫忌文學士啗以甘言而陰陷之通監唐元宗紀經惡居下流而訕上者論語史入則心非出則巷議史記秦始皇敢為妖言以亂黔首同上不入言而腹非西漢食貨志流言飛文譁於民間前漢反唇腹誹南史楊震曰損辱清朝塵點日月通監東漢本朝日月遭虧蔽歐公詩經流言于國書金縢叔孫武叔毀仲尼語子張子昔直不疑未嘗有兄而讒者謂其盜㛐第五伯魚三娶孤女而世人稱其笞婦翁此聽虛而責響悖情倒理誣罔之甚也劉子互入讒譖史鄭子產作丘賦國人謗之曰其父死於路巳為蠆尾左昭有蜚語為惡言聞上史灌夫傳灌夫謂灌賢曰平生毀程不識不直一錢西漢灌夫傳論議不右方進西漢翟方進傳師古曰毀短也孔子大聖不免武叔之毀子路至賢猶有伯寮之愬東漢列女傳橫被口語西漢楊惲傳羊祜不附結王衍王戎二人多毀祜時人為之語曰二王當國羊公無德通監晉武紀樂毅王佐而被謗晉書邢邵善屬文洛中貴人拜職多憑邵作謝表章有一貴勝初授官袁翻與邵俱在坐翻意主人託其為讓表命邵作之翻不悅每告人云邢家小兒當客作表自買黃紙寫送之後魏書先是策賢良李宗閔牛僧孺皇甫湜條對甚直考第其策同居第三權幸惡其詆己而不中第者乃注解其策同為唱誹唐書傳記魏文侯令樂羊將攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語互見示人以意集玉變為石珠變為礫毀謗使然也論衡積毀銷骨江文通書吠堯謗舜燕公集大聖不過周孔然猶管蔡謗於前叔向毀於後皮日休子正其衣冠齊其顏色嗛然而終日不言者子夏之賤儒也荀子非十二子人有少言者猶不脂之婦也淮南子說山訓史括囊不言西漢公孫賀傳言君臣邪固當諫諍語朋友邪應有切磋豈有知其無成而但萎腇咋舌義手從族乎東漢馬援傳隱情惜巳自同寒蟬東漢杜密傳上數有宣索仍敕諸道勿令宰相知泌聞之惆悵而不敢言通監唐德宗馬胤孫為中書侍郎時人目為三不開口印門也通監五代高祖紀互入尸素窮治楚王英獄御史寒朗曰歸舍口雖不言仰屋竊嘆通監後漢集鉗口卷舌江文通書正言不發萬國如封元次山諤諤非周舍容容類胡廣徐陵與楊遵彥書惜身不言仰屋竊嘆李深之文經謔浪笑傲詩終風善戲謔兮不為虐兮詩淇奧子艾子見老嫗衣衰哭甚艾子曰嫗夫誰也曰彭祖艾子曰彭子壽八百而死固不為短可以無恨嫗曰然又有壽九百而不死者豈不恨耶艾子艾子海上見一物圜而褊且多足曰蝤蛑也又一物差小曰螃蟹也又有一物其狀亦類前所見而形劇小曰彭越也艾子曰所謂一蟹不如一蟹也同上依隱玩世詭時不逢其滑稽之雄乎楊子史談言微中亦可解紛太史公滑稽傳序楚優孟嘗以談笑諷諒楚莊王有愛馬死使群臣喪之欲以棺槨大夫禮葬之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為槨楩楓豫章為題楱發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後廟食太牢奉以萬戶之邑史記滑稽傳秦二世欲漆城優旃秦倡朱儒曰善漆蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室二世笑之同上秦樗里子滑稽多智秦人號曰智囊史記東方朔滑稽之雄西漢本贊朔紿朱儒曰上以若曹無益於縣官耕田力作固不及人臨眾處官不能治民從軍擊虜不任兵事無益於國用徒索衣食今欲盡殺若曹朱儒大恐西漢東方朔傳滑稽則東方朔枚皋西漢公孫洪等贊東方朔曰朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死上大笑西漢本傳初曹操攻屠鄴城袁氏父子多見侵掠而操子丕私納袁熙妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏柏又嘲之曰大將軍遠征蕭條海外昔肅慎不貢楛矢丁零盜蘇武牛羊可并案也東漢孔融傳初習鑿齒嘗與孫綽共行綽性通率好譏調時綽在前顧鑿齒曰沙之汰之瓦石在後鑿齒曰簸之颺之糠粃在前晉書互入兩不相下謝太傅始有東山之志桓公見藥中有遠志公問謝此藥又名小草何以一物異稱謝未即荅郝參軍荅曰處則為遠志出則為小草謝公殊有愧色世說鄧艾口吃語稱艾艾晉文王戲云艾艾為是幾艾鄧荅曰鳳兮鳳兮故是一鳳桓南郡與殷荊州作危語桓曰矛頭淅米劍頭炊殷曰百歲老翁攀枯枝顧愷曰井上轆轤安嬰兒殷有一參軍在坐曰盲人騎瞎馬夜半臨深池殷曰咄咄逼人仲堪眇目故也並同上沈昭略性狂見王景文子約曰汝是王約也何乃肥而癡約曰汝沈昭略也何乃瘦而狂昭略大笑曰瘦巳勝肥狂又勝癡宋書何承天除著作郎時年巳老而諸佐郎並名家年少荀伯子嘲之常呼為妳母宋書節度李忠臣因奏對德宗謂曰卿耳甚大貴人也忠臣曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上悅之唐書李濤喜詼諧不脩邊幅通監周世宗馮道滑稽多智通監周太祖紀傳記徐晦嗜酒沈傳師善飡楊嗣復云徐家肺沈家脾真安穩耶語林李白戲杜甫詩曰飯顆山頭逢杜甫頭戴笠子日卓午借問別來太瘦生摠為從前作詩苦樂府解題本朝祖廣行常縮頭詣桓南郡始下車桓曰天甚晴明祖參軍如從屋漏下來續世說談詞最詼諧發辨如有神臨川郭祥正出詩一軸示東坡先自吟誦聲振左右謂坡曰祥正此詩幾分來坡曰十分祥正驚問之坡曰七分是讀三分是詩王直方詩話張子野以樂章擅名一時宋子京往見之先令人戲曰尚書欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意鬧尚書耶陳正敏撰遯齋閑覽國子博士郭忠恕嘗嘲司業聶崇義云近貴全為聵攀龍只是聾雖然三箇耳其柰不成聰崇義荅曰莫笑有三耳全勝蓄二心同上陳亞性滑稽知潤州幕中有上官弼亞所親信任滿將去亞曰何以見教弼曰郎中才行無玷但調謔過差亞笑曰君乃上官弼也如下官口何弼笑而去並同上進士李居仁盡摘白髮其友驚曰昔日皤然一翁今則公然一婆遯齋閑覽善滑稽巧發微中旁人抵掌絕倒而幼安淡然不變色也東坡集石昌言字幼安蔡君謨戲陳亞曰陳亞有心終是惡陳曰蔡襄無口便成衰張師正倦游錄黃魯直戲東坡曰昔右軍字為換鵝字韓宗儒性饕每得君一帖於殿帥姚麟換羊肉數斤可名二丈書為換羊書矣公在翰苑以生辰製撰紛冗宗儒作簡以圖報書來人督索甚急公笑曰傳語本官今日斷屠李宗諤名談錄經君子與其有諾責也寧有已怨記子路無宿諾語史已諾必誠史游俠傳序趙國立名義不侵為然諾者也史陳餘傳戰貫高事已然諾西漢灌夫傳師古謂一許人必信之也自立然諾西漢張耳傳得黃金百斤不如得季布一諾前漢季布傳布衣相與尚有沒身不負然諾之信通監漢光武孫策曰太史子義其心秉道義重然諾一以意許知己死亡不相負通監漢獻紀范式與張元伯為友二人春別京師以暮秋為期元伯以九月十五日殺雞以待母曰相去千里汝何信之也言未卒而至後漢書互見期約集共秉延州信無慚仲尼諾選詩互見有信然諾之信重於布衣選誄互見有信三盃吐然諾五嶽倒為輕文誄經孔子曰今吾於人也聽其言而觀其行論語史二荀論人久而益信魏志本傳本朝狄青討儂智高有因貴近求從青行者青曰從青之士能擊賊有功青不敢不為之奏若往而不能擊賊軍中法重青不敢私也君其思之聞者大駭無復敢言求從青行者其所辟皆青素所與以為可用者人望歸矣南豊雜識用捨行藏仲尼獨許於顏子存亡進退羲易不及於賢人坡文子輕諾者必寡信老子史凡云食言者終為不信棄其前言如食而盡西漢匈奴傳注集抗爽言以矯情班固幽通賦
