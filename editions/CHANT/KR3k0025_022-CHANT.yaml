body:
  text: 相資成美經若作酒醴爾惟麴蘖若作和羹爾惟鹽梅書說命下惟周公克謹厥始惟君陳克和厥中惟公克成厥終畢命為命裨諶草創之世叔討論之行人子羽修飾之東里子產潤色之語互見眾力難成史晏子曰和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心左傳昭二十智者慮勇者行仁者守穀梁傳金木水火剛柔相濟然後克得其和能為之用東漢袁譚傳聚精會神相得益彰雖伯牙操遞鍾逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而弘功業俊士亦俟明主以顯其德通監漢宣紀樂廣善清言而不長於筆將遜尹請潘岳為表時人咸云若廣不假岳之筆岳不取廣之旨無以成斯美晉書唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸于治唐書宋璟傳互見殊塗同歸李華為元德秀碑顏真卿書李陽冰篆額後人爭摹寫之號為三絕碑唐書互見晞慕王義方曰天子置公卿大夫士欲其水火相濟鹽梅相成不得獨是獨非也唐書本傳傳記珍裘以眾腋為溫廣廈以群材合構史通互入眾力難成天下無粹白之狐而有粹白之裘取之於眾白也呂氏春秋集士夫之能享大名顯當世者莫不有先進之士負天下之望者為之前焉士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也韓文上于頔布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事勢相須其先後相資也同上與鳳翔邢尚書先進之士得人而託之則道德彰而名聞流後進之士得人而統之則事業顯而爵位通同上送許郢州亭武丁賢君也傳說賢相也而武丁引金作礪以命其相說喻木從繩則正以戒其君陸宣公文善為國者宣惠以養威飬威以尊惠威而能飬則不挫惠而見尊則有恩同上絲桐本異質音響合自然韋應物集冰玉相輝椒蘭同馥張九齡文冰置白玉壺始見清皎潔珠穿殷紅縷始見明洞徹元稹集猶眾壑合注霈為大川群山出雲混成一氣呂和叔文集互見眾力難成本朝端溪石硯宣城管王屋松煙紫兔毫更得孤卿老書札人間無此五般高欒城集史今兩虎共鬭其勢不俱生通監互見勢不兩立朱彭冠賈為世壯士愛惡相攻能為國憂猶昆虫之相齧適足還害其身也後漢孔融傳角智者皆窮角力者皆負通監漢獻紀傳記韓盧天下之疾犬東都逡天下之狡兔盧逐逡環山者三兔極於前犬廢於後犬兔各死戰國策卞莊子方剌虎卞豎子曰兩虎方食牛牛甘必爭爭必鬭鬭則大者傷小者死從傷而剌之一舉必有獲兩虎之名有頃兩虎果鬭大者傷小者死春秋後語蘇代曰臣過小水見小蜯方出曝而鷸啄其肉蜯合而挾其喙鷸曰今日不雨明日不雨必有蜯脯蜯亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之春秋後語互見與人為地經君子之道或出或處或默或語易繫辭道並行而不相悖記中庸互入殊途同歸子曰道不同不相為謀語微子去之箕子為之奴比干諫而死語史伍員與申包胥友其亡也謂包胥曰我必復楚國包胥曰勉之子能復之我必能興之左定十四年子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶左襄十五年分量不同楚伍尚謂其弟員曰爾適吳我將歸死我能死爾能報左昭二十張竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣西漢陳遵傳互入各有所長蕭望之以射策為郎署小苑東門候王仲翁傳呼甚寵顧謂望之曰不肯錄錄反抱關為望之曰各從其志同上蕭望之傳王陽為益州剌史行部至卬郲九折坂歎曰奉先人遺體柰何數乘此險後以病去及尊為剌史至其坂問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣王尊傳並同上武盡善矣終全孤竹之潔後漢逸民傳袁顗說蔡興宗曰舅今宜出居陝西顗在襄沔若有事可以共立桓文之功興宗曰汝欲在外求全我欲居中免禍各行其志不亦善乎通監宋明紀沈慶之死子侍中文叔欲亡謂其弟中書郎文季曰我能死爾能報遂飲慶之之藥而死文季操刀馳馬而夫同上宋太祖馬樞曰貴爵祿者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言玩清虛則糠粃席上之說陳書本傳又趨向不同或與世同塵隨波瀾而俱逝或違時矯俗望江湖而獨往北史隱逸序又趨向不同集樂於用則豫章貴厚其生則社櫟賢劉賓客百獸與鳳凰同舞於簫韶之中各極其懽心耳又何暇自審其形容之不類哉元微之集太公戰牧野伯夷餓首陽同時號賢聖進退不相妨白樂天集君知天地中寬窄鵰鶚鸞鳳各自飛雙鳳捿梧魚在藻飛沈隨分各逍遙並同上本朝鵬鷃逍遙各自知臨川集經夔達於樂而不達於禮記仲尼燕居德行顏淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語先進孟公綽為趙魏老則優不可以為滕薛大夫語憲問又入分量不同臧武仲之智公綽之不欲卞莊子之勇冉求之藝並語子驊騮騏驥一日而馳千里捕鼠不如狸狌莊子相高下視磽肥序五種君子不如農人相美惡辨貴賤君子不如賈人設規矩陳繩墨便備用君子不如工人荀儒效日不知夜月不知晝日月為明而非能兼也淮南子奚仲不能為逢蒙造父不能為伯樂同上俶真訓史裨諶能謀於野則獲謀於邑則否左襄三十一孔子曰良農能稼而不能為穡良工能巧而不能為順史孔子世家宋義謂項羽曰被堅執銳義不如公坐運籌策公不如義通監秦二世紀范蠡曰四封之內百姓之事蠡不如種也四封之外敵國之制立斷之事種亦不如蠡也國語黃霸材長於治民及為丞相風采不及邴魏功名損於治郡西漢黃霸傳張竦謂陳遵曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣同上陳遵傳互見各行其志薛宣起佐史登宰相為世吏師及居大位以苛察失名器誠有極也西漢本傳陳平曰於今面折庭爭臣不如君全社稷定劉氏後君亦不如臣同上王陵傳曾子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之苟有可觀內必有闕通監漢順紀諸葛亮治戎為長奇謀為短理民之幹優於將略蜀志本傳呂義為政簡而不繁號為清能然居大官名聲損於郡縣同上臨郡則垂稱處朝則被損同上陳壽評孫策謂弟權曰舉江東之眾決機於兩陣之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿吳志本傳摯虞太叔廣俱為列卿每至公座廣談虞不能對虞筆廣不能荅樂廣善清言而不長於筆將遜尹請潘岳為表時人或云若廣不假岳之筆岳不取廣之旨無以成斯美晉書互入相資成美謝鯤曰端委廟堂使百僚准則鯤不如亮庾亮一丘一壑自謂過之晉書褚䂮以幹用稱為縣吏事有不合令欲鞭之䂮曰物各有所施榱桷之材不合以為藩落晉書互見大才小用古人有云耕當問奴織當問婢此言各有所能也隋書史思明曰李光弼長於憑城今出在野此成擒矣通監諸葛亮明於治國而為相關羽張飛勇冠三軍而為將同上漢獻紀傳記曹沬之奮三尺之劍一軍不能當使曹沬釋其三尺之劍而操銚鎒與農夫居壟畝之中則不若農夫戰國策猿獮猴錯木據水則不若魚鱉歷險乘危則騏驥不如狐狸同上顧劭與龐士元曰吾與足下孰愈曰陶冶世俗與時浮沉吾不如子論王霸之餘策覽倚伏之要害吾似有一日之長劭亦安其言世說集琴待嵇中散杯思阮步兵元微之集子長在筆予長在論劉賓客廉頗解武文無說謝眺能文武不通杜荀鶴集天之生物為用罕兼性有所長必有所短才有所合亦有所睽曲成則器物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良馭適險易之宜故駑驥無失性陸宣公文互見隨材器使本朝倕工於為弓而不能射奚仲工於為車而不能御歐公作梅聖俞集敘物有所不可則亦有所宜警夜偷者不以馬司晝漏者不以雞山谷文史蒯通曰跖之犬吠堯非其主也史記晉滅欒氏執政氏之臣勿行欒氏之臣辛俞行吏執而獻公曰國有大令何故犯之對曰自臣之祖以無大挼於晉國世隸欒氏於今三世矣臣故不敢不行國語滕公曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶通監漢紀漢高祖臣各為其主耳同上跖之狗吠堯堯非不仁狗固吠非其主當是時臣惟獨知韓信非知陛下也同上漢高紀桀之犬可使吠堯跖之客可使刺由西漢鄒陽書關羽殺顏良拜書辭曹操而犇劉備左右欲追之操曰彼各為其主勿追也通監漢獻紀什翼犍嘗討西部獲射者群臣欲臠割之什翼犍曰彼各為其主鬭耳何罪遂釋之同上晉海西公紀群士陳力各為其主三國魏明紀並通監傳記魏勃曰跖之犬吠堯非貴跖而賤堯狗自吠非其主也春秋後語
