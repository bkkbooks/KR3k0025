body:
  text: 事出意表子螣蛇無足而飛荀子勸學虞氏者登高樓臨大路設樂陳酒擊博樓上俠客相隨而行鳶適墜其腐鼠而中之俠客相與言吾不侵犯之而乃辱我必滅其家至期日之夜聚衆積兵以攻滅虞氏列子説詩互見取禍為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍然巨盜至則負匱揭篋擔囊而趨惟恐緘縢扃鐍之不固也莊子胠篋萹互見與人為地魯酒薄而邯鄲圍並同上藏舟於壑藏山於澤謂之固矣夜半有力者負之而走莊子大宗師毀譽萌生而不能照也淮南子月照天下蝕於蟾蜍騰蛇遊霧而殆於蝍蛆烏力勝日而勝於隼禮同上説林訓楚會諸侯魯趙皆獻酒於楚王楚王酒吏求酒於趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲淮南子史陳涉甕牖繩樞之子氓隸之人而遷徙之徒才能不及中庸非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之間而倔起阡陌之中率罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂並起而亡秦族矣史記秦紀賈生論諸將皆以為得大將至拜大將乃韓信也一軍皆驚西漢韓信傳楚使者在九江方急責布發兵隨何直入坐楚使者上曰九江王已歸漢楚何以得發兵布愕然楚使者起何因説布曰事已搆可遂殺楚使者無使歸而疾走漢并力布曰如使者教於是殺楚使者因起兵而攻楚通監漢高祖相國何以長安地愜上林中多空地棄願令民得入田母收稿為禽獸食上大怒曰相國多受賈人財物乃為請吾苑下相國廷尉械繫之通監漢高紀朝厝為國遠慮禍反及身西漢荊燕傳諸家子弟見光武絳衣大冠驚曰謹厚者亦復為之東漢光武紀諸葛亮卒于軍中長史楊儀整軍而出百姓奔告司馬懿懿追之薑維令儀反旗鳴鼓若將向懿斂軍退不敢逼諺曰死諸葛走生仲達懿聞之笑曰吾能料生不能料死故也通監魏明紀高蟬處乎輕陰不知螳蜋襲其後也晉書石苞傳蜂蠆作於懷袖勇夫為之驚駭晉書顧禍生不意雖有智勇無所施耳通監晉元紀王即言於趙王虎曰盛冬雪寒而皇太子使人伐宮材役者數萬吁嗟滿道太子宣怒會熒惑守房宣使太史令趙攬言於虎曰宜以貴臣王姓者當之虎曰誰可者攬曰無貴於王領軍虎意惜即使攬更言其次唯中書監王波耳虎乃下詔追罪波前議楛矢事腰斬之及其四子同上晉穆紀瞻素執無鬼論忽有一客通名詣瞻寒溫畢聊談名理客甚有才辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼於是變為異形須臾消滅晉書阮瞻傳魏杜弼曰楚國亡後禍延林木城門失火殃及池魚通監梁紀互見連纍魏杜弼曰禍生骨肉釁起腹心通監梁紀隋帝曰譬如猛虎物不能害反為毛間蟲所損食耳同上陳紀互見禍生所忽震霆不及塞耳唐書李靖傳幽州都督王君廓在州驕縱多不法徵入朝長史李玄道房元齡從甥憑君廓附書君廓私發之不識草書疑其告己罪行至渭南殺驛吏而逃通監唐太宗姚崇與張説同為宰相張銜崇崇病戒諸子曰張為人好服玩吾身沒之後汝具陳吾平生服玩寶帶重器羅列於帳前張若不顧汝家事産族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時録進仍先礱石以待至便鐫刻張丞相見事常遲於我數日之後必當有悔若徵碑文以刊削為辭當引使視其鐫仍告已具聞上崇沒張果至目其服玩者五四不數日文成敘足該詳後數日果遣使取本以為辭未周密欲加刪改姚氏子引使者視其碑乃告以奏御使者復命張悔恨撫膺曰死姚崇能算生張説吾今日方知才之不及遠矣舊唐書本傳互見心服料度二類張巡守雍丘令狐潮引兵圍之城中矢盡巡縛稿為人千餘被黑衣夜縋城下潮兵爭射之久乃知藁人還得數十萬矢其後復夜縋人賊笑不設備乃以死士五百斫潮營軍大亂唐書互見出奇門李繁者泌之子也陽城盡疏延齡過惡欲密論之以繁故人子使之繕寫繁徑以告延齡延齡先詣上一一自解疏入上以為妄不之省通監唐德宗傳記蠹蝝仆柱梁虻蚊走牛羊説苑談叢篇集是胡越起於輦下而羌夷接軫也司馬相如諫獵互見禍生所忽梁之亂兮陸受其毒徐之難兮鄭罹其殃唐文粹互見連纍魯酒致邯鄲之圍飛鳶生博者之禍劉賓客本持鄉曲譽肯料泥途辱劉長卿百鳥畏人林野宿翻遭網羅俎其肉韋應物解帶翻成結同上疾雷不及掩耳卒電不及瞑目太公六韜本朝夫以斧析薪可謂必克然不循其理則斧可折薪不可破東坡擬進士御試策白鷗生意在滄波不謂風塵有網羅臨川集謾説罷侯能置守趙高元不是封侯邵堯夫秦詩經枯楊生荑易大過魚網之設鴻則離之詩新臺發彼小豝殪此大兕吉日詩子有不虞之譽孟離婁下麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同床食芻豢而後悔其泣也莊子齊物篇史秦燔書而易為卜筮之事傳者不絶西漢藝文志方其鼓刀屠狗賣繒之時豈自知附驥之尾垂名漢庭德流子孫哉史記灌嬰傳互見人生罔測解裋褐而襲黼黻委臿築而據文軒後漢元載在中書有丈人來投載贈河北一書丈人至幽州拆視之更無一詞唯署名而已大悔怒欲回試謁院吏斯須請書館之上客留連數日奉絹千匹通監唐紀畢諴入翰林為學士黨項擾河西宣宗召訪邊事諴援質古今條破狀羌甚悉帝悅曰吾將擇能帥者孰謂頗牧在吾禁署卿為朕行乎新唐書本傳傳記以一壺飱得士二人戰國策中山燕太子丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而歎烏頭生白馬即生角秦王乃放歸呂氏春秋顧總為縣吏數被鞭捶因逃墟墓之間有二黃衣人曰劉君頗憶昔日周旋否僕二人乃王粲徐幹君前身是劉楨因出袖中書曰此君集也總省覽了然明悟乃攜集見縣宰宰大驚曰不可使劉公幹為小吏即以賓禮待之恃謂死劉楨猶芘得生顧總牛僧孺幽怪録集離蔬釋屩而享膏粱選人情駭觀如見買臣之綬梁劉孝儀謝啓尋聲得器虛來實歸唐文粹經殷鑒不遠在夏后之世詩大雅互見鑒戒伐柯伐柯其則不遠伐柯道不遠人記中庸子目擊而道存莊子史馬援於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣後漢互見默會經罰弗及嗣書大禹謨殲厥渠魁脅從罔治書嗣征無忿疾于頑無求備于一夫書鴟梟鴟梟既取我子無毀我室詩鴟梟君子不盡人之歡不竭人之忠以全交也記曲禮上國君春田不圍澤大夫不掩群士不取麛卵同上有餘不敢盡記中庸君子以人治人改而止同上君子以義度人則難為人以人望人則賢者可知已矣記表記子釣而不綱弋不射宿語述而子仲尼不為已甚者孟子離婁下剋核太至則必有不肖之心應之莊子人間世互見物極則反水至清則無魚人至察則無徒家語互見苛察魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚昔舜巧於使民而造父巧於使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然而其心猶乃求馬不已家語察見淵魚者不祥智料隱昵者有殃列子互見苛察焚林而田後必無獸以詐遇民後必無民韓子焚林而獵愈多得獸後必無獸淮南子史御者不盡馬之情史記夫差智伯極武而亡西漢陸賈傳黃霸曰凡治道去其太甚者耳本傳物禁太甚馮奉世傳聰明疏通者戒於太察匡衡傳並西漢董卓曰窮寇勿逼歸衆勿追後漢皇甫嵩傳太剛則折至察無徒晉劉隗等鼓繁氣易衰叫數力易竭通監宋太祖互見事當可繼韋睿曰為將當有怯時不可專勇通監梁武紀善惡太明亦有時而失通監唐太宗霆砰電射天怒也不能終朝聖人在上安有畢世而怒人臣耶唐書吳武陵傳惡衣之垢而焚之患木之蠹而伐之其為害豈不益多哉通監唐昭宗傳記樂毅曰君子交絶不出惡聲忠臣去國不潔其名戰國策出妻令其可嫁同上晉雍季曰竭澤而漁豈不得魚而明年無魚焚藪而田豈不得獸而明年無獸詐偽之道雖今可偷後將無獲非其長術也呂氏春秋集許其後效以補前非白樂天不當束縛之馳騁之使若牛馬然急則敗矣柳文致一物於必窮之地君子不為杜牧之互見長厚物之精華天地所祕惜故蒙金以沙錮玉以璞珊瑚之叢必茂重溟夜光之珠必頷驪龍抉而不止不窮則禍文章亦然所取者廉其得必多所取者深其身必窮孫樵集本朝聖人之行法也如雷霆之震草木威怒雖甚而歸於欲其生人主之罪人也如父母之譴子孫鞭撻雖嚴而不忍致之死東坡乞常州表美酒飲教微醉後好花看到半開時邵堯夫經辨人有其母死而孺子泣者孔子曰哀則哀矣而難於繼也夫禮為可傳也為可繼也故哭踊有節記檀弓上子魯法贖人取金於府子貢不取孔子曰自今以後魯不復贖人於諸侯矣家語史鼓繁氣易衰叫數力易竭通監宋太祖紀
