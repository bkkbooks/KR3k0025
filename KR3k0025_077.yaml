body:
  text: 風度史王商為人多質有威重身體鴻大容貌甚過絕人單于來朝仰視商貌大畏之遷延卻退天子聞而嘆曰此真漢相矣西漢本傳為人明鬚髮眉目如畫東漢馬援傳燕頷虎頸飛而食肉此萬里侯相也東漢班超蔡邕狀異常人每行觀者盈集東漢本傳凜凜皜皜焉其與琨玉秋霜比質可也東漢孔融裴楷目夏侯玄云肅肅如入宗廟中但見禮樂器晉書本傳衛瓘見樂廣而奇之曰此人之水鏡見之瑩然晉書夏侯湛美容觀與潘岳友善每行止同輿接茵京師謂之連璧晉書本傳王戎神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電晉書王戎裴楷風神高邁容儀俊爽時人謂之玉人晉書本傳衛玠風神秀異見者以為玉人王濟俊爽有風姿每見玠輒嘆曰珠玉在側覺我形穢又語人曰與玠同遊若明珠之在側恍然照人嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳳姿天質自然並同上互入不待矯揉王衍神姿高徹如瑤林瓊木自然風塵表物晉書王戎顧榮少有珪璋符采爽徹王隱晉書王衍每捉玉柄塵尾與手同色晉王衍王羲之見杜乂而目之曰膚若凝脂眼如點漆此神仙中人也晉書本傳王恭美姿儀人目之云濯濯如春月柳晉王恭亙玄曰劉裕風骨不常蓋人傑也通監晉紀褚彥回美儀貌善容止俯仰進退咸有風則每朝會百僚遠國使莫不延首目送之宋書本傳姿貌豊潔與圭璧等質王智宋紀齊和士開曰琅琊王儼眼光奕奕數步射人通監陳紀李繪儀貌端偉邢晏曰若披雲霧如對珠玉北史李渾風神灑落南史宋璟風度凝遠唐書本傳王彧美風姿為一時推許袁粲見之歎曰景文非但風流可悅乃哺歠亦復可觀宋書本傳上嘗陳樂於勤政樓下垂簾觀之兵部侍郎盧絢謂上巳起垂鞭按轡橫過樓下絢風標清粹上目送之通監唐元宗李義琛神情爽拔唐書本傳帝每用人必曰風度能如九齡否唐書張九齡日角珠庭非庸人相唐李玨郭子儀風姿若神人望之巖巖如華山郭子儀家傳鄭畋姿采如峙玉唐書本傳蕭遇風采整峭崔澹舉止秀峙時謂玉而冠者並同上孔季翔永昌初擢制科陳子昂嘗稱其神清韻遠可比衛玠唐書房琯見德秀歎曰見紫芝眉宇使人名利之心都盡唐元德秀姿宇魁秀唐書魏諅崔遠風姿峻整世目為飣坐梨新唐書本傳傳記衛玠從豫章下都人久聞其姿容觀者如堵墻世說見裴叔則如玉山上行光映照人世說下山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩時人目王右軍飄如遊雲矯若遊龍巖巖清峙壁立千仞並同上張緒少而閑雅風流吐納觀者忘疲永明主見靈和殿前柳條嫩弱披靡可愛嗟賞曰此楊柳風流可愛似張少年揚松玠談藪唐蔣凝美風標每到朝士家以為祥瑞朝士中號為玉筍班北夢瑣言李白神氣高朗軒軒若霞舉酉陽雜俎集情純潔而罔薉兮姿盛質而無愆楚辭金相玉質同上天姿玉裕應瑒建章臺詩江漢炳靈文選左太沖蜀都賦清如玉壺冰鮑明遠白頭吟河目龜文公侯之相劉孝標辨命論金昭玉粹顏延年曲水詩風標秀舉清暉映世齊故安陸碑天骨踈朗墻宇高嶷文選三國名臣贊姿狀嶽立靡然屬目陳子昂風情踈朗霜明月湛之姿氣骨端嚴雪白冰清之潔駱賓王秋水為神玉為骨杜詩眉宇真天人魏侯骨聳精神緊華嶽峰尖見秋隼炯如一叚清冰出萬壑置在迎風寒露之玉壺符彩高無敵玉府標孤映並同上皎皎鸞鳳姿飄飄神仙氣李太白符采照滄溟精輝陵白虹裴公有仙標拔俗數千丈並同上愛其風骨粹美無可揀韓文見王馬燧也於北亭猶高山深林龍虎變化不測傑魁人也退見少傳翠竹碧梧鸞鵠停峙幼子娟好靜秀瑤環瑜珥蘭茁其芽韓文人之異在乎風神之清濁不在於倒置眉目反易冠帶也裴度寄李翱書觀者識承平王孫故態柳文分明冰玉容同上珠生照乘光冰瑩環坐熱元稹集星辰讓光彩同上若霜鴻清唳松雪孤映李義山石骨無濁肉孟東野飄飄鶴骨仙同上神仙餘氣色列宿炳輝光劉文秀氣獨稟皇甫湜祭柳宗元文眸子瞭然炯炯清立望之真白圭振鷺也皇甫湜風儀秀偉神氣深厚即之如鏡望之如春杜牧之眉宇儼圖畫神秀射朝輝同前清潤潘郎玉不如唐楊巨源生而美姿河目海口王維集玉山迥立瓊樹無對劉長卿明眸白晢玉潤珠輝美秀備於儀容風流發於言笑王建集英盻橫溢神鋒秀發孫可之文野鶴無俗質唐文粹孟浩然骨貌淑清風神散朗唐楊士源孟浩然詩序本朝氣剛而毅望之可畏色粹而仁近之可親歐公集紫芝眉宇傾一座笑語但聞雞舌香臨川集韓侯冰玉人不可塵土雜同上風采鑠雲煙東坡詩冰壺貯秋水同上經六極五曰惡書洪範乃見狂且古之醜人也詩山有扶蘇子厲之人夜半而生子遽取火而視之汲汲然惟恐其似己也莊互入明於自知史賈大夫惡娶妻而美三年不言不笑左昭二十八年今子少不颺注顏貌不揚顯左昭二十八年田蚡為人貌侵短小也西漢本傳蔡義為丞相短小無鬚眉貌似老嫗行步俛僂兩吏扶夾乃能行西漢本傳張孟陽醜每出人惡之擲尾礫盈車晉書孫秀形陋短小奴僕之下者也同上歐陽詢貌甚寑陋唐書本傳盧杞貌陋而色如藍人皆鬼視之舊唐書本傳傳記劉伯倫形小醜書林本傳云容貌甚陋經好古博雅君子書序子君子安雅荀雅文辯惠之君子荀知之曰知之不知曰不知內不自以誣外不自以欺以是尊賢畏法而不敢怠傲是雅儒者也荀儒效史大雅卓爾不群河間獻王近之矣前漢河間獻王贊儒雅則公孫洪董仲舒西漢經術文雅足以謀王體斷國論西漢薛宣傳互入謀畫劉愷辭氣高雅後漢山簡性溫雅有父風晉書互入克紹雅有遠韻晉書庾敳傳謝安文雅過於王導晉書張九齡文雅為帝知唐書本傳集文雅涉風騷杜詩霜松貞雅節月桂朗沖襟駱賓王笑語和風騷雍容事文墨皇甫湜本朝文采風流諸謝上陳後山詩經鄙夫可與事君也與哉其未得之也患得之既得之患失之苟患失之無所不至矣語陽貨子有俗人者有俗儒者荀儒效史家累萬金門下不見一賢者史記孟嘗君傳互入鄙吝俗吏之所務在於刀筆筐篋西漢賈誼傳俗儒不達時宜西漢宣紀集抗塵容而走俗狀文選北山移文經君子遏惡揚善易大有彰人之善美人之功記表記子不沒纖芥之善不掩螢爝之光劉史子貢喜揚人之美史記本傳曹丘生謂季布曰僕將揚足下之名於梁楚間漢書丙吉為丞相於官屬掾吏務掩惡揚善西漢本傳互入掩惡禰衡稱劉表之美盈口通監漢獻紀房元齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰微公言幾失之通監唐高祖禮部侍郎崔郾試進士公卿咸祖道武陵後至謂郾曰君方為天子求奇才敢獻所益出神中書搢笏為郾讀之乃杜牧所賦阿房宮武陵曰請以第一人處之郾謝已得其人至第五郾未對武陵曰不爾宜以賦見還新唐書吳武陵傳集東野吃吃說足下不離口韓文柳惟深充江東路判官出巡其有非常之政裕于人者必舉其課績又以文采殷勤歌詠之俾其風謠頌聲聞于他部達于京師而後已柳文柳渾行狀本朝唐楊敬之贈項斯詩曰幾度見詩詩盡好及親標格過於詩平人不解藏人善到處相逢說項斯南部新書錢易撰史子文無後何以勸善左宣四年叔向社稷之固也猶將十世宥之以勸能者左襄二十七年經臧文仲其竊位者與知柳下惠之賢而不與立也語衛靈公子言無實不祥不祥之實蔽賢者當之孟離婁下史夫十室之邑必有忠信三人並行厥有我師今或闔郡至不薦一人是積行之君子雍於上聞也蔽賢蒙顯戮古之道也漢武紀何以知朝廷之衰人人自賢不務於通人故世陵夷西漢李尋傳通人謂薦達賢材也杜密曰劉勝知善不薦自同寒蟬東漢書寂默也唐彬當世英彥見彬莫不欽悅稱之於文帝帝問孔顥顥忌其能良久不荅陳騫曰彬為人勝騫甚遠帝辟彬為屬他日謂孔顥曰近見唐彬卿受蔽賢之責矣晉書互入嫉妬集好蔽賢而嫉妬楚辭知善不言與嚚瘖同柳文序
