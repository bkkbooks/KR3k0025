body:
  text: 精力精明史米鹽靡密初若煩碎然霸精力能推行之前漢黃霸傳根株窟穴所在銖兩之姦皆知之其發姦擲矢如神趙廣漢傳互入政事郤超曰謝玄使才雖履屣間亦得其任晉謝玄傳互入不忽微小劉穆之為左僕射入居東府總攝內外穆之內總朝政外供軍旅決斷如流事無擁滯賓客輻湊求訴百端內外咨稟盈階滿室月覽詞訟手答箋書耳行聽受口並酬應不相參涉悉皆贍舉又喜賓客言談賞笑彌日無倦裁有間暇手自寫書尋覽校定通監晉安紀互入敏捷陶侃在軍四十一年明毅善斷識察纖密人不能欺通監晉帝紀徐勉為吏部尚書精力過人雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱通監梁紀徐紇有機辨強力終日治事略無休息不以為勞時有急詔令數吏執筆或行或臥人別占之造次俱成不失事理通監梁高祖帝常曰唐雍強幹一人當千又曰雍每有軍事手作文書口且處分耳又聽受通監梁世祖范雲臨煩處劇精力過人通監梁武紀小大之物必經心目通監經終踰絶險曾是不意詩正月憃愚冥頑記哀公問執柯以伐柯睨而視之猶以為遠記中庸互入對面蹉過人莫不飲食也鮮能知味也同上驅而納諸罟擭陷阱之中而莫之知避也同上衣服在躬而不知其名為罔記少儀注無知貌其猶正墻面而立也與語陽貨子安其危而利其災樂其所以亡者孟道在邇而求諸遠事在易而求諸難孟離婁上猶緣木而求魚孟行之而不著焉習矣而不察焉終身由之而不知其道者衆也孟盡心下大惑者終身不解大愚者終身不靈莊天地禍重乎地莫之知避莊人間世人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影愈不離身不知處陰以休影處靜以息迹愚亦甚矣莊漁父宋人有遊於道得人遺契者歸而藏之密數其齒告鄰人曰吾富可待矣列説符篇燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而歎指舍曰此若先人之廬乃潸然而泣指壟曰此若先人之冢其人哭不自禁同行者啞然大笑曰豫昔紿若此晉國耳列互入欺罔齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜也一年而給二年而足三年而富穰自此以往施及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡不探也未及時以贓獲罪沒其先君之財向氏以國氏之謬己也往而怨之國氏曰若為盜若何向氏言其狀國氏曰嘻若失為盜之道至此乎今將告若矣吾聞天有時地有利吾盜天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舍陸盜禽獸水盜魚鱉皆天之所生豈吾之所有然吾盜天而無殃夫金玉珍寶穀帛財貨人之所聚豈天之所與向氏大惑以為國氏之重罔己也列天瑞妄人者門庭之間猶有可誣欺焉而況於千里之上乎荀非相愚以重愚暗以重暗同上以篙測江篙終而以水為淺惑矣淮南説林訓捨茂木而集于枯不弋鵠而弋烏難與有圖淮南嘗被甲而免射者被而入水嘗抱壺而度水者抱而蒙火可謂不知類矣楚人有乘船而遇大風者投於水非不貪生而畏死也惑於死而返忘生並同上不聰實無耳也不明實無目也揚問明燕雀處屋灶突決上棟宇將焚不知禍之將及己也孔叢子蹈薄冰以待夏日也抱朴子甘於荼蓼而不識飴蜜酣於醨酪而不賞醇醪抱朴子如坐漏船之中伏燒屋之下吳子宋之愚人得燕石藏之以為大寶周客聞而觀焉主人冕玄服以發寶華匱十重緹巾十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固闕子互入自是史晉侯復假道於虞以伐虢宮之奇曰虢虞之表也虢亡虞必從之虞公曰晉吾宗也豈害我哉左僖五年周子有兄而無慧不能辨菽麥左成十八年耳不聽五聲之和為聾目不辨五色之章為昧左僖二十四年不知話言左夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之勢何以異此通監漢文紀狐白之裘而反衣之也西漢丘衡傳如衣錦夜行西漢朱買臣傳憒眊不知所為西漢息夫躬傳馳深淵入虎口東漢馬援傳嚴顏曰獨坐窮山放虎自衛通監東漢居纍卵之危而圖太山之安為朝露之行而思傳世之功東漢王符傳互入不自揆度升山採珠東漢劉玄傳豈有知其無成而萎腇咋舌叉手從族乎通監漢光武紀張角作亂向栩上便宜不欲國家興兵但遣將於河上比向讀孝經賊自當消滅東漢向栩傳緣木求魚卻行求前通監漢殤紀孫恩攻會稽會稽內史王凝之世奉天師道不出兵亦不設備日於道室稽顙跪呪官屬請出兵討恩凝之曰我巳請大道借鬼兵守諸要津各數萬賊不足憂也及恩漸近乃聽出兵恩已至郡下甲寅恩陷會稽凝之出走恩執而殺之并其諸子通監晉紀晉王與蜀後主劉禪宴作故蜀妓旁人皆為之感泣禪喜笑自若晉王曰人之無情乃至於此它日王問禪曰頗思蜀否禪曰此間樂不思蜀也卻正聞之謂禪曰若王後問宜泣而對曰先人墳墓遠在岷蜀乃心西悲無日不思因閉其目會王復問禪對如前王曰何乃似卻正語耶禪驚視曰誠如尊命左右皆笑通監晉紀安帝幼而不慧口不能言至於寒暑飢飽亦不能辨飲食寢興皆非己出通監晉武紀亦猶犬彘腴肥不知禍之將及晉書韓伯傳論開門揖盜吳志張昭傳斛律光曰鴻鵠已翔於寥空羅者猶視於沮澤通監聽人穿鼻梁武紀魏杜弼曰舉螳螂之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎通監宋紀謝靈運子鳳鳳子超宗有文辭帝大嗟賞謂謝莊曰超宗殊有鳳毛靈運復出時右衛將軍劉道隆在御坐出候超宗求鳳毛觀之超宗以其無識又觸其父名徒跣還內道隆謂撿覓毛至暗待不得乃去南史將涉千里棄騏驎而策蹇驢通監梁武紀挾冰求溫抱炭希涼魏志高柔傳上曰譬如飢人自噉其肉肉盡而斃何其愚也通監唐太宗紀互入自相矛盾庇朽木乘膠船唐韋承慶傳互見取禍魏徵曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也通監唐太宗姚覬不知錢陌銖兩之數五代晉紀傳記塞漏舟而輕陽侯之波則舟覆矣戰國策猶之井中而求火同上去日之明於庭而就火之光於室賈誼書楚人有涉江者其劍自舟中墜於水遽鍥其舟曰是吾劍所從墜也舟去從所鍥處入求之而舟已行劍不行此不亦惑乎呂氏春秋互入窒泥集不別橫之與縱楚辭蓼蟲避葵堇習苦不言非選放歌行食填巨壑飲灌漏卮曹子建書以覺痛之日為受病之始嵇叔夜養生論遵覆車之遺轍五等論是知二五而未識於十辨命論圖形於影未盡纖麗之容察火於灰不睹洪赫之烈陸士衡連珠坐積薪以待燃方指日而比盛潘安仁西征賦登陽城而避險臥砥柱以求安庾信哀江南賦愚者逆理而動文選書羔羊口在緣何事暗死屠門無一聲白傳集坐薪言泰巢幕云安李義山猶去蘭室而居鮑肆捨牢醴而食糟糖脫錦繡而服枲麻唐文粹譬如無目昧於日月之中行於重險之處顛踣墮落可勝既乎同上狂風拔倒樹樹倒根已露上有數枝藤青青猶未悟唐于瀆詩掩耳盜鍾自云無覺劉知幾史通蒙然靡察有如聾瞽史通本朝託麑猛虎寄雛飄鷹類要下何異避喧之趍市兮又如惡影之就日歐公集如坐弊船之中駸駸乎將入於深淵不及其尚淺也舍之而求所以自生之道而以濡足為解者是固夫覆溺之道也老泉文史枚皋為文疾受詔輒成西漢本傳口占檄文西漢朱博傳禰衡為賦文不加點筆不停綴東漢本傳費禕為尚書令于時多事禕識寤過人每省讀書記粗舉目暫視究其意旨其速數倍於人終亦不忘蜀志劉穆之為左僕射入居東府總攝內外穆之內總朝政外供軍旅決斷如流事無擁滯賓客輻湊求訴百端內外咨稟盈階滿室目覽辭訟手答箋書耳行聽受口並酬應不相參涉悉皆贍舉又喜賓客言談賞笑彌日無倦裁有間暇手自寫書尋覽校定通監晉安紀互入精力王泰刻燭賦詩文不加點南史宋本傳梁武延進士二十餘人置酒賦詩蕭介染翰便成文不加點帝曰蕭介之文即席之美也梁書范雲善屬文尺櫝下筆輒成未嘗定藁時人疑其宿構梁書裴子野為文典而速或問其文速子野曰人皆成於手我獨成於心梁書本傳武帝取鍾王真迹授周興嗣令選不重復者千字韻而文之興嗣一宿即上鬚髮皆白梁書蕭文琰丘令楷江洪等共打銅鉢立韻響滅則詩成梁王孺傳時軍書日以百數李德林口授數人文意百端不加治點通監陳後主紀劉炫強記默識莫與為儔左畫方右畫圓口誦目數耳聽五事同舉無所遺失隋書齊元康作軍書颯颯運筆俄頃數紙北史齊書軍中多事如晦剖決如流通監唐高祖裴延裕在內庭文書敏捷號下水船唐書謝微善屬文時魏中山王元略還北梁武帝餞於武德殿賦詩三十韻限三刻成微便就南史元宗平內難書詔填委蘇廷碩所占授功狀百緒無所差書吏白曰丐公徐之不然手腕脫矣唐書本傳令狐楚為太原掌記鄭儋在鎮暴卒不及指撝後事軍中喧譁將變忽夜數十騎持刀迫楚至軍門諸將迫之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書互入有定力房元齡軍符府檄或駐馬即辦文約理盡不著藁唐書本傳朱泚謀逆駕幸奉天時天下叛亂機務填委徵發指蹤千緒萬端一日之內詔書數百贄揮翰起草思如泉注初若不經思慮既成莫不曲成事情中於機會胥吏簡札不暇同舍皆伏其能唐書陸贄傳王勃屬文初不精思先磨墨數升則酣飲引被覆面臥及寤援筆成篇不易一字時人謂勃為腹藁唐書本傳柳公權工辭賦應聲成文唐文宗曰子建七步爾乃三焉唐書互入文章薛收為書檄露布或馬上占辭該敏如夙構初不竄定唐書韋承慶屬文敏無留思雖大詔令未嘗著藁唐書本傳鄭敏為中書舍人書詔旁午動無滯思言皆破的李栖筠為文徑迅陸扆工文辭敏速若注射然並同上傳記李太白在翰林應詔草白蓮花序及宮詞十首時方大醉中貴人以冰沃之稍醒白於御前索筆一揮文不加點托言溫庭筠工於小賦凡八叉手而八韻成北夢瑣言集魏文駐馬書鞭為臨渦賦魏文臨渦付日試萬言倚馬可待李太白與韓荊州書揮毫落紙如雲煙杜詩誘於一時一物發於一笑一吟率然成章白樂天辨如懸河筆不停綴范傳正撰李白碑本朝楊大年每欲作文則與門人賓客飲博投壺奕碁語笑喧譁而不妨締思以小方紙細書揮翰如飛文不加點每盈一幅則命門人傳録門人疲於應命頃刻之際或數千言歐陽公歸田録千言一揮手五車不再讀東坡集袖手獨不言默藁已在腹文如翻水成賦作叉手速當其下手風兩快筆所求到氣已吞並同上展卷五行下揮毫萬字傾蘇子由集黃生學詩用力深急手疾口如翻盆陳後山
