body:
  text: 波瀾經澤潤生民四夷左衽罔不咸賴書畢命膏潤天下詩黍苗芃芃黍苗陰雨膏之詩下泉子松柏茂而陰成於林塗之人蔭矣子華子一本人字下有則字膏澤下於民孟子河潤千里澤及三族莊子玉在山而木潤淵生珠而崖不枯荀子澤及百里而潤草木者唯江河也楊子史葛藟猶能庇其本根左傳若江海之浸膏澤之潤左傳序晉公子重耳曰其波及晉國者君之餘也左傳二十四河海潤于千里公羊管仲光燭鄰國史記魯仲連傳一人有子三人緩帶穀梁文十八沐浴膏澤史記樂書取尊官厚祿以為宗族交遊光寵西漢司馬遷傳天地之間被潤澤而大豐美西漢董仲舒策河潤千里京師蒙福後漢郭伋傳張讓父死歸葬穎川雖一郡畢至而名士無往者讓甚恥之陳實獨吊焉及誅黨人讓以實故多所全宥通鑑漢靈紀互入先見南燕汝水竭河凍皆合而澠水不冰李宣曰澠水無冰良由逼帶京城近日月也通鑑晉安紀殘膏賸馥沾丐後人多矣唐書杜甫贊集石韞玉而山暉水懷珠而川媚晉陸士衡賦桑梓有餘暉王仲宣從軍濡沫窮鱗柳文餘波德照鄰老杜詩筆端膚寸澤及九垠劉賓客百川承少海之潤同上垂蔭萬畝懸映九霄駱賓王光榮照四鄰白侍郎風煙借顏色雨露助恩光白樂天一士登甲科九族光彩新王建詩接楚地之餘波仰晉國之膏雨李義山文草木蒙雨露之澤皆被鮮輝煙霞照日月之光盡成綵繪李文饒鄰斗極之光輝邇天漢之波潤唐文粹一人在朝百人緩帶一人貴而親友皆榮之也唐文本朝大玉韞石而珠藏淵其光氣常見於外也故山輝如白虹水變而五色歐文公之在內自泉流瀕其在四方自葉流根金錫圭璧之所在瓦石草木被其光澤餘膏所燭常分無盡之光蒙霧而行坐獲不知之潤並東坡集桃李終不言朝露借恩光山谷經小人行險以僥幸記中庸罔之生也幸而免語子千金之珠在九重之淵驪龍頷下子能得者必遭其睡也列子料虎頭編虎鬚幾不免虎口哉莊子宋王而寤子為齏粉莊天下若逐野獸而皆有分肉之心太公武韜以百誕成一信佐祭者得嘗並淮南子魏田父得玉徑尺以告鄰人鄰人詐之曰此怪石也蓄之非利其家田父猶豫以歸置於廡下其玉明照一室大怪遽棄之於遠野鄰人取之以獻魏王魏王召玉工相之曰此無價寶魏王賜獻玉者千金長食上大夫祿尹文子史孔子曰賜不幸言而中是使賜多言也左定十五年叔孫通曰我幾不脫於虎口史本傳郭解適有天幸窘急常得脫若遇赦史遊俠傳龐涓曰遂成豎子之名史記楚葉公子高曰以險徼幸者其求無饜左哀十六無德而富貴謂之不幸漢書據徼乘邪以求一日之富貴班固敘傳為惡未始不及於凶幸而免者亦時有焉唐武后贊張昌儀為洛陽令請屬無不從嘗早朝有選人姓薛以金五十兩并狀邀其馬而賂之昌儀受金至朝堂以狀授天官侍郎張錫數日錫失其狀以問昌儀昌儀罵曰不了事人我亦不記但姓薛者即與之錫懼退索在銓姓薛者六十餘人悉留注官通鑑唐武后灶下養中郎將爛羊胃騎都尉爛羊頭關內侯東漢劉玄宋張瓌以百口一擲出手得盧通鑑宋紀傳記桓溫伐蜀敗於笮橋衆懼欲退鼓吏誤鳴進鼓於是攻之李勢大潰乃以衆降孔氏雜記集出萬有一危之塗以為娛司馬長卿諫獵書本朝庶幾僥幸不種而穫偶然連六鰲便謂此手妙治病不知其所當用之藥而百藥皆試以僥幸於一物之中譬如匠慶之山而得成簴豈可常也哉並東坡經引而伸之觸類而長之天下之能事畢矣易繫辭刑于寡婦至于兄弟以御于家邦言舉斯心加諸彼而已詩大雅思齊愛親者不敢惡於人敬親者不敢慢於人資於事父以事母而愛同資於事父以事君而敬同並孝經貴老為其近於親也禮記子貢曰回也聞一以知十賜也聞一以知二論語子老吾老以及人之老幼吾幼以及人之幼孟子人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也人能充無受爾汝之實無所往而不為義也孟盡心下推恩足以保四海不推恩無以保妻子古之人所以大過人者無他焉善推其所為而已矣孟子通於一而萬事畢莊子見瓶中之冰而知天下之寒暑淮南子兵略訓見窾木浮而知為舟見飛蓬轉而知為車見烏迹而知著書以類取之淮南子説山訓史求忠臣必於孝子之門通鑑漢武帝推微達著尋端究緒履霜知冰踐露知暑蔡雍傳釋誨見瓶水凍而知天下之寒嘗肉一臠而識鑊中之味物有其類可推而釋北史崔浩傳傳記睹一事於句中反三隅於字外史通集求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賓客互見因小見大本朝放麑違命也而推其仁則可以託國食子徇君也而推其不仁則至於殺君欒城集經聖人久於道而天下化成易常卦誰夙知而暮成詩抑悠久所以成物也記中庸子曰善人為邦百年亦可以勝殘去殺矣子曰苟有用我者期月而已可也三年有成語子路子曰無欲速欲速則不達並語子路子大器晚成老子美成在久荀子真積力久同上史天地之功不可倉卒艱難之業當纍日也東漢朱浮論大才當晚成東漢馬援傳非若京房劉邵之法校其米鹽之課責其旦夕之效也通鑑魏明紀慕容農謂慕容垂曰取果於未熟與自落不過晚旬日之間然其難易美惡相去遠矣通監晉紀互見間不容髮盧懷慎曰子産賢者也為政纍年而後成唐書崔周度曰魯詩書之國自伯禽以來不能伯諸侯然以禮義守之可以長世通監周太祖集嘉穀不夏熟大器當晚成于將百煉則其良可用和璞三獻而其寶乃真歐陽詹養材三千年方成棟梁姿白侍郎本朝東坡試中制科英宗便欲授知制誥相國韓公曰蘇軾之才遠大之器也他日自當為天下用要在朝廷培養之使天下莫不歸慕降伏皆欲朝廷進用然後取而用之則人人無復異辭矣李豸談記史相見日淺卒卒無須臾之間西漢司馬遷傳事薄遽注薄迫也遽速也西漢嚴助傳王彪之謂殷浩曰奈何無故匆匆先自猖蹶通鑑晉穆紀傳記匆州里所建旗所以趣民故遽稱匆匆説文世稱匆匆不知所由按説文匆者州里之旗所以趣民事故匆遽者稱為匆匆北齊顏氏家訓子位卑而言高罪也孟子位卑而圖大孔叢子嘉言篇猶未能操刀而使割也其傷實多左襄三十一譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲同上以匹夫徒步之人而超九卿之位非所以重國家而尊社稷也西漢朱雲傳集陵邁超越不拘資次于令升晉總論經心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣記樂記史群小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間通鑑漢文紀間隙一開則邪人動心後漢互見嫌隙百家衆氏投間而作後漢延篤傳上初踈斥宦官親任朝士而張涉以儒學入侍薛雍以文雅登朝繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹濁亂天下豈非欺罔耶於是上心始疑不知所以倚仗矣通鑑唐德宗妖禽孽狐當晝則伏自如得夜乃為之祥唐封倫贊集白鶴未輕舉衆鳥爭浮沉孟東野本朝譬如深淵大澤龍亡而虎逝則變怪雜出舞鰌鱓而號狐狸東坡集物必先腐也而後蟲生之人必先疑也而後讒入之東坡文經無拳無勇職為亂階詩巧言誰生厲階至今為梗詩桑柔史趙孟曰晉國有命始禍者死左定十三秦失其政陳涉發迹諸侯作難風起雲蒸天下之禍自涉發難太史公自序奮臂為天下倡始西漢張耳傳楚首事西漢陳勝傳公孫洪曰主父偃本首惡陛下不誅偃無以謝天下通鑑漢武紀戰國一百三十六載劉元海為之禍首元海自晉惠帝時稱漢見晉書表章署用輒使首名附下罔上姦以事君東漢孔融傳當為誅始選內史表吳楚唱謀選六代論子兩葉蔽目不見太山兩豆塞耳不聞雷霆鶡冠子史上下相蒙左僖二十四屏王之耳目使不聰明左傳昭二十七章邯使長史欣請事咸陽留司馬門三日趙高不見史記項羽紀郎中令趙高恃恩專恣以私怨誅殺人衆多死大臣入朝奏事言之乃説二世曰天子所以貴者但以聲聞群臣莫得見面故也且陛下富於春秋未必盡通諸事今不如深拱禁中與臣及侍中習法者待事事來有以揆之如此則大臣不敢奏疑事通鑑秦紀李斯就獄乃從獄中上書書上趙高使吏棄去不奏曰囚安得上書高皆妄為反辭以相傅會同上雍閼不得聞西漢中山靖王傳雍音壅於上聞西漢武帝紀高門立省戶數十步求見出入二年未省欲使海瀕仄陋自通遠矣西漢鮑宣傳虛美熏心實禍蔽塞漢書鄱陽王範密啓侯景謀反時上以邊事專委朱異動靜皆關之異以為必無此理通鑑梁高祖楊義臣破降河北賊數十萬上曰我初不聞賊頓如此義臣降賊何多也虞世基對曰小功雖多未足為慮侍御史韋雲起劾奏世基及裴蘊四方告變不為奏聞賊數實多裁減言少通監隋煬帝上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對策斥言其姦惡建言舉人多卑賤愚聵恐有俚言汙濁聖德乃令郡縣長官精加試練圴然超絶者具名送省委尚書省覆試通監唐元宗上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然通監唐元宗上過便橋老父郭從謹進言曰闕門之外陛下皆不得而知九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎同上元載專權恐奏事者攻訐其私乃請百官凡論事皆先白長官長官白宰相然後奏聞顏真卿上疏以為論事者先白宰相是自掩其耳目也太宗署司門式云其無門籍人有急奏者皆令門司與仗家引奏無得關礙所以防壅蔽也天寶以後李林甫為相深疾言者道路以目上意不下逮下情不上達蒙蔽喑嗚卒成幸蜀之禍陵夷至于今日其所從來者漸矣通監唐代宗軒陛之間且未得諭宇宙之廣何由自通通監唐穆宗鮮于仲通討南詔大敗士卒死者六萬人仲通僅以身免楊國忠掩其敗狀仍敘其戰功李宓擊南詔被擒全軍皆沒國忠隱其敗更以捷聞舊唐書昧離婁之目則天地四方之位不分充子野之耳則雷霆蒼蠅之聲莫辨房元齡奏議以百口百心之讒諂蔽兩耳兩目之聰明唐元宗贊有言朱泚為亂兵所立盧杞切齒曰朱泚忠直群臣莫及臣請以百口保其不反帝以為然泚自將逼奉天舊唐書魏證曰秦二世隱藏其身以信趙高天下僣叛而不得聞梁武信朱異侯景向闕而不得聞隋煬帝信虞世基賊遍天下而不得聞故曰君能兼聽則姦人不壅蔽而下情通矣新唐書本傳裴度曰天顏不咫尺此尚未能決千里單言可悟聖聽哉唐書本傳集蔽晦君之聰明兮虛惑誤又以欺浮雲陳而蔽晦兮使日月乎無光並楚辭子用間有五有因間有內間有反間有死間有生間孫子史昌他亡西周之東周盡輸西周之情西周大怒馮旦曰臣能殺之君豫金三十斤馮旦使人操金與書間遺昌他曰事可成勉成之不可成亟亡事久且泄母令身死東周立殺昌他戰國策項王與范增急圍滎陽漢王患之乃用陳平計間項王項王使者來為太牢具欲進之見使者佯驚愕曰吾以為亞父使者乃項王使者更持去以惡食食項王使者使者歸報項王項王乃疑范增與漢有私稍奪之權史記項羽紀互入反鋒而用漢王與陳平金四萬斤以間踈楚君臣史記漢高紀秦繆公問內史廖曰由余賢戎人寡人之害奈何廖曰戎王處辟匿未聞中國之聲君試遺其女樂為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有隙乃可虜也繆公以女樂二八遺戎王戎王受而説之終年不還於是秦乃歸由余由余數諫不聽繆公又數使間要由余遂去降秦史記秦紀秦攻趙趙廉頗堅壁以待秦數挑戰趙兵不出趙王數讓頗秦相使人行千金趙為反間曰秦之所惡獨畏馬服君子趙括將耳廉頗易與且降矣趙王怒頗不戰又聞反間之言因使趙括代廉頗括敗卒四十萬人降武安君史白起傳魏公子無忌威振天下秦王患之行金毀公子於魏王曰諸將徒聞魏公子不聞魏王公子亦欲因此時定南面而王數使反間偽賀公子得立於魏王未也魏王日聞其毀不能不信後果使人代公子將史本傳燕惠王自為太子時嘗不快於樂毅齊將田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患惟恐他將之來惠王已疑樂毅得齊反間乃使騎劫代將史樂毅傳趙李牧大破秦軍秦多與趙王寵臣郭開金為反間言李牧欲反趙乃使顏聚代牧捕斬之史本傳秦行千金以間廉頗漢散萬金以疏亞父西漢傅喜傳傳記古之用間非一有間其君者有間其親者有間其賢者有間其能者有間其助者有間其鄰好者有間其左右者有間其縱橫者子貢史廖陳軫蘇秦張儀范睢等皆憑此術而成功也李衛公兵法
