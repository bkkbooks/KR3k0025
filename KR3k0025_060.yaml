body:
  text: 奢侈經怙侈滅義書畢命子情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非上之所産育者無不致之猶藩墻之物也庖廚之下不絶煙火堂廡之上不絶聲樂列陽朱傳史宮室崇侈左昭八侈惡之大也左莊二十四齊慶封獻車季武子美澤可以鑑左襄二十八侈將以其力斃左襄二十九治宅甲諸第前田蚡傳奢泰則下不遜而國貧西漢禮樂志互見僣冒以酒為池懸肉為林史記殷本紀春申君客三千餘人其上客皆躡珠履史本傳易傳曰上不儉下不節孽火燒其室通鑑魏明帝紀劉穆之性奢食必方丈旦輒為十人饌未嘗獨餐同上晉安帝紀何曾性奢豪每燕見不食太官所設食日萬錢猶曰無下筯處晉本傳何劭驕奢簡貴亦有父風食必盡四時之珍異一日之供以錢二萬為限晉本傳石崇以奢豪矜物廁上常有十餘婢侍列皆有容色置甲煎粉沈香汁有如廁者皆易新衣而出同上王敦傳劉實嘗詣石崇家如廁見有絳紋帳裀褥甚麗兩婢持香囊實便退笑謂崇誤入卿內崇曰是廁耳本傳石崇與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂同上石崇財産豐積室宇宏麗後房百數皆曳綺繡金翠絲竹盡當時之選庖膳窮水陸之珍並晉書本傳魏高陽王雍一食直錢數萬李崇曰高陽一食敵我千日通鑑梁武紀韋陟窮治饌羞擇膏腴地藝榖苖以鳥羽擇米每視庖中所棄其直猶不減萬錢宴公侯家雖極水陸曾不下筯唐書本傳傳記楊國忠子弟上元夜各有千炬燭圍天寶遺事李德裕奢侈每食一杯羹其費約錢三萬雜珠玉寶貝朱砂煎汁為之過三煎即棄其滓獨異志元載造藝輝堂藝香草也白如玉入土不朽為屑以塗壁設紫綃帳凝冬風不入盛夏自清涼唐蘇鶚蘇氏演義韓嫣好彈以金為丸一日所失者十餘長安為之語苦飢寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉西京雜記楊氏子弟暑月大冰琢山周圍宴席王仁裕開元天寶遺事楊國忠冬月選婢妾肥大者列行於前令遮風謂之肉陳開元遺事集木衣綈繡土被朱紫張平子東京賦春衣一對直千金白侍郎山珍海錯棄藩籬烹犢炮羔如折葵韋應物集首飾載千金一膳傾千家唐文粹經王臣蹇蹇匪躬之故易蹇卦子忠臣不諂其君莊子史韓信曰乘人之車者載人之患衣人之衣者懷人之憂食人之食者死人之事史本傳上所幸慎夫人在禁中嘗與皇后同席坐反坐郎署袁盎引卻慎夫人坐曰陛下所以為慎夫人適所以禍之也通鑑漢紀忠臣不避重誅而直諫西漢主父偃傳忠臣蒙死而竭知宣帝紀獨有極言待死五行志並西漢忠臣憂世犯主嚴顏譏剌貴臣至以殺身滅家而猶為之者何耶君臣義重有不得己也後漢何敞傳漢成帝欲御樓船薛廣德諫言宜從橋陛下不聽臣臣自刎以血污車輪本傳槐里令朱雲上書曰臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣廷辱師傳罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已通鑑漢成帝紀大司徒韓歆好直言無隱諱於上前證歲將飢凶指天畫地言甚剛切通鑑漢光武紀衛覬上疏曰非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一説也魏志崔洪清厲骨鯁好面折人過而退無後言通鑑晉武紀古弼入見魏主帝方與給事中劉樹圍碁志不在弼弼入侍坐良久不獲陳聞忽起捽樹頭掣下床摶其背曰朝廷不治實爾之罪通鑑宋太祖上以舞胡安叱奴為散騎侍郎禮部尚書李綱諫曰古者樂工不與士齒雖賢如子野師襄皆終身繼世不易其業唯齊末封曹妙達為王安馬駒為開府有國家者以為殷鑑通鑑唐高祖魏徵容貌不逾中人而有膽略善回人主意每犯顏苦諫或逢上怒甚徵神色不移上亦為之霽威通鑑唐太宗褚遂良陛下必欲易皇后伏請妙擇天下令族何必欲武氏武氏經事先帝衆所共知天下耳目安可蔽也通鑑唐高宗魏帝謂群臣曰如高允者乃真忠臣也朕有過未嘗不面言至有朕所不堪聞者允皆無所避朕聞其過而天下不知可不謂忠乎通鑑宋世祖額扣龍墀唐書劉栖楚德宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壞之哭於庭帝不相延齡城力也同上陽城傳褚遂良鯁亮唐書本傳集悉心以諫極言無隱選策文正言不諱以危身選騷經氣蘊逆鱗色形匪躬唐文粹守節沒齒忠莫至焉選豪士賦序納忠為爭臣之表柳文盧景亮奏事如水赴壑同上匡拂時病磨切貴近罔有顧慮知無不為杜牧之為負剛腸譽還追強項名張説諫舌切切上磨帝缺孫樵苦隳肝膽而言天下之事元微之忤英主之龍鱗蹈姦臣之虎尾唐張悅撰宋璟遺愛碑本朝魯宗道為參政以忠鯁自任時人謂曰魚頭公蓋以骨鯁目之聖宋掇遺經巧言令色便僻側媚書冏命籧篨常觀人顏色而為之辭故不能俯戚施下人以色故不能仰也詩新臺注巧言令色鮮矣仁語學而籧篨口柔也戚施面柔也夸毗體柔也爾雅子脅肩諂笑病于夏畦孟子注夏畦夏月治畦之人也言為此者其勞過於夏畦之人閹然媚於世者是鄉原也孟子盡心下秦王有病召醫舐痔者得車五乘莊子列御寇希意導言謂之諂莊子不度理之所在而阿諛求容諂莫甚焉孔叢子抗志篇以不善先人者謂之諂以不善和人者謂之諛荀勸學史楚祈父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲左昭十二陳勝起山東二世召諸生問叔孫通曰此特群盜狗偷鼠竊耳何足置之齒牙間郡守尉今捕論何足憂史本傳卑疵而前纖趨而言同上曰者傳非冇材能徒以婉佞貴幸佞幸傳並史衛侯言計非是而群臣和者如出一口夫不察事之是非而悅人讚己暗莫甚焉不度理之所在而阿諛求容諂莫甚焉通鑑周紀互見阿諛黃霸為相鶡雀飛丞相府霸以為神雀欲以聞西漢傳回面汙行以事諂諛之人鄒陽傳順旨為邪平恩侯許伯入第丞相御史將軍中二千石皆賀長信少府檀長卿起舞為沭猴與狗鬭從諛承意以順上旨宦媚邪臣欲以僥幸翟方進傳司馬長卿居茂陵未死時為一卷書曰有使來求書奏之其遺札書言封禪事司馬相如傳卑身賤體説色微辭愈愈詬詬志士仁人不忍為也東方朔傳並西漢曲辭諂媚東漢潘嶽與石崇諂事賈謐每候其出與崇輒望塵而拜晉書潘嶽傳司馬昭封晉王荀顗謂王祥曰相國尊重今日便當相帥而拜同上王祥傳有二孔雀自西苑飛集寶城朝堂前親衛校尉高德儒等十餘人見之奏以為鸞通鑑隋紀如脂如韋俯嘍匍匐噉惡求媚舐痔自親美言諂笑助其愈樂詐泣佞哀恤其喪紀同上盧思勞生論張昌宗以姿媚幸武后楊再思每曰人言六郎似蓮華非也正謂蓮華似六郎耳唐書楊再思傳唐明皇將幸東都而太廟屋壞姚崇曰此苻堅故殿也山有朽壤而崩木蠹而折理無足怪同上本傳太史令袁充表稱隋興以後晝日漸長景短日長振古希有是後百工作役並加程課日長故也通鑑互觀顏面多不盡公唐太宗太當博士蕭楚材等以為豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕唐高宗太子洗馬劉訥言嘗撰俳諧集以獻太子賢上謂侍臣曰朕嘗虛心求諫而竟無諫者何也李績對曰陛下所為盡善群臣無得而諫同上御醫沈高璆得幸於太后懷義心慍是夕密燒天堂延及明堂劉承慶請輟朝停酺以答天譴太后將從之姚璹曰昔成周宣榭卜代愈隆漢武建章盛德彌永唐武宗楊再思為御史專以諂媚取容張同休戲再思曰楊內史面似高麗再思欣然即剪紙帖巾反披紫袍為高麗舞舉坐大笑唐中宗宮中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下同上薛謙光獻武后所製豫州鼎銘其末云上玄降鑒方建隆基以為上受命之符姚崇表賀請宣示史官頒告中外唐元宗李適之性踈率李林甫嘗謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問李林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以李林甫為愛己薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脫適之由是束手矣唐元宗太清宮奏學士李琪見元元皇帝乘紫雲告以國祚延昌同上上嘗謂佛言報應果為有無元載等奏以國家運祚靈長非宿植福業何以致之福業已定雖時有小災終不能為害所以安史悖逆方熾而皆有子禍僕固懷恩稱兵內侮出門病死回紇吐蕃大舉深入不戰而退此皆非人力所及豈得言無報應也唐代宗李兼在江西有月進韋皋在西川有日進剌史進奉自兼始幕僚進奉自綬始唐德宗上御延英問宰相曰天下何時當太平牛僧孺對曰太平無象今四夷不至交侵百姓不至流散雖非至理亦謂小康陛下若別求太平非臣等所及唐文宗蝗自東而西蔽日所過赤地京兆尹楊知至奏蝗入京畿不食稼皆抱荊棘而死宰相皆賀唐懿宗太史奏太陽應虧不虧姚崇表賀請書之史册唐元宗並通鑑傳記談主上之聖明則君盡三五述宰相之英偉則臣皆二八史通集睮睮諛夫選諷諫詩折枝舐痔選絶交論吐言如傷屈體無骨梁張纘謝僕射表入門自媚駱賓王諂媚相與千顏一容元次山為人惠口而柔顏同上奴顏婢膝真乞丐陸龜蒙小人趨事必變顏色唐文粹本朝冠萊公為相丁謂出其門為參政會食都堂羹染公鬚謂起拂之遺事俯仰隨人如桔槔東坡詩中宗宴近臣祝欽明自請作八風舞搖頭轉目備諸醜態續世説則天不豫令閻朝隱往少室山祈禱朝隱乃曲申悅媚以身為犧牲請代上所苦魏元忠疾臥諸御史盡往省之郭霸獨居後請視便液曰大夫糞味甘或不瘳今味苦當即愈矣蠖屈鼠伏佞詞泉湧同上
