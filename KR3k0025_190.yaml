body:
  text: 婦道經子不宜其妻父母曰是善事我記內則子婦無私貨無私蓄無私器不敢私假不敢私與家事經於尊也在舅姑之所不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟凡婦不命適私室不敢退同上婦人不飾不敢見舅姑記檀弓互見舅姑婦事舅姑如事父母下氣怡聲問衣燠寒疾痛痾癢而敬抑搔之出入則或先或後而敬扶持之記內則互見舅姑婦將有事大小必請於舅姑記內則史婦聽而婉左昭六年鮑宣妻柏氏與宣共挽鹿車歸鄉里拜姑禮畢提瓮出汲修行婦道鄉邦稱之子永為魯郡太守永子昱問少君曰太夫人寧復識挽鹿車不對曰先姑有言存不忘亡安不忘危吾焉敢忘乎東漢列女傳班昭作女誡曰賴母師之典訓年十有四執箕帚於曹氏于今四十餘載矣戰戰兢兢常懼黜辱以增父母之羞以益中外之累夙夜劬心勤不告勞班昭年七十餘卒上疏遺令凡十六篇子婦丁氏為撰集之又作大家讚焉並同上姜詩事母至孝妻順奉九篤母好飲江水妻常泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慚呼還東漢姜詩妻傳互見人心易感女人之德嚴奉舅姑夙夜勤事婦之節也唐書傳記衛瓘子宣尚繁昌公主黃門讒構於是遂離主與姑書稱故新婦晉諸公贊古者子婦供事舅姑旦夕在側與男女無異北史顏氏家訓互見舅姑經克羞饋祀書酒誥采蘩夫人不失職也夫人可以奉祭祀則不失職矣詩采蘋大夫妻能循法度也能循法度則可以承先祖共祭祀矣詩于以奠之宗室牖下誰其尸之有齊季女詩采蘋集滌濯靜嘉禮儀孔明張平子東京賦奉蒸嘗以效順供洒掃以彌載潘安仁寡婦賦春秋祠祭主貴罇奠薦蠲潔歆明魂韓文經婦人能閔其君子猶勉之以正也詩汝墳室家能閔其勤勞勸以義也詩殷其雷穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣記檀弓史晉公子重耳過齊桓公妻之公子安之從者謀於桑下蠶妾以告姜氏姜氏殺之而告公子曰子有四方之志其聞之者吾殺之矣乃與子犯謀醉而遣之左僖二十二年齊侯遇杞梁之妻於郊弔之辭曰猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室襄二十三年互見弔慰晉伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難左成十五年晉公子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言左傳晉趙姬以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而己下之左僖二十四年僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫人必反其國必得志於諸侯左僖二十三年嫠不恤緯而憂宗周之隕左昭二十四年齊晉戰于鞌齊師敗績齊侯自徐關入女子曰君免乎曰免矣銳司徒免乎曰免矣曰苟君與吾父免矣可若何既而問之辟司徒之妻也與之石窌左傳互見封爵晏子為齊相出其御之妻從門而闚其夫其夫為相御意氣揚揚甚自得也既歸其妻請去曰晏子長不滿六尺身相齊國名顯諸侯今子長八尺乃為人僕御子之意自以為足是以求去史記晏子傳襄王以大史氏為王后襄王卒子建立后事秦謹與諸侯信故四十餘年不受兵始皇嘗使使者遺后王連環曰齊多知解此環否后以示群臣群臣不知解后引椎椎破之謝秦使曰謹以解矣戰國策公甫文伯官於魯病死婦為之自殺於房中者二八其母聞之不肯哭也相室曰焉有子死而不哭者乎母曰孔子賢人也逐於魯是人不隨今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言一也言者異則人心變矣同上李夫人病篤武帝自臨候之夫人蒙被謝曰妾久病形貌毀壞不可以見帝夫人姊妹讓之曰獨不可一見上屬托兄弟耶夫人曰不見帝者乃欲深托兄弟也以色事人者色衰則愛弛上所戀戀念我以平生容貌也今見我毀壞顏色非昔必且畏惡我尚肯復錄其兄弟哉西漢李夫人傳呂祿過其姑呂嬃嬃大怒曰若為將而棄軍呂氏今無處矣乃悉出珠玉寶器散堂下曰母為他人守也通監漢高后上始為微行嘗夜至柏谷投逆旅主人求漿主人翁曰無漿正有溺耳且疑上為姦盜聚少年欲攻之主人嫗睹上狀貌而異之止其翁曰客非常人也且有備不可圖也翁不聽嫗飲翁以酒醉而縳之少年皆散走嫗乃殺雞為食以謝客通監漢武紀秦王好淫聲葉陽后為不聽鄭衛之樂楚莊王好田獵樊姬為之不食鳥獸肉西漢張敞傳楚莊王好獵夫人樊姬數諫不止不食禽獸之肉二年王感之而勤於政事列女傳齊柏公淫樂衛姬為不聽鄭衛之聲同上昔陳嬰之母以嬰家世貧賤卒富貴不祥令嬰勿王王陵之母知漢王必得天下伏劍而死固勉強陵嬰母知廢陵母知興通監光武紀宣王晏起姜后脫簪齊柏好樂衛姬不音東漢王逸傳河南樂羊子尋師學一年歸妻跪問其故羊子曰久行懷思無他異也妻乃引刀趍機而言曰此織生自蚕繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失前功稽廢時月夫子積學若中道而歸何異斷斯織乎東漢列女傳楚昭王讌遊越姬從謂姬曰願與子生死若此姬曰君王樂遊要妾以死不敢聞命後王病太史請移於將相王曰將相於孤猶股肱也不聽姬曰大哉君王之德妾請從王死矣昔日遊樂是以不敢聽命今王復禮國人為君王死何況妾乎遂自殺東漢鮑宣妻柏氏裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮乃悉歸侍御服飾更著短布之裳東觀漢記應超取趙昂子月為質昂謂妻異曰吾謀如是事必萬全當柰月何異厲聲應曰雪君父之大恥喪元不足為重況一子哉通監漢獻紀梁鴻妻裝飾入門七日而鴻不荅乃跪床下請罪鴻曰吾欲裘褐之人可與俱隱深山者今乃衣綺縞傅粉墨豈鴻所願哉妻曰妾自有隱居之服乃更為椎髻著布衣操作而前東漢本傳若欲慕鮑宣梁鴻之高者妾亦請從少君孟光之事矣東漢列女傳先是丹陽太守李衡數以事侵琅琊王其妻習氏諫之衡不聽及琅琊王即位李衡憂懼謂妻曰不用卿言以至於此吾欲奔魏何如妻曰不可琅琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒非但直活而已衡從之吳主詔曰丹陽太守李衡以往事之嫌自拘司敗其遣衡還郡通監魏元帝亙範妻曰君前欲斬徐州剌史鄒岐眾人謂君難為作下今復羞為呂屈呂昭範復難為作上魏志曹爽傳初晉高祖司馬懿辭仕以風痺不能起居曝書遇雨高祖起收書家唯一婢見之張后懼言語泄漏乃手殺之而自執爨焉晉書柏玄后劉氏有智鑒謂玄曰劉裕龍行虎步視瞻不凡恐終不為人下不如早除之通監晉安帝紀山公與嵇阮契若金蘭山公妻韓氏覺二人異於常窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳世說王右軍妻郄夫人謂二弟愔曇曰王家見二謝安萬傾筐倒屣見汝輩來平平耳世說下互入鑒別符承祖方用事親姻爭趍附以求利其從母楊氏為姚氏婦獨否嘗謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂姊與之衣服多不受通監齊太祖皇子詡母胡充華初選入掖庭同列以故事祝之曰願生諸王公主勿生太子充華曰妾之志異於諸人柰何畏一身之死而使國家無嗣乎及有娠同列勸去之充華不可私誓曰若幸而生男次第當長男生身死所不憾也通監梁高祖竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族毅由是奇之及長以適唐公李淵通監陳紀長孫皇后素好讀書常與上從容商略古事因而獻替裨益弘多上或以非罪譴怒宮人后亦陽怒請自推鞠因命囚繫俟上怒息徐為申理由是宮壼之中刑無枉濫上得疾累年不愈后侍奉晝夜不離側常繫毒藥於衣帶曰若有不諱義不獨生后素有疾太子言於后曰醫藥備盡而疾不瘳請奏赦罪人及度人入道庶獲冥福后曰死生有命非智力所移若為善者有福則吾不為惡若其不然妄求何益及疾篤與上訣曰妾於陛下不豫之日誓以死從乘輿不能當呂后之地耳已卯崩于立政殿通監唐太宗長孫后嘗采自古婦人得失事為女則三十卷同上魏證薨命百官九品以上皆赴喪給羽葆鼓吹陪葬昭陵其妻裴氏曰證平生儉素今葬以一品羽儀非亡者之志悉辭不受以布車載柩而葬通監唐太宗蕭瑀子銳嗣尚上女襄城公主上欲為之營第公主固辭曰婦事舅姑當朝夕侍側若居別第所闕多矣上營玉華宮務令儉約惟所居欲覆以瓦餘皆茅茨充容長城徐惠以上東征高麗西討龜茲翠微玉華營繕相繼又服玩頗華靡上疏諫其略曰以有盡之農功填無窮之巨浪圖未獲之他眾喪已成之我軍昔秦王并吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非矜功恃大棄德輕邦圖利危士肆情縱欲之所致乎是知地廣非常安之術人勞乃易亂之源也雖復茅茨示約猶甚木石之疲和雇取人不無煩擾之弊珍玩技巧乃喪國之斧斤珠玉錦繡實迷心之酖毒作法於儉猶恐其奢作法於奢何以制後並同上上林令侯敏素諂事來俊臣其妻董氏戒之曰俊臣國賊指日將敗君宜遠之敏從之俊臣怒出為武龍令敏欲不往妻曰速去勿留俊臣敗其黨皆流嶺南敏獨得免通監唐武后上疾宦官欲請郭太后臨朝稱制太后曰昔武后稱制幾傾社稷我家世守忠義非武后之比也自古豈有女子為天下主能致唐虞之理通監唐敬宗太宗嘗與后論及賞罰之事后曰牝雞之晨惟家之索妾婦人豈敢預聞政事太宗固與之言竟不荅續世說后長孫氏互見禮法朱溫少孤與兄昱存隨母王氏依蕭縣劉崇家崇數笞辱之母獨憐之戒家人曰朱三非常人汝曹善遇之通監唐僖宗周行逢妻勛國夫人鄧氏曰稅官物也公為節度使不先輸稅何以率下且獨不記為里正代人輸稅以免楚撻時耶通監周世宗蜀李太后以典兵非其人謂蜀主曰今王昭遠出於廝養伊審微韓保貞趙崇韜皆膏粱乳臭子素不習兵徒以舊恩寘於人上一旦疆場有事安能禦大敵乎以吾觀之惟高彥儔太原舊人終不負汝自餘無足任者同上王珪與房杜善過其家珪母闚喜曰二客公輔才汝貴不疑唐書王珪傳互見母道傳記齊女徐吾者與其鄰婦合燭夜績吾貧而燭不屬鄰婦請無與夜徐吾曰妾以貧故起常先去常後掃陳席以待來者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光皆莫之能應遂復與夜績列女傳互入婦言老萊子隱於蒙山楚王親至其門其妻問荅曰楚王妻曰可食以酒肉者可加以鞭捶可受以官祿者可隨以鈇鉞先生受人官祿為人所制妾不能為人所制者妻乃去高士傳魯漆室邑之女過時未適人當穆公時君老太子幼女倚柱而嘯鄰婦曰何嘯之悲子欲嫁耶女曰吾豈為不嫁而悲哉吾憂魯君老而太子幼也列女傳樊嫟進言合德美容貌帝召入宮合德新沐膏九迴沉水香為卷髮號新興髻為薄眉號遠山黛施小朱號慵來粧左右嘖嘖嗟賞宣帝時披香博士淖方成白髮教授宮中號淖夫人在帝後唾曰此禍水也滅火必矣趙后外傳陳子定字子仲楚王遣使持金百鎰聘以為相仲子曰僕有箕帚之妻請入計之乃謂妻曰今日為相明日結駟連騎食方於前妻曰今日為相樂在中矣結駟萬騎所安不過容膝食方於前所甘不過一肉今以容膝之安一肉之味而懷楚國之憂亂世多害恐先生不保命也仲子夫妻逃去為人灌園皇甫謐高士傳陶大夫之治陶三年名譽不具家富三倍妻怒曰子能薄而官大是謂蒙害無功而家昌是謂積殃昔楚令尹治國家貧而國富君敬之民戴之故福祿終於子孫名垂後世今子貪富務大不顧後害請去列女傳周玘字孟玉弟子殺人被罪玘詣府與弟子俱盡於獄弟婦不哭其子但哭孟玉由此為高風俗通齊閔王之后項有大瘤號曰宿瘤初閔王出遊百姓盡觀宿瘤採桑如故王怪問對曰妾受父母教採桑不受教觀大王王命後乘載之女曰父母在內使妾不受教而隨王是奔女也王安用之王大慚使使者奉禮加金百鎰往聘贈之父母驚欲洗浴加衣裳女曰如是見王變容更服不見識也於是如故隨使者至閔王以為后列女傳互見堅貞樊姬感莊不食鮮禽衛女矯柏耳忌和音志厲義高而二主易心玄熊攀檻馮媛趍進夫豈無畏知死不𠫤班女有辭割歡同輦夫豈無懷防微慮遠張華女史箴集范傳正廉問宣池訪李白子孫獲孫女二人一為陳雲之室一乃劉勸之妻皆編戶甿也因召至郡告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞李太白集夫以匹婦之明猶能推事理之致探禍福之機嬰母知廢陵母知興王命論史聶政姉榮曰妾柰何畏歿身之誅終滅賢弟之名乃大驚韓市人大呼天者三而死政之旁晉楚齊衛聞之皆曰列女也史聶政傳榮一作嫈伍子胥奔吳至溧陽女子擊漂水上子胥過而乞餐女子飯壺漿而食之子胥去女子自投瀨水吳越春秋元帝幸虎圈後宮皆坐熊佚出圈攀檻左右皆驚走馮婕妤直前當熊而立上問何故前當熊對曰妾聞猛獸得人而止妾恐熊至御坐故以身當之漢書丹陽大都督媯覽殺太守孫翊欲逼取翊妻徐氏徐紿之曰乞須晦日設祭除服然後聽命覽許之徐氏潛使所親語翊親近舊將孫高傳嬰等與共圖覽到晦日設祭徐氏哭泣盡哀畢乃除服薰香沐浴言笑懽悅大小悽愴怪其如此覽密覘無復疑意徐氏呼高嬰置戶內使人召覽入徐氏出戶拜覽適得一拜徐大呼二君可起高嬰俱出共殺覽通鑑漢獻紀孫權以妹妻先主妹才捷剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入衷心常凜凜蜀志趙娥父為李壽所殺娥乃帷車袖劍白日剌壽於都亭訖詣縣顏色不變曰父讎已殺請受戮縣尹縱之娥不肯遂強載還家會赦得免魏志劉氏有膽略石勒與之參決軍事佐勒建功業有呂后之風而不妬忌更過之通鑑晉成紀孫恩陷會稽王凝之出走恩執而殺之并其諸子凝之妻謝道蘊弈之女也聞寇至舉措自若命婢肩輿抽刀出門手殺數人乃被執通鑑晉成紀朱序鎮襄陽苻堅遣將圍序母韓氏自登城行謂西北角當先受弊遂領百餘婢并城中女丁於其角斜築城二十餘丈賊攻西北角果潰眾便守新築城賊遂引退人謂此城為夫人城晉書同上周浚嘗出獵遇雨止李氏家會其兄弟不在李氏聞浚至與一婢於內宰豬羊具數十人之饌甚精辦而不聞人聲浚因求為妾生子顗晉書列女傳前涼張天錫疾美人閻姬薛姬皆自殺天錫每之曰我死之後更為人妻皆曰尊若不諱請效死於前洒掃於地下無它志十六國春秋陳高涼太守馮寶妻冼氏懷集部落數州晏然至隋王仲宣反嶺南高涼冼夫人救廣州獲全冊冼氏為譙國夫人開幕府于嶺南置官屬便宜行事通鑑梁紀互入封爵崔寧與楊子琳戰數不利崔寧妾任氏出家財數十萬募兵得數千人帥以擊子琳破之子琳走通鑑唐代宗嘿啜攻飛狐縣古元應妻能固守詔封循忠縣君新唐書列女傳互入封爵史思明之叛衛州女子侯滑州女子唐青州女子王相與歃血赴行營討賊皆補果毅同上平陽公主嫁柴紹初高祖兵具主與紹發家貲招亡命度河主引精兵萬人與秦王會渭北紹及主對置幕府分定京師號娘子軍唐書同上魏衡妻王氏武德初為薛仁果舊將房企地所逼而妻之企地侵梁郡飲酒醉王氏取其佩刀斬之攜其首入城賊散高祖封為崇義夫人舊唐列女傳互見封爵鄒保英妻奚氏萬歲年契丹賊李盡滅來寇平縣保英時任刺史領兵討擊既而城孤援寡將陷奚氏乃率家僮及城內女丁相助固守賊退封為誠節夫人同上互見封爵建中末李希烈謀襲陳州李侃為項城令以城小欲逃歸楊氏曰縣不守則地賊地也倉廩府庫皆其積也百姓皆其戰士也請募死士賊遂去縣卒完詔遷侃太平令唐書互見助夫竇毅女聞隋高祖受禪自投床下曰恨我非男子不能救舅家禍唐書竇后傳朱全忠夫人張氏碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵到中塗夫人以為不可遣一介召之全忠立為之返通鑑唐昭宗傳記元載敗妻王氏曰某道節度使女十八年宰相妻今日相公犯罪死即甘心使妾為春婢不如死也主司上聞俄亦賜死劉禹錫嘉話
