body:
  text: 審於趨向子非其往不往非其居不居揚學行適堯舜文王者為正道非堯舜文王者為他道楊問道史效伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩也效季良不得陷為天下輕薄子所謂畫虎不成殆類狗也東漢馬援傳宋袁淑賦詩曰種蘭忌當門懷璧莫向楚楚少別玉人門非種蘭所續世說又見宋書經譬彼舟流不知所屆詩小弁譬猶瞽之無相倀倀乎其何之譬如終夜有求於幽室之中非燭何見記仲尼燕居子曠安宅而弗居捨正路而不由孟離婁上楚人和氏得玉獻厲王王使玉人相之曰石也王以和為詐而則其左足及武王又獻之王使玉人相之又曰石也王又以為詐而刖其右足和乃抱璞而哭於楚山之下韓非子互入暗投擿埴索塗冥行而已矣揚修身捨舟航而濟乎瀆者末矣捨五經而濟乎道者末矣棄常珍而嗜乎異饌者惡覩其識味也委大聖而好乎諸子者惡覩其識道也揚吾子集昔齊王好竽有求仕於齊者操瑟而往立王之門三年不得入韓文荅陳商書行舟楫而不識四方兮涉大水之漫漫韓文閔巳賦互入失所依托泣漣三獻玉劉長卿經公事不私議記曲禮下公庭不言婦女同上朝言不及犬馬同上喪具君子恥具一日二日而可為也者君子弗為也記檀弓下子宓子賤為單父宰齊人攻魯道由單父父老請放民皆使出穫傳郭之麥可以益糧且不資寇三請而宓子賤不聽曰今茲無麥明年可樹若使不耕者得穫是民樂有寇也單父一歲之麥於魯不加強喪之不加弱使民有自取之心其瘡必數世家語互入知所輕重若魯子則可謂養志也孟離婁下季孫相魯六月掘長溝子路私飯之孔子覆其飯曰魯有民焉輒愛一作受之何也韓非子史楚成得臣伐陳城頓還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾左僖二十三年鄭簡公卒將為葬除司墓之室有當道者毀之則朝而塴不毀則日中而塴子太叔請毀之曰無若諸侯之賓何子產曰諸侯之賓能來會吾喪豈憚日中無損於賓而民不害何故不為遂弗毀日中而葬君子謂子產知禮禮無毀人以自成也左昭十二年晉韓宣子有環其一在鄭商宣子謁諸鄭伯子產弗與曰非官府之守器也寡君弗知左昭十六年韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬笑有為朕今袴豈特嚬笑哉吾必待有功者通監周紀沛公至咸陽諸將爭走金帛財物之府蕭何獨收秦圖書西漢蕭何傳上令周昌選趙壯士可令將者白見四人封各千戶以為將左右諫上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟通監曹參去齊屬其後曰以獄市為寄謹勿撓也西漢本傳文帝問天下一歲決獄幾何錢穀一歲出入幾何陳平曰各有主者上曰主者為誰乎曰陛下即問決獄責廷尉問錢穀責治粟內史西漢陳平傳冇獻千里馬者帝曰鸞旗在前屬車在後吉行五十里師行三十里朕乘千里馬獨先安之於是還其馬通監漢文紀田叔按梁事來還至霸昌廄取火悉燒梁之獄辭空手來見帝曰梁事有之乎對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味臥不安席此憂在陛下也通監漢景紀互入區處得當其治務在無為引大體不拘文法通監漢武紀明有所不見聰有所不聞西漢東方朔傳馮奉世以衛候使持節送大宛諸國遂以節諭告諸國王因發其兵南進擊莎車攻拔其城諸國悉平上甚悅議封奉世蕭望之以為奉世奉使擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比爭遂發兵要功百里之外為國家生事於夷狄漸不可長奉世不宜受封通監漢宣紀丙吉為丞相上寬大好禮讓不親小事時人以為知大體同上用臣衡議罷甘泉泰畤劉向曰家人尚不欲絕種嗣況於國之神寶舊畤且甘泉汾陰及雍五畤始立皆有神祇感應然後營之非苟而已也武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動前始納貢禹之議後人相因多所動搖易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之又以久無繼嗣冬十月庚辰上曰太后令詔有司復甘泉泰畤汾陰后土如故及雍五畤陳寶祠長安及郡國祠著明者皆復之通監漢成紀帝王之意不窺人閨門之私聽聞中冓之言同上何武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一馬援為隴西太守任吏以職但總大體諸曹時白外事援輒曰此丞掾之任何足相煩若大姓侵小民黠吏不從令此乃太守事耳東漢本傳設法禁者非能盡塞天下之奸皆合眾人之所欲也大抵取便國利事多者則可矣東漢桓譚宋均曰文吏習為欺謾而廉吏清在一己無益百姓流亡盜賊為害也通監漢明紀下邳周紆為雒陽令下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清通監漢章紀互入示人以意不畏強禦務舉大綱簡略苛細後漢宣秉傳昔文帝之於鄧通可謂至愛而猶展申屠嘉之志夫見任如此則何患於左右小臣哉通監漢殤紀諸葛亮嘗自校簿書主簿楊顒直入諫曰為治有體上下不可相侵古人稱坐而論道謂之王公作而行之謂之士大夫故丙吉不問橫道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體也明公為治乃躬自校簿書流汗終日不亦勞乎通監魏明紀互入不識大體楊阜召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎同上初丞相亮時有言公惜赦者亮荅曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啟告治亂之道多矣曾不語赦也若劉景升季玉父子歲歲赦宥何益於治通監魏舒為司馬昭參軍府朝碎務未嘗是非至於廢興大事眾人莫能斷者舒徐為籌之多出眾議之表通監魏紀顧和謂王導曰明公作輔寧使網漏吞舟何緣採聽風聞以察察為政邪通監東晉元紀王彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣通監晉穆紀謝安為政務舉大綱不為小察時人比安於王導通監晉武紀桓玄嘗欲以謝安宅為營謝琨曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅耶玄聞慚而止晉書謝琨傳謝弘微曰親戚爭財為鄙之甚今內人尚能無言豈可導之使爭乎通監齊太祖魏源懷性寬簡不喜煩碎常曰為貴人當舉綱維何必事事詳細譬如為屋但外望高顯楹棟平正基壁完牢足矣斧斤不平斲削不密非屋之病也通監梁高祖徐勉為吏部尚書嘗與文臣夜集客虞暠求詹事五官勉正色曰今宵止可談風月不可及公事時人服其無私通監梁武紀魏大旱散騎常侍邢巒奏昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐵為轡勒府藏之金裁給而已不復買積以費國資逮景明之初承升平之業四境清晏遠邇來同於是貢篚相繼商估交入諸所獻納倍多於常金玉常有餘國用常不足苟非為之分限但恐歲計不通自今請非要須者一切不受魏主納之通監梁武紀屈突通往隴西檢覆群牧得隱匿馬二萬餘匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜產之故殺千餘人臣敢以死請又頓首曰臣一身分死就陛下匄千餘人命帝感寤悉達等皆減死論通監隋高紀互入轉移人心牛弘問劉炫曰周禮士多而府史少今令史百倍於前減則不濟其故何也炫曰古人委任責成歲終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿恒慮覆治若鍜鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由省官不如省事官事不省而望從容其可得乎通監隋煬紀秦王世民每破軍克城諸將佐爭取寶貨玄齡獨收采人物致之幕府通監唐高紀益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時出鼠竊乃其常俗守苟能撫以恩信自然帥服安可輕動干戈漁獵其民比之禽獸豈為民父母之意耶竟不許通監唐太宗杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彝對曰設官分職各有所司果有愆違御史自應糾舉若徧歷諸司搜擿疵纇大為煩碎長樂公主將出降敕有司資送倍於永嘉長公主魏徵諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎鄧世隆袁請集上文章上曰朕之辭令有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無德政文章何為上謂房玄齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職比聞聽受詞訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射尚書左丞韋悰勾司農木橦價貴於民間奏其隱沒上召大理卿孫伏伽書司農罪對曰只為官橦貴所以私橦賤向使官橦賤私橦無由賤矣但見司農識大體不知其過也張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之並同上劉曉上疏論禮部取士專用文章為甲乙故天下之士皆捨德行而趍文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體文成七步未足化人況盡心卉木之間極筆煙霞之際以斯成俗豈非大謬通監唐高祖戴至德為右僕射劉仁軌為左僕射更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有冤結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取之通監唐高宗選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家彼皆庸人豈足當閫外之任李左車陳湯呂蒙孟觀皆出貧賤而立殊功未聞其家代為將也少府監裴匪舒善營利奏賣苑中馬糞歲得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也並同上尚方監裴匪躬檢校京苑將鬻苑中蔬果以收其利蘇良嗣曰昔公儀休相魯能拔葵去織婦未聞萬乘之主鬻蔬果也乃止通監唐武后狄仁傑同平章事太后謂仁傑曰卿在汝南甚有善政卿欲知讚卿者名乎仁傑謝曰陛下以臣為過臣請改之知臣無過臣之幸也不願知讚者名禁天下屠殺右拾遺張德生男三日私殺羊會同僚補闕杜肅懷一餤上表告之明日太后對仗謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭伏罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇人出肅表示之肅大慚舉朝欲唾其面劉知幾表陳四事其一以赦令不息近則一年再降遠則每歲無遺元日之朝指期天澤重陽之節佇降皇恩如其忖度咸果釋免或有名垂結正罪將斷決竊行貨賄方便規求故致稽違畢霑寬宥為善者不預恩光作惡者獨承徼幸古語曰小人之幸君子之不幸斯之謂也太后問鸞臺侍郎同平章事陸元方以外事對曰臣備位宰相若大事不敢不以聞人間細事不足煩聖聽由是忤旨並同上朱敬則為相以用人為先自餘細務不之視通監唐中宗宗楚客令袁守一奏言則天昔在三陽宮不豫狄仁傑奏請陛下監國元忠密奏以為不可上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎同上楊孚彈紏不避權貴權貴避之上曰鷹捕狡兔須急救之不爾必反為所噬御史繩奸慝亦然苟非人主保衛之則亦為奸慝所噬矣通監唐玄宗上命宋璟蘇頲為諸皇子制名及國邑之號又令別制一佳名及佳號進之璟等上言七子均養著於國風今臣等所制名三十餘輒混同以進以彰陛下覆燾無偏之德上甚善之山東大蝗盧懷慎以為殺蝗太多恐傷和氣崇曰昔楚莊吞蛭而愈疾孫叔殺蛇而致福奈何不忍於蝗而忍人之饑死乎若使殺蝗有禍臣請當之皇后妹夫尚衣奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而歐之傑上表上大怒命於朝堂杖殺以謝百僚以書慰傑互入徇公忘私上欲加牛仙客尚書張九齡曰不可李林甫言於上曰仙客宰相才也何有於尚書九齡書生不達大體上悅明日上曰卿嫌仙客寒微如卿有何閥閱九齡曰臣嶺海孤賤不如仙客生於中華然臣出入臺閣典司誥命有年矣仙客邊隅小吏目不知書若大任之恐不愜眾望前廣州都督裴胄先下獄上與宰相議其罪張嘉貞請杖之張說曰臣聞刑不上大夫為其近於君且所以養廉恥也故士可殺不可辱臣曏巡北邊聞杖姜皎於朝堂皎官登三品亦有微功有罪應死則死應流則流豈可輕加笞辱以皁隸待之乎事往不可復追胄先據狀當流豈可復蹈前失上深然之並同上上嘗從容與李泌語及李林甫欲敕諸將克長安發其冢焚骨揚灰泌曰陛下方定天下奈何讎死者彼枯骨何知徒示聖德之不弘耳通監唐肅宗上又謂李泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宮以慰上皇心對曰宜待上皇之命不過晚歲月之間耳上從之王去榮以私怨殺本縣令當死上以其善用礮免死中書舍人賈至不即行下上表以為去榮無狀殺本縣之君若以礮石一能則免殊死今諸軍技藝絕倫者其徒實繁必恃其能所在犯上復何以止之今惜一去榮之才而不殺必殺十如去榮之才者不亦其傷益多乎並同上裴諝入奏事上問榷酤之利歲入幾何諝久之不對上復問之對曰臣自河東來所過見菽粟未種農民愁怨臣以為陛下召臣必先問人之疾苦乃責以營利臣是以未敢對也通監唐代宗京兆尹黎幹奏秋霖損稼韓滉奏幹不實渭南令劉澡阿附度支稱縣境苖不損上曰霖雨溥博豈得渭南獨無命御史視之損三千餘頃代宗嘆息久之曰縣令字人之官不損猶應言損乃不仁如是乎不癡不聾不為家翁兒女閨房之言何足聽也朱泚獻貓鼠同乳不相害者以為瑞常袞帥百官稱賀中書舍人崔祐甫獨不賀曰物反常為妖貓捕鼠乃其職也今同乳妖也何以賀為並同上代宗將發引上送之見轀輬車不當馳道稍指未丁之間問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行通監唐德宗天不以地有惡木而廢發生天子不以時有小人而廢聽納以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之奸邪役智彌精失道彌遠項籍納秦卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦己甚矣漢高豁達大度天下之士至者納用不疑其於備虞可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荊軻奮其陰計光武寬容博厚而馬援輸其款誠豈不以虛懷待人人欲思附任數附物物終不親情思附則感而悅之雖寇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣智出庶物冇輕待人臣之心思周萬機有獨馭區㝢之意謀吞眾略有過慎之防明照群情有先事之察嚴束百辟有任刑政之規威制四方有以力勝殘之志劉從一詣蕭復曰欽緒宣旨令從一與公議朝來所言事即奏行之勿令李盧知復曰李盧不堪為相乃罷之既在相位安得不與之同議李泌曰宰相之職不可分也非如給事則有吏過兵過舍人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也並通監裴垍為相奏天下留州送使物垍一切用省估通監唐憲宗宰相議誅李錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟乂曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎宰相以為然盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房元齡康誥曰父子兄弟罪不相及李絳言魏博五十餘年不霑皇化一旦舉六州之地來歸刳河朔之腹心傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四鄰勸慕請發內庫錢百五十萬緡以賜之左右宦官以為所與太多後有此比將何以給之上以詔絳絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下奈何愛小費而遺大計不以收一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取期年而克之其費豈止百五十萬緡而已乎並同上李愬既執送吳元濟裴度建彰義軍節擁降卒萬餘人以入焉李愬具櫜鞬候度馬首度將避之愬曰此方不識上下等威之分久矣請公因以示之度以宰相禮受愬謁眾聳觀焉明日愬以師還文成柵度乃視節度使觀察及刺史事蔡人大悅唐書高郢掌制誥家無留藁或勸盍如前人傳制集者荅曰王言不可藏私家唐書本傳上謂宰相薦人勿問親疏朕聞竇易直為相未嘗用親故果賢避嫌而棄之是亦不為至公也通監唐文宗上對柳公權等於便殿上舉衫袖示之曰此衣已三澣矣眾皆美上之儉德公權獨無言上問其故對曰陛下貴為天子富有四海當進賢退不肖納諫諍明賞罰乃可以致雍熙服澣濯之衣乃末節矣同上李師道上私錢六百萬為魏證孫贖故第白居易言陛下宜以賢者子孫贖而賜之師道人臣不宜掠美唐書白居易傳樂工羅程善琵琶恃恩暴橫以睚眥殺人繫京兆獄諸樂工欲為之請曰羅程負陛下萬死然臣等惜其天下絕藝不復得奉宴遊上曰汝曹所惜者羅程藝朕所惜者高祖太宗法竟杖殺之通監唐宣宗李德裕節制西川吐蕃以維州降牛僧孺曰吐蕃失一維州未足損其勢得百維州何所用之徒使棄信有害無利此匹夫所不為詔使德裕反降者唐書別見私意衡王友諒貴重李振等見皆拜之李愚獨長揖帝聞而讓之曰衡王於朕兄也朕猶拜之卿長揖可乎對曰陛下以家人禮見衡王拜之宜也振等陛下家臣臣於王無私敬不敢妄有所屈通監後梁均王遇赦則曲者幸免直者銜冤冤氣升聞乃所以致災非所以弭災也通監五代晉高祖或言營田鬻之可得錢十萬緡以資國帝曰利在於民猶在國也朕用此錢何為通監後周太祖帝政事無小大皆親決百官受成於上而已河南推官高錫上書諫以為四海之廣萬機之眾雖堯舜不能獨治必擇人而任之今陛下以一身親之天下不謂陛下聰明睿智足以兼下官之任皆言陛下褊迫疑忌舉不信群臣也不若選能知人公正者以為宰相能愛民聽訟者以為守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下何必降君尊而代臣職無乃失為政之本乎通監五代周世宗集天子不問有無諸侯不言多少百乘之家不畜聚歛之臣陸宣公文昔人所以掩絕纓而飲盜馬者豈必忘其情愛蓋知為君之體然也同上善醫者不視人之瘠肥察其脈之病否而已矣善計天下者不視天下之安危察其紀綱而已矣是故四肢雖無故不足恃也脈而已矣四海雖無事不足矜也紀綱而已矣韓文以志為養兮何有牛羊周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名晢曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也唯宦官宮妾乃不敢言諭及機以為觸犯士君子立言行事宜何所法守也凡事父母得如曾參可以為孝矣作人得如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦官則是宦官宮妾之孝於其親賢於周公孔子曾參者耶並同上本朝仁宗初立英宗為皇子令中書召學士草詔學士王珪當直召至中書諭之王曰此大事也必須面奉聖旨於是求對明日面稟得旨乃草詔群公皆以王真得學士體歐公集尹師魯凡事有小而可矜者必惻然不忍發見顏貌及臨大節斷大事則必如金石雖鼎鑊前列不可變也歐公撰墓表互入勇大怯小朝議在官年七十而不致仕有司以時按籍舉行胡宿以為養廉恥厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其事使人得自言而全其美節歐公撰胡宿墓誌陳執中為相范蜀公嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今陰陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之范鎮墓誌歐陽脩余靖蔡襄王素欲引石介范文正公曰介為諫官必以難行之事責人君以必行少拂其意則引裾折檻叩頭流血無所不為主上無失德政事自修安用如此諫官諸公伏其言東軒筆錄韓魏公為相日曾公為亞相趙康靖與歐陽公為參政凡事該政令則曰問集賢該典故則曰問東廳該文學則曰問西廳至於大事則自決之人以為得宰相體塵史有人欲為范希文買綠野堂希文不肯曰在唐如晉公者是可尊也一旦取其物而有之如何得安寧使耕壞及它有力者致之己則不可取言行錄日月經天大可以被四海而小或不能入一屋之下彼固無用此區區之小明也老泉昔謝安破苻堅書至安與客圍棊不輟曰小兒輩已遂破賊安亦非矯情蓋萬目觀望事體應爾東坡論擒獲鬼章稱賀太速劄子寧容網自漏吞舟誰能烹鮮作苛碎後山周世宗嘗作詩以示學士竇儼曰此可宣布否儼曰詩專門學王者若厲精叩課有妨機務苟切磋失至又不盡善世宗解其意遂不作詩楊億談苑劉綽天聖中為京西漕分遣屬官盤量諸郡在庾之糧凡收十餘萬石歸朝上殿具劄子乞付三司收繫時章獻太后垂簾問曰已盤量者條貫許再盤量否曰向來盤量官多徇顏情不肯盡收入曆又曰卿識王曾張知白呂夷簡魯宗道否此四人者皆不因盤量收出斛斗致身于此劉大慚謂人曰當是時殿上壁罅可入我亦入矣
