body:
  text: 克紹經子克家易蒙卦裕父之蠱易蠱卦幹父之蠱同上篤前人成烈書洛誥公劉克篤前烈書武成無忝祖考書君牙汝克昭乃顯祖書文侯之命召公是似詩江漢維其有之是以似之變小雅裳二者華纘戎祖考詩烝民國人稱願然曰幸哉有子如此所謂孝也已禮祭義良冶之子必學為裘良弓之子必學為箕禮學記父作之子述之記中庸孟莊子之孝也其他可能也其不改父之臣與父之政是難能也語子張立身行道揚名於後世以顯父母孝經子譬之若山木枝葉必類本荀富國史洪宣祖業左序無廢先君之功左隱三世濟其美不隕其名左文十八知徐吾趙朝韓固魏戊餘子之不失職能守業者也左昭二十八趙括能讀其父書傳史記趙奢傳田叔為魯相卒魯人以百金祠少子仁不受曰無以百金傷父名史記田叔傳董仲舒子及孫皆以學至大官史儒林傳靈帝謂楊震孫奇曰卿強項真楊震子孫後漢鮑永子昱拜司隸光武曰吾欲令天下知忠臣子復為司隸後漢本傳夏侯霸曰榮立家門通監三國魏紀山簡性溫雅有父風晉書互入文雅劉孝綽七歲能屬文父繪齊時掌詔誥孝綽年十四繪常使代草之南史宋書世祖常問王儉當今誰能作五言詩對曰謝朏得父之膏腴齊書越公兒郎故有家風隋書楊供傳互入閥閱子弟類小家蓄產百萬之資子孫尚恥愧失其先業通監五十五漢紀李廣有孫陵為侍中善騎射愛人下士帝以為有廣之風為騎都尉通監西漢武紀隋賀若弼父敦仕周為金州摠管臨刑呼弼曰吾將平江南此心不果汝當成吾志後弼與韓擒虎同平陳隋書馬璘讀馬援傳至丈夫當死邊野慨然曰使吾祖勳業墜地下乎卒為中興名將新唐書柳玼有父風唐書本傳陳餘慶方雅有祖風唐書歐陽通詢之子母徐氏教以父書晝夜無倦遂亞於詢唐書謨之論議挺挺有祖風烈魏證傳宋之問父令文富文辭且工書有力絕人世稱三絕既之問以文章起其弟之悌以蹻勇聞之遜精草隸世謂皆得父一絕唐書趙道興遷左武候明閑宿衛太宗曰卿父為隋武候有當官之譽卿今克傳弓冶可謂不墜家聲唐書柳公綽之子仲郢有父風牛僧孺曰非積習名教何以致此唐書李晟克京師市不改肆愬平蔡亦如之功名之奇近世所未有唐書互見紀律內集各紹堂構能負析薪陳琳檄箕裘之業載隆燕翼之謀不殞陳子昂家聲器宇存杜詩家聲肯墜地利器當秋毫杜詩籍籍名家孫杜詩烜赫舊家聲杜詩克家何妙年杜詩嶷然大賢後復見透骨清杜詩益求發聞去聲俾家聲不頹劉賓客集公胚胎前光生長食息不離典訓之內目濡耳染不學以能韓文太師之平汴州年老益高挈持維綱耡削荒纇納之大和而已其囊篋細碎無所遺漏繄公之功韓文見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好靜秀瑤環瑜珥蘭茁其牙稱其家兒也韓文懿哉能世其家劉賓客襲弓裘而稟詩禮似水木之有本源白樂天服名教乃保家之子同上生於清談克肖素風杜牧之集清風素範克肖家聲同上紹復丕績不墜厥祀柳漢銘楊公莫訝清無業家有驪珠不復貧元微之身雖不貴有後斯榮唯公之嗣實大家聲李習之韋玄方繼相荀爽復齊名張九齡文趙孟慕成季之勳復能霸晉亞夫紹絳侯之武亦克擒吳唐段文昌淮西碑本朝克家傳眾子欒城集承家從昔如君少陳後山諸郎有父風山谷經蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡王若曰惟爾率德改行克謹厥猷爾尚蓋前人之愆惟忠惟孝書蔡仲之命史沈勁充之子也勁以其父死於逆亂志欲立功以雪舊恥燕人逼洛陽陳祐留勁以五百人守洛陽勁喜曰吾欲致命今得之矣恥父之惡致死以滌之變凶逆之族為忠義之門通監晉哀帝盧元輔杞之子簡潔貞方人不以父之醜行為累人人歸美舊唐書盧杞傳經女雖湛樂從弗念厥紹詩變大雅抑于嗟乎不承權輿詩秦風子孫弗率書伊訓不德罔大墜厥宗書伊訓忝厥祖書太甲上子弗祗服厥父事大傷厥考心書康誥厥父母勤勞稼穡厥子乃弗知稼穡之艱難書無逸遏佚前人光絕失也書君奭若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫書大誥荒墜厥緒覆宗絕祀書五子之歌史其父析薪其子弗克負荷左昭七行莫醜於辱先西漢司馬遷李陵生降隤其家聲司馬遷傳音頹時漢成帝無嗣政由王氏劉向遂上封事極諫王氏與劉氏不並立如下有泰山之安則上有累卵之危向卒子歆王莽舉為侍郎莽持政留歆為右曹建平元年改名秀及莽篡位歆為國師西漢本傳為人後嗣守人功業如此豈不負哉通監三十三漢成紀祖約逖之弟也逖卒代逖為西平將軍豫州剌史王敦舉兵約歸衛京師自以名輩不後郄卞又望開府及所表請多不見許遂懷怨望及蘇峻舉兵遂推崇約約聞大喜峻剋京都以約為侍中後奔石勒而死晉書本傳房杜平生勤苦僅能立門戶遭不肖子蕩覆無餘通監唐紀三百李勣疾謂弟弼曰我見房元齡杜如晦高季輔皆辛苦立門戶亦望貽後悉為不肖子敗之新唐書本傳狄仁傑為魏州剌史有惠政百姓為之立生祠後其子景暉為魏州司功參軍貪暴人患之遂毀其像焉通監二百七唐中宗房元齡之子遺愛尚唐太宗女遺愛驕恣謀黜其兄遺直奪其封爵永徽中誣告遺直無禮於己高宗令長孫無忌鞠其事因得公主與遺愛謀反之狀遺愛伏誅舊唐書本傳杜如晦子構襲爵慈州剌史坐弟荷謀逆徙於嶺表同上傳記韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實互見不學不肖子弟有三變第一變為蝗虫謂鬻庄而食第二變為蠹魚謂鬻書食第三變為大虫謂賣奴婢而食三食之輩何代無之北夢瑣言集門緒不昌任彥昇書咨汝之胄出門戶何巍巍不修其操行賤薄似汝稀何不忝厥祖靦然不知歸韓文經遭家不造詩閔予小子史欒郤胥原狐續慶伯降在皂隸左昭三年叔向曰盼之宗十一族惟羊舌氏在而已同上魏徵玄孫稠貧甚以故第質錢於人通監唐紀五十三帝停叔玉昏而仆所為碑顧其家衰矣唐魏徵傳集門衰祚薄選李令伯陳情表承先人之後者在孫惟汝在子惟吾韓氏兩世惟此而已韓文祭兄十三郎老成文經其父攘羊而子證之論語史樂盈曰陪臣書能輸力於王室其子黶不能保任其父之勞左襄二十一宋華耦曰君之先臣督得罪於宋殤公名在諸侯之策左文十五經貽厥孫謀以燕翼子詩垂裕後昆書仲虺之誥克昌厥後詩邁跡自身克勤無怠以垂憲乃後書蔡仲之命身其康強子孫其逢吉書洪範子不為子孫留財列子楊朱史故襲天祿子孫賴之左昭二十八晏子將死鑿楹納書謂妻曰楹記日也子壯而示之晏子春秋叔向曰昔欒武子無一卒之田其官不備其宗器宣其德行順其憲則以免於難及桓子驕泰奢侈貪欲無藝宜及於難而賴武之德以沒其身國語晉語平當為相上欲封當病篤不應召或謂當不為子孫耶當曰吾居大位而己負素餐起受侯印還臥而死死有餘罪今不起者所以為子孫也前漢互見括退疏廣乞骸骨上賜黃金二十斤或勸廣以其金頗為子孫立產業者廣曰吾豈老誖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增置之以為嬴餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者眾之怨也吾既亡以教化子孫不欲益其過而生怨西漢疏廣傳韋玄成繼父賢為相鄒魯謳曰遺子黃金滿籯不如教子一經西漢本傳文帝戒太子曰即有緩急周亞夫真可任將兵及七國反書聞上乃拜中尉周亞夫為太尉將軍往擊吳楚通監十六漢景紀薛廣德歸縣其安車以傳示子孫為榮通監二十八漢元紀龐公釋耕於壟上妻子耘於前劉表問先生苦於畎畝而不肯官祿後世何以遺子孫乎龐公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也後漢楊震性廉子孫常蔬食步行或欲令開產業震曰使後世稱為清白吏子孫以此遺之不亦厚乎東漢本傳宋高祖微時躬耕於丹徒及受命耕耨之具頗有存者皆命藏之以留於後南史本傳張緒謂齊柳世隆曰君當以清名遺子孫耶荅曰一身之外亦復何須子孫不才將為爭府如其才也不如一經南史高歡曰堪敵侯景者唯有慕容紹宗我故不貴之留以遺汝通監百五十九梁高祖互見遠慮房彥謙謂子元齡曰人皆因祿富吾獨以官貧所遺子孫在於清白耳隋本傳上謂太子曰李世勣才智有餘然汝與之無恩恐不能懷服我今黜之若其即行俟我死汝於後用為僕射親任之若徘徊顧望當殺之耳通監百九十九唐太宗紀張嘉貞不營家產有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子孫酒食之資吾不取也聞者是之通監唐元宗紀互入知足夫名門右族莫不由祖考忠孝恭儉以成立之唐書柳玭傳應劭曰書欒賢而覆黶幽通賦注見文選家世貧儉先人遺訓常恐置產怠子孫故家無樵蘇之地元徽之後貴有金玉必不為汝藏崔昭生崔芸李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵杜牧之互入不克紹
