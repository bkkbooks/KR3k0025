body:
  text: 示人以意經挈壺以令軍井挈轡以令舍挈畚以令糧周禮夏官挈壺氏前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅記曲禮上成王有過則撻伯禽記文王世子陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之孺悲欲見孔子孔子辭以疾將命者出戶取瑟而歌使之聞之並陽貨子宓子賤為單父宰恐魯君聽讒使己不得行其政請君之近吏二與之俱至官宓子戒其邑令二吏方書掣其肘書不善則怒之二吏辭歸魯魯君以問孔子子曰意者以此為諫乎公寤使告宓子曰自今以往單父非吾有也從子之制有便於民子決為之家語屈節篇孟子去齊宿於晝有欲為王留行者坐而言不應隱几而臥孟公孫丑下絶人以玦反絶以環荀子越王勾踐欲伐吳欲民輕死生見鬭蛙乃下軾從者曰王何敬也曰以其勇氣故也其後國人輕命死戰韓非子越王勾踐謀報吳欲人之勇路逢怒蛙下車而揖之尹文子舜藏金千斤於嶄岩之下所以塞貪鄙之心淮南子齊莊公出獵有一蟲舉足將搏其輪問其御曰此何蟲也對曰此謂螳螂者也其為蟲也知進而不知卻不量力而輕敵莊公曰此為人必為天下勇武矣回車而避之勇武聞之知所盡死矣淮南子人間訓史楚侵鄭穿封戍囚黃頡公子圍與之爭正於伯州犁犁曰請問於囚乃立囚上其手曰夫子為王子圍寡君之貴介弟也下其手曰此為穿封戍方城外之縣尹也誰獲子囚曰頡遇上子弱焉左襄二十八秦穆公使孟明視等襲鄭侵晉渡河焚舟大敗晉人史記燕昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趍燕史燕世家楚懷王使項羽為將軍伐秦羽兵渡河皆沈船破釜甑廬舍持三日糧以示士卒必死於是大破秦軍史記上封大功臣其餘爭功不決未得行封諸將偶語張良曰上所憎誰甚曰雍齒良曰今先封齒以示群臣群臣皆喜西漢張良傳漢高祖怨丘㛐之轑釜乃封其子為羹頡侯楚元王傳互入報怨朱虛侯章曰深耕概種立苗欲疏非其種者鋤而去之通鑑漢高后其得漢繒絮以馳草棘中衣袴皆裂敝以示不如旃裘之完善也得漢食物皆去之以示不如湩酪之便美也通監漢高后帝居禁中召周亞夫賜食獨置大載無切肉又不置箸亞夫心不平顧尚席取箸上視而笑曰此非不足君所乎通鑑漢景紀萬石君子孫有過不誚讓為便坐對案不食諸子相責因長老肉袒固謝罪改之西漢本傳互入陰驅默化又入教子薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使群臣喪服往哭之乃自殺通鑑漢文紀胸奴徙蘇武北海上無人處使牧羝曰羝乳乃得歸通鑑漢武紀詔求微時故劍大臣知指白立許倢妤為皇后通鑑漢宣紀韋賢薨長子弘有罪繫獄家人矯賢令次子大河都尉玄成為後玄成深知其非賢雅意即陽為病狂臥便利妄笑語昏亂既葬當襲爵以狂不應召同前嚴君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因執導之以善西漢上欲封諸舅太后不聽但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣緑㡚領袖正白顧視御者不及遠矣故不加譴怒但絶歲用而已冀以默愧其心通鑑漢章紀周紆為雒陽下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚局蹐京師肅清通鑑漢章紀龐參為漢陽太守郡人任棠有奇節隱居參侯之棠不與言但以薤一大本水一孟置戶屏前自抱孫兒伏於戶下主簿白以為倨參思之曰水者欲吾清也技大本者欲吾擊強宗也抱兒當戶欲吾開門恤孤也後漢繆彤兄弟四人皆同財業及各娶妻諸婦遂求分異又數鬭爭彤乃掩戶自撾曰繆彤不能正家弟及諸婦聞之悉扣頭謝罪漢書皇天不言以文家設教後漢裴楷傳魏于禁降關羽會吳孫權禽羽禁在吳吳稱藩遣禁還拜為安遠將軍欲遣使吳先令北詣鄴謁高陵帝使豫於陵屋畫關羽戰克龐德憤怒禁降伏之狀禁見慚恚發病薨魏志張郃傳范粲陽狂不言子孫常侍左右至有婚宦大事輒密咨焉合者則色無變不合則眠寢不安妻子以此知其旨不言三十六載晉書吐谷渾王阿柴疾召諸子二十人各獻一箭取一箭與其弟使折之其弟折之又取十九箭使折之不能折阿柴曰汝知之乎孤則易折衆則難摧汝曹戮力一心然後可以保國寧家通鑑晉紀互入衆力易成顏延之作五君詠以述竹林七賢山濤王戎以貴顯被黜宋書王儉作長梁齊制度小過王僧虔視之不悅竟不入戶儉即日毀之通鑑齊太祖互入人心易感金州刺史滕王元嬰驕奢縱逸居亮陰中畋遊無節數夜開城門勞擾百姓或引彈彈人或埋人雪中以戲笑上賜書切讓之不致於法書丁上考以愧其心元嬰與蔣王惲皆好聚斂上嘗賜諸王帛各五百段獨不及二王敕曰滕叔蔣兄自能經紀不須賜物給麻兩車以為錢貫二王大慚通鑑唐紀何易于為益昌令太守崔朴遊宴江上索民挽舟易于腰笏挽馬太守問狀對曰民方耕桑不可役縣令間暇當任其勞朴慚乃罷唐書李林甫居相位諫官無敢言者杜璡以上書言事斥林甫因以語動其餘曰君等獨不見立仗馬乎終日無聲飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎唐書李林甫傳傳記燕昭王遣使齎千金市千里之馬未至而馬死使者買死馬之首以歸王大怒使者曰死馬尚市之況生者乎天下必知君之好也馬將至矣於是朞年而千里馬至者三焉戰國策魏文侯令樂羊將而攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語互入毀謗及不信讒武王伐紂過壑斬山過水拆舟過谷發梁過山焚萊示民無返志說苑楚莊王好獵夫人樊姬數諫不止乃不食禽獸之肉二年王感之而勤於政事古列女傳齊桓公好樂衛姬為不聽鄭衛之聲同上舜損珠玉於五湖之淵杜淫邪絶覬媚之情也陸賈新語晏平仲以齊君奢故浣其朝冠振其鹿裘風俗通集田子方出見老馬於道問馬其御曰故公家畜也罷而不用出而放之子方曰少盡其力老棄其身仁者不為也以束帛贖之窮士聞之知所歸心矣見五臣注文選本朝仁宗朝三司使請榷河北鹽仁宗批奏牘後不許時賈昌朝守北都至即刻石於府園癭木亭上及賈公再守魏而提刑薛向密奏行榷法託以他事入議賈公具知其計及其還置酒邀之中食引至癭木亭相對酒五行無他語向顧見刻石知事已露遂不復議榷事龍川志子將欲吸之必固張之將欲取之必固與之老子夫狐之搏雉也卑體弭耳以待其來也雉見而信之故可得而禽也使狐瞋目見其必殺之勢雉亦知撣遠飛以避其怒矣淮南子史鷙鳥之擊必匿其形史越世家美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂讚諸鄭伯曰美城其賜邑將以叛也申侯由是得罪左僖鄭子元伐鄭懸門不發楚言而出子元曰鄭有人焉楚師夜遁左莊二十八楚子享公好以大屈弓既而悔之遠啓彊聞之見公公語之拜賀公曰何賀曰齊與晉越欲此久矣寡君無適與也而傳諸君其備禦三鄰慎守寶矣公懼乃反之左昭七智伯請地於韓康子假規曰周書曰將欲敗之必姑輔之將欲取之必姑與之主不如與之以驕智伯然後可以檡交而圖智氏矣通鑑周紀楚大發兵加齊齊王使淳于髡之趙請救兵齎金百斤車馬十駟淳于髡仰天大笑冠纓索絶王曰先生少之乎髡曰何敢王曰笑豈有說乎髡曰今者臣從東方來見道旁有禳田者操一豚蹄酒一孟祝曰甌簍滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是齊威王乃益齎黃金千鎰白璧十雙車馬百駟髡辭而行史記滑稽傳楚優孟嘗以談笑諷諫楚莊王有愛馬死使群臣喪之欲以棺椁大夫禮葬之左右爭之不可孟入殿門仰天大笑曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為椁梗楓豫章為題揍發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼其後廟食太牢奉以萬戶之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎乃使以馬屬太官無令天下久聞也史滑稽傳燕將騎劫攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘壟墓燒死人即墨從城上遙見涕泣其欲出戰怒皆十倍因大敗燕史記田單相齊過淄水有老人涉淄而寒出水不能行田單解其裘而衣之襄王惡之曰田單之施於人將欲以取我國乎不早圖恐後之變也有貫珠共曰王不如因以為己善嘉單之善下令曰寡人憂民之飢也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單憂之稱寡人之意王曰善乃賜單牛酒後數日貫珠者復見王曰王朝日宜召田單而揖於庭口勞之乃布令求百姓之飢寒者收穀之乃使人聽於閭里聞丈夫之相與語者曰田單之憂人嗟乃王之教也通鑑周紀魏與趙攻韓韓告急於齊使田忌將而往直走大梁魏將龐涓聞之去韓而歸齊孫臏使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龐涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃與輕鋭倍日併行逐之史記蘇秦說趙肅俟恐秦兵之至趙也乃激怒張儀入之於秦史蘇秦傳齊大夫使人刺蘇秦求賊不得秦且死謂王曰臣即死車裂臣以徇於市曰蘇秦為燕作亂於齊如此則臣之賊必得矣如其言而殺蘇秦者果自出齊王因而誅之史本傳張良說漢王曰王何不燒絶所過棧道示天下無還心以固項王意乃使良燒絶棧道項羽以此無西憂漢乃發兵北擊齊史留侯世家張良遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺項王曰齊欲與趙并滅楚項王以此故無西意而擊齊通鑑漢高紀韓信擊趙乃使萬人先行出背水陳趙兵望見大笑開壁擊之大戰信棄鼓旗走水上軍軍皆殊死戰不可敗破趙軍斬成安君西漢韓信傳陷之死地而後生投之亡地而後存同上互入舍失求得亞父勸羽急攻滎陽漢王患之項王使至漢陳平使為太牢具舉進見楚使即佯驚曰吾以為亞父使乃項王使復持去更以惡草具進楚使歸具以報項王項王果大疑亞父通鑑漢高紀楚軍食少項王患之乃為高俎置太公其上告漢王曰今不急不吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一柸羹同前朱虛侯章忿劉氏不得職常入侍太后燕飲令章為酒吏章自請曰臣將種也請得以軍法行酒諸呂有一人醉亡酒章追拔劍斬之而還通鑑漢高后紀陳平使人劫酈商令其子寄往紿說呂祿曰今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也通監漢高后王生在廷中謂張釋之曰吾襪解為我結襪釋之跪而受之或讓生生曰廷尉天下名臣吾聊使結襪欲以重之諸公聞之賢王生而重釋之西漢吳王詐病不朝賜以几杖張武受賂金錢更加賞賜以愧其心並前漢文帝贊龔遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治通鑑漢宣紀人棄我取人取我豫西漢班固貨殖傳古人有言曰天下皆知取之為取而莫知與之為取東漢談傳景恭曰漢家箭神其中瘡者必有異虜中矢者視瘡皆沸大驚胸奴震怖相謂曰滿兵神真可畏也通監漢明紀廣陵賊張嬰冠亂梁冀以張綱為廣陵太守率多求兵馬綱獨請單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門外罷遣吏兵獨留所親者十人以書諭嬰請與相見嬰見綱至誠乃出拜謁通監漢順紀虞詡為武都太守羌率衆數千遮詡於陳倉崤谷詡令吏士各作兩竈日增倍之羌不敢逼後漢書曹操攻呂布軍敗布騎得操而不識問曰曹操何在操曰乘黃馬走者是也布騎乃釋操而追黃馬者操突出引還通監漢獻紀入當面蹉過夫能屈以為伸讓以為德弱以為強鮮不遂矣通鑑魏明紀後秦主萇還安定秦主登就食新平率衆萬餘圍萇營四面大哭萇命營中哭以應之登乃退通監晉武紀顏竣起宅延之謂曰善為之無令後人笑汝拙也通鑑宋世祖侯景與宇文泰合戰泰墜地東魏兵追及之左右皆散都督李穆下馬以策杖泰背罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人舍之通鑑梁高祖慕容紹宗擊侯景景衆大潰爭赴渦水使謂紹宗曰景若就擒公復何用同前唐高祖與李密書曰名利之地鋒鏑縱橫深慎垂堂勉茲洪業密得書甚悅曰唐公見推天下不足定於是不虞義師而專意於世充唐書李密傳長孫順德受人餽絹太宗於殿廷賜絹數十匹上曰彼有人性得絹之辱重於受刑如不知愧一禽獸耳通鑑唐太宗紀顏真卿為平原守安祿山逆節頗著真卿以霖雨為托修城浚濠乃陽會多士泛舟於池飲酒賦詩或讒於祿山祿山以為書生不足虞也唐書李克用或以非罪怒將吏蓋寓必陽助之怒克用常釋之通鑑唐昭宗紀傳記魏王遺楚王美人王說之夫人鄭褎衣服玩好之甚於王王曰婦人妬其情也今褎知寡人悅新人其愛之甚此孝子之所以事親忠臣之所以事君也褎知王以己為不妬因謂新人曰王愛子美然惡子鼻新人見王掩其鼻王曰新人掩鼻何也褎曰似惡聞君之臭也王曰悍哉令劓之戰國策互入娭妬鷙鳥將擊卑飛斂翼猛獸將搏弭耳俯伏太公六韜猛獸將擊必弭毛帖伏鷙鳥將搏必卑飛戢翼聖人將動必順辭和衆後漢趙曄吳越春秋集履危乘機安可當置之死地翻取彊韋應物集本朝趙閲道知越州時兩浙旱蝗米價踊貴諸州皆榜衢路禁人增米價閲道獨榜衢路令有米者任增價糶之於是諸州米商輻湊詣越米價更賤記聞楚公子微服出亡而門者難之其僕操箠而罵曰隸也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可東坡莊子祠堂記窮其黨而去之不如因其才而用之東坡
