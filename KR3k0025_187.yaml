body:
  text: 十大洞天本朝十天洞天者處大地名山之間是上天遣群仙統治之所雲笈七籤天地宮府圖第一王屋山天檀峰絶頂高一百二十里洞周回一萬里名小有清虛之天即杜仲王褒為小有天王清虛真人所理在洛陽河間兩界去王屋縣六十里雲笈云西城王君治之第二委羽山洞周回一萬里名大有空明之天即司季王為大有真人所理係台州黃巖縣雲笈云清童君治之第三西城山高二千丈洞周回三千里名太玄總真之天即王方平真人所理在梁州成都府西一千里接西界雲笈云未詳所在登真隱訣云疑終南太一山是屬上宰王君第四西玄山高二千七百丈洞周回一千里名三玄極真之天即裴真人所理係華州入西番界雲笈云恐非人迹所及第五青城大面山高三千六百丈洞周回二千里名保仙九室之天即寧真人所理黃帝問道於希夷真君授黃帝龍蹻經之處在蜀州青城縣雲笈云青城丈人治之第六天台赤城山高一萬八千丈洞周回五百里名上清玉平之天即桐柏王真人所理葛玄仙翁煉丹得道處上應台宿故名天台在台州天台縣雲笈云台州唐興縣禹玄洲仙伯治之第七羅浮山高三千六百丈洞周回五百里名朱明曜真之天是蓬萊之之一島也堯時洪水浮海而來泊於羅山二山相合故曰羅浮山即抱朴子葛公煉丹得道處在惠州博羅縣雲笈云青精先王治之第八茅山高一千七百丈洞周回一千五百里名金壇華陽之天洞中有生黃金壇高一百丈紫玉宮室皆上清真人遊息之境昔名句曲山因茅君煉丹得道故曰茅山在升州句容縣雲笈云紫陽真人治之第九林屋山洞周回四百里名左神幽墟之天一名包山在太湖水中夏禹治水平後藏靈寶五府於此洞中今在蘇州洞庭湖口雲笈云屬北嶽真人治之第十括蒼山洞周回三百里名成德隱真之天即徐來勤真人所理在台州仙居縣雲笈云號成德隱玄之洞在處州樂安縣北海公涓子治之右李思聰洞淵集三十六小洞天其次三十六小洞天在諸名山之中亦上仙所統治之處雲笈第一霍桐山高三千四百丈洞周回三千里名霍林之天即鄭思遠韓衆許映真人為司命府君所理在福州長溪縣雲笈云仙人王緯玄治之第二東嶽太山高四千丈洞周回一千里名蓬玄空洞之天即太昊為青帝治東嶽主萬物發生考校死魂鬼神之所歷代帝王封報功封禪之嶽上應婁奎之精下鎮魯地之分野係在兗州奉符縣雲笈云乾封縣第三南嶽衡山高四千丈洞周回二千里名朱陵太虛之天即神農為赤帝治南嶽者昔上帝降玉册寶印賜注生真君永鎮靈嶽即吾皇比壽之山上應翼軫璣衡之精故云衡山下鎮楚地之分野係在衡州衡山縣第四西嶽華山高七千丈洞周回二千里名太極總仙之天即少昊為白帝治西嶽巨靈神手擘其上足決其下以通河流救民洪波之難仙掌之形燦然瑩目上應井鬼之精下鎮秦地之分野係在華州華陰縣雲笈云鄭子真治之第五北嶽恆山高二千九百丈洞周回二千里名太一總玄之天即顓頊為黑帝治北嶽其名有五一曰蘭臺府二曰列女宮三曰華陽臺四曰紫微臺五曰太一宮上應畢昴之精下鎮燕地之分野主五穀蕃熟之司在定州恆山縣第六中嶽嵩山高七千丈洞周回一千里名上帝司真之天即聖祖為黃帝治中嶽主德分精黃老駐蹕上有仙人貝多之樹玉女織錦之臺石髓瓊環玉人金像上應柳星之精下鎮周地之分野在洛京登封縣雲笈云仙人鄧雲山治之第七峨眉山洞周回三百里名虛靈太妙之天即玉皇真人所理黃帝曾問道於真人授帝三一之經見傳於世嚴君平佐理此山係嘉州峨眉縣雲笈云名曰虛陵洞天真人唐覽治之第八廬山高三千九百丈洞周回一千七百里名仙靈詠真之天古名天子三嶂山昔周成王時有方輔先生字君孝跨白驢入山結草為廬舍煉丹得道故曰廬山即王長二真人所治并趙升在江州雲笈云名曰洞靈真太真人周正時治之第九四明山有二百八十峰洞周回一百八十里名丹山赤水之天其山有四門上通日月星辰之光故曰四明秦時驅山塞海鬼神勞役奔入四明洞不出因名鬼藏山在明州雲笈云在越州上虞縣真人刁道林治之第十陽明山洞周回三百五十里名極玄太元之山禹穴藏書處係越州山陰縣雲笈云會稽山洞北鏡湖中仙人郭草治之第十一太白山洞周回五百里名真德之天是鬼谷子授蘇秦佐國之術處有祠堂今在長安雲笈云名曰玄德洞天仙人張季連治之第十二西山洞周回三百里名天寶極真之天即洪崖先生煉丹得道所又吳真君許真君拔宅上升之處在洪州新建縣雲笈云真人唐公成治之第十三大圍山洞周回三百里名好生玄上之天係潭州澧陵縣雲笈云小溈山洞仙人花丘林治之第十四灊山高七千丈洞周回三百里名天柱司玄之天此是左慈真人煉丹得道之處即皇朝聖祖九天司命所理係舒州懷寧縣雲笈云仙人稷丘子治之第十五鬼谷山洞周回七十里名太元思真之天即正一真人張天師煉丹得道處在信州貴溪縣雲笈云名貴玄司真天真人崔文子治之第十六武夷山洞周回一百二十里名升化玄真之天山高三百仞是武夷君所理在建州崇安縣雲笈云真人劉少公治之第十七王笥山洞高三十里周回一百八十里名太秀法樂小有之天古名群玉峰昔漢武建壇授上清籙感天降玉笥因而名之洞中有木郁杏花之塢太秀天王所治有三十六峰二十四澗即漢九真人杜曇永蕭子雲煉丹得道上升處在赤松峰飛仙石養素臺係臨江軍新淦縣雲笈云真人梁伯鸞治之第十八華蓋山洞周回四百里名容成太玉之天在溫州永嘉縣雲笈云仙人梁公修治之第十九蓋竹山洞周回一百八十里名長曜寶元之天即禹帝鎮此山及葛玄真人所治部先生得道之處係台州黃巖縣雲笈云仙人商丘子治之第二十都嶠山洞周回一百八十里名寶玄之天在溶州普寧縣雲笈云仙人劉根治之第二十一白石山洞周回七百里名瓊秀長真之天在溶州雲笈云在和州含山縣白真人治之第二十二勾漏山洞周回三百里名玉關寶桂之天即葛真人煉白丹砂處在溶州北流縣雲笈云仙人錢真人治之第二十三九疑山洞周回三千里名朝真太虛之天六九孔子為太極上真公所理即何侯真人之宅會虞舜分金液上升之處在道州延慶縣雲笈云仙人嚴真清治之第二十四洞陽山洞周回一百五十里名洞陽隱觀之天係潭州長沙縣雲笈云劉真人治之第二十五幕阜山洞周回一百里名洞真太玄之天係嶽州平康縣雲笈云在嶽州陳真人治之第二十六大酉山洞周回百里名大酉華妙之天即堯時善卷先生宅唐時張果修道處係辰州沅陵縣雲笈云尹真人治之第二十七金庭山洞周回三百里名金庭崇妙之天在越州剡縣雲笈云趙仙伯治之第二十八麻姑山洞周回一百五十里名丹霞之天即南極王方平真人會麻姑於此蔡經宅并上升處在建昌軍南城縣雲笈云王真人治之第二十九仙都山洞周回三百里名玄都祈仙之天即黃帝駕火龍上升處在處州縉雲縣第三十青田山洞周回五百里名青田大鶴之天即青牛道士得道處在處州青田縣雲笈云傳真人治之第三十一鍾山洞周回一百里名朱湖太生之天即馬明先生所理在升州上元縣雲笈云龔真人治之第三十二良常山洞周回三十里名良常放命之天在潤州句容縣雲笈云李真人治之第三十三紫蓋山洞周回八十里名紫玄洞照之天在抗州餘杭縣雲笈云在荊州常陽懸屬公羽真人治之第三十四天目山洞山有兩目左目高三千丈右目高二千五百丈洞周回一百里名太微玄蓋之天在杭州第三十五桃源山洞周回七十里名白馬玄光之天秦時有千餘人入洞避難後不出皆得道即黃平瞿真人煉丹上升處在鼎州武陵縣雲笈云謝真人治之第三十六金華山高一千丈洞周回五百里名金華洞元之天即黃初平真人遇赤松子叱石為羊得道處在婺州金華縣上應婺星故名金華山雲笈云戴真人治之右李思聰洞淵集七十二福地其次七十二福地在大地名山之間上帝命真人治之其間多得道之所雲笈第一地肺山在江寧府句容縣界皆陶隱居幽栖之處真人謝允治之第二蓋竹山在衢州仙都縣真人施存治之第三仙礚山在溫州梁城縣十五里近白溪草市真人張重華治之第四東仙源在台州黃岩縣屬地仙劉奉林治之第五西仙源在台州黃岩縣嶠嶺一百二十里屬地仙張兆期治之第六南田山在東海東舟船往來可到屬劉真人治之第七玉溜山在東海近蓬萊島多真仙居之屬地仙許邁治之第八青嶼山在東海之西與扶桑相接真人劉子光治之第九郁木洞在玉笥山南是蕭子雲侍郎隱處至今陰雨猶聞絲竹之音往往樵人遇之屬地仙赤魯班主之第十丹霞洞在麻姑山是蔡經真人得道之處至今雨夜多聞鍾聲磬聲屬蔡真人治之第十一君山在洞庭青草湖中屬地仙侯生所治第十二大若巖在溫州永嘉縣東一百二十里屬地仙李方回治之第十三焦源在建州建陽縣北是尹真人隱處第十四靈墟在台州唐興縣北是白雲先生所隱之處第十五沃州在越州剡縣南屬真人方明治之第十六姥岑在越州剡縣南屬真人魏顯治之第十七若耶溪在越州會稽縣屬真人山世遠所治之第十八金庭山在廬州巢縣別名紫微山屬馬仙人治之第十九清遠山在廣州清遠縣屬陰真人治之第二十安山大交州北安期先生隱處屬先生治之第二十一馬嶺在郴州郭內水東蘇耽隱處屬真人力恆治之第二十三雞籠山在和州歷陽縣屬郭真人治之第二十二鵝羊山在潭州長沙縣婁駕先生所隱之處第二十三洞真墟在潭州長沙縣西嶽真人韓終所治處第二十四青玉壇在南嶽招仙觀西鄧先生所隱之處第二十五光天壇在衡嶽西源頭鳳真人所治處第二十六洞靈源在南嶽鄧先生所隱之處第二十七洞宮山在建州關隸鎮五嶺里黃山公主之第二十八陶山在溫州安國縣陶先生曾隱居此第二十九三皇井在溫州橫陽縣真人鮑察所治之處第三十爛柯山在衢州西安縣王質先生所隱之處第三十一勤溪在建州建陽縣東是孔子遺硯之所第三十二龍虎山在信州貴溪縣張巨君主之第三十三靈山在信州上饒縣北墨真人主之第三十四泉源在羅浮山中仙人華子期治之第三十五金精山在處州處化縣仇季子治之第三十六閣皂山在吉州新淦縣郭真人所治之處第三十七始豐山在洪州豐城縣尹真人所治之處第三十八逍遙山在洪州南昌縣徐真人所治之處第三十九東白源在洪州新吳縣東劉仙人所治之處第四十砵地在楚州王喬得道之所第四十一論山在潤州丹徒縣是真人治之第四十二毛公壇在蘇州長沙縣屬莊仙人修道之所第四十四桐柏山在唐州桐柏縣屬李四君所治之處第四十五平都山在忠州是陰真君上是之處第四十六緑蘿山在朗州武陵縣接桃源界第四十七虎溪山在江州南彭澤縣是五柳先生隱處第四十八彰龍山在潭州澧陵縣北屬莊先生治之第四十九抱福山在連州連山縣屬范真人所治之處第五十大面山在益州成都縣屬仙人柏成子治之處第五十一元晨山在江州都昌縣真人安期生治之第五十二馬蹄山在饒州鄱陽縣孫真人子州所治之處第五十三德山在朗州武陵縣仙人張巨君治之第五十四高溪藍水山在雍州藍田縣並太上所遊處第五十五藍水在西都藍田縣屬地仙張兆期所治之第五十六玉峰在西都京兆縣屬仙人柏戶治之第五十七天柱山在杭州於潛縣屬地仙王伯元治之第五十八啇谷山在啇州是四皓仙人隱處第五十九張公洞在常州宜具縣真人康桑治之第六十馬悔山在台州天台山州北季明仙人治之第六十一長白山在齊州長山縣是毛人治之第六十二中條山在河中府虞卿縣趙仙人治之第六十三茭湖魚澄洞在西古姚州始皇先生曾隱此處第六十四綿竹山在漢州綿竹縣瓊華夫人治之第六十五瀘水在西梁州仙人安公治之第六十六甘山在黔南寧真人治之第六十七滉山在漢州赤鬚先生治之第六十八金城山在古限戌又云石戌石真人所治之處第六十九雲山在邵州武岡縣仙人盧生治之第七十北邙山在東都洛陽縣魏真人治之第七十一廬山在福州連江縣謝真人治之第七十二東海山在海州東二十五里王真人治之右見雲笈七籤天地宮府圖蓬壺閬苑海上五嶽靈山廣乘山者天之東嶽也在東海之中為五嶽發生之首上有碧霞之闕瓊樹寒林紫雀翠鸞碧藕白橘莫可名狀即青帝天君靈威仰統仙官兵吏萬衆鎮此山主歲星之精居九氣青天之內矣長離山者天之南嶽也在南海之中上有朱宮絳闕赤室丹房朱草紅芝霞膏金醴莫可名狀應天下初得道神仙皆詣此宮營形浴質肖陰煉陽為長生久視之道即赤帝天君赤熛怒統領仙官神吏萬衆鎮此山上主熒惑之精居二氣丹天之內矣麗農山者天之西嶽也在西海之中上有白華之闕三素之城玉泉之宮瑤林瑞獸莫可名狀即白帝天君白招拒統領仙官神吏鎮此山主太白之精居七氣素天之內矣廣野山者天之北嶽也在北海弱水之中形如崑崙酆都羅山合為陰氣之主上多瓊樓寶闕金液龍芝莫可名狀即黑帝天君葉光紀統理仙官神吏鎮此山上主辰星之精居五氣玄天之內矣崑崙山者天之中嶽也在八海之間上當天心形如偃蓋上廣下狹三成而上與天齊日月黃赤二道交會其上三光行焉東曰崑崙西曰玄圃北曰閬苑南積石山大岩山水泉山北戶山四面各一萬里上有瓊華之闕光碧之堂瑤池翠水即西王母統衆仙居焉海中四嶽為枝幹十洲四島入海大川圍繞其側絶頂之上有金臺五所玉樓十二金城千里地生金根之樹瓊柯之林紫雀翠鸞碧桃白李百寶妙嚴莫可紀述即黃帝天君含樞紐統領天大聖衆鎮此山皆與五嶽名山相連常有神仙往來考校生籍上主鎮星之精居於中元一氣天中焉其海外之五嶽即天地之五鎮造化之五嶽即五氣之宗祖矣
