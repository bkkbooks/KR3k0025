body:
  text: 喪女經女子笄而不為殤儀禮喪服注云殤者女未冠笄而死可殤者史許嫁笄而字死則以成人之喪治之穀梁注曰女子許嫁不為殤集曾未弱笄無疾而殞潘嶽景陵女哀詞本朝梵梵一作棾稚魂類要經歸妹女之終也出嫁也易序卦之子于歸宜其家室宜其家人詩桃夭維鵲有巢維鳩居之之子于歸百兩御之詩鵲巢注諸侯之子嫁於諸侯送御者皆百乘女子有行遠父母兄弟泉水齊子歸止其從如雲親結其縭九十其儀東山諸娣從之祁祁如雲韓奕婦人謂嫁曰歸葛覃注凡女行於大夫以上曰嫁行於士庶人曰適人記喪服注女子適人者為其父母期同上女子許嫁笄而字以許嫁為成人曲禮上納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑曲禮下女子許嫁繫纓有從人之端也同上女在塗而女之父母死則女反曾子問嫁女之家三夜不息燭思相離也同上女子之嫁也母命之往送之門戒之曰往之女家必敬必戒無違夫子以順為正者妾婦之道也孟滕文下人有嫁其女而教之者曰爾為善人疾之對曰然則當為不善乎曰善尚不可為而況不善乎淮南子史凡公子嫁于敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之左威三禮送女父不下堂母不出門父誡之曰謹從汝舅之言母誡之曰謹從汝姑之言諸母誡之曰謹從汝父母之言穀梁婦人許嫁字而笄之公羊張負以女孫豫陳平誡曰母以貧故事人不謹事兄伯如父事嫂如母史陳平出家卓王孫分豫文君僮百人錢百萬及其嫁時衣被財物史司馬相如傳施襟結褵申父母之戒東漢馬援傳戴良五女並賢每有求姻輒便許嫁綀裳布被竹笥木屐以遣之後漢本傳傳記趙母嫁女女臨去敕之曰謹勿為好女曰不為好可為惡耶母曰好尚不可為其況惡乎世説少君之裝送甚盛東觀漢記集辭父母而有行奉君子之清塵如懸蘿之附松似浮萍之託津魏丁廙妻寡婦賦二合兆嘉偶女子禮有行潔己入德門終遠母與兄晉陸機為陸思遠婦作詩辭父母而言歸丁儀婦賦伊女子之有行愛奉嬪於高族潘安仁寡婦賦婉彼幽蘭女作嬪君子室顧延年秋胡詩齊薑之歸魚軒曄以照路張九齡念爾嫁猶近稚年那別親俯首戴荊叉欲拜悽且嚬本來儒家子莫恥梁鴻貧劉長卿妾身未分明何以拜姑嫜杜詩長女當及事誰助出悅縭韓文入門而媼御皆喜既饋而公姑交賀墓銘入門上下莫不贊賀楚國夫人志經歸寧父母詩葛覃父母終思歸寧而不得泉水姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食記曲禮上史杞伯姬來歸寧也注寧問父母安否凡諸侯之女歸寧曰來夫人歸寧曰如某左莊二十七楚子庚聘于秦為夫人寧禮也夫人父母既沒歸寧使卿左襄十二婦人反曰來歸穀梁經君子抱孫不抱子此言孫可以為王父尸記曲禮子之子為孫爾雅集于今抱孫焉西漢趙他傳曾孫體近西漢許皇后傳言曾孫之身於帝為近親云李廣之子當戶早死當戶有遺腹子陵將兵擊胡本傳李廣有孫陵善騎射帝以為有廣之風使備胡通鑑富平侯者張安世四世孫放也漢成紀裴耀卿叔業之七世孫也郭子儀諸孫數十每問安不能盡辨顏色頷之而已唐德宗鄭玄之子益恩赴黃巾之難隕身有遺腹子玄以其手文似己名之曰小同後漢鄭玄傳臣無祖母無以至今日祖母無臣無以終餘年母孫二人晉書李密王承昶之孫清虛寡欲不飾文辭論者以為祖不及孫本傳王羲之率諸子抱弱孫一味之甘割而分之以娛目前本傳張憑數歲祖鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎並晉書謝靈運子鳳鳳子超宗有文辭帝大嗟賞謂謝莊曰超宗殊有鳳毛靈運復出南史員俶九歲升坐詞辨注射帝異之曰半千孫固當然新唐書李泌傳籍籍名家孫杜詩玉牙珠顆小男兒羅薦蘭湯浴罷時芣茞春來盈女手梧桐老去長孫枝白樂天承先人之後者在孫惟汝韓祭兄子十二郎文本朝有後慶多孫欒城集經問我諸姑注父之姊妹稱姑詩泉水房中內賓姑姊妹也儀禮父之姊妹為姑爾雅史姪其從姑注謂我姪者我謂之姑左僖十五呂祿時出遊獵過其姑呂婆一作嬃大怒曰若為將今棄軍呂氏今無處矣乃悉出珠玉寶器散堂上曰母為他人守也通鑑班婕妤彪之姑漢書狄仁傑曰姑姪與母子孰親唐書本傳張巡姊軍中號陸家姑張巡傳記溫嶠喪婦從姑劉氏家有一女甚有姿慧姑以屬公覓婚公報云已覓得婚處門地粗可壻身名宦盡不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴世説經惟孝友于兄弟書君陳終鮮兄弟詩揚之水注鮮寡也忽之兄弟爭國寡兄弟之恩今人以無兄弟終鮮恐誤棠棣之華鄂不韡韡凡今之人莫如兄弟小雅常棣兄弟鬩于牆外禦其侮脊鴒在原兄弟急難注弟以敬事兄兄以榮覆弟注兄弟既具和樂且孺同上兄及弟矣適相好矣無相猶矣詩斯干猶當作病伯氏吹塤仲氏吹箎何人斯此令兄弟綽綽有裕不令兄弟交相為愈角弓叔兮伯兮倡豫和女籜弓伯叔兄弟之稱豈無他人不如我同父唐風杕杜以脤膰之禮親兄弟之國周禮聞遠兄弟之喪雖緦必往檀弓上兄之齒鴈行王制兄弟睦家之肥也禮運男子先生為兄先生為兄之兄恐當作晜字後生為弟晜兄也爾雅兄之子弟之子相謂為從父晜弟同上司馬牛憂曰人皆有兄弟我獨亡語顏淵子為人兄慈愛而見友為人弟敬詘而不悖荀君道史太姒之子惟周公康叔為相睦也左傳吾兄弟比以安厖也可使無吠寡人有弟不能和協而使糊其口於四方隱十一富辰曰兄弟雖有小忿不廢懿親僖二十四叔出季處有自來矣左二惠競爽猶可又弱一個焉左貴介弟也左兄愛而友弟敬而順昭六兄弟天倫也穀梁隱元雙生以後生為兄取其居上公羊傳言古人尚質趙嬰曰我亡吾二昆其憂哉左成五年李心以勇季布以諾著聞關中史本傳馮野王弟立治行相似吏民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衛德化均周公康叔猶二君前漢兄弟敵吾一體一支漢詔薑肱與二弟名聲相次皆不應徵聘東漢賈彪兄弟三人天下稱曰賈氏三虎本傳許劭字子將汝南平輿人也兄虔亦知名汝南人稱平輿淵有二龍焉同上薑肱嘗與弟季江俱詣郡夜於道為盜所劫欲殺之肱曰弟年幼父母所憐又未聘娶願殺身濟弟季江曰兄年德在前家之珍寶國之英俊乞自受戮以代兄命盜遂兩釋焉通鑑漢桓紀王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數歲每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥往及長娶妻母虐使祥妻覽妻亦趍而共之通監魏元帝紀友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷歡愈之日心乎愛矣書不盡言梁世祖紀隋帝謂群臣曰五子同母真兄弟也陳紀牛弘寬厚弟弼好酒因醉射殺弘駕車牛弘來還宅其妻迎謂之曰叔射殺牛弘無所怪問直答云作脯坐定其妻又曰叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟隋煬帝紀諸王之藩上與之別曰諸子尚可復有兄弟不可復得唐太宗紀韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寬唐武后紀韋嗣立為萊蕪令太后召問曰卿父嘗言臣有兩兒堪事陛下卿兄弟在官誠如父言朕今以卿代兄更不用他人即日拜鳳閣舍舍人同上兄弟間不榛梗同上兄弟相攻勝負皆為人笑同上閨門雍穆有德有則吾敬陳元方兄弟三國志陳矯傳荀爽兄弟八人穎川語曰荀氏八龍慈明無雙魏志馬良兄弟五人並有才名鄉里諺曰馬氏五常白眉最良蜀志諸葛圭當作瑾事吳弟亮仕蜀弟誕仕魏時人謂蜀得龍吳得虎魏得狗三國志王珣弟珉名出珣右時人語曰法護非不佳僧彌難為兄僧彌珉小字也晉書王珉傳王徽之與弟獻之俱病篤有術人云人命應終而有生人樂代者則死者可生徽之曰吾才位不如弟請以餘年代之同上孔顗為長史弟道存從弟徽頗營産業二弟請假歸輜重十餘船皆綿絹紙席之屬顗正色曰汝輩忝為士流何作賈客耶命燒盡而去南史宋紀謝惠連幼有奇才族兄靈運遇惠連大相知賞與為刎頸交每有篇章對惠連輒得佳句夏侯夔為豫州剌史兄亶先經此任並有恩惠百姓歌曰前兄後弟布政優優同上蘇瓊曰天下難得者兄弟北史有義有禮房家兄弟房景伯傳梁到溉與弟洽梁世祖贈詩曰魏世重雙丁晉朝稱二陸何如今兩到復似凌雲竹本傳蕭介與兄弟文酒會賞時人以比謝氏烏氏之遊梁書薛收與從弟元欽及族兄德音齊名世稱河東三鳳唐書溫大雅歷遷黃門侍郎弟彥博為中書侍郎對居近侍議者榮之高祖從容謂曰我起義晉陽為卿一門耳賈敦頤為洛州剌史有惠政百姓植碑頌美及敦實為洛州長史又立頌於兄碑之側號棠棣碑本傳杜易簡稱王勔王勮王勃為三珠樹韋叔諧叔謙季武同省時號三列宿兄弟天生之羽翼讓皇帝憲傳張説以趙冬曦韋述兄弟人之杞梓韓穆兄弟皆和粹世以珍味目之竇群兄弟工辭章為連珠集時稱昆弟若五星然本傳傳記陳實曰元方難為兄季方難為弟世説上陳元方兄弟資柔愛之道不失雍熙之軌同上李祖仁兄弟十人並慈孝廉讓因此名江曰廉讓交州記集天倫之愛振古莫儔選昭王碑子之友悌和如琴瑟誄鴈行有序書華萼相光飾詩三荊歡同株樂府雙珠出海底俱是連城珍聰明兩特達餘耀照傍人英聲振名都高價出殊鄰李太白集桂枝嘗遍折棣萼更相鮮李義山文那知風雨夜復此對床眠韋應物榮聯花萼詩難和樂音洛助塤箎酒易醺白傳詩骨肉之恩手足之愛白帖卿家兄弟功名震麒麟閣畫鴻鴈行杜詩自古孔懷之痛亦莫我之與劇手足一斷無因重連奇老雖從祖之兄弟甚同氣之天倫白居易祭文綽綽然真令兄弟劉賓客吳文章少孤與兄伯武相失二十年後會下邳市爭計共鬭伯武毆文章欲報擊之心中愴悽手不能舉大自吝也因投杖於地相問乃真兄弟也風俗通古有兄弟忽欲分異出門見三荊同株接葉連陰歎曰木猶欣然聚況我而殊哉遂還為雍和周景式孝子傳帝遊後苑有竹叢密筍不出外帝顧諸王曰父子兄弟相親當如此因謂義竹王仁裕開元天寶遺事本朝世間誰似老兄弟篤愛不復見疵瑕東坡詩萸心萸心二字殊無文理恐當作暮止一枝心自覺舂同斗粟味尤長欒城集錢希白惟演從兄也惟演拜相希白當制世稱弟拜相兄草麻自古未有惟座主拜相門生草麻前代記之矣錢惟演纂金坡遺事慚愧君家好兄弟風流更與晉人并僧參寥子玉秀蘭芳好弟昆同上陳群與孔融論汝穎人物群曰荀文若休若友若仲豫當今無對顏要
