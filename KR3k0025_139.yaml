body:
  text: 自揆經陳力就列不能者止語季氏子款啓寡聞莊子吾在天地間猶小石小木之在大山也莊子秋水篇顛毛種種懼不任君之事以為司敗憂也子華子孤陋寡聞愚昧多蔽荀子序史懼不能任其先人之祿左昭七年伍尚曰吾知不逮昭二十年燭之武曰臣之壯也猶不如人今老矣無能為也左僖三十年知伯曰余羸老也可重任乎左襄十年互見晚境子魚曰展四體以率舊猶懼不給而煩刑書若又共二徼大罪也左定四年時見微意有所裨補譬嘒星之繼朝陽飛塵之集華嶽史記序罷駑之質無汗馬之勞西漢公孫弘傳録録未有奇節蕭何傳互見闒茸門無橫草之功終軍傳無尺寸之效孔光傳無伐閲功勞車千秋傳師古曰伐積功也閲經歷也糞土愚臣忘生觸死東方朔傳公䯢尚不及數子王命傳瑣才朝錯傳薄技司馬遷傳楶梲之材不荷棟梁之任王命論標末之功一言之勞王莽傳綿力薄才嚴助傳犬馬齒臷與耋字同孔光傳班超曰無鉛刀一割之用本傳食大官居御府久污玉堂之署亡以自效李尋傳並前漢小醜東漢黃香傳無分可採東漢鄧騭傳螢爝末光唐岑文本傳命輕雀鼠三國虞翻傳人微地褰不當極總重任通監梁均王紀傳記代匠指南取誚慱識陸德明經典釋文序蚊力何能負太山牛涔不足增滄海狄梁公家傳集牛馬走司馬子長書注言已為太史公掌牛馬之僕自謙之辭也內愧齊竽外羞魯服梁任孝恭啓蟻垤敢侔於嵩華陳琳答東阿王箋懼蒙塵於叩缶顧取笑乎鳴玉陸士衡文賦四達雖平直蹇步愧無良謝宣遠張子房論在木闕不材之資處鴈乏善鳴之分盧子諒書顧此腹背羽愧彼排空翮盧子諒詩以犬羊之質服虎豹之文吳質書但恨功名薄竹帛無所宣長歌行策蹇長途終慚一日之致懸縷層臺難任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂任重才輕懼有絶臏之悔既慮鑠金固陳匪石魏溫子升為人讓表豫非荊山璞謬登和氏場羊質服虎皮燕翼假鳳翔棗道彥雜詩顧我蓬屋姿謬通金閨籍杜詩謬知終畫虎微分是醯雞同上著書每成於廢疾進德且乏其馨香柳啓踈愚空薄文選方托麋鹿群敢同騏驥槽柳詩學不能探奧義窮章句為腐爛之儒雖或置力於文學勤勤懇懇于歲時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖逢掖曳大帶游於朋齒且有愧色豈無能乎柳文恇怯淟涊下才末技同上操斧於班郢之門斯強顏耳柳文沈骸糞土甘心朽滅陳子昂集顧揣涯分實靦心顏同上劍非萬人敵文竊四海聲李太白集力薄志劣無異能解柳宗元答許孟容書投間置散乃分之宜韓愈進學解月費俸錢歲糜廩粟同上文才不如人行又無町畦問之朝廷事類不知東西況於經籍深豈究端與倪君恩太山重不見酬稗稊所職事無多又不自提撕明庭集孔鸞曷取於鳧鷖樹以松與柏不宜問蒿藜韓文南內朝賀歸詩有志慚雕朽無庸類散樗駱賓王散才易朽蟠木難容墻面難用灰心易然病抱支離材均擁腫少好讀書無謝高鳳老不曉事有類揚雄抱山雞而息恧顧遼水以多慚並同上顧我散才同培塿元微之集乏齊魯報政之能劉賓客集每慚效薄常懼食浮蚊力自知微不才甘朽質高臥豈泥蟠並同上自惟蓬艾影叨名蘭桂芬王無功豹皮製袖方纍羔裘狗尾續貂貴彰蟬冕李義山文德薄蟬翼命輕鴻毛郭子儀表策蹇勵駑唐文粹叢冗禿屑同上愧無運斤之妙徒有傷手之責同上自笑踈慵似麋鹿也教臺上費黃金羅隱集越祿躐等杜牧之下走之才不足以污辱重地皮日休文自憐非劍氣空向斗牛星錢起文本朝楚肆固知難眩玉丘門安敢輒論詩歐公集山林本我性章服偶包裹寵兼憂而並至恩與責以俱深以聖主而責愚臣方懷愧愓假小人而乘大器豈不隮顛渴如偃鼠之飲河喘若吳牛之見月舉足則蹈禍之機以身為斂怨之府寵榮既過小器盈而必顛筋力已疲飛鳥倦而思止昔而少健黔驢之伎已殫今也病襄駑馬之疲難強貪榮同衛鶴取笑類黔驢並歐公集蓼蟲事業無餘習芻狗文章不更陳臨川集蠡智窮於測海同上苦窳賤質卷曲散材同上病馬已無千里志東坡集但恐跛牂隨赤驥青雲飛步不容攀寬如定遠之言平平無取拙比道州之政下下宜然名過其實食浮於人雖叨過實之名卒無堪用之器蓋散才不任於斧斤而病馬空糜於芻束溝中不願於青黃爨下無心於宮徵並同上地資淺薄積薪有後來之譏德業空虛在梁有不稱之誚欒城集泰壇之樽何取溝中之斷清廟之瑟誤收竈下之焦狙猿無事於冠裳爰居不樂於鍾鼓病窳不中於規模固陋難逃於冰鑑六六年華屬老夫朽株難刻畫枯葉任雕零拉同上血指汗顏終縮手陳後山文子教玉人雕琢玉孟子人之患在好為人師同上日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎莊子互見勢力不敵西施病心而矉其里之醜人見而美之歸亦捧心而矉里人知美矉而不知矉之所以美莊子學曾未如疣贅則具然欲為人師荀宥坐東里閭空腹而好自賢孔叢子龜三千歲蜉蝤不過三日以蜉蝤而為龜憂養生之具人必笑之淮南子嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜闞子群蟻觀鼇隱如嶽蟻曰彼之冠山何異我之戴粒逍遙封壤之顛伏乎窟穴也符子史無大功而求大祿國語持布鼓過雷門西漢王尊傳居纍卵之危而圖泰山之安為朝露之行而思傳代之功東漢王符傳無毛髮之勞而欲求丘山之用東漢張奐傳互見求多侯思止求為御史太后曰卿不識字豈堪御史對曰獬豸何嘗識字但能觸邪太后悅即以為朝散大夫侍御史通監唐武后紀李輔國求為宰相上曰以卿之功何官不可為其如朝望未允何唐代宗紀傳記魏收云我視沈約正如奴耳此所謂飾嫫母而誇西施持魚目而笑明月也史通有類效嚬彌益其醜同上集嫫母姣而自好楚辭醜嫗自飾也家家自以為稷契揚雄解嘲人人自謂握靈蛇之珠家家自謂抱荊山之玉曹子建與揚修書孔璋不間於辭賦而自謂能與司馬長卿同風曹子建書蚊淚與天地齊流蜉蝤與大椿齒年郭璞瓴甋誇璵璠魚日笑明月張景陽雜詩顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤杜詩不謂矜餘力還來謁大巫同上持卻克之質入邯鄲之墟奏曹鄶之音歷莖英之肆陳叔達答王續書盜跖自方於仲尼張渭虞帝碑銘夫鯤之為魚也潛碧海泳滄流沈鰓於渤海之中掉尾乎風濤之下而濠魚井鮒自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天池之間宛頸乎江海之畔而雙鳧乘鴈自以為可得而褻焉駱賓王猶螢燐增輝太陽唐邢壔略例序斗水瀉大海孟東野昨夜新生黃雀兒飛來直上紫藤枝擺頭撼腦花園裏將為春光總屬伊白侍郎猶張蹭蹬之鱗更舉螳螂之臂唐文粹衷燕石而履玄圃帶魚目而游漲海祗取誚耳柳文臨江之人得麋畜之日抱就犬習示之與之戲積久益狎麋忘己之麋也出門外見犬與為戲外犬共殺之麋至死不悟柳文臨江之麋本朝螳蜋當轍恃長臂熠耀宵行矜照火山谷譬如學捧心初不悟己醜同上無異於鼓井淖而議東海坐蚊蝶而笑九萬之圖南也江民表心說互見妄議經我入自外室人交遍謫我已焉哉天實為之謂之何哉詩邶風北門知我者謂我心憂不知我者謂我何求詩王風黍離互見感嘆我生之初尚無為我生之後逢此百罹詩王風兔爰憂心悄悄慍于群小覯閔既多受侮不少邶柏舟自貽伊戚詩小雅父母生我胡寧忍豫知我如此不如無生詩苕之華天之生我我辰安在詩小辨悠悠蒼天曷其有極詩鴇羽子知我者其惟春秋乎罪我者其惟春秋乎孟子忘乎故吾莊子山木篇史舉世皆濁而我獨清舉世皆醉而我獨醒是以見放史屈原傳孔子既不得用於衛至河聞竇鳴犢舜華之死也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫史孔子世家劉備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲耳通監漢獻紀犬馬之誠不能動人譬人之誠不能動天通監漢明紀管輅嘆曰天與我明才不與我年壽魏志王羲之曰宇宙雖廣自容何所通監晉紀尾長翼短不能飛同上四海雖廣寧有容足之地通監晉成紀嵇康將刑顧視日影索琴彈之曰廣陵散於今絶矣晉書本傳陸機臨受誅嘆曰華亭鶴唳豈可聞乎晉書本傳自傷年紀摧頽功名不立通監梁高祖紀魏元忠曰我薄命譬如墜驢足絓於鐙為所曳矣通監唐武后紀天地為籠去將安所唐武后贊傳記孔子過谷中見蘭獨茂嘆曰蘭當為王者香今乃獨茂與草為伍乃止車援琴鼓之自傷不逢時托辭於香蘭云琴操集青春背我堂堂去白髮欺人故故生古詩長吟永欷楚辭五薦不入朝一麾乃出守南史顏延之詩罕有知音者空勞流水聲江總詩牽世嬰時網陸士衡與士龍榮與壯俱去賤與老相尋張季鷹雜詩萬族各有托孤雲獨無根陶淵明詩年行已長所懷萬端時有所慮至通夜不瞑志意何時復類昔日已成老翁但未白頭耳魏文帝吳質書風雲落人後歲月度人前齊顏延之班匠不我顧牙曠不我録焉得成琴瑟何由揚妙曲選司馬紹贈山儔互入不遇及怨望萬事已黃髮殘生隨白鷗杜詩聖朝無棄物老病已成翁多少殘生事飄零似轉蓬顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤以茲悟生理獨恥事千謁乘黃已去矣凡馬徒區區勳業頻看鏡行藏獨倚樓識字用心苦白頭趍幕府一臥東山三十春豈知書劍老風塵窮途愧知己暮齒借前籌白首壯心違失學從兒懶長貧任婦愁吾徒日飄泊世事各艱難共被微官縳低頭愧野人窮途反遭俗眼白紈褲不餓死儒冠多誤身殘杯與冷炙到處潛悲辛長卿多病久子夏索居貧形容勞宇宙奔走空皮骨一生襟袍向誰開昭代將垂白途窮乃叫閽尚為諸侯客獨屈州縣中致身傷短翮驤首顧疲駑本賣文為活翻令室倒懸並杜詩進不能矯翰龍雲退不能棲神豹霧駱賓王集昔年離別還同塞北之鳧今日歸來即似遼東之鶴生涯無歲月岐路有風塵萬里煙波舉目有江山之限百齡心事勞生無晷刻之歡畫地終難入書空自不安進不能言社稷之務立事囊中退不能掃丞相之門買名天下風塵摧白首歲月損紅顏並駱賓王集世家黃葉散鄉路白雲重皇甫湜如何同枝葉各自有枯榮李太白集壯夫或未達十步九太行秋蓬已種種所為覺無成同上吾自今年來蒼蒼者或化而為白矣動搖者或脫而落矣毛血日益衰志氣日益微幾何不從汝而死也死而有知其幾何離其無知悲不幾時而不悲者無窮期矣汝之子始一歲吾之子始五歲少而強者不可保如此孩提者又可冀其成立耶韓祭兄子十二郎老成文太學四年朝虀暮蘖韓文汨東西與南北稚十年以不居辱飽食其有數況策名於薦書時所好之為賢庸有謂余之非愚時命雖乖心轉壯技能虛富家逾窘今者無端讀書史智慧總是勞精神畫蛇著足無處用兩鬢雪白趍埃塵身將老寂寥志欲少間暇名聲荷朋友援引乏姻婭疾添兒女戀老喪丈夫勇少年真可喜老大百無益自嘆虞翻骨相屯頭童齒豁竟死何裨進寸退尺卒無所成學成而道益窮年老而身益困利居衆後責在人先韓文切自悲辛生天下無事時承先人之遺業不識干戈耒耜攻守耕穫之勤讀書著文自七歲至今凡二十二年其行已不敢愧於其道其間居思念前古當今之故亦僅志其一二大者焉選舉於有司與百千人偕進偕退曾不得策名於薦書齒下士于朝以仰望天子之光明今是鳥也惟以羽毛之異非有道德智謀承顧問贊教化者乃反蒙採擢薦進光耀如此可以人而不如鳥乎韓文感二鳥序雖家置一喙以自稱道詬益甚矣柳文互見暗投少時陳力希公侯許國不復為身謀風波一跌逝萬里吐心瓦解空縲囚同上雄雌蓄形於木杪兮短狐伺景於深淵仰矜危而俯栗兮弭日夜之拳拳柳文閔生滿鏡悲華髮空山寄此身白雲家自有黃卷業長貧劉長卿劍寒空有氣松老欲無心同上白首銜冤欲問天惟有貧將病能令親愛踈白日豈知心同官歲歲先辭滿惟有青山伴老身窮分安藜藿衰容稱薜蘿歎逝翻悲有此身獨醒空取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗牢落機心盡誰憐鷗鳥親生涯已逐滄浪老斗間誰與看冤氣盆下無由見太陽不才成擁腫失計似邯鄲只緣六翮不自致長似孤雲無所依歲月蹉跎飛不進羽毛憔悴何人問繞樹空隨烏鵲群巢林只有鷦鷯願濩落惟心在並同上雖云意氣在豈免顏色低白侍郎集無成心力盡未老形骸殘塵土滿青袍官曹冷似冰誰肯來同宿身方逐萍梗年欲近桑榆時遭人指點數被鬼揶揄朝遊九城陌肥馬輕車笑殺人暮宿五侯門殘茶冷酒愁殺人拙詩在壁無人愛鳥汙苔侵文字殘迢麒麟閣圖功未有期區區盡素志焉用寫真為朽株枯竹有何榮青衫未解白髮已多始得名於文章終得罪於文章委心泥滓絶望煙霄局身地遠仰首天高流年惝天樣切念也恍不饒我並白侍郎集秋冷先知是瘦人同上亦知合被才名折二十年來折太多鏡裏老來無避處樽前愁至有銷時還似今朝歌酒席白頭翁入少年場徒勞州縣不致青雲僕乘囊輜日削月朘一照舊圖畫無復昔儀刑勿言一莖少滿頭從此始誰知濩落心先納蕭條氣莫言三十是年少百歲三分已一分良時光景長虛度壯氣風情已暗消三旬臥廢鶯花月一半春消風雨天長慶老郎惟我在年光東流水生討南枝烏並同上頑鈍如鎚命如紙韋應物傳近來時世欺前輩好染髭鬚學後生愧無鴛鷺姿短翮空飛還誰當假羽毛雲路相追攀並同上人生不如意十乃居八九唐李衛公平泉記青雲滿眼應驕我杜牧之每行經舊處欲想似前身劉禹錫銅壺漏水何時歇如此相催即老翁同上白屋漸看秋草沒青雲莫道故人多劉長卿何事獨傷懷少年曾得意劉禹錫編蒲曾苦思垂竹愧無名劉賓客君登青雲去余望青山歸孟浩然互見趍向不同常恐填溝壑何由振羽儀世途皆自媚流俗寡相知當路誰相假知音世所稀虛擲此芳辰不才明主棄多病故人踈並同上平生心力盡於文杜荀鶴集半雨半風三月內多愁多病百年中同上似玉兮將沉如金兮永沒皮日休集玄鬢行為霜清淚泣成血同上鴛鴻得路爭先翥松桂凌寒獨後凋歸去朝端如有問玉門關外老班超武伯蒼鄰富雞長往家貧客漸稀姚少監拜迎官長心欲碎鞭撻黎庶令人悲高達夫道直去官早家貧為客多許用晦一身仍白髮萬慮止丹心性拙難超世心孤易感恩竹馬兒猶小荊叉婦慣貧世途行處見人事病來踈並同上長貧惟要健漸老不禁愁張文昌文字不得力桑麻難救貧方雄飛文相看戀簪組不覺老風塵錢起涸魚久失風波勢枯草曾霑雨露恩唐文粹出門即有礙誰謂天地寬孟郊譬如浸檗泉流苦日已長同上生前為造化剩物歿後與灰土俱委此豈不為辜負日月之光景耶同上只言聖代謀身易爭奈貧儒得路難羅隱集平生四方志此夜五湖心心寒已分灰無焰並同上共君前後俱從事羞見功名與別人元微之集壯心瞻落景生事感流萍高達夫動觸樊籠倦間消肉食難呂和叔文但應花枝日愈好惟有我老年年衰歐公集新花與故吾已矣臨川集筋骸徽纏束腑肺鼎鐺煎同上一巢無地拙於鳩青天白日春常好緑鬢朱顏老自悲輊軒已任人前後揭厲安知世淺深今吾即故吾老來容易得新年明明漢月空相識天偶人觭心腹非故時更覺日月駛並同上駛疏吏切從史亦疾滄海一窮鱗說苑無錢乞與韓知客名紙生毛不為通古今詩話試盡風波惡生涯亦可哀臨川集積憂熏心驚齒髮之先變抱恨刻骨傷皮肉之俱存東坡集風流耆舊消磨盡只有青山對病翁可憐老驥真老矣無人更秣天山禾天窮無所逃年年歲歲何窮已花似去年人老矣聞道鴛鴻滿臺閣網羅應不到沙鷗信我人厄非天窮我生無田食破硯邇來硯枯磨不出寒聽不知春溝中枯木應笑人鑽灼不然誰似我俯仰隨人如桔槔平生五千卷一字不救飢園中草木春無數只有黃楊厄閏年生涯到處似檣烏此身自斷天休問白髮年來漸不公身行萬里半天下僧臥一庵初白頭多才久被天公怪闕食惟應爨婦知萬事早知皆有命十年浪走寧非癡狂謀謬算百不遂惟有霜鬢來如期人生識字憂患始心如死灰不復溫遠官不知官爵好思歸苦覺歲年長並東坡集冷官無事屋廬深同上衰鬢躡殘欹雪嶺壯心降盡倒風旌歐公集心事數莖白髮生涯一片青山百斛明珠人生不願才才士困奔走欒城集壯心付與東流水才短如蠶只自纏一官來往似秋燕薄俸包裹如春蠶此身長似伏轅馬何日還為縱壑魚一被簪裳裹長遭羅網牽丹心變為灰老人無力年年懶世事如花種種新並同上身如病鶴翅翎短心似亂絲頭緒多山谷詩枉讀平生三萬卷貂蟬當復自兜鍪陳後山集平日齊名多早達同上
