body:
  text: 服善子孔子見老聃出以告顏回曰丘之於道也其於醯雞歟微夫子之發吾覆也吾不知天地之大全也莊田子方項託年七歲為孔子師孔子有以聽其言也淮南修務訓史見有禮於其君者事之如孝子之養父母也左文十八年自今請雖吾家聽子而行左襄二十年韓信募生得廣武君者有縳致麾下信解其縳東鄉坐師事之西漢信傳漢文帝曰吾久不見賈生自以為過之今不及也西漢本傳上曰吾久不見班生今日復聞讜言通監漢成紀魏證曰文宣狂暴然人與之爭事理屈則從之通監唐太宗上說曰理到之語不得不服朕以私愛忘公議曏者之忿自謂不疑及聞證言方知理屈通監唐太宗杜淹對太宗曰天下之務當盡至公善則從之德彝所言真得大體臣誠心服不敢遂非通監唐太紀蕭至忠素有雅望嘗自公主第門出過宋璟璟曰非所望於蕭君也至忠笑曰善乎宋生之言遽策馬而去通監唐元宗蘇廷碩為中書舍人李嶠曰舍人思若湧泉吾所不及唐書本傳傳記李相讀春秋誤以叔孫婼呼為勑晷有小吏曰某緣師受誤呼文字今聞相公呼婼方悟之耳公曰不然因檢釋韻果勑略反公大慚號小吏為一字師摭言集僕嘗好人譏彈其文有不善者應時改定文選集生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎韓文聞其善立以為己師柳文眾口貪歸美何顏敢妬姝元微之集本朝溫公退居洛陽每論當世人物必曰呂獻可之先見范景仁之勇決皆予所不及心誠服之劉諫議集互入心服蔡天申得溫公撰呂獻可墓銘以獻王安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見錄互入事反所料昔吾舉進士試於禮部歐陽文忠公見吾文曰此我輩人也吾當避之東坡文竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經效於世間不必皆從於己出東坡進陸贄奏議劄子史藺相如為上卿位在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且賤人吾羞不忍為之下宣言曰我見必辱之史記本傳互入嫉妬楊雄著太元劉歆觀之曰吾恐後人用覆醬瓿也西漢本傳孔穎達議論為冠又年最少老師宿儒恥出其下隋書本傳傳記揚雄作太元造法言張伯松不肯一觀論衡經噬膚滅鼻無咎易除惡務本書狃于姦宄敗常亂俗三細不宥書君陳報虐以威遏絕苗民無世在下書呂刑國人不齒詩蝃蝀人而無禮胡不遄死詩相鼠取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊詩巷伯互入讒譖公家不畜刑人大夫弗養士遇之途弗與言也屏之四方唯其所之記王制屏之遠方終身不齒同上惡惡如巷伯記緇衣子曰非吾徒也小子鳴鼓而攻之可也語先進惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者語陽貨見不善如探湯語季氏子孔子謂子路曰見長者不能黜其色見幼者不能盡其辭雖有疾風暴雨吾不入其門矣家語立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟公孫丑上姦人之雄聖主所以先誅荀為不善乎幽闇之中者鬼得而誅之莊草芧不去則害禾稼盜賊弗誅則傷良民管明法梟鳴出聲人皆惡之魯連墨子非樂不入朝歌淮南蝮蛇不可為足虎豹不使緣木淮南史祭仲曰不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎左隱九年周任有言曰見惡如農夫之務去草焉芟夷蘊崇之絕其本根勿使能殖則善者信矣隱六石祈子曰天下之惡一也惡於宋而保於我保之何補左莊十二年不如殺之無聚慝焉左僖十五年除君之惡惟力是視左僖二十四年季文子曰見無禮於其君者誅之如鷹鸇之逐鳥雀也左文十八年投諸四裔以禦魑魅同上右師為巳短策苟過華臣之門必騁左襄十七年鄭然明曰見不仁者誅之如鷹鸇之逐鳥雀也左襄二十五年子產曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎左昭二年春秋書齊豹曰盜三叛人名以懲不義左昭三十年不令之臣天下之所惡也左定十五年互入不謀而同去疾莫如盡左哀元年君子惡惡疾其始榖梁五子貢不能匿人之過史記本傳肥義曰姦臣在朝國之殘也讒臣在中主之蠹也史趙世家舜有四放之罰而孔子有兩觀之誅通監漢文紀面折不能容人之過通監漢武紀灌夫穎川人宗族豪橫穎川謠曰穎水濁灌氏族西漢本傳里名勝母曾子不入邑號朝歌墨子回車西漢鄒陽傳注曾子至孝以勝母之名不順故不入紂作朝歌之音不時也朱雲欲以上方斬馬劍斷佞臣頭西漢本傳車如雞栖馬如狗疾惡如風朱伯厚東漢朱震傳越楚之竹不足以書其惡東漢隗囂傳張綱分行州郡埋其車輪於雒陽都亭曰豺狼當道安問狐狸東漢本傳互入知所輕重清心忌惡范滂張儉東漢黨錮序王允剛稜疾惡東漢本傳范滂曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉通監漢桓紀農夫去草嘉榖必茂忠臣除姦王道以清同上李膺復拜司隸校尉時小黃門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付洛陽獄受辭畢即殺之通監漢紀宗資以范滂為功曹滂尤剛勁疾惡如讎通監漢桓紀太原太守劉瓆南陽太守成瑨志除姦邪其所誅剪皆合人望通監漢靈紀陽球見帝曰臣無清高之行橫蒙鷹犬之任前雖誅王甫段熲蓋狐狸小醜未足宣示天下願假臣一月必令豺狼鴟梟各服其辜同上荀公達之去惡不去不止通監荀攸也祖逖牙門童建殺新蔡內史周密降于後趙勒斷之曰逃吏吾之深仇將軍之惡猶吾惡也逖深德之通監晉傅元每有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴游懾伏臺閣生風晉傅元傳疾惡如仇同上葅筋醢骨抽舌探肝南史侯景傳罄南山之竹書罪無窮決東海之波流惡難盡通監隋恭紀惡木垂陰志士不息盜泉飛溢廉夫不飲唐后妃傳互入端介王義方乞誅姦臣於白日唐書天后時酷吏放歸草澤終身不齒通監唐元宗熊執易疏論裴延齡相以示歸登登動色曰願竄吾名雷霆之下君難獨處唐歸登傳互入好名贄上言裴延齡妄誕小人用之交駭物聽通監唐德宗德宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壞之唐書陽城傳元稹倚宦官知制誥武儒衡厭鄙之食瓜蠅集其上儒衡揮以扇曰適從何處來遽集於此唐書武儒衡傳傳記水名盜泉仲尼不漱語撰考讖耳聞所惡不如無聞目見所惡不如無見呂氏春秋盧奐累任大郡凡治姦惡既斷罪又以所犯刻石出其門時謂記惡碑王元祐開元天寶遺事鍾離意曰孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也東漢紀互入端介集要領不足以膏蕭斧名字不足以汙簡墨陳琳檄鷹揚虎視肅清違慢傳咸中丞箴剛腸疾惡山巨源絕交書簡上霜飛筆端風起崔彖御史箴互入有風力董卓稱亂徒藉群雄之手王莽偷安卒成光武之業故市耀臍燈府傳飲器梁任孝恭檄文弘量不以容非文選王文憲集序渴不飲盜泉水熱不息惡木蔭猛虎行疾惡懷剛腸杜詩人其人火其書廬其居韓原道守正為心疾邪不懼柳文魯司冠三日之間戮正卯於兩觀之下漢司隸一旬之內取張朔於合柱之中李義山文聞惡若巳讎柳文暴虐得於天生險悍著於心中抵冒刑憲縱恣胸臆法所惡者爾皆為之白晝九衢指憎萬手杜牧之膚革既平雖疥癬而必去豺狼已斃在狐鼠而宜除柳文本朝常情共惡人將不食其餘歐公集世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣東坡書唐六家書後聊借舊史誅姦強東坡詩雖無尺箠當寸刃口吻排擊含風霜同上有刀難割公閭腹無木可梟元海頭邵堯夫詩經怙終賊刑書舜典降霍叔于庶人三年不齒書蔡仲之命三細不宥書君陳史斐豹隸也著於丹書左襄二十三年懸頭槀街西漢陳湯傳集聲其惡於天下也柳文辯侵伐論經為天下逋逃主萃淵藪書武成教猱升木詩角弓子是輔桀也孟告子下史助桀為虐西漢張良傳日夜縱臾西漢衡山王傳假賊兵為虎翼者也西漢賈誼傳養稂莠者傷禾稼惠姦宄者賊良民後漢王符傳見非不舉聞惡不察通監漢殤紀是為虎傳翼也通監三國魏史傳記藉賊兵而齎盜食者也戰國策本朝蘇舜欽監奏院因十月賽神會館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同坐者皆坐斥劉謂時相賈昌朝曰與相公一網打盡張師正倦游錄互入阿附經莫赤匪狐莫黑匪烏注君臣相氶為惡如一詩邶比風衛君無道夫人無德詩靜女相覿以貨相賂以利記郊特牲史同惡相求如市賈焉左昭十三年凶德參會西漢灌夫等贊招呼元惡以自營衛專為群逆主萃淵藪東漢孔融傳傳記豹則虎之弟鷹則鷂之兄古樂府史為賢者諱也榖梁五孔子曰臣子不可以言君親之惡為諱者禮也史巫馬期傳大臣有坐不廉者不曰不廉曰簠簋不飾坐汙穢淫亂者不曰汙穢曰帷薄不脩坐罷軟不勝任者不謂罷軟曰下官不職西漢賈誼傳互入覆蓋張安世為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不翻水漿耶如何以小過成罪郎淫官婢婢兄自言安世曰奴誣汙衣冠其隱人過失皆類此西漢本傳互入覆蓋丙吉為丞相於官屬椽吏務掩過揚善同上互入揚善戴聖九江守行治多不法何武為剌史廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡西漢何武傳傳記忠臣令誹在己譽在上宋君奪民時以為臺而民非之無忠臣以掩蓋之也子罕執扑為司空民非子罕而善其君桓公宮中七市女閭七百國人非之管仲為三歸之家以掩桓公之非戰國策子言人之不善當如後患何孟離婁下史欲摘觖以揚我惡西漢孫寶傳觖謂挑發之也訐揚幽昧之過西漢趙后傳集好蔽美而稱惡楚辭互入掩善經罰弗及嗣書大禹謨顏回不遷怒語雍也子罪人不孥孟梁惠王下史敵怨不在後嗣忠之道也左文六年集不遷怒以臨下文選書史大旱公欲焚巫尫左莊十一年當其時不能治也後之人何罪左宣十六年室於怒市於色左昭十九年司徒期作亂公衛侯輒出適城鉏曰期則為此令苟有怨於夫人者報之夫人期姊期聘於越公攻而奪之幣期告王王命取之公怒殺期之甥之為大子者注忿期而及其姊為夫人者遂及夫人子左哀二十六年信襲破齊歷下軍遂至臨淄齊王以酈生為賣己乃烹之通監漢高紀趙王倫怒解系曰我於水中見蟹尚惡之況此人兄弟輕我耶此而可忍孰不可忍遂害之晉書苻堅聞亙溫廢立謂群臣曰溫前敗灞上後敗枋頭不能思愆自貶方更廢君以自說諺曰怒其室而作色於其父其溫之謂矣通監晉簡文紀互入陵犯李振屢舉進士竟不中第故深疾搢紳之士言於全忠曰此輩常自謂清流宜投之黃河使為濁流通監唐昭宗傳記太公曰不愛人者盡其胥餘胥餘里落之壁也尚書大傳大戰篇互入憎人及物遷怒所至毀及高曾史通憎其人者惡其餘胥說苑立則篇互入憎人易醜晉新安王遵曰我聞人姓木邊便欲殺之況諸桓乎晉中興書本朝怒移水中蟹坡詩
