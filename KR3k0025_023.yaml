body:
  text: 事難定論子仁義道德常安術也然而未必不危也汙漫突盜常危術也然而未必不安也荀榮辱謂夏必長而麥枯冬必雕而竹柏茂又盛陽宜暑而夏未必無涼日也極陰宜寒而冬未必無暫溫也抱朴子暢玄篇水主純冷而有溫谷之湯泉火體宜熾而有蕭丘之寒焰重類應沈而南海有浮石之山輕物當浮而牂柯有沉羽之流同上史晉司馬侯曰或多難以固其國啓其疆土或無難以喪其國失其守宇齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦喪之左昭四年孔子曰使仁者而必信安有伯夷叔齊使智者而必行安有王子比干孔子世家智者千慮必有一失愚者千慮必有一得西漢韓信傳馬或奔踶而致千里士或有負俗之纍而立功名漢武帝紀韓明宗曰苟有奇才雖屠釣奴虜之賤亦可用之苟非其人雖三后之胄自墜於皂隸矣後魏書夫吉凶之於人猶影響也為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉新唐中宗集盛衰無常惟受所丁東都賦不見公與相起身自犁鋤不見三公後寒飢出無驢韓文經死生有命富貴在天語顏淵子分定故也孟子楚王後車千乘非知也君子啜菽飲水非愚也荀天道兔走於街百人追之貪人具存人莫之非者以得兔為定分也積兔滿市過不能顧非不欲兔也分定之後雖鄙不爭慎子互入事同體異史庶人之富者或纍巨萬而貧者或不厭糟糠史平準書布帛尋常庸人不釋鑠金百鎰盜跖不摶非庸人之心重尋常之利深而盜跖之欲淺也史李斯傳竇姬入侍太后出宮人賜諸侯竇姬在行中姬家在清河欲如趙請其主遣官者使置我趙籍中官者忘之誤置代籍中至代王獨幸生兩男及文帝立姬立為皇后長男為太子史外戚世家漢文使善相者相鄧通相曰當貧餓死上曰能富通者在我何說貧於是賜通蜀道銅山得自鑄錢景帝立有告通徼外鑄錢案沒入之竟不得一錢寄死人家西漢佞幸傳班彪曰饑饉流隸飢寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也通監萬人逐兔一人獲之貪者悉止分定故也東漢袁紹傳集浮生有定分飢飽豈可逃杜工部高馬達官厭酒肉此輩杼軸茅茨空同上中人愛富貴高士慕神仙神仙須有籍富貴亦在天白樂天或有終老者沈賤如泥沙或有始壯者飄忽如風花同上所賦有厚薄不可移者命鵬鷃高低事皆定苟無金骨相不列丹臺名並同上顏回簞瓢才自給肥膿不到口年不登三十張蒼染愛浩無際妾媵填後房竟壽百餘歲白樂天互入分量不同事難詰問萬戶侯須骨上來劉賓客貴人自貴貧自貧元微之蓬纍江湖坎壈中歲衣不襲突不黔彼乘堅驅良滅沒於康莊者復何人哉繇是而言可以言命權載之譬之求珠於海而徑寸先得則衆皆怏然罷去知奇寶之有歸也柳文高流之為徐州剌史河決水繞城破一古墓得銘曰死後三百年背底生流泉賴逢高流之遷吾上高原流之為造棺椁改葬之朝野僉載經伯牛有疾子問之曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也語雍也子冉耕字伯牛以德行著名而有惡疾子曰命矣夫家語彭祖之智不出堯舜之上而壽八百顏淵之才不出衆人之下而壽十八仲尼之德不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位季札無爵於吳田恆專有齊國夷齊餓於首陽季氏富於展禽列子力命兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴淮南子夫顏回季路子夏冉伯牛孔子之通學也然顏淵夭死季路葅於衛子夏失明冉伯牛為厲同上精神訓史伯夷叔齊積仁纍行如此而餓死回也屢空而卒早夭盜跖暴戾恣睢橫行天下竟以壽終史記伯夷傳伯奇孝而棄於親子胥忠而誅於君西漢諸葛豐傳長平坑卒未必盡犯三刑南陽貴人豈必俱當六合通監唐紀康澄上疏曰雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長同上後唐明宗紀傳記天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動說苑至公篇集日何為兮右轉天何為兮左旋盤古何神兮立天地巨靈何聖兮造山川螟何細兮師曠清耳而不聞離珠拭目而無見鵬何壯兮摶扶搖而翔九萬運海水而擊三千龜與蛇兮異其長短之質椿與菌兮殊其小大之年鍾何鳴兮應霜氣劍何伏兮動星躔列子何方兮御風而有待師門何術兮驗火而登仙魯陽揮戈兮轉於西日陶侃折翼兮登乎上玄女何冤兮化精衛帝何恥兮化杜鵑唐文粹楊炯渾天賦以為天不知人事耶則周公有風雷之災宋景有三次之福以為知人事乎則楚昭有弗禜之應邾文無延朝之報曹植相論天意高難問杜工部自古聖賢多薄命奸雄惡少封公侯同上金張世祿原憲貧白樂天人生少滿百不得長歡樂誰謂天地心千齡與龜鶴同上愚者多貴壽賢者多賤夭謂天不愛人胡為生其賢謂天果愛人胡為奪其年並同上當秦之敗亂得一士而可王何五百人之擾擾而不能脫夫子於劍鋩抑所寶之非賢亦天命之有常韓愈祭田橫文自古賢者少不肖者多自省事已來又見賢者恆不遇不賢者比肩青紫賢者怕恆無以自存不賢者志得意滿賢者雖得卑位則旋而死不賢者或至眉壽不知造物者竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生壽夭耶未可知也韓文與崔群書顏淵簞瓢才自給肥膿不到口年不登三十張蒼染愛浩無際妾媵填後房竟壽百餘歲白樂天互入分量不同事有分定叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則歧歧然嶷嶷然文王之在母也母不憂既生也傳不勤既學也師不煩人之性果惡乎韓文豈蕩而為太空與化無窮乎將結而為光耀以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為卿雲以寓其神乎將為金為銀為圭為璧以栖其魄乎豈復為賢人以續其志乎將奮為明神以遂其義乎不然是昭昭其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎柳文互見吊祭門貴不必賢壽不必仁天之不可恃也久矣柳文孰致也而生孰召也而死焉從而來焉往而止交州産多奇怪草木亦殊異吾怪陽德之炳耀獨滿於紛葩濃麗而罕鍾乎人氣之靈不為偉人而獨為是物故楚之南少人而多石並同上夭顏病冉孔不知其故杜牧之集信乎天地鬼神之無情於善人為善者將安所歸乎李習之集天道之用莫神於龍受戮為醢不知其凶王者之瑞莫聖於麟遇害於野不知其仁元微之集誰知天地意獨與龜鶴年白樂天謂善之福夷死何餓謂惡之禍跖死何肥皇甫偍何聖者千年而愚者其麻鳳凰不下而雞滿家何草木不芝盡野而莎何蟲不龍盡水而蝦玉何為而脆石何為而頑衣冠何蹙戎狄何蕃何麟而怪何鶴而軒同上何闔閭之死金玉其墓何黔婁之死手足不覆孰主張其事而顛倒其數直道天何在同上本朝顏回飲瓢水陋巷臥曲肱盜跖厭人肝九州恣橫行回仁而短命跖壽死免兵愚夫仰天呼禍福豈足憑歐公集人獸生而有知死則無知矣蓍龜生而無知死然後有知也是皆不可窮詰同上行豐而腴乃享其癯莖華雖敷不菂而枯歐公祭質夫文世之言曰死者澌之今之來兮是也非也歐公集豈有聲名高後世遂無饘粥永今朝臨川集胡為而然胡負於天誰不壽考獨嗇其年誰不富貴使終賤寒老蘇集如海上沙是誰磋磨而能勻平無有粗細如空中雨是誰揮灑自然蕭散無有踈密東坡書若逵經將軍百戰竟不侯伯良一斛得涼州東坡淮山邃秀付草木不産英髦産嘉卉梅聖俞經凡居民材必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜五方之民皆有性也不可推移記王制子物之不齊物之情也或相倍蓰或相什百或相千萬子比而同之是亂天下也孟子滕文上性長非所斷性短非所續莊子駢拇篇謂鳧脛短鶴脛長強哭者雖疾不哀強歡者雖笑不樂淮南子史貴遊之子未必有斬將搴旗之才從軍征戍之役通監晉元集方鑿不受圓直木不為輪韋應物互入兩不相入莫將山下松結託水上萍白樂天子夫水勢勝火章華之臺燒雖涸井而竭池無奈之何也舉壺榼盆盎而以灌之其滅可立而待也淮南子兵略訓史重人曰待我不如捷之速也左成五石稱丈量徑而寡失西漢枚乘傳互見操約取詳董卓曰揚湯止沸莫如去薪通監後漢蘇威嘗言於帝曰臣先人每戒臣云唯讀孝經一卷足以立身治國何用多為通鑑傳記百人輿瓢而趨不如一人持而疾走戰國策集寸管下傃天地不能以氣欺尺表逆立日月不能以形逃選欲湯之滄一人吹之百人揚之無益也不如絶新止火而已同上投膠以變濁不如澄其源而濁變之愈也揚湯以止沸不如絶其薪而沸止之速也
