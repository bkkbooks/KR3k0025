body:
  text: 節操經如竹箭之有筠也如松柏之有心也記禮器子曰事君可貴可賤可富可貧可生可殺而不可使為亂記表記志士仁人無求生以害仁有殺身以成仁語衛靈公歲寒然後知松柏之後雕也語子罕可以託六尺之孤可以寄百里之命臨大節而不可奪也語泰伯見危授命語憲問子守志厲操者儀之則可以崇高節抗浮雲孟序身死而名彌白荀不苟史宋大司馬握節以死左子産曰苟利社稷死生以之左昭四年楚熊宜僚不為利諂不為威惕左哀十六年守以敦篤國語蒙恬曰自吾先人及至子孫積功信於秦主世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教以不忘先帝也乃吞藥自殺通監秦紀楚地皆降漢獨魯不下史記項羽紀蘇武既徙北海上單于使李陵至海上為武置酒設樂因謂武曰足下兄弟二人前皆坐事自殺來時太夫人已不幸子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此武曰自分已死久矣王必欲降武請畢今日之歡效死於前陵見其至誠喟然歎曰嗟乎義士陵與衛律之罪上通於天因泣下霑襟與武決去武留胸奴凡十九歲始以強壯出及還鬚髮盡白通監漢昭紀翟義曰死國埋名可以不慚於先帝通監漢平紀莽安車駟馬迎龔勝勝對曰豈以一身事二姓下見故主哉通監漢平紀校尉太原溫序為隗囂將荀宇所獲宇曉警數四欲降之序大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人宇衆爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜須於口顧左右曰既為賊所殺毋令鬚汙土遂伏劍而死通監漢光武楊彪以纍世為公卿恥為魏臣稱疾續漢書雖死之日猶生之年也東漢陳元傳士雖百行操業萬殊至於義節百行之冠冕也蜀姜維傳龐德罵關羽曰我寧為國家鬼不為賊將也魏志志烈秋霜精貫白日晉忠義傳序重義輕生亡軀徇節白刃可陵正心難折晉忠義贊守鐵石之深衷厲松筠之雅操見正心於歲暮標徑節於南風赴鼎鑊其如歸履危亡而不顧晉忠義傳序徑松方操嚴霜比烈晉書忠義傳贊秦王堅歎曰周孟威不屈於前丁彥遠潔已於後吉祖沖閉口而死何晉氏之多忠臣也通監晉武紀魏帝禪位于晉司馬孚拜辭執帝手流涕歔欷不自勝曰臣死之日固大魏之純臣也通監晉世祖紀楊盛聞晉亡不改義熙年號謂其子玄曰吾老矣終為晉臣通監南史宋高祖紀陶潛自以高祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來甲子而已南史本傳先軫喪元王蠋絶脰殞身殉義前代多之北史魏志露竹霜松故多徑節北史節義傳唐王之入關張季珣之弟仲琰弟琮兄弟三人皆死國難時人愧之通監唐高祖風霜其操鐵石其心同上李希烈留顏真卿不遣朱滔王武俊田悅李納各遣使詣希烈上表稱臣希烈召顏真卿示之真卿叱之曰汝知有罵安祿山而死顏杲卿乎乃吾兄也吾年八十知守節而死耳希烈乃使甲士十人守真卿於館舍掘坎於庭云欲坑之真卿怡然見希烈曰死生已定何必多端亟以一劍相與豈不快公心事耶希烈乃謝之通監唐德宗紀朱泚反德宗使假秀實往泚召秀實議事語至僭位秀實奪源休笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反耶遂擊之泚舉臂捍笏中顙流血新唐書段秀實傳顏杲卿嗔罵安祿山曰我世唐臣守忠義恨不斬汝謝上乃從汝反邪祿山不勝怒忿節解以肉噉之罵不絶唐書本傳巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也唐書張巡傳贊朱泚反諸生將從亂蕃正色叱不聽故六館無受汙者唐何蕃傳互入轉移人心屈突通口與心誓以死許國自摩其頸曰要當為國家受人一刀耳唐書身可殺而名不可死終始一操雖頽嵩岱不吾壓也唐書忠義傳躬可殞而名與嵩岱等矣唐書張鑑傳毅然之氣折而不沮唐書段秀實傳集守節沒齒忠莫至焉文選賦序互入忠鯁志烈秋霜心貞崑玉梁劉峻辨命論壯志凌蒼兕精誠貫白虹駱賓王集血三年而藏碧魂一變而成虹同上貞心凌晚桂徑節掩寒松駱賓王非稟乾坤之秀氣含宇宙之淳精孰能負凌雲概日之姿抱積雪封霜之骨同上清風蕩萬古跡與星辰高李太白集澗松抱節幽蘭有薰歲寒不變無人亦芬歐陽詹傳清標霜潔馨德蘭薰柳文涇原之亂柳惟深以變起卒遽奔匿賊徒及公而問焉追以相印公變名氏以紿之賊平公初名載至是奏請改命以滌僞署之汙飲冰徇節柳文劍共丹誠在劉長卿操列寒松心橫徑草張說之英標激俗節峻凌霜司空表聖秉志潔於瑾瑜皮日休剌心自明刎頸見志白樂天重義如太山輕生如鴻毛負剌謹身履冰勵節捐軀之魂死節之骨並同上憤容凌鼎鑊公議動朝廷溫飛卿節操凌霜而不雕杜牧之本朝高節不知塵土辱蘇子由經有殺身以成仁語子藺相如雖千載死人凜凜常如有生氣郭子史燕太子丹見田光曰燕秦不兩立願留意也光曰臣所善荊軻可使也太子曰願勿泄光見荊軻曰言足下於太子也太子告光曰勿泄是疑光也夫為行使人疑之非節俠也欲自殺以激荊軻曰願足下言光已死明不言也遂自刎而死史記本傳伍子胥窘於江上道乞食志豈嘗須臾忘郢耶故隱忍就功名非烈丈夫孰能致此哉史記子胥傳互入堅忍不拔伍子胥諫吳王吳太宰嚭讒之吳王賜劍死子胥乃告其舍人曰必植吾墓上以梓令可以為器而抉吾眼掛吳東門之上以觀越冠之入滅吳也乃自刎死史記彭越嘗與欒布游彭越反梟頭於洛陽詔曰有敢收視者輒捕之布奏事彭越頭下祠而哭之吏捕以聞布曰彭越已死臣生不如死請就烹史記本傳豫讓事智伯智伯滅讓挾匕首剌襄子襄子釋之頃之漆身為厲吞炭為啞行乞於市曰所以為此者將以愧天下後世之為人臣懷二心以事其君者也頃之襄子嘗出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅願請君之衣而擊以致報讎之意則死不恨襄子持衣與讓讓拔劍三躍而擊之曰吾可以下報智伯矣史記本傳互入堅忍不拔燕入齊聞畫邑人王蠋賢謂蠋曰吾以子為將封子萬家蠋曰忠臣不事二君貞女不更二夫與其生而無義固不如烹遂經其頸於樹枝自奮絶脰而死史記田單傳贊秦王令趙王鼓瑟藺相如曰聞秦王善為秦聲請奉盆缶秦王以相娛樂秦王怒不許相如進缶因跪請曰五步之內請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王為一擊缶相如顧趙御史書曰某年月日秦王為趙王擊缶史記本傳魯仲連聞秦為帝曰連有蹈東海而死耳吾不忍為之民也同上藺相如奉璧奏秦王視秦王無意償趙城乃曰璧有瑕請指示王王授璧相如持璧卻立倚柱怒髮上衝冠曰大王必欲急臣頭今與璧俱碎於柱矣相如持璧睨柱欲以擊柱秦王恐其破璧乃辭謝同上曹沫執匕首劫齊桓公盡歸魯之侵地史記剌客本傳聶政剌殺韓相俠纍因自反面抉目自屠出腸以死史記本傳荊軻見樊於期曰秦之遇將軍厚矣父母宗族皆為戮沒今聞購將軍首金千斤今有一言可以解燕國之患報將軍之讎願得將軍之首以獻秦王秦王必喜臣左手把其袖右手揕其胸將軍之仇報矣樊於期偏袒扼腕曰此臣之日夜切齒腐心也今乃得聞教遂自刎同上項王留沛公飲亞夫令項莊以劍舞擊沛公張良見樊噲曰今日事甚急噲請入與之同命即入軍門側盾撞衛士仆地遂入披帷立瞋目視項王頭髮上指目眥盡裂項王問客何為者張良曰沛公之參乘樊噲也王曰壯士賜斗酒噲立而飲之賜一生彘肩噲覆盾於地加彘肩上拔劍切而啖之王曰壯士能復飲乎噲曰臣死且不避巵酒何辭乎史記項羽紀田橫自剄二客穿其家旁孔皆刎下從之橫客五百人尚在海中使使召之至則聞田橫死亦皆自殺通監漢高紀貫高曰所以不死一身無餘者白張王不反也今王已出吾責已塞死不恨矣且人臣有篡弒之名何面目復事上哉縱上不殺我不愧於心乎乃仰絶亢遂死之通監漢惠紀赴死如歸前漢欒布傳吳郡王閎渡錢塘江遭風船欲覆閎拔劍斫水罵伍胥風息得濟謝承後漢書夫嚴氣正性覆折而已豈其負園委屈可以每其生哉凜凜焉皓皓焉其與琨玉秋霜比肩可也園即刓字團無稜角也每貪也言寧傾覆摧折不能委曲以貪生也東漢孔融傳殺身為君齊孟陽代君居床以待賊西漢紀信乘黃屋以誑楚破家為國要離焚妻子以徇吳李通誅宗族以從漢東漢孔融傳袁紹殺臧洪同郡人陳容曰將軍除暴先誅忠義豈合天意紹使人牽出容曰今日寧與臧洪同日死不與將軍同日生遂復見殺坐者歎曰如何一日殺二烈士後漢含笑入地東漢韓韶傳鄧文斬諸葛瞻瞻子尚歎曰父子荷國重恩不早斬黃皓使敗國殄民用生何為策馬冒陳而死通監魏元紀卞壺苦戰而死二子眕盱隨父後亦赴敵而死其母撫尸哭曰父為忠臣子為孝子夫何恨乎通監晉成紀有前死一尺無卻生一寸通監梁武紀千載之後凜凜猶生北史藺相如叱秦王目眥皆裂唐王君廓傳假秀實素有人望朱泚反召秀實議事源休在坐秀實勃然起執休腕奪其象笏奮前唾泚面遂擊之泚舉臂捍笏中顙流血滿面唐書互入節操張巡城陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以答國恩唐書李克用執孫揆揆大罵不屈克用怒使以鋸解齒不行謂曰死狗奴解人當夾之以板汝輩安知行刑刑者如其所言罵聲不輟至死唐書孫揆傳顏氏一門死於刀鋸者三十餘人通監唐元宗睢陽士卒死傷之餘才六百人張巡許遠分城而守之令南霽雲將三十騎犯圍而出告急於臨淮見賀藺進明進明強留之具食與樂延霽雲坐霽雲慷慨泣且語曰霽雲來時睢陽之人不食月餘矣霽雲雖欲獨食且不下咽也夫擁彊兵觀睢陽陷沒曾無分災救患之意豈忠臣義士之所為乎因齧落一指以示進明曰霽雲既不能達主將之意請留一指以示信歸報通監唐肅宗互入坐視劉闢發兵圍東川林蘊力諫闢舉兵闢怒械繫於獄引出將斬之陰戒行刑者使不殺但數礪刃於其頸欲使屈服而赦之蘊叱之曰豎子當斬即斬我頸豈汝砥石耶通監唐憲紀雖千五百年其英烈言言如嚴霜烈日可畏而仰哉唐顏真卿傳贊傳記烈士徇名壯夫重氣寧為蘭摧玉折不為瓦礫長存史通集烈士甘危軀以成人文選七啓烈心厲徑秋文選長安行齎志沒地選江文通恨賦縱死俠骨香不慚世上英李白海上五百人同日死田橫當時不好賢豈傳千古名乍向草中耿介死不求黃金籠下生同上寶劍思存楚金鎚許報韓駱賓王丹誠自守雖九死而如歸白刃交前豈三軍之可奪喑嗚則山嶽可崩叱咤則風雲變色同上壯志死不息千年如隔晨韓送惠師詩英心甘鬥死韓退之孟郊聯句至誠無忘炳若日月烈氣不散長為風雷呂和叔文苟效用之得所雖殺身而何計張九齡塵尾賦白虹千里氣血頸一劍義劉義平生一匕首孟浩然恨血千年土中碧高達夫泣血嘗膽誓復國讎刻骨鏤肌敢違天造陳子昂多應銜恨骨千古不為塵杜荀鶴萬古壯骨唐文粹植髮成干櫓厲氣成風雲同上縱死猶聞俠骨香王維集萬古英風柳文報恩不到頭徒作輕生士劉義文本朝生為楚英沒為吳豪烈氣不泯視此江濤東坡祈睛吳山文精誠貫山石為裂東坡詩張睢陽生猶罵賊嚼齒空齗顏平原死不忘君握拳透爪古今詩話
