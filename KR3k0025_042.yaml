body:
  text: 包容經九二包荒用馮河不遐遺易泰卦注能包含荒穢受納馮河者也用心弘大無所遐棄君子容民蓄衆易師卦含弘光大易坤卦含萬物而化光同上有容德乃大書君陳不啻不敢含怒書無逸斷斷倚無他技其心休休焉其如有容書秦誓如山如河記中庸戎之大賢與於人何所不容論語寬則得衆語陽貨豫不藏怒焉不宿怨焉孟子萬章上互見不修舊怨天地不包一物陰陽不生一類淮南子江海所以為百谷王以其不逆之苟有所逆衆流不至多矣傳子史川澤納汙山藪藏疾瑾瑜匿瑕左傳宣十五管仲常欺鮑叔善遇之不以為言史記管晏傳張安世為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不翻水漿耶郎官婢婢兄自言安世曰奴以恚怒誣污衣冠告署謫奴其隱人過失皆此類西漢互入深識大體丙吉宣帝時為丞相於官屬椽吏務掩過揚善有馭吏嗜酒嘗從吉出醉嘔吐丞相茵中西曹主吏白欲斥之吉曰以醉飽之失去士使人將復何所容身此不過汙丞相車茵矣遂不去西漢曹參曰獄市者所以并容也西漢本傳黃霸守穎川許丞老病聾督郵白欲去之霸曰許丞雖老尚能拜起送迎重聽何傷且善助之母失賢者意同上互見官長覆蓋九江守戴聖治多不法剌史何武廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡西漢何武傳漢網漏吞舟之魚西漢酷吏傳劉表與袁尚書曰當以大包小以優容劣通監東漢劉寬溫仁多恕雖在倉卒未嘗疾言遽色吏人有過但用蒲鞭罰之示辱而已夫人欲試寬令恚伺當朝會裝嚴已訖使婢奉肉羹翻汙朝服寬遽收之神色不異乃徐言曰羹爛汝手其性度如此東漢厚性寬中近於仁犯而不校鄰於恕同上卓茂傳周瑜程普皆為吳孫權將普頗以年長數凌侮瑜瑜折節容下終不與校普自欽服三國志謝萬嘗與蔡系爭言系推萬落床冠帽傾脫萬徐拂衣就席神意自若坐定曰卿幾壞我面晉書張率於家務忘懷在新安遣家僮載米三千碩還宅及至遂耗太半率問其故答曰雀鼠耗率笑而言曰壯哉雀鼠終不研問南史房文烈性溫柔未嘗嗔怒為吏部郎中時霖兩絶糧遣婢糴米因以逃竄三四日方還文烈徐謂曰舉家無食汝何處來竟無捶撻北史牛弘寬厚弟弼好酒因醉射殺弘駕車牛弘來還宅其妻迎謂之曰叔射殺牛弘無所怪問直答曰作脯坐定其妻又曰叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟通監隋煬紀長孫平為工部尚書時有告邴紹非毀朝廷上怒將斬之平曰鄙諺曰不癡不聾不甚作大家翁此言雖小可以喻大隋書狄仁傑曰何必窮其窟穴與螻蟻校短長哉通監唐紀婁師德深沈有度量人有忤己輒遜以自免不見容色其弟守代州辭之官教之耐事弟曰人有唾面潔之乃已師德曰未也潔之是違其怒正使自乾耳唐書本傳狄仁傑曰婁公盛德我為其所包容久矣通監唐紀互見心服柳公權嘗貯杯盂一笥縢識如故而器皆亡奴妄言叵測公權笑曰銀杯羽化矣唐書本傳李適之右相李林甫密奏其好酒頗妨政事玄宗惑焉乃除太子少保適之遽命親故歡會賦詩曰避賢初罷相樂聖且銜杯舉朝服其度量唐新語潘好禮曰方寸之地何所不容通監唐紀帝定禍亂而房杜不言功王魏善諫而房杜遜其直英衛善兵而房杜濟以文持衆美而效之君唐書贊傳記楚莊王賜群臣酒日暮酒酣燈燭滅有引美人之衣者美人援絶其冠纓告王趣火來上視纓絶者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命群臣百餘人皆絶去其冠纓而上火盡歡而罷説苑互入深識大體江海無不受故長為百川之主説苑集天稱其高者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容曹子建其為器也包乾之奧括坤之區文選方寸海納選三國名臣贊山不讓塵川不辭盈張茂先勵志詩大雅含洪量包山藪盧子諒書平生混涇渭駱賓王器量洪深度姿廣大郭有道碑乾坤之量包含海嶽柳文枵然其量廓爾其宇同上冰炭俱可懷孰云熱與寒韋應物虛懷容物白樂天狺狺之吠營營之飛置於度外李義山文妖星熒惑天所常懸牛溲馬渤地所常有皇甫偍量函千鈞唐文粹海受水而皆納鏡無形而不燭同上本朝則天謂狄仁傑曰卿在汝南時有譖卿者欲知其人乎仁傑謝曰陛下以臣為過臣當改之陛下明臣無過臣之幸也不願知譖者續世説德行篇韓魏公言在政府時有難處事蓋天下事無有盡如意須素包總不然不可一日處矣別録韓魏公有玉盞尤為寶玩一日將酌酒勸坐客俄為一吏觸碎坐客皆愕然吏伏地待罪公神色不動笑謂坐客曰物之成毀自有時何罪之有遺事韓魏公帥定武時夜作書令一侍兵秉燭於傍侍兵他顧燭燃公鬚遽以袖摩之而作書如故別録韓魏公在政府僚屬路拯者就案呈有司事而狀尾忘書名公即以袖覆之仰首與語從容以授之別録乾坤量廣大善惡皆含育歐公詩天高地厚靡不有醜好万狀奚足論同上國之有姦也猶鳥獸之有鷙猛昆蟲之有毒螫也區處調理各安其處則有之矣鋤而去之則無是道也東坡志林經不念舊惡怨是用希論語子不藏怒焉不宿怨焉孟子萬章下互見包容桓公能用管仲之功而忘射鉤之怨文公能聽寺人之言而棄斬祛之罪韓非子互入舍小就大晉賈李奔狄宣子使臾駢送其帑夷之搜賈季戮臾駢臾駢之人欲盡殺賈氏之族以報焉臾駢曰敵惠敵怨不在後嗣忠之道也左文六韓安國坐法抵罪獄吏田甲辱安國居無幾安國為內史甲肉袒謝安國笑曰公等足與治乎卒善遇之西漢本傳梁陸思鐸善射常於箭上自鏤姓名射帝中馬鞅帝拔箭藏之至是思鐸從衆俱降帝出箭示之思鐸伏地待罪帝慰而釋之尋授龍武右廂都指揮使通監梁均王本朝丁謂敗得竄道繇海康寇準從者有欲釋憾謀不利於謂準知之陳太席一廡間設戲具悉召至且命之博奕因隱几觀焉聞謂行乃罷五朝言行録經子曰以德報怨則寬身之仁也記表記子以德報怨人之難也尸子史晉又飢秦伯又餼之粟曰吾怨其君而矜其民左僖十五戴聖為九江守治多不法何武為剌史廉得其罪聖懼自免後為博士毀武於朝武聞之終不揚其惡聖子賓客為群盜得繫廬江聖自以子必死武平心決之卒得不死西漢何武傳韓信為楚王召辱己少年以為中尉西漢本傳官渡之戰袁紹使陳琳為檄書數操罪惡連及家世極其醜詆及袁氏敗琳歸操操曰卿昔為本初移文但可罪狀孤身何乃上及父祖耶與阮瑀俱管記室通監漢獻紀劉仁執運糧失船李義甫使袁異式鞠之曰君與朝廷何人為讎宜早自為計具獄以聞除名仁軌後為大司憲異式不安仁軌瀝觴告之曰仁軌若念疇昔之事有如此觴既知政事薦異式為司元大夫通監唐高宗紀李吉甫量移忠州剌史陸贄在忠州與吉甫相遇昆弟門人咸為贄憂初贄秉政貶李吉甫為明州長史而吉甫欣然厚禮都不銜前事以宰相禮事之猶恐其未信不安日與贄親狎若平生交契贄初猶慚懼後乃深交時論以吉甫為長者舊唐書陸贄傳傳記昔梁大夫宋就為邊縣與楚鄰界皆種瓜梁亭數灌其瓜美楚人稀灌其瓜惡楚因令夜竊搔梁瓜皆有焦者矣梁亭尉欲報搔瓜宋就曰是搆怨分禍之道也令人私竊為楚亭夜灌其瓜勿令知也楚瓜日美賈誼新書集元全柔氣象甚偉好以德報怨恢然者也柳文經濟衰救危唯在同好則所贍褊矣易略例不寬綽厥心書無逸惟是褊心詩葛屨子子豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面孟子公孫丑下史君之德宇何不寬裕也國語范睢眥睚之怨必報史記本傳崖眥莫不中傷五解反西漢孔光傳小智自私賤彼貴我西漢賈誼傳報睚眥怨西漢舉眼也黯褊心不能無少望西漢本傳互入怨望王濬曰不能遣諸胸中是吾褊也通監晉武紀互入明於自知蕭瑀性狷介與同僚多不合通監唐太宗互入寡合同官集直性狹中多所不堪山巨源絶交書毛髮亦不容唐文粹臥喜晚起而當關呼之不置一不堪也抱琴行吟弋釣草野而吏卒守之不得妄動二不堪也危坐一時痺不得搖性復多虱把搔無巳而當褁以章服揖拜上官三不堪也素不便書不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自強勉則不能及四不堪也不喜吊喪而人道以此見重巳為不見恕者所怨至欲見中傷者雖瞿然自責然不可化終不能獲無咎無譽如此五不堪也不喜俗人而當與之共事或賓客盈坐鳴聲聒耳囂塵臭處千變萬僅在人目前六不堪也心不耐煩而官事鞅掌機務纏其心世故繁其慮七不堪也嵇康絶交書互見寡合經躁人之辭多易互入多言子蟹六跪而二敖非蛇蟺之穴無所寄托者用心躁也荀子勸學躁則失君老子重為輕根章西門豹性急故佩韋以自緩韓非子輕譽苟毀好憎尚怒小人哉文中子互見輕於喜怒史宋殺楚使者申舟楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市左傳宣十四年皆笑曰公孫之亟也注亟急也言其性急不能受屈左傳袞二十四奮焉震電馮怒左傳昭五邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于床廢于爐炭爛遂卒莊公卞急而好潔故及是左傳定三年少溫藉於問切西漢義縱傳明帝常以事怒郎藥嵩以杖撞之嵩走床下帝怒甚疾曰郎出郎出嵩曰未聞人君自起撞郎東漢鍾離意傳袁談天性峭急魏志王濬伐吳自以功大為王渾父子所抑每進見陳其攻伐之勞及見枉之狀不勝忿徑出不辭晉書本傳王述性急嘗食雞子筯剌之不得便大怒擲地雞子圓轉不止下床以屐齒踏之又不得嗔甚內口中齧破而吐之晉書本傳謝密與友人棊友人西南棊有死勢復一客曰西南風急覆舟友人悟乃救之密大怒投局於地南史本傳皇甫湜性急嘗為蜂螫指購小兒斂蜂搗取其液一日命其子録詩一字誤詬躍呼杖未至嚙其臂血流唐書傳記蟹二螫八足非鱣之穴無所寄托者心躁也大戴禮記王思性急常把筆而蠅在筆端彈去復來思怒起逐蠅不能得去取筆壞而棄之魏略經必有忍其乃有濟書君陳子勾踐入官於吳執干戈為吳王洗馬故能殺夫差於姑蘇韓非子史魯以相忍為國左傳昭元趙孟曰以能忍恥庶無害趙宗乎左傳哀二十七魏齊笞擊范睢折脅摺齒睢佯死卷以簀置廁中使醉者更溺之通監周紀隱忍苟活函糞土之中而不辭者恨私心有所未盡史記司馬遷傳季布為人奴而不死必自負其材故受辱而不羞欲有所用其未足也故終為漢名將者誠重其死史記本傳夫能詘於一人之下而信於萬乘之上者湯武是也通監西漢高紀韓信為楚王召辱己少年告諸將曰方辱我時寧不能死死之無名故忍而就此西漢本傳淮陰屠中少年有侮信者因衆辱之曰能死剌我不能出跨下於是信孰視之俯出跨下蒲伏一市皆笑信以為怯通監西漢高紀漢書作跨史記作袴皆同大凡編書當以正史為主豈可取通監哉垂頭塞耳東漢馬援傳昔孝文卑辭胸奴先帝優與吳盟皆應權通變深思遠慮非若匹夫之忿者也通監魏明紀柏溫懷不軌郤超為之謀王文度與謝安詣超日旱未得前文度便欲去安曰不能為性命忍須臾耶晉書郤超傳兩敵共對惟當忍之彼不能忍我能忍是以勝耳同上朱伺傳唐張公藝九世同居高宗問其故書忍百餘以進通監唐紀互見宗族傳記能忍恥者安能忍辱者存説苑談叢篇集若昔之人作必行動必中則蘇秦無穿履之歎寧戚無石爛之歌孫弘無十上之勤商鞅無再干之勞也歐陽詹文直柄未當權塞口且吞聲侯喜石鼎聯句見韓文朝蠅不須驅暮蚊不可拍蠅蚊滿八區可盡與相格得時能幾何與汝恣啖咋涼風九月到掃不見蹤迹韓文不曲促無以見險難柳文包羞忍恥是男兒杜牧之未嘗有怨懟之色形於妻子之前同上卷舌吞聲滅影削迹唐文粹雲衢有志終驤首吏道無媒且折腰錢起吞聲混瑕垢杜詩本朝唾面慎勿拭出跨當俯就坡詩一忍可以支百勇老泉權書高祖忍之養其全鋒而待其斃此子房教之也東坡文
