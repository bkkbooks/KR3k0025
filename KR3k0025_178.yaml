body:
  text: 墓銘附行狀經銘之義稱美而不稱惡此孝子孝孫之心也銘者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下記祭統此雖是鼎銘然為銘之義均故借而入此子銘繫世傳其名也荀子禮論衛靈公死卜葬沙丘掘數仞得石椁洗視之有銘焉莊子則踢曹操曰使題墓道言漢故征西將軍曹侯之墓通鑑漢獻紀互入姦邪蔡雍曰吾為碑銘多矣皆有慚德惟郭有道無愧色耳東漢郭太傳趙岐曰吾死後一圓石墓側刻曰漢有逸人姓趙名嘉有志無時命也奈何東漢本傳溫郤王庾諸公之薨必須孫綽為碑文然後刊石焉晉書孫綽傳當時大臣家碑志非其筆人以為不孝唐書柳公權傳傳記魏侍中繆襲埋文父母墓下將以千載之後陸谷遷變故後人聞知但記姓名歷官祖父姻婭而已若有德業則為銘見類説事始石志不出禮經起顏延之為王琳作墓志銘以其素族無銘誄故也遂相祖習魏侍中繆襲埋文父母墓下將以千載之後陸谷遷變欲後人聞知但記姓名歷官祖父姻婭而已若有德業則為銘文王戎墓銘有數百字然則魏晉以來有墓志也漢杜子夏臨終作文命刊石埋墳前厥後墓志恐因此始集韻集張季友曰藏而不得韓君記猶不葬也韓張府君銘醉吟先生墓銘白樂天自作見本傳凡人之事迹非大善大惡則衆人無由知也故舊例皆訪問於人又取行狀以為依據今之作行狀者非其門生即其故吏莫不虛加仁義禮智妄言忠肅惠和或言盛德大業遠而愈光或云正道直言歿而不朽魯不得直敘其事故善惡混然不可明至如許敬宗李義府李林甫國朝之姦臣也其使門生故吏作行狀既不指其事實虛稱道忠信以加之則可以移於元齡魏證裴炎徐有功矣此不惟其處心不實苟欲虛美於所受恩之地而已由是事失其本文害於理而行狀不足以取信若使指事書實不飾虛言則必有人知其真偽不然者縱使門生故吏為之亦不可以繆作德善之事而加之矣今請作行狀者不要虛説仁義禮智忠肅惠和盛德大業正言直道蕪穢簡册不可取信但指事説實直載其詞則善惡功迹皆據事足以自見矣假令傳魏證但記其諫諍之詞皆足以為正直矣如傳段秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣今之為行狀者都不指其事率以虛詞稱之故無魏證之諫諍而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以為據李翱百官行狀奏本朝惟我祖考積善成德宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇賴其子孫矣乃列其世譜具刻于碑既又載我皇祖考崇公之遺訓太夫人之所以教而有待於修者並揭于阡俾知夫小子修之德薄能鮮遭時竊位而幸全大節不辱其先者其來有自廬陵集瀧岡阡表木抄見龜趺東坡百年富貴今誰見一代功名記至公後山外大父墓詩史古不墓祭始皇起寢墓側漢因不改四時上飯漢官儀寒食上墓禮經無聞近代相承寖以成俗士庶有不合廟祭者何以用展孝思宜許上墓同拜掃禮於塋南門外奠祭徹饌唐書明皇詔劉知遠殺從益王淑妃曰何不留吾兒使每歲寒食以一盂麥飯灑明宗陵乎通鑑五代漢高祖寒食野祭而焚紙錢五代周本紀後序奉先之道無寒食野祭之禮近代莊宗每年寒食出祭謂之破散五代會要集近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地想田野道路士女遍滿皂隸庸丐皆得上父母丘墓焉馬醫夏畦之鬼無不受子孫追養者柳宗元貽許孟容書丘墟郭門外寒食誰家哭風吹曠野紙錢飛古墓纍纍春草緑棠梨花映白楊樹盡是死生離別處宜寞重泉哭不聞蕭蕭暮雨人歸去白居易節過藏煙時當改火同上普天皆滅焰匝地盡藏煙唐李崇嗣詩萬井閭閻皆禁火九原松柏自生煙唐郭勛拜掃無過骨肉親一年惟此兩三辰冢頭莫種有花樹春色不關泉下人唐熊持登杏粥猶堪食榆羹已稍煎韋應物集本朝榆火戒時柏城在望薦籩豆之新物象几席之平居臨川集子子貢反築室於場孟子史冢舍西漢何並傳師古曰守冢之舍也依林作室後漢公沙穆傳蔣宗字元卿遭父憂有弔者盈門後母疾之不與席不得止舊廬於側作小庵漢書孝友王和子者其父為防秋卒戰死無子廬於墳所舊唐書列女傳集衣冠弓劍之地霜露感思之心尤藉謹良以顓守奉杜牧之傳記等會真如同超正覺西京記所願託影蓮臺遊神淨域狄梁公家傳集蓮花之國金池玉霤崇此香緣生彼穠秀陳子昂集本朝薦龍施之淨供助宿植於神遊臨川集雖聖靈之無礙對越在天從世法之有為皈依於佛東坡集喪期有數方嘆於壑舟法海無邊聊資於岸筏同上願假佛乘之妙少資淨土之因欒城集旁招淨衆歸誠甘露之門仰祝靈遊取證法雲之地詩話總龜史公會吳子伐齊將戰公孫夏命其徒歌虞殯左傳哀十二年杜預注送葬歌曲示必死傳記田橫死門人作蒿里薤露之歌崔豹古今注漢高時田橫死吏不敢哭但隨柩敘哀後代相承以為挽歌通典漢武時李延年分歌為二薤露送王公貴人蒿里送大夫士庶事物紀原忍苦為詩身到此永魂雪魄已難招直教桂子落墳土生得一枝冤始消托言載劉得仁出入場屋無成而終僧栖白詩薤挽寄哀音譙周法訓挽歌者喪家之樂執紼者相和之聲挽歌詞有薤露蒿里二章出田橫門人辭曰薤上朝露何易晞明朝更復落人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟蹰干寶搜神記集岱雲寡色江文通恨賦白日西匿同上浮雲無光並同上生為百夫雄死為壯士規王仲宣詠史詩朝發高堂上暮宿黃泉下白日入虞淵縣車息駟馬造化雖神明安得復存我愧繆襲挽歌詞長夜何冥冥一往不復還曹子建三良詩重壤永幽隔潘安仁悼亡舉聲淚已灑長嘆不成章同上榮華與歌笑萬里盡成空北齊魏祖孝徵鏘楚挽於槐風喝邊簫於松霧謝希逸宋貴妃誄飲餞觴莫舉出宿歸無期帷衽曠遺影棟宇與子辭送子長夜臺呼子子不聞泣子子不知陸士衡挽詩壙宵何遼廓大暮安可晨今托萬鬼鄰魂與寂無響備物象平生人往有返歲我行無歸年昔為七尺體今成灰與塵金玉昔所佩鴻毛今不振陸機挽詞行行去城邑遙遙首丘園息鑣竟平隧稅駕到岩根顏延之挽詞薤露歌連哭泉扉夜作晨擬玄集景移林改色風去水餘波劉孝綽詩金蘭徒有契玉樹已埋塵陳子昂集杳杳泉中夜悠悠代上春幽明長隔此歌笑為何人同上九泉如可作千載與誰歸駱賓王一旦先朝菌千秋掩夜臺草露當春泣松風向夕哀返照寒無影窮泉凍不流百齡嗟焂忽一旦附山阿華表迎千歲幽扄送百年薤露返成歌惟餘松柏隴朝夕起寒煙已上並駱賓王集互見阡隴佳城無白日賓閣有青苔張説萬事皆身外平生尚目前無由接神理揮涕問青松同上忽歎登龍者翻將弔鶴同琴詩猶可託劍履亦成空張九齡文寒影催年急哀歌助挽遲竟罷生芻贈空留畫扇悲舊室容衣奠新塋拱樹栽並同上酒甕凝餘桂書籤冷舊藝李義山文空餘雙玉劍無復一壺冰同上魂傷山寂然杜詩路衢惟見哭城市不聞歌里巷猶嗚咽草堂自此無顏色並杜詩古琴藏虛匣長劍挂空壁李太白集王公希代寶棄世抑何早又云王家碧瑤樹一樹忽先摧未成霖雨用先夭濟川材遺迹翳九原芳名動千古愁容變海色並同上河漢重泉夜梧桐半樹春韓文戚戚故交淚幽幽長夜泉孟東野大夜不復曉古松長閉門琴絃緑水絶詩句青山存昔為芳草顏今為芳草根薤歌一以去蒿閉不復開並同上一代英豪氣曉散白楊風劉賓客集滿山無主任春風四府舊聞多故吏幾人乘淚拜碑前相逢相識盡如夢如雲如雨今不知盡傾東海也須乾並同上龍門原上土埋骨不埋名白侍郎送葬萬人皆慘淡反虞駟馬亦悲鳴墓門已閉笳簫去惟有夫人哭不休蒼蒼露草咸陽壟此是千秋第一秋文章卓犖生無敵風骨英靈歿有神哭送咸陽北原上可能隨例作灰塵白日冷無光黃河凍不流去水絶還波相知成白首此別間黃泉悲鳴駟馬顧失涕萬人揮不但時人惜祗應吾道窮豪傑人誰在文章掃地無竟無宣室召徒有茂陵求封侯竟踈闕編簡為誰籌篋中亦有舊書札紙穿字蠹成灰塵日慘不光雲愁無色異口同哀聲已上並白侍郎獨繼先賢傳誰刊有道碑泉壤成終古雲山若在時秋風鄰笛發寒日寢門悲自此辭張邵何由見戴逵獨聞山吏部流涕訪孤兒劉長卿人間無處更相逢白雲去不返遺堞空崔嵬馭風仙路遠人間驚早露天上失朝雲逝水年無限佳城日易曛簫聲將薤曲哀斷不堪聞墮淚萬家人文字日生塵古今俱有此修短竟誰分樽酒空樽在絃琴豈重聞並同上故衣猶架上殘藥尚頭邊白侍郎可憐荒壟窮泉骨曾有驚天動地文同上池水猶含墨風雲已落秋孟浩然黃壤不知新雨露粉書空換舊銘旌杜牧之碩人多淪謝喬木自森羅張九齡文悲風吹雨濕銘旌萬雄飛互見葬劍逐驚波玉委塵溫飛卿遺風麗清韻蕭散九原松同上軔識怨兮亦緩駟知愁兮亦鳴唐文粹天地為怨草木為愁同上握珠不返泉匣玉不歸山韋應物夜泉愁更咽秋日慘無光武伯蒼永祕黃庭訣高懸漉酒巾姚少監名雖千古在身乃一生休同上蘭無香氣鶴無聲王建集衡嶽新摧夭柱峰士林憔悴泣相逢祗令文字傳青簡不使功名上景鐘柳文鵷鴻念舊行同上英奇一謝世視聽亦為塵孟東野珠沈百泉暗月死群象閟同上多才非福祿薄命是聰明不得人間壽還留身後名白侍郎貴人淪落路人哀劉賓客琴倚舊窗塵漠漠劍橫新冢草離離許用晦文生寄一壺酒死留千卷書同上碧空人已去滄海鳳難尋張承吉文玉井已乾龍不起羅隱集本朝精魄已埋沒文章豈能磨壽命雖不長所得固已多歐公詩蒿里無春色春風笳鼓咽松柏助蕭蕭歐公集空嗟埋玉樹齎志永沈沈名終埋不得骨且朽可妨失象奎星暗辭林玉樹凋泉臺一閉夜蒿里不知春諸老誰能先賈誼君王猶未識相如已上并出歐公集美德驚埋玉瓌材痛壞梁老泉集豐城寶劍忽飛去玉匣靈蹤自此無薤露有歌悽曉月絳紗無主蔽寒煙並同上有生常寂寞所得自風騷臨川集傳呼猶在耳會哭已填門音容無處所倣佛寄丹青撫几虛容在瞻圖實貌非衣冠餘故物杯案若平生琴樽已寂寞筆硯尚光輝蕭條昨日事倣佛古人風舊宅秋生菌新阡寒轉蓬厭代人間世收神天上遊銘旌蕭颯九秋風薤露悲歌落月中惠寄輿人誦悲傳挽者歌空復文章在流傳世上名前旌一幅粉書銘行路知君亦涕零靈輴悲去路象服儼虛容已上臨川並集沈約多清瘦文園仍病痟共疑天上召更欲水邊招金馬人相吊長沙物易妖秋風吹越樹歸旐自飄飄歐公集死者若可作今人誰與歸臨川賈山集作詩一日鳳鳥去千秋梁木摧煙留衰草恨風送暮林哀王荊公題子雱祠堂與昔未死無增虧東坡集耆老如今幾人在為君無憾為時悲佳城一閉無窮事南望題詩淚灑箋雲軿忽已歸仙府喬木依然擁舊廬華堂不見人瘦馬空戀皂白雲不解笑青松有餘哀骨朽姓名芳意長日月短已上並東坡集毀譽蓋棺了于今名實尊山谷詩有聲當徹天有淚當徹泉陳後山早棄人間事真從地下遊丘原無起日江漢有東流勳庸流琬琰形像付丹青若無天下議美惡併成空身去風流在更覺知音少還修地下文地要黃金骨天成白玉樓哀挽諸儒競豐碑故吏繁素車紛雨泣丹旐與風翻幾地留遺愛他年作九原涕流耆舊盡不獨為鄉園絲布千人從松楸十里行精爽回長夜衣冠出廣庭不應埋直氣會見吐長虹良貴官何與長年死不亡已上後山並陳詩梁壞吾安仰人亡道固臞山谷詩堂堂萬夫表直作閉佳城功名身後無瑕點孝友生知不琢磨並同上人間夢斷黃粱熟天上樓成白玉新僧參寥子詩落落聲塵隨逝水滔滔論著在名山凄涼四海門人淚想對秋風為一潸同上經周卒哭而祔記檀弓下卒哭曰成事是日也以吉祭易喪祭明日祔于祖父卒哭而諱生事畢而鬼事始已既卒哭宰夫執木鐸以命于宮曰舍故而諱新並同上
