body:
  text: 彊復遇彊經躍躍毚兔遇犬獲之毛詩子夫火熱而水滅之金剛而火銷之木強而斧伐之水流而土遏之淮南子主術論今夫虎豹便捷熊羆多力然而人食其肉而席其革淮南子史宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也左襄二十七寧成家居南陽及縱至關寧成側行送迎然縱氣盛弗為禮至郡遂案寧氏盡碎破其家史義縱傳蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀遊諸侯無所遇困於楚蘇秦故召而辱之舍人曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣陰奉給君資盡蘇君之計謀也張儀曰嗟乎此在吾術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言通監周紀漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射項羽羽大怒瞋目叱之樓煩目不能視手不能發走還入壁不復敢出西漢項羽傳汲黯為忮師古曰忮意堅也音章𢼧反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵憑前漢寧成傳東魏丞相高歡攻玉璧韋孝寬隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乘之以入城上先有二樓孝寬縛木接之令常高於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾通鑑梁高祖傳奕謂其子曰吾聞有金剛石者性至堅物莫能傷唯羚羊角能破之通鑑唐太宗安祿山於公卿皆慢侮之獨憚李林甫每見雖盛冬嘗汗沾衣林甫乃引與坐於中書廳撫以溫言自解披袍以覆之祿山欣荷言無不盡通鑑唐元宗秦系與劉長卿善以詩相贈答權德輿曰長卿自以為五言長城系用偏師攻之唐書本傳傳記天下無窮者才智也陳平嘗出六奇燕居深念恐禍及己陸賈教之交歡太尉又為畫呂氏數事平從之卒誅諸呂則賈之智謀又在乎平之右矣孔氏雜說互入當局者迷又入智慮集鹿畏貙貙畏虎虎畏羆柳文本朝羔豚窘虎豹鳩雀窮鷹鸇巧者具機弋勢猛還拘攣臨川集王荊公初參政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書趙清獻獨折之曰君言失矣皋夔稷契之時有何書可讀荊公默然邵氏後録互入敏於應對一輿薪之火衆人之所憚而不敢犯也舉而投之河則何熱之能為老蘇集經不懲其心覆怨其正箋云不止女之妊心而反憎其正詩節南山彼醉不臧不醉反恥詩賓之初筵子鄉原言不顧行行不顧言曰古之人行何為踽踽涼涼孟子盡心衆曲不容直衆枉不容正淮南子直繩者枉木之所憎抱朴子史惡直醜正左已則無禮而討於有禮者曰汝何故行禮並左傳盜憎主人成十五年晉伯宗之妻曰盜憎主人別見于家語闒茸佞讇抱虛求進殘賊酷虐若此之徒嫉善憎忠西漢李尋傳北山有鴟不潔其翼叨餮貪汙臭腐是食長鳴呼鳳謂鳳無德東漢朱暉傳注互入不自覺醜妄議二門後漢孔奮為武都郡丞力行清潔為衆人所笑以為身處脂膏不能自潤通鑑羊祜不附結中朝權貴荀勗馮紞之徒皆惡之通鑑晉世祖佞邪醜正西晉張華傳燕封裕曰已無骨鯁嫉人有之通鑑晉紀互入嫉妬便佞之徒謂彊直為擅權唐書傳記趙簡子曰美女者醜之仇也盛德之士亂世所疏也正直之行邪枉所憎也說苑集學者以莊老為宗而黜六經談者以虛薄為辨而賤名檢行身者以放濁為通而狹節性進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪其倚仗虛曠依阿無心者皆名重海內若夫文王日昃不暇食仲山甫夙夜匪懈蓋共嗤點以為灰塵相詬病矣晉紀干寶總論孤直者衆邪之所憎公正者群惡之所嫉陳子昂集奴顏婢膝真乞丐反以正直為狂癡陸魯望本朝在位而不肯自憂又禁他人使皆不得憂可嘆也歐公集子是猶惡濕而居下孟子蒙塵而欲毋眯涉水而欲毋濡不可得也淮南子繆稱訓吹灰而欲毋眯涉水而欲毋濕不可得也淮南子史賈而欲嬴而惡囂乎左昭元集是徒涉而恥濡足也唐文粹子樹欲靜而風不停家語致思犧牛衣文繡食芻菽入太廟雖欲為孤犢其可得乎列子象以牙喪身不能去其白薰以芳自燒不能去其香蘇子史李斯臨刑謂其子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎史本傳夫士修之於家而壞之於天子之庭通鑑譬如磑石之上行蟻蟻行遲而磑轉疾後漢王充論衡宋劉穆之曰貧賤常思富貴富貴必履危機今日而欲為丹陽布衣豈可得耶通鑑晉書涼呂超曰如乘龍上天豈可中下通鑑晉紀獨孤后曰騎獸之勢必不得下隋書目見可欲何能自窒于心已與交私何能中絶其意通監唐德宗李泌歸謂子弟曰吾本不樂富貴而命與願違今纍汝曹矣通鑑唐德宗傳記牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭策痛矣袁淮正書集女辭家而適人臣出身而事主禰正平賦遊山澤觀魚鳥心甚樂之一行作吏此事便廢晉嵇康與山濤絶交書去住與願違仰慚林間翮杜工部譬如籠中鶴六翮不自搖騎虎不敢下並韓文心雖出雲鶴身尚觸籠鷹心源雖了了塵世苦憧憧並元微之開卷不及顧沈埋案牘間世事波上舟沿洄安得住意有清夜戀身為符守嬰並韋應物一落名宦途浩如乘風船奔走情波不自由並劉賓客驛馬走四蹄痛酸無歇期磑牛封兩目昏閉何人知樹欲靜而風不止並自樂天自嫌如匹素刀尺不由身杜牧之隨牒牽黃綬孟浩然雖百中之自我終一呼而在君高達夫互入控制有道本朝始知鎖向金籠聽不及林間自在啼歐公集飄零不自由盛亦非汝能我生天地間一蟻寄大磨區區欲右行不救風輪左並東坡詩一被簪裳裹長遭羅網牽欒城集經巧曆不能定其算數聖明不能為之典要法制所不能齊度量所不能均也周易略例若火之燎于原不可嚮邇書盤庚上互入無所用力我躬不閲遑恤我後言我今尚恐不能自容何暇憂我後之人乎毛詩成事不說遂事不諫既往不咎論語子目之明能見於百步之外而不見其背帷墻之外則無睹也子華子萬室之國一人陶則可乎孟告子下猶七年之病求三年之艾也孟子世固非一毛之所濟列子楊朱篇古人目短於自見故以鑑觀面韓非子瞽者無以與乎文章之觀聾者無以與乎鍾磬之聲莊子逍遙遊盲者無以與乎眉目顏色之好瞽者無以與乎青黃黼黻之觀莊大宗師離朱之明察毫末於百步之外下水尺不能見淺深非目不明其勢難覩也慎子朝露之繭工女不能治淄澠之沙計兒不能數魯連子躄者見虎不走非勇也淮南子離朱之明察毫末於百步之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外淮南子訓道論故君子能為善而不能必其得福不忍為非而未能必免其禍淮南子繆稱訓瞽曠能默瞽曠不能齊不齊之耳狄牙能喊呼覽切狄牙不能齊不齊之口楊問神歐治不能鑄鉛錫為干將抱朴子阿膠三寸不足止黃河之濁毀箄三尺不足救鹽池之鹹傅子史晉伯宗曰雖鞭之長不及馬腹左宣十五晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也左成十互入疾病飄風之末不能舉鴻毛國語彊弩之極矢不能穿魯縞衝風之末不能漂鴻毛非初不徑末力衰也史韓安國傳死病無良醫通鑑周紀昔伊摯在夏呂望在商而二國不治豈伊呂之不欲哉勢不可也同上覆水不收東漢光武紀蓋萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也通鑑漢桓紀徐稚曰夫大木將顛非一繩所維通鑑漢桓紀隄防穿漏萬夫同力不能復救通鑑漢孝紀若河決金堤火炎崑岡雖神禹之乘四載玄冥之灑八瀛亦不能堙洪濤而撲烈焰者何也良以勢既壞而不能遽救也唐史臣代宗贊傳記騏驥盛壯之時一日而馳千里至其衰也駑馬先之戰國策互入事必有極猶渴而穿井臨難而鑄兵雖疾從而不及也說苑雜言篇互入遠水不救近火尺水不能卻蕭丘之熱意林集孰江河之可涸楚辭譬猶疾疢彌年而欲一丸銷之選詩集序沈寒凝海不能結風烈火流金不能焚景選連珠鞭長不及馬腹風末不舉鴻毛朱敬則宋武論譬如心中疾針石非所砭韓文獵客張兔置不能挂龍虎李太白集短線無長縫月中有桂樹無翼難上天海底有驪珠下隔萬丈淵並唐文粹轆轤無繩井百尺盧同詩索過風於前林求往夢於既寤不可及也穆玄同德寺會集序本朝疾風無末勢陳後山子譬猶好聲色而無耳目也荀王伯臨河羡魚而無網罟枹朴子釋滯篇傳記猶鴻鵠之無羽翼也雖有千里之望不能致其意之所欲至說苑尊賢集潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲謝玄暉首燕徒有心局步何由騁梁劉孝綽詩我欲橫天無羽翰孟東野時危思報主衰謝不能休致君時已晚懷古意空存並杜詩喑人食太牢信知其味而不能形於言劉賓客虛逢好陽艷其奈苦昏懵元微之互入事與願違遙看雲路心空在同上本朝巧舞苦短袖東坡詩子莊周貧往貸粟於監河侯侯曰諾我將得邑金貸子三百金可乎莊周忿然作色對曰昨來有中道而呼者周顧視車轍中有鮒魚周曰激西江之水而迎子可乎莊子外物失火而取水於海水雖多火必不滅矣遠水不救近火也韓非子焦喉之渴遙指滄海指冰室不能起暍死之熱望炎治不能止噤凍之寒大廈既燔而運水於滄海此無及也並枹朴子穿井而救火則熛揚棟焚矣鑿舟而拯溺則葬江魚之腹中矣劉子史周詩曰俟河之清人壽幾何左襄八及溺呼船吳志譬如火發於家安能俟遠水乎通鑑唐昭宗傳記猶渴而穿井臨難而後鑄兵雖疾從而不及也說苑雜言篇互入力所不及集桃實千年非易待駱賓王本朝不應遠水救近渴陳後山集獵人箭底求傷鴈釣戶竿頭乞活魚王建本朝刮毛龜背上何時得成氈枯松強鑽膏槁竹欲瀝汁並東坡詩子泉涸魚相與處於陸相詬以濕相濡以沫莊子大宗師假榖於夷齊之門告寒於黔婁之家所得者不過橡栗縕褐必無太牢狐裘矣抱朴子祛惑史自屈原沈汨羅後百有餘年漢有賈生為長沙王太傅過湘水投書以吊屈原史記屈平傳集枯松強鑽膏槁竹欲瀝汁兩窮相值遇相哀莫相濕坡詩經君子惡居下流天下之惡皆歸焉語子張史去柳葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中者百發盡息史記周本紀下流之人衆毀所歸西漢揚惲傳貧下未易居上流多謗議西漢司馬遷傳互入處非其地經心以體全亦以體傷記緇衣子趙孟之所貴趙孟能賤之孟子水能載舟亦能覆舟荀子史自我得之自我失之亦復何恨通鑑梁武帝紀侯自我得之自我捐之無所恨前漢田蚡傳夫水能浮草木亦能沈之地能生萬物亦能殺之江海能下溪谷亦能朝之聖人能從衆亦能使之後漢趙曄吳越春秋集淮陰之禍冤在神理通說且拒豨謀寧起堂堂蕭公實曰知已紿致鐘室胡寧忍此呂和叔文經有其禮而無其財君子弗行也有其財而無其時君子弗行也記檀弓下子為可為於可為之時則從為不可為於不可為之時則凶楊子在夷貉則引之倚門墻則麾之楊子修身世冶則以義衛身世亂則以身衛義文子史陸賈曰馬上得之寧可馬上治之乎西漢孔子對葉公以來遠哀公以臨人景公以節禮非其不同所急異務也通鑑漢質紀禮教榮辱以加君子化其情也桎梏鞭朴以加小人化其形也通鑑漢獻紀崔郾為廣州剌史治以寬經月不笞一人及涖鄂州嚴法峻誅不貸唐書天下未定則專取其才不考其行喪亂既平則非才行兼備不可用也通鑑唐太宗柳仲郢為京兆尹政號嚴明後出為河南尹以寬惠為政或言不類答曰輦轂之下先彈壓郡邑之治本惠養唐書互入政事集理在將順怡然而奉旨事當正色儼然而犯鱗唐文粹君子救時雖切必相時度力以致其用不可則靜而鎮之以道訓服司空表聖集本朝人臣納說於君因其既厭而止之則易為力迎其方鋭而折之則難為功東坡代張方平諫用兵書子惡辱而居不仁是猶惡濕而居下也孟子互入自相背馳惡死亡而樂不仁是猶惡醉而強酒孟子互入自相背馳史元宗曰是子惡賢嫉能舉無比者裴士淹曰陛下誠知之何任之久耶帝默不應新唐書李林甫傳中宗親遭母后之難而躬自蹈之唐史中宗贊吉頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子已立而外戚猶為王此陛下驅之使他日必爭兩不得安也太后曰朕亦知之然業如是不可如何通鑑唐武后右補闕辛替否上疏曰口說不如身逢耳聞不如目覩且陛下與太子當韋氏用事之時日夕憂危切齒於群凶今幸而除之乃不改其所為臣恐復有切齒於陛下者也通鑑唐玄宗楊國忠謂客曰吾本寒家一旦緣椒房至此未知稅駕之所然念終不能致令名不如且極樂耳同上傳記文君眉色不加黛飾臉若芙蓉長卿素有消渴疾作美人賦自剌卒以此疾死西京雜記互入耽好集睹前車之傾覆而不改其轍跡選六代論小蟲水草楂梨橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者柳文序是悔其覆車不易前轍之失唐文粹本朝唐王涯自以留心太元經久矣乃有甘露之禍文宗時且太元惟以進退消息為說涯知其說而不能行何也鳴道集此孟子所謂知兄臂之不可襟而姑勸以徐知鄰雞之不可攘而月取其一東坡法明禁之而人明犯之是不有天子之法也老泉子猶傴伸而好升高也指其頂者愈衆荀儒效史適足以發笑而自點耳司馬遷傳智伯曰吾乃今知水可以亡人國也襄子夜使人決水灌智伯軍軍亂殺智伯通鑑互入因言取禍李吉甫言天下已太平陛下宜為樂上謂左右曰吉甫專為悅媚通鑑唐憲宗太后習貓使與鸚鵡共處出示百官傳觀未遍貓飢摶鸚鵡食之太后甚慚通鑑唐武后盧藏用隱終南山晚乃徇權利司馬承正召至闕下藏用指南山曰此中大有佳處承正徐曰仕宦之捷徑耳藏用慚新唐書本傳互入識者所窺傳記謝元以八萬當苻堅百萬之衆其勢不敵若苻堅逼肥水而陳必保萬全惟麾軍卻退衆亂不能止故敗世謂謝元能走苻堅者此耳孔氏雜說集虎見驢鳴大駭然往來視之覺無異能益習其聲稍近驢怒蹄之虎曰技止此耳因斷其喉盡其肉乃去噫形之厖也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫柳子厚黔之驢本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歷數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入巧反成拙經既輸爾載將伯助豫詩正月注言國危而求賢者已晚矣將恐將懼惟豫與女將安將樂女轉棄豫將恐將懼置豫于懷將安將樂棄豫如遺幽小雅谷風史越子使后庸來聘且言邾田封于駘上欲使魯還邾田封竟至駘上盟于平陽三子皆從季康子叔孫文子孟武伯皆從后庸盟康子恥從蠻夷盟言及子贛思子贛曰若在此吾不及此夫不及與越盟武伯曰然何不召曰固將召之文子曰他日請念言季孫不能用子貢臨難而思之左哀二十七互入因事思人公曰吾不能早用子今急而求子是寡人之過也左僖三十人窮則反本故勞苦倦極未嘗不呼天地疾痛慘怛未嘗不呼父母也史屈原傳寬則寵名譽之人急則用介胄之士史記韓作傳孔融為賊管亥所圍遣太史慈求救於平原相劉備備曰孔北海乃復知天下有劉備耶東漢孔融傳李克用曰當阽危之時譽為韓彭伊呂及既安之後則罵為戎羯胡夷通鑑僖宗紀黃巢北趣襄陽劉巨容拒之大破賊衆或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛宮賞事寧則棄之或更得罪不若留賊以為富貴之資衆乃止通鑑唐僖宗飢則為用飽則揚去魏志傳記飢則附人飽則高飛十六國載記集計窮然後賽後賽竟何恩元稹集臨老抱佛腳教妻讀黃經唐文粹史遼東有豕生子白頭異而獻之至河東見群豕皆白懷慚而還若以子之功論於朝廷則為遼東豕也後漢朱浮傳互入聞見淺狹集楚翠丹質在荊南以多慚遼豕白頭望河東而載恧劉賓客集本朝雕琢肝脾欲報公還如獻豕過遼東僧參廖子詩子孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣及文馬四十以遺魯君魯君觀之終日怠於政事三日不聽國政孔子遂行家語以瓦摳者巧以黃金摳者惛列子黃帝篇以瓦注者巧以金注者惛莊子達生有情於譽飽雖蒙惠而非德無情於傷辱雖獲毀而無憾劉子去情劉棻從楊雄學奇字雄不知情顏師古曰古文之異者不知獻符命之事也棻乃劉歆之子初莽以符命自立即位之後欲絶其原以神前事棻復獻之投棻四裔西漢楊雄傳李廣見草中石以為虎而射之中石沒矢視之石也它日射之終不能入西漢李廣傳蔡裔有勇氣聲若雷震嘗有三盜入室裔拊床一呼而盜俱殞晉書互入敢勇鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚愕出於意外故也晉書傳記楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無跡韓詩外傳園中有水其端有蟬蟬悲鳴飲露不知螳蜋在其後曲跗欲取其蟬而螳蜋不知黃雀在其後延頸欲啄之然黃雀又不知臣操彈圓在其下皆務前不顧後患劉向說苑互入貪迷本朝人能碎千金之璧而不能無失聲於破釜能摶猛虎而不能無變色於蜂蠆東坡黠鼠賦泰山覆於前而色不變麋鹿興於左而目不瞬老泉子投鉤分財投策分馬得美者不知所以德慎子媒揚譽人而受譽者不以為德臣虜強飯而蒙飽者不以為惠劉子去情篇集若自有聲名又託形勢此乃市道之事又何足貴乎韓文薦侯喜狀見危者已墜而欲援觀鬥者將死而方救皮日休互入市恩本朝譬如傭力之人計工而受直雖與之千萬豈知德其主哉老泉文子吾不見震風之能動聾聵也揚問明史太子仁孝謹靜張垍高力士常保護於上前故林甫終不能間也通鑑唐元宗楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至國忠之言不能入矣通鑑唐元宗集蒸不能潤灼不能熱杜牧之春花與秋月不感無情人白侍郎臣有大拙智所不化醫所不攻威不能遷寬不能容柳乞巧文本朝衝風震河海不能號無竅東坡互入無所用力鑽灼不燃誰似我東坡詩
