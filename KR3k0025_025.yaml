body:
  text: 事難遙度經如匪行邁謀是用不得于道詩小旻箋不行而坐謀遠近是於道路無進於跬步史傳聞不如親見東漢馬援傳傳聞與指實不同懸算與臨事有異通監趙充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略西漢趙充國傳經天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也記中庸子曰貧而無怨難富而無驕易語憲問子挾泰山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也孟子先甲一日易後甲一日難楊先知客有為齊王畫者問之畫孰最難曰狗馬最難孰最易曰鬼魅最易狗馬人所知也旦暮於前不可類也故難鬼魅者無形無形者不可覩故易韓子禹能決江疏河以為天下興利不能使水西流稷能闢田墾草以為百姓力農而不能使冬生禾淮南子史鐫金石者難為功摧枯朽者易為力吏道以法令為師可問而知及能與不能自有資材何可學也通監言成事者以功著易顯謀幾初者以理隱難照東漢邳彤傳魏韓顯宗曰使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而就通監宋紀傳記忠於治世易忠於濁世難呂氏春秋集危於纍卵難於上天易於反掌安於泰山選書儀天步晷而修短可量臨淵揆水而淺深難察選演連珠夫力易強而有功也心難強而有智也韓文將新變故易持故為新難東野本朝道可以講習而知德可以勉強而能惟知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉東坡凝對策譬如江河之徙移順其所欲行而治之則易為功強其所不欲而復之則難為力東坡議學校貢舉狀子離婁之明公輸子之巧不以規矩不能成方圓師曠之聰不以六律不能正五音孟離婁上盜亦有道莊子公輸不能加於繩墨荀法行釋法而為治堯不能正一國使中正守法拙匠執規矩尺寸則萬不失一也韓非子無準繩雖魯班不能以定曲直淮南子斷木為棋梡革為鞠亦皆有法楊子史譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左襄三十不習為吏視已成事西漢賈誼傳謀事必就祖發政占古語西漢韓安國傳經若升高必自下若陟遐必自邇書太甲下君子將營宮室宗廟為先廄庫為次居室為後記曲禮下凡畫繢之事後素功周禮考工記凡家造祭器為先養器為後同上未有入室而不由戶者記禮軍君子之道譬如行遠必自邇譬如升高必自卑中庸物有本末事有終始知所先後則近道矣大學子曰繪事後素語八佾子堂上不糞則郊草不瞻矌藝荀強國注堂上猶未糞除則不可瞻視郊野之草也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此故先後上下不可不審淮南子說山訓史僑聞學而後入政未聞以政學者也左襄三十一譬猶行舟雖不橫截迅流然當漸靡而往稍向所趨然後得濟也通監集春兩潤木自葉流根文選將欲茂枝葉必先救根株白樂天本朝今世稱善草書者或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡書唐六家書後子人有亡鈇者意其鄰之子視其行步竊鈇也顏色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇其谷而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子說符篇互見心隨事後史臧文仲既歿其言立左襄二十五子産從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之左襄三十子順曰民之不可與慮始久矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及賢庸知謗乎適監周紀子順曰先君相魯人誦曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰裘衣章甫實獲我所章甫裘衣惠我無私同上張湯既死家産直不過五百金昆弟諸子欲厚葬母曰湯為天子大臣被汙惡言而死何厚葬乎載以牛車有棺無槨天子聞之乃盡案誅三長史通監漢武紀劉敬使胸奴還言不可擊時漢兵已行上怒械繫敬至平城胸奴圍帝七日得解帝赦敬曰吾不用公言以困平城吾已斬前使十輩言可擊者矣乃封敬為侯史本傳充國奏每上輒下公卿議臣初是充國計者什三中什伍最後什八西漢本傳所居無赫赫名去後常見思西漢何武傳要之死日然後是非乃定司馬遷傳王邑嚴尤謂桓談曰子常稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也自雄之沒至今四十餘年其法言大行楊雄傳並西漢昔卞和獻寶以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善東漢班固傳陳實為功曹中常侍侯覽託太守高倫用吏倫教署為文學實知非其人懷檄請見曰此人不宜用而侯常侍不可違實乞從外署倫從之鄉論怪其非舉倫後為人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚強禦陳君可謂過則稱己者也實因自引愆聞者方歎息同上本傳互入分謗論者或譏陳群居位拱默正始中詔撰群臣上書以為名臣奏議朝士乃見群諫事皆歎息焉通監三國魏明紀樂廣為尚書令所在無常時之功譽然去後為後人所思晉書初王敦之舉兵也周顗表救王導言甚切至導不知救而甚銜之敦既誅顗導後料檢中書故事見顗表救己殷勤款至執表流涕晉書周顗傳王導曰人言我憒憒後人當思此憒憒世說在官無當時譽去後為人所思晉書謝安傳晉王珣曰王陵廷爭陳平謹默但問歲晏何如耳通監晉書陽城處諫諍官士以為且死職天下益憚之及受命他諫官論事苛細紛紛帝厭苦而城寖聞得失且熟猶未肯言韓愈作諍臣論譏切之居位八年而人不能窺其際及裴延齡誣逐陸贄等帝怒甚無敢言城上疏極論延齡罪慷慨引義申直贄等纍日不止聞者寒懼城愈勵唐書本傳互入不可淺量及不可窺測賢者不得志於今必取貴於後古之著書者皆是也唐柳宗元傳傳記天漢二年桓山西國獻續弦膠吉光毛裘帝受以付庫不知二物之妙也以上貢不奇稽留使未遣會帝幸華林苑射虎而弩斷弦使者從駕上膠一分使口濡以續弦帝驚乃使武士數人對掣終日不斷毛裘入水經月不沈入火不焦帝重之厚賂使者而遣之十洲記豫章之木生七年而外始辨廣志集春華雖美期於秋實水璧雖澤期於見日晉裴祇女史針文仲沒而其言立子産終而遺愛存張曲江集桃李盛時雖寂寞雪霜多後始青蔥李義山文一發之初雖失正鵠百鍊之後方辨精銅白帖試玉要燒三日滿辨材須待七年期周公恐懼流言日王莽謙恭未篡時假使當時身便死一生真僞有誰知白樂天千淘萬漉雖辛苦吹盡狂沙始到金劉賓客福不在於其身慶必流於後嗣唐文粹大抵生則不遇死而垂聲者衆焉楊雄沒而法言大興馬遷生而史記未振柳子厚集凡人可以言古不可以言今桓談亦云親見楊子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之高者至少矣由此觀之古之人未嘗不薄於當世而榮於後世也韓文本朝譬如磨鑑不滅愈光一世之短萬世之長歐公祭蘇子美文良藥不甘口厥功見沉痾忠言初厭之事至悔若何歐公集又如食橄欖真味久愈在同上後世苟不公至今無聖賢同上松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千年而不改者其天定也東坡三槐堂記一時之屈萬世之信東坡王元之畫像贊序始以帝堯之聰姑試伯鯀終為孔子之聖不信宰豫東坡呂惠卿責授制人去方知德業尊欒城集端如嘗橄欖苦過味方永山谷詩難以口舌爭水清石自見同上和氏有尺璧楚國無人知但知玉非石果有遭逢時同上互見解紛是真難滅經城復于隍易泰卦悠悠蒼天曷其有常詩唐風鴇羽高岸為谷深谷為陵詩十月之交互入物理盈虛子臭腐復化為神奇神奇復化為臭腐莊子傳記麻姑謂王方平曰自接侍以來見東海三為桑田向間蓬萊水亦淺於往者會時略半也顏真卿麻姑壇記集悲泰山之為隍住城下地也楚辭繁華有憔悴堂上生荊杞阮嗣宗諫懷詩空桑之里變成洪川歷陽之都化為魚鱉劉孝標論循環翻覆迅若波瀾選廣絶交論人間百年物理千變名利寵辱之情立愛憎毀譽之跡生駱賓王東海波連天三度成桑田高岸高於屋斯須變溪谷天地猶尚然人情難久全夜半白刃讎旦來金石堅盧同文本朝芙蓉芰荷之的歷幽蘭白芷之芬芳與天佳花美木列植而交陰此前日之蒼煙白露而荊棘也高甍巨桷水光日影動搖而下上其寬間深靚可以答遠響而生清風此前日之頽垣斷塹而荒墟也嘉時令節州人士女笑歌而管絃此前日之晦冥風雨鼪鼯鳥獸之嗥音也歐文昔者荒草野田霜露之所蒙翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毀相尋於無窮則臺之復為荒草皆不可知也東坡凌虛臺記世道如奕棋變化不容覆坡詩卷終
