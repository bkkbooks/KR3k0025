body:
  text: 有忌憚經豈敢愛之畏我父母仲可懷也父母之言亦可畏也豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也豈敢愛之畏人之多言仲可懷也人之多言亦可畏也詩將仲子豈不懷歸畏此罪罟詩小明豈不懷歸畏此簡書詩出車十目所視十手所指其嚴乎記大學君子有三畏畏天命畏大人畏聖人之言語季氏史豈不欲往畏我友朋左僖二十二年上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚群臣之瞻仰通鑑唐太宗本朝家有主母而豪奴悍婢不敢與弱子抗老泉經不惕予一人書盤庚乃罔畏畏書微子謂巳有天命謂敬不足行謂祭無益謂暴無傷書泰誓中狃于姦宄敗常亂俗書君陳以蕩陵德實悖天道書畢命小人而無忌憚也記中庸不愧于天不畏于人詩何人斯乘我乘駒朝食于株詩株林胡不相畏不畏于天詩雨無正匪先民是程匪大猶是經詩小旻小人不知天命而不畏也狎大人侮聖人之言語季氏子出則為宗族患入則為鄉里憂小人之行也家語事君無義進退無禮言非則先王之道者猶沓沓也孟離婁上齊人有欲金者清旦衣冠之市適鬻金者之所攫金而去列好憎尚怒小人哉文中史殺人不忌為賊左昭十四年肆行無度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心左昭二十年單旗劉狄剝亂天下帥群不弔之人以行亂於王室侵欲無厭規求無度貫瀆鬼神慢棄刑法傲很威儀左昭二十六年李斯曰三代之事何足法也史秦紀李斯請史官非秦語皆燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市同上敢為大言處之不疑史漢武紀互入妄誕秦滅六國上古遺烈掃地盡矣史田儋傳宋康王欲霸之亟成故射天笞地斬社稷而燒滅之以示威服鬼神為長夜之飲於室中室中人呼萬歲則堂上應之堂下之人又應之門外之人又應之以至於國中無敢不呼萬歲者天下之人謂之桀宋通監周紀矯制以今天下漢高五王傳姍笑三代蕩滅古法西漢表顓作威福廟堂之上西漢諸侯王表互入專擅觸情妄行西漢淮南王方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之群蹈籍名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也漢梅福傳橫厲無所畏忌欲以熏轑天下漢杜欽傳梁冀暴李固杜喬尸於城北四衢令有敢臨者加其罪通監漢質紀吳樹為荊州剌史辭梁冀冀鴆之出死車上遼東太守侯猛初拜不謁冀託以他事腰斬之通監漢桓紀戲弄神祇歌頌禍殃東漢隗囂傳杜塞天下之口聾盲一世之人漢陳蕃傳入吾室操吾戈以伐我漢難玄傳祖珽私謂和士開曰君之寵幸振古無比宮車一日晚駕何以克終宜令皇太子早踐大位以定君臣之分若事成中宮少主皆德君此萬全計也請君說主上令粗解當自外入表論之於是上書齊主從之傳位於太子緯通監陳世祖阮佃夫大納貨賄所餉減二百匹絹則不報書通監宋太祖右司郎中馮翊喬知之有美妾曰碧玉知之為之不昏武承嗣借以教諸姬遂不還知之作綠珠怨詩以寄之碧玉赴井死承嗣得詩於裙帶大怒諷酷吏羅告族誅之通監唐武后來俊臣倚勢貪淫士民妻妾有美者百方取之自宰相以下籍其姓名而取之同上武三思嘗言我不知代間何者謂之善人何者謂之惡人但於我善者則為善人於我惡者則為惡人耳通監唐中宗互入私意盧杞秉政薦吏部侍郎關播為中書侍郎平章事上嘗從容與宰相論事播意有所不可起立欲言杞目之而止還至中書杞謂播曰以足下端愨少言故相引至此曏者奈何發口欲言耶通監唐德宗小人之慮遂以為天道難知為善未必福而為惡未必禍也唐史中宗贊李振曰此輩自謂清流宜投黃河為濁流通監唐紀傳記上小堯舜下邈三王劉向戰國策序互入妄誕集白晝攫金顏魯公坐位帖行與義乖言與法違韓文本朝小人不主於禮義則無忌憚所以反中庸也二程語錄安石謂天變不足畏祖宗不足法人言不足卹實錄本傳子齊景公問晏子曰為人何患曰患社鼠出竊於外入託於社灌之恐壞墻熏之恐燒木家語史鄧侯曰人將不食吾餘左莊六年欲投鼠而忌器鼠近於器尚憚不投西漢賈誼傳社鼷不灌屋鼠不熏西漢靖王勝傳孔融薦禰衡於曹操衡乃著布單衣持三尺挩杖坐大營門以杖捶地大罵操怒曰禰衡豎子孤殺之猶雀鼠耳顧此人素有虛名遠近將謂孤不容之通監東漢妻子以累其心產業以重其志舍此以為非者有必不多矣通監漢殤紀羅仇曰吾家世以忠孝著於西土寧使人負我我不忍負人也通監晉安紀傳記稷蜂不攻社鼠不熏韓詩外傳集薙草恐傷蕙孟東野子曰小人不恥不仁不畏不義易繫辭互入無忌憚史史舉以苟賤不廉聞於世史甘茂傳吾日暮途遠故倒行逆施之漢主父偃傳子獨不見家人寡婦邪始自約敕之時意迺慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣漢原涉傳互入將錯就錯遂非二類且被刑之人心不念生志在思死類多趍惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患孔融傳傳記楊國忠謂客曰某起家細微因緣椒房以至於是未知稅駕之所終不能致令名更當取樂於富貴耳明皇雜錄經君子黃中通理正位居體美在其中而暢於四支發於事業易坤卦和順積中而英華發外記樂記其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔同上清明在躬志氣如神記孔子閒居君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之德記表記富潤屋德潤身心廣體胖記大學子中心達於面目孟滕文公上胸中正則眸子瞭然胸中不正則眸子眊焉孟仁義禮智根於心其生色也睟然見於面盎於背施於四體同上有諸內必形諸外告子下源清則流清源濁則流濁荀君道文貌情用相為內外表裡荀大略體痛者口不能不呼心悅者顏不能不笑尹鄧子鄧析子篇威儀文辭表也德行忠信裡也揚重黎史心和則氣和氣和則形和公孫洪傳愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威前漢刑法志形氣發于根柢兮柯葉彙而靈茂西漢班固傳表曲者影必斜源清者流必潔猶叩樹本百枝皆動也通監漢紀木心不正則脈理皆斜通監唐紀根朽者葉枯源涸者流竭唐書吳兢滿內而外揚楚辭厭著也白玉以為面懷琬琰以為心同上注心面若玉內外相副泉竭則流涸根朽則葉枯枝繁者蔭根條落者本孤六代論氣水也言浮物也水大而物之浮者小大畢浮氣之與言猶是也氣盛則言之短長與聲之高下皆宜韓文與李翊之書未嘗聞有響大而聲微也韓文夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不揜本深而末茂形大而聲閎行峻而言厲心醇而氣和昭晰者無疑優游者有餘體不備不可以為成人辭不足不可以為成文韓文荅尉遲汾書溫潤發於外其間韜璵璠白侍郎言者志之苗行者文之根所以讀君詩亦知君為人同上粹和絪縕積于中鏗鏘發越見乎文劉賓客五行秀氣得之居多者其色㶑灩於顏間其聲發而為文章既稟之而生亦有涯而落其文章貴壽之氣焰歟並同上孝弟為根柢神明枝葉之直方為天質禮讓緣飾之同上神歡體自輕韋應物集蘊為志氣播為事業唐文粹本朝柳公權曰用筆在心心正則筆正孔氏續世說腹有詩書意自華歐公集人之不學者照鏡則面目可憎對人則語言無味山谷集經象恭滔天書堯典枝葉十有害本實先撥詩蕩色取仁而行違居之不疑語顏淵色厲而內荏譬諸小人其猶穿窬之盜也歟語陽貨子聲聞過情孟離婁下羊質而虎皮見草而說見豺而戰揚魯人縫掖實非儒行釗史外強中乾左僖十五年宋肥義曰公子章聲善而實惡通監周紀絳灌曰平雖美丈夫如冠玉耳其中未必有也漢陳平傳名聲過實史記袁紹色厲而膽薄高幹有雄志而無雄才通監東漢張磔網羅而自理甚踈通監漢獻紀高仙芝謂程千里曰公面雖男子心如婦人通監唐元紀碈中而玉表唐賈耽傳齊著作郎祖珽有文學多技藝而踈率無行嘗為高祖中外府功曹因宴失金叵羅於珽髻上得之通監陳世祖本朝潘郎曉踏河陽春明珠白璧驚市人那知望拜馬蹄下胸中一斛泥與塵坡詩經有其言無其行君子恥之記雜記互入能言不能行可言也不可行君子弗言也可行也不可言君子弗行也記緇衣注言不高於行行不高於言言行相副言顧行行顧言君子胡不慥慥爾記中庸注慥慥言行相應之貌子曰先行其言而後從之語為政古者言之不出恥躬之不逮也語里仁君子恥其言而過其行語憲問子聖人言行不失毫釐荀子言取而行違溫彥慱惡之文中子
