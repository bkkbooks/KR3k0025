body:
  text: 市恩史呂相曰我有大造于西也左威十三年陳氏以家量貸而以公量權左賣弄國恩東漢馮勤傳集奪我身上援買爾眼前恩白樂天見危者己墜而欲援觀鬭者將死而方救皮日休互入不成恩惠經無作聰明亂舊章書蔡仲之命罔以側言改厥度同上君罔以辨言亂舊政書太甲不愆不忘率由舊章詩假樂靜而後能安安而後能慮記大學仍舊貫如之何何必改作語子罕子治國而數變法則民苦之是以有道之君貴虛靜重變法也韓子史聖人不易民而教智者不變法而治因民而教者不勞而成功緣法而治者吏習而民安之史記商鞅傳不變不革黎庶攸寧史記太史公自序利不百不變法法古無過循禮無邪史記商鞅傳參代何為相國舉事無所變更一遵何之約束擇郡國吏長大取年長大者訥於文辭謹厚長者召除為丞相史吏言文深刻欲務聲名輒斥去之西漢曹參傳蕭曹為相填以無為西漢刑法志蕭何為法較若畫一曹參代之守而勿失載其清淨民以寧一通監惠帝曹參去齊屬其後曰以獄市為寄謹勿擾也本傳為政貴因循而重改作前漢蕭規曹隨西漢揚雄傳循高祖之法則治不循則亂西漢梅福傳安靜之吏悃愊無華東漢章紀襄城令劉方吏民同聲謂之不煩雖未有他異斯亦殆近之矣通監漢和紀安靜之吏日計不足月計有餘東漢安紀互入不可淺量陸象先曰天下無事當靜之於源亦何不簡前後為治其政如一唐書陸象先嘗謂人曰天下本無事但庸人擾之爾苟清其源何憂不治通監傳記利不百者不變俗功不什者不易器戰國策集無波古井水白侍郎靜者心多妙杜詩本朝古井無由波東坡詩湛然如古井終歲不復瀾同上經罪自己招無所怨咎易略例自作弗靖書盤庾上惟汝自生毒乃敗禍姦宄以自災于厥身同上起穢以自臭書盤庾中自作孽不可逭書太甲中自求辛螫詩小毖下民之孽匪降自天噂沓背憎職競由人詩十月之交自貽伊慼詩子助之長者揠苖者也非徒無益而又害之孟公孫丑上所謂無病而自灸者也莊盜跖三王既已定法度制禮樂而傳之有不用而改自作何以異於變易牙之和更師曠之律荀大略史沈尹戍曰吾子殺人以興謗今吾子好讒以自危也左變古亂常不死則亡史記晁錯等傳論互入紛擾何乃取高皇帝約束紛更之為史記汲黯傳互入紛擾有短垣而自踰之吳語集狐九尾而自擾左太沖魏都艾骨自瘡燕公表遂自顛倒若杵投曰韓文滅六國者六國也非秦也族秦者秦也非天下也杜牧之人養虎被虎囓夭媚蟆被蟆瞎乃知恩非類一一自作孽盧仝無風自飄簸韓南山詩經無作聰明亂舊章書蔡仲之命互入安靜史小人之性釁於勇嗇於禍以足其性而求名焉者左襄二十六年釁動也嗇貪也好興事舞文法史記汲黯傳陸象先曰天下本無事但庸人擾之通監唐紀陸長源性剛刻多更張舊事通監唐德宗經夫乾確然示人易矣夫坤隤然示人簡矣易繫辭易則易知簡則易從易知則有親易從則有功易簡而天下之理得矣易簡之善配至德同上大樂必易大禮必簡記樂記子君子之道有四易簡而易用也要而易守也炳而易見也法而易言也楊史夫政平易近民民必歸之史記魯世家石慶於兄弟最為簡易西漢本傳為人簡易佚蕩西漢揚雄傳互入氣概莫府省文書西漢李廣傳文書調役務從簡寡通監漢光武經禮煩則亂書說命中蕩而不靜記表記水煩則魚鼈不大記子何為紛紛然孟膠膠擾擾莊風波駭而魚鼈擾於淵織羅密而羽禽躁於澤豺狼眾而走獸劇於林爨火猛而小鮮麋於鼎也枹朴子道意篇史何乃取高皇帝約束紛更之為史記汲黯傳互入自作不靖太史公曰變古亂常不死則亡史記晁錯互入自作不靖輷輷殷殷若三軍之眾史記晁錯傳如蝟毛而起賈詣傳傳記千載遵行持為故事一朝糾正必驚愚俗史通集鼇戴山抃何以安之楚辭洪波振壑川無恬鱗驚飆拂野林無靜柯殷仲文表雲海方蕩潏孤鱗安得寧陳子昂互入山路嶮巇環四海以為鼎跨九垠以為爐爨以毒燎煽以虐焰其人沸湧灼爛號呼騰蹈莫有救止柳貞符本朝擾擾如一鼎之沸安有清冷處諸儒鳴道經民興胥漸泯泯棼棼書呂刑如蜩如螗如沸如羹詩蕩史諸將盡讙通監高紀國中語口籍籍西漢江都王傳一營大譟唐書集眾鳥萃而啾號兮沸洲渚以連山柳文喧啾百鳥群韓文本朝春蛙夏蜩更嘈雜土蚓壁蟫何碎瑣黃魯直詩荒池暮夜蛙閤閤食案白日蠅營營陸游詩經善世而不伐易乾卦謙尊而光卑而不可踰易謙卦謙謙君子卑以自牧無不利撝謙天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙並同上互入儆戒以貴下賤易屯卦勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也易繫辭有大者不可以盈故受之以謙易序卦用壯處謙壯乃全也易略例不自滿假書大禹謨推賢讓能庶官乃和書周官非其臣則荅拜之記曲禮下善則稱人過則稱已記祭義不自尚其事不自尊其身儉於位而寡於欲讓於賢卑己而尊人小心而畏義記表記君子不自大其事不自尚其功同上后稷欲行之浮於名也記表記注言其謙君子雖自卑而民敬尊之同上言謙者所以成其德子曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也記中庸客車不入大門記曲禮上注謙也孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也語雍也不恥下問語公冶長以能問於不能以多問於寡有若無實若虛語泰伯子損其自多以虛受之故能成其博也家語富貴而下人何人不與同上附之以韓魏之家如其自視欿然則過人遠矣孟盡心上江海之所以為百谷王者以其善下之也老盛德若不足莊人皆取先己獨取後人皆取實己獨取虛莊天下爵益高者意益下功益大者心益小晏史晉師歸范文子後入武子曰無為吾望汝也夫對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢左成二年互入避名孔子在位聽訟文辭有可與人共者弗獨有也史記孔子世家溫良謙退不以行能驕人西漢藝文志尹翁歸溫良謙退不以行能驕人通監前漢衛綰不與他將爭有功常遜他將前漢書征西功若丘山猶自以為不足東漢馮異傳趙咨曰吳國如臣之比車載斗量不可勝數三國志唐彬與王濬共伐吳彬知賊寇已殄孫皓將降未至建鄴二百里稱疾遲留以示不競晉書本傳吳陸抗敗羊祜還貌無矜色謙沖如常通監晉武紀庾亮嘗謂周顗曰諸生咸以君方樂廣顗曰何乃刻盡無鹽唐突西施也晉書本傳帝命高熲與賀若弼論平陳事熲曰臣文吏耳焉敢與大將論功通監隋高祖楊盈川曰吾愧在盧前唐王勃傳徐知誥曰吾今老矣猶未徧達時事通監唐潞王集忌功名之過己惡寵辱之踰量陸士衡賦序師道光而心愈讓人爵貴而心益恭白傳集誡滿持全居豐守約司空表聖文假令有取亦不敢為人師為人師且不敢況敢為子師乎柳文荅韋中立書互入師類本朝蘇子容云歐公不言文章而喜談政事君謨不言政事而喜論文章各不矜其所能也蘇子談訓逢場作戲真呈拙誤筆成蠅豈所長陳後山詩經術貂蟬續狗尾文章尾釜作雷鳴黃魯直詩經滿招損書大禹謨志自滿九族乃離書仲虺之誥謂人莫己若者亡同上互入妄自尊大有其善喪厥善矜其能喪厥功書說命中驕淫矜誇將由惡終書畢命互入稔惡子子曰持滿而能久者未嘗有也故曰自賢天下之至善言不聞於耳家語六本史卻至與單襄公語驟稱其伐左成十六年晉叔向曰寡君有甲車四千乘雖以無道行之必可畏也況其率道何敵之有牛雖瘠僨於豚上其畏不死左昭十三年君子稱其功以加小人小人伐其技以馮君子左襄十三年互入兩不相下衛侯衎復歸于衛大夫逆於境者執其手而與之言道逆者自車揖之逆於門者頷之而已左襄二十六年互入不能悔禍齊桓公自稱曰寡人兵車之會三乘車之會六九合諸侯一匡天下昔三代受命何以異於此乎史記齊世家范武子謂文子曰爾何知而三掩人於朝國語晉互入教子國君而驕人則失其國大夫而驕人則失其家通監自矜功伐史記項羽紀伐則掩人前漢五行志亙榮為太子少傳帝賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也東漢本傳互入淺中應劭自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慚色後漢鄭玄傳光武謂臧宮云常勝之家難與慮敵後漢張紘見魏陳琳武庫賦與琳書深嘆美之琳曰可謂小巫見大巫神氣殫矣吳志互入小巫見大巫石虎曰我家父子自非天壞地陷當復何愁晉書載記司徒義康耳目所經終身不忘好於稠人廣席標題所憶以示聰明通監宋太祖紀韓顯宗曰頃聞鎮南將軍王肅獲賊二三人驢馬數匹皆為露布通監齊高宗紀裴植為尚書志氣驕滿每謂人曰非我須尚書尚書亦須我通監梁高祖紀後魏楊大眼謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣後魏書李密得唐高祖書示其下曰唐公見推天下不足定於是不虞義師而專意於世充唐書王福畤少子有文嘗詫韓思彥思彥戲曰君有譽兒癖唐書王勃傳傳記章孝標及第後寄白樂天詩曰及第全勝十政官金湯鍍了出長安馬頭漸入楊州路為報時人洗眼看摭言集昔衛獻出奔久而復國大夫迎於境者執其手而與之言於門頷之而已言其驕怠之易生也陸宣公文百勝難慮敵劉賓客
