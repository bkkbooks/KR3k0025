body:
  text: 不識大體子主好詳則百事荒荀子凡人之患蔽於一曲而闇於大理荀子解蔽史平原君未睹大體史本傳論好荷禮荷與苛同西漢酈食其傳互入拘譾大臣特以簿書不報期會之間以為大故通監漢文紀夫移風易俗使天下回心而向道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體同上韓安國謂田蚡曰今人毀君君亦毀之譬如賈豎女子爭言何其無大體也西漢灌夫傳朱買臣吾丘壽王司馬相如東方朔枚皋終軍等並在左右每令與大臣辨論中外相應以義理之文大臣數屈焉通監漢武紀務在於簿書期會斷獄聽訟而已西漢王吉傳有司無仲山父將明之才不能為一代之制而徒鉤摭細微毛舉數事以塞詔而已前漢刑法志元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分忖節度窮極幼眇通監漢元紀大司農江馮上言宜令司隸校尉督察三公通監漢光武紀蜀楊顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也通監三國互入治家帝嘗卒至尚書門陳矯曰此自臣職分非陛下所宜臨也臣若不稱其職則請就黜退陛下宜還帝慚而反通監魏明紀石越退告人曰公父子好為小仁不顧大計終當為人擒耳通監晉武紀殷仲堪雖有英鑒資望猶淺議者不以為允到官好行小惠綱紀條目不舉同上乃至營造細小之事出給輕微之物一日之內酬荅百司乃日旰忘食夜分未寢通監陳紀帝善屬文不欲人出其右薛道衡死帝曰更能作空梁落燕泥否王胄死帝誦其佳句曰庭草無人隨意綠復能作此語耶通監隋煬紀房元齡王珪掌內外官考權萬紀劾其不平魏徵奏萬紀闇於大體新唐書權萬紀傳近日征伐虛有賞格而無事實蓋由小才之吏不知大體徒惜勳庸恐虛倉庫不知士不用命所損幾何通監唐肅宗高弘本正牙奏事自理逋負詔公卿庶僚自今勿令正牙奏事議者以為正牙奏事自武德以來未之或改所以達群情講政事弘本無知黜之可也不當因人而廢事通監唐順宗杜黃裳曰明主勞於求人而逸於任人此虞舜所以能無為而治者也至於簿書獄訟煩碎之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳餐皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也通監唐憲宗或者不知體要衒能矜名親小勞侵眾官聽聽於府廷而遺其大者是不知相道者也同上集其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵眾官竊取六職百役之事聽聽於府廷而遺其大者遠者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪眾工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟柳文梓文傳刀筆之吏寡大方陳子昂集經旅瑣瑣斯其所取災易旅卦禮煩則亂書說命中水煩則魚鼈不大記樂記子數粒而炊簡髮而櫛莊庚桑楚簡絲數米秤薪而爨數米而炊可以治小淮南子史其細已甚民弗堪也左襄二十九年銖銖而稱之至石必差寸寸而度之至丈必過西漢枚乘傳律令煩多苛請它比日以益滋自明習者不知所由欲以曉諭眾庶不亦難乎通監漢武紀宣為內史其治米鹽事皆關其手史咸宣傳鉤摭細微毛舉數事西漢刑法志公孫述為政苛細察於小事如為清水令時通監漢光武紀諸葛亮罰二十以上皆親覽通監魏文紀北齊肅宗即位尤自勤勵時人服其明而譏其細嘗問舍人裴澤對曰有識之士咸言傷細庫狄顯安亦曰陛下太細天子乃更似吏通監陳文紀御史中丞姚廷筠奏豈有修一水竇伐一枯木皆取斷宸衷通監唐玄紀搜擿疵纇大為煩碎通監唐紀集推得失去就於方寸銖黍間杜牧之互見小器子水至清則無魚人至察則無徒家語互入事莫做盡察見淵魚者不祥智料隱匿者有殃列說符互入事莫做盡史衛嗣君好察微隱縣令有發褥而席弊者嗣君聞之乃賜之席又使人過關市而賂之金既而召關市問有客過與汝金汝回遣之通監周紀秦任刀筆之吏爭以亟疾苛察相高其敝徒文具而無實通監漢文紀互入文具吹毛求疵西漢中山靖王傳苛察繳繞西漢司馬遷傳披抉其閨門而殺之西漢薛宣傳師古曰披發也抉挑也性褊察好以耳目隱發為明東漢鍾離意傳杜林曰大漢初興蠲除苛政及至其後漸以滋章吹毛索疵果桃菜茹之饋集以成贓通監後漢梁賀琛曰惟務吹毛求疵擘肌分理以深刻為能以繩逐為務通監梁武紀上書字誤者即治其罪通監陳紀考校簿領毫釐不差然皆不達大體督責苛碎通監陳後主李輔國置察事數十人潛令於人間聽察細事即行推按通監唐肅宗陳敬瑄多遣人歷縣鎮詷事謂之尋事通監唐懿宗經以公滅私書周官靡室靡家玁狁之故詩采薇王事多難不遑啟居豈不懷歸畏此簡書詩出車王事靡監不遑啟處不遑將父不遑將母詩四牡言公事不言家事記喪大記內稱不避親外舉不避怨推賢而進達之不望其報苟利國家不求富貴記儒行子君子能以公義勝私欲荀修身公道達而私門塞公事明而私事息荀君道為國薦賢滅身無憾劉子史楚鬭穀於蒐為令尹自毀其家以紓楚國之難左莊三十年子太叔曰周公殺管叔蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸游左昭元年先國後己左昭二年惠伯曰公事有公利無私忌左昭三年仲尼曰叔向古之遺直也治國制刑不隱於親左昭十四年不以家事辭王事左哀三年昔趙衰以壺餐從徑餒而弗食左僖二十五年趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之宣子召而禮之曰吾言汝於君懼汝不能也吾故以是觀汝告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣國語晉李離為晉文公理過聽殺人自拘當死文公曰非子之罪也離曰理有法失刑則刑失死則死公以臣能聽微決疑故使為理今過聽殺人當死伏劍而死史循良傳互入循良廉頗為趙將藺相如拜上卿位在頗右頗曰我見必辱之相如聞不肯與會每朝時嘗稱病不欲與頗爭列已而出望見頗引車避匿相如曰夫以秦王之威而相如廷叱之辱其群臣雖駑獨畏廉將軍哉顧念強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生吾所以為此者先國家之急而後私讎也史記互入不爭趙奢受命之日不問家事史趙世家參聞何薨告舍人趣治行吾將入相居無何使者果召參參微時與蕭何善及為相有隙至何且死所推賢唯參通監漢惠紀互入自信薄昭殺漢使者帝不忍加誅使公卿與之飲酒欲令自飲酖昭不肯使群臣喪服往哭之乃自殺通監漢文紀互入示人以意主爾忘身國爾忘家公爾忘私西漢賈誼傳金日磾長子為帝弄兒甚愛之其後弄兒壯大不謹自殿下與宮人戲日磾適見之惡其淫亂遂殺弄兒通監漢武紀夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然西漢司馬遷傳趙禹為吏以來舍無食客公卿相過禹禹終不報謝務在絕知友賓客之請孤立行一意而已史本傳問遺無所受請寄無所聽常自稱曰已倍親而事國身當奉職死節官下終不顧妻子矣史郅都傳奮不顧身以殉國家之急西漢李陵傳武帝為霍去病治第令視之對曰匈奴不滅無以家為也西漢霍去病傳尹翁歸抱公潔己為近世表西漢本傳贊抱公絕私西漢尹翁歸傳王章素剛直敢言雖為鳳所舉非鳳專權不親附鳳乃奏封事言日食之咎鳳專權蔽主之過通監漢成紀禽息憂國碎首不恨西漢杜欽傳賈復部將殺人於穎川穎川太守寇恂捕得繁獄戮之於市復以為恥還過穎川謂左右曰吾與寇恂並列將帥而為其所陷今見恂必手劍之恂知其謀不欲與相見姊子谷崇曰崇將也得帶劍侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也通監漢光武紀陰興與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張杞杜禽與興厚善以為華而少實但私之以財終不為言同上吳漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已同上祭遵為征虜將軍同產弟遜以遵無子取妾送遵不受曰自以身任於國不敢慮絕嗣之計後漢本傳群臣朝賀大將軍梁冀帶劍入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劍冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖百僚肅然河南尹不疑嘗舉陵孝廉乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色通監漢質紀互入不畏強禦左雄薦周舉為尚書雄舉故冀州刺史馮直嘗坐贓受罪周舉以此劾奏雄雄曰進君適所以自罰一作伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不悟君之意與宣子殊也通監漢紀遼西太守趙苞到官遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞冠鈔苞母及妻子遂為所劫質載以擊郡苞率騎二萬與賊對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毀忠節唯當萬死無以塞罪母妻皆為所害苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死通監漢靈紀橋元與陳琳有隙及在公位薦琳為廷尉後漢君子仕不為己職思莫憂東漢文苑張升傳蘇章遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪東漢本傳互入公私兩全諸葛瑾每奉使至蜀與其弟亮但公會相見退無私面通監漢獻紀董尋曰臣聞古之直士盡言於國不避死亡故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主憂惜天下也臣自比於牛之一毛生既無益死亦何損通監魏明紀李憙在朝姻親故人與之分衣共食而未嘗私以王官通監晉世祖紀氐人齊萬年反朝臣惡周處強直使隸夏侯駿西征孫秀謂之曰卿有老母可以此辭處曰忠孝之道安得兩全既辭親事君父母安可得而子乎晉書周處傳何充所選用皆以功效不私親舊通監晉穆紀王坦之卒臨終與謝安柏沖書惟以國家為憂言不及私通監晉文紀郄超卒郄愔哀悼成疾門生呈與柏溫往反密計愔於是大怒曰小子死恨晚矣更不復哭晉書本傳王文度言不及私晉書魏懷朔鎮將元尼須與源懷舊交貪穢狼籍置酒請懷曰命之短長由卿之口豈可不相寬貸懷曰今日源懷與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處耳尼須揮淚無以對案劾抵罪通監梁武紀互入公私兩全魏崔楷為殷州刺史或勸楷留家單騎之官楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身速戰不息死者相枕終無叛志通監梁高祖屈突通從討王世充時通二子在洛帝曰今以東略委公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死報國今日之行正當先驅二兒死自其分終不以私害義新唐書屈突通傳蒞官勁正有犯法者雖親無回縱同上上悉以軍中資糧器械簿書委岑文本夙夜勤力躬自科配籌筆不去手精神耗竭言辭舉措頗異平日上見而憂之謂左右曰文本與我同行恐不與我同返是日遇暴疾而薨通監唐太宗王義方彈李義甫義甫謂之曰王學士得御史是義甫所舉今日之事豈無愧乎對曰義方為公不為私唐書張易之張昌宗居中用事柏彥範謀誅之彥範以事白其母母曰忠孝不兩全先國後家可也通監唐中宗太后之遷上陽宮也姚元之獨鳴咽流涕曰元之前日從公誅姦逆人臣之義也今日別舊君亦人臣之義也雖獲罪實所甘心同上丈夫當敢言地要須明目張膽以報天子焉能錄錄以保妻子耶唐書韋思謙傳推誠蹇諤不私形骸唐書宋璟傳皇后妹夫奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而敺之傑上表上大怒命於朝堂杖殺以謝百僚通監唐玄紀互入深識大體李國貞治軍嚴朔方將士不樂皆思郭子儀故王元振為之作亂子儀至軍元振自以為功子儀曰汝臨賊境輒害主將若賊乘其釁無絳州矣吾為宰相豈受一卒之私邪收元振及其同謀者四十人皆殺之通監唐代宗郭子儀禁無故軍中走馬南陽夫人乳母之子犯禁都虞候杖殺之諸子泣訴於子儀且言都虞候之橫子儀叱遣之明日以事語僚佐而嘆息曰子儀諸子皆奴材也不賞父之都虞候而惜母之乳母子非奴材而何通監唐紀李晟曰幸得備將相苟容身不言豈可謂有犯而無隱耶唐書本傳崔祐甫作相未逾年凡除吏幾八百員多稱允當上曰有人謗卿所除擬官多涉親故何也祐甫曰進擬必須諳其材行臣若與之相識方可粗諳若素不知聞何由知其言行獲謗之由實在於此舊唐書本傳互入不拘形跡裴晉公遺言不及家事唐書李夷簡彈楊憑貶臨賀尉親友無敢送者徐晦獨至藍田與別權德輿謂之曰母乃為累乎對曰晦自布衣蒙楊公知獎今日遠謫安得不與之別後數日夷簡奏為監察御史晦謝曰平生未嘗得望公顏色公何從而取之夷簡曰君不負楊臨賀豈負國乎通監唐憲宗互入因事見人裴垍器兮峻整人不敢干以私嘗有故人自遠詣之垍資給優厚從容款狎其人乘間求京兆判司垍曰公才不稱此官不敢以故人之私傷朝廷至公它日有盲宰相憐公者不妨得之垍則必不可同上李固言薦崔球為起居舍人鄭覃再三以為不可曰公事勿相違覃曰宰相盡同則事必有欺陛下者矣通監唐文宗李德裕以柳仲郢為京兆尹素與牛僧孺善謝德裕曰不意太尉恩獎及此仰報恩德敢不如奇章公門館德裕不以為嫌通監唐武宗高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威眾辦事耳以白金數百兩遺之通監梁均王互入公私兩全劉仁贍幼子崇諫夜泛舟渡淮北為小校所執仁贍命腰斬之周廷構求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面見將士也輒命斬之然後成喪通監周世宗傳記晉文公問咎犯誰可為西河守對曰子羔曰非汝之仇歟曰君問誰守者非問臣之仇也子羔見而謝之咎犯曰薦子者公也吾不以私事害公議說苑許允為吏部郎多用其鄉里魏明帝遣虎賁收之允曰臣之鄉人臣所知也世說互入鄉曲燕梁琛使秦琛從兄奕先在秦為尚書郎會罷秦王欲令琛止奕舍琛語有司曰昔諸葛兄弟各處三國及其聘集公朝相見退無私面奕數就邸問東國起居琛曰今三方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞何以見問十六國春秋魏文侯問解狐曰將定西河之守誰與用對曰荊伯柳賢人文侯曰是非子之讎耶對曰君問守非問讎也伯柳見解狐而謝之狐曰言子者公也怨子者私也韓詩外傳集棄身鋒刃端性命安可懷父母且不顧何言子與妻名編壯士籍不得中顧私捐軀赴國難視死忽如歸選白馬篇丈夫誓許國憤惋復何有杜詩知事君以道無憚殺身慕當官而行不求利己韓文孔席不暇暖墨突不得黔欲為聖明除弊事豈將衰老計殘年並韓文螻蟻之命甚輕社稷之計甚重白樂天集不厚於身而厚於君不潤於家而潤於國唐文粹國計已推肝膽計家財不為子孫謀羅隱集本朝韓魏公喜用知名士或不識其面既用之其人亦不知所薦進也行狀富公使契丹始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之神道碑孔道輔卒客有謂公曰此害公者也公愀然曰孔公以職言事豈害我者可惜朝廷亡一直臣於是言者終身以為愧歐公作王德用銘范忠宣公在相位凡薦引人才必以天下公議所薦士未嘗知出於公公亦未嘗示恩意於人三朝言行錄互入避名張知白語同僚曰吾曹本書生致位至此唯徇公滅私可以報國聖宋掇遺
