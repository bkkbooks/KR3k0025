body:
  text: 道大不容子不容然後見君子家語互見不苟合又因難見人夫子之道大天下莫能容同上又見史孔子世家顏回云子思好大世莫能容孔叢子集古來才大難為用唐文粹氣逸何人識才高舉世疑高達夫本朝信哉天下奇落落不可拘歐公集材大古來無適用東坡詩物之所受者異則其自處必高自處既高則必躍然有所不合於世俗欒城集子薛談學謳於秦青未窮青之伎自謂盡之遂辭歸列子湯問篇鷦鵪巢於深林不過一枝偃鼠飲河不過滿腹莊子互見易足豈如鷦鵪者一粒有餘資惠子互見易足渴飲河水入腹不過壺漿淮南子史黥布與隨何俱歸漢漢王方踞床洗而召入見布大怒悔來欲自殺出就舍張御飲食從官如漢王居布又大喜過望前漢黥布傳李密曰唐公見推顧天下無可慮者唐書本傳集方當洪爐燃益見小器盈韓文石鼎聯句子不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務孟子盡心上殺戎馬而求狐狸援兩鱉而失靈龜斷右臂而爭一毛折鏌釾而爭雞刀用智如此豈足高乎淮南子捨茂木而集于枯不弋鵠而弋烏難與有圖同上史鄭師慧譏宋曰必無人焉若猶有人豈其千乘之相易樂之矇左傳襄十五互見識者所窺師曠曰臣不心競而力爭不務德而爭善襄公二十六年欒貞子曰思小惠而忘大恥僖公二十八年楚子伐蔡以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言並左傳今不獵猛獸而獵田彘不搏反寇而搏蓄菟西漢賈誼傳方今豺狼當路而狐狸是先通監漢獻帝紀羊祜都督荊州有并吞之心每與吳人交兵剋日方戰不為掩襲之計將帥欲有進譎詐之策者輒飲以醇酒使不得有言略吳二兒為俘者送還其家出軍行吳境刈穀為糧皆計所侵送絹償之遊獵常止晉地若禽獸為吳人所傷而為晉兵所得者皆封還之晉書本傳魏元忠上封事言理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不知方略通監唐高宗經用人之知去其詐用人之勇去其怒用人之仁去其貪記禮運子夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子而已矣孟子大匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之器孔叢子夫顏啄聚梁父之大盜也而為齊忠臣段于木晉國之大駔也而為文侯師孟卯妻其嫂有五子焉然而相魏寧其危解其患景陽酒被髮而御於婦人威服諸侯此四人皆有所短然而功名不減者略得也淮南子汜論訓亡羊而得牛斷指而免頭同上史不以一眚掩大德左僖三十二曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不還踵刎而死則亦名不免為敗軍禽將矣曹子棄三北之恥而退與魯君計枝桓公於壇坫之上三戰之所亡一朝而復之若此者非不能成小廉而行小節也以為殺身亡軀絶世滅後功名不立非智也故去感忿之怨立終身之名棄忿狷之節定纍世之功史記魯仲連忍小圖大管仲不恥身在縲紲之中而恥天下之不治不恥不死公子糾而恥威之不信於諸侯同上向令伍子胥之世從奢俱死何異螻蟻棄小義雪大恥名垂於後世史伍子胥傳忍小圖大大行不顧細謹大禮不辭小讓史項羽本紀范增説項羽曰沛公居山東時貪財好色今入關財物無所取婦女無所幸此其志不小通監漢高紀李斯曰成大功者在因瑕釁而遂忍之史本傳互忍小圖大季布以勇顯名及至困厄奴僇苟活而不變何也彼自負其才受辱不羞欲有所用而未足者故終為漢名將西漢本傳贊大漢方制萬里豈其與水爭咫尺之地哉前地理志論大功者不録小過舉大美者不疵細瑕前漢陳湯傳班固曰孝文時天下以酈寄為賣友夫賣友者為見利而忘義也若寄父為功臣而又執劫雖摧呂祿以安社稷誼存君親可也通監漢文紀韓信為楚王召辱已少年告諸將曰方辱我時寧不能死死之無名故忍而就此前漢本傳忍小圖大春秋之義以功覆過通監漢宣紀舉大事者不忌小怨通監光武紀齊桓忘管仲之奢僣而録其匡合之大謀漢高舍陳平之汙行而取其六奇之妙算陳書譬諸射者百發百中而一失可以謂之拙乎通監晉成帝紀豈以小疵棄其大德唐韋思謙傳蒙恥奮忠以權大謀唐狄仁傑贊傳記人有置係蹄者而得虎虎怒決蹯而去虎之情非不愛其蹯也然而不以環寸之蹯而害七尺之軀者權也戰國策互見權變集磨劍莫磨錐磨錐成小利元稹集互見決擇門吞八荒者不咀蟣蝨楊偉時務論經小不忍以致大亂焉詩將仲子篇民之失德乾餱以愆伐木詩見小利則大事不成語子路小不忍則亂大謀衛靈公一朝之忿忘其身以及其親並語子養其一指而失其肩背孟子告子上一不成而萬有餘喪矣莊子在宥爭利如蚤甲而喪其掌荀子利夫秋豪害靡國家荀大略削足而適履殺頭而便冠淮南子説林訓治鼠穴而壞里閭潰小而發痤疽同上是見朱橘一子之蠹因剪樹而棄之睹縟錦一寸之點乃全匹而燔之劉子羊羹偏而宋師敗郈孫以鬭雞身亡齊侯以笑嬪破國劉子謹隟史宋華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民左宣公二年一慚之不忍而終身慚乎昭三十一年爭尋常以盡其民成十二年初武城人拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之哀八年並左傳石祈子曰得一夫而失一國與惡而棄好非謀也左莊子互見納忠晉使郤克於齊卻克僂齊頃公母從樓上觀而笑之卻克怒曰不報齊者河伯視之後與魯衛共伐齊史記褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有寇至則舉烽火諸侯悉至至而無寇褒姒乃大笑幽王説之為數舉烽火其後不信諸侯益亦不至史記周本紀別見耽好門有躄者槃散平原君美人笑之躄者至平原君門曰士不遠千里而至者以君能貴士而賤妾也願得笑臣者頭平原君不殺歲餘賓客舍人稍稍引去者過半史本傳陶朱公中男殺人囚於楚朱公遣長子為一封書遺故所善莊生進千金長男至莊生家莊生非有意受之也欲以成事後歸之莊生入見楚王言某星宿某害楚王乃封三錢之府楚貴人告朱公曰王且赦長男以為赦弟固當出也重千金虛棄莊生無所為也乃復見莊生曰初為求免弟今議自赦故辭生去莊生知其意欲復得金曰若自入室取金長男即自入室取金持去莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修德報之今臣出道路皆言陶之富人朱公子殺人囚楚其家多持金錢賂左右故王非能恤楚國而赦乃朱公子故也楚王大怒令論殺朱公子明日下赦史越世家規小節者不能成榮名惡小恥者不能立大功史魯仲連傳以二卵棄扞城之將通監戰國玩細娛而不圖大患西漢賈誼傳爭睚眥之隙以成千鈞之讎東漢趙溫傳庾悅廚饌甚盛不及劉毅從悅求子鵝炙悅不與毅由是銜之解悅都督通監晉安紀石崇有妓曰緑珠美而艷善吹笛中書令孫秀使人求之崇勃然曰緑珠吾所愛不可得也秀怒乃勸趙王倫誅崇矯詔收之晉書楚之邊邑脾梁之女與吳邊邑處女蠶爭界上之桑二家相攻吳國不勝遂更相伐滅吳之邊邑吳怒伐楚取二邑而去後漢趙曄吳越春秋傳記以一杯羊羹亡國戰國策中山忿爨之未熟覆甑而棄之所害多矣物理論集失意杯酒間白刃起相讎選少年行互見人心難托惡衣之垢而焚之患木之蠹而伐之其為害豈不益多哉通監唐昭宗紀經不矜細行終纍大德為山九仞功虧一簣書旅獒子曰士志於道而恥惡衣惡食者未足與議也語里仁子百發一失不足為善射千里蹞步不至不足為善御荀勸學篇千里之堤以螻蟻之穴漏而百尋之屋以突郤之熛焚淮南子以分寸之瑕棄盈尺之夜光以蟻鼻之缺損無價之淳鈞抱朴子暢玄篇史一舉不得前功盡廢史周紀東方朔割名於細君西漢揚雄解嘲顏師古曰以肉遺細君是割損其名互入妻門三公鼎足承君一足不任則覆亂美實西漢彭宣傳北朝周樂遜曰棋劫相持爭行先後若一行不當或成彼利通監李泌有謀略而好談神仙詭誕故為世所輕唐德宗高弘本正衙奏事自理逋債詔公卿庶僚自今勿令正衙奏事議者以為正衙奏事自武德以來未之或改所以達群情講政事弘本無知黜之可也不當因人而廢事唐順宗時承平日久子弟為武官父兄擯不齒猛將精兵皆聚於西北邊中國無武備矣唐元宗並通監集玉卮無當去聲底也雖寶非用張平子南都賦別見雖有若無京師人多言足下家有積貨士之好廉名者皆畏恐不敢道足下之善柳文賀王參元失火書朱絃二十五闕一不成曲劉賓客得一時之貴滅百世之族杜牧之子仲尼之徒無道桓文之事者是以後世無傳焉孟梁惠王上登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言盡心下升東嶽而知衆山之迤邐也列子由天地之道觀惠施之能其猶一蚊一虻之勞者也莊子自以比形於天地而受氣於陰陽吾在於天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海內不似稊米之在太倉乎莊秋水射者扞烏號之弓彎棊衛之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也淮南子窮鄉之社扣甕拊瓴相和而歌自以為樂也嘗試為之擊建鼓撞巨鐘乃知夫甕瓴之足羞也同上魚失水則死水失魚猶為水也墨子大不假小升東嶽而知衆山之峛左紙切崺移邇切也況介丘乎浮滄海而知江河之惡沱也況枯澤乎揚吾子仰聖人而知衆説之小也視日月而知衆星之蔑也楊子仰天庭而知天下之居卑也同上觀崑崙則覺丘垤之卑抱朴子金丹篇聞雷霆而覺布鼓之陋見巨鯨而覺寸介之細同上史思唐虞於上古乃知小道足羞也荀悅傳夫置器廣庭則函牛之鼎如釜堂崇十仞則八尺之人猶短隋天文志聽黃鐘之音知擊缶之細習庠新序之教知不學之困徐幹中論傳記釣大鼇者不投取魚之餌斷長鯨者焉用割雞之刀南唐野史小才不可大用集浮海難為水遊林難為觀選詩文章薄伎固棄於高賢刀筆小能不容於先達陳子昂集鴻鐘在聽不足論擊缶之音大牢斯烹安可薦藜藿之味同上試登山嶽高方見草木微孟東野崇蘭散馥掩蕭艾於芳春朗月揚輝蕩雲霧於清夜唐文粹如河入海無復水名劉賓客集互見引凡入聖明庭集孔鸞曷取於鳧鷖樹以松與柏不宜問蒿藜韓文本朝登太山者小天下在培塿以宜慚奏咸池而張洞庭非哇咬之可度歐公集經觀其舞知其德記樂記居家理故治可移於官孝經子射者扞烏號之弓彎棋衛之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎淮南子集求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賓客互見觸類本朝夫人君用人欲其忠信於己必取仁於父兄信於師友然後付之以事故放麛違命也而推其仁則可以托國食子徇君也而推其忍則至於弒君欒城集子公孫龍問於魏牟曰龍合同異離堅白困百家之智窮衆口之説吾自以為至達已今聞莊子之言無所開吾喙口呿起據切開也而不合舌舉而不下乃逸而走莊子小巫見大巫拔茅而棄唐歐陽率更以為出於莊子今考不見但應帝王篇疏中一云豈小巫能測又云小巫近見不能測遠鄭有神巫曰季咸知人之死生禍福期以歲月若神列子與之見壺子立未定自失而走莊子應帝王兩爵相與鬭未有死者也鸇鷹至則為之解淮南子兵略訓互見強復遇強史孔子為春秋筆則筆削則削子夏之徒不能贊一辭史記孔子世家互見退聽漢有善射曰樓煩項羽嗔目叱之樓煩目不能視手不能發走還入壁不敢復出前項籍傳互入強復遇強張紘見陳琳武庫賦與琳書深嘆美之琳曰可謂小巫見大巫神氣殫矣吳志互入驕矜大鵬從南來衆鳥皆戢翼晉書老羆當道臥獾子那得過北史王羆傳集湛露之晞朝陽衆星之拱北辰楊雄甘泉賦西施且一笑衆女安得妍韋應物集龍騰魚鱉踔然驚驥盻驢騾少顏色元稹集蹇驢避路立肥馬當風嘶唐文粹舌端萬變乘春輝南方朱鳥一朝見索漠無言蒿下飛賓客百舌詞和風既揚昏祲自斂陸宣公文經公山弗擾以費畔召子欲往子路不悅曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎語子見南子子路不悅同上子君子之所為衆人固不識也孟告子下智者之言固非愚者之所曉列子仲尼篇井蛙不可以語海夏蟲不可以語冰莊子朝菌不知晦朔蟪蛄不知春秋莊逍遙遊篇淺不足與測深愚不足以謀知井蛙不可語東海之樂荀子正論量粟而舂數米而炊可以治家而不可以治國淮南子使桀度堯猶以升量石也同上史燕雀安知鴻鵠之志哉史記陳世家公等喁喁何知長者史記日者傳語曰以管窺天以蠡測海以筳撞鐘豈能通其條貫考其文理發其聲音哉前東方朔傳夫移風易俗使天下回心鄉道者類非俗吏之所能為也賈誼傳以管窺天豈能照一隅後漢操遣使辟田疇田疇戒其門下趣治嚴門人曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇笑曰此非君所識也通監漢獻紀子貢曰臣終身戴天不知天之高也終身踐地不知地之厚也臣事仲尼如飲江海腹滿而去又安知江海之深乎韓詩外傳蘙薈之翔無以論垂天之凌蹄涔之遊無以知絳虯之騰鈞天之庭豈伶人之所躡山海經新序集尺寸之魚豈能量江海之大選對楚王問借問蜉蝣輩寧知龜鶴年郭景純遊仙詩小人自齷齪安知壯士懷放歌行二禽已登於寥廓而尺鷃之輩空見笑于藩籬李白大鵬賦丈夫志氣事兒女安得知劉禹錫作呂溫文集新序見呂和叔文坐井而觀天曰天小者非天之罪也韓文原道衆鳥那知一鶚情方雄飛文炯若深井之下仰視白日之正中也唐文粹大凡受褊狹者不可以語大持杯榼而承澍雨自滿而止又安能測其雱霈之所至哉元微之集斗水不能評巨壑之量隙光未足議大明之體何者見褊而守隘也張説之文本朝蜉蝣蔽朝夕蟪蛄知春秋臨川集蠛蠓何足知天高同上鷃疑鵬萬里蚿笑夔一足東坡集
