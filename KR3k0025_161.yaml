body:
  text: 矜式經萬邦作式書微子之命君子是則是效詩鹿鳴文武吉甫萬邦為憲六月百辟為憲桑扈文武是憲式是百辟蒸民四方其訓之百辟其刑之並詩烈文君子動而世為天下道行而世為天下法言而世為天下則記中庸後世以為楷記儒行見而民莫不敬言而民莫不信行而民莫不説記中庸子思之母死於衛柳若謂子思曰子聖人之後也四方於子乎觀禮記檀弓上德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而受之則而象之孝經聖治章子使諸大夫國人皆有所矜式孟子公孫丑下規矩方員之至也離婁下端而言蠕而動一可以為法則荀勸學規者所以圓萬物矩者所以方萬物淮南子史能為人則者不為人下矣左昭元年孔子為中都宰一年四方皆則之史孔子世家天下模楷李元禮後漢黨錮傳序經為人師行為儀表後漢伏湛傳士之模楷國之楨斡東漢盧植傳賈彪遊京師與郭林宗為談論之首一言一行天下以為準的袁山松漢書殷浩為風流宗通鑑晉成紀中吐言則為訓辭蒞世則為物軌東漢李充陳仲舉世説新語上張湛詳言正色三輔以為儀表東漢本傳庾亮端委廟堂百僚準則晉書謝琨傳魏舒堂堂人之領袖晉書本傳傳記師範億載規模萬古史通集作範後昆文選楚元王教立行可模置言成範文選齊昭王碑百代之儀表千年之領袖文選齊故安陸碑行為時領袖言作世著龜白侍郎清能律貪夫同上言為代之軌物行為人之師表唐張説撰姚崇神道碑萬世之標準韓文伯夷頌吐辭為經舉足為法韓文爝然為世程劉禹錫羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠雖不常為人用而自然可貴李文饒集風度可以師長人倫動靜可以訓齊天下唐文粹羽儀振鷺黼藻群龍唐文粹本朝匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運東坡作潮州韓文公碑經正色率下書畢命子帥以正孰敢不正論語子率馬以驥不亦可乎楊修身史范宣子讓其下皆讓欒黶為汰弗敢違也左襄十三年公孫洪用節衣食為百吏先史記太史公自序萬石君居家子孫在側雖燕必冠西漢石奮傳陳實在鄉閭平心率物後漢清節為百城表南史樂法才表耿介為宗臣表唐李勉傳經折其右肱雖左股在豈足用乎易略例譬彼壞木疾用無枝詩小辨朽木不可雕也糞土之墻不可杇也語公冶長子惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧莊子所學者真土梗耳莊子山木篇玉屑盈匣不可琢為圭璋銼絲滿篋不可織為綺綬雖多亦奚以為也劉子互見雖有若無腐木不可以為屋淮南子弊單甑縻在旃茵之上雖貪者不摶也同上史臧紇曰衛侯其言糞土也左襄二十四年不可教訓左傳一國棄之如遺迹焉國語如行人之遺棄其迹亡國之大夫不可以圖存敗軍之將不可以語勇西漢韓信傳國家棄憲如孤雛腐鼠耳通鑑漢章帝顧視趙戒胡廣猶糞土也東漢李固傳駑馬鉛刀不可強扶通鑑漢光武王戎曰樹在道邊而多子必苦李也晉書本傳劉輿猶膩也近則污人晉書本傳傳記李台嘏曰韓八座事藝如折襪線無一條長北夢瑣言韓昭凡事如僧剃髮無有寸長外史檮杌吐果之核棄藥之滓史通糞土同捐同上集慈父不能愛無益之子仁君不能蓄無用之臣選曹子建自試教義所不容紳冕所共棄文選任彥升彈文要領不足以膏齊斧名字不足以污簡墨陳孔墇檄木在山馬在肆過之而不顧者雖日纍千萬人未為不才與下乘也及至匠石過之而不睨伯樂遇之而不顧而後知其非棟梁之才超逸之足也韓愈為人求薦書互見救援門臥木易成蠹棄花難再春孟東野泥沙難振拔劉賓客生無益於一毛死何異於腐鼠王建經國人不齒也鄘風蝃蝀出鄉不與士齒記王制屏之遠方終身不齒記王制問子西曰彼哉彼哉語子遍國中無與立談者孟子彼固曷足稱乎大君子之門哉荀百姓賤之如尩所當為尩病人也惡之如鬼荀王伯吾視子蒙蒙若未視之狗子耳惠子史吳起嘗學於曾子其母死起不歸曾子薄之而與起絶史記本傳非子之座史有若傳陳湯家貧丐貸無節不為州里所稱西漢本傳主父偃學長短縱橫術遊齊諸儒相與排擯不容於齊家貧假貸無所得遊趙燕中山皆莫能厚客甚困西漢本傳韓信家貧無行不得推擇為吏漢本傳子之比我蒙蒙如未視之狗説苑狗鼠不食汝餘世説第五倫少蘊藉不修威儀以此見輕後漢本傳度尚不修學不為鄉里推舉東漢本傳晉張載貌醜遊洛陽市群女以瓦石投之晉書冢中祜骨何足介意通鑑漢獻帝紀梁尚書虞隲嘗為王偉所辱乃唾其面偉曰君不讀書不足與語梁世祖楊釗不學無行為宗黨所鄙通鑑唐元宗孫晟素輕馮延巳謂人曰金杯玉碗乃貯狗矢乎通鑑周太祖集揚子撰法言蜀富賈人齎錢十萬願載一名子雲不聽夫富人無義正如圈中之鹿欄中之牛安得妄載王充論衡閭閻闒茸名教所絶選彈文季緒瑣瑣何足以云選箋本朝譬之癬疥豈足爬瘙東坡經德輶如毛民鮮克舉之我儀圖之維仲山甫舉之詩蒸民夫子之不可及也猶天之不可階而升也語子張達巷黨人曰大哉孔子博學而無所成名語子罕子貢曰夫子其生也榮其死也哀如之何其可及也語子張故雖天子必有尊也言有父也必有先也言有兄也孝經子儒家惟有孟子閎遠微妙縕奧難見孟子序道則高矣美矣宜若登天然似不可及也孟子盡心下天下有達尊三爵一齒一德一孟子孔子之謂集大成集大成也者金聲而玉振之也孟子自生民以來未有盛於孔子也孟子以豫觀於夫子賢於堯舜遠矣孟子仲尼之教獨尊於千古孟子後序關百聖而不慚蔽天地而不恥能言之類莫能加也楊子五百篇史民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆左襄十四年猶衣服之有冠冕木水之有本原左天下言風流者謂樂廣王衍為稱首晉書樂廣傳殷浩為風流談論者所宗晉書本傳器業殆人望也南史宋柳仲互入聞望柳顧慱學罕所推謝見虞世基曰海內共推一人非吾儔所及也隋書門地人物文學皆當世第一唐書李揆昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣唐書韓愈傳集與日月俱懸鬼神爭奧孝敬之準式人倫之師友文選序昭昭若三辰之麗乎天滔滔猶四瀆之紀于地選齊故安陸邵日月不息師表常尊文選任昉釋奠宴詩文章之司命人物之權衡李白與韓荊州書自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步惟公一人李太白集何蕃入太學二十年學成行尊諸生推頌不敢與蕃齒韓文自天子至郡邑守長通得祀而遍天下者唯社稷與孔子焉然而社祭穀句龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面拜跪薦祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀然其祀事皆無如孔子之盛所謂自生民以來未有如夫子者其賢於堯舜者此其效歟韓文處州孔子廟碑昭乎日月不足以為明崒乎泰山不足以為高巍乎天地不足以為容韓文伯夷頌夫子之道閎肆尊顯二帝三王無以侔大也柳文宣王廣碑坐上無人第二流劉賓客死而可作當小天下裴度作武侯碑本朝轍之來也於山見終南嵩華之高於水見黃河之大且深於人見歐陽公而猶以為未見太尉也故願得睹賢人之光耀聞一言以自壯然後可以盡天下之大觀而無憾矣欒城集上韓太尉書聖人之道譬如山海藪澤之奧人之入於中者莫不皆得其所欲欒城集韓氏之文之道萬世所共尊天下所共傳而有也歐陽公書韓文後曾子文章衆無有水之江漢星之斗臨川集經君子不厲而威不言而信記有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也記檀弓下古之人一舉事而衆皆知其德之備也記文王世子子一雀適羿羿必得之威也莊子庚桑楚齊王謂子思曰先生名高於海內吐言則天下之士莫不屬耳目孔叢子抗志篇伯夷叔齊非於死之日而後有名也管制分互見素定天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉荀子互見素定史賁諸懷錐刃而天下為勇西施衣褐而天下稱美戰國策蒲且修繳鳧鴈悲鳴逢蒙撫弓虎豹哀皞説苑叢談陳遵每至人門曰陳孟公坐中莫不震動西漢本傳耿純嘗為東都太守威信著於衛地東都聞純入界盜賊九千餘人皆詣降大兵不戰而還通鑑漢光武柏氏纍世臨荊州士民畏之通鑑晉孝武紀陸機與弟雲俱入洛造張華素重其名如舊相識晉書本傳顏真卿三朝舊臣忠直剛烈名重海內人所信服通鑑唐紀郭子儀位極人臣而衆不疾窮奢極欲而人不非通鑑唐紀韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯也通鑑唐紀崔仁師訊諸囚皆曰崔公平恕事無枉濫請速死無一人異辭者通鑑太宗楊綰久積公輔之望及大拜詔下朝野相賀續世説傳記齊浣善知今事高仲舒善知古事姚崇曰欲知古事問仲舒欲知今事問齊浣則無敗政矣韋絢戎幕間談集養由遊睇而猿號選班固幽通賦太學諸生推頌不敢與何蕃齒韓文何蕃傳騏驥未馳知有致遠之力干將未割知有剸堅之功高達夫本朝胡安定先生弟子散於四方隨其人賢愚循循雅飭其言談舉止遇之不問可知為先生弟子其學者相語稱先生不問可知為胡公安定墓表田夫野老皆號公司馬相公而婦人孺子知其為君實也東皮撰溫公行狀邵康節常以春秋時行遊城中士大夫家聽其車音倒屣迎致雖兒童僕隸皆知歡喜尊敬康節墓志刻木而為人朝夕而拜之它日析之以為薪猶且忌之老泉望重者無所為而人自服東坡富人之謀利常獲世以為福非也富人者信於人素深而服於人素厚所為而莫或害之所欲而莫或非之事未成而衆已先成之矣東坡集寶刀匣不見但見龍雀環何曾斬蛟蛇亦未功琅玕胡為穿窬輩見之要領寒東坡集藍田生美璞未琢價連城山谷互見自有定價
