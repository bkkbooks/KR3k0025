body:
  text: 妻經唯酒食是議詩斯干妻子好合如鼓瑟琴小雅棠棣父在則為妻不杖儀禮喪服為妻何以期也妻至親也記檀弓為伋也妻者是為白也母不為伋也妻者是不為白也母同上大夫內子注適妻也記曾子問不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席韣器而藏之內則子甚宜其妻父母不説出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰同上妻也者親之主也敢不敬與哀公問子為人妻夫有禮則柔從聽侍夫無禮則恐懼而自竦荀君道列子之妻曰妾聞有道之士妻子皆得佚樂莊史叔向對齊晏嬰曰撫有晉國賜之內主左昭三婢子侍巾櫛僖二十二有息女願為箕帚妾西漢高紀妻者夫之陰杜欽傳東方朔割名於細君揚雄傳解嘲師古曰以肉歸遺細君是損割其名宋弘曰糟粳之妻不下堂東漢本傳黃承彥者高爽開列為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黃頭黑色而才堪相配孔明許即載送之時人以為樂鄉里為之諺曰莫作孔明擇婦正得阿承醜女三國志注襄陽記賈充前妻李氏坐徙後娶郭氏赦得還詔充置左右夫人郭氏怒為李築館舍於外晉書禮義有愆夫則薄之東漢列女傳夏侯道遷不聘正室後魏書傳記妻齊也共奉祭祀樊英別傳謝太傳兄奕女名道蘊王凝之妻也世説謝竭絶重其婦張玄常稱其婦同上集東方朔割炙於細君選揚雄解嘲作名選作炙各有注作嬪君子室秋胡詩爰奉嬪於高族寡婦賦中饋酒食之事總論細君知蠶織韓卓文君作白頭吟諷相如樂府非是夫不稱是妻白樂天經有女仳離詩國風中谷有蓷子甚宜其妻父母不説出記內則妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命如舅在則稱舅舅沒則稱兄無兄則稱夫雜記下子婦有七出不順父母者無子者淫僻者嫉妒者惡疾者多口舌者竊盜者家語本命篇曾參後母遇之無恩供養不衰其妻以藜蒸不熟因出之人曰非七出也參曰藜蒸小物耳吾欲使熟而不用吾命況大事乎七十二弟子解自叔梁紇始出妻及伯魚亦出妻至子思又出妻故稱孔氏三世出妻後序孟子惡敗而出妻荀子解蔽注惡其敗德而出妻史王吉妻取東家棗啖吉乃去婦西漢本傳鮑永事後母至孝妻嘗於母前叱狗永即去其妻東漢本傳薑詩事母至孝妻奉順尤篤母好飲江水妻常泝流而汲值風不時得還母渴詩責而遣之列女傳黃允遣妻夏侯氏集客二百人數允隱匿事十五而去允遂廢見本傳李逈秀母氏庶賤而色養過人其妻崔氏嘗叱其媵婢母聞之不悅逈秀即時出之或止之曰賢室雖不避嫌疑然過非出狀何遽如此逈秀曰娶妻本以承順顏色顏色苟違何敢留也舊唐書本傳傳記婦有七去不順父母去無子去淫去妒去有惡疾去多言去竊盜去不順父母為其逆德也無子謂其絶世也淫為其亂族也妒為其亂家也有惡疾為其不可與共粢盛也多言為其離親也盜竊為其反義也大戴禮本命萹集薑詩出婦蓋為小瑕鮑永去妻亦非大過白樂天判經輿脫輻夫妻反目不能正室也易小畜卦史謝眺妻常懷刃欲殺眺不敢相見通監齊高宗集昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦蘇武詩經夫子制義從婦凶也易常卦繫于金柅柔道牽也易惟婦言是用書牧誓史牽於惟牆之制西漢鄒陽傳讀作牆孫權以妹妻先主妹才捷剛猛有諸兄之風侍婢百餘人皆執刀侍立先主每入中心常凜凜蜀志王導為丞相妻曹氏性妒導甚憚之乃密營別館以處衆妾曹氏知而將往焉導恐妾被辱遽命駕晉書經子克家易蒙卦幹父之蠱幹母之蠱蠱卦嗣續妣祖詩斯干父為長子不言適者通上下也亦言立適以長傳曰何以三年也正體於上又乃將所以傳重也庶子不得為長子三年不繼祖也儀禮喪服男子冠而不為殤注云殤者男未冠而死可殤者男子二十冠而字記曲禮上大夫之子長曰能御矣士之子長曰能典謁矣庶人之子長曰能負薪矣同上男子生設弧於門左內則子也者親之後也哀公問己冠而字之成人之道也冠義男子生桑弧蓬矢六以射天地四方射義父母生之續莫大焉孝經子遺腹子不思其父無貌於心也不夢見像無形於目也淮南子説林訓繼子得食肥而不澤情不相往來也適子懷於燕慈母喻於荊情相往來也同上史鄭文公有妾夢天與已蘭曰以是為而子以蘭有國香人服媚之如是左宣二子以母貴隱元注以母秩次立也家有長子曰家督史越世家子者父之陰也西漢杜欽傳奉先人之遺體王尊傳自季至雄五世而傳一子故雄無他楊於蜀揚雄傳李密曰為人子者願為人兄不願為人弟兄事親之日長弟事親之日短蜀志郤正傳注集十子若不肖不如一女英李白集通子繼餘塵揚杯祝願無他語謹勿頑愚似汝爺同上繼體承家白氏六帖驥子好男兒杜詩大兒九齡色清徹秋水為神玉為骨小兒五歲氣食牛滿堂賓客皆回頭徐卿二子歌閩俗呼子為囝音蹇顧兄補亡本朝何如陶家兒繞舍覓梨栗坡詩羲之生五子同上大兒踉蹡越門限小兒咿啞語繡帳坡詩經凡為人子之禮冬溫而夏清昏定而晨省在醜夷不爭記曲禮夫為人子者三賜不及車馬夫為人子者所遊必有常所習必有業恆言不稱老為人子者居不主奧坐不中席行不中道立不中門不登高不臨深不苟訾不苟笑不服暗不登危懼辱親也父母存不許友以死不有私財父母存冠衣不純素父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈同上子之事親也三諫而不聽則號泣而隨之記曲禮下親有疾飲藥子先嘗之同上事親有隱而無犯左右就養無方服勤至死致喪三年檀弓上未仕者不敢稅人如稅人則以父兄之命不專家財也稅謂遺豫人同上父母之衣衾簟席枕几不傳移也杖屨勿敢近內則在父母之所有命之應唯敬對不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不敢袒禓父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫不説與其得罪於鄉黨州閭寧孰諫父母雖沒將為善思貽父母令名必果將為不善思貽父母羞辱必不果子甚宜其妻父母不説出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然同上親在行禮於人稱父人或賜之則稱父拜之事統於尊記玉藻父命呼唯而不諾手執業則投之食在口則吐之走而不趍親老出不易方復不過時親癠色容不盛同上身者父母之遺體也行父母之遺體敢不敬乎祭義父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆一舉足而不敢忘父母是故道而不徑舟而不遊不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容父母既沒謹行其身不遺父母惡名可謂能終矣父母全而生之子全而歸之可謂孝矣同上子之事親有三道焉生則養沒則喪喪畢則祭祭統父母在不敢有其身不敢私其財坊記善則稱親過則稱己君子弛其親之過而敬其美從命不忿微諫不倦勞而不怨父母在不稱老言孝不言慈閨門之內戲而不歎父母在饋獻不及車馬同上仁人之事親也如事天哀公問身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本同上不敢擅重事所以自卑而尊先祖也冠義事父母幾諫見志不從又敬不違勞而不怨語里仁故當不義則子不可以不爭於父孝經子曰父母其順矣乎中庸子孝子不諛其親莊子孝子不生慈父之家慎子為人子敬愛而致文荀從義不從父同上孝子不從命有三從命則親危不從命則親安孝子不從命乃衷從命則親辱不從命則親榮孝子不從命乃義從命則禽獸不從命則修飾孝子不從命乃敬子道史子孝而針左昭六聶政曰母在政身未敢以許人也史本傳親有嚴客帣攸衣鮹也韝音備鞠曲也其紀反與跽同謂小跪也侍酒於前史淳于髡傳經維熊維羆男子之祥乃生男子載寢之床載衣之裳載弄之璋詩史徐陵母臧氏嘗夢五色雲化而為鳳集左肩上已而誕陵焉時有寶志上人者世稱其有道陵年數歲家人攜以候之寶志手摩其頂曰天上石麒麟也南史傳記王鎮惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒興吾宗以鎮惡為名宋略集男兒當門戶墮地目生神傅玄豫章行門衰祚薄晚有兒息選陳情表玉樹長新枝韋應物詩豈料鬢一作鬚成雪方看掌弄珠白傳集何時能反哺共養白頭烏且有承家望誰論得子遲同上掌珠一顆兒三歲鬢雪千莖父六旬同上未知門戶誰為主且免詩書與別人劉長卿老子釋氏新抱送盡是天上麒麟兒杜詩驥之子鳳之雛渥窪汗血種天上麒麟兒衆中見毛骨猶是麒麟兒一毛生鳳穴掌中貪得一珠新馬梵賀人有子曰欣得掌中之一珠見杜詩注去歲生兒名添丁意令與國充耘耔韓文盧同詩乳下秀嶷嶷椒蕃泣喤喤姆抱幼子立側眉眼如畫髮漆黑肌肉玉雪可憐同上兒生三日掌中珠燕頜猿肱穠李膚文苑英華頭玉嶢嶢眉刷翠骨重神寒天廟器一雙瞳人剪秋水竹馬梢梢搖翠尾李賀詩鬧來案上翻筆墨塗抹詩書如老鴉盧同添丁詩添丁莫撓爺劉叉詩本朝虎兕可愛光陸離開眼已有百步威歐公洗兒歌不惜金錢散閭里同上南山新長鳳凰雛眉目分明畫不如臨川經子克家易蒙卦國人稱願然曰幸哉有子如此所謂孝也已記祭義父有爭子則身不陷於不義孝史田嬰有賤妾子名文承間問其父嬰曰子之子為何曰為孫孫之孫為何曰為玄孫玄孫之孫為何曰不能知也曰君用事相齊至今三王矣齊不加廣而君私家富纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宮蹈綺粱而士不得短褐僕妾餘穀肉而士不厭糟粳今吾又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之史記本傳荀淑在朗陵涖事明治稱為神君有子八人並有名稱時人謂之八龍通鑑漢質紀侍御史母丘甸謂父儉曰大人居方嶽重任國家傾覆而晏然自守將受四海之責矣儉然之魏高貴鄉公梁帝曰生子當如李亞子克用為不忘矣至如吾兒豚犬耳五代梁紀袁術見孫策嘆曰使術有子如孫郎死復何恨東漢本傳謝鳳之子超宗有文辭帝大嗟賞謂謝莊曰超宗殊有鳳毛南史戴碩子法興延壽延興并修立善書好學山陰有陳戴者家富有錢三千萬人或云戴碩兒子敵陳戴三千萬錢宋書王昕生九子並風流蘊藉世號王氏九龍北齊非此父不生此子北史嚴武母裴氏不為其父所答獨厚其妾英武奮然以鐵鎚就英寢碎其首挺之奇之曰真嚴挺之子新唐書本傳憲宗謂鄭餘慶之子涵為令子本傳傳記顏延之少有令名太祖問其父延之曰諸子誰得卿風延之曰竣得臣筆測得臣文敻得臣義姓氏英賢録竇禹鈞有子五人俱進士及第馮道詩曰丹枝五枝芳時號竇氏五龍顏説集一園水竹今為主百卷文章更付誰李白賀兄榮是見兒榮杜荀鶴吾知徐公百不憂積善袞袞生公侯丈夫生兒有如此名位豈肯卑微休杜少年嶄然見頭角衆謂柳氏有子矣韓愈撰柳宗元墓志本朝方公之輝華顯赫之時而其親享壽考康寧之福夫得祿及親人以為幸也而公以榮名顯仕為之養綵衣而戲昔以為孝也而公以金章紫綬悅其顏使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也歐公集溫公志呂獻可墓未成河南監牧使劉航自請書石既見其文遲回不敢書航之子安世曰成吾父之名可乎代書之聞見録有兒真驥子一噴群馬倒杜詩惟要傳家好兒子有子還應不死同挽梅聖俞生男已當戶後山史齊太倉令淳于公無子有女五人有罪當刑罵曰生女不生男緩急非有益史記樓護有故人呂公無子歸護西漢本傳魏太祖時征漢中聞王粲子死嘆曰孤若在不使仲宣無後三國魏志王粲傳注皇天無知使鄧伯道無兒晉書鄧攸傳傳昔有人無男而養七女父亡七女負土葬父方輿記集樂天無子以姪孫阿新為之後見長慶集醉吟先生墓志下無嗣紹陰宰漫韓文中郎有女能傳業伯道無兒可保家韓退之經子夏喪其子而喪其明記檀弓上子負建鼓而求亡子莊集鴟梟啄母腦母死子始蕃蝮蛇生子時拆裂腸與肝好子雖云好未還恩與勤惡子不可説鴟梟蝮蛇然有子且勿喜無子固勿嘆韓文慰孟東野失子慈淚隨聲迸悲腸遇物牽白樂天詩傷心自嘆鳩巢拙長墮春雛養不成同上本朝顧況喪子悲傷作詩曰老人喪愛子日夜泣成血老人年七十不作多時別孔帖我淚猶可拭日遠當日忘母哭不可聞欲與汝俱亡故衣尚懸架漲乳已流床仍將恩愛刃割此衰老腸坡詩經維虺維蛇女子之祥乃生女子載寢之地載衣之禓載弄之瓦詩斯干歸妹女之終也注女終於出嫁也易序卦漢有遊女不可求思詩漢廣誰其尸之有齊季女召南采蘋有女懷春詩野有死麕有女如玉同上顏如舜華鄭風有女同車女子許嫁笄而字記曲禮上女不言外內則女子十年不出姆教婉娩聽從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾同上女雖未許嫁年二十而笄記雜記下婦人許嫁不為殤記喪服小記子女子生而願為之有家孟史臣有息女西漢高紀淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益其小女緹縈自傷悲泣乃隨其父至長安上書願沒入為官婢以贖父刑罪使得自新刑法志張禹曰臣有一女愛女甚於愛男遠嫁張掖太守蕭咸不勝父子私恩願與相近即徙咸為弘農太守西漢盜不過五女門以女貧家也東漢陳蕃傳蔡雍女琰字文姬博學有才辨又妙於音律列女傳戴良五女並賢每有求姻輒便許嫁綀裳布被竹筒木屐以遣之五女並能遵其訓皆有隱者之風本傳古者生女三日臥之床下弄之瓦磚而齋告焉臥之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齋告先君明當主繼祭祀也列女傳孝女曹娥者父盱於縣江泝濤迎婆娑神溺死不得尸骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死同上孔融被誅女年七歲幼弱得全寄尼舍主人有遺男欲娶之女曰豈得久活或言曹操收之女曰若死而有知得見父母豈非志願乃延頸就刑同上橋公兩女皆國色也吳周瑜傳甄后年九歲喜書輒用諸兄筆硯兄言當作女博士耶魏志甄后傳郭永奇其女曰此吾女中王同上王肅女文義過目則識祖司徒異之曰興吾家者必此女矣惜不為男王隱書晉文明皇后荀嵩都督荊州江北諸軍屯宛杜曾引兵圍之嵩小女灌年十三帥勇士數十人踰城突圍夜出且戰且前又為嵩書求救於南中郎將周訪通監晉愍帝紀竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族毅由是奇之及長以適唐公李淵陳記謝道韞聰識有才辨叔父安嘗內集俄而雪下安曰何所似也安兄子朗曰散鹽空中差可擬道韞曰未若柳絮因風起晉列女傳傳記昔有人無男而養七女父亡女負土葬父方輿記下堂必從傳母保阿進退則鳴玉佩環列女傳北平有女甚有名行人多求不許搜神記張氏有處子小字酥香凡才人所為歌曲悉能諷之麗情集集吾家有驕女皎皎頗白皙左思詩弱女雖非男慰情良勝無陶淵明詩唧唧復唧唧木蘭當戶織不聞機杼聲唯聞如嘆息問女何所思問女何所憶女亦無所思女亦無所憶昨夜見軍帖可汗大點兵軍書十二卷卷卷有爺名阿爺無大兒木蘭無長兄願為市鞍馬從此替爺征晉木蘭詩木蘭代父去秣馬備戎行易卻紈綺裳洗卻鉛粉粧馳馬赴軍幕慷慨攜干將同上十子若不肖不如一女英李白集顧長之如滋芳蘭之易茂姆師教之如琢美玉之易成呂溫集學母無不為曉粧隨手抹移時施朱鉛狼藉畫眉闊杜詩生女富貴傾邦國杜詩嗟汝未嫁女秉心鬱沖沖防心動如律竭力機杼中雖無姑舅事敢昧織作功同上文姬才稚齒白樂天集非此父不生此女同上一女憐之必嫁官人不以與凡子韓文王通志中郎有女能傳業韓退之詩歸弄小女姹同上女中誰是衛夫人柳文夫人在家以孝友聰明為父母所偏愛選所宜歸以適韓氏韓文楚國夫人墓志
