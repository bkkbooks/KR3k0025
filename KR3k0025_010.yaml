body:
  text: 無可奈何經顛隮若之何其書微子已焉哉天實為之謂之何哉詩北門云如之何詩君子偕老何嗟及矣詩中谷有蓷既往不咎語吾末如之何也已同上史既事不咎西漢車千秋傳楊彥詢曰譬如人家有子父母所不能制將如之何通監五代晉高祖傳記夜行者能無為姦不能禁狗使無吠己也戰國策本朝攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何歐公集天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也東坡文經得已則吾欲已記檀弓下子可以止則止孟是亦不可以已乎孟史無損於魯而祗為名適為惡名左衛寧喜專公孫免餘請殺之公曰事未可知秪成惡名止也左襄二十七年不足以害吳而多殺國士不如己也左哀八年子禍者福之所倚福者禍之所伏孰知其極老五十八宋人有好行仁義三年不懈家無故黑牛生白犢以問孔子曰比吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迂後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復此謂禍福相倚也列說符慶者在堂弔者在閭禍與福鄰莫知其門荀大略失火而遇雨失火則不幸遇雨則幸也故禍中有福淮南禍之所倚反而為福福之所伏還以成禍妖之所見或能為吉祥之所降亦回成凶有知禍之為福福之為禍妖之為吉祥之為凶則可與言物類矣列史晉司馬侯曰或多難以固其國啓其疆土或無難以喪其國失其守宇齊有仲孫之難而獲桓公晉有里丕之難而獲文公是以為盟主衛邢無難敵亦喪之左昭四年互入事難定論與於青之賞必與於其罰齊公孫青也左昭二十年禍兮福所倚福兮禍所伏憂喜聚門吉凶同域史賈生傳勾踐之困於會稽喟然歎曰吾終於此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由是觀之何遽不為福乎史越世家互入寬解英布少時遇相者曰當黥而王後被刑果為王史記竇廣國家貧為人所略賣為其主入山作炭寒臥岸下百餘人岸崩盡厭殺臥者獨少君得脫卜曰當侯竇后立封侯史外戚傳朱英謂春申君曰世有無望之福亦有無望之禍通監第六傳記文種曰皇天祐助前沈後楊禍為德基憂作福堂後漢趙曄吳越春秋夫郊祀之牛衣之以朱采食之以禾粟非不樂也及其用時鼎鑊在前刀俎列後當此之時雖欲還就孤犢寧可得乎古今樂録集休咎相乘躡翻覆若波瀾選君子行福為禍始禍作福階盧子諒詩北叟塞上之翁也馬無故亡入胡人弔之翁曰安知非福乎後其馬將胡駿馬而歸人賀之翁曰安知非禍乎後其子騎墮而折臂人弔之曰安知非福乎後胡兵大出丁壯者戰死唯子以跛故得父子相保故以北叟知禍福相因倚而生也班固幽通賦注桑穀之祅反為福於太戊大鳥之慶竟成禍於帝辛李白互入事反所耕動而得謗名亦隨之韓文晉勝鄢陵范燮祈死吳克徑越夫差啓殃陸宣公文禍福回環車轉轂榮枯反覆手藏鉤白侍郎本朝魏證停叔玉昏乃天以祐魏氏房元齡之子遺愛因尚主遂為房氏大禍鳴道集子福輕於羽莫之知載禍重乎地莫之知避莊福不盈眥禍溢於世班孟堅賓戲利輕春露害重冬霜蘇彥語針歡華不滿眼咎責塞兩儀韓文史無德而祿殃將至矣左夫德福之基也無德而福猶無基而厚墉也其壞也無日矣國語晉語密康公母曰小醜備物終必亡國語久乘富貴福積為祟史記田叔傳貴臣常禍傷於寵也東漢王符傳子子曰中行文子倍道失義以亡其國而能禮賢以活其身聖人轉禍為福此謂是歟家語辨政失火遇雨禍中福淮南宋人好善父子無故而盲其後楚攻宋丁壯者死老幼皆上城破皆屠獨父子盲得無乘城圍解則父子俱視淮南史齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主左昭四年韓信坐法當斬信乃仰視滕公曰上不欲就天下何為斬壯士滕公奇其言壯其貌釋而不斬與語大悅之言於上以為治粟都尉史記同上蒯通說范陽令曰君急遣臣見武信君君可轉禍為福矣史記詭禍為福西漢武五子傳詭反也張蒼坐法當斬解衣肥白如瓠時王陵見而怪其美士乃言沛公救勿斬後以為代相遷為計相西漢同上經載高宗雊雉之異以明轉禍為福之驗通監漢成紀聖人轉禍而為福智士因敗而成功東漢馮衍傳安祿山討奚契丹為虜所敗張守圭奏請斬之祿山臨刑呼曰大夫不欲討奚契丹耶奈何殺祿山守圭亦惜其驍勇欲活之乃更執送京師通監唐太宗杜兼誣奏李藩於張建封之薨搖動軍情上大怒密詔杜佑使殺之佑素重藩懷詔旬日不忍發因引藩出詔示藩藩神色不變曰此真報也佑曰君謹勿出口吾已密論用百口保君矣上召藩詣長安望藩儀度安雅乃曰此豈為惡者即除授祕書郎通監唐德宗互入解紛舒元輿有族子守謙願而敏元輿愛之從元輿者十年一旦忽以非罪怒之日加譴責奴婢輩亦薄之守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免通監唐文宗集每因禍以禔福亦踐危而必安選弔文北叟塞上之翁其子騎而折臂人弔之曰安知非福乎後胡兵大出丁壯者戰死唯翁子以跛故得父子相保班固幽通賦注蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寬擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗此皆瓌偉博辨奇壯之士能自解脫柳文知足下遇火災家無餘儲僕始聞而駭中而疑終而大喜蓋將吊而更以賀也京城人多言足下家有積貨士之好廉名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多歉也一出口則嗤嗤者以為得重賂常與孟幾道言而痛之乃今幸為天火之所滌蕩凡衆之疑慮舉為灰埃黔其廬赭其垣以示其無有而足下之才能乃可以顯白而不污其實出矣是祝融回祿之相吾子也則僕與幾道十年之相知得開其喙發策決科者授子而不慓雖欲如嚮之蓄縮受侮者其可得乎於茲吾有望於子是以終乃大喜也柳文賀進士王參元失火書病木斧斤遺白樂天本朝孫真人著大風惡疾論曰神仙傳有數十人皆因惡疾得仙道何者割棄塵纍懷穎陽之風所以因禍而取福也東坡論一首李程貞觀中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰公今須作狀元翌日無名於陵深不平乃於故冊子末繕寫而斥其名氏攜之以訴主文主文歎賞不巳於陵曰當今場中若有此賦侍郎何以待之主文曰非狀元不可也於陵曰苟如此侍郎亦遺賢矣此乃李程所作亟命取李程所納卷對不差一字主文因謀之於陵擢為狀元見蘇東坡與李薦詩注新唐書同上有日五色事卻無出試一段事互入交臂而失經子曰小人溺於水君子溺於口大人溺於民皆在其所褻也記緇衣子隙穴之風輕塵不動毛髮不搖及中肌膚以為深疾列史子産曰水懦弱民狎而玩之則多死焉左昭二十年禍固藏於微隱而發於人之所忽西漢司馬相如傳互入敬戒謹微堤潰蟻孔氣泄針芒東漢陳忠傳凡患生於所忽禍發於細微東漢馮衍傳互入謹微隋帝曰譬如猛虎物不能害反為毛間蟲所損食耳通監陳紀互入事出意表集胡越起於輦下而羌夷接軫也司馬諫獵互入事出意表經終其永懷又窘陰雨詩正月未堪家多難豫又集于蓼詩小毖既破我斧又缺我斨詩破斧史草木遭霜者不可以風過西漢韓安國傳裴寂謂劉文靜曰貧賤如此復逢離亂通監隋紀集茫然阮籍途更灑楊朱泣杜工部落陷井不一引手救反擠之又下石焉韓文已抱沉痾冷更貽魑魅憂孟東野文清羸還對月遲暮更逢秋李義山文羸骨欲消猶被刻瘡痕未滅又遭彈元微之集本朝譬如乘輕車馭駿馬冒險夜行而僕夫又從後鞭之豈不殆哉東坡擬進士對御試策枯木自少葉不堪經曉霜欒城集春殘已是風和雨更看游人撼落花山谷詩楊文公億為執政者所忌言事者攻之不已公曰已擠溝壑猶下石而不伏方困蒺藜尚彎弓而相射青箱記子華霍之極大滄海之滉漾其高不俟翔埃之來其深不仰行潦之注抱朴子塞難篇互入無所損益史雕之不增文磨之不加瑩魏文士傳互入天姿自然集苟贊其道若譽天地之大褒日月之明非愚則惑柳文互入不待擬議子孩提之童無不知愛其親及其長也無不知敬其兄孟盡心上今人乍見孺子將入於井皆有惕惻隱之心非所以納交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也孟公孫丑上鵠不日浴而白烏不日黔而黑莊天運木不待櫽括而直者其性直也荀子性惡鳥排虛而飛獸跖實而走蛟龍水居虎豹山處天地之性也淮南訓道良玉不雕美言不文揚寡見白玉不雕美珠不文質有餘也淮南子互入天姿自然五玉不染而堅寒冰不磨而朗抱朴集夷雅之體無待韋絃王文憲集序至寶不雕琢韓文互入務實大圭之質豈待磨礱唐文粹良玉雖白不受采醴泉自甘非有和真色縝密丹青無自入也靈味天成麴蘖無所資也唐文粹本朝金沉羽浮蓋有常性類要下四就死之牛見之而不忍入井之赤子睹之而惕牧人厚方苞之葦稚子閔方稚之雉當其情動於中蓋有所自鳴道集天力自然不施膠筋東坡
