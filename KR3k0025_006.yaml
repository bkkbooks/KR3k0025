body:
  text: 處非其地子如以朝衣朝冠坐於塗炭孟萬章下處勢不便未足以逞其能莊山木尋常之溝巨魚無所還其體而鯢鰌為之制步仞之丘巨獸無所隱其軀而孽狐為之祥莊庚桑楚篇互入份量不同水之勝火亦明矣然而釜鬲間之水煎沸盡其上而火得熾盛焚其下水失其所以勝者矣韓非子使目在足下則不可以視尹子史吳季札曰夫子孫文子之在此也猶燕之巢於幕上左襄二十九年漢武曰生子當置之齊魯禮義之邦乃置之燕趙果有爭心不讓之端見矣史記三王世家褚先生論貧下未易居上流多謗議西漢司馬遷傳互入一失召百非揚雄作酒針曰觀瓶之居居井之湄漢書作眉處高臨深動常近危一旦叀上綃反礙為瓽所轠身提徒計反黃泉骨肉為泥西漢陳遵傳儒者當謀謨廟堂反在朝歌耶後漢虞詡傳時詡為朝歌長蜀先主曰芳蘭當門不得不鋤蜀志晉趙至與嵇叔夜書曰植橘柚於玄朔蒂華藕於修陵晉書王羲之與謝萬書曰以君邁往不屑之韻而俯同群辟誠難為意也通監晉書紀傳記鬼谷曰子不見河邊之樹乎僕御折其枝風浪蕩其根此木豈與天地有仇怨所居然也高士傳吞舟之魚陸處不勝螻蟻呂氏春秋集騁騏驥於中庭焉能極夫遠道置猿狖於櫺檻兮夫何以責其捷巧楚辭互入區處失當劍閣雖嶚憑之者蹶非所以深根固蒂也魏都賦步武之間不足以騁迹選吳季重書魚遊於沸鼎之中燕巢於飛幕之上選丘希範書所棲不足恃鷹隼縱橫來柳詩金屑雖珍在眼為病白侍郎集孤松停翠蓋託根臨廣路不以險自防遂為明所誤柳文本朝神奇之産銷藏委翳於蒿藜榛莽之間而山岩野叟不復知其為瑞也臨川集互入不遇經湛湛露斯匪陽不晞詩湛露雨雪瀌瀌見睍曰消詩角弓互入光焰不長子猶以一杯水救一車薪之火孟告子一齊人傳之衆楚人咻之雖日撻而求其齊也不可得矣孟滕文公互入獨力難舉日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎莊互入不自揣度猶烏獲與焦僥摶也荀富國以桀詐堯若卵投石荀撮壤不能填決河升水不能冷原火抱朴史牛雖瘠僨于豚上其畏不死左昭十三年雖其善祝豈能勝億兆人之詛左昭二十年驅群羊而攻猛虎虎之與羊不格明矣史張儀傳互入不量力齊景公二十二年彗出公曰可禳乎晏子曰使神可祝而來也亦可禳而去也百姓怨以萬數而君令一人禳之安能勝衆口乎史記齊世家垂千鈞之重於鳥卵之上必無幸矣通監漢景紀此難以口舌爭也西漢張良傳猶鼱鼩之襲狗音精劬狐豚之咋虎至則靡耳何功之有西漢東方朔傳萬鈞所壓無不糜滅前漢賈山傳羔犢之弱而扦虎狼之敵通監漢景紀雖有孫吳將賁育士若入水火往必焦沒智勇亡所施通監漢成紀賈誼曰淮陽之比大諸侯廑如黑子之著面適足以餌大國而不足以有所禁禦通監漢文紀劉陶曰猶冰霜見日必至消滅東漢本傳以嬰孺鬭賁育也新唐書陸贄傳論傳記猶棘林螢耀與夫撏木龍燭也山海經撏木長千里夫鵬雛之始飛為鷹所制孔氏志集河決潰金隄隻手不能障晉傳玄塵篇大廈既焚不可灑之以淚長河一決不可障之以手庾信連珠一君子愛之百小人妬之一愛固不勝於百妬皮日休威力不敵群噪無益唐文粹醯雞不能混雷霆嬰兒不能抗烏獲者響與力懸故也陸魯望捧爝火以千日御動已光銷抱布鼓以詣雷門忽然聲寢李義山集經諸侯不臣寓公禮郊特牲下大夫於上大夫承賀記玉藻子天下地醜德齊莫能相尚孟兩堯不能相王兩桀不能相亡管兩貴之不能相事兩賤之不能相使荀王制兩智不能相救兩貴不能相臨兩辨不能相屈力均勢敵故也尹子智均不相使力均不相勝申子兩堅不能相加兩強不能相伏淮南子史我能往寇亦能往左文十六年宣伯曰魯之有季孟猶晉之有欒范也左成十六年太尉丞相尊等耳史記魏其傳力敵勢均終相吞噬通監晉安紀劉琨祖逖並有英氣每相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原耳晉書祖逖傳互入兩不相下人得抗衡莫相稟屬通監唐德宗中尉大臣也宰相亦大臣也通監唐文紀子一薛居州獨如宋王何孟一齊人傳之衆楚人咻之雖日撻而求其齊不可得矣同上互入勢力不敵萬室之國一人陶則可乎孟告子下子欲手援天下乎孟離婁下千鎰之裘非一狐白墨子任一人力者則烏獲不足恃淮南主術史千金之裘非一狐之腋索榭之榱非一木之枝史記叔孫通傳大樹將顛非一繩所維東漢徐稚傳傳記一目視則不明一耳聽則不聰太公金匱經為命裨諶草創之世叔討論之行人子羽修飾之東里子産潤色之語憲問互入相資成美子馬蚿斬足而復行何也以其輔之者衆家語六本在王所者長幼卑尊皆薛居州也王誰與為不善孟子萬人彎弧以向一鵠能無中乎劉子積力之所舉則無不勝也衆智之所為則無不成也淮南江河之水非一源之流墨史衆心成城國語吐谷渾王阿柴疾召諸子二十人各獻一箭與其弟使折之其弟折之又取十九箭使折之不能折阿柴曰汝知之乎孤則易折衆則難摧汝曹戮力一心然後可以保國寧家通監晉紀互入示人以意得助傳記天下無粹白之狐而有粹白之裘呂氏春秋集百足之蟲至死不僵以扶之者衆也曹冏六代論互入得助猶衆壑合注霈為大川群山出雲混成一氣呂和叔經它山之石可以攻玉詩鶴鳴子塵垢粃粳將猶陶鑄堯舜者也莊逍遙遊史攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣東漢王符傳本朝與善人處壞子人須是與不善人處方成就得人伊川語録君子與小人共處為小人侵陵則修省畏避動心忍性增益預防老泉文互入因人反己經翩彼飛梟集于泮林食我桑椹懷我好音詩泮水周原膴膴堇荼如飴詩子雖有惡人齋戒沐浴則可以祀上帝孟史沙礫化為南金瓦石變為和玉後漢劉陶傳夫飛梟天下賊鳥及其在林食椹則懷我好音魏志本朝自古奇偉之士如周處戴淵之流皆出於群盜改惡修善不害為賢東坡代李琮論京東盜賊狀互入在人所為鉛鐵性殊點化為金則不辨鉛鐵之性鳴道集經民可使由之不可使知之語泰伯子梓匠輪輿能與人規矩不能使人巧孟盡心下鑿枘之粗伎而輪扁有不傳之妙掇蜩之薄術而傴僂有入神之巧抱朴對俗輪扁曰得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣莊天道史李廣天性善射雖子孫它人學者莫能及西漢本傳心之精微口不能言也言之微妙書不能文也西漢張敞傳垂能目制方圓心度曲直然不能以教人通監唐太宗傳記司馬太傳問謝玄惠子五車何以無一言入玄謝曰當是妙理不傳世説埒有常徑的有常所雖每發輒中非至妙也若馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣典論隋末王靈學射於督謨以為盡妙欲射殺謨獨擅其美謨持短刀箭來輒截之唯有一矢謨張口承之遂齧其鏑笑曰學射三年未教汝齧鏃法段成式酉陽雜俎集妙不可盡之於言事不可窮之於筆郭璞賦輪扁不能言微於其弟伯樂不能語妙於其子阮籍古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道韓文本政本朝糟粕所傳非粹美丹青難寫是精神東坡詩如蕭何之識韓信此豈有法而可傳者哉東坡文丹青妙處不可傳輪扁斫輪如此用山谷詩子理義之悅我心猶芻豢之悅我口孟子庖丁曰始臣解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視莊養生庖丁為文惠君解牛手之所解肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之會莊養生注言其因便施巧無不間解盡理之甚適牛理合音節得之於轡應之於手得之於手應之於心列郢人堊墁其鼻若蠅翼使匠石斫去之匠石運斤成風盡堊其鼻不傷莊梓慶削木為鐻見者驚猶鬼神莊屠牛坦一朝解九牛而刃可以剃毛庖丁為刀十九年刃如新硎淮南般之運斤羿之激矢楊淵騫史介葛廬聞牛鳴曰是生三犧皆用之矣其音云問之而信左僖二十九年屠牛坦一朝解十二牛而芒刃不頓所排擊剝割皆中理解也西漢賈誼傳牙曠清耳於管絃離婁眇目於毫分逄蒙絶技於弧矢班輸摧巧於斧斤良樂軼能於相馭烏獲抗力於千鈞和鵲發精於針石研桑心計於無垠西漢班固敘傳謝安每言陶公雖用法而恆得法外意通監晉成紀裴子野曰為文人皆得於手我獨得於心南史本傳互入自負賈堅字世固彎弓三石餘烈祖以堅善射故親試之乃取一牛置百步上召堅使射曰能中之乎堅曰少壯之時能兮不中今已年老正可中之恪大笑射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為奇中之何難一發中之堅時年六十餘矣觀者咸服其妙燕書通監九十八卷亦載傳記長沙僧懷素好草書自言得草書三昧李肇國史補廣漢翁偉能聽鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中蹇馬蹇馬亦罵之曰眇馬御者不信使往視之馬目果眇論衡集弓不虛發應聲而倒司馬相如子虛賦畫宮於堵盈尺而曲盡其制計其毫氂而搆大廈無進退焉柳文梓人傳弓矢入養叔之手徽絃在師曠之膝何微之不中何妙之不盡歐陽詹文陶士冶鑄匠成於心崔黯東林寺碑韓幹之馬籍籍知名薛稷之鶴翩翩有聲白侍郎如良庖投刃無復肯綮唐文粹互入順便本朝至哉天下樂終日在几案歐公集道子畫人物如以燈取影逆來順往旁見側出橫斜平直各相乘除得自然之數不差毫髮出新意於法度之中寄妙理於豪放之外東坡書吳道子畫後所謂遊刃餘地運斤成風同上付八音於師曠孰敢爭能捐六轡於王良坐將致遠東坡賀丞相啓信手斫方圓規矩一中節山谷詩
