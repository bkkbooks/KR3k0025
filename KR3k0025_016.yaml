body:
  text: 小不足以處大子故夫牛蹏之涔不能生鱣鮪而蜂房不容鵠卵小形不足以包大體也淮南子道應訓牛蹄之涔無尺之鯉頹府之山無丈之材何也皆其營守狹小而不能容巨大淮南子坎井之無黿鼉隘也江湖鱣鯨非溝瀆所容也蹄窊之內不生蛟龍培塿之上不植松柏列子史部婁無松柏左襄二十四尋常之汙瀆兮豈容吞舟之魚西漢賈誼傳枳棘非鸞鳳所棲百里豈大賢之路東漢仇覽傳傳記坎井無黿鼉談苑華譚曰枯澤非應龍之淵棘林非鸞鳳之窟晉中興書集清源無增瀾安得運吞舟選郭景純遊仙詩井谷不可以遊龜龍蟻垤不可以栽松柏唐文粹蹄窪之內不生蛟龍韓文大魚豈肯居沮洳同上本朝尺水無長瀾蛟龍豈其容歐公集合抱之木不生於步仞之丘千金之子不出於三家之市東坡文勺水安足容神龍乎東都事略濁水難藏許氏龍僧參廖子詩史宋義曰搏牛之虻不可以破蟣蝨史記項羽傳蔣琬除廣都長眾事不理先主將加罪諸葛亮曰蔣琬社稷之器非百里之才也蜀志蔣琬傳吳魯肅遺先主書曰龐士元非百里才使處治中別駕之任始當展其驥足耳蜀志集執棠谿以刜蓬秉干將以割肉皆利劍也破荊和以繼築然一旅之眾不足以揚名選書胡為射小盜此用無乃輕徒沾一點血虛污箭頭腥白居易屈長才於短用者猶騎搏鼠而斧剪毛也白居易策審官互入處事失當函午之鼎以烹小雞劉賓客烹雞屈函牛之量駱賓王君有百鍊刃堪斷七重犀誰開太阿匣持割武城雞張九齡文以赤刃效小割皇甫湜集互見不勞餘力截橑為欂櫨斲楹以為椽韓文將吾劍首切淤泥盧仝文本朝不惜牛刀時一割已因鼷鼠發千鈞欒城集經子曰德薄而位尊智小而謀大力小而任重易係辭子細枝拳曲不可以為棟梁莊子賈精於市不可以為賈師農精於田而不可以為田師荀子此係小才不可大用史費充伐吳秦秀曰充文案小才居國大任三國志釣大鰲者不投取魚之餌斷長鯨者焉用割雞之刀南唐野史小才不可大用集楶梲之才不荷棟梁之任班叔夜王命論任小能於大事猶狸搏虎而刀伐木也白居易小才大用本朝以尋尺之材居棟梁之任以升斗之量鐘鼎之藏欒城集經陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娛易略例上史秦民勇於公戰怯於私鬭通監周顯十年漢高祖不能將兵而善將將西漢韓信傳諸部曰劉將軍平生見小敵怯今見大敵勇甚可怪也東漢光武紀君材簡略堪大不堪小晉書劉卞傳集孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其內柳文不及於一國而被於天下不洽於一時而沛于萬世皮日休名聞天下而不達於堂上智周萬物而不適乎一人文粹本朝尹師魯凡事有小而可矜者必惻然不忍發見顏貌及臨大節斷大事則心如金石雖鼎鑊前列不可變也歐公集互見深識大體子金重於羽者豈謂一鉤金與一輿羽之謂哉孟告子下鴻毳性輕積之沈舟魯縞質薄疊之折軸劉子史積羽沈舟群輕折軸史記張儀傳集眾輕積而折軸文集子齊宣王見牽牛而過堂下者王曰以羊易之孟子曰王無異於百姓之以王為愛也以小易大孟子梁惠王史鄭伯以璧假許田左威公元年孟佗以菖蒲酒一斛遺張讓即拜佗涼州刺史後漢經其所厚者薄而所薄者厚未之有也記大學子忠孝者百行之寶忠孝不脩雖有他善猶玉屑盈匣不可琢為珪璋劉子史周不愛鼎鄭敢愛田左昭十二年有盜高廟坐前玉環文帝欲族之張釋之曰假令愚民取長陵一抔土陛下且何以加其法乎西漢張釋之傳劉陶曰萬人鑄之一人奪之猶不能給況一人鑄之萬人奪之通監東漢陳思王曰寒者不貪尺玉而思短袍飢者不願千金而羨一食物時有所急也後魏賈思緦齊民要術互入事窮勢迫本朝夫以英雄之才尚有溺情愛而不能自守況柔弱之人其能勝妻子之情乎伊川家人卦解經與其殺不辜寧失不經書喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也記檀弓與其有聚歛之臣寧有盜臣記大學非專為飲食也為行禮也鄉飲酒義爾愛其羊我愛其禮語子寧百刺以針無一刺以刀寧一引重無久持輕寧一月饑無一旬餓淮南子史施眾網以加一禽尚不能得況張千目以羅萬品而望盡出乎其間可得哉唐元稹傳漢武帝置協律歌天瑞非不美也不能免哀痛之詔王莽建羲和考律呂非不精也不能救漸臺之禍晉武帝制笛尺調金石非不詳也不能弭平陽之災梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏濩武之音具存於世苟其餘不足以稱之曾不能化一夫況四海乎通監唐太宗傳記今為濡足之故而不救人溺乎劉向新序昔孔子力可翹關不以力稱何則大聖之德具美者眾不可以一介末事持為百行端首史通集日受千金之賜一歲九遷其官感恩則有之矣將以稱於天下曰知己則未也韓愈上張封建書萬不試而一出焉猶為當世甚重若使幸得出其十二二則巍然為偉人與世無窮其可涯也柳文互見心服經賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復易序卦泰者通也物不可以終通故受之以否同上無平不陂無往不復泰卦互入儆戒樂極則憂記樂記子游曰事君數斯辱矣朋友數斯疏矣語里仁甚美必有甚惡左昭二十七子其進銳者其退速孟子盡心上美好者不祥之器老子刻核太至則必有不肖之心應之莊子人間世互見事莫至盡人眾者勝天天定亦能應人荀子千歲必反古之常也荀賦篇物盛而衰樂極則悲淮南子煙生於火而煙鬱火冰生於水而冰遏水故煙微而火盛冰泮而水通劉子防慾篇史防民之口甚於防水水壅而潰傷人必多國語滿而不損則覆盈而不持則傾史記樂書物盛則衰時極則轉史平準書酒極則亂樂極則悲萬事盡然言不可極極之而衰史滑稽傳炎炎者滅隆隆者絕西漢楊雄傳秦為宮室之麗至於此使其後世曾不得聚廬而托處焉為馳道之麗至於此使其後世曾不得邪徑而托足焉為葬薶之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉西漢賈山傳互見貽禍高位實疾顛厚味實腊毒前漢五行志權族好傾東漢陰具贊互見勢不可恃昔戰國之世處士橫議列國之主至為擁篲先驅卒有阬儒燒書之禍東漢申屠蟠傳貧生於富弱生於強危生於安王符傳峻高者潰葉茂者摧日中則移月滿則虧後漢趙曄吳越春秋集歡樂極兮哀情多漢武帝秋風辭盛時一去貴反賤桃笙葵扇安可常柳文至損當受益苦寒必生溫韋應物本朝東漢之末尚節行太甚須有東晉放曠其勢必然鳴道集美物必甚惡厚味生五兵黃魯直經權衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓記經解子聽其言也觀其眸子人焉廋哉孟子离婁上水靜則明燭鬚眉莊天道高垂大鏡坐見四鄰淮南子史清水明鏡不可以形遁韓安國傳互見聰明集登鐘山藍田之上則夜光璠璵之珍可觀矣文選李蕭遠運命論經東鄰殺牛不如西鄰之禴祭實受其福易既濟互見事反所料樽酒簋貳用缶納約自牖終無咎坎卦注明信顯著不存外飾雖復一樽之酒二簋之食瓦缶之器納此至約自進於牖乃可以羞之於王公薦之於宗廟茅之為物薄而用可重也繫辭並易黍稷非馨明德惟馨書君陳泂酌彼行潦挹彼注茲可以餴饎詩泂酌子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮語祭服敝則焚之祭器敝則埋之記曲禮上夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神禮運君子不以菲廢禮坊記並記子魯有儉嗇者瓦鬲煮食食之自謂其美盛之土硎之器以進孔子孔子受之歡然而悅如受太牢之饋子路曰瓦甂陋器也煮食薄膳也夫子何喜之子曰吾非為饌具之厚以其食厚而我思焉家語致思宋國有田夫常衣縕黂僅以過冬暨東作自曝於日顧謂其妻曰負日之暄人莫知者以獻吾君列子史苟有明信澗溪沼沚之毛蘋蘩蘊藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公左隱三年行潦之蘋藻季蘭尸之敬也左襄二十八年本朝鵝毛贈千里所重以其人歐公集經譬如終夜有求於幽室之中非燭何見記仲尼燕居子假輿馬者非利足也而致千里假舟楫者非能水也而絕江河善假於物也荀勸學篇造父者天下之善御也無輿馬則無所見其能羿者天下之善射也無弓矢則無所見其巧儒效篇弓矢不調則羿不能中六馬不和則造父不能以致遠議兵篇必將假物以為用者也並荀子行海者坐而致越有舟也行陸者立而至秦有車也慎子傳記鴻毛之囊可以渡江淮南萬畢術經惟木從繩則正書說命伐柯如之何匪斧不克詩齊南山析薪如之何匪斧不克同上衡之於輕重也繩墨之於曲直也規矩之於方圓也記經解子木受繩則直金就礪則利荀勸學火炎上而受制於水水趨下而得志於火文中子魏相篇史度長短者不失毫釐量多少者不失圭撮權輕重者不失黍絫西漢律歷志衡者所以平萬物權者所以權萬物也同上攻玉以石洗金以鹽濯錦以魚浣布以灰王符傳良工須利器巧匠待繩墨晉阮种傳
