body:
  text: 文學史班彪女名昭一名姬博學高才兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之又作女誡七篇有助女訓所著賦頌銘誄問注哀辭書論上疏遺令凡十六篇又作大家讚蔡雍女名琰字文姬博學有才辨又妙於音律曹操問曰聞夫人家多墳籍猶能憶識之否姬曰昔亡父賜書四千餘卷流離塗炭罔有存者令所誦憶才四百餘篇耳乞給紙筆真草唯命於是繕書送之文無遺誤後感傷亂離追懷悲憤作詩一章並出東漢列女傳秦州刺使竇滔妻彭城令蘇道女有才學織錦製回文詩以贖夫罪循環讀之詞甚清婉晉書太常韋逞母宋氏傳其父業得周官音義苻堅乃就宋氏家立講堂生員百二十人隔絳紗幔而受業號宋氏為宣文君晉書列女傳謝道韞聰識有才辨叔父安嘗內集俄而雪下安曰何所似也安兄子朗曰散盬空中差可擬道韞曰未若柳絮因風起同上甄后年九歲喜書用諸兄筆硯兄謂后言汝當作女慱士耶答言古者賢女未有不覽前世成敗以為己戒不知書何由見之魏書徐非妻文尤清拔所謂劉三娘也劉孝綽妹南史孝綽傳傳記蔡琰夫亡無子歸寧漢末為胡騎所獲在左賢部中春月登胡殿感笳音作詩曰胡笳動兮邊馬鳴蔡琰別傳柳下惠妻誄其夫門人不能竄一字列女傳相如將聘茂陵女為妾文君作白頭吟以自絶相如乃止長卿消渴卒文君為誄傳世西京雜記班婕妤能文漢成帝所寵帝後幸趙飛燕婕妤自知見棄求供養王太后於長信宮因為賦及執扇詩樂府楊盈川姪女曰容華為新粧詩曰宿鳥驚眠罷房櫳乘曉開鳳叉金作縷鸞鏡玉為臺粧似臨池出人疑月下來自憐終不見欲去復徘徊朝野僉載杜羔妻劉氏善為詩羔纍舉不第將至家妻先寄詩曰良人的的有奇才何事年年被放回如今妾面羞君面君若來時放夜來羔見詩即回去尋登第妻又寄詩云長安此去無多地鬱鬱蔥蔥佳氣浮良人得意正年少今夜醉眠何處樓南部新書漢王昭君至單于心思不樂乃作怨曠思歌曰我獨伊何改往變常高山峨峨河水泱泱父母妻子道里悠長琴操集善筆札讀書通古今柳文崔氏銘本朝漢崔篆母師氏通六經百家之言事物紀原史謝道韞風韻高邁敘致清雅晉書王夫人神情散朗故有林下風氣顧家婦清心玉映自是閨房之秀晉書列女傳集東家之子增之一分則太長減之一分則太短選宋玉好色賦骨象應圖選洛神賦暇則鳴絃桐風詩騷以為娛以文雅清秀重於當世柳崔簡女銘本朝謝家夫人淡丰容蕭然自有林下風坡詩經誕彌厥月不坼不副無菑無害詩生民載生載育同上居然生子同上妻將生子及月辰居側室記內則史莊公寤生驚姜氏左傳梁嬴孕過期卜之曰將生一男一女左僖十七就館西漢班倢妤傳蘇林曰外舍産子也婦人免乳大故十死一生西漢宣后傳免身同上奈何妾薄命端遇竟寧前漢書許后傳集貧女臨水粧徘徊波不定豈敢怨東風自恨臺無鏡古詩巧婦多薄命白樂天絲蘿無托誰知薄命之由天唐吳融瀟相逢故人賦本朝芳菲美艷不禁風未到春殘已墜紅詩話總龜互入悼亡顏色如花命如葉臨川紅顏勝人多薄命後山夫婦之好義同賓友勤瘁相成於艱難之中而死生契闊於安樂之後東坡作司馬光妻贈夫人制互見悼亡經齊侯之子女也衛侯之妻東宮之妹邢侯之姨談公惟私注云姊妹之夫曰私詩碩人汾王之甥蹶父之子詩韓奕平王之孫齊侯之子平王也武王女文王孫適齊侯之子詩何彼穠矣史苗夫人其父太師晉卿其舅張河東嘉貞其夫延賞其子弘靖其壻韋皋近代婦人之貴無如此李肇國史補集長信宮受冊命之歲與母於內朝序位環佩之聲相聞權載之集夫尊於朝婦貴于室元稹集經婦人無爵從夫之爵記郊特牲史齊侯戰敗還女子曰君免乎曰免矣鋭司徒免乎曰免矣齊侯以為有禮問之辟司徒之妻也與之石窖左傳漢封蕭何妻為酇侯西漢魏衡妻王氏武德初為薛仁杲舊將房企地所逼而妻之企地侵梁郡飲酒醉王氏取其佩刀斬之攜其首入城賊散高祖封為崇義夫人舊唐書列女傳互入才略鄒保英妻奚氏萬歲年契丹賊李盡滅來寇平縣保英時任刺史領兵討擊既而城孤援寡將陷奚氏乃率家僮及城內女丁相助固守賊徒退封為誠節夫人同上互入同上史思明之叛衛州女子侯滑州女子唐青州女子王相與歃血赴行營討賊皆補果毅新唐書互入才略默啜攻飛狐縣古元應妻能固守詔封循忠縣君同上互入同上本朝漢崔篆母師氏通經學百家之言王莽寵以殊禮賜號義成夫人事物紀原晉虞昌母拜武昌侯太夫人同上宜疏湯沐之封以稱山河之象東坡集改賜湯沐寵以訓詞庶幾采蘩之遺芳不與宿草而共盡改封大國正位小君並同上湯沐從夫寵欒城集經歸寧父母詩葛覃后妃在父母家則志在於女功之事同上史婦人內夫家而外父母家西漢劉向論王氏疏子婦人莫不願得以為夫處女莫不願得以為士士未取妻之稱荀子非相史鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉子産請使女擇焉子晢盛飾入布幣而出子南戎服入左右射超乘而出女目房觀之曰子哲信美矣抑子南夫也適子南氏左傳昔賈大夫惡娶妻美三年不言不笑御以如皋射雉獲之其妻始笑而言左昭二十八互見心隨事移孟氏有女狀肥醜擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣東漢梁鴻傳河東刺史徐邈有女才淑擇夫未嫁邈乃大會佐吏令女於內觀之女指濬告母邈妻之晉書王濬傳集佳人慕高義得賢良獨難選姜女篇經不敢懸於夫之楎椸不敢藏於夫之篋笥記內則子必敬必戒無違夫子孟子請問為人妻曰夫有禮則柔從聽侍夫無禮則恐懼而自悚也荀君道史冀缺耨其妻饁之敬相待如賓左傳梁鴻每歸妻為具食不敢於鴻前仰視舉案齊眉本傳集承慶雲之光覆兮荷君子之惠渥顧葛藟之蔓延兮託微莖之樛木懼身輕而施重兮若履冰而臨谷潘安仁寡婦賦史吳許升妻者呂氏之女升少為慱徒不理操行榮嘗數勸升修學每有不善輒流涕進規升感激自厲乃尋師遠學遂以成名東漢列女傳建中末李希烈謀襲陳州李侃為項城令以城小欲逃歸楊氏曰縣不守則地賊地也倉廩府庫皆其積也百姓皆其戰士也請募死士賊遂去縣卒完詔遷侃太平令唐書互見才略傳記晉平公使工為弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦已勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以言為儀而穿七札工得賜金三鎰列女傳本朝使吾不以貧賤富貴纍其心者吾妻之助也吾嘗與士大夫語謝氏多從戶屏竊聽之間則能盡商榷其人才能賢否及時事之得失皆有條理吾官吳興自外歸必問曰今日孰與飲而樂乎聞其賢者也則悅否則嘆曰君所交皆一時賢雋今與是人飲而歡耶歐公為梅聖俞謝氏撰墓銘史昔賈大夫惡取妻美三年不言不笑御以如皋射雉獲之其妻始笑而言左昭二十八年互見心隨事移又擇夫蘇秦說秦王不行歸至家妻不下紝戰國策朱買臣妻謂買臣曰如公等終餓死溝中矣何能富貴前漢本傳外黃富人女甚美庸奴其夫西漢張耳傳史記曰嫁庸奴亡其夫王凝之妻謝氏道韞奕之女也初適凝之還甚不樂奕之曰王郎逸少子不惡汝何恨也答曰一門叔父則有阿大中郎群從兄弟則封胡朅末不意天壤之中乃有王郎晉書經豫美亡此誰與獨處云云誰與獨息云云誰與獨旦詩葛生穆伯之喪敬姜晝哭記寡婦不夜哭記坊記一與之齊終身不改故夫死不嫁記郊特牲子子曰昔東夷之子慕諸夏之禮有女而寡為內私壻終身不嫁不嫁則不嫁矣亦非清節之義也家語六本篇華周杞梁之妻善哭其夫而變國俗孟子孀寡婦淮南子修務訓注正文曰以養孤孀史於未亡人之側左莊二十八年注婦人既寡自稱未亡人愚公謀平太行之險京城之孀婦有男往助之列子湯問杞梁死其妻哭之城為之崩公羊禮婦人喪夫自稱未亡人後魏書傳記柳下惠死其妻誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之諡宜為惠兮列女傳集易錦茵以苫席兮代羅幬以素帷愁煩冤其誰告兮提孤孩於坐側歸空館而自憐兮撫衾禱以歎息耳傾想於疇昔兮目倣佛乎平素雖冥冥以罔覿兮猶依依以憑附晞形影於几筵兮馳精爽於丘墓顧假寐以通靈兮目炯炯而不寢如涉川兮無梁若陵虛兮失翼廓孤立兮顧影塊獨言兮聽響潘安仁寡婦賦日黃昏而望絶兮悵獨託於空堂懸明月以自照兮徂清夜於洞房忽寢寐而夢想兮魂若君之在旁惕寐覺而無見兮魂廷廷若有忘長門賦風蕭瑟而並興兮天慘慘而無色獸狂顧以求群兮鳥相鳴而舉翼王仲宣登樓賦緑流茂滋萍羅是依山崩川竭魚鳥何歸張說之歸當掩重關默默想音容韋應物集孀居永日蓬首終年陳子昂援詩以示其節執禮而哭於晝張九齡文夫既溘至妻將疇依白氏六帖本朝夫君去我而何之兮時節逝兮如波昔共處兮堂上忽獨棄兮山阿歐公述夢賦經無思犯禮詩漢廣以禮自防詩草蟲能循法度詩采蘋雖速我訟亦不女從詩行露有女如玉詩野有死麕注堅貞潔白無感我帨兮同上女也不爽詩氓夫不在斂枕篋簟席襡器而藏之記內則女子出門必擁蔽其面夜行以燭無燭則止同上史宋火災宋伯姬卒待姆也女師左襄傳穀梁傳載伯姬曰婦人之義傳母不在不下堂遂逮於火而死王蠋曰列女不更二夫通監周赧王高氏有美女謝鯤嘗挑之女投梭折其兩齒晉書杜韜至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不為賊作婦遂自殺焉鄧粲晉記王凝為號州司戶卒于官凝家貧一子尚幼妻李氏攜其子歸過開封府旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執耶不可以一手并汙吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事于朝官賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉五代史雜傳傳記貞女不假人以色劉向列女傳蔡人之妻宋女也夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸也奈何去之適人之道一與之醮終身不改且乎芣苡之草雖甚惡猶始捋采終懷擷之浸以益親況於夫婦同上淑女與哲人烈士爭不朽名寒如嚴霜唐列女傳楚昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宮人約召必以符今使者不持符妾不敢行於是使者返取符未還臺已壞沈水而死齊閔王之后項有大瘤號曰宿瘤初閔王出遊百姓盡觀宿瘤採桑如故王怪問對曰妾受父母教採桑不受教觀大王命後乘載之女曰父母在內使妾不受教而隨王是奔女也王安用之王大慚使使者奉禮加金百鎰往聘贈之父母驚欲洗浴加衣裳女曰如是見王變容更服不識也於是如故隨使者至閔王以為后陳仲妻張叔明之妹名芝與二嫂沒賊恐見侵略而相謂曰婦人以不汙身為高不虧節為美豈可委身待辱哉於是自剌並列女傳集貞女要名於沒世演連珠女有不易之行江文通書玉不厭潔蘭不厭馨晉裴顧女史針班女不以色事君鮑溶集處貧素而不味陳子昂集美人出南國灼灼芙蓉枝皓齒終不發芳心空自持李太白集志在列女籍竹帛已光榮趙女不冶容並同上願為連根之秋草不作飛空之落花李太白集寄情人楚辭體玉心皎潔終不移同上貞婦貴徇夫孟東野豔女皆妬花靜女獨檢蹤任體恥任裝嫁德不嫁容君子未求聘小人難相從此志誰與說琴絃幽韻重孟郊靜女詞夫行竟不歸婦德轉光明不比山頭石空有望夫名白侍郎共保秋竹心風霜侵不得妾身有存歿妾心無改易並同上三秋廷緑盡迎霜唯有荷花守紅死杜牧之波瀾誓不起妾心井中水孟郊本朝娟然如靜女不肯旁阡陌歐公詩
