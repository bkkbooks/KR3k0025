body:
  text: 寄興經子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎語子曰觚不觚觚哉觚哉語色斯舉矣翔而後集曰山梁雌雉時哉時哉語鄉黨子關睢興于鳥而君子美之取其雌雄之有別鹿鳴興于獸而君子大之取其得食而相呼家語三恕篇仲尼亟稱於水曰水哉水哉孟子大公釣隱磻溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公跪石隱崖旦不餌而釣仰詠俯吟及暮而釋竿符子史陶淵明性不解音而蓄素琴一張絃徽不具每朋酒之會則拊而和之曰但識琴中趣何勞絃上聲晉書本傳王徽之嘗居山陰夜霽月色清朗四望皓然酌酒詠左思招隱詩忽憶戴逵時逵在剡便夜乘小船詣之經宿方至造門不前而反人問其故曰本乘興而行興盡而反何必見安道耶晉書陸龜蒙升舟設蓬席齎束書茶竈筆床釣具往來時謂江湖散人唐書本傳張志和垂釣不設餌志不在魚唐書本傳傳記孔子過谷中見蘭獨茂嘆曰蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云琴操互見自嘆集往時張旭喜草書不治它技喜怒窘窮憂悲愈佚怨恨思慕酣醉無聊不平有動於心必於草書發之觀於物見山水崖谷鳥獸蟲魚草木之花日月列星風雨水火雷霆霹靂歌舞戰鬭天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世韓文送高間上人序垂竿不在魚賣藥不為錢劉長卿詩情聊自遣不足赴聲名姚少監經魯共王壞孔子舊宅以廣其居於壁中得古文升堂聞金石絲竹之音乃不壞宅悉以書還孔氏書序子在齊聞韶三月不知肉味曰不圖為樂之至於斯也語子卿大夫士蹈之則可以尊君父立忠信守志厲操者儀之則可以崇高節抗浮雲孟子序聞伯夷之風者頑夫廉懦夫有立志聞柳下惠之風者鄙夫寬薄夫敦奮乎百世之上百世之下聞者莫不興起孟子史孔文舉高志直情足以動義概東漢孔融傳集事有曠百世而相感者余不自知其何心韓文不因感衰節安能激壯心劉賓客櫪馬待騁夜風起而長鳴匣劍有靈秋氣來而自動呂和叔文經弗率訓典殊厥井疆俾克畏慕書畢命求也退故進之由也兼人故退之論先進由之瑟奚為於丘之門語子水摶而躍之可使過顙激而行之可使在山孟告子上豫不屑之教誨也者是亦教誨之而已矣孟告子下金石有聲不考不鳴莊子聖人賞一人而天下諭之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正卵而魯國之邪塞子産誅鄧析而鄭國之姦禁淮南子鮑叔為桓公祝曰使公無忘在莒時管子無忘在魯時寧戚無忘車下時尸子賞一以勸百罰一以懲衆文中子立命篇史春秋以一字為褒貶左傳杜預序善人勸焉淫人懼焉左昭三十一夫差使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越左傳定公十四年互見報怨子貢利口孔子常黜其辨史本傳張儀謁蘇秦秦戒門下不為通又不得去數日已而見之坐於堂下賜僕妾食曰張儀天下之賢士恐其樂小利故召辱之以激其意史記張儀傳自園公綺里季夏黃公角里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗西漢王貢等傳序張良遊下邳有一父老衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老乃強忍下取履因跪進父以足受之笑去曰孺子可教矣後五日平明與我期此良曰諾五日良往父已先在怒曰與老人期後何也去後五日蚤會後五日良夜半往有頃父亦至喜曰當如是出一編書曰讀是則為王者師西漢張良傳激清流揚微波蜚英聲騰茂實司馬相如傳爵祿者天下之砥石所以礪世磨鈍也前漢梅福傳馬援與隗囂將楊廣書曰今者歸老更欲低頭與小兒曹共槽櫪而食乎通鑑東漢周顗奔琅琊王睿諸名士登新亭相視流涕王導曰當戮力王室克復神州何至作楚囚對泣耶通鑑晉懷帝紀時被劉石之亂琅琊王保建康謝晦為宣州刺史頗有矜色將之鎮詣叔光祿淡淡問年晦曰三十五淡笑曰昔荀中郎年二十已為此府都督卿比之為老矣晦有愧色宋書立懦夫之志息貪競之風北史隱逸楊愔幼時為季父暐大嗟異顧謂賓客曰此兒恬裕有我家風宅內有茂竹遂為愔於林邊別葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彥慎謹自得竹林別室銅盤重肉之食後魏書互見子弟門激清風於萬古厲薄俗於當年唐書忠義傳序魏諸牧守共謁丞相泰泰命河北太守裴俠別立謂牧守曰裴俠清謹奉公為天下最有如俠者可與共立衆默然無敢應者泰乃厚賜俠朝野嘆服號為獨立使君通鑑梁武紀王世充誓衆曰今日之戰非直爭勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所爭者死非獨為國通鑑唐高祖傳記陶侃為荊州見佐吏博奕戲具投之於江曰圍碁堯舜以教愚子傅殷紂所造諸君並國器何以此為晉中興書集夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非止於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也韓文賞厚可令廉士動心罰重可令凶人喪魄韓文淮西事宜狀為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉柳斷刑齊桓將圖霸功管仲戒之以無忘在莒懼其情志之易變也陸宣公文所以激生者節豈獨慰死者魂白樂天集人之詞待扣而揚猶井之利汲劉賓客本朝美井不日汲何由發清甘歐公集欲試百鍊剛要須更泥蟠東坡詩子有求全之毀孟子史盛名之下其實難副東漢黃瓊傳春秋之法常責備於賢者唐太宗贊盛名之下為難居矣名盛則責望備唐書集鍊金索堅貞洗玉求明潔孟郊詩鳳凰五色百鳥尊知鳶為害何不言韋應物集本朝名下難為人山谷詩經節彼南山維石巖巖赫赫師尹民具爾瞻詩節南山子良人者所仰望而終身也孟子離婁下若大旱之望雨也孟子滕文公下史季武子曰小國之仰大國也如百穀之仰膏雨焉左襄十九閔閔焉如農夫之望歲左昭二十子餘曰重耳之仰君也若黍苗之仰陰雨也若君實芘陰膏澤之使能成嘉穀薦宗廟君之力也國語呂不韋曰吾門待子門而大史本傳王吉少與貢禹為友吉為益州剌史貢聞之拂冠以待西漢天下莫不拭目傾耳後漢天下聚目而視攢耳而聽東漢盧植傳輶軒未動天下翹然待之矣唐陳子昂傳集彈冠俟知已曹子建贈徐幹詩椅梧傾高鳳寒谷待鳴律顏延年秋胡詩冀宵燭之末光邀潤屋之微澤劉孝標論今天下以君侯為文章之司命人物之權衡一經品題便作佳士而君侯何惜階前盈尺之地不使白揚眉吐氣激昂青雲耶李白與韓荊州書萬井九街皆望仰韋應物善人進其類皆有望於公韓文經視履考祥易履卦人無於水監當於民監書酒誥明清于單辭書呂刑有言逆于汝心必求諸道有言遜于汝志必求諸非道書太甲下今吾於人也聽其言而觀其行語子曰視其所以觀其所由察其所安人焉廋哉語為政君子不以言舉人不以人廢言語衛靈公子聽其言也觀其眸子人焉廋哉孟離婁上觀近臣以其所為主觀遠臣以其所主孟子左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也孟子梁惠王下察其眉睫之間而得其情列子説符不知其子視其友不知其君視其左右荀子性惡流言止於智者荀大略觀人者審其作輟而已矣揚孝至史子産曰它日吾見蔑之面而已今吾見其心矣左襄二十五言之太甘其中必苦國語晉觀其容而知其心矣國語貌言華也至言實也苦言藥也甘言疾也史商君傳不知其人視其友史馮唐傳論李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣史魏世家齊威王召即墨大夫語之曰自子之居即墨也毀言日至然吾使人視即墨田野辟人民給官無事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不辟人民貧餒是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者通鑑周紀聽言之道必以其事觀之則言者莫敢妄言西漢賈誼傳忠言逆耳利於行毒藥苦口利於病前漢張良傳達觀其所舉富觀其所豫窮觀其所不為貧觀其所不取近觀其所為遠觀其所主西漢杜欽傳夫談有悖於目拂於耳謬於心而便於身者或有説於目順於耳快於心而毀於行者非有明王聖主孰能聽之西漢東方朔傳徙郡國豪傑及訾三百萬以上干茂陵軹人郭解關東大俠也亦在徙中衛將軍為言郭解家貧不中徙上曰解布衣權至使將軍為言此其家不貧卒徙解家通監漢武紀傳聞之事常多失實通監漢光武紀上官桀怨霍光令人詐為燕王上書言光出都羽林道上稱蹕又擅調益莫府校尉光聞之不入上問大將軍安在桀對以燕王告其罪不敢入有詔召光光免冠上曰將軍冠朕知是書詐也將軍調校尉未十日燕王何以知之通監漢昭紀始元元年互入不信讒貴視其所舉富視其所與貧視其所不為説苑臣術無以先入之語為主西漢息夫躬傳臣下雷同是非相蔽國之大患也若不和睦則有讎黨有讎黨則毀譽無端毀譽無端則真偽失實此皆不可不深察也通監魏明紀欲知治經之士則視其記覽博洽講論精通斯為善治經矣欲知治獄之士則視其曲盡情偽無所冤抑斯為善治獄矣欲知治財之士則視其倉庫盈實百姓富給斯為善治財矣欲知治兵之士則視其戰勝攻取敵人畏服斯為善治兵矣通鑑魏明孫亮出西苑方食生梅使黃門至中藏取蜜漬梅蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黃門從汝求蜜耶吏曰向求實不敢與黃門不服侍中刁玄張邠啓黃門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎裡燥亮大笑謂玄邠曰若久在蜜中中外俱濕今裡燥必黃門所為黃門首服左右莫不驚悚吳曆郤詵對策曰飾智於外藏邪於內邪正之人難得而知也晉書自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信通監晉武紀一人之身所閲者衆故能官得其才鮮有敗事通監宋世祖崔群對曰無情曲直辨之至易稍懷欺詐審之實難故孔子有衆好惡之論浸潤膚受之説蓋以暖昧難辨故也唐書自古及今骨肉垂離以至敗國亡家未有不因左右離間而然也通監唐高宗上曰人主惟有一心而攻之者甚衆或以勇力或以辨口或以諂諛或以姦詐或以嗜欲輻湊攻之各求自售以取寵祿人主少懈而受其一則危亡隨之此其所以難也通監唐太宗昔趙武訥訥而為晉賢臣絳侯木訥而為漢元輔人之難知堯舜所病胡可以一訓一詰而謂盡其能哉以此察天下之情固多失實通監唐德宗傳記貌同而心異貌異而心同史通集不豫衾之眠信豫衾之穿盧同文嘻笑之怒甚乎裂眥長歌之哀過乎慟哭柳文求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賓客集互入因小見大本朝戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀至於遠方之人肝腦屠於白刃筋骨絶於饋餉流離破産鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也東坡集譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美死者甚苦使陛下見其號呼於梃刃之下宛轉於刀几之間雖八珍之美必將投筯而不忍食而況用人之命以為耳目之觀乎東坡集經古之君子不必親相與言也以禮樂相示而已記仲尼燕居子曰吾與回言終日不違如愚退而省其私亦足以發回也不愚子曰回也於吾言無所不説論語默而識之論語子不窺牖見天道老子犁然有當於人之心莊子山本坐於室而見四海荀子君子不下堂而海內之情舉積此者荀漢龐參為漢陽太守郡人任棠有奇節隱居參候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思之曰水者欲吾清也拔大本薤者欲吾擊強宗抱兒當戶欲吾開門恤孤也後漢史山濤論用兵不學孫吳而暗與之合晉書本傳晉阮瞻讀書不甚研求而默識其要遇理而辨晉書本傳暗合孫吳舊唐書魏元忠傳帝問柳公權用筆法對曰心正則筆正筆正乃可法矣時帝荒淫故公權及之帝改容悟其以筆諫也新唐書傳記坐披囊篋而神交萬古不出戶庭而窮覽千載史通望表而知裏捫毛而辨骨史通如人飲水冷暖自知傳燈録集不取孫吳而暗與之會曹植疏不出戶而知天下兮何必歷遠以劬勞張平子思玄賦知言之人默然而其意已傳韓文言針千古同一心唐文粹孫吳暗合王維集經司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天四海之內皆兄弟也君子何患乎無兄弟也論語史勾踐之困於會稽喟然嘆曰吾終於此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由是觀之何遽不為福乎史越世家互見禍福倚伏集昔顏氏之庶幾兮在隱約而平寬固哲人之細事兮夫子乃嗟嘆其賢惡飲食乎陋巷兮亦足以頤神而保年有至聖以為之依歸兮又何苦不自得於艱難韓文當今聖人求侍從拔擢杞梓收楛箘東馬嚴徐已奮飛枚皋即召窮且忍韓文鴟梟啄母腦母死子始蕃蝮蛇生子時拆裂腹與肝好子雖云好未還恩與勤惡子不可説鴟梟蝮蛇然有子且勿喜無子固勿嘆韓慰孟東野失子君不見買臣衣錦還故鄉五十身榮未為晚白集悠悠天地內不死會相逢白侍郎集互見曠達門矢捨雖未中璞全終待攻高達夫艷色天下重西施寧久微王維集有才年少屈終難同上人生多少歡娛事那得千分無一分唐文粹本朝行藏自欲追時節豈是人間不見容臨川集君猶鸞鶴偶飄墮六翮如雲豈長鎩坡詩人生不信長轗軻東坡詩莫為無車馬含羞入劍關眼前百種無不有知君一以詩驅除並同上身健何妨遠陳後山集得志寧論晚同上和氏有尺璧楚國無人知但使玉非石果有遭逢時山谷詩曠度逢知晚高才處下難後山詩但存心裏正勿愁眼下遲言行録王元之詩天風不借便造物暫淹沮僧參寥子今代貴人須白髮挂冠高處未宜彈陳後山集
