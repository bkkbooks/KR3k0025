body:
  text: 習熟難忘諺云熟處難忘子庖丁曰臣始解牛所見無非牛者莊子養生篇史楚鍾儀囚於晉晉人與之琴操南音左傳互入懷鄉李廣居則畫地為軍陳射闊狹以飲專以射為戲史本傳越人莊舄仕楚病楚王曰舄越之鄙人必思於越使人往聽之果為越吟史記互入懷鄉殷仲堪曰三日不讀道德論便覺舌本間強晉書互入書慣義真曰靈運空踈延之隘薄魏文帝所謂古今文人類不護細行者也但性情所得未能忘言於悟賞耳通監宋高祖紀唐元宗問姚崇曰公知獵乎對曰少為獵師老而猶能唐書本傳傳記高祖既作新豐并徙舊社放犬羊雞鴨於通途亦競識其家西京雜記伯樂相馬所見無非馬呂氏春秋上皇居南內夜登勤政樓聞里中隱隱如歌聲顧力士潛召果梨園弟子也楊妃外傳越王曰躃者不忘走盲者不忘視後漢趙曄吳越春秋集魚意思在藻鹿心懷食蘋張九齡風情雖老未全銷白樂天集聞休戰鬥心還癢見說煙塵眼即開王建集商女不知亡國恨隔江猶唱後庭花杜牧之詩互入懷鄉惟有詩魔降不得每逢風月一間吟白集本朝書生習氣未能無東坡詩剩員呈武藝老妓舞柘枝古今詩話至今清夜夢尚驚冠壓頭坡詩互入間適投紱歸來萬事輕消磨未盡秪風情鳥囚不忘飛馬繫常念馳並東坡詩經驕淫矜夸將由惡終雖收放心間之惟艱書畢命商俗靡靡利口惟賢餘風未殄同上傳記梟欲東徙曰鄉人皆惡我鳴鳩曰子能更鳴可矣不能更鳴東徙猶惡子之聲說苑談叢集雖漸斂束故態未鋤司空表聖文互入習慣子今以其昏昏使人昭昭孟子猶足不能行而賣躄藥劉子史陳遵常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優乎西漢陳遵傳以鴟梟而笑鳳凰執蝘蜓而嘲龜龍西漢楊雄傳北山有鴟不潔其翼叨餮貪污臭腐是食長鳴呼鳳謂鳳無德東漢朱暉傳注互入居邪惡正因傷遷傳物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也范曄贊班固互入此無彼誚唐太宗曰人苦不自覺通鑑本紀集家有敝帚享之千金斯不自見之患也魏文帝典論本朝韓子論荀楊之疵而韓子之疵有甚於荀楊荀卿譏六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試策問互入此無彼誚子唯之與阿相去幾何同為應對而相夫幾何老子異俗篇或百步而後止或五十步而後止以五十步笑百步則何如曰直不百步耳是亦走也孟子梁惠王上史齊使跛者逆跛者禿者逆禿者眇者逆眇者公羊固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫後漢范曄贊班固互入不自覺醜武宗奮然除去浮圖之法甚鋭而躬受道家之籙唐武宗贊無異於避湯入火通鑑梁紀傳記土耦人方與木梗人語木梗謂土耦人曰子先土也持子以為耦人遇天大雨水潦並至子必沮壞應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止說苑尊賢優孟謂趙襄子曰今天下盡桀也而君紂之桀紂並世焉能相亡然亦殆矣新序集楚則失矣而齊亦未為得也司馬長卿上林賦李赤善為歌詩類李白名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取豫向背決不為赤者幾何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉柳文李赤傳互入昧於自知似同浴而譏祼裎也韓文豹則虎之弟鷹則鷂之兄古樂府本朝徐鉉不信佛酷好鬼神之說筆談韓子論荀楊之疵而韓子之疵有甚於荀楊荀卿議六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試策問互入不自覺醜五技鼯鼠笑鳩拙百足馬蚿憐鱉跛山谷詩經如塗塗附小雅角弓傳記屋重架屋床上施床史通本朝屋下架屋床上疊床鳴道集子方其夢也不知其夢也夢之中占其夢焉莊子以水救水以火救火名曰益多莊人間世以水投水淮南子史以水濟水左傳以暴易暴史記伯夷傳又見唐書魏證傳如以湯止沸前漢禮樂志如以血洗血汙益甚耳通鑑唐紀以亂易亂唐書魏證傳如以蒿箭射蒿中耳通鑑唐高祖集玄文處幽楚辭玄墨也如以膏濯衣每漬垢愈染借聽於聾求道於盲並韓文經子謂仲弓曰犁牛之子騂且角論語子青出於藍而青於藍冰水為之而寒於水荀子勸學以涅染緇則黑於涅以藍染青則青於藍淮南子俶真訓明月之珠出於蚌蜄周之簡圭生於垢石大蔡神龜出於溝壑淮南子說山訓史孔融見韋元將仲將與其父端書曰不意雙珠近出老蚌後漢陸卬之子雲少機悟好學邢劭曰老蚌遂出明珠晉書本傳褚淵卒世子侍中賁恥其父失節服除遂不仕以爵讓其弟蓁屏居墓下終身通鑑吝太祖監察御史許遠敬宗之曾孫也通監唐元宗盧元輔簡潔貞方歷踐清貫人亦不以其父杞之醜行為纍人士歸美舊唐書本傳傳記山公大兒武帝欲見之山公不敢辭問兒兒不肯行時論乃云勝山公世說集推輪為大輅之始大輅寧有推輪之質增冰為積水所成積水曾微增冰之凜並文選序和氏之璧韞於荊石隋侯之珠藏於蚌蛤班孟堅答賓戲金生沙礫珠出蚌泥蔡伯皆青衣賦雛鳳清於老鳳聲李義山文惡木生槎枿之英虎穴之中生此騏驥並唐文粹羸牛生健犢杜牧之集本朝淤泥生蓮花糞壤出菌芝東坡詩枯朽猶能出菌芝同上互入自負經出自幽谷遷于喬木詩伐木子百川學海而至于海揚子出潢污而浮滄海背螢燭而向日月抱朴子金丹篇集本自南山松今為宮殿梁古樂府如河入海無復水名劉賓客互入因小陋大江出汶山水力才能泛觴至於并大川三百小川三千然後與洞庭彭蠡同波下而與南溟北海同味黃魯直與何靜翁書史以蠻夷攻蠻夷西漢朝錯傳張敞守京兆尹市偷盜多敞乃召偷盜酋長數人見之責問因貰其罪令致諸盜以自贖偷長曰今一旦召詣府恐諸偷驚駭願權補吏職敞皆以為吏遣歸休置酒小偷悉來賀各餤醉偷長以赭汙其身衣裾吏坐里閭閲出者汙赭輒收縛之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事三輔議論者至云貴戚廢錮當復以貴戚浣之猶解醒當以酒也通監東漢章紀出第五倫傳本傳醫者之視堇也使其毒可以治病而不至於殺人老泉文史張湯為人多詐丞相弘數稱其美西漢本傳張敞守京兆尹市偷盜多敞乃召偷盜酋長數人見之責問因貰其罪令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀飲且醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒收縛之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事以毒攻毒兩門亙溫經王敦墓望之曰可人可人其心跡若是晉書亙溫傳魚朝恩執易升高座講鼎覆餗以譏宰相王縉怒元載怡然朝恩謂人曰怒者常情笑者不可測也通鑑經齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之論語互入事反所料子布衣紃屨之士雖在窮閻漏屋而王公不能與之爭名荀富國無置錐之地而公侯不能與之爭名仲尼是也荀子史梁齊楚趙之君非不富且貴也惡乎成名谷口鄭子真不屈其志耕於岩石之下名震于京師西漢王貢等傳序向長讀易至損益卦曰吾巳知富不如貧矣東漢集齊景公之千駟不如顏回原憲之約其身文選李蕭遠運命論本朝惟富貴者之不得兼然後貧賤之士有以自足而高世歐公浮槎山水記子以為舟則沈以為棺椁則速腐以為器則速毀以為門戶則液樠以為柱則蠹不材之木也無所可用故能若是之壽夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭莊子巧者勞而智者憂無能者無所求飽食而遨泛若不繫之舟也同上蚓無爪牙之利筋骨之強上食埃土下飲黃泉用心一也蟹六跪而二螯非蛇蟺之穴無所寄託者用心躁也荀勸學巧詐不如拙誠傅子史十語九中不如一默史記互見謹言攖拿者亡默默者存西漢揚雄傳智者以有餘為疑而朴者以不足取信東漢吳漢左雄曰白璧不可為容容多後福通鑑東漢周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子嵩曰伯仁志大而才短名重而識暗好乘人之弊非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也晉書周顗傳傳記默無過言愨無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背說苑集何巧智之不足而拙艱之有餘潘安仁間居賦牛之為物日耕百畝人不慚愧利滿天下皮角見用肩莫保不如羸驢服逐駑馬不耕不駕藿菽自與騰踏康莊出入輕舉當道長鳴聞者驚辟牛雖有功於己何益命有好醜非若能力柳牛賦今者無端讀書史智惠秪是勞精神凡物之生不願為材犧尊青黃乃木之災並韓文老龜被刳腸不如無神靈白侍郎互入招禍門巧婦才人常薄命莫教男女苦多能蟲全性命緣無毒木盡天命為不才鐵馬因疲退鉛刀以鈍全並白侍郎本朝癡人自得終天命智士死智冤莫雪皎皎千文清不如尺水渾先竭是甘井得全如苦李人人生子欲聰明我被聰明害一生但願我兒愚且魯無災無難到公卿並坡詩信有千丈清不如一尺渾後山巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉周茂叔拙賦經子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也記中庸子魚鱉黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀子法行篇互入貪迷神蛇能斷而復續而不能使人勿斷也淮南子智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見爆列子集猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人所擒皆獲輒無遺者唐文粹裴炎猩猩銘互見貪迷本朝老狐足姦計安居穴垣墻窮冬聽冰度思慮豈不長引身入扱引也中將死猶跳踉歐公集虎終機械得烏亦彈丸隨臨川集
