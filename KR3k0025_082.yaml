body:
  text: 安貧經君子固窮語衡門之下可以棲遲詩衡門貧而無諂語學而貧而無怨難語子貧者士之常處常何憂哉列子天瑞列子窮有飢色有客言於鄭子陽子陽令官遺之粟列子辭莊子史楊雄家産不過十金無擔石之儲晏如也西漢本傳藜藿有八珍之甘蓬蓽有藻梲之樂晉書葛洪傳陶潛環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也晉本傳傳記顏蠋曰安步以當車蔬食以當肉戰國策大雪丈餘洛陽令行見人家皆除路而袁安門無行路謂安死矣令看之見安偃臥問之答曰大雪人人皆餓不宜干人後漢注見汝南先賢傳集含歡谷汲行歌負薪陶潛自祭文灌園鬻蔬以供朝夕之膳潘安仁間居賦食先人之德無厚生之財陳子昂故園生事微韋應物長安布衣誰比數反掃衡門守環堵長貧任婦愁手自移蒲柳家才足稻梁並杜詩活計縱貧長淨潔白傳集筆耕為養傭書成學任彥升表素尚寧知貴清談不厭貧溫飛卿本朝貧家何以娛樂但知抹風批雨一本作抹月批風東坡詩家徒四壁書侵坐山谷陋巷一生顏氏樂清風千古伯夷貧程皓和邵康節安樂窩經志大心勞所以求者非其道也詩甫田士志於道而恥惡衣惡食者未足與議也語里仁子弓人而恥為弓矢人而恥為矢孟公孫丑上經貧者不以貨財為禮老者不以筋力為禮禮記曲禮上陳力就列不能者止語季氏子短綆不可以汲深荀子量力而動其過鮮矣左傳僖二十冉求曰小人慮材而言量力而共者也左襄十一皇甫規對曰德不稱祿猶鑿墉之趾以益其高豈量力審功安固之道哉通鑑漢殤記集量力守故轍陶淵明大廈既焚不可灑之以淚長河一泱不可障之以手庾信連珠互見勢力不敵本朝載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登阪險而馬不躓欒城集經德薄而位尊知小而謀大力少而任重易繫辭多見其不知量也語子張子猶以一柸水救一車薪之火孟告子上互入勢力不敵挾泰山而超北海孟梁上代大匠斫希有不傷手矣老子猶涉海鑿河而使虻負山也莊應帝王夸父不量力欲逐日於嵎谷之際道渴而死北山愚公年九十面山而居懲山北之塞出入之迀聚室而謀曰畢力平之可乎並列子髮引千鈞列子仲尼篇螳蜋怒臂以當車轍莊子譬以盲辨色以聾辨聲荀子以磚塗而塞江海以僬僥而戴泰山短人也荀子正論猶以錐力墮泰山也荀議兵小敵之堅大敵之擒孫子注言小國不量力與大邦為讎權時堅城固守然終必見擒獲乳狗之噬虎伏雞之搏狸淮南子以一縷之任係千金之重孔叢子策蹇驢而追迅風掉籃舟而濟大川抱朴子金丹篇以燕雀之羽而慕沖天之迅犬羊之蹄而覬追日之步劉子史君子是以知息之將亡也不度德不量力左驅群羊而攻猛虎虎之與羊不格明矣史張儀傳互入勢力不敵張儀說趙王曰斷右臂而與人鬭欲無危得乎通監以桀詐堯若卵投石夫何幸之有前漢刑法志以羔犢之弱而扦虎狼之敵也西鄒陽傳錯之瑣才智小謀大西漢朝厝敘傳下以一簣障江河西漢何武等贊譬猶鼱鼩之襲狗孤豚之咋虎西漢東方朔傳釋斤斧之用而欲嬰以芒刃臣以為不缺則折西漢賈誼傳張儉以區區一掌而欲獨堙江河終嬰疾甚之亂多見其不知量也東漢本傳投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢東漢夏侯湛傳譬由虻蚋之捕群牛腐肉之齒利劍也漢書步騭表言北相多作布囊盛沙塞江大向荊州呂範諸葛恪云此江與開闢俱生寧有可以沙塞埋也三國吳志步騭傳注欲以片心除衆弊獨手遏群邪君子不亮其誠群小共攻其短舊唐書陸贄傳論持腐株支大廈之顛唐李訓贊夫以蝸蚓之餌雜垂滄海而望吞舟之魚不亦難乎唐書傳記炎帝之女名曰女娃遊于東海溺而不反是為精衛常取西山之木石以填東海山海經互入報怨集機蓬矢以射革駟跛鱉而上山兮吾固知其不能升任重載盛兮陷滯而不濟楚辭物勝權而衡殆形過鏡則照窮選演連珠以螳蜋之斧禦鋒車之隧袁紹檄不揆蠛蠓之力強舉千鈞之重宋玉對楚王問何異無足而欲行無翼而欲翔魯褒錢神論微縷懸千金陳子昂集謬持蠡測海杜詩千鈞巨石一髮懸韋應物詩手中無尺鐵徒欲穿重圍劉長卿捧爝火以千日御抱布鼓以詣雷門李義山是猶垂蝸蚓之餌以釣吞舟之魚設弓弋之繳以羅垂天之翼李深之文施衆網而加一禽尚不能況張一目以羅萬品而望其飛走大小盡出乎其間可乎元微之集互見舉輕明重蚍蜉撼大樹可笑不自量韓文童麋來觸犀德力不相及何異乎蜉蝣爭長於龜鶴秋毫計大於崑閬者哉逆風撲燎摧岸塞河知其難矣並唐文粹難將一人手掩得天下目同上曹鄴讀李斯傳本朝有時爭勝不量力何異弱魯攻強齊安得獨灑一掬淚欲助河水增滔滔並歐公集司馬公曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉通監七秦紀桓魋武叔不量力欲撓一草搖蟠挑臨川譬如敝車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有陰雨之變陵谷之險其患必有不可知者欒城集欲將駒過隙坐待石穿溜東坡集經深則厲淺則揭詩衛風匏有苦葉豈其食魚必河之魴豈其取妻必齊之姜詩衡門就其深矣方之舟之就其淺矣泳之游之雖無旨酒式燕庶幾雖無嘉肴式食庶幾雖無德與女式歌且舞詩變小雅車舝禮從宜記曲禮上子游問喪具夫子曰稱家之有亡記檀弓上君子之於禮也有直而行也有曲而殺也記禮器啜菽飲水盡其歡斯之謂孝斂手足形還葬而無槨稱其材斯之謂禮記檀弓下子為高必因丘陵為下必因川澤清斯濯纓濁斯濯足並孟離婁上夫待腰裊飛兔而駕之則世莫乘車待西施毛嬙而為配則終身不家矣淮南子齊俗訓史何必華山之騄耳而后行遠乎史記樂書浴不必江海要之去垢馬不必騏驥要之善走史外戚世家未能免俗聊復爾耳晉書集雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情王羲之蘭亭記王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍選連珠互見知足聽極於音不慕鈞天之樂身足於蔭不假垂天之雲選稱家隨豐儉盤餐市遠無兼味樽酒家貧只舊醅杜詩稱家開戶牖量力置園林白樂天本朝華他不世出天下未嘗廢醫東坡經志大心勞所以求者非其道也詩甫田居山以魚鱉為禮居澤以鹿豕為禮記禮器注不順其鄉之所有也史王吉至崇皆好車馬衣服自奉養極為鮮明而遷徒去處所載不過囊衣人怪其奢服其儉故俗傳王陽能作金西漢王吉傳互入自相背馳本朝事到強為須涉跡邵堯夫子身非吾有是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也莊田子方生為附贅縣疣死為決𤴯胡視切潰癰忘其肝膽遺其耳目芒然倣徨乎塵垢之外逍遙乎無為之表墮枝體黜聰明離形去智同於大通此謂坐忘並莊子大宗師其生若浮其死若休莊刻意死生同狀莊天地吾所以有大患者為吾有身及吾無身吾有何患老寵辱章無町畦莊人間世莊子將死弟子厚葬之曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下螻蟻食奪彼豫此何其偏也莊子妻死惠子吊之方箕倨鼓盆而歌並莊子人生天地之間若白駒之過隙忽然而已莊知北遊以死生為寤寐以形骸為逆旅莊子平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可衣薪而棄諸溝壑亦可袞衣繡裳而納諸石椁亦可唯所遇焉死後數百年餘名豈足潤枯骨並列楊朱魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉列子互入薄情子高曰人生有四方之志豈鹿豕也哉而常群聚乎孔叢子史其生若浮兮其死若休淡乎若深淵之靜汜乎若不繫之舟不以生故自寶兮養空而遊德人無纍兮知命不憂細故慸葪兮何足以疑史賈生傳達人大觀物亡不可漢賈誼傳飄飄有凌雲氣游天地之間意西司馬相如傳孟敏荷甑墮地不顧而去郭林宗見而問其意對曰甑已破矣視之何益東漢郭太傳其於胸中曾不芥蒂西漢司馬相如傳飛鳥遺跡蟬蛻亡殼東漢王符論逍遙一世之上睥睨天地之間仲長統傳向長隱居不仕貧無資食好事者更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳後漢趙岐先自為壽藏圖季札子産晏嬰叔向四像居賓位又自圖其像居主位皆為讚頌敕其子曰我死之日墓中聚沙為床布簟白衣散髮其上覆以單被即日便下下訖便掩坎本傳劉伶放情肆志常以細宇宙齊萬物為心常乘鹿車攜一壺酒使人荷鍤隨之曰死便埋我晉書本傳畢卓常謂人曰得酒滿百斛船四時甘味置兩頭右手持酒杯左手持蟹螫拍浮酒船中便足了一生矣晉書本傳張翰縱任不拘因見秋風起乃思吳中菰菜蓴羹鱸魚鱠曰人生貴得適意何能羈宦數千里以要名爵乎遂命駕而歸晉本傳阮修性簡意有所思率爾褰裳至或無言欣然相對常步以百錢挂杖頭至酒店便酣暢晉書阮籍傲然獨得任情不羈當其得意忽忘形骸郤超卓犖不羈有曠世之度阮孚蓬髮飲酒不以世務嬰心常以金貂換酒並晉本傳張翰曰使我有身後名不如即時一柸酒時人貴其曠達曰人生貴適意耳富貴何為同上王徽之居山陰憶戴逵夜乘小船詣之造門不前而反曰乘興而來興盡而反何必見安道耶晉王徽之傳阮孚曰未知一生能著幾兩屐晉書陶潛為彭澤令在官八十餘日解印去縣未嘗有所造詣所之唯至田舍及廬山遊觀而已阮籍聞步兵廚營人善釀有貯酒三百斛乃求為校尉遺落世事並晉本傳顧榮素好琴張翰哭之上床鼓琴數曲撫琴而款曰顧彥先能復賞此不因又哭不吊喪主而去晉書不事崖撿宋書梁蕭恭曰勞神苦思竟不成名豈如臨清風對明月登山泛水肆意酣歌也南史梁本傳放情事外浮沉宴詠唐書貴賤苦樂更迭為之亦復何傷通鑑唐高祖語言之間何足介意通鑑唐太宗姚崇孫勗自為壽藏於萬安山崇塋之旁署兆曰寂居穴墳曰復真堂中剟上為臺曰化臺新唐書本傳傳記馬融才高博洽為通儒達生任性不拘儒者之節東觀漢紀淡臺子羽渡水子溺死將葬之滅明曰此命也吾豈與螻蟻為親戚魚鱉為仇讎遂以葬之博物志山巨源舉嵇康自代康曰譬猶禽鹿少見馴育則服教從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草高士傳集何所獨無荒草兮爾何懷乎故宇楚辭苟縱心於物外安知榮辱之所如張衡歸田賦丈夫志四海萬里猶比鄰何必同衾禱然後展殷勤曹植微身輕蟬翼潘安仁河陽詩人生如寄多憂何為善哉行身名竟誰辨圖史終磨滅謝靈運遊山以天地為一朝以萬期為須臾日月為扄牖八荒為庭衢行無轍跡居無室廬幕天席地縱意所如止則操卮執觚動則挈榼提壺劉伯倫頌陶子將辭逆旅之館永歸于故宅羞以嘉蔬薦以清酌陶潛自祭文釋域中之常戀暢超然之高情孫綽天台賦放浪形骸之外王羲之蘭亭序一隨往化滅安用空名揚謝靈運求一日之足當百年之溢晉孫綽蘭亭詩敘窅然遺天地乘化入無窮聖人以萬機為貴而我以天下為纍聖人以大寶為尊而我以天下為煩並陳子昂集互見所見不同乾坤水上萍榮貴如糞土是身如浮雲安可限南北此身醒復醉乘具即為家李白自稱酒中仙身世雙蓬鬢乾坤一草亭萬世一骸骨鄰家迎歌哭放神八極外俯仰俱蕭瑟萬古一死生胡為足名數並杜詩舉柸邀明月對影成三人月既不解飲影徒隨我身但得醉中趣勿為醒者傳達士遺天地並李太白起舞先醉長松摧飄然天外步豈肯區中囚與其譽於前孰若無毀於其後與其樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞奴視法度士互見藐視高士例須憐趜孽丈夫終莫生畦畛墻頭菊花好沽酒錢帛縱空衣可準安得長翮大翼妬雲生我身乘風振迅出六合絶浮塵死生哀樂兩相棄是非得失付間人江魚不池活野鳥難籠馴並韓文至仁以死生為傳舍以軒冕為儻來留名萬代不關身並劉賓客肺腑都無隔形骸兩不羈白侍郎上一句互入梟白悠悠天地內一死會相逢互入寬解安處即為鄉鄙斗筲之奚算哂挈瓶之固守身後堆金拄北斗不如生前一柸酒第一莫若禪第二莫若醉禪能泯人我醉可忘榮悴飄然世塵外鸞鳳如何追形骸屬日月老去何足驚栖心釋梵浪跡老莊汨市朝溺妻子非達也囚山林擯血屬亦非達也若有人與群動處一代間彼為彼我為我不自潔不自污不巢許不伊呂水其心雲其身浮沉消息無往而不自得者其惟達人乎互入無往不自得吾觀九品至一品其間氣味都相似紫綬朱衣青布衫顏色不同而已矣付命有厚薄委心信窮通通當為大鵬舉翅摩蒼穹窮則為鷦鷯一枝足自容苟能知此道身窮心不窮功名斗藪是灰塵其生也浮雲其死也委蛻來何緣去何緣吾性不動吾形屢遷巳焉巳焉吾安往而不可又何足厭戀乎其間伯倫每置隨身鍤元亮先為自祭文去有何顧戀住亦無憂撓名為錮身鎖利是焚身火形神兩是幻夢寐俱非實餘年自問將何用恐是人間賸長身相看萬里別同是一浮萍並白樂天古之達人以生為寄為夢以死為歸為魂偶然即泯為大空與不生同杜牧之理涉虛趣心潛潛一作階靜緣室為為一作惟生白人則思玄張說之文勢去未須悲時來何足喜白侍郎互入見有定力惟有不二門其間無夭壽同上富貴何如草頭露杜詩始終者萬物之大歸生死者百年之常分駱賓王存亡去就如九牛一毛長林豐草豈與官署門闌有異乎並王維集第宅非吾廬逆旅暫留止子孫非我有委蛻而巳矣有如蠶造繭又似花結子子結花暗凋繭成蠶老死天地為幕席富貴如沙泥白樂天集豈戀腰間綬如彼籠中禽韋應物互見省悟匪傷蜉蝣之夕不羡龜鶴之年得喪雙遺巢由與許史同歸寵辱兩存廊廟與山林齊致並駱賓王身外皆虛名酒中有全德李義山雲山不求吾是林泉不責吾非元次山但令終日酩酊醉酒不到劉憐墳上土李長吉文棄世酒中老謀身書外貧許用晦文眼豁浮生夢杜荀鶴得即高歌失即休多愁多恨亦悠悠今生有酒今生醉明日愁來明日愁羅隱集功名萬里外心事一柸中乍可狂歌草澤中寧堪作吏風塵下並高達夫朝衣在酒家自覺有家非並姚少監喜方外之皓曠嘆人間之窘束腹中書萬卷身外酒千柸並溫飛卿天地者萬物之逆旅光陰者百代之過客意遠超超然若萬里之鶴也飄飄然不知冠冕之在巳浩浩然不知天地之為大冥機慎道跡繫心曠鴻遡清風凌皓氣翱翔自得於冥冥之間循大小於天倪既齊椿菌忘壽夭於物化寧辨彭殤無春夏秋冬四時之行無得失是非去來之蹟得非我美失非我恥並唐文粹一朝同物化身與糞壤并畢竟金與銀何殊泥與塵貴賤與貧富高下雖有殊憂樂與利害彼此不相踰是以達人觀大化同一途並白侍郎不恨百年促翻悲萬劫長眼前讎敵都休問身外功名一任它雲到何方不是家萬齡龜菌等一死天地平並元微之高士不羈世頗將榮辱齊韋應物本朝食前方丈飽則止一瓢飲水樂可涯廬陵集金鐵有時而腐山嶽有時而摧凡有形之物即易壞老泉大患緣有身無身則無疾自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也東坡下視官爵如泥淤具廢何足吊萬世一俯仰名高不朽終安用有生何處不安生功名一破甑棄置何用顧已向間中作地仙更於酒裡得天全人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無一留者五更待漏靴滿霜不如三丈日高睡足比窗涼珠襦玉匣萬人祖送過北邙不如懸鶉百結獨坐負朝陽生前富貴死後文章百年瞬息萬世忙夷齊盜跖俱亡羊不如眼前一醉是非憂樂兩都忘愛惜微官將底用它年端好寫旌銘萬古一昏曉平生寓物不留物在家學得忘家禪逸韻謝邊幅升沈何足道等是蠻與觸回翔天壤間何必懷此都年來萬事足所缺惟一死何必擇所安滔滔天下足譬之煙雲之過眼百鳥之感耳豈不欣然接之去不復念也並東坡坐中客滿誰憂百榼之空身後名輕但覺一杯之重東坡濁醪有妙理賦雞蟲得失何須算鵬鷃逍遙各自知收拾乾坤付一壺世間無物直錙銖並臨川鄉閭等行路何處更為家後山已將世界等微塵空裡浮花夢裏身盛衰閲過君應笑寵辱年來我亦平何侯方丈庾郎三韭較豐約於夢寐卒同歸於一朽百年雖長要有終富死未必輸生窮並東坡
