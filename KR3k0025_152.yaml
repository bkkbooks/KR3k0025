body:
  text: 膚淺經記問之學不足以為人師記學記子鼯鼠五技而窮荀勸學末世窮年不免為陋儒同上史章句小儒破碎大道前漢夏侯勝傳傳記屢舉舊事不知所出史通知古而不知今謂之陸沉同上開元中馮先進入院校文選兼復注釋解蹲鴟云今之芋子即是著毛蘿蔔院中學士向外説之蕭嵩聞之拊掌大笑新唐語莊生有乘時鵲起之説故謝眺詩曰鵲起登吳臺有人作七夕詩云今夜吳臺鵲亦共往填河羅浮山記云望平地樹如薺有人詠樹詩云遙望長安薺又嘗見謂矜誕為夸毗高年為富有春秋皆耳學之過也顏氏家訓集末學膚受張平子東京賦經迹相祖述殆且百家孝經序史龔者善為文奏或有請龔奏以干人者龔為作之其人寫之忘自寫其名并寫龔名以進東漢葛龔傳試之日旁坐假手或借人外助多非其實新唐書選舉志舒元輿上書馬周張嘉貞代人作奏卒為名臣新唐書傳傳記王維有詩名然竊人詩句如行到水窮處坐看雲起時英華集中詩也漠漠水田飛白鷺陰陰夏木囀黃鸝李嘉祐詩也李肇國史補昔漢代有修奏記於其府者遂葛龔所以進之不知改易姓名時人為之語曰作奏雖工宜去葛龔見襲榮笑林又見史通漢桓帝時有人辟公府倩人作奏記邯鄲笑林互見不學不出胸臆非由機杼史通集相祖述杜甫沿襲傷剽盜韓薦士詩惟古於詞必己出降而不能乃剽賊後皆指前公相襲從漢迄今用一律韓愈樊紹樹墓志銘互見評文襲蹈前人言句韓文樊紹述墓志窺陳篇以盜竊進學解得無假之人耶韓滂墓志為文之士多漁獵前代戕賊文史抉其意抽其華置齒牙間遇事蜂起金聲玉耀誑聾瞽之人邀一時之聲雖終淪棄而其奪朱亂雅為害巳甚柳集答友人求文章書本朝假成式父之蜀以雉兔遍遺幕府倩人為書孔帖祥符中命詞臣撰日本國祥光記當直者學不優常以張君房代之既傳宣甚急張醉飲樊樓紫微大窘後錢楊二公作間忙令大年曰世上何人最號間司諫拂衣歸華山謂种希白曰世上何人最號忙紫微失卻張君房湘山野録經非法不言非道不行孝經子君子正而不它楊子問道非正不視非正不聽非正不言非正不行夫能正其視聽言行者昔吾先師之所畏也楊子淵騫史非聖哲之書不好西漢楊雄傳仲舒推明孔氏抑黜百家本傳遭漢承秦滅學之後六經離析下帷發憤潛心大業令後學者有所統一為群儒首董仲舒傳抑抑仲舒為世醇儒西漢敘傳孟軻以荀況楊雄為未醇唐書韓愈贊愈以六經之文為諸儒倡障隄末流返刓以朴剗偽以真其所得粹然一出於正同上集非三代兩漢之書不敢觀非聖人之志不敢存韓文學者尚知宗孔氏崇仁義貴王賤伯吐辭為經舉足為法孟氏醇乎醇者也並同上子奕之為數小數也不專心致志則不得也孟子告子上無冥冥之志者無昭昭之明無惛惛之事者無赫赫之功荀勸學自古及今未嘗有兩而能精者也解蔽行衢道者不至勸學篇夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之內一舉千萬里淮南子俶真訓孔子讀而儀秦行曰甚矣鳳鳴而鷙翰也楊子淵騫篇惜乎衣未成而轉為裳也修身史淳于髡博聞強記學無所主史本傳谷永於書泛為疏遠不能浹洽如劉向父子及楊雄也前漢涉獵書記不能為醇儒賈山傳謂若涉水獵獸歷覽之不專精也夏侯勝通尚書從子建師事勝建又從五經諸儒問與尚書相出入者牽引以次章句具文肴説勝非之曰建所謂章句小儒破碎大道前漢本朝多好竟無成不精安用夥坡詩經蒙以養正易蒙卦德潤身記大學澡身浴德記儒行心廣體胖大學君子之於學也藏焉修焉息焉遊焉學記子養心莫善於寡欲孟子盡心下持其志母暴其氣孟子公孫丑上我善養吾浩然之氣同上存其心養其性所以事天也盡心上虛室生白莊子人間出宇泰定者發乎天光庚桑楚疏淪而心澡雪而精神同上齊心服形列子黃帝禮義文理以養情荀子虛一而靜謂之清明同上史原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趍之若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也左傳序味道之腴西漢班固敘傳嚅嚌道真涵泳聖涯唐書文藝傳集澄心清魄儲精垂思楊雄甘泉賦修性以保神安心以全身嵇叔夜養生論神清氣茂允迪中和任彥升薦士表澡身玄淵宅心道祕顏延年釋漢詩漸漬德義之淵棲遲道藝之域選博奕論清虛靜泰少私寡欲嵇叔夜養生論沈浸醲郁含英咀華韓文行之乎仁義之塗遊之乎詩書之源無迷其塗無絶其源終吾身而已矣種學績文以蓄其有泓涵演迤日大以肆藍田記養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄並同上磨寨去圭角韓石鼎聯句公之德善灌注心耳劉賓客孕和含粹濯潤本根同上以貞和陶其性白樂天神全而正氣凝宇定而天光發李文饒集本朝信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末此古之人所以大過人東坡雜記知寶玉璠璵難得而易毀故篋櫝以養其全知楩楠豫章積歲而後成故封殖以待其長啓此老如松柏不受雪霜稿直從毫末中自養至合抱坡詩虛室清冷都是白靈臺瑩淨別生光邵堯夫經居上位而不驕在下位而不憂易乾卦瑟彼玉瓚黃流在中詩旱麓人不知而不慍不亦君子乎語學而不患人之不己知同上互見盡其在我令尹子文三仕為令尹無喜色三已之無慍色公冶長史薛廣德為人溫雅有醞藉前漢溫恭有醞藉亘榮傳權德輿醞藉風流自然可慕元和間為縉紳羽儀唐書本傳張九齡體約有醞藉帝後每用人必曰風度能若九齡不通鑑唐明皇開元二十八年本朝杜如晦以風流自命孔帖經剛健篤實輝光日新其德易大蓄卦君子以懲忿窒欲損卦間邪存其誠乾卦不遠之復以修身也損卦君子進德修業忠信所以進德也修辭立其誠所以居業也乾卦如琢如磨者自修也記大學率性之謂道中庸君子所不可及者其唯人之所不見乎修身則道立非禮不動所以修身也好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人並同上姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義樂記修身踐言謂之善行並同上敖不可長欲不可從志不可滿樂不可極同上曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎語學而言寡尤行寡悔為政敏於事而慎於言就有道而正焉學而志於道據於德依於仁遊於藝同上篤信好學守死善道泰伯克己復禮為仁顏淵非禮勿視非禮勿聽非禮勿言非禮勿動同上克伐怨欲不行焉憲問言思可道行思可樂孝經非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行同上子君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原孟子離婁下君子博學而日三省乎己則知明而行無過矣荀勸學見善修然必以自存也見不善愀然必以自省也善在身介然必以自好也不善在身災然必以自惡也修身夫能正其視聽言行者昔吾先師之所畏也楊淵騫集斧藻至德琢磨令範選詩序經枝葉未有害本實先撥詩大雅蕩傷其本枝從而亡記哀公子孟子曰牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無明蘖之生焉牛羊又從而牧之是以若彼濯濯也人見其濯濯也以為未嘗有材焉此豈山之性也哉雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不遠矣人見其禽獸也而以為未嘗有材焉者是豈人之情也哉故苟得其養無物不長苟失其養無物不消孟子告子上雖有天下易生之物也一日暴之十日寒之未有能生者也戕賊杞柳而以為杯棬今茅塞子之心矣盡心下其為人也多欲雖有存焉者寡矣同上豈愛身不若桐梓哉弗思甚也孟子木雖蠹無疾風不折墻雖隤無大雨不壞管子史茲心不爽而昏亂百度左昭元年
