body:
  text: 不具眼目經莫赤匪狐莫黑匪烏詩邶北風注狐赤烏黑莫能別也謀之既臧則具是違謀之不臧則具是依詩小旻謀臧不從不臧覆用同上聽言則對誦言如醉詩桑柔箋云見道聽之言則應荅之見誦詩書之言則冥臥如醉此宜無罪女反收之彼宜有罪女覆說之詩大雅瞻卬不親其所賢而信其所賤記緇衣端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦記樂記不知聲者不可與言音不知音者不可與言樂記學記子無是非之心非人也孟公孫丑上以盲為明以聾為聰以危為安以吉為凶荀賦篇螭龍為蝘蜓鴟梟為鳳皇同上非是是非謂之愚荀修身以徵為羽非絃之罪以甘為苦非味之過楚人有烹猴而召其鄰以為狗羹也而甘之後聞其猴也據地而吐之盡寫其食此未始知味者也邯鄲師有出新曲者托之李奇諸人皆爭學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寶而藏之以示人人以為石也因而棄之此未始知玉者也淮南子修務訓農夫得彤弓以驅烏南成得袞衣以負薪抱朴子史叔孫穆子好善而不能擇人左襄二十九年魯有子家羈弗能用也左昭五年人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國累世而不見者其所謂忠者不忠而所謂賢者不賢也史記屈原傳項羽有一范增而不能用前漢高紀魏文侯最為好音而謂子夏曰聽古樂則欲寐聞鄭衛之音則不知倦焉漢書禮樂志曲突徙薪亡恩澤燋頭爛額為上客霍光傳謂不智者為能謂智者為不能西漢鮑宣傳是末師而非往古西漢劉歆傳龢氏之璧韜於荊石隋侯之珠藏於蜯蛤歷世莫眡不知其將含景曜吐英精曠千載而流夜光也西漢班固敘傳互入淺量郡縣擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操功百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕官何以謹慎為勇猛而臨官故黥劓而髡鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳西漢貢禹傳廊廟之寶棄於溝渠東漢孟嘗傳互入失所聚歛整辦為賢能奉理循法為不治通監漢憲紀甘寧留依黃祖三年祖以凡人蓄之同上李膺謂鍾覲曰公何太無皂白魏志抵金玉於砂礫碎圭璧於泥塗東漢黃瓊傳劉元海匈奴人王渾屢言於武帝帝大悅之王濟渾子曰若任以東南之事吳會不足平也孔恂楊珧曰臣觀元海之才平吳之後恐其不復北渡也非我族類其心必異齊王攸曰不除元海恐并州不得久寧王渾曰元海長者渾為君王保之永興元年元海僣位晉書載記互入先見王恭以劉牢之為爪牙而但以部曲將遇之牢之負其才深懷恥恨通監晉安記將適千里殺騏驥而策蹇驢可悲之甚也通監陳文紀吳興章華好學善屬文朝臣以華素無閥閱競排詆之通監陳後主指儒素為古拙用詞賦為君子同上令封德彝舉賢久無所舉上詰之對曰非不盡心但於今未有奇才耳上曰君子用人如器各取所長正患己不能知安可誣一世之人通監唐太宗互見不可淺量張九齡曰祿山失律喪師於法不可不誅且臣觀其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之通監唐元宗棄蘇合之丸而取蜣蜋之轉五代史任圜傳傳記烏不為烏鵲不為鵲戰國策牛僧孺詣襄陽于頔求知頔以海客遇之牛怒而去後召客將問牛秀才發未曰已去立命小將齎書絹五百疋追之僧孺不啟封揖回幽閑鼓吹蒭蕘鄙說刊為竹帛正言史通時無識寶世缺知音珍瓴甋而賤璠璵策駑駘而捨騏驥燕石妄珍齊竽混吹並同上集為鳳皇而作鶉籠兮雖翕翅而不容楚辭互見區處失當非俊疑傑兮固庸態也漸藁本於洿瀆淹芳芷於腐井悲楚人之和氏獻寶玉以為石互見暗投方世俗之幽昏眩白黑之美惡委玉質於泥塗放山淵之龜玉相與貴夫礫石斥逐鴻鵠兮近習鴟梟斬伐橘柚兮列樹苦桃蓬艾親入御於床第兮棄捐藥芷與杜蘅西施媞媞而不得見兮嫫母醜女也勃肖而日侍媞媞儀容好勃肖猶媻姍閭謂娶好女為醜惡江離棄於窮巷蒺藜蔓乎東廂卻騏驥而不乘兮策駑駘而取路要裊奔亡兮騰駕橐駞鈆刀進御兮遙棄太阿拔搴玄芝兮列樹芋荷橘柚萎枯兮苦李旖旎甂甌登於明堂兮周鼎潛乎深淵潛周鼎於江淮兮爨土鬵於中宇鬵音尋釜也惡虞氏之簫韶兮好遺風之激楚淫泆之音也反表以為裏顛裳以為衣藏玟石於金匱捐瑜瑾於中庭卻騏驥以轉運騰驢驘以馳逐折芳芝與瓊華兮樹枳棘與薪柴掘拔也荃蕙與射干兮耘藜藿與蘘荷寶彼兮沙礫捐此兮夜光蟬翼為重千鈞為輕黃鍾毀棄瓦釜雷鳴並同上謂莫耶為鈍兮鈆刀為銛賈誼鵩賦譬如日之明於庭而就火之光於室也藝文類聚載賈誼書嗾群犬以逼騶虞縱炎火以焚瑾瑜劉賓客集乃知尋常鑒照影不照神孟東野秪今市駿憑毛色綠耳驊騶賺煞人杜荀鶴集縣宰不仁工部餓酒家無識翰林醒同上宋人不識玉而寶珉石陳子昂集楚人不識鳳重價求山雞李太白集和璞之真不能識齊竽之濫何由知白樂天聞善不慕與聾瞶同見善不敬與昏瞽同柳文必若土之出無不可者則東南之竹箭雖旁歧揉曲皆可以貫犀革北山之木雖離奇液暪空中立枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊墣皆可以備砥礪徐之糞壤皆可以封大社荊之茅皆可以縮酒九江之元龜皆可以卜泗濱之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊關轂而輠輪者皆可以為師儒盧之沽名者皆可以為大醫西子之里惡而矉者皆可以當侯王山西之冒詭輕俛沓貪而忍者皆可以鑿凶門制閫外山東之榷騃樸鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉柳文互入徇名去實喙以為羞兮焚棄稷黍犴獄不知避兮宮庭之不處除一作滔塗藉穢兮榮若繡黼攘折火烈兮娛娛笑舞讒巧之嘵嘵兮惑以為咸池便媚鞠恧兮美愈西施謂謨言之怪誣兮反寘瑱而遠違匿重痼以諱避兮進俞緩之不可為柳文西施作嫫毋美顏不如醜白樂天相馬失於瘦遂遺千里足元微之集張延賞選壻韋皋性高不拘小節公侮之不禮皋辭去後自金吾持節西川為延賞代公曰吾不識人從西門而出郭園詩曰當時甚訝張延賞不識韋皋是貴人雲溪友議互入壻類本朝古人相馬不相皮瘦馬雖瘦骨法奇世無伯樂良可悲千金市馬惟市肥歐公以李林甫楊國忠為周邵以安祿山哥舒翰為方虎司馬溫公唐論經豈弟君子無信讒言詩青蠅浸潤之譖膚受之愬不行焉可謂明也已矣語顏淵史智者除讒以自安也左昭二十七年上官桀怨霍光令人詐為燕王上書言光出都羽林道上稱䟆又擅調益莫府校尉光聞之不入上問大將軍安在桀對以燕王告其罪不敢入有詔召光光免冠上曰將軍冠朕知是書詐也將軍無罪將軍調校尉未十日燕王何以知之通監漢昭紀互入致察龐晃等短高熲於上上怒皆黜之因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明通監隋高祖互入取信唐太宗曰我終不以讒害良士新唐書尉遟敬德傳傳記魏文侯令樂羊將而攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語互入毀謗示人以意集杜兼在濠州有鍾離令盧某者宰相戚也而讒且諛日狀其僚之過愆以致于兼兼得之大怒罰令因擯令終不得面讒諛大息柳文杜兼對經采苓刺晉公也獻公好聽讒焉采苓采苓首陽之顛孔詩氏疏云讒言之起由數問小事於小人君子信讒如或醻之詩小弁亂之又生君子信讒詩巧言君子信盜亂是用暴詩巧言盜小人也無道並進讒巧敗國詩車舝維邇言是聽維邇言是爭詩小旻子與讒諂面諛之人居國欲治可得乎孟子讒嫉之人必好聞人惡劉子傷讒史楚令尹子常賄而信讒沈尹戌言於子常曰知者除讒以自安也今子愛讒以自危也左昭二十七年吳太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩今不見用常鞅鞅怨望吳王乃使使賜子胥屬鏤之劍以死史本傳互入讒譖屈原為憲令上官大夫見而欲奪之不與因讒之曰王使屈平為令眾莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平同上范睢日益親用事因乘間說王曰聞秦有太后穰侯不聞有王王於是廢太后逐穰侯通監秦紀互入讒譖項王為人意忌信讒通監漢高紀偏聽生姦前漢鄒陽書漢安昌王盛謂劉和曰陛下勿信讒夫之言以疑兄弟兄弟尚不可信他人誰足信哉通監晉懷紀魏徵曰君所以暗偏信也秦二世隱藏其身以信趙高天下潰叛而不得聞梁武信朱異侯景向闕而不得聞隋煬帝信虞世基賊徧天下而不得聞故曰君能兼聽則姦人不得壅蔽而下情通矣新唐書魏徵傳互入蒙蔽有言魏徵自錄前後諫辭以示起居郎褚遂良者上愈不悅乃罷叔玉尚主而踣所撰碑通監唐太紀互入有始無終集君含怒而待臣兮不清徹其然否楚辭經予以馭其幸奪以馭其貧禮太宰一張一弛文武之道也記雜記史許無刑而伐之服而舍之度德而處之量力而行之左隱十一年貳而執之伏而舍之德莫厚焉刑莫威焉左僖十五年帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度東漢史弼傳傳記諸葛亮至南中所在戰捷聞孟獲者為夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虛實故敗亮笑縱使更戰七擒七縱而亮猶遣獲獲止不去曰公天威也南人不復反矣漢晉春秋集舒則彌綸覆四海卷則消液入無形選成公綏賦舒之彌宇宙卷之不盈分陳子昂集舒之則雲蒸雨降以救大旱卷之則天倪道樞不盈一握獨孤及毗陵集淮蔡為亂天子伐之既伐而飢天子活之韓文經細人之愛人也以姑息記檀弓上子產猶眾人之母也能食之不能教也記仲尼燕居子子產聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政孟離婁下為政者每人而悅之日亦不足矣同上夫惜草茅者好禾穗惠盜賊者傷良民今緩刑罰行寬惠是利姦邪而害善人也此非所以為治也韓非子姑息敗德揚問明史項王見人言語嘔嘔有人疾病涕泣分食飲此所謂婦人之仁也通監高紀范增曰君王為人不忍通監漢高紀張良曰今釋弗擊此養虎自遺患也通監惠加姦軌而害及良善通監漢武紀恩不忍悔義不忍割東漢丁鴻傳衰世之君率多柔懦凡愚之佐唯知姑息是以權幸之臣有罪不坐豪猾之民犯法不誅仁恩所施止於目前奸宄得志紀綱不立通監漢質紀賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣惡人高會而誇咤老賊服臧而過門孝子見讎而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠奸軌者賊良民東漢王符傳一歲再赦好人喑啞凡養稂莠者傷禾稼惠奸宄者賊良民唐書刑法志知幾上書譏每歲一赦或一歲再赦小人之幸君子之不幸唐書劉知幾傳為天下之事而專事姑息其憂患可勝校乎通監唐肅宗時藩鎮各擁勁卒自署將吏不供貢賦朝廷專事姑息不能復制雖名藩臣羈縻而已通監唐代宗護養蘖萌以成禍根唐書藩鎮序欲賞一有功翻慮無功者反仄欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯通監唐德宗豢豐而犬豕轉獰肉飽而虎狼貪暴唐史昭宗贊
