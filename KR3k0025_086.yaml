body:
  text: 無遠慮經人無遠慮必有近憂語衛靈公弗慮胡獲書太甲下我躬不閲遑恤我後詩谷風反是不思亦已焉哉詩氓為猶不遠詩板子慮不先定不可以應卒鄧析子史子服惠伯曰君子有遠慮小人從邇飢寒之不恤誰遑其後左襄二十八穆叔語孟孝伯曰趙孟將死矣其語偷孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉左襄三十一年趙孟曰罪戾是懼焉能恤遠吾儕偷食朝不謀夕何其長也左昭元趙孟視蔭曰朝夕不相及誰能待五五稔出左昭元年凡人之智能見已然不能見將然通鑑玩細娛而不圖大患西漢賈誼傳夫規事建議不圖萬世之固而偷恃一朝之事者未可以經遠也西漢胸奴贊齊和士開曰一日取快可敵千年通鑑陳紀孔範曰諸將匹夫敵耳深識遠慮豈其能知通鑑陳後主經方叔元老克壯其猷詩采芑四十始仕方物出謀發慮記內則好謀而成語述而子兼才尚權右計左數楊重黎群策屈群力同上史裨諶謀於野則獲謀於邑則否左傳靜淵以有謀史記帝頊紀蘇秦恐秦之敗從念莫可使用於秦者乃使人微感張儀陰奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人辭去張儀曰賴君得顯方且報德何故去也舍人曰臣非知君知君乃蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣陰奉給君資盡蘇君之計謀今君已用請歸報張儀曰此在蘇君術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言史本傳范睢曰王不如遠交而近攻得寸則王之寸得尺則王之尺史本傳甘羅年少出一奇計聲稱後世亦戰國之策士也史本傳虞卿料事揣情為趙畫策何其工也史本傳蔡澤謂范睢曰君相秦計不下席謀不出廊廟坐制諸侯君之功極矣史蔡澤傳侯嬴曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之嘗聞公子為如姬報其父仇欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通鑑周紀六奇既用諸侯賓從漢呂之事平為本謀子房計謀圖難於易為大於細並太史公自序有上書告韓信反上問陳平平曰舉兵攻之是趣之戰也陛下第偽遊雲夢其勢必郊迎謁謁而禽之此特一力士之事耳帝以為然遊雲夢信果郊迎武士縳之載後車史陳平世家張良歸漢多病未嘗特將常為畫策通鑑漢高紀張良曰九江王布楚梟將與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可任大事當一面即欲捐之此三人則楚可破也同上轅生説漢王曰願王出武關項王必引兵南走王深壁令滎陽成皋間且得休使韓信等輯河北趙地王乃復走滎陽未晚如此則楚所備者多力分漢得休復與之戰破楚必矣項王聞漢王在宛果引兵南漢堅壁不與戰史記漢高紀陳平自初從至天下定從擊臧荼陳豨黥布凡六出奇計世莫得聞也韓信已破齊使人言曰不為假王恐不能安齊漢王欲攻之留侯曰不如因而立之使自為守乃遣張良操印綬立韓信為齊王史記漢高祖項羽急圍漢王漢王與酈食其謀撓楚權酈生曰陛下誠復立六國後此皆爭戴陛下德義願為臣妾漢王曰善趣刻印酈生未行張良從外來謁漢王具以酈生計告良良曰誰為陛下畫此計者臣請借箸以籌之且夫天下遊士離親戚棄墳墓去故舊從陛下者但日夜望咫尺之地今乃立六國後遊士各歸事其主從親戚反故舊陛下誰與取天下乎誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印西漢張良傳漢王與齊王信魏相國越期會擊楚信越不至張良曰楚兵且破二人未有分地其不至固宜今能取睢陽以北至榖城皆以王彭越從陳以東傳海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破也漢王從之於是韓信彭越皆引兵來通鑑漢高紀太尉復令酈寄與典客劉揭先説呂祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起呂祿以為酈況不欺己遂解印屬典客而以兵屬太尉通監漢高紀諸呂擅權陳平患之陸賈曰天下安危注意將相將相和調則士豫附君何不交歡太尉平用其計以五百金為絳侯壽太尉報亦如之兩人深相結諸呂謀益壞前漢陸賈傳陳湯為人沈勇有大慮多策謀西漢本傳經術文雅足以謀王體斷國論西漢薛宣傳互入文雅智略謀慮朝之淵藪東漢伏湛傳互入智愚援謀如湧泉東漢馬援傳勇鷙有智謀東漢吳漢傳儒者當謀謨廟堂後漢虞詡傳諸葛亮勸農講武作木牛流馬運米集斜谷口通鑑魏明紀元齡善謀新唐書杜如晦傳張柬之沈厚有謀能斷大事唐書本傳淄青李正己德宗時畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答崔祐甫為相曰正己誠詐不如因遣使勞其軍以所獻就賜將士若正己奉詔是陛下恩洽將士若不用彼自斂怨軍且亂人使諸蕃不以朝廷為重賄帝曰善正己慚服時議者韙其謀謨唐書本傳互入區處得當李德裕為兵部尚書初李宗閔與德裕有隙德裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能京兆尹杜悰宗閔黨也嘗詣宗閔見其有憂色曰得非以大戎乎宗閔曰然何以相救悰曰悰有一策可平宿憾恐公不能用宗閔曰何如悰曰德裕有文學而不由科第嘗用此為慊恨若使之知舉必喜矣宗閔默然有間曰更思其次悰曰不則用為御史大夫宗閔曰此則可矣悰乃詣德裕迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意即以大夫之命告之德裕驚喜泣下曰此大門官小子何足以當之寄謝重沓通鑑唐文宗互入解紛朱瑾遣家奴通候問於徐知訓知訓強欲私之瑾已不平知訓過別瑾瑾置酒自捧觴出寵妓使歌以所愛馬為壽知訓大喜瑾因延之中堂伏壯士於戶內出妻陶氏拜之知訓答拜瑾以笏自後擊之踣地呼壯士出斬之瑾先繫二悍馬於廡下將圖知訓密令人解縱之馬相蹄齧聲甚厲以是外人莫之聞通鑑後梁太祖集運籌合上意諫諍即見聽王褒聖主得賢臣頌咎繇謨虞箕子訪周言通帝王謀合聖神班固賓戲蕭曹魏邴謀謨乎其上選班固西征賦碩畫精通選賦深圖密慮衆莫能窺計如投水思若轉規選銘廟勝之算應變無窮同上經綸八方唐文粹本朝西夏趙德明言民飢求糧百萬斛真宗問王旦旦敕有司具粟百萬於京師詔德明來取德明得詔書慚曰朝廷有人王旦神道碑互入區處得常昔者諸呂用事陳平憂慮計無所出陸賈入見説之使交歡周勃平用其策卒得絳侯北軍之助以滅諸呂老泉淮陰侯見高帝於漢中論劉項短長畫取三秦如指掌及佐帝定天下漢中之言無一不酬者諸葛孔明草廬中與先主策孫權規取劉璋因蜀之言無資以爭天下終身不易其言此豈口傳耳授嘗試為之而僥幸其或成者哉東坡范文正公集敘史輕則寡謀左昭十二年入險而脫又不能謀能無敗乎左僖三十二年晉叔向曰無釁而動而謂無謀左昭十三年婢妾賤人感概而自殺非能勇也其畫無俚之至耳前漢欒布傳注言其計畫無所聊賴至於自殺發忿快志剡手以衝仇人之凶固為俱靡而已賈誼傳荀彧曰審配專而無謀通監漢獻帝紀荀攸郭嘉曰呂布勇而無謀同上子謹曰蕭繹懦而無謀通監梁簡文帝紀經化而裁之謂之變易繫辭子曰知變化之道者其知神之所為乎變通者趣時者也通其變使民不倦窮則變變則通上古穴居而野處後世聖人易之以宮室上古結繩而治後世聖人易之以書契巽以行權並同上子夏問曰三年之喪卒哭金革之事無辟也者禮歟孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也伯禽封於魯有徐戎作難喪卒哭而征之急王者之事也征之作柴訾記魯子問君子貞而不諒諒信也君子正道言不必八信語衛靈公吾豈匏瓜也哉焉能繫而不食語陽貨故當不義則子不可以不爭於父孝經互入子道動靜伸屈唯變所適易略例子大人者言不必信行不必果惟義所在孟子權者神聖之所資管子拔戟加乎首則十指不辭斷荀子強國知道者必達於理達理者必明於權莊秋水權者聖人獨見淮南子仲尼於南子所不欲見也於陽虎所不欲敬也見所不見敬所不敬揚五百注云欲詘身以行道通其變天下無弊法文中子史仲尼曰政寬則民慢慢則紏之以猛政猛則民殘殘則施之以寬寬則濟猛猛以濟寬政是以和左昭二十互入政事反經合道為權公羊傳權者反於經然後有善權之所設舍死亡無所設行權有道自貶損以行權不害人以行權谷梁桓十一年大夫無遂事出竟有可以安社稷利國家者則專之可也春秋公羊傳三孔子過蒲蒲人止孔子曰苟無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聽史孔子世家蘇秦兄弟二人其術長於權變史本傳蝮蟲蠚手則斬手蠚足則斬足何者為害於身也西漢田儋傳反古未可非史趙世家輒以使宜施行西漢蕭何傳韓信使人言於漢王齊反覆之國不為假王其勢不定漢王大怒張良陳平躡漢王之足附耳語曰漢方不利寧能禁之自王乎因立之史記權不可預設變不可先圖與時移遷應物變化設策之機也通監漢高紀帝有疾惡人臥禁中詔戶者無得入群臣群臣絳灌等莫敢入十餘日舞陽侯樊噲排闥直入大臣隨之通監漢惠紀失火之家豈暇先言丈人後救火乎前漢高五王傳互入事窮勢迫門班固曰孝文時天下以酈寄為賣友夫賣友者見利而忘義也若酈父為功臣而又執勢雖摧呂祿以安社稷誼存君親可也通監漢紀諸呂為從謀弱京師而勃反經合於權史太史公自序琴瑟不調盛者必解而更張之乃可鼓也為政不行甚者必變而更化之乃可理也西漢董仲舒傳東越相攻上使汲黯往視之不至至吳而還河內失火延燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發倉廩以振貧民臣請歸節伏矯制之罪通監漢武紀孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毀泉臺春秋譏之曰先祖為之而已毀之不如勿居而已以其無妨害於民也襄公作三軍公舍之君子大其復古以為不舍則有害於民也通鑑漢章帝法有玩於時事有乖於數者可改也後漢權以濟事後漢理亂者先權謀後漢馭委其轡馬駘其御四牡橫奔皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾請節奏哉東漢崔實傳軍事有專無請凡專命者謂有臨時之急耳通鑑漢獻紀潰癰雖痛勝於內食吳志魏文報孫權書王世充作難帝幸江都皇甫無逸留守斬關而走追騎且至無逸解金帶投之於地以緩追騎由是得免唐書行權不可以隱於私晉書姚崇曰事固有違經而合道反道而適權者唐書本傳姚崇善應變以成天下之務唐書贊崔郾治號以寬經月不笞一人及治鄂則嚴法峻誅一不貸或問其故曰陝土瘠而民勞吾撫之不暇猶恐其擾鄂土沃民剽雜以夷俗非用威莫能治政所以貴知變者也新唐書本傳互入政事柳仲郢為京兆政嚴明後出河南以寬惠為政或曰不類答曰輦轂之下先彈壓郡縣之治本惠養唐書互入政事參虛實揣輕重存乎權唐書陸贄傳杜黃裳達權變有王佐大略唐書本傳偽蜀王衍既降唐莊宗詔云王衍一行並宜殺戮張居翰為樞密使覆視詔乃揩去行字改為家字及衍就刑止族近屬從行者千餘人皆免五代史互入救援傳記良商不與人爭買賣之賈而謹司時時賤而買雖貴已賤時貴而賣雖賤已貴戰國策人有置係蹄者而得虎虎怒決蹯而去虎之情非不愛其蹯也然而不以環寸之蹯而害七尺之軀者權也戰國策互入舍小取大集繫蹄在足則猛虎絶其蹯蝮蛇在手則壯士斷其節陳琳檄聖人不凝滯於物智士必推移於時駱賓王蝮蛇一螫手壯士疾解腕陸龜蒙昔晉侯報楚之功避子玉於三舍捨秦之惠覆孟明於三崤安國庇民大義斯在李文饒集本朝趙閲道知越州時兩浙旱蝗米價踴貴諸州皆立賞禁人增米價閲道獨榜衢路令有米者任增價糶之於是諸州米商輻湊詣越米價更賤聞見録互入反用其鋒朱敬則曰拯溺不規行療飢非鼎食續世説使聖人無權則無以成天下之務老泉惟聖達節豈復行曾閔之難以民為心則當法舜禹之大東坡慰皇太后上仙表楚公子微服出亡而門者難之其僕操箠而罵曰隸也不力門者出之事有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可東坡莊子祠堂記要絰服事出於孔門墨縗從政見於魯史東坡
