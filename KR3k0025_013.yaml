body:
  text: 好惡不同子周文嗜不美之葅不以易太牢之滋味魏明好椎鑿之聲不以易絲竹之和音抱朴子辨問篇集人各有好尚蘭𦶜蓀蕙之芳眾人所好而海畔有逐臭之夫咸池六莖之發眾人之所共樂而墨翟有非之之論曹子建書居歡惜夜短在戚怨宵長選情詩互見心隨事移眾心愛金玉眾口愛酒肉何此溪上翁飲瓢亦已足白樂天昔齊王好竽有求仕於齊者操瑟而往三年不得入叱曰吾鼓瑟能使鬼神客罵之曰王好竽而子鼓瑟雖工如王不好何韓文荅陳商書經近而不相得者志各有所存也易略例作德心逸日休作偽心勞日拙書周官吉人為善惟日不足凶人為不善亦惟日不足泰誓中君子居易以俟命小人行險以徼幸記中庸君子中庸小人反中庸同上寬柔以教不報無道南方之強也衽金革死而不厭北方之強也並中庸仁者以財發身不仁者以身發財大學德成而上藝成而下樂記子曰君子喻於義小人喻於利語里仁子曰君子懷德小人懷土君子懷刑小人懷惠同上古之學者為己今之學者為人憲問道不同不相為謀衛靈公並語子伯夷死名於首陽之下盜跖死利於東陵之上莊子矢人惟恐不傷人函人惟恐傷人巫匠亦然孟子為富不仁矣為仁不富矣孟滕文公上雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者蹠之徒也盡心上並孟子眾人重利廉士重名賢士尚志莊子刻意篇為堯舜則常安榮為桀跖則常危辱荀子榮辱篇先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人材愨者常安利蕩悍者常危害安利者常樂易危害者常憂險樂易者常壽長憂險者常夭折君子道其常小人道其怪並同上螾無爪牙之利筋骨之彊上食埃土下飲黃泉用心一也蟹六跪而二敖非蛇蟺之穴無所寄託者用心躁也勸學篇互見智不若愚誠神生信夸誕生惑不苟篇君子慕其在己者而不慕其在天者小人錯其在己者而慕其在天者天道篇並荀子春女思秋士悲淮南子漁者走淵木者走山今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戇矣從伯夷視管晏則貪矣趨舍相非嗜慾相反而各樂其務將誰使正之齊俗訓並淮南子廉者常樂無求貪者常憂不足文中子兒童之所喜者迺耆耋之所非耳目之所娛者迺心慮之所疾萬倉子市井相與言則以財與利先生相與言則以仁與義楊子史子罕曰我以不貪為寶爾以玉為寶左襄十五年爭名者於朝爭利者於市戰國策叔孫通徵魯三十餘生魯有兩生不肯行前漢叔孫通傳陳遵常謂張竦足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優耶竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也前漢本傳山林之士往而不能反朝廷之士入而不能出前王吉贊夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也通監漢武帝紀孔奮為武都郡丞從竇融入朝諸守令財貨連轂彌竟川澤唯奮無資單車就路通監漢光武紀務廣地者荒務廣德者強有其有者安貪人有者殘同上韋彪曰忠孝之人持心近厚鍜鍊之吏持心近薄東漢本傳貴清淨者以席上為腐議束名實者以柱下為誕辭同上王符傳郄愔遺桓溫牋欲共獎王室請督所部出河上愔子超為溫參軍取視寸寸毀裂乃更作愔牋自陳非將帥才不堪軍旅老病乞閑地自養勸溫并領已所統通監晉海西公紀或與世同塵隨波瀾而俱逝或違時矯俗望江湖而獨往北史隱逸新序互入各行其志馬樞曰貴爵位者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言翫清虛則糠粃席上之說陳本傳傳記孔子曰丘死之後商也日益賜也日損商也好與賢己者處賜也好說不如己者說苑雜言集務先讓天下商賈競刀錐陳子昂集廉者憎貪信者疾偽智不為愚者謀勇不為怯者死趨向之反也同上鵰鶚乘時去驊騮顧主鳴杜詩虛白高人靜喧卑俗累牽同上少年樂新知衰暮思故友韓文互入其勢使然沿河而下苟不止雖有疾遲必至於海如不得其道雖疾不止終莫幸而至焉同上窮居而野處升高而望遠坐茂樹以終日濯清泉而自潔採於山美可茹釣於水鮮可食起居無時惟適之安伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅處污穢而不羞觸刑辟而誅戮僥倖於萬一老死而後止者其於為人賢不肖何如也送李愿新序君作出山雲我為入籠鶴白樂天巢許終身隱蕭曹到老忙鯨吞鮫鬭成波血深澗游魚樂不知獸樂在山谷魚樂在陂池虫樂在深草鳥樂在高枝並同上互見得所依託花開蝶滿枝花謝蝶還飛惟有舊巢燕主人貧亦歸唐于瀆詩公孫洪為丞相開東閣以延賢及公孫賀劉屈氂時壞為馬廄白帖惡木人皆息貪泉我獨醒溫飛卿夸者死權烈士徇名貪夫溺財同上還如舟與車奔走各異程姚少監彼則趑趄於卿士之門我則婆娑於聖賢之域彼則巾車於名利之肆我則冠屨於文史之囿皇甫湜君登青雲去予望青山歸孟浩然互見自嘆騏驥思北首鷓鴣願南飛孟東野智者尚謀愚者所不聽勇者徇死怯者所不從陸贄奏議雲龍井蛙勢不相見劉賓客貪夫蟻旋磨冷官魚上竿冷齋夜話小人之愛君取快於一時非如忠臣之愛君以安社稷為悅者也欒城集隔壁聞釵釧聲而欲心動安得不謂破戒金銀合沓朱紫駢闐而心不起安得謂之破戒徐君鬱鬱澗底松陳君落落堂上棟澗深松茂不遭伐堂毀棟折蕩其躬二人出處勢不合譬如日月行西東並同上史季文子妾不衣帛魯人以為美公孫弘身服布被汲黯譏其多詐事實未殊而毀譽別議東漢王良傳裴旻守北平多虎旻善射一日得虎三十一休山下有老父曰此彪也稍北有真虎將軍遇之且敗旻不信怒馬趨之見虎出林薄中小而猛據地大吼旻馬辟易弓矢皆墮自是不復射新唐書本朝非德之威雖猛而人不畏非德之明雖察而人不服公修德於几席之上而其威折衝於萬里之外退居於家而人望之如在廊廟可不謂德威乎東坡德威堂銘公謂文潞公也經仁者見之謂之仁智者見之謂之智易係辭知我者謂我心憂不知我者謂我何求詩黍離維此哲人謂我劬勞維彼愚人謂我宣驕鴻鴈昔者顏叔子嘗獨處于室鄰之嫠婦又獨處于室夜暴風雨至室壞婦人趨而至顏叔子納之而使執燭放乎旦而薰盡縮屋而繼之自以為辟嫌之不審矣若其審者宜若魯人有男子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壞婦人趨而託之閉戶而不納毛詩注子知我者其惟春秋乎罪我者其惟春秋乎孟子滕文上自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊大宗師古之所謂志者非軒冕之謂也今之所謂志者軒冕之謂也繕性篇子路拯溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善淮南子齊俗訓老子曰治大國若烹小鮮為寬裕者曰無數撓為刻削者曰致其鹹酸而已矣同上史王孫圍聘於晉趙簡子問曰楚之白珩為寶幾何曰楚之所寶者曰觀射父能作訓辭又左史倚相能道訓典此楚國之寶也若夫白珩先生之玩也何寶之為國語楚語互見敏於應對梁王曰寡人有徑寸之珠照車前後十二乘者十枚王亦有寶乎齊威曰寡人所以為寶與王異有四臣擅子種首盻子黔夫將以照千里豈特十二乘哉梁王慚史齊世家賢者誠重其死奴妾賤人感概而自殺前欒布傳陳登見呂布曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去通監東漢孫寶曰周公上聖召公大賢猶不相說前漢孫寶傳太子見帝勤勞不怠承間諫曰願頤愛精神優游自寧帝曰我自樂此不為疲也通監漢光武監軍之計在於持牢而非見時知幾之變也通監漢獻帝謝太傅庭中夜坐月色無玷歎以為佳謝景重率爾曰意謂不如微雲點綴太傅曰卿居心不淨乃欲滓穢太清晉書謝萬曰三郄諂於道二何佞於佛同上束名實則芻芥柱下之言翫清虛則糠粃席上之說陳書馬摳傳崔群曰人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡專任李林甫此理亂之所分也唐書周公擁孺子而召公疑之周公之心召公則不知之新唐書新羅贊史弘肇曰安定國家在長槍大劍安用毛錐王章曰無毛錐財賦何從可出通監周太祖紀集武王周公聖人也率天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也韓文伯夷頌太史公父名談故史記無談字季布傳改趙談作趙同范曄父名泰故後漢無泰字郭泰鄭泰皆作太字李翱父名楚金故為文皆以今為茲韓愈為李賀作諱辨持言在不稱徵之說故愈父仲卿未嘗諱焉曹志植之子泰議云幹植不強不諱植字三國志猶不諱其君名云功以權成是斥孫權之名也孔氏雜說本朝老者覺時速閑人知日長日月本無情人心有閑忙歐公集陳摶謂錢若水有仙骨麻衣道者曰此人但能於急流中勇退耳東坡集人皆種榆柳坐待十畝陰我獨種松柏守此一寸心東坡詩歲換兒童喜還傷老大心臨川集歲熟田家樂秋風客自悲同上白樂天詩曰無事日月長不羈天地闊此達者之詞也孟東野詩曰出門即有礙誰謂天地寬此褊狹者之詞也青箱雜記朝廷初行新法康節門生故吏仕官四方者皆欲投劾而歸以書問康節荅曰正賢者所當盡力之時新法固嚴能寬一分則民受一分之賜投劾而去何益言行錄伊川與君實語終日無一句相合鳴道集經其維哲人告之話言順德之行其維愚人覆謂我僣詩抑子百年之木破為犧尊青黃而文之其斷在溝中比犧尊於溝中之斷則美惡有間矣莊天地木以不材終其天年鴈以不材死莊山木宋有富人天雨墻壞其子曰不築必將有盜其鄰人之父亦云暮而果大亡其財其家甚智其子而疑鄰人之父韓非子說難車輕而馬肥雖中工可以致遠載重而馬羸雖造父不能以追急淮南子拘囚圄者以日為脩當市死者以日為短榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂佐祭者得嘗救鬭者得傷並同上史豫讓嘗事范中行氏而無所知名去而事智伯智伯甚尊寵之史本傳明月之珠夜光之璧以闇投人於道路人無不按劍相盻者無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也鄒陽傳昔伍子胥說聽於闔閭而吳王遠跡至郢夫差乃賜之鴟夷而浮之江樂毅傳李斯少為吏見吏舍鼠食不潔人犬數驚之入倉見鼠食粟居廡下無人犬之憂乃歎曰人賢不肖如鼠在所自處耳本傳並史當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫前漢揚雄傳或解縛而相或釋褐而傅或倚夷門而笑或橫江潭而漁或七十說而不遇或立談而封侯世亂則聖人馳騖而不足世治則庸人高枕而有餘並同上百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳前漢韓信傳故無因而至前雖出隨珠和璧祗結怨而不見德有人先游則枯木朽株樹功而不忘鄒陽傳抗之則在青雲之上抑之則在深泉之下用之則為虎不用則為鼠東方朔傳譬草木之殖山林鳥魚之毓川澤得氣者蕃滋失時者零落班孟堅敘傳並前漢天子擢弘對為第一轅固以老罷歸通監潘岳美姿儀常出婦人遇之者皆連手縈繞投之以菓時張載甚醜每行小兒以瓦石投之委頓而反晉書潘岳傳見事物相形非蘭怨而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也同上陸機等贊美玉蘊於碔砆凡人視之藐焉良工砥之然後知其為和寶也精鍊藏於鑛璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳互見識者難欺齊范縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上或關籬墻落糞溷之中通監齊紀太宗嘗謂魏證曰玉雖有美質在於石間不值良工琢磨與瓦礫不別若遇良工即為萬代之寶唐書文本才猷世南鯁諤百藥之持論思廉之邃雅德棻之辭章皆治世之華采而淟汨於隋光明於唐同上姚濤等贊傳記綿綿之葛在於曠野良工得之以為絺紵良工不得枯死於野說苑劉知幾始以文章得譽晚談史傳由是減價唐書本傳禹門大魚登者化為龍不登者點額曝腮三秦記蓽門寒族百代無聞騂角挺生一朝暴貴史通集未遇伯樂則千歲無一驥時值龍顏則當年控三傑選三國名臣贊昔如韝上鷹今似檻中猿選鮑昭穆生謝病以免楚難鄒陽北游而不同吳禍選書張良游於群雄其言如水投石莫之受也遭漢祖其言如以石投水莫之逆也選李蕭遠運命論昔如縱壑魚今似喪家狗杜工部時清疑武略世亂跼文場同上百丈澗底死寸莖山上春白侍郎君為得風鵬我為失水鯨朝為拂雲花暮為委地樵互見光焰不長門我隨鴛鷺入煙雲君同鸞鳳棲荊棘時之來也為雲龍為風鵬勃然突然陳力以出時之不來為霧豹為冥鴻寂兮寥兮奉身而退互見出處兩得門並同上屠龍之伎非曰不偉時無所用莫若屠狶作俑之工非曰可珍時有所用貴於斲輪劉賓客同涉于川其時在風沿者之吉泝者之凶同蓺于野其時在澤伊穜之利乃穋之厄同上互入事無全美同時六學士五相一漁翁唐文粹瓦礫暫拂拭光掩連城珍脣吻恣談鑠黃金成灰塵昔時薑桂早得因地而生今茲桃李反以無言受棄並同上風雲有路皆燒尾波浪無程盡曝腮許用晦文處困道難固乘時恩易醻同上逢霜作樸樕得氣為春柳李長吉文遭時者雖小善必達不遭時者累善無所容韓文鳲鳩平均歌於國風從事獨賢雅以怨刺昔殷之高宗得良弼於宵寐孰左右者為之先信天同而神比及時運之未來或兩求而莫敢雖家到而戶曉祗以招尤而速累並同上未遇孫陽鹽車無絕塵之跡時逢和氏荊山有連城之珍駱賓王本朝貧賤羞妻子富貴樂鄉闞老泉文井邊蠹李螬苦肥枝頭飲露蟬常飢山谷詩伯勞饒舌世不問鸚鵡纔言便關鎖欒城集
