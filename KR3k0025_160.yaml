body:
  text: 為世輕重經若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨書説命上若作酒醴爾惟麴蘖若作和羹爾惟鹽梅同上道洽政治澤潤生民四夷左袵罔不咸賴書畢命君子所依小人所腓辟也小雅四牡樂只君子邦家之基樂只君子邦家之光詩南山有臺四方是維天子是毗詩節南山君子如怒亂庶遄沮君子如祉亂庶遄已詩巧言赫赫師尹民具爾瞻詩節南山行歸於周萬民所望詩都人士綱紀四方詩棫朴為周之翰詩嵩高夫子之得邦家也所謂立之斯立道之斯行綏之斯來動之斯知其生也榮其死也哀語子虞不用百里奚而亡秦穆公用之而霸孟子一怒而諸侯懼安居而天下息孟子滕文公下喜而天下和之怒而暴亂畏之荀樂論史季孫欲以田賦使冉有訪諸仲尼曰子為國老待子而行若之何子之不言也左哀十一年孔子布衣傳十餘世學者宗之自天子王侯中國言六藝者折衷於夫子可謂至聖矣史孔子世家後世藏孔子衣冠琴書至于漢二百餘年不絶高帝過魯以太牢祠焉諸侯卿相至常先謁然後從政同上子産仁人鄭所以存者子産也史鄭世家毛先生遂一至楚使趙重於九鼎大呂史記平原君傳互見因人而重夷吾所居國重史齊世家魯仲連不肯帝秦而秦將聞之卻五十里史本傳子貢一出存魯亂齊破吳強晉而霸越史記孔子世家楚春申君魏信陵君救趙秦軍為之卻三十里史平原傳天下騷動宰相得之若得一敵國云史遊俠劇孟傳所在國重所去國輕戰國策諸侯以公子賢多客不敢加兵謀魏十餘年史魏無忌傳為國柱石漢霍光傳為一代之柱臣漢蕭何傳李將軍死天下知與不知皆為流涕前漢李廣傳魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡百萬之衆不如一賢漢孟軻雖連音輦蹇猶為萬乘師漢楊雄傳王成黃霸朱邑龔遂鄭弘召信臣等所居民富所去見思生有榮號死見奉祀西漢天下想聞其風采西漢霍光傳漢高祖任蕭何於關中無西顧之憂後漢冠恂傳自天子及大臣皆賴恃之東漢袁安傳陳實在鄉閭平心率物其有爭訟輒求判正曉譬曲直退無怨者至乃嘆曰寧為刑罰所加不為陳君所短東漢本傳互入心服門种皓為益州剌史得百姓心後胸奴寇并涼二州桓帝擢為度遼將軍由是羌胡龜茲莎車烏孫等皆來順服至司馬薨并涼邊人咸為發哀胸奴聞之舉國傷惜單于每入朝賀望見墳墓輒哭泣祭祀後漢本傳互入政事部遺愛吳公隱若一敵國東漢吳漢傳容貌堂堂國之光輝智慮謀略朝之淵藪東漢伏湛傳陳實卒海內赴弔者三萬餘人制衰麻者以百數通鑑東漢孔融云鄭君里門四方所由觀禮其廣令容高車結駟名為通德門後漢鄭康成也天下安注意相天下危注意將將相和則士豫附天下雖有變權不分也為社稷計在兩君掌握通鑑漢高后士者國之重器得士則重失士則輕通鑑漢成紀高熲為隋相公平識治體隋之興亡係熲之存沒通鑑唐太宗牛僧孺楊於陵裴垍盧坦此數人皆今之人望天下視其進退以卜時之否臧者也通鑑唐憲宗鄭注求為鳳翔節度使請禮部員外郎韋溫為副使韋溫不可或曰拒之必為患溫曰擇禍莫若輕拒之止於遠貶從之有不測之禍卒辭通鑑唐文宗紀互入遠慮王衍口中雌黃朝野謂之一世龍門晉書本傳深源不起當如蒼生何晉書殷浩傳桓彝初過江見朝廷微弱憂懼不樂往見王導極談世事還謂周顗曰向見管夷吾無復憂矣晉書王導傳時江左草創綱維未舉溫嶠殊以為憂及見王導共談歡然曰江左自有管夷吾復何慮晉溫嶠傳殷浩弱冠有美名三府辟不就時擬之管葛王濛謝尚伺其出處以卜江左興亡晉書本傳為儉歲之粱稷寒年之纖纊齊劉紆傳北齊主登童子寺望并州城曰此是何等城或對曰此是金城湯池天府之國齊主曰我謂唐雍是金城此非金城也北史太宗授李緯為兵部尚書房元齡在京城會有自京師來者太宗問元齡聞緯拜尚書如何曰但説緯好鬚別更無它語遽改緯洛州剌史其為當世準的如此唐書裴度威譽德業侔於郭子儀出入中外以身繫國之安危為時之輕重者二十年凡命將相無賢不肖皆推度為首唐書以身為天下安危者二十年唐郭子儀傳唐李栖筠初封贊皇縣子喜獎善而樂人攻己之短為天下士歸重不敢有所斥稱贊皇公云本傳開元後天下稱曰曲江公而不名唐張元齡傳河北恃公為金城唐顏真卿傳元德秀天下高其行不名謂之魯山唐書卓行本傳狄公之賢北斗以南一人而已唐狄仁傑傳裴度名震四夷使外國者其君長必問度年今幾狀貌孰似天子用否其威譽德業比郭汾陽而用不用常為天下重輕天下莫不思其風烈唐書本傳唐太宗手詔曰世南當代名臣人倫準的今其云亡石渠東觀中無復人矣唐虞世南傳杜如晦與房元齡共管朝政天下浩然歸重唐書柳芳稱魏證死知與不知莫不恨惜唐魏證贊楊綰薨肅宗詔群臣曰天不使朕致太平何奪綰之速耶唐書本傳唐肅宗時武臣無法度大將管崇嗣背闕大笑李勉劾不恭肅宗曰吾有勉乃知朝廷之尊唐書李揆為盧杞所惡使蕃酋長曰聞唐有第一人李揆公是否唐書顏真卿傳裴度在朝兩河諸侯忠者懷強者畏今居東人人失望唐本傳王毛仲有寵於元宗百官附之所不能致者宋璟一人毛仲有婚上謂宰相宜與達官悉詣其第既而日中客未敢舉筋待璟久之方至飲不盡卮遽稱腹痛而歸通鑑互見端介門李戡隱陽羡里民有爭不之官而詣戡以辨唐書陽城隱中條山里閭有爭訟不詣官而詣城決之唐書蘇源明曰吾不幸生衰世所不恥者識元紫芝也唐書傳記夫山萬人之所觀仰育群物而不倦材用生焉寶藏植焉飛禽萃焉走獸伏焉韓詩外傳集賢哲國之柱棟人之羽翼亙談新論名蓋群后是謂宗臣選陸士衡頌謝公還欲臥誰與濟蒼生駱賓王今日朝廷須汲黯杜詩北辰當宇宙南嶽據江湖同上劇孟七國畏杜詩名成身退猶係人望駱賓王後進歸之承望聲光一言許可必自矜重杜牧之大國梁棟中朝羽儀劉長卿萬里長城九重安枕司空表聖文一柱中天而獨立同上倚為長城永固中夏白傳集倚為長城捨一日而不可同上有賢大國豐無子一家貧男兒富邦家豈為榮其身王建詩青山無逸人每覺大國貧張文昌若作進退爾惟旗鼓若斷首尾爾惟常蛇若戮鯨鯢爾惟干將若拯沈溺爾惟巨艦唐文粹本朝范仲淹與韓琦必欲收復靈夏邊上謠曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽五朝言行録四海以公之用舍一時為國之安危臨川徂徠魯東山而先生非隱者也其仕嘗位於朝矣然魯人不稱其官而稱其德以為徂徠魯之望先生魯人之所尊名之曰徂徠先生者魯人之志也歐公撰石守道墓志凡徇私者皆指笑之曰你一個包家見貪汙者曰你一個司馬家呂氏家孰記戎狄尤畏韓魏公名凡使契丹及來使者必問韓魏公安否行狀熙寧元豐間士大夫論天下賢者必曰君實景仁東坡撰范鎮墓志士如稻苗待公秧臨流不渡公為航後山贈二蘇詩溫公沒京師民畫其像刻印鬻之家置一本飲食必祝焉四方皆遣人購之京師時畫工有致富者東坡撰溫公行狀遼人夏人遣使入朝與吾使至虜中者虜必問公起居司馬溫公神道碑施之事實則可以慘舒四方之人見之筆墨則可以照耀萬世之下欒城集魏野謂寇萊公曰盛剌不復還留為山家之寶唐宋遺史如日出時眠者皆作如雷震時蟄者皆動東坡集吏民瞻師尹之儀刑蠻夷識漢相之風采東坡集凡今中外執事膂力之畢陳視吾一二老臣進退以為節卿若無事而引去人將相顧而自疑東坡集朕惟朝廷之盛衰常以輔相為輕重若根本強固則精神折衝故蒍呂臣奉己而不在民則晉文無復憂色汲長孺直諫而守死節則淮南為之寢謀朕思得其人付之以政使天下聞風而心服則人主無為而日尊東坡集國以得人而強如猛獸之衛藜藿以積賢為寶如珠玉之茂山川湛然無營物自蒙利故崔公發議則淄青慚服知朝廷之有人蜀使抗詞則孫權回顧歎張昭之不在同上神宗崩公赴闕臨衛士見公入皆以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之東坡集司馬溫公神道碑楊綰當朝天下喜山谷詩兒童誦君實走卒知司馬東坡集范仲淹知開封京師謠言曰朝廷無憂有范君京師無事有希文國史本傳范仲淹卒天下想聞風采賢士大夫以不獲出其門為恥下至里巷及夷狄皆知其名國史本傳天不生仲尼萬古長如夜唐庚集載蜀道館舍壁間詩經焉能為有焉能為亡孔曰言無所輕重語子張子過我門而不入我室我不憾焉者其惟卿原乎孟子盡心下嬰兒傷人而被傷者不以為怨侏儒嘲人而獲嘲者不以為辱劉子史漢高論功行封欲以曹參為第一鄂千秋曰雖無曹參等百數何缺於漢西漢蕭何傳譬如禽獸得其善言不足喜惡言不足怒也西漢胸奴傳居前不能令人輊居後不能令人軒後漢馬援傳不知貶毀之於己猶蚊虻之一過也後漢孔融傳傳記鴻鵠一舉千里所恃六翮耳背上之毛腹下之毳益一把飛不為加高損一把飛不為加下韓詩外傳互入不可損益門牛之一毛生既無益死亦何損魏董尋云集生無益於事死無損於數選自試表生無益於一毛死何異於腐鼠王建互見委棄一縷鴻毛天地中白侍郎經折其右肱雖左股在豈足用乎易略例子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為語子路子庶羞百品雜進於盤几而咽不下無為於貴饌矣抱璧而徒乞無為於貴寶矣子華子堂溪空見韓昭侯曰今有白玉卮而無當君渴將何以飲君曰以瓦卮韓非子金弧玉弦無激矢之能抱朴子土飯瓦胾不療於飢同上玉屑盈匣不可琢為圭璋銼絲滿篋不可織為綺綬雖多亦奚以為也劉子史趙括徒能讀其父書傳不知合變也史記趙奢傳吳伐齊子胥曰得志於齊猶獲石田無所用史記吳世家兵不完利與空手同甲不堅密與袒禓同弩不可以及遠與短兵同射不能中與無矢同中不能入與無鏃同西漢朝錯傳夫全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之陝死士盈朝而不能還厲王之西也西漢鄒陽傳李善淹貫古今不能綴辭故人號書簏唐書亙溫曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致遠曾不若一羸牸通鑑晉哀紀矢雖注不射刀雖舉不擊矟雖利不剌通鑑梁高祖傳迪好廣讀書而不解其義劉柳曰卿讀書而無所解可謂書簏矣晉書劉柳傳傳記無刃之兵不毒之蟲無能為也通典駢指在手必假力於千鈞附贅居身非廣形於七尺劉知幾史通鏤冰為璧不可得而用也畫地為餅不可得而食也史通陶犬無守夜之益瓦雞無司晨之警韓詩外傳集劍鏤七星非有司天之用縑啚五嶽寧識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電梁便堅吾讓表干將之刃未磨瓜匏不能傷篦簬之機不發魯縞不能穿王充論衡薄戍綿冪無異蛛蝥之網弱卒細甲無異螳蜋之衛左太沖魏賦玉卮無當去聲底也雖寶非用張平子南都賦互見因小失大門有聲之玉無纇之珠不置於佩服掌握之間皆非其所有白傳集本朝使天而雨珠寒者不得以為襦使天而雨玉飢者不得以為粟東坡喜雨亭記
