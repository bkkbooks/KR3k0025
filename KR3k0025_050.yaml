body:
  text: 務實經不作無益害有益功乃成書旅獒恥名之浮於行也記表記非知之艱行之惟艱書說命中欲行之浮於名也記表記脩身踐言記曲禮上有其言而無其行君子恥之記雜記喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也記檀弓上君子與其有諾責也寧有已怨記表記注云已謂不許也言諾而不與其怨大於不許子曰素隱行怪後世有述焉吾弗為之矣記中庸君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德恥有其德而無其行記表記君子不以口譽人則民作忠同上君子寡言而行以成其信記緇衣恭儉惟德無載爾偽書周官古者言之不出恥躬之不逮也語里仁禮與其奢也寧儉喪與其易也寧戚語八佾奢則不遜儉則固與其不遜也寧固語述而君子恥其言而過其行語憲問子曰知之為知之不知為不知是知也語為政子恭儉豈可以聲音笑貌為哉孟離婁上聲聞過情君子恥之孟離婁下互入有名無實良劍期乎利不期乎莫邪墨君子行不貴苟難說不貴苟察名不貴苟傳唯其當之為貴荀不苟聞之而不見雖博必謬見之而不知雖識必妄荀儒效庖丁解牛適俗所須朱泙屠龍無所用巧苟乖世務雖有妙術歸於無用劉子史婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣史記本傳子曰我欲載之空言不如見之於行事之深切著明也史記自序使其中有可欲者雖錮南山猶有隙使其中無可欲者雖無石椁又何戚焉通監漢文紀申公曰為治者不在多言顧力行何如耳通監漢武紀將相皆舊功臣少文多質通監漢文紀萬石君無文學而恭謹無與比萬石君家不言而躬行是時吏治皆以慘刻相尚獨內史兒寬擇用仁厚士推情與下不求聲名並同上上雅不喜聽音樂手不持珠玉通監漢光武群臣上言宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎何事汙七十二代之編錄若郡縣遣史上壽盛稱虛美必髡令屯田任性而行不自彫飾並同上章奏過稱虛譽尚書皆宜抑而不省示不為諂子蚩也通監漢明帝蔣琬為政以安民為本不以脩飾為先蜀志本傳魏明帝謂盧毓曰選舉莫取有名如畫地作餅不可啗也魏志武威王利鹿孤欲稱帝鍮勿崙曰虛名無實徒足為世之質的將安用之通監晉安紀互入徒勞無補晉魏舒不為皎厲之事年四十郡舉上計宗黨以舒無學業令不就可以為高舒曰若試而不中其負在我安可虛竊不就之高以為己榮通監晉紀魏舒為事必先行而後言晉書本傳王述每受職不為虛讓其所辭必於不受及為尚書令子坦之白述故事當讓述曰汝謂我不堪耶坦之曰非也但克讓自美事耳述曰既謂堪之何為復讓人言汝勝我定不及也通監晉海西公紀豈須邑至里詣飾其游聲哉通監晉武紀秦孝王俊薨王府僚佐請立碑上曰欲求名一卷史書足矣何用碑為若子孫不能保家徒與人作鎮石耳隋書瓦器蚌盤殽核充事而已通監陳高祖隋主不喜辭華詔天下公私文翰並宜實錄泗州刺史司馬幼之文表華艷付所司治罪通監陳後主楊瑒在官清白吏請立石紀德瑒曰事益於人書名史氏足矣若碑頌者徒遺後人作鎮石耳唐書本傳元德秀質厚少飾緣唐書卓行傳互見重厚文武官請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪漢文不封禪後世豈以文帝之賢不及始皇耶通監唐太宗廣州吏民為宋璟立遺愛碑璟上言臣在州無他異跡今以臣光寵成彼諂諛欲革此風望自臣始於是他州皆不敢立通監李德裕曰臣祖家不置文選蓋惡其不根藝實唐志集名不可以虛作楚辭不為飾讓文選讓郡公表無使名過實崔子玉銘在室如賓寧慚屋漏不貪為寶每畏人知江總作歐陽頠墓誌不懷寶以害賈不飾表以招累靜守約以不矜動因循以簡易任自然以為姿無誘慕於當世張華鷦鷯賦以智謀而進者有時而衰以朴厚而知者無跡而固劉賓客雖有數斗玉不如一盤粟李太白集大農之家不待珠璣然後為富杜牧之淫文艷韻無一字焉白侍郎唯憑野老口不立政事碑杜荀鶴互見政事至寶不雕琢韓文互入不待僑揉多花常早落桃李不如松唐文本朝詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五榖必可以療飢斷斷乎如藥石必可以伐病東坡鳧繹先生集序蒼然澗下松不願世雕刻蘇子由集經大禮必簡記樂記喬而野朴而不文記表記大羹不和貴其質也大圭不瑑美其質也記郊特牲汙樽而柸飲蕡桴而土鼓記禮運器用陶匏記郊特牲至敬無文父黨無容此以素為貴也記禮器至貴不饗味而貴氣臭也記郊特牲先進於禮樂野人也如用之則吾從先進語子吾將鎮之以無名之樸老子史崔洪手不執珠玉晉書本傳斲雕為樸漢書經靜言庸違象恭滔天書堯典注言共工自為謀起事而違背之貌象恭敬而心傲很作偽心勞日拙書周官行偽而堅言偽而辨記王制小人間居為不善無所不至見君子而後厭然揜其不善而著其善記大學互入有忌憚色取仁而行違居之不疑語顏淵子居之似忠信行之似廉潔眾皆說之自以為是而不可與入堯舜之道故曰德之賊孟盡心下利心無足而佯無欲者也行偽險穢而強高言謹愨者也荀非十二子欲讎偽者必假真揚有人則作之無人則輟之之謂偽揚君子史鄭伯有既死使太史命伯石為卿辭太史退則請命焉請太史更命已復命之又辭如是三乃受策入拜子產是以惡其為人也左襄三十此飾說也史虞卿傳公孫弘習文法吏事緣飾以儒術西漢傳符氏卒群臣皆含辛以為淚通監晉安紀晉王廣彌自矯飾上與后嘗幸其第廣悉屏匿美姬於別室唯留老醜者衣以縵綵給事左右屏帳改用縑素故絕樂器之絃不令拂去塵埃上見之以為不好聲色還宮以語侍臣意甚喜通監隋高祖韋執誼初為叔文所引用深附之既得位欲掩其跡且迫於公議故時時為異同通監唐順宗傳記飾貌者不情大戴禮文王篇齊賀曰公孫洪內服貂蟬外衣麻枲內廚五鼎外膳一肴於是朝廷疑其矯西京雜記集誦六藝以飾姦潘安仁賦色厲內荏行僻心堅卑辭作偽陳子昂集今之卮其貌蠟其言以求賈柳文溷鼠虛求潔元微之集苟作偽而心拙必代斲而手傷白樂天本朝鞠躬便僻不足為恭長號流涕不足為哀弊衣糲食不足為儉涑水迂書飲食之初以為味也適口斯善矣世人取果餌而刻鏤之朱綠之以為盤桉之玩豈非以目食者乎同上夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉老蘇辨姦論經違道于譽書大禹謨欲潔其身而亂大倫語微子子叚段干木踰垣而辟之泄柳閉門而不納是皆已甚孟滕文公互入已甚陳仲子以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也孟滕文下買名聲於天下莊互入好名姦人盜名於晻暗同世故曰盜名不如盜貨田仲史鰌不如盜也荀不苟史公孫洪至宰相封侯食一肉脫粟飯西漢本傳石建之澣衣周仁為垢汙君子譏之前漢本傳公孫弘以三公為布被誠飾詐以釣名同上干名采譽西漢終軍傳純盜虛聲通監李固貽書黃瓊云集少室山人索價高兩以諫官徵不起韓文少室李渤也經其民機巧趍利詩魏風子為機變之巧者無所用恥焉孟盡心上有機械者必有機事有機事者必有機心莊故機械之心藏於胸中則純白不粹神德不全淮南子訓道史司馬安文深巧善宦四至九卿西漢汲黯傳公孫洪奏事有不可不庭辯嘗與汲黯請間先發之弘推其後通監漢武紀何平叔外靜而內躁銛巧好利通監魏邵陵厲公紀能移主上意者唯楊素耳通監隋高祖以反道為權以任數為智君上行之必失眾臣下用之必陷身通監唐德宗傳記桓子新論曰關東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼論衡互入仰羡父鰥無偶思配織女易林集援北斗兮酌桂漿楚辭過屠門而大嚼雖不得肉貴且快意文選曹植書本朝飢人忽夢飯甑溢夢中一飽百憂釋東坡詩經君子問人之寒則衣之問人之飢則食之稱人之美則爵之記表記觥大也飯不及壺飧大飯謂盛饌未具不及壺飧之救飢疾國越語寒之於衣不待輕煖飢之於食不待甘旨西漢食貨志互入知足傳記衣人在寒食人在飢投虎千金不如一豚肩呂氏春秋墨子語禽滑釐曰凶年與子隋珠又與子一鍾粟子將何所擇釐曰粟可耳說苑互入知所輕重集救死具八珍不如一簞犒韓文薦士詩蔬食足充飢何必膏粱珍繒絮足禦寒何必錦繡文白樂天集互入易足經子曰口惠而實不至記表記史諺曰錢不出家言與之東漢集虛名但蒙寒溫問泛愛不救溝壑辱杜詩經維南有箕不可以簸揚維北有斗不可以挹酒漿詩大東晥彼牽牛不以服箱同上史猶獲石田也無所用之左哀十一年聽其言洋洋滿耳若將可遇求之盪盪如繫風捕影終不可得前漢郊祀志有名無實何異兔絲燕麥南箕北斗通監梁武紀實不應聲者謂之虛通監漢武紀名如畫地作餅不可啖也魏志盧毓傳鍮勿崙曰虛名無實徒足為世之質的通監晉紀互入務實集猶木蘭為舟翠羽為楫翫之於陸而無涉川之用唐文粹雷霆空霹靂雲雨竟虛無杜詩初如吉夢終為戲談李義山集牛奮其角箕張其口牛不見服箱斗不挹酒漿韓三星行史計簿具文而已西漢宣紀秦任刀筆吏爭以奇察相高其敝徒文具亡實前漢張釋之傳國家之有百姓如草木之根柢若秋冬培溉則春夏滋榮坐守鄉閭待盡溝壑撤屋伐木顧妻鬻子止可供所由酒食之費未得至於府庫也敕從其言而有司竟不能行徒為空文而已通監唐懿宗集不得其人則挂墻屋耳陳子昂
