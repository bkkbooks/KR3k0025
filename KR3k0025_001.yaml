body:
  text: 方興未艾經如川之方至以莫不增詩天保子曰吾見其進也未見其止也語子若火之始然泉之始達孟公孫丑刀刃若新發於硎莊養生主互入才美日出晹谷登于扶桑淮南天文訓赫赫乎日出之光楊五百傳記少而學者如日出之光劉向説苑集車輕御良馬力優咄哉識路行未休韓文悠悠指長道去去策高駕同上若健者之升梯舉足愈多身愈高人愈仰之耳柳文鴻漸之姿當從此始白樂天集如日不滅如海不竭唐呂溫傳岩銘觀其逸足駸駸方將摶扶搖而凌泰清獵遺風而薄嵩岱吾見其進未見其止韋應物集本朝羡子年少正得路有如扶桑初日升歐公集清塗方踐遠業難量東坡答王欽臣啓經否終則傾何可長也易否卦枯楊生華何可久也易大過卦日昃之離何可久也易離卦雨雪瀌瀌見晛曰消詩角力互入勢力不敵翰音登于天何可長也易中孚子七八月之間雨集溝澮皆盈其涸也可立而待也孟飄風不終朝驟雨不終日老自然章朝菌不知晦朔朽壤之上有菌芝者生於朝死於晦列雲霧之盛須臾而訖暴雨之盛不過終日魏子史當世則榮沒則已焉史記孔子世家以色事人者色衰而愛弛愛弛則恩絶西漢班固傳朝為榮華夕而憔悴同上相聚偷生若魚遊釜中喘息須臾間耳後漢張綱傳朝華之草夕而零落魏王昶傳傳記老而學者如秉燭夜行劉向説苑江河之溢不過三日飄風暴雨須臾而畢説苑談叢集君寧見階上之白雪豈鮮耀於陽春謝惠連雪賦蕣榮不終朝蜉蝣豈見夕郭景純遊仙詩迫此短景急杜詩繁花能幾時同上朝蠅不須驅暮蚊不可拍得時能幾何與汝恣啖咋涼風九月到掃不見蹤迹韓文隨風隔幔小帶雨傍林微十月清霜重飄零何處歸杜螢火詩病葉多先墜寒花只暫香杜以色事它人能得幾時好李白集潢潦無根源朝滿夕已除韓退之浮雲上天雨墮地暫時會合終離異張文昌集危蒂幾時容元稹集寒灰埋暗火曉焰凝殘燭白樂天集況君春風面柔促如芳草鏡中桃李色不得十年好幕燕鼎魚偷活頃刻朝為拂雲花暮為委地樵並同上頗同狐鼠乘夜睢盱晨光既升勢自跧縮陸宣公文亦猶小星將墜則芒焰驟作司空表聖文過春花自落竟曉月空明許用晦文如鳥雀啁啾聲斷便已皇甫湜偷延晷刻王維集本朝草木榮華之飄風鳥獸好音之過耳歐公送徐無黨序浮雲無根蒂潢潦能須臾春冰無真堅歐公詩世言春寒秋熱老健為此三者終是不久長之物歐公與沈待制手書試問冰霜堅春來能久牢欒城集經雲行雨施天下平也易乾卦普天之下莫非王土率土之濱莫非王臣詩北山無此疆爾界詩思文大道之行也天下為公故人不獨親其親不獨子其子外戶不閉是謂大同記禮運故聖人以天下為一家以中國為一人貨惡其棄於地也不必藏於己力惡其不出於身也不必為己同上四海之內皆兄弟也語顏淵子楚王失弓左右請求之王曰楚王失弓楚人得之又何求之孔子曰惜乎其未大也不曰人遺弓人得之何必楚也家語自其同者視之萬物皆一也莊德充符史封略之內何非君土食土之毛誰非君臣左昭十年四海之內若一家通監秦紀六合怡怡比屋為仁一天下之衆異齊品類之萬殊參差同量壞冶一陶後漢崔駰傳集四海皆兄弟誰為行路人蘇武詩和氏之璧焉得獨耀於郢握夜光之珠何得專玩於隋掌天下之資當與天下共之劉越石書惟同大觀萬殊一轍盧子諒書澤無不漸螻蟻之穴靡遺齊故安陸碑桃李有奇質樗櫟無妙姿皆承慶雲沃一種春風吹歐陽行周六合栖霖雨萬物無凋枯李太白安得廣廈千萬間大庇天下寒士皆歡顏杜詩聖人一視而同仁韓文原人視外猶視中一家猶一人韓文誠使剌史不私於其民觀察使不急於其賦剌史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也同上慶雲所潤不遺於荊棘王維集憶年十五學搆廈有意蓋覆天下窮元稹集憂人骨肉同姚少監在西而東均處內而外肥唐文粹惟天之意莫遺於微細如日之輝不隔於幽遠同上嘗欲大潤澤於天下一物枯稿以為身羞臨川集畢竟春風不揀擇隨開隨落自勻勻欒城集爭得大裘長萬丈與君都蓋洛陽城禾黍與稂莠雨來同日滋白侍郎子自其異者視之肝膽楚越莊德充符淮南子曰肝膽胡越史舟中之人盡為敵國史記吳起傳謝玄子煥煥子靈運才藻贍逸玄曰我尚生煥煥那得不生靈運晉書本傳集失之者肝膽楚越唐徐彥伯論本朝肝膽猶能楚越如東坡經孔子曰今吾於人也聽其言而觀其行語趙文子其言訥訥然如不出諸其口禮記檀弓下君子不以辭盡人禮記表記子曰君子不以言取人語衛靈公子孔子欲以言辭取人於宰我失之矣家語史相如口吃而善著書史記司馬相如傳倪寬敏於文口不能發明也史儒林伏生傳劉儒口訥而心辨後漢張釋之曰周勃張相如稱為長者兩人言事曾不出口通監漢文紀孔子曰吾以言取人失之宰豫史仲尼弟子列傳文帝登虎圈問上林尉禽獸簿不能對嗇夫從旁代對響應亡窮詔拜嗇夫為上林令前漢張釋之傳楊愔典選多以言取人後魏書朱朴自言得為宰相月餘可致太平上以為然以朴同平章事朴為人庸鄙迂僻無他長制出中外大驚通監唐昭紀經趙文子其中退然如不勝衣中身也記檀弓下子孔子欲以容貌取人於子張改之矣家語淡臺有君子之容而行不勝其貌同上相形不如論心孫卿非相徐偃王之狀目可瞻焉不能俯視細物遠望才見焉仲尼之狀面如蒙倛方相也周公之狀身如斷災皋陶之狀色如削瓜閎夭之狀面無見膚傅説之狀身如植鰭如魚立也伊尹之狀面無須麋禹跳湯偏堯舜參牟子二瞳桀紂長巨姣美天下之傑筋力越徑百人之敵然身死國亡為天下大僇後世言惡則必稽焉今世俗之亂君鄉曲之儇子莫不美麗姚冶奇衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願以為士然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友孫卿非相楚孫叔敖突禿長左而以楚霸棄公子高微小短瘠行若將不勝其衣而白公之亂誅白公定楚國如反手取同上史晉叔向適鄭鄭鬷蔑立於堂下一言而善叔向曰子少不揚子若不言吾幾失子矣左昭二十年太史公以為留侯魁梧奇偉至見其圖狀如婦人好女史記世家嚴延年為人短小精悍敏捷於事雖子貢冉有通於政事不能絶也西漢舜蓋重童子項羽又重童子西漢項籍傳何休質朴訥口而雅有心思東漢本傳互入深沈周燮生而欽頤折頞醜狀駭人其母欲棄之其父曰賢聖多有異貌興我宗者乃此兒也於是養之後漢本傳魏主指崔浩曰汝曹視此人尫纖懦弱不能彎弓持矛然其胸中所懷乃過於甲兵通監宋紀齊孟業為法曹王嶽見其容貌短小笑而不言及尋斷決之處謂業曰卿決斷之明可謂有過軀之用三國典略侯景右足偏短弓馬非其長而多謀算通監梁高祖虞世南外若不勝衣而中抗烈唐書本傳魏證容貌不逾中人而有膽略通監唐太紀太學博士周捨舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀劉璠梁典互入外表集子雖軀幹小老氣橫九州杜詩脈不病雖瘠不害脈病而肥者死矣韓文雜説雖長不滿七尺而心雄萬夫唐文粹伯倫之形不妨賢士白帖晏子短而相齊蔡義小而佐漢高柴至惡推至孝於孔門同上本朝晏嬰不滿六尺長高節萬仞陵首陽東坡詩史以貌取人失之子羽史仲尼弟子列傳孟嘗君之趙趙人出觀之笑曰始以薛公為魁然也今視之眇小丈夫耳史記龔遂召見形貌短小宣帝望見不副所聞心內輕焉前漢本傳江充為人魁岸容貌甚壯武帝望見而異之曰燕趙多奇士前漢息夫躬傳親見楊子雲祿位容貌不能動人故輕其書西漢揚雄傳楊愔典選多以貌取人時謗云尚書典選似貧人買瓜唯取大者後魏書
