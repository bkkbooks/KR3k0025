body:
  text: 念舊子楚昭王與吳戰軍敗走昭王亡其踦屨已行三十步復還取之左右曰大王何惜於此昭王曰楚國雖貧豈無此一踦屨哉吾悲與之偕出而不與之偕反於是楚俗無相棄者賈子史綈袍戀戀有故人意史范睢傳上還過沛故人父老諸母子弟佐酒道舊故為笑樂酒酣上自為歌起舞慷慨傷懷泣數行下謂沛父兄曰游子悲故鄉通鑑漢惠帝紀樓護有故人呂公無子歸護託身護與呂公妻及呂嫗同食護妻子頗厭呂公護聞之流涕責子曰呂公以窮老付託於我義所當奉遂養呂公終身西漢互見付託故舊高誼馮異自長安入朝帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中既罷賜珍寶錢帛詔曰倉卒蕪蔞亭豆粥呼沱河麥飯厚意久不報通鑑漢光武紀帝幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔少時謹信與人不疑曲唯直柔耳今乃能如此通監漢光武紀仲尼不失舊於原壤東漢朱穆傳何晏遷侍中主選曹宿與有舊者多擢用之魏志本傳孫權欲斬蘇飛甘寧為權言飛疇昔舊恩寧不值飛固已捐軀於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今為君置之通鑑漢獻帝紀互見救援唐文宗云故笏乃今甘棠唐書魏謨傳上曰昔漢光武與嚴子陵共寢子陵加足於帝腹今諸公皆名德舊齒平生親友宿昔之歡何可志也通監唐高祖紀唐公踐天子位多引貴臣共榻劉文靜諫帝曰我雖應天受命宿昔之好何可忘唐書安重誨諷馮道趙鳳奏從珂失守宜加罪上曰朕昔為小校家貧賴此小兒拾馬糞自贍以至今日為天子曾不能庇之耶通鑑本傳上命起居舍人魏謨獻其祖文正公笏鄭覃曰在人不在笏上曰亦甘棠之比也通鑑唐文宗傳記孔子出遊有婦人哭甚哀問之婦人曰向刈蓍薪亡吾簪是以哀也非傷亡簪不忘故也韓詩外傳無忘半面記室親書集漢江之君悲其墜屨少原之婦哭其亡簪選演連珠留簪屨之舊愍降帷蓋之餘矜梁江遲為柳僕射讓光祿表念我一朝意遺我千載恩元稹集秋涼卷朝簟春暖徹夜衾雖是無情物欲別尚沈吟白侍郎曾經爛熳三年看欲棄空箱似少恩白傳集本朝寇萊公寢處一青幃二十餘年時有破壞益命補葺有靳之笑答曰不忍處之久而以弊棄也遺事互見儉約經親親以睦不遺故舊詩伐木睦於父母之黨記坊記親者無失其為親也故者無失其為故也檀弓下君子篤於親論語史惠顧先君之好照臨敝邑鎮撫其社稷左昭二十一杜甫依嚴武於劍南武以世舊待甫甚善唐書杜甫傳李晟篤於義隆于故舊唐書劉仁軌雖貴顯不自矜踞接故舊如布衣時唐書岑文本生平故人雖羈賤必鈞禮並唐書傳記許允之為吏部多用鄉黨里人記室新書集綢繆之旨有同骨肉文選盧子諒書本朝尹洙與狄青同經略招討事洙以貶死厚恤其家余襄公撰墓志韓魏公少善尹師魯師魯以貶死其子朴方襁褓既長公聞於朝命以官薦為屬教育之如子弟聞見録歐公平生篤於朋友如尹師魯梅聖俞孫明復既卒其家貧公力經營之使皆得以自給又表其子于朝悉録以官墓志吳奎初與鄉人王彭年善彭年客死于京師奎使長子主喪事周恤其家嫁二女焉吳奎墓志經于父不能字厥子乃疾厥子書康詰于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟同上互見自相矛盾亦有兄弟不可以據薄言往訴逢彼之怒詩柏舟乃如之人兮誓不相好乃如之人兮德音無良日月不我能慉反以我為讎谷鼠兄弟不知嘻其笑矣氓角弓父兄刺幽王也不親九族骨肉相怨小雅不能宴樂同姓親睦九族頍辨宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安論語陽貨子魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾當無子之時不憂今子死乃與向無子同又奚憂焉列子互見曠達於所厚者薄無所不薄也孟盡心下為人父而榷其子縱利如子何揚寡見互見互相矛盾秦人父子兄弟無父兄之恩箕踞反目有若禽獸賈誼史居喪而不哀在戚而有嘉容左襄三十晉叔向曰魯公室其卑乎左昭十一一斗粟尚可舂一尺布尚可縫兄弟二人不相容西漢淮南王長傳薄骨肉之恩通監西漢借父耰鋤慮有德色母取箕帚立而誶語西漢賈誼傳司徒袁隗欲為從女求姻見黃允歎曰得壻如是足矣允聞而黜其妻通監漢桓帝紀互見壻及見利忘義初晉高祖司馬懿辭以風痺不能起居曝書遇雨高祖起收書家唯一婢見之張后懼言語泄漏乃手殺之而自執爨焉帝由是重之其後桓夫人有寵后罕得見帝疾后省病帝曰老物可憎何煩出也后慚不食諸子亦不食帝謂人曰老物不足惜慮困我好兒耳晉書姜維自魏詣蜀與母相失復得母書令求當歸維曰良田百頃不在一畝但有遠志不在當歸也三國志本傳骨肉恩薄北史蘇綽傳晉王劉夫人最有寵父聞其貴詣魏宮謁夫人夫人方與諸夫人爭寵以門地相高恥其家寒微大笑曰妾去鄉時略可記憶妾父不幸死亂兵妾守尸哭之而去今何物田舍翁敢至此命笞劉叟于宮門通監後漢梁均王王戎儉𠫤其從子婚與一單衣裁後更責之戎女適裴氏貸錢女歸戎色不說女還錢乃懌世說互見鄙吝既彰尋斧之醜豈慚尺布之謠孔白六帖魏文帝令東阿王作詩七步不成當行法即應聲為詩曰煮豆然豆萁列豆取其汁萁在豆下然豆在釜中泣本自同根生相煎何太急帝深有慚色世說集自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德劉孝標廣絶交論視若游塵遇同土梗莫肯費其半菽罕有落其一毛同上同胞之徒無所容居選答客難昔我同門友高學振六翮不念攜手好棄我如遺跡選古詩綈袍匪舊白首如新駱賓王忘情於骨肉是殆於恩也忘情於朋友是殆於義也柳冕論文書骨肉且相薄它人安得忠元微之集餓虎不食子人無骨肉恩孟東野故當結以信親當結以私親故且不保人誰信汝為韓文經積而能微記曲禮上分散者仁之施也儒行子分人以財謂之惠孟滕文公上樂分施而恥積藏荀大略史欒懷子好施士多歸之左襄二十一凡公子公孫之無祿者私分之邑國之貧約孤寡者私與之粟左昭十愛施者仁之端史記魏成食祿千鐘什九在外什一在內史魏世家范蠡之陶為朱公十九年之中三致千金再分散與貧交疏昆弟史記貨殖傳李陵與士大夫絶甘分少西漢原涉身衣服車馬才具妻子內困專以振施貧窮赴人之急為務西漢本傳初百姓飢荒張儉資計差溫乃傾竭財産與邑里共之賴其存者以百數後漢本傳馬援少年處田牧至有牛馬羊數千頭穀萬斛既而歎曰凡植財産貴其能施賑也否則守錢虜耳乃盡散以頒昆弟故舊東漢馬援傳魯肅大散貨賄甚得鄉邑欣心吳志范叔孫周窮濟急鄉曲貴其義行宋書傳記尚書令符雅為人樂施乞人填門嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰後秦書樊重假貸人間數百萬臨終遺令焚削文契債家皆慚爭往償之諸子從勑竟不受晉陽秋梁商嘗曰多藏厚亡為子孫纍每租奉到及兩宮賞賜便置中門外未嘗入藏悉分與昆弟中外東觀漢紀互見遠慮集物飽其義陳子昂集薄幸不自資傾家共人費劉長卿出貨力猶棄粃稗柳文經屯其膏施未光也易屯卦子挈瓶丐水執雚求火而人不𠫤劉子子産聽鄭國之政以其乘輿濟人於溱洧孟離婁下史魯莊公曰衣食所安弗敢專也必以分人曹劌曰小惠未遍民弗從也左莊十子楊子取為我拔一毛而利天下不為也孟盡心上纖吝者義之蠹也文中子魏相篇數粒而炊析薪而爨非苟為艱難由性褊𠫤而細碎也劉子史不分孤寡不恤窮匱左文十三家富萬金門下不見一賢者史孟嘗君傳互見鄙吝愈於纖嗇西漢貨殖傳顏師古曰纖細也嗇𠫤也魯人儉嗇而丙氏尤甚周人既纖而師史尤甚西漢貨殖傳杜門不通水火西漢孫寶傳注謂雖鄰伍亦不往來也吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目東漢夏侯湛傳寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道東漢王符傳馬援曰凡植財産貴其能施振也否則守錢虜耳東漢本傳曹洪家富而性吝嗇通鑑三國魏明帝紀王戎家有好李賣之恐人得種常鑽其核通鑑晉紀和嶠富擬王者而至吝人謂之有錢癖晉書本傳王戎性貪吝園田遍天下每自執牙籌晝夜會計常若不足通鑑晉惠帝紀為人父母而吝其醯醢富有群生榷其一物通鑑梁高祖紀韋莊性慳數米而炊稱薪而爨唐書吏部侍郎張允家資以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮通鑑周太祖紀傳記王戎儉𠫤其從子婚與一單衣裁後更責之戎女適裴氏貸錢數萬歸寧戎色不說女還錢乃懌世說互見無情集酒庫封瓶生緑苔白樂天愚者愛惜費但為後世嗤古詩經苦節不可貞易卦節注為節過苦則物不能堪也儉不中禮詩唐國風蟋蟀晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣記禮運
