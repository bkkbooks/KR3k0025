body:
  text: 治家經間有家悔亡周易家人卦家用平康尚書洪範身修而後家禮記大學治家者不敢失於臣妾而況於妻子乎孝經子嚴家無格虜韓非子史記李斯傳云能罰之加焉必也教護其家父母之分也管子王凝御家以四教敬儉恭恕正家以四禮冠婚喪祭三年之蓄備則散之親族聖人之書及公服禮器不假垣屋什物必堅朴曰無苟費也門巷果木必方列曰無苟亂也文中子關朗篇史趙武曰夫子之家事治左傳昭二十夫子謂范會也田嬰使文王家史記本傳夫纖嗇筋力治生之正道也史記貨殖傳教笞不可廢於家史記律書人棄我取人取我與歲熟取榖豫之絲漆繭出取帛絮與之食史記貨殖傳欲長錢取下穀長石斗取上種能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趍時若猛獸鷙鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法故其智不足以與權變勇不足以決斷仁不能以取豫彊不能以有所守雖欲學吾術終不告之矣蓋天下言治生祖白圭史記貨殖傳鞭撲不可弛於家前漢刑決志范蠡之陶為朱公治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再散後遂至巨萬漢書貨殖傳萬石君居家子孫申申僮僕欣欣西漢石奮本傳任氏折節力田善富者數世然任公家約非田蓄所生不衣食公事不畢則不得飲酒食肉以此為閭里率西漢貨殖傳互見鄰里李通之父守為人嚴毅居家如官庭東漢本傳華歆遇子弟甚整雖間室之內嚴若朝典世說上蜀王顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飲食而巳忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞犬哉失為家主之法也通監三國互入不知大體戒束子孫雖朱紫羅列無敢違犯其法度者通監晉海西公紀正元間言家法者尚韓穆二門唐書李巽雖在私家亦置案牘簿書勾檢如公署焉唐書本傳閨門落然不聞人聲通監唐憲宗房元齡治家有法度新唐書本傳集善統其家慈訓其子白傳集囊篋細碎無所遺漏韓文董府君銘經上棟下宇以待風雨易繫辭築室百堵西南其戶爰居爰處爰笑爰語風雨攸除鳥鼠攸去如跂斯翼如矢斯棘如鳥斯革如翬斯飛詩斯干君子將營宮室宗廟為先廄庫為次居室為後禮記曲禮上晉獻文子成室晉大夫發賀也焉張老曰美哉輪焉羹哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也君子謂之善頌善禱禮記檀弓下魯共王好治宮室壞孔子舊宅以廣其居尚書序子五畝之宅植墻下以桑孟子大廈成而燕雀相賀淮南說林訓互入得所依託史齊景公謂晏子曰子之宅近市湫隘囂塵不可以居請更諸爽塏者左傳昭三年開第康莊之衢史記孟子傳詔為列侯食邑者賜大第室吏二千石徙之長安受小第室前漢高紀往有甲乙次第故曰第也宣帝賜霍光甲第一區前漢本傳平恩侯許伯入第蓋寬饒往賀西漢蓋寬饒傳新第成功堅西漢董賢傳紀瞻立宅於烏衣巷晉書郭洋為太尉長史起大宅在高陵城西世稱曰長史宅三輔決録楷營新宅基宇甚麗當移住與兄共遊行床帳儼然櫺軒疏朗兄心甚願之而口不言楷心知其意便使兄住裴楷別傳魏舒少孤為外家寧氏所養寧起宅相者云當出貴外甥舒曰當為外家成此宅相王隱晉書石崇有別館在河陽之金谷一名梓澤晉書本傳高門邃宇北史號國中堂既成召工圬墁約錢二百萬復求賞技號國以絳羅五百假賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中苟失一物不敢受直通監唐元宗紀大臣將帥宦官競治第舍各窮其力而後止時人謂之木妖通監唐代宗紀裴度治第石林幽勝燠館涼臺號緑野堂度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事唐書本傳互見間適園地傳記廣室多陰遠天地之和也故聖人弗為春秋繁露陳秀公治第潤州池館綿亙數百步宅成公已疾甚肩輿一登西樓而巳人謂之三不得居不得修不得賣不得沈括存十述筆談集夏屋廣大沙堂秀只楚辭沙丹晝其堂高堂邃宇層臺纍榭網戶朱綴砥室翠翹楚辭幽堂書密文選七命仰視兮雲屋班婕妤賦群窈窕之華麗館室次舍采飾纖褥西京賦爽塏間敞張平子南都賦千廡萬室蜀都賦金鋪交映玉題相輝蜀都賦纍棟重霤左太沖魏都賦葺墻羃室同上既節比而欑集又宏摙以豐敞何晏賦溫房氶其東序涼室處其西偏何晏賦邃宇列綺窗蘭臺接羅幕甲第崇高闥有所思行青樓臨大路高門結重關姜女篇神靈扶其棟宇歷千載而彌堅王延壽賦為之者勞居之者逸文選大廈耽耽同上東西膠轕南北崢嶸文選土木丹彩光色如新陳子昂賦高樓對紫陌甲第連青山李太白集高飛燕雀賀新成杜詩四壁含清風韋應物集樓閣玲瓏五雲起白侍郎高樓大觀金堂玉戶唐李愈東都賦經之營之門房洞褰列舉豐廚危危掀掀皇甫湜廊腰縵回簷牙高啄杜牧之經始命有園囿之樂焉毛詩馳驖史楚子成章華之臺願與諸侯落之左傳昭七深林絶澗有若自然東漢梁異傳奇禽馴獸飛走其間同上襄陽諸習氏荊土豪族有佳園池晉書山簡傳宋簡文入華林園顧謂左右曰會心處不必在遠翳然林木便自有濠濮間想也世說上美榭高墉北史穿池種木小寄情賞南史徐勉傳襲度治第石林幽勝燠館涼臺號緑野堂度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事唐書本傳林薄蒙翳唐書孟郊傳文宗用鄭注言即命左右神策軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞唐書集余既滋蘭之九畹兮又樹蕙之百畝楚辭爰定我居築室穿池長楊映沼芳枳樹籬遊鱗瀺灂菡萏敷披竹木翁鬱靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢植三桃表櫻胡之別二李耀丹白之色石榴蒲桃之珍磊落蔓衍乎其側梅杏郁棣之屬繁華藻麗之飾華實照爛言所不能極也菜則蔥韭蒜芋青筍紫薑堇薺甘旨蓼荽音綏芬芳蘘荷依陰時藿向陽緑葵含露白薤負霜潘嶽間居賦園日涉而成趣門雖設而常關陶潛歸去來辭廬園當栖巖文選詩築山擬蓬壺穿池類溟渤鮑明遠代君子行岸旁花柳看勝畫浦上樓臺望是仙張九齡文香泉草豐潔杜詩瞰臨眇空闊緑淨不可唾韓文水容與天色此處皆緑淨韓文斬茅而嘉樹列發石而清泉激輦糞壤焚椔翳卻立而視之出者突然成丘陷者呀然成谷窪者為池而缺者為洞若有鬼神異物陰來相之韓文將為空谷砧巖淵池於郊邑之中則必輦山石溝澗壑凌絶險阻疲極人力乃可以有為也然而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在柳文見公之作知公之志公之因土而得勝豈不欲因俗以成化公之擇惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立廉公之居高而望遠豈不欲家撫而戶曉夫然後則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟柳文以白雲為藩籬碧山為屏風昭其儉也柳文決疏沮洳搜剔山麓萬石如林柳文清風自生翠煙自留柳文綿谷跨溪皆大石林立渙若奔雲錯若置棊怒者虎鬭企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交峙環行卒愕疑若搏噬於是刳闢朽壤剪焚榛薉決澮溝導伏流散為踈林洄為清池寥廓泓瀛若造物者始判清濁效奇於茲地非人力也天墜地出設茲神物柳文春之日衆木華拆岸鋪島織沈浮照耀其水五色於是乎襲馨摘奇方舟逶迤樂魚時翻飄蘂雪飛泝沿環回隱映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松密竹深大柳起風甘棠垂陰於是乎濯纓漣漪解帶升堂畏景火雲隔林無光虛甍沈沈皓壁如霜羽扇不搖南軒清涼此則楚襄蘭臺未足以滌炎鬱也秋之日金颷掃林蓊鬱洞開太華爽氣出關而來於是乎絃琴端若景物廓如月委浩素水涵空虛鳥驚寒沙露滴高梧境隨夜深疑與世殊此則庾公西樓未足以淡神慮也冬之日彤雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰裳憑軒倚楹瑤瑎如真玉樹羅生日暮天霽雲開月明冰泉潺潺終夜有聲此則子猷山陰未足以暢吟嘯也呂溫作號州三堂記豐而不侈約而不陋以琴竹詩書之幽素易綺紈鐘鼓之繁喧惟林池煙景不讓呂和叔文春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峰雪陰陽顯晦昏旦含吐千變萬狀不可殫紀覼縷而言白樂天集四垂無蔽萬景坌入劉賓客落花芳草無人處同上花香逐荀令草色對王孫劉長卿峰奪香爐巧池偷明鏡圓沈文卿文當門竹勝簾姚少監俗塵不飛人意自遠劉賓客本朝溫公營獨樂園在洛中諸園最為簡素人以公之故春時必遊鳴道集互見因人而重李氏園李茂貞園朝遊北城中回首見修竹下有朱門家破墻圍古屋舉鞭叩其戶幽響答空谷入門所見夥十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深窗戶緑水光兼竹淨時有獨立鵠林中百尺松歲久蒼鱗蹙豈惟此地少意恐關中獨小橋過南圃夾道多喬木隱如城百雉挺若舟千斛陰陰日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅梨驚合抱映島孤雲馥春光水溶漾雪陳風翻撲其北臨長溪波聲卷平陸北山臥可見蒼翠開磽禿我時來周覽問此誰所築云昔李將軍負險乘衰叔抽錢算間口但未榷羹粥當時奪民田失業安敢哭誰家美園圃籍沒不容贖此亭破千家鬱鬱城之麓將軍竟何事蟻蝨生刀韣何嘗載美酒來此駐車轂空使後之人聞名頸猶縮俗猶謂皇后園蓋茂正謂其妻也我今官正間屢至因休沐人生營居止竟為何人卜何當辦一身永與清景逐東坡
