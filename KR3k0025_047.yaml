body:
  text: 重厚經君子厚德載物易坤卦不侵侮不好狎記曲禮上天地之道慱也厚也記中庸大人不倡游言孚也記緇衣趙文子其中退然如不勝衣其言吶吶然如不出諸口記檀弓下不窺密不旁狎不道舊故不戲色記少儀其德盛者其志厚記祭統及其廣厚載華岳而不重振河海而不洩記中庸言忠信行篤敬雖蠻貊之邦行矣語衛靈公子水之積也不厚則其負大舟也無力風之積也不厚則其負大翼也無力莊子言重則有法行重則有德貌重則有威好重則有觀楊子脩身史唯厚德者能受多福國語晉互見福祉周勃重厚少文通監高紀絳侯東陽侯稱為長者言事曾不能出口西漢張釋之傳互入長厚李將軍恂恂如鄙人口不能出辭前漢李廣贊為人質厚少文造次不能以辭自達東漢吳漢傳李栖筠莊重寡言唐書本傳元德秀質厚少緣飾唐書卓行本傳互見務實集掘剞劂而不用楚辭言詞純朴古人風韋應物集經其德薄者其志輕記蔡統言不忠信行不篤敬雖州里行乎哉語衛靈公子鄉曲之儇子荀子言輕則招憂行輕則招辜貌輕則招辱好輕則招楊子脩身史輕則寡謀左桓十二年輕慮者不可以治國史記蒙恬傳商君天姿刻薄人也史記魏其沾沾自喜多易同上本傳沾沾言自整頓也多易多輕易之行世俗靡薄董仲舒傳馬援戒子孫曰效杜季良不得陷為天下輕薄子東漢本傳暨豔多揚人暗昧之失以顯其謫通監三國魏明紀魏收昔在京洛輕薄尤甚人號云魏收驚蛺蝶北史本傳王勃等有才而浮躁衒露唐裴行僉傳張昌齡舉進士為考功王師旦所絀太宗問其故答曰昌齡等華而少實其文浮靡非令器也取之則後生慕效亂陛下風雅新唐書杜審言傳韋渠牟志尚浮淺不根於道德仁義本傳崔信明蹇亢以門望自高鄭世翼亦傲倨數恌輕忤物崔信明傳傳記墻薄則亟壞繒薄則亟裂器薄則亟毀酒薄則亟酸夫薄而可以曠日持久者殆未有也劉向新序梁遣徐陵聘齊時魏收文學為北朝之冠錄其文遺陵陵過江沈之曰吾與魏公藏拙唐裴餗傳記經德盛不狎侮書旅契不侵侮不好狎記曲禮上不窺密嫌同人之私也記少儀君子不以其所能者病人不以人之所不能者愧人記表記惡稱人之惡者語陽貨君子嘉善而矜不能語子張君子成人之美不成人之惡語顏淵不逆詐不億不信語憲問史壺遂深中隱厚世言梁多長者不虛哉史記韓安國傳論將相皆舊功臣論議務在寬厚恥言人之過失西漢刑法志鄭當時每朝候上問說未嘗不言天下長者西漢本傳記人之功忘人之過西漢陳湯傳絳侯東陽侯稱為長者言事曾不能出口西漢張釋之傳互入重厚多所平反罪人西漢劉德傳蘇林曰幡罪人辭使從輕也曹參為相擇木訥於文辭重厚者召之為吏吏之言文刻深欲務聲名者輒斥去之前漢張歐為御史未嘗言按人官屬以為長者西漢本傳馬援曰聞人過失如聞父母之名耳可得聞口不得言也同上詔問劉昆曰前在江陵反風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝嘆曰此乃長者之言也東漢劉昆傳厚性寬中東漢卓茂傳劉寬為太尉嘗坐客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產寬須臾遣人視奴疑必自殺顧左右此人也罵畜產辱孰甚焉故吾懼其死也後漢忠孝之人持心近厚東漢韋虎傳阮籍口不臧否人物晉書本傳羅仇曰寧使人負我我不忍負人也通監晉紀什翼犍性寬厚郎中令許謙盜絹二疋什翼犍知而匿之謂左長史燕鳳曰吾不忍視謙之面卿慎勿泄若謙慚而自殺是吾以財殺士也通監晉侮西公紀謝方明為丹陽尹方明善治郡所至有能名承代前人不易其政必當改者則以漸移變使無跡可尋通監晉恭紀互入交代樂廣凡論人必先稱其所長則所短不言自見通監晉惠紀有老嫗欲詣劉仁軌陳牒誤詣戴至德覽之未終嫗曰本謂是解事僕射乃不解事僕射耶歸我牒至德笑而授之時人稱其長者通監高宗寧人負我我無負人通監唐德宗互見自責房元齡不以己長望人唐書本傳賈耽長者不喜臧否人物同上朱渥性通簡不矯飾嘗曰士苟有行不必以己長形彼短己清形彼濁唐書傳記孔子曰與人交推其長者違其短者說苑雜言厚者不毀人以自益仁者不危人以要名戰國策集不吹毛而求小疵不洗垢而察難知文選持論從容未嘗言人所短任彥昇序深識臧否不以毀譽形言褚淵碑許遠寬厚長者貌如其言韓文張中丞傳後敘致一物於必窮之地君子不為杜牧之互見不為己甚本朝臧否不掛口坡詩韓魏公器量過人性渾厚不為畦畛峭塹行狀以快恩讎矜名譽為可薄歐公集微小難忽經惟公懋德克勤小物書畢命在上位不陵下記中庸子夏曰雖小道必有可觀者焉語子張子范氏門徒路逢乞兒馬醫弗敢辱也必下車而揖之列子史臧文仲曰國無小不可易也君其無謂邾小蠭蠆有毒左傳詩曰雖有絲麻無棄菅蒯左成九逸詩薳啟疆曰恥匹夫不可以無備左昭公二年君子能勤小物故無大患通監周紀蚋蟻蜂蠆皆能害人同上田琳曰諺稱掩目捕雀夫微物尚不可欺以得志況大事乎通監漢獻紀蒭蕘有可錄之事晉書黃犬之皮終補狐裘也晉書慕谷超傳郄超曰謝玄使才雖履屣間亦得其任晉書謝玄傳互入精明傳記蒭蕘之言明王必擇葑菲之體詩人所記史通雞肋是棄能無惜乎同上敵固無小蜂蠆有毒鳥窮則啄獸窮猶觸者皆自衛其生命而求免於禍難也李衛公兵法集不棄菅蒯愛同絲麻任彥昇表經析言破律巧賣法令記王史公曰言多忌克忌則多怨又焉能克左僖九年陗直刻深西漢晁錯傳於人之功無所記於人之罪無所忘西漢酈食其傳以刻為明西漢路溫舒傳吹毛求疵西漢中山靖王傳周亞夫曰極知禹無害然文深不可以居大府西漢趙禹傳張湯趙禹共定諸律令務在深文拘守職之吏作見知法吏傳相監司用法益刻自此始通監漢武紀上下相歐以刻為明深者獲公名平者多後患通監漢宣紀性刻害好發人陰伏同上翟方進以經術進其為吏用法刻深好任勢立威有所忌惡峻之深詆中傷甚多通監漢成紀申韓刻薄傷化通監元帝集史敘項籍之所以失天下曰於人之功無所記於人之過無所遺管仲論鮑叔牙不屬國但聞人過終身不忘陸宣公文經焚炙忠良刳剔孕婦書泰誓上斮朝涉之脛剖賢人之心書泰誓中子盜跖膾人肝而餔之莊子逮至夏桀殷紂燔生人辜諫者為炮烙鑄金柱剖賢人之心折才士之脛醢鬼侯之女俎梅伯之骸淮南子淑真訓篇紂觀炮烙於瑤臺謂龍逢曰樂乎莊子史蠭目而豺聲忍人也左文莒子庚輿虐而好劍苟鑄劍必試諸人左傳紂醢九候剖比干心史記本紀呂太后斷戚夫人手足去眼煇耳飲瘖藥使居廁中命曰人彘史記呂后紀吳起事齊魯人攻魯魯欲將吳起起取齊女起欲就名遂殺其妻以明不與齊也魯卒以為將魯人或惡起起殺其謗己者三十餘人出衛門與母訣母死起終不歸史記本傳項羽攻襄城無噍類史記孫皓剝人之面鑿人之眼吳志赫連勃勃性驕虐視民如草芥常居城上置弓劍於側有所嫌忿手自殺之群臣迕視者鑿其目笑者決其唇諫者先截其舌而後斬之通監晉恭紀宋蒼梧王一日不殺則慘然不樂通監宋紀夏王勃勃以叱干阿利領將作大匠阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之射甲不入則斬弓人入則斬甲匠通監晉安紀賈妃性酷虐嘗手殺數人或以戟擲孕妾子隨刃墮地晉書本傳符生錘鉗鋸鑿可以害人之具備置左右即位未幾后妃公卿已下至于僕隸凡殺五百餘人截脛拉脅鋸項刳胎者比比有之通監晉哀紀自去春以來潼關之西至于長安虎狼為暴凡殺七百餘人秦群臣奏請禳災符生曰野獸飢則食人飽當自止何禳之有且天豈不愛民而正以犯罪者多故助朕殺之耳晉哀齊定州刺史南陽王綽喜為殘虐嘗出行見婦人抱兒奪以飼狗婦人號泣綽怒以兒血塗婦人縱狗使食之齊主聞之鎖詣行在問在州何事最樂對曰多聚蠍於皿器置狙其中觀之極樂帝即命夜索蠍一斗比曉得二三升置浴斛使人祼臥斛中號叫宛轉帝與綽臨觀喜噱不已因讓綽曰如此樂事何不早馳驛奏聞通監陳紀盧杞小忤己不傳死地不止唐書武后遣人杖王皇后蕭淑妃各一百斷去手足投酒甕中曰二嫗骨醉數日而死又斬之通監唐高宗則天當其忍斷雖甚愛不少隱唐書趙思綰好食人肝常面剖而膾之膾盡人未死又好以酒吞人膽謂人曰吞此千枚則以無敵矣及長安城中食盡取婦女幼稚為軍糧日計數而給之每犒軍輒屠數百人如羊豕法通監五代漢隱帝傳記宋康王為無頤之冠戰國策樂羊為魏文侯將而攻中山其子在中山中山繫其子示樂羊攻愈急中山烹其子而遺之羹樂羊啜之盡一盃中山見其誠也不忍與之戰果下之文侯賞其功而疑其心說苑亦見戰國策石虎裝飾宮人美叔者斬其首洗血置盤上傳首視之又內諸比丘有姿色者與其褻後殺之合牛羊肉煮而食亦賜左右所以識其味也崔鴻十六國春秋集雄虺九首吞人以益其心楚辭虎豹九關啄害下人文選招鬼血人于牙不肯吐口韓文元和詩經既破我斧又缺我斨詩破斧人而不仁疾之已甚亂也語子段干木踰垣而辟之泄柳閉門而不內是皆已甚孟子互見沽名史不為末減左昭十四年趙廣漢疑丞相夫人殺侍婢乃將吏卒入丞相府召夫人跪庭下受辭收奴婢十餘人通監漢宣紀以苛為察以刻為明前漢宣紀黨人皆歸田里書名三府禁錮終身通監漢靈紀蹊田之牛奪之已甚後漢皇后紀論
