body:
  text: 鑒別經旌別淑慝彰善疸惡書畢命擬人必於其倫記曲禮下孔子曰管仲遇盜取二人焉上以為公臣曰其所與游辟也可人也注言此二人但居惡人之使之犯法記雜記下凡賜君子與小人不同日記玉藻子夏曰可者與之其不可者拒之語子張子是非之心智之端也孟公孫丑上有權衡之稱者不可欺以輕重管子駑驥同轅伯樂為之咨嗟玉石相揉和氏為之歎息孔叢子寧戚擊角而疾歌齊桓公聞之曰異哉歌者非常人也命後車載之淮南子馬有驥之一毛不可謂之驥龍有蛇之一鱗不可謂之蛇劉子魏證曰大業之際徵也嘗與諸賢侍文中子謂徵及房杜曰先輩雖聰明特達然非董薛程仇之比雖逢明主必愧禮樂文中子史淳于髡曰狐裘雖弊不可補以黃狗之皮史齊世家互見兩不相入人固未易知知人亦未易史范睢傳信數與蕭何語何奇之通監西漢高帝紀蕭何聞信去不及以聞自追之居三日何來曰諸將易得耳至如信者國士無雙王欲長王漢中無所事信必欲爭天下非信無可與計事者呂氏問相高帝曰陳平智有餘然難獨任周勃重厚少文然安劉氏必勃也並同上初絳侯周亞夫為丞相趙禹為丞相史府中皆稱其廉平然亞天弗任曰極知禹無害然文深不可以居大府通監漢武紀冠雖敝必加於首履雖新必貫於足西漢轅固傳履雖鮮不加於枕冠雖敝不以苴履賈誼傳刀筆吏不可為公卿西漢汲黯傳長卿雖貧其人足依也西漢司馬相如傳互見期待初何武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之西漢何武傳互見同姓帝謂執金吾寇恂曰頴川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可也東漢光武紀周璆高潔之士前後郡守招命莫肯至唯蕃能致焉特為置榻去則垂之東漢陳蕃傳互入不苟合陳蕃為豫章守不接賓客唯功曹徐稚來特設一榻去則懸之同上郭太識張孝仲芻牧之中知范特祖郵置之役邵公子許偉康並出屠酤司馬子威拔自卒伍後漢郭太傳荀淑遇黃憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾師表也既而前至袁閬所未及勞問遂曰子國有顏子寧識之乎閬曰見吾叔度耶是時同郡戴良才高倨傲每見憲未嘗不正容及歸罔然若有失也戴良曰不見叔度自以為無不及既覩其人則瞻之在前忽焉在後固難得而測矣郭泰少遊汝南先過袁閬不宿而退進往從憲纍日方還范曄論曰黃憲言論風旨無所傳聞然士君子見之者靡不深服遠去玭吝將以道周性全無德而稱乎余曾祖穆侯以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方通監東漢殤帝紀郭泰初遊雒陽時人莫識陳留苻融一見嗟異因以介於河南尹李膺漢桓帝紀簡練清高斥黜俊邪通監或問禰衡曰盍從陳張文司馬伯達乎曰吾焉能從屠沽兒耶唯善孔融及楊修常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也東漢本傳曹操曰生子當如孫仲謀如劉景升兒子豚犬耳通監東漢管輅曰吾與劉頴川兄弟語使人神思清發昏不假寐自此之外殆白日欲寢矣晉書吳嘗置丞相衆議歸張昭吳王曰孤豈為子布有愛乎顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也通監三國魏明紀嵇康嘗詣隱者汲郡孫登登曰子才多識寡難乎免於今之世矣通監魏元紀呂蒙年十五隨鄧當擊賊策見而奇之引置左右張昭薦蒙拜別部司馬吳志晉武帝聞王衍名問戎曰夷甫當世誰比戎曰未見其比當從古人中求耳晉書本傳閔鴻見陸雲奇之云此兒若非龍駒即是鳳雛山濤為吏部甄拔人物各為題目阮籍能為青白眼見禮俗之士以白眼對之嵇喜來弔籍作白眼喜弟康造焉籍大悅乃見青眼並晉書本傳和璧之在荊山隋珠之潛重川非遇其人焉有連城之價照車之名乎晉書張載傳王述性沈靜每坐客辨論蜂起而述處之恬如也年三十尚未知名人謂之癡導以門地辟之既見唯問在東米價述張目不答導曰王椽不癡人何言癡也通監晉武紀石勒集衣冠人物別為君子營晉紀孫權克荊州將吏悉歸附潘濬不見權遣人致之以為治中荊州諸軍事一以咨之吳志注江表傳馬秀曰揚雄作太玄唯桓談以為必傳後世晉書王長文傳魏主嘗引崔浩出入臥內嘗指浩以示新降高車渠帥曰汝曹視此人尫纖懦弱不能彎弓持矛然其胸中所懷乃過於甲兵通監宋太祖紀良玉未剖與瓦石無異騏驥未試與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分北史蘇綽傳辛彥之拜隋州刺史于時州牧多貢珍玩惟彥之所貢並供祭之物高祖善之顧謂朝臣曰人安得無學彥之所貢稽古之力也隋書吏部侍郎高孝基名知人見玄齡曰僕閲人多矣未見如此郎者見如晦謂曰君有應變之才必任棟梁之重俱以子孫托之通監隋高紀張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之通監唐太宗紀互見深識大體王勮蘇味道皆未知名裴行儉一見謂之曰二君後當相次掌銓衡僕有弱息願以為托通監唐武后蘇環子頲弱冠敏悟焉載曰古稱一日千里蘇生是已唐書獨孤信見孫思邈曰器大難為用耳唐書本傳狄仁傑曰君正吾藥籠中物不可一日無也唐書元淡傳鵰鶚鷹鸇豈衆禽之偶唐書韋思謙傳宋璟奏括州員外司馬李雍儀州司馬鄭勉並有才略文詞但性多異端好是非改變若全引進則必至咎悔若長棄捐則才用可惜通監二百十三吉溫為新豐丞薛嶷薦溫才上召見顧嶷曰是一不良人朕不用也通監唐元宗紀李華善屬文與蕭頴士善為古戰場文燻污之如故書置於佛書之間與頴士因閲佛書得之華謂之曰此文如何頴士曰可矣華曰當代秉筆者誰及於此頴士曰君稍精思便能至矣華愕然唐書本傳傳記王濬沖裴叔則於總角時詣鍾士季客問二童子是誰鍾曰裴楷清通王戎簡要三十年此二賢當為吏部尚書世說王右軍妻郤夫人謂二弟愔曇曰王家見二謝安石傾一本有筐字倒庋見汝輩來平平耳世說下互入婦人見識鴟梟不鳴未為瑞鳥猛虎雖伏豈齊仁獸續世說第十鑒懸日月文心雕龍衆人之唯唯不如周舍之諤諤韓詩外傳柳琮所拔進皆世所稱鄉里為之語曰得黃金一笥不如柳伯騫所識益州耆舊傳集蔡雍避難江南宿於柯亭館館以竹為椽仰而盻之曰良竹也取以為笛奇聲獨絶蔡雍長笛賦序騏驥長鳴伯樂昭其能盧狗悲號韓國知其才文選曹植自試表慈父不能愛無益之子仁君不能蓄無用之臣同上拔呂蒙於戎行識潘濬於係虜陸機辨亡論行間識呂蒙杜詩楚材擇杞梓漢苑歸驊騮休傳鹿是馬莫信鵩為梟似君須向古人求並同上龍劍昔未發泥沙相晦藏向非張茂先孰辨牛斗光權載之文虛懷泛愛而涇渭不雜唐文粹春秋三傳束高閣獨抱遺經究終始韓文伯樂之廄多良馬卞和之匱多美玉韓文送權秀才序夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也韓文上兵部李異侍郎書互入知人伯樂一過冀北之野而馬群遂空夫咤北馬多於天下伯樂雖善知馬安能空其群耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之群無留良焉苟無留其良雖謂無馬不為虛語矣韓文送溫造處士赴河陽軍序仁麟智龍為瑞一辰未若君子瑞乎人倫劉賓客集如么絃孤韻瞥入人耳非大樂之音同上勿輕直折劍猶勝曲全鉤白樂天集衆嫌我獨賞信厚勤恪宜於爪牙肘腋間居之不可遣他天下眼卻輕野鶴重家雞並同上眉白衆情高元微之集欲知花好處偏在最深叢同上松柏可比節操不可比文章皇甫湜紫色閏位不可謂正孫可之文賈餗為禮部朝士以進士干賈公不獲有強毀嘲者賈公曰我秪以杜某顗敵數百輩足矣杜牧之集互入好不必多本朝桓玄識高柔於弱冠異王基於童幼類要譬之象犀珠玉雖無補於飢寒要不可使在泥塗中東坡文只應天眼識天人東坡詩奇寶橫道驥服箱誰其識者有歐陽陳後山贈一蘇公過目先空冀北群後山經子曰由也千乘之國可使治其賦也求也千室之邑百乘之家可使為之宰也赤也束帶立於朝可使與賓客言也語公冶長子曰德行顏淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語先進子費惠公曰吾於子思則師之矣吾於顏般則友之矣王順長息則事我者也孟子樂正子二之中四之下也孟盡心下晏子功用之臣也不如子産子産惠人也不如管仲管仲之為人力功不力義力知不力仁野人也不可以為天子大夫荀大略蜀人有仲元者不屈其意不纍其身不夷不惠可否之間也揚子史酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也左文七年左氏豔而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗范寧穀梁傳序獵追殺獸者狗也而發蹤指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發蹤指示功人也西漢蕭何傳今雖亡曹參等百數何缺於漢通監漢高紀漢廷大臣獨汲黯好直諫守節死義難惑以非至如說丞相弘等如發蒙振落耳通監漢武紀京兆尹張敞方略耳目不及廣漢通監漢宣紀卓茂行已在於清濁之間東漢郭林宗曰奉高袁閎之器譬諸泛濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也東漢黃憲傳鄭泰謁董卓曰明公出自西州少為將帥間習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不窺堂孔公緒清談高論噓枯吹生並無軍旅之才臨鋒決敵非公之儔也通監漢獻紀龐德公常謂孔明為臥龍士元為鳳雛德操為冰一作水鑑同上靖少與從弟邵俱知名有人倫臧否之稱蜀志許靖傳許邵與兄靖俱有高名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評東漢許邵傳曹操微時常卑辭厚禮求為己目許邵曰君清平之姦賊亂世之英雄同上孫權與陸遜論周瑜魯肅及呂蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉寡儔子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略奇至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬通監漢獻紀孫禮盧育始入軍府崔琰曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後咸至鼎輔三國魏志魏太子使胡綜作賓客目曰英才卓越超踰倫匹則諸葛恪精識時機達幽究微則顧談凝辨宏達言能釋結則謝景究學甄微游夏同科則范慎羊道私駁綜曰元遜才而疏子默精而很叔發辨而浮孝敬深而狹通監魏明紀袁子論曰或云少府楊阜見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳群則不然談論終日未嘗言人主之非書數十上外人不知君子謂群於是乎長者矣同上敦篤至行則太中大夫韓暨亮直清方則司隸校尉崔林貞固純粹則太常常林通監魏邵陵厲公紀庾敳見和嶠而歎曰嶠森森如千丈松雖磊砢多節目施之大廈有棟梁之用晉書和嶠傳王衍與弟澄好題品人物舉世以為儀準通監晉惠紀王澄王玄王濟並有盛名皆出衛玠下世云王家三子不如衛家一兒晉書或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞群戎曰君復未見其父耳同上裴楷有知人之鑒嘗曰夏侯玄肅肅如入宗廟中但見禮樂器鍾會如觀武庫森森但見矛戟在前山濤若登山臨水幽然深遠晉書嵇康傳王衍口中雌黃朝野翕然晉書本傳王戎有人倫鑒識常目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵表物同上周顗等並列貴位嘗冬至置酒其母舉觴賜三子嵩曰伯仁志大而才短名重而識暗好乘人之弊非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母下耳阿奴嵩弟謨小字也晉書桓彝曰季野有皮裏陽秋言其外無臧否而內有所褒貶也晉書褚裒傳魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎通監魏崔浩謂高允豐才博學一代佳士所乏者矯矯風節通監宋紀孔奐曰江揔有潘陸之華而無園綺之英陳書太子問於賀若弼曰楊素韓擒虎史萬歲皆稱良將其優劣何如弼曰楊素猛將非謀將韓擒虎鬭將非鎮將史萬歲騎將非大將通監隋高紀上曰長孫無忌善避嫌疑應物敏速決斷事理古人不過而揔兵攻戰非其所長高士廉涉獵古今心術明達臨難不改節當官無朋黨所乏者骨鯁規諫耳唐儉言辭辨捷善和解人事朕三十年遂無言及於獻替楊師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論恆據經遠自當不負於物劉洎性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意褚遂良學問稍長性亦堅正每寫忠誠親附於朕譬如飛鳥依人人自憐之通監太宗傳記嚴仲弼九皋之鳴鶴空谷之白駒顏彥先八音之琴瑟五色之龍章張威伯歲寒之茂松幽夜之逸光陸士衡士龍鴻鵠之裴回懸鼓之待槌世說中庾道李曰廉頗藺相如雖千載尚凜凜恆有生氣曹蜍李志雖見在厭厭如九泉下人王大將軍稱王夷甫處衆人之中如珠玉在瓦石之間世說集傅毅之於班固伯仲之間耳魏文帝典論彈射臧否選西京賦雌黃出其唇吻朱紫由其月旦選絶交論天下以君侯為文章之司命人物之權衡一經品題便作佳士李白與韓荊州書舌端月旦皮裏陽秋段成式文當是時見王於北亭猶高山深林龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好靜秀瑤環瑜珥蘭茁其牙稱其家兒也韓文唐故殿中少監馬君墓志本朝處士丁重能閲人觀于琮謂路若曰于侍郎風儀秀整禮貌謙挹如百斛重器所貯尚空其半安使不益其祿位哉續世說齊何點常稱陸慧曉如照鏡遇形觸物無不朗然王思遠常如懷冰暑月亦有霜寒一作氣
