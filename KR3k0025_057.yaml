body:
  text: 恭敬經德盛不狎侮書旅獒注云盛德必自敬何狎易慢侮之有出入起居罔有不欽書冏命侍坐於所尊敬無餘席記曲禮上侍坐於先生先生問焉終則對記曲禮上先生與之言則對不與之言則趨而退記曲禮上讓食不唾記曲禮上揖人必違其位記曲禮上侍坐於長者屨不上於堂記曲禮上注屨賤空則不陳於尊者之側長者舉未釂少者不敢飲記曲禮上君子之容舒遲見所尊者齊遫注謙貌也記玉藻君子莊敬日強記表記執輕如不克曲禮下執虛如執盈入虛如有人記少儀互見謹畏賓客主恭祭祀主敬記少儀孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言惟謹爾入公門鞠躬如也如不容過位色勃如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者語鄉黨恭則不侮陽貨雖蔬食菜羹瓜祭必齊如也鄉黨出門如見大賓使民如承大祭顏淵有子曰恭近於禮遠恥辱也學而子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨述而子朝廷不歷位而相與言不踰階而相揖也孟子擎跽曲拳人臣之禮也莊子人間世史秦哀公賦無衣楚申包胥九頓首而坐左定五管寧五十未嘗箕踞榻上後漢傳記昔禹見耕者耦立而式過十室之邑則下大戴禮曾子制言篇史溫季位於七人之下而求掩其上左傳蓽門圭竇之人而皆陵其上其難為上矣左襄十無禮而好陵人怙富而卑其上左昭元子產曰子晢上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也左昭元石碏曰少陵長左隱四犯則陵人前漢五行志甯成好氣為小吏必陵其長吏前漢本傳丞相田蚡召客飲坐其兄蓋侯北向自坐東向以為漢相尊不可以兄故私撓前漢本傳互見恃勢符堅曰怒其室而作色於其父其亙溫之謂矣通監簡文紀互見遷怒周嵩嘗飲酒瞋目謂兄顗曰君才不及弟何橫得重名以所然蠟燭投之顗曰阿奴火攻固出下策耳晉書蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲上中面曰陛下投臣以赤心臣敢報之戰栗梁書李義府典選專以賣官為事上頗聞之謂義府曰卿子及婿頗不謹多以非法義府勃然變色頸頰俱張曰誰告陛下上曰但我言如是何必就我索其所從得耶通鑑唐高宗韋貽範同平章事屢以大杯獻上不即持貽範舉杯直上頤通鑑唐昭宗經胡逝我梁不入我門詩何人斯互見責人原壤夷俟論語子嘑爾而與之蹴爾而與之孟子告子上過我門而不入我室同上盡心下互見責人自得如山忽人如草金樓子史偃蹇左哀三朱買臣見湯湯坐床上丞史遇買臣弗為禮張湯傳沛公至高陽見酈食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不宜踞見長者漢書灌夫罵坐不敬西漢本傳汲黯為人性倨少禮西漢本傳蕭望之意常輕丙吉遇丞相禮節倨慢通鑑漢宣紀禰衡尚氣剛傲好矯時慢物始達穎川乃陰懷一剌既而無所之適至於剌字漫滅東漢本傳互見尚氣何曾陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書互見取禍劉孝綽仗氣負才多所陵忽每於朝集會同處公卿間無所與語反呼騶卒訪道途間事南史宋書本傳謝萬矜豪傲物但以嘯詠自高未嘗撫眾兄安深憂之謂萬汝為元帥宜數接對諸將以悅其心豈有傲誕如此而能濟事也萬乃召集諸將一無所言直以如意指四座云諸將皆勁卒諸將益恨之通鑑晉哀帝紀蕭子明為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一揮而已衣冠切恨之梁書張昌齡詣闕獻頌太宗召試因謂之曰昔禰衡潘岳皆恃才傲物以至隕命汝才不減二賢宜追鑒前轍唐書本傳互見取禍厲色慢辭唐書杜甫嘗醉登嚴武床瞪視曰嚴挺之乃有此兒新唐書本傳傳記王澄嘗之荊州送者傾邑所別樹上有鵲巢澄便脫衣著犢鼻上樹探鵲𪆪而弄之傍若無人晉書互見放蕩類王子猷作亙溫參軍亙謂王曰卿在府久當相料理王不荅直高視手板柱頰云西山朝來致有爽氣世說鐘會見嵇康旁若無人移時不交一言同上蕭穎士恃才傲物摭言集出山揖牧伯長笑輕衣簪李白傲雖凶德必有恃而敢行韓文釋言互見恃勢本朝目視飛鴻氣如橫蜺酷吏姚紹之意岸軒傲並孔帖經老馬反為駒詩小雅角弓言幽王見老人反侮慢之史陳平貧或問平何肥其嫂疾之曰食糠覈耳西漢本傳上慢侮士西漢張良傳王霸至市中募人擊王郎市人皆大笑舉手揶揄之霸慚遽而反通鑑漢光武紀智者於群愚如弄一丸於掌上通鑑魏邵陵厲公紀互見愚弄上好狎侮群臣自太宰義恭以下不免穢辱常呼金紫光祿大夫王玄謨為老傖僕射劉秀之為老慳顏師伯為齴其餘短長肥瘦皆有稱目通鑑宋紀王導嘗枕周顗膝而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人晉書周顗傳崔悛竊言文襄帝為黃口小兒北史崔梭傳杜伏威遺陳稜隋將婦人之服以激怒之唐書傳記諸葛亮致巾幗婦人之飾以怒宣王魏氏春秋子宋人養猿號曰徂公欲與狙芧先詐之曰朝三而暮四眾狙皆怒又詐曰朝四而暮三眾狙皆喜聖人以智籠愚亦如狙公欺狙也列子史張儀說楚王曰大王誠能聽臣閉關絕約於齊臣請獻商於之地六百里通鑑周紀嘸然陽應西漢韓信傳湯舞智以御人西漢張湯傳如嬰兒在股掌之上東漢袁紹傳唐高祖與李密書曰所望右提左挈戮力同心執子嬰於咸陽殪商辛於牧野通鑑隋恭紀互見同功共事傳記虎得一狐狐曰天令我長百獸見我無不走虎以為然隨而行獸見之皆走虎不知獸畏己而畏狐也劉向新序亙溫自以雄姿風氣是司馬宣王劉越石一輩得一巧作老婢乃是劉越石妓女見溫入潸然而哭泣溫問其故曰官家甚似劉司空溫大悅即出外脩整衣冠又入呼問我何處似司空婢曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是弛冠解帶不覺惛然而睡不怡者數日語林經履錯然敬之無咎易離卦注錯然謹慎之藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也易繫辭無有師保如臨父母易繫辭下括囊無咎無譽蓋言謹也坤卦夙夜惟寅書舜典居寵思危罔不惟畏書周官怵惕惟厲中夜以興思免厥愆書冏命夙夜匪懈以事一人詩崧高小心翼翼詩烝民謂天蓋高不敢不局謂地蓋厚不敢不蹐詩正月戰戰兢兢如臨深淵如履薄冰詩小旻溫恭朝夕執事有恪詩那不敢暴虎不敢馮河詩小旻凡百君子各敬爾身詩雨無正溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄冰詩小宛執虛如執盈入虛如有人記少儀擇日月以見君記表記入竟而問禁入國而問俗入門而問諱曲禮上君子戒慎不失色於人同上若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐玉藻君言不宿於家記子之所慎齊戰疾並記君命召不俟駕行矣論語子言有招禍也行有招辱也君子其慎所立乎荀勸學史蕭曹文吏自愛史記漢高紀內行彌謹同上五帝紀劉辟強子德妻死大將軍光欲以女妻之德不敢取畏盛滿也漢楚元王孔光沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光嘿不應西漢本傳洞洞屬屬小心畏忌前谷永傳濟濟謹畏無敖戲驕恣之過同上石建為郎中令奏事建讀之驚恐曰書馬者與尾而五服處曰作馬字下曲者而五建時上書誤作四師古曰馬字下曲者曰尾并四點為四足凡五今乃四不足一獲譴死矣其為謹慎雖他皆如是西漢本傳霍光出入禁闥二十餘年出則奉車入侍左右小心謹慎未嘗有過為人沈靜詳審每出入下殿門止進有當處郎僕射竊識視之不失尺寸通鑑漢武紀金日磾在上左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯其篤謹如此同上斤斤謹質形於體貌後吳漢傳斤音靳闔門自守退無私交三國魏志賈詡傳吳左大司馬朱然內行脩潔終日欽欽常若在戰場通鑑魏邵陵公紀文子曰不為福始不為禍終同上魏明紀殷浩雖被放黜口無怨言晉書本傳口不論世事西晉王衍傳陳顯達自以門寒位重遷官常有愧懼之色戒其子勿以富貴陵人通鑑齊紀李大亮身居三職宿衛兩宮恭儉忠謹每宿直必坐寐達旦通鑑唐太宗岑文本拜中書令有憂色母問之荅曰非勳非舊責重位高所以憂也有來慶者輒曰今日受弔不受賀唐書本傳苖晉卿潞州壺關人為太守嘗入壺關望縣門輒步曰公門當下況父母邦乎時美其恭唐書互見恭敬鄉里門陸贄在奉天小心精潔未嘗有過由是帝親倚至解衣衣之同類莫敢望新唐書本傳傳記千仞之墻禍不入門易林成回學於子路恭敬不己子路問其故對曰臣聞之行者比於鳥上畏鷹鸇下畏羅網夫人為善者少為讒者多若身不死安知禍罪不施說苑集保身勑行不蹈有過之地吳季重牋臨事若祭視人如嬰陳子昂集三緘謹禍胎駱賓王避權如避虎元稹集眼見心知不敢言白侍郎省中之樹訪猶不言車前之馬數而後對張九齡傳躬雖己安若敵鋒鏑味雖以甘若含冰蘗皮日休安危機鍵之語默不出口杜牧之本朝身閑曷不長閉口天寒正好深藏手東坡閉口豈非福同上經管仲鏤簋朱紘山節藻梲君子以為濫矣記禮運庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也公廟之設於私家由三桓始也郊特冕弁兵革藏於私家非禮也是謂脅君禮運大夫具官祭器不假聲樂皆具非禮也是謂亂國同上朝服之以縞也自季康子始也玉藻子曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫語八佾孔子謂季氏八佾舞於庭三家者以雍徹同上臧文仲居蔡山節藻梲何如其知也公冶長史衣服禮秩如適左莊八商賈乘堅策肥履絲曳縞前漢食貨志秦楊以田農而甲一州翁伯以販脂而傾縣邑張氏以賣醬而隃侈質氏以洒削而鼎食濁氏以胃脯而連騎張里以馬醫而擊鍾皆越法矣前貨殖傳杜陵翁仲出入蒼頭盧兒傳呼甚寵前漢今民賣僮者為之繡衣絲履偏諸緣內之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被墻古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈而富民墻屋被文繡天子之后以緣其領庶人嬖妾緣其履前賈誼傳奢泰則下不遜而國貧前禮樂志互見奢侈陶侃媵妾數千家僮數千珍奇寶玩富於天府晉書本傳楊素貴寵家僮數千後庭妓妾曳綺羅者以千數第宅華侈制擬宮室隋書本傳安祿山起第既成具幄帟器皿充牣其中有帖白檀床二皆闊丈六尺銀瓶脫屏風帳一方一丈八尺於廚廄之物皆飾以金銀金飯甖二銀淘盆二皆受五斗織銀絲筐及笊篱各一他物稱是雖禁中服御之物殆不及也上每為祿山賜物常戒之曰胡眼大勿令笑我祿山入新第置酒乞降墨敕請宰相至第是日上欲於樓下擊毬遽為罷戲命宰相赴之通鑑唐元宗王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通鑑後周太祖傳記唐王元寶以金銀疊為屋以銅線穿錢甃花徑中泥雨不滑時名為富窟開元遺事
