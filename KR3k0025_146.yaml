body:
  text: 期待經後生可畏焉知來者之不如今也語子罕子子曰義也清而莊姚義靖也惠而斷李靖威也和而慱竇威收也曠而肅薛收瓊也明而毅賈瓊淹也誠而厲杜淹玄齡志而密房喬徵也直而遂魏證大雅深而弘溫大雅叔達簡而正陳叔達若逢其時不減卿相文中子天地篇史呂不韋曰君門待子門而大史記本傳張負曰固有美如陳平長貧者乎卒與女西漢陳平傳長卿雖貧其人足依也西漢司馬相如傳互見鑒別初何武為郡吏時事太守何壽壽知武有宰相器故厚之西漢賈復少事李生生奇之曰賈君容貌志氣如此而勤於學將相之器也後漢本傳王允仕州郡郭林宗見而奇之曰一日千里王佐才也遂與之友同上馬援兄況謂援曰汝大才當晚成後馬援傳互見持久呂處遷徐州剌史請王祥為別駕民事一以委之初處有佩刀工相之以為必登三公可服此刀處謂祥曰苟非其人刀或為害卿有公輔之量故以相與魏志蔡雍倒屣迎王粲曰此王公孫有異才魏志本傳呂蒙曰士別三日則刮目相待吳志庾亮謂諸葛恢曰明府當作黑頭三公晉書諸葛恢傳王導少有識量陳留高士張公見而奇之謂其兄敦曰此兒容貌志氣將相之器也晉王導傳何充嘗詣王導導以麈尾指床呼充共坐曰此是君座也及導薨充參録尚書事晉何充傳王珣與謝玄為亙溫掾溫嘗謂之曰謝掾年四十必擁旄杖節王椽當作黑頭公晉書劉裕謂義隆曰王曇首沈毅有器度宰相才也通監晉恭帝紀王儉幼篤學王粲見之曰栝柏豫章雖小已有棟梁氣矣終當任人家國事南史徐勉好學宗人徐孝嗣見之曰此謂人中麒麟必能致千里南史梁本傳徐陵年數歲家人攜以候沙門寶志寶志摩其頂曰天上石麒麟也南史本傳高孝基見房元齡曰僕觀人多矣未有如此郎當為國器但恨其不見聳壑昂霄云唐書本傳通監改觀字為閲字崔宏見高允曰高子黃中內潤文明外照必為一代偉器北本傳楊素引封倫為土木監每與論宰相之事終日志倦因撫其床曰封郎必當據吾此座稱薦於文帝隋書集利觜長距終得擅場張平子東京賦圖南未可料變化有鵾鵬杜詩君有長才不貧賤同上豈是池中物由來席上珍同上勉君振羽翰蚤取凌青冥劉賓客集寄之垂天翼早晚起滄溟亦當蒲其輪鶴其書矣並同上足下年尚強嗣德有繼將大書特書不一書而已韓退之答元稹書知君志不少一舉凌鴻鵠劉長卿幽姿間自適逸翮當一逞如有長風吹青雲在俄頃同上禁林聞得長傾鳳池水那能久滯龍元微之集落落精神終有立飄飄才思杳無窮杜牧之蛟龍可是池中物鳳鳥無非閣上音張承吉文混溪既琢必見山川之精樹羽已懸行嗣雲韶之響駱賓王期君蟠挑枝千歲終一嘗東坡集本朝杜如晦少聰悟高孝基深器重之曰公有應變之才為棟梁之用續世說丁重能閲人觀于琮謂路巖曰于侍郎如百斛重器尚空其半安使不益於祿位哉同上從茲穩上青雲去萬里誰能測羽翰玉壺清話子孔子厄於陳蔡七日不食顏回仲由炊之有埃墨墮飯中顏回取而食之子貢見之不悅以為竊食也家語公孫丑曰夫子當路於齊管仲晏子之功可復許乎孟子孟子去齊充虞問曰夫子若有不豫色然並公孫丑下用管窺天用錐指地莊子立尺度以度天直寸指以測淵孔叢子答問以指測河荀勸學篇指測海指極則謂水盡猶目察百步而云見極也抱朴史趙平原君以千金為魯連壽史魯仲連傳張儀嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行此必盜相君之璧共執掠笞數百史本傳趙人方與公謂御史大夫周昌曰君之史趙堯年雖少奇士君必異之是乃代君之位昌笑曰堯年少刀筆吏耳何至是乎堯後為御史大夫西漢周昌傳以蠡測海東方朔傳應龍潛於潢汙魚黿媟之不睹其能奮靈德合風雲超忽而躆皓蒼也班固敘傳和氏之璧韜於荊石隋侯之珠藏於蚌蛤歷世莫視不知其將含景耀吐英精曠千歲而流夜光也同上互見不具眼目楚龍且曰韓信無兼人之勇不足畏也為人易與耳本傳並西漢王睿與長沙太守孫堅共擊零桂賊以堅武官言頗輕之通監漢獻帝紀陸玩有德望遷侍中有詣之者索酒瀉梁柱之間呪曰當今乏才以爾為柱石莫傾人梁棟耶晉書本傳秦王興令群臣舉賢梁喜曰未得其人可謂世之乏才興曰卿自識拔不明豈得遠誣四海乎晉安帝紀太宗令封德彝舉賢久無所舉上詰之對曰非不盡心但於今未有奇才耳上曰君子用人如器各取所長正患己不能知安可誣一世之人唐太宗紀傳記以小人之慮度君子之心世說中集玩其磧礫而不窺玉淵者未知驪珠之所蟠也左太沖吳都賦籠雞與梁燕不信有冥鴻白樂天集淮陰市井笑韓信李太白文集本朝以孟軻之聖而弟子所願止於管仲晏嬰臨川集經子曰事君盡禮人以為諂也語八佾篇陽貨曰懷其寶而迷其邦可謂仁乎好從事而亟失時可謂知乎陽貨篇叔孫武叔語大夫於朝曰子貢賢於仲尼微生畝謂孔子曰丘何為是栖栖者與無乃為佞乎陳子禽謂子貢曰子為恭也仲尼豈賢於子乎並論語非聖人者無法孝經子陳臻問曰前日於齊王餽兼金一百而不受於宋饋七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣孟子陳賈曰周公使管叔監殷管叔以殷叛知而使之是不仁也不知而使之是不智也仁智周公未之盡也屋廬子曰夫子之任見季子之齊不見儲子為其為相歟魯平公將見孟子臧倉曰君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後喪踰前喪君無見焉梁惠王下人有言伊尹以割烹要湯萬章上或謂孔子於衛主癰疽於齊主侍人瘠環同上萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否好事者為之也同上並孟鵬徙九萬里蜩與鷽鳩笑之曰我決起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而下翱翔蓬蒿之間此亦飛之至也而彼且奚適也莊子逍遙遊篇小辨而毀大道孔叢子公孫龍篇人各是其所是非其所非將誰使正之陽子妄譽仁之賊妄毀義之賊同上淵騫篇俗人未嘗見龍麟鸞鳳乃謂天下無有此物以為古人虛設瑞應抱朴子暢玄卷史鄭子産作丘賦國人謗之曰己為蠆尾左昭四年季康子相召仲尼公之魚曰昔吾先君用之不終為諸侯笑今又用之不能終是再為諸侯笑必召冉求史孔子世家孔子適鄭鄭人或曰纍纍若喪家之狗子貢以告孔子曰形狀未也而似喪家之狗然哉史記世家莊子作漁父盜跖胠篋以詆訾孔子之徒史本傳拜陳平為都尉使為參乘典護軍諸將盡歡曰大王一日得楚之亡卒未知其高下而即與同載反使監護長者通監西漢高帝紀龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之策受辱於跨下無兼人之勇不足畏也同上大抵詆訾聖人即為怪迂揚雄傳安其所習毀所不見藝文志姍笑三代諸侯王表絳灌曰平雖美丈夫如冠玉耳其中未必有也陳平傳並西漢孔子大聖不免武叔之毀子路至賢猶有伯寮之訴東漢列女袁隗妻傳庸可以水旱而纍堯湯乎蔡雍傳今之少年喜謗前輩孔融傳好議論人長短妄是非政法馬援傳並東漢俗論皆言處士純盜虛聲通監武帝下令曰昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女世人謂之撾婦翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黑欺天罔君者也魏志互見欺罔桓沖曰謝安石有廟堂之量不間將略今大敵垂至方游談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左衽矣通監晉孝武紀史思明曰李光弼長於憑城今出在野此成擒矣通監唐紀集街談巷議張平子西京賦稱堯見囚小儒之虛誕為禹所曲士之穿鑿張謂作虞帝碑是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也韓文進學解老子之小仁義非毀之也其見者小也坐井而觀天曰天小者非天罪也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也韓文原道人生未鵾化物議如鴻毛劉長卿醯雞之議大鵬夏蟲之議層冰唐文粹本朝無異於鼓井淖而議東海坐蚊蝶而笑九萬之圖南也江民表心說互入不自揣度經作賓于王家書微子之命貴貴為其近於君也記祭義尊長於已踰等不敢問其年少儀大夫七十而致仕若不得謝必賜之几杖乘安車曲禮上國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾曲禮下群居五人則長者必異席謀於長者必操几杖以從之並禮記子昔者魯繆公無人乎子思之側則不能安子思孟子公孫丑下齊管夷吾任國政號曰仲父列子枉千乘於陋巷揚子史宋先代之後也於周為客天子有事膰焉有喪拜焉左傳魯莊公使束縳管仲以豫齊使齊使受而退比至三釁以香塗者三浴之桓公親逆之于郊國語周文王得呂望於磻溪武王以為師謂之太公號曰尚父史記項羽尊敬范增為亞父同上魏公子無忌仁而下士魏有隱士曰侯嬴公子從車騎虛左自迎侯生侯生攝敝衣冠直上載上坐不讓公子執轡愈恭通監周紀大將軍青侍中上踞廁視之丞相弘宴見上或時不冠至如見黯不冠不見上嘗坐武帳黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此西漢汲黯傳曹參為齊相聞膠東有蓋公善治黃老言厚幣請之參於是避正堂舍蓋公焉本傳擁篲而先驅揚雄傳暴勝之望見雋不疑容貌尊嚴勝之屣履起迎並西漢大將軍袁紹總兵冀州遣使要鄭玄大會賓客玄最後至乃延升上座東漢傳孔融深敬於鄭玄倒屣造門告高密縣為玄特立一鄉曰昔齊置善士鄉越有君子軍皆異賢之意也今鄭君鄉宜曰鄭公鄉後漢鄭玄傳興席改容後漢吳張昭吳中謂之仲父吳志傳徐庶曰此人可就見不可屈致也備由是詣亮凡三往乃見通監漢獻紀萬章為京兆尹門下督從至殿中諸侯貴人爭欲揖章莫與尹言者西漢互見事物相形孫策擊豫章先遣虞翻詣華歆歆葛巾迎策謂歆府君德望遠近所歸策年幼稚宜修子弟之禮便向歆拜胡沖吳書孫策曰昔管子相齊一則仲父二則仲父而桓公為霸者宗吳張昭傳許靖年踰七十愛樂人物納誘後進清談不倦丞相諸葛亮皆為之拜蜀志晉王導任丞相元帝委之為好日隆朝野傾心號為仲父晉書本傳郭奕為野王令羊祜嘗過之奕歎曰羊叔子去人遠矣遂送祜出界數百里坐此免官晉書郭奕傳虞翻在吳魏文帝嘗為翻設虛坐三國吳志本傳唐郭子儀德宗時賜號尚父唐書本傳郭子儀代宗不名呼為大臣舊唐書本傳魏證曰人言陛下欲幸南山外皆嚴裝已畢而竟不行何也上笑曰初實有此心畏卿嗔故中輟耳上嘗得佳鷂自臂之望見證來匿懷中徵奏事因久不已鷂竟死懷中通監唐太宗紀太后信重內史梁文惠公狄仁傑群臣莫及常謂之國老而不名曰每見公拜朕亦身痛通監唐武后紀元宗尊遇姚崇每見便殿必為之興去輒臨軒以送它相莫如也唐書本傳龐德公素有重名諸葛亮每至其家獨拜床下三國志王維名盛於開元間豪貴人虛左以迎唐書帝如孔阜謁孔子祠帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓禁孔林樵采訪孔子顏淵之後以為曲阜令及主簿通監五代周太祖紀樊宗師見劉義獨拜唐書本傳傳記范逵既去陶侃追送不已且百許里世說集子夏處西河之上而文侯擁篲鄒子居黍谷之陰而昭王陪乘文選燕王尊樂毅分國願同歡陳子昂集朕屈韓愈公為尹宜令無參御史不得為故常韓愈神道碑時以御史大夫庶尹李白所適二千石郊迎李陽冰作李白集序本朝床前時得拜龐公邢恕別邵康節詩
