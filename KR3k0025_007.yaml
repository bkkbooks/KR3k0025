body:
  text: 事理倒置經以妾為妻以孽代宗詩白華俾晝作夜詩蕩故不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮孝經子庖有肥肉廄有肥馬民有飢色野有餓莩孟史賤妨貴少陵長遠間親新間舊小加大淫破義所謂六逆也左隱四年婦養姑者也虧姑以成婦逆莫大焉左襄二年鸞鳳伏竄兮鴟梟翱翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂伯夷貪兮謂盜跖廉史記賈生傳章甫薦屨西漢賈誼傳猶塞川原而為潢汗西漢食貨志本末舛逆首尾衡決西漢賈誼傳荀悅曰簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛略修身之道而求衆人之譽割衣食之業以供饗宴之好通監西漢汲黯曰陛下用群臣如積薪後來者居上西漢本傳群小得志士大夫皆喪氣通監漢靈紀足反居上首顧居下倒懸如此莫之能解猶為國有人乎非亶師古音但倒懸而已西漢賈誼傳今世俗謂不智者為能謂智者為不能西漢鮑宣傳聽納小吏雕琢大臣前漢朱雲傳鷹隼橫厲鸞徘徊兮西漢息夫躬傳論大道則先黃老而後六經西漢司馬遷傳贊楊賜曰冠屨倒易陵谷代處通監保字螟蛉剿拉同氣通監宋紀魏徵曰隋末百姓彊而陵官吏通監太宗倒持太阿授之以柄唐吳兢傳談糟粕棄醇醪傳記直如絃死道邊曲如鉤反封侯李固外傳互入怨望集衆烏皆有行列兮鳳獨翔而無所薄楚辭鳳凰不翔兮鶉鷃飛揚蔡女黜而出帷兮戎婦入而綵繡服菽藟兮蔓衍芳虈兮挫枯鵠竄兮枳棘鵜集兮帷幄腥臊並御芳不得薄兮並同上嫫母衣錦西施負薪李白鳳凰在笯兮雞鶩翔舞楚辭停潦魚招獺空倉鼠敵貓元微之鬱鬱澗底松離離山上苗以彼徑寸莖蔭此百尺條左太沖詠史詩群沙穢明珠衆草凌孤芳李白蘋蘭憔悴兮稂莠繁滋麟鳳匿跡兮梟獍騰威憒匠罷斧兮拙者搆之離婁閉目兮瞽者揚眉子都蒙袂兮敦冶騁姿皮日休幽桂遺蓁菅韓文互入去所馬厭榖兮士不厭糠籺土被文繡兮士無短褐韓文本朝駑駘自飽方爭路騕裊長飢不在間臨川集經火炎崑岡玉石俱焚書嗣征子駑驥同轅玉石相揉孔叢子史牛驥同皂西漢鄒陽傳李膺謂鍾覲曰公何太無皂白後漢書黃金與土同價南史冠冕隸皂混為一區唐書傳記從風縱火荻芝俱死焦氏易林集玉與石而同匱貫魚眼與珠璣駑駿雜而不分服罷牛而驂驥并茅絲以為索菎蕗雜於靡蒸以留切麻莖皮茅絲兮同綜冠屨兮共絇同揉玉石兮一概而相量苦稱量之不審兮同權概而就衡並楚辭鳳闕悲巢鵩鵷行亂野麋元微之火炎崑嶽礫石與琬琰俱焚嚴霜夜零蕭艾與芝蘭共盡劉孝標論齊竽混夏韶燕石廁琳琅白樂天濫吹混奏於齊竽駱賓王昔虞阪之上逸驥與駑駘俱疲吳竈之中孤桐共樵蘇並爨唐韋縚作孟浩然後序本朝家雞野鶩同登俎坡詩天邊鴻鴈不易得便令作對隨家雞同上經采采卷耳不盈頃筐嗟我懷人置彼周行詩卷耳終朝采緑不盈一掬詩采緑終朝采藍不盈一襜同上子百里奚爵祿不入於心故飯牛而牛肥莊山木互入精專采易得之物實易滿之器以懷人置周行之心二之則不能滿荀齊人有欲金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金列互入貪迷白刃捍乎胸則目不見流矢荀強國目不兩視而明耳不兩聽而聰荀逐獸者目不見太山嗜欲在外則明有所蔽淮南互入貪迷夫目察秋毫之末而耳不聞雷霆之聲耳調金石之聲而目不見太山之高小有所志則大有所忘淮南使左手畫方右手畫圓令一時俱成雖執規矩之心回剟劂之手而不能者由心不兩用則手不並運離婁察秋毫之鋭不聞雷霆之聲季子聽清角之韻不見嵩岱之形劉史明有所不見聽有所不聞雖賢不能左畫方右畫圓史記董仲舒下帷講誦三年不窺園西漢本傳互入精專劉峻勤學行常讀書不息地有坑坎每常倒蹶然後始悟梁書傳記目察秋毫之末者視不能見太山耳聽清濁之調者聽不聞雷霆之聲何也唯其意有所偏也說苑雜言篇賈島為詩當其苦吟雖逢公卿貴人皆不之覺一日見京兆尹跨驢不避呼詰之久乃釋唐書韓愈傳互入詩褚遂良為太宗哀冊自朝還馬誤入人家而不覺隋唐佳話集仰面貪看鳥回頭錯應人杜詩本朝方其得意於五物也太山在前而不見疾雷破柱而不驚六一居士傳吾將使世人左手運斤而右手執削目數飛鴈而耳節鳴鼓首肯旁人而足識梯級雖有知者有所不暇矣東坡大悲閣記子事物交滑如理亂棼如涉驚浸一則以之怵惕一則以之忌諱一則以之懲創是則一日之間一時之頃而徑寸之地如炎如冰矣子華子人有亡鈇者意其鄰之子視其行步竊鈇也顏色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇音掘其谷而得鈇它日復見其鄰之子動作態度無似竊鈇者列互入事久論定心憂恐則口銜芻豢而不知其味耳聽鐘鼓而不知其聲目視黼黻而不知其狀輕暖乎簟而體不知其安荀昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也韓昔彌子瑕有寵於衛君與君遊於果園食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛弛得罪於君曰是固嘗啖我以餘桃同上史昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑左昭二十八年田單將攻狄見魯仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乘之燕復齊之墟今攻狄不下何也仲連曰將軍之在即墨坐則織蕢立則仗鍤為士卒倡當此之時將軍有死之心士卒無生之氣所以破燕也今將軍東有澠池之奉西有淄上之娛黃金橫帶而騁乎淄澠之間有生之樂無死之心所以不勝也通監周赧王四十三年子夏門人之高第也猶云出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自決而況中庸以下漸漬於失教被服於成俗乎史記禮書李廣出獵見草中石以為虎而射之中石沒矢視之石也它日射之終不能入矣西漢本傳物之興衰情之起伏理有固然矣而崇替去來之甚者必唯寵惑乎當其接床第承恩色雖險情贅行莫不德焉及至移意愛析嬿私雖惠心妍狀愈獻醜焉愛升則天下不足容其高歡墜故九服無所逃其命東漢皇后紀論韋曜素飲酒不過二升孫皓初見禮異時常為裁減或密賜茶茗以當酒至於寵衰更見逼強輒以為罪吳志樂廣嘗有親客久闊不復來廣問其故答曰前在坐蒙賜酒方飲見杯中蛇意甚惡之既飲而疾于時河南廳事壁上有角漆畫作蛇廣意杯中蛇即角影也復置酒於前處謂客曰杯中復有所見不答曰所見如初廣乃告其所以客豁然意解沉痾頓愈晉書苻堅敗于淝水餘衆奔潰聞風聲鶴唳皆以為王師至謝玄傳互入恐懼望風而靡二門傳記熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢躍無跡韓詩外傳應郴為汲令請主簿杜宣賜酒時北壁上有掛赤弩照於杯中其影如蛇宣惡之便得疾云蛇入腹後郴使宣於故處設酒杯中復有蛇因謂宣曰此乃壁上弩影耳非有他怪宣意遂解風俗通芭蕉葉上無愁雨自是多情聽斷腸雅言系述集服藥求汗或有弗獲而愧情一集渙然流離終朝未餐則囂然思食而魯子銜哀七日不飢夜分而坐則低迷思寢內懷殷憂則達旦不瞑徑刷理鬢醇醴發顏僅乃得之壯士之怒赫然殊觀植髮衝冠文選嵇康養生論昔賈氏之如皋姑解顏於一箭醜夫為之改貌憾妻為之釋怨射雉賦居歡惜夜促在戚怨宵長選情詩互入好惡不同匪外物兮或改固歡哀兮情換潘安仁自緣今日人心別未必秋香一夜衰唐鄭谷詩謂十日菊花澗谷之水深不過咫尺丘垤之山高不踰尋丈人則狎而玩之及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悸栗眩惑自失所觀變於前所守易於內韓文始知無正色愛惡隨人情白樂天舉食於人當飢渴之望也一飯千金及飫而進於前雖海陸備鼎顧與糠籺齒沈下賢本朝唐莊宗問郭崇韜曰昔吾與梁對壘於河上雖祁寒盛暑披甲跨馬不以為勞今吾居深宮蔭廣廈不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意艱難逸豫為慮不同勢自然也續世說第十論八珍者必咽言糞穢者必唾二者未嘗與我接也唾與咽何從生哉東坡問養生食中有蛆人之見者必嘔也其不見而食者未嘗嘔也同上經同聲相應高下不必均也同氣相求體質不必齊也易略例上史祁大夫外舉不棄讎內舉不失親左襄二十一年互入徇公忘私晉魏獻子為政魏戊為梗陽大夫獻子庶子左昭二十八年庾亮在武昌諸佐吏商浩之徒乘秋夜往共登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺便據胡床而坐與浩等談詠晉書吳中士夫家有好竹王徽之欲觀之便造竹下諷嘯良久主人灑掃請坐徽之不顧將出主人乃閉門徽之以此賞之盡歡而去晉書王徽之傳陶潛既絶州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反晉書本傳互入相忘形跡或告右丞相魏徵私其親戚上使溫彥博按之曰徵不存形跡遠避嫌疑心雖無私亦有可責通監唐太宗崔祐甫作相未逾年凡除吏幾八百多稱允當上曰有人謗卿除擬官多涉親故如何祐甫曰進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲譴之由實在於此舊唐書本傳互入徇公忘私韋貫之為監察御史舉其弟纁自代新唐書本傳高元裕為中丞文宗難其代表言兄逸少才可任因以命之同上傳記晉王徽之有雋才少為桓沖參軍從沖值雨便下馬入沖車中謂曰豈有獨擅一車不容國士乎世說互入寮屬集古之知己者不待來求而後施德舉能而已其受德者不待成身而後拜賜感知而已故不叩而響不介而合則其舉必至而其感亦甚柳文啓本朝王子猷之愛竹造門不問於主人陶淵明之臥輿遇酒便留於道士歐公文集互入間適
