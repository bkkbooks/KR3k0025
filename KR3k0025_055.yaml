body:
  text: 妄自尊大經侮慢自賢書大禹謨自廣以狹人書咸有一德謂人莫己若者亡書仲虺之誥子好臣其所教而不好臣其所受教孟盜跖謂孔子曰長大美好人見而悅者此吾父母遺德丘雖不吾譽吾不自知耶莊史以為皆出己下史記殷本紀其辭自稱天地所生日月所置胸奴大單于通監漢文紀馬援曰子陽井底蛙耳而妄自尊大公孫述郤詵曰臣對策為天下第一猶桂林之一枝崑山之片玉晉書本傳宜都王穆壽自恃任位以為人莫己若謂其子師曰但令吾兒及我亦足勝人不須苦之後魏書鄭仁表自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表唐書杜審言嘗與人曰吾文章當得屈宋作衙官吾筆當得王羲之北面唐書本傳互入妄誕傳記魏權云我視沈約正如奴耳關東風俗傳本朝韓浦韓洎咸有詞學浦常輕洎語人曰吾兄為文譬如繩樞草舍聊庇風雨豫之為文是造五鳳樓手筆談互入譽己毀人雀兒來往揚風高下視鷹鸇氣意豪自謂能生千里翼黃昏依舊入蓬蒿古今詩話經愚而好自用賤而好自專記中庸互入專擅子子曰君子而強氣則不得其死小人而強氣則刑戮荐臻家語既不能令又不受命孟離婁上是猶弟子而恥受命於先師也孟人有三不祥幼而不肯事長賤而不肯事貴不肖而不肯事賢是人之三不祥也荀非相勢不在人上而羞為人之下是姦人之心也荀仲尼史既不能強又不能弱左僖七年屈強於此西漢陸賈傳保殘守缺挾恐見破之私意而無從善服義之公心西漢劉歆傳曹景宗為人自恃尚勝每作書字有不解不以問人皆以意造南齊書本傳遣裴度至魏博宣慰以錢五百萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成德鄆充使者數輩見之嘆曰倔強者果何益乎通監唐憲宗互入人心易惑傳記不循經典自任胸懷史通惟蛇舊所識實憚口眼獰開籠聽其去鬱屈終不平韓文集譬猶鷇卵始生翰毛而便陸梁放肆陳孔璋檄經六四括囊無咎無譽易坤卦用晦而明易明夷卦聖人以此洗心退藏於密易繫辭明夷務暗易略例不顯其光詩大明靡哲不愚詩抑衣錦尚絅惡其文之著也記中庸有美玉於斯韞櫝而藏諸語子罕邦無道則可卷而懷之語子大成若缺大盈若沖大直若屈大巧若拙大辨若訥老大成若缺章光而不耀老千金之珠必在九重之淵列朴素而天下莫能與之爭美莊天道大白若辱盛德若不足莊外物篇美珠不文質有餘也淮南仁哉樂毅善藏其用文中史子房無知名無勇功史記太史公自序直不疑所臨為官惟恐人知其為吏迹不好立名稱史記本傳良賈深藏若虛君子盛德容貌若愚史記老子傳丙吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩故朝廷莫能明其功也通監漢宣紀鄧禹勳成智隱靜其如愚後漢本傳范曄曰黃憲言論風旨無所傳聞東漢匿景藏采不揚華藻東漢孟嘗傳管寧曰潛龍以不見成德通監後漢諸將每論功伐復未嘗有言帝輒曰賈君之功我自知之通監漢明紀假令奮翅則能陵厲玄霄騁足則能追風躡景猶欲戢徑翮於鶴鷃之群藏逸迹於跛驢之伍晉書葛洪傳柳芳曰元齡佐太宗定天下及終相位凡三十二年天下號為賢相然無迹可尋亦至矣故太宗定禍亂而房杜不言功通監唐太宗傳記吾聞聖人不居朝廷必在巫醫嵇康高士傳王湛隱德人莫之知雖兄弟宗族亦以為癡世説中金石生於沙中豫章産於幽谷新語集巧倕不斫楚辭曖曖內含光崔子玉座右銘退不飾詩書以驚愚進不買名聲於天下江文通書立言必雅未嘗顯其所長王文憲集序緒言餘論蘊而莫傳劉孝標書明不外飾默照於玄機敏實內融養蒙於用晦陳子昂集有天下大名而不以矜人同上瓊草隱深谷李白集忌滿光常缺駱賓王韜爾智斧無為自伐劉賓客玉櫝不啓焉能瑕疵劉賓客彼惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也韓文幽塞末光彌縮銛利同上匿德藏光退居保和柳梓人善運衆工而不伐藝柳梓人傳且免材為纍何妨拙有機杜牧之用光本於藏曜履行期於滅迹張九齡文神醫不言術元稹集囊藏透穎錐元微之集欲知花好處偏在最深叢同上晦即全身藥明為伐性兵白侍郎集互入警戒廟算無遺策天兵不戰功白傳集匣刃不試呂和叔文韜用而光潔唐文粹不喜伐露衆人皆察察而我獨昏昏同上本朝歐公知穎州呂公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之遺事互入知人乍為含垢千尋濁不作矜人一掬清僧參寥子經不患人之不己知患不知人也語子曰人不知而不慍不亦君子乎語學而子芝蘭生於深林不以無人而不芳家語為善於家荀舟浮江海不為莫乘而沈君子行道不為莫知而止文子荃蓀孤植不以巖隱而歇其芳石泉潛流不以澗幽而不清劉集蘭之徛徛揚揚其香不採而佩於蘭何傷韓文徛蘭操如楩柟生于深林未始自貴而度材者一盻歆然在懷劉賓客無人自芳馨白侍郎本朝不為遊人只自芳陳後山詩經小人之道的然而日亡記中庸子飾智以驚愚修身以明汙昭昭乎如揭日月而行莊山木的的者獲提提者射淮南史為天下表的通監漢光武虛名無實徒足為世之質的將安用之通監晉安紀王勃等有才而浮躁衒露唐書裴行儉傳皓皓者易汙嶢嶢者難全魏證傳贊揚己取名瞭然使戶曉者蓋房杜之細耶唐書傳記鵠的非咎罪於人少長貴賤則同心以貫之何也惡其示人以難也戰國策郝隆七月七日日中仰臥人問其故答曰我曬腹中書世説集露才揚己班固説楚辭木秀於林風必摧之堆出於岸流必湍之李蕭遠運命論互入因才取禍本朝昭昭然自為的於天下使天下之過者莫不欲援弓而射之東坡孟子論經自獻其身記坊記子自鬻以成其君孟大冶鑄金金踴躍曰我且必為鏌釾大冶必以為不祥之金莊大宗師史漢武初即位四方士上書自衒鬻者以千數西漢東方朔傳有郎功高不調自言安世安世應曰君之功高明主所知人臣執事何長短而自言乎通監漢宣紀謝萬善自衒曜晉書本傳舒元輿自負才有過人者鋭進取太和中獻文闕下久不得報上書自言馬周張嘉貞代人作奏卒為名臣今臣備位于朝自陳文章凡五晦朔不一報竊自謂才不後周嘉貞也新唐書本傳武后時和逢堯負鼎詣闕下上書自言願助天子和飪百度唐書和逢堯傳集自衒自媒者士女之醜行也干時求進者道家之明忌也曹子建求自試表經帝咨禹平水土禹讓于稷契及皋陶咨垂共工垂讓于殳斨暨伯與咨益作虞益讓于朱虎熊罷咨伯作秩宗伯讓于夔龍書舜典推賢遜能庶官乃和書周官互入謙抑善則稱人記坊記觴酒豆肉讓而受惡衽席之上讓而坐下朝廷之位讓而就賤同上君子尊讓則不爭不爭則遠於鬭辨矣不鬥辨則無暴亂之禍矣斯君子之所以免於人禍也記鄉飲酒義如其禮樂以俟君子語子辭讓之心禮之端也孟夫惟不爭故無尤老子上善若水章聖人之道為而不爭老信言不美章夫惟不爭故天下莫能與之爭老曲則全章如其制作以俟明哲文中史秦伯享晉公子子犯曰吾不如衰之文也請使衰從公子重耳也衰趙衰也左襄二十三年晉卻伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如卻伯對曰庾所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉左成二年范宣子讓其下皆讓左互入表率相如退而讓頗名重太山史記本傳論相如每朝會不與廉頗同列望見廉頗引車避匿史記本傳張儀曰蘇君之時儀何敢言史記張儀傳陳平曰高祖時勃功不如臣及誅諸呂臣功亦不如勃願以右丞相讓勃通監漢高后舜命九官濟濟相遜前漢劉向傳衛綰有功常讓他將西漢本傳事有功善推之於下通監漢宣紀唐彬與王濬共伐吳彬知賊冠己殄孫皓將降未至建鄴二百里稱疾遲留以示不競果有先到者爭物後到者爭功晉書本傳以鼎足任重而終辭三事固求罷職晉書載記湯騖傳臣有何功可以堪之何心可以安之身辱高任傾覆尋至願守先人之敝廬豈可得哉臣不能推其德達其功使聖聽知勝臣者多未達者不少假令有遺德於版築之下有隱才於屠釣之間而朝議用臣不以為非臣處之不以為愧所失豈不大哉臣忝竊雖久未若今日兼文武之極寵等宰輔之高位也晉書上賞謝眺之功遷尚書吏部郎眺上表三讓上不許中書疑眺之未及讓國子祭酒沈約曰近世小官不讓遂成常俗謝吏部今授超階讓別有意夫讓出人情豈關官之大小邪通監唐高祖隋高熲深避權勢上表遜讓於蘇威通監陳紀盧懷謹同平章事自以才不及姚崇事皆推而不專唐書本傳孜孜奉國知無不為臣不如元齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟煩治劇衆務必舉臣不如胄以諫諍為心恥君不及堯舜臣不如證唐王圭傳互入明於自知每議事元齡必曰非如晦莫籌之及如晦至卒用元齡策也新唐書杜如晦傳本朝乃者河決澶淵毒流淮泗百堵皆作蓋僚吏之劬勞三版不沈本朝廷之威德而臣下掠衆美上貪天功獨竊璽書之榮以為私室之寶東坡徐州謝表史貪天之功以為己力左僖二十四年吳起事魯君齊人攻魯魯欲將吳起起娶齊女為妻而魯疑之起欲就名遂殺其妻以明不與齊也史記本傳互入殘忍諸將爭功紛紜不已淮安王神通曰房元齡杜如晦等專弄刀筆功居臣上通監唐太宗傳記齊欲伐魏淳于髡曰韓盧天下之疾犬東郭逡海內之狡兔盧逐逡環山者三騰山者五兔極於前犬廢於後犬兔俱罷各死其處田父見而擅其功戰國策互入與人為地
