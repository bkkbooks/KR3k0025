body:
  text: 少壯經壯有所用記禮運童子不裘不帛玉藻十年曰幼學二十曰弱冠三十曰壯有室四十曰強而仕曲禮上七年曰悼悼有罪不加刑同上少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬭語子壯者以暇日修其孝弟忠信入以事其父兄出以事其長上夫人幼而學之壯而欲行之孟子師曠曰少而學者如日出之光壯而學者如日中之光范子史君之齒未也左文元年額上有壯髮前趙后傳春秋鼎盛賈誼傳集兒童稚齒選閑居賦弱冠秀髮辯亡少年負壯氣選意氣敷腴在盛年鮑昭行路難甫昔少年日早充觀國賓杜詩我年十八九壯氣橫胸中韓文經伏生年過九十失其本經口以傳授書序史衛武公年數九十有五矣猶箴儆於國曰自卿以下至于師長士苟在朝者無謂我老耄而舍我朝夕以交戒我國語趙王使使視廉頗尚可用否頗一飯斗米肉十斤使還報廉將軍雖老尚善飯史本傳先零反趙充國年七十餘上問誰可將充國曰亡踰於老臣願至金城圖上方略前本傳馬援年六十二請擊五溪蠻曰臣尚能被甲上馬乃據鞍顧盻以示可用帝笑曰矍鑠哉是翁也東漢本傳徂年已流壯情方勇同上胡廣為三公年已八十而心力克壯達練事體明解朝章雖無蹇直之風屢有補闕之益本傳髫髮厲志白首不襄伏湛傳呂尚七十氣冠三軍高彪箴呂岱年已八十體素精勤躬親王事通監魏邵陵厲公紀羅結為侍中總三十六曹事時年一百七精爽不襄魏主以其忠愨任之使兼長秋卿監典後宮出入臥內年一百十乃聽歸老又十年乃卒晉紀傳隆年七十猶手自書籍躬加隱校齊太祖紀沈驎年過八十耳目猶聰明手寫細書三二年滿數十篋齊書身老而才壯齒宿而意新唐李百藥傳裴度年雖老精明不襄本傳吐谷渾冠邊李靖以足疾見房元齡曰吾雖老尚堪一行乃決策深入大戰數十殘其國李靖傳集老驥伏櫪志在千里烈士暮年壯心不已魏武帝樂府歌張公一生江海客身長九尺鬚眉蒼徵起適遇風雲會扶顛始知籌策長杜詩丹心老未折同上矍鑠據鞍時騁健慇懃把酒尚多情劉賓客矍鑠誇身健白集酒軍詩敵如相遇臨老猶能一據鞍襟懷轉瀟洒氣力彌精堅並同上本朝莫欺九尺鬚眉白解醉佳人錦瑟旁花間著雨老猶能李後山經八十九十曰耄耄有罪不加刑焉記曲禮再赦曰老旄禮司剌殘年餘力不能毀山之一毛列子湯問史老夫耄矣無能為也左隱四年諺所謂老將知而耄及之昭元田光曰臣精已消亡矣史荊軻傳光一作芫吾形已不逮也同上丹老人忘其前語漢師丹傳喬琳衰老耳聵上或時訪問應對失次通監唐德宗紀集年未四十而視茫茫而髮蒼蒼而齒牙動搖韓文酸寒漂陽尉五十幾何耄同上年既老矣耄又及之杜弼東魏檄桑榆之光未暮蒲柳之質先零強年過猶近襄相來何速白集經一握為笑易卒卦笑言啞啞震卦且以喜樂載笑載言詩燕笑語兮蓼蕭人喜則陶陶斯詠詠斯猶猶斯舞記檀弓下樂然後笑夫子莞爾而笑語子喜而不寐舉欣欣然有喜色孟子囅然而笑莊子囅丑刃反史粲然皆笑左昭公司馬季主捧腹大笑史記大笑冠纓索絕淳于髡傳聽然而笑前揚雄傳壹關相樂斯亦可矣薛宣傳關古笑字匡說詩解人頤匡衡傳拂衣而喜楊惲傳逌爾而笑班固賓戲俯而掩口盧胡而笑後應劭傳拊掌歡笑通監晉武帝紀謝安得謝元破符堅書心喜甚過戶不覺屣齒之折晉本傳喜津津出眉宇間唐李林甫傳記合坐皆笑謂之烘堂烘堂笑不罰唐三院制人情喜則悅集囅然而笑大笑兒選左太沖吳都賦陽氣見於眉宇之間七發本朝一家喜氣如春醲坡詩掀髯一笑坡書經行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求詩黍離心之憂矣如匪澣衣靜言思之不能奮飛柏舟耿耿不寐如有隱憂憂心悄悄並同上心之憂矣不遑假寐小弁疢如疾首同上心之憂矣如或結之正月憂心惸惸同上逢此百憂尚寐無覺兔爰注逢此百憂謂不樂其生者寐不欲覺之謂我心蘊結素冠憂心如酲節南山色憂不滿容記文王世子子損言笑列子說符夫憂患之來攖人心也非直蜂蠆之螫毒而蚊虻之慘怛也淮南子心有憂者筐床衽席弗能安也菰飯芻牛弗能甘也琴瑟鳴竽弗能樂也同上詮言訓史虞卿非窮愁亦不能著書以自見於世史本傳互入窮困憂懣不食前石顯傳懣音悶未嘗解顏唐文宗紀彫肝焦慮不皇寧息晉書集憂思煩亂精神越散楚辭心沸熱其若湯編愁苦以為膺步徙倚而搖思怊音超惝恍而永懷意荒忽而流蕩心愁悽而增悲並同上愁非和而自來憂試排而不卻梁劉孝機歎別賦腸一日而九迴司馬遷報任少卿書置酒欲飲悲來填膺選江文通恨賦憂人不能寐耿耿夜何長傷歌行絲竹徒滿坐憂人不解顏東門行誰知一寸心乃有萬斛愁攻許愁城終不破蕩許愁門終不開許一作與何物煮愁能得熟何物燒愁能得燃閉門欲驅愁愁終不肯去深藏欲避愁愁已知人處庾信愁賦精散思越罔若有失荅東阿王書白髮三千尺緣愁似個長李白何人錯憶窮愁日愁日愁隨一線長杜詩憂悶心飛揚窮愁但有骨並同上數盃澆腸雖暫醉皎皎萬慮醒還新韓文自然愁氣損天和安得康健保天性同上傷心自比籠中鶴剪盡翅翎愁到身元微之愁腸無可醫杜荀鶴集愁色常在目歡容不上面唐文粹如何一寸心千愁萬愁入皮日休坎壈懷百憂鮑昭詩本朝醉時萬慮一掃空醒後紛紛如宿草東坡經洊雷震君子以恐懼修省易震卦君子終日乾乾夕惕若厲無咎乾卦危熏心也艮卦若涉淵水書大誥慄慄危懼若將隕于深淵湯誥怵惕惟厲中夜以興思免厥愆冏命心之憂危若蹈虎尾涉于春冰君牙戰戰兢兢如臨深淵如履薄冰詩小旻如集于木如臨于谷小宛注恐隕也謂天蓋高不敢不跼謂地蓋厚不敢不蹐詩子危行側視振動悼慄處勢不便未足以逞其能也莊子互見怨恨失勢史道路以目史周本紀色如死灰滑稽傳李斯曰斯本上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則襄吾未知所稅駕也本傳破膽寒心前谷永傳師古言懼甚重足一跡不寒而栗義縱傳杜門齰舌灌夫傳重足而立側目而視汲黯傳朝廷多事督責大臣自公孫弘後丞相比坐事死石慶雖以謹得終然數被譴公孫賀引拜為丞相不受印綬頓首涕泣不肯起上乃起賀不得已拜出曰我從是殆矣通監漢武紀驚懼不知所言汗出洽背徒唯唯而已漢宣紀人有懼心精銳銷耎漢成紀兢兢如履冰慄慄如不滿日光武紀注楊國忠謂客曰吾本寒家一旦緣椒房至此未知稅駕之所唐紀如居風濤洶洶靡定同上朝士每朝輒與家人訣曰未知復相見否武后紀崇高之位憂重責深後楊震傳舉頭畏觸搖足恐墮內獨怖急乍冰乍火趙壹窮鳥賦符堅同符融伐晉堅登城望王師部陣齊整將士精銳又北望八公山草木皆類人形顧謂融曰此亦勍敵也憮然有懼色晉符堅傳傳記向鵬衢而自愧瞻鶂路以驚魂白帖集若負芒剌於背選豪士賦五內震駭選書累卵疊棊觀形懷怛魏都賦眾毀所歸不寒而慄報孫會宗書喪精亡魂失歸忘趍東京賦弱肉飛時攢箭險蹇驢行處薄冰危施肩吾詩危素卵之累殼甚玄燕之巢幕潘安仁西征賦危冬葉之待霜同上身寄虎吻危同朝露桓元子表心折骨寒江文通別賦瑟縮不安韓文駭汗如雨同上鷙鳥之高翔兮㜸狐惴而弗食柳弔萇弘魂驚怯怒蛙柳詩傷弓未息新驚鳥白集心魂不寧手足無措慄然如履春冰凜然若馭朽索相目而變色並同上咋舌不敢言吞冤銜忍劉賓客進退惟谷冰炭在懷重兢累媿並同上隼猜鴻蓄縮虎橫犬迍邅元微之落羽更分飛誰能不驚骨孟浩然周章跼蹐胡顏自安劉賓客本朝瑟縮愈不安坡詩鍼氈無穩坐劍米有危炊並同上
