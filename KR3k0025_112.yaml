body:
  text: 家世經惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常書君牙亦惟先王克左右昭事厥辟書文侯之命周公之孫莊公之子詩閟宮子周公曰我文王之為子武王之為弟成王之為叔吾於天下不賤矣荀堯問薛公曰是其家傳七世矣家傳儒業皆有經濟之道文中子禮藥篇薛公曰王氏有祖父焉有子孫焉同上史叔禽叔椒子羽皆大家也羊舌四族皆強家也左昭五萬石君及四子皆二千石人臣尊寵乃集其門號萬石君史本傳項氏世世為楚將史記項羽記蘇武曰武父子位列將爵通侯兄弟親近西漢本傳太傅在前少傅在後父子並為師傅朝廷以為榮西漢疏廣傳時廣為太傅廣兄子受為少傅太子每朝太傅在前少傅在後纍世名貴人史記秦紀鄧氏纍世寵貴凡侯者二十九人公二人大將軍以下十三人其餘不可勝數東京莫盛於此後漢鄧禹傳王僧虔戒子書曰王家門中優者如龍鳳劣者猶虎豹南史傳龜襲紫後漢陰識傳贊五世相韓西漢張良傳汲黯之先有寵於古之衛君至黯十世世為卿大夫西漢本傳自楊震至彪四世太尉德業相繼與袁氏俱為東京名族東漢本傳漢興惟韋平父子至宰相西漢平當傳金日磾世名忠孝七世內侍西漢本傳贊耿氏自中興後訖建安之末大將軍二人將軍九人卿十三人列侯十九人中郎將剌史二千石數十百人與漢興衰後漢耿恭傳世吏一千石至祜九世並以清德聞晉羊祜傳陸機曰我父祖名播四海晉書本傳中興桓氏尤盛自榮至典世宗其道父子兄弟代作帝師范曄後漢傳伏生自東西京相襲為名儒以取爵位後漢魏主雅重門族通鑑百四十三齊高祖魏韓顯宗曰門望者乃其父祖之遺烈通鑑齊紀崔儼諫議大夫其群從數十人自興寧里謁大明宮冠蓋騶哄相望每歲時宴于家以一榻置笏猶重積其上琳與弟太子詹事圭光祿卿瑤俱列棨戟世號三戟崔家新唐書本傳張潛官至魏州剌史沛同州剌史洽衛尉卿涉殿中監父子兄弟五人皆至三品官時人謂之萬石張家唐書張文瓘傳王從易昆仲三人開元中鳳閣舍人故號鳳閣王家唐書本傳自李德林至伯藥安期三世掌制詔唐書自蕭瑀逮遘凡八葉宰相名德相望與唐盛衰世家之盛古未有也唐書本贊唐袁明遠祖滂為漢司徒自滂至明凡十二世其間位司徒司空者四世唐書本傳杜氏大族尊行不翅數十人通鑑二百三十九唐憲宗則天以王方慶家多書籍訪求右軍遺迹方慶奏曰臣十代從伯祖羲之書先有四十餘紙正觀十三年太宗購求先臣並已進之唯有一卷見在今又進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寶五代祖騫高祖規曾祖褒并九代三從伯祖晉中書令獻之已下二十八人書共十卷舊唐書本傳德宗召溫造至謂之曰卿誰家子曰臣五代祖大雅外五代祖李績唐書本傳竇氏自武德以來尚主者八人女為王妃者六人唐世貴盛莫與為比唐書崔湜遷兵部侍郎父挹為吏部侍郎父子同為南省副二有唐以來未有是事唐書世祖問天下諸杜何處望高殷浩曰京兆為美後魏書戴胄子至德父子繼為宰相世詫其榮唐書戴至德傳韋思謙子承慶嗣立父子並為宰相世罕其比唐書張嘉貞子延賞延賞子弘靖時號一門三相唐書傳記竇禹鈞有子五人俱進士及第馮道詩云燕山竇十郎教子有義方靈椿一株老丹桂五枝芳時號竇氏五龍類説世重高門人輕寒族競以姓望所出邑里相矜若仲遠之尋鄭玄先云汝南應劭文舉之對曹操自謂魯國孔融史通集幸賴先君之靈免負簷之勤選書忝藉世賢選彈文金張藉舊業七葉珥漢貂左太沖詠史詩席寵門緒陳子昂實公侯之子孫有山河之氣象同上家世以清白崇德同上蟬聯圭組世為顯著李太白門閥冠雲霄杜詩名家莫出杜陵人杜詩家聲蓋六合杜詩世言氏族者署為關內甲姓劉賓客莊憲皇太后之弟今天子之舅太師之子太尉之孫司徒之曾孫韓文公神道碑路氏得姓歷二千年凡二十三世世稱德門人不得並韓文房故為宦族稱世有人自太尉琯以德行為相相玄宗肅宗名聲益彰徹大行世號其門為太尉家宗族子弟皆法象其賢韓文唐故興元少尹房君墓志昔韋孟以詩禮傳楚而郊廟之制卒正於玄成鄭玄以箋注師漢而禪代之儀卒集於小同賈誼以經術起而嘉最好學盧植以儒學用而諶為祭酒舊史咸以為榮柳文漢司徒禹之世也柳文奕奕四世崔為之冠劉賓客集言冠冕者許為世雄言門閥者許為時表劉賓客集家聲烜赫冠前賢同上世家表甲地白樂天清望標門榮冠山東之族同上杜氏大族枝蔓蟬聯杜牧之朝廷典章飽於聞見杜牧之名卿賢相之家清風素範之族子孫森羅髦俊並作同上晉室簪纓宋朝人物謝萬已富貴孟視尋處威權而安石東山尚為匹士彥重白屋猶是布衣未有鴻鴈成行鶺鴒接翼李義山文鄭晦族清胄貴杜牧之集地甲門闌大元微文世祿金張貴孟浩然鍾石享於祖考帶礪傳於子孫唐文粹一門四節輝耀當時同上德門之裔同上門為上族同上簪笏自懷繃韓文祖孫相望同上庭列鍾彝笥傳組綬司空表聖文杜氏大家世有顯人韓文墓志欒卻門風大羅隱集子父諸孫盈于室堂公姑悅喜五福具有大夫士家孰不榮羡韓祭文本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳天下以陳氏世家為榮神道碑漢諸袁之父子四世繼出五公唐諸溫之弟子同時並列三省東坡集家聲奕奕蓋并涼東坡詩南齊柳元伯之子五人皆領郡號五馬史無之見程厚東坡寒食詩注第四卷君家兄弟真連璧門十朱輪家萬石坡詩靈運子孫俱得鳳慈明兄弟孰非龍坡詩族大徽音遠欒城集史太史公曰平原君翩翩濁世之佳公子也史記世家子弟西漢食貨志如淳曰世世有祿秩家也宛孔氏有遊間公子之名西漢食貨志師古曰言其舉動性行有以似之也李德裕曰朝廷顯官須公卿子弟為之何者少習其業目熟朝廷事臺閣之儀不教而自成寒士縱有出人之材固不能間習也則子弟未易可輕唐選舉志越公兒郎故有家風隋書楊洪傳互入克紹傳記王謝家子弟奕奕皆有一種風氣隋僧智果評書集王孫公子不鏤自雕非鸞則鳳魏王冏表觀者尚識承平王孫故態柳文真房太尉家子孫也韓墓碑本朝蘭砌傳芳鯉庭稟訓臨川集東山子弟家風在歐公詩閨庭蘭玉照鄉閭東坡集子傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟子告子下互見人生罔測門史甘茂起下蔡閭閻顯名諸侯史本傳論陳涉非王公大人名族之後史主父偃傳陳涉甕牖繩樞之子非有陶朱猗頓之富前漢項籍傳諸儒生多窶人子前漢書霍光傳卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜西漢公孫洪傳贊互見人生罔測門千秋無閥閲西漢田千秋傳黃憲世貧賤父為牛醫後漢本傳康成無紱冕之緒後漢沈約曰太公起屠釣為周師傅説去版築為殷相胡廣纍世農夫致位公相黃憲牛醫之子名重京師通鑑宋紀大明三年蕭曹樊灌皆起閭閻布衣至今推仰以為英賢豈在世祿乎通鑑唐紀牛仙客初為縣小吏開元二十四年為尚書唐書馬周一介草茅言天下事若素官于朝唐書本傳陳湯呂蒙馬隆孟觀悉出貧賤而勳伐甚高不聞其家世將帥也唐魏元忠封事唐元宗謂張九齡曰卿嫌仙客寒微如卿有何閥閲通鑑元宗紀傳記進士多貧士秦中歲時記集仲蔚孤緒元卿末裔任昉表不見公與相起身自犁鋤韓文本朝起於閭巷大其家室臨川子虎豹未成文而已有食牛之氣鴻鵠之鷇羽翼未合而已有四海之心尹子史李廣世世受射史本傳將門必有將相門必有相史記孟嘗君傳朱虛侯章曰臣將種也通鑑呂后紀諸葛恪少有名孫權見其父瑾曰藍田生玉真不虛也吳志本傳王猛之孫鎮惡善論軍國大事或薦鎮惡於劉裕與語説之曰吾聞將門有將鎮惡信然通鑑十五晉安紀謝莊七歲能屬文宋文帝曰藍田生玉南史本傳達奚震驍勇走及奔馬周文曰非此父不生此子北史傳記慧種生聖癡種生狂桂實生桂桐實生桐越絶書本朝鳳雛驥子生有種毛骨往往傳諸郎觀君崛鬱負奇表便合劍佩趍明光東坡集汗血固應生有種坡詩經子曰有教無類語衛靈公子謂仲尼曰犁牛之子騂且角語互入出類子以瞽叟為父而有舜以紂為兄之子而有微子啓王子比干孟子明月之珠出於蠬一作蚌蜄周之簡圭生於垢石大祭神龜出於溝壑淮南子説山訓史陳涉曰王侯將相寧有種乎史記陳世家虞世南子昶無才術歷將作少匠工部侍郎主工作許敬宗曰護兒兒作相世南男作匠文武豈有種耶新唐書來濟傳陳湯呂蒙馬隆孟觀悉出貧賤而勳閥甚高不聞其家世將帥也唐魏元忠封事互見白屋類集天其福人不在舊族揚雄之才非出孔氏芝草無根醴泉無源虞翻與弟書靈珠産無種彩雲出無根亦如彼姝子生此遐陋村白侍郎
