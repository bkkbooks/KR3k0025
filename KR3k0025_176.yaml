body:
  text: 祭奠經生芻一束其人如玉詩彼蒼者天殲我良人如可贖兮人百其身秦風黃鳥嘉薦普淖明齊溲酒儀禮士虞禮注孔子曰泰山其頹乎梁木其壞乎哲人其萎乎子貢曰泰山其頹則吾將安仰梁木其壞哲人其萎則吾將安放記檀弓上朝奠日出夕奠逮日喪不剝奠也剝猶倮也有牲肉則巾之為其久設塵埃加也醢酺之奠不巾魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父並記檀弓上史昊天不弔太山其頹范甯榖梁傳序曹操感玄知己及後過玄墓致祭自為文東漢橋玄傳郭林宗有母憂徐穉往弔之置生芻一束於廬前而去東漢徐穉傳徐穉有死喪負笈赴弔常於家預灸雞一隻以一兩綿絮漬酒暴乾以褁雞徑到祭所冢隧外以水漬綿使有酒氣㪷米飯白茅為藉以雞置前醊酒畢則去不見喪主謝承後漢書激浪之心未騁遽骨脩鱗凌雲之意將騰先灰勁翮晉陸喜傳有人哭和長輿曰峨峨若千丈松崩世說下一旦萬古梁武紀郄超死之日貴賤操筆為誄者四千餘人晉中興書集緒言餘論蘊而莫傳選高軌難追藏舟易遠駟隙不留尺波電謝同上凡我僚舊均哀共戚選碑幽靈髣彿歆我犧尊選祭古冢文山羞野酌選祭文在疾不省於亡不臨舉聲增慟哀有餘音選王仲宣誄文澄醪覆觴絲竹生塵素卷莫啟幄無談賓劉越石書鳥俛翼兮忘林魚仰沫兮失瀨遵吉路兮凶歸思其人兮已滅覽餘跡兮未夷昔同途兮今異世憶舊歡兮增新悲潘安仁誄存榮沒哀死而不朽陳太丘碑岩藪知名失聲揮涕郭有道碑梁崩哲萎于時靡憲同上半岳摧峰中河墜月南齊王融作逝川無待黃金難化沈約齊安陸碑耕夫釋耒桑婦下機文選晏晏言笑今成涕洟梁肅祭文梁岳頹峻豈徒春人不相傾廛罷肆而已齊竟陵王行狀長筭屈於短日遠跡頓於促路陸士衡吊魏武文峰頹朽壤波逝江潭山川若此人何以堪亦生亦滅如壑如舟千齡俱盡萬古誰留梁簡文帝文繐帳冥漠陸士衡弔文方謂拂羽喬木緬昇高雲忽遭大過棟橈而殞陳子昂集丹書不藏於勳府青史不昭於方冊一絕故老之口孰知夫子之賢宛然昨日交臂而悲天年既歿長夜何辰聖達不免宇宙同塵竟不能驤首雲路長鳴天衢知與不知咸皆共歎有餘恨也同上有濟世之量無長至之年鐘鳴漏盡竟蘭焚兮已上並陳子昂集解攜襟袖交臂存亡駱賓王溘從朝露焂掩夜臺過隙不留藏舟難固泉壤殊途幽明永隔感平生其若斯聊申絮酒儻聰明之不昧或薦簞醪同上芻靈就列遣奠停軌觴酒寫哀權載之樽酒簋貳涕零如雨權祭崔侍郎拜奠心碎萬事風燭九泉草露華首童牙辛酸涕洟並同上承訃長慟潺湲涕咽權載之集長途方騁大限俄窮聖上軫不愁之悲具僚興云亡之嘆韓文柰何永違祗隔數晨笑語為別慟哭東門藏棺蔽帷欲見無緣皎皎眉目在人目前同上祭薛公達文命雖云短兮其存者長子之視人自以無前一斥不復群飛剌天祭柳子厚文如聞其聲如見其容祭文青春之遊白首相失情一何長命一何短祭文汝病吾不知時汝歿吾不知日生不能相養以共居歿不得撫汝以盡哀歛不得憑其棺窆不得臨其穴吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在天之涯一在地之角生而影不與吾形相依死而魄不與吾夢相接吾實為之其又何尤祭姪十二郎老成文已上並韓文遘茲短曆奄謝昌辰劉賓客長夜無曉斯焉永歸風凄日昏鼓咽簫悲沈埋玉樹誰不沾衣鼎臣云亡梁木斯壞憫枝葉之謝割肌膚之愛輟春罷社川走下而不還露迎陽而易晞始比肩於千里遽傷魂於九原既切芝焚彌深蕙嘆已上並劉賓客集凄涼山河慘淡風雲君子何厲天實仇之聰明正直行為君子天則必速其死道德仁義志存生人天則必夭其身吾固知蒼蒼之無信莫莫之無神柳文祭呂衡州寤言在耳今古何速柳文豈蕩而為太空與化無窮乎將結而為光耀以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為慶雲以寓其神乎將為金為錫為圭為璧以栖其魄乎豈復為賢人以續其志乎將奮為明神以遂其義乎不然是昭昭其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎同上互見事難詰問室有迭去川無息流追懷曩辰恍若夢遊祭文一寐不覺使為古人茫茫上天豈知此痛天恡靈奇取不可貪既睿又力神誰以堪汝不是思而縱其志盜其管籥褰其篋匱抽深抉密擔重負貴果殄爾躬以寧其位豈不信耶祭外甥文已上並柳文棄蒼生而不起劉長卿孤魂夜飛山有歸雲江有迴潮公之逝矣一去寂寥挂劍於此魂兮可招直志不遂飲恨無終並同上宜享永年遽歸長夜白侍郎方憑福履以藏輝榮宜降永年遽歸長夜百身莫贖一夢不還鬱鬱佳城茫茫九原凄涼簫鼓慘淡風煙才高位下步闊塗窮竟戢羽翮不展心胸已上並白侍郎薤晞朝露舟失夜壑李義山文暘光未盡而湛晻兮植物方華以槁落兮同上一掬靈均淚千年湘水文孟東野魚鴈遂絕雞黍無期獨孤及文降年不永非命而何王維集夜壑藏舟同上永訣無期向空筵而洒酒王建集遣使奠斝百酸攪腸音容若生曷日而忘李翱祭文千秋兮愁雲萬古兮明月靈雲之冤兮孰能銷其氣靈均之愁兮孰能釋其結皮日休琴書忽捐藝文類聚長夜無旦同上循途未極閱川行謝雖洞簫為賦方傳漢帝之宮而禪草遺忠空留茂陵之下思盛烈其如在覽餘文而增歎曲池無處舊館寂寥感知己以悼恩懷舊德而何在豈峴山之上長留墮淚之詞延閣之中不記藏書之錄唐文粹川歸東極日去西晡生為神將死為鬼雄身世一滅榮華萬空傾家若墜舉國同悲並同上跡去難留川逝不捨杜牧之天下善人執手相吊同上營奠應支賣鶴錢方干文儼高堂兮去何早風白楊兮露秋草呂和叔文絕足方騁脩途忽窮李義山文促路頓軌中夭墜翼呂和叔文存與歿人皆福利生死古今一也死而不朽反貴於生尚馳作諸葛武侯碑千仞壁立而泰山其頹五緯聯珠而宋石自隕文粹書札與詩文重疊我笥筐柳車一出門終天無迴箱衣器陳下帳醪餌奠堂皇明靈庶鑒知彷彿斯來饗張籍祭韓文本朝公雖百齡人以為少歐公集平生笑言俯仰今昔送不臨穴哀不望帷並同上生有聞於當時死有傳於後世臨川集吊禍問疾書猶在眼學問文章丘山鬱鬱湖海茫茫並同上自嗟來暮不聞拔薤之規尚意神交特置生芻之奠東坡文位不滿其德奄移夜舟遽先朝露類要焄蒿悽愴若或見之東坡文茫茫九泉愛莫起之豈厭世溷濁潔而逝乎將民之無祿而夭莫之遺同上祭歐公文奉諱云初痛心罔極欒城集經吊喪弗能賻不問其所費記曲禮上知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔同上死而不弔者三謂輕身志孝也畏人或以非罪攻己不能有以說之死之者厭行止危險溺不乘橋舡記檀弓上孔子哭子路於中庭有人弔者而夫子拜之五十無車者不越疆而弔人弔於人是日不樂行弔之日不飲酒食肉焉子張死曾子有母之喪齊衰而往哭之或曰齊衰不以弔曾子曰我弔也與哉已上並記檀弓適公卿之喪則曰聽役於司徒記少儀羔裘玄冠不以弔語史齊侯遇杞梁之妻於郊使弔之辭曰有先人之敝廬在下妾不得與郊弔齊侯弔於其室左傳襄二十三互見閫儀識見孔光薨公卿百官會弔西漢本傳喟然不覺涕之無從東漢耿弇傳論徐穉有死喪萬里負笈赴弔謝承後漢書陳寔卒海內弔者三萬餘人通鑑王祥之薨奔赴者非朝廷之賢則親親故吏而已門無雜弔之賓晉本傳王愆期謂陶侃曰賢子越騎酷沒天下為公痛心況慈父情耶世說注集群辟慟懷邦族揮淚王仲宣誄文馳影奔赴陳子昂集百官臨弔畢集孔光之門常袞華州剌史李懷讓墓誌唐文粹本朝眼看白璧埋黃壤何況人間父子情山谷慰喪子經親者居倚廬賤者居堊室周禮宮正注杖者何爵也無爵而杖者何擔主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也爵謂天子諸侯卿大夫士也無爵謂庶人也擔猶假也無爵者假之以杖尊其為主也非主謂眾子也儀禮喪服居喪之禮毀瘠不形視聽不衰升降不由阼階出入不當門隧記曲禮上居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝五十不致毀六十不毀七十唯齊衰在身飲酒食肉處於內有喪者專席而坐並同上注專猶單也居倚廬寢苫枕塊不說絰帶記問傳西漢孟康注曰倚廬倚墻至地而為之無楣柱父母之喪哭無時記檀弓上致喪三年同上高子皋之執親之喪也泣血三年未嘗見齒記曲禮上顏丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息記檀弓下居喪讀喪禮既葬讀祭禮禮記曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失母焉何常聲之有記雜記父母之喪不避涕泣而見人同上注至哀無飾婦人不宜袒故發胸擊心爵踊足不絕地殷殷田田如壞牆然記問喪大夫士父母之喪既練而歸注歸其宮朔月忌日歸哭于宗室注宗子之家禮記喪大記三年之喪以喪拜稽顙而後拜記雜記喪無接賓之禮喪者不遺人人遺之雖酒肉受之也孔子曰身有瘍則浴首有瘡則沐病則飲酒毀瘠為病君子弗為也並同上君子執親之喪也水漿不入於口者三日杖而后能起記檀弓下三年之喪言而不語言言己事也為人說為語對而不問廬堊室之中不與人坐焉非時見乎母也不入門記雜記下喪不慮居謂費舍宅以奉喪為無廟也毀不危身謂憔悴將滅性為無後也記檀弓下喪不貳事記王制不使從政也喪有疾食肉飲酒必有草木之滋焉薑桂之謂也記喪大記父母之喪居倚廬不塗寢苫枕塊非喪事不言同上三年之喪如斬記雜記下苴衰不補記喪服四制居於倚廬哀親之在外也寢苫枕塊哀親之在土也記問喪弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踊有節記檀弓上互見事當可繼魯子曰三年之喪弔乎孔子曰三年之喪練不群立不旅行為其苟語忘哀也君子禮以飾情三年之喪而弔哭不亦虛乎記魯子問注為彼哀則不專為親哀則是妄弔雜記云三年之喪功衰不弔喪者非尸柩之事不親記少儀注有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服記雜記下子貢問喪子曰敬為上哀次之瘠為下顏色稱其情戚容稱其服同上禿者不髽傴者不袒跛者不踊老病不止酒肉凡此者以權制之也記喪服四制毀不滅性不以死傷生也父母之喪衰冠繩纓菅屨並同上傷腎乾肝焦肺不舉火記問喪大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功可以冠取妻大功將至辟琴瑟小功至不絕樂記雜記下期之喪卒哭而從政九月之喪既葬而從政小功緦之喪既殯而從政同上為妻父母在不杖不稽顙母在不稽顙雜記上父在為母為妻九月之喪食肉飲酒期之喪食肉飲酒不與人樂之記喪大記杖者何也曰竹桐一也何為也曰孝子身病體羸以杖扶病也父在則不敢杖矣尊者在故也記問喪斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也記問傳斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂大功之喪寢有席小功之喪床可也並同上伯魚之喪母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之記檀弓創鉅者其日久痛甚者其愈遲三年之喪稱情而立文所以為至痛極也記衰苴杖居廬食粥席薪枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而禮以是斷之者豈不以送死有已復生有節也哉記三年問曾子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人記魯子問君子之居喪食旨不甘聞樂不樂居處不安語陽貨喪至乎哀而止語子張孝子之喪親也哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀戚之情也三日而食教民無以死傷生毀不滅性此聖人之政也喪不過三年示民有終也為之棺椁衣衾而舉之陳其簠簋而哀慼之躃踊哭泣哀以送之卜其宅兆而安厝之為之宗廟以鬼享之春秋祭祀以時思之孝經子嬰戚于天遘屯離蹇心勦形瘵孟子序三年之喪齊䟽之服饘粥之食自天子達於庶人三代共之孟滕文公上史悼心失圖左傳斬焉在衰絰之中齊晏桓子卒晏嬰苴絰帶杖菅屨同上襄十七居喪而不哀在戚而有嘉容是謂不度同上襄三十一嚴霜夏墜范甯榖梁傳序仰天椎心而泣血也西漢李陵書復偷視息三國吳志虞翻傳哭眼如懸河決溜世說廬墓號慕唐書楊炎傳一踊三絕郭子儀家傳令期喪大功未終喪不預宴會舊唐書王方慶傳集以險釁夙遭閔凶李令伯陳情表五情震悼跼夭蹐地若無所容選謝平原表履影弔心酸鼻痛骨江文通書仰旻夭之莫報怨凱風之徒攀謝希逸宋貴妃誄泣血待旦任昉啟薄祿微資始期色養私情未遂不圖殃罰老父見背攀號何及陳子昂集糞土臣言孤臣鞠凶禮辱天賵稽顙拜命號絕迷圖殘喘胡顏柴骨欒心茹哀苫廬銜恤終祀悲摧欒棘思結寒泉已上並陳子昂集沈痛迫中腸杜詩三年哭泣如始喪者韓文百哀攻中涕洟迸落魂夢震越悽愴徹骨翻哀獨生劉賓客迫禮不死因成痼疾訴天觸地血梁縗服並同上罪大惡極世無所容尚顧嗣續不敢即死支綴氣息大懼祭祀之無主以忝盛德柳文創鉅痛仍號千穹旻捧首濡涕頓首成墳陷膺腐眥寒暑在廬草木悴死鳥獸蜘蟵殊族異類亦相其哀柳文孝門銘灰心垢體泣血漣漣松檟之下其生尚殘與其偷生而孤苦不若就死而團圓欲自決以毀傷懼虧孝於歸全白侍郎每一念至腸熱骨酸同上飲泣茹悲白樂天柴毀骨立張九齡文決裂肝胸李書之哭泣哀號感動他人杜牧之銜哀而茹恤王無功淚少於血骨餘於形王維集五情如喪百身不贖同上號咷毀瘠唐文粹廬於冢次號泣無節埃垢積首草生髮間銜恤毀瘠並同上本朝精神流離肝腑絕眥血被面無時晞臨川集欒棘過人柴瘠加等類要行負神明躬招咎釁柴毀幾於滅性銜恤忍哀棘心雪泣縗衽沾血並同上有聲當徹天有淚當徹泉後山
