body:
  text: 有定力經子文三仕為令尹無喜色三已之無慍色語公冶長子南宮韜世清不廢世濁不洿家語富貴不能淫貧賤不能移威武不能屈孟滕文公下夭壽不貳修身以俟之所以立命也孟盡心上君子所性雖大行不加焉雖窮居不損焉同上互入不可損益舉世而譽之不加勸舉世而非之不加沮莊逍遙遊篇互入不可損益大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚莊齊物死生驚懼不入乎胸中是故遌音悟物而不懾莊至樂揮斥八極神氣不變莊田子方孔子窮於陳蔡之間七日不火食藜羹不糝顏色甚憊而弦歌於室莊鄉黨不以為榮國毀不以為辱列仲尼權利不能傾群眾不能移天下不能蕩荀鍾山之玉炊以爐炭三日三夜而色澤不變淮南子互入是真難滅久幽而不改其操雖隋和何以加諸揚問明謝安處富貴而獨退靜破苻堅而無喜色文中子史子路曰君子死冠不免結纓而死左傳又見史記衛世家禍至不懼福至不喜史宋世家不牽乎卑亂之語不奪乎眾多之口史記鄒陽傳項王使武涉往說齊王信信謝曰夫人深親信我我倍之不祥雖死不易幸為謝項王通監漢高紀于定國飲酒至數石不亂西漢本傳蘇茂周建復聚兵挑戰王霸堅臥不出方饗士作倡樂茂雨射營中中霸前酒樽霸安坐不動通監漢光武紀刺客刺來歙未殊馳召蓋延延見歙因作悲哀不能仰視歙叱延曰今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪歙自書表曰臣夜人定後為何人所傷賊中臣要害臣不敢自惜恨奉職不稱以為朝廷羞抽刃而絕通監漢光武紀凡人富貴當使可賤東漢馬援傳不屑毀譽東漢馬廖傳竇憲將征匈奴三公九卿詣朝堂上書諫輒寑宋由懼遂不敢復署議而諸卿稍自引止唯袁安任隗守正不移至免冠朝堂固爭前後且十止眾皆為之危懼安隗正色自若通監漢和紀盧植事馬融融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盻東漢本傳李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚皆長歎流涕而已通監漢質紀互入責望梁冀使人脅杜喬曰早宜從妻子可得全喬不肯明日冀遣騎至門不聞哭者遂白太后收繫之死獄中同上太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也通監漢桓紀范滂至獄獄吏謂曰凡坐繫者皆祭皋陶滂曰皋陶古之直臣知滂無罪將理之於帝如其有罪祭之何益同上宦者張讓以事中王允遂傳下獄會赦還為刺史旬日間復以它罪被捕楊賜不欲使更梵辱遣客謝之曰君以張讓之事故一月再徵凶慝難量幸為深計諸從事好氣決者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉得減死論通監漢靈紀晏嬰不降志於白刃南史不曲筆以求存東漢臧洪傳袁閎投跡深林潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移東漢怒不變容喜不失節故最為難通監漢獻帝蹈海之節千乘莫移其情東漢逸民傳論宜僚臨白刃而色正東漢孔融傳孔融被誅二子方弈祺被收而不動左右曰父執而不起何也荅曰安有巢毀而卵不破乎同上雖遇履虎神氣恬然三國名臣贊先主入益州劉璋張飛諸葛亮分定郡縣破璋將嚴顏生獲顏曰大軍至何不降顏曰我州但有斷頭將軍無降將軍飛怒令斫頭顏色不變曰斫頭便斫頭何為怒耶飛壯而釋之蜀志互入不屈陸遜遣親人韓扁奉表詣吳主邏者得之諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾闊狹且水乾宜當急去遜未荅方催人種葑豆與諸將弈棋射戲如常通監魏明紀智者不為小利移目不為意似改步通監魏元紀賈充見夏侯統令妓繞其舡三匝統若無聞充曰此吳兒木人石心也晉書諸葛誕以氣勵稱常倚柱讀書雷震其柱讀書自若曹嘉之晉紀孔坦將卒庾永省之流涕坦慨然曰大丈夫將終不問以濟國安民之術乃為兒女子相泣邪冰深謝之通監晉紀桓溫來朝或云欲誅王謝謝安神色不變同上殷浩被黜談詠不輟雖家人不見其有流放之慼晉書本傳謝安嘗與孫綽泛海風起浪湧諸人並懼安吟嘯自若同上陶侃疾篤上表遜位遣右長史殷羡奉送所假節麾幢曲蓋侍中貂蟬太尉章荊江雍梁交廣益寧八州刺史印傳棨戟軍資器仗牛馬舟舡皆有定簿尉印倉庫侃自管鑰以後事付右司馬王愆期通監晉成紀魏冉閔使常煒使燕燕主雋使封裕詰之積柴其旁使裕以其私誘之曰君更熟思無為徒取灰滅煒正色曰吾聞死者骨肉下于土精魄升于天蒙君之惠速益薪縱火使僕得上訴于帝足矣吾結髮以來尚不欺布衣況人主乎曲意苟合性所不能直情盡言雖沈東海不敢避也通監晉穆紀祕書監太原孫盛作晉春秋直書時事大司馬溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言若此史遂行自是關君門戶事其子遽拜謝請改之時盛年老家居性方嚴有軌度諸子乃共號泣稽顙請為百口計盛大怒不許諸子遂私改之盛先己寫別本傳之外國通監晉海西公紀張融為封溪令路經峷嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉宋書山陰公主淫恣悅褚彥回以白帝帝召彥回西上閣宿十日公主夜就之備見逼迫彥回整身而立從夕至曉不為移志公主謂曰君鬚髯如戟何無丈夫意彥回曰雖不敏何敢首為亂階宋書本傳魏宗愛用事威振四海嘗倨見百官於都坐王公已下皆趍庭望拜高允獨升階長揖通監宋武紀柳元景知禍至入辭其母整朝服乘車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮通監宋太祖王景文賜死敕至景文正與客棊叩函看已復置局下神色不變方與客思行爭劫局竟歛手納奩畢徐曰奉敕見賜以死方以敕示客通監宋明紀王惠嘗臨曲水風雨暴至坐者皆馳散惠徐起不異常日不以霑濡而改南史帝召允謂曰國書皆浩作不允曰太祖記前著作郎鄧彥海所撰先帝記及今記臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作帝問如東宮不允曰臣罪滅族不敢虛妄殿下以臣侍講日久哀臣乞命實不問臣不敢迷亂帝謂景穆曰直哉此亦人情所難而能臨死不移且對君以實貞臣也寧失一有罪宜宥之北史高允傳互入無隱魏徵每犯顏進諫雖逢帝甚怒神色不徙議者以為賁育不能過唐書魏徵傳盧承慶典選考內外官有一官督運遭風失米考之曰監運損糧考中下其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜色亦無愧詞又改曰寵辱不驚考中上通監唐高宗紀徐公當雷霆之震而能全仁恕雖千載未見其比唐書徐有功傳有功武后時為廷尉后多殺人劉禕之竊謂賈大隱曰太后既廢昏立明安用臨朝稱制不如返政大隱密奏之太后命王本立推之本立宣敕示之禕之曰不經鳳閣鸞臺何名為敕太后大怒賜死禕之初下獄睿宗為之上疏申理中表皆賀之禕之曰此乃所以速吾死也臨刑沐浴神色自若自草謝表立成數紙通監唐武后張楚金魏元忠並免死流嶺南臨刑太后使鳳閣舍人王隱客馳騎傳聲赦之聲達於市當刑者皆喜躍讙呼宛轉不已元忠獨安坐自如或使之起元忠曰虛實未知隱客至又使起元忠曰俟宣敕已既宣敕乃徐起舞蹈再拜竟無憂喜之色同上李朝隱前後執破斜封官一千四百餘人怨謗紛然朝隱一無所顧通監唐睿宗楊國忠專國權勢可炙或勸張巡一見且顯用荅曰是方為國怪祥朝宦不可為也唐書張巡傳令狐楚為太原掌書記鄭儋在鎮暴卒不及指撝後事軍中喧譁將夜忽數十騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書互入敏捷寮屬二類李希烈留顏真卿不遣朱滔王武俊田悅李納各遣使詣希烈上表稱臣召顏真卿示之真卿叱之曰汝知有罵安祿山死者顏杲卿乎乃吾兄也吾年八十知守節而死耳希烈乃使甲士十人守真卿於館舍掘坎於庭云欲阬之真卿怡然見希烈曰死生已定何必多端亟以一劍相與豈不快公心事邪希烈乃謝之通監唐德宗紀蘇檢數為韓偓經營入相且遣親吏告偓偓曰乃欲以此相汙通監唐昭紀傳記劉裕次山陽聞何無忌敗績卷甲兼行將濟江而風急眾咸難之裕曰若有天命風當自息若其天不助舟覆溺何足可怪即命登舟舟移而風止三十國春秋居磨涅之中無緇磷之損世說中注嵇康臨死顏色不變謂其兄曰以琴來不兄曰已至康取調之為太平引曲成歎曰太平引絕於今日矣文土傳夏侯玄嘗倚柱作書霹靂其柱神色不變作書如故世說集吞縱之強不能反蹈海之志漂鹵之威不能降西山之節陸士衡連珠烈火流金不能焚景沈寒凝海不能結風迅風凌雨不謬晨禽之察勁陰殺節不凋寒木之心並同上舉世非之力行而不惑者千百年一人而已韓退之伯夷頌金可鎔不可使為污腐水可濁不可使為塵糞元次山互入是真難滅勢去未須悲時來何足喜白侍郎互入達理波濤喧眾口藜藿靜吾廬劉長卿飛語霜動明誠山立李義山文常經磨涅不改堅白杜牧之俾吾為秋毫之彬吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多唐文粹互入不可損益踐危機不易心處橫潰不忘國奮身拔跡於豺狼之口道不汙而磨滅同上劍淬愈利玉燒不然孫可之文靈豸薦角比干獻骨合此憤烈在公為笏怒虎可唾笏不可挫峭華可拔笏不可折拄天不仄指日不蝕同上本朝呂端使高麗遇風濤檣折舟人大恐公恬然讀書若在齋閤時玉壺清話舉世皆冤而語言未嘗以自及以窮至死而妻子不見其悲忻歐公祭尹師魯文死生之間既已能通於性命憂患之至宜其不累於心胸同上泰山覆於前而色不變麋鹿興於左而目不瞬老泉文司馬溫公嘗曰並馳萬馬中能駐足者其王存乎王存墓誌得志遂茂而不驕不得志瘁瘠而不辱群居不倚獨立不懼東坡墨君堂記毀譽幾至於萬端夷險常持於一意臨川集確然金石心不畏蚊蚋觸蘇子由集金石不隨波黃魯直詩千重浪裏平安過百尺竿頭穩下來陳從易作王文穆罷相詩處士不生巫峽夢虛勞雲雨下陽臺陳希夷詩見青瓚
