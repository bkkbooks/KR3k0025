body:
  text: 歲寒經晏平仲善與人交久而敬之語公冶長歲寒知松柏之後凋語子罕久要不忘平生之言語憲問史趙午等謀反覺詔捕趙王及群臣有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髡鉗隨王至長安趙王敖事白得出白明也西漢田叔傳互見高誼竇嬰失勢諸公引去惟灌夫獨否西漢本傳欒布哭彭越田叔隨張敖西漢欒布傳雖新不改故西漢班婕妤傳主父偃方貴幸時客以千數及族死無一人視獨孔車收焉西漢大將軍日退而驃騎將軍日益貴大將軍故人門下多去事驃騎輒得官爵惟任安不肯同上宋弘曰貧賤之交不可忘糟粳之妻不下堂東漢本傳或勸劉備攻劉琮荊州可得備曰劉荊州臨亡托我以孤遺背信自濟吾所不為何面目以見劉荊州乎通監漢獻紀梁冀暴固喬尸於城北四衢令有敢臨者加其罪固弟子汝南郭亮尚未冠左提章鉞右秉鈇鑕詣闕上書乞收固尸不報與南陽董班俱往臨哭守喪不去夏門亭長呵之曰卿曹何等腐生公犯詔書欲千試有司乎亮曰義之所動豈知性命何為以死相懼邪太后聞之皆赦不誅杜喬故掾陳留楊匡號泣星行到雒陽著故赤幘託為夏門亭吏守護尸喪積十二日都官從事執之以聞太后赦之匡因詣闕上書并乞李杜二公骸骨使得歸葬太后許之匡送喬喪還家葬訖行服遂與郭亮董班皆隱匿終身不仕通監漢桓紀吉黃為長陵令時科禁長吏擅去官黃聞司徒趙溫薨自以為故吏違科奔喪魏志常林傳互見故吏祖逖有胡奴曰王安逖甚愛之及祖約之誅安歎曰豈可使祖士稚無後乎乃往就市觀刑逖庶子道重始十歲安竊取以歸匿之變服為沙門通監晉元紀韓愈姪弘通與人交榮悴不易唐敬宗實録唐魏元同與裴炎締交能保終始故號耐久朋唐書嚴挺之重交遊生死不易同上本傳集春蘭兮秋菊長無絶兮終古楚辭風雨急而不絶其音霜雪零而不汽其色斯賢達之素交歷萬古而一遇文選廣絶交論諸葛亮曰士之相如溫不增華寒不改葉貫四時而不衰歷夷險而益固見藝文類聚貴賤結交心不移唯有嚴陵及光武李白集升沈不改故人情韋應物集卻羡淮南好雞犬也能終始逐劉安羅隱集肯踏衡門草唯應是友生劉賓客松筠寒不變膠漆冷彌堅始信淡交宜久遠與君轉老轉相親同上還有昔時巢燕在飛來飛去畫堂中高達夫淡交終不散孤達晚相宜鄭守愚我蟠濁泥君躡青雲不以升沉塹隔其間孫可之文歲晚心誰在青青見此君劉長卿回看後雕色青翠有松筠孟浩然惟有舊巢燕主人貧亦婦唐于瀆詩本朝鶯猶求舊友燕不負貧家臨川集惟有南山與君眼相逢不改舊時青范諷詩見倦遊録寒心未肯隨春態坡詩經簡賢附勢書仲虺之誥注賢而無勢則略之不賢有勢則附之史汲鄭之賢有勢則賓客十倍無勢則否況衆人乎翟公為廷尉賓客填門及廢門外可設雀羅翟公復為廷尉賓客欲往翟公乃大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見汲鄭亦云悲夫史記汲鄭贊當其貧困時人莫肯視至其貴也乃爭附之史記修稽傳中東方先生傳主父偃當路諸公皆譽之及名敗身誅士爭言其惡史記蘇秦曰此一人之身富貴則親戚懼之貧則輕易之況衆人乎史記本傳鄭當時與汲黯列為九卿兩人中廢賓客益落西漢本傳司馬相如與卓文君馳歸成都家徒四壁立卓王孫大怒曰女不材我不忍殺一錢不分也王孫恥之杜門不出後數歲相如為中郎將至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫因門下獻牛酒以交歡喟然而歎自以得使女尚司馬長卿晚同上溫舒多諂善事無藝者視之如奴有藝家雖有姦如山弗犯無藝雖貴戚必侵辱西漢王溫舒傳大將軍日退而驃騎日益貴大將軍故人門下多去事驃騎輒得官爵西漢王獻之兄弟自郤超未死見愔常躡履問訊甚修舅甥之禮及超死見愔慢怠屣而候之晉書郤超傳愔超父也殷浩作豫章定省送別者甚衆及廢徙東陽船泊征虜亭積日親舊無復相窺者宋書傳記迎新千里遠送故不出門東觀漢記蘇秦曰貧窮則父母不子富貴則親戚畏懼戰國策集春榮誰不慕歲寒良獨難潘安仁金谷詩富貴他人合貧賤親戚離曹顯遠詩廉公失權勢門館有虛盈貴賤猶如此況乃曲池平高車塵未滅珠履故餘聲賓階緑錢滿客位紫苔生沈休文詩勢之所集從之如歸市勢之所去棄之如脫遺李蕭遠論大抵當隆赫柄用而蜂附蟻合煦煦趄趄便辟匍匐非乎人而售乎已一旦勢異則電滅飆逝不為門下用矣柳宗元與顧十一郎書今之交乎人炎而附寒而棄柳文勢要情所重排斥則埃塵骨肉未免然況又四海人韓文凡今之交視勢厚薄同上互見市交左降去時裴相宅舊來車馬幾人過元微之集人情厚薄苦須曳昔在連環今在玦連環可碎不可移如何物在人自移韋應物昔日洛陽社貧窮相持攜今日長安道對面隔雲泥白侍郎互見有始無終富貴家人重貧賤妻子欺同上憶昔未出身自賤如埃塵君今才出身自重如千鈞君今自世情何況天下人姚少監萬世金石交一餉如浮雲盧今合如市道廉公之門客虛盈勢比雀羅廷尉之交情貴賤張力齡文世人交結違寒集溫孫可之黃金銷鑠素絲變一貴一賤交情見駱賓王本以勢利交勢盡交情已唐文粹互入市交始若膠附終若冰折陸魯望花開蝶滿枝花謝蝶還稀唐于讀本朝蓋士方窮時困厄閭里庸人皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦高車駟馬旗旄導前而騎卒擁後夾道之人相與駢肩纍迹膽望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以自悔罪於車塵馬足之間歐公晝錦堂互見人生罔測昔者在貧賤之辱所有無以異於今一朝居豪傑之先而人然後知其貴東坡答許狀元啓傳記周伯仁好乘人之弊世説中集落陷阱不一引手反擠之又下石焉韓文本朝楊文公憶為執政所忌言事者攻之不已公曰已擠溝壑猶下石而不休方困蒺藜尚關弓而相射青葙記互見憂禍相仍經終始惟一書仲虺之誥有始有卒者其惟聖人乎語子張史叔孫所館者惟一日必葺其墻屋去之始如至左昭二十二年伏湛髫髮厲志白首不衰東漢本傳武侯所至營壘井竈間溷藩籬障塞皆應繩墨一月之行去之如始至蜀武注中袁子正書終始一操雖頽嵩岱不吾壓也唐忠義傳序集生以貞兮死以潔唐義粹本朝范文正公自出守時有三婢至二府不增一人遺事經凡人未見聖若不克見既見聖亦不克由聖書君陳注凡人有初無終將恐將懼惟豫與女將安將樂女轉棄豫詩谷風互見急時抱佛門將恐將懼置豫于懷將安將樂棄豫如遺同上互見同上昔育恐育鞠及爾顛覆既生既育比豫于毒同上權輿剌康公也忘先君之舊臣與賢者有始而無終也於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿詩彼求我則如不我得執我仇仇亦不我力詩正月互入有名無實靡不有初鮮克有終詩蕩史耳餘始居約時相然信及據國爭權卒相滅亡何向者慕用之誠後相背之盩也西漢張陳餘傳贊德宗在危難時聽贄謀及已平追仇盡言怫然以讒幸逐猶棄梗唐書陸贄傳贊魏徵上疏以為陛下志業比貞觀之初漸不克終者凡十條通監唐太宗有言魏徵自録前後諫辭以示起居郎褚遂良者上愈不悅乃罷叔玉尚主而踣所撰碑同上互見信讒集感平生之遊處若塤箎之相須何今日之兩絶若胡越之異區禰正平賦靡不春華鮮克歲寒潘嶽誄魯武公小人槿花心朝在夕不存孟東野中書君老而禿不任吾用吾嘗謂君中書而今不中書耶因不復召韓文毛穎傳員既罷吳屬鏤賜斯既帝秦五刑具長平威振杜郵死垓下敵擒鍾室誅皆用盡身賤功成禍歸劉賓客棄我忽若遺郭泰機答傅咸曩者膠漆契邇來雲雨暌白樂天初則許之以死徇體面俱柔終乃背之而飽飛身名已遂張九齡見傾險昔年洛陽社貧賤相提攜今日長安道對面隔雲泥唐文粹互見炎涼經積善之家必有餘慶易坤卦互見善良德垂後裔書微子之命子孫其逢吉書洪範與國咸休永世無窮書微子之命世世享德同上皋陶邁種德書大禹謨世世修德詩文王大雅皇矣克昌厥後詩雍保艾爾後詩南山有臺克開厥後詩武錫茲祉福惠我無疆詩周頌烈文子澤及三族而況父母乎莊子徐無鬼積厚者流澤廣荀子禮論史陳侯筮敬仲曰非此其身在其子孫光遠而自他有耀者也初懿氏卜妻敬仲其妻占之曰有媯之後將育于薑五世其昌並于正卿八世之後莫之與京左莊二十二年故襲天祿子孫賴之左昭二十年伍員曰樹德莫如滋左哀元年盛德必百世祀左傳太史公曰燕崎嶇強國之間最為弱小幾滅者數矣然社禝血食者八九百歲於姬姓獨後亡豈非召公之烈邪史記盛德之後必百世祀同上陳世家慶流苗裔前漢蕭何傳宜蒙福祐子孫千億之報漢書哀紀燕齊之祀與周並傳子繼弟及歷載不墮豈無刑辟繇祖之竭力故支庶賴焉西漢高功臣表于公曰我治獄多陰德未嘗有所冤子弟必有興者至定國為丞相永為御史大夫封侯傳世西漢于定國傳積德纍善十餘世西漢婁敬傳鄧禹曰吾將百萬之衆未嘗妄殺一人後必有興者其後鄧氏自中興後纍世寵貴後漢子孫傳承後祚無疆唐魏證傳郭子儀子孫多以功名顯蓋盛德後唐書傳記有陰德者必享其榮以及其子孫説苑復恩篇集貽祉復集陳子昂千秋萬歲祚祉無疆同上吾知徐公百不憂積善袞袞生公侯杜詩房氏二相厥家以聞條葉被澤況公其孫韓文善積家肥子孫多材如彼榱棟必生徂徠劉賓客粹氣紆餘鍾于後昆錫羡後大之祥種德而牙乃生令子並同上伏順積善宜鍾慶於子孫白樂天陸公餘德機雲在杜牧之積厚昌大唐文粹本朝種德之深稼而不穡發源之遠流則愈長樂城集休嘉垂延燕及于後臨川集篤行有聞信於鄉國懷道不試遺其子孫東坡贈司馬光曾祖制魏公之業與槐俱萌封殖之勤必世乃成既相真宗四方底平歸視其家槐陰滿庭東坡三槐堂記
