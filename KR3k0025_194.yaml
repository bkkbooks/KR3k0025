body:
  text: 悵望經自伯之東首如飛蓬豈無膏沐誰適為容詩伯兮願言思伯甘心首疾同上君子于役不知其期曷至哉詩君子于役夏之日冬之夜詩葛生言長也箋云思者於晝夜之長時尤甚角枕粲兮錦衾爛兮予美亡此誰與獨旦同上言念君子亂我心曲詩小戎言念君子載寢載興厭厭良人秩秩德音同上鸛鳴于垤婦歎于室洒掃穹窒我征聿至有敦瓜苦烝在栗薪自我不見于今三年詩東山期逝不至而多為恤詩杕杜士遠行不必如期室家之情以期望之卜筮偕止會言近止征夫邇止同上予髮曲局薄言歸沐詩采綠注婦人夫不在則不容飾箋云曲卷其髮思之甚也又云君子將歸者我則沐以待之寤言不寐願言則嚏詩終風注今俗人嚏云人道我此古之遺風也愛而不見搔首踟躕詩靜女焉得諼草言樹之背願言思伯使我心痗詩伯兮痗病也日月陽止女心傷止征夫遑止詩小雅杕杜箋云婦人思望其君子陽月之時憂傷矣又云室家踰時則思五日為期六日不詹小雅采綠史生世不諧作太常妻一歲三百六十日三百五十九日齋注云一日不齋醉如泥後漢周澤傳竇滔被徙流沙妻蘇氏思之織錦為迴文旋圖詩以贈宛轉循環以讀之詞甚悽惋晉書列女傳集征夫勞於周行道也處婦憤而長望楚辭目極千里傷春心同上朝雲不歸山曹子建詩春心不自安梁庾肩吾詩盈盈一水間脈脈不得語古詩夜參半而不寐兮悵盤柏而反側王仲宣登樓賦魂踰佚而不反兮形枯槁而獨居脩薄具而自設兮君曾不肯乎幸臨日黃昏而望絕兮悵獨語於空堂懸明月以自照兮徂清夜於洞房援雅琴以變調兮奏愁思之不可長左右悲而垂淚兮涕流離而縱橫無面目之可顯兮遂頹思而就床匆寐寢而夢想兮魂若君之在旁惕寤覺而無見兮魂廷廷若有亡眾雞鳴而愁予兮起視月之精光夜曼曼其若歲兮懷鬱鬱其不可再更司馬相如長門賦陳皇后頗妬別在長門宮愁悶悲思聞蜀郡司馬相如工為文奉黃金百斤因為解悲愁之辭文選長門賦序願保金石軀慰妾長飢渴陸士衡贈顧彥先群燕辭歸鴈南翔何為淹留寄他方賤妾煢煢守空房憂來思君不敢忘短詠微吟不敢長明月皎皎照我牽牛織女遙相望爾獨何辜恨河梁燕歌行願君廣末光照妾薄暮年塘上行迴身入空房託夢通精神人欲天不違何懼不合并王仲宣雜詩重衾無暖氣挾纊如懷冰云云寤言莫予應張茂先雜詩昔為倡家女今為蕩子婦蕩子行不歸空床難獨守古詩君在天一涯妾在長別離願一見顏色不異瓊樹枝江文通古別離弄杼不成藻謝惠連牛女詩弄絃不成曲王景玄圍腰無一尺垂淚有千行梁庾信王昭君詩夜漫漫以悠悠寒悽悽以凜凜潘岳寡婦賦秋日苦促短遙夜邈綿綿魏應璩詩寶書為君掩瑤瑟詎能開文選嚬黛含羞竟不言春思秋怨誰能問鮑溶集共金爐之夕香選別賦堂上流塵生庭中綠草滋沈休文擬古詩徒使春帶賒空惜紅粧變謝元暉怨情詩孟夏非長夜晦明如歲隔選詩秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人腸長夜思君心飛揚他人相思君相志錦衾瑤席為誰芳宋湯惠休白紵舞歌詩與我別所期期在三五夕選南樓詩三五明月滿四五蟾兔缺選古詩明月照高樓流光正徘徊選七哀詩宵月皓中閨選擣衣詩春闈閟此青苔色秋帳涵茲明月光夏簟清兮晝不暮冬釭凝兮夜何長織錦曲兮泣已盡迴文詩兮影獨傷江淹別賦從來腰自小衣帶就中寬梁鮑泉寒閨詩君言妾貌改妾意君心移梁鄧鑑閨怨詩憶別春花飛已見秋葉稀淚粉羞明鏡愁帶減寬衣得書言未反夢見道應歸坐使紅顏歇獨掩青樓扉梁庾成師遠期篇復如東流水未有西歸日夜雨滴空階曉燈暗離室藝文何遜詩昭昭清明月輝光獨我床憂人不能寐耿耿夜何長微風衝閨闥羅幃自飄颺攬衣成長帶屣履下高堂古詩箇日新粧如復罷祗應含笑待君歸駱賓王錦字迴文欲贈君同上夫婿久離別青樓空望歸粧成卷簾坐愁思懶縫衣燕子家家入楊花處處飛空床難獨守誰為報金徽孟浩然照水定自愛折花將遺誰愁心極楊柳一動亂如絲同上娟娟心目寢寐見之文粹夜夜抱冰寒不睡同上梨花寒食夜深閉翠微宮沈巨賢遠戍功名薄幽閨年貌傷王維集形影一朝別煙波千里分君看望君處祗是起行雲同上三百六十日日日醉如泥雖為李白婦何異太常妻李白望夫君兮咨嗟橫涕淚兮怨春華遙寄影於明月送夫君於天涯本作一行書殷勤道相憶一行復一行滿紙情何極千里若在眼萬里若在心相思千萬里一字直千金並同上寫水落井中同泉豈殊波秦心與楚恨皎皎為誰多李白詩黃昏望絕見偶語而生疑清旭意新聞疾行而誤喜呂和叔乃知織迴文之錦無補離憂登望天之臺空為廢日同上溝水分流西復東九秋霜月五更風別鸞離鳳今何在十二玉樓空更空李義山鶯啼日出不知曙寂寂羅幃春夢長同上羅衣不忍著羞見繡鴛鴦同上室婦歎鳴鸛家人祝喜鵲韓文白玉璞裏斲出相思心黃金礦裏鑄出相思淚盧仝文別淚關泉脈春愁亂藕絲同上早知潮有信嫁與弄潮兒李君虞寧從賤相守不願貴相離似將海水添宮漏共滴長門一夜長同上舞袖朝欺陌上春歌聲夜怨江邊月莫道君恩長不休婕妤團扇苦悲秋李嘉佑纖手縫衣獨苦辛遠因迴使寄征人官家亦自寄衣去貴從妾手著君身高堂姑老無侍子不得自到邊城裏殷勤為看初著時征夫身上宜不宜張文昌樓上殘燈伴曉霜獨眠人起合懽床唐燕子樓集日日出門望家家行客歸無因見邊使空待寄寒衣張文昌集豈期牛女為參商白樂天去時樓上清明夜月照樓前撩亂花今日成陰復成子可怜春盡未還家元微之集淚霑雙袖血成文不為悲身為別君望鶴眼穿期海外待烏頭白老江濱欲識九回腸斷處潯陽流水九條分櫻桃花下送君時一寸春心逐折枝別後相思最多處千枝萬片遶林垂無身尚擬魂相就身在那無夢往還思牽梳洗懶空拔綠絲叢並元微之集孤鳥去不還緘情向天末韋應物集良人久燕趙新愛移平生去年花裏逢君別今日花開已一年丈夫一去花落樹妾獨夜長心未平並同上相見不得親不如不相見李太白集玉貌一生啼空留錦字表心素至今緘愁不忍窺織錦作短書腸隨迴文結春風復無情吹我夢魂斷並同上六宮誰買相如賦團扇恩情日日疏羅隱詩雲去有歸日水分無合時孟東野似把裁刀裁別恨兩人分得一般愁姚少監昔是同枝鳥今作萬里分同上衣寬有剩帶白侍郎衣上今日淚篋中前日書來如春夢幾多時塞鴻遇暖猶回處江水因潮亦返波秋思冬愁春悵望大都不稱意多時並白侍郎雕輦已辭兮金屋何處長信草生兮長門日暮劉賓客閑吟芍藥詩悵望久嚬眉杜牧之桂席塵瑤佩瓊爐燼水沉凝魂空薦夢低珥悔聽琴和簪拋鳳髻將淚入鴛衾的的新添恨迢迢絕好音隻影隨驚鴈單棲鎖畫籠瑤階夜色涼如水坐看牽牛織女星鴛鴦帳裏暖芙蓉低泣關山幾萬重明鑑半邊釵一股此生何處不相逢滿面風流雖似玉四年夫婿恰如雲為報眼波須穩當五陵遊客莫知聞並同上宮殿生秋草君王恩幸疏那堪聞鳳笛門外度金輿王維碧雲千里暮愁合白雪一聲春思長許用晦深怨寄清瑟遠愁生翠娥竹班歸帝女草綠怨王孫並同上繞欄倚樹更惆悵微雨輕寒花落時韓渥詩漏添遲日箭減良霄膚清臂瘦衫薄香銷同上無人解妾心日夜長如醉妾不是瓊奴意與瓊奴類見後山詩序云永安驛東廊柱有女子題云正是落花寒食雨夜深無伴倚空樓料得他鄉過佳節亦應懷抱暗凄然並同上不堪鳴杼日空對白榆秋楊衡紛紛花落門空閉寂寂鶯啼日更遲劉長卿鴻鴈春歸人未歸同上胡麻好種人無種正是歸時胡未歸古今詩話載朱滔括兵時代妻荅夫詩兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路傍結髮為妻子席不煖君床暮昏晨告別無乃太匆忙君行雖不遠守邊戍河陽妾身未分明何以拜姑嫜父母養我時日夜令我藏生女有所歸雞狗亦得將君今往死地沈痛迫中腸誓欲隨君去形勢反倉黃勿為新婚念努力事戎行婦人在軍中兵氣恐不揚自嘆貧家女久製羅襦裳羅襦不復施對君洗紅粧仰視百鳥飛大小必雙翔人事多錯迕與君永相望杜甫新婚別蛾眉愁自結鬢髮沒情梳同上莫捲龍須席從他生網絲且留琥珀枕還有夢來時李白集藁砧今何在藁砧夫何也問夫在山上更安山重山為出字言不在也何當大刀頭刀頭有環問何時還也破鏡飛上天月破當來也樂府解題本朝楊花日日常無定海燕年年卻有歸一瞬青春疾如電等閑寬盡縷金衣臨川集佳人瘦盡雪膚肌眉歛春愁知為誰坡詩經及爾偕老老使我怨總角之宴言笑晏晏信誓旦旦不思其反反是不思亦焉哉詩氓黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死不我能慉反以我為讎既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比予于毒云云宴爾新昏以我御窮云云不念昔者伊余來既詩邶谷風史凄凄重凄凄嫁娶不須啼願得一心人白頭不相離沈約宋書古辭白頭吟或者以為即是文君所作王后及蕭良娣為武后所囚大罵曰願阿武為老鼠吾作貓生扼其喉舊唐書王皇后傳傳記王昭君年十七端正閑麗漢孝元時幸備後宮積五六年心有怨曠不飾其形容琴操集百里奚五羊皮憶別時烹伏雌炊扊扅今日富貴忘我為樂府載百里奚妻嬴彼百心之短景乃累恨之長暉鮑賦流水何太急深宮盡日閑殷懃謝紅葉好去到人間青瑣流紅記盛年處空房中夜起長歎姜女篇過時而不采將隨秋草萎文選君子恩未畢零落在中路班婕妤常恐秋節至涼飆奪炎熱棄捐篋笥中恩情中道絕文選怨歌行辭寵悲班扇云云徒使春帶賒坐惜紅粧變云云生平一顧重宿昔千金賤云云掖庭聘絕國長門失歡宴謝玄暉怨情二合兆嘉耦女子禮有行潔已入德門終遠母與兄如何耽時寵遊官忘歸寧雖為三歲婦顧景愧虛名歲暮饒悲風洞房涼且清拊枕循薄質非君誰見榮晉陸機為陸思遠婦作詩良人遊不歸偏栖獨隻翼空房多悲風中夜起嘆息陸機詩申黜褒女進班去趙姬昇心賞猶難恃貌恭豈易憑文選鮑明遠白頭吟庭絕玉輦跡芳草漸成窠云云隱隱聞簫鼓君恩何處多云云欲泣不成淚悲來翻強歌庭花方爛熳無計柰春何云云春陰正無際獨步意如何不及閑花草翻承雨露多云云粧成多自恨夢好卻成悲隋煬帝時侯夫人詩見古今詩話但見淚痕濕不知心恨誰李白妾似井底桃花開向誰笑君如天上月不肯一回照雨落不上天水覆難重收君情與妾意各自東西流昔日芙蓉花今成斷腸草以色事於人能得幾時好月光欲到長門殿別作深宮一段愁桂殿長愁不記春黃金四壁起秋塵夜懸明鏡青天上獨照長門宮裏人並同上君王選玉色侍寢金屏中薦枕嬌夕月捲衣戀春風寧知趙飛燕奪寵恨無窮李白怨歌行深知好顏色莫作委泥沙杜詩綠珠猶得石崇怜飛燕曾經漢皇寵駱賓王悲鳴五里無人問腸斷三聲誰為續同上妾顏未改君心改為君熏衣裳君聞蘭麝不馨香為君事容餚君看珠翠無顏色人生莫作婦人身百年苦樂由他人井裏引銀瓶銀瓶欲上絲繩絕石上磨玉簪玉簪欲成中央折為君一日恩誤妾百年身寄言癡小人家女謹勿將身輕許人昭陽殿裏恩愛絕蓬萊宮中日月長紅顏未老恩先斷雨露由來一點恩爭能遍布及千門三千宮女胭脂面幾箇春來無淚痕幾度曉粧成君王不言好並出白侍郎娟娟雙青娥微微啟玉齒自惜桃李年誤身遊俠子空閨生怨愁韋應物集一家盡是郎腹心妾似生來無兩耳為郎忍耐看故面元禎集繡領任垂蓬髻丁香閑結春稍文園終病謁休詠白頭吟三十六宮秋夜深昭陽歌斷信沉沉唯應獨伴陳皇后照見長門望幸心並出杜牧之半月照雙臉凝腰素一圍有恨簪花懶無聊鬭草稀覽鏡歛青黛挑燈皓腕肌避人勻迸淚拖袖倚殘暉有貌雖桃李單棲足是非杜牧之早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容杜荀鶴愛如寒爐火棄若秋風扇山嶽起面前相看不相見李君虞不道君心不如石那令妾貌長如玉同上朝喜花艷春暮悲花委塵不悲花落早悲妾似花身杜荀鶴自矜妖艷色不顧丹青人那知粉繪能相負郤使容華飜誤身劉長卿恩情隔兮年光度雕輦巳辭兮金屋何處長信草生兮長門日暮傒翠華之儻來兮仰玄天以自訴劉賓客銀鑰郤收金鎖合月明花落又黃昏杜牧之君恩如海深難竭妾命若花輕易絕許用晦草綠怨王孫深怨寄清瑟同上團扇無情不待秋溫飛卿美人歌白苧萬恨在蛾眉武伯蒼曾逐使君歌舞地清聲長咽黛眉顰同上君心匣中鏡一破不復全妾心藕中絲雖斷猶牽連孟東野一代紅顏為君盡唐喬知之婢詩華容芳意改枕席怨情饒錦字沾愁淚羅裙緩細腰不如銀漢女歲歲鵲成橋袁暉梨花寒食夜深閉翠微宮沈巨賢互見悵望古來幽怨皆銷骨韓渥苦恨身為女類要載傅玄苦恨篇歌艷露華舞回春雪幸持此技承君餘悅綺羅脂粉嬌上春自言終世保情親寧知一旦君恩斷繁絃清管為何人張說之文本朝天地豈不寬妾身自不容陳後山詩
