body:
  text: 蠱惑經冶容誨易繫辭婦有長舌惟厲之階亂匪降自天生自婦人詩瞻卬哲婦傾城同上豔妻煽方處美色曰豔煽熾也詩十月之交子素顏紅膚惑其目清商流徵亂其聽抱朴子史楚莊王欲納夏姬申公巫臣曰是不祥人也是夭子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是天下多美婦人何必是左成二年美女破舌戰國策桑間濮上鄭衛宋趙之聲內則致疾損壽外則亂政傷民巧偽因而飾之以營亂富貴之耳目前漢禮樂志女子彈弦跕屣遊媚富貴前漢地理志北方有佳人絶世而獨立一顧傾人城再顧傾人國西漢李夫人傳梁冀妻孫壽色美而善為妖態作愁眉虎粧墮馬髻折腰步齲齒笑以為媚惑東漢梁冀傳互見粧節第椆既交則情與愛遷顏辭媚熟則事以私奪唐書后妃列傳資質豐艷倩盻承迎動移上意唐書楊妃傳集攜佳人兮披重幄援綺衾兮坐芳縟燎薰爐兮炳明燭酌桂酒兮楊清曲曲既揚兮酒既陳朱顏兮酡思自親顧低帷以昵枕念解佩而禠紳怨年歲之易暮傷後會之無因謝惠連雪賦互入房闥嫣然一笑惑陽城迷下蔡宋玉好色賦願薦枕席宋玉高唐賦目略微盻精彩相授宋玉神女賦微辭相惑動精神相依憑宋玉好色賦色授魂豫文選注云被色來授魂往與接目窕心與枚乘七發回頭一笑百媚生六宮粉黛無顏色長恨歌娥眉𥊑睇使情移劉孝惑詩妖紅慘黛生愁色劉言史詩無良媒以接歡兮托微波而通辭選洛神賦冶其容敏其詞婉孌萬態以中上意陳馮長恨歌傳美人一笑千黃金李白千杯緑酒何辭醉一面紅粧惱殺人李白贈段七娘忽然一笑千萬態見者十人八九迷假色迷人猶若是真色迷人應過此女為狐媚害積深日久月長溺人心白侍郎芳情香思知多少惱殺山僧悔出家同上媚語嬌不聞纖腰軟無力歌詞妙宛轉舞態能剜刻筍絃玉指調粉汗紅綃拭元稹集身作匡床臂為枕歸來如夢復如癡並同上高髻雲鬟宮樣粧秋風一曲杜韋娘司空見慣渾間事惱斷蘇州刺史腸韋應物夏姬滅兩國逃作巫臣妻西子下姑蘇一舸逐鴟夷杜牧之嬌女不顧身李義山文眼波向我無端艷心火因君特地然廬同文美人醉起無次第墮鈙遺佩滿中庭王維集卻嫌脂粉涴顏色淡掃蛾眉朝至尊杜詩妬寵而負恃爭妍而取憐韓文本朝坐來生百媚臨川集換得千金為一笑同上經見金夫不有躬易蒙卦注云女先求男也女之為體正行以待命者也見剛夫而求之故曰不有躬也女之耽兮不可説也詩氓不績其麻市也婆娑詩東門之枌女曰觀乎士曰既且且往觀乎洧之外洵訏且樂詩溱洧史秦王年少太后時竊私通呂不韋不韋乃私求嫪毐以為舍人時縱倡樂太后果欲私得與通絶愛之有身生二子史呂不韋傳外黃富人女甚美嫁庸奴其夫亡去抵父容史張耳傳卓王孫有女文君新寡好音相如以琴挑之文君從戶窺之心悅而好之夜亡奔相如馳歸成都西漢相如傳賈充辟韓壽為椽充女於青瑣中見壽悅之令婢往壽家説其光采艷逸壽聞動心夕踰垣而入惟充覺女悅暢異於常日充女盜帝所賜充西域香與壽晉書宋山陰公主文帝女適駙馬都尉何戢淫恣嘗謂帝曰妾與陛下男女雖殊俱托體先帝陛下六宮數百而妾惟駙馬一人太不均帝乃為公主置首面左右三十人吏部郎褚淵貌美公主請以自侍帝許之淵侍公主十日備見逼迫通鑑宋紀唐明皇幸溫泉楊妃諸姊妹皆貴從幸為五家隊遺鈿墮珥籍籍道傍唐書集河間淫婦人也雖戚里為邪行者聞河間之名則掩鼻蹙頞皆不欲道也柳文河間傳籠鳥無常主風花不戀枝白傳集眼意心期卒未休暗中終擬約秦樓光陰負我難相偶情緒牽人不自由遙夜定嫌香蔽膝悶時應弄玉搔頭櫻桃花謝梨花發腸斷青春兩處愁韓渥詩經柏舟共薑自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許作是詩以絶之詩鄘風之死矢靡它同上夫者妻之天也婦人不二斬者猶曰不二天也儀禮史楚令尹子文欲蠱文夫人為館於其宮側而振萬焉夫人泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎蠱惑以淫事左莊二十八寡婦清其先得丹穴而擅其利清能守其業用財自衛秦始皇以為貞婦而客之為築女懷清臺史記曹爽從弟文叔妻夏侯令女早寡而無子其父文寧欲嫁之令女刀截兩耳以自誓居常依爽爽誅其家上書絶婚強迎以歸復將嫁之令女竊入寢坐引刀自斷其鼻其家驚惋謂之曰人生如輕塵棲弱草耳何至自苦乃耳且夫家夷滅已盡守此欲誰為哉令女曰吾聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保終況今衰亡何忍棄之此禽獸之行吾能為乎司馬懿聞而賢之聽使乞子自養為曹氏後通鑑三國涼楊氏曰大人賣女於氐以圖富貴一之謂甚其可再乎通鑑晉紀郗嘉賓死婦弟欲迎其姊歸姊終不肯歸曰生縱不得與郗生同室死寧不同穴也世説傳記魯人秋胡娶妻三日而遊宦三年休還其婦採桑于郊胡至不識而悅之乃遺金一鎰妻曰妾夫遊宦未返于茲三年未有被辱如今日也不顧胡慚而退西京雜記東漢秦嘉妻毀形不嫁哀慟傷生史通魯陶嬰寡魯人將求焉嬰聞之恐不得免乃作歌明己之不二也其詩曰悲黃鵠之蚤寡兮十年不隻宛頭戢翼兮不與衆同時則飛鳴兮獨行惸惸天命令然兮愧獨永傷感鳥慍己兮淚下成行嗚呼悲兮死者不忘飛鳥尚然兮何況貞良雖有賢雄兮終不重行魯人聞知曰斯女不可得也遂不敢復求之劉向新列女傳梁寡婦高行者早寡不嫁梁貴人爭欲取之梁王聞之使聘焉高行曰妾之夫不幸先犬馬填溝壑妾宜以身薦其棺椁守養孤幼不得專意妾聞婦人之義一往不改以全貞信之節今忘死而趍生是不信也乃援劍操刀以割其鼻曰妾已刑矣所以不死者不忍幼嗣之重孤也同上集蹈共薑兮明誓詠柏舟兮清歌潘安仁寡婦賦峻節貫秋霜顏延年秋胡詩兔絲及水萍所寄終不移江文通古別離青松摧折哀斷女蘿之心舟桂孤高終守柏舟之誓陳子昂集一女事一夫安可再移夫孟東野青鏡掩孤鸞權載之集顧影無依倚甘心守靜專元微之集義重移天白氏六帖本朝忍著生衣裳為人作春妍後山詩史文君失身於長卿史記相如傳卓王孫有女文君新寡好音相如以琴挑之文君從戶窺之心説而好之夜亡奔相如馳歸成都西漢相如傳蔡雍女琰字文姬適河東衛仲道夫亡無子天下喪亂文姬為胡騎所獲在胡中十二年生二子曹操以金璧贖之重嫁於董杞後漢列女傳漢劉曜立羊氏為后曜問曰吾何如司馬家兒羊氏曰彼有一婦一子及身三耳曾不得庇妾於爾時實不欲生意謂世間男子皆然自奉巾櫛以來始知天下自有丈夫耳通鑑晉紀傳記董祀妻蔡氏載誕胡子受辱虜廷文詞有餘節概不足劉知幾史通經言若螽斯不妬忌則子孫衆多也詩螽斯夫人無妬忌之行惠及賤妾進御於君詩小星衛莊公惑於嬖妾使驕上僣莊薑賢而不答詩碩人史晉趙姬以叔隗為內子而己下之左僖二十四年梁商女為貴人常持被引御從容辭於帝曰夫陽以博施為德陰以不專為義螽斯則百福之所由具也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之纍東漢梁皇后傳傳記宋鮑蘇之妻不妬宋公表其閭曰女宗列女傳集恩其它姬子雜己子造次莫能辨無忮忌之行無犯忤之氣柳崔銘本朝聞子有賢婦華堂詠螽斯盍不倒囊橐賣劍買蛾眉東坡經有嫡不以其媵備數詩江有汜以色曰妬以行曰忌詩小星注史叔向曰吾母多而庶鮮注言父多妾媵而庶子鮮少嫌母氏性不曠好女入室惡女之仇史記婦人之所以事夫者色也而妬者其情也戰國策楚王愛新人夫人鄭裒謂新人曰王惡子鼻見王必掩又謂王曰惡王之臭也王令劓之同上馮衍妻任氏悍忌不得蓄媵妾兒女常自操井臼東漢司隸馮方女避亂揚州袁術見而悅之遂納焉甚愛幸諸婦害其寵語之曰將軍貴人有志節當時時涕泣憂愁必長見欽重馮氏從之後諸婦因共絞殺繫之廁術誠以為不得志而死龐寵妻棄前子於井中後漢互見殘忍賈充妻郭隗疑充視乳母笞殺之其子思乳母不食他乳遂死及生小子亦然充遂絶嗣晉書荀勗曰貴妃年少妬者婦人常情長自當差通鑑晉惠紀王導為丞相妻曹氏性妬導甚憚之乃密營別館以處衆妾曹氏知而將往焉導恐妾被辱遽命駕晉書干寶父有所寵侍婢母甚妬忌及父亡母生埋婢於墓中寶兄弟年少不之審也同上傳記房孺復妻崔氏性忌左右婢不得濃粧高髻酉陽雜俎蜀先主以玉人置甘后側玩之后亦妬玉人拾遺記謝太傅劉夫人不令太傅有別房寵公既深好聲色頗欲立妓妾兄子及外甥微達其旨乃共諫劉夫人稱關睢螽斯有有不妬忌之德夫人知諷己乃問誰撰此詩答曰周公夫人曰周公是男子乃相為耳若使周姥撰詩當無此句妬記張跋欲取妾其妻曰子試誦白頭吟當聽之跋慚而止合檢集衆女嫉蛾眉楚辭入門見嫉蛾眉不肯讓人掩袂攻讒狐媚偏能惑主駱賓王集有西施之美容兮讒妬入以自伐楚辭君王雖愛蛾眉好無奈宮中妬殺人李白爭知司馬夫人妬移到庭前便不開白侍郎屏風周昉畫纖腰歲久丹青色半銷斜倚玉窗鸞髮女拂塵猶自妬嬌嬈杜牧之毀坼維鵲巢不行鳴鳩仁盧同文本朝延平吳氏姊妹六人皆妬悍時號六虎其中五虎尤甚平生手殺婢十餘人凡三適人皆不終夜分常聞堂廡間喧呼聲同室皆懼五虎怒曰狂鬼敢爾邪闢戶移榻中庭持刀獨寢徹旦寂然人謂五虎之威鬼猶畏之陳正敏撰遁齋間覽
