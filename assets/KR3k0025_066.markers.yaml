  - {type: variant, offset: 823, length: 270, content: 領運使欲令督江淮米以賑之耳陝州行營在夏縣若抱暉可用當使將之有功則賜旌節矣抱暉覘者馳告之抱暉稍自安因疾驅而前抱暉不使將佐出迎惟偵者相繼泌宿曲沃將佐不俟抱暉之命來迎抱暉亦出謁泌稱其攝事保完城隍之功入城視事由是反仄者皆自安抱暉遂亡命不知所之通監唐德宗裴度平章中書失印度自如左右白復於故處得印度不應或問其故曰此必吏人盜以印書券耳急之則投諸水火緩之則復還故處人服其識量通監唐紀又互入鎮重人事張從賓引兵入洛陽從官在大梁者無不涑懼獨桑維翰從容指畫軍事神色自若接對賓客不改常度眾心差安通監五代晉高紀集東山謝安石談笑靜胡沙李太白集互入坐以制勝簿領如山處之若閑, WYG: 文}
