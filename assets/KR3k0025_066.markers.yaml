  - {type: variant, offset: 112, length: 1, content: 意, WYG: 中山靖王勝𫝊磨礱砥礪不見其損有時而盡種植畜養不見其益有時而大積徳累仁不知其善有時而用弃義背理不知其惡有時而亡太山之霤穿石單極之䋁斷幹水非石之鑚索非木之鋸漸靡使之然也枚乗𫝊安者非一日而安也危者非一日而危也皆以積漸然不可不察也前賈誼𫝊壊崖破岩之水源自涓涓干雲蔽日之木起於青葱後漢丁鴻𫝊隄潰蟻孔}
