  - {type: variant, offset: 2623, length: 3, content: 耶王慚, WYG: 賢者之效不為細也横渠理窟温公營獨樂園園子吕直性愚以直名之春時人逰園園子得茶湯錢十千閉園日與主人平分之一日來納公公曰此自汝錢可持去再三欲留公怒遂持去回顧曰只端明不愛錢者後十許日公見園中新創一井亭問之乃前不受十千所創也元城語録太史公曰盖公言黄老賈誼晁錯明申韓錯不足道也}
