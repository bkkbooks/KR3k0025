  - {type: variant, offset: 1172, length: 1448, content: 劍無異於鬭雞一旦命已絕矣無所用於國事今大王有天子之位而好庶人之劍竊為大王薄之於是文王不出宮三月劍士皆服斃其處也莊子說劍魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諫不聽乃以問其傳宰折睢曰吾欲西益宅而史以為不祥子以為何如宰折睢曰天下有三不祥西益宅不與焉哀公大悅而喜頃復問曰何謂三不祥對曰不行仁義一不祥也嗜慾無止二不祥也不聽強諫三不祥也哀公默然深念憤然自反遂不取西益宅淮南子人間訓互入善於言語史楚人伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左宣十二年互入與士卒一體宋平公築臺妨於農收築者謳子罕聞之親執扑以行築者曰吾儕小人皆有闔廬以辟燥溼寒暑今君為一臺而不速成何以為役謳者乃止左襄十七年晉平公射鷃不死使豎襄摶之失公怒拘將殺之叔向曰必速殺之無令遠聞君忸怩于顏乃趣舍之國語楚優孟嘗以談笑諷諫楚莊王有愛馬死使群臣喪之欲以棺椁大夫禮葬之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為椁楩楓豫章為題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼於後廟食太牢奉以萬戶之邑諸侯聞之皆知大王賤人而貴馬王曰寡人之過一至此乎乃使以馬屬太官令無令天下久聞也史滑稽互入反鋒而用及滑稽趙王新立秦急攻趙趙求救於齊齊曰必以長安君為質兵乃出太后不肯大臣彊諫后曰復言者老婦必唾其面左師觸龍見后盛氣而須之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為父母愛之則為之計深遠今媼尊長安君之位而不及今有功於國一旦山陵崩長安君何以自託於趙老臣以嫗為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家互入善於言語茅蕉曰陛下有狂悖之行不自知耶車裂假父囊撲二弟遷母於雍桀紂之行不至於是矣令天下聞之盡瓦解無嚮秦者王下殿手自執之曰先生趨起就衣今願受事王自駕虛左方往迎太后歸於咸陽復為母子如初通監秦紀上居南宮見諸將偶語以問張良良曰陛下與此屬共取天下而所封皆故人所誅皆仇怨今恐以過失及誅故相聚謀反耳上曰奈何良曰取上素所不快計群臣所共知最甚者一人先封以示群臣上封雍齒群臣皆喜曰雍齒且侯吾屬亡患矣初雍齒不欲屬沛公沛公怨齒互入鎮重大事西漢良因事納忠以變移帝意使上無阿私之失下無猜懼之謀國家無虞慮及後世若良者可謂善諫矣通監漢高紀冒頓為書褻嫚樊噲曰臣願得十萬眾橫行匈奴季布曰噲可斬也前匈奴圍高帝於平城漢兵三十二萬噲為上將軍不能解圍今歌吟之聲未絕傷夷者甫起而噲欲搖動天下妄言以十萬眾橫行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也高后曰善通監漢惠馮唐曰陛下雖得廉頗李牧弗能用也上怒召讓唐曰公奈何眾辱我獨無間處乎唐曰鄙人不知忌諱魏尚坐上功首虜差六級陛下削其爵而罰之上說令唐持節赦魏尚復以為雲中守通監漢文紀縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令右內史汲黯曰長安令無罪獨斬臣黯民乃肯出馬上默然通監漢武紀上從容謂虎賁中郎將馬援曰吾甚恨前殺守相多也對曰死得其罪何多之有但死者既往不可復生也上大笑通監漢光武紀嶺南舊獻生龍眼荔枝十里一置五里一候晝夜傳送唐羌上書曰臣聞上不以滋味為德下不以貢膳為功伏見交趾七郡獻生龍眼等南州土地炎熱惡蟲猛獸不絕於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽詔敕大官勿復受獻通監漢和紀復斷大臣行三年喪陳忠上疏臣願陛下登高北望以廿陵之思揆度臣子之心則海內咸得其所通監東漢殤帝紀河間王政慠很不奉法順帝以侍御史沈景有強能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王耶景曰王不正服常人何別今相謁王豈謁, WYG: 䘮祭}
