  - {type: variant, offset: 101, length: 0, content: '', WYG: 𫝊孫皓時錢塘湖開或言天下當太平青盖入洛陽時皓以問陳訓曰青盖入洛将有輿櫬銜璧之事尋而吳亡晉書孫秀誣潘岳石崇為亂夷三族石崇已在市岳後至崇曰安仁亦復爾耶岳曰可謂白首同所歸岳金谷詩云投分寄石友白首同所歸乃成其䜟晉書潘岳𫝊魏武帝嘗夢有三匹馬在一槽中共食其後宣帝及景文相繼為宰相遂傾曺氏宋符瑞志朱异初除中書郎時秋日始拜忽有飛蟬正集冠上時咸以為蟬珥之兆八年改侍中南史本}
