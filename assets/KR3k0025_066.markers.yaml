  - {type: variant, offset: 5603, length: 154, content: 大鎮王承元年始十七亦杖節此皆三軍所共聞也眾乃讙曰侍郎語是皇甫湜作韓愈行狀李懷光反所率皆朔方兵公知其謀與朱泚合也患之造懷光言曰公之功天下無與敵公之過未有聞於人主某至上所言公之情上寬明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君苟得志於公何有公既為太尉矣彼雖寵公何以加此彼不能事君能以事公乎公能事彼而有不能事君乎彼知, WYG: ''}
