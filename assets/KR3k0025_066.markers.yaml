  - {type: variant, offset: 2796, length: 2263, content: 譬猶一體同休等戚禍福共之君侯不受拜如是便還但相為惜此舉動恐有後悔耳羽大感悟遽即受拜通監漢獻紀帝謂侍中蘇則曰前西域通使燉煌徑寸大珠可復求市益得不則對曰若陛下化洽中國德流沙漠即不求自至求而得之不足貴也帝嘿然通監三國魏文紀魏明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射殺其子因涕泣帝以此建樹之意定魏志帝好土功陳群曰人之所欲莫不有辭況乃天王莫之敢違前欲壞武庫謂不可不壞也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也帝為之少有減省通監魏明紀帝嘗著帽披縹綾半袖楊阜問帝曰此於禮何法服也帝默然不荅自是不法服不以見阜同上過江人士每至暇日出新亭飲宴周顗中坐而歎曰風景不同舉目有江河之異皆相視流涕惟王導愀然變色曰當共戮力王室剋復神州何至作楚因相對泣耶眾收淚而謝之晉書王導傳劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其游客之思於是群胡泣去晉書互入處事間暇劉琨在晉陽嘗為胡騎所圍窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊流涕欷歔向曉復吹之賊並棄圍而走晉書本傳互入處事間暇坐以制勝人心易感三類秦王堅與群臣飲酒以秘監朱彤為正命人人以極醉為限秘書侍郎趙整作酒德之歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悅命整書之以為酒戒自是宴群臣禮飲而已通監晉武紀亙玄得志常欲以謝安宅為營謝混曰召伯之仁猶惠及甘棠文靜之德更不保五畝宅耶玄聞慚而止晉書魏崔楷為殷州剌史或勸楷留家單騎之官楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕終無叛志通鑑梁高祖蘇瓊為清河太守有兄弟爭田積年不決各相援據乃至百人瓊召而諭之曰天下難得者兄弟易求者田地假令得地失兄弟心如何因下淚兄弟叩頭乞外更分異十年遂還同住北史屈突通往陝西檢覆群牧得隱匿馬二萬匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜產之故殺千有餘人臣敢以死請又頓首曰臣一身分死就陛下匄千餘人命帝感悟悉達等皆減死論通監隋高祖文德皇后既葬帝即苑中作層觀以望昭陵引徵同升熟視曰臣眊昏不能見帝指示之徵曰臣以為陛下望獻陵若昭陵臣固見之帝泣為毀觀新唐書魏徵傳上出畋遇雨問諫議大夫昌樂谷那律曰油衣若為則不漏對曰以瓦為之必不漏上悅為之罷獵通監唐高紀互入敏於應對權善才范懷義誤斫昭陵柏罪當除名上特命殺之狄仁傑奏二人罪不當死上曰善才等斫陵柏我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易張釋之有言設有盜長陵一抔土陛下何以處之今以一株柏殺二將軍後代謂陛下為如何矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下者也上怒稍解二人除名流嶺南通監唐高宗上造鏡殿成上與劉仁軌觀之仁軌驚趍下殿上問其故對曰天無二日土無二王適視四壁有數天子不祥孰甚焉上遽令剔去上遣宦者緣江徙異竹欲種苑中宦者科舟載竹所在縱暴過荊州長史蘇良嗣囚之上疏切諫手詔慰諭良嗣令棄竹江中並同上太后謂侍臣曰自興周俊臣來死不復有反者姚元崇曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動搖所問者若有翻覆懼遭慘毒不若速死賴天啟聖心興等伏誅臣以百口為陛下保自今內外之臣無復反者若微有實狀臣請受知而不告之罪太后悅曰曏時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心通監唐武后李昭德言於太后曰天皇陛下之夫皇嗣陛下之子陛下身有天子當傳之子孫為萬代業豈得以姪為嗣乎自古未聞姪為天子而為姑立廟者也樂思晦男未十歲沒入司農上變得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承受矣太后意稍寤並同上互入頴梧大雪蘇味道以為瑞帥百官入賀殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷乎味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂諛之士也太后為之罷朝通監唐中宗鄭普思謀作亂事覺西京留守蘇環窮治之普思妻第五氏以鬼道得幸於皇后上敕環勿治侍御史范獻思進曰請斬蘇環上曰何故對曰環為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣流普思同上唐武后欲以武三思為太子以問宰相狄仁傑曰姑姪與母子孰親立廬陵王則千秋萬歲後常享宗廟三思立廟不祔姑后感悟即日遣迎廬陵王唐書狄仁傑傳互入善於言語端午日肅宗召見山人李唐帝方擁幼女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下帝泫然泣下新唐書肅宗張后傳承天皇帝倓既為張良娣所構肅宗怒而幽死又欲搖動代宗李泌入朝從容語及倓事曰臣念得黃臺瓜辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚自可四摘抱蔓歸今已一摘矣謹無再摘上愕然自是奪宗之計不行唐書李光弼代郭子儀於朔方營壘士卒麾幟無所更而光弼一號令之氣色乃益精明唐書本傳回紇吐蕃合兵圍涇陽郭子儀曰今眾寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓注矢於陣前子儀免胃釋甲投槍而進回紇諸酋長相顧曰是也皆下馬羅拜葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復總兵於此懷恩又為天所殺我曹豈肯與公戰乎通監唐代宗互入鎮重大事朱泚反諸生將從亂太學何蕃正色叱不聽故六館士無受污者唐何蕃傳互入節操辛京杲以私杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類通監唐德宗韓思彥巡察劍南益州高貲兄弟相訟, WYG: ''}
