  - {type: variant, offset: 114, length: 0, content: '', WYG: 泄鍼芒陳忠𫝊聚蚊成雷第五倫傳積日成月後漢積忤生憎積順生愛通鑑唐𤣥宗紀𫝊記戎人生乎戎而戎言楚人生乎楚而楚言不知所以受也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言也吕氏春秋互入慣習集水漸成江海桓寛鹽鐵論膚寸}
