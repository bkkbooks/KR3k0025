  - {type: variant, offset: 5989, length: 259, content: 若飲宴如故卒氣沮無以為變記聞文彥博知永興軍或言陝西鐵錢不便乞一切廢之朝廷雖不從人多知之爭以鐵錢買物賣者不肯受長安民多閉肆僚屬請禁之彥博曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百疋使賣之曰納其直盡以鐵錢勿以銅錢也於是眾知鐵錢不廢市肆復安同上慶曆中廣州有蕃商死珍珠沒官上命取珠出禁中錢易之以賜張貴妃時禁中同列因是有於上前乞旨和買緣此京師珠價騰踊上頗知之一日上於別殿賞牡丹妃嬪畢集貴妃最後至乃以前日珍珠為首飾以誇同輩至上前上望見以袖掩面曰滿頭白紛紛地更沒些忌諱妃慚赧起易之乃大悅自是禁中更不戴珠珠價大減鳴道集一語徑破千言牢, WYG: 炎凉}
