  - {type: variant, offset: 77, length: 5, content: 傳祭遵為將, WYG: 起於蜀漢今所起之地山崩川竭殆必亡矣通鑑漢成帝紀張掖柳谷口水溢涌寳石負圖状似靈龜立於川西有石馬七及鳯凰麒麟白虎犧牛璜玦八卦列宿孛彗之象于綽問鉅鹿張洊洊宻謂綽曰今漢已乆亡魏已得之何所追興朕兆乎此石當今之變異而将來之符瑞也通鑑魏明帝紀孫峻與吳主謀置酒請諸葛恪恪将入之夜精爽擾動通夕不安又家數有妖怪恪疑之魏髙貴鄉公紀諺曰鷄夜鳴者不利行師犬羣嘷者宫室将空兵動馬驚}
