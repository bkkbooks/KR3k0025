  - {type: 'tls:seg', offset: 108, content: '', id: KR3k0025_CHANT_066-1a.28}
  - {type: variant, offset: 108, length: 0, content: '', WYG: 晉紀縂論聞謗而怒者䜛之囮也見譽而喜者佞之媒也絶囮去媒䜛侫逺矣通鑑隋髙祖紀囮余周切又五戈反集凡人之獲謗譽於人者亦各有道君子在下位則}
  - {type: page-break, offset: 108, content: '', id: KR3k0025_WYG_066-8a, image: WYG0932/WYG0932-0098a.png}
  - {type: variant, offset: 108, length: 0, content: '', krp: 晉紀縂論聞謗而怒者䜛之囮也見譽而喜者佞之媒也絶囮去媒䜛侫逺矣通鑑隋髙祖紀囮余周切又五戈反集凡人之獲謗譽於人者亦各有道君子在下位則}
  - {type: variant, offset: 109, length: 2, content: 懼吳, WYG: 謗在上位則多譽小人在下位則多譽在上位則多謗柳子厚文謗譽積漸經剥床以膚凶地中生木升君子以順徳積小以髙大小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解非一朝一夕之故其所由來者漸矣易如彼雨雪先集維霰詩今夫山一卷石之多及其廣大草木生之禽獸居之寳藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉君子之道造端乎夫婦及其至也察乎天地中庸子合抱之木生於毫末九層之䑓起於累土千里之行始於足下老子方寸之木可使髙於岑樓孟子夫江始出於岷山其源可以濫觴及其至於江津不舫舟不避風不可以渉家語又荀子江河之水非一源而流墨子丘山積卑而為高江河合水而為大日計之不足嵗計之有餘荘子山霤至柔石為之穿蝎蟲至弱木為之弊夫霤非石之鑚蝎非木之蠧然而能以㣲脆之形陷堅剛之體豈非積漸之致也乎孔叢子互見柔能勝剛月不足而嵗有餘者也管子跬歩不休跛鼈千里累土不輟丘山崇成荀子積土成山風雨興焉積水成淵蛟龍生焉積土謂之山積水謂之海旦暮積謂之嵗積善而全盡謂之聖人聖人者人之所積也不積蹞歩無以致千里不積小流無以成江河荀子蚯蚓穿隄能漂一邑寸烟泄突致灰千室劉子水積則生吞舟之魚土積則生楩楠豫章尹子三代之善千嵗之積譽也桀紂之謗千嵗之積毁也互見毁譽善積則功成非積則禍極江水之始出於岷山也可褰衣而越也及至其下洞庭騖石城經丹徒起波濤舟航一日不能濟也若火之得燥水之得濕浸而益大生木之長不見其益有時而修砥礪磨礱莫見其損有時而薄夫積愛成福積怨成禍淮南子史階之為禍左隠三年積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也衆少成多積小致鉅董仲舒𫝊聚蚊成雷衆喣漂山西}
