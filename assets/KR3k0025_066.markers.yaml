  - {type: variant, offset: 115, length: 6, content: 若整厲器械激, WYG: 成霖曹子建詩蟻孔潰河溜沈傾山𫝊子由銘髙以下基洪由纎積累㣲以著張茂先勵志詩蟻壤漏山河絲淚銷金骨選君子有所思堅冰作於履霜尋木起於蘖栽文選還聞膚寸隂能致彌天澤蚊聚雷侵室山漸而髙澤積而長劉賓客集直從萌芽㧞髙自毫末始千里始足下髙山起㣲塵繡始一縷萬縷相續白侍郎集涓涓不遏終變桑田燄燄不除方燎原野陸宣公文溜之細穿石綆之細斷幹雖一勺而進可以浸天壤一拳之積可以鎮方域積訛成蠧唐文粹一息之波流於無垠皮日休集本從敲石光遂致烘天熱劉禹錫詩本沔彼濫觴蛙跳鯈逰溢而懐山神禹所憂一炬有燎原之憂而濫觴有滔天之禍東坡冉冉百尺松起自一寸根欒城集宦者之禍始於明皇盛於肅代成於徳宗極於昭宗司馬温公通鑑唐昭宗論漸染經卿士師師非度互見同惡敝化奢麗萬世同流商俗靡靡利口惟賢餘風未殄書螟蛉有子蜾蠃負之教誨爾子式榖似之詩子與善人居如入芝蘭之室乆而不聞其香即與之化矣與不善人居如入鮑魚之肆乆而不聞其臭亦與之化矣家語引而置之荘嶽之間數年雖日撻而求其楚不可得也孟子白泥在沙與之皆黑曽子蓬生麻中不扶自直習俗移志安乆移質工匠之子莫不繼事而郡國之民安習其服居楚而楚居越而越居夏而夏是非天性積習使然也蘭茝槀本漸於蜜醴荀子蘭陵多善學盖以荀卿也荀子後序扁鵲盧人也而醫多盧螟蛉之子殪而逢蜾蠃祝之曰類我類我乆則肖之矣}
