  front:
  - {type: variant, offset: 0, length: 2, content: 處事, WYG: 欽定四庫全書記纂淵海卷六十六宋潘自牧撰物理部物理盈虛經日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉日中則昃月盈則食天地盈虛與時消息而况於人乎遯者退也物不可以終遯故受之以大壮晉者進也進必有所傷故受之以明夷物不可以終難故受之以解升而不已必困故受之以困易屈伸相推易畧財聚則民散財散則民聚大學子日中則移月滿則虧老子物惡有滿而不覆者哉家語川竭而谷虛丘夷而淵實荘子名遂身退天之道也管子互見知足再實之木其根必傷文子史甚美必有甚惡左昭十一盛之有衰猶朝之必有暮也西漢韓安國𫝊夫窮髙則危太滿則溢月盈則缺日中則移福謙忌盛後漢李固𫝊𫝊記太嵗在丑乞漿得酒太嵗在已鬻妻賣子吉凶逓代盈縮循環劉知幾史通時屯必亨運䝉必正顔延年釋奠詩人道無乆盈齊謳行前榮後枯相翻覆李太白集盈虛倚伏去來之不可常柳書噫天地乆否忽泰則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧乆鬱忽散則清仲尼之道否於周秦而昏於漢魏息於晉宋鬱於陳隋遇於吾唐萬世之憤一韓而釋皇甫湜請韓公配享書命屈於當代慶流於後昆白集先緑亦先枯白樂天集本朝一年辛苦一冬閒東坡集善乎司馬光之言曰天地所生萬物止有此數不在民則在官譬如雨澤夏澇則秋旱東坡十年斂積用一朝驚濤破山風動地後山嗚呼行朕兆經履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也易如彼雨雪先集維霰吉夢維何維熊維羆男子之祥維虺維蛇女子之祥室家溱溱詩嗜欲将至有開必先天降時雨山川出雲禮記禍福将至善必先知之不善必先知之國家将興必有禎祥國家将亡必有妖孽中庸子曰余疇昔之夜夢坐奠於兩楹之}
