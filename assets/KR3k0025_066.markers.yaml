  - {type: variant, offset: 102, length: 0, content: '', WYG: 王仁裕喜為詩其少也嘗夢神剖其腸胃以西江水滌之顧見江中沙石皆為篆籕之文由是文思益進五代史𫝊記有星赤而芒角自東北西南流投於}
  - {type: page-break, offset: 102, content: '', id: KR3k0025_WYG_066-5b, image: WYG0932/WYG0932-0096d.png}
  - {type: variant, offset: 102, length: 0, content: '', krp: 王仁裕喜為詩其少也嘗夢神剖其腸胃以西江水滌之顧見江中沙石皆為篆籕之文由是文思益進五代史𫝊記有星赤而芒角自東北西南流投於}
  - {type: variant, offset: 103, length: 1, content: 將, WYG: 葛亮營三投再還往大還小俄而亮卒晉陽秋祥者福之先妖者禍之先吕氏春秋隋煬帝於宫中嘗小㑹為拆字顧蕭妃曰爾能拆朕字否妃曰移左畫居右豈非淵字乎時人望多歸唐公帝聞之不懌乃言吾不能知此事豈非聖人耶於是姦蠧起於内盜賊攻於外隋大業記乾鵲噪行人至蜘蛛集百事喜西京雜記蜀縣有火井漢室之隆則炎赫驕熾桓靈之際火勢漸㣲諸葛亮一闞而更盛異苑桑榖共生於朝一日而大拱武丁脩行諸侯來朝者六國武丁祭有飛雉升鼎耳而雊三年重譯來朝者六國尚書大𫝊本朝月暈而風礎潤而雨老蘇禍福子禍莫大於不知足老子為善者天報之以福為惡者天報之以禍家語禍福無不自己求之者孟子福輕乎羽莫之知戴禍重乎地莫之知避荘子福莫長於無禍荀子互}
  - {type: page-break, offset: 103, content: '', id: KR3k0025_WYG_066-6a, image: WYG0932/WYG0932-0097a.png}
  - {type: variant, offset: 103, length: 1, content: 將, krp: 葛亮營三投再還往大還小俄而亮卒晉陽秋祥者福之先妖者禍之先吕氏春秋隋煬帝於宫中嘗小㑹為拆字顧蕭妃曰爾能拆朕字否妃曰移左畫居右豈非淵字乎時人望多歸唐公帝聞之不懌乃言吾不能知此事豈非聖人耶於是姦蠧起於内盜賊攻於外隋大業記乾鵲噪行人至蜘蛛集百事喜西京雜記蜀縣有火井漢室之隆則炎赫驕熾桓靈之際火勢漸㣲諸葛亮一闞而更盛異苑桑榖共生於朝一日而大拱武丁脩行諸侯來朝者六國武丁祭有飛雉升鼎耳而雊三年重譯來朝者六國尚書大𫝊本朝月暈而風礎潤而雨老蘇禍福子禍莫大於不知足老子為善者天報之以福為惡者天報之以禍家語禍福無不自己求之者孟子福輕乎羽莫之知戴禍重乎地莫之知避荘子福莫長於無禍荀子互}
  - {type: variant, offset: 105, length: 1, content: 戰, WYG: 知足夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰淮南子史郤至曰禍之大者其何福之為左成十二年能者養之以福}
  - {type: page-break, offset: 105, content: '', id: KR3k0025_WYG_066-6b, image: WYG0932/WYG0932-0097b.png}
  - {type: variant, offset: 105, length: 1, content: 戰, krp: 知足夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰淮南子史郤至曰禍之大者其何福之為左成十二年能者養之以福}
  - {type: variant, offset: 107, length: 0, content: '', WYG: 能者敗以取禍成十三年禍福無門唯人所召左襄二十三年福之至也人自生之禍之至也人自成之史龜䇿𫝊朱英謂春申君曰世有無妄之福又有無妄之禍史春申君𫝊禍自怨起福由徳興西漢文帝紀福生有基禍生有胎西漢枚乗𫝊互見朕兆夫吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉而小人之慮遂以為天道難知為善未必福而為惡未必禍歐陽公唐史中宗贊集福種常有兆禍至豈無端君子行詩凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為常君子得福為常而小人得福為不幸以其所為似有以取之也必曰君子則吉而小人則凶者不可也韓文毁譽經吾之於人也誰毁誰譽論語子有不虞之譽有求全之毁孟子三代之善千嵗之積譽也桀紂之謗千嵗之積毁也譽生則毁隨之淮南子我未見聞謗而喜聞譽而懼者文中子史季布曰以一人譽召臣一人毁去臣前漢季布𫝊互入不審毁譽愛惡之原禍福之機也魏志王祖𫝊毁譽脅於勢}
  - {type: page-break, offset: 107, content: '', id: KR3k0025_WYG_066-7a, image: WYG0932/WYG0932-0097c.png}
  - {type: page-break, offset: 107, content: '', id: KR3k0025_WYG_066-7b, image: WYG0932/WYG0932-0097d.png}
  - {type: variant, offset: 107, length: 0, content: '', krp: 能者敗以取禍成十三年禍福無門唯人所召左襄二十三年福之至也人自生之禍之至也人自成之史龜䇿𫝊朱英謂春申君曰世有無妄之福又有無妄之禍史春申君𫝊禍自怨起福由徳興西漢文帝紀福生有基禍生有胎西漢枚乗𫝊互見朕兆夫吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉而小人之慮遂以為天道難知為善未必福而為惡未必禍歐陽公唐史中宗贊集福種常有兆禍至豈無端君子行詩凡禍福吉凶之來似不在我惟君子得禍為不幸而小人得禍為常君子得福為常而小人得福為不幸以其所為似有以取之也必曰君子則吉而小人則凶者不可也韓文毁譽經吾之於人也誰毁誰譽論語子有不虞之譽有求全之毁孟子三代之善千嵗之積譽也桀紂之謗千嵗之積毁也譽生則毁隨之淮南子我未見聞謗而喜聞譽而懼者文中子史季布曰以一人譽召臣一人毁去臣前漢季布𫝊互入不審毁譽愛惡之原禍福之機也魏志王祖𫝊毁譽脅於勢}
