  - {type: variant, offset: 350, length: 254, content: 游客之思於是群胡泣去晉書互入轉移人心人心易感謝艾距石季龍將麻秋艾乘軺車冠白帽鳴鼓而行秋大怒馳擊之左右大擾勸艾乘馬艾不從乃下車踞胡床指麾處分賊不敢進晉書柴紹討吐谷渾虜據高射紹軍士失色紹安坐遣人彈胡琵琶使二女子舞虜疑之休射而觀唐書僕固懷恩誘吐蕃等南下急召郭子儀屯涇陽回紇曰謂令公亡矣令公誠存安得而見之子儀將出諸將請無往子儀曰虜數十倍之眾今力固不敵至諴感神況虜乎諸將請選鐵騎五百為衛子儀曰適足為害也即傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免冑而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召, WYG: 徳亦方介自約時嵗飢或哀}
