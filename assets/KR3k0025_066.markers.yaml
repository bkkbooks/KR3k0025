  - {type: variant, offset: 3, length: 1, content: 暇, WYG: 余殆将死矣遂寢疾七日而歿禮記子目将眇者先觀秋毫耳将聾者先聞蚋聲列子人之将疾必先不甘粱肉之味國之将亡必先惡忠直之言晏子一葉落而知天下之秋淮南子}
