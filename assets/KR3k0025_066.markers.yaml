  - {type: variant, offset: 5060, length: 529, content: 年不決思彥敕廚宰飲以乳二人悟泣曰公將以兄弟共乳而生邪乃請輟訟唐書帝問公權用筆法對曰心正則筆正筆正乃可法矣時帝荒淫故公權及之帝改容悟其以筆諫也新唐書本傳互入嘿會高仁厚圍梓州久不下乃為書射城中遺其將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功若十日不送楊師立者當分見兵為五番番分書夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於眾曰天子所誅者元惡耳他人無預也眾呼萬歲通監唐僖宗帝嘗畋於中牟踐民稼中牟令當馬前諫曰陛下為民父母奈何毀其所食使轉死溝壑乎帝怒叱去將殺之敬新磨追擒至馬前責之曰汝為縣令獨不知吾天子好獵耶奈何縱民耕種以妨吾天子之馳騁乎汝罪當死因請行刑帝笑而釋之通監後唐莊宗傳記景公使人養所愛馬馬病死公怒令人殺養馬者晏子請數之曰爾有三罪使汝養馬殺之一當死也又殺公素所喜馬二當死也使公以一馬之故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之晏子春秋魏武行役失道三軍皆渴乃令曰前有大梅林梅子甘酸可以解愒集鎮州亂殺其帥田弘正詔公往宣撫既行疾驅入公告兒郎等以天寶來禍福為兒郎等明之安祿山史思明李希烈梁崇義朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎眾皆曰無又曰令公以魏博六州歸朝廷為節度使後至中書令父子皆授旌節子與孫雖在幼童者亦為好官, WYG: 将}
