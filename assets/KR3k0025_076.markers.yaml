  - {type: variant, offset: 505, length: 4, content: 修整榖梁, WYG: 古無瘞主之義梅福云姬姓半天下祧主流出於戸明周之主四十二世並不毁也栁氏家學錄集束帛從王事結纓奉清祀肅肅禁圍内翳然絶塵軌孔欣詩敬恭明祀孝道感通合樂維和展禮有容顔峻樂辭潔齊謝紛黷寂寥清廟静肅敬示牲盛端服待嚴省張率詩本朝太祖見太廟所陳籩豆簠簋曰我之祖寧曽識此命撤去令進常膳享畢顧近臣曰却令設向來禮噐俾儒士軰行事至今太廟先進牙盤後行禮言行錄康節云姑以權宜而論之則莫若以僖祖擬周之后稷而祭於太廟之初室順祖為昭翼祖為穆宜祖為昭而蔵其祧主於西夾室太祖為穆擬周之文王為祖而祭於太廟之第二室太宗為昭擬周之武王而祭於太廟之第三室其太祖太宗又皆百世不遷而謂之世室真宗為穆其祧主亦且權藏於西夾室仁宗為昭為宗而祭於第四室亦為世室如太宗之制英宗為穆藏主如真宗之制神宗為昭祭第五室哲宗為穆祭第六室徽宗為昭祭第七室欽宗為穆祭第八室髙宗為昭祭第九室孝宗為穆祭第十室異時髙宗亦當為宗為世室如太宗仁宗之制三嵗合享則僖祖東向如故而自順祖以下至於孝宗皆合食焉則心為安而於禮為順矣朱文公奏議原廟史漢恵帝作復道叔孫通曰髙帝寢衣冠月出游髙廟奈何乗宗廟道上行哉恵帝曰急壊之通曰人主無過舉願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本乃詔有司立原廟漢叔孫通}
