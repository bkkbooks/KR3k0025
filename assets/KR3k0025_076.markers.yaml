  body:
  - {type: variant, offset: 2, length: 0, content: '', WYG: 是夜有美光及晝黄氣上屬天並同上宣帝五鳳三年詔曰朕飭躬齋戒郊上帝祠后土神光並見或興于谷燭耀齋宫十餘刻本紀成帝建始元年作長安南北郊罷甘泉汾隂祠二年罷雍五畤辛巳上始郊視長安南郊詔曰廼者徙泰畤后土於南郊朕親飭躬郊祀上帝皇天報應神光並見本紀其後甘泉泰畤汾隂后土如故天子復親郊祀如前郊祀志光武隴蜀平後乃増廣郊祀髙帝配食位在中壇上禮儀志唐顯慶二年許敬宗與禮官等議曰六天出於緯書而南郊圜丘一也而𤣥以為二物郊及明堂本以祭天而𤣥皆以為祭太㣲五帝唐禮樂志𤣥宗既已定開元禮天寳元年遂合祭天地於南郊同上𤣥宗即位未郊見張九齡言願以迎日之至升紫壇陳采席定上位則聖典無遺矣本傳傳記祭天紫壇幄惟髙皇帝配天堂下西嚮紺幄紺席漢官儀集及將祀天郊報地功祈福乎上𤣥思所以為䖍肅肅之儀盡穆穆之禮殫然後以獻精誠奉禋祀曰允矣天子也張平子東京賦配天道尊近陽義重梁簡文頌美報崇本嚴恭展事受露流壇承風啟地潔粢登爼醇犧入饋魏徴樂章欽惟大帝載仰皇穹始命田燭爰啓郊宫雲門駭聴雷鼔鳴空神其介祀景祚斯融魏徴等作圜丘詩疊壁凝影皇壇路編珠流彩帝郊前同上受昭華之玉允洽人神泥封祀之金大報天地文粹虞帝廟碑大君出震有事郊禋齋戒既肅馨香畢陳樂和禮備候暖風春恭惟降福實頼明神劉冕樂章禋宗於地昭嘏於天惟馨薦矣既醉歆焉神之降福永永萬年文粹樂章肅我成命於昭黄祇裘冕而祀陟降在斯五音克備八變聿施禮以琮玉薦厥茅藉賀知章樂章除太壇柴太清受天命報天成竦皇心薦樂聲開元樂章兆南郊之正位乃陽事之所司栁迎長日賦本朝古者大事皆避月晦南郊必用冬至之日周禮也皇祐四年當郊而日至在晦遂改為明堂藝祖四年郊日至亦在晦至期竇儼始上聞}
