  - {type: variant, offset: 1634, length: 340, content: 阮籍㛐嘗歸家籍相見與別人或譏之曰禮豈為我輩設耶世說王澄嘗之荊州送者傾邑所別樹上有鵲巢澄便脫衣著犢鼻上樹探鵲𪆪而弄之旁若無人晉中興書謝郎中云王修載樂託之性出自門風世說王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴同上互入無恥史丹儻蕩無檢阮籍不拘禮教孔白帖縱逸類華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時迴杜牧之為御史分務洛陽有李司徒者罷鎮閑居聲妓為當時第一嘗開筵以杜持憲不敢邀致杜遣客達意李馳書招之杜聞命遽來時女妓百餘人皆絕藝殊色杜獨坐南行住目瞪視引滿問李曰聞有紫雲者孰是李指示杜凝睇良久曰名不虛得宜以見惠李俯而笑諸妓亦皆回首破顏杜又自飲三爵即吟而起本事詩杜牧佐宣城幕聞湖州多奇麗往遊之剌史崔君張水嬉使州人畢觀令杜牧閱之牧因見一女娃期之曰吾不, WYG: 纂淵海卷七}
