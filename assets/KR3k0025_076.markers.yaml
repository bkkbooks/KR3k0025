  front:
  - {type: variant, offset: 0, length: 1, content: 能, WYG: 欽定四庫全書記纂淵海卷七十六宋潘自牧撰祭祀部郊祀經昊天有成命郊祀天地也詩并序禋祀祀昊天上帝周禮大宗伯冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣大司樂祭帝於郊所以定天位也記禮運故禮行於郊而百神受職焉同上因吉土以饗帝於郊禮噐饗帝於郊而風雨節寒暑時祀帝於郊敬之至也並同上郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也噐用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也郊之用辛也周之始郊日以至郊特牲祭之日王被衮以象天戴冕璪十有二旒則天數也乗素車貴其質也旗十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也郊之祭也大報本反始也並同上成七年鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛春秋襄七年夏四月四卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也左傳成十七年九月用郊用者何用者不宜用也九月非所用郊也然則郊曷用郊用正月上辛公羊傳嵗以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣穀梁傳子昔者周公郊祀后稷以配天孝經郊者合百神於上天而祭祀之也荀子史秦文公夢黄蛇自天下屬地遂問史史曰此上帝之證也君其祠之於是作鄜畤用三牲郊祭白帝焉漢郊祀志漢文帝十四年黄龍見於成紀詔曰有異物之神見於成紀歳以有年朕幾郊祀上帝諸神禮官議毋諱以朕勞有司皆曰古者天子夏親郊祀上帝於郊於是帝始幸雍郊見五畤祠衣皆尚赤本紀及郊祀志武帝元鼎五年十一月辛巳朔旦冬至天子親郊詔曰廵祭后土以祈豐年望見泰一修天文䄠辛卯夜若景光十有二明朕甚念年歳未登飭躬齋戒丁酉拜況於郊本紀太始二年詔有司議曰徃者朕郊見上帝西登隴首獲白麟以饋宗廟後元元年詔曰朕郊見上帝見羣鶴留止不以羅網靡所獲薦獻於泰畤光景並見並同上武帝定郊祀之禮祀太一於甘泉祭后土於汾隂禮樂志作郊祀歌十九章同上上初至雍郊五畤後常三歳一郊郊祀志後二年郊雍獲一角獸有司曰陛下肅祗郊祀上帝報享天子始郊拜太一公卿}
