  - {type: variant, offset: 119, length: 0, content: '', WYG: 論語史秦令祠官所常奉天地名山大川於是自殽以東名山五大川二史封禪書名山大川禱祀用牛犢各一牢其圭幣各契也同上漢文帝修名山大川常祀而絶者有司以歳時致禮前本紀武帝建元詔曰河海潤千里其令祠官修山川之同為歳事本紀元封詔曰朕用事華山至於中岳獲駮鹿同上宣帝詔曰盖聞天子修祀山川古今通禮也夫江海百川之大者也今闕焉無祠其令祠官以禮為歳事以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮郊祀志章帝詔曰今山川應典禮者尚未咸秩其議増修羣祀以祈豐年後本紀魏文帝黄初二年初禮五嶽四瀆咸秩羣祀瘞沈圭璧晉志明帝太和四年遣使者以特牛祠中嶽宋咸熈元年使使以璧幣禮祠華山並禮樂志集海於天地間為物最鉅自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上韓文雩祭經若國大旱則率巫舞雩周禮司巫旱暵則舞雩女巫仲夏大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈􅂖實記月令雩宗祭水旱也祭法龍見而雩左傳雩者}
