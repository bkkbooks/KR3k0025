  - {type: variant, offset: 37, length: 1, content: 怍, WYG: 受天陽也薄社北牖使隂明也社所以神地之道也郊特牲唯為社事單出里唯為社田國人畢作唯社丘乗共粢盛所以報本反始也同上王自為立社曰王社諸侯自為立社曰侯社祭法厲山氏之有天下也其子曰農能殖百榖夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社同上社稷五祀是崇是奉左傳稷田正也有烈山氏之子曰柱為稷因夏以上祀之周棄亦為稷自商以來祀之同上夏后氏以松殷人以柏周人以栗論語子犧牲既成粢盛既潔祭祀以時然而旱乾水溢}
