  - {type: variant, offset: 2121, length: 892, content: 經以虛薄為辨而賤名檢以放蕩為通而狹節信以苟得為貴而鄙居正以望空為高而笑勤恪于令升總論互入居邪惡正少年氣真狂有意與春競韓文野鳥終難縶元微之醉來擬共天公爭杜荀鶴酒腸寬似海詩膽大如天劉義本朝醉後麤狂膽滿軀東坡詩經威儀棣棣不可選也詩邶風威儀反反慎重威儀抑抑謹密並詩賓之初筵抑抑威儀維德之隅詩抑顒顒卬卬如圭如璋詩卷阿令儀令色詩烝民威儀容止宣著詩淇奧注端行頤霤如矢記玉藻直也朝廷濟濟翔翔君子之容舒遲同上山立時行揚休玉色同上注揚讀為陽互入持重赫兮咺兮者威儀也記大學趍進翼如也語鄉黨君子正其衣冠尊其瞻視儼然人望而畏之語堯曰互入持重容止可觀進退可度孝經子步中武象趨中韶濩荀大略君子貌重則有威揚史劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也左成十三年北宮文子有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家左襄三十一年君子在位施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也同上魯徐生善為容為禮官史儒林霍光每出入下殿門止進有常處郎僕射竊識視之不失尺寸西漢霍光傳互入矜持威儀之盛如圭如璋西漢班固敘傳進止皆有表識東漢馮異傳儀貌堂堂國之輝光東漢杜詩舒紳緩佩鳴玉以步綽有餘裕後漢蔡邕傳溫彥博進止詳華人拭目觀唐書張垍舉止都雅裴休為人醞藉進止雍閑馮定端凝若植權德輿動止外飾其醞藉風流為縉紳羽儀並同上集風儀與秋月齊明文選褚淵碑賀琛為散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之藝文志巉巖容儀削成風骨李白文風儀甚雅劉賓客日光玉潔李漢韓文序經而無望兮詩宛丘相鼠有皮人而無儀人而無儀不死何為詩相鼠威儀不類詩瞻卬威儀幡幡詩賓之初筵失威儀也史視流而行速左成六年邾子執玉高其容仰公受玉卑其容俯子貢曰高仰驕也卑俯替也驕近亂替近疾左定十五年張敞為京兆尹無威儀罷朝走馬章臺街自以便面拊馬西漢本傳羞怍俛首刮席不敢視東漢劉玄傳李程簡脫無威儀唐書本傳韓思彥儀矩梗野同上傳記王戎簡脫不持儀刑好乘巴𩥄馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之竹林七賢話, WYG: ''}
