  - {type: variant, offset: 6, length: 4, content: 靜言庸違, WYG: 依年飛移位次祭告謹按郄良過九宫有飛棊立成圖每歳一移兼推九州所生灾害之法乞随貴神每年飛棊之方旋定祭位從之其法自天聖七年己巳入歴太一在乙宫歳進一位飛棊廵行周而復始㑹要祭日月經圭璧以祀日月周禮典瑞郊之祭也大報天而主日配以月記祭義祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位同上王宫祭日也夜明祭月也祭法史三代之禮春朝朝日秋暮夕月所以明有敬也前賈誼傳䟽漢武帝元鼎五年天子親郊見朝日夕月本紀朝日以五采夕月以少采同上祭日以牛祭月以羊彘郊祀志宣帝成山祠日莱山祠月同上建武二年初置郊兆於雒陽日月在中營内南道日在東月在西祭祀志魏文帝詔曰漢氏旦夕常於殿下東西拜日月煩䙝似家人之事非事天神之道也晉禮志魏明帝太和二年二月祀朝日於東郊八月夕月於西郊始得古禮晉春分祀朝日於東秋分祀夕月於西並同上日月於壇第一等大明於東陛之南夜明於西陛之北席皆以藁桔唐禮樂志日以圭璧幣以青月以圭璧幣以白大明青犢夜明白犢並同上傳記先王朝日夕月以教民事君國語禮日於東門之外禮月於西門之外儀禮祀日月於北郊以為地祇也通典凡祭日月一嵗有四焉迎氣之時祭日於東郊祭月於西郊一也二分祭日月二也郊之祭大報天而主日配以月三也日月祭天宗合祭日月四也同上集朝日闓陽播氣甄曜垂明有赫圓宰深仁曲成日嚴蒼璧煙開紫營聿尊䖍享式降鴻禧唐樂章惟聖格天惟明享日帝郊肆類王宫戒吉珪奠春舒鍾歌曉溢禮云克被斯文有秩同上夕月測妙為神通㣲曰聖坎祀貽則郊禋展敬璧薦登光金歌動映唐樂章朏晨事舉天宗禮闢夜典凉秋隂明堪夕有齊斯㫖有牲斯碩穆穆其輝穰穰是積晨儀式薦明祀惟光神物爰止靈暉載楊元端肅事紫幄興祥並同上祭風雨經以槱燎祀風師雨師周禮大宗伯兆風師於西郊兆雨師於北郊小宗伯注史圓壇外營祀風伯雨師之属後祭祀志以丙戌日祠風伯於戍地以己丑日祀雨師於丑地同上本朝風伯雨師為小祀祀令祭社稷經湯既勝夏欲遷其社不可作夏社}
