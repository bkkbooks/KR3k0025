  - {type: variant, offset: 120, length: 0, content: '', WYG: 旱祭也然則何以不言旱言雩則旱見言旱則雩不見何以書記災也公羊傳史漢昭帝始元六年夏旱大雩不得舉火前本紀梁大雩圜丘壇於南郊之左祈五天帝及五人帝於其上卜日又徧祈社稷山林川澤就故地處大雩國南除地為墠祈百辟卿士於雩墠之左舞童六十四人為八列各執羽翳每列歌雲漢詩而畢隋禮志天監九年有}
