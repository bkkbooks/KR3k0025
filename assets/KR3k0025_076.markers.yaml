  - {type: variant, offset: 5, length: 0, content: '', WYG: 故太昊配木神農配火黄帝配土少昊配金顓帝配水此五帝者配天之神同兆於四郊報之於明堂或以為五精之神佐天育物前代莫之或廢晋禮志唐永徽二年以髙祖配五天帝以太宗配五人帝唐禮樂志集金縣詔肆玉爼朝陳享薦黄道分派紫辰乃誠乃敬載享載禋唐祀黄帝樂章元鳥司春蒼龍登歳瑶席降神朱絃享帝誠備祝嘏禮殫珪幣祀青帝昭昭丹陸奕奕炎方禮陳牲幣樂備箎簧瓊羞溢爼玉齊浮觴祀赤帝律應西成氣踵南吕珪幣咸列笙竽備舉苾苾蘭羞芬芬桂醑祀白帝陽月斯紀應鍾在侯載潔牲牷愛登爼豆既髙既逺無聲無臭祀黑帝本朝乾徳二年太常禮院言舊例正月上辛祀昊天上帝以順祖配坐以五方帝為從祀㑹要祀感生帝本朝乾徳元年聶崇義請别祀赤帝為感生帝每正月别壇而祭從之二年太常禮院言舊例祀昊天上帝以五方帝為從祀且祀為感生尊而奉之也列於從祀降而卑之也欲望於上二日祀昊天上帝從祀之内不設赤帝一坐所貴顯特尊於感生帝奉勅冝依㑹要皇上淳祐丙午朔龍翔宫以奉感生帝每四時孟饗畢車駕臨幸行禮抵報祠太一史亳人薄誘忌奏祠太一方曰天神貴者太一太一佐曰五帝於是天子立其祠長安東南郊其後人有上書言古者天子三年一用太牢其祠神三一天一地一泰一天子許之史記漢武帝朝武帝置壽宫神君神君最貴者曰太一其佐曰太禁漢郊祀志傳記太一天之尊神祠在楚東以配東帝故曰東皇太一楚辭注集吉日兮辰良穆將愉兮上皇撫長劔兮玉珥鏐鏘鳴兮琳瑯瑶席兮玉瑱盍將把兮瓊芳蕙肴蒸兮蘭藉奠桂酒兮椒漿揚枹兮拊鼔䟽緩節兮安歌陳竽瑟兮浩倡靈偃蹇兮姣服芳菲菲兮滿堂五音紛兮繁㑹君欣欣兮樂康楚辭東皇太一本朝景祐二年章得象等言司天監生于淵奏祠九宫神位止用一局乞將九宫太一}
