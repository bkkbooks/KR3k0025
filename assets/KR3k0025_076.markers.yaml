  - {type: variant, offset: 812, length: 314, content: 光逢規矱自持孔六帖柳仲郢私居束帶正色同上經虎視耽耽易頤卦伊川云重其體貌也正色率下書畢命其容不改出言有章詩都人士坐如尸立如齊記曲禮上君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也記表記互入矜持君子之容舒遲足容重手容恭目容端口容止聲客靜頭容直氣容肅立容德色容莊記玉藻山立時行揚休玉色同上互入威儀不旁狎記少儀夫子時然後言人不厭其言樂然後笑人不厭其笑語憲問君子正其衣冠尊其瞻視儼然人望而畏之語堯曰互入威儀集與人有畛域不為戲狎唐文粹互入矜持本朝包孝肅未嘗有笑容人謂包希仁笑比黃河清筆談經欲敗度縱敗禮書太甲不矜細行書旅獒不知其秩常也詩賓之初筵載號載呶同上子猖狂妄行莊史使酒難近西漢李布傳數以酒失過丞相西漢灌夫跅弛之士西漢, WYG: 忠獻王普曹}
