  - {type: variant, offset: 168, length: 8, content: 魏比年將帥多寵貴, WYG: 配明堂古之帝王自非建邦啟土及造有區夏者皆無配天之禮宜遵舊典以真宗配五帝於明堂李受等議以仁宗與真宗並配明堂詔從珪等議㑹要宗廟經不喪匕鬯出可以守宗廟社稷以為祭主也易震卦王假有廟王乃在中也渙卦先王以享於帝立廟同上作廟翼翼詩於穆清廟肅雝顯相周頌新廟奕奕魯頌掌建國之神位左宗廟周禮小宗伯宗廟之中未施敬於民而民敬之記檀弓天}
