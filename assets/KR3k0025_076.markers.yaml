  - {type: variant, offset: 512, length: 0, content: '', WYG: 羊傳大祫者何合祭也其合祭謂何毁廟之主陳於大祖未毁廟之主皆升合食於太祖五年而再盛祭同上禘自既灌而徃者吾不欲觀之矣論語或問禘之說子曰不知也知其說者之於天下也其}
  - {type: page-break, offset: 512, content: '', id: KR3k0025_WYG_076-34b, image: WYG0932/WYG0932-0344b.png}
  - {type: variant, offset: 512, length: 0, content: '', krp: 羊傳大祫者何合祭也其合祭謂何毁廟之主陳於大祖未毁廟之主皆升合食於太祖五年而再盛祭同上禘自既灌而徃者吾不欲觀之矣論語或問禘之說子曰不知也知其說者之於天下也其}
  - {type: variant, offset: 513, length: 2, content: 布帛, WYG: 示諸斯乎指其掌同上史光武朝張純奏曰三年一祫五年一禘禘}
  - {type: variant, offset: 513, length: 2, content: 布帛, krp: 示諸斯乎指其掌同上史光武朝張純奏曰三年一祫五年一禘禘}
  - {type: variant, offset: 516, length: 0, content: '', WYG: 為言諦也諦定昭穆尊卑之義也祫者五糓成熟物備禮成故合聚飲食也帝從之後張純傳禘於首夏物皆未成故為小祫於秋冬萬物皆成故為大隋禮儀志}
  - {type: variant, offset: 516, length: 0, content: '', krp: 為言諦也諦定昭穆尊卑之義也祫者五糓成熟物備禮成故合聚飲食也帝從之後張純傳禘於首夏物皆未成故為小祫於秋冬萬物皆成故為大隋禮儀志}
  - {type: variant, offset: 517, length: 3, content: 幅左襄, WYG: 司議以為一禘二祫五年再盛宜通數而禘後置祫嵗數逺近二說不同鄭𤣥用髙堂隆先三而後二徐邈先二後三而邈以謂二禘相去為月六十中分三十置一祫焉由是一禘一祫在五年之間合於再盛之義唐禮儀志傳記祭宗廟所以禘祫何尊人君貴功徳廣孝道位尊徳盛所及彌逺白虎通三年一祫五年一禘以衣服想見其顔色三日齋思親志意想見所好意喜然後入廟禮稽命驗本朝宗廟之制今日雖未及議尚期興復之後還反舊都則述神宗之制而一新之以正千載之謬成一王之法使昭穆有序而祫享之禮行於室中則又善之大者也朱文公奏議四時祭經禴祠烝嘗於公先王詩天保以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王周禮大宗伯春祀夏禴祼用雞􅂜鳥彞其朝踐用兩獻尊其再獻用兩象尊秋嘗冬烝祼用斝􅂜黄彞其朝獻用兩著尊其饋獻用兩一尊諸尊􅂜天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝記王制諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿同上礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也祭統仲春獻羔開氷孟夏以彘嘗麥仲夏以雞嘗黍孟秋天子嘗新仲秋以犬嘗麻皆先薦寢廟月令史廟以藏主以四時祭後祭祀志傳記年祭於寢月祭於廟時祭於便殿寢日四上食廟歳}
