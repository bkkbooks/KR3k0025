  - {type: variant, offset: 121, length: 1, content: 污, krp: 雩壇武帝以為兩既類而求之正陽其謬已甚東方既非盛陽而為生養之始則雩壇應在東方遂移於東郊又以雩祭燔柴之說乃停用柴從坎瘞典北齊以孟夏龍見而雩祭太㣲五精帝於夏郊之東焉壇於上祈糓藉以藁桔若不雨則使三公祈於雩壇禮用玉幣有燎不設金石之樂選伎歌雲漢之詩於壇南並同上賀師仕齊以龍見請雩時藁阿那肱為錄尚書事大驚喜問龍何在作何顔色師曰此是龍星初見依禮當雩祭郊壇非謂真龍阿那肱忿然曰漢兒多事強知星宿祭事遂不行北史貞觀禮孟夏雩於南郊祀五天帝顯慶三年許敬宗與禮官議黜鄭𤣥說而禮昊天上帝開元中王仲丘議月令大雩盛祭也宜兼用之以合大雩之義唐禮樂志傳記雩祭舞者吁嗟而請雨爾雅注蜡祭經國祭蜡則龡豳頌擊土鼓以息老物周禮籥章昔者仲尼與於蜡賓記禮運天子大蜡八伊耆氏始為蜡蜡也者索也歳十二月合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也迎貓為其食田䑕也迎虎為其食田豕也祭坊與水庸事也曰土反其宅水歸其壑昆蟲毋作草木歸其宅郊特牲黄衣黄冠草服也八蜡以記四方四方年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功並同上秋省而遂大蜡明堂位子貢觀於蜡子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所及也雜記史後周常以十月祭神農伊耆后稷田畯鱗羽臝毛介水庸坊郵表畷獸猫之神明日乃蜡祭於南郊如東郊儀隋禮儀志隋開皇四年詔後周夏后之時行姬氏之蜡考諸先代於義有違其十月行蜡者停可以十二月為臘同上蜡祭奏諴夏四方有祀八蜡酬功三時告勞一日為澤晉樂志唐蜡祭百神大明夜明在壇上神農伊耆各在其壇上后稷在壇東五官田畯各在其方五星十二次二十八宿五方之岳鎮海瀆山林川澤丘陵墳衍原隰井泉各在其方之壇龍鱗朱鳥騶虞元武鱗羽臝毛介水庸坊郵表畷於蒐猫各在其方壇之後唐禮樂志元冕者蜡祭百神之服也車服志傳記房𤣥齡等議曰按月令蜡法唯祭天宗迎代蜡五天帝五人帝皆非古典今並除之季冬寅日蜡祭百神於南郊大明用犢二籩豆各四神農及伊耆氏各用少牢一籩豆與大明同通典集日躔星紀大吕司辰歴象改次衆庶更新歳事告成八蜡報勤告成伊何年豐物阜報勤伊何農功是歸晉裴秀詩凝寒迫清祀有酒宴嘉平宿心何所道藉此慰中情魏收詩本朝建隆四年和峴言蜡祭之禮始於伊耆氏王者因行臘蜡上享宗廟旁及五祀展其孝心盡物而示恭也至唐貞觀之際前寅蜡百神邜日祭社宫辰日臘享宗廟開元定禮三祭皆以臘辰以應土徳伏惟聖朝火徳合以戌日為臘而以前七日辛夘便行蜡恐未為宜若以祀事稍併即以申日蜡百神酉日祭太社太稷戌日臘享太廟太常禮院請同用戍臘一日從之㑹要釋奠經過大山川反行舍奠周禮太祝及郊饁獸舍奠於祖禰甸祝天子將出征受成於學出征執有罪反釋奠於學以訊馘告王制凡學春官釋奠於先師秋冬亦如之文王世子凡始立學者必釋奠於先聖先師及行事必以幣同上史魏齊王正始二年使太常釋奠以太牢祠孔子於辟雍以顔回配晉禮志後齊皇帝至學講畢以一太牢釋奠孔父配以顔回列軒垂樂八佾舞行三獻皇太子每通一經亦釋奠乗石山安車三師乗車在前三少從後而至學焉隋禮儀志隋國子寺每嵗以四仲月上下釋奠於先聖先師州郡學則以春秋仲月釋奠同上唐仲春仲秋釋奠於文宣武成王皆以上丁上戊唐禮樂志許敬宗等奏禮學官釋奠於先師鄭𤣥謂詩書禮樂之官也四時之學將習其道故釋奠各以其師而不及先聖惟春秋合樂則有司總祭先聖先師秦漢釋奠無文魏則以太常行事昔宋以學官主祭禮志傳記齊武帝朝有司奏釋奠先聖先師未嘗令當行何禮用何樂時從喻希議用元嘉故事設軒垂之樂六佾之舞牲牢噐用悉依上公通典開元十一年詔春秋釋奠用牲牢同上集乃修嘉薦於國之雍敬享先師以疇聖功傅咸頌講業既終禮師釋奠升觴析爼上下惟燕摯虞頌尊師重道釋奠崇祀潘尼頌敬恭祀典告奠聖靈禮属觀盥樂薦歌笙顔延之詩告奠明祀觀道聖門任昉詩郡邑禮社稷孔子獨孔子用王者事以門人為配天子以下北面拜跪薦祭禮如親弟子者句龍弃以功孔子以徳固自有次第哉韓文本朝元豐七年詔自今春秋釋奠以鄒國公孟子配食文宣王位於兖國公之次荀况楊雄韓愈以世次先後從祀於左丘明等二十一賢之間並封伯爵㑹要釋菜經春入學舍采合舞周禮大胥仲春上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親徃視之記月令始立學者既興噐用幣然後釋菜不舞不授噐文王世子皮弁祭菜示敬道也學記史魏道武天興四年命樂師入學習舞釋菜於先師北儒林傳序貞觀六年詔罷周公祠更以孔子為先聖顔氏為先師數臨幸國子學觀釋菜唐儒學傳傳記孔頴達講經獻上釋菜頌通典明堂經我將祀文王於明堂也周頌詩序夏后氏世室殷人重屋周人明堂周禮匠人周公朝諸侯於明堂之位記明堂位明堂也者明諸侯之尊卑也太廟天子明堂並同上祀乎明堂所以教諸侯之孝也樂記子周公宗祀文王於明堂孝經夫明堂者王者之堂也孟子神農以時嘗糓祀於明堂淮南子史漢武帝欲治明堂未曉其制度濟南人公玉帶上黄帝時明堂圖天子從之是歳祀太一五帝於明堂修明堂如郊禮前郊祀志以十月甲子朔旦冬至日祀上帝於明堂同上元封二年作明堂於泰山下本紀備法物之駕盛清道之儀坐明堂而朝羣后後儒林傳章帝元和二年宗祀五帝於汶上明堂本紀宋武帝起明堂於國學之南丙巳之地本紀魏修明堂封軌議曰三代明堂其制一也五室之議得天數矣鄭𤣥曰五室者象五行也九階者法九土四戸者達四時八牕者通八風誠不易之大範有國之常式若其上圜下方以則天地通水環宫以節觀覩茅盖白盛為之質赤綴白綴為之戸牖皆典籍所載制度之明義也秦焚五典更變先聖故吕氏月令見九室之義大戴之禮著十二堂之文漢承秦法亦未能改東西二京俱為九室夫室以祭天堂以布政依行而祭故室不過五依時布政故堂不踰四月之與辰非所可法九與十二厥用安在宜則五室以為永制北封軌傳明堂者所以通神靈感天地出教化崇有徳黄帝曰合宫堯曰五府舜曰總章布政興治其來尚矣隋牛𢎞傳則天毁乾元殿以其地立明堂其制淫侈無復可觀火焚之迄唐之世季秋大享皆寓圜丘唐祭祀志陳子昂說武后興明堂可謂薦圭璧於房闥以脂澤汙漫之也子昂其聾瞽歟本傳賛黄帝曰合宫有虞曰總章殷曰陽舘周曰明堂斯皆路寢之驗知非别處舊唐禮樂志傳記孔子觀乎明堂有善惡之狀興廢之誡又有周公相成王抱之負斧扆南面以朝諸侯之圖焉子曰此周之所以盛也家語明堂之制下之温濕不能及也上之寒暑不能入也木工不鏤示明之節也晏子春秋周明堂茅茨蒿柱土階三等以見節儉也吕氏春秋或以為明堂者文王廟周徳洽和結蒿茂大以為宫柱名曰蒿宫同上明堂九室一室有四戸八牖凡三十六戸}
  - {type: variant, offset: 125, length: 0, content: '', WYG: 牖以茅屋上圜下方九室者取象陽數也八牖者隂數也取象八風三十六户取六甲之爻六六三十六也上圜象天下方法地四闥者象四時也五室者象五行也三輔黄圖集靈臺明堂綂和天人班東都賦於昭明堂明堂孔陽聖皇宗祀穆穆皇皇上帝宴饗五位時序誰其配之世祖光武詩明堂者天子太廟所以崇禮其祖以配上帝者也東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室故雖有五名而主以明堂也其正中焉皆曰太廟謹承天隨時之令昭令德宗祀之禮明前功百辟之勞起尊老敬長之義顯教幼誨穉之學朝諸侯選造士於其中故為大教之宫而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之教之所由生故言明堂事大義之深也取其宗祀之清也則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四面周水圓如璧則曰辟雍其實一也蔡邕論肅肅明堂惟徳之光儀天矩地崇姬潤黄虞通之頌明堂者明乎天道者也所以明有功褒有徳崇大教明大政登假嚴禋欽宗修祀考經緯之長䇿應黄鍾之旋宫穆穆四門恊納四氣明明八牕均調八風思承天以接神故峻極乎皇穹劉名濟賦四圭邸蒼玉六變舞雲門香浮欝金酒煙繞鳳凰樽梁元帝詩大開明堂受朝賀諸侯劔佩鳴相磨韓石皷歌遂開明堂坐以治之本朝皇祐二年帝曰明堂制度前代諸儒議論皆異將安適從文彦愽等對曰於孝經則云宗祀文王於明堂於禮記則有明堂位在周官考工則有世室重屋之制然文畧不備餘皆漢後諸儒雜引緯書各為議論故駁而不同帝曰明堂者布政之宫朝諸侯之位然則天子之路寢乎乃今之大慶殿是矣况明堂初祀天帝於此今之親祀不當因循尚於郊壝寓祭其以大慶殿為明堂分伍室於内朕於禮事務罄嚴恭餘以中禮為貴㑹要論明堂之制者非一某竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右个東之北為青陽左个總章明堂𤣥堂皆然中為太廟太室凡四方之太廟異方所其左个右个則青陽之右个乃明堂之左个明堂之右个乃總章之左个也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐是也朱文公集太室精禋方集神明之貺篳門増耀亦沾慶賜之優太一謝表周同廟制盖嚴配之所先漢比郊儀故精禋而為重牋表類率循三嵗之舊章時舉季秋之大享歴祼清廟升煙紫旻㳙吉抄秋乗上辛之正氣肇煙重屋修邃古之濶儀並同上祖宗配侑經生民尊祖也后稷生於姜嫄文武之功起於后稷故推配天焉生民詩序思文后稷克配彼天周頌子莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝孝經史漢元封五年祠髙祖於明堂以配上帝因朝諸侯前武帝紀明帝永平二年宗祀光武於明堂以配五帝後本紀明堂所以尊其祖配上帝敬恭明祀永光孝道者也晉紀瞻傳唐永徽二年有司請以髙祖配五天帝太宗配五人帝長孫無忌等議自三代以來無父子同配於明堂者於是髙祖配於圜丘太宗配於明堂唐祭祀志本朝治平元年王珪等議本朝祀儀季秋大饗明堂祀昊天上帝以真宗配今請以仁祖配循用周公嚴父之道錢公輔議謹按三}
