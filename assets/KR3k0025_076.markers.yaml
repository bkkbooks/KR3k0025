  - {type: variant, offset: 125, length: 0, content: '', krp: 牖以茅屋上圜下方九室者取象陽數也八牖者隂數也取象八風三十六户取六甲之爻六六三十六也上圜象天下方法地四闥者象四時也五室者象五行也三輔黄圖集靈臺明堂綂和天人班東都賦於昭明堂明堂孔陽聖皇宗祀穆穆皇皇上帝宴饗五位時序誰其配之世祖光武詩明堂者天子太廟所以崇禮其祖以配上帝者也東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室故雖有五名而主以明堂也其正中焉皆曰太廟謹承天隨時之令昭令德宗祀之禮明前功百辟之勞起尊老敬長之義顯教幼誨穉之學朝諸侯選造士於其中故為大教之宫而四學具焉官司備焉譬如北辰居其所而衆星拱之萬象翼之教之所由生故言明堂事大義之深也取其宗祀之清也則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其堂則曰明堂取其四門之學則曰太學取其四面周水圓如璧則曰辟雍其實一也蔡邕論肅肅明堂惟徳之光儀天矩地崇姬潤黄虞通之頌明堂者明乎天道者也所以明有功褒有徳崇大教明大政登假嚴禋欽宗修祀考經緯之長䇿應黄鍾之旋宫穆穆四門恊納四氣明明八牕均調八風思承天以接神故峻極乎皇穹劉名濟賦四圭邸蒼玉六變舞雲門香浮欝金酒煙繞鳳凰樽梁元帝詩大開明堂受朝賀諸侯劔佩鳴相磨韓石皷歌遂開明堂坐以治之本朝皇祐二年帝曰明堂制度前代諸儒議論皆異將安適從文彦愽等對曰於孝經則云宗祀文王於明堂於禮記則有明堂位在周官考工則有世室重屋之制然文畧不備餘皆漢後諸儒雜引緯書各為議論故駁而不同帝曰明堂者布政之宫朝諸侯之位然則天子之路寢乎乃今之大慶殿是矣况明堂初祀天帝於此今之親祀不當因循尚於郊壝寓祭其以大慶殿為明堂分伍室於内朕於禮事務罄嚴恭餘以中禮為貴㑹要論明堂之制者非一某竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右个東之北為青陽左个總章明堂𤣥堂皆然中為太廟太室凡四方之太廟異方所其左个右个則青陽之右个乃明堂之左个明堂之右个乃總章之左个也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐是也朱文公集太室精禋方集神明之貺篳門増耀亦沾慶賜之優太一謝表周同廟制盖嚴配之所先漢比郊儀故精禋而為重牋表類率循三嵗之舊章時舉季秋之大享歴祼清廟升煙紫旻㳙吉抄秋乗上辛之正氣肇煙重屋修邃古之濶儀並同上祖宗配侑經生民尊祖也后稷生於姜嫄文武之功起於后稷故推配天焉生民詩序思文后稷克配彼天周頌子莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝孝經史漢元封五年祠髙祖於明堂以配上帝因朝諸侯前武帝紀明帝永平二年宗祀光武於明堂以配五帝後本紀明堂所以尊其祖配上帝敬恭明祀永光孝道者也晉紀瞻傳唐永徽二年有司請以髙祖配五天帝太宗配五人帝長孫無忌等議自三代以來無父子同配於明堂者於是髙祖配於圜丘太宗配於明堂唐祭祀志本朝治平元年王珪等議本朝祀儀季秋大饗明堂祀昊天上帝以真宗配今請以仁祖配循用周公嚴父之道錢公輔議謹按三}
  - {type: variant, offset: 127, length: 2, content: 編錄, WYG: 祭郊以祭天明堂以祭五帝郊之祭以始封之祖有聖人之德者配焉明堂之祭以創業繼體之君有聖人之徳者配焉聖宋崛起非有始封之祖也則創業之君遂為太祖矣太祖則周之后稷配祭於郊者也太宗則周之文王配祭於明堂者也真宗則周之武王宗乎廟而不祧者也雖有配天之功而無配天之祭未聞成王以嚴父之故廢文王配天之祭而移於武王也仁宗則周之成王也雖有配天之業而亦無配天之祭未聞康王以嚴父之故廢文王配天之祭而移於成王也孫忭等議按易豫之說曰先王以作樂崇徳薦之上帝以配祖考盖}
