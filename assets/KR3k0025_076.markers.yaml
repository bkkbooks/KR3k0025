  - {type: punctuation, offset: 507, content: 《, id: KR3k0025_CHANT_076-bkkpn163}
  - {type: variant, offset: 510, length: 1, content: 莊, WYG: 觧云原再也恵帝思髙祖之悲樂沛以沛宫為髙祖原廟漢志漢祖宗嘗行幸處皆令郡國立廟元帝罷郡國廟後帝寢疾夢神靈來譴罷諸廟祠土遂復焉並同上議者以為清廟之詩言交神之禮無不清静今衣冠出遊有車騎之衆風雨之氣非所謂清静也韋𤣥成傳本朝南京鴻慶宫奉太祖太宗真宗神御㑹要天聖八年置西京㑹景宫同上大中祥符五年十月聖祖降十二月作景靈宫奉聖祖備要元豐五年初詔景靈宫作十一殿至是殿成告遷神御同上禘祫經禮不王不禘王者禘其祖之所自出以其祖配之記喪服小記夫大嘗禘升歌清廟下而管象朱千玉戚以舞大武八佾以舞大夏此天子之樂也祭統祫祭於祖則祝迎四廟之主曽子問祫猶合也禘猶諦也審諦無所遺矣}
