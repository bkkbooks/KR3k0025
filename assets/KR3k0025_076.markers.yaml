  - {type: variant, offset: 502, length: 2, content: 斷斷, WYG: 叔孫通為奉常定宗廟儀法前本傳給宗廟粢盛本紀十四年詔曰朕獲執犧牲珪幣以事宗廟同上景帝元年禮官奉議髙帝廟宜為帝者太祖之廟孝文廟宜為帝者太宗之廟天子宜世世享祖宗之廟本紀元帝詔曰盖聞明王制禮立親廟四親廟之奉萬世不毁所以明尊祖敬宗著親親也韋元成傳清廟祭祀追徃孝敬帝者之大事祖宗之所祗奉後蔡邕傳晉江左以後乃至宋齊皆立六廟隋禮儀志陛下踐祚宗廟之享未嘗親事竊惟聖情以乗輿一出所費無藝故忍孝思以便百姓而一代史官不書皇帝入廟將何以貽孫謀示來葉耶唐馬周傳傳記宗廟之木主曰祏說文王者事宗廟至敬則福草生於宗廟之中孫氏瑞應圖君乗木而王其政昇平則福草生廟中同上遷廟之主古禮藏之而已廟即迭毁主則長存}
  - {type: page-break, offset: 502, content: '', id: KR3k0025_WYG_076-31b, image: WYG0932/WYG0932-0342d.png}
  - {type: variant, offset: 502, length: 2, content: 斷斷, krp: 叔孫通為奉常定宗廟儀法前本傳給宗廟粢盛本紀十四年詔曰朕獲執犧牲珪幣以事宗廟同上景帝元年禮官奉議髙帝廟宜為帝者太祖之廟孝文廟宜為帝者太宗之廟天子宜世世享祖宗之廟本紀元帝詔曰盖聞明王制禮立親廟四親廟之奉萬世不毁所以明尊祖敬宗著親親也韋元成傳清廟祭祀追徃孝敬帝者之大事祖宗之所祗奉後蔡邕傳晉江左以後乃至宋齊皆立六廟隋禮儀志陛下踐祚宗廟之享未嘗親事竊惟聖情以乗輿一出所費無藝故忍孝思以便百姓而一代史官不書皇帝入廟將何以貽孫謀示來葉耶唐馬周傳傳記宗廟之木主曰祏說文王者事宗廟至敬則福草生於宗廟之中孫氏瑞應圖君乗木而王其政昇平則福草生廟中同上遷廟之主古禮藏之而已廟即迭毁主則長存}
