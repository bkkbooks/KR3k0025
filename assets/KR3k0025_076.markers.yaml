  - {type: variant, offset: 3, length: 1, content: 能, WYG: 得已乃用十六日甲子非日至而郊惟此一舉講之不素也避暑録國朝沿唐制置五使宰臣為大禮使太常卿為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使知開封府為橋道頓迎使南郊親祀酌獻用禧安之曲丹雲之爵金龍之杓挹於樽罍是曰清酌㑹要祀五帝經祀五帝則掌百官之誓戒與其具修周禮太宰祀五帝奉牛牲羞其肆大司徒以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方大宗伯兆五帝於四郊小宗伯若禋祀五帝位誓百官戒於百侯奉其明水火大司冦春其帝太皥夏其帝炎帝中央土其帝黄帝秋其帝少皥冬其帝顓頊記月令史漢髙祖問故秦時上帝祠何帝也羣臣對曰有白青黄赤帝之祠髙祖曰吾聞天有五帝而四者何也莫知其說於是髙祖曰吾知之矣廼待我而後成也廼立黑帝祠名曰北畤前郊祀志文帝時新垣平上言長安東北有神氣成五色若人冠冕焉宜立祠上帝以合符應於是作渭陽五帝廟明年帝以郊見渭陽五帝遂出長門若見五人於道北遂因其直立五帝壇祠以五牢王莽奏周官兆五帝於四郊山川各因其方今五帝兆俱在雍五畤不合於古並同上昔在上古生為明王沒則配五}
