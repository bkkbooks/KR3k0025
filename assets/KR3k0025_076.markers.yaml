  - {type: variant, offset: 53, length: 5, content: 顧言孟盡心, WYG: 食故封土立社示有主也同上社壇在東稷壇在西俱北面通典集於惟大社官名后土是曰句龍功著上古徳配帝皇實為靈主克助播殖農正曰柱尊以作稷豐年是與曹子建頌社實隂低稷惟榖先率育萬類叶靈昊乾霸德方將得號共工厥有才子實曰句龍庶物平施百姓熈雍陶恵救災决河流江棄亦播殖作乂萬邦克配二祀以報勲庸何承天頌厚地間靈方壇崇祀建以風露植之松梓勾萌既申芟作伊始恭祈粢盛克膺休祉牛𢎞睿社歌詩粒食興教播厥有先尊神致潔報本惟䖍稷歌詞社祭土稷祭榖勾龍與棄乃其佐享韓文祭山川經望於山川書舜典望秩於山川同上奠髙山大川禹貢九山刋旅同上懐柔百神及河喬嶽詩時邁教兵舞帥而舞山川之祭祀周禮舞師以血祭祭五岳以貍沈祭山林川澤大宗伯兆山川丘陵墳衍各因其方小宗伯璋邸射以祀山川典瑞祀山川則毳冕司服乃奏蕤賓歌函鍾舞大夏以祀山川大司樂天子祭天}
