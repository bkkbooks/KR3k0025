  - {type: variant, offset: 248, length: 1, content: 女, WYG: 衛青奮於奴僕日磾出於降虜公孫𢎞傳司馬相如成都人家徒四壁立後數嵗為中郎至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵西漢本傳信惟餓隷布實黥徒越以狗盜芮尹江湖西漢叙傳鄭詹縛於晉終亦無死鍾儀南音卒獲返國叔向囚虜自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鍎終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寛擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗栁宗元傳集緑驥垂耳於林下鴻雀戢翼於汙池􅀢之者固以為園囿之凡鳥外廏之下乗也及整闌筋揮勁翮陵厲清浮顧盻千里豈可謂其借翰於晨風假足於六駁哉陳孔璋書朝為讐虜夕為上將陳孔璋檄文安國免徒起紆青組張敞亡命坐致朱軒陸士衡不見公與相起身自犁鋤韓文李斯逐焉而為上卿鄒陽囚焉而為上客劉賔客本朝士方窮時困阨閭里庸人孺}
