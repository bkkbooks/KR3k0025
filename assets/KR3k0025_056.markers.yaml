  - {type: variant, offset: 1101, length: 0, content: '', WYG: 堀堁揚塵之風哉駱賓王人之難知堯舜所病胡可以一訓一語而謂盡其能哉陸宣公勿言分寸鐵善用乃長兵白樂天本朝盡道滿城無國艷不知朱戸鎖嬋娟臨川劉中山謂王曽曰狀元試三塲一生喫著不盡曽曰平生之志不在温飽東軒筆録不可損益子單父一嵗之麥於魯不加強喪之不加損家語舉世而譽之不加勸舉世而非之不加沮莊天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛秋水篇注焉而不滿酌焉而不竭禹之時十年九潦而水不加益湯之時八年七旱而涯不加損並莊子不能毀山之一毛列湯問富貴不足以益卑賤不足以損荀哀公篇不為堯存不為桀亡荀毀譽之於已猶蚤䖟之一過也渴飲河水腹滿而河水不為之竭並淮南子堯舜在上雖有十桀不能亂者勢治也韓子史江湖之崖渤海之島羣鴈集不為之多雙鳬飛不為之少揚雄傳九牛亡一毛司馬遷𫝊譬猶鍾山之玉泗濱之石累珪璧不為之盈採浮磬不為之索蔡邕傳譬猶衡陽之林岱隂之麓伐尋抱不為之稀蓺拱把不為之數崔駰傳塵加岱嵩霜集淮海雖未有益不為損也後楊倫傳如彼白圭質無塵㸃清不増潔濁不加染袁宏三國名臣序虞仲翔美寶為質雕磨益光不足以損三國虞翻傳唐段志沖曰尺霧障天不虧其大寸雲㸃日何損於明唐紀傳記鴻鵠髙飛沖天然其所恃者六翮耳夫腹下之毳背上之毛増去一把飛不為髙下劉向子貢曰臣譽仲尼如兩手捧土而附泰山其無益明矣臣不譽仲尼如兩手把泰山無損亦明矣韓詩外傳一室之中益一人燭不為益明去一人燭不為益暗烈女傳集青蠅不能穢垂棘邪論不能惑孔墨四子講徳論行潦暴集江海不以為多鰌鱓並迯九罭不以為虛是以許由匿堯而深隠唐氏不以衰夷齊恥周而逺餓文武不以卑同上百川注東海東海無虛盈泥滓不能濁澄波非益清韋應物淮濟之清有玷焉若秋毫固不為病日月之蝕大圭之瑕曷足以傷其明黜其寶哉穢者自穢不足以害吾潔狹者自狹不足以害吾廣幽者自幽不足以害吾明並栁文落一星伐一樹不足以損天地光輝如大倉之稊米委一粒於萬鍾譽之所不能益者毀不能損榮之所不能動者辱不能加利之所不能動者害不能嬰並唐文粹俾吾為秋毫之杪吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多終年汲引絶不耗復不盈元稹不可比諭經觀天下之物無可以稱其徳者記子澤及萬世而不為仁長於上古而不為夀覆載天地彫刻衆形而不為巧莊千里之逺不足以舉其大千仭之髙不足以極其深秋水在太極之先而不為髙在太極之下而不為深先天地生而不為乆長於上古而不為老莊子史莊周其言洸洋自恣王公大人不能器之深者入黄泉髙者出蒼天大者含元氣纎者入無倫揚雄傳王戎常目山濤如璞玉渾金人欽其寶莫能名其器晉王戎傳集昭乎日月不足為明崒乎泰山不足為髙巍乎天地不足為容韓伯夷頌潔乎瑾瑜不足為其珍芬乎蘭茝不足為其秀皮日休確然金石不足以為堅澹然冰玉不足以為潤雲烟綿聯不足為其態也水之迢迢不足為其清也春之盎盎不足為其和也秋之明潔不足為其格也風檣陣馬不足為其勇也時花美女不足為其色也荒園陊殿梗莽丘隴不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也並唐文粹通塞若水變化若龍動之謂道非可以一善稱非可以一行目湜本朝天子有道其徳不可得而名輔相有徳其才不可得而稱故漢之文景紀無可書之事唐之房杜傳無可載之功除呂大防尚書左僕射制譬夫天地之妙造化萬物動者植者無細與大不見痕迹自極其工歐公墓文分量不同經厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親記譬之宫牆賜之牆也及肩闚見室家之好夫子之牆數仭不得其門而入語子天之道損有餘補不足人之道損不足奉有餘老公儀伯以力聞周宣王聘之曰女力何如曰臣力能折春螽之股堪勝秋蟬之翼王曰吾力能裂犀兕之革曳九牛之尾猶憾其弱列子上古有大椿者以八千嵗為春秋杇壤之上有菌芝者生於朝死於晦春夏之月蠓蚋者因雨而生見陽而死溟海有魚焉其廣數千里其長稱焉其名為鵬翼若垂天之雲江浦之間生麽虫其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來聞勿覺也列湯問宋元君將圖畫衆史皆至䑛筆和墨在外者半有一史後至者儃儃不趨受揖不立因之舎公使人觀之則解衣槃礴孔子謂子路曰水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交于前視死若生烈士之勇也並莊大智閑閑小智間間夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而囘瞠乎若後矣田子方篇塪井之蛙謂東海之鼈曰井幹之樂至矣東海之鼈左足未入而右膝已縶秋水篇鵬圗於南溟水擊三千里摶扶搖而上者九萬里蜩與鳩決起而飛槍榆枋斥鷃騰躍而上不過數仭而下翺翔蓬蒿之間逍遙遊篇莊子輕死而暴是小人之勇也君子能則寛容易直以開導人不能則恭敬蹲絀以畏事人小人能則倨傲辟偽以驕溢人不能則妬嫉怨誹以傾覆人楚王有白猨自射之則摶矢而熙使養由基射之始調弓}
