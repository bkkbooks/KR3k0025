  - {type: variant, offset: 961, length: 0, content: '', WYG: 今須作狀元翌日無名於陵深不平乃於故册子末繕寫而斥其名氏攜之以訴主文主文歎賞不絶於陵曰當今場中若有此賦侍郎何以待之主文曰非狀元}
