  - {type: variant, offset: 1104, length: 1, content: 璧, WYG: 帝問其故對曰松柏竒姿經霜猶茂蒲栁常質望秋先零晉書本傳顔峻謝莊為吏部尚書時人語曰顔峻嗔而與人官謝莊笑而不與人官宋書齊神武令諸子各理亂絲帝獨抽刀斬之曰亂者須斬文宣紀松柏孤生勁特}
