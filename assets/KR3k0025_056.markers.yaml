  - {type: variant, offset: 296, length: 0, content: '', WYG: 鄒魯守經學齊楚多辯智韓魏有竒節鄒陽傳秦漢以來山東出相山西出將趙充國傳萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏食貨志猛虎在深山百獸震恐及其在穽檻之中搖尾而求食鈞天廣樂必有竒麗之觀帝室皇居必蓄非常之寶禰衡傳富貴生不仁沉溺致愚疾大臣穆宗贊河南帝城多近臣南陽帝鄉多近親光武紀衣􅃣人物盡在中原梁武紀京師衣冠所聚身名所出從容附㑹不勤而成張九齡傳水清無大魚漢和紀}
