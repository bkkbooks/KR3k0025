  - {type: variant, offset: 989, length: 0, content: '', krp: 所䙝也記子隙穴之風輕塵不動毛髮不搖及中肌膚以為深疾列史子産曰水懦弱民狎而玩之則多死焉左禍固藏於微隠而發於人之所忽司馬相}
  - {type: variant, offset: 990, length: 0, content: '', WYG: 傳堤潰蟻孔氣洩針芒陳忠傳憂禍相仍史草木遭霜者不可以風過韓安國傳裴寂謂劉文靜曰貧賤如此復逢離亂隋紀集茫然阮籍途更洒楊朱泣杜落陷穽不一引手救反擠之又下石焉韓巳抱沉疴冷更貽魑魅憂孟東野清羸還對月遲暮更逢秋李義羸骨欲消猶被剗瘡痕未滅又遭彈元微之本朝譬如乗輕車馭駿馬冐險夜行而僕夫又從後鞭之豈不殆哉東坡擬進士對御試策枯木自少葉不堪經曉霜欒城春殘已是風和雨更看遊人憾落花山谷楊文公億為執政者所惡言事者攻之不已公曰已擠溝壑猶下石而不休方困蒺藜尚彎弓而相射青箱記不待増益子華霍之極大滄海之滉瀁其髙不借翔埃之來其深不仰行潦之注抱朴子史雕之不増文磨之不加瑩魏文士傳集苟贊其道若譽天地之大褒日月之明非愚則惑栁文不待矯揉子鵠不日浴而白烏不日黔而黑莊木不待櫽括而直者其性直也荀鳥排虛而飛獸蹠實而走蛟龍水居虎豹山處天地之性也良}
  - {type: page-break, offset: 990, content: '', id: KR3k0025_WYG_056-28b, image: WYG0931/WYG0931-0583b.png}
