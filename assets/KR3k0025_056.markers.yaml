  - {type: variant, offset: 956, length: 0, content: '', WYG: 斬之禄山臨刑呼曰大夫不欲討奚契丹耶奈何殺禄山守珪亦惜其驍勇欲活之乃更執送京師唐太宗杜兼誣奏李藩於張建封之薨搖動軍情上大怒宻詔杜佑使殺之佑素重藩懐詔旬日不忍發因引藩出詔示藩藩神色不變曰此真報也佑曰君謹勿出口吾已宻論用百口保君矣上詔藩詣長安望藩儀度安雅乃曰此豈為惡者耶除授秘書郎唐徳宗舒元輿有族子守謙愿而敏元輿愛之從元輿者十年一旦忽以非罪怒之日加譴責奴婢輩亦薄之守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免通鑑唐文宗集每因禍以禔福亦踐危而必安選弔文北叟塞上之翁其子騎而折臂人弔之曰安知非福乎後北兵大出丁壯者戰死唯翁子以跛故得父子相保班固幽通賦注蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寛擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗此皆瓌偉博辨竒壯之士能自解脫栁文知足下遇火灾家無餘儲僕始聞而駭中而疑終而大喜蓋將弔而更以賀也京城人多言足下家有積貨士之好亷名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多嫌也一出口則嗤嗤者以為得重賂常與孟㡬道言而痛之乃今幸為天火之所滌盪凡衆之疑慮}
  - {type: page-break, offset: 956, content: '', id: KR3k0025_WYG_056-26a, image: WYG0931/WYG0931-0582a.png}
  - {type: page-break, offset: 956, content: '', id: KR3k0025_WYG_056-26b, image: WYG0931/WYG0931-0582b.png}
