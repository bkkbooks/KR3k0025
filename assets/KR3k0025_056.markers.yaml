  - {type: variant, offset: 959, length: 1, content: 荊, WYG: 才能乃可以顯白而不汙其實出矣是祝融囘禄之相吾子也則僕與㡬道十年之相知得開其發策決科者授子而不慄雖欲如嚮之蓄縮受侮者其可得乎於兹吾有望於子是以終乃大喜也栁文賀進士王參元失火書病木斧斤遺白樂天本朝孫真人著大風惡疾論曰神仙傳有數十人皆因惡疾得仙道何者割棄塵累懐穎陽之風所以因禍而取福也東坡論一首李程貞觀中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰}
