  - {type: variant, offset: 305, length: 1, content: 忘, WYG: 挈而之三家之野未有不盜而困者皇甫湜枯巢無還羽在富易為容居貧難自好孟東野蓬門自古少車塵韓偓知君五陵客不樂石門遊劉賔客青雲豈有窺梁燕濁水應無避釣魚獨樹髙髙風勢急平湖渺渺月明多許用晦松柏之下無凡草鸑鷟之侣無凡禽歐陽水宿知寒早愁眠覺夜長李義山水積而深縱壑之鱗躍風積而厚垂天之翼奮尹和叔文火山無冷地濁流無清源王建本朝居貧賤而有聞易處富貴而無過難東坡日近先知曉天低易得春邵堯夫近水樓臺先得月向陽花木易逢春翰府名談公子何自知秋陽哉生於華屋之下而坐朝廷之上出擁大蓋入侍帷幄暑至於温寒至於涼而已東坡}
