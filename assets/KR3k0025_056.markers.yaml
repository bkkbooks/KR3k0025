  - {type: variant, offset: 267, length: 0, content: '', krp: 其有異志也子産曰人心不同如其面焉吾豈敢謂子面如吾面乎並左雖有親父安知其不為虎雖有親兄安知其不為狼韓安國傳始常山王成安君為刎頸交卒滅亡患生於多欲而人心難測也蒯通傳入吾室操吾戈以伐我鄭𤣥傳苻丕曰垂在鄴如藉虎侵咬常恐為肘腋之變晉紀昔吕布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以搆妖梁髙祖惟有人心相對間咫尺之情不能料五代晉髙祖李繁者汝之子也陽城盡疏裴延齡過惡欲宻論之以繁故人子使之繕冩繁徑以告延齡先詣上一一自解疏入上以為妄不之省唐徳宗集孰知其不合兮若竹柏之異心楚辭失意杯酒間白刃起相讐選少年行無曰父子無間昔有潘崇無曰至親無二或容江充王廣之保傅箴人心若波瀾他人方寸間山海㡬千重輕言託朋友對面九疑峰李太白翻手為雲覆手雨紛紛輕薄何足數杜工部天可度地可量唯有人心不可防但見丹誠赤如血誰知偽言巧似簧白樂天太行之路能摧車若比君心是坦途巫峽之水能覆舟若比君心是安流太行路詩理平則為鸞為鳳為鵷為鷺世變則為蛇為豕為猊為梟者十恒八九元微之平生親友心豈得知淺深白樂天今夫平居里巷相慕恱酒食遊戲相徴逐詡詡強笑語以相取下握手}
  - {type: variant, offset: 268, length: 1, content: 此, WYG: 肺肝相示指天日涕泣誓死生不相背負一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也韓湜輩雖屢指教不知其果不叛去否韓文小人之慮險平地生太行孟東野大海波濤淺小人方寸深海枯終見底人死不知心杜荀鶴世情本難合對面隔山丘王建兒冠出門父翁不知其往止女筓上車夫人不保其貞汙一人千萬心並唐文粹一日天無風四溟波盡息人心風不吹波浪髙百尺唐王績識貌不識腸王建長恨人心不如水等閑平地起波瀾劉賓客天下之言事為修潔者有如河間之始為妻婦者乎天下之言朋友相慕望者有如河間之與其夫切宻者乎河間以自敗於暴強誠服其利歸敵其夫猶盜賊仇讐不忍一視其面卒計以殺之無須臾之戚則凡以情愛相戀結者得不有邪利之滑其中耶亦足以知恩之難恃矣栁文本朝醜好隨手翻山谷人心百態巧且難臨危利害兩相闗朝為親戚暮讐敵自古常嘆交道難歐公當人盡賔主對面如蠻夷邵堯夫觀棋集其居使然經墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬記目不自見荀子市井相與言則以財與利揚子十仭之城樓季弗能踰者峭也千仭之山跛羊易牧者夷也甚霧之朝可以細書不可以望尋常之外禿腐之山無十丈之材淮南子眼能察天衢而不能周項領之間抱朴子兩目不相為視蔣子崑山之下以玉抵烏彭蠡之濵以魚食犬而人不愛者非性輕財所重故也劉子}
