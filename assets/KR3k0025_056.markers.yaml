  - {type: variant, offset: 26, length: 1, content: 微, WYG: 旦握權則為卿相夕失勢則為匹夫揚雄傳屈丐蒸土築城而朕滅之豈在城也出通鑑王晞曰人主恩私何由可保萬一披猖求退無地通鑑傳記鴻鵠沖天豈不髙哉矰繳尚得而加之虎豹為猛人尚食其肉席其皮說苑正諫魏武侯浮西河而下中流謂吳起曰美哉山河之固此魏之寳也對曰在徳不在險昔三苗氏左洞庭而右彭蠡徳義不脩而禹滅之夏桀之居左河濟而右太華伊闕在南羊膓在北脩政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南脩政不徳而武王伐之由此觀之在徳不在險若君不脩徳船中之人盡敵國也武侯曰善說苑晉有河華九阿而奪於六卿齊有太山巨海而脅於田常桓寛鹽鐵論集隆隆者絶炎炎者滅選解嘲洞庭雖峻負之者北魏都賦不見三公後寒饑出無驢韓文作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬李太白互入儆戒日近恩雖重雲髙勢却孤翻身落霄漢失脚倒泥塗白侍郎榮難乆藉唐文粹剪袖㤙雖重殘桃愛不終劉遵詩明不可恃}
