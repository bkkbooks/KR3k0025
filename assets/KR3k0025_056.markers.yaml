  - {type: variant, offset: 1106, length: 2, content: 瑕玷, krp: 所因倚女蘿弱不能立必附他木徳裕傳正人如松柏獨立不倚邪人如藤蘿非附他物不能自起唐太宗李晟為其子請昬於延賞不許晟謂人曰武夫性快釋怨於杯酒間則不復貯胷中矣非如文士難犯外雖和解内蓄憾如故烏得無懼唐徳宗土城竹馬童兒樂也飾金翠羅綺婦人樂也貿遷有無商賈樂也髙官厚秩士大夫樂也戰無前敵將帥樂也四海寧一帝主樂也西域馬耆傳傳記君子得時如水小人得時如火說苑郭林宗曰奉髙之器譬諸汍濫雖清而易挹叔度汪汪如千頃波澄之不清撓之不濁不可量也夏侯太初甞倚柱作書時大雨霹靂破所倚柱衣服焦燃神色無變書亦如故賓客左右皆跌蕩不能住並世說楊脩為丞相曹操主簿至江南讀曹娥碑上八字問脩脩曰知之操曰待朕思之行三十里乃得之令脩解脩曰黄絹色絲絶字幼婦少女妙字外孫女子好字韲臼受辛辭字操曰一如朕意俗云有智無智校三十里裴啓林孔子曰仁義動君子財色動小人樂動聲儀魯有男子獨處于室隣人嫠婦又獨處于夜暴風雨至而室壊婦人趨而託之男子閉户而不納曰吾聞之男女不六十不同居今子幼吾亦幼不可以納子婦人曰子何不若栁下恵然嫗不逮門之女國人不稱亂男子曰栁下恵固可吾則不可毛公詩傳集尺澤之鯢豈能與鯤魚量江海之大藩籬之鷃豈能與鳳凰料天地之髙哉楚辭犨麋之與子都培螻之與方壺左太沖魏賦彼桑榆之末光踰長庚之初輝同上鷦鷯巢於蚊睫大鵬彌乎天隅張華鷦鷯賦一飛沖青天曠世不再鳴安與鶉鷃徒翩翩戲中庭晉阮步兵詩駑蹇之乗不騁千里之塗燕雀之儔不奮六翮之用班叔皮論巢許蔑四海商賈爭一錢曹植樂府歌众星羅青天朗者獨有月李太白雀鳴朝營食鳥鳴暮求羣獨有知時鶴雖鳴不縁身韓文内不足者急於人知霈焉有餘厥聞四馳今人適數百里出門惘惘有離别可憫之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無㡬微出於言面豈不真知輕重大丈夫哉不善為斵血指汗顔巧匠旁觀縮手袖間不知言之人烏可與言知言之人黙焉而其意已傳彊者必怒於言懦者必怒於色韓文不矍矍於進取不施施於得喪左絃右壺樂以終日與夫拳拳恐悸蒙諂負義得之拘拘榮不羞愧以終其身而不能止者不獨優乎栁君子宜于上不宜于下小人宜于下不宜于上達士如絃直小人似鈎曲杜工部智士日千慮愚夫唯四愁孟東野君子山嶽定小人絲毫爭駑蹄顧摧秣逸翮遺稻梁君子芳桂性春榮冬更繁小人槿花心朝在夕不存百草短長出衆禽髙下鳴元微之聖人瑩其心而窒其謗是以能照天下之理故其心清而定愚者負其心而薄於外是以閉天下之理故其心塵而結皇甫湜項籍阬秦降卒二十萬其於防虞亦已甚矣漢髙豁達大度天下之士至者納用不疑其於備慮可謂疎矣然而項氏以滅劉氏以昌蓄疑之與推誠其効固不同也陸贄狀貌羣分頭角萬殊皇甫湜務鳩歛而厚其帑稅之積者匹夫之富也務散發而收其兆庻之心者天子之富也陸宣公屠羊于肆適味於众口也攻玉於山候知於獨見也貪日得則鼔刀利要嵗計而韞匵多靈芝蓬滿與百果齊折然煌煌翅翅出乎其類劉賓客彼如君子心秉操貫冰霜此如小人面變態隨炎涼椿夀八千春槿花不經宿葵枯猶向日蓬斷即辭春因指塵土下蜉蝣良可悲不聞姑射上千嵗冰雪肌彼為葅醢机上盡此作鸞鳳天外飛並白樂天鷹飢常啄腥鳳飢亦待瓊顔囘簞瓢才自給肥濃不到口年不登三十張蒼染愛浩無際妾媵傾後房竟夀百餘嵗鵬背負天龜尾曳地雲泥不可得同游並張說之蟪蛄寧與雪霜期賢哲難教俗士知杜牧之君子寧小窮而大達小人寧小達而大窮程晏靜者多便夜豪家不見愁姚少監逸足期千里窮鱗渴一泓張承吉智士役千慮達人輕百憂許用牧文以至愚而對至聖以極卑而對極尊徒思自彊不可得也小物無大志唐文粹蘭蕙雖可懐芳香與時息豈如凌霜葉嵗暮藹顔色韋應物聖人之道猶坦途諸子之道如斜徑皮日休本朝昔閻立本始以文學進身卒蒙畫師之恥余謂不然謝安石欲使王子敬書太極殿榜以韋仲將事諷之子敬曰仲將魏之大臣理不必再若然者有以知魏徳之不長也使立本如子敬之髙其誰敢以畫師使之阮千里善彈琴無貴賤長幼皆為彈神氣沖和不知向人所在内兄潘岳使彈終日達夜無忤色識者知其不可榮辱也使立本如千里之達其誰能以畫師辱之書宋象先畫後翟公之客負公於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪已與士益厚賢於古人逺矣東坡勤上人詩集叙公謂歐公也昔者夫子㢘潔而不為異众之行勇敢而不為過物之操孝而不徇其親忠而不犯其君凡此者是夫子之全也原憲㢘而至於貧公良孺勇而至於鬬曽子孝而徇其親子路忠而犯其君凡此者是數子之偏也上韓太尉書昔唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以晏安之際不能用裴度於未病治亂之効如斯可見賜文彦博求致仕不允批答小人以位為寵求之而不可得君子以寵為憂推之而莫能去賜尚書右丞相胡宗允辭免不允詔君子之難知如麟鳳色斯舉矣翔而後集況可麾而却之乎小人之易進如蛆蠅腥羶所聚一息千萬況可招而來之乎論周撞檀議配享劄子並東坡富人事紛華綵繡光翻座貧者媿不能㣲摯出舂磨君如大江日千里我如此水千山底達人千鈞弩一弛難再斡下士沐猴冠已繫猶跳騾乃知賢達與愚陋豈直相去九牛毛達人友四海曲士守一鄉鳳凰覽徳輝遂引不待遣鷾鴯燕子戀庭宇倐忽來千轉有如市倡抹青紅妖歌嫚舞眩兒童謝家夫人淡丰容蕭然自有林下風並東坡古之君子不用于世必寄於物以自遣阮籍以酒嵇康以琴阮無酒嵇無琴則其食草木而友麋鹿有不安者矣獨顔氏子飲水啜菽居於陋巷無假於外而不改其樂此孔子所以嘆其不可及也众皆以力事君公獨以道則難留秋鴻一何樂空際乗風飛秋蟲一何憂壁間終夜悲秋風坐見蒲栁質嵗晏惟有松柏垂滚滚河渭濁皎皎江漢清並欒城大小窮鵬鷃短長見椿槿我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江並山谷太阿無前鋒不缺鈆刀不堪供一切後山詩賜牆及肩人得視公才槃槃一都市有斗筲之量者有鐘鼎之量者有江河之量者有天地之量者斗筲之量固不足筭若鐘鼎江河者亦已大矣然滿則溢也唯天地之量無得而損益焉非聖人孰能當之大抵為名者只是内不足内足者自無意為名冰與水精非不光比之玉自是有温潤含蓄氣象無許多光也譬如積水於萬仭之源一日決之滔滔汨汨直至于海其源深也若夫潢潦之水乍流乍涸終不能有至者其源淺也並鳴道集韓魏公性務容小人善惡黒白不太分故小人忌之亦少如范富歐陽常欲分君子小人故小人忌怨日至遺書韓魏公曰吕申公以進賢自任恩歸於已時士皆出其籠絡獨歐范尹旋收旋失之終不受其籠絡聖人之道如天地天地之間靡所不有众人之道如山川如陵谷鳥獸如草木如蟲沙各盡其分不知其外天地則無不包也無不徧也並遺書司馬温公曰夫功名之際人臣之所難處如髙帝所稱者三傑而已淮隂誅夷蕭何械繫非以履盛滿而不止耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者子房有焉髙帝紀有獻狄梁公畫像及告身十餘通詣狄青以為青之逺祖青謝遣還之比之郭崇韜哭子儀之墓青所得多矣筆談如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身狥義招之不來麾之不去正色而立於朝則豺狼狐狸自相吞噬故皆能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖累千百緩急豈可望哉王元之畫像傳青松守節見臨危正色凜凜不可犯芭蕉芰荷不足數狼籍徒能汚池檻歐陽新進之士喜勇銳老成之人多持重同上夫窮天下之物無不得其欲者富貴者之樂也浮槎山水記他人磨礱爭出圭角公獨渾然不見其璞祭朝天上文萬物各有被無心獨浮塵貴賤同為一丘土聖賢獨如星日垂並歐陽人能百嵗自古稀松得千年未為老臨川松苗地合分髙下鳬鶴天教有短長短羽卑飛已丼心於枚粒隂虬自躍思逺耀於風雲並同上好惡不同子周文嗜不美之菹不以易太牢之滋味魏明好椎鑿之聲不以易絲竹之和音抱朴子辨問篇集人各有好尚蘭茞蓀蕙之芳衆人所好而海畔有逐臭之夫咸池六莖之發衆人之所共樂而墨翟有非之之論曹子建書居歡惜夜短在戚怨宵長選情詩衆心愛金玉众口愛酒肉何此溪上翁飲瓢亦已足白樂天昔齊王好竽有求仕於齊者操瑟而往三年不得入叱曰吾鼔瑟能使鬼神驚客罵之曰王好竽而子鼓瑟雖工如不好何韓文趨向不同經近而不相得者志各有所存也易略例作徳心逸日休作偽心勞日拙吉人為善惟日不足㓙人為不善亦惟日不足並書子伯夷死名於首陽之下盜跖死利於東陵之上众人重利㢘士重名賢士尚志並莊子為堯舜則常安榮為桀跖則常危辱荀子辱論先義而後利者榮先利而後義者辱榮者常通辱者常窮通者常制人窮者常制於人材慤者常安利蕩悍者常危害安利者常樂易危害者常憂險樂易者長夀憂險者常夭折君子道其常小人道其恠並荀螾無爪牙之利筋骨之彊上食埃土下飲黄泉用心一也蟹六跪而二螯非虵蟺之穴無所寄託者用心躁也勸學篇誠信生神夸誕生惑不茍篇君子敬其在己者而不慕其在天者小人錯其在己者而慕其在天者天道篇並荀子春女思秋士悲漁者走淵木者走山今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戅矣從伯夷視管晏則貪矣趨舎相非其慾相反而各樂其務將誰使正之齊俗訓並淮南子㢘者常樂無求貪者常憂不足文中子兒童之所喜者迺耆耄之所非耳目之所娱者迺心慮之所疾亢倉子市井相與言則以財與利先生相與言則以仁與義揚子史子罕曰我以不貪為寶爾以玉為寶左爭名者於朝爭利者於市戰國策叔孫通徴魯三十餘生魯有兩生不肯行叔孫通傳陳遵常謂張竦足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優耶竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持効子者難將吾常道也前漢本𫝊山林之士往而不能反朝廷之士入而不能出前王吉贊夫皇皇求財利常恐不能化民者大夫之意也漢武帝紀孔奮為武都郡丞從竇融入朝諸守令財貨連轂彌竟川澤唯奮無資單車就路漢光武紀務廣地者荒務廣徳者强有其有者安貪人有者殘同上韋彪曰忠孝之人持心近厚鍛鍊之吏持心近薄東漢本傳貴清凈者以席上為腐議求名實者以柱下為誕辭王符傳郗愔遺桓温牋欲共奬王室請督所部出河上愔子超為温參軍取視寸寸毀裂乃更作愔牋自陳非將帥才不堪軍旅老病乞閑地自養勸温并領已所統晉海西公紀或與世同塵隨波瀾而俱逝或違時矯俗望江湖而獨往馬樞曰貴爵位者以巢由為桎梏愛山林者以伊吕為管庫求名實則芻芥柱下之言翫清虛則糠粃席上之說陳本傳傳記孔子曰丘死之後商也日益賜也日損商也好與賢己者處賜也好說不如己者說逺雜言集務光讓天下商賈競刀錐陳子昂㢘者憎貪信者疾偽智不為愚者謀勇不為怯者死趨向之反也同上鵰鶚乗時去驊騮顧主鳴杜詩虛白髙人靜喧譁俗累牽同上少年樂新知衰暮思故友韓文㳂河而下茍不止雖有疾遲必至於海如不得其道雖疾不止終莫得而至焉同上窮居而野處升髙而望逺坐茂樹以終日濯清泉而自潔採於山美可茹釣於水鮮可食起居無時惟適之安伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處汚穢而不羞觸刑辟而誅戮僥倖於萬一老死而後止者其於為人賢不肖何如也韓文君作出山雲我為入籠鶴白樂天巢許終身隠蕭曹到老忙鯨吞蛟鬬波成血深澗游魚樂不知獸樂在山谷魚樂在波池虫樂在深草鳥樂在髙枝同上花開蝶滿枝花落蝶還飛惟有舊巢燕主人貧亦歸唐于瀆詩公孫𢎞為丞相開東閣以延賢及公孫賀劉屈氂時壊為馬廏白帖惡木人皆息貪泉我獨醒温飛卿夸者死權烈士狥名貪夫溺財同上還如舟與車奔走各異程姚少監彼則趦趄於卿士之門我則婆娑於聖賢之域彼則巾車於名利之肆我則冠屨於文史之囿皇甫湜君登青雲去予望青山歸}
