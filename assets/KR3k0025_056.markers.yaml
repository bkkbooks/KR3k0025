  - {type: variant, offset: 21, length: 1, content: 相, WYG: 猶無耜而耕也記子猶縁木而求魚也助之長者揠苗者也非徒無益而又害之孟子互入自作不靖及爱適為害朱泙漫學屠龍於支離益殫千金之家三年技成而無用其巧推舟於陸勞而無功莊史舌弊耳聾不見成功戰國策係風摶影終不可得前漢郊祀志從之如摶影西漢主父偃傳陸展染白髮欲以媚側室青青不解乆星星行復出宋謝靈運傳唇腐齒落而不知益儒林傳梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧尼殫人力以供廟塔及乎三淮沸浪五嶺騰烟假餘息於熊蹯引殘魂於雀􅑹子孫覆亡而不暇社稷俄頃而為墟報施之徴何其謬也通鑑唐太宗集以直鍼而為釣兮又何魚之能得楚辭雖家置一喙以自稱道詬益甚耳栁文徧啄鄧林求一虫虫孔未穿長觜秃元稹集掬玉移山望山盡投石填海望海滿持索捕風幾時得将刀刮水幾時斷韋應物家藏今古帖墨色照箱筥饑來據空牀一字不堪煑東坡雖家置一喙以自解市列千金以購人人必不信謗亦不止東坡上皇帝書短綆徒施巧終然莫汲深后山詩炊沙作糜終不飽山谷詩入海筭沙徒自困永嘉證道歌不勞餘力經如取如攜詩子西戎錕鋙之劔用之切玉如切泥焉列湯問庖丁解牛奏刀騞然莫不中音莊養生主薄氷當白日藂毛遇猛火魏子史張耳陳餘杖馬箠下趙數十城酈生伏軾下齊七十餘城史以鴻毛燎于鑪灰之上荆軻傳舉秦如鴻毛取楚若拾遺前漢腐肉之齒利劍也枚乗傳猶以強弩射且潰之癰韓安國傳取青紫如拾地芥夏侯勝傳譬之蚊蝱之螫敺之而已嚴尤傳摧枯朽者易為力西漢易于太山破雞子輕如四馬載鴻毛思王傳摧強易于折枯消堅易于湯雪皇甫嵩傳若舉炎火以焚飛蓬覆滄海而注熛炭劉表傳無異迅風之振秋葉通鑑排山壓卵以湯沃雪列女傳杜預曰兵威已振譬如破竹數節之後迎刃而解晉書以大吞小猶豺狼之食豚也晉紀譬如以駒犢鬬虎狼也何懼之有晉書隋帝曰取爾如籠内雞雛耳陳紀傳記決江河而灌熒火磨蕭斧而伐朝菌說苑以千鈞之弩射潰癰墮千鈞之重集于鳥卵之上必無幸矣馳韓盧而逐蹇兔也戰國策集若縱火于秋蓬執棠谿以荆蓬秉干將以割肉並楚辭順風而縱烈火曬白日而掃朝雲也曹植論若駭鯨之決細網奔兕之觸魯縞未足以喻其易陳孔璋落葉俟微風以隕而風之力盖寡陸士衡豪士賦序猶烈火之燔秋蓬衝飈之掃落葉也庾鬭若石虎文譬猶迴太陽以消湛露運滄海以灌燎火庾亮表顛木之餘枿痤疽之遺種斧斨欲加而先折鍼石未攻而自潰白傅集因雲灑潤則芳澤易流乗風載響則音徽自逺陸機演連珠霜風冽冽摧朝菌連年收科第若摘頷底髭韓文衆輕鬬蟻勇劣怒蛙纎縞當強弩之初孤豚僨肥牛之下事同拾芥力易摧枯杪忽蜂腰虛見辱于齊斧闕梯䑕首濫欲寄于旄頭栁表餘力一揮應手糜碎栁文洪鑪熾炭燎一毛大鼎煩湯沃殘雪韋應物以赤刀效小割皇甫堤如利刃之破朽索唐文粹勢不可恃史四嶽三塗太室荆山終南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古而然是以先王務修徳音以享神人不聞其務險與馬也左昭四年夫郤昭子其富半公室其家半三軍恃其富寵以泰于國其身尸于朝其宗滅于絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無徳也國語穰侯昭王親舅也秦所以東益地稱帝穰侯之功也穰侯貴極富溢一夫開説身折勢奪況于羇旅之臣也史夏桀殷紂手搏豺狼足追四馬勇非微也權非輕也秦二世力非弱也勢非寡也其威盡勢極閭巷之人}
