  - {type: variant, offset: 1173, length: 0, content: '', WYG: 罷張九齡專任李林甫此理亂之所分也唐書周公擁孺子而召公疑之周公之心召公則不知之新唐書新羅贊史𢎞肇曰安定國家在長槍大劍安用毛錐王章曰無毛錐財賦何從可出周太祖紀集武王周公聖人也率天下之賢士與天下之諸侯而往攻之未甞聞有非之者也彼伯夷叔齊者乃獨以為}
