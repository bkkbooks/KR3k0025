  - {type: variant, offset: 1760, length: 215, content: 如恐傷之東坡撰公神道碑樂易向人無不可蘇子由文拍拍滿懷俱是春邵堯夫經宜兄宜弟詩寥蕭伯氏吹壎仲氏吹箎詩何人斯雝雝喈喈詩卷阿妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥詩棠棣互入閨門父子篤兄弟睦夫婦和家之肥也記禮運睦於父母之黨記坊記史是謂鳳凰于飛和鳴鏘鏘左萬石君居家子孫申申僮僕訢訢西漢石奮傳魏楊播及弟椿津家世孝友緦服同爨男女百口無間言通監梁高祖紀崔氏四世緦麻同爨唐書高崇文七世不異居開元中再表其閭唐書本傳元暐三世不異居家人怡怡如也, WYG: 棄}
