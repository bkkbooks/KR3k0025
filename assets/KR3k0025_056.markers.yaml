  - {type: variant, offset: 1991, length: 225, content: 代義居尺布斗粟無私焉續世說經不惟好異書畢命在彼無惡在此無斁詩無怨無惡詩假樂君子行禮不求變俗記曲禮下毀方而瓦合記儒行注去己之大圭角與人小合也修其教不易其俗齊其政不易其宜記王制無可無不可語微子在邦無怨在家無怨語麻冕禮也今也純儉吾從眾語子罕鳥獸不可與同群吾非斯人之徒與而誰與語微子子柳下惠不羞汙君不辭小官雖袒裼祼裎於我側爾焉能浼我哉孟公孫丑上又見萬章下魯人獵較孔子亦獵較孟萬章下和其光同其塵老道沖與物委蛇而同其波莊庾桑楚聖人處物不傷物不傷物者物亦不能傷也唯, WYG: 善}
