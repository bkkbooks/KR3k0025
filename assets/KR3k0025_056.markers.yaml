  front:
  - {type: variant, offset: 0, length: 2, content: 爭鬥, WYG: 欽定四庫全書記纂淵海卷五十六宋潘自牧撰論議部相忘形迹子樂其俗安其居隣國相望雞狗之聲相聞民至老死而不相往來若此之時則至治已魚相忘乎江湖人相忘乎道術並莊列子乗風而歸曰噫不知風乗我耶我乗風耶海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數不止並列田里相距雞犬相聞人至老不相往來葢自足也文中子史陶潛絶州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反晉本傳傳記堯之時有老人擊壤於路曰吾日出而作日入而息鑿井而飲耕田而食帝力何有于我哉帝王世紀司馬徳操甞造龐徳公值其渡沔上先人墓徑入其室呼徳公妻子皆羅拜堂下奔走供設須臾徳公還直入相就不知何者是客也蜀志龐統傳集堯民不自知有堯但見安閑聊擊壤元稹雞息鳥無疑孟浩然生於天地不知天地之髙厚飲於江海不知江海之廣深張説集但請主人空掃地自攜盃酒筦絃來白樂天本朝}
