  - {type: variant, offset: 1179, length: 1, content: 話, WYG: 明也韓文伯夷頌太史公父名談故公史記無談字季布傳改趙談作趙同范􅁮父名泰故後漢無泰字郭泰鄭泰皆作太字李翺父名楚金故為文皆以今為此韓愈為李賀作諱辨持}
