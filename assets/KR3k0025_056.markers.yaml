  - {type: variant, offset: 940, length: 5, content: 擇在諫職二, WYG: 至今賴之晉有里克丕鄭之難而獲文公是以為盟主左韓信坐法當斬信乃仰視滕公曰上不欲就天下何為斬壯士滕公竒其言壯其貌釋而不斬與語大恱之言於上以為治粟都尉蒯通說范陽令曰君急遣臣見武信君君可轉禍為福矣並史記詭禍為福西漢武五子傳張蒼坐法當斬後解衣肥白如瓠時王陵見而怪其美士乃言沛公救勿斬後以為代相遷為附相西漢經載髙宗雊雉之異以明轉禍為福之驗漢成紀聖}
