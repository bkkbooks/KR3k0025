  - {type: variant, offset: 989, length: 0, content: '', WYG: 所䙝也記子隙穴之風輕塵不動毛髮不搖及中肌膚以為深疾列史子産曰水懦弱民狎而玩之則多死焉左禍固藏於微隠而發於人之所忽司馬相}
