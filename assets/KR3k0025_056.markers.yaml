  - {type: variant, offset: 1100, length: 0, content: '', WYG: 離其門凡數十日芝不得已留之㑹達奚部竒之仙芝為節度使即署常清判官唐元宗桑維翰隨事裁決初若不經思慮人疑其疎略退而熟議之終亦不能易也五代晉髙祖傳記張華見禇陶語陸平原曰君兄弟龍躍雲津顧彦先鳳鳴朝陽謂東南之寶已盡不意復見禇生陸曰公未覩不鳴不躍者耳世說中鳳凰初起也環二十歩之雀喔咿而笑之及升陽一詘一信展轉雲間藩籬之雀超然知不及逺矣士褐衣未甞飽也世俗之士即以為羞耳及其出則定廟議用則延民命世俗之士超然自知不及逺矣韓詩外傳集夫鯤之為魚也潛碧海泳滄溟沈鰓於渤海之中掉尾乎風濤之下而濠魚井鮒自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天地之間宛頸乎江海之畔而雙鳬乗鴈自以為可得而䙝焉及其羽化垂天摶風九萬振鱗横海擊浪三千寧能借翰於桑榆假力於在藻資江濱涓流之水}
