  - {type: variant, offset: 1152, length: 2, content: 德義, WYG: 將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去東漢孫寶曰周公上聖召公大賢猶不相說孫寳傳太子見帝勤勞不息承間諫曰願頥愛精神優游自寧帝曰我自樂此不為疲也漢光武監軍}
