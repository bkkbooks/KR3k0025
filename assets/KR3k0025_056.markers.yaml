  - {type: variant, offset: 910, length: 5, content: 今諫官隨宰, WYG: 傳記市朝則滿夕則虛非朝愛市而夕憎之也求存故往亡故去戰國策貴不與富期而富自至富不與粱肉期而粱肉至粱肉不與驕侈期而驕侈至同上與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣吕氏春秋漁人匠者何患山海之貧罄哉同上集廣川無逆流謝靈運書錢之所在危可使安死可使活錢之所去貴可使賤生可使殺魯褒錢神論洪波振壑川無恬鱗驚颷拂野林無靜柯殷仲文表髙風摧秀木少年樂新知衰暮思故友文章之作恒發於羇旅草野至若王公貴人氣得意滿非性能而好之則不暇以為夫和平之音淡薄而愁嘆之聲要妙歡愉之辭難工而窮苦之言易好也李太白絡首縻足兮驥不能踰跬步無所阻兮跛鼈千里炎天無冽井日月停午物無邪隂劉賔客短線無闕富雞長往家貧客漸稀姚少監長江不肯向西流白樂天世胄躡髙位英俊沉下僚地勢使之然由來非一朝左太冲在貴多忘賤曹子建本朝朱門有遺啄千里來燕闕公門冷如水百闕飽食有殘肉饑食無餘菜闕先竭是甘井得闕同上尺箠當猛虎奮呼而操擊徒手遇蚚蜴變色闕袒裼而按劍則烏獲不敢逼冠胄衣甲據兵而闕彎弓殺之矣利之所在天下趨之是故千金之家欲有所為則百家之市無寧居者三蘇自下觀上無限富貴自上觀下無限貧賤邵堯夫無可奈何史楊彦詢曰譬如人家有子父母所不能制將如之何晋髙祖傳記夜行者能無為姦不能禁狗使無吠已也戰國策本朝攻之蹔破而愈堅撲之未滅而愈熾遂至於無可奈何歐公天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也東坡可已則已史無損於魯而祗為名衛寗喜專公孫免餘請殺之公曰事未可知秪成惡名止也不足以害吳而多殺國士不如已也並左禍福倚伏子禍者福之所倚福者禍之所伏孰知其極老宋人有好行仁義三年不懈家無故黒牛生白犢以問孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先汙後合其事未究姑復問之其子又復問孔子孔子曰吉􅖤也復教以祭其子歸致命其父曰行孔子之言也居一年其子無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乗城而戰死者大半其人以父子有疾皆免及圍解而疾俱復列子慶者在堂弔者在閭禍與福隣莫知其門荀失火而遇雨失火則不幸遇雨則幸也故禍中有福淮南禍之所倚反而為福福之所伏還以成禍妖之所見或能為吉祥之降亦或成凶有知禍之為福福之為禍妖之為吉祥之為凶則可與言物類矣列史與於青之賞必與於其罰齊公孫青也左禍兮福所倚福兮禍所伏憂喜聚門吉凶同域賈生傳英布少時遇}
