  - {type: variant, offset: 712, length: 195, content: 妻曰君前欲斬徐州眾人謂君難為作下今復羞為呂屈是復難為作上魏志曹爽傳樊世本氐豪佐秦王健定關中謂猛曰吾輩耕之君食之耳猛曰非徒使君耕之又將使君炊之通監晉哀紀劉琨曰吾枕戈待旦志梟逆虜常恐祖生逖先吾著鞭耳晉書互見尚氣趨事赴功齊高德政恒以精神凌逼人通監陳高祖王彬謂王敦曰卿昔歲殺兄今又欲殺弟耶本傳傳記杜預書告兒古詩有書借人為可嗤借書送還亦可嗤殷芸小記集譖下謾上恒其心術柳罵尸虫本朝王荊公在臺閣侍從時每言, WYG: ''}
