  - {type: variant, offset: 250, length: 2, content: 爭言, WYG: 皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦髙車駟馬旗旄導前騎卒擁後夾道之人相與駢肩累迹瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以悔罪於車塵馬足之間者此一介之士得志當時而意氣之盛昔人比之衣錦之榮者也歐公畫錦堂記趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞大守之卒吏也王尊涿郡之吏左也出之為將入之為相老蘇世路嶮巇集荆棘聚而成林楚辭世路嶮􅇖太行孟門豈云嶃絶劉孝標世議迫阨不容其髙雲海方蕩潏孤鱗安得寧並陳子昻世路如秋風相逢盡蕭索世路有屈曲李太白世梗悲路澁杜詩世路知交薄時危人事急風逆羽毛傷浮生有蕩汨吾道正羈束人衆難容身石壁滑側足雲雷屯不已艱險路更跼普天無川梁欲濟願水縮舉頭向蒼天安得騎鴻鵠同上盈盈一尺水浩浩千丈波白樂天時情變寒暑世利等錙銖若比世路難猶自平於掌樂天初入太行詩世塗昏險擬步如漆栁文世路山河險君門煙霧深劉賔客官途似風水白傅可憐百鳥紛縱横雖有深林}
