  - {type: variant, offset: 3259, length: 296, content: 尤益敬與鈞史記灌夫傳舛午膠戾乖剌西漢劉向傳師古曰志意不和各相違背趙禹孤立行一意而已西漢本傳上文入絕物嚴延年為河南守眾人言當死者一朝出之言當生者詭殺之前漢違時絕俗為激詭之行東漢范丹傳沈懷文素不飲酒又不好戲調謝莊常戒懷文曰卿每與人異亦何可久懷文曰吾少來如此豈可一朝而變非欲異物性所得也通監宋世祖阮瞻素執無鬼論物莫能難晉書本傳集異質忌處群孤芳難寄林韓文互入儆戒冰雪之交眾裘我絺溽暑之鑠眾從之風而我從之火柳文本朝夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而談詩書豈其情也哉老蘇辨姦論經直往則違易略例上注不揆則往彼必相違互入踈略上文云見情者獲有直情而徑行者戎狄之道也記檀弓下, WYG: 羞妻}
