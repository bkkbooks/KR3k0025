  - {type: variant, offset: 1151, length: 0, content: '', WYG: 起安得謂之破戒徐君鬱鬱澗底松陳君落落堂上棟澗深松茂不遭伐堂毀棟折傷其躬二人出處勢不合譬如日月行西東同上真偽不同史季文子妾不衣帛魯人以為美公孫𢎞身服布被汲黯譏其多詐事實未殊而毀譽别議東漢王良傳裴旻守北平多虎旻善射一日得虎三十一休山下有老父曰此彪也稍北有真虎將軍遇之且敗旻不信怒焉趨之見虎出林薄中小而猛據地大吼旻馬辟易弓矢皆墮自是不復射新唐書本朝悖徳之威雖猛而人不畏非徳之明雖察而人不服惟從容於几席之上而其威折衝於萬里之外退居於家而人敬之如在廊廟可不謂徳威乎東坡徳威堂銘公謂文潞公也所見不同經仁者見之謂之仁智者見之謂之智易知我者謂我心憂不知我者謂我何求惟此哲人謂我劬勞維彼愚人謂我宣驕並詩昔者顔叔子甞獨處于室隣之嫠婦又獨處于室夜暴風雨至室壊婦人趨而至顔叔子納之而使執燭放乎旦而薰盡縮屋而繼之自以為避嫌之不審矣若其審者宜若魯人有男子獨處于室隣之嫠婦又獨處于室夜暴風雨至而室壊婦人趨而託之閉户而不納詩注子自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊古之所謂志者非軒冕之謂也今之所謂志者軒冕之謂也繕性篇子路拯溺而受牛謝孔子曰魯國必好救人於患子貢贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸徳子貢讓而止善淮南子老子曰治大國若烹小鮮為寛裕者曰無數撓為刻削者曰致其鹹酸而已矣史王孫圉聘於晉趙簡子問曰楚之白珩為寶㡬何曰楚之所寶者曰觀射父能作訓辭又左史倚相能通訓典此楚國之寶也若夫白珩先王之玩也何寶之為國語楚語梁王曰寡人有徑寸之珠照車前後十二乗者十枚王亦有寶乎齊威曰寡人所以為寶與王異有四臣擅子種首盻子黔夫將以照千里豈特十二乗哉梁王慙齊世家賢者誠重其死奴妾賤人感慨而自殺前欒布傳陳登見吕布曰登見曹公言養將軍譬如養虎當飽其肉不飽}
