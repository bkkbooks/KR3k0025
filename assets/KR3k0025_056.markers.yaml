  - {type: variant, offset: 1181, length: 1, content: 告, WYG: 在不稱徴之說故愈父仲卿未甞諱焉曹志植之子泰議去幹植不強不諱植字三國志猶不諱其君名云功以權成長斥孫權之名也孔氏雜說本朝老者覺時速閒人知日長日月本無情人心有閒忙歐公陳摶謂錢若水有仙骨麻衣道者曰此人但能於急流中勇退耳人皆種榆栁坐恃十畝隂我獨種松柏守此一寸心嵗換兒童喜還傷老大心嵗熟田家樂秋風客自悲並東坡白樂天詩曰無事日月長不羈天地濶此達者之詞也孟東野詩曰出門即有礙誰謂天地寛此褊狹者之詞也青箱雜記朝廷初行新法康節門生故吏仕宦四方者皆欲投劾而歸以書問康節答曰正賢者所當盡力之時新法固嚴能寛一分則民受一分之賜投劾流去何益言行録伊川與君實語終日無一句相合鳴道集所遇不同子百年之木破為犧尊青黄而文之其斷在溝中比犧尊於溝中之斷則美惡有間矣木以不材終其天年鴈以不材死並莊宋有富人天雨牆壊其子曰不築必將有盜其隣人之父亦云暮而果大亡其財其家甚智其子而疑隣人之父韓非子說難車輕而馬肥雖中工可以致逺載重而馬羸雖造父不能以追急拘囹圄者以日為脩當市死者以日為短榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂佐祭者得長救鬬者得傷並淮南子史豫讓甞事范中行氏而無所知名去而事智伯智伯甚尊寵之史本傳明月之珠夜光之璧以闇投人於道路人無不按劍相盼者無因而至前也蟠木根柢輪囷離竒而為萬乗器者以左右先為之容也鄒陽傳昔伍子胥說聽於闔閭而吳王逺迹至郢夫差乃賜之鴟夷而浮之江樂毅傳李斯少為吏見吏舎鼠食不潔人犬數驚之入倉見鼠食粟居廡下無人犬之憂乃歎曰人賢不肖如鼠在所自處耳本傳並史當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫揚雄傳或解縛而相或釋褐而傳或倚夷門而笑或横江潭而漁或七十說而不遇或立談而封侯世亂則聖人馳鶩而不足世治則庸人髙枕而有餘同上百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳韓信傳故無因而至前雖出隋珠和璧秪結怨而不見徳有人先游則枯木朽株樹功而不忘鄒陽傳抗}
