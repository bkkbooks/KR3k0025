  - {type: variant, offset: 267, length: 0, content: '', WYG: 其有異志也子産曰人心不同如其面焉吾豈敢謂子面如吾面乎並左雖有親父安知其不為虎雖有親兄安知其不為狼韓安國傳始常山王成安君為刎頸交卒滅亡患生於多欲而人心難測也蒯通傳入吾室操吾戈以伐我鄭𤣥傳苻丕曰垂在鄴如藉虎侵咬常恐為肘腋之變晉紀昔吕布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以搆妖梁髙祖惟有人心相對間咫尺之情不能料五代晉髙祖李繁者汝之子也陽城盡疏裴延齡過惡欲宻論之以繁故人子使之繕冩繁徑以告延齡先詣上一一自解疏入上以為妄不之省唐徳宗集孰知其不合兮若竹柏之異心楚辭失意杯酒間白刃起相讐選少年行無曰父子無間昔有潘崇無曰至親無二或容江充王廣之保傅箴人心若波瀾他人方寸間山海㡬千重輕言託朋友對面九疑峰李太白翻手為雲覆手雨紛紛輕薄何足數杜工部天可度地可量唯有人心不可防但見丹誠赤如血誰知偽言巧似簧白樂天太行之路能摧車若比君心是坦途巫峽之水能覆舟若比君心是安流太行路詩理平則為鸞為鳳為鵷為鷺世變則為蛇為豕為猊為梟者十恒八九元微之平生親友心豈得知淺深白樂天今夫平居里巷相慕恱酒食遊戲相徴逐詡詡強笑語以相取下握手}
  - {type: page-break, offset: 267, content: '', id: KR3k0025_WYG_056-11b, image: WYG0931/WYG0931-0574d.png}
