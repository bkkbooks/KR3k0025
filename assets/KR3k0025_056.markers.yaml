  - {type: variant, offset: 2578, length: 679, content: 借君拍板與門槌我也逢場作戲東坡集物有圭角剌人眼目亦易玷缺故君子處世常渾然天成則人不厭棄矣龜山語錄經損益盈虛與時偕行易損卦時止則止時行則行易艮卦時有泰否用有行藏易略例國有道其言足以興國無道其默足以容中庸君子之於禮也有直而行也有曲而殺也記禮器道隆則從而隆道汙則從而汙記檀弓上邦有道危言危行邦無道危行言孫憲問君子哉遽伯玉邦有道則仕邦無道則可卷而懷之語衛靈公甯武子邦有道則知邦無道則愚語公冶長子時詘則詘時伸則伸荀仲尼史晏平仲在朝君語及之則危言語不及之即危行國有道則順命無道則衡命以此三世顯名於諸侯史記本傳君子得其時則駕不得其時則蓬累而行史記老子傳乘流則逝兮得坎則止一作坻史記賈生傳從俗浮湛與時俯仰西漢司馬遷傳書中云浮沉王戎作吏部與時浮沉晉書集孔隨時而行藏遽與國而卷舒潘安仁西征賦伸屈須為蠖窮通莫問龜白樂天集互入委順因俗為禮人用愛戴唐文粹經其次致曲曲能有誠記中庸子川雖曲而動諸海塗雖曲而通諸夏楊子史河千里而一曲公羊傳記孟嘗君每與客坐語屏風後常有侍史主記所與客語知其親戚居處客去後使謝餽無所遺失春秋後序集情深禮至款密重複劉賓客集本朝右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質東坡啟古之聖賢欲行其意必有以曲成之未嘗直情而徑行也東坡集經我聞其聲不見其身詩何人斯箋云何故近之我館庭使我得聞女之聲音不得覩女之身乎子訑訑之聲音顏色距人於千里之外孟告子是絕物也孟史趙禹為吏以來舍無食客公卿相造請禹終不行報謝務在絕知賓友客之請孤立行一意而已西漢本傳鄧榮為人矜潔自貴於人少所與東漢本傳經好人之所惡惡人之所好記大學子吾聞言於接輿大有逕庭不近人情莊史諸勢在己之右必陵之士在己之左愈, WYG: ''}
