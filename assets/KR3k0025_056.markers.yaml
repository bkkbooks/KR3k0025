  - {type: variant, offset: 930, length: 0, content: '', WYG: 其用時鼎鑊在前刀爼列後當此之時雖欲還就孤犢寧可得乎古今樂録集休咎相乘躡翻覆若波瀾選君子行福為禍胎禍作福階盧子諒北叟塞上之翁也馬無故亡}
  - {type: variant, offset: 930, length: 0, content: '', krp: 其用時鼎鑊在前刀爼列後當此之時雖欲還就孤犢寧可得乎古今樂録集休咎相乘躡翻覆若波瀾選君子行福為禍胎禍作福階盧子諒北叟塞上之翁也馬無故亡}
  - {type: variant, offset: 931, length: 3, content: 司政事, WYG: 胡人弔之翁曰安知非福乎後其馬將胡駿馬}
  - {type: page-break, offset: 931, content: '', id: KR3k0025_WYG_056-23b, image: WYG0931/WYG0931-0580d.png}
  - {type: variant, offset: 931, length: 3, content: 司政事, krp: 胡人弔之翁曰安知非福乎後其馬將胡駿馬}
  - {type: variant, offset: 935, length: 0, content: '', WYG: 歸人賀之翁曰安知非禍乎後其子騎墮而折臂人弔之曰安知非福乎後胡兵大出丁壯者戰死唯子以跛故得父子相保故以北叟知禍福相因倚伏生也班固幽通賦注動而得謗名亦隨之韓文公晉勝鄢陵范燮祈死吳克勁越夫差啓殃陸宣公禍福囘環車轉轂榮枯反覆手藏鈎同上本朝魏徴停叔玉婚乃天以祜魏氏房𤣥齡之子遺愛因尚主遂為房氏大禍鳴道集福少禍多子福輕於羽莫之知載禍重乎地莫之知避莊福不盈跳禍溢於世班孟堅利輕春露害重冬霜歡華不滿眼咎責塞兩儀韓集福過禍生史無徳而禄殃將至矣左夫徳福之基也無徳而福猶無基而厚墉也其壊也無日矣宻康公母曰小醜備物終必亡並國語乆乗富貴福積為祟田叔傳貴臣常禍傷於寵也王符傳轉禍為福子子曰中行文子倍道失義以亡其國而能禮賢以活其身聖人轉禍為福此謂是歟家語失火遇雨禍中福宋人好善父子無故而盲其後楚攻宋丁壯者死老幼皆止城破皆屠獨父子盲得無乘城圍解則父子俱視並淮南史齊有仲}
