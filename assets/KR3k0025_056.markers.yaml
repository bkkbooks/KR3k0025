  - {type: variant, offset: 300, length: 1, content: 忘, WYG: 於朝爭利者於市戰國策髙山之巔無美木傷於多陽也大樹之下無美草傷於多隂也說苑與君子遊苾乎如入蘭芷之室乆而不聞則與之化矣與小人游貸乎如入鮑魚之肆乆而不聞與之俱矣是故君子慎}
  - {type: page-break, offset: 300, content: '', id: KR3k0025_WYG_056-15a, image: WYG0931/WYG0931-0576c.png}
  - {type: variant, offset: 300, length: 1, content: 忘, krp: 於朝爭利者於市戰國策髙山之巔無美木傷於多陽也大樹之下無美草傷於多隂也說苑與君子遊苾乎如入蘭芷之室乆而不聞則與之化矣與小人游貸乎如入鮑魚之肆乆而不聞與之俱矣是故君子慎}
  - {type: variant, offset: 302, length: 1, content: 身, WYG: 所去就與君子游如履長日加益而不自知也與小人游如履薄冰每履而下㡬何而不陷乎哉大戴髙山多林必有怪虎豺藏孕焉深淵大川必有蛟龍焉大戴禮林中多疾風富貴多諛言鹽鐵篇鬼谷先生曰子不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有讐怨所居然也子不見嵩岱之松柏乎上枝干於青雲下根通於九泉千秋百嵗不逢斧斤之患此木豈與天地有骨肉所居然也張般祐髙士傳市㕓所㑹萬商之淵左太沖蜀都賦蝨處頭而黒麝食柏而香頸處險而癭齒居晉而黄嵇康養生論五陵佳氣無時無杜帝都名利塲雞鳴無安居温飽充於内清㢘形於外南山多白雲洛陽惟紅塵闇生魑魅蠧生蟲並白樂天貧士少顔色貴門多輕肥孟東野懐貝玉以之名都之肆未有不售}
