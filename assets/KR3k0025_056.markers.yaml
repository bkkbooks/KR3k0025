  - {type: variant, offset: 1096, length: 2, content: 序互, WYG: 至寶不雕琢翰文大圭之質豈待磨礱良玉雖朴不受采醴泉自甘非有和真色縝宻丹青無自入也美味天成麴糵無所資也並唐文粹本朝金沉羽浮蓋有常性類要就死之牛見之而不忍入井赤子覩之而􅇶惕牧人厚方苞之葦稚子閔方雛之雉當其情動於中葢有所自鳴道集天力自然不施膠筋東坡不待擬議子兩木相摩而燃金火相守而流圎者常轉窽者常浮自然之勢也淮南子史雷霆之所擊無不摧折者萬鈞之所壓無不靡滅者賈山傳禇碧曰冰炭不言而冷熱之質自明者以其有實也魏文紀集近火固宜熱履冰豈無寒君子行楩楠出地知為棟梁鳳凰在殻知摩雲霄髙達夫鳳凰芝草賢愚皆以為美瑞青天白日奴隷亦知其清明韓本朝如炊之無不熟種之無不生也東坡自有定價集毛嬙西施善毀者不能蔽其好四子講徳論稱謂一立古先聖賢所不敢移劉賔客精金百鍊良驥千金唐文粹本朝鬻千金之璧者不之於肆而願觀者塞其門觀者歎息而主人無言焉非不能言知言之無加也東坡上曹丞相書文章如金玉各有定價先後進相汲引因其言以信於世則有之矣至其品題髙下蓋付之衆口決非一夫所能抑揚東坡答毛滂書歐陽公言文章如精金美玉市有定價非人所能以口舌貴賤也東坡答謝師民書藍田生美玉未琢價連城山谷不可淺量經汲養而不窮愈汲愈生易齊大饑黔敖為食於路以待餓者而食之有餓者蒙袂葺履貿貿然來黔敖曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終不食而死記子子貢南游於楚過漢隂見一丈人方為圃畦鑿隧而入井抱甕而出灌用力多見功寡子貢曰鑿木為機後重前輕挈水若抽其名為橰圃老曰聞有機事必有機心吾非不知羞不為也莊子見虎一文不知其武見驥一毛不知善走行一棋不足以見智彈一弦不足以見悲淮南子故九州不可頃畝也八極不可道里也大山不可丈尺也江海不可斗斛也淮南子秦族訓不可以黔婁原憲之貧而謂古者無陶朱倚頓之富不可以無鹽宿瘤之醜而謂在昔無南威西施之美王莽引典墳以飾其邪不可謂儒者皆為簒盜也相如因鼔琴以竊文君不可謂雅樂主於淫佚也並抱朴子史趙有處士毛公隠於博徒薛公隠於賣漿家周赧王紀始孟嘗君列此二人雞鳴狗盜於賔客賔客盡羞之及孟嘗有秦難卒此二人捄之孟嘗君列傳韓安國坐法獄吏田甲辱安國安國曰死灰獨不復燃乎即溺之居無㡬韓安國為梁内史前漢書毛遂從平原君合從十九人相與笑之後至楚卒定從而歸史記毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入喜動顔色奉心賤之及義母死後舉賢良徴不至張奉歎曰賢者固不可測往日之喜乃為親屈也後漢器博者無近用宋𢎞傳安靜之吏日計不足月計有餘王導因事就功雖無日用之益而嵗計有餘晉元帝紀庸可以水旱而累堯湯乎蔡邕傳魏舒不為鄉親所重後為將軍鍾毓長史毓每與參佐射舒常為畫籌而已後遇射人不足以舒滿數舒容範閑雅發無不中舉坐愕然莫有敵者毓曰吾之不足以盡卿才有如此射矣魏元紀王湛初有隠徳人莫能知兄弟宗族皆以為癡兄子濟輕之甞詣湛見床頭有周易濟請言之因剖析𤣥理微妙而有竒趣皆濟所未聞武帝亦以湛為癡見濟輒問之濟曰臣叔殊不癡王敬則母常謂人云敬則應得鳴鼓角人笑之曰汝子得為人吹角可矣後果封侯給鼔吹齊書曹景宗大破魏軍振旅凱入帝於華光宴飲因令左僕射沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿技能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韵已盡唯餘競病二字景宗便操筆斯須成其辭曰去時兒女悲歸來笳鼔競借問行路人何如霍去病帝欣然不已約及朝賢驚嗟竟日詔令上史梁書陳慶之曰吾始以為大江以北皆戎狄之鄉比至洛陽乃知衣冠人物盡在中原非江東所及也髙祖魏游雅曰昔崔司徒謂髙生豐才博學所乏者矯矯風節耳余亦以為然及司徒得罪詔㫖臨責聲嘶股慄殆不能言髙子獨敷陳事理辭義清辨音韻髙亮人主為之動容聽者無不神聳此非矯矯者乎髙生乃髙允封常清少孤貧細瘦纇目一足偏短求為髙仙芝傔不納常清日候仙芝出}
