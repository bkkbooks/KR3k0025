  - {type: variant, offset: 4, length: 3, content: 子螣蛇, WYG: 德出忠入孝自家刑國人物冠冕彛章表則任屬屯警官聯樞侍行部六條議班三史尉遲綱銘本朝天禧元年司徒平章事王旦王元巖同日降制加太保㑹要熈寧元年潞國公文彦博守太保兼侍中再任彦博辭太保止受所加封再任從之同上紹興十年少保萬夀觀使兼三鎮節度使劉光世除太保同上俾陞帝保秩乃冠千公卿李漢行鄭紳制眷言公保宣力維多宣和除董貫制明公身為天下大老誠有憂國之心不當俯及細務願以此意為上一言使幽險之情得以上逹則天下之言皆明公之言而明目逹聰感召和氣皆明公之功矣朱文公荅史太保書太尉史太尉秦官漢因之金印紫綬掌武事髙祖曰周勃重厚少文安劉必勃可令為太尉後以左袒安劉漢史冲帝詔曰李固忠直不撓有史魚風其以固為太尉傳記後漢張顥見一鵲墜地化為石椎破得金印曰忠孝侯印顥奏聞藏之秘府後至太尉博物志唐置太尉為武階之首職畧景帝置太尉尊與丞相等通典集天官冢宰庻僚之率師錫有帝命虞作尉爰叶台極爰平國域崔駰太尉箴天監有漢誕生元輔代作三事勲在王府楊太尉碑銘本朝循歴代之制以太尉與司徒司空並為三公政和時罷之復周制以太師太傅太保為三公少師少傅少保為三孤以太尉本秦主兵官定為武階之首正一品在節度使之上居執政之次司徒經司徒掌建邦土地之圖人民之數周知九州地域周禮帝曰契女作司徒敬敷五教在寛掌邦教敷五典擾兆民書乃詔司徒俾立室家詩綿史漢光武拜鄧禹為司徒䇿曰禹與朕謀謨帷幄决勝千里今授印綬封鄼侯漢史袁安為司徒毎朝㑹憂念王室未嘗不流涕同上杜洗兵馬行司徒清鍳懸明鏡指李光弼也詩話傳記堯時舜為司徒舜攝帝位命禹為司徒秦置丞相省司徒漢初因之後漢大司徒主徒衆教以禮義凡國有大疑大事與太尉同六典魏華歆為司徒家}
