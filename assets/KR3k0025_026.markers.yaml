  - {type: variant, offset: 2652, length: 1, content: 怯, WYG: 塼位唯參知政事未有詔令依位排砌至道元年詔參政與宰相分日知印押正衙其塼位先異宜合為一並得升都堂二年詔自今參知政事不知印押班塼位列宰相後不升政事堂然押勅齊銜行並馬至今不易參政行丞相事多不踰年淳熈初葉孟錫龔實之行丞相近三年言者以為懐私加俸許深甫為參政命陳勉之兼權又除袁起巖盖三員也亦國朝所未有嘉定初命雷季仲婁彦發樓大防亦三員遂為故事朝野雜記樞宻院史唐以宦官為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏于内中進呈若人主有所分處則宣付中書門下施行吕源明家塾記後梁革唐世宦官之弊開平元年改樞宻院為崇政院分紀其備顧問參謀議于中則有之未始專行事于外也五代史晉天福中以桑維翰知樞宻院事四年廢樞宻院以劉處謙兼樞宻奏議多不稱㫖及處謙丁内憂遂廢院同上傳記唐莊宗同光元年復以崇政院為樞宻院復唐樞宻之名然權侔于宰相矣後世因之遂分為二文事任宰相武事任樞宻樞宻之名既重而宰相自此失其職白孔六帖唐張居翰掖庭令張從政之養子同光中為樞宻偽蜀王衍既降詔遷其族于洛陽行及秦川}
