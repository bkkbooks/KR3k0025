  - {type: variant, offset: 2934, length: 0, content: '', WYG: 樞宻使國初首命趙韓王普焉號稱二府禮遇無間毎朝奏事共中書先後上所言兩不相知祖宗亦賴此以聞異同用分宰相之權㑹要韓世忠除樞宻使上謂世忠曰朕付卿等以樞府本兵之權甚大卿宜合為一心勿分彼此則兵利全而莫之能禦顧如烏珠者又何足掃除乎言行録至道三年以鎮海節度曹彬兼侍中充樞宻使同上文彦博除樞宻使制乃位冠於中樞温公集樞宻副使傳記熈寧中韓澤遷樞宻副使神宗問天下遺利公對求遺利莫若盡地力退具疏以謂害農之弊莫甚於差役請委從䑓諫集議言行録韓琦為樞宻副使兩府合班奏事琦必盡言雖屬中書琦亦對上陳其實同列尤不悦上獨識之曰韓琦性直同上王文忠公堯臣為樞宻副使持法守正以身任天下事在位六年廢職脩舉皆有條理言行録歐陽公脩為樞宻副使公在兵府與曽魯公取天下兵數及三路屯戍多少地里逺近更為圖籍凢邊防乆闕屯戍者必加蒐補長編吕公著拜樞宻副使初自河陽入朝都人環觀相謂曰此公還朝百姓之幸也至是士民相慶既受命出殿門武夫衛卒皆歡忭咨嘆言行録使相本朝樞宻使帶相印為樞相自後唐始國朝會要國初魏仁浦以宰相兼樞宻使後罷同上慶厯二年二邊用兵富弼言邊事係國安危國初范質王溥以宰相兼參知樞宻事今兵興宜令宰相兼領仁宗然之揮麈録建炎四年以宰相范宗尹兼知樞宻院罷御營以其事歸樞宻院中興會要紹興二十五年詔曰比縁軍興令宰相兼樞宻使典掌機務今邊事已定可依祖宗故更不兼領同上慶厯二年上曰樞宻非古官未欲遽改止令中書同議宻院事長編惟仲淹弼一䕫一契天實賚予予其敢忽曰衍汝來汝予黄髮汝掌樞府兵政無蹶石介慶厯}
