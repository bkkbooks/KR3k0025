  - {type: variant, offset: 1243, length: 1, content: 說, WYG: 説後譛不行張柬之姚崇為靈武軍使後詔舉外司可為相者崇曰張柬之沉厚有謀能㫁大事其人老惟亟用即日召見拜同鳯閣鸞䑓平章事唐書張九齡為相諤諤有大臣節同上房杜當方為相時天下新定䑓閣制度憲物率二人討裁毎議事帝所如晦長于㫁而𤣥齡善謀二人深相知故同心濟謀以左右帝當世語良相必曰房杜同上陸䞇為相所言皆指帝短或規其太過對曰}
