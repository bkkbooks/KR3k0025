  - {type: variant, offset: 2963, length: 0, content: '', WYG: 通典唐武德三年改中書舎人置六員自永淳以來天下文章道德䑓閣髦彦無不以文章逹故中書舎人為文士之極任朝廷之盛選諸官莫比焉通典唐楊綰為中書舎人故事舎人年乆者為閤老其公廨雜料獨取五之四綰悉均給之本傳魏魏收兼中舎與温子升邢子才齊譽世稱三才同上集絲綸閣下文章静鐘皷樓中刻漏長獨坐黄昏誰是伴紫薇花對紫薇郎白居易詩西掖重雲關禁置北山踈雨㸃朝衣干門栁色連烟鎖三殿花香入紫薇岑參西掖深沉大帝居紫薇西省掌文書天堦啓鑰趨朝後侍史焚香起草初古詩上李舎人緑松窻對鳯池開履跡衣香遍上台天意皆從紫毫出宸心盡向紫烟來非時玉案呈宣㫖毎日金堦謝賜囘王建詩今年寒食夜西省鳯池頭誠知視草貴未免對花愁白居易詩本朝中書舎人為所遷官實不任職復置知制誥及直舎人院故事入西閣皆中書召試制誥三篇惟梁周翰不召試而授焉其後薛映梁鼎楊億陳堯佐歐陽修亦}
