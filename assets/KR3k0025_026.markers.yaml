  - {type: variant, offset: 2964, length: 1, content: 父, WYG: 此例長編元豐五年曽鞏陸佃並試中書舎人自是始正官名續㑹要中書侍郎史侍郎二人正三品掌貳令之職朝廷大政參政焉百官志于志寧為中書侍郎太宗常宴近臣問志寧豫宴安在有司奏勅召三品志寧品第四帝悟特詔豫宴裴潜風神髙邁為中書侍郎出入禁門見者皆肅然改容王琚始為中書侍郎}
