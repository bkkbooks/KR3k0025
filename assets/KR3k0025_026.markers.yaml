  - {type: variant, offset: 2944, length: 7, content: 震草木威怒雖甚, WYG: 通考左右僕射史秦官漢因之自侍中尚書博士郎皆有之古者重武官有土射以督課成帝建始元年初置尚書五人以一人為僕射主封門掌授廩假錢榖龍朔二年改左右僕射曰左右匡政光宅元年曰文昌左右相開元年曰左右丞相天寳元年復百官志徐宣左僕射加侍中車駕幸許昌宣總留事帝還主司奏呈文書帝曰吾與僕射何異也魏志房𤣥齡進尚書左僕射帝曰公為僕射當助朕廣耳目訪賢才比聞閲牒訟日數百豈暇求人哉乃勅細務屬左右丞大事闗僕射唐書杜如晦進位尚書右僕射仍領選與房𤣥齡共筦朝政引士賢者下不肖咸得職當時浩然歸重同上傳記建安中以執金吾榮邵為尚書左僕射僕射有左右自此始也百官表王常為左僕射常墮車時人謂之墮車僕射周顥為左僕射深識危亂常飲酒醉三日不醒時人謂之三日僕射世説裴遵度以右僕射後知選事朝廷優其老聽就第注官時以為榮列傳李絳寳厯初拜尚書左僕射絳偉儀質俊以直道進退望冠于一時賢不肖大分屡為䜛邪所中同上裴均元和三年入為尚書右僕射上日唱授按送印皆尚書郎為之文武四品五品郎官御史拜廷下御史中丞左右丞升階荅拜時以為禮太重官志集端揆之司樞機之重尚書令總領衆務舉持綱目僕射貳之誠為崇重天寳元年議本朝制左右僕射掌佐天子議大政二令之職與三省長官皆為宰相之任元豐官制行不置侍中中書令以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令職事寄禄為時進通考中書令史中書省令二人正二品佐天子執大政}
