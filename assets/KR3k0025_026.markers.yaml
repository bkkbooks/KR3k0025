  - {type: variant, offset: 2187, length: 382, content: 渠魁脅從罔治書嗣征無忿疾于頑無求備于一夫書鴟鴞鴟鴞既取我子無毀我室詩鴟鴞君子不盡人之歡不竭人之忠以全交也記曲禮上國君春田不圍澤大夫不掩群士不取麛卵同上有餘不敢盡記中庸君子以人治人改而止同上君子以義度人則難為人以人望人則賢者可知已矣記表記子釣而不綱弋不射宿語述而子仲尼不為已甚者孟子离婁下剋核太至則必有不肖之心應之莊子人間世互見物極則反水至清則無魚人至察則無徒家語互見苛察魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚昔舜巧於使民而造父巧於使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然而其心猶乃求馬不已家語察見淵魚者不祥智料隱暱者有殃列子互見苛察焚林而田後必無獸以詐遇民後必無民韓子焚林而獵愈多得獸後必無獸淮南子史御者不盡馬之情史記夫差智伯極武而亡西漢陸賈傳黃霸曰凡治道去其太甚者, WYG: 勞}
