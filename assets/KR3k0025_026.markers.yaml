  - {type: 'tls:seg', offset: 2940, content: '', id: KR3k0025_CHANT_026-17a.4}
  - {type: variant, offset: 2940, length: 0, content: '', WYG: 弓箭手近于屯田義勇近于府兵擇用一焉兵屯可省矣事畧紹興三十一年完顔亮渝盟時洪文敏公邁任樞宻院檢詳宰相傳㫖令撰書詔榜檄家傳編脩官本朝編脩之職古無之慶厯四年史館王洙承㫖單士寧編脩例冊編脩之名自此始分紀熈寧三年以館職王存顧臨等同編經武要畧兼刪定諸房例冊中興㑹要王銍權樞宻院編脩纂集祖宗兵制書成上覽之稱善命改京官賜名樞廷備檢中興係年録編脩官隨事置無定員以本院官兼者不入衘四朝志神宗朝除周萃樞宻院編脩官制曰樞宻之府自祖宗以來防患持危應變之大計與夫將相議論之臣宻謀要䇿皆具于此而文書貿亂淆雜而無紀綱故擇能臣次第之荆公文集尚書省史漢靈帝時謂之中䑓唐龍朔二年改尚書省為中䑓漢書北齊尚書省謂之都省亦謂之北省張安世拜大司馬車騎將軍領尚書事職典樞機以謹慎周宻而自著張禹録尚書毎朝會與三公絶席前漢書章帝以太傅趙熹太尉牟融録尚書事尚書有録自熹始漢制遂以為常後漢書唐制尚書省都堂居中左右分于司堂東西凢二十四司分曹共理唐書尚書百官之本國家樞機李固疏北斗天之樞機尚書為陛下之樞機晉宗室會稽王道子及世子元顯並録尚書事時道子為東録元顯為西録通志本朝太平興國中徙于利仁坊孟昶舊第頗為宏麗中設都堂左右司左右丞郎中員外郎㕔東西廊分設尚書侍郎㕔事二郎中員外㕔事六掌施行判命舉省内綱紀程式受付六曹文書聽内外辭訴奏御史失職考百官府之治以詔廢置賞罰紹聖二年詔在京官所受傳宣内降隨事申尚書省又詔尚都省弹奏監察御史糾不當者通考尚書令史尚書令一人正二品掌典領百官其制有六尚書百官志後漢衆務悉歸尚書三公但受成事而已尚書令主贊奏事總領紀綱無所不統與司𨽻校尉御史中丞朝會皆專席而坐京師號曰三獨坐故公為令僕射者朝會不陛奏事天子封禪則尚書令奉玉牒檢兼藏封之禮通考傳記武德中太宗初為秦王嘗親其職儀刑端揆唐六典郭子儀至自涇陽恩賚崇縟進拜尚書令懇辭不聽詔趋詣省視事百官往慶勅射士五百騎執㦸寵衛子儀確讓且言太宗嘗踐此官故累聖曠而不置皇太子為雍王定關東乃得授渠可畏私孝臣隳大典云云帝不獲已許之其所讓付史館六帖漢侯霸為尚書令時朝廷少舊臣霸明習故事收錄遺文大全集總百揆之得失管王政之開闢出納王命敷奏萬機屬職萬機總任百揆邢子才謝表邦國政治盖出于中樞朝廷紀綱盡歸于會府除王時制本朝淳化三年升在三師上掌佐天子議大政奉所出命令而行之其屬有六曹凢庻務皆命而决之凢官府之紀綱程式無不總焉大事三省通議則同執政官合班小事尚書省獨議則同僕射丞分班論奏若事由中書門下而有失當應奏者亦}
