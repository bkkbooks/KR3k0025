  - {type: variant, offset: 1258, length: 0, content: '', WYG: 侍中中書令為左輔右弼亦虛而不除改左右僕射仍兼兩省侍郎靖康中何文縝將拜相乃先為僕射呉正仲當制更為丞相不從建炎三年吕元直初相議者請併三省乾道二年十二月詔改左右僕射為左右丞相㑹要冦萊公當國真宗有澶淵之幸而能左右天子不動如山却敵國保宗廟天下謂之大忠范文正公集吕端為相持重識大體毎奏對同列多異議公罕所建明一日内出手札戒曰令中書事必經吕端詳酌乃得聞奏言行録吕䝉正為相遇事敢言上嘉其無隠長編元祐元年司馬光言竊見文彦博沉敏有謀畧知國家治體能斷大事功効顯著此天下所共知也同上熈寧初富弼再相神宗首問邊事公曰臣愚以為首當推恩惠布德澤二十年未可道著用兵二字上問所當先如何公曰阜安宇内為先言行録王旦在相位乆外無疆場之虞兵革不用海内富實羣工百司各得其職故天下稱為賢相王旦傳韓琦為相十年當仁宗末朝廷多故公臨大節處危疑茍利國家知無不為故􅀎光輔三后大濟艱難坐置天下于大寧公之力也言行録王曽毅然大節身係安危事畧朝廷有道青春好門館無私白日長有官居鼎鼐無地起樓䑓魏野上冦萊公風定曉園蝴蝶閙雨餘春圃桔橰閒荆公詩平章事史杜祐拜檢校司空同中書門下平章事嵗餘乞致仕詔三五日一入中書平章政事祐毎進見天子尊禮之官而不名公化裴度太和四年詔進司徒平章軍國重事三五日一入中書狀貎不踰中人而神觀爽邁操守堅正善占對名震四夷同上貞觀八年僕射李靖以疾辭位詔疾小愈三兩日一至中書門下平章事平章之名盖始於此百官志宋璟罷帝欲用張嘉貞而忘其名夜詔韋抗曰朕嘗記其風操今為北方大將姓張而複名嚮夜半因觀文臣表奏而得其名遂以為平章事張嘉貞傳傳記裴冕肅宗至扶風召赴行在拜左相代宗立詔攝冢宰固辭以疾乞間日入政事堂帝優之聽入閣不趨為御小延英召對}
