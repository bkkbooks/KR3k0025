  - {type: variant, offset: 1245, length: 0, content: '', WYG: 上不負天子下不負所學同上唐𤣥宗命相皆先御書其名置案上會太子入侍上舉金甌覆其名而告之曰此宰相名也唐史房𤣥齡為相十五年以權寵隆極累表辭位帝遣使謂曰遜誠美德也國家相眷賴乆一日去卿如亡左右手唐志唐廢帝欲擇宰相問于左右皆言盧文紀及姚顗有人望廢帝因悉書清望官内琉璃瓶中夜焚香祝天以筯挾之首得文紀欣然相之五代史傳記秦悼武二年始置丞相官樗里疾與丼茂為左右丞相史記陳又置相國位丞相上並為贈官自晉魏以來宰相但以它官或闕不置間者自為尊崇之位多非其人臣之職其真宰相者不必居此官也通典隋文帝自大丞相後周遂置内史納言是為宰相亦有它官參與焉同上唐同中書門下三品及平章事知政事參知機務參與政事及平章軍國重事之名是也通典武后龍朔元年改侍中為左相中書令為右相尚書僕射為文昌後復改易同上丞相王商國家之柱石臣也其人守正不詘節前元后傳神龍元年大水宋務光上書}
