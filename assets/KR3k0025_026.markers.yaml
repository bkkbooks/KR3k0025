  - {type: variant, offset: 1246, length: 0, content: '', krp: 霖雨即閉坊門故里人呼坊門為宰相謂能節宣風雨天工人代乃是虛設宋務光傳唐自武德以來宰相寛厚以陸象先為標首詞翰以姚元崇為標首詞學以張説為標首决遣以張義正為標首通鑑唐紀太宗謂房𤣥齡曰公為僕射當廣朕耳目助訪賢才比閲訟牒}
  - {type: variant, offset: 1247, length: 0, content: '', WYG: 數百豈暇求人哉乃勅細務屬左右丞大關僕射房𤣥齡傳僕射裴遵慶母皇甫氏少時常持經經函中有小珊瑚樹異時忽有小龍骨一具立于側時人以為裴氏祥上元中遵慶遂居宰府廣異記毎元日冬至大朝百官已集而宰相}
  - {type: variant, offset: 1247, length: 0, content: '', krp: 數百豈暇求人哉乃勅細務屬左右丞大關僕射房𤣥齡傳僕射裴遵慶母皇甫氏少時常持經經函中有小珊瑚樹異時忽有小龍骨一具立于側時人以為裴氏祥上元中遵慶遂居宰府廣異記毎元日冬至大朝百官已集而宰相}
  - {type: variant, offset: 1248, length: 2, content: 知才, WYG: 至珂傘列燭多至數百炬謂之火城宰相火城至則衆皆㓕燭以避之李肇國史補集我愛房與杜魁然真宰輔黄閣三十年清風億萬古皮日休詩大厦須異材廊廟非庸器雜體詩一戰文塲拔趙旗便調金鼎佐無為王仁裕上傅相國旱嵗天教作霖雨明時帝用補山龍王建上張相霖雨思賢佐丹青憶老臣應圖逢駿馬驚代得麒麟沙汰江河濁調和鼎鼐新杜詩左轄頻虛位今年得舊儒相門韋氏在漢臣頌經術杜詩十年紫殿掌洪鈞出入三朝一品身文帝寵深陪雉尾武皇恩厚宴龍津李德裕林舘經春瑞氣浮當時曽約相車逰白樂天清如氷玉重如山百辟嚴趨禮絶班强虜外聞應破膽平人常見盡開顔岑參平生五色線願補舜衣裳杜牧上熈陛下覆幬之恩下遂羣生性命之理以正百度以和四時澄其源而清其流統于一而應于萬為韋相表假三事之崇允萬夫之望故韓信以丞相擊魏樊噲以相國伐燕克成茂功抑有前典元逹制玉鼎昇黄閣金章謁紫宸任師古本朝元祐初司馬公相乃請令三省合班奏事分省治事自紹聖以後皆因之時議者謂門下相凡事既同進呈則不應自駁以行之命是省審}
