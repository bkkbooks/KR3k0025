  - {type: variant, offset: 2952, length: 2, content: 歸於, WYG: 總判省事百官志隋中書令為侍中知政事遂為宰相之職隋書唐開元改紫薇令唐書髙允為中書令魏文帝重之不名稱為令公魏史房𤣥齡太宗即位為中書令第功班賞以如晦等功第一餘皆以次叙封拜唐書郭子儀為中書令二十四考以身為天下安危張九齡為中書令時天長節百官多獻珍異惟九齡進金鏡録五卷同上傳記晉和嶠為令荀朂為監不同居嶠嫉朂邪諂先登車席而坐不容朂又乃引備車監令異車自此始也呉隲為中書令父亮為尚書令毎朝會帝以雲母屏風隔其坐也録記薛元超帝嘗宴諸王召元超與從容謂曰任卿中書寧藉多人哉議拜中書令唐紀長孫無忌檢校中書令猶知門下省帝}
