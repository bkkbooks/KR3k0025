  - {type: variant, offset: 2935, length: 0, content: '', WYG: 德詩知院史晉天福初桑維翰以翰林學士尚書禮部侍郎知樞宻院知院之名始此分紀本朝國初不置淳化二年樞使王顯出鎮始以張遜知樞宻院事續㑹要知樞宻院同知院並正二品知院掌佐天子執兵政而同知院為之副凡邊防軍務常與三省分班稟奏事于體要則宰相執政官合奏神宗正始職官志李諮為知樞宻院事諮性明逹周知世務佐樞府抑僥倖號為稱職東都事畧李綱以右丞被命樞筦奏云伏䝉聖恩除知樞宻院事以被命鴻樞專統兵機宜得魁竒英偉之人以居其任傳信録同知史周顯德六年命司徒平章范質禮部尚書王溥並參知樞宻院五代史本朝初不置淳化二年王顯出鎮張士遜知樞宻院事始以温仲舒冦凖同知院同知之名自此始也會要元豐官制行廢使副存同知職源紹興中髙宗以本兵之地事權宜重依祖宗故事置樞宻使而知院同知院亦仍舊由是並除本朝襍記向敏中同知樞宻院明辨有才畧處事敏速樞宻之任專主謀議至于西北二邊道路斥堠走集之所莫不周知事畧吕公著復同知樞宻院神宗手詔曰顧在廷之人有可以託中外腹心之寄均皇家休戚之重無逾卿者可亟起視事同上元祐中趙瞻拜同知院事制賛一}
