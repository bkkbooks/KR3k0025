  - {type: variant, offset: 2935, length: 0, content: '', krp: 德詩知院史晉天福初桑維翰以翰林學士尚書禮部侍郎知樞宻院知院之名始此分紀本朝國初不置淳化二年樞使王顯出鎮始以張遜知樞宻院事續㑹要知樞宻院同知院並正二品知院掌佐天子執兵政而同知院為之副凡邊防軍務常與三省分班稟奏事于體要則宰相執政官合奏神宗正始職官志李諮為知樞宻院事諮性明逹周知世務佐樞府抑僥倖號為稱職東都事畧李綱以右丞被命樞筦奏云伏䝉聖恩除知樞宻院事以被命鴻樞專統兵機宜得魁竒英偉之人以居其任傳信録同知史周顯德六年命司徒平章范質禮部尚書王溥並參知樞宻院五代史本朝初不置淳化二年王顯出鎮張士遜知樞宻院事始以温仲舒冦凖同知院同知之名自此始也會要元豐官制行廢使副存同知職源紹興中髙宗以本兵之地事權宜重依祖宗故事置樞宻使而知院同知院亦仍舊由是並除本朝襍記向敏中同知樞宻院明辨有才畧處事敏速樞宻之任專主謀議至于西北二邊道路斥堠走集之所莫不周知事畧吕公著復同知樞宻院神宗手詔曰顧在廷之人有可以託中外腹心之寄均皇家休戚之重無逾卿者可亟起視事同上元祐中趙瞻拜同知院事制賛一}
  - {type: variant, offset: 2937, length: 0, content: '', WYG: 休必資耆德握萬兵之本爰賴舊臣盖知其要者可以應務而不窮乆於事者可以臨機而無惑宜賴故臣賛翊洪樞會要簽書本朝簽書無正員為使之貳續㑹要太平興國四年石熈載以樞宻直學士簽書院事簽書之名自此始也職源景德三年韓崇訓檢校太傅馬知節為檢校太保並簽樞宻院事天禧四年以華州觀察使為宣徽北院使鎮國軍留後簽書樞宻院事簽書兼藩鎮自此始也會要馮拯簽書樞宻院事真宗訪以邊事拯謂備邊之要當湏扼襟喉據險隘以制敵之衝若於保州威虜間依徐河以布陳裹糧其勢足以决勝事畧太平興國四年石元懿始以樞宻直學士僉書院事退朝録同簽本朝樞宻院舊制無同簽書樞宻院事者治平中始有以郭逵為之神宗正史職官志元豐官制}
  - {type: page-break, offset: 2937, content: '', id: KR3k0025_WYG_026-36a, image: WYG0930/WYG0930-0597a.png}
  - {type: variant, offset: 2937, length: 0, content: '', krp: 休必資耆德握萬兵之本爰賴舊臣盖知其要者可以應務而不窮乆於事者可以臨機而無惑宜賴故臣賛翊洪樞會要簽書本朝簽書無正員為使之貳續㑹要太平興國四年石熈載以樞宻直學士簽書院事簽書之名自此始也職源景德三年韓崇訓檢校太傅馬知節為檢校太保並簽樞宻院事天禧四年以華州觀察使為宣徽北院使鎮國軍留後簽書樞宻院事簽書兼藩鎮自此始也會要馮拯簽書樞宻院事真宗訪以邊事拯謂備邊之要當湏扼襟喉據險隘以制敵之衝若於保州威虜間依徐河以布陳裹糧其勢足以决勝事畧太平興國四年石元懿始以樞宻直學士僉書院事退朝録同簽本朝樞宻院舊制無同簽書樞宻院事者治平中始有以郭逵為之神宗正史職官志元豐官制}
  - {type: variant, offset: 2938, length: 0, content: '', WYG: 使副簽書並罷惟存同知職源太平興國八年張司空齊賢王公沔並以諫議大夫同簽書樞宻院事退朝録簽書大抵以處資淺之人若簽書一經親祠方進同知及樞副若武臣擢預國政只除同簽書職源承㫖本朝熈寧五年以尚書比部員外郎曽孝寛充史館脩撰兼都承㫖文館兼領自孝寛始續㑹要劉安世作都承㫖待制范相純仁之出由安世草疏已而復拜吕相大防遂擬安世真定宣仁難之吕云劉安世曽言范純仁今既復用宜少避之宣仁曰今既不作言事官自不相妨言行録毎崇政殿臨决庶務則承㫖侍立殿前侍衛司奏事則承㫖受而讀之㑹要右府管天下之機務而承㫖左右參總焉除張誠一制陪輔帷幄以承宻㫖除劉奉臣制樞機之地親承宻㫖雖在副介亦湏得人檢詳本朝檢詳之職古無之國初熈寧四年詔以編脩經武要畧官四人王存陳侗陳奉世蘓液檢詳樞宻院諸房文字禮遇視中書檢正官元豐三年詔定置三員及改官制檢詳官尋罷續㑹要乾道二年詔樞宻檢詳係掌朝廷機要文字不許出謁賔客會要吕大忠檢詳樞宻院吏兵房文字令典義勇樞機大忠言養兵猥衆國用日匱漢之屯田唐之府兵善}
