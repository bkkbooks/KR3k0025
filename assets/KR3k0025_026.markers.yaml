  - {type: variant, offset: 42, length: 2, content: 腐鼠, WYG: 人則缺安以老病參之固辭不拜及沒後制賜故司空邈榖二千石錢四十萬本傳房𤣥齡進司空仍總朝政固辭帝遣使詔曰遜誠美德也然國家相眷賴乆一日去良弼如亡左右手顧公筋力未衰勿多辭王思禮代李光弼為河洛節度副使從平禄山守東京上元元年加司空自武德以來三公不居宰輔惟思禮}
