  body:
  - {type: variant, offset: 2, length: 0, content: '', WYG: 則監察而量是非陳忠傳楊震明經愽覽不應州郡禮辟後有鸛雀銜三鱣魚墜堂下都講取魚進曰蛇鱣卿大夫服之象也數三法三台也先生自此升矣後位三公本傳丁固夢松生其腹上謂人曰松字十八公也後十八嵗吾其為公乎卒如夢焉呉嗣主傳集道協陶鈞力恩囘日月光一言歸社稷九命備圭璋楊巨源詩五雲多䖏是三台杜詩明君越羲軒元老坐三台李白詩一為公與相潭潭府中居韓集公望冠巖廊楊巨源詩鐘鼎勲庸大同上天設三光以昭明天子立三公以明理故公卿者四海之表儀神化之丹青鹽鐵論本朝政和二年詔曰太師太傅太保此古三公之官為宰相之任今為三師然古無三師之稱合依三代為三公官不必備惟其人為宰相之任若除三公即為宰相靖康末詔依元豐故事以僕射為宰相三公止為階官不復與三省之政焉職畧昔師尚父秉旄仗鉞猶未告老此諸葛元遜所以屈張昭素也而衛武公百年猶箴儆于國曰無以我老耄而舎我此左史倚相所以誨申公也東坡文集義重股肱望隆堂陛奥廉逺則堂陛峻股肱逸則元首安同上寵辭上宰歸榮故鄉兼兩鎮之節旄備三公之典䇿王安石上韓魏公書太師經太師維垣詩大雅維師尚父時維鷹揚詩大明天子禮樂是經學業不祛凡是之屬太師訓禮禮記尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷詩節南山史元帝即位蕭望之周堪本以師傅見尊重後詔御史國之將興尊師而重傅前將軍蕭望之傅朕八年道以經術厥功茂焉其賜爵關内侯給事中蕭望之傳首三公之職太師居上宋百官志隋髙祖受禪李穆来朝髙祖降坐禮之拜太師賛拜不名子孫雖襁褓悉拜儀同一門執象笏者百餘人貴盛當時無比隋書顔真卿德宗立拜太師立朝正色剛而有禮賛云晩節偃蹇為姦臣所擠毅然之氣折而不阻可謂忠矣唐書裴度拜太師平章事事四朝以全德始終及殁天下莫不思其風烈同上傳記文王得尚父于磻溪以為師史記太師孔光道術通明宜居四輔職導帝躬職畧太師金章紫綬位上太傅通典唐置太師以師範一人儀刑四海分記馮道為太師以舊德自䖏然當世之士無賢愚皆仰道為元老而喜為之稱譽本傳集文武成功後居為百辟師韓集善教邈無跡其流在民心君㸔魯太師廟食猶至今韓維冠三公之首為四逸之儀白樂天周寵元勲任先吕尚漢崇碩德選在孔光同上本朝國初之制以太師太保太傅為三師職畧淳化二年遣右正言張康齎太師趙普生辰器幣鞍馬就西京賜之故事非同平章無生辰國信之例上以普勲舊故特異其禮㑹要文彦博有赴闕司馬公言若令以正太師平章軍國政事亦足以尊老成矣遂詔一月兩赴經筵六日一入朝至都堂商量事事畧器深宏逹業茂經綸弛張文武之才出入將相之任歐楊公囘文太師啟太傅經天子不惠于庻人不信于諸侯不戒于戎事凡是之屬太傅之任去太師審父子君臣之道以示之少師奉世子以觀太傅之德而審喻之太傅在前禮記史後漢胡廣字伯始為太傅年八十四練逹事體明解朝章雖無謇直之風屡有補闕之益漢史明帝以鄧禹元功拜為太傅進見東向甚見尊寵同上和帝即位㓜弱以鄧彪有髙名海内歸仁召為太傅百官總已以聽之恩寵之隆莫與為比通鑑後漢張禹拜太傅録尚書事劉蒼以殤帝㓜育欲令重臣居禁内乃詔禹舎宫中給帷帳牀褥太官朝夕進食五日歸府毎賛與三公絶席同上鍾繇為太傅明帝曰三公者一代之偉人也兼華歆王朗而言魏志後魏淮陽王欣大統中為太傅文帝謂欣曰王欣為太傅再為太師自古人臣未聞有此例欣遜謝而已魏志傳記後漢有太傅上公一人掌以善道無常職通典世祖即位卓茂以德行見拔時年七十餘拜太傅賜几杖卓茂傳周成王即位周公畢公並為太傅史記晉悼公知士貞子之師博聞宣惠于教也使為太傅國語靈帝朝以陳蕃為太傅與胡廣叅録尚書事陳蕃志欲芟夷閹宦以清本朝陳蕃傳逹奚武拜太傅賤時好華飾及居重位不理威儀行常單馬門不施㦸常晝揜一扇或謂武曰公位冠羣后功盖一代出入儀衛不稱具瞻何輕率若是武曰且天下未平國恩未報安事威儀乎言者慙而退本傳集吾愛白樂天逸才生自然誰謂辭翰器乃是經濟賢皮日休白太傅詩賢相謝世運壯圖因事止髙揖七州外拂衣五湖裏謝靈運述祖徳詩負孺子之圖飾縁鶴之鼎軍威重于䕶將國禮貴于塞門陳沈炯為太傅表不以九族囘心}
