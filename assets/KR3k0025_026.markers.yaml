  - {type: variant, offset: 1496, length: 297, content: 卿百鳥畏人林野宿翻遭網羅俎其肉韋應物解帶翻成結同上疾雷不及掩耳卒電不及瞑目太公六韜本朝夫以斧析薪可謂必克然不循其理則斧可折薪不可破東坡擬進士御試策白鷗生意在滄波不謂風塵有網羅臨川集謾說罷侯能置守趙高元不是封侯邵堯夫秦詩經枯楊生荑易大過魚網之設鴻則離之詩新臺發彼小豝殪此大兕吉日詩子有不虞之譽孟离婁下麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同床食芻豢而後悔其泣也莊子齊物篇史秦燔書而易為卜筮之事傳者不絕西漢藝文志方其鼓刀屠狗賣繒之時豈自知附驥之尾垂名漢庭德流子孫哉史記灌嬰傳互見人生罔測解裋褐而襲黼黻委臿築而據文軒後漢元載在中書有丈人來投載贈河北一書丈人至幽州拆視之更無一詞唯署名, WYG: 利徴}
