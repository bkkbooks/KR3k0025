  - {type: variant, offset: 2938, length: 0, content: '', krp: 使副簽書並罷惟存同知職源太平興國八年張司空齊賢王公沔並以諫議大夫同簽書樞宻院事退朝録簽書大抵以處資淺之人若簽書一經親祠方進同知及樞副若武臣擢預國政只除同簽書職源承㫖本朝熈寧五年以尚書比部員外郎曽孝寛充史館脩撰兼都承㫖文館兼領自孝寛始續㑹要劉安世作都承㫖待制范相純仁之出由安世草疏已而復拜吕相大防遂擬安世真定宣仁難之吕云劉安世曽言范純仁今既復用宜少避之宣仁曰今既不作言事官自不相妨言行録毎崇政殿臨决庶務則承㫖侍立殿前侍衛司奏事則承㫖受而讀之㑹要右府管天下之機務而承㫖左右參總焉除張誠一制陪輔帷幄以承宻㫖除劉奉臣制樞機之地親承宻㫖雖在副介亦湏得人檢詳本朝檢詳之職古無之國初熈寧四年詔以編脩經武要畧官四人王存陳侗陳奉世蘓液檢詳樞宻院諸房文字禮遇視中書檢正官元豐三年詔定置三員及改官制檢詳官尋罷續㑹要乾道二年詔樞宻檢詳係掌朝廷機要文字不許出謁賔客會要吕大忠檢詳樞宻院吏兵房文字令典義勇樞機大忠言養兵猥衆國用日匱漢之屯田唐之府兵善}
