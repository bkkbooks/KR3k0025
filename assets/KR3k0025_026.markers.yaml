  - {type: variant, offset: 1246, length: 0, content: '', WYG: 霖雨即閉坊門故里人呼坊門為宰相謂能節宣風雨天工人代乃是虛設宋務光傳唐自武德以來宰相寛厚以陸象先為標首詞翰以姚元崇為標首詞學以張説為標首决遣以張義正為標首通鑑唐紀太宗謂房𤣥齡曰公為僕射當廣朕耳目助訪賢才比閲訟牒}
