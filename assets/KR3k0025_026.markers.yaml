  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷二十六宋潘自牧撰職官部三公經節彼南山維石巖巖赫赫師尹民具爾瞻詩兹惟三公論道經邦燮理隂陽官不必備惟其人書春秋漢含孶曰舉三公象五岳史漢丙吉出逢牛喘吉問牛行幾里或以譏吉吉曰方春少陽用事恐有所傷害三公典調和隂陽職當憂漢書成帝時何武建言國之輔佐必得賢聖然猶天之三光備三公官各有分職宜建三公官百官志汲黯責𢎞位三公俸禄甚多然為布被此詐也上問𢎞𢎞謝曰有之夫以三公為布被誠餙詐以釣名漢書蕭望之言三公任非其人則三光為之不明今嵗首日月失光咎在臣等漢書晉諸葛恢為臨沂令名亞王導庾亮謂曰明府當作黒頭三公北史晉王戎雖位總鼎司而委事僚宷間乘小馬從便門而出逰見者不知為三公也本史三公叅議國家之大事置府僚隋百官志三公佐天子平邦國理隂陽無所不統唐百官志傳記三公崇號為上公東漢以後常曰上公初學記其後或置或廢大抵無所統職至後魏特稱三師以正其名正一品然非道德崇重不居其位無其人則闕之六典三公無官有人然後充之舜於堯伊尹之於湯周公召公之於周是也同上周成王立三公而六官不必備惟其人以書傳考之皆兼領六卿未嘗特置也同上三公之任鼎足承君不有建明固守無以居位馬官傳漢哀平間始尊師傅之位雖明天子必有所師法六典荀爽為三公食不過一肉惟脱粟飯荀悦漢記安帝朝陳忠上疏曰三公稱曰冢宰王者改容而禮在輿為下御坐為起入則參對而議政}
