  - {type: variant, offset: 1795, length: 12, content: 大悔怒欲回試謁院吏斯須請, WYG: 雖古名臣亦何以加親解佩刀以賜本傳唐蕭瑀復參預朝政帝曰武德季太上皇有廢立議瑀於爾時不以利怵死懼社稷臣也因賜詩曰疾風知勁草板蕩識忠臣又曰公守道耿介古無以過然善惡太明或有時而失瑀頓首謝曰既蒙教又許以忠亮雖死日猶生年也本傳魏徴與杜淹等以秘}
