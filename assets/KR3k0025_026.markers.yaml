  - {type: variant, offset: 10, length: 12, content: 飛荀子勸學虞氏者登高樓臨, WYG: 司徒蔬食甚無謂也特賜歆及妻男等衣服本傳集天監在下仁德是興乃立司徒治茲黎蒸人具爾瞻四方是維乾乾夕惕靡怠靡違司徒箴敬敷五教九德咸事嗇人用章黔甿是富同上本朝宋置司徒金章紫綬進賢三梁冠佩山𤣥玉掌治民事郊祀則省牲視滌濯}
