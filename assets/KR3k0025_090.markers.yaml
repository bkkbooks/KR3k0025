  - {type: variant, offset: 1430, length: 371, content: 軍衛不徹警也左宣十二互入防閑智者備禍於未形史趙世家夫積貯者天下之大命苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至通鑑堯有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也通鑑漢文紀絕其綿綿塞其涓涓東漢樂恢傳互入謹微防隄完全雖遭雨水霖潦不能為變通鑑顏真卿為平原守安祿山逆節頗著真卿以霖雨為託修城浚壕無幾祿山果反河朔盡陷獨平原城守具備唐書互入先見善治病者不使至危憊善救災者勿使至賑給故賑給少則不足活人活人多則闕國用國用闕則復重歛矣唐書劉晏傳傳記陶公作荊州敕船官使鋸木屑不限多少悉藏之時咸不解此意後正會值積雪會日始晴廳事前除雪地甚潤濕於是用木屑覆之都無所妨世說集服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煖者不憂至寒之悽愴何則有其具者易其備也王褒聖主得賢臣頌一歲之旱人斯具舟三月之熱人斯具裘劉賓客蓄穀者不病凶年蓄珠玉者不虞殍死柳文本朝, WYG: 新茶}
