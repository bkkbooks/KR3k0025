  - {type: variant, offset: 1848, length: 601, content: 年之蓄謂之不足無六年之積謂之閔急無三年之蓄謂之窮乏淮南子主術訓大寒而後索衣裘不亦晚乎楊子史不備不虞不可以師左傳隱公五年莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫左傳成九年城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢左昭五無備而言辦者猶拾瀋也汁也言不備而責辦不可治左哀二恥匹夫不可以無備況恥國乎左傳昭五物不素具不可以應卒史記秦世家公家無一年之蓄百姓無旬日之儲上下俱匱無以相救西漢谷永傳李左車曰千里餽糧士有飢色樵蘇後爨師不宿飽韓信傳集嘗思世人居平不讀一方病則委千金於庸夫之手劉賓客本朝國之用兵正如私家之造屋凡屋若干材石之費穀米為錢若干布筭而定無所嬴縮矣工徒入門斧斤之聲鏗然而百用毛起不可復計此慮不素定之過也既作而復聚糧既斲而復求材其費必倍其工必不堅東坡荅李琮書經遇其憂悔吝之時其介不可慢也注悔吝纖芥雖細不可慢易而不謹也怨豈在明不見是圖書五子之歌怨不在大書康誥念慮幾微以保其安書注相在爾室尚不愧于屋漏無曰不顯莫予云覯詩抑能謹微接下詩吉日聽於無聲視於無形記曲禮上禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也易曰君子謹始差若毫釐繆以千里記經解君子戒謹乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子謹其獨也知微之顯可與入德矣並記中庸子夫牆之壞必於隙劍之折必有齧聖人見之蚤故萬物莫能傷也淮南子君子微慎厥德悔吝不至楊子脩身智者識輕小之為善故謹微細之危劉子謹隙史無使滋蔓蔓難圖也左隱元君親無將將而誅焉公羊莊三, WYG: ''}
