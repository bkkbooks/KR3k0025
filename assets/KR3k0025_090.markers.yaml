  - {type: variant, offset: 67, length: 0, content: '', WYG: 長安衆富兒盤饌羅羶葷韓文本朝江南人好作盤遊飯鮓脯鱠炙無不埋下飯下諺曰掘得窖子羅浮穎老取凡飲食雜烹之類名谷薫羮陸道士作一聨云投醪薫谷羮鍋内掘窖遊盤飯椀中仇池筆記爛蒸桐州羔灌以杏酪食以匕不以筯南都撥心麫作槐芽温淘糝以襄邑抹猪炊共成香稻薦蒸鵝吳興厨人砭松江鱸魚鱠繼以康王谷水烹増坑鬬品茶焉解衣少卧使誦東坡赤壁賦足以一笑也志林唐人謂之饆飥今俗謂之餺飥晉束晢餅賦有饅頭薄持起溲牢久之號今起溲牢久皆莫曉為何物薄持荀氏謂之薄夜亦莫知其何物湯餅温麫也歸田錄一饌費千金百品羅成行六集玉食謝故吏風飱便逐臣東坡蔗漿酪粉金盤冷通印子魚猶帶骨披綿黄雀謾多脂剰與故人尋土物臘糟紅麴寄駝蹄今}
