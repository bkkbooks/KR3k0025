  - {type: variant, offset: 672, length: 17, content: 疑謬集賓接門下推舉人士侍側無虛日退, WYG: 處亦名鳯凰山龍焙泉即御泉也北苑造貢茶社前芽細如針用御水研造其色如乳乃至精也並同上南劍有濛頂石花湖州有顧渚紫筍峽州有碧澗明蔡寛夫詩話顧渚湧金泉每嵗造茶時太守先祭拜然後水漸出造貢茶畢水稍減至恭堂茶畢已減半矣太守茶畢遂涸同上茶之品莫貴於龍鳯團蔡君謨為福建運使始造小片龍茶其品絶精謂之小龍圑凡二十餘餅重一斤其價值金二兩然金可有}
