  - {type: variant, offset: 519, length: 0, content: '', WYG: 情親園蔬抱金玉並同上本朝秋風吹折碧削玉茹芳根應傍鵝池發中懐酒墨痕茭白分得蹲鴟種連根占地腴曉炊粘玉糝深椀啖模糊芋肉食嘲三九終憐氣韻清一畦春雨足翠髪剪還生韭漑釡熟輪囷香清味仍美一線解瓊瑶中有佳人齒瓠葉實抱芳辛氣烈銷煩滯登爼效微勞乍食驚頻􅅉芥周郎愛晩菘對客蒙稱賞今晨喜薦新小嚼冰雪嚮菘金鏇因形製臨畦發永歎時危思纈佩楚客莫紉蘭波稜新芽肌理膩映日浄如空拾似匀妝指柔尖帶淺紅子薑宻壤穿根蔕風霜亦飽經如何純白質近蔕染㣲青蘿蔔雖無適口味暖益功稀比菜苦不登盤言忠多逆耳苦薺並係劉屏山園蔬詠清朝薦蔬盤乳餅有真味不用精瓊靡無勞爛羊胃乳餅翛翛江上林白日暗風雨下有萬玉虯三冬卧寒土筍誰將紫芝苗種此槎上土便學商山翁風餐謝肥羜紫蕈薑云能損心此謗誰與雪請論去穢功神明看朝徹子薑寒茭翳秋塘風葉自長短刳心一飽餘并得牀敷軟茭筍黄龍記昔遊園客有佳遺不為洛生吟輟餐時擁鼻南荷小草有真性託根寒澗幽懦夫曽一嘬感憤不能休􅀈菜蔬腸久自安異味非所􅀈樹耳黒垂耼登盤今亦乍木耳紛敷剪翠叢津潤擢玉本寂寞並}
