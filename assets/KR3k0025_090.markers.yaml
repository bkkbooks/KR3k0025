  - {type: variant, offset: 71, length: 0, content: '', krp: 吳志陶淵明為彭澤令公田悉令種秫稻妻}
  - {type: variant, offset: 72, length: 0, content: '', WYG: 固請種粳乃使二百五十畆種秫五十畆種粳宋書齊劉懐惠為齊郡守人有餉新米一斛者懐惠出所食麥飯示之曰食有餘幸}
  - {type: variant, offset: 72, length: 0, content: '', krp: 固請種粳乃使二百五十畆種秫五十畆種粳宋書齊劉懐惠為齊郡守人有餉新米一斛者懐惠出所食麥飯示之曰食有餘幸}
  - {type: variant, offset: 73, length: 2, content: 敢自, WYG: 煩此南史梁張率為新安太守遣家僮載米三千石還宅及至遂耗其半率問其故答曰䑕雀耗率笑曰壯哉䑕雀竟不研問庾詵嘗乗舟從山舍還載米百五十石有人寄載三十石至宅寄載者曰君三十石我百五十石詵黙然不辨恣其取足沈絢少貧于宗黨得米數百斛為宗人所侮覆米而去並同上隋季士謙望見盜割其禾黍者黙而避之家僮執盜者士謙曰窮困所致也遂放之隋書陽城嘗遣奴求米奴以米易酒醉卧于路城與弟負之以歸及覺痛咎謝城曰寒而飲何害焉唐書傳記粢稷爾雅注云今江東人呼粟為粢衆秫衆一名秫謂粘粟也戎菽胡豆也虋赤苗今之赤梁粟芑白苗今之白梁粟秬黒黍黒黍一名秬黍秠一稃二米秠是黒黍之中一稃有二米者徐稻糯也並同上大豆菽也小豆荅也豆角謂之莢其葉謂之藿廣雅來小麥也牟大麥也同上禾之秀實者為稼一曰在野曰稼說文以大暑而種故謂之黍粟禾子也嘉穀實也粟之為言續也禾嘉穀也稷五穀之長也並同上稻之粘者為秫古今注禾之粘者為黍亦謂之穄亦曰黄黍同上西北曰蜜山多玉膏以灌丹禾山海經飯之美者𤣥山之禾吕氏春秋東華夫人設龍睛之稻廣記虎掌稻紫芒稻同上元和八年大軫國進碧麥紫米杜陽編杜甫在蜀日以七金買黄兒米半籃院花旋地志紫沈麻其實不沈有雲水麻實冷而光宜為油澤有光通麻食者行不待燭則巨勝也食之延夀拾遺大厯中日本國獻靈光豆大小類中華之菉豆其色殷紅而光芒可長數尺本國人亦謂之詰多珠和石上菖蒲葉煑之即大如鵝􅆑帝啖一丸歎其香美無比而數日不復言饑渇杜陽編有含露麥穗中有露甘如飴拾遺胡中有指星麥四月火星出穫麥而食之俗人呼為鷄鳴麥同上集稻梁穱麥挐黄梁些楚辭五穀六仭設菰梁只同上白露黄梁熟分張素有期已應舂得細頗覺寄來遲味豈同金菊香宜配綠葵老人他日愛正想滑流匙杜詩香稻三秋末平田百頃間喜無多屋宇幸不礙雲山御裌侵寒氣嘗新破旅顔紅鮮終日有玉粒未吾慳滑憶雕胡飯嘗稻雪翻匙崆峒小麥熟且願休王師細麥落輕花並同上種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸陶潛淅玉炊香粳韓文本朝今年秋應熟過從飽鷄黍東坡浮大甑常炊玉同上都城一飯炊白玉山谷菜經參差荇菜于以采蘩于沼于沚于以采蘋南澗之濵于以采藻于彼行潦采葑采菲誰謂荼苦其甘如薺其䔩維何維筍及蒲山有蕨薇隰有把荑思樂泮水薄采其芹並詩韭菹昌本菁菹茒菹葵菹芹菹深蒲菭菹筍菹仲秋命有司趣民務畜菜並記雖疏食菜羮𤓰祭必齊如也語子孔子窮於陳蔡之間顔囘擇菜徐無鬼見魏武侯武侯曰先生居山林食芋栗厭葱韭以賔寡人久矣夫並莊昔人有美戎菽甘枲莖芹萍子者對鄉豪}
