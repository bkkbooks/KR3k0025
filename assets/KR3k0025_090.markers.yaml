  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0025_CHANT_090-1a.3}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 需于酒食易有孚于飲酒濡其首未濟若作酒醴爾惟麴蘖書厥父母慶自洗腆致用酒不腆于酒罔敢湎于酒矧汝剛制于酒並同上微我無酒以遨以遊詩子有酒食何不日鼔瑟為此春酒以介眉夀朋酒斯饗我有㫖酒嘉賔式燕以敖以宴樂嘉賔之心釃酒有藇釃酒有衍有酒醑我無酒沽我君子有酒㫖且多君子有酒嘉賔式燕以樂嘉賔式燕以衎嘉賔式燕綏之嘉賔式燕又思酒旣和止飲酒孔偕飲酒孔嘉維其令儀凡此飲酒或醉或否旣立之監或佐之史王在在鎬}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_090-1b, image: WYG0932/WYG0932-0644d.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 需于酒食易有孚于飲酒濡其首未濟若作酒醴爾惟麴蘖書厥父母慶自洗腆致用酒不腆于酒罔敢湎于酒矧汝剛制于酒並同上微我無酒以遨以遊詩子有酒食何不日鼔瑟為此春酒以介眉夀朋酒斯饗我有㫖酒嘉賔式燕以敖以宴樂嘉賔之心釃酒有藇釃酒有衍有酒醑我無酒沽我君子有酒㫖且多君子有酒嘉賔式燕以樂嘉賔式燕以衎嘉賔式燕綏之嘉賔式燕又思酒旣和止飲酒孔偕飲酒孔嘉維其令儀凡此飲酒或醉或否旣立之監或佐之史王在在鎬}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 樂飲酒君子有酒酌言獻之酌言酢之酌言醻之或獻或酢洗爵奠斝曾孫維主酒醴維醹酌以大斗以祈黄耉旣醉以酒旣飽以德清酒百壺旣飲㫖酒永錫難老並詩酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰漿四曰酏周禮夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮壹獻之禮賔主百拜終日飲酒而}
  - {type: page-break, offset: 4, content: '', id: KR3k0025_WYG_090-2a, image: WYG0932/WYG0932-0645a.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 樂飲酒君子有酒酌言獻之酌言酢之酌言醻之或獻或酢洗爵奠斝曾孫維主酒醴維醹酌以大斗以祈黄耉旣醉以酒旣飽以德清酒百壺旣飲㫖酒永錫難老並詩酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰漿四曰酏周禮夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮壹獻之禮賔主百拜終日飲酒而}
  - {type: variant, offset: 5, length: 1, content: 夙, WYG: 得醉焉此先王之所以備酒禍也禮記酒者所以養老也所以養病也射義奉酒醴以告曰嘉栗㫖酒左傳有酒如淮有酒如澠酒以成禮不繼以淫並同上不為酒困唯酒無量不及亂並語子禹惡㫖酒而好善言孟日昃不飲酒酒必酸賔主百拜而酒三行不已華乎揚室酒不絶文中公孫朝好酒聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻列魯趙皆獻酒于楚王主酒吏求酒於趙不獲乃以趙厚酒易魯薄酒奏之楚王以趙酒薄遂圍邯鄲淮南史禹時儀狄作酒禹飲而甘之遂疏儀狄絶㫖酒通鑑外紀大宛有蒲萄酒史貨殖傳魯正曰酒者天之美祿帝王所以順養天下前食貨志酒百藥之長嘉會之好同上齊威王問淳于髠曰先生能飲幾何而醉對曰臣能一斗亦醉一石亦醉王問故髠曰賜酒大王之前執法在前御史在後不過一斗隨醉矣若乃履舄交錯杯盤狼籍堂上燭盛主人留髠而送客當此時髠心最懽能飲一石史記曹參為相國日}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_090-2b, image: WYG0932/WYG0932-0645b.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_090-3a, image: WYG0932/WYG0932-0645c.png}
  - {type: variant, offset: 5, length: 1, content: 夙, krp: 得醉焉此先王之所以備酒禍也禮記酒者所以養老也所以養病也射義奉酒醴以告曰嘉栗㫖酒左傳有酒如淮有酒如澠酒以成禮不繼以淫並同上不為酒困唯酒無量不及亂並語子禹惡㫖酒而好善言孟日昃不飲酒酒必酸賔主百拜而酒三行不已華乎揚室酒不絶文中公孫朝好酒聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻列魯趙皆獻酒于楚王主酒吏求酒於趙不獲乃以趙厚酒易魯薄酒奏之楚王以趙酒薄遂圍邯鄲淮南史禹時儀狄作酒禹飲而甘之遂疏儀狄絶㫖酒通鑑外紀大宛有蒲萄酒史貨殖傳魯正曰酒者天之美祿帝王所以順養天下前食貨志酒百藥之長嘉會之好同上齊威王問淳于髠曰先生能飲幾何而醉對曰臣能一斗亦醉一石亦醉王問故髠曰賜酒大王之前執法在前御史在後不過一斗隨醉矣若乃履舄交錯杯盤狼籍堂上燭盛主人留髠而送客當此時髠心最懽能飲一石史記曹參為相國日}
