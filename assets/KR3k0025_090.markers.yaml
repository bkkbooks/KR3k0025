  - {type: variant, offset: 297, length: 8, content: 祐隨從到官恢欲殺, krp: 山中老人以㹠酒饋之信乃自出酒以鐵鐺温之素木盤盛蕪菁菹而已北史邢峙以經入侍皇太子厨宰進菜有邪蒿峙令去之曰此菜有不正之名非殿下所宜食同上傳記晉咸寧中芳圃於金墉城多種異菜名曰雲薇又曰雲芝其種有三謂之三蔬其香歴月不歇拾遺始皇遣徐福入海求金菜玉蔬金樓子合觀菜每節四葉相對夜合晝開番禺雜記東華夫人設黒河菜廣記唐太宗時健達獻佛土菜一莖五葉花赤心中正黄而蘂紫色類要宋宇種蔬三十品時雨之後案行園圃曰天茁此徒助于鼎爼豫章記諸葛亮所止令兵士獨種蔓菁菜今三蜀人呼為諸菜江陵亦然嘉話錄掌中芥出末多國取子置掌中吹之一吹一長三尺乃植於地雜爼馬自然見一家好菘菜求之不得於是取筆畫一白鷺飛入菜畦中啄菜又畫一猧子走捍捉白鷺共踐其菜廣記韮一剪一加糞一嵗之中不過五剪鷄跖集五光七曰靈蔬者薤也十籖姚興𢎞始三年逍遥園葱變為茞以為美瑞謂智人應入五月鳩摩羅什入關廣記渾提葱其狀猶葱而甘辛類要菜之波稜者西國中有僧自彼將其子來本是頗陵國將來語訛耳嘉話錄劉崇龜以清儉自居嘗召同列食苦蕒北夢瑣言菜之美者有雲夢之芹吕氏春秋段成式食茄子偶問張周封茄子故事張云一名落蘇事具食療本草成式記得隠侯行園詩云寒𤓰方卧壟秋苽正滿陂紫茄紛爛漫綠樹鬱參差又一名崑崙𤓰雜爼宋𤣥曰食彘肉以蒜虀一盆喫畢飲酒二斗人有求得其一片蒜食之有如異香終日在齒舌間香不歇廣記南越志云石蓴似紫菜泮水詩云采其茒鳬葵也疏云江南謂之蓴菜或謂之水葵又名水芹鷄跖集蓴根羮之絶美江東謂之蓴龜雜俎蓴至冬為猪蓴又云龜蓴又云七八月以前曰絲蓴秋末初曰瑰蓴本草四月蓴生莖而未葉名雉尾蓴鷄跖集猿啼之地厥乃多有每啼一聲遞生萬莖窮幽記王鯨逢賣蕨姥黄衣破結鯨憫之乃以千錢買蕨姥謝而去及歸蒸于烏頭甑盡成金釵清異志魯漆室之女曰昔客舍我繫馬跌殘余葵使余經嵗不飽葵列女傳苦菜河北謂之龍葵顔氏家訓李華燒三城絶品炭以龍腦褁芋魁煨之擊爐曰芋魁遭遇矣三賢典語集紫菜熒曄以叢被綠苔鬖髿乎研上文選菜則葱韭蒜芋}
