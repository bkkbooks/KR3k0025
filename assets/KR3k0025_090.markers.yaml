  - {type: variant, offset: 654, length: 1, content: 下, krp: 覺林僧志崇收茶三等待客以驚雷莢自奉以萱草帶供佛以紫茸香赴茶者以油囊盛餘瀝歸蠻甌志白樂天訪}
  - {type: variant, offset: 656, length: 2, content: 孝標, WYG: 禹錫正病酒禹錫乃饋菊苗虀蘆服鮓換取樂天六班茶二囊以自醒酒同上同昌公主上每賜饌其茶則有綠華紫英之號杜陽編江左有蠟面之號李氏别命其乳作片或號曰京挺的乳二十餘品名乳蠟面龍鳯茶等又有研膏茶即龍品也談苑蜀雅州濛嶺産茶最佳其常在春夏之交方茶生常有雲霧覆其上若有神物䕶持云圖經集山石東吳秀茶稱瑞草魁杜詩楚老卷綠葉枝枝相接連曝成仙人掌似拍洪崖肩李白芳叢翳湘竹零露凝清華復此雪山客晨朝掇露芽蒸煙俯名瀨咫尺凌丹崖圓方麗其色圭玉無纖瑕呼兒㸑金鼎餘馥延幽遐滌慮發其照還源蕩昏邪猶同甘露飯佛事薫毗耶咄此蓬瀛客無為貴流霞栁文聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羨茶百草不敢先開花仁風暗結珠琲瓃先春抽出黄金芽盧仝嫩芽香且靈吾謂草中英夜臼和煙𢷬寒爐對雪烹鄭愚本朝顧况論茶云煎以文火細煙又以小鼎長泉蔡君謨茶錄謝宗論茶云候蟾背之芳香觀蝦目之沸湧建人謂鬬茶為茗戰建安鬬茶以水痕先退者為負耐久者為勝故較勝負之說相去一水兩水耳並同上爾雅云苦茶}
