  - {type: variant, offset: 134, length: 161, content: 人臣者無外交不敢貳君也記郊特牲子魯有獨處室者鄰之嫠婦亦獨處室夜暴風雨室壞趍而託之魯人閉門不受家語史衛青為大將軍尊寵不敢自擅專誅於境外西漢本傳父子之間人所難言也前漢車千秋傳互見嫌疑孫會宗與楊惲書曰大臣廢退當闔門惶懼為可憐之意不當治產業通賓客有稱譽西漢楊惲傳闔門高枕為知者首西漢谷永傳既還私第闔門養威重通鑑漢光紀吳祐父恢為南海, WYG: 趙平}
