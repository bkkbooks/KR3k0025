  - {type: variant, offset: 767, length: 516, content: 則退不敢略省漫不知何事韓文藍田記京城人多言足下家有積貨士之好廉名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多嫌也一出口則嗤嗤者以為得重賂柳文與王參元失火書史絳侯周勃既就國每河東守尉行縣至絳勃自畏恐誅常被甲令家人持兵以見之其後人有上書告勃欲反下廷尉通鑑漢文紀田蚡為相薦人或起家至二千石權移主上上曰君除吏盡未吾亦欲除吏漢竇嬰傳衛青曰自魏其武安之厚賓客天子常切齒西漢本贊楊惲免為庶人家居治產業起室宅以財自娛其友人孫會宗戒之為言大臣廢退當闔門惶懼為可憐之意西漢本傳經水在火上既濟君子以思患而預防之易既濟重關擊柝以待暴客蓋取諸豫易繫辭君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易繫辭互入遠慮惟事事乃其有備有備無患書說命中迨天之未陰雨徹彼桑土綢繆牖戶詩鴟鴞三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢民無菜色記王制其備豫有如此者記儒行凡事豫則立不豫則廢記中庸子孔子曰有文事必有武備有武事必有文備家語圖難於其易為大於其細老子強本而節用則天不能貧養備而動時則天不能病故水旱不能使之飢渴寒暑不能使之疾祅怪不能使之凶荀子天論先患慮患謂之豫豫則禍不生荀子大略事無備則廢是以聖王務其大備管子霸言夫, WYG: ''}
