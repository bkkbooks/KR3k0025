  - {type: variant, offset: 2450, length: 891, content: 二紂始為象箸箕子歎曰彼為象箸必為玉杯為杯則必思遠方珍怪之物輿馬宮室之漸自此始不可振也史宋世家明者遠見於未萌而知者避危於無形禍固多藏於隱微而發於人之所忽者也通鑑漢武紀春秋之義君親無將將而必誅通鑑漢明紀凡患生於所忽禍發於細微後漢馮衍傳輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒明者謹微智者識淺東漢陳忠傳絕其綿綿塞其涓涓東漢樂恢傳互入豫備政令猶汗往而不反東漢胡廣傳君子推微達著尋端見緒履霜知冰踐露知暑後漢蔡邕傳喜怒怨愛禍福所因可不謹歟東漢孔融傳當及其根柢未深而撲取之此救火貴速之勢也通監魏文紀互入投機百尋之屋突直而燎樊千里之堤蟻垤而穿敗古人防小以全大謹微以杜萌晉書陳頵傳魏證上言比者弟子陵師奴婢忽主下多輕上皆有為而然漸不可長通鑑唐太宗褚遂良曰諫臣必諫其漸及其蒲盈無所復諫唐書沛王賢聞王勃善屬文召為修撰時諸王鬭雞勃戲為檄周王雞文上見之怒曰此乃交構之漸斥勃出沛府通鑑唐高宗互入遠慮小者大之漸微者著之萌故君子謹初聖人存戒唐書陸贄傳隙不在大唐書柳公綽傳傳記諺曰教婦初來教兒嬰孩顏氏家訓狐鼠微物亦蠹大猷選彈文經由辯之不早辯也易坤卦小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可揜罪大而不可解易繫辭差若毫釐繆以千里記經解子子曰蒼梧嬈娶妻而美讓其兄矣然非禮之讓也不謹其初而悔其後何嗟及矣家語六本篇焰焰不滅炎炎若何涓涓不壅終為江河綿綿不絕或成網羅毫末不札將尋斧柯家語涓涓源水不壅不塞轂既破碎乃大其輻事以敗矣乃重歎息其亡益乎荀子木之折也必通蠹牆之壞也必通隙韓非子亡徵史為虺弗摧為蛇將若何國語綿綿不絕蔓蔓柰何毫釐不伐將用斧柯史蘇秦傳盜賊始發其源甚微部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通鑑漢平紀互入欺罔高恭之曰養虺成蛇悔無及矣北史本傳上初苦風眩頭重目不能視百司奏事上或使皇后決之后性敏涉獵文史處事皆稱旨由是始委以政事權與人主侔矣通鑑唐高宗紀集涓涓不遏終變桑田燄燄靡除卒燎原野陸贄奏議毫釐之差或致弊於寰海晷刻之誤或遺忘於歷年韓愈為宰相表本朝白起發一疑心坑虎士如蟣蝨石崇發一快心截蛾眉如芻俑李斯發一忍心橫屍四海楊國忠發一疾心激禍百年其端甚微其流甚廣鳴道集卵𪆪不除使成羽翼續世說十二, WYG: ''}
