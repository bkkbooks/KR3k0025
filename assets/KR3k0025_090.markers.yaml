  - {type: variant, offset: 68, length: 0, content: '', WYG: 坐致五侯鯖盡是猩唇與熊白並同上糓經黍稷非馨明德維馨書稷降播種農殖嘉穀吕刑黍稷稻梁農夫之慶誕降嘉種維秬維秠維糜維芑稼穡維寶代食維好貽我來牟帝命率育降之百福黍稷重穋稙穉菽麥有稷有黍有稻有秬並詩三農生九穀注云稷秫黍稻麻大小豆大小麥食用六穀注云稻黍稷梁麥􅋎菽麥蕡稻黍梁秫唯所欲孟夏農乃登麥仲夏農乃登黍孟秋農乃登穀仲秋以犬嘗麻季秋以犬嘗稻並記子不違農時穀不可勝食也孟大庭氏號曰神農播穀因苗以為教管神農氏之治天下也甘雨以時五穀蕃殖淮南吾欲取天地之精以佐五穀莊莊周家貧故徃貸粟於監河侯同上得時之禾長秱大穗圜粟而薄穅米粘而香舂之易而食之强亢倉子得時之稻莖葆長穗穗如馬尾同上史武王伐紂伯夷叔齊叩馬諫武王平殷亂伯夷叔齊恥之不食周粟而餓死史記武帝太倉之粟陳陳相因充溢露積于外腐敗不可食末年悔征伐之事下詔以趙過為搜粟都尉漢書吳全琮父柔為桂陽守使琮齎米數千斛至吳交易琮皆賑給士}
