  - {type: variant, offset: 10, length: 0, content: '', krp: 南史賀知章見李太白呼為謫仙人因解金龜換酒為樂唐李白傳王績待詔門下省官給酒日三升或問何樂答曰美醖三升差可戀耳陳叔達聞之日給一斗稱一斗學士嘗著醉鄉記本傳德宗即位劒南貢生春酒本紀憲宗遣使者賜李絳酴醿酒李絳傳于闐以蒲萄為酒又有紫酒青酒味尤美五代史傳記酒為歡伯除憂來樂焦贑易林晉劉白墮能釀酒暴於日中經旬不變又謂之擒奸酒有毛鴻賔逢盜以酒飲之即醉皆被擒語曰不畏張弓挾矢唯畏白墮春醪洛陽伽藍記蘭生漢武帝百味㫖酒名玉薤隋煬帝酒名異人錄魏左相能治酒其名有醽醁翠濤太宗嘗賜詩曰醽醁勝蘭生翠濤過玉薤千日醉不醒十年味不敗同上暑月候雷霆時收雨水淘米炊飯釀酒名曰霹靂酒醉郷日月凡酒以色清味重者為聖色如金而醇苦者為賢墨色酸醨者為愚以家醪糯釀醉人者為君子以家醪黍釀醉人者為中人以巷醪黍釀醉人者為下人凡醉有所宜醉花宜晝襲其光也醉雪宜夜消其潔也醉樓宜暑資其清也醉水宜秋泛其爽也凡飲以一人為明府主斟酌之宜酒懦為曠官謂冷也酒猛為苛政謂熱也以一人為錄事以糾坐人須擇有酒材者飲器大者曰武小者曰文並同上桓温有主簿善别酒好者為青州從事惡者為平原督郵注云青州有齊郡從事謂到臍下也平原有革縣督郵言在鬲上住也世說廬山有桑落洲多美酒同上索郎酒桑落時美因以為名續古今注滎陽之土窟春富平之石梁春酒色也國史補酒有京城之郎官清同上劉袚命酒為玉友仍為作傳百家詩序烏孫國有青核大如六升瓢貯水俄而成酒名青田壺酒曰青田酒古今注頓逢國有樹似石榴採其花汁停瓮中數日成酒甘美通典房夀六月𢷬蓮花製碧芳酒叩頭錄滄州出菖蒲花桃花酒飲之神氣清爽南昌國酒山有泉其味如酒飲之經月不醒魏賈捋有奴常乗舟於黄河中流接河源水以釀酒名崑崙芳味絶妙互見水類劉𤣥石從中山沽酒酒家與之千日酒至家而死以棺斂葬之酒家計千日滿憶𤣥石醒矣徃視之其家云死已三年於是開棺醉始醒博物志葉法善與朝士會忽有一人叩門自稱麴生秀才言語不凡葉疑其非人飛劍擊之應手墮地乃一酒榼中有美醖飲之同坐曰麴生風味不可忘也開元傳信汝陽王飲葉静能静能曰有一生能欽當令來謁翊日有通謁者曰進士常持滿飲以酒五斗而醉倒乃一瓮耳何東記集奠桂酒兮椒漿楚辭四酎并孰不歰嗌只清馨凍飲不歠役只吳醴白糵和楚瀝只瑶漿蜜勺實羽觴些挫糟凍飲酎清涼些華酌旣陳有瓊漿些並同上天垂酒星之曜地列酒泉之郡堯不千鍾無以見太平孔非百斛無以堪上聖樊噲解厄鴻門非鍾酒無以奮其怒趙之厮養東迎其主非巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪無以脫其命定國非酣飲壹斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔糟啜醨取困於楚由是觀之酒何負於政哉孔融與曹操書捧罌承槽銜盃潄醪奮鬛箕踞枕麴藉糟無思無慮其樂陶陶劉伶酒徳頌三杯通大道五斗合自然但得酒中趣勿為醒者傳李白蘭陵美酒鬱金香玉椀盛來琥珀光蟹螯即金液糟丘是蓬萊蒲萄酒金叵羅吳姬十五細馬駞遥看漢水鴨頭綠恰似蒲萄初潑醅此江若變作春酒壘麴便作糟丘臺並同上琉璃鍾琥珀濃小槽酒滴真珠紅李賀麴神寅日合酒聖夘時歡白樂天何不飲美酒胡然自悲嗟俗號銷憂藥神速無以加一杯驅世慮兩杯反天和三杯即酩酊或笑任狂歌同上得錢即相覔沽酒不復疑忘形到爾汝痛飲真吾師杜詩春酒杯濃琥珀薄冰漿椀碧瑪瑙寒無人竭浮蟻有待至昏鴉並同上酒味旣冷冽酒氣又氤氲性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛長安衆富兒盤饌羅羶葷不解文字飲唯能醉紅裙韓文本朝頻頻到口微成醉拍拍滿懐都是春醺酣情味難名狀醖釀工夫莫指陳斟有淺深存燮理飲無多少寄經綸邵康節上樽白日㵼黄封坡詩注云都下以黄封酒為貴蓋重内醖也典衣剰買河源水屈指新篘作上元老怯香泉灧寶樽花前白酒傾雲液龍根為脯玉為漿下界寒醅亦謾嘗未能頳我頰良復濡子唇飲中真味老更濃醉裏狂言真可怕應傾半熟鵝黄酒照見新晴碧水天曉日著顔紅有暈春風入髓散無聲春杯浮竹葉時復中之徐邈聖毋多酌我次公狂萬斛羈愁都似雪一壺春酒若為湯真珠為漿玉為醴白酒潑春瓮並同上酒面潑醅浮大白六一集瓮面浮蛆潑已香同上饌經炰鼈膾鯉詩肴核維旅雖無嘉肴式食庶幾有兔斯首燔之炙之或燔或炙嘉殽脾臄爾殽旣嘉爾殽旣馨燔炙芬芬其肴維何炰鼈鮮魚並詩珍用八物注云淳熬淳毋炮豚炮牂𢷬珍漬熬肝膋也狼去腸狗去腎狸去正脊兔去尻狐去首豚去腦魚去乙鼈去醜肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟鷄野豕為軒兔為宛脾並記子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑左傳宰夫胹熊膰不熟殺之同上膾不厭細魚餒而肉敗不食有盛饌必變色而作並語子至於味天下期於易牙耆秦人之炙無以異於耆吾炙魚我所欲也熊掌亦我所欲也並孟史晉元帝始鎮建業公私窘罄每得一㹠以為珍膳項上一臠尤美輒以薦帝于時呼中禁臠故王珣呼謝鯤為禁臠晉書何曽性豪侈蒸餅上不作十字不食一食萬錢猶曰無下箸處王愷有牛名八百里王武子與射賭得趣左右探心作炙一啖而去並同上傳記江南人善作膾名郎官膾因張翰思膾得名每物異名記南人魚膾以細縷金橙拌之號為金虀玉膾隋時吳郡獻松江鱸鱠煬帝曰東南佳味也隋唐嘉話漢婁君卿遊五侯之門每旦五侯饋餉之君卿乃合五侯所餉為鯖鯖與􅙰同音征蓋煎和之名廣記將軍曲良翰作駝峯炙甚美雜爼蓴龜羮之絶美江南謂之一蓴龜飲食有杏炙龜炙安祿山寵愛莫比其所賜品目有馬駱野猪鮓南孝亷善作鱠縠薄絲縷輕作吹起並同上王逺至蔡經家設麟肉脯神仙傳謝𤣥卿遇神仙設素麟脂斑螭髓續神仙傳有人遺張華鮓華曰此龍肉也遂以苦酒沃之鮓中有五色光世說晉人飲食中有寒具者乃今環餅也鷄跖集駱賔王謂盛饌為炊金饌玉拾遺唐御厨進饌有九飣盤明皇雜錄李林甫壻鄭平鬢斑林甫曰上明日賜甘}
