  - {type: 'tls:seg', offset: 7, content: '', id: KR3k0025_CHANT_090-1a.4}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 飲酒賔客見參不事事皆欲有言參輒飲以醇酒醉而後去終莫得開說漢書武帝初𣙜酒酤昭帝罷酒酤買酒升四錢司馬相如與文君俱之臨卭賣酒舍乃令文君當罏相如自滌器於市中並同上徐邈為尚書郎私飲沈醉校尉趙達問曹事邈曰中聖人達白之太祖太祖甚怒鮮于輔曰醉客}
  - {type: page-break, offset: 7, content: '', id: KR3k0025_WYG_090-3b, image: WYG0932/WYG0932-0645d.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 飲酒賔客見參不事事皆欲有言參輒飲以醇酒醉而後去終莫得開說漢書武帝初𣙜酒酤昭帝罷酒酤買酒升四錢司馬相如與文君俱之臨卭賣酒舍乃令文君當罏相如自滌器於市中並同上徐邈為尚書郎私飲沈醉校尉趙達問曹事邈曰中聖人達白之太祖太祖甚怒鮮于輔曰醉客}
  - {type: variant, offset: 8, length: 1, content: 行, WYG: 酒清者為聖人濁者為賢人邈性修謹偶醉言耳後文帝問邈曰頗復中聖人不對曰臣不能自懲時復中之魏志晉孫季舒與石崇酣飲慢遊過度崇欲表免之裴楷曰足下飲人狂藥責人正禮不亦乖乎晉裴楷傳陶潛逢酒熟取頭上葛巾漉之畢還復著之本傳畢卓嘗曰得酒滿數百斛船四時美味置兩頭右手持酒盃左手持蟹螯便足了一生矣本傳嵇康醉倒如玉山之將頽本傳劉伶曰天生劉伶以酒為名一飲一石五斗解醒本傳山濤飲酒至八斗方醉帝欲試之乃以酒八斗飲濤宻益其酒濤極本量而止本傳阮孚以金貂換酒為所司彈劾帝宥之本傳陳睻嗜酒與兄子秀曰江諮議有言酒猶兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉速營糟丘吾將老焉南史本傳周伯仁渡江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為}
  - {type: page-break, offset: 8, content: '', id: KR3k0025_WYG_090-4a, image: WYG0932/WYG0932-0646a.png}
