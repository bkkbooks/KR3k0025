  - {type: variant, offset: 11, length: 2, content: 詩行, WYG: 羮鄭郎食之能烏髪食之果然同上明皇命射鹿取血煎鹿腸食之謂之熱洛河盧氏雜錄盧懐慎為相清儉召客食曰爛蒸去毛莫拗折項疑為鵞鴨已而下粟米飯一器及盛葫蘆一枚同上侯思止食籠餅必令縮葱如肉號縮葱侍郎籠餅即今饅頭也僉載懿宗迎佛骨入内道塲薦瓊膏乳訶陵國所獻也杜陽編同昌公主上賜御饌有龍虬脯同上宣宗賜韋澳孫宏銀餅餤食之甚美皆乳酪膏腴之所為摭言栁公權以隔風紗作龍城記及八朝名品號錦様書以進上方御剪刀麫月兒羮即命分賜公權雲仙散錄洛陽人家七夕裝同心膾同上房州六月調羊酪造含風鮓叩頭錄王晉飯酒非鴨肝猪肚筋輒不舉醉仙圖集蕙肴烝兮蘭藉楚辭肥牛之腱臑若芳些和酸若苦陳吳羮些臑鼈炮羔有柘漿些鶴酸臇鳬煎鴻鶬些}
