  - {type: variant, offset: 35, length: 0, content: '', WYG: 軍直馳入將已下送迎已而之細栁不得入使使持節入帝曰此真將軍耳灞上棘門軍若兒戱耳其將固可襲而虜也史周勃世家王蠋布衣義不北靣於燕况在位食禄者乎史田單傳後張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓謁大將軍光問千秋戰鬬方畧山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才漢書魏明帝使后弟毛曾與夏侯𤣥共坐時}
