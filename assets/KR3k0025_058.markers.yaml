  - {type: variant, offset: 1733, length: 388, content: 欺蔽唐書李德裕傳互見朋比德宗謂李勉曰眾謂盧杞姦邪朕固不知勉曰天下皆知而陛下不知此所以為姦邪也同上李勉傳黃門侍郎裴矩知必將有亂雖廝役皆厚遇之及亂作賊皆曰非裴黃門之罪故得免通鑑唐祖其姦足以亡隋其智足以佐唐姦人多才能與時而成敗也唐書封倫裴矩贊牛僧孺曰帝王立法束縛姦邪同上傳記曹操習噉野葛多飲酖酒博物志魏武曹操常云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者集大姦者材必有過於眾而能自媚於上王符論大則有鯨有鯢小則為梟為獍非玉燭之能調豈璿璣之能正庾信蛛絲小人態曲綴瓜果中杜甫掩人以自售近名以冒進欺謾於言說沓合於求取狎比其瑣細媒孽其僚友矯激以賣直詀讘以取容劉賓客以曲為形以邪為質以仁為凶以僣為吉以諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬭為安佚譖下謾上恒其心術妬人之能幸人之失柳文罵尸蟲包藏禍心素懷梟獍之性彰露凶德思發豺狼之聲, WYG: 妨}
