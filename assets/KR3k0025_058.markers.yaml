  - {type: 'tls:seg', offset: 2, content: '', id: KR3k0025_CHANT_058-1a.2}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 若在必能制主上東行就使東行必不傾危矣通鑑三國王獻之兄弟自郄超未亡見愔常躡履問訊甚脩舅甥之禮及超死見愔慢怠屐而候之愔每慨然曰使嘉賔不死鼠子敢爾耶晉書郄超傳愔超父也互入炎凉宋文帝曰檀道濟若在豈使胡馬至此通鑑宋紀呉已平羣臣上夀帝執爵流涕曰此羊太傅之功也同上晉武太康元年突厥圍鴈門煬帝歎曰向使長孫晟在不令匈奴至此隋書劉行本太子少庶子太子勇虛襟敬憚後卒及太子廢上曰劉行本在勇當不及於此元嵓為蜀王長史後王漸以非法得罪上曰元嵓若在吾兒豈有是乎同上張九齡奏安禄山有逆相請因罪戮之上放歸九齡既死上皇在蜀思九齡之先覺詔哀贈唐書征髙麗班師上以不能成功深悔之歎曰魏徵若在不使我有是行也命馳驛祀徵以少牢復立製碑召其妻子詣行在勞賜之通鑑唐太宗刑部郎中闕上曰朕得其人矣往者李道裕議張亮獄云反形未具此言當矣朕雖不從至今悔之遂以道裕為刑部郎中同上李沆先識丁謂之奸及謂用事排擠正人王旦嘆曰李文靖真聖人本傳傳記祭遵死後每朝㑹上常歎曰安得奉公憂國如祭征虜者東觀漢紀集霖雨思賢佐丹青憶老臣杜詩因詠霜雪句永懐鸞鶴姿白樂天徽績空存書旗常而播美音容不見聽鼙鼔以增思同上聞鼓鼙而憶名將鑒丹青而思老臣李文饒湘竹舊班思帝子江蘺初緑哀騷人劉長卿本朝韓魏公死士大夫歎曰天何不為我留歐陽公為魏公作誌文而後死也韓魏公别錄盧仝韓愈不在此彈壓百怪無雄文歐公集因難見人}
