  - {type: variant, offset: 139, length: 4, content: 難於其君, WYG: 雲王褒頌南風至則黄鍾應融風動而魚上氷後蔡邕傳威蒸在野野集仁獸後漢應龍之翔雲霧滃然而從震風薄怒萬竅不約而號物有自然相動耳唐裴寂贊影之像形響之赴聲動而相隨各以類應唐書傳記呉牛見月而喘世説蛤蟹珠龜與月盛衰㑹稽先賢傳蚌蛤龜珠與月盛衰月}
