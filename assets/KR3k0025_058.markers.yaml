  - {type: variant, offset: 124, length: 2, content: 孔父, WYG: 齊桓公復㑹諸侯於葵丘益有驕色諸侯頗有叛者史齊世家口雖未言聲疾雷震令雖未行化馳如神史記漢女居東海養姑姑女讒之於姑姑經太守訴而殺之五月下雪漢書東海有孝婦少寡無子養姑甚謹姑死姑之女告吏婦殺我母吏捕孝婦自誣服太守竟殺婦郡中枯旱三年漢書上自初即位詔選天下文學材智之士待以不次之位四方士多上書言得失自衒鬻者以千數通鑑漢武紀猶桴鼓之相應前漢李㝷傳宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舎西漢杜欽傳呉王好劍客百姓多瘡瘢楚王好細腰宫中多餓死同上匡衡傳朝有變色之言則下有爭鬬之患上有自專之士則下有不遜之人上有克勝之任則下有傷患之心上有好利之臣則下有盜竊之民周南召南被聖賢之化深故篤於行而亷於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好滛巫而民滛祀晉侯好儉而民蓄聚太王躬仁邠國貴恕由此觀之治天下者審所上而已同上善惡之報各如其事西漢梅福傳車駕自幸洛陽獄錄囚徒理出千餘人時天旱大雨通鑑為善者天報之以福為非者天報之以殃西漢景帝紀下之應上猶景嚮也西漢}
