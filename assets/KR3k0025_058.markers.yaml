  - {type: variant, offset: 133, length: 0, content: '', krp: 正同上鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章記學記無本不立無文不行禮器子無君子莫治野人無野}
  - {type: variant, offset: 135, length: 2, content: 敢過, WYG: 養君子孟滕文公上以粟易械器者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉同上勞心者治人勞力者治於人治於人者食人治人者食於人同上金石有聲不考不鳴莊子有刀者礲諸有玉者錯諸楊季行烏號之弓谿子之弩不能無弦而發越舲蜀航不能無水而浮淮南子史陽不得隂之職亦不能獨成嵗終前漢董仲舒䇿水火相濟鹽梅相成唐王義方傳傳記干將莫耶非得人力則不能割堅箭利金不得𤣥機之利則不能逺戰國䇿龍非風不舉龜非天不兆曽子集塤箎相須選雲龍之所能使為靈也然龍弗得雲無以神其靈矣韓文襍説經非權則泥權非經則悖栁斷刑物類相感經同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也易鳴鶴在隂其子和之易召雲者龍命吕者律易命宮而商應同上有豕白蹢烝渉波矣詩喓喓草蟲趯趯阜螽以燧取明火於日以鑒取明水於月周禮天降時雨山川出雲記孔子閒居方以類聚樂記子陽燧見日則然為火莊子鄭師文學琴於師襄當春而叩商絃以召南宫凉風緫至草木成實及秋而叩角絃以激夾鍾溫風徐廻草木發榮當夏而叩羽絃以召黄鍾霜雪交下川池暴沍及冬而叩徵絃以激􅅋賓陽光熾烈堅氷立散將終命宫而總四絃則景風翔慶雲浮甘露降醴泉涌外湯問施薪若一火就燥也平地若一水就濕也草木疇生禽獸羣焉物各從其類也荀子天之且雨也隂曀未集而魚已噞矣山雲蒸柱礎淮南子抱薪加火燥者必先然平地注水偏者必先濡鄧子史蟋蟀俟秋唫蜉蝣出以隂虎嘯而風冽龍興}
