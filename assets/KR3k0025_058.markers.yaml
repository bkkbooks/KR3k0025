  - {type: variant, offset: 16, length: 0, content: '', WYG: 忍負者其為子必孝為臣必忠鳴道集不經大火燒孰得真黄金欒城集請觀風急天寒夜誰是當門定脚人邵堯夫詩因事長智經知不足然後能自反也知困然後能自强也記學記子孔子欲以顔狀取人也於㓕明改之矣欲以言辭取人也於宰我改之矣欲以容貎取人也於子張改之矣家語所以動心忍性增益其所不能人恒過然後能改困於心衡於慮而後作徵於色發於聲而後喻孟子告子下人之有德慧術智者恒存乎疢疾獨孤臣孽子其操心也危其慮患也深故逹孟子盡心下晉公子重耳霸心生於曹越王勾踐霸心生於㑹稽齊威公小白霸心生於莒荀子老子學商容見舌而知守柔矣列子學壺子觀景柱而知持後矣淮南子繆稱訓注先有形而後有影堯遭洪水而貴陸湯大旱而重水淮南子史齊髙疆曰三折肱知為良醫左定十三互見履而後知髙宗遭鳴雉之戒飭已正道享百年之夀西漢杜欽傳木不生庭太戊無以隆雉不鳴鼎武丁不為宗晉書郭璞傳集九折臂而成醫楚辭三折乃良醫劉賔客因人而重經蔽芾甘棠勿翦勿伐召伯所茇詩甘棠子無仲尼則西山之餓夫與東國之絀臣惡乎聞揚子連城之璧瘞影荆山夜光之珠潜輝欝浦玉無翼而飛珠無脛而行揚聲於章華之臺炫耀於綺羅之堂者盖人為之舉也列子栁下恵不遇仲尼則貞潔之行不顯未免於}
