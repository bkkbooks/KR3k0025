  - {type: variant, offset: 2164, length: 0, content: '', WYG: 則獲謀於邑則否左襄三十一孔子曰良農能稼而不能為穡良工能功而不能為順史孔子世家宋義謂項羽曰被堅執銳義不如公坐運籌策公不如義通鑑秦王世紀范蠡曰四封之内百姓之事蠡不如種也四封之外敵國之制立斷之事種亦不如蠡也國語黄霸材長於治民及為丞相風采不及邴魏功名損於治郡東漢黄霸傳張竦謂陳遵曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣同上陳遵傳薛宣起佐史登宰相為世吏師及居大位以苛察失名器誠有極也西漢本傳陳平曰於今靣折庭爭臣不如君全社稷定劉氏後君亦不如臣同上陳平傳曾子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之茍有可觀内必有闕通鑑漢順紀諸}
