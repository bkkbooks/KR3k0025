  - {type: variant, offset: 18, length: 0, content: '', WYG: 之臣季布不遇曹丘則百金之諾不揚未離於凡虜之人同上史伯夷叔齊雖賢得夫子而名益彰閭巷之人欲砥行立名者非附青雲之士烏能施於後世哉史記伯夷傳毛先生遂一至楚使趙重於九鼎大吕同上平原傳庾乗游學宫為諸生傭後能講誦自以卑第每處下坐諸生愽士皆就讐問之由是學中以下坐為貴後漢本傳河南尹羊陟謁造趙壹言談至曛夕極歡陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采同上趙壹傳阮籍見張華鷦鷯賦曰王佐才也由是聲名始著晉書左思作三都賦成人未之重思以示張華深稱賛之兼作序豪貴競冩都下為之紙貴晉書許詢移居臯屯之嵓常與沙門支遁及謝安石王羲之等同遊往來今臯屯呼為許度嵓謝安有盛名時人愛慕有罷縣還安問其歸資荅曰有蒲葵扇五萬安乃取其中者握之士庶競市價增數倍晉書揚雄作太𤣥晩遭陸續𤣥道遂明王長文傳王導為司徒時帑藏空竭庫中惟有練數千端鬻之不售乃與朝賢俱制練布單衣於是士人翕然服之練遂涌貴主者出賣端直一金其為時所慕如此王羲之見一姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百金價姥如言人競買之已上晉書傳記人有市駿馬者三旦立市人莫之知伯樂一顧之一旦而馬價十倍戰國䇿郭林宗游洛陽始見河南尹李膺膺大竒之遂相友善於是名震京師郭林宗别傳慈亷江者昔有李祖仁居此兄弟十人並慈孝亷讓因此名江交州記梁顧總始為縣吏一夕遇二人稱是王粲徐幹云昔與公同舟公劉楨也乃誦其遺文總悟以遺文數萹投令令待之甚厚時謂死劉楨猶庇得生顧總太平廣記士非玉璧談者為價物理論互見求援白樂天以詩謁顧况因為延譽聲名大振幽閒鼔吹集昔歐冶改視鉛刀易價伯樂所盻駑馬百倍文選曹植表夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭藝文類聚載應璩薦和慮則牋一經品題便作佳士李白一顧之隆駘足逾於仙鹿片言之重魚目軼於靈蛇駱賔王一言之譽東陵侔於西山一面之榮鄭璞踰於周寳王彦升文集序互見感謝昔虞阪之上逸驥與駑駘俱疲呉竈之中孤桐共樵蘓並爨遇王良伯喈遂騰聲於千古此詩若不遇王君乃數十張故紙耳唐韋縚作孟浩然集序處州本王君名士源天寳中獲孟浩然文集士源為之序宋廣平之沉下僚蘓公味道為使者廣平投以梅花賦蘓盛稱之自是方列于聞達人之目由是知英賢犖犖可外文字猶用片言借説於先逹之口席其勢而後驤首當時矧碌碌者疇能自異劉賔客互見求援夫美不自美因人而彰蘭亭不遭右軍則清湍脩竹蕪沒於空山矣栁文本朝鵝毛贈千里所重以其人歐公峴山臨漢上望之隱然盖諸山之小者而其名特著於荆者豈非以其人哉其人謂誰羊祜叔子杜預元凱是也峴山亭記溫公營獨樂園在洛中諸園最為簡素人以公之故故春時必逰鳴道集互入生理門園池類黄叔度澹然無作郭林宗一言至今以為顔子叔度之賢無一見於外者而後世猶信徒以林宗之重東坡謝太保撰先人墓碣書因惡累美經今衆人之命儒也妄常以儒相詬病記儒行如有周公之才之美使驕且吝其餘不足觀也已}
