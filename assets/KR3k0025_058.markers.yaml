  - {type: variant, offset: 127, length: 0, content: '', WYG: 史嚮讀曰響自永平以來臣民雖有習浮屠術者而天子未之好至帝始篤好之常躬自禱祠由是其法浸盛通鑑漢桓紀猶叩木本百枝皆動東漢李固傳互見事同一體舉中於禮則强梁褫氣片言違正則厮臺解情東漢循吏傳贊一夫得情千室鳴絃同上互見循良姜詩母嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舎側忽有湧泉味如江水每旦輒出雙鯉魚以供二母之膳同上姜詩妻列傳魏武好法律而天下貴刑名魏文慕通逹而天下賤守節通鑑殷紂好色妲己是出葉公好龍真龍游廷通鑑漢桓紀王者心有所想雖未形顔}
