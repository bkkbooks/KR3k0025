  - {type: variant, offset: 62, length: 1, content: 孔, WYG: 日政事委積盧懷慎不能决惶恐入謝於上上曰朕以天下事委姚崇以卿坐鎮雅俗耳崇既出須臾裁决俱盡通鑑唐𤣥宗傳記陳遵闗西大俠友人䘮遵親為䕶䘮事贈􅂇甚厚王丹乃懷縑一疋陳於主人之前曰如丹此縑出自機杼遵聞而有慙色東觀漢紀中宗嘗召宰相蘓瓌李嶠子進見上曰宜意所通盡奏頲曰木從䋲則正后從諫則聖嶠子迹進曰斮朝渉之脛剖賢人之心上曰蘓瓌有子李嶠無兒松窻雜錄㝠鴻跡在煙霞上燕雀休誇大厦梁綺言雜錄集見西施之容歸憎其貎楊德祖箋西施出帷嫫母侍側呉季重書南鄰擊鍾磬北里吹笙竽寂寂揚子宅門無卿相輿左太冲詠史詩虎豹之文炳於犬羊鸞鳯之音鏘於鳥鵲金玉之光炫於瓦石皇甫湜互見因粗見精無貴賤不悲無富貧亦足杜詩衆星羅青天朗者獨有月李白互見分量不同二十漸乖張清溝映汙渠三十骨骼成乃一龍一豬韓文冬之為候也霜雪飄暴凍入肌髮夏之為用也金流石爍火走膚脉如陽春髙秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如洛陽咸秦者㡬焉李文饒集衆木盡摇落始見竹色真孟東野互見因事見人醜婦競簪花花多映愈醜唐文粹衆花盡處松千尺羣鳥喧時鶴一聲髙逹夫雀喧知鶴靜鳬戯識鷗閑同上本朝萬木嵗寒配喬松於巨栢衆星夜艾凜明月與長庚東坡賀林待制啓互見因難見人試㸔青松鶴何似珠門客歐公集互見趣向不同君㸔花枝朝露何如松上霜風山谷詩影響相應經子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎易鳴鶴在隂其子和之易隆墀永歎逺壑必盈處髙墀而長歎逺壑之中盈響而應易畧例善邇而逺至命宫而商應修下而髙者降與彼而取此者服矣同上恵迪吉從逆凶惟影響書卿士師師非度小民方興相為敵讐書建無窮之基亦有無窮之聞畢命作善降之百祥作不善降之百殃書鼔鍾于宫聲聞于外詩衛文公臣子多好善賢者樂告以善道也􅅠干旄内和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於内而民莫不承聽理發諸外而民莫不承順記樂記下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也緇衣上好仁則下之為仁爭先人同上上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情語子路子以富貴而下人何人不尊以富貴而愛人何人不親}
