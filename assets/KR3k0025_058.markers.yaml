  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷五十八宋潘自牧撰論議部因事思人經君子聽鍾聲則思武臣聽磬聲則思死封疆之臣聽琴瑟之聲則思志義之臣聽竽笙簫管之聲則思蓄聚之臣聽鼓鼙之聲則思將帥之臣記樂記史越子使后庸來聘且言邾田封于駘上盟于平陽三子皆從康子病之言及子贛曰若在此吾不及此夫武伯曰固將召之文子曰他日請念左哀二十七越敗呉遷呉王夫差於甬東予百家居之呉王曰孤老矣不能事君王也吾悔不用子胥之言自令䧟此史記呉世家家貧則思良妻國亂則思良相史魏世家上至廣武赦劉敬曰吾不用公言以困平城通鑑漢髙紀張敞免為庶人亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者詣公車天子引見敞拜為冀州刺史敞到部盜賊屏迹同上漢宣紀潁川盜賊羣起河東守兵亦叛京師騷動帝聞之言吾悔不用郭子横之言同上漢光武紀馬援南擊交趾從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣薫蒸仰視飛鳶跕跕堕水中卧念少游平生語何可得也後漢本傳漢王伐呉而敗時法}
