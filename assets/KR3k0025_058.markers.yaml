  - {type: variant, offset: 2165, length: 0, content: '', WYG: 亮治戎為長竒謀為短理民之幹優於將畧蜀志本傳吕義為政簡而不繁號為清能然居大官名聲損於郡縣同上臨郡則垂稱處朝則被損同上陳夀評孫策謂弟權曰舉江東之衆决機於兩陣之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿呉志本傳摰虞太叔廣並為列卿每}
