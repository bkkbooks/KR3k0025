  - {type: variant, offset: 810, length: 249, content: 子異人異人質於趙趙人不禮之異人以庶孽孫質於諸侯車乘進用不饒居處困不得志陽翟大賈呂不韋適邯鄲見之曰此奇貨可居乃往見異人說曰吾能大子之門異人笑曰且自大君之門不韋曰子不知也吾門侍子門而大能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西遊立子為嗣乃西見華陽夫人之姊而以奇物獻於夫人因譽子異人之賢以夫人為天夫人喜不韋因使其姊說夫人曰夫以色事人者色衰則愛弛今夫人愛而無子不以繁華時蚤自結於諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎夫人以為然承間問於太子曰願得子異人立以為嗣以託妾身太子許之與夫人刻玉符約以為嗣, WYG: ''}
