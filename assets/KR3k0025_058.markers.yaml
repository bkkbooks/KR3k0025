  - {type: variant, offset: 11, length: 0, content: '', WYG: 物相形火數四百炎靈消誰其代者當塗髙窮姦極酷不易取始知文景基局牢同上古硯歌欒布惟不廢彭越之命故髙祖知其賢李勣惟不利李宻之地故太宗許其義欒城集受}
