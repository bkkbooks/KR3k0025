  - {type: variant, offset: 2155, length: 2, content: 曹操, WYG: 鵬鷃逍遥各自知臨川集各有所長經䕫逹於樂而不逹於禮記仲尼燕居德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語先進孟公綽為趙魏老則優不可以為滕薛大夫語憲問又入分量不同臧武仲之智公綽之不欲卞莊子之勇冉求之藝語子驊騮騏驥一日而馳千里捕鼠不如狸狌莊子相髙下視磽肥序五種君子不如農人相美惡辨貴賤君子不如賈人設䂓矩陳䋲墨便備用君子不如工人荀儒效日不知}
