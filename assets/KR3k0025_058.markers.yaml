  - {type: variant, offset: 8, length: 0, content: '', krp: 行平路何以别馬唯當於蟻封晉紀鄧粲傳唐李夷簡彈楊憑坐貶臨賀尉徐晦獨至藍田與别後夷簡薦晦為御史晦曰平生未嘗望公顔色公何從而取之夷簡曰君不負楊臨賀肯負國乎通鑑互見狥公忘私當一生一死間而後見其節唐元徳秀傳疾風知勁草板蕩識誠臣唐太宗賜蕭暢詩見本傳李世勣常侍宴上從容謂曰朕求羣臣可托孤者無以踰公公往不負李宻豈負朕㦲通鑑唐太宗馬文舉曰不遇勍敵何以顯壯士同上集寧知霜雪後獨見竹栢心江淹詩時危見臣節世亂識忠良選鮑明逺詩扶顛始知籌策長杜詩驛騷之際鯁亮彌彰劉賔客火後見琮璜霜餘識松栢同上士窮乃見節義韓文雨晦識雞鳴之信風髙見隼擊之威白樂天磨涅始彰其堅白杜牧之㣲風但覺杉香滿烈日方知竹氣寒吕和叔文不有百鍊火孰知寸金精孟東野互見是真難㓕破松見貞心裂竹㸔直文唐文粹天若無雪霜青松不如草地若無山川何人重平}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 唐于瀆詩衆木盡摇落始見竹色真孟東野詩互見事物相形本朝揮毫更想能一戰數窘乃見詩人才臨川集馬之在厩也駑驥雜處飲水食芻嘶鳴蹄齧求其所以異者蔑矣及其引重車取夷路不屢策不煩御一頓其轡}
