  - {type: variant, offset: 155, length: 0, content: '', WYG: 日月望則蚌蛤實月晦則蚌蛤虛大戴後霜降則鳴山海經陽出雞鳴以類感也春秋說蟻封宂户大雨將至焦貢易林唐樂懸散失獨無徵音李嗣貢求得䘮車一鐸入而振之於東南隅果有應也遂掘之得石一段為四具補樂懸之散闋周正集同音者相和同類者相似飛鳥號其羣鹿鴻求其友楚辭叩宫而宫應彈角而角動虎嘯而谷風生龍舉而景雲往聲音之相叩兮言物類之相感也同上鳴聲相應仇偶相從選詩蚌蛤珠胎與月虧全選呉都賦隠雷自天昆蟲已聽浮隂在漢柱礎先霑任孝恭啓相資成美經若作酒醴爾惟麴蘖若作和􅅅爾惟鹽梅書惟周}
