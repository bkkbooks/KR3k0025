  - {type: variant, offset: 2804, length: 562, content: 習鑿齒曰諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怒者以其無私也同上吾心如秤不能為人作輕重蜀志諸葛亮傳王弘曰劉粹無私必無憂也通鑑南史宋高祖紀劉子翼性剛直朋友有過常面責之李伯藥常稱劉四雖復罵人人終不恨唐太宗紀上謂房元齡曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者非至公能如是乎通鑑唐太宗集七子均養者鳲鳩之仁也選曹子建責躬詩表靈輝朝覯稱物納照選連珠不別荊棘者慶雲之惠也選責躬詩表澤無不漸螻蟻之穴靡遺選昭王碑大國置衡鏡準平天地心李太白集天布寒暖不私於人品類既一高下以均唐柳公綽太醫箴大明無偏照張蘊古若懸衡然增之銖兩則俯反是則仰無可私者柳文公道世間唯白髮貴人頭上不曾饒杜牧之經子曰君子之於天下也無適也無莫也語里仁子有人方舟而濟於河有虛船來觸舟雖有褊心之人不怒莊山木復讎者不折鏌干雖有忮心者不怨飄瓦達生至人之用心若鏡不將不迎應帝王獨不見夫桔槔者乎引之則俯捨之則仰彼人之所引非引人者也故俯仰而不得罪於人同上夫投鉤分財投策分馬非以鉤策為均使得美者不知所以德得惡者不知所以怨慎子高山深林非為虎豹也大木茂枝非為飛鳥也淮南子鏌釾不為巧者銳而為拙者鈍劉子下同飄瓦擊人虛舟觸已雖有忮心而不怒者以彼無情於擊觸也嬰兒傷人而被傷者不以為怨史利不在身以之謀事則智慮不私己以之斷義必厲東漢, WYG: ''}
