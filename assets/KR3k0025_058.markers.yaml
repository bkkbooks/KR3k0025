  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0025_CHANT_058-1a.3}
  - {type: variant, offset: 3, length: 1, content: 柳, WYG: 萬夫之長可以觀政書咸有一德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不已詩風雨觀其器而知其工之巧觀其發而知其人之知記禮器嵗寒然後知松栢之後彫也語子罕子不容然後見君子家語互見不茍合及道大不容六親不和有孝慈國家昏亂有忠臣老子逺使之而知其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以酒而觀其量雜之以處而觀其色臨之以危而觀其節莊子養生不足以當大事惟送死可以當大事孟子離婁}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_058-4b, image: WYG0931/WYG0931-0633b.png}
  - {type: variant, offset: 3, length: 1, content: 柳, krp: 萬夫之長可以觀政書咸有一德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不已詩風雨觀其器而知其工之巧觀其發而知其人之知記禮器嵗寒然後知松栢之後彫也語子罕子不容然後見君子家語互見不茍合及道大不容六親不和有孝慈國家昏亂有忠臣老子逺使之而知其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以酒而觀其量雜之以處而觀其色臨之以危而觀其節莊子養生不足以當大事惟送死可以當大事孟子離婁}
  - {type: variant, offset: 5, length: 1, content: 惠, WYG: 窮觀其所為逹觀其所與列子貧則見亷富則見義生則見愛死則見哀尹鄧子脩身嵗不寒無以知松栢事不難無以知君子荀子大畧舟覆乃見善游馬奔乃見良御淮南子説訓林如鍾山之玉寒嶺之松比之瓀珉梓桞無殊也及其燒以爐炭三日而色潤不改處於積氷終嵗而枝葉不彫然後知其異於他玉衆木也列子史李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取史魏世家互見致察舉世混濁清士乃見史記伯夷傳肥義曰正臣難至而節見忠臣累至而行明同上趙世家淮隂黥布等皆已誅滅而何之勲爛焉蕭何世家天下昏濁忠臣乃見魏王豹傳狗盜雞鳴孟嘗君列此二人於賔客盡羞及有秦難卒此二人救之孟嘗君傳互入兼收並蓄已上並史記劇孟愽徒母死客送䘮千餘乗此亦有過人者西漢袁盎傳不遇盤根錯節何以别利器後漢虞詡傳王祥之薨奔赴者非朝廷之賢則親戚故吏而已門無雜吊之賔晉書本傳王湛}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_058-5a, image: WYG0931/WYG0931-0633c.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_058-5b, image: WYG0931/WYG0931-0633d.png}
  - {type: variant, offset: 5, length: 1, content: 惠, krp: 窮觀其所為逹觀其所與列子貧則見亷富則見義生則見愛死則見哀尹鄧子脩身嵗不寒無以知松栢事不難無以知君子荀子大畧舟覆乃見善游馬奔乃見良御淮南子説訓林如鍾山之玉寒嶺之松比之瓀珉梓桞無殊也及其燒以爐炭三日而色潤不改處於積氷終嵗而枝葉不彫然後知其異於他玉衆木也列子史李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取史魏世家互見致察舉世混濁清士乃見史記伯夷傳肥義曰正臣難至而節見忠臣累至而行明同上趙世家淮隂黥布等皆已誅滅而何之勲爛焉蕭何世家天下昏濁忠臣乃見魏王豹傳狗盜雞鳴孟嘗君列此二人於賔客盡羞及有秦難卒此二人救之孟嘗君傳互入兼收並蓄已上並史記劇孟愽徒母死客送䘮千餘乗此亦有過人者西漢袁盎傳不遇盤根錯節何以别利器後漢虞詡傳王祥之薨奔赴者非朝廷之賢則親戚故吏而已門無雜吊之賔晉書本傳王湛}
