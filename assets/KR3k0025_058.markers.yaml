  - {type: variant, offset: 1127, length: 1, content: 孫, WYG: 傳記韓盧天下之疾犬東郭逡天下之狡兎盧逐逡環山者三兎極於前犬廢於後犬兎各死戰國䇿卞莊子方刺虎卞竪子曰両虎方食牛牛甘必爭爭必鬬鬬則大者傷小者死從傷而刺之一舉必有獲兩虎之名有頃兩虎果鬭大者傷小者死春秋後語蘓代曰臣過易水見小蜯方出爆而鷸啄其肉蚌合而箝其啄鷸曰今日不雨明日不雨必有死蚌蚌亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之戰國策各行其志經君子之道或出或處或黙或語易道並行而不相悖記中庸互入殊塗同歸子曰道不同不相為謀語㣲子去之箕子為之奴比干諫而死語史伍員與申包胥友其亡也謂包胥曰我必覆楚國包胥曰勉之子能復之我必能興之左傳定公子罕曰我以不貪為寳爾以玉為寳若以與我皆䘮寳也不若人有其寳左襄十五年分量不同楚伍尚謂其弟員曰爾適呉我將歸死我能死爾能報左傳昭公張竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣西漢陳遵傳互入各有所長蕭望之以射策為郎署小苑東門候王仲翁傳呼甚}
