  - {type: variant, offset: 18, length: 0, content: '', krp: 之臣季布不遇曹丘則百金之諾不揚未離於凡虜之人同上史伯夷叔齊雖賢得夫子而名益彰閭巷之人欲砥行立名者非附青雲之士烏能施於後世哉史記伯夷傳毛先生遂一至楚使趙重於九鼎大吕同上平原傳庾乗游學宫為諸生傭後能講誦自以卑第每處下坐諸生愽士皆就讐問之由是學中以下坐為貴後漢本傳河南尹羊陟謁造趙壹言談至曛夕極歡陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采同上趙壹傳阮籍見張華鷦鷯賦曰王佐才也由是聲名始著晉書左思作三都賦成人未之重思以示張華深稱賛之兼作序豪貴競冩都下為之紙貴晉書許詢移居臯屯之嵓常與沙門支遁及謝安石王羲之等同遊往來今臯屯呼為許度嵓謝安有盛名時人愛慕有罷縣還安問其歸資荅曰有蒲葵扇五萬安乃取其中者握之士庶競市價增數倍晉書揚雄作太𤣥晩遭陸續𤣥道遂明王長文傳王導為司徒時帑藏空竭庫中惟有練數千端鬻之不售乃與朝賢俱制練布單衣於是士人翕然服之練遂涌貴主者出賣端直一金其為時所慕如此王羲之見一姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百金價姥如言人競買之已上晉書傳記人有市駿馬者三旦立市人莫之知伯樂一顧之一旦而馬價十倍戰國䇿郭林宗游洛陽始見河南尹李膺膺大竒之遂相友善於是名震京師郭林宗别傳慈亷江者昔有李祖仁居此兄弟十人並慈孝亷讓因此名江交州記梁顧總始為縣吏一夕遇二人稱是王粲徐幹云昔與公同舟公劉楨也乃誦其遺文總悟以遺文數萹投令令待之甚厚時謂死劉楨猶庇得生顧總太平廣記士非玉璧談者為價物理論互見求援白樂天以詩謁顧况因為延譽聲名大振幽閒鼔吹集昔歐冶改視鉛刀易價伯樂所盻駑馬百倍文選曹植表夜光之璧顯價於和氏之肆千里之足定功於伯樂之庭藝文類聚載應璩薦和慮則牋一經品題便作佳士李白一顧之隆駘足逾於仙鹿片言之重魚目軼於靈蛇駱賔王一言之譽東陵侔於西山一面之榮鄭璞踰於周寳王彦升文集序互見感謝昔虞阪之上逸驥與駑駘俱疲呉竈之中孤桐共樵蘓並爨遇王良伯喈遂騰聲於千古此詩若不遇王君乃數十張故紙耳唐韋縚作孟浩然集序處州本王君名士源天寳中獲孟浩然文集士源為之序宋廣平之沉下僚蘓公味道為使者廣平投以梅花賦蘓盛稱之自是方列于聞達人之目由是知英賢犖犖可外文字猶用片言借説於先逹之口席其勢而後驤首當時矧碌碌者疇能自異劉賔客互見求援夫美不自美因人而彰蘭亭不遭右軍則清湍脩竹蕪沒於空山矣栁文本朝鵝毛贈千里所重以其人歐公峴山臨漢上望之隱然盖諸山之小者而其名特著於荆者豈非以其人哉其人謂誰羊祜叔子杜預元凱是也峴山亭記溫公營獨樂園在洛中諸園最為簡素人以公之故故春時必逰鳴道集互入生理門園池類黄叔度澹然無作郭林宗一言至今以為顔子叔度之賢無一見於外者而後世猶信徒以林宗之重東坡謝太保撰先人墓碣書因惡累美經今衆人之命儒也妄常以儒相詬病記儒行如有周公之才之美使驕且吝其餘不足觀也已}
  - {type: variant, offset: 19, length: 1, content: 微, WYG: 㤗伯子西子蒙不潔人皆掩鼻而過之孟子五榖者種之美者也茍為不熟不如荑稗同上告子下槃水正錯而勿動則湛濁在下清明在上足以見鬚眉而察理㣲風過之湛濁動乎下清明亂於上則不可以得大形之正也荀子蘭槐之根是為芷其漸之滫君子不近同上勸學萹注滫溺也水之性清所以濁者土渾之也林之情靜所以動者風摇之也人之心正所以邪者欲昡之也劉子河水欲清沙壤穢之淮南子史一薰一蕕十年尚猶有臭左傳莠盛苖穢何不鋤也西漢嚴延年傳忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如子政一離刀鋸沒世不齒東漢郭㤗傳涇以渭濁同上賈彪傳山有朽壤雖大必虧木有蠧蟲其榮易落唐史臣元宗贊集聫蕙芷以為佩兮過鮑肆而失香楚辭資髙明之質而未免卑濁之累選吊文青蠅一相㸃白璧遂成寃陳子昂集本朝君子小人如氷炭决不可以同器若兼收並用則小人必勝薰蕕雜處終必為臭東坡富鄭公神道碑性之有喜怒猶水之有波否曰湛然平靜如鏡者水之性也及過沙石或地勢不平便有湍激或風行其上便為波濤洶湧此豈水之性哉鳴道集因麤見精子故雖有珉之彫彫不若玉之章章荀子百星之明不如一月之光十牖畢開不如一户之明淮南子豹裘而雜不若狐裘而粹同上史趙良曰千羊之皮不如一狐之腋史記商君傳鷙鳥累百不如一鶚孔文舉薦禰衡表一見西漢鄒陽傳玉以礫貞東漢賈彪傳傳記張巨魚者垂其千鈎而得之在於一筌捕髙鳥者張其萬􅆯而獲之由一目史通集雀喧知鶴靜髙逹夫因精見麤經若苖之有莠若粟之有秕書仲虺之誥子飲玉􅏁則知漿荇之薄味抱朴子集虎豹之文炳於犬羊鸞鳯之音鏘於鳥鵲金玉之光炫於瓦石皇甫湜互見事物相形因術累已子矢人惟恐不傷人孟子史治獄之吏皆欲人死非憎人也自安之道在人之死通鑑漢宣紀互見其勢使然魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲將懸磴書之比訖鬚髮盡白裁餘氣息還語子弟宜絶此法晉王獻之傳秦王苻生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無他疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之通鑑晉哀紀太宗與侍臣泛舟春苑苑池見異鳥容與波上悦之詔坐者賦詩而召閻立本侔狀閣外傳呼畫師立本是時已為主爵郎中俯伏池左研丹粉望坐者羞恨流汗歸戒其子曰吾少讀書文辭不减儕輩今獨以畫見名與厮役等若曹慎母習唐本傳本朝昔閻立本始以文學進身卒蒙畫師之耻東坡書呉道子畫後自相矛盾經于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟書互見無情子人有鬻矛楯者譽之曰吾楯之堅物莫能䧟也又譽其矛曰吾矛之利於物無不䧟也或曰以子之矛䧟子之楯何如其人弗能應也韓非子使人之子孫自賊其父母也荀子為人父而𣙜其子縱利如子何揚子斷根以續枝割背以禆腹抱朴子山生木反自刻木生蠧反自食人生事反自賊淮南子史楚昭王曰除腹心之疾而置諸股肱何益左傳昔髙辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討左傳助秦自攻史虞卿傳劉向受榖梁春秋其子歆乃大好左氏傳以左丘明好惡與聖人同親見夫子而公羊榖梁七十子後傳聞之與親見其詳畧不同歆數以難向向不能非間也前漢書李固曰刻割心腹以補四支東漢本傳魏曹冏曰猶芟刈股肱獨任胸臆觀者為之寒心通鑑三國志刖趾適履刻肌傷骨魏志借子之矛刺子之楯晉天文志唐髙祖謂侍臣曰刻民以奉君猶割肉以充腹腹飽而身斃通鑑唐紀傳記漢書孝成紀贊曰成帝善脩容儀升車正立不内顧臨朝淵嘿尊嚴若神可謂穆穆有天子之容貎矣又五行志曰成帝好㣲行選私奴客十餘人自稱富平侯或乗小車御者偕騎出入由斯而言則成帝㣲服嫚遊鳥集無度雖外飾威重内肆輕薄人君之望不其缺如觀孟堅紀志所言前後自相矛盾者也史通班固稱項羽弑義帝自取㓕亡又云于公髙門以待封嚴母掃地以待䘮如固斯言則深信夫天怨神怒福善禍滛者矣至於其賦幽通也復以天命久定非理所移故善惡無徵報施多爽斯則同理異說前後自相矛盾者焉同上集昆弟自相傾韋應物集肝膽反為賊文粹自相背馳經或錫之鞶帶終朝三禠之易其車既載乃棄爾輔詩子惡辱而居不仁是猶惡濕而居下也孟子互入明知故犯惡死亡而樂不仁是猶惡醉而强酒同上猶欲其入而閉之門也同上猶立枉木而求其影之直也荀子欲夀而刎頸同上伏而咶夭救經而引其足經縊也引其足愈急也愈務而愈逺同上欲㓕跡而走雪中淮南子譬如拯溺錘之以石救火投之以薪尹鄧子病熱而强之以餐救暍而飲之以寒救經而引其索拯溺而授之石欲救之反為惡淮南子説林訓披裘而扇淮南子史今有二命其誰不解體左猶治絲而棼之也左傳互見躁急首尾衡决西漢賈誼傳行危而求安造禍而求福史荆軻傳濁其源而求其清流前禮樂志是猶紲韓盧而責之獲也班固傳時成帝無嗣政由王氏劉向遂上封事極諫王氏與劉氏不並立如下有泰山之安則上有累卵之危向卒子歆王莽舉為侍中王莽持政留歆為右曹建平元年改名秀及王莽簒位歆為國師西漢本傳互入不克紹猶郤行而求及前人也楚元王傳欲湯之滄音愴悽愴之愴寒也一人炊之百人揚之無益也枚乗傳譬猶抱薪而救火同上狐白之裘而反衣之也匡衡傳互見愚暗前漢自吉至崇皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣天下服其亷而怪其奢前漢王吉傳陳琳曰掩目捕雀通鑑劉炫曰相期髙於周孔相待下於奴僕三國蜀志互見自相背馳郄愔遺桓溫牋欲共奬王室請督所部出河上愔子超為溫參軍取視寸寸毁裂乃更作愔牋自陳非將帥才不堪軍旅老弱乞閑地自養勸溫并領已所統通鑑晉海西公紀互見趨向不同將適越者指沙漠以遵途欲登山者渉舟航而覔路所趣逾逺所向轉難南北倍殊髙下相反求其至也不亦難乎晉武紀如室斯構而去其鑿契如水斯積而决其隄防如火斯蓄而離其薪燎也晉書于令升緫論崔浩性不好莊老之書每讀不過數十行輒棄之非毁佛法因欲脩服食養性術天師冦謙之有神中籙圖新經因師事之北史本傳張九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦勁然蕭軟美可喜方召蕭李泌在旁率爾曰公起布衣以直道至宰相而喜軟美者者乎唐書李泌傳伐根以求木茂塞源而欲流長同上魏徵傳迂訪道之車築禮神之舘棲心𤣥化物色幽人將致仙於大庭欲希蹤於姑射於是削浮圖之法懲游惰之民志欲矯歩丹梯求珠赤水徒見蕭衍姚興之謬學不悟秦皇漢武之非求盖惑於左道之言偏斥異方之説舊唐書武宗紀論武宗奮然除去浮圖之法而躬受道家之籙服藥以求長生新唐書本紀集絆良驥之足而責以千里之任檻猿猴之勢而望其巧捷之能呉季重書猶適于南而北轅其到也無日矣唐文粹北轅適楚圓鑿方枘北轅適楚南轅適晉猶航斷港絶潢以望至於海也唐文粹疑似相亂經若苖之有莠若粟之有秕書仲虺之誥互入因精見麄惡徼以為智者惡不孫以為勇者惡訐以為直者論語夫樂者與音相近而不同記樂記子惡似而非者惡莠恐其亂苖也惡佞恐其亂義也惡利口恐其亂信也惡鄭聲恐其亂樂也惡紫恐其亂朱也惡鄉原恐其亂德也孟盡心若初真得鹿妄謂之夣真夣得鹿妄謂之實列子懦弱易奪似仁而非悍戇好鬬似勇而非荀子白石似玉姦佞似賢抱朴子魯人縫掖實非儒行東郭吹竽而不知音列子史孔子過匡匡人以為陽虎陽虎嘗暴匡人匡人止孔子孔子狀類陽虎拘五日史孔子世家陳遵字孟公時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云西漢本傳杜欽字子夏少好經書家富而目偏盲茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆迺為小冠髙廣財二寸由是京師謂欽為小冠杜子夏而鄴為大冠杜子夏云西漢本傳市虎成於三夫孝子疑於屢至後漢蔡謨初渡江見彭蜞大喜曰蟹有八足加二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟㡬為勤學死晉書傳記夫以曾參之賢與其母之信也而三人疑之則慈母不能信也戰國䇿物多相類而非也幽莠之㓜也似禾驪牛之黄也似虎白骨疑象碔砆類玉此皆似之而非者也同上相玉者患石似玉吕氏春秋魯有兩曾參趙有兩毛遂昔南曾參殺人見捕人告北曾參母母見以疑野人毛遂墜井而死客以告平原君平原君曰嗟乎天䘮予矣既而知非平原君客西京雜記陳國張伯諧弟仲諧婦炊於竈下至井上謂伯諧曰我今日粧好否伯諧曰我伯諧也婦大慙愧其夕時伯諧到更衣婦復逐牽其背曰今旦大誤謂伯諧為卿荅曰我故伯諧也風俗通集若青蠅之偽質偽猶變也蠅變白使黑變黑使白楚辭衆偽冒真文選毛遂不墮井曾參不殺人虛言誤公子投杼惑慈親李白似錦言應巧如絲數易欺元㣲之人之至信者心目也天性者父子也不惑者聖賢也然而於竊鈇而知心目之可亂於掇蜂而知父子之可間於拾煤而知聖賢之可疑劉賔客積異以生疑積疑以生惑白樂天外容閑暇中心苦似是而非誰得知白樂天鷺詩祥禽之類凡羽而凡羽混之神芝之類腐菌而腐菌混之嘉蕙之類棼芻而棼芻混之唐文粹本朝聞之曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊鈇而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑東坡辨試舘職䇿問孔子事物相形}
