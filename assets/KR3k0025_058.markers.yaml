  - {type: variant, offset: 132, length: 0, content: '', WYG: 六國合從而辨説之材出劉項並世而籌畫戰鬬之徒歸唐太宗欲治而謀謨諫諍之佐來臨川集唐太宗朝將相固不可及至技藝之士醫有孫真人隂陽有李淳風吕才相法有袁天罡後世不可及也明道集武帝好四夷之功而勇鋭輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘亦被其利此一君之身趣好殊别而士輒應之司馬溫公通鑑論機鋒相凑經子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎語憲問子曰參乎吾道一以貫之曾子曰唯里仁子犁然有當於人之心莊山木子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子史禰衡為江夏太守黄祖作書記輕重踈宻各得體宜祖持其手曰此正得祖腹中之所欲言也東漢本傳互入文章王儉令任昉作一文及見曰正得吾腹中之欲任昉傳集堯心惟舜㑹元稹集光隂與時節先感是詩人白樂天杜詩韓集愁來讀似倩麻姑癢處􅎲杜牧之物理相資經若金用汝作礪書惟木從䋲}
