  - {type: variant, offset: 9, length: 0, content: '', krp: 唐于瀆詩衆木盡摇落始見竹色真孟東野詩互見事物相形本朝揮毫更想能一戰數窘乃見詩人才臨川集馬之在厩也駑驥雜處飲水食芻嘶鳴蹄齧求其所以異者蔑矣及其引重車取夷路不屢策不煩御一頓其轡}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 千里已至矣當是時駑馬並驅則雖傾輪絶勒敗筋傷骨不舎晝夜而追之遼乎其不可以及也臨川文得路方知異日心東坡詩萬木嵗寒配喬松於巨栢衆星夜艾凛明月於長庚東坡賀林待制啓互見}
