  - {type: variant, offset: 127, length: 0, content: '', krp: 史嚮讀曰響自永平以來臣民雖有習浮屠術者而天子未之好至帝始篤好之常躬自禱祠由是其法浸盛通鑑漢桓紀猶叩木本百枝皆動東漢李固傳互見事同一體舉中於禮則强梁褫氣片言違正則厮臺解情東漢循吏傳贊一夫得情千室鳴絃同上互見循良姜詩母嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舎側忽有湧泉味如江水每旦輒出雙鯉魚以供二母之膳同上姜詩妻列傳魏武好法律而天下貴刑名魏文慕通逹而天下賤守節通鑑殷紂好色妲己是出葉公好龍真龍游廷通鑑漢桓紀王者心有所想雖未形顔}
  - {type: variant, offset: 129, length: 0, content: '', WYG: 五星以之推移隂陽為之變度漢靈紀謝安好聲律期功之慘不廢絲竹士大夫效之遂以成俗晉海西公紀秦劉蘭討蝗經秋多不能㓕有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是嵗秦大熟晉武紀作解散髻斜挿簮朝野慕之相與倣傚齊王儉齊帝既殘忍有司訊囚莫不嚴酷或燒犂耳使}
  - {type: variant, offset: 129, length: 0, content: '', krp: 五星以之推移隂陽為之變度漢靈紀謝安好聲律期功之慘不廢絲竹士大夫效之遂以成俗晉海西公紀秦劉蘭討蝗經秋多不能㓕有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是嵗秦大熟晉武紀作解散髻斜挿簮朝野慕之相與倣傚齊王儉齊帝既殘忍有司訊囚莫不嚴酷或燒犂耳使}
  - {type: variant, offset: 130, length: 0, content: '', WYG: 其上或燒車釭使以臂貫之梁敬帝紀以上並通鑑裴矩佞}
  - {type: page-break, offset: 130, content: '', id: KR3k0025_WYG_058-31a, image: WYG0931/WYG0931-0646c.png}
  - {type: variant, offset: 130, length: 0, content: '', krp: 其上或燒車釭使以臂貫之梁敬帝紀以上並通鑑裴矩佞}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠通鑑唐太宗上入苑中見蝗掇數枚祝之曰民以糓為命而汝食之寧食吾之肺腸舉手吞之是嵗蝗不為災同上夫人之慕名如水趍下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣同上髙祖唐張楚金魏元忠臨刑太后使鳯閣舎人王隠客馳騎傳聲赦之是日隂雲四塞既釋楚金等天氣晴霽通鑑武后傳記行非為影也而影隨之呼非為響也而響和之許氏説文蟊吏抵冐取民財則生蟘吏乞貸則生螟吏𠖇𠖇犯法則生許氏説文宋景公時熒惑在心公召子常問焉子常曰禍在君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於嵗公曰嵗饑人餓必死焉為人君而㣲其人誰以我為君乎子常曰君有至德之言三天必三賞君熒惑必徙三舎後果三徙吕氏春秋齊景公時熒惑守虛期年晏子曰虛齊之分野當强為善公乃去寃獄振孤敬老行之三日而熒惑遷其守春秋周公下白屋之士七十人而天下之士皆至晏子與同衣食百人而天下之士亦至仲尼脩道行理文章而天下之士亦至説苑集爾形信直影亦不曲爾聲信清響亦不濁晉裴顔安吏箴互入瑞本澄源庶女告天振風襲於齊堂建平王上傳媱風大行貞女蒙冶容之誨淳化殷流盜跖挾曾史之情陸士衡演連珠賤臣叩心飛霜擊於燕地選江文通上書珠玉無脛而自至者以人好之也孔融本傳宋景公時大旱三年卜之以人祠乃雨公下堂頓首曰所以求雨將自當之言未卒大雨藝文類聚强於内者外必勝殖不固者發必隳皇甫湜匹婦含怨三年亢陽匹夫結憤六月飛霜唐文粹漢髙帝大度故其時多魁傑不覊之才孝武好英風故其時富瑰琦立名之士孝宣精吏治故其時萃循良核實之能陸宣公集誠信大虧則百事無不紕繆同上本}
