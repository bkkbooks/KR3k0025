  - {type: variant, offset: 122, length: 1, content: 苟, WYG: 得一素公患之管仲曰試勿衣也謂左右曰甚惡紫桓公諾三日莫有衣紫者韓文鄒君好長纓左右皆服纓甚貴公患之因先自斷其纓而出國中皆不服同上人主之情上通于天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不改則多滛雨淮南子鄒衍盡忠於燕恵王王信讒繫之鄒子仰天而哭正夏而天為之降霜淮南子有隂德者必有陽報有隂行者必有昭名同上湯去三面之網歸之者四十國文王𦵏城隅之枯骨天下懷其仁傅子體痛者口不能不呼心說者顔不能不笑尹子從道必吉反道必凶如影如響也同上}
