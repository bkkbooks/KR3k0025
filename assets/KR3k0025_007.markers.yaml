  - {type: variant, offset: 3081, length: 310, content: 洒掃請坐徽之不顧將出主人乃閉門徽之以此賞之盡懽而去晉書王徽之傳陶潛既絕州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反晉書本傳互入相忘形跡或告右丞相魏徵私其親戚上使溫彥博按之曰徵不存形跡遠避嫌疑心雖無私亦有可責通監唐太宗崔祐甫作相未逾年凡除吏幾八百多稱允當上曰有人謗卿除擬官多涉親故如何祐甫曰進擬必須諳其才行臣若與其相識方可粗諳若素不知聞何由知其言行獲譴之由實在於此舊唐書本傳互入徇公忘私韋貫之為監察御史舉其弟纁自代新唐書本傳高元裕為中丞文宗難其代表言兄逸少才可任因以命之同上傳記晉王徽之有雋才少為桓沖參軍從沖值雨便下馬入沖車中謂曰豈有獨擅一車不容國士乎世說互入寮屬集古之知己者不待來求而後, WYG: ''}
