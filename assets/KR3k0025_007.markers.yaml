  - {type: variant, offset: 1416, length: 0, content: '', WYG: 江漲港有巨魚合縣食之有一老姥獨不食遇老叟曰此吾子也汝獨不食吾厚報汝若東門石龜目出城當陷姥日往視有稚子訝之姥以實告稚子以朱傳龜目姥}
