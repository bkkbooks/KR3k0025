  - {type: variant, offset: 2522, length: 2, content: 弗獲, WYG: 時風浪戰城西何啻漁陽萬鼔鼙胡五峯彭蠡湖鄱陽湖宫亭湖同經彭蠡既豬東匯澤為彭蠡東迤北㑹于匯書史廬山有神與人語言能令宫亭湖分風船行舉帆相逢欒巴為豫章太守神不復作聲後本傳傳記宫亭即彭蠡澤也謂之彭澤湖一名匯澤宫亭湖廟神甚有靈驗能使湖中分風}
