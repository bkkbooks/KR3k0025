  - {type: variant, offset: 2497, length: 2, content: 芭蕉, WYG: 夏至前三五日吳都太湖中白魚向湖北淺水菰蒲之上産子民得採之隋大業志湖是仙人浮玉之北堂太湖記震澤中洞庭山有洞穴深百餘尺仰公􅀈誤墮洞中至一龍宫下有青泥晝夜常明飢食青泥味若粳米飯記得歸路得出事聞梁武帝帝問杰公公曰此洞穴有四支一通洞庭湖西岸一通蜀道青衣浦北岸一通浮羅兩山間大谿一通枯桑島東􅂒梁公記集平湖曠復逺髙榭峻而危吳均終當遊五湖濯足滄浪泉李白本朝作隄捍外非吾事閒送苕溪入太湖朅来震澤都如夢只有苕溪可倚樓東坡三萬六千頃湖浸海内田逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豊年羅隠詩杳杳波濤閲古今四無邉際莫知深潤通曉月為清露氣入霜天作瞑隂笠澤魚肥人鱠玉洞庭柑熟客分金風煙觸目相招引聊為停橈一楚吟蘓子美洞庭湖經九江孔殷過九江至於敷淺原過九江至于東陵書按九江即洞庭也東陵今岳州巴陵縣是傳記青草湖一名洞庭湖荆州記巴陵南有青草湖周迴數百里日月出沒其中湖南有青草山故因以為名同上洞庭亦謂之太湖在巴陵郡初學記洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之内中有此洲南名青草北名洞庭所謂重湖也南遷錄湘江北流至岳陽達蜀江夏潦後蜀江漲遏住湘波溢為洞庭凡數百里而君山宛在水中北夢瑣言湖南馬希範入覲莊宗曰湖南有洞庭其波無際是乎希範曰陛下南巡此湖不足飲馬南唐野史唐桞毅應舉下第還至涇陽見一婦人牧羊毅詰之對曰妾洞庭龍君小女嫁涇川次子夫婿厭薄黜以至此聞君將還吳欲以一書寄托君至洞庭橘社擊樹三發當有應者毅如其教俄有武夫出於波間掲水指路引毅以至其宫見一人被紫衣執青珪因取書進之洞庭君覽畢泣曰老夫之罪不謹鑒聽須臾宫中皆慟哭忽有赤龍長萬餘尺擘天飛去俄而紅粧笑語中有一人白齒蛾眉君笑謂毅曰涇水之囚人至矣明日宴毅於凝碧宫毅辭歸贈遺甚厚毅娶盧氏女生一子踰月笑謂毅曰余即洞庭君之女也遂相與歸洞庭莫知其跡異聞集有商人過青草湖遇湖君得如願乃一少婢也嵗時記詳見元日類集嫋嫋兮秋風洞庭波兮木}
