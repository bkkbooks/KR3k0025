  - {type: variant, offset: 2500, length: 0, content: '', WYG: 下楚詞九歌洞庭西望楚江分水盡南天不見雲且就洞庭賒月色將船買酒白雲邊洞庭湖西秋月輝淡掃明湖開玉鏡丹青畫出是君山帝子瀟湘去不還空餘秋草洞庭間李白鮫室圍青草龍堆擁白沙護江盤古木迎棹舞神鴉破浪南風正迴檣畏日斜湖光與天逺直欲泛仙槎洞庭猶在目青草續為名驛邊沙舊白湖外草新青湖濶兼雲霧昔聞洞庭水今}
