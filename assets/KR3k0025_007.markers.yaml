  - {type: variant, offset: 440, length: 1, content: 直, WYG: 淮圍也圍繞揚州北界東至海也釋名淮水出南陽桐柏山其源湧出復潛流三十里然後長騖水經雀入於淮為蜃國語淮水東經淮隂縣韓信釣於此處初學記禹治水至桐柏獲淮渦水神名曰無支祁形}
  - {type: variant, offset: 440, length: 1, content: 直, krp: 淮圍也圍繞揚州北界東至海也釋名淮水出南陽桐柏山其源湧出復潛流三十里然後長騖水經雀入於淮為蜃國語淮水東經淮隂縣韓信釣於此處初學記禹治水至桐柏獲淮渦水神名曰無支祁形}
  - {type: variant, offset: 442, length: 1, content: 絃, WYG: 獼猴力踰九象禹乃命庚申制之遂鎻於龜山之下淮水乃安山海經莊周見道牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝詣楚王決江淮以漑汝鮒魚曰今命在盆盎之中爾乃為我見楚王決江淮以漑我汝即索我於枯魚之肆矣説苑集從王師以南征兮浮淮水而遐逝背濁浦之曲流兮望馬丘之髙澨泛洪櫓於中潮兮飛輕舟乎濵濟建衆檣以成林兮譬無山之樹藝王粲賦淮水不絶波瀾髙李白清淮無波平如席淮之水舒舒淮水出桐柏栁集本朝梁武帝欲以淮水灌夀陽乃作浮山堰於鍾離冶鐵器數萬斤益以薪石沈之踰年乃合魏人患之果徙夀陽戍未幾淮暴漲堰壞有聲如雷水之怪妖蔽流而下}
