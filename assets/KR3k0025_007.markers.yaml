  - {type: variant, offset: 1366, length: 0, content: '', krp: 我忖留乃出首班以脚畫地忖留覺之便還没水水經注項仲山飲馬渭水日以三錢償之三輔決錄陳季卿覊棲輦下常訪僧於青龍寺遇僧他適因憇於煖閣中有終南山翁方擁爐而坐東壁有寰瀛圖季卿嘆曰得自渭泛河濟江達於家亦不悔無成而歸翁乃命僧童折階前一竹葉作舟置圖中渭水上季卿熟視恍若登舟旬餘至家復登葉舟泛江至青龍寺見山翁尚擁褐而坐廣記集涇秦有水犄汨泥淖撓混沙礫視之分寸眙若睨壁淺深險易昧昧不覿乃合清渭以自彰穢跡故其名曰濁涇栁文導源經隴坂屬汭貫瀛都下瀨波常急廻圻溜亦紓毒流秦卒斃泥糞漢田腴獨有迷津客懷歸軫暮途徐珩渭故國流清渭清渭無情極愁時獨向東渭北春天樹清渭東流劍閣深杜詩渭源奔鳥穴輕瀾起客亭淺淺滿澗響蕩蕩竟川鳴潘生稱運石馮子聽波聲斜去臨天半横来對始平合流應不雜方知性本清宇文逌本朝清渭無心映涇濁涇渭清混山谷洛經洛出書易導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河書}
  - {type: variant, offset: 1367, length: 0, content: '', WYG: 康畋于有洛之表昆弟五人須于洛汭書並序天乃錫禹洪範九疇注云天與禹洛出書神龜負文有數至九禹因第之以成九類洪範我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食洛誥瞻彼洛矣維水泱泱詩豫州其川滎雒周禮子洛水輕利而宜禾洛出獵}
