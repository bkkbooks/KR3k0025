  - {type: variant, offset: 2501, length: 0, content: '', WYG: 岳陽樓春近岳陽湖青青洞庭湖東浮滄海脣君山可避暑况此采白蘋杜詩洞庭九州間厥大誰與讓南維羣崖水北注何奔放瀦為七百里吞納名殊狀韓集湖光秋月兩相和潭靣}
