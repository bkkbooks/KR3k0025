  - {type: variant, offset: 1375, length: 1, content: 聽, WYG: 以為仙舟後漢黄帝生於元扈洛水之上有鳯凰銜圖置帝前以黄金為匣宋書傳記洛之為言繹也繹光耀也春秋説題辭洛字或作雒初漢火行忌水故雒去水而加佳魏為土行水得土而流土得水而柔故去佳而加水典畧洛水出京兆上洛縣冢嶺山水經注王者盛德之應洛水先温九日乃寒五日變為五色帝王將起河洛龍見首黒者人正白者地正赤者天正乾鑿度黄帝遊洛水之上始得圖書詳見霧類湯沈璧於洛乃獲黄魚黒玉之瑞帝王世紀武王沈璧於河至日旰青雲浮洛尚書中候靈王二十二年榖洛鬬將毁王宫伊洛竭而夏亡國語秦買之山洛水出焉東注于河其中有藻玉山海經洛水底有礜石述征記集余從京師言歸東藩北過伊闕越轘轅經通谷凌景山容與乎陽林流盼乎洛川覩一麗人於巖之畔乃援御者而告之曰彼何人斯若斯之艷也御者對曰臣聞河洛之神名宓妃君王所見毋乃是乎曹植洛神賦湖子夫歴陽之都一夕化而為湖勇力聖知與}
