里交通隋地理志瀆之為言獨也不因餘水獨能赴海唐許敬宗傳傳記江河淮濟為四瀆四瀆者發源注海者也爾雅四瀆何以視諸侯能通百川於海能出雲雨其德甚美説苑四瀆之源最髙而長從髙注下其流激峻桓譚新論河經河出圖易九河既道至于龍門西河導河積石至于龍門南至於華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海書河水瀰瀰河水浼浼誰謂河廣一葦杭之誰謂河廣曽不容刀河水清且漣猗河水清且直猗河水清且淪猗不敢馮河詩兖州其川河泲周禮晉人將有}
  body:
  - {type: variant, offset: 1, length: 4, content: 理倒置經, WYG: 于河必先有事于滹沱記三王之祭川也皆先河而後海學記俟河之清人夀幾何左子禹疏九河孟子秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬於是河伯欣然自喜}
