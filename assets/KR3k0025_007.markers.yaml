  - {type: variant, offset: 1377, length: 0, content: '', WYG: 肖者同命無遺説也淮南子史三苖氏左洞庭右彭蠡德義不修舜滅之史陳訓少學天文時錢塘湖開或言天下當太平青葢入洛孫皓以問訓訓對曰臣能望氣不逹湖開塞退告友曰青葢入洛將有輿櫬衘璧之事非吉祥也晉書㑹稽太守孟顗事佛精慤而為謝靈運所輕東郭有迴踵湖靈運求決以為田顗堅執不與又求始寜岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生民言論毁傷遂搆讎隙宋書禇無量家近臨平湖湖中有龍鬬傾里閈就觀之無量時年十二讀書晏然不動唐書傳記湖池也廣雅湖大陂也説文湖曰都四靣流瀆所隈都也風俗通由拳縣秦時長水縣始皇時童謡曰城門有血城當陷没有嫗}
