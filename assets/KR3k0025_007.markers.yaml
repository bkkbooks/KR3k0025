  - {type: variant, offset: 1121, length: 0, content: '', WYG: 韓詩外傳沔水東經嵩山下有潭杜元凱作兩碑述己功一碑在峴山一碑沉此潭中曰千載之後何知不深谷為陵水經沔水有蛟為害鄧遐守襄陽㧞劍入水截蛟數段流血水丹蛟患遂息荆州記集漢江一帶碧流長兩岸春風起緑楊借問膠船何處沒欲停蘭棹祀昭王胡曽東流既渳渳南紀信滔滔水激沉碑岸波駭弄珠臯含星映淺石浮盖下渀濤李百樂檣烏相背發塞鴈一行鳴南紀連銅柱西江接錦城杜甫涇渭經涇屬渭汭禹貢導渭自鳥鼠同穴東㑹于澧又東㑹于涇又東過漆沮入于河書涇以渭濁湜湜其沚詩雍州其川涇汭其浸渭洛周禮涇晉侯伐秦秦}
