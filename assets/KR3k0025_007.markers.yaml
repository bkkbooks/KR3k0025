  - {type: variant, offset: 2502, length: 2, content: 愁雨, WYG: 風鏡未磨遥望洞庭山木翠白銀盤裏一青螺楚望何蒼然層瀾七百里孤城寄逺目一瀉無窮已蕩漾浮天盖回環宣地理積漲在三秋混成非一水冬遊見清淺春望多洲沚雲錦逺沙明風煙青草靡明月出中央青天絶纎滓素光淡無際緑淨平如砥劉夢得本朝南康宜在彭蠡九江敷淺原之間疑晁氏九江東陵之説以為巴陵洞庭者為可信盖江流}
