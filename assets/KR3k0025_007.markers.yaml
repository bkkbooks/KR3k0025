  - {type: variant, offset: 173, length: 0, content: '', krp: 六州之域經營炎景之外所以作限於華裔壯天地之險介呼吸萬里吐納靈潮激逸勢以前驅乃鼓怒而作濤長波浹渫峻湍崔嵬盤渦谷轉凌濤山頽郭璞賦澄江淨如練謝朓春江壯風濤顔延平江路一悠哉滔滔九派来逺潭昏似霧前浦沸成雷蘓味道風摇蜀棘下日照楚萍開同上長江萬里清長江流寒聲孤帆逺影碧山盡惟見長江天際流江色緑且明茫茫與天平横江}
  - {type: variant, offset: 174, length: 0, content: '', WYG: 望阻西秦}
  - {type: variant, offset: 174, length: 0, content: '', krp: 望阻西秦}
  - {type: variant, offset: 175, length: 0, content: '', WYG: 水東連揚子津白浪如山那可渡狂風愁殺峭帆人李白江歛洲渚出魚龍寂寞秋江冷江光隠見黿鼉窟江間波浪兼天湧寒江動碧虛江從月窟来春江不可渡二月已風濤峡險江驚急登樓况有江江清心可瑩湛湛長江去杜詩江漢雖云廣乗舟波無艱江作青羅帶韓集澄江抱青灣江流曲似九回腸栁集大江吞天去澄練横秋洙杜牧之本朝秋江湛已清歐陽西江之水何悠哉經歴灨口險且回餘波拗怒猶涵澹渀濤激浪常喧豗有時夜上滕王閣月照淨練無纎埃江如自天傾同上長江連楚蜀萬派瀉東南與君飲酒細論文酒酣訪古江之墳仲謀公瑾不須弔一酹波神英烈魂清江縈山碧玉環浩蕩長江赴滄海此生長江三萬頃只應明月照環空笑看江水拍天流春江緑漲蒲萄醅猶喜大江同一味故應千里共清甘我家峨眉隂與子同一邦相望六十里共飲玻瓈江東坡日暮江空煙水寒注目長江天際流出門一笑大江横山谷淮江淮附經導淮自桐柏東㑹于泗沂東入于海淮沂其乂書淮水湯湯淮水湝湝淮有三洲率彼淮浦詩青州其川淮泗橘逾淮而北為枳周禮子禹排淮泗而注之江孟子今按淮水未嘗入江史漢武招徕南甌事兩粤江淮之間蕭然煩費矣前}
