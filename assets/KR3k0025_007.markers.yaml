  - {type: variant, offset: 171, length: 1, content: 潢, WYG: 百姓父母豈可限一衣帶水不拯之乎命亟作戰船使投柹於江南史隋楊素帥水軍東下陳後主謂侍臣曰彼何為者邪孔範曰長江天塹古以為限隔南北今日虜軍豈能飛渡邪通鑑傳記江貢也所出珍物可獻貢也風俗通江水始出岷山其源可以濫觴及其至於江津不舫楫不避風不可以渉楚昭王渡江有物大如斗圓而赤直觸王舟王遣使之魯問孔子孔子曰此萍實也可剖而食之童謡云楚王渡江得萍實大如斗赤如日剖而食之甜如蜜家語禹濟江黄龍負舟禹仰天嘆曰吾受命於天竭力以養民死命也余何憂於龍焉龍俛首曵尾而逝吕氏春秋江至潯陽分為九道一白烏江二蚌江三烏土江四嘉靡江五畎江六源江七廩江八提江九菌江初學記集令沅湘兮無波使江水兮安流楚詞九歌吞江納漢吳都賦惟岷山之導江初發源於濫觴衝巫峽以迅激躋江津而起漲極泓量而海運狀滔天以淼茫總括漢泗兼包淮湘并吞沅澧吸引睢漳源二分於崌崃流九派乎潯陽注五湖以漫漭灌三江而漰沛滈}
