  - {type: variant, offset: 173, length: 0, content: '', WYG: 六州之域經營炎景之外所以作限於華裔壯天地之險介呼吸萬里吐納靈潮激逸勢以前驅乃鼓怒而作濤長波浹渫峻湍崔嵬盤渦谷轉凌濤山頽郭璞賦澄江淨如練謝朓春江壯風濤顔延平江路一悠哉滔滔九派来逺潭昏似霧前浦沸成雷蘓味道風摇蜀棘下日照楚萍開同上長江萬里清長江流寒聲孤帆逺影碧山盡惟見長江天際流江色緑且明茫茫與天平横江}
