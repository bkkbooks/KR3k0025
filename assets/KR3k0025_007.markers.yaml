  - {type: variant, offset: 8, length: 1, content: 妻, WYG: 盡在已順流而東行至於北海東面而視不見水端河伯始旋其面目望洋向西而嘆曰吾非至於子之門則殆矣吾長見笑於大方之家莊子河水出崑崙東北陬貫東海入禹所導積石山禹為民剔河而導九岐河水九折淮南子河下龍門流駛竹箭駟馬追不可及慎子史禹}
