  - {type: variant, offset: 90, length: 2, content: 六逆, WYG: 崑崙之説豈其誠然也東坡河決三門合四水徑流萬里東輸海鞏洛之山夾而峙河来齧山作沙觜山形迤邐若奔避河益洶洶怒而詈舟師弭楫不以帆頃刻奔過不及視盖聞河源出崑崙其山上髙大無際自髙瀉下若激箭一曲一直一千里湍雄衝急乃迸溢其勢不得不愁耳前嵗河怒驚滑民浸瀬洋洋淫不止滑人奔走若鋒駭河伯視之以為戯河水激箭險誰言航葦遊堅氷馳馬渡伏浪捲沙流樹落驚樵岸湍奔忽改州鑿龍饒退鯉漲潦不分牛歐陽河伯方夸若靈渦自舞馮無言贈君有長嘆美哉河水空洋洋東坡江江漢附經三江既入江漢朝宗于海岷山導江東别為沱又東至于澧過九江至于東陵東迤北㑹于匯東為中江入于海書美化行乎江漢之域詩序江之永矣不可方思江有汜江有渚江有沱滔滔江漢南國之紀江漢浮浮江漢湯湯如江如漢詩荆州其川江漢周禮揚州其川三江同上江漢淮漳楚之望}
