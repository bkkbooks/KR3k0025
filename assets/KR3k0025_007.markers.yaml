  - {type: variant, offset: 1484, length: 1010, content: 太山在前而不見疾雷破柱而不驚六一居士傳吾將使世人左手運斤而右手執削目數飛鴈而耳節鳴鼓首肯旁人而足識梯級雖有知者有所不暇矣東坡大悲閣記子事物交滑如理亂棼如涉驚浸一則以之怵惕一則以之忌諱一則以之懲刱是則一日之間一時之頃而徑寸之地如炎如冰矣子華子人有亡鈇者意其鄰之子視其行步竊鈇也顏色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇音掘其谷而得鈇它日復見其鄰之子動作態度無似竊鈇者列互入事久論定心憂恐則口銜芻豢而不知其味耳聽鐘鼓而不知其聲目眡黼黻而不知其狀輕煖乎簟而體不知其安荀昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌子矯駕君車君曰孝哉為母之故犯刖罪及彌子色衰愛弛得罪於君君曰是嘗矯駕吾車也韓昔彌子瑕有寵於衛君與君遊於果園食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛弛得罪於君曰是固嘗啖我以餘桃同上史昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射汝遂不言不笑左昭二十八年田單將攻狄見魯仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乘之燕復齊之墟今攻狄不下何也仲連曰將軍之在即墨坐則織蕢立則仗鍤為士卒倡當此之時將軍有死之心士卒無生之氣所以破燕也今將軍東有澠池之奉西有淄上之娛黃金橫帶而騁乎淄澠之間有生之樂無死之心所以不勝也通監周赧王四十三年子夏門人之高第也猶云出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自決而況中庸以下漸漬於失教被服於成俗乎史記禮書李廣出獵見草中石以為虎而射之中石沒矢視之石也它日射之終不能入矣西漢本傳物之興衰情之起伏理有固然矣而崇替去來之甚者必唯寵惑乎當其接床第承恩色雖險情贅行莫不德焉及至移意愛析嬿私雖惠心妍狀愈獻醜焉愛升則天下不足容其高歡墜故九服無所逃其命東漢皇后紀論韋曜素飲酒不過二升孫皓初見禮異時常為裁減或密賜茶茗以當酒至於寵衰更見逼強輒以為罪吳志樂廣嘗有親客久闊不復來廣問其故荅曰前在坐蒙賜酒方飲見盃中蛇意甚惡之既飲而疾于時河南廳事壁上有角漆畫作蛇廣意盃中蛇即角影也復置酒於前處謂客曰盃中復有所見不荅曰所見如初廣乃告其所以客豁然意解沉痾頓愈晉書苻堅敗于淝水餘眾奔潰聞風聲鶴唳皆以為王師至謝玄傳互入恐懼望風而靡二門傳記熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢躍無跡韓詩外傳應郴為汲令請主簿杜宣賜酒時北壁上有掛赤弩照於盃中其影如蛇宣惡之便得疾云蛇入腹後郴使宣於故處設酒盃中復有蛇因謂宣曰此乃壁上弩影耳非有他怪宣意遂解, WYG: ''}
