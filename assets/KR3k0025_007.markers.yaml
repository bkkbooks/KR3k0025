  - {type: variant, offset: 2903, length: 1, content: 食, WYG: 長湖山曲呼吸湖光飲山緑不論世外隠君子傭兒販婦皆氷玉夏潦漲湖深更幽西風落木芙蓉秋飛雪闇天雲拂地新蒲出水栁映洲湖上四時看不足惟有人生飄若浮菰蒲無邉水茫茫荷花夜開風露香漸見燈明出逺寺更待月黒看湖光水光㶑灧晴偏好山色空濛雨亦竒欲把西湖比西子淡粧濃抹總相宜瓊瑶百頃水仙家風淨湖平響釣車寂歴踈松欹晩照伶俜寒蝶抱秋花東坡水天相映淡溶溶隔水青天無數重白鳥背人秋自逺蒼煙和樹晩来濃春水淨於僧眼碧晩山濃似佛頭青林和靖鑑湖史賀知章請為道士還鄉里詔賜鑑湖剡川一曲唐書傳記後漢㑹稽太守馬臻創立鏡湖築塘蓄水可丈餘田又髙海丈餘若水少則洩湖溉田如水多則閘湖洩田}
