  - {type: variant, offset: 1355, length: 4, content: 目察秋毫, krp: 涇渭洛為闗中三川初學記涇渭合流二百里清濁不襍二秦記涇周㳟王遊於涇上宻康公從有三女奔}
  - {type: variant, offset: 1360, length: 1, content: 末, WYG: 其母曰必致之王康公不許一年恭王滅宻國語韓聞秦之好興利欲罷之無令東伐乃使水工鄭國間説秦令鑿涇自中山西控瓠口為渠溉田戰國䇿渭漢都渭南開北闕以臨渭初學記始皇都咸陽渭水貫都以象天漢三輔黄圖漢武帝時張寛從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車知我所来時張寛在第七車對曰天星主祭祀}
