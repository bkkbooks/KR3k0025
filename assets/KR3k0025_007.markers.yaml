  - {type: variant, offset: 10, length: 4, content: 孽代宗詩, WYG: 為河所從来者髙水湍悍難以行平地數為敗乃厮二渠以引其河北載之髙地過洚水至於大陸播為九河史河渠書漢文帝時河決酸􅀥東潰金隄武帝元光中河決於瓠子東南注鉅野通於淮泗天子使汲黯鄭當時興人徒塞之輙復壞自河決瓠子二十餘年天子乃使汲仁郭昌發卒數萬人塞之於是天子自臨決河沈}
