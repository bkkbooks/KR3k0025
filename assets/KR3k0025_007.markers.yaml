  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷七宋潘自牧撰地理部海經予决九川距四海海濵廣斥江漢朝宗于海四海㑹同東漸于海聲教訖于四海書沔彼流水朝宗于海詩東不盡東海記道不行乗桴浮於海論語子挟泰山以超北海禹掘地而注之海觀於海者難為水孟子海不辭水故能就其深管子渤海之東有大壑焉實為無底之谷名曰歸虛八紘九野之水天漢之流莫不注之而無増無减焉列子南溟者天池也南海之帝為儵北海之帝為忽諄芒遇苑風於東海之濵苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將遊焉井蛙不可以語於海天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知計四海之在天地間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎千里之逺不足以舉其大千仭之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損莊子海不辭東流大之至也列子積水謂之海荀子浮滄海而後知江河之惡沱也况枯澤乎百川學海而至於海浩浩之海濟樓船之力也歟水避礙則至於海揚子史中國名曰赤縣神州有大瀛海環其外史以蠡測海東方朔海瀕遐逺不霑聖化龔遂海沆漭而四周成公綏王融作海賦以示顧愷之愷之曰此賦實超𤣥虛但恨不道鹽耳即注曰漉沙搆白熬波出素積雪仲春飛霜暑路南史傳記海晦也主引晦濁其水黒而晦釋名中國者天下八十一分之一有海環之如此者九瀛海環之總曰八極類説凡四海通謂之禆海禆海之外復有瀛海環之山海經扶桑在碧海之中有蓬莱山周迴五十里其海水色正黒謂之冥海無風而洪波百丈惟飛仙能到有鳥名精衛昔赤帝之女遊乎東海溺死其神化為精衛常取西山之木石以填東海山海經天地四方皆有海水相通地在其中葢無幾也四海之外皆復有海東海共稱渤海义謂之滄海南海之别有漲海西海之東有青海北海之别有瀚海博物志東有碧海廣狭與東海等水不鹹苦正作碧色扶桑在碧海中樹長數千丈一千餘圍兩榦同根更相依倚是以名扶桑十洲記沃焦在碧海之東有石濶四萬里厚四萬里居百川之下尾故又名曰尾閭𤣥中記東海波聲如雷廣記海中水遇隂晦波如燃火滿海以物擊之迸散如星火有月即不復見木𤣥虛海賦云隂火潛燃豈謂此乎嶺南異物志麻姑謂王方平曰自接待以来見東海三變為桑田向到蓬莱水乃淺於徃者畧半也豈復為陵乎方平曰東海行復揚塵耳神仙傳海有八德一漸深二不窮底三廣無涯四出珍珠寳五大身衆生所居六無増减七同鹹味八不宿屍海有三德一曰深廣無邊二曰清凈不受襍穢三曰藏積無量珍寳菩薩之德義同海也海有五德一澄浄不受屍二多出妙寳三大龍㴻雨沛如車軸受而不溢四風日不能竭五淵深不測並海志不受毁戒之屍出恵明之寳佛書集波如連山乍合乍散噓吸百川洗滌淮漢大明㩠轡於金樞之穴翔陽逸駭於扶桑之津南澰朱崖北灑天墟東演析木西薄青徐經涂瀴溟萬萬有餘吐雲霓含龍魚隠鯤鱗潛靈居豈徒積太顛之寳貝興隨侯之明珠包乾之奥括坤之區惟神是宅亦祇是廬何竒不有何怪不儲茫茫積流含形内虛曠哉坎德卑以自居𢎞往納来以宗以都品物類生何有何無木𤣥虛海賦吐星出日天與水際總衆流而臣下為百谷之君王王粲賦今夫大海其東無東其西無西其北無北其南無南旦則浴日而出之夜則韜列星涵太隂揚隂火珠寳之光以為明其塵霾之雜不處也必泊之西澨故其大也深也潔也光明也無我若者栁文東海賦大海盪泊兮顛倒日月魚龍傾側兮神怪隳突滄茫無形兮往来遽卒隂陽開闔兮氣霧滃渤招海賈奔螭出抃兮翔鵬振舞天吳九首兮更笑迭怒垂涎閃舌兮揮霍旁午東極傾海流不屬冺冺超忽紛盪沃殆而一跌兮沸入湯谷舳艫霏觧捎若木海若嗇貨號風雷巨鰲頷首丘山頽猖狂震􅊒翻九垓並同上海於天地間為物最鉅韓文鯨鵬之大蝦蠏之細無不容歸以生以食同上川后時安流天吳靜不發揚帆采石華挂席拾海月謝靈運委輸百谷歸朝宗萬川溢分空碧霧晴連州彩雲宻隋煬帝古来海寒多天風白波連山倒蓬壺長鯨噴湧不可渉撫心茫茫淚如珠吾曽弄海水清淺嗟三變四溟揚洪波巨海納百川憑髙逺登覽直下見溟渤李太白溟漲鯨波動胡為慕大鯨輙擬偃溟渤浩蕩乗滄溟杜詩本朝登州海市時有雲氣如宫室臺觀人物車馬歴歴可見謂之海市歐公使河朔過髙唐縣夜有鬼神自空中過人馬之聲可辨父老云二十年前晝過亦彷彿見人物謂之海市筆談趙忠簡公謫朱崖浮海而南張帆早行見波濤間紅旗靡靡極目不斷呼問舟人舟人摇手令勿語急入舟被髪持刃出蓬皆割其舌出血滴水戒使臣閉目坐船内頃間舟人相呼曰更生更生乃言曰朝来所見盖巨鰌也所謂旗者其鬛耳夷堅志始知百川歸因有含容德吾聞海之大物類無窮極潛竒興貝寳萬狀不一識歐陽公眇觀交瀛海坐詠談天翁天外黒風吹海立東海如碧環西北卷登莱雲光與山色直到三山回我觀大瀛海巨津與天並九州居其間無異蛇盤鏡海靜蛟鼉出海若東来氣吐霓東坡黄濁歸大壑山谷瀆經奠髙山大川注云大川曰瀆禹貢司儀天子冬禮四瀆於北郊周禮四瀆視諸侯記王制子川有瀆仲尼之道猶四瀆也經營中國終入大海捨舟航而濟乎瀆者末矣揚子史中國川源以百數莫著於四瀆漢溝洫志東井南垣之東四星四瀆江河淮濟之精也晉天文志川瀆浩瀚而分流成公綏傳百川海瀆萬里交通隋地理志瀆之為言獨也不因餘水獨能赴海唐許敬宗傳傳記江河淮濟為四瀆四瀆者發源注海者也爾雅四瀆何以視諸侯能通百川於海能出雲雨其德甚美説苑四瀆之源最髙而長從髙注下其流激峻桓譚新論河經河出圖易九河既道至于龍門西河導河積石至于龍門南至於華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海書河水瀰瀰河水浼浼誰謂河廣一葦杭之誰謂河廣曽不容刀河水清且漣猗河水清且直猗河水清且淪猗不敢馮河詩兖州其川河泲周禮晉人將有}
