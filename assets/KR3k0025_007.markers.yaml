  - {type: variant, offset: 19, length: 4, content: 夜詩蕩故, WYG: 歌曰瓠子決兮將奈何皓皓旰旰兮閭殫為河殫為河兮地不得寜功無已時兮吾山平為我謂河伯兮何不仁汜濫不止兮愁吾人齧桑浮兮淮泗滿乆不反兮水維緩於是卒塞瓠子築宫其上名曰宣房宫並同上吳起為魏西河守武侯浮西河而下中流顧謂起曰美哉山河之固此魏國之寳也起曰在德不在險史秦皇更名河曰德水本紀黄河為帶前功臣表武帝元光三年河水決濮陽汎郡十六發卒十萬救決河起龍淵宫紀漢武帝曰河乃大禹之所道也聖人作事為萬世功通於神明馮逡言禹非}
