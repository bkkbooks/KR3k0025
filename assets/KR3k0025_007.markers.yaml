  - {type: variant, offset: 1381, length: 2, content: 聲何, WYG: 朝徃窺門門將欲縳之嫗言其故後門將以犬血塗門嫗見血走去忽有大水遂淪為湖搜神記懷北縣有蔣公湖先代有祭祀祈請者湖輙下大魚與之永嘉記華容縣東南有雲夢澤一名巴丘湖荆州記交州有湖去合浦四十里毎隂雨日見有銅船出水上以雞酒為祭便大獲魚若此禮不設唯得牛糞交州記桓冲為江州刺史遣人周行廬山冀遇靈異既陟崇巘有一湖中有赤鱗魚使者渇極欲飲有羣白鱗魚張鬐向之使者不敢飲述征記龍目湖秦王東遊觀地勢云有天子氣使赭衣鑿湖中長岡使斷因改為丹徒京記梁武帝望京峴山盤紆似龍掘其右為闕湖梁典潤州遏坡有為湖名龍目湖郡國志子英常於闕湖捕魚得赤鯉持歸以穀養之一年遂生角趐魚云闕迎汝子英騎之即乘風雨騰而上天南徐州記髙沙湖昔陶侃㣲時喪母有二客來弔化為雙白鶴飛去後因以為名郡國志曲阿出名酒皆云後湖水所釀故醇烈}
