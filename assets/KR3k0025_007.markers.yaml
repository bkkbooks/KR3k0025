  - {type: variant, offset: 1417, length: 5, content: 京兆尹跨驢, WYG: 而急出城有青衣童子曰吾龍之子也乃引姥登山城遂陷為湖焉青瑣髙議集夫差姑蘇臺東有丹湖萬頃内有金銀塘陸賈新語曰舜藏黄金於巉巖之下捐珠玉于五湖之泉以塞淫邪之路伏滔登臺詩序李白汎沔州郎官湖詩序云白遷夜郎遇故人尚書郎張渭出使夏口沔州牧杜公漢陽宰王公觴于江城之南湖張公曰此湖古來賢豪遊者非一而枉踐佳景寂寥無聞夫子可為我標之嘉名以傳}
