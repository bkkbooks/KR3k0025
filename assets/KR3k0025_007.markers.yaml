  - {type: variant, offset: 25, length: 0, content: '', WYG: 民力以地形有勢故穿九河中國川源以百數莫著於四瀆而河為宗元帝時河決清河靈鳴犢口而屯氏河絶成帝時河決所灌之郡河隄使者王延世使塞三十六日河隄成以五年為河平元年谷永以為河中國之經瀆聖王興則出圖書王道廢則竭絶俱溝洫志三河在天地之中貨殖傳三河未澄光武贊河潤九里郭伋傳襄楷上書按春秋以来自古帝王未有河清者也河者諸侯之位清者屬陽濁者屬隂所當濁而反清者隂欲為陽諸侯欲為帝也傳大禹觀於濁河而受緑字晉地理志周保定二年青州黄河變清十里鏡徹龜兹國南三百里有大河東流號計戍水即黄河也北史唐肅宗乾元二年嵐州合河闗河三十里清如井水四日而變唐書朱全忠聚裴樞等及朝士貶官者三十餘人於白馬驛一夕盡殺之投尸於河初李振屢舉不中第故深疾縉紳之士言於全忠曰此輩嘗自謂清流宜投之黄河使為濁流全忠笑而従之唐書河源所出至于闐外為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異五代史傳記河出崑崙虛色白百里一小曲千里一曲一直爾雅九河一曰徒駭二曰太史三曰馬頰四曰覆釡五曰胡蘓六曰簡七曰潔八曰鉤盤九曰鬲津同上崑崙三層號曰天柱實河源水之靈府爾雅讚砥柱山禹鑿之以通河河水分流包山而過見水中若柱然水經崑崙山河水出焉至葱嶺山于闐國復分流岐山合而東流山海經黄河十二月各有水名正月名凌解水二月三月名桃花水四月名麥黄水五月名𤓰蔓水六月名􅈨山水七八月名荻苖水九月名登髙水十月名復槽水十一月十二月名蹙凌水水衡記河氷始合妖狐先聽方得渡言狐欲渡水先聽無水聲而後過述征記河者經天亘地之水河水清而天下平京房易傳河者水之伯上應天河孝經援神契聖人受命瑞必先於河神靈圖黄河千年一清聖王之大瑞治道記舜與三公臨河黄龍負圖出置舜前以黄金為繩白玉為檢河圖武王沈璧而榮光塞河尚書中候趙王政以白璧沈河有黒公從河出謂政曰祖龍来受天寳河圖考靈曜帝王將起河水先清清變白白變赤赤變黒黒變黄各三日也易乾鑿度魏賈鏘接黄河源水以釀酒詳見水類集與女遊兮九河衝風起兮水横波乗水車兮荷蓋駕兩龍兮驂螭登崑崙兮四望心飛揚兮浩蕩日將暮兮悵忘歸惟極浦兮寤懷魚鱗屋兮龍堂紫貝闕兮朱宫靈何為兮水中乗白黿兮逐文魚與女遊兮河之渚流澌紛兮將来下子交手兮東行送美人兮南浦波滔滔兮来迎魚鱗鱗兮媵予楚詞九歌輝輝洪河家國之濵襟帶晉衞領袖齊秦張暢頌鴻流導積石驚浪下龍門仙槎不辨處沈璧想猶存劉孝孫詩覽百川之𢎞壯兮莫尚美於黄河潛崑崙之峻極兮出積石之嵯峨登龍門而南遊兮拂華隂與曲阿凌砥柱而激湍兮踰汭洛而揚波成公綏賦黄河西来決崑崙咆哮萬里觸龍門黄河之水天上来奔流到海不復回鳴鞭走馬凌黄河㧞劒四顧驚茫然欲渡黄河氷塞川洪河凌競不可以徑渡水龍鱗鱗兮難容船李白誰開崑崙源流出混沌河積雨飛作風驚龍噴為波孟郊解通銀漢應須曲纔到崑崙便不清髙祖誓擬衣帶小仙人占斗客槎輕羅隠本朝張騫使大夏雖號為窮河源實不見河徒見兩水從葱嶺于闐合流入於蒲昌海即以}
