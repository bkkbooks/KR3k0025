  - {type: variant, offset: 2609, length: 7, content: 藏鳥盡信匪虛言, WYG: 矢鈇鉞之權韓文五都伯長送張童子序方州大臣元侍御書大夫烏公以鈇鉞鎮河陽温造序來帥熊羆四方作儀本頌出咨岳政入填邦紀惠文繄我輔臣洎兹列岳册尊號赦尹正大都節度羣州皇甫湜荆南判官序本朝咸平二年以王欽若為西川安撫使梁顥為陜西安撫使其後景徳三年始置河北沿邊安撫使而陜西沿邊諸州亦有之慶厯二年詔置河南安撫司八年詔置河北西路安撫皇祐四年詔廣桂二州帶經略安撫使熙寧五年罷諸路經略安撫司崇寧二年置河南安撫使宣和三年詔杭越州江寧府守臣並帶安撫使詔洪州守臣可依江寜府安撫使凡諸路安撫逐州知州兼州總諸將統制軍旅察治姦宄務以肅清一道凡兵民之政皆掌焉余與經略使司建炎元年李綱請沿河沿淮沿江置安撫使兼馬步軍都統管以文臣充二年令將兵處知州帶管内安撫使後省四年置鎮撫使罷逐諸路安撫使後如故咸平三年王欽若四川安撫使所至録問繫囚真宗諭之曰朕以觀省風俗尤難其人數日思之無易卿等各宜宣布徳澤使知朕勤詢之意並㑹要范雍充陜西縁邊州軍體量安撫使詔所至察訪邊民利害及體量官吏能否同上無安帥之樂尤待衮衣之還韓琦制制置使史大中五年以白敏中充招討党項行營都統制置等使}
