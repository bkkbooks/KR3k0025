  - {type: variant, offset: 2624, length: 1, content: 川, WYG: 使納忠於朝職源集實㕘戎幕俾倅中權請倅戎㫋介於戎車服我清憲授韓厥佐戎之任委以謀謨介僎之重並常集任在軍要權制兵機白六帖從軍則望重仲宣佐幕則才髙阮瑀魯連飛書燕將}
  - {type: variant, offset: 2624, length: 1, content: 川, krp: 使納忠於朝職源集實㕘戎幕俾倅中權請倅戎㫋介於戎車服我清憲授韓厥佐戎之任委以謀謨介僎之重並常集任在軍要權制兵機白六帖從軍則望重仲宣佐幕則才髙阮瑀魯連飛書燕將}
  - {type: variant, offset: 2626, length: 6, content: 岸何假舟馬祕, WYG: 而自殺陳琳草檄魏祖讀以愈風並同上益部以文昌為帥長俾鎮撫焉命審規為上介俾左右焉以才佐賢蜀必理矣輟三署郎加命服以遣之茍佐吾相以善政聞吾寧久遺汝於諸侯乎白集元翼殿我漢南求賢乞能以自㕘貳今以命洪茍致吾元翼於羊社别有陟明之典張洪制藉賓介以㕘謀猷裴厰制載筆乗軺乃作㕘謀出入朔方陪佐戎車栁文分閫之寄㕘制其半恭惟同自出妙選異髙標入幕知孫楚披襟得鄭僑文人藉門地閥閱冠雲霄藻翰惟牽率湖山合動揺杜甫今君行得所勢若脫鞲鷹檄筆無與讓幕謀識其膺攸績開史牒翰飛逐演鵬韓愈送侯叅謀本朝建炎四年詔兩浙西路安撫大使許置㕘謀㕘議各一貟紹興四年詔沿江三大使司亦許置㕘謀㕘議官五年詔江東西路湖南浙西安撫大使安撫使許置㕘議中興㑹}
