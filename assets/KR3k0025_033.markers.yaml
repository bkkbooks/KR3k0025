  - {type: variant, offset: 13, length: 0, content: '', WYG: 略乗朱輪於華邸曳長裾於王門名宦不為不遇白樂天文集賜札和詩恩意綢繆周益公集本朝太平興國四年置翊善一人續㑹要孝宗初就侍范元長以待制兼資善掌翊善自是率以從官為之其後親王府不復除第朝工兼贊讀直講而已淳熙末寜宗在嘉邸留丞相始薦用黄文叔自秘書除翊善不為兼官非常制也其後文叔遷起居舎人歴中書舎人給事中兼翊善是以從官兼七品之職矣朝野雜記大中祥符九年以張士遜崔遵度並充夀春郡王府賓客時王將授經擇耆徳方正有學術者為府官時士遜為河北轉運使雅素清謹遵度力學有行縉紳目為長者即召士遜等赴闕並命焉言行錄王府直講本朝太平興國四年别置侍講以常參官充政和七年詔改侍講為直講至道二年以孫奭為諸王府侍講大觀二年定王加王府侍講沈錫奏真宗時以張士遜為王友王答拜以示賓客今講讀之官職在訓導亦王之友輔也可如王友例令王答拜續㑹要鄭穆為嘉定二王侍講府寮缺貟御史陳襄請擇人神宗曰如鄭穆徳行乃宜左右王也居管下三十年三邸一紀非公事不至執政之門講說有法可為勸戒者必反覆摘誦二王敬禮焉東都事略校書郎王十朋兼建王府小學教授先是教授入講堂}
