  - {type: variant, offset: 2792, length: 1337, content: 天之所置其可廢乎左僖二十八天方授楚未可與爭雖晉之彊能違天乎左宣十五力田不如逢年善仕不如遇合史佞倖傳祕記云唐三世之後女主武王代有天下上惡之密問太史令李淳風祕記所云信有之乎對曰臣仰稽天象俯察曆數其人已在陛下宮中為親屬自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣通鑑唐太宗經君所無私諱記曲禮上注尊無二父前子名君前臣名注曰至尊無大小皆名記曲禮上從於先生不越路而與人言注尊不二也記曲禮上夫為人子者三賜不及車馬不受不敢以成尊比踰於父記曲禮上孔子曰天無二曲土無二王嘗禘郊社尊無二上記曾子問雖有三命不踰父兄記文王世子子云天無二日土無二王家無二主尊無二上示民有君臣之別也記坊記國無二君家無二尊以一治之也父在為母齊衰期者見無二尊也喪服四制子孔子曰天無二日民無二王孟萬章上大夫之臣拜不稽首非尊家臣也所以辟君也荀子大略君者國之隆也父者家之隆也隆一而治二則亂未有二隆爭重而能長久者荀子史周宰渠伯糾來聘父在故名左威四欒書將載晉侯鍼曰書退時鍼為晉侯右書將中軍國有大任馬得專之注云在君前故子名其父左成十六經拔茅茹以其彙征吉易泰卦子天下之至明能舉天下之至賢家語唯君子為能知類荀子楊素曰素聞惟賢知賢敢問夫子文中子王道篇史惟善故能舉其類詩云惟其有之是以似之左襄孝文召田叔問曰公知天下長者乎對曰臣何以知之上曰公長者宜知之田叔曰孟舒長者也西漢田叔傳賢人在上位則引其類而聚之於朝在下位則思與其類俱進在上則引其類在下則推其類以類相致也前漢劉向傳惟賢知賢為朕求可以自輔者通鑑漢成紀夫惟賢知賢惟堊知聖凡人安能知非凡人耶通鑑漢獻紀田子方曰進賢者亦賢也說苑傳記同聲則異類而相應意合則未見而相親賢者立於本朝而天下之豪相率而趍之也從其類也故詩有伐木之歌易有拔茅之喻也大戴記保傳篇經飲食男女人之大欲存焉死亡貧苦人之大惡存焉禮運如惡惡臭如好好色記大學子所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心孟子公孫丑上若合符節先堊後堊其揆一也孟子離婁下孩提之童無不知愛其親及其長也無不知敬其兄孟子夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五者人情之所必不能免也荀子王伯人之情雖桀紂又豈肯為其所惡賊其所好者哉荀子議兵凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨白黑美惡耳辨聲音清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨体膚理辨寒暑疾養是又人之所當生而有也是無待而然者也是禹桀之所同也荀子榮辱凡人之情得所欲則樂逢所惡則憂見利莫能勿就見害莫能勿避管子禁藏民之去就如火之於燥濕水之於高下同上琬琰之玉存泥沙之中雖廉者不釋淮南子史夫不令之臣天下之所惡也左宣十互入疾惡曾參孝其親天下願以為子子胥忠於君天下願以為臣史記陳軫傳和氏璧天下所共傳寶也史記司馬相如傳猶子弟之衛父兄手足之捍頭目前漢刑法志人情憚難而趍易好同而惡異通監魏明紀集至於稻也粱也膾也炙也豈聞有不嗜者哉儒墨同是堯舜同非桀紂並韓文麟之為靈雖婦人小子皆知其為祥也韓退之獲麟解劉伶今日意異代是同聲柳詩本朝韓魏公嘗言仁廟配享清議皆與沂公不與申公誠意不可欺如此遺事人情不問賢愚莫不畏天而嚴父東坡, WYG: ''}
