  - {type: variant, offset: 1022, length: 0, content: '', WYG: 防禦甚得止姦之要吳志後魏髙祖南伐以太尉元丕廣陵王羽留守京師並加持節北史隋楊瓚居守帝謂之曰六府事殷一以相付朕將遂事東方無西顧之憂隋書煬帝幸遼東命樊子盖留守備禦有功帝勞之比蕭何㓂恂大業九年代王侑留守西京十二年李淵太原留守王威髙君雅為副並通鑑太宗幸玉華宫房𤣥齡以疾卧總留臺詔曰公當蕭何之任朕無西顧之憂唐書髙宗幸洛陽令河間王孝恭次子晦居守顧曰闗中之事一以付卿令式之外有利於人者随事即行不須聞奏𤣥宗東巡宋璟為留守上曰卿國之元老為股肱耳目所有嘉謀嘉猷宜入告也璟因極言得失制曰所進言書之座右出入觀省以誡終身郭子儀為京城留守賜鐵劵圖形凌煙閣裴度留守東都時閹豎擅威度不復有經濟意乃治東都綠野堂野服蕭散為之把酒不問人間事裴度罷東都留守中人}
