  - {type: variant, offset: 2423, length: 0, content: '', WYG: 㑹要乃眷留都之重劉沆制委以别京之重文彦博制處居留之任賜彦博口宣守宫鑰之謹嚴謝表眷是别都之重韓琦詔近付京都之鑰荆公除李璋制經略使史唐貞觀二年邊州别置經略使此盖使名之始唐百官制以計度為上考集事為中考修造為下考同上永淳元年以婁師徳為河源軍經略副使帝曰卿有文武才勿辭劉雍為隴右經略使輕財愛士得人之死力唐書元結為容管經略使平嶺表夷獠代宗遣使慰勞加金紫光禄大夫戴叔倫為容管經略使其治清明仁恕多方略故所至稱最徳宗嘗賦中和節詩遣使者寵賜裴中立為安南經略使威聲風行並同上傳記唐節度兼度支管田招討經略使則有副使判官各一人分紀集牧人盡區處之方制國備形體之法道阻而備百貨地偏而具五穀儲峙委積師旅無庚癸之呼繕完板幹控帶兼戊已之位唐制本朝咸平五年始以張齊賢為邠寧環慶涇原路經略使又以錢若水為并代經略使自後不除人寶元中夏人入㓂始命陜}
