  - {type: variant, offset: 547, length: 261, content: 復出其出不出間不容髮西漢枚乘傳上吳王書譬之操鏌釾執其柄則人莫敢抗失其柄還見害也東漢崔寔傳政論千里之差興於毫端東漢匈奴傳上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也秦始皇營宮室而民怨叛者病人以利巳故也通鑑唐太宗機靜則有福機動則有禍通鑑唐武后帝曰丈夫得則為王失則為虜通鑑梁均王石敬塘曰夫事成於果決而敗於猶豫通鑑傳記中山君曰吾以一杯羊羹亡國以一壺食得士二人戰國策集必若所為危於累卵難於上天變所以為易於反掌安於太山選枚乘上吳王書互入在人所為用之則為虎不用則為鼠選荅客難出其言善千里應之苟違此義同衾以疑張華女史箴聽受一繆差以千里齊, WYG: 清}
