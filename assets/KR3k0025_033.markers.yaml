  - {type: variant, offset: 1329, length: 1091, content: 是亦去小人無幾矣東坡文譬諸草木種子若置之虛空不投地中雖經百千歲何緣得產若種之地中潤之以雨露暵之以風日則開花結子數日可待欒城集經若火之燎于原不可嚮邇書盤庚上燎之方揚寧或滅之詩小雅正月子故仁人之兵聚則成卒散則成列延則若莫耶之長刃嬰之者斷銳則若莫耶之利鋒當之者潰圜居而方正則若盤石然觸之者角摧荀子議兵臣之劍十步一人千里不留行王曰天下無敵矣此劍直之無前舉之無上案之無下運之無旁上絕浮雲下絕地紀莊子說劍史以此眾戰誰能禦之以此攻城何城不克左僖四鼓行而西西漢張良傳觸之者碎犯之者焦通鑑一卒畢力百人不當萬夫致死可以橫行後漢鄭泰曰譬猶驅虎兇以赴犬羊鼓烈風以掃枯葉誰敢禦之通鑑漢獻紀一夫荷戟千人莫當晉書羊祜傳盧藏用曰君如干將莫耶難與爭鋒通鑑唐紀若虎狼之得獸也何以當之通鑑唐代宗傳記干將鏌釾所刺無前論衡集一夫揮戟萬人不得進選陳孔璋書先鋒孰敢爭杜詩經若農服田力穡乃亦有秋書盤庚上若藥弗瞑眩厥疾弗瘳書說命上先知稼穡之艱難乃逸書無逸思其艱以圖其易民乃寧書君牙子無冥冥之志者無昭昭之明無惛惛之事者無赫赫之功荀子忍痛苦之藥石者所以除伐命之疾韓非子史不一勞者不久佚不暫費者不永寧西漢匈奴傳集孰不實而有獲楚辭經潛雖伏矣亦孔之炤詩正月君子之道闇然而日章記中庸子鄭子真耕乎巖石之下名振京師揚問神自後者人先之自下者人高之揚子寡見史法真隱居不仕前後四徵終不屈友人郭正曰法真名可得聞身難得而見逃名而名我隨避名而名我追通鑑漢順紀互入隱逸韓康採藥賣於長安市三十餘年時有女子買藥康守價不移女子怒曰公是韓伯休耶乃不二價耶康嘆曰我本欲避名今小女皆知有我焉用藥為乃遯入霸陵漢後書互入避名傳記魏武將見匈奴使自以形陋不足雄遠因使崔季珪代當自捉刀立床頭曰魏王何如匈奴使荅曰王雅望非常然床頭捉刀人此乃英雄也王馳遣殺使世說互入因言取禍集蘭芷幽而有芳楚辭居蔽而聞章同上經素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難記中庸道不行乘桴浮于海語公治長子欲居九夷或曰陋如之何子曰君子居之何陋之有語子罕樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也語語子路言忠信行篤敬雖蠻貊之邦行矣語衛靈公子人知之亦囂囂人不知亦囂囂孟子盡心下靜而與陰同德動而與陽同波上際於天下蟠於地莊子刻意史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季主傳互入隱逸寐與周公通夢靜與孔子同意東漢邊韶傳集採於山美可茹釣於水鮮可食起居無時惟適所安韓文若有人於群動處一代問彼為彼我為我不自潔不自污不巢許不伊呂水其心雲其身浮沉消息無往而不自得其為達人乎白樂天互入曠達居不必野惟性之寂止不必廣唯心之適皮日休集經婉兮孌兮總角丱兮未幾見兮突而弁兮詩甫田子日改月化莊子山水史積善在身猶長日加益而人, WYG: 却}
