  - {type: variant, offset: 2606, length: 1, content: 秦, WYG: 義鳳二年詔裴行儉為安撫大使歸至京師帝勞曰行儉持孤軍入深萬里兵不血刃叛黨禽夷可謂文武兼備矣唐書突厥入㓂拜狄仁傑河北安撫大使時民多脅從於賊仁傑願曲赦河北詔可馬儉為并州道安撫大使許以便宜並同上傳記唐貞觀初遣大使十三巡天下諸州水旱則有巡察安撫存撫之名節度使兼之則有副使分}
