  - {type: variant, offset: 72, length: 0, content: '', WYG: 為之亦為武臣之贈典大將軍以下又為武臣責降散官靖康元年陳過庭請遵藝祖罷諸節度使歸環衛故事於是節度使錢景臻等並為左右金吾衛上將軍四朝志崇寜四年倣古修三衛官親衛府勲衛府翊衛府各有郎有中郎率屬日直於殿陛親衛立於殿上勲衛立於􅀈殿翊衛立於兩階衛士之前中興乆}
  - {type: variant, offset: 72, length: 0, content: '', krp: 為之亦為武臣之贈典大將軍以下又為武臣責降散官靖康元年陳過庭請遵藝祖罷諸節度使歸環衛故事於是節度使錢景臻等並為左右金吾衛上將軍四朝志崇寜四年倣古修三衛官親衛府勲衛府翊衛府各有郎有中郎率屬日直於殿陛親衛立於殿上勲衛立於􅀈殿翊衛立於兩階衛士之前中興乆}
  - {type: variant, offset: 73, length: 0, content: '', WYG: 除授孝宗討論環衛官制度如節度使則領左右金吾衛上將軍承宣使則領左右衛上將軍在内則兼帶在外則不帶以十貟為額朝㕘侍殿並衣御帶體列宗室不在此例仍不差戚里及非戰功人祖宗外建方鎮内列環衛品式備具近来環衛乆不除授非所以儲材而均任也並孝宗委禁垣之提警胡文公環設衛官拱扈宸極宋漢制列衛宫邸千夫帶刀宿衛王室環列之官執金為貴曲阜集幹辦皇城司史梁乾化六年詔曰端闈正門也宜以時開閉用達陽氣委皇城使檢校閉啟車駕出則闔扉五代史傳記唐城門郎掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之開則先外而後内闔則先内而後外所以重中禁尊皇居也候其晨昏撃鼔之節而啓閉之通典本朝舊號武徳司大平興國詔改今名實錄政和官制改皇城使為武功大夫而其職任則選内外通領焉紹興中詔行宫禁衛所改為行在皇城司三年詔皇城司係專掌禁庭出入不𨽻臺察㑹要國朝以皇城使比文臣少卿選人才優長者一貟供職謂主管皇城司也舊典政和改制皇城司依舊以横行或御帶二貟主管焉同上御前忠佐軍頭引見司本朝國初但曰軍頭引見司端平元年改軍頭司為御前忠佐軍頭司引見司為御前忠佐引見司軍頭司掌崇班供奉及諸州駐防捕捉之事引見司掌軍頭名籍諸軍搜閱引見之事分紀中興以來提㸃官幹辦官並以閤門官充紹興二十二年詔}
