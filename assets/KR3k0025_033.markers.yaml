  - {type: variant, offset: 14, length: 2, content: 智慮, krp: 與皇孫叙賓主而教授居賓位十朋不可王特為之加禮而位教授於中中興年錄周孟陽嘉祐中為澤王潤王宫教授辭詞皆孟陽為之贊導勤至雖家事之微無所不及陳聖賢出處之方參以古今禍福之變以為箴規真宗悚然起拜治平元年詔曰雖王子之親必由於學稽古大猷若時訓考三徳三行之順有四術四教之崇歴辟承風自家刑國今一祖之後諸宗之支亦嘗著命於前命官以訓或兼職他邸或備位終年誘導失宜滅裂無狀時詔近臣並薦能者成童而上訓習經書小學之居通達名數固當漸績簡編恪修志業居常謹思戒在中止所謂少成若天性習慣如自然顧禮義之方須長者之誨紹興二十五年以趙逵兼普安恩王府教授逵時為禮部郎及引對上曰卿乃朕自擢秦檜日薦士曾無一言及卿以此知卿不附權貴真天子門生也他日兩王方學詩冀有以切磋之因奏言路久壅願陛下廣覽兼聽庶養成敢言之氣上嘉納之吕氏廣記王府贊讀史唐開成元年宰相李石奏太子有侍讀諸王亦有侍讀無降殺之禮宜改奉諸王侍讀隋楊注字元度為周冀王侍讀王甚重之每曰楊侍讀徳業優深孤之穆生也隋書梁陶𢎞景為諸王侍讀雖在朱門閉影不交外務惟以披閱為務梁書本朝英宗治平元年諸王府置侍讀二人徽宗政和七年張大亨奏竊見侍讀之官在太子詔之侍講侍讀而在諸王府者亦有侍講侍讀官號比擬稱謂相紊詔諸王府侍讀改為贊讀侍講改為直講姚思廉仕隋為代王侍讀髙祖定京師獨思廉持正觀者歎曰仁者之勇謂此人乎太宗嘗語及隋事遣使遺物三百段致書曰想卿節義之風故有此贈東都事略蔡挺傳兄杭字子直為潁川郡王伴讀英宗在藩邸器重之請於濮安懿王願得與遊每見杭衣冠盡禮義兼師友同上王府記室傳記漢三公及大將軍皆有記室令史主上表章奏報書記魏太祖輔漢以陳琳阮瑀管記室軍國書檄多二人所為職林隋伯叔昆弟皇子是為親王府置記室參軍唐因之六典本朝太宗雍熙二年以王龜從等並為陳王韓王冀王府記室參軍太宗諭之曰諸子生長深宫未知世務必資良士贊導為善使日聞忠孝之道卿等皆謹恪有守故兹謹選各宜勉之曲阜行幸雍制鄭雍元豐中為皇弟嘉王府記室參軍在王府凡十年不遷而自處淡如士論歸重本傳畢文簡公士安字仁叟兼冀王府記室參軍端拱中詔王府各上所為文帝問近臣曰文吾知之其行孰優皆以公對帝喜以本官知制誥言行錄神宗封淮陽王潁王韓維皆為記室參軍王每事咨訪維悉以對至拜起進退趨揖之容皆陳其節職林孫覺傳字萃老遷昌王府記室㕘軍王禮之問終身之戒覺為陳諸侯之孝作富貴箴韓維字持國神宗初就外傅以維為王府記室神宗嘗與維論天下事語及功名維曰聖人功名因事始見人不可有功名心神宗以為善續㑹要諸王宫大小教授本朝太宗至道元年以貟外郎孫蠙充皇姪皇孫教授從所號也真宗咸平元年以朱昻兼南宅教授張蔚兼北宅教授嘉祐以来置諸宫教授立講書課試規罰之法㑹要英宗治平元年教授更不兼官以兩處供職有所廢缺㑹要時宗室本支之盛自率府副率以上八百餘人而教授之官六貟而已因詔增置教授官凡皇族年三十以上者百十三人置講書四貟年十五以上者三百九人增置教授五貟年十四以下者别置小學教授十二貟並舊六貟為二十七貟以分教之大學京朝官充小學選人充四年詔今後諸宫院大小學教授有缺令國子監與學士院舎人院輪舉熙寜元年小學教授亦輪京朝官元祐二年詔諸宫學教授缺選所舉學官及可為師表可備講讀科不足則三省選陞朝官有出身年四十以上者充崇寜三年睦親宅及北宅廣親各大學小學教授一貟廣親北睦親西及周王宫大學兼領小學各二貟大小學兼領始於此朝野雜記節度使史節度使掌總軍旅專誅殺初授具帑抹兵杖詣兵部辭見觀察使亦如之辭日賜雙旌節度行則建節樹六纛中官祖送次一驛輒上聞入境州縣築節接迎以鼓角衙仗居前旌幢居中大將鳴珂金鉦鼔角居後州縣齎印迎於道左視事之日設禮案髙尺有二寸方八尺判三案百官志裴玢同州劉公濟卒授玢節度使元和三年徙山南西道玢為治嚴稜畏逺權勢不務貢奉蔬食敝衣居處取庇風雨而已倉庫充實百姓安之唐書傳記節度使以八月考其治否銷兵為上考足食為中考邊功為下考諸王拜節度使者皆留京師崔從由尚書左丞領鄜坊節度使屬部多神䇿屯軍數亂法驕横吏不能制從一繩以法下皆裹足畏之本傳袁滋徙義成節度使滑用武地東有淄青北魏博滋嚴備而推誠信務在懷来李師道田季安畏服之居七年百姓立祠祭祀六典盧鈞擢嶺南節度使時稱潔廉專以清静治華蠻數千走闕下請為鈞立生祠見廉門集擁節總戎率身和衆劉禹錫令狐光廟碑本朝國初外戚罕有建節者太祖時杜審進以元舅之尊窮老才得節度使仁宗用張堯佐一時名臣力争之其後拜除寖多中興後外戚節度使二十有二人哲廟以前節度使未有以恩澤除者若王顯張昊輩雖以舊恩貴然皆以嘗任宥府乃得之崇寜後始除郭天信朱勔其後童戩凡十餘人中興後曹勛曾覿輩以攀附恩建節非常例也通考承宣使史唐中世以後節度使往往自擇將吏號為留後唐兵志集留後之秩實亞節旌龍叔除皇叔祖制自刺史而上皆武著之髙選茍非尤恩不以叙進况承流宣化名秩益顯尚思稱塞無或不祇張于潮制本朝沿唐制方鎮有節度觀察使留後又官制舊典祖宗時留後惟宗室國戚自當叙遷若外官惟馬步軍都指揮使方就除焉政和七年詔觀察留後乃五季藩鎮官以所親信留主後務之稱不可循用可冠以軍名改為承宣使四朝志靖康元年臣僚言遥郡正任恩數遼絶自遥郡遷正任者合次第轉行今有自遥郡與落階官而授正任直超轉本等正官是皆奸巧希進躐取乞應遥郡承宣使有功勞除正任者止除正任刺史從之同上觀察使史唐貞觀初遣大使十三人巡省天下諸州水旱則遣使有巡察安撫之名神龍三年以五品以上二十人為十道巡察使察舉州縣景雲二年置十道按察使道各一人乾元二年改曰觀察使唐職官志常衮為福建觀察使閩人未知學衮至設鄉校使作為文章親加勸導由是俗一變白六帖張建封為觀察使是時四方多故乃以繕陴隍益治兵四鄙恱服希烈使掌帥悍卒来戰建封皆沮衂之同上傳記觀察使掌察所部善惡舉大綱凡奏請皆屬於州李徳裕為浙西觀察使南方信禨巫雖父母癘疾子棄不敢養徳裕擇長老可語者語以孝慈大倫數年惡俗大變又按屬州非經祠者毁千餘所撤私道山房千四百舎盗無所廋天子詔褒揚白六帖唐敬宗荒僻日甚大臣罕得進言浙西觀察使李徳裕身居廉鎮乃心王室遣使獻丹扆箴六首張建封貞元四年為泗濠觀察使入覲徳宗禮遇加等及還鎮賜詩又令齎所執鞭賜曰卿忠正節義歲寒不移故以賜卿表忠節也同上集明闡使威勤宣王命白六帖求人瘼分國憂同上廉察諸侯糾繩列郡澄清郡邑鎮撫黎元宣埋輪之威布露寃之政當至治之朝委廉察之寄勞来諸郡納紀列城奉詔修以安人參戎索以訓旅並同上本朝沿唐制置諸州觀察使凡諸衛將軍及使遥領者其資品並止本官叙祥符中詔觀察使並帶刺史政和中詔承宣觀察使仍不帶持節等四朝志防禦使史防禦使以無虞為上考清苦為中考政成為下考百官志唐武后聖厯元年以夏州鎮領防禦使防禦使之名自此始開元二年薛納為隴右防禦使通鑑天寶中安祿山犯順大郡要地當賊衝者置防禦守捉使事物紀錄代宗即位諸州防禦使立明年授田承嗣魏博州郡防禦使俄改節度使盖防禦之名不廢也唐書傳記唐承訓宣宗擢為天徳軍防禦使軍中馬乏虜来戰數負承訓罷冗費市馬益軍軍乃奮張李景略窮塞苦寒地瘠鹵邉戸勞瘁景略至節用約已與士卒同甘苦鑿咸應永清二渠溉田數頃儲廩器械畢具威令肅然聲雄北塞回紇畏之並六帖集宜升禦侮之名以重分憂之寄絳州防禦使額勅宜進國位以稱禦侮荆公除皇姪制升軍禦之任增使節之華胡文公制正名閑禦之任欒城除曹評制本朝沿唐制置諸州防禦使唐防禦使在團練使之下本朝陞之於上職略官制舊典防禦團練刺史均謂之正任外官初除管軍便帶正任刺史或随其人見帶遥郡就除之其横行諸司使帶遥郡防禦使者年勞至深邊功優異即落遥郡為正任官其宗室國戚除再遷便領正任乃國朝舊制職官團練使史肅宗置團練使守捉使大領十州小者三五州代宗時當國令刺史悉帶團練使並唐書大率團練使以安民為上考懲奸為中考得情為下考百官志李少良大厯八年晉州男子郇漠以麻總髮行哭長安東市人問之曰我有字三十欲以獻上其言團者請罷諸州團練使唐史傳記楊綰奏刺史自有持節諸軍事以掌軍旅司馬右司武所以輔軍即今副使司兵參軍今團練判官官號重複可罷天下捉守團練使詔可見沿革表工部侍郎錢昱為鄂州團練使三州無善政至是郊祀進秩上詔宰相曰昱貴家子無檢操不宜任丞郎故有是命同上集肅綰戎團分持軍簿文公賜團練使詔戎團之列曲阜除曲珍制分總戎團盖參中權之御王岐公除王道制兵團之制以訓練為事曲阜除皇兄制本朝沿唐制置諸州團練使職略刺史經内有百揆四岳外有州牧侯伯書史郭伋為幷州刺史行春赴竹馬兒童之期何武為揚州刺史所舉奏二千石長吏必先露章服罪為虧除免之而已並漢書晉羊祜為荆州刺史常登峴山及祜薨乃立碑峴山百姓見其碑莫不悲感號為墮淚碑晉史孟簡為常州刺史州有孟瀆久淤閼簡治導溉田凡四千頃以勞賜金紫狄仁傑出為寜州刺史撫和戎落得其歡心鄉人勒碑以頌唐史敬暉為衛州刺史時河北經突厥所騷方秋築城暉曰金湯非粟不守豈有棄農畆事池隍哉唐書房琯乾元元年出為汾州刺史始汾以武人領刺史綱目廢弛即治府為營吏攘民居琯至一切革之民以便安政聲流聞同上傳記漢晉以來太守以刺史稱唐武徳元年改太守曰刺史加賜持節從三品職同牧尹但有郡刺史亦有州刺史大抵以武臣帶焉通典劉彚進歙州刺史野媪將為虎噬幼女號呼搏虎俱免觀察使韓滉表贊治為異行加金紫盧杞由吉州刺史授饒州刺史給事中袁髙當草制遂執以謁宰相盧翰劉從一曰杞幸免族誅若更移郡秩恐失天下望翰從一不改遂命舎人草制詔出髙又執之不下唐宗室齊物為陜州刺史開砥柱通漕路發重石下得古鐵㦸若鏵然銘曰平陸上之詔因以名縣漢王褒為益州刺史作中和樂職之詩同上集詔餞朝廷牧符分海縣憂股肱還入郡父母更臨州預待郡方最三公不逺求張說洛橋餞諸刺史詩粲粲元道州前聖典後生觀乎舂陵行歘見哲俊情復見賊退篇結也實國楨道州哀黎庶詞氣浩縱横兩章對秋月一字偕華星杜甫元使君舂陵行潞州新開府壺闗寵舊林妙旌循吏徳持說庶甿心禮樂中朝貴仁明列郡欽㑹書丞相筆先賜潁川金明皇賜崔日知潞州詩聖情留曩鎮佳氣翊興王增㦸雄都府髙車轉太常横八闕山閣五龍長連帥新恩命天人舊紀綱闕分官特以專城貴深惟列郡安政行思務本風靡屬勝殘有令田知急無分獄在寛闕牧送新岳詩國信使經使於四方不能專對雖多亦奚以為使於四方不辱君命並語史文帝二年詔使者冠盖相望結轍於道以諭朕志於單于前漢陸賈使南粤尉佗賜賈槖中􅋔直千金蘇武使匈奴匈奴脅蘇武令拜以刀臨之武曰堂堂漢使安能屈於四夷哉匈奴幽蘇武置大窖中絶不與飲食天雨雪武卧齧雪與氈毛并咽之數日不死乃徙武北海上使牧羝羝乳乃得歸武至海上廩食不至掘野鼠及去草根而食之杖節牧羊節毛盡落匈奴與漢和親漢求武等匈奴詭言武已死後漢使復至匈奴武夜見使者教之謂單于言天子射上林中得鴈足有繫帛書言武在某澤中使者以讓單于單于驚謝漢使遣武歸武留匈奴凡十九歲始以强壯出及還鬚髮盡白路温舒願給厮養暴骨方外以盡臣節張騫使月支匈奴留騫十餘歲持漢節不失並前漢永平八年遣越騎司馬鄭衆報使單于班超使鄯善知北敵使來夜斬匈奴使後更選使使西域上曰吏班超如何故不遣而更選乎並後漢突厥攻太原鄭元璹持節往勞既至敵以不信咎中國元璹随語折讓無所屈徐乃數其背約突厥愧服太宗賜書曰知公口伐可汗邊火息燧朕何惜金石賜於公哉元璹五䀻絶域帝勞之曰卿不辱於敵可比蘇武張騫矣唐書新羅告急朱子奢充使太宗曰海夷頗重學問卿為大國使必勿藉其束脩為之講說使還稱㫖當以中書舎人待卿唐儉使突厥還太宗謂曰頡利可取乎儉曰諭國威靈庶有成功婁師徳使吐蕃諭國威信張薦專對詳辨三使絶域李揆徳宗時為入蕃㑹盟使揆至酋長曰聞唐有第一人李揆公是否杜暹使敵敵以金遺暹暹固辭左右曰公使絶域不可失戎心乃受焉隂埋幕下已出境乃移文俾取之突厥大驚並唐書傳記漢髙祖遣婁敬使匈奴結和親約此中國與北敵通使之始也使匈奴中郎將擁節秩二千石漢舊儀服一介之使合兩君之忻者左右之臣也賈誼集丁年奉使白首而歸單車之使出禮義之鄉入無知之俗李陵書揚旌出疆反駕奔命有所啓奏多叶便宜白集歸要領於闕下納斥堠於疆外獨以張博望傅介子為奉使之首明取材之難也元和制誥今子使萬里外國無幾微見於言面豈不真知輕重大丈夫哉韓文身帶霜威辭鳳闕口傳天語到雞林劉禹錫本朝開寶七年契丹願講和好使命始通我朝遣郝崇信吕端為使此報聘也復遣宋準郝文度為契丹國信使太宗即位命馮正張玘為使繼好太平興國二年命李續為契丹正旦使而正旦之名始此景徳澶淵之役命周漸為契丹生辰使而生辰之名始此國母亦有生辰正旦使真宗上天遣薛貽廓使於是有告哀之名遣薛田使於是有遺留禮物之名遣任中行使於是有告登寶位之名遣劉鍇趙賀使於是有皇太后皇后迴謝禮物之名慶厯中契丹遣使求地富公増幣與平因為報使嘉祐三年契丹母蕭氏卒遣朱處約為祭奠使李師中為弔慰使建中靖國元年命張舜臣為遼國賀登位國信使㑹要建炎中興未和則有祈請通問使已和則有報謝使紹興以後歲遣生辰正旦使焉中興㑹要國初雄州當用兵之際有機宻事擇馴謹吏處之號機宜司及契丹請和改為國信司職略韓琮使契丹敵主問其家世琮言父在先朝已嘗持禮聘来敵主喜曰與中國通和久父子仍奉使宜酌酒勸我本傳張方平使契丹契丹主顧左右曰有臣如此佳哉酌飲玉巵牽所乗馬以賜四朝史王拱辰使契丹契丹主設宴垂釣親鼔琵琶以侑謂其相曰此南朝少年狀元入翰林十五年矣吾厚待之許將奉使契丹北人聚觀曰㸔南朝狀元及賜射先破的並同上昌言官兩制乃為天子出使萬里外强悍不屈之敵建大斾從騎數百送車千乘出都門意氣慨然丈夫生不為將得為使折衝口舌之間足矣石昌言引副使傳記使者過邦至於境使次介假道儀禮禮大夫為卿介介副也禮卿出聘以大夫為上介士為衆介類要副介奉玉帛以聘同上集繼好二邦奉辭萬里副車之任選亦不輕白集前命使臣洎介臣持節元集本朝慶厯詔奉使接送伴燕㑹毋過飲酒語言務在大體仍委使副遞相覺察㑹要接送伴使史馮奉世以衛侯使持節送大宛諸國客漢書東魏遣李諧聘梁武帝與語應對如流上曰朕今日遇勍敵時南北務以俊乂相誇銜命接客必盡一時之選無才望者不得與焉通鑑本朝景徳元年契丹遣使朝於行在命知澶州何承矩郊勞翰林學士趙安仁接伴明年以杜夢證康宗元接伴候使回日充送伴㑹要接送館伴使並遴選有出身能專對之人職略景徳修好虜使至趙安仁接伴敏於酬對皆切事機時論以為得體本傳皇祐初接待契丹使者舊例使者入境所至置頓皆出於民珪請出太官供帳器皿為三頓之具番休以濟迄今便之王珪傳館伴使史使在疆場膳宰致餼司理授館穀梁傳本朝祥符二年詔自今契丹使有例外贈遺接伴館伴使者再辭不已則許納㑹要天聖五年契丹遣蕭藴杜防來以程琳為館伴藴出坐位指曰中國使者至契丹坐位殿上今契丹使至中國不然請升之琳曰此真宗皇帝所定不可易防不能對曰令宰相議或曰此細事爾將許之琳曰後更欲其大者奈何遂止琳後為參政本傳奉使經四牡勞使臣之來也詩序皇皇者華君遣使臣也送之以禮樂言逺而有光華也詩序星言宿駕定之方中凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之道路用旌節並周禮銜君命而使禮記時聘以結諸侯之好間問以諭諸侯之志大行人行人失辭左傳韓須受命而使子員道二國之言無私鄭子羽知四國之為兵交使在其間可也令吏人完客所館以無憂客使亦不使一介行李告於寡君卿非君命不越境以君命越疆而使晉人輕魯幣而益敬其使並同上行人挈國之辭者也穀梁傳子葉公子髙將使於齊曰吾朝受命而夕飲氷我其内熱歟莊子雖古之膚使其劣諸揚子史廣武君說韓信曰不如發一乘之使奉咫尺之書以使燕也司馬相如建節往使蜀太守以下郊迎縣令負弩先驅終軍步入闗闗吏與軍繻軍棄繻而去及軍為謁者使行都國建節東出闗闗吏識之曰此使者乃前日棄繻生也本始初遣王平等五人持節行郡國舉賢良問民所疾苦東粤相攻武帝使汲黯往視之至吳而還報曰粤人相攻固其俗不足以辱天子使者暴勝之為直指使者衣繡衣縱横家者流盖出於行人之官孔子曰使乎使乎言其當權事制宜並漢書漢和帝分遣使者微服單車各至州縣觀察風謡順帝詔遣八使分行州縣皆選素有威名者天下號曰八俊范滂少勵清節時冀州盗起以滂為清詔使按察之滂登車攬轡慨然有澄清天下之志並後漢馬周以監察御史奉使稱職貞元八年州縣大水權徳輿建言宜選羣臣明識通方者持節勞來徳宗遣黜陟使十一人行天下陸贄言使者請以五術察風俗陸元方使嶺外涉海風濤元方曰吾受命}
