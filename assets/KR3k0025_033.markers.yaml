  - {type: variant, offset: 2618, length: 0, content: '', WYG: 本朝掌經畫邊鄙軍旅之事政和中以内侍童貫為之四朝志宣和末姚古為京畿輔郡兵馬制置使靖康初种師道為河東路制置使錢盖為陜西五路制置使實錄建炎元年有招提賊盗制置使自王淵始三年有行在軍制置使自劉光世始又諸路皆有副使自江浙陳彦文程千秋始六月浙西安撫使康允之帶本路制置使安撫帶制置自此始也四年罷有沿江都制置使管江南東路知建康府紹興二年有沿海制置使兩浙東路三年有安撫制置使六年始鑄印以某路某路制置司為名㑹要㕘議官史嚴武鎮成都奏杜甫為㕘謀甫放恣嘗醉登武牀瞪目視武曰嚴挺之乃有此兒}
