  - {type: variant, offset: 21, length: 3, content: 斷義必, WYG: 傳士直指之繡衣觀風之八使按察之六條皆所以宣道徳意延問疾苦究吏治之得失視風俗之厚薄其歸一也職源使者及境張旜使者若過邦至於境使次介假道儀禮周秦帝以歲八月遣輶軒之使採異代方言還奏之風俗通晏子使吾辯於辭習於禮說苑奉令受使結和諸侯通命達㫖吳越春秋奉璽書使者乘馳傳日夜千里為程漢舊儀唐舊制兩省官出使得朱衣吏前導職林集建節往馳四乘之傳因宣使㫖令百姓知天子意諭蜀檄古者交政於四方謂之使栁文宋廣平之沉下僚也蘇公味道時為繡衣直指使者廣平投以梅花賦蘇盛稱之自是方列於聞人之目是知美賢卓犖不外文字然猶用片言借說於先逹之口席其勢而後驤首當時矧碌碌者疇能自興劉夢得揚虎視之威}
