  - {type: 'tls:seg', offset: 53, content: '', id: KR3k0025_CHANT_033-2a.6}
  - {type: variant, offset: 53, length: 1, content: 縮, WYG: 察使之上都虞候在正任防禦使之上四朝制中興以後主管侍衛馬軍司一貟幹辦公事準備差遣㸃檢醫藥飯食常出戍建康㑹要元豐二年上批都虞候燕達能體朝廷訓齊士伍之意故二司所總師徒技能日進宜與二子閤職㑹要材官車騎之衆號噭萬旅命汝掌之盧政制遂階升於騎帥玉堂集早分將鉞常帥騎兵胡文恭參司親衛出護邊兵王從正益遷徙騎之虞王岐公仍遷軍候之職東坡步軍司本朝掌步軍諸指揮之名籍侍衛扈從及大禮宿衛如殿前司政和四年詔以步軍都指揮使副都指揮使在正任觀察使之上都虞候在正任防禦使之上四朝志中興以來主管侍衛步軍司一貟幹辦公事準備差遣㸃檢醫藥飲食㑹要虞度兵計候司戎事亦統護之苖侵制補督將之闕設候奄之職以訓齊軍令王岐公參典親衛曲阜制四廂本朝捧日舊曰日騎天武舊曰控鶴太平興國二年詔改控鶴曰天武雍熙四年改殿前司日騎曰捧日龍衛舊曰龍捷神衛舊曰虎捷太平興國二年詔改龍捷曰龍衛虎捷曰神衛皆以美名易禁軍之舊號也殿前司捧日天武馬軍司龍衛步軍司神衛謂之上四軍各有左右廂廂各三軍東齋記事八桄梯見三衙端拱初以龍衛左廂都指揮使孔守正習練軍旅特置龍神衛四廂都指揮使以寵之本朝蒙求擢典親衛淇水集帶御器械本朝國初以來嘗選三班以上武幹親信者佩櫜鍵御劒或以内臣為之㑹要初名御帶咸平元年改為帶御器械景祐詔無得過六人舊制外任帶御器械過闕朝見不宿衛熙寜六年向寶移真定府路總管過京師特命宿直㑹要御帶分禁庭内宿直舎在崇政殿内職居嚴邃多任國戚及内侍兩省押班亦兼領或有邊功優異間除内官就領兵職於三路為武臣之榮遇官制太宗嘗令善工製金帶時石普帶御械方侍立輒進曰願以賜臣太宗即予之長編紹興七年樞宻院言帶御器械官合帶挿上曰祖宗置此官所以衛不虞也今乃佩數隻骹箭不知何用方承平時置飾以珠珍車駕每出為觀美而已他日恢復此等事當盡去之中興㑹要環衛官史中尉即執金吾漢紀世祖微時歎曰仕官當作執金吾後漢書梁有左右中郎將以分司丹禁侍衛左右髙熲拜左衛大將軍每坐朝堂北槐下聽事其樹不依行列有司請伐之上特不令剪去以示後人並隋書段志𤣥為左驍衛大將軍文徳皇后之葬勒兵衛章武門太宗夜遣使至志𤣥拒曰軍門不夜開使者示}
