  - {type: variant, offset: 49, length: 3, content: 巧匠旁, WYG: 本朝神宗熙寜中嘗遣使察訪哲宗紹聖中詔三歲一遣郎中御史按察諸路監司㑹要三衙本朝沿五代之制有侍衛親軍及殿前兩司盖侍衛親軍起於後唐職略殿前始於周世宗顯徳元年㑹要國初侍衛親軍置都指揮使雖都虞候亦在殿前都指揮使之上自王超罷職無復任者而侍衛馬步軍遂分為二并殿前號三衙而馬步二軍始居殿前司之下焉職略三司天下之兵柄皆在其權雖重而軍政號令則在樞宻院此祖宗之微意非前世所及也石林燕語三衙内中見宰執皆横杖於文徳殿後主廊階下唱喏宰相出笏階下揖之外遇從官於通衢皆避焉此禮久廢惟内中横杖之禮至今不廢也華談寶元康定間余自貶所還京見王君貺初作舎人在坐見殿前馬步軍立門外呈牓稱不敢求見舎人遣人謝之而去慶厯三年余作舎人此禮已廢然三衛軍相逢而斂馬駐足前呵者傳聲大尉立馬急遣人謝之比舎人馬過然後敢行後余官於外十年而還遂入翰林學士相逢分道而過更無斂避之禮盖兩制漸輕三衙漸重歸田錄熈寧九年殿前都指揮使郝質言往軍器監與判監劉奉世㑹議軍器上批三師朝廷待遇禮繼二府事體至重寺監小官豈可呼召使赴期㑹自今止令移文定議㑹議管軍八位武弁軍門號八桄梯盖三衙都指揮使三軍都虞候四廂都指揮使為管軍官制殿前司史周世宗詔使天下豪傑躬親試閱選藝超絶及有身首者分署為殿前諸班因有散貟散指揮使内殿直鐵騎控鶴之號五代史集禁旅典兵為吾爪士杜牧行髙駢制壯序虎旅宋廣平本朝掌殿前諸班直及步騎諸指揮之名籍入則侍衛殿陛出則扈從乘輿大禮則提㸃編排整肅禁衛鹵簿儀仗掌宿衛之事四朝志政和四年詔殿前都指揮使在節度使上副都指揮使在正任承宣使之上都虞候在正任防禦使之上同上中興以來主管殿前司一貟其屬有幹辦公事主管禁衛各二貟准備差遣准備差使㸃檢醫藥飯食各一貟尋減幹辦事一貟增書寫機宜文字一貟㑹要張耆真宗朝為都虞候是時大興宫室以奉祥瑞雖大臣不敢議耆上言土木之侈不足以承天意本傳燕達為都指揮使達起行伍然喜讀書手不釋卷神宗嘗問用兵當何先曰莫如愛上曰愛克厥威可乎達曰威非不用要以愛為先本傳錫以六纛總此八屯嘉其扈從之勤温公制内總七年之師外分十連之任郝質制内典嚴衛外秉節旄總領禁衛為王虎臣董率王旅賜質詔進總凝嚴之務歴圖勁傑之資屬嚴除之領帥仗帥鉞於殿除並王岐公行李璋制置帥殿陛屬之董齊就列大廷典綏王旅並南豐擬制祇護殿岩東坡維朕虎臣典綏王旅環列增肅周廬不驚燕達制營衛之士皆天下武臣之髙選虞度軍中之事是可非其人哉荆公行都虞候制宿衛左右而虞度候視乎軍中者其甚寵南豐擬制馬軍司本朝掌馬軍諸指揮之名籍侍衛扈從及大禮宿衛所掌如殿前司政和四年詔以馬軍都指揮使副都指揮使在正任}
