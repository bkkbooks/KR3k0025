  - {type: variant, offset: 11, length: 0, content: '', WYG: 物養太子哉史記漢叔孫通為太傅漢髙帝以趙王如意易太子通曰太子天下之本本一揺天下震動奈何以天下為戲髙帝曰吾聽公漢書漢夏侯勝為太子太傅受詔撰論語年九十卒太后為朞服報師傅之恩儒者以為榮同上集願令皇太子洎諸王齒胄講業嚴師問道輟色荒之娱資游習之善豈不美哉唐元稹書後漢應劭漢官儀太子太傅日就月將琢磨玉質言太子有玉之質磨以道也萬化谷灼灼英台峩峩徳傅沈約詩太子太保經召公為保書序史後魏顯祖將禪位於京兆王子推陸馥抗言皇太子至徳承基四海屬望臣請刖脛殿庭有死無二乆之帝意解語曰馥正直也其能保吾子乎遂以為太保魏志蕭瑀為太子太傅太宗曰三師以持導太子者禮不尊則無所取法唐書唐張茂昭憲宗元和二年詣朝五奏乃聽顧留不許加兼太保唐書傳記唐李綱為太子太保為陳父子君臣之道問寢視膳之方聽者忘倦太子嘗商確古来君臣孝忠盡節之事綱凛然曰託六尺之孤寄百里之命古以為難綱以為易每吐論發言正色慷慨有不可奪之志太子未嘗不聳然禮待本傳集薄官奉儲明唐褚亮詩春宫秩甚尊蘇頌太保制本朝王溥乾徳二年罷為太子太保故事一品班於省臺之後太祖因見溥曰溥舊相當寵異即令分臺省班於東西國史太子少師史唐房𤣥齡為太子少師時皇太子將行拜禮備禮以待之𤣥齡厚自卑損不敢脩謁識者服其崇讓唐史許敬宗為太子少師乾封初以年老不能行步特令朝日乗小馬入禁門至内省同上唐李綱拜太子少師綱素有脚疾太宗特賜步輿令乘至閣下數引禁中問政唐書傳記王起改太子少師起治生無檢所得祿賜為僮婢盗有貧不能自存帝詔曰益僊韶院錢議者謂與玩臣分給可恥也起賴其入不克遜百官志後魏郭祚領太子少師祚從世宗幸東宫明帝幼弱持一黄㼐出奉之時謗祚號為黄㼐少師魏書本傳集先王之建太子必擇九徳之師六行之傅薛宗讓少師表本朝天禧末皇太子同聽政乃以首相兼少師樞宻曺利用兼賓客自後神宗欽宗孝宗光宗在東宫皆不置開禧三年史同知彌逺自詹事入樞府乃進兼賓客已而太子侍立遂以錢丞相象祖兼太子少傅明年景獻太子立並置二相錢左相改兼少師史右相兼少傅未幾右相丁内艱左相亦去位又明年右相起復遂進兼少師文獻通考太子少傅經少傅奉世子以觀太傅之徳行而審喻之記史東觀漢記桓榮為太子少傅賜以輜車榮大㑹諸生陳車馬印綬曰今日之榮稽古之力也漢疏受為太子少傅漢書孝明在東宫宣武皇帝欲以崔光為太子師傅光固辭帝命太子南面再拜臣皆從太子拜光北面立不敢答拜惟西面拜謝而出乃授光太子少傅漢書唐張行成拜尚書左僕射太子少傅永徽四年自三月不雨至五月行成懼以老乞身制答曰古者䇿勉乖罪已之義此在朕寡徳非宰相咎乃賜宫女黄金器勑勿復辭行成固請唐書晉山濤為少傅拜太子求退帝賜小輦乘之以訓太子王隱晉書傳記漢蕭圎為少傅以調護是職乃作少傅箴愛惜日力寸隂母棄親膳再飯寢門三年小心翼翼大孝烝烝詢謨計慮問對凝承安樂必敬毋忘戰兢漢書傅立為太子少傅箴曰正人之側徳義盈堂鮑肆先入榮臺不芳傅臣同計敢告君王白孔六帖本朝省太傅少傅各兼丞一人仁宗升儲置三少各一人李文定公昉以參知政事兼掌賓客及陞左相遂進兼少傅此宰相兼宫僚之所從始也丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宫官餘多以前宰執為致仕官文獻通考太子少保史唐李綱兼太子詹事頻乞骸骨髙祖慢罵之曰建成在東宫遣卿輔導何為屢致辭乎綱頓首陳謝曰云云陛下功成業奏頗自矜伐臣事太子所懷鄙見復不採納髙祖謝曰知公直士勉弼我兒於是擢拜太子少保唐史本朝天禧四年以資政殿大學士王欽若為司空職如故欽若兼領東宫三少品序非便表換秩故有是命本傳太子賓客史晉愍懷太子在東宫選人臣子弟有名稱者以為賓友太子賓客四人正三品掌侍從規諫贊相禮儀宴㑹則上齒百官志武帝為太子立博望苑使通賓客從其所好故賔客多以異端進漢書唐鄭肅吏侍兼太子賓客為東宫授經既而太子失寵上有廢斥意肅召見詳陳天下大本不可輕動意上改容嘉之唐書傳記貞觀十八年以宰相兼賓客開元定員四人掌調護侍從規諫通典天寶中賀知章自太子賓客度為道士還鄉捨宅為觀𤣥宗賦詩贈别時議榮之本傳李固言將作監王堪坐治太廟不謹改太子賓客固言上還制書曰陛下當以名臣左右太子堪以慢官斥居調護地非所宜李固言傳本朝天禧四年叅政任中正樞副錢惟演叅政王曾並兼太子賓客執政兼東宫官自此始職官至道元年尚書左丞李至禮部侍郎李沈並兼太子賓客見皇太子如師傅禮上召謂至等曰朕以太子仁孝賢明今立為儲貳以為國本當須正人輔卿等可盡心調護若動皆用禮必須贊成如事稍有未當不當随順至於禮樂詩書之道可以裨益太子者皆卿等素習不假朕多訓也國史太子詹事史漢孔霸宣帝時為太子詹事以經授太子漢書謝琰征羌有功為輔國將軍領太子詹事晉書李綱為太子詹事太子嘗遊有進魚者太子使膾之唐儉趙元鼎自言其能太子曰操刀膾腥和鼎味公等善之若弼諧審諭則屬綱矣唐書劉憲遷太子詹事時𤣥宗在東宫雅意墳史憲曰殿下儲貳非以尋章摘句要通大意而已侍讀褚元亮經明行修宜召問以察其言唐史傳記詹事秦官漢因之唐置詹事府詹事一人正三品少詹事一人正四品上掌統三事總率府之政内外衆務糾彈非違總判府事置少詹事以貳之龍朔改端尹少尹咸亨復垂拱改宫尹神龍復通典集王儲始建四方是式總司之任崇替所由宜妙選賢才盡一時之勝晉武帝讓王恭詔博望斷裁之規輿情僉屬承華彈肅之寄任賢斯在唐太宗詔本朝東宫官有詹事仁宗升儲置詹事二人神宗升儲置詹事二人欽宗升儲置詹事二人多以他官兼充及登位亦省兩朝國史志太子庶子中允事司議郎諭中舎人善舎人通舎人徳贊洗馬郎崇大館學膳文學蔵校書直宫門等正字典藥内典設史左庶子掌侍從贊相校正啓奏右庶子掌侍從獻納啓奏百官志漢王商字子威為太子中庶子以肅敬見稱漢書魏鮑勛清白有髙節知名當世為中庶子在東宫正色不撓魏志齊袁粲言於帝曰臣觀張緒有正始遺風宜為宫職後轉中庶子齊書鄭黙為中庶子朝廷以為太子官屬宜稱陪臣黙上言臣皆受命天朝不得同藩國事遂施行晉書傳記秦置中庶子員漢庶子為太子少傅屬官後漢員五人晉有中庶子庶子各四人末中庶與功髙通事舎人一人共掌其坊之禁令隋有左右庶唐龍朔中改左庶子為左中護右庶子為右中護咸亨中復故通典糾正違闕儐相威儀六典陶伉遷中庶子曰君少而好學善談𤣥理尤明詩易以孝聞於時儲選殊難其人故召君焉陶氏家傳本朝東宫官有左右庶子舊制不常設每儲闈之建随宜置官以備僚寀多以他官兼領仁宗升儲置二人神宗升儲置二人欽宗升儲置一人四朝志乾道中庶子諭徳除左不除右㑹要七年詔庶子諭徳輪日入宫仍同供故事同上太子諭徳史唐徳宗拜崔芊為諭徳芊對東宫曰臣不識朝廷典故見殿下合稱臣否東宫曰卿是東僚自合知也唐書傳記唐龍朔中左右春坊置左右諭徳各一人正四品下掌諭皇太子以道徳随事諷贊皇太子朝宫臣列侍左右階出入騎從通典集東宫之有諭徳猶上臺之有騎省也清班優秩所選非輕白居易集就列宫府申贊諭之美同上直道事太子昌言沃宸聰詩集本朝東宫官有左右諭徳建儲則置否則闕仁宗神宗欽宗升儲皆置二人並宫官兼四朝志乾道置一人惟除左不除右孝宗㑹要楊礪真宗為襄王以礪為記室王甚重之東宫建兼右諭徳真宗即位召入翰林學士東都事略太子侍讀侍講史晉王紹宗遷秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時王廷之士咸敬慕之晉書唐吕元英為同州刺史及中謝論奏辟辭氣激切上嘉之謂宰臣曰吕元英有讜言直氣宜留給事左右仍兼太子侍講唐史晉庾亮侍講東宫元帝方任刑法以韓子賜太子亮諫以為申韓刻薄傷化豈足留心太子納焉晉書丁公著充太子侍讀著宫訓十卷穆宗即位遷工部侍郎寵春宫之舊也新唐書傳記唐太宗為晉王府有侍講及為太子亦置焉其後或置或否開元初十王宅引辭學士書者入教亦為侍讀職林唐褚無亮𤣥宗在春宫兼侍讀嘗撰翼善記以進之本傳本朝神宗升儲置侍讀侍講各一人㑹要乾道七年禮部太常言討論東宫開讀儀宫僚遇講讀詹事以下至讀官上堂並用賓禮參見如延英儀講罷復位續㑹要郭贊傅太子任京尹得侍讀藩邸太宗即位擢贊著作郎兼皇太子侍講遷右補缺東都事略太子春坊傳記北齊有門下坊庶子領之典書坊庶子領之隋門下坊置左庶子典書坊置右庶子唐龍朔中改門下坊曰左春坊左庶子中允司議郎左諭徳左贊善大夫崇文館學士校書郎洗馬文學校正字等𨽻焉典書坊曰右春坊右庶子中舎人太子舎人右諭徳右贊善大夫太子通事舎人家令率更令等𨽻焉通典本朝建儲闈即置仁宗神宗升儲並以内臣為左右春坊勾當左右春坊事中興不置孝宗乾道元年立皇太子置左右春坊二貟同左右春坊二貟㑹要寶厯三年詔長慶以来兩河用兵偏裨立勲擢置周行率以儲寀王官雜補之抵報資善堂本朝紹興五年六月初置以命朱子開范元長時孝宗以建國公就傅故也婁機為資善小學教授時皇太子為惠國公日陳正言正道又以累朝事親修身治國愛民四事手書以獻置之左右朝夕觀省孝宗出閣就第而信王幼亦命近臣踵為之開禧元年七月皇子初封榮王命程少逸左史兼贊讀少逸以祖諱辭乃命軍器監趙子中夢極兼領其不稱王府而以資善繋銜盖以未出閤之故雜記趙鼎一日上語鼎曰欲令孝宗御諱出而選官教之用范沖朱震為翊善朝論二人為極天下之選上謂鼎曰臺諫語及資善之建皆朱震范冲天生此二人為今日資善之用可謂得人矣趙鼎事實大宗正司本朝元豐官制行詔大宗正司不𨽻六曹大宗正以宗室團練使以上有徳望者為之次一人為同知位髙屬尊者為判掌糾合族屬而訓之以徳行道藝受其詞訟而糾正其愆違有罪則先劾以聞法例不能决者同上殿取裁職官總王府官史唐王府傅一人從三品掌正王過失友一人從五品下掌侍游處規諷道義記室參軍二人掌表啟書䟽百官志漢王式翁思為昌邑王師王無道羣臣以不輔導誅式曰臣以詩朝夕授王書奏減死前漢唐張薦調露初登第考功貟外郎蘇味道稱天下無雙授岐王府參軍五代史韋思謙沛王府長史皇甫公議引為倉曹參軍謂曰公非池中物屈以重吾府孔六帖漢清河王慶侍衛訴私千萬詔案案慶曰訴以治師之尊選自聖朝臣惟知聽從不惟有此糾察白六帖趙贊秦王從禁握兵而驕言者請置師傅以傅之大臣畏王請王自擇秦王即請拜贊秘書監為秦王侍贊泣曰禍將至矣五代史傳記唐杜如晦秦王引為兵府曹參軍𤣥齡曰如晦王佐才也大王欲經營四方舎如晦無共功者白六帖劉悼之拜相王府司馬帝詔曰卿家忠孝吾子賴卿師矩冀蓬在麻不扶而挺也唐蘇良嗣髙宗時為周王府司馬王年少不法良嗣數諫甚見尊嚴吳張昭為長史侍宴升堂並出白六帖劉實以祭酒遷為廣陵王師白六帖唐韋凑入為相王府屬姚崇兼府長史曰韋子識逺文詳吾恨晩得之同上王府翊善史王勵美風儀博涉書史仕梁為河泉東王曹王出鎮勵將随之藩張纘時典選見其風采乃曰王生才地可遊外府乎奏為太子洗馬南史漢淮王安為人好書招置賓客數千八公之徒感慕其徳各竭才智著述篇章分其詞賦以數相次或稱大山小山猶詩有大雅小雅也漢史晉顧榮時在洛者惟陸機陸雲及榮三人而已機雲有詞藻不及榮以南方秀望補吳中晉中興書吳王濞隂有邪}
