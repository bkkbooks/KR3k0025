  - {type: variant, offset: 5, length: 1, content: 利, WYG: 漢賈誼上書曰王者於太子皆選天下端士孝弟博聞有才學者以衛翼之漢文帝拜鼂錯太子家令以其辨得幸太子號曰智囊並漢書漢中宗令劉向楊褒蕭望之周堪以文章儒術保訓東宫同上䟽廣為太子太傅廣兄子受為少傅宣帝置酒太子躬奉觴以為夀上甚嘉之綱目晉山濤為太傅講於宣武堂承步輦導太子賀循字彦光為世儒宗除太子太傅命皇太子親往拜之並晉書傳記魏明帝以後乆曠東宫官制度闕廢官司}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_033-1b, image: WYG0930/WYG0930-0702b.png}
  - {type: variant, offset: 5, length: 1, content: 利, krp: 漢賈誼上書曰王者於太子皆選天下端士孝弟博聞有才學者以衛翼之漢文帝拜鼂錯太子家令以其辨得幸太子號曰智囊並漢書漢中宗令劉向楊褒蕭望之周堪以文章儒術保訓東宫同上䟽廣為太子太傅廣兄子受為少傅宣帝置酒太子躬奉觴以為夀上甚嘉之綱目晉山濤為太傅講於宣武堂承步輦導太子賀循字彦光為世儒宗除太子太傅命皇太子親往拜之並晉書傳記魏明帝以後乆曠東宫官制度闕廢官司}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 具至吳孫權即位孫登為太子兼置四友等官以諸葛恪為左輔張休為右弼顧譚為輔正都尉陳袁為翼正都尉是為四友通考唐置詹事府以統衆務置左右二春坊以領諸局左春坊置左庶子二人中允二人司議郎四人錄事二人左諭徳一人贊善大夫五人崇文館校書二人右春坊置右庶子二人中舎人二人舎人四人錄事二人右諭徳一人右贊善大夫五人通事舎人八人因隋制也通典集鄧禹名聖方居審諭之任疏受夙望始除輔導之官于志寜書禮樂交錯於中發形於外是故其成也懌恭敬而温文職官考太傅}
  - {type: page-break, offset: 7, content: '', id: KR3k0025_WYG_033-2a, image: WYG0930/WYG0930-0703a.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 具至吳孫權即位孫登為太子兼置四友等官以諸葛恪為左輔張休為右弼顧譚為輔正都尉陳袁為翼正都尉是為四友通考唐置詹事府以統衆務置左右二春坊以領諸局左春坊置左庶子二人中允二人司議郎四人錄事二人左諭徳一人贊善大夫五人崇文館校書二人右春坊置右庶子二人中舎人二人舎人四人錄事二人右諭徳一人右贊善大夫五人通事舎人八人因隋制也通典集鄧禹名聖方居審諭之任疏受夙望始除輔導之官于志寜書禮樂交錯於中發形於外是故其成也懌恭敬而温文職官考太傅}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 前少傅在後入則有保出則有師是以教諭而徳成也同上漢擇名儒任先疏廣晉崇碩徳選在山濤况當尊賢之朝宜慎太師之選六典本朝東宫有六傅下至率更令僕故官存而無職司至道元年建儲闈除賓客二人左右庶子諭徳中舎各一人並以他官兼充左右春坊鑄印置吏貟及太子登極則省春坊司累朝皆然真宗在東宫建堂習射名繼照堂有司當官三人仁宗在東宫肄學建堂名為資善堂有都監一人通考太子太師經禮曰凡三王之教世子必以禮樂禮記史太子師傅古官也銀章青綬六典唐太子承乾與魏王泰交惡帝曰當今忠蹇無踰魏徴我遣傅太子一天下之望羽翼固矣即拜太子太師徴以疾辭詔答曰漢太子以四皓為助我賴公其義也公雖卧可擁全之唐書唐長孫無忌為太子太師同中書門下三品唐職林唐顔真卿改太子太師李希烈陷汝州盧杞乃諫遣真卿四方所信若往諭之可不勞而定詔可公卿皆失色李勉以為真卿元老貽朝廷羞密表固留未允後被賊執詬不絶口曰吾年八十官太師吾守吾莭死而後已唐本傳唐盧鈞守太子太師帝元日大饗含元殿鈞年八十升降如儀音吐鴻暢舉朝咨歎唐本傳傳記掌輔導皇太子每見迎拜殿門三師答拜每門必讓三師太子坐乃坐與三師書前名惶恐後名惶恐再拜太子出則乗輅備鹵簿以從百官志集樂正司業太師司成一有元良萬國以貞出六帖晨詢金墀事切於忠蹇夜随銀棨義先於調護許敬宗除太子太師制本朝國初師傅不常設仁宗升除置三少各一人參政李昉兼掌賓客及升首相遂進少傅此宰相兼宫僚之始也若太子太師太傅太保以待宰相官未至僕射者及樞宻使致仕亦随本官髙下除授太子少師少傅少保以待有執政惟少師非經顧命不除若因遷轉則遞進一官至太師即遷司空文獻通考太子太傅史後漢太子太傅一人職掌輔導太子禮如師不領官屬石奮孝文時恭謹舉朝無與比太子太傅缺選可傅者皆推奮遂為太傅石奮子慶循行孝謹元狩元年立太子選群臣可傅者慶自沛守為太傅漢書顯宗始立為皇太子詔問誰可傅太子者羣臣皆言隂識可博士張佚曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝曰欲置輔者以輔太子也今博士不難正朕况太子乎即拜佚為太子太傅桓榮傳晉賀循為太子太傅詔曰循清真履道居}
