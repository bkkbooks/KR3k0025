  - {type: variant, offset: 118, length: 2, content: 形雖, WYG: 比常侍於左右也崇寜二年改押班為簽書入内内侍省後復掌禁中侍奏之事四朝志熙寧詔兩省押班五年無違缺並除副都知祖宗成法凡押班非年五十不除嘉祐中李繼和以年四十九不得除押班英宗朝張茂則以年四十八不得除押班董正官省以近為貴曲阜閻安制官省之政爾往㕘之樂士宣制御藥本朝御藥院主管四人以入内内侍充掌按驗方書修合藥劑以侍進御及供奉禁中之用凡藥必品嘗而後進大祭祀朝㑹燕享行幸則扶持左右饋進膳羞亦如之四朝志凡遷轉之序自聴喚除主管龍圗天章閣謂之閣長次遷管後苑次遷管内東門謂之門司次遷御藥謂之藥局由御藥擢押班即除昭宣使或以功遷昭宣而押班無闕員則除帶御器械職略擢陞御府曾曲阜制屢辭藥藏之親胡文公行王從禮制門司本朝内東門司主管四人以入内内侍充掌宮禁人物出入周知其名數而譏察之四朝志閤長本朝龍圖天章寶文閤主管官四人以入内内侍充掌藏祖宗文章圖籍及符瑞寶玩之物安像設以崇奉之四朝志内侍省都都知副都知押班本朝宋景徳三年置以諸司使副上以上充雍熙三年以都知王仁睿為洛苑副使仍舊都知諸司副使領都知自仁睿始也淳化五年以竇神興充莊宅使兼黄門左班都知諸司使領都知自神興始也熙寧六年以内侍押班蘇利涉為内侍省左班都知仍自入内侍省内侍省押班五週年無違闕並除副都知}
