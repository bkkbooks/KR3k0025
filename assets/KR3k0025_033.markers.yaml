  - {type: variant, offset: 112, length: 0, content: '', WYG: 唐書集相導同奏之節宣揚拜起之儀引而贊之不聞失禮白集辨色而朝百辟輯瑞以㑹萬方正錯立族談之儀宣注意登庸之命蹌蹌濟濟進退以時名為侍臣以贊導吾左右者通事舎人之任也元集本朝故事閤門無通事舎人而通事舎人沿唐制自𨽻中書省如抽赴閤門並稱閤門祇候其後直授閤門通事舎人非舊制也天禧中去閤門二字政和六年改為宣贊舎人㑹要出入省戸贊宣朝命束帶贊謁與賓客言夏伸制舊典通事本𨽻西臺近制建官則領朱閤非善音吐有姿範者不得與選胡文公行李惟寶制典謁天墀之華王威制特陞宣納之名宣納禁職於上閤而特清曹修制再𨽻朱華之閤久侍赤墀之塗特陞贊於殿中柴貽範制宣傳中制江從可制典司中謁李繼明制參典中㳙之謁王文思明宣傳辭令相導儀矩髙世賞制上閤贊導之官武列之髙選賈祐制閤門祇候本朝舊以閤門通事舎人閤門祇候二等謂之閤職盖武臣之清選也舊止三五貟熙寜四年閤門請擇武臣子弟六人前後殿日祇應以閤門㸔班祇候為名候五年熟識儀數乃除閤門祇候真宗曰此職非可以恩澤授神宗用宫邸直省官郭昭選為閤門祇候司馬光言此祖宗蓄養賢才在文臣為館職其重如此乞賜裁省乃言貟額上閤聯班維時髙選初寮集祇事上閤爾實宜之向子莘制寘之上閤往㕘贊導姚師望制閤門舎人本朝乾道中孝宗初置㑹要我朝重閤門之職慶元置舎人之貟詔詞淳熙中孝宗幸祕書省丞相史浩奏閤門舎人陛下方以視館職亦各參與坐於西廊行状入内内侍省内侍省附史手握王爵口銜天憲後漢書超登公卿之位職參天機同上傳記秦漢加官有中}
