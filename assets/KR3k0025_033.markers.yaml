  - {type: variant, offset: 113, length: 0, content: '', krp: 侍參用士人皆銀璫右貂給事殿省漢中常侍贊導内事顧問應對明帝改以金璫右貂和熹太后稱制乃以閹人為常侍小黄門通命兩宫自此悉用閹人後魏用大長秋又置内侍長四人掌顧問拾遺應對北齊有中常中省隋曰内侍省置内侍二人内常侍二人煬帝改長秋監唐復為内侍省龍朔改省為監光宅為司宫臺神龍復舊官有内侍四内常侍六初太宗定制内侍不立三品官不任以事惟門閤守禦廷内掃除廩食而已開元天寶中始拜三品將軍列㦸於門通典天文有宦者四星在帝座西通典本朝國初有内中髙品班院淳化改為内内班院又改入内黄門班院又改内侍省入内内侍班院景徳三年立為入内内侍省國初有内班院淳化改為黄門又改内侍以黄門院為内侍省於是入内内侍省與内侍省號為前後省而入内省比前省尢為親近史志凡通侍禁中役復䙝近者𨽻入内侍省供侍殿中備洒掃之職役使雜品者𨽻内侍省入内内侍省有都都知副都知押班内東頭供奉官内西頭供奉官内侍殿頭内侍髙品内侍髙班内侍黄門内侍省有左班都知副都知右班都知副都知押班内東頭供奉官内西頭供奉官内侍殿頭内侍髙品内侍髙班内侍黄門其官稱則有内客省使延福宫使景福殿使宣慶使宣政使昭宣使國初所置政和二年以通侍大夫易内客省使正侍大夫易延福宫使中侍大夫易景福殿使中亮大夫易宣慶使中衛大夫易宣政使拱衛大夫易昭宣使供奉官易内東頭供奉官左侍禁易内西頭供奉官右侍禁易内侍殿頭左班殿直易内侍髙品右班殿直易内侍髙班而黄門之名如故並職略皇祐間王守忠不除節度使觀察院而止給其俸何剡抗疏争辯以為不可其後孫忭亦以節度使所以尊寵將帥專置軍事安危成敗一以係焉豈宜中官得如其任祖宗成法内侍為承宣觀察使者皆老疾或歴年既多匄奉祠然後以此與之服勞宫省游回制彌光貂省之任胡文公行凌允制聮職内宰閻安制入内内侍省都都知本朝初止有内中髙品都知押班後随省院改易景徳三年置都都知副都都知以諸司使充領省事自都知至黄門皆番休直入專職禁中之事凡祭祀朝㑹行幸燕饗則分侍左右或出使四方宣逹上㫖或領務中外督察庶事兩朝志都都知止一貟其任至重相傳自號内宰相恩數幾同執政官至延福宮使仍帶遥郡留後或觀察使皇祐五年以任守忠為入内内侍省内侍省都都知兩省都都知國朝未嘗除也自守忠後更不差除崇寜二年改入内内侍省都都知為知入内内侍省事後復掌禁中供奉之事總領内侍四朝志為内臣之極品職略入内内侍省副都知本朝景徳三年置以諸司使副充為北司之貳其官率任景福殿使遥郡觀察使間或有至宫使者與都都知同主判皇城司内庭之事無不預焉兩朝史崇寜二年改為同知入内内侍省事後復四朝志參帷扆之近綴王岐公除石全彬制參冠近職俾爾㕘中省之務並任守忠制矧乃率屬給事殿省地親寄重舒信道除石得制宿衛中禁董治内省曲阜梁從吉制㕘治官省宋朝用臣制入内内侍省押班本朝初止兼他職淳化後始以崇班以上充國朝押班二貟僉預省事而其官率任宣慶昭宣使而已凡都知押班入禁中奏事上}
