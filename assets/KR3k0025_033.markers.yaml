  - {type: variant, offset: 59, length: 0, content: '', WYG: 選交㦸之下周廬肅然白集王者法鈎陳設環列非勲勤之將信近之臣則何以久張爪牙轉置肘腋者也移領左廣察八屯之警巡七萃之勤惰爾為其正盡察得之並同上前以忠勞選登戎衛能訓勇力之士以備時使中儲誰何之人以備徼巡軍有羽林用法星象統之爪士以拱辰居左彦佐制俾領上軍仍遷右廣統良家之騎士訓期門之材官王士則制周設七萃漢列八屯皆所以拱衛王宫肅嚴徼道鄭何制國家設十三衛猶漢之南北軍而左右羽林尤稱親重}
