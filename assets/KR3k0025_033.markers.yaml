  - {type: variant, offset: 63, length: 4, content: 聽人彈白, WYG: 天子置上將軍以禦侮率是道也元集天子六軍必有材官佽飛超乗挽强之士在焉董之以威待之以信分八舎之衆寡均二廣之勞逸不吳不揚不掉不拙皆將軍之力也是以李大亮上直禁中而文皇甘寢則心腹爪牙之任斯不細矣于李友制熊羆宣力輦轂無塵内訓却非之士外察何留之禁徐集自㕘戎秩乆衛宸階曉傳銀棨之符夜警金吾之漏常相制北落親兵夾峙宫省杜牧典兵於禁門之内立侍於㦸殿之中張直方官崇環衛職實司武王釗制官我正衛吳正制禁旅總蘭騎之兵李文饒勾陳肅肅彰北極之威靈錡仗森森表南端之壯麗九旂揚斾日熾星流五輅鳴鑾龍輈鳳轄武夫扳燕之服羽騎雲屯期門珥鶡之冠旄頭宿設張鷟}
