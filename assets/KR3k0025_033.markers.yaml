  - {type: variant, offset: 75, length: 4, content: 隅者必超, WYG: 貟為額同上同知閤門事本朝閤門副使雖無定貟然選任不及疏逺而所置常少於正使之數政和官制以左武右武易二閤副使而閤門事乃命横行知焉則同知之職乃昔時之副使也職略惟朱華之上閤當太微之法宫置副介之名用承諸使胡文恭行馬懷徳制閤門軍贊舎人史崔崇禮以節義自將武徳中官通事舎人善詞令進止宗}
