  - {type: variant, offset: 913, length: 0, content: '', WYG: 牧以皇子領尹以文臣充四朝志中興駐蹕杭州建炎改為臨安府守臣帶浙西撫安乾道七年皇太子領臨安府尹就東宫為廨廢臨安府通判簽判職官置少尹判官推官九年皇太子辭免臨安府尹其通判以下並復置中興㑹要李穆知開封府豪右屏跡權幸不敢干以私范仲淹知開封决事如神京師語曰朝廷無憂有范君京師無事有希文杜衍知開封聽斷如神李沆所至有治劇之聲自開封府擢為宰相梁子美權開封尹入謝曰臣曾祖顥祖適皆嘗領府事今臣復攝尹懼弗克負上曰卿三世尹京師縉紳盛事也四朝史牧民天府總京邑之浩穰楊億代表召典京部蔡延慶制尹釐神甸舒信道啓委司都府之治胡文恭制尹正之權皇甫泌制尹正畿甸謝景温制都廂本朝大中祥符元年置京新城外八廂真宗以都門之外居民頗多舊例惟赤縣尉主其事至是特置廂吏命京府統之天禧五年增置九廂並長編熙寜三年五月詔以京朝官曾歴通判知縣四人分置京城四廂凡民有鬬訟事輕者得以决遣九月詔許留}
