  - {type: variant, offset: 1642, length: 3, content: 葆同姓, WYG: 鎰制書曰庶獄庶事予罔敢知此乃周文王之政以理天下也惟獄惟事㑹於南宫求郎之難豈敢輕易今者各有所授皆為清秩杜牧制刑官屬郎守法爭兢不阿韓文本朝至道初張昱為刑部員外郎西川安撫奏授昱知雅州上以省郎之重不欲換他職故進秩加賜令服而遣刑者所以助治聖人尤謹中臺參綜郎選甚髙南豐除韓晉卿制宜正秋臺之聨進丞郎之務胡文恭寥詢制丹筆議刑國綱作重白雲司職人命是懸牋表類都官郎中附員外郎經司隷掌五隷之法周禮史都官郎中員外郎掌俘隷簿錄給衣糧醫藥而理其訴冤韋温奏曰國朝以來都官最為清選不可以賞能吏唐書傳記漢置司隷校尉其屬有都官}
