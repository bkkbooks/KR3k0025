  - {type: variant, offset: 2210, length: 3, content: 而千萬, WYG: 無所掌元豐改制郎中員外郎始實行本司事參掌徙流配隷及吏籍之事續㑹要列四案軍六將案吏籍案配籍案知雜案鄭谷詩名盛於唐末號靈臺編世但稱鄭都官詩梅聖俞官至都官劉原父戯之曰聖俞官止此昔有鄭都官今有梅都官詩話命爾司僕曲阜擢之秋聨典我隷士胡文恭行劉把制進秋臺者以都隷為峻張士奕等制司隷秋聯彭思永制比部郎中史何損奏許都之賊魏明竒之擢為比部郎魏書唐徳宗知武元衡才名召授比部員外郎裴延齡奏京兆府妄破用錢穀請令比部勾覆唐書傳記魏尚書有比部曹晉因之宋比部主法制齊梁陳皆有北齊掌詔書律令勾檢等事後周曰計部中大夫隋為比部侍郎煬帝除侍字唐加中字龍朔改司計大夫咸亨復天寳改司計至徳復掌内外諸司公廨及公私債負徒役工程􅂍物帳及勾用度物通典比部得廊下食以飲從者號壯盤國史補杜牧頃於宰執求小儀小秋皆不遂嘗夢}
