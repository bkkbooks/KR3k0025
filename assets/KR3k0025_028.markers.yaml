  - {type: variant, offset: 28, length: 597, content: 大傳子君子之澤五世而斬小人之澤五世而斬孟子史一體炫金不及百兩一歲美衣不過數襲通監宋太祖傳記烏獲舉千鈞之重行年八十而求扶持戰國策騏驥盛壯之時一日而馳千里至其衰也駑馬先之同上集延年不死壽何所止楚辭金石終銷毀謝惠連秋懷詩物壯誠有衰勢雄良易極陳子昂集盛色無千年李白鷦鷯巢林不過一枝偃鼠飲河不過滿腹莊子經池之竭矣不云自頻泉之竭矣不云自中詩召旻哲夫成城哲婦傾城詩瞻卬為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之記曲禮下事親有隱而無犯事君有犯而無隱事師無犯無隱同上君子之愛人以德細人之愛人以姑息檀弓上禮之於人也猶酒之有糵也君子以厚小人以薄禮運並記互見同出異趣子曰惟上智與下愚不移語陽貨子同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也孟萬章下盡其道而死者正命也桎梏死者非正命也同上盡心下盜跖名聲若日月與舜禹俱傳然而君子不貴非禮義之中也荀不苟好榮惡辱好利惡害是君子小人之所同也若其所以求之道則異矣荀榮辱方舟而濟於河有虛舡來觸舟雖有褊心之人不怒有一人在其上則以惡聲隨之向也不怒而今也怒向也虛而今也實莊子兔走於街百人追之貪人具存人莫之非者以得兔為定分也積兔滿市過不能顧非不欲兔也分定之後雖鄙不爭慎子互入事有定分君子多聞見而心愈真小人多聞見而心愈偽楊子注魚不畏網而畏鵜鶘復讎者不怨鏌釾而怨其人網無心而鳥有情劍無情而人有心也劉子互見有意無意史善人富謂之賞人富謂之殃左襄, WYG: 纂淵海卷}
