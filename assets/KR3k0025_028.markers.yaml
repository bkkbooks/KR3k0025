  - {type: variant, offset: 1630, length: 2, content: 承賀, WYG: 一前後代者未嘗以服御相授且諱日宫嬪往還如織豈可指意吏卒獄雖具顧非聖裁不可上深以為然國史本傳秩貳秋官參執邦典南豐擬制秋官亞卿曲阜峻貳秋卿胡文恭刑部郎中附員外郎史郎中員外郎掌律法按覆大理及天下奏讞為尚書侍郎之貳令狐峘大厯中為刑部員外郎上疏諌山陵事詔答曰古之遺直何以加焉杜景佺為員外郎守法不撓唐書傳記晉宋齊並以三公郎曹掌刑獄置郎中一人隋初省三公曹置形部曹侍郎一人煬帝除侍字又改憲部郎唐因之武徳改郎中龍朔改司刑大夫咸亨光宅神龍並隨曹改復六典及通典周禮有士師}
