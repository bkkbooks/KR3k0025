  - {type: variant, offset: 2577, length: 7, content: 在心楊孝至苟得, WYG: 任也隋置水部員外郎煬帝改承務郎唐復故龍朔咸亨隨曹改復六典集省中官最美無似水曹郎李餘慶本朝水部無所掌㑹要六部監門本朝紹興二年詔置六部監門官一員選陞朝文臣有才力人充仍令六部長貳奏差序位請給依寺監丞中興㑹要掌司門鑰之嚴胡文恭行吕性簡制六部架閣本朝元豐有六曹架閣庫續㑹要崇寜元年何執中請置庫架閣命官涖之是時六曹皆建立本傳大觀三年罷内吏部令司封餘部六曹郎官管勾政和三年六曹依舊置管勾架閣庫官宣和罷續㑹要紹興三年立六部架閣庫中興題名十五年詔復置官吏户部各差一員禮兵部共一員刑工部共一員中興㑹要舊制官庫}
