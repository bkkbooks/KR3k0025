  - {type: variant, offset: 1694, length: 358, content: 名不明則人倫亂也大傳樂者為同禮者為異同則相親異則相敬樂記武車不式介者不拜少儀賓客主恭祭祀主敬喪事主哀會同主詡軍旅思險隱情以虞同上門內之治恩揜義門外之治義揜恩聘義子父子主恩君臣主敬孟公孫丑上事生飾歡祭祀飾敬荀子不聰不明不能為王不瞽不聾不能為公慎子道猶金石一調不更事猶琴瑟每終改調淮南子家老異飯而食殊器而享子婦跣而上堂跪而斟羹非不費也然而不可省者為其害義也同上史雖有文母之德必繫於子東漢杜鄴傳夫委大臣以大體責小臣以小事為治之道也通監唐憲宗文舞用功成慶善之樂武舞用神功破陣之樂同上唐高宗杜黃裳曰明主勞於求賢而逸於任人此虞舜所以能無為而治者也至於薄書獄訟煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳飱皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也唐憲宗並同上集家須男子繼國合大夫憂, WYG: 貴胄}
