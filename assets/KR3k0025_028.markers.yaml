  - {type: variant, offset: 1639, length: 2, content: 承賀, WYG: 理寺官為之以決疑謂之小三司使職林杜牧頃於宰執求小儀又求小秋不遂尚書故實秋官之屬職畧中行刑户不博前行駕部國史補集亟則失情緩則留獄深則礙恕縱則生姦惟是四者持刑之難元稹行馮宿制自居殿中能察非法連鞫庶獄多叶平允加以温敏靜專可當是選一嵗之獄決在秋冬今方其時宜敬乃職白集}
