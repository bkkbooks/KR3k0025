  - {type: variant, offset: 1010, length: 0, content: '', WYG: 惟祀與戎故令卿攝二曹大全唐陳叔達初建成元吉疾害太宗隂行譛毁髙祖惑其言將有貶責叔達固諌乃止太宗時拜禮部尚書勞之曰武徳間公有讜言故以報卿唐書李剛字文紀仕隋官不進筮之得鼎卦筮人曰君當為卿輔代易乃如志至唐終禮部尚書唐書集擢登宗伯之曹上應文昌之位類要典禮之于有司非人莫濟秩宗之于省户其選則髙同上俎豆之議著為典常牋奏之文𫝊為口實秩清任重時儒所貴不次之位}
