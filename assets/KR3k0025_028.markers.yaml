  - {type: variant, offset: 1459, length: 1, content: 問, krp: 通置吏五十四人通志禮部元豐官制行謂之名表郎官别有印曰名表郎印石林燕語員外郎史禮部員外郎講議制度損益儀物審覆有司所上之狀而質于尚書省大全大朝㑹則尚書奏藩國貢物慶賀若謝則員外郎分撰表文同上唐李班為殿中侍御史宰相韋處厚曰清廟之器豈撃搏才乎除禮部員外郎唐書崔澹舉止秀峙謂玉而冠者為禮部員外郎當時士夫以流品相尚推名徳者為之首唐書劉禹錫栁文序子厚以文章稱首入為尚書禮部員外郎㑹要栁子厚文章卓偉續要傳記唐韋叔夏授禮部員外郎則天將享明堂受制與當時大儒撰定儀注衆咸推服之職畧劉禹錫為禮部員外郎方與日者從容段文昌入謁既去日者謂禹錫曰員外須待十年之後此客入相方轉正曹郎耳自是禹錫失意連受外官十餘年文昌入相方除禹錫禮部郎中録異記集仙步徐徐整羽衣小儀澄澹轉中儀樺飄紅燼趨朝路蘭縱清香宿省時彩筆煙雲供不足綸闈鸞鳯訝來遲自憐孤宦誰相念禱祝空吟一首詩鄭谷詩惟此禮部公寒泉甃舊井滴此乆羸瓶召還汲脩綆山谷詩本朝禮部員外郎領禮樂祭祀朝㑹宴享學校貢舉之事並損益儀物審覆有司所上之狀宋志汪大猷字仲加除禮部員外郎南宫名表一出士林稱誦之大全祠部郎中史東晉而下逮于北齊皆有祠部郎後周春官府有典祠中大夫隋有祠部郎唐改為郎中龍朔中改為禋大夫後復故唐書徐邈為祠部上言南北郊及言明堂宗廟毁建言皆有證魏志後魏裴修兼祠部郎中每有疑議修撰斟酌咸有故事同上周捨博學精義理梁武帝召拜祠部郎中損益禮儀多自捨出梁書傳記唐開元十一年改祠部為職祠至德初復舊自天寳六載及至徳三年常置祠部使以他官為之晉改立太廟摯虞為祠部郎職其事職類許允之字之竒才應禮樂擢為祠部郎同上謝沈為祠部郎有史才職畧集祠部呼為氷㕔言其清且冷也因話録祭以事神人道之極也祠曹所領體莫重焉南豐除趙令鑠制仰承宗廟懐祗䖍晉祠部嵇含臺中宴㑹又隨急詔朝天去陳后山送鄭祠部本朝祠部判司事一人以無職事朝官充凡祠祀享祭皆𨽻太常禮院而天文刻漏歸于司天監本司但掌祠祭盡日休暇今受諸州僧尼道士女官童行之籍給剃度受戒文牒而已元豐改制郎中員外郎始實行本司事續㑹要陳古靈先生襄字述古判尚書祠部時譯經僧法䕶遺表度十僧趙槩奏列子廟三年度道士襄皆執奏不行神宗實錄兵部經四曰夏官其屬六十掌邦政周禮史唐兵部尚書一人侍郎二人掌武選地圖車馬甲械之政其屬有四一曰兵部二曰職方三曰駕部四曰庫部凡將出征告廟授斧鉞軍不從令大將軍専決還日具上其罪唐百官志傳記魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉太康分中外兵各為左右宋五兵唯領中兵外兵二曹通典大明省昇明復置六典齊梁陳皆有之後魏為七兵北齊為五兵左右中兵左右外兵都兵凡五曹後周大司馬其屬有兵部中大夫小兵部下大夫隋之兵部統兵部職方駕部庫部四曹唐因之龍朔改司戎咸亨復舊光宅改夏官神龍復故天寳改武部至徳復故通典掌天下兵衛武官選授之政令凡軍師戍卒之籍山川要害之圖廐牧甲仗之數六典本朝兵部判部事一人凡兵籍武官軍師卒戎之政令悉歸於樞宻院其選授小者又歸於二班本曹但掌三駕儀仗鹵簿字圖釋奠武成王廟及武舉事嵗終以義勇弓箭手寨兵之數上于朝兩朝志元豐惟民兵馬政權隷樞宻院武官銓選并歸吏部五年詔應縁義勇保甲事並隷樞宻院其餘民兵悉隷兵部續㑹要建炎三年併衛尉寺歸兵部中興㑹要兵部尚書經矧惟若疇圻父薄違司馬掌邦政統六師平邦國書祈父予王之爪牙詩乃立夏官司馬使帥其屬而掌邦政以佐王平邦國大司馬之職掌建邦之九法以佐王平邦國以九伐之法正邦國周禮雎鳩氏司馬也左傳史黄帝夏官為縉雲史記姚崇三為宰相兼兵部尚書屯戍斥堠士馬儲械無不諳記盧承慶檢校兵部尚書知五品選辭曰選事在尚書臣掌之為出位帝曰朕信卿卿何不自信李輔國為兵部尚書南省視事使武士戎裝夾道王起為兵部尚書文宗數訪逮時政起因積雨願寛逐臣李懐逺除兵部尚書雖乆居榮位而彌尚簡率常乗欵段馬左僕射豆盧欽望曰何不買駿馬乘之答曰此馬幸免驚蹶何暇别求朱崔為兵部尚書自得岐路必當大用封川多方沮之唐書傳記兵部尚書周官夏官卿也魏置五兵尚書後魏置七兵尚書周置大司馬卿隋改兵部尚書唐龍朔改司戎太常伯咸亨復光宅改夏官尚書神龍復天寳改武部尚書至徳復六典大司馬者武官也大總武事訓馬為武者取其健行成王時畢公為三公兼領司馬之職釋名黄帝坐𤣥扈之樓上與大司馬容光臨觀鳯凰之至宋司馬名司武類要晉號五兵周稱九法記室新書集緝熈九法董正六師孫逖授李林甫制恭守戎曹訓齊武部簡稽之務軍國是殷許公集周之九法歴代用焉故夏官之重事位乆虛錢翊授陸展制惟兹夏官實掌戎政白居易行栁公綽制卿長夏官李宗閔制本朝尚書掌武舉地圖車輦甲械之政令而侍郎為之貳凡軍民以民籍統隷者閱習按試選募遷補續㑹要文昌七兵之秩夏官掌武超進崇資楊億代表掌國五兵叨進中臺之秩歐公表中臺政事所出兵部司馬之任夏官古卿南豐擬制武選隷於天官兵部摠於樞輔故司馬之職獨省文書東坡表周禮命卿司馬掌國征之事牋表類兵部侍郎經小司馬之職周禮史唐太宗以楊𢎞禮有文武材擢為兵部侍郎入參機務出統衆攻戰太宗曰越公兒郎故有家風矣楊𢎞武為司戎少常伯髙宗嘗誚曰爾在戎司授官多非其材𢎞武曰臣妻剛悍此其所屬不敢違以諷帝用后言帝笑不罪蔣伸為兵部侍郎宣宗每見必咨天下得失伸言比來爵賞稍易人日偷帝愕然曰偷則亂矣伸曰非遽亂但人有覬心亂由是生帝嗟嘆未幾拜相云唐書傳記隋置兵部侍郎唐因之龍朔為司戎少常伯光宅為夏官侍郎後復故職林舊制一員總章加一員通典周官夏官小司馬中大夫也六典韓臯資質重厚有大臣器盧元輔端清介正能紹其祖奕職類崔湜為兵部侍郎父挹為禮部侍郎父子同為南省副貳互見禮侍類集祈父之貳夏卿之亞張曲江集惟兹夏官實貳兵政簡稽調補今方其時司馬貳卿佐平邦國白集栁公綽制入亞六卿共行司馬之法出膺九命俱受元戎之律伯樂川記本朝六卿之亞皆髙選也而夏官實主武事還貳祈父用均爾勞司戎亞卿曲阜除陳軒制夏卿之貳典幹於七兵胡文恭行丁度制惟是夏卿之亞南豐集兵部郎中史兵部郎中二員一員掌判帳及天下武官之階品衞府之名數一員掌判簿以總軍戎差遣之名數唐志魏徴薦杜正倫擢兵部員外郎太宗勞之曰朕舉賢者非朕獨私以能益百姓也裴光庭轉兵部郎中在職公務修整衆所嘆服姚崇為夏官郎中契丹擾河北兵檄叢進崇剖決如流張嘉貞為兵部員外郎時功狀盈几郎吏不能決嘉貞為詳處不閱旬廷無稽牒盧奕所歴有稱唐書傳記魏五兵晉七兵皆置郎中隋初為兵部侍郎煬帝除侍字又改兵曹郎唐武徳改兵部郎中龍朔改司戎大夫咸亨光宅神龍隨曹改復通典及六典周大司馬屬官軍司馬下}
  - {type: variant, offset: 1463, length: 0, content: '', WYG: 任也職林掌武職勲官三衙及兵士簿書朝集祿賜假告差發武職告身之事職員令集既忝夏官之屬夏官之劇既參戎事之殷擢受五兵之部司武之屬重於文昌元和制誥兵部郎中二員一在侍從不居外省元㣲之行楊嗣復制本朝本曹所治之事郎中員外郎參掌之續㑹要七兵之曹郎吏之選甚寵南豐潘良器制姑寵七兵之秩用服一臺之華胡文恭吕公弼制外兵之員郭輔制夏卿首曹中臺妙選張朂制往踐五兵之屬公是行周思永制夏卿之屬陳希亮制職方郎中附員外郎經職方氏掌天下之圖以掌天下之地乃辨九州之國使同貫利周禮史職方郎中員外郎掌地圖城隍鎮戍烽候防人道路之逺近及四夷歸化之事唐書傳記隋開皇置職方侍郎煬帝去侍字唐加中字龍朔改司城大夫咸亨復隋開皇置職方員外郎煬帝改承務郎唐復舊龍朔咸亨隨曹改復六典本朝職方掌受諸州圖及圖經㑹要建炎三年以兵部郎兼職方題名駕部郎中附員外郎經夏官輿司馬周禮史隋辛公義為駕部郎勾檢馬牧所獲十餘萬疋帝嘉曰唯我公義奉國竭忠隋書畢諴為駕部員外郎故事以倉駕二部為辱諴沛然如處美官互見倉部類崔元亮為駕部員外郎清謹介特澹如也隋書傳記周夏官之屬有輿司馬校人牧師巾車皆駕部之本也魏晉尚書有駕部郎宋屬左民尚書齊北魏與北齊並曰駕部郎中隋曰侍郎屬兵部煬帝除侍字唐武徳加中字龍朔改司輿大夫咸亨復天寳改司駕至徳復通典中行刑户不博前行駕庫國史補集從容管劇每識通而理當常衮制惟有南宫老駕兄白居易詩本朝駕部判司事一人輿輦車乗隷於太僕傳驛給受一出於樞宻院廐牧之政總於羣牧司本司無所掌元豐改制郎中員外郎始實行本司事參掌輿輦車馬驛置廐牧之事大禮則戒有司具五輅續㑹要建炎併太僕寺歸駕庫中興㑹要輿馬輦乗之奉郵驛牧圉之治中臺要務主以郎官南豐擬制擢司輿馬之政初寮除季倫制庫部郎中附員外郎史庫部郎中員外郎掌戎器鹵簿儀仗孔若思遷庫部郎中持一石止水滿於座右以示有止足之意唐書傳記周禮夏官有司甲胄弓矢今庫部郎中之任也魏始置庫部郎晉以後有郎中隋初為庫部侍郎煬帝去侍字唐武徳加中字龍朔改司庫大夫咸亨復周禮夏官有司兵後周有小武藏大夫蓋員外郎之任也隋開皇置煬帝為承務郎唐為庫部員外郎龍朔以來隨曹改復六典本朝駕庫二部皆無所掌建炎三年以駕部兼庫部㑹要甲胄弓矢之器乘輿鹵簿之式武藏之任郎選甚髙南豐集刑部經五曰秋官其屬六十掌邦刑周禮史刑部尚書一人侍郎二人掌律令刑法之政徒隷校覆讞禁之事其屬有四一曰刑部二曰都官三曰比部四曰司門唐志傳記漢成帝尚書初置二千石曹主郡國二千石又置三公曹主㫁獄光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹重於諸曹魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄隋開皇改都官為刑部統都官刑部比部司門四曹唐因之龍朔改司刑咸亨復武后改秋官神龍復天寳改憲部至徳復職林本朝刑部判部事二人淳化以刑部覆大辟案増置審刑院凡四方以具獄來上則讞於審刑院大中祥符置糾察在京刑獄司元豐並倂歸刑部五年官制行刑部始得専其官續㑹要刑部尚書經司冦蘇公式敬爾由獄以長我王國書立政司冦掌邦政詰奸慝刑暴亂周官乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國大司冦之職掌建邦之三典以佐王刑邦國詰四方周禮司冦正刑明辟以聴獄訟聴之於棘木之下以獄之成告于王大司冦以其成從質於天}
