  - {type: variant, offset: 1469, length: 0, content: '', WYG: 其激切如此於是中人爭冩内本布於外屈突通為刑書自以不習文故辭改工部唐書傳記刑部尚書周禮之秋官卿也晉依漢置三公尚書宋始置都官尚書皆掌刑獄齊以後皆置後周置大司冦卿隋初曰都官尚書開皇改刑部尚書唐因之龍朔改司刑太常伯咸亨復光宅改秋官尚書神龍復天寳改司憲至徳復六典總制刑部比司事職員令掌其三典詰彼四方記室新書集弼我五教掌兹三典常衮制秋卿恤刑事无枉撓紹蔽芾於謳謡盡侀成於法理杜審權制超司秋典顔魯公集國之二柄在徳與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司冦務在擇人臯陶之作士師期於致理張鷟集本朝尚書掌天下刑獄之政令而侍郎郎中員外郎分治其事設官八刀職以司臬事題名望峻天臺仍忝刑官之重歐陽謝表秋官古卿中臺八座典司邦禁南豐擬制淑}
