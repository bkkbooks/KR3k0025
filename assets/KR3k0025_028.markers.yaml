  - {type: variant, offset: 1673, length: 3, content: 母與婦, WYG: 罪隷女子入於舂饎之事此今都官之任隋都官侍郎猶掌非違得失開皇改都官尚書曰刑部其都官郎曹遂改掌簿錄配没官私奴婢唐因之武徳加中字龍朔改司僕大夫咸亨復故六典裴秀奏事曰都曹二千石曹司國憲内掌京畿詰姦聴訟外總邉境類要嵇含牋曰今都官中兵三曹郎晝督征戰夜還治事省中司都官屯田虞部主客皆閒簡無事諺曰司門都官屯田水部入省不數南部新書後行祠屯不博中行都門國史補集故薛尚書能李員外頻嘗郎都官皆一時騷雅宗師都官之曹振盛於此余早年請益實受深知今忝此官復是正秩鄭谷自序十倫創制輿臺之號肇興百隷裁䂓僮僕}
