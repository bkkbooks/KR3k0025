  - {type: variant, offset: 628, length: 0, content: '', krp: 宋潘自牧撰職官部禮部經典朕三禮汝作秩宗並書大宗伯之職掌建邦天神人鬼地祇之禮以佐王保邦國周禮史漢成帝置尚書五人其四曰客曹主外國夷狄事後漢尚書吏部兼掌齊祀亦其職分魏尚書有祠部曹及晉江左有祠部尚書掌廟祧之禮常與右僕射通職不常置以右僕射攝之歴代皆與右僕射通職後周置春官卿又有禮部後改禮部為宗伯又春官之屬有典命後改典命為大司禮俄改大司禮復為禮部謂之禮部大夫至隋置禮部尚書唐因之龍朔中改為司禮大常伯光宅中為春官尚書通志傳記祠部尚書領祠部儀曹二曹齊梁陳皆有祠部尚書後魏為儀曹尚書北齊祠部尚書統祠部主客虞部屯田起部五曹又有儀曹主吉凶禮制屬殿中尚書後周置春官卿又有禮部而不言職事後改禮部為宗伯又春官之屬有典命掌内外九族之差及玉帛衣服之令沙門道士之法總判祠部禮部膳部主客事通典韋受進位禮部尚書帝問所以振災邀福者對曰宋景}
  - {type: variant, offset: 629, length: 0, content: '', WYG: 以善言退法星三舎漢文除秘祝勅有司祭而不祈此二君皆受自至之福書美前史如失德以却災媚神以求助神而有知且因以譴也時帝不徳故託以為諷白孔六帖集逮及貞觀初尚書踐台斗杜}
