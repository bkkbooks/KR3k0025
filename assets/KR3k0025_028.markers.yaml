  - {type: variant, offset: 1017, length: 0, content: '', WYG: 禮樂祭祀朝㑹燕享學校貢舉之政令祭之名有三天神曰祀地祇曰祭宗廟曰享又有大祀中祀小祀之别幣玉牲牢器服各從其等凡雅樂以六律六同合隂陽之聲為樂律金石絲竹匏土革木為樂器宫架八佾特架六佾分武文先後之序為樂舞其所定儀注以舊章參考其當否上尚書省册寳及封册命禮亦如之宋史侍郎經小宗伯之職掌建國之神位周禮史煬帝初置禮部侍郎唐因之龍朔中為司禮少常伯掌䇿試貢舉及齋郎𢎞崇國子生等事舊制考功員外郎典貢舉開元中李昻為進士李權所詆朝議以考功位輕不}
