  - {type: variant, offset: 2622, length: 576, content: 抱朴子對俗篇舉一綱眾目張文中子史石稱丈量徑而寡失西漢枚乘傳互見事有簡徑探端以知緒前漢善為政者綱舉而目踈晉書劉頌傳聖王不徧窺望而視已明不殫傾耳而聽已聰通監漢宣紀執要而委務於下晉書集統於一而應於萬韓文聖人篤近而舉遠同上原人委群才會眾工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧指曰鋸彼執鋸者趨而左俄而斤者斲刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢慍焉畫宮於堵盈尺而曲盡其制計其毫釐而構其大廈無進退焉既成書于上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其遠邇細大可手據其圖而究焉猶梓人畫宮于堵而績于成也能者進而由之使無所德不能者退而休之亦莫敢慍不衒能不矜名不親小勞不侵眾官日與天下之英材討論其大經猶梓人之善運眾工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傳周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用, WYG: 二}
