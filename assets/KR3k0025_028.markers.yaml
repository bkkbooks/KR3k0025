  - {type: variant, offset: 1464, length: 0, content: '', WYG: 記王制莒太子僕來奔季文子使司冦出諸境子為司冦將盜是務去爽鳩氏司冦也左傳史黄帝秋官為白雲史記羊侃為都官尚書宦者張僧𦙍候侃侃曰我牀非閹人所坐竟不前之時論美其貞正梁書劉祥道遷司刑太常伯每覆大獄必歔欷累嘆奏決之日為之不食李適之拜刑部尚書夜則宴賞晝決公務庭無留事崔祐甫為刑書帝欲相之問曰牛仙客可與語卿嘗見否曰未也他日又問對如初帝乃不用賛曰嚴挺之拒宰相不肯見李林甫崔祐甫違詔不屈牛仙客信剛者乎二人坐是皆不得相彼亦各申其志也顔真卿為檢校刑書元載請百官凡欲論事必先白}
