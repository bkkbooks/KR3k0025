  - {type: variant, offset: 1114, length: 1, content: 異, WYG: 迭為初獻祀九宫貴神五帝感生帝朝日夕月蜡祭東西方亦如之紹興七年禮部置侍郎二員隆興元年詔除尚書不常置外禮部侍郎置一員宋史郎中史隋禮部曹置侍郎一人煬帝除侍字文考儀曹唐因之武徳初改為禮部郎中龍朔二年改為司禮大夫咸亨初復舊其後曹名或改而官號不易掌禮樂學校儀式制度衣冠符印表疏册命祥瑞鋪舎喪𦵏贈賻及宫人等通志孔易為齊尚書儀曹郎屢箴闕禮多見信納上謂王儉曰孔易真所謂儀曹也南史齊書梁武帝問徐勉求一有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事帝即日除儀曹郎每建議訪問前事休源即以所通記隨機斷決曽無疑滯吏部任昉常謂之孔獨誦梁書傳記郎中一人周官春官四師下大夫亦頗同今任魏尚書有儀曹郎掌凶禮制歴代多有例在吏部郎中篇通志劉杳博綜羣書為儀曹郎僕射徐勉以臺閣大儀専委杳}
