  - {type: variant, offset: 676, length: 216, content: 也逐於魯是人不隨今死而婦人為死者十六人若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言者異則人心變矣戰國策互入婦人識見道高益安勢高益危史日者傳詩曰無酒酤我而論語曰酤酒不食二者非相反也夫詩據承平之世酒酤在官和旨便人可以相御也論語孔子當周衰亂酒酤在民薄惡不誠是以疑而弗食前漢食貨志張釋之為廷尉天下無冤民于定國為廷尉民自以為不冤前漢姚宋二人每進見上輒為之起去則為臨軒送之及李林甫為相雖寵任過於姚宋然禮遇殊卑薄矣通監, WYG: 續要}
