  - {type: variant, offset: 1463, length: 0, content: '', krp: 任也職林掌武職勲官三衙及兵士簿書朝集祿賜假告差發武職告身之事職員令集既忝夏官之屬夏官之劇既參戎事之殷擢受五兵之部司武之屬重於文昌元和制誥兵部郎中二員一在侍從不居外省元㣲之行楊嗣復制本朝本曹所治之事郎中員外郎參掌之續㑹要七兵之曹郎吏之選甚寵南豐潘良器制姑寵七兵之秩用服一臺之華胡文恭吕公弼制外兵之員郭輔制夏卿首曹中臺妙選張朂制往踐五兵之屬公是行周思永制夏卿之屬陳希亮制職方郎中附員外郎經職方氏掌天下之圖以掌天下之地乃辨九州之國使同貫利周禮史職方郎中員外郎掌地圖城隍鎮戍烽候防人道路之逺近及四夷歸化之事唐書傳記隋開皇置職方侍郎煬帝去侍字唐加中字龍朔改司城大夫咸亨復隋開皇置職方員外郎煬帝改承務郎唐復舊龍朔咸亨隨曹改復六典本朝職方掌受諸州圖及圖經㑹要建炎三年以兵部郎兼職方題名駕部郎中附員外郎經夏官輿司馬周禮史隋辛公義為駕部郎勾檢馬牧所獲十餘萬疋帝嘉曰唯我公義奉國竭忠隋書畢諴為駕部員外郎故事以倉駕二部為辱諴沛然如處美官互見倉部類崔元亮為駕部員外郎清謹介特澹如也隋書傳記周夏官之屬有輿司馬校人牧師巾車皆駕部之本也魏晉尚書有駕部郎宋屬左民尚書齊北魏與北齊並曰駕部郎中隋曰侍郎屬兵部煬帝除侍字唐武徳加中字龍朔改司輿大夫咸亨復天寳改司駕至徳復通典中行刑户不博前行駕庫國史補集從容管劇每識通而理當常衮制惟有南宫老駕兄白居易詩本朝駕部判司事一人輿輦車乗隷於太僕傳驛給受一出於樞宻院廐牧之政總於羣牧司本司無所掌元豐改制郎中員外郎始實行本司事參掌輿輦車馬驛置廐牧之事大禮則戒有司具五輅續㑹要建炎併太僕寺歸駕庫中興㑹要輿馬輦乗之奉郵驛牧圉之治中臺要務主以郎官南豐擬制擢司輿馬之政初寮除季倫制庫部郎中附員外郎史庫部郎中員外郎掌戎器鹵簿儀仗孔若思遷庫部郎中持一石止水滿於座右以示有止足之意唐書傳記周禮夏官有司甲胄弓矢今庫部郎中之任也魏始置庫部郎晉以後有郎中隋初為庫部侍郎煬帝去侍字唐武徳加中字龍朔改司庫大夫咸亨復周禮夏官有司兵後周有小武藏大夫蓋員外郎之任也隋開皇置煬帝為承務郎唐為庫部員外郎龍朔以來隨曹改復六典本朝駕庫二部皆無所掌建炎三年以駕部兼庫部㑹要甲胄弓矢之器乘輿鹵簿之式武藏之任郎選甚髙南豐集刑部經五曰秋官其屬六十掌邦刑周禮史刑部尚書一人侍郎二人掌律令刑法之政徒隷校覆讞禁之事其屬有四一曰刑部二曰都官三曰比部四曰司門唐志傳記漢成帝尚書初置二千石曹主郡國二千石又置三公曹主㫁獄光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊辭訟罪法亦謂之賊曹重於諸曹魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄隋開皇改都官為刑部統都官刑部比部司門四曹唐因之龍朔改司刑咸亨復武后改秋官神龍復天寳改憲部至徳復職林本朝刑部判部事二人淳化以刑部覆大辟案増置審刑院凡四方以具獄來上則讞於審刑院大中祥符置糾察在京刑獄司元豐並倂歸刑部五年官制行刑部始得専其官續㑹要刑部尚書經司冦蘇公式敬爾由獄以長我王國書立政司冦掌邦政詰奸慝刑暴亂周官乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國大司冦之職掌建邦之三典以佐王刑邦國詰四方周禮司冦正刑明辟以聴獄訟聴之於棘木之下以獄之成告于王大司冦以其成從質於天}
