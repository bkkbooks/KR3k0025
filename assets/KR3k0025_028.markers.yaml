  - {type: variant, offset: 2487, length: 2, content: 並荀, WYG: 遂置提舉帳司領之元豐官制行釐其事歸比部郎中員外郎始實行本司事四朝志列五案勾案覆磨勘案理欠案憑由案知雜案比部掌勾稽天下文簿周官宰夫所謂乗其財用之出入也續㑹要内外經費之任總于勾考之司南豐擬制惟是㑹計勾考之事命汝聴之曲阜吳景淵制稍升比計之曹胡文恭行吳伸制比勾劇曹陳象之制進司計於中臺竇平制司門郎中附員外郎經司門掌授管鍵以啓閉國門周禮史郎中員外郎掌門關出入之籍及闌遺之物唐書傳記周禮大司徒屬官有司門下大夫後周依周官隋開皇置司門侍郎煬帝去侍字唐加中字龍朔改司門大夫咸亨復周禮有司門上士後周有小司門上士隋置員外郎煬帝改承務郎唐武徳復故六典掌門籍關棧及道路所闌遺物之事職員令工部經六曰冬官其屬六十掌邦事周禮史唐工部尚書一人侍郎二人掌山澤屯田工匠諸司之事其屬有四一曰工部二曰屯田三曰虞部四曰水部唐書傳記漢成帝尚書有民曹主凡吏民上書光武改民曹主繕修功作鹽池園苑晉宋有起部每營宗廟宫室則惟置之北齊起部亦掌工造屬祠部後周有冬官大司空卿掌五材九範之法其屬有工部中大夫掌百工之籍而理其禁令至隋乃有工部尚書唐因之龍朔改為司平咸亨復武后改為冬官神龍復縂判工部屯田虞部水部事通典本朝工部判部事一人凡城池土木工役程式皆隷三司修造案本曹無所掌元豐官制行掌百工山澤溝洫屯田之政令續㑹要紹興三年併少府監歸工部以文思院屬焉中興㑹要蓋繕修興造程衆藝􅅚五材國家之務不可以不屬之其人今中臺起曹實踐其任矧屯田虞衡平水之職莫不隷焉牋表類工部尚書經舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰疇若予工僉曰垂哉帝曰俞咨垂汝共工宏父定辟司空掌邦土居四民時地利書國有六職百工與居一焉審曲面勢以飭五材以辨民器謂之百工周禮鳲鳩氏司空也五雉為五工正左傳史黄帝冬官為墨雲史記長孫平為工部尚書名為稱職隋書唐閻立本代兄立徳為工部尚書兄弟相代為八座時人榮之鄭善果為工部尚書正身奉法甚著榮績}
