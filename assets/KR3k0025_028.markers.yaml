  - {type: variant, offset: 639, length: 0, content: '', WYG: 以兩制及帶職朝官以上􅂶凡禮儀之事悉歸于太常禮院而貢舉之政領于知貢舉本曹但掌制科舉人補奏太廟社齋郎室長掌座都省集議百官謝賀表章諸司申舉祥瑞出納内外牌印之事而兼領貢院焉續㑹要元豐改制職掌如舊凡禮樂有所損益小事則同太常寺大事則集侍從或百官議定以聞若有事于南北郊明堂籍田禘祫太廟薦享景靈宫酌獻陵園及行朝貢慶賀晏樂之禮則承詔舉其儀物職官志尚書經宗伯掌禮典以和邦國以統百官以諧萬民周禮史前期戒有司辨具即上册寳及封册禮命亦如之凡天下選士具注于籍至三嵗貢舉考驗無冐濫乃聽預試凡大禮生辰后妃親王以下所推之恩公主下嫁宗室冠昏䘮𦵏之制及賜旌節章服冠帔旌表孝行之法例皆主行之大祥瑞則朔參官詣閣門表賀餘于嵗終條奏其屬有三曰祠部禮典醫政道釋祠廟之事𨽻焉曰主客蕃國朝貢及國信禮物之事𨽻焉曰膳部牲酒膳羞宴設給賜之事𨽻焉尚書主禮樂祭享貢舉之政令而侍郎}
