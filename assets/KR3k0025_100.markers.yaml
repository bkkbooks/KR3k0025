  - {type: variant, offset: 1632, length: 0, content: '', WYG: 謂舎為蜘蛛之隠金樓子觀夫蜘蛛之絲以網飛蟲也人之用詐安過之論衡集獨高懸以浮處遂設網於四隅南連大廡北接華堂左憑廣厦右依高廊吐絲屬緒目引結網纎羅絡漠綺錯交張雲舉霧綴以待無方成公綏伊蜘蛛之為蟲縱㣲性乎天壤稟妙造於化靈忽無擬而無想吐自然之纎緒先皇羲而結網憑輕羅以隠顯應大明之幽朗張}
