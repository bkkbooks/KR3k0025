  - {type: variant, offset: 157, length: 1, content: 皮, WYG: 安能為之足遂飲其酒戰國䇿巴蛇吞象三嵗而出角君子服之己心腹之疾山海經晉文公出田前有大蛇其高如隄其御請攻之文公曰不可我有失行而天惑我以妖我若攻之是逆天令也乃歸齋宿而請於廟退而修政居三日夢天誅蛇曰爾何敢當聖君之路文公覺令人視之蛇已魚爛矣賈誼書隋侯行見大蛇傷救而治之其後蛇銜珠以報之搜神記晉吳興太守袁𤣥瑛嘗之官請郭璞筮吉凶璞曰至官當有赤蛇為妖不可殺之後到府果有赤蛇在銅虎符首上蟠家人撾殺之其後𤣥瑛為徐馥所害廣五行記兩頭蛇嶺外多一頭有口眼一頭似頭而無口眼昔孫叔敖見之不祥乃殺而瘞之南人見之為常其禍安在嶺表録異集蝮蛇蓁蓁封狐千里靈蛇吞象厥大何如楚辭獨不見翠蛇絳螭之將登天乎必聳身於蒼梧之朔階浮雲翼疾風而上揚雄嘉茲蛇靈斷而能續飛不須翼行不假足𫝊𤣥蚺惟大蛇既洪且長采色駮犖其文錦章食灰吞鹿腴成養創賔享嘉宴是豆是觴楊氏異物志讃永州之野産異蛇黒質白章觸草木盡死以齧人無禦之者然得而腊之以為餌可以已大風踠攣瘻厲去死肌殺三蟲栁文吾悲夫天形汝軀絶翼去足無以相扶曲膂屈脅惟行之紆目兼蜂蠆色混泥塗其頭蹙恧其腹次且褰鼻鈎牙穴出㯦居蓄怒而蟠銜毒而趨志蘄害物隂蠧潛狙草搖風動百毒齊起首卷脊努吐舌搖尾不足其凶若病乎已宥蝮蛇文本朝欲知垂盡歳有似赴壑蛇修鱗半已沒去意誰能遮况欲繋其尾雖勤如奈何東坡鼃經蟈氏掌去鼃黽焚牡蘜以灰洒之則死周禮仲夏之月螻蟈鳴禮子井蛙不可以語於海者拘於虛也子獨不聞塪井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頥蹶泥則沒足滅跗塪井之樂此亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡巡而却告之海塪井之蛙聞之適適然驚規規然自失也莊子越王勾踐欲伐吳出見鬭鼃乃軾從者曰王何敬也曰以其勇氣故也其後國人輕命死戰韓子蝦蟇蛙龜且夜恒鳴口乾舌檘然布不聽管子史元鼎五年秋蛙與蝦蟇俱鬭漢書馬援為隗囂使公孫述歸謂囂}
