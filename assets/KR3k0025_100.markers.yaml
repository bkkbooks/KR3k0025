  - {type: variant, offset: 1199, length: 349, content: 無所定進退維谷詩桑柔匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵詩狼跋其胡載疐其尾注進則躐其胡退則跲其尾進退有難詩狼跋子壽陵餘子之學行於邯鄲未得其能又失其故行矣直匍匐而歸耳莊秋水注以此效彼兩失之史進退不可周旋不能左傳僖公十五年進退罪也左昭三年昔有學步邯鄲者曾未得其髣彿又復失其故步遂匍匐而歸前漢欲儃佪低佪也以干求也傺往也兮恐重患而離尤欲高飛而遠集兮君罔無也謂汝何之楚辭跋前疐後動輒得咎韓文進學解經拜下禮也今拜乎上泰也雖違眾吾從下語子罕眾惡之必察焉眾好之必察焉語衛靈公子流言止於智者荀天不為人之惡寒也而輟冬地不為人之惡遠也而輟廣荀天道良農不為水旱不耕同上史君之仇讎我之昏姻也左成十三年執此之政堅如金石西漢賈誼傳莊助言汲黯於武帝曰招之不來麾之不去通監西漢孤立群邪之間前漢鄭崇曰臣門如市臣心如水前漢本傳戰國儒術既絀然, WYG: 蚍蜉}
