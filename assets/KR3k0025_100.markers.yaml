  - {type: variant, offset: 2088, length: 172, content: 叔夜書風雨急而不輟其音雪霜零而不渝其色劉孝標絕交書如聞風過塵不動井中水陳子昂集處腴能不潤居劇體常閑孟浩然生長紈綺內辛勤筆舌間劉長卿侶彼白蓮花在水不著水白侍郎雖居世網常清淨韋應物主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽劉賓客守法持正嶷如秋山市井生而雲鶴性並同上玉立孤潔無緇磷遷染之譏唐文粹不為物遷不為波流同上惟憐一泒溫泉水不逐人心冷暖移唐杜正倫詩, WYG: 康}
