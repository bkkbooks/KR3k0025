  - {type: variant, offset: 1973, length: 1, content: 庾, krp: 蠅宋齊謂之羊陳楚之間謂之蠅自關而西秦晉之間謂之蠅方言光武與隗囂書曰蒼蠅之飛不過十步托驥之尾得以絶羣東觀記王思嘗執筆作書蠅集筆端驅去復來思怒取筆擲地踏壞之魏畧苻堅蒼蠅報赦見赦㤙類虞翻放棄南方自恨沒海隅生無可與語死以青蠅為弔客别傳何晏夢青蠅數十來自鼻上揮之不肯去明年晏伏誅廣五行記牛僧孺青蠅賀及第見及第類集青蠅嗜肉汁而忘溺死衆人貪世利而䧟罪禍班固本朝觸頻苒苒朋飛薨薨竊羶而蠧芳筵預登當是之際無不憎我疑奸人之魂佞人之魄堙鬰不散托蠅寄跡不然者何以變白為黒變黒為白所以恣其㸃染所以遂其䜛慝張乖崖爾形至眇爾欲易盈杯盂殘瀝砧几餘腥所希抄忽過則難勝苦何求而不足乃終日而營營逐氣尋香無所不到頃刻而集誰相告報尋頭撲面入袖穿裳或集眉端或沿眼眶目欲瞑而復警臂已掉而猶攘或醉醇醪因之沒溺或投熱羮遂喪其魄尤忌赤頭號為景跡一有霑汚人皆不食歐陽公蟁}
  - {type: variant, offset: 1975, length: 1, content: 嵩, WYG: 江浦之間生麽蟲名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也列子蚊蟁􅏐膚則通宵不寐矣猶鑿海涉河而使蚊負山也莊子蟁䖟􅏐膚而性不能平淮南子史中山靖王曰臣聞衆喣漂山聚蚊成雷漢書趙炳有道術章安令殺之人為立祠至今蚊蚋不能入也後漢書江東有吐蚊鳥夏夜吐蚊於蘆荻中唐史傳記秦}
  - {type: page-break, offset: 1975, content: '', id: KR3k0025_WYG_100-22b, image: WYG0932/WYG0932-0834d.png}
  - {type: variant, offset: 1975, length: 1, content: 嵩, krp: 江浦之間生麽蟲名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也列子蚊蟁噆膚則通宵不寐矣猶鑿海涉河而使蚊負山也莊子蟁䖟噆膚而性不能平淮南子史中山靖王曰臣聞衆喣漂山聚蚊成雷漢書趙炳有道術章安令殺之人為立祠至今蚊蚋不能入也後漢書江東有吐蚊鳥夏夜吐蚊於蘆荻中唐史傳記秦}
  - {type: variant, offset: 1977, length: 0, content: '', WYG: 之蚋楚謂之蚊説文丹鳥羞白鳥大戴禮齊桓公謂仲父曰一物失所寡人猶為之於邑白鳥營飢而求飽寡人因之開翠紗之帷進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱公之肉而退其蚊有不知足者遂長嘘短吸而食之及其飽也腹腸為之破潰公曰嗟夫民生亦猶是矣金樓子吳猛小兒時在父母邊臥夏時多蚊蚋而終不摇扇恐蚊蚋去已而及父母捜神記東方朔覆射蚊子見射覆類集雖得一餉樂猶如聚飛蚊韓文五月中夜息飢蚊尚營營但將膏血求豈覺性命輕顧己寧自愧飲人以偷生願為天下㡡一使夜景清孟郊沉沉夏夜空堂開飛蚊伺暗聲如雷嘈然倐起初駭聽殷殷若自南山來喧騰鼔舞喜昏黒昧者不分聰者惑露花滴瀝月上天利嘴迎人看不得我軀七尺爾如芒我孤爾衆能我傷天生有時不可遏為爾設幄潜匡牀清商一來秋日曉羞爾㣲形飼丹鳥劉夢得本朝薰簷苦煙燼燎壁疲照燭翾翾伺昏黒稍稍出壁屋填牕來若翳聚隙多可掬叢身疑䧟圍聒耳如遭哭猛攘欲張拳暗中甚飛鏃手足不自救其能營背腹六一集飽去櫻桃重飢來栁絮輕但知求旦暮休更問前程范文正蝨子紀昌學射於飛衛以􅈊懸蝨於牖南面而望之二年之後如車輪焉乃以燕角之弧孤蓬之簳射之貫蝨之心而懸不絶列子濡需者豕蝨是也擇疏鬛自以為廣宫大囿奎蹄曲腲乳間股脚自以為安室利處不知屠者之一旦布草操煙火而已與豕俱焦也莊子三蝨食彘相與訟一蝨遇之曰奚訟三蝨曰争肥饒者一蝨曰若爾不患臘之將至而烹之也乃相與聚其目而食之彘瘦人乃不殺韓子湯沐既具蟣蝨相弔淮南子夫蝨生於我我非蝨之父母蝨非我之子孫也抱朴子史獨不見羣蝨之處禈中逃乎深縫匿乎壞絮自以為吉宅行不敢離縫動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都羣蝨處於褌中而不能出也君子之處域内何異乎蝨之處禈中乎晉書江泌性行仁義衣敝蝨多綿褁置壁上恐蝨飢死乃置衣中終身無復蝨齊書傳記蝨齧人蟲也蟣蝨子也説文馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之蕩蕩然蟣蝨無所復依上悦因出小黄門頭有蝨者皆剃之東觀記}
