  - {type: variant, offset: 939, length: 6, content: 策秀才審官互, WYG: 本朝悍目知誰瞋皤腹空自脹慎勿困蜈蚣饑蛇不許放東坡越國車前矜勇甚子陽井底太驕生乘時不羡雲溟樂口作儀同皷吹聲宋子經坎井我自足跳梁而持頥鼈笑色無愠鶉化理莫推月下聲喧青草岸雨餘響徹緑荷洲雖蒙黄金擲荆卿空爾為或以白玉琢形模妙工倕咄爾百醜質詎辱五鼎脂浪號土底鴨雄誇水中雞何足汙帝筋但可充蛇饑洪駒父蟋蟀經蟋蟀刺晉昭公也七月在野八月在宇九月在戸十月蟋蟀}
