  - {type: variant, offset: 1660, length: 2, content: 奮戈, WYG: 中傷虜以為神人乃解圍去神仙感應篇集不以姿質之鄙薄兮欲増輝乎泰清雖無補於日月兮期自照於陋形當朝陽而戢景兮必宵昧而是征進不競於天光兮退在晦而能明傅咸著人疑不熱集草訝無煙到來燈下暗翻在雨中燃梁元帝幸因腐草出敢近太陽飛未足臨書卷時能㸃客衣隨風隔幔小帶雨傍林㣲十月清霜重飄零何處歸杜詩本朝夜深風露滿中庭時見孤螢自開闔熠燿亦求偶高屋飛}
