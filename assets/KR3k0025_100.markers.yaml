  - {type: variant, offset: 1704, length: 265, content: 曰他郡自有平原自無胡可相比通監漢靈紀王衍妻試衍以錢繞床使不得行衍曰舉阿堵物卻晉書殷仲文還姑熟祖送傾朝桓謙要王弘之同行荅曰凡祖離送別必在有情與殷風馬不接無緣陪從沈約宋書互入不苟合崔浩性不好莊老之書每讀數十行輒棄之曰此矯誣之說不近人情必非老子所作老聃習禮仲尼所師豈設敗法之言以亂先王之教袁生所謂家人筐篋中物不可揚於王庭魏史崔浩傳太宗謂尉遲敬德曰公心如山岳雖積金至斗知公不移通監唐高祖紀互入有守上曰人言魏徵舉止疏慢我視之更覺嫵媚通監唐太宗時法官競為深刻唯司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來侯必死遇徐杜必生通監唐武后韋況不為聲利所遷, WYG: ''}
