  - {type: variant, offset: 1556, length: 1, content: 廢, WYG: 知何事數遷居㣲軀所饌能多少一獵歸來滿後車一騎初乘隻又雙全軍突出陣成行䇿勛急報千夫長渡水還争一葦航誠齋蜘蛛經蠨蛸在户詩子晉公子重耳奔齊見蜘蛛布網曵蠅執豸而食之謂舅犯曰此蟲也智之薄者矣人之有智而不能廓垂天之綸布絡地之網以供方丈之御是曽不如蜘蛛之智也舅犯曰君將行之則有邦有嗣矣管子太昊師蜘蛛而結網抱朴子}
