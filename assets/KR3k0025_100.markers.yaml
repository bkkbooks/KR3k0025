  - {type: variant, offset: 946, length: 0, content: '', WYG: 我牀下詩季夏蟋蟀居壁禮史蟋蟀俟秋唫漢書秋風厲而蟋蟀吟蓋氣使之然也後漢書傳記蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬一名蜻蛚楚人謂之王孫幽州人謂之促織督促之言也里語曰趣織鳴懶婦驚詩義疏蟋蟀之蟲隨隂迎陽居壁向外趣婦女織績女工之象易通系卦立秋蜻蜒鳴白露下蜻蛚上堂易通卦騐朽葦為蛬捜神記蟋蟀集天子無逺兵春秋潛潭巴莎雞一名促織一名絡緯促織謂鳴聲如急織也絡緯謂其聲如紡績也促織一曰促機絡緯一名紡緯古今注集澹容與而獨猗兮蟋蟀鳴此西堂楚辭何兹蟲之資生亦靈智之攸授享神氣之么眇體形容之㣲陋厲清響於長宵激悲聲以迄曙虞諶賦開秋肇凉氣蟋蟀鳴牀帷阮籍促織甚㣲細哀音何動人草根吟不穏牀下夜相親久客得無淚故妻難及晨悲絲與急管感激異天真杜詩本朝是固夫霜凄露感而恤緯征人之裳者歟身勤心苦而提耳女工之荒者歟晝閴宵喧自基而徂堂者歟多言强聒身隠而聲彰者歟若悲若怨若憤若歎而吟嘯秋夕之清長者歟一聲能遣一人愁終夕聲聲曉未休不解繅絲替人織强來出口促衣裘誠齋賦蟻經饋食之豆蚔醢注云蚔蟻子也周禮蛾子時術之禮子羊肉不慕蟻蟻慕羊肉羶也吞舟之魚蕩而失水則螻蟻能苦之莊子桓公伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤寸而有水乃掘遂得水千丈之隄以螻蟻之穴而潰以骨去蟻蟻愈多韓子蟻有兼弱之智抱朴子傳記蚍蜉}
