  - {type: variant, offset: 1637, length: 0, content: '', WYG: 秦臺粉輕塗漢殿金相憐惟栁絮所得是花心可要凌孤客邀為子夜吟李嶠本朝蝴蝶雙飛得意偶然畢命網羅羣蟻争收墜翼䇿勲歸去南柯山谷翅輕於粉薄於繒長被花牽不自勝若信莊周尚非夢豈能投死為韓憑王介甫蝴蝶新生未解飛鬚拳粉濕睡花枝夜來借得風光力不記如癡似醉時誠齋蠭經莫予荓蜂自求辛螫詩蜂蠆有毒而况國乎左傳子奔蜂不能化藿蠋莊子蜂房不容鵠卵蜂蠆螫指而神不能怡淮南子蜂有攻寡之義抱朴子史豫章嚴豐為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徴萌不従果見殺謝承陶侃表袁謙為高凉太守有蜜蜂蔽日而下謙船上㑹得留郡文書賊欲乘虛攻郡謙欲速赴卒遇大風飛沙不得復還浦遂沒海中鄒湛對武帝曰蜂蠆作於懐袖勇夫為之驚駭王隠傳記蜂燕趙之間謂之蠓螉或謂之蚴蛻其大有蜜謂之壺蜂方}
