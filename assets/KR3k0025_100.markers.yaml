  - {type: variant, offset: 1636, length: 0, content: '', WYG: 鳯子一名鳯車一曰鬼車古今注唐穆宗禁中花開夜有蝴蝶數萬集花間宫人以羅巾撲之無獲者上令張網空中得數百遲明視之皆庫中金玉錢杜陽雜編嘗有人浮南海泊於孤嶼忽有物如蒲帆飛過海將到舟競以物撃之盡破碎墜地視之乃蛺蝶也海人去其翅足秤之得肉八十斤噉之極肥美異物志鶴子草蔓上春生雙蟲越女收於粧奩中摘其葉飼之蜕為蝶赤黄色婦女收而帶之謂之媚蝶嶺表録異集野畦連蛺蝶沙晩低風蝶風輕粉蝶喜穿花蝴蝶深深見留連戯蝶時時舞娟娟戯蝶過閑慢杜詩揚揚弄芳蝶韓文尋艶復穿香似閒還似忙暖煙沉蕙徑㣲雨宿花房書幌輕隨夢歌樓誤採粧王孫深屬意繡入舞衣裳鄭谷飛來繡户隂穿過畫樓深重}
