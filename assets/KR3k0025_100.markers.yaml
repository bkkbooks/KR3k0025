  - {type: variant, offset: 3229, length: 123, content: 矢而蹶千金虞卿以顧盼而捐相印西漢班固一矢事見史記魯仲連傳相印事見史記虞卿傳集君於為義若嗜慾勇不顧前後於利與祿則畏避退處如怯夫然韓文孔君墓誌銘輕財抵一銖白樂天集本朝吳奎以錢二千萬買田北海號曰義莊以賙親戚朋友之貧乏者終之日家無餘財諸子無宅以居吳奎墓銘, WYG: 百}
