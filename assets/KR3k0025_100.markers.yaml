  - {type: variant, offset: 1973, length: 1, content: 庾, WYG: 蠅宋齊謂之羊陳楚之間謂之蠅自關而西秦晉之間謂之蠅方言光武與隗囂書曰蒼蠅之飛不過十步托驥之尾得以絶羣東觀記王思嘗執筆作書蠅集筆端驅去復來思怒取筆擲地踏壞之魏畧苻堅蒼蠅報赦見赦㤙類虞翻放棄南方自恨沒海隅生無可與語死以青蠅為弔客别傳何晏夢青蠅數十來自鼻上揮之不肯去明年晏伏誅廣五行記牛僧孺青蠅賀及第見及第類集青蠅嗜肉汁而忘溺死衆人貪世利而䧟罪禍班固本朝觸頻苒苒朋飛薨薨竊羶而蠧芳筵預登當是之際無不憎我疑奸人之魂佞人之魄堙鬰不散托蠅寄跡不然者何以變白為黒變黒為白所以恣其㸃染所以遂其䜛慝張乖崖爾形至眇爾欲易盈杯盂殘瀝砧几餘腥所希抄忽過則難勝苦何求而不足乃終日而營營逐氣尋香無所不到頃刻而集誰相告報尋頭撲面入袖穿裳或集眉端或沿眼眶目欲瞑而復警臂已掉而猶攘或醉醇醪因之沒溺或投熱羮遂喪其魄尤忌赤頭號為景跡一有霑汚人皆不食歐陽公蟁}
