  - {type: variant, offset: 1641, length: 1, content: 動, WYG: 成己子詩曰螟蛉有子蜾蠃負之博物志尹吉甫子伯竒後母取蜂去毒繋於衣上伯竒前欲去之母便大呼曰伯竒牽我吉甫見疑伯竒自死列女傳葛仙翁與客對食吐口中飯盡成飛蜂滿屋皆不螫人良久仙翁張口蜂還飛入口中成飯别傳元嘉元年建安郡山賊百餘人入浮圗剽掠財寳忽有蜜蜂從衣簏出噬螫羣賊身首腫痛先諸所掠皆棄而走蜂飛邀逐噬擊彌絡賊遂惶懼從便道而去宣驗己雖}
