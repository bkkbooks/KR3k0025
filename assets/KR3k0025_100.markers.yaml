  - {type: variant, offset: 1552, length: 0, content: '', WYG: 謂蚼蠓西南梁益之間謂之𤣥駒燕謂之蛾蛘楚郢以南蟻土謂之封方言殷仲堪父病虛悸聞牀下蟻動云是牛鬬世説桓謙太元中忽有人皆長寸餘悉被鎧持槊縁機登竈或有切肉輒以槊刺取徑入穴道士朱應子令以沸湯澆所入處掘之有斛許大蟻死窟中謙後以門釁同滅異苑淳于棼夢入蟻穴見木部槐類交廣溪洞間酋長多收蟻卵鹵以為醬非官客親友不可得也嶺表録異集南方豈螘若象楚辭節殷人之喪輿在四隅而交結濟齊桓之窮師由山東之高垤感萌陽以潜步知將雨而封穴伊斯蟲之愚昧乃先識而似哲郭璞嘗濟齊師之乏亦聞媯徳之羶覩封穴而知雨驗寸壤而得泉出以時而不息故}
