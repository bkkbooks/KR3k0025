  - {type: variant, offset: 1646, length: 0, content: '', WYG: 秉艾催客奔布囊包褁閙如市坌入竹屋新且完小􅐼出入旋知路幽圃首夏花正繁相逢處處命儔侣共入新宅長子孫蜂王舉家千萬口黄蠟為糧蜜為酒口銜澗水拾花鬚沮洳滿房何不有蘇子由蜜蜂不食人間倉玉露為酒花為糧作蜜不忙採花忙蜜成猶帶百花香蜜成萬蜂不敢嘗要輸蜜國供蜂王蜂王未及享人已割蜜房誠齋蟬經五月鳴蜩鳴蜩嘒嘒詩仲夏蟬始鳴季秋寒蟬鳴范則冠而蟬有緌禮子仲尼見痀僂者承蜩猶掇之也仲尼曰用志不分乃凝於神其痀僂丈人之謂乎莊子曜蟬者務明其火振其樹荀子蟬無口而鳴蟬飲而飲食三十日而蜕淮南子史朱异除中書郎始拜有飛蟬正集异武冠上時咸謂蟬珥之兆梁書後周宣帝汰侈嘗自帶綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王}
