  - {type: variant, offset: 1658, length: 0, content: '', WYG: 抱寒莖槁東坡一殻空空紙様輕風前却有許多聲呌來呌去渾無事呌到詩人白髮生説露談風有典章詠秋吟夏入宫商蟬聲無一些煩惱自是愁人枉斷腸誠齋螢經熠燿宵行詩季夏腐草為螢禮史張讓段珪刼少帝及陳留王協走小平津帝與王夜步逐螢火光行數里得民家露車同乗還宫後漢書煬帝幸景華宫徴求螢火得數斛夜出逰山而放之光徧岩谷隋書傳記螢文即炤爾雅螢一名輝夜一名景火一名熠熠一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蜹古今注丹鳥羞白鳥丹鳥謂丹良也白鳥謂蚊蜹也大戴禮車𦙍好學家貧不常得油夏月則以練囊盛數十螢火夜以繼日焉續音陽秋務成子螢火丸方武威太守劉子南合而佩之永平中為虜所圍矢下如雨終}
