  - {type: variant, offset: 1663, length: 2, content: 待反, WYG: 追定知無㡬見迫此清霜期東坡却馬已録仙人方映書曽登君子堂不畏月明見陋質但畏風雨難為光陳去非熠熠孤光動翩翩渡水來后山蠅經匪雞則鳴蒼蠅之聲營營青蠅止于樊豈弟君子無信䜛言營營青蠅止于棘䜛人罔極交亂四國營營青蠅止于榛䜛人罔極搆我二人詩子以魚􅇌蠅蠅愈至符子或問蒼蠅紅紫揚子注云蒼蠅間乎白黒紅紫似朱而非朱也史成帝建始元年青蠅萬數集未央宫朝者坐昌邑王賀夢青蠅積西階}
