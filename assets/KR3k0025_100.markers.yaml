  - {type: variant, offset: 149, length: 0, content: '', WYG: 史秦文公夢黄蛇自天下屬地其口出於鄜衍於是作鄜畤史記高祖夜行澤中大蛇當道拔劍斬之後人至蛇所有一老嫗夜哭曰吾子白帝子也化為蛇當道今者赤帝子斬之漢書杜預醉臥齋中外人聞嘔吐聲竊窺於戸見一大蛇垂頭而吐聞者異之樂廣嘗有親客久闊不復來廣問其故答曰前蒙賜酒見杯中有蛇既飲而疾時㕔事壁上有角漆弓畫作蛇廣意杯中蛇即角弓影也復置酒謂客曰酒中復有所見否答曰如初廣乃告其所以客豁然頓愈晉書劉秀之十許嵗時與諸兒戯於前渚忽有大蛇來勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉沈約宋書翟讓初見李宻衣在格上宻腰帶化為赤蛇讓心異之竟為宻所殺隋書元和中五坊小使毎羣聚於賣酒食家肆情飲啖將去留蛇一篋誡之曰吾以此蛇致供奉鳥雀可善飼之}
