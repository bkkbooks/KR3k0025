  - {type: variant, offset: 2280, length: 856, content: 輔弼飲食起居如陋巷之士環堵之儒他人不堪公處愉愉歐公集祭杜祁公文百人譽之不加密百人毀之不加疏老泉文世人共棄君獨厚東坡詩身為玉雪不汙青蠅東坡祭黃幾道文納之煩劇而不亂涅於渾濁而不緇欒城集終守金石之姿不為燥濕所變同上白蓮生淤泥清濁不相干欒城集經惟民生厚因物有遷書君陳人生而靜天之性也感於物而動性之欲也記樂記夫民有血氣心知之性無哀樂喜怒之常應感起物而動然後心術形焉同上身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正記大學子從物如流不知所執家語今使人生而未嘗睹芻豢稻粱也惟菽藿糟糠之為睹則以至足為在此也俄而粲然有秉芻豢稻粱而至者則瞲然視之曰此何怪也彼臭之而無嗛於鼻嘗之而甘於口食之而安於體則莫不取此而棄彼矣莊天運罔兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶莊史郄超王珣為桓大司馬主簿記室人為之歌曰髯參軍短主簿能令公喜能令公怒世說傳記貧賤則懾於飢寒富貴則流於逸樂魏文典論皎皎練絲得藍則青得丹則赤得蘗則黃得泥則黑楚辭偭音面規矩而改錯背繩墨以追曲楚辭蘭芷變而不芳兮芝一作荃蕙化而為茅何昔日之芳草兮今直為蕭艾也楚辭情因所習而遷移物觸所遇而興感故振轡於朝市則充詘之心生閑步於林野則遼落之志興晉孫綽蘭亭序已悲素質隨時染杜詩小人趍時必變顏色棄瘠涵腴乃蝨之賊陸龜蒙布鼓隨椎響坯泥仰匠圓元微之集無異盧狗之遇嗾呀呀而走不顧險阻唯嗾者之從何無已之心也柳文一日看除目終年損道心姚少監本朝衣冠所以為容也稱禮斯美矣世人捨其所稱聞人所尚而慕之豈非以耳視者乎涑水迂書一逢蘭蕙質稍回鐵石心東坡詩丈夫剛鐵腸因花反柔弱翰府名談經不義而富且貴於我如浮雲語述而見利思義語憲問義然後取人不厭其取同上子非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也孟萬章上先義而後利者榮荀從士以上皆羞利而不與民爭業荀大略義之所在不傾其權不顧其利舉國而與之不為改視重死持義而不撓荀榮辱道義重則輕王公矣荀修身不為利遷莊為義者不可劫以兵不可縣以利文子士有一飧而倒戟義所驅也莊史吳伐楚入郢申包胥乞師於秦以救楚楚子入于郢當申包胥申包胥曰吾為君也非為, WYG: 害}
