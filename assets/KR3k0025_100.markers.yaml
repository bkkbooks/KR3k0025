  - {type: variant, offset: 1647, length: 5, content: 孝要君致釁, WYG: 有綬者並令去之傳記鳴蜩蟬也宋衛謂之螗蜩陳鄭云蜋海岱之間謂之蟬詩疏義姤上九候蟬始鳴不鳴國多妖言易通卦騐牛亨問董仲舒曰蟬為齊女何答曰昔齊王后怨王而死屍變為蟬登庭樹嘒唳而鳴王悔之故曰齊女古今注集蟬寂漠而無聲楚辭吸清露於丹園抗喬枝而理翮曹大家飲露非表清輕身易知足禇雲蘭棲朝咽露樹隠瞑吟雲方干本朝引清風以長嘯抱纎柯而永歎嘒嘒非管泠泠若弦裂方號而復咽凄欲斷而還連吐孤韻以難律含五音之}
