  - {type: variant, offset: 1634, length: 1, content: 彪, WYG: 小者近網而斃物之大者兼網而逝網也者繩其小而不繩其大吾不知爾身之危兮腹之餧兮吁羅隠本朝日結一尺網知吐㡬尺絲百蟲為爾食丸腹尚若饑梅聖俞静看簷蛛結網低無端妨礙小蟲飛蜻蜓倒掛蜂兒窘催喚山童為解圍范至能網羅滿腹輸渠巧也只蠅蚊命屬渠網羅最宻是蛛絲却被秋蚊探得知粘著便飛來不再蛛絲也解有疎時誠齋織絲來往疾如梭長愛騰空作網羅害物身心雖甚小謾天綱紀亦無多翟嗣宗蚯蚓經孟夏蚯蚓出仲冬蚯蚓結禮子上食槁壤下飲黄泉孟子蚯蚓見軍中尤多者軍罷又宜備反叛抱朴子傳記蚯蚓一名䖤蟺一名曲蟺善長吟於地中江東謂為歌女或謂鳴砌古今注螾無爪牙之利筋脉之强上食睎土下飲黄泉者用心一也大戴禮黄帝時螾大如虹帝王世紀陳後主時隋軍至江蚯蚓盡出森然如値箭陳氏水鄉蚯蚓土蟲象陳氏自稱土徳盡出明傾其窟穴以曲歸直是嵗隋平陳大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓為羮以食之未㡬雷震其婦俄而從空落身如故而易頭為白狗頭廣五行記集蚯蚓土精無心之蟲交不以分婬於阜螽觸而感物無乃常雄郭璞蚯蚓上深堂杜詩本朝蚓食土而飲泉其為生也簡而易足然仰其穴而鳴若號若呼若嘯若歌其亦有所求耶抑其求易足而自鳴其樂耶其生陋而自悲其不幸耶將自喜其聲而鳴其類耶豈其時至氣作不自知其所以然而不能自已致耶何其聒然而不止耶吾於是乎有感六一集蝶子昔莊周夢為蝴蝶栩栩然蝴蝶也不知周也俄然覺則蘧蘧然周也不知周之夢為蝴蝶歟蝴蝶之夢為周歟莊子鳥足之根為蠐螬其葉為蝴蝶列子史魏收在洛京輕薄尤甚人號云魏收驚蛺蝶北齊書傳記蛺蝶一名野蛾一名風蝶江東人號為撻末色白背青者是也其大有如蝙蝠者或黒色或赤斑名}
