  - {type: variant, offset: 2822, length: 0, content: '', WYG: 呼為禁臠晉謝昆傳王羲之年十三周顗異之時重牛心炙先割噉羲之晉本傳何𦙍侈於味食必方丈後稍去其甚者猶食白魚䱉脯糖蟹以為非見生物寧食蚶蠣使門人議之學徒鍾玩曰䱉之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙混沌之奇壙殻外緘非金人之愼不悴不榮曽草木之不若無香無臭與瓦礫其何異故宜長充庖厨永為口味梁書裴冕珍膳賓客有昧於品味之名者唐本傳八珍百品以宴嘉賓唐韋彤傳集鼎臑而力切盈望和致芳只臑熟也芳椒薑也只語助也蕙肴蒸兮蘭藉和酸若苦陳吳羮吳人善作􅃵楚詞珍羞琅玕充溢圎方南都賦加肴充圎方豐膳出中厨曹子建膚寸肴羞味踰方丈應休運書六禽殊珍四膳異窮海之錯極陸之毛封熊之蹯翰音之跖燕髀之脣𤣥豹之胎時膳四膏七命饔人縷切鸞刀若飛應刀落爼靃靃霏霏潘岳西征賦積肴如丘山左太沖吳賦甘食兼味}
