  - {type: variant, offset: 2430, length: 2, content: 田豫, WYG: 本傳王羲之云每行山陰道上如鏡中遊王獻之望鏡湖澄澈瀉注乃云山川之美使人應接不暇宋前秘書監謝靈運好為山澤之遊窮幽極險從者數百人伐木開徑謝靈運與族弟惠連東海何長瑜潁川荀雍太山羊璿之以文章賞㑹共為山澤之遊時人謂之四友南史宋謝靈運傳謝琨與族子靈運晦曜以文義賞㑹其處居在烏衣巷故謂之烏衣之遊琨詩所言昔為烏衣遊戚戚皆親姓者也南史謝𢎞㣲蕭介與兄琛眕弟叙等文酒賞㑹時人以比謝氏烏衣之遊梁書本傳簡文帝遊華林園顧謂左右}
  - {type: page-break, offset: 2430, content: '', id: KR3k0025_WYG_083-36a, image: WYG0932/WYG0932-0532a.png}
  - {type: variant, offset: 2430, length: 2, content: 田豫, krp: 本傳王羲之云每行山陰道上如鏡中遊王獻之望鏡湖澄澈瀉注乃云山川之美使人應接不暇宋前秘書監謝靈運好為山澤之遊窮幽極險從者數百人伐木開徑謝靈運與族弟惠連東海何長瑜潁川荀雍太山羊璿之以文章賞㑹共為山澤之遊時人謂之四友南史宋謝靈運傳謝琨與族子靈運晦曜以文義賞㑹其處居在烏衣巷故謂之烏衣之遊琨詩所言昔為烏衣遊戚戚皆親姓者也南史謝𢎞㣲蕭介與兄琛眕弟叙等文酒賞㑹時人以比謝氏烏衣之遊梁書本傳簡文帝遊華林園顧謂左右}
