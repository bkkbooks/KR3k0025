  - {type: variant, offset: 787, length: 0, content: '', WYG: 窮居而野處升高而望逺坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適所安古之老於鄉者將身佚非自苦閭中田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來徃也沈}
