  - {type: 'tls:seg', offset: 2440, content: '', id: KR3k0025_CHANT_083-8a.40}
  - {type: variant, offset: 2441, length: 4, content: 猶鐘鳴漏, WYG: 如朝露去日苦多魏武清時難屢得嘉㑹不可常曹子建時無重至華不冉揚蘋以春暉蘭以秋芳來日苦短去日苦長今我不樂蟋蟀在房陸機揮金樂當年歲暮不留儲張景陽頓足起舞抗音高歌人生安樂孰知其他潘岳人生不能行樂死何以虛諡為潘安仁良晨美景賞心樂事四者難并謝靈運人生如寄多憂何為今我不樂歲月如馳善哉行願及芳年賞嬌鶯二月初孟浩然人生得意須}
  - {type: page-break, offset: 2441, content: '', id: KR3k0025_WYG_083-39a, image: WYG0932/WYG0932-0533c.png}
