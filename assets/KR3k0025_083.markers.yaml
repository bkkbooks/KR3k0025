  - {type: variant, offset: 2416, length: 1, content: 互, WYG: 長安風俗元日以後遞以飲食相邀號傳坐南部新書集酒車酌醴方駕授餐東京賦肴來不虛歸觴至反無餘曹子建贈每觴酌流行絲竹並奏酒酣耳熱仰而賦詩魏文帝吳質書燕飲彌日曹子建塤簫激於華屋文選吳質酌羽觴以交歡三沈宴置酒若淮泗積肴若山丘左太沖吳賦四坐咸同志羽觴不可筭陸士衡永和九年歲在癸丑暮春之初㑹于㑹稽山陰之蘭亭脩禊事也羣賢畢至少長咸集此地有崇山峻嶺茂林脩竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以游目騁懐足以極視聽之娛信可樂也王羲之中山不知醉飲德方覺飽情盤景遽歡洽日斜文選金罍引上賓駱賓笙歌雜曙鐘孟浩然樂極未言醉杯深猶恨稀陳後主峩峩紅粉席沈佺期花迎喜氣皆知笑鳥識歡聲亦解歌高談隨羽觴樽前還有錦纒頭華筵直千金王維萬牛炙臠萬甕行酒妖姬踏筵舞車載牲牢甕舁酒並招賓客延鄒枚韓文聯句放杯遲貴重近臣光綺席元微之慇懃報絃管明月有佳賓賀賓喜色欺杯酒醉妓歡聲遏管絃南山賓客東山妓此㑹人間曽有無白傅集羽觴飛翔匏竹激越熈然而歌婆然而舞持頥而笑不知日之將暮柳文所謂牛馬之飲者离坐其背實觴而流之接取以飲柳文序管絃喧夜景灯燭掩寒蟾飲和心自醉何必管絃催客重桮盤侈臨觴而百斟劉賓客賓筵接時彦霄盡方連讌野苞薦嘉魚激潤泛羽觴絲竹促飛觴夜讌達晨星花裏獨開樽韋應物何事歡娛中易覺春城暮劉駕詩歌舞留人月易低花添羅綺色鶯亂管絃聲儲光羲香曛羅幕煖成烟火照中庭燭滿筵整頓舞衣呈玉腕動揺歌扇露金鈿青娥側坐調雙管彩鳯斜飛}
