  - {type: variant, offset: 3741, length: 10, content: 兔跡貪前逐梟心不早防, WYG: 春醪又千名斷送一生唯有酒韓文舊法依稀傳自杜新方要妙得於陳色洞玉壺無表裏光揺金盞有精神能消忙事成閑事轉得憂人作樂人雲液洒六腑湯和生四肢白傅溢瓮清如水粘盃半似脂姚少監生辰經誕彌厥月乃占我夢吉夢唯何維熊維羆男子之祥維嶽降神生甫及申詩男子設弧於門左女子設恱於門右男子生桑弧蓬矢六以射天地四方記史李白母夢長庚而生李白唐李白傳傳記夫子生有麟降於庭孔鯉生有人饋金鯉記室新書關令尹喜生時其家陸地自生蓮花光色鮮盛關令内傳集皇覽揆余初度兮楚辭昴星呈祥德精降位文選太白之精雷泉之靈應家之禎為國而生}
