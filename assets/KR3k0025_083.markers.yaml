  - {type: variant, offset: 3546, length: 5, content: 忘卻身羅隱, WYG: 陶器必良火齊必得酒者所以飬老也所以養病也記史奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也有酒如池有酒如澠左傳大宛有葡萄酒史西南夷傳酒百藥之長前食貨志酒者天之美禄帝王所以頥養天下享祀祈福扶衰養疾百禮之㑹非酒不行前食貨志消憂者莫若酒漢東方朔傳漿酒霍肉西漢張禹傳一肉巵酒西漢鮑宣傳鮮于輔曰醉客謂酒清者為聖人濁者為賢人魏志徐邈傳阮籍聞步兵厨營人善釀者貯酒三百斛乃求為步兵校尉阮孚為常侍以金貂換酒晉書桓公有主簿善别酒好者為青州從事惡者謂平原督郵世說}
