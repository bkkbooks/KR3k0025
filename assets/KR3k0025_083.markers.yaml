  - {type: variant, offset: 1732, length: 1, content: 幻, WYG: 謝朓詩關山嗟墜葉岐路憫征蓬别鶴聲聲逺愁雲處處同江總詩行子腸斷百感悽惻江文通别賦舟凝滯於水濱車逶遲於山側文選鄉國一辭江山萬里行役風霜久鄉園夢想孤駱賓王着鞭跨馬涉逺道李白我車已載脂舟車半天下杜工部旅魂驚北鴈鄉信是東風春來愛有歸鄉夢一半猶疑夢裏行元微之車行冒風塵僕御促前征韋應物主人燈下别羸馬月中行踏石新霜滑穿林宿鳥驚杜詩來徃再逢梅柳新始去杏飛蜂及歸柳嘶蟄韓文漂淪多憔悴轉徙江湖間白侍郎旅情偏在夜鄉思豈帷秋劉賓客蠒足千里劉禹錫日下人誰憶天涯客獨行逆旅鄉夢頻春風客心碎頃來行已逺彌覺天無涯迢遞萬里㠶飄飄一行客劉長卿鷄聲茅店月人跡板橋霜温庭筠詩失意未還家馬蹄盡四方王建詩芰荷風起客堂靜松桂月高僧院深清露下時傷旅鬂白雲歸處寄鄉心孤枕易為客逺書難到家}
