  - {type: variant, offset: 1687, length: 0, content: '', WYG: 一涯相望落落如晨星不覺便同千里逺東坡詩隔巷如千里盈盈一水不須思經歲相過自作疎陳後山思想經寤言不寐願言則􅅉鄭箋云今俗人􅅉云人道我此古之遺語也愛而不見搔首踟蹰瞻彼日月悠悠我思道之云逺曷云能來瞻望弗及實勞我心莫徃莫來悠悠我思云誰之思西方美人中心揺揺中心如醉中心如噎誰謂河廣一葦杭之誰謂宋逺跂予望之詩子心若懸於天地之間去人滋久思人滋深莊子六國時張敏與高惠二人為友每相思不能得見敏便於夢中徃尋但行至半道即迷不知路遂囘如此者三韓非子史引領北望日月以兾無日忘之閔閔焉如農夫之望嵗左心揺揺如懸旌而無所終薄戰國䇿今吾每飯意末嘗不在鉅鹿也通鑑漢紀隔闊相思發於寤寐東漢臧洪傳劉惔夜在簡文座愀然嘆曰清風朗月無𤣥度晉書鏡與人俱去鏡歸人不歸無復嫦娥影空餘明月輝世說范蠡既去越越王乃使良工鑄金象范蠡置之坐側吳越書春秋集夜烱烱而不寐魂營營而至曙望孟夏之短夜何晦明其若嵗惟郢路之逺兮魂一夕而九逝楚辭望風懐想答蘇武别如俯仰脫若三秋選神徃同逝感形留悲參商陸雲詩每一念來忽若有遺文選雲中辨江樹天際識歸舟文選搔首訪行人引領兾良覿謝靈運詩離居幾何時鑚燧勿改火選詩顧望脰懸文選視陰數箭周𢎞讓書岐路分襟易風雲促膝難風月虛心形留神住山川在目室邇人逺駱賓王故人不可見漢水日東流王維集願作陽臺一片雲相思無晝夜東泛似長川相思相見知何日此時此夜難為情千里若在眼萬里若在心相思千萬里一書値千金天涯有度鳥莫絶瑶華音李太白集相思望斗牛孟浩然渭北春天樹江東日暮雲何時一樽酒重與細論文杜詩山岳移可盡江海不可絶離恨若虛空年年思不徹朝朝寧不食日日願見君一日不得見愁膓坐氤氲如何逺相失各作萬里雲萬一樓頭望還應望我愁殷懃眼前水千里到河陽安得故人生羽翼飛來相伴醉如泥元㣲之思君秋夜長一夜魂九升思君春日遲一日腸九迴自從花顔去秋水無芙蓉蛾眉别久心知否兩處春光同日盡居人思客客思家風波不見三年面書信難傳萬里腸逺地官長親故少些些談笑與誰同遊山弄水㩦書卷㸔月尋花把酒盃六事盡思君作伴幾時歸到洛陽來白侍郎悠悠我之思擾擾風中纛居閑處獨時徃日來于懐也與足}
