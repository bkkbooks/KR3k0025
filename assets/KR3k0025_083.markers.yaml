  - {type: variant, offset: 744, length: 0, content: '', WYG: 茍有累食肉常如飢我心既無苦飮水亦可肥卧簟蘄竹冷風襟卭葛踈取興或寄酒放情不過詩海内無如此地閒今日北牎下自問何所為欣然得三友三友者為誰琴罷輒舉酒酒罷輒吟詩三友迎相引循環無已時無事日月長不羈天地闊筋力不將諸處用登山臨水詠詩行元晏家風黄綺身深居髙卧養精神性慵無病常稱病心足雖貧不道貧朝隨浮雲出夕與飛鳥還天供閒日月人借好園林始知天造空閒景不為忙人富貴人人閒自在天一日安閒値萬金優㳺福禄更難消輕紗一幅巾小簟六尺牀無客盡日靜有風終夜凉以山水風月歌詩諷吟樂其志白侍郎詩平明閭巷掃花開薄暮漁樵乘水入花時金谷飮月夜竹林眠王維集口不言功心自適吟詩釀酒待花開永日屬閒人同上閒人占閒景入門松菊閒劉賓客􅓯嵩開雲扄厭穎抗風榭韓}
