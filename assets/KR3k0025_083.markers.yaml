  - {type: variant, offset: 1627, length: 3, content: 運數本, WYG: 花能嫣然顧我笑鳥勸我飮非無情身閒酒美惜光景唯恐鳥散花飄零身閒始覺韶光好人意乘閒味愈長脫遺軒冕就安閒笑傲丘園縱倒冠歐公詩玉麈清談消永日美酒清香消晝景飲酒横琴消永日解組便為閒處事輕蓑短笠伴春鋤晋歌凉竹簟之暑風曝茅簷之冬日睡餘支枕念昔平生仕宦出處清風之館覽秀生凉坐竹林之脩蔭泛水芰之清香無窮興味閑中得強半光隂醉裏消靜愛竹時}
