  - {type: variant, offset: 2459, length: 0, content: '', WYG: 耕婦不知織乘馬從徒安坐而食韓文書問經子寧不嗣音毋金玉爾音而有遐心詩子千里之情通管子傳千里之忞忞莫如書揚子敬佩玉音服之無斁文中子史子産寓書於子西以告宣子叔向詒子産書左傳廣武君謂韓信曰君若使一介奉咫尺之書史記萬石君為中㳙受書謁史本傳時有奏記西漢朱傳移書顯責之西漢薛宣傳鄧訓故吏知訓好青泥封書從黎陽步推鹿車載青泥至上谷遺訓東觀漢記心開目明反覆數周曠然發矇東漢蔡邕劉廙曰尊卑有分不敢脩草書三國志執玩反覆不能釋手同上公受奕世之寵極人臣之位南北迥邈同契一致萬里之心存於尺書晉書劉琨傳殷羨為豫章太守都下人士因致其書百餘函行次石頭皆投之水中曰沈者}
  - {type: page-break, offset: 2459, content: '', id: KR3k0025_WYG_083-40b, image: WYG0932/WYG0932-0534b.png}
  - {type: variant, offset: 2459, length: 0, content: '', krp: 耕婦不知織乘馬從徒安坐而食韓文書問經子寧不嗣音毋金玉爾音而有遐心詩子千里之情通管子傳千里之忞忞莫如書揚子敬佩玉音服之無斁文中子史子産寓書於子西以告宣子叔向詒子産書左傳廣武君謂韓信曰君若使一介奉咫尺之書史記萬石君為中㳙受書謁史本傳時有奏記西漢朱傳移書顯責之西漢薛宣傳鄧訓故吏知訓好青泥封書從黎陽步推鹿車載青泥至上谷遺訓東觀漢記心開目明反覆數周曠然發矇東漢蔡邕劉廙曰尊卑有分不敢脩草書三國志執玩反覆不能釋手同上公受奕世之寵極人臣之位南北迥邈同契一致萬里之心存於尺書晉書劉琨傳殷羨為豫章太守都下人士因致其書百餘函行次石頭皆投之水中曰沈者}
  - {type: variant, offset: 2460, length: 0, content: '', WYG: 沈浮者自浮殷洪喬不為置書郵殷浩答桓温書慮有謬誤開閉數十竟達空函殷浩置牋於簡文具自申叙晉書殷浩傳陶侃為荆州逺近書疏莫不手答晉書劉𢎞為荆州刺史每發手書郡國叮嚀欵宻莫不感恱咸曰得劉公一紙書賢於十部從事晉春秋徐堪之善於尺牘音詞流暢沈約束書韋陟常以五采牋為書記使侍妾主之其裁答受意而已皆有楷法陟唯署名自為所書陟字若五朶雲時人慕之號郇公五雲體新唐書本傳陟封郇國公席豫與子弟屬吏書不作草字新唐書本傳傳記公府奏記郡將奏牋文心彫龍張九齡家養羣鴿每與親知書繫鴿足上飛徃投之目為飛奴王仁裕開元天寶遺事集時因北風復惠德音文選馳一介之使加咫尺之書孔文舉書蔡邕曰相見無期唯是書疏可以當面蔡邕書書疏徃返未足解其勞結魏文帝吳質書信到奉所惠貺發函伸紙是何文采之巨麗而慰諭之綢繆乎魏吳質曹植書得所來信文采委曲􅁮若春華瀏若清風曹子建答吳季重書承問震惶精爽飛越劉越石良訊代兼金陸陵書東望于邑裁書叙心申詠反覆曠若復面選書客從逺方來遺我一書札上言長相思下言久離别置書懐袖中三歲字不滅古詩客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中竟何如上有加餐食下有長相憶古樂府誰謂情可書盡書非尺牘謝宣逺王撫詩音塵慰寂滅謝靈運方山詩書箋尺牘千里眉目顔氏家訓敢陳丹欵以代言覲魏王筠答邵陵王牋寶札自千里江淹惠存好我無宻爾音駱賓王集開緘書札光巴牋染翰光杜詩欲問平安無使來扎翰時相投書疏莫相忘家書抵萬金久客多枉友朋書素書一月凡一束虛名但蒙寒温問泛愛不救溝壑辱道州手札適復至紙長要自三過讀盈把那須滄海珠入懐本擬崑山玉撥棄潭州百斛酒蕪没蕭岸千株菊使我晝立煩兒孫令我夜坐廢燈燭杜工部詩折書八九讀淚落千萬行句句截我腸萬恨緘其中投擲珠玉舊好飛瓊翰元微之集足下猶復以為可教貶}
