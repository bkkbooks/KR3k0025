  - {type: variant, offset: 3093, length: 446, content: 逮乎醉因取屐而著之及為人之所擒皆輒獲無遺者唐文粹始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利五卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣柳漁者對互入鑒戒蝜蝂者善負小虫也行遇物輒持取卬其首負之背重雖困劇不止也其背甚澀物積因不散卒躓仆不能起人或憐之為去其負苟能行又持取如故又好上高極其力不巳至墜地死今世之嗜取遇貨不避以厚其室不知為己累也唯恐其不積及其怠而躓也黜棄之遷徙之亦以病矣苟能起又不文日思高其位大其祿而貪取滋甚以近於危墜觀前之死亡一本有曾字不知戒雖其形魁然者也其名人而智則小虫也亦足哀哀一作悲夫柳子厚蝜蝂傳零陵永之氓咸善游一日水暴甚有五六氓乘小船絕湘水中濟船破皆游一本作皆浮游其一氓盡力而不能尋常其侶曰汝善游最也今何後為曰吾腰千錢重是以後曰何不去之不應搖其首有頃益怠巳濟者立岸上呼且號曰汝愚之甚蔽之甚身且死何以貨為又搖其首遂溺死吾哀之且若是得不有大貨之溺大氓者乎於是作哀溺柳子厚哀溺文貪目不瞬劉賓客鴟張狼貪老不衰元稹集燭蛾焰中舞繭蠶叢上織多生沈五蘊白頭名利之場並, WYG: ''}
