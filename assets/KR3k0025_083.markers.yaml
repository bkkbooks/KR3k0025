  - {type: variant, offset: 2462, length: 0, content: '', WYG: 舊之道得之矣韓文賜書諭誨微悉重厚欣踊恍惚疑若夢寐捧書叩頭悸不自定穆然清風發在簡素柳文開緘宛見諌議面盧仝茶歌是非傳尺素誰與論衷腸劉長卿一緘瓊玖贈萬里别離愁武伯蒼蘭章怱有贈忽因西飛禽贈我以瓊琚行數雖不多字字有委曲韋應物殷嶠工為尺牘孔帖本朝士或同師友締交遊以道誼相期者尚有手書勤勤之意猶為近古寓意於簡止於舒心意為問好下吏以私自達於其屬長而有所候問請謝者則曰牋記書啟歐公遥懐具短札類要時飛寶刻之音臨川集書隨好夢到坡詩一紙家書百鎰輕衡陽有歸鴈它日更傳音但知家裏俱無患不用書來細作行山谷欲傳千里信暗折一枝春後山酬答史元稹長於詩在越時辟竇鞏鞏工於詩與之酬和號蘭亭絶唱唐書本傳集恨無隋侯珠以酬荆文壁文選咸池酬於北里夜光報于魚目韻劇詞殫瓌奇恠譎意欲定霸取威置僕於窮地耳白傅敢辭課拙酬高韻一句爭禁萬頃波投君之文甚荒蕪數篇價直一束芻報我之章何璀璨纍纍四貫驪龍珠慙無白雪曲難答貧薄詩家無好物反投桃李報瓊琚白侍郎錢財不足以賄左右之匱急文章不足以發足下之事業梱載而徃垂槖而歸足下諒之而已韓文酬君十首三更坐减却當時半夜愁珠玉慙新贈麗句悲虛擲粗酬珍重意工拙定相懸憐君詩似湧贈我筆如飛元微之新和敵南金柳詩申章報蘭藻覽君金玉篇彩色發我容開緘瑩新篇韋應物本朝少低筆力容我和無使難追韻高絶歐公詩空虛豈敢醻瓊玉坡詩我詩如曹檜淺陋不成邦公如大國楚吞五湖三江黄魯直答蘇東坡集玉案愧無酬錦綉木𤓰却歉報瓊瑰欒城集斷璋殘璧忽我贈把玩溢目驚輝光自嗟行李久蕭瑟安得置之雲錦囊僧参寥序玩好經金玉玩好周禮史顔師古多藏古畫器物書帖性所篤愛唐書本傳王涯既誅涯家書數萬卷侔於書府前代法書名畫人所寶惜者必以厚貨致之不受貨者必以官爵致之後為盜取之或剖取函奩金寶之飾與其玉軸而棄之唐本傳集翫奇筋骨輕劉賓客凡人間藏畫必有顧陸張吳著名卷軸方可言有圗寫若言有書籍豈可無九經三史顧陸張吳為正經楊鄭董為三史餘畫為百家家世所寶琴書圗畫廣明之亂散失蕩盡其中二琴希世之寶也張茂樞本朝奇書古畫不論價盛以錦囊裝玉軸歐公詩歐陽公集三代以來金石刻為一千卷歐公行狀余視天下之蓄此者多矣有能及三世者乎其始求之若不及既得唯恐失之而子孫不以易衣食者鮮矣有好書而不得其法則拊心嘔血幾死而僅存}
