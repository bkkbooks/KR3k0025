  - {type: variant, offset: 1700, length: 6, content: 得意萬物無以, WYG: 馬言秣其駒載脂載牽還車言邁行邁靡靡中心揺揺昔我徃矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載飢憂心悄悄僕夫况瘁檀車幝幝尺善切四牡痯痯古緩切山川悠逺維其勞矣星言夙駕或不已于行詩道途不爭險}
