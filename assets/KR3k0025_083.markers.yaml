  - {type: variant, offset: 1635, length: 0, content: '', WYG: 到自有春風為掃門攀花弄草興常新春風自我閒臨溪放杖依山坐溪竹山花共我閒身閒處處堪行樂能將屐齒記苔痕聊行弄芳草獨坐隠圎蒲問客茅簷日君家有此無臨川集曽借僧牎半日閒食罷茶甌未厭深清風一榻抵千金腹揺鼻息庭花落還盡平}
