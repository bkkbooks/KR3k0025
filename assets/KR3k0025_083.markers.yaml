  - {type: variant, offset: 1689, length: 0, content: '', WYG: 思足下知足下懸懸於余也韓文嶺樹重遮千里目江流曲似九囘腸柳詩感時江海思劉賓客料得孟光今日語不詠春盡不歸來元微之久别思欵顔承歡懐接袂劉文南望空垂淚天邊鴈一行許用晦徃款良未遂來覿曠無音離心與潮信每日到潯陽劉長卿相思煙水外唯有心不隔潮歸人不歸時復一延首憶君如眼前從此日相思空令减衣𢃄俳佪正佇想髣髴如蹔覿心目徒自親風波尚相隔劉長卿君意如鴻高的的我心懸斾正揺揺杜牧之舊國日邊逺故人江上稀張承文相思巫山渚悵望雲陽臺林上人昔時初種庭前樹樹已勝巢人未歸方雄飛文本朝雖大旱望雲執熱思濯未喻其急也東坡集歸舟天末常囘首從此頻書慰斷腸寸步不徃來千里常夢思山谷三嵗公門不屢過作牋詩復問如何及兹去去翻為恨向使常常肯為多百書不如一見面後山期約經秋以為期昬以為期五日為期六日不詹期逝不至詩史魏文侯與羣臣飮酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可無一㑹期哉通鑑范式與張元伯為友二人春别京師以暮秋為期元伯以九月十五日殺鷄以待母曰相去千里汝何信之也言未卒而至後漢懐鄉經我徂東山滔滔不歸我來自東零雨其濛詩式微式微胡不歸豈不懐歸畏此簡書詩子在陳曰歸與語狐死正丘首記子去魯曰遲遲吾行去父母國之道也孟子去國數日見其所知而喜去國旬日見所常見於國中者喜及期年也見似人者而喜矣去人滋久思人滋深莊子鳥飛反鄉依其所生文子鳥飛反鄉兎徙歸窟狐死首丘淮南子史椘鍾儀囚於晉與之琴操南音左越人莊舄仕楚在病楚王曰舄越之鄙人必思於越使人徃聽之果為越吟史項王欲東歸曰富貴不歸故鄉如衣綉夜行漢書遊子悲故鄉萬歲後吾魂魄猶樂思沛漢書高紀願為黄鵠兮歸故鄉前漢西域傳班超久在絶域年老思土上疏曰臣不敢望酒泉郡但願生入玉門關東漢本傳飛鳥過故鄉猶躑躅徘徊唐書𫝊記太上皇不樂關中思慕鄉里高祖徙豐丘為新豐縣三輔舊事陸機夏在洛忽思東頭竹蓧之飲語劉寶曰吾思鄉轉深矣語林集狐死必首丘兮夫人孰能不反其眞情念舊君也過故鄉而一顧兮泣歔欷而沾零歸骸舊邦莫誰語者楚辭遊子悲其故鄉心愴恨兮傷懐班超北征賦詠南音以顧懐選荆南非我鄉何為久留滯七哀貽此越鄉憂還都道中營魄懐兹土贈從兄雖信美而非吾土兮曽何足以少留昔尼父之在陳有歸與之歎音鍾儀幽而楚奏莊舄顯而越吟人情同於懐土豈窮達之異心王粲孤獸思故藪離鳥戀舊林願假歸鴻翼翻飛泝江汜感念桑梓域髣髴眼中人陸士衡丘去魯而過漢季過沛而涕零潘安仁豈伊不懐歸于枌榆選流波戀舊浦行雲思故鄉張景陽誰能久京洛緇塵染素衣謝𤣥暉人情懐舊鄉客鳥思故林王正良詩故鄉籬下菊今日為誰開江揔永懐戀故園王鮪懐河岫晨風思北林刷羽同揺漾一舉還故鄉徒懐越鳥志眷戀湘南枝情知望故鄉誰能鬂不變戀本難為思文選詩願言還故鄉畏此簡書忌鄉夢隨魂斷青山白日非舊國之春秋翠斚清樽是他鄉之杯酒駱賓王馬上逢寒食途中屬暮春可憐江浦望不見洛橋人宋之問詩嶺外逢寒食他鄉不見春洛陽新甲子何日是清明沈佺期詩長安如夢裡何日是歸期李太白不見鄉書傳鴈足王維集吳越數千里夢􅄰今夕見形骸非我親衾枕即鄉縣心逐書郵去離魂今夕夢尤遶舊林飛張九齡月是故鄉明成都萬事好豈若歸吾廬安得如鳥有羽趐託身白雲還故鄉青紫雖被體不如早還鄉夢鄉歸未得不用楚詞招歸心折大刀杜詩眉間黄痩見歸期如何連曉語祗是說家鄉韓文鄉禽何事亦來此令我心憶桑梓間海畔尖山似劒鋩秋來處處割愁腸若為化得身千億散上峯頭望故鄉柳詩萬里望枌榆之鄉劉如何春來夢合眼在鄉社故鄉貧亦安白鄉思急於絃白傅集春來愛有歸鄉夢一半猶疑夢裏行迢遞旅魂歸去逺元微之鄉心正欲絶何處擣寒衣望家千里劉長卿賓館有魚為客久鄉書無鴈到家遲關河萬樹秋風急望見鄉山不到家向夜欲歸心萬里故園松月更蒼蒼孤夢家山逺獨眠秋夜長許用晦春風一夜吹鄉夢夢逐春風到洛陽武伯蒼何日得鄉信每日筭歸程王建集一夕九起嗟夢短不到家孟郊故園春歸未有涯小欄高檻别人家五更惆悵囘孤枕猶自殘燈照落花司空圗鄉思楚雲間錢起文憑君莫射南來鴈恐有家書寄逺人杜牧之巫峽啼猿數行淚衡陽歸鴈幾封書高達夫青山無限好猶道不如歸唐詩人言落日是天涯不到家鄉已恨賖囘首碧山相隠映碧山更被暮雲遮李靚本朝旅病愔愔如困酒鄉愁脈脈似連環臨川三年無日不思歸夢裏還家旋覺非萬里家山一夢中人貪歸路好樂莫樂於還故鄉東坡恒年暮桑梓歸念寄鴻鵠欒城集歸鴈南飛盡無因寄此情山谷深知報消息不忍問如何久客登樓日中年懐舊心初聞北人語意作故鄉聲望鄉仍愛歲後山未有一夜夢不歸千里家别離經瞻望弗及泣涕如雨遵大路兮摻執子之手兮詩子子高遊趙有鄒文李節者與相友善及將還魯文節送行三宿臨别流涕交頥子高抗手而已謂其徒曰始吾謂二子丈夫耳乃今知其婦人也人豈鹿豕也哉而常羣聚乎孔叢子史馬為立踟蹰車為不轉轍觀者皆歔欷行路亦嗚咽范蔚宗後漢列女傳王猛將行造慕容垂飲酒從容謂垂曰今當逺别何以贈我使我覩}
