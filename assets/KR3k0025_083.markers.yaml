  - {type: variant, offset: 1960, length: 0, content: '', WYG: 言班布也布荆坐地燦然有文以相接驩然有恩以相愛前漢共語移日握手極歡李傳通握手歡如平生東漢馬援傳相見不數則彼我不親無因得盡人情何由知衆事也通鑑集恨不具鷄黍得與故人歡枉道相過窮巷隔深轍頗囘故人車掩泣叙温凉文選數面成親况情其過此者乎陶潜逢故人而永夜陳子昻留連嘯歌從容風月駱賓王主稱㑹面難一舉累十觴夜闌接軟語良㑹惜清晨杜詩㑹合意彌重韓文乍見悲兼喜猶驚是與非元微之江湖十年别衰老一樽同相逢苦}
