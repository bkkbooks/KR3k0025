  - {type: variant, offset: 2015, length: 1, content: 蔭, WYG: 餉輕圎白曬荔脆釅紅螺醬歲晩相與餽問為餽歲並同上祖餞經出宿于泲飲餞于禰之子于歸逺送于野瞻望弗及泣涕如雨韓侯出祖出宿于屠顯父餞之清酒百壺詩史鄭六卿餞宣子于郊左孔子過周問禮老子送之曰富貴者送人以財貧賤者送人以言吾不能富貴竊仁人之號送子以言史記孔子世家祖於北門西漢昭江王傳祖者送行之祭因饗飲也昔皇帝之子纍祖好逺遊}
