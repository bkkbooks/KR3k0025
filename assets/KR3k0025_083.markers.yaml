  - {type: variant, offset: 794, length: 0, content: '', WYG: 無戚戚者左絃右壺樂以自放西山爽氣在我襟袖南山溽暑醉如酒隠几熟眠開北牖日午獨覺無餘聲山童隔竹敲茶臼柳文日高丈五睡正濃盧仝茶詩稍覺天籟清自傷人世促待月出深林合歡忘印綬之輕重陳詩無章句之約束放言無擇造適則笑行觴無律既醉而罷虧成彼是曽不棲於念慮之中而惠風閒雲引穿左右動用視聽無非大方心靈矌而體胖泊然與白雲鷗鳥同其無事權載之想夫草堂環合喬松千餘本交柯翳景吟炫風露幅巾長謡偃放其間一氣不耗四肢交暢清時外臣其樂如何結廬江南退然食力奉詩書杖屨為膝下歡蓬蒿晏如不改其度}
