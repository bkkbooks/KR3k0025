  - {type: variant, offset: 1699, length: 0, content: '', WYG: 緩駟知愁兮復鳴李太白斷腸聲裏唱陽關李商隠丈夫非無淚不洒離别間仗劒對樽酒恥為遊子顔蝮蛇一螫手壯士疾解腕所志在功名離别何足嘆陸龜蒙生别古所嗟發聲為爾吞杜詩朔鴈傳書絶湘筠染淚多人世死前唯有别李義山别腸車輪轉一日一萬周離思如春水泮泮不可收韓文萬里尚能來逺道一程那忍便分頭逺征不必戍長城出門便不知生死元微之丈夫雖鯁介逺别多苦顔别離何從生乃在親愛中從此一分手緬想吳與秦韋應物集但令此身健不作多時别白傳集風煙里數少雲雨别情多劉賓客黄葉一離一别青山暮暮朝朝明日行人已逺空餘淚逐歸潮想到郵亭愁駐馬不堪西望見風塵離心日逺如流水囘首長川共落暉離别寒江上潺湲若有情離心與流水萬里共朝昬獨過潯陽去潮歸人不歸手折衰揚悲老别故人零落已無多江海逢君少東南别處長獨行風嫋嫋相去水茫茫劉長卿少年輕㑹復輕離老大關心緫是悲李嘉祐别家三日幾般心杜荀鶴離歌漸怨如留客歸夢初驚似到家許用晦文離情兩飄斷不異風中絲張文昌萬里故人去一行新鴈來張承吉文楚岸柳何窮别愁紛若絮杜牧之逺風南浦萬重波未似生離别恨多杜牧之願得雙車輪一夜生四角别長多欝紆豈能肥肌膚始知相結宻不及相結踈踈别恨應少宻離恨難袪唐文粹預愁更漏促離别在明朝唐人詩本朝羣鷺方盛集離鴻獨高翔行役經我馬瘏矣我僕痡矣言秣}
