  - {type: variant, offset: 3542, length: 3, content: 貪卻馨, WYG: 集鼎臑爼臠胾柳文傳記五侯王氏競致奇膳護樓護為五侯上客乃合以為鯖以為竒味焉西京襍記漢有五侯鯖君臣鯖父子鯖結盟人致共為之飱南越志内厨五鼎外膳二肴西京雜記金虀玉膾東南佳味南郡煙花傳本朝紫駝之峯人莫識雜以鷄豚眞可惜今君坐致五侯鯖盡是猩唇與熊白東坡酒醲經酒旣和旨清酒百壺君子有酒旨且多詩仲冬之月乃命大酋秫稻必齊麴糵必時湛熾必潔水泉必}
