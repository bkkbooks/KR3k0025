  - {type: variant, offset: 2433, length: 0, content: '', krp: 㑹心處不必在逺翳然林木便自有濠濮間想覺鳥獸禽魚自來親人世說令百官於春月中旬選勝行樂自宰相至貟外郎凡十二筵各賜錢五百緡上或御花蕚樓邀其歸騎留飲迭使起舞盡歡而去通鑑唐𤣥宗紀集楚襄王遊於蘭臺有風颯然而至王披襟而當之宋玉風賦清夜遊西園飛盖相追隨曹子建晝短苦夜長何不秉燭遊選詩綴賞無地宋王義隠序謂不擇地也屢借山水以化其欝結晉孫綽何必絲與竹山水有清音左太沖落花與芝盖同飛楊柳共春旗一色庾信華林園馬射賦曲水公卿宴春塵晝滿堦殷堯藩日落紅塵暮車馬亂縱横只去長安六日期多因及得杏花時陳子昻詩花月窮遊宴此時同一醉應在仲宣樓謝安不倦登臨賞杜詩江南多臨觀之美而滕王閣獨為第一潁水嵩山刮眼明韓文氣煩則志亂視壅則志滯君子必有遊息之物高明之具使之清寧平夷常若有餘柳文莫教風景屬他人劉賓客傳語風光共流轉暫時相賞莫相違白傅集再得塵襟清暫來不宿歸山去應被山呼作俗人白侍郎獨上雲梯入翠微康樂愛山水賞心千載同劉長卿湖山四面爭氣色曠望不與人間同元稹集禽浮似楫羽觴杯鱗躍疑投水心劒公子王孫恣遊翫沙場水曲情無厭金鞭玉勒騁輕肥落絮紅塵擁飛燕渌水殘霞催席散畫樓初月待人歸萬齊容不為尋山試肋力杜牧之謝公領兹郡山水無塵泥孟東野半醉百花前心愜賞未足唐文粹坐石逡巡染緑苔列芳林而薦賞控清洛以開筵追李郭之佳遊嗣裴王之故事流盃曲水折巾幽徑流波度曲自諧中散之絃舞蝶成行無忝季倫之妓揮魯陽之戈奔曦可駐騁山公之騎余興方賖行宴山亭本朝人行亂石間至歡然而㑹意亦旁若於無人迺知偶來常勝於特來前言可信所有雖非於已有其得已多歐陽公集遶城駿馬誰能惜到處名園意盡便}
  - {type: variant, offset: 2434, length: 3, content: 過七十, WYG: 年行樂不辜春脚力盡時山更好坡詩折花只恐傷花意攜客就花花定喜但須匹馬尋幽勝是處清樽到處開欒城集登高懐逺心如在向老逢辰意自加後山集乘時}
  - {type: variant, offset: 2434, length: 3, content: 過七十, krp: 年行樂不辜春脚力盡時山更好坡詩折花只恐傷花意攜客就花花定喜但須匹馬尋幽勝是處清樽到處開欒城集登高懐逺心如在向老逢辰意自加後山集乘時}
  - {type: variant, offset: 2438, length: 2, content: 居位, WYG: 樂經欲其及時以禮自娛樂也今我不樂日月其邁今者不樂逝者其耋子有酒食何不日皷瑟且以喜樂且以永日詩史人生行樂耳須富貴何時西漢楊惲傳人生徒有身後名不如即時一杯酒晉書張翰傳更可憐人生如寄惟當行樂何用愁為通鑑陳宣帝晉王聞河水合曰用兵數載限一水不能度今水自合天賛我也亟如魏州通鑑後梁集時不可兮再得聊逍遥兮容與楚辭對酒當樂人生幾何}
  - {type: page-break, offset: 2438, content: '', id: KR3k0025_WYG_083-38b, image: WYG0932/WYG0932-0533b.png}
  - {type: variant, offset: 2438, length: 2, content: 居位, krp: 樂經欲其及時以禮自娛樂也今我不樂日月其邁今者不樂逝者其耋子有酒食何不日皷瑟且以喜樂且以永日詩史人生行樂耳須富貴何時西漢楊惲傳人生徒有身後名不如即時一杯酒晉書張翰傳更可憐人生如寄惟當行樂何用愁為通鑑陳宣帝晉王聞河水合曰用兵數載限一水不能度今水自合天賛我也亟如魏州通鑑後梁集時不可兮再得聊逍遥兮容與楚辭對酒當樂人生幾何}
