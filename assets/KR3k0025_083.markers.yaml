  - {type: variant, offset: 2015, length: 1, content: 蔭, krp: 餉輕圎白曬荔脆釅紅螺醬歲晩相與餽問為餽歲並同上祖餞經出宿于泲飲餞于禰之子于歸逺送于野瞻望弗及泣涕如雨韓侯出祖出宿于屠顯父餞之清酒百壺詩史鄭六卿餞宣子于郊左孔子過周問禮老子送之曰富貴者送人以財貧賤者送人以言吾不能富貴竊仁人之號送子以言史記孔子世家祖於北門西漢昭江王傳祖者送行之祭因饗飲也昔皇帝之子纍祖好逺遊}
  - {type: variant, offset: 2017, length: 1, content: 忘, WYG: 死於道故後人以為行神也同上疏廣父子乞骸骨歸公卿大夫故人邑子設祖道供帳東都門外送者車數百輛朋友以言贈行西漢本紀共工氏子曰脩好逺遊祀以為祖神漢午日祖後漢荀彧傳註傳記將行者有祖道五經奥義集傾城逺追送餞我千里道孫子荆西詩舉觴矜飲餞指念途出宿謝宣詩臨途未及引置酒慘無言顔延年五侯相餞送高㑹集新豐六樂陳廣坐祖帳揚春風鮑明逺張飲東都送客金谷班荆兮増恨樽酒兮叙愁江文通樽酒送征人踟蹰在清晏日暮浮雲滋握手淚如霰江淹詩頓旌節而少留傾朝廷而出餞漢朝卿士供帳餞於東都晉國名賢傾城祖於西郊陳子昻桃花嘶别路竹葉瀉離樽駱賓王勸君更盡一杯酒西出陽關無故人王維離筵不隔日那得易為情一天開寵餞五馬爛生光祖席倍光輝杜詩祖席洛橋邊親交共黯然鳴笛急吹催落日清歌緩送感行人無疾}
