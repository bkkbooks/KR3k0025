  - {type: variant, offset: 2426, length: 2, content: 錢癖, WYG: 佳園池簡每出嬉遊多之池上置酒輒醉時有兒童歌山公出何許徃至高陽池日夕倒載歸倒著白接籬庾亮在武昌諸佐吏殷浩之徒登南樓不覺亮至諸人將起避之亮曰諸君少住老子於此興復不淺便據胡床而坐與浩等談詠九月九日桓温燕龍山僚屬畢集有風至吹孟嘉㡌墜落嘉不之覺}
