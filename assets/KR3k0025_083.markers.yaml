  - {type: variant, offset: 2039, length: 134, content: 見利而忘其真莊山木魚鱉黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀法行見其可欲也則不慮其可惡者也見其可利也則不慮其可害也是以動則必陷為則必辱荀不苟逐獸者目不見太山嗜欲在外則明有所蔽淮南子互入心無二用狗彘不擇甂甌而食偷肥其體而顧近其死淮南子齊人有欲金清旦, WYG: 賢豪爭追攀飲餞出西京韋應物集}
