  - {type: variant, offset: 2175, length: 0, content: '', krp: 列祖道劉文絲管有離聲羽觴交餞席張文昌樽酒别期促送君把酒不成驩劉長卿本朝我亦且如常日醉莫教絃管作離聲離觴莫惜少留連歐詩宴㑹經雲上於天需君子以飲食宴樂易鹿鳴燕羣臣嘉賓也棠棣燕兄弟也儐爾籩豆飲酒}
  - {type: variant, offset: 2176, length: 4, content: 市適鬻金, WYG: 飫伐木燕朋友故舊也賓之初筵左右秩秩籩豆有楚殽核維旅或獻或酢詩為酒食以召鄉黨僚友記史與陵未嘗銜杯酒接慇懃之歡西漢司馬遷烹羊炰羔斗酒自勞酒後耳熱仰天拊缶西漢楊惲傳引滿舉白班固叙卓王孫為具召臨卭令王吉及司馬長卿令既至日中司馬長卿謝病不能臨臨卭令不敢嘗食身自迎相如不得已而強徃一坐盡傾西漢司馬相如傳武帝問三日曲水之燕束晢曰昔周公城洛邑因流水以汎酒在詩云羽觴隨波晉書車𦙍善於賞㑹當時每有盛坐而𦙍不在皆云無車公不樂謝安遊集之日輒開筵待之晉書本傳今夕只可談風月南史王毛仲有㛰上謂宰相曰卿等達官悉詣其第既而日中客未敢舉筯待宋璟通鑑唐𤣥宗郭子儀入朝上命元載王縉魚朝恩等互置酒於其第一㑹之費至十萬緡通鑑出有餞路還有軟脚唐書白居易居東都嘗與胡杲吉旼盧眞等燕集皆高年不仕}
  - {type: page-break, offset: 2176, content: '', id: KR3k0025_WYG_083-31b, image: WYG0932/WYG0932-0529d.png}
