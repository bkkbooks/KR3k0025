  - {type: variant, offset: 2818, length: 0, content: '', WYG: 序歐陽公平生於物少有所好收蓄古文圗書集三代以來金石刻為一千卷以校正史傳百家訛謬之說歐公行狀服飾經錦衣狐裘黼衣綉裳佩玉將將衣裳楚楚史雋不疑見暴勝之褒衣􅀶帶氷紈純麗氷謂色鮮潔如氷綺襦紈袴西漢紆侈􅃑曵方履唐書儒林傳集董以幽蘭流芳四布織為雲外秋鴈行染作江南秋水色白傅食品經珍用八物八珍謂淳熬母炮豚炮羊擣珍漬熬肝膋也死生鱻亮之物周禮或燔或炙加殽脾臄飲御諸友包鱉鱠鯉其䔩惟何惟筍及蒲詩觴酒豆肉}
