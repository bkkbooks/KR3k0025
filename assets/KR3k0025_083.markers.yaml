  - {type: variant, offset: 2555, length: 260, content: 待之通鑑晉惠紀元康之後綱紀大壞魯褒傷時貪鄙乃隱姓名著錢神論以剌之其略曰親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處先錢少者居後錢之所祐吉無不利何必讀書然後富貴無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺諺曰錢無耳可使鬼凡今之人唯錢而已晉書蕭宏性愛錢百萬一聚黃榜標之千萬一庫垂一紫標如此三十餘間南史見黃雀而忘深阱智者所不為通鑑梁高祖沈約貪冒營財通鑑梁高祖王伾以納賄為事作大匱貯金帛夫婦寢其上通鑑互入貪汙如飲醇酒嗜其味而忘其醉矣通鑑唐昭宗李憕并州人頗殖產田疇彌望時謂地癖, WYG: 自娛}
