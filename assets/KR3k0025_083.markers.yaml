  - {type: variant, offset: 1690, length: 0, content: '', WYG: 思人通鑑晉海西公下謝安嘗謂王羲之曰中年傷於哀樂與親友别輒作數日思羲之曰年在桑榆自然至此當藉絲竹常恐兒輩覺損其歡樂之趣晉王羲之集悲莫悲兮生别離楚辭離家日趣逺衣𢃄日趣緩心思不能言膓中車輪轉古樂府遊子嘆黍離處者嘆式微别如俯仰脫若三秋曹子建送君南浦傷如之何黯然銷魂者唯别而已知離夢之躑躅意别魂之飛揚分手而銜涕攀桃李兮不忍别惟世間兮重别驅征馬而不顧意奪神駭心折骨驚江文通賦離别腸應斷相思骨合銷陳後主侍兒碧玉行舟有限嗟此㑹之難留别日}
