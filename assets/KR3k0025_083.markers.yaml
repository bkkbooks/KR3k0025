  - {type: variant, offset: 2463, length: 2, content: 顛仆, WYG: 於剖冡斷棺而求之是豈聲色臭味足以移人哉方其樂之也雖口不能自言而况他人乎東坡集藏書經藏之書府書子聚書四十年得書八萬卷河間之在漢室頗謂過之華匱十重緹巾十襲金樓子史河間王德以金帛招求四方善書得書多與漢朝等時淮南王安亦好書所招致率多浮辯獻王所得皆古文先秦舊書采禮樂故事稍稍増輯至五百餘篇}
