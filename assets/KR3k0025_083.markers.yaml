  - {type: variant, offset: 2446, length: 1, content: 而, WYG: 懽莫使金樽空對月人生飄忽百年内且須酣暢萬古情李太白集下直閒如社尋芳醉似泥時景不重來賞心難再并白侍郎良晨且宴樂樂徃再不來韋應物集塵世難逢開口笑殘花不一醉行樂更何時杜牧之本朝優游琴酒逐魚釣上下林壑相攀躋及身彊健始為樂莫待衰病相扶攜歐公集明年豈無年心事恐蹉跎簿書常苦百憂集樽酒今應一笑開聊將詩酒樂一掃簿書冗坡詩安逸經君子向晦入宴息易下莞上簟乃安斯寢乃寢乃興詩史君子}
