  - {type: variant, offset: 2175, length: 0, content: '', WYG: 列祖道劉文絲管有離聲羽觴交餞席張文昌樽酒别期促送君把酒不成驩劉長卿本朝我亦且如常日醉莫教絃管作離聲離觴莫惜少留連歐詩宴㑹經雲上於天需君子以飲食宴樂易鹿鳴燕羣臣嘉賓也棠棣燕兄弟也儐爾籩豆飲酒}
