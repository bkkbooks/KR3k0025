  - {type: variant, offset: 2421, length: 4, content: 無意和嶠, WYG: 柄通屈莖上輪箘如象鼻傳噏之名碧筒歴下皆效之酒味雜蓮氣香冷勝於他酹張君房㓂準在中書多召兩制就第飲宴必閉關苦留之畏謹者甚懼李宗諤常於門扉下竊得馬而走錢惟演纂金波遺事文潞公以大尉留守西都將當韓公以司徒致仕潞公集洛中公卿大夫德高者為耆英㑹聞見録水涵樽爼光如洗臨川集燒燭飲至䟦黄魯直遊賞經駕言出遊以寫我憂以遨以遊詩車輪曵踵可以逺眺望記史山簡鎮襄陽諸習氏荆土豪族}
