  - {type: variant, offset: 788, length: 5, content: 生雖多途趍, WYG: 閭巷間不以事自累酒食罷無為棊槊以相娛韓愈自笑無名字因名自在天乘興無羈束閒行信馬蹄衣裳無復帝京塵元微之扁舟從此去鷗鳥自為羣歸去田園老儻來軒冕輕張九齡把鋤荷插决谿泉以給茹行歌坐釣望青天與白雲以此為適亦足老}
