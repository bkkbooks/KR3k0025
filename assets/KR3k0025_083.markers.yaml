  - {type: variant, offset: 1720, length: 4, content: 回頭自笑, WYG: 楚辭路脩逺以多艱選騷經裹足入秦李斯上書昔去雪如花今來花似雪李陵詩簡元辰而俶裝張衡思𤣥賦日既西傾車殆馬煩洛神賦星陳夙駕秣馬脂車曹子建羈旅無定心翩翩如懸旌景陳雜詩首路跼險艱揚旌西邁五陵表客途亘萬里東武吟侵星赴早路選行矣倦路長無由稅歸鞅京路夜發戒途在昧旦秋胡詩連翩戒征軸八公山詩櫛}
