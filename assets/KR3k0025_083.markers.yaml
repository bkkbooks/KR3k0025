  - {type: variant, offset: 1638, length: 0, content: '', WYG: 秋日閒日長唯有睡相宜半脫紗巾落紈扇先生食飽無一事散步逍遥自捫腹不問人家與僧舍柱杖敲門㸔脩竹三盃軟飽後一枕黒甜餘惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭是造物者之無盡藏也吾嘗中夜而起挈瓶而東有落月之相隨無一人之我同汲者未動夜氣方歸鏘瓊珮之落谷灔玉池之生肥北牖已安陶令榻西風還避庾公塵南廊清遊繼顔謝北牎髙卧等羲黄東坡詩但㸔花開謝不言人是非靜處乾坤大閒中日月長閒為水竹雲山主靜得風花雪月權邵堯夫醉吟終日不知老經史滿堂誰道貧長掩柴荆閉寒暑只將花卉記冬春温公邵堯夫居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩呂氏家塾頺然付一榻是處得清凉欒城集雖無事業傳千古却得安閒過一生程松詩佳眠未日曉屋角聞聲哢西湖千頃月自比漢封君松風自度曲我琴}
