  - {type: 'tls:seg', offset: 3141, content: '', id: KR3k0025_CHANT_078-14a.41}
  - {type: variant, offset: 3142, length: 0, content: '', WYG: 傳之曰箕子操史記傳記凡琴曲和樂而作命之曰暢暢者言其道之美暢猶不敢自安也憂愁而作命之曰操操者言困阨危迫猶不失其操也文周正樂古琴有歌詩五曲一曰鹿鳴周大臣之所作也王道衰君志傾留心聲色故㫖酒嘉殽不能厚養賢者乃援琴以刺之二曰伐檀魏國女子所作也傷賢者隱蔽素飱在位徳澤不加百姓傷痛仰天長歎援琴而鼔之三曰騶虞召國女子所作也周道衰禮義廢男怨於外女怨于内内迫情性外迫禮義歎傷所見而不逢時於是援琴而歌四曰鵲巢五曰白駒失朋友之所作也仕乎衰亂之世依違成風諒見不受國仕詠而思之乃援琴而長歌又有十二操一曰將歸操孔子之所作也趙簡子聘孔子孔子渡狄水聞趙殺其賢大夫竇鳴犢嘆曰燔林而田則麒麟不至覆巢破卵則鳳凰不翔鳥獸尚惡傷類而况君子哉於是援琴而鼔之二曰猗蘭操孔子之所作也孔子自衛反魯見薌蘭之獨茂也嘆曰夫蘭當為王者香今乃與衆草為伍譬猶賢者不逢時與鄙夫為倫也凭車伏軾援琴而鼔之三曰龜山操孔子所作也齊人歸女樂季桓子受之魯君不聽朝孔子欲諌而不聽復退而望魯魯有龜山蔽之季氏専政亦猶龜山之蔽魯也於是援琴而歌四曰越裳操周公之所作也周公輔成王天下太平越裳重九譯而來獻白雉曰吾君在外國也頃無迅風疾雨意者中國有聖人乎故遣臣來周公於是援琴而歌五曰拘幽操文王之所作也紂為無道百姓怨悲文王為西伯種徳脩仁紂大怒召而拘於羑里文王憂愁援琴而鼔之六曰岐山操周大臣之所作也文王居邠狄人攻之遂杖策而出邑於岐山自傷不能化夷狄喟然歎息援琴而歌七曰履霜操尹吉甫子伯竒無罪見逐自傷作此曲八曰雉朝飛操齊宣王時處士牧犢子年七十無妻出薪於琴野見雉雌雄相隨援琴而歌以自傷又揚雄清英曰衛女嫁於齊太子道中聞太子死問傅母何如傅母曰且徃當喪畢不肯嫁終之以死焉傅母取女所操琴於塚上鼓之忽二雉俱出墓中傅母抗雌雄曰女化為雉耶言未卒俱飛而起忽而不見傅母悲痛援琴作操九曰别鶴操商陵牧子娶妻無子父母將改娶牧子援琴鼓之以思憂乖離故曰别鶴操十曰殘形操曽子夢見一貍不見其首而作十一曰水仙操伯牙學琴於成連先生三年而成成連云吾師方子春今在東海中能移人情乃與伯牙俱徃至蓬萊山留宿謂伯牙曰子居習之吾將迎師刺然而去伯牙近望無人愴然而嘆曰先生將移我情乃援琴而歌曲終成連逥刺舡迎之伯牙遂}
