  - {type: variant, offset: 3105, length: 2, content: 諸口, WYG: 乃僧善本也文宗朝女弟子鄭中丞善琵琶有權相舊吏梁厚本臨渭水垂釣忽見一物流過悉以錦纒其邉令家僮接得乃秘器也發棺視之乃一女郎餘息未絶將養經旬漸能}
  - {type: page-break, offset: 3105, content: '', id: KR3k0025_WYG_078-52a, image: WYG0932/WYG0932-0391a.png}
  - {type: variant, offset: 3105, length: 2, content: 諸口, krp: 乃僧善本也文宗朝女弟子鄭中丞善琵琶有權相舊吏梁厚本臨渭水垂釣忽見一物流過悉以錦纒其邉令家僮接得乃秘器也發棺視之乃一女郎餘息未絶將養經旬漸能}
  - {type: punctuation, offset: 3107, content: ，, id: KR3k0025_CHANT_078-bkkpn948}
  - {type: 'tls:seg', offset: 3107, content: '', id: KR3k0025_CHANT_078-14a.33}
  - {type: variant, offset: 3108, length: 0, content: '', WYG: 詢之云是鄭中丞也昨以忤聖㫖命縊死投於渭河厚本納為妻言其琵琶在南趙家脩理梁贖得之毎至夜深方敢輕彈後因酒酣不覺朗彈數曲}
  - {type: variant, offset: 3108, length: 0, content: '', krp: 詢之云是鄭中丞也昨以忤聖㫖命縊死投於渭河厚本納為妻言其琵琶在南趙家脩理梁贖得之毎至夜深方敢輕彈後因酒酣不覺朗彈數曲}
  - {type: variant, offset: 3109, length: 4, content: 可采必演, WYG: 黄門於牆外聽之曰此鄭中丞琵琶聲也不日召入内乃捨厚本之罪並同上天寳中白秀貞自蜀使廻得琵琶以獻其槽以邏逤檀為之有金縷紅文蹙成䨇鳯貴妃每奏於梨園音韻凄清飄如雲外明皇雜録集聞之故老云漢遣烏孫公主念其行道思慕使二知音者作馬上之樂觀其器盤圓柄直隂陽序也四絃法四時也以方語目之故云琵琶也取易於外國也杜摰以為秦之末葢苦長城之役百姓絃鼗而鼓之二者各有所據以意斷之烏孫近焉傅𤣥序轉軸撥絃三兩聲未成曲調先有情絃絃掩抑聲聲思似訴平生不得意低眉信手續續彈説盡心中無限事輕攏慢撚抹復挑初為霓裳後六么大絃嘈嘈如急雨小絃切切如私語嘈嘈切切錯雜彈大珠小珠落玉盤間關鸎語花底滑幽咽泉流水下灘水泉冷􅉣絃疑絶疑絶不通聲暫歇别有幽愁暗恨生此時無聲勝有聲銀鉼乍破水漿迸鐡騎突出刀鎗鳴曲終收撥當心畫四絃一聲如裂帛白樂天琵琶行本朝繁聲急節傾四座為爾飲盡黄金觥六一集坐中賓客誰最賢杜彬琵琶皮作絃自從彬死世莫𫝊玉連鎻聲入黄泉同上琵琶一抹四十絃東坡數絃已品龍香撥半面猶遮鳯尾槽新曲從翻玉連𤨏舊聲終愛欝輪袍青山不逢湓浦客紅袖謾挿曹綱手並同上箜篌史漢靈帝好胡服作胡箜篌􅀢漢書哥舒翰監軍李太宜在軍中不治事與將士彈箜篌為樂唐書傳記箜篌一名坎侯漢武帝祀太山大乙后土令樂人侯調依琴作坎侯言其坎坎應節也風俗通箜篌出桑間濮上之地釋侯侯氏作故名箜篌白帖孫氏有箜篌賦其文甚美麗同上樂工天竺伎有鳯首箜篌唐書霍里子高見一白首提壺涉河其妻隨而止之不及墮河而死妻乃援箜篌作歌曰勸公無渡河公竟渡河墮河而死當奈公何曲終自投河死琴操魏髙陽王雍美人徐月華能卧彈箜篌為明妃出塞之聲雜爼有李生者一姓盧有道術邀生詣其居曰求得一妓善箜篌令侍飲其箜篌上有朱字云雲中辨江樹天際識歸舟李後娶陸長源女乃所見於盧家者問何能曰善箜篌示之朱字宛然李生具説女曰徃昔夢至一處亦記見生逸史集奏箜篌傷妻之大檄曲江水伯文有一遷客登髙樓不言不寐彈箜篌彈作薊門桑葉秋風沙颯颯青塜頭王昌齡箜篌引吳絲蜀桐張高秋李賀箜篌引荆山玉碎鳯凰呌芙蓉泣露香蘭笑十二門前融冷光二十三絲動紫皇同上本朝夢回只記歸舟字賦罷雙垂紫錦絛東坡琴經子夏既除喪而見於孔子與之琴和之而不和彈之而不成聲作而曰哀未忘也子張既除喪而見與之琴和之而和彈之}
