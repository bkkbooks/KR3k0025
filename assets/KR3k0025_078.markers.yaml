  - {type: variant, offset: 26, length: 1, content: 愚, WYG: 隊凡五百五十三人一曰菩薩蠻隊二曰感化樂隊三曰抛毬樂隊四曰佳人翦牡丹隊五曰飛裊樂隊六曰採蓮隊七曰鳳迎樂隊八曰菩薩獻香花隊九曰採雲仙隊十曰打毬樂隊同上樂章經以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏注云九夏皆詩篇名周禮鐘師王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏大司樂行以肆夏趨以采齊注云肆夏采齊皆樂名樂師金奏肆夏之三左傳三夏天子所以宴元侯也同上傳記天寳中樂章多以邊地為名若凉州甘州伊州之類其曲遍繁聲名入破後其地盡為西蕃所没破其兆矣傳載𤣥宗謂髙力士曰吾夢遊月宫諸仙合奏諸樂以送吾歸其曲凄楚動人吾向以玉笛尋之盡得之矣力士請其名𤣥宗笑曰此曲名紫雲曲遂載於樂章開元傳李賀卒夫人鄭氏夢賀來如平生時曰上帝作凝虛殿使某輩纂樂章今為神仙中人甚樂宣室志集啟九辯與九歌兮夏康娯以自縱離騷經啟棘賔商九辯九歌天問本朝太平興國中嵐州獻祥麟雍熙中蘇州貢白龜端拱中澶州河清鳳凰集諸州麥兩穗三穗}
