  - {type: variant, offset: 3168, length: 0, content: '', WYG: 正也風俗通漢武武帝時工人丘仲所造本出羌中同上髙祖初咸陽宫有玉笛長二尺三寸銘曰昭華之琯兩京雜記王愷嘗置酒王導王敦俱徃女妓吹笛小失聲愷怒便令黄門毆殺之一坐改容敦神色自若晉中興書謝仁祖妾阿紀有國色善吹笛仁祖死阿紀誓不嫁郗曇設權計得之阿紀終身不與曇言世説蔡邕告呉人曰吾昔嘗經㑹稽髙遷亭見屋椽竹東間第十六可為笛取用果有異聲先賢傳唐𤣥宗時樂人孫處秀善吹笛好作犯聲樂人皆效之其聲變態日増因有犯調樂纂列和善吹笛呉姬之聲無以加也傅子云泰山巢氏居晉陵家婢採薪忽有一人隨婢還家不使人見見形者唯婢而已每與婢飲宴輒吹笛而歌歌曰閒夜寂以清長笛亮且鳴若欲知我者姓郭名長生幽冥記代郡界有一亭常有怪不可止宿有諸生止宿鬼吹五孔笛但有一手諸生笑謂汝止一手那得遍笛鬼云謂我少指耶乃數十指出諸生拔劒砍之得一老雄雞從者並雞雛同上吕鄉筠夜泊舟於君山側命酒吹笛忽見一老父拏舟而來出笛三管曰其大者諸天之樂不可發次者對洞府諸仙合樂而吹其小者試為子吹之吹三聲湖上風動波濤洸瀁五聲六聲鳥獸呌噪月色昏昧舟人大恐老父遂止博異志集翦雲夢之霜筠法龍吟之異韻三孔為籥文武執之邠人吹也五孔為篴祴樂所用周師掌之六孔為笛羌人吹之樂書融性好音律能鼓琴吹笛為督郵獨卧郿平陽塢中有雒客舍逆旅吹笛相和融去京師踰年蹔聞甚悲而樂之乃作笛賦馬融自序鄰家有吹笛發聲寥亮追想疇昔遊宴之好向秀思舊賦笛奏龍吟水李白羌笛横吹阿嚲囬向月樓中吹落梅笛奏梅花曲胡床紫玉笛却坐青雲吹横笛弄秋月黄鶴樓中吹玉笛誰家玉笛暗飛聲㪚入春風滿洛城此夜曲中聞折栁何人不起故園情吹龍笛並同上三年笛裏關山月杜詩晩來横笛好泓下亦龍吟同上本朝安得道人携笛去一聲吹裂翠崖岡東坡更教吹笛奏伊凉同上昭華三弄月侵林山谷篪經仲氏吹篪詩何人斯史伍子胥至於江上無以糊其口吹篪乞食於呉市史記世祖於南康郡内作伎有絃無管空中聞有篪聲調節相應齊書傳記大篪謂之沂爾雅篪以竹為之長四寸有八孔前有一孔上有三孔後有四孔頭有一孔廣雅篪啼也聲從孔出如嬰兒啼聲也釋名蘇成公造篪吹孔有觜如酸棗世本古有篪尚矣蘇成公善篪而記者因以為作謬也古史考建元二年帝幸騰光臺吹霜條之篪洞冥記後魏河間王琛有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史羌叛屢討不勝琛令朝雲假為貧女吹篪而乞羌聞之皆流涕相謂曰何故捨墳并在山谷為冦耶即相率而降秦民語曰快馬健兒不如老嫗吹篪洛陽伽藍記籥經左手執籥詩簡兮以籥不僭鼓鐘籥師教國子舞羽吹籥周禮籥章掌豳籥同上葦籥伊耆氏之樂也記明堂位萬入去籥春秋史王義方貶吉安丞行釋奠禮請歌吹籥登降跽立人人悦順唐本傳文宗製雲韶樂有籥唐志廟卑忌尊則去籥裴寛傳文舞郎左執籥五代崔悦傳傳記大籥謂之産中者曰仲小者曰箹爾雅籥躍也氣躍出也釋名集紅頰吹鳴籥韓詩簧經巧言如簧詩巧言君子陽陽左執簧君子陽傳記女媧作簧世本雅簧上下各六三禮圖簧削鋭其頭有傷害之象塞以蜜蠟有口舌之類皆非吉祥善應也王符潛夫論西王母命侍女許飛瓊鼓震簴之簧漢武内傳王遥有竹篋未嘗開後將茅子擔篋入石室中有二人遥自取一枚以二枚與室中人對共鼓之神仙傳竽子齊宣王使人吹竽有三百人南郭處士請為王吹不知竽而濫於三百人之中宣王死文王即位一一聽之處士走韓子史女媧氏造列管於匏上内簧其中爾雅謂之巢大者曰竽小者曰和竽暖也立春之氣暖生萬物也竽管二十六宫在左和管十三宫居右通典文宗製雲韶樂有竽一同上傳記冬至吹黄鍾之律間隂以竽竽長四尺二寸易通卦驗漢武帝時丘仲作竽笙三十六管通禮義纂作竽形類小鍾以手將之即鳴樂府雜録竽音調則度數得見樂府圖商立子㫖者好牧􅀢竽食木菖蒲根飲水不饑不老如此傳世見之三百餘年列仙傳成子伯工吹竽見安昌侯張子夏鼓瑟謂曰音不通千曲以上不足以為知音桓譚新論集代奏鄭衛鳴竽張些宋玉招魂北里吹笙竽左思髙門有笙竽韓詩吹竽少混真齊王好竽而子鼔瑟瑟雖工如王不好何並同上笙經笙鏞以間書益稷笙磬同音詩鼓鍾笙師掌教吹笙周禮笙入奏南陔白華記鄉飲酒史王彧與謝孺子宴桐臺孺子吹笙彧起舞既而嘆曰今日真使人飄飄有伊洛間意南史謝恂傳傳記垂作笙世本大笙謂之巢小者謂之和爾雅列管匏中施簧管端大者十九簧同上笙生也象物貫地而生以匏為之其中空以受簧釋名笙之言施也牙也萬物施而牙笙者太簇之氣也象萬物之生也故曰笙有七政之節焉有六合之和焉天下樂之故謂之笙白虎通夫笙者萬物始生𨗳達隂陽之氣故有長短黄鍾為始象法鳳凰五經析疑季秋之月上丁入學習吹笙所以通氣也蔡邕月令章句三笙一和而成聲儀禮笙入三成同上舜祠下得笙玉管夫以玉為笙故神人和鳳凰來儀也説文王子晉好吹笙作鳳凰鳴道士浮丘接之上嵩山也列仙傳墨子見荆王衣錦吹笙吕氏春秋女媧之遺音董成之妙曲白六帖注云西王母侍香董雙成善吹笙集河汾之寳有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉潘岳賦寫凰翼以挿羽摹鸞音以厲聲明珠在咮若銜若垂夫其悽戾辛酸嚶嚶關關若離鴻之鳴子也含㗅嘽諧雍雍喈喈若羣鶵之從母也並同上金清玉震兮受合乎大諧王廙賦直而不倨曲而不佻疏音簡節樂不及妙是可以移風易俗具治至教𢎞義著於典謨歴萬代而彌卲其制也取不周之竹曽城之匏並同上仙人十五}
