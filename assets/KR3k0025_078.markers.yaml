  - {type: variant, offset: 97, length: 1, content: 略, WYG: 春鶯囀張文收造大酺樂貞觀初魏徵奉詔造打毬樂則天皇后作如意娘天寳中𤣥宗命譚净眼等造君臣相遇樂西京節度嘉運進北庭伊州摴蒱三曲開元中李知柔進紅娘子髙宗時有當堂十二時曲薛仁貴破百濟進百濟曲皆樂府諸曲也類要本朝賀方囬長於度曲黄魯直得其江南梅子之句以為似謝𤣥暉自裒其所為歌詞名東山樂府石林語録歌經歌永言書舜典九叙惟歌大禹謨勸之以九歌同上帝庸作歌曰勑天之命惟時惟㡬乃歌曰股肱喜哉元首起哉百工熙哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉益稷太康畋於有洛之表有窮后羿距於河厥弟五人御其母以從五子咸怨述大禹之戒以作歌五子之歌孔子蚤作負手曳杖逍遥於門歌曰泰山其頽乎梁木其壊乎哲人其萎乎記檀弓善歌者使人繼其聲學記歌咏其聲也樂記夫歌者直已而陳徳也動已而天地應焉四時和焉歌者上如抗下如隊曲如折止如槀木倨中矩句中鉤纍纍乎端如貫珠並同上楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰論語子有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孟子寗戚飯牛擊牛角而商歌齊桓公聞之知其歌者非常人也命後車載之淮南子薛譚學謳於秦青未窮青之伎遂辭歸餞於郊衢撫節悲歌聲振林木響遏行雲薛譚乃謝求返終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去餘音繞梁欐三}
