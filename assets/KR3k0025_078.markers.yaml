  - {type: variant, offset: 3272, length: 1, content: 執, WYG: 羯鼓傳記羯鼓出外夷以戎羯之鼓故曰羯鼓其音主太簇一均龜兹髙昌疎勒天竺諸部皆用之􅀈如漆桶下以小牙床承之擊用兩杖其音焦殺鳴烈尤宜急曲促破作戰杖連碎之聲又宜髙樓曉影明月清風吹空透逺特異衆樂杖用黄檀狗骨花楸捲用鋼鐵羯鼓録𤣥宗尤愛羯鼓横笛云八音之領䄂也諸樂不可為比嘗值二月宿雨初晴景色明麗命髙力士取羯鼓縱擊一曲名春光好及顧栁杏皆以㣲拆指而笑曰此}
