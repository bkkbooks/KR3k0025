  - {type: variant, offset: 2788, length: 0, content: '', WYG: 無害艷歌小詞可罷之魯直曰空中語耳不至坐此墮惡道也師曰君以邪言蕩人淫心使彼逾禮越禁為罪惡之由非}
  - {type: variant, offset: 2788, length: 0, content: '', krp: 無害艷歌小詞可罷之魯直曰空中語耳不至坐此墮惡道也師曰君以邪言蕩人淫心使彼逾禮越禁為罪惡之由非}
  - {type: variant, offset: 2789, length: 0, content: '', WYG: 墮惡道而已魯直自是不復作詞曲冷齋夜話歌舞經恒舞於宫酣歌於室書伊訓雖無徳與女式歌且舞詩車牽九徳之歌九㲈之舞周禮大司樂歌咏其聲也舞動其容記樂記聲莫重於升歌舞莫重於武宿夜祭統史景帝詔曰歌者所以發徳也舞者所以明功也前本紀廟樂象功徳而歌舞焉隋樂志傳記戚夫人善為翹袖折腰之舞歌出塞入塞望雲之曲博物志羊偘有儛人張凈琬腰圍一尺六寸能掌上舞南史隋諸葛昻髙瓚爭為豪侈昂屈瓚串長八尺餅濶丈餘餤麤如柱酒行自作金剛舞以送之瓚復屈昂以車行酒馬行肉碓斬輪碾蒜虀自唱夜义歌以送之僉載寳應二年浙東貢舞女二人一曰飛鸞二曰輕鳳脩睂黟首蘭氣融洽冬不纊衣夏不汗體所食多茘枝榧實金屑龍腦之類帶輕金之冠衣輕羅之衣無縫而成輕金冠以金絲結之為鶴之狀仍飾以五采細珠玲瓏相續可髙一尺秤之無二三分上更琢玉芙蓉以為二女歌舞臺每夜歌舞一發如鸞鳳之音舞態艷逸非人間所有每歌罷上令内人藏之金屋寳帳恐風日故也宫中語曰寳帳香重重一雙紅芙蓉杜陽編白居易有妓樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊栁小蠻腰年既髙邁而小蠻方豐艷因為楊栁詞以托意曰一樹春風萬萬枝嫩於金色軟於絲永豐坊裏東南角盡日無人屬阿誰挹情詩迎娘歌喉玉􅌄窱蠻兒舞帶金葳蕤楊妃外傳女郎歌曰玉户金釭願陪君王邯鄲宫中金石絲簧衛女秦娥左右成行紈縞繽紛翠睂紅粧王歡顧時為王歌舞願得君歡長無災苦𤣥怪録集奏陶唐氏之舞聽葛天氏之歌上林賦齊倡發東舞秦箏奏西音魏文帝艷粉驚飛蝶紅妝映落花舞衫飄冶袖歌扇揜圓紗張正見緑珠歌扇薄飛燕舞衫長庾信歌臺暖響春光融融舞殿冷袖風雨凄凄杜牧玉裂歌聲斷霞飄舞帶收同上皓齒歌細腰舞李白皓齒芳塵起纎腰玉樹春温庭筠氣盡前溪舞心酸子夜歌李義山遏雲歌響清迴雪舞腰輕只要君流盼君傾國自傾同上女樂經鄭人賂晉侯以女樂二八左傳齊人歸女樂季桓子受之三日不朝孔子行論語子秦穆公之時戎强大公遺之女樂二八及良宰戎王大喜以其故數飲食日夜不休左右有言秦㓂之至者因扞弓而射之秦冦果至戎王醉而臥於尊下卒生縛之墨子晉獻公欲伐虞虢乃遺之屈産之乘垂}
