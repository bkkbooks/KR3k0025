  - {type: variant, offset: 3126, length: 2, content: 未言, WYG: 叩商絃以召南吕凉風忽至草木成實當秋而叩角絃以激夾鍾温風徐廻草木發榮當夏叩羽絃以召黄鍾霜雪交下川池暴沍當冬而叩徴絃以激㽔賓陽光熾烈堅冰立散將終而景風翔慶雲浮甘露降醴泉涌列子伯牙鼓琴鍾子期善聽之方鼓琴志在泰山鍾子期曰善哉乎鼓琴巍巍乎如泰山志在流水鍾子期曰善哉乎鼓琴洋洋乎若流水鍾子期死伯牙擗琴絶絃終身不復鼔琴}
