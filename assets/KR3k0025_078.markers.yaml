  - {type: variant, offset: 3176, length: 0, content: '', WYG: 錘大者如鵝子聲合黄鍾大吕也小者如雞子聲合大簇夾鍾也與篪聲相諧故曰壎篪相應爾雅壎謂聲濁而喧喧然今雅樂部用也説文壎者喧也周平王時暴辛公燒土為之樂塤本作壎圍五寸半長三寸半杜佑通典長一寸半凡六孔風俗通云有四孔其二通凡六孔也見世本鼓經擊鼓其鏜詩擊鼓坎其擊鼓宛丘之下宛丘鼉鼓逢逢靈臺應田縣鼓有瞽鼓咽咽有駜猗與那與置我鞉鼓奏鼓簡簡有那鼗鼓淵淵同上以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼亭以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏以金錞和鼓以金鐲節鼓以金鐃正鼓以金鐸週鼓周禮鼓人中秋教振旅王執路鼓諸侯執鼖鼓將軍執晉鼓大司馬凡冐鼓必以啟蟄之日韗人鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞同上蕢桴而土鼓記禮運夏后氏之足鼓商楹鼓周縣鼓明堂位廟堂之上縣鼓在西應鼓在東禮器鼓無當於五聲五聲不得不和學記君子聽鼓鼙之聲則思將帥之臣樂記分唐叔以密須之鼓左傳鼓方叔入於河播鼗武入於漢論語子鼓其樂之君邪荀子楚厲王有驚鼓與百姓為戒飲酒過之而擊民大驚使人止之曰吾醉戯而擊之民皆罷居數月驚而擊鼓民不起也韓子禹以五聲聽治曰教寡人以道者擊鼓淮南子史元帝好音樂或置鼙鼓殿下天子自臨軒檻上隤銅丸以擿鼓聲中嚴鼓之節後宫及左右習知音者莫能為之漢書無持布鼓過雷門同上禰衡字正平孔融稱其才於曹操操欲見之衡不肯徃操懐忿聞衡善鼔召為鼔吏因㑹賔客閲其音節衡操撾而前吏呵之曰鼓吏何不改服衡於是解衣祼身而立徐取岑牟單絞而著之復操撾顔色不怍操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣同上呉郡臨平岸出石鼓張華言以蜀中桐木刻作魚形叩之則鳴如其言果聞數十里晉書孫􅀈為延陵縣令髙爽詣之􅀈無故人懐爽取筆書鼓面云徒有此大腹了自無肝腸面皮如許厚被打未遽央南史太子承乾嘗於宫中擊鼓聲聞於外張𤣥素切諌承乾乃出鼓毁}
