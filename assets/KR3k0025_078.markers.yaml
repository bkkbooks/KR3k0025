  - {type: variant, offset: 22, length: 0, content: '', WYG: 帝功七曰依徳八曰總萬物之極同上師涓於衛靈公時造四時樂春有離鴻去鴈應蘋之歌夏有明晨焦泉朱華流金之調秋有商風白雲葉落吹蓬之曲冬有凝河流隂沉雲之操拾遺記唐太宗平劉武周作秦王破陣樂又云破軍樂被甲執㦸以象戰事慶善樂長䄂屣履以象文徳魏鄭公見奏破軍樂俯而不視慶善樂則玩之不厭國史纂異集太師奏樂陳金石布絲竹鐘鼓鏗鍧管絃􅋫煜抗五聲極六律班東都賦太常選坐部伎無性識者退入立部伎又選立部伎無性識者退入雅部樂則雅聲可知矣白樂天集三奏四上之調六莖九成之曲競氣繁聲合變争節文選陳鐘鼓之樂鳴鞀磬之和建碣磍之虡拮隔鳴球掉八列之舞同上撞千石之鍾立萬石之虡建翠鳳之旗樹靈鼉之鼓上林賦本朝太祖詔和峴重定律管自此雅音和暢記見值歴部律吕類景祐五年韓琦言伏覩李照所造樂不依古法晏殊等言李照新樂比舊樂减下三律衆論以為無所據欲望將來郊廟行禮且用和峴所定舊樂從之㑹要太平興國三年詔籍軍中之善樂者命曰引龍直每巡省遊幸親征則騎道車駕而奏樂若御樓觀燈或賞花習射觀稼則亦與教坊司並奏淳化三年改名鈞容直蓋取鈞天之義雲韶部者黄門樂也開寳中平嶺表擇廣州内臣之聰警者令於後坊習樂藝賜名簫韶部雍熈初改名聞韶部並同上州郡公宴將作曲伶人等絲抹將來蓋御宴進樂先以絃聲發之後以衆樂和之故號絲抹將來今所在起曲先以竹聲不唯訛其名亦失其實矣遯齋閑覽秦漢而下鄭衛肆行雖善三雍之成旋遘五季之亂平陳之後粗獲雅音天寳之中遂雜蕃調東坡集大合鈞天之奏克諧治世之音同上樂舞經舞干羽於兩階}
