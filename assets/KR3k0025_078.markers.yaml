  - {type: variant, offset: 3172, length: 0, content: '', WYG: 之無定制按古軍法有吹角也此器俗名拔邏逥皆營内驚軍之音至侯景圍臺城方用之也同上傳記長鳴角也按蚩尤師蝄蜽與黄帝戰於涿鹿帝令吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以降沿襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也通禮義纂集鼓角縁邊郡川原欲暮時秋聽殷地發風散入雲悲杜}
