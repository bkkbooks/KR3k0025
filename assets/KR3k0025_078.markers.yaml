  - {type: variant, offset: 3135, length: 1, content: 融, WYG: 子聞之曰亢厲㣲末以象殺伐之義中和之感不載於心温和之動不存於體夫然者乃所以為亂亡之風家語孔子南遊適楚有處女珮璜而浣孔子曰彼婦人可與言矣抽琴去軫以授子貢子貢曰於此有琴而無軫願借子以調其軫婦人對曰吾野鄙之人也僻陋而無心五音不知安能調琴韓詩外}
