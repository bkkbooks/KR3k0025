  - {type: variant, offset: 3148, length: 1, content: 坦, WYG: 操家語曰孔子學琴於師襄師襄子曰子琴以習可以益矣孔子曰丘未得其為志也又問曰以習其志可以益矣孔子曰丘未得其為人也又問曰子有所繆然深思焉有所皇然髙望而逺眺曰丘殆得其為人矣殆近黝然黒頎然長眼如望羊奄有四方非文王其孰能為此襄子避席揖拱而對曰君聖人也其傳曰文王操文王思士大周正樂曰文王}
  - {type: variant, offset: 3148, length: 1, content: 坦, krp: 操家語曰孔子學琴於師襄師襄子曰子琴以習可以益矣孔子曰丘未得其為志也又問曰以習其志可以益矣孔子曰丘未得其為人也又問曰子有所繆然深思焉有所皇然髙望而逺眺曰丘殆得其為人矣殆近黝然黒頎然長眼如望羊奄有四方非文王其孰能為此襄子避席揖拱而對曰君聖人也其傳曰文王操文王思士大周正樂曰文王}
