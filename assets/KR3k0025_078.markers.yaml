  - {type: variant, offset: 3274, length: 0, content: '', WYG: 不喚我作天工可乎又製秋風髙每至秋空逈徹纎塵不起即奏之必逺風徐來庭葉墜落其妙絶入神若此汝陽王璡姿容妍美上特鍾愛自傳授之璡嘗戴砑綃㡌打曲上自摘槿花一朶置於帽上著處二物皆極滑久之方安遂奏舞山花一曲花不墜上大喜因誇花奴姿質明瑩肌膚光細必神仙謫墜也上酷不}
  - {type: page-break, offset: 3274, content: '', id: KR3k0025_WYG_078-85a, image: WYG0932/WYG0932-0407c.png}
  - {type: variant, offset: 3274, length: 0, content: '', krp: 不喚我作天工可乎又製秋風髙每至秋空逈徹纎塵不起即奏之必逺風徐來庭葉墜落其妙絶入神若此汝陽王璡姿容妍美上特鍾愛自傳授之璡嘗戴砑綃㡌打曲上自摘槿花一朶置於帽上著處二物皆極滑久之方安遂奏舞山花一曲花不墜上大喜因誇花奴姿質明瑩肌膚光細必神仙謫墜也上酷不}
  - {type: variant, offset: 3275, length: 1, content: 賢, WYG: 琴嘗聽彈未及畢謂宦者曰速召花奴將羯鼓來為我解穢宋開府論羯鼓曰頭如青山峯手似白雨㸃山峯欲不動也雨㸃取碎急也嗣曹王臯精於器用有覊客懐二捲求謁及見臯捧而嘆曰不意今日獲逢至寳或非之臯曰諸公或似未信乎命取食盤自選其極平者遂重二捲於盤心以油注之滿捲而油不浸漏蓋相契無際也蜀客李琬至長安也聞羯鼔聲扣問羯鼓工曰君所擊者豈非耶婆邑鷄乎然而無尾何也工大異之曰某祖父習此曲父没此曲遂絶今但按舊譜尋之竟無結尾聲琬曰夫耶婆邑鷄當用掘拓急徧解工如其教果得諧叶聲意皆盡成都有削杖者以二鼔杖獻於杜鴻漸鴻漸曰此尤物也匠曰某於脊溝中養之二十年矣鴻漸出蜀至嘉陵江頗有山景月色又佳命取羯鼓因以所得杖酣奏數曲四山猿鳥悉皆飛鳴並同上拍板傳記黄帝令黄幡綽撰拍板譜幡綽乃於紙上畫一耳進之問其故對曰但有耳道則無失其節奏也}
