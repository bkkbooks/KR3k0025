  - {type: variant, offset: 3171, length: 0, content: '', WYG: 樂美其出於戎貉之俗有夫韶夏之音杜䞇賦序胡笳互動牧馬悲鳴吟嘯成羣邊聲四起李陵書胡笳在樓上哀怨不堪聽杜詩客淚墮清笳哀笳曉幽咽山樓粉堞隐悲笳笳吟細栁營並同上本朝客來空弔古清淚落悲笳東坡愁聞邊塞吹蘆管同上角史西戎有吹金者銅角長可二尺形如牛角書記所不載或云本出羌戎以驚中國之馬也宋樂志角長五尺形如竹筒本細末稍大未詳所起今鹵部及軍中多用之或以竹木或以皮}
