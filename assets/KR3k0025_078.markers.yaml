  - {type: variant, offset: 21, length: 0, content: '', WYG: 用商及二少蓋商聲剛而二少聲下所以取其正裁其繁也漢祭天則用商而宗廟不用謂鬼神畏商之剛西京自受命郊祀宗廟樂唯用黄鍾一均章帝時鮑業始旋十二宫王䖍休始得太常樂家劉玠撰繼天誕聖樂因帝誕日以獻其樂以宫為均示五聲有君也以土為徳本五運在中也奏二十五疊取二十四氣而成一嵗奏十六節象元凱登庸於廟云後中和樂本於此並同上傳記南海有軒轅丘鸞歌鳳舞天帝樂也述異記顓頊作承雲之樂以祭上帝乃命鼉告作樂樂歌鼉偃寢以其尾鼓其腹莫音英英而已吕氏春秋葛天氏之樂三人揉牛尾投足以歌八闋一曰載民二曰𤣥鳥三曰遂華四曰奮穀五曰敬天常六曰}
