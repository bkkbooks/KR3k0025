  - {type: variant, offset: 3038, length: 0, content: '', krp: 為梨園弟子皆居宜春北院時有馬仙期李龜年賀懐知皆洞知音律安禄山獻赤白玉管數百事皆陳於梨園自是音響殆不數人間譚賔録集黄帳}
  - {type: variant, offset: 3039, length: 4, content: 善為楚內, WYG: 裏西施之孫鄭䄂之子膚如凝脂顔如桃李徘􅆦容與載進載止彈琴而奏清角翔風至而𤣥雲起若乃携手交舞流盻頡頑足踰鞞鼓口御笙簧丹裙赫以四序素耀煥以揚光赴急弦而折倒應緩節以相佯逺望而雲近視而雪舒紅顔而㣲笑啟朱唇而揚聲夏仲御别傳梨園弟子㪚如煙女樂餘姿映寒日杜詩本朝紅粧執樂豪且妍紫衫玉帶兩部全琵琶一抹四十絃東坡集夷樂經韎師掌教韎樂周禮旄人掌教舞夷樂鞮鞻氏掌四夷之樂與其聲歌並同上昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也記明堂位}
