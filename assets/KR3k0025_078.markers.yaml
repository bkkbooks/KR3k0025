  - {type: variant, offset: 3153, length: 0, content: '', WYG: 之揚雄琴清英曰尹吉甫子伯竒至孝後母譖之自投江中忽夢見水仙賜其美樂唯念養親揚聲悲歌舡人聞而學之吉甫聞舡人之聲疑似伯竒援琴作子安之操又大周正樂曰其門離須之所作也其門離湏兄弟三人長兄從軍不歸離須坐事被刑當徃逺輸其㓜弟曰吾豈可獨免於役逐間吾聞兄在林犁欲徃從之離須止之不聽卒夜往不知其處離須進求之不得於是援琴而歌之把梁妻大周正樂曰齊邑杞梁殖妻之所作也荘公襲宫狥義而死荘公遇其妻於路使弔之妻曰今殖有罪君何辱弔焉若免於罪賤妾有先人之敝廬不敢郊弔也公乃延諸宫妻嘆曰上則無父中則無夫下則無子將何以立吾即有死而已援琴而鼓之三士窮同上其思革子之所作也其思革子與石文子叔愆子二人為友聞楚王賢而好士往見之衣寒乏糧二人乃并衣糧與其思革子二子遂凍餓而死其思革子拖二子尸而埋之徃見於楚王王設鍾鼔樂之其思革子援琴而鼓之作相與别散之意王問曰子琴何悲哉其思革子推琴告以其故楚王曰嗟乎乃如是耶於是賜其思革子黄金百斤命收二子而𦵏之以其思革子為相孔子厄同上孔子之所作也孔子應聘於楚在陳絶糧喟然而嘆曰歸與歸與於是援琴而鼓之以自叙其志杏壇孔子作見莊子漁父篇簞瓢顔子作曽子歸耕大周正樂曰曽子之所作也曽子事孔子十餘年忽然念二親欲歸而重嘆之援琴而鼓之崔子渡河同上閔子騫之所作也崔子早無母其後母常以死母名呼之不應輙笞之崔子欲自殺恐傷父惡以能遊渡河為辭繫石於腹入水自沉而死閔子騫大其能隱父之惡援琴而鼓之屈原自况同上屈原之所作也屈原楚同姓也為懐王佐上官大夫害其器能譛之於王王怒之而斥之著離騷仰天而嘆援琴而鼓聶政刺韓王同上聶政之所作也聶政父為韓王治劒不成韓王殺之欲殺韓王不得入太山遇仙人學鼓琴十年而琴成王召政彈琴政納刀在琴中以刺韓王殺之政殺國君罪當及母即自犁刺面皮人莫能識有一婦人徃而哭之曰此聶政也為父報讐知當及母乃自屠剥面皮何愛一女之身而不揚吾子之名哉乃拘尸而哭絶行脈而死力拔山同上項羽之所作也項羽圍於垓下聞漢軍多四面楚歌而嘆之曰漢得吾衆是何楚歌之援琴而鼓之霍將軍歌同上霍去病之所作也去病擊匈奴益封萬五千户志得意歡援琴而鼓之歸風送逺西京雜記曰趙后有寳琴曰鳳凰皆以金玉隱起為龍鳯鸞鵠及古賢烈女象作歸風送逺之操胡笳十八拍蔡文姬作廣陵散大周正樂曰嵇康常宿王伯通館忽有八人云吾有兄弟為樂人不勝覊旅今授君廣陵散甚妙今代莫測本朝關山月李後主别太祖作簫經簫韶九成}
