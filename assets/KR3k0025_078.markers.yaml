  - {type: variant, offset: 3173, length: 2, content: 所至, WYG: 山路時吹角那堪處處聞同上本朝木落霜清畫角哀六一集邊城畫角雄吟餘畫角吹殘月並同上黄州鼓角亦多情送我南來不辭逺唯言萬方聲一槩鼉噴龍吟為餘變東坡澹月傾雲哀曉角孤城吹角煙樹裏落月未落江茫茫山城雄鼔角並同上塤經伯氏吹壎詩何人斯傳記大壎謂之嘂鋭上平底形象}
