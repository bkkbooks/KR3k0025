  - {type: variant, offset: 2770, length: 4, content: 天螻伏隙, WYG: 襄王好樂而愛賦既美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之徳乎對曰昔楚人有善歌者始而曰下里巴人國中屬而和之者數萬人中而曰陽阿采菱國中屬而和之者數百人既而曰陽春白雪朝日魚麗含商吐音絶節赴曲國中屬而和之者不過數人盖其曲彌髙其和彌寡襄陽耆舊傳同此與前歌類所録差不故兩存之迴風曲見前歌類魏明帝易古詩名曰羽觴行用為上夀曲通典古艷曲有北里靡里激楚結風陽阿之曲梁元纂要霓裳羽衣曲明皇所製見月及中秋類青童吟太霞之曲廣記明皇夢仙子御卿雲而下各執樂器曰此曲神仙紫雲迴命授陛下為正始之音楊妃外傳章此與前樂類所録差不同故兩存之明皇夢艷女曰妾陛下凌波中龍女乞賜一曲夢中為鼓胡琴為凌波曲貴妃生日奏新曲未有名㑹南海進茘枝因以曲名茘枝香上至斜谷霖雨涉旬道中聞鈴聲隔山相應上擇其聲為雨霖鈴曲以寄恨焉並同上𤣥宗命取羯鼓縱撃一曲名春光好囘顧栁杏皆以㣲拆羯鼓}
