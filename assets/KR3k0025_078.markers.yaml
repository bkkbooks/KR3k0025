  - {type: variant, offset: 3154, length: 0, content: '', krp: 益稷簫管備舉詩有瞽簫編小竹管如今賣餳者所吹詩箋子人籟則比竹是已注云簫也莊子鳳凰秋秋其聲若簫荀子史伍子胥鼓腹吹簫乞食於呉中史本傳周勃吹簫給喪事本傳漢元帝吹洞簫自度曲歌聲分寸節度極切妙前本傳贊傳記大簫謂之䇾小者謂之筊爾雅簫肅也其聲肅肅清也釋名簫大者二十三管無底小者十六管有底博雅雅簫長尺四寸二寸四彄頌簫二寸六彄簫長則濁短則清以蜜蜂實其底而増减之則和三禮圖簫者中吕之氣也白虎通舜作簫其形㕘差象鳳翼十管長尺二寸風俗通伏羲作簫十六管通禮儀纂簫史者秦穆公時人善吹簫繆公女弄玉}
  - {type: variant, offset: 3155, length: 1, content: 賢, WYG: 之妻焉其後隨鳳去列仙傳江寧縣有慈姥山生簫管竹王褒洞簫賦所稱即此也丹陽記簫形似鳥翼鳥火禽也數七夏時火用事二七十四簫之長由此也鄭𤣥云馬先生能使木人吹簫傅子云集吹鳴籟司馬相如賦遷延徙迤魚瞰雞睨垂啄䖤轉登瞢忘食王褒賦簫管悲且清潘岳簫吟鳳下空李白玉簫金管驚四筵雲間吟瓊簫吹簫舞彩鳳並同上鸞鳳夾吹簫杜詩始知嬴氏善吟簫同上本朝髙瓊發仙奏六一集夜後朝來風又熱卧吹簫管到揚州東坡鳳簫猶在翠㣲間洞簫入耳何清哀並同上管經孤竹之管孫竹之管隂竹之管周禮大司}
