  - {type: 'tls:seg', offset: 3154, content: '', id: KR3k0025_CHANT_078-14a.43}
  - {type: variant, offset: 3154, length: 0, content: '', WYG: 益稷簫管備舉詩有瞽簫編小竹管如今賣餳者所吹詩箋子人籟則比竹是已注云簫也莊子鳳凰秋秋其聲若簫荀子史伍子胥鼓腹吹簫乞食於呉中史本傳周勃吹簫給喪事本傳漢元帝吹洞簫自度曲歌聲分寸節度極切妙前本傳贊傳記大簫謂之䇾小者謂之筊爾雅簫肅也其聲肅肅清也釋名簫大者二十三管無底小者十六管有底博雅雅簫長尺四寸二寸四彄頌簫二寸六彄簫長則濁短則清以蜜蜂實其底而増减之則和三禮圖簫者中吕之氣也白虎通舜作簫其形㕘差象鳳翼十管長尺二寸風俗通伏羲作簫十六管通禮儀纂簫史者秦穆公時人善吹簫繆公女弄玉}
