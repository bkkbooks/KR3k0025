  - {type: variant, offset: 3179, length: 0, content: '', WYG: 初徳宗自山南還宫都下驚擾遂詔太常習樂去大鼓同上張薦明為道士髙祖召見聞中奏時鼓曰陛下聞鼓乎其聲一而已五聲十二律鼓無一焉然而和之者鼓也五代史傳記大鼓謂之鼖小鼓謂之應大鼗謂之麻小者謂之料徒擊鼓謂之咢爾雅鼓者郭也春分之音萬物皆郭皮甲而出故謂之鼓風俗通冬至鼓用馬革圓徑八尺一寸夏至鼓用牛皮圓徑五尺七寸易通卦驗有人金豐擊玉鼔駕六龍春秋孔寅圖鼓所以檢樂為音之長也五經要義黄帝殺䕫以其皮為鼓聲聞五里帝王世紀建鼓大鼓也少昊氏作焉為衆鼓之節夏加四足謂之節鼓商人柱而貫之謂之盈鼓周人縣而擊之謂之縣鼓通禮義纂雷鼓以八面祀天靈鼓六面以祀地路鼓四面以祀鬼神夏后加之以足謂之足鼓殷人貫之以柱謂之柱鼓周人懸之謂之懸鼓後世復音制建之謂之建鼓傍有小鼓謂之應鼔以和大鼓小鼓有柄揺之曰鞉大曰鞀也腰鼓大者瓦小者木皆廣首而纎腹齊鼓大一頭設齊於鼓面如麝齊也古今樂録馬上之鼓曰提鼓施於府寺曰朝鼓在村墅曰抱鼓在邊徼曰驚鼓銅鼓鑄銅為之虛其一面覆而擊其上節鼓如博局中開圓孔擊以節樂擔鼓如小甕先冒以革而漆之正鼓和鼓皆腰鼓也都曇鼓似腰鼓而小毛員鼓似都曇而稍大答臘鼓制廣於羯鼓而以指楷之俗謂之楷鼓雞婁鼓正鼓正而圓首尾可擊之處平可數寸方鼓大厯元年司馬滔進廣平樂作此鼓以應黄鍾一均聲並同上應鼓亦曰鼙鼓亦曰東甲鼓亦曰田鼓纂要八方之荒有石鼓焉䝉之以皮其音如雷神異經建武二十四年南郡男子獻銅鼓有銘虞喜志林逢山有祠并石人石鼓世將亂石人輒打鼓聞數十里述征記浮山東石樓下有兩石鼓叩之清越所謂神鉦也羅浮山記白鵠山有石鼓元嘉中居人祀山神乃椎此鼓如金石之響相傳云此}
