  - {type: variant, offset: 23, length: 0, content: '', krp: 大禹謨碩人俁俁公庭萬舞詩簡兮左手執籥右手秉翟同上坎坎鼓我蹲蹲舞我伐木維清奏象舞也周頌萬舞洋洋閟宫萬舞有奕那舞雲門大卷大咸大磬大夏大濩大武周禮大司樂凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞樂師春入學舎菜合舞以六樂之㑹正舞位以序出入舞者大胥巡舞列小胥舞者既陳則授舞器司干正舞位授舞器諸子孟春命樂正入學習舞記月令仲春上丁命樂正習舞釋菜同上秋冬學羽籥春夏學干戈文王世子小樂正學干大胥贊之籥師學戈籥師丞贊之同上男子年十有三學樂誦詩舞勺成童舞象二十而始學禮舞大夏内則朱干玉戚冕而舞大武皮弁素積裼而舞大夏明堂位羽籥干戚樂之器也屈伸俯仰綴兆疾舒樂之文也樂記其治民勞者其舞行綴短故觀其舞知其徳執其干戚習其俯仰屈伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉舞動其容也並同上君執干戚就舞位祭統考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下左傳舞師題以旌夏見舞象箾南籥者文王樂見舞大武者武王樂見舞韶濩者湯樂見舞大夏者禹樂見舞韶箾者舜樂並同上孔子謂季氏八佾舞於庭是可忍也孰不可忍也論語史髙祖廟奏武徳文始五行之舞孝文廟奏昭徳文始四時五行之舞孝武奏盛徳文始四時五行之舞武徳舞髙祖作以象天下樂已行舞以除亂也文始舞者本舜招舞也髙祖更曰文始五行舞者本周舞也}
  - {type: variant, offset: 24, length: 1, content: 誓, WYG: 始皇更曰五行四時舞者孝文所作孝景采武徳舞以為昭徳以尊太宗廟孝宣采昭徳武以為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行舞云前禮樂志明帝詔曰八佾具脩萬舞於庭後本紀周武帝初造山雲舞以備六代樂北史初隋有文舞武舞祖孝孫更文舞曰治康舞武舞曰凱安舞舞者各六十四人唐書文舞左籥右翟武舞左干右戚文舞執纛而引者二人武舞執旌居前者二人郊祀初獻作文舞亞獻終獻作武舞唐之自制樂凡三一曰七徳舞二曰九功舞三曰上元舞七徳舞者本名秦王破陣樂九功舞者本名功成慶善樂上元舞者髙宗所作也髙宗調露二年新造六合還淳之舞並同上傳記舞者樂之容也有俯仰張翕行綴長短之制蔡邕月令章句陶唐氏之時隂道滯伏陽道壅塞乃作舞以宣𨗳之吕氏春秋文舞居東執翟武舞居西執戚太常卿押樂在樂懸之北叶律郎執翬竿衣緑大䄂戴冠警皷二人執朱幡引樂明皇雜録于頔聞韋皋進奉聖樂亦撰順聖樂以進曲半行綴皆伏而一人舞於中幕客韋綬曰何用窮兵獨舞以諷頔國史纂異集掉八列之舞文選聽其聲不如察其形綽約閒靡機迂體輕並同上九徳之歌九韶之舞化如凱風澤譬時雨張衡賦奏新聲理秘舞飇回風轉流采成文傅𤣥賦百寳裝腰帶真珠絡臂韝笑時花近眼舞罷錦纒頭杜詩羅衣葉葉綉重重金鳳銀鵞各一叢每舞遍時分兩向太平萬嵗字當中王建宫詞合次八風金奏動分容萬舞玉鞘驚文粹本朝和峴言依古義以揖讓得天下者先奏文舞以征伐得天下者先奏武舞陛下以揖讓受禪而先奏文舞請改文舞為𤣥徳升聞之舞又陛下以神武平一宇内當次奏武舞請改武舞為天下大定之舞㑹要隊舞之制其名各十小兒隊凡七十六人一曰柘枝隊二曰劒舞隊三曰婆羅門隊四曰醉胡騰隊五曰譂臣萬嵗樂隊六曰兒童感聖樂隊七曰玉兎軍捝隊八曰異域朝天隊九曰兒童解紅隊十曰射鵰囬鶻隊女弟}
