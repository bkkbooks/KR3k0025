  - {type: variant, offset: 3150, length: 2, content: 荅謝, WYG: 所作也文王思得賢士出田卜之卦得所獲非熊非羆非虎非貔乃帝王之師也至渭之陽果遇吕尚與語大悦遂載與之俱歸立以為師乃援琴而鼓之自序思士之意也武王伐紂同上武王之所作也武王興師伐紂伯夷叔齊援劒叩馬曰父死不𦵏而争天下非孝也執䞇而事之舉兵而伐之非義也武王以告太公望太公曰循大行者不顧細禮立大功者不恤後愆遂克殷誅紂於牧野武王援琴而鼓之子}
