  - {type: variant, offset: 23, length: 0, content: '', WYG: 大禹謨碩人俁俁公庭萬舞詩簡兮左手執籥右手秉翟同上坎坎鼓我蹲蹲舞我伐木維清奏象舞也周頌萬舞洋洋閟宫萬舞有奕那舞雲門大卷大咸大磬大夏大濩大武周禮大司樂凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞樂師春入學舎菜合舞以六樂之㑹正舞位以序出入舞者大胥巡舞列小胥舞者既陳則授舞器司干正舞位授舞器諸子孟春命樂正入學習舞記月令仲春上丁命樂正習舞釋菜同上秋冬學羽籥春夏學干戈文王世子小樂正學干大胥贊之籥師學戈籥師丞贊之同上男子年十有三學樂誦詩舞勺成童舞象二十而始學禮舞大夏内則朱干玉戚冕而舞大武皮弁素積裼而舞大夏明堂位羽籥干戚樂之器也屈伸俯仰綴兆疾舒樂之文也樂記其治民勞者其舞行綴短故觀其舞知其徳執其干戚習其俯仰屈伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉舞動其容也並同上君執干戚就舞位祭統考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下左傳舞師題以旌夏見舞象箾南籥者文王樂見舞大武者武王樂見舞韶濩者湯樂見舞大夏者禹樂見舞韶箾者舜樂並同上孔子謂季氏八佾舞於庭是可忍也孰不可忍也論語史髙祖廟奏武徳文始五行之舞孝文廟奏昭徳文始四時五行之舞孝武奏盛徳文始四時五行之舞武徳舞髙祖作以象天下樂已行舞以除亂也文始舞者本舜招舞也髙祖更曰文始五行舞者本周舞也}
