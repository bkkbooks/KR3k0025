  - {type: variant, offset: 3133, length: 1, content: 漢, WYG: 市顧視日影索琴彈之曰昔袁孝尼嘗從吾學廣陵㪚吾固靳之廣陵㪚於今絶矣晉書戴逵能鼔琴武陵王晞使人召之逵對使者破琴曰戴安道不能為王家伶人陶潛性不解音而蓄素琴一張弦徽不具撫而和之曰但識琴中趣何勞絃上聲並同上禇彦囬援琴奏别鶴之曲王彧謝莊抗節嘆曰以無累之神合有道之器宫商暫離不可得已宋書傳記琴禁也以禁人之邪正人心也白虎通琴神農所作洞越練朱五絃周加二絃説文伏羲作琴脩身理性反其天真也琴操神農削桐為琴繩絲為絃以通神明之德以合天地之和桓譚新論黄帝作琴名清角纂要大琴曰離二十絃或云此是伏羲所制爾雅琴長四尺五寸者法四時五行七絃者法七星大絃為君小絃為臣文王武王加二絃以合君臣之恩風俗通伏羲作琴長三尺六寸六分象三百六十日也廣六寸象六合也文上曰池下曰岩池水平也前廣後狹象尊卑也上圓下方法天地也五絃官也大絃君也寛和而温小絃臣也清廉不亂文王加二絃合君臣恩也琴操堯使無勾作琴五絃通禮纂神農造琴以定神齊媱僻去邪欲反其天真者也揚雄清英琴第一絃為宫次為商次為角次為徴為羽次為少宫次為少商三禮圖自堯相傳善琴者八十餘人有八十餘様雖少有差大體相似皆長三尺六寸法期之數也上圓而剡象天也下方而平法地也十三徽配十二律餘一象閠也本五絃者五音也加二絃文武也蔡邕又加二絃象九星在人法九竅所象鳳首足趐南方朱雀為樂之主也五分其身以三為上以二為下三天兩地之義也龍池八寸象八風腰廣四寸象四時軫圓象陽轉而不窮也臨岳承露龍齦用梓木達先賢深意也琴書子路鼓琴}
