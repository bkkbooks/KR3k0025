  - {type: variant, offset: 3158, length: 8, content: 情如飢渴通監楊敬, WYG: 音樂蔡邕柯亭笛長吹之王徽之泊舟清溪側伊素不相識於岸上過徽之使人謂之曰聞君善吹笛試為我一奏伊時以貴顯素聞徽之名便下車踞胡床為作三調之弄便上車去不交一言晉書文宗時雲朝霞以善吹笛進二聲為新雅樂朝霞能逐意變聲頗符上㫖由是有寵唐書傳記笛滌滌然也釋名所以滌邪穢}
