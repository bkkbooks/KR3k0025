  - {type: 'tls:seg', offset: 7, content: '', id: KR3k0025_CHANT_078-1a.4}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 五日不知人居二日半簡子寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心史趙世家伊耆氏有葦籥之音伏羲有網罟之詠葛天八闋神農五絃隋志昔黄帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之道也武言}
  - {type: page-break, offset: 9, content: '', id: KR3k0025_WYG_078-4a, image: WYG0932/WYG0932-0367a.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 五日不知人居二日半簡子寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心史趙世家伊耆氏有葦籥之音伏羲有網罟之詠葛天八闋神農五絃隋志昔黄帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之道也武言}
  - {type: variant, offset: 10, length: 1, content: 惡, WYG: 武功定天下也濩言救民也夏大承二帝也招繼堯也大章章也五英英華茂也六莖及根莖也咸池備矣前禮樂志堯作大章一䕫足矣後曹褒傳䕫脩九招六列六英以明帝徳正六律和五聲以通八風通鑑叔孫通因秦樂人制宗廟樂太祝迎神於廟門奏嘉至猶古降神}
  - {type: variant, offset: 10, length: 1, content: 惡, krp: 武功定天下也濩言救民也夏大承二帝也招繼堯也大章章也五英英華茂也六莖及根莖也咸池備矣前禮樂志堯作大章一䕫足矣後曹褒傳䕫脩九招六列六英以明帝徳正六律和五聲以通八風通鑑叔孫通因秦樂人制宗廟樂太祝迎神於廟門奏嘉至猶古降神}
  - {type: punctuation, offset: 12, content: ；, id: KR3k0025_CHANT_078-bkkpn2}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0025_CHANT_078-1a.5}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 樂也皇帝入廟門奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌獨上歌不以管絃亂人聲猶古清廟之歌也登歌再終下奏休成之樂美神明既享也皇帝就酒東箱坐定奏永安之樂美禮已成也又有房中祠樂髙祖唐山夫人所作也孝惠更名曰安世樂六年又作昭容樂禮容樂前禮樂志河間獻王獻所集雅樂同上漢明帝時樂有四品一曰太予野郊廟上陵之所用二曰雅頌羣雍饗射之所用三曰黄門鼓樂天子燕羣臣之所用四曰短簫鐃歌樂軍中之所用黄帝時所造以建功揚徳風敵勵兵隋志杜䕫傳雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭及太和中左延年改䕫騶虞伐檀文王三曲更自作聲節其名雖存而聲實異唯因䕫鹿鳴全不改易晉書隋開皇初定令置七部樂曰國伎清商伎髙麗伎天竺伎安國伎龜兹伎文康伎又雜有疎勒扶南康國伯濟突厥新樂安國髙麗禮畢以為九部禮畢者出自庾亮家謂之文康樂隋書自周陳以上雅鄭淆雜隋文帝始分雅俗二部至唐更曰部當所謂俗樂者二十有八調正宫髙宫中吕宫道宫南吕宫仙吕宫黄鍾宫為七宫越調大食調髙大食調雙調小食調歇指調林鍾調為七調大食角雙角髙大食角小食角歇指角林鍾角越角為七角中吕調正平調髙平調仙宫調黄鍾羽般涉調髙般涉為七羽唐志唐祖孝孫已定樂乃曰大樂與天地同和者也制十二和以法天地之成數號大唐雅樂一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰夀和七曰太和八曰舒和九曰昭和十曰休和十一曰正和十二曰承和太宗謂侍臣曰古者聖人沿情以作樂國之興衰未必由此杜淹曰陳將亡也有玉樹後庭花齊將亡也有伴侣之曲聞者悲泣所謂亡國之音哀以思以是觀之亦樂之所起帝曰夫聲之所感亦因}
