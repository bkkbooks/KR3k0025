  - {type: variant, offset: 2461, length: 0, content: '', WYG: 曽隨織女渡天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多聽穆氏唱歌詩並前人西園一曲艷陽歌温庭筠浩歌緑水曲杜詩髙歌激宇宙狂歌托聖朝放歌頗愁絶縁雲清切歌聲上哀歌時自短悵望聊歌紫芝曲但覺髙歌}
  - {type: variant, offset: 2461, length: 0, content: '', krp: 曽隨織女渡天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多聽穆氏唱歌詩並前人西園一曲艷陽歌温庭筠浩歌緑水曲杜詩髙歌激宇宙狂歌托聖朝放歌頗愁絶縁雲清切歌聲上哀歌時自短悵望聊歌紫芝曲但覺髙歌}
  - {type: variant, offset: 2462, length: 267, content: 道士言人皆有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏出讒于帝以求饗以是人多謫過疾癘夭死柳文罵尸蟲側肩帖耳有舌如刀韓文喑嚙堪銷骨潛飛有禍胎元稹集蚊蚋與利觜枳棘與鋒鋩巧隨清影觸處行好學春鶯百般囀讒譖消骨髓並同上巧言構人罪至死人不疑白侍郎集如有膚受譖久則瘡痏成同上蒼蠅難祛貝錦方織好丹非素點白成黑李義山白璧眾求瑕素絲易成污韋應物人或罹譖比肩狐疑借有解紛毀輒隨之劉賓客蒼蠅點垂棘巧舌成錦綺盧仝常恐眾毀至春葉成秋黃孟東野微瑕懼掩瑜溫飛卿能用傾巧之智構成疑似之端李深之鑠肉銷骨皇甫湜每被銷於兄口唐文粹初因起毫髮漸可離骨肉嘉木忌深蠹哲人悲巧誣, WYG: 鬼神}
