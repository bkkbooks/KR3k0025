  - {type: variant, offset: 3169, length: 1, content: 項, WYG: 吹笙學得昆丘繡鳯鳴李白本朝玉笙哀怨弄初凉東坡孤松吹風細泠泠獨繭長繰女媧笙同上篳篥傳記篳篥本名悲篥出於胡中其聲悲通典東夷有卷桃皮似篳篥也二貝大蠡也容可數升並吹之以節聲亦出南蠻同上觱篥者笳管也卷蘆為頭截竹為管出於胡地制法角音九孔漏聲五音咸備唐以編入鹵部名為笳管用之雅樂以為雅管六竅之制則為鳳旋宫轉器以應律吕者也樂部明皇幸蜀雨中聞鈴聲上既悼念貴妃作雨霖鈴曲以寄恨焉時梨園弟子善吹觱篥者張野狐從至蜀上因以其曲授之明皇雜録篳篥者本龜兹國樂也徳宗朝有尉遲青官至將軍幽州王麻奴解吹篳篥河北吹為第一手時有從事姓盧者曰汝藝亦未足稱上國有尉遲將軍冠絶今古麻奴大怒曰某之此藝海内豈有及者邪今即徃彼定其優劣到京訪尉遲所居賂其閽者方得通見乃於髙般涉詞中吹一曲流汗浹背尉遲謂曰此曲何必髙般涉徒費許多氣力也因自出銀字管於平般涉中吹之麻奴驚憤垂泣拜之終身不復言篳篥樂府雜録笳傳記胡笳漢舊録有其曲不記所出本末笳者胡人卷蘆葉吹之以作樂也胡曰胡笳晉先蠶儀注車駕住吹小菰發大菰笳也同上胡笳者張博望入西域傳其法於西京唯得摩訶兠勒一曲李延年等更造新聲二十八解以為武樂有出塞入塞楊栁等十曲白六帖蔡琰先適河東衛仲道夫亡無子漢末大亂為騎兵所獲春月登臺殿感笳之音作胡笳十八拍别傳劉疇曽避亂塢壁羣寇百數欲害之疇援笳而吹之為出塞之聲羣寇皆泣而去曹喜之晉書劉越石為騎兵所圍越石乘月登樓清嘯羣賊聞之皆凄然長歎中夜奏胡笳賊皆流涕向曉又吹之賊並弃圍奔走世説激南楚吹胡笳風雲為之動揺星辰為之變度夏仲御别傳集昔伯陽避亂入戎戎越之思有懐土風遂建}
