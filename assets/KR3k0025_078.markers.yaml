  - {type: variant, offset: 3031, length: 2, content: 何武, WYG: 夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎魏志魏使陽裴與羊侃在北嘗同學有詔命侃延裴同宴賔客三百餘人奏三部女樂南史章昭達每飲㑹必盛設女伎雜樂備羌胡之聲音律姿容並一時之妙陳書隋文帝嘗㑹羣臣曰自古天子有女樂乎楊素以下莫知所出遂言無女樂易暉逺曰臣聞窈窕淑女鐘鼓樂之此即王者房中之樂著於雅頌不得言無帝大悦北史先天元年皇太子令宫臣就率更寺閲女樂賈曽諌曰婦人}
