  - {type: variant, offset: 2775, length: 0, content: '', WYG: 詳見二月類又後羯鼓類汝陽王璡嘗戴砑絹帽打曲上自摘紅槿花一朶置於帽上遂奏舞山香一曲而花不墜同上詳見羯鼓類李太白自蜀至京師賀知章首訪之見其烏棲曲曰此詩可以泣鬼神矣詩話今之催酒三臺或曰鄴中有三臺石崇遊宴之地樂工以促飲又云蔡邕三日之間周歴三臺樂府以邕曉音律製此曲希其厚遺資暇集同昌公主薨李可及進歎百年曲聲詞怨切聽之莫不淚下杜陽編于頔以樂曲有想夫憐其名不雅將改之客有笑曰南朝相府曽有瑞蓮故歌為相府蓮自是後}
