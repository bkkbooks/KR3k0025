  - {type: variant, offset: 81, length: 2, content: 苟害, WYG: 可宣露故於夜中歌誦同上漢時有短簫鐃歌之樂其曲有朱鷺悲塞翁艾如張上之囬雍戰城南巫山髙上陵將進酒君馬黄房樹有所思雉子班聖人出上邪臨髙臺逺如期石榴務成𤣥雲黄爵行釣竿等曲列於皷吹多叙戰陣之事晉書宋孝武時河南獻舞馬詔謝莊作舞馬歌令樂府歌之南史傳記穆王觴王母於瑶池之西王母為王歌白雲之謡穆天子傳邯鄲女子秦羅敷為王仁妾仁事趙王為家令羅敷採桑陌上趙王見而悦之置酒將奪焉羅敷善筝作陌上桑曲自明不從樂府解題司馬相如將聘茂陵女為妾文君作白頭吟以自絶乃不聘詩言君馬黄臣馬蒼二馬同逐臣馬}
