  - {type: variant, offset: 24, length: 1, content: 誓, krp: 始皇更曰五行四時舞者孝文所作孝景采武徳舞以為昭徳以尊太宗廟孝宣采昭徳武以為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行舞云前禮樂志明帝詔曰八佾具脩萬舞於庭後本紀周武帝初造山雲舞以備六代樂北史初隋有文舞武舞祖孝孫更文舞曰治康舞武舞曰凱安舞舞者各六十四人唐書文舞左籥右翟武舞左干右戚文舞執纛而引者二人武舞執旌居前者二人郊祀初獻作文舞亞獻終獻作武舞唐之自制樂凡三一曰七徳舞二曰九功舞三曰上元舞七徳舞者本名秦王破陣樂九功舞者本名功成慶善樂上元舞者髙宗所作也髙宗調露二年新造六合還淳之舞並同上傳記舞者樂之容也有俯仰張翕行綴長短之制蔡邕月令章句陶唐氏之時隂道滯伏陽道壅塞乃作舞以宣𨗳之吕氏春秋文舞居東執翟武舞居西執戚太常卿押樂在樂懸之北叶律郎執翬竿衣緑大䄂戴冠警皷二人執朱幡引樂明皇雜録于頔聞韋皋進奉聖樂亦撰順聖樂以進曲半行綴皆伏而一人舞於中幕客韋綬曰何用窮兵獨舞以諷頔國史纂異集掉八列之舞文選聽其聲不如察其形綽約閒靡機迂體輕並同上九徳之歌九韶之舞化如凱風澤譬時雨張衡賦奏新聲理秘舞飇回風轉流采成文傅𤣥賦百寳裝腰帶真珠絡臂韝笑時花近眼舞罷錦纒頭杜詩羅衣葉葉綉重重金鳳銀鵞各一叢每舞遍時分兩向太平萬嵗字當中王建宫詞合次八風金奏動分容萬舞玉鞘驚文粹本朝和峴言依古義以揖讓得天下者先奏文舞以征伐得天下者先奏武舞陛下以揖讓受禪而先奏文舞請改文舞為𤣥徳升聞之舞又陛下以神武平一宇内當次奏武舞請改武舞為天下大定之舞㑹要隊舞之制其名各十小兒隊凡七十六人一曰柘枝隊二曰劒舞隊三曰婆羅門隊四曰醉胡騰隊五曰譂臣萬嵗樂隊六曰兒童感聖樂隊七曰玉兎軍捝隊八曰異域朝天隊九曰兒童解紅隊十曰射鵰囬鶻隊女弟}
