  - {type: variant, offset: 14, length: 1, content: 彥, WYG: 哀樂將亡之政其民苦故聞以悲今玉樹伴侣之曲尚存為公奏之知必不悲魏徴進曰孔子稱樂云樂云鍾鼓云乎哉樂在人和不在音也貞觀十四年景雲見黄河清張文收采古朱鴈天馬之義制景雲河清歌奏之絃管為諸樂之首𤣥宗初賜第隆慶坊坊南之地變為池中宗嘗泛舟以厭其祥帝即位作龍池樂舞者十有二人冠芙蓉冠躡履備用雅樂唯無磬又作}
