  - {type: variant, offset: 3104, length: 0, content: '', WYG: 躬徃造焉宣仲正在林中彈筝不廻顧逡廵致筝於席延卲陵與語纔述寒温而已卲陵授筝令彈答曰幸非王門伶人何事見逼占對詳雅衆不能屈襄沔記索丞宗伯夷成善鼓筝悲歌能使喜者墮淚改調易謳能使戚者起舞時人號曰雍門調燉煌實錄郝素善彈筝雖伯牙妙手吳姬竒聲何以加之傅子集斬泗濱之梓以為筝魏文帝與吳質書以為䝉恬所造今觀其器上圓似天下平似地中空准六合絃柱擬十二月設之則四象在鼔之則五音發斯乃智仁之器豈䝉恬亡國之臣所能關思哉傅𤣥賦序銀甲彈筝用杜詩本朝錦幄初温獸香不斷相對坐調筝周詞琵琶史石季倫善彈琵琶晉書庾仲文好貨先與劉徳願殊惡徳願自持琵琶甚精麗遺之便復欵然宋書范􅋫善彈琵琶能為新聲同上隋文帝龍潛時頗好音樂嘗倚琵琶作歌二首名曰地厚天髙托言夫妻之義隋書傳記琵琶本胡中馬上所鼓推手前曰琵引手却曰琶因以為名釋名琵琶長三尺五寸法天地人與五行也四絃象四時也風俗通琵琶自烏孫公主造馬上彈之樂府雜錄開元中有賀懷智琵琶以石為槽􅀈鷄筋作弦用鐡撥彈之貞元中有康崑崙彈琵琶第一手及聞聲樂即街東登綵樓彈一曲新翻調録要後人誤以録要為緑腰其街西亦見一樓女郎抱樂器先云我亦彈此曲兼移在楓香調中撥聲如雷其妙絶入神崑崙驚駭請拜為師女郎更衣而}
