  - {type: variant, offset: 3145, length: 0, content: '', krp: 妙手十二曰懐陵操伯牙作又有九引一曰列女引楚樊姬作二曰伯姬引魯伯姬作三曰貞女引魯漆室女作四曰思歸引衛有賢女邵王聞其賢請聘之未至王夢太子曰吾聞齊相得衛姬覇今衛女賢欲留之大夫曰不可若賢必不我聽聽亦不賢不足取太子不聽遂留居深宫思歸不得援琴而歌曲終自縊而死五曰霹靂引楚商梁出遊九臯之澤遇風雷霹靂畏懼而歸作六曰走馬引樗里牧恭為父報寃殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引樗里子髙作互見箜篌類八曰琴引秦時屠門髙}
  - {type: variant, offset: 3146, length: 1, content: 惜, WYG: 作九曰楚引楚龍丘子髙作又有河間雜歌二十一章已上並見琴操樂府解題并大周正樂琴曲有蔡氏五弄雙鳳離鸞歸風送逺幽蘭白雪長清短清長側清調琴調大遊小遊明君胡笳廣陵㪚白魚嘆楚妃嘆風入松烏夜啼楚明光石上流泉臨汝侯子安之流慚洄雙燕離陽春弄悦弄連弄悦人弄連珠弄中運清暢志清看客清僻清婉轉清已上見琴歴禹上㑹稽大周正樂曰禹之所作也堯時洪水淊天使禹治之乃溯江河上㑹稽嘆曰云云自是之後百姓降邱黎庶乂安彈琴以自嘆文}
