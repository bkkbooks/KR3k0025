  - {type: variant, offset: 3100, length: 0, content: '', WYG: 宫聲則使人為舒而廣大聞商聲則使人方正而好義聞角聲則使人惻隠而好仁聞徴聲則使人整齊而好禮聞羽聲則使人樂養而好施公羊傳子師曠之聰不以六律不能正五音孟子黄帝作五音以正五聲管子史樂者所以動盪血脈通流精神而和正聲也故宫動脾而和正信商動肺而和正義角動肝而和正仁徴動心而和正禮羽動腎而和正智史樂書商之為言章也物成熟可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而繁祉也羽宇也物聚藏宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也協之五行則角為木五常為仁五事為貌商為金為義為言徴為火為禮為視羽為水為智為聽宫為土為信為思前律歴志以九寸為宫或損或益以宫商角徴羽九六相生隂陽之應也後律歴志以黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽應鍾為變宫􅅋賓為變徴此聲氣之元五音之正也五聲生於隂陽分為十二律同上五音相生宫生角角生商商生徴徴生羽羽生宫晉律歴志五聲和是調五樂同上五音本在中土故氣運調平今既東南土氣偏詖故不能感動木石南史唐祖孝孫以十二月旋相為六十聲八十四調其法因五音生二變因變徴為正徴因變宫為清宫七音起黄鍾終南吕迭為紀綱黄鍾之律管九寸土於中宫土半之四寸五分與清宫合五音之首也加以二變循環無間故一宫二商三角四變徴五徴六羽七變宫其聲由濁至清為一均凡十二宫調皆正宫也正宫聲之下無復濁音故五音以宫為尊十二商調調有下聲一為宫也十二角調調有下聲二宫商也十二徴調調有下聲三宫商角也十二羽調調有下聲四宫商角徴也十二變徴調居角音之後正徴之前十二變宫調在羽音之後清宫之前雅樂成調無出七聲本宫迭相用唯樂章則隨律定均唐禮樂志傳記宫謂之重商謂之敏角為之經徴謂之送羽謂之栁爾雅琴瑟尚宫鍾尚羽石尚角瓦絲尚商匏竹尚徴國語五聲昭徳同上唐開元末凉州進新曲上命諸王於便殿觀之曲終諸王皆稱萬歲獨寜王不賀𤣥宗問其故寜王曰夫曲者始於宫散於商成於角徴羽莫不根柢囊括在於宫商也臣見此曲宫離而少微商亂而加暴夫宫者君也商者臣也宫不勝則君體卑商有餘則臣事僭臣恐臣下有悖亂之事陛下有播越之禍也洎禄山南犯𤣥宗西幸方明寜王審音之妙也開元傳信集聽清濁五聲之和然後制為鐘律楊泉物理論啟中黄之少宫發辱收之變商七啟函宫吐角激徴清發梁揚羽申以商郊祀歌六律見律歴部律吕類八音經八音克諧書舜典播之以八音周禮鐘聲鏗鏗以立號號以立横横以立武君子聽鐘聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立亷廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思蓄聚之臣鼓鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣記樂記夫舞所以節八音而行八風左傳史調諧八音以蕩其心史禮書八音克諧節有度也無相奪倫守有序也吳世家八音均調前律歴志土曰壎匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷同上聲律相恊而八音生晉律歴志兌之音金其風閶闔乾之音石其風不周離之音絲其風景震之音竹其風明庻艮之音匏其風融坤之音土其風凉坎之音革其風廣莫巽之音木其風清明晉樂志阮咸妙逹八音論者謂之神解同上凡樂八音自漢以來惟金以鐘定律吕故其制度詳其餘七者史官不記至唐獨宫縣與登歌鼓吹十二案樂器有數其餘皆畧而不著而其物名具在八音一曰金為鎛鐘為編鐘為歌鐘為錞為鐃為鐲為鐸二曰石為大磬為編磬為歌磬三曰土為壎為嘂嘂大壎也四曰革為雷鼓為靈鼓為路鼓皆有鼗為建鼓為鼗鼓為縣鼓為節鼓為拊為相五曰絲為琴為瑟為頌瑟筝也為阮咸為筑六曰木為柷為敔為雅為應七曰匏為笙為竽為巢巢大笙也為和小笙也八曰竹為簫為管為篪為笛為舂牘此樂器也唐禮樂志竽立春之音籥春分之音柷立夏之音琴夏至之音壎立秋之音鐘秋分之音磬立冬之音鼓冬至之音其後聲器浸殊絲有琵琶五絃箜篌筝竹有篳篥簫笛匏有笙革有杖鼓第二鼓第三鼓腰鼓大鼓土則附革而為鞚木有拍板方響皆以體金應石而備八音並同上傳記八音八物之章白虎通八音者至徳之道天子樂之故樂用八音八音者法易八卦萬物之數也並同上金石以動之絲竹以行之歌以詠之匏以宣之土以贊之革木以節之國語樂器經䕫曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賓在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀書益稷設業設虡崇牙樹羽應田縣鼓鞉磬柷敔既備乃奏簫管備舉詩冇瞽雷鼓雷鼗孤竹之管雲和之琴瑟周禮天司樂靈鼓靈鼗孫竹之管空桑之琴瑟路鼓路鼗隂竹之管龍門之琴瑟並同上王宫縣四面縣也諸侯軒縣去其一面卿大夫判縣又去一面士特縣止有一面凡縣鐘磬半為堵全為肆小胥掌教鼓鼗柷敔塤簫管弦歌小師掌播鼗柷敔塤簫管絃歌瞽矇凡為樂器以十有二律為之數度以十有二聲為之齊量典同掌教龡竽笙塤籥簫箎篴管舂牘應雅以教祴樂笙師史唐樂縣之制宫縣四面天子用之若祭祀則前祀二日太樂令設縣於壇南内壝之外北向東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之鎛鐘十有二在十二辰之位樹雷鼓於北縣之内道之左右植建鼔於四隅置柷敔於縣内柷在右敔在左設歌鐘歌磬於壇上南方北向磬簴在西鐘簴在東琴瑟筝筑皆一當磬簴之次匏竹在下凡天神之類皆以雷鼓地祇之類皆以靈鼓人鬼之類皆以路鼓其設於庭則在南而登歌者在堂若朝㑹則加鐘磬十二簴設鼓吹十二案於建鼓之外案設羽葆鼓一大鼓一金錞一歌簫笳皆二登歌鐘磬各一簴節鼓一歌者四人琴瑟筝筑皆一在堂上笙和簫塤箎皆一在堂下若皇后享先蠶則設十二大磬以當辰位而無路鼓軒縣三面皇太子用之若釋奠於文宣王武成王亦用之其制去宫縣之南面判縣二面唐之舊禮祭風伯雨師五岳四瀆用之其制去軒樂之北靣皆植建鼓於東北西北二隅特縣去判縣之西靣或陳於階前有其制而無其用凡植者為簨横者為簴簴以縣鐘磬皆十有六周人謂之一堵而唐人謂之一簴自隋以前宫縣二十簴及隋平陳得梁故事用三十六簴遂用之唐因隋舊用三十六簴高宗蓬萊宫成増用七十二簴武后時省開元定禮始依古著為二十簴昭宗時宰相張璿已修樂縣乃言舊制太清宫南北郊社稷及諸殿廷用二十簴而於太廟含元殿用三十六簴濬以為非古而廟廷狹隘不能容三十六乃復用二十簴而鍾簴四以當甲丙庚壬磬簴四以當乙丁辛癸與開元禮異而不知其改作之時或説以鐘磬應隂陽之位此禮經所不著唐志本朝元祐三年范鎮鑄成律十二編鐘十二鐘一尺一斛一響石為編磬十二持磬一簫笛塤箎篁笙和笙各二較景祐中季照所定又下一律有竒并書及圖法上進通畧鍾經鼓鍾刺幽王也詩小雅鼓鍾于宫聲聞于外白華鍾師掌金奏周禮磬師掌教擊編鍾鳬氏為鍾兩欒謂之銑銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹鍾𢃄謂之篆篆間謂之枚枚謂之景于上之攠謂之隧鍾已厚則石聲不發也已薄則播聲散也侈則柞聲大外也弇則欝聲不舒揚也長甬則震聲不正也鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞並同上知悼子卒未葬平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之記檀弓善待問者如撞鍾叩之以小則小鳴叩之以大則大鳴待其從容然後盡其聲學記鍾聲鏗鏗以立號樂記互見前八音類鄭伯朝楚楚子賜之金既而悔之與之盟曰無以鑄兵故以鑄三鍾左傳鄭人賂晉侯歌鍾二肆宋左師每食擊鍾季武子入鄭取其鍾以為盤吳公子札將宿於戚孫文子之邑聞鍾聲曰夫子獲罪於君以在此也懼猶不足而又何樂君又在殯而可以樂乎鄭伯有耆酒為窟室而夜飲酒擊鍾焉並同上叔孫為孟鍾曰饗大人以落之孟叔孫豹長子天王將鑄無射伶州鳩曰鐘音之器也小者不窕大者不槬窕則不咸槬則不容今鍾槬矣王心弗堪其能久乎同上子將以釁鍾孟子髙子曰禹之聲尚文王之聲孟子曰何以言之曰以追蠡注云追鍾鈕也蠡欲絶之貌同上黄帝作五鍾一曰青鍾大音二曰赤鍾重心三曰黄鍾灑光四曰景鍾昧其明五曰黒鍾隠其常管子智伯欲伐讐由而道難不通鑄大鍾遺之方車二軌讐由大悦除塗將内之赤章曼支諌曰此小所以事大也今以大事小兵必隨之不聽曼支因斷轂而馳至齊十月讐由亡韓子闔閭伐楚破九龍之鍾淮南子禹以五音聽政為號曰教寡人以義者擊鍾同上齊景公族鑄大鍾撞之於庭下郊雉皆雊同上史高祖廟有十鍾受千石撞之聲聞百里漢書漢中城固縣水際忽有雷聲俄而岸崩得銅鐘十二枚宋書唐有古鍾十二近代惟用其七餘有五鍾俗號啞鍾張文收吹律調之聲皆響徹時人咸服其妙唐書傳記鍾空也空内受氣多故聲大釋名魏顆以身戰退秦於輔氏其勲銘之景鍾國語景王鑄無射伶人告和王謂伶州鳩曰鍾果和矣對曰上作器民樂之則為和今民莫不怨恨臣不知其和同上景公為大鍾將懸之仲尼伯常騫晏子三人俱朝曰鍾将毀撞之果毀公見三子問之晏子對曰鍾大不以禮曰將毀仲尼曰鍾大懸下氣上薄故曰將毀伯常騫曰今日庚申雷日也隂莫勝於雷故曰將毀晏子春秋豐山有鍾霜降則自鳴山海經漢武未央宫鍾無故自鳴問東方朔對曰臣聞銅土之子子母相感山恐有崩弛者三日南郡太守言有山崩東方朔别傳洛陽太極殿前大鍾六枚父老云曾有欲移此鍾者鍾聲震地咸懼不敢復犯述征記義熈十一年霍山崩毀出銅鍾六枚上有古文蝌蚪書晉中興書魏時殿前鍾忽鳴張華曰蜀銅山崩説苑凡鍾十六枚同為一筍簴者為編鍾將懸者謂之鑄三禮圖陜州黄河有銅鍾常自浮出海晦朔隂雨之日輙鳴五行記集鏗千石之鍾上林賦鴻鍾萬均西京賦宫垂金鏞東京賦發鯨魚鏗華鍾東都賦金吼霜鍾徹杜詩恰如寸筳撞洪鍾韓詩本朝景祐二年李照言編鍾鏄鍾皆不中度請改制大樂通典皇宋紹興十六年中興天子以好生大徳既定海宇乃作樂暢天地之化以和神人惟兹景鍾首出衆樂天子專用諸禋祀詔臣檜銘且書臣功銘曰徳繼懿兮同久貽子孫兮彌萬世秦檜景鍾銘方響傳記梁有銅磬葢今方響也方響以鐡為之脩九寸廣二寸圓上方下架如磬而不設業倚架上以代鍾磬人間使用者纔三四寸三禮圖唐咸通中吾繽為鼓吹署丞善打方響其妙超羣樂府雜録朱崖李大尉有樂吏廉效嘗擕樂器臨池彈蕤賓調池中擲物跳上岸觀之乃一片方響㽔賓鐡葢以聲律諧和相應故也其妙若此同上磬經䕫曰於予擊石拊石百獸率舞書舜典戞擊鳴球益稷徐州泗濱浮磬禹貢豫州錫貢磬錯同上依我磬聲詩那篇眂瞭掌擊頌磬笙磬周禮磬師掌教擊磬磬氏為磬並同上君子聽磬聲則思死封疆之臣記樂記叔之離磬明堂位諸侯之宫縣擊玉磬諸侯之僭禮也郊特牲齊侯使賓媚人賂以紀甗玉磬左傳子擊磬於衛有荷蕢而過孔子之門者曰有心哉擊磬乎論語擊磬襄入于海同上子磬廉制荀子磬似水同上孟冬之月北宫御女黒衣綵擊磬石淮南子禹以五音聽政為號曰語寡人以憂者擊磬同上史成帝時犍為郡於水濱得古磬十六枚議者以為善祥前禮樂志世祖幸太學詔諸生雅歌擊磬盡日乃罷後桓榮傳冬至擊黄鍾之磬禮儀志武帝至漢中得杜䕫識舊法始復設軒懸鐘磬魏志登歌磬以玉為之唐禮樂志傳記磬樂石也古者毋句氏作磬說文大磬謂之毊徒鼓磬謂之寋爾雅魯饑臧文仲以玉磬如齊告糴國語王阜為重泉令鸞集學宫阜擊磬鸞應磬而舞東觀漢記鳥危之山其陽多磬小華之山其隂多磬石高山涇水出焉其中多磬山海經浮瀛即瀛洲也上有青石可為磬拾遺記黄帝使伶倫造磬通禮義纂天地尚質用石磬宗廟及殿庭尚文用玉磬唐禮皇后祭先蠶設十二磬於辰位並同上磬者夷則之器萬物之成其氣磬故曰磬有貴賤焉有親疎焉有長㓜焉三者得然後王道得而萬物成天下樂之故樂用磬也白虎通集動鍾磬之鏗鍧文選金簧玉磬宫中生下沉秋水激太清栁詩有時自發鍾磬響杜詩瑟經子有酒食何不日鼓瑟詩山有樞既見君子並坐鼔瑟車鄰清廟之瑟朱弦而疏越一唱而三嘆有遺音者矣記樂記子曰由之瑟奚為於丘之門論語㸃爾何如鼓瑟希鏗爾舍瑟而作孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌並同上子瓠巴鼓瑟而游魚出聽荀子公輸子巧用材也不能以檀為瑟愼子齊宣王問巨倩曰儒者鼓瑟乎對曰瑟者以小弦為大聲以大絃為小聲是細大易序貴賤易位儒者以為害義故不能韓子夫瑟二十五弦其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴君為之立變尹子以徃聖之法詔將來譬猶膠柱而調瑟揚子史䕫為樂正仰延益八絃為二十三絃之瑟通鑑外記趙惠文王與秦王㑹澠池秦王曰竊聞趙王好音請奏瑟趙王鼓瑟相如前曰聞秦王善為秦聲請奏盆缶秦王不懌為一擊缶史藺相如傳漢武帝歌兒作二十五絃及箜篌瑟前郊祀志或曰黄帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃同上婦趙女也雅善鼓瑟楊惲傳萬石君石奮其父趙人姊能鼓瑟高祖召其姊為夫人本傳傳記大瑟謂之灑徒鼓瑟謂之歩爾雅惟瑟二十三絃其常用者十九絃其餘四弦謂之蕃灑也頌瑟二十五弦盡用也三禮圖瑟者閑也所以懲忿窒欲正}
