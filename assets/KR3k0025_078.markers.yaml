  - {type: variant, offset: 3137, length: 0, content: '', WYG: 鄒忌以琴見齊威王曰大絃急以温者君也小絃廉折以清者相也推之深釋之舒者刑罰審也均諧之鳴者政令一也大小相益囬邪不相害者上下和鳴吏民相親也故曰琴音調而}
  - {type: variant, offset: 3137, length: 0, content: '', krp: 鄒忌以琴見齊威王曰大絃急以温者君也小絃廉折以清者相也推之深釋之舒者刑罰審也均諧之鳴者政令一也大小相益囬邪不相害者上下和鳴吏民相親也故曰琴音調而}
  - {type: variant, offset: 3139, length: 0, content: '', WYG: 治史記師曠鼓琴通於神明而白鵠翔孫氏瑞應圖雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能使人悲乎周曰臣烏能令足下悲哉千秋萬嵗}
  - {type: variant, offset: 3139, length: 0, content: '', krp: 治史記師曠鼓琴通於神明而白鵠翔孫氏瑞應圖雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能使人悲乎周曰臣烏能令足下悲哉千秋萬嵗}
  - {type: variant, offset: 3140, length: 1, content: 寶, WYG: 下宗廟不血食墳墓已平採樵者躑躅其足而歌其上曰夫以孟嘗君尊貴乃若是乎於是周引琴而鼓之孟嘗君涕泣増哀下而就之曰聞先王鼓琴立若破國亡邑之人也説苑張安世十五為成帝侍中善鼓琴能為雙鳳離鸞之曲西京雜記嵇中散夜燈下彈琴忽有一人面甚小斯須轉大遂長丈餘嵇乃吹燈滅之曰恥與魑魅争光語林嵇中散投宿華陽亭至一更中操琴先作諸弄聞空中稱善中散曰君何不來答曰身是古人就終殘毁不冝接侍君子向夜慚見以手持其頭與中散論聲中散以琴授之悉作衆曲唯廣陵㪚絶倫與中散誓不得傳他人靈異志賀思令常夜坐月中臨風鳴絃忽有一人著械在中庭稱善自云是嵇中散因授以廣陵散遂傳之於今不絶世説王彦伯至呉郵亭維舟牛渚秉燭理琴見一女子披幃而進取琴調之其聲甚哀女子曰此曲所謂楚明光者也唯嵇叔夜能為此聲續齊諧記清角黄帝之琴鳴廉脩况藍脅自鳴空中號鍾齊桓公琴繞梁荘琴緑綺司馬相如琴焦尾蔡邕琴鳳凰趙飛燕琴文周正樂李汧公勉雅好琴有絶代者一名響泉一名韻磬自寳於家國史補集臣嘗行僕馬肌疲正直主人開門主人翁出獨有主人女在欲置臣堂上太髙堂下太卑乃别尋他房與室止臣其中其中有鳴琴焉臣援琴而鼓之為秋竹積雪之曲宋玉賦上客何國之公子所從來無乃逺乎遂設㫖酒進鳴琴撫絃為幽閒之曲司馬相如清音發而陽氣亢白雪奏而靈雨零成公綏賦理正聲奏妙曲揚白雪發清角嵇康賦絃以園客之絲徽而鍾山之玉文選絃隨流水急調雜秋風清蕭慤詩蜀琴欲奏鴛鴦絃李白清琴弄雪月拂霜弄瑶軫琴奏龍門之緑桐石上弄寳琴纎手弄雲和並同上哀絃繞白雪杜詩收書動玉琴哀絲千古心並同上鼓有虞氏之南風賡之以文王宣父之操優游怡曠博厚髙明追三代之遺音想舞雩之詠歌及暮而退皆充然若有得也韓有巳日聽琴序昵昵兒女語恩怨相爾汝劃然變軒昻勇士赴敵場浮雲栁絮無根蔕天地濶逺隨飛揚喧啾百鳥羣忽見孤鳳凰躋攀分寸不可上失勢一落千丈長聴頴師琴雪絃寂寂聽朝詩靈琴窅窅同上若人抱竒音朱絃絙枯桐栁集本朝用兹有道器寄此無景情六一集彈雖在指聲在意聽不以耳而以心心意既得形骸忘天地白日愁雲隂五音商羽主肅殺颯颯坐上風吹沙忽然黄鍾囬暖律當冬草木皆萌芽又云理身如理琴正聲不可干以邪並同上羽客知人意瑶琴繫馬鞍東坡哀彈本舊曲妙耳非昔聞賴有三尺桐中有山水意並同上緑琴珠網遍絃絶不成聲山谷王師學琴三十年響如清夜落澗泉滿堂洗盡筝琶耳請師停手恐斷絃同上琴操史箕子諌紂不聴佯狂為奴遂隱而皷琴以自悲}
