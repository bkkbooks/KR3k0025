  - {type: variant, offset: 2769, length: 0, content: '', WYG: 集為君更喚木腸兒脚叩兩舷歌小海陽關三疊君須祕除却膠西不解歌並同上曲史李延年善歌舞武帝愛之每為新聲變曲聞者莫不感動漢外戚傳元帝自度曲被歌聲注云自隱度作新曲因持新曲以為歌詩聲也本紀周瑜少精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧故時人謠曰曲有誤周郎顧吳志羊侃善音律自造采蓮掉歌兩曲甚有新致南史陳後主使諸貴人及女學士與狎客共賦新詩採其尤豔麗者以為曲調其曲有玉樹後庭花臨春樂等曲同上煬帝令樂工白明達造新聲刼萬歳樂隋書貞觀中太宗幸慶善宫其宫即其降誕之所上賦詩十韻於是吕才播於樂府被之管絃名曰功成慶善曲唐書隋亡清樂散缺存者纔六十三曲其後傳者平調清調周房中樂遺聲也白雪楚曲也公莫舞漢舞也巴渝漢髙帝命工人作也明君漢元帝時作也明之君漢鞸舞樂也鐸舞漢曲也白鳩吳拂舞曲也白紵吳舞也子夜晉曲也前溪晉將軍沈珫作也團扇晉王珉歌也懊儂晉隆安初謠也長史變晉司徒長史王廞作也丁督䕶晉宋間曲也讀曲宋人為彭城王義康作也烏夜啼宋臨川王義慶作也石城宋臧質作也莫愁石城樂所出也襄陽宋隨王誕作也烏夜飛宋沈攸之作也估客樂齊武帝作也楊叛北齊歌也驍壺投壺樂也常林歡梁宋間曲也三洲商人歌也採桑三洲曲所出也玉樹後庭花堂堂陳後主作也泛龍舟隋帝作也又有吳聲四時歌雅歌上林鳯雛平折命嘯等曲其聲與其辭皆訛失十不𫝊一唐書傳記宋玉識音而善}
