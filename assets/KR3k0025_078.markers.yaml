  - {type: variant, offset: 3, length: 0, content: '', WYG: 雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考易豫卦帝曰䕫命汝典樂教冑子書舜典詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和同上籥舞笙鼓樂既和奏詩賔之初筵樂具入奏楚茨有瞽始作樂而合乎祖也詩序以六律六同五聲八音六舞大合樂以致鬼神􅅘周禮大司樂凡六樂者文之以五聲播之以八音凡六樂者一變而致羽物及川澤之􅅘再變而致臝物及山林之􅅘三變而致鱗物及丘陵之􅅘四變而致毛物及墳衍之􅅘五變而致介物及土􅅘六變而致象物及天神同上教樂儀行以肆夏趨以采齊車亦如之樂師以六徳為之本以六律為之音太師凡音者生人心者也樂者通倫理者也記樂記大樂與天地同和鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也王者功成作樂五帝殊時不相沿樂䕫始制樂以賞諸侯故天子之為樂也以賞諸侯之有徳者也樂也者聖}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_078-1b, image: WYG0932/WYG0932-0365b.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_078-2a, image: WYG0932/WYG0932-0366a.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考易豫卦帝曰䕫命汝典樂教冑子書舜典詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和同上籥舞笙鼓樂既和奏詩賔之初筵樂具入奏楚茨有瞽始作樂而合乎祖也詩序以六律六同五聲八音六舞大合樂以致鬼神示周禮大司樂凡六樂者文之以五聲播之以八音凡六樂者一變而致羽物及川澤之示再變而致臝物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神同上教樂儀行以肆夏趨以采齊車亦如之樂師以六徳為之本以六律為之音太師凡音者生人心者也樂者通倫理者也記樂記大樂與天地同和鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也王者功成作樂五帝殊時不相沿樂䕫始制樂以賞諸侯故天子之為樂也以賞諸侯之有徳者也樂也者聖}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 所樂也而可以善民心其感人深其移風易俗故先王著其教焉清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而}
  - {type: variant, offset: 5, length: 0, content: '', krp: 所樂也而可以善民心其感人深其移風易俗故先王著其教焉清明象天廣大象地終始象四時周旋象風雨五色成文而不亂八風從律而不姦百度得數而}
  - {type: variant, offset: 6, length: 2, content: 技冒, WYG: 常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧魏文侯曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦致樂以治心則易直子諒之心油然生矣樂者天地之命中和之紀人情之所不能免也並同上呉公子札來聘請觀於周樂左傳子語魯太師樂曰樂其可知也始作翕如也從之純如也皦如也繹如也以成論語子謂韶盡美矣又盡善也謂武盡美矣未盡善也子曰吾自衛反魯然後樂正雅頌各得其所子曰師摰之始關雎之亂洋洋乎盈耳哉惡鄭聲之亂雅樂也論語子今之樂猶古之樂也孟子齊景公召太師曰為我作君臣相説之樂蓋徴招角招是也同上北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩黙黙乃不自得莊子周穆王於中天之臺奏承雲六莖九韶晨露之樂列子注云承雲黄帝樂六莖帝嚳樂九韶舜樂晨露湯樂夫樂天地之精也惟聖人為能和六律均五聲知和之本以通八風孔叢子樂中平則民和而不流樂莊肅則民齊而不亂荀子徳全而道之以樂於是乎和而知節文中子故韶之成也虞氏之恩被動植矣鳥鵲之巢可俯而窺也鳳凰何為而藏乎同上史趙簡子}
