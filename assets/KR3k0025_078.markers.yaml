  - {type: variant, offset: 3157, length: 0, content: '', WYG: 傳記大管謂之簫其中謂之䈌小者謂之􅩭爾雅管象篪長尺圍寸有六孔無底廣雅象物貫地而芽故謂之管風俗通舜時西王母獻白玉管大戴禮集不須吹急管衰老易悲傷杜詩本朝孤管呌秋月六一集笛史黄帝使伶倫伐竹於昆谿斬而作笛吹之作鳳鳴史記桓伊}
