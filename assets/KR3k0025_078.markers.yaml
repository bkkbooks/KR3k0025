  - {type: variant, offset: 19, length: 1, content: 俾, WYG: 又作小破陣樂舞者被甲胄又作光聖樂舞者鳥冠畫衣以歌王迹所興又分樂為二部伎堂上坐奏謂之坐部伎堂下立奏謂之立部伎立部八一安舞二太平樂三破陣樂四慶善樂五大定樂六上元樂七聖夀樂八光聖樂坐部伎六一燕樂二長夀樂三天授樂四鳥歌萬嵗樂五龍池樂六小破陣樂代宗時劉日進製寳應長寧樂十八曲大歴元年又有廣平太一樂安涚問樂意楊收曰上古祀天地宗廟皆}
