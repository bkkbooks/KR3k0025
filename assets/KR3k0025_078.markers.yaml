  - {type: variant, offset: 3130, length: 2, content: 己過, WYG: 世無足鼔琴者也吕子孔子遊乎緇帷之林坐杏壇之上弟子讀書孔子絃歌鼔琴奏曲未半有漁父者下船而來孔子推琴而起曰其聖人歟莊子史騶忌以鼓琴見齊威王威王舍之右室史記司馬相如素與臨卭令王吉相善臨卭富人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如始如臨卭車騎雍容閑雅甚都及飲卓氏弄琴文君竊窺心悦而好之同上周師經仕魏善鼓琴文侯躭之起舞經怒以琴撞文侯文侯將殺之經曰乞申一言而死文侯曰何曰臣撞桀紂之君不撞堯舜之主文侯乃捨之懸琴於壁以為戒十二國史蔡邕在陳留鄰人有以酒食召邕者客彈琴於屛邕至門潛聽之曰以樂召我而有殺心何也遂返主人追問其故邕具以告彈琴者曰我向見螳螂方向鳴蟬吾心聳然惟恐螳螂之失蟬也此豈為殺心而形於聲乎後漢書蔡邕在呉呉人有燒桐以爨者邕聞火烈聲知其良材因請而裁為琴果有美音而其尾有焦名曰焦尾琴蔡琰字文姬邕之女也邕夜彈琴絃絶琰曰第二絃復故斷一絃曰第四絃並同上嵇康臨刑}
