  - {type: variant, offset: 2780, length: 5, content: 沙須影過黃, WYG: 羞歛態欲君住更奏新聲刮骨鹽杜集伏觀漢魏以來代有鐃歌鼓吹詞漢曲十二篇魏曲十四篇晉曲十六篇漢歌詞不明記功徳魏晉歌功徳具今臣竊取魏晉義用漢篇數為唐鐃歌鼓吹曲十二篇紀髙祖太宗功能之神奇栁文荆姬採菱曲越女江南謳王融吳歈越吟未終曲江上團團帖寒玉李賀舊詞翻白紵新賦購黄金温庭筠不應令曲誤特此試周郎王勛本朝景祐二年仁宗作警嚴曲付太常肄習名曰振容歌通畧陶淵明作歸去來辭而無其聲余晩治雪堂作斜川之歌又取歸去來辭稍加檃括使就聲律以遺毅夫使家童歌之時相從於東坡釋耒而和之扣牛角而為之節不亦樂乎東坡集法雲秀關西鐵面嚴冷嘗謂}
