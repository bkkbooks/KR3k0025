  - {type: variant, offset: 3145, length: 0, content: '', WYG: 妙手十二曰懐陵操伯牙作又有九引一曰列女引楚樊姬作二曰伯姬引魯伯姬作三曰貞女引魯漆室女作四曰思歸引衛有賢女邵王聞其賢請聘之未至王夢太子曰吾聞齊相得衛姬覇今衛女賢欲留之大夫曰不可若賢必不我聽聽亦不賢不足取太子不聽遂留居深宫思歸不得援琴而歌曲終自縊而死五曰霹靂引楚商梁出遊九臯之澤遇風雷霹靂畏懼而歸作六曰走馬引樗里牧恭為父報寃殺人而亡藏於山林之下有天馬引之感作此引七曰箜篌引樗里子髙作互見箜篌類八曰琴引秦時屠門髙}
