  - {type: variant, offset: 3116, length: 9, content: 薦達賢士多所獎進知, WYG: 琴以歌南風樂記晉侯觀於軍府見鍾儀問其族曰伶人也使與之琴操南音范文子曰君子也言稱先職不背本也樂操土風不忘舊也左傳衛侯有嬖妾使師曹誨之琴同上子瓠巴鼓琴鳥舞魚躍鄭師文聞之從師襄柱指鈎絃三年不成聲無幾見師襄曰文得之矣於是當春}
