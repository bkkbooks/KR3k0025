  - {type: variant, offset: 1480, length: 780, content: 明水霧蔽之也同上昔直不疑未嘗有兄而讒者謂之盜嫂第五倫三娶孤女而世人云笞婦翁此聽虛而責響悖情倒理誣罔之甚也劉傷讒互入謗毀史猶有內讒左閔二年毀信廢忠崇飾惡言靖譖庸回服讒蒐慝以誣盛德謂之窮奇共工左文十八年若眾口之鑠金國語言之太甘其中必苦譖在中矣國語晉吳太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩今不見用常鞅鞅怨望吳王乃使使賜子胥屬鏤之劍以死史記本傳互入信讒屈原為憲令上官大夫見而欲奪之不與因讒之曰王使屈平為令眾莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平史記屈平傳積毀銷骨史記張儀傳范睢謬曰秦安得王秦獨有太后穰侯耳臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王大其都者危其國尊其臣者卑其主今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝通監周紀田蚡曰魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而心謗不仰視天而俯畫地睥睨兩宮幸天下有變而欲有功史記灌夫傳絳灌讒陳平曰平雖美丈夫如冠玉耳其中未必有也居家盜其嫂受諸將金西漢陳平傳眾口之浸潤通監漢文紀張湯曰嚴助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市通監漢武紀孔墨之辯不能免於讒諛西漢鄒陽傳師丹使吏書奏吏私寫其草丁傳子弟聞之使人上書告丹上封事行道人遍持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄通監漢成紀讒言蠭生西漢中山王傳馬援在交趾嘗以薏苡實能輕身省慾以勝瘴氣援欲以為種軍還載之一車時人以為南土珍怪卒後有人上書譖之者以為前所還載皆明珠文犀東漢本傳邪徑敗良田讒言敗善人荀悅漢紀周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之剌惡直醜正何代無之晉書元宗曰是子妬賢嫉能舉無比者新唐書李林甫傳傳記三人成虎十人撓椎眾口所移毌翼而飛戰國策眾口鑠金俗說有美金眾人咸共詆訾言其不純賣金者欲其售因取鍜以見真偽此為眾口鑠金風俗眾口所毀浮石沈木陸賈集鴟鴞鳴衡軛豺狼當路衢蒼蠅間白黑讒巧令親踈, WYG: 清商}
