  - {type: variant, offset: 190, length: 2, content: 藺相, WYG: 武帝元狩元年獲白麟作白麟之歌本紀元鼎四年得寳鼎秋馬生渥洼水中作寳鼎天馬之歌元封二年至瓠子臨决河作瓠子之歌甘泉宫産芝九莖作芝房之歌五年南巡狩薄樅陽而出作樅陽之歌太初四年獲汗血馬作西極天馬之歌太始三年獲赤鴈作赤鴈之歌四年祠神人於交門作交門之歌並同上夏統詣洛市藥㑹三月上巳在船中曝所市藥賈充怪而問之荅曰㑹稽夏仲御也充曰卿頗能作卿土地間曲乎統曰稽山朝㑹萬國授化百姓感詠遂作幕歌又孝女曹娥國人哀其孝義為歌河女之章伍子胥諫吳王見戮投海國人痛其忠為作小海唱今欲歌之於是以足扣船引聲喉轉清激慷慨大風應至含水潄天雲雨響應叱咤讙呼雷電晝暝集氣長嘯沙塵烟起王公已下皆恐止之乃已晉書子夜歌者女子名子夜造此聲孝武太元中瑯琊王軻之家有鬼歌子夜則子夜是此時人也桓温問孟嘉曰聽妓絲不}
