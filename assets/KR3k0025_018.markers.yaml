  - {type: variant, offset: 1738, length: 0, content: '', WYG: 所廢紀勝人物戰國孫臏孫武子之後善兵法為齊大將漢汲黯性忠直為東海太守武帝稱其為社稷臣三國呉隠之博涉文史為中書侍郎有清操嘗至廣州不飲貪泉之水唐王元感擢明經髙第所撰凡數十篇魏知古稱其為五經指南杜暹五世同居事繼母孝累官西安大都䕶封魏縣侯杜鴻漸暹族子肅宗朝因禄山大亂勸上幸靈武後拜相吳湊徳宗初為福建觀察使又為京兆尹後遷兵部尚書本朝李廸少從栁開學開稱其為公輔器舉進士第一累官資政殿大學士張詠太宗時進士兩知益州威恵及民遷禮部尚書有文集十卷髙弁舉進士性孝友為文章多祖六經著帝則三篇行於世馬元方}
