  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0025_CHANT_018-1a.3}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 詞藻世𫝊平子賦園林人比鄭公鄉門前墜葉浮秋水籬外寒華待夕陽浦外野風吹入户窻中曉月早知秋滄江一望通千里畫角三聲起百憂並皇甫茂政天眷君陳久在東歸朝人看大司空黄河岸畔常無事滄海東邊獨有功已變畏途成雅俗仍過舊里揖秋風一門累葉凌烟閣次第儀刑漢上公楊累山淮月未明先倚檻海雲初起更維舟朱用晦本朝靖國元年賜軍曰興仁軍崇寧元年升為興仁府大觀二年升為都督府政和元年罷都督為府沿革表淮岑日對朱檻出江岫雲齊碧瓦浮墟落耕桑公愷悌杯觴談笑客風流一曲平蕪連古樹半分殘日帶明霞並張子野促轡數殘更似聞雞一鳴春風馬上夢沙路月中行笳鼓逺多思衣裘寒始輕稍知田父穏燈火閉柴荆王安石東平府倚郭一外縣五須城陽榖中都夀張東阿平隂郡號東平府沿革天文奎婁分野禹貢青兖二州之域秦屬碭郡又為薛郡地漢為東平國取禹貢有東原底平之義後為濟東國又改大河郡東漢仍為東平國後魏為東平郡後周置魯州隋置鄆州後改東平郡唐復鄆州天寶初復改東平郡元和中置天平軍本朝徙治國故城後復改為東平府地理沿革表縣沿革須城春秋時為須句國戰國屬宋陽榖春秋時齊地僖公與齊宋江黄㑹于陽榖即此中都古厥國春秋時為魯中都地夀張春秋時為良邑漢為夀張縣東阿春秋時齊柯邑漢置東阿縣平隂齊地春秋魯襄公㑹諸侯伐齊齊侯禦諸平隂即此同上形勝瓠山在府北上有漢東平王墓蠶尾山在府北有唐蘓原明詩記鳳山在須城北騷人墨客題詠甚多金螺山在須城東采山在中都縣東上有草木望之若五采碻磝山在東阿縣南即檀道濟唱籌量沙之所石門山在平隂西上有石門東西}
