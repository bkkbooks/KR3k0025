  - {type: variant, offset: 1986, length: 2, content: 子妻, WYG: 地併入滎陽梁潁川等郡本朝置拱州保慶軍襄邑古朱襄氏邑春秋時為陳株野地柘城漢屬淮陽國以邑有柘溝故名沿革表形勝首山在襄邑縣南黄帝甞遊首山即此仙翁山在襄邑縣西南上有葛仙翁道庵蛟龍池在襄邑縣北鄭大水龍鬬于城門外即此徐君墓在襄邑北即季札掛劒處葵丘在州治東春秋諸侯㑹盟於此紀勝人物三國梁翼事魏累遷下邳令所至有政聲皇朝常思徳累官左神武大將軍常従曹彬北征不利左右皆愧思徳獨整戎伍誓與主帥同死太宗聞}
