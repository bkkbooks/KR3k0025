  - {type: variant, offset: 1621, length: 0, content: '', WYG: 慶厯三年初置京東西路安撫使大觀九年升大都督府政和四年移安撫使于應天府宣和九年改為東平府陽榖縣景徳中徙孟店沿革表玉軸牙籖煥寶幢籍伸侍列映秋光宴開芸閣儒風盛坐對蓬}
  - {type: page-break, offset: 1621, content: '', id: KR3k0025_WYG_018-7b, image: WYG0930/WYG0930-0423d.png}
  - {type: variant, offset: 1621, length: 0, content: '', krp: 慶厯三年初置京東西路安撫使大觀九年升大都督府政和四年移安撫使于應天府宣和九年改為東平府陽榖縣景徳中徙孟店沿革表玉軸牙籖煥寶幢籍伸侍列映秋光宴開芸閣儒風盛坐對蓬}
  - {type: variant, offset: 1622, length: 4, content: 雞照綠水, WYG: 逸興長宋孝宗適興野情愜千山髙復低好風隨處改幽逕獨行迷張文潜濟州倚郭一外縣三鉅野任城金鄉鄆城郡號東魯州沿革天文奎婁分野禹貢徐兖二州之域春秋時為魯國戰國屬宋秦屬東郡漢屬山陽郡晉為高平劉宋屬濟北郡後魏置濟州隋改為濟北郡唐初復為濟州後廢五代周復置濟州本朝因之沿革表縣沿革鉅野禹貢大野既瀦即此地漢置鉅野縣任城古任國大皥之後所封地金鄉古緡國鄆城本魯地漢為夀良縣同上形勝兩城山在州南金鄉山在鉅野南上有石洞十餘丈鉅野澤在縣東南池在州境李白酒樓在州城南講文亭在金鄉縣學獲麟臺在鉅野縣東即魯哀公狩獲麟處落鳳臺在鉅野縣南朝天橋在州北女媧陵在州境内紀勝人物漢周仁以醫見景帝拜郎中令鄭均好義篤實官至尚書章帝重之東巡幸其第何休精研六經世無及之者晉魏舒對䇿登第為冀州刺史以簡恵稱後拜司徒郗鑑為車騎將軍輔少主誓赴國難以功拜司徒郗隆為尚書左丞有直諒匪躬之節百寮敬憚南北朝檀超好文學}
