  - {type: variant, offset: 1730, length: 3, content: 溺口舌, WYG: 形勝棲霞山在州東世𫝊梁孝王甞游此呂井在單父東俗𫝊呂仙公到此黄良泉在魚臺縣東北泉從石竇湧出梁山在碭山縣境内觀魚臺在魚臺縣北隠公與戎㑹盟于此雞鳴臺在魚臺東半月臺在單縣東百靈山在州北孝武治園囿于此二賢祠在單縣琴臺上祀宓子賤巫馬期湖陵城在魚臺縣東漢沛公攻湖陵即此紀勝人物周澹臺滅明行不由徑非公事未甞見邑宰漢呂公善于風鑑識漢髙於微時以女妻之即呂后也三國崔琰少樸訥好擊劒年三十就鄭𤣥學仕魏為别駕南北朝崔彧有才學官至冀州别駕崔悛有文學初為魏散騎侍郎加驃騎大將軍唐李師中舉進士厯青兖二州有政績官至團練使龎籍舉進士屢上書言事切中時弊後官至侍郎諡莊敏皇朝馬黙仕至寶文閣待制父老頌其為政愛民紀勝集陶人有逸興不與常人俱築臺像半月迴向髙城隅對酒與山雲商飈起寒梧秋山入逺海虹石曠平蕪水色緑且明令人思鏡湖終當過江去愛此暫踟蹰李白白玉仙臺古丹丘别望遥山川亂雲氣臺榭入烟霄鶴舞千年樹虹飛百尺橋還逢赤松子天路坐相邀陳伯玉香閣東山下烟花象外幽懸燈千嶂夕捲幔五湖秋畫壁餘鴻鴈紗窻宿斗牛更疑天路近夢與白雲遊春水經梁宋晴山入海沂莫愁東路逺四牡正騑騑並孫逖本朝建隆元年升為團練沿革表亭館連城敵謝家四時園色鬬明霞窻迎西渭封侯竹地接東隣隠士𤓰石延年淮海風濤真有道麒麟圖畫豈無時今朝有客𫝊河尹是處逢人說項斯陳師道漢公事業比阿衡純用詩書致太平它日何人頌功徳至今嘲笑亦諸生鮑欽止濮州倚郭一外縣三鄄城雷澤臨濮范郡號濮陽州沿革天文危室分野禹貢兖州之域古顓頊之墟曰帝丘夏為昆吾氏}
