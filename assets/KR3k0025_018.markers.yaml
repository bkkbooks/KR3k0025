  - {type: variant, offset: 1734, length: 3, content: 覆也禦, WYG: 居春秋衛成公遷都此地漢置鄄城縣屬濟隂郡東漢末於此置兖州晉徙置濮陽郡隋置濮州尋廢唐復置天寶初為濮陽郡乾元初復為濮州沿革表縣沿革鄄城古顓頊之域漢置鄄城縣雷澤亦顓頊之域在州境内本夏澤以其有雷神故名臨濮春秋邑漢屬范縣范晉大夫士㑹之邑沿革表形勝歴山在州東南舜耕之所上有舜祠黄河在州東南黒龍潭在范縣南潭有龍能興雲雨釣臺在鄄城東南即莊子釣魚處陳臺在鄄城東北魏曹子建封鄄城侯于此築臺讀書仲山甫墓在雷澤舊縣西北閔子騫墓在范縣南姚墟在州南舜生於姚墟即此顧城在范縣東南詩云韋顧既伐即此廩邱在范縣東春秋齊烏餘以廩邱奔晉即此雷澤城在州東南魯西門在范縣東北舊有石門乃魯衛之郊後為里}
