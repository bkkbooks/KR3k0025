  - {type: variant, offset: 0, length: 1, content: 因, krp: 欽定四庫全書記纂淵海卷十八宋潘自牧撰郡縣部京東西路興仁府倚郭一外縣三濟隂苑亭乗氏南華郡號濟隂府沿革天}
  body:
  - {type: variant, offset: 2, length: 2, content: 致窮, WYG: 奎婁分野禹貢屬豫州之域昔唐堯所居在周為曹國之地周武王封弟振鐸為曹國戰國屬齊漢為濟隂郡晉為濟陽郡後周改為曹州隋改為濟隂郡唐復為曹州天寶初改濟隂郡乾元初復為曹州五代晉置威信軍周改彰信軍本朝為興仁府沿革表縣沿革濟隂本漢濟隂郡之定陶地隋置濟隂縣唐徙曹州本朝置濟隂為附郭宛亭唐為寃句縣本朝改為苑亭乗氏古乗丘在唐為縣南華在唐為縣本朝𨽻河南路而宛亭乗氏南華三縣皆為黄河水渰廢形勝曹南山在濟隂縣南一百里春秋盟于曹南是也三艐亭在濟隂縣之東北景山在州東四十里廢楚丘城北衛文公徙居楚丘測日影于此髣山在州十五里乃曹國十五世葬地汜水在府西南三十里漢高帝即位汜水之陽在此菏澤在府境内禹貢導菏澤被孟瀦又濟水東至于菏大禰溝在府界内詩出宿于泲飲餞于禰披雲樓在濟隂北上有陳師道記三賢堂在濟隂北舊城内中塑范蠡魏冉魏相像髣山廟在縣東上祀曹叔振鐸翰林王禹偁有碑漆園城在濟隂西北莊周為漆園吏即此濟陽城在濟隂縣西南光武誕于此盤庚村在濟隂東南舊有盤庚祠受命壇在濟隂東南漢髙祖受命於此沙溝在南華境内上有莊周釣臺寃句城在宛亭境内莊周為吏之所阿谷水在濟隂郡東孔子至此見處子佩瑱是也輿地紀勝人物戰國范蠡既雪㑹稽之耻變姓名為陶朱公扁舟遊五湖漢魏相事宣帝為高平侯唐李勣事太宗為功臣後圖形凌烟閣王雄膂力絶人功授歙州總管賈敦頥歴任數州刺史每入朝敝車羸馬人不知其為刺史劉晏事𤣥宗時八嵗獻頌拜度支郎中累遷同中書門下平章事皇朝張齊賢太祖幸西都以布衣獻䇿上還與太宗曰幸西都惟得一張齊賢太宗朝累官吏部侍郎同平章事任仲正舉進士累官參知政事任仲師仲正弟舉進士累官樞宻副使太子太傅王博文年十六善屬文舉進士累官樞宻院事劉潜少有大志舉進士知蓬萊縣聞母死一痛遂絶其妻哭潜亦死時人稱為孝義輿地紀勝}
