  - {type: variant, offset: 2053, length: 319, content: 匈奴上問太史令司馬遷盛言陵事親孝與士信奮不頃身以徇國家之急今舉事一不幸全軀保妻子之臣隨而媒孽其短誠可痛也上以遷誣罔為陵游說下遷腐刑西漢李陵傳僕以口語遭此禍重為鄉黨戮汙辱先人同上司馬遷傳張敞椽絮舜私歸其家曰五日京兆耳安能復案事敞聞舜語收係獄死通監漢宣紀連率韓博上言有奇士長丈大十圍來臣府曰欲奮擊胡虜自謂巨無霸出於蓬萊軺車不能載三馬不能勝臥則枕鼓以鐵箸食此皇天所以輔新室也願迎之京師門戶不容者開高大之以視百蠻鎮安天下博意欲以風莽莽聞惡之留霸在所更其姓曰巨母氏謂因文母太后而霸王符也徵博下獄以非所宜言棄市西漢王莽傳言者不蒙延納之福旋被陷破之禍今皆杜口結舌以臣為戒東漢蔡邕傳董卓誅蔡邕在司徒王允坐殊不意言之而歎有動於色允勃然斥之收廷尉治罪邕遂死獄, WYG: 丘民弩耕柘城道}
