  - {type: variant, offset: 323, length: 466, content: 以耗神盛氣以忤物未老而先病無惡而得罪鮮不以文者東坡邵茂誠詩集敘詩人例窮蹇秀句出寒餓東坡詩騷人長負一秋悲詩人固長貧古來百巧出窮人詩從肺腑出出輒愁肺腑並同上好衣不近節士體粱肉似怕腹中書魯直管城子無食肉相同上經夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝伳此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是莊子人間世豐狐文豹捿於山林伏於巖穴靜也然且不免於網羅機辟之患者其皮為之災也莊子山林自冠也膏火自煎也桂可食故伐之漆可用故割之同上直木先伐甘井先竭山木篇吳王浮于江登乎狙之山有一狙焉委蛇攫抓見巧乎王王射之敏給摶捷矢王命相者趍射之狙執死王顧謂其友顏不疑曰之狙也伐其巧恃其便以敖予以至此極也戒之哉雜篇並莊子強自取柱柔自取束荀子勸學質的張而弓矢至焉林木茂而斧斤至焉同上其文好者身必剝其角美者身見殺文子鐸以聲自毀膏燭以明自爍故子路以勇死萇弘以智困淮南子繆稱訓翠飾羽而體分象美牙而身喪蚌懷珠而致剖蘭含香而遭焚金摟子翠以羽自殘龜以智自害若欲翠歛翮於剛丘之林則解羽之患永脫龜曳尾於晹谷之泥則鑽灼之悲不至劉子山狙見巧終必招害含奇佩美衒異露才者未, WYG: ''}
