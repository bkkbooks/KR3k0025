  - {type: variant, offset: 800, length: 817, content: 同上鳴鐸以聲自毀膏燭以明自消文中子史子產曰象有齒以焚其身賄也左襄二十四賈生以為漢興當改正朔易服色定官名興禮樂悉草具其事悉更秦之法諸律令所更定及列侯悉就國其說皆自賈生發之絳灌之屬盡害之天子乃以為長沙王太傳史記同上屈原博聞強志明於治亂為憲令草藁未定上官大夫欲奪之平不與因讒之王怒疏平作離騷既疏不復在位頃襄王立遷之江南史記同上吳起相楚明法審令損不急之官廢公族疏遠者以撫飬戰鬭之士要在強兵破馳說之言從橫者南平百越北并陳蔡卻三晉西伐秦楚之貴戚盡害吳起史記同上勇略震主者身危功蓋天下者不賞史淮陰傳楊脩有俊才為丞相曹操主簿嘗出行籌操有問外事乃逆為答記勑守舍兒若有令出依此通之既而果然操怪其速廉之知狀忌脩後因事殺之後漢薰以氣自燒膏以明自銷西漢兩龔傳傳記晁錯以智死東漢亙譚傳姦人多才未必不為患故酆舒以俊死而鄧析以辯亡唐書元載等贊繁華折枝膏腴壞骨文心彫龍清受塵白受垢青蠅所污常在練素論衡有高世之功者必負遺俗之累有獨知之慮者必被庶人之怨戰國策天寶中劉希夷王昌齡祖詠張若虛孟浩然常建李白杜甫雖有文名俱流落不偶恃才浮誕而然也明皇雜錄木摧於秀蘭燒以薰晉書安平王孚贊集行高於眾人必非之文選李蕭遠運命論木秀於林風必摧之堆出於岸流必湍之同上咸美羽以豐肌孔翠故無罪而皆斃徒御蘆以避繳終為戮於此世蒼鷹鷙而受緤鸚鵡慧而入籠張華鷦鷯賦蘭薰而摧玉縝則折物忌堅芳人諱明潔選祭屈原文薰膏自消鑠唐文粹麝懷香以賈害狙伐巧而招射象之有齒以焚其身魚之貪餌必曝其鱗並同上子胥既棄吳江上屈原終投湘水濱陸機雄才豈自保李斯稅駕苦不早華亭鶴唳詎可聞上蔡蒼鷹何足道李太白漆有用而割膏以明自煎杜詩有味之物蠹蝕必生有才之人讒言必至劉賓客老龜被刳腸不如無神靈白樂天多材非福祿薄命是聰明同上因知早貴多才子不得多時在世間膏明自爇緣何事並同上事脩而謗興德高而毀來韓文凡物之生不願為材犧尊青黃乃木之災韓公祭柳子厚寶玉忌出璞出璞先為塵松柏忌出山出山先為薪孟東野木直先自冠石堅亦他攻張九齡玉堅而折膏明自焚齒由剛折膏為明鑠, WYG: ''}
