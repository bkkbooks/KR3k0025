  - {type: variant, offset: 734, length: 13, content: 爛熳三年看欲棄空箱似少恩白, WYG: 鼎折足覆公餗言不勝其任也易九載績用弗成書子匠人斵而小之則王怒以為不勝其任矣孟子史堕弱不任職西漢息夫射𫝊屋大柱小可為寒心西漢李尋}
