  - {type: variant, offset: 613, length: 3, content: 哭甚哀, WYG: 田間飲食還至亭霸陵尉醉呵止廣廣騎曰故李将軍尉曰今将軍尚不得夜行何故也宿廣亭下西漢郅惲為上東城門候帝嘗出獵車駕夜還惲拒闗不開帝令從者見面於門間惲曰火明遼逺遂不受詔帝乃回從東中門入後漢書羊祜在軍嘗欲夜出軍司徐𦙍執棨當營門曰将軍都督萬里安可輕脱将軍之安危亦國之安危也𦙍今日死此門乃開耳晋書本𫝊劉行本性剛烈周武時為掌朝大夫典筆硯承御大夫取以進及行本将進承御欲取之行本抗聲謂承御曰筆不可得帝驚}
