  - {type: variant, offset: 749, length: 0, content: '', WYG: 其不勝任者怒而退之亦莫敢愠焉栁文尸素經尸厥官㒺聞知書不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有縣貆兮詩無功而受禄處其位而不履其事記子齊宣王好竽必三百人齊吹南郭先生不知竽者而濫於三百人之中以吹食禄韓子主民翫嵗而愒日左愒苦盖反翫又作玩皆貪也丞相取充位西漢張湯傳師古曰但充其位而已無所造設也曠職尸官西漢許后傳持禄保位西漢匡衡等賛拱黙尸素西漢鮑宣𫝊尸位素飱西漢朱雲𫝊􅐅􅐅亷謹偹員而已西漢曠貴最乆西漢史𫝊曠官聞曠貴陳平笑曰君居其位不知其任耶通鑑漢髙后馬𦙍孫為中書侍郎時人目為三不開謂口印門也通鑑五代漢高祖盧懷慎與姚崇同為相自以才不及崇毎事推之時人謂之伴食宰相通鑑唐𤣥宗紀源乾曜拜左丞相李紘杜暹知政事乾曜遂無叅議但唯諾署名而已𤣥宗實録𫝊記徒殫太官之膳虛索長安之米史通集空食疲廊肆選詩濫吹乖名實選雜體詩食焉而怠其事必有天殃月費俸錢嵗糜廩粟子不知耕婦不知織乘馬從徒安坐而食家請官供不報答無異䑕雀偷太倉韓集素餐無補益朱綬虛纒繞白集受若直怠若事栁文趨事赴功經一乃心力其克有勲書豈敢定居一月三㨗詩樂事勸功記子北面委質無有二心朝廷不辭賤軍旅不辭難韓子興天下之大利除天下之大害荀子史公家之利知無不為左傳自詭效功西漢京房傳擢臣巖穴誠兾有益毫毛豈徒使臣美食大官重髙明之地哉西漢鮑宣傳邉境時有風塵之警臣宜被堅執銳當矢石啓前行西漢終軍𫝊鄧禹曰但願明公威徳加於四海禹得效其尺寸垂功名於竹帛耳通鑑漢平紀范滂為清詔使登車攬轡慨然有澄清天下之志後漢}
