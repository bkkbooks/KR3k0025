  - {type: variant, offset: 170, length: 0, content: '', WYG: 間動用軍法宋書寧飲三斗醋不見崔𢎞度寧灸三年艾不見屈突盖北史魏崔𢎞度𫝊羊祉天性酷忍所經之處人號天狗唐書以深刻為奉公唐髙季倫𫝊𫝊記刻深寡恩戰國䇿秦衛鞅内刻刀鋸之刑外深斧鉞之誅歩過六尺者有罰弃灰於道者被刑一日臨渭水而論囚七百餘人渭水盡赤號哭之聲動於天地新序集傷秋茶之宻網惻夏日之嚴霜肺石少不寃之民棘林多夜哭之鬼文選抉瑕刺骨文粹本朝酷吏所至號鬼車坡詩遺愛經蔽芾甘棠勿剪勿伐召伯所茇詩史士鞅曰武子之徳在民如周人之思召公焉仲尼曰子産古之遺愛也左鄭子産死鄭人丈夫舍玦佩婦人舍珠珥夫婦巷哭三月不聞竽琴之聲説苑趙良曰五羖大夫死秦國童子不歌謡舂者不相杵史商鞅傳桓公有封鄭河洛之間人便思之史鄭世家欒布為燕相燕齊之間皆為立社號曰欒公社漢郊祀志朱邑病且死属其子曰我故為桐鄉吏其民愛我必𦵏我桐郷後世子孫奉嘗我不如桐鄉民及死其子􅌾之桐鄉民嵗時祠祭不絶西漢本𫝊何武為兖州刺史徙京兆尹所居無赫赫名去後常見思西漢劉陶駼除順陽長病免吏民思而歌之曰悒然不樂思我劉君何時復來安此下民後漢書秦彭為開陽城侯後拜潁川太守老弱攀車啼號填道東觀漢記鄧訓遷烏桓校尉卒官吏民羌胡愛惜旦夕臨者数千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不號咷或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳後漢范曄郭伋王莽時為并州牧建武中復為牧伋前在并州素結恩徳及後入界有童兒数百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送出郭外問使君何日當還种暠為度遼将軍薨并涼人咸為發哀單于每入朝賀望見墳墓輙哭泣祭祀後漢趙廣漢疑丞相夫人殺侍婢乃将吏卒入丞相府召其夫人跪庭下受辭收奴婢十餘人去帝下廣漢廷尉獄吏民守闕號泣者􅂾萬人或言臣生無益縣官願代京兆死使趙牧養小民通鑑漢宣紀雒陽令廣漢王渙凡所平斷人莫不恱服京師以為有神是嵗卒官百姓市道莫不咨嗟}
