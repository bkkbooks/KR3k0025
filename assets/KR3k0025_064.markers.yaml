  - {type: variant, offset: 602, length: 0, content: '', WYG: 武后武三思嘗以事属宋璟正色拒之曰今太后既復子明辟王當以侯就第何得上干朝政獨不見産禄之事乎通鑑唐中宗紀太平公主與僧寺争碾磑雍州司户李元紘判歸僧寺刺史竇從一大懼亟命元紘改判元紘大署判後曰南山可移此判無動從一不能奪同上宋璟為吏部尚書李義盧從愿為侍郎皆不畏强禦請謁路絶通鑑唐𤣥宗紀柳渾雖為韓滉所薦正色讓之曰老相公以褊察為相不滿嵗而罷今公又甚焉滉愧為之大霽威嚴通鑑唐徳宗紀李義府恃寵逼殺大理丞中丞王義方對仗叱義府令下三叱義府趨出裴諝為金吾時禁屠郭子儀𨽻人殺羊諝列奏状上以為不畏强禦唐書𫝊記趙琰為青州刺史㕔置小甕得貴要之書投於其中華陽國志集四達埋輪震相威於權右駱賔王䑓閣以之生風豪貴由之歛手陳子昻集摧宿豪如薙草視大權如歴塊唐王維}
  - {type: page-break, offset: 602, content: '', id: KR3k0025_WYG_064-29b, image: WYG0932/WYG0932-0054d.png}
