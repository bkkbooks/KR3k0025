  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0025_CHANT_064-1a.3}
  - {type: variant, offset: 3, length: 2, content: 楚昭, WYG: 與太師賈佗使行諸晋國以為常法左伯禽受封之魯三年而報政太公封于齊五月而報政史魯世家子産治鄭民不能欺子賤治单父民不忍欺西門豹治鄴民不敢欺三子之才能誰㝡賢哉索隐曰子産治鄭仁而且明故人不能欺之子賤為政清净彈琴三年不下堂而化故人不忍欺之西門豹以威化御俗故不敢欺之史記滑稽西門豹傳周公曰夫政不簡不易民不有近平易近民民必歸之史魯世家莫不引領而觀其政史秦紀子産相國一年竪子不戲狎班白不提挈僮子不犂畔二年市不豫賈三年道不拾遺四年田器不歸五年士無尺籍䘮期不令而治史循吏傳河南守呉公治平為天下第一史賈生傳趙廣漢為京兆尹召亭長西至界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之其發奸擿伏如神皆此類也黄霸為潁川太守嘗遣亷吏察民事戒吏周宻勿泄吏出不敢舍郵亭食於道傍烏攫其肉後吏還霸見迎勞之曰甚苦食於道傍乃為烏所盜肉吏大驚以霸具知其起居所問毫釐不敢隐韓延夀守左馮翊民有昆弟訟田延夀閉閣思過於是訟者親族相責此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢争後民莫敢以辭訟自言者馮野}
