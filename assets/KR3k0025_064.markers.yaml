  - {type: variant, offset: 170, length: 0, content: '', krp: 間動用軍法宋書寧飲三斗醋不見崔𢎞度寧灸三年艾不見屈突盖北史魏崔𢎞度𫝊羊祉天性酷忍所經之處人號天狗唐書以深刻為奉公唐髙季倫𫝊𫝊記刻深寡恩戰國䇿秦衛鞅内刻刀鋸之刑外深斧鉞之誅歩過六尺者有罰弃灰於道者被刑一日臨渭水而論囚七百餘人渭水盡赤號哭之聲動於天地新序集傷秋茶之宻網惻夏日之嚴霜肺石少不寃之民棘林多夜哭之鬼文選抉瑕刺骨文粹本朝酷吏所至號鬼車坡詩遺愛經蔽芾甘棠勿剪勿伐召伯所茇詩史士鞅曰武子之徳在民如周人之思召公焉仲尼曰子産古之遺愛也左鄭子産死鄭人丈夫舍玦佩婦人舍珠珥夫婦巷哭三月不聞竽琴之聲説苑趙良曰五羖大夫死秦國童子不歌謡舂者不相杵史商鞅傳桓公有封鄭河洛之間人便思之史鄭世家欒布為燕相燕齊之間皆為立社號曰欒公社漢郊祀志朱邑病且死属其子曰我故為桐鄉吏其民愛我必𦵏我桐郷後世子孫奉嘗我不如桐鄉民及死其子􅌾之桐鄉民嵗時祠祭不絶西漢本𫝊何武為兖州刺史徙京兆尹所居無赫赫名去後常見思西漢劉陶駼除順陽長病免吏民思而歌之曰悒然不樂思我劉君何時復來安此下民後漢書秦彭為開陽城侯後拜潁川太守老弱攀車啼號填道東觀漢記鄧訓遷烏桓校尉卒官吏民羌胡愛惜旦夕臨者数千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不號咷或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳後漢范曄郭伋王莽時為并州牧建武中復為牧伋前在并州素結恩徳及後入界有童兒数百各騎竹馬於道次迎拜伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送出郭外問使君何日當還种暠為度遼将軍薨并涼人咸為發哀單于每入朝賀望見墳墓輙哭泣祭祀後漢趙廣漢疑丞相夫人殺侍婢乃将吏卒入丞相府召其夫人跪庭下受辭收奴婢十餘人去帝下廣漢廷尉獄吏民守闕號泣者𢾗萬人或言臣生無益縣官願代京兆死使趙牧養小民通鑑漢宣紀雒陽令廣漢王渙凡所平斷人莫不恱服京師以為有神是嵗卒官百姓市道莫不咨嗟}
  - {type: variant, offset: 172, length: 1, content: 責, WYG: 䘮西歸道經𢎞農民庶皆設槃按於道路吏問其故咸言平常持米到洛陽為吏卒所鈔常亡其半自王君在事不見侵枉故來報恩雒陽民為立祠作詩每祭輙絃歌而薦之通鑑漢和紀蜀人所在求為諸葛亮立廟漢王不聽百姓遂因時私祭之於道陌上通鑑魏明紀狄仁傑為魏州刺史有惠政百姓為之立生祠後其子景暉為魏州司功參軍貪暴為患人遂毁其像焉通鑑唐中宗劉審交卒吏民詣闕上書以審交有仁政乞留𦵏汝州得奉事其丘壟詔許之州人相與就哭而𦵏之為立祠嵗時享之通鑑後漢隐諸葛瞻亮之子亮卒蜀人思亮之徳咸愛瞻才敏有善政佳事雖非瞻所建皆相告曰葛侯所為也是以美譽過實蜀志羊祜為荆州刺史祜薨立碑峴山百姓見其碑莫不堕淚號為堕淚碑祖逖病卒豫州士女若䘮考妣淮梁百姓為之立祠羊祜卒南州人為之罷市巷哭者聲相接王駿都督凉州後薨民吏樹碑讃述徳美長老見碑無不拜之言其遺愛如此晋書羊祜卒參佐劉繪牋杜預曰昔召伯所憇愛留甘棠宣子所㳺封殖其樹夫思其人尚及其樹况生存所辟之士便當隨例放棄者乎晋書本𫝊賈敦頥為洛州刺史有惠政百姓植碑頌美及敦美為洛州長史又立頌於兄碑之側號棠棣碑韓愈貶陽山令有愛在民民生子多以姓字之唐書本𫝊𫝊記姚元崇牧荆州三年受代日闔境民吏泣擁馬首遮道不使去所乘之馬鞭鐙民間截留之天寳遺事集桐郷建遺烈選詩攀車卧轍之戀争塗忘逺去思一借之情愈乆彌結齊故安陸碑永思清風歎息仁光陳子昻集勿剪棠猶在劉义文集嘗為縣縣懷其化至於州州濡其澤凡我子孫莫不戴慕栁文蒞止五載飲和革心束馬來朝熊羆隕涕問公還期觸必祝之汴人聞公之東近而愈懷翹翹瞿瞿盡西其首劉賔客但愁徴拜日無那借留何劉長卿况兹樂土嘗扇仁風式訪顛毛兼詢憇樹吏盡攀轅之士民皆遮道之人緜以嵗時深在肌骨李義山文夢寐仁風花樹前元稹集戎夷野祠甿庶巷祭尚馳作諸葛武侯碑稚老歌思如丹尚存杜牧之韋丹碑本朝韓魏公所歴諸大鎮皆有遺愛人人畫像事之獨魏人於生祠為塑像嵗時瞻奠比狄梁公三朝言行録温公薨京師之民罷市而往弔鬻衣以致奠巷哭以過車者盖以千萬􅂾神道碑斂怨經怨有同是叢于厥身召敵讎不怠書歛怨以為徳詩子怨者禍之首也祸之所生必由積怨積怨之成在於慮外防怨不宻而禍害臻焉劉子史華而不實怨之所聚也怨之所聚亂之本也多怨而階亂何以在位左晁錯父謂錯曰口語多怨公何為也通鑑漢文紀𫝊記蓄怨積讎比於丘山新序集閑園不解栽桃李滿地惟聞種蒺藜白侍郎禍胎怨府起自于商李商隐掊斂經剥牀以膚㐫易碩䑕刺重斂也蠶食於民貪而畏人若大䑕也擇三有事亶侯多藏箋云昏聚斂之臣小東大東杼柚其空詩孟獻}
