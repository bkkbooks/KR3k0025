  - {type: variant, offset: 167, length: 1, content: 護, WYG: 之歴二千石也敦肅風教勞來孤惸决其藴積洒其煩苛祥風甘露家濡户洽李吉甫杜祐碑本朝寧書下下考不奉急急符陳後山看君擁黄紬高卧放早衙坡詩注云文潞公為榆次縣令嘗題詩縣樓鼔云謾向樵樓一任撾撾多撾少不知它如今幸有黄紬盖弩出頭來放早衙酷虐經夫子曰苛政猛於虎記子無惻隠之心非仁也孟子史王温舒為河内守捕郡中豪猾相連坐千餘家大者族小者死流血十餘里㑹春温舒頓足嘆曰令冬月益展一月足吾事矣其好殺伐行威不愛人如此史本𫝊尹齊斬伐不避貴戚政聲甚於寗成史本𫝊姦猾窮治大抵盡糜爛獄中行論無出者史酷吏楊僕𫝊法令滋章盗賊多有諸侯二千石盡放温舒吏民益輕犯法盜賊滋起史記郅都嚴酷貴戚號曰蒼鷹為濟南守族滅瞯氏杜周為廷尉詔獄多二千石繫者新故相因不减百餘人史本傳韓非喜刑名極慘礉少恩史記張湯見知之法生窮治之獄用史平準書自郅都杜周十人者皆以酷烈為聲王温舒為人居廷惛惛不辯至於中尉則心開史法煩於秋茶網宻於凝脂西漢刑法志舞文巧詆以輔法前漢張湯傳杜周内深刺骨前漢本𫝊駟鈞惡戾虎而冠者也西漢高五王傳獄卒専為深刻殘賊而亡極媮為一切不頋國患此世之大賊也西漢路温舒𫝊嚴延年在河南號曰屠伯西漢本𫝊寗成為闗都尉出入闗者曰寧見乳虎無值寗成之怒義縱𫝊摇手觸禁前漢食貨志以鷹擊毛摯為治為河南都尉族滅其豪穰氏義縱𫝊尹賞為長安令獄穿地方深各數丈以瓴甓為郭大石覆之名虎穴西漢網宻事叢西漢酷吏傳析律貳端深淺不平西漢宣帝紀師古曰分破律條妄生端緒以出入人罪持法文深西漢趙禹𫝊注文致不可得反西漢嚴延年𫝊旁請他比日以滋益西漢刑法志𫝊師古曰常丈之外主者有所請以定罪也謂引它類以此附之吏民觸法抵禁西漢匡衡𫝊多繫無辜掠立迫恐谷永𫝊諸犯令相引数千人名曰株連刺􅅡身無全者西漢張耳傳榜音彭箠㿊於炮烙谷永𫝊寗成為人上操下急如束濕西漢本𫝊骨肉親属莫不股栗杜周𫝊樊曄為政嚴猛人有犯其禁者率不生出獄凉州歌曰寧見乳虎穴不入兾府寺嗟我樊府君安可再遭值後漢鍛鍊之吏持心近薄東漢韋彪𫝊斷獄者急於榜格酷烈之痛執憲者煩於詆欺行濫之文或因公行私逞恣威福通鑑漢章帝迹渉嫌疑辭相引逮莫不窮捕考案至有姦人熒惑乘險相誣糾告疑似睚䀝之嫌即稱有宻一人被訟百人滿獄使殺人如麻流血成淵通鑑唐武后王𢎞義遷殿中侍御史或告勝州都督王安仁謀反敕𢎞義按之安仁不服𢎞義即於枷上刎其首又捕其適子至亦刎其首函之以歸道過汾州司馬毛公與之對食湏臾叱毛公下階斬之槍掲其首入洛見者無不震慄時制置獄於麗景門内入是獄者非死不出周興與索元禮來俊臣競為暴刻興元禮所殺各數千人俊臣所破千餘家元禮殘酷尤甚索元禮等競為訊囚酷法作大枷有定百脉突地吼死豬愁求破家反是實等名號或以椽闗手足而轉之謂之鳯凰曬趐或以物絆其腰引枷向前謂之驢駒校橛或使跪捧枷累甓其上謂之仙人獻菓或使立髙木之上引枷尾向後謂之玉女登梯或倒縣石縋其首或以醋灌鼻或以鐡圏轂其首而加楔至腦裂髄出者每得囚輙先陳其械具以示之皆戰慄流汗望風自誣通鑑唐武后太白晝見民有仰視之者為邏卒所執史𢎞肇腰斬之通鑑漢隐帝燕榮為幽州總管按部道次見藂荆堪為笞捶命取之輙以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過将撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾况有過乎榜捶如舊隋書索元禮來俊臣之徒澤吻磨牙噬紳纓若狗彘泥耳籠首枷楔兼暴拉脇截𤓰懸髮熏目號曰獄持晝禁食夜禁寐敲撲撼摇使不得寐號曰宿囚制獄作鐡籠聲囚首加以楔至腦裂死又横木闗手足轉之號矖趐或縳囚梁上縋石於頭來俊臣前後夷千餘族生平有纎介皆入於死按事百不一貸鞠囚不問輕重皆注醯于鼻掘地為牢或寝以匽溺或絶其糧大抵非死終不得出周興曰囚不服納之大甕熾炭周之何事不承唐本傳王𢎞義曰我文檄如狼毒野葛始賤時求傍舍瓜不與乃騰言園有白兎縣為集衆捕逐畦瓜無遺内史李昭徳曰昔}
