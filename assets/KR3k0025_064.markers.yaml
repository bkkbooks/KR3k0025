  - {type: variant, offset: 1818, length: 210, content: 戎女適裴氏貸錢女歸戎色不說女還錢乃懌世說互見鄙吝既彰尋斧之醜豈慚尺布之謠孔白六帖魏文帝令東阿王作詩七步不成當行法即應聲為詩曰煮豆然豆萁列豆取其汁萁在豆下然豆在釜中泣本自同根生相煎何太急帝深有慚色世說集自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德劉孝標廣絕交論視若游塵遇同土梗莫肯費其半菽罕有落其一毛同上同胞之徒無所容居選荅客難昔我同門友高學振六翮不念攜手好棄我如遺跡選古詩綈袍匪舊白首如新駱賓王忘情於骨肉是殆於恩, WYG: 皃}
