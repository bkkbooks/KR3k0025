  - {type: variant, offset: 135, length: 0, content: '', krp: 百姓歌曰前兄後弟布政優優傅琰父僧祐為山隂令有能名琰為武康令並著能名二縣皆謂之𫝊聖時云諸𫝊有理縣譜孔顗為長史性使酒毎醉輒彌日不醒然明曉政事醒時判決未嘗有壅衆咸云孔父一月二十九日醉勝世人一月二十九日醒也傅琰仕齊為山隂令時有二野父争雞琰各問何以食一云粟一云豆乃破雞得粟罪言豆者南史宋世良為清河太守善政術獄内穭生桃木蓬蒿亦滿毎日衙門虛寂無復訴訟者謂之神門代者至有老人泣而前曰老人年九十經三十五政府君非惟善政清亦徹底今失賢者人何以濟莫不攀轅泣涕劉曠為平鄉令在職七年風教大洽囹圄草生庭可張羅髙謙之為河隂令有人嚢盛瓦礫指作錢物詐市人馬因而逃去詔令追捕謙之乃偽枷一囚立於馬市宣言是前詐市馬賊宻遣使心腹察市中私議者有二人相見忻然曰無復憂矣執送按問悉獲其黨北史宿姦老蠧為斂跡唐書劉栖楚傳崔咸遷陜虢觀察日與賔客僚属痛飲未嘗醒夜分輙決事裁剖精明無一毫差吏稱為神張允濟為武陽令元武民以牸牛依婦家者乆之孳十餘犢将歸而婦家不與牛允濟因令左右縳民朦其首過婦家云捕盜牛者命盡出民家牛質所來婦家不知遽曰此壻家牛我無預即遣左右撤朦曰可以此牛還壻家柳仲郢為京兆尹政號嚴明後出為河南尹以寛惠為政或言不類答曰輦轂之下先彈壓郡邑之治本惠養崔郾為唐州刺史治以寛經月不笞一人及涖鄂州嚴法峻誅不貸子産賢者也為政尚累年而後成裴琰之為桐州司户吏白積案數百乃命連紙進筆為裁决一日畢既予奪當理而筆詞勁妙名動一州號霹靂手唐書𫝊記宓子賤治單父彈琴身不下堂而單父治巫馬期戴星而出戴星而入以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任力者勞任人者逸韓詩外傳黄穆為山陽守有徳政弟奐為武陵守貪穢無行諺曰天有冬夏人有二黄㐮陽耆舊𫝊李果為洛陽令公正吏民畏之有劉兼者夜宿村邸聞户外曰古今正人李令見其行事令人破膽我輩可于他縣血食開户視之無人乃鬼神也漢武故事有一人持一疋絹到市賣遇雨而披覆後一人求庇廕授一人雨霽當別因争是我縑大守薛宣呼騎吏斷各與半使追聽之後人曰君恩縑主稱寃不已宣因拷問後人伏罪風俗通集老安少懐途歌里詠選碑垂愛景而字人穆薫風而扇物仁風飄十地之雄惠露洒二天之渥駱賔王剸繁决劇以通敏彈豪糾黠以沈斷富庶而教至於無事百姓扶老提穉載路而歌曰昔吏􅑲􅑲今吏詹詹公能馭之鈍亦為銛跖亦為亷始紲以善終優以恬昔民嗷嗷今民咍咍公能撫之鰥寡有怡流亡既來徭稅先具汚茨盡間嚮覆官倉倉無斗糧公來幾時積粟埋粱嚮閲官庫庫無尺繒公來幾時山積層層瑞露溶溶降味公松瑞蓮漪漪合蔕公池有公異政神之祚之民歌路謡兾聞京師皇甫湜政化平如水頃來樹佳政皆已𫝊衆口政用疎通合典則杜詩賀公温恭克脩儼實有立季野偹四時之氣士元非百里之才撥煩彌閒剖劇無滯鏑百發克破於楊葉刀一鼔必合於桑林寛猛相濟弦韋適中一之嵗肅而教之二之嵗惠而安之三之嵗富而樂之然後青衿向訓黄髪履禮耒耜就役農無㳺手之夫杼軸和鳴機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者遜於道路任者併於輕重扶老携幼尊尊親親千載百年再復魯道非神明愽逹孰能與於此乎清風動百里惠化聞京師百里雞犬静千廬機杼鳴地逐名賢好風隨惠化春李白吏無夤緣以巧法人無怨讟以苦役宣風一方覃化一州徳風流海外和氣滿人寰宿蠧藏姦吐欵首服柳文春生秋殺陽開隂閉令脩於庭户数月之間而人自得於湖山千里之外老奸宿賊消縮摧沮魂亡魄䘮影㓕跡絶威行如秋仁行如春斂此大惠施于一州持官持身内外斬斬由是朝廷滋欲試之於民使令家聽户視奸宄無宿府中不聞急歩疾呼稅節賦詩櫛垢爬痒民獲蘇醒地方數千里不識盜賊山行海宿不擇處所韓文赤車所至如春風變枯責實繩下風稜言言黠吏歛手齊民揚眉執直筆閲簿書紛挐盤錯一瞬而剖劉賔客集育物如春化人如神唐裴度撰諸葛亮碑歌謡千里春長暖剔刮根節銷磨頑礦日教月化水順雪釋手携暴虎貪狼化為耕牛乘馬渤海潁川之治邵父杜母之恩千里封疆百口歌詠壷漿迎路襁負攀車政聲長與江聲在自到津樓日夜聞印組榮光馬鋒鋩看解牛井閭安樂易冠盖惬依投政簡稀盈閣功成每運籌杜牧之集廓千里之沴氣白樂天序膏雨吾土𥜗袴吾人亷平清一之政繼聞于京師吏畏如夏日人歸如流水縣逰分行百里春膏雨景星所至䝉福白樂天集人一知教欣欣熈熈然如登春䑓矣提封之内無榛灌繩墨之下無奸傲若非袴襦之惠及其幼稚雞豚之養及其耆艾推赤心置人腹中者安能化暴戾之俗西人泣送東人歌迎梁楚千里風交化行文粹臨機决滯有如影響李深之文雨苗均惠風草馳聲李義山文股肱還入郡父母更臨州扇逐仁風轉車隨零雨流張説文號令所加風清月明孫可之惠化境外春元㣲之集百城萬井如衆草之得陽春不知其所以然也劉長卿賴有政聲逺時聞行路𫝊宿訟不決之務餘地剖分疑獄自誣之枉光容立照王維集都緣民訟少長覺吏徒閑唯憑野老口不立政聲碑杜荀鶴集績最天下唐賈餗𫝊邑長不聞夜犬之吠君長一城亦盡刋刻之美惠露沾吳仁風扇越威令首途仁風載路詠徳之聲盈耳選碑本朝富弼移青州㑹河朔大水民流京東擇所部三州豐稔者勸民出粟得十五萬斛益以官廩隨所在貯之得公私廬舍千餘間散處其人以便薪水官吏自前資待闕寄居者皆給其禄使民所聚選老弱而病瘠者廩之即山林河泊之利有可取之以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝五日遺人以酒肉與糗飯勞之出於至誠人人為盡力流民死者為大冢𦵏之謂之叢冢自為文祭之明年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募而為兵者又萬餘人富公神道碑趙清獻為武安推官有偽造印者吏皆以為當死公獨曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死一府皆服吳越大饑趙清獻公知越州盡所以救荒之術發廩勸分而以家資先之民樂從焉生者得食病者得藥死者得藏下令修城使民食其力故越人雖饑而不怨東坡撰神道碑為政曽幾何清風自無垠欒城集誰與長官歌美政風摇松竹是歡聲山谷循良經子産猶衆人母也家語子展禽之家有柳樹身行惠徳號曰柳下惠淮南子史奉法循理之吏不伐功矜能百姓無稱亦無過行史循吏𫝊序鄭桓公友封于鄭百姓皆便愛之史鄭世家王成黄覇朱邑龔遂鄭𢎞召信臣等所居民富所去見思生有榮號死有奉祀廩廩庶幾徳遜君子之遺風矣西漢循吏𫝊安静之吏悃愊無華日計不足月計有餘後漢章}
