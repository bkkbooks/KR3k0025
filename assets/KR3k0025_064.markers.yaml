markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 念, WYG: 欽定四庫全書記纂淵海卷六十四宋潘自牧撰政事部總論政事經子張問從政子曰尊五美屏四惡斯可以從政矣政事冉有季路子曰因民之所利而利之斯不亦惠而不費乎語子衆人熈熈如享太牢如登春䑓老子孟子曰君子平其政行辟人可也焉得人人而濟之孟子與物為春荘子哀公問政子曰政之急也莫大乎使民富且夀也省力役薄賦歛則民富矣敦禮教逺罪戾則民夀矣公曰欲行夫子之言恐吾國貧子曰愷悌君子民之父母未有子富而父母貧也者子路治蒲三年孔子入境三稱其善曰入其境田疇盡易草萊甚辟溝洫甚治此其恭敬以信故其民盡力也入其邑墻瓦完固樹木甚茂此其忠信以寛故其民不偷也至於庭甚清閒諸下用命此其言明察以斷故其政不擾也孔子家語或曰為政先殺後教曰天先秋而後春乎謂之惡政揚子史士㑹将中軍晋國之盜逃奔于秦子太叔為政不忍猛而寛鄭國多盜子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣晋趙宣子為國政制事典正法罪辟刑獄董逋逃治}
