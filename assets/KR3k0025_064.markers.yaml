  - {type: variant, offset: 142, length: 4, content: 呂公無子, WYG: 有過但用蒲鞭責之示辱而已東漢本𫝊韓韶與同郡荀淑鍾皓陳寔皆嘗為縣長所至以徳政稱時人謂之潁川四長通鑑漢質紀鄧攸有惠政罷郡日人入水攀其船不忍別晋書崔伯謙除濟北太守改鞭用熟皮為之不忍見血示恥而已北史本𫝊陽城左遷道州刺史治民如治家自署其考曰撫字心勞徴科政拙考下下觀察使遣判官督其賦至州城先自囚於獄判官大驚馳入謁城於獄曰使君何罪某奉命來問安否耳留一二日未去城不復}
