  - {type: variant, offset: 750, length: 9, content: 朝寇萊公寢處一青幃, WYG: 𫝊王莽敗赤眉賊衆至鄧禹引退師衆憚為後拒禹乃書諸将名於竹簡題其前後亂着器中令各探之張宗獨不肯探曰死生有命張宗豈辭難就易乎後漢祖逖劉琨並有英氣毎語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原本𫝊陶侃見諸参佐或以談戲廢事乃取其摴蒱愽具以投于江晋本𫝊陶侃荆州刺史終日斂膝危坐軍府衆事檢攝無遺未嘗少間嘗語人曰大禹聖人乃惜寸隂至于衆人當惜分隂豈可但逸㳺荒醉生無益於時死無聞於後是自弃也通鑑晋武帝紀隋大将軍麥鐡杖謂人曰丈夫性命自有所在豈能然艾灸頞𤓰蔕歕鼻治黄不差而卧死兒女手中乎乃自請為前鋒骨肉皆天子所賜得效筋力豈敢有辭通鑑隋煬帝紀韓滉曰今兩河無虞河湟}
