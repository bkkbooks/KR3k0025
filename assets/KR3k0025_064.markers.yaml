  - {type: variant, offset: 732, length: 1, content: 曾, WYG: 大厦如傾要梁棟戮力效鷹鸇杜詩本朝視其卼臲者而安植之求其蒙茸者而䟽理之坡集任怨史子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之㤗侈者因而斃之子産為政豐卷将祭請田焉弗許曰唯君用鮮衆給而已鄭子産作丘賦國人謗之子罕以告子産曰茍利社稷死生以之民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣左上曰近廣京城於存殁擾動誠多怨謗之語朕自當之它日終為人利通鑑五代周世宗本朝王曽為相常曰君恩若已出怨當誰歸魏公別録杜衍字世昌慶歴四年拜相力止内降之敕時有權要干請者上曰朕内降不難然宰相衍公正介執必不出敕或有不得已而降㫖衍皆收之俟及十数即封還之上嘗曰衍助我多矣名臣傳歐陽脩尹京兆寵貴犯禁令必寘於法雖詔命有所不從言行録不勝任}
