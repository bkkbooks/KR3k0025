  - {type: variant, offset: 177, length: 0, content: '', WYG: 而求也為之聚斂而附益之語子我能為君辟土地充府庫今之所謂良臣古之所謂民賊也孟子聚斂者召冦肥敵亡國危身之道也荀子史斬刈民力輸掠其聚左頭㑹箕斂史陳餘𫝊陸驗徐驎為大市令並}
