  - {type: variant, offset: 2880, length: 144, content: 王戎家有好李賣之恐人得種常鑽其核通鑑晉紀和嶠富擬王者而至吝人謂之有錢癖晉書本傳王戎性貪吝園田徧天下每自執牙籌晝夜會計常若不足通鑑晉惠帝紀為人父母而吝其醯醢富有群生搉其一物通鑑梁高祖紀韋莊性慳數米而炊秤薪而爨唐書吏部侍郎張允家貲以萬計而性吝雖妻亦不之委常自繫眾鑰於衣下行如環珮通鑑周太祖紀傳, WYG: ''}
