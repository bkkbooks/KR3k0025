  - {type: variant, offset: 134, length: 0, content: '', WYG: 獻紀杜畿在河東十六年常為天下㝡通鑑漢獻紀張建封為政寛厚而有綱紀不貸人以法故其下無不畏而恱之通鑑唐徳宗紀侯霸為淮平大尹政理有能名更始遣使徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留朞年後漢賈琮為兾州刺史舊典𫝊車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聼糾察其美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風竦震其餘贓過者望風解印綬去後漢范邵為浚儀令有二人挾絹於市互争令斷之各分一半令去後遣人宻察之有一喜一愠之色於是擒之伏罪後魏書枹鼔不鳴東漢董宣傳卓茂為宻令隣縣及府官以為不治河南太守為置守令茂治自若數年教化大行路不拾遺袁宏漢紀延䔍為京兆尹政用寛仁先是邉鳯為尹亦有能名郡人為之語曰前有張趙後有三王趙廣漢張敞王尊王章王駿王衍為元城令終日清談而縣務亦理曹攄為臨淄令獄有死囚嵗夕攄愍之曰卿等不幸致死新嵗人情所重豈不欲暫見家耶衆囚泣曰若得暫歸死無恨也攄悉開獄出之吏固争攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣嘆服晋書夏侯䕫為豫州刺史兄亶先經此任並有恩}
