  - {type: variant, offset: 605, length: 0, content: '', WYG: 抑强扶弱史王尊為京兆尹拊循貧弱鉏耘豪强漢本傳嚴延年為河南守其治務在摧强扶弱貧弱雖陷法曲文以出之其豪傑侵小民者以文内之前漢張湯為廷尉所治即豪强舞文巧詆即下户羸弱時口言雖文致法上裁察前漢本𫝊師古曰下户湯欲佐助雖具文奏之而又口奏之得湯言往往釋其人集貴者雖自貴視之若埃塵賤者雖自賤重之若千鈞左太冲詠史詩任責經彼君子兮不素餐兮或盡瘁事國或王事鞅掌職思其憂詩各司其局四郊多壘此卿大夫之辱也君子曰謀人之軍師敗則死之謀人之邑邦危則亡之}
