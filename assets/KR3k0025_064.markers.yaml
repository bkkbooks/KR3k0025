  - {type: variant, offset: 621, length: 5, content: 向刈蓍薪亡, WYG: 臣聞鹿走山林而命懸庖厨勢使之然也陛下以臣為法官臣不敢枉陛下法必死是官矣太后固授之逺近聞者相賀太后出梨花一枝以示宰相皆以為瑞杜景儉獨曰今草木黄落而此更發榮隂陽不時咎在臣等通鑑唐武后給事中李藩在門下制敕有不可即於黄紙後批之吏請更連素紙藩曰如此乃状也何云批敕通鑑唐憲宗紀武三思求為太子狄仁傑毎從容言於太后太后曰此朕家事卿勿預知仁傑曰何者不為陛下家事臣備位宰相豈得不預知乎通鑑柳公綽為京兆尹公綽初赴府有神䇿小将躍馬横衝前導公綽駐馬杖殺之明日入對延英上色甚怒詰其専殺之状對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於街衢金}
