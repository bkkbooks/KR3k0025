  - {type: variant, offset: 31, length: 0, content: '', krp: 馮君小馮君兄弟繼踵相因循聪明賢知惠吏民政如魯衛徳化均周公康叔猶二君張敞守京兆尹市偷盜多敞乃召偷盜酋長數人見之責問因貰其罪令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願權補吏職敞皆以為吏遣歸休置酒小偷悉來賀各飲醉偷長以赭汙其衣裾赭赤色也吏坐里閭閲出者汙赭輙收縳之一日捕得數百人盡行置法由是市無偷盜前漢書黄霸為潁川太守力行教化而後誅罰外寛内明得吏民心治為天下第一前漢本傳吏民稱之不容口西漢趙廣漢傳善政和氣立致猶桴鼓之相應也西漢李尋傳薛宣所在而治為世吏師}
