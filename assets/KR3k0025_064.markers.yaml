  - {type: variant, offset: 816, length: 680, content: 無失其為親也故者無失其為故也檀弓下君子篤於親論語史惠顧先君之好照臨敝邑鎮撫其社稷左昭二十一杜甫依嚴武於劍南武以世舊待甫甚善唐書杜甫傳李晟篤於義隆于故舊唐書劉仁軌雖貴顯不自矜踞接故舊如布衣時唐書岑文本生平故人雖羈賤必鈞禮並唐書傳記許允之為吏部多用鄉黨里人記室新書集綢繆之旨有同骨肉文選盧子諒書本朝尹洙與狄青同經略招討事洙以貶死厚恤其家余襄公撰墓誌韓魏公少善尹師魯師魯以貶死其子朴方襁褓既長公聞於朝命以官薦為屬教育之如子弟聞見錄歐公平生篤於朋友如尹師魯梅聖俞孫明復既卒其家貧公力經營之使皆得以自給又表其子于朝悉錄以官墓誌吳奎初與鄉人王彭年善彭年客死于京師奎使長子主喪事周恤其家嫁二女焉吳奎墓誌經于父不能字厥子乃疾厥子書康詰于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟同上互見自相矛盾亦有兄弟不可以據薄言往愬逢彼之怒詩柏舟乃如之人兮誓不相好乃如之人兮德音無良日月不我能慉反以我為讎谷鼠兄弟不知咥其笑矣氓角弓父兄刺幽王也不親九族骨肉相怨小雅不能宴樂同姓親睦九族頍弁宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安論語陽貨子魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾當無子之時不憂今子死乃與向無子同又奚憂焉列子互見曠達於所厚者薄無所不薄也孟盡心下為人父而搉其子縱利如子何揚寡見互見互相矛盾秦人父子兄弟無父兄之恩箕踞反目有若禽獸賈誼史居喪而不哀在慼而有嘉容左襄三十晉叔向曰魯公室其卑乎左昭十一一斗粟尚可舂一尺布尚可縫兄弟二人不相容西漢淮南王長傳薄骨肉之恩, WYG: ''}
