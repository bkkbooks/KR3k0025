  - {type: variant, offset: 608, length: 0, content: '', WYG: 為魯司冦攝行相事七日而誅亂政大夫少正卯于兩觀之下家語今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死歟抱闗擊柝者皆有常職孔子嘗為委吏矣曰㑹計當而已矣甞為乗田矣曰牛羊茁壮長而已矣孟子史欒書曰不可以當吾世而失諸侯季子曰食焉不避其難左觕舉僚職西漢叙傳觕與粗同李廣當斬贖為庶人與故潁隂侯屏居藍田南山射獵嘗夜從一騎}
