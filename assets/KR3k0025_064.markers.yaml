  - {type: variant, offset: 211, length: 1, content: 帝, WYG: 奮髯走猾吏嚼齒對姦将坡詩不畏强禦經維仲山甫不畏强禦詩史當官而行何强之有左申屠嘉為丞相太中大夫鄧通方􅂭幸愛側倨上旁有怠慢之禮嘉為檄召通詣府不來且斬通通詣府嘉責通曰吏今行斬通通頓首首盡出血不解史申屠嘉𫝊石奢堅直兼正無所阿避史記本𫝊刻轢宗室侵辱功臣史酷吏傳趙奢為田部吏收租稅平原君不肯出奢以法治之殺平原君用事者九人史趙奢𫝊搏擊豪强西漢翟方進𫝊専厲强壮蠭氣見事風生無所迴避西漢趙廣漢𫝊刺譏不惮将相誅惡不避豪强鋤耘豪强西漢王尊傳郅都為濟南守先誅瞷氏三百家豪猾餘皆股栗前漢本傳鮑永為司𨽻校尉鮑恢為都官從事抗直不避强禦李膺為司𨽻校尉時張讓弟朔貪殘無道懼罪逃匿兄讓舍藏於合柱中膺知其状率将吏卒破柱取朔付洛陽獄殺之董宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家主出行而以奴驂乘宣叱奴下車殺之東漢本傳張綱奏大將軍梁兾曰以蒭蕘之資居阿衡之任不能敷揚五教翼賛日月而専為封豕長蛇肆其貪饕上天不赦大辟宜加書奏京師震恐元日朝賀梁兾威儀不整侍御史陳翶請收罪後漢司𨽻王尊劾奏丞相衡御史大夫譚知石顯等顓擅權勢大作威福為海内患害不以時白奏行罰而阿䛕曲從附下㒺上懷邪迷國蕭咸私}
