  - {type: variant, offset: 2266, length: 606, content: 急為務西漢本傳初百姓飢荒張儉資計差溫乃傾竭財產與邑里共之賴其存者以百數後漢本傳馬援少年處田牧至有牛馬羊數千頭穀萬斛既而歎曰凡植財產貴其能施賑也否則守錢虜耳乃盡散以頒昆弟故舊東漢馬援傳魯肅大散貨賄甚得鄉邑忻心吳志范叔孫周窮濟急鄉曲貴其義行宋書傳記尚書令符雅為人樂施乞人填門嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰後秦書樊重假貸人間數百萬臨終遺令焚削文契債家皆慚爭往償之諸子從勑竟不受晉陽秋梁商嘗曰多藏厚亡為子孫累每租奉到及兩宮賞賜便置中門外未嘗入藏悉分與昆弟中外東觀漢紀互見遠慮集物飽其義陳子昂集薄倖不自資傾家共人費劉長卿出貨力猶棄粃粺柳文經屯其膏施未光也易屯卦子挈瓶丐水執雚求火而人不𠫤劉子子產聽鄭國之政以其乘輿濟人於溱洧孟離婁下史魯莊公曰衣食所安弗敢專也必以分人曹劌曰小惠未徧民弗從也左莊十子楊子取為我拔一毛而利天下不為也孟盡心上纖吝者義之蠹也文中子魏相篇數粒而炊析薪而爨非苟為艱難由性褊𠫤而細碎也劉子史不分孤寡不恤窮匱左文十三家富萬金門下不見一賢者史孟嘗君傳互見鄙吝瘉於纖嗇西漢貨殖傳顏師古曰纖細也嗇𠫤也魯人儉嗇而丙氏尤甚周人既纖而師史尤甚西漢貨殖傳杜門不通水火西漢孫寶傳注謂雖鄰伍亦不往來也吝江河之流不以濯舟舡之畔惜東壁之光不以寓貧婦之目東漢夏侯湛傳寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道東漢王符傳馬援曰凡植財產貴其能施振也否則守錢虜耳東漢本傳曹洪家富而性吝嗇, WYG: 閒居高卧}
