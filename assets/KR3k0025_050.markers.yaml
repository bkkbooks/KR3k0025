  - {type: 'tls:seg', offset: 10, content: '', id: KR3k0025_CHANT_050-1a.4}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之郡蹈籍名都大羣求黨與索隨和而亡逃匿之意此皆輕量大人亡所畏忌國家之權輕故匹夫欲與上爭衡也漢梅福傳横厲無畏忌欲以熏轑天下漢杜欽傳梁冀暴李固杜喬尸於城北四衢令有敢臨者如其罪漢質紀吳樹為荆州刺史辭梁冀冀鴆之出死車上遼東太守侯猛初拜不謁冀託以他事腰斬之漢桓紀戲弄神祇歌頌禍殃東漢隗囂傳杜塞天下之口聾盲一世之人漢陳蕃傳入吾室操吾戈以伐我漢鄭𤣥傳祖珽私謂和士開曰君之寵幸振古無比宫車一日晩駕何以克終宜令皇太子早踐大位以定君臣之分若事}
  - {type: page-break, offset: 12, content: '', id: KR3k0025_WYG_050-3b, image: WYG0931/WYG0931-0365d.png}
  - {type: page-break, offset: 12, content: '', id: KR3k0025_WYG_050-4a, image: WYG0931/WYG0931-0366a.png}
  - {type: variant, offset: 12, length: 0, content: '', krp: 窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之郡蹈籍名都大羣求黨與索隨和而亡逃匿之意此皆輕量大人亡所畏忌國家之權輕故匹夫欲與上爭衡也漢梅福傳横厲無畏忌欲以熏轑天下漢杜欽傳梁冀暴李固杜喬尸於城北四衢令有敢臨者如其罪漢質紀吳樹為荆州刺史辭梁冀冀鴆之出死車上遼東太守侯猛初拜不謁冀託以他事腰斬之漢桓紀戲弄神祇歌頌禍殃東漢隗囂傳杜塞天下之口聾盲一世之人漢陳蕃傳入吾室操吾戈以伐我漢鄭𤣥傳祖珽私謂和士開曰君之寵幸振古無比宫車一日晩駕何以克終宜令皇太子早踐大位以定君臣之分若事}
