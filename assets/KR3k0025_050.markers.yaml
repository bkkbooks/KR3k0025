  - {type: variant, offset: 4, length: 1, content: 作, WYG: 惕予一人乃㒺畏畏謂已有天命謂敬不足行謂祭}
  - {type: page-break, offset: 4, content: '', id: KR3k0025_WYG_050-2a, image: WYG0931/WYG0931-0365a.png}
  - {type: variant, offset: 4, length: 1, content: 作, krp: 惕予一人乃㒺畏畏謂已有天命謂敬不足行謂祭}
  - {type: variant, offset: 7, length: 1, content: 害, WYG: 謂暴無傷狃于姦宄敗常亂俗以蕩陵徳實悖天道並書小人而無忌憚也記不愧于天不畏于人乘我乘駒朝食于株胡不相畏不畏于天匪先民是程匪大猶是經並詩小人不知天命而不畏也狎大人侮聖人之言語子出則為宗族患入則為鄉里憂小人之行也家語事君無義進退無禮言則非先王之道者猶沓沓也孟齊人}
  - {type: variant, offset: 7, length: 1, content: 害, krp: 謂暴無傷狃于姦宄敗常亂俗以蕩陵徳實悖天道並書小人而無忌憚也記不愧于天不畏于人乘我乘駒朝食于株胡不相畏不畏于天匪先民是程匪大猶是經並詩小人不知天命而不畏也狎大人侮聖人之言語子出則為宗族患入則為鄉里憂小人之行也家語事君無義進退無禮言則非先王之道者猶沓沓也孟齊人}
  - {type: variant, offset: 9, length: 2, content: 益功, WYG: 欲金者清旦衣冠之市適鬻金者之所攫金而去列好憎尚怒小人哉文中子史殺人不忌為賊肆行無度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心單旗劉狄剥亂天下帥羣不弔之人以行亂於王室侵欲無厭規求無度貫瀆鬼神慢棄刑法傲狠威儀並左李斯曰三代之事何足法也李斯請史官非秦語皆燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市並秦紀敢為大言處之不疑漢武紀秦滅六國上古遺烈掃地盡矣史田儋傳宋康王欲霸之亟成故射天笞地斬社稷而燒滅之以示威服鬼神為長夜之飲於室中室中人呼萬歲則堂上應之堂下之人又應之門外之人又應之以至於國中無敢不呼萬歳者天下之人謂之桀宋周紀矯制以令天下漢高五王傳姍笑三代蕩滅古法西漢表顓作威福廟堂之上西漢諸侯王表觸情妄行淮南王方今布衣}
  - {type: page-break, offset: 9, content: '', id: KR3k0025_WYG_050-2b, image: WYG0931/WYG0931-0365b.png}
  - {type: page-break, offset: 9, content: '', id: KR3k0025_WYG_050-3a, image: WYG0931/WYG0931-0365c.png}
