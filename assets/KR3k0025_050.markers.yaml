  - {type: variant, offset: 2441, length: 2, content: 垢汙, WYG: 天子求奇才敢獻所益出袖中書搢笏為郾讀之乃杜牧所賦阿房宫武陵曰請以第一人處之郾謝已得其人至第五郾未得武陵曰不爾宜以賦見還新唐書吳武陵傳集東野吃吃說足下不離口韓文栁惟深充江東路判官出巡其有非常之政裕於人者必舉其課績又以文采殷勤歌詠之俾其風謡頌聲聞于他部達于京師而後已栁丈栁渾行狀本朝唐楊敬之贈項斯詩曰幾度見詩詩盡好及觀標格過於詩平生不解藏人善到處相逢說項斯南部新書錢易撰勸善史子文無後何以勸善叔向社稷之臣也猶將十世宥之以勸能者並左蔽賢經臧文仲其竊位者與知栁下惠之賢而不與立也語子言無實不祥不祥之實蔽賢者當之孟史夫十室之邑必有忠信三人並行厥有我師今或闔郡至不薦一人是積行之}
