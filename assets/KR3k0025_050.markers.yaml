  - {type: variant, offset: 20, length: 0, content: '', WYG: 者小大畢浮氣之與言猶是也氣盛則言之短長與聲之高下皆宜未嘗聞有響大而聲微也夫所謂文者必有諸其中是故君子慎其實實之美惡其發也不揜本深而末茂形大而聲閑行峻而言厲心醇而氣和昭晰者無疑優游者有餘體不備不可以為成人辭不足不可以為成文並韓文温潤發}
