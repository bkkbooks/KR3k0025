  - {type: variant, offset: 3055, length: 294, content: 一年聽其言洋洋滿耳若將可遇求之盪盪如繫風捕影終不可得前漢郊祀志有名無實何異兔絲燕麥南箕北斗通監梁武紀實不應聲者謂之虛通監漢武紀名如畫地作餅不可啖也魏志盧毓傳鍮勿崙曰虛名無實徒足為世之質的通監晉紀互入務實集猶木蘭為舟翠羽為楫翫之於陸而無涉川之用唐文粹雷霆空霹靂雲雨竟虛無杜詩初如吉夢終為戲談李義山集牛奮其角箕張其口牛不見服箱斗不挹酒漿韓三星行史計簿具文而已西漢宣紀秦任刀筆吏爭以奇察相高其敝徒文具亡實前漢張釋之傳國家之有百姓如草木之根柢若秋冬培溉則春夏滋榮坐守鄉閭待盡溝壑撤屋伐木顧妻鬻子止可供所由酒食之費未得至於府庫也敕從其言而有司竟不能行徒為空文而已通監唐懿宗集不得其人則挂墻屋耳陳子昂, WYG: ''}
