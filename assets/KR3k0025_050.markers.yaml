  - {type: variant, offset: 1116, length: 5, content: 德秀質厚少, WYG: 微之醉來擬共天公爭杜茍鶴酒腸寛似海詩膽大如天劉叉本朝醉後粗狂膽滿軀東坡詩威儀經威儀棣棣不可選也威儀反反重慎威儀抑抑謹宻抑抑威儀維徳之隅顒顒卬卬如圭如璋令儀令色並詩威儀容止宣著端行頤霤如矢朝廷濟濟翔翔君子之容舒遲山立時行揚休玉色注揚讀為陽赫兮喧兮者威儀也並記趨進翼如也君子正其衣冠尊其瞻視儼然人望而畏之並語容止可觀進退可度孝經子步中武象趨中韶濩荀君子貌重則有威揚史劉子曰民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也北宫文子有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家君子在位施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也並左魯徐生善為容為禮官史霍光每出入省殿門止進有常處郎僕射竊識視之不失尺寸西漢霍光傳威儀之盛如圭如璋西漢班固叙傳進止皆有表識東漢馮異傳儀貌堂堂國之輝光東漢舒紳緩佩鳴玉以步綽有餘裕後漢蔡邕傳温彦博進止詳華人拭目觀張垍舉止都雅裴休為人醖藉進止雍閒馮定端凝若植權徳輿動止外}
