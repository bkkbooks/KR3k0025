  - {type: variant, offset: 2625, length: 0, content: '', krp: 孔墨之辯不能免於讒䛕西漢鄒陽傳師丹使吏書奏吏書冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄漢成紀讒言蠶生西漢中山王傳馬援在交趾嘗以薏苡實能輕身省慾以勝瘴氣援欲以為種軍還載之一車時人以為南土珍怪卒後有人上書譖之者以為前所還載皆明珠文犀東漢本傳邪徑敗良田讒言敗善人荀恱漢紀周公大聖而四國流言樂毅王佐而被謗騎刼巷伯有豺獸之慨蘇公興飄風之刺惡直醜正}
  - {type: variant, offset: 2626, length: 1, content: 平, WYG: 代無之晉書𤣥宗曰是子妬賢嫉能舉無比者新唐書李林甫傳傳記三人成虎十人撓椎衆口所移毋翼而飛戰國策衆口鑠金俗說有美金衆人咸共詆訾言其不純賣金者欲其售因取鍜以見真偽此為衆口鑠金風俗衆口所毁浮石沈木陸賈集䲭鴞鳴衡軛豺狼當路衢蒼蠅間白黑讒巧令親䟽曹子建贈白馬王彪詩飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳晉傅𤣥飛塵篇積毁銷金積讒磨骨江文通書飛金沈羽蔣子萬機論欲搆南箕成貝錦文選青蠅一相點白璧遂成冤羣誣成罪聖人不能救並陳子昂集讒口到骨杜甫祭房相文黄金銷衆口白璧竟難投白璧何辜青蠅屢前羣輕折軸下沈黄泉衆毛飛骨上凌青天萋斐暗成貝錦粲然泥沙聚埃珠玉不鮮交亂四國播于八埏拾塵掇蜂疑聖猜賢擢髪數罪罪乃孔多傾海流奔惡無以過積毁銷金沈憂作歌並李太白集有道士言人皆有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏睡出䜛于帝以求饗以是人多謫過疾癘夭死栁文罵尸蟲側肩帖耳有舌如刀韓文喑嚙堪銷骨潛飛有禍胎蚊蚋與利嘴枳棘與鋒鋩巧隨清影觸處行好學春鶯百般囀讒譖消骨髓並元稹集巧言構人罪至死人不疑如有膚受譖久則瘡痏成並白侍郎蒼蠅難袪貝錦方織好丹非素變白成黑李義山白璧衆求瑕素絲易成汚韋應物人或罹譖比肩狐疑借有解紛毁輒隨之劉賓客蒼蠅點垂棘巧舌成錦綺盧仝常恐衆毁至春葉成秋黄孟東野微瑕懼掩瑜温飛卿能用傾巧之智構成疑似之端李深之鑠肉銷骨皇甫湜每被銷於㕳初因起毫髪漸可離骨肉嘉木忌深蠧哲人悲巧誣並唐文粹本朝自從蒙衆說日月遭蔽虧歐公詩積毁銷骨巧言鑠金市虎成於三人投杼起於屢至東坡文天螻伏隙録人語射工含沙須影過黄魯直詩止棘之詩垂之六經宜乎以爾刺讒人之亂國誠可嫉而可憎歐陽公蒼蠅賦樂善經人之有技若已有之人之彦聖其心好之不啻如自其口出書衛文公臣子多好善愛莫助之好賢如緇衣彰人之善美人之功推賢而進逹之不望其報並記君子成人之美見善如不及並語子樂善不倦得天下英才而教育之三樂也並孟史晉}
