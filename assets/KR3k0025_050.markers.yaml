  - {type: variant, offset: 2636, length: 1, content: 利, WYG: 人譏彈其文有不善者應時改定文集選生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎韓文衆口貪歸美何顔敢妬姝元微之集本朝温公退居洛陽每論當世人物必曰吕獻可之先見范景仁之勇决皆予所不及心誠服之劉諌議集蔡天申得温公撰吕獻可墓銘以獻王安石天申初欲中温公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見録昔吾舉進士試於禮部歐陽文忠公見吾文曰此我輩人也吾當避之東坡文竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經効於世間不必皆從於已出東坡進陸贄奏議不服善史藺相如為上卿位在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且賤人吾羞不忍為之下宣言曰我見必辱之史記本傳揚雄著太𤣥劉歆觀之曰吾恐後人用覆醬瓿也西漢本傳孔頴逹議論為冠又年最少老師宿儒恥出其下隋書本傳傳記揚雄作太𤣥造法言張伯松不肯一觀論衡疾惡經噬膚滅鼻无咎易除惡務本狃于姦宄敗常亂俗三細不宥報虐以威遏絶苗民無世在下並書夫也不良人而無禮胡不遄死取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊並詩公家不畜刑人大夫弗養士遇之途弗與言也屛之四方唯其所之屏之逺方終身不齒惡惡如巷伯並記子曰非吾徒也小子鳴鼓而攻之可也惡稱人之惡者惡居下流而訕上者惡勇而無禮者惡果敢而窒者見不善如探湯並語子孔子謂子路曰見長者不能黜其色見幼者不能盡其辭雖有疾風暴雨吾不入門矣家語立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟姦人之雄聖主所以先誅荀為不善乎幽闇之中者鬼得而誅之莊草茅不去則害禾稼盜賊弗誅則傷良民管明法梟鳴出聲人皆惡之魯連墨子非樂不入朝歌蝮蛇不可為足虎豹不使縁木並淮南史祭仲曰不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎周任有言曰見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣石祈子曰天下之惡一也惡於宋而保於我保之何補不如殺之無聚慝焉除君之惡惟力是梘季文子曰見無禮於其君者誅之如鷹鸇之逐鳥雀也投諸四裔以禦魑魅右師為已短策茍過華臣之門必騁鄭然明曰見不仁者誅之如鷹鸇之逐鳥雀也子產曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎春秋書齊豹曰盜三叛人名以懲不義不令之臣天下之所惡也去疾莫如盡以上並左傳君子惡惡疾其始榖梁五子貢不能匿人之過史記肥義曰姦臣在朝國之殘也䜛臣在中主之蠧也史趙世家舜有四放之罰而孔子有兩觀之誅漢劉向傳面折不能容人之過漢武紀灌夫潁川人宗族豪横潁川謡曰潁水濁灌氏族西漢本傳里名勝母曽子不入邑號朝歌墨子囘車西漢鄒陽傳注曽子至孝以勝母之名不順故不入紂作朝歌之音不時也朱雲欲以上方斬馬劒斷佞臣頭西漢本傳車如雞栖馬如狗疾惡如風朱伯厚東漢朱震傳越楚之竹不足以書其惡東漢隗囂傳張綱分行州郡埋其車輪於雒陽都亭曰豺狼當道安問狐狸東漢本傳清心忌惡范滂張儉東漢黨錮序王允剛稜疾惡東漢本傳范滂曰臣之所舉自非叨穢姦暴深為害民豈以汙簡札哉漢桓紀農夫去草嘉穀必茂忠臣除姦王道以清同上李膺復拜司𨽻校尉時小黄門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付洛陽獄受辭畢即殺之漢紀宗資以范滂為功曹滂尤剛勁疾惡如讐漢桓紀太原太守劉瓆南陽太守成瑨志除姦邪其所誅剪皆合人望漢靈紀陽球見帝曰臣無清高之行横蒙鷹犬之任前雖誅王甫段熲葢狐狸小醜未足宣示天下願假臣一月必令豺狼䲭梟各服其辜同上荀公逹之去惡不去不止荀攸祖逖牙門童建殺新蔡内史童宻降于後趙勒斷之曰逃吏吾之深仇將軍之惡猶吾惡也逖深徳之}
