  - {type: variant, offset: 2682, length: 2, content: 陷身, krp: 去豺狼已斃在狐鼠而宜除栁文本朝常情共惡人將不食其餘歐公集世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣東坡書唐六家書後聊借舊史誅姦強雖無尺箠當寸刃口吻排擊含風霜並東坡詩有刀難割公閭腹無木可梟元海頭邵堯夫詩懲惡經怙終賊刑降霍叔于庶人三年不齒三細不宥並書史裴豹𨽻也著於丹書左懸頭槀街西漢陳湯傳集聲其惡於天下也栁文辯侵伐論黨惡經為天下逋逃主萃淵藪書教猱升木詩子是輔桀也孟史助桀為虐西漢張良傳日夜縱臾西漢衡山王傳假賊兵為虎翼者也西漢賈誼傳養稂莠者傷禾稼惠姦宄者殘良民後漢王符傳見非不舉聞惡不察漢殤紀是為虎傅翼也}
