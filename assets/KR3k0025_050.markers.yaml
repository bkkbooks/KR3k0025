  - {type: variant, offset: 1668, length: 0, content: '', WYG: 觀者識承平王孫故態分明氷玉容並栁集珠生照乘光氷瑩環坐熱星辰讓光彩並元稹集若霜鴻清唳松雪孤映李義山石骨無濁肉飄飄鶴骨仙並孟東野神仙餘氣色列宿炳輝光劉叉文秀氣獨禀皇甫湜祭栁宗元文眸子瞭然炯炯清立望之真白圭振鷺也皇甫湜風儀秀偉神氣深厚即之如鏡望之如春杜牧之眉宇儼圖畫神秀謝朝輝同上清潤潘郎玉不如唐楊巨源生而美姿河目海口王維集玉山迥立瓊樹無對劉長卿明眸白晳玉潤珠輝美秀備於儀容風流發於言笑王建集英盼横溢神鋒秀發孫可之丈野鶴無俗質唐文粹孟浩然骨貌清淑風神散朗唐楊士源孟浩然詩序本朝氣剛而毅望之可畏色粹而仁近之可親歐公集紫芝眉宇傾一坐笑語但聞雞舌香韓侯氷玉人不可塵土雜並臨川集風采鑠雲烟氷壺貯秋水並東坡詩醜惡}
