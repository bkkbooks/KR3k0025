  - {type: variant, offset: 2811, length: 243, content: 表記觥大也飯不及壺飧大飯謂盛饌未具不及壺飧之救飢疾國越語寒之於衣不待輕煖飢之於食不待甘旨西漢食貨志互入知足傳記衣人在寒食人在飢投虎千金不如一豚肩呂氏春秋墨子語禽滑釐曰凶年與子隋珠又與子一鍾粟子將何所擇釐曰粟可耳說苑互入知所輕重集救死具八珍不如一簞犒韓文薦士詩蔬食足充飢何必膏粱珍繒絮足禦寒何必錦繡文白樂天集互入易足經子曰口惠而實不至記表記史諺曰錢不出家言與之東漢集虛名但蒙寒溫問泛愛不救溝壑辱杜詩經維南有箕不可以簸揚維北有斗不可以挹酒漿詩大東晥彼牽牛不以服箱同上史猶獲石田也無所用之左哀, WYG: 纂淵海卷五}
