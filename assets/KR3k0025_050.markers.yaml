  - {type: variant, offset: 22, length: 0, content: '', WYG: 者文之根所以讀君詩亦知君為人並白侍郎粹和絪緼積于中鏗鏘發越見乎文五行秀氣得之居多者其色㶑灧於顏間其聲發而為文章既禀之而生亦有涯而落其文章貴壽之氣焰歟孝弟為根柢神明枝葉之直方為天質禮讓縁飾之並劉賓客神歡體自輕韋應物集藴為志氣播為事業唐文粹本朝栁公權曰用筆在心心正則筆正孔氏續世說腹有詩書氣自華歐公集人之不學者照鏡則面目可憎對人則語言無味山谷集表裏不副經象恭滔天書枝葉未有害本實先撥詩色取仁而行違居之不疑語色厲而内荏譬諸小人其猶穿窬之盜}
