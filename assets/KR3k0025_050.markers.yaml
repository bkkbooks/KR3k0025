  - {type: variant, offset: 1743, length: 512, content: 而著其善記大學互入有忌憚色取仁而行違居之不疑語顏淵子居之似忠信行之似廉潔眾皆說之自以為是而不可與入堯舜之道故曰德之賊孟盡心下利心無足而佯無欲者也行偽險穢而強高言謹愨者也荀非十二子欲讎偽者必假真揚有人則作之無人則輟之之謂偽揚君子史鄭伯有既死使太史命伯石為卿辭太史退則請命焉請太史更命已復命之又辭如是三乃受策入拜子產是以惡其為人也左襄三十此飾說也史虞卿傳公孫弘習文法吏事緣飾以儒術西漢傳符氏卒群臣皆含辛以為淚通監晉安紀晉王廣彌自矯飾上與后嘗幸其第廣悉屏匿美姬於別室唯留老醜者衣以縵綵給事左右屏帳改用縑素故絕樂器之絃不令拂去塵埃上見之以為不好聲色還宮以語侍臣意甚喜通監隋高祖韋執誼初為叔文所引用深附之既得位欲掩其跡且迫於公議故時時為異同通監唐順宗傳記飾貌者不情大戴禮文王篇齊賀曰公孫洪內服貂蟬外衣麻枲內廚五鼎外膳一肴於是朝廷疑其矯西京雜記集誦六藝以飾姦潘安仁賦色厲內荏行僻心堅卑辭作偽陳子昂集今之卮其貌蠟其言以求賈柳文溷鼠虛求潔元微之集苟作偽而心拙必代斲而手傷白樂天本朝鞠躬便僻不足為恭長號流涕不足為哀弊衣糲食不足為儉涑水迂書飲食之初以為味也適口斯善矣世人取果餌而刻鏤之朱綠之以為盤桉之玩豈非以目食者乎同上夫面垢不忘洗衣垢不忘澣此, WYG: 易彰}
