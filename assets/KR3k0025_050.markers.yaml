  - {type: variant, offset: 446, length: 188, content: 婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣史記本傳子曰我欲載之空言不如見之於行事之深切著明也史記自序使其中有可欲者雖錮南山猶有隙使其中無可欲者雖無石椁又何戚焉通監漢文紀申公曰為治者不在多言顧力行何如耳通監漢武紀將相皆舊功臣少文多質通監漢文紀萬石君無文學而恭謹無與比萬石君家不言而躬行是時吏治皆以慘刻相尚獨內史兒寬擇用仁厚士推情與下不求聲名並同上上雅不喜聽音樂手不持珠玉通監漢光武群, WYG: 羣}
