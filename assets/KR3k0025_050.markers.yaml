  - {type: variant, offset: 2625, length: 0, content: '', WYG: 孔墨之辯不能免於讒䛕西漢鄒陽傳師丹使吏書奏吏書冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄漢成紀讒言蠶生西漢中山王傳馬援在交趾嘗以薏苡實能輕身省慾以勝瘴氣援欲以為種軍還載之一車時人以為南土珍怪卒後有人上書譖之者以為前所還載皆明珠文犀東漢本傳邪徑敗良田讒言敗善人荀恱漢紀周公大聖而四國流言樂毅王佐而被謗騎刼巷伯有豺獸之慨蘇公興飄風之刺惡直醜正}
