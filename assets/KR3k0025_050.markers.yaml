markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 務實, WYG: 欽定四庫全書記纂淵海卷五十宋潘自牧撰性行部有忌憚經豈敢愛之畏我父母仲可懐也父母之言亦可畏也豈敢愛之畏我諸兄仲可懐也諸兄之言亦可畏也豈敢愛之畏人之多言仲可懐也人之多言亦可畏也豈不懐歸畏此罪罟豈不懐歸畏此簡書並詩十目所視十手所指其嚴乎記君子有三畏畏天命畏大人畏聖人之言語史豈不欲徃畏我友朋左上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰唐太宗本朝家有主母而豪奴悍婢不敢與弱子抗老泉無忌憚}
