  - {type: variant, offset: 2628, length: 0, content: '', WYG: 向適鄭鄭鬷蔑立於堂下一言而善叔向下執其手以上曰子若無言吾幾失子矣左鮑叔既進管仲以身下之史記鄭當時推轂士及官屬丞吏常引以為賢於己聞人之善言進之上惟恐後諸公以此翕然稱鄭莊前漢本傳何武為人好奬人之善為内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也漢武帝讀相如賦而善之曰朕不得與此人同時哉並同上聞人之善若出諸口言有可采必演而成之薦逹賢士多所奬進知而未言以為己過孔融傳天下之寳故為天下所惜王坦之荅謝安書好賢樂善情如饑渇通鑑楊敬之推愛項斯為詩所至稱之唐書本傳荀文若之進善不進不休通鑑集田文之愛士鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉扺掌嵇叔夜絶交書片善經心揖虞宣於蔡席一言合道接然明於鄭階片善必甄揖虞翻於東箭一言可紀許顧榮以南金並駱賔王集執事好賢樂善孜孜以薦進良士為己任方今天下一人而已韓愈與陸員}
