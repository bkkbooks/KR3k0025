  - {type: punctuation, offset: 1666, content: 《, id: KR3k0025_CHANT_050-bkkpn516}
  - {type: variant, offset: 1667, length: 0, content: '', WYG: 炳靈文選清如玉壺氷鮑明逺白頭吟河目龜文公侯之相劉孝標辨命論金昭玉粹顏延年曲水詩風標秀舉清暉映世齊故安陸碑天骨踈朗牆宇高巍文選三國名臣贊姿狀嶽立靡然屬目陳子昻風情踈朗霜明月湛之姿氣骨端嚴雪白氷清之潔駱賓王秋水為神玉為骨眉宇真天人魏侯骨聳精神𦂳華嶽峯尖見秋隼炯如一段清水出萬壑置在迎風寒露之玉壺符彩高無敵玉府標孤映並杜詩皎皎鸞鳳姿飄飄神仙氣符彩照滄溟精輝陵白虹裴公有仙標㧞俗數千丈並李太白愛其風骨粹美無可揀韓文見王馬燧也於北亭猶高山深林龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙幼子娟好静秀瑶環瑜珥蘭茁其芽並韓文人之異在乎風神之清濁不在於倒置眉目反易冠帶也裴度寄李朝}
