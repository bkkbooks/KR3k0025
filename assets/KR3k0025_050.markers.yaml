  - {type: variant, offset: 1665, length: 1, content: 樸, WYG: 一時推許袁粲見之嘆曰景文非但風流可恱乃哺歠亦復可觀宋書本傳上嘗陳樂於勤政樓下垂簾觀之兵部侍郎盧絢謂上已起垂鞭按轡横過樓下絢風標清粹上目送之唐𤣥宗李義琛神情爽㧞唐書本傳帝每用人必曰風度能如九齡否唐書張九齡日角珠庭非庸人相唐李珏郭子儀風姿若神人望之岩岩如華山郭子儀家傳鄭畋姿采如峙玉蕭遇風采整峭崔澹舉止秀峙時謂玉而冠者並唐書本傳孔季翔永昌初擢制科陳子昂常稱其神清韻逺可比衛玠唐書房琯見徳秀歎曰見紫芝眉宇使人名利之心都盡唐元徳秀姿宇魁秀唐書魏謩崔逺風姿峻整世目為飣坐梨新唐書本傳傳記衛玠從豫章下都人久聞其姿容觀者如堵牆見裴叔則如玉山上行光照映人山公曰嵇叔夜之為人也岩岩若孤松之獨立其醉也傀俄若玉山之將崩時人目王右軍飄如遊雲矯若遊龍岩岩清峙壁立千仞並世說張緒少而閒雅風流吐納觀者忘疲永明主見靈和殿前栁條嫩弱披靡可愛嗟賞曰此楊栁風流可愛似張緒少年楊松玠談藪唐蔣凝美風標每到朝士家以為祥瑞朝士中號為玉筍班北夢瑣言李白神氣高朗軒軒若霞舉酉陽雜爼集情純潔而罔薉兮姿盛質而無愆金相玉質並楚辭天姿玉裕應瑒建章臺詩江}
