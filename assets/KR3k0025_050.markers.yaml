  - {type: punctuation, offset: 13, content: 《, id: KR3k0025_CHANT_050-bkkpn3}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 中宫少主皆徳君此萬全計也請君説主上令粗解當自外入表諭之於是上}
  - {type: variant, offset: 13, length: 0, content: '', krp: 中宫少主皆徳君此萬全計也請君説主上令粗解當自外入表諭之於是上}
  - {type: variant, offset: 14, length: 2, content: 旅獒, WYG: 齊主從之傳位於太子緯陳世祖阮佃夫人納貨賄所餉減二百疋絹則不報書宋太祖右司郎中馮翊喬知之有美妾曰碧玉知之為之不昬武承嗣借以教諸姬遂不還知之作緑珠怨詩以寄之碧玉赴井死承嗣得詩於裙帶大怒諷酷吏羅吉族誅之唐武后來俊臣倚勢貪淫士民妻妾有美者百方取之自宰相以下籍其姓名而取之同上武三思嘗言我不知代間何者謂之善人何者謂之惡人但於我善者則為善人於我惡者則為惡人耳唐中宗盧把秉政薦吏部侍郎關播為中書侍郎平章事上嘗從容與宰相論事播意有所不可起立欲言把目之而止還至中書把謂播曰以足下端慤少言故相引至此曏者奈何發口欲言耶唐徳宗小人之慮遂以為天道難知為善未必福而為惡未必禍也唐中宗贊李振曰此輩自謂清流宜投黄河為濁流唐紀傳記上小堯舜下邈三王劉向戰國䇿序集白晝攫金顔魯公坐位帖行與義乖言與法違韓文本朝小人不主於禮義則無忌憚所以反中庸也二程語録安石謂天變不足畏祖宗不足法人言不足䘏實録本傳有顧藉子齊景公問晏子曰為人何患曰患社䑕出竊於外入託於社灌之恐壊牆熏之恐燒木家語史鄧侯曰人將不食吾餘左欲投䑕而忌器䑕近於器尚憚不投西漢賈誼傳社鼷不灌屋䑕不熏西漢靖王勝傳孔融薦禰衡於曹操衡乃著布單衣持三尺梲杖坐大營門以杖捶地大罵操怒曰禰衡豎子孤殺之猶雀䑕耳顧此人素有虛名逺近將謂孤不容之東漢妻子以累其心産業以重其志舍此以為非者有必不多矣漢殤紀羅仇曰吾家世以忠孝著於西土寧使人負我我不忍負人也晉安紀傳記稷蜂不攻社䑕不熏唐詩外傳集薙草恐傷蕙孟東野無顧藉經子曰小人不}
