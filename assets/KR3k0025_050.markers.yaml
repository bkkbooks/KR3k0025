  - {type: variant, offset: 17, length: 0, content: '', WYG: 不仁不畏不義易繫辭史史舉以茍賤不亷聞於世史甘茂傳吾日暮途逺故倒行逆施之漢主父偃傳子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣漢原涉傳且被刑之人心不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患孔融傳傳記楊國忠謂客曰某起家細微因縁椒房以至於是未知稅駕之所終不能致令}
  - {type: page-break, offset: 17, content: '', id: KR3k0025_WYG_050-6b, image: WYG0931/WYG0931-0367b.png}
  - {type: variant, offset: 17, length: 0, content: '', krp: 不仁不畏不義易繫辭史史舉以茍賤不亷聞於世史甘茂傳吾日暮途逺故倒行逆施之漢主父偃傳子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣漢原涉傳且被刑之人心不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患孔融傳傳記楊國忠謂客曰某起家細微因縁椒房以至於是未知稅駕之所終不能致令}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 更當取樂於富貴耳明皇雜録表裏相應經君子黄中通理正位居體美在其中而暢於四支發於事業易和順積中而英華發外其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔清明在躬志氣如神君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之徳富潤屋徳潤身心廣體胖並記子中心逹於面目胷中正則眸子瞭焉胷中不正則眸子眊焉仁義禮智根於心其生色也睟然見於靣盎於背施於四體有諸内必形諸外並孟源清則流清源濁則流濁文貌情用相為内外表裏並荀體痛者口不能不呼心恱者顏不能不笑尹鄧子鄧析子篇威儀文辭表也徳行忠信裏也楊仲黎史心和則氣和氣和則形和公孫𢎞傳愛待敬而不敗徳須威而久立故制禮以崇敬作刑以明威前漢刑法志形氣發於根柢兮柯葉彚而靈茂西漢班固傳表曲者影必斜源清者流必潔猶叩樹本百枝皆動也漢紀木心不正則脈理皆斜唐紀根朽者葉枯源涸者流竭唐書吳兢集滿内而外揚楚辭厭着也白玉以為面懐琬琰以為心同上泉竭則源涸根朽則葉枯枝繁者䕃多條落者本孤六代論氣水也言浮物也水大而物}
