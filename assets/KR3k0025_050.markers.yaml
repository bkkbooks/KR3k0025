  - {type: variant, offset: 2681, length: 0, content: '', WYG: 交駭物聽唐徳宗徳宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壊之唐書陽城傳元稹倚宦官知制誥武元衡厭鄙之食𤓰蠅集其上元衡揮以扇曰適從何處來遽集於此唐書武元衡傳傳記水名盜泉仲尼不漱語撰考䜟耳聞所惡不如無聞目見所惡不如無見吕氏春秋盧奐累任大郡凡治姦惡既斷罪又以所犯刻石竪其門時謂記惡碑王元祐開元天寳遺事鍾離意曰孔子忍渴於盜泉之水曾參囘車於勝母之閭惡其名也東漢紀集要領不足以膏蕭斧名字不足以汙簡墨陳琳檄鷹揚虎視肅清違慢傅咸中丞箴剛腸疾惡山巨源絶交書簡上霜飛筆端風起崔彖御史箴董卓稱亂徒藉羣雄之手王莽偷安卒成光武之業故市耀臍燈府傳飲器梁任孝恭檄文𢎞量不以容非文選王文憲集序渴不飲盜泉水熱不息惡木隂猛虎行疾惡懐剛腸杜詩人其人火其書廬其居韓原道守正為心疾邪不懼栁文魯司冦三日之間戮正卯於兩觀之下漢司𨽻一旬之内取張朔於合柱之中李義山文聞惡若已讐栁文暴虐得於天生憸悍著於心中扺冐刑憲縱盜胷臆法所惡者爾皆為之白晝九衢指憎萬手杜牧之膚革既平雖疥癬而}
