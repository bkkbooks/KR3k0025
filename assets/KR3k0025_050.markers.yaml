  - {type: variant, offset: 2447, length: 1, content: 前, WYG: 道也漢武紀何以知朝廷之衰人人自賢不務於通人故世陵夷西漢李尋傳通人謂薦逹賢才也杜宻曰劉勝知善不薦自同寒蟬東漢書唐彬當世英彦見彬莫不欽恱稱之於文帝帝問孔顥顥忌其能良久不答陳騫曰彬為人勝騫甚逺帝辟彬為屬他日謂孔顥曰近見唐彬卿受蔽賢之責矣晉書集好蔽賢而嫉妬楚辭知善不言與嚚瘖同栁文序嫉妬經人之有技冐疾以惡之人之彦聖而違之俾不達書子愚者好專事而妬賢能抑有功而濟有罪士有妬友則賢交不親君有妬臣則賢人不至小人不能則嫉妬怨誹以傾覆人害良曰賊隱良者謂之嫉並荀日月欲明浮雲蔽之藂蘭欲茂秋風敗之文中子史屈原入則與王圖議國事以出號令出則接遇賔客應對諸侯王甚厚之上官大夫與之同列爭寵而害其能王使屈原為憲令屬草藁未定上官大夫見而欲奪之不與因讒之藺相如為上卿在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且素賤人吾羞不忍為之下宣言曰我見必辱之韓非使秦王未之信用李斯姚賈害毁之王以為然下吏治非李斯使人遺非藥自殺並史記本傳妬賢嫉能有功者害之賢者疑之史記漢高紀天子議以賈生為公卿絳灌馮敬之屬盡害之乃短賈生曰洛陽之人年少初學專欲擅權紛亂諸事於是天子䟽之不用其議史記本傳翟方進舉明經遷議郎時宿儒有胡常與方進同經名譽出方進下乃心害其能論議不右方進西}
