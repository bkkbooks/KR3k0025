  - {type: variant, offset: 2475, length: 1, content: 軍, WYG: 身廢棄周紀有妬􅎱之心西漢五行志王式為博士諸大夫博士共持酒肉勞式皆注意高仰之博士江公世為魯詩宗心嫉式謂歌吹諸生曰歌驪駒式曰聞之於師客歌驪駒主人歌客無庸歸今日諸生為主人日尚早未可也江公曰經何以言之式曰出曲禮江公曰何拘曲也式恥之陽醉逿墬古地字式客罷讓諸生曰我本不欲來諸生彊勸我竟為豎子所辱西漢王式}
