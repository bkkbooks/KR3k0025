  - {type: variant, offset: 696, length: 0, content: '', WYG: 既上讀河圖㑹昌符幸泰山禪祭地於梁隂漢光武魏比年將帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懐雄圖銳氣一朝頓盡梁高祖牛僧孺口道先王語行如市人唐書本贊集遇客多言愛山水逢僧盡道厭囂塵玉潭泉畔松間宿要見經年無一人白樂天相逢盡道休官去林下何曽見一人唐僧靈徹矜持經率履不越詩燕處則聽雅頌之音行步則有環珮之聲升車則有和鸞之音居處有禮進退有度砥礪廉隅君子言不過辭動不過則不戲色致禮以治躬則莊敬莊敬則嚴威君子無故玉不去身君子於玉比徳焉行中規還中矩君子不失足於人不失色於人不失口於人是故貌足畏也色足憚也言足信也今世行之後世以為楷並記君子矜而不爭語子君子言有壇宇行有防表荀儒效為冠所以莊其首也為履所以重其足也衣裳襜如劒佩鏘如皆所以防其躁也文中子史斷斷自修整榖梁傳莊公如布帛之有幅左君子目以定體足以從之人之有冠猶宫室之有牆屋也糞除而已並國語進退容止非禮不行西漢董仲舒霍光出入省殿門止進有常處郎僕射竊識眂之不失尺寸西漢本傳矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉及在鄉黨詳言正色三輔以為儀表東漢張堪傳陳登處身循禮非法不行東漢陳球傳雖在燕居必以禮自整東漢仇覽君子當正威儀何有蓬頭跣足自謂宏逹耶九十三謝𢎞微精神端審時然後言婢僕之前不妄語笑南史宋高祖傳記南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也烈女傳楊愔曰裴讓兄弟都無鄉音三國典畧集余好修以為常雖體解吾猶未變新沐者必彈冠新浴者必振衣並楚辭與人有畛域不為戲狎韓文本朝趙光逢規矱自持栁仲郢私居束帶正色並孔六帖持重經虎視眈眈易重其體貌也正色率下書其容不改出言有章詩坐如尸立如齊君子不失足於人不失色於人不失口於人是故貌足畏也色足憚也言足信也君子之容舒遲足容重手容恭目容端口容止聲容靜頭容直氣容肅立容徳色容莊山立時行揚休玉色不旁狎並記夫子時然後言人不厭其言樂然後笑人不厭其笑君子正其衣冠尊其瞻視儼然人望而畏之並語集與人有畛域不為戲狎唐文粹本朝包孝肅未嘗有笑容人謂包希仁笑比黄河清筆談放蕩經欲敗度縱敗禮不矜細行並書不知其秩常也詩載號載呶同上子猖狂妄行莊史使酒難近西漢季布傳數以酒失過丞相西漢灌夫跅弛之士西漢武紀師古曰無檢局也弛者放廢不遵禮度也儻􅛅音蕩西漢陳湯傳師古曰無行檢也為人失音鐵蕩西漢揚雄傳不修廉隅以徼名當世同上何晏與夏侯𤣥荀粲王弼之徒競為清談尚虛無謂六經為聖人糟粕天下士大夫爭慕效之遂成風流魏邵陵厲公譙郡嵇康文辭壯麗好言老莊而尚竒}
