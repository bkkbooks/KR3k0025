  - {type: variant, offset: 2555, length: 3, content: 故機械, krp: 墨子所以悲絲楊朱所以泣岐路以其變為青黄迥為左右也點素為緇並劉讒妬}
  - {type: variant, offset: 2559, length: 0, content: '', WYG: 人必好聞人惡惡聞人善讒邪之蔽善人也猶朝日洞明霧甚則不見天沙石至淨流濁則不見地雖有明淨之質而不發明霧水蔽之也並劉賓客昔直不疑未嘗有兄而讒者謂之盜嫂第五倫三娶孤女而世人云笞婦翁此聽虛而責響悖情倒理罔之甚也劉傷讒史猶有内讒毁信廢忠崇飾惡言靖譖庸囘服讒蒐慝以誣盛徳謂之窮奇並左若衆口之鑠金國語言之太甘其中必苦譖在中矣國語晉吳太宰嚭既與子胥有隙因譖曰子胥為人剛暴少恩今不見用常鞅鞅怨望吳王乃使使賜子胥屬鏤之劒以死史記本傳屈原為憲令上官大夫見而欲奪之不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而䟽屈平史記屈平傳積毁銷骨史記張儀傳范雎謬曰秦安得王秦獨有太后穰侯耳臣居山東時齊知有孟嘗君不聞有王聞秦有太后穰侯不聞有王大其都者危其國尊其臣者卑其主今自百秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝周紀田蚡曰魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而}
  - {type: page-break, offset: 2559, content: '', id: KR3k0025_WYG_050-32b, image: WYG0931/WYG0931-0380b.png}
