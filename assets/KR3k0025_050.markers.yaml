  - {type: variant, offset: 2629, length: 1, content: 靜, krp: 書一字愜心金玉不顧片言合趣布褐無間吕和叔文本朝文忠公見子瞻書語聖俞曰老夫當避此人放出一頭地蘇子由集歐陽文忠公喜士為天下第一冷齋夜話冦萊公聞一善薦𨗳推輓不進用不已五朝言行録服善子孔子見老耼出以告顏囘曰丘之於道其猶醯雞歟微夫子之發吾覆也吾不知天地之大全也莊項槖年七歳為孔子師孔子有以聽其言也淮南史見有禮於其君者事之如孝子之養父母也自今請雖吾家聽子}
  - {type: variant, offset: 2631, length: 4, content: 內躁銛巧, WYG: 行並左韓信募生得廣武君者有縛致麾下信解其縛東鄉坐師事之西漢信傳漢文帝曰吾久不見賈生自以為過之今不及也西漢本傳上曰吾久不見班生今日復聞讜言漢成紀魏徵曰文宣狂暴然人與之爭事理屈則從之唐太宗上說曰理到之語不得不服朕以私愛忘公議曏者之忿自謂不疑及聞徵言方知理屈同上杜淹對太宗曰天下之務當盡至公善則從之徳彛所言直得大體臣誠心服不敢遂非唐太紀蕭至忠素有雅望嘗自公主第門出遇宋璟璟曰非所望於蕭君也至忠笑曰善乎宋生之言遽策馬而去唐𤣥宗蘇廷碩為中書舍人李嶠曰舍人思若湧泉吾所不及唐書本傳傳記李相讀春秋誤以叔孫婼勅畧反呼為勅晷有小吏曰某縁師受誤呼文字今聞相公呼婼為姼方悟之耳公曰不然因檢釋韻果勅畧反公大慚號小吏為一字師摭言集僕嘗}
