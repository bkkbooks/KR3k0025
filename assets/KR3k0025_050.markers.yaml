  - {type: variant, offset: 1115, length: 0, content: '', WYG: 脫冠露髻諠譁自恣唐莊宗傳記阮籍嫂嘗歸家籍相見與别人或譏之曰禮豈為我輩設耶世說王澄嘗之荆州送者傾邑所别樹上有鵲巢澄便脫衣着犢鼻上樹探鵲􅑹而弄之旁若無人晉中興書謝郎中云王修載樂託之性出自門風王武子好驢鳴既𦵏文帝臨其䘮顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴並世說史丹儻蕩無檢阮籍不拘禮教孔白帖縱逸類華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時迴杜牧之為御史分務洛陽有李司闕者罷鎮閒居聲妓為當時第一嘗開筵以杜持憲不敢邀致杜遣客達意李馳書招之杜聞命遽來時女妓百餘人皆絶藝殊色杜獨坐南行注目瞻視引滿問李曰聞有紫雲者杜凝睇良久曰名不虛得宜以見惠李大笑諸妓亦皆囘首破顏杜又自飲三爵即吟而起本事詩杜牧佐宣城幕聞湖州多竒麗往遊之刺史崔君張水嬉使州人畢觀令杜牧閱之牧因見一女娃期之曰吾不十年來守此郡不來從適洎牧守湖州女已從人三載矣牧因賦詩曰自是尋春去較遲不須惆悵怨芳時雜記張祜客懐南幕中赴宴杜牧同坐有所屬意索骰子賭酒微吟曰骰子逡巡裹手拈無因得見玉纎纎祜曰但知報道金釵落髣髴還應露指尖摭言集觀古今文人類不護細行鮮能以名節自立魏文帝與呉質書幕天席地縱意所如文選以莊老為宗而黜六經以虛薄為辨而賤名檢以放蕩為通而狹節信以茍得為貴而鄙居正以望空為高而笑勤恪干令升總論少年氣真狂有意與春競韓集野鳥終難縶}
