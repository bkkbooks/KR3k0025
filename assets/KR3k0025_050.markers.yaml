  - {type: variant, offset: 2629, length: 1, content: 靜, WYG: 書一字愜心金玉不顧片言合趣布褐無間吕和叔文本朝文忠公見子瞻書語聖俞曰老夫當避此人放出一頭地蘇子由集歐陽文忠公喜士為天下第一冷齋夜話冦萊公聞一善薦𨗳推輓不進用不已五朝言行録服善子孔子見老耼出以告顏囘曰丘之於道其猶醯雞歟微夫子之發吾覆也吾不知天地之大全也莊項槖年七歳為孔子師孔子有以聽其言也淮南史見有禮於其君者事之如孝子之養父母也自今請雖吾家聽子}
