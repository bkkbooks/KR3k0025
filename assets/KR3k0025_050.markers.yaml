  - {type: variant, offset: 2554, length: 0, content: '', WYG: 如斗筲窄文粹讒譖經誣善之人其辭游易讒說殄行起信險膚協比讒言並書萋兮斐兮成是貝錦彼譖人者亦已大甚哆兮侈兮成是南箕箋云箕星舌廣彼譖人者誰適與謀緝緝翩翩謀欲譖人捷捷幡幡謀欲譖言取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊營營青蠅止于樊豈弟君子無信讒言注蠅之為蟲汚白使黒汚黒使白喻佞人變亂善惡也營營青蠅止于棘讒人㒺極交亂四國盜言孔甘亂是用餤無罪無辜讒口囂囂並詩浸潤之譖膚受之愬語子傷良曰讒荀摇唇鼔舌擅生是非}
  - {type: page-break, offset: 2554, content: '', id: KR3k0025_WYG_050-31b, image: WYG0931/WYG0931-0379d.png}
