  - {type: variant, offset: 2685, length: 0, content: '', WYG: 鑑三國魏史傳記籍賊兵而齎盜食者也戰國䇿本朝蘇舜欽}
  - {type: variant, offset: 2685, length: 0, content: '', krp: 鑑三國魏史傳記籍賊兵而齎盜食者也戰國䇿本朝蘇舜欽}
  - {type: variant, offset: 2686, length: 0, content: '', WYG: 奏院因十月賽神㑹館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同坐者皆坐斥劉謂時相賈昌朝曰與公一網打盡張師正倦游録同惡經莫赤匪狐莫黑匪烏注君臣相承為惡如一詩衛君無道夫人無徳詩序相覿以貨相賂以利記史同惡相求如市賈焉左凶徳參㑹西漢灌夫等贊招呼元惡以自營衛專為羣逆主萃淵藪東漢孔融傳傳記豹則虎之弟鷹則鷂之兄古樂府掩惡史為賢者諱也穀梁孔子曰臣子不可以言君親之惡為諱者禮也史巫馬期傳大臣有坐不廉者不曰不廉曰簠簋不飭坐汙穢淫亂者不曰汙穢曰帷簿不修坐罷軟不勝任者不謂罷軟曰下官不職西漢賈誼傳張安世為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不翻水漿耶如何以小過成罪郎淫官婢婢兄自言安世曰奴誣汙衣冠其隱人過失皆類此西漢本傳丙吉為丞相於官屬掾吏務掩過揚善同上戴聖九江守行治多不法何武為刺史廉得其罪聖懼自免後為博士毁武於朝廷武聞之終不揚其惡西漢何武傳傳記忠臣令誹在己譽在上宋君奪民時以為臺而民非之無忠臣以掩葢之也子罕執朴為司空民非子罕而善其君桓公宫中七市女閭七百國人非之管仲為三歸之臺以掩桓公之非戰國䇿揚惡子言人之不善當如後患何孟史欲摘觖以揚我惡西漢孫寳傳觖謂挑發之也訐揚幽昧之過西漢趙后傳集好蔽美而稱惡楚辭不遷怒經罰弗及嗣書顏囘不遷怒語子罪人不孥孟史敵怨不在後嗣忠之道也左集不遷怒以臨下文選書遷怒史大旱公欲焚巫尩當其時不能治也後之人何罪室於怒市於色並左司徒期作亂攻衛侯出適城鉏曰期則為此令茍有怨於夫人者報之夫人期姊期聘於越公攻而奪之幣期告王王命取之公怒殺期之甥之為太子者注忿期而及其姊為夫人者遂及夫人子左信襲破齊歴下軍遂至臨淄齊王以酈生為賣已乃烹之漢高紀趙王倫怒解系曰我於水中見蟹尚惡之况此人兄弟輕我耶此而可忍孰不可忍遂害之晉書苻堅聞桓温廢立謂羣臣曰温前敗灞上後敗枋頭不能思愆自貶方便更廢君以自説諺曰怒其室而作色於其市其温之謂矣晉簡文紀李振屢舉進士竟不中第故深疾縉紳之士言於全忠曰此輩常自謂清流宜投之黄河使為濁流}
