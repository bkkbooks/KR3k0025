  - {type: variant, offset: 2551, length: 0, content: '', WYG: 致之於死惡顏真卿之直言令奉使李希烈竟殁於賊唐書本傳集世溷濁而嫉妬衆僉諧以妬賢孤聖特而易傷並楚辭人惡俊異俗疵文雅斵善害能醜正惡直肆其噤害則皆妬之徒也妨功害能之臣盡為萬户侯並選文靜思屈原沈逺憶賈誼貶椒蘭爭妬忌絳灌共讒諂妬腸務生敵忌者畏人修事修而謗興徳高而毁來並韓集來時畏}
