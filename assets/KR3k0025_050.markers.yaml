  - {type: variant, offset: 2544, length: 1, content: 機, WYG: 蜜腹有劒唐書傳記馬融筭渾天不合召鄭𤣥令一筭便決及𤣥歸融心忌焉𤣥亦疑有追者乃坐橋下在水上據屣融果欲追之左右曰𤣥亦疑下土下水上據木此必死矣遂罷追語林天寳初帝顧林甫曰嚴挺之安在其材可用林甫退召其弟損之與道舊諄復欵曲且許美官因曰天子視絳州挺之也厚要當以}
