  - {type: variant, offset: 1662, length: 2, content: 斲雕, WYG: 王衍神姿高徹如瑶林瓊木自然風塵表物晉書王戎顧榮少有珪璋符采爽徹五行晉書王衍每持玉柄麈尾與手同色晉王衍王羲之見杜乂而目之曰膚若凝脂眼如㸃漆此神仙中人也晉書本傳王恭美姿儀人目之云濯濯如春月栁晉王恭桓𤣥曰劉裕風骨不常蓋人傑也晉紀褚彦囘美儀貌善容止俯仰進退咸有風則每朝㑹百僚國使莫不延首目送之宋書本傳姿貌修潔與圭璧等質王智宋紀齊和士開曰琅琊王儼眼光奕奕數歩射人陳紀李繪儀貌端偉邢晏曰若披雲霧如對珠玉北史李渾風神洒落南史宋璟風度凝逺唐書本傳王彧美風姿}
  - {type: page-break, offset: 1662, content: '', id: KR3k0025_WYG_050-20b, image: WYG0931/WYG0931-0374b.png}
  - {type: variant, offset: 1662, length: 2, content: 斲雕, krp: 王衍神姿高徹如瑶林瓊木自然風塵表物晉書王戎顧榮少有珪璋符采爽徹五行晉書王衍每持玉柄麈尾與手同色晉王衍王羲之見杜乂而目之曰膚若凝脂眼如㸃漆此神仙中人也晉書本傳王恭美姿儀人目之云濯濯如春月栁晉王恭桓𤣥曰劉裕風骨不常蓋人傑也晉紀褚彦囘美儀貌善容止俯仰進退咸有風則每朝㑹百僚國使莫不延首目送之宋書本傳姿貌修潔與圭璧等質王智宋紀齊和士開曰琅琊王儼眼光奕奕數歩射人陳紀李繪儀貌端偉邢晏曰若披雲霧如對珠玉北史李渾風神洒落南史宋璟風度凝逺唐書本傳王彧美風姿}
