  - {type: variant, offset: 60, length: 2, content: 眉睫, WYG: 無文學而恭謹無與比萬石君家不言而躬行是時吏治皆以慘刻相尚獨内史倪寛擇用仁厚士推情與下不求聲名通鑑漢文上雅不喜聴音樂手不持珠玉羣臣上言宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎何事汙七十二代}
