  - {type: variant, offset: 21, length: 1, content: 趍, WYG: 翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黒欺天罔上者也魏志互入妄偽嵩髙道士潘誕自言三百嵗為帝合鍊金丹常役數千人所費巨萬鑿嵩髙大石深百尺者數十處凡六年丹不成通鑑隋煬紀驛書上聞旬月方報其敗喪則減百}
  - {type: page-break, offset: 21, content: '', id: KR3k0025_WYG_044-5a, image: WYG0931/WYG0931-0222c.png}
  - {type: variant, offset: 21, length: 1, content: 趍, krp: 翁王鳳擅權谷永比之申伯王商忠義張匡謂之左道此皆以白為黒欺天罔上者也魏志互入妄偽嵩髙道士潘誕自言三百嵗為帝合鍊金丹常役數千人所費巨萬鑿嵩髙大石深百尺者數十處凡六年丹不成通鑑隋煬紀驛書上聞旬月方報其敗喪則減百}
  - {type: variant, offset: 23, length: 1, content: 迎, WYG: 為一其捃獲則張百而成千通鑑唐徳宗紀禄山奏言去春營州蟲食苗臣焚香祝天云臣若操心不正事君不忠使蟲食臣心臣若不負神祗願使蟲散即有羣鳥從北來食蟲立盡請宣付史官通鑑唐𤣥宗紀或告第五琦受人金二百兩遣御史劉期光追按}
