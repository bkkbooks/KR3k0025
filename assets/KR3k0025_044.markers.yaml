  - {type: variant, offset: 4344, length: 324, content: 詐人也使誤食釣餌一粒則止矣食之盡不情也聞見錄富公見張安道曰人固難知也張公曰謂王安石乎亦豈難知者皇祐間方平知貢舉或薦安石有文學宜辟以考校姑從之安石既來一院之事皆欲紛更之方平惡其人檄以出自此未嘗與之語也同上陳瓘因朝會見蔡京視日久而不瞬嘗以語人曰京之精神如此他日必貴然矜其稟賦敢適太陽吾恐此人得志必擅私欲無君自肆矣遺事夫好貨天下之賤士也以范蠡之賢豈聚歛積實者何至耕于海濱父子力作以營千畝屢散而復積此何為者豈非才有餘而道不足故功成名遂身退而心終不能自放者乎東坡志林王安石名盛歐陽脩勸蘇洵交遊安石安石亦願交於洵洵曰吾知其人矣是不近人情者鮮不為天下患安石之毌死士大夫皆吊之洵獨不往作辨姦論張方平撰蘇洵墓表孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之強得一士焉宜, WYG: 泉}
