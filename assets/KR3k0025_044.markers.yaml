  - {type: variant, offset: 4203, length: 1, content: 凡, WYG: 老蘇辯姦論沽名矯激經違道干譽書欲㓗其身而亂大倫論語子段干木踰垣而辟之泄栁閉門而不納是皆已甚互入已甚陳仲子以兄之禄為不義之禄而不食也以兄之室為不義之室而不居也孟子買名聲於天下莊子互入好名姦人盜名於晻暗同世故曰盗名不如盜貨田仲史鰌不如盜也荀子史公孫𢎞至宰相封侯食一肉脫粟飯西漢本傳石建之澣衣周仁為垢汙君子譏之前漢本傳公孫𢎞以三公為布被誠飾詐以釣名前漢本傳干名采譽西漢終軍傳純盜虛聲通鑑李固貽書黄瓊云集少室山人索價髙兩以諫官徴不起韓詩山人指李渤也機巧經其民機巧趍利禮子為機變之巧者無所用恥焉孟子有機械者必有機事有機事者必有機心莊子故機械之心藏於胸中則純白不粹神徳不全淮南子史司馬安文深巧善宦四至九卿西漢汲黯傳公孫𢎞奏事有不可不庭辯甞與汲黯請間先發之𢎞推其後通鑑漢武紀何平叔外靜而内躁銛巧好利通鑑魏邵凌厲公紀能移主上意者唯楊素耳通鑑隋髙祖以反道為權以任數為智君上行之必失衆臣下用之必陷身通鑑唐徳宗妄想傳記桓子新論曰闗東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼論衡互入仰羨乆鰥無偶思配織女易林集援北斗兮酌桂漿楚辭過屠門而大嚼雖不得肉貴且快意曹植書本朝饑人忽夢飯甑溢夢中一飽百憂釋東坡詩實意附虛意經君子問人之寒則衣之問人之饑則食之稱人之美則爵之禮記史觥大也飯不及壺餐大飯謂盛饌未具不及壺餐之救饑疾也越語寒之於衣不待輕煖饑之於食不待甘㫖西漢食貨志互入易足傳記衣人在寒食之在饑投虎千金不如一豚肩吕氏春秋墨子語禽滑釐曰凶年與子隋珠又與子一鍾粟子將何所擇釐曰粟可耳説苑互入知所輕重集救死具八珍不如一簞犒韓詩蔬食足充饑何必膏粱珍繒絮足禦寒何必錦繡文白樂天集互入易足經子曰口惠而實不至禮記史諺曰錢不出家言與之東漢集虛名但䝉寒温問泛愛不救溝壑辱杜詩有名無實經維南有箕不可以簸揚維北有斗不可以挹酒漿睆彼牽牛不以服箱詩史猶獲石田也無所用之左哀十一年聴其言洋洋滿耳若將可遇求之盪盪如繫風捕影終不可得漢郊祀志有名無實何異兔絲燕麥南箕北斗通鑑梁武實不應聲者謂之虛通鑑漢武名如畫地作餅不可啖也魏志盧毓傳鍮勿崙曰虛名無實徒足為世之質的通鑑晉紀互入務實集猶木蘭為舟翠羽為楫翫之於陸而無涉川之用唐文粹雷霆空霹靂雲雨竟虛無杜詩初如吉夢終為戯談李義山集牛奮其角箕張其口牛不見服箱斗不挹酒漿韓詩文具史計簿具文而已西漢宣紀秦任刀筆吏爭以苛察相髙其敝徒文具亡實前漢張釋之傳隠逸經肥遯無不利君子獨立不懼遯世無悶不事王侯髙尚其事易考槃在澗碩人之寛詩儒有上不臣天子下不事諸侯禮記隠居以求其志隠居放言賢者辟世其次辟地子路遇丈人以杖荷蓧子路以告子曰隠者也論語子隠於窮閻漏屋三公不能與之爭名荀子棄赫奕之朝華避僨車之險路吟笑蒼崖之間而萬物化為埃氛怡顔豐柯之下而朱户變為繩樞握耒甫田而麾節忽若執鞭啜荈瀨泉而太宰同乎藜蓼泰爾有餘歡於無為之塲忻然齊貴賤於不爭之地含醇中樸無欲無憂全真虚氣居平味淡恢恢蕩蕩與混成等其自然抱朴子名混朝市心在世外文中子史賈誼曰吾聞古之聖人不居朝廷必在卜醫之中史記司馬季主傳互入無往不自得帝少與嚴光同遊學即位以物色訪之累徴乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家通鑑光武紀四皓潛光隠曜東漢郭𤣥傳志凌青雲之上身晦泥汙之下後漢逸民傳法真隠居不仕前後四徴終不屈友人郭正曰法真名可得聞身難得而見逃名而名我隨避名而名我迫通鑑漢順紀互入欲晦而彰枕石潄流恬淡於浩然之域蜀志彭羕傳殷浩累辭徴辟屏居墓所㡬將十年時人擬之管葛通鑑晉穆怡居塵外髙謝人寰笑詠山林遊泛江海當此之時蕭然有凌霞之舉晉謝安傳名可聞而身不可見徳可仰而形不可覩晉宋纎傳養粹岩阿銷聲林曲晉隠逸傳周顒處山舍王儉問曰卿山中何所食曰赤米白鹽緑葵紫蓼文惠問顒菜食何味最勝顒曰春初早韮秋末晩菘南史岩壑閒逺水石清華南史隠逸傳養素丘園周韋夐詩狎玩魚鳥左右琴書拾遺粒而織落毛飲石泉而庇松柏放情宇宙之内自足懐抱之中冥心物表介然離俗北史隠逸傳陸龜䝉嗜茶置園顧渚山下乗馬升車設蓬席齎束書茶竈筆床釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至新唐書本傳上焉者身藏而徳不晦故自放草野而名往從之雖髙乘之貴猶尋軌而委聘也其次挈治世具弗得伸或峭行不可屈於俗雖有所應其於爵禄也汎然受悠然辭使人君常有所慕企慊然如不足其可貴也末焉者資槁薄樂山林内審其才終不可當世取舍故逃丘園而不返使人常髙其風而不敢加訾焉唐書隠逸傳序田遊巖居箕上髙宗幸嵩山親至其門遊岩曰臣所謂泉石膏肓煙霞痼疾者潘師正曰茂松清泉臣所須也新唐書本傳集處𤣥舍之幽門兮穴岩石而窟伏朝飲木蘭之墜露兮夕餐秋菊之落英楚辭飲石泉兮䕃松柏楚辭棲志浮雲張茂先詩髙步追許由左太沖詠史詩髙蹈風塵外長揖謝夷齊放情凌霄外嚼蕋挹飛泉郭景純遊仙詩放情青雲外小隠隠林藪大隠隠朝市王康琚招隠憩石挹飛泉攀林搴落英謝靈運詩嘉遯龍蟠翫世髙蹈文選七命潛處蓬室不干勢權文選岩藪知名郭有道碑藉草䕃松孫綽天台賦結廬在人境而無車馬喧問君何能爾心逺地自偏陶淵明詩泥蟠不用蜀秦宓論耿介拔俗之標瀟洒出塵之想亭亭物表皎皎霞外孔徳璋北山移文漸喜交遊絶幽居不用名雖有車馬客而無人世喧雲卧衣裳冷杜詩括囊經世道遺身在白雲投身霄嶺􅌍景雲林谷汲芝耕山壑髙居農野永嵗山栖木食負林壑而驕人放身霄嶺宴景雲林卑俗不可得而問時士不可得而見髙眠終古一笑昔人芝桂為伍麋鹿同曹軒裳鍾鼎如夢中也陳子昻仙菌靈芝夢魂裏李太白投竿垂餌晦幽迹於渭濵抱甕灌園絶心機於漢渚駱賔王花逕不曽縁客掃蓬門今始為君開懶性從來水竹居杜詩野袍栽薜葉山酒酌藤花駱賔王白雲深處有岩居杜牧之烟霞老此身柴門嘶馬少藤杖拜人稀人語空山答手栽松樹蒼蒼老身卧桃源寂寂春惟有胡麻當鷄黍白雲來往未嫌貧跡逺親魚鳥避世歌芝草休官醉菊花千載空桃花秦人深不見漁竿吾道在鷗鳥世人賖結茅依翠微伐木開䝉籠孤峰倚青霄一徑去不窮桃花洞裡居人滿桂樹山中任日長萬壑千峰獨閉門白雲幽卧處不向世人傳劉長卿拂衣從此去髙步躡華嵩捫蘿亦踐苔昔聞龎徳公採藥遂不返金澗餌芝术石床卧苔蘚結廬就岩窟竹房閉虛靜花藥連冬春平石藉琴硯落泉洒衣巾焚香宿華頂裛露采靈芝屢踐莓苔滑將尋汗漫期劉义詩杜門不復出乆與世情疎松月生夜涼風泉滿清聴門無俗士駕人有上皇風孟浩然惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也物外日月本不忙韓集肥遯居真包蒙養正栁集耕於寛閒之野釣於寂寞之濵韓集飲水煮松柏孟東野且欲遺姓名安能慕竹帛芝术資餱糧烟霞拂巾幘愛名之世忘名客多}
