  - {type: variant, offset: 19, length: 1, content: 馮, WYG: 之乃使趙忠等諫曰人君不當登髙登髙則百姓離散自是不敢復登臺榭東漢宦者傳武帝下令曰昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女世人謂之撾}
