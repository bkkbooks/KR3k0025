  - {type: variant, offset: 2042, length: 123, content: 驗之果得其情通監魏明紀司馬懿謂蔣濟曰智囊往矣濟曰桓範則智矣然駑馬戀棧豆爽必不能用也通監魏邵陵厲公管輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候則魂不守宅血不華色精爽煙浮容若槁木此為鬼幽二者皆非遐福之象也通監鄧颺何晏初諸葛恪少有盛名, WYG: 求賈栁}
