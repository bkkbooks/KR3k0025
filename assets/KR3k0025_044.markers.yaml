  - {type: variant, offset: 4707, length: 1, content: 嘗, WYG: 與盧仝詩古來濩落者都不事田園道心淡泊對流水生事蕭疎空掩門髙曠出塵表逍遙滌心神韋應物疏𫝊傲簪纓劉賔客弱齡植操本謝聲名中年誓心不期聞達駱賔王大鵬六月}
