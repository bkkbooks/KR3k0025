  - {type: variant, offset: 3264, length: 701, content: 聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆邦家之人也鄧玄茂有為而無終外要利名內無關鑰貴同惡異多言而妒前多言多釁妒前無親以吾觀此三人者皆將敗家遠之猶恐禍及況眤之乎通監魏紀李密狡猾好反今遣之如投魚於泉放虎於山必不反矣通監唐高祖盛彥師曰李密聲言向洛實欲出人不意走襄城就張善相耳密既度陝果踰山南出同上張鎬言許叔冀狡猾多詐臨難必變通監唐肅宗張九齡言於張說曰宇文融承恩用事辯給多權數不可不備說曰鼠輩何能為融及李林甫彈奏說通監唐紀互見患生所忽路岩佐崔鉉於淮南為度支使既而入為監察御史不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十巖今已入翰林如何得老皆如鉉言通監唐懿宗徐曠字文遠博通六經時耆儒沈重講太學授業常千人文遠從之質問曰先生所說紙上語爾若奧境彼有所未見尚何觀馬唐書張昌齡王公謹舉進士皆為王師旦所絀太宗問其故荅曰昌齡等華而少實其文浮靡非令器也唐書張昌齡傳元結家瀼濱自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎漫遂顯新唐書本傳裴行儉曰王勃等雖有文華而浮躁淺露豈享爵祿之器耶通監唐紀張孝忠曰朱司徒可與共始難與共終也通監唐紀盧藏用隱終南山晚乃徇權利司馬氶正召至闕下藏用指南山曰此中大有佳處氶正徐曰仕官之捷徑耳藏用慚新唐書本傳互入自納敗闕岑文本曰馬周鳶肩火色騰上必速恐不能久唐書本傳傳記慕容垂請至鄴拜墓苻堅許之權翼諫曰垂猶鷹也飢則附人飽則颺去遇風塵之會必有凌霄之志唯宜急其羈絆不可任其所欲堅不從晉書載紀王敦為太子舍人潘滔見而目之曰處仲蜂目巳露但豺聲未振若不噬人亦當為人所噬晉中興書集察其志意所望殊高陳子昂尚不能歷其藩翰況堂奧乎唐文粹言行之間足見真態劉賓客僧臨大道閱浮生來往憧憧利與名二十八年何限客不曾閑見一人行, WYG: 求㓗}
