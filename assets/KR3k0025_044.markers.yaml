  - {type: variant, offset: 4208, length: 0, content: '', WYG: 釣臺青漢不回駕白雲長掩闗香掩蕙蘭氣韻髙鸞鶴聲歸卧養天真鹿裘烏角巾茂陵閒乆病彭澤醉長貧性閒鷗自識心逺鶴先知許用晦自敎青鶴舞分採紫芝苗卷簾無俗客應只見雲來張文昌蘿蔦自為幄風泉何必琴猿鳥聲自呼風泉氣相激麟出無應鴻飛入㝠張九齡地偏芝桂長境勝烟霞異機閒魚鳥狎體和芝术鮮李義山懐材幽藪藏頴重崖絶望岩廊之榮遺形斤斧之患駱賔王鳥啼花落}
