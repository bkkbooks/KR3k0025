  - {type: variant, offset: 4709, length: 1, content: 賦, krp: 閒意仙鶴千年無躁容劉賔客相對盡日言不及名與利髙謝人間鶴唳無凢聲但拂衣冠莫回顧的無官職趂人來上無羅弋憂下無羈鎻牽蘿襟蕙帶竹皮冠雖到塵中不染塵白樂天四皓有芝輕漢祖功名富貴不能釣之有山水閒淡之思心與青雲自有期杜牧之處世似孤鶴遺榮同蛻蟬皮日休扁舟泛湖海長揖謝公卿劉义糠粃禮義錙銖功名王旡功髙情自與俗人疎張文昌東陵解印時賣故侯之𤓰彭澤無官詎有公田之黍王維集青山有雪諳松性碧落無雲稱鶴心許用晦味道腴以代膏粱含徳輝而輕軒冕遺榮養素恬淡如也栁文公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻㝠㝠胡可量也張九齡張良郤粒之懐錙銖軒冕范蠡扁舟之志夢想江湖中山寂寞幽蘭自榮雖有繒繳不羈㝠㝠以聰明為駢枝名聲為纒繳無耗氣無焚和退黙葆真獨與道往鷗鳥不動家人忘貧是行也朶頥者知懼}
