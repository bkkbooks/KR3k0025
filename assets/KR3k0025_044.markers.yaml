  - {type: variant, offset: 341, length: 1, content: 獲, WYG: 為飾讓文選讓郡公表無使名過實崔子座銘在室如賔寧慙屋漏不貪為寶每畏人知江總作歐陽頠墓誌不懐寶以害賈不飾表以招累靜守約以不矜動因循以簡易任自然以為姿無誘慕於當世張華鷦鷯賦以智謀而進者有時而衰以朴厚而知者無迹而固劉賔客雖有數斗玉不如一盤粟李太白集大農之家不待珠璣然後為富杜牧之淫文艷韵無一字焉白侍郎唯憑野老口不立政事碑杜荀鶴互見政事至寶不雕琢韓集互入不待矯揉多花常早落桃李不如松唐詩本朝詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五穀必可以療饑㫁㫁乎如藥石必可以伐病東坡鳬繹先生集序蒼然澗下松不願世雕刻蘇子由集尚朴經大禮必簡喬而野朴而不文大羮不和貴}
