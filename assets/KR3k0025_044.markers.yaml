markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷四十四宋潘自牧撰性行部欺罔經譸張為幻尚書以空作見文書與實不相應也周禮註假於鬼神時日卜筮以疑衆殺記子飾智以驚愚莊子狎侮欺紿亡所不為向氏以國氏之謬已也以國氏之重罔已也燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而歎指舍曰此若先人之廬乃潸然而泣指壠曰此若先人之塜其人哭不自禁同行者啞然大笑曰予昔紿若此晉國耳列子互入愚暗楚人握山雉者欺路人曰鳳凰也路人曰我聞鳳凰今始見矣請買千金弗與請加倍乃與之尹文子史趙髙獻鹿謂之馬二世問左右此乃鹿也左右皆曰馬也二世驚自此為惑乃召太卜令卦之太卜曰奉宗廟鬼神齋戒不明乃至於此李斯傳互入阿附瞽說欺天西漢郭承傳滿讕誣天谷永傳元光二年李少君以祠竈却老方見少君善為巧發竒中甞從武安侯飲坐中有九十餘老人少君乃言與其大父游射處老人為兒時從其大父}
