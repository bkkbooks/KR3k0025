  - {type: variant, offset: 2166, length: 1097, content: 帝深器重之而恪父瑾常以為戚曰非保家之主也父友奮威將軍張承亦以為恪必敗諸葛氏通監魏高貴卿公帝嘗問陳矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也通監魏明紀吳主醉問費禕曰楊儀魏延牧豎小人也雖常有鳴吠之益於時務然既已任之勢不得輕若一朝無諸葛亮必為禍亂矣同上陸遜嘗謂恪曰在我前者吾必奉之同升在我下者則扶接之今觀君氣陵其上意蔑乎下非安德之基也通監魏高貴鄉公周瑜曰操雖托名漢相其實漢賊桓溫請謝安為司馬高松戲之曰卿高臥東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色晉書謝安互見責備陳登謂呂布曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不然當如養鷹飢則為用飽則颺去魏志裴顧薦韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就哉通監晉惠帝互入不苟合山濤見王衍曰何物老嫗生此寧馨兒然誤天下蒼生必此人也通監晉書王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制通監晉紀王澄胡毋輔之等以任放為達或至裸體樂廣聞而笑曰名教中自有樂地何必乃爾晉書樂廣傳羊祜謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也晉羊祜傳董養見王彌而謂之曰君好亂樂禍若天下有事不作士大夫矣通監西晉世祖陶侃遺荀崧書曰杜曾凶狡所謂鴟梟食母之物此人不死州土未寧足下當識吾言通監晉愍紀范通謂王濬曰卿功則美矣然恨所以居美者未盡善也卿旋旃之日角巾私第口不言平吳之事若有問者輒曰聖主之德群帥之力老夫何力之有此藺生所以屈廉頗也王渾能無愧乎通監西晉世祖紀劉惔每奇桓才然知其有不臣之志謂會稽王昱曰溫不可使居形勝之地其位號常宜抑之通監晉穆紀劉惔曰但恐克蜀之後溫終專制朝廷同上王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而巳既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之晉書本傳何尚之遷吏部郎告休定省傾朝送別及至郡叔度謂曰聞汝來此傾朝相送可幾客荅曰殆數百人叔度笑曰此送吏部郎耳非關何彥德也宋書謝弘微未年嘗與友棊友西南棊有死勢復一客曰西南風急或有覆舟者友悟乃救之弘微大怒投局於地識者知其暮年之事果以此歲終南史太傳義恭與義宣書曰往時仲堪假兵靈寶尋害其族孝伯推誠牢之旋踵而敗臧質少無美行第所具悉今藉西楚之強力圖濟其私凶謀若果恐非池中物也通監宋世祖紀蘇湛曰凡謀大事當得天下奇才與之從事令但與長安博徒謀之此有成理不通監梁高祖高歡謂澄曰景專制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕御也同上李崇郭祚游肇曰伯緒即宋維凶踈終傾宋氏若得殺身幸矣通監梁紀王晞曰我少年以來閱要人多矣得志少時鮮不顛覆通監陳世祖傳嘏曰太初志大其量能合, WYG: 溷䑕}
