  - {type: variant, offset: 14, length: 0, content: '', WYG: 知也上祭黄帝塜橋山釋兵須如上曰吾聞黄帝不死今有塚何也公孫卿曰黄帝已仙上天羣臣思慕葬其衣冠情不覆其貌者謂}
  - {type: page-break, offset: 14, content: '', id: KR3k0025_WYG_044-4a, image: WYG0931/WYG0931-0222a.png}
  - {type: variant, offset: 14, length: 0, content: '', krp: 知也上祭黄帝塜橋山釋兵須如上曰吾聞黄帝不死今有塚何也公孫卿曰黄帝已仙上天羣臣思慕葬其衣冠情不覆其貌者謂}
  - {type: variant, offset: 15, length: 2, content: 敢攖, WYG: 偽毀譽失其真者謂之誣言事失其類者謂之罔前膠東相王成偽自増加流民八萬口蒙顯賞是後俗吏多為虛名云通鑑漢武昔秦始皇使徐福發男女入海求仙採藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以術窮詐得誅夷伏辜通鑑漢元紀盜賊始發其源甚微部伍吏人所能擒也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通鑑漢平紀譬猶畫工惡圖犬馬而好作鬼魅誠以事實難形而虛偽不窮也通鑑漢殤紀繁文偽飾欺天罔人通鑑𤣥黄改色馬鹿易形東漢王逸傳時宦官並起第宅擬制宫室帝常登永安候臺宦官恐}
  - {type: page-break, offset: 15, content: '', id: KR3k0025_WYG_044-4b, image: WYG0931/WYG0931-0222b.png}
