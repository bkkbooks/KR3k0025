  - {type: variant, offset: 39, length: 0, content: '', WYG: 莫大於反將軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立通鑑晉紀李義深心胷險峭時人語曰劍㦸森森李義深北史李義府貌柔恭與人言嘻怡㣲}
  - {type: variant, offset: 39, length: 0, content: '', krp: 莫大於反將軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立通鑑晉紀李義深心胷險峭時人語曰劍㦸森森李義深北史李義府貌柔恭與人言嘻怡㣲}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 而隂賊褊忌凡忤意者皆中傷之時號義府笑中刀唐奸臣傳李義府柔而害物人謂之人猫唐書本傳封倫資險佞内挾數刺人主意隂導而陽合之人莫能探其膺肺唐書封倫傳鄭愔初附來俊臣俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福竟坐族誅李林甫城府深密人莫窺其際好以甘言啗人而隂中傷之不露辭色凡為上所厚者始則親結之及勢位稍逼輒以計去之雖老奸巨猾無能逃其術者李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而隂陷之李適之性疎率林甫甞謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣乆知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脱適之由是束手矣通鑑唐𤣥宗互入謟諛贄陸與璟趙約至帝前極論延齡裴帝怒形於色璟黙而不言唐書徳宗集溪谷不能喻其險鬼神無以究其變絶交論惡鳥不鳴文選面從背違意與口戾言如飴蜜心如螫厲晉仲長敖覈性賦法吏多少年磨淬出角圭將舉汝愆尤以為己階梯韓退之詩賦性專相醢韓集䑕牙穿屋虺毒吹人李衛公朋黨論人中有獸心一人千萬心孟郊方寸地九折阪仲長敖覈性賦深心藏陷穽巧言織網羅李義府背笑欣欣笑中有刀潛殺人隂陽神變皆可測不測人間笑是嗔白侍郎梟心獍貌何人覺爍鐵不在火割肌不在刀險心露山岳流語翻波濤肺肝増巧曲噂沓言柔舌杜牧之弗聲弗鳴潛此毒螫陸龜蒙蝎賦初即許之以死殉體面俱柔終乃背之而飽飛身名已遂唐文粹務實經不作無益害有益功乃成書恥名之浮於行也禮記非知之艱行之惟艱書欲行之浮於名也脩身踐言有其言而無其行君子恥之喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也君子與其有諾責也寧有已怨禮記已謂不許也言諾而不與其怨大於不許子曰素隠行怪後世有述焉吾弗為之矣記中庸君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其徳恥有其徳而無其行君子不以口譽人則民作忠君子寡言而行以成其言禮記恭儉惟徳無載爾偽書古者言之不出恥躬之不逮也禮與其奢也寧儉喪與其易也寧戚奢則不孫儉則固與其不孫也寧固君子恥其言而過其行子曰知之為知之不知為不知是知也論語子恭儉豈可以聲音笑貌為哉聲聞過情君子恥}
