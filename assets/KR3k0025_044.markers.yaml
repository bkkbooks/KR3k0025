  - {type: variant, offset: 1621, length: 419, content: 門猶不得見符融謂李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慚歎逃去通監漢桓紀或謂袁術曰堅若得洛不可復制此為除狼而得虎通監漢獻紀董昭說河內守張楊曰袁曹雖為一家勢不久群曹今雖弱然實天下之英雄也夫布粗中少親剛而無禮匹夫之雄耳曹操曰呂布一旦得一州不能據東平斷亢父太山之道乘險要我而乃屯濮陽吾知其無能為也賈詡曰劉表平世三公也不見事變多疑無決無能為也見呂布顧謂劉備曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操命緩布縛劉備曰不可明公不見呂布事丁建陽董太師乎已上並通監漢獻紀中常侍趙忠言於省內曰袁本初坐作聲價好養死士不知此兒終欲作何後漢李瓚曰世將亂矣天下英雄無過曹操袁山松後漢書姚虞俊曰張惠恕才多智少華而無實怨之所聚有覆家禍吾見其兆矣無幾何敗通監三國魏明紀或謂帝曰劉曄不盡忠善伺上意所趍而合之陛下試與曄言皆反意而問之若皆與所問反者是曄常與聖意合也每問皆同者曄之情必無所復逃矣帝如, WYG: ''}
