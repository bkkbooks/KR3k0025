  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 其處一坐盡驚少君言上曰祠竈可致物致物而丹砂可化為黄金夀可益蓬萊仙}
  - {type: variant, offset: 1, length: 0, content: '', krp: 其處一坐盡驚少君言上曰祠竈可致物致物而丹砂可化為黄金夀可益蓬萊仙}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 可見以封禪則不死黄帝是也居乆之李少君病死天子以為化去不死而海上燕齊恠迂之方士更多言神仙事矣元狩四年齊人少翁以鬼神方見拜少翁為文成將軍居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書言甚恠天子識其手書問其人果是偽書於是誅文成將軍而隱之元鼎二年丁義薦方士欒大大敢為大言處之不疑大言曰臣甞往來海中海中見安期羨門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黄金可成而河決可塞不死之藥可得仙人可致也元鼎四年齊人公孫卿曰黄帝仙登于天黄帝採首山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黄帝上騎龍與羣臣後宫七十餘人俱登天於是天子曰嗟夫誠得如黄帝吾視棄妻子如脱屣耳元封二年公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城遂至東萊宿留之數日無}
  - {type: page-break, offset: 2, content: '', id: KR3k0025_WYG_044-2b, image: WYG0931/WYG0931-0221b.png}
  - {type: page-break, offset: 2, content: '', id: KR3k0025_WYG_044-3a, image: WYG0931/WYG0931-0221c.png}
