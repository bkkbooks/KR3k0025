  - {type: variant, offset: 5, length: 1, content: 野, WYG: 病鼎湖甚巫醫無所不致不愈游水發根言上郡}
  - {type: variant, offset: 5, length: 1, content: 野, krp: 病鼎湖甚巫醫無所不致不愈游水發根言上郡}
  - {type: variant, offset: 7, length: 6, content: 眾逐虎虎負嵎, WYG: 巫病而鬼神下之上召置祠之甘泉及病使人問神君言曰天子無憂病病少愈強與我㑹甘泉病良已置酒夀宫神君非可得見聞其言與人音等時去時來來則神君所言上使人受書其言命之曰畫法其語世俗之所知也無絶殊者而天子心獨喜其事秘世}
