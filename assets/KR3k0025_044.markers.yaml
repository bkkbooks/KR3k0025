  - {type: variant, offset: 38, length: 0, content: '', WYG: 哉通鑑周紀太史公曰張儀行事甚於蘇秦要之此兩人真傾危之士哉史記貪饕險詖不閑義禮前漢書禮樂志隂賊感概師古曰隂賊懐害之意也其隂賊著於心本發於睚眦西漢郭解天下以酈寄為賣友西漢本傳公孫𢎞甞與公卿約議至上前皆背其約以順上㫖通鑑漢武鄭朋隂欲附蕭望之上疏言史髙遣客為姦利及言許史子弟罪過章視周堪堪令朋待詔金馬門後朋行傾邪望之絶不與通朋與李宫俱待詔堪獨白宫為黄門郎朋怨恨更求入許史推所言許史事曰皆周堪劉更生教我我闗東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之問𢎞恭石顯恭顯恐望之自訟即挾朋告望之等謀欲罷車騎將軍疏退許史狀谷永前後所上四十餘事略相反覆西漢石顯為人巧慧習事能探得人主㣲指内深賊持詭辯以中傷人忤恨睚眦輒被以危法通鑑漢元動靜可識而沈阻難徴深厚之性詭於情貌東漢郭太傳乘人之危非仁也東漢蓋勲傳蜀李嚴用性深刻鄉里曰難可狎李鱗甲江表傳又蜀志陳震傳載諸葛亮與董允書曰陳孝起與吾説李正方腹中有鱗甲鄉黨以為不可近劉􅓮為帝所親重帝將伐蜀朝臣内外皆曰不可􅓮入與帝議則曰可伐出與朝臣言則曰不可通鑑魏明紀晉劉毅曰一人之身旬日異狀劉襲曰事之不可}
