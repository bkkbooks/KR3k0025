  - {type: variant, offset: 25, length: 10, content: 馮婦攘臂下車眾皆悅之, WYG: 琦曰琦備位宰相二百金不可手挈若付受有憑請准律科罪期光即奏琦已服罪通鑑唐肅宗紀髙力士有養女嫠居東京頗能言宫中事女官李真一意}
