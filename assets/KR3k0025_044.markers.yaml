  - {type: variant, offset: 707, length: 523, content: 語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡左昭二十五年觀其容而知其心矣國語互見料度戎王使由余於秦秦繆公示以宮室積聚由余曰此中國所以亂也史記秦本紀尉繚說秦王王見繚亢禮衣服食飲與繚同繚曰秦王為人蜂準長目鷙鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我誠使得志於天下天下皆為虜矣不可與久游乃去史記秦始皇本紀伍子胥見吳王說伐楚之利吳公子光曰彼伍員父兄皆死於楚而員言伐楚欲自為報私讎也非能為吳乃止史記剌客專諸傳管仲世所謂賢臣孔子少之史記管晏傳論范蠡與大夫種書曰越王為人長頸鳥喙可與共患難不可與共樂種稱病王乃賜種劍自殺史記越世家楚有養由基善射去柳葉百步而射之百發而百中左右觀者數千人皆曰善射有一夫立其旁曰可教射矣養由基怒客曰夫去柳葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鉤一發不中百發盡息史記周記互見一失召百非狂夫之樂智者哀焉史記趙世家吳楚反條侯為太尉至河南得劇孟喜曰吳楚舉大事而不求孟吾知其無能為而巳矣史記游俠傳吳季札適晉說趙文子韓宣子魏獻子曰晉國其萃於三家乎史記吳世家周襄王使宰孔賜齊侯胙遇晉侯曰齊侯驕矣第無行史記齊世家景帝曰魏其者沾沾自喜耳多易難, WYG: ''}
