  - {type: variant, offset: 37, length: 0, content: '', WYG: 沈太后詣使者具言其狀髙氏辭稱實非太后驗視者益疑之徑迎入居上陽宫供奉左右誘諭百方髙氏心動乃自言是通鑑唐徳宗紀肆騁譎恠其進對皆他人莫敢言者延齡言之不疑亦人之所未甞聞徳宗頗知其詐裴延齡傳互入妄誕唐太宗責髙徳孺曰汝指野鳥為鸞以欺人主取髙官唐書豆盧革韋說甞問郭崇韜曰汾陽王本太原人徙華隂公世家鴈門豈其枝派耶崇韜曰因遭亂亡失譜諜甞聞先人言上距汾陽四世耳革曰然則固從祖也有求官者崇韜曰深知公功然門地寒素不敢相用恐為名流所嗤通鑑唐莊宗紀傳記江南呼欺曰紿通作詒集韻本朝妄自粉飾欺盲聾東坡詩傾險附反覆經彼何人斯其心孔艱為鬼為蜮詩情疎而貌親在小人則穿窬之盜也禮記匿怨而友其人左丘明恥之丘亦恥之論語子好面譽人者亦好背而毀之互入面是背非孔子曰人心險於山川難於知天天亦有春秋冬夏旦暮之期人有厚貌深情莊子互入人心難托若蜚鳥然傾側反覆言無常正行無常信惟利所在無所不傾荀子口親心疎貌合行離抱朴子史陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧扉屨可也齊侯説執轅濤塗左僖四年公孫𢎞外寛内深諸常與有隙者雖陽與善隂報其禍殺主父偃徙董仲舒於膠西皆𢎞之力也史記本傳睢真傾危之}
