  - {type: variant, offset: 4207, length: 0, content: '', WYG: 如貧賤之肆志共入商山崔琦四皓頌山林小羈鞅時人不到處苔石無遺蹤但有鷄犬聲不聞車馬喧薜衣換簪組藜杖代車馬偶得幽閒境遂忘塵俗心始知真隠者不必在山林藥圃茶園為産業野麋林鶴是交游杜門隱几塊然自居木形灰心雖鵩鳥集於前枯栁生於後不能動於心也人間榮耀因縁少林下幽閒氣味深夜後不聞龜喘息秋來惟長鶴精神韜跡匿光銷聲藏影白侍郎白雲深陋巷衰草遍閒居身依泉壑將時背路入烟蘿得地深終嵗不知城郭事手栽松竹盡成隂佩蘭䕃竹誅茅席芷武伯蒼夜眠幽洞石曉飯白雲蔬閒雲長在户姚少監月明松下房櫳靜日出雲中鷄犬喧澹然清徳居然素風寂寞柴門人不到空林獨與白雲歸王維雲山遶屋猶嫌淺歌掉漁舟}
