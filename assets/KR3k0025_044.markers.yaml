  - {type: variant, offset: 343, length: 0, content: '', WYG: 質也大圭不琢美其質也汙尊而抔飲蕢桴而土鼓器用陶匏至敬無文父黨無容此以素為貴也至貴不饗味而貴氣臭也禮記先進於禮樂野人也如用之則吾從先進論語子吾將鎮之以無名之樸老子史崔洪手不執珠玉晉書本傳斵雕為樸漢書飾偽經靜言庸違象恭滔天書言共工自為謀起事而違背之貌象恭敬而心傲狠作偽心勞日拙書行偽而堅言偽而辨禮記小人閒居為不善無所不至見君子而後厭然揜其不善而著其善大學互入有忌憚色取仁而行違居之不疑論語子居之似忠信行之似廉㓗衆皆説之自以為是而不可與入堯舜之道故曰徳之賊孟子}
