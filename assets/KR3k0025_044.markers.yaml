  - {type: variant, offset: 4705, length: 0, content: '', WYG: 忍寒苦安淡泊與清泉白石為伍東坡石菖蒲序清逺閒放超然於塵垢之外東坡放鶴亭記體備松柏姿氣含芝术熏幽人隠几寂無語心在飛鴻滅没間道人有道山不孤白雲舊有終老約東坡詩山中無歴日寒盡不知年古今詩話不用閉門防俗客愛閒能有㡬人來李文靖詩移家尚恐青山淺隠几惟知白日長謝景山詩俗氛無因來烟霞作輿衛黄魯直詩富有林泉樂清無市井忙邵堯夫避世山林中衣草食芋栗寵辱兩忘輕世味冰霜不到傲天工蘇子由集髙尚經上九不事王侯髙尚其事上九鴻漸于陸其羽可用為儀吉易儒有上不臣天子下不事諸侯禮記不義而富且貴於我如浮雲不降其志不辱其身伯夷叔齊與論語子禄之以天下弗顧也繫馬千駟弗視也孟子削跡捐勢不為功名莊子以榮華為穢汚以厚玩為塵壤以聲譽為朝露抱朴子子思曰吾不取於人謂之富不屈於人謂之貴孔叢子史魯仲連不肯仕宦任職好持髙節本傳莊周曰我寧遊戲汙瀆之中自快無為有國者所羈終身不仕以快吾志史記跨世陵時逺蹈獨遊東方朔贊師友造化而不為世俗所役者也漁釣於一壑則萬物不奸其志棲遲於一丘則天下不易其樂不絓聖人之罔不齅驕君之餌蕩然肆志談者不得而名焉西漢班固序傳𦕈然絶俗離世西漢王褒傳雖在布衣之列環堵之中晏然自得不易萬乗之尊又可得而賤乎後漢樊英傳傳記顧況志向疎逺有時宰招致將命好官況答詩曰四海如今已太平相公何用喚狂生此身還似籠中鶴東望滄溟呌一聲李綽尚書故實集鳳不貪餧而妄食飲余馬於咸池總余轡於扶桑楚辭蹈洪崖之遐迹紹巢許之絶軌翔區外以舒翼超天衢以髙跱蔡伯喈碑文蟬蛻濁穢之中浮游塵埃之外皭然泥而不滓推此志與日月爭光可也班孟堅作離騷序不求聞達於諸侯諸葛亮出師表名位為糟粕勢利為塵埃晉潘尼安身論傲世忘榮絶棄人事成公子安嘯賦丘園東國錙銖軒冕齊竟陵王行狀傲墳素之塲圃步先哲之髙衢潘安仁閒居賦封已養髙勢動人主文選運命論魯連讓齊爵遺組居邯鄲獨立矯世陳子昻集軒冕猶埃塵駱賔王逸興横素襟喜結海上契自為天外賔李白蕭疎外聲利不能隨皁蓋自醉逐浮萍杜詩少室山人李渤索價髙兩以諫官徴不起}
