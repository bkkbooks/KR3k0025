  - {type: variant, offset: 4670, length: 4, content: 南面而制, WYG: 洗昏蒙雲松可以遺身世俗塵不飛人意自逺唐文粹朝飲花上露夜卧松下風王昌齡閎覽古先遐蹈物表芝耕雲卧聲利不入唐文粹手摇白羽扇脚踏青芒履聞道鶴書徴臨流還洗耳孟浩然雖有柴門長不閉片雲孤木伴身閒猶嫌住久人知處見擬移家更上山賈浪仙卜築青巖裡雲蘿四布隂虛室若無人喬木自成林時有清風至側聞樵採音儲光羲烟火晝不盡蓬蒿春更深錢起落葉遍空山何處尋行跡韋應物白雲髙㡬許全屬採芝翁羅隠傳記亭亭明月逺照山扉肅肅清風旁來澗牖通典許由隠箕山無盃器以手捧水飲之人遺一瓢得以飲飲訖挂於木上風吹嚦嚦有聲猶以為煩遂去之逸士傳龎公至老不入襄陽城襄陽耆舊傳周續之入廬山預逺公浄社又與劉遺民陶淵明號潯陽三隠廬山記武陵隠士晦迹桃源當此晉年猶謂暴}
