  - {type: variant, offset: 1015, length: 1430, content: 為相薦人或起家至二千石權移主上上曰君除吏盡未朕亦欲除吏田蚡治宅甲諸弟田園極豪腴市買郡縣器物相屬於道前堂羅鐘鼓立曲旃後房婦女以百數諸侯奉金玉狗馬玩好不可勝數同上熏灼四方西漢班固敘傳公卿以下畏石顯重足一跡顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位通監漢元紀五人同日封故世謂之五侯通監漢成紀代相陳豨從車千乘而吳濞淮南皆招賓客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳騖於閭閻權行州域力折公侯通監漢武紀丁傳董賢用事諸附離者或起家至二千石西漢楊雄傳列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆籍王公之埶競為游俠通監漢武紀黨親連體根據於朝廷通監漢宣紀其四方調發歲時貢獻皆先輸上第於冀乘輿乃其次焉吏民齎貨求官請罪者道路相望百官遷召皆先到冀門牋檄謝恩然後敢詣尚書通監漢柏紀黃門常侍及中使伯榮往來甘陵尚威儀翕赫震動郡縣王侯二千石至為伯榮獨拜車下通監漢殤紀四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墮通監漢柏紀李固曰中常侍在日月之側聲勢振天下通監東漢手握王爵口含天憲運掌則使餓吏富於季孫呼噏則令伊顏化為桀跖東漢朱暉傳指撝足以震風雨叱咤可以興雷電東漢皇甫嵩傳埶家多所宜咳唾自成珠被褐懷金玉蘭蕙化為芻東漢趙壹傳問起居者車如流水馬如游龍東漢皇后紀帝以惠琳道人善談論因與議朝廷大事遂參權要賓客輻湊門車常有數千兩四方贈賂相係方筵七八座上桓滿琳著高屐披貂裘置通呈書佐會稽孔覬詣之遇賓客填咽暄涼而已覬慨然曰遂有黑衣宰相可謂冠屨失所矣通監南史宋高祖紀忤意者嚴霜夏零阿旨者膏雨冬澍榮枯由其唇吻廢興候其指麾通監隋高祖竇霍勢傾中外藩鎮將帥多出神策軍臺省清要亦有出其門者矣通監唐德宗楊國忠相禳袂扼腕公卿以下頤旨氣使莫不震慴通監唐紀劉晏任職久勢軋宰相要官華使多出其門唐書本傳自江淮茗橘珍甘常與本道分獻競欲先至雖封山斷道以禁前發晏厚貲致之常冠諸府唐書劉晏傳士之浮競甘進者爭出其門赫然勢焰可炙唐書韋渠牟傳當其黨盛門若沸羹唐書王丕傳楊虞卿依柔善諧麗權倖倚為姦利歲舉選者皆走門下無不得所欲升沉在牙頰間唐書慕容超時公孫五樓為侍中內外无不憚之王儼諂事五樓時人語曰欲得侯事五樓晉書互入趍時天憲在口勢迴日月舊唐書盧杞為相朋附者咳唾立至青雲睚眥者顧盻己擠溝壑唐書桑維翰權勢既盛四方賂遺歲積鉅萬五代晉舉動回山海呼吸變霜露范蔚宗宦者論阿旨曲求則光寵三族直情忤意則參夷五宗同上傳記事非權不立非勢不成戰國策集俛仰生榮華咄嗟復彫枯左太沖詠史詩冠蓋輻湊衣裳雲合輜軿擊轊坐客怕滿蹈其閫閾若升闕里之堂入其奧隅謂登龍門之阪文選敘溫郁則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言文選絕交論寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐漱興雲雨呼吸下霜露九域聳其風塵四海疊其燻灼文選劉孝標絕交論服軒乘冕出於言笑之下選恩倖傳所愛光五宗所惡滅三族陳琳檄冠帶交錯方圓接軫文選張平子西京賦宗黨生光華賓僕遠傾慕選詩況聞內金盤盡在衛霍室杜詩掌握有權柄衣馬日肥輕同上聲馳而響溢風振而草靡可使尺澤之鯢奮鱗而縱海密網之鳥舉羽而翔霄柳文轉盻生光輝唐文粹權傾一國聲震八紘同上本朝吹噓死灰生氣燄談笑暖律回嚴凝歐公集經依勢作威倚法以削書君陳席寵惟舊怙侈滅義書畢命季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也記檀弓史以寵賈怨國語夫郤昭子其富半公室其家半三軍恃其富寵以汰于國其身尸於朝其宗滅於絳不然夫八郤五大夫三卿其寵大矣一朝而滅莫之哀也唯無德也國語互見勢不可恃武安負貴而好權史記灌夫等傳論田蚡為丞相, WYG: ''}
