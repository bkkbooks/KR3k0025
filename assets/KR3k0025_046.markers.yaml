  - {type: variant, offset: 198, length: 1, content: 三, WYG: 論遂列奏請舉行之荆公不可曰是又益兩參知政事也吕氏家塾記互入私意温粹經言念君子温其如玉温温恭人維徳之基詩即之也温論語史温顔和辭承上接下無所失意韓王信傳互入和易向寵性行淑均諸葛亮出師表何充為劉惔所貴每云見次道飲令人欲傾家釀言其能温克也晉書王景文情度淹粹宋泰始起居注集夷雅之體無待韋絃王文憲集序互入不待矯揉白璧無瑕玷孟浩然狠戾經方命圮}
  - {type: page-break, offset: 198, content: '', id: KR3k0025_WYG_046-4b, image: WYG0931/WYG0931-0261b.png}
  - {type: variant, offset: 198, length: 1, content: 三, krp: 論遂列奏請舉行之荆公不可曰是又益兩參知政事也吕氏家塾記互入私意温粹經言念君子温其如玉温温恭人維徳之基詩即之也温論語史温顔和辭承上接下無所失意韓王信傳互入和易向寵性行淑均諸葛亮出師表何充為劉惔所貴每云見次道飲令人欲傾家釀言其能温克也晉書王景文情度淹粹宋泰始起居注集夷雅之體無待韋絃王文憲集序互入不待矯揉白璧無瑕玷孟浩然狠戾經方命圮}
  - {type: variant, offset: 200, length: 9, content: 也世濟其凶增其惡名, WYG: 注言鯀性狠戾厥心疾狠不克畏死書勇而無禮則亂論語史富辰曰心不則徳義之經為頑口不道忠信之言為嚚左僖二十四年不可教訓不知話言告之則頑舍之則嚚傲狠明徳以亂天常謂之檮杌}
