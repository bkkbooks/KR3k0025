  - {type: variant, offset: 231, length: 1, content: 罰, WYG: 容舒遲見所尊者齊遫謙貌也君子荘敬日強執輕如不克執虛如執盈入虛如有人互見謹畏賓客主恭祭祀主敬禮記孔子於鄉黨恂恂如也似不能言者其在宗廟朝廷便便言唯謹爾入公門鞠躬如也如不容過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屏氣似不息者恭則不侮雖蔬食菜羮𤓰祭必齊如也出門如見大賓使民如承大祭有子曰恭近於禮逺恥辱也子見齊衰者冕衣裳者與瞽者見之雖少必作過之必趨論語子朝廷不歴位而相與言不踰階而相與揖也孟子擎跽曲拳人臣之禮也荘子史秦哀公賦無衣楚申包胥九頓首而坐左定五管寧五十未嘗箕踞榻上後漢傳記昔禹見耕者耦立而式過十室之邑則下大戴禮陵犯史温季位於七人之下而求掩其上左傳蓽門圭竇之人而皆陵其上其難為上矣左襄十無禮而好陵人怙富而卑其上子産曰子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忘不事長}
