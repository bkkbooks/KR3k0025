  - {type: variant, offset: 599, length: 386, content: 馬援曰吾從弟少游曰士生一世但長取衣食裁足乘下澤車御款叚馬為郡掾吏守墳墓鄉里稱善人斯可矣本傳互見易足洗心向善東漢郭太傳良善與人無讎魏志集人而好善雖福未至禍其遠矣徐幹中論云曾子曰云云史三郤族大多怨左成十七年子皮授子產政子產曰族大多寵不可為也左襄八年羊舌四族皆彊家也左昭五年寧成抵罪歸家持吏短長史記本傳濟南氏宗人三百餘家豪猾二千石莫能制史記郅都傳家富埶足目指氣使西漢貢禹傳田儋弟榮橫皆豪傑宗彊能得人西漢本傳班氏遠祖以財雄北邊西漢班固自敘以多財為邊也之雄豪僮僕千指富埒王者西漢班固自敘豪彊之徒武斷鄉曲西漢食貨志師古曰恃其饒富則擅行威罰也圉奪成家者為雄桀同上師古曰圉謂禁守其人摶掩成富西漢食貨志豪植大彊西漢賈誼傳寧成抵罪歸家威重於郡守西漢本傳彊者怨之歸也東漢臧宮傳其并兼者則陵橫邦邑桀健者則雄張閭里東漢酷吏傳集乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌左太沖吳都賦豪家乘聲, WYG: 丞}
