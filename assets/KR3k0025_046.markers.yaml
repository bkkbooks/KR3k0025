  - {type: variant, offset: 2918, length: 0, content: '', krp: 甚似恨雌宣武於是弛冠觧帶不覺惽然而睡不怡者數日語林畏謹經履錯然敬之无咎藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也无有師保如臨父母括囊无咎无譽盖言謹也易夙夜惟寅居寵思危㒺不惟畏怵惕惟厲中夜以興思免厥愆書夙夜匪懈以事一人小心翼翼謂天盖髙不敢不局謂地盖厚不敢不蹐戰戰兢兢如臨深淵如履薄氷温恭朝夕執事有恪不敢暴虎不敢馮河凡百君子各敬爾身温温恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷詩執虛如執盈入虚如有人擇日月以見君入境而問禁入國而問俗入門而問諱君子戒慎不失色於人若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐君言不宿於家禮記子之所慎齊戰疾君命召不俟駕行矣論語子言有招禍也行有招辱也君子其慎所立乎荀子史蕭曺文吏自愛史記漢髙紀内行彌謹武帝紀}
  - {type: variant, offset: 2919, length: 3, content: 賓客席, WYG: 辟彊子徳妻死大將軍光欲以女妻之徳不敢取畏盛滿也漢楚元王孔光沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也光嘿不應西漢本傳洞洞屬屬小心畏忌濟濟謹畏無敖戯驕恣之過谷永傳石建為郎中令奏事建讀之驚恐曰書馬者與尾而五服䖍曰作馬字下曲者而五建時上書誤作四師古曰馬字下曲者曰尾并四㸃為四足凡五今乃四不足一獲譴死矣}
