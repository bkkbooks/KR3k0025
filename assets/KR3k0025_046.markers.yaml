  - {type: variant, offset: 2959, length: 2, content: 黃雀, WYG: 蔽李徳裕傳互見朋比徳宗謂李勉曰衆謂盧杞姦邪朕故不知勉曰天下皆知而陛下不知此所以為姦邪也李勉傳黄門侍郎裴矩知必將有亂雖厮役皆厚遇之及亂作賊皆曰非裴黄門之罪故得免通鑑唐紀其姦足以亡隋其智足以佐唐姦人多才能與時而成敗也唐封倫裴矩贊牛僧孺曰帝王立法束縛姦邪唐書傳記曺操習噉野葛多飲鴆酒博物志曺操嘗云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者世説集大姦者材必有過於衆而能自媚於上王符論大則有鯨有鯤小則為梟為獍非玉燭之能調豈璿璣之能正庾信蛛絲小人熊曲綴𤓰果中杜甫掩人以自售近名以冒進欺謾於言說沓合於求取狎比其瑣細媒孽其僚友矯激以賣直詰讘以取容劉賓客以曲為形以邪為質以仁為凶以僭為吉以淫諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬭為安佚譖下謾上恒其心術妬人之能幸人之失栁文罵尸蟲包藏禍心素懐梟獍之性彰露凶徳思發豺狼之聲白樂天善柔成性佞媚為心包狼心發蠆毒舞智以固權張詐以聾上文粹本朝曺操夜卧枕圓鼓噉野葛至尺許鴆酒至一盞操之負人多矣恐人報已故先揚此聲以誑時人使之無害己意也元城語録狡猾經彼狡童兮詩析言破律亂名改作禮記史無助狡猾左昭二十六共一老禿翁何為首䑕兩端史灌夫傳張湯内懐詐心以御主外挾賊吏以為重西漢汲黯傳朱安世曰南山之竹不足受我辭斜谷之木不足為我械公孫賀傳張嶷以狡妄為猾伯晉書李密狡猾好反通鑑唐髙祖張鎬言許叔冀狡猾多詐唐肅宗傳記馮諼謁孟嘗君曰狡兔有三窟戰國䇿集忿戎王之淫狡文選􅘀狡鋒協好亂樂禍陳琳檄公平經雲行雨施天下平也君子裒多益寡稱物平施易鳲鳩}
