  - {type: variant, offset: 2953, length: 0, content: '', WYG: 夏讀書冬春射獵為二十年規待天下清乃出仕耳然不能得如意徵為典軍校尉意遂更欲為國家討賊立功使題墓道言漢故征西將軍曺侯之墓其志也而遭董卓之難興舉義兵復領兖州破降黄巾三十萬衆又討擊袁術使窮沮而死摧破袁紹梟其二子復定劉表遂平天下身為宰相人臣之貴已極意望已過矣設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤強盛恐妄相忖度言不遜之志每用耿耿故為諸君陳道此言皆肝鬲之要也然欲孤便爾委捐所典兵要實不可也何者誠恐以離兵為人所禍已敗則國家傾危是以不得慕虛名而處實禍也漢獻帝紀李勝出為荆州刺史過辭太傅懿令兩侍婢持衣衣落指口言渇婢進粥懿不持盃而飲粥皆流出霑胷勝曰衆情謂明公舊}
