  - {type: variant, offset: 2827, length: 4, content: 韋執誼計, WYG: 屢以大杯獻上不即持貽範舉杯直上頥通鑑唐昭宗傲慢經胡逝我梁不入我門詩互見貴人原壤夷俟論語子嘑爾而與之蹴爾而與之過我門而不入我室孟子互見貴人自得如山忽人如草金樓子史偃蹇左哀二朱買臣見湯湯坐牀上丞史遇買臣弗為禮張湯傳沛公至髙陽見酈食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不宜踞見長者漢書灌夫罵坐不敬汲黯為人性倨少禮西漢本傳蕭望之意嘗輕丙吉遇丞相禮節倨慢通鑑漢宣紀禰衡尚氣剛傲好矯時慢物始達潁川乃隂懐一刺既而無所之適至於刺字漫滅東漢本傳互見尚氣何曽隂駕人物鄉閭疾之如讐永嘉之末何氏滅亡無遺焉晉書互見取禍劉孝綽仗氣負才多所陵忽每於朝集會同處公卿間無所與語反呼騶卒問道途間}
