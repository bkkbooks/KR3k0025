  - {type: variant, offset: 2930, length: 1, content: 驅, krp: 斤斤謹質形於體貌後吳漢傳斤音靳闔門自守退無私交三國魏志賈詡傳吳左大司馬朱然内行修潔終日欽欽常若在戰場通鑑魏邵陵公紀文子曰不為福始不為禍終魏明紀殷浩雖被放黜口無怨言晉書本傳口不論世事西晉王衍傳陳顯達自以門寒位重遷官常有愧懼之色戒其子勿以富貴陵人通鑑齊紀李大亮身居三職宿衛兩宫恭儉忠謹每宿直必坐寐達旦通鑑唐太宗岑文本拜中書令有憂色母問之答曰非勲非舊責重位髙所以憂也有来慶者輒曰今日受弔不受賀唐書本傳苗晉卿潞州壺闗人為太守嘗入壺闗望縣門輒步曰公門當下况父母邦乎時美其恭唐書互見恭敬鄉里門陸贄在奉天小心精潔未嘗有過由是帝親倚至解衣衣之同類莫敢望新唐書本傳傳記千仭之牆禍不入門職林成回學於子路恭敬不已子路問其故對曰臣聞之行者比於鳥上畏鷹鸇下畏羅網夫人為善者少為讒者多若身不死安知禍罪不施說苑集保身𠡠行不蹈有過之地吴季重牋臨事若祭視人若嬰陳子昂集三緘謹禍胎駱賓王避權如避虎元稹集眼見心知不敢言白侍郎省中之樹訪猶不言車前之馬數而後對張九齡傳躬雖已安若敵鋒鏑味雖以甘若含氷蘗皮日休安危機鍵之語黙不出口杜牧之本朝身閒曷不長閉口天寒正好深藏手閉口豈非福東坡僭冒經管仲鏤簋朱紘山節藻梲君子以為濫矣庭燎之設由齊桓公始也大夫之奏肆夏由趙文子始也公廟之設於私家由三桓始也冕弁兵革藏於私家非禮也是謂脅君大夫具官祭器不假聲樂皆具非禮也是為亂國朝服之以縞也自季康子始也禮記子曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫孔子謂季氏八佾舞於庭三家者以雍徹臧文仲居蔡山節藻梲何如其知也論語史衣服禮秩如適左荘八商賈乗堅䇿肥履絲曳縞前漢食貨志秦陽以田農而甲一州翁伯以販脂而傾縣邑張氏以賣醬而踰侈質氏以洒削而鼎食濁氏以胃脯而連騎張里以馬醫而擊鐘皆越法矣前貨殖傳杜陵翁仲出入蒼頭盧兒傳呼甚寵前漢今民賣僮者為之繡衣絲履偏諸縁内之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈而富民牆屋被文繡天子之后以縁其領庶人嬖妾縁其履前賈誼傳奢泰則下不遜而國貧前禮樂志互見奢侈陶侃媵妾數千家僮數千珍竒寶玩富於天府晉書本傳楊素貴寵家僮數千後庭妓妾曳綺羅者以千數第宅華侈制擬宫室隋書本傳安禄山起第既成具幄帟器皿充牣其中有帖白檀牀二皆闊丈六尺銀瓶脫屛風帳一方一丈八尺於厨廏之物皆飾以金銀金飯甖二銀淘盆二皆受五斗織銀絲筐及笊篱各一他物稱是雖禁中服御之物殆不如也上每為禄山賜物常戒之曰胡眼大勿令笑我禄山入新第置酒乞降墨勅請宰相至第是日上欲於樓下擊毬遽為罷戯命宰相赴之通鑑唐𤣥宗王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通鑑後周太祖傳記唐王元寶以金銀疊為屋以銅線穿錢甃花徑中泥雨不滑時名為富窟開元遺事正直經栁下恵曰直道而事人焉往而不三黜論語子黔婁先生死被短露足孔子及門人見之謂其妻曰斜而覆足之其妻曰寧使正之不足不可斜之有餘孔家語孝子不諛其親忠臣不諂其君荘子身之所長上雖不知不以悖君身之所短上雖不知不以取賞長短不飾以情自竭若是則可謂直士矣荀子史孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣春秋公羊傳孔子曰叔向古之遺直也治國制刑不隠於親左昭十四外舉不隠仇内舉不隠子史晉世家為人峭直西漢晁錯傳義形於色班固敘傳鞠躬履方馮奉世傳師古曰踐正直之道也汲黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎汲黯面折不能容人之過合己者善待之不合者弗能忍見本傳龔遂為昌邑王郎中令面刺王過王至掩耳起走曰郎中令善愧人本傳忠果正直志懐霜雪東漢禰衡邢峙以經入授太子峙方正有儒者風厨卒進太子食菜有邪蒿峙令去之曰此菜有不正之名非殿下宜食北史栁彧正直之士國之龜寳隋書唐令則為太子勇所昵狎每令以絃歌教内人右庶子劉行本責之曰庶子當輔太子以正道何有取媚於房帷之間哉令則甚慙而不能改通鑑隋髙祖紀武三思嘗以事屬宋璟璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政獨不見産禄之事乎唐中宗正人一心事君無待於助李徳裕傳互見端介張昌宗恐太后一日晏}
