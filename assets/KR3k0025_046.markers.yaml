  - {type: variant, offset: 2950, length: 2, content: 依倚, WYG: 朝罷人人識鄭崇直聲猶在履聲中東坡詩姦邪經反道敗徳鴟義姦宄奪攘矯䖍書子大姦之人以泣自信孔叢反是獨立此小人之桀雄也荀子史掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周謂之渾敦注謂驩兜左文十八包藏禍心左昭元左右賣國反覆之臣蘇秦傳秦太子之妃曰華陽夫人無子夏姬生子異人異人質於趙趙人不禮之異人以庶孽孫質於諸侯車乗進用不饒居處困不得志陽翟大賈吕不韋適邯鄲見之曰此竒貨可居乃往見異人說曰吾能大子之門異人笑曰且自大君之門不韋曰子不知也吾門待子門而大能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西遊立子為嗣乃西見華陽夫人之姊而以竒物獻於夫人因譽子異人之賢以夫人為天夫人喜不韋因使其姊說夫人曰夫以色事人者色衰則愛弛今夫人愛而無子不以繁華時早自結於諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎夫人以為然乗間問於太子曰願得子異人立以為嗣以託妾身太子許之與夫人刻玉符約以為嗣通鑑周紀不仁而多材國之患也西漢翟方進傳張禹姦人之雄杜欽傳諸葛豐之於堪猛前譽而後毁其志非為朝廷進善而去姦也欲比周求進而已矣通鑑漢元帝紀孫寵息夫躬姦人之雄漢成帝紀飾偽以要譽釣竒以驚俗不食君禄而争屠沽之利不受小官而規卿相之位名與實反心與跡違漢殤帝紀覘視朝政鳥聲獸心私共鳴呼漢靈帝紀曺操作銅爵臺於鄴操下令曰孤始於譙東築精舍欲}
