  - {type: variant, offset: 197, length: 0, content: '', WYG: 季郈之雞鬬季氏介其雞郈氏為之金距平子怒左昭二十五年互入兩不相下為守視都尉如令為都尉必陵太守奪之治史記周陽由傳寗成為小吏必陵其長為人上者上操下如束濕薪史記本傳藺相如位在亷頗右頗曰吾羞不忍為之下我見相如必辱之本傳田蚡辭不能滿觴灌夫怒西漢桓範持節都督青徐與徐州刺史鄒岐争屋欲斬岐坐免復為兖州刺史屬鎮北将軍吕昭範與妻曰我寧作諸卿向三公長屈耳不能為吕屈也妻曰君前欲斬徐州衆人謂君難為作下今復羞為吕屈是復難為作上魏志曺爽傳樊世本氐豪佐秦王健定闗中謂猛曰吾輩耕之君食之耳猛曰非徒使君耕之又將使君炊之通鑑晉哀紀劉琨曰吾枕戈待旦志梟逆虜常恐祖生先吾著鞭耳晉書互見尚氣趨事赴功齊髙徳政恒以精神凌逼人通鑑陳髙祖王彬謂王敦曰卿昔嵗殺兄今又欲殺弟耶本傳傳記杜預書告兒古諺有書借人為可嗤借書送還亦可嗤殷芸小說集譖下慢上恒其心術栁罵尸蟲本朝王荆公在臺閣侍從時每言唐宰相令諫官隨宰相入閣最切於政道後世所當行也及入司政事而孫莘老李公擇在諫職二人者熟荆公}
