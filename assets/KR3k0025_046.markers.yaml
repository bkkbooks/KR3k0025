  - {type: variant, offset: 2911, length: 0, content: '', WYG: 見恃勢本朝目視飛鴻氣如横蜺酷吏姚紹之意岸軒傲孔帖侮玩經狎侮君子㒺以盡人心玩物喪志書簡兮簡兮詩史陳平貧或問平何肥其嫂疾之曰食糠覈耳西漢本傳上慢侮士西漢張良傳王霸至市中募人擊王郎市人皆大笑舉手揶揄之霸慙遽而反通鑑漢光武紀智者於羣愚如弄一丸於掌上通鑑魏邵陵厲公紀互見愚弄上好狎侮羣臣自太宰義恭以下不免穢辱常呼金紫光禄大夫王𤣥謨為老傖僕射劉秀之為老慳顔師伯為齴其餘短長肥瘦皆有稱目通鑑宋紀王導常枕周顗膝指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人晉書周顗傳崔俊竊言文襄帝為黄口小兒北史崔俊傳杜伏威遺陳稜隋将婦人之服以激怒之唐書傳記諸葛亮致巾幗婦人之飾以侮司馬懿魏氏春秋智伯戯康子而侮段規君子謂其一言而侮人之君相難将至矣本傳愚弄子宋人養猿號曰狙公欲與狙芧先詐之曰朝三而暮四衆狙皆怒又詐曰朝四而暮三衆狙皆喜聖人以智籠愚亦如狙公欺狙也列子史張儀説楚王曰大王誠能聽臣閉闗絶約於齊臣請獻商於之地六百里通鑑周紀嘸然陽應西漢韓信傳湯舞智以御人張湯傳如嬰兒在股掌之上東漢袁紹傳唐髙祖與李宻書曰所望右提左挈戮力同心執子嬰於咸陽殪商辛於牧野通鑑隋恭紀互見同功共事傳記虎得一狐狐曰天令我長百獸見我無不走虎以為然隨而行獸見之皆走虎不知獸畏己而畏狐也劉向新序桓温自以雄姿颯氣是司馬宣王劉越石一輩得一巧作老婢乃是劉越石妓女見温既}
