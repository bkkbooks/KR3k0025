  - {type: 'tls:seg', offset: 214, content: '', id: KR3k0025_CHANT_046-2a.35}
  - {type: variant, offset: 214, length: 0, content: '', WYG: 熊虎之狀豺狼之聲左宣四年狼子野心左昭二十七年膠西王為人賊盭言其性賊害而狠戾西漢膠西王傳貌狠自將王莽傳狠如羊項羽傳灌夫曰今日斬頭穴胷何識程李本傳用氣自行多所陵折馬援傳羊聃以狠戾為瑣伯晉傳傳記苻生麤暴無賴祖洪甚惡之生無一目年七嵗洪戯之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也崔洪十六國春秋本朝睅目知誰嗔皤腹空自脹東坡詩和易經從容以和書載色載笑匪怒伊教輯柔爾顔詩君子和而不流中庸夫敬以和何事不行禮記子冉雍使其臣如借家語和者大同於物物無得傷閡者游金石蹈水火皆可也列子薫然慈仁謂之君子無責於人人亦無責焉荘子史為霽威嚴魏相傳温顔和辭承上接下無所失意韓王傳互入温粹臣生與人無分争漢武紀粲然有文以相接驩然有恩以相愛漢書鄭當時與官屬言若恐傷之本傳卓茂自束髪至白首與人未嘗有争競通鑑漢光武紀性惟遲緩與人無傷後漢孔融傳夷粹無競唐書沈傳師傳樂廣性沖約清逺與物無竸通鑑晉恵紀集温渥浹輿𨽻顔延年詩陽和熈煕貯在顔間睦其仲季施及鄉黨含光不曜煦物如春劉賓客尊已者敬之如臣事君下已者慈之如母畜子敵已者友之如兄弟無不得志者也栁文意氣自春生髙達夫本朝不立異以為髙不逆情以干譽歐文趙清獻公為人和易與人言如恐傷之東坡撰神道碑樂易向人無不可蘇子由文拍拍滿懐俱是春邵堯夫和睦經宜兄宜弟伯氏吹壎仲氏吹箎雝雝喈喈妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥詩互入閨門父子篤兄弟睦夫婦和家之肥也睦於父母之黨禮記史是謂鳳凰于飛和鳴鏘鏘左萬石君居家子孫申申僮僕訢訢西漢石奮傳魏楊播及弟椿津家世孝友緦服同㸑男女百口無間言通鑑梁髙祖紀崔氏四世緦麻同㸑唐書髙崇文七世不異居開元中再表其閭唐書本傳元暐三世不異居家人怡怡如也本傳集塤箎鳴自合杜詩本朝劉君良累代義居尺布斗粟無私焉續世說和光同塵經不惟好異書在彼無惡在此無斁無怨無惡詩君子行禮不求變俗毁方而瓦合去已之大圭角與人小合也修其教不易其俗齊其政不易其宜禮記無可無不可在邦無怨在家無怨麻冕禮也今也純儉吾從衆鳥獸不可與同羣吾非斯人之徒與而誰與論語子栁下恵不羞汙君不辭小官雖袒裼裸裎於我側爾焉能凂我哉魯人獵較孔子亦獵較孟子和其光同其塵老子與物委蛇而同其波聖人處物不傷物不傷物者物亦不能傷也唯無所傷者為能與人相將迎荘子人知所惡者吾亦惡之荀子史聖人與衆同欲是以濟事左成六年子産曰求逞於人不可與人同欲盡濟左昭四年袁盎病免居家與閭里浮沈相隨行史記袁盎傳將相調和則士豫附史記陸賈傳無乖剌之心西漢杜欽傳不夷不恵可否之間聖賢居身之所珍也通鑑漢殤紀卓茂曰人生焉能髙飛逺走不在人間耶東漢本傳無彼此於人通鑑晉武紀集聖人不凝滯於物而能與世推移衆人皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其醨何故深思髙舉自令放為楚辭史記本傳云何故懐瑜握瑾與一世同其波流而悔吝不生􅄞叔夜書時無間言陳子昂集含光混世貴無名何用孤髙比雲月李白集隨時任其卷舒與物同其波流駱賓王願為同社人雞黍燕春秋不為崖岸斬絶之行韓文忍汙雜嚚譁恭其體貌遜其言辭栁文虬龍未化時魚鼈同一波孟東野眼看人盡醉何忍獨為醒王無功恵和得衆司空圖文或慮雷同何傷瓦合白傅集本朝借君拍板與門槌我也逢場作戯東坡集物有圭角刺人眼目亦易玷缺故君子處世常渾然}
