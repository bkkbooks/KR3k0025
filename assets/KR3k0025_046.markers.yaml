  - {type: variant, offset: 2955, length: 3, content: 勢豪似, WYG: 纔屬說年老枕疾死在旦夕君當屈并州近好為之備恐不復相見以子師昭兄弟為託勝曰忝荆州懿乃錯亂曰君方到并州勝復曰當忝荆州懿曰年老意荒不解君言勝退告曺爽曰司馬公尸居餘氣形神已離不足慮矣故爽等不復設備魏邵陵厲公紀王衍曰荆州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣晉紀安禄山傾巧善事人人多譽之蠖屈䑕伏佞辭泉湧通鑑𤣥宗李訓所奨㧞率皆狂險之士然亦取天下重望以順人心如裴度令狐楚鄭覃皆累朝俊彦為當路所軋置之散地訓皆引居崇秩唐文宗邪人必更為黨以相}
