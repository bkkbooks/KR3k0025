  - {type: variant, offset: 215, length: 0, content: '', WYG: 成則人不厭棄矣龜山語録與時髙下經損益盈虛與時借行時止則止時行則行時有泰否用有行藏易國有道其言足以興國無道其黙足以容中庸君子}
  - {type: page-break, offset: 215, content: '', id: KR3k0025_WYG_046-9b, image: WYG0931/WYG0931-0263d.png}
  - {type: variant, offset: 215, length: 0, content: '', krp: 成則人不厭棄矣龜山語録與時髙下經損益盈虛與時借行時止則止時行則行時有泰否用有行藏易國有道其言足以興國無道其黙足以容中庸君子}
  - {type: variant, offset: 216, length: 2, content: 假助, WYG: 於禮也有直而行也有曲而殺也道隆則從而隆道汙則從而汙禮記邦有道危言危行邦無道危行言孫君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之寗武子邦有道則知邦無道則愚論語子時詘則詘時伸則伸荀子史晏平仲在朝君語及之則危言語}
  - {type: variant, offset: 216, length: 2, content: 假助, krp: 於禮也有直而行也有曲而殺也道隆則從而隆道汙則從而汙禮記邦有道危言危行邦無道危行言孫君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之寗武子邦有道則知邦無道則愚論語子時詘則詘時伸則伸荀子史晏平仲在朝君語及之則危言語}
  - {type: variant, offset: 219, length: 1, content: 善, WYG: 及之則危行國有道則順命無道則衡命以此三世顯名於諸侯史記本傳君子得其時則駕不得其時則蓬累而行史記老子傳乗流則逝兮得坎則止一作坻史記賈生傳從容浮湛與時俯仰西漢司馬遷傳王戎作吏部與時浮沈晉書集孔隨時而行藏蘧與國而卷舒潘安仁西征賦伸屈須為蠖窮通莫問龜白樂天集互入委順因俗為禮人用愛戴唐文粹委曲經其次致曲曲能有誠中庸子川雖曲而動諸海塗雖曲而通諸夏揚子史河千里而一曲公羊傳記孟嘗君每與客坐語屏風後常有侍史主記所與客語知其親戚居處客去後使謝餽無所遺失春秋後序集情深禮至欵密重復劉賓客集本朝右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質古之聖賢欲行其意必有以曲成之未嘗直情而徑行也東坡集絶物經我聞其聲不見其身詩子訑訑之聲音顔色距人於千里之外是絶物也孟子史趙禹為吏以来舍無食客公卿相造請禹終不行報謝務在絶知賓友客之請孤立行一意而已西漢本傳鄧榮為人矜潔自貴於人少所與東漢本傳立異經好人之所惡惡人之所好大學子吾聞言於接輿大有逕庭不近人情荘子史諸勢在己之右必陵之士在己之左愈貧賤尤益敬與鈞史記灌夫傳舛忤膠戾乖剌劉向傳師古曰志意不和各相違背趙禹孤立行一意而已西漢本傳上互入絶物嚴延年為河南守衆人言當死者一朝出之言當生者詭殺之前漢違時絶俗為激詭之行東漢范丹傳沈懐文素不飲酒又不好戯調謝荘常戒懐文曰卿每與人異亦何可久懐文曰吾少来如此豈可一朝而變}
