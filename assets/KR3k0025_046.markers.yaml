  - {type: variant, offset: 286, length: 310, content: 頂凶通監漢獻紀竇憲姦惡貫天達地通監漢和紀夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絕東漢王符傳互入無恣素惡譬如猘狗或能噬人通監漢和紀桓溫曰男子縱不能流芳百世亦當遺臭萬年晉書杜絕言路掩蔽聰明以成其姦妬賢嫉能排抑勝己以保其位通監唐元宗集未革狼心仍懷豕突駱賓王未悟傾巢之兆敢懷拒轍之心同上惡稔禍盈親離眾叛人神共棄天地不容白樂天本朝袁紹以十倍之眾大敗於官渡僅以身死而操歛兵不追者何也所以緩紹而亂其國也東坡集經積善之家必有餘慶易坤卦互見種德吉人為善惟日不足書泰誓宗族稱孝焉鄉黨稱悌焉語子罕善人為邦百年亦可以勝殘去殺矣語季路子天道無親常與善人老子和大怨章史善人天地之紀也左成十五年東平王曰為善最樂後, WYG: 長吏前}
