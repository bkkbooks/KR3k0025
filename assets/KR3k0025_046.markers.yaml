  - {type: variant, offset: 3063, length: 13, content: 強掩弱眾暴寡詐欺愚勇侵怯同, WYG: 史砥節首公西漢王尊傳衡者所以平萬物也律歴志董仲舒曰天有所分予予之齒者去其角傅其翼者兩其足本傳賞不避仇讎罰不擇骨肉西漢據此之公無私如天地賈誼傳賞不遺逺罰不阿近爵不可以無功得刑不可以貴勢免習鑿齒曰諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怒者以其無私也魏明帝紀吾心如秤不能為人作輕重蜀諸葛亮傳王𢎞曰劉粹無私必無憂也南史宋髙祖紀劉子翼性剛直朋友有過常面責之李百藥常稱劉四雖復罵人人終不恨}
