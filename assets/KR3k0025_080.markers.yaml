  - {type: variant, offset: 334, length: 0, content: '', krp: 燕冠軍將軍宜都王鳳每戰奮不顧身前後大小二百五十七戰未嘗無功通鑑晉武紀薛安都北征至陜下魏多縱突騎衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳紗兩襠衫馬亦去其裝馳入賊陣猛氣咆勃所向無敵當其鋒者無不應刃而倒如是數四每入衆無不披靡宋書宋魯爽世梟猛咸云萬人敵薛安都單騎直入斬之皆云關公斬顔良不是過也齊書陳慶之四十七戰所向無前南史東魏丞相宇文泰常謂人曰諸將對敵神色皆動唯賀㧞公臨陳如平時真大勇也通鑑梁武紀羊侃膂力過人所用弓馬上六石梁書飛鋋雷擊鋒無前對南史摧鋒陷陣後魏書耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須左手㧞刀右手把矟直斫慎勿皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不爾若不能殺賊又不能爲人所傷何異逐坐人乎後周書武冠六軍後魏楊大眼齊神武遣韓軌濟華州襲王羆羆不覺比曉軌衆已乗梯入城羆尚卧未起聞閣外匈匈}
  - {type: variant, offset: 335, length: 0, content: '', WYG: 聲便袒身露髻徒跣持一白梃大呼而詬曰老羆當道卧貛子那敢過敵見驚退北史李弼弟􅋆身小而勇每躍馬陷陣隠身鞍甲之中敵見皆曰避此小兒宇文泰曰膽决如此何必八尺之軀耿令貴殺傷多甲裳盡赤泰曰觀其甲裳足知令貴之勇何必數級通鑑梁武紀衝梯竿長五十丈驍果吴興沈光升其端臨城與高麗戰短兵接殺數十人高麗人競擊之而墜未及地適遇竿有垂絙光接而復上通鑑隋煬帝尉遲敬徳戰善避槊每用單騎入賊羣刺之不能傷又能奪取賊槊還刺之新唐書本傳單雄信驍㨗善用馬槊名冠諸軍軍中號曰飛將通鑑唐太宗太宗征遼東薛仁貴白衣腰鞬兩弓呼而馳唐本傳喜得虎將唐書婁師徳與吐蕃戰八遇八克同上一鼓而破一麾而奔唐李晟傳横當冦鋒李晟提孤軍抗羣賊同上馬璘武藝絶倫在涇八年敵不敢犯爲中興勇將唐書馬璘轉鬬至鳳翔值吐蕃圍城璘單騎先士卒奮擊俘斬千計明日敵復請戰璘開懸門以待之敵引退曰此將軍不惜死宜避之遂去通鑑唐太宗紀搴旗蹈軍出入若神唐李光顔傳戰無前敵唐龜兹傳善射者謂之挽强通鑑唐順宗集睚眦則挺劍喑嗚則彎弓麾城若振槁搴旗若顧指左太沖吴賦將軍死綏咫尺無却所向風靡文選百樓忽起登雲霄而俯臨萬弩俱發随雷霆而並震揚兵於九天之上決勝於千里之中徐陵作章昭逹誌棄身鋒刃端白馬行芒氣彌銳文選雲撤叛渙席卷䖍劉吴都賦決命爭首陷陣摧兇氣勝青雲精貫白日陷陣摧鋒戈翻落日刃決浮雲氣横遼碣志掃獯戎陳子昻集拔距從軍揚麾挑戰征斾凌沙幕戎衣犯霜霰戈文耿耿懸落星馬足駸駸擁飛電終取俊而先鳴豈論功而後殿叱咤則江山揺蕩指揮則林壑飛騰舉鵬力以揚威耀犀渠而賈勇擁拔山超海之雄驅籋景騰雷之騎賫霜戈而直進指雲陣以長驅駱賔王裂眦大怒磨牙欲吞不待成師固將身先士卒嘗思盡敵不以賊遺君父矢集月窟劍斬天驕疏崑崙使西倒縛呼韓令北面目無先零氣射西旅大小獨當三百戰縱横只用五千兵刃樓蘭之腹繫郅支之頸骨氣猛毅王維掉倚天之劍彎落月之弓李白殺氣横千里軍威動九區李白射穿七札劍敵萬人張說判身入矛㦸輕敵比錙銖元微之深入其阻大挫其鋒白傅集所用皆鷹騰破敵過箭疾將軍膽氣雄臂懸兩角弓貫穿百萬衆短小精悍姿屹然强冦散横殺氣而獨往杜詩春秋方壯雄武才彎弧叱浪連山開韋應物集劍揮雷霆斾卷風雨火千旗而四面風動雷萬鼓而一道地裂金鼓所向氷消草靡唐文粹威陳八陣役風雨劉賔客眦血横灑朱殷金甲􅀈㦸而墜應弦而倒者數千萬人可謂三軍之絶也勇冠三軍衆無一旅横倚天之劍揮駐日之戈吟嘯四顧熊羆兩集上可以決天雲下可以絶地維翕振虎旅赫張王師退如山立進若電逝氣吞三軍力崩大敵雲麾鐡騎山動地湧率偏軍横絶漢䇿匹馬陷重圍揺轆轤而百萬洞開驅槖駞而沙塲一掃聲振北地氣慴東方唐文粹季}
