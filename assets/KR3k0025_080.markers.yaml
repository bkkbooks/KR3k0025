  - {type: variant, offset: 311, length: 5, content: 郭璞遇顏含, WYG: 隠若一敵國後漢吴漢傳國之心膂後漢李膺傳帝使羊祜卧䕶諸將帝謂紀瞻曰卿爲朕卧䕶六軍所益多矣晉書賢於長城逺矣唐李勣傳帝幸陜倚以爲重唐李光弼傳持重安邉唐書王忠嗣傳提孤軍抗羣賊身佩安危而氣不少衰唐李晟傳選將必擇其竒李靖對唐太宗傳記國之大事存亡之道在於命將將者國之輔也授之以斧曰從此至天將軍制之授之以鉞曰從此至地將軍制之六韜集指鄭則三軍白首麾晉則千里流血七命馬服爲趙將疆場得清謐盧諶詩趙奢正疆場秦人折北虜臨危奮節保國全城選詩四夷聞風失匕筯劉賔客驍勇經進厥虎臣闞如虓虎詩子勇士不忘喪其元孟子白刃交於前視死若生者烈士之勇也莊子楚人輕利僄遫卒如飄風荀子史齊髙固曰}
