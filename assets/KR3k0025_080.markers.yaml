  - {type: variant, offset: 874, length: 311, content: 可求兮正身履道以俟時曹大家東征賦雖無玄豹姿且隱南山霧謝眺詩仲尼旅人文王明夷苟非其時聖賢低眉李太白天馬長鳴待駕馭杜詩未展從東駿空戢圖南翼駱賓王勉哉耘其業以待歲晚收填窗塞戶慎勿出暄風暖景明年日並韓文低回且向籠間宿奮迅終須天外飛白樂天潛龍須待一聲雷杜牧之六翮未因風武伯蒼龍蟠泥中未有雲不能生彼昇天翼張文昌天矯太空鱗曾為小泉蟄孟東野夫豫章珠璣鏌釾毛嬙終不慮隱櫃撓櫃一作櫝撓一作橈帷之為患而擁腫礫石鈆鈍宿瘤之排蔽但發有疾徐耳權德輿蟄龍三冬臥老鶴萬里心唐文粹冬去冰須泮春來草自生馮道互見委順本朝徘徊且垂翼會有秋風時歐公集龍不冬躍螢能夜飛君子小人各有其時邵堯夫經不知命無以為君子也語子怨夭折者不知命者也列子力命怨貧窮者不知時者也列子湯問, WYG: 識皆爲名將}
