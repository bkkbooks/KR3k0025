  - {type: variant, offset: 1663, length: 1, content: 儀, krp: 范文正一見皆稱其有將相之器果能爲國立功爲時名將名臣傳老將經維師尚父時維鷹揚方叔元老克壯其猶詩史羌豪相數責曰語汝無反今天}
  - {type: variant, offset: 1665, length: 2, content: 相魯, WYG: 遣趙將軍來年八九十善為兵前漢馬援曰臣雖老尚能披甲上馬援據鞍顧盼以示可用上笑曰矍鑠哉是翁也東漢馬援傳畢衆敬年七十鬚髪皓白而氣力未衰據鞍馳騁有若少壯後魏書賀若誼年老而筋力不衰猶能重鎧上馬爲北夷所憚隋書吐谷渾冦邉帝謂侍臣曰靖能復起爲帥乎李靖往見房𤣥齡曰靖雖老尚堪一行帝以爲西海大總管靖決䇿深入踰磧石山大戰數十多所殺獲殘其國國人多降吐谷渾自剄死新唐書本傳王𢎞贄宿將習事通鑑集聞休鬭戰心還癢見說烟塵眼却開王維集本朝宿將何承矩摧鋒百戰塲欒城集臂健尚嫌弓力軟眼明猶識陣雲髙青箱雜記世將史項羽世世爲楚將人曰項氏世世將家有名於楚史記李晟克京師市不改肆愬平蔡亦如}
