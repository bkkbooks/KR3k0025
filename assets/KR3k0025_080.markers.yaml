  - {type: variant, offset: 334, length: 0, content: '', WYG: 燕冠軍將軍宜都王鳳每戰奮不顧身前後大小二百五十七戰未嘗無功通鑑晉武紀薛安都北征至陜下魏多縱突騎衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳紗兩襠衫馬亦去其裝馳入賊陣猛氣咆􅣋所向無敵當其鋒者無不應刃而倒如是數四每入衆無不披靡宋書宋魯爽世梟猛咸云萬人敵薛安都單騎直入斬之皆云關公斬顔良不是過也齊書陳慶之四十七戰所向無前南史東魏丞相宇文泰常謂人曰諸將對敵神色皆動唯賀㧞公臨陳如平時真大勇也通鑑梁武紀羊侃膂力過人所用弓馬上六石梁書飛鋋雷擊鋒無前對南史摧鋒陷陣後魏書耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須左手㧞刀右手把矟直斫慎勿皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不爾若不能殺賊又不能爲人所傷何異逐坐人乎後周書武冠六軍後魏楊大眼齊神武遣韓軌濟華州襲王羆羆不覺比曉軌衆已乗梯入城羆尚卧未起聞閣外匈匈}
