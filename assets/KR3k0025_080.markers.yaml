markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 委順, WYG: 欽定四庫全書記纂淵海卷八十宋潘自牧撰兵戎部稱誦子夫是之謂天下之將通神明矣荀子大將民之司命抱朴子内精八陣之變外盡九成之宜同上史晏嬰薦穰苴曰文能附衆武能威敵史穰苴傳吴起善用兵司馬穰苴不能過也史本傳韓千秋軍鋒之冠史尉陀傳此真將軍西漢周亞夫傳漢飛將軍將軍者國之爪牙也怒形則千里悚威震則萬物伏是以名聲暴於夷貉威靈憺乎隣國漢李廣傳真將軍亞夫何以加唐段志元𫝊攬轡安閒光弼長於憑城通鑑唐肅宗落落有將帥之風李晟舊賛􅌨沐風雨暴露郊原披荆榛而刁斗夜嚴逐豺狼而穹廬曉破動皆如意古無與京唐書宣宗紀鄭畋號疾雷將唐書本傳集性行淑均曉暢軍事諸葛出師表擁旄爲漢將汗馬出長城文選轅門有光武旅増氣劉賔客忠憤暗彰義勇潜發變疾風雨謀先鬼神中推赤心前蹈白刃戰功足以冠當時壯節足以垂後代忠信以爲幹義勇以爲器器與幹合鬱成將材仗忠履義體仁養勇學究韜略藝窮騎射負幽燕之勁氣有將相之長才内作心腹外張爪牙身作師律心爲戰鋒金方之氣凝爲將星學劍讀書鬱然將材伐謀而事有成筭尅日而動不愆期聲動冠戎塵清封略江南别有樓船將燕頷虬鬚不姓楊夙負氣槩早習騎射材推燕趙之士學究孫吴之書白傅集先入賊城擒首惡盡封官府譲元功張文昌刁斗更嚴軍耳目戈鋋長控國咽喉矛㦸蘊器風雲馳聲髙達夫袵席過兵之處咽喉制敵之衝威懐啟閉之方耕戰疾徐之節莫不封章定計裂素成圖沖襟陽陽應變弛張開則雷電閉則金湯吕和叔文介子討罪於龜兹班超行誅於鄯善未足儔也唐文粹即墨龍文光照曜常山蛇陣勢縱横落鵰都尉萬人敵黒矟將軍一鳥輕天下無雙將關西第一雄受符黄石老學劍白猿翁矯矯雲長勇恂恂郤縠風杜牧之本朝論兵魁然萬人敵臨川集爲國所倚}
