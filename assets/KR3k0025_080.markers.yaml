  - {type: variant, offset: 1863, length: 217, content: 聽豫曰年過七十而居位譬猶鍾鳴漏盡而夜行不休是罪人也遂稱疾魏志虞玩之年老請退表曰四十仕進七十懸車壯即驅馳老即休息知足不辱臣知足矣齊書光祿大夫開府儀同三司王僧虔固辭台府謂兄子儉曰汝任重於朝行登三事我若復有此授乃是一門有二台司吾實懼焉魏志韋世康拜吏書前後十餘年間多所進拔謂子弟曰吾聞功遂身退古人常道今將懸車汝輩謂何子福嗣曰大人澡身浴德名立宦成追蹤二踈伏奉尊命隋書韋世康在吏部十餘年時稱廉平常有止足之志謂子弟曰祿豈須多防滿則退年不待暮有疾便辭, WYG: 覺}
