  - {type: variant, offset: 70, length: 224, content: 則行捨之則藏論語道之將行也與命也道之將廢也與命也語憲問子遺佚而不怨阨窮而不憫孟公孫丑下君子不怨天不尤人同上行止非人所能也吾之不遇魯侯天也孟梁惠下當死不懼在窮而戚知命也列子力命知其不可奈何而安之若命唯有德者能之子貢曰古之得道者窮亦樂通亦樂所樂非窮通也適來夫子時也適去夫子順也安時而處順哀樂不能入也孔子曰我諱窮久矣而不免命也求通久矣而不得時也並莊子樂天知命吾何憂窮理盡性吾何疑文中子史知命不憂乘流則逝得坎則止並漢賈誼傳君子得時則大行不得時則龍蛇遇不遇命, WYG: 爪牙}
