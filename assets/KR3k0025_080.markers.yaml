  - {type: variant, offset: 2385, length: 0, content: '', WYG: 未達將不言渇軍竈未炊將不言飢軍幕未辦將不言倦冬不服裘夏不操扇是謂禮也三畧爲將冬日不衣裘夏日不操扇天雨不張蓋呂氏春秋集願得受號令以億計文選經伯也執殳爲王前驅詩子甲胄生蟣蝨淮南子史居戱下無所知名韓信傳李廣以良家子從軍本傳尺籍伍符馮唐傳鞮鍪即兠鍪也生蟣蝨介胄生蟣蝨弓弩不得弛東漢朱浮傳一介鷹犬効力戎行後漢集鋒鏑縱横魏都賦朝食不免胄夕息常負戈名編壯士籍不得中顧私邉郡未和負羽從軍文選旦聞羽檄飛夕見邉驛奔劉義榮詩從軍古云樂談笑清油幕用進士從軍韓文各抛筆硯誇旄鉞莫遣文星讓將星劉賔客集結髪從軍李文饒諳練史自漢擊匈奴廣未嘗不在其中李廣曰廣結髪與匈奴大小七十餘戰本傳向寵曉暢軍事出師表胡奮少練軍士晉起居注斛律金行兵用匈奴法望塵知馬歩多少嗅地知軍度逺近梁髙祖宋璟練習邉事唐武后紀李晟曰吾生長西陲備諳敵情唐徳宗紀劉南金練習軍旅唐順宗紀休兵經歸馬於華山}
