  - {type: variant, offset: 1663, length: 1, content: 儀, WYG: 范文正一見皆稱其有將相之器果能爲國立功爲時名將名臣傳老將經維師尚父時維鷹揚方叔元老克壯其猶詩史羌豪相數責曰語汝無反今天}
