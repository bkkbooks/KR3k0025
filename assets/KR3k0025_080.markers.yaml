  - {type: variant, offset: 2091, length: 6, content: 寢弟為市材送, WYG: 治以待其亂定舎以待其勞如趙充國逺斥候尤能持重羌數挑戰充國堅守周亞夫堅壁以挫吴楚司馬懿閉營而困葛亮北齊通每向必持重雖不大克亦不敗負王忠嗣爲將能重安邉唐書本傳夫爲將當務慎重審已量敵非萬全不可動唐書戰功經一月三捷詩師有功則左執律右秉鉞戰功曰多周禮史季武子以所得於齊}
