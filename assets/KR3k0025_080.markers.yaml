  - {type: variant, offset: 2268, length: 2, content: 元延, WYG: 馬璘單騎先士卒奮擊俘斬千計唐代宗紀李愬至蔡州城下李佑李忠義钁其城爲坎以先登壯士從之唐憲宗紀集振臂一呼争爲先登李少卿突刃摧鋒爲士卒先曹子建首啟戎行九錫文將秉先登羽出從軍詩决命争首陷陣摧兇陳子昻集張軍心以吞敵奮士力而指縱白傅集裂賞而千里來應左袒而一呼皆至出栁文公亷史吴起善用兵廉平盡能得士心史記李廣爲人廉得賞賜輒分其麾下飲食與士共之通鑑漢武紀魏尚爲雲中守軍市租盡以饗士卒史馮唐傳諸葛亮軍無私蜀志世}
