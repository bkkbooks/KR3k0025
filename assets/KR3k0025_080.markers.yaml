  - {type: variant, offset: 2090, length: 0, content: '', WYG: 聲詩軍旅令銜枚周禮子孔子曰明王之征猶時雨之降是過師於袵席之上也家語秦之銳士不可以當威文之節制荀子鼓所以任也起也進也金所以造也退也免也旗所以立兵也偃兵也此之謂三軍有令而兵法治也管子將受命於君君命有所不受夫金鼓旌旗者所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退孫子史張侯曰師之耳目在吾旗鼓進退從之少長有禮其可用也勾踐患吴之整也使死士者再禽焉不動左傳號令不煩師徒向之太公自序孫武子者以法見於吴王闔廬廬曰可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可出宫中美人得百八十人孫子分爲二隊以王之寵姬二人各爲隊長皆令持㦸約束既布乃設斧鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏之罪也乃遂斬隊長二人以狥孫子部署諸將漢高紀上自勞軍細栁軍士披甲持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍令不聞天子詔上至不得入使使持節亞夫乃開壁吏謂從属車騎曰將軍約軍中不得馳驅天子乃按轡徐行至營曰此真將軍矣史記周勃世家李陵擊匈奴夜擊鼓起士鼓不鳴曰吾士氣少衰而鼓不起何耶軍中豈有女子乎捜軍中得卒妻皆斬之漢書從枕席上過師趙充國傳趙充國行必爲戰備止必堅營壁西漢世祖謂耿純曰大軍不可夜動故不相救鄧禹乗勝獨克而師行有紀東漢吕蒙軍容鮮整士卒練習吕蒙入江陵約令軍中不得干歴人家有所求蒙麾下士與蒙同郡人取民家一笠以覆官鎧蒙猶以爲犯軍令不可以鄉里而廢法遂垂涕斬之漢獻紀慕容恪軍令嚴明秋毫不犯文徳皇后之葬段志𤣥統士馬出宿於章武門太宗夜使宫官至營志𤣥閉門不納曰軍門不可夜開使者曰有勑志𤣥曰夜中不辨真僞竟停使者至曉太宗聞而嘆曰此真將軍也周亞夫何以加焉唐書光弼令其將曰爾輩望吾旗而戰吾旗緩任爾擇利而戰吾急旗三至地則萬衆齊入死生以之少退者斬通鑑唐肅宗臨淮王用郭汾陽部曲一經號令氣色益精明唐書郭子儀麾下老將若李懐光輩數十人皆王侯重貴子儀頥指進退如僕𨽻焉幕府之盛近代無比舊唐本傳指顧諸將不敢仰視李光弼傳李晟收復京城左右呼曰相公來賊皆驚潰秋毫無犯逺坊有經宿乃知官軍入城者通鑑唐徳宗李晟克京師市不改肆愬平蔡亦如之功名之竒近世所未有栁公綽鎮鄂州軍士之妻冶容不謹者沉之於江行卒相感曰中丞爲我輩治家事何以報效故鄂人戰每尅㨗舊唐本傳瀛州刺史劉澭將部兵千五百人男女萬餘口詣京師號令嚴整在道無一人敢取人雞犬本傳宣祖皇帝爲馬軍副都揮使引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命明旦乃得入通鑑傳記勾踐更陳嚴法復誅其有罪者五人狥曰吾愛士也雖吾子不能過也及其犯誅自吾子亦不能脫也吴越春秋集出必以律錙銖無爽文選任昉文歴百城而饋餼皆辭居一夕而牆宇必葺憇林適去墜果猶存經田疾趨滯穗不犯民老幼婦女不驚市買不變田之果糓下無一跡韓退之器用爽利斥候精明旗幟鮮潔戈甲犀利同上本朝赴敵之兵銜枚疾走不聞號令但聞人馬之行聲歐公集旗幟精明鼓角驩亮將賢士氣振令肅軍聲悄欒城集無紀律史亂次以濟遂無次且不設備中軍下軍争舟舟中之指可掬也左楚子圍宋宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告其行速過險而不整速則失志不整喪列志失列喪將何以戰楚子爲舟師以伐吴不爲軍政無功而還鄭陳而不整蠻軍而不陳在陳而囂合而加囂各顧其後莫有鬬心左漢王晨自稱漢使馳至壁張耳韓信未起即其卧中奪其印符麾召諸將易置之耳信起乃知獨漢王來大驚韓信傳上自勞軍至霸上及棘門軍直馳將已下騎送迎文帝曰霸上棘門軍若兒戯其將固可襲而取也周亞夫傳程不識曰李廣軍極簡易然虜卒犯之無以禁也通鑑漢武紀祖逖進據犬丘樊雅遣衆夜襲逖入壘㧞㦸大呼直趨幕軍士大亂晉書本傳渡險而囂是無政令唐太宗紀方陣而囂不足慮也持重經如山之苞詩子圓居而方止則若磐石然荀子史晉欒書伐楚晨壓晉軍而陳范匄曰楚師輕窕固壘而待之三日必退左傳任大功者不以輕敵轅生說漢王深壁勿戰羽引兵南漢王堅壁不與戰漢王欲與楚戰鄭忠使高壘深塹勿與戰漢王聽其計吴楚乏糧欲退數挑戰終不出夜軍中驚内相攻擊擾亂至於帳下周亞夫堅卧不起頃之復定韓安國曰用兵者以飽待飢}
