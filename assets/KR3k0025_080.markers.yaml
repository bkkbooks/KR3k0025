  - {type: variant, offset: 2119, length: 0, content: '', krp: 㑹日暮范令軍中蓐食晨往赴之斬首數百級通鑑漢明紀虞詡爲武都太守不滿三千兵羌衆萬餘圍之詡陳兵從郡東郭出北郭入貿易衣服迴轉取周敵恐而退設伏邀之大敗後漢虞詡有將帥之畧以爲武都太守羌衆數千遮詡於陳倉崤谷詡即停車不進而宣言上書請兵須到當發羌聞之乃鈔傍縣倉詡因其兵散日夜進道兼行百餘里令士各作兩竈日増倍羌不敢逼或問曰孫臏減竈而君増之兵法曰行不過三十里以戒不虞而今且一百里何也詡曰敵衆吾兵少徐行則易爲所及速進則彼所不測敵見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也漢殤紀胡遵諸葛誕攻東興吴將丁奉見其前部兵少乃使兵皆解鎧去矛㦸但兠刀楯裸身縁場魏人望見大笑之不即嚴兵吴兵得上便鼓譟斫破魏前軍魏軍驚擾散走通鑑馬隆擊樹機能出敵不意夾道累磁石賊負鐵鎧行不得前隆卒悉被犀甲無所留礙咸以爲神晉書江逌爲殷浩長史時羌及丁零叛浩軍懼令逌擊之逌謂將校曰今兵非不精而衆少於羌且其塹栅甚固難於校力吾當以計破之乃取數百雞以長繩繫火於足羣雞駭飛散集姚襄營火發因其亂而擊之敗晉書檀道濟與魏戰食盡軍士有亡降魏者具告之魏人追之衆恟懼將潰道濟夜唱籌量沙以所餘少米覆其上及旦魏軍見之謂道濟資糧有餘以降者爲妄而斬之時道濟兵少魏軍甚盛道濟命士皆被甲衣白服乗輿徐出魏人以爲有伏兵不敢逼道濟全軍而返宋文帝紀賀若弼請縁江防人每交代之際必集廣陵於是大列旗幟營幕被野陳人以爲隋兵大至急發兵爲備既知防人交代其衆復散後以爲常不復設備又使兵縁江時獵人馬喧譟故弼之濟江陳人不覺隋髙祖權竒間出隋楊素傳突厥逹頭可汗犯塞長孫晟以突厥飲泉易可行藥因取諸藥毒水上流突厥人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級隋髙祖柴紹擊吐谷渾敵據髙射紹軍士皆失色紹安坐遣人彈琵琶二女子舞敵疑之休射而觀紹伺其懈掩擊敵大潰阿史那元珍入冦王方翼被詔進擊時軍無定鎧方翼斷大板畫虎文鈎聨觧合賊馬忽見奔駭遂大敗唐書傳記形人而我無形此乃竒正之極七書能因敵變化以取勝謂之神五行無常勝四時無常位日有長短月有死生同上帥先經元戎十乗以先啟行詩史頴考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登金鼓以聲氣也軍志曰先人有奪人之心齊侯賞犂彌辭曰有先登者臣從之晢幘而衣貍製公使視東郭書曰乃夫子也左祭彤爲遼東太守彤有勇力敵每犯塞常爲士卒先鋒數破走之漢光武紀鄧艾伐蜀山髙谷深至艱險艾以氊自裹推轉而下將士皆攀木縁崖魚貫而進先登至江油魏志本傳髙麗率兵二十五萬來拒戰薛仁貴自恃驍勇欲立竒功乃異其服色着白衣腰鞬兩弓大呼先入所向無前賊盡披靡太宗遥望見之問先鋒白衣者爲誰引見賜馬絹}
