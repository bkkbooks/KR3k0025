  - {type: variant, offset: 2711, length: 248, content: 鬢雪人間壽腰金世上榮子孫無可念產業不能營一日安閑直萬金互入閑適優游福祿更難銷互入安適得年非瘦薄長福是單貧設自為化工優饒只如是若比簞瓢人吾今大富貴莫嫌貧活計更富即勞心有帛禦冬寒有榖防歲饑飽於東方朔樂於榮啟期身閑自為貴何必居榮秩心足即非貧豈惟珠滿室並白樂天團圓便是家肥事何必盈倉與滿箱杜荀鶴一身既飽暖一家無怨咨家雖有畎畝手不秉鎡基皮日休集季子今二頃楊雄才一廛伊予有南畝數已踰先賢李義山文福不可以屢僥倖得不可以常覬覦先生貧而不言利問之對曰利者商也今既士矣柰何亂四民之業乎並陸魯望文於臣一生已為萬足王維集, WYG: ''}
