  - {type: variant, offset: 1662, length: 0, content: '', WYG: 唐興其名將曰英衛唐書本傳光弼生戎虜之緒沉毅有守制敵䇿勝賞信罰明士卒争奮毅然有古良將風唐李光弼傳賛唐之良將李晟馬燧渾瑊通鑑唐徳宗本朝狄青字漢臣元昊叛屡將兵出戰四年間大小二十五陣八中流矢人呼爲狄天使上觀其儀表曰朕之關張也於是有狄萬之稱以一足以敵萬也初青在軍伍間韓魏}
