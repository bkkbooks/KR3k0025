  - {type: variant, offset: 2106, length: 0, content: '', WYG: 曰吾伏􅌢嘔血鼓音不衰陳書曰此行也吾聞鼓而已不聞金矣左穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼔之急則忘其身史本傳段熲與先零戰敵兵盛熲衆皆恐熲謂將曰吾今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴突擊敵衆盡通鑑漢靈帝觸白刃冐流矢後漢劉琨曰吾枕戈待旦志梟逆敵晉書李晟擊李懐光朱泚下令曰公等此時不誅元凶非豪也渭橋斷賊首尾吾欲與公戮力一心建不世之功可乎士皆垂泣曰惟公命唐書本傳傳記良將之趨時也衣不解帶履不遺躡三畧集肝腦塗中原膏液潤野草而不辭也長卿檄鞮鍪生蟣蝨介胄被沾汗揚雄汗馬出長城胡笳闗下思羌笛隴頭鳴朝馳左賢陣夜薄休屠營范彦龍千金買馬鞍百寳裝刀頭杜詩服金革而無辭當矢石而有勇白傅集晝不釋刃夜不釋甲柳文威聲子聲名足以暴炙之威强足以捶楚之拱揖指揮而强暴之國莫不趨使荀子史項羽已殺卿子冠軍召見諸侯將入轅門無不膝行而前莫敢仰視羽紀兵固有先聲而後實者韓信傳郅都爲鴈門太守匈奴素聞都節舉邉爲引去竟都死不近鴈門匈奴至爲偶人象都令騎馳射莫能中見憚如此西漢本傳李}
