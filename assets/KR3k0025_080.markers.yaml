  - {type: variant, offset: 2114, length: 1, content: 受, WYG: 矣宣帝紀杜預曰兵威已振譬如破竹數節之後迎刃而解無復着手處也變化若神吴孫歆與伍延書曰北來諸將乃飛渡江也西晉武紀秦苻登曰彼爲何人去令我不知來令我不覺西晉紀梁韋夜掘長塹樹鹿角截洲爲城比曉而營立魏中山王英大驚以杖擊地曰是何神也梁武帝紀李光顔平劒南搴旗蹈軍出入若神唐書傳記指顧之間擒擿如神用兵之道如疾雷不及掩耳卒電不睱瞑目六韜集我軍過若駭鯨之決細網奔兕之觸魯縞四校横徂星流彗掃燕然碑摧羣雄而電擊風馳羽檄文選身輕一鳥過鎗急萬人呼杜詩兵之情惟主速乗人之不及李衛公兵法出竒子善用兵者感忽悠闇莫知所從出荀子凡戰者以正合以竒勝故善竒者無竆如天地不竭如江海終而復始日月是也死而更生四時是也孫子飛鳥之鷙也總}
