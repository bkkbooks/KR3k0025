  - {type: variant, offset: 2101, length: 2, content: 既處, WYG: 盍築武庫而收晉尸以爲京觀左乗利襲勝西漢蒯通傳衛青霍去病絶幕擊匈奴匈奴逺遁幕南無王庭犂其庭掃其閭郡縣而置之雲徹席卷後無餘菑匈奴傳砰轒轀破穹廬分犂單于磔裂属國揚雄傳腦沙幕髓夷余匈奴傳竇憲登燕然山刻石勒功令班固作銘有曰斬溫禺以釁鼓血尸遂以染鍔西漢躡冐頓之區落焚老上之龍庭上以攄髙文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境土振大漢之天聲本傳竇憲一舉而空朔庭割裂王庭席卷漠北杜篤傳挂斾天山衝泥函谷武紀乗勝席卷羊祜傳摧鋒越河掃清冀朔祖逖傳宇文泰敗髙歡於渭曲乃於戰所人種栁一株以旌武功通鑑梁武帝紀英衛依乗風雲勒功帝籍李勣賛秦叔寳随太宗破尉遲敬徳功最多髙祖遣人賜以金瓶勞之曰朕肉可爲卿用者割以賜卿況子女玉帛乎尉遲敬徳之來桑䕃不徙而大功立薛仁}
