  - {type: variant, offset: 2108, length: 2, content: 宇非, WYG: 右北平匈奴聞之號曰漢之飛將軍避之數嵗不敢入右北平名聲振於夷貉威稜憚乎鄰國李廣傳檀道濟宋元嘉中與魏軍三千餘戰多捷雄名大振魏甚憚之圖之以禳鬼突厥大畏長孫晟聞其弓聲謂爲霹靂見其走馬稱爲閃電突厥畏韓擒虎之名不敢仰視郝玭每獲敵必刳剔而歸其屍敵大畏道其名以怖啼兒賛普鑄金像命於國曰得生玭者以金玭賞之注徳宗謂張萬福曰朕以爲江淮間草木亦知卿威名唐書傳記宋質直破敵}
  - {type: page-break, offset: 2108, content: '', id: KR3k0025_WYG_080-29b, image: WYG0932/WYG0932-0445d.png}
  - {type: variant, offset: 2108, length: 2, content: 宇非, krp: 右北平匈奴聞之號曰漢之飛將軍避之數嵗不敢入右北平名聲振於夷貉威稜憚乎鄰國李廣傳檀道濟宋元嘉中與魏軍三千餘戰多捷雄名大振魏甚憚之圖之以禳鬼突厥大畏長孫晟聞其弓聲謂爲霹靂見其走馬稱爲閃電突厥畏韓擒虎之名不敢仰視郝玭每獲敵必刳剔而歸其屍敵大畏道其名以怖啼兒賛普鑄金像命於國曰得生玭者以金玭賞之注徳宗謂張萬福曰朕以爲江淮間草木亦知卿威名唐書傳記宋質直破敵}
