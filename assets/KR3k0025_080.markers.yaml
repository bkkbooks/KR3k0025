  - {type: variant, offset: 336, length: 0, content: '', WYG: 之氣盖關中陳安之勇聞隴上爾乃萬死不顧一奮無前竒兵徑衝驍騎横挑杜牧之眦裂肝膽横趫㨗超峥嶸栁集本朝田單掃敵如風旋臨川集上黨良家子挽强如屈肘黄魯直詩臂弓腰箭事戎装逺上沙塲恣遊獵參寥子儒將史晉作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣說禮樂而崇詩書左祭遵爲將軍皆用儒術對酒設樂必雅歌投壺在軍旅不忘爼豆後漢張奐爲北中郎將匈奴烏桓燒度遼將軍門衆大怒奐安坐帷中與弟子講誦自若軍士稍安通鑑漢成帝紀魯肅治軍手不釋書吴志羊祜在軍常輕裘緩帶身不披甲杜預身不跨馬射不穿札而每有大事必居將帥之列晉書謝𤣥破苻堅}
