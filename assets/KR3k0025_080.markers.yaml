  - {type: variant, offset: 1333, length: 325, content: 有至富而非金玉也適情知足則富矣淮南子錦繢紛華所服不過溫體三牲太牢所食不過充腹知以身取節者則知足矣苟知足則不累其志矣孔叢子居衛第七知足者則能肥遁勿用頤光山林紆鸞龍之翼養浩然之氣襤縷帶索不以負龍章之暐曄也負步杖筴不以易結駟之絡繹也抱朴子暢玄篇史齊與晏子邶殿弗受曰慶氏之邑足欲故亡吾邑不足欲也不受邶殿非惡富也恐失富也左襄二十八范蠡曰居家則致千金居官則致卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懷其重寶間行以去止于陶史越世家褚先生曰蘇秦張儀一當萬乘之主而都卿相之位今子積數十年官不過侍郎位不過執戟意者有遺行耶東方生曰彼一時也此一時也使蘇秦張儀與僕並生於今之世曾不能得掌故安敢望常侍侍郎乎東方朔傳以齊三萬戶封張良良曰臣願封留足矣不敢當三萬戶, WYG: ''}
