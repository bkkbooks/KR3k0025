  - {type: variant, offset: 1844, length: 4, content: 光武建武, krp: 明帝耿秉擊匈奴簡易於事休止不結營部有警急軍陣立成後漢諸葛亮至南中所在戰㨗聞孟獲者爲夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虛實故敗亮笑縱使更戰}
  - {type: variant, offset: 1849, length: 10, content: 年田豫為衛尉乞遜位司, WYG: 縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣漢晉春秋吴朱然無事每朝夕嚴鼓兵在營者咸行装就隊以此玩敵使不知所備故出輒有功通鑑魏邵陵勵公軍中謡曰以計伐戰一當萬晉書杜預傳諸葛亮造八陣於平沙上壘石八行相去二丈桓溫見之曰此常山蛇勢晉書賀若弼請㳂江防人每至交代之際必集廣陵於是大列旗幟營幕被野陳以爲隋兵大至急發兵爲備既知防人交代其衆復散後以爲常不復設備又使兵縁江時獵人}
