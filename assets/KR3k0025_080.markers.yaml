  - {type: variant, offset: 2101, length: 2, content: 既處, krp: 盍築武庫而收晉尸以爲京觀左乗利襲勝西漢蒯通傳衛青霍去病絶幕擊匈奴匈奴逺遁幕南無王庭犂其庭掃其閭郡縣而置之雲徹席卷後無餘菑匈奴傳砰轒轀破穹廬分犂單于磔裂属國揚雄傳腦沙幕髓夷余匈奴傳竇憲登燕然山刻石勒功令班固作銘有曰斬溫禺以釁鼓血尸遂以染鍔西漢躡冐頓之區落焚老上之龍庭上以攄髙文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境土振大漢之天聲本傳竇憲一舉而空朔庭割裂王庭席卷漠北杜篤傳挂斾天山衝泥函谷武紀乗勝席卷羊祜傳摧鋒越河掃清冀朔祖逖傳宇文泰敗髙歡於渭曲乃於戰所人種栁一株以旌武功通鑑梁武帝紀英衛依乗風雲勒功帝籍李勣賛秦叔寳随太宗破尉遲敬徳功最多髙祖遣人賜以金瓶勞之曰朕肉可爲卿用者割以賜卿況子女玉帛乎尉遲敬徳之來桑䕃不徙而大功立薛仁}
  - {type: variant, offset: 2104, length: 1, content: 仕, WYG: 擊九姓突厥三矢射殺三人軍人歌曰將軍三箭定天山唐書戰功推爲軍中第一李光弼傳國家再造卿之力也郭子儀傳李晟帝紀其文自刻於碑唐書記軍賞不踰月司馬法集滅跡掃塵斬其梟將使三軍之士視死如歸文選李少卿滅跡掃塵若風霜之捲秋籜駱賔王倬然勲烈孰與齊躅英聲洽於萬夫勝氣横於千里鯨鯢已戮見東海之無波氛沴盡銷仰太陽之普照共集堂堂之陣用成善善之功以此鼓行坐觀盡敵栁文指北海而封燕然中西域而立幕府杜牧之趨事赴功經衽金革死而不厭中庸史躬擐甲胄親受矢石郤克傷於矢流血及履未絶鼓音張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病簡子巡列曰畢萬匹夫也七戰皆敗有馬百乗死於牖下羣子勉之死不在冦}
