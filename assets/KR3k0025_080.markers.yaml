  - {type: variant, offset: 2087, length: 2, content: 琰宅, WYG: 而後權譎霍邑之戰師以義舉者正也建成墜馬右軍少却者竒也太宗曰天地風雷龍虎鳥蛇斯八陣何謂也靖曰傳者之誤也古人秘藏此法詭設八名本一也分爲八焉天地者本乎旗號風雲者本乎旛名龍虎鳥蛇本乎隊伍則後世詭設物象何止八乎太宗曰數起於五而終於八則非設象實古制也太宗曰製六花陣法何術乎李衛公曰諸葛亮八陣法也大陣包小陣大營包小營隅落鈞連曲折相對古制如此臣爲圖因之故外畫之方内環之圓是成六花俗所號耳苻堅總百萬之衆而敗於淝水此兵合而不能分而吴漢討公孫述與副將劉尚分屯相去二十里述來攻漢尚出合擊大破之此分兵而能合者也李衛公問對本朝古人以少擊衆袁紹以百萬阻官渡曹操以十萬取之王莽百萬之衆光武昆陽之衆以八千取之苻堅下淮百萬謝𤣥二十萬人一麾而亂紀律經師出以律易今日之事不愆於六步七步乃止齊焉夫子朂哉不愆於四伐五伐六伐七伐乃止齊焉朂哉夫子書蕭蕭馬鳴悠悠斾旌之子于征有聞}
