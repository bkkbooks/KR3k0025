  - {type: variant, offset: 2086, length: 0, content: '', WYG: 泌曰料敵者料將不料兵通鑑唐紀楊行宻謂諸將曰孫儒之衆十倍於我吾戰數不利欲退保銅官何如劉威李神曰儒掃地逺來利在速戰宜屯險要堅壁清野以老其師時出輕騎抄其饋餉奪其俘掠彼前不得戰退無資糧可坐擒也通鑑唐昭宗集料敵制變萬里無差任彦昇彈文無攻不克百蠻皆堕於計中慷慨謀議折天口之是非指畫山川知地形之要害王維中有竒謀前無强敵白傅集坐恃龍豹韜全輕蜂蠆毒劉長卿本朝韜鈐在心類要兵法經險野人爲主易野車爲主周禮子知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必殆夜戰多火鼓晝戰多旌旗所以變人之耳目也故朝氣銳晝氣惰暮氣歸故善用兵者避其銳氣擊其惰歸無邀正正之旗無擊堂堂之陣孫子鼓鞞金鐸以威耳旄麾旗章以威目禁令刑罰以威心吴子用兵之法佯北勿從銳卒勿攻餌兵勿食歸師勿遏圍師必闕竆冦勿迫孫子易則用車險則用騎渉水則多弓隘則用弩晝則多旌夜則多火晦㝠多鼓此善爲設施者也淮南子金鼓以聲氣也左兵法曰陷之死地而後生置之亡地而後存韓信傳趙涉曰兵事貴神密周亞夫傳上兵伐謀其次伐交如知敵有外交相援者則誤間之令其解散也息夫躬傳兵法曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也四者兵之至要也夜戰聲相知則足以相救晝戰目相見則足以相識通鑑漢文紀虞詡爲武都太守兵不滿三千攻羌衆萬餘人後漢諸葛孔明八陣聚細石爲之各高五丈棊布相當中間相去九尺正中開南北巷悉廣五尺或爲人散亂爲夏水所没及冬水退依然如故三國志荆州記曰八陣既成自今行師不復敗後見莫能了之夫用兵之道攻心爲上攻城爲下心戰爲上兵戰爲下通鑑魏明紀兵法曰巧遲不如拙速梁書侯景傳盛彥師曰兵法尚詐通鑑唐髙祖王君廓以十三人破賊一萬自古以少擊衆未之前聞兵法避實擊虛劉仁軌傳馬燧曰兵法善於制人而不制於人唐書樂毅以弱燕破齊七十餘城者齊無法故也韓信以寡破趙衆二十萬者趙無法故也近者曹操以八千破袁紹五萬者袁無法故也此五子能以少尅多者軍有法故也合檢王尋徒百萬光武只三千張承吉傳記其正如山其竒如雷七書以一擊十莫善於阨以十擊百莫善於險以千擊萬莫善於阻用衆者務易用少者務阨也六韜太宗將討高麗曰兵少地遥以何術臨之靖曰臣以正兵太宗曰平突厥用竒兵今言正兵何也曰諸葛亮七擒孟獲正兵而已自黄帝以來先正後竒先仁}
