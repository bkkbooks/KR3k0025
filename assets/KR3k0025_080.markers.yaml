  - {type: variant, offset: 2114, length: 1, content: 受, krp: 矣宣帝紀杜預曰兵威已振譬如破竹數節之後迎刃而解無復着手處也變化若神吴孫歆與伍延書曰北來諸將乃飛渡江也西晉武紀秦苻登曰彼爲何人去令我不知來令我不覺西晉紀梁韋夜掘長塹樹鹿角截洲爲城比曉而營立魏中山王英大驚以杖擊地曰是何神也梁武帝紀李光顔平劒南搴旗蹈軍出入若神唐書傳記指顧之間擒擿如神用兵之道如疾雷不及掩耳卒電不睱瞑目六韜集我軍過若駭鯨之決細網奔兕之觸魯縞四校横徂星流彗掃燕然碑摧羣雄而電擊風馳羽檄文選身輕一鳥過鎗急萬人呼杜詩兵之情惟主速乗人之不及李衛公兵法出竒子善用兵者感忽悠闇莫知所從出荀子凡戰者以正合以竒勝故善竒者無竆如天地不竭如江海終而復始日月是也死而更生四時是也孫子飛鳥之鷙也總}
  - {type: variant, offset: 2116, length: 1, content: 殃, WYG: 首猛獸之玃也匿其爪虎豹不外其牙噬犬不見其齒故用兵之道示之以柔而迎之以剛示之以弱而乗之以强爲之以翕應之以張淮南子史秦人毒涇上流人多死晉與陳戰晉胥臣蒙馬以虎皮先犯於陳狐毛設二斾而退之欒枝使與輿曳柴而僞遁晉伐齊齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乗車者左實右僞以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸左燕使騎刼代樂毅齊田單募城中得千餘牛爲絳繒衣畫五綵龍文束兵刃於其角灌脂束韋於其尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒直奔燕軍所觸盡死傷因擊之大敗復齊七十餘城本傳書魏與趙攻韓告急於齊使田忌將直往而走大梁魏將龐涓聞之去韓而歸齊孫臏使齊軍入魏地爲十萬竈明日爲五萬竈又明日爲二萬竈龐涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃與輕銳倍日併行逐之史記趙括擊秦武安軍張二竒兵以刼之趙括不利韓信擊趙乃使萬人先行出背水陣趙兵望見大笑開壁擊之大戰信棄鼓旗走水上軍皆殊死戰不可敗趙破斬成安君漢髙紀楚龍且與韓信夾濰水陳信乃夜令人爲萬餘囊盛沙壅水上流引兵半渡擊龍且陽還走龍且追信信使人決壅囊水大至龍且兵大半不得渡即擊殺龍且西漢韓信擊魏王豹信乃益爲疑兵陳船欲渡臨晉而伏兵從夏陽以木罌渡軍襲安邑漢髙紀李廣擊匈奴令曰下馬解鞍其騎曰敵多且近即有急奈何廣曰彼敵以我爲走今皆解鞍以示不走用堅其意於是敵騎遂不敢擊史本傳臧宫爲輔威將軍將兵屯越時公孫述將任滿與岑彭相拒於荆州宫兵少力不能制㑹属縣送委輸數百乗至宫夜使鋸斷城門限令車聲回轉出入至旦越人伺候者聞車聲不絶而門限斷遂破荆門滅公孫述後漢北匈奴大入雲中太守亷范拒之吏以衆少欲移書傍郡求救范}
