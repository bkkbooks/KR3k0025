  - {type: variant, offset: 2111, length: 0, content: '', WYG: 威名敵相恚曰使汝行逄宋督燉煌實録古之治兵士民未合而威已諭矣氣已服矣豈必用旌旗干戈哉故善諭威者於其未發也於其未通也闕注集威}
  - {type: variant, offset: 2111, length: 0, content: '', krp: 威名敵相恚曰使汝行逄宋督燉煌實録古之治兵士民未合而威已諭矣氣已服矣豈必用旌旗干戈哉故善諭威者於其未發也於其未通也闕注集威}
  - {type: variant, offset: 2112, length: 1, content: 德, WYG: 首塗威風先逝文選兵貴先聲陳子昻集成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊惟多身始輕兵氣回飛鳥威聲没巨鰲杜詩指鄭則三軍自首麾晉則千里流血白帖軍聲逺届先路以風行聲有聞於天下氣無敵於荒野白傅集以虛聲破精勁唐文粹雖李廣材能充國沉勇但能閉壘豈敢交綏杜牧之氣節史穰苴曰將在軍君令有所不受史記本傳有前一尺無却一寸魏志先主大㑹羣臣問魏延曰今委卿以重任對曰若曹操舉天下而來請爲大王距之偏將十萬之衆至請爲大王吞之蜀志突厥入冦王君廓擊之憤發大呼目及鼻一時流血此之壯氣何謝古人唐書尹子琦謂張廵曰聞君每戰皆裂眥齒皆碎同上傳記雖有江河之險則凌之雖有太山之塞則陷之并氣摶精心無有慮目無有視耳無有聞一諸武已矣吕氏春秋集將軍死綏咫尺無却任彦昇齒兩餘魂死綏亡魄陳子昻願死藝於伏弢誓殺身於鳴轂王維集神速經如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國詩子發如風雨動如雷霆管子善用兵者動於九天之上微乎微至於無形神乎神至於無聲孫子良將如收電可見不可追抱朴子史先人有奪人之心軍之善謀也左周亞夫擊吴楚趙涉曰兵事尚神密將軍出武關抵洛陽直入武庫諸侯聞之以爲將軍從天而下也周勃傳雷動風舉後發先至離合向背變化生死常以輕疾制敵也前漢岑彭至武陽繞出延岑軍後公孫述大驚以杖擊地曰是何神也後漢岑彭傳兵動若神前漢宣紀檄書有急即挿鳥羽其上也後漢匈奴傳賛注此神兵從天而墮破之}
