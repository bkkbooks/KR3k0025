  - {type: variant, offset: 2389, length: 1, content: 外, WYG: 馬散之華山之陽而弗復乗牛散之桃林之野而弗復服倒載干戈包之以虎皮將帥之士使爲諸侯名之曰建櫜然後天下知武王之不復用兵也散軍而郊射而貫革之射息也裨冕搢笏而虎賁之士脫劒也記子鑄劒㦸爲農器家語致思以扁定三革偃五兵荀子史止戈爲武左按甲休兵西漢戢弓矢而散馬牛光武紀櫜弓卧鼔偃武息戈投戈講藝息馬論道樊凖傳戴白不見兵革武功立而干戈戢威械藏而俎豆布馬融}
