  - {type: variant, offset: 666, length: 1629, content: 役邵公子許偉康並出屠酤司馬子威拔自卒伍後漢郭太傳荀淑遇黃憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾師表也既而前至袁閬所未及勞問遂曰子國有顏子寧識之乎閬曰見吾叔度耶是時同郡戴良才高倨傲每見憲未嘗不正容及歸罔然若有失也戴良曰不見叔度自以為無不及既覩其人則瞻之在前忽焉在後固難得而測矣郭泰少遊汝南先過袁閬不宿而退進往從憲累日方還范曄論曰黃憲言論風旨無所傳聞然士君子見之者靡不深服遠去玭吝將以道周性全無德而稱乎余曾祖穆侯以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方通監東漢殤帝紀郭泰初遊雒陽時人莫識陳留苻融一見嗟異因以介於河南尹李膺漢桓帝紀簡練清高斥黜俊邪通監或問禰衡曰盍從陳張文司馬伯達乎曰吾焉能從屠沽兒耶唯善孔融及楊脩常稱曰大兒孔文舉小兒楊德祖餘子碌碌莫足數也東漢本傳曹操曰生子當如孫仲謀如劉景升兒子豚犬耳通監東漢管輅曰吾與劉頴川兄弟語使人神思清發昏不假寐自此之外殆白日欲寢矣晉書吳嘗置丞相眾議歸張昭吳王曰孤豈為子布有愛乎顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也通監三國魏明紀嵇康嘗詣隱者汲郡孫登登曰子才多識寡難乎免於今之世矣通監魏元紀呂蒙年十五隨鄧當擊賊策見而奇之引置左右張昭薦蒙拜別部司馬吳志晉武帝聞王衍名問戎曰夷甫當世誰比戎曰未見其比當從古人中求耳晉書本傳閔鴻見陸雲奇之云此兒若非龍駒即是鳳雛山濤為吏部甄拔人物各為題目阮籍能為青白眼見禮俗之士以白眼對之嵇喜來弔籍作白眼喜弟康造焉籍大悅乃見青眼並晉書本傳和璧之在荊山隋珠之潛重川非遇其人焉有連城之價照車之名乎晉書張載傳王述性沈靜每坐客辯論蠭起而述處之恬如也年三十尚未知名人謂之癡導以門地辟之既見唯問在東米價述張目不荅導曰王椽不癡人何言癡也通監晉武紀石勒集衣冠人物別為君子營晉紀孫權克荊州將吏悉歸附潘濬不見權遣人致之以為治中荊州諸軍事一以諮之吳志注江表傳馬秀曰揚雄作太玄唯桓譚以為必傳後世晉書王長文傳魏主嘗引崔浩出入臥內嘗指浩以示新降高車渠帥曰汝曹視此人尫纖懦弱不能彎弓持矛然其胸中所懷乃過於甲兵通監宋太祖紀良玉未剖與瓦石無異騏驥未試與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分北史蘇綽傳辛彥之拜隋州刺史于時州牧多貢珍玩惟彥之所貢並供祭之物高祖善之顧謂朝臣曰人安得無學彥之所貢稽古之力也隋書吏部侍郎高孝基名知人見玄齡曰僕閱人多矣未見如此郎者見如晦謂曰君有應變之才必任棟梁之重俱以子孫托之通監隋高紀張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之通監唐太宗紀互見深識大體王勮蘇味道皆未知名裴行儉一見謂之曰二君後當相次掌銓衡僕有弱息願以為托通監唐武后蘇環子頲弱冠敏悟焉載曰古稱一日千里蘇生是已唐書獨孤信見孫思邈曰器大難為用耳唐書本傳狄仁傑曰君正吾藥籠中物不可一日無也唐書元澹傳鵰鶚鷹鸇豈眾禽之偶唐書韋思謙傳宋璟奏括州員外司馬李邕儀州司馬鄭勉並有才略文詞但性多異端好是非改變若全引進則必至咎悔若長棄捐則才用可惜通監二百十三吉溫為新豐丞薛嶷薦溫才上召見顧嶷曰是一不良人朕不用也通監唐元宗紀李華善屬文與蕭頴士善為古戰場文燻污之如故書置於佛書之間與頴士因閱佛書得之華謂之曰此文如何頴士曰可矣華曰當代秉筆者誰及於此頴士曰君稍精思便能至矣華愕然唐書本傳傳記王濬沖裴叔則於總角時詣鍾士季客問二童子是誰鍾曰裴楷清通王戎簡要三十年此二賢當為吏部尚書世說王右軍妻郄夫人謂二弟愔曇曰王家見二謝安石傾一本有筐字倒庋見汝輩來平平耳世說下互入婦人見識鴟梟不鳴未為瑞鳥猛虎雖伏豈齊仁獸續世說第十鑒懸日月文心雕龍眾人之唯唯不如周舍之諤諤韓詩外傳柳琮所拔進皆世所稱鄉里為之語曰得黃金一笥不如柳伯騫所識益州耆舊傳集蔡邕避難江南宿於柯亭館館以竹為椽仰而盻之曰良竹也取以為笛奇聲獨絕蔡邕長笛賦序騏驥長鳴伯樂昭其能盧狗悲號韓國知其才文選曹植自試表慈父不能愛無益之子仁君不能蓄無用之臣同上拔呂蒙於戎行識潘濬於係虜陸機辨亡論行間識呂蒙, WYG: ''}
