  - {type: variant, offset: 393, length: 3, content: 初絳侯, WYG: 熟藥經若藥弗瞑眩厥疾弗瘳書君有疾飲藥臣先嘗之親有疾飲藥子先嘗之記許悼公瘧飲世子止之藥卒左傳康子饋藥拜而受之曰丘未達不敢嘗語子南榮趎曰里人有病里人問之病者能言其病病然其病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已莊羿請不死之藥於西王母姮娥竊以奔月淮南史灌夫身中十創適有萬金良藥故不死前漢韓康字伯休采藥名山賣於長安市口不二價三十餘年時有女子就康買藥康守價不移女子怒曰公是韓伯休那乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為遁入山中後漢羊祜與吳將陸抗對壘使命交通抗嘗病祜饋之藥抗飲之無疑心人多諫抗抗曰豈有酖人羊叔子乎通鑑傳記}
