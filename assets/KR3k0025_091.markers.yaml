  - {type: variant, offset: 12, length: 3, content: 畢命儗, WYG: 記纂淵海卷九十一宋潘自牧撰香藥部香傳記沈香青桂香馬蹄香鷄骨香煎香同是一本細枝緊實為青桂香黒而沈水為沈香半沈浮為鷄骨香最麄為煎香又云沈者為沈浮者為檀似鷄骨為鷄骨香似馬蹄為馬蹄香似牛頭為牛頭香最麄者為踐香本草薫陸出天竺單于二國其木生于海邊沙上盛夏木膠流出沙上乳香亦其類也廣志波斯國松木脂有紫赤如櫻桃者名乳香薫陸之類也今}
