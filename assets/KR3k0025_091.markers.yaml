  - {type: variant, offset: 148, length: 3, content: 甯戚擊, WYG: 作七十二毒大㦸去水葶藶愈脹用之不節乃反為病同上史陸彰曾嬰重病藥中須桑螵蛸不忍害物遂不服焉北史傳記神農以赭鞭鞭百草盡知其毒及寒温氣味所主搜神記椒薑禦温蒲益聰巨勝延年威喜辟兵孝經援神契藥有宣通補泄輕重澁滑燥濕十種如宣可去壅即薑橘之屬是也通可去滯即通草防己之類是也補可去弱即人參羊肉之類是也泄可去閉即葶藶大黄之屬是也輕可去實即麻黄葛根之屬是也重可去怯即磁石鐵粉之屬是也澁可去脫即牡礪龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也補注本草陶隱居云藥有宣通補泄輕重澁滑燥濕十種今解之惟寒熱二種何獨見遺如寒可去熱大黄朴消之屬是也如熱可去寒附子桂之屬是也同上上藥養命謂八石鍊形六芝延年也中藥養性謂合歡蠲忿萱草忘憂也下藥除疾謂大黄除實當歸止痛也博物志藥者五行之英華地之津液也十纖芳草之氣美石藥之氣悍二者其氣急疾堅勁故非緩心和人不可以服此二者素問集食豆令人重榆令人瞑合歡蠲忿萱草忘憂嵇康養生論玉札丹砂赤箭青芝牛溲馬勃敗鼔之皮俱收並蓄待用無遺者醫師之良也韓文是訾醫師以昌陽引年欲進其豨芩也同上是故經中黄苓以類馬尾蠶首言人參者似人形附子八}
