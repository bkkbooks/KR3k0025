  - {type: variant, offset: 165, length: 0, content: '', WYG: 欺子而獲售子之懵也而反尤於余不以過乎余蔑然慙慨然憂推是類也以徃則世之以芋自售而病乎人者衆矣又誰辨焉辨茯神文本朝我夢羽人頎而長兮惠而告我藥之良兮喬松千尺老不僵兮流膏入土龜蛇藏兮得而食之夀莫量兮於此有草衆所嘗兮狀如狗虱其莖方兮夜炊晝曝久乃藏兮茯苓為君此其相兮我興發書若何符兮乃瀹乃烝甘且腴兮補填骨髓流髪膚兮東坡服胡麻賦明年採藥天台去更欲題詩滿浙東靈苗與毒草疑似在毫髪細斸黄土栽三稏人參也小圃傍城郭閉門芝术香芎藭生蜀道白芷來東南地黄食老馬可使光鑒人掃白}
