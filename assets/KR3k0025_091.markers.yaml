  - {type: variant, offset: 166, length: 130, content: 常人也命後車載之淮南子馬有驥之一毛不可謂之驥龍有蛇之一鱗不可謂之蛇劉子魏證曰大業之際徵也嘗與諸賢侍文中子謂徵及房杜曰先輩雖聰明特達然非董薛程仇之比雖逢明主必愧禮樂文中子史淳于髡曰狐裘雖弊不可補以黃狗之皮史齊世家互見兩不相入人固未易知知人亦未易史范睢傳信數與蕭何, WYG: 黄精輕身豈胡麻巧}
