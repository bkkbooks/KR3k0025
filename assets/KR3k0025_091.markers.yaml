  - {type: variant, offset: 2797, length: 2050, content: 蘇公過目先空冀北群後山經子曰由也千乘之國可使治其賦也求也千室之邑百乘之家可使為之宰也赤也束帶立於朝可使與賓客言也語公冶長子曰德行顏淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語先進子費惠公曰吾於子思則師之矣吾於顏般則友之矣王順長息則事我者也孟子樂正子二之中四之下也孟盡心下晏子功用之臣也不如子產子產惠人也不如管仲管仲之為人力功不力義力知不力仁野人也不可以為天子大夫荀大略蜀人有仲元者不屈其意不累其身不夷不惠可否之間也揚子史酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也左文七年左氏豔而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗范甯穀梁傳序獵追殺獸者狗也而發蹤指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發蹤指示功人也西漢蕭何傳今雖亡曹參等百數何缺於漢通監漢高紀漢廷大臣獨汲黯好直諫守節死義難惑以非至如說丞相弘等如發蒙振落耳通監漢武紀京兆尹張敞方略耳目不及廣漢通監漢宣紀卓茂行已在於清濁之間東漢郭林宗曰奉高袁閎之器譬諸汎濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也東漢黃憲傳鄭泰謁董卓曰明公出自西州少為將帥閑習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談高論噓枯吹生並無軍旅之才臨鋒決敵非公之儔也通監漢獻紀龐德公常謂孔明為臥龍士元為鳳雛德操為冰一作水鑑同上靖少與從弟邵俱知名有人倫臧否之稱蜀志許靖傳許邵與兄靖俱有高名好共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評東漢許邵傳曹操微時常卑辭厚禮求為己目許邵曰君清平之姦賊亂世之英雄同上孫權與陸遜論周瑜魯肅及呂蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉寡儔子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略奇至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬通監漢獻紀孫禮盧毓始入軍府崔琰曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後咸至鼎輔三國魏志魏太子使胡綜作賓客目曰英才卓越超踰倫匹則諸葛恪精識時機達幽究微則顧譚凝辨宏達言能釋結則謝景究學甄微游夏同科則范慎羊道私駁綜曰元遜才而疏子嘿精而很叔發辯而浮孝敬深而陿通監魏明紀袁子論曰或云少府楊阜見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳群則不然談論終日未嘗言人主之非書數十上外人不知君子謂群於是乎長者矣同上敦篤至行則太中大夫韓暨亮直清方則司隸校尉崔林貞固純粹則太常常林通監魏邵陵厲公紀庾敳見和嶠而歎曰嶠森森如千丈松雖磥砢多節目施之大廈有棟梁之用晉書和嶠傳王衍與弟澄好題品人物舉世以為儀準通監晉惠紀王澄王玄王濟並有盛名皆出衛玠下世云王家三子不如衛家一兒晉書或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞群戎曰君復未見其父耳同上裴楷有知人之鑒嘗曰夏侯玄肅肅如入宗廟中但見禮樂器鍾會如觀武庫森森但見矛戟在前山濤若登山臨水幽然深遠晉書嵇康傳王衍口中雌黃朝野翕然晉書本傳王戎有人倫鑒識常目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵表物同上周顗等並列貴位嘗冬至置酒其母舉觴賜三子嵩曰伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母下耳阿奴嵩弟謨小字也晉書桓彝曰季野有皮裏陽秋言其外無臧否而內有所褒貶也晉書褚裒傳魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎通監魏崔浩謂高允豊才博學一代佳士所乏者矯矯風節通監宋紀孔奐曰江揔有潘陸之華而無園綺之英陳書太子問於賀若弼曰楊素韓擒虎史萬歲皆稱良將其優劣何如弼曰楊素猛將非謀將韓擒虎鬭將非鎮將史萬歲騎將非大將通監隋高紀上曰長孫無忌善避嫌疑應物敏速決斷事理古人不過而揔兵攻戰非其所長高士廉涉獵古今心術明達臨難不改節當官無朋黨所乏者骨鯁規諫耳唐儉言辭辯捷善和解人事朕三十年遂無言及於獻替楊師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論恒據經遠自當不負於物劉洎性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意褚遂良學問稍長性亦堅正每寫忠誠親附於朕譬如飛鳥依人人自憐之通監太宗傳記嚴仲弼九皋之鳴鶴空谷之白駒顏彥先八音之琴瑟五色之龍章張威伯歲寒之茂松幽夜之逸光陸士衡士龍鴻鵠之裴回懸鼓之待槌世說中庾道李曰廉頗藺相如雖千載尚凜凜恒有生氣曹蜍李志雖見在厭厭如九泉下人王大將軍稱王夷甫處眾人之中如珠玉在瓦石之間世說集傅毅之於班固伯仲之間耳魏文帝典論彈射臧否選西京賦雌黃出其唇吻朱紫由其月旦選絕交論天下以君侯為文章之司命人物之權衡一經品題便作佳士李白與韓荊州書舌端月旦皮裏陽秋段成式文當是時見王於北亭猶高山深林龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好靜秀瑤環瑜珥蘭茁其牙稱其家兒也韓文唐故殿中少監馬君墓誌本朝處士丁重能閱人觀于琮謂路若曰于侍郎風儀秀整禮貌謙挹如百斛重器所貯尚空其半安使不益其祿位哉續世說齊何點常稱陸慧曉如照鏡遇形觸物無不朗然王思遠常如懷冰暑月亦有霜寒一作氣, WYG: ''}
