  - {type: variant, offset: 99, length: 3, content: 璧左僖, WYG: 膏腴為神州之奥府其川瀆則洪河洋洋發源崑崙驚波沛厲浮沬揚奔南望無垠北顧無鄂徐幹賦東藩駐皂葢北渚淩清河海右此亭古濟南名士多雲山已發興玉佩仍當歌修竹不受暑交流空湧波藴真愜所遇落日將如何杜甫修簷䡾䡾皆成隂行盡松篁一徑深好鳥自飛還自下白雲無事亦無心客來但飲平陽酒衙退常攜靖節琴曽子固本朝景徳中以章丘縣置清平軍熈寧二年廢軍至道二年徙長清城于刺榆建隆}
