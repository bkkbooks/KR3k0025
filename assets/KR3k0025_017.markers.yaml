  - {type: variant, offset: 1511, length: 1509, content: 李石傳正必去邪邪必害正唐李德裕傳傳記天地至貴精不兩明注天精為日地精為月孝經援神契意不並銳事不兩隆盛於彼者必衰於此長於左者必短於右喜夜臥者不能早起也說苑四時不並盛五行不俱馳陰陽更唱氣有盛衰後漢趙曄吳越春秋集日不雙麗世無兩帝選魏都賦燕秦不兩立柳傳本朝昔師丹之說行則董宏坐其罪董宏之論勝則師丹廢于家呂誨論歐陽脩第一狀子彼亦一是非此亦一是非莊子齊物論史君子稱其功以加小人小人伐其技以憑君子左傳互見驕矜季郈之雞鬭季氏芥其雞郈氏為之金距左昭二十五互見好勝秦之群臣曰請以趙十五城為秦王壽藺相如亦曰請以秦之咸陽為趙王壽史同上韓安國坐枉法獄吏田甲辱之安國曰死灰不復燃乎甲曰燃則溺之西漢同上猶連雞之不能俱止於棲也戰國策臧洪復陳琳書曰子謂余身死而名滅僕亦笑子生而無聞通監漢獻紀單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅荅對之皆有餘魏志互見談辨董卓按劍叱袁紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀橫揖徑出通監劉琨祖逖並有英氣每相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原晉書祖逖傳互見勢力相敵石勒謂李陽曰孤昔日厭卿老拳卿亦飽孤毒手晉書梅陶鍾雅數說事祖納輒困之因曰君汝穎之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可槌納曰假有神錐亦有神槌晉書祖納傳互見滑稽敏於應對門孫綽性通率好譏調常與習鑿齒俱行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前同上孫綽傳互見滑稽釋道安高才與習鑿齒相見道安曰彌天釋道安鑿齒曰四海習鑿齒同上鍾會聞嵇康名而造之康不為之禮會將去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去晉世祖通監盧循遺劉裕益智粽裕報以續命湯同上晉安紀陸雲與荀隱未相識嘗會張華坐華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隱曰日下荀鳴鶴同上沈昭略性狂見王約曰汝是王約也何以肥而癡王約曰汝是沈昭略也何乃瘦而狂宋書南牙北司互相矛盾通監唐懿紀韓熙載奔吳密告其友汝陰進士李穀穀送至正陽痛飲而別熙載謂穀曰吳若用吾為相當長驅以定中原穀笑曰中原若用吾為相取吳如探囊中物耳同上唐明宗傳記殷浩語孫安國曰卿莫作強口馬我當穿卿鼻孫曰卿不見決鼻牛人當穿卿頰世說各自彈射互相瘡痏史通集持棋相下莫敢先動猶楚漢之兵相距鞏索也魏應瑒弈勢下之人負其能不肯諂其上上之人負其位不肯顧其下故高才多戚戚之容盛位無赫赫之光韓文文人相輕自昔而然魏文典論本朝宋袁淑文冠當時見謝莊鸚鵡賦曰江東無我卿當獨秀我若無卿亦一時之傑也續世說王文公見東坡醉白堂記曰乃是韓白優劣論東坡聞之曰不若介甫虔州學記乃學校策耳西清詩話經道不同不相為謀語子顏回曰薰蕕不同器而藏堯桀不共國而治家語致思奔蜂不能化藿燭越雞不能伏鵠卵莊子庚桑楚大聲不入於里耳同上天地黃鍾大呂不從煩奏之舞列子楊朱或曰孔子讀而儀秦行曰甚矣鳳鳴而鷙翰也楊淵騫金鉤玉餌雖珍而不能制九淵之沈鱗顯寵豐祿雖貴而不能致無欲之人抱朴子盤旋揖遜非禦寇之容擐甲纓胄非廊廟之飾同上軒車不可以適越冠冕不可以之胡文中子史淳于髡曰孤裘之敝不可補以黃狗之皮史齊世家互見鑒別世之學老子者則絀儒學儒學亦絀老子道不同不相為謀史老子傳孟軻曰持方抐欲納圜鑿其能入乎史孟軻傳猶戎翟之與干越不相入明矣前漢貨殖傳猶以鄉飲酒之禮理軍市也前梅福傳以水投石莫之受也西門造蕭何律於唐虞之世則誖矣作叔孫通儀於夏商之世則惑矣建婁敬之策於成周之世則謬矣談范蔡之說於金張許史之間則狂矣楊雄傳夫邪正之人不宜共國亦猶冰炭不可同器通監漢靈紀李德裕曰正人指邪人為邪邪人亦指正人為邪同上唐文宗紀南衙北司互相矛盾同上唐懿宗紀李綱曰臣言如持水納石唐書時不我容我不時徇同上傳記崔篆曰吾聞伐國不問仁人戰陣不訪儒士東觀漢紀加粉黛於壯夫服紈綺於高士, WYG: ''}
