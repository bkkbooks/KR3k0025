  - {type: variant, offset: 80, length: 0, content: '', WYG: 義不帝秦不受平原君千金之賜孔順稱為天下髙士漢周堪元帝時擢光禄勲領尚書事帝以師傅見重唐房𤣥齡貫綜墳籍年十八舉進士従太宗征伐獨收人物置幕府後進尚書左僕射居宰相與杜如晦同心輔政唐世首稱皇朝王曽少孤鞠于仲父鄉貢禮部廷對皆第一真宗時累官叅知政事正色立朝不附王欽若與丁謂朝廷倚以為重後拜平章事封沂國公紀勝集力能排南山文能絶地紀孔明境接青疇俯瞰獲麟之野山開翠屺斜連辨馬之峯駱賔王晩登龍門山直上一千尺絶頂彌孤聳盤途幾傾側陽巘靈芝秀隂崖仙乳滴趙居貞岱宗復如何齊魯青未了㑹當凌絶頂一覽衆山小杜甫天門一長嘯萬里清風來李白本朝建隆三年以北海縣置軍淳化五年改軍名慶厯三年初置京東東路安撫使沿革表試掃北臺看馬耳未隨埋沒有雙尖蘇軾孤雲落日在馬耳照耀金碧開煙鬟霜風收緑錦萬頃水雲秋海氣朝成市山光晩對樓並同上人行桑下路日上海邊山軒冕非吾志霜風犯客顔歐陽修密州倚郭一外縣四諸}
