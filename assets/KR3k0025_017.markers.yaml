  - {type: variant, offset: 3416, length: 142, content: 五年傳記麋鹿成群虎豹避之飛鳥成列鷹鷙不擊說苑劉裕謂沈田子曰猛獸不如群狐卿等十餘人何懼王鎮惡通監晉安集猛虎雖云惡亦各有朋儕群行深谷間百獸望風低自矜無當對氣性縱以垂匹儕四散走猛虎還孤棲狐鳴門四旁鳥鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頤猛虎死不辭但慚前所為韓文, WYG: 七}
