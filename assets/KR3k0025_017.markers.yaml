  - {type: variant, offset: 241, length: 10, content: 珠須巨海欲求良玉必崑, WYG: 國春秋時為魯卞邑龔隋置瑕丘縣仙源神農少昊徙都之地周武王以封周公旦萊蕪春秋時為夾谷地漢置萊蕪縣鄒周時為邾國魯繆公改為鄒沿革表形勝泰}
