  - {type: variant, offset: 83, length: 4, content: 璧也抱朴, WYG: 宿麥連雲有幾家五更曉色來書幌夜半寒聲落畫簷並蘇軾濟南府倚郭一外縣四歷城禹城章丘長清臨邑郡號濟南郡沿革禹貢青州之域天文危分野春秋戰國併為齊地秦屬齊郡漢初屬齊國文帝分治濟南國景帝改為濟南郡東漢仍為國俱治東平陵晉移治歴城劉宋割青州西部于此僑立冀州後魏改為齊州兼置濟南郡隋初罷郡存州後改為齊郡唐復為齊州天寶初改為臨淄郡尋改為濟南郡乾元初復為齊州皇朝陞為興徳軍又陞為濟南府沿革表縣沿革歴城古齊歴下城漢置歴城縣禹城周為祝國唐改為禹城縣章丘春秋時為齊髙堂邑隋改為章丘縣長清本漢盧縣地隋置長清縣臨邑本鎮舊縣廢沿革表形勝歴山在府南即舜耕處九河故道在禹城舜祠在府城南祠下有井奎山在府城西上有神祠龍洞山在府城東南下有黒龍潭盤龍山龍堂洞俱在章丘縣境趵突泉在府城西雲莊在府西中有雲錦池鹿角闗在臨邑縣北靈巖寺在長清縣方山上世𫝊佛圖澄卓鍚之地聖井在章丘縣南白雲湖在章丘縣西杜康泉在舜祠西廡下芙蓉堤在文廟東紀勝人物周公晳哀不仕家臣孔}
