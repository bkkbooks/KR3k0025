  - {type: variant, offset: 143, length: 4, content: 傳傳記採, WYG: 被執抗節而死顔真卿杲従弟奉命諭禄山不屈被害皇朝趙隣幾好學能文常作禹别九州賦萬餘言紀勝集清蹕臨溟漲巨海望滔滔神游藐姑射睿藻冠風騷徒然雖觀海何以効涓毫並虞茂淮泥泗水地梁父汶陽東别路青驪逺離樽緑蟻空柳寒凋宻翠棠晩落疎紅别後相思曲悽斷入琴風駱賔王春山臨渤海征旅輟晨装囘瞰盧龍塞斜瞻肅慎鄉北廵非漢后東興異秦皇搴旗羽林客䟦距少年塲並楊師道本朝唐武徳五年以沂水新泰莒置莒州貞觀八年州廢以新泰屬沂州瑯琊郡本朝因之沿革表東州幾日倦征軒千騎驂驔白草原歐陽修山巔危搆倚蓬萊水濶風長一快哉天地涵容百川入晨昏浮動雨潮來趙忭暘谷朝迎日丹霞射海樓雲隨華表鶴風送日南舟孤島煙中樹平波檻外流宋人登州倚郭一外縣三蓬萊文登黄牟平郡號東平州沿革天女危分野禹貢青州之域古為斟尋國唐虞時為隅夷地春秋時為牟子國戰國屬齊秦為齊郡地漢屬東郡後魏析東萊郡于黃縣東中郎故城置東牟郡隋初廢郡置牟州大業初州廢唐復置牟州治牟平又置登州治文登貞觀間二州俱廢如意初復置登州于牟平縣神龍間徙治蓬萊縣天寶改州為東牟郡乾元初復為登州屬河南道本朝屬京都路沿革表縣沿革蓬萊本漢東萊郡武帝于此望海中蓬萊山因築城故名文登本古不夜城北齊始置文登縣黃縣漢舊縣牟平本漢東牟縣唐改為牟平沿革表形勝丹崖山在州城北上有蓬萊閣田横山在州城西田横與其徒五百人棲此天山在蓬萊縣東下有洞冬夏水滴如漏文登山在文登縣東秦始皇招集文士登此山論功頌徳蘆山在黄縣西晉蘆童子因食茯苓昇仙故名大崑崙山在牟平縣東麻姑常于此修道沙門島在州城西海牛島在文登縣北海在州四面於春夏遥見水面有城郭市井人馬往來之狀土人謂之海市紀勝人物周淳于髠博學强紀號稱辨士秦淳于越髠之後以諫知名漢李忠以好禮修整稱劉寵為㑹稽太守有一錢之譽劉岱寵之弟虛己愛物為士人所重劉繇與兄岱齊名太史慈尚義善射為孔融所重三國劉基繇之子史稱為國之良士唐淳于雍髠之後武徳中拜登州刺史皇朝淳于雍髠之後早年乞養王旦稱其純孝李常性鯁直太守榜其閭曰遺直坊紀勝集逺水翻如岸遥山倒似雲方知小姑射誰復語臨汾浮天迥無岸涵靈固非一委輸百谷歸朝宗萬川溢隋煬帝披襟眺滄海憑軾望春芳唐大宗登髙臨巨壑不知十萬里雲島相接連風濤無極已祖孝孫斷濤還共合連浪或時分李白本朝建隆三年于縣置北海軍置昌邑縣隷之乾徳三年陞為濰州沿革表東方雲海空復空羣仙出没空}
