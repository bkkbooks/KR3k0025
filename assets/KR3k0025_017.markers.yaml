  - {type: variant, offset: 238, length: 0, content: '', WYG: 嘉定十三年賈渉取萊為防禦郡至道三年以萊屬淮陽軍熈寧七年以萊為東路沿革表東州負海圻風物老依依歳晩鵶來少天寒鴈過稀莫笑東州太守頑三齊人物舊安閒並歐陽修荷氣夜凉生枕席水聲秋醉入簾幃一㠶千里空囬首寂寞船窻祇自知同上濰州倚郭一外縣二北海昌邑昌樂郡號濰水州沿革天文危分野禹貢青州之域秦屬齊郡漢為下宻縣屬膠東國韓信戰濰水正在此隋改北海縣唐置濰州治北海縣尋廢州以縣屬青州本朝建北海軍尋復為濰州沿革表縣沿革北海漢置平度縣屬東萊郡東漢置膠東郡屬北海縣昌邑漢為都昌縣本朝置昌邑縣昌樂漢為營陵縣地本朝改為昌樂縣沿革表形勝塔山在州東南丹河發源于此擂鼓山在州南白浪河發源于此几山在縣西南山形如几陸山在昌邑縣南漢霍光食邑于此孤山在昌樂縣東上有夷齊廟白浪河在州東唐竇琰甞引水開田東丹河在北海縣塔山下芙蓉泉在昌邑營丘城在昌樂縣東即太公受封之地人物五代韓熈載唐進士才氣俊逸江左號韓夫子徐問真有道術與歐蘇善漢孫賔碩倜儻好竒節為京兆虎牙都尉隋杜松贇性剛烈重名義為石門隊正不降賊而死皇朝滕中正有才幹累官諫議大夫二子𤣥錫𤣥晏並舉進士孫祖徳以進士為吏部侍郎世稱鯁直劉闃嘗從文彦博討具州賊戰功第一呉奎舉五經為叅知政事買田為義莊卒之日家無餘貲紀勝集分空碧霧晴連洲彩雲宻欣同夫子觀深愧𤣥虛筆隋煬帝月暈天風霧不開海鯨東蹙百川逥李白霏煙泛濟浦緑草啓河汀畫裳晨應月文戰曙分星薛克構八月濤聲動地來頭髙數丈觸山逥湏臾却入海門去卷起沙堆似雪堆劉禹錫本朝建隆三年以青州北海縣建為北海軍又置昌邑縣隷之乾徳三年陞為濰州又増昌樂縣為上州團練沿革表葱蘢曉光開旋轉餘華㺯下馬成野酌佳哉誰與共蘇東坡倚軒盈以長嘯兮袂輕舉而飛翻極千里于一瞬兮寄無盡于雲烟忽雲散于城邑兮徂清夜之既䦨惟所往而樂易兮此其所以為超然同上淄州倚郭一外縣三淄川長山鄒平髙苑郡號淄川州沿革天文危分野禹貢青州之域周為淄州之境春秋戰國屬齊隋置淄州後周廢唐初改淄州本朝因之縣沿革淄川本漢盤陽縣屬濟南郡東漢屬齊國晉省隋置淄州後周廢唐復置本朝因之長山本漢濟南郡於陵縣地劉宋于此置廣川郡北齊改東平郡隋廢郡改為長山縣唐初屬鄒州後屬淄州本朝因之鄒平本古鄒侯國漢置鄒平縣屬濟南郡晉為鄒縣屬樂安國後廢唐復置屬淄州本朝因之髙苑古苑墻地漢置髙苑縣隋改曰㑹城尋復唐屬鄒州州罷以縣屬淄州本朝仍舊沿革表形勝梓橦山在州東上有鬼谷洞夾谷山在淄川西即齊魯㑹盟之處長白山在長山縣西南髙二千九百尺周六十里上有醴泉寺即范仲淹讀書處太湖山在長白山南上有石室並敗漆船記云堯時物也虎頭崖在鄒平縣南商山在髙苑縣東髙雲洞在州東蒼龍峽在淄州縣西古蒲臺秦皇築之以望海蓬萊宮臺上紫蒲係馬蒲生盤如係馬之狀紀勝人物春秋管仲相桓公成霸業晏子齊景公相顯于諸侯漢張軌仕隴右家無餘財藏書數百卷唐段志𤣥資質偉岸以驍果為秦王所識房𤣥齡事太宗為名宰相皇朝麻仲英博學有孝行鄉評重之韓琦薦為國子助教賈同舉進士王欽若方貴盛欲致之不往石昂好學不仕節度使符習髙其行趙師民九歳能文舉進士為國子直講上勸講箴後遷刑部郎中有集二十卷紀勝集積流横地紀䟽派引天潢唐太宗横萬里而極海兮頽風浩其四起柳宗元歇鞍憩古木解帶掛横枝歌鼓川上亭曲度神飈吹雲歸碧海夕鴈沒青天時試登髙而望逺極雲海之微茫雲物不隠象三山共分明奈何疾風怒忽若基柱傾海水雖無心洪溥亦相驚深沉百丈洞海底那知不有蛟龍蟠並李白本朝景徳三年以髙苑置宣化軍熈寧三年廢軍復為縣隷州沿革表新荷出水雙飛鶩喬木成隂百轉鶯載酒未妨佳客醉憑髙仍見老農耕歐陽修公退留賔誇酒美睡餘欹枕看山青同上淮陽軍倚郭一外縣一下邳宿遷郡號下邳軍縣沿革天文斗牛分野禹貢揚州之域本徐州下邳縣後漢為下邳梁為武州唐置邳州後屬泗州又屬徐州下邳縣宿遷春秋時鍾吾子國依宿國所遷地秦置下相縣漢又置􅤌猶縣晉置宿豫郡後魏屬南徐州東魏屬東楚州後周屬泗州隋置下邳郡唐改為宿遷縣沿革表形勝葛嶧山在郡城西禹貢嶧陽孤桐謂出此山之南磬石山在郡城西南上有石其聲清亮可為磬禹貢泗濵浮磬即此山所出者黄石山在下邳城北上有黄石公廟鐵佛山在下邳城北上有三鐵佛馬陵山在宿遷縣北髙阜狀若馬陵峒峿山在宿遷縣北上有石洞鐫七真象舊黄河在郡城南武河在下邳城西北下入黄河氾水在宿遷縣界下邳城在郡治東魏武招呂布于下邳即此圯橋在下邳東南即黄石公授張良素書之所紀勝人物漢嚴延年宣帝時為侍御史劾奏霍光朝廷肅然敬憚之翼奉元帝以諸儒薦徴待詔數言事天子敬焉陳球舉孝亷累官侍御史周紆為洛陽令下車先問大姓主名五代沈贇事晉為祁州刺史契丹䧟城守節而死皇朝劉福以功累官雄州防禦使為政簡易人咸徳之紀勝集初語燕雛知社日習飛鷹隼識秋風波摇珠樹千尋㧞山鑿金陵萬仞空杜詩江漢曽為客相遇每醉還浮雲一别後流水十年間韋詩片雨楚雲暮千家淮水秋開簾見芳草送客上春洲請問山中桂王孫幾度遊嚴君平過淮芳草歇千里又來歸野水呉山出家林越鳥飛荷香隨去棹梅雨濕征衣無數滄州客如君達者稀前人本朝太平興國七年以下邳宿遷二縣建淮陽軍元豐初改屬京都西路沿革表身如𫝊舎任西東夜卧荒郵四壁空鄉夢漸生燈影外客愁多在雨聲中淮南火後居民少河北兵前戰鼓雄萬里别離心正苦帛書何必寄歸鴻汪水雲千年事與浮雲去想見留侯次是非丈夫出身佐明主用舎行藏}
