  - {type: variant, offset: 19, length: 3, content: 考工記, WYG: 正東曰青州葢以土居少陽其色青故以名州武王封太公望于此為齊國秦置齊郡漢分置北海郡屬青州東漢為齊北海樂安三國地以青州治臨淄魏為益都城晉為齊樂安二國地安帝時廣陵僑立南青州故於青州加北字劉宋省南青州乃去北字仍曰青州後魏治東陽又改益都郡後周改為齊郡隋復為青州尋改北海郡唐為青州本朝改鎮海郡地理沿革表縣沿革益都本漢廣縣地東漢為益都晉時前趙築廣固城夀光古斟灌氏地漢置夀光縣臨朐本齊伯氏駢邑漢置臨朐縣博興周薄姑地漢為博昌縣千乗古廣饒地東漢屬樂安臨淄本齊國營邱地東漢置臨淄縣同上形勝雲門山在州城南頂中有通穴如門可容百餘人逺望如懸鏡旁有黒龍洞及石井堯山在州城西因堯巡狩所登故名牛山在臨淄縣南齊景公登牛山顧其國而嘆曰美哉國乎即此靈山在臨朐縣東齊大旱景公欲祀靈山即此大峴山在臨朐縣東南宋武帝伐南}
