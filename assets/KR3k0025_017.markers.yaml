  - {type: variant, offset: 9, length: 0, content: '', WYG: 孤絶忠勇之標掩白玉而振彩者哉唐太宗贈比干詔婦姑城南風雨秋婦姑城中人獨愁岑參詩題雍丘婦姑城陵陽佳地昔年逺謝朓青山李白樓陸龜䝉題尉氏氣酣登吹臺懐古視平蕪芒碭雲一去鴈鶩空相呼杜甫題吹臺荒臺森荆杞蒙籠無上路傳是古人跡阮公甞嘯處包融題嘯臺青陵臺畔日光斜萬古真魂倚暮霞李商隠題青陵臺偷隨栁絮到城外行過水西聞子規李商隠題流杯亭春到三陵淑氣和雪初消䖏翠嵯峨梅花未知開多少䇿杖攜壺試一過胡曽題三陵冡本朝祥符二年改浚儀縣為祥符宣和三年改紂王城為青陽城政和七年改酸棗為延津建隆元年改正城縣為鶴丘後改長垣乾徳元年改東昏鎮為東明縣崇寧四年以考城太康𨽻拱州大觀四年廢州二縣復來𨽻京畿宣和二年復以太康𨽻拱州六年仍𨽻京畿咸平三年以通許鎮置咸平縣沿革表梁園歌舞足風流美酒如刀解斷愁憶得承平多樂事夜深燈火上樊樓劉子翬題豐樂樓嘉節難逢真上已賜筵榮入小瀛洲韓琦題瓊花苑宜春舊臺沼日暮一登臨解帶行蒼蘚移鞍坐緑隂樹疎鳴鳥逺水淨落花深王安石題宜春苑京東東路青州倚郭一外縣五益都夀光臨朐博興千乗臨淄郡號齊郡}
