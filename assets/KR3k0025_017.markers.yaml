  - {type: variant, offset: 1172, length: 0, content: '', WYG: 世孫南北朝孔鮮孔子二十六世孫皇朝孔宜孔子四十四世孫孔道輔孔子四十九世孫顔復顔子四十八世孫紀勝集地猶鄒氏邑宅即魯王宮嘆鳳嗟身否傷麟怨道窮今看兩楹奠尚與夢時同唐𤣥宗造化鍾神秀隂陽割昏曉杜甫浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘同上城隅緑水明秋日海上青山隔暮雲李白聖人久已矣游夏遥相望日出見闕里山平知汶陽髙適孔聖家鄒魯儒風藹典墳龍驤過舊宅鳳徳詠餘芬入廟神如在升堂樂似聞縁知一王法今日待明君白樂天憑崖攬八極目盡長空䦨魯客抱白鶴别余往泰山初行若片雲杳在青崖間白詩本朝大觀四年以瑕丘縣為瑕縣政和八年升為襲慶府祥符五年改曲阜為仙源祥符元年改奉符為泰安軍開寶五年奉符移治岱京鎮大觀四年以龔丘縣為龔縣熈寧五年省為鎮入仙源沿革表鳥去蒼烟古木人歸緑野孤舟信美雖非吾土消憂且湏登樓張文潜溪田雨足禾先熟海樹風高葉易秋踈傅閭里詢故老秦皇車駕想東遊同上發典謨訓誥之義振金石絲竹之聲如天地兮否而復泰如日月兮晦而復明王禹偁函丈従容問且酬展才無不至公侯誰如曽㸃推鳴瑟獨對春風詠未休呂大鈞曲阜兮遺墟先}
