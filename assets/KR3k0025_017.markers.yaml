  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十七宋潘自牧撰郡縣部京畿路開封府倚郭一五開封符外縣十祥尉氏陳留雍丘東封丘扶中牟鄢陽武考延津太長垣明溝陵城康咸平郡號大梁陳留汴梁郡沿革禹貢兖豫二州之域天文角亢分野春秋鄭衞陳三國之境戰國魏都于此號為大梁秦為三川郡地漢為陳留郡地晉改為陳留國東魏廢國置梁州及陳留開封二郡北齊以開封省入陳留郡後周改梁州為汴州隋初廢陳留郡州如故大業初廢州以其地併入滎陽大梁潁川等郡唐武徳初於此置汴州天寶初復改為陳留郡乾元初又為汴州興元初自宋州徙宣武軍於此五代梁都于此號為東京置開封府後唐復為汴州及宣武軍晉漢周皆為東京開封府地理沿革表縣沿革開封本鄭衞陳三國地五代梁置開封祥符附郭漢為浚儀縣屬陳留郡魏晉以後皆因之東魏于此置梁州後周改汴州隋廢陳留郡以縣屬鄭州唐於此置汴州以開封縣省入尋復舊本朝初改祥符尉氏在府城南本春秋鄭大夫尉氏之邑秦始置尉氏縣漢屬陳留郡晉及後魏因之北齊省隋復置屬許州後屬潁川郡唐屬洧川後屬汴州本朝屬開封陳留在府城東古有莘城春秋為留地屬鄭後為陳所併故曰陳留秦始置陳留縣漢為陳留郡治晋末郡縣皆廢隋初復置屬宋州後屬梁郡唐初屬杞州又改屬汴州五代屬開封雍丘古雍國黃帝之後殷周皆以封夏后為杞國漢置雍丘縣屬陳留郡後魏屬陽夏郡隋初置杞州大業初廢州以縣屬梁郡唐復置杞州尋廢五代晋時改杞縣漢周至本朝仍曰雍丘封丘本古封父國漢始置封丘縣屬陳留郡尋析置平丘縣晉省平丘以縣屬陳留國後魏入酸棗縣尋復置北齊省隋復置屬滑州後屬東郡唐屬汴州五代屬開封本朝仍舊中牟本春秋鄭邑漢始置縣屬河南郡晉屬滎陽郡後魏省尋復置東魏増置廣武郡後周徙縣治圃田城隋初廢郡改縣曰内牟屬鄭州後又徙舊治唐復改中牟縣并置牟州尋罷州以縣屬管州龍朔初屬鄭州五代梁屬開封府唐屬鄭州本朝屬開封陽武秦為博浪沙地漢始置陽武縣屬河南郡晉屬滎陽郡東魏屬廣武郡北齊省隋復置屬滎陽郡唐屬鄭州五代屬開封府本朝仍舊延津本春秋鄭之廩延戰國嘗為韓所都秦復置酸棗縣漢屬陳留郡後魏併入小黄後復置屬東郡北齊併入南燕縣隋初復析置酸􅀥縣屬滑州大業初屬滎陽郡唐復屬滑州五代梁屬開封府本朝改延津縣長垣本春秋時衛之匡邑秦屬陳留郡漢置長垣縣王莽改曰長固後漢復舊晉屬陳留國後魏屬東郡隋改為匡城縣唐因之五代梁晉復為長垣屬開封府後唐復改匡城縣本朝初復長垣東明本漢東昏縣王莽改曰東明東漢復曰東昏本朝初置東明縣扶溝本漢舊縣屬淮陽國以小扶亭有洧水之溝因名東漢屬陳留郡晉省後魏復置東魏屬許昌郡隋屬潁川郡唐於此置北陳州尋廢以縣屬洧州後屬許州五代梁屬開封府本朝仍舊鄢陵春秋鄭邑鄭伯克段於鄢即此戰國謂之安陵漢始置鄢陵縣屬潁川郡東魏屬許昌郡北齊省入許昌縣隋復置屬許州唐因之本朝屬開封府考城本周之戴國春秋時鄭取之改名榖城秦置甾縣漢屬梁國東漢始改考城屬陳留郡晉省後魏置考陽縣北齊又改為城安縣屬濟隂郡隋復為考城縣屬宋州唐置梁州尋廢以縣屬曹州五代晉漢屬開封府本朝屬拱州後仍屬開封府太康本夏太康所築城漢置陽夏縣屬淮陽國東漢屬陳國晉屬梁國後魏置陽夏郡隋改縣曰太康屬匡城郡復置陽夏郡改縣曰匡城縣隋末廢唐初復置屬陳州五代梁屬開封府本朝屬拱州咸平本漢陳留扶溝二縣地本朝初始置通許鎮咸平中陞為咸平縣屬開封府同上形勝夷山在府南以山平夷故名黒山在封丘縣北曹操斷袁術糧道處彭祖岡在鄢陵縣北上有彭祖墓黄河在府城北黄池在封丘縣南春秋公㑹呉子于黄池即此逍遥宫在陳留縣南汴宫在府城内望京樓在府城西葵丘在考城縣梁園在府城東南平臺在府城東南封臺在府城南玉津園在府城南夷門即府城東門侯嬴為夷門監即此瓊林苑在府城西青陵臺在封丘縣界宜春苑在府城内衛靈公祠在長垣縣東北蘧伯玉墓在長垣縣南鶴城在長垣縣西衛懿公飬鶴處棲城在長垣縣西邯鄲伐衛取漆即此蒲邑在長垣縣治子路為蒲宰即此龍城在長垣縣東龍逢所居之處上有墓及祠韓宫在延津縣景靈宮在府城内中有藝祖以下御容昇平樓在府城内乃宮中觀宴之所蓮花樓在府城内三槐堂在府城内王佑手植三槐即此拱奎堂在府治信陵臺在府城内本魏公子無忌勝遊之地奉天臺在府治内本祭天之所平臺在府東梁園内本古列仙吹臺迎秋臺在府城内扶臺在扶溝縣治程顥所築百花臺在府城内明道祠在扶溝縣治博浪城在府城北即張良擊秦始皇處同樂園在府東陳橋驛在府城北即宋太祖為衆所擁處輿地紀勝人}
