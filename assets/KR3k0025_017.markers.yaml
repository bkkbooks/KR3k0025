  - {type: variant, offset: 151, length: 6, content: 於蚌或割百蚌, WYG: 域古萊夷地春秋為萊子國齊侯遷萊子于郳在國之東故曰東萊秦屬齊郡漢始析置東萊郡置掖縣屬青州東漢徙治黃縣晉改東萊國劉宋仍改為郡徙治曲城後魏分青州置光州領東萊郡同治于掖隋初罷郡改光州為萊州後復為東萊郡唐為萊州天寶初改東萊郡乾元初復為萊州本朝屬京東東路沿革表縣沿革掖本漢舊縣為東漢舊治萊陽本漢東萊郡之昌陽縣地五代唐改為萊陽縣膠水本春秋介國地魏置膠州取境内膠水為名即墨本齊國地以其地臨墨水故名沿革表形勝福山禄山俱在州城西北相峙産温石大基山在掖縣東松竹華卉為一郡最五龍山在萊陽南下有五水相合流入海小邾山在膠水南錯水由此入海如姑山在即墨西南上有神祠即漢九祠之所萬歳河在州城東秦皇漢武皆禱于此掖河在掖縣東北流入海膠水源發鐵橛山墨水源發平度州紀勝人物漢葢公善治黃老曹參師事之司馬均隠居教授}
