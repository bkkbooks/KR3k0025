  - {type: variant, offset: 81, length: 0, content: '', WYG: 安邱莒髙宻膠西郡號髙宻州沿革天文虛危分野禹貢青州}
  - {type: variant, offset: 81, length: 0, content: '', krp: 安邱莒髙宻膠西郡號髙宻州沿革天文虛危分野禹貢青州}
  - {type: variant, offset: 82, length: 0, content: '', WYG: 域後魏于此置髙宻郡北齊省入東武縣唐置宻州本朝為防禦州開寶五年陞為安化軍沿革表縣沿革諸城本魯諸邑漢置諸縣屬瑯琊郡地晉屬東莞郡隋改為諸城縣安丘古渠丘地漢置安丘縣莒古莒子國漢置莒縣髙宻本齊晏平仲封邑漢置髙宻縣膠西本春秋介國地漢為黔陬縣沿革表形勝雨羅山在安邱縣西上有雲氣羅布天必雨常山在州西南歳旱禱雨輙應盧山在州東南秦人盧敖之所從遁上有盧敖洞聖燈岩九仙山在諸城縣西南竒秀不減鴈蕩浮來山在莒州西春秋書莒人盟于浮來即此孝源泉在莒北唐孝子孫既廬母墓醴泉出墓側因名礪阜山在髙宻縣西産礪石鐵撅山在膠西西南膠水發源于此石臼島在膠西正南海中天澤泉在膠西南三十里九穴泊在髙宻縣西北紀勝人物漢甄宇習嚴氏春秋教授常數百人梁丘賀從京房授易官至少府圖形麟閣南北朝劉勰好學撰文心雕龍臧榮緒純篤好學括東西晉為一書紀録志𫝊五代孫晟仕唐為著作郎後為周世宗所獲欲殺之臨刑神色怡然南望拜曰臣惟以死報國皇朝王子輿舉進士為主簿精敏吏事歴官諫議大夫楊光輔有學行國子丞致仕韓晉卿以明經中第歴官州縣稱為循良第一紀勝集營丘負海曲沃野爽且平洪川控海濟崇山入髙㝠陸機十洲雲霧逺三山波浪髙長瀾疑浴日連島類奔濤隋虞茂洪波迴地軸孤嶼映雲光落日驚濤上浮天駭浪長楊師道髙髙至天門日觀近可攀李白本朝元祐三年以板橋鎮為膠西縣兼臨海軍使沿革表鴈入寒雲驚曉角雞鳴滄海浴朝暾長天極目無飛鳥積雪生光射落輝晴明風日家家柳髙下樓臺處處山並歐陽修凍合玉樓寒起栗光摇銀海眩生花遺蝗入地應千}
