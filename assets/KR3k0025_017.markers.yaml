  - {type: variant, offset: 549, length: 560, content: 水行莫如用舟陸行莫如用車以舟之可行於水也而求推之於陸則沒世不行尋常莊子天運篇梁麗可以衝城而不可以窒穴言殊器也騏驥驊騮一日而馳千里捕鼠則不如狸狌言殊技也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也同上秋水篇故救餓者以員寸之珠不如與之橡𦫶貽溺者以方尺之玉不如與之短綆各在其所急也劉子互入捄援百代之傳寶以之彈鳥則不如泥丸之勁也棠谿之劍天下之銛也用之穫穗曾不如鉤鎌之功也劉子史孫思邈曰膽欲大而心欲小智欲圓而行欲方舊唐書同上傳記珠彈不如泥丸各有所用也前東方朔傳尺有所短寸有所長驊騮騏騄天下之俊馬也使之與狸鼬試於釜竈之上其疾未必能過狸鼬也黃鵠白鶴一舉千里使之與燕服翼試之堂廡之下廬室之間其便未必能過燕服翼也劉向新序和氏之璧價重千金然以之間紛曾不如瓦磚隋侯之珠國之寶也然用之彈鵲曾不如泥丸騏驥騄耳倚衡負軛而趍一日千里此至疾也然使捕鼠曾不如狸干將鏌釾拂鐘之錚試物不知此至利也然以之補履曾不如錐說苑集鼎也不足使柱車馬也不可使守閭佩玉長裾不利走趨韓文子兩堯不能相王管子凡物不並盛陰陽是也韓非子兩貴之不能相事荀子王制近君則威損遠君則勢盛一淵不兩蛟一棲不兩雄一則定兩則爭淮南子日月不並出狐不二雄神龍不匹猛獸不群鷙鳥不雙說林訓月望日奪其光陰不可以乘陽也日出星不見不能與之爭光也並淮南子史都城過百雉國之害也左隱元越不為沼吳其泯矣哀十一崔之薄慶之厚也襄, WYG: ''}
