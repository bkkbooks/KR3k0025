  - {type: variant, offset: 104, length: 0, content: '', WYG: 河決臨邑城壊三年移治孫耿鎮政和元年陞為望沿革表楊柳娉婷緑荷華旖旎紅魚遊華葉底人在鑑湖中太白拈春酒輕衣受晩風龜蒙與鳧繹只隔片雲東單父東樓喜奉連枝㑹南陌愁為落葉分城隅緑水明秋日海上青山隔暮雲同上沂州倚郭一外縣四臨沂沂水乗費新泰郡號瑯琊州沿革本禹貢徐兖二國之境天文奎婁分野秦漢晉皆為瑯琊地後魏以此置北徐州後周改沂州以城臨沂水故名隋改州為瑯琊郡唐復沂州天寶初改瑯琊郡乾元初復為沂州本朝因之沿革表縣沿革臨沂在沂州境内隋置臨邑縣乗春秋時􅤂國地漢為嶧縣沂水周為鄆邑隋改為沂水縣費古費國地春秋時為魯季孫氏之邑新泰本漢泰山郡晉泰始中置新泰縣沿革表形勝愛古山在州北金雀山在州西南大利冶山在臨沂縣西南路旁有巨鐵二塊在地中君山在乗縣北八十里上有池}
