  - {type: variant, offset: 1173, length: 1, content: 服, WYG: 兮闕里神髣髴兮如在涕潺湲兮不已窮天地兮一人掲日月而照臨鮮于侁徐州倚郭一外縣四彭城沛蕭豐滕郡號彭城州沿革天文房心分野禹貢徐州之域古大彭之國春秋為宋地戰國屬楚秦置彭城縣屬泗水郡項羽自立為西楚霸王都于此漢改泗水為沛郡又立楚國知徐州宣帝改為彭城郡晉武帝于淮南僑立徐州安帝時分淮北}
