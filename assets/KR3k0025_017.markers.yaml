  - {type: variant, offset: 3, length: 0, content: '', WYG: 力侯嬴薦之魏公子擊殺晉鄙奪兵破秦漢陳平陽武人佐髙祖定天下六出竒計官至丞相封曲逆侯欒布郡人嘗客彭越髙帝義之後以功封鄃侯張蒼陽武人著律例以功封北平侯晉劉昆東昏人初為江陵令後遷𢎞農太守俱有善政有反風滅火虎北渡河之異庾亮鄢陵人風骨峻整仕為散騎常侍南北朝江淹考城人少孤採薪養母仕齊梁累官御史中丞江湛考城人以孝聞為太子舎人唐劉仁軌尉氏人家貧讀書仕為陳倉尉累遷尚書左僕射韋思謙陽武人八歳喪母以孝聞舉進士累官中書門下三品皇朝李穆陽武人性至孝舉進士累官太子中允沈倫太康人講學自給初仕給事中累官右僕射宋準雍丘人舉進士除校書郎文詞清雅為世所重袁逢吉鄢陵人四歳能誦爾雅孝經七歳兼通論語尚書開寶中擢三傳第王徳延東昬人素謹慎事太祖真宗官至東京都廵檢輿}
