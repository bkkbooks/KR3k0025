  - {type: variant, offset: 275, length: 1, content: 強, WYG: 所有水東注乃子路問津之處西唐山在泌陽髙鳯隠居漢書鷰子山在泌陽醴水源出桐柏山太湖在比陽縣天目山蠙珠潭在桐柏縣又隋開皇中置蠙珠觀並見贅錄本朝開寶五年省平氏縣入泌陽沿革表光化軍倚郭一光化郡號酇城隂國隂城軍縣沿革韓地角亢氐分野禹貢豫州之域漢為南陽郡隂酇二縣晋置順陽郡治酇縣西魏治酇城郡後周郡廢屬襄州省酇入隂縣隋曰隂城縣屬㐮陽郡唐後省隂城入谷城屬襄州本朝乾德三年以舊谷城地置光化軍及乾德縣熙寧軍廢縣屬襄州後復舊地理沿革表形勝固封山在城西北本名崇山小江河在城西北四十里朱寨河在城東六十里孟樓河在城東北五十里温水河在城南三里五百洲在城西南四里白河在城東南一百五十里泌河地理同與白河對輿地紀勝人物漢蕭何就封于此有廟在城内皇朝張士遜為宰相石衆有文十卷名滄浪集輿地紀勝本朝紹興十一年復置光化軍領光化縣又以光化軍為通化軍其後逆亮叛盟復為軍縣如初沿革表層樓壓清漢初上便忘歸夕靄藏平野晴烟漏翠微城昬晩鴉集江静野鷗飛何日賦招隱行吟傍釣磯李豸谷伯故國鄼侯所封雖曰小邦實為要地光化守啓棗陽軍倚郭一棗陽郡號棘陽白水舂陵軍縣沿革本漢南陽郡蔡陽舂陵二縣東漢改舂陵為章陵晉屬義陽郡後廢之置廣昌縣及廣昌郡又舂陵置安昌郡元魏置南荆州西魏改昌州隋開皇廢二郡仁夀改廣昌曰棗陽大業置舂陵郡唐武德廢郡改昌州為唐州省唐州清覃入此貞觀省舂陵縣入焉又以棗陽屬隋州本朝升棗陽軍治棗陽縣地理沿革表形勝紀山在城南一百五十里霸山自随州撥𨽻棗陽資山在州北劉白河發源于白水牡丹山在縣南白水山白河所出}
