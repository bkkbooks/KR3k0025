  - {type: variant, offset: 816, length: 2, content: 仁與, WYG: 盖其墳其後郡守碣孝誠之墓曰朱孝子墓其子揚善又於墓側為庵以守其孫浩以母多病終身不娶不飲酒食肉蔣舉居母喪結廬墳側芝生於拳石詔旌表門閭輿地紀勝集殘陽楚水畔獨弔舜時人不及廟前草至今江上春竇羣題二妃廟本朝南北東西幾萬峰郡城如在畫屏中何人截斷湘妃竹半醮秋江作釣筒陶弼嶺開蠻壤斷北路下湘川緑水紋如染丹楓色欲燃同上湘是相分}
