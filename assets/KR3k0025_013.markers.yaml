  - {type: variant, offset: 812, length: 0, content: '', WYG: 黄盖赤璧之役建䇿火攻唐史青上書自薦五歩成詩唐傑號唐孝子皇朝路振試巵言日出賦陳亨伯靖康死虜中蔣緯楊誠齋為作傳輿地紀勝集瀟湘水國旁黿鼉杜詩湘水永州路水碧山崒兀古木暗魚潭隂雲起龍窟李詩朝陽嵓下湘水深朝陽洞口寒泉清元結日晴瀟湘渚雲斷岣嶁岑栁詩欵乃一聲湘水緑同上殘臈泛舟何處好最多吟興是瀟湘杜荀鶴本朝雍熈元年以零陵縣之東安塲置縣沿革表牕外秋聲湘瑟怨檻前行色楚㠶飛劉能零陵郡北雲㠶落信美臺前江月明李當遇二江明月九峰雲雲月堂中希静人芙蕖池淺蛙迎雨鈷鉧潭空馬送春陶弼青玻瓈盆挿千峰湘江山青無古今何處拭目窮表裏太平飛閣暫登臨朝陽不聞皂盖下愚溪但有古木隂黄魯直湘江佳致在浯溪元結雄文向此題想得後人無以繼髙名長}
