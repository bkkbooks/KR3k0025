  - {type: variant, offset: 277, length: 1, content: 衽, WYG: 有光武廟赤眉山在縣東北甘泉山在縣東北地肥而水甘獅子山在縣南石虎山一名東石虎山又有西石虎山四望山團石山皆在縣東北輿地紀勝人物漢岑彭光武功臣岑熈尚安帝妹涅陽公主魏鄧艾平蜀唐岑文本孫峰羲輿地紀勝荆湖南路潭州倚郭二外縣十長沙衡山善化安化醴陵攸縣寧湘鄉鄉湘潭益陽瀏陽湘隂武安軍節度湖南安撫司轉運司郡號長沙湘城臨湘湘州武安軍州沿革鶉尾之次翼軫之度長沙自有一星在軫中古三苖國之地禹貢荆州之域春秋戰國屬楚秦置長沙郡漢髙帝為長沙國東漢長沙郡吳分置衡陽郡晉兼置湘州尋廢之宋復置湘州隋置潭州大業廢為長沙郡唐武德曰潭州貞觀屬江南道天寳曰長沙郡中和升欽化軍節度景福改武安軍節度五代馬殷據之為長沙府後入南唐李氏地理沿革表縣沿革長沙秦以青陽地置湘縣漢為臨湘縣東漢為長沙郡治宋為國齊以後為郡治隋為潭州治改臨湘縣曰長沙善化本漢臨湘縣地本朝析置衡山南岳之地漢為湘南縣地吳析置衡陽縣及置衡陽郡晋改曰衡山縣屬衡陽郡隋屬潭州神龍屬衡州石晋屬潭州後復屬衡州本朝改屬潭州安化本漢益陽縣地本朝析置醴陵本漢臨湘縣地東漢置醴陵縣屬長沙郡隋省入長沙縣唐武德復置攸縣本漢長沙國地東漢屬長沙郡南齊屬湘東郡陳改為攸水縣隋省入湘潭後復置唐武德置雲州貞觀州廢屬衡州後梁屬潭州後又屬衡州本朝來屬湘鄉本漢湘南縣之湘鄉東漢置縣屬零陵郡吳屬衡陽郡晉為郡治隋省入衡陽縣屬長沙郡唐武德復置屬潭州湘潭本漢湘南地為長沙國東漢屬長沙郡吳屬衡陽郡梁廢湘南縣而置湘潭縣衡陽志云陳置隋屬衡山郡唐元和屬潭州益陽本漢屬長沙國東漢屬長沙郡吳屬衡陽郡隋屬長沙郡唐屬潭州瀏陽本漢臨湘縣地吳置瀏陽縣屬長沙郡隋廢為歸仁鎮入長沙縣唐景龍復置屬潭州湘隂春秋羅國秦羅縣屬長沙郡漢屬長沙國東漢分置漢昌縣吳改漢昌曰吳昌並屬長沙郡宋元徽析置湘隂縣屬湘東郡梁置羅州及岳陽郡二縣屬焉陳廢置州隋平陳羅縣岳州省湘隂入岳陽尋改岳陽為湘隂省吳昌入羅縣唐武德省羅縣入湘隂屬岳州本朝改𨽻潭州寧鄉本漢益陽縣地吳分置新陽縣屬衡陽郡晉改為新康隋省入益陽縣唐武德復置新康屬潭州七年省之本朝置寧鄉縣地理沿革表形勝南岳衡山在縣西第三小洞天詳見前集仙道部及後集地理部大圍山在醴陵縣第十三小洞天洞陽山在長沙縣係第二十四小洞天洞庭湖青草湖詳見地理部嶽麓山在衡陽之足有書院係御書扁額龍山犀峰皆在湘鄉鸞山鳯嶺皆在攸縣虬淵在醴陵山中有洞穴玉潭在寧鄉有鎮}
