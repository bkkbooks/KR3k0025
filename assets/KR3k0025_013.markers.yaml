  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十三宋潘自牧撰郡縣部京西南路房州倚郭一外縣一房陵竹山保康軍節度郡號房陵防渚上庸白馬庸國竹山州沿革楚地翼軫分野鶉尾之次禹貢梁州之域春秋麋庸二國戰國屬楚秦以後屬漢中郡魏置新城郡晋新城上庸二郡梁立岐州後魏改光遷國後周改遷州隋大業廢州為房陵郡唐武德曰遷州又於竹山縣置房州貞觀廢遷州移治房陵為房陵郡地理沿革表縣沿革房陵漢屬漢中郡東漢屬新城郡後魏分置大洪縣後周改永清改房陵縣為光遷唐貞觀改光遷曰房陵為房州治本朝省永清入焉竹山本古庸國漢為漢中郡上庸縣魏分置上庸郡南朝廢之梁置安城新豐二縣西魏改安城曰竹山置羅州改新豐為上庸後周改孔陽隋改羅州曰房州孔陽復曰上庸唐貞觀徙房州治房陵一縣屬焉本朝省上庸入竹山地理沿革表形勝方城山在竹山縣東左傳云楚國方城以為城庸城山在竹山縣西舊名垂鼓山龍祗山在竹山縣南云王若冲於此昇天雞鳴山馬息山馬盤山馬塞山皆在房陵横鞍山與庸城山相連建鼓山爛柯山覆船山停舟山皆在房陵鳯溪鰲水在竹山青峯赤崖白谷皆在房陵又房陵有三十四山三十五溪見寰宇記輿地紀勝人物周尹吉甫有廟在城西房之人尹姓為多後漢黄香有至孝名輿地紀勝集惟君固房陵節誠貫古今李白贈韋房州本朝雍熈三年升保寧軍節度開寶中省永清上庸二縣沿革表有客常談解散川偶因晴景到山前溪流似鏡清無底石壁如門翠挿天夜氣結成三洞雨春渠飲盡一川田臨行始覺房陵}
