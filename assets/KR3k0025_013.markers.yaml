  - {type: variant, offset: 352, length: 1, content: 古, WYG: 夜醉長沙酒曉行湘水春杜詩秋曉岳増翠風髙湖湧波同上楚岫千峰翠湘潭一葉黄韋迢長沙十里平勝地猶在險韓詩班竹泣舜婦青湘弔楚臣同上湘淚淺深滋竹色楚歌重疊怨蘭叢李義山本朝乾德元年削軍額端拱復武安軍乾德三年以長沙縣常豐塲置縣開寶省}
  - {type: variant, offset: 352, length: 1, content: 古, krp: 夜醉長沙酒曉行湘水春杜詩秋曉岳増翠風髙湖湧波同上楚岫千峰翠湘潭一葉黄韋迢長沙十里平勝地猶在險韓詩班竹泣舜婦青湘弔楚臣同上湘淚淺深滋竹色楚歌重疊怨蘭叢李義山本朝乾德元年削軍額端拱復武安軍乾德三年以長沙縣常豐塲置縣開寶省}
  - {type: variant, offset: 354, length: 0, content: '', WYG: 紹聖四年析長沙置善化縣分治郭下乾德三年以衡州衡山縣𨽻潭州淳化二年還衡州四年來屬熈寧六年分益陽湘鄉地置安化縣乾徳三年以衡州攸縣𨽻潭州紹興三年以益陽縣屬鼎州尋復故淳化四年以岳州湘隂縣𨽻潭州太平興國二年以長沙縣玉潭鎮置寧鄉縣沿革表洞庭青草渺無際天柱紫盖森欲動東坡繞郭白雲衡岳近滿㠶明月洞庭秋鄭獬寧知城東路有此梅萬株近坡與逺嶺玉立同一區南軒衡州倚郭一外縣五衡陽茶陵耒陽常寧安仁酃縣湖南路提刑司提舉司郡號衡山衡陽湘東臨蒸鴈峰耒陽衡湘岣嶁州沿革鶉尾之次翼軫之分禹貢荆州之域春秋戰國屬楚秦屬長沙郡漢屬長沙國又分屬桂陽零陵二郡東漢屬長沙零陵二郡吳置湘東郡宋為湘東郡梁置衡州隋大業為衡山郡唐初為衡州屬江南道天寶為衡陽郡五代地入楚馬氏後入南唐地理沿革表縣沿革衡陽本漢長沙國酃縣及零陵郡鐘武縣東漢改鐘武為重安縣吳置湘東郡及臨蒸縣晉省酃縣入臨蒸縣陳析臨蒸東鄉置新城縣隋改臨蒸曰衡陽縣為衡州治開皇廢新城重安入焉大業復置二縣唐武德復以衡陽為臨蒸七年省重安縣開元改衡陽為州治茶陵本屬漢長沙國東漢屬長沙郡晉屬湘東郡南齊屬潭州隋廢入湘潭縣屬衡州唐武德析攸縣復置屬雲南州貞觀州廢省茶陵縣聖厯復置石晉時地入馬氏建天䇿府析屬潭州本朝改屬衡耒陽秦初置縣屬長沙漢髙帝割長沙南境立桂陽郡耒陽屬焉東漢為桂陽郡治梁屬東衡州梁陳簡移縣治在鰲山口隋改曰耒隂唐武德復舊治仍曰耒陽常寧本秦耒陽縣地漢屬桂陽郡吳分置新寧縣晉屬湘東郡隋𨽻衡州唐開元徙宜江天寶更今名安仁本衡山縣安仁鎮地五代時後唐析宜陽熊耳兩鄉置安仁塲本朝置縣酃縣本漢茶陵縣地本朝析置地理沿革表形勝南嶽在衡陽縣北東巖在合江亭東白雲峰在南嶽下有龍潭碧雲峰在州城南雲盖峰在耒陽東北雲阜山在衡陽西舜南巡經此吐霧峰與白雲峰相連朝日峰在屏障山下梅浦水在衡陽東桃源溪出雲陽五洞獅子巖在耒陽西熊耳山在安仁東南輿地紀勝人物三國劉巴諸葛亮薦為左將軍唐李寛中於尋真觀剏石鼔書院皇朝本士正講}
