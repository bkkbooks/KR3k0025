  - {type: variant, offset: 868, length: 325, content: 肯行前漢叔孫通傳陳遵常謂張竦足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優耶竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也前漢本傳山林之士往而不能反朝廷之士入而不能出前王吉贊夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也通監漢武帝紀孔奮為武都郡丞從竇融入朝諸守令財貨連轂彌竟川澤唯奮無資單車就路通監漢光武紀務廣地者荒務廣德者強有其有者安貪人有者殘同上韋彪曰忠孝之人持心近厚鍜鍊之吏持心近薄東漢本傳貴清淨者以席上為腐議束名實者以柱下為誕辭同上王符傳郄愔遺桓溫牋欲共獎王室請督所部出河上愔子超為溫參軍取視寸寸毀裂乃更作愔牋自陳非將帥才不堪軍旅老病乞閑地自養勸溫并領已所, WYG: ''}
