  - {type: variant, offset: 264, length: 2, content: 寬柔, WYG: 蒼茫遺珮憐交甫零落清歌送莫愁孔夷傷心白雪陽春麗極目朝雲暮雨非張衆村近莫愁連竹場人歌楚些下蘋洲任璜唐州倚郭一外縣四泌陽桐柏比陽方城湖陽郡號淮安泌陽泌水方城桐柏州沿革禹貢豫州之域春秋屬楚戰國屬韓秦}
  - {type: variant, offset: 264, length: 2, content: 寬柔, krp: 蒼茫遺珮憐交甫零落清歌送莫愁孔夷傷心白雪陽春麗極目朝雲暮雨非張衆村近莫愁連竹場人歌楚些下蘋洲任璜唐州倚郭一外縣四泌陽桐柏比陽方城湖陽郡號淮安泌陽泌水方城桐柏州沿革禹貢豫州之域春秋屬楚戰國屬韓秦}
  - {type: variant, offset: 267, length: 5, content: 教不報無道, WYG: 後屬南陽郡元魏置東荆州西魏改淮州為重鎮隋改顯州州廢置淮安郡唐武德曰顯州貞觀改唐州天寶曰淮安郡天祐曰泌州五代後唐復舊名石晋又為泌州後漢仍舊地理沿革表縣沿革泌陽本漢南陽郡舞隂平氏二縣地晋改平氏為西平氏屬義陽郡復置漢廣郡元魏置石馬縣隋置舂陵郡廢漢廣以平氏屬淮安郡唐屬唐州貞觀省石馬入湖陽開元復置天寶改泌陽天祐州自比陽徙治于此改泌州後復故湖陽本春秋蓼國漢為南陽郡湖陽棘陽二縣晉並省之元魏復湖陽置西淮安郡及南襄州後郡廢改州為南平州西魏改昇州又改湖州後周改置昇平郡隋開皇廢仁夀改昇州州廢以湖陽屬舂陵郡唐屬唐州比陽本漢南陽郡舞隂縣地元魏置陽平縣及東荆州西魏改淮州又分置江夏郡尋廢為戍隋開皇為顯州改陽平為饒良以江夏戍為慈丘縣大業改饒良為比陽縣唐二縣屬顯州貞觀屬唐州五代後周省慈丘入比陽桐柏本漢南陽郡平氏縣地梁置義鄉縣及華州上川郡西魏改淮州後改純州尋廢之隋廢郡改縣曰桐柏唐武德屬純州貞觀州廢屬唐州方城本漢南陽郡堵陽及葉二縣也晉後皆廢西魏置方城縣及襄邑郡隋屬淯陽郡唐武德屬兆澧州貞觀屬唐州地理沿革表形勝泌水在泌陽縣}
