  - {type: variant, offset: 2044, length: 468, content: 畏非德之明雖察而人不服公修德於几席之上而其威折衝於萬里之外退居於家而人望之如在廊廟可不謂德威乎東坡德威堂銘公謂文潞公也經仁者見之謂之仁智者見之謂之智易係辭知我者謂我心憂不知我者謂我何求詩黍離維此哲人謂我劬勞維彼愚人謂我宣驕鴻鴈昔者顏叔子嘗獨處于室鄰之嫠婦又獨處于室夜暴風雨至室壞婦人趨而至顏叔子納之而使執燭放乎旦而薰盡縮屋而繼之自以為辟嫌之不審矣若其審者宜若魯人有男子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壞婦人趨而託之閉戶而不納毛詩注子知我者其惟春秋乎罪我者其惟春秋乎孟子滕文上自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊大宗師古之所謂志者非軒冕之謂也今之所謂志者軒冕之謂也繕性篇子路拯溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善淮南子齊俗訓老子曰治大國若烹小鮮為寬裕者曰無數撓為刻削者曰致其鹹酸而已矣同上史王孫圍聘於晉趙簡子問曰楚之白珩為寶幾何曰楚之所寶者曰觀射父能作訓辭又左史倚相能道訓典此楚國之寶也若夫白珩先生之玩也何寶之為國語楚語互見敏於應對梁王曰寡人有徑寸之珠照車前後, WYG: 征榖帛只征銀侁章記纂淵海卷}
