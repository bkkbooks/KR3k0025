  - {type: variant, offset: 583, length: 1, content: 螾, WYG: 寶慶府倚郭一外縣一邵陽新化郡號邵陽邵陵敏州沃陽府沿革楚分於辰在已禹貢荆州之域春秋戰國屬楚秦屬長沙郡漢屬長沙國及零陵郡東漢屬長沙零陵二郡吳孫皓分置邵陵郡屬荆州晉懹帝屬湘州義熈屬荆州宋齊梁並屬邵陵國隋廢郡屬潭州唐置南梁州貞觀改邵州天寳曰邵陽郡屬江南道五代地入馬氏又入南唐又入周行逢本朝升府地理沿革表縣沿革邵陽本漢長沙國昭陵縣東漢别置昭陽縣屬零陵郡吳置邵陵郡又置髙平縣屬焉晋改昭陵縣曰邵陵又改昭陽曰邵陽屬邵陵郡宋并邵陵入邵陽移郡治此又省髙平入焉隋廢郡屬湘州唐武德復邵陵縣七年省入邵陽新化熈寧六年收復梅山置新化縣地理沿革表形勝梅山在新化縣杏岡在南隅龍山介於二邑之間秀峰四出熊山黄帝所登龍池在新化之文仙山濓泉在通道坊因周茂叔攝郡得名甘泉在倅㕔法華臺在東山絶頂一郡之勝槩也文竹山有石床紫極宫在城西北青陽洞在新化青雲洞在新化熊膽山下青山洞在新化北輿地紀勝人物皇朝聶致堯邦人列舉孝行節義十事聞于朝旌表其門金彦號為義門金氏舉孝亷為天下第一李傑洞明先生之子也帥湖南由邵陽拜松楸輿地紀勝本朝寳慶元年以濳藩升寶慶府神宗初置新化縣見前縣沿革下冬葉扶踈碧繖團溪山環郭莫窮端冦準蒼芷溪烟映靄山翛然城角起天端同上澬水西來兼邵水龍山横鶩際梅山歐陽識更如何處覔桃源此地端疑小洞天胡致堂舊置義莊賙族黨新持使節拜松楸清湘樓晩揮金上明月池開衣錦遊張舜民送李傑帥湖南郴州倚郭一外縣五郴縣桂陽宜章永興資興桂東郡號桂陽靈夀宜章郴義緑水廬陽州沿革翼軫之分野禹貢荆州之域春秋戰國屬楚秦屬長沙郡漢髙帝置桂陽郡三國郡歸蜀後割歸吳隋置郴州大業復桂陽郡唐置郴州天寶曰桂陽郡屬江南道五代地入馬氏地理沿革表縣沿革郴縣漢髙帝置桂陽郡治郴縣歴代因之隋置郴州治焉桂陽本漢郴縣地東晉分置汝城縣屬桂陽郡陳改為廬陽縣及置廬陽郡隋廢郡以廬陽縣屬郴州唐天寳改義昌縣後唐改郴義縣本朝更今名宜章隋大業末蕭銑析郴置義章縣唐武德七年省之八年復置屬郴州本朝更今名永興本漢桂陽郡便縣宋省之陳復置隋入省郴縣唐開元置安陵縣天寳改髙亭縣本朝更今名資興本漢郴縣地東漢置漢寧縣屬桂陽郡吳改陽安縣晉改晉寧縣隋省之後復置晉興縣唐貞觀省之咸亨置資興縣屬郴州五代廢為寨本朝復置桂東本漢郴縣地本朝析桂陽置地理沿革表形勝靈夀山在郴縣有石室産鍾乳洞靈山在桂陽東有洞穴蘇仙山在郴縣東北蘇耽學道於此武丁岡在郴縣西南仙人成武丁葬此桂水在郴縣西南合耒陽水橘井在蘇仙宅詳見井類寶雲山寶盖山在郴縣東玉履石在宜章縣東白鹿洞在蘇仙山口白豹山在永興縣西白豹水出焉龍宫灘韓昌黎有詩詳見灘類螺溪水在郴縣西萬嵗山即靈夀山千秋水出焉羣玉林在宜章縣輿地紀勝人物東漢胡騰坐竇武死行喪禁錮晉谷儉舉茂才不仕唐孟琯著嶺南異物志劉瞻唐史稱其行已終始全潔皇朝曹靖見山谷文集有曹侯善政頌輿地紀勝集故鄉臨桂水今復渺星河張曲江飄飄桂水遊悵望蒼梧暮杜詩郴州頗凉冷橘井尚凄清同上山作劒攢江㵼鏡扁舟斗轉疾於飛韓詩游鱗出䧟浦唳鶴遶仙岑風起三湘浪雲生萬里隂栁詩地盡湘南戌山分桂北林火雲三月合石路九疑深戴叔倫本朝太平興國元年改郴義縣為桂陽義章縣為宜章熈寧六年改髙亭縣為永興嘉定四年平倭冦析郴縣兩鄉於青要置資興縣析桂陽於土村置桂東縣沿革表橘井蘇仙宅茶經陸羽泉張舜民郴江常自遶郴山為誰流下瀟湘去秦少游石橋歩月公居後橘井烹茶我在先折樞宻郴山足竒變其水清復美張南軒荆湖南路道州倚郭一外縣三營道永明江華寜逺郡號春陵九疑江華營道營陽州沿革楚越之分翼軫之墟禹貢荆州之域春秋戰國屬楚秦屬長沙郡漢屬長沙國及零陵郡蒼梧郡東漢屬零陵蒼梧郡三國初屬蜀後屬吳晋屬零陵郡穆帝分置營陽郡梁改永陽郡隋廢郡屬永州大業屬零陵郡唐武德置營州又加南字貞觀改道州尋廢之上元復置天寶曰江華郡屬江南道五代地入馬氏又入南唐後周行逢又有之地理沿革表縣沿革營道本漢零陵郡營道縣晉置營陽郡梁永陽郡隋屬永州零陵郡唐武德置州治此天寳改𢎞道縣本朝復舊名永明本漢零陵郡營浦縣晉屬營陽郡南朝分置營陽縣梁改郡縣皆曰永陽隋廢郡省營浦入永陽屬零陵郡唐貞觀省入營道天授復永陽屬道州天寶更今名江華本漢蒼梧郡馮乘縣地吳屬臨賀郡隋屬零陵郡唐武德析置江華縣屬營州貞觀屬永州上元屬道州文明改雲漢縣神龍復故名寧逺本漢零陵郡泠道縣吳增置舂陵縣東晉屬營陽郡梁陳屬永陽郡隋省泠道入營道而徙營道于泠道又省舂陵入焉屬永州唐武德徙營道於州城乃于此地置唐興縣屬營州貞觀屬道州天寶改曰延唐大厯又析延唐置大厯縣屬道州後梁改延唐曰延昌後唐復故石晉改曰延喜本朝改今名地理沿革表形勝九疑山在營道縣北九山相似行者疑惑故名九疑舜所葬也為第二十三小洞天五如石在江北岸左右前後及登石巔皆相似故名五如元結創五如亭七勝泉在五如石間天門山天柱山在寧逺含暉巖在營道縣又名含暉洞陽華巖在江華縣又名陽華洞紫虛洞在寧逺又名紏巖碧虛洞在寧逺又名}
