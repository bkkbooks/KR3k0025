  - {type: variant, offset: 3, length: 1, content: 同, WYG: 絶聲戰國宋玉師事屈原唐陸羽廬於太門山乃舊京山縣境唐書以為復州竟陵人非也輿地紀勝集郢客吟白雪遺響飛青天徒勞歌此曲舉世誰為傳誠為巴人唱和者乃數千吞聲何足道嘆息空凄然李白雪中梅下與誰期梅雪相兼一萬枝若是石城無艇}
