  - {type: variant, offset: 812, length: 0, content: '', krp: 黄盖赤璧之役建䇿火攻唐史青上書自薦五歩成詩唐傑號唐孝子皇朝路振試巵言日出賦陳亨伯靖康死虜中蔣緯楊誠齋為作傳輿地紀勝集瀟湘水國旁黿鼉杜詩湘水永州路水碧山崒兀古木暗魚潭隂雲起龍窟李詩朝陽嵓下湘水深朝陽洞口寒泉清元結日晴瀟湘渚雲斷岣嶁岑栁詩欵乃一聲湘水緑同上殘臈泛舟何處好最多吟興是瀟湘杜荀鶴本朝雍熈元年以零陵縣之東安塲置縣沿革表牕外秋聲湘瑟怨檻前行色楚㠶飛劉能零陵郡北雲㠶落信美臺前江月明李當遇二江明月九峰雲雲月堂中希静人芙蕖池淺蛙迎雨鈷鉧潭空馬送春陶弼青玻瓈盆挿千峰湘江山青無古今何處拭目窮表裏太平飛閣暫登臨朝陽不聞皂盖下愚溪但有古木隂黄魯直湘江佳致在浯溪元結雄文向此題想得後人無以繼髙名長}
  - {type: variant, offset: 813, length: 2, content: 言則, WYG: 白雲齊陳術水部胸中星斗文太師筆下蛟龍字張文潜魯君筆端昭日月次山書法得春秋趙不息地老天荒元子宅烟霏霧鎖魯公碑楊長孺元顔文字照浯溪神物于今常護持岸邉尚有堪磨處留刻中興第二碑同上全州倚郭一外縣一清湘灌陽郡號清湘瀟湘湘源三湘州沿革楚地翼軫之分野禹貢荆州之西境歷代地理並同永州五代石晉天福置全州地理沿革表縣沿革清湘本漢零陵郡兆陽縣地隋省兆陽置湘源縣屬零陵郡唐屬永州五代馬氏改今名後置全州治此灌陽本漢零陵郡零陵縣地吳分置觀陽隋省入湘源大業蕭銑置灌陽縣屬永州唐武德省之上元復置石晉置州灌陽屬焉地理沿革表形勝湘水在其北灕水在其南黄華山在湘源青田巖在清湘巖净水在灌陽凍青水玉髄泉在清湘龍川山在灌陽龍隱巖獅子巖華嚴巖波斯巖皆在清湘輿地紀勝人物皇朝朱孝誠母卒結庵墳域冬笋生瑞竹}
