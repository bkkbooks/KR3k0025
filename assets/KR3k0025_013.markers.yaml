  - {type: variant, offset: 2760, length: 2088, content: 郄諂於道二何佞於佛同上束名實則芻芥柱下之言翫清虛則糠粃席上之說陳書馬摳傳崔群曰人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡專任李林甫此理亂之所分也唐書周公擁孺子而召公疑之周公之心召公則不知之新唐書新羅贊史弘肇曰安定國家在長槍大劍安用毛錐王章曰無毛錐財賦何從可出通監周太祖紀集武王周公聖人也率天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也韓文伯夷頌太史公父名談故史記無談字季布傳改趙談作趙同范曄父名泰故後漢無泰字郭泰鄭泰皆作太字李翱父名楚金故為文皆以今為茲韓愈為李賀作諱辨持言在不稱徵之說故愈父仲卿未嘗諱焉曹志植之子泰議云幹植不強不諱植字三國志猶不諱其君名云功以權成是斥孫權之名也孔氏雜說本朝老者覺時速閑人知日長日月本無情人心有閑忙歐公集陳摶謂錢若水有仙骨麻衣道者曰此人但能於急流中勇退耳東坡集人皆種榆柳坐待十畝陰我獨種松柏守此一寸心東坡詩歲換兒童喜還傷老大心臨川集歲熟田家樂秋風客自悲同上白樂天詩曰無事日月長不羈天地闊此達者之詞也孟東野詩曰出門即有礙誰謂天地寬此褊狹者之詞也青箱雜記朝廷初行新法康節門生故吏仕官四方者皆欲投劾而歸以書問康節荅曰正賢者所當盡力之時新法固嚴能寬一分則民受一分之賜投劾而去何益言行錄伊川與君實語終日無一句相合鳴道集經其維哲人告之話言順德之行其維愚人覆謂我僣詩抑子百年之木破為犧尊青黃而文之其斷在溝中比犧尊於溝中之斷則美惡有間矣莊天地木以不材終其天年鴈以不材死莊山木宋有富人天雨墻壞其子曰不築必將有盜其鄰人之父亦云暮而果大亡其財其家甚智其子而疑鄰人之父韓非子說難車輕而馬肥雖中工可以致遠載重而馬羸雖造父不能以追急淮南子拘囚圄者以日為脩當市死者以日為短榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂佐祭者得嘗救鬭者得傷並同上史豫讓嘗事范中行氏而無所知名去而事智伯智伯甚尊寵之史本傳明月之珠夜光之璧以闇投人於道路人無不按劍相盻者無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也鄒陽傳昔伍子胥說聽於闔閭而吳王遠跡至郢夫差乃賜之鴟夷而浮之江樂毅傳李斯少為吏見吏舍鼠食不潔人犬數驚之入倉見鼠食粟居廡下無人犬之憂乃歎曰人賢不肖如鼠在所自處耳本傳並史當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫前漢揚雄傳或解縛而相或釋褐而傅或倚夷門而笑或橫江潭而漁或七十說而不遇或立談而封侯世亂則聖人馳騖而不足世治則庸人高枕而有餘並同上百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳前漢韓信傳故無因而至前雖出隨珠和璧祗結怨而不見德有人先游則枯木朽株樹功而不忘鄒陽傳抗之則在青雲之上抑之則在深泉之下用之則為虎不用則為鼠東方朔傳譬草木之殖山林鳥魚之毓川澤得氣者蕃滋失時者零落班孟堅敘傳並前漢天子擢弘對為第一轅固以老罷歸通監潘岳美姿儀常出婦人遇之者皆連手縈繞投之以菓時張載甚醜每行小兒以瓦石投之委頓而反晉書潘岳傳見事物相形非蘭怨而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也同上陸機等贊美玉蘊於碔砆凡人視之藐焉良工砥之然後知其為和寶也精鍊藏於鑛璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳互見識者難欺齊范縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上或關籬墻落糞溷之中通監齊紀太宗嘗謂魏證曰玉雖有美質在於石間不值良工琢磨與瓦礫不別若遇良工即為萬代之寶唐書文本才猷世南鯁諤百藥之持論思廉之邃雅德棻之辭章皆治世之華采而淟汨於隋光明於唐同上姚濤等贊傳記綿綿之葛在於曠野良工得之以為絺紵良工不得枯死於野說苑劉知幾始以文章得譽晚談史傳由是減價唐書本傳禹門大魚登者化為龍不登者點額曝腮三秦記蓽門寒族百代無聞騂角挺生一朝暴貴史通集未遇伯樂則千歲無一驥時值龍顏則當年控三傑選三國名臣贊昔如韝上鷹今似檻中猿選鮑昭穆生謝病以免楚難鄒陽北游而不同吳禍選書張良游於群雄其言如水投石莫之受也遭漢祖其言如以石投水莫之逆也選李蕭遠運命論昔如縱壑魚今似喪家狗杜工部時清疑武略世亂跼文場同上百丈澗底死寸莖山上春白侍郎君為得風鵬我為失水鯨朝為拂雲花暮為委地樵互見光焰不長門我隨鴛鷺入煙雲君同鸞鳳棲荊棘時之來也為雲龍為風鵬勃然突然陳力以出時之不來為霧豹為冥鴻寂兮寥兮奉身而退互見出處兩得門並同上屠龍之伎非曰不偉時無所用莫若屠狶作俑之工非曰可珍時有所用貴於斲輪劉賓客同涉于川其時在風沿者之吉泝者之凶同蓺于野其時在澤伊穜之利乃穋之厄同上互入事無全美同時六學士五相一漁翁唐文粹瓦礫暫拂拭光掩連城珍脣吻恣談鑠黃金成灰塵昔時薑桂早得因地而生今茲桃李反以無言受棄並同上風雲有路皆燒尾波浪無程盡曝腮許用晦文處困道難固乘時恩易醻同上逢霜作樸樕得氣為春柳李長吉文遭時者雖小善必達不遭時者累善無所容韓文鳲鳩平均歌於國風從事獨賢雅以怨刺昔殷之高宗得良弼於宵寐孰左右者為之先信天同而神比及時運之未來或兩求而莫敢雖家到而戶曉祗以招尤而速累並同上未遇孫陽鹽車無絕塵之跡時逢和氏荊山有連城之珍駱賓王本朝貧賤羞妻子富貴樂鄉闞老泉文井邊蠹李螬苦肥枝頭飲露蟬常飢山谷詩伯勞饒舌世不問鸚鵡纔言便關鎖欒城集, WYG: ''}
