  - {type: variant, offset: 1194, length: 403, content: 通監晉海西公紀或與世同塵隨波瀾而俱逝或違時矯俗望江湖而獨往北史隱逸新序互入各行其志馬樞曰貴爵位者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言翫清虛則糠粃席上之說陳本傳傳記孔子曰丘死之後商也日益賜也日損商也好與賢己者處賜也好說不如己者說苑雜言集務先讓天下商賈競刀錐陳子昂集廉者憎貪信者疾偽智不為愚者謀勇不為怯者死趨向之反也同上鵰鶚乘時去驊騮顧主鳴杜詩虛白高人靜喧卑俗累牽同上少年樂新知衰暮思故友韓文互入其勢使然沿河而下苟不止雖有疾遲必至於海如不得其道雖疾不止終莫幸而至焉同上窮居而野處升高而望遠坐茂樹以終日濯清泉而自潔採於山美可茹釣於水鮮可食起居無時惟適之安伺候於公卿之門奔走於形勢之途足將進而趑趄口將言而囁嚅處污穢而不羞觸刑辟而誅戮僥倖於萬一老死而後止者其於為人賢不肖何如也送李愿新序君作出山雲我為入籠鶴白樂天巢許終身隱蕭曹到老忙鯨吞鮫鬭成波血深澗游魚樂不知獸樂在山谷魚樂在陂池虫樂在深草鳥樂在高枝, WYG: ''}
