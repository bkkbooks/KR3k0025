  - {type: variant, offset: 2513, length: 246, content: 二乘者十枚王亦有寶乎齊威曰寡人所以為寶與王異有四臣擅子種首盻子黔夫將以照千里豈特十二乘哉梁王慚史齊世家賢者誠重其死奴妾賤人感概而自殺前欒布傳陳登見呂布曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去通監東漢孫寶曰周公上聖召公大賢猶不相說前漢孫寶傳太子見帝勤勞不怠承間諫曰願頤愛精神優游自寧帝曰我自樂此不為疲也通監漢光武監軍之計在於持牢而非見時知幾之變也通監漢獻帝謝太傅庭中夜坐月色無玷歎以為佳謝景重率爾曰意謂不如微雲點綴太傅曰卿居心不淨乃欲滓穢太清晉書謝萬曰, WYG: ''}
