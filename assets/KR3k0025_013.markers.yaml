  - {type: variant, offset: 819, length: 2, content: 楊子, WYG: 灕為離别名宋成眷彼湘源之逺實惟嶺管之衡余元一風生化於中區郡境亘於南粤沈現撰璧記武岡軍倚郭一外縣二武岡新寧綏寧郡號都梁夫夷武強武攸軍沿革楚地翼軫之分禹貢荆州之域歴代地理並同寶慶府本朝置軍地理沿革表縣沿革武岡本漢零陵郡都梁縣吳屬邵陵郡晉武帝分都梁置武岡縣又别置建興縣屬邵陽郡宋省武岡入都梁又省建興隋省都梁入長沙郡邵陽縣後復置武攸縣唐武徳改武攸曰武岡又置建興縣屬南梁州後屬邵州七年省建興入武岡本朝置武岡軍治焉新寧本漢零陵郡夫夷縣吳屬邵陵郡隋省入長沙郡邵陽縣五代地入於溪蠻本朝收復置新寧縣綏寧本溪峒地本朝置縣地理沿革表形勝日華山月華山在武岡之雲山明月池深百丈見底寳方山在濟川門外有八嚴洞金城山在武岡縣界金洞驛在綏寧縣紫陽山有周諫議讀書堂滄浪水屈原見漁父處投龍洞在雲山放鶴坡梁崔穆於此羅得二鶴放之得玉璧一雙芙蓉洞在綏寜縣薔薇水見類要都梁山在縣東一百三十里武岡因漢伐五溪蠻保此岡故曰武岡左右二岡對峙輿地紀勝人物五代鄧處訥為邵州刺}
