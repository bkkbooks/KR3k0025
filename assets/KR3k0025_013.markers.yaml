  body:
  - {type: variant, offset: 1, length: 1, content: 惡, WYG: 更欲遲留住一年張舜民度險聊憑九節杖凌虛來謁三花岩章獬女媧山下少人行澗谷聲中一鳥鳴劉光祖房陵郡僻皆山川竹山更在房西偏道由房城絶險阻髙崖峻嶺相綿延邵勉十里平郊連郡堞一溪清水溉民田周絢郢州倚郭一外縣一長夀京山富水郡防禦郡號富水石城效郢郢都州沿革楚分野鶉尾之次禹貢職方皆荆州之域春秋戰國屬楚秦屬南郡漢屬江夏郡晋竟陵郡地梁屬南司北新二州西魏屬安州後周置石城郡兼置郢州隋廢州置竟陵安陸二郡唐武德置温州又置郢州州廢𨽻部州貞觀廢温州復郢州天寶曰富水郡地理沿革表縣沿革長壽本漢江夏郡竟陵縣地晉元康分江夏西部置竟陵郡治此宋置長夀縣屬竟陵後周置石城郡長夀𨽻焉唐屬郢州京山本漢江夏郡雲杜安陸二縣地東漢置富水鎮於南新市縣地晋置新陽縣梁置新州梁寧郡西魏改角陵改南新市為富水縣置富水郡隋改角陵曰京山屬安陸郡唐武德以京山富水置温州貞觀州廢屬郢州本朝省富水入京山地理沿革表形勝石城在長夀縣羊祜鎮荆州立石城以為固今港源出樠木山内方山又名章山西魏於此立郡京源山在京山縣東武陵山又名樠木山七寶山五華山多寶潭皆在京山縣龍鳯港在城南鶴池在長夀鳯凰池在京山寶香山在長夀縣北輿地紀勝人物春秋申包胥吳伐楚入郢包胥求救於秦哭七日七夜}
