  - {type: variant, offset: 811, length: 0, content: '', WYG: 著太極圖通書黄太史稱其胸中灑落有光風霽月氣象二程事之皆為大儒輿地紀勝集九疑山深幾千里峰谷崎嶇人不到山中舊有姥仙家十里飛泉遶丹竈元結零陵郡北湘水東浯溪形勝潘洞中同上零桂佳山水吕温吾聞九疑好夙志今欲伸韓詩九疑深路遶山回木落天晴猿正哀戴叔倫江華勝事接湘濵千里湖山入興新錢起本朝建隆三年復以𢎞道縣為營道乾德三年改延喜縣曰寧逺省大厯縣入焉熙寧五年省永明縣為鎮入營道元祐二年復置沿革表定王此地元卑濕義帝江山最上游陶弼雲斷蒼梧竟不歸江邉古廟鎻朱扉山川不為興亡改風月應憐感慨非陸放翁永州倚郭一外縣二零陵東安祁陽郡號零陵瀟湘浯溪泉陵東安州沿革翼軫之分野禹貢荆州之域春秋楚之南境戰國楚地秦屬長沙郡漢屬長沙國零陵郡武帝元鼎六年置三國初屬蜀後入吳隋開皇廢郡置永州後又曰零陵郡唐置永州天寶曰零陵郡屬江南道五代初馬氏有之地理沿革表縣沿革零陵本漢零陵郡之泉陵縣東漢為零陵郡治晉惠帝分置應陽縣隋置州改泉陵縣為零陵而省應陽入焉東安本漢泉陵縣地本朝析置祁陽本漢泉陵縣地吳分置祁陽縣又置永昌縣隋省二縣入零陵郡唐武德復置祁陽屬永州貞觀初廢之四年復置地理沿革表形勝湘水在零陵縣北其水至清兩岸石壁髙者不啻千丈瀟水在零陵縣南三十步至道州境合湘水黄溪在州北九十里栁文有記丹岸在州南百里石色如丹愚溪在州西一里栁子厚名之賢水在州南秦時賢士周正實居之西山在零陵西東丘在龍興寺鈷鉧潭在州西五里楊栁源在縣北白鶴山在祁陽黄龍嶺在州北輿地紀勝人物漢鄭産為白土嗇夫勸百姓勿殺子代出口錢因更名白土為更生鄉三國蔣琬為蜀丞}
