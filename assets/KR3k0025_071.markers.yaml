  - {type: variant, offset: 3097, length: 0, content: '', WYG: 必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣風雲入壯懐泉石别幽耳並韓集奮翅騰驤西京賦昨日鴻都新上第五陵年少讓清光劉賔客脱鱗介生羽翮栁文超羣越軰顯赫明朝陳子昂心躍色揚皇甫湜煩襟與滯念一望恐作息皆遁逃白侍郎風髙漸展摩天翼幹聳方呈構厦材羅隠集登龍有路水不峻杜牧之集本朝仕宦而至將相富貴而歸故鄉此人情之所榮而今昔之所同也歐公晝錦堂記昔時結髪曽游處今見焚香夾道迎歐公集得意無前敵陳後山失意子困吝之中精神遐漂卑陬失色莊子史賈生以適音謫去意不自得及渡湘水為賦以弔屈原史本傳顔色憔悴形容枯槁屈原傳荀朂自中書監遷尚書令甚愠有賀者朂怒曰奪我鳳凰池諸君賀我耶晉書本傳殷浩被黜經日書空作咄咄恠事四字而已本傳失志為昏史記五鹿折角朱雲傳墨墨不得志田蚡傳計乃無聊吳王傳其畫無俚之志欒布傳俚聊也腸一日而九回居則忽忽若有所失出則不知所乘往司馬遷傳寒心銷志鄒陽傳于嗟黙黙應劭曰不得意賈生傳李林甫奏嚴挺之授員外郎詹事令東京養疾挺之至東都欎欎不得志成疾自為墓誌曰挺之自絳郡太守抗䟽陳乞天恩幾請許養疾歸閒前後歴任二十五官春秋七十無所展用上士所悲舊唐書本傳亞父聞項王疑之乃怒曰天下事大定矣君王自為之願請骸骨歸未至彭城疽發背而死漢髙紀傳記蘇秦説秦王書十上而說不行黑貂之裘敝黄金百斤盡資用乏絶去秦而歸嬴縢履蹻負書擔嚢形容枯槁面目黧黑歸至家妻不下絍嫂不為炊父母不與言蘇秦喟嘆曰妻不以我為夫嫂不以我為叔父母不以我為子戰國策進士不捷而醉飽謂之打眊矂摭言李白失意遊華山過縣跨驢宰怒引至庭下摭言龍門下不登者㸃額暴腮江海集髙蟾落第云天上碧桃和露種日邉紅杏倚雲栽芙蓉生在秋江上莫向東風怨後開胡曽下第詩云翰苑何時休嫁女文章早晩罷生兒上林新桂年年發不許平人折一枝北夣𤨏言集隠憫而不達獨徙倚而徜徉楚辭想崑山之髙嶽思鄧林之扶踈顧六翮之殘毁雖奮迅其焉如文選禰正平賦奪氣禠魄張平子西京賦神辱志沮􅄞叔夜詩垂頭塌翼陳孔璋檄形影相弔曹子建表攀倒影而迷途顧中峯而失路陳子昂金玉流鑠兮曽不見比於塵沙栁解崇賦力蹙勢窮吞志而沒栁文奔驥騁力中塗蹶足髙鴻輕舉在雲墜翼同上失地顔色改傷根枝葉殘元稹集青冥却垂翅蹭蹬無縱鱗杜詩倚風追鵬路隨水到龍門竟與蛟螭雜寧無燕雀喧季子黒貂敝得無妻嫂欺自此無顔色朝扣富兒門暮隨肥馬塵殘盃與冷炙到處潜悲辛杜詩獨掩窮途淚長歌行路難駱賓王弔影慙連茹浮生倦觸藩同上垂頭喪氣韓送窮文低首下心祭鱷魚文獨閔閔以曷已憑文章以自宣閔已詩作驥君垂耳為魚我曝腮蹉跎顔遂低摧折氣愈下並韓文食韲腸亦若强歌聲無歡出門既有礙誰謂天地寛男兒久失意寳劍亦生塵孟東野猿啼客散暮江頭人自傷心水自流同作逐臣君更逺青山萬里一孤舟濩落名不成徘徊意空大誰憐棄置久却與駑駘親劉長卿浩乎若泊諸巨海而無垠悵乎若囚諸闇室而無曉百酸攪腸唐文粹氣味如中酒情懐似别人唐人下第詩泥尾休摇掉灰心罷激昂白侍郎僕乘囊輜日削月朘鎩翮鸞棲棘藏鋒箭在弸元㣲之低囬傷志氣蒙犯變肌膚温飛卿摶風帶北雲同上三獻無功玉有瑕更擕書劍客天涯許用晦十年失路誰知己千里思親獨逺歸錢起詩故山歸夣近新歳客愁多刷羽思喬木登龍阻尺波蛾眉不入秦臺鏡鵬羽還驚宋國風世事悠揚春夣裏年光寂寞旅程中並同上接坐羞人識還家畏嫂輕張承吉若向南臺見鸞友為傳垂翅度春風李義山抱薫心恒焦舉斾心恒摇張説之咽喉梗而心膂分矣陸宣公牀頭黄金盡壮士無顔色張文昌心事如摧櫓温庭筠未得青雲志春同秋日情花開如葉落鶯語似蟬鳴杜荀鶴本朝落第汝為中酒味吟詩我作忍饑聲東坡集得助經人之所助者信也易子得道者多助多助之至天下順之孟子史齊桓有鮑叔牙賓須無以為輔佐有莒衛以為外主有髙國以為内主晉文有子餘子犯以為腹心有賈佗魏犨以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主左昭公十三年孔子曰自吾得由惡言不聞於耳史本傳鸞鳳冲霄必假羽翼唐馬周百足之蟲至死不僵以扶之者衆也文選海浪扶鵬翅天風引驥毛}
