  - {type: variant, offset: 85, length: 2, content: 互入, WYG: 與大椿齊其年夀駱賔王歲年雖變貌長新劉賔客集既至于年乃靜于懐衣柔膳甘子侍孫攜栁文獨有冰雪容纎華奪麟縞元㣲之童顔稚齒王無功長眉留桂緑丹臉寄蘭紅髙達夫老鶴無衰貌劉長卿龎眉皓髪頤神逺夀暢其天和唐文粹本朝張蒼事秦柱下史而至漢孝景思邈生隋開皇而及唐永淳東坡文文潞公居洛日年七十八同時有司馬光等三人皆年七十八嘗為同甲㑹潞公詩曰四人三百十二歳况是同生甲午年招得梁園為賦客合成商嶺採芝仙清談亹亹風盈席素髪飃飃雪滿肩此㑹從来誠未有洛中應作畫圖傳沈存中筆談夭折經一曰凶短折書短折曰不禄禮記子人生有不見日月不免襁褓者家語朝菌不知晦朔蟪蛄不知春秋故不終其天年而中道夭莊子育而不苖吾家之童烏也乎揚子集草未素而先凋張景陽七命如何短折背世湮沈楊仲武誄長筭屈於短日逺迹頓於促路齊竟陵王行狀惜其齡促名臣賛夭閼紛綸選論誰謂不傷華繁中零曹植誄王仲宣蓮初開月􅆊蕣已落朝榮元㣲之集飛霜肅其早零兮意慘慘而不長俄消鑠以委絶兮還四氣之無常皇甫湜琱月始生不見其盈璚枝方秀不見其茂燕公集降年不永𤣥首未華選誄晚境經日昃之離不鼓缶而歌則大耋之嗟易正義曰既老當委事任取樂若不然至于耄老而咨嗟耆耋好禮不從流俗旄期稱道不亂老者不以筋力為禮六十不毁七十唯衰麻在身飲酒食肉處於内六十不與服戎七十不與賓客之事八十齊衰之事弗及也六十曰耆指使七十曰老而傳傳家事任子孫八十九十曰耄大夫七十而致事若不得謝則賜之几杕五十無車者不越疆而弔人六十宿肉七十貳膳八十常珍六十不親學七十致政惟衰麻為䘮六十非肉不飽七十非帛不煖八十非人不煖六十杖於鄉七十杖於國八十杖於朝七十不俟朝士之耆者揖君而退八十月告存毎月致膳八十者一子不從政君子耆老不徒行庶人耆老不徒食禮記血氣既衰戒之在得語子氣幹將老棄其家事不頒白者不知道人年五十嗜欲已衰心已近道列子五十不成䘮不備哭踊之節荀子齫然而齒墜矣君道年彌髙而徳彌卲揚子史諺所謂老將知而耄及之余髪如此種種余奚能為知伯曰余羸老也可重任乎宰孔曰伯舅耋老絳縣人年老矣有與疑年使之年曰臣小人也不知紀年臣生四百有四十五甲子矣師曠曰七十三年矣士文伯曰二萬六千六百有六旬燭之武曰臣之壯也猶不如人今老矣無能為也已石碏曰老夫耄矣無能為也左傳建老白首萬石君尚無恙本傳祝噎在前祝哽在後賈生傳師古曰以老人好噎哽故為備以祝之陸賈有五男乃出所使越槖中裝賣千金分其子各二百金為生産賈常乘安車駟馬從歌鼓瑟侍者十人寳劍直百金謂其子曰與女約過女女給人馬酒食極欲十日而更所死家得寳劍車騎侍從者一歳中以往來過他客率不過再過數擊鮮毋久溷女為也本傳犬馬齒載孔光傳載一作臷戴白之老嚴助傳晚節末路漢書含飴弄孫不復闗政漢馬皇后傳宗世林年老婆娑晉書抱子弄孫日以為樂晉載紀傳記桓帝侍中廼存年老口臭上出雞舌香與含之雞舌頗小辛螫不敢咀咽嫌有過賜毒藥歸舍辭决就便宜家人哀泣不知其故僚友求眡其藥出在口香咸嗤笑之應劭漢官儀集年在桑榆間影響不能追曹子建從容養餘日取樂於桑榆壯齒不常居文選星星白髪垂同上日昃景西潘岳四肢委隨筋骨挺解選手足墮窳同上來日苦短去日苦長陸機短歌衰容不還稚鮑昭詩草忌霜而逼秋人惡老而逼衰同上鳩杖扶老邵楊書煖老須燕玉杜詩暮顔􅌤青鏡几杖將衰齒但遇新少年少逢舊親友後生血氣豪舉動見老醜白頭搔更短渾欲不勝簮惟將遲暮供多病未有涓埃答聖朝白髪千莖雪丹心一寸灰花飛有底急老去願春遲可惜歡娛地都非少壯時萍蓬風波急桑榆日月侵}
