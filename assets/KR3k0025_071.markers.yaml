  - {type: variant, offset: 330, length: 3, content: 當關呼, WYG: 笑語子喜而不寐舉欣欣然有喜色孟子辴然而笑莊子史粲然而笑左司馬季主捧腹大笑史記大笑冠纓索絶淳于髠傳忻然而笑前揚雄傳一笑相樂斯亦可矣薛宣傳匡説詩解人頤匡衡傳拂衣而喜楊惲傳逌爾而笑班固賔戲俯面掩口盧胡而笑後應劭傳拊掌歡笑晉鑑謝安得謝𤣥破苻堅書心喜甚過户不覺屐齒之折晉本傳喜津津出眉宇間唐李林甫傳記合坐皆笑謂之哄堂哄堂笑不罰唐制人情喜則恱集囅然而笑左太冲賦陽氣見於眉宇之間七發本朝一家喜氣如春暖坡詩掀髯一笑坡書憂悶經行邁靡靡中心摇摇知我者謂我心憂不知我者謂我何求詩黍離心之憂矣如匪澣衣靜言思}
