  - {type: variant, offset: 69, length: 0, content: '', krp: 在老為無老廣成子修身千二百歳形未嘗衰夀則多辱楚之南有㝠靈者以五百歳為春五百歳為秋上古有大椿者以八千歳為春八千歳為秋莊子人中有老彭猶木中之有松柏抱朴子彭祖堯臣經虞夏商夀七百歳荀子史蕃祉老夀左喬松之夀蔡澤傳春秋髙閲天下之義理多矣漢文帝張蒼老口中無齒食乳女子為乳母年百餘歳而卒本傳年夀永究鮑宣傳四人鬚眉皓白張良傳羅結為侍中總三十六曹事時年一百七精爽不衰魏主以其忠慤親任之使兼長秋卿監典後宫出入卧内年一百一十歸老朝廷毎有大事遣訪焉又十年乃卒通鑒晉紀白居易宴集皆髙年人慕之繪為九老圖}
