  - {type: variant, offset: 3001, length: 1, content: 鎖, WYG: 元傳記李衛公疾太宗親詔者數四其一曰有晝夜視公疾大老嫗令一人來吾欲熟知公起居狀衛文公視此詔常泣曰君臣之際乃如此耶韋端衛公故物記唐宣宗好儒雅留心貢舉題殿柱曰鄉貢進士李某北夣𤨏言集千載一合論説無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑王褒頌蘭臺金門逓宿迭居西京賦既通金閨籍復酌瓊筵酒選昂昂子敬㧞迹蒿萊選問}
