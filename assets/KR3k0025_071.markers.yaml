  - {type: variant, offset: 1529, length: 5, content: 汲汲如狂互, WYG: 一食直錢數萬李崇富埒於雍而性儉嗇嘗謂人曰髙陽一食敵我千日河間王琛每欲與雍争富謂章武王融曰不恨我不見石崇恨石崇不見我融素以富自負歸而惋歎卧疾三日王繼曰卿之貨財計不减於彼何為愧羡乃爾融曰始謂富於我者獨髙陽耳不謂更有河間繼曰卿似袁術在河南不意世間復有劉備耳梁髙祖紀郭子儀月入俸錢二萬緡私産不在焉府庫珍貨山積唐帝紀白承福家甚富飼馬用銀槽晉鑑傳記居則廣厦􅃉房下羅幃來清風倡優侏儒處前迭進而諂諛燕則鬬象棋而舞鄭女綵色以滛目流聲以虞耳説苑説善篇石崇為客作豆粥咄嗟便辦世説上明皇問富人王元寳家財多少對曰請以一縑繫陛下南山一樹南山樹盡臣縑未盡李元獨異志郭况累金數億庭中起髙閣厝衡石於其上以稱量珠玉也謂為瓊厨金窟子年拾遺記集致崑山之玉有和隋之寳垂明月之珠服太阿之劍李斯書錦墻雕柱傅元正都賦藏鏹巨萬左太冲富與地侔貲揚雄鞍馬光照地鮑明逺賓從皆珠玳鞍馬悉輕肥選詩身被輕暖口厭百味目極華麗耳倦絲竹曹子建流懸藜之夜光綴隋珠以為燭選西京賦富埒陶白貲巨程羅山擅銅陵家藏金穴出平原而聨騎居里閈而鳴鐘廣交論青樓臨大路樂府玉饌薪燃蠟椒房燭用銀元㣲之北里富熏天髙樓夜吹笛杜詩金丸落鳴鳥鳴一作飛狐裘獸炭酌流霞李太白寳葢雕鞍金絡馬蘭窓繡柱玉盤龍繡柱璇題粉壁映鏘金鳴玉王侯宫駱賔王庫車軟轝香衫細馬白樂天當今甲第與王宫織成歩幛錦屏風綴珠䧟鈿帖雲母五金七寳}
