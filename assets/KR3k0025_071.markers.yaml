  - {type: variant, offset: 1495, length: 0, content: '', WYG: 盛事劉晏以神童為秘書省正字唐明皇雜録集楊炯年十一待制𢎞文館楊炯渾天賦序勝帶宦玉城文選宦一作官三十擁旄誰不羡劉長卿年未四十班於赤墀之下簮筆持簡為王近臣崔祐甫議弱冠厲羽翼儀初升夏侯湛誄弱冠歩鼎鉉潘正叔贈河陽榮禄何妨早甘羅亦小兒韋應物驟貴經説築傅岩之野惟肖爰立作相書説命上史無閥閱功勞特以一言寤意數月取宰相封侯世未嘗有也漢武紀公孫𢎞起白衣為天子三公西漢本傳賈誼為博士超遷一歳中至太中大夫本傳田千秋以一言寤意旬月取宰相封侯本傳主父偃上書朝奏暮召歳中四遷本傳栁粲及第不四年為宰相唐鑑張柬之為洛州司馬姚崇薦之曰其人老唯亟用之即日召拜平章事本傳喬琳為懐州刺史上求人於不次之地張渉舉琳為相張渉傳劉展曰展自陳留參軍數年至刺史可謂暴貴矣本傳路巖自支}
  - {type: page-break, offset: 1495, content: '', id: KR3k0025_WYG_071-31a, image: WYG0932/WYG0932-0183c.png}
