  - {type: variant, offset: 3093, length: 0, content: '', krp: 快其物之所蘊也同上席其勢鼓行人間鯤化鵬征擘波冲天同上貴有風雲興富無飢寒憂白樂天得水難留久卧龍劉賔客若出井置之於泰山之上羽翮得清風之上唐文粹長驅洋洋無有齟齬栁文有地數百里趨走之吏自長吏司馬已下數十人其禄足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼大丈夫官至刺史亦榮矣韓文富貴可期烟霄漸近孫可之文水積厚而蛻鵬門愈髙而容駟司空表聖文出籠鸞鶴歸遼海温飛卿如虎傅兩翼杜牧之逸驥尋雲歩歩髙仝上失勢經明夷于飛垂其翼易子君子之厄於陳蔡之間無上下之交也孟子孔子厄於陳蔡七日不火藜羹不繼荀子危行惻視振動悼慄處勢不便未足以逞其能也莊子函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之庚桑楚篇雲罷霧散而龍蛇與螾螘同矣失其所乗也慎子史叔向曰欒却胥原狐續慶伯降在皂𨽻左齊桓公之子七人為大夫於楚周勃下廷尉吏稍侵辱之勃以千金賄獄吏吏乃書牘背示之勃既出曰吾嘗將百萬軍然安知獄吏之貴乎史記威盡勢極閭巷之人為敵國律書長公主賜鄧通吏隨沒之一簮不得着身佞幸傳伍子胥載槖而出昭闗夜行晝伏至於陵水無以餬其口膝行蒲伏稽首肉袒鼓腹吹篪乞食於吳市范雎傳應龍潜於潢汙魚黿㛿之西漢班固自叙以鴻漸之翼困於燕雀公孫𢎞等賛李廣當斬贖為庶人野居藍田射獵至覇陵亭覇陵尉呵止廣曰故李將軍尉曰今將軍尚不夜行何乃故也李傳並西漢陳蕃送黄門北寺獄黄門從官騶踏蕃曰死老魅復能損我曹員數奪我曹廩給否後漢書失水之魚喪家之狗晉書潘岳傳猛虎所以百獸畏者為爪牙也若去之則犬彘馬牛皆能為敵段秀實傳赦韓信封為淮隂侯信知漢王畏其能多稱病不朝徒居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肻臨臣出門笑曰生乃與噲等為伍漢髙祖紀魏其失勢賓客益衰漢武帝𢎞農太守移良承樊豐等㫖遣吏於陜縣留停楊震喪露棺道側謫震諸子代郵行書道路皆為隕涕漢殤帝紀隋李諤曰擯落私門不加収齒隋紀飛鳥折翼唐紀子儀閒廢日久部曲離散唐鑑傳記騏驥之衰也駑馬先之孟賁之倦也女子勝之戰國策李白遊華山過縣跨驢宰怒引至庭下摭言集黄鵠後時而寄處兮鴟梟羣而制之神龍失水而陸居兮為螻蟻之所裁夫黄鵠神龍猶如此兮况天下賢者之逢亂世哉横江湖之鱣鯨兮固將制於螻蟻楚辭翅翮摧屈趙景真言鎩羽儀於髙雲摧迅翮於風穴辨命論青衿胄子困泥塗杜詩窮猿失本悲天驥跛足隨氂牛欝欝若不展羽翮困低昂車馬何蕭索門前百草長杜詩明妃失漢寵蔡女堕邊塵陳子昂鵷鷺無聲仰天泣元稹集涸魚久失風波勢枯草曽沾雨露恩狸病翻隨鼠驄羸反作駒饑摇困尾喪家狗熱暴窮鱗失水魚元㣲之儡然與破甑為伍劉賔客閉門少光彩昨宵鳳池客今日雀羅門同上門前冷落鞍馬稀白侍郎鶴病翅羽垂獸窮爪牙縮門冷少人過子弟多寂寞僮僕少精光衣食雖充結神意不揚揚厨冷難留屋上烏門閒可與雀羅張並同上青冥無依倚飛轍危難安斷鶴兩翅鳴何哀縶驥四足氣空横韓集黄鶴翅垂同燕雀弔影失所依側身隨下列獨立難輕燕雀羣孤飛還懼鷹鸇摶自憐天上}
  - {type: variant, offset: 3095, length: 0, content: '', WYG: 路弔影徘徊獨愁暮想君疇昔髙歩時豈料今日折腰事劉長卿騏驥筋力成意在萬里外歴塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名唐文粹失地無顔色婆娑塵俗之下踸踔藩籬之際唐文粹春色不入門孟東野鱗介槁以横陸兮鴟嘯羣而厲吻栁閔生賦誰為濟川檝今作野人船温飛卿驊騮思故第鸚鵡識佳人司空表聖文天球减價而喪色鏌鎁不寳而奪鋭李元賔文與荆棘凡骨溷皮日休本朝失勢今為噲等伍坡詩張鑄以京東轉運使坐公事降通判太平州葛源為提舉坑冶取鑄脚色欲發薦狀鑄與詩曰提司坑冶是新差職比催綱勝一階若發薦章求脚色下官踪跡轉沈埋張師正倦游集得意子衆人熙熙如享太牢如登春臺老子史翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意如此王褒頌矯翼厲翮恣意所存揚雄傳韓稜遷南陽太守時聽得過家上冡後漢書李琪既貴為相乃刻牙版為金字曰前鄉貢進士李琪常置之座側梁史傳記喜氣津津出眉宇間太公六韜龍門下登者化龍江海集春風得意馬蹄疾一日㸔盡長安花南部新書集離蔬釋蹻而享膏粱王子淵頌振衣造雲闕跪坐陳清猷韓集脱然若沈疴之去體灑然若執熱之濯清風也枯槁沈溺魁宏寛通}
