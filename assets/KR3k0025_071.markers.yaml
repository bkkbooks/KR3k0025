  - {type: variant, offset: 1682, length: 0, content: '', WYG: 粗給經祭器衣服不假記始有曰茍合矣少有曰茍完矣語子孔子曰囬家貧胡不仕對曰囬有郭外之田五十畝足以給饘粥郭内之田十畝足以為絲麻囬不願仕莊子䟽屬之南汾水之曲有先人之敝廬在可以避風雨有田可以具饘粥彈琴著書講道勸義自樂也文中子史子罕曰吾儕小人皆有闔廬以避燥濕寒暑左鄭𤣥戒子益恩曰家今差多於昔後漢}
