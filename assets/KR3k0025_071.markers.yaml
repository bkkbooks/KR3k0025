  - {type: variant, offset: 1199, length: 0, content: '', WYG: 石顯傳石奮及四子皆二千石人臣尊寵舉集其門號為萬石君本傳互入家世戴金貂之飾谷永傳歴金門上玉堂揚雄傳近臣簮筆以待顧問張安世傳登文石之陛涉赤墀之塗梅福傳當軸處中車千秋傳司馬安四至九卿昆弟同時至二千石十人汲黯傳楊惲丞相敞子家隆盛乘朱輪者十人本傳武帝賜嚴助書曰君厭承明之廬勞侍從之事本傳嚴延年兄弟五人皆至大官東海號曰萬石嚴嫗本傳嫗其母也平帝以孔光為太師賜靈夀杖入省中用杖本傳竇氏一公兩侯三公主四二千石相與並時官府邸第相望於功臣中莫與為比後竇融傳貴寵最盛與九卿絶席馬防傳毎朝㑹與三公絶席梁冀傳趨走日月之側孟嘗傳朝夕論思日月獻納陪扈清蹕張衡傳耿況病兄弟六人皆垂青紫省侍當代以為榮耿弇傳重侯累將建天樞執斗柄崔駰傳梁冀一門前後七侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人}
  - {type: page-break, offset: 1199, content: '', id: KR3k0025_WYG_071-24a, image: WYG0932/WYG0932-0180a.png}
