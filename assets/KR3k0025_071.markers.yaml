  - {type: variant, offset: 1231, length: 0, content: '', WYG: 名聲昭於時坐於廟堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑爵勲逮僮𨽻其後閣下位益尊伺候於門墻者日益進夫位益尊則賤者日隔伺候於門墻者日益進則愛博而情不專與陳京給事書並韓文羅曲旃於堂下列長㦸於門前楊盈川司言鳳綍揮翰龍池陳子昂遊鳳凰之池觀蓬萊之閣天下之榮踐也同上宻侍樞機草偷瞻咫尺顔恩垂天詔近對久漏聲閑元㣲之兵衛森畵㦸燕寢凝清香金貂傳幾葉韋應物集一身自樂何足言九族為榮真可羡權載之勁直隨臺柏芳香動省蘭劉長卿肅穆烏臺上雍容粉署中同上金帶縋腰衫委地白樂天官曹清切非人境風月鮮明似洞天傳呼鞭索索拜舞佩鏘鏘春風侍女䕶朝衣介然風規有光近侍並同上劍珮聲隨玉墀歩衣冠身惹御爐香王維集軒冕三紀姚崇銘横據要津彤弓隨武庫金印逐文房杜牧之太守負弩前驅守丞引童下拜承恩不許離床謝宻詔長教侍案書王建遶身垂印綬姚合詩左貂右蟬榮冠東省王無功出身侍丹墀舉翮凌青㝠髙逹夫青雲生羽翼畫省比神仙委佩雲霄裏含香日月前儲光羲朝升玉署朝天紀夕憇金闈奉帝綸王勃詩直登宣室螭頭上横度甘泉豹尾中李義山趨其庭有魏絳之金石焉候其門有亞夫之棨㦸焉栁文及親之貴自古罕兼老萊則空耀綵衣多慙紱冕潘岳則惟稱夀酒固乏鼎彛豈同大國進封髙堂拜慶司空表聖荷筆入文昌駱賔王吟處美人擎筆硯行時飛鳥避旌旃方雄飛玉樹滿庭家轉貴雲衢獨歩位初髙錢起贊書辰告節印照路權徳輿詩宫漏夜催封事草爐煙曉侍入朝衣鄭槩聨句本朝文潞公逮事四朝荐更二府七換節鉞位將相五十餘年徧歴公孤兩以太師致仕三朝言行録錦衣晝歸閭里驚歸來解帶西風冷衣袖猶沾玉案香金門玉堂早接雋遊之末紫樞黄閣晚陪國論之餘歐公集榮附中天日月光臨川衡紞紘綖備三公服飾之盛櫜䕫㦸纛兼大將威儀之多同上上尊日日開黄封賜茗時時烹小鳳坡詩紫府侍臣鳴玉烏臺御史生風山谷班近聞香早人間風月不到處天上玉堂森寳書衣拂御爐香職親黄屋傍堯軒殿上給扶鳴漢履螭頭簮筆見秦冠山谷笙歌聲裏旌旗動羅綺叢中語笑香後山袖中諫草朝天去頭上宫花侍宴歸歸田録太宗尤重内外制之任嘗曰朕聞朝廷命一舍人六姻相賀諺以為一佛出世豈容易哉又曰學士之職清要貴重朕嘗恨不得}
