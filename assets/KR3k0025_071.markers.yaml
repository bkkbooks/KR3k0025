  - {type: variant, offset: 1648, length: 3, content: 朋黨更, WYG: 座儼嬋娟油額芙蓉帳香塵玳瑁筵繡旗隨影合金陣似波旋温飛卿瑶簮錦裾千萬侍女杜牧之本朝君家稻田冠西蜀𢷬玉揚珠三萬斛傾家取樂不論錢散盡黄金如轉燭坡詩貧窶經無衣無褐何以卒歲終窶且貧莫知我艱詩貧者不以貨財為禮傷哉貧也生無以為養死無以為禮禮記儒有一畝之宫環堵之室蓽門圭竇蓬戸甕牖易衣而出并日而食禮記一簞食一瓢飲回也屢空語子皆衣褐捆屨織席以為食孟子原憲居魯蓬户不全桑以為樞而甕牖上漏下濕莊子曽子居衛三日不舉火十年不製衣正冠而纓絶斂襟而肘見孔子曰我諱窮久矣而不免命也莊子衣大布而補之魏王曰何先生之憊耶莊子曰衣敝履穿貧也非􅉵也槁項黄馘捉衿而肘見納履而踵决莊子蓬户桑樞淮南子少有之者貧至無有者窮荀子姚義困於窶房𤣥齡曰傷哉窶也文中子家有長卿壁立之貧腹懐翳桑絶糧之餒抱朴子史室如垂磬國語猶有食色左傳王章為諸生學長安病無被卧牛衣中漢書竇少君家貧為人所掠賣傳十餘家東郭先生貧困孤寒衣敝履不全行雪中履有上無下足盡踐地史蓽輅藍縷服䖍曰藍縷言衣敝壊家貧落魄史晉灼曰落拓義同也貧人常衣牛馬之衣而食犬彘之食前漢司馬}
