  - {type: variant, offset: 3075, length: 1, content: 途, WYG: 為賢庸有謂余之非愚及時運之未來或兩求而莫致雖家諭而户曉祇以招尤而速累感二鳥賦選舉於有司與百千人偕進偕退不得策名於薦書齒下士於朝以望天子之光明世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬雖有千里之能食不飽力不}
