  - {type: variant, offset: 3101, length: 0, content: '', WYG: 羽翼得清風之助唐文粹失助經折其右肱雖左肱在豈足用乎易例譬如瞽之無相倀倀乎其何之記仲尼燕居子寡助之至親戚叛之孟子失道者寡助同上史衆叛親離難以濟矣左諺所謂輔車相依唇亡齒寒者其虞虢之謂也左僖五年虢叔曰皮之不存毛將焉附僖十四年晏子曰二惠競爽猶可又弱一个焉姜其危哉左傳斷右臂而與人鬭失其黨而孤居求欲無危豈可得乎張儀傳蕭何追韓信漢髙如失左右手韓信傳渡江河而亡維楫中流而遇風波船必覆矣賈誼傳傳記狼狽是兩物狽前足短毎行常駕兩狼失狼則不能動酉陽雜俎集猛虎雖云惡亦各有匹儕自矜無}
