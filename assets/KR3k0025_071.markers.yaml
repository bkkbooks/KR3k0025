  - {type: variant, offset: 3090, length: 0, content: '', krp: 名不譽大夫之言韓文馮公豈不偉白首不見招詠史詩十處投人九處違家鄉萬里乂空歸唐李吉甫之父詩騏驥筋力成意在萬里外歴塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名李太白集互入失勢祗歎官如舊韋應物鏌鎁無人淬兩刄幽壤鐵秦鏡無人拭一片埋霧月驥跼闤闍中骨附筋入節蛟蟠尺澤内魚貫蛙同穴元稹集抱寃志氣屈忍耻形神沮白樂天集詞賦擅名來已久煙霄得路去何遲文行如君尚憔悴不知霄漢待何人如今豈無騕褭與驊騮時無王良伯樂死即休並同上姜子牙貧賣漿值天凉白帖上嘗三欲命李白官卒為宫中}
  - {type: variant, offset: 3091, length: 0, content: '', WYG: 捍而止李陽冰作李白集序去矣時難遇沽哉價莫酬杜牧之自來金骨無人識温飛卿徒有干時策青山尚掩門許用晦仲尼聖賢之宗位止於司冦老􅅨道徳之祖官不過柱史李文饒低佪岐路杼軸蓬心文粹文王久不出賢士如土賤劉義時無識寳世缺知音若論衡之未遇伯喈太𤣥之不逢平子逝將烟燼火滅泥沈雨絶安有歿而不朽揚名於後乎史通本朝神竒之産銷藏委翳於蒿藜榛莽之間而山谷野叟不知其為瑞也臨川集互入處非其地子雲苦執㦸長孺終主爵東坡得時子蘭芝以芳未嘗見霜淮南子史楊大眼謂同寮曰吾之今日所謂蛟龍得雨之秋也自此一舉不復與諸君齊列矣後魏本傳互入驕矜及得勢門上曰八堯九舜不能冬種野夫童子春種而生得時故也通鑑唐太宗紀集策名清時榮聞休暢李陵書熙乎若鴻鴈之得春也陳子昂蛟龍得雲雨鵰鶚在秋天杜詩驊騮開道路鷹隼出風塵同上春風得意馬蹄疾一日㸔盡長安花孟東野平衢騁髙足逸翰凌長風李太白久跼散游曠窮慘遇陽舒韋應物一日風雲㑹榮行歸故鄉元稹集涸魚千丈水僵燕一聲雷元㣲之如幽蟄聞春雷而起柔荑望和風而拆吕和叔文秋來氣勢洪河壯霜後精神泰岳寧杜牧之芍藥薔薇與早梅不知誰是艷陽才從今領得東風意不復饒君雪裏開温飛卿明月讓燈光王維集本朝李宻詩曰樊噲市井徒蕭何刀筆吏一朝時運來千古傳名諡續世説清秋一鶚上拭目萬人㸔後山失時經絺兮綌兮凄其以風詩日月逝矣歲不我與語史上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也李尋傳蘭榮一何晚嚴霜萃其柯後漢酈傳集常恐秋節至凉飇奪炎熱棄捐篋笥中恩情中道絶班婕妤扇詩屈身泥蟠陳子昂終為時來晩花開不及春唐人石榴扇因秋棄置元㣲之鴻倦青冥翮蛟潜雲雨心白侍郎詩得勢經何天之衢道大行也易出自幽谷遷于喬木詩子猶水之就下獸之走壙也孟子鵬之徙於南㝠也水擊三千里摶扶摇而上者九萬里故九萬里則風斯在下矣莊子史司馬相如成都人家徒四壁立後數歳為中郎至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵西漢本傳􅀈騰風雨班固叙傳龍躍天衢振翼雲漢孔融薦禰衡表整轡雲衢驤首天路三國名臣序楊大眼謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣北楊大眼傳傳記鴻鵠髙飛一舉千里羽翮已就横絶四海雖有繒繳尚安所施劉向新序鴻脩六翮而凌清風麃摇髙翔同上走人充於庭辟人施於塗戰國策集躡天衢而長驅楚辭濯翼凌髙梯應瑒建章臺詩乘雲翔鄧林阮嗣宗詠懐濯鱗清流飛天衢阮元瑜詩風雲㑹一合呼吸期萬里雷研山岳碎電斬鯨鯢死元稹詩逸足競駸駸鵬路觀翺翔霜蹄千里駿風翮九霄鵬潜鱗輸駭浪歸翼㑹髙風九萬一朝摶杜詩飛龍在天巨魚縱壑倐忽摶風生羽翼駱賔王假髙衢而騁力王仲宣賦疾奔凌騕褭髙唱軋吳歌元㣲之魚得水而}
