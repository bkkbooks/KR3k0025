  - {type: variant, offset: 3027, length: 0, content: '', WYG: 詩序子駑驥同轅伯樂為之咨嗟玉石相揉和氏為之嘆息儒服篇浮磬息音未别於衆石抱朴子越公初見子遇内史薛公曰公見王通乎薛公曰鄉人也是其家傳七世矣皆有經濟之道而位不逢越公曰天下豈有七世而不逢乎薛公曰君子道消十世不逢有矣文中子伯樂篇史六鷁退飛左自屈原沉汨羅後百有餘年漢有賈生為長沙王太傅過湘水投書以弔屈原史記蘇秦出遊數歳大困而歸本傳仲尼千七十餘君無所遇儒林傳孔子去魯斥于齊逐于宋衛困于陳蔡之間孔世家朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣饑寒呼飯飲之漢書張釋之十年不見省馮唐白首居於郎荀恱紀文帝曰惜廣不逢時令當髙祖世萬户侯豈足道哉西漢何為官之拓落也揚雄傳馮唐為郎帝問曰父老何自為郎師古曰年已老傳張釋之以貲為騎郎事文帝十年不得調亡所知名本傳揚雄三世不徙官本傳廣數竒孟康曰不偶也李廣傳留落不偶霍去病傳張卿久宦遊不遂司馬相如傳馬融為校書郎十年不調後漢本傳懐琬琰以就埃塵抱棟梁而困溝壑晉書趙有處士毛公隠於博徒薛公隠於賣漿家周紀魏髙允為郎二十七年不徙官宋武帝紀劉藏器七十為尚書唐髙宗紀王義方一世英豪而死草萊}
