  - {type: variant, offset: 932, length: 0, content: '', WYG: 齊廣寧王孝珩歎曰自神武皇帝以外一作來吾諸父兄弟無一人至四十者命也通鑑陳紀文惠太子惡西昌侯鸞嘗曰我意中殊不喜此人當由其福薄故也齊武帝紀王維私邀孟浩然入内署俄而𤣥宗至浩然匿牀下維以實對帝曰朕聞其人而未見也詔浩然出帝問其詩浩然自誦所為至不才明主棄之句帝曰卿不求仕而朕未嘗棄卿奈何誣我因放還唐孟浩然傳薄命之人不足與成功名李靖傳集自古聖賢多命薄杜詩吾憐孟浩然短褐即長夜同上常三娶而卒無主婦庭無倚廬堂無抱孤栁文詞人命薄多無位白樂天因知早貴多才子不得多時在世間同上世間尤物不長生劉賓客道甚長而命窄同上上嘗三欲命李白官卒為宫中所捍而止李翰林别集序本朝范文正}
  - {type: page-break, offset: 932, content: '', id: KR3k0025_WYG_071-20a, image: WYG0932/WYG0932-0178a.png}
  - {type: variant, offset: 932, length: 0, content: '', krp: 齊廣寧王孝珩歎曰自神武皇帝以外一作來吾諸父兄弟無一人至四十者命也通鑑陳紀文惠太子惡西昌侯鸞嘗曰我意中殊不喜此人當由其福薄故也齊武帝紀王維私邀孟浩然入内署俄而𤣥宗至浩然匿牀下維以實對帝曰朕聞其人而未見也詔浩然出帝問其詩浩然自誦所為至不才明主棄之句帝曰卿不求仕而朕未嘗棄卿奈何誣我因放還唐孟浩然傳薄命之人不足與成功名李靖傳集自古聖賢多命薄杜詩吾憐孟浩然短褐即長夜同上常三娶而卒無主婦庭無倚廬堂無抱孤栁文詞人命薄多無位白樂天因知早貴多才子不得多時在世間同上世間尤物不長生劉賓客道甚長而命窄同上上嘗三欲命李白官卒為宫中所捍而止李翰林别集序本朝范文正}
  - {type: variant, offset: 933, length: 1, content: 卿, WYG: 守鄱陽有書生自言寒餓時盛行歐陽率更字薦福碑墨本直千金文正為打千本求售于京師紙墨已具一夕雷擊碎其碑類説一夕雷轟薦福碑東坡作窮措大康樂經四體既正膚革充盈人之肥也禮記耳目聰明血氣和平樂記心廣體胖大學身其康强書洪範五福三曰康寧同上史百體堅强手足便利史記强一作剛疾病經无妄之疾勿藥有喜易有負薪之憂記曲禮曽子寢疾病注病謂病困曽元曰夫子之病革矣注革急也禮記子有采薪之憂孟子滿奮畏風在晉武帝坐北窻有琉璃屏實宻似踈奮有難色帝笑之奮曰臣猶吳牛見月而喘郭子史河魚腹疾左秦醫和曰天有六氣滛生六疾過則為菑隂滛寒疾陽滛熱疾風滛末疾雨滛腹疾晦滛惑疾明滛心疾女陽物而晦時滛則生内熱惑蠱之疾晉侯求醫於秦秦使醫和眡之曰疾不可為也是謂近女室疾如蠱非鬼非食惑}
