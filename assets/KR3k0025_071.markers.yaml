  - {type: variant, offset: 1960, length: 0, content: '', WYG: 小臣哉漢殤帝胡廣周流四公歴事六帝漢紀諸袁事漢四世五公可謂受恩漢紀吕蒙未及受封而疾發權迎置於所館之側所以治䕶者萬方時有加减權為之慘蹙欲數見顔色又恐勞動常壁瞻之見少能下食則喜顧左右言笑不然則咄喑一作音夜不能寐病中瘳為下赦令三國志魏朝廷事有不便髙允輙求見帝屏左右以待之或自朝至暮或連日不出羣臣莫知其所言語或痛切帝所不忍聞命左右扶出然終善遇之通鑑周主以李徳林為内史謂羣臣曰我常日}
