  - {type: variant, offset: 1221, length: 5, content: 聲互相題拂, WYG: 入竹帛新渥照乾坤杜詩天與三台座人當萬里城宿昔三台踐榮華駟馬歸印從青𤨏拜翰入紫宸輝張九齡四面諸侯瞻節制佩玉鳴環交響庭户劉賓客䕶衣直夜南宫静焚草清時左掖深權載之集玉人識路得清問風生鞍馬疾日出旌旗鮮便蕃清近烜赫光大}
