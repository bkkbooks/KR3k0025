  - {type: variant, offset: 3101, length: 0, content: '', krp: 羽翼得清風之助唐文粹失助經折其右肱雖左肱在豈足用乎易例譬如瞽之無相倀倀乎其何之記仲尼燕居子寡助之至親戚叛之孟子失道者寡助同上史衆叛親離難以濟矣左諺所謂輔車相依唇亡齒寒者其虞虢之謂也左僖五年虢叔曰皮之不存毛將焉附僖十四年晏子曰二惠競爽猶可又弱一个焉姜其危哉左傳斷右臂而與人鬭失其黨而孤居求欲無危豈可得乎張儀傳蕭何追韓信漢髙如失左右手韓信傳渡江河而亡維楫中流而遇風波船必覆矣賈誼傳傳記狼狽是兩物狽前足短毎行常駕兩狼失狼則不能動酉陽雜俎集猛虎雖云惡亦各有匹儕自矜無}
  - {type: variant, offset: 3102, length: 0, content: '', WYG: 對氣性縱以􅆾朝怒食其子暮還食其妃匹儕四散走猛虎還孤棲狐狸鳴門旁鳥鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來衘其尾熊來攫其頤猛虎死不辭但慙前所為虎兕無助死况乎汝細㣲韓集偏轂不可轉隻翼不可翔孟東野大川未濟乃失巨艦長塗始半而喪良驥劉賓客此心欲引托誰為生羽翼劉長卿本朝嗟吾譬馳車而失左右驂歐公共載一車䘮其楫維坡詩滿望子如開浮雲見白日如執火炬入冥室矣牟子史塞天下之望五王傳仕宦當作執金吾娶妻當得隂麗華後漢吕婆樓曰僕里舍有王猛者其人謀畧不世出堅因婆樓以招猛一見如舊友語及時事堅大恱自謂如劉𤣥徳之遇諸葛孔明也晉哀紀勒曰吾不喜得幽州喜得二子以裴憲為從事中郎荀綽為參軍晉愍紀上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳唐肅宗紀徐幹一作榦中曰文王遇姜公於渭陽若披雲見日月開霧覩青天也晉書人見之若披雲霧而覩青天也樂廣傳傳記唐太宗私幸端門見新進士綴行而出喜曰天下英雄入吾彀中矣摭言集共君一夜話勝讀十年書古詩宿心遂矣冥骨甘焉陳子昂一得拜光輝温如春風至韋應物心朗目舒烱若深井之下仰視白日之正中也栁文如黑而迷仰見斗極唐文粹失望經終逺兄弟謂他人父謂也人父亦莫我顧詩燕婉之求得此戚施詩薄言往愬逢彼之怒詩子避水火也如水益深如火益熱亦運而已矣運者将轉而望救於他人有託其妻子於其友而之楚遊者比其反也則凍餒其妻子良人者所仰望而終身也今若此孟子莊周顧車轍中鮒魚曰激江西之水而迎子可乎鮒魚忿然作色曰我得斗升之水逝然活耳君乃言此曽不如早索我於枯魚之肆荘子外篇論惜乎衣未成而轉為裳也揚子修身篇史四方諸侯誰不解體左士大夫悵然失望谷永傳鄭世翼遇崔信明曰聞公有楓落吳江冷願見其餘信明多出衆篇翼覽未終曰所見不逮所聞唐崔信明傳侯覇聞太原閔仲叔之名而辟之既至覇不及政事徒勞苦而已叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去漢光武紀李宻與王世充戰失利與衆二萬人歸關中上遣使迎勞相望於道宻大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連數百城知我在此遣使招之亦當盡至比於竇融功亦不細豈不以一台司見處乎宻至長安有司供待稍薄所部兵累日不得食衆心頗怨而以宻為光禄卿上柱國賜爵邢國公宻既不滿望朝臣又多輕之執政者或來求賄意甚不平唐髙祖紀傳記郝}
