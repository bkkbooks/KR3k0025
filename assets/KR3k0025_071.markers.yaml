  - {type: variant, offset: 3029, length: 1, content: 號, WYG: 汲黯直氣餓死淮陽仲舒大才位屈於諸侯相封事孔子門人三千達者無子男之位並唐傳記王播少孤貧嘗客揚州木蘭院隨僧覔齋僧厭之播至已飯矣唐書顔駟對武帝曰文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇漢武故事段相文昌少貧毎聽曽口寺齋鐘輙詣謁食為寺僧所厭乃齋後撞鐘後入相出鎮京南題曽口寺云曽遇闍黎飯後鐘北夢𤨏言集年既已過大半然坎坷而留滯楚辭當世豈無騏驥兮誠無王良之善御懐瑾握瑜兮窮不知所示伯牙之絶絃安得鍾子期而聽之和抱璞而泣血安得良工而别之並楚辭潦倒聲名壅腫才一生多故苦邅廽萬族咸悦獨為窮人四時平分未變寒谷孤鳴甚哀卒無善聽劉賓客早行多露悔强進觸藩羸吕和叔詩憊色秋來草哀吟雨後蟬元㣲之金寳同砂礫芝蘭似草萊同上其言如水投石莫之受也文選以仲尼之才也而器不用於魯衛以仲尼之辯也而言不行於定哀以仲尼之謙也而見忌於子西以仲尼之仁也而取讎於桓魋以仲尼之智也而受屈於陳蔡以仲尼之行也而招毁於叔孫夫道足以濟天下而不得貴於人言足以經萬世而不取信於時行足以應神明而不能彌綸於俗歴聘七十}
