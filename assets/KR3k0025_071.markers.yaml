  - {type: variant, offset: 3069, length: 2, content: 奔走, WYG: 其不遇也如此文選班匠不我顧牙曠不我録焉得成琴瑟何由揚妙曲司馬紹贈山濤卞和潜幽㝠誰能證竒璞未遇伯樂則千載無一驥文選百年歌自苦未見有知音杜詩垂白馮唐老真成窮轍鮒或似喪家狗有才無命百宰底相如逸才親滌器子雲識字終投閣但覺髙歌有鬼神焉知餓死填溝壑醉時歌東野不得官白首誇龍鍾韓集汨東西與南北亘十年以不居辱飽食其有數况策名}
