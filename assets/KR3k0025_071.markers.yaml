  - {type: variant, offset: 1499, length: 2, content: 否然, WYG: 終羈賤乎隋書西川節度使陳敬瑄素賤㣲報至蜀蜀人皆驚莫知為誰唐僖宗魏知古本起小吏因姚崇引薦以至同為相崇意輕之唐𤣥宗集布衣單門文選朝不坐宴不與言賤也白帖唐白志貞嘗從雜類出自㣲賤栁文本朝韓全義家世寒史失其先世孔帖天窮無所逃一作遁東坡詩富盛經乃求千斯倉乃求萬斯箱詩富潤屋記富有曰茍美矣語子重裘累茵而坐公孫子晉楚之富不可及也孟子虞氏梁之富人髙樓臨大路設樂陳酒擊搏樓上列子有富厚丘山之積荀子富國史髙臺深池撞鐘舞女左管仲相齊富擬公室史記夫倮鄙人牧長清窮鄉寡婦禮抗萬乘名顯天下豈非以富耶無鹽氏富埒關中貨殖傳金石絲竹之聲不絶於耳俳優侏儒之笑不乏於前主父偃傳富者衆之怨也漢宣紀乘堅策肥曵絲履縞藏鏹千萬漢紀鐘鼓帳帷不移而具賈山傳髙貲富人地理志言多財也家貲累巨萬杜周傳任氏善富者數十世貨殖傳田園極膏腴田蚡傳奉養極為鮮明王吉傳南金和寳冰紈霧縠之積盈牣珍藏嬙媛侍兒歌童舞女之玩充備綺室}
