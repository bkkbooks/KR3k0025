  - {type: variant, offset: 776, length: 0, content: '', krp: 敢不局謂地葢厚不敢不踳詩子危行側視振動悼慄處勢不便未足以逞其能也莊子史道路以目史周本紀色如死灰滑稽傳李斯曰斯本上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也本傳破膽寒心前谷永傳重足一跡不寒而栗義縱傳杜門齧舌灌夫傳重足而立側目而視汲黯傳朝廷多事督責大臣自公孫𢎞後丞相比坐事死石慶雖以謹得終然數被譴公孫賀引拜}
  - {type: variant, offset: 777, length: 3, content: 故圓鑿, WYG: 丞相不受印綬頓首涕泣不肯起上乃起賀不得已拜出曰我從是殆矣通鑑漢成紀驚懼不知所言汗出沾背徒唯唯而已漢宣紀人有懼心精銳銷耎漢成紀兢兢如履冰慄慄如不滿日光武紀注楊國忠謂客曰吾本寒家一旦縁椒房至此未知稅駕之所唐紀如居風濤洶洶靡定同上朝士毎朝輙與家人訣曰未知復相見否武后紀崇髙之位憂重責深揚子雲舉頭畏觸摇足恐堕内獨怖急乍冰乍火趙窮鳥賦苻堅同苻融伐晉堅登城望王師部陣齊整將士精銳又北望八公山草木皆類人形顧謂融曰此亦勍敵也憮然有懼色晉苻堅傳傳記向鵬衢而自愧瞻鶂路以驚魂白帖集若負芒刺於背選豪士賦五内震駭選書累卵疊棊觀形懐怛魏都賦衆毁所歸不寒而慄報孫㑹宗書䘮精亡魄失歸忘趍東京賦弱禽飛時攅箭險蹇驢行處薄冰危施肩吾詩危素卵之累殻甚𤣥燕之巢幕潘安仁賦危冬葉之待霜同上身寄虎吻危同朝露桓𤣥上表心折骨寒江文通别賦瑟縮不安韓文駭汗如雨同上鷙鳥之髙翔兮㜸狐惴而弗食栁弔萇𢎞魂驚怯怒蛙栁文傷弓未息新驚鳥白集心魂不寧手足無措慄然如履春冰凛然若馭朽索相目而變色並同上咋舌不敢言吞寃銜忍劉賓客進退惟谷冰炭在懐重兢累媿並同上隼猜鴻蓄縮虎横犬迍邅元㣲之落雨更紛飛誰能不驚骨孟浩然周章跼蹐胡顔自安劉賓客木朝瑟縮愈不安鍼氊無穏坐劍米有危炊東坡福祉經受兹介福易如山如阜如岡如陵如川之}
