  - {type: variant, offset: 2204, length: 0, content: '', WYG: 尉徳裕固辭上曰恨無官賞卿耳唐武宗紀李徳裕乞退就閑局上曰卿每辭位使我旬日不得所同上上命所司授監察御史李素立以七品清要所司擬雍州司户上曰此官要而不清又擬祕書郎上曰此官清而不要遂擢授侍御史唐髙祖紀韓休為人峭直不干榮利及為相甚允時望上或宫中宴樂及後苑游獵小有過差輙謂左右曰韓休知否言終諫䟽已至上嘆曰蕭嵩奏事嘗順㫖既退吾寢不安唐鑑孤之有孔明猶魚之有水也諸葛亮傳三顧臣草廬之中咨臣以當世之事出師表苻堅謂王猛曰朕竒卿於一見卿亦異朕於一言精契神交千載之㑹晉紀山濤志必欲退詔曰山僕射近日暫出遂以㣲苦未還豈吾側席之意其遣丞掾奉詔諭旨若體力尚未}
