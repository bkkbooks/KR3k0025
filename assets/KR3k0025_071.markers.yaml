  - {type: variant, offset: 1652, length: 3, content: 傾軋垂, WYG: 如家徒四壁立自着犢鼻褌本傳積土為室編蓬為户東方朔傳菜食不厭足也衣又穿空可為酸鼻衣敝履空鮑宣無立錐之地張良傳始君約時張耳傳貧者短褐不全貨殖志糲粲之食𤓰匏之羮劉向序伏臘無糟糠糟一作粕東漢衣無兼副蔡彤傳摶手困窮龎參傳甑中生塵釜中生魚范丹傳環堵蕭然不蔽風日短褐穿結簞瓢屢空陶潜傳韓信家貧常從人寄食通鑑崔琳為鄔令貧無車馬單歩之官魏志盧攜曰貧者磑蓬實為麫蓄槐葉為韲通鑑傳記李陽冰家無宿舂之儲出無代歩之乘李陽冰論朝營夕用故無宿給語溪記集無衣裘以御冬兮恐溘死而不得見乎陽春楚辭自余為人逢運之貧簞瓢屢罄絺綌冬陳翳翳柴門事我宵晨陶詩門無結駟之迹堂無好事之客樵蘇不爨清談而已文選外望無寸禄内顧無斗儲左太冲詩薇藿弗充膚皮褐猶不全文選下貧無兼養之業中産闕游食之貲文選分鴈鶩之稻梁沾玉斚之餘瀝文選飢寒無甘㫖之資選啟原憲懸磬之居值天雨不已室宇漸而作漏堂館洽而為泥應璩書釡遲鈍而難沸薪鬱絆而不燃家貧賦寥寂守窮巷幽獨卧空床蠨蛸在堂蟋蟀在户陳子昂集海圖拆波濤舊繡移曲折天吳及紫鳳顛倒在短褐杜詩棲托難髙卧飢寒廹向隅經年在茅屋妻子衣百結不爨井晨凍無衣牀夜寒囊空恐羞澁留得一錢㸔蓬蒿翳環堵才名}
