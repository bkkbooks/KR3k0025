  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷七十一宋潘自牧撰人事部壽考經綏我眉夀黄耉無疆黄髪台背黄髪兒齒俾爾夀而臧俾爾耆而艾萬有千歳眉夀無有害夀考維祺以介景福永錫難老令徳夀豈並詩九十雖得人}
