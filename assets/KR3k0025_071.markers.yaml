  - {type: variant, offset: 2493, length: 409, content: 小器史成風聞成季之繇乃事之而屬僖公焉左閔二年承顏觀色為務史記淳于髡張湯造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而刻深吏多為爪牙用者依於文學之士丞相弘數稱其美史本傳魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而司之得勃勃曰願見相君無因故為子掃於是舍人見勃曹參西漢追時好而取世資西漢蓋寬饒時王氏方盛五侯兄弟爭名其客各有所厚不得左右唯護盡入其門咸得其懽心西漢樓護傳互入交結奔競許伯入第丞相御史將軍中二千石皆賀同上追趨逐耆西漢楊雄傳師古曰隨所趍向愛嗜而追逐之也畢軌鄧颺李勝何晏丁謐皆有才名而急於富貴趨時附勢通監魏邵陵厲公紀慕容超時公孫五樓為侍中內外無不憚之王儼諂事五樓時人語曰欲得侯事五樓晉書互入恃勢朝露未晞小車盈董賢石崇之居夕陽早落皂蓋填閻竇之里隋書盧思道勞生論李林甫欲除不附己者求治獄吏蕭炅薦吉溫於林甫得之大喜溫常曰若遇知己南山白額虎不足縛也羅希奭為吏深刻皆隨林甫所欲深淺鍜鍊成獄無能自脫, WYG: 館}
