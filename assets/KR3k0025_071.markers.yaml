  - {type: variant, offset: 3011, length: 1, content: 權, WYG: 天子曰王某之文最宜為誥有古人風豈可久以吏事役之拜中書舍人王仲舒與陽城合遏裴延齡不得為相徳宗久嘉之後入閣顧問謂宰相曰第幾人必王某也果然月餘致員外郎𤣥宗召見李白於金鑾殿降輦歩迎如見園綺以寳裝方丈賜食於前御手和羮徳音褒奬褐衣恩遇前無比儔遂直翰林專掌宻命他日泛白蓮池公不在宴明皇歡既洽召公作序時公已被酒於翰苑中仍命髙大將軍扶以登舟李白碑乘朱輪於郡邸曵長裾於王}
