  - {type: variant, offset: 1220, length: 0, content: '', WYG: 雄解嘲排朱門入紫闥魯褒賓御紛颯沓鞍馬光照地鮑昭詩三入承明廬車服一何焕應璩詩注云璩初為侍郎又為常侍又為侍中故云三入職近日月王肅論天顔有喜近臣知朝罷香煙攜滿袖侍臣緩歩歸青瑣退食從容出毎遲聽履上星辰光輝仗鉞雄榮光懸日月雲霄今已逼人生五馬貴翰林逼華葢髙}
