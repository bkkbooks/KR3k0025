  - {type: variant, offset: 1496, length: 0, content: '', krp: 為御史不出長安城十年至宰相通鑑𫝊記駢角挺生一朝暴貴史通董卓徴荀爽至府三日策拜司空起岩穴九十五日而為台司荀氏家傳尚父之帥河中也咸寧郡王渾公佐之不十年按控數州繼踐台庭郭子儀家傳集一佐成湯遂荷阿衡之號選牋釋褐而傳揚雄解嘲千秋一日九遷荀爽十旬逺至任彦昇為范尚書表掉頭稱俊造翹足取公卿白樂天集本朝以一日而葢天下東坡晩發史絳縣人七十有三年矣趙孟仕之使為君復陶注衣服之官以為絳縣師左束帛加璧安車駟馬迎申公弟子二人乘鞀傳從時已八十餘矣天子以為中大夫史儒林傳韋賢年七十餘為丞相西漢本傳公孫𢎞年七十以賢良徴為博士至宰相封侯本傳鄭武公年過八十入為周司徒晉劉毅傳張柬之以賢良召時年七十餘矣狄仁傑薦曰荆州長史張柬之雖老宰相材也姚崇又薦曰其人老唯亟用之即日召拜平章事年已八十唐書本傳傳記卓茂年七十餘拜太傅東觀漢記集飄飄蘇季子六印佩何遲紫綬映晚年杜詩共憐芳意晚秋露未須漙劉長卿古人多重晩年榮杜荀鶴集本朝梁灝年八十二歳雍熙二年狀元及第謝啟云白首窮經少伏生之八歳青雲得路多太公之二年後終祕書監卒年九十餘正敏㣲賤經孔子曰吾少也賤故多能鄙事語史主父偃曰結髪逰學四十餘年身不得遂親不以為子昆弟不収賓客棄我我阨日久矣史本傳衛青曰人奴之生得無笞罵足矣本傳趙髙世世卑賤蒙恬傳莊舄故越之鄙細人也陳軫傳欒布窮困賃傭於齊為酒家保數歳為人所掠賣為奴於燕史虞卿非窮愁亦不能著書以見於世本傳寄食於漂母無資身之策受辱於跨下無兼人之勇通鑑家貧傭作匡衡傳陳渉甕牖繩樞之子甿𨽻之人遷徙之徒也賈誼傳生為愍𨽻表言為徒𨽻可哀愍賣傭於齊欒布傳與人傭耕陳勝傳閭閻之𨽻臣武五子傳顔師古曰賤也從人寄食韓信傳攻苦食啖}
  - {type: variant, offset: 1497, length: 0, content: '', WYG: 孫通傳兩人所出㣲謂竇廣國兄弟陳寔出於单㣲黄憲世貧賤父為牛醫郭泰世貧賤早孤母欲使給事縣廷林宗曰大丈夫焉能處斗筲之役乎本傳衛青出於奴虜身非王公大人名族之後韓安國起自徒中朱買臣出於幽賤並以才守本邦魏髙允曰臣少賤惟知農事漢鑑劉}
