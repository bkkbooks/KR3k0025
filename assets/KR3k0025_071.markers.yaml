  - {type: variant, offset: 3107, length: 5, content: 蜂附蟻合柳, WYG: 入稇載而歸國語齊語英布歸漢至漢王方踞床洗足召布入見布大怒悔來欲自殺出就舍帳御食飲從官如漢王居布又大喜過望西漢孟佗以蒲萄酒一斗遺張讓讓拜佗為凉州刺史漢書不圖今日復見漢官威儀東漢吕蒙晚節好學魯肅過之拊蒙背曰吾謂大弟但有武畧耳至今者學識英偉非復吳下阿蒙吳志庾翼與王羲之書云吾昔有伯英章草十紙過江失亡常歎妙迹永絶忽見足下書煥若神明頓還舊觀晉書本傳周武帝平齊謂羣臣曰我聞李徳林名謂是天上人豈意今日得其驅使北史以臺省官為司鄭管原伊殷梁湊嵩谷懐等十二州營田使丞郎得此行者喜若登仙唐髙祖紀有勸岑}
