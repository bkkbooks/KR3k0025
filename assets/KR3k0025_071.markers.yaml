  - {type: variant, offset: 3114, length: 0, content: '', WYG: 置産業文本曰南方一布衣徒歩入闗望不過祕郎縣令耳無汗馬之勞以文墨致位中書令亦極矣何更言産業乎唐書本傳傳記王敦鎮豫章衛玠避亂從洛投敦相見欣然談話彌日敦曰不意永嘉之中復聞正始之音世説中歳在辛酉乞漿得酒袁子正書殷禮與張温使蜀諸葛亮見而歎曰江東菰蘆生此竒材建康實録集幾度見詩詩盡好及觀標格勝於詩唐楊敬之詩本}
