  - {type: variant, offset: 1660, length: 0, content: '', WYG: 拄杖倚田尋野菜封書乞米趂朝炊家貧長畏客張文昌牽衣肘見歩雪履穿王維集鬢邊雖有絲不堪織寒衣賈浪仙夜學更須憑雪照朝厨爭奈絶烟何方雄飛終朝之雨流潦下停既夕之天列宿上羅李元賓生事萍無定愁心雲不開錢起文管寧木榻坐已膝穿孔伋緼袍行而肘見李義山産薄一㕓家徒四壁司空表聖文甘脆朝不足簞瓢夕屢空孟浩然樵蘇莫爨糠籺靡資}
