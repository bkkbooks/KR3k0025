  - {type: variant, offset: 1664, length: 2, content: 群眾, WYG: 一瓢顔巷日空髙家徒四壁身無一簮杜牧之地爐不煖柴枝濕杜荀鶴明朝曬犢鼻方信阮郎貧李商隠司馬相如與文君久益貧以所着鷫鸘裘貰酒西京雜記本朝其家空短孔帖出無車與馬但踏車馬塵破屋仰見星窓風冷如鎪破硯裂冰澌敗席薦霜笴歐陽集破窓孤燈冷炭凍席炭一作灰蘇老泉我貧如飢鼠長夜空齩齧瓦池研竈煤葦管書柿葉坡詩韲塩冷落空杯盤欒城集我貧無一錐所向皆四壁衝風窓自語涴壁蟲}
