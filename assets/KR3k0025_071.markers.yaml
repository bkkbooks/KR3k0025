  - {type: variant, offset: 781, length: 1, content: 枘, WYG: 至以莫不増如月之恒如日之升如南山之夀不騫不崩如松柏之茂無不爾或承福禄申之福禄膍之萬福攸同俾爾戩榖罄無不宜受天百禄降爾遐福惟日不足降福禳禳降福簡簡天錫純嘏福禄如茨受福無疆以介景福錫兹介福詩永膺多福九五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命襲于休祥膺受多福書福者備也備者百順之名也承天之祐禮記史唯厚徳者能受多福受天豐福國語中外禔福前司馬相如傳承蒙福祉禮樂志休嘉砰隠同上砰普耕反盛意婁師徳專綜邊任三十餘年當危亂之時族滅者相繼師徳出將入相能以功名終始識者多之唐本傳富貴夀考哀樂終始郭子儀傳張萬福始終禄食七十年未嘗一日言病本傳傳記崔琳三十年間無中外緦麻之䘮明皇雜録集景福肸蠁}
