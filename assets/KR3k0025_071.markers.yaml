  - {type: variant, offset: 783, length: 2, content: 難合, WYG: 興作選左思蜀都賦五臣吕尚注曰景大也肸蠁温生蟲􅀈類大福之興有如此同羣飛而多也興作皆起也家膺五福堂享三夀陳子昂真是超然五湖客未知終始郭汾陽杜牧之五福叢滋唐文粹本朝方公之輝華顯赫之時而其親享夀考康寧之福夫得禄及親人以為幸也而公以榮名顯仕為之養綵衣而戯者人以為孝也而公以金章紫綬恱其顔使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也}
