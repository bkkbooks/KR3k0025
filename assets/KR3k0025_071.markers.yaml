  - {type: variant, offset: 88, length: 2, content: 賀出, WYG: 知白髪非春事人情老易悲並杜詩久知老㑹至不謂便見侵今年宜未衰稍已來相尋齒踈髪就種奔走力不任栁覺衰詩𤣥花着兩眼視物隔褷䙰燕席謝不詣游鞍懸莫騎韓集髪之短者日益白齒之摇者日益脱聰明不及於前時道徳日負於初心兩目眵昏頭雪白頭童齒豁吾老世味薄老大百無益並韓集老色日上面歡情日去心今既不如昔後當不如今白集漠漠病眼花星星愁鬢雪白髪逐梳落朱顔辭鏡去所怪少年心銷磨落何處蹇歩何堪鳴佩玉衰容不稱着朝衣夜昏乍似燈將滅朝暗長疑鏡未磨心灰不及爐中火鬢雪多於砌下霜萬病皆可治惟無治老藥慚恐少年場不容垂白叟老耳倦聲樂急景凋年急於水夜鏡藏鬢白秋泉潄齒寒白頭雖强醉不似少年歡欲隨年少强遊春自覺風光不屬}
