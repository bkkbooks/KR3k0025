  - {type: variant, offset: 1658, length: 1, content: 通, WYG: 坐客寒無氊故人供禄米鄰舍與園蔬窮愁但有骨鶉衣寸寸針處處是窮途補綻才過膝無寸數百針經日無煙火杜詩鶉服長悲碎蝸廬未卜安糟糠不贍甘㫖之養屢空簞食無資朝夕之歡寧展駱賔王無簞食無瓢飲無所取資則餓而死韓文答李書使吾面目可憎語言無味十日營一炊蕭條資用盡濩落門巷空吾徒猶在陳僮僕誠自鄶囊空甑倒誰救之我今一食日還併冬煖而兒號寒年登而妻啼飢韓文無一㕓之地以處其子孫無一畆之宫以聚其族屬蠶絲盡輸稅機杼空倚壁闕滫瀡之養乏庾釜之蓄栁文門庭多草厨少煙蕭條殘活計生計方落然床單食味薄養無晨昏膳隠無伏臘資天寒身上猶衣葛日髙甑中未拂塵草合門無徑烟消甑有塵階庭寛窄纔容足墻壁髙低粗及肩居惟四壁飲才一瓢蓬門下客簞户輕生白樂天望一金之助已有沒齒之難盡日一菜食窮年一布衣皮日休厨竈無青烟刀机生緑蘚李白集甕頭寒絶酒竈額冷無烟永日厨烟絶姚少}
