  - {type: variant, offset: 2999, length: 1, content: 未, WYG: 太宗曰我起義晉陽為卿一門耳傳記梁劉綽除祕書丞武帝曰第一官當與第一人通鑑徳宗呼陸贄為陸九嘗脱御衣以賜之唐小史李白對明皇撰詔誥時天寒筆凍帝勅宫嬪執牙筆呵之天寳遺事李泌多年絶粒唐肅宗時毎自為燒二梨以賜之李鄴侯家事徐堅以多識典故七入書府大唐遺事劉晏八歳獻東封書明皇命宰相出題就中書試騐引晏於内殿坐晏貴妃膝上親為畫眉總丱髻宫人遺花投果}
