  - {type: variant, offset: 1682, length: 0, content: '', krp: 粗給經祭器衣服不假記始有曰茍合矣少有曰茍完矣語子孔子曰囬家貧胡不仕對曰囬有郭外之田五十畝足以給饘粥郭内之田十畝足以為絲麻囬不願仕莊子䟽屬之南汾水之曲有先人之敝廬在可以避風雨有田可以具饘粥彈琴著書講道勸義自樂也文中子史子罕曰吾儕小人皆有闔廬以避燥濕寒暑左鄭𤣥戒子益恩曰家今差多於昔後漢}
  - {type: variant, offset: 1683, length: 1, content: 朝, WYG: 傳資計差温唐儉際㑹經王三錫命承天寵也錫馬蕃庶晝日三接易既見君子為龍為光小雅虎拜稽首對揚王休大雅父子並為周司徒記以近天子之光書子其君用之則安富尊榮傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟史公孫𢎞以春秋白衣為天子三公儒林傳入則與王圖議國事以出號令出則接賓客應對諸侯王甚任之屈原傳司馬相如為天子游獵賦上令尚書給筆札本傳出入卧内親幸莫及史商鞅見孝公公與語不自知膝之前於席也甘茂居秦累世重矣本傳厠之賓客之中立之士民之上不謀父兄以為亞卿樂毅傳賈生徴見孝文方受釐坐宣室上因感鬼神之事而問鬼神之本賈生因具道所以然至夜半文帝前席罷曰吾久不見賈生自以為過之今不及也本傳擢之閭里之中加之大夫之上里一作伍司馬穰苴傳公孫𢎞數月佩丞相印貴振天下漢武紀殷説夣發於傅岩周望兆勲於渭濵皆俟命而神交匪詞言之所信揚雄解嘲以三寸舌為帝者師張良傳東方朔待詔金馬門稍得親近西漢本傳田千秋以一言寤意旬月取宰相本傳樊噲}
