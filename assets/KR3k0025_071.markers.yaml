  - {type: variant, offset: 776, length: 0, content: '', WYG: 敢不局謂地葢厚不敢不􅐲詩子危行側視振動悼慄處勢不便未足以逞其能也莊子史道路以目史周本紀色如死灰滑稽傳李斯曰斯本上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也本傳破膽寒心前谷永傳重足一跡不寒而栗義縱傳杜門齧舌灌夫傳重足而立側目而視汲黯傳朝廷多事督責大臣自公孫𢎞後丞相比坐事死石慶雖以謹得終然數被譴公孫賀引拜}
