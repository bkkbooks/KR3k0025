  - {type: variant, offset: 124, length: 7, content: 因呂和叔傳巖銘, WYG: 覔處朱顔消不歇白髪生無處霜侵殘鬢無多黒酒伴衰顔只暫紅並白集白頭非是翠娥隣元㣲之晚歳同衰栁先秋愧大椿老嗟去日光隂促並同上老骨懼秋月孟東野疲牛䑛犢心猶切隂鶴鳴雛力已衰羅隠身瘦帶頻减髪稀冠自偏廢書縁惜眼多炙為隨年烟霞為老伴蒲栁任先凋筋力上樓知劉賔客年老銷蹇歩秋氣入衰情年衰憶故鄉顧影無如白髪何鏡中無復少年時欲並老容羞白髪毎㸔兒戲憶青春劉長卿優游暮齒唐文粹末路多是非同上霜氣入病骨老人身生冰孟東野白日將頽青山將暮駱賔王春來㸃檢閒遊數猶自多於年少人白樂天丘園自得性婚嫁不嬰心錢起詩圍減帶緩髪稀弁傾李義山}
