  - {type: variant, offset: 1202, length: 0, content: '', WYG: 桓帝紀㑹稽内史周札一門五侯宗族彊盛吳士莫與為比晉明紀八座尚書則荷紫以坐紫為袷囊綴之服外加於左肩輿服志位班三事邑啟萬家通鑑梁髙祖紀鳴玉在腰囬豐貂以步文昌聳髙蟬而趨武帳南史何敬容傳持槖簮筆同上文杳傳漢尚書郎口含雞舌香以其奏事答謝欲使其氣息芬芳也宋百官志温彦博為中書侍郎兄大雅時為黄門侍郎與彦博對居近宻時人榮之唐髙祖上命圖畫功臣於凌煙閣太宗紀蘇瓌為同中書三品蘇頲拜中書舍人父子同在禁院朝廷榮之本傳校中書令者二十四人八子七壻皆貴顯朝廷郭子儀傳張嘉祐嘉貞毎上朝軒葢趨導盈閭巷時號所居坊曰鳴珂里本傳接武䕫龍簉羽鵷鷺上官儀傳唐時凡拜相禮絶班行自子城東至府第載沙填路名曰沙堤或百僚問疾有司設幕次排班}
