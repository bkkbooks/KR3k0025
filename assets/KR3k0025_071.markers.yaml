  - {type: variant, offset: 3106, length: 0, content: '', WYG: 其黨因對言榖宣力實多㣲伺上㫖也太祖曰翰林草制皆檢前人舊本俗所謂依様畫葫蘆耳何宣力之有榖作詩曰官職雖由生處有才能不管舊時無堪笑翰林陶學士年年依様畫葫蘆東軒雜録過望史周子曰孤始願不及此雖及此豈非天乎左垂槖}
