  - {type: variant, offset: 3103, length: 2, content: 赫柄, WYG: 為桓公南蠻叅軍三月三日作詩不能者罰酒隆攬筆作一句云娵隅躍清池桓公曰娵隅是何物答曰蠻名魚是娵隅桓曰作詩何作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語世説見面不如聞名傳燈録集若葵藿之傾葉太陽不為廻光選表求逢而招嫌求安而乘坎劉賔客本望文字達今因文字窮孟東野本欲雲雨化却隨波浪翻唐文粹摶羊角而髙翥浩若無津附驥尾以上馳邈焉難托駱賔王騎驢到京國欲和薫風琴豈識天子居九重欝沉沉一門百夫守無籍不可尋韓文稇載而往垂槖而歸同上何意掌上玉化為眼中沙白樂天本朝陶榖久在翰林意希大}
