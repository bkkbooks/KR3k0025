  - {type: variant, offset: 1071, length: 827, content: 之問依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因執導之以善西漢上欲封諸舅太后不聽但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣綠㡚領袖正白顧視御者不及遠矣故不加譴怒但絕歲用而已冀以默愧其心通鑑漢章紀周紆為雒陽下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清通鑑漢章紀龐參為漢陽太守郡人任棠有奇節隱居參侯之棠不與言但以薤一大本水一孟置戶屏前自抱孫兒伏於戶下主簿白以為倨參思之曰水者欲吾清也技大本者欲吾擊強宗也抱兒當戶欲吾開門恤孤也後漢繆彤兄弟四人皆同財業及各娶妻諸婦遂求分異又數鬭爭彤乃掩戶自撾曰繆彤不能正家弟及諸婦聞之悉扣頭謝罪漢書皇天不言以文家設教後漢裴楷傳魏于禁降關羽會吳孫權禽羽禁在吳吳稱藩遣禁還拜為安遠將軍欲遣使吳先令北詣鄴謁高陵帝使豫於陵屋畫關羽戰克龐德憤怒禁降伏之狀禁見慚恚發病薨魏志張郃傳范粲陽狂不言子孫常侍左右至有婚宦大事輒密諮焉合者則色無變不合則眠寢不安妻子以此知其旨不言三十六載晉書吐谷渾王阿柴疾召諸子二十人各獻一箭取一箭與其弟使折之其弟折之又取十九箭使折之不能折阿柴曰汝知之乎孤則易折眾則難摧汝曹戮力一心然後可以保國寧家通鑑晉紀互入眾力易成顏延之作五君詠以述竹林七賢山濤王戎以貴顯被黜宋書王儉作長梁齋制度小過王僧虔視之不悅竟不入戶儉即日毀之通鑑齊太祖互入人心易感金州刺史滕王元嬰驕奢縱逸居亮陰中畋遊無節數夜開城門勞擾百姓或引彈彈人或埋人雪中以戲笑上賜書切讓之不致於法書丁上考以愧其心元嬰與蔣王惲皆好聚歛上嘗賜諸王帛各五百段獨不及二王敕曰滕叔蔣兄自能經紀不須賜物給麻兩車以為錢貫二王大慚通鑑唐紀何易于為益昌令太守崔朴遊宴江上索民挽舟易于腰笏挽馬太守問狀對曰民方耕桑不可役縣令間暇當任其勞朴慚乃罷唐書李林甫居相位諫官無敢言者杜璡以上書言事斥林甫因以語動其餘曰君等獨不見立仗馬乎終日無聲飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎唐書李林甫傳, WYG: ''}
