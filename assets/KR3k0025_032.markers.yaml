  - {type: variant, offset: 2687, length: 1766, content: 於是齊威王乃益齎黃金千鎰白璧十雙車馬百駟髡辭而行史記滑稽傳楚優孟嘗以談笑諷諫楚莊王有愛馬死使群臣喪之欲以棺椁大夫禮葬之左右爭之不可孟入殿門仰天大笑曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以彫玉為棺文梓為椁梗楓豫章為題揍發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼其後廟食太牢奉以萬戶之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎乃使以馬屬太官無令天下久聞也史滑稽傳燕將騎劫攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外冢墓戮先人可為寒心燕軍盡掘壟墓燒死人即墨從城上遙見涕泣其欲出戰怒皆十倍因大敗燕史記田單相齊過淄水有老人涉淄而寒出水不能行田單解其裘而衣之襄王惡之曰田單之施於人將欲以取我國乎不早圖恐後之變也有貫珠共曰王不如因以為己善嘉單之善下令曰寡人憂民之飢也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單憂之稱寡人之意王曰善乃賜單牛酒後數日貫珠者復見王曰王朝日宜召田單而揖於庭口勞之乃布令求百姓之飢寒者收穀之乃使人聽於閭里聞丈夫之相與語者曰田單之憂人嗟乃王之教也通鑑周紀魏與趙攻韓韓告急於齊使田忌將而往直走大梁魏將龐涓聞之去韓而歸齊孫臏使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龐涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃與輕銳倍日併行逐之史記蘇秦說趙肅俟恐秦兵之至趙也乃激怒張儀入之於秦史蘇秦傳齊大夫使人刺蘇秦求賊不得秦且死謂王曰臣即死車裂臣以徇於市曰蘇秦為燕作亂於齊如此則臣之賊必得矣如其言而殺蘇秦者果自出齊王因而誅之史本傳張良說漢王曰王何不燒絕所過棧道示天下無還心以固項王意乃使良燒絕棧道項羽以此無西憂漢乃發兵北擊齊史留侯世家張良遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺項王曰齊欲與趙并滅楚項王以此故無西意而擊齊通鑑漢高紀韓信擊趙乃使萬人先行出背水陣趙兵望見大笑開壁擊之大戰信棄鼓旗走水上軍軍皆殊死戰不可敗破趙軍斬成安君西漢韓信傳陷之死地而後生投之亡地而後存仝上互入舍失求得亞父勸羽急攻滎陽漢王患之項王使至漢陳平使為太牢具舉進見楚使即佯驚曰吾以為亞父使乃項王使復持去更以惡草具進楚使歸具以報項王項王果大疑亞父通鑑漢高紀楚軍食少項王患之乃為高俎置太公其上告漢王曰今不急不吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一柸羹同前朱虛侯章忿劉氏不得職常入侍太后燕飲令章為酒吏章自請曰臣將種也請得以軍法行酒諸呂有一人醉亡酒章追拔劍斬之而還通鑑漢高后紀陳平使人劫酈商令其子寄往紿說呂祿曰今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也通監漢高后王生在廷中謂張釋之曰吾襪解為我結韤釋之跪而受之或讓生生曰廷尉天下名臣吾聊使結襪欲以重之諸公聞之賢王生而重釋之西漢吳王詐病不朝賜以几杖張武受賂金錢更加賞賜以愧其心並前漢文帝贊龔遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治通鑑漢宣紀人棄我取人取我予西漢班固貨殖傳古人有言曰天下皆知取之為取而莫知與之為取東漢譚傳景恭曰漢家箭神其中瘡者必有異虜中矢者視瘡皆沸大驚匈奴震怖相謂曰滿兵神真可畏也通監漢明紀廣陵賊張嬰冠亂梁冀以張綱為廣陵太守率多求兵馬綱獨請單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門外罷遣吏兵獨留所親者十人以書諭嬰請與相見嬰見綱至誠乃出拜謁通監漢順紀虞詡為武都太守羌率眾數千遮詡於陳倉崤谷詡令吏士各作兩竈日增倍之羌不敢逼後漢書曹操攻呂布軍敗布騎得操而不識問曰曹操何在操曰乘黃馬走者是也布騎乃釋操而追黃馬者操突出引還通監漢獻紀入當面蹉過夫能屈以為伸讓以為德弱以為強鮮不遂矣通鑑魏明紀後秦主萇還安定秦主登就食新平率眾萬餘圍萇營四面大哭萇命營中哭以應之登乃退通監晉武紀顏竣起宅延之謂曰善為之無令後人笑汝拙也通鑑宋世祖侯景與宇文泰合戰泰墜地東魏兵追及之左右皆散都督李穆下馬以策杖泰背罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人舍之通鑑梁高祖慕容紹宗擊侯景景眾大潰爭赴渦水使謂紹宗曰景若就擒公復何用仝前唐高祖與李密書曰名利之地鋒鏑縱橫深慎垂堂勉茲洪業密得書甚悅曰唐公見推天下不足定於是不虞義師而專意於世充唐書李密傳長孫順德受人餽絹, WYG: ''}
