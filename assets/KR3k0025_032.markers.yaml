  - {type: variant, offset: 424, length: 0, content: '', WYG: 駕幸太學博士論難於前榮温恭藴藉以禮遜相厭不以詞長勝人並漢書王恭少篤學教授鄉閭弟子數百人貞觀初詔拜太學博士講二禮别為義證甚精博盖文懿文達當時大儒每講便舉先儒義必暢恭所說唐書樂祇黄初中徵拜博士十餘人文多偏僻不敢親教具員}
