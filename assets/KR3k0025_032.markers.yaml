  - {type: variant, offset: 806, length: 264, content: 召周亞夫賜食獨置大載無切肉又不置箸亞夫心不平顧尚席取箸上視而笑曰此非不足君所乎通鑑漢景紀萬石君子孫有過不誚讓為便坐對案不食諸子相責因長老肉袒固謝罪改之西漢本傳互入陰驅默化又入教子薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使群臣喪服往哭之乃自殺通鑑漢文紀匈奴徙蘇武北海上無人處使牧羝曰羝乳乃得歸通鑑漢武紀詔求微時故劍大臣知指白立許倢伃為皇后通鑑漢宣紀韋賢薨長子弘有罪繫獄家人矯賢令次子大河都尉玄成為後玄成深知其非賢雅意即陽為病狂臥便利妄笑語昏亂既葬當襲爵以狂不應召同前嚴君平卜筮於成都市以為卜筮者賤業而可以惠眾人有邪惡非, WYG: 興㑹要太學}
