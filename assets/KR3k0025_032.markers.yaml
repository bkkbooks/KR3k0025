  - {type: variant, offset: 136, length: 1, content: 宓, WYG: 司業好學喜勤善誘後生修講舎人以為善職分紀陽城引諸生告之曰學者所以學為忠孝也諸生有乆不省親者乎明日還養者二十輩有三年不歸侍者斥之簡孝秀徳行升堂上沈酗不率教者罷之生徒斤斤皆有法度通典集才難孰為吾君惜果漏寜容我輩先熟路長驅聊緩步百金一發不虛弦陳後山送詹司業詩命樂正之官輔司成之教往祇厥職母使陽城韓愈之流專美前世欒城徐盛喬制司業武公少儀於是總太學儒官三十有六人列燕於祭酒之堂韓文公聽琴序本朝元豐正名置司業掌三學之教法政令續㑹要初除朱服職略建炎三年省紹興十二年復置中興㑹要隆興併省司業不許與祭酒並除乾道七年欲除劉焞孝宗曰司業乃祭酒之貳並置何妨於是始並置孝宗㑹要師氏之位惟其能南豐擬制王大寶知袁州暇日尋理舊所著述得周易證義十卷毛詩國風證義六卷表進上謂宰相曰王大寶所進書深得經㫖其以國}
