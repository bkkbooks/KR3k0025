  - {type: variant, offset: 4576, length: 329, content: 魏王遺楚王美人王說之夫人鄭褏衣服玩好之甚於王王曰婦人妬其情也今褏知寡人悅新人其愛之甚此孝子之所以事親忠臣之所以事君也褏知王以己為不妬因謂新人曰王愛子美然惡子鼻新人見王掩其鼻王曰新人掩鼻何也褏曰似惡聞君之臭也王曰悍哉令劓之戰國策互入娭妬鷙鳥將擊卑飛歛翼猛獸將搏弭耳俯伏太公六韜猛獸將擊必弭毛帖伏鷙鳥將搏必卑飛戢翼聖人將動必順辭和眾後漢趙曄吳越春秋集履危乘機安可當置之死地翻取彊韋應物集本朝趙閱道知越州時兩浙旱蝗米價踊貴諸州皆牓衢路禁人增米價閱道獨牓衢路令有米者任增價糶之於是諸州米商輻湊詣越米價更賤記聞楚公子微服出亡而門者難之其僕操箠而罵曰隸也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可東坡莊子祠堂記窮其黨而去之不如因其才而用之東坡, WYG: 纂淵海卷三十二}
