  - {type: variant, offset: 0, length: 1, content: 示, WYG: 欽定四庫全書記纂淵海卷三十二宋潘自牧撰職官部祭酒經帝曰夔命汝典樂教胄子書史漢置博士至東京凡十四人而聰明有威重者一人為祭酒漢書晉咸寜四年立國子學置祭酒一人永嘉中又置儒林祭酒一}
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_032-1a, image: WYG0930/WYG0930-0696a.png}
  - {type: variant, offset: 0, length: 1, content: 示, krp: 欽定四庫全書記纂淵海卷三十二宋潘自牧撰職官部祭酒經帝曰夔命汝典樂教胄子書史漢置博士至東京凡十四人而聰明有威重者一人為祭酒漢書晉咸寜四年立國子學置祭酒一人永嘉中又置儒林祭酒一}
  body:
  - {type: variant, offset: 3, length: 1, content: 意, WYG: 杜夷為之當為訓範總統學中衆事晉書荀卿年五十始来學於齊襄王時最為老師三為祭酒焉史記南齊何𦙍為國子祭酒與太子中庶子王瑩並為侍中時𦙍輩作祭酒疑所服陸澄博古亦不能定遂以𤣥服臨試後羣議乃用朱衣自此始南史晉袁瓌為國子祭酒時喪亂之後禮教陵遲瓌上疏云請得給其宅地備其學徒帝從之國學之興自瓌始晉史傳記隋元善賜江楊縣公後遷國子祭酒時帝親臨􅇚奠命善講孝}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_032-1b, image: WYG0930/WYG0930-0696b.png}
  - {type: variant, offset: 3, length: 1, content: 意, krp: 杜夷為之當為訓範總統學中衆事晉書荀卿年五十始来學於齊襄王時最為老師三為祭酒焉史記南齊何𦙍為國子祭酒與太子中庶子王瑩並為侍中時𦙍輩作祭酒疑所服陸澄博古亦不能定遂以𤣥服臨試後羣議乃用朱衣自此始南史晉袁瓌為國子祭酒時喪亂之後禮教陵遲瓌上疏云請得給其宅地備其學徒帝從之國學之興自瓌始晉史傳記隋元善賜江楊縣公後遷國子祭酒時帝親臨釋奠命善講孝}
