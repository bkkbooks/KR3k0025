  - {type: variant, offset: 454, length: 1, content: 圍, WYG: 孫六典馬光為太學博士嘗因釋奠髙祖親幸國子學王公以下畢集光升坐講禮諸儒生以次論難皆當時碩學光析剖凝滯論者咸服通志唐韓愈為四門博士作進學觧招諸生立館下誨之同上集才名十四年坐客寒無氊賴有蘇司業時時遺酒錢杜甫飄飄凌雲章强禦莫能懾辟雍海環流用汝作舟楫開胷出妙義可發蒙起魘詞如太阿鋒誰敢觸其鋏王荆公半生湖海㸔青山慣佩笭箵攬轡艱曉起初馳朱雀路霜嚴慙綴紫宸班百僚卑處瞻丹陛五色光中望玉顔浪說書名落人世非公那解徹天闗元章除書學博士初朝謁呈時宰詩仁義途中馳騁詩書府裏從容頭角驚殺蝦蟹學海波中老龍爪距逐出狐聖人門前大蟲推倒楊朱墨翟扶起仲尼周公杜黙本朝熙寜四年詔相度錫慶院建太學從鄭綰所請也元豐三年詔改國子監直講為太學博士職源秦觀元祐初蘇軾賢良方正薦於朝除太學博士東都事畧渟化三年楊徽之上言文士雖多而通經甚少精選五經博士各專業教胄子此風化之本也慶厯五年上幸國子監命直講孫明復講易乾卦言王者當法乾元以攬威福漢元帝優游不斷失乾剛之道也上善之賜五品服國史國子正傳記北齊國子寺有正錄員隋一人唐因之六典集禁掖人知連狀薦國庠官滿一家貧清儀都道蓬瀛客直氣堪為諫諍臣釋無可贈敬睦助教本朝國初闕大觀元年薛昻乞置國子博士國子正録}
