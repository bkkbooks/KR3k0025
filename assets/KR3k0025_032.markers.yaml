  - {type: variant, offset: 419, length: 1, content: 勇, WYG: 宗師使孔聖之言傳而不絶本傳後魏崔逸為國子博士每公事逸常被詔獨進博士特命自逸始魏史唐李絳請崇國學上䟽曰博士有倚席之譏唐書傳記晉咸寜四年初置國子博士一人皆取履行清淳通明典義梁置五經博士各一人唐增置二人孔子之後孔忠生}
  - {type: variant, offset: 419, length: 1, content: 勇, krp: 宗師使孔聖之言傳而不絶本傳後魏崔逸為國子博士每公事逸常被詔獨進博士特命自逸始魏史唐李絳請崇國學上䟽曰博士有倚席之譏唐書傳記晉咸寜四年初置國子博士一人皆取履行清淳通明典義梁置五經博士各一人唐增置二人孔子之後孔忠生}
  - {type: variant, offset: 421, length: 2, content: 矣迴, WYG: 及安國武生延年延年生霸安國延年皆為武帝博士霸亦昭帝末為博士霸生光成帝初舉為博士漢文帝時申公為詩最精以為博士申公為詩傳號曰魯詩京房受易梁人焦延夀房授東海殷喜河東姚平河南𢎞乗皆為郎由是易有京氏之學魯國先賢傳漢文帝時博士朝服𤣥端章甫冠通典唐盖文懿武徳初歴國子助教時髙祖引於秘書省學教授王公之子時文懿為博士文懿常開講發毛詩題公卿咸更相問難文懿發揚風雅甚得人之致敬唐大厯初禮部侍郎許善心舉徐文逺與包愷褚徽陸徳明魯達為學館遂擢文逺國子博士愷等並為太常博士皆一時之最唐書集諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭梁肉廣文先生飯不足先生有道出羲皇先生有才過屈宋徳尊一代常坎軻名垂萬古知何用先生蚤賦歸去来石田茅屋荒蒼苔儒術於我何有哉杜甫詩儒庠恣游息聖籍飽商確韓詩本朝國子監無博士有直講八人熙寜改為太學博士元豐定制亦無國子博士大觀元年薛昻乞置國子博士四員國子正錄各二員與太學官分掌教道從之建炎併國子監於禮部紹興三年詔駐蹕所在因國子監量養生徒置博士二員中興㑹要楊萬里詔為國子博士上疏乞留左司員外郎張栻除軍器少監韓玉上罷之由是名重朝廷言行錄太學博士史漢太學置五經課試之法置春秋穀梁博士漢官儀公孫𢎞對䇿時百餘人太常奏𢎞第居下天子擢為第一召見容貌甚麗拜為博士待詔金馬門光武起太學博士諸生横卷為海内所集桓榮拜博士}
