  - {type: variant, offset: 5, length: 2, content: 挈壺, WYG: 於是敷陳義理兼之諷諫上大恱曰聞江楊之說更起朕心續通典唐賀徳仁少與從兄徳基俱為國子祭酒時人語曰學行可師賀徳基文質彬彬賀徳仁楊嶠為國子祭酒引尹知章范行恭趙𤣥黙為學官皆名儒冠並同上楊汪為國子祭酒帝令百僚就學與汪講論通儒碩論雖鋒起皆不能屈陳先生行狀集冠帶橋門路雍容俊士闗微言尊噩噩小道屏閒閒禮樂髙千古詩書到百蠻斯文知未冺璧水尚如環朱行中詩㡬度見詩詩總好及觀標格過於詩平生不㑹藏人善到處逢人說項斯楊祭酒詩聖恩若許留太學諸生講解得切磋韓愈本朝國子監有判監事有管勾監事侍制}
