  - {type: variant, offset: 2478, length: 196, content: 公語之拜賀公曰何賀曰齊與晉越欲此久矣寡君無適與也而傳諸君其備禦三鄰慎守寶矣公懼乃反之左昭七智伯請地於韓康子叚規曰周書曰將欲敗之必姑輔之將欲取之必姑與之主不如與之以驕智伯然後可以檡交而圖智氏矣通鑑周紀楚大發兵加齊齊王使淳于髡之趙請救兵齎金百斤車馬十駟淳于髡仰天大笑冠纓索絕王曰先生少之乎髡曰何敢王曰笑豈有說乎髡曰今者臣從東方來見道旁有禳田者操一豚蹄酒一孟祝曰甌簍滿篝汙邪滿車五穀蕃熟穰穰滿家臣見, WYG: 文}
