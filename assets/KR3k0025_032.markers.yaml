  - {type: variant, offset: 1903, length: 183, content: 遣使齎千金市千里之馬未至而馬死使者買死馬之首以歸王大怒使者曰死馬尚市之況生者乎天下必知君之好也馬將至矣於是朞年而千里馬至者三焉戰國策魏文侯令樂羊將而攻中山三年而拔之樂羊反論功文侯示之謗書一篋春秋後語互入毀謗及不信讒武王伐紂過壑斬山過水拆舟過谷發梁過山焚萊示民無返志說苑楚莊王好獵夫人樊姬數諫不止乃不食禽獸之肉二年王感之而勤於政事古列女傳齊桓公好樂衛姬為不聽鄭衛之聲同, WYG: 建}
