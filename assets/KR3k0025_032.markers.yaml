  - {type: variant, offset: 2257, length: 182, content: 其計及其還置酒邀之中食引至癭木亭相對酒五行無他語向顧見刻石知事已露遂不復議搉事龍川志子將欲噏之必固張之將欲取之必固與之老子夫狐之搏雉也卑體弭耳以待其來也雉見而信之故可得而禽也使狐瞋目見其必殺之勢雉亦知撣遠飛以避其怒矣淮南子史鷙鳥之擊必匿其形史越世家美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂讚諸鄭伯曰美城其賜邑將以叛也申侯由是得罪左僖鄭子元伐鄭懸門不發楚, WYG: 恥文彦博等}
