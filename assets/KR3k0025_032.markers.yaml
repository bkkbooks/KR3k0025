  - {type: variant, offset: 502, length: 270, content: 縣尹也誰獲子囚曰頡遇上子弱焉左襄二十八秦穆公使孟明視等襲鄭侵晉渡河焚舟大敗晉人史記燕昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趍燕史燕世家楚懷王使項羽為將軍伐秦羽兵渡河皆沈船破釜甑廬舍持三日糧以示士卒必死於是大破秦軍史記上封大功臣其餘爭功不決未得行封諸將偶語張良曰上所憎誰甚曰雍齒良曰今先封齒以示群臣群臣皆喜西漢張良傳漢高祖怨丘㛐之轑釜乃封其子為羹頡侯楚元王傳互入報怨朱虛侯章曰深耕概種立苗欲疏非其種者鋤而去之通鑑漢高后其得漢繒絮以馳草棘中衣袴皆裂敝以示, WYG: 罸學錄掌佐學正糾}
