  - {type: variant, offset: 133, length: 0, content: '', WYG: 唐書張參為國子司業年老嘗手寫九經以為讀書不如寫書唐史韓愈為國子司業竇公墓誌云公誨於國學也嚴以得禮扶善遏過明上下之分以躬先之恂恂愷悌得師之道同上郭山暉累遷國子司業景龍中帝昵狎近臣及修文學士詔徧為伎餘臣各有所陳而暉乃誦鹿鳴蟋蟀篇未畢中書令李嶠以近規諷止之帝嘉其直下詔褒唐書凡六學生每歲有業成上於監者以其業與祭酒司業試之隋志傳記隋煬帝大業三年於國子監初置司業一人唐置二人從四品副貳祭酒通判監事龍朔二年改為少司成咸亨初復舊凡祭酒司業皆儒重之官非其人不居通典唐}
  - {type: page-break, offset: 133, content: '', id: KR3k0025_WYG_032-3b, image: WYG0930/WYG0930-0697b.png}
  - {type: variant, offset: 133, length: 0, content: '', krp: 唐書張參為國子司業年老嘗手寫九經以為讀書不如寫書唐史韓愈為國子司業竇公墓誌云公誨於國學也嚴以得禮扶善遏過明上下之分以躬先之恂恂愷悌得師之道同上郭山暉累遷國子司業景龍中帝昵狎近臣及修文學士詔徧為伎餘臣各有所陳而暉乃誦鹿鳴蟋蟀篇未畢中書令李嶠以近規諷止之帝嘉其直下詔褒唐書凡六學生每歲有業成上於監者以其業與祭酒司業試之隋志傳記隋煬帝大業三年於國子監初置司業一人唐置二人從四品副貳祭酒通判監事龍朔二年改為少司成咸亨初復舊凡祭酒司業皆儒重之官非其人不居通典唐}
