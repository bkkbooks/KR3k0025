  - {type: variant, offset: 140, length: 2, content: 單父, WYG: 教原丞為糾局生於學者表王化之大同植於㕔者知宦政之無曲樂我皇道彰我聖年依君仁義之圃對君翰墨之筵並同上本朝景祐二年孫祖徳請於直講京官内差一員充監丞詔學官兼領掌錢穀出納之事四朝志元豐定制置祭酒司業掌三學之教法政令而監之事則丞與焉續㑹要建炎三年省紹興十二年復置中興㑹要趙鼎先是國子監丞張戒上書幾八千言自謂恐聖意上謂}
