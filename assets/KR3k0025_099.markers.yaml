  - {type: variant, offset: 1432, length: 1, content: 桓, WYG: 崔𢎞度每期戒僚吏曰無得欺誑後嘗食鼈侍者八九人𢎞度一一問之曰鼈美乎皆云鼈羙𢎞度罵曰傭奴何敢誑我汝初未嘗食鼈安知其美俱杖之隋書傳記鼈三足能爾雅鼈目白腹下王字者不可食雜爼鼈一名河伯從事古今注}
