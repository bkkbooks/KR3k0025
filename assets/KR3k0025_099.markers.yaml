  - {type: variant, offset: 5035, length: 5, content: 西夏趙德明, WYG: 璀璨殻如玉斑斕㸃上花含漿不肯吐得火遽已呀六一集素脣紫錦背漿味壓蚶菜梅聖俞珠宫新沐浄瓊沙石鼎初燃瀹井花紫殻旋開微滴酒玉膚莫熟要鳴牙誠齋蠣傳記南海謂蠣為蠔甲為牡蠣合澗州圓蠣土人重之語曰得合澗一蠔雖不足豪亦可以高也南越志蠔生海島邊如拳石四面漸長有高一二丈者每一房内蠔肉一片海夷以斧揳取殻燒以烈火蠔即啓房挑取其肉趣市以易醑嶺表録異集蠔相粘為山十百各自生韓詩本朝薄宦遊海鄉雅聞静康蠔中厨烈熖炭燎以柴與蒿委質已就烹鍵閉猶遁逃稍稍窺其戸青欄流玉膏人}
