  - {type: variant, offset: 5047, length: 4, content: 斛真宗問, WYG: 壑間誠齋蚶傳記瓦屋子南中舊呼為蚶子盧鈞尚書作鎮以其殻上有稜如瓦壠故名焉廣人尤重之俗呼為天臠炙嶺表録異鱟傳記鱟形如惠文冠青黒色十二足腹中有子如麻子取以作醤尤美吳録地理志鱟形如熨斗頭似蜣螂南人重之以為鮓廣州記鱟魚其殻瑩浄如青甆盌􅌯背眼在背上口在腹下尾長尺餘三稜如梭莖雌常附雄而行若摘去雄者雌者即自止腹中有子如菉豆嶺表録異集鱟實如惠文骨眼相負行韓詩本朝忽有缾罌至捲將江海來𤣥霜束龜殻紅霧染珠胎誠齋蟹經離為蟹易蠶則績而蠏有匡禮子蠏六蛫而二螯非蛇蟺之穴無所寄托者用心躁也荀子夫釋大道而任小數無異於使蠏捕鼠淮南子山中稱無腸公子者蠏也抱朴子史解系免官還第及張華裴頠之被誅也倫秀以宿憾收系兄弟梁}
