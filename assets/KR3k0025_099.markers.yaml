  - {type: variant, offset: 1445, length: 0, content: '', krp: 令送與葛陂君鬼持符去至陂邊以頸繞株而死神仙傳昔有人與奴俱得心腹病奴死割腹視之得一白鼈以諸藥内鼈口中終}
