  - {type: variant, offset: 1041, length: 1, content: 才, WYG: 醤廣志彭蠡之濵以魚食犬城門失火禍及池中魚俗說池中魚人姓字居近城門城失火延及其家非也謹按百家書宋城門失火因汲池中水以沃之魚悉露死喻惡之滋并中傷重謹也論衡集彼尋常之汙瀆兮何以容吞舟之魚横江湖之鱣鯨兮固將制夫螻螘賈誼沛乎如巨魚之縱大壑王褒北溟有巨魚身長數千里仰噴三山雪横吞百川水憑陵隨海運烜赫因風起吾觀摩天飛九萬方未已魯國一杯水難容横海鱗李白潛鱗輸駭浪紫鱗衝岸躍水深魚極樂潜波想巨魚白魚如切玉泉出巨魚長比人丹砂作尾黄金鱗白小群分命天然二寸魚細微沾水族風俗當園蔬魚知丙穴由來美杜詩輕浪參差魚動鏡羣鱗沸池羹沈細抽潛腥韓詩澗急驚鱗奔沉景照文鱗每憶纎鱗逰尺澤栁詩香餌見來湏閉口大江歸去好藏身盤渦峻激多傾覆莫學長鯨擬害人白居易本朝火鬐錦鬛鱗雪霜紅眼照曜珠夜光若無鯤鮞與蝦蚪安見品格非尋常劉貢父秋水澄清見髪毛錦鱗行處水紋搖岸邊人影驚還去時向緑荷深處跳溪鱗佳味自可愛何異鱣魴争尺水巨魚先已化風雷六一集江水深成窟潛魚大似犀赤鱗如琥珀老枕勝琉璃三年京國厭藜蒿長羡淮魚壓楚糟東坡偶思煖老庖𤣥鯽公遣霜鱗貫栁來山谷寧容網目漏吞舟誰能烹鮮作苛碎后山河豚傳記河豚有毒以盧根及橄㰖等解之肝有大毒又名䂓魚䂓魚吹肚魚也本草本朝河之魚有豚其名者遊於橋間而觸其柱怒其柱之觸已也則張頰植鬛怒腹而浮於水飛鳶過而攫之磔其腹而食之因逰而觸物}
