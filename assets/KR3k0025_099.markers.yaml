  - {type: variant, offset: 1525, length: 258, content: 全西漢司馬遷傳固傷遷博物洽聞然亦身陷大戮此古人所以致論於目睫也東漢班固傳論戒人之禍智矣而不能自免於讒隙東漢馬援傳論王晏從弟思遠謂晏曰凡人多拙於自謀通監齊高祖紀工於料人拙於謀己唐書李光弼贊唐太宗曰人苦不自知耳通監本紀劉蕡戒帝漏言而身誦語于庭新唐書本贊傳記家有敝帚享之千金斯不自見之患也魏文帝典論互入不自覺常人闇於自見謂己為賢同上集李赤善為歌詩類李白名聞江湖間其始為士無以異於人一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取與向背決不為赤者幾何人耶反脩而身無以慾利好惡遷其神而不返則幸耳, WYG: 處}
