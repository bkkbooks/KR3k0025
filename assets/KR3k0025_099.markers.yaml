  - {type: variant, offset: 1395, length: 0, content: '', WYG: 千載靈龜人言浮於蓮葉之上或在叢蓍之下山中已日稱時君者龜也郄儉少時行獵墮空冢中見大龜張口吞氣乃試隨龜所為遂不復饑抱朴子史禇先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜各有文在腹下有神龜在江南嘉林中常巢於芳蓮之上南方老人用龜支牀足行二千歲老人死後移牀龜尚生能行氣導引史記永嘉元年有玉龜出於灞水苻堅末高陸人穿井得龜大三尺堅命太卜池養之及死藏其骨於太廟是夜廟丞高虜夢龜曰我本出將歸江南遭時不遇殞命秦庭又有人夢於虜曰龜三千六百嵗終必妖興亡國之象也晉書永明間唐潜獻青毛神龜一頭南齊書武帝章皇后母嘗遇道士以小龜遺已光彩五色及朞后生紫光照室因失龜所在陳書開皇中掖廷毎夜有人來挑宫人宫人抽刀斫之其物落牀而走因入池而沒明日涸池得一龜其上有刀迹殺之遂絶隋書先天二年江州獻靈龜六眸腹下有𤣥文象卦文唐書傳記龜三足賁龜俯者靈仰者繹前弇諸果後弇諸獵左倪不靁右倪不若一曰神龜二曰靈龜三曰攝龜四曰寳龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜爾雅甲蟲三百六十而神龜為之長大戴禮龜一名𤣥衣督郵一名元緒古今注龜百嵗一尾千嵗則十尾六韜靈龜五色似玉背隂向陽上隆象天下平法地轉運應四時蛇頭龍脰左睛象日右睛象月知存亡吉凶之變說苑龜三百嵗大如錢遊蓮葉上三千歲則青邊有距論衡靈蓍四十九莖下有千歲神龜守之京房易傳龜厭江海陸行不止自令枯藁失其都市焦贑易林天子龜尺二寸諸侯八寸}
