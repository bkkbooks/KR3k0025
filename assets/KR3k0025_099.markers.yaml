  - {type: variant, offset: 1400, length: 3, content: 以強越, WYG: 乘驢易之放黿於水徒歩而歸唐史傳記黿似鼈而大說文黿為河伯使者古今注齊景公渡河黿銜左驂沒之古冶子㧞劍從斜行五里逆三里至于砥柱之下左手持黿頭右手挾左驂鷰躍鵠踊而出捜神記范獻子獵占之曰君子得黿小人遺冠獻子獵}
