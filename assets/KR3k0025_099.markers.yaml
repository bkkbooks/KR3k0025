  - {type: variant, offset: 178, length: 1, content: 同, WYG: 産不賀龍降夏庭沬流不禁卜蔵其沫至周幽王禍釁乃發證據舊典無賀龍之禮陸機甞餉張華鮓華曰此龍肉也試以苦酒濯之必有異既而五色光起雷渙之子渡延平津腰間劍躍入水化為龍晉書劉穆之嘗夢與高祖俱泛海俯視船下見有二白龍挾舡既而至一山峯崿聳秀林樹繁宻意甚悅之沈約宋書梁江陵城壕中有龍騰出煥爛五色竦躍入雲南史大象中榮州有黒龍見與赤龍鬬於汴水之側黒龍死禇無量好學臨平湖中有龍鬬里閭就觀之無量時年十三讀書宴然不動唐書太和二年五龍㑹於宻州次第而至五方之色具焉後周書傳記鱗蟲三百六十而龍為之長大戴禮有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍龍未昇天曰蟠龍說文太皥有景龍之瑞故以龍紀官黄帝采首山銅鑄鼎荆山下有龍垂胡髯下迎黄帝帝王世紀禹南濟江黄龍負舟禹笑曰吾受命於天竭力以養人柰何憂于龍龍弭首而逝吕氏春秋禹誅防風氏二龍降之禹使范氏御之以行括地圖昔夏后啓夢乘龍飛以登于天睪陶占之曰吉歸蔵明夷卦吳王欲從民飲酒伍子胥諌曰昔白龍下清冷之淵化為魚漁者豫且射中其目白龍}
