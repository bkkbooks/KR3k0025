  - {type: variant, offset: 1405, length: 2, content: 知所, WYG: 得遺其豹冠璅語集乗白黿兮逐文魚楚辭鼉經鼉鼔逢逢詩季秋取鼉禮史孫亮初公安有白鼉鳴謠曰鼉鳴龜背平南郡城中可求生守死不去來無成明年諸葛恪敗弟融鎮公安被收刮金印龜背一服而死吳志傳記鼉水蟲從龜單聲說文鼉魚長三尺有四足髙尺餘尾如蝘蜓而大方嫁娶必得食之廣志張福行船夜有女子乘小舟就福􅆍中夜月照乃見一白鼉枕福臂福驚起而鼉去搜神記廣陵王家女病邪召竺僧瑤治之瑶入門便大驚老魅敢干犯人女在内大喚云人殺我夫鬼在側曰吾命盡於今可為痛心於是化為老鼉走出中庭瑶撲殺之許氏志怪鼈經離為鼈易炰鼈膾鯉詩鼈人秋獻鼈蜃周禮子東海之鼈莊子跬歩不休跛鼈千里荀子鄭縣人卜子毒妻之市買鼈}
