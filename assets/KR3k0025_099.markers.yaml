  - {type: variant, offset: 4319, length: 713, content: 將主之暴橫為患故重胤論之其後河北諸鎮惟橫海最為順命由重胤處之得宜故也通監唐憲宗盧坦為宣歙觀察使到日值旱饑穀價日增或請抑其價坦曰宣歙土狹穀少所仰四方之來者若價賤則商船不復來益困矣既而米斗二百商旅輻湊民賴以生上欲用王承宗為成德留後割其德棣二州更為一鎮以離其勢并使承宗輸二稅請官吏一如李師道李絳等對曰願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聽命於理固順若其不聽體亦無損上乃遣京兆少尹裴武詣真定慰承宗受詔甚恭曰三軍見逼不暇俟朝旨請獻德棣二州以明懇款並同上先是朝廷遣中使賜朱克融時服克融以為踈惡執留敕使又奏當道今歲將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宮闕上患之以問宰相欲遣重臣宣慰仍索敕使裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲治之已令處分其將士春衣從來非朝廷徵發皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助脩宮闕皆是虛語若欲直挫其姦宜云丁匠速來彼必蒼黃失圖若且示含容則云脩宮闕事在有司不假丁匠遠來如是而已不足勞聖慮也通鑑唐敬宗紀吳同乎章事徐知訓驕倨淫暴威武節度使知撫州李德誠有家妓數十知訓求之德誠遣使謝曰家所有皆長年或有子不足以侍貴人當更為公求少而美者通監後梁均王曹彬使於吳越事畢亟返不受饋遺吳越人以輕舟追與之至於數四彬曰吾終不受是竊名盡籍其數歸而獻之帝曰向之奉使乞匄無厭使四方輕朝命卿能如是甚善然彼以與卿卿自取之彬始拜受悉以散於親識家無留者通監周世宗集無侈前人無廢後觀唐文粹尊己者敬之如臣事君下己者慈之如母蓄子敵己者友之如兄弟無不得其志也柳, WYG: 說}
