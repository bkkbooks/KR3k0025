  - {type: variant, offset: 180, length: 1, content: 范, WYG: 訴天帝天帝曰魚固人之所射也豫且何罪夫白龍天地貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣說苑葉公好龍室屋彫文盡以為龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之逺而還走是葉公非好龍也好夫似龍而非真者也劉向新序宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯢豈能料江海之大哉先賢傳漢和帝元年有一青龍墮於宫中帝命烹之賜群臣龍羮各一杯故李尤七命曰味兼龍炙述異記陶侃嘗捕魚得一織梭還挂於壁有頃雷雨梭變成赤龍而去異苑世言乘龍苦於行雨而雷神捕之洛中有祠穴曽有誤墜其中行數里漸明見有宫殿人物又有大羊羊髯有珠人取食之後出以問張華華曰大羊名曰癡龍北瑣孫思邈隠居終南山時大旱西域僧請於昆明池結壇祈雨凡七日縮水數尺池龍化為老人求救于思邈思邈謂曰我知昆明池有仙方三十首留傳與予予將救汝老人曰此方上帝不許妄傳今急矣固無所吝有頃捧方而至思邈曰爾第還無慮自是池水忽漲溢岸數日胡僧羞恚而死雜爼集龍嘘氣成雲雲固弗靈於龍也然龍乘是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣韓文扶風馬孺子言年十五時在澤州與羣兒戯郊亭上頃然有竒女墮地有光􅋫然被緅裘白紋之裏首歩搖之冠貴游少年駭且悅之稍狎焉女頩爾怒曰不可吾故居鈞天帝宫下上星辰呼嘘隂陽薄蓬萊羞崑崙而不即者帝以吾心侈大怒而謫來七日當復今吾雖辱塵土中非若儷也吾復且害若衆恐而退遂入居佛寺講室焉及期進取杯水飲之嘘成雲氣五色翛翛也因取裘反之化為白龍徊翔登天莫知其所終栁文本朝神物生天擾可騎如何孔甲但能羈當時若更無劉累龍意茫然豈得知山腰石有千年澗石眼泉無一日乾天下蒼生待霖雨不知龍在此中蟠王介甫魚經包有魚无咎不利賔包无魚起凶豚魚吉信及豚魚也易淮夷蠙珠暨魚書魴魚赬尾豈其食魚必河之魴豈其食魚必河之鯉魚麗于罶南有嘉魚魚在于渚或潛在淵魚在于沼亦匪克樂魚在在藻有頒其首有莘其尾依于其蒲魚躍于淵王在靈沼於牣魚躍猗與漆沮潜有多魚有鱣有鮪鰷鱨鰋鯉詩􅘋人辨魚物為鱻薧周禮槀魚曰商祭鮮魚曰脡祭孟春魚上氷獺祭魚季春薦鮪于􅆍廟羞濡魚者進尾冬右腴夏右鰭禮記公將如棠觀魚臧僖伯諌公曰吾将畧地焉遂往陳魚而觀之劉子曰微禹吾其魚乎左傳子昔者有饋生魚於鄭子産子産使校人畜之池校人烹之反命曰始舍之圉圉焉少則洋洋焉攸然而逝子産曰得其所哉孟子魚不可脫於淵老子川廣者魚大文子八􅀈之北有溟海有魚焉其廣數千里其長稱焉列子泉涸魚相與處於陸相呴以濕相濡以沬不如相忘於江湖惠子與莊子遊于濠梁之上莊子曰鯈魚出遊從容是魚之樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂吞舟之魚蕩而失水則螻蟻能苦之筌者所以在魚得魚而忘筌也莊子見車轍中有鮒魚鮒魚曰我東海之波臣也君豈有升斗之水而活我哉莊子曰待我激西江之水而逆子鮒魚曰不如早索我於枯魚之肆莊子公儀休相魯而嗜魚一邦皆争買魚而}
