  - {type: variant, offset: 1208, length: 1, content: 城, WYG: 鰝大蝦也爾雅蝦種多􅀈最大中作脯異物志南海以蝦頭為杯鬚長數尺金銀鏤之南越志馬稜為廣陵太守蝗蟲飛入海化為魚蝦東觀記虞嘯父為孝武侍中帝曰卿在閣下初不聞有獻替對曰天時尚煖魚鼈蝦蚱未可致尋有所獻帝大笑世說水母傳記東海有物状如凝血名曰水母無頭目所處則衆蝦附之博物志水母如羊胃可生切食廣志廣州謂之水母閩人謂之蛇其形乃渾然凝結一物有淡紫色者腹下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮泛水上捕者或遇之即歘然而沒盖蝦有所見耳嶺表録異龜經舍爾靈龜觀我朶頥凶或益之十朋之龜天生神物聖人則之離為龜易昆命于元龜九江納錫大龜寧王遺我大寳龜書爰契我龜我龜既厭詩鼈人秋獻龜魚龜人掌六龜之属天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁属南龜曰獵屬}
