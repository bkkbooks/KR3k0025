  - {type: variant, offset: 444, length: 479, content: 匪榮伊辱是以不敢通監漢殤紀楊賜陳耽每拜公卿群僚畢賀輒嘆陳寔大位未登愧於先之通監漢靈紀陳蕃為三公臨朝歎曰叔度若在吾不敢先佩印綬矣東漢黃憲傳費禕曰吾等不如丞相才知遠矣丞相猶不能定中夏況吾等乎不如且保國治民謹守社稷如其功業以俟能者無為希冀徼倖通監魏高貴卿公紀董允代費禕為尚書令旬日之間事多停滯允歎曰人材力相懸若此非吾所及蜀志本傳互入心服徐邈拜司空歎曰三公論道之官無其人則缺豈可以老病荒一作忝之哉固辭不受魏志本傳互入恬退晉沙汰郎官魏舒曰吾即其人也襆被而出同僚咸有愧色晉書本傳石勒曰人豈不自知若遇漢高祖當北面事之與韓彭比肩通監晉書王導初拜司徒謂人曰劉子喬若過江我不得拜公也晉書劉隗傳隗子疇字子喬周嵩曰嵩性抗直不容於世晉書王濟俊爽有風姿每見玠輒歎曰珠玉在側覺我形穢晉書衛玠傳淮南袁甫嘗詣何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能晉書本傳蔡謨遷司徒上疏固讓謂所親曰我若為司徒將為後代所哂義不敢拜也陸玩遷司空謂賓客曰以我為三公是天下為無人並同上魏元順曰刀筆小才堪供几案之用豈應汙辱門下通監梁紀岑文本拜中書令有憂色母問之荅曰非勳非舊責重位高所以憂也有來慶者輒, WYG: ''}
