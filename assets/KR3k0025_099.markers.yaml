  - {type: variant, offset: 174, length: 2, content: 厚誣, WYG: 北墨子曰帝以甲乙殺青龍於東方丙丁殺赤龍於南方庚辛殺白龍於西方壬癸殺黒龍於北方若用子言則禁天下之行也墨子龍合而成體散而成章乘乎雲氣養乎隂陽朱泙漫學屠龍於支離益殫千金之家三年伎成而無所用其巧也河上有家貧恃緯蕭而食者其子沒淵得千金之珠其父曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也莊子夫龍可狎而騎也然㗋下有逆鱗徑尺若嬰之則殺人韓子龍舉而景雲属人不見龍之飛舉而能高者風雨之奉也淮南子山中辰日稱雨師者龍也抱朴子史黄帝得土徳黄龍見夏得木徳青龍止於郊夏后氏之衰有二神龍止於帝庭而言曰余褒之二}
