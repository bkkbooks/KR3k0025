  - {type: variant, offset: 1043, length: 5, content: 及巡請稟軍, WYG: 知罪已妄肆其忿至於磔腹而死悲夫東坡集歐公謂河豚出於暮春食栁絮而肥殆不然今浙人食河豚於上元前江隂冣先得方出時一尾直千錢二月後一尾纔百錢耳栁絮時人已不食謂之班子或言腹中生蟲故惡之石林詩話東坡詩云竹外桃花三兩枝春江水煖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時此正是二月景致是時河豚已盛矣欲上之語似乎未穏漁隠叢話經筵官㑹資善堂東坡盛稱河豚之美吕元明問其味曰直那一死聞見録河豚盛氣善怒毎伏水底必設網于上故以物就而觸之彼將奮怒而上遂為所獲吳人目其腹腴為西施乳藝苑雌黄春洲生荻芽春岸飛楊花河豚當是時實不數魚蝦東坡忿腹若封豕怒目猶吳蛙庖煎茍失所入喉為鏌鎁梅聖俞非鱗亦非介芒刺皮如蝟觀形固可憎况復論腸胃曽南豐烏賊傳記世謂烏賊懐墨而知禮故俗云是海若用}
