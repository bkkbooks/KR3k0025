  - {type: variant, offset: 177, length: 0, content: '', WYG: 也夏帝卜殺之徙去之留之莫吉卜請其漦而蔵之吉史記惠帝二年丙龍見蘭陵人家井中文帝十五年黄龍見成紀漢書葛陂竹杖化龍見竹類龍見武庫井中百官將賀劉毅獨曰昔龍降鄭時門之外}
