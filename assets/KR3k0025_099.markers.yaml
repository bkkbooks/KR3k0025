  - {type: variant, offset: 1446, length: 0, content: '', krp: 死後有乘白馬來者馬溺濺鼈縮頭藏脚乃試取馬溺灌之豁然消成水主者頓飲一升遂愈志怪集方銜鈎以振掉吁駭人而}
  - {type: variant, offset: 1447, length: 1, content: 滅, WYG: 惡既顛墜於岩岸乃蹣跚而跬歩或延首以鶴顧或頓足而鷹距或曳尾于泥中或縮頭于殻裏潘尼賦螺經離為蠃易鼈人祭祀供􅀢蠃蚳周禮傳記海文蠡數種其大者容一升南人以為酒杯廣志馬軻蠃大者圍九寸長四寸細者圍七寸長三寸南方說鸚螺狀如覆杯頭如鳥頭向其腹視似鸚鵡故以名吒螺著海邊樹上見人吒如人聲可食蒼螺江東人以為椀假猪螺日南有之靨為甲香異物志謝端少孤得一大螺置瓮中每早至野還見有飲飯湯火端從籬外窺之見一少女從瓮中出燃火便入問之女答曰我天漢中白水素女天帝使我為守舍炊煮今無故相伺不宜留此忽有風雨而去搜神記蚌蜃附經離為蚌易孟冬雉入大水化為蜃禮子楚之明月出於蚌蜃墨子明月之珠蜃龍之病而我之利淮南子史元將仲將不意雙珠近出老蚌魏志太宗謂侍臣曰蜃性含水待月而水生唐書傳記蜃小者䖴注云䖴即小蚌爾雅齊趙將伐燕蘇代說趙王曰今者臣來見小蚌方出暴而鷸啄其肉蚌合而挾其啄鷸曰今日不雨明日不雨必見蚌脯蚌曰今日不出明日不出必見死鷸漁父得而併擒之今燕趙相攻臣恐強秦之為漁父}
