  - {type: variant, offset: 929, length: 3, content: 受賀唐, WYG: 盡賣之不售棄之可惜故來獻之左右曰鄙哉辭也楚王曰漁者仁人也盖聞廩倉粟有餘者國有饑民後宫多幽女者下民多曠夫餘衍之蓄聚於府庫者境内多貧乏之民漁者知之其以喻寡人也於是乃遣使恤鰥寡楚國頼之新序葛𤣥見賣大魚者謂曰暫煩此魚到河伯處魚主曰魚已死𤣥曰無苦乃以丹}
