  - {type: variant, offset: 1784, length: 2450, content: 何暇赤之笑哉柳李赤傳互入此莫笑彼種知吳之可以取知越之可以彊而不知身之進退存亡李元賓集秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也杜牧之青銅不自見只擬老他人羅隱集笑前人之未工忘己事之己拙史通本朝高宗責義琰為宰相而陵其母家然己以讒殺元舅無忌而不自知其惡何以責臣下之薄於母黨范祖禹唐監經長者賜少者賤者不敢辭記曲禮上諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯記王制士於大夫不承賀士有慶事不聽大夫親來賀己不敢變動尊也記玉藻賤不誄貴幼不誄長記曾子問族人不得以其戚戚君位也記大傳不在其位不謀其政語泰伯君子思不出其位語憲問子齊景公田招虞人以旌不至孟萬章下庖人雖不治庖尸祝不越樽俎而代之矣莊史齊侯欲使敬仲為卿辭曰羈旅之臣幸若獲宥所獲多矣敢辱高位以速官謗左莊二十二年卿非君命不越境左莊二十七年王以上卿之禮享管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭受下卿之禮而還左僖十二年衛甯武子曰陪臣來繼舊好其敢干大禮以自取戾左文四年鬷戾曰我家臣也不敢知國左昭二十五年冠雖敝必加於首履雖新必關於足上下之分也史儒林傳互入名分人主之尊譬如堂群臣如陛眾庶如地故陛九級上廉遠地則堂高陛無級廉近地則堂卑通監漢文紀等級分明而天子加焉故其尊不可及也同上衛青曰臣雖當斬將以臣之尊寵而不敢自擅誅於境內而具歸天子自裁之於以見為人臣不敢專權不亦可乎通監漢武紀尊尊卑卑強幹弱枝也通監漢和紀李愬入蔡州翌日裴度至愬具櫜鞬候度馬首唐書經女正位乎內男正位乎外易家人喪服凶器不入宮潛服賊器不入宮奇服怪民不入宮周禮閽人父子不同席記曲禮上父不祭子夫不祭妻禮不下庶人刑不上大夫犬馬不上於堂註非贄幣也外言不入於梱內言不出於梱並同上互入防閑支子不祭祭必告于宗子記曲禮下又喪服小記云庶子不祭禰者明其宗也無田祿者不設祭器袗絺綌不入公門苞屨扱衽厭冠不入公門並同上君子非有大故不宿於外記檀弓上庶羞不踰牲燕衣不踰祭服寢不踰廟記王制有田則祭無田則薦道路男子由右婦人由左並同上由命士以上父子皆異宮記內則男不言內女不言外大夫燕食有膾無脯有脯無膾士不貳羹胾庶人耆老不徒食尊卑差也並同上家不寶龜不藏圭不臺門記禮器歌者在上匏竹在下記郊特牲自仁率祖等而上之至於祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也用恩則父母重而祖輕用義則祖重而父母輕恩重者為之三年義重者為之齊衰記大傳絕族無移服同上父不次於子兄不次於弟記喪大記制國不過千乘都城不過百雉家富不過百乘記坊記父子不同位同上禮義立則貴賤等矣記樂記子持手而食者不得立宗廟荀禮論外屏不欲見外內屏不欲見內也荀大略互入防閑史先王之制大都不過參國之一中五之一小九之一左隱元年在禮家施不及國大夫不收公利左昭二十六年賈人不得衣繡乘車市井之子孫不得仕宦為吏史平准書漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽後漢紀經畔官離次書胤征子位卑而言高罪也孟史欒鍼曰侵官冒也失官慢也離局姦也左成十六年鄭駟秦嬖大夫而常陳卿之車服於其庭左哀三年子絕長補短孟滕文公上井井然有條理荀史親不在外羈不在內左昭十二年蘇秦曰聞客有遠為吏而其妻私於人者其夫將來其私者憂之妻曰吾已作藥酒待之矣夫至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言則恐其殺主父也於是佯僵而棄酒主父怒笞之妾一僵而覆酒上存主父下存主母史本傳互入妾田叔按梁事來還至霸昌廄取火悉燒梁之獄辭空手來見帝帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上母以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味臥不安席此憂在陛下也通監前漢互入深識大體舅后之家但當養育以恩而不當假借以權通監漢文紀有男子乘黃犢車詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀數萬人至者竝莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出犇輒拒而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之廷尉驗治竟得姦詐通監漢昭紀䍐羌豪靡忘使人來言願得還復故地趙充國以聞未報靡忘來自歸充國飲酒遣還護種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘贖論後䍐羌竟不煩兵而下通監漢宣紀郡國群盜處處並起群盜自相糾擿五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討為效牧守令長坐界內有盜賊而不收捕者及其畏懦捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散通監漢光武竇太后崩曹節王甫欲用貴人禮殯廷尉陳球曰皇太后以盛德良家母臨天下宜配先帝是無所疑於是公卿以下皆從球議通監漢靈紀韓彭專征伐蕭曹守管籥內外之任各有攸司通監晉穆紀李泌知胡客留長安久者或四十餘年皆有妻子買田宅檢括胡客有田宅者停其給凡得四千將停其給胡客皆詣政府訴之泌曰此皆從來宰相之過豈有外國朝貢使者留京數十年不聽歸乎今當假道於回紇或有自海道各遣歸國有不願歸者當於鴻臚自陳授以職位給俸祿為唐臣人生當乘時展用豈可終身客死耶於是胡客無一人願歸者泌皆分隸神策兩軍鴻臚所給胡客纔十餘人歲省度支錢五十萬緡市人皆喜通監唐德宗紀淄青李正已畏帝德宗威斷表獻錢三十萬緡以觀朝廷帝意其詐未能荅崔祐甫為相曰正已誠詐不如因遣使勞其軍以所獻就賜將士若正已奉詔是陛下恩洽士卒若不用彼自歛怨軍且亂又使諸藩不以朝廷為重賄帝曰善正已慚服時議者韙其謀謨唐書本傳互入謀畫涇原節度使馬璘疾亟以行軍司馬叚秀實知節度使事付以後事秀實嚴兵以備非常璘薨軍中奔哭者數千人喧咽門屏秀實悉不聽入命押牙馬蝢治喪事於內李漢惠接賓客於外妻妾子孫泣一作位於堂宗族泣於庭將佐泣於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之非護喪從行者無得遠送致祭拜哭皆有儀節送喪近遠皆有定處違者以軍法從事通監唐代宗王承宗李師道謀緩蔡兵乃伏盜京師剌用事大臣已害宰相元衡又擊度議者欲罷度安二鎮反側憲宗怒曰度得全天也若罷之是賊計適行吾倚度足破三賊矣新唐書裴度傳橫海節度使烏重胤奏河朔藩鎮所以能旅拒朝命六十餘年者由諸州縣各置鎮將領事收刺史縣令之權自作威福向使刺史各得行其職則雖有姦雄如安史必, WYG: ''}
