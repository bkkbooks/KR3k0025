  - {type: variant, offset: 183, length: 0, content: '', WYG: 不受曰夫唯嗜魚固不受也韓子水濁則魚噞水積而魚聚使水濁者魚撓之月虧則魚腦減宋君亡其珠池魚為之殫畜池魚者必去猵􅆩争魚者濡淮南子史武王白魚入舟見祥瑞類陳勝吳廣舉大計以丹書帛曰陳勝王置所罾魚腹中使買魚見書漢書羊續為南陽太守府丞嘗獻其生魚續懸之於庭後漢書王延性仁孝繼母卜氏嘗盛冬思生魚延叩凌而哭忽有一魚長五寸躍出冰上延取以進母吳隠之為廣州刺史帳下人進魚每剔去骨隠之罰而黜焉晉書明帝幸華林園天淵池白魚躍入御舟沈約宋書王固嘗}
