  - {type: variant, offset: 1399, length: 0, content: '', WYG: 殊稱搘牀纔堪比瓦礫當粟孰肯捐斗升糝頭腥臊何足嗜曳尾穢汚適可憎盛溲除聾豈必騐蹈背出險安可憑刳腸以占幸無事卷殻而食病未能如聞翕息可視効往乃有墜岸千層仰窺朝陽俯引氣亦得難老如岡陵諒能學此真壽類世論妄以類蟲冰王介甫鼇子渤海之中有五山帝使巨鼇十五舉首而戴之龍伯之人一釣而連六鼇列子東海鼇冠蓬莱㳺滄溟蛭蟻聞而悅之相邀海畔觀鼇群蟻曰彼冠山何異我戴粒逍遥於封壌之巔伏乎窟穴也管子傳記有巨靈之鼇背負蓬萊之山而飛舞戯滄海之中列仙傳巨鼇以背負山周廽千里𤣥中記集鼇戴山抃何以安之楚辭巨鼇贔屭首冠靈山吳都賦積翠浮澹灔始疑負靈鼇栁詩突兀海底鼇首冠三神丘鈎網不能制其來非一秋或者不量力謂兹鼇可求贔屭牽不動綸絶沈其鈎一鼇既頓頷衆鼇齊掉頭噴風激蜚亷鼓浪怒陽侯鯨鯢得其便張口欲吞舟萬里無活鱗百川多倒流白居易本朝方壺蓬萊負巨鼇山谷黿經季秋取黿禮楚人獻黿於鄭靈公公子宋與子家將見子公之食指動曰他日我如此必嘗異味及入宰夫將解黿相視而笑左傳子大黿作魅行病道士戴炳以越章封沉遍擲潭中良乆有大黿浮出乃格殺之而病者愈抱朴子史靈帝時黄氏之母浴而化為黿初浴時簮一銀釵及見猶在其首續漢書韋丹少在東路嘗至中橋見漁者網得大黿繫之橋柱引頸四顧有求救之意於是以}
