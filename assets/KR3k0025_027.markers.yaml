  - {type: variant, offset: 3011, length: 0, content: '', WYG: 三司本曹但受天下之土貢㑹陳于庭而已續㑹要元豐改官制罷三司歸户部左右曹而三司之名始冺矣四朝志户部掌天下人民錢穀之政令貢賦征役之事以版籍考户口之登耗以稅賦待軍國之歲計以土貢辨郡縣之物宜以征𣙜抑兼并而生調度以孝義婚姻繼嗣之道和人心以田務券責之理直民訟凡此歸于左曹以常平之法平豐凶以義倉賑濟之法救飢饉恤艱厄以豐田水務稼穡以教民勸酬勤勞省科歛凡此皆歸之右曹}
