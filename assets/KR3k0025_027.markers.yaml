  - {type: variant, offset: 2408, length: 2, content: 經謀, WYG: 後漢吏部郎中典劇多超遷者同上集銓衡庶品歴選賔僚梁陸倕拜吏部郎表序簿書以别淑慝擇刀筆以決臧否剖疑析滯揮翰如流選部以清繄公是賴席豫揚吏部郎中碑銘參我六典冠於諸曹同上六官之屬選曹郎首之歴代以來選諸曹郎之中其踐履乆考第髙加以有氣局律度者遷焉除李建制本朝元豐官制行置吏部郎中四人尚書選二人侍郎選各一人參掌選事而分治之凡序位有品選官有格分任有軄寓禄有階皆以事稽考審核其狀質成於長貳而後行焉四朝志建炎三年詔三選各一員中興㑹要員外郎史吏部員外郎二人掌文選以三銓之法官天下之才其投試銓注與流内畧同謂之小選唐百官制唐吏部郎中二㕔先小銓次格式員外郎二㕔先南曹次廢置舊説吏部為省眼分紀韋陟字商衡為吏部員外郎是曹在南宫為眉目在選士為司命公執直筆問簿書紛掌盤錯一瞬而剖劉禹錫撰神道碑韓滉遷吏部員外性强直明吏事在南曹五年簿最詳緻唐百官志裴遵度遷吏部員外天寳中九流輻凑㑹府遵度敏識强記精覈時稱吏事第一同上傳記吏部貟外郎掌選院謂之六曹六典劉崇望轉吏部員外郎崔安潜為吏部尚書崇望判南曹滌除夙弊復清選部本傳唐牛徽遷吏部員外郎乾符中選曹猥濫吏為奸弊毎歲選人四千餘人徽直剛時為起清由是銓叙稱正能否旌别物議稱之同上集吏部信才傑文鋒振竒響調與金石諧思逐風雲上沈約悼齊謝朓才盛居東之任禮處司南之重髙選髦士以分劇曹常集鄭叔則吏部員外郎制吏部提英鑑片善蒙采録黄山谷今日君先捧紫泥裴度餞栁公綽詩本朝凡郎官並用知府資序以上人充未及者為員外郎建炎四年詔權攝天差郎官並罷初進擬第云吏部郎官及擬先身細銜始直書尚書吏部郎中或員外郎主管尚書某選主管侍郎某選自此相承不改乾道元年詔今後非曾任監司守臣不除郎官著為令自是舘學寺監臣拘礙資格遷除不行郎曹缺員但得兼攝即外補間有不次推用者則自二著躐升二史以至從列其自外召為郎則資級髙不數月必序進卿少而郎有正員者少矣宋史司封郎中史柳公權為司封員外郎入奏帝曰見卿筆蹟久矣因問用筆法權曰心正則筆正乃可法矣本傳楊凝為司封員外郎直聲彰聞桞文貞觀中韋孝武為主爵郎中與兄弟同省時號三列宿唐史司封郎中掌封命朝㑹錫予之級爵凢九等爵唐官志齊置主爵郎中一人隋曰主爵郎中宋為司封郎中參堂官封叙贈之事凡事之可否與司勲通决于尚書侍郎同上傳記晉文公執叙以正其官註云執叙主爵之官漢尚書有封爵之任而無其官後漢書馮勒字韋伯光武以為郎中給事尚書使典諸候封事勒量功次輕重國土逺近地勢豐薄不相踰越莫不厭伏焉自是封爵之制非勒不定晉尚書有左右主客曹北齊河清中改為主爵置郎中一人屬吏部主封爵之事隋初為主爵侍郎煬帝改為主爵郎武徳初為主爵郎中龍朔二年改為司封大}
