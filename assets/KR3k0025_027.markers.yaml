  - {type: variant, offset: 3092, length: 2, content: 宋使, WYG: 傳記唐太宗問盧承慶歴代户口多少之數承慶叙夏以後迄周隋皆有依據本傳王彦威開成初為户侍判度支彦威于儒該邃亦善吏事但經總財用出入米鹽非所長也唐書潘孟陽權知户部侍郎詔馳驛江淮視財賦孟陽恃氣豪倨所至招金錢多補吏譽望大䘮同上李元絃歴工兵吏三侍郎上令宰臣及公卿以下精擇堪為户部者多有薦元絃者乃拜户部侍郎元絃因條奏人間利害及時議得失以奏之上大悦因賜衣一副本傳桞約字元禮權户部侍郎感激奮勵悉力盡言凡利病皆執奏以進周益公集集昔年内署振雄辭今日東都結去思宫女猶傳洞簫賦國人先録衮衣詩劉禹錫送李户部}
