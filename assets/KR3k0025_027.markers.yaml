  - {type: variant, offset: 3478, length: 0, content: '', krp: 以歲之上下數邦國以知足否以詔國用以昭年之凶豐周禮史孟簡為倉部郎王叔文為户部侍郎簡為其屬中立正色凝然不附唐書魏晋而下皆有倉部郎中梁陳為侍郎宋齊以度支尚書領之後魏有太倉尚書後周有司倉下大夫隋初制倉部侍郎煬帝止曰倉部郎唐武徳三年加中字龍朔二年改司庾大夫咸亨復天寳為司儲郎中至徳復傳記唐畢諴為倉部郎中事要家勢人以倉駕二曹為辱諴沛然如處美官無言宰相知之遷職方郎中兼侍御史職林掌天下儲庫出納租税禄糧倉廪之事六典集出納必恡有司之常貳上下之價則茫昧者受敝雜苦良之}
