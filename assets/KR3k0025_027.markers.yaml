  - {type: variant, offset: 2999, length: 2, content: 視秦, WYG: 獲安處賑恤困窮不致流移為撫養之最通善最分三等五事為上二事為中餘為下若能否尤著則别為優劣以詔黜陟宋史户部經惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國周禮史漢置尚書郎四}
