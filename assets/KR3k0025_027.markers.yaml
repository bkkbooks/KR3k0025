  - {type: variant, offset: 3002, length: 8, content: 肥瘠忽然不加喜戚, WYG: 其一人主財帛委輸至魏文帝置度支尚書等專掌軍國支計而晉有度支皆主筭也宋齊度支尚書領度支金部倉部起部四曹度支統度支倉部左户右户金部庫部六曹後周置大司徒一人如周禮之制隋初有度支尚書則並後周民部之軄開皇三年改度支為民部職官志傳記顯慶元年改户部為度支龍朔二年改度支尚書為司元太常伯咸亨元年復為户部尚書初户部居禮部之後武后改置天地四時之官以户部為地官自是遂居禮部前神龍元年復置地官總判户部度支金部倉部事通典集掌司徒之邦教制民曹之地征總事帥屬居其要㑹幹時通才始可典領常集制翼翼版圗以辨九州之地英英㑹府實總萬事之機長編尚書統庶書官人承法憲應瑒雜詩本朝户部判官事一人以兩制以上充凡户口田産錢榖食貨之政令皆歸}
