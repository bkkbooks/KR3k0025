  - {type: variant, offset: 2377, length: 1, content: 若, WYG: 隋煬帝三年始置以二尚書之職六品以下銓補多歸之通典唐武徳初因隋舊制吏部尚書掌六品七品選侍郎銓掌八品九品選㑹要李至逺知郎中時有選人姓刁又有王元忠並被放乃宻與令史相知减其㸃畫刁改為丁王改為士議授官後即添成文字至逺一覧便曰今年銓覆萬人總職姓名安有丁士姓者此必刁某也省内以為神明後擢侍郎㑹要唐選部流内六品以下官是為銓衡之任凡初仕進者無不仰屬通典李至逺知選吏肅然歛手時人號曰李下無蹊通典温彦博遷檢校吏部侍郎彦愽欲汰擇士類寡行不能厭衆訟牒盈庭時議煩譏本傳韋𢎞景累遷吏部侍郎銓總平允貴幸憚其嚴不敢私謁本傳集辯論官材澄汰流品栁公綽吏侍制用解樞機之務必居衡鏡之職唐詔令韋貫之吏侍制掌銓衡之品藻宜叙九流楊億代表持衡留藻鑑聽履上星辰杜甫南宫吾故人白馬金盤陀雄筆用千古見賢心靡他杜甫寄吏部賈侍郎吏部古之天官而侍郎小宰之職堯制俞天官四銓總覈人物澄清流品除孫覺制本朝選人屬流内銓小使臣屬三班院元豐官制行以流内銓歸吏部侍郎左選續㑹要初置二員蘇頌左選李承之右選夫以天官之貳制夏卿之選部書煩重條格紛委茍非其人則士之失職而無告者多矣東坡集吏部掌典選舉至於所屬之官有行封爵議勲庸稽功課之事咸以咨焉侍郎實貳其長可不重哉南豐擬制吏部郎中史山濤舉阮咸為吏部郎中曰清直寡欲萬物不能移也世說顧憲之為吏部郎中其祖凱之嘗為吏部于庭中植嘉樹曰吾為憲之植耳後果為此職宋書宋張績遷吏部郎裴子野曰張吏部有喉舌之任已恨其晩}
