  - {type: variant, offset: 2415, length: 0, content: '', WYG: 優主爵之名胡文恭制阮咸貞潔屢薦未登陸亮忠心裁居殿職自非季重清識李毅恬正則何以區分管庫式鍳胥吏同上本朝司封判司事一人以無軄事朝官充凡封爵之制一出於中書本司但掌定諡先期解本部赴集而已元豐官制行郎中員外郎始實行本司事初除王祖道為司封郎中參掌官封叙贈之事凡宗室賜官授官親王内外命婦以下封爵諸親保任其宗屬陞朝官褒贈其要皆例焉續㑹要司勲郎中史周官有司勲上士二人凡有功者司勲詔之後周夏官有司勲一人掌功勲之賞隋文帝置司勲侍郎煬帝改為司勲郎武徳初為司勲郎中龍朔元年改為司勲大夫咸亨二年復故掌邦國官人之勲級凡勲有十二等十二轉有功之人合授勲官者皆委之覆定然後奏擬六典傳記張九齡遷司勲員外郎張說謂人曰後来詞人稱首本傳張循憲薦張加正奏對偘偘武后恱擢循憲司勲郎中酬其得人時人謂功狀盈几郎吏}
