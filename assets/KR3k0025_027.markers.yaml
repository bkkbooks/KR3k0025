markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷二十七宋潘自牧撰職官部吏部經惟玉建國辨方正位體國經野設官分職以為民極乃立天官冢宰使率其屬而掌邦治以佐王均邦國周禮治官之屬大宰卿一人並周禮夏書曰賦納以言明試以功車服以庸書史漢初置尚書有常侍曹主公卿}
