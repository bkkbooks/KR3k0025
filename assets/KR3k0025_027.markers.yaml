  - {type: variant, offset: 3436, length: 5, content: 得衣雖慈父, WYG: 通知老吏為之歛手中興係年録參掌計度天下之經費以貢賦租税之入而為之出小事則擬畫大事則諮其長神宗正史職官志財物多寡之數物生豐約之宜司徒之曹典貳為重南豐除陳向制金部郎中經掌凡金玉錫石丹青之戒令周禮史魏尚書有金部郎歴代多有之北齊金部主裁量尺度内外諸庫藏文帳隋祖孝徴薦盧昌衡為尚書金部郎毎謂人曰吾用盧子均為尚書郎真無愧幽明矣隋初為金部侍郎煬帝除侍郎唐武徳中加中字龍朔二年改金部為司珍大夫咸亨初復舊掌庫藏金寳貨物權度尺量等事自開元三年置鑄錢使皆以他官為之通志傳記漢置尚書郎四人其一主財帛委輸蓋金部郎曹之任也職林建中初罷鹽鐵等天下錢穀委金部倉郎中書門下揀兩司郎官准格式調掌蕭頴士終于揚州功曹子存為金部郎中有直諒功曹之風唐書魏晉宋齊後魏北齊並有金部郎梁陳隋為侍郎煬帝但曰郎唐因之武徳三年加中字六典龍朔中為司珍大夫唐職林咸亨復天寳改司金郎中至徳初復舊六典集大寳曰位夏陳納貢之書聚人曰財漢有藏錢之府莫}
