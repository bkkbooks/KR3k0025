  - {type: punctuation, offset: 3522, content: 《, id: KR3k0025_CHANT_027-bkkpn1042}
  - {type: variant, offset: 3522, length: 348, content: 漢獻紀桑落瓦解其勢可見東漢馬融傳桓玄僣位劉裕劉毅何無忌等共謀興復玄駭入蜀費恬毛祐之擊玄被箭子昇輒拔去之益州都護馮遷抽刀而前玄曰是何人邪敢殺天子遷曰殺天子賊耳遂斬之昇曰我是豫章王諸君勿見殺至江陵斬之晉書柏玄傳竇建德戰數不利中槊楊武威追之建德墜馬曰勿殺我我夏王也武威擒之通監唐高祖紀傳記奉漏甕沃燋釜戰國策窮猿奔林豈暇擇木世說上奔逃之士不避斧鉞王逸正部陳思王曰寒者不貪尺玉而思短褐飢者不願千金而美一食物時有所急也後魏賈思勰齊民要術互見舉重明輕伍員之託漁舟季布之入廣柳顏氏家訓集魚以泉涸而煦沬鳥因將死而鳴哀劉孝標論療飢不期於鼎食拯溺無待於規行選策文爨鑊之魚期於消爛選檄喪精亡魄失歸亡趣東京賦互見恐懼胡危命在破竹中杜工部詩衣食闕少家雖嚴父慈母不能制其子白傳集獸窮摶人鹿急走隘杜牧之魚窮爨鼎蟻懼搜穴司空表聖文, WYG: ''}
