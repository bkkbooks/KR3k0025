  - {type: variant, offset: 3012, length: 14, content: 心韓文子鳥窮則啄獸窮則摶家語, WYG: 屬有三曰度支上供俸賜及邦國經度㑹計之事𨽻焉曰金部貨賄出納之制及權衡度量之令𨽻焉曰倉部凡國之倉廪儲積及給受之事𨽻焉舊三司使即今尚書舊三司副使即今侍郎其權發遣副使即今權侍郎舊三司判官推官即今郎中員外郎之任也續㑹要户部尚書經大司徒之職掌建邦土地之圖與其}
