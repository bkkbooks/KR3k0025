  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷二十七宋潘自牧撰職官部吏部經惟玉建國辨方正位體國經野設官分職以為民極乃立天官冢宰使率其屬而掌邦治以佐王均邦國周禮治官之屬大宰卿一人並周禮夏書曰賦納以言明試以功車服以庸書史漢初置尚書有常侍曹主公卿}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 後漢改為吏曹主選舉祠祀後又}
  - {type: variant, offset: 1, length: 0, content: '', krp: 後漢改為吏曹主選舉祠祀後又}
  - {type: variant, offset: 2, length: 2, content: 反報, WYG: 選部宋武帝大明二年分吏部尚書置二人通鑑唐自貞觀以前尚書掌五品選事至景雲元年宋璟為尚書始通其選而分掌之因為常例開元以前諸司之官兼知政事自開元以來宰相多兼領兵部事通志傳記漢成帝置列曹尚書四人其一曰常侍曹靈帝改吏部為選部魏改選部為吏部通典後周依周六官置大冢宰卿隋復曰吏部唐改選部龍朔間改為司列咸亨初復舊光宅改吏部為天官神龍初復舊天寳初改為文部至徳初復舊掌文官選舉總判吏部司勲司封考功四曹事六典集胷中無氷鑑敢當吏部銓山谷東西兩漢左雄孤絶於前南北二晉山濤莫續于後沈約表性藏於貌才隠於心楚越無以况其逈殊山川未足方其險阻同上漢置天曹魏仍東掾毛孝光以清公見美盧子若以貞固任職張纉表本朝吏部掌文武官吏選試擬註資任遷叙䕃補考課之政令封爵䇿勲賞罰殿最之法本部長貳及所𨽻郎官其屬有曰司封曰司勲曰考功凡官十有三尚書一人侍郎一人郎中員外郎尚書選二人侍郎選各一人司封司勲考功各一人通志吏部尚書}
  - {type: page-break, offset: 2, content: '', id: KR3k0025_WYG_027-2a, image: WYG0930/WYG0930-0604a.png}
  - {type: page-break, offset: 2, content: '', id: KR3k0025_WYG_027-2b, image: WYG0930/WYG0930-0604b.png}
