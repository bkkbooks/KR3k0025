  - {type: variant, offset: 2379, length: 1, content: 舟, WYG: 上齊庾果之司空劉勔寄之稍遷吏部郎中叅選大事齊書阮放為吏部郎銓掌之任甚有稱譽本傳王僧綽為吏部郎叅掌大選究識流品諳悉人物抜才舉能咸得其分同上傳記唐吏部郎中有二人龍朔二年改為司列大夫咸亨光宅神龍改復六典一人掌考天下文吏之班秩品命一人掌小選未入仕}
