  - {type: variant, offset: 153, length: 6, content: 支解吳起刻削, WYG: 奉行其制命四朝志天官冢宰之崇文昌選部之重牋表類天官之任人物所宗以撥煩治劇之才行激濁揚清之政同上合左右之聨歸簿領者凡六十案舉文武之士在考覈者逾二萬員李清臣謝表射䇿之初既無失于正鵠掄材之際必有適于輪轅同上當垂拱之朝實資共理奉持衡之職必在至公並同上鍾士季曰裴楷清通王戎簡要樂彦輔雍容自守當時恨其寡譽山巨源意在拔竒不免與世浮沉鄧攸牧馬家庭何益止競之操卞壼如含瓦石未聞檢裁之功江總表昔舜舉禹咎繇}
