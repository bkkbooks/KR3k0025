  - {type: variant, offset: 596, length: 1777, content: 財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戶侯今日富貴至矣乃怖徽云官捕將至令其逃於他所使人於路邀殺之送首於兆兆夢徽謂己曰我有金二百斤馬百匹在寇祖仁家卿可取之兆既覺意所夢為實即掩捕祖仁徵其金馬祖仁謂人密告望風款服云實得金百斤馬五十匹疑其隱匿依夢徵之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首高樹大石墜足捶之至死通監梁高祖王皇后無子蕭淑妃有寵王后疾之陰令武氏長髮勸上內之後宮欲以間淑妃之寵武氏巧慧多權數初入宮卑辭屈體以事后后愛之數稱其美於上未幾大幸通監唐高祖索元禮武后時為推使作鐵籠聲囚首加以楔至腦裂死後以苛猛復受賕收下吏不服吏曰取公鐵籠來元禮乃服罪死獄中唐書周興習法為秋官後有人告興謀反詔來俊臣鞠狀初興未知被告方對俊臣食俊臣曰囚多不服柰何興曰易耳內之大甕熾炭周之何事不承俊臣乃命取甕熾火徐謂曰有詔按君請嘗之興叩頭伏罪唐書元載專橫上欲誅之收載於政事堂賜載自盡於万年縣載請主者頭得快死主者曰相公須受少污辱勿怪乃脫穢韤塞其口而殺之通監唐代宗盜發郭子儀父冢儀見上流涕曰臣久將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也同上誣善者亦反其辜通監唐德宗路岩為相密奏三品以上賜死皆令使者剔取結喉三寸以進驗其必死至是自罹其禍所死之處乃楊收賜死之榻也通監唐懿宗楊行密曰吾好寬而袁襲每勸我以殺此其所以不壽通監唐僖宗傳記好稱人惡者人亦道其惡好憎人者亦為人所憎說苑談叢篇張易之兄弟競為豪侈後被誅百姓臠割其肉時謂走馬報朝野僉載傷賢者殃及三代蔽賢者身當其害黃石三略集韓設辯以徼君呂行詐以賣國說難既道其身乃囚秦貨既貴厥宗亦墜張孟堅賓戲班姬收淚抱妾身我曾排擯無限人元稹集互見知悔本朝盧多遜貶朱崖李符見趙普言朱崖雖海外而水土無他惡春州在內至者必死普頷之後符坐貶宣州上怒未已普具述其事即以知春州到郡而卒談苑寇忠愍之貶時丁晉公馮拯在中書丁當秉筆初欲貶崖州丁忽自疑乃擬雷州丁之貶也馮遂擬崖州當時好事相語曰若見雷州寇司戶人生何處不相逢歐公歸田錄丁謂為相逐李迪時宋綬知制誥請罪名謂曰春秋無將漢法不道及謂貶朱崖宋猶掌制誥即為之詞曰無將之戒深著於曾經不道之誅難逃於漢法天下快之龍州志石介既卒夏竦言於英宗曰介實不死比走胡矣乃出中使發介棺以驗虛實其後夏竦之死吳奎曰夏竦多詐今死矣仁宗至其家命大閹去竦面冪而視之世謂剖棺之與去面冪其為人主之疑一也亦沂謂報應者耶東軒筆錄曹丕當時不自恥敢謂舜禹傳之堯得之以此失亦此誰知三馬同一槽歐公集以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果於殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴東坡文呂布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯呂布見誅於曹公而牢之見殺於桓氏欒城文經同舟而濟則胡越何患乎異心易略例百姓足君孰與不足百姓不足君孰與足語顏淵子下貧則上貧下富則上富荀富國吳越之人同舟濟江中流遇風波其相救如左右手者所患同也孔叢子論勢同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悅者顏不能不笑鄧析子篇史鄭伯謂燭之武曰鄭亡子亦有不利焉左僖三十輔車相依唇亡齒寒其虞號之謂乎左僖五蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也左傳左師曰大臣不順國之恥也左傳子產謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉左襄三十君之卿佐是謂股肱股肱或虧何痛如之左昭九叔孫氏之司馬鬷戾言於眾曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也左昭二十五成孟氏之保障也無成是無孟氏也左定十二夫魯齊晉之唇齒唇亡齒寒左哀八宋樂豫曰公族公室之枝葉也若去之則本根無所庇蔭矣左傳民實瘠矣君安得肥國語漢王曰吾翁即若翁漢書淮南王反令尹曰往年殺彭越前年殺韓信此三人者同體之人也自疑禍反身故反耳通監漢高紀枝葉落則本根無所庇蔭西漢劉向傳將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之後漢朱穆田蚡曰程不識李廣俱東西宮衛尉今眾辱程將軍仲孺獨不為李將軍地乎西漢灌夫傳李固曰譬猶一門之內一家之事安則共其福慶危則通其禍敗通監東漢紀猶叩樹本百枝皆動也東漢李固傳互見影響相應猶頭之與足相資也通監漢桓紀呂範曰譬猶同舟涉海一事不牢即俱受其敗同上東漢紀慕容垂曰秦晉瓦合相待為彊一勝則俱豪一敗則俱潰晉武紀君臣猶父子也休戚同之唐高祖紀上嘗謂公卿曰苟其君愎諫自賢其臣阿諛順旨君既失國臣豈能獨全如虞世基等諂事焬帝以保富貴焬帝既弒世基等亦戮唐太宗紀並, WYG: 强直}
