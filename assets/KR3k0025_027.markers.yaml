  - {type: variant, offset: 3472, length: 5, content: 顧廉恥前漢, WYG: 遣人以供國自鹿臺重賦東夏為墟鴻都賣官西園成市張鷟集掌庫藏出納之節金寳財貨之用權衡度量之制皆總其文籍而頒其節制唐書本朝金部郎參掌天下給納之泉幣計其歲之所輸歸于受藏之府以待邦國之用勾考平准市舶𣙜易商税香茶鹽礬之數以周知其登耗視歲額盈虧而為之賞罰宋史王師愈召除金部郎中數召對言事上孝宗賜書曰比聞奏對頗及治道之具而未詳也尚有可禆政體而宜于今者亟復條奏其眷待之渥一時在廷之臣莫得望焉晦菴集倉部郎中經廩人掌九穀之數以待國之匪頒賙賜稍}
