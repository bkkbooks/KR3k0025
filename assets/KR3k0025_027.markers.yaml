  - {type: variant, offset: 2411, length: 3, content: 孔多是, WYG: 咸亨元年復舊光宅元年為司封郎中掌封爵皇之枝族及諸親内外命婦告身及道士女官等天寳八載十一月勑道士女官籍每十載一造永為常式出通考集封爵之恩施於内外國之典也主以郎吏寵秩甚優渥除王祖道制以寵左曹之秩}
