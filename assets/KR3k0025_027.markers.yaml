  - {type: variant, offset: 160, length: 6, content: 車裂淮南子繆, WYG: 雋乂在官湯舉阿衡而不仁流屏無謂隠㣲廢公任私無好自専違衆取怨易貴好爵書慎官人官不可妄授軄不可闇受能者養之致福不能者弊之招咎晉傅𤣥箴漢置五曹方今六尚魏隆八座擬古六卿近喻喉舌逺譬樞斗隋江縂表本朝張昭為尚書獨掌京官七品元豐官制行以審官東院歸吏部尚書左選審官西院歸吏部尚書右選四朝志擬考其閥閲以定可否凡選授封爵功賞課最之事皆所歴郎官驗實而後判成焉若有疑不能决則禀議於尚書省即應論奏與郎官同上殿續㑹要建炎六年詔惟吏部備官餘長貳互置題名入朝登用而抗論極言不以利害之私少有回屈士論益以歸重朱晦菴書進位於輔相之列則所資於天下之才者益衆而所進退於天下之才者益重同上吏部侍郎經小宰之職周禮史裴楷為吏部侍郎風神髙邁容儀俊爽時謂之玉山照人本𫝊吏部侍郎髙孝基鑑賞機悟清謹絶倫房𤣥齡杜如晦與選孝基特加賞異後以為知人隋書陸彦師為吏侍隋承周制官無清濁彦師在職凡所任人頗甄别於士庶同上吕元膺拜吏部侍郎正色立朝有合宰望處事裁宜人服其有體同上髙馮為吏部侍郎凡所銓綜時}
