  - {type: variant, offset: 3433, length: 2, content: 膚寒, WYG: 濬隂令李康獻糗餌數百騾綱軍士始得食僖宗乃召康閣卿為縣令安操心及此對曰臣為塵吏安敢有此進獻張濬郎中教臣也帝異之同上傳記唐龍朔中改度支郎中為司度大夫咸亨復舊六典蘇弁授度支郎中副知度支事仍命立于正郎之首有副知之名自蘇弁始也同上狄梁公以度支之司天下利害部常闕人求之未得乃自職之唐職林寳應元年正月劉宴為户部侍郎度支使二年二月韓滉以宰相加度支使五月二日豆參為中書侍郎平章事度支使自後雖無亦有他官判同上集位參計㑹職綰度支唐張缺集鳴鶴登朝含鷄伏省轉筯之敏未見稱竒聚米之能無聞播美張倉之善筭國用詎肯留情馮勤之力計軍儲曾何介意年支國用為政之嘉猷歲計軍儲邦家之要務同上本朝參掌計度軍國之用量貢賦税租之入以為出乾道四年置㑹稽都籍度支掌之裁减吏額置五十人淳熈十三年又减四人宋史徐宗説在度支㑹右曹金部皆缺官因令兼領三曹金谷纎悉之地而宗説素有心計于天下經費出入盈縮之數莫}
