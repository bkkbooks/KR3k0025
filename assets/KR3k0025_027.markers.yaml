  - {type: variant, offset: 2425, length: 1, content: 咎, WYG: 中檜雖稱公靜重常越用他人公不以為意在省五年始為軍器監同上趙宗儒再遷司勲員外郎貞元六年領考功事自至徳後考績失實内外悉考中上殿最混淆至宗儒黜陟詳當無所回憚同上司書本司無所掌元豐官制行郎中員外郎始實行本司事初除穆洵為參賞勲掌事凡勲十有二級自上柱國至武騎尉自從七品推而上之至正三品三歲一遷必因其除授以加之凡賞格皆設於此以逆其至焉若事應賞從其所𨽻之司考實以報其制命隆興詔省并司勲郎中以司封郎中兼領㑹要考功郎中史考功定課晉史鄭瀚為考功員外郎刺史有馳迫人吏上言政績請刋石紀者瀚探得其情條索廉使巧迹遂露人服其敏識晉紀考功郎中掌文武百官功過善惡之績考法凡百司之長歲較其屬功過善惡九等又令衆官讀之流内之官叙以四善善状之外有二十七最唐百官志穆宗即位召李渤為考功郎校定京官考不避權倖皆行黜陟同上宋之問善為五言}
