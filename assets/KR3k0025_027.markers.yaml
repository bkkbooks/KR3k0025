  - {type: variant, offset: 2997, length: 1, content: 越, WYG: 送霍考功有意嫌兵部專心望考功誰知脚蹭蹬却落省墻東張恭忠咏主羣吏之課而議其誅賞郎列三台任屬九重南豐除蔡京制計羣吏之治而明黜陟之法台郎典引列于左曹又除吕和卿制本朝以七事考監司一曰舉官當否二曰勸課農桑增墾田疇三曰户口増損四曰興利除害五曰事失案察六曰較正刑獄七曰盜賊多寡以四善三最考守令徳義有聞清謹明著公平可稱恪謹匪懈為四善訟獄無寃催科不擾為治事之最農桑墾闢水利興修為勸課之最屏除姦盜}
