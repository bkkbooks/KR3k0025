  - {type: variant, offset: 100, length: 0, content: '', WYG: 世一漚塵此心是處元無着誤說持竿作釣名胡文定江隂軍倚郭一江陽郡號澄川澄江暨州暨陽軍縣沿革呉地斗分野須女之次禹貢揚州之域漢為毘陵縣之漑陽鄉晉置暨陽縣屬毗陵郡梁太平二年置江隂郡江隂縣隋平陳廢郡以縣屬常州唐武德三年置暨州并析置暨陽利城二縣九年廢州以江隂屬常州而省二縣五代南唐立江隂軍以縣屬焉地理沿革表形勝蛟山在縣東二十里螺洲在縣東十五里暨陽湖中青山在縣西有干將鑄爐九所黄山在縣北其峯名席㡌香山在縣東呉遣美人採香於此故有採香徑鳯凰山在縣東鸚鵡堆在夏港白鹿山在縣東白龍山在縣南有白龍洞觀音礪在由里山之南彌勒彎在貪山西輿地紀勝人物呉季札遜位耕於芙蓉湖西馬鞍山楚春申君黄歇封江南令申浦黄山耿以為名皇朝葛宻自號草堂逸老葛惟肖五嵗能属文輿地紀勝集萬室邉江次孤城對海安朝霞晴作雨濕氣晩}
