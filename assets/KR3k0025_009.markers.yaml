  - {type: variant, offset: 2513, length: 1101, content: 向陽花木易逢春翰府名談公子何自知秋陽哉生於華屋之下而生於朝廷之上出擁大蓋入侍帷幄暑至於溫寒至於涼而已東坡秋陽賦經何以聚人曰財易係辭世祿之家鮮克由禮位不期驕祿不期侈書畢命子子路曰負重涉遠不擇地而休家貧親老不擇祿而仕家語三尺之岸虛車不能登百仞之山任負車登焉陵遲故也孫卿子衰麻苴杖者志不存乎樂非耳不聞服使然也黼黻袞冕者容不褻慢非矜莊服使然也介冑執戈者無退懦之氣非體純猛服使然也家語三恕篇夫芻猛之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之莊子諺曰長袂善舞多資善賈此言多資易為工也韓子衣食足而知榮辱管子夫堯舜在上雖十桀紂而不能亂者勢治也桀紂在上雖十堯舜而不能治者勢亂也韓子饑歲之春幼弟不飽穰歲之秋疏客必食韓非子五蠹遺腹子不思其父無貌於心也淮南子說林篇夫民有餘即讓不足則爭讓則禮義生爭則暴亂起扣門求水莫不與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豐則欲省求贍則爭止淮南子齊俗訓堯為匹夫不能使鄰家至為主則令行禁止慎子明月之光可以遠望而不可以細書盛霧之朝可以細書而不可以望尋常之外淮南子富不學奢而奢任子舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福尸子挈瓶丐水執雚求火而人不吝非性好施有餘故也劉子懸千金於市而人不敢取者分定矣委一錢於地童子爭者分不定矣傅子史膏粱之性難正國語食鮮肥者多驕放同上安民可與行義危民可與為非史秦始皇紀治獄吏上下相歐以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死人情安則樂生痛則思死捶楚之下何求不得故囚人不勝痛則飾詞以視之吏治者利其然則指道以明之上奏畏卻則鍜鍊而周內之雖咎繇聽之猶以為死有餘辜何則成練者眾文致之罪明也西漢路溫舒傳勇略震主者身危功蓋天下者不賞通監衣食足而知榮辱廉讓生而爭訟息前漢食貨志夫百人作之不能衣一人欲滅下亡寒胡可得也一人耕之十人聚而食之欲天下無飢不可得也飢寒切於民之冗膚欲其亡為奸邪不可得也通監漢文孤者易傷貧者易感東漢邴原傳本根既微枝葉強大故其末流有從橫之事勢數然也通監漢光武生而富者驕生而貴者傲生富貴而不能驕傲者未之有也通監漢和紀勢存則威無不加勢亡則不保一身通監漢獻紀貴不與驕期而驕自至富不與奢期而奢自至唐魏證傳貧不學儉富不學奢非人性也勢使然耳魏志互入不待矯揉夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒魏志王粲傳晉劉毅曰上品無寒門下品無勢族通監宋明帝詔曰貴高有危殆之懼卑賤有溝壑之憂通監宋紀辛雄曰凡人所以臨陳忘身觸白刃而不憚者一求榮名二貪重賞三畏刑罰四避禍難非此數者雖聖主不能使其臣慈父不能厲其子矣通監梁高祖朱敬則曰急趍無善跡促柱少和聲續世說久安之民驕佚則難教經亂之民愁苦則易化譬猶飢者易為食渴者易為飲也通監唐太宗紀傳, WYG: 照氷張師德}
