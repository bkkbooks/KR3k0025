  - {type: variant, offset: 377, length: 4, content: 冬夏旦暮, WYG: 戰國皆越地秦屬閩中郡漢東甌地後屬㑹稽郡南部都尉治此呉建中置臨海郡梁為赤城郡隋平陳廢郡屬處州後屬永嘉郡唐武德四年置台州天寳曰臨海郡屬江南道沿革表縣沿革臨海本漢㑹稽郡回浦縣地東漢改章安縣呉分置臨海郡晉亦為臨海郡治隋改章安曰臨海縣屬永嘉郡唐武德四年復増置章安八年省}
