  - {type: variant, offset: 66, length: 2, content: 蕭索, krp: 出兹邑紀勝集依微呉苑樹迢逓晉陵城韋蘇州陽羨溪聲今駭人洞庭山翠晩凝神髙塘天子須嘗陽羨茶百草不敢先開花盧仝濁浪勢奔呉苑急踈鐘聲出慧山寒羅隠他年雪中棹陽羨訪吾廬一壑風煙陽羨里杜牧桂凝秋露添金液茗折春芽汎玉英李紳葦坡竹塢情無限閒語毘陵問社陵鄭谷本朝太平興國元年改義興縣為宜興沿革表惠山泉下土如濡陽羨溪頭米勝珠毘陵髙士錫為骨陸子遺味泉冰齒東坡久聞陽羨溪山好頗與淵明性分宜王介甫嚴州倚郭一外縣五建德淳安桐廬分水遂安夀昌遂安軍節度郡號新定嚴陵釣臺桐廬桐江桐川白雉州沿革斗牛分野禹貢揚州之域春秋屬呉戰國屬越後屬楚秦㑹稽及鄣郡地漢㑹稽丹陽縣地東漢屬呉郡呉分屬新都郡晉屬呉郡及新安郡隋平陳廢郡仁夀三年置睦州大業改為遂安郡唐武德七年為東睦州八年改睦州天寳曰新定郡屬江南道地理沿革表縣沿革建德本漢富春縣地屬㑹稽郡呉置建德縣屬呉郡隋省為鎮入東陽郡呉寧縣唐武德七年復置七年省入桐廬雉山永淳復置萬嵗通天自雉山徙州治此淳安本漢歙縣地屬丹陽郡梁置新安郡隋廢為新安縣大業改縣曰雉山置遂安郡治此唐文明元年復曰新安開元改遂淳永貞改清溪桐廬本漢富春縣地有嚴子陵釣臺呉分置桐廬縣屬呉郡隋平陳廢之仁夀復置屬睦州唐武德置嚴州於此七年州廢屬睦州分水本漢富春縣地呉為桐廬縣地唐武德四年増置名分水縣屬睦州七年省之如意元年復置更名武盛神龍復名分水遂安本漢丹陽郡歙縣地呉分置新定縣屬新都郡晋太康元年改遂安屬新安郡隋平陳廢之仁夀復置屬遂安郡唐屬睦州夀昌本漢富春縣地呉分置新昌縣晋太康元年改夀昌屬呉郡後廢之唐永昌元年分雉山復置載初元年省之神龍復置屬睦州地理沿革表形勝新安江出自歙州過州南東流五里與浙江合釣臺嚴子陵坐釣之所下瞰嚴陵瀬上接七里灘交岸是錦峯繡嶺有釣臺書院有泉甚甘美為天下第十九泉桐江在桐廬縣北源出天目山流入浙江龍井在遂安雉山在遂安縣西一里金牛山在桐廬西金雞巖在夀昌西馬目山在州西南馬鞍山在芙蓉湖西輿地紀勝人物東漢嚴子陵與光武為友不事耕於富春山今釣臺是其隠處唐方干隠釣臺東白雲源皇朝周大雅親喪廬墓趙林奏改其鄉曰至孝江公望極論時事坐廢終身詹良臣郡人為縉雲尉方臘起罵賊死之輿地紀勝集清溪清我心水色異諸水借問新安江見底何如此李白流水聲中視公事寒山影裡見人家崔同城枕溪流淺更斜麗譙連帶邑人家春潮撼動鶯花郭秋雨閉藏砧杵村杜牧江濶桐廬岸山深建德城厲翼釣臺目觀嚴子瀬想屬仕公釣謝靈運嚴子瀬髙秋浪白水禽飛盡釣舟還陸龜䝉蒼翠雲峯開俗眼泓澄烟水滌塵襟誰將道業為芳餌釣得髙名直至今杜荀鶴本朝宣和初陞新定郡為建德軍節度三年改嚴州又改清溪縣曰淳安桐廬屬杭州太平興國三年𨽻州沿革表集水截三呉秀山當百粤秋碧泉千脉㵼金鈎名是東南俗阜州玉水聲中寒濯筆石楠香裏夜銜杯張伯玉釣臺漢庭來見一羊裘黙黙俄歸釣舊舟迹似磻溪應有待}
