  - {type: variant, offset: 377, length: 4, content: 冬夏旦暮, krp: 戰國皆越地秦屬閩中郡漢東甌地後屬㑹稽郡南部都尉治此呉建中置臨海郡梁為赤城郡隋平陳廢郡屬處州後屬永嘉郡唐武德四年置台州天寳曰臨海郡屬江南道沿革表縣沿革臨海本漢㑹稽郡回浦縣地東漢改章安縣呉分置臨海郡晉亦為臨海郡治隋改章安曰臨海縣屬永嘉郡唐武德四年復増置章安八年省}
  - {type: variant, offset: 382, length: 1, content: 期, WYG: 黄岩唐上元二年分臨海置永寧縣屬台州天授元年改今名寧海本漢㑹稽郡鄞縣地晉永和三年置寧海縣屬臨海郡隋省之唐武德四年析臨海復置七年省之永昌初又置天台本東漢章安縣地呉分置始平縣晋太康元年改曰始豐屬臨海郡陳至德九年徙郡於此隋平陳廢郡以其縣入臨海唐武德四年復置始豐八年省之貞觀復置上元改曰唐興後梁改曰天台後唐改唐興石晉改台興仙居晉永和三年分始豐南鄉置樂安縣屬臨海郡隋開皇九年廢之唐武德析臨海復置八年省之上元二年又置五代改為永安沿革表形勝天台山在天台縣西一百一十里天姥峯在天台西北一峯孤秀峭峻與天台相對天門山在寧海縣北天柱山在寧海縣西其南有黄水峯丹霞洞在天台觀東北葛仙翁煉丹處丹霞小洞在天台縣北黄巖山在黄岩縣神仙王方平所號黄岩溪出焉丹崖山在黄岩縣南崖石皆赤丹青泉在寧海天慶觀白岩山白鶴山白鵠山皆在臨海白嶠山白龍潭皆在寧海赤城與瀑布號為二竒國清寺與齊州靈岩荆州玉泉潤州栖霞號為四絶金山在黄岩上鋭下濶宛若金字銀山在天台日山在臨溪西雲岩在臨海東靈岩在黄岩縣北又名鷲峯後有飛瀑瑞峯在仙居委羽山在黄岩縣為第二大洞天赤城山在天台縣為第六大洞天括蒼山在天台縣為第十大洞天葢竹山在黄岩縣為第十九小洞天夀星岩摘星巖閬風臺在寧海景星巖在仙居劉阮洞麻姑巖在天台輿地紀勝}
