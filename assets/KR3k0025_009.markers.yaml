  - {type: variant, offset: 0, length: 1, content: 世, krp: 欽定四庫全書記纂淵海卷九宋潘自牧撰郡縣部兩浙西}
  body:
  - {type: variant, offset: 2, length: 2, content: 嶮巇, WYG: 臨安府倚郭二外縣七仁和餘杭錢塘臨安富陽於潛新城昌化鹽官行在所寧海軍節度浙西路安撫司兩浙轉運司郡號餘杭寧海杭州錢塘武林天目臨平府沿革牽牛婺女呉地斗分野禹貢揚州之域春秋越國西境戰國屬楚地秦漢屬㑹稽郡東漢順帝以後屬揚州呉郡三國増置呉興郡陳置錢塘郡隋廢郡置杭州大業廢州置餘杭郡唐武德杭州屬江南道天寳改餘杭郡升鎮海軍節度五代呉越王錢氏都之地理沿革表縣沿革仁和本漢錢塘縣屬㑹稽郡東漢廢之其地有臨平湖自漢末穢塞呉孫皓天璽元年湖開晋復置錢塘縣屬呉地陳置錢塘郡隋開皇平陳自餘杭徙州治此五代石晉避諱改曰錢江後别置錢塘與錢江分治錢塘本漢錢塘縣地五代析錢江爲錢塘縣餘杭秦始皇南逰至浙江水波惡乃西百二十里從狹中渡因置餘杭縣漢屬㑹稽郡東漢屬呉郡三國以後屬呉興郡隋置杭州於此後乃徙治錢塘唐屬杭州臨安本漢餘杭縣地呉分置臨水縣屬呉郡後屬呉興晉武改曰臨安隋廢之唐武德復臨水縣𨽻潛州後省入於潛垂拱中復置臨安縣屬杭州五代後梁改曰安國僞唐置衣錦軍縣屬焉富陽本漢富春縣屬㑹稽郡東漢屬呉郡呉孫權置安東郡晉避皇后諱改曰富陽隋屬餘杭郡唐屬杭州於潛本漢於朁縣屬丹陽郡呉寳鼎元年屬呉興隋屬餘杭郡爲於灊縣唐武德七年置潛州領於潛臨水二縣八年州廢屬杭州新城本漢富春縣地呉置新城縣尋廢之晉咸和中復置隋平陳省入錢塘後復置唐武德廢之永淳復置屬杭州五代後梁改曰新登縣呉越王分臨安縣地置南新塲鹽官本漢海鹽縣地有鹽官呉王煮海之地呉置鹽官縣屬呉郡隋屬餘杭郡唐屬杭州武德七年省入錢塘貞觀四年復置昌化本漢於朁縣地唐垂拱二年析於朁置紫溪縣萬嵗通天改曰武龍神龍改曰唐山大歴省之長慶復置五代後梁改曰金昌後唐同光復故名石晉改曰横山地理沿革表形勝西湖在城西周囬三十里元祐間東坡重開築堤其上號蘇公堤孤山在湖中獨立一峯林和靖隠居所南髙峯在南山石塢煙霞山後北髙峯在靈隠山後與南髙峯頂皆有古塔飛來峯在靈隠寺前晉咸和中有僧曰是中天竺國靈鷲山不知何年飛來乃創靈隠寺靈隠寺在九里松之西三天竺在靈隠之西冷泉亭在靈隠寺前飛來峯下胥山在城中即呉山也有泉在山北龍山在城南十里龍井在夀山院六和塔在龍山下浙江亭在江下雷峯塔在西湖南山之黄皮園煙霞洞在錢塘南十六里風水洞在錢塘之楊林慈恩院水樂洞在煙霞嶺下彗日峯在净慈寺巨石山在錢塘縣南三里九里松在西湖上九仙山在臨安縣百丈山在昌化縣一名潛山千頃山在新城縣西北六十里赤松山在富陽縣東九里娥眉山在城中鳯凰山在城中下瞰大江黄鶴山在仁和縣東北白鹿山在餘杭縣循虎巖在洞霄宫蛻龍洞在新城縣西十八里保叔塔在西湖大佛頭之上净慈寺在南山頭洞霄宮在餘杭縣南十八里紫盖山在餘杭縣爲第三十三小洞天天目山在臨安縣爲第三十四小洞天輿地紀勝人物漢嚴光富春人光武徴之不仕耕於富春山呉孫堅富春人晉禇陶錢塘人年十二作鷗鳥水磑二賦唐禇亮錢塘人瀛洲學士遂良父羅隠新城人呉越王錢鏐臨安人皇朝錢維演仕至使相林逋結廬西湖之孤山沈括錢塘人明歴數周邦彦字美成錢塘人進汴都賦號清真居士張九成紹興二年掄魁輿地紀勝}
