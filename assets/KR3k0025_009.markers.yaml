  - {type: variant, offset: 5, length: 4, content: 荊棘聚而, krp: 萬株松樹青山上十里沙堤明月中望海樓邉照晩霞䕶江堤白踏晴沙濤聲夜入伍員廟柳色春藏蘇小家遶郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇山名天竺堆青岱湖號錢塘瀉緑江三年悶悶在餘杭曽為梅花醉幾塲伍相廟邊繁似雪孤山園裏䴡如粧踏隨逰騎心長惜折贈佳人手亦香笙歌縹緲虗空裏風月依稀夢想間吏稀秋税畢客㪚晩庭空霽後當樓月潮來滿座風北郭沙堤尾西湖石岸頭俱白樂天外邑宵濟漁浦澤暮及富春郭文選本朝太平興國元年呉越王納土爲杭州餘杭郡淳化五年改寧海軍額紹興駐蹕改曰臨安府沿革表太平興國四年改錢江爲仁和太平興國三年改衣錦軍爲順化軍縣曰臨安五年廢郡以臨安縣屬杭州太平興國四年復置新城縣淳化五年以南新場置昭德縣尋改南新縣熈寧五年省入新城太平興國四年改横山縣曰昌化沿革表地有湖山美西南第一州仁宗御製怪石蒼崖映翠霞梅花踈瘦正横斜得因祀事來尋勝試探春風第一花髙宗御製夢遶呉山却月廊白梅盧橘覺猶香海門浸坤軸湖尾抱雲巘葱葱城郭麗淡淡煙村逺惆悵沙河十里春一番花鳥一番新沙河燈火照山紅歌吹喧喧笑語中十里珠簾半上鈎朝見呉山横暮見呉山從呉山故多態轉側爲君容天外黒風吹海立浙東飛雨過江來東坡林巒臘雪千家水城郭春風二月花萬屋相誇漆與丹笑歌長在綺羅間綵船春戲城邉水畫燭秋尋寺裏山王介甫繚繞峯巒饒野色參差樓閣起晴煙湖光争照山間寺江浪遙連海外天謝㓜槃武林天下竒㢲亭景中絶胡宿暑月芙蓉秋月濤截斷風光三百里丘濬神都魏闕移郊域龍飛鳯舞來呉山周邑外邑我昔常爲徑山客至今詩筆餘山色師住此山三十年妙語應須得仙骨徑山寺問牒知秦過㸔山識禹功餘杭法喜院古邑居民半海濤塩官千佛閣風巖水洞舊聞名只隔山溪夜不行風水洞虎移泉眼趂行脚龍作浪花供撫掌虎跑泉含暉亭上望東溟凌霄峯頭挹南嶽含暉亭以上並東坡人行山頂半天上舟遶溪流亂石中汪藻詠餘杭江湖西湖並見前地理類平江府倚郭二外縣四呉縣崑山長洲常熟呉江嘉定平江軍節度浙西路提刑司提舉司郡號呉郡蘇州呉㑹姑蘇勾呉夫椒府沿革呉地斗分野星紀之次禹貢揚州之域周封㤗伯於此春秋呉國所都爲越勾踐所滅楚伐越取之秦置㑹稽郡漢髙祖爲荆國十二年復爲㑹稽郡復屬揚州東漢順帝永建四年分浙江以西置呉郡三國時呉郡與呉興丹陽爲三呉晉以後爲呉郡陳置呉州隋平陳改曰蘇州大業初爲呉州尋爲呉郡唐蘓州呉郡屬江南爲東道採訪使治所南唐陞爲中呉軍節度地理沿革表縣沿革吳縣㤗伯奔荆蠻居之秦置㑹稽郡漢髙帝以封呉王濞國除復爲㑹稽郡呉縣東漢順帝置呉郡治此唐蘇州所治長洲本漢呉縣地呉封長沙王果於此唐萬嵗通天元年析呉縣置長洲縣在州郭與呉縣分治崑山本漢㑹稽郡婁縣東漢屬呉郡梁大同元年分婁縣置崑山縣隋平陳省之開皇十八年復置唐屬蘇州常熟本漢呉縣地晉分呉縣置海虞縣屬呉郡}
