  - {type: variant, offset: 3708, length: 410, content: 之貧罄哉劉知幾史通集廣川無逆流選謝靈運詩錢之所在危可使安死可使活錢之所去貴可使賤生可使殺魯褒錢神論洪波振壑川無恬鱗驚飆拂野林無靜柯殷仲文表高風摧秀木李太白少年樂新知衰暮思故友韓文互入趍向不同文章之作恒發於羈旅草野至若王公貴人氣得志滿非性能而好之則不暇以為夫和平之音淡薄而愁嘆之聲要妙歡愉之辭難工而窮苦之言易好也並同上絡首縻足兮驥不能踰跬步無所阻兮跛鱉千里炎天無冽井日月停午物無邪陰劉賓客短線無長縫孟東野鄰富雞長往家貧客漸稀姚少監長江不肯向西流白樂天世冑躡高位英俊沈下僚地勢使之然由來非一朝左太沖詠史詩在貴多忘賤曹子建贈丁儀本朝朱門有遺啄千里來燕雀公門冷如水百呼無一諾東坡詩飽食有殘肉飢食無餘菜先竭是甘井得全如苦李並同上尺箠當猛虎奮呼而操擊徒手遇蜥蜴變色而卻走老泉先生集袒裼而按劍則烏獲不敢逼冠冑衣甲據兵而寢則童子彎弓殺之矣利之所在天下趍之是故千金之家欲有所為則百家之市無寧居者三蘇集自下觀上無限富貴自上觀下無限貧賤邵堯夫, WYG: 卷九}
