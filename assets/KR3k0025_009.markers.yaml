  - {type: variant, offset: 101, length: 0, content: '', WYG: 寒苔色侵衣袂潮浪上井欄李嘉祐虹分陽羨雨浪隔廣陵春樹列巢灘鶴鄉多釣浦人方干本朝淳化元年廢江隂軍以縣屬常州三年復置熈寧四年又廢之紹興復置沿革表集城上城隍古境中城邉山色翠屏風魚蝦接海隨時足稻米連湖逐嵗豐泰伯人民堪教育春申溝港可疏通朱昌叔去無珠履為上賔進船申浦憶春申江田挿秧鵓鳩雨幽網得魚雲母鱗梅堯臣戰國干戈禮義隳延陵髙節救固衰當時若嗣諸侯位後世誰傳十字碑同上紹興府倚郭二外縣六㑹稽嵊縣山隂諸暨餘姚蕭山上虞新昌鎮東軍節度浙東路安撫司提刑司提舉司郡號秦望越都㑹稽鑑湖越絶越國蘭司府沿革粤地星紀之次牽牛婺女之分野禹貢揚州之域春秋越國所都楚滅越取之秦漢屬㑹稽郡東漢順帝分浙江以西為呉郡浙江以東為㑹稽郡置山隂縣梁兼置東陽州陳廢州尋復置隋平陳改曰呉州大業改越州復曰㑹稽郡唐為越州天寳復為㑹稽郡升為鎮東軍節度屬江南道後為浙東觀察使治所五代時屬呉越王錢氏地理沿革表縣沿革㑹稽夏少康封庶子杼於此其後為越王允常秦置山隂縣漢屬㑹稽郡東漢順帝以後為郡治至南朝析山隂縣為㑹稽縣隋平陳廢山隂入㑹稽縣為㑹稽郡治唐武德析置山隂山隂自秦置縣漢以後屬㑹稽郡東漢為郡治隋平陳廢之唐武德七年析㑹稽置八年省之垂拱二年復置與㑹稽縣分治嵊縣本漢㑹稽剡縣唐武德四年立嵊州六年廢州以縣屬越州諸暨本越王允常之故邑國語曰勾無秦置諸暨縣漢以後屬㑹稽郡唐屬越州餘姚本漢㑹稽郡餘姚縣隋省入勾章縣唐武德四年復置又置餘州七年廢州以縣屬越州蕭山本漢㑹稽郡餘暨縣呉改曰永興隋省入㑹稽縣唐儀鳯二年復置永興縣天寳改曰蕭山上虞自漢置縣屬㑹稽郡隋省入㑹稽縣唐貞元中復析置上虞縣新昌本漢會稽剡縣地五代呉越王錢鏐始析置地理沿革表形勝禹穴在㑹稽山舊經繫之宛委山里人以為陽明洞即是也舜井象田在上虞西北虞山在餘姚舜避丹朱之地塗山在山隂縣西北禹㑹諸侯之地㑹稽山在州西二十里隔浙江與呉山對峙大禹陵在㑹稽山禹狩江南上苖山㑹計諸侯死而葬焉陽明山在山陽縣為第十小洞天金庭山在嵊縣為第二十七小洞天白水翠巖寒溪温泉在鏡湖西暑月則冷冬月則温山隂在㑹稽山北}
