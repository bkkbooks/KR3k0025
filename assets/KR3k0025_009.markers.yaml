  - {type: variant, offset: 254, length: 2, content: 線路, WYG: 以明州為奉化郡建隆三年改奉化軍慶元元年以潛藩陞慶元府神宗置昌國縣見前縣沿革下集日宫移向月宫栽染得嬌紅入面來多謝春風揚雨露丹心一一為君開髙宗御製丹桂鄞江鮮魚白如銀玉盤千里紫絲蓴鄭獬旁人指㸃此何許云是四明真樂處此樂為民非為身始自集賢錢使君呉克詠衆樂亭四明舊説南湖好嵗久頻涯變涂潦建旟一日得賢侯千里江山真再造王益柔最思東山春樹靄更憶東湖秋水波明朝城郭畫中傳尚記西亭一艤船王介甫葺成世界三千景占得鵬天九萬風宴豆四時喧畫鼓逰人兩岸跨長虹他年若數東南勝湏作􅅫萊第一宫勢壓平湖四靣佳好風明月是生涯鯨鯢背上浮三島菡蓞香中放兩衙錢公輔風月逢知己湖山得主人司馬温公四明山水東南表海鰲背上三千島麗譙髙逼斗牛寒一曲梅花萬家曉早晩渡船潮有信往來鷗鳥客無心蓬島雲長在桃源客}
