  - {type: variant, offset: 504, length: 210, content: 王成安君為刎頸交卒滅亡患生於多欲而人心難測也西漢蒯通傳入吾室操吾戈以伐我東漢鄚玄傳符丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變通監晉紀昔呂布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以構妖通監梁高祖惟有人心相對間咫尺之情不能料通監五代晉高祖李繁者泌之子也陽城盡疏裴延齡過惡欲密論之以繁故人子使之繕寫繁徑以告延齡先詣上一一自解疏入上以為妄不之省通監唐德宗集孰知其不合兮若竹柏之異心楚辭失意杯酒問白刃起相讎選少年行互入因小失大, WYG: 風浪}
