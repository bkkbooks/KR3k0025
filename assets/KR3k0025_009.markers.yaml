  - {type: variant, offset: 157, length: 0, content: '', krp: 萬壑與千巖峥嶸鏡湖裏李白帝聞臨㶚涘禹穴枕江干駱賔王門掩右軍餘水石路横諸謝舊煙霞趙嘏越女天下白鏡湖五月凉剡溪藴秀異欲罷不能忘杜詩千峯排碧落雙澗合清漣李華詠雙澗本朝紹興初以潛藩改越州為紹興府沿革表宣和三年改剡縣為嵊縣沿革表集越絶谿山第一州盡圖城郭幾淹留陳堯佐亭餘内史流觴水路入仙人取箭山宋文景公越山長青水長白越人長家山水國王介甫秋渚涵容碧秋山刷眼青排頭烟樹老撲面水風腥上瀬復下瀬長亭仍短亭夜船明月好客夢滿流螢韋處厚秖剡船撑鑑湖月路指沃洲雲同上數擘斷雲秦嶺曉一聲寒鴈鑑湖秋平湖來萬壑翠岫列千門市井魚鹽合居人繡組繁張伯玉爲問玉堂香案吏蓬萊何似水晶宫滕子京卧龍蟠屈半東州萬室鱗鱗枕上流東坡燕集蓬山雨過凉鑑湖何獨負知章萬家桃李春風國兩羣旌旗晝錦鄉楊傑慶元府倚郭一外縣五鄞縣奉化慈溪定海象山昌國奉國軍節度沿海制置司郡號明州四明鄞州奉化郡奉國軍府沿革粤地星紀之次牽牛婺女之分野禹貢揚州之域春秋越地戰國楚地秦以後屬㑹稽郡隋初屬越州後屬㑹稽郡唐開元二十六年採訪使齊澣奏以越州鄮縣置明州天寳曰餘姚郡屬江南道後梁陞為望海軍節度地理沿革表縣沿革鄞縣本漢㑹稽郡鄮縣及鄞縣鄞故城今在縣東南又勾章縣故城在鄞縣西隋平陳省鄞鄮二縣入勾章屬㑹稽郡唐武德以勾章置鄞州八年復為鄮縣屬越州省勾章入鄮縣開元置明州又析置翁山縣大歴省之五代更鄮縣為鄞縣奉化本漢鄮縣地唐開元二十六年析鄮縣初置慈溪本漢勾章縣地唐開元二十六年初置定海本漢勾章縣地後梁開平三年錢鏐奏置初曰望海後改今名象山本漢鄞縣地唐神龍二年分台州寧海及鄮縣置象山縣屬台州廣德二年改𨽻明州昌國本漢鄞縣地本朝熈寧析置縣初置地理沿革表形勝四明山在州西八十里有四角各生一種木皆不雜焉第九小洞天五臺山在鄞縣有開元寺石磊山五馬山在慈溪九峯在昌國銀山在鄞縣西南金沙在阿育王山象山在東海上龍潭在鄞縣十里鄮山在鄞縣東峯上有佛左足跡十道慈溪在縣南三十里三過山在慈溪縣南三蕚山在象山南海中六十里有三峯名三仙島廣德湖在鄞縣雪竇山在奉化縣西天童山在鄞縣普濟湖在慈溪天門山在象山縣金雞山在定海之海門鳴鶴山在慈溪西北桃花山在昌國東南昔安期生以醉墨洒於石上遂成桃花四明在鄞縣雙石如筍野花叢生其上杜䳌鳴時爛若霞錦國朝祖宗遏宻皆三年不榮花范鎮詩云鼎湖龍去蒼髯斷三載叢花不記春輿地紀勝人物皇朝舒亶慈溪人初尉臨海民有使酒逐其叔之妻者亶執之不服而斷其首投劾而去留詩於壁曰一鋒不斷流渠首千古焉知将相才自號亦樂居士楊適慈溪人隠居大隠山號大隠居士豐稷鄞縣人言王安石不可知制誥徽宗朝首言蔡京之罪又論章子厚誤國請辨宣仁誣謗及神宗實録不可亂以王安石日録沈起鄞縣人監真州轉般倉因父疾委官歸侍為有司所劾仁宗釋之史}
