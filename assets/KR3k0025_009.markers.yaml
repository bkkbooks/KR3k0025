  - {type: variant, offset: 1629, length: 855, content: 出相山西出將西漢趙充國傳萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏西漢食貨志猛虎在深山百獸震恐及其在井檻之中搖尾而求食西漢司馬遷傳服絺綌之涼者不苦盛暑之鬱燠襲狐裘之炊者不憂沍寒之悽愴西漢王褒傳互入有備鈞天廣樂必有奇麗之觀帝室皇居必蓄非常之寶東漢禰衡傳富貴生不仁沉溺致愚疾唐史臣穆宗贊河南帝城多近臣南陽帝鄉多近親東漢光武紀衣冠人物盡在中原通監梁武紀登高不懼者胥靡之人也坐不垂堂者千金之子也東漢馬融傳互入分量不同京師衣冠所聚身名所出從容附會不勤而成唐書張九齡傳水清無大魚通監漢和紀傳記楚國食貴於玉薪貴於桂爭名者於朝爭利者於市戰國策高山之巔無美木傷於多陽也大樹之下無美草傷於多陰也說苑談叢順風而呼聲不加疾而聞者眾登丘而招臂不加長而見者遠說苑建本互入處得其地與君子游苾乎如入蘭芷之室久而不聞則與之化矣與小人游貸乎如入鮑魚之次久而不聞則與之化矣是故君子慎其所去就與君子游如長日加益而不自知也與小人游如履薄冰每履而下幾何而不陷乎哉大戴曾子疾病篇高山多林必有怪虎豹藏孕焉深淵大川必有蛟龍焉大戴禮四代篇林中多疾風富貴多諛言鹽鐵論鬼谷先生曰子不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子不見嵩岱之松柏乎上枝干於青雲下根通於九泉千秋百歲不逢斧斤之患此木豈與天地有骨肉所居然也虞般祐高士傳集登高使人意遐臨深使人意清張景陽詩注互入游賞市廛所會萬商之淵左太沖蜀都賦虱處頭而黑麝食柏而香頸處險而癭齒居晉而黃嵇康養生論五陵佳氣無時無杜詩帝都名利場雞鳴無安居白樂天溫飽充於內清廉形於外南山多白雲洛陽惟紅塵闇生魑魅蠹生虫並同上貧士少顏色貴門多輕肥孟東野懷貝玉以之名都之肆未有不售者也挈而之三家之野未有不盜而困者皇甫湜枯巢無還羽在富易為容居貧難自好孟東野蓬門自古少車塵韓渥知君五陵客不樂石門遊劉賓客集青雲豈有窺梁燕濁水應無避釣魚獨樹高高風勢急平湖渺渺月明多許用晦文松柏之下無凡草鸑鷟之侶無凡禽歐陽詹文水宿知寒早愁眠覺夜長李義山文水積而深縱壑之鱗躍風積而厚垂天之翼奮呂和叔文火山無冷地濁流無清源王建集本朝居貧賤而有聞易處富貴而無過難, WYG: ''}
