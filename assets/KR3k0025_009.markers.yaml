  - {type: variant, offset: 1246, length: 382, content: 人心百態巧且難臨危利害兩相關朝為親戚暮仇敵自古常嘆交道難歐公集當人盡賓主對面如蠻夷邵堯夫觀棋集經富人之屋烏所集也詩正月注互入趍附墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬記檀弓下子射干莖長四寸生於高山之上而臨百仞之淵木莖非能長也所立者然也荀互入處得其地目不自見荀子市井相與言則以財與利楊子十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也韓非子五蠹丘阜不能生雲雨縈水不能主魚鱉者小也淮南子互入小不足以處大甚霧之朝可以細書不可以望尋常之外淮南子禿腐之山無十丈之材同上眼能察天衢而不能周項領之間抱朴子兩目不相為視蔣子崑山之下以玉抵烏彭蠡之濱以魚食犬而人不愛者非性輕財所豐故也劉子史叔向之母曰深山大澤實生龍蛇左襄二十一如目見毫毛而不見其睫也史越世家齊魯之間於文學自古以來其天性然也史儒林傳高明之家鬼瞰其室西漢楊雄傳鄒魯守經學齊楚多辯智韓魏有奇節西漢鄒陽傳秦漢以來山, WYG: 滿浙}
