  - {type: variant, offset: 2684, length: 2, content: 或施, WYG: 宏詞科拜監察御史有文集行於世裴度聞喜人舉進士累官中書侍郎討平淮蔡封晉國公皇朝趙鼎聞喜人舉進士累官殿中侍御史遷御史中丞與秦檜論和議不合謫嶺南不食而卒贈太傅豐國公同上集悠悠虞坂路欹斜遲日和風簇野花未省孫陽身沒後幾多騏驥困鹽車胡曽鐘鼓嚴更曙山河野望通鳴鸞下蒲坂飛斾入秦中唐𤣥宗條山蒼河水黄浪波紛紛去松栢在山岡韓愈威加塞北寒来早恩入河源凍合遲牧}
