  - {type: variant, offset: 2835, length: 1, content: 惟, WYG: 有仙人往来於此石堂山在中部縣治西北周穆王命駕六駿之馬造父為御南征朔野陞於太行即此玉華山在宜君縣西上有玉華宫東移泉在中部縣東軒轅思飲揚子江水因得此泉其味如之上有黄帝廟并石碣存滴珠泉在中部縣西南一里石岸下滴水如珠太子山在宜君縣東南相傳扶蘇獵於此鳳凰谷在宜君縣南谷中有地九頃許有五色雀見故名輿地紀勝人物上古軒轅黄帝生坊州秦文公居坊州皇朝楊偕中部人舉進士性剛而忠朴上䟽論時政甚切累遷翰林侍讀學士同上集天空絶塞聞邊鴈葉盡孤村見夜燈劉顯靈本朝熙寜元年省西平縣為鎮入宜君沿革表秋聲不見黄花色崖峩泉通一竅清恰似宫壺沉漏夜還如閣雨滴簷聲唐琦瓊珠寒併苔痕滑玉露朝晞草色輕唐琦綏德軍倚郭一外縣一清澗米脂郡號上郡郡沿革天文井鬼分野禹貢雍州之域本秦上郡地號陽周漢為鵰隂縣地晉為赫連勃勃所居後魏於此置上郡又分置綏州隋改為上州大業初廢雕隂郡唐為綏州天寶中改上郡乾元初復改為綏州本朝元符初置綏德軍沿革表縣沿革清澗本故寛州舊地康定初置為清澗城屬延安府後置清澗縣屬綏德軍米脂本延川郡地寶元中置米脂寨元豐中改寨為城屬綏德軍同上形勝䟽屬山在軍境昔上帝桎貳負之臣於䟽屬即此筆架山在清澗縣西無定河在清澗東嗚咽泉李廣寨孤山寨開元堡扶蘇墓嵯峨山雕山共有二十餘處俱在軍境滿堂川在州東宋女將楊滿堂在此屯兵大理河在州西北本朝种放復綏州夜渡大理河即此嗚咽泉在州南三里即秦太子扶蘇自縊處黑水河在青澗縣一百里銀川闗在米脂縣西流金河在縣南每歲居民引以灌田其利如金故名輿地紀勝人物唐張平髙綏州人從髙祖平京城累授左領軍將軍封蕭國公皇朝李浩綏州人通兵法以破儂智髙為廣西都監後官至副都總管髙永能清澗人勇力善射從种諤取綏州五戰皆㨗後至團練使李永竒清澗人性忠貞不從金人叛家屬二百口遇害同上集雕隂無樹水南流雉堞連雲古帝州明妃去日花應笑蔡琰歸来鬢已秋韋端已舉國賢良盡淚垂扶蘇屈死戍邉時至今谷口泉嗚咽猶似當年恨李斯胡曽一曲單于暮風起扶蘇城上月如鉤韋端已本朝熙寧三年收復唐綏州廢為城𨽻延州元豐七年以延州米脂等六城砦𨽻綏德城元符二年改為軍沿革表天下精兵掌握間便宜長嘯入秦闗奈何伏劒區區死不辨書從趙李奸孔武仲慶陽府倚郭一外縣二安化合水彭原郡號安化郡沿革天文井鬼分野禹貢雍州之域周之先不窋所居號北豳春秋時為義渠戎國秦以其地屬北地郡漢因之東漢至晉復陷於戎後魏置朔州後周廢隋置慶州後改為𢎞化郡唐初復為慶州天寶初改安化郡至德初改曰順化乾元初復為慶州陞安定軍五代梁改武静軍本朝仍為慶州沿革表縣沿革安化周春秋戰國時為義渠戎國秦為北地部漢為郁郅縣屬北地郡王莽改曰功著東漢晉俱廢後魏後周皆為鎮隋置合水縣唐初改合川縣後改改化縣又改安化縣又改順化縣本朝為安化縣合水秦屬北地郡漢為歸德縣魏置蔚州及華池縣後周州縣俱廢隋置合水縣以建水北川相合故名唐置合川縣又析置蟠交縣後省合川入𢎞化又改蟠交曰合水五代省合水入樂蟠本朝復置合水縣以華池樂蟠二縣省入彭原本唐寜州地天寶初改彭原郡屬闗内道治彭原縣本朝熙寧二年来𨽻慶陽同上形勝景山在府城西上多竒木怪石及獐鹿猿猱之屬太白山在府城北黑水河發源於此子午山在合水縣東綿亘八百餘里黄帝葬衣冠處馬嶺在安化一名箭栝山漢之牧馬地上有果實猿鳥岩洞幽􅃉東河在府城東来自沙漠西河在府城西来自環河白馬川在府城西白豹川在府城北玉梅川在府合水縣東鳳川在合水東北中多鷗鷺春月遊賞可愛平戎川在合水東北靈溝水在府城北華池水在合水縣東玉泉在合水縣西聖公泉在合水縣治能愈百病上有亭寶泉在合水縣北鵝池在府治東鹽池在府城北有二池大者週八十里小者週二十七里花馬池在府城北週圍四十三里與馬槽孛羅濫􅅺鍋底等池皆相近紅栁池在府北週圍二十五里石溝池在其西蓮華池在其東安化樓在府城内臨川閣在府内柔逺亭在府城傍西有寨驛馬闗在府城南横山寨在府境懷威寨在城東天固堡在彭原縣南不窋塚在府城東碑久剥落尚有片石傅介子墓在府西范仲淹祠在府城内郭子儀墓在合水縣東靈武城在府境唐列聖碑在合水縣北輿地紀勝人物上古岐伯郡人黄帝嘗與論醫有素問難經行於世夏不窋后稷之子居邠為周之祖漢公孫昆邪郡人為隴西太守以功封平曲侯公孫賀昆邪孫為騎士後以功封南窌侯子敬聲代為太僕並居卿位傅介子郡人使大宛斬樓蘭有功封義陽侯甘延夀郡人善騎射初為郎後奉使西域斬郅支單于封義城侯皇朝張吉合水人初為淮安鎮守烽卒夏人執之使紿城中降吉不從死之事聞贈内殿崇班又錄其子王庶郡人舉進士知保定縣後為鄜延經畧使累立戰功同上集山股逗飛泉泓澄傍巖石亂垂寒玉條碎洒珍珠滴唐人題合水縣玉泉詩北川澗水河南流邑治因名幾百秋同上龍武新軍深駐輦芙蓉别殿謾焚香杜甫血戰乾坤赤氣迷日月黄近賀中興主神兵動朔方杜子羙送靈武李判官黄沙百戰穿金甲不破樓蘭終不還王少伯邊雪藏行徑林風透卧衣靈州聽曉角客館未開扉賈島髙居在幽嶺人得見時稀寫籙扃虛白尋僧到翠㣲項子遷題太白山隠者太白山中寺師居㝡上方獵人偷佛