  - {type: variant, offset: 581, length: 1266, content: 殤紀昔之為我哺乳之子孫者今盡是我飲血之寇讎也同上漢獻紀武后以易得人德宗以精失士唐書陸贄傳傳記昔秦攻齊令曰有敢去柳下季壠五十步而樵採者罪死不赦有能得齊王頊封萬戶由是觀之生王之頭不如死士之壠戰國策馬援以薏苡興謗王陽以囊衣邀名續漢書有聲之聲不過百里無聲之聲延及四海說苑政理篇順帝時京師謠曰直如弦死道邊曲如鉤乃封侯風俗通集桑穀之妖反為福於大戊大鳥之慶竟成禍於帝辛李太白集互入禍福倚伏堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽叟之舜鯀之禹習非不惡也而卒為聖韓文原性自古多有以功德得其位者不得常祀勾龍棄孔子皆不得位而得常祀然皆不如孔子之盛韓文孰謂少者歿而長者存強者夭而病者全耶韓祭文至柔反成堅韋應物篇啇之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽柳文富貴亦有苦苦在心危憂貧賤亦有樂樂在身自由白樂天集蘇武卻生返鄧通終死飢杜牧之百勝難慮敵三折乃良醫劉賓客本朝紛華暫時好俯仰浮雲散淡泊味愈長始終殊不變歐公集物固有以安而生變兮亦有以用危而求安東坡賦吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也東坡剛說互見履而後知凡有物必歸於盡而恃形以為固者尤不可長雖金石之堅俄而變壞至於功名文章其傳世垂後猶為差久東坡墨妙亭記周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足以樂乎此矣東坡上梅直講書稽天之潦不能終朝而一線之溜可以穿石東坡注金無全巧竊發或中鵠山谷后皇蒔嘉橘中歲多成枳同上白頭無故意異代有同音後山互見离合无親踈蔡天申得溫公撰呂獻可墓銘以獻王安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見錄信而見疑忠而被謗經遇主于巷易睽卦伊川云巷委曲之塗也不自我先不自我後詩正月胡不自北胡不自南何人斯史遭陽九之厄百六之會西漢王莽傳集正丁厥時選新論適丁民之有是時也韓文子樹欲靜而風不停子欲養而親不待家語致思人莫不欲富貴全壽而未有能免於貧賤死夭之禍也心欲富貴全壽而貧賤死夭是不能至其所欲至也韓非子解老日月欲明浮雲蓋之叢蘭欲秀秋風敗之文子史晉羊祐曰天下不如意常十居七八晉本傳謝安雖受朝寄東山之志始末不汽及鎮新城造汎海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失晉書本傳集值風雲之會時邁齒臷文選吳季重牋可惜歡娛地都非少壯時杜詩耳聾目昏後堂上調絲竹齒牙缺落時盤中堆酒肉彼來此已去外餘中不足白樂天榮名與壯齒相避如朝暮時命始欲來年顏已先去同上繫官于朝願莫之遂韓文虛逢好陽艷其那若昏懵元微之集本朝為政一年疾病半之東坡撰溫公神道碑脂車秣馬試長道一日百里先自期不知中途有陷阱山高日暮多棘茨欒城集書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開後山好景難逢良會少倦游錄經苖而不秀者有矣夫秀而不實者有矣夫語子罕子天地無全功聖人無全能萬物無全用列子天瑞故羽翼美者傷骨骸枝葉美者傷根莖能兩美者天下無之也淮南子詮書訓堯無子舜無父不如堯父舜子也楊子史肥義曰吾欲全吾言安能全吾身史記趙世家予之齒者去其角傳其翼者兩其足西漢董仲舒傳遷之博物洽聞而不能以知自全同上, WYG: ''}
