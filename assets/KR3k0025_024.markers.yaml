  - {type: variant, offset: 2969, length: 0, content: '', WYG: 皇朝游師雄武功人學於張載第進士累遷直龍圖閣並輿地紀勝集太白何蒼蒼星辰上森列去天三百尺邈爾與世絶李太白西上太白峯夕陽窮登攀太白與我語為我開天闗同上舉首可近月前行若無山一别武功去何時復見還同上縣去帝城逺為官與隠齊馬隨山鹿放雞雜野禽棲姚合題武功縣移花兼蝶至買石得雲繞同上小市柴薪貴貧家砧杵閒同上山宜衝雪上詩好帶風吟同上吏来山鳥散酒熟野人過岐路荒城少煙霞逺縣多同上引水逺通澗疊山髙過城同上閉門風雨裏落葉與階齊同上夜犬因風吠鄰鷄帶雨鳴同上移山入院宅種竹上城墻驚蝶移花蘂游蜂帶蜜香同上掃舎驚巢燕尋方落壁魚同上長憶深山下深居遂性情同上遥瞻太白雪喜近武功天杜甫居枕江沱北情懸渭曲西隴色澄秋月邊聲入戰鼙賈島寄武功主簿本朝熙寜五年廢乾州以奉天還𨽻京兆}
