  - {type: variant, offset: 2680, length: 0, content: '', WYG: 大中祥符中以榮河為慶成軍熙寜三年省西河縣六年省永樂縣為鎮入河東榮河舊𨽻慶成軍熙寜元年廢以榮河𨽻府即縣治置軍使沿革表䟽鑿年来道路通行人萬古翠微中南山山寺題詩滿一字何曽到禹功王敏夫蒲坂東来通猗頓桑泉南下接虞鄉同上勸課農桑誠有道折衝樽俎不臨邉黄山谷老来深喜到鄉州三紀光隂若夢遊今日恬愉}
