  - {type: variant, offset: 1964, length: 220, content: 監晉武紀互入事與願違周處曰忠孝之道安得兩全既辭親事君父母安得而子乎晉書本傳互見徇公忘私自古忠賢工謀於國則拙於身多矣唐書王忠嗣傳養由基射能穿札不止鄢陵之奔陸機識能辨亡無救河橋之敗唐魏元忠傳傳記意不並銳事不兩隆盛於彼者必衰於此長於左者必短於右說苑父賢不過堯而丹朱傲子賢不過舜而瞽叟拘兄賢不過舜而象傲弟賢不過周公而管叔誅臣賢不過湯禹而桀紂伐韓詩外傳四足者無羽翼戴角者無爪齒大戴禮易本命篇明月之珠不能無考不平也夜光之璧不能無纇史通取悅小人見嗤君子同, WYG: 軍壁烽煙}
