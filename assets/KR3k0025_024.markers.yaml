  - {type: variant, offset: 2834, length: 0, content: '', WYG: 臺髙築地平寛向陽花木齊教放天下無春似此間並杜純祐題鄜臺貔虎有威開玉帳犬戎無戰掛金鉦向文簡坊州倚郭一外縣一中部宜君中部軍州事郡沿革天文井鬼分野禹貢雍州之域本漢左馮翊翟道地隋屬上郡唐置坊州本朝仍舊沿革表縣沿革中部本漢馮翊郡地渠樓中部都尉治此姚秦置中部郡後魏改中部縣大統中改曰内部隋屬上郡唐復改中部縣本朝因之宜君本漢左馮翊祋祤縣地苻秦置宜君護軍後魏改為宜君縣及置宜君郡隋為宜州唐州縣俱廢後復置縣屬坊州本朝因之同上形勝橋山在州東北其山下水通如橋狀即軒轅皇帝葬衣冠之所玉仙山在中部縣西}
