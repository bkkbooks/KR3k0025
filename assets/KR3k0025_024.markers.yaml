  - {type: variant, offset: 2680, length: 0, content: '', krp: 大中祥符中以榮河為慶成軍熙寜三年省西河縣六年省永樂縣為鎮入河東榮河舊𨽻慶成軍熙寜元年廢以榮河𨽻府即縣治置軍使沿革表䟽鑿年来道路通行人萬古翠微中南山山寺題詩滿一字何曽到禹功王敏夫蒲坂東来通猗頓桑泉南下接虞鄉同上勸課農桑誠有道折衝樽俎不臨邉黄山谷老来深喜到鄉州三紀光隂若夢遊今日恬愉}
  - {type: variant, offset: 2681, length: 0, content: '', WYG: 賜重白雲庵洞許過留薛求歸蒲州詩觧州倚郭一外縣二觧縣聞喜安邑郡號觧梁郡沿革天文觜參分野禹貢冀州之域春秋為晉之觧梁城戰國屬魏漢為觧縣屬河東郡後魏析置安定縣西魏改曰南觧縣屬綏化郡隋改為虞鄉縣屬蒲州唐初改曰觧縣貞觀初省入虞鄉後復置屬河中府五代漢始置觧州治觧縣本朝屬河東路復改陜西路沿革表縣沿革解縣本春秋晉之觧梁城戰國屬魏漢為觧縣屬河東郡後魏析置安定縣西魏改南觧縣屬綏化郡隋改為虞鄉唐初改觧縣聞喜春秋晉曲沃縣地秦改為左邑屬河東郡漢武帝經邑之桐鄉聞破南粤因名聞喜縣安邑禹營安邑即此地春秋時為晉境後屬魏秦漢為安邑縣同上形勝擅道山在州南與中條山相接玉鉤山在安邑縣東北狀如玉鈎陽山在聞喜縣東南山産銅上有殷湯廟白徑嶺在州東南路通陜州姚暹泉在觧縣北黒龍潭在安邑縣南深不可測上有龍池宫鹽池在州境虞坂在中條山伯樂逢騏驥困鹽車即此石門在州東南白徑嶺輿地紀勝人物漢裴潛聞喜人仕為代郡守匈奴讋服後為尚書令三國闗侯觧人仕蜀先主稱萬人敵拜前將軍假節鉞威震華夷常刺顔良報効曹公有國士風後封夀亭侯晉裴頠愽學稽古初為國}
