  - {type: variant, offset: 2808, length: 1, content: 猶, krp: 羽翼已成不可易也太子遂安同上集鷄聲茅店月人跡板橋霜温庭筠商山早行商嶺東西路欲分兩間茅屋一溪雲韋蟾贈商山僧人和如春晩静如秋五月商山是勝遊當晝火雲生不得一溪分作萬重流無名氏明朝從此辭君去獨出商闗路漸長張文昌近逢商路客知爾坐南塘張承吉四皓卧雲處千秋疊蘚生王貞白題商山晝煙籠澗黑殘雪逼林明同上秦法未興鴻已去漢儲將廢鳳還来自是無人有歸意白雲長在水潺潺本為留侯慕赤松漢庭方識紫芝翁蕭何只解追韓信豈得虛當第一功許渾本朝屬永寜軍路髙宗時秦檜力主和議割商與金沿革表二車何處搔蓬鬢九日樽前見菊花南秦地煖花開早比至春初已數畨並王元之題商州逺别秦城萬里遊亂山髙下入商州闗門不鎻寒溪水一夜潺潺送客愁宫址蔓生草洞門低枕泉廢興人目撃何處是神仙並李涉舉步髙登天漸近回頭下闞膽先寒南山居士虢州倚郭一外縣一盧氏虢略郡號雄虢郡沿革天文柳分野禹貢豫州之域周封虢仲於此漢為𢎞農郡治魏置洛安郡西魏為義川郡隋初改為虢州唐徙州治𢎞農五代及本朝俱為虢州沿革表縣沿革盧氏本莘國舊地漢因盧敖得仙始置盧氏屬𢎞農郡晉屬上洛郡後魏置洛安郡西魏改義川郡隋初改虢州皆治盧氏唐徙州治𢎞農五代及本朝俱屬虢州虢畧本𢎞農地本朝置虢畧同上形勝觀音山在盧氏縣西有觀音祠小青山在盧氏縣西産青碌抱犢山在州東南山極髙峻昔人多避兵於此老君山在州東南相傳老子修道於此上有丹竈丹井東澗水在州北斷宻澗在盧氏縣東北盛彦師斬李宻處傳道堂在盧氏縣治西北有孔子曾子塑像虢仲廟在盧氏縣東北輿地紀勝人物唐張士貴盧氏人善左右射從髙祖征賊有功進爵虢國公梁文貞虢州人少從軍守邉逮還親已亡自傷不得養即穿壙為門晨夕汛掃廬墓喑黙三十年家人有問書文以對有甘露降塋木白兔馴擾縣令刻石記之楊虞卿虢州人第進士博學宏詞累官御史穆宗時上䟽極諫累遷𢎞文館學士同上集邠王玉笛三更咽虢國金車十里香薛陶臣征塵暗河洛二陜震鼓鼙行軍在函谷兩度聞鶯啼聞君欲朝天駟馬臨道嘶蕭茂挺虢州送别因懐陳溪老最憶南峯緇薛岑過虢州柳嚲鶯嬌花復殷紅亭緑酒送君還到来函谷愁中月歸去磻溪夢裏山同上本朝熙寜二年以西京伊陽縣欒川治𨽻盧氏建隆初改𢎞農為常農至道三年改虢略熙寜四年省五城縣為鎮入虢略沿革表枝脉逺連荆楚外峰巒真出斗牛間丹崖彩鳳頻棲止紫氣青軿任往還朱師羙題老君山闗樹晩蒼蒼長安近夕陽回風醒别酒細雨濕行裝習戰邉塵黑防秋塞草黄李虛已虢州送别同州倚郭一外縣五馮翊澄城朝邑郃陽白水韓城郡號馮翊郡沿革天文井鬼分野禹貢雍州之域周為大茘國秦為内史地漢初置河上郡三國魏為馮翊郡西魏改為同州取禹貢灃水攸同之義隋罷州復置馮翊郡唐初復為同州治馮翊縣天寶初復為馮翊郡五代梁改忠武軍後唐復舊本朝改定國軍屬永興路沿革表縣沿革馮翊本秦内史地漢置河上郡後為左内史本朝改為馮翊縣屬同州朝邑春秋時為蒲闗戰國魏築城於此漢為臨晉縣地晉為馮翊郡治後魏分置南五泉縣西魏改朝邑縣以據朝坂故名唐改河西縣屬河中府大厯初復曰朝邑屬同州本朝因之郃陽古莘國地漢始置郃陽縣屬左馮翊以在郃水之陽故名五代梁屬河中府本朝屬同州澄城春秋時晉北徴地漢始置徵縣後誤徵為澄後魏置澄城郡隋初罷郡以縣屬同州唐初析置長寜縣五代梁屬河中府後唐復屬同州本朝仍舊白水春秋時名彭衙秦置白水縣以南臨白水故名漢為粟邑縣後魏改為白水縣復置白水郡隋初罷郡以縣屬同州韓城古韓梁二國地晉為少梁邑秦更名夏陽縣漢為夏陽縣地屬馮翊郡隋始析置韓城縣以古韓城為名唐初置西韓州貞觀間州罷以縣屬同州本朝因之同上形勝龍門山在韓城縣東禹貢導河至龍門乳羅山在郃陽縣南俗傳嘗有人過此山拾一卵置箱中後化為蛇復還此山名其蛇曰乳羅故山因以名風谷山在澄城縣西北山有風洞麓有風伯祠小秦山在白水縣西北相傳自古形勢阻隔後秦王過此山而兵不得行秦王下拜其山自崩郃水在郃陽縣西北詩曰在郃之陽即此遇仙橋在州西俗傳冦準少時遇仙人於此蒲津闗在朝邑縣東黄河岸闗下有鉄牛渡人物南北朝吉翰馮翊人參宋武帝中軍事清謹勤正為武帝所知累遷徐州刺史冦雋馮翊人有識量好學仕魏累官司馬出為梁州刺史有善政種種可稽後又為洛州刺史隋楊伯醜馮翊人好讀易隠於華山文帝召與語無所答賜衣服捨之而去唐嚴譔朝邑人武后時為詳審使平活八百餘人後拜右散騎常侍皇朝雷德驤郃陽人中進士為磁州刺史後歴官工部侍郎楊克讓馮翊人初為西川轉運副使蜀人懷其善政後知廣州張昇韓城人舉進士忠謹清直仁宗時累官至樞宻使並輿地紀勝集千載遺踪寄薜蘿沛公鄉里漢山河長陵亦是閑丘隴異日誰知與仲多房彦謙題郃陽劉仲城君不見左輔白沙白如水繚以周墻百餘里苑中騋牝三千匹豐草青青寒不萎杜甫題同州沙苑承華東署三分務履道西馳七過春白樂天為同州刺史龍門泉石香山月早晩同遊報一期白樂天山入白樓沙苑暮潮生滄海野塘春元微之寄同州白樂天本朝熙寜四年省夏陽縣為鎮入郃陽元祐二年置鑄錢監於韓城沿革表䟽鑿年采道路通行人萬古翠微中南山山寺題詩滿一字何曽到禹功王敏夫層崖摩蒼穹四月號隂風大河三門險神禹萬世功雷希顔華州倚郭一外縣四鄭邽下蒲城華隂渭南郡號華隂郡沿革天文井鬼分野禹貢雍州之域秦為内史地漢魏晉並為京兆𢎞農二郡地後魏置華山郡又改東雍州西魏改為華州隋省後置華山郡唐復為華州垂拱初改太州天寶初改華陽郡後復為華州乾寜中升興徳府又為鎮國軍五代梁改為威化軍唐復置為鎮國軍本朝改為鎮潼軍沿革表縣沿革鄭即鄭桓公封邑秦為縣後周移於西南九里隋又移於華州城内蒲城本漢重泉縣屬馮翊郡後魏於此置南白水縣西魏始改蒲城縣唐改奉先縣屬京兆府天祐間復屬同州五代時屬京兆本朝初屬同州尋復蒲城縣華隂戰國屬魏為隂晉地秦改曰寜秦漢始置華隂縣以在華山之隂故名唐分置潼津縣尋省入華隂本朝仍舊渭南漢新豐縣地苻秦始置渭南縣屬京兆府後魏改南新豐縣及置渭南郡西魏復渭南縣後周屬雍州唐復屬華州本朝因之同上形勝太華山在華隂縣南十里即西嶽也少華山在州南東連太華山𤣥象山在渭南縣東南三十里堯山在蒲城縣北二十里相傳堯洪水時諸山盡沒獨此山若浮故名金粟山在蒲城縣東北山有碎石若金粟然白堂山在蒲城東北秦白起立寨於此故名蟠龍原在蒲城西三十里唐明皇遊此見雲霧中有黄龍狀乃於下得石狀似蟠龍因名敷水在州東南姜泉在渭南縣城内金氏陂在渭南縣南二十里漢昭帝以金日磾有功賜此陂潼闗在華隂縣東四十里歴代皆為要地輿地紀勝人物漢楊震華隂人明經博覽時稱為闗西夫子五十始仕歴郡守拜太尉居官清白以四知却金劉寛華隂人性寛仁初守南陽以蒲鞭為朴後拜太尉封侯隋楊素華隂人數進平陳之䇿累加上柱國封公唐張仁愿下邽人有文武才為洛州長史盜不入境後封韓國公郭子儀鄭縣人討安史之亂功居第一封汾陽王八子四孫皆以才顯楊綰華隂人性至孝大厯中拜相制下朝士相賀奢侈者靡然改行白居易下邽人博學工詩初為左拾遺調江州司馬與元稹同名時號元白後官至刑部尚書皇朝冦準下邽人年十九舉進士初知同州又判永興軍盡心民事後拜相契丹入冦决䇿幸澶州後封莱公蔣偕鄭縣人性至孝父病嘗割股以療舉進士數上書論邉事累官忠州刺史韓丕鄭縣人幼孤貧讀書刻苦舉進士第初拜右諫議大夫守正不阿後為翰林學士同上集函谷稱地險襟帶壯神京唐太宗西岳崢嶸何壯哉黄河如絲天際来李白西嶽崚嶒聳處尊諸峯羅列似兒孫杜甫遶街流渺渺夾砌樹隂隂陸贄題姜泉瀑流蓮岳頂河注華山根賈閬仙少華中峯寺髙秋衆景歸地連秦塞起河隔晉山微張橋雲斷岳蓮臨大路天晴宫柳暗長春杜甫題鄭縣亭子天地併功開帝宅山河相凑表龍門薛陶臣借問潼闗吏修闗還備胡連雲列戰格飛鳥}
  - {type: variant, offset: 2811, length: 0, content: '', WYG: 踰杜甫岧嶢大華俯咸京天外三峯削不成河山北枕秦闗險驛路西連漢畤平崔顥本朝建隆初為鎮國軍節度皇祐五年改鎮潼軍節度開寶四年改奉先縣為蒲城建隆中自京兆𨽻同州天禧四年自同州来𨽻華州熙寜六年省渭南為鎮入鄭元豐元年復為縣舊自京兆府来𨽻華州沿革表應被華山髙士笑天真䘮盡得浮名王旦山色滿庭供畫障松聲萬壑即琴絃野花紅作陣溪水綠成行並陳摶㧞地三峯冷翠微落岩飛瀑噴珠璣十丈玉蓮秋不謝半楞掌月晝還飛王慶長過華州詩今日星馳劒南去回頭慚愧華山雲張覆之華山宮殿白雲封不見當年打睡翁王陽臣空聞華山名未始見顔色劉無黨經年但醉宜城酒千里誰擔華岳圖李九齡耀州倚郭一外縣四華原富平三原雲陽同官郡號華原威德郡沿革天文井鬼分野禹貢雍州之域秦為内史地漢為祋祤縣地後魏置北雍州隋為宜君郡治華原縣唐廢置不一天祐初置耀州建義勝軍五代梁改曰崇州及改静勝軍唐初復改為耀州又名順義軍本朝初復為威義軍又改威德軍沿革表縣沿革華原本秦内史地漢為祋祤縣唐置耀州屬華原縣富平本漢舊縣屬北地郡治後周屬馮翊郡隋初屬雍州唐又徙治義亭五代梁屬耀州本朝仍舊三原本漢池陽縣地晉時苻秦置三原護軍以其地在清酆原孟侯原白鹿原間故名唐置三原縣屬耀州本朝因之雲陽本漢昭帝所置唐廢同官本漢祋祤縣地秦置銅官護軍以川為名後魏罷軍為銅官縣屬北地郡後周改曰同官縣屬宜州唐屬耀州本朝仍舊同上形勝土門山在州東南四里中斷如門磬玉山在州東五里山出青石可以為磬鑑山在州東年豐則山中有光如鑑堯門山在三原西北三十里其山兩合如門荆山在富平西南禹貢荆岐既旅即此萬斛山在富平東北山有石形如斗斛者以萬數中山在富平縣漢武帝獲寶鼎}
