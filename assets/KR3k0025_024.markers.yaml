  - {type: variant, offset: 23, length: 5, content: 嘻嘻終吝家, WYG: 端百萬精兵傾紫塞幾多枯骨委黄沙郭紀塞垣通碣石虜陣抵祁連盧杲之本朝宣和二年始得雲中府沿革表雄臨絶塞風霜古寒逼新春草木踈王琮古来險阻邉陲地威震邊陲萬里驚元好問環珮䰟歸千里月琵琶聲起黒山秋元節旌旗影動胡塵沒笳鼔聲寒塞月明陳顥壘原青照白登山彌隴連天麥浪寒宇文叔通青冢埋魂知不返翠崖遺跡為誰留歐陽修應州倚郭一外縣一金城山隂郡號神武州沿革天文昴畢分野禹貢冀州之域古唐國地戰國屬趙為代郡地秦為隂舘縣屬鴈門郡漢因之東漢末廢後魏屬神武郡北齊改屬太平郡後周郡廢置隂城隋廢唐置金城以縣置應州以龍首鴈門二山南北相應故名沿革表縣沿革金城本古唐國地唐置金城縣山隂秦為鴈門郡隂舘縣地後改山隂縣同上形勝龍首山在縣北山之南跨雲中鴈門山在州南與龍首山相應翠微山在金城縣境香峯山在金城縣南復宿山在山隂縣南黄花山在山隂縣北金鳳井在州治相傳李克用生時有金鳳自井中飛出三岡四鎮俱在州境輿地紀勝}
