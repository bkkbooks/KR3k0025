  - {type: variant, offset: 1850, length: 0, content: '', WYG: 龍門人十歲誦古文後為太史令作史記胡建河東人為渭城令甚有治聲南北朝樂遜猗氏人明五經仕周官至揚州刺史隋王通龍門人篤學常奏太平十二策後居河汾著書甚多唐裴寂州人太祖朝累遷尚書左僕射拜司空贈河東郡公張𤣥素虞鄉人太宗時為侍御史嘗諫上治洛陽宫魏徵嘆其有回天之力王勃通之孫六歲善文後對䇿髙第兄弟四人皆登進士五代裴迪河東人精於簿書仕梁太祖稱其協}
