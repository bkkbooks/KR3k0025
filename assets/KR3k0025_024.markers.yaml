  - {type: variant, offset: 2812, length: 0, content: '', krp: 汾隂薦之甘泉鼎至中山有黄氣盖焉鄭國在富平縣南二十里輿地紀勝人物漢宣秉雲陽人少修髙節光武初拜御史中丞後拜大司徒唐李靖三原人姿貌魁竒貞觀初出將入相封衛國公圗形凌煙韓瑗三原人博學曉吏事永徽中為侍中王后之廢褚遂良之貶瑗力諫不納乞歸田里柳公綽華原人性孝友平生不讀非聖之書初補校書郎嘗奏箴以諷憲宗遊畋累遷檢校左僕射其弟公權舉進士為侍書學士穆宗時嘗以筆諫累官學士承㫖以太子太保致仕皇朝劉長孺耀州人為簽書博州判官㕔公事劉豫僭號長孺以書諭以禍福豫怒囚之百日終不屈同上集宮懸一聽華原石君心遂忘封疆臣白居易題磬玉山磬襄入海去不歸長安市人為樂師華原磬與泗濱石清濁}
