  body:
  - {type: variant, offset: 1, length: 13, content: 反所料經眇能視跛能履易履卦, WYG: 同上集漢下白登道胡窺青海灣李太白閫外傳三畧雲中冀一平張嘉貞聞道雲中使乘驄往復還河兵守陽日塞虜失隂山曽延清夜月降𦍑淚秋風老將心楊景山朝䟦青陂道暮上白登臺梁元帝}
