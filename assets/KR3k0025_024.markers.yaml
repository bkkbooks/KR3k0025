markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷二十四宋潘自牧撰郡縣部雲中府路雲中府倚郭一外縣四大同懷仁宣寜白登平池郡號雲中大同軍節度郡沿革天文昴畢分野禹貢冀州之域虞周屬并州春秋時北狄所居戰國屬趙秦為雲中鴈門代郡地東漢末郡廢三國魏屬新興郡晉改屬鴈門後魏徙都平城置司州牧及置代尹又置北恒州後周並廢隋以其地屬代朔雲三州唐初復置北恒州治雲中縣尋廢開元中置雲州天寳初改雲中郡乾元初復為雲州五代唐以雲州置大同軍節度本朝為雲中府地理沿革表縣沿革大同周大同川地戰國趙置雲中縣漢為鴈門郡平城地遼置大同縣懐仁本秦雲中縣地遼始析雲中為懷仁宣寜本宣德縣地後改宣寜白登本長清縣地後改白登平池本秦漢平城縣後改平池同上形勝白登山在府城東上有白登臺即匈奴圍漢髙處大寳山在府城北下有古城即漢武原郡官山在大同縣西北上有九十九泉流入黑河金龍山在懷仁縣西南雙化嶺在府城西盤據百餘里上有古寺遺跡海子在懷仁縣東其西北有泉深不可測桑乾河在府城南源出洪濤山下流入盧溝河君子津在古東勝州界漢時有大賈齎金行至此死津長為埋之後其子至悉金付之因名李陵臺在府城西北王昭君墓在郡境輿地紀勝人物隋杜彦雲中人性勇果善騎射初封公後平陳進位柱國五代折從阮雲中人世為大族仕後唐為刺史歴周漢節度四鎮卒贈中書令皇朝李漢雲中人初為齊州防禦使有善政後遷觀察使畢士安雲中人登進士累官參知政}
