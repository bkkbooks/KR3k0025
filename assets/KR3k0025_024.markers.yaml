  - {type: variant, offset: 2832, length: 0, content: '', WYG: 潄玉巖在延長東其中可容百人泉出如練延水在府東門外延利渠在府城南龍尾水在膚施縣北柳湖在府城南甘泉在甘泉縣南岩谷中飛流激下煬帝遊此飲而甘之人物皇朝李繼周郡人太宗時以功遷殿直後討西夏累功遷成州刺史韓世忠郡人目瞬如電鷙勇絶倫從髙宗南渡以功封咸安郡王張宗顔郡人父吉為涇原將解宣威城圍死之宗顔補官累遷崇定寜承宣使劉豫入冦宗顔自泗州為張浚繼遇劉猊大破之卒諡莊敏並輿地紀勝集雕隂寒食足遊人金鳳羅衣濕麝薰韋莊題雕隂山詩一株豪渥人争賞寜似延安花滿山逺近隨風香馥郁髙低迎目錦斕斑李延夀本朝元祐四年陞延州為府熙寜五年省豐林縣為鎮熙寜八年省延水縣為鎮入焉沿革表種柳穿湖後延安盛可遊逺懷忘澤國真賞即瀛州范仲淹題栁湖詩枝分清淺流縱横貫城市還如恩在人潤澤無終既司馬光題延利渠煙雲常帶雨草樹不知春暮煙凝塞上候火落天涯並同上鄜州倚郭一宜川郡號洛交郡沿革天文井鬼分野禹貢雍州之域本秦漢上郡地晉置吉城鎮後魏於鎮置東秦州又改為北華州後改為鄜州隋罷州置鄜城郡唐復為鄜州天寶初改洛交郡後置保大軍節度乾元初仍為鄜州本朝於州置康定軍沿革表縣沿革宜川本秦漢上郡地後魏置義川縣周改為丹陽縣隋復義川後改丹陽郡唐改為丹州縣屬焉本朝改為宜川縣同上形勝櫻桃山在州南上多櫻桃樹龜山在州西以形似名鳳翅山在宜川東以形似名雲岩山在宜川北山形重疊如雲孟門山在宜川北黄河中流庫利山在宜川縣境開元坡在州北汾川在宜川北東流入黄河三川水在州南保大樓在州内唐時建鄜畤在州治秦穆公夢大蛇止鄜畤因此立畤塵玉亭在州内二賢祠在州内祀杜甫范仲淹渾瑊祠在宜川境内長城在州西南秦時所築庫鍋在宜川西北蕃之人香火同此杜甫宅在州南輿地紀勝人物唐杜甫襄陽人後寓鄜州為右拾遺善詩為古今絶唱法天本天竺摩伽陀國僧也寓居鄜州太祖召見賜紫方袍崔仲芳築城於鄜州有功同上集三川會合古鄜州紆紱来寛宵旰憂静守化條無一事東風獨上夕陽樓武元衡題保大樓花落塵中玉墮泥香魂應上窈娘堤欲知此恨無窮處長倩城烏夜夜啼羅虬詩開元坡下日初斜拜掃歸来走鈿車韋莊題開元坡三川不可到歸路晩山稠落鴈浮寒水飢烏棲戍樓杜甫今夜鄜州月閨中只獨看同上小會三川碧漾波雕隂人唱採菱歌鄭玉本朝太平興國中改義川為宜川以鄜州廢威寜縣入焉熙寜三年省汾川縣七年省雲巖縣為鎮八年析同州韓城縣新豐鄉並入宜川沿革表兩}
