  - {type: variant, offset: 246, length: 313, content: 象以瞽瞍為父而有舜以紂為兄之子且以為君而有微子啟王子比干孟子告子上生於憂患而死於安樂告子下生無一日之歡死有萬世之名列子楊朱篇以瓦注者巧以黃金注者昏莊子以瓦摳者巧以黃金摳者惛列子黃帝篇天下莫相憎於膠漆而莫相愛於冰炭膠漆相賊冰炭相息也淮南子說山訓善游者溺善騎者墮淮南子或欲利之適足以害之或欲害之乃反以利之利害之反禍福之門戶不可不察也淮南子人間訓互見致察史天下君王至于賢人眾矣當時則榮沒則已焉孔子布衣傳十餘世學者宗之史記孔子世家雍造怨而先賞兮丁繇惠而被戮西漢班固傳白頭如新傾蓋如故同上鄒陽傳譬如水火相滅亦相生也仁之與義敬之與和相反而皆相成也西漢藝文志千鈞浮而錙銖沈漢書柔能制剛弱能制強東漢臧宮傳桀紂貴為天子而庸僕羞與為比者以其無義也, WYG: ''}
