  - {type: variant, offset: 130, length: 0, content: '', WYG: 形勝翠峰山在州西南上有石佛洞燕京山在州西南上有天池東靈山在州西上有臺亭神武尖山在鄯陽境元姬山在馬邑境居延川在朔州北一名居延澤漢蘇武常困於此澤天德山在州北漢李陵行軍至此洪濤山在馬邑縣西下有桑乾河神廟紫金山在馬邑縣南髙二十里連亘數百里太和嶺在馬邑縣東上有寨魯臺在馬邑縣西北唐李靖築此觀星鴈門闗在馬邑縣東南七十里輿地紀勝人物南北朝斛律金縣人善騎射仕至汾州刺史以功封咸陽郡王唐尉遲恭鄯陽人有戰功累封鄂國公五代周德威馬邑人唐莊宗時累官平章政事安重榮州人善騎射晉髙祖時受武節拜成德軍節度皇朝党進馬邑人從征太原以功歴忠武軍節度同上集北遊幽朔城凉野多險艱俯入窮谷底仰陟髙山盤陸士衡髙秋登寒山南望馬邑州翠峰入青冥攬勝此勾留李端蘇武魂銷漢使前古祠髙樹兩茫然雲邊鴈斷胡天月隴上羊歸塞草煙温飛卿鼓角因風飄朔氣旌旗映水發秋光楊巨源白頭蘇屬國握節幾時還王懋建士卒並持蘇武節酋魁莫作李陵㸔顧孔文本朝宣和五年契丹守將韓正以州来降沿革表朔風刮面歲華遒閑擁豐貂一倚樓四野凍雲隨地合九河清浪著天流元章簡嘗聞朔北寒尤甚已見黄河可過車馹騎駸駸持漢節邉風慘慘聽胡笳梅聖俞蔚州郡號代國州沿革天文昴畢分野禹貢冀州之域春秋時屬晉戰國屬趙秦置代縣屬代郡漢封代王於此為代國東漢末廢後魏於此置靈丘郡後周兼治蔚州隋郡廢州存大業初州廢唐復置蔚州治靈丘至德初改安邉郡後復為蔚州沿革表形勝九宮山在州東五臺山在州東玉屏山在州西倒刺山在州東襄山在州北胡蘆河在州城北煖泉在州西其水夏凉冬煖金箔泉在州境蓮花泉在州東北鎮邊樓在州境隘門闗在州西南代王城在州東漢文帝封代即此飛狐口在州境輿地紀勝人物唐侯仲莊為定武將軍有功累加冠軍將軍同上集飛狐白日晩瀚海愁雲生虞子陽家居五原上征戰是平尘獨負山西勇誰當塞上行緯卿須識苦寒士莫矜狐白温同上郭外秋聲急城邊月色殘王少伯胡馬如雲屯越騎亦星羅飛鋒無絶影鳴鏑自相和陸士衡本朝宣和五年契丹守將陳翊以州来降沿革表雲度飛狐絶險天圍紫塞髙寒趙獻之曲西北天低五頂髙茫茫松海露闕渾源州郡號代郡州沿革天文畢昴分野禹貢冀州之域戰國時屬趙代郡秦屬鴈門郡漢為平舒崞二縣地屬鴈門代郡東漢末廢後魏屬神武郡隋屬鴈門郡唐置渾源州以川為名沿革表形勝恒山在州南二十里即北岳也髙侵霄漢舜北巡狩即此翠屏山在州栢山之南華麗似翠屏然五峯山在州東五峯如削畵錦山在州西封龍山在州南渾源川在州西南滙為大澤}
