  - {type: variant, offset: 2811, length: 0, content: '', krp: 踰杜甫岧嶢大華俯咸京天外三峯削不成河山北枕秦闗險驛路西連漢畤平崔顥本朝建隆初為鎮國軍節度皇祐五年改鎮潼軍節度開寶四年改奉先縣為蒲城建隆中自京兆𨽻同州天禧四年自同州来𨽻華州熙寜六年省渭南為鎮入鄭元豐元年復為縣舊自京兆府来𨽻華州沿革表應被華山髙士笑天真䘮盡得浮名王旦山色滿庭供畫障松聲萬壑即琴絃野花紅作陣溪水綠成行並陳摶㧞地三峯冷翠微落岩飛瀑噴珠璣十丈玉蓮秋不謝半楞掌月晝還飛王慶長過華州詩今日星馳劒南去回頭慚愧華山雲張覆之華山宮殿白雲封不見當年打睡翁王陽臣空聞華山名未始見顔色劉無黨經年但醉宜城酒千里誰擔華岳圖李九齡耀州倚郭一外縣四華原富平三原雲陽同官郡號華原威德郡沿革天文井鬼分野禹貢雍州之域秦為内史地漢為祋祤縣地後魏置北雍州隋為宜君郡治華原縣唐廢置不一天祐初置耀州建義勝軍五代梁改曰崇州及改静勝軍唐初復改為耀州又名順義軍本朝初復為威義軍又改威德軍沿革表縣沿革華原本秦内史地漢為祋祤縣唐置耀州屬華原縣富平本漢舊縣屬北地郡治後周屬馮翊郡隋初屬雍州唐又徙治義亭五代梁屬耀州本朝仍舊三原本漢池陽縣地晉時苻秦置三原護軍以其地在清酆原孟侯原白鹿原間故名唐置三原縣屬耀州本朝因之雲陽本漢昭帝所置唐廢同官本漢祋祤縣地秦置銅官護軍以川為名後魏罷軍為銅官縣屬北地郡後周改曰同官縣屬宜州唐屬耀州本朝仍舊同上形勝土門山在州東南四里中斷如門磬玉山在州東五里山出青石可以為磬鑑山在州東年豐則山中有光如鑑堯門山在三原西北三十里其山兩合如門荆山在富平西南禹貢荆岐既旅即此萬斛山在富平東北山有石形如斗斛者以萬數中山在富平縣漢武帝獲寶鼎}
  - {type: variant, offset: 2812, length: 0, content: '', WYG: 汾隂薦之甘泉鼎至中山有黄氣盖焉鄭國在富平縣南二十里輿地紀勝人物漢宣秉雲陽人少修髙節光武初拜御史中丞後拜大司徒唐李靖三原人姿貌魁竒貞觀初出將入相封衛國公圗形凌煙韓瑗三原人博學曉吏事永徽中為侍中王后之廢褚遂良之貶瑗力諫不納乞歸田里柳公綽華原人性孝友平生不讀非聖之書初補校書郎嘗奏箴以諷憲宗遊畋累遷檢校左僕射其弟公權舉進士為侍書學士穆宗時嘗以筆諫累官學士承㫖以太子太保致仕皇朝劉長孺耀州人為簽書博州判官㕔公事劉豫僭號長孺以書諭以禍福豫怒囚之百日終不屈同上集宮懸一聽華原石君心遂􅁯封疆臣白居易題磬玉山磬襄入海去不歸長安市人為樂師華原磬與泗濱石清濁}
  - {type: page-break, offset: 2812, content: '', id: KR3k0025_WYG_024-38a, image: WYG0930/WYG0930-0551a.png}
