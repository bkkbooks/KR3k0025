  - {type: variant, offset: 2960, length: 3, content: 尹而裴, WYG: 郡唐析醴泉等五縣地置奉天縣又置乾州五代梁為威勝軍唐復為乾州屬鳳翔府本朝罷政和中復置改為醴州沿革表縣沿革奉犬秦内史地漢屬左馮翊晉屬扶風後魏為􅊂寜縣隋改醴泉唐置奉天縣永夀在州城北九十里古豳國地漢為右扶風之漆縣地後魏置廣夀縣後周改永夀縣隋省入新平縣唐復析置神龍中屬京兆府景龍初復屬邠州本朝屬醴州武功在州城西南六十里古為邰國后稷所封地秦孝公始置武功縣後魏改羙陽縣又置武功郡後周俱省尋復置武功縣醴泉在州城東七十五里本漢左馮翊谷口縣地東漢及晉為池陽縣後魏改寜􅊂縣隋改醴泉縣因後周醴泉宫為名唐初析置温秀縣後省入醴泉本朝割屬醴州好畤在州東七里本漢縣後周省本朝復置同上形勝梁山在州北五里古公亶父踰梁山至岐下即此烈山在永夀縣三里上有烈山神祠明月山在永夀縣西南九十里夜望之如月明故名峗山在永夀縣西南九十里其山巍然故名武將山在醴泉縣西北十八里九􅉄山在醴泉縣西北六十里髙百餘丈承陽山在醴泉西北五十里左右有水合流上有唐太宗昭陵太白山在武功縣南九十里山極髙上恒積雪望之皓然軍行不得鳴皷鳴則疾風暴雨立至上有洞名十一洞天又有横雲如瀑布則澍雨上有太白湫有神龍歳旱禱雨多應武功山在武功縣南一百里北連太白山巖巍秀傑五丈原在武功西南七十里即諸葛亮屯兵處醴泉在醴泉縣東南二十里泉湧出味如醴良溝泉在武功北十五里引以溉田邑民賴之吕公泉在永夀縣慶善宫在武功南十八里穆陵闗在永夀南四里竇女墓在州北二十里人物南北朝蘇綽武功人博物多通為宇文泰行臺郎中周惠達稱其有王佐才官至}
