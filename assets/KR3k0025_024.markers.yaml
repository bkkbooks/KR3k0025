  - {type: variant, offset: 2402, length: 274, content: 將功高少有文同上以楊馬之才則不知教化以荀陳之道則不知文章柳冕論文互見得此失彼同涉于川其時在風沿者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄劉賓客互入所遇不同光武出於支庶少康不及君親王維集日月高明有時傾昃珠玉貞潔不免疵瑕歐陽詹文全功難持大名難堅日赫於晝而乏清媚月皎於夜而無溫照李文饒鵰鷹不傳之以馳騁驊騮不授之以騫翥同上周勃霍光雖有勳伐而不知儒術枚皋嚴忌善為文筆而不至廊廟貴則近禍富多不仁並同上及親之貴自古罕兼老萊則空耀綵衣多慚紱冕潘岳則惟稱壽酒固乏鼎彝司空表聖文賢不必貴壽不必賢皇甫湜集荊璧不能無瑕隋珠不能無纇唐文粹譽高千載道屈一時天乎與才人乎無命, WYG: 燕頷㑹封侯}
