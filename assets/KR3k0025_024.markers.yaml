  - {type: variant, offset: 131, length: 1, content: 庸, WYG: 有孤石髙丈餘上有神祠孫臏山在州南因上有孫臏寨故名輿地紀勝人物漢范升郡人九歲通孝經長習易教授生徒光武朝拜議郎遷博士南北朝燕鳳博綜經史為代王長史叅決國事皇朝劉撝州人舉進士仕至石州刺史蘇保衡州人舉進士累官參知政事劉仲亨妻田氏亨卒氏年二旬餘遂自經事聞旌表其門同上集水嶺人無跡氷合足鴈聲李端風旂翻翼影霜劍轉龍文駱賓王絶壁千尋孤峯萬仞寳符臨代邦之羙靈蛇表陣勢之竒唐太宗祀恒嶽文鑠石七年無以虧其大含波九載不能損其髙同上本朝雙鯉附書常不逹兩萍浮海偶相逢燕南落日車分轍代北春風酒滿鍾朱好謙過渾源無定河邉路風髙雪洒春王正羙山雲吞吐翠微中淡翠深青一萬重闕陜西永興軍路京兆府倚郭二一長安外縣十鄠樊川藍田咸陽涇陽武櫟陽乾髙陽功祐興平臨潼醴泉郡號永興安西郡沿革天文井鬼分野禹貢雍州之域周為王畿地秦置内史以領闗中漢初置渭南郡尋罷郡復置内史景帝分置左右内史此為右内史武帝改京兆尹與左馮翊右扶風為三輔東漢於此置雍州尋罷三國魏改尹為守晉置雍州理京兆未幾為劉石姚苻所據後魏仍置雍州西魏後周皆置京兆尹隋初置雍州尋改為京兆郡唐初復為雍州又改京兆郡尋復雍州開元初改京兆府自周秦漢晉西魏及周隋唐並都於此唐末為佑國軍五代梁改永平軍後唐復為京兆府晉改曰晉昌漢改曰永興本朝仍京兆府屬永興軍沿革表縣沿革長安秦因古地名曰長安漢都闗中始置為縣樊川本漢萬年縣地本朝置樊川縣鄠本夏時扈國漢置鄠縣藍田本秦舊縣其地出玉故名咸陽本秦舊縣其地在山南水北故名涇陽本秦舊縣以居涇水之北故名櫟陽本秦縣漢髙帝初都此髙陽秦舊縣亦名懷德城興平本周太丘地唐置興平軍尋改為縣臨潼周為驪戎國本朝為臨潼縣醴泉本漢左馮翊谷口縣地隋置醴泉縣武功后稷所封地秦置武功縣乾祐秦為内史地亦在長安之乾隅故名同上形勝龍首山在府城北長六十里終南山在府城南産玉石金銀銅鐵上有神祠太一山在終南山南上揷雲霄驪山在臨潼縣東南金斧山在驪山東南金山在藍田縣南上有風后廟七盤山在藍田縣南嶢山在藍田縣南嶢闗之名取此甘泉山在涇陽縣西北太白山在武功縣南上多積雪望之皓然子午谷在府城南細栁原在昆明池南上林苑凝碧池在唐禁苑中通靈臺在甘泉宫魚藻池在唐禁苑中渼陂在鄠縣西長信宫在咸陽縣境阿房宫在咸陽縣東望夷宫在涇陽縣東未央宫在府城西北長樂宫在府城西北建章宫在府城西北甘泉宫在涇陽縣大明宫在府城東北華清宫在驪山天禄閣在未央宫沉香亭在興慶宫造書臺在長安縣西即倉頡造書處靈臺在鄠縣東栢梁臺在未央宫北藍田闗在縣東南霸橋在府城東五帝廟在長安東漢唐諸陵俱在郡境梨園在通化門外五丈原在武功縣西馬嵬坡在興平西鴻門坂温泉俱在驪山太液池曲江池俱在郡境輿地紀勝人物上古倉頡黄帝時人始造書契周壤駟赤秦人孔門弟子漢魏尚興平人為雲中太守匈奴不敢犯塞宋𢎞長安人以清介著聞封宣平侯景丹櫟陽人以功封櫟陽侯圖形雲臺晉摯虞長安人才學通愽歴官秘書監唐屈突通長安人以功官至兵部尚書封國公劉文静咸陽人贊太祖起義兵官至吏部尚書李大亮涇陽人有文武才畧官至工部尚書殷開山鄠縣人從太宗征伐有功仕至吏部尚書圖形凌煙蘇世長武功人為諫議大}
