  - {type: variant, offset: 2814, length: 1, content: 況, WYG: 知同上壓河連華勢巉巗鳥沒雲歸一望間楊僕移闗三百里可能全是為荆山李義山題富平荆山詩北上惟土門連天走窮谷杜甫本朝開寶五年為威義軍節度太平興國初改威德軍沿革表荆山已去華山来日出潼闗四扇開韓愈清平軍倚郭一終南郡號盩厔郡沿革天文井鬼分野禹貢雍州之域本漢舊縣屬右扶風山曲曰盩水曲曰厔故以為名後周徙縣於鄠縣西北而於此置恒州後置周南郡隋初以縣屬京兆唐改宜夀縣至德初復為盩厔縣天復初屬鳳翔府本朝因之沿革表縣沿革終南本漢盩厔縣地東漢省晉復置唐改為終南縣屬鳳翔府本朝因之同上形勝終南山在縣南三十里石樓山在縣東峯巒層疊如樓沉嶺在縣南五十里漢姜維出師經沉嶺即此玉女洞在縣西南洞門旁有飛泉味甚佳飲可愈疾芒谷在縣東南谷中有漢馬融讀書石室處五郡城在縣東舊說有義兄弟五人共居此城輿地紀勝人物漢陳遵終南人哀帝末以功封舊威侯性好客每㑹客取客車轄投井中南北朝韋孝寛終南人沉敏和正涉獵經史西魏為淅陽郡守有政術後以功進大司空上柱國皇朝趙瞻盩厔人第進士歴知萬泉夏縣皆有善政累遷同知樞宻院事同上集洪河清渭天池濬太白終南地軸横祥雲輝映漢宫紫春光繡畫秦川明杜牧之野日初晴麥隴分竹園村巷鹿成群盧永言歸盩厔詩貪㸔終南山色好不知紅日下前峯王陽臣本朝大觀元年陞為軍復置終南縣𨽻京兆府清平軍使兼知終南縣沿革表古觀正依林麓斷居民来說水泉甘亂谿赴渭争趨北飛鳥迎山不復南蘇軾遊五郡城詩誰知南山下取水亦置符古人辨淄澠皎若鶴與鳬題玉女洞詩延安府倚郭一外縣五膚施延川延長門山臨真甘泉郡號上郡金明郡沿革天文井鬼分野禹貢雍州之域春秋時白翟所居秦屬上郡漢初屬翟國尋屬上郡東漢時郡邑俱廢晉陷於戎後魏以為統萬鎮未幾置金明郡又改東夏州後改為延州取延水為名隋初仍為州大業改延安郡唐初復為延州天寶初改延安郡乾元初復延州五代梁置忠義軍節度後唐改彰武軍本朝初仍為延州屬鄜延路元祐中陞為延安府沿革表縣沿革膚施本秦舊縣屬上郡三國魏廢隋復置本朝屬延安府延川本秦臨河地漢屬朔方郡隋改為延川縣取界内延川為名唐屬延州又析置安民縣後改曰延水本朝省延水縣入焉延長本秦漢膚施縣地後魏置廣安縣唐改為延安縣屬延州本朝屬延安府門山周宣帝分汾州雲巖二縣地置門山縣漢唐并本朝因之臨真本漢髙奴地後魏置縣唐本朝因之甘泉本漢上郡雕隂縣地唐置伏陸縣天寶改甘泉縣鄜州本朝屬延安府同上形勝嘉嶺山在府東南形勢髙峻伏龍山在府北以形似名雕隂山在甘泉縣南山多土穴為鷹雕所居温泉山在甘泉縣南下有温泉青眉山在延川縣西北後魏時有土蕃青眉簇居此牡丹山在府南屏山在延長縣治南}
