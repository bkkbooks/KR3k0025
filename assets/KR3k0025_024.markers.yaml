  - {type: variant, offset: 29, length: 1, content: 卦, WYG: 物五代安重誨州人唐昭宗時官至中書令盡忠補過人皆稱焉周宻州人仕晉歴三鎮節度後仕周累官太子太師皇朝李重誨金城人初補鄧州指揮後以功陞招安制置使同上集古戍依重險髙樓見五凉山根盤驛道河水浸城墻岑參題金城樓汗馬牧秋月疲卒卧霜風仍聞左賢王更欲圍雲中劉灣月落雲沙黑風迴草木腥竇胃卿岧嶤試一臨虜騎附城隂不辨風塵色安知}
