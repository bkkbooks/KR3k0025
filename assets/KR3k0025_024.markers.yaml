  - {type: variant, offset: 2705, length: 99, content: 士功烈顯於朝廷名譽光於竹帛故其常視文章為末事而又有不暇與不能者焉至於失志之人窮居隱約苦心危慮而極於精思與其有所感激發憤惟無所施於世者皆一寓於文辭故曰窮者之言易工也如唐之劉柳無稱於事業而姚宋不見於文章, WYG: ''}
