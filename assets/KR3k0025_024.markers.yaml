  - {type: variant, offset: 2682, length: 0, content: '', WYG: 祭酒累遷尚書侍中衞瓘蚤以孝稱仕魏為散騎常侍後進位太保一門人物甚盛南北朝柳崇州人後魏時舉秀才髙第歴尚書郎中累遷河中守隋裴矩博涉經史仕為吏部侍郎唐薛收道衡子初為秦王府主簿後以功封汾隂縣男裴行儉聞喜人舉明經有知人}
