  - {type: variant, offset: 2689, length: 1, content: 或, WYG: 存范鎮商州倚郭一外縣二上洛洛南豐陽郡號上洛郡沿革天文井鬼分野禹貢雍州之域本契始封地周為豫州之境春秋屬晉後屬秦漢於此置上洛縣屬𢎞農郡晉置上洛郡後魏置洛州後周改為商州取古商於地為名隋復為上洛郡唐初復為商州天寶初為上洛郡乾元初復商州屬闗内道本朝屬永興軍路沿革表縣沿革上洛本契始封地周為豫州之境春秋屬晉後屬秦漢置上洛縣屬𢎞農郡洛南春秋時晉上洛地漢為上洛縣地晉析置拒陽縣尋省後魏復置隋初屬商州尋改曰洛南縣以在洛水之南故名豐陽本古商州地以在豐水之南故名同上形勝髙東山在州西南以其髙於東山故名熊耳山在州西以形似名商洛山在州東即四皓隠處竹山在上洛東南丹水所出𤣥扈山在洛南縣西北世傳黄帝時有鳳銜圖至此帝拜受之武闗在州東李彦仙祠在州境上有忠烈祠四皓墓在州西前有祠冢嶺山在州南洛水所出輿地紀勝人物秦東園公綺里季夏黄公甪里先生避秦不仕隠居商山號為商山四皓後漢髙祖欲廢太子吕后命張良請四人至隨太子}
