  - {type: variant, offset: 2687, length: 0, content: '', WYG: 本朝東北嶺髙明月曉西南川逺夕陽多地饒勝槩連靈岳民足豐年藉綠波王荀龍中條山下王官谷草木煙霞景物幽坐中爽氣長飄洒天際浮雲任去留同上陜州倚郭一外縣六陜陸平夏靈寳芮城湖城閔鄉大都督府郡號𢎞農郡沿革天文柳分野禹貢豫州之域周為虢國地王季子虢仲封於此周召分治東西以陜為界即此春秋時屬晉後屬韓韓㓕入秦漢置陜縣為𢎞農郡治魏晉因之後魏始置陜州隋大業初州廢以縣屬河南郡後復置𢎞農郡唐初復為陜州天寳初改陜府乾元初改陜郡昭宗時陞為唐興府哀宗初置保義軍本朝改保平軍後為陜州沿革表縣沿革陜本周虢國地春秋時屬晉後屬韓漢置陜縣平陸春秋虞國地戰國屬魏漢屬河東郡後魏置河北郡唐天寳初因開漕瀆得古劒有篆文曰平陸故名夏本禹所都之地漢為安邑縣境後魏改為夏縣以禹舊都故名靈寳本秦函谷闗地漢置𢎞農縣魏晉因之隋屬虢郡唐天寶初得寶符於古函谷闗故名芮城本魏國附庸春秋時芮伯居此後周改芮城縣湖城本漢湖縣地屬京兆因津以名閿鄉本漢閿鄉地後周置閿鄉郡隋廢郡為閿鄉縣同上形勝砥柱山在州東黄河中上有三門禹鑿以通河流者峴山在靈寶縣東荆山在閿鄉縣南昔軒轅黄帝鑄鼎於此砥柱峯在平陸東南世傳老子煉丹於此傅巖在平陸縣東即傅說隠處龍泉在芮城縣北旁有五龍祠墨池在州境漢張芝好書所居池水盡黑遺跡尚存阿對井在閿鄉縣西南漢楊震家童引泉灌蔬故名九龍泉在閿鄉縣南泉有九窟上陽宫在閿鄉境翠微宫在靈寶縣北繡嶺宫在州西南西樓在州境三鱣堂在州境楊震教書處草堂在州境魏野所居真宗常畫圗以觀望氣臺在州境春秋時闗令尹見有紫氣後老子乘青牛過此鷄鳴臺在靈寶縣治孟嘗君過闗之處望仙臺在州西漢文帝築此以望河上公大陽闗在州西硤石闗在州東潼闗在閿鄉縣西女媧陵在閿鄉縣境人物商傅說平陸人髙宗賢相周段干木芮城人魏文侯之師文侯過其閭必式晉王濬湖城人家世二千石以平吳有功累加大將軍唐姚崇州人少尚氣節初授蒲州叅軍後拜相封梁國公張齊賢州人初為太常奉禮郎論禮制合古義累遷諫議大夫五代髙季興州人梁初拜荆南節度使後以功封渤海王皇朝魏野陜縣人隠居清介號草堂居士累徵不就司馬光州人舉進士累官端明殿學士著述甚多贈太師封温國公王繼勲州人初授道州刺史有武功陞行營都監並輿地紀勝集六載抽毫侍禁闈吳融頂壓三門險根随九曲深撐天形突兀逐浪勢浮沉柳公權題砥柱山五陵年少如相問阿對泉頭一布衣同上春草萋萋春水綠野棠開盡飄香玉繡嶺宫前鶴髪翁猶唱開元太平曲李洞秋来無覔處直上郡西樓岑參題西樓侯門草滿罝寒兔浴浦沙深見塞鴻疑有女娥西望處上陽煙樹正秋風杜牧之本朝太平興國初改寶平軍舊兼提舉商虢州兵馬巡檢事咸寜四年省湖城縣入靈寶元豐元年復置太平興國三年自虢州與湖城二縣來𨽻閿鄉沿革表晝睡方濃向竹齋柴門日午尚慵開驚回一覺遊仙夢村巷傳呼宰相来魏野自題草堂詩古人惟恃衆心城何事秦皇苦好兵本設函闗禁奸詐不知半夜有鷄鳴范鎮西祀東封今已畢這回好伴赤松遊魏野上王旦好去上天辭富貴却来平地作神仙魏野上冦準幽居帝畫㸔同上蒼山綠水依然是不獨青編}
