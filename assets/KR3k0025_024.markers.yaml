  - {type: variant, offset: 1963, length: 0, content: '', WYG: 詠蒲坂横臨晉華芝曉望秦闗城雄地險橋路託天津張說白日依山盡黄河入海流欲窮千里目更上一層樓朱佐日逈臨飛鳥上髙出世塵間天勢圍平野河流入斷山暢當蒲州詩地險闗逾壯天平鎮尚雄春来津樹合月落戍樓空唐太宗寂寞首陽山白雲空復多蒼苔歸地骨皓首采薇歌李頎山路猶南屬河源自北流晩風連朔氣新月照邉秋駱賓王竈火}
