  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0025_CHANT_061-1a.3}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 孔子曰舟非水不行水入舟則舟沒家語六本篇仲尼曰吾終身與汝交一臂而失之謂顔回也莊子自其異者眡之肝膽楚越也自其同者眡之萬物皆一也莊子徳充符人之所以異於禽獸者㡬希庶民去之君子存之孟子離婁上善擇者制人不善擇者人制之茍子王伯時之反側間不容息淮南子原道訓適堯舜文王者為正道非堯舜文王者為他道揚子問道先甲一日易後甲一日難揚子先知御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵揚子互入在人所為開之廓然見四海閉之閛匹庚切然不覩墻之裏揚子問道由其徳舜禹受天下不為泰不由其徳五兩之綸半通之銅亦泰矣揚子孝至史先則制人後則}
