  - {type: variant, offset: 3439, length: 751, content: 當杜工部詩氣衝看劍匣穎脫撫錐囊同上丈夫四方志安可辭固窮同上安得覆八溟為君洗乾坤飲酣眠八極俗物都茫茫萬古雲霄一羽毛直氣橫乾坤劉毅從來布衣願家無儋石輸百萬使君意氣凌青霄欲傾東海洗乾坤會當凌絕頂一覽眾山小倚賴天涯釣猶能掣巨鰲飲如長鯨吸百川銜盃樂聖稱世賢氣與嵩華敵赤霄有真骨恥飲洿池津冥冥任所往脫略誰能馴歌笑輕波瀾氣衝星象表氣劘屈賈壘目矩賈釗墻威鳳高其翔長鯨吞九州並同上高眡覺天卑元微之集因騎渡海鶻擬殺蔽天鵬一心吞渤澥戮力拔嵩常鋒鋩斷犀兕波浪蓬壺摩天氣直山曾拔並同上巨鰲莫載三山去我欲蓬萊頂上行李太白大鵬一日同風起摶搖直上九萬里假令風歇時下來猶能搊卻滄溟水一擊九千仞相期凌紫氛倒海索明月呼吸走百川燕然可摧傾叱咤開帝業手成天地功雄心日千里欲上青天攬明月意重泰山輕安得倚天劍跨海斬長鯨誓欲斬鯨鯢澄清洛陽水天地賭一擲長揖韓荊州六博爭雄好采來金盤一擲萬人開丈夫賭命報天子當斬胡頭衣錦迴猛虎不看几上肉洪鑪不鑄囊中錐並李太白踔厲風發率常屈其坐人韓文作柳宗元墓誌囊無一金資翻謂富者貧同上爛死於泥沙吾寧樂之若俛首帖耳搖尾而乞憐者非我之志也同上與韓舍人書肝謄一古劍波濤兩浮萍同上擇肉於熊羆肯視兔與狸同上互見決擇排雲叫閶闔披腹呈琅玕勁氣沮金石飲酒寧嫌琖底深題詩尚倚筆鋒勁同上韓文千金散盡還復來李白獨立堂堂高眡前古劉長卿自矜倚劍氣凌雲卻笑聞笳淚如雨同上生當為大丈夫斷羈羅出泥塗四散號呶俶擾無隅埋之深淵飄然上浮騎龍披青雲汎覽遊八區經泰山絕大海一長吁西摩月鏡東弄日珠上括天之門直指帝所居皇甫湜我有一寸鉤欲釣千丈流孟郊天地入胸臆同上胸吞百川流孟東野酒腸寬似海詩膽大如天劉義壯志吞鴻鵠孟浩然安得凌風翰肅肅賓天京韋應物高論動侯伯踈懷脫塵喧同上興來書自聖醉後語猶顛高達夫我有醉卿劍玉鋒堪截雲同上入門下馬氣如虹氣如虹蜆飲如建瓴並同上一飲千鍾如建瓴, WYG: 熱}
