  - {type: variant, offset: 3042, length: 1, content: 丈, WYG: 互入識者所窺傳記謝𤣥以八萬當苻堅百萬之衆其勢不敵若苻堅逼肥水而陳必保萬全惟麾軍却退衆亂不能止故敗世謂謝𤣥能走苻堅者此耳孔氏雜説集虎見驢鳴大駭然往來視之覺無異能益習其聲稍近驢怒蹄之虎曰技止此耳因斷其喉盡其肉乃去噫形之厖也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲}
