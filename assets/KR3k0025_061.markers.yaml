  front:
  - {type: variant, offset: 0, length: 2, content: 阿附, WYG: 欽定四庫全書記纂淵海卷六十一宋潘自牧撰論議部袖手旁觀史利不在身以之謀事則智慮不私己以之斷義必厲東漢馬援傳互入無心門集坐觀垂釣者空有羨魚情孟浩然巧匠旁觀縮手袖間韓集自彈不若聽人彈白集本朝望室而知四隅者必超室表舉輿而知輕重者必在輿外老泉操舟常患不見水道之曲折而水邊之立觀者常見之奕棊之形雖國工有所不盡而袖手旁觀者常得之東坡秉燭者不如随燭之明奕棊者不如觀棊之精通鑑論篤間不容髪經差若毫釐繆以千里記經解財聚則民散財散則民聚大學}
