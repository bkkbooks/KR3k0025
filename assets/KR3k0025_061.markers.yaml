  - {type: variant, offset: 3042, length: 1, content: 丈, krp: 互入識者所窺傳記謝𤣥以八萬當苻堅百萬之衆其勢不敵若苻堅逼肥水而陳必保萬全惟麾軍却退衆亂不能止故敗世謂謝𤣥能走苻堅者此耳孔氏雜説集虎見驢鳴大駭然往來視之覺無異能益習其聲稍近驢怒蹄之虎曰技止此耳因斷其喉盡其肉乃去噫形之厖也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲}
  - {type: variant, offset: 3044, length: 5, content: 意氣相期勿, WYG: 栁子厚黔之驢本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入巧反成拙臨危抱佛經既輸爾載將伯助予詩正月注言國危而求賢者已晩矣將恐將懼惟予與女將安將樂女轉棄予將恐將懼寘予于懐將安將樂棄予如遺詩小雅谷風史越子使后庸來聘且言邾田封于駘上欲使魯還邾田封境至駘上􅉀于平陽三子皆從季康子叔孫文子孟武伯皆従后庸盟康子恥従蠻夷盟言及子貢思子貢曰若在此吾不及此失不及與越盟武伯曰然何不召曰固將召之文子曰他日請念言季孫不能用子貢臨難而思之左哀二十七年互入因事思人公曰吾不能早用子今急而求子是寡人之過也左僖三十年人窮則反本故勞苦倦極未嘗不呼天地疾痛慘怛未嘗不呼父母也史屈原傳寛則寵名譽之人急則用介胄之士史韓非傳孔融為賊管亥所圍遣太史慈求救於劉𤣥徳劉𤣥徳曰孔北海乃復知天下有𤣥徳耶東漢孔融傳李克用曰當阽危之時託為股肱伊吕及既安之後則心膂視為土芥寇讎通鑑僖宗紀黄巢北趨襄陽劉巨容拒之大破賊衆或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存将士不愛官賞事寜則棄之或更得罪不若留賊}
