  - {type: variant, offset: 1347, length: 4, content: 讒諂蔽兩, WYG: 因便斫殺自爾每眠左右莫敢近者世説輕詆篇互入姦邪尹吉甫子伯竒至孝事後母母取蜂去毒繫於衣上伯竒前欲去之母便大呼曰伯竒牽我吉甫見疑伯竒自死列女傳人之愛子罕亦能均有偏寵者雖欲以厚之更所以禍之共叔之死母實為之趙王之戮父實使之劉表之傾宗覆族袁紹之地裂兵亡可為龜鑑也北齊顔氏家訓魏文侯出逰見路人反裘而負芻文侯問之對曰臣愛其毛也文侯曰若不知裏盡而毛無所恃耶新序永有某氏愛䑕不畜猫又禁僮勿擊䑕倉廪庖厨悉以恣䑕不問由是飲食大率䑕之餘也數嵗某氏徙居他州後人來居䑕為態如故假五六猫闔門撤瓦灌宂購僮羅捕之殺䑕如丘栁文永某氏之䑕㡬許平生歡無限骨肉恩結為腸間痛聚作鼻頭辛白樂天集櫪馬非不肥所苦長繫維豢豕非不飽所憂竟為犧文粹槖駝種木其蒔也若子其置也若棄它植者則不然愛之太過憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯摇其本以觀其疎密而木之性日已離矣雖曰愛之其實害之雖曰憂之其實讎之唐栁宗元郭槖駝傳本朝東坡下獄張安道致仕在南京上書令其子恕持至登文院恕不敢投久之東坡出獄其後東坡見其副本因吐舌動色曰獨不見鄭昌之捄葢寛饒云上無許史下無金張正激宣帝之怒元城語錄煩惱初無根恩愛為種子東坡詩捨失求得子管子以小辱成大榮淮南子史李同説平原曰家之所有盡散以饗士士方其危苦之時易徳}
