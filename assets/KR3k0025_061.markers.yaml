  - {type: variant, offset: 2573, length: 0, content: '', krp: 經齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之論語互入事反所料子布衣紃履之士雖在窮閻漏屋而王公不能與之爭名荀子富國無置錐之地而公侯不能與之爭名仲尼是也荀子史梁齊楚趙之君非不富且貴也惡乎成名谷口鄭子真不屈其志耕於岩石之下名震于京師西漢王貞等傳序向長讀易至損益卦曰吾已知富不如貧矣東漢集齊景公之千駟不如顔回原憲之約其身文選李蕭逺運命論本朝惟富貴者之不得兼然後貧賤之士有以自足而髙世歐公桴槎出水記智不若愚子以為舟則沉以為棺椁則速腐以為器則速毁以為門戸則液漏以為柱則蠧不材之木也無所可用故能若兹之夀夫柤棃橘柚果蓏之属實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭荘子巧者勞而智者憂無能者無所求饒食而遨汎若不繫之舟也同上螾無爪牙之利筋骨之强上食埃土下飲黄泉用心一也蟹八跪而二螯非蛇蟺之穴無所寄託者用心躁也荀勸學巧詐不如拙誠傳子史十語九中不如一黙史記互見謹言攖拏者亡黙黙者存西漢揚雄智者以有餘為疑而朴者以不足取信東漢呉漢左雄曰白璧不可為容容多後福通鑑東漢周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子曰伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容於世惟阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也晉書周顗傳傳記黙無過言慤無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背説苑集何巧智之不足而拙艱之有餘潘安仁閒居賦牛之為物日耕百畆人不慚愧利滿天下皮角見用肩􅥑不保不如羸驢服逐駑馬不耕不駕藿菽自與騰踏康莊出入輕舉當道長鳴聞者驚辟牛雖有功於己何益命有好醜非若能力栁牛賦今者無端讀書史智慧祗自勞精神凡物之生不願為材犧尊青黄乃木之災並韓集老龜被刳膓不如無神靈白侍郎互入招禍門巧婦才人常薄命莫敎男女苦多能蟲全性命縁無毒木盡天年為不才鐵馬因疲退鉛刀以鈍全並白侍郎本朝癡人自得終天命智士死智寃莫雪皎皎千丈清不如尺水渾先竭是甘井得全如苦李人人生子欲聰明我被聰明害一生但願我兒愚且魯無災無難到公卿並東坡詩信有千丈清不如一尺渾後山巧者言拙者黙巧者勞拙者逸巧者賊拙者徳巧者凶拙者吉周茂叔拙賦智不終智經子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也記中庸子魚鼈黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀子法行篇互入貪迷神蛇能斷而復續而不能使人勿斷也淮南子智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見爆列子集猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人所擒皆獲輒無遺者唐文粹裴炎猩猩銘互入貪迷本朝老狐足姦計安居穴垣墻窮冬聽氷度思慮豈不長引身入扱引也中將死猶跳踉歐公集虎終機械得烏亦彈丸随臨川集彊復遇彊經趯趯毚兔遇犬獲之詩子夫火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之淮南子主術論今夫虎豹便㨗熊羆多力然而人食其肉而席其革淮南子史宋公兼享晉楚之大夫趙孟為客子木與之言不能對使叔向侍言焉子木亦不能對也左襄二十七年寗成家居南陽及縱至闗寗成側行送迎然縦氣盛弗為禮至郡遂案寗氏盡碎破其家史義縦傳蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀遊諸侯無所遇困於楚蘇秦故召而辱之舎人曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉給君資盡蘇君之計謀也張儀曰嗟乎此在蘇君術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言通鑑周紀漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射項羽羽大怒瞋目叱之樓煩目不能視手不能發走還入壁不復敢出西漢項羽傳汲黯為忮師古曰忮意堅也音章豉反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵憑前漢寗成傳東魏丞相髙歡攻王壁韋孝寛隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乘之以入城上先有二樓孝寛縳木接之令常髙於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾通鑑梁髙祖傅奕謂其子曰吾聞有金剛石者性至堅物莫能傷惟羚羊角能破之通鑑唐太宗安祿山於公卿皆慢侮之獨憚李林甫}
