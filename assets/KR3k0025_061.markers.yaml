  - {type: variant, offset: 1267, length: 1, content: 互, WYG: 人不勝天子天定亦能勝人荀子史天之棄商久矣君將興之弗可左僖二十一年天之所啟人弗及也左僖二十三年天之所置其可廢乎左僖二十八年天方授楚未可與爭雖晉之彊能違天乎左宣十五年力田不如逢年善仕不如遇合史佞倖傳秘記云唐三世之後女主武王代有天下上惡之密問太史令李淳風秘記所云信有之乎對曰臣仰稽天象俯察歴數其人已在陛下宫中為親属自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶㡬頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣通鑑唐太宗尊無二上經君所無私諱記曲禮注尊無二上父前子名君前臣名注曰至尊無大小皆名記曲禮上從於先生不越路而與人言注尊不二也記曲禮上夫為人子者三賜不及車馬不受不敢以成尊比踰於父記曲禮上孔子曰天無二日民無二王嘗禘郊社尊無二上記曾子問雖有三命不踰父兄記文王世子子云天無二日民無二王家無二主尊無二上示民有君臣之别也記坊記國無二君家無二尊以一治之也父在為母齊衰期者}
