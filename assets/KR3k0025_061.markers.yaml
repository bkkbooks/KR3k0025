  - {type: variant, offset: 852, length: 1, content: 周, WYG: 帝曰丈夫得則為王失則為虜通鑑梁均王石敬塘曰夫事成於果決而敗於猶豫通鑑傳記中山君曰吾以一杯羊羮亡國以一壺餐得士二人戰國策集必若所為危於累卵難於上天變所以為易於反掌安於太山選枚乘上呉王書互入在人所為用之則為虎不用則為䑕選答客難出其言善千里應之苟違此義同衾以疑張華女史箴聽受一繆差以千里齊竞陵王行状君失臣兮龍為魚權歸臣兮鼠變虎李白火洩於密而為用且大能不違於道可燔可炙可鎔可甄以}
