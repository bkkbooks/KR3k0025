  - {type: variant, offset: 1369, length: 4, content: 臣元宗贊, WYG: 叔孫通初制定禮儀見非於齊魯之士前漢禮樂志美玉藴於碔砆凡人視之藐焉良工眡之然後知其為和寳也精鍊藏於鑛璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳斛律金用匈奴望塵知馬歩多少嗅地知軍度逺近北本傳傳記師曠識㸑薪易牙别淄澠晏子春秋}
