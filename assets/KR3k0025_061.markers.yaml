  - {type: variant, offset: 954, length: 4, content: 李林甫對, WYG: 志者無昭昭之名無惽惽之事者無赫赫之功荀子忍痛苦之藥石者所以除伐命之疾韓非子史不一勞者不久怢不暫費者不永寜西漢匈奴傳集孰不實而有獲楚辭欲晦而彰經濳雖伏矣亦孔之昭詩正月君子之道闇然而日章中庸子鄭子真耕乎岩石之下名振京師揚子問神自後者人先之自下者人髙之揚子寡見史法真隱居不仕前後四徴終不屈友人郭正}
