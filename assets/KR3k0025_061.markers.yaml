  - {type: variant, offset: 1625, length: 0, content: '', krp: 庾公在石頭王公在城忽風起揚塵王公以扇拂之曰元規塵汙人郭子元規庾亮字王公導也又見通鑑傳記憎人甚惡其餘胥尚書大傳大戰篇互入遷怒衆目難掩經人之視己如見其肺肝然記大學曽子曰十目所視其嚴乎同上史欲蓋而章左傳序劉洎曰借使遂良}
  - {type: variant, offset: 1626, length: 2, content: 致敬, WYG: 記天下亦皆記之通鑑唐書郜鼎在廟章孰甚焉左桓二年寗殖曰吾得罪於君名蔵在諸侯之䇿左襄二十年陳軫曰非獨儀知之也行道之人}
  - {type: variant, offset: 1626, length: 2, content: 致敬, krp: 記天下亦皆記之通鑑唐書郜鼎在廟章孰甚焉左桓二年寗殖曰吾得罪於君名蔵在諸侯之䇿左襄二十年陳軫曰非獨儀知之也行道之人}
  - {type: variant, offset: 1629, length: 1, content: 禮, WYG: 知之矣史本傳互入無隱司馬昭之心路人所知也通鑑晉書集萬目睽睽韓文西子不華嫫女錦縠是不能易其美惡難將一人手掩得天下目並唐文粹當局者迷子夫以一縷之任繫千鈞之重上懸之於無極之髙下垂之於不測之深旁人皆哀其絶而造之者不知其危孔叢子史虞卿料事揣情而為趙畫䇿何其工也及不忍魏齊卒困於大梁庸夫且知其不可况賢人乎史本傳論韓子為説難而卒不能自脱史本傳太史公曰春申君説秦昭王何其智之明也後至於李園繆矣史記援戒子之禍智矣而不能自免於讒言後漢馬援傳論傳記天下無窮者才智也陳平嘗出六竒燕居深念恐禍及已陸賈教之交驩太尉又為畫吕氏數事平従之卒誅諸吕}
