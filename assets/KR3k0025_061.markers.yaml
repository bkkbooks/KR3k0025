  - {type: variant, offset: 1202, length: 0, content: '', WYG: 白樂天互入曠逹居不必野惟性之寂止不必廣惟心之適皮日休集月異而嵗不同經婉兮孌兮總角丱兮未㡬見兮突而弁兮詩甫田子日改月化莊子山水史積善在身猶長日加益而人不知也西漢董仲舒傳魯肅拊吕蒙背曰吾謂大弟但有武畧耳至於今日學識英博非復吳下阿蒙蒙曰士别三日即更刮目相待吳志本傳注得魚亡筌經言者所以明象得象而忘言象者所以存意得意而忘象猶蹄者所以在兔得兔而忘蹄筌者所以在魚得魚而忘筌者也易畧例子筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄莊子外物篇女因媒而嫁不因媒而親淮南子史蜚鳥盡良弓蔵狡兔死走狗烹史越世家四時之序成功者去通鑑秦紀弓蔵鳥盡信匪虛言通鑑唐代宗傳記濟川得岸何假舟焉祕要經推波助瀾經毋敎猱升木詩角弓季氏富於周公而求也為之聚斂而附益之語先進子孟子曰求也為季氏宰而賦粟倍他日孟子離婁上君不鄉道不志於仁而求富之是富桀也}
