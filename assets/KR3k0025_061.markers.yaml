  - {type: variant, offset: 876, length: 2, content: 五狗, WYG: 王人失其心謂之獨夫東坡上皇帝書此等棄而不用則作賊収而用之則捉賊東坡代李宗論東京盜賊状順水而行雲駃鳥集維水之利千里咫尺亂流而渉過膝則止維水之害咫尺千里東坡何公橋亭詩若己為君子而使人為小人是亦去小人無㡬矣東坡文譬諸草木種子若置之虛空不投地中雖經百千嵗何縁得産若種之地中潤之以雨露暵之以風日則開花結子數日可待欒城集鋒不可當經若火之燎于原不可嚮邇書盤庚上燎之方揚寜或滅之詩小雅正月子故仁人之兵聚則成卒散則成列延則若莫耶之長刃嬰之者斷鋭則若莫耶之利鋒當之者潰圜居而方正則若盤石然觸之者角摧荀子義兵臣之劍十歩一人千里不留行王曰天下無敵矣曰此劍直之無前舉之無上案之無下運之無旁上絶浮雲下絶地紀荘子說劍史以此衆戰誰能禦之以此攻城何城不克左僖四年鼓行而西西漢張良傳觸之者碎犯之者焦通鑑一卒畢力百夫不當萬夫致死可以横行後漢鄭泰曰譬猶驅虎兕以赴犬羊鼓烈風以埽枯葉誰敢禦之通鑑漢獻紀一夫荷㦸千人莫當晉書羊祐傳盧蔵用曰君如干將莫耶難與爭鋒}
