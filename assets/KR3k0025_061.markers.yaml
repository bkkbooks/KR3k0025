  - {type: variant, offset: 1322, length: 0, content: '', krp: 紀武后謂仁傑曰朕用卿師徳薦也誠知人矣唐書傳記同聲則異類而相應意合則未見而相親賢者立於本朝而天下之豪相率而趨之也従其類也故詩有伐木之歌易有拔茅之喻也大戴記保傳篇不謀而同經飲食男女人之大欲存焉死亡貧苦人之大惡存焉記禮運如惡惡臭如好好色記大學子所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心孟子公孫丑上若合符節先聖後聖其揆一也孟子離婁下孩提之童無不知愛其親也及其長也無不知敬其兄也孟子盡心上夫人之情目欲綦色耳欲綦聲口欲綦味鼻欲綦臭心欲綦佚此五者人情之所必不能免也茍子王伯人之情雖桀紂又豈肯為其所悪賊其所好者哉荀子議兵凡人有所一同飢而欲食寒而欲煖勞而欲息好利而惡害是人之所生而有也是無待而然者也是禹桀之所同也目辨黑白美惡耳辨聲音清濁口辨鹹酸甘苦鼻辨芬芳腥臊骨體膚理辨寒暑疾癢是又人之所當生而有也是無待而然者也是禹桀之所同也荀子榮辱凡人之情得所欲則樂逢所惡則憂見利莫能勿就見害莫能勿避管子禁蔵民之去就如火之於燥濕水之於髙下同上琬琰之玉存泥沙之中雖㢘者不釋淮南子史夫不令之臣天下之所惡也左宣十年互入疾惡曾參孝其親天下願以為子子胥忠於君天下願以為臣史記陳軫傳和氏璧天下所共傳寳也司馬相如傳猶子弟之衛父兄手足之捍頭目前漢刑法志人情憚難而趨易好同而惡異通鑑魏明紀集至於稻也粱也膾也炙也豈聞有不嗜者哉韓文儒墨同是堯舜同非桀紂同上麟之為靈雖婦人小子皆知其為祥也同上劉伶今日意異代是同聲栁詩本朝韓魏公嘗言仁廟配享清議皆與沂公不與申公誠意不可欺如此遺事人情不問賢愚莫不畏天而嚴父東坡巧反成拙子宋人有憫其苗之不長而揠之者芒芒然歸謂其人曰今日病矣子助苗長矣其子趨而往視之苗則槁矣孟子公孫丑上伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患後有鞭䇿之威馬之死者已過半矣荘子史新垣平所言皆詐史記畫虎不成反類狗東漢馬援傳反裘負薪存毛實難宋書范泰傳殷浩答桓温書慮有謬誤開閉者十數竟逹空圅通鑑晉穆紀傳記楚舎人相謂曰各畫地為蛇蛇先成者飲酒一人先成曰吾能為之足未成一人後成奪其巵曰蛇故無足子安能為之足遂飲其酒為蛇足者終亡其酒戰國䇿田子方使人遺子思狐白之裘恐其不受因謂之曰吾與人也如棄之子思辭曰伋聞妄與不如遺棄於溝壑伋雖貧不忍以身為溝壑也劉向説苑畫蛇而添足反失盃中之酒史通集金石而服食説自何世起殺人不可計而世慕向之蘄不死乃得速死謂之智可不可也韓文李君墓誌飲藥本攻病毒腸翻自殘韋應物本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入自納敗闕愛適為害子宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趨而往視之苗則槁矣夫助之長者揠苗者也非徒無益而又害之孟子互見徒勞無補繆公之於子思也亟問亟餽鼎肉子思不恱於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋孟子萬章下南海之}
