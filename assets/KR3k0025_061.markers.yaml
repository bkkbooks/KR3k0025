  - {type: variant, offset: 2581, length: 0, content: '', WYG: 量所不能均也周易畧例若火之燎于原不可嚮邇書盤庚上互入無所用力我躬不閲遑恤我後言我今尚恐不能自容何暇憂我後之人乎毛詩成事不説遂事不諫既往不咎論語子目之明能見於百歩之外而不見其背帷墻之外則無睹也子華子萬室之國一人陶則可乎孟子告子下猶七年之病求三年之艾也孟子世固非一毛之所濟列子楊朱篇古人目短於自見故以鑑觀面韓非子瞽者無以與乎文章之觀聾者無以與乎鍾磬之聲莊子逍遥逰盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀莊子大宗師離朱之明察毫末於百歩之外下水尺不能見淺深非目不明其勢難覩也慎子朝露之繭工女不能治淄澠之沙計兒不能數魯連子躄者見虎不走非勇也淮南子離朱之明察毫末於百歩之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外淮南子訓道篇故君子能為善而不能必其得福不忍為非而未能必免其禍淮南子繆稱訓瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊呼覽切狄牙不能齊不齊之口揚子問神歐冶不能鑄鉛錫為干將抱朴子阿膠三寸不足止黄河之濁毁箄三尺不足救鹽池之鹹傅子史晉伯宗曰雖鞭之長不及馬腹左宣十五年晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也左成十年互入病疾飄風之末不能舉鴻毛國語彊弩之極矢不能穿魯縞衝風之末不能漂鴻毛非初不勁末力衰也史韓安國傳死病無良醫通鑑周紀昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也同上覆水不収東漢光武紀蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也通鑑漢桓紀徐穉曰夫大木將顛非一繩所維通鑑漢桓紀隄防穿漏萬夫同力不能復救通鑑漢殤紀若河決金堤火炎崑岡雖神禹之乘四載𤣥冥之洒八瀛亦不能湮洪濤而撲烈燄者何也良以勢既壊而不能遽救也唐史臣代宗贊傳記騏驥盛壯之時一日而馳千里至其衰老駑馬先之戰國䇿互入事必有極猶渴而穿井臨難而鑄兵雖疾從而不及也説苑雜言篇互入逺水不救近火尺水不能却簫丘之熱意林集孰江河之可涸楚辭譬猶疾疚彌年而欲一丸銷之選詩集序沈寒凝海不能結風烈火流金不能焚景選連珠鞭長不及馬腹風末不舉鴻毛朱敬則宋武論譬如心中疾箴石非所砭韓集獵客張兎罝不能挂龍虎李太白集短線無長縫月中有桂樹無翼難上天海底有驪珠下隔萬丈淵並唐文粹轆轤無繩井百尺盧仝詩索過風於前林求往夢於既寤不可及也穆元同徳寺㑹集序本朝疾風無末勢陳後山心至力不及子譬猶好聲色而無耳目也荀子王伯臨河羨魚而無網罟抱朴子釋滯篇傳記猶鴻鵠之無羽翼也雖有千里之望不能致其意之欲至説苑尊賢集潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲謝𤣥暉首燕徒有心局歩何由騁梁劉孝綽詩我欲横天無羽翰孟東野時危思報主衰謝不能休致君時已晩懐古意空存並杜詩喑人食太牢信知其味而不能形於言劉賔客虛逢好陽艷其柰苦昬懜元微之互入事與願違遥看雲路心空在同上本朝巧舞苦短袖東坡詩逺水不救近火子莊周貧往貸粟於監河侯侯曰諾我將得邑金貸子二百金可乎莊周忿然作色對曰昨來有中道而呼者周顧視車轍中有鮒魚周曰激西江之水而迎子可乎莊子外物失火而取水於海水雖多火必不滅矣逺水不救近火也韓非子焦喉之渴遥}
