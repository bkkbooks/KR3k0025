  - {type: variant, offset: 2572, length: 0, content: '', krp: 雞愛野雉晉書薛謙光上疏昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令通鑑唐武后韋處厚曰陛下有一裴度不能用乃當饋而歎恨無蕭曹唐裴度傳傳記田饒事魯哀公而不見察謂哀公曰夫雞有五徳猶日瀹而食之者以其所從來者近也黄鵠一舉千里止君園池啄君稻粱君猶貴之以其所從來者逺也韓詩外傳集陋今榮古張平子東京賦耀所聞而疑所覿班孟堅賔戯凡人可以言古不可以言今桓譚亦云親見揚子雲容貎不能動人安肯傳其書誠使博如莊周哀如屈原奥如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未有不薄於當時而榮於後世也栁文聞道近來諸子弟臨池尋已厭家雞栁詩貴耳賤目榮古陋今人之大情也白傅集逺物皆重近皆輕雞雖有徳不如鶴唐文粹視近易忽史裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近舎湜而逺取居易請從此辭唐書本傳互見自負集當仲尼在時世人不言為聖人也伐檀削迹於七十二君不一值或以為東家丘或以為䘮家狗沈約辨聖論文選以何水部在世不錄南薫集序本朝君家自有元和譜莫厭家雞更問人東坡詩習熟難忘子庖丁曰臣始解牛所見無非牛者荘子養生篇史楚鍾儀囚於晉晉人與之琴操南音左傳互入懐鄉李廣居則畫地為軍陳射闊狹以飲專以射為戯史本傳越人荘舄仕楚病楚王曰舄越之鄙人必思於越使人往聽之果為越吟史記互入懐鄉殷仲堪曰三日不讀道徳論便覺舌本間強晉書互入習慣義貞曰靈運空疎延之隘薄魏文帝所謂古今文人類不䕶細行者也但性情所得未能忘言於悟賞耳通鑑宋髙祖紀唐𤣥宗問姚崇曰公知獵乎對曰少為獵師老而猶能唐書本傳傳記髙祖既作新豐并徙舊社放犬羊雞鴨於通途亦競識其家西京襍記伯樂相馬所見無非馬吕氏春秋上皇居南内夜登勤政樓聞里中隱如歌聲顧力士潛召果棃園弟子也楊妃外傳越王曰躃者不忘走盲者不忘視後漢趙曄吳越春秋集魚意思在藻鹿心懐食苹張九齡風情雖老未全消白樂天聞休戰鬬心還癢見説鏖塵眼即開王建集商女不知亡國恨隔江猶唱後庭花杜牧之詩互入懐鄉惟有詩魔降不得每逢風月一閒吟白集本朝書生習氣未能無東坡詩剩員呈武藝老妓舞柘枝古今詩話至今清夜夢尚驚冠壓頭坡詩互入閒適投紱歸來萬事輕消磨未盡秪風情鳥囚不忘飛馬繫常念馳並東坡詩舊態難改經驕淫矜夸將由惡終雖収放心閑之惟艱書畢命商俗靡靡利口惟賢餘風未殄同上傳記梟欲東徙曰鄉人皆惡我鳴鴂曰子能更鳴可矣不能更鳴東徙猶惡子之聲説苑談叢集雖漸斂束故態未鋤司空表聖互入習慣不自覺醜子今以其昏昏使人昭昭孟子猶人不能行而賣躄藥劉子史陳遵常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮沉俗間官爵功名不減於子而差獨樂顧不優乎西漢陳遵傳以鴟鴞而笑鳳凰執蝘蜓而嘲龜龍西漢揚雄傳北山有鴟不潔其翼饕餮貪汙臭腐是食長鳴呼鳳謂鳳無徳東漢朱暉傳注互入居邪惡正固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也范曄賛班固互入此無彼誚唐太宗曰人苦不自覺通鑑本紀集家有敝帚享之千金斯不自見之患也魏文帝典論本朝韓子論荀揚之疵而韓子之疵有甚於荀揚荀卿譏六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試䇿問互入此無彼誚此無彼誚子唯之與呵相去㡬何同為應對而相去㡬何老子異俗篇或百歩而後止或五十歩而後止以五十歩笑百歩則何如曰直不百歩耳是亦走也孟子梁惠王上史齊使跛者逆跛者禿者逆禿者眇者逆眇者公羊固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫後漢范曄贊班固互入不自覺醜武宗奮然除去浮圗之法甚鋭而躬受道家之籙唐武宗贊無異於避湯入火通鑑梁紀傳記土偶人方與木梗人語木梗謂土偶人曰子先土也持子以為偶人遇天大雨水潦並至子必沮壊應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止説苑尊賢優孟謂趙襄子曰今天下盡桀也而君紂之桀紂並世焉能相亡然亦殆矣新序集楚則失矣而齊亦未為得也司馬長卿上林賦李赤善為歌詩類李白名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其属意明白今世皆知笑赤之惑也及至是非取予向背決不為赤者㡬何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉栁文李赤傳互入昧於自知似同浴而譏裸裎也韓文豹則虎之弟鷹則鷂之兄古樂府本朝徐鉉不信佛酷好鬼神之説筆談韓子論荀揚之疵而韓子之疵有甚於荀揚荀卿議六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試䇿問互入不自覺醜五技鼯䑕笑鳩拙百足馬蚿憐鼈跛山谷詩牀上施牀經如塗塗附小雅角弓傳屋重架屋牀上施牀史通本朝屋上架屋牀上疊牀鳴道集以水濟水子方其夢也不知其夢也夢之中占其夢焉莊子以水救水以火救火名曰益多莊人間世以水投水淮南子史以水濟水左傳以暴易暴史記伯夷傳又見唐書魏徴傳如以湯止沸前漢禮樂志如以血止血汙益甚耳通鑑唐紀以亂易亂唐書魏徴傳如以蒿箭射蒿中耳通鑑唐髙祖集𤣥文處幽楚辭𤣥墨也如以膏濯衣每漬垢愈染借聽於聾求道於盲並韓文青勝於藍經子謂仲弓曰犂牛之子騂且角論語子青出於藍而青於藍氷水為之而寒於水荀子勸學以湼染緇則黑於湼以藍染青則青於藍淮南子俶貞訓明月之珠出於蚌蜄周之簡圭生於垢石大蔡神龜出於溝壑淮南子説山訓史孔融見韋元將仲將與其父端書曰不意雙珠近出老蚌後漢陸卬之子雲少機悟好學邢劭曰老蚌遂出明珠晉書本傳禇淵卒世子侍中賁恥其父失節服除遂不仕以爵讓其弟蓁屏居墓下終身通鑑齊太祖監察御史許逺敬宗之曽孫也通鑑唐𤣥宗盧元輔簡潔貞方歴踐清貴人亦不以其父把之醜行為累人士歸美舊唐書本傳傳記山公大兒武帝欲見之山公不敢辭問兒兒不肯行時論乃云勝山公世記集椎輪為大輅之始大輅寜有椎輪之質增氷為積水所成積水曽微增氷之凛並文選序龢氏之璧韞於荆石隋侯之珠藏於蚌蛤班孟堅答賔戲金生沙礫珠出蚌泥蔡伯喈青衣賦雛鳳清於老鳳聲李義山集惡木生槎枿之英虎穴之中生此騏驥並唐文粹羸牛生健犢杜牧之集本朝淤泥生蓮花糞壤出菌芝東坡詩枯朽猶能出菌芝同上互入自負引凡入聖經出自幽谷遷于喬木詩伐木子百川學海而至于海揚子出潢汙而浮滄海背螢燭而向日月抱朴子金丹篇集本是南山松今為宫殿梁古樂府如河入海無復水名劉賔客互入因小陋大江出汶山水力才能汎觴至於并大川三百小川三千然後與洞庭彭蠡同波下而與南溟北海同味黄魯直與何静翁書以毒攻毒史以蠻夷攻蠻夷西漢晁錯傳張敞守京兆尹市偷盜多敞乃召偷盜之長數人見之責問因貰其罪令致諸盜以自贖偷長曰今一旦召詣府恐諸偷驚駭願權補吏職敞皆以為吏遣歸休置酒小偷悉來賀各飲醉偷長以赭汙其身衣裾吏坐里閭閲出者汙赭輙収縳之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事三輔議論者至云貴戚廢錮當復以貴戚浣之猶解醒當以酒也通鑑東漢章紀第五倫傳本朝醫者之視堇也使其毒可以治病而不至於殺人也老泉文惟姦識姦史張湯為人多詐丞相𢎞數稱其美西漢本傳張敞守京兆尹市偷盜多敞召偷盜之長數人見之責問因貰其罪令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀飲且醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輒収縳之一日捕得數百人盡行法罰由是市無盜賊前漢書互入政事以毒攻毒兩門桓温經王敦墓望之曰可人可人其心迹若是晉書桓温傳魚朝恩執易升髙座講鼎覆餗以譏宰相王縉怒元載怡然朝恩謂人曰怒者常情笑者不可測也通鑑富不如}
  - {type: variant, offset: 2573, length: 0, content: '', WYG: 經齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓於首陽之下民到於今稱之論語互入事反所料子布衣紃履之士雖在窮閻漏屋而王公不能與之爭名荀子富國無置錐之地而公侯不能與之爭名仲尼是也荀子史梁齊楚趙之君非不富且貴也惡乎成名谷口鄭子真不屈其志耕於岩石之下名震于京師西漢王貞等傳序向長讀易至損益卦曰吾已知富不如貧矣東漢集齊景公之千駟不如顔回原憲之約其身文選李蕭逺運命論本朝惟富貴者之不得兼然後貧賤之士有以自足而髙世歐公桴槎出水記智不若愚子以為舟則沉以為棺椁則速腐以為器則速毁以為門戸則液漏以為柱則蠧不材之木也無所可用故能若兹之夀夫柤棃橘柚果蓏之属實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭荘子巧者勞而智者憂無能者無所求饒食而遨汎若不繫之舟也同上螾無爪牙之利筋骨之强上食埃土下飲黄泉用心一也蟹八跪而二螯非蛇蟺之穴無所寄託者用心躁也荀勸學巧詐不如拙誠傳子史十語九中不如一黙史記互見謹言攖拏者亡黙黙者存西漢揚雄智者以有餘為疑而朴者以不足取信東漢呉漢左雄曰白璧不可為容容多後福通鑑東漢周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子曰伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容於世惟阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也晉書周顗傳傳記黙無過言慤無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背説苑集何巧智之不足而拙艱之有餘潘安仁閒居賦牛之為物日耕百畆人不慚愧利滿天下皮角見用肩􅥑不保不如羸驢服逐駑馬不耕不駕藿菽自與騰踏康莊出入輕舉當道長鳴聞者驚辟牛雖有功於己何益命有好醜非若能力栁牛賦今者無端讀書史智慧祗自勞精神凡物之生不願為材犧尊青黄乃木之災並韓集老龜被刳膓不如無神靈白侍郎互入招禍門巧婦才人常薄命莫敎男女苦多能蟲全性命縁無毒木盡天年為不才鐵馬因疲退鉛刀以鈍全並白侍郎本朝癡人自得終天命智士死智寃莫雪皎皎千丈清不如尺水渾先竭是甘井得全如苦李人人生子欲聰明我被聰明害一生但願我兒愚且魯無災無難到公卿並東坡詩信有千丈清不如一尺渾後山巧者言拙者黙巧者勞拙者逸巧者賊拙者徳巧者凶拙者吉周茂叔拙賦智不終智經子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也記中庸子魚鼈黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀子法行篇互入貪迷神蛇能斷而復續而不能使人勿斷也淮南子智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見爆列子集猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人所擒皆獲輒無遺者唐文粹裴炎猩猩銘互入貪迷本朝老狐足姦計安居穴垣墻窮冬聽氷度思慮豈不長引身入扱引也中將死猶跳踉歐公集虎終機械得烏亦彈丸随臨川集彊復遇彊經趯趯毚兔遇犬獲之詩子夫火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之淮南子主術論今夫虎豹便㨗熊羆多力然而人食其肉而席其革淮南子史宋公兼享晉楚之大夫趙孟為客子木與之言不能對使叔向侍言焉子木亦不能對也左襄二十七年寗成家居南陽及縱至闗寗成側行送迎然縦氣盛弗為禮至郡遂案寗氏盡碎破其家史義縦傳蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀遊諸侯無所遇困於楚蘇秦故召而辱之舎人曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉給君資盡蘇君之計謀也張儀曰嗟乎此在蘇君術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言通鑑周紀漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射項羽羽大怒瞋目叱之樓煩目不能視手不能發走還入壁不復敢出西漢項羽傳汲黯為忮師古曰忮意堅也音章豉反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵憑前漢寗成傳東魏丞相髙歡攻王壁韋孝寛隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乘之以入城上先有二樓孝寛縳木接之令常髙於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾通鑑梁髙祖傅奕謂其子曰吾聞有金剛石者性至堅物莫能傷惟羚羊角能破之通鑑唐太宗安祿山於公卿皆慢侮之獨憚李林甫}
