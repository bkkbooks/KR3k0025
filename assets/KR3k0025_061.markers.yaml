  - {type: variant, offset: 2581, length: 0, content: '', krp: 量所不能均也周易畧例若火之燎于原不可嚮邇書盤庚上互入無所用力我躬不閲遑恤我後言我今尚恐不能自容何暇憂我後之人乎毛詩成事不説遂事不諫既往不咎論語子目之明能見於百歩之外而不見其背帷墻之外則無睹也子華子萬室之國一人陶則可乎孟子告子下猶七年之病求三年之艾也孟子世固非一毛之所濟列子楊朱篇古人目短於自見故以鑑觀面韓非子瞽者無以與乎文章之觀聾者無以與乎鍾磬之聲莊子逍遥逰盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀莊子大宗師離朱之明察毫末於百歩之外下水尺不能見淺深非目不明其勢難覩也慎子朝露之繭工女不能治淄澠之沙計兒不能數魯連子躄者見虎不走非勇也淮南子離朱之明察毫末於百歩之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外淮南子訓道篇故君子能為善而不能必其得福不忍為非而未能必免其禍淮南子繆稱訓瞽曠能黙瞽曠不能齊不齊之耳狄牙能喊呼覽切狄牙不能齊不齊之口揚子問神歐冶不能鑄鉛錫為干將抱朴子阿膠三寸不足止黄河之濁毁箄三尺不足救鹽池之鹹傅子史晉伯宗曰雖鞭之長不及馬腹左宣十五年晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也左成十年互入病疾飄風之末不能舉鴻毛國語彊弩之極矢不能穿魯縞衝風之末不能漂鴻毛非初不勁末力衰也史韓安國傳死病無良醫通鑑周紀昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也同上覆水不収東漢光武紀蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也通鑑漢桓紀徐穉曰夫大木將顛非一繩所維通鑑漢桓紀隄防穿漏萬夫同力不能復救通鑑漢殤紀若河決金堤火炎崑岡雖神禹之乘四載𤣥冥之洒八瀛亦不能湮洪濤而撲烈燄者何也良以勢既壊而不能遽救也唐史臣代宗贊傳記騏驥盛壯之時一日而馳千里至其衰老駑馬先之戰國䇿互入事必有極猶渴而穿井臨難而鑄兵雖疾從而不及也説苑雜言篇互入逺水不救近火尺水不能却簫丘之熱意林集孰江河之可涸楚辭譬猶疾疚彌年而欲一丸銷之選詩集序沈寒凝海不能結風烈火流金不能焚景選連珠鞭長不及馬腹風末不舉鴻毛朱敬則宋武論譬如心中疾箴石非所砭韓集獵客張兎罝不能挂龍虎李太白集短線無長縫月中有桂樹無翼難上天海底有驪珠下隔萬丈淵並唐文粹轆轤無繩井百尺盧仝詩索過風於前林求往夢於既寤不可及也穆元同徳寺㑹集序本朝疾風無末勢陳後山心至力不及子譬猶好聲色而無耳目也荀子王伯臨河羨魚而無網罟抱朴子釋滯篇傳記猶鴻鵠之無羽翼也雖有千里之望不能致其意之欲至説苑尊賢集潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲謝𤣥暉首燕徒有心局歩何由騁梁劉孝綽詩我欲横天無羽翰孟東野時危思報主衰謝不能休致君時已晩懐古意空存並杜詩喑人食太牢信知其味而不能形於言劉賔客虛逢好陽艷其柰苦昬懜元微之互入事與願違遥看雲路心空在同上本朝巧舞苦短袖東坡詩逺水不救近火子莊周貧往貸粟於監河侯侯曰諾我將得邑金貸子二百金可乎莊周忿然作色對曰昨來有中道而呼者周顧視車轍中有鮒魚周曰激西江之水而迎子可乎莊子外物失火而取水於海水雖多火必不滅矣逺水不救近火也韓非子焦喉之渴遥}
  - {type: variant, offset: 2582, length: 1, content: 畫, WYG: 滄海指氷室不能起暍死之熱望炎冶不能止噤凍之寒大厦既燔而運水於滄海此無及也並抱朴子穿井而救火則熛颺棟焚矣鑿舟而拯溺則葬江魚之腹中矣劉子史周詩曰俟河之清人夀㡬何左襄八年及溺呼船吳志譬如火發於家安能候逺水乎通鑑唐昭宗傳記猶渴而穿井臨難而後鑄兵雖疾從而不及也説苑雜言篇互入力所不及集桃實千年非易得駱賔王本朝不應逺水救近渴陳後山刮毛龜背集獵人箭底求傷鴈釣戸竿頭乞活魚王建本朝刮毛龜背上何時得成氈枯松强鑽膏槁竹欲瀝汁並東坡詩兩窮相值子泉涸魚相與處於陸相呴以濕相濡以沫荘子大宗師假榖於夷齊之門告寒於黔婁之家所得者不過橡樑緼褐必無太牢狐裘矣抱朴子袪惑史自屈原沉汨羅後百有餘年漢有賈生為長沙王太傅過湘水投書以弔屈原史記屈平傳本朝枯松强鑽膏槁竹欲瀝汁兩窮相值遇相哀莫相濟東坡詩一失召百非經君子惡居下流天下之惡皆歸焉語子張史去栁葉百歩而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鈎一發不中者百發盡息史記周本傳下流之人衆毁所歸西漢楊惲傳貧下未易居上流多謗議西漢司馬遷傳互入處非其地自為成敗經心以體全亦以體傷記緇衣子趙孟之所貴趙孟能賤之孟子水能載舟亦能覆舟荀子史自我得之自我失之亦復何恨通鑑梁武帝紀侯自我得之自我捐之無所恨前漢田蚡傳夫水能浮草木亦能沉之地能生萬物亦能殺之江海能下谿谷亦能朝之聖人能従衆亦能使之後漢趙曄呉越春秋集淮隂之禍寃在神理通説且拒豨謀寜起堂堂蕭公實曰知己給致鍾室胡寜忍此吕和叔文相時處事經有其禮而無其財君子弗行也有其財而無其時君子弗行也記檀弓下子為可為於可為之時則從為不可為於不可為之時則凶揚子在夷貉則引之倚門墻則麾之揚子修身世治則以義衛身世亂則以身衛義文中子史陸賈曰馬上得之寜可馬上治之乎西漢書孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也通鑑漢質紀禮敎榮辱以加君子化其情也桎梏鞭扑以加小人化其形也通鑑漢獻紀崔郾為廣州刺史治以寛經月不笞一人及涖鄂州嚴法峻誅不貸唐書天下未定則專取其才不考其行䘮亂既平則非才行兼備不可用也通鑑唐太宗栁仲郢為京兆尹政號嚴明後出為河南尹以寛惠為政或言不類答曰輦轂之下先彈壓郡邑之治本惠養唐書互入政事集理在將順怡然而奉旨事當正色偘然而犯鱗唐文粹君子救時雖切必相時度力以致其用不可則靜而鎮之以道訓服司空表聖集本朝人臣納説於君因其既厭而止之則易為力迎其方鋭而折之則難為功東坡代張方平諫用兵書明知故犯子惡辱而居不仁是猶惡濕而居下也孟子互入自相背馳惡死亡而樂不仁是猶惡醉而强酒孟子互入自相背馳史𤣥宗曰是子惡賢嫉能舉無比者裴士淹曰陛下誠知之何任之久耶帝黙不應新唐書李林甫傳中宗親遭母后之難而躬自蹈之唐史中宗贊吉頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子已立而外戚猶為王此陛下驅之使他日必爭兩不得安也太后曰朕亦知之然業如是不可如何通鑑唐武后右補闕辛替否上䟽曰口説不如身逢耳聞不如目覩且陛下與太子當韋氏用事之時日夕憂危切齒於羣凶今幸而除之乃不改其所為臣恐復有切齒於陛下者也通鑑唐𤣥宗楊國忠謂客曰吾本寒家一旦縁椒房至此未知税駕之所然念終不能致令名不如且極樂耳同上傳記文君眉色不加黛飾臉若芙蓉長卿素有消渴疾作美人賦自刺卒以此疾死西京雜記互入耽好集睹前車之傾覆而不改其轍迹選六代論小蟲水草楂棃橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者栁文序是悔其覆車不易前轍之失唐文粹本朝唐王涯自以留心太𤣥經久矣乃有甘露之變文宗時且太𤣥惟以進退消息為説涯知其説而不能行何也鳴道集此孟子所謂知兄臂之不可紾而姑勸以徐知隣雞之不可攘而月取其一東坡法明禁之而人明犯之是不有天子之法也老泉自納敗闕子猶傴僂而好升髙也指其頂者愈衆荀子效儒史適足以發笑而自㸃耳司馬遷傳智伯曰吾乃今知水可以亡人國也襄子夜使人決水灌智伯}
