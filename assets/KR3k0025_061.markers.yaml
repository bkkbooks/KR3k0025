  - {type: variant, offset: 1331, length: 1, content: 喜, WYG: 使割也子之愛人傷之而已其誰敢求愛於子左襄三十一年漢王愛幸趙隱王如意太子弱帝欲廢之而立如意髙祖崩吕后召趙王誅之西漢吕后傳漢宣帝任刑法信中官尚書葢寛饒奏封事曰今以刑餘為周召以法律為詩書又言五帝官天下三王家天下家以傳子官以傳賢執金吾奏寛饒指意欲求禪大逆不道諌大夫鄭昌上書訟寛饒曰上無許史之属下無金張之託許伯宣帝皇后父史宣帝外家金張日磾安世也上不聽遂下寛饒吏寛饒引佩刀自剄北闕下西漢本傳位過其任莫能有終所謂愛之適足以害之也西漢佞倖傳贊厚之如此反所以害之也西漢鮑宣傳丁公為項羽將逐窘髙祖髙祖曰兩賢豈相阸哉丁公引兵還及羽滅丁公謁髙祖髙祖以丁公徇軍中曰丁公為臣不忠使項王失天下}
