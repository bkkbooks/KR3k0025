  - {type: variant, offset: 1366, length: 0, content: '', WYG: 受金無以為資史陳平世家子獨不見家人寡婦耶始自約敕之時意乃慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣西漢原渉傳互入遂非無顧藉許后當娠病女醫淳于衍者霍氏所愛因投毒藥加煩懣崩諸醫皆収繫顯恐急即以狀具語光光大驚欲自發舉不忍猶與會奏上光署衍勿論顯因勸光内其女入宫通鑑漢宣紀𢎞為布衣食不重肉汲黯曰𢎞位在三公奉祿甚多然為布被此詐也上問𢎞𢎞謝曰有之誠中𢎞之疾夫以三公為布被與小吏無差誠飾詐欲以釣名如汲黯言且無汲黯忠陛下安得聞此言天子以為謙遜愈益厚之通鑑漢武紀晉司徒賈充辟韓夀為掾讌賔僚女從青瑣中窺見夀悦之竊帝所賜充香遺夀充覺問女遂妻之晉書桓温嘗使王獻之書扇筆落因畫作牛甚妙晉書本傳孫子荆誤謂王武子曰當枕流潄石武子曰石非可潄流非可枕孫子曰所以枕流洗其耳潄石礪其齒晉書王隱互入遂非東魏以王愔典選令史唱名誤以盧士深為士琛士深自言其名愔曰盧郎朗潤所以加玉王國典畧互入敏於應對姚崇二子分司東都恃其父有徳於魏知古頗招權請知古歸悉以聞他日上従容問崇卿子才性何如今何官也崇揣知上意對曰知古微時臣卵而翼之臣子愚以為知古必徳臣容其為非故敢干之耳上於是以崇為無私而薄知古負崇通鑑唐𤣥宗傳記孫權使曹再興畫屏風誤落筆㸃素因就成蠅状權疑其真以手彈之名畫記識者難欺子淄澠之合易牙嘗而知之列子説符伯樂不可欺以馬荀子劍工}
