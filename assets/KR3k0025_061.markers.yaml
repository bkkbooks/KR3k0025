  - {type: variant, offset: 2577, length: 0, content: '', krp: 忻荷言無不盡通鑑唐𤣥宗秦系與劉長卿善以詩相贈答權徳輿曰長卿自以為五言長城系用偏師攻之唐書本傳傳記天下無窮者才智也陳平嘗出六竒燕居深念恐禍及已陸賈敎之交驩太尉又為畫吕氏數事平從之卒誅諸吕則賈之智謀又在乎平之右矣孔氏雜説互入當局者迷又入智慮集鹿畏貙貙畏虎虎畏羆栁文本朝羔豚窘虎豹鳩雀窮鷹鸇巧者具機弋勢猛還拘攣臨川集王荆公初參政事下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書趙清獻獨折之曰君言失矣臯䕫稷契之時有何書可讀荆公黙然邵氏後錄互入敏於應對一輿薪之火衆人之所憚而不敢犯也舉而投之河則何熱之能為老泉集居邪惡正經不懲其心覆怨其正箋云不懲女之奸心而反憎其正詩節南山彼醉不臧不醉反恥詩賔之初筵子鄉原曰言不顧行行不顧言曰古之人行何為踽踽涼涼孟子盡心衆曲不容直衆枉不容正淮南子直繩者枉木之所憎抱朴子史惡直醜正已則無禮而討於有禮者曰汝何故行禮並左傳盜憎主人左成十五年晋伯宗之妻曰盜憎主人别見於家語闒茸佞讇抱虛求進殘賊酷虐若此人徒嫉善憎忠西漢李尋傳北山有鴟不潔其翼饕餮貪汚臭腐是食長鳴呼鳳謂鳳無徳東漢朱暉傳注互入不自覺醜妄論二門後漢孔奮為武都郡丞力行清潔為衆人所笑以為身處脂膏不能自潤通鑑羊祜不附結中朝權貴荀朂馮紞之徒皆惡之通鑑晉世祖佞邪醜正西漢張華傳燕封裕曰已無骨鯁嫉人有之通鑑晉紀互入嫉妬便佞之徒謂彊直為擅權唐書傳記趙簡子曰美女者醜之仇也盛徳之士亂世所疏也正直之行邪枉所憎也説苑集學者以莊老為宗而黜六經談者以虛薄為辯而賤名撿行身者以放濁為通而狎節性進仕者以苟得為貴而鄙居正當官者以望空為髙而笑勤恪其倚仗虛曠依阿無心者皆名重海内若夫文王日昃不暇食仲山甫夙夜匪懈盖共嗤㸃以為灰塵相垢病矣晉紀干寳總論孤直者衆邪之所憎公正者羣惡之所嫉陳子昂集奴顔婢膝真丐乞反以正直為狂癡陸魯望本朝在位而不肯自憂又禁他人使皆不得憂可嘆也歐公集渉水惡濕子是猶惡濕而居下孟子蒙塵而欲毋昧渉水而欲毋濡不可得也淮南子繆稱篇吹灰而欲毋昧渉水而欲毋濕不可得也淮南子史賈而欲贏而惡囂乎左昭元年集是徒渉而恥濡足也唐文粹勢不自由子樹欲靜而風不停家語政思犧牛衣文綉食芻菽入太廟雖欲為孤犢其可得乎列子象以牙䘮身不能去其白薫以芳自燒不能去其香蘇子史李斯臨刑謂其子曰吾欲與若復牽黄犬俱出上蔡東門逐狡兔豈可得乎史本傳夫士修之於家而壊之於天子之庭通鑑譬如磑石之上行蟻蟻行遲而磑轉疾後漢王充論衡宋劉穆之曰貧賤常思富貴富貴必履危機今日而欲為丹陽布衣豈可得耶通鑑晉書涼吕超曰如乘龍上天豈可中下通鑑晉紀獨孤后曰騎獸之勢必不得下隋書目見可欲何能自窒於心已與交私何能中絶其意通鑑唐徳宗李泌歸謂子弟曰吾本不樂富貴而命與願違今累汝曹矣同上傳記牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭䇿痛矣袁淮正書集女辭家而適人臣出身而事主禰正平賦遊山澤觀魚鳥心甚樂之一行作吏此事便廢晉嵇康與山濤絶交書去住與願違仰慙林間翮杜工部譬如籠中鶴六翮不自摇騎虎不敢下並韓集心雖出雲鶴身尚觸籠鷹心源雖了了塵世苦憧憧並元微之開卷不及顧沉埋案牘間世事波上舟沿洄安得主意有清夜戀身為符守嬰並韋應物一落名宦途酷如乘風􅊑奔走情波不自由並劉賔客驛馬走四蹄痛酸無歇期磑牛封兩目昏閉何人知樹欲靜而風不止並白樂天自嫌如疋素刀尺不由身杜牧之隨牒牽黄綬孟浩然雖百諾之自我終一呼而在君髙逹夫互入控制有道本朝始知鎖向金籠聽不及林間自在啼歐公集飄零不自由盛衰非汝能我生天地間一蟻寄}
  - {type: variant, offset: 2578, length: 2, content: 澤規, WYG: 磨區區欲右行不救風輪左並東坡詩一被簮裳裹長遭羅網牽欒城集力所不及經巧歴不能定其算數聖明不能為之典要法制所不能齊}
  - {type: variant, offset: 2578, length: 2, content: 澤規, krp: 磨區區欲右行不救風輪左並東坡詩一被簮裳裹長遭羅網牽欒城集力所不及經巧歴不能定其算數聖明不能為之典要法制所不能齊}
