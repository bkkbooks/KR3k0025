  - {type: variant, offset: 2002, length: 0, content: '', WYG: 不足以舒滿數舒發無不中舉坐莫敵毓歎而謝曰吾之不足以盡卿才有如此射矣晉書本傳宇文泰與侯景戰堕馬失所之左右皆散李穆罵曰隴東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸通鑑梁武紀互入反鋒而用漢文帝知李廣才而不能用乃歎其生不逢時唐魏元忠傳本朝唐李程貞元中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰公今須作狀元翌日無名於陵深不平乃於故册子末繕冩而斥其名氏攜之以訴主文主文歎賞不已於陵曰當今塲中若有此賦侍郎何以待之答曰非狀元不可}
