  - {type: variant, offset: 866, length: 1, content: 皆, WYG: 亦以驚矣一有不驚則必自與礫石者亦不逺矣鏌鎁卧於鉛鈍之中下工覩之固亦知矣一有不知則必自與鉛鈍者亦不多逺也毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤亦不多逺也唐文粹猛虎所以使物畏而不敢犯者以能威自居也故盤林横谷奮睛以拏怒掉尾以倚嘯厭食於羆豕麏麚之肉及棄其所長而欲弭目委首以待餒是知命懸於執者之手雖鹿麑得以狎而摶而申歩於咫尺安得自遂也同前非以智免則將禍随劉長卿南軍不袒左邊袖四老安劉是滅劉杜牧之佞媚之言出如絲棼一入於人治亂不分間諜之言出如鷹鸇鷹鸇之迅一舉凌天皮日休集本朝權衡之平物動則輕重差其於靜也錙銖不失水之鑒物動則不能有睹其於静也毫髪可辨歐公非非臺記聚則}
