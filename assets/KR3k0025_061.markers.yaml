  - {type: variant, offset: 1625, length: 0, content: '', WYG: 庾公在石頭王公在城忽風起揚塵王公以扇拂之曰元規塵汙人郭子元規庾亮字王公導也又見通鑑傳記憎人甚惡其餘胥尚書大傳大戰篇互入遷怒衆目難掩經人之視己如見其肺肝然記大學曽子曰十目所視其嚴乎同上史欲蓋而章左傳序劉洎曰借使遂良}
