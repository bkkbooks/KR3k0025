  - {type: variant, offset: 1275, length: 4, content: 唼音妾佞, WYG: 臣拜不稽首非尊家臣也所以辟君也荀子大畧君者國之隆也父者家之隆也隆一而治二則亂未有二隆爭重而能長久者荀子史周宰渠伯糾來聘父在故名左成四年欒書將載晉侯鍼曰書退時鍼為晉侯右書将中軍國有大任焉得專之注云在君前故子名其父左成十六年惟賢知賢經抜茅連茹以其彚征吉易泰卦子天下之至明能舉天下之至賢家語惟君子為能知類荀子楊素曰素聞惟賢知賢敢問夫子文中子王道篇史惟善故能舉其類詩云惟其有之是以似之左襄三年孝文召田叔問曰公知天下長者乎對曰臣何足知之上曰公長者宜知之田叔曰孟舒長者也}
