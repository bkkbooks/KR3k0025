  - {type: variant, offset: 27, length: 1, content: 必, WYG: 乎沒而後止也君子之學也入乎耳著乎心布乎四體形乎動靜學者固學一之也一出焉一入焉塗巷之人也荀子史范獻子曰人之有學猶木之有枝葉也國語東方朔曰臣學書三冬足用漢書本傳游衍乎六藝之圃馳騖乎仁義之塗覽觀乎春秋之林修容乎禮園翶翔乎書圃相如傳學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也虞溥傳陶鑄神情啟悟耳目北史仲尼積學成聖唐書傳記學者猶種樹也春翫其華秋取其實講説文章春之華也修身利行秋之實也顧氏家訓集考覈仁義之林藪班固典引茹古含今無有端倪皇甫湜撰韓愈墓誌天然生知姿學立游夏上杜詩沉潜乎訓義}
