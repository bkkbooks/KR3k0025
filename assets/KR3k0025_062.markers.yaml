  - {type: variant, offset: 168, length: 1, content: 臣, WYG: 呉方强盛未可圗也惟華以為不然及呉平之後紫氣愈明華聞豫章人雷煥妙逹緯象乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣惟斗牛之間頗有異氣華曰是何祥也煥曰寳劍之精上徹于天耳華曰君}
