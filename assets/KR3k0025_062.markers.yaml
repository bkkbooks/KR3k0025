  - {type: variant, offset: 171, length: 0, content: '', WYG: 與比符元逹善識味鹹酢及肉皆别所由或人殺雞以食之元逹曰此雞栖常半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無差時人以為知味並同上李守素通姓氏學世號肉譜虞世南曰昔任彦昇通經時稱五經笥今以倉曹為人物志}
  - {type: variant, offset: 171, length: 0, content: '', krp: 與比符元逹善識味鹹酢及肉皆别所由或人殺雞以食之元逹曰此雞栖常半露檢之皆驗又食鵝肉知黑白之處人不信記而試之無差時人以為知味並同上李守素通姓氏學世號肉譜虞世南曰昔任彦昇通經時稱五經笥今以倉曹為人物志}
  - {type: variant, offset: 172, length: 0, content: '', WYG: 乎唐書王元感為五經指南同上殷踐猷博學賀知章號為五總龜謂龜千年五聚問無不可知也新唐書劉杳博聞多識江右舊事緘青箱世謂之王氏青箱學南史澄博覽無所不知王儉自以博聞多識過澄澄俟儉語畢然後談所及遺漏數百十條皆儉所未覩儉乃歎服曰陸公書厨也南史陸澄傳劉孝綽子諒悉晉代故事時人號曰皮裏晉書南史本傳朱异遍治五經渉獵文史博奕書筭皆其所長沈約曰卿年少何乃不亷异未逹約曰天下惟有文義棋書卿一時將去可謂不㢘梁書房暉逺世傳儒學牛𢎞稱為五經庫隋書本傳古事問仲舒髙仲舒今事問琳尚何疑唐書崔琳傳常爽為儒林先生北史谷律那淹識羣書褚遂良稱為九經庫唐書本傳傳記揚雄懐鉛抱槧從計吏訪四方語作方言西京雜記漢武帝時未央宫殿前鍾無故自鳴詔問東方朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鍾先鳴三日南郡上言山崩東方朔外傳徐堅多識典故七入書府大唐遺事互見際遇總括方珠包吞九府史通時無逺近事無巨細必藉多聞以成博識史通集并包書林揚雄兵法五十家爾腹為篋笥杜詩収百世之闕文采千載之遺韻觀古今於須臾撫四海于一瞬陸士衡文賦文學穰穰囷倉稠韓集枯腸惟文字五千卷盧仝茶歌凡自唐虞以來編簡所存大之為河海髙之為山嶽明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奥㫖靡不通逹韓集書無所不讀然正}
