  - {type: variant, offset: 1191, length: 0, content: '', WYG: 葛龔善為文奏或有請龔奏以干人者龔為作之因并冩龔名以進之時人為之語曰作奏雖工宜去葛龔裴筞笑林又見史通漢桓帝時有人辟公府請人作奏記邯鄲笑林互入不學不出胷臆非由機杼史通集遞相祖述杜詩沿襲傷剽盜韓薦士詩惟古於詞必己出降而不能乃剽賊後皆指前共相襲從漢迄今用一律韓愈樊宗師墓誌銘互入評文襲蹈前人言句韓文樊紹述墓誌窺陳篇以盜竊進學解得毋假之人耶韓滂墓誌為文之士多漁獵前代戕賊文史抉其意抽其華置齒牙間遇事蠭起金聲玉耀誑聾瞽之人邀一時之聲雖終淪棄而其奪朱亂雅為害己甚栁集答友人求文章書本朝段成式父之蜀以雉兔遍遺幕府請人囘書孔帖祥符中命詞臣撰日本國祥光記當直者學不優常以張君房代之既得宣甚急張醉飲樊樓紫微大窘後錢楊二公作閒忙令大年曰世上何人號最閒司諫拂衣歸華山謂种放也希白曰世上何人號最忙紫微失却張君房湘山野錄醇正經非法不言非道不行孝經子君子正而不它揚子問道非正不視非正不聽非正不言非正不行夫能正其視聽言行者昔吾先師之所畏也揚子淵騫史非聖哲之書不好西漢揚雄傳仲舒推明孔氏抑黜百家本傳遭漢承秦滅學之後六經離析下帷發憤潛心大業今後學者有所統一為羣儒首董仲舒傳抑抑仲舒為世醇儒西漢叙傳韓愈自比孟軻以荀況揚雄為未醇唐書韓愈贊愈以六經之文為諸儒倡障隄末流返刓以樸剗偽以真其所得粹然一出於正同上集非三代兩漢之書不敢觀非聖人之志不敢存韓文學者尚知宗孔氏崇仁義貴王賤霸吐辭為經舉足為法孟氏醇乎醇者也並同上駁雜子奕之為數小數也不專心致志則不得也孟子告子上無冥冥之志者無昭昭之明無惛惛之事者無赫赫之功荀子勸學自古及今未嘗有兩而能精者也荀子解蔽行衢道者不至荀子勸學夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之内一舉千萬里淮南子孔子讀而儀秦行何如也曰甚矣鳳鳴而鷙翰也惜乎衣未成而轉為裳也並揚子史淳于髠博聞强記學無所主史本傳谷永于經書汎為疏逹與杜欽杜鄴畧等不能浹洽如劉向父子及揚雄也前漢賈山渉獵書記不能為醇儒本傳夏侯勝從始昌受尚書從子建師事勝建又從五經諸儒問與尚書相出入者牽引以次章句具文飾説勝非之曰建所謂章句小儒破碎大道並本傳本朝多好竟無成不精安用夥東坡詩涵養經蒙以養正易䝉卦徳潤身心廣體胖大學澡身浴徳記儒行君子之于學也藏焉修焉息焉遊焉記學記子養心莫善於寡慾持其志毋暴其氣我善養吾浩然之氣存其心養其性所以事天也並孟子瞻彼闋者虛室}
