  - {type: variant, offset: 2814, length: 433, content: 內麾定四方唐書李靖傳傳記荊次非得寶劍涉江至中流有兩蛟夾繞其船次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中腐肉朽骨耳棄劍而已遂攘臂祛衣拔劍赴江刺蛟殺之而復上舟中之人皆獲全呂氏春秋勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣響動於天說苑集義勇冠三軍李陵書威噞秋霜選左太沖魏賦威懾兕虎莫之敢伉張平子西京賦樊抗憤以卮酒咀彘肩以激揚潘安仁西征賦眥血下沾襟怒髮上衝冠盧子諒覽古詩鋒捍特起選檄趫材悍壯同上控劍叱咤八荒奔馳陳子昂集雷電之震虎豹之擊同上千里霧合一呼雲屯駱賓王擁拔山超海之雄驅躍景騰霄之騎同上子雖軀幹小老氣橫九州挺身艱難際張目眡寇讎杜詩互見不以貌取吹噓而霜露變化叱咤而風塵消弭唐文粹掣開流電有輝光突過浮雲無定跡元稹名冠壯士籍元微之勢猛破堅摧剛排健合檢經有力如虎執轡如組詩簡兮奡盪舟論語憲問子力能裂犀兕之革曳九牛之尾猶憾其弱列子觸不周之力折天柱絕地維同上千鈞之重烏獲舉之而輕多力耳楊子脩身篇注千鈞之輕烏獲力也楊子史犖有力焉能投蓋于稷門左莊三, WYG: 卷六}
