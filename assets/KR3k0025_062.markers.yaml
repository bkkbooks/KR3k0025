  - {type: variant, offset: 82, length: 1, content: 主, WYG: 班固傳叙枕經籍書西漢賔戲劉向專積思於經籍書傳夜觀星宿或不寐逹旦西漢本傳榮學長安精力不倦十五年不窺家園後漢桓榮傳光武正旦朝賀禮畢令羣臣能説經者更相詰難義有不通輒奪其席戴憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中後漢閉戸講誦絶人間事每嘗昧爽櫛梳坐于客堂朝則誦羲文之易虞夏之書歴公旦之典禮覽仲尼之春秋夕則逍遥内階詠詩南軒百家衆氏投間而作洋洋乎其盈耳也煥爛乎其溢目也紛紛欣欣兮其獨樂也當此之時不知天之為葢地之為輿不知世之有人己之有軀東漢延篤傳李固郃之子也少好學常改易姓名䇿杖驅驢負笈従師不逺千里遂究覽墳籍為世大儒每到太學密入公府定省}
