  - {type: variant, offset: 170, length: 0, content: '', WYG: 得之吾少時有相者言吾年出六十位登三事當得寳劍佩之斯言豈效與因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰密共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石圅光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒豔發大盆盛水置劍其上視之者精芒眩目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公其可欺乎煥曰本朝将亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去不永為人服也華得寳劍愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劍倍益精神華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽于腰間躍出堕水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而返須臾光彩照水波浪驚沸于是失劍華歎曰先君化去之言張公終合之論此其驗乎華之博物多類此不可詳載焉張華博物洽聞世}
  - {type: page-break, offset: 170, content: '', id: KR3k0025_WYG_062-17a, image: WYG0932/WYG0932-0009c.png}
