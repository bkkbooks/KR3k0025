  - {type: variant, offset: 1497, length: 2, content: 詩亦, krp: 仲尼聞之見于郯子而學之左昭十七年孔子學鼓琴於師襄子史孔子世家問事不休賈長頭後漢賈逵傳傳記仲尼之聖訪諸郯子始聞少皥之官叔向之賢詢彼國僑載辨黄熊之祟史通集靡事不咨楊荆州誄為善不篤經擇乎中庸而不能期月守也中庸其餘則日月至焉而已矣中庸之為徳也其至矣乎民鮮久矣並論語子五榖不熟不如荑稗孟子改過經顔子}
