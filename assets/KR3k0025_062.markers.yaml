  - {type: variant, offset: 1272, length: 1, content: 七, krp: 清虛靜泰少私寡欲嵇叔夜行之乎仁義之塗游之乎詩書之源無迷其塗無絶其源終吾身而已矣種學績文以蓄其有泓涵演迤日大以肆養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄並藍田記沉浸醲郁含英咀華磨礱去圭角並韓集公之徳善灌注心耳孕和含粹濯潤本根並劉賔客以貞和陶其性白樂天神全而正氣凝宇定而天光發李文饒本朝信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末此古之人所以大過人東坡雜記知寳玉璠璵難得而易毁故篋櫝以養其全知楩楠豫章積嵗而後成故封殖以待其長奏}
