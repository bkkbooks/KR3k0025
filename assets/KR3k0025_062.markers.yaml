  - {type: variant, offset: 1500, length: 2, content: 雲霄, WYG: 不善未嘗不知知之未嘗復行也不逺復無祗悔君子有過則改无咎者善補過也並易改過不吝書不貳過過則勿憚改並論語子子路鼓瑟孔子聞之曰習亡國之音能保六尺之體乎冉有以告子路子路懼而自悔靜思不食以至骨立家語互入勇於改過晉人有馮婦者善搏虎卒為善士孟子萬章上子路人告之以有過則喜孟子公孫丑上聞過而有喜色程元能之文中子史呉季札如晉將宿于戚聞鍾聲焉曰夫子獲罪於君而在此懼猶不足而又何樂文子聞之終身不聽琴瑟人誰無過過而能改善莫大焉君子能知其過必有令圗天所贊也並左傳改往反過前漢谷永傳有盜牛者主得之盗請曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懐恥惡必能改過故以此激之後有老父遺劍於路行道一人見而守之至暮老父還尋得劒怪而問其姓名以事告烈使推求乃先盜牛者也東漢王烈傳周處少不修細行州里患之自知為人所惡慨然有改勵}
  - {type: page-break, offset: 1500, content: '', id: KR3k0025_WYG_062-34a, image: WYG0932/WYG0932-0018a.png}
  - {type: page-break, offset: 1500, content: '', id: KR3k0025_WYG_062-34b, image: WYG0932/WYG0932-0018b.png}
