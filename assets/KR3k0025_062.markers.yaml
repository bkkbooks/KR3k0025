  - {type: variant, offset: 2145, length: 0, content: '', krp: 已㓜輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌晉書孫子荆謂王武子曰當枕流潄石武子曰石非}
  - {type: variant, offset: 2146, length: 0, content: '', WYG: 潄流非可枕孫曰流欲洗其耳所以枕石欲礪其齒所以潄晉書王隱傳互入因誤成誤李林甫子岫見權勢熏灼曰大人居位久枳棘滿前一旦禍至若欲比若人可得乎林甫不樂曰勢已然可奈何唐書傳記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曹劉沈謝暗中摸索着亦可識國史賈充問孫皓曰何以剝人面皓曰憎其顔之厚耳語林本朝仁宗朝王安石知制誥一日賞花釣魚宴内侍各以金楪盛釣餌藥置几上安石食之盡明日帝謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也聞見錄自是經自}
