  - {type: variant, offset: 3249, length: 478, content: 叔山冉摶人以投中車折軾成十六齊高固入晉師桀石以投人禽之而乘其車成二晉伐偪陽懸門發聊人紇抉之以出門者狄虒彌建大車之輪而蒙之以甲以為櫓左執之右拔戟以成一隊孟獻子曰詩所謂有力如虎者也襄十楚子期抉豫章以殺人注以效其多力豫章大木哀十六年惡來有力史秦紀注手裂虎兕朱亥力士袖四十斤鐵椎椎殺晉鄙通鑑周紀武力鼎士西漢鄒陽傳力扼虎李廣傳力拔山兮氣蓋世項籍傳力扛鼎空手摶熊彘猛獸戾太子傳投石拔距絕於等倫甘延壽傳許褚勇力絕人漢末汝南賊萬餘人攻褚飛石擲之所值皆摧碎偽與賊和以牛與賊易食賊來取牛牛輒奔還褚乃出陳前一手逆曳牛尾行百餘步三國魏志本傳亙石虔趫捷絕倫於獵圍中見猛獸被箭而伏石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸晉書秦淮南王苻生力舉千鈞手格猛獸走及奔馬擊剌騎射冠絕一時通鑑晉哀帝紀羊侃膂力絕人所用弓至二十石馬上用六石梁書蒼頭犀角大刀其鋒甚銳通鑑陳宣帝紀北齊事傳記奡能陸地行舟白帖烏獲扛鼎舉千鈞白帖集批熊碎掌拉虎摧斑文選七啟攫戾執猛納堅摧剛張平子南都賦迴天倒日之力力盪海而拔山選吊文力排南山李白梁甫吟握鉤伸鐵撫梁易柱皮日休鹿門隱書本朝擊強如摧枯山谷力能抉關孔帖, WYG: ''}
