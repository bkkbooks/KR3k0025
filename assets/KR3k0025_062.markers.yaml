  - {type: variant, offset: 166, length: 0, content: '', WYG: 園中芽積下得一白魚質状殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化為雉也開視雉側果有蛇蜕焉呉郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻為魚形叩之則鳴矣于是}
