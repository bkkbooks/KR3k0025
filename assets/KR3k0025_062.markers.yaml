  - {type: variant, offset: 165, length: 0, content: '', WYG: 多所博觀外家之語索隱曰外家非止經史即傳記雜説之書史滑稽傳田蚡學盤盂諸書本傳劉向揚雄博極羣書西漢司馬遷為太史令紬史記石室金匱之書太史公自序其渉獵者廣博貫穿經傳馳騁古今班固贊五經紛綸井大春後漢周舉博洽為儒者所宗京師為之語曰五經縦横周宣光後漢沉淪典籍為儒家文林後漢崔寔傳仲尼恥一物之不知晉張衡傳所觀彌博所習彌多日聞所不聞日見所不見晉虞溥傳巨骨出呉隼集陳庭黄熊入夢亥有二首非夫洽聞者莫識其端也東漢謝該傳晉杜預朝野號為武庫言其無所不有也晉書本傳王粲博物强記問無不對魏志裴頠博學稽古周弼見而歎曰若武庫五兵縱横一時之傑也荀朂于路逢趙賈人牛鐸識其聲及掌樂音未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又嘗在帝坐進飰謂在坐人曰此勞薪所炊帝遣問膳夫實用故車脚舉世服其明識並晉書天下竒秘世所希有者悉在華所由是博物洽聞世無與比惠帝中人有得鳥毛三丈以示華華見惨然曰此謂海鳬毛也出則天下亂矣陸機嘗餉華鮓于時賔客滿坐華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果}
