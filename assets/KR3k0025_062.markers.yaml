  - {type: punctuation, offset: 31, content: 《, id: KR3k0025_CHANT_062-bkkpn9}
  - {type: variant, offset: 31, length: 7, content: 孟視泰山如彈丸, WYG: 韓集好學附精專經君子進徳修業欲及時也易惟學遜志務時敏厥修乃來念終始典于學厥徳修罔覺書説命下惟日孜孜無敢逸豫書君陳夙夜强學以待問記儒行子流水之不腐以其逝故也戸樞之不蠧以其運故也子華子用志不分乃凝於神列子好書者衆矣而倉頡獨傳者一也好稼者衆矣而后稷獨傳者一也好樂者衆矣而䕫獨傳者一也倕作弓浮㳺作矢而羿精於射奚仲作車乘杜作乘馬而造父精於御天下未嘗有兩而能精者也荀子解蔽君子强學而力行揚子修身辰乎辰曷來之遲去之速君子競諸揚子問明周公上聖日讀百篇仲尼天縦韋編三絶墨翟大賢載文盈車仲舒命世不窺園圃倪寛帯經以耘耡路生截蒲以冩書黄霸桎梏以受業寗子夙夜以倍功}
