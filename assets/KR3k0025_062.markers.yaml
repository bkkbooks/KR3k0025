  - {type: variant, offset: 605, length: 0, content: '', WYG: 楊愔性强記一見皆不忘其姓名選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊乘短尾牡驢見我不下以方麴障面我何為不識卿漫漢驚服通鑑梁敬帝王粲觀人圍棊局壊粲為覆之不悞一道其强記如此魏志本傳王粲與人共行讀道邊碑人問曰卿能闇誦乎曰能因使背而誦之不失一字同上朱桓强識與人一面數十年不忘部曲妻子悉識之呉志本傳張華强記黙識帝問漢宫室制度及建章千門萬戸華應對如流畫地成圗强記黙識四海之内若指諸掌晉本傳唐太宗寫列女傳於時無本虞世南暗疏之無一字謬本傳張廵讀書不過三復終身不忘唐書本傳張廵初守睢陽時城中居人亦且數萬廵一見問姓名其後無不識者通鑑唐肅宗紀蘇頲一覽至千言輒覆誦唐書本傳李邕自言讀書未遍乃假直秘書未㡬辭去李嶠驚問隱篇隱帙了辨如響唐書傳記晉羅友為人强記從桓宣武伐蜀按行蜀道阡陌菓竹皆黙記之世説開元中常敬忠十五嵗上書言能一過誦千言張燕公召問曰能十過誦萬言乎曰能以萬言試之七過已誦熟御史臺記太宗征遼碑在水中張建章帛包麥屑置水中摸而讀之不欠一字北夢𤨏言集為人强記覽過眼不再讀偉哉羣聖文磊落載其腹韓詩經目所渉莫不精詣唐文粹廵曰吾於書讀不過三遍終身不忘也因誦于嵩所讀書盡卷不錯一字嵩驚以為廵偶熟此卷因亂抽他帙以試無不盡熟嵩又取架上諸書以問廵廵應口誦無疑嵩從廵久亦不見廵常讀書也韓文張中丞後序本朝昔賢書曹娥碑後}
