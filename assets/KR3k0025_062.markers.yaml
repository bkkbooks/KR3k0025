  - {type: variant, offset: 97, length: 2, content: 薛宣, WYG: 江泌随月光讀書斜則握卷升屋南史李鉉以鄉里寡文集來遊京師讀所未見書北史李邕自言讀書未遍願直秘閣李嶠曰秘閣萬卷豈時日能習耶邕固請乃假直秘書杜佑嗜學雖貴猶夜分讀書栁仲郢嗜學嘗和熊膽丸夜嚥以助勤並唐書陸龜䝉勤學卷不去手新唐書本傳傳記褚陶清談閒黙以墳典自娯語所親曰聖賢備在黄卷中舎此何求世説善學者若齊王之食雞必也食其跖數千而後足吕氏春秋孫康家貧無油映雪讀書孫氏世錄李頻曰只将五字句用破一生心北夢𤨏言互入詩門劉向校書天祿閣夜有老人著黄衣植青藜杖授向五行洪範云我是太乙之精天帝聞卯金之子有博學者下而觀焉晉王嘉拾遺傳匡衡勤學無燭鄰有燭乃穿壁引其光而讀之西京雜記管寜隱居好學藜床半穿髙士傳張儀蘇秦傭書遇聖人之文無題記則以墨書掌内股裏夜還折竹冩之王子拾遺殷亮建武中}
