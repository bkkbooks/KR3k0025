  - {type: variant, offset: 1643, length: 223, content: 羞唐文本朝唐進士張彖氣高大未嘗低折於人嘗曰大丈夫有蓋世之志而拘於下位若立身於矮屋中使抬頭不得遂拂衣遯於嵩山東坡詩注史意豁如也常有大度不事家人生產作業西漢高祖紀一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟袁盎傳互見高誼細故芥蔕何足以疑賈誼傳大人者不牽小名以成大功同上並西漢內無關鑰通鑑三國魏志蔣濟志節慷慨常有超越江湖吞吳會之志魏志張嘉貞性簡疏與人不疑內曠如也唐書本傳丈夫以氣相許小嫌不足置胸中尉遲敬德傳臧希讓骯髒好談時政代宗實錄並唐書王述為楊, WYG: ''}
