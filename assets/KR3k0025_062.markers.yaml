  - {type: variant, offset: 161, length: 0, content: '', WYG: 答客難集螢映雪編蒲緝栁選薦表筆耕為養選表書秃千兔毫詩裁兩牛腰李太白集白髪死章句同上朝馳騖乎書林夕翺翔乎藝苑韓文復志賦互入頃刻不忘善口不絶吟於六藝之文手不停披于百家之編記事者必提其要纂言者必鈎其𤣥貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年補苴罅漏張皇幽𦕈尋墜緒之茫茫獨旁搜而逺紹古史散左右詩書置後前豈殊書蠧蟲生死文字間並韓集平居雖寢食未嘗去書息以為枕餐以飴口墓誌弋志書林咀風騷于七畧耕情義圃偃圗籍于九流駱賔王屢益蘭膏燈猶硏兎枝墨元稹躭嗜文籍注意鑽礪栁文鑽仰沈硏僅於不窺園井元微之開卷有益便欣然忘食陶淵明以道為飲以文為食聰察嗜學不肯為凡夫劉賔客貫穿學問骨唐文粹退公猶筆耕劉賔客讀書眼欲暗下筆手生胝白侍郎堯舜癯瘠大禹胼胝彼聖人焉吾布衣耳不勤劬何以為妻子之天乎陸魯望猶波之委於瀆瀆之注於溟晝夜何曾知息之時唐文粹本朝農馬智專吾不讓後山詩騷人思苦骨巖巖欒城集天以日運故無疾器以日用故不蠧東坡集尚有讀書清浄業未嘗春睡敵千鍾東坡詩徐鉉黜邠州年七十手不釋卷常親𨽻書寫許慎説文一帙宋拾遺不學經不學墻面書周官雖有至道弗學不知其善也記學記玉不琢不成器人不學不知道同上互入矯揉子卜商反衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥扵是衛以子夏為聖家語七十二子篇人而不學雖無憂如禽獸何揚子學行几薄之徒懐抱空虛有似蜀人匏壺之喻胷中無一紙之識不過酒炙所謂冒于貨賄貪於酒食左氏所載不才之子抱朴子互入不才史周原伯魯不説學閔子馬曰學殖也不學将落原氏其亡乎左昭十八年互入識者所窺范獻子聘于魯問具山敖山魯人以鄉對獻子曰不為具敖乎曰先君獻武之諱也獻子歸曰吾名其二諱為笑矣惟不學也國語互見明於自知秦有司奏太白罰星東井秦分必有暴兵起京師秦主苻生曰太白入井自為渴耳何所怪乎通鑑晉紀江州刺史陳伯之目不識書得文牒辭訟惟作大喏而已通鑑梁髙祖北齊源師攝祠部嘗白髙阿那肱龍見當雩阿那肱驚曰何處龍見其色何如師曰龍星初見禮當雩祭非真龍也阿那肱怒曰漢兒多事强知星宿遂不祭陳紀又見三國典畧選人入等者六十四人上召面試之張爽手持紙終日不成一字時人謂之曳白唐𤣥宗紀光不學無術西漢霍光傳生世不學其猶穴處何所見焉北史雷紀傳戸部侍郎蕭炅言烝嘗伏臘為伏獵嚴挺之白張九齡曰省中而有伏獵侍郎乎唐嚴浚傳李林甫無學術時選人嚴逈判語杕杜二字林甫不識謂吏部侍郎韋陟曰此云杖杜何也陟俛首不敢言唐書臧希讓無學術公卿間强引古言以自賢而所聞知多道途得之發必差謬為士子所笑同上任圜曰天下皆知崔協不識文字而有表號為沒字碑五代史任圜傳傳記韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實互見不克紹霍光無學不知一經史通桓帝時有辟公府椽者倩人作奏記邯鄲氏笑林互見代筆張由古無學業對衆歎班固文章不入文選衆對以兩都賦燕然銘由古曰此是班孟堅非固也唐温庭筠乾􅀈子李建勲罷相江南出鎮豫章一日逰西山田間茅舎有老叟教村童公觴於其廬連食數棃賔僚有曰梨號五臟刀斧不宜多食叟笑曰鶡冠子云五藏離别之離非梨也葢離别胷懐有若刀斧遂就架取小冊振拂以呈丞相乃鶡冠子也吳僧文瑩湘山野錄江南有一權貴讀誤本蜀都賦注解蹲鴟芋也芋乃為羊字人饋羊肉答書云損惠蹲鴟顔氏家訓太常少卿姜度生子李林甫手書慶之曰聞有弄麞之慶客視之掩口續說記强勉經君子以自强不息易乾卦功崇惟志業廣惟勤書周官子道雖邇不行不至事雖小不為不成荀子修身鍥而不舎金石可鏤荀子勸學史子順曰人皆作之作之不止乃成君子作之不變習與體成則自然也通鑑强勉學問則聞見博而智益明强勉行道則徳日起而大有功西漢董仲舒傳傳記蘇秦讀書欲睡引錐自刺其股血流至足戰國䇿孫敬嘗閉戸讀書睡則以繩繫頭懸之梁上先賢傳集䇿駑磨鈍陳子昻磨鉛重剸割䇿蹇再奔馳白侍郎無若泰山之麓止而不得升也其惟川之不已乎栁文偷堕經惰農自安不昏作勞不服田畆越其罔有黍稷書盤庚中人之性好逸豫無逸注弗為胡成太甲下安肆日偷記表記逸豫無期詩白駒子子貢曰賜倦于學困于道矣願息可乎家語處身而常逸者則志不廣同上一進一退六驥不致荀子修身其為人也多暇日者其出入不逺矣偷懦憚事無㢘恥而嗜乎飲食則可謂惡少者也並同上肉腐出蟲魚枯生蠧怠惰忘身禍災乃作荀子勸學史懐與安實敗名左僖二十三年管敬仲曰宴安酖毒不可懐也左閔元年吾儕偷食朝不謀夕左昭元年主民翫嵗而愒日左昭元年愒若葢切雀䑕貪生茍乞一活耳通鑑東漢世祖紀相聚偷生如魚逰釜中知其不可久且以喘息湏臾間耳通鑑漢殤紀集怠者不能修韓文原毁本朝坐棄時日臨川筆硯生塵空度日欒城集矯揉經玉不琢不成器人不學不知道記學記子子路曰南山有竹不揉自直斬而用之逹于犀革以此言之何學之有孔子曰括而羽之鏃而礪之其入不亦深乎家語子路篇純璞不殘孰為犧樽白玉不毁孰為圭璋紀渻子為齊宣王養鬬雞十日而問雞已乎曰未也方虛憍而恃氣十日又問曰未也猶應響景十日又問曰未也猶疾視而盛氣十日又問曰㡬矣雞雖有鳴者已無變望之似木雞矣其徳全矣並荘子西門豹性急故佩韋以自緩董安于性緩故佩絃以自急韓子木直中繩揉以為輪其曲中規雖有槁暴不復挺者揉使之然也荀子勸學枉木必得櫽括然後直鈍金必得礱厲然後利荀子性惡玉不雕璵環不作器揚子海蚌未剖則明珠不顯崐竹未斷則鳳音不彰劉子呉竽質勁非楛羽而不美越劍性利非淬礪則不銛同上候自直之箭則百代無一矢候自員之木則千嵗無一輪韓子假儒衣書服而讀之三月不歸孰曰非儒也揚子史虎豹馬牛禽獸之不可制也及其教馴服習之至牽持駕服惟人之從西漢公孫𢎞傳治性之道審己之所有餘而强其所不足聰明疏通者戒于太察寡聞少見者戒于壅蔽勇猛剛强者戒于太暴仁愛温良者戒于無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘匡衡傳金在礦何足貴善冶鍛而為器人乃寳之魏徴傳集刓方以為圜楚辭若金受礪若泥在鈞張茂先礪志詩木以繩直金以淬剛必須砥礪就其鋒鋩蔡邕勸學不自朱藍何遷素絲之質晉王儉表木之性直匠者揉以為輪金之性剛工人理之成器豈人事也惟上智下愚特禀異氣中庸之才全由訓習虞世南刻意厲行如奉商鞅之法而懼秦刑皇甫湜唐太宗性本强悍勇不頋親而能畏義好賢屈己從諌刻厲矯揉力于為善此所以致貞觀之治也范唐鑑博洽經君子多識前言往行易大畜好古博雅君子書序君子之學也博儒有博學而不窮記儒行博學無方記内則子多聞曰博多見曰閒荀子修身史鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣今夢黄熊入于寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黄熊以入羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間左傳晉悼夫人食輿人之城把者絳縣人或年長矣無子而往與于食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子於承匡之嵗也七十三年矣史趙曰亥有二首六身下二如身是其數也士文伯曰然則二萬六千六百有六旬也杜註云亥字二畫在上併三六為身如筭之六也同上呉伐越堕㑹稽得骨節專車呉使使問仲尼骨何者最大仲尼曰禹致羣臣于㑹稽山防風氏後至禹殺而戮之其節專車此為大也史記有隼集於陳庭而死楛矢貫之石砮矢長尺有咫陳湣公使問仲尼仲尼曰隼來逺矣此肅慎氏之矢也昔武王克商通道九夷八蠻使各以其方賄來貢于是肅慎貢楛矢石砮長尺有咫先王以分大姬配虞胡公而封諸陳試求之故府果得之同上莊子其學無所不窺史本傳禇先生好讀外家傳語史滑稽}
