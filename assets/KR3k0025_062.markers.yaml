  - {type: variant, offset: 1274, length: 0, content: '', WYG: 此老如松柏不受雪霜槁直従毫末中自養至合抱東坡詩虛室清泠都是白靈臺瑩浄别生光邵堯夫集醖藉經居上位而不驕在下位而不憂易乾卦瑟彼玉瓚黄流在中詩旱麓人不知而不愠不亦君子乎語學而不患人之不己知同上互入盡其在我令尹子文三仕為令尹無喜色三己之無愠色論語史薛廣徳為人温雅有醖藉西漢薛廣徳本傳桓榮温恭有醖藉東漢桓榮本傳杜如晦以風流自命唐書權徳輿醖藉風流自然可慕元和間為縉紳羽儀唐書權徳輿本傳張九齡體約有醖藉帝後每用人必曰風度能若九齡否通鑑唐𤣥宗紀操修經剛健篤實光輝日新其徳易大畜卦君子以懲忿窒慾易損卦閑邪存其誠易乾卦不逺之復以修身也易損卦君子進徳修業忠信所以進徳也修辭立其誠所以居業也易乾卦如琢如磨者自修也記大學率性之謂道中庸修身則道立非禮不動所以修身也好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人君子所不可及者其惟人之所不見乎並同上姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義記樂記修身踐言謂之善行曲禮敖不可長欲不可從志不可滿樂不可極同上曽子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎言寡尤行寡悔敏於事而慎於言就有道而正焉志於道據於徳依於仁游於藝篤信好學守死善道克己復禮為仁克伐怨欲不行焉並論語言思可道行思可樂非先王之法服不敢服非先王之法言不敢道非先王之徳行不敢行孝經子君子博學而日三省乎己則知明而行無過矣見善修然必以自存也見不善愀然必以自省也善在身介然必以自好也不善在身菑然必以自惡也並荀子夫能正其視聽言行者昔吾先師之所畏也揚子淵騫互入醇正集斧藻至徳琢磨令範選詩序戕賊經枝葉未有害本實先撥詩大雅傷其本枝從而亡記哀公問子苟得其養無物不長苟失其養無物不消}
