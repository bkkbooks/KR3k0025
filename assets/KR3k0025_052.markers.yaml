  - {type: variant, offset: 1260, length: 4, content: 楊綰清談, WYG: 年三十尚未知名人謂之癡導以門地辟之既見唯問江東米價述張目不荅導曰王掾不癡人何言癡也通鑑石勒集衣冠人物别為君子營晉紀孫權克荆州将吏悉歸附潘濬不見權遣人致之為治中荆州諸軍事一以諮之吴志馬秀曰揚雄作太𤣥唯桓譚以為必傳後世晉書魏主嘗引崔浩出入卧内嘗指浩以示新降髙車渠帥曰汝曹視此人尫纎懦弱不能彎弓持矛然其胷中所懐乃過於甲兵通鑑良玉未剖與瓦石無異騏驥未試與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分北史辛彦之拜隋州刺史于時州牧多貢珍玩惟彦之所貢並供祭之物髙祖善之顧謂朝臣曰人安得無學彦之所貢稽古之力也隋書吏部侍郎髙孝基名知人見𤣥齡曰僕閱人多矣未見如此郎者見如晦謂曰君有應變之才必任棟梁之重俱以子孫託之張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄}
  - {type: page-break, offset: 1260, content: '', id: KR3k0025_WYG_052-92a, image: WYG0931/WYG0931-0454a.png}
  - {type: page-break, offset: 1260, content: '', id: KR3k0025_WYG_052-92b, image: WYG0931/WYG0931-0454b.png}
