  - {type: variant, offset: 704, length: 0, content: '', krp: 喜怒怨愛禍福所因可不謹歟東漢孔融傳當及其根柢未深而撲取之此救火貴速之勢也通鑑百尋之屋突直而燎焚千里之堤蟻垤而穿敗古人防小以全大謹㣲以杜萌晉書魏徴上言比者弟子陵師奴婢忽主下多輕上皆有為而然漸不可長通鑑禇遂良曰諌臣必諌其漸及其滿盈無所復諌唐書沛王賢聞王勃善屬文召為修撰時諸王鬭雞勃戯為文檄英王雞太宗見之怒曰此乃交構之漸斥勃出沛府通鑑小者大之漸㣲者著之萌故君子謹初聖人存戒隙不在大唐書傳記諺曰教婦初來教兒嬰孩顔氏家訓狐䑕㣲物亦蠧大猷選彈文不能謹㣲經由辯之不早辯也小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可揜罪大而不可解易差若毫釐繆以千里禮子子曰蒼梧嬈娶妻而美讓其兄矣然非禮之讓也不謹其初而悔其後何嗟及矣熖熖不滅炎炎若何㳙㳙不壅終為江河綿綿不絶或成網羅毫末不札將尋斧柯家語㳙㳙源水不壅不塞轂旣破碎乃大其輻事以敗矣乃重歎息其亡益乎荀子木之折也必通蠧牆之壊也必通隙韓非子史為虺弗摧為蛇將若何國語綿綿不絶蔓蔓柰何毫釐不伐將用斧柯史蘇秦傳盗賊始發其源甚㣲部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百通鑑髙恭之曰養虺成蛇悔無及矣北史本傳上初苦風眩頭重目不能視百司奏事上或使皇后决之后性敏涉獵文史處事皆稱㫖由是始委以政事權與人主侔矣通鑑集㳙㳙不遏終變桑田燄燄靡除卒燎原野陸贄奏議毫釐之差或致弊於寰海晷刻之娱或遺忘於歴年韓愈為宰相表本朝白起發一疑心坑虎士如蟣蝨石崇發一快心截蛾眉如芻俑李斯發一忍心横屍四海楊國忠發一疾心激禍百年其端甚㣲其流甚廣明道集卵􅑹不除使成羽翼續世說鑒别經旌别淑慝彰善癉惡書儗人必於其倫記曲禮下孔子曰管仲遇盗取二人焉上以為公臣曰其所與游辟也可人也注言此二人但居惡人之中使之犯法記雜記下凡賜君子與小人不同日禮子夏曰可者與之其不可者拒之語子是非之心智之端也孟有權衡之稱者不可欺以輕重管子駑驥同轅伯樂為之咨嗟玉石相揉和氏為之歎息孔叢子甯戚擊角而疾歌齊桓公聞之曰異哉歌者非常人也命後車載之淮南子馬有驥之一毛不可謂之驥龍有蛇之一鱗不可謂之蛇劉子魏徴曰大業之際徴也嘗與諸賢侍文中子謂徴及房杜曰賢輩雖聰明特達然非董薛程仇之比雖逢明主必愧禮樂文中子史淳于髠曰狐裘雖弊不可補以黄狗之皮人固未易知知人亦未易史信數與}
