  - {type: variant, offset: 2325, length: 401, content: 史記楚世家商紂好酒淫樂嬖於妲己妲己之言是從史記殷本紀中山王勝為人樂酒好內有子百二十餘本傳後房婦女以百數西漢田蚡傳張敞為京兆尹為婦畫眉長安中傳張京兆眉嫵西漢本傳寧不知傾城與傾國佳人一失難再得前漢外戚傳後堂理絲竹西漢張禹傳前堂羅鐘鼓西漢田蚡傳謝安愛好聲律晉書王垣之傳孟嘉好酣飲愈多不亂亙溫問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳晉書本傳謝安雖放情丘壑然每遊賞必以妓女從同上山簡每至高陽習家池飲酒大醉而歸劉伯倫銜盃漱醪無思無慮其樂陶陶晉書齊東昏侯寵潘貴妃乃於殿中鑿金為蓮以貼地令潘姬行其上曰此步步生蓮花通監李元忠雖處要任不以物務干懷唯飲酒自娛丞相歡欲用為僕射世子澄言其放達常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒通監梁武紀置左右教坊以教俗樂樂工數百人自教法曲於梨園謂之皇帝梨園弟子通監唐元宗傳記鴻臚孔群好飲酒王丞相語云卿恒飲酒不見酒家覆缾布日月久則糜爛群曰公不見糟中肉乃更堪久, WYG: ''}
