markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷五十二宋潘自牧撰識見部省悟子方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也軒冕在身非性命也物之儻來寄也人生天地間若白駒之過隙忽然而已不可以無涯之智役有涯之身莊子史屈原曰衆人皆醉而我獨醒人生如輕塵栖弱草耳何至自苦乃爾通鑑早知富貴有命恨不十年讀書梁忠烈世子曰吾不及魚鳥逺矣魚鳥飛浮任其志性吾之進退常在掌握若使吾終得與魚鳥同遊則去人間如脱屣耳南史傳記富貴之畏人不如貧賤之肆志益我財者損我神生我名者殺我身皇甫士安髙士傳集愍流俗之未悟獨超然而先覺成公子安嘯賦富貴茍難圖税駕從所欲陸士衡詩迷途知反丘希範書既自以心為形役奚惆悵而獨悲悟已往之不諌知來者之可追實迷塗其未逺覺今是而昨非陶淵明窮涯而反盈量知歸選王文憲集序知名位之傷徳故忽而不營知厚味之害性故棄而弗顧嵇叔夜養生論酒適衷腸神遊異方烟生喉舌惝然如狂爰瞰甃以窺汲俄據河而俯瀆猶胃腸之不浹恣晏飲而未足由是}
