  - {type: variant, offset: 139, length: 0, content: '', krp: 轅下駒灌夫傳委瑣齷齪拘文牽俗司馬相如傳坐飾邉幅隗囂傳修飾邊幅如偶人形馬援傳仲長統曰務於清慤謹畏循常習故者是乃婦人之檢押鄉曲之常人胡粉飾貌搔頭弄姿槃旋偃仰從容治步亡禮敬之大任禁忌之書拘信小故以虧大典袁紹繁禮多儀何晏行步顧影漢鑑阮孚問卞壼曰卿常無閑泰如含瓦石不亦勞乎卞壼傳好苛禮酈食其傳李賀父名晉肅以是不應進士韓愈作諱辨竟不就試韋梃剪剪小夫文士齷齪不足與成天下之務唐書傳記吳郡陸襄父閑被刑襄終身布衣疏飯雖羹菜有切割皆不忍食居家惟以搯摘供厨江陵姚子為母燒死終身不忍噉炙熊康父以醉為奴所殺終身不嘗酒然禮緣人情恩由義㫁親以噎死亦當絶食顔氏家訓集規行無曠迹矩步豈達人選樂府丈夫無特達雖貴猶碌碌以不知事為簡以清一身為亷以守舊弊為奉法是心清於棖闑之内而柄移於胥吏之手劉賓客煦煦為仁孑孑為義韓文本朝劉温叟父名岳終身不聴樂不遊嵩岱每赴内宴聞鈞奏則涕淚移時曰若非君命則不至於是此與李賀父名晉肅終身不舉進士相類吳處厚青箱雜記韋翼尚書有重名生平不飲酒不務歡笑為家諱樂也丁用晦芝田錄山鳥不知紅粉樂一聲檀板便驚飛總龜詩話投機經君子見幾而作不俟終日易時哉弗可失書子雖有智慧不如乘勢孟子禹之趨時也履遺而不取冠挂而弗顧非爭其先也爭其時也淮南子成務雖均機速為上決謀或同遲緩為下善濟事者若救火拯溺劉子史圖之此為時矣左智者不失時子貢傳死生榮辱貴賤尊卑此時不再至魯仲連傳時間不容息陳餘傳時者難得而易失時乎時乎不再來蒯通傳先即制人後則為人所制項羽傳時乎時乎間不及謀贏糧躍馬惟恐後時李斯傳平曰臣為事來所言不可以過今日陳平世家范蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎越世家張良陳平説曰漢有天下大半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也趨時若猛獸鷙鳥之發操刀必割鳯鳥乘於風聖人乘於時善人在患饑不及餐陳琳曰矢在弦上不可不發當及其根柢未深而撲取之此救火貴速之勢也暫勞永逸時不可失庾質曰事機在速緩則無功通鑑投機之㑹間不容穟唐張公謹賛唐睿宗曰}
  - {type: variant, offset: 140, length: 0, content: '', WYG: 摶狡兔湏急捄之不爾必反為所噬李絳曰錢用盡更來機事一失不可復追周行逢曰機事貴速緩則彼為之備不可圖也通鑑集賈餘勇者宜乘破竹之勢元㣲之變通之間不容髮六帖時不再來唐文粹本朝范蜀公請建儲復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機㑹也諸公言今日難於前日安知他日不難於今日乎范鎮墓志無機則無以濟萬世之功老泉知幾經知至至之可與幾也初六履霜堅氷至見險而能止知矣哉幾者動之㣲幾之先見者也君子見幾而作不俟終日子曰知幾其神乎惟幾也故能成天下之務易色斯舉矣忠告而善道之不可則止毋自辱焉齊人歸女樂桓子受之孔子行語子孔子相魯齊人饋女樂孔子遂行家語燔肉不至不稅冕而行孟子亭名柏人漢后夜遁劉子史越稱霸范蠡遂去曰蜚鳥盡良弓藏狡兔死走狗烹范蠡事越王勾踐二十餘年竟滅吳報㑹稽之恥還反國為書辭勾踐勾踐曰孤將與子分國而有之不然將加誅於子范蠡曰君行令臣行意乃裝其輕寳珠玉自與其私徒屬乘舟浮海以行終不反止於陶自謂陶朱公孔子既不得用於衛將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至郊竭澤涸漁則蛟龍不合隂陽覆巢毁卵則鳯凰不翔何則君子諱傷其類也夫鳥獸之於不義也尚知避之而況乎丘哉乃還息乎陬鄉作為陬操以哀之蚤知之士名成而不毁故稱於後世夏侯𤣥曰觀樂生遺燕恵王書其殆庶幾乎知機合道成功之下不乆居史記張良願棄人間事欲從赤松子遊初楚元王為穆生置醴及王戊即位忘設穆生曰可以逝矣醴酒不設王之意怠䳒音鳶鵲遇害則仁鳥増逝愚者蒙戮則知士深退秦穆遺戎而由余去齊人餽魯而孔子行王莽殺其子宇逢萌謂友人曰三綱絶矣不去禍及即解冠挂東都城門將家屬浮海後漢鄧禹賈復知帝􅅯干戈修文徳不欲功臣擁衆京師乃去甲兵敦儒學耿弇等亦上將軍印綬皆以列侯就第通鑑籍本有濟世志屬魏晉之際天下多故名士少有全者由是不與世事遂酣飲為常晉書阮籍傳後周于謹自以乆當重權功名既立願保優閑乃上先所乘駿馬及所着鎧甲等北史本傳王及善雖無學術然清正難奪有大臣之節太后不悦謂及善曰卿髙年不宜更侍遊晏但檢校閣中可也及善因稱疾謁假月餘太后不問及善歎曰豈有中書令而天子可一月不見乎事可知矣乃上疏乞骸骨蕭嵩乞骸骨上曰朕未厭卿何為遽去對曰及陛下未厭臣故臣得從容引去若已厭臣臣首領且不保安能自遂郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及已通鑑傳記覆巢毁卵而鳯凰不翔刳胎焚夭而麒麟不至戰國䇿君子雖窮不處亡國之勢説苑集恐登階之逢殆故退伏於末庭梟䲭既以成羣兮𤣥鶴弭翼而屛移梟䲭並進而俱鳴兮鳯凰飛而髙翔楚辭穆生謝病以免楚難選書仲連事成而蹈滄海子房名遂而追赤松白樂天集失機經由辨之不早辨也易今不取後世必為子孫憂語子慮不先定臨事而謀不亦晩乎家語夫鴻鵠之未孚於卵也一指蔑之則靡而無形矣至及其筯骨之已就而羽翮之既成也則奮翼揮􅙆凌乎浮雲背負青天膺摩赤霜翺翔乎荒忽之上掀揚乎虹蜺之間雖有勁弩利矰㣲􅌳蒲沮之智巧亦弗能加也淮南子史一日縱敵數世之患也臧宣叔曰當其時不能治後之人何罪左氏亡羊而補牢戰國䇿子胥不蚤見主之不同量是以至於入江而不化史樂毅傳不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎史吕不韋傳張耳曰吾聞天與不取反受其殃咎張良陳平説曰漢有天下大半而諸侯皆附楚兵疲食盡天亡之時也今釋弗擊此謂養虎自遺患也晁錯為内史東出不便更穿一門南出南出者太上皇廟堧垣也申屠嘉請誅錯錯恐夜入宫謁上上曰錯所穿非真廟垣故穴官居其中且又我使為之嘉謂長史曰吾悔不先斬錯乃請之為錯所賣通鑑張良曰不因其幾而取之所謂養虎自遺患也前漢髙紀袁紹多謀少決失在後事所謂一日縱敵患在數世也通鑑初劉備在許與曹公共獵獵中衆散關侯勸備殺公備不從及至夏口飄颻江渚侯怒曰往田獵中若從吾言可無今日之困蜀志羊祜曰當㫁不㫁天與不取豈非更事者限於後時哉晉書集差池一步元㣲之集一失毫釐千萬年韋應物集傳記操刀不割太公六韜本朝方籍之渡河沛公始整兵向關籍於此時若急引軍趨秦及其鋒而用之可以據咸陽制天下不知出此而區區與秦將爭一旦之命既全鉅鹿而猶徘徊河南新安間至函谷則沛公入咸陽數月矣而卒都彭城使沛公得還定三秦楚雖百戰百勝尚何益哉老泉集詳審經擬之而後言議之而後動君子安其身而後動易其心而後語定其交而後求易若虞機張往省括于度則釋慮善以動動惟厥時詳乃視聴書醫不三世不服其藥可言也不可行君子弗言也可行也不可言君子弗行也禮文理宻察中庸季文子三思而後行子曰始吾於人也聴其言而信其行今吾於人也聴其言而觀其行康子饋藥拜而受之曰丘未達不敢嘗翔而後集夫子時然後言樂然後笑義然後取語子智不務多必審其所知家語知不務多務審其所知言不務多務審其所謂行不務多務審其所由荀子史非死者難處死者難藺相如上問車中幾馬慶以䇿數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此度不中不發發即應弦而倒聖人萬舉而萬全前漢傳聞不如親見視景不如察形東漢馬援傳吳吕岱戒諸葛恪曰世方多難子必每事十思吳志周于謹曰三思而言九慮而行通鑑非萬全不謀非百克不鬬唐書陸贄傳集夫子曰片言折獄者其由也與夫子之言盖非之也後之人不窮聖㫖以為夫子美於季路任一時之見輕而折獄者十有八九焉古之帝王將刑一人猶歴三槐歴九棘訊羣臣訊羣吏訊萬民億兆絶議然後致刑猶於朝於市於野昭然與衆棄之所以不易也歐陽詹集鋤艾恐傷蘭溉蘭恐滋艾白樂天文本朝夫人固有一死兮處死之為難東坡賦熟路長驅聊緩步百金一發不虛弦後山詩不審經若跣弗視地厥足用傷書史楚王昧於一來晉叔向曰無釁而動可謂無謀左氏以一人譽召臣一人毁去臣恐天下有識者聞之有以窺陛下談何容易前漢丁綝卒子鴻當襲封上書稱病讓國於弟盛不報既葬乃掛衰絰於塜廬而逃去友人九江鮑駿遇鴻於東海讓之曰昔伯夷季札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絶父不滅之基可乎鴻感悟垂涕乃還就國以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪通鑑集不量鑿而正枘楚辭擇焉而不精語焉而不詳韓文原道保身附免禍經知進退存亡而不失其正括囊無咎易全身逺害既明且哲以保其身詩國無道其黙足以容中庸邦無道則愚危邦不入亂邦不居邦無道危行言孫邦無道卷而懐之語子功成名遂身退天之道老子魚鼈黿鼉猶以淵為淺而窟其中鷹鳶猶以山為卑而巢其上持寵處位終身不厭之術主尊貴之則恭敬而僔主信愛之則謹慎而嗛主専任之則拘守而詳主安近之則慎比而不邪荀子可以全生可以盡年鳥髙飛以避矰弋之害鼷䑕深穴乎神丘之下以避熏鑿之患莊子鴻飛㝠㝠弋人何慕焉遜于不虞以保天命揚子問明史祭仲以智免子産曰無過亂門賓孟適郊見雄雞自㫁其尾問之侍者曰自憚其犠也賓孟曰雞其憚為人用乎生於亂世貴而能貧民何求焉可以後亡左范蠡事越王滅吳反國以為大名之下難以乆居乃浮海出齊變姓名自謂鴟夷子鄒陽枚乘浮於危國然卒免刑戮者以其言正也秦始皇使王剪伐蜀請美田宅園池甚衆或曰將軍之乞貸甚矣剪曰秦王怚音粗而不信人今空秦國甲士而専委我我不多請田宅為子孫之業以自堅固令秦王坐而疑我矣史記秦説燕王曰臣居燕不能使燕重而在齊則燕重通鑑聞大王有意督過之脱身獨去史項羽紀張耳以智全史本贊張良入謝曰沛公不勝杯酌不能辭通鑑箕子佯狂接輿避世史鄒陽傳願棄人間事欲從赤松子遊耳史張良傳吕須數䜛陳平於吕后曰丞相不治事日飲醇酒戯婦人人一作女平聞日益甚漢書李邑盛稱班超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曽參而有三至之䜛恐見疑於當時矣遂出其妻梅福知王莽必􅆲漢祚一朝棄妻子去不知所之其後人有見福於㑹稽者變姓名為吳市門卒北海逢萌謂友人曰三綱絶矣不去禍將及人即解冠掛東都城門歸將家屬浮海客於遼東平王蒼自以至親輔政聲望日重意不自安前後累上疏稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就蕃國辭甚懇切帝乃許蒼還而不聴上將軍印綬北海敬王睦少好學光武及上皆愛之嘗遣中大夫詣京師朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣敢不以實對睦曰吁子危我哉此乃孤幼時進趨之行也大夫其對以孤襲爵以來志意衰墮聲色是娛}
