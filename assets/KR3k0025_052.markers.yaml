  - {type: variant, offset: 1828, length: 1, content: 棊, WYG: 竒寳横道驥服箱誰其識者有歐陽過目先空冀北羣陳後山品藻經子曰由也千乗之國可使治其賦也求也千室之邑百乗之家可使為之宰也赤也束帶立於朝可使與賓客言也徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語子費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也樂正子二之}
