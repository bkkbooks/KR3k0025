  - {type: variant, offset: 10, length: 0, content: '', WYG: 以示輕捷朝野僉載范氏亡有得其鍾者欲負而走則又不可以椎毁之鍾恍然有聲恐人聞之而奪已遽掩其耳吕氏春秋集普天之下先競而後遜舉世之士有進而無退晉庾峻君㸔燈燭張轉使飛蛾宻杜詩世上名利人相逢不知老但將膏血求豈覺性命輕孟東野求食嘔洩間不知臭􅁾非嵗老豈能充上駟力㣲當自慎前程不知何故翻驤首牽過關門妄一鳴韓詩猛獸搏}
  - {type: variant, offset: 10, length: 0, content: '', krp: 以示輕捷朝野僉載范氏亡有得其鍾者欲負而走則又不可以椎毁之鍾恍然有聲恐人聞之而奪已遽掩其耳吕氏春秋集普天之下先競而後遜舉世之士有進而無退晉庾峻君㸔燈燭張轉使飛蛾宻杜詩世上名利人相逢不知老但將膏血求豈覺性命輕孟東野求食嘔洩間不知臭穢非嵗老豈能充上駟力㣲當自慎前程不知何故翻驤首牽過關門妄一鳴韓詩猛獸搏}
