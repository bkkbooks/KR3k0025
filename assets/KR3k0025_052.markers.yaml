  - {type: variant, offset: 702, length: 0, content: '', WYG: 之手劉賓客本朝國之用兵正如私家之造屋凡屋若干材石之費榖米為錢若干布算而定無所贏縮矣工徒入門斧斤之聲鏗然而百用毛起不可復計此慮不素定之過也旣作而復聚糧旣斵而復求材其費必倍其工必不堅東坡荅李宗書謹㣲經遇其憂悔吝之時其介不可慢也注悔吝纎芥雖細不可慢易而不謹也易怨豈在明不見是圖怨不在大書念慮幾微以保其安書注相在爾室尚不愧於屋漏無曰不顯莫予云覯能謹微接下詩聴於無聲視於無形禮之教化也㣲其止邪也於未形使}
  - {type: page-break, offset: 702, content: '', id: KR3k0025_WYG_052-84b, image: WYG0931/WYG0931-0450b.png}
  - {type: variant, offset: 702, length: 0, content: '', krp: 之手劉賓客本朝國之用兵正如私家之造屋凡屋若干材石之費榖米為錢若干布算而定無所贏縮矣工徒入門斧斤之聲鏗然而百用毛起不可復計此慮不素定之過也旣作而復聚糧旣斵而復求材其費必倍其工必不堅東坡荅李宗書謹㣲經遇其憂悔吝之時其介不可慢也注悔吝纎芥雖細不可慢易而不謹也易怨豈在明不見是圖怨不在大書念慮幾微以保其安書注相在爾室尚不愧於屋漏無曰不顯莫予云覯能謹微接下詩聴於無聲視於無形禮之教化也㣲其止邪也於未形使}
  - {type: variant, offset: 703, length: 0, content: '', WYG: 日徙善逺罪而不自知也易曰君子謹始差若毫釐繆以千里禮君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隠莫顯乎微故君子慎其獨也知微之顯可與入徳矣中庸子夫牆之壊必於隙劒之折必有齧聖人見之蚤故萬物莫能傷也淮南子君子微慎厥徳悔吝不至揚子智者識輕小之為善故謹㣲細之危劉子史無使滋蔓蔓難圖也左君親無將將而誅焉公羊紂始為象箸箕子歎曰彼為象箸必為玉杯為玉杯則必思逺方珍怪之物輿馬宫室之漸自此始不可振也史宋世家明者逺見於未萌而知者避危於無形禍固多藏於隠㣲而發於人之所忽者也春秋之義君親無將將而必誅通鑑凡患生於所忽禍發於細㣲後漢輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒明者謹㣲智者識淺絶其綿綿塞其㳙㳙政令猶汗往而不反東漢君子推㣲達者尋端見緒履霜知氷踐露知暑後漢蔡邕}
  - {type: page-break, offset: 703, content: '', id: KR3k0025_WYG_052-85a, image: WYG0931/WYG0931-0450c.png}
