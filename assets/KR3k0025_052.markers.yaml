  - {type: variant, offset: 145, length: 1, content: 走, krp: 而去轡履氷而負重鄧析子齎不貲之寳獨宿曠野其危甚於累卵蹈薄氷以待夏日登朽枝而須勁風虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身之可保也抱樸子禍之所生必由積怨劉子史兵猶火也弗戢將自焚匹夫無罪懐璧其罪無徳而祿殃也服之不衷身之災也華而不實怨之所聚也犯而聚怨不可以定身今夫子傲取禍之道也鄭子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人以作亂殺子駟小人懐璧不可以越鄉孔子曰有臧武仲之智而不容於魯國抑有由也作不順而施不恕也齊莊公鞭侍人賈舉而又近之乃為崔子崔杼間公齊慶封獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也齊髙子好以事自為功故難及之叔向曰汰侈已甚身之災也左無大功而求大祿皆怨府也積貨滋多菑怨滋厚八郤五大夫三卿其寵大矣一朝而滅惟無徳也國語勇畧震主者身危功盖天下者不賞西漢蒯通傳所謂探虎口者也史酈生傳好聲矜賢竟以名敗史晁錯傳居君子之位而為庶人之行者患禍必至也通鑑知衆嫭之嫉妬兮何必颺纍之蛾眉揚雄湯數行丞相事知三長史素貴故陵折丞吏遇之三長史皆怨恨通鑑張湯下令不便顔異不應㣲反唇湯奏異腹誹論死前漢食貨志䑕不容穴衘窶藪也西漢楊惲傳師古曰窶藪者戰器也昔國武子好言人過以致怨惡昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難陳蕃欲誅宦官乃先事露章曰願出臣章宣示左右令諸姦臣知臣疾之聞之者莫不震恐謀未及發為曹節王甫等矯詔殺之東漢本傳臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士類殱滅而國隨以亡孔融棄市融恃其才望數侮戯曹操關公剛而自矜張飛暴而無恩以短取敗張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右取禍之道也飛不悛其帳下將殺飛通鑑何曽陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書孤根獨立結恨彊宗謝靈運恃才放逸多所陵忽故及於禍崔浩書魏之先世事皆詳實列於衢路往來見者咸以為言北人無不忿恚帝怒殺之李延夀論曰凶人之濟其身非世亂莫由焉曹爽以亂世之情而行之於平日其取敗也宜哉魏崔浩曰張虛聲而召實禍通鑑劉孝綽仗氣負才多所陵忽每於朝集㑹同處公卿間無所與語反呼騶卒訪道途間事由此多忤於物前後凡五免南史宋紀賀若弼復坐事下獄上數之曰公有三太猛嫉妬心太猛自是非人心太猛無上心太猛通鑑王義方以疾惡不容於時唐書本傳如火投泉安得不敗唐書則天賛王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通鑑庇朽木乘膠船張昌齡獻頌太宗謂之曰昔禰衡潘岳皆恃才傲物以至非命唐書傳記多藏不用是謂怨府説苑叢談周伯仁為人志大而才短名重而識闇好乘人之弊此非自全之道嵩性狠抗亦不容於世世説中集累卵於疊棊左太沖魏都賦財居}
  - {type: variant, offset: 147, length: 0, content: '', WYG: 寵四海側目庾元規表守孤直以見嫉觸姦邪而結釁劉長卿何異登膠船而汎巨浸操朽索以馭奔駟若飛蛾之赴明燭破塊之落空谷殊不知坐致焦爛而莫能自出唐文粹愚觸駭機迸落深泉劉賓客鵲鳴聲揸揸烏噪聲擭擭爭鬬庭中間持身博彈射好盡言以招人過國武子所以見殺於齊也韓文不擇言以危肆兮固羣禍之際也御長轅之無撓兮行九折之峩峩卻驚棹以横江兮泝凌天之騰波栁懲咎賦多藏潤屋賈禍危身白樂天足踐禍}
