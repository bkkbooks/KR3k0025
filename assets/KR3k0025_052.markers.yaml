  - {type: variant, offset: 1452, length: 255, content: 大道本夷曠高情亦沖虛孟東野其如心似不然灰劉賓客面上滅除憂喜色胸中銷盡是非心水能性淡為吾友竹解心虛是我師身靜其身延壽命無求於物長精神五欲已銷諸念息世間無境可勾牽每因齋戒斷葷腥漸覺塵勞染愛輕六賊定知無氣色三尸應恨少恩情互入省悟彼此假名非本物其間何怨亦何恩並白侍郎詩慣無身外事不信世間愁姚少監楚雲澹無心劉長卿其為心必泊然無所起其於世必澹然無所嗜韓文一身已無累萬事更何欲劉賓客高情雅淡世間希劉長卿深與世情薄委身在丘壑同上以虛舟應物世累不能干其神惡千金之藏鄙十卿之祿治家無珍產奉身無長物並文粹逢人不說人間事便是人間無事人, WYG: 某顗敵數百輩足矣}
