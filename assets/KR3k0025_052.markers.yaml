  - {type: variant, offset: 204, length: 6, content: 百二十六互入, WYG: 人參乘卒有竹中之難通鑑張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右取禍之道也飛不悛其帳下將殺飛蜀志蜀大將費禕與諸將大㑹於漢夀郭循在坐褘歡飲沈醉循起刺禕殺之褘資性汎愛不疑於人張嶷嘗以書戒之曰昔岑彭帥師來歙仗節咸見害於刺客今將軍位尊權重待信新附太過宜鑒前事少以為警褘不從義康自謂兄弟至親不復存君臣形迹率心而行曽}
