  - {type: variant, offset: 50, length: 0, content: '', krp: 一脛之大幾如腰一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為痼疾後雖有扁鵲不能為已漢書賈誼傳班昭女誡云生男如狼猶恐其尫生女如䑕猶恐其虎東漢列女傳梁冀既誅李固子燮乃還郷里姊戒燮曰吾家血食將絶弟幸得濟豈非天耶宜杜絶衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已漢桓紀北海}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 衮謹慎好學文學防輔遂具表稱陳衮美衮聞之大驚懼責讓防輔曰修身自守常人之行耳而諸君乃以上聞是適所以増其負累也三國志李豐年方十八已有清名海内翕然稱之其父太僕恢不願其然故使閉門㫁客出魏髙貴鄉公曹冏曰末大必折尾大不掉尾同於體猶或不從況非體之尾其可掉哉晉武欲使羊祜卧䕶諸將祜曰取吳不必臣行但既平之後當勞聖慮耳晉紀初何曾侍武帝晏退謂諸子曰主上開剏大業吾每晏見未嘗聞經國逺圖及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎晉懐紀王猛寢疾堅親至猛第訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣没之後願勿以晉為圖鮮卑西羌我之仇敵終為人患宜漸除之晉文紀謝瞻見弟晦門巷填隘曰勢傾朝廷豈門户之福耶晉安帝紀王晏外弟尉}
  - {type: page-break, offset: 51, content: '', id: KR3k0025_WYG_052-27a, image: WYG0931/WYG0931-0421c.png}
  - {type: variant, offset: 51, length: 0, content: '', krp: 衮謹慎好學文學防輔遂具表稱陳衮美衮聞之大驚懼責讓防輔曰修身自守常人之行耳而諸君乃以上聞是適所以増其負累也三國志李豐年方十八已有清名海内翕然稱之其父太僕恢不願其然故使閉門㫁客出魏髙貴鄉公曹冏曰末大必折尾大不掉尾同於體猶或不從況非體之尾其可掉哉晉武欲使羊祜卧䕶諸將祜曰取吳不必臣行但既平之後當勞聖慮耳晉紀初何曾侍武帝晏退謂諸子曰主上開剏大業吾每晏見未嘗聞經國逺圖及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎晉懐紀王猛寢疾堅親至猛第訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣没之後願勿以晉為圖鮮卑西羌我之仇敵終為人患宜漸除之晉文紀謝瞻見弟晦門巷填隘曰勢傾朝廷豈門户之福耶晉安帝紀王晏外弟尉}
  - {type: variant, offset: 52, length: 0, content: '', WYG: 阮孝緒亦知晏必敗晏屢至其門逃匿不肯見嘗食醬美問知得於晏家吐而復之齊髙宗紀魏主疾甚謂司徒勰曰社稷所倚惟在於汝霍子孟諸葛孔明以異姓猶受顧託況汝親賢可不勉之勰泣曰昔周公大聖成王至明猶不免疑而況臣乎如此則陛下愛臣更為未盡始終之美齊東昏侯髙歡曰堪敵侯景者惟有慕容紹宗我故不貴之留以遺汝耳恐尾大於身踵粗於股倔彊不掉狠戾難馴梁太子於𤣥圃自講老莊何敬容謂學士吳孜曰昔西晉祖尚𤣥虛使中原淪於胡羯今東宫復爾江南亦將為戎乎淮南長鯨雖云授首襄陽短狐未全革面齊顯祖嗜酒成疾不復能食自知不能久謂李后曰人生必有死何足致惜但憐正道尚幼人將奪之耳又謂常山王演曰奪則任汝慎勿殺也梁髙祖北齊王睎曰人主恩私何由可保萬一披褐求退無地非不好作要官但思之爛熟耳陳世祖齊左丞斛律金長子光為大將軍次子羨及孫封侯顯貴者甚衆門中一皇后二太子妃三公主事齊三世貴寵無比然金不以為喜常謂光曰我雖不讀書聞古來外戚鮮有能保其族者女若有寵為諸貴所嫉無寵為天子所憎我家宜以勲勞致富貴何必藉女寵也蘇威少有令名周晉公䕶強以女妻之威見䕶専權恐禍及已屏居山寺以誦書為娛陳紀隋蔡王智積有五男止教讀論語孝經恐諸子有才能以致禍也同前人主誠能見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思抑損遇逸樂則思撙節在晏安則思後患防壅蔽則思延納疾䜛邪則思正已行爵賞則思因喜而僣施刑罰則思因怒而濫上既詔宗室羣臣襲封刺史左庶子于志寜以為古今事殊恐非久安之道上疏爭之侍御史馬周亦上疏以為孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在欲留之也則欒黶之惡已彰向所謂愛之者乃適所以傷之也上謂太子曰李世勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行俟我死汝於後用為僕射親任之倘徘徊顧望當殺之耳並唐太宗沛王賢聞王勃善屬文召為修撰時諸王鬬雞勃戯為檄周王雞文上見之怒曰此乃交搆之漸斥勃出沛府上御翔鸞閣觀大酺分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推梨讓棗相親如一今分二朋遽相競誇俳優小人言辭無度恐其交爭勝負譏誚失禮非以崇禮義勸敦睦也通鑑姚崇析資令諸子各有定分治令曰比見達官之裔多貧困至銖尺是競無論曲直均受嗤詆田宅水磑既共有之至相推倚以頓廢陸賈石苞古達者也亦先有定分以絶後事新唐書本傳李勣寢疾謂其弟司衞少卿弼曰我見房杜平生勤苦僅能立門户遭不肖子孫蕩覆無餘吾有此子孫今悉付汝其有志氣不倫交遊非類者皆先撾殺吉頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子未立而外戚猶為王此陛下驅之使他日必爭兩不得安也二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産祿猶在草不去根終當復生二人曰大事已定彼猶机上肉耳夫何能為季昶歎曰吾不知死所矣劉幽求亦謂桓彦範敬暉曰武三思尚存公輩終無葬地若不早圖噬臍何及古之智者皆不願受夷狄之惠盖豫憂其求請無厭終為後患故也齊澣言葛福順典禁兵不宜與毛仲為昏毛仲小人寵過則生姦不早為之恐成後患又曰君不宻則失臣願陛下察之張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身没之後適足為無頼子孫酒色之資吾不取之上召子儀還京師朔}
