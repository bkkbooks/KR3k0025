  - {type: variant, offset: 27, length: 2, content: 門左, WYG: 標及江南亡也諸貴人髙大之塜無不發者惟建勲塜莫知處通鑑傳記聖人獨見先睹白虎通集子胥知姑蘇之有麋鹿輔果識智伯之為趙禽出選賢儒在世猶靈蓍神龜也王充論衡思同蓍蔡選贊見機於萬里之外衆趨明所避陳子昻著龜所以前人用盧藏用有先知而無後悔白帖盜據淮滸宰相以李元平有名以為才堪攘冦拜為汝州公栁惟深慷慨言於朝曰是夫喋喋衒玉賈石者王衍誤天下殷浩敗中軍華而不實往且見獲何冦之攘人不之信未幾盜襲汝州以元平歸栁}
