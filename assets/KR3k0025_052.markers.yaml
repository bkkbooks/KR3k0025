  - {type: variant, offset: 1845, length: 4, content: 平生輕長, WYG: 韓暨亮直清方則司𨽻校尉崔林貞固純粹則太常常林通鑑庾敳見和嶠而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用王澄王𤣥王濟並有盛名皆出衛玠下世云王家三子不如衛家一兒或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞羣戎曰君復未見其父耳裴楷有知人之鑑嘗曰夏侯𤣥蕭肅如入宗廟中但見禮樂器鍾㑹如觀武庫森森但見矛㦸在前山濤若登山臨水幽然深逺王衍口中雌黄朝野翕然王戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寳莫知名其器王衍神姿髙徹如瑶林瓊樹自然是風塵表}
