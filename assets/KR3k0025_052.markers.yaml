  - {type: variant, offset: 148, length: 0, content: '', WYG: 皮日休得一時之貴滅百世之族杜牧之本朝靡然如蛟龍釋其風雲之勢而安於豢養之樂終以不悟使其腹披股裂登於匹夫之俎東坡上韓太尉書知恥經其心愧恥若撻於市書缾之罄矣惟纍之恥詩君子有五恥居其位無其言無其行恥之君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其徳恥有其徳而無其行使民有所勸勉愧恥以行其言記知恥近乎勇庸巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之邦有道貧且賤焉恥也邦無道富且貴焉恥也邦有道榖邦無道榖恥也語子羞惡之心義之端也嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也孟子君子恥不修不恥見汚恥不信不恥不見信恥不能不恥不見用荀子恥不從枉管子史隨㑹能賤而有恥左每念斯恥汗未嘗不發背霑衣也西漢司馬遷傳赧然流汗㑹稽之恥漢書君子雖貧不受亂君之祿説苑集死辱片時痛生辱長年羞孟東野無恥經小人不恥不仁易有靦面目白華廢則亷恥缺矣詩殷人之敝勝而無恥記子無羞惡之心非人也徧國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也無恥之恥無恥矣恥之於人大矣為機變之巧者無所用恥焉不恥不若人何若人有孟子其無愧而不知恥也甚矣莊子厚顔而忍詬荀子辱莫大於不知恥文中子史秦太后與嫪力髙切毐於改切私通事皆決於嫪毐諸客求官為嫪毐舎人千餘人史吕不韋傳棄禮義捐亷恥日甚頑頓亡恥奊胡結反音頡詬亡節亷恥不立且不自好茍若而可饑寒至身不顧亷恥前漢回面汙行以事諂諛之人而求親近於左右史記司馬長卿竊貲於卓氏東方朔割肉於細君西漢揚雄傳梁孫亷性巧佞善宦時人為履謎以譏之曰刺鼻不知啑蹋面不知嗔齒地作步數持此得勝人刺其不避恥辱以求名位也南史本傳齊著作郎祖珽有文學多技藝而疎率無行嘗為髙祖中外府功曹因宴失金叵羅於珽髻上得之梁主入朝於鄴周主自彈琵琶梁主起舞曰陛下既親撫五絃臣何敢不同百獸通鑑崔日用燕内殿酒獻起為回波風舞求學士}
