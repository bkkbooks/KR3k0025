  - {type: variant, offset: 735, length: 0, content: '', WYG: 劉潁川兄弟語使人神思清發昬不假寐自此之外殆白日欲寢矣晉書吴嘗置丞相衆議歸張昭吴王曰孤豈為子布有愛乎頋丞相事煩而此公性剛所言不從怨咎将興非所以益之也嵇康嘗詣隠者汲郡孫登登曰子才多識寡難乎免於今之世矣通鑑吕䝉年十五随鄧當擊賊䇿見而竒之引置左右張昭薦蒙拜别部司馬吴志晉武帝聞王衍名問戎曰夷甫當世誰比戎曰未見其比當從古人中求耳閔鴻見陸雲竒之云此兒}
