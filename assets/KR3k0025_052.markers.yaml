  - {type: variant, offset: 141, length: 0, content: '', krp: 馬是好乃為相愛耳其智慮畏謹如此夏馥聞張儉亡命嘆曰孽自已作空汙良善一人逃死禍及萬家何}
  - {type: variant, offset: 142, length: 0, content: '', WYG: 生為乃自剪鬚變形入林慮山中范滂謂殷陶等曰今子相隨是重吾禍也司馬懿少聰達多大畧操聞而辟之懿辭以風痺操怒欲收之懿懼就職通鑑申屠蟠曰當戰國之世處士横議列國之王至為擁篲先驅卒有坑儒焚書之禍今之謂矣乃絶跡於梁碭之間因樹為屋自同傭人居三年滂等果罹黨錮受刑者數百人唯蟠超然免於疑論或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也後漢雲中白鶴非鶉鷃之網所能羅也魏志邴原傳北海王衮謹慎好學文學防輔遂具表稱陳衮美衮聞之大驚懼責讓文學曰修身自守常人之行耳而諸君乃以上聞是適所以増其負累也少府蒯欽楊駿之姑子也數以直言犯駿它人皆為之懼欽曰楊文長雖闇猶知人之無罪不可妄殺不過疎我我得疎乃可以免不然與之俱族矣通鑑范騰屬天下兵亂去官還家歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族阮籍本有濟世志屬魏晉之際天下多故名士少有全者由是不與世事遂酣飲為常晉書後周于謹自以乆當重權功名既立願保優閑乃上先所乘駿馬及所着鎧甲等北史本傳侍中謝朏求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹為書曰可力飲此勿豫人事王晏外弟尉氏阮孝緒亦知晏必敗晏屢至其門逃匿不見嘗食醬美問知得於晏家吐而覆之楊慎矜知御史中丞事時李林甫専權公卿之進有不出其門者必以罪去之慎矜由是故辭不敢受上就李泌飲酒同榻而寢泌曰臣今報徳足矣復為閒人何樂如之上曰奈何遽欲去乎泌曰臣有五不可留願陛下聴臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太髙迹太竒此其所以不可留也郭子儀為上將擁強兵程元振魚朝恩䜛謗百端詔書一紙徴之無不即日就道由是䜛謗不行通鑑郭子儀遭䜛甚奪兵柄朝聞命夕引道無纎介自嫌全身髙節爛然獨著裴度晩節頗浮沈為自安計唐書蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊䜛間將興繕甲訓士非吾輩之所宜為也因固辭軍使蜀主許之但營書舍植松竹自娯而已通鑑魏公子無忌自知再以毁廢乃謝病不朝與賓客為長夜飲飲醇酒多近婦人日夜為樂飲同上傳記司馬徽居荆州以劉表必有變思退縮以自全毎與語但言佳其妻責以無别徽曰如汝所言亦復甚佳終免於難襄陽記孔雀愛羽虎豹愛爪所以輔其身也説苑王允之年在摠角為從伯敦所知常夜宴允之辭醉眠在别牀敦與鳯謀逆允之悉聞其語便於眠處大吐敦以為大醉不復疑晉書集鸞鳯翔於蒼雲兮故繒繳不能加蚊龍潛於旋淵兮身不挂於網羅知貪餌而近死兮不如下遊於清波全命避害不受世患楚辭鳯鳴髙岡以逺罻羅陳琳檄不懐寳以召害不飾表以招累張華賦游必擇地翔而後處不入陷穽不罹網罟西京麒麟頌蕭條兩翅蓬蒿下縱有鷹鸇奈爾何李白集宿鳥擇深枝潛魚不銜鈎走鹿無反顧短翮惟願巢深叢杜詩螻蟻謀深穴鳥得辭籠不擇木白集冥鴻不下非吾意杜牧之常恐性坦率失身為杯酒近辭痛飲輩折節萬夫後杜工部青雲上了無多路却要徐驅穏着鞭白侍郎本朝黠蠶不作繭未老輒自僵永謝湯火厄冷然超無方東坡詩取禍經患至掇也斯其所取災羝羊觸藩羸其角慢藏誨盜冶容誨淫徳薄而位尊知小而謀大力小而任重鮮不及矣負且乘致冦至盜之招也晉者進也進必有所傷易受爵不讓至於已斯亡詩子曰口恵而實不至怨菑及其身禮愚而好自用賤而好自専烖及其身者也中庸好人之所惡惡人之所好是謂拂人之性菑必逮夫身大學子曰放於利而行多怨羿善射奡盪舟俱不得其死然語子譬若載無轄之車以臨千仞之谷欲其不顛覆難也家語寳珠玉者殃必及身孟邪穢在身怨之所搆言有召禍位尊則必危任重則必廢擅寵則必辱可立而待也可吹而傹也以卵投石以指撓沸若赴水火入焉焦没耳荀子山木自冦莊子虞氏者登髙樓臨大路設樂陳酒擊博樓上俠客相隨而行}
