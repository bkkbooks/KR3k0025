  - {type: variant, offset: 18, length: 1, content: 鮑, WYG: 越椒子文曰熊虎之狀而豺狼之聲弗殺必滅若敖氏矣子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬攻王楚滅若敖氏子魚曰禍猶未也未足以懲君初平王之東遷辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川左人生求富而子逃之何也子文曰民多曠者而我取富焉是厪民自封也死}
  - {type: page-break, offset: 18, content: '', id: KR3k0025_WYG_052-14b, image: WYG0931/WYG0931-0415b.png}
  - {type: variant, offset: 18, length: 1, content: 鮑, krp: 越椒子文曰熊虎之狀而豺狼之聲弗殺必滅若敖氏矣子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬攻王楚滅若敖氏子魚曰禍猶未也未足以懲君初平王之東遷辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川左人生求富而子逃之何也子文曰民多曠者而我取富焉是厪民自封也死}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 矣我逃死非逃富也故莊王世滅若敖唯子文之後在國語伯禽封魯三年而後報政周公曰何遲也太公封於齊五月而報政周公曰何疾也乃嘆曰魯後世其北面事齊矣魯世家初智宣子將以瑶為後智果曰不如宵也若果立瑶智宗必滅弗聴韓趙魏殺智伯盡滅智氏之族張儀至楚説楚王曰大王誠能聴臣閉關約絶於齊臣請獻商於之地六百里陳軫獨弔曰秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王使一將軍隨張儀至秦張儀詐墮車不朝三月周紀袁盎曰淮南王為人剛悍今暴摧折之臣恐卒逢霧露病死陛下有殺弟之名奈何上曰吾特苦之耳今復之淮南王果憤恚不食死漢文紀聰者聴於無聲明者見於未形漢書文帝復封淮南厲王四子皆為列侯賈誼諫以為患之興自此起矣數上疏言諸侯或連數郡非古之制可稍削之不聴本傳晁錯上書言吳可削曰今削之亦反不削亦反削之其反亟禍小不削反遲禍大晁錯言削諸侯錯父聞之謂錯曰口語多怨汝劉氏安矣而晁氏危吾去汝歸矣遂飲藥而死西漢明者逺見於未萌而智者避危於無形司馬相如傳張安世長子千秋與霍光子禹俱隨范明友擊烏桓還謁大將軍光問千秋戰鬬方畧山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材嘆曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人京房學易於梁人焦延夀嘗曰得我道以亡身者京生也宋沖常勸郭泰曰吾夜觀乾象晝察人事天之所廢不可支也楊彪見漢室衰㣲政在曹氏遂稱脚攣積十餘年不行由是得免禍通鑑中常侍張讓權傾天下讓父死歸葬穎川雖一郡畢至而名士無往者讓甚恥之寔獨弔焉及後復誅黨人讓感寔故多所全宥陳寔傳申屠蟠嘆曰昔戰國之世處士横議列國之主至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮之禍惟蟠超然免於評論梅福知王莽必簒漢祚一朝棄妻子去不知所之其後人有見福於㑹稽者變名姓為吳市門卒云漢鑑魏張緝言於司馬師曰諸葛恪雖克捷見誅不乆師曰何故緝曰威震其主功盖一世求不死得乎魏髙貴鄉公傳嘏曰太初志大其量能合虛聲而無實才何平叔言逺而情近好辨而無誠所謂利口覆邦家之人也鄧𤣥茂有為而無終外要名利而内無關鑰貴同惡異多言而妬多言則多釁妬則無親以吾觀此三人者皆將敗家魏紀唐彬與王濬共伐吳彬知賊冦已殄孫皓將降未至建業二百里稱疾遲留以示不競果有先到者爭物後到者爭功晉書本傳鄭興子衆以通經知名太子因梁松以縑帛請之衆曰太子儲君無外交之義不私通賓客松曰長者意不可逆衆曰犯禁觸罪不如守正而死及松敗賓客坐之唯衆不染於辭通鑑劉元海匈奴人齊王攸言於武帝曰不除元海恐并州不得久寜王渾曰元海長者為君王保之至惠帝時元海果僣位號前趙載記江統深識逺見先事宜杜其萌乃作徙戎論帝不能用未及十年而劉淵起當時人服其深識晉書本傳山濤言不宜去州郡武備帝不聴及永寜以後盜賊羣起州郡無備不能擒制天下遂大亂如濤所言索靖知天下將亂指洛陽宫門銅駝嘆曰㑹見汝在荆棘中耳晉書張翰為齊王冏大司馬東曹掾冏時執權翰因見秋風起乃思吳中菰菜蓴􅅅鱸魚鱠遂命駕而歸俄而冏敗人皆謂之見幾晉書石勒至洛陽倚嘯上東門王衍見而異之曰向胡雛吾觀其聲視有竒志恐將為天下之患其後以兵屬劉聰自立為趙王王猛將死苻堅問以後事猛曰臣殁之後願勿以晉為圖鮮卑羗虜我之仇讐終為人患宜漸除之以寜社稷堅不能用載記初劉毅季父鎮之閑居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久我不就爾求財位亦不同爾受罪每見毅藩道從到門輒詬之晉安紀義康方用事人爭求親暱唯司徒主簿江湛早能自疎求出為武陵内史檀道濟常為其子求婚於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難宋太祖紀顔延之子竣貴重凡所資供延之一無所受布衣茅室蕭然如故嘗乘羸牛笨車逢竣鹵簿即屏住道側常語竣曰吾平生不喜見權要人今不幸見汝宋世祖顔延之嘗早詣其子竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎後竣被誅通鑑閔湛等又勸崔浩刋所撰國史于石以彰直筆髙允聞之謂著作郎宗欽曰閔湛所營方寸之間恐為崔門萬世之禍吾徒亦無類矣未幾而難作宗欽臨刑嘆曰髙允其殆聖乎北史髙允傳鬱林王之將廢也王晏從弟思逺謂晏曰兄荷世祖厚恩今一旦賛人如此事彼或以權計相傾未知兄將來何以自立若及此引決猶可保全門户不致後患思逺知上外待晏厚而内已疑異乘間謂晏曰時事稍異兄亦覺否凡人多拙於自謀而巧於謀人通鑑張九齡奏安祿山狼子野心面有逆相請戮之上放歸藩唐書裴坦子娶楊收女資送甚厚器用餙以犀玉坦見之怒曰破我家矣立命壊之已而收竟以賄敗唐太祖王勮蘇味道皆未知名裴行儉一見謂之曰二君後當相次掌銓衡是時王勮弟勃與華隂楊烱范陽盧照隣義烏駱賓王皆以文章有盛名同列太常伯李敬𤣥尤重之以為必顯達裴行儉曰士之致逺者當先器識而後才藝勃等雖有文章而浮躁淺露豈享爵祿之器耶楊子稍沈靜應至令長餘得令終幸矣既而勃度海墮水烱終於盈川令照鄰惡疾不愈赴水死賓王反誅勮味道皆典選如行儉言唐武后萬寳常聴大常所奏樂泫然曰樂聲淫厲而哀天下不乆將盡時四海全盛聞者皆謂不然大業之未其言卒驗隋髙祖二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産祿猶在去草不去根終當復生二人曰大事已定彼猶机上肉耳夫何能為季昶歎曰吾不知死所矣劉幽求亦謂桓彦範敬暉曰武三思尚存公輩終無葬地若不早圖噬臍何及唐太宗蔣欽緒蕭至忠姊夫也謂之曰如子之才何憂不達勿為非分妄求至忠不應欽緒退嘆曰九代卿族一舉滅之可哀也哉上欲以李林甫為相張九齡曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂王忠嗣數上言祿山必反哥舒翰攻吐蕃石堡城士卒死者數萬果如王忠嗣之言通鑑顔真卿為平原太守安祿山逆節頗著真卿以霖雨為託修城浚濠未幾祿山果反河朔盡陷獨平原城守具備唐書陜郡進士張彖曰君輩倚楊右相為泰山吾以為氷山若皎日既出得無失所恃乎通鑑崇勸天子不求邊功璟不肯賞邊臣而天寳之亂卒蹈其害可謂先見矣唐書姚宋賛姚崇與張説同為宰相張衘崇崇疾戒諸子曰張為人好服玩吾身没之後汝具陳吾平生服玩寳帶重器羅列於帳前張若不顧汝輩家事産族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時錄進仍先礱石以待至便䥴刻張丞相見事常遲於我數日之後必當有悔若徴碑文以刋削為辭當引使視其䥴石仍告已具聞上崇没張果至目其服玩者三四}
