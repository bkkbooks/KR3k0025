  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷五十二宋潘自牧撰識見部省悟子方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也軒冕在身非性命也物之儻來寄也人生天地間若白駒之過隙忽然而已不可以無涯之智役有涯之身莊子史屈原曰衆人皆醉而我獨醒人生如輕塵栖弱草耳何至自苦乃爾通鑑早知富貴有命恨不十年讀書梁忠烈世子曰吾不及魚鳥逺矣魚鳥飛浮任其志性吾之進退常在掌握若使吾終得與魚鳥同遊則去人間如脱屣耳南史傳記富貴之畏人不如貧賤之肆志益我財者損我神生我名者殺我身皇甫士安髙士傳集愍流俗之未悟獨超然而先覺成公子安嘯賦富貴茍難圖税駕從所欲陸士衡詩迷途知反丘希範書既自以心為形役奚惆悵而獨悲悟已往之不諌知來者之可追實迷塗其未逺覺今是而昨非陶淵明窮涯而反盈量知歸選王文憲集序知名位之傷徳故忽而不營知厚味之害性故棄而弗顧嵇叔夜養生論酒適衷腸神遊異方烟生喉舌惝然如狂爰瞰甃以窺汲俄據河而俯瀆猶胃腸之不浹恣晏飲而未足由是}
  body:
  - {type: variant, offset: 1, length: 1, content: 競, WYG: 九江走五湖尋至大溟茫然漣清豈爾浩瀚而吾量不盈斟酌未幾倐見涯涘方將尋蟻垤期耿恭問姜母以何在訪舒姑而欲從辨夸父於渭上弔相如於臨卭萬計已盡六腑如燼忩日斜照飛蚊遶鬢既驚既覺可嘆可笑飲不盡器枯腸已療搘頸沈吟其意逾深以吾此日之一夢見自古不足者之心何諷夢渇賦布衣可終身寵祿豈足頼阮嗣宗詠懐人生非金石豈能長夀考選古詩當其欣於所遇暫得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間以為陳迹王羲之蘭亭記鍾鼎玉帛非度世之資名位寵章為累真之府未能獨立物表超世長存與日月齊光天地比夀陳子昂集大塊是勞生之機小智非周身之防見螳螂之抱影怯危機之未安幽貞為虛白之寳靜黙為大𤣥之門知軒冕是儻來悟榮華非力致駱賓王若待功成拂衣去武陵桃花笑殺人俯仰人間易凋朽李太白人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟莫憂世事兼身事須着人間比夢間浮生雖多途趨死每一軌雖得一餉樂有如聚飛蚊韓詩一夢悟一生心是主人身是客形質及夀命危脆若浮煙煙一作雲人生大塊間如鴻毛在風乃知名與器得失俱為害亦知恩愛縁乃是憂惱資有似多憂者非因外火燒恐汚清冷波塵纓先抖擻未得無生心白頭亦為夭始知骨肉愛乃是憂悲聚恩愛元是妄緣合暫為親誓以智慧水永洗煩惱塵不將恩愛子更種憂悲根況是血肉身安能長強健外累由心起心寜累自息須悟事皆空無令念將屬艷色即空花浮生乃焦穀障要智燈燒魔須慧刀戮利熏性易染内戰心難衂㫁癡求慧劒濟苦得慈航山林初息影朝夕久勞生憂苦皆心火榮枯是眼塵人間所重者相印將軍鉞焦心一身苦炙手旁人熱未必方寸間得如吾快活賓客歡娛僮僕飽始知官職為他人簮纓假合虛名在筯力消磨實是空但能抖擻人間事便是優游地上仙多見朱門富貴人林園未畢即無身流水光隂急浮雲富貴遲嘉肴與㫖酒信是腐腸膏艷聲與麗色真為伐性刀夢中説夢兩重虛但恐人間為長物不如林下作遺民金玉滿堂非已物子孫委蜕是他人只有一身宜愛䕶少教氷炭逼心神繩外老雞因㫁尾盤中鮮鱠為吞鈎誤為世網牽白侍郎絃管聲非實花鈿色是空假使如今不是夢能長於夢幾多時未問病根深與淺此身應與病齊生白樂天如知天地間萬物皆不牽孟東野視身如傳舎閱世甚東流色身豈吾實語到不言時世間人盡睡唯有達生理應無治老方方知醉兀兀應勝走營營盡日笙歌人散後滿江風雨獨醒時元㣲之㸔取蓮花浄應知不染心孟浩然莫問卜人生吉凶皆自速伏羲文王若無死今人不為古人哭劉义文久被浮名繫能無愧海鷗漸老知身累劉長卿曉然於厚夜聰然於大醉皇甫湜纓冕猶緇塵有名皆畏途無事乃真筌子不見世風燈槿花李義山文盡知行處險誰肯載時輕錢起詩幾世身在夢百年雲無根鮑溶文萬里髙低門外路百年榮辱夢中身昔日未知名外樂暮年初信夢中忙許用晦人生能幾何畢竟歸無形王維集向來躐等語長作陷身機杜牧之只知事逐眼前去不覺老從頭上來羅隠集浮生七十今三十已是人間半世人滅得心中火自涼百年身後一丘土貧富髙低爭幾多舉世盡從愁裏老誰人肯向死前閑甘醴皆是腐腸物獨有淡泊之水能益人百嵗風前短熖燈杜荀鶴人生非日月光輝豈常在唐文粹本朝運數本來無得喪人間萬事不須謀千載紛爭共一毛可憐身世兩徒勞無人與語劉𤣥徳問舎求田意最髙何須更待黄糧熟始覺人間是夢間臨川集天下之物無窮而以適意為悦方其得意萬物無以易之及其既厭未有不洒然自笑也回頭自笑風波地閑眼聊觀夢幻身捷徑爭之却累人欲除苦海浪先乾愛河水非人磨墨墨磨人煩惱初無根恩愛為種子尚有身為患已無心可安人生一世如屈伸時我觀此一身已作露電觀東坡孰知一世如一夢在夢而覺寜待旦更欲置身須世外世間元自不關人後山名譽飛蠅過耳聲欒城集富貴於我如浮雲小者譴呵大者戮一身畏首復畏尾門多賓客飽僮僕入風之波渺然無涯而以百年有涯之生種種計較山谷貪迷}
