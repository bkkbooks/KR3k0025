  - {type: variant, offset: 736, length: 95, content: 孤惸相育既娶則間外姓雖共處而益疏我不忍弟義之亦不娶遂終身唐書本傳集鷙鳥不群楚辭懷質抱清獨無匹兮金相玉質百歲無匹同上清風激萬代名與天壤俱張景陽詠史詩砥節礪行郭有道碑元大夫生六十餘年而卒未嘗識婦, WYG: 非龍駒即是鳳雛山濤為吏部甄拔}
