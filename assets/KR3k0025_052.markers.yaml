  - {type: variant, offset: 1831, length: 1, content: 械, WYG: 達幽究㣲則顧譚凝辨究達言􅀎釋結則謝景究學甄㣲㳺夏同科則范慎羊道私駁綜曰元遜才而疏子嘿精而狠叔發辯而浮孝敬深而陿袁子論曰或云少府楊阜見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳羣則}
