  - {type: variant, offset: 136, length: 0, content: '', krp: 筭萬不失一枚乘七發智慮所由日新選寺碑無逺慮經人無逺慮必有近憂語弗慮胡獲書我躬不閲遑恤我後反是不思亦已焉哉為猶不逺詩子慮不先不可以應卒鄧析子史子服惠伯曰君子有逺慮小人從邇饑寒之不恤誰遑其後穆叔語孟孝伯曰趙孟將死矣其語偷孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉趙孟曰罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也趙孟視䕃曰朝夕不相及誰能待五左氏凡人之智能見已然不能見將然通鑑翫細娛而不圖大患賈誼傳夫規事建議不圖萬世之固而媮恃一朝之事者未可以慮逺也西漢匃奴贊齊和士開曰一日取快可敵千年孔範曰諸將匹夫敵耳深識逺慮豈其能知通鑑謀畫經方叔元老克壯其猷詩四十始仕方物出謀發慮記好謀而成語子兼才尚權右計左數羣䇿屈羣力楊重黎史裨諶謀于野則獲謀于邑則否左傳靜淵以有謀史記帝頊紀蘇秦恐秦之敗從念莫可使用於秦者乃使人㣲感張儀隂奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舎人辭去張儀曰頼君得顯方且報徳何故去也舎人曰臣非知君知君乃蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣隂奉給君資盡蘇君之計謀今君已用}
  - {type: variant, offset: 137, length: 0, content: '', WYG: 歸報張儀曰比在蘇君術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言范雎曰王不如逺交而近攻得寸則王之寸得尺則王之尺甘羅年少出一竒計聲稱後世亦戰國之䇿士也虞卿料事揣情為趙畫䇿何其工也史本傳蔡澤謂范雎曰君相秦計不下席謀不出廊廟坐制諸侯君之功極矣史蔡澤傳侯嬴曰吾聞晉鄙兵符在王卧内而如姬最幸力能竊之嘗聞公子為如姬報其父仇欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通鑑六竒既用諸侯賓從漢吕之事平為本謀子房計謀圖難於易為大於細太史公自序有上書告韓信反上問陳平平曰舉兵攻之是趨之戰也陛下第偽遊雲夢其勢必郊迎}
