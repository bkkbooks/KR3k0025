  - {type: 'tls:seg', offset: 54, content: '', id: KR3k0025_CHANT_052-2a.7}
  - {type: variant, offset: 56, length: 0, content: '', WYG: 姬妾不離側盧把嘗往問疾子儀屏侍妾獨隠几而待之或問其故子儀曰杞貌醜而心險婦人輩見之必笑他日把得志吾族無類矣夫以匹夫愛其子猶知求明哲之師而教之況萬乘之嗣繫四海之命乎憂先於事故能無憂事至而憂無救於事鄭注求為鳯翔節度使請禮部員外郎韋温為副使温不可或曰拒之必為患温曰擇禍莫若輕拒之止於逺貶從之有不測之禍卒辭之度支以用度不足奏借富户及胡商才物敕借其半鹽鐡轉運司髙駢上言天下盜賊􅑣起皆出於饑寒獨富户胡商未耳乃止楊涉當為宰相與家人相泣謂其子凝式曰此吾家之不幸也必為汝累蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊䜛間將興繕甲訓士非吾輩所宜為也因固辭軍使蜀王許之但營書舎植松竹自娛而已通鑑崔琳盧從愿兩人有宰相望𤣥宗欲相之數矣以族大恐附離者衆卒不用新唐書崔儼傳帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙歛以瓦棺勿作石羊虎人馬惟刻石置陵前曰周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝通鑑周太祖集圖匱於豐防儉於逸潘岳藉田賦留作功成身退地劉禹錫本朝李宸妃薨吕夷簡為相請厚葬之章獻怒公曰陛下不以劉氏為念臣不敢言尚念劉氏喪禮宜從厚吕夷簡行狀大書文字隄防老剩買田園准備閑倦游錄初議貶蔡確新州范忠宣謂吕汲曰此路荆棘已八十年吾輩開之恐自不免聞見錄有非常之功聖人之所甚懼也雖有大功而不忘戒懼東坡士燮論智慮經知周乎萬物易子知者無不知也當務之為急孟子知者之舉事也}
