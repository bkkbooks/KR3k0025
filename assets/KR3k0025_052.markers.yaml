  - {type: variant, offset: 715, length: 0, content: '', WYG: 鄙吝將以道周性全無得而稱乎余曽祖穆侯以為憲隤然其䖏順淵乎其似道淺深莫臻其分清濁未議其方郭泰初逰雒陽時人莫識陳留符融一見嗟異以介於河南尹李膺簡練清髙斥黜愎邪通鑑或問禰衡曰盍從陳長文司馬伯達乎曰吾焉能從屠沽兒耶唯善孔融及楊修常稱曰大兒孔文舉小兒楊徳祖餘子碌碌莫足}
