  - {type: variant, offset: 3, length: 4, content: 高門懸薄, WYG: 亢之為言也知進而不知退知存而不知亡知得而不知喪其欲逐逐易子孔子見羅雀者皆黄口小雀曰雀小貪食而易得為上者譬如縁木焉務髙而畏下愈甚家語莊周覩一異鵲自南方來集於栗林周曰此何鳥哉執彈而留之覩一蟬方得美䕃而亡其身螳螂執翳而摶之見得而亡其形異鵲從而利之見利而忘其真莊子魚鼈黿鼉猶以淵為淺而窟其中鷹鳶猶以山為卑而巢其上及其得也必以餌見其可欲也則不慮其可惡者也見其可利也則不慮其可害者也是以動則必陷為則必辱荀逐獸者目不見泰山嗜欲在外則明有所蔽狗彘不擇甂甌而食偷肥其體而顧近其死淮南子齊人有欲金清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金列子史翠鵠犀象處其勢非不逺死也而所以死者惑於餌蘇秦智伯之智非不足以避辱逺死也而所以死者惑於貪利不止也商君功成而以車裂白起功成而賜劒死吳起功成而卒肢解大夫種功已彰信勾踐終負而殺之此四者功成不去禍至於此蔡澤傳懐祿眈寵逐麋之狗當顧莬耶西漢園中有木其端有蟬蟬悲鳴飲露不知螳螂在其後曲跗欲取其蟬而螳螂又不知黄雀居其後延頸欲啄之然黄雀又不知有操彈丸在其下皆務前不顧後患劉向説苑和嶠有錢癖晉書田豫曰年過七十而猶在位譬猶鐘鳴漏盡而夜行不休魏志天道惡盈不知自損故至顛仆董卓築塢於郿髙七丈號曰萬嵗塢積穀為三十年儲自云事成雄據天下不成守此足以畢老漢鑑亦猶竊鍾掩耳以衆人為不聞鋭意盜金謂市中為莫覩張華少子韙勸華遜位華不從曰天道幽逺不如靜以待之元康之後綱紀大壊魯褒傷時貪鄙乃隠姓名著錢神論以刺之其畧曰親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顔開難發之口錢多者處先錢少者居後錢之所祐吉}
