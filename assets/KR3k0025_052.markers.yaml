  - {type: variant, offset: 1828, length: 1, content: 棊, krp: 竒寳横道驥服箱誰其識者有歐陽過目先空冀北羣陳後山品藻經子曰由也千乗之國可使治其賦也求也千室之邑百乗之家可使為之宰也赤也束帶立於朝可使與賓客言也徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏語子費惠公曰吾於子思則師之矣吾於顔般則友之矣王順長息則事我者也樂正子二之}
  - {type: variant, offset: 1830, length: 0, content: '', WYG: 四之下也孟晏子功用之臣也不如子産子産惠人也不如管仲管仲之為人力功不力義力知不力仁野人也不可以為天子大夫荀子蜀人有仲元者不屈其意不累其身不恵不夷可否之間也揚子史鄷舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也左左氏豔而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗范甯穀梁傳序獵追殺獸者狗也而發蹤指示獸處者人也今諸君徒􅀎走得獸耳功狗也至如蕭何發蹤指示功人也西漢蕭何傳今雖亡曹參等百數何缺於漢漢廷大臣獨汲黯好直諌守節死義難惑以非至如說丞相𢎞等如發蒙振落耳京兆尹張敞方畧耳目不及廣漢通鑑卓茂行已在於清濁之間東漢郭林宗曰奉髙袁閬字之器譬諸汎濫雖清而易挹叔度汪汪若千頃波澄之不清淆之不濁不可量也東漢黄憲傳鄭泰謁董卓曰明公出自西州少為將帥閑習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談髙論嘘枯吹生並無軍旅之才臨鋒决敵非公之儔也龎徳公常謂孔明為卧龍士元為鳳雛徳操為氷一作水鑑通鑑靖少與從弟邵俱知名有人品臧否之稱蜀志許邵與兄靖俱有髙名好共覈論鄉黨人物每月輒更其品題故汝南俗有月旦評曹操微時常卑辭厚禮求為已目許邵曰君治世之􅀎臣亂世之奸雄東漢本傳孫權與陸遜論周瑜魯肅及吕蒙曰公瑾雄烈膽畧兼人遂破孟徳開拓荆州邈焉寡儔子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌畧竒至可以次於公瑾但言議英發不及之耳圖取闗侯勝於子敬通鑑孫禮盧毓始入軍府崔琰曰孫疏亮亢烈剛簡􅀎斷盧清警明理百鍊不消皆公才也後咸至鼎輔三志國魏太子使胡綜作賓客目曰英才卓越超踰倫匹則諸葛恪精識時}
