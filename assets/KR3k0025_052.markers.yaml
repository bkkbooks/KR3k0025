  - {type: variant, offset: 1268, length: 0, content: '', WYG: 可一日無也鵰鶚鷹鸇豈衆禽之偶唐書宋璟奏括州員外司馬李邕儀州司馬鄭勉並有才畧文詞但性多異端好是非改變若全引進則必至咎悔若長棄捐則才用可惜吉温為新曹丞薛嶷薦温才上召見顧嶷曰是一不良人朕不用也通鑑李華善屬文與蕭穎士善為古戰場文燻汚之如故書置於佛書之間與穎士因閱佛書得之華謂之曰此文如何穎士曰可矣華曰當代秉筆者誰}
