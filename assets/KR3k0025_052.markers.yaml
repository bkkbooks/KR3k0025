  - {type: variant, offset: 42, length: 1, content: 曳, WYG: 大用魏公别錄吕獻可任御史中丞將對於崇政殿司馬温公宻問曰今日欲言何事獻可曰袖中彈文乃新參也温公愕然獻可正色曰王安石雖有時名上意所向然好執偏見不通物情輕信姦回喜人佞已聴其言則美施於用則疎若在侍從猶或可容置諸宰府則天下必受其弊矣劉諌議集王安石始為政司馬温公上疏逆陳其利害曰後當如是行之十餘年無一不如公言者温公行狀神宗將召用介甫訪於大臣爭稱譽之張安道時為承㫖獨言安石言偽而辯行偽而堅用之必亂天下記聞見於衆人之所未見也曽南豐昔者山巨源見王衍曰誤天下蒼生必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣老泉康節與客散步天津橋上聞杜鵑聲慘然不樂客問其故則曰洛陽舊無杜鵑今始至有所主不十年上用南士為相多引南人多務更變天下自此多事矣至熈寜初其言乃驗三朝言行錄逺慮經君子以思患而預防之君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易惟懐永圖樹徳務滋除惡務本居寵思危制治於未亂保邦於未危書瞻言百里詩君子言必慮其所終行必稽其所敝記吾恐季孫之憂不在顓臾而在蕭墻之内也語子曾參出妻終身不娶其子請焉告之曰髙宗以後妻殺孝已尹吉甫以後妻嫉伯竒容知其得免乎家語得其所利必慮其害樂其所樂必顧其敗老子季平子卒將以君之璠璵歛贈以珠玉孔子聞之歴級而救焉曰葬人以寳玉是猶曝尸於中原也家語以千嵗之法自持者是乃千嵗之信士也荀子滿盛之國不可仕任滿盛則敗亡亦不可任其事也滿盛之家不可以嫁子驕倨傲暴之人不可與交管子史定姒薨不殯於廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成君}
