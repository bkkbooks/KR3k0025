  - {type: variant, offset: 202, length: 1, content: 監, WYG: 鑑傳記王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴世説武后時侯知一年老勅令致仕知一乃詣朝堂跳躍馳走以示輕捷朝野僉載進士王元逺干索權豪無厭或遭撻辱畧無悔悟時人云王元逺慚顔厚如十重鐡甲天寳遺事防閑經女正位乎内男正位乎外男女正天地之大義閑有家悔亡重門擊柝以待暴客易以禮自防詩牙璋以起軍旅以治兵守周禮姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食外言不入於梱内言不出於梱男女不雜坐不同椸枷不同巾櫛不親授受嫂叔不通問僕御婦人則進左手後右手刑人不在君側男女不通衣裳男子入内不嘯不指夜行以燭無燭則止女子出門必擁蔽其面夜行以燭無燭則止夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族則前後家東西家無有則里尹主之大為之坊禮以坊徳刑以坊淫命以坊欲君不與同姓同車與異姓同車不同服先王因為酒醴壹獻之禮賓主百拜終日飲酒而不得醉焉此先王所以備酒禍也夫禮禁亂之所由生猶防止水之所自來也禮子外屏不欲見外也内屏不欲見内也荀子為冠所以莊其首也為履所以重其足也衣裳襜如劒佩鏘如皆所以防其躁也文中子史婦人送迎不出門見兄弟不踰閾女有家男有室無相瀆也諸侯相見軍衛不徹警也趙孟曰牀第之言不踰閾況在野乎孔子曰犠象不出門嘉樂不野合左漢初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聴受以竹使符背以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之劉邰曰凶豎多耳目恐事未㑹先受其禍譬如養鷹饑則附人每聞風颷之起常有凌霄之志正宜謹其絛籠豈可解從任其所欲哉或謂常山王演曰鷙鳥離巢必有探卵之患今日王何宜出通鑑崔神慶曰五品以上佩龜者盖防徴召之詐内出龜以命之唐本傳李林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜御前驅在數百步外一夕屢徙牀雖家人莫知其處通鑑唐髙宗改隋竹使符為銀莬符後改為銅魚符以起軍旅易守長新唐書懐重寳者不以夜行戰國䇿集虎豹九關天門九重使神虎豹執其關楚詞今人有宅於山者知猛獸之為害則必髙其柴柵而外設陷穽以待之宅於都者知穿窬之為盜則必峻其垣墻而内固扄鑰以防之韓文傳記千仭之墻禍不入門易林不能防閑史齊莊公鞭侍人賈舉而又近之乃為崔氏間公左岑彭所營時討公孫述地名彭亡聞而惡之欲徙日暮有刺客詐為亡奴降夜刺殺彭東漢本傳來歙攻公孫述蜀人大懼使刺客刺歙來歙自書表曰臣夜人定後為何人所賊傷中臣要害本傳昔懿公刑邴歜之父奪閻職之妻而使}
