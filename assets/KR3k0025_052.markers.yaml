  - {type: variant, offset: 1875, length: 1, content: 知, WYG: 容於世唯阿奴碌碌當在阿母下耳阿奴嵩弟謨小字也桓彛曰季野有皮裏春秋言其外無臧否而内有所褒貶也晉書魏主嗣曰裕才何如慕容垂對曰勝之垂籍父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒㣲不階尺土討㓕桓𤣥興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎魏崔浩謂髙允豐才博學一代佳士所乏者矯矯風}
