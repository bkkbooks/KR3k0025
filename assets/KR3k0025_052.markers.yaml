  - {type: variant, offset: 685, length: 2, content: 德義, WYG: 不可以已也士季曰諸侯相見軍衛不徹警也左宣智者備禍於未形史趙世家夫積貯者天下之大命苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懐敵附逺何招而不至堯有九年之水湯有七年之旱而國無損瘠者以蓄積多而備先具也通鑑絶其綿綿塞其㳙㳙東漢防隄完全雖遭雨水霖潦不能為變通鑑顔真卿為平原守禄山逆節頗著真卿以霖雨為託修城浚壕無㡬禄山果反河朔盡陷獨平原城守具備善治病者不使至危憊善救災者勿使至賑給少則不足活人活人多則闕國用國用闕則復重斂矣唐書傳記陶公作荆州敇船官使鋸木屑不限多少悉藏之時咸不解此意後正㑹值積雪㑹日始晴聴事前除雪地甚潤濕於是用木屑覆之都無所妨世說集服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煖者不憂至寒之悽愴何則有其具者易其備也王褒聖主得賢臣頌一歳之旱人斯具舟三月之熱人斯具裘劉賓客蓄穀者不病㐫年蓄珠玉者不虞殍死栁文本朝如儲藥石以待疾病如種梓漆以備器用東坡無備經易而无備也易子事無備則廢管子故國無九年之蓄謂之不足無六年之積謂之閔急無三年之蓄謂之窮乏淮南子大寒而後索衣裘不亦晩乎揚子史不備不虞不可以師莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢無備而言辨著猶拾瀋也恥匹夫不可以無備況恥國乎左傳物不素具不可以應卒}
