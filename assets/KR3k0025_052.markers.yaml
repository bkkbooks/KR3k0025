  - {type: variant, offset: 9, length: 0, content: '', WYG: 利何必讀書然後富貴無徳而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺諺曰錢無耳可使鬼凡今之人唯錢而已晉書蕭宏性愛錢百萬一聚黄榜標之千萬一庫垂一紫標如此三十餘間南史見黄雀而忘深穽智者所不為沈約貪冒營財王伾以納賄為事作大匱貯金帛夫婦寢其上如飲醇酒嗜其味而忘其醉矣通鑑李憕并州人頗殖産田疇彌望時謂地癖唐書傳記武后時夏官侍郎侯知一以年老敕令致仕知一乃詣朝堂跳躍馳}
