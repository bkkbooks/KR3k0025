  - {type: variant, offset: 669, length: 3, content: 記儒行, WYG: 禮凡事豫則立不豫則廢中庸子孔子曰有文事必有武備有武事必有文備家語圖難於其易為大於其細老子務本而節用則天不能貧養備而動時則天不能病故水旱不能使之饑渇寒暑不能使之疾妖怪不能使之㐫先患慮患謂之豫豫則禍不生荀子事無備則廢是以聖王務其大備管子夫天地之大計三年耕而餘一年之食率九年而有三年之蓄十八年而有六年之積二十七年而有九年之儲雖沴旱災害之殃民莫窮困流亡也淮南子}
