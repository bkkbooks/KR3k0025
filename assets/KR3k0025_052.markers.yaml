  - {type: variant, offset: 11, length: 0, content: '', krp: 拘於檻穽鷙鳥攫也縶於樊籠元龜靈也被髮河津白龍神也挂鱗且網何不深潜而穴處何故貪餌而吞鈎駱賓王猩猩見酒及屐知里人設張則知張者祖先姓字乃呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及食其味逮乎醉因取屐而着之及為人之所擒皆輒獲無遺者唐文粹始晉之侈家若欒氏郤氏羊舌氏以十數不能自保以貪晉國之利五卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣栁文蝜蝂者善負小蟲也行遇物輒持取卬其首負之背重雖困劇不止也其背甚澁物積因不散卒躓仆不能起人或憐之為去其負茍能行又持取如故又好上髙極其力不已至墜地死今世之嗜取者遇貨不避以厚其室不知為已累也唯恐其不積及其怠而躓也黜棄之遷徙之亦已病矣茍能起又不艾日思髙其位大其祿而貪取滋甚以近於危墜觀前之死亡不知戒雖其形魁然大者也其名人也而知則小蟲也亦足哀夫零陵永之氓咸善游一日水暴甚有五六氓乗小船絶湘水中濟船破皆游一本作皆浮其一氓盡力而不能尋常其侣曰汝善游最也今何後為曰吾腰千錢重是以後曰何不去之不應揺其首有頃益怠已濟者立岸上呼且號曰汝愚之甚蔽之甚身且死何以貨為又摇其首遂溺死吾哀之且若是得不有大貨之溺大氓者乎於是作哀溺文栁子厚貪目不瞬劉賓客䲭張狼貪老不衰元稹集燭蛾熖中舞繭蠶叢上織水多生沈五藴闕白頭名利之塲元㣲之貪卻馨香亡卻身羅隠集利徑前誘多逢覆轍力疲形削然猶役之無藝極劉賓客觜爪雖欲弊心力不知疲朝露貪名利夕陽憂子孫一興嗜慾然遂為矰繳牽愛利不愛身如何奉一身直欲保千年擬將富貴隨身去或名誘其心或利牽其身商人重利輕别離人心苦迷執慕貴憂貧賤愁色常在眉歡容不上面何異睡着人不知夢是夢何異食蓼蟲不知苦是苦多見忙時已衰病少聞健日肯休閑早夭羨中年中年羨暮齒暮齒又貪生服食求不已並白侍郎位髙則惜其位身貴則愛其身白樂天兔跡貪前逐梟心不早防張承吉詩遍㸔原上纍纍塜曽是城中汲汲人盡謂黄金堪潤屋誰思荒骨旋成塵杜荀鶴趨榮貪位者若涉懸崖險不能止俾至身危踣蹶然後歎不知税駕之所焉何及矣唐沈顔登華首本朝苦何求而不得乃終日而營營諒雖死而不悔亦可戒夫貪得歐公集如抱石沈河以其重愈沈終不放下石也老泉蝸涎不滿殻聊足以自濡升髙不知回竟作粘壁枯蠧魚着文字槁死猶遭卷懐安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私於為身君臣之恩係縻之於前妻子之計推輓之於後至於山林之士猶有降志於垂老而況廟堂之舊欲使辭祿於當年有其言而無其心有其心而無其決愚智共蔽古今一塗東坡多思只恐晩得手未老已聞先白頭邵堯夫人之所不能安其止者動於欲也欲牽於前而求其止者不可得也程易傳蝨聞湯沸尚血食飛蛾赴燭甘死禍山谷不知鐘鳴漏盡續世説先知經至誠之道可以前知禍福將至善必先知之不善必先知之中庸子㝠㝠之中獨見曉焉無聲之中獨聞和焉}
  - {type: variant, offset: 12, length: 1, content: 達, WYG: 子先知其幾於神乎揚先知神以知來探未兆也逆識先知近於神也揚子注史晉復假道於虞以伐虢宫之竒曰虢虞之表也虢亡虞必從之諺所謂輔車相依唇亡齒寒者其虞虢之謂也晉滅虢遂襲虞滅之吳季札使齊説晏平仲曰子速納邑與政無邑無政乃免於難晏子納邑與政是以免於欒髙之難晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及於難范氏之福也吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜惟子胥懼曰是豢吳也夫越在我心腹之疾也夫其柔服求濟其欲也子胥賜屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣秦伯問士鞅曰晉大夫其誰先亡對曰其欒氏乎初楚子良}
