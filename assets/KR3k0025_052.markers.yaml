  - {type: variant, offset: 136, length: 0, content: '', WYG: 筭萬不失一枚乘七發智慮所由日新選寺碑無逺慮經人無逺慮必有近憂語弗慮胡獲書我躬不閲遑恤我後反是不思亦已焉哉為猶不逺詩子慮不先不可以應卒鄧析子史子服惠伯曰君子有逺慮小人從邇饑寒之不恤誰遑其後穆叔語孟孝伯曰趙孟將死矣其語偷孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉趙孟曰罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也趙孟視䕃曰朝夕不相及誰能待五左氏凡人之智能見已然不能見將然通鑑翫細娛而不圖大患賈誼傳夫規事建議不圖萬世之固而媮恃一朝之事者未可以慮逺也西漢匃奴贊齊和士開曰一日取快可敵千年孔範曰諸將匹夫敵耳深識逺慮豈其能知通鑑謀畫經方叔元老克壯其猷詩四十始仕方物出謀發慮記好謀而成語子兼才尚權右計左數羣䇿屈羣力楊重黎史裨諶謀于野則獲謀于邑則否左傳靜淵以有謀史記帝頊紀蘇秦恐秦之敗從念莫可使用於秦者乃使人㣲感張儀隂奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舎人辭去張儀曰頼君得顯方且報徳何故去也舎人曰臣非知君知君乃蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣隂奉給君資盡蘇君之計謀今君已用}
