  - {type: variant, offset: 50, length: 0, content: '', WYG: 一脛之大幾如腰一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為痼疾後雖有扁鵲不能為已漢書賈誼傳班昭女誡云生男如狼猶恐其尫生女如䑕猶恐其虎東漢列女傳梁冀既誅李固子燮乃還郷里姊戒燮曰吾家血食將絶弟幸得濟豈非天耶宜杜絶衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已漢桓紀北海}
