  - {type: variant, offset: 138, length: 0, content: '', WYG: 謁而擒之此特一力士之事耳帝以為然遊雲夢信果郊迎武士縛之載後車史陳平世家張良歸漢多病未嘗特將常為畫䇿張良曰九江王布楚梟將與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可任大事當一面即欲捐之此三人則楚可破通鑑轅生説漢王曰願王出武關項王必引兵南走王深壁令滎陽成臯間且得休使韓信等輯河北趙地王乃復走滎陽未晩如此則楚所備者多力分漢得休復與之戰破楚必矣項王聞漢王在宛果引兵南漢堅壁不與戰陳平自初從至天下定從擊臧荼陳豨黥布凡六出竒計世莫得聞也韓信已破齊使人言曰不為假王恐不能安齊漢王欲攻之留侯曰不如因而立之使自為守乃遣張良操印綬立韓信為齊王史記項羽急圍漢王漢王與酈食其謀撓楚權酈生曰陛下誠復立六國後此皆爭戴陛下徳義願為臣妾漢王曰善趣刻印酈生未行張良從外來謁漢王具以酈生計告良良曰誰為陛下畫此計者臣請借箸以籌之且夫天下遊士離親戚棄故舊陛下誰與取天下乎誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事趣銷印張良傳漢王與齊王信魏相國越期㑹擊楚信越不至張良曰楚兵且破二人皆未有分地期不至固宜今能取睢陽以北至穀城皆以王彭越從陳以東傅海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破也漢王從之於是韓信彭越皆引兵來太尉復令酈寄與典客劉揭先説吕祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕祿以為酈況不欺已遂解印屬典客而以兵屬太尉漢髙紀諸吕擅權陳平患之陸賈曰天下安危注意將相將相和調則士豫附君何不交驩太尉平用其計以五百金為絳侯夀太尉報亦如之兩人深相結諸吕謀益衰陸賈傳陳湯為人沈勇有大慮多䇿謀本傳經術文雅足以謀王體㫁國論薛宣傳智畧謀慮朝之淵藪伏湛傳援謀如湧泉馬援傳勇鷙有智謀吳漢傳儒者當謀謨廟堂虞詡傳諸葛亮勸農講武作木牛流馬運米集斜谷口魏明紀𤣥齡善謀杜如晦傳張柬之沈厚有謀能㫁大事本傳淄青李正巳徳宗時畏帝威㫁表獻錢三十萬緍以觀朝廷帝意其詐未能答崔祐甫為相曰正已誠詐不如因遣使勞其軍以所獻就賜將士若正已奉詔是陛下恩洽將士若不用彼自歛怨軍且亂又使諸蕃不以朝廷為重賄帝曰善正已慚服時議者韙其謀謨唐書本傳互入區處得當李徳裕為兵部尚書初李宗閔與徳裕有隙徳裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能京兆尹杜悰宗閔黨也嘗詣宗閔見其有憂色曰得非以大戎乎宗閔曰然何以相救悰曰悰有一䇿可平宿憾恐公不能用宗閔曰何如悰曰徳裕有文學而不由科第嘗用此為慊恨若使之知舉必喜矣宗閔黙然有間曰更思其次悰曰不則用為御史大夫宗閔曰此則可矣悰乃詣徳裕迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意即以大夫之命告之徳裕驚喜泣下曰此大門官小子何足以當之寄謝重沓通鑑唐文宗互入解紛朱瑾遣家奴通候問於徐知訓知訓彊欲私之瑾已不平知訓過别瑾瑾置酒自捧觴出寵妓使歌以所愛馬為夀知訓大喜瑾因延之中堂伏壯士於户内出妻陶氏拜之知訓答拜瑾以笏自後擊之踣地呼壯士出斬之瑾先繫二悍馬於廡下將圖知訓宻令人解縱之馬相蹄齧聲甚厲以是外人莫之聞通鑑後梁太祖集運籌合上意諌諍即見聴王褒聖主得賢臣頌咎繇謨虞箕子訪周言通帝王謀合聖神班固賓戯蕭曹魏邴謀謨乎其上選班固西都賦碩畫精通選賦深圖宻慮衆莫能窺計知投水思若轉規選銘廟勝之筭應變無窮同上經綸八方唐文粹本朝西夏趙徳明言民饑求粮百萬斛真宗問王旦旦勅有司具粟百萬於京師詔徳明來取徳明得詔書慙曰朝廷有人王旦神道碑昔者諸吕用事陳平憂慮計無所出陸賈入見説之使交驩周勃平用其䇿卒得絳侯北軍之助以滅諸吕老泉淮隂侯見髙帝於漢中論劉項短長畫取三秦如指掌及佐帝定天下漢中之言無一不酬諸葛孔明草廬中與先主䇿孫權規取劉璋因蜀之民庶資以爭天下終身不易其言此豈口傳耳授嘗試為之而僥倖其或成者哉東坡范文正公集叙無謀史輕則寡謀入險而脱又不能謀能無敗乎晉叔向曰無釁而動可謂無謀左婢妾賤人感慨而自殺非能勇也其畫無聊之至耳前漢欒布傳注言其計盡無所聊賴至於自殺發忿快志剡手以衝仇人之凶固為俱靡而已賈誼傳荀彧曰審配専而無謀荀攸郭嘉曰吕布勇而無謀子瑾曰蕭繹懦而無謀通鑑權變經化而裁之謂之變子曰知變化之道者其知神之所為乎變通者趨時者也通其變使民不倦窮則變變則通上古穴居而野處後世聖人易之以宫室巽以行權易子夏問曰三年之喪卒哭金革之事無辟也者禮歟孔子曰吾聞諸老􅅨曰昔者魯公伯禽有為為之也伯禽封於魯有徐戎作難喪卒哭而征之急王者之事也征之作柴訾出禮記曽子問君子貞而不諒吾豈匏𤓰也哉焉能繫而不食語故當不義則子不可以不爭於父孝經動靜伸屈唯變所適易子大人者言不必信行不必果惟義所在孟子權者神聖之所資管子拔㦸加乎首則十指不辭㫁荀子知道者必達於理達理者必明於權莊子權者聖人獨見淮南子仲尼於南子所不欲見也於陽虎所不欲敬也見所不見敬所不敬楊五伯注云欲詘身以行道通其變天下無弊法文中子史仲尼曰政寛則民慢慢則糾之以猛政猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和左反經合道為權公羊傳權者反於經然後有善權之所設舎死亡無所設行權有道自貶損以行權不害人以行權榖梁大夫無遂事出境有可以安社稷利國家者則専之可也公羊傳孔子過蒲蒲人止孔子曰茍無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聴孔子世家蘇秦兄弟二人其術長於權變本傳蝮蛇螫手則斬手螫足則斬足何者為害於身也西漢田儋傳反古未可非趙世家輒以便宜施行西漢韓信使人言於漢王齊反覆之國不為假王其勢不定漢王大怒張良陳平躡漢王之足附耳語曰漢方不利寜能禁信之自王乎因立之史記權不可預設變不可先圖與時移遷應物變化設䇿之機也帝有疾惡人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日舞陽侯樊噲排闥直入大臣隨之通鑑失火之家豈暇先言丈人後救火乎漢髙五王傳班固曰孝文時天下以酈寄為賣友夫賣友者見利而忘義也若酈父為功而又執刼雖摧吕祿以安社稷誼存君親可也漢紀諸吕為從謀弱京師而勃反經合於權太史公自序琴瑟不調甚者必解而更張之乃可鼓也為政不行甚者必變而更化之乃可理也董仲舒傳東越相攻上使汲黯往視之不至至吳而還河内失火延燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發倉廪以賑貧民臣請歸節伏矯制之罪孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也襄公作三軍公舎之君子大其復古以為不舎則有害於民也漢鑑法有泥於時事有乖於數者可改也權以濟事理亂者先權謀後漢馭委其轡馬駘其銜四牡横奔皇路險傾方將拑勒􅀈輈以救之豈暇鳴和鑾清節奏哉崔寔傳軍事有専無請凡專命者謂有臨時之急耳漢書潰癰雖痛勝於内食吳志王世充作難帝幸江都皇甫無逸留守斬關而走追騎且至無逸解金帶投之於地以緩追騎由是得免唐書行權不可以隠於私晉書姚崇曰事固有違經而合道反道而適權者本傳姚崇善應變以成天下之務唐書崔郾治陜以寛經月不笞一人及治鄂則嚴法峻誅一不貸或問其故曰陜土瘠而民勞吾撫之不暇猶恐其擾鄂土沃民剽雜以夷俗非用威莫能治政所以貴知變者也新唐書本傳栁仲郢為京兆政嚴明後出河南以寛惠為政或曰不類答曰輦轂之下先彈壓羣縣之治本惠養唐書參虛實揣輕重存乎權唐書陸贄傳杜黄裳達權變有王佐大畧本傳偽蜀王衍既降唐莊宗詔云王衍一行並宜殺戮張居翰為樞宻使覆視詔乃揩去行字改為家字及衍就刑止族近屬從行者千餘人皆免五代史傳記良商不與人爭買賣之賈而謹司時時賤而買雖貴已賤時貴而賣雖賤已貴戰國䇿人有置係蹄者而得虎虎怒決蹯而去虎之情非不愛其蹯也然而不以環寸之蹯而害七尺之軀者權也戰國䇿集繫蹄在足則猛虎絶其蹯蝮蛇在手則壯士㫁其節陳琳檄聖人不凝滯於物智士必推移於時駱賓王蝮蛇一螫手壯士疾解腕陸龜䝉昔晉侯報楚之功避子玉於三舎捨秦之惠覆孟明於三崤安國庇民大義斯在李文饒集本朝趙閱道知越州時兩浙旱蝗米價踴貴諸州皆立榜禁人増米價閱道獨榜衢路令有米者任増價糶之於是諸州米商輻輳詣越米價更賤聞見錄朱敬則曰拯溺不規行療饑非鼎食續世説使聖人無權則無以成天下之務老泉惟聖達節豈復行曽閔之難以民為心則當法舜禹之大慰皇太后表楚公子㣲服出亡而門者難之其僕操箠而罵曰隷也不力門者出之事有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可莊子要絰服事出於孔門墨衰從政見於魯史東坡窒泥經大過棟撓之凶也棟已撓矣而守其常則是危而不扶凶之道也易畧例子猶執熱而不以濯也執中無權猶執一也所惡執一者舉一而廢百也孟子凡人蔽於一曲而闇於大理荀子尾生與女子期於梁下女子不來水至不去抱梁柱而死曲士不可以語道莊子宋人有耕者田中有株兔走觸株而死因釋耕而守株冀更得兔宋人笑之韓非子以往聖人之法治將來譬猶膠柱而調瑟楊先知規行矩步不可以救焚拯溺抱樸子執其方天下無善教凝滯者智之蝥也執小義妨大權文中子待扁鵲乃治病終身不愈也魏子史鄙儒不知時變叔孫通傳當更化而不更化雖有大賢不能善治也董仲舒傳常人可與守經未可與權也張敞傳為人臣者不可不知春秋守經事而不知其宜遭變事而不知其權司馬遷傳猶焦朋已翔乎寥廓而羅者猶視乎藪澤司馬相如傳俗儒不達時宜漢宣紀猶察伯樂之圖求騏驥於市而不可得欲以承平之法理暴秦之緒猶以鄉飲酒禮理軍事也梅福傳崔宴曰俗士拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事哉本傳俗士不知變以為結繩之約可理亂秦之緒干戚之舞足解平城之圍崔寔傳庸儒泥文不知變唐姚崇傳儒生俗士豈識時務蜀諸葛亮傳何異遺劒中流而刻舟以記選舉志傳記膠柱調瑟刻舟求劒史通楚人有涉江者其劒自舟中墜於水遽鍥其舟曰是吾劒所從墜也舟去從所鍥處入求之而舟已行劒不行此不亦惑乎吕氏春秋集蹐局顧而不行楚辭未嘗違户庭安能千里遊鮑明逺還都詩永有某氏者拘忌尤甚以為已生嵗直子䑕子神也因愛䑕不畜猫禁僮勿擊倉廩恣䑕不問室無完衣飲食大率䑕之餘也夜不可寢終不厭栁子厚本朝團團如磨驢步步踏陳迹坡詩登木求魚知我拙循窠覔兔笑君疎欒城集圓轉經水流而不盈易水之性可停可行詩敝笱注子轉圓石於千仭之山孫子兵勢盤中走珠杜牧注孫子序事猶琴瑟曲終改調非循一跡之路守一隅之指拘繫牽連於物而不與世推移也淮南子安得圓機之士與之共言九流哉文中子周公篇史不凝滯於物而與世推移屈平傳從諫若轉圜梅福傳從叔特重謝𢎞㣲常曰此子異不傷物同不害正宋紀譬如餌藥當人羸冷資散石以全身及勢熱發動去堅積以止患非忘其功勢不獲已耳宋蒼梧王紀本朝古來貞遯何曽遯笑殺踰垣與閉門東坡詩拘謭經旅瑣瑣斯其所取災易言必信行必果硜硜然小人哉語史規小節者不能成榮名惡小恥者不能立大功史魯仲連傳遴東布章西漢髙恵功臣表􅐅􅐅㢘謹申屠嘉傳愚士繫俗窘若囚拘餙小行兢小㢘以自託於鄉黨賈誼傳局趣}
