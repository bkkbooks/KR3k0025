  - {type: variant, offset: 137, length: 0, content: '', krp: 歸報張儀曰比在蘇君術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言范雎曰王不如逺交而近攻得寸則王之寸得尺則王之尺甘羅年少出一竒計聲稱後世亦戰國之䇿士也虞卿料事揣情為趙畫䇿何其工也史本傳蔡澤謂范雎曰君相秦計不下席謀不出廊廟坐制諸侯君之功極矣史蔡澤傳侯嬴曰吾聞晉鄙兵符在王卧内而如姬最幸力能竊之嘗聞公子為如姬報其父仇欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通鑑六竒既用諸侯賓從漢吕之事平為本謀子房計謀圖難於易為大於細太史公自序有上書告韓信反上問陳平平曰舉兵攻之是趨之戰也陛下第偽遊雲夢其勢必郊迎}
