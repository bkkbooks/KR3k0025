  - {type: variant, offset: 132, length: 0, content: '', WYG: 逺無所不見慮無所不周通鑑元文都謂靈楚等曰今讎恥未雪而兵力不足若赦李宻罪使擊宇文化及兩賊自鬬吾徐承其弊化及既破宻兵亦疲其將士利吾官賞易可離間并宻亦可擒也通鑑唐髙祖李宻致書於唐髙祖請步騎㑹河内太宗曰若不與是生一隋唐書李宻傳房𤣥齡每陳事千里如對面語裴度歴事四朝不遺廟筭唐書傳記耿純率宗族歸光武恐半有不同焚燒廬舎絶其反顧之望東觀漢紀天下無窮者才智也陳平出六竒恐禍及已陸賈教之交驩太尉又為畫吕氏數事平從之卒誅諸吕則賈之智謀又在平之右矣孔氏雜説集}
