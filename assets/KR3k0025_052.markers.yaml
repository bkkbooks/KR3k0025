  - {type: variant, offset: 42, length: 1, content: 曳, krp: 大用魏公别錄吕獻可任御史中丞將對於崇政殿司馬温公宻問曰今日欲言何事獻可曰袖中彈文乃新參也温公愕然獻可正色曰王安石雖有時名上意所向然好執偏見不通物情輕信姦回喜人佞已聴其言則美施於用則疎若在侍從猶或可容置諸宰府則天下必受其弊矣劉諌議集王安石始為政司馬温公上疏逆陳其利害曰後當如是行之十餘年無一不如公言者温公行狀神宗將召用介甫訪於大臣爭稱譽之張安道時為承㫖獨言安石言偽而辯行偽而堅用之必亂天下記聞見於衆人之所未見也曽南豐昔者山巨源見王衍曰誤天下蒼生必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣老泉康節與客散步天津橋上聞杜鵑聲慘然不樂客問其故則曰洛陽舊無杜鵑今始至有所主不十年上用南士為相多引南人多務更變天下自此多事矣至熈寜初其言乃驗三朝言行錄逺慮經君子以思患而預防之君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易惟懐永圖樹徳務滋除惡務本居寵思危制治於未亂保邦於未危書瞻言百里詩君子言必慮其所終行必稽其所敝記吾恐季孫之憂不在顓臾而在蕭墻之内也語子曾參出妻終身不娶其子請焉告之曰髙宗以後妻殺孝已尹吉甫以後妻嫉伯竒容知其得免乎家語得其所利必慮其害樂其所樂必顧其敗老子季平子卒將以君之璠璵歛贈以珠玉孔子聞之歴級而救焉曰葬人以寳玉是猶曝尸於中原也家語以千嵗之法自持者是乃千嵗之信士也荀子滿盛之國不可仕任滿盛則敗亡亦不可任其事也滿盛之家不可以嫁子驕倨傲暴之人不可與交管子史定姒薨不殯於廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成君}
  - {type: variant, offset: 44, length: 2, content: 裾乎, WYG: 誰受其咎出襄四晉傳傁曰雖克鄭猶有知在憂未艾也左言晉知氏將為難夫勢在人臣之位而有髙天下之名竊為足下危之前漢蒯通傳蕭何不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪前漢本傳竇長君竇廣國賜田宅封公昆弟家於長安絳侯灌將軍曰吾屬不死命且懸此兩人兩人所出㣲不可不為擇師傳賓客又復效吕氏大事也於是選士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人史外戚世家雋不疑名重朝廷大將軍霍光欲以女妻之不疑固辭不肯當前漢本傳霍顯之謀將行於杯杓荆軻之變必起於帷幄西漢息夫躬傳張釋之曰豈效嗇夫喋喋利口捷給哉以口辨而超遷之臣恐天下隨風而靡本傳安不忘危盛必慮衰前漢陳湯傳梁商常曰多藏厚亡為子孫累每租俸到及兩宫受賜便置中門外未嘗入藏悉分與昆弟中外}
