  - {type: variant, offset: 707, length: 3, content: 好色惡, WYG: 及以聞自追之居三日來曰諸將易得耳至如信者國士無雙王欲長王漢中無所事信必欲爭天下非信無可與計事者吕氏問相髙帝曰陳平智有餘然難獨任周勃重厚少文然安劉氏必勃也初絳侯周亞夫為丞相趙禹為丞相史府中皆稱其亷平然亞夫弗任曰極知禹無害然文深不可以居大府通鑑冠雖敝必加於首履雖新必貫於足履雖鮮不加於枕冠雖敝不以苴履刀筆吏不可為公卿長卿雖貧其人足依也初何武為郡吏時事太守何夀夀知武有宰相器以其同姓故厚之西漢帝謂執金吾冦恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可也周璆髙潔之士前後郡守招命莫肯至唯蕃能致焉特為置榻去則垂之東漢陳蕃為豫章守不接賓客唯功曹徐穉來特設一榻去則懸之同上郭泰識張孝仲芻牧之中知范特祖郵置之役邵公子許偉康並出屠酤司馬子威拔自卒伍後漢荀淑遇黄憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾師表也既而前至袁閬所未及勞問遂曰子國有顔子寜識之乎閬曰}
