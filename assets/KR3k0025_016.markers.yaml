  - {type: variant, offset: 262, length: 0, content: '', WYG: 願仕陳脩自號市隠居士同上集蜀路江干窄彭門地理長天彭信方隅城勢誠斗絶蘇頲湖水欲平官舎好茶征初復訟氓稀蘇子由綿州倚郭一外縣四巴西彰明魏城羅江鹽泉郡號巴西金山左綿涪江綿水州沿革秦地鶉首之次禹貢梁州職方雍州之域秦屬蜀郡漢屬廣漢郡蜀屬梓橦縣晉以後屬梓橦巴西二郡西魏兼置潼州隋開皇廢郡改綿州大業改金山郡唐武徳復綿州天寶曰巴西郡屬劒南道沿革表縣沿革巴西本漢廣漢郡涪縣西魏改巴西縣隋置金山郡唐置綿州彰明本漢涪縣地東漢永元置漢昌縣屬巴西郡蜀初屬宕渠郡尋廢郡屬巴西郡惠帝分屬宕渠郡西魏改縣曰昌隆隋屬金山唐先天改縣曰昌明後唐改今名魏城本漢涪縣地晉西魏置縣屬隋金山郡唐屬綿州羅江本漢涪縣地晉置萬安縣後移於潺亭改潺亭縣西魏復曰萬安置萬安郡隋廢郡屬金山郡唐屬綿州天寶改今名鹽泉本漢涪縣地唐武徳析置魏城同上形勝金山在巴西縣羅江兩水相蹙成羅紋因以名縣富樂山在巴西縣東廉遜水在彰明縣戴天山流霞山皆在彰明明月山仙雲山在巴西縣涪水在彰明潺水在羅江縣天池山在州北天倉洞在彰明玉盆山在魏城西石磬山與戴天山相接龍池山蚌溪水在羅江縣龍䑓山在廢西昌縣太筆山靈臺山在彰明髙靈山在魏城縣輿地紀勝人物漢涪翁著針經脉法蜀杜微武侯招之拜為諫議大夫宋范桓年對明帝曰臣居廉遜之間詳見泉類梁李膺有辯才武帝問今李膺何如昔李膺對曰昔李膺事桓靈之主今李膺逢堯舜之君唐李白}
