  - {type: variant, offset: 1130, length: 0, content: '', WYG: 州綿竹漢屬廣漢郡晉屬新都郡隆安置晉熈郡周改縣名晉熈隋廢郡後改縣曰孝水大業復曰綿竹唐武徳屬濛州貞觀州廢屬彭州垂拱來屬徳陽本漢綿竹縣地東漢析置徳陽縣後周廢之唐武徳分雒縣復置屬益州埀拱來屬沿革表形勝房湖本唐房琯所鑿凡數百畆洲島囘環國朝咸平又開南湖泄西湖餘波以入焉章山在什邡縣西綿水在雒縣東孝泉在徳陽縣西昔郭華以父䘮明泣告上天泉出其庭以濯父目明復如初聖水在徳陽馬鞍山金匱山翠屏山在綿竹寶峯山在什邡躍鯉泉在徳陽昔姜詩至孝所感沈犀橋在郡北玉妃溪在綿竹玉女泉在什邡赤塗山紫岩山十將山萬斛山皆在綿竹金鴈津在雒縣西白魚水即沈犀橋水輿地紀勝人物漢嚴君平一云廣漢人李業不受公孫述之聘飲毒死劉寵號一錢太守姜詩以孝感雙鯉之應蜀秦泌先主辟之為従事西魏鄧刺史十世同居旌表其門皇朝宇文之邵上書乞選監司不報棄官不仕楊繪論王安石補外張紘舉茂才異等子張咸召試賢良為第一孫張浚中興名相曽孫張栻號南軒先生同上集鹿頭何亭亭俯見千里豁杜甫木落漢川夜西湖垂月鈎旌旗環外次舟楫泛中流劉夢得結宇依囘渚水中信可居三伏氣不蒸四逹暑自沮北來初入漢州城郭邑樓臺觸目驚松桂影中旌斾色芰荷風裏管弦聲鳳沼才能盡餘思鑿西湖嚴公期本朝西湖深鎖一溪雲風景幽閑少到人天外樓臺常貯月水邊花木别留春房公昔漂泊置酒此鳴琴人事有憂樂山光無古今廣漢有姜子孝悌行里閭赤眉雖豺虎弛兵過其墟至今空清泉無復雙鯉魚橋邊金作鴈湖上酒為鵞李石詩郡有金鴈橋卭州倚郭一外縣五臨卭依政安仁大邑蒲江火井郡號臨卭火井卭崍斜江蒲江州沿革秦地井鬼之分禹貢梁州職方雍州之域秦以後屬蜀郡宋齊屬晉康郡卭州西魏屬臨卭郡隋開皇廢郡大業廢州復郡唐武徳置卭州臨卭郡沿革表縣沿革臨卭縣漢屬蜀郡西魏置臨卭郡又分置臨漢縣屬蒲源郡隋開皇廢郡省臨溪大業改雅州為臨卭縣以縣屬焉唐復置臨溪並屬卭州顯慶州自依政徙治此太和以臨溪屬巂州後復故依政本漢臨卭縣地西魏置卭州及依政縣隋大業州廢屬臨卭郡唐初卭州治此後徙治臨卭安仁本漢臨卭縣地唐武徳析臨卭依政置縣貞觀省咸亨復大邑本漢蜀郡江源縣地唐咸亨析益州之晉原置蒲江本漢臨卭縣地西魏置廣定縣及蒲源郡隋開皇廢郡仁夀改曰蒲江屬臨卭郡唐屬卭州太和屬雋州後復故火井本漢臨卭縣地後周置火井鎮大業升為縣屬臨卭郡唐屬卭州沿革表形勝山曰卭崍浸曰卭水淵曰卭池毛曰卭竹圖}
