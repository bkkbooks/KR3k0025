  - {type: variant, offset: 6, length: 2, content: 子故, WYG: 業改越州為禄州尋改合州又改合浦郡唐武徳復越州又置姜州貞觀改越州曰廉州廢姜州入焉天寶曰合浦郡屬嶺南道五代地入南漢地理沿革表縣沿革合浦本漢合浦縣治呉珠官晉合浦宋以後越州唐廉州皆置此武徳置安昌髙城大廉等縣屬焉又置梁州及封山東羅蔡龍等縣觀置珠池縣尋廢姜州以縣來屬省安昌珠池入合浦髙城入蔡龍乾元後又廢東羅本朝省入合浦石康本漢欝林郡治隋末蕭銑分興徳縣置安樂縣唐觀省安樂乾封重置屬欝林州調露割横貴二州地置岩州及石岩髙城思封三縣永隆以安樂𨽻岩州天寶曰安樂郡至徳改常樂郡更安樂縣為常樂以岩州為常樂州本朝並省置石康縣沿革表形勝明月溪緑雲溪在合浦五黃山昔樵}
