  - {type: variant, offset: 4, length: 1, content: 處, WYG: 南賔置玉州以内亭遵化置南亭州觀州廢並來屬後更南賔曰靈山自欽江徙治焉本朝徙置安逺沿革表形勝三山在安遠南五湖在州城外羅浮山在州西北三海岩在靈山縣境日岩月岩龜岩醉石卧石並在江濵輿地紀勝人物唐寗悌原修國史以直筆忤㫖致仕皇朝黄渙建炎死於王事輿地紀勝本朝開寶五年省欽江内亭遵化三縣入靈山景徳三年更保京縣名安逺沿革表集僧憐海石為碁子客懼蠻雷作酒杯陶弼商誇合浦珠胎賤民樂占城稻米豐火炬影沈江岸北潮聲流過郡城東三石禊橋春㑹永五湖吟舫夜歸遲寧越佳山水並同廉州倚郭一外縣一合浦石康郡號合浦珠官禄川合州珠池州沿革牛女之分百越地秦屬象郡漢合浦郡呉改珠官郡後復故宋兼置越州及臨瘴郡隋廢郡}
  - {type: page-break, offset: 4, content: '', id: KR3k0025_WYG_016-3b, image: WYG0930/WYG0930-0381d.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0025_WYG_016-4a, image: WYG0930/WYG0930-0382a.png}
