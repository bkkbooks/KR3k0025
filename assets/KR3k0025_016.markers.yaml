  - {type: variant, offset: 1133, length: 3, content: 厚者薄, WYG: 得官資囘贈二親以感動上意同上集火井沈熒於幽泉髙爓飛扇于天垂文選我愛銅官樂千年未擬還要須囘舞袖拂盡五松山李白本朝熈寧五年省臨溪縣入臨卭沿革表平日蘭溪隠春雲蕙帳眠定應猿鶴在歸去盡蘆鞭范蜀公先生宴坐西湖曲水上青山削寒玉日光浮動山影來釀作一湖春酒緑石安期仰窮胡老棲神地俯壓張公釣􅀈磯張宗廣黎州倚郭一漢源郡號沈黎筰都洪源漢源州沿革井鬼之分禹貢梁州職方雍州之域秦漢屬蜀郡東晉李特據蜀置漢源郡後周開越雋置黎州隋秦夀置登州大業州廢屬臨卭郡唐武徳復登州後廢之大足元年置黎州神龍廢開元復天寶曰洪源郡屬劒南道沿革表縣沿革漢源本漢蜀郡旄牛縣地隋大業置漢源縣唐武徳増置陽山以二縣立登州州廢屬雅州貞觀屬巂州永徽復屬雅州儀鳳分漢源置飛越縣大足以三縣置黎州天寶改陽山為通聖五代省飛越入漢源沿革表形勝九折坂在卭崍山乃王尊叱馭處三里碉一名三碉城卭崍山在州北笋筤山在州西北通望山在大渡河南飛越山在廢縣西北飛水山在州東北銅山城在洪源縣西北寶葢山在梵音水之東試劒山在漢源鎮之西北彈琴谷在州西北和尚山在州東北道士峯在龍池山之右仙人洞去州五十里輿地紀勝本朝慶厯七年省通望縣入漢源沿革表集絶塞卭崍外偏城越雋東山含初夏雪林偃夕陽風喬木千年帝與齡世𫝊裁植自神僧前人世傳唐三藏師植杖黎云他日州治在此後果遷如師言卭崍古道驚險絶我行更遭連日雪縦觀自古得竒勝未審底處為九折李燾簡州倚郭一外縣一陽安平泉闕成都府路雅州倚郭一外縣四嚴道盧山名山百丈榮經郡號盧山雅安漢嘉蒙山嚴道蔡蒙州沿革井鬼之分禹貢梁州職方雍州之域秦漢屬蜀郡東漢屬蜀郡蜀國三國先主屬漢嘉郡晉永嘉没於獠西魏開生獠置濛山郡屬卭州隋廢郡置雅州大業廢為臨卭郡唐武徳復曰雅州天寶曰盧山郡屬劒南道沿革表縣沿革嚴道秦初置縣漢屬蜀郡三國屬漢嘉郡西魏置濛山郡改縣曰始陽隋廢郡改始陽曰濛山大業復曰嚴道置臨卭郡唐雅州治初置濛陽等五縣尋省之盧山本漢蜀郡青衣縣地及靈關道屬越巂隋置盧山鎮仁夀升縣屬臨卭郡唐屬雅州初置靈關縣後省之儀鳳置大渡縣長安省之名山本漢青衣縣地西魏置濛山縣隋改始陽曰濛山}
