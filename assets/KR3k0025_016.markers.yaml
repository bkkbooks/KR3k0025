  - {type: variant, offset: 306, length: 256, content: 史宋義曰搏牛之虻不可以破蟣蝨史記項羽傳蔣琬除廣都長眾事不理先主將加罪諸葛亮曰蔣琬社稷之器非百里之才也蜀志蔣琬傳吳魯肅遺先主書曰龐士元非百里才使處治中別駕之任始當展其驥足耳蜀志集執棠谿以刜蓬秉干將以割肉皆利劍也破荊和以繼築然一旅之眾不足以揚名選書胡為射小盜此用無乃輕徒沾一點血虛污箭頭腥白居易屈長才於短用者猶騎搏鼠而斧剪毛也白居易策審官互入處事失當函午之鼎以烹小雞劉賓客烹雞屈函牛之量駱賓王君有百鍊刃堪斷七重犀誰開太阿匣持割武城雞張九齡文以赤刃效小割皇甫湜集互見不勞餘力截橑為欂櫨斲楹以為椽韓文將吾劍首切淤泥盧仝文, WYG: ''}
