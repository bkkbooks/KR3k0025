  - {type: variant, offset: 2634, length: 183, content: 禮坊記並記子魯有儉嗇者瓦鬲煮食食之自謂其美盛之土硎之器以進孔子孔子受之歡然而悅如受太牢之饋子路曰瓦甂陋器也煮食薄膳也夫子何喜之子曰吾非為饌具之厚以其食厚而我思焉家語致思宋國有田夫常衣縕黂僅以過冬暨東作自曝於日顧謂其妻曰負日之暄人莫知者以獻吾君列子史苟有明信澗溪沼沚之毛蘋蘩蘊藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公左隱三年行潦之蘋藻季蘭尸之敬也左襄二十八年, WYG: 通化}
