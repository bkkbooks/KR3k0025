  - {type: variant, offset: 842, length: 243, content: 光武紀君材簡略堪大不堪小晉書劉卞傳集孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其內柳文不及於一國而被於天下不洽於一時而沛于萬世皮日休名聞天下而不達於堂上智周萬物而不適乎一人文粹本朝尹師魯凡事有小而可矜者必惻然不忍發見顏貌及臨大節斷大事則心如金石雖鼎鑊前列不可變也歐公集互見深識大體子金重於羽者豈謂一鉤金與一輿羽之謂哉孟告子下鴻毳性輕積之沈舟魯縞質薄疊之折軸劉子史積羽沈舟群輕折軸史記張儀傳集眾輕積而折軸文集子齊宣王見牽牛而過堂下者王曰以羊易之孟子曰王無異於百姓之以王, WYG: 又}
