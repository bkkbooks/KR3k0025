  - {type: variant, offset: 32, length: 65, content: 體也淮南子道應訓牛蹄之涔無尺之鯉頹府之山無丈之材何也皆其營守狹小而不能容巨大淮南子坎井之無黿鼉隘也江湖鱣鯨非溝瀆所容也蹄窊之內不生, WYG: 廉入合浦太平興國廢廉州以海門鎮置太平軍省合浦入石康咸平復置廉州治合浦沿革表集合浦還珠舊有亭使君方似古人清沙中蚌蛤胎常滿潭㡳}
