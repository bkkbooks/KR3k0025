  - {type: variant, offset: 2840, length: 190, content: 幽室之中非燭何見記仲尼燕居子假輿馬者非利足也而致千里假舟楫者非能水也而絕江河善假於物也荀勸學篇造父者天下之善御也無輿馬則無所見其能羿者天下之善射也無弓矢則無所見其巧儒效篇弓矢不調則羿不能中六馬不和則造父不能以致遠議兵篇必將假物以為用者也並荀子行海者坐而致越有舟也行陸者立而至秦有車也慎子傳記鴻毛之囊可以渡江淮南萬畢術經惟木從繩則正書說命伐柯如之何匪斧不克詩齊南山析薪如之何匪斧不克, WYG: 時}
