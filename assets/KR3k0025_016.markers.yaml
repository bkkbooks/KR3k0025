  - {type: variant, offset: 1244, length: 258, content: 猶不能給況一人鑄之萬人奪之通監東漢陳思王曰寒者不貪尺玉而思短袍飢者不願千金而羨一食物時有所急也後魏賈思緦齊民要術互入事窮勢迫本朝夫以英雄之才尚有溺情愛而不能自守況柔弱之人其能勝妻子之情乎伊川家人卦解經與其殺不辜寧失不經書喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也記檀弓與其有聚歛之臣寧有盜臣記大學非專為飲食也為行禮也鄉飲酒義爾愛其羊我愛其禮語子寧百刺以針無一刺以刀寧一引重無久持輕寧一月饑無一旬餓淮南子史施眾網以加一禽尚不能得況張千目以羅萬品而望盡出乎其間可得哉唐元稹傳, WYG: 分古冉駹國}
