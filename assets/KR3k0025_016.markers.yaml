  - {type: variant, offset: 2309, length: 324, content: 兵黃魯直經權衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓記經解子聽其言也觀其眸子人焉廋哉孟子离婁上水靜則明燭鬚眉莊天道高垂大鏡坐見四鄰淮南子史清水明鏡不可以形遁韓安國傳互見聰明集登鐘山藍田之上則夜光璠璵之珍可觀矣文選李蕭遠運命論經東鄰殺牛不如西鄰之禴祭實受其福易既濟互見事反所料樽酒簋貳用缶納約自牖終無咎坎卦注明信顯著不存外飾雖復一樽之酒二簋之食瓦缶之器納此至約自進於牖乃可以羞之於王公薦之於宗廟茅之為物薄而用可重也繫辭並易黍稷非馨明德惟馨書君陳泂酌彼行潦挹彼注茲可以餴饎詩泂酌子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮語祭服敝則焚之祭器敝則埋之記曲禮上夫禮之初始諸飲食其燔黍捭豚汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神禮運君子不以菲, WYG: 代}
