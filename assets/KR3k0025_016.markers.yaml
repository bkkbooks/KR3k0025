  - {type: variant, offset: 260, length: 1, content: 木, WYG: 分禹貢梁州職方雍州之域秦漢屬蜀郡晉桓温置寧蜀郡梁置東益州西魏置夭水郡後周州廢置九隴郡隋開皇廢郡仁夀置濛州大業廢之蜀郡唐武徳復濛州貞觀廢之垂拱置彭州屬劒南道天寶曰漢陽郡地理沿革表縣沿革九隴本漢蜀郡繁縣地晉置晉夀縣屬梓橦郡後周改九隴縣及郡隋初置濛州州廢屬蜀郡唐武徳置濛州貞觀屬益州垂拱為彭州治崇寧唐儀鳳析九隴導江郫縣置唐昌縣屬益州垂拱來屬長夀改周昌神龍復故後梁改歸化縣後唐復為唐昌石晉改彭山後復故本朝更今名濛陽唐儀鳳析九隴新都新繁什邡雒縣置垂拱來屬沿革表形勝九隴山一名九峯曰伏隴豆隴秋隴奔馬隴走龍隴駱駝隴千秋隴較車隴橫檐隴在九隴縣北兩岐山在九隴縣大隋山有景徳寺神照禪師所居中隋山在大隋之後小彭陽以彭門牡丹得名小成都昔有樵人逐鹿入石穴見邑屋連接問是何處人荅云小成都也天彭山以彭祖出入此山因號彭門天敕山天徳山在九隴縣北白鹿山白馬泉在濛陽縣葛璝山在九隴縣葛仙化瀰濛水在濛陽縣玎璫崖在崇寧縣輿地紀勝人物皇朝胡銻國初召赴闕}
