  - {type: variant, offset: 603, length: 211, content: 細枝拳曲不可以為棟梁莊子賈精於市不可以為賈師農精於田而不可以為田師荀子此係小才不可大用史費充伐吳秦秀曰充文案小才居國大任三國志釣大鰲者不投取魚之餌斷長鯨者焉用割雞之刀南唐野史小才不可大用集楶梲之才不荷棟梁之任班叔夜王命論任小能於大事猶狸搏虎而刀伐木也白居易小才大用本朝以尋尺之材居棟梁之任以升斗之量鐘鼎之藏欒城集經陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娛易略例上史秦民勇於公戰怯於私鬭通監周顯十年漢高祖不能將兵而善將將, WYG: ''}
