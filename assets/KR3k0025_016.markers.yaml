  - {type: variant, offset: 1131, length: 0, content: '', WYG: 序金堤鐵山在臨卭火井在本縣詳見火類銅官山鄧通所封金釜井等有八出鹽課白鶴山在城西八里有白鶴臺鶴鳴山虎擘泉在大邑西四明山七盤山九岫山七星井皆在臨卭三瀑泉在霧山青霞幛碧玉潭皆山中處輿地紀勝人物漢司馬相如今臨卭有琴臺及文君井三國甘寧仕呉為折衝將軍唐梁震耻為髙季興所留終身不稱官爵皇朝李公泰仕至起居舎人常安民為御史子常同亦為言官忤㫖補外陳賔號白衣御史黃昴秦檜當國上黨言二十篇檜怒欲擒殺之杜國寶數千里求}
