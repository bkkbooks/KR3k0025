  - {type: variant, offset: 1137, length: 0, content: '', WYG: 改濛山曰名山屬臨卭郡唐屬雅州貞元曰漢源後復故百丈本嚴道縣地唐武徳置百丈鎮貞觀升縣榮經本嚴道縣地唐武徳析置沿革表形勝其山蔡蒙其關卭崍百丈山去本縣十五里九折坡在榮經縣三堆山在州治南靈關山在盧山縣北雷泉山在姜城東金船山在盧山大峽中羅帶水在盧金馬峽金雞山在嚴道金鵞池在盧山北鳳凰山麒麟渡在嚴道鹿池龍潭在榮經縣銅山在百丈東鄧通鑄錢地銀山在百丈西南金穴在嚴道之金沙鎮輿地紀勝人物漢髙頥其弟君實子文玉一門三舉孝廉五代王承肇魏王宗侃之子也皇朝曹光實為國破賊為親報仇曹明光實之従子也李順之亂攻復雅州景自芳以二月二十日作寒食至今人依之號景村寒食何大受元祐黨人同上集琴裡知聞維緑水茶中故舊是蒙山白樂天本朝熈寧五年省百丈縣入名山元祐復置沿革表鵞渾開性鑿龍洞隔凡塵豐稷江聲捲出風雷去山色攜將圖畫來李艾岩前雨過仙臺迥洞口雲歸藥竈閑宋滋舊譜最稱蒙頂味露芽雲液勝醍醐文潞公茂州倚郭一汶山外縣一汶川郡號通化冉駹汶山茂林汶川南㑹鐵豹州沿革秦地井鬼之分禹貢梁州職方雍州之域秦冉駹國漢武開置汶山郡地節罷屬蜀郡東漢靈帝復汶山郡梁置繩州及北部郡後周改汶山汶川郡隋廢郡改蜀州尋改㑹州大業曰汶山郡唐武徳曰㑹州尋加南字貞觀改茂州屬劒南道天寶曰通化郡沿革表縣沿革汶山本漢汶山郡汶江湔氏三縣地郡廢屬蜀郡東漢復置郡及汶山縣晉置廣陽郡省汶山梁置百部郡隋仁夀改廣陽曰汶山為郡治唐置茂州汶川本漢綿虒廣柔二縣地初屬汶山尋𨽻蜀郡東漢以廣柔屬汶山郡晉省綿虒後廢廣柔後周置汶川縣隋屬汶山郡唐屬茂州同上形勝汶山即禹貢岷山也在列鵞村江水出焉汶江出岷山為大江玉壘山在汶山縣東玉輪山玉輪江在縣北石鏡山在汶山縣龍泉山在汶山縣南有龍湫龍溪水引入城内居民汲飲五福泉在州治五味山出五味子鐵豹嶺即岷山輿地紀勝集雪嶺防秋急繩橋戰勝遲杜甫茂州有繩橋編竹繩為之暮倚高樓對雪峯僧來不語自鳴鐘孤城返照紅將歛近市浮烟翠且濃同上本朝熈寧九年即汶川縣治置威戎軍使沿革表矧石紐大禹之}
