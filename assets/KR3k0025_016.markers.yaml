  - {type: variant, offset: 251, length: 1, content: 豈, WYG: 朔立萬安州天寶曰萬安郡至徳改萬全郡屬嶺南五代地入南漢沿革表縣沿革萬寧本漢紫具縣地唐貞觀置萬安富雲博遼三縣屬瓊州後屬崖州龍朔萬安州治此開元省治陵水至徳改萬安曰萬全貞元復故名又自陵水徙治焉本朝改今名陵水本漢臨振縣地隋大業治縣唐初屬振州後來屬開元為州治後復遷沿革表形勝南山靈山聲山在陵水金仙水在萬寧北金牛嶺在城西北赤龍山在萬安東南清溪水在萬寧縣北獨洲山在城東南雙女石在城南輿地紀勝本朝熈寧六年改為萬安軍改萬全縣為萬寧省富陽博遼二縣入焉七年省陵水縣入萬寧元豐復置紹興五年廢軍屬瓊州十三年復置沿革表集萬安無市井斗水寛百憂天低瘴雲重地薄海氣浮東坡吉陽軍倚郭一寧逺郡號延徳寧逺朱崖臨振軍沿革星土同瓊州漢朱崖郡及臨振縣隋大業置臨振郡唐武徳改振州寧逺郡天寶曰延徳郡屬嶺南五代地入南漢地理沿革表縣沿革寧逺縣隋大業分臨振郡置縣屬珠崖郡尋割屬臨振郡又置延徳臨川二縣唐貞觀分寧逺置吉陽縣永徽分吉陽置洛屯縣並屬振州治寧逺本朝並省入寧逺沿革表形勝育黎山育黎水落島山落猿水皆在寧逺軍石船在南嶺之南石盤去城十三里可坐十客黎峩山臨川水藤橋水皆在吉陽縣澄島山見寰宇記輿地紀勝人物皇朝裴瑑晉公之十四代孫趙丞相為作家譜陳中孚及}
