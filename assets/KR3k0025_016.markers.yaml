  - {type: variant, offset: 1513, length: 2, content: 美也, WYG: 消乳川與雪山相連花崖山在保寧北蒲溪橋在保寧東駱駝山在保寧西牛犂山平谷水後谷水皆在保寧北輿地紀勝集窻含西嶺千秋雪門泊東呉萬里船杜詩本朝景祐三年以京遞發維州文書誤至維因改名威州沿革表隆州倚郭一外縣三仁夀井研貴平籍縣郡號仁夀南隆仙井陵井隆山州沿革秦地井鬼之分禹貢梁州職方雍州之域秦屬蜀郡漢屬犍為郡武陽縣晉置西城戍梁置懐仁郡後周置陵州隋大業置陵山郡唐武徳復陵州天寶曰仁夀郡沿革表縣沿革仁夀本漢武陽縣之東境晉置西城戍梁置懐仁郡西魏以西戍置晉寧縣周置州治焉隋開皇廢郡改晉寧曰仁夀大業置隆山郡唐為陵州治井研本漢武陽縣治東晉置西陽郡西魏置蒲亭縣隋改井研縣開皇析置始建縣屬陵州貴平本漢蜀郡廣都縣地西魏置和仁郡及貴平平井可曇三縣周廢可曇平井隋廢郡貴平縣自和仁城移治鹿川大業省籍縣入焉屬陵州籍縣本漢武陽縣地後周置籍縣隋省入貴平唐永徽復置沿革表形勝前距漢嘉後距廣都棟牛鞞在其東鼎鼻崌崍在其西隆山志大小龍淵沙色如金東嵎西嵎山相對郡治居其中麟山龜山鳳山皆在井研佛岩山在仁夀呂公洞在井研其地號呂村玉屏山在城西玉淵池金倉山金萃山香雲山皆在仁夀紫雲洞在郡西仁夀水在本縣慈孝村在籍縣走龍山在貴平來鳳山在井研龍岩山去郡四十里龍臯水在二溪鎮輿地紀勝人物皇朝牟永鉦與賊王均戰死范雍官至樞宻使黃千陳祐李新元祐黨人馮時及其弟昕靖康皆以忠義死國俞汝礪張邦昌僣位掛衣冠去自號捫膝先生員與宗㑹虜使}
