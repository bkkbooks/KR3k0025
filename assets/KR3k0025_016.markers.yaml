  - {type: variant, offset: 246, length: 0, content: '', WYG: 在文昌五指山在臨髙七星山在瓊山紫具蒼錫山在文昌輿地紀勝人物皇朝姜唐佐従東坡學陳孚従宋公貫之學郡人得進士出身自孚始杜介之真純野逸有隠士風王進慶事母至孝同上本朝開寶五年廢舊崖州以舎城澄邁文昌三縣來屬熈寧省舎城入瓊山大觀三年以樂㑹縣屬萬安軍尋復故政和元年升靖海軍節度沿革表集適従瓊管魚龍窟秀出羊城翰墨場蒼海何曽斷地脉白袍端合破天荒東坡贈姜唐佐瓊崖千里環海底民夷錯居古相蒙方壺蓬萊此别宮峻靈獨立秀且雄為帝守寶甚嚴恭東坡昌化軍倚郭一外縣二宜倫昌化感恩郡號儋耳宜倫毗耶昭山倫江南崖軍沿革星土同瓊州漢武置儋耳郡梁屬崖州隋珠崖郡治大業分置儋耳郡唐武徳立儋州天寶改昌化郡屬嶺南五代地入南漢沿革表縣沿革宜倫本漢儋耳郡地隋義倫縣為珠崖郡治唐武徳置儋州本朝廢為縣昌化本漢至來縣地隋大業置昌化縣屬珠崖郡唐武徳來屬貞觀析置吉安縣乾元省之感恩本漢九說儋耳二縣地隋大業改今名又置毗善縣並屬珠崖郡唐武徳來屬更毗善曰富羅乾元立洛場縣南漢省富羅本朝並省入感恩沿革表形勝昭山在宜倫明山二石如人形號兄弟石乳泉在天慶觀東坡有賦相泉趙相所鑿徳義山黎曉山黎毗山皆在宜倫黎虞山在感恩黎母山黎粉山見寰宇記輿地紀勝人物皇朝王霄以貢士住辟雍王公輔曉天文東坡甚重之同上本朝太平興國改義倫縣曰宜倫省洛場縣熈寧六年降儋州為昌化軍省昌化縣入宜倫又省感恩縣元豐復置二縣紹興五年廢軍入瓊州十三年復置沿革表集竒峰望黎母何異松與邙飛泉㵼萬仞舞鶴雙低昂芋魁儻可飽}
