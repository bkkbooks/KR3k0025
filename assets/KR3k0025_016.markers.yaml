  - {type: variant, offset: 1510, length: 2, content: 瑞非, WYG: 寶曰維州郡後沒於吐蕃太和中守將悉怛謀以州歸李徳裕受之為牛僧儒所沮復棄之大中三年杜悰收復沿革表縣沿革保寧本冉駹地隋開皇討羗以其地置薛城戍大業沒於羗唐武徳置維州自姜維故城徙治此及置薛城鹽城縣永徽省鹽城後改薛曰保寧通化本漢廣柔縣地周置石門鎮隋開皇置金川縣後改通化屬汶山郡後廢唐咸亨置小封縣後復今名初屬茂州後屬維州沿革表形勝雪山在保寧縣西南積雪}
