  - {type: variant, offset: 102, length: 1, content: 上, WYG: 定川及置岩川𨽻焉改牢州永淳置黨州撫康善勞善文寧仁安寧懐義福陽古符八縣尋割仁安以下四縣立平琴州至徳更仁安曰容山後廢平琴入黨州省善文寧仁福陽古符四縣本朝並省入南流興業本陳石南郡隋廢為縣屬欝林郡蕭銑併置興徳縣唐觀石南屬貴州麟徳置欝州於此又析置興業潭栗縣及欝林興徳屬焉乾封徙置欝林縣建中省石南入興業徙州治焉又省潭栗愽白本漢合浦縣地隋置南昌縣屬合浦郡唐析置南州愽白周羅建寧三縣治愽白縣尋改白州後以南昌來屬本朝併省入􅀶白沿革表形勝凝霧山飛雲山紫陽岩緑秀嶺陵青山愽白溪鳳飛山龍蟠山馬騎山皆在愽白縣萬石山在興業萬禄山在愽白東斗山在舊州東南斗山在舊州南銅鼓山在南流銅鼔潭在愽白五龍山在南流六熊山在愽白輿地紀勝本朝開寶五年省鬰林興徳入興業縣廢白州省周羅建寧南昌入愽白𨽻廉州七年復立白州廢牢黨二州省撫康善勞容山懐義定州宕川皆入南流來屬至道二年自興業徙州治南流政和廢白州後復置紹興又廢白州以縣來屬沿革表集日將先聖詩書教暫作文翁守鬰林楊叔賢南流底處所絳帳居尊嚴李鼎送髙補之漢令班南海蠻兵避鬰林天涯柱分界徼外貢輸金坐失姦臣意難明報國心一棺忠勇骨漂泊瘴江深温公馬伏波詩賀州倚郭一外縣二臨賀富川桂嶺郡號賀山賀水臨賀桂嶺臨慶州沿革星紀鶉尾之次秦屬南海郡漢屬蒼梧郡呉分立臨賀郡宋改臨慶國齊復臨賀郡隋廢郡為賀州大業廢屬始安郡唐武徳置賀州綏越郡天寶曰臨賀郡五代馬氏有之後入南漢沿革表縣沿革臨賀漢屬蒼梧郡又封陽縣呉以臨賀為郡治封陽屬焉隋立賀州大業廢屬始安郡省臨賀置綏越蕩山二縣尋皆省封陽屬蒼梧郡唐復臨賀縣為州治封陽來屬天寶置蕩山縣本朝並入臨賀富川漢屬蒼梧郡又馮乗縣地隋富川屬賀州始安郡馮乘屬零陵郡唐武徳二縣來屬天寶改富川曰富永後復故桂嶺本漢臨賀縣地呉置建興縣屬臨賀郡晉改興安隋更今名屬熈平郡唐武徳來屬沿革表形勝橘山在臨賀桂山在桂嶺龍溪山在富川龍門灘至州城八里白雲山碧雲岩仙溪水靈溪水皆在富川錫溪水在臨賀銀殿山在富川甑山州西髙千餘丈臨賀嶺五嶺之一也輿地紀勝人物皇朝毛温交冦竊發温以主簿紏土豪戰勝挫賊毛士毅為石城令李接反士毅戰死毛塤居䘮毁瘠十年}
