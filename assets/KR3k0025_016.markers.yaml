  - {type: variant, offset: 244, length: 1, content: 尺, WYG: 賀州初𨽻廣東大觀改𨽻西路開寶四年省封陽蕩山縣入臨賀省馮乗入富川沿革表集賀州城西丹甑山一亭摇挿紫雲間龍墀讓䇿名猶在鶴馭臨風去不還郭祥正羽客朝元地遺壇古樹中煉成丹竈在騎去鶴巢空陶弼瓊州倚郭一外縣四瓊山澄邁文昌臨髙樂㑹靖海軍節度郡號曽口靖海瓊山容瓊州沿革牛女之分南裔蠻夷之地漢珠崖郡地武帝置珠崖儋耳二郡後皆廢東漢置珠崖縣屬合浦郡呉改珠崖郡晉廢之梁立崖州隋大業更珠崖郡唐初為崖州貞觀析置瓊州後廢又置天寶改瓊山郡屬嶺南五代地入南漢地理沿革表縣沿革瓊山本漢瑇瑁曋都二縣地隋置顔盧縣屬珠崖郡大業於曋都地置舎城縣唐武徳於舎城置崖州顔盧屬焉貞觀改顔城後於瑁瑇地置瓊山縣為郡州治析置甑口顔羅容瓊三縣開元省顔城貞觀省容瓊入瓊山屬崖州五代省甑口顔羅本朝廢崖州以縣來屬澄邁本漢茍中縣地隋大業置澄邁縣屬珠崖郡唐屬崖州文昌本漢紫具縣地唐武徳置平昌縣屬崖州貞觀更今名臨髙唐武徳分平昌縣置臨機縣屬崖州貞觀來屬開元更今名樂㑹唐顯慶初置屬瓊州沿革表形勝瓊山白玉乃奉化鄉二村名澄邁山在本縣毗耶山在臨髙隂陽山在樂㑹雲露山在瓊山西南三坑}
