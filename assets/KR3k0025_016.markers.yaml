  body:
  - {type: variant, offset: 1, length: 2, content: 不足, WYG: 閣鑑坐編管輿地紀勝本朝開寶四年省遂溪徐聞二縣入海康乾道復置徐聞紹興復置遂溪沿革表集百尺危樓四逺明人従鼇背戲滄溟乾坤到處皆在目山海何人更作經死誦憐忠愍生還喜子由荒祠連舊宅幾見白雲秋更說此州竒特事冦公歸後二蘇来梁山欽州倚郭一外縣一安逺靈山郡號寧越欽水安京欽江靈山南賓州沿革牽牛星紀之次古越地秦象郡地漢屬合浦郡宋分置宋夀郡梁兼置安州隋廢郡改安州曰欽州大業改寧越郡唐置欽州析置玉田南亭州貞觀州廢天寶曰寧越郡乾元曰欽州五代地入南漢沿革表縣沿革安逺本漢合浦縣地梁分宋夀郡置安京郡隋廢為縣屬欽州唐改保京縣本朝更今名靈山本漢合浦縣地宋置宋夀宋廣二郡隋廢宋廣為新化縣宋夀為欽江縣開皇改新化曰内亭又置南賔縣後又置遵化縣唐初治欽江武徳}
  - {type: page-break, offset: 1, content: '', id: KR3k0025_WYG_016-2b, image: WYG0930/WYG0930-0381b.png}
  - {type: page-break, offset: 1, content: '', id: KR3k0025_WYG_016-3a, image: WYG0930/WYG0930-0381c.png}
