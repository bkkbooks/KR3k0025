  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十六宋潘自牧撰郡縣部廣南西路雷州倚郭一外縣二海康遂溪徐聞郡號海康驚雷徐聞鐵把合州州沿革斗牛之分古越地秦屬象郡漢合浦郡徐聞縣地梁置合州後改南合州隋曰合州大業廢屬合浦郡唐武徳復南合州為徐聞郡貞觀改東合州又改雷州天寶曰海康郡屬嶺南道五代地入南漢沿革表縣沿革海康本漢徐聞縣地梁立南合州隋開皇置海康縣大業屬合浦郡唐復置州治此遂溪本漢徐聞縣地南齊置椹縣隋置鐵把縣後改椹縣曰椹川並屬合浦郡唐武徳屬南合州觀屬雷州後省二縣置遂溪縣徐聞漢初置縣齊改曰齊康縣置郡隋廢郡改縣曰隋康觀復漢置舊名沿革表形勝擎雷山在海康縣被雷震成水曰驚雷水思靈島在海烏蛇山在海康老鵶州抵瓊州界四里虎頭山英髙山徒㑹山螺岡鹿洲卵洲皆在海康輿地紀勝又雷州春夏多雷秋日則伏地中其形如彘人取而食之國史補人物皇朝呉國鑑為太廟齋郎蘇子由貶雷州為創一}
