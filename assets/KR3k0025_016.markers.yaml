  - {type: variant, offset: 257, length: 0, content: '', WYG: 獨上江亭望帝京鳥飛猶見半年程碧山也恐人歸去百匝千遭遶郡城李徳裕本朝開寶五年更曰崖州是謂新崖州省延徳臨川落屯三縣入焉熈寧六年降為珠崖軍省寧逺吉陽為臨川藤橋二縣後又置寧逺紹興五年廢郡屬瓊州十二年更置吉陽軍地理沿革表程途何啻一萬里户口都無二百家東坡且作白衣菩薩觀海邊孤絶補陀山夢裏分明見黎母生前定}
