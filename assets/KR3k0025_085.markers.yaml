  - {type: variant, offset: 1762, length: 0, content: '', WYG: 振響衆香馥以揚煙天台賦傍見精舍開長廊飯僧畢孟浩然野寺垂楊裏杜詩野寺殘僧少上方重閣晩百里見秋毫野寺江天豁杜林蘭若秋風晩更宿招提境金刹青楓外同上窕窈青蓮宇元微之寺之殿臺與城之樓交錯相輝綉于碧霄望之如崑閬間物劉賓客躋閣謁金像攀雲叩禪扄韋應物岧嶢青蓮界同上片雲生半壁萬壑遍千鐘劉長卿禪房空掩白雲中同上發地結青茅團圎抱空白山花落幽户中有忘機客柳詩南岳長老代宗名其居曰般舟道塲同上招提精舍梵宮祗園凈土並寺名白帖松日明金像苔龕響木魚司空圖林是㫋檀更無雜樹花惟薝蔔不嗅餘香王建僧居隨處好温飛卿郭裏雲山全占寺方雄飛何如一衲塵埃外日日香煙夜夜燈羅隠八功德水波動青蓮之池七寶香花光映黄金之地唐文粹蓮花天晝浮雲卷貝葉宮春好月停僧皎然詩本朝青松行盡到山門亂峰深處開方丈已能宴坐老山中何用聲名傳海上歐公詩踈鐘挾谷響悲梵入樵歌臨川滿院秋光濃欲滴老僧倚杖青松側只怪高聲喚不譍嗔人踏破蒼苔色㑹要僧寶磨詩又見坡詩注武宗㑹昌五年八月毁招提蘭若四萬餘區㑹要元和二年薛平奏諸請賜中條山蘭若額}
