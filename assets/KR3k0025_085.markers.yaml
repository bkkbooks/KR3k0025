  - {type: variant, offset: 3789, length: 0, content: '', WYG: 釋子彌天秀獨漢南來駱賓王其來也雲凝其去也風休韓文送令縱振錫如飛白玉輕劉賓客虛舟不繫物觀化遊江濱杖錫閒來徃無心到處禪並同上誰識徃來意孤雲長自閒劉長卿振錫而徃其心浩然權載之逺鶴無前侶孤雲寄太虛錢起縱雲孤鶴無留滯定恐煙霞不放囘方雄飛去住如雲鶴飄然不可留同上閒雲與孤鶴何天不可飛僧貫休九天飛錫四海浮盃王文席常住囘記縁化捨施史太后欲造大像使天下僧尼日出一錢以助其功通鑑武后傳記度一人出家勝起寶塔至於梵天唐𢎞明功德經為一切人之檀越經律集一毛之施白律勝因化愚慧刀攝慳劉賓客不住聲香味觸法布施故其福德若東南西北四維上下不可思量矣張珪諌表本朝尋山百衲敝過海一盃輕法照送無著師修造集清淮無波平如席欄柱傾扶半天赤火燒轉掃地平空突兀便髙三百尺影沉潭裏龍驚遁當晝無雲跨虛碧韓詩構樓架閣切星漢同上伐木輦土柳文披山伐木崇構法宇則地得其勝作精室不命而獻力不忻而薦貨並同上本朝曽遭刼滅壊今遇勝縁脩臨川閻浮提國中悉皆歡喜兠率陁天上如是粧嚴石敏若文與士夫交遊史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始而遁常重超以為一時之雋甚相知賞晉郄超傳支遁與名士孫綽李光許詢等築室東土與王羲之同志宴集於㑹稽山蘭亭晉書白居易致仕與香山僧如滿結香火社每肩輿徃來白衣自稱香山居士唐書傳記晉惠逺見廬峯清淨足以息心始住龍泉精舍刺史桓伊乃為逺於山東立房殿即東林也絶塵清俗之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢穎之南陽宗炳等凡百有二十三人並棄世遺榮依逺遊止高僧傳支遁在白馬寺與劉桑之等談莊子逍遥羣儒舊學莫不嘆伏高僧傳竺道生入廬山七年後止青園寺王𢎞范泰顔延之並挹敬風猷從之高僧傳逺法師送客過虎溪虎輒鳴號昔陶兀亮居栗里山南陸修靜亦有道之士逺師嘗送此二人與語道合不覺過之因相與大笑今世傳三笑圗廬山記謝靈運求入淨社師以心雜止之范甯在豫章師請入社范不能從廬山記社主逺法師逺師結白蓮社以書招陶淵明陶曰弟子惟嗜酒若許飲即徃矣逺許之遂造焉因勉令入社陶攅眉而去廬阜雜記劉遺民慕逺公名德欲白首同社廬山記十八賢傳雷次宗立館東林僧房之東與逺公同社宗炳入廬山築室與逺同社並同上集潮州有老僧號大顚頗聰明識道理實能外形骸以理自勝不為事物侵亂自以為難得因與徃來及祭神至海上遂造其廬及來袁州留衣服為别韓文文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志韓文送文暢序昔者桑門上首好與賢士大夫遊晉宋以來有道林道安逺法師休上人其所與遊則謝安石王逸少習鑿齒謝靈運鮑照之徒柳文藩維大臣文武豪士令縱未始不褰衣負業徃造其門下韓文他時若冩蘭亭㑹莫畫高僧支道林柳宗元作徹上人詩本朝白公在廬山與奏滿朗晦四禪師追逺宗雷之迹為人外之處類要支遁與謝公為山水之遊竺法師與王文度為死生之約同上王羲之在㑹稽聞支遁名未之信後遁還剡王詣遁觀其風力謂遁曰逍遥可得聞乎遁乃作數千言王遂披襟解帶留連不能已乃請住靈喜寺意存相近同上浮圗秘演與吾友石曼卿交最久亦能遺外世俗以節相交二人歡然無所間曼卿隠於酒秘演隠於浮屠皆竒男子也然喜為歌詩以自悟一時顯士皆願從其遊歐公秘演詩集惟儼學於佛而通儒術非賢士不妄交嘗曰吾不妄交人故能得天下士以此一時賢士多從其遊歐公惟儼文集序辨才老師退居龍井不復出入軾徃見之常出至風篁嶺左右驚曰逺公復過虎溪矣辨才笑曰杜子美不云乎與子成二老徃來亦風流東坡辨才老師詩前序佛者惠厪從歐陽公遊三十餘年公常稱之為聦明才智有學問者尤長於詩東坡厪上人詩集序為士大夫崇敬史沙門支遁于時風流勝貴莫不崇敬以為造微之功足參諸正始晉郄超傳傳記昔謝靈運恃才傲物少所推重一見逺公肅然心服及寺觀翻涅槃經因鑿為臺植白蓮池中名其臺曰翻經臺因號白蓮社廬山記慧逺法師碑謝靈運撰張野序同上姚興欽風德遠愈施桓𤣥震主不覺致恭同前社主逺法師傳逺公卒張野為序稱門人廬山記集歸到雙林親慧逺唐裴休詩嘗為逺公傳永懐塵外蹤孟浩然詩詩僧傳記僧晝字皎然工律詩嘗謁韋蘇州恐體不合乃於舟中作古體數十篇為贄韋公不稱賞明日冩舊製獻之韋大嗟嘆唐因話録集人言澄觀乃詩豪一座競吟詩句新韓詩戰詩無與敵浩汗横戈鋋韓詩送靈師令縱釋氏之秀者又善為文藩維大臣文武豪士有尊行美德建功樹業令縱從而為之歌頌送令縱無本於為文身大不及膽送無本文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志解其裝得所叙詩累百餘篇非至篤好其何能致多如是耶送文暢序多生修律業外學得詩名張文昌詩思竹間得道心松下生本朝浮屠秘演喜為歌詩以自娛石曼卿尤稱秘演之作以為雄健有詩人之意歐公秘演詩集序惟儼雖學于佛而通儒術喜為辭章惟儼集序閒中用意歸詩筆臨川佛者惠厪從歐陽公游三十餘年公嘗稱之為聦明才智有學問者尤長於詩東坡厪上人詩集序清言氷玉質壊衲山水紋後山圓寂史佛圗澄卒𦵏後郭門吏報石季龍云見師攜一履西去季龍掲其墓唯見一履與一石趙録集識滅形全異凡死劉賓客燈續生前火爐添没後香錢起冩留行道影焚却坐禪身塔院關松雪經房鎖隙塵賈浪仙寶山枯龍移水涸呂温彌阿寺碑殘經窓下依然在劉文房寂寂靈塔滔滔逝川恒沙刼壊智月常圎李華碑宴坐示寂同上化縁既周跌坐報盡王僧碑飛鳥無跡去雷罷震獨孤及律師銘千載空雲去唐文粹烈烈英風横飛西土兩楹夢奠雙樹變色同上海山不是吾歸處歸即應歸兠率天白居易詩見太平廣記本朝佛圗澄欲使人辭石虎曰燄幻之軀化期已及見類要昔本無生今亦無滅東坡集隠如寒月堕清晝空有孤光留故躔瑩然牟尼歸眞于土霜顱隠白毫鎖骨埋青玉皆云似達摩隻履還天竺同上後魏二十八祖達摩端居而逝葬熊耳山起塔於定林寺後三嵗魏宋雲奉使西域廻遇師于葱嶺見手攜隻履翩翩獨遊雲問師曰西天去又謂雲曰汝王已厭世雲聞之芒然别師東還暨復命即明帝已登遐矣迨孝莊即位雲具奏其事帝令啟壙惟空棺一隻革履存焉舉朝為之驚嘆奉詔取遺履於少林寺供養景德傳燈録茶毗集薪盡火滅歸眞息煆梁簡文帝文身壊口不壊舌根如紅蓮白侍郎焚却坐禪身買浪仙本朝玉骨隨薪盡空留一分香臨川今年復扣門空房但颼飀云已滅無餘薪盡火不留東坡祭挽集緇素墜心棟梁落構李邕碑紹釋風於西域廻佛日於東維李白祭睿和尚師之度世以定以慧為醫藥師救療一切白傅集福智夀臈天下一人靈芝無根霜竹有筠師身是假師心是眞白傅集本朝欲向横堂一揮淚翻思月落不離天何正平尼史太宗崩武氏隨衆感業寺為尼通鑑唐髙宗永徽五年勅禁私度僧尼是歲天下尼一萬八千七百五十六後周世宗顯德二年傳記僧史略曰漢明帝既聽劉峻出家又聽洛陽婦女阿潘等出家此葢中國尼之始也事物紀原集大明和尚卒弟子尼無染命僧靈嶼為行狀凡塟大浮圖未嘗有比丘尼主碑事今無染實來涕涙以求無染韋氏女世顯貴柳文郭代公愛姫薛氏㓜嘗為尼白居易詩曰頭青眉眼細十四女沙彌步慵行道困起晩誦經遲應是仙人子小名仙人子花官未嫁時長慶集生來未掃眉身輕禮拜穏心慢記經遲王建集女釋者柳文起廢荅東晉何充始捨宅安尼此葢尼寺之起也事物紀原本朝盡出花鈿散寶津雲鬟齊剪向殘春貝葉乍翻疑軸錦􅆊音初學誤梁塵從兹艷質成空後湘浦都無解佩人詩話記纂淵海卷八十五}
