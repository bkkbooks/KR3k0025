  - {type: variant, offset: 1157, length: 0, content: '', WYG: 宋明帝紀集攝亂以定謝靈運作惠逺碑燈影照無睡心清聞妙香杜身猶縛禪寂禪翕只宴如苔蘚滿藤鞋荀鶴我心無我亦無君元微之禪僧偶向花前定滿樹狂風滿樹花蓮花舊是無波水莫逐狂風起浪心並同上苦海莫能漂刼火不能焚白樂天乘不退之輪證無生之觀白帖宻行傳人少禪心對虎閒劉長卿光明偏照智見獨存王維禪房空掩白雲飛劉文房禪心三界外宴坐天地中孟東野趺座簷前日焚香竹下煙王建老僧齋罷閉門睡不管波濤四面生羅隠久披山衲壊孤坐石牀寒文􅁐英華始覺禪門氣味長杜牧之本朝老僧獨得無生樂終日焚香坐結跏歐公集蘧蘧未必都非夢了了方知不落空坡詩靜故了羣動空故納萬境同上僧定端居不計年欒城詩蒲團布衲一藤床心地虛明睡自亡同上莫怪道人口掛壁桃花燕子自能禪語録參請傳記洞山云這裏合下得一轉語有一上座語九十六轉不愜師意傳燈錄百千法門同歸方寸河沙妙德總在心源守清禪師有僧問末後一句師曰塵中人自老天際月常明問如何是和尚家風曰一缾兼一鉢到處是生涯問佛法大意曰擾擾匆匆晨鷄暮鐘同上集四時長者頻叅白露之溪三月蒲輪屢問梧桐之水庾信碑翼亮緇徒發揮元極陳子昻彫談全奥旨妙辯潄𤣥津駱賓王吾師雨花外杜詩欲離煩惱三千界不在禪宗八萬條元微之遍將死苦救人間今因為説無生死並同上所示廣大深迥非造次可諭韓文與顚師書由其内者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之稱道要莫不悽欷欣踴如獲赦宥柳文傳佛與心元臣碩老稽首受教髮童齒毁踴躍執役並同上一言頓悟不踐初地五師相承授以寶噐劉賓客以智月開瞽法鼓破聾李華塔紀以心傳心天地不知唐蔣防文問者廓然自得佛味盧肇所至之邦被蒙法味權載之凡一燈所傳一雨所潤入法界者不可勝書同上本朝却為叅禪買得癡臨川禪指未終千偈子坡詩為公分作無盡燈照破十方昬闇鎖巉巉玉為骨凜凜霜入齒法師自有衣中珠不用辛苦泥沙底萬象入我牟尼珠機鋒不可觸千偈如翻水憑師為作鐵門限準備人間請話人並同上修行傳記晉沙門惠逺於廬山集一時名士高僧㑹於般若臺精舍立誓同修凈行俱為佛國之遊本傳廬山記云因號曰白蓮社集遣十纒之繫縳袪五惑之塵滓江總文室空無侍者巾屨唯掛壁一飯不願餘跏趺便終夕柳詩四祖數十年中脅不至席圭峯禪詮超悟傳記虛幻非實身喻芭蕉之形明徹無瑕心學琉璃之地白帖超大塵之境獨步迦羅㑹一乘之旨隨機化物聖教序五藴皆空諸漏已盡高僧傳手提諸佛直指本來面目諸方尊宿無能出其右𫝊燈録永嘉𤣥覽禪師初謁六祖問荅相契便欲辭去祖留一宿覺同上集遂掲無生之筌而時超有漏之句顓潔道行受蓮華經經極翻三心滅不二形妄縁盡歸眞化冥陳子昻湛心觀心煉性見性李邕四禪合真如一切是虛假孟浩然傳千燈于智種了萬法於眞空李白崇法寺文眞機澄天光獨朗謝垢氣李白已窮佛根源韓送文暢詩外形骸以理自勝不為事物侵亂韓文生而未始來殁而未始徃柳文脩最上乘解第一義無體空折色之迹而造乎眞源通假有借無之名而入於實相永州寺記脱去穢累超詣覺路同上性眞悟幻泡行潔離塵滓白侍郎心中眼觀心外相只有觧脱門能度衆苦厄以無相為心地以不二為法門契心則離於文字得意則假於筌蹄悟本生不滅之義證心地無相之宗㧞有漏之身超無量之法並同上心臺照耀百千燈白贈宗宻上人詩一悟寂為樂此生閒有餘王維五藴本空六塵非有於多刼來植衆德本於般若力坐菩提家心主自在萬有皆如頂法眞空一乘不立並同上中止水外浮雲權載之嘗欲出健羡遺名聲不使塵機世想滑湣靈府同上情超五濁志悟三明劉禹錫求法不二解空第一逹無量義轉不退輪李嶠碑我無生滅隨世縁李華碑萬縁盡空一切不動李適之禪師法顯碑光陰難駐跡如客許用晦心火自生還自滅元微之因知萬法刼盡與浮雲}
