  - {type: variant, offset: 1720, length: 0, content: '', WYG: 大歴十年傳記後魏太祖時僧法果卒贈老夀將軍諡趙胡靈公此僧賜諡之始也事物紀原僧賜紫史大唐三年僧惠崇賜紫袈裟代宗實録傳記僧史略曰則天朝僧法朗等賜紫袈裟僧之賜紫自天后始事物紀原集愛僧不愛紫衣僧鄭谷詩論法集大千入毫髪李太白説十善法為小乘説四諦法為中乘説十二因縁法為大乘白居易與清法師書未悟病時須去病已知空後莫依空白戒生定定生慧慧生八萬四千法門同}
  - {type: page-break, offset: 1720, content: '', id: KR3k0025_WYG_085-18b, image: WYG0932/WYG0932-0567d.png}
  - {type: variant, offset: 1720, length: 0, content: '', krp: 大歴十年傳記後魏太祖時僧法果卒贈老夀將軍諡趙胡靈公此僧賜諡之始也事物紀原僧賜紫史大唐三年僧惠崇賜紫袈裟代宗實録傳記僧史略曰則天朝僧法朗等賜紫袈裟僧之賜紫自天后始事物紀原集愛僧不愛紫衣僧鄭谷詩論法集大千入毫髪李太白説十善法為小乘説四諦法為中乘説十二因縁法為大乘白居易與清法師書未悟病時須去病已知空後莫依空白戒生定定生慧慧生八萬四千法門同}
  - {type: variant, offset: 1721, length: 0, content: '', WYG: 百千聞法咸蒙離垢億萬同㑹俱證無生李華浮圗之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不遂困窮之謂慈劉賓客其道以無為為有以空洞為實以廣大不蕩為歸柳文性海吾鄉也法界吾宇也戒為之墉惠為之戸以守則固以居則安動無不虛靜無不為生而未始來殁而未始徃也同上度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也權載之文桑門之患有二焉未得之患為外見所雜}
  - {type: page-break, offset: 1721, content: '', id: KR3k0025_WYG_085-19a, image: WYG0932/WYG0932-0568a.png}
  - {type: variant, offset: 1721, length: 0, content: '', krp: 百千聞法咸蒙離垢億萬同㑹俱證無生李華浮圗之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不遂困窮之謂慈劉賓客其道以無為為有以空洞為實以廣大不蕩為歸柳文性海吾鄉也法界吾宇也戒為之墉惠為之戸以守則固以居則安動無不虛靜無不為生而未始來殁而未始徃也同上度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也權載之文桑門之患有二焉未得之患為外見所雜}
  - {type: variant, offset: 1722, length: 2, content: 詔宗, WYG: 得之患為内見所縳十二因縁之中生死循環憂悲藴聚非大聖以利刃斷之慈航濟之則淪胥顚没之不給矣同上積苦為海舉足見溺積邪為山舉足見礙文粹本朝震雷霆之法皷聾俗知驚整日月之慈燈幽途識曉類要笑謂西來意雖空亦不空臨川文萬事都從刼火燒同上童子畫沙已具佛智維摩無語猶步二門東坡若造法界本造於心則雖凡夫皆具此理外道壊法如刀截空壊者既妄護者亦空論道無大小雖至於大菩薩其視如來猶若水淵然及其以無所故而得則承蜩意鉤毁瓦畫墁未有不與如來同者也爾以捨來我以慈受各獲其心寶訓誰有}
  - {type: page-break, offset: 1722, content: '', id: KR3k0025_WYG_085-19b, image: WYG0932/WYG0932-0568b.png}
  - {type: variant, offset: 1722, length: 2, content: 詔宗, krp: 得之患為内見所縳十二因縁之中生死循環憂悲藴聚非大聖以利刃斷之慈航濟之則淪胥顚没之不給矣同上積苦為海舉足見溺積邪為山舉足見礙文粹本朝震雷霆之法皷聾俗知驚整日月之慈燈幽途識曉類要笑謂西來意雖空亦不空臨川文萬事都從刼火燒同上童子畫沙已具佛智維摩無語猶步二門東坡若造法界本造於心則雖凡夫皆具此理外道壊法如刀截空壊者既妄護者亦空論道無大小雖至於大菩薩其視如來猶若水淵然及其以無所故而得則承蜩意鉤毁瓦畫墁未有不與如來同者也爾以捨來我以慈受各獲其心寶訓誰有}
  - {type: variant, offset: 1725, length: 8, content: 群臣襲封剌史左庶, WYG: 空無有獨設一榻空毗邪城奔走竭蹙二士共談心説妙法彈指千掲了無所説有言皆幻無起不滅問我何為鏤氷雕雪佛以一口而説千法千佛千口則為幾説我法不然非千非一如百千燈共炤一室各雖徧滿不相壊雜世人視身如金玉不旋踵為糞土至人反是予以是知一切法以愛故常壊以捨故常在學者以成佛為難乎累土畫沙童}
  - {type: page-break, offset: 1725, content: '', id: KR3k0025_WYG_085-20a, image: WYG0932/WYG0932-0568c.png}
