  - {type: variant, offset: 294, length: 216, content: 交管子白心篇史定姒薨不殯于廟無襯不虞匠慶謂季文子曰子為正卿而小君之喪不成君長誰受其咎左襄四晉傳傁曰雖克鄭猶有知在憂未文也左襄三言晉知氏將為難夫勢在人臣之位而有高天下之名竊為足下危之前漢蒯通傳蕭何不治垣屋曰令後世賢師吾儉不賢毌為勢家所奪前漢本傳竇長君竇廣國賜田宅封公昆弟家於長安絳侯灌將軍曰吾屬不死命且縣此兩人兩人所出微不可不為擇師傳賓客又復效呂氏大事也於是選士之有節行者與居竇長君少君由此為退讓君子不敢以尊貴驕人史外戚世家雋不疑名重, WYG: 議}
