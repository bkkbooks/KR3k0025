  - {type: variant, offset: 1116, length: 0, content: '', WYG: 據法座講大覺凡在瞻聽塵蔽俱開梁武天監八年支道林許椽共在㑹稽支為法師許為都講支通一義四座莫不厭心許送一難衆人莫不忭舞世説傳記以智慧刀裂煩惱網金光明經以智慧劒破煩惱宅維摩經聽聞妙法如飲甘露本淨禪師曰若欲求佛即心是佛若欲㑹道無心是道傳燈録集能令梵志達亦使羣魔驚梁元帝聽講詩以智慧火燒煩惱薪陳徐陵長干寺碑仗智慧劒破煩惱軍盧藏用説法動海岳遊方化公卿微言注百川亹亹信可聴一風皷羣有萬籟各自鳴李白黄金獅子承高座白玉麈尾談重𤣥同上登法席居講坐緇素觀聽天龍圍繞揺麈尾而析理風生弄象鼻而吐辭河注震雷霆之法皷聾俗知驚整日月之慈燈幽途識曉崔法雄碑抉開生育眼擺去煩惱塵燭以智慧日灑之甘露津千界一時度萬快無與隣白傅集口藏宣傳十二部同上開善誘之門方便之力白帖拯苦海之沉溺救火宅之燒焚啟覺路之緘縢發空門之扄鐍並同上髙筵談柄一麾拂講}
  - {type: page-break, offset: 1116, content: '', id: KR3k0025_WYG_085-9a, image: WYG0932/WYG0932-0563a.png}
