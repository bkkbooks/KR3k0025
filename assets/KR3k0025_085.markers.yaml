  - {type: variant, offset: 1746, length: 0, content: '', WYG: 如蠟印空假使人刺血為墨剥膚為紙即滅如筆畫水畫水不若文石印蠟不若字金其功不朽其義甚深故吾謂石經功德契如來付嘱之心白傅集法之至莫尚乎般若經之大莫極乎湼槃柳文本朝釋迦以文教其譯於中國必託於儒之能言者然後傳逺故大乘諸經至楞嚴則委曲精盡勝好獨出者以房融筆授故也坡詩僧寺史後趙石勒奉佛國人爭造寺廟通鑑時佛教盛於洛陽中國沙門之自外域來者三千餘人魏主别為之立永明寺千餘間以處之北及延昌州郡共有一萬三千餘寺梁武帝天監八年魏世宗作瑶光寺胡太后又作永寧寺皆在宮側又作石窟寺於伊闕口皆極土木之美而永寧尤盛佛殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也天監十五年元魏自正光以後寺有三萬餘區梁高祖魚朝㤙奏以所賜莊為章敬寺以資章敬太后冥福唐代宗天歴二年吐突承瓘領功德使盛修}
