  - {type: variant, offset: 584, length: 0, content: '', WYG: 縁草廬入定行止依頭陀之法住持逺聲利之嫌裴休元和尚碑講法則金蓮冬敷頓錫則靈泉湧溢李華徑山碑晉宋尚法故為碑者多法梁尚禪故碑多禪法不周施禪不大行而律存焉故近世碑多律柳宗元道源生之善根宿植深嗜法語忘甘露之味脩最上乘解第一義無體空折色之跡而造乎真源通假有借無之名而入於實相並同上燈前便是觀心處元微之心超幾地行無處雲到何天住有期頓見佛光身上出已蒙衣内綴牟尼同上八部天人入道塲劉賓客慕道遵壊削之儀同上同翻貝葉文劉長卿逺岳廻飛錫空門卧白雲山僧獨住山中老惟有寒松見少年作梵連松韻焚香入桂叢惟將舊瓶鉢却寄白雲中花門午時飯雲外青山鐘滿腹萬餘卷息機三十年身隨敝履經殘雪手綻寒衣入舊山獨向清溪依樹下空留白日在人間老鶴無衰貎寒松有本心並同上秖恐為僧心不了為僧得了盡輸僧杜荀鶴童子為僧今白首暗鋤心地種閒情時將舊衲添新線披坐披行過一生同上韓愈貶潮州浮圗之士歡快獨師憤起求序以資適潮不顧險毒皇甫湜自翻貝葉偈人施福果衣姚少監上人從儒至道從道至釋如歴星月以得白日若棄扇翣而洒清}
