  - {type: variant, offset: 1321, length: 394, content: 玄虛使中原淪於胡羯今東宮復爾江南亦將為戎乎通鑑梁高祖淮南長鯨雖云授首襄陽短狐未全革面通鑑梁高祖齊顯祖嗜酒成疾不復能食自知不能久謂李后曰人生必有死何足致惜但憐正道尚幼人將奪之耳又謂常山王演曰奪則任汝慎勿殺也通鑑梁高祖北齊王晞曰人王恩私何由可保萬一披猖求退無地非不好作要官但思之爛熟耳通鑑陳世祖齊左丞斛律金長子光為大將軍次子羨及孫封侯顯貴者甚眾門中一皇后二太子妃三公主事齊三世貴寵無比然金不以為喜嘗謂光曰我雖不讀書聞古來外戚鮮有能保其族者女若有寵為諸貴所嫉無寵為天子所憎我家宜以勳勞致富貴何必藉女寵也通鑑陳紀蘇威少有令名周晉公護強以女妻之威見護專權恐禍及己屏居山寺以諷讀為娛通鑑陳紀隋蔡王智積有五男止教讀論語孝經恐諸子有才能以致禍也同前人主誠能見可欲則思知足將興繕則思知止處高危則思謙降臨滿盈則思挹損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫, WYG: ''}
