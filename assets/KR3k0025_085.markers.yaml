  - {type: variant, offset: 1739, length: 5, content: 古今事殊恐, WYG: 易乎受記得道如菩薩大弟子皆不任問疾是義安在方其迷亂顚倒流浪苦海之中一念正眞萬法皆具及其厪苦為山九仞之後毫釐差失千刼不復竹中一滴曹溪水漲起西江十八灘未能轉千佛有主還須更有賓不如無鏡自無塵並同上論經傳記經卷雖小佛口所説續高僧説集具葉傳金口駱賓王以正義度無邊以圎教垂無窮莫尊於妙法蓮花經凡六萬九千五百言證無生忍造不二門住不可思議觧脫莫極於維摩詰經凡二萬七千九十二言攝四生九類入無餘湼槃實無得度者莫先於金剛般若波羅宻經凡五千二百八十七言壊罪集福凈一切惡者莫急於佛頂尊勝陀羅尼經凡三千二十言應念順願生極樂土莫疾於阿彌陀經凡一千八百言用正見觀眞相莫出於觀音普賢菩薩行法經凡六千九百九十言詮自性本覺莫便於實相法宻經凡三千一百五十言空法塵依佛智莫過於般若波羅宻多心經凡二百五十八言是八種經共十二部合一十一萬六千八百五十七言三乘之要指萬佛之秘藏盡矣佛湼槃後世界空虛惟是經與衆生俱設有人書貝葉上藏檀龕中非堅}
