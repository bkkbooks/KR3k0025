  - {type: variant, offset: 1117, length: 0, content: '', WYG: 聽徒如醉醒劉賓客十方傳句偈八部㑹壇塲外道邪山千萬重眞言一掃盡摧鋒並同上講席邀談柄孟浩然詩觀中人滿坐觀外後至無地無由聽韓愈華山女詩一雨普沾於衆縁萬籟各吹於本分張説之晉逺法師作念佛三昧詠大勸于時其後天台顗大師著凈土十疑論𢎞宣其教周密微妙迷者咸頼焉柳文龍興寺記由其内者聞大師之言律義莫不震動悼懼如聽誓命由其外者聞大師之言道要莫不悽欷欣踴如獲赦宥同上釋第一義開不二門}
