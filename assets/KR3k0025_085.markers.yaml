  - {type: variant, offset: 2670, length: 1006, content: 故能無憂事至而憂無救於事通鑑同前互入儆戒鄭注求為鳳翔節度使請禮部員外郎韋溫為副使溫不可或曰拒之必為患溫曰擇禍莫若輕拒之止於遠貶從之有不測之禍卒辭之通鑑唐文宗度支以用度不足奏借富戶及胡商財物敕借其半鹽鐵轉運使高駢上言天下盜賊蠭起皆出於飢寒獨富戶胡商未耳乃止通鑑唐僖宗楊涉當為宰相與家人相泣謂其子凝式曰此吾家之不幸也必為汝累通鑑唐昭宗蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊讒間將興繕甲訓士非吾輩所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已通鑑後梁王互入保身崔琳盧從愿兩人有宰相望元宗欲相之數矣以族大恐附離者眾卒不用新唐書崔儼傳帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無他惟多藏金玉故也我死當衣以紙歛以瓦棺勿作石羊虎人馬惟刻石置陵前曰周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝通鑑周太祖集圖匱於豐防儉於逸潘岳籍田賦留作功成身退地劉禹錫本朝李宸妃薨呂夷簡為相請厚葬之章獻怒公曰陛下不以劉氏為念臣不敢言尚念劉氏喪禮宜從厚呂夷簡行狀大書文字隄防老剩買田園准備閑倦游錄初議貶蔡確新州范忠宣謂呂汲公曰此路荊棘已七八十年吾輩開之恐自不免聞見錄有非常之功聖人之所甚懼也雖有大功而不忘戒懼東坡士燮論經知周乎萬物易繫辭子知者無不知也當務之為急孟盡心下知者之舉事也滿則慮嗛平則慮險安則慮危曲重其豫猶恐及禍是以百舉而不陷也荀子智慮足以待百變同上智者明於事達於數荀大略智慮者禍福之門戶不可不謹也神者智之役神清則智明智者心之符智公則心平並文子史祭仲以智免左傳互入保身燕師長驅平齊田單走安平令其宗人盡斷其車軸末而傳鐵籠已而燕軍攻安平城破齊人走爭塗以轊折車敗為燕所虜唯田單宗人以鐵籠故得脫史本傳秦樗里子多智秦人號曰智囊史記秦之敗也豪傑爭取金玉任氏獨窖倉粟楚漢相距滎陽民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富西漢貨殖傳呂氏時事多故然平竟自脫以榮名終非知謀孰能當此者史陳平世家晁厝號曰智囊師古曰言其一身所有皆是智筭西漢陳平智有餘西漢魯恭父康有權數號智囊後漢魯恭傳智略謀慮朝之淵藪後漢伏湛傳互入謀畫胡廣慮無失策舉無失事後漢本傳遠無所不見慮無所不周通鑑漢獻紀元文都謂盧楚等曰今讎恥未雪而兵力不足若赦李密罪使擊宇文化及兩賊自鬭吾徐承其弊化及既破密兵亦疲其將士利吾官賞易可離間并密亦可擒也通鑑唐高祖李密致書于唐高祖請步騎會河內太宗曰若不與是生一隋唐書李密傳房元齡每陳事千里猶對面語唐書本傳裴度歷事四朝不遺廟筭, WYG: 浮屠}
