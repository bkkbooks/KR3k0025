  - {type: variant, offset: 1118, length: 9, content: 晏外弟尉氏阮孝緒亦, WYG: 維集談𤣥漸入微闕本朝法師説法臨泗州無數天花隨麈尾坡詩揮麈空山亂石聽同上戒律傳記精進持淨戒猶如護明珠法華經受諸飲食當如服藥勿生増減如蜂採花但取其味不損色香教戒經律師持戒自縛𫝊燈録集閑邪以律謝靈運作惠逺碑守律䕶戒燕公集戒月如珠獨潔麒麟之行燕公集究律藏持範之軌峻僧法集止之儀裴休碑戒得長天秋月明心如水上青蓮色李太白得徑入大道乘此不退轉白侍郎恩愛捨骨肉飲食斷腥膻同上八戒堅持用戒脩心白帖未及超於解脱且當攝於威儀同上脩整觀行尊嚴法容以儀範於後學者以為持律之宗焉柳文嗚呼無得而脩故念為實相不取於法故律為大乘壊衣不飾揣食不味覆薦取役凡出於生物者擯而勿用不自}
