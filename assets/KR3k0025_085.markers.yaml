  - {type: variant, offset: 2389, length: 280, content: 寵過則生姦不早為之恐成後患又曰君不密則失臣願陛下密之通鑑張嘉貞不營家產有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之後適足為無賴子孫酒色之資吾不取之同上上召子儀還京師朔方將士樂子儀之寬憚光弼之嚴張用濟與諸將謀以精銳突入東京逐光弼請子儀康元寶曰君以兵請郭公朝廷必疑郭公諷君為之是破其家也郭公百口何負於君乎用濟乃止通鑑唐肅宗郭子儀每見賓客姬妾不離側盧杞嘗往問疾子儀悉屏侍妾獨隱几而待之或問其故子儀曰杞貌醜而心險婦人輩見之必笑它日杞得志吾族無類矣通鑑唐德宗夫以匹夫愛其子猶知求明哲之師而教之況萬乘之嗣繫四海之命乎通鑑唐憲宗憂先於, WYG: 統宋文帝紀祝髪}
