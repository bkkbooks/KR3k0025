  - {type: variant, offset: 849, length: 261, content: 國魏文互入保身李豐年十七八已有清名海內翕然稱之其父太僕恢不願其然故使閉門斷客通鑑魏高貴鄉公曹冏曰末大必折尾大不掉尾同於體猶或不從況非體之尾其可掉哉通鑑晉武欲使羊祜臥護諸將祜曰取吳不必臣行但既平之後當勞聖慮耳通監晉紀初何曾侍武帝宴退謂諸子曰主上開刱大業吾每宴見未嘗聞經國遠圖及身而已後嗣其殆乎汝輩猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎通鑑晉懷紀王猛寢疾堅親至猛第訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣沒之後願勿以晉為圖鮮卑西羌我之仇敵終為人患宜漸除之通鑑晉文紀謝瞻見弟晦門巷填隘曰勢傾朝廷豈門戶之福耶, WYG: 百卷}
