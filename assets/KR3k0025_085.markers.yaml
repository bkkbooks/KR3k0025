  - {type: variant, offset: 583, length: 0, content: '', WYG: 寺院非勅額者悉廢之禁私度僧尼是嵗天下見僧四萬二千四百四十四周世宗顯徳二年傳記晉道安受業於佛圖澄澄姓帛氏以師莫過於佛遂以釋為姓類記事始四姓為沙門皆稱釋種增一阿含經沙門有三坐禪為上輩助衆為下輩無為經僧曰苾芻本是草名有五義一生不背日二冬夏常青三體性柔軟四香氣逺騰五引蔓旁布為佛弟子理義亦然其精至者號為沙門尊勝經百尺竿頭須進步十方世界是全身傳燈錄後漢明帝遣蔡愔等天竺訪僧見摩騰乃要還漢地此中國有僧之始史略曰明帝聴陽城侯劉峻等出家此又中國人為僧之始事物紀原集法輪明智日慧海度慈航梁昭明太子詩戒珠靡鐵忍鎧無違智燈含影慧駕馳騑梁簡文帝慧日低輪下禪枝而返照法雲凝葢浮定水以涵光駱賓王燒葉成香早得熏修之漸拂花為供都忘染著之疑崔融懐素律師碑擯俗捨家投簪落采衣屏繒纊食惟菰麥同上惟有牟尼珠可照濁水源杜戒珠如水獨潔麒麟之行法寶如山普聞獅子之吼燕公集梵旅時出寺杜禪師都未知名姓始覺空門氣味長同上願將功德水從此灌塵機孟浩然法雨晴飛去天花晝下來同上百千萬刼菩提種八十三年功德林八十三歲若不乘持僧行苦將何得荅佛恩深慈悲不瞬諸天眼清淨無塵幾地心每歲入關家九度戒律慇懃一戒重千金白傅集以無為為心地以不二為法門口藏宣傳十二部心臺照耀百千燈以眞如不二之宗助清淨得一之化蓮花法藏心懸悟貝葉經文手自書蓄為道粹掲作僧豪道塲半夜香花冷猶在佛前禮佛名並同上錫杖}
