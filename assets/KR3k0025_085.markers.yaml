  - {type: variant, offset: 3680, length: 3, content: 耿純率, WYG: 投簮落髪委命受業廬山記集行行入幽荒甌駱從祝髪選景陽雜詩慕道尊壊削之儀劉賓客西晉已上不許中國削髪石苻亂華乃弛厥禁事物紀原本朝覆以慚愧之衣落其煩惱之髪見類要住持集緇徒擁膝迦孟浩然居室方丈名聞大千劉賓客方丈了無塵元微之涖法㑹主僧盟白傅集本朝領䄂萬僧坡詩結夏傳記夏時長養之節恐傷折草木踐履生蟲故九十日安居念道荆楚歲時記四月十五日乃法王禁足之晨釋子䕶生之日僧尼結夏又謂之結制解夏又謂之解制同上本朝休夏巾鉼誰與共欒城集浮屠史魏作永寧寺有金像高丈八尺者一如中人者十玉像二為九層浮圖掘地築臺下及黄泉浮圗高九十丈上刹復高十丈每夜靜鈴鐸聲聞十里通鑑梁武帝天監十五年同泰寺浮屠災上曰此魔也冝廣為法事遂起十二層浮屠同上中大同元年集半雲躋寶塔時望盡京華坐覺諸天近空香逐落花孟浩然無憂王之建塔天輒雨花法􅁐珠林本朝魏明帝時於道東造周閭百舍名為官浮屠精舍見類要高僧傳曰康僧㑹赤烏十年至建鄴孫權使求舍利旣得之即為造塔晉帝過江更修飾之此葢中國造塔之始也事物紀原洛下齊城丹陽㑹稽並有阿育王塔類要佛滅後鐵輪王一旦夜役鬼神造八萬四千塔合檢齋供史楚王英奉黄縑白紈贖罪詔還贖以助伊蒲塞桑門之盛饌通鑑東漢明帝紀竟陵王子良篤好釋氏招致名僧講論佛法親為衆僧賦食行水齊武永明二年高力士作寶夀寺鐘成作齋以慶之唐𤣥}
