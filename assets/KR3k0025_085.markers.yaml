  - {type: variant, offset: 585, length: 0, content: '', WYG: 歐陽行周寂寂方丈内瑩然虛白門千燈智慧心片玉清羸顔同上登滿足地超究竟天王建法向空林說心隨寶地平王建欲結三天社初降十地魔許用晦心出是非外跡辭榮辱中禪心空已寂世路任為岐到院客長見閉關人不知寺喧聽講絶厨逺送齋遲並同上水月通禪觀魚龍聽梵聲錢起獨樹月中鶴孤舟雲外人榮華長指幻衰病久觀身張承告師步有雲隨師情惟鶴知方雄飛讀盡龍王宮裏書劉禹錫善師了逹無牽束竹徑生苔晝掩門方雄飛佛不逺人即心}
