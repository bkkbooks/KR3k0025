  - {type: variant, offset: 169, length: 10, content: 枚皋終軍等並在左右每, WYG: 識之異類傳大鵬彌乎天隅張華賦大鵬栖形遐逺賈彪賦序如雲之翼如山之形海運水擊扶摇上征阮脩賛大鵬從南來衆鳥皆戢戢習鑿齒脱鬐鬛於海島張羽毛於天門制渤海之春流晞扶桑之朝暾激三千以崛起向九萬而迅征背若泰山之崔嵬翼舉長雲之縱横噴氣則六合生雲灑毛則千里飛雪大鵬一日同風起扶摇直上九萬里大鵬飛兮振八裔李白圖南未可料變化有鯤鵬風翮九霄鵬鵬圖仍矯翼丹極上鯤鵬杜詩鯤鵬相摩崒兩舉决一噉韓集君為得風鵬白居易本朝胡為釋南海復駕垂天雄來依鵬背負青山東坡鵠子鵠不日浴而白莊子千嵗之鵠隨時而鳴能登於木色純白腦盡成骨抱朴子史齊王使淳于髠獻鵠於楚道飛其鵠徒揭空籠以見楚王曰齊王使臣獻鵠不忍鵠渴出而飲之飛去吾欲刺腹絞頸而絶恐人議吾君以鳥故}
