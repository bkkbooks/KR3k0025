  - {type: variant, offset: 5232, length: 0, content: '', krp: 鵠生百年而紅五百年而黄又五百年而蒼又五百年而白壽三千嵗矣述異記集寧與黄鵠比翼乎黄鵠之一舉兮睹山川之紆曲再舉兮見天地之圓方楚詞黄鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳自顧薄徳兮愧爾嘉祥武帝黄鵠歌黄鵠摩天極髙飛魏武樂府其中有鴻儔鵠侣蜀都賦本朝黄鵠製金衣翩翩能逺飛擇侣共棲息終年脩羽儀朝下玉池飲暮宿霜桐枝徘徊且垂翼㑹有秋風時六一集一夜心逐南飛鵠水光兼竹静時有獨立鵠固應千頃池養此一雙鵠東坡鶴經鳴鶴在隂其子和之易鶴鳴于九臯詩狄人伐衞衞懿公好鶴鶴有乘軒者將戰國人授甲者皆曰使鶴鶴實有禄位余焉能戰左傳子鶴脛雖長斷之則悲莊子史嵇紹昻昂然若野鶴之在雞羣成都王穎以陸機參大將軍事孟玖譖機有異志穎大怒使孫秀收機機嘆曰華亭鶴唳豈可得聞乎遂遇害於軍中晉書庾域母好鶴唳域營求不怠一旦雙鶴來下論者以為孝感所致梁書天寶中華隂郡奏白鶴見於西嶽五福峯至徳中肅宗降誕之辰有白鶴飛舞於殿宇唐書傳記鶴善鳴鳥集韻鶴知夜半春秋説題辭立夏清風至而鶴鳴易通卦驗西海之外有鶴國人壽三百嵗日行千里如飛神異經白鶴性警白露降即鳴風土記鶴陽鳥也禀金火之氣以生三年頂赤七年善飛又七年十二時鳴六十年藂毛生泥不能汚一百六十年雌雄相視而孕一千六百年不食而胎生仙人之騏驥也其相以長頸脩竦則善鳴龜背鼈腹則能舞鶴經衡山紫盖峯清天明景輒有雙鶴逥翔其上荆州記榮陽郡有蘭岩常有雙鶴日夕偶影翔集傳云昔夫婦俱隱化成此鶴神異記青田有一雙白鶴年年生一子長大便去唯父母常在永嘉郡記鶴者是九轉還丹使茅君傳𤣥鶴者知音樂之節黄帝習崑崙以舞衆神𤣥鶴二八翔其右孫氏瑞應圖周昭王時塗脩國獻丹鶴拾遺記天子至於巨蒐獻白鶴之血以飲穆天子傳陶侃丁母艱在墓下有二客來弔儀形鮮異遣看之但見雙鶴飛去别傳衛濟川養六鶴日以粥飯啖之三年識字濟川檢書皆使鶴銜取之無差金城記蘇仙公仙去後有白鶴來止城樓人或彈之鶴以爪攫樓板書云城郭雖是人民非三百甲子一來歸吾是蘇君彈何為廣記僧支道林好鶴有遺其雙鶴者林乃鍛其翮鶴反顧視之如似懊䘮意林曰既有凌雲之姿何肯為人作耳目近翫乎養令翮成而放去之世説彭淵材嘗蓄兩鶴客至誇曰凡禽卵生此禽胎生語未畢園丁報曰鶴夜産一卵淵材呵曰敢謗鶴耶俄頃展頸伏地忽誕一卵淵材嘆曰鶴亦敗道吾乃為劉禹錫嘉話所誤墨客揮犀鶴曰仙客談苑集鍾浮曠之艷質抱清逥之明心睛含丹而星耀頂凝紫而煙華引圓吭之纎婉頓脩趾之洪姱疊霜毛而弄影振玉羽而臨霞唳清響於丹墀舞飛容於金閣始連軒以鳯蹌終宛轉而龍躍入衞國而乘軒出吳都而傾市鮑昭賦借問盧耽鶴西飛幾嵗還黄鶴振玉羽獨立窺浮雲其心在寥廓獨鶴思凌厲冥鶴吟清唳李白出塵皆野鶴老鶴萬里心歸美遼東鶴摩霄鶴數羣翩蹮山頂鶴王喬鶴不羣仙鶴下人間獨立霜毛整杜詩鶴鳴楚山靜栁集鶴有不羣者飛飛在野田餓不啄腐䑕渴不飲盗泉白居易秋霄一滴露聲聞林外天元禎正憐標格出華亭况是昂藏入相經韓偓本朝林逋隠孤山蓄兩鶴常泛小艇逰西湖客至則一童子開籠縱鶴良久逋必棹小船而歸盖常以鶴飛為驗也筆談上霄降靈氣鍾此千年禽頡頏紫霄垠飄颻滄浪潯岳湛有仙姿鈞韶無俗音毛滋月華淡頂粹霞光深獨翅聳瓊枝羣舞傾瑶林髙材自喜凌雲格俗耳誰思警露聲六一集明公真愛鶴相鶴選仙骨遂令千里姿為君軒墀物劉貢父况有能言老令威猶將緇布緑深衣東坡其續搜神記遼東城門華表柱忽有一白鶴集上人或欲射之鶴空中歌曰有鳥有鳥丁令威去家千里今來歸城郭如故人民非何不學仙塜纍纍鶴閒雲作氅園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨予豈欲應對如鵩乎我生如寄良畸孤三尺長頸闊瘦軀俛啄少許便有餘何並以身為子娛驅之堂上立須臾投以餅餌視若無戛然長鳴乃下趨難進易退我不如時夜將半四顧寂寥忽有孤鶴横江東來𤣥裳縞衣戛然長鳴掠余舟而西也東坡風散又成千里去夜寒應上九天栖山谷孔雀史罽賔國出孔雀漢書西域條支國出孔雀續漢書文帝與朝臣詔曰前于窴王所上孔雀尾萬枚文采五色以為金根車盖遥望耀人眼魏志世祖時西域獻孔雀解人語彈指應聲起舞晉書公卿賛龜兹國地多孔雀後魏書射孔雀屏唐書詳見皇后類傳記火離為孔雀元命苞南方多孔鳥山海經郭璞曰孔雀也義寜縣杜山多孔雀止以音影相接便有孕南越志雲南郡出孔雀常以二月來翔月餘而去華陽國志孔雀其大如鴈而足髙毛皆有斑文采拍手則舞孔雀自背及尾皆作圓文五色頭戴三毛長寸以為冠足有距迎晨則鳴相和異物志孔雀人指其尾則舞交州異物志交趾郡人多養孔雀或遺人以為口腹或殺之以為脯腊採其金翠毛裝為扇拂或生截其尾以為方物云生取則金翠之色不减耳嶺南異物志孔雀自喜其尾而甚妬凡欲山栖必先擇其置尾之地然後止焉山谷夷民烹而食之解百毒土人取其尾者持刀於叢篁幽隱之處伺其過急斷其尾若囬首一顧金翠無復光彩矣紀聞孔雀有九徳一顔貌端正二音聲清徹三行歩庠序四知時而行五飲食知節六常念知足七不分散八少媱九知反覆佛以此喻比丘之行儀也曽一經孔君平指楊梅示楊脩曰此君家果脩曰未聞孔雀是夫子家禽金樓子詳見楊梅類集孔盖兮翠旌楚辭戴脩尾之翹翹若順風而揚麾鍾㑹賦孔雀未知牛有角渴飲黄泉逄觝觸赤霄𤣥圃湏往來翠尾金花不辭辱杜詩項毳落殘碧尾花銷暗金白居易穆穆鸞鳯友何年來止兹翠色髙獨聳金華煥相差韓集本朝置從南海桄榔林籠入西川鸚鵡地聳觀翕翼脩尾張鱗鱗團花金縷翠一身燦爛文章多引聲笙竽柰老何梅聖俞翡翠經鄭子臧好聚鷸冠左傳史尉佗獻文帝翠鳥千頭漢書薛琮上䟽曰日南逺致翡翠充備寶玩異志傳記翠鷸也爾雅神靈滋液則翠羽曜孝經援神契翡翠青赤雀也説文翠鳥似燕翡赤而翠青其羽可以為飾異物志翡翠出九真頸黒腹下赤青縹色交州記集孔盖兮翠旌楚辭拾翠羽洛神賦翡翠戲蘭苕容色更相鮮文選翠雀鷸鳥越在南海羽不供用肉不足宰懷璧其罪賈害以采郭璞旖旎光首飾葳㽔爛錦衾翠羽生南海陳子昂翡翠黄金縷綉成歌舞衣李白翡翠鳴衣珩越裳翡翠無消息江上小堂巢翡翠竹髙鳴翡翠或看翡翠蘭苕上杜詩鸚鵡經鸚鵡能言不離飛鳥記子鸚鵡能言而不可使長官是得其所言不得其所以言淮南子史漢獻帝詔曰往者益州獻鸚鵡三枚夜食三升麻子今穀價騰貴此鳥無益有損可付西將軍楊定國令歸本土漢書南平王鑠上赤鸚鵡詔羣臣為賦袁淑作賦畢賫以示謝莊莊賦亦竟淑見而嘆曰江東無我卿當獨秀我若無卿亦一時傑也沈約宋書宋大明三年婆皇國獻赤白鸚鵡梁天監元年交州獻能歌鸚鵡南史杜正𤣥舉秀才㑹林邑獻白鸚鵡楊素促召作賦援筆立成隋書貞觀中陀洹國王獻白鸚鵡頭上有紅毛數十垂與翅齊并五色鸚鵡各一𤣥宗有五色鸚鵡能言上命左右試牽御衣鳥輒瞋目叱咤唐書傳記黄山有鳥焉其狀如鶚青羽赤喙人舌能言名曰鸚鵡鸚鵡慧鳥栖林啄蘂山海經扶南東漲海中有洲出五色鸚鵡曽見其白者如母鷄廣志有鸚鵡飛集山中禽獸輒相愛重後山中大火鸚鵡入水沾羽飛而洒之天神嘉感即為滅火宣驗記張華有一白鸚鵡華每行還鳥輒説僮使善惡公後在外令喚鸚鵡曰昨夜夢惡不出户公猶强之至庭為鸇所搏教其啄鸇脚僅而獲免異苑開元中嶺南獻白鸚鵡上及貴妃皆呼雪衣女以近代詞臣詩篇授之數遍便能諷誦一日忽語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎果為鷹所斃上命瘞於苑中呼為鸚鵡塜明皇雜録明皇封鸚鵡為緑衣使者開元天寶遺事許漢陽舟行迷入一溪夾岸皆花苞忽一鸚鵡喚花開一聲花苞皆拆中有美女長尺許能笑言廣異記集紺趾丹嘴緑毛翠衿體金精之妙質含火徳之明輝禰衡賦同朱咮之清音變緑衣於素綵王維賦紅腹赬足𤣥頷翠項相𤣥賦落羽辭金殿孤鳴托繡衣能言終見棄還向隴山飛李白香稻啄餘鸚鵡粒鸚鵡啄金桃鸚鵡含愁思聰明憶别離翠衿渾短盡紅嘴謾多知避籠交翠尾礪嘴净新毛杜詩身囚縁綵翠心苦為分明暮起歸巢思春多憶侶聲白居易養來鸚鵡嘴初紅宜在朱樓繡户中誰遣聰明好顔色事湏安置入深籠劉禹錫莫恨雕籠翠羽殘江南地暖隴西寒勸君不用分明語語得分明出轉難羅隱本朝蔡確貶新州侍兒名琵琶每扣響板鸚鵡傳呼其名琵琶卒後誤觸響板鸚鵡猶傳呼不已公悒悒不樂有詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸詩話黄冠黒距人語言有鳥玉衣尤皎㓗六一集鸚鵡才言便關鎖山谷玉鎖閑拘束金籠不自由梅聖俞鷹經維師尚父時維鷹揚詩仲春鷹化為鳩季夏鷹乃學習孟秋鳩化為鷹記如鷹鸇之逐鳥雀也爽鳩氏司㓂也注云爽鳩鷹也左傳史郅都為濟陽太守號為蒼鷹漢書吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰否如養鷹饑則為用飽則颺去布乃解魏志虞潭㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言晉書太宗初傳位舊苑中有籠鷹悉斷聮任去李大亮有佳鷹太宗遣使至使者諷令獻鷹大亮密表云陛下久絶田獵而使者求鷹若是陛下之意深乖昔㫖如其自擅便是任使非人太宗嘉歎賜之金壺唐書沙州節度使張義潮進甘峻山青骹鷹四聮舊唐書傳記瑶光星散為鷹春秋運斗樞金伐木故鷹擊雉春秋考異郵鷹鶆鳩郭璞注曰鶆當為鵷鷹隼醜其飛也翬爾雅鷹者鷙殺之鳥易通卦驗有雉鷹有兎鷹一嵗為黄二嵗為撫三嵗為青胡鷹獲麞出廬江廣志鷹棲茂樹候雀徃來焦贑易林楚文王好獵有人獻一鷹爪距神爽殊絶常鷹獵於雲夢俄而雲際有一物凝翔鮮白不辨其形鷹便竦翮而升矗若飛電湏臾羽墮如雪血下如雨有大鳥墮地度其兩翅大數十里衆莫能識時有博物君子曰此大鵬雛也幽明録李亮好逐雉兎其鷹有青翅黄眸青冥金距之屬西京雜記或問張元一曰蘇味道王方慶孰賢答曰蘇九月得霜鷹王十月被凍蠅僉載集疎尾闊臆髙鬐圓顱深目蛾眉狀似愁胡曲嘴短頸足若雙枯孫楚賦惟兹禽之化育實鍾山之所生資金方之猛氣擅火徳之炎精立如植木望似愁胡嘴同劒利脚等荆枯亦有白如散花赤如㸃血大文若錦細斑似纈眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圓如卵臆闊頸長筋麄脛短翅厚肉勁髀寛肉緩求之事用俱為絶伴魏彥深賦皓如練色斑若綵章積雪全映飛花碎㸃所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海雷擊飈逝觀其行時令順秋殺指揮應㨗顧盻餘雄當落鵬之賞蔑仇鷂之敵實稀代之尤也蘇頲雙白鷹賛八月秋風髙胡鷹白錦毛孤飛一片雪百里見秋毫何時騰風雲搏擊中所能胡鷹拂海翼翺翔鳴素秋李白代地有豪鷹生子毛盡赤金眸玉爪不凡才雲飛玉立盡清秋正翮摶風超紫塞􅑷身思狡兎側目似愁胡何當擊凡鳥毛血洒平蕪杜詩鷹翅疾如風鷹爪利如錐白居易雲披霧裂虹蜺斷霹靂掣電捎平岡砉然勁翮剪荆棘下攫狐兎騰蒼茫栁集緑玉嘴啗鷄腦破𤣥金爪擘兎心開都縁解搦生靈物所以人人道俊哉劉夢得本朝和魯公有觀畫鷹獵兎詩云雖是丹青物沉吟亦可傷君誇鷹眼疾我憫兎心忙豈動騷人興惟増獵客狂鮫綃百餘尺争及製衣裳范文正公曰真仁人之言也詩話劒翎鈎爪目如電利吻新淬龍泉鋒爾能搏兎不能食未飽中腸行復擊主人厭兎爾尚饑一生不悟為人役宛丘隼經公用射隼于髙墉之上易鴧彼飛隼詩傳記隼鷂屬也或謂之題肩春化為布穀者是也詩義疏隂陽氣貪故題肩擊春秋考異郵仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫陳惠公使以隼如仲尼之館問之仲尼曰隼之來也逺矣此肅慎氏之矢也國語鷙擊之鳥通呼曰隼文選注鵰經匪鶉匪鳶翰飛戾天注云鶉鵰也詩史秦王幹善弓馬以一箭而下雙鵰軍中號為落鵰都尉後魏書斛律光嘗從世宗校獵見一大鳥引弓射之旋轉至地乃大鵰也當時傳號落鵰都督北齊書後周長孫晟與突厥嘗共逰獵有二鵰飛而争肉晟乃彎弓一發而雙貫焉隋書傳記鷲黄頭赤目五色皆備一曰鵰説文舂山爰有青鵰執犬豕食鹿穆天子傳張九齡裴耀卿罷相李林甫處其中揚揚自得觀者竊謂一鵰挾兩兎明皇雜録裴延齡輕躁朝廷懼之嘗畫一鵰羣鳥噪之以獻上知衆怒益信之國史補集皂鵰寒始急杜詩本朝安得萬里沙晴天看射鵰山谷鶚經關關雎鳩疏云一名王睢一名雕鷞江東呼為鶚詩史鄒陽諌吳王曰臣聞鷙鳥累百不如一鶚漢書傳記鶚金喙鳥也見則天下兵能擊殺麞鹿倉頡解詁集鵰鶚在秋天鵰鶚乘時去鵰鶚離風塵杜詩關關黄金鶚大翅摇江煙下見盈尋魚投身避紅蓮劉夢得本朝清秋一鶚上拭目萬人看后山鷂史武徳初孫伏伽上表諫曰陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之弊風少年之事務太宗得鷂絶俊異私自臂之望見魏徵乃藏於懷徵奏事故久不已鷂竟死懷中楊徳幹為萬年令有宦官放鷂不避人禾稼徳幹擒而杖之悉㧞其鷂頭史興宗從獵苑中言晉州出佳鷂可捕取帝曰劉齊賢豈捕鷂人耶安得以此待之唐書傳記鷣負鵲注云鷣鷂也見爾雅魏公子無忌方食有鳩飛入案下一鷂在屋上飛公子乃縱鳩鷂逐而殺之公子曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛於是捕得鷂三百餘頭公子乃按劒至其籠上曰誰獲罪無忌耶一鷂獨低頭乃取殺之列士傳復論衡曰鷂有千數擊鳥飛去安可得哉或是捕鷂者折其頸也李亮好逐雉兎有從風鷂孤飛鷂西京雜記鷂子兩翅各有復翎左名撩風右名撩草帶雨翎出獵必當獲雜爼鶻史北齊文宣謂王思好曰爾擊賊如鶻入鴉羣北齊書元和四年囘紇遣使者請改為囘鶻義取囘旋輕健如鶻八年淄青節度使李師道進鶻十二命還之唐書傳記岐王有北山黄鶻賜名决雲兒開元天寶遺事集有鷙曰鶻者巢于長安薦福浮圖冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右易之旦則執而上浮圖之跂焉者縱之延其首以望極其所如住必背而去之焉茍東矣則是日也不東逐西南北亦然鳴呼孰謂爪吻毛翮之物而不為仁義器耶栁文隂崖有蒼鷹養子巢栢巔白蛇登其巢吞噬恣朝飱雄飛逺求食雌者鳴辛酸力强不可制黄口無半存其父從西歸翻身入長煙斯湏領徤鶻痛憤寄所宣斗上捩孤影噭哮來九天脩鱗脱逺枝巨顙折老拳髙空得蹭蹬短草辭蜿蜒折尾能一掉飽腸皆已穿生雖滅衆雛死亦垂千年物情有報復快意貴目前颯爽動秋鶻霜鶻不空拳杜義鶻行本朝獨愛孤棲鶻髙超百尺風横飛應自得逺颺似無貪墜翮逰霄漢無心顧雀鸇東坡依倚秋風氣象豪似思燕雀在蓬蒿不知羽翼青冥上腐䑕相隨勢亦髙王介甫鳶經鳶飛戾天詩前有塵埃則載鳴鳶記史蕭確嘗從侯景出獵見飛鳶景命射之莫能中確射之應弦而落梁書崔彭善射逹頭可汗遣使曰請得崔將軍一與相見遂遣之可汗召善射者數十人因擲肉於野以集鳶射之多不中彭連發數矢皆應弦而落隋書傳記鳶鳥醜其飛也翔爾雅馬援擊交趾下潦上霧毒氣上蒸仰視烏鳶跕跕墮水中東觀記永和九年吳郡獻白鳶晉中興書集鳶飛杳杳青雲裏鳶鳴蕭蕭風四起劉禹錫本朝瞻飛落海鳶六一集愁鳶蹲落景鳶貪聲最鄙東坡吟作飢鳶聲后山鴻經初六鴻漸于干六二鴻漸于磐九三鴻漸于陸六四鴻漸于木九五鴻漸于陵易鴻飛遵渚鴻飛遵陸詩孟春鴻鴈來季秋鴻鴈來賔前有車騎則載飛鴻記衞獻公戒孫文子寗惠子食日旰不召而射鴻於圃左傳子桓公曰寡人有仲父猶飛鴻之有羽翼也管子鴻飛冥冥弋人何慕焉揚子鴻不學飛飛則冲天蔣子鴻鵠之鷇羽翼未合而有四海之心尸子史陳渉曰燕雀安知鴻鵠之志哉史記傳記齊使獻鴻於楚鴻渴使者於道飲鴻而失之使者至楚曰臣欲亡去為兩使不通欲㧞頸而死將以吾君賤士貴鴻也楚王賢之韓詩外傳集淮南子云東歸碣石違溽暑也平子賦云南寓衡陽避祁寒也若其雅歩清音逺心髙韻鵷鸞已降罕見其儔而鍛翮墻隂偶影獨立唼喋秕稗鷄鶩為伍不亦傷乎盧思賦弋者何所慕髙飛仰冥鴻舉手指飛鴻此情難具論飛鴻辭北溟李白霜鴻有餘哀背若孤征鴻杜詩哀鴻鳴清耳韓集呌呌覊鴻哀天髙數鴻鳴杳杳歸鴻吟栁集本朝稻粱雖可戀吾志在冥鴻離鴻獨髙翔囘首羡南鴻翻鴻落浦晴六一集幽人隱几寂無語心在征鴻滅沒間人似秋鴻歸有信塞鴻正欲摩天去天静傷鴻猶戢翼東坡起看冥飛鴻乃在天宇空仰視雲空鴻鵠舉山谷鴈經雝雝鳴鴈詩季冬鴈北鄉記曹伯陽好田弋公孫疆獲白鴈獻之且言田弋之説左傳子昨日山中之木以不材得終其天年今日主人之鴈以不材死莊子夫鴈從風以愛氣力銜蘆而翔以備弋繳淮南子史蘇武在匈奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有繫帛書言武等在某澤中使者如其言單于大驚乃遣武還太始三年獲赤鴈作朱鴈之歌宣帝於西河築世宗廟告祀有五色鴈集殿前漢書皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入而問卿前在郡食鴈美乎後漢書隋將史萬嵗從梁士彦軍次馮翊見羣鴈飛來萬嵗謂士彦曰請射行中第三者射之應弦而落北史朱漢賔射一飛鴈正中其臆臆上貫一金錢有篆文皆無識者人皆號為朱落鴈晉文貞元十年同州獻五色鴻唐書傳記凢䞇大夫用鴈鴈有行列故為䞇春秋繁露䞇用鴈者取隨時南北不失其節白虎通又説苑曰取其有長㓜之禮自關而東謂鴈􅕯鵝南楚之外謂之鵝或謂之倉􅕯方言梁州縣界有鴈塞山傳云此山有大池水鴈棲集之因名鴈塞梁州記沮陽縣西北有鴈浮山鴈南翔北歸徧經其上荆州圖記鴈門山鴈出其間在髙栁北山海經衡州有囬鴈峯鴈至此不過遇春而回衡陽志孔子之衛衛君與孔子語見飛鴈過而仰視之色不在孔子孔子乃逝家語集唼流牽弱藻斂翮帶餘霜沈約胡鴈飛鳴辭燕山昨發委羽朝度關客居煙波寄湘吳凌霜觸雪毛體枯鴈渡瀟湘煙雪照聚沙鴈白鴈從中來飛鳴苦難聞足繫一書札寄言嘆離羣離羣心斷絶一見花成雪李白落鴈浮寒水宿鴈起圓沙歸鴈喜青天邊秋一鴈聲君看隨陽鴈各有稻粱謀遥空秋鴈滅一聲何處送書鴈旋鴈上雲歸紫塞北鴈塞聲微九秋驚鴈序萬里衡陽鴈今春又北歸欲雪違胡地先花别楚雲孤鴈不飲啄飛鳴聲念羣誰憐一片影相失萬重雲杜詩去寒就暖識處所天長地闊棲息稀凌雲一舉君謂何韓集正是峯前回鴈時栁集戰蒲知鴈唼李義山仙掌月明孤影過長門燈暗幾聲來須知胡騎紛紛在豈逐春風一一迴杜牧本朝來時沙磧已氷霜飛過江南木葉黄水濶天低雲暗澹朔風吹起自成行陽城淀裏新來鴈趂伴南飛逐越船野岸栁黄霜正重五更驚破客愁眠夜聞歸鴈生鄉思嵗晩江湖同是客莫辭伴我更南飛六集一北鴈來南國依依似旅人縱横遭折翼感惻為霑巾衆禽自紛争野鴈獨閒潔先鳴獨鼓翅吹亂蘆花雪碧天無際鴈行髙鴻鴈破江雲萬里梧桐卷露一床銀我自飄零是覊客更堪秋晩送行人東坡落鴈帶邊聲山谷寧為寶筝柱肯作置書郵固違隂嶺雪不盡洞庭春市逺無矰繳年豐足稻粱中原有佳氣不必到衡陽後山鸎經黄鳥于飛集于灌木其鳴喈喈睍睆黄鳥載好其音春日載陽有鳴倉庚倉庚于飛熠燿其羽伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲綿蠻黄鳥詩仲春倉庚鳴記傳記離黄倉庚也鳴則蠶生説文黄麗留也或謂黄栗留幽州謂之黄鸎或謂之黄鳥一名倉庚一名商庚一名鵹黄一名楚雀齊人謂之摶黍關西謂之黄鳥此乃應節趣時之鳥或謂之黄袍詩義疏明皇於禁苑中見黄鳥呼為金衣公子開元天寶遺事戴顒春攜雙柑斗酒日往聴黄鸝聲此俗耳鍼砭詩腸鼓吹髙隱外書頃年有人取黄鸎雛養於竹籠中其雌雄繚繞飛鳴一投火中一觸籠而死剖腹視之其腸寸斷玉堂閒話每妬流鸎於綺叢廣記鸎聲巧作煙花主人贅録集宮鸎嬌欲醉上有好鳥相和鳴間關早得春風情千門萬户皆春聲新鸎飛繞上林苑願入簫韶雜鳳笙碧樹鳴黄鸝春風語流鸎黄鸝啄紫椹李白黄鳥喧嘉音囀枝黄鳥近鸎囀皇州春色䦨鸎歌暖正繁便覺鸎語太叮嚀兩箇黄鸝鳴翠栁豈有黄鸝歴翠微竟日鸎相和春日鸎啼脩竹裏隔葉黄鸝空好音花妥鸎梢蝶宮鸎罷囀春杜詩早晩飛來入錦城誰人教解百般鳴春風紅樹驚眠處似妬歌童作艷聲麥黄韻鸝鶊韓集不意忽有黄鸎鳴一聲夢斷楚江曲翻日迴度昆明飛凌風斜看細栁翥栁集欲囀不囀意自嬌羌兒弄笛曲未調前聲後聲不相及秦女學筝指猶澁韋應物曉睡朦朧百囀鸎温庭筠鸎啼如有淚為濕最髙花㑹與秦樓鳯俱聴漢苑鸎李義山本朝暖入鸎篁舌漸調喬木成隂百囀鸎六一集最好聲音最好聴似調歌舌更叮嚀髙枝抛過低枝立金羽脩眉黑染翎梅聖俞野花吹盡竹娟娟尚有黄鸝最可憐婭姹不知縁底事背人飛過北山前王介甫黄鳥懷好音秋菊染春衣黄鳥在幽谷韜光養羽儀晴風曜桃李言語自知時山谷曉寒顧影惜金衣著意聴時不肯啼飛入栁隂多處去數聲只許落花知誠齋燕經燕燕于飛差池其羽下上其音天命𤣥鳥降而生商詩仲春𤣥鳥至記猶燕之巢於幕上也𤣥鳥氏司分者也左傳子朱鳥翩翩歸而肆矣揚子史帝嚳少妃簡狄以春分日祠于髙禖有𤣥鳥遺卵簡狄吞之生契史記丞相薛宣對曰茂陵寢上巳日𤣥鳥來集吐所含大豆紫黒色翺翔殿上此降下永與天無極天下幸甚漢書襄陽衛敬瑜妻年十六敬瑜亡父母舅姑欲嫁之女截耳自誓所住户有燕巢常雙來去後忽孤飛女以紅縷繫燕足為誌後嵗此燕來猶帶前縷女為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛侯藻嘉其節題曰貞義衛婦之門南史傳記燕燕鳴也爾雅燕一名天女一名摰鳥古今注瑶光星散為燕春秋運斗樞溽泥為巢聲多稍小者漢燕陶隱居注本草云紫胷聲小者是越燕胷斑黑聲大者是胡燕其作巢喜長世説齊魯之間謂燕為乙作巢避戊巳𤣥中記云千嵗之燕户北向述異記云五百嵗燕生胡髯雜爼有娀氏有二佚女為九成之臺帝令燕往視之二女愛而爭摶之覆以玉筐少遲發而視之燕遺二卵北飛遂不反二女作歌曰燕往北實始為北音吕氏春秋昔魯人有浮海而失津者至於亶洲見仲尼及七十子使歸告魯侯築城以避冦魯人以狀告魯侯不信俄有羣燕數萬銜土培巢魯侯信之大城曲阜訖而齊㓂至不克而還崔江北凉録後魏元道康向月㣲吟忽聞巢燕呼康字云景怡康曰爾為禽而語何巢我屋燕曰我為上帝所罰暫為禽耳以卿盛徳故來相依窮怪録唐王謝居金陵航海遇風抵一洲見翁嫗皆皂服引至宫室見王坐大殿曰烏衣國也命以女妻之謝思歸王命取飛雲軒令謝入其中閉目少息已至其家但見梁上雙燕呢喃下視謝乃悟所至乃燕子國也廣記集袖中有短書願寄雙飛燕李陵玉樓朱閣不復棲金窓繡户長相見豈不戀華屋終愁謝珠簾李白江泥輕燕斜墻燕語留人嬌燕入簷回燕舞翠帷塵巢燕得泥忙頻來語燕定新巢秋燕已如客震雷翻幕燕雨燕集深條紫燕時翻翼旅食驚雙燕銜泥入此堂應同避燥濕且復過炎凉杜詩朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家劉夢得低飛緑岸和梅雨亂入紅樓揀杏梁閒几硯中窺水淺落花徑裏得泥香鄭谷本朝攝事初欣社燕迎六一集燕入華堂怪未歸東坡驚飛賀厦燕淮南子云大厦成而燕雀相賀處處定知秋後别年年長向社前逢行藏似欲追時節豈是人間不見容王介甫燕入風簾舞聊隨海燕度炎凉山谷捲簾通燕子窺簾燕哺雛老屋無僧燕作家畫樓著燕春風裏陳後山烏經莫黑匪烏瞻烏爰止于誰之屋具曰子聖誰知烏之雌雄弁彼鸒斯詩楚幕有烏左傳城上有烏同上子夫馴烏者斷其下翎則必待人而食焉得不馴乎韓子去隂就陽謂之陽烏鴻鴈是也純黒而反哺者謂之慈烏小而腹下白不反哺者謂之鴉白項而羣飛者謂之燕烏白脰烏也鴉烏鸒也孔叢子史朝夕烏詳見御史臺類吏食道旁烏攫其肉見太守類慕容冲之亂有羣烏數萬翔鳴于長安城上其聲甚悲不半年有甲兵入城之事晉書成公綏有孝烏每集其廬舍綏謂有反哺之徳以為祥禽西魏裴俠年七嵗不能言後於洛城西見羣烏舉手指之而言遂志識聰慧甚異常童北史栁仲郢每遷官羣烏大集於昇平里第庭樹㦸架皆滿凡五日而散詔下不復集唐書傳記鸒斯鴨鶋注云是烏也又曰鴉烏小而多聲腹下白爾雅瑶光星散為烏飛翔翮為陽陽氣仁故烏反哺春秋運斗樞愛其人者愛其屋上烏憎其人者惡其除胥太公六韜城上有烏自名破家焦贑易林晉文公焚林求介子推有白鴉遶煙而噪拾遺陽顔以純孝著聞後有羣烏銜皷集顔所居村烏口皆傷因立縣名烏傷王莽改為烏孝異苑支道林見王子猷兄弟還人問見諸王何如答曰見一羣白頸烏但聞喚啞啞聲世説魏伶為西市丞養一赤嘴烏每於衆中乞錢銜歸號魏丞烏朝野僉載集烏生八九子端坐秦氏桂樹間古樂府黄雲城邊烏欲棲歸飛啞啞枝上啼但見悲烏號古木雄飛雌從遶林間李白飢烏集城樓迎棹舞神鴉夜來歸烏盡啼殺後棲鴉野鴉無意緒鳴噪自紛紛丈人屋上烏烏好人亦好杜詩烏噪飢不啄韓集城上日出羣烏飛飛鴉争赴朝陽枝栁集百鳥豈無母爾獨哀怨深要是母慈重使爾悲不任慈烏復慈烏鳥中之曽參白居易本朝候館噪山鴉嵗熟鴉聲樂歸路栁暗藏嶠鴉六一集事將兆而獻忠人反謂爾多凶凶不本於爾爾又安能凶爾之不告兮凶豈能言説告而先知兮謂凶從爾出遭人唾罵於時不容復遭彈類驅逐西東梅聖俞爾之為禽兮何不髙翔而逺翥何為號呼于人兮告吉凶而逢怒范文正夕陽楓葉見翻鴉暮樹號寒鴉江風初凉睡正美樓上啼鴉呼我起孤雲落日西南望長羡飛鴉自識村東坡鵲經維鵲有巢維鳩居之鵲之疆疆防有鵲巢詩季冬鵲始巢烏鵲之巢可俯而窺也記子莊周逰乎雕陵之樊覩一異鵲自南方來感周之顙而集栗林莊子鵲巢知風之所起鴈北嚮鵲始加巢淮南子史徐羡之拜司空有雙鵲於太極殿東䲭尾鳴喚宋書奚永落與張子信對坐有鵲鳴於庭樹子信曰鵲言不善有口舌事今夜有喚必不得往至夜髙儼使召永落且云敕喚永落稱墮馬脚折遂免於難北齊書大歴八年乾陵上仙觀三尊殿有雙鵲銜柴及泥補葺殿之隙壞凡一十五處貞元四年中書省梧樹上有鵲以泥為巢唐書傳記鵲者陽烏先物而動先事而應見於風木之象易通卦騐鵲知太嵗之所在博物志云鵲巢皆背太嵗此非才智任自然耳淮南子曰鵲識嵗多風去喬木巢傍枝説文干鵲噪而行人至廣記鵲一名神女古今注崑山之旁以玉璞抵烏鵲塩鐵論章帝永寧元年條支國進鳷鵲髙七尺其國太平鳷鵲羣翔拾遺録鵲巢中必有棘崔圓相公妻於後園見二鵲構巢共銜一木安巢中俗言見鵲上梁必貴雜爼黎景逸居空青山有鵲巢其側後繫南康獄其鵲止於獄樓向景逸似傳語之狀其日傳有赦官司詰其由來云路逢衣素衿人所説三日赦至僉載集月明星稀烏鵲南飛遶樹三匝無枝可棲曹操五色雲間鵲飛鳴天上來李白今日烏鵲喜欲報凱歌歸門鵲晨光起杜詩鵲鳴聲楂楂家人祝喜鵲韓集本朝鮮鮮毛羽耀朝暉紅粉墻頭緑樹枝日暖風輕言語軟應將喜報主人知六一集月明驚鵲未安枝柯侯古循吏悃愊真無華仁心格異族兩鵲巢其衙但恨不能言相對空楂楂東坡雀經誰謂雀無角何以穿我屋詩雀入大水化為蛤記子一雀適羿羿必得之以天下為之籠則雀無所逃以隋侯之珠而弹千仭之雀莊子萬雀不能抵一鷹抱朴子史楊由少習易有大雀夜集庫樓上太守亷范以問由對曰郡内當有小兵後廣柔縣蠻夷反殺傷長吏後漢書潘岳初生有一雀止其母左肩占者咸言富貴之徵北史開元二十二年渝闗蟲食田稼蔓延入平州俄頃有羣雀来食此蟲一日食盡平州稼無傷者唐書傳記立夏雀子飛易通卦驗明珠弹雀貴不當也太𤣥經雀一名嘉賔古今注莊辛謂楚王曰夫雀仰棲茂樹鼓趐奮翼自以為無患不知夫公子王孫左挾弹右攝丸以加其頸也戰國策孔子見羅者所得雀皆黄口也孔子曰黄口盡得大雀獨不得何也羅者對曰黃口從大雀者不得大雀從黄口者得孔子顧謂弟子曰君子慎所從家語任城魏肇之初生有雀飛入其手占者以為封爵之祥異苑楊宣為河内太守行縣有羣雀鳴桑樹上宣曰前有覆車粟此雀相隨欲徃食行數里果有覆車粟益部耆舊傳集嗷嗷空城雀身計何戚促李白啅雀爭枝墜雀啄桞花黄黄雀飽野粟羣飛動荆榛籬雀暮喧繁杜詩乳雀飛簷楹韓集本朝低昻枝上雀摇蕩花間雨亂雀啅叢棘霜葉投空雀啅籬東坡雀喜宫成自相賀寒雀四顧驚風枝山谷百千寒雀下空庭小集梅梢話晩晴特地作團喧殺我忽然驚𣪚寂無聲誠齋鳩經宛彼鳴鳩詩仲春鷹化為鳩季春鳴鳩拂其羽記史管輅至郭恩家有飛鳩来在梁頭鳴甚輅曰當有老公從東方來候豚一頭酒一壺主人雖喜當有小故明日果有客如所占而射鷄作食箭從樹間繳中數嵗女子流血驚怖魏志傳記長安張氏有鳩自外入户内張氏祝之曰鳩為禍耶飛上承塵為福耶來入我懷鳩飛入懷以手探之得一金帶鉤焉自是之後子孫昌盛資財萬倍捜神記集白鳩之白誰與隣霜衣雪襟誠可珍首農政鳴陽春李白春鳩鳴不停鳩鳴暮求羣韓集本朝天將隂鳴鳩逐婦鳴中林鳩婦怒啼無好音天雨止鳩呼鳩婦鳴且喜婦不亟還呼不已逐之其去恨不早呼不肯來固其理斑然錦翼花簇簇雌雄相隨樂不足抱雛出卵翅羽成豈料一朝還反目人言嫁鷄逐鷄飛安知嫁鳩被鳩逐麥壠已深鳩喚雨春原洗新霽緑葉暗朝日鳴聲相呼知應荅如吹律誰言鳴鳩拙無用雄雌各自知隂晴六一集夣裏鳴鳩喚雨來東坡鴿傳記張九齡家養羣鴿每與親知書繫鴿足上飛徃投之目為飛奴開元天寳遺事集還見窓中鴿日暮遶庭飛韋蘇州本朝宗汝得一鴿性甚靈慧能致書於千里之外遯齋閒覧去年桞絮飛時節記得金籠放雪衣東坡雉經射雉一矢亡離為雉易髙宗祭成湯有飛雉升鼎耳而雊書序雄雉于飛泄泄其羽下上其音有鷕雉鳴雉鳴求其牡如翬斯飛雉之朝雊尚求其雌詩士執雉周禮雉曰䟽趾孟冬雉入大水為蜃禮記月令季冬雉雊禮記同上余子長矣能奉雉而從余矣五雉為五工正左傳山梁雌雉時哉時哉論語子澤雉十歩一飲百歩一啄不期蓄乎樊中荘子史鴻嘉二年有飛雉集於殿庭歴階升堂而雊漢書魯恭馴雉見知縣類管輅至王𢎞直語有雄雉飛來直令輅作卦輅曰五月必遷至期果為渤海太守魏志武庫封閉甚宻其中忽聞雉雊張華曰此必蛇化也開視之有蛇蛻焉晋書傳記鸕諸雉命雉􅀈雉青質玉色鷮雉長尾走耳鳴鳴雉闕雉似山雉而小冠秩秩海雉外雉而墨出海中山鸐山雉尾長赭色翰雉鵫雉今白鵫翰江亦名白雉爾雅周成王時越裳獻白雉孝經援神契孫休好射雉羣臣諫荅曰雖為小物耿介過人朕之所以好也語林集聿采毛之英麗兮有五色之名翬厲耿介之專心兮侈雄艶之姱姿鸎綺翼而􅀈撾灼綉頸而衮背摛朱冠之赩赫敷藻翰之陪鰓伊義鳥之應敵潘岳雉之飛于朝日羣雌孤雄意氣横出當東而西當啄而飛隨飛隨啄羣雌粥粥韓文雉朝飛操原頭火燒静兀兀野雉畏鷹出復没將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃隨傾斜將軍顧笑軍吏賀五色披離馬前墮雉帶箭麥隴青青二月時白雉朝飛挾兩雌錦衣綺翼何離縰牧犢採薪感之悲寕向草中耿介死不求黄金籠下生李白繡羽穿花他自得山雉迎舟楫杜詩本朝朝日飛雉雊東臯新雨餘六一集雄雉曳脩尾驚飛向日斜空中紛格鬬綵羽落如花東坡杜䳌傳記杜䳌一名巂周甌越間曰怨鳥爾雅注杜宇亦曰杜王自天而降稱蜀帝死化為鳥名曰杜䳌亦曰子規成都記􅀈䳏即杜鵑也姊歸子規别名也博物志江介曰子規啼苦則懸於樹自呼曰謝豹張華注杜䳌先鳴者吐血死嘗有人行山中見一羣寂然聊學其聲即死雜爼石誼未娶聞杜鵑聲嘆曰此物催人使歸使我何所歸邪金臺録集我見常再拜重是古帝魂生子百鳥巢百鳥不敢嗔仍為餧其子有若奉至尊萬事反覆何所無豈憶當殿羣臣趨杜詩豈思昔日居深宫嬪妃左右如花紅司空曙蜀魄千年尚怨誰羅鄴催歸日未西韓集本朝康節行洛陽天津橋聞杜宇聲嘆曰不及十年其有江南人以文字亂天下者乎聞見録夜入翆烟啼晝尋芳樹飛春山無限好猶道不如歸范文正鴛鴦經鴛鴦于飛畢之羅之鴛鴦在梁戢其左翼詩史文帝問占夢周宣曰吾夢殿屋兩瓦墮化為雙鴛鴦此何為也對曰後宫當有暴死者上曰吾詐卿耳宣曰夫夢意也茍以形言便占吉凶言未卒黄門令奏宫人相殺魏志傳記鴛鴦雌雄未嘗相離人得其一則一者相思死故謂之匹鳥古今注大夫韓憑一作朋其妻美宋康王奪之憑遂自殺妻與王共登臺自投臺下遺書於帶曰願以屍還韓氏而𦵏王怒令埋之二塜相對經宿忽有梓木生二塜上根下交枝上連其上有鳥如鴛鴦雌雄常棲其樹捜神記鴛鴦交頸變化論集鴛鴦兮噰噰楚辭客從逺方来遺我一端綺文彩雙鴛鴦裁為合歡被入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行古詩願作天池雙鴛鴦一朝飛去青雲山錦水東北流波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳寧同萬死碎錦翼不忍雲間兩分張李白風鴛藏近渚沙暖睡鴛鴦江檻俯鴛鴦杜詩盡日無人㸔㣲雨鴛鴦相對浴紅衣杜牧雌去雄飛萬里天雲羅滿眼淚澘然不須再結風波願鎻向金籠始兩全鴛鴦可羡頭俱白飛去飛来烟雨秋李義山俱来緑潭裏共向白雲涯音容相眷戀羽翼兩逶迤刷羽清江浦交頸紫山岑文章負竒色和鳴多好音陳子昻雙絲絹上為新様連理枝頭是故園翠浪萬囬同過影玉沙千處共棲痕煙濃共拂芭蕉雨浪細雙遊菡萏風皮日休本朝鴛鴦終日愛水鏡山谷無端一棹歸舟急驚起鴛鴦相背飛后山鸂鶒傳記鸂鶒水鳥毛有五彩色食短狐其在溪中無毒氣臨海異物志河南府伊闕縣前大溪有一雙鸂鶒見則僚佐有入臺者詳見監察御史類集一雙鸂鶒對沉浮鸂鶒雙雙舞故使籠寛織湏知動損毛㸔雲莫悵望失水甚呼號六翮曽經剪孤飛卒未髙且無鷹隼慮留滯莫辭勞杜詩鷗子海上之人有好鷗鳥者毎旦之海上從鷗鳥逰鷗鳥之至者數百徃而不止其父曰吾聞鷗鳥皆從汝逰汝取来吾玩之明日之海上鷗鳥舞而不下也列子傳記鷖鷗也生藕葉上名水鶚倉頡觧詁江鷗一名海鷗在漲海中隨潮上下頗知風雲若雙飛至岸必風漁人及渡海者皆以此為候南越志鷗之别類雙鳴喈喈隨潮徃来謂之信鷗海物志咸和二年饗萬國有五鷗集太極殿前晋起居注鳥中興徴祥說曰殿非鷗所處鷗湖澤也時蘇峻作亂宫室被焚集摇曳雙白鷗鳴飛滄江流宜與海人狎豈伊雲鶴儔寄影依沙月沿芳戲春洲吾亦洗心者忘機従爾逰海客無心随白鷗閒適白鷗去沙上自為羣李白清暉為羣鷗泛渚白鷗輕江渚翻鷗戯狎鷗輕白浪白鷗元水宿飄飄何所似天地一沙鷗春鷗洗翅呼野靜白鷗来輕摇逐浪鷗江浦寒鷗戲却思翻玉羽随意㸃春苗杜詩出門鷗鳥更相親栁集本朝夕陽洲渚逺惟見白鷗翻歐陽公險夷一節如金石勲徳俱髙映古今豈止忘機鷗鳥信陶鈞萬物本無心前人題韓魏公狎鷗亭江南野水碧於天中有白鷗閒似我鳴鷗本意願秋江唯有白鷗盟未寒山谷江鷗好羽毛玉雪無塵垢㓕没波浪間生涯亦何有王介甫觧記清波没白鷗白鷗没沒輕春水浩蕩滄溟没白鷗后山鷺經值其鷺羽值其鷺翿振鷺于飛于彼西雝振振鷺鷺于下詩史張融年弱冠道士陸脩静以白鷺羽扇遺之曰此異物奉異人南史傳記鷺舂鋤爾雅昻鷺一名舂鋤歩於淺水好自低故曰㫪鋤亦謂之獨舂一名属玉似鵁鶄三輔黄圗鷺水鳥好白而潔故謂之白鳥楚成王時有朱鷺合沓飛舞則復有赤色舊鼓吹曲有朱鷺是也詩義䟽有皎者鴼翩翩其飛穆天子傳吴王夫差時有雙鷺飛出鼓中而去古今樂録巴東有道士入屋燒香忽風雨至家人見一白鷺從屋中飛出雨止遂失道士所在幽㝠録集白鷺亦白非純貞外潔其色心匪仁闕五徳無司晨胡為啄我葭下之紫鱗白鷺閒時散飛去又如雪㸃青山雲白鷺拳一足月明秋水寒白鷺下秋水孤飛如墜霜李白宿鷺起圎沙鷺浴自晴川不須驚白鷺為伴宿青溪一行白鷺上青天杜詩白鷺兒最髙潔毛衣新成雪力不敵衆禽喧呼獨凝寂孤眠芊芊草乆立潺潺石前山正無雲飛去入遥碧劉夢得霜衣雪髮青玉嘴羣捕魚児溪影中驚起逺映碧山去一樹棃花落晩風杜牧閒立春塘烟澹澹静眠寒葦雨颼颼鄭谷不要向人誇潔白也知還有羡魚心羅隠本朝風格孤髙塵外物性情閒澹水邉身盡日獨行溪淺處青苔白石見纎鱗泛泛風波鳥雙雙弄紋羽愛之欲移舟漸近還飛去六一集貪㸔白鷺横秋浦何當禁畢弋㸔引雪衣兒東坡白鷺不禁塵土涴稲畦下白鷺山谷翹沙依折葦刷羽對衰荷浦思懸秋碧江情憶釣簑梅聖俞鸕鷀史倭國水多陸少以小環挂鸕鷀項令入水捕魚以充食隋書貞元十三年時雨未降上幸興慶宫龍堂祈禱忽有白鸕鷀沉浮水際俄然莫知所徃果大雨唐書傳記鶿鷧爾雅鸕鷀不生卵而孕雛於池澤間又鸕鷀生多者八九少者五六相連而出若系緒異物志鸕鷀口吐其雛廣韻嘗官於澧州公宇後有大木一株其上有鸕鷀十四窠日夕觀之既能交合兼有卵殻布地其色碧豈得雛吐口中是全未考尋可見常日聽人之誤言也本草衍義集鸕鷀西日照曬翅滿漁梁鸕鷀窺淺井門外鸕鷀乆不来沙頭忽見眠相猜自今已後知人意一日須来一百迴杜詩一般毛羽結羣飛兩岸烟汀好景時深水有魚銜得出㸔来却是鷺鷥飢杜荀鶴本朝鸕鷀宻伺魚蝦便山谷鳬經弋鳬與鴈鳬鷖在涇鳬鷖在沙鳬鷖在渚鳬鷖在淙鳬鷖在亹詩子鳬雖脛短續之則憂荘子史王喬雙鳬見知縣類人有得鳬鳥毛長二丈以示張華華曰此謂海鳬毛也出則天下亂晉書賀勝從太祖宴於昆明池時有雙鳬逰於池上太祖乃援弓矢授勝曰不見公射乆矣請以為觀勝射之一發俱中後周書傳記鶩野鳬也說文鳬翁濯顔注雲鳬水鳥翁頸上有毛急就章闔閭塜中有玉鳬塚墓記石首魚至秋化為冦鳬頭中有石吴録地理記化䝉縣祠山上有池池中有松鳬南越志鳬舞鼓翼嘉樂堯徳焦贑易林集將汜汜若水中之鳬與波上下偷以全吾軀乎楚辭冠緑葩以耀首綴素毛以㸃纓蔡淑鬬鳬賦二鳬俱北飛一鳬獨南翔李陵贈蘇武詩晨鳬失羣不足以喻疾蘇武與李陵詩雙鳬飛不為加少揚雄觧嘲天晴喜浴鳬沙上鳬雛傍母眠鳬鷖散亂棹謳發早鳬江檻底杜詩浴鳬翻雪羽杜牧江心咄咄鳬雛鳴張籍鴨經庶人之摯匹舒鳬翠記公膳日雙鷄饔人竊更之以鶩左傳史建昌侯孫慮於堂前作鬬鴨欄吴志齊王祐太宗第五子好飬鴨忽有野鴨入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人唐書傳記舒鳬鶩也爾雅鳬鶩鴨也廣雅海鴨大如常鴨斑白文亦謂之交鳥金樓子素嬰之鴨太元水戰之鴨何必白嬰蔡氏化清經武帝昇望月䑓南端有三青鴨飛下俄而化為三小童皆着青綺文襦各執鯨文大錢五枚置帝几前𤣥都翠水水中有鴨丹毛而輕毎止芙蕖上食朝露號升蕖鴨洞𡨕記司馬文王徴還至京師帝與左右小臣謀因文王辭劒之文王入帝方食粟優人雲午等唱曰青頭鷄青頭鷄者鴨也帝懼不敢發景王因是謀廢帝魏氏春秋}
  - {type: variant, offset: 5234, length: 0, content: '', WYG: 帝遣使求鬬鴨孫權曰彼在諒隂之中所求若此豈可與言禮哉江表傳周訪與商人共入宫亭廟宿明起如厠見一白頭翁逐之化為雄鴨還船欲煮之商人爭㸔遂飛去潯陽記李逺嗜緑頭鴨語林浮光多美鴨樊千里買百隻置後池載數車浮萍入池使為鴨作茵褥雲林異景志集唼喋争食􅗒褷𢃄雛李邕賦花鴨無泥滓堦前每緩行羽毛知獨立黒白太分明杜詩戀池羣鴨回韓集野鶩行㸔弋栁集鬬鴨向春池張籍本朝􅗒褷出短蒲毰毸浴清水物忌太鮮明何妨染泥滓司馬公却因養得能言鴨驚破王孫金弹丸東坡鵝經舒鴈翠記子陳仲子有饋其兄生鵝者已頻顣曰惡用是鶃鶃者為哉孟子史景帝有疾使巫視鬼欲試之乃殺一鵝埋於苑中著以婦人服物乃使巫視之巫曰實不見有鬼但見一頭白鵝在墓上景帝乃厚賜之吴志劉毅酷貧時庾恱為司徒厨饌甚盛毅曰今年未得食鵝豈能以殘炙見惠恱不荅及毅貴深相挫辱恱疽發背而死王羲之性愛鵝㑹稽孤居姥養一鵝善鳴遂攜親友觀姥聞羲之將至烹以待之羲之歎惜彌日又山隂有道士好飬鵝羲之固求市之道士云為寫道徳經當舉羣相贈羲之欣然寫畢籠鵝而歸晋書胡蕃為髙祖從事征廣固累月未㧞忽有鳥如鵝蒼黒色飛入高祖帳裏蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城陷之宋書李愬襲蔡州兵至懸狐城夜半雪甚城傍有鵝鴨池愬令驚撃之以雜其聲僖宗數幸六王宅興慶池與諸王鬬鵝唐書傳記鵱鷜今之野鵝舒鴈鵝爾雅鴐鵞野鵝也廣雅桓南仲小児時與諸從兄弟各養鵝共鬬南仲鵝毎不如乃夜取兄弟鵝悉殺之世説傅承為江夏守有一隻鵝失之三年忽引導得三十餘頭来異苑集房相西池鵝一羣眠沙泛浦白於雲鳯凰池上應回首為報籠鵝王右軍鵝兒黄似酒對酒愛新鵝引頸嗔船過随行亂眼多翅開遭宿雨力少困滄波鵝費羲之墨杜詩眠沙卧水白成羣曲岸斜堤極浦雲李義山本朝鵝能警盗亦能却蛇有二能而不免死又有折羽之厄悲夫仇池筆記鴐鵝引頸回似我胷中字右軍數能来不為口腹事學書池上一雙鵝宛頸相追筆意多箭羽不霑春水籕文時印平沙想見山隂書罷舉羣驅向王家山谷鷄鬬鷄附經巽為鷄易雞棲于塒鷄棲于桀風雨凄凄鷄鳴喈喈風雨蕭蕭鷄鳴膠膠風雨如晦鷄鳴不已詩工商執鷄鷄人掌夜呼旦以􅑧百官周禮鷄曰翰音季冬鷄始乳禮公膳日雙鷄賔孟適郊見雄鷄自㫁其尾問之侍者曰自憚其犧也季郈之鷄鬬季氏介其鷄郈氏為之金距左傳子紀渻子為周宣王飬鬬鷄十日而問鷄可鬬乎曰未也方虛驕而恃氣十日又問曰未也猶疾視而盛氣十日又問曰幾矣鷄雖有鳴者已無變矣望之似木鷄矣其徳全矣異鷄無敢應者反走矣列子見卵而求時夜浸假而化予之左臂以為鷄余因以求時夜越鷄不能伏鵠卵魯鷄固能矣莊子戰如鬬鷄勝者先鳴尸子使鷄司夜皆用其能韓子鷄有專棲之雄抱朴子史子路好勇冠雄鷄孟嘗君自秦亡歸夜半至函谷關闗法鷄鳴而出客孟嘗君客之居下坐者有能為鷄鳴羣雞盡鳴遂發傳出史記王奉先好鬬鷄宣帝微時數與奉先㑹後即位以其女為皇后漢書樂羊子妻嘗有他舍鷄誤入垣内姑盗殺食之妻對不食而泣後漢書馬韓國出細米鷄其尾皆五尺餘魏志諸葛瑾云失旦之鷄復思一鳴吴志劉琨聞鷄鳴而起舞元興中衡陽有雌鷄化為雄八十日而冠緌桓𤣥自篡至敗凡八旬矣晋書傅琰為山隂令二野父爭鷄琰問鷄何食一云粟一云豆琰破鷄得粟罪言豆者南史劉武周父匡嘗與其妻趙氏坐忽見一物状如雄鷄流光燭地飛入趙懐因而有娠遂生武周為人驍勇善騎射唐書傳記玉衡星散為鷄春秋運斗樞鷄為積陽南方之象春秋説題辭鷄大者蜀蜀子頴未成鷄曰僆絶有力奮鷄三尺為鶤棲於杙為桀鑿垣而棲為塒爾雅鷄一名燭夜一名司晨炙轂子戴冠郎鷄也異聞集夫諸}
