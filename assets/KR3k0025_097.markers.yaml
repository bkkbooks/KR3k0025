  - {type: variant, offset: 962, length: 237, content: 知繩墨之曲直規矩之方圓尋引之短長姑奪眾工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟柳文梓文傳刀筆之吏寡大方陳子昂集經旅瑣瑣斯其所取災易旅卦禮煩則亂書說命中水煩則魚鼈不大記樂記子數粒而炊簡髮而櫛莊庚桑楚簡絲數米秤薪而爨數米而炊可以治小淮南子史其細已甚民弗堪也左襄二十九年銖銖而稱之至石必差寸寸而度之至丈必過西漢枚乘傳律令煩多苛請它比日以益滋自明習者不知所由欲以曉諭眾庶不亦難乎通監漢武紀宣為內史其治米鹽事皆關其手史咸宣傳鉤摭細微毛舉數事西漢刑法志公孫述為政苛細, WYG: 見}
