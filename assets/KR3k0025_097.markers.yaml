  - {type: variant, offset: 753, length: 159, content: 通監唐順宗杜黃裳曰明主勞於求人而逸於任人此虞舜所以能無為而治者也至於簿書獄訟煩碎之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳餐皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也通監唐憲宗或者不知體要衒能矜名親小勞侵眾官聽聽於府廷而遺其大者是不知相道者也同上集其不知體要者反此以恪勤為, WYG: 魯哀}
