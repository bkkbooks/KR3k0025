  - {type: variant, offset: 2875, length: 892, content: 計後漢本傳群臣朝賀大將軍梁冀帶劍入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劍冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖百僚肅然河南尹不疑嘗舉陵孝廉乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色通監漢質紀互入不畏強禦左雄薦周舉為尚書雄舉故冀州刺史馮直嘗坐贓受罪周舉以此劾奏雄雄曰進君適所以自罰一作伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不悟君之意與宣子殊也通監漢紀遼西太守趙苞到官遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞冠鈔苞母及妻子遂為所劫質載以擊郡苞率騎二萬與賊對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毀忠節唯當萬死無以塞罪母妻皆為所害苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死通監漢靈紀橋元與陳琳有隙及在公位薦琳為廷尉後漢君子仕不為己職思莫憂東漢文苑張升傳蘇章遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪東漢本傳互入公私兩全諸葛瑾每奉使至蜀與其弟亮但公會相見退無私面通監漢獻紀董尋曰臣聞古之直士盡言於國不避死亡故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主憂惜天下也臣自比於牛之一毛生既無益死亦何損通監魏明紀李憙在朝姻親故人與之分衣共食而未嘗私以王官通監晉世祖紀氐人齊萬年反朝臣惡周處強直使隸夏侯駿西征孫秀謂之曰卿有老母可以此辭處曰忠孝之道安得兩全既辭親事君父母安可得而子乎晉書周處傳何充所選用皆以功效不私親舊通監晉穆紀王坦之卒臨終與謝安柏沖書惟以國家為憂言不及私通監晉文紀郄超卒郄愔哀悼成疾門生呈與柏溫往反密計愔於是大怒曰小子死恨晚矣更不復哭晉書本傳王文度言不及私晉書魏懷朔鎮將元尼須與源懷舊交貪穢狼籍置酒請懷曰命之短長由卿之口豈可不相寬貸懷曰今日源懷與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處耳尼須揮淚無以對案劾抵罪通監梁, WYG: 于𤣥}
