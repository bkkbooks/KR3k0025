  - {type: variant, offset: 1, length: 1, content: 識, WYG: 知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也鵬之徙於南冥也水擊三千里摶扶摇而上者九萬里風之積也不厚則其負}
