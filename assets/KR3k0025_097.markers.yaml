  - {type: variant, offset: 1200, length: 1623, content: 於小事如為清水令時通監漢光武紀諸葛亮罰二十以上皆親覽通監魏文紀北齊肅宗即位尤自勤勵時人服其明而譏其細嘗問舍人裴澤對曰有識之士咸言傷細庫狄顯安亦曰陛下太細天子乃更似吏通監陳文紀御史中丞姚廷筠奏豈有修一水竇伐一枯木皆取斷宸衷通監唐玄紀搜擿疵纇大為煩碎通監唐紀集推得失去就於方寸銖黍間杜牧之互見小器子水至清則無魚人至察則無徒家語互入事莫做盡察見淵魚者不祥智料隱匿者有殃列說符互入事莫做盡史衛嗣君好察微隱縣令有發褥而席弊者嗣君聞之乃賜之席又使人過關市而賂之金既而召關市問有客過與汝金汝回遣之通監周紀秦任刀筆之吏爭以亟疾苛察相高其敝徒文具而無實通監漢文紀互入文具吹毛求疵西漢中山靖王傳苛察繳繞西漢司馬遷傳披抉其閨門而殺之西漢薛宣傳師古曰披發也抉挑也性褊察好以耳目隱發為明東漢鍾離意傳杜林曰大漢初興蠲除苛政及至其後漸以滋章吹毛索疵果桃菜茹之饋集以成贓通監後漢梁賀琛曰惟務吹毛求疵擘肌分理以深刻為能以繩逐為務通監梁武紀上書字誤者即治其罪通監陳紀考校簿領毫釐不差然皆不達大體督責苛碎通監陳後主李輔國置察事數十人潛令於人間聽察細事即行推按通監唐肅宗陳敬瑄多遣人歷縣鎮詷事謂之尋事通監唐懿宗經以公滅私書周官靡室靡家玁狁之故詩采薇王事多難不遑啟居豈不懷歸畏此簡書詩出車王事靡監不遑啟處不遑將父不遑將母詩四牡言公事不言家事記喪大記內稱不避親外舉不避怨推賢而進達之不望其報苟利國家不求富貴記儒行子君子能以公義勝私欲荀修身公道達而私門塞公事明而私事息荀君道為國薦賢滅身無憾劉子史楚鬭穀於蒐為令尹自毀其家以紓楚國之難左莊三十年子太叔曰周公殺管叔蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸游左昭元年先國後己左昭二年惠伯曰公事有公利無私忌左昭三年仲尼曰叔向古之遺直也治國制刑不隱於親左昭十四年不以家事辭王事左哀三年昔趙衰以壺餐從徑餒而弗食左僖二十五年趙宣子言韓獻子於靈公以為司馬河曲之役趙孟使人以其乘車干行獻子執而戮之宣子召而禮之曰吾言汝於君懼汝不能也吾故以是觀汝告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣國語晉李離為晉文公理過聽殺人自拘當死文公曰非子之罪也離曰理有法失刑則刑失死則死公以臣能聽微決疑故使為理今過聽殺人當死伏劍而死史循良傳互入循良廉頗為趙將藺相如拜上卿位在頗右頗曰我見必辱之相如聞不肯與會每朝時嘗稱病不欲與頗爭列已而出望見頗引車避匿相如曰夫以秦王之威而相如廷叱之辱其群臣雖駑獨畏廉將軍哉顧念強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生吾所以為此者先國家之急而後私讎也史記互入不爭趙奢受命之日不問家事史趙世家參聞何薨告舍人趣治行吾將入相居無何使者果召參參微時與蕭何善及為相有隙至何且死所推賢唯參通監漢惠紀互入自信薄昭殺漢使者帝不忍加誅使公卿與之飲酒欲令自飲酖昭不肯使群臣喪服往哭之乃自殺通監漢文紀互入示人以意主爾忘身國爾忘家公爾忘私西漢賈誼傳金日磾長子為帝弄兒甚愛之其後弄兒壯大不謹自殿下與宮人戲日磾適見之惡其淫亂遂殺弄兒通監漢武紀夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然西漢司馬遷傳趙禹為吏以來舍無食客公卿相過禹禹終不報謝務在絕知友賓客之請孤立行一意而已史本傳問遺無所受請寄無所聽常自稱曰已倍親而事國身當奉職死節官下終不顧妻子矣史郅都傳奮不顧身以殉國家之急西漢李陵傳武帝為霍去病治第令視之對曰匈奴不滅無以家為也西漢霍去病傳尹翁歸抱公潔己為近世表西漢本傳贊抱公絕私西漢尹翁歸傳王章素剛直敢言雖為鳳所舉非鳳專權不親附鳳乃奏封事言日食之咎鳳專權蔽主之過通監漢成紀禽息憂國碎首不恨西漢杜欽傳賈復部將殺人於穎川穎川太守寇恂捕得繁獄戮之於市復以為恥還過穎川謂左右曰吾與寇恂並列將帥而為其所陷今見恂必手劍之恂知其謀不欲與相見姊子谷崇曰崇將也得帶劍侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也通監漢光武紀陰興與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張杞杜禽與興厚善以為華而少實但私之以財終不為言同上吳漢病篤車駕親臨問所欲言對, WYG: ''}
