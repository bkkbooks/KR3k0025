  - {type: variant, offset: 5234, length: 0, content: '', krp: 帝遣使求鬬鴨孫權曰彼在諒隂之中所求若此豈可與言禮哉江表傳周訪與商人共入宫亭廟宿明起如厠見一白頭翁逐之化為雄鴨還船欲煮之商人爭㸔遂飛去潯陽記李逺嗜緑頭鴨語林浮光多美鴨樊千里買百隻置後池載數車浮萍入池使為鴨作茵褥雲林異景志集唼喋争食􅗒褷𢃄雛李邕賦花鴨無泥滓堦前每緩行羽毛知獨立黒白太分明杜詩戀池羣鴨回韓集野鶩行㸔弋栁集鬬鴨向春池張籍本朝􅗒褷出短蒲毰毸浴清水物忌太鮮明何妨染泥滓司馬公却因養得能言鴨驚破王孫金弹丸東坡鵝經舒鴈翠記子陳仲子有饋其兄生鵝者已頻顣曰惡用是鶃鶃者為哉孟子史景帝有疾使巫視鬼欲試之乃殺一鵝埋於苑中著以婦人服物乃使巫視之巫曰實不見有鬼但見一頭白鵝在墓上景帝乃厚賜之吴志劉毅酷貧時庾恱為司徒厨饌甚盛毅曰今年未得食鵝豈能以殘炙見惠恱不荅及毅貴深相挫辱恱疽發背而死王羲之性愛鵝㑹稽孤居姥養一鵝善鳴遂攜親友觀姥聞羲之將至烹以待之羲之歎惜彌日又山隂有道士好飬鵝羲之固求市之道士云為寫道徳經當舉羣相贈羲之欣然寫畢籠鵝而歸晋書胡蕃為髙祖從事征廣固累月未㧞忽有鳥如鵝蒼黒色飛入高祖帳裏蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城陷之宋書李愬襲蔡州兵至懸狐城夜半雪甚城傍有鵝鴨池愬令驚撃之以雜其聲僖宗數幸六王宅興慶池與諸王鬬鵝唐書傳記鵱鷜今之野鵝舒鴈鵝爾雅鴐鵞野鵝也廣雅桓南仲小児時與諸從兄弟各養鵝共鬬南仲鵝毎不如乃夜取兄弟鵝悉殺之世説傅承為江夏守有一隻鵝失之三年忽引導得三十餘頭来異苑集房相西池鵝一羣眠沙泛浦白於雲鳯凰池上應回首為報籠鵝王右軍鵝兒黄似酒對酒愛新鵝引頸嗔船過随行亂眼多翅開遭宿雨力少困滄波鵝費羲之墨杜詩眠沙卧水白成羣曲岸斜堤極浦雲李義山本朝鵝能警盗亦能却蛇有二能而不免死又有折羽之厄悲夫仇池筆記鴐鵝引頸回似我胷中字右軍數能来不為口腹事學書池上一雙鵝宛頸相追筆意多箭羽不霑春水籕文時印平沙想見山隂書罷舉羣驅向王家山谷鷄鬬鷄附經巽為鷄易雞棲于塒鷄棲于桀風雨凄凄鷄鳴喈喈風雨蕭蕭鷄鳴膠膠風雨如晦鷄鳴不已詩工商執鷄鷄人掌夜呼旦以􅑧百官周禮鷄曰翰音季冬鷄始乳禮公膳日雙鷄賔孟適郊見雄鷄自㫁其尾問之侍者曰自憚其犧也季郈之鷄鬬季氏介其鷄郈氏為之金距左傳子紀渻子為周宣王飬鬬鷄十日而問鷄可鬬乎曰未也方虛驕而恃氣十日又問曰未也猶疾視而盛氣十日又問曰幾矣鷄雖有鳴者已無變矣望之似木鷄矣其徳全矣異鷄無敢應者反走矣列子見卵而求時夜浸假而化予之左臂以為鷄余因以求時夜越鷄不能伏鵠卵魯鷄固能矣莊子戰如鬬鷄勝者先鳴尸子使鷄司夜皆用其能韓子鷄有專棲之雄抱朴子史子路好勇冠雄鷄孟嘗君自秦亡歸夜半至函谷關闗法鷄鳴而出客孟嘗君客之居下坐者有能為鷄鳴羣雞盡鳴遂發傳出史記王奉先好鬬鷄宣帝微時數與奉先㑹後即位以其女為皇后漢書樂羊子妻嘗有他舍鷄誤入垣内姑盗殺食之妻對不食而泣後漢書馬韓國出細米鷄其尾皆五尺餘魏志諸葛瑾云失旦之鷄復思一鳴吴志劉琨聞鷄鳴而起舞元興中衡陽有雌鷄化為雄八十日而冠緌桓𤣥自篡至敗凡八旬矣晋書傅琰為山隂令二野父爭鷄琰問鷄何食一云粟一云豆琰破鷄得粟罪言豆者南史劉武周父匡嘗與其妻趙氏坐忽見一物状如雄鷄流光燭地飛入趙懐因而有娠遂生武周為人驍勇善騎射唐書傳記玉衡星散為鷄春秋運斗樞鷄為積陽南方之象春秋説題辭鷄大者蜀蜀子頴未成鷄曰僆絶有力奮鷄三尺為鶤棲於杙為桀鑿垣而棲為塒爾雅鷄一名燭夜一名司晨炙轂子戴冠郎鷄也異聞集夫諸}
