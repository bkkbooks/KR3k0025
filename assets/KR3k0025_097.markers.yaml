  - {type: variant, offset: 3777, length: 1450, content: 楷為殷州刺史或勸楷留家單騎之官楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身速戰不息死者相枕終無叛志通監梁高祖屈突通從討王世充時通二子在洛帝曰今以東略委公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死報國今日之行正當先驅二兒死自其分終不以私害義新唐書屈突通傳蒞官勁正有犯法者雖親無回縱同上上悉以軍中資糧器械簿書委岑文本夙夜勤力躬自科配籌筆不去手精神耗竭言辭舉措頗異平日上見而憂之謂左右曰文本與我同行恐不與我同返是日遇暴疾而薨通監唐太宗王義方彈李義甫義甫謂之曰王學士得御史是義甫所舉今日之事豈無愧乎對曰義方為公不為私唐書張易之張昌宗居中用事柏彥範謀誅之彥範以事白其母母曰忠孝不兩全先國後家可也通監唐中宗太后之遷上陽宮也姚元之獨鳴咽流涕曰元之前日從公誅姦逆人臣之義也今日別舊君亦人臣之義也雖獲罪實所甘心同上丈夫當敢言地要須明目張膽以報天子焉能錄錄以保妻子耶唐書韋思謙傳推誠蹇諤不私形骸唐書宋璟傳皇后妹夫奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而敺之傑上表上大怒命於朝堂杖殺以謝百僚通監唐玄紀互入深識大體李國貞治軍嚴朔方將士不樂皆思郭子儀故王元振為之作亂子儀至軍元振自以為功子儀曰汝臨賊境輒害主將若賊乘其釁無絳州矣吾為宰相豈受一卒之私邪收元振及其同謀者四十人皆殺之通監唐代宗郭子儀禁無故軍中走馬南陽夫人乳母之子犯禁都虞候杖殺之諸子泣訴於子儀且言都虞候之橫子儀叱遣之明日以事語僚佐而嘆息曰子儀諸子皆奴材也不賞父之都虞候而惜母之乳母子非奴材而何通監唐紀李晟曰幸得備將相苟容身不言豈可謂有犯而無隱耶唐書本傳崔祐甫作相未逾年凡除吏幾八百員多稱允當上曰有人謗卿所除擬官多涉親故何也祐甫曰進擬必須諳其材行臣若與之相識方可粗諳若素不知聞何由知其言行獲謗之由實在於此舊唐書本傳互入不拘形跡裴晉公遺言不及家事唐書李夷簡彈楊憑貶臨賀尉親友無敢送者徐晦獨至藍田與別權德輿謂之曰母乃為累乎對曰晦自布衣蒙楊公知獎今日遠謫安得不與之別後數日夷簡奏為監察御史晦謝曰平生未嘗得望公顏色公何從而取之夷簡曰君不負楊臨賀豈負國乎通監唐憲宗互入因事見人裴垍器兮峻整人不敢干以私嘗有故人自遠詣之垍資給優厚從容款狎其人乘間求京兆判司垍曰公才不稱此官不敢以故人之私傷朝廷至公它日有盲宰相憐公者不妨得之垍則必不可同上李固言薦崔球為起居舍人鄭覃再三以為不可曰公事勿相違覃曰宰相盡同則事必有欺陛下者矣通監唐文宗李德裕以柳仲郢為京兆尹素與牛僧孺善謝德裕曰不意太尉恩獎及此仰報恩德敢不如奇章公門館德裕不以為嫌通監唐武宗高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威眾辦事耳以白金數百兩遺之通監梁均王互入公私兩全劉仁贍幼子崇諫夜泛舟渡淮北為小校所執仁贍命腰斬之周廷構求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面見將士也輒命斬之然後成喪通監周世宗傳記晉文公問咎犯誰可為西河守對曰子羔曰非汝之仇歟曰君問誰守者非問臣之仇也子羔見而謝之咎犯曰薦子者公也吾不以私事害公議說苑許允為吏部郎多用其鄉里魏明帝遣虎賁收之允曰臣之鄉人臣所知也世說互入鄉曲燕梁琛使秦琛從兄奕先在秦為尚書郎會罷秦王欲令琛止奕舍琛語有司曰昔諸葛兄弟各處三國及其聘集公朝相見退無私面奕數就邸問東國起居琛曰今三方鼎據兄弟並蒙附寵論心各有所在今欲以東國事語君恐非西國之所欲聞何以見問, WYG: 鴻}
