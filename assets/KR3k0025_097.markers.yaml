  - {type: variant, offset: 5297, length: 0, content: '', WYG: 呼鷄朱朱俗説鷄本朱公化而為之謹按説文觧喌喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相近耳風俗通成帝時交趾越嶲獻長鳴鷄即下漏驗之晷刻無差長趾善鬬西京雜記魏王發令云鷄肋楊脩曰夫鷄肋棄之則可惜噉之無所得九州春秋南郡獻長鳴承露鷄江表傳丁零反殷浩令江逌伐之乃取數百鷄以長䋲連之脚皆繫火羣鷄駭散敵營皆燃因其驚亂縱兵擊之晋中興書宋處宗嘗買得一長鳴鷄著窓間鷄遂作人語與宗談論極其理致幽㝠録有鷄夜鳴隨鼓節一更為一聲號五時鷄洞㝠記張生為愽士畜一鷄呼為勃公子御史臺記李林甫精神剛戾常如索鬬鷄開元天寳遺事}
