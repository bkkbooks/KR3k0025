素之城玉泉之宫瑶林瑞獸莫可名狀即白帝天君白招拒統領仙官神吏鎮此山主太白之精居七氣素天之内矣廣野山者天之北岳也在北海弱水之中形如崑崙酆都羅山合為陰氣之主上多瓊樓寳闕金液龍芝莫可名狀即黒帝天君叶光紀統領仙官神吏鎮此山主辰星之精居五氣𤣥天之内矣崑崙山者天之中岳也在八海之間上當天心形如偃葢上廣下狹三成而上與天齊日月黄赤二道交㑹其上三光行焉東曰崑崙西曰𤣥圃北曰閬苑南積石山大􅀈山水泉山北户山四面各一萬里上有瓊華之闕光碧之堂瑶池翠水即西王母統衆仙居焉海中四岳為枝幹十洲四島入海大川圍繞其側絶頂之髙上有金臺五所玉樓十二金城千里地生金根之樹瓊柯之林紫雀翠鸞碧桃白李百寳妙嚴莫可紀述即黄帝天君含樞紐統領天大聖衆鎮此山皆與五岳名山相連常有神仙徃來考校生籍上主鎮星之精居於中元一氣天中焉其外海之五岳即天地之五鎮造化之五岳即五氣之宗祖矣道士附女道士史有道士西門君惠李守等云劉秀當為天子後光武紀論嵩山道士冦謙之脩張道陵之術自言嘗遇老君降命謙之繼道陵為天師魏主起天師道場重壇五層給道士一百二十人衣食每月設厨㑹數千人通鑑宋营陽王紀客問三教優劣李謙曰佛日也北史魏本傳上召天台道士司馬承禎問以陰陽數術睿宗紀睿宗崩以上女萬安公主為女官欲以追福通鑑唐𤣥宗開元二年楊妃乞為女官號太真天實三年上受三洞法籙於衡山道士劉女静唐武宗㑹昌六年唐主問道士王棲霞何道可致太平晋紀天福八年並同上傳記風局清古集異記集風餐委松栢雲卧恣天行選樂府升天行𤣥真髙蹤萬古同徳陳子昂喘息餐妙氣歩虛吟真聲道與古先合心將元化并李太白集茹芝煉玉學輕身元次山嚥𠻳元和津所思煙霞微杜張道士嵩南之有道者通古今學有文武長材跡寄老子法中為道士韓送張道士序院閉青霞入松髙老鶴尋猶疑隐形坐敢起竊桃心尋流尊師不遇洗粧拭面着冠帔白咽紅頰長眉青華山女詩真風道骨𤣥格髙情冥鴻孤鶴不可云喻元微之見韓文送毛仙翁十八凡序注書出歩虛三百韻蕊珠文字在人間元微之嵗計芝田熟晨裴月帔寒李義山詩叶潤靈津凝華霄極同上如來鑿七竅若都遺四肢白侍郎性靈閒似鶴顔狀古如松道心精微真學奥秘為仙列上首與儒流争衡並同上得崆㠓之道與汗漫之逰白帖藉草飯松屑焚香讀道書王維集有道者其神則清雙眸朗暢四氣和平長江月影太華松聲同上古木無人地來尋羽客家道書堆玉案仙帔叠青霞鶴老難知嵗松寒未作花洞中不可見何處化丹砂劉長卿蘿月延虛歩松花醉宴閒同上道士無白髪語音靈泉清青松多夀色白石常夜明放歩霽霞起振衣華風生孟東野松骨輕自飛鶴心髙不羣日下鶴過時人間空落影同上聞煉師之名者足以激勵風俗睹錬師之容者足以脫落氛埃唐文粹𤣥標仙骨偕真道冥錬形逰化逰心於千載之表騁思於九流之域水其心雲其身素琴在右黄庭在左徜徉髙空軒裳鐘鼎於我如浮雲大位遐年在生為逆旅鶴骨松貌並同上白髪道心熟黄衣仙骨輕王建集道士冩將行氣法家童授與歩虛詞同上泥竈煮靈液掃壇朝玉真張文昌餐空御白雲賈浪仙綵雲不散燒丹竈白鹿時藏種玉田錢起詩君有出俗志不貪英雄名傲然脫冠帶改換人間情道士司馬退之詩不踐名利道始覺塵土腥同上樓觀本記曰周穆王因尹真人草樓之觀召逸人居之謂之道士平王東遷置七人漢明帝永平七年置三十七人晋惠帝度四十九人審此則是自周而有也事物紀原本朝百尺松梢幾飛歩鶴棲枝上禮虛皇詩話脩養子吹呴呼吸吐故納新熊經鳥伸為夀而已矣莊子史沐浴𤣥徳禀仰太和班孟堅叙傳華佗曰人體欲得勞動但不當使極耳動揺則穀氣得消血脉流通病不得生譬猶戸樞終不朽也古之仙者為導引之事熊經鴟顧引接腰體動諸關節以求難老吾有一術名五禽之戯一曰虎二曰鹿三曰熊四曰猿五曰烏佗别傳曰吴普從佗學微得其力魏明帝呼之使為禽獸普以年老手足不能及粗以其法語諸醫今年將九十耳不聾目不冥牙齒完全飲食無損東漢本傳王真年百嵗視之面有光澤似未五十者云周流登五岳名山悉能行胎息之方𠻳舌下泉咽之後漢本傳傳記食氣者常有少容玉符經志若流水居若空城妙真經真人道士常吐納以和六液太上三元經斷穀茹芝茅君内傳集含天地之醇和吸日月之光采嵇康琴賦挹以𤣥玉之水𠻳以華池之漿孫綽天台賦化心養精魄隠几習天真李太白鍊氷雪之容延金石之夀納沆瀣之精率逍遥之性緘縢六志扃鐍百骸吸新吐故以鍊藏專志積精以專心鄭君得自然虛白生心胷吸披沆瀣精凝為氷雪容飲咽日月精茹嚼沆瀣芬棲山卧雲鍊氣絶食滋味不接於口塵埃不染於心齋心受籙服氣鍊形暑不流汗冬不挾纊膚體顔色氷清玉温未識者望之疑神仙中人也並出白帖委氣荣衛和咽津顔色好元㣲之集萬過黄庭經一食青粮稻同上食栢鍊玉顔元稹集叩爾𤣥關保其真宅桞文齋心已恬愉澡身自光明沈沈簾幃下藹藹燈燭青四支動用息一室虛白生収視忘趣捨叩齒集神靈伊子嗜慾寡居常痾恙輕三尸既伏竄九藏乃和平無令耳目勝則使性命傾窅然深夜中若與元氣并李義山詩精神如太陽霍然照清都四支為琅玕五藏為璠璵顔如芙蓉頂為醍醐天地相終始浩漫為娱下顧人間溷糞蝇蛆皇甫湜修行近日形如鶴導引多時骨似綿王建集骨換肌膚膩心靈氣色真姚少監講論叅同深到底停騰姹女立成銀方雄飛不味稲粱食始覺神骨清道士司馬退之詩本朝服餌既久毛骨清丹顔益少方瞳明緑髪方瞳痩骨輕並歐公集槁死三彭仇澡換五滑腸清骨凝緑髓丹田發幽光東坡詩丹鼎一丸深自秘紫芝三葉却先知欒城得道子夫道在太極之先而不為髙在太極之下而不為深先天地生而不為久長於上古而不為老狶韋氏得之以挈天地伏羲得之以襲氣毋維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以逰大川肩吾得之以處泰山黄帝得之以登雲天顓頊得之以處𤣥宫禺強得之以立乎北極西王母得之坐乎少廣莫知其終彭祖得之上及有虞下及五伯傅說得之以相武丁奄有天下乗東維騎箕尾而比於列星莊子大宗師偃其聰明而抱其太素淑真訓體本抱神以逰於天地之樊淮南子精神訓史履操夷簡徳業冲粹屏棄塵雜栖志虛𤣥吐故納新食芝餌术念衆妙於三清之表返華髮於百靈之外道邁前烈聲髙自古舊}
