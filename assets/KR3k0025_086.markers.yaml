  - {type: variant, offset: 2928, length: 577, content: 自貶損以行權不害人以行權谷梁桓十一年大夫無遂事出竟有可以安社稷利國家者則專之可也春秋公羊傳三孔子過蒲蒲人止孔子曰苟無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負耶孔子曰要盟也神不聽史孔子世家蘇秦兄弟二人其術長於權變史本傳蝮蟲蠚手則斬手蠚足則斬足何者為害於身也西漢田儋傳反古未可非史趙世家輒以使宜施行西漢蕭何傳韓信使人言於漢王齊反覆之國不為假王其勢不定漢王大怒張良陳平躡漢王之足附耳語曰漢方不利寧能禁之自王乎因立之史記權不可預設變不可先圖與時移遷應物變化設策之機也通監漢高紀帝有疾惡人臥禁中詔戶者無得入群臣群臣絳灌等莫敢入十餘日舞陽侯樊噲排闥直入大臣隨之通監漢惠紀失火之家豈暇先言丈人後救火乎前漢高五王傳互入事窮勢迫門班固曰孝文時天下以酈寄為賣友夫賣友者見利而忘義也若酈父為功臣而又執勢雖摧呂祿以安社稷誼存君親可也通監漢紀諸呂為從謀弱京師而勃反經合於權史太史公自序琴瑟不調盛者必解而更張之乃可鼓也為政不行甚者必變而更化之乃可理也西漢董仲舒傳東越相攻上使汲黯往視之不至至吳而還河內失火延燒千餘家上使黯往視之還報曰家人失火比屋延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發倉廩以振貧民臣請歸節伏矯制之罪通監漢武紀孝元棄珠崖之郡光武絕西域之國不以介鱗易我衣裳魯文公毀泉臺春秋譏之曰先祖為之而已毀之不如勿居而已以其無妨害於民也襄公作三軍公舍, WYG: ''}
