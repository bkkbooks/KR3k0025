  - {type: variant, offset: 2196, length: 0, content: '', WYG: 里上生神芝仙草又有髙玉石且千丈出泉如酒味名之為玉醴泉飲之數升輒醉令人長生洲上多仙家風俗似吳中山川如中國也𤣥洲𤣥洲在北海之中戌亥之地地方七千二百里去南岸三十六萬里有𤣥都仙伯真公所治多丘山又有風山多風氣響雷電對天西北門上多大𤣥仙官宫室宫室各異饒金石紫芝又是三天所治之處炎洲炎洲在南海中地方二千里去北岸九萬里上有風生獸似豹青色其大如貍張網取之積薪數車以燒之薪盡而獸不燃灰中而立毛亦不焦斫刺不入打之如皮嚢即以鐵鎚鍛其頭數十下乃死而張口向風湏臾復活以石上菖蒲塞其鼻即死取其腦和黄菊花服之盡十斤得夀五百年又有火林山山中有火光獸大如䑕毛長三四寸或赤或白山可三百里許晦夜常見此山林乃是此獸光照狀如火光相似取其獸毛以緝為布時人號為火光浣布也國人衣服之若有垢汙以水浣之終不潔浄唯以火燒兩食乆振擺之其垢自落潔白如雪亦多仙家居處長洲長洲一名青丘在南海辰已之地地方五千里去岸二十萬里上饒山川又多大樹樹有二千圍者一洲之上專是林木故一名青丘上有仙草靈藥甘液玉英又有風山山常震聲有紫府宫天真仙女逰}
