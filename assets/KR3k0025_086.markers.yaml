  - {type: variant, offset: 2419, length: 507, content: 能勇也其畫無俚之至耳前漢欒布傳注言其計畫無所聊賴至於自殺發忿快志剡手以衝仇人之凶固為俱靡而已賈誼傳荀彧曰審配專而無謀通監漢獻帝紀荀攸郭嘉曰呂布勇而無謀同上子謹曰蕭繹懦而無謀通監梁簡文帝紀經化而裁之謂之變易繫辭子曰知變化之道者其知神之所為乎變通者趣時者也通其變使民不倦窮則變變則通上古穴居而野處後世聖人易之以宮室上古結繩而治後世聖人易之以書契巽以行權並同上子夏問曰三年之喪卒哭金革之事無辟也者禮歟孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也伯禽封於魯有徐戎作難喪卒哭而征之急王者之事也征之作柴訾記魯子問君子貞而不諒諒信也君子正道言不必八信語衛靈公吾豈匏瓜也哉焉能繫而不食語陽貨故當不義則子不可以不爭於父孝經互入子道動靜伸屈唯變所適易略例子大人者言不必信行不必果惟義所在孟子權者神聖之所資管子拔戟加乎首則十指不辭斷荀子強國知道者必達於理達理者必明於權莊秋水權者聖人獨見淮南子仲尼於南子所不欲見也於陽虎所不欲敬也見所不見敬所不敬揚五百注云欲詘身以行道通其變天下無弊法文中子史仲尼曰政寬則民慢慢則紏之以猛政猛則民殘殘則施之以寬寬則濟猛猛以濟寬政是以和左昭二十互入政事反經合道為權公羊傳權者反於經然後有善權之所設舍死亡無所設行權, WYG: ''}
