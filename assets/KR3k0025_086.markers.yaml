  - {type: variant, offset: 3717, length: 1, content: 務, krp: 治也武帝忿然不平又問使者猛獸何方而伏百禽食噉何物膂力何取其所生何鄉耶使者曰猛獸所出或出崑崙或生𤣥圃或生聚窟或生天露其夀不貲食氣飲露觧人言語仁惠忠恕當其仁也愛護蠢動不犯虎豹以下當其威也一聲呌發千人伏息牛馬恐駭驚斷絆繫武士奄忽失其勢力當其神也立興風雲吐潄雨露百邪迸走蛟龍騰蛇附處于太山之厩役御獅子名曰猛獸葢神化無常能為大禽之宗主乃玃天之元王辟邪之長獸者也靈香雖少斯更生之神物也疫病災死者能超之乃聞香氣者即活也芳又特甚故難歇也於是帝使使者令猛獸發聲試聽之使者乃指獸命發一聲獸䑛唇良久忽呌如天大雷聲霹靂又兩目䃱磹交光精氣衝天良久方止帝登時顛蹶掩耳震動不能自止時衛者虎賁武士俱失仗伏地諸内外牛馬犬豕之属皆絶絆離繫放蕩驚駭久許而定帝忌之因以此獸付上林苑令虎食之於是虎聞來乃相屈積聚如死虎伏獸入苑徑上虎頭溺虎口去十歩已來顧視虎虎輒閉目帝恨使者言不遜欲收之明日失使者及猛獸所在遣四出尋討不知所止到後元封元年長安城内病者數千百亡者大半試取月支神香燒之於城内其死未三日者皆活芳氣經三月不歇於是信其神物也乃更秘錄香復一旦又失之檢函封印如初無復香也帝逾時懊恨不禮待使者益貴方朔之遺語自愧求少君之不懃慚衛卿之復去向使厚待使者必有所益也右十洲滄海島滄海在北海中地方三千里海四面繞島各五千里水皆滄色仙人謂之滄海者也島上專是大山積石有名石象八石石腦石桂英流月黄子石膽之軰百餘種皆生於島服之得神仙外别有圓海繞山圓水色正黒謂之溟海無風而洪波百丈不可得徃上有九老丈人九天真主葢太上真人之所居唯飛仙能到其處耳崑崙一號曰崑陵在西海戌地北海之亥地地方一萬里去岸十三萬里有弱水周回繞匝山東南接積石圃西北接北戸之室東北臨大活之井西南至承洲之谷此四角大山寔崑崙之支輔也積石圃南頭是王母宫王母告周穆王云山去咸陽三十六萬里山髙平地三萬六千里上有三角山方廣萬里形如偃盆下狹上廣故曰崑崙山三角其一角千辰之輝名曰閬風巔其一角正西名𤣥圃堂其一角正東名崑崙宫其一角有積金為大墉城面方千里城上安金䑓五所玉樓十二所其北戸山承淵山入有墉城金䑓玉樓相映如流精之闕光碧之堂瓊華之室紫翠丹青景雲燭日朱霞九光西王母之所治也其北海外又有鍾山在北海之子地隔弱水之北一萬九千里髙一萬三千里上方七千里周旋三萬里自生千芝及神草四十餘種上有金䑓玉闕亦元氣之所舍大帝君治處也鐘山之南有平邪山北有蛟龍山西有勁草山東有束木山四山鐘山之枝幹也四山髙鍾山三萬里宫城五所如一登四面山下望見鍾山耳四面山帝君之城域也又仙人出入道徑自一路從平邪山東南入宂中乃至内長生島中紫石室宫九老仙都治處仙官數萬衆記之方丈洲在東海中心西南東北岸正等方丈面各五千里上面專是龍所聚者金玉琉璃之宫三天司命所治之處羣仙若欲昇天者徃來此洲受太上𤣥生籙仙家數十萬瓊田芝草課計頃畆如種稻狀亦有石泉山有九原丈人宫主領天下水神及龍蛇巨鯨陰精水獸之軰扶桑在東海之東岸一萬里復得碧海廣狹浩汗與合東岸大碧水既不鹹苦止作碧色甘香味扶桑在碧海之中地方百里上有太帝太真王父所治處地多林木葉皆如桑又有椹子樹長者數千丈徑三十餘圍樹兩兩同根偶生更相依倚是以名扶桑仙人食其椹一體皆作金色飛翔𤣥虛其樹雖大其葉其椹如中夏桑也但椹希而赤九千嵗一生實耳味絶甘香地生紫金玉如諸夏之瓦石其仙官變化萬端葢無所形或有分形為百身十丈者蓬丘蓬萊山是也對東海之東北岸周回五千里北到中山北阿門外乃天帝君總九天之維貴無比焉山源周回其外四城其中髙山當心有似於崑崙也皆禹治洪水既畢乃乗蹻車度弱水而到此祠上帝於此阿歸大功於九天禹經諸五岳使工刻石識其里數髙下其字科斗書非漢人所了今丈尺里數皆禹時書也不但刻劘五岳諸山名亦然其所刻之處獨髙耳東方朔十洲三島記十大洞天本朝十大洞天者處大地名山之間是上天遣羣仙統治之所雲笈七籖天地宫府圖第一王屋山天檀峯絶頂髙一百二十里洞周回一萬里名小有清虛之天即杜仲王褒為小有天王清虛真人所理在洛陽河間兩界去王屋縣六十里雲笈云西城王君治之第二委羽山洞周回一萬里名大有空明之天即司季王為大有仙人所理係台州黄巖縣雲笈云清童君治之第三西城山髙二千丈洞周回三千里名太𤣥總真之天即王方平真人所理在梁州成都府西一千里接西界雲笈云未詳所在登真隐訣云疑終南太一山是属上宰王君第四西𤣥山髙二千七百丈洞周回一千里名三𤣥極真之天即裴真人所理係華州入西畨界雲笈云恐非人跡所及第五青城大面山髙三千六百丈洞周回二千里名寳仙九室之天即甯真人所理黄帝問道於希夷真君授黄帝龍蹻經之處在蜀州青城縣雲笈云青城丈人治之第六天台赤城山髙一萬八千丈洞周回五百里名上清玉平之天即桐栢王真人所理葛𤣥仙翁煉丹得道䖏上應台宿故名天台在台州天台縣雲笈云台州唐興縣属𤣥州仙伯治之第七羅浮山髙三千六百丈洞周回五百里名朱明曜真之天是蓬萊之一島也堯時洪浮海而來泊於羅山二山相合故曰羅浮山即抱朴子葛翁煉丹得道處