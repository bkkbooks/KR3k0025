  - {type: variant, offset: 3743, length: 3, content: 貸或問, WYG: 如數走出籬外綱唾盤中即成鯉魚夫人唾盤中成獺食魚綱與夫人入四明山路阻虎綱禁虎伏不敢動適欲徃虎即喊之夫人徑前虎即靣向地不敢仰視夫人以䋲繫虎牽歸繫於床脚下將昇天綱仕上虞縣㕔事側先有大皂莢樹綱升樹數丈方能飛舉夫人平坐冉冉如雲氣之昇同昇天而去女仙傳集吞刀弄火易貌分形選西京賦劉根丹篆二千字郭璞青囊兩卷書杜牧之長䋲繋白日大藥駐朱顔唐文粹尸解史宋母忌王伯僑充尚羡門韋昭曰皆效古人名效神仙者子髙最後皆燕人為方仙道形解銷化服䖍曰尸解也張宴曰人老如解去故骨則變化也今山中有龍骨世人謂之龍解骨化為之見史記封禅書葛洪卒年八十一視}
