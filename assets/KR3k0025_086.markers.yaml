  - {type: variant, offset: 2170, length: 0, content: '', WYG: 金鼎銷紅日丹田老紫芝詩話縂龜玉宇清風來處逺仙家白日靜中長歐公詩衣裳飄颻薄煙霧泊然冲虛𦕈無营欒城集至人本無夢夢則亦逰仙真人本無睡睡則浮雲煙詩話先生去後應難老乞與貧儒換骨丹同上洞府傳真仙之福庭天地之下府號曰金庭不死之鄉養真之靈境也仙傳拾遺王屋山有洞天神仙之府五臺山道家紫府洞也東峯有離岳大球}
  - {type: variant, offset: 2170, length: 0, content: '', krp: 金鼎銷紅日丹田老紫芝詩話縂龜玉宇清風來處逺仙家白日靜中長歐公詩衣裳飄颻薄煙霧泊然冲虛𦕈無营欒城集至人本無夢夢則亦逰仙真人本無睡睡則浮雲煙詩話先生去後應難老乞與貧儒換骨丹同上洞府傳真仙之福庭天地之下府號曰金庭不死之鄉養真之靈境也仙傳拾遺王屋山有洞天神仙之府五臺山道家紫府洞也東峯有離岳大球}
  - {type: variant, offset: 2171, length: 0, content: '', WYG: 峯有麗農瑶室南峯有洞光珠樹北峯有玉洞瓊芝中峯有自明之金環光之璧並列仙傳集雲生梁棟間風出窓戸内郭景純逰仙詩山岳神秀𤣥聖逰化靈仙窟宅孫綽天台賦洞門無鎖鑰俗客不曽來韓文有地在壺中無人知地脉劉賔客勝景不易遇入門神頓清唐文粹十洲并序序曰漢武帝既聞王母說八方巨海之中有祖洲瀛洲𤣥洲炎洲長洲元洲流洲生洲鳯麟洲聚窟洲等十洲並是人跡所希絶處又知東方朔非世上人是以延之曲室而親問十洲所在方物之名故書記之方朔云臣甞随師之主履行北至朱陵扶桑之厥渠海冥夜之丘純陽之陵始青之下月宫之間内逰七丘中旋十洲踐赤縣而逰五岳行陂澤而息名山臣自少及今周流六天渉歴八極於是矣未若陵靈之子聽真之官上下九天洞視百方北極鉤陳而并華葢南翔太丹而棲大}
