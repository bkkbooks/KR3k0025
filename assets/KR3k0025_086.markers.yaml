  - {type: variant, offset: 1643, length: 1, content: 緡, WYG: 里非飛仙莫到續仙傳河東須曼都好道出家三年而反曰去時有數仙人將上天籬有數里而止月之旁甚寒悽愴論衡羿請不死之藥於西王母其妻嫦娥竊而食之奔入月宮託身於月是為蟾蜍王充論衡江妃二女皆麗服華裝佩兩明珠逰於江漢之湄逢鄭交甫交甫不知其神也遂下與言曰願請子之佩二女觧佩}
  - {type: variant, offset: 1643, length: 1, content: 緡, krp: 里非飛仙莫到續仙傳河東須曼都好道出家三年而反曰去時有數仙人將上天籬有數里而止月之旁甚寒悽愴論衡羿請不死之藥於西王母其妻嫦娥竊而食之奔入月宮託身於月是為蟾蜍王充論衡江妃二女皆麗服華裝佩兩明珠逰於江漢之湄逢鄭交甫交甫不知其神也遂下與言曰願請子之佩二女觧佩}
