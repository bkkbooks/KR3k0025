  - {type: variant, offset: 3720, length: 3, content: 贊崔郾, krp: 道士知逺傳集歩八閑而為宇節四運之常氛魏文帝大暑賦貫元虛於太素薄紫微而踈戾澄神元漠流棲心太素域俱陸機賦頥神太素逍遥方外阮藉詩恣語樂以終日等寞於不言孫綽天台賦道風秀出任彦昇表夜後不聞龜喘息秋來惟長鶴精神白樂天贈王山人詩身輕得道羽化升天白帖鶴骨松貌泉停谷虛寓形人間天地無累與扶桑公陶隐居遥為師友矣唐蔣防文鍊丹子合金丹之大藥錬八石之精英尤忌凡俗聞見則仙物不成丹砂服之令人飛行長生九丹仙藥之上俱抱朴子史寡婦清得丹穴而擅其利史記葛洪聞跤趾出丹求為勾漏令晋書陶洪景既得神符秘訣以為神丹可成而苦無藥物帝賜黄金硃砂雄黄等後合飛丹色如霜雪服之體輕梁書髙宗時道士劉合還丹成而上之咸亨中卒惟有空皮而背上開拆有似蝉脱唐書山人桞泌能合長生藥詔泌居興唐觀煉丹藥通鑑唐憲宗紀傳記成王時濮人獻丹砂周書仙藥之上者丹砂孝經援神契羿請不死之藥於西王母妻嫦娥竊以奔月託身於月是為蟾蜍張衡靈憲丹砂木精得金乃并參同契魏伯陽撰參同契以周易爻象論作丹之意三洞珠囊丹砂朱之朴廣志服之一月三䖝出太上元變經丹砂外包八石内含金精先禀氣於甲受氣於丙出胎見壬結魄成庚太清煉靈丹經丹砂服火化為黄銀能輕能神能黒能白能暗能明一斛人擎力難勝舉萬斤遇火輕速上騰鬼神尋求莫知所在青霞子論馬明王服丹半劑為地仙展轉百餘年乃白日升天也神仙傳魏伯陽與弟子三人作丹成與犬犬死弟子曰先生可服之而死二人下山求𦵏具伯陽即起再以丹納犬及弟子口中皆起仙去葛洪神仙傳變凡為仙丹之力也太平廣記身生羽翼飛行輕舉莫不皆因服丹五靈三使之藥九光七曜之丹神仙大丹異名三十四種出世十三種非世所用二十種孫思邈太清丹經要訣集夫交梨火棗者是飛騰之藥也君侯若能剪除荆棘絶去人我冺是非則二樹生君心中矣亦能開花結實葉茂枝繁食之一枚則景光萬里許逺逰與王逸少書守丹竈而不顧煉金鼎而方堅選别賦方士煉玉液雜體詩安期鍊五石逰山詩逺慙勾漏令不得問丹砂家事丹砂訣杜金丹别後知傳得乞取刀圭救病身韓集淮南王仙去雞犬䑛藥噐以升仙白帖將延金石之夀以煉氷雪之膚吸而蟬脫吞則翼生與我一丸藥光輝有五色服之四五日身輕生羽翼白帖載古詩應得丹霜餌春來黒髪新長生只要一丸丹王建金丹駐少年洞裏丹砂日採還姚合道士補朝官史墨敕以鄭普思為秘書監葉靜能為國子祭酒通鑑唐中宗紀傳記史崇𤣥附太平公主授鴻臚卿朝野僉載唐髙宗時葉静能入直翰林為國子祭酒唐𤣥宗時葉法善授銀青光禄大夫鴻臚卿尹愔拜諫議大夫事物紀原觀宇史公孫卿言仙人好樓居上作蜚亷桂館益夀延夀館通鑑漢武魏主起天師道場㓂謙之重壇五層同上宋营陽王詔山人桞泌居興唐觀煉藥唐憲宗紀傳記列真之宇白帖列仙㳺館同上周穆王尚神仙召尹軌杜仲居終南山尹真人草樓所因號樓觀葢道觀之初也隋煬帝改為𤣥壇後復曰觀事物紀原集精廬陳伯玉集碁聲花院閉幡影石壇髙司空圖詩道士授封傳記後周武帝時衛元嵩封蜀郡公事物紀原唐𤣥宗時葉法善封越國公事物紀原道士賜紫傳記唐中宗神龍初加葉靜能金紫之階未頒紫衣事物紀原朝野僉載曰史崇𤣥附太平公主衣紫羅裙帔唐代宗時李泌乞為道士賜紫衣道士賜紫自李泌始並同上道士賜諡傳記後漢張道陵有天師之稱梁陶洪景死賜諡貞白先生元魏世祖賜冦謙之天師之號唐王知逺贈昇𤣥先生唐𤣥宗賜李含光曰𤣥靜先生並出事物紀原道術子左慈以氣禁水水為逆流一二丈禁水著中庭露之大寒不氷抱朴子史王喬有神術為葉縣令每月晦望自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南飛來於是候至舉網張之但得一雙舄焉乃詔尚方診視則四年中所賜尚書官属履也當朝時掖門下皷不擊自鳴聞於京師王喬傳道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱入尺許以氣吹之便可躍出射去如弩箭之發異苑云趙侯以盆盛水吹氣作禁魚龍立見越方善禁呪也東漢徐登傳注事出抱朴子左慈字元放廬江人也少有神通嘗在司空曹操坐操從容顧衆賔曰今日髙㑹珍羞畧備所少吳松江鱸魚耳元放於下座應曰此可得也因求銅盆貯以水竹竿餌釣於盤中湏臾引一鱸魚出操拊掌笑㑹者皆驚操曰一魚不周坐席可更得乎元放乃更餌鈎沈之湏臾復引出長二尺餘生鮮可愛操使自前鱠之周浹㑹者操又謂曰既已得魚恨無蜀中生薑耳元放曰亦可得也操恐其近即所取因曰吾前遣人到蜀買錦可過勅使者増市三端語頃即得薑還并獲使報命後操使自蜀反驗問増錦之數及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為賫酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸壚悉亡其酒脯矣操懐不喜因坐上收欲殺之慈郤入壁中霍然不知所在或見於市者又捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之走入羊羣操知不可得乃令就羊中告之曰不復相殺本試君術耳忽有一老羝屈前两膝人立而言曰遽如許即競徃赴之而羣羊數百皆變為羝並屈前膝人立云遽如許遂莫知所取焉本傳解奴辜張貂者亦不知其何郡國人也皆能隠淪出入不由門戸奴辜能變易物形以誑幻人又河南有麴聖卿善為丹青符刻厭殺鬼神而使命之又有編肓意亦與鬼神交通觧奴辜傳孟節能含棗核不食可至五年十年又能結氣不息身不動揺狀若死人可至百日半年王貞傳張楷性好道術能作五里霧本傳並東漢吳猛因還豫章江波甚急猛不假舟楫以白羽扇浮水而渡觀者異之順陽樊長賔為建昌令發百姓作官船於建城山中吏命人各作箸一雙幸靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃愈甚靈曰爾若不以情告我今真死矣竊者甚懼乃自首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此已過足但部分未至耳靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神本傳僧渉者西域人也不知何姓少為沙門苻堅時入長安虛静服氣不食五榖日能行五百里言未然之事驗若指掌能以秘咒下神龍毎旱堅使之咒龍請雨俄而龍下鉢中天輒大雨堅與羣臣親就鉢中觀之卒於長安夲傳沙門曇霍者或遺以衣服受而投之於河後皆以還其本主衣無所汚行歩如風雲夲傳晋書傳記費長房遇壺公有神術能縮地脉千里聚在目前放之如舊葛洪神仙傳後漢欒巴漢帝召為尚書正朝大㑹巴獨後到頗有醉色不飲而以酒望西南噀之有司奏巴大不敬詔問巴巴對曰臣鄊里以臣能}
