  - {type: variant, offset: 2278, length: 6, content: 論劉項短長畫, WYG: 庭以向天比明而水以滿盃中汁甘而香美斯實靈人之噐秦始皇時西胡獻切玉刀無復常滿盃耳知此膠之所出從鳳麟洲來劍之所出從流洲並是西海中所有也聚窟洲聚窟洲在西海中申未地地方三千里北接崑崙二十六萬里去東岸二十四萬里上多神仙靈官宫第比門不可勝數及有獅子辟邪鑿齒天塵銅頭鐵額之獸洲上有大山有鳥如人象因名之為人鳥山旁多大樹與楓木相類而林芳葉香聞數百里此為返魂樹亦能自作聲如羣牛吼聞之者皆心振神駭伐其木根置於玉釡之中煮}
