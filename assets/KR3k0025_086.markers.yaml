  - {type: variant, offset: 324, length: 1316, content: 內則好謀而成語述而子兼才尚權右計左數楊重黎群策屈群力同上史裨諶謀於野則獲謀於邑則否左傳靜淵以有謀史記帝頊紀蘇秦恐秦之敗從念莫可使用於秦者乃使人微感張儀陰奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人辭去張儀曰賴君得顯方且報德何故去也舍人曰臣非知君知君乃蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣陰奉給君資盡蘇君之計謀今君已用請歸報張儀曰此在蘇君術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言史本傳范睢曰王不如遠交而近攻得寸則王之寸得尺則王之尺史本傳甘羅年少出一奇計聲稱後世亦戰國之策士也史本傳虞卿料事揣情為趙畫策何其工也史本傳蔡澤謂范睢曰君相秦計不下席謀不出廊廟坐制諸侯君之功極矣史蔡澤傳侯嬴曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之嘗聞公子為如姬報其父仇欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通鑑周紀六奇既用諸侯賓從漢呂之事平為本謀子房計謀圖難於易為大於細並太史公自序有上書告韓信反上問陳平平曰舉兵攻之是趣之戰也陛下第偽遊雲夢其勢必郊迎謁謁而禽之此特一力士之事耳帝以為然遊雲夢信果郊迎武士縳之載後車史陳平世家張良歸漢多病未嘗特將常為畫策通鑑漢高紀張良曰九江王布楚梟將與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可任大事當一面即欲捐之此三人則楚可破也同上轅生說漢王曰願王出武關項王必引兵南走王深壁令滎陽成皋間且得休使韓信等輯河北趙地王乃復走滎陽未晚如此則楚所備者多力分漢得休復與之戰破楚必矣項王聞漢王在宛果引兵南漢堅壁不與戰史記漢高紀陳平自初從至天下定從擊臧荼陳豨黥布凡六出奇計世莫得聞也韓信已破齊使人言曰不為假王恐不能安齊漢王欲攻之留侯曰不如因而立之使自為守乃遣張良操印綬立韓信為齊王史記漢高祖項羽急圍漢王漢王與酈食其謀撓楚權酈生曰陛下誠復立六國後此皆爭戴陛下德義願為臣妾漢王曰善趣刻印酈生未行張良從外來謁漢王具以酈生計告良良曰誰為陛下畫此計者臣請借箸以籌之且夫天下游士離親戚棄墳墓去故舊從陛下者但日夜望咫尺之地今乃立六國後游士各歸事其主從親戚反故舊陛下誰與取天下乎誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印西漢張良傳漢王與齊王信魏相國越期會擊楚信越不至張良曰楚兵且破二人未有分地其不至固宜今能取睢陽以北至榖城皆以王彭越從陳以東傳海與齊王信信家在楚其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破也漢王從之於是韓信彭越皆引兵來通鑑漢高紀太尉復令酈寄與典客劉揭先說呂祿曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起呂祿以為酈況不欺己遂解印屬典客而以兵屬太尉通監漢高紀諸呂擅權陳平患之陸賈曰天下安危注意將相將相和調則士豫附君何不交驩太尉平用其計以五百金為絳侯壽太尉報亦如之兩人深相結諸呂謀益壞前漢陸賈傳陳湯為人沈勇有大慮多策謀西漢本傳經術文雅足以謀王體斷國論西漢薛宣傳互入文雅智略謀慮朝之淵藪東漢伏湛傳互入智愚援謀如湧泉東漢馬援傳勇鷙有智謀東漢吳漢傳儒者當謀謨廟堂後漢虞詡傳諸葛亮勸農講武作木牛流馬運米集斜谷口通鑑魏明紀元齡善謀新唐書杜如晦傳張柬之沈厚有謀能斷大事唐書本傳淄青李正己德宗時畏帝威斷表獻錢, WYG: 蓬萊弱水}
