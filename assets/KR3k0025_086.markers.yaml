  - {type: variant, offset: 3999, length: 267, content: 七尺之軀者權也戰國策互入舍小取大集繫蹄在足則猛虎絕其蹯蝮蛇在手則壯士斷其節陳琳檄聖人不凝滯於物智士必推移於時駱賓王蝮蛇一螫手壯士疾解腕陸龜蒙昔晉侯報楚之功避子玉於三舍捨秦之惠覆孟明於三崤安國庇民大義斯在李文饒集本朝趙閱道知越州時兩浙旱蝗米價踴貴諸州皆立賞禁人增米價閱道獨榜衢路令有米者任增價糶之於是諸州米商輻湊詣越米價更賤聞見錄互入反用其鋒朱敬則曰拯溺不規行療飢非鼎食續世說使聖人無權則無以成天下之務老泉惟聖達節豈復行曾閔之難以民為心則當法舜禹之大東坡慰皇太后上仙表楚公子微服出亡而門者難之其僕操箠而罵曰隸也不力門者出之事有倒行而逆施, WYG: ''}
