  - {type: page-break, offset: 1644, content: '', id: KR3k0025_WYG_086-3a, image: WYG0932/WYG0932-0579c.png}
  - {type: variant, offset: 1645, length: 1, content: 觀, WYG: 與交甫受而懐之趨去數十歩視而懐空無佩顧二女忽然不見列仙傳毛女字玉姜形體生毛秦始皇宫人也秦亡入山道士教食松葉遂不飢寒在華隂山中列仙傳西王母者金王母也厥姓緱氏女子之登仙得道者咸𨽻焉集仙録萼緑華者女仙也上下青衣顔色艷整真誥魯妙典女道士生而好道入九嶷山仙去三洞珠囊謝自然女道士入洞庭山無疾而化有雲鶴之瑞仙去同上女几者陳市上酒婦也随仙人居女几山女仙録麻姑與王方平降於蔡經家麻姑是好女年十八九許於頂上作髻餘髮垂之至腰手似鳥爪神仙傳集飄飄戲九垓選逰仙詩冠霞登綵閣解玉飲椒庭樂府升天行文選神仙排雲出神仙詩風餐委松栢雲卧恣天行升天行飲清岑之玉醴兮餐沆瀣以為糧張衡思𤣥賦遺世翫道絶粒茹芝孫綽天台賦王喬控鶴以冲天應真飛錫以躡虛尋不死之福庭同上聞至人之休風齊天地於一指秋興賦嘘吸冲和吐故納新蟬蜕龍變棄俗登仙東方朔贊至人無已先天地而御六氣列仙神化隘宇宙而遺萬物岑文夲有時驅猛虎虚室使仙童杜詩雲卧逰八極玉顔已千霜李白}
