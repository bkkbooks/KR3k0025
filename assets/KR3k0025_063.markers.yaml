  - {type: variant, offset: 139, length: 5, content: 昔徐偃王軟, WYG: 捈中心之所欲通諸人之㗲㗲者莫如言言心聲也揚子史言身之文也左僖二十八年叔向曰辭之不可以已也如是子産有辭諸侯賴之若之何其釋辭也左襄三十一年貎言華也至言實也苦言藥也甘言疾也商君傳誠有味其言也西漢鄭當時傳臣宣呐鈍于辭鮑宣傳集言語階亂禰正平賦語到磨圭角元微之本朝言不可以不重也子不見鐘鼓乎叩之然後鳴鏗鍧鏜鞳人不以為異也若不叩自鳴人孰不以為妖耶可以言}
