  - {type: variant, offset: 588, length: 10, content: 宗紀士聞鉦鼓聲皆禠氣, WYG: 亦可解紛太史公滑稽傳序楚優孟嘗以談笑諷諫楚荘王有愛馬死使羣臣哀之欲以棺槨大夫禮葬之左右爭之不可孟入殿門仰天大哭曰楚國堂堂何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如曰臣請以雕玉為棺文梓為槨楩楠豫章為題楱發甲卒為穿壙老弱負土齊趙陪立於前韓魏翼衛其後廟食太牢奉以萬戸之邑史記滑稽傳秦二世欲漆城優旃秦倡朱儒曰善漆蕩蕩㓂來}
