  - {type: variant, offset: 181, length: 1, content: 畏, WYG: 子産曰竈焉知天道是亦多言矣左仲尼曰賜不幸而言中是使賜多言者也同上司馬牛多言而躁史記多語耗氣劉洎傳集人有多言者百舌之聲也文粹蛙鼃鳴無謂閤閤祗亂人韓詩言不徒發經弔喪弗能賻不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舎君子問人之寒則衣之問人之饑則食之並記子蝦蟇蛙鼃日夜而鳴舌乾擗然而人不聴之今鶴經時夜而鳴天下振動多言何益惟其言之時也墨子得萬人之兵不如聞一言之當淮南子史東方朔曰談何容易西漢晏子曰君子有信其有以知之矣左昭二年衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微琅琊王澄有髙名每聞玠言輒歎息絶倒晉書傳記謝太傅一生言未嘗誤世説集不知言之人烏可與言韓文善於言語經言滿天下無口過孝出其言善則千里之外應之易辭之輯矣民之洽矣辭之懌矣民之莫矣詩子贈人以言重於珠玉荀子魯哀公欲西益宅史爭之以為西益宅不祥哀公作色而怒左右數諌不聴乃以問其傅宰折睢曰吾欲西益宅而史以為不祥子以為如何宰折睢曰天下有三不祥西益宅不與焉哀公大悦而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾無止二不祥也不聴强諌三不祥也哀公黙然深念憤然自反遂不敢西益宅淮南子史楚子玉請戰晉欒枝對曰楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不𫉬命矣敢煩大夫謂二三子敬爾君事詰朝相見左僖二十八年君子曰仁人之言其利博哉晏子一言而齊侯省刑左昭三年晉叔向適鄭鄭鬷蔑立于堂下一言而善叔向曰子若無言吾㡬失子言之不可以已也如是同上趙王新立秦急攻趙趙求救于齊齊曰必以長安君為質兵乃出太后不肯大臣强諫后曰復言者老婦必唾其面左師觸龍見后盛氣而待之左師曰老臣賤息舒祺竊愛之願及未填溝壑而託之太后曰丈夫亦愛少子乎曰甚於婦人老臣竊以為媪之愛燕后賢於長安君太后曰不若長安君之甚左師曰父母愛子則為之計深逺今媪尊長安君之位而不及今令有功于國一旦山陵崩長安君何以自託于趙老臣以媪為長安君之計短也太后曰諾恣君之所使之於是質於齊史趙世家王澄曰胡毋彦國吐佳言如鋸木屑霏霏不絶後進領袖也樂廣善談論每以約言析理以厭人之心並晉書趙王閒出為燕軍所獲燕將囚之欲求割地使者往請燕輒殺之有厮養卒走燕壁見燕將曰君知張耳陳餘何欲曰欲得其王耳趙養卒笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面而王豈欲為卿相終已耶今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕况以兩賢王左提右挈而責殺王之罪滅燕易矣燕將乃出趙王養卒為御而歸秦紀焦和清談干雲東漢孔公緒清談髙論噓枯吹生同上曹操執陳宫曰奈卿老母何曰宫聞以孝治天下者不害人之親老母存否在明公不在宫也操曰奈卿妻子何宫曰臣聞施仁政於天下者不絶人之祀妻子存否在明公不在宫也漢獻紀孔融髙談清雅盈溢官曹可玩而誦東漢雍州言新豐縣東南有山踴出俞文俊上書天氣不和而寒暑併人氣不和而疣贅生地氣不和而堆阜出今陛下以女處陽位反易剛柔故地氣隔塞而山變為災陛下謂之慶山臣以為非慶唐武后李昭徳言于太后曰天皇陛下之夫皇嗣陛下之子陛下身有天下當傳之子孫為萬代業豈得以姪為嗣乎自古未有姪為天子姑立廟者也同上上謂李泌曰今用卿欲與卿有約卿慎勿報仇有恩者朕當為卿報之對曰臣素奉道不與人為讐李輔國元載皆害臣者今自斃矣素所善及有恩者率已顯逹或零落臣無可報也泌曰李晟馬燧有大功于國聞有讒之者雖陛下必不聴然臣今日對二人言之欲其不自疑耳晟燧富貴已足苟陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之故臣願陛下勿以二臣功大而忌之二臣勿以位髙而自疑則天下永無事矣晟燧皆起泣謝唐徳宗帝苦溽暑命宫苑使王允平别建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足然陛下雖欲營繕終不可得乃遣中使語之曰今嵗盛暑異常朕昔在河上與梁人相距行營卑濕被甲乘馬親當矢石猶無此暑今在深宫之中而暑不可度奈何對曰陛下昔在河上勍敵未滅深念讐恥雖有盛暑不介聖懐今外患已除海内賔服故雖珍臺閒館猶覺欝蒸也陛下儻不􅁯艱難之時則暑氣自消矣帝黙然唐荘宗以三寸舌為帝者師賈山借秦為諭名曰至言並西漢失言經白圭之玷尚可磨也斯言之玷不可為也詩不可與言而與之言失言言未及之而言謂之躁未見顔色而言謂之瞽並語子未同而言觀其色赧赧然士未可以言而言是以言餂之也可以言而不言是以不言餂之也孟子餂音忝謂取之也一言而非駟馬不能追鄧析子交淺而言深亂也淮南子史墜言於呉西漢鄒陽傳蘇林曰墜失也闗内大雨四十餘日京師民相驚言大水至百姓奔走大将軍鳳以為太后與上及後宫可御船令吏民上長安城以避水王商獨曰何因當有大水暴至此必訛言也有頃長安中稍定問之果訛言鳳大慚自恨失言通鑑漢成紀王渾妻鍾氏嘗與渾共坐子濟趨庭而至渾欣然曰生子如此足慰人心琰笑曰鍾氏名琰若新婦得配參軍渾弟生子固不當如此耳晉書列女傳傳記出言不審駟馬不能追也世説失問子魯侯欲以孔子為司徒将召三桓而議之左丘明曰周人有愛裘而好珍羞者欲為千金之裘而與狐謀其皮欲為少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉符子史内史叔興曰君失問是隂陽之事非吉凶所生左僖十年董仲舒曰昔魯君問栁下惠吾欲代齊曰不可歸曰伐國不問仁人此言何為至於我哉前漢集晉文公既受原於王而難其守問寺人勃鞮以畀趙衰余謂守原政之大也不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣嗚呼得賢臣守大邑則問非失舉也盖失問也然猶羞當時陷後代况於問與舉又兩失者柳文持論經出言有章詩史議論通古今喟然動衆心西漢鮑宣傳為人長美言西漢郊祀志馬援善述前事皇子諸王聞者皆屬耳忘倦後漢子真持論感起昏俗東漢崔寔傳衛玠好言𤣥理遇有勝日親友時請一言無不咨嗟以為入微晉書岑文本謂所親曰馬君論事㑹文切理無一言可損益聴之纚纚令人忘倦蘇張終賈應止此耳唐書李徳裕謀議援古為質滚滚可喜本傳集置言成範選昭王碑立言必雅選集序議論有餘地杜詩持論峯巒峻劉賔客談辯附游説子公孫龍困百家之智窮衆口之辯荘子史有君子甚口左昭二十六年談辯如濤侯公天下辯士所居傾國史記項羽紀毛遂至楚定從而還平原君歎曰毛先生以三寸之舌强百萬之師史記淳于髠多辯數使諸侯未嘗屈辱史滑稽傳齊田單攻聊城不下魯仲連乃為書約之矢以射城中遺燕将書曰吾聞之知者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身忘聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣説士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同燕将見魯連書泣三日乃自殺聊城大亂田單遂屠聊城史記魯仲連飾辯辭設詐謀馳逐於天下以要時勢者謂之游説漢紀荀悦齊王使淳于髠獻鵠於楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺股絞頸而死恐人之議吾王以鳥獸之故令士自殺傷也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過楚王曰善齊王有信士史滑稽傳六國既定從張儀能明其説復解散諸侯太史公自序陸賈天下名為有口辯士使南越尉佗曰越中無足與語至生來令我日聞所不聞賜千金稱臣奉漢約史本傳隋何曰陛下使何淮南至如陛下之意是使何之功賢於歩卒五萬騎五千也史記漢王復使侯公往説項王項王乃與漢約中分天下割鴻溝以西者為漢鴻溝以東者為楚項王許之即歸漢王父母妻子漢王乃封侯公為平國君曰此天下辯士所居傾國故號為平國君史記項羽紀言若懸河通鑑隋煬帝陳餘遺章邯書曰白起為秦将南征鄢郢北伐馬服攻城畧地不可勝計而竟賜死蒙恬為秦将北逐戎人開榆中地數千里竟斬陽周有功亦誅無功亦誅通鑑秦紀游説隋何至九江王見之隋何曰漢王使臣敬進書大王御者竊怪大王與楚何親也楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣請與大王提劍歸漢漢王必裂地而封大王又况九江必大王有也九江王曰請奉命通鑑漢髙紀游説辯士蒯徹説信曰且酈生一士伏軾掉三寸之舌下齊七十餘城将軍以數萬衆嵗餘乃下趙五十餘城為将數嵗反不如一豎儒之功乎同上蒯徹知天下權在信乃説信曰盖聞天與弗取反受其咎時至不行反受其殃韓信曰漢主遇我甚厚吾豈可以鄉利而背義乎蒯生曰始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事常山王殺成安君泜水之南}
