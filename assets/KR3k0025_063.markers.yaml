  - {type: variant, offset: 906, length: 363, content: 王柰何不行子嬰子剌殺高於齊宮通鑑秦紀讀秦紀至於子嬰車裂趙高未嘗不健其決史記秦始皇本紀斷決敢行鬼神避之史李斯傳操刀必割西漢賈誼疏互見投機決斷狐疑分別猶豫同上劉向傳趙廣漢見事風生無所回避率多果敢之計莫為持難通鑑漢宣帝紀孟賁之狐疑不如童子之必至西漢蒯通傳互見無斷決者智之君也東漢馮衍傳得策輒行應變無窮通鑑漢獻帝紀惟坐待亡孰與伐之蜀志諸葛亮後出師表王敦嘗昏淫於色左右諫之敦曰此甚易耳乃開後閤驅諸妾數十人並放出之晉書本傳苻堅曰築室道旁無時可成吾當內斷於心耳通鑑晉成帝紀吐突承璀修安國寺奏立聖德碑高大一準華嶽碑先構碑樓李絳上言承璀適在旁上命拽倒碑樓承璀言甚大不可拽請徐毀撤冀得延引乘間再論上厲聲曰多用牛拽之承璀乃不敢言凡用百牛拽之乃倒同上唐憲宗傳記削株掘根無與禍鄰戰國策集如風行雨施有往而無返也白傳集子鄧析操兩可之說列子力命史灌夫首鼠兩端, WYG: 已然諾}
