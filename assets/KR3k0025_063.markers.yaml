  - {type: variant, offset: 536, length: 2, content: 緩急, krp: 下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳趙清獻獨折之曰君言失矣臯契之時有何書可讀荆公黙然邵氏晉謝朓知吏部選事有姓譚者乞官朓曰齊桓滅譚那得有君對曰譚子奔莒所以有僕丁用晦芝田錄强辯經禦人以口給屢憎於人語子困百家之知窮衆口之辯荘子秋水强足以拒敵辯足以飾非荘子盜蹠趙公孫龍為堅白異同之辯荀子後序史辭勝於理終必受屈通鑑周紀言足以飾非史記殷紀反言易辭而成文章劉向説苑杜周為廷尉史客曰君為天下决平不循三尺法專以人主意指為獄周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎西漢本傳持詭辯以中人西漢趙王彭祖傳孫楚欲隱居謂王濟曰欲枕石漱流誤云漱石枕流濟曰流}
  - {type: variant, offset: 540, length: 1, content: 倚, WYG: 枕石非可漱楚曰所以枕流欲洗其耳所以漱石欲厲其齒晉書本傳梁蕭琛御宴醉伏武帝以棗投琛琛仍取栗擲上正中面帝曰豈有説耶即對曰陛下投臣以赤心臣敢不報以戰栗南史傳記殷浩語孫安國曰卿莫作强口馬世説唇吻經尚口乃窮也易截截善諞言書口費而煩易出難悔記緇衣口多空言包煩數也子摇唇鼓舌荘子士憎兹多口孟子史釋本而事口舌史蘇秦傳息夫躬既親近數進見言事論議無所避衆畏其口見之側目上疏歴詆公卿大臣曰丞相王嘉健而蓄縮不可用御史大夫賈延堕弱不任職左将軍公孫祿司𨽻鮑宣皆外有直項之名内實騃不暁政事諸曹以下樸遫不足數西漢本傳嗇夫喋喋利口捷給前漢張釋之傳以舌得官西漢婁敬傳灌夫罵坐西漢本傳陳湯利口不軌西漢翟方進傳好訾毁西漢地理志一尊之身三期之間乍賢乍佞豈不甚哉通鑑漢成紀尊王尊也樊伷頗能弄唇吻而實無才略通鑑漢獻紀漢桓帝末年甘陵有南北黨人之議中外承風競以臧否相尚自公卿以下莫不畏其貶議通鑑東漢好議論人長短妄是非正法東漢馬援傳品覈公卿裁量執政東漢黨錮傳集街談巷議彈射臧否剖析毫釐擘肌分理所好生毛羽所惡成創痏東京賦一心百舌何紛紜文粹舌端萬變乘春輝同上利嘴迎人㸔不得劉賔客弄口鳴舌百葉書抄巧言經無以利口亂厥官書盜言孔甘亂是用餤詩巧言如簧顔之厚矣同上巧言亂徳語子惡利口恐其亂信也孟子史巧言醜詆西漢劉向傳李林甫忌文學士啗以甘言而隂陷之通鑑}
