  - {type: variant, offset: 177, length: 2, content: 抱仆, WYG: 白氏六帖多言經躁人之辭多易小人先言詩子多言數窮老子禍莫大于多言文中子多言徳之賊也多言不可與逺謀機易泄並同上人有多言猶百舌之聲也淮南子蝦蟇蛙鼃日夜而鳴舌乾擗然而人不聴之今鶴經時夜而鳴天下振動多言何益惟其言之時也墨}
