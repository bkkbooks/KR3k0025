  - {type: variant, offset: 201, length: 2, content: 似鼠, WYG: 子則否齊侯曰何恃而不恐對曰恃先王之命楚伍參曰事之捷孫叔為無謀矣不捷參之肉将在晉軍可得食乎楚子問鼎之大小輕重周王孫滿對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周徳之休明雖小重也其姦回昏亂雖大輕也成王定鼎于郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也宋子明謂桐門右師曰吾猶衰絰而子擊鐘何也右師曰已衰絰而生子余何故舎鐘並左傳口對應響無窮者史張釋之傳王孫圉聘于晉趙簡子問曰楚之白珩為寳㡬何曰楚之所寳者曰觀射父能作訓辭左史倚相能道訓典此楚國之寳也若}
