  - {type: variant, offset: 764, length: 141, content: 昭十五去疾莫如盡左哀元衛鞅欲變法言於秦孝公曰夫民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於眾通鑑周紀毛遂曰利害兩言而決耳同上子嬰與其子二人謀曰丞相高殺二世望夷宮恐群臣誅之乃詐以義立我今使我齊見廟此欲因廟中殺我我稱疾不行丞相必來來則殺之高使人請子嬰數輩子嬰不行高果自往曰宗廟重, WYG: 載貫髙}
