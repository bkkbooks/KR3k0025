  - {type: variant, offset: 542, length: 1, content: 長, WYG: 𤣥宗紀謗訕經惡居下流而訕上者語史入則心非出則巷議史記秦始皇敢為妖言以亂黔首同上不入言而腹非西漢食貨志流言飛文譁於民間前漢反唇腹誹南史楊震曰損辱清朝塵㸃日月通鑑東漢本朝日月遭虧蔽歐公詩謗毁經流言于國書叔}
