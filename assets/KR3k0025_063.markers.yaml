  - {type: variant, offset: 545, length: 1, content: 忌, WYG: 徳通鑑晉武紀樂毅王佐而被謗晉書邢邵善屬文洛中貴人拜職多憑邵作謝表章有一貴勝初授官袁翻與邵俱在坐翻意主人託其為謝表命邵作之翻不悦每告人云邢家小兒當客作表自買黄紙冩送之北史先是䇿賢良李宗閔牛僧孺皇甫湜條對甚直考第其䇿同居第三權幸惡其詆己而不中第者乃注解其䇿同為唱誹唐書}
