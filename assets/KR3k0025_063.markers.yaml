  - {type: variant, offset: 586, length: 1, content: 唐, WYG: 五代髙祖紀窮治楚王英獄御史寒朗曰歸舎口雖不言仰屋竊歎通鑑後漢集鉗口卷舌江文通書正言不發萬國如封元次山諤諤非周舎容容類胡廣徐陵與楊遵彦書惜身不言仰屋竊歎李深之文滑稽經謔浪笑傲善戲謔兮不為虐兮並詩子艾子見老嫗衣衰哭甚艾子曰嫗夫誰也曰彭祖艾子曰彭子夀八百而死固不為短可以無恨嫗曰然又有夀九百而不死者豈不恨耶艾子艾子海上見一物圜而􅄶且多足曰蝤蛑也又一物差小曰螃蠏也又有一物其状亦類前所見而形劇小曰彭越也艾子曰所謂一蠏不如一蠏也同上依隱玩世詭時不逢其滑稽之雄乎揚子史談言微}
