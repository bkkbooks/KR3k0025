  - {type: variant, offset: 600, length: 2, content: 授甲, WYG: 上即欲就之易為漆耳顧難為䕃室二世笑之同上秦樗里子滑稽多智秦人號曰智囊史記東方朔滑稽之雄西漢本贊朔紿侏儒曰上以若曹無益於縣官耕田力作固不及人臨衆處官不能治民従軍擊虜不任兵事無益於國用徒索衣食今欲盡殺若曹侏儒大恐西漢東方朔傳滑稽則東方朔枚臯西漢公孫𢎞等贊東方朔曰朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十侏儒飽欲死臣朔饑欲死上大笑西漢本傳初曹操攻屠鄴城袁氏父子多見侵掠而操子丕私納袁熈妻甄氏融乃與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大将軍逺征蕭條海外昔肅慎不貢楛矢丁零盜蘇武牛羊可并案也東漢孔融傳初習鑿齒嘗與孫綽共行綽性通率好譏調時綽在前顧鑿齒曰沙之汰之瓦礫在後鑿齒曰簸之颺之糠粃在前晉書太傳始有東山之志桓公見藥中有逺志公問謝此藥又名小草何以一物異稱謝未即答郝參軍答曰處則為逺志出則為小草謝公殊有愧色世説鄧艾口吃語稱艾艾晉文王戯云艾艾為是㡬艾鄧答曰鳳兮鳳兮故是一鳳桓南郡與殷荆州作危語桓曰矛頭淅米劍頭炊殷曰百嵗老翁攀枯枝顧愷曰井上轆轤安嬰兒殷有一參軍在坐曰盲人騎瞎馬夜半臨深池殷曰咄咄逼人仲堪眇目故也並同上沈昭畧性狂見王景文子約曰汝是王約也何乃肥而癡約曰汝沈昭畧也何乃痩而狂昭畧大笑曰痩己勝肥狂又勝癡宋書何承天除著作郎時年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母同上節度李忠臣因奏對徳宗謂曰卿耳甚大貴人也忠臣曰臣聞驢耳甚大龍耳極小臣耳雖大乃驢耳也上悦之}
