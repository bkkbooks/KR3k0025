  - {type: variant, offset: 544, length: 0, content: '', WYG: 武叔毁仲尼語子昔直不疑未嘗有兄而讒者謂其盜嫂第五倫三娶孤女而世人稱其笞婦翁此聴虛而責響悖情倒理誣罔之甚也劉子史鄭子産作丘賦國人謗之曰其父死於路已為蠆尾左傳有蜚語為惡言聞上史灌夫傳灌夫謂李賢曰平生毁程不識不直一錢西漢灌夫傳論議不右方進西漢翟方進傳師古曰毁短也孔子大聖不免武叔之毁子路至賢猶有伯寮之愬東漢列女傳横被口語西漢楊惲傳羊祜不附結王戎王衍二人多毁祜時人為之語曰二王當國羊公}
