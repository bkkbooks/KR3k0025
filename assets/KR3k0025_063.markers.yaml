  - {type: variant, offset: 158, length: 1, content: 失, WYG: 至言也東坡謹言經山下有雷頥君子以愼言語擬之而後言並易猶胥顧于箴言其發有逸口書愼爾出話君子無易由言耳屬于垣並詩君子寡言而行以成其信記君子於其言無所苟而已矣語子多言數窮不如守中老子言有召禍揚子后稷之廟有金人焉三緘其口而銘其背曰古之謹言人也無多言多言多敗口是禍之門家語口可以食不可以言谷子言而非仁之中也則其言不若其黙也其辯不若其呐也荀子非相言語在口譬含鋒刄不可動故天有卷舌之星人有緘口之銘列子言出不復追其猶射也懸機未發則猶可止矢一離弦雖欲反之不得也言者風也無足而行無翼而飛不可易}
