  - {type: variant, offset: 667, length: 5, content: 柔情易遷孔, WYG: 祖廣行常縮頭詣桓南郡始下車桓曰天甚晴明祖叅軍如従屋漏下來續世説談詞最詼諧發辯如有神臨川郭祥正出詩一軸示東坡先自吟誦聲振左右謂坡曰􅖤正此詩㡬分來坡曰十分祥正驚問之坡曰七分是讀三分是詩王直方詩話張子野以樂章擅名一時宋子京往見之先令人戯曰尚書欲見雲破月來花弄影郎中子野屏後呼曰得非紅杏枝頭春意閙尚書耶國子博士郭忠恕嘗嘲司業聶崇義云近貴全為聵攀龍只是聾雖然三箇耳其奈不成聰崇義答曰莫笑有三耳全勝蓄二心陳亞性滑稽知潤州幕中有上官弼亞所親信任滿将去亞曰何以見教弼曰郎中才行無玷但調謔過差亞笑曰君乃上官弼也如下官口何弼笑而去進士李居仁盡摘白鬚其友驚曰昔日皤然一翁今則公然一婆並遯齊閒覽善滑稽巧發微中旁人抵掌絶倒而㓜安淡然不變色也東坡集石昌言字㓜安蔡君謨戯陳亞曰陳亞有心終是惡陳曰蔡襄無口便成衰張師正倦㳺録黄魯直戱東坡曰昔右軍字為換鵞字韓宗儒性饕每得君一}
