  - {type: punctuation, offset: 528, content: 《, id: KR3k0025_CHANT_063-bkkpn172}
  - {type: variant, offset: 528, length: 0, content: '', WYG: 無道之君乎對曰一拜一起未足為勞蜀志鍾㑹造嵇康康不為之禮良久㑹去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去晉書嵇康傳時梅陶鍾雅數説事祖納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如搥持我鈍搥捶君利錐皆當摧矣陶雅並稱有神錐不可得搥納曰假有神錐必有神搥晉書祖納傳袁宏有逸才謝安常賞其機對辯速後宏出為東陽郡安欲以卒廹試之臨别執其手顧左右取一扇授之宏輒曰當奉揚仁風慰彼黎庶晉書顧悦之與簡文帝同年而髪早白帝問其故對曰松栢之姿經霜猶茂蒲栁之質望秋先零晉書本傳孫綽作天台賦示范榮期曰卿試擲地當作金聲榮期曰恐此金石非中宫商同上何承天除著作郎年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母承天曰卿當云鳳凰将九子妳母何言耶宋書文帝嘗與羣臣臨天泉池帝垂綸良久不獲王景文越席曰臣以為垂綸者清故不獲貪餌何偃謂劉瑀曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不着鞭使到千里答曰一蹴造青雲何至與駑馬爭路並同上周盤龍為散騎常侍齊武帝戲之曰卿着貂蟬何如兠鍪對曰此貂蟬從兠鍪中生耳齊書本傳後梁蕭巋降周武帝自彈琵琶令巋舞周武曰梁王乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸後梁書東魏以楊愔典選令史唱名誤以盧士深為士琛深自言其名愔曰盧郎潤朗所以加玉三國典畧互入因誤成誤論難鋒生随方占對北史徐廣傳顔師古仕隋為尉楊素見其年弱曰劇縣子何以治之師古曰割雞焉用牛刀隋書占對華敏唐書宇文融神悟警敏應對如響雖天子不能屈}
