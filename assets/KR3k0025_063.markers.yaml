  - {type: 'tls:seg', offset: 536, content: '', id: KR3k0025_CHANT_063-3a.74}
  - {type: variant, offset: 536, length: 2, content: 緩急, WYG: 下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳趙清獻獨折之曰君言失矣臯契之時有何書可讀荆公黙然邵氏晉謝朓知吏部選事有姓譚者乞官朓曰齊桓滅譚那得有君對曰譚子奔莒所以有僕丁用晦芝田錄强辯經禦人以口給屢憎於人語子困百家之知窮衆口之辯荘子秋水强足以拒敵辯足以飾非荘子盜蹠趙公孫龍為堅白異同之辯荀子後序史辭勝於理終必受屈通鑑周紀言足以飾非史記殷紀反言易辭而成文章劉向説苑杜周為廷尉史客曰君為天下决平不循三尺法專以人主意指為獄周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎西漢本傳持詭辯以中人西漢趙王彭祖傳孫楚欲隱居謂王濟曰欲枕石漱流誤云漱石枕流濟曰流}
