  - {type: variant, offset: 173, length: 3, content: 格兕虎, WYG: 慎為鍵以忍為閽可以多食不可多言口兵之起其刑渥焉並同上徒見婁敬掉而獲爵不見魏其齰以可悲李徳裕不知言之人烏可與言韓文寡言經吉人之辭寡易君子約言記史顧雍為丞相平尚書事雍為人寡言吳主亦曰顧公在坐使人不樂其畏憚如此吳志徐羡之風度詳整時然後言晉恭紀王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之阮千里見戎戎問曰聖人貴名教老荘明自然其㫖同異瞻曰将無同戎即辟之時謂之三語掾並晋書謝安嘗稱美王濛云王長史語甚不多可謂有令音晉王濛傳衛玠多病體羸母常禁其語遇有勝日親友時請一言無不咨嗟以為入微瑯琊王澄有髙名毎聞玠言輙歎息絶倒衛玠傳傳記吉人之辭寡若含鋒刄而不敢動}
