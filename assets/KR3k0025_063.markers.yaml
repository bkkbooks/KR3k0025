  - {type: variant, offset: 532, length: 1, content: 懦, WYG: 許敬宗孫伯彦昻之子也敬宗晩年}
  - {type: variant, offset: 532, length: 1, content: 懦, krp: 許敬宗孫伯彦昻之子也敬宗晩年}
  - {type: variant, offset: 534, length: 1, content: 更, WYG: 復下筆凡大典册悉伯彦為之常戲昻曰吾兒不及若兒答曰渠父不如昻父新唐書姦臣本傳盧坦為河南尉杜黄裳為尹召坦立堂下曰某家子與惡人游破産盍使察之坦曰凡居官亷雖大臣無厚蓄其能多積蓄者必剝下以致之如其子孫善守是天富不道之家也不若恣其不道以歸於人坦以為宜故不察黄裳驚視新唐書盧坦傳其後李翺作坦傳云吏河南知其捕盜黄裳為河南尹謂坦曰某家子與惡人游破舊産公為捕盜盍察之也坦仰曰凡居官始終㢘白祗入俸錢者雖歴大官亦無厚蓄以傳其能多積財者必剝下以致如其子孫善守之下同見李翺文集髙宗出獵遇雨因問諫議大夫吾那律曰油衣若為不漏對曰以瓦為之必不漏矣新唐書本傳陸機詣武子武子前置數斗羊酪指示陸曰江東何以敵此陸曰有千里蓴羮但未下鹽䜴耳時人以為名對世説孫綽齋前種一株松髙世逺時亦鄰居語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓栁雖合抱亦何所施客有問陳季方曰足下家君有何功徳而荷天下重名季方曰吾家君譬如桂樹生於泰山之阿上有萬仞之髙下有不測之淵上為甘露所沾下為淵泉所潤當此之時焉知泰山之髙淵泉之深不知有功徳與無也並同上衛玠見阮瞻嘲之曰一言可辭何假三阮曰苟是天下名望可無言而辟何假於一言衛玠别傳集應對如轉圜杜詩本朝王荆公初參政}
