  - {type: variant, offset: 183, length: 3, content: 畏尾身, krp: 足異處此二人相與天下至驩也然而卒相擒者何也患生於多欲而人心之難測也通鑑漢髙紀立秦南海尉趙佗為南粤王使陸賈即授璽綬與剖符通使通鑑漢恵紀游説隋何至九江見英布曰臣請與大王提劍而歸九江王曰奉命楚方責布發兵何直入曰九江王已歸漢楚何以得發兵殺楚使西漢本傳飛談卷霧晉書韓伯傳贊裴遐善言𤣥理音辭清暢冷然若琴瑟嘗與河南郭象談論一座嗟服晉書單子春謂管輅曰吾欲自與卿旗鼓相當於是論難鋒起而輅答對之皆有餘至日暮魏志裴頠辭論豐博時人謂頠為言談之林藪晉書本傳裴楷善宣吐左右屬目聴者忘倦同上謝靈運辭義鋒起王惠嘗與之談荀伯子曰靈運固自蕭散直上王郎有如萬頃波焉宋書鄭元璹口伐可斥唐書本傳傳記抵掌而談戰國䇿裴僕射善談名理渾有雅致張茂先論史漢靡靡可聴世説郭子元言議如懸河瀉水注之不竭裴公之談終日不絶同上戰國駟説雲踴人持弄丸之辯家挾飛鉗之術劇談者以譎誑為宗利口者以寓言為主若史記載蘇秦合從張儀連衡范睢反間而相秦魯連解紛而全趙知㡬史通田駢好談論時號曰天口十畧集劇談戯論扼腕抵掌左太冲蜀都賦四海齊鋒一口所敵魏賦剖析毫釐擘肌分理選西京賦飛辯騁辭選薦表離堅合異之談選序片言而求三輔一説而定五州選䇿文辯析天口選令辯言之艷能使窮澤生流枯木發榮選行状飛辯騁辭溢氣坌涌解疑釋結臨敵有餘孔文舉薦禰衡表髙談雄辯驚四筵杜詩談論淮湖渀同上髙談滿四座李太白集詞鋒犀利劉賔客談笑多味詞鋒不可摧並同上辯如懸河文粹五岳為詞鋒}
