  - {type: variant, offset: 526, length: 1, content: 任, WYG: 免駁放通鑑唐紀太后召徐有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大徳太后黙然通鑑唐武后李希烈謀稱帝遣人問儀於顔真卿對曰老夫嘗為禮官所記惟諸侯朝天子禮耳通鑑唐徳宗紀命蕭復充山南等道宣慰安撫劉従一及朝士往往奏留復上謂陸贄曰朕謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨累日意復悔行使之論奏耶贄奏云蕭復若相屬求則従一等何為容隠従一等稍自回互則蕭復不當受疑陛下何憚而不辯明乃直為悵恨也同上先主以伊籍使呉孫權聞其才辯欲逆折以辭籍適入拜權曰勞}
