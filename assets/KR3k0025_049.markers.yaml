  - {type: variant, offset: 3347, length: 0, content: '', WYG: 文公不貪伐原之利魏文侯不棄虞人之期秦孝公不廢徙木之賞周紀肥義曰死者復生生者不愧吾言已在前矣史記趙世家信如尾生與女子期於梁下女子不來水至不去抱柱而死史記蘇秦傳相然信死前漢張耳傳一邑一鄉不可以無信西晉世祖羊祜為鎮南每與吳人尅日戰而不為掩襲之計晉書陸羽與人期雨雪虎狼不避也衛大經口無二言並唐本傳趙鳯曰帝王心存大信固不必刻之金石也後唐明宗傳記吳起與故人期食不至起終日不食來乃食踐言諾責並白氏帖魏文侯與虞人期獵其日飲酒樂天雨文侯曰雖樂豈可無一㑹期哉戰國䇿集共秉延州信無慚}
