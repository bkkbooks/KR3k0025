  - {type: variant, offset: 3348, length: 0, content: '', WYG: 路諾然諾之信重於布言豚魚不爽並昭明文選海嶽尚可傾吐諾終不移李太白玉無改行金不如諾李義山無信經大無信也詩經桓王失信諸侯背叛詩序君子屢盟亂是用}
