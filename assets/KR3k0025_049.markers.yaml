  - {type: variant, offset: 3353, length: 20, content: 未契託年少當面輸心背面笑杜詩反掌背面天遼, WYG: 盟楚衷甲子木曰晉楚無信乆矣茍得志焉用信太宰曰令尹將死矣求逞志而棄信若可尋也亦可寒也是食言多矣能無肥乎晉楚無信我安得有信不實其言並左記纂淵}
