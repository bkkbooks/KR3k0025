  - {type: variant, offset: 583, length: 264, content: 為康王諸侯耳不足與方臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也元鼎四年齊人公孫卿曰黃帝仙登于天黃帝採首銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝上騎龍與群臣後宮七十餘人俱登天於是天子曰嗟夫誠得如黃帝吾視棄妻子如脫屣耳元封二年公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城遂至東萊宿留之數日無所見見大人跡云公孫卿言仙人好樓居於是上令長安作蜚廉觀甘泉作益壽延壽觀持節設具而候神人天子病鼎湖甚巫醫無所不致不愈游水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君言曰天子無憂病病少愈強與我會甘泉病良已置酒壽宮神君非可得見聞其言, WYG: ''}
