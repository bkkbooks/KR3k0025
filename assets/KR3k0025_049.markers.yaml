  - {type: 'tls:seg', offset: 2126, content: '', id: KR3k0025_CHANT_049-7a.53}
  - {type: variant, offset: 2127, length: 0, content: '', WYG: 御坐則承御大夫取以進及行本將進承御欲取之行本抗聲謂承御曰筆不可得帝驚問之曰臣既不佩承御刀承御亦焉取臣筆隋書王世充以國子助教吳人陸徳明為漢王師令𤣥恕就其家行束脩禮徳明恥之故服巴豆散卧稱病𤣥恕入跪牀下對之遺利竟不與語唐髙祖太宗謂尉遲敬徳曰公心如山岳雖積金至斗知公不移}
  - {type: page-break, offset: 2127, content: '', id: KR3k0025_WYG_049-59a, image: WYG0931/WYG0931-0354c.png}
  - {type: variant, offset: 2127, length: 0, content: '', krp: 御坐則承御大夫取以進及行本將進承御欲取之行本抗聲謂承御曰筆不可得帝驚問之曰臣既不佩承御刀承御亦焉取臣筆隋書王世充以國子助教吳人陸徳明為漢王師令𤣥恕就其家行束脩禮徳明恥之故服巴豆散卧稱病𤣥恕入跪牀下對之遺利竟不與語唐髙祖太宗謂尉遲敬徳曰公心如山岳雖積金至斗知公不移}
  - {type: variant, offset: 2128, length: 1, content: 前, WYG: 又謂尉遲敬徳曰朕欲以女妻卿何如敬徳叩頭謝曰臣妻雖鄙陋相與共貧賤乆矣臣雖不學聞古人富不易妻並同上段志𤣥與宇文士及勒兵衛章武門太宗夜遣使至二將軍所士及披户内使志𤣥拒曰軍門不夜開使者示手詔志𤣥曰夜不能辨不納比曉帝歎曰真將軍也周亞夫何以加唐書本傳太平公主與僧寺爭碾磴雍州司户李元絃判歸僧寺雍州刺史竇從一大懼亟命元絃改判元絃大署判後曰南山可移判不可摇從一不能奪唐中宗李商隠遷廣州都督及還人或褏金以贈商隠曰吾自性分不可易非畏人知也唐書本傳不移如山唐書陸贄傳栁渾與張延賞同為相怙權嫉渾守正俾其所厚謂渾曰相公舊徳但節言於廟堂則重位可乆答曰為吾謝張相公栁渾頭可㫁舌不可禁唐書秉心蹈義鐡心石腸唐郭子儀傳御史大夫髙元裕欲薦用韋澳諷澳謁已澳曰然恐無呈身御史唐書韋澳傳傳記伯成耦耕不慕諸侯之榮原憲桑樞不易有官之宅世説上集操愈堅而不衰楚辭每以清白洗心不為寒暑變節陳子昻傳甘心苦節風雨不改同上處屯而必行其道居陋而不改其度張九齡文昔聞陳仲子守義辭三公身賃妻織屨樂亦在其中豈無貧賤苦羞與傾巧同張説之松柏雖居寒羞逐桃李春李太白不學蒲栁凋真心常自保同上道勝於内者物莫能亂徳充於外者事不能誘寜方為皂不圓為卿寜方為汚辱不圓為顯榮河漢不改色杜詩江流石不轉君㸔磊落士不肯易其身唐元次山抗哉巢由志堯舜不可遷金石有銷鑠肺肝無寒温旋風四面起井深波不生堅氷一時合井深凍不成終年汲引絶不耗復不盈五月金石鑠既寒亦既清易時不易性改邑不改名君門客如水日夜隨勢行君㸔守心者井水為君盟玉色深不變井水撓不移並元稹集若俛首帖耳摇尾而乞憐者非我之志也韓退之人生豈草木寒暑移此心韋應物志為飲堅氷玉貞而折不能瓦合鸞鍜而萎不同雞羣並劉賓客金石自銷鑠玉性肯磷緇星霜屢變金石彌堅並白侍郎玉立於磷緇之際雞鳴於風雨之中靜柯勁草在我而已李義山集直不枉尺正不由徑同上人或歎曰千乗之邑非無好事者家日欲擊鮮為具以飽君者多矣君獨閉關而不出率空腹貯古聖賢道徳言語何自苦如此生笑曰我幾年來忍饑誦經豈不知屠沽兒有酒食耶陸魯望自言嵗寒性不知露與霜石可轉也不可奪其堅貞陵谷可移隋和之徳不昧寒暑有遷松筠之志如一並唐文粹惟有剛腸鐡百鍊不柔虧劉文集澹然一心獨立千仞骨鯁知難屈鋒鋩豈易干青松心在任風霜並劉長卿不憚芳蘭之焚竟全孤竹之志李文饒松色不肯秋玉性不可柔孟東野身不以形勢屈口不以觀望柔皇甫湜本朝王元之作三黜賦其卒章曰屈於身而不屈於道雖百謫其何虧五朝言行錄我生不有命其肯枉尺尋飲風蟬至潔長吟不改調並東坡詩雖事君均於事親而奪志難於奪帥東坡集不屈子張騫蘇武之奉使執節没身不屈王命雖古之膚使其猶劣諸揚淵騫史晉使解揚如宋使無降楚鄭人囚而獻之楚楚子厚賂之使反其言遂致其君命曰臣能承命為信信無二命受命以出有死無霣又可賂乎左鄭子産爭承言所出貢賦多少之次自日中以爭至於昏晉人許之左田横客五百人在海上帝使使召至聞横死}
