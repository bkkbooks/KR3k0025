  - {type: variant, offset: 2118, length: 3, content: 孫洪嘗, krp: 辟其兄寳唯傳上意耳震曰如朝廷欲令三府辟召固宜有尚書勅拒不許東漢書楊震為東萊太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知者宻愧而出漢髙紀范滂甥李頌素無行中常侍唐衡以屬宗資資用為吏滂寢而不召資還怒捶書佐朱零零曰范滂清裁今日寜受笞而死滂不可違資乃止漢桓紀帝愛楊喬才貌欲妻以公主喬固辭不聴遂閉口不食七日而死漢靈紀中常侍趙忠遣弟延致殷勤於傅燮延謂燮曰南容少答我常侍萬户侯不足得也燮正色拒之曰有功不論命也傅燮豈求私賞哉本傅初𤣥徳舉袁渙渙為吕布所留布欲使渙作書罵辱劉渙不可笑而應之曰渙它日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎漢獻紀曹操追念田疇功恨前聴其讓乃復以前爵封疇疇上疏陳誠以死自誓操不聴欲引拜之至於數四終不受疇素}
  - {type: variant, offset: 2122, length: 0, content: '', WYG: 夏侯惇善操使惇自以其情喻之惇就疇宿而勸之疇揣知其指不復發言惇臨去固邀疇疇曰疇負義逃竄之人耳䝉恩全活為幸多矣豈可買盧龍之塞以易賞祿哉縱國私疇疇獨不愧於心將軍雅知疇者猶復如此若必不得已願効死刎首於前同上不為小利移目不為意似改步三國志中常侍郎黄皓用事董厥諸葛瞻不能矯正士大夫多附之唯樊建不與皓往來秘書令郤正乆在内職與皓比屋周旋三十餘年澹然自守以書自娛既不為皓所愛亦不為皓所憎故官不過六百石而亦不罹其禍魏元帝吳隠之為廣州刺史酌貪泉賦詩曰試使夷齊飲終當不易心晉書吳隠之傳蔡謨除司徒三年不就職詔書屢下謨終不受帝臨軒遣侍中紀據黄門郎丁纂徴謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至詔免謨為庶人漢穆紀褚淵侍山隂}
