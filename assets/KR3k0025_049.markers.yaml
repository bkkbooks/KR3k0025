markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷四十九宋潘自牧撰性行部有定力經子文三仕為令尹無喜色三已之無愠色語子南宫韜世清不廢世濁不洿家語富貴不能淫貧賤不能移威武不能屈夭夀不貳修身以俟之所以立命也君子所性雖大行不加焉雖窮居不損焉並孟舉世而譽之不加勸舉世而非之不加沮莊逍遥遊篇大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚莊齊物死生驚懼不入乎胷中是故遻音悟物而不懾莊至樂揮斥八極神氣不變莊田子方孔子窮於陳蔡之間七日不火食藜羮不糝顔色甚憊而弦歌於室莊子鄉譽不以為榮國毁不以為辱列仲尼權利不能傾羣衆不能移天下不能蕩荀子鍾山之玉炊以爐炭三日三夜而色澤不變淮南子乆幽而不改其操雖隋和何以加諸揚問明謝安處富貴而獨退靜破苻堅而無喜色文中子史子路曰君子死冠不免結纓而死左傳禍至不懼福至不喜史宋世家不牽乎卑亂之語不奪乎衆多之口史記鄒陽傳項王使武涉徃説齊王信信謝曰夫人深親信我我背之不祥雖死不易幸為謝項王漢髙紀于定國飲酒至數石不亂西漢本傳蘇茂周建復聚兵挑戰王霸堅卧不出方饗士作倡樂茂兩射營中中霸前酒樽霸安坐不動漢光武紀刺客刺來歙未死馳召蓋延延見歙因作悲哀不能仰視歙叱延曰今使者中刺客無以報國故呼巨卿欲相屬以軍事而反効兒女子涕泣乎刃雖在身不能勒兵斬公邪歙自書表曰臣夜人定後為何人所傷賊中臣要害臣不敢自惜恨奉職不稱以為朝廷羞抽刃而絶漢光武紀凡人富貴當使可賤馬援傳不屑毁譽東漢馬廖傳竇憲將征匈奴三公九卿詣朝堂上書諫輒寢宋由懼遂不敢復署議而諸卿稍自引止唯袁安任隗守正不移至免冠朝堂固爭前後且十上衆皆為之危懼安隗正色自若漢和紀盧植事馬融融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盼東漢本傳李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰㣲從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長嘆流涕而已漢質紀梁冀使人脅杜喬曰早宜從妻子可得全喬不肯明日冀遣騎至門不聞哭者遂白太后收繫之死獄中同上太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也漢桓紀范滂至獄獄吏謂曰凡坐繫者皆祭臯陶滂曰臯陶古之直臣知滂無罪將理之於帝如有罪祭之何益同上宦者張讓以事中王允遂傳下獄㑹赦還為刺史旬日間復以它罪被捕揚賜不欲使更楚辱遣客謝之曰君以張讓之事故一月再獄凶慝難量幸為深計諸從事好氣節者共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉得減死論漢靈紀晏嬰不降志於白刃南史不曲筆以求存東漢臧洪傳袁閎投迹深林潜身十八年黄巾賊起攻没郡縣百姓驚散閎誦經不移東漢怒不變容喜不失節故最為難漢獻帝蹈海之節千金莫移其情東漢逸民傳論宜僚臨白刃而色正東漢孔融傳孔融被誅二子方奕棋被收而不動左右曰父執而不起何也答曰安有巢毁而卵不破乎同上雖遇履虎神氣帖然三國名臣贊先主入益州劉璋張飛諸葛亮分定郡縣破璋將嚴顔生獲顔曰大軍至何不降顔曰我州但有㫁頭將軍無降將軍飛怒令斫頭顔色不變曰斫頭便斫頭何為怒耶飛壯而釋之蜀志陸遜遣親人韓扁奉表詣吳主邏者得之諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾闊狹且水乾宜當急去遜未答方催人種葑豆與諸將奕棋射戱如常魏明紀智者不為小利移目不為意似改步魏元紀賈充見夏侯統令妓繞其船三匝統若無聞充曰此吳兒木人石心也晉書諸葛瞻以氣勵稱常倚柱讀書雷震其柱讀書自若曹家之晉紀孔坦將卒庾氷省之流涕坦慨然曰大丈夫將終不問以濟國安民之術乃為兒女子相泣耶氷深謝之晉紀桓温來朝或云欲誅王謝謝安神色不變同上殷浩被黜談詠不輟雖家人不見其有流放之慼晉書本傳謝安嘗與孫綽泛海風起浪湧諸人並懼安吟嘯自若同上陶侃疾篤上表遜位遣右長史殷羨奉送所假節麾幢曲蓋侍中貂蟬大尉章荆淮雍梁交廣益寜八州刺史印傳棨㦸軍資器仗牛馬舟船皆有定簿尉印倉庫侃自管鑰以後事付右司馬王愆期晉成紀魏冉閔使常煒使燕燕主雋使封裕詰之積柴其旁使裕以其私誘之曰君更熟思無為徒取灰滅煒正色曰吾聞死者骨肉下於土精魄升於天蒙君之惠速益薪縱火使僕得上訴于帝足矣吾結髮以來尚不}
