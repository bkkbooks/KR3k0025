  - {type: variant, offset: 64, length: 0, content: '', WYG: 也而子為我願之乎夫天未欲平治天下也如欲平治天下當今之世舎我其誰也以位則子君也我臣也何敢與君友也以徳則子事我者也奚可與我友千乗之君求與之友而不可得也而況可召與並孟鬻子年九十見文王文王曰嘻老矣鬻子曰若使臣捕虎逐鹿則老矣使臣䇿國事則臣年尚少因立為師鬻子在山澤而有廊廟之志文中史欒武子曰不可以當吾世而失諸侯左毛遂曰使遂早得處囊中乃穎脱而出非特其末見而已史記平原君傳蔡澤從唐舉相曰富貴吾所自有不知者夀也史記趙王思復得㢘頗㢘頗亦思復用於趙王使使召亷頗亷頗見使者一飯斗米肉十斤被甲上馬以示可用秦紀先從隗始周紀韓信家貧𦵏母行營髙敞地令旁可置萬家堵西漢本傳韓信曰臣多多益善前漢本傳里中社陳平為宰分肉甚均曰嗟乎使平得宰天下亦如此肉矣漢髙紀蒯通自序其説號曰雋永西漢本傳雋字兖反肥肉也永長也以其所論甚善韓安國曰死灰獨不復燃乎終軍自願受長纓羈南越王致之闕下終軍歩入關關吏與繻問何為吏曰為復傳還當合符軍曰丈夫西遊終不復傳還棄繻而去並同上士病不明經術經術茍明取青紫如俛拾地芥西漢夏侯勝傳郭丹曰丹不乗使者車終不出關去家十有一年果乗髙車出關東漢本傳梁竦自負其才曰大丈夫居世生當封侯死當廟食州縣之職徒勞人耳同上虞詡笑曰不遇盤根錯節無以别利器此乃吾立功之秋也漢殤紀禰衡唯善孔融楊脩常稱曰大兒孔文舉小兒楊徳祖餘子碌碌不足數東漢本傳曹操從容謂𤣥徳曰今天下英雄惟使君與操耳本初之徒不足數也漢獻紀韓遂請與操相見時秦胡觀者前後重沓操笑謂之曰爾欲觀曹公耶亦猶人也非有四目兩口但多智耳同上𤣥徳曰孔北海知世間有𤣥徳耶吳志廖化欲與宗預詣諸葛瞻預曰吾等年踰七十但少一死何求於年少輩而屑屑造其門耶遂不徃蜀志宗預傳王濬恢廓有大志嘗起宅開門前路廣十步曰吾欲使容長㦸幡旗數萬晉書本傳山濤布衣家貧謂妻韓氏曰忍饑寒我後當作三公孫綽作天台賦示友人范榮期云卿試擲地當作金石聲也謝琨曰一丘一壑自謂過之過庾亮也祖逖渡江擊楫而誓曰祖逖不能清中原而復濟者有如大江並同上石勒曰若遇光武當並驅中原未知鹿死誰手晉書載記周顗曰今年殺諸賊奴取金印如斗大繫肘本傳謝安妻見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳晉書本傳謝安甚敬王獻之因問曰吾書何如家君曰固不同安曰外論不爾曰人那得知同上涼張邕驕矜淫縱國人患之張天錫所親劉肅謂天錫曰正當速除之耳天錫曰安得其人肅曰肅即其人也肅年時未二十天錫曰汝年少更求其助肅曰趙白駒與肅二人足矣晉海西公傳燕主垂議伐西燕垂曰吾比老叩囊底智足以取之終不復留此賊以累子孫晉武紀王羲之自稱我書比鍾繇當抗行比張芝草猶當雁行也晉書本傳胡藩曰劉毅一談一詠自許以為雄豪晉紀崔浩纎妍潔白如美婦人常自謂才比張良而稽古過之宋紀王儉曰江左風流宰相唯有謝安蓋自況也王儉傳裴子野曰為文人皆得於手我獨得於心南史本傳胷中貯千卷書使人那得不畏服北史崔陵傳王侃不交遊親朋勸其出仕侃曰茍有良田何憂晩嵗但恨無其才爾北史周武謂楊素曰善自勉之勿憂不富貴應聲答曰臣但恐富貴來逼臣臣無心圖富貴隋書隋王羆曰老羆當道卧貛子安得過同上激濁揚清疾惡好善臣於數子有一日之長唐書王珪傳李靖常曰丈夫遭遇要當以功名取富貴何至作章句儒唐書本傳李晟謂所親曰吾生長西陲備諳虜情同上裴度辟皇甫湜為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而逺取居易請從此辭唐書韓愈傳韓愈自視遷雄至固以下不論也唐書賛自比孟軻以荀況揚雄為未醇唐書韓愈傳李懐逺宗人欲籍以髙䕃懐逺曰因人之勢髙士恥之假䕃而官豈吾心耶擢四科第鄭人表常自曰天瑞有五色雲人瑞有鄭人表並唐書本傳傳記婁敬過洛陽曰臣之䇿能不血刃坐羈匈奴頭着陛下前三輔故事李元禮髙自摽持欲以天下名教是非為己任世説新語張賓自謂昆弟曰吾言智䇿鑒識不後張子房但不遇髙祖耳崔鴻後趙錄僧支遁曰既有凌霄之姿何肯為人耳目玩乎世説後魏楊大眼曰若使旗鼓相望瞋眸奮發足以使君亡魄喪膽談藪猛虎不處卑勢勁鷹不立垂枝蔣子方機論司馬相如徃京師過蜀郡升僊橋題其柱曰不乗駟馬不復過此白氏六帖楚丘先生見孟嘗君曰先生老矣春秋髙矣多遺忘矣何以教文先生曰使我投石斥距追車赴馬逐麋鹿將虎豹吾則老矣使我操計謀殺精神決嫌疑出正辭尚諸侯吾乃始壯耳何老之有孟嘗君勃然汗出至踵曰文過耳韓詩外傳劉長卿每題詩不言姓但曰長卿雲溪友議皮日休傲誕自號間氣布衣沙門貫休風騷之外精於筆札成中令問其筆法休曰此事須登壇而授安可草草而言北夢瑣言鍾子期死伯牙子屛琴絶絃終身不鼓以為時無足為鼓琴者劉向説苑集知我者希則我貴矣揚雄解嘲鳯凰集南嶽羞與燕雀羣劉公幹雖逍遥於廣厦實擊厲於中原選傅𤣥鷹賦生必耀華名於玉牒没則勒洪伐於金䇿張景陽七命懐紀燕山石思開函谷關徐敬業琅琊城作排朱門而獨逺昇青雲而自致匪偷光於隣壁寜假輝於陽燧終狥已以致能靡因人以成事雖不能縱逸韻於霜臯唳野致九天之響頗亦蓄苛芬於露薄垂薰有十步之芳駱賓王安能與尺鷃决起但搶榆孟浩然人生若不能帥表朝廷即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顔受納元次山杜陵有布衣老大意轉拙許身一何愚自比稷與契居然成濩落白首甘契闊蓋棺事則已此志常覬豁窮年憂黎元嘆息腸内熱非無江海志瀟洒送日月虎氣必騰上龍身寜乆藏並杜詩心藏風雲世莫知騄驥本天馬素非伏櫪駒韓信羞將絳灌比禰衡恥逐屠沽兒青雲當自致何以求知音李太白上裴長史書曰他人之文猶山無煙霞春無草樹白之文光明洞徹句句動人並李白自矜當無對韓文猛虎行當今盲於心者皆是若籍自謂獨盲於目爾韓文代張籍書使其道由愈而粗傳雖滅死萬萬無恨韓愈答孟簡書承先人後者在孫惟汝在子惟吾韓文自度若世無孔子不當在弟子}
