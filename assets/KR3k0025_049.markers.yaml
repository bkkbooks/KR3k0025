  - {type: variant, offset: 13, length: 4, content: 欺誑幻惑, WYG: 示王王授璧相如持璧却立倚柱怒髮衝冠曰臣觀大王無意償趙王城故取璧大王必欲急臣臣頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王乃辭謝相如懐其璧從徑道歸璧于趙同上屈原曰誰能以身之察察受物之汶汶者乎寜赴湘流而𦵏於江魚腹中耳又安能以皓皓之白而蒙世之塵埃乎同上張儀謂其妻曰視吾舌尚在不其妻曰舌在}
  - {type: variant, offset: 13, length: 4, content: 欺誑幻惑, krp: 示王王授璧相如持璧却立倚柱怒髮衝冠曰臣觀大王無意償趙王城故取璧大王必欲急臣臣頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王乃辭謝相如懐其璧從徑道歸璧于趙同上屈原曰誰能以身之察察受物之汶汶者乎寜赴湘流而𦵏於江魚腹中耳又安能以皓皓之白而蒙世之塵埃乎同上張儀謂其妻曰視吾舌尚在不其妻曰舌在}
