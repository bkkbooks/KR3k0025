  - {type: variant, offset: 5, length: 0, content: '', WYG: 楚金魏元忠並免死流嶺南臨刑太后使鳯閣舎人王隠客馳騎傳聲赦之聲達於市當刑者皆喜躍讙呼宛轉不已元忠獨安坐自如或使之起元忠曰虛實未知隠客至人使起元忠曰俟宣勅已既宣勅乃徐起舞蹈再拜竟無憂喜之色同上李朝隠前後執破斜封官一千四百餘人怨謗紛然朝隠一無所顧唐睿宗楊國忠專國權勢薰炙或勸張巡一見且顯用答曰是方}
