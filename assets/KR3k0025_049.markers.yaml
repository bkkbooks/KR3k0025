  - {type: variant, offset: 1742, length: 1, content: 斯, WYG: 之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂三軍可奪帥也匹夫不可奪志也不曰堅乎磨而不磷不曰白乎涅而不緇不降其志不辱其身並語子君子修道立徳不以困窮而改節家語昔齊景公田招虞人以旌不至將殺之孔子奚取焉取非其招不往也大匠不為拙工改廢繩墨羿不為拙射變其彀率堂髙數仞榱題數尺我得志弗為也食前方丈侍妾數百人我得志弗為也般樂飲酒驅騁田獵後車千乗我得志弗為也並孟不誘於譽不恐於誹率道而行端然正已不為物傾側荀卿子非十二子古之賢人賤為布衣貧為匹夫食則饘粥不足衣則裋褐不完然而非禮不進非義不受荀卿子大畧影不為曲物直響不為惡聲美管子五輔非其志不之非}
