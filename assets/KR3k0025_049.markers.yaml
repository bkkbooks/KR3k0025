  - {type: variant, offset: 1243, length: 202, content: 谷永比之申伯王商忠義張匡謂之左道此皆以白為黑欺天罔上者也魏志互入妄偽嵩高道士潘誕自言三百歲為帝合鍊金丹常役數千人所費巨萬鑿嵩高大石深百尺者數十處凡六年丹不成通監隋煬紀馹書上聞旬月方報其敗喪則減百而為一其捃獲則張百而成千通監唐德宗祿山奏言去春營州蟲食苗臣焚香祝天云臣若操心不正事君不忠使蟲食臣心臣若不負神祇願使蟲散即有群鳥從北來食蟲立盡請宣付史官通監唐元宗或告第五琦受人金二百兩遣御史劉期光追按之琦曰琦備位, WYG: 盛}
