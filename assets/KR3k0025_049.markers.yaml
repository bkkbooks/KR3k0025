即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顔受納元次山杜陵有布衣老大意轉拙許身一何愚自比稷與契居然成濩落白首甘契闊蓋棺事則已此志常覬豁窮年憂黎元嘆息腸内熱非無江海志瀟洒送日月虎氣必騰上龍身寜乆藏並杜詩心藏風雲世莫知騄驥本天馬素非伏櫪駒韓信羞將絳灌比禰衡恥逐屠沽兒青雲當自致何以求知音李太白上裴長史書曰他人之文猶山無煙霞春無草樹白之文光明洞徹句句動人並李白自矜當無對韓文猛虎行當今盲於心者皆是若籍自謂獨盲於目爾韓文代張籍書使其道由愈而粗傳雖滅死萬萬無恨韓愈答孟簡書承先人後者在孫惟汝在子惟吾韓文自度若世無孔子不當在弟子}
  - {type: variant, offset: 65, length: 1, content: 黃, WYG: 韓文與吕山人書固余異於牛馬兮寜止乎飲水而求芻羣雌孤雄意態横出誰為傾國媒自許連城價懐竒負氣不隨人後沖天鵬翅闊報國劒鋩寒天不欲使兹人有知乎則吾之命不可期如使兹人有知乎非我其誰哉其行道其為書其化今其傳逺必有在矣並韓文鋪張對天之閎休揚厲無前之偉績編之乎詩書之䇿而無愧措之乎天地之間而無虧雖使古人復生臣亦未肯多讓韓文潮州謝上表配圭璋而為貴豈泥滓而為儔栁文波沙揀金賦金之為寳恥居下流同上低回且向籠間宿奮迅終湏天外飛崔杜鞭齊下元常轡共驅若不佩金印即合翳玉芝白樂天振臂猶堪呼一擲爭知常下不成盧劉賓客雲霄坐應致劉長卿老虎終開眼兒蟲㑹叩頭但令吾舌在何畏不封侯張家吉文肯與夫斗筲者決得失於一夫之目砥名礪節易地改轍冀桑榆之未晩得雌雄之一決唐文粹將攜健筆干明主杜牧之本朝萬里秋風天外意誰言一身窮自待九鼎重歐文枯朽猶能出菌芝坡詩海底鯤魚㑹化鵬蘇子由詩吾文如萬斛泉源不擇地而出在平地滔滔汨汨雖一日千里無難東坡自期逺到經士不可以不𢎞毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎語史鄙没世而文采不表於後漢司馬遷書舒吾陵雲羽奮此千里足超邁絶塵驅倐忽誰能逐脩翼無卑栖逺趾不步局東漢酈炎傳集逸翮思拂霄駿足羨逺遊郭景純遊仙詩指蓬壺而播翰望崑閬而揚音鮑照鶴賦非刻金石列圖象揚𢎞懿崇耿光則顒然衆情孰克慰滿陳子昻集鸞陞鴻漸期紫氛兮同上逸翮方翥脩途兹始冀頡頏乎九霄將翺翔乎萬里李文山老驥思千里饑鷹待一呼杜詩願言成羽翼奮趐凌丹梯元微之集竊攀屈宋宜方駕恐與齊梁作後塵杜詩九霄排直上萬里整前期元微之集那得作牛後更擬助鴻飛迅阪㸔鵬舉髙音待鶴鳴所期人拭目焉肯自佯盲鵬翼張風期萬里並同上駿足思長阪陸韓卿詩溪澗豈能留得住終歸大海作波濤唐宣東瀑布詩誰謂青雲髙鵬飛終背負劉賓客集吾將奮鱗於太空兮奚獨慕此江湖吾將發榮於蟠桃兮奚獨守此蒿蔞吾將蕩其魄兮驂風軔與車軌謁}
