  - {type: variant, offset: 261, length: 0, content: '', WYG: 也終不解矣韓文師説本朝班固論劇孟郭解之流皆有絶異之姿而惜其不入於道徳茍放縱於末流東坡集不茍合經衛靈公間陳於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也語子御者且羞與射者比孟周衰戰國縱横取士先權謀孟子以儒道遊於諸侯不肯枉尺直尋時君咸謂之迂濶於事終莫能聴納其説衛靈公問陳於孔子孔子答以俎豆梁惠王問利國孟子對以仁義並孟序史陳敬仲為齊工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢左梁惠王謀欲攻趙孟軻稱太王去邠此豈有意阿世俗茍合哉史孟軻傳叔孫通徴魯諸生魯兩生不肯行曰禮樂所由起積徳百年而後可興也吾不忍為公所為公徃矣無汚我史本傳行不茍合義不取容史朱建傳鳯凰翔于千仞之上兮覽徳輝而下之見細徳之險微兮遥增擊而去之史賈生傳鍾期死伯牙絶絃破琴而不肯與衆鼓獿人亡獿}
