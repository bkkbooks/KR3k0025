  - {type: variant, offset: 2118, length: 3, content: 孫洪嘗, WYG: 辟其兄寳唯傳上意耳震曰如朝廷欲令三府辟召固宜有尚書勅拒不許東漢書楊震為東萊太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知者宻愧而出漢髙紀范滂甥李頌素無行中常侍唐衡以屬宗資資用為吏滂寢而不召資還怒捶書佐朱零零曰范滂清裁今日寜受笞而死滂不可違資乃止漢桓紀帝愛楊喬才貌欲妻以公主喬固辭不聴遂閉口不食七日而死漢靈紀中常侍趙忠遣弟延致殷勤於傅燮延謂燮曰南容少答我常侍萬户侯不足得也燮正色拒之曰有功不論命也傅燮豈求私賞哉本傅初𤣥徳舉袁渙渙為吕布所留布欲使渙作書罵辱劉渙不可笑而應之曰渙它日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎漢獻紀曹操追念田疇功恨前聴其讓乃復以前爵封疇疇上疏陳誠以死自誓操不聴欲引拜之至於數四終不受疇素}
