  - {type: variant, offset: 3349, length: 3, content: 敖賦晚, WYG: 詩經茍無忠信誠慤之心以涖之雖固結之民其不解乎記子曰人而無信不知其可也大車無輗小車無軏其何以行之哉自古皆有死民無信不立並語史君子曰茍信不繼盟無益也詩云君子屢盟亂是用長無信也已則無信而殺人以逞不亦難乎小所以事大信也小國無信兵亂日至亡無日矣晉楚}
