  - {type: variant, offset: 3337, length: 1, content: 互, WYG: 崔斯立曰余不負丞而丞負余唐書本傳傳記蔡伯喈為天下作碑銘多矣未嘗不有慚色唯郭先生碑無愧耳郭子别傳集内自省而不慙楚辭思對上靈之心文選序仰不愧天俯不愧人内不愧心韓文無怍於心無愧於色栁宗元本朝唐王義方道南海舟師持酒脯請福義方酌水誓曰有如忠獲戾孝見尤四維廓氛千里安流神之聴之無作神羞是時盛夏濤霧蒸湧既祭天雲開露人壯其誠孔白六帖晁無咎言司馬温公有言吾無過人者但平生所為未嘗有不可對人言者性何適之不可中無愧之為安並東坡文無隠經事君有犯無隠事師無犯無隠瑜不掩瑕瑕不掩瑜記子曰二三子以我為隠乎吾無隠乎爾語子郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食搏牛一下卞子有常産者有常心孟人有常理管子史開心見誠無所隠伏東漢或問倫有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎東漢第五倫傳帝召允謂曰國書浩作不允曰太祖記前著作郎鄧彦海所撰先帝記及今記臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作帝問如東宫不允曰臣罪應滅族不敢虛妄殿下以臣侍講日乆哀臣乞命耳實不敢迷亂帝謂景穆曰直哉此亦人情所難而能臨死不移且對君以實貞臣也寜失一有罪宜宥之北史髙允傳詔百官言得失常何武人馬周為條對二十餘事太宗怪之曰此非臣所能家客馬周教臣言之唐書馬周傳崔祐甫作相未二百日除官八百人上嘗謂祐甫曰人或謗卿所用多涉親故何也對曰茍平生未之識何以諳其才行而用之唐代宗元義方言李絳私其同年上以詰絳對曰若其人果才雖在兄弟子姪之中猶將用之況同年乎避嫌而棄才是乃便身非狥公也上謂宰相曰卿輩當為朕惜官勿用之私親故李絳曰若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也茍所用非其人則朝廷自有典刑誰敢逃之並唐憲宗有愧經有靦面目詩顔厚有忸怩書子夫泚也非為人泚中心達於面目孟子貢聞漢隂丈人之言卑陬失色莊史子貢過原憲憲敝衣冠見子貢子貢曰豈病乎憲曰貧也非病也子貢慙終身恥其言之過也史本傳項王曰縱江東父兄憐我我何面目見之縱彼不言籍獨不愧於心乎史本紀主臣文穎曰惶恐之辭也猶今言死罪漢書陳平馮唐兩傳張𤣥素少為刑部令使上嘗對朝臣問之𤣥素恥之出閣殆不能步色如死灰唐太宗愧顔何寄唐僖宗慚恨}
