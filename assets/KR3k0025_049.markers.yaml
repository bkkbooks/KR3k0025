  - {type: variant, offset: 5, length: 0, content: '', krp: 楚金魏元忠並免死流嶺南臨刑太后使鳯閣舎人王隠客馳騎傳聲赦之聲達於市當刑者皆喜躍讙呼宛轉不已元忠獨安坐自如或使之起元忠曰虛實未知隠客至人使起元忠曰俟宣勅已既宣勅乃徐起舞蹈再拜竟無憂喜之色同上李朝隠前後執破斜封官一千四百餘人怨謗紛然朝隠一無所顧唐睿宗楊國忠專國權勢薰炙或勸張巡一見且顯用答曰是方}
  - {type: variant, offset: 6, length: 1, content: 幻, WYG: 國怪祥朝官不可為也唐書張巡傳令狐楚為太原掌書記鄭儋在鎮暴卒不及指授後事軍中喧譁將夜忽數十騎持刃進楚至軍門諸將環之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書李希烈留顔真卿不遣朱滔王武俊田悦李納各遣使詣希烈上表稱臣召顔真卿示之真卿叱之曰汝知有罵安祿山死者顔杲卿乎乃吾兄也吾年八十知守節死耳希烈乃使甲士十人守真卿於館舎掘坎於庭云欲坑之真卿怡然見希烈曰死生已定何必多端亟以一劒相與豈不快公心事邪希烈乃謝之唐徳宗紀蘇檢數為韓偓經營入相且遣清吏告偓偓曰乃欲以此相汙唐昭宗紀傳記劉裕次山陽聞何無忌敗績卷甲兼行將渡而風急衆咸難之裕曰若有天命風當自息若其天不助舟覆溺何足為怪即令登舟舟移而風自息三十國春秋居磨涅之中無緇磷之損世説中注嵇康臨死顔色不變謂其兄曰以琴來不兄曰已至康取調之為太平引曲成歎曰太平引絶於今日矣文王傳夏侯𤣥嘗倚柱作書霹靂其柱神色不變作書如故世説集吞縱之強不能反蹈海之志漂鹵之威不能降西山之節陸士衡連珠烈火流金不能焚景沈寒凝海不能結風迅風凌雨不謬晨禽之察勁隂殺節不凋寒木之心並同上舉世非之力行而不惑者千百年一人而已韓退之伯夷頌金可鎔不可使為汚腐水可濁不可使為塵糞元次山勢去未須悲時來何足喜白侍郎波濤喧衆口藜藿靜吾廬劉長卿飛語霜動明誠山立李義山文常經磨涅不改堅白杜牧之俾吾為秋毫之杪吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多唐文粹踐危機不易心處横潰不忘國奮身拔跡於豺狼之口道不汙而磨滅同上劒淬愈利玉燒不燃孫可之文靈豸亷角比干獻骨合此僨烈在公為笏怒虎可唾笏不可挫峭華可拔笏不可折柱天不仄指日不蝕同上本朝召端使髙麗遇風濤檣折舟人大恐公恬然讀書若在齋閤時玉壺清話舉世皆寃而語言未嘗以自及以窮至死而妻子不見其悲忻歐公祭尹師魯文死生之間既已能通於性命憂患之至宜其不累於心胷同上泰山覆於前而色不變麋鹿興於左而目不瞬老泉文司馬温公嘗曰並馳萬馬中能駐足者其王存乎王存墓志得志遂茂而不驕不得志瘁􅇤而不辱羣居不倚獨立不懼東坡墨君堂記毁譽幾至於萬端夷險常持於一意臨川集確然金石心不畏蚊蚋觸蘇子由集金石不隨波黄魯直詩千重浪裏平安過百尺竿頭穏下來陳從易作王文穆罷相詩處士不生巫峽夢虛勞雲雨下陽臺陳希夷詩見青瑣無定力子性猶湍水也決諸東方則東流決諸西方則西流孟子史子夏入聞夫子之道而樂出見紛華盛麗而悦史記孔子弟子列傳王莽誅甄豐辭所連及便收不請時揚雄校書天祿閣上治獄使者來欲收雄雄恐不能免乃従閣上自投下幾死西漢本傳或謂讜是復慮為非不知所定漢章紀帝問侍中爰延朕何如主也曰陛下為漢中主帝曰何以言之曰}
