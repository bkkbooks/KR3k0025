  - {type: variant, offset: 67, length: 2, content: 向氏, WYG: 於㝠㝠之天兮秉其生殺之樞皮日休集本朝劉瑀曰騏驥一蹙自造青雲何至與駑馬爭路續説庶幾垂後世不黙死芻豢歐公集世間萬事皆塵土留取功名乆逺㸔蔡君謨詩欲為天下屠龍手肯讀人間非聖書邵堯天詩集自信經孔子曰我戰則克祭則受福記考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世}
