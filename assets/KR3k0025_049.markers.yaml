  - {type: variant, offset: 862, length: 0, content: '', krp: 孤立羣貴之間馬援傳交趾守張恢坐贓伏法以資物簿入大司農詔賜羣臣鍾離意得珠璣悉以委地而不拜曰此贓穢之寳誠不敢拜東漢本傳曼麗之容不悦於目鄭衛之聲不過於耳東漢杜篤傳井丹髙潔未嘗修刺謁人東漢梁鴻尚節介勢家慕其節多欲得女之鴻並絶不娶楊震舉茂才王宻宻遺震金曰暮夜無知者震曰天知神知我知子知何謂無知乎徐穉非其力不食並同上陳泰為并州京邑貴人寄寳貨因泰市奴婢泰皆掛之於壁不發其封三國魏志羊祜不附中朝時人為之語曰二王王戎王衍當國羊公無徳晉武紀方正亮直介然不羣晉書王基傳崔遊自少及長口未嘗語及財利崔洪口不言貨財手不執珠玉並晉書顔延之子竣貴重凡所資供延之一無所受布衣茅屋蕭然如故常乗羸牛笨車逢竣之鹵簿即住道側常語竣曰吾平生不喜見要人今不幸見汝宋世祖劉行本為左庶子隋太子得良馬欲令行本乗行本正色曰至尊置臣於庶子者欲令輔導以正道非為佐弄臣也隋書惡木垂䕃志士不息盜泉飛溢亷夫不飲新唐書武皇后傳席豫太平公主欲表為諫官豫恥之逃去唐中宗嚴挺之拒宰相不肯見李林甫崔隠甫違詔不屈牛仙客信剛者乎唐書本傳李乂進吏部侍郎請謁不行時人語曰李下無蹊徑同上正人一心事君無待於助唐書李徳裕傳松柏之為木孤生勁特無所因依同上耿介之士羞於自拔唐書傳記平原君欲封魯仲連辭讓者三終不肯受平原君乃置酒酒酣起前以千金為魯仲連夀魯仲連笑曰所貴於天下士者為人排患釋難解紛亂而無所取也即有所取者是商賈之人也戰國䇿鍾離意曰志士忍渴於盜泉之水曾參迴車於勝母之閭惡其名也東漢紀水名盜泉仲尼不漱論語撰考識郝子亷一介不取諸人曽過姊飲錢留席下而去每行飲水常投一錢井中風俗通集食不媮而為飽兮衣不茍而為温楚辭恥于媚而求親藝文曹植九愁賦義分明於霜信行直如絃袁陽源白馬篇渴飲堅氷漿饑待零露餐苦寒行箕子許由有髙節湘水屈原有清源黄河一直青松萬仭並陳子昻松柏青青不受令於霜雪張説云秀水勢恒孤張説集獨立天地間多君秉古節嶽立冠人曹回李太白以兹悟生理獨恥事干謁兀兀遂至今忍為塵埃没杜詩物白諱受玷行髙無汚真同上馬蹄無入朱門跡韓集道不行於主人與之處者非其類雖有享之以季氏之富不一日留也同上古琴無俗韻寒松無妖花李太白勁葉森利劒孤莖挺端標介潔靜専不交勢利並上髙郢規矩自立不干權貴栁文見佞色諂笑者不忍與坐語同上潔性不可汚韋應物嶷然如㫁山絶巘不可以邪徑造焉穆員作鄭叔則誌獨鶴不羣孤松無柯劉長卿靈物本特達不復相纒榮唐文粹直方不偶孤髙比雲月並同上宋廣平貞姿勁質剛態毅狀鐡腸石心不解吐婉媚辭皮日休梅花賦本朝冦莱公為相丁謂出其門為參政㑹食都堂羮染公鬚謂起拂之公正色曰身為執政而親為宰相拂鬚耶遺事觀弼之心鍊金鍜銕石介玉徳頌銕即鐡字李及知杭州市白集一部乃為終身之恨筆談王質未嘗折顔色屈語論以合當國者意王質墓誌人嘗與孫之翰一端硯曰此石呵之則水流孫曰一日呵一擔水方直三錢竟不受筆談面目嚴冷東坡陳公弼傳森森直榦百餘尋髙入青冥不附林臨川集陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得東坡答李廌書天地之間物各有主茍非吾之所有雖一毫而莫取東坡赤壁賦堅姿映松柏直節凌榛荆蘇子由集不由介紹子孟孺子子車無介而見孔業子雜訓史谷永曰薛宣無游説之助西漢喬幹直聳磨天自致魏鄭公唐太宗曰觀古今用人必因媒介若行成張者朕自舉之無先容也唐書集青雲當自致何必求知音李太白出身入仕並不因人劉禹錫表貌符心冥如舊君臣天降時雨山川出雲感激自致其間無因吕和叔傅巖本朝豈因糞壤栽培力自得乾坤造化心臨川集不階尺木遂致青雲同上寡合經獨行踽踽詩經武公寡特詩序子踽踽涼涼孟史寡耦少徒西漢東方朔傳落落難合東漢耿弇傳至音不合衆聽故伯牙絶絃至寳不同衆好故卞和泣血東漢陳元傳孤音寡和直轡安歸東漢荀彧傳論沈懐文素不飲酒又不好戯宋孝武謂故欲異已謝莊嘗戒曰卿每與人異亦何可乆懐文曰非欲異物性之所不能耳南史夷行介特雅不與合唐陳夷行傳蕭瑀性狷介與同僚多不合唐太宗集卧喜晩起而當關呼之不置一不堪也抱琴行吟弋釣草野而吏卒守之不得妄動二不堪也危坐一時髀不得摇性復多虱爬搔無已而常裹以章服揖拜上官三不堪也素不便書不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉強則不能及四不堪也不喜弔喪而人道以此為重已為不見恕者所怨至欲見中傷者雖戄然自責然不可化終不能獲無咎無譽如此五不堪也不喜俗人而當與之共事或賓客盈坐鳴聲聒耳囂塵臭處千變萬伎在人目前六不堪也心不耐煩而官事鞅掌機務纒其心世故繁其慮七不堪也縱逸來乆情意傲散簡與禮相背嬾與慢相成榮進之心日頽任實之情轉篤此由禽鹿少見馴育則服從教制長而見羈則狂顧頓纓赴蹈湯火雖飾以金鑣享以嘉殽愈思長林而志在豐草也嵇康與山濤絶交書天資木強不能屈節權門地隔蓬心不能買名時議駱賓王秀木勢恒孤張説之一生傲岸苦不諧李太白不合者雖造廬未嘗與之坐韓文答馮宿書今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉韓文出門無所徃入室還獨處白侍郎孤風絶侣逸翮獨翔栁文性不茍合居常寡徒唐文粹本朝惟枉尋直尺之不為故圓鑿方枘而難合歐公集古聲無慆淫真味有澹泊臨川集窈眇文章宜和寡崢嶸肝肺亦交難坡詩朋比經比之匪人易六三簡賢附勢寔繁有徒協比䜛言朋家作仇脅權相滅並書小人比而不周語子上偏曲則下比周比周則難知荀正論史相引以勢相道以利史記日者傳有背公死黨之信西漢翟方進傳阿黨所厚西漢杜叙傳谷永黨於王氏西漢本傳公卿以下畏石顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位漢元紀長安令楊興與賈捐之相善捐之欲得召見謂興曰京兆尹缺}
