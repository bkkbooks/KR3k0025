  - {type: variant, offset: 3, length: 1, content: 譸, WYG: 嶂嶮獠賊執融將殺之融神色不動方作洛生詠賊異之而不害浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉宋書山隂公主淫恣悦褚彦回以白帝帝召彦回西上閣宿十日公主夜就之備見逼迫彦回整身而立從夕至曉不為移志公主謂曰君鬚髯如㦸何無丈夫意彦回曰雖不敏何敢首為亂階宋書本傳魏宗愛用事威振四海嘗倨見百官於都坐王公已上皆趨庭望拜髙允獨升階長揖宋武栁元景知禍至入辭其母整朝服乗車應召弟魚騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮宋太祖王景文賜死勅至景文正與客棊叩函看已復置局下神色不變乃與客更行爭刼局竟劒子納奩畢徐曰奉敕見賜以死方以勅示客宋明紀王惠嘗臨曲水風雨暴至坐者皆馳散恵徐起不異常日不以霑濡而改南史帝召允謂曰國書皆浩作不允曰太祖記前著作郎鄧彦海所撰先帝記及今記臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生意景穆曰天威嚴重允迷亂失次耳臣向問皆云浩作帝問如東宫不允曰臣罪滅族不敢虛妄殿下以臣侍講日乆哀臣乞命實不問臣不敢迷亂帝謂景穆曰直哉此亦人情所難而能臨死不移且對君以實貞臣也寜失一有罪宜宥之北史髙允傳魏徴每犯顔進諫雖逢帝甚怒神色不移議者以為賁育不能過唐書魏徴傳盧承慶典選考内外官有一官督漕運遭風失米考之曰監運損糧考中下其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜色又無愧詞又改曰寵辱不驚考中上唐髙宗紀徐公當雷霆之震而能全仁恕雖千載未見其比唐書徐有功傳有功武后時為廷尉后多殺人劉褘之竊謂賈大隠曰太后既廢昏立明安用臨朝稱制不如返政大隠宻奏之太后命王本立推之本立宣勅案之褘之曰不經鳳閣鸞臺何名為勅太后大怒賜死褘之初下獄睿宗為之上疏申理中表皆賀之褘之曰此乃所以速吾死也臨刑沐浴神色自若自草謝表立成數紙唐武后}
