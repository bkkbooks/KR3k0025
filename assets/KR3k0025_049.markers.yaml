  - {type: variant, offset: 3343, length: 0, content: '', krp: 色不憂喜血氣常平和並白侍郎不失信於兒童無惰容於暗室吕和叔文君子芳桂性春榮冬更繁孟東野言語舉止率有常度杜牧之外若可渾其中甚清外如可雜其中甚靜唐文粹無常經不恒其徳或承之羞不恒其徳無所容也並易徳二三動罔不凶書士也罔極二三其徳詩亡而為有虛而為盈約而為泰難乎有恒矣南人有言曰人而無恒不可以作巫醫並語子茍無恒心放僻邪侈無不為已孟趨舎無定謂之無常荀言無常信行無常真荀傳記百心不可以事一君晏子春秋反常經夫子制義}
  - {type: variant, offset: 3344, length: 0, content: '', WYG: 婦凶也易反道敗徳敗常亂俗並書子鴟鴞夜察豪末晝出瞑目而不見丘山莊聞歌以為哭視白以為黒饗香以為臭嘗甘以為苦行非以為是列小人道其怪荀夫醉者超江津以為咫尺之溝也隣之母死往哭之哀妻死而不泣有所刼以然也並淮南子史天反時為灾地反物為妖民反徳為亂亂則妖災生故文反正為乏左有信經庸言之信厥孚交如信以發志也有孚顒若行險而不失其信信及豚魚不言而信存乎徳行人之所助者信也中孚信也並易爾無不信朕不食言書大信不約記與國人交止於信記信近於義言可復也謹而信上好信則民莫敢不用情信則人任焉並語子刑賞已諾信乎天下齊桓晉文楚莊吳闔閭越勾踐威動天下強殆中國無他信也並荀仲尼曰夫至信也動天地感鬼神横六合而無逆豈但履危嶮入火水而已哉列至信辟金莊或問信曰不食其言揚重黎史茍有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公信者國之寳也民之所庇也仗莫如信信者言之瑞也能信不為人下並左晉荀息曰使死者反生生者不愧乎其言則可謂信矣公羊傳衛鞅變秦法令恐民不信乃立三丈之木於國都南門募民有能徙置北門者予十金民莫敢徙復曰予五十金有一人徙之輒予五十金以明不欺吳起欲伐秦恐士卒軍人不信乃埋一車轅於市東門書有能移此轅置西門者給土田宅百畝黄金百斤有一人來移即賜之於是召募人伐秦遂克並史記昔齊桓公不}
