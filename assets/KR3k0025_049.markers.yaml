  - {type: variant, offset: 2117, length: 0, content: '', WYG: 周亞夫曰髙皇帝約非劉氏不得王非有功不得侯今王信雖皇后兄無功侯之非約也漢景紀天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之匈匈而易其行西漢東方朔傳丁傅董賢用事諸附離之者或起家至二千石時雄方草創太𤣥有以自守泊如也西漢揚雄傳不為燥濕寒暑變其節不為風雨暴露改其形介然有常西漢律歴志心如金石東漢王常傳郅惲為上東城門候帝常出獵車駕夜還惲拒門不開帝令從者見面於門間惲曰火明遼逺遂不受詔帝乃迴從東中門入東漢本傳髙獲師事歐陽歙歙下獄獲冠鐡冠帶鐡鑕詣闕請歙帝見之謂曰欲用子宜改性獲對曰臣受性於父母不可改之於陛下東漢任延為武威太守帝戒之曰善事上官無失於和延曰忠臣不私私臣不忠上下雷同非陛下之福善事上官不敢奉詔髙峻東漢離朱不為巧眩移目師曠不為新聲易耳東漢范升傳志士不飲盜泉之水亷者不受嗟來之食東漢烈女傳孤竹長饑羞食周粟東漢逸民傳千乗莫移其情同上陳忠薦汝南周燮南陽馮良學行深純隠居不仕名重於世帝以𤣥纁羔幣聘之燮宗族更勸之曰夫修徳立行以為國君獨何為守東岡之陂乎燮曰夫修道者度其時而動動而不時焉得亨乎與良皆自載至近縣稱病而還漢殤紀楊震為太尉帝舅耿寳薦李閏兄於震震不從寳乃自往候震曰李常侍國家所重欲令}
