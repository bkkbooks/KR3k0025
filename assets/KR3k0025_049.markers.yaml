  - {type: variant, offset: 2123, length: 0, content: '', WYG: 主十日備見逼迫誓死不迴沈約宋書沈慶之請老乃至稽顙泣涕上不能奪聴以始興公就第上復欲用慶之使何尚之往起之尚之累陳上意慶之笑曰沈公不効何公往而復返尚之慙乃止宋文紀豈可令臣曲筆魏游肇傳周處士韋夐志尚夷簡魏周之際十徴不屈世宗禮敬尤厚號曰逍遥公陳髙祖傅縡上書言後主酒色過度辭多訐直後主大怒曰我欲救}
