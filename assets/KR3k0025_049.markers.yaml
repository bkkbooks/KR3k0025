  - {type: variant, offset: 18, length: 0, content: '', krp: 儀曰足矣史張儀傳髙皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之聲不絶史記儒林所}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 隠忍茍活幽糞土之中而不辭者恨私心有所不盡鄙没世而文采不表於後也西漢司馬遷傳馬援曰丈夫為志窮當益堅老當益壯東漢本傳梁謝舉兄子僑素貴嘗一朝無食其子啓欲以班史質錢答曰寜餓死豈可以此充食乎南史張巡許逺可謂烈丈夫矣以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得搏食牽掣首尾豗潰梁宋間大小數百戰力盡乃死唐書本傳集亦余心之所善兮雖九死其猶未悔楚辭寜溘死而流亡兮余不忍為此態也同上當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳韓文但存舌在口當冀身遂心賈浪仙無傷禽哀鳴之意有困獸猶鬬之心李文錢手張}
  - {type: page-break, offset: 19, content: '', id: KR3k0025_WYG_049-15a, image: WYG0931/WYG0931-0332c.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 隠忍茍活幽糞土之中而不辭者恨私心有所不盡鄙没世而文采不表於後也西漢司馬遷傳馬援曰丈夫為志窮當益堅老當益壯東漢本傳梁謝舉兄子僑素貴嘗一朝無食其子啓欲以班史質錢答曰寜餓死豈可以此充食乎南史張巡許逺可謂烈丈夫矣以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得搏食牽掣首尾豗潰梁宋間大小數百戰力盡乃死唐書本傳集亦余心之所善兮雖九死其猶未悔楚辭寜溘死而流亡兮余不忍為此態也同上當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳韓文但存舌在口當冀身遂心賈浪仙無傷禽哀鳴之意有困獸猶鬬之心李文錢手張}
  - {type: variant, offset: 20, length: 2, content: 作見, WYG: 拳力殫氣雄劉長卿本朝金百死而不化水萬折而東流陳瑩中望風而靡史吳伐魯㣲虎欲攻王舎私屬徒七百人三踊於幕庭吳子聞之一夕三遷左從風而靡西漢韓信傳養由睇而猿號西漢班固叔傳范滂按部守吏自知賍汙望風解印綬去後漢本傳苻堅敗于淝水餘衆奔潰聞風聲鶴唳皆以為王師至晉書謝𤣥傳應弦而倒北史李彪傳望風輒奔新唐書房𤣥齡傳河北二十四郡無一忠臣耶唐書顔真卿傳集命使西征隨流而攘風之所被罔不披靡選傳記鄉邑望烟而奔城郭觀塵而潰典論本朝馬尾所嚮無不望風奔潰司馬温公魏元論猛虎處於深山則百獸震恐而不敢出非吾則爾拒而爾則不吾抗也蘇子由}
