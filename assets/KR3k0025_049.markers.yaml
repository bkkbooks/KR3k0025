  - {type: variant, offset: 871, length: 5, content: 畫法其所語, WYG: 令我得代􅂶宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍期思侯並可為曹皆如言又薦滿宣立為刺史相薦之信不當如是乎興曰我復見言君房也捐之復短石顯興曰上信用之今欲進苐從我計且與合意即得入矣捐之即與興共為薦顯奏又共為薦興奏石顯白之上迺下興捐之獄西漢捐之傳牢耶石即五鹿客耶印何纍纍綬若若耶漢元紀共相標榜東漢黨錮傳黨同而伐異激揚名聲互相題拂並同上郷人為之謡曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣漢桓紀諸葛誕鄧颺等相與結為黨友更相題表以散騎常侍夏侯𤣥等四人為四聰誕輩八人為八達合黨連羣互相褒歎以毁訾為罰戮用黨譽為爵賞附己者則歎之盈言不附者則為作瑕釁魏明紀賈謐喜延士大夫郭彰石崇陸機機弟雲和郁及榮陽潘岳清河崔基勃海歐陽建蘭陵繆徴京兆杜斌摯虞琅琊諸葛詮𢎞農王粹襄城杜育南陽許猛彭城劉訥中山劉輿輿弟琨皆附於謐號曰二十四友晉}
