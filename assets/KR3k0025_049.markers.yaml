  - {type: variant, offset: 468, length: 0, content: '', WYG: 問移則楚丘論婚則燕爾及王則無不仲宣語劉則無不公幹凡一二百件傳相祖述尋問莫知源由施安時復失所顔氏家訓集隨風靡而成行楚辭街談巷議張平子西京賦聽者不察和而唱之同聲一辭韓文諱辨臆決唱聲萬口和附并為一談牢不可破韓文平淮西碑吠聲者多辨實者寡飛語一發臚言四馳萌芽始發枝葉俄茂方謂語怪終成禍梯劉賓客本朝造謗于下者初若含沙之射影但期隂以中人宣言于庭者遂肆鳴梟之惡音孰不聞而掩耳歐文端介經舎車而徒義弗乗也君子以立不易方並易無有淫朋無有比徳正色率下並書君子不以色親人姦聲亂色不留聰明非時不}
