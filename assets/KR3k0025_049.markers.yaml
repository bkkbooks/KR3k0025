  - {type: variant, offset: 2583, length: 1, content: 貌, WYG: 命袁異式鞠之式曰吾與朝廷何人為讎宜早為計仁軌曰當官不職國有常刑無所逃命若使自引決以快讎人竊所未甘乃具獄以聞除名唐髙宗蕭穎士若百鍊之剛不可屈唐書元徳秀傳栁公綽為京兆尹公綽初赴府有神䇿小將躍馬横衝前導公綽駐馬杖殺之明日入對延英上色甚怒詰其専殺之狀對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於當衢金吾街使當奏在坊内左右巡使當奏上無以罪之退謂左右曰汝曹須作意此人朕亦畏之唐憲紀宰相韋貽範母喪詔還位偓當草制上言俟變縗而召可也學士使馬從皓迫偓求草偓曰腕可㫁麻不可草新唐書韓偓傳傳記鄭衆謂匈奴曰不忍將大漢節對氊裘獨拜東觀漢紀漢順帝徴樊英詔郡縣駕載上道英不得已到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴能賤能富能貧君何慢朕英曰臣受命於天盡其命天也死得其命亦天也陛下焉得殺臣臣見暴君如見仇讎立朝猶不肯可得貴乎雖在布衣環堵之中晏然自得不易萬乗之尊又可得而賤乎陛下焉得賤臣臣非禮之祿萬鍾不受申其志雖簞食弗厭也陛下焉能富臣焉能貧臣帝不能屈漢樊英列傳魏世祖選丁邯為郎邯託疾不就詔問實病羞為郎乎對曰臣實不病恥以孝亷為令史耳世祖怒使虎賁杖之數十詔問欲為郎否對曰能殺臣者陛下不能為郎者臣也詔出不為郎三輔決錄李白失意遊華山過縣宰方開門決事白乗醉跨驢過門宰怒不知太白也引至庭下曰汝何輒敢無禮白乞供狀狀無姓名曰曽令龍巾拭吐御手調羮貴妃捧硯力士脱靴天子門前尚容吾走馬華隂縣裏不許我騎驢摭遺集天資木強不能屈節權門地隔蓬心不能買名時議駱賓王時棄道猶存陳子昻艱危氣益増杜詩至寳有本性精剛無與儔可使寸寸折不能繞指}
