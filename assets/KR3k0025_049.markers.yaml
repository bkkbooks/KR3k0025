  - {type: variant, offset: 12, length: 0, content: '', WYG: 管仲相之則霸竪貂輔之則亂可與為善可與為惡陳宣紀一迴一惑在於瞬息之間自可自否變於帷房之所唐太宗傳記有與曽子同名族者而殺人人告曽子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若也頃之又一人告之曰曾參殺人其母懼投杼踰墻而走戰國䇿集依稀似曲纔堪聴又被風吹别調中北夢瑣言戱唐人書堅忍不㧞經之死矢靡它之死矢靡慝詩我心匪石不可轉也我心匪席不可卷也同上君子雖貧不粥祭器雖寒不衣祭服記曲禮君子固窮語子良農不為水旱輟耕良賈不為折閱不市士君子不為貧窮怠乎道荀北山愚公年九十欲平太行王屋二山或笑之愚公曰我死有子子又生孫孫又生子子子孫孫無窮匱也而山不加増何若而不平操蛇之神聞之懼懼不已告之於帝帝命夸娥氏二子負二山一厝朔東一厝雍南列不以物挫志之謂全莊史司馬崛節以死晉文公曰困獸猶鬬楚伐宋華元夜入楚師曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能從也請收合餘燼背城借一戰晉文亡十九年守志彌篤並左伍子胥窘於江上道乞食志豈嘗須臾忘郢耶故隠忍就功名非烈丈夫孰能致此哉史記子胥傳豫讓事智伯智伯滅讓挾匕首刺襄子襄子釋之頃之漆身為癩吞炭為啞行乞於市曰所以為此者將以愧天下後世之為人臣懐二心以事其君者也頃之襄子出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅願請君之衣而擊之以致報讐之意則死不恨襄子持衣與讓拔劒三躍而擊之曰吾可以下報智伯矣史本傳藺相如奉趙璧於秦秦王喜傳示左右相如視秦王無意償趙城乃曰璧有瑕請}
