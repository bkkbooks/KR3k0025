  - {type: variant, offset: 318, length: 0, content: '', WYG: 上有所問據經法以心所安而對不希指茍合如不從不敢強諌爭以是乆而安漢成紀容回而已後漢公卿選懦容頭過身漢殤紀䑕雀偷生茍此一活耳晉書王濬傳山濤為吏部尚書濤典選一官闕輒擇才資可為者啓擬數人得詔㫖有所向然後顯奏之晉世祖後楊再思在位累載屈節希㫖無所規弼慎畏未嘗忤物或謂再思曰公名髙位重何為屈節如此再思曰世路艱難直者受禍茍不如此何以全其身哉唐書本傳蘇味道為相未嘗有所建明脂韋自營而已唐書明皇將廢太子帝詔宰相謀之林甫對曰此陛下家事非臣等宜預帝意乃決以安祿山兼范陽節度使尚書席建侯稱祿山公直李林甫裴寛皆順㫖共稱其美並唐書張良娣産子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之唐肅宗側媚取容唐書張俾方傳王播為相専以承迎為事未嘗言國家安危唐穆宗紀傳記李豐依違}
