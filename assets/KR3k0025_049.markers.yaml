  - {type: variant, offset: 284, length: 0, content: '', WYG: 豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就之哉晉傳紀王述嘗見王遵每發言一坐莫不賛美述正色曰人非堯舜何得每事盡善晉書王述傳殷仲文還姑熟祖送傾朝桓謙要王𢎞之同行答曰凡祖離送别必在有情與殷風馬不接無縁陪從沈約宋書傳記鍾子死伯牙終身不復鼓琴以為世無足為鼔琴者吕氏春秋集鸞鳯循四極而回周兮見盛徳而後下楚辭連城之珍俟楚文而乃進崩山之操待鍾期而後發王績文莫將流水引空向俗人彈駱賓王儼有直道侃無媚辭張説之文嗟彼苦節士素於圓鑿方杜工部今所以惡衣食窮體膚麋鹿之與遊猿狖之與居固自以身不能與時從順俯仰故甘心自絶而不悔焉韓文所詣少不㑹意徑還不留雖水禽決起山鹿駭去之不若也陸魯望寜方為皂不圓為卿寜方為汙辱不圓為顯榮性不茍合居常寡徒並唐文粹我受狷介性立為頑鈍身平生雖寡合今即無緇磷白侍郎本朝當戰國時儀秦以口舌取富貴孟子與公孫丑之徒方且歴論養浩之説宜當時以為迂濶鳴道集棋逢敵手纔堪着琴少知音不願彈邵堯夫茍容附迎合經志在隨人所執下也易鄉原徳之賊也語注云原人趨向容媚而合之子長君之惡其罪小逢君之惡其罪大孟偷合茍容荀子生斯世也為斯世也善斯可矣閹然媚於世也者是鄉原也孟史叔孫通儒服漢王憎之乃變其服服短衣楚製史本傳養交安祿}
