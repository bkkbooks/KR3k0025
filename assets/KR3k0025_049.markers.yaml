  - {type: variant, offset: 2506, length: 4, content: 身旬日異, WYG: 事晉書嵇紹傳武陵王晞聞戴逵善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人晉書戴逵傳陶潛為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事郷里小人晉書陶潛傳卞延為上虞令有剛氣孟顗以令長貳之脱幘投地拂衣而去南史魏統軍李佐攻新野獲劉思忌問之曰今欲降未思忌曰寜為南鬼不為北臣乃殺之南齊明帝紀齊慕容儼曰吾}
