  - {type: variant, offset: 913, length: 0, content: '', WYG: 但恐為害不求益也晉書本傳荀睎為兖州刺史多所交結每得珍物即遺都下親貴兗州去洛五百里恐不鮮美募得千里牛每遣信旦發暮還同上蕭至忠自託於太平公主引為刑部尚書唐紀李林甫柔佞多狡數深結宦官及妃嬪家伺上動靜無不知之由是每奏對常稱㫖上悦之唐𤣥宗李林甫常以金帛賂上左右上舉動必知之栁澤上疏以為斜封官因僕妾汲引劉幽求魏知古崔湜陸象先同平章事皆太平公主之志也並同上饋謝四方有名士無不至其有口舌者率以利啖之使不得有所訾短唐書劉晏李聴素以賂遺得權幸心故多為助力唐書本傳王叔文因為太子言某可為相某可為相幸異日用之宻結翰林學士韋執誼及當時朝士有名而求速進者陸淳吕温李景儉韓曄韓泰陳諫栁宗元劉禹錫等定為死友唐順宗王叔文依王伾伾依李忠言忠言依牛昭客轉相交結每事先下翰林使叔文可否然後宣于中書韋執誼承而行之叔文及餘黨十餘家之門晝夜車馬如市客候見叔文伾者至宿其坊中餅肆酒罏下一人得千錢乃容之唐紀楊虞卿張元夫蕭澣等善結交依附權要上干執政下撓有司為士求官及第無不如志唐文宗趨附經富人之屋烏所集也詩傳子小夫之智不離苞苴竿牘莊史成風}
