  - {type: variant, offset: 877, length: 1, content: 俗, WYG: 祖王伾為左散騎常侍王叔文為起居舎人大抵計事叔文依伾伾依李忠言忠言依牛昭容轉相交結每事先下翰林使叔文可否然後宣于中書外黨則韓泰栁宗元劉禹錫等主采聴外事謀議唱和日夜汲汲如狂互相推奬曰伊曰周曰管曰葛瀟然自得謂天下無人唐順宗李徳裕宗閔各有朋黨互相援濟上曰去河北賊易去朝中朋黨難唐文宗漢朱博陳咸相為腹心背公死黨周福房植各以黨相傾議論相軋故朋黨始於甘陵二部唐書李徳裕邪人必更為黨以相欺蔽同上徳裕宗閔各分朋黨更相傾軋垂四十年唐穆宗集羣衆成朋上浸以惑楚辭朋曹比而黨譽同上本朝夏侯𤣥與何晏等皆有盛名晏目𤣥以易}
