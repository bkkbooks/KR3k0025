  - {type: variant, offset: 3342, length: 0, content: '', krp: 服藥求汗或有弗獲愧情一集渙然流離嵇叔夜養生論寄顔無所蔡謨表逢人多厚顔杜工部有常經君子以常徳行言有物而行有恒動靜有常剛柔㫁矣並易其爾典常作之師政貴有常並書不愆不忘率由舊章詩得見有恒者斯可矣子曰居處恭執事敬與人忠雖之夷狄不可棄也並語子喪祭從先祖孟遵先王之法而過者未之有也有恒産者有恒心並孟君子道其常天行有常不為堯存不為桀亡應之以治則吉應之以亂則凶天有常道地有常數君子有常體並荀人有常理管子史天有常度地有常行君子有常行君子道其常西漢東方朔傳銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行西漢律厯志雖有倉卒未嘗疾言東漢劉寛傳金石有一定之聲晉書律歴志或問盧欽徐邈當武帝之時人以為通自涼州刺史及來京師人以為介何也欽答曰往者毛孝先崔季珪用事貴清素之士時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣傚而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也三國志上指殿屋謂侍臣曰治天下如建此屋營構既成勿數改移茍易一榱正一瓦踐履動摇必有所損若慕竒功變法度不恒其徳勞撓實多唐太宗傳記一心可以事百君晏子春秋鸞鳯不遷甘於竹實騶虞不移食於生物太𤣥經集動循定檢天有可察文選連珠迅風凌雨不謬晨禽之察勁隂殺節不凋寒木之心文選衣緇守白髮華守黑不為物遷是有常徳陸龜䝉虱賦衆木悦芳艷松獨守其貞衆耳喜鄭衛琴亦不改聲}
  - {type: variant, offset: 3343, length: 0, content: '', WYG: 色不憂喜血氣常平和並白侍郎不失信於兒童無惰容於暗室吕和叔文君子芳桂性春榮冬更繁孟東野言語舉止率有常度杜牧之外若可渾其中甚清外如可雜其中甚靜唐文粹無常經不恒其徳或承之羞不恒其徳無所容也並易徳二三動罔不凶書士也罔極二三其徳詩亡而為有虛而為盈約而為泰難乎有恒矣南人有言曰人而無恒不可以作巫醫並語子茍無恒心放僻邪侈無不為已孟趨舎無定謂之無常荀言無常信行無常真荀傳記百心不可以事一君晏子春秋反常經夫子制義}
