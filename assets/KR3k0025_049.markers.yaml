  - {type: variant, offset: 70, length: 1, content: 國, WYG: 俟聖人而不惑記孔子曰十室之邑必有忠信如丘者焉不如丘之好學也子曰丘之禱乆矣子曰天生徳於予桓魋其如予何子畏於匡曰文王既没文不在兹乎天之未喪斯文也匡人其如予何並語子聖人復起必從吾言矣有王者起必來取法知我者其惟春秋乎罪我者其惟春秋乎並孟宋桓魋欲害孔子孔子稱天生徳於予魯臧倉毁孟子孟子曰臧}
  - {type: variant, offset: 70, length: 1, content: 國, krp: 俟聖人而不惑記孔子曰十室之邑必有忠信如丘者焉不如丘之好學也子曰丘之禱乆矣子曰天生徳於予桓魋其如予何子畏於匡曰文王既没文不在兹乎天之未喪斯文也匡人其如予何並語子聖人復起必從吾言矣有王者起必來取法知我者其惟春秋乎罪我者其惟春秋乎並孟宋桓魋欲害孔子孔子稱天生徳於予魯臧倉毁孟子孟子曰臧}
