  - {type: variant, offset: 889, length: 0, content: '', WYG: 内史蹶維趣馬楀維師氏豔妻煽方處詩注六人相連於朝皇甫為首相覿以貨相賂以利記郊特牲史宋公子鮑禮於國人年自七十以上無不饋詒時加羞珍異國之材人無不事也親自桓以下無不恤也左傳灌夫所與交通無非豪傑大猾家累數千萬食客數千百人史本傳郭解入關中關中賢豪知與不知聞其聲爭交懽解史游俠傳賂遺外戚許史傾家自盡西漢陳萬年苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事漢武紀王氏方盛賓客滿門五侯各有所厚不得左右唯長安人樓護盡得其懽}
