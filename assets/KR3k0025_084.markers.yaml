  - {type: variant, offset: 1166, length: 338, content: 士無往者讓甚恥之寔獨弔焉及後復誅黨人讓感寔故多所全宥東漢陳寔傳申屠蟠嘆曰昔戰國之世處士橫議列國之主至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絕跡於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮之禍惟蟠超然免於評論通鑑互入知幾梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變名姓為吳市門卒云通鑑漢平紀互入避禍魏張緝言於司馬師曰諸葛恪雖克捷見誅不久師曰何故緝曰威震其主功蓋一世求不死得乎通監魏高貴卿公傳嘏曰太初志大其量能合虛聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆邦家家一作國之人也鄚元茂有為而無終外要名利而內無關鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人者必將敗家通監魏紀唐彬與王濬共伐吳彬知賊冠已殄孫皓將降未至建鄴二百里稱疾避留以示不競果有先到者爭物後到者爭功, WYG: 梓澤}
