  - {type: variant, offset: 3267, length: 4, content: 受賜徒煩, WYG: 水旱輟耕荀子史神農教民耕農故號曰神農史黄帝紀陳勝少時與人傭耕嘗輟耕之隴上悵然曰茍富貴無相忘傭者笑曰若為傭耕何富貴也勝太息曰嗟呼燕雀安知鴻鵠之志哉本傳楊惲報孫㑹宗書曰田家作苦歲時伏臘烹羊炮羔斗酒自勞酒後耳熱仰天拊缶而歌嗚嗚前本傳農夫父子暴露中野不避寒暑捽山把土手足胼胝漢書農之良者善養禾賈山至言諸葛亮躬耕隴畆好為梁父吟蜀本傳明宗問馮道今歲雖豐百姓贍足否道曰農家歲凶則死於流殍歲豐則傷於穀賤豐凶皆病惟農夫為然臣記聶夷中詩云二月賣新絲五月糶新穀醫得眼前瘡剜却心頭肉語雖鄙俚曲盡田家之情狀上命録其詩嘗諷誦之五代史傳記周家以農事開國國語旦暮從事於田野霑體塗足同上農不失時則成之農失其時則敗之六韜集雉雊麥苖秀蠶眠桑葉稀王維日出布穀鳴田家擁鋤犁李白歸閒事耦耕同上卜宅從兹老為農去國賖杜詩農月須知課田家敢忘勤同上刈熟擔肩頳韓詩為農信可樂柳詩穡人先耦耕九扈鳴已晩楚鄉農事春並同上倉廩無宿儲徭役獨未已方慚不耕者禄食出閭里韋應物老翁家貧在山住耕種新田三四畆苗疎稅多不得食輸入官倉化為土歲暮鋤犁倚空室呼兒登山收橡實江西賈客珠百斛船中養犬食粱肉張籍凌晨起飯}
