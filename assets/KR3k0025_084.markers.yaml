  - {type: variant, offset: 3206, length: 0, content: '', WYG: 㑹心處不必在逺翳然林木便自有濠濮間想也世說上美榭高墉北史穿池種木小寄情賞南史徐勉傳裴度治第石林幽勝燠館涼臺號緑野堂度野服瀟散與白居易劉禹錫為文章把酒窮書夜相歡不問人間事唐書本傳林薄蒙翳唐書孟郊傳文宗用}
