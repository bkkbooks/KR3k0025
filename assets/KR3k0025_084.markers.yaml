  - {type: variant, offset: 3369, length: 0, content: '', WYG: 郎詠隠西昌採樵為業或擔至郡中人買之則曰我西昌逸士酒中人也今獻公所缺公當惠我所好廬陵記王質入山採樵見二童子奕棋所持斧置坐而觀之童子曰汝斧柯爛矣質歸鄉閭無復時人述異記見謀類集或山而樵韓文雪逕抵樵叟同上採薪隴坂長李白樵蘇逺相號柳詩野迴樵唱來同上谷口樵歸唱杜詩本朝行歌採樵去六一集薪歌曉入浦同上樵童忽兩三東坡偶隨樵父採都梁竹屋松扉試乞漿有如採樵子入洞聽琴筑尋山跨坑谷騰趠筋骨強並同上牧經爾牧來思伺蓑何笠或負其餱詩無羊牧人乃夣衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱同上在坰之野坰四曰藪養蕃鳥獸周禮太宰牧人掌牧六牧而阜蕃其物以共祭祀之牲牷牧人牛有牧馬有圉左傳子今有受人之牛羊而為之牧之者則必為之求牧與芻矣孟子孔子嘗為乘田矣曰牛羊茁壯長而已矣同上君見牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣列子百里奚爵禄不入於心故飯牛而牛肥使穆公忘其賤而與之政莊子臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問榖奚事則􅀶塞以遊二人者事業不同其於亡羊均也同上史卜式不願為郎上曰吾有羊在上林子為牧之式乃布衣草履而牧羊歲餘羊肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗羣上竒其言漢書匈奴徙蘇武置北海上使牧羝羝乳乃得歸公孫𢎞牧豕海上並同上李密感厲讀書以蒲韀乘牛掛漢書一帙於牛角上行且讀唐書傳記甯戚俟齊桓公出扣牛角歌曰南山燦白石爛生不遭堯與舜禅短布衣單纔至骭從昬飯牛至夜半長夜漫漫何時旦桓公召之因以為相三齊畧記初平牧羊有道士將入金華山石室中四十餘年其兄初起尋之道士引至山中相見兄問羊何在初平曰近在山東初起徃視但見白石無數還曰無羊初平與兄倶徃叱之云羊起於是白石俱起成羊闕牧歌竹枝詞者乘牛扣角至寺而歌闕公家貧自牧牛與里中兒更甘為牛師廣記集閒時田畝中搔背牧鷄鵝李白驪山茂陵盡灰滅牧牛之子來攀登同上斜陽照墟落窮巷牛羊歸野老念牧童倚杖候荆扉王維牛羊晩自歸兒童戲野田王貞白稼穡既自務牛羊還自牧儲光羲牛羊識童僕向夕自相呼杜詩草肥朝牧羊鄭谷本朝乞我一牧童林間聽横笛山谷漁經包羲氏作結繩而為網罟以佃以漁易繫辭其釣維何維絲伊緡詩何彼穠矣毋逝我梁毋發我笱谷風及小弁敝笱在梁敝笱魚麗於罶魚麗南有嘉魚烝然罩罩南有嘉魚之子於釣言綸之繩其釣維何維魴及鱮采緑􅈄人掌以時􅈄與梁春獻王鮪辨魚物為鱻薧以共王膳羞周禮公矢魚於棠公羊曰公如棠觀魚登來百金之魚而張之注云張網羅也登來美問大得也春秋公羊傳子釣而不綱論語子數罟不入洿池魚鼈不可勝食也孟子漁之為事也有鈎網罟笙罛罶岺罾笱攭梁罨箅􅩬銛之類尸子渤海之東有五山焉曰岱輿貟嶠方壺瀛洲蓬萊帝使巨鼇十五舉首而戴之迭為三畨而龍伯之國有大人一釣而連六鼇於是岱輿貟嶠二山沉於大海列子詹何以獨繭絲為綸芒鍼為鉤荆蓧為竿剖粒為餌引盈車之魚於百仭之淵綸不絶鉤不申竿不撓同上任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海期年不得魚已而大魚食之牽巨鈎陷没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神燀赫千里自淛河以東蒼梧以北莫不厭若魚者莊子莊子釣於渭水楚王使大夫二人徃先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生莊子曰徃矣吾將曵尾於塗中同上子思居衛衛人釣於河得鮦魚焉其大盈車子思問何以得之對曰吾一釣而垂一魴之餌鮦過而弗餌更以豚之半體則吞之子思曰鮦雖難得貪以死餌士雖懷道貪以死禄孔叢子太公釣隠溪五十六年矣而未嘗得一魚魯連徃而觀之太公跪石隠崖且不餌而釣仰詠俯吟及暮而釋竿符子}
