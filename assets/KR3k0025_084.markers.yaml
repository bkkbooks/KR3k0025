  - {type: variant, offset: 3203, length: 0, content: '', WYG: 重關美女篇神靈扶其棟宇歴千載而彌堅王延夀賦為之者勞居之者逸大厦耽耽東西膠轕南北崢嶸土木丹彩光色如新陳子昻賦高樓對紫陌甲第連青山太白集高飛燕雀賀新成杜詩四壁含清風韋應物集樓閣玲瓏五雲起白侍郎高樓大觀金堂玉戸唐}
