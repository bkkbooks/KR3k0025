  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0025_CHANT_084-1a.3}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 閑有家悔亡易家用平康書治家者不敢失於臣妾而况於妻子乎孝經子嚴家無格虜韓非子教護其家父母之則也管子王凝御家以四教勤儉恭恕正家以四禮冠㛰喪祭三年之蓄備則散之親族聖人之書及公服禮器不假垣屋什物必堅朴曰無茍費也門巷果木必方列曰無苟亂也文中子史趙武曰夫子之家事治左傳夫子謂范㑹也田嬰使文主家史記本傳夫纎嗇筋力治生之正道也史記貨殖傳教笞不可廢於家史記律書人棄我取人取我與歲熟取穀予之絲繭凶取帛絮與之食欲長錢取下穀長石斗取上種能薄飲食忍嗜慾節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法故其智不足以與權變勇不足以決斷仁不能以取予彊不能以有所守雖欲學吾術終不告之矣盖天下言治生祖白圭史記貨殖傳鞭扑不可㢮於家前漢刑法志范蠡之陶為朱公治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再散後遂}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_084-1b, image: WYG0932/WYG0932-0541b.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0025_WYG_084-2a, image: WYG0932/WYG0932-0542a.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 閑有家悔亡易家用平康書治家者不敢失於臣妾而况於妻子乎孝經子嚴家無格虜韓非子教護其家父母之則也管子王凝御家以四教勤儉恭恕正家以四禮冠㛰喪祭三年之蓄備則散之親族聖人之書及公服禮器不假垣屋什物必堅朴曰無茍費也門巷果木必方列曰無苟亂也文中子史趙武曰夫子之家事治左傳夫子謂范㑹也田嬰使文主家史記本傳夫纎嗇筋力治生之正道也史記貨殖傳教笞不可廢於家史記律書人棄我取人取我與歲熟取穀予之絲繭凶取帛絮與之食欲長錢取下穀長石斗取上種能薄飲食忍嗜慾節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法故其智不足以與權變勇不足以決斷仁不能以取予彊不能以有所守雖欲學吾術終不告之矣盖天下言治生祖白圭史記貨殖傳鞭扑不可㢮於家前漢刑法志范蠡之陶為朱公治産積居與時逐而不責於人故善治生者能擇人而任時十九年之中三致千金再散後遂}
  - {type: variant, offset: 4, length: 1, content: 誠, WYG: 巨萬漢書貨殖傳萬石君居家子孫申申僮僕訢訢西漢石奮本傳任氏折節力田蓄富者數世然任公家約非田蓄所生不衣食公事不畢則不得飲酒食肉以此為閭里率西漢貨殖傳李通}
  - {type: page-break, offset: 4, content: '', id: KR3k0025_WYG_084-2b, image: WYG0932/WYG0932-0542b.png}
  - {type: variant, offset: 4, length: 1, content: 誠, krp: 巨萬漢書貨殖傳萬石君居家子孫申申僮僕訢訢西漢石奮本傳任氏折節力田蓄富者數世然任公家約非田蓄所生不衣食公事不畢則不得飲酒食肉以此為閭里率西漢貨殖傳李通}
  - {type: variant, offset: 6, length: 2, content: 道可, WYG: 父守為人嚴毅居家如官庭東漢本傳華歆遇子弟甚整雖閒室之内嚴若朝典蜀王顒曰今有人使奴執耕稼婢典炊爨鷄主司晨犬主吠盜牛負重載馬涉逺路私業無曠所求皆足雍容高枕飲食而已忽一日盡欲}
