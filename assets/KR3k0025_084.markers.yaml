  - {type: variant, offset: 3683, length: 7, content: 劉諫議集王安石, WYG: 未可謂善鬻珠也韓子市井相與言則以財與利揚子史貪賈三之㢘賈五之史記孔氏用冶鐵致富因通商賈之利故南陽行賈盡法孔氏之雍容天下熈熈皆為市來天下穰穰皆為市往史貨殖傳序百里不販樵千里不販糴同上商賈大者積貯倍息小者坐列販賣操其竒贏日遊都市乘上之急所賣必倍前食貨志乗堅䇿肥履絲曵縞此商人所以兼并農人所以流亡也同上灌嬰以販繒為業漢書張湯}
