  - {type: variant, offset: 3223, length: 6, content: 患通監樂工李, WYG: 家者見惡如農夫之務去草焉左傳政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔譬如農夫是穮是蓘雖有饑饉必有豐年並同上樊遲請學稼子曰吾不如老農論語長沮桀溺耦而耕丈人植其杖而芸並同上子不違農時穀不}
