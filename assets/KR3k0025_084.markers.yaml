  - {type: variant, offset: 3216, length: 1, content: 使, WYG: 殘而佑仁公之蠲濁而流清豈不欲廢貪而立亷公之居高而望逺豈不欲家喻而戸曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟以白雲為籓籬碧山為屏風昭其儉也决疏沮洳捜剔山麓萬石如林清風自生翠煙自留綿谷跨􅀈皆大石林立渙若奔雲錯若置碁怒者虎鬭企者鳥厲决其穴則鼻口相呀捜其根則蹄股交峙環行卒愕疑若摶噬於是刳闢朽壤剪焚榛薉决澮溝導伏流散為疎林洄為清池寥廓泓渟若造物者始判清濁效竒於兹地非人力也豈天墜地出設兹神物栁文春之日衆木華拆岸鋪島織沈浮照耀其水五色於是乎襲馨摘竒方舟逶迤樂魚時翻飄蕋雪飛沂㳂環迴隠映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松密竹深大柳起風甘棠垂隂於是乎濯纓漣漪解帶升堂畏景火雲隔林無光虛甍沈沈皓歴如霜羽扇不揺南軒清凉此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬱洞開太華爽氣出關而來於是乎絃琴端若景物廓如月委浩素水涵空虛鳥驚寒沙露滴高梧境隨夜深疑與世殊此則庾公西樓未足以澹神慮也冬之日彤雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰裳憑軒倚楹瑶堦如眞玉樹羅生日暮天霽雲開月明氷泉潺潺終夜有聲此則子猷山陰未足以暢吟嘯也呂温作虢州三堂記豐而不侈約而不陋以琴竹詩書之幽素易綺紈鐘皷之繁喧惟林池煙景不讓呂叔和文春有錦綉谷花夏有石門洞雲秋有虎溪月冬有爐峯雪隂陽顯晦昬旦含吐千變萬狀不可殫紀覼縷而言白樂天集四垂無蔽萬景坌入落花芳草無人處劉賓客花香逐陶令草色對王孫劉長卿峯奪香爐巧池偷明鏡圎沈文卿當門竹勝簾姚少監俗塵不飛人意自逺劉賓客本朝温公營獨樂園在洛中諸園景最為簡素人以公之故春時必遊明道集朝遊北城中囘首見脩竹下有朱門家破墻圍古屋舉鞭叩其戸幽響荅空谷入門所見多十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深牎户緑水光兼竹凈時有獨立鵠林中百尺松歲久蒼鱗蹙言惟此地少意恐關中獨小橋過南圃夾道多喬木隠如城百雉渥若丹千斛陰陰日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅棃驚合抱映島孤雲馥春光水溶漾雪陣風翻撲其北臨長溪波聲捲平陸我時來周覽問此誰所築云昔李將軍負險乗衰叔此亭破千家鬱鬱城之麓何嘗載美酒來此駐車轂人生營居止竟為何人卜何當辦一身永與清景逐東坡李氏園詩農經不耕穫不菑畬易无妄神農氏作斵木為耜揉木為耒繫辭平秩東作平秩西}
