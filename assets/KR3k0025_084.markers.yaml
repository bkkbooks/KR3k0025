  - {type: variant, offset: 363, length: 0, content: '', WYG: 以居請更諸爽塏者左傳開第康莊之衢史記孟}
  - {type: variant, offset: 363, length: 0, content: '', krp: 以居請更諸爽塏者左傳開第康莊之衢史記孟}
  - {type: variant, offset: 364, length: 419, content: 文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬攻王楚滅若敖氏左宣四子魚曰禍猶未也未足以懲君左僖二十初平王之東遷辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川左僖二十二人生求富而子逃之何也子文曰民多曠者而我取富焉是廑民以自封也死無日矣我逃死非逃富也故莊公世滅若敖唯子文之後在國語楚伯禽封魯三年而後報政周公曰何遲也太公封於齊五月而報政周公曰何疾也乃嘆曰魯後世其北面事齊矣史魯世家初智宣子將以瑤為後智果曰不如宵也若果立瑤智宗必滅弗聽韓趙魏殺智伯盡滅智氏之族通鑑張儀至楚說楚王曰大王誠能聽臣閉關絕約於齊臣請獻商於之地六百里陳軫獨弔曰秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王使一將軍隨張儀至秦張儀詐墮車不朝三月通鑑周紀袁盎曰淮南王為人剛悍今暴摧折之臣恐卒逢霧露病死陛下有殺弟之名柰何上曰吾特苦之耳今復之淮南王果憤恚不食死通鑑漢文紀聰者聽於無聲明者見於未形漢書伍被, WYG: ''}
