  - {type: variant, offset: 3208, length: 2, content: 姦猾, krp: 言即命左右神䇿軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞唐書集余旣滋蘭之九畹兮又樹蕙之百畆楚辭爰定我居築室穿池長楊映沼芳枳樹籬遊鱗瀺灂菡萏數披竹木蓊鬱靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢植三桃表櫻胡之别二李耀丹白之色石榴蒲萄之珍磊落蔓衍乎其側梅杏郁棠之屬繁華藻麗之飾華實照爛言所不能極也菜則葱韭蒜芋青筍紫薑堇薺甘旨蓼荽音綏芬芳蘘荷依隂蒔藿向陽緑葵含露白薤負霜潘岳閒居賦園日涉而成趣門雖設而常關歸去來辭盧園栖巖文選詩築山擬蓬壺穿池類溟渤鮑明逺代君子行岸旁花柳㸔勝畫浦上樓臺望是仙張九齡詩香泉草豐潔杜詩瞰臨𦕈空闊緑淨不可唾韓詩水容與天色此處皆緑淨斬茅而嘉樹列發石而清泉激輦糞壤焚椔翳却立而視之出者突然成丘陷者岈然成谷窪者為池而缺者為洞若有鬼神異物陰來相之韓文將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑而求天作地生之狀咸}
