  - {type: variant, offset: 3632, length: 0, content: '', WYG: 既誤釣渭日徒消並同}
  - {type: variant, offset: 3632, length: 0, content: '', krp: 既誤釣渭日徒消並同}
  - {type: variant, offset: 3633, length: 0, content: '', WYG: 漁澤從鰌魴柳詩去來伊洛上相待安笟單柳詩我為一寸鉤欲釣千丈流魚翁夜傍西巖宿曉汲清湘燃楚竹煙銷日黯不見人欸乃一聲山水緑並同上雨來蓴菜流船滑春後鱸魚墜釣肥皮日休西塞山邊白鷺飛桃花流水鱖魚肥青篛笠緑蓑衣春江細雨不知歸又曰釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不曽憂張志和本朝陸龜蒙升舟設蓬席齋束書茶竈筆牀釣具徃來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人自叙采江之魚兮朝船有鱸采江之蔬兮暮筐有蒲左圗且書右瑟與壺陸龜蒙笭箵苦難滿六一集笭箵取魚器也向暮卷空罾同上漁蓑句好眞堪畫東坡還有江南風物好流水鱖魚肥仰㸔雲天真篛笠旋收江海入簑衣千首新詩一竿竹不應空釣漢江槎何日西湖尋舊賞淡煙踈雨暗漁蓑漁父飲誰家去魚蟹一時分與酒無多少醉為期彼此不論錢數漁父醉簔衣舞醉裏却尋歸路孤舟短棹任縱横醒後不知何處漁父醒春江午夢斷落花飛絮酒醒還醉醉還醒一笑人間今古漁父笑輕鷗舉漠漠一江風雨江邊騎馬是官人借我孤舟南渡並同上一江風月趂漁船山谷寕容網目漏吞舟誰能烹鮮作苛碎后山獵見禮儀部田獵類工經若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斵惟其塗丹雘書梓材五曰百工飭化八材周禮太宰攻木之工七輪輿弓廬匠車梓攻金之工六築冶鳬㮚段桃攻皮之工五函鮑韗韋裘設色之工五畫繢鍾筐㡛刮摩之工五玉櫛雕矢磬摶埴之工二陶旊考工記百工之事皆聖人之所作也同上天子之六工曰土工金工石工木工獸工草工典制六材記曲禮子為巨室則必使工師求大木孟子離婁之明公輸子之巧不以規矩不能成方圎梓匠輪輿能與人規矩不能使人巧大匠不為拙工改廢繩墨大匠誨人必以規矩學者亦必以規矩並同上梓慶削木為鐻見者驚猶鬼神莊子鄭人堊漫其鼻端若蠅翼使匠石斵之匠石運斤成風盡堊而鼻不傷工倕旋而葢規矩指與物化而不以心稽輪扁曰斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪並同上周穆王廵狩有獻工人名偃師王問曰若有何能曰臣之所造能倡者穆王驚視之趣步俯仰信人也巧夫鎭其頥則歌合律捧其手則舞應節千變萬化惟}
