  - {type: variant, offset: 3194, length: 2, content: 初渾, WYG: 傳記廣室多陰逺天地之和也故聖人弗為春秋繁露陳秀公治第潤州池館綿亘數百步宅成公已疾甚肩輿一登西樓而已人謂之三不得居不得修不得賣不得沈括存中述筆談集夏屋廣大沙堂秀尺高堂邃宇層臺累榭網戸朱綴砥室翠翹楚辭幽堂晝宻文選七命仰視兮雲屋班媫妤賦羣窈窕之華麗嗟内顧之所觀故其館室次舎采飾纖縟西京賦十廡萬室蜀都賦金鋪交映玉題相輝蜀都賦累棟重霤葺墻羃室左太沖魏都賦既節比而攅集又宏璉}
