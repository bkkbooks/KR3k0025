  - {type: variant, offset: 3660, length: 4, content: 用則踈若, WYG: 世闕商賈經日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑易繫辭懋遷有無化居書益稷六曰商賈阜通貨賄注云行曰商處曰賈周禮太宰以商賈阜貨而行市司市或通四方之珍異以資之考工記秦師伐鄭商人弦高遇之以乘韋先牛十二犒師且使遽告於鄭左傳韓宣子有玉環其一}
