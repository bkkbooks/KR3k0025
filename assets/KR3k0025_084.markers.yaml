  - {type: variant, offset: 3624, length: 5, content: 曰王安石雖, WYG: 勝銀漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉騰出如有神潛龍無聲老蛟怒迴風颯颯吹沙塵杜詩蒼江漁子清晨集設網提綱萬魚急能者操舟疾若風撑突波濤挺义入小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈強泥沙}
