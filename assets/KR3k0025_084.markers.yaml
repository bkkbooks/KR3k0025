  - {type: variant, offset: 1843, length: 603, content: 天下之患其後以兵屬劉聰自立為趙王晉書載記王猛將死苻堅問以後事猛曰臣歿之後願勿以晉為圖鮮卑羌虜我之仇讎終為人患宜漸除之以寧社稷堅不能用同前初劉毅季父鎮之閑居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久我不就爾求財位亦不同爾受罪每見毅藩導從到門輒詬之通監晉安紀義康方用事人爭求親暱唯司徒主簿江湛早能自踈求出為武陵內史檀道濟嘗為其子求婚於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難通鑑宋太祖顏延之子竣貴重凡所資供延之一無所受布衣茅室蕭然如故嘗乘羸牛笨車逢竣鹵簿即屏住道側常語竣曰吾平生不喜見要人今不幸見汝通監宋世祖顏延之嘗早詣其子竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎後竣被誅通監宋紀閔湛等又勸崔浩刊所撰國史于石以彰直筆高允聞之謂著作郎宗欽曰閔湛所營方寸之間恐為崔門萬世之禍吾徒亦無類矣未幾而難作宗欽臨刑嘆曰高允其殆聖乎北史高允傳鬱林王之將廢也王晏從弟思遠謂晏曰兄荷世祖厚恩今一旦贊人如此事彼或可以權計相傾未知兄將來何以自立若及此引決猶可保全門戶不失後名思遠知上外待晏厚而內已疑異乘間謂晏曰時事稍異兄亦覓否凡人多拙於自謀而巧於謀人通監齊高宗張九齡奏安祿山狼子野心面有逆相請戮之上放歸藩唐書裴坦子娶楊收女資送甚厚器用飾以犀玉坦見之怒曰破我家矣立命壞之已而收竟以賄敗通監唐太宗王勮蘇味道皆未知名裴行儉一見謂之曰二君後當相次掌銓衡是時王勮弟勃與華陰楊炯范陽盧照鄰義烏駱賓王皆以, WYG: ''}
