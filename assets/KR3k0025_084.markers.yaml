  - {type: variant, offset: 3601, length: 1, content: 欲, krp: 髙㑹所少者呉松江鱸魚為鱠耳元放因求銅盤貯水以竿餌釣於盤中須㬰引一鱸魚出方術傳翼莊惟以弋釣為事及長不復獵或問漁獵曰是害生之事而先生止去其一何哉莊曰獵自我釣自物且夫貪餌忘釣豈我哉晉書陶侃少時漁於雷澤嘗網得一織梭以掛於壁有頃風雷化為龍而去同上宋文帝嘗與羣臣臨天泉池垂綸良久不獲景文越席曰臣以為垂綸者清故不獲貪餌南史王𢎞之性好釣或問曰漁思得魚賣否曰亦自不得得亦不賣同上傳記善釣者引魚於千仞之下餌香也吕氏春秋太公釣於慈泉同上吕望釣於渭渚三日三夜魚無食者農人曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其}
  - {type: variant, offset: 3603, length: 0, content: '', WYG: 初下得鮒次得鯉刳腹得書曰呂望封於齊藝文類聚周文王至磻溪見呂望文王拜之尚曰望釣得玉璜刻曰周受命呂佐尚書帝命驗宓子賤為單父宰陽晝曰有釣道二焉請以送子投綸餌迎而吸之者陽鱎魚也薄而不美若亡若存若食不食者魴魚也薄而厚味子賤未至單父冠葢交接於道子賤曰車驅之陽晝所謂陽鱎者至矣說苑揚州太守閭丘㑹僚友於轉沙亭令漁户曰得魚多者有賞有一漁人以肉物作塊散懸於網上凡十網得魚三千六百太守詢之曰魚喜鹿胎香適散懸者乃此物也楊州事迹楚江邊有漁者或問之曰君之漁隠人之漁邪漁人之漁邪漁者曰昔姜牙之漁嚴子陵之漁書於青史皆以為隠人之漁也殊不知不釣其名耶若以漁人之漁但以月白風和浪靜得魚供庖宰一身足餘則易酒獨醉又焉知隠人之漁漁人之漁也瀟湘録張志和居江湖自稱煙波釣徒著𤣥眞子以自號垂釣不設餌志不在魚也魚歌録集屈原既放行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與}
  - {type: page-break, offset: 3603, content: '', id: KR3k0025_WYG_084-25a, image: WYG0932/WYG0932-0553c.png}
