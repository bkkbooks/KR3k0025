  - {type: variant, offset: 3604, length: 2, content: 事獻, WYG: 故至於斯屈原曰舉世皆濁而我獨清衆人皆醉我獨醒是以見放漁父曰世皆濁何不淈其泥而揚其波衆皆醉何不餔其糟而啜其醨屈原曰新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎漁父皷枻而去歌曰滄浪之水清兮}
