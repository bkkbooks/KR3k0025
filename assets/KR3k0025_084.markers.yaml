  - {type: variant, offset: 2647, length: 543, content: 已定彼猶机上肉耳夫何能為季昶歎曰吾不知死所矣劉幽求亦謂亙彥範敬暉曰武三思尚存公輩終無葬地若不早圖噬臍何及通監唐太宗互入遠慮蔣欽緒蕭至忠姊夫也謂之曰如子之才何憂不達勿為非分妄求至忠不應欽緒退嘆曰九代卿族一舉滅之可哀也哉通監唐元宗上欲以李林甫為相張九齡曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂通監唐元宗王忠嗣數上言祿山必反同上哥舒翰攻吐蕃石堡城士卒死者數萬果如王忠嗣之言通監顏真卿為平原太守安祿山逆節頗著真卿以霖雨為託修城浚濠未幾祿山果反河朔盡陷獨平原城守具備唐書陝郡進士張彖曰君輩倚楊右相為泰山吾以為冰山若皎日既出得無失所恃乎通監唐紀互入儆戒崇勸天子不求邊功璟不肯賞邊臣而天寶之亂卒蹈其害可謂先見矣唐書姚宋贊姚崇與張說同為宰相張銜崇崇疾戒諸子曰張為人好服玩吾身沒之後汝具陳吾平生服玩寶帶重器羅列於帳前張若不顧汝計家事產族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時錄進仍先礱石以待至便鑴刻張丞相見事常遲於我數日之後必當有悔若徵碑文以刊削為辭當引使視其鑴石仍告已具聞上崇沒張果至目其服玩者三四不數日文成敘足該詳後數日果遣使取本以為辭未周密欲加刪改姚氏子引使者視其碑乃告以奏御使者復命張悔恨拊膺曰死姚崇能筭生張說吾今日方知才之不及遠矣唐書互入心腹吐蕃劫盟德宗謂柳渾曰卿儒士乃知軍戎萬里情乎, WYG: ''}
