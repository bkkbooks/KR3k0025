  - {type: variant, offset: 3601, length: 1, content: 欲, WYG: 髙㑹所少者呉松江鱸魚為鱠耳元放因求銅盤貯水以竿餌釣於盤中須㬰引一鱸魚出方術傳翼莊惟以弋釣為事及長不復獵或問漁獵曰是害生之事而先生止去其一何哉莊曰獵自我釣自物且夫貪餌忘釣豈我哉晉書陶侃少時漁於雷澤嘗網得一織梭以掛於壁有頃風雷化為龍而去同上宋文帝嘗與羣臣臨天泉池垂綸良久不獲景文越席曰臣以為垂綸者清故不獲貪餌南史王𢎞之性好釣或問曰漁思得魚賣否曰亦自不得得亦不賣同上傳記善釣者引魚於千仞之下餌香也吕氏春秋太公釣於慈泉同上吕望釣於渭渚三日三夜魚無食者農人曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其}
