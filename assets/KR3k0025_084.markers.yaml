  - {type: variant, offset: 3631, length: 0, content: '', WYG: 立強擬晴天理釣絲接縷垂芳餌試問垂綸客把釣待秋風並同上狂歌從此别垂釣滄浪前李白羽沉知食駛緡細覺牽難韓詩坐厭親刑柄偷來傍釣車吾黨侯生字叔起呼我持竿釣温水平明鞭馬出都門盡日行行荆棘裏温水微茫絶又流深如車轍闊容輈蝦䗫跳過雀兒浴此縱有魚何足求我為侯生不能已盤針擘粒投泥滓晡時堅坐到黄昬盡日持竿方一起暫動還休未可知蝦行蛭度似皆疑忽然舉線若有得一寸纔分鱗與鬐君欲釣魚須逺去大魚豈肯居沮洳义魚春岸闊此興在中宵中鱗憐錦碎當目訝珠銷競多心轉細得雋語時囂潭罄知存寡舷平覺獲饒盈車欺故事飼犬驗今朝獺去愁無食龍移懼見燒如棠}
  - {type: page-break, offset: 3631, content: '', id: KR3k0025_WYG_084-26b, image: WYG0932/WYG0932-0554b.png}
