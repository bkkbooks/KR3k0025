  - {type: variant, offset: 3673, length: 2, content: 宰府, WYG: 賈人既成價矣賈人曰必以聞子産曰昔我與商人皆出自周世有明誓以相信也曰爾無我叛我無強賈爾有利市寶賄我勿與知今吾子以好來辱敝邑而謂敝邑強奪賈人是教敝邑背明誓也同上子商賈皆欲藏於王之市行旅皆欲出於王之塗孟子市㕓而不征法而不㕓}
