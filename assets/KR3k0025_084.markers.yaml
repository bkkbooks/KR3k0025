  - {type: variant, offset: 3325, length: 0, content: '', WYG: 萬人飡一年辛苦一冬閒但令黄犢無人佩布穀何勞也勸耕脫冠還作扶犂叟並同上水秧綿綿復多稌龍骨長乾桂梁梠鮒魚出網蔽洲渚荻笋肥甘勝牛乳王介甫南村北村同一犂新婦餉姑翁哺兒山谷看人秧稻午風凉同上圃經折柳樊圃詩東方未明二曰園圃毓草木周禮太宰任圃以樹事貢草木閭師樊遲請學為圃曰吾不如老圃論語子子貢南遊於楚過漢隂見一丈人方將為圃畦鑿隧而入井抱瓮而出灌搰搰然用力甚勞而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多為圃者曰柰何曰鑿木為械後重前輕挈水若抽數如泆湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備吾非不知羞而不為也莊子傳記張老者楊州六合縣園叟也韋恕有女既笄張老延媒媪求娶之媪曰豈有衣冠子女肯嫁圃叟耶張老強之媪不得已入言之韋恕怒曰為吾報之今日内得五百緡即可未幾車載納於韋氏諸韋大驚曰吾度其必無今不移時而錢到當如之何遂許焉張老既取韋氏園業不廢鬻蔬不輟親戚惡之張老曰某王屋山下有一莊明旦當歸耳他日可令大兄徃天壇山南相訪後如其言訪之盖仙云廣記有一秀才求㛰卜人曰君之室方二歲在滑州郭南姓某氏其父母見灌園為業秀才不樂徑詣滑訪之一日伺其父母出引女嬰使前以細針内其􅀈中而去女竟無恙後秀才登第娶亷使女其妻每天氣陰晦輒發頭痛醫者以藥封腦上有頃肉潰出一針遂愈因訪問女之所出方知本圃者之女云玉堂閒話劉晏少妙道術遇道流三人飲酒極歡曰世間還得似我輩否一人曰王十八後晏於衡山縣喫冷淘香菜芳潔劉公問此菜何所得答曰縣有官園子王十八能種此莱劉公訪王十八與俱歸其後劉公病已屬纊得王十八藥三丸灌之蹶然而起逸史集幾道泉澆圃交横落幔坡杜詩圃畦新雨潤媿子廢鋤來連筒灌小園並同上蠶經桑土既蠶書禹貢有鳴倉庚女執懿筐遵彼微行爰求柔桑詩七月蠶月條桑同上十畝之間兮桑者閑閑兮十畝之間婦無公事休其蠶織禁原蠶者周禮原再也季春戴勝降於桑具曲植籧筐后妃齋戒東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲效功以共郊廟之服記月令天子諸侯必有公桑蠶室卜三宫夫人世婦之吉者使入蠶於蠶室桑於公桑子五畆之宅樹墻下以桑匹婦蠶之則老者足以衣帛矣孟子食桑而吐絲前亂而後治夏生而惡暑喜晴而悲雨蛹以為母以為父三俯三起事乃大已夫是之謂蠶理荀子賦篇史正月上甲風從東方來冝蠶史天官書光武時野蠶成繭被於山阜後本紀武德五年梁州野蠶成繭唐書尹思正為青州刺史蠶至歲四熟本傳傳記東郭採桑之女項有大瘤齊閔王遊至東郭百姓盡觀瘤女採桑如故王怪問之對曰父母教採桑不受教觀大王王曰此竒女也遂聘為后齊國大治列女傳蜀之先有蠶叢帝又高辛時蜀有蠶女父為人所掠惟所乘馬在其母誓曰有得父還者以此女嫁之馬聞言驚躍而去數日父乃乘馬歸自此馬嘶鳴不肯齕草母以告父父曰誓於人不誓於馬安有人而偶非類乎馬跑父怒射殺之曝其皮於庭皮蹶然而起卷女飛去棲於桑上女化為蠶食桑吐絲成繭蜀人塑女象披馬皮謂之馬頭娘以祈􅁞焉圗經張成見一婦人立宅東南角曰此地是君蠶室正月半日可作白粥膏泛}
