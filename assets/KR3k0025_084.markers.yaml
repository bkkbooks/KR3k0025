  - {type: variant, offset: 3636, length: 2, content: 然好, WYG: 方如一馬均以來未之有也南史祖冲之以諸葛亮有木牛流馬乃造一器不用風水施機自運不勞人力冲之有造千里船於新亭江試之日行百餘里並同上隋煬帝北廵宇文愷造觀風行殿上容衛者數百人下施輪軸推移倐忽有若神功北史裴延齡大搜市㕓逮捕匠徒迫脅就工號曰敕索弗讎其直名曰和顧弗與之庸唐書虢國中堂既成召工圬墁約錢二百萬虢國以絳羅五百段賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受直𤣥宗紀傳記始皇起雲明臺窮四方珍木天下巧工有二人皆虛騰縁木運斤斧於雲中子時起工至午時已畢故云子午臺也拾遺録凌雲臺樓觀極精巧恒隨風揺動而終無崩隕魏文帝懼其勢危别以大材扶持之樓即傾壊論者謂輕重力偏故也世說魯般燉煌人巧侔造化於涼州造浮屠作木鳶每擊揳三下乘之以歸六國時公輸班亦為木鳶以窺宋城雜爼北齊有沙門靈昭有巧思武成帝令於山亭造流杯池船每至帝前引手取杯船即自徃上有木小兒撫掌遂與絲竹相應飲訖放杯便有木人刺還飲若不盡船終不去廣記集班倕棄其剞劂兮王爾投其鉤繩甘泉賦夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其冝施以成室者匠氏之工也韓文木之就規矩在梓匠輪輿不善為斵血指汗顔巧匠旁觀縮手袖間並同上裴封叔之第在光德里有梓人欵其門願傭隟宇而處焉所軄尋引規矩繩墨家不居礱斵之噐其後京兆尹將飾官署委羣材㑹衆工梓人左}
