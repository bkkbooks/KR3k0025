  - {type: variant, offset: 3204, length: 1, content: 弘, WYG: 愈東都集經之營之門房洞褰列舉豐厨危危掀掀皇甫湜廊腰縵囘簷牙高啄杜牧之園池經始命有園囿之樂焉詩註史楚子成章華之臺願與諸侯落之左傳深林絶澗有若自然東漢馮異傳竒禽馴獸飛聲其間同上襄陽諸習氏荆土豪族有佳園池晉書山簡傳宋簡文入華林園顧謂左右}
