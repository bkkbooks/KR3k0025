  - {type: variant, offset: 3698, length: 3, content: 疏逆陳, WYG: 富商賈或滯財役貧轉轂百數廢居居邑前食貨志宋劉伯龍歴位九卿郡守貧窶尤甚嘗在家慨然將營什一之利一鬼在傍撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所笑南史何妥父細脚胡通商入蜀因致巨富號為西州大賈北史傳記段干木晉國之大駔呂氏春秋柳仲郢有婢失意鬻之女儈導於刺史藍巨源他日巨源召鬻綾羅者酬酢可否柳婢失聲而仆命輿還女儈家翌日詰其所苦曰某雖賤人曽為柳家細婢死則死矣安能事賣綾羅牙郎乎廣記有貧人止販隻瓮夜宿瓮巾心計曰此瓮賣之其息已倍遂可販二瓮自二而四}
