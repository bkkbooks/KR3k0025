  - {type: variant, offset: 3218, length: 3, content: 羽翼必, WYG: 書堯典若農服田力穡乃亦有秋盤庚惰農自安不昬作勞不服田畆越其罔有黍稷同上厥父菑厥子乃弗肯播矧肯穫大誥若稽田旣勤敷菑惟其陳修為厥疆畎梓材三之日于耜四之日舉趾同我婦子饁彼南畆田畯至喜詩七月晝爾于茅宵爾索綯亟其乘屋其始播百穀同上我田既藏農夫之慶彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利大田載芟載柞其耕澤澤載芟其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼良耜三農生九穀周禮太宰飭力以長地財謂之農夫考工記孟春王命布農事命田舍東郊善相丘陵阪險原隰土地所宜五穀所殖以教道民記月令}
