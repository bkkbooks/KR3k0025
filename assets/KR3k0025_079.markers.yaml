  - {type: variant, offset: 771, length: 0, content: '', WYG: 集臨穴呼蒼天涕下如綆縻邈終天其不返文選念過隙之倐忽悲逝川之不停踐霜露之悽愴懷燧榖而涕零梁武孝思賦膝下之歡已同過隙几筵之慕幾何可憑任彦昇啟露往霜來日月其除左太冲吴都賦永懷鞠養之恩長増思慕之痛駱賔王濡露踐霜誰無永懷劉賔客霜降露濡孝思罔極詞意書疏無不宛然惟是魂神不知去處每開一卷刀攪肺腸每讀一篇血滴文字白傳音容若在曷日而亡李習之怵􅅥乎霜露唐文粹金日磾見圗而泣元稹集時祭經春秋匪懈享祀不忒吉蠲爲饎是用孝享禴祠烝嘗于公先王祭以清酒從以騂牡享于祖考苾苾芬芬祀事}
