  - {type: variant, offset: 156, length: 0, content: '', WYG: 喟然不覺涕之無從東漢耿弇傳論徐穉有死喪萬里負笈赴弔謝承後漢書陳寔卒海内弔者三萬餘人通鑑王祥之薨奔赴者非朝廷之賢則親戚故吏而已門無雜弔之賓晉本傳王愆期謂陶侃曰賢子越騎酷没天下爲公痛心況慈父情耶世說注集羣辟慟懷邦族揮淚王仲宣誄文馳影奔赴陳子昻集百官臨弔畢集孔光之門唐文粹本朝眼㸔白璧埋黄壤何況人間父子情山谷居喪經親者居倚廬賤者居堊室周禮杖者何爵也無爵而杖者何擔主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也爵謂天子諸侯卿大夫士也無爵謂庶人也擔猶假也無爵者假之以杖尊其爲主也非主謂衆子也儀禮居喪之禮毀瘠不形視聽不衰升降不由阼階出入不當門隧居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝五十不致毀六十不毀七十唯衰麻在身飲酒食肉處於内有喪者專席而坐專猶單也居倚廬寢苫枕塊不說絰帶倚廬者倚墻至地而為之无楣柱父母之喪哭無時致喪三年髙子臯之執親之喪也泣血三年未嘗見齒顔丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息居喪讀喪禮既葬讀祭禮曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有父母之喪不避涕泣而見人至哀無飾婦人不宜袒故發胷擊心爵踊足不絶地殷殷田田如壞牆然大夫士父母之喪既練而歸歸其宫也朔月忌日歸哭於宗室宗子之家三年之喪以喪拜稽顙而後拜喪無接賔之禮喪者不遺人人遺之雖酒肉受之也孔子曰身有􅅑則浴首有瘡則沐病則飲酒毀瘠爲病君子弗爲也君子執親之喪也水漿不入於口者三日杖而后能起三年之喪言而不語言言己事也爲人說爲語對而不問廬堊室之中不與人坐焉非時見乎母也不入門喪不慮居謂費舎宅以奉喪爲無廟也毀不危身謂憔悴將滅性爲無後也喪不貳事不使從政也喪有疾食肉飲酒必有草木之滋焉薑桂之謂也父母之喪居倚廬不塗寢苫枕塊非喪事不言三年之喪如斬直衰不補居於倚廬哀親之在外也寢苫枕塊哀親之在土也弁人有其母死而孺子泣者孔子曰哀則哀矣而難爲繼也夫禮爲可𫝊也爲可繼也故哭踊有節曽子曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行爲其茍語忘哀也君子禮以飾情三年之喪而弔哭不亦虛乎曽子問注云為彼哀則不專為親哀則是為妄弔喪者非尸柩之事不親有父之喪如未没喪而母死其除父之喪也服其除服卒事反喪服子貢問喪子曰敬爲}
