  - {type: variant, offset: 2692, length: 637, content: 頭邵堯夫詩經怙終賊刑書舜典降霍叔于庶人三年不齒書蔡仲之命三細不宥書君陳史斐豹隸也著於丹書左襄二十三年懸頭槀街西漢陳湯傳集聲其惡於天下也柳文辯侵伐論經為天下逋逃主萃淵藪書武成教猱升木詩角弓子是輔桀也孟告子下史助桀為虐西漢張良傳日夜縱臾西漢衡山王傳假賊兵為虎翼者也西漢賈誼傳養稂莠者傷禾稼惠姦宄者賊良民後漢王符傳見非不舉聞惡不察通監漢殤紀是為虎傳翼也通監三國魏史傳記藉賊兵而齎盜食者也戰國策本朝蘇舜欽監奏院因十月賽神會館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同坐者皆坐斥劉謂時相賈昌朝曰與相公一網打盡張師正倦游錄互入阿附經莫赤匪狐莫黑匪烏注君臣相氶為惡如一詩邶比風衛君無道夫人無德詩靜女相覿以貨相賂以利記郊特牲史同惡相求如市賈焉左昭十三年凶德參會西漢灌夫等贊招呼元惡以自營衛專為群逆主萃淵藪東漢孔融傳傳記豹則虎之弟鷹則鷂之兄古樂府史為賢者諱也榖梁五孔子曰臣子不可以言君親之惡為諱者禮也史巫馬期傳大臣有坐不廉者不曰不廉曰簠簋不飾坐汙穢淫亂者不曰汙穢曰帷薄不脩坐罷軟不勝任者不謂罷軟曰下官不職西漢賈誼傳互入覆蓋張安世為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不翻水漿耶如何以小過成罪郎淫官婢婢兄自言安世曰奴誣汙衣冠其隱人過失皆類此西漢本傳互入覆蓋丙吉為丞相於官屬椽吏務掩過揚善同上互入揚善戴聖九江守行治多不法何武為剌史廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡西漢何武傳傳記忠臣令誹在己譽在上宋君奪民時以為臺而民非之無忠臣以掩蓋之也子罕執扑為司空民非子罕而善其君桓公宮中, WYG: 卷}
