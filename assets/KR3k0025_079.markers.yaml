  - {type: variant, offset: 41, length: 10, content: 莊田子方項託年七歲為, WYG: 死而不朽反貴於生尚馳作諸葛武侯碑千仭壁立而太山其頽五緯珠聨而采石自隕文粹書札與詩文重疊我笥筐栁車一出門終天無迴箱衣器陳下帳醪餌奠皇堂明靈庶鑒知彷彿期來饗張籍祭韓文本朝公雖百齡人以爲少平生笑言俯仰今昔送不臨穴哀不望帷歐公集生有聞於當時死有傳於後世弔禍問疾書猶在眼學問文章丘山鬱鬱湖海茫茫臨川集自嗟來暮不聞援薤之規尚意神眀聊置生芻之奠蘇東坡祭文位不滿其徳奄移夜舟遽先朝露類要焄蒿悽愴若或見之茫茫九泉愛莫起之豈厭世溷濁潔而逝乎將民之無禄而天莫之遺東坡文奉諱云初痛心罔極欒城集弔慰經弔喪弗能賻不問其所費知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔死而不弔者三謂輕身忘孝也畏人或以非罪加已不能有以說之死之者厭行止危險溺謂不乘橋船}
