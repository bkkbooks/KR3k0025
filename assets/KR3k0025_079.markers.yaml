  - {type: variant, offset: 776, length: 12, content: 為冠又年最少老師宿儒恥出, WYG: 能存亡形属荒絶者惟齋乎揚子史祀者所以昭孝事祖通神明也西漢郊祀志阡隴經適墓不登隴適墓不歌孔子曰古不修墓孔子既合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺葬於墓所以即逺也延陵季子子死葬於嬴博之間}
