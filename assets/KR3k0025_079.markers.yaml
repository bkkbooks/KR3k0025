  - {type: variant, offset: 5, length: 0, content: '', WYG: 曰泰山其頽乎梁木其壊乎哲人其萎乎子貢曰泰山其頽則吾將安仰梁木其壊哲人其萎則吾將安放朝奠日出夕奠逮日喪不剥奠也剥猶倮也有牲肉則巾之爲其久設塵埃加也醢酺之奠不巾魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父記史昊天不弔太山其頽范寗榖梁傳序曹操感𤣥知已及後過𤣥墓致祭自為文東漢橋𤣥傳郭林宗有母憂徐穉往弔之置生芻一束於廬前而去東漢徐穉傳徐穉有死喪負笈赴弔常於塜頭炙雞一隻以一兩綿絮漬酒暴乾以裹雞徑到祭所塜隧外以水漬綿使有酒氣㪷米飯白茅為藉以雞置前醊酒畢則去不}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_079-1b, image: WYG0932/WYG0932-0409b.png}
