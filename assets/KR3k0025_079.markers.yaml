小祥者主人練祭既練居堊室不與人居堊所居之室之飾也練練衣黄裏縓縁小祥練冠練中衣以黄爲内縓爲飾也黄之色異於纁縓纁之類明外除也練不羣立不旅行爲其茍語則忘乎哀也期而練練冠縓縁要絰不除男子除乎首婦人除乎帶練而食菜果練而弔殷練而祔記子魯大夫練而杖子貢問孔子曰練而杖禮歟子曰非禮也家語魯大夫練而牀孔子曰非禮也荀子本朝練衣必煅煉大功之布以爲衣故有言功衰功衰上之衣也以喪久變}
  - {type: variant, offset: 1660, length: 0, content: '', WYG: 也老泉大祥經喪禮既祥祭而縞冠素紕詩飾素冠魯人有朝祥而暮歌者夫子曰又多乎哉踰月則其善也有子盖既祥而絲履組纓譏其太早也顔淵之喪饋祥肉孔子彈琴而後食之以散哀也孔子既祥五日彈琴而不成聲十日而成笙歌祥而縞又期而大祥祥而廓然憂悼在心之貎也祥之日鼓素琴告民有終也以節制者也祥而食肉既祥黝堊祥而外無哭者記集甫及嵗期奄過大祥禮制云終追號永逺悲裂肝心奠筵將徹幃帳一收此生之間豈有見日未死之際應無忘期仰天一號心骨破碎猶冀萬一聞吾此言傳雖送終之有已豈孝思之敢忘白帖本朝喪紀有終哀懐靡極度新宫而館御諏吉日以徂遷臨川集禫經𤣥衣黄裳則是禫祭𤣥冠矣黄裳者未大吉也既祭乃服禫服禫而從御孟獻子禫懸而不樂比御而不入夫子曰獻子加於人一等矣是月禫徙月樂言禫明是月可以用樂禫而牀禫而飲醴酒禫而内無哭者樂作矣故也禫而纎無所不佩纎采纓也記集孝無終始喪有祥禫禫祭名與大祥間一月自喪至此凡二十七月禫之言澹澹然平安之意也白帖本朝追號罔極實抱終身之憂祥禫有期盖迫先王之禮東坡集除服經吉祭而復寢三年之喪二十五月而畢若駟之過隙喪不過三年免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也子貢既除喪而見孔子予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不以送死有期復生有節也哉記去喪無所不佩論語史服除思慕終身如喪南史郭世通傳謝曜卒弟𢎞㣲服雖除猶不噉魚肉沙門釋慧琳嘗與之食見其猶蔬素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理𢎞㣲曰衣冠之變禮不可踰在心之哀實未能已南史宋謝𢎞㣲傳集道喪既畢元和制集不幸餘命不殞}
