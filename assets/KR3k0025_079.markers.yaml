  - {type: variant, offset: 1661, length: 1, content: 清, WYG: 冠戴纓元微之集杖絰外除柴瘠加等燕集祥雖除服憂且終身白帖衣裳外除權載之集日晷奔迅禮經迫促豈圖㣲生尚留殘喘類要本朝寒暑之變忽焉再期練祥之餘復將三月勉從即吉之典莫遂無窮之哀喪期有數禫月告終天地之運固代謝於隂陽草木何知徒興悲於霜露東坡集祥琴既御吉服以朝臨川集諱日經君子有終身之喪忌日之謂也忌日不用不用舉他事如有時日之禁也非不祥也注善也言夫日志有所至而不敢盡其私也親以此日亡其哀}
