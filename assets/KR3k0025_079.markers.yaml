  - {type: variant, offset: 158, length: 1, content: 吾, WYG: 竹桐一也何爲也曰孝子身病體羸以杖扶病也父在則不敢杖矣尊者在故也斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂大功之喪寢有席小功之喪牀可也伯魚之母死期而猶哭夫子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之創鉅者其日}
