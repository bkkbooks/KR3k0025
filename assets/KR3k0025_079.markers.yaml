  - {type: variant, offset: 1659, length: 0, content: '', WYG: 佩鴻毛今不振陸機挽詞行行去城邑遥遥首丘園息鑣竟平隧稅駕到巖根顔延之挽詞薤露歌連哭泉扉夜作晨擬𤣥集景移林改色風去水餘波劉孝綽詩金蘭徒有契玉樹已埋塵杳杳泉中夜悠悠代上春幽明長隔此歌笑爲何人並陳子昻集九泉如可作千載與誰歸駱賔王一旦先朝菌千秋掩夜臺草露當春泣松風向夕哀返照寒無影窮泉凍不流百齡嗟倐忽一旦附山阿華表迎千嵗幽扄送百年薤露返成歌惟餘松栢隴朝夕起寒烟駱賔王集佳城無白日賔閣有青苔萬事皆身外平生尚目前無由接神聖揮涕問青松張說忽歎登龍者翻將弔鶴同琴詩猶可託劍履亦成空張九齡文集寒影催年急哀歌助挽遲竟罷生芻贈空留畫扇題舊室容衣奠新塋拱樹栽張九齡集酒甕凝餘桂書籖冷舊芸空餘雙玉劍無復一壺氷李義山集魂傷山寂然路衢惟見哭城市不聞歌里巷猶嗚咽草堂自此無顔色杜詩古琴蔵虛匣長劍掛空壁王公希代寳棄世一何早王家碧瑶樹一樹忽先摧未成霖雨用先天濟川材遺跡翳九原芳名動千古愁容變海色李太白集河漢重泉夜梧桐半樹春韓文戚戚故交淚幽幽長夜泉孟東野大夜不復曉古松長閉門琴絃緑水絶詩句青山存孟東野集名雖千古在身乃一時休姚少監蘭無香氣鶴無聲王建集衡岳新摧天柱峰士林憔悴泣相逢祗令文字傳青簡不使功名上景鍾鵷鴻念舊行栁集英竒一謝世視聽亦爲塵珠沉百泉闇月死羣象閟孟東野多才非福禄薄命是聰明不得人間夀還留身後名白侍郎貴人淪落路人哀劉賔客琴倚舊牕塵漠漠劍横新塜草離離生寄一壺酒死留千卷書許用晦文碧空人已去滄海鳳難尋張承吉詩玉井已乾龍不起羅隠集本朝精魄已埋没文章豈能磨夀命雖不長所得固已多蒿里無春色春風笳鼓咽松栢助蕭蕭空嗟埋玉樹齎志永沉沉名終埋不得骨且朽何妨天象奎星暗辭林玉樹凋泉臺一閉夜蒿里不知春諸老誰能先賈誼君王猶未識相如歐公集美徳驚埋玉瓌材痛壊梁豐城寳劍忽飛去玉匣靈蹤自此無薤露有歌悽曉月絳紗無主蔽寒烟老泉集有生常寂寞所得自風騷王臨川文集傳呼猶在耳㑹哭已填門音容無處所彷彿寄丹青撫几遺容在瞻圖實貎非衣冠餘故物盃案若平生琴樽已寂寞筆硯尚光輝蕭條昨日事彷彿古人風舊宅秋生箘新阡寒轉蓬厭代人間世收神天上游銘旌蕭颯九秋風薤露悲歌落月中惠寄輿人誦悲傳挽者歌空復文章在流傳世上名前旌一幅粉書銘行路知君亦涕零靈輀悲去路象服儼虛容臨川集沈約多清痩文園仍病痟共疑天上召更欲水邉招金馬人相吊長沙物易妖秋風吹越樹歸旐自飄飄歐公集死者若可作今人誰與歸臨川實山集作詩一日鳳鳥去千秋梁木摧烟留衰草恨風送暮林哀與昔未死無増虧東坡集昔爲芳草顔今爲荒草根薤歌一以去蒿閉不復開孟東野一代英豪氣曉散白楊風滿山無主任春風四府舊聞多故吏幾人垂淚拜碑前相逢相識盡如夢如雲如雨今不知盡傾東海也須乾劉賔客集龍門原上土埋骨不埋名送葬萬人皆慘澹反虞駟馬亦悲鳴墓門已閉笳簫去惟有夫人哭不休蒼蒼露草咸陽壠此是千秋第一秋文章卓犖生無敵風骨英靈殁有神哭送咸陽北原上可能隨例作灰塵白日冷無光黄河凍不流去水絶無波相知成白首此别間黄泉悲鳴駟馬顧失涕萬人揮不但時人惜祗應吾道窮豪傑人誰在文章掃地無竟無宣室召徒有茂陵求封侯竟疎闊編簡爲誰籌杜詩篋中亦有舊書札紙穿字蠧成灰塵日慘不光雲愁無色異口同哀聲白侍郎獨繼先賢傳誰刋有道碑泉壤成終古雲山若在時秋風鄰笛發寒日寢門悲自此辭張邵何由見戴逵獨聞山吏部流涕訪孤兒人間無處更相逢白雲去不返遺堞空崔嵬馭風仙路逺人間驚早露天上失朝雲逝水年無限佳城日易曛簫聲將薤曲哀斷不堪聞堕淚萬家人文字日生塵古今俱有此脩短竟誰分樽酒空猶在絃琴豈重聞劉長卿故衣猶架上殘藥尚頭邉可憐荒壠窮泉骨曽有驚天動地文白侍郎池水猶含墨風雲已落秋孟浩然黄壤不知新雨露粉書空換舊銘旌杜牧之碩人多淪謝喬木自森羅張九齡集悲風吹雨濕銘旌劍逐驚波玉委塵遺風麗清韻簫散九原松温飛卿軔識怨兮亦緩駟知愁兮亦鳴天地爲怨草木爲愁唐文粹握珠不返泉匣玉不歸山韋應物夜泉愁哽咽秋日慘無光武伯倉詩集耆老如今幾人在爲君無憾爲時悲佳城一閉無窮事南望題詩淚洒牋雲駢忽已歸仙府喬木依然擁舊廬華堂不見人痩馬空戀草白雲不解笑青松有餘哀骨朽姓名芳意長日月短東坡集毀譽盖棺了於今名實尊山谷詩有聲當徹天有淚當徹泉早棄人間事直從地下遊丘原無起日江漢有東流勲庸流琬琰形像付丹青若無天下議美惡併成空身去風流在更覺知音少還修地下文地要黄金骨天成白玉樓哀挽諸儒競豐碑故吏繁素車紛雨泣丹旐與風翻幾地留遺愛他年作九原涕流耆舊盡不獨爲鄉園絲布千人從松楸十里行精爽回長夜衣冠出廣庭不應埋直氣㑹見吐長虹良貴官何與長年死不亡後山詩梁壊吾安仰人亡道固臞堂堂萬夫表直作閉佳城功名身後無瑕㸃孝友生知不琢磨山谷詩人間夢斷黄粱熟天上樓成白玉新落落聲塵随逝水滔滔論著出名山淒涼四海門人淚想對秋風爲一澘僧參寥子詩卒哭經周卒哭而祔卒哭曰成事是日也以吉祭易喪祭明日祔於祖父卒哭而諱生事畢而鬼事始已既卒哭宰夫執木鐸以命於宫曰舎故而諱新記小祥經練而慨然以其憂悼在心也期而小祥練冠小祥者主人練祭既練居堊室不與人居堊所居之室之飾也練練衣黄裏縓縁小祥練冠練中衣以黄爲内縓爲飾也黄之色異於纁縓纁之類明外除也練不羣立不旅行爲其茍語則忘乎哀也期而練練冠縓縁要絰不除男子除乎首婦人除乎帶練而食菜果練而弔殷練而祔記子魯大夫練而杖子貢問孔子曰練而杖禮歟子曰非禮也家語魯大夫練而牀孔子曰非禮也荀子本朝練衣必煅煉大功之布以爲衣故有言功衰功衰上之衣也以喪久變}
