  - {type: variant, offset: 772, length: 3, content: 穎達議, WYG: 明詩薦歲事於皇祖儀禮春秋薦其時食中庸祭之日入室僾然必有見乎其位周還出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之比猶先也虛中者言更不兼念餘事也以其恍惚以與神明交庶或饗之仲尼嘗奉薦而進其親也慤其行也趨趨以數祭者所以追養繼孝也薦新如朔奠春秋祭祀以時思之禮記寒暑變易益用増感時祭展其孝思也子祭祀事其神也荀子禮}
