  - {type: variant, offset: 1657, length: 0, content: '', WYG: 塲屋無成而終僧孺挽詩薤挽寄哀音譙周法訓挽歌者喪家之樂執紼者相和之聲挽歌詞有薤露蒿里二章出田横門人辭曰薤上朝露何易晞明朝更復落人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟蹰干寳捜神記集岱雲寡色白日西匿浮雲無光江文通恨别賦生爲百夫雄死爲壯士規王仲宣詠史詩朝發髙堂上暮宿黄泉下白日沉深淵懸車息駟馬造化雖神明安得復存我魏繆襲挽歌詞長夜何冥冥一往不復還曹子建三良詩重壤永幽隔潘安仁悼亡舉聲淚已灑長歎不成章同上榮華與歌笑萬里盡成空北齊魏祖孝㣲鏘楚挽於槐風喝邉簫於松霧謝希逸宋貴妃誄飲餞觴莫舉出宿歸無期帷袵曠遺影棟宇與子辭送子長夜臺呼子子不聞泣子子不}
