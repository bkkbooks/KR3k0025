  - {type: variant, offset: 2587, length: 104, content: 世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣東坡書唐六家書後聊借舊史誅姦強東坡詩雖無尺箠當寸刃口吻排擊含風霜同上有刀難割公閭腹無木可梟元, WYG: 記纂淵}
