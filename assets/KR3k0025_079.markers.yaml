  - {type: variant, offset: 38, length: 2, content: 大全, krp: 角生而影不與吾形相依死而魂不與吾夢相接吾實為之其又何尤韓文遘兹短歴奄謝昌辰長夜無曉斯焉永歸風淒日昏鼓咽簫悲沉埋玉樹誰不沾衣鼎臣云亡梁木斯壊憫枝葉之謝割肌膚之愛輟舂罷社川走下而不還露迎陽而易晞始比肩於千里遽傷魂於九泉既切芝焚彌深蕙歎劉賔客集淒涼山河慘淡風雲君子何厲天實仇之生人何罪天實仇之聰明正直行爲君子天則必速其死道徳仁義志存生人天則必夭其身吾固知蒼蒼之無信莫莫之無神寤言在耳今古何速豈蕩而為太空與化無窮乎將結而為光輝以助臨照乎豈為雨為露以澤下土乎將爲雷爲霆以泄怨怒乎豈爲鳳爲麟爲景星爲慶雲以寓其神乎將爲金爲錫爲圭爲璧以栖其魄乎豈復爲賢人以續其志乎將奮爲明神以遂其義乎不然是昭昭者其得已乎抑有知乎其無知乎彼且有知其可使吾知之乎室有迭去川無息流追懷曩辰恍若夢遊一寐不覺便爲古人茫茫上天豈知此痛天恡靈竒取不可貪既睿又力神誰以堪汝不是思而縱其志盜其管籥褰其篋櫃抽深抉密擔重負貴果殄爾躬以寧其位守吏失職訴帝行事豈不信耶柳文棄蒼生而不起孤魂夜飛山有歸雲江有迴潮公之逝矣一去寂寥掛劍於此魂兮可招直志不遂飲恨無終劉長卿宜享永年遽歸長夜方憑福履以蕆輝榮宜降永年遽歸長夜百身莫贖一夢不還鬱鬱佳城茫茫九原淒涼簫鼓慘淡風烟才高位下步闊途窮竟戢羽翮不展心胸白侍郎薤晞朝露舟失夜壑暘光未盡而湛晻兮植物方華以槁落兮李義山一掬靈均淚千年湘水文孟東野魚鴈遂絶雞黍無期獨孤及文降年不永非命而何夜壑藏舟王維集永訣無期向空筵而洒酒王建集遣使奠斝百酸攪腸音容若生曷日而忘李翶祭文千秋兮愁雲萬古兮明月靈均之寃兮孰能銷其氣靈均之愁兮孰能釋其結皮日休琴書忽捐長夜無旦藝文類聚循途未極閱川行謝雖洞簫爲賦方𫝊漢帝之宫而禪草遺忠安留茂陵之筆思聖烈其如在覽餘文而増歎曲池無處舊館寂寥感知己以悼恩懷舊徳而何在豈峴山之上長留墮淚之詞延閣之中不記藏書之録川歸東極日去西晡生爲神將死爲鬼雄身世一滅榮華萬空傾家若墜舉國同悲唐文粹跡去難留川逝不捨天下善人執手相弔杜牧之營奠應支賣鶴錢方千丈儼高堂兮去何早風白楊兮露秋草吕和叔文絶足方騁脩途忽窮李義山文促路頓軌中天墜翼吕和叔文存與殁人皆福利生死古今一}
