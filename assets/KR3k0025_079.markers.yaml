  - {type: variant, offset: 1598, length: 3, content: 如狗疾, WYG: 曰賵衣衾曰禭錢財曰贈公羊傳錢財曰賻榖梁傳傳記知生則賻知死則賵賻之爲言助也賵之爲言覆也輿馬曰賵貨財曰賻玩好曰贈决其意也衣被曰禭養死具也贈稱也襚遺也春秋說題辭葬經古之葬者不封不樹後世聖人易之以棺椁易改葬緦謂墳墓以地故崩壊將亡失尸柩也必服緦者親見尸柩不可以無服緦三月而除之儀禮夫子制於中都四寸之棺五寸之椁送形而往迎精而反國子高曰葬也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁專道而行送葬必執紼送葬不避塗潦葬日虞弗忍一日離也是日也以虞易奠葬不爲雨止柩不早出不暮宿季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以來未之有改也季子臯葬其妻犯人之禾塗車芻靈自古有之束茅爲人馬謂之靈者神之類竹不成用瓦不成味木不成斵琴瑟張而不平笙竽備而不和有鐘磬而無簨簴其曰明器神明之也銘明旌也以死者爲不可别也故以其旗識之記既夕哭請啟期告於殯宿興設盥於祖廟門外儀禮子及至葬四方來觀之顔色之戚哭泣之哀弔者大恱孟子葬埋其形也荀子史己丑葬我小君敬嬴雨不克葬庚寅日中而克葬春秋鄭簡公卒將爲葬除及㳺氏之廟將毀焉子産使避之司墓之室有當道者於是子太叔請毀之子産弗毀左傳昭十二雨不克葬禮也禮卜葬先逺日左傳孔光薨上賜輼輬及副各一乘輓送車萬餘两道路皆舉音以過喪西漢劇孟母死自逺方送葬盖千乘西漢本傳啟滕公之佳城西漢韋元成庾亮將葬何充㑹之歎曰埋玉樹於土中晉書本傳𤣥甲啟路郭子儀家傳孔子葬母於防墳四尺延陵季子葬其子封墳掩坎其高可隠故仲尼孝子而延陵慈父其葬君親骨肉皆微薄矣非茍爲儉誠便於體徳彌厚者葬彌薄知愈深者葬愈微無徳寡知其葬愈厚立隴彌高發掘必速通鑑漢成紀昭明太子葬其母丁貴殯遣人求墓地之吉者葬畢有道士云此地不利長子若厭之或可申延通鑑梁高祖窀穸既終永安體魄通鑑唐太宗昔楊震趙咨等咸以薄葬知其識去身貴易朽耳夫厚葬之家流於俗以侈靡爲孝令死者戮尸暴骸可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩何用破貲狥侈乎吾亡歛以常服四時各一稱新唐書姚崇傳傳記祖於庭何奪孝之思也祖始始載於庭也乗車辭祖禰故爲祖載也白虎通集祖奠斯開容車戒路明燎守夜竦紼候晨潘岳埏植爲塗車束薪作芻靈陸機詩先逺戒日魂輿寂無響文選輤裧就路張薦誌去夏屋之渠渠即孤丘之峩峩權載之集大夜有行逺日有時白傅集有翩其旗爰舉裳帷行道遲遲望墓而歸靈車逺去𤣥堂蹔開栁宗元笳簫喧曉葆輅翳陌李吉甫作杜佑碑悲風吹雨濕銘旌方雄飛集靈輀迴軌白驥悲鳴王仲宣誄文哀嗟道路涕慕里鄰栁文紼翣交横逐去魂杜牧之自從儀仗辭蘭路風引笳簫入栢城白傅集本朝千兩卿人㑹葬車歐公集墓銘附行狀經銘之義稱美而不稱}
