  - {type: variant, offset: 1532, length: 0, content: '', WYG: 物西漢延年傳孟康曰死者歸蒿里葬地下故曰下里趙臺卿先自爲夀藏圗季札子産晏嬰叔向四像居賔位又自畫其像居主位東漢趙岐傳范訓母亡以布囊盛土負以成壙謝承後漢書原涉自以爲前讓南陽賻送身得其}
