  - {type: variant, offset: 3505, length: 344, content: 年司徒期作亂公衛侯輒出適城鉏曰期則為此令苟有怨於夫人者報之夫人期姊期聘於越公攻而奪之幣期告王王命取之公怒殺期之甥之為大子者注忿期而及其姊為夫人者遂及夫人子左哀二十六年信襲破齊歷下軍遂至臨淄齊王以酈生為賣己乃烹之通監漢高紀趙王倫怒解系曰我於水中見蟹尚惡之況此人兄弟輕我耶此而可忍孰不可忍遂害之晉書苻堅聞亙溫廢立謂群臣曰溫前敗灞上後敗枋頭不能思愆自貶方更廢君以自說諺曰怒其室而作色於其父其溫之謂矣通監晉簡文紀互入陵犯李振屢舉進士竟不中第故深疾搢紳之士言於全忠曰此輩常自謂清流宜投之黃河使為濁流通監唐昭宗傳記太公曰不愛人者盡其胥餘胥餘里落之壁也尚書大傳大戰篇互入憎人及物遷怒所至毀及高曾史通憎其人者惡其餘胥說苑立則篇互入憎人易醜晉新安王遵曰我聞人姓木邊便欲殺之況諸桓乎晉中興書本朝怒移水中蟹坡詩, WYG: ''}
