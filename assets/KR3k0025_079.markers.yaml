  - {type: variant, offset: 5, length: 0, content: '', krp: 曰泰山其頽乎梁木其壊乎哲人其萎乎子貢曰泰山其頽則吾將安仰梁木其壊哲人其萎則吾將安放朝奠日出夕奠逮日喪不剥奠也剥猶倮也有牲肉則巾之爲其久設塵埃加也醢酺之奠不巾魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父記史昊天不弔太山其頽范寗榖梁傳序曹操感𤣥知已及後過𤣥墓致祭自為文東漢橋𤣥傳郭林宗有母憂徐穉往弔之置生芻一束於廬前而去東漢徐穉傳徐穉有死喪負笈赴弔常於塜頭炙雞一隻以一兩綿絮漬酒暴乾以裹雞徑到祭所塜隧外以水漬綿使有酒氣㪷米飯白茅為藉以雞置前醊酒畢則去不}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 喪主謝承後漢書激浪之心未騁遽骨脩鱗凌雲之意將騰先灰勁翮晉陸喜傳有人哭和長輿曰峨峨若千丈松崩世說下一旦萬古梁武紀郄超死之日貴賤操筆為誄者四千餘人晉中興書集緒言餘論藴而莫傳高軌難追藏舟易逺駟隙不留尺波電謝凡我僚舊均哀其戚幽靈彷彿歆我犧樽山羞野酌在疾不省於亡不臨舉聲増慟哀有餘音文選澄醪覆觴絲竹生塵素卷莫啟幄無談賔劉越石書鳥俛翼兮忘林魚仰沫兮失瀬遵吉路兮凶歸思其人兮已滅覽餘跡兮未夷昔同途兮今異世憶舊歡兮増新悲潘安仁誄存榮没哀死而不朽陳太丘碑巖藪知名失聲揮涕梁崩哲萎於時靡憲郭有道碑半岳摧峰中河墜月南齊王融作逝川無待黄金難化沈約齊安陸碑耕夫釋耒桑婦下機文選晏晏言笑今成涕洟梁肅祭文梁岳頽峻豈徒舂人不相杵傾壥罷肆而已齊竟陵王行狀長算屈於短日逺跡頓於促路陸士衡弔魏武文峰頽朽壤波逝江潭山川若此人何以堪亦生亦滅如壑如舟千齡俱盡萬古誰留梁簡文帝文繐帳冥漠陸士衡弔文方謂拂羽喬木緬昇高雲忽遭大過棟橈而殞丹書不藏於勲府青史不昭於方册一絶故}
