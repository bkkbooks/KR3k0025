  - {type: variant, offset: 28, length: 3, content: 發吾覆, WYG: 賢宛然昨日交臂而悲天年既殁長夜何辰聖達不免宇宙同塵竟不能驤首雲路長鳴天衢知與不知咸皆共歎有餘恨}
