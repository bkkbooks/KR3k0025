  - {type: variant, offset: 269, length: 1, content: 遂, WYG: 即死支綴氣息大懼祭祀之無主以忝盛徳創鉅痛仍號於穹旻排土濡涕頓首成墳陷膺腐眦寒暑在廬草木悴死鳥獸踟蹰殊族異類亦相其哀栁文灰心垢體泣血漣漣松檟之下其生尚殘與其偷生而孤苦不若就死而團圎欲自决以毀傷懼虧孝於歸全每一念至腸熱骨酸飲泣茹悲白樂天柴毀骨立張九齡文决裂肝胷李習之哭泣哀號感動他人杜牧之銜哀而茹血王無功淚少於血骨餘於形五情如喪百身不贖王維集號咷毀瘠廬於冢次號泣無節埃垢積首草生髪間銜恤毀瘠唐文粹本朝精神流離肝腑絶眦血被面無時晞臨川集欒棘過人柴瘠加等行負神明躬招咎釁柴毀幾於滅性銜恤甚哀棘心雪泣縗袵沾血類要有聲當徹天有淚當徹泉後山思慕經哀哀父母生我劬勞無父何怙無母何恃出則銜恤入則靡至明發不寐有懐二人謂父母也詩君子已孤不更名先王之孝色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心思念也霜露既降君子履之必有悽愴之心}
