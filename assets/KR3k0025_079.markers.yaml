  - {type: variant, offset: 1655, length: 1, content: 互, WYG: 溫郄王庾諸公之薨必須孫綽爲碑文然後刻石焉晉書孫綽傳當時大臣塜碑誌非其筆人以爲不孝唐書栁公權傳傳記魏侍中繆襲埋文父母墓下將以千載之後陵谷遷變欲後人聞知但記姓名歴官祖父姻婭而已若有徳業則爲銘見類說事始石誌不出禮經起顔延之爲王琳作墓誌銘以其素族無銘誄故也遂相祖習王戎墓銘有數百字然則魏晉以來有墓誌也漢杜子夏臨終作文命刋石埋墳前厥後墓誌恐因此始集韻集張季友曰藏而不得韓君記猶不葬也韓張府君銘醉吟先生墓銘白樂天自作見本傳凡人之事迹非大善大惡則衆人無由知也故舊例皆訪問於人又取行狀以爲依據今之作行狀者非其門生即其故吏莫不虛加仁義禮智妄言忠肅惠和或言盛徳大業逺而愈光或云正道直言殁而不朽曽不得直叙其事故善惡混然不可明至如許敬宗李義府李林甫國朝之姦臣也其使門生故吏作行狀既不指其事實虛稱道忠信以加之則可以移於𤣥齡魏徴裴炎徐有功矣此不惟其處心不實茍欲虛美於所受恩之地而已由是事失其本文害於理而行狀不足以取信若使用事書實不飾虛言則必有人知其真偽不然者縱使門生故吏爲之亦不可以謬作徳善之事而加之矣今請作行狀者不要虛說仁義禮智忠肅惠和盛徳大業正言直道蕪穢簡册不可取信但指事說實直載其詞則善惡功跡皆據事足以自見矣假令傳魏徴但記其諫諍之詞皆足以爲正直矣如傳段秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以爲忠烈矣今之爲行狀者都不指其事率以虛詞稱之故無魏徴之諫諍而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以爲據李翶百官行狀奏本朝惟我祖考積善成徳宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇頼其子孫矣乃列其世譜具刻於碑旣又載我皇考崇公之遺訓太夫人之所以教而有待於修者並掲於阡俾知夫小子修之徳薄能鮮遭時竊位而幸全大節不辱其先者其來有自廬陵集瀧岡阡表木杪見龜趺東坡百年富貴今誰見一代功名記至公後山拜掃史古不墓祭始皇起寢墓側漢因不改四時上飯寒食上墓禮經無聞近代相承浸以成俗士庶有不合廟祭者何以用展孝思宜許上墓漢官儀拜掃禮於塋南門外奠祭徹饌唐書明皇紀劉知逺殺從益王淑妃曰何不留吾兒使毎嵗寒食以一盂麥飯洒明宗陵乎五代漢髙祖寒食野祭而焚紙錢五代周本紀後序奉先之道無寒食野祭之禮近代莊宗每年寒食出祭謂之破散五代㑹要集近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地想田野道路士女遍滿皂𨽻庸丐皆得上父母丘墓焉馬醫夏畦之鬼無不受子孫追養者桞宗元丘墟郭外門寒食誰家哭風吹曠野紙錢飛古墓纍纍春草緑棠梨花映白楊樹盡是死生離别處㝠寞重泉哭不聞蕭蕭暮雨人歸去節過蔵煙時當改火白居易普天皆滅焰匝地盡蔵煙唐李崇嗣詩萬井閭閻皆禁火九原松栢自生煙唐郭勛拜掃無過骨肉親一年惟此兩三辰塜頭莫種有花樹春色不關泉下人唐劉熊登杏粥猶堪食榆羮已稍煎韋應物集本朝榆火戒時栢城在望薦籩豆之新物象几席之平居臨川集庵宇子子貢反築室於場孟子史冢舎西漢何竝傳師古曰守冢之舎也依林作室後漢公沙穆傳蔣宗字元卿遭父憂而弔者盈門後母疾之不與席不得止舊廬於側作小庵漢書孝友王和子者其父爲防秋卒戰死女子廬於墳所舊唐書列女傳集衣冠弓劍之地霜露感思之心尤藉謹良以顓守奉杜牧之道場追薦傳記等㑹真如同超正覺西京記所願託影蓮臺游神净域狄梁公家傳集蓮花之國金池玉霤崇此香縁生彼穠秀陳子昻集本朝薦龍施之净供助宿植於神游臨川集雖聖靈之無礙對越在天從世法之有爲皈依於佛喪期有數方嘆於壑舟法海無邉聊資於岸栰東坡集願假佛乗之妙少資净土之因欒城集旁招净衆歸誠甘露之門仰仗靈游取證法雲之地詩話總龜挽章史公㑹吴子伐齊將戰公孫夏命其徒歌虞殯左傳送葬歌曲示必死傳記田横死門人作蒿里薤露之歌崔豹古今注漢高時田横死吏不敢哭但随柩叙哀後代相承以爲挽歌通典漢武時李延年分歌爲二薤露送王公貴人蒿里送大夫士庶事物紀原思苦爲詩身到此氷魂雪魄已難招直教桂子落墳上生得一枝寃始消摭言載劉得仁出}
