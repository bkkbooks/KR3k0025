  - {type: variant, offset: 1533, length: 1, content: 勝, WYG: 而令先人墳墓儉約非孝也乃大治起塜舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道爲京兆阡涉慕之乃買地開道立表署曰南陽阡人不肯從謂之原氏阡費用皆是富人長者西漢本傳地底冥冥長無曉期東漢張奐傳負土成墳謝承後漢書初陶侃微時丁艱將葬家中忽失牛而不知所在遇一老父謂曰前徃見一牛眠山塢中其地若葬位極人臣矣又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因葬其處以所指别山與訪訪父死葬焉果爲刺史自訪以下三世爲益州四十一年如言云晉書周虓傳晉許孜親没柴毀負土成墳晉書負土作墳宋郭孝子傳石室號曰千里堂後魏書窀穸既終永安體魄唐吕才論温大雅將改葬其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我將含笑入地唐書感慕之所魂神之宅新唐書吕才傳傳記凡葬必於高陵之上以避狐狸之患水泉之濕則善矣吕氏春秋凡葬而無墳謂之墓方言言不封也徳音未逺拱木已積建康實録滕公往東門馬跼不進跑地成坎公命掘之得石郭銘文曰佳城鬱鬱三千年見白日吁嗟滕公居此室歎曰天也後葬其地西京雜記連堈隠緯狀如亂雲望之翽翽絶而復連小頓大起千里相牽夀過期頥世世登仙圗墓書集窈窈𤣥宇三光不入潜闥一扃尊靈永蟄曹植誄墳壠日月多松栢鬱茫茫文選塊魂幽石委骨竆塵鮑昭賦荒草何茫茫白楊亦蕭蕭幽室一已閉千年不復朝陶淵明殯宫已肅清松栢轉蕭瑟潘黄門詩閟重扃於穸壤蕭昕昭明太子哀䇿夀宫寂逺夷體夀原文選墓門兮肅肅脩壟兮峨峨潘安仁懐歸賦蔓草縈骨拱木斂魂閉骨泉壤江文通恨賦松檟成行且爲樹枌檟覩陳根宿草而哭東首塋園即宫長夜文選開石室營夀宫陳子昻集荒郊疎古木寒隧積陳荄駱賔王千秋掩夜臺佳城無白日駱賔王晨登太山北望蒿里松楸骨寒草宿墳毀李白擬恨賦去夏室之渠渠即孤丘之峩峩權載之集惟餘松栢隴朝夕起餘烟張說之死去何所道托體同山阿陶潜瞻望不見寂寥空山手足胼胝成此高墳排土濡涕頓首成墳陷膺腐眦寒暑在廬草木悴死鳥獸踟蹰殊類異族亦相其哀唐文粹佳城日易曛憐君孤冢在雙峯埋骨竆泉復幾重白露空沾九原草青山獨閉數株松劉長卿夜臺茫昧亦知否李白集竟埋岱北骨不返巴東魂夜入夀宫長白侍郎光照幽壤墳荒草已陳墓濕土猶新窅窅竆泉埋寳玉白傅集蒿閉不復開孟東野龍門原上土埋骨不埋名劉賔客隂堂是夜古木非春文苑英華日月照臨於佳城烟雲變態於神道唐文粹黄泉無曉日青草自知春寒山詩本朝土山宛轉屈蒼龍下有槃槃蓋世翁後山瀧岡阡歐公集阡名載版圗東坡岡連夏屋木拱秦原晏類要過而下馬空瞻董相之陵酹以隻雞誰副橋公之約程徳林求先墳思成堂歸真亭詩又葉待制求先墳永慕亭詩東坡新阡長宿草行路拜豐碑欒城賻贈經魯人之贈三𤣥二纁賵奠於死生兩施儀禮孔子之衛遇舊館人之喪入而哭之哀出使子貢脫驂而賻之弔喪弗能賻不問其所費子栁之}
