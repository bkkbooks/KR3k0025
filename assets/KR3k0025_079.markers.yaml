  - {type: variant, offset: 504, length: 263, content: 集本朝溫公退居洛陽每論當世人物必曰呂獻可之先見范景仁之勇決皆予所不及心誠服之劉諫議集互入心服蔡天申得溫公撰呂獻可墓銘以獻王安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見錄互入事反所料昔吾舉進士試於禮部歐陽文忠公見吾文曰此我輩人也吾當避之東坡文竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經效於世間不必皆從於己出東坡進陸贄奏議劄子史藺相如為上卿位在廉頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上且賤人吾羞不忍為之下宣言曰我見必辱之史記本傳互入嫉妬楊雄著太元劉歆觀之曰吾恐後人用覆醬瓿也, WYG: 涕泣乃去}
