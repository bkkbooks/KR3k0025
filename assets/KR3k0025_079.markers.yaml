  - {type: variant, offset: 2053, length: 519, content: 互入端介王義方乞誅姦臣於白日唐書天后時酷吏放歸草澤終身不齒通監唐元宗熊執易疏論裴延齡相以示歸登登動色曰願竄吾名雷霆之下君難獨處唐歸登傳互入好名贄上言裴延齡妄誕小人用之交駭物聽通監唐德宗德宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壞之唐書陽城傳元稹倚宦官知制誥武儒衡厭鄙之食瓜蠅集其上儒衡揮以扇曰適從何處來遽集於此唐書武儒衡傳傳記水名盜泉仲尼不漱語撰考讖耳聞所惡不如無聞目見所惡不如無見呂氏春秋盧奐累任大郡凡治姦惡既斷罪又以所犯刻石出其門時謂記惡碑王元祐開元天寶遺事鍾離意曰孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也東漢紀互入端介集要領不足以膏蕭斧名字不足以汙簡墨陳琳檄鷹揚虎視肅清違慢傳咸中丞箴剛腸疾惡山巨源絕交書簡上霜飛筆端風起崔彖御史箴互入有風力董卓稱亂徒藉群雄之手王莽偷安卒成光武之業故市耀臍燈府傳飲器梁任孝恭檄文弘量不以容非文選王文憲集序渴不飲盜泉水熱不息惡木蔭猛虎行疾惡懷剛腸杜詩人其人火其書廬其居韓原道守正為心疾邪不懼柳文魯司冠三日之間戮正卯於兩觀之下漢司隸一旬之內取張朔於合柱之中李義山文聞惡若巳讎柳文暴虐得於天生險悍著於心中抵冒刑憲縱恣胸臆法所惡者爾皆為之白晝九衢指憎萬手杜牧之膚革既平雖疥癬而必去豺狼已斃在狐鼠而宜除柳文, WYG: ''}
