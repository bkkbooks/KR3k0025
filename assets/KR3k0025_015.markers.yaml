  - {type: variant, offset: 2941, length: 1, content: 邊, WYG: 龍龜山為南服之冠鳯凰山有鳯凰巢其上或云此州穴也鸚鵡山在縣西南崑崙山在古杜陵縣北崆峒山出石乳石林有自然樓臺輿地紀勝本朝開寶五年廢勤春二州省恩平杜陵二縣入陽江省富林入銅陵以羅水流南二縣來屬六年省流南羅水入陽春尋復置春州以陽春銅陵二縣屬焉祥符廢春州以縣屬新州天禧復春州慶厯恩州加南字熈寧又廢春州以陽春來屬而省銅陵入焉沿革表集井邑峰巒疊郡城新臺髙峙見南溟海瀾震蕩連空白星瀆朝宗徹底清知郡游公山為翠濤湧潮拓碧天開胡澹庵西山排闥來周遭似翠環初疑金谷嶺元是鉄坑山人言兹地惡我愛碧孱顔兹地山皆石他山盖不如固非從此出疑是補天餘下漏一拳小髙凌千級虛竒章應未見名不到}
