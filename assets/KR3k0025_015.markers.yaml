  - {type: variant, offset: 3821, length: 1, content: 夫, WYG: 並省入吳川石城本漢髙凉縣地宋檀道濟築石城立羅州隋廢之唐武德析石龍置石城縣復羅州後羅州自石龍徙治此天寶改石城曰亷江沿革表形勝石龍岡在州西南鳯凰井在城南龍化水在羅州界石城岡在舊亷江塲北有石城水石頭山在石龍縣西招義山在廢縣西北近信山在吳川西北銅岡山在石龍東北輿地紀勝}
