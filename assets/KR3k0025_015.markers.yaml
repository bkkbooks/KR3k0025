  - {type: variant, offset: 3067, length: 111, content: 山而小魯登太山而小天下故觀於海者難為水游於聖人之門者難為言盡心下升東岳而知眾山之迤邐也列子由天地之道觀惠施之能其猶一蚊一䖟之勞者也莊子自以比形於天地而受氣於陰陽吾在於天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之, WYG: 坡九疑連綿屬衡湘蒼梧獨}
