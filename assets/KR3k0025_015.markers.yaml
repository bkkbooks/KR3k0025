markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十五宋潘自牧撰郡縣部廣南東路廣州倚郭二外縣六南海清逺番禺増城懷集東筦新㑹香山清海軍節度廣東經略安撫司轉運司提舉司市舶司郡號番禺五羊南海清海東筦州沿革牽牛婺女之次越分野禹貢揚州之域春秋百越地秦漢南海郡東漢建安魚立交州尋廢之吳分立廣州晉為州治隋廢郡改番州大業復南海郡唐武德立廣州貞觀為都督府開元為嶺南}
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_015-1a, image: WYG0930/WYG0930-0350a.png}
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_015-1b, image: WYG0930/WYG0930-0350b.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷十五宋潘自牧撰郡縣部廣南東路廣州倚郭二外縣六南海清逺番禺増城懷集東筦新㑹香山清海軍節度廣東經略安撫司轉運司提舉司市舶司郡號番禺五羊南海清海東筦州沿革牽牛婺女之次越分野禹貢揚州之域春秋百越地秦漢南海郡東漢建安魚立交州尋廢之吳分立廣州晉為州治隋廢郡改番州大業復南海郡唐武德立廣州貞觀為都督府開元為嶺南}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 天寶為南海郡乾寧升清海軍五代南漢劉隠所有地理沿革表縣沿革南海本秦南海郡番禺縣地東漢交州吳廣州皆治此隋改番禺曰南海為州治唐因之五代劉隱分置咸寧常康二縣本朝省之番禺秦初置縣至隋改南海唐長安於江南洲上别置番禺分置郭下清逺本漢南海郡中宿縣地晉屬始興郡梁立西衡州改縣為清逺郡隋廢清逺為縣屬廣州増城本番禺縣地東漢初析置晉成帝分立東官郡宋齊仍屬南海隋廢郡以縣屬廣州懷集本漢南海郡四㑹縣地又蒼梧郡封陽地晉於四㑹地置懷化縣屬新㑹郡宋齊屬南海齊於封陽地置洊安縣隋省二縣後復置懷集縣屬廣州唐武德立威州並置興平霍清威成三縣貞觀州廢省三縣入懷集又置洊安縣開元省永固縣入懷集至德改洊安為洊水本朝省之東筦本漢博羅縣地隋置寶安屬番州唐至德更今名屬廣州新㑹本漢番禺縣地晉恭帝置新㑹縣及郡隋廢郡為封州改允州又改岡州}
  - {type: page-break, offset: 1, content: '', id: KR3k0025_WYG_015-2a, image: WYG0930/WYG0930-0351a.png}
  - {type: page-break, offset: 1, content: '', id: KR3k0025_WYG_015-2b, image: WYG0930/WYG0930-0351b.png}
  - {type: variant, offset: 1, length: 0, content: '', krp: 天寶為南海郡乾寧升清海軍五代南漢劉隠所有地理沿革表縣沿革南海本秦南海郡番禺縣地東漢交州吳廣州皆治此隋改番禺曰南海為州治唐因之五代劉隱分置咸寧常康二縣本朝省之番禺秦初置縣至隋改南海唐長安於江南洲上别置番禺分置郭下清逺本漢南海郡中宿縣地晉屬始興郡梁立西衡州改縣為清逺郡隋廢清逺為縣屬廣州増城本番禺縣地東漢初析置晉成帝分立東官郡宋齊仍屬南海隋廢郡以縣屬廣州懷集本漢南海郡四㑹縣地又蒼梧郡封陽地晉於四㑹地置懷化縣屬新㑹郡宋齊屬南海齊於封陽地置洊安縣隋省二縣後復置懷集縣屬廣州唐武德立威州並置興平霍清威成三縣貞觀州廢省三縣入懷集又置洊安縣開元省永固縣入懷集至德改洊安為洊水本朝省之東筦本漢博羅縣地隋置寶安屬番州唐至德更今名屬廣州新㑹本漢番禺縣地晉恭帝置新㑹縣及郡隋廢郡為封州改允州又改岡州}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 業州廢屬南海郡唐武德岡州析置封平封樂復二縣正觀州縣並廢尋復立岡州開元州廢以新㑹屬廣州香山本香山鎭在唐南海番禺東筦新㑹之境本朝昇縣地理沿革表形勝番山在南禺山在北金山在新㑹寶山在東筦亷山在清逺西貪泉在番禺西崑山在新㑹上有天井崙山在新㑹有白龍池浴日亭在扶胥鎮南連天觀在提舉司五羊城在南海縣昔有五仙人騎五色羊至此九龍泉在白雲山琵琶洲在南海東珊瑚洲在東筦南珊瑚井在浮丘山鳯凰岩在東筦鷓鴣峰在増城輿地紀勝人物唐區丹從學韓文公五代何澤為洛陽令諫唐莊宗好獵羅威事母至孝黄舒事母至孝人目其居曰參里二人未詳其是何朝代皇朝馮元中甲科能通五經輿地紀勝集番禺軍府盛欲說暫停杯盖海旗幢出連天觀閣開衙時龍戸集上日馬人來風静鶢鶋隐官亷蚌蛤回韓文縣樓重蜃氣邑里襍鮫人海暗三山雨江明五嶺春岑參霧遶龍川暗山連象郡遥劉長卿連天浪静長鯨息映日颿多寶舶來劉禹錫五羊城在蜃樓邉墨綬縋腰正少年山静}
