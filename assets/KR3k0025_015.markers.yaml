  - {type: variant, offset: 696, length: 194, content: 監唐高宗經用人之知去其詐用人之勇去其怒用人之仁去其貪記禮運子夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子而已矣孟子大匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之器孔叢子夫顏啄聚梁父之大盜也而為齊忠臣段于木晉國之大駔也而為文侯師孟卯妻其嫂有五子焉然而相魏寧其危解其患景陽酒被髮而御於婦人威服諸侯此, WYG: 天岩㑹仙峰抛毬峰黄龍洞碧雞山朱明洞凢}
