  - {type: variant, offset: 105, length: 1, content: 詩, WYG: 羣岑合勢曲江頭二水交流夾一州地有九㠜清淑氣人無五嶺鬱蒸愁譚太𫝊肇慶府倚郭一外縣一髙要四㑹肇慶軍節度郡號信女髙要端溪四㑹興慶府沿革星土同廣州春秋百越地秦南海郡地漢蒼梧郡地宋齊屬南海陳立髙要郡隋廢郡立端州大業信女安郡唐端州屬嶺南道五代南海所有地理沿革表縣沿革髙要屬蒼梧郡晉置平興縣屬新寧郡宋齊屬南海又置平興郡梁又置梁秦縣及郡陳立髙要郡隋端州置髙要縣改梁秦省入平興為清泰又置博林縣唐武德尋復置清泰貞觀省博林入髙要省清泰入平興本朝並省平興四㑹秦初置縣漢屬南海郡宋分置化蒙縣屬綏建郡隋二縣屬廣州唐武德立南綏州二縣屬焉觀更名湞州州廢屬廣州本朝省化蒙入四㑹來屬地理沿革表形勝石室山在髙要又名嵩臺山號神仙下都石澗山在四㑹爛柯山在髙要老香山在廢平興縣西端溪山有五色香水端溪水在髙要龍子嶺獅子岡鳯頭岡在四㑹牛鼻山在始昌端溪子石硯可値千金有赤白黄色㸃者謂之鸜鵒眼脉理黄者謂之金線紋輿地紀勝人}
