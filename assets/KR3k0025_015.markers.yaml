  - {type: variant, offset: 937, length: 1, content: 曹, WYG: 峰係第七大洞天豐湖在郡城西有㸃翠溪漱玉灘平逺臺孤嶼亭平湖閣荔枝圃鰲峰亭輿地紀勝人物皇朝古初之國初充賦梅蟠擢元豐第張宋鄉紹興以春秋魁多士輿地紀勝集君言羅浮上容易見九垠漸髙元氣壯洶湧來翼身夜宿最髙峰瞻空浩無隣海黒天宇曠星辰來逼人劉禹錫本朝天禧五年改禎州為惠州治歸善沿革表浮山若鵬蹲忽展垂天羽東坡羅浮山下四時春盧橘楊梅次第新日啖荔枝三百顆不妨長作嶺南人赤魚白蟹筯屢下黄柑緑橘籩常加糖霜不待蜀客寄荔枝未信閩人誇並同上近聞更有豐湖好環匝亭臺映洲島野叟忘機鷗鷺閒寒潭無浪蛟龍老楊無為廣南東路循州倚郭一外縣二龍川興寧長樂郡號龍川興寧曲寧長樂海豐州沿革星紀牽牛之次春秋百越地戰國楚地秦以後南海郡龍川縣地晉穆帝分屬永平郡宋齊南海東筦二郡隋屬循州州廢屬龍川郡唐屬循州南漢改循州為禎州而析州之北境别立循州於此地理沿革表縣沿革龍川秦以後屬南海郡晉穆帝置雷鄉縣屬永平郡宋以後屬東筦郡廢雷鄉隋屬循州開皇省入河源縣唐天授置雷鄉縣屬循州南漢改龍川縣置州治此興寧本龍川縣地晉置興寧縣屬東筦郡隋屬龍川郡唐屬循州貞觀省齊昌縣入焉長樂本興寧縣地本朝析置地理沿革表形勝龍川昔有龍穿地而出即穴流泉因以名縣蚌湖鴈池在興寧白鹿山在龍川有白鹿洞龍潭鰐湖在龍川白雲洞在州北白石巖在興寧白鷴山在州北霍山在龍川東峰巒凡三百六十按山在州正南石樓峰在霍山石泉井在龍川輿地紀勝人物唐韋昌明隱羅浮山五代羅孟郊官至翰林茆屋數間曰翰林堂旁有池號羅公滌硯池輿地紀勝集越井遺封尉陀舊壤李義山龍川平海牛嶺參同上本朝國初曰海豐郡宣和改博羅郡熈寧四年置長樂縣紹興六年省十九年復宣和三年改龍川為雷鄉縣紹興復故沿革表尉陀城下兩重陽白酒黄雞意自長}
