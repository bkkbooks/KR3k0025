  - {type: variant, offset: 3056, length: 0, content: '', WYG: 屬始安隋屬桂州大業屬始安郡唐武徳立樂州貞觀改昭州天寶曰平樂郡屬嶺南道五代馬氏有之後入南漢沿革表縣沿革平樂本漢荔浦縣地吳分置平樂縣屬始安郡晉穆帝又置永平縣及郡隋廢郡為藤州大業復永平郡唐平樂為州治永平屬藤州武德置沙亭縣貞觀省之以永平來屬本朝省永平恭城唐武德析置平樂立山隋置隋化縣屬始安郡唐武德增置純義縣並屬荔州尋改隋化曰立山又置欽政東區二縣以四縣置南㳟州貞觀改蒙州後省欽政天寳改蒙山郡永貞改純義縣曰正義本朝省諸縣入立山昭平本漢臨賀猛陵二縣地梁於臨賀地置南静郡龍平縣於猛陵地置開江郡縣又置静州安樂博勞二縣隋廢二郡増置開化縣大業廢州並屬始安郡省開江歸化安樂博勞四縣唐武德以龍平置静州復四縣尋以開江屬梧州餘三縣廢貞觀改富州開江來屬天寶曰開江郡又置思勤縣長慶改開江曰馬江本朝並省入龍平後改昭平沿革表形勝日巖山在平樂甘岩山在恭城古迷山又名古眉羅浮山在立山銀殿山在恭城玉臼泉在昭平龍嶽峰在平樂駱雍水在立山昭潭在江中州名取此輿地紀勝人物皇朝周渭國初獻下嶺表之䇿其妻為莫節婦韓廻官至太子中舎輿地紀勝集桂水春猶早昭川日正西虎當官路鬬猿上驛樓啼李義山假守昭平郡當門桂水清海遥稀蚌迹峽近足灘聲郎士元峽束江盤天影随輕船隻下幾危機初晴古木猿三呌未晩隂崖日半規篁竹數家何處縣清溪一曲幾篇詩同上輸稅地全無菽麥入城人半是漁樵劉君詩本朝開寶五年廢富州省永平縣入平樂省馬江思勤二縣入龍平來屬太平興國改正義縣曰蒙山熈寧五年廢蒙州省蒙山東區二縣入立山來屬八年以龍平改屬梧州元豐還屬山闕平沿革表梧州倚郭一蒼梧郡號桂江蒼梧廣信戎城州沿革牛女之分百越之地秦屬桂林郡漢屬南越元帝置蒼梧郡東漢建安置交州治後廢隋改封州大業屬蒼梧郡唐武德置梧州天寶曰蒼梧郡屬嶺南道五代初入馬氏後入南漢沿革表縣沿革蒼梧本漢廣信縣為蒼梧治又猛陵縣東漢交州刺史治猛陵屬焉梁置遂城縣又置豪静縣及武城縣陳曰逍遥郡隋改廣信縣曰蒼梧屬封州省猛陵入豪静屬桂州改遂城曰戎城屬滕州蕭銑增置猛陵縣唐蒼梧豪静屬静州置綏越縣屬賀州後置梧州治蒼梧以四縣來屬貞觀豪静綏越光化馬般以戎城猛陵屬桂州後又來屬本朝並省入蒼梧沿革表形勝火山夜見時如火燒狀氷井在州東北繫龍洲在州七里一名十里洲浮洲伏虎岩在州東五十里思化洲思恨洲在州西思良山在州北雙龍洞在州東北名賢水在州北輿地紀勝人物後漢陳元明左氏春秋漢之三陳奕}
