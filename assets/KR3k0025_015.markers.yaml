  - {type: variant, offset: 3830, length: 0, content: '', krp: 宜茂名郡號髙凉電白西平潘山懷徳潭峩永熈州沿革牛女之分古百越地秦屬南海郡漢初屬南越後合浦東漢兼屬蒼梧桓帝立髙興郡吳置髙凉郡梁析置髙州隋復為髙凉郡又為永熈郡地唐復髙州為都督府永徽析置恩潘二州天寶曰髙凉郡乾元曰髙州五代地入南漢地理沿革表縣沿革電白本漢髙凉縣地晉安寧縣地梁置電白連江二郡又置凉封縣及南巴郡陳于安寧地置務德縣隋廢電白連江為縣又改凉封為義封並屬髙凉郡大業省義封改務德為良德屬永熈郡唐武德三縣並屬髙州開元改連江曰保安至德改保寧州初自髙凉徙治良德大厯又徙電白信宜本漢蒼梧郡端溪縣地晉分置晉康郡梁置良德縣及郡陳}
