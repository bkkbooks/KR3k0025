  - {type: variant, offset: 4171, length: 757, content: 來眾鳥皆戢翼晉書老羆當道臥獾子那得過北史王羆傳集湛露之晞朝陽眾星之拱北辰楊雄甘泉賦西施且一笑眾女安得妍韋應物集龍騰魚鱉踔然驚驥盻驢騾少顏色元稹集蹇驢避路立肥馬當風嘶唐文粹舌端萬變乘春輝南方朱鳥一朝見索漠無言蒿下飛賓客百舌詞和風既揚昏祲自歛陸宣公文經公山弗擾以費畔召子欲往子路不悅曰末之也已何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎語子見南子子路不悅同上子君子之所為眾人固不識也孟告子下智者之言固非愚者之所曉列子仲尼篇井蛙不可以語海夏蟲不可以語冰莊子朝菌不知晦朔蟪蛄不知春秋莊逍遙遊篇淺不足與測深愚不足以謀知井蛙不可語東海之樂荀子正論量粟而舂數米而炊可以治家而不可以治國淮南子使桀度堯猶以升量石也同上史燕雀安知鴻鵠之志哉史記陳世家公等喁喁何知長者史記日者傳語曰以管窺天以蠡測海以筳撞鐘豈能通其條貫考其文理發其聲音哉前東方朔傳夫移風易俗使天下回心鄉道者類非俗吏之所能為也賈誼傳以管窺天豈能照一隅後漢操遣使辟田疇田疇戒其門下趣治嚴門人曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇笑曰此非君所識也通監漢獻紀子貢曰臣終身戴天不知天之高也終身踐地不知地之厚也臣事仲尼如飲江海腹滿而去又安知江海之深乎韓詩外傳蘙薈之翔無以論垂天之凌蹄涔之游無以知絳虯之騰鈞天之庭豈伶人之所躡山海經新序集尺寸之魚豈能量江海之大選對楚王問借問蜉蝣輩寧知龜鶴年郭景純游仙詩小人自齷齪安知壯士懷放歌行二禽已登於寥廓而尺鷃之輩空見笑于藩籬李白大鵬賦丈夫志氣事兒女安得知劉禹錫作呂溫文集新序見呂和叔文坐井而觀天曰天小者非天之罪也韓文原道眾鳥那知一鶚情方雄飛文炯若深井之下仰視白日之正中也唐文粹大凡受褊狹者不可以語大持盃榼而承澍雨自滿而止又安能測其霶霈之所至哉元微之集斗水不能評巨壑之量隙光未足議大明之體何者見褊而守隘也張說之文, WYG: 潘郡}
