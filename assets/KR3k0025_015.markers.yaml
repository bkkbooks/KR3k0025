  - {type: variant, offset: 3823, length: 6, content: 君用人欲其忠, WYG: 物鞠杲吳川進士上入黨籍輿地紀勝集羅川帶郭古南州陵水環城小庾樓雲淡青山無過鴈雨涵丹荔集鳴鳩郡守不知姓氏本朝開寶五年廢羅州入辯州省陵羅縣入石龍省陵渌幹水石城三縣入吳川太平興國改辯州曰化州乾道復置石城縣沿革表髙州倚郭一外縣二電白}
