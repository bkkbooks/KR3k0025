  - {type: variant, offset: 3, length: 6, content: 容子不容然後, WYG: 應聞屈鳥草深從使翳貪泉皮日休居人愛近沉珠浦候吏多來拾翠洲陸龜蒙番禺萬里路逺客片㠶過盛府依横海荒祠拜伏波劉文房本朝開寳五年省咸寧當康二縣入南海廢番禺省洊水入懷集廢東筦入增城六年復置東筦皇祐三年復置番禺縣紹興二十二年升香山鎮為縣沿革表千年日照珍珠市萬瓦烟生碧玉城山海是為中國藏梯航尤}
