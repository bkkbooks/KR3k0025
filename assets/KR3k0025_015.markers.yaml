  - {type: variant, offset: 940, length: 0, content: '', WYG: 勝槩賢傑繼出闕退之雄文露天巧夢得清新揮秀格迨今聲名三百年文字山川相輝赫前人潮州倚郭一外縣二海陽潮陽掲陽郡號潮陽鳯城鰐渚掲陽海陽義安州沿革牽牛分野禹貢揚州之域春秋七閩地戰國越人所居秦南海郡地漢初屬南越後南海郡晉東筦郡安帝分立義安郡梁立東揚州改曰瀛州陳廢之隋立潮州大業徙為義安郡唐武德曰潮州天寶曰潮陽郡屬嶺南道五代南漢據之地理沿革表縣沿革海陽本漢南海郡掲陽縣地晉屬南海縣為義安郡治隋郡縣俱廢後復海陽縣置潮州潮陽本漢掲陽縣地晉安帝分東筦郡置潮陽縣屬義安郡隋屬潮州唐未㣲省之先天復置揭陽縣漢屬南海郡晉廢之本朝復置地理沿革表形勝韓山與州治相對闕山在潮陽東吳在韓山後西霸縈遶於州之太平橋下鳯水在鳯凰山下鱷溪舊名惡溪韓文公為文逐鱷魚處九侯山在海陽闕子山在掲陽桑浦山與州相對梅溪水在潮陽闕亭在州治韓木邦人視其花之繁稀以卜登科之祥輿地紀勝人物唐趙德韓文公置鄉校命之為師皇朝林巽應材識兼茂科以忤權貴有司不敢收林從周登進士其族列於衣冠者十七人許由其族為文武官者總三十八人吳復古道之士陳希伋經明行脩舉第一人輿地紀勝集惡溪瘴毒聚雷霆常洶洶鱷魚如大船牙眼怖殺儂韓文州南數十里有海無天地􅄓風有時作掀簸真差事同上本朝宣和六年析海陽縣光德太平懷德三鄉置掲陽縣沿革表潮陽山水東南竒魚船城郭民雍熈當時為撰𤣥帝碑而今風俗鄒}
