  - {type: variant, offset: 939, length: 0, content: '', WYG: 由昔我遷龍川不見平生人傾囊買破屋風雨芘病身頎然一道士野鶴堕雞羣飛鳴閭巷中稍與季子親前人贈廖道士曉登丞相嶺暮宿翰林堂李中定連州倚郭一外縣二桂陽陽山連山郡號湟水熈平連山陽山小桂州沿革翼軫分野禹貢荆州之域春秋百越地戰國屬楚秦長沙郡南境漢屬桂陽郡吳晉屬始興郡宋明帝立宋安郡後廢屬廣興郡齊復置始興梁立陽山郡隋置連州大業改熈平郡唐武縣復連州天寶曰連山郡屬江南道五代初入馬氏後入南漢沿革表縣沿革桂陽縣屬桂陽郡吳以後屬始興梁置陽山郡隋唐連州治陽山本漢陽山侯國屬桂陽郡東漢省之晉復置縣屬始興郡宋屬廣興梁屬陽山郡隋屬熈平郡唐屬連州連山本桂陽縣地梁武帝析置廣惠縣隋開皇改廣澤屬連州仁夀改今名沿革表形勝桂嶺在桂陽縣北桂水出於桂嶺潮泉在桂陽與潮候相應乳穴凡三十七所栁文有乳穴記桂林山在桂陽相靈山桃泉山二桃水源所出龍宫灘韓文有詩鵞崗山在桂陽巍峩山在連山安樂水在陽山静禪山在桂陽北廖真人於此上昇輿地紀勝集陸有丘陵之險虎豹之虞水有江流悍急横波之石亷利侔劒㦸舟上下失勢破碎淪没者徃徃有之韓文送區冊序出宰山水縣讀書松竹林韓詩哀猿醒俗耳清泉潔塵襟青竹時黙釣白雲日幽尋同上剡中若問連州事惟有青山盡不如劉夢得連州何連連接天碧岑崟孟郊南連衡岳其清粹秀爽之氣鍾}
