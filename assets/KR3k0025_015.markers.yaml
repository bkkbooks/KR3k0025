  - {type: variant, offset: 1281, length: 2, content: 哉前, WYG: 理沿革表縣沿革封川本漢廣信縣為蒼梧郡治東漢交州刺史治晉蒼梧晉康郡梁為梁信郡治梁信縣又置封興縣隋改封川大業省封興入焉為蒼梧郡治唐為封州治武德復置封興後省之開建本漢蒼梧郡封陽縣地吳屬臨賀郡宋分置開建縣立宋建郡郡廢屬臨慶國梁立南静郡隋廢郡屬連州後省之唐武德復置開建來屬沿革表形勝東山去城一里西山州治隔江忠讜山在開建北忠讜水出焉豐夀山在州東靈溪在州北靈洲在封川西澤錦山月臺山蟠龍山在坊場鄉風溪水在州南金鏤村有莫狀元讀書堂有龍吟水麒麟山白馬山在州東輿地紀勝人物漢陳欽治左氏傳唐莫宣卿狀元登第南漢劉隱起封州據有南海同上本朝開寶五年省開建縣入封川六年復置沿革表秋冬三釀酒風景四時花守官員吏隱惟放日髙衙田開嶺中蕉子國海上荔枝莊民有百年夀家存十嵗糧東山畫屏展北阜翠蚌馴我愛臨封好從來禮義鄉並同上垣墉角占樓臺近城郭心藏洞府深方維南雄州倚郭一外縣一保昌始興郡號保昌大庾溱水州沿革牛女之分春秋百越地戰國屬楚秦南海郡地漢屬豫章郡吳屬始興郡宋改廣興郡齊復曰始興郡陳屬東衡州隋屬廣南海郡唐屬韶州南漢立雄州沿革表縣沿革保昌唐析始興縣置湞昌縣屬韶州南漢為雄州治始興本漢豫章郡南野縣治又雲南海縣治吳屬南康郡孫皓分置始興縣屬始興郡一雲置斜階縣齊改縣曰正階梁復曰始興立安逺郡陳置東衡州隋廢郡屬廣州唐屬韶州本朝來屬}
