  - {type: variant, offset: 1492, length: 1391, content: 韋思謙傳蒙恥奮忠以權大謀唐狄仁傑贊傳記人有置係蹄者而得虎虎怒決蹯而去虎之情非不愛其蹯也然而不以環寸之蹯而害七尺之軀者權也戰國策互見權變集磨劍莫磨錐磨錐成小利元稹集互見決擇門吞八荒者不咀蟣蝨楊偉時務論經小不忍以致大亂焉詩將仲子篇民之失德乾餱以愆伐木詩見小利則大事不成語子路小不忍則亂大謀衛靈公一朝之忿忘其身以及其親並語子養其一指而失其肩背孟子告子上一不成而萬有餘喪矣莊子在宥爭利如蚤甲而喪其掌荀子利夫秋豪害靡國家荀大略削足而適履殺頭而便冠淮南子說林訓治鼠穴而壞里閭潰小而發痤疽同上是見朱橘一子之蠹因剪樹而棄之睹縟錦一寸之點乃全疋而燔之劉子羊羹偏而宋師敗郈孫以鬭雞身亡齊侯以笑嬪破國劉子謹隟史宋華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民左宣公二年一慚之不忍而終身慚乎昭三十一年爭尋常以盡其民成十二年初武城人拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之哀八年並左傳石祈子曰得一夫而失一國與惡而棄好非謀也左莊子互見納忠晉使郤克於齊卻克僂齊頃公母從樓上觀而笑之卻克怒曰不報齊者河伯視之後與魯衛共伐齊史記褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有寇至則舉烽火諸侯悉至至而無寇褒姒乃大笑幽王說之為數舉烽火其後不信諸侯益亦不至史記周本紀別見耽好門有躄者槃散平原君美人笑之躄者至平原君門曰士不遠千里而至者以君能貴士而賤妾也願得笑臣者頭平原君不殺歲餘賓客舍人稍稍引去者過半史本傳陶朱公中男殺人囚於楚朱公遣長子為一封書遺故所善莊生進千金長男至莊生家莊生非有意受之也欲以成事後歸之莊生入見楚王言某星宿某害楚王乃封三錢之府楚貴人告朱公曰王且赦長男以為赦弟固當出也重千金虛棄莊生無所為也乃復見莊生曰初為求免弟今議自赦故辭生去莊生知其意欲復得金曰若自入室取金長男即自入室取金持去莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以脩德報之今臣出道路皆言陶之富人朱公子殺人囚楚其家多持金錢賂左右故王非能恤楚國而赦乃朱公子故也楚王大怒令論殺朱公子明日下赦史越世家規小節者不能成榮名惡小恥者不能立大功史魯仲連傳以二卵棄扞城之將通監戰國翫細娛而不圖大患西漢賈誼傳爭睚眥之隙以成千鈞之讎東漢趙溫傳庾悅廚饌甚盛不及劉毅從悅求子鵝炙悅不與毅由是銜之解悅都督通監晉安紀石崇有妓曰綠珠美而艷善吹笛中書令孫秀使人求之崇勃然曰綠珠吾所愛不可得也秀怒乃勸趙王倫誅崇矯詔收之晉書楚之邊邑脾梁之女與吳邊邑處女蠶爭界上之桑二家相攻吳國不勝遂更相伐滅吳之邊邑吳怒伐楚取二邑而去後漢趙曄吳越春秋傳記以一杯羊羹亡國戰國策中山忿爨之未熟覆甑而棄之所害多矣物理論集失意杯酒間白刃起相讎選少年行互見人心難托惡衣之垢而焚之患木之蠹而伐之其為害豈不益多哉通監唐昭宗紀經不矜細行終累大德為山九仞功虧一簣書旅獒子曰士志於道而恥惡衣惡食者未足與議也語里仁子百發一失不足為善射千里蹞步不至不足為善御荀勸學篇千里之堤以螻蟻之穴漏而百尋之屋以突郄之熛焚淮南子以分寸之瑕棄盈尺之夜光以蟻鼻之缺損無價之淳鈞抱朴子暢玄篇史一舉不得前功盡廢史周紀東方朔割名於細君西漢揚雄解嘲顏師古曰以肉遺細君是割損其名互入妻門三公鼎足承君一足不任則覆亂美實西漢彭宣傳北朝周樂遜曰棋劫相持爭行先後若一行不當或成彼利通監李泌有謀略而好談神仙詭誕故為世所輕唐德宗高弘本正衙奏事自理逋債詔公卿庶僚自今勿令正衙奏事議者以為正衙奏事自, WYG: ''}
