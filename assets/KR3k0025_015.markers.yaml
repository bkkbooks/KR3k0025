  - {type: variant, offset: 3041, length: 0, content: '', WYG: 本朝開寶二年廢繡禺順三州入容州省渭龍欣道二縣又廢繡州常林阿林羅繡三縣並入普寧省陵城縣入廢禺州峩石扶萊羅辦三縣並入北流又廢順州龍化温水河南龍豪四縣入陸川沿革表浪經蛟浦闊山入鬼門寒歐陽公天涯已慣經人日歸路猶欣過鬼門東坡一年勾漏守尋盡洞中天佛記盧藏用仙壇葛稚川醒心西掖水燒眼碧池蓮我豈無新事詩碑與酒泉陶弼問津勾漏山散䇿寳圭洞羣峰羅翠屏環合無缺空石盤與丹竈遺迹可捫弄李忠定邕州倚郭一外縣一宣化武緣建武軍節度管内安撫都監郡號永寧南晉宣化晉興邕管和山州沿革星紀牽牛之次古越地秦屬桂林郡漢屬鬱林郡東晋分置晋興郡隋廢郡屬尹州大業屬鬱州鬱林郡唐武德立南晉州貞觀改邕州天寶曰朗寧郡屬嶺南道南漢升建武軍節度沿革表縣沿革宣化本漢領方縣地晉置晉興郡隋廢為縣尋改宣化縣唐為州治武德析置朗寧縣又置如和縣屬欽州景龍來屬乾元開山峒立思籠縣本朝並省入宣化武緣本漢領方縣地晉置晉興縣隋置武緣縣屬尹州廢晉興大業又廢武緣唐武德並復置乾元開山峒立封陵縣本朝並省入武緣沿革表形勝道人山在城東三百里公母山在左江永平寨之東崐崘山在宣化縣東有崐崙關鏌鎁山在武緣縣南銅柱漢馬援所鑄銀瓮仙人所遺人或上山觀之則失其處及下則復見之武號山在城南都礱山在州西北羅秀山在宣化縣北輿地紀勝人物皇朝石鑑舉進士說諸蠻不附儂智髙有功同上集龍約海船行有力象隈銅柱卧成㾗沈彬分野窮禹畫人烟過虞循劉夢得本朝開寶五年省朗寧思籠二縣入宣化省封陵入武緣更晉興曰樂昌景祐二年省如和入宣化省樂昌入武緣地理沿革表璽書行絶域銅柱入中原陶弼玉簪峰頂共登仙銅柱溪頭再得賢深入儂黄左右溪溪邉得比嵗寒枝五十溪洲五寨城廣宣恩詔諭蠻情少希銅馬式老厭玉門關並同上再獲金城之固幾還銅柱之封狄武襄表宜州倚郭一外縣四龍水忻城天河思恩河池郡號宜山龍水龍江忻城粤州州沿革粤地牽牛分野秦屬象郡漢屬鬱林郡唐置粤州天寶改龍水郡乾元曰粤州乾符改宜州沿革表縣沿革龍水唐與州同置及置崖州東璽二縣後省之乾封置洛封縣屬栁州元和改曰洛曺本朝省入龍水忻城秦屬象郡唐覊縻芝忻州領五縣歸恩州領五縣紆州領六縣本朝並省入忻城天河唐與州同置思恩唐貞觀開生蠻置環州及思恩縣本朝廢州以縣來屬河池本朝覊縻智州本朝來屬沿革表形勝日山在城東月山在城西三元坊以馮京殿省解俱第一四賢堂取馮京黄山谷趙清獻呂兖公以名之髙峰山陸猿仙所隠疊石山在思恩縣龍德山在天河縣西鵞溪水在河池縣南馬山溪在河池縣西輿地紀勝人物皇朝馮京解殿三元何旦與東坡遊區革與山谷遊同上本朝慶厯三年廢芝忻歸恩紆三州入宜州以其十六縣地併入忻城來屬淳化元年以栁州洛曺縣來屬嘉祐省之熈寧廢懷逺軍古陽述昆二縣入龍水宣和改曰宜山後復故大觀三年以天河縣屬融州後復故熈寧八年廢環州以思恩縣來屬徙治帶溪寨省鎮寧州禮丹縣入焉元豐復舊治治平二年以智州河池縣來屬又省富刀縣入焉沿革表青山通象郡白浪下靈渠陶弼融州倚郭一外縣一融水懷逺清逺軍節度郡號融水羅水融江清逺州沿革牛女之分或曰翼軫春秋百越地秦屬桂林郡漢屬鬱林郡吳晉屬桂林郡齊置齊熈黄水二郡梁置東寧州隋開皇改融州大業廢之屬始安郡唐復融州天寶曰融水郡屬嶺南道五代地入南漢沿革表縣沿革融水本漢鬱林郡潭中縣齊置齊熈縣及郡又置臨䍧黄水二縣隋改齊熈曰義熈大業省二縣入焉屬始安郡唐武德置州析置臨䍧黄水安修三縣六年改義熈曰融水貞觀省安修天寶省黄水臨䍧置武陽本朝省入懐逺懷逺本朝初置同上形勝丹溪在融水西清潭在州南真仙岩在州南五里老人岩在城西五里靈夀溪本老君以丹投水中飲此者得夀仙女山近朱欄鋪朱砂山玉華洞在融水西北玉江水在懷逺縣西寶溪水在融水縣界銅鼓山石門山並在城西輿地紀勝本朝政和二年升清逺軍節度開寶二年分桂州珠川峒地置羅城縣熈寧省羅城武陵二縣入融水紹興四年廢平州為王口寨役於此置懷逺縣沿革表集溪僧過此說山公遊遍真仙洞府中乳石崖邉得靈草可能封褁寄山翁陶弼融水奥區潭中舊壤山居谷聚控並海之蠻夷地大物荒據列城之襟帶陞軍額制詞象州倚郭一外縣二陽夀來賔武僊象郡防禦郡號陽水建陵陽夀象山鬱水川沿革翼軫鶉尾之次春秋百越地秦屬桂林郡漢屬鬱林吳晉屬桂林陳置象郡隋為象州後屬始安郡唐武德復象州天寶曰象郡屬嶺南道五代地入南漢沿革表縣沿革陽夀本漢潭中縣地吳分立桂林郡陳立象郡置陽夀淮陽二縣隋開皇改淮陽為陽寧大業省入陽夀又有西寧縣省入桂林縣唐武德置州析桂林置武德西寧二縣又置武化縣屬封州又置長封與武化並屬晏州州廢來屬後省西寧武德長封三縣貞觀治武化大厯治陽夀南漢廢武化來賔本漢中留縣地唐乾封置來賔縣及嚴州又置歸化縣天寶改州為循德郡本朝並省入來賔武僊本漢中留縣地隋置桂林縣屬始安郡唐武德析置武僊縣乾封省桂林入焉沿革表形勝象山在陽夀鹿山在陽夀上有鹿池龍洞在來賔仙岩在武僊靈泉在陽夀聖塘去城百里石山髙峻人莫能登金峰山在來賔鉄峽山銅鼓山皆在武僊六祖岩在西山寺後八德泉在報恩寺仙人山在武僊仙女岩去城七十里輿地紀勝人物皇朝栗大用應童科謝洪謝澤兄弟篤學集青山海上無城郭惟有松排出象州張籍本朝開寶七年廢嚴州入象州省歸化縣入來賔元祐元年復置武化崇寧廢入陽夀沿革表集象郡雖云逺王郡各有宜踈梅香度水瘦竹笋穿籬坐待百卉芳春風兼四時王安中誰云嶺外皆炎熱此是西南第一州趙伯先地控百蠻疆連五嶺陞防禦制顧兹象郡邈在狼荒髙}
