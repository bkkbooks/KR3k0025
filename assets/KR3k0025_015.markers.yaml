  - {type: variant, offset: 3182, length: 1, content: 間, WYG: 分古百越地秦屬桂林郡漢屬鬱林郡一云合浦郡地梁為桂平郡隋廢為縣屬尹州大業屬鬱州鬱林郡唐置潯州後廢復置天寶改潯江郡屬嶺南道五代地入南漢地理沿革表縣沿革桂平本漢鬱林郡治南山縣又阿林縣地梁置桂平郡及縣隋開皇廢郡以縣屬南尹州又置宣化縣後置大賔縣屬藤州大業省宣化唐初大賔改屬南尹州武德五年屬鷰州又置皇化縣屬繡州貞觀又置江陵縣以四縣置州台桂平尋省江陵本朝並省入桂平平南本漢猛陵布山三縣地宋于猛陵置武林縣屬永平郡隋屬藤州又分置隨建縣唐武德置大川縣屬鷰州貞觀置平南西平歸正大同四縣並武林㤗川置龔州以随建來屬後省㤗川歸正太平又置陽建尋改陽川屬焉天寳曰臨江郡永隆又析龔蒙象三州地置思唐州及武郎平原二縣長慶改平原曰思和五代石晉改思唐曰思化南漢復舊龔州為南漢所有本朝並省入平南地理沿革表形勝潯江在桂平縣北鬱江在州南羅影山羅葉水羅繡墟銅鼓灘玉泉臺皆在桂州鳯巢山獅子岡在州西龍門灘在潯江石鶯山在舊龔石鹿山在桂平獨秀峰在州南白石山側三清岩在西山包髻岡在州五里横眉水在桂平輿地紀勝人物五代梁嵩南漢狀元因蠲丁賦郡人立廟今白馬廟是}
