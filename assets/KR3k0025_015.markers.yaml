  - {type: variant, offset: 36, length: 0, content: '', WYG: 番禺二月尾落花已無春惟有薔薇水衣襟四時薰郭詳正岸邉天影随潮入樓上春容帶雨來陳與義韶州倚郭一外縣五曲江翁源樂昌仁化福建乳源廣東路提刑司郡號曲江始興韶石廣興武溪州沿革星土同廣州春秋百越地戰國屬楚秦南海郡地漢桂陽郡地吳分立始興郡屬交州宋改廣興郡齊復始興梁蕭勃置東衡州隋開皇改韶州十一年廢入廣州唐武德立番州尋改東衡州貞觀曰韶州屬嶺南道天寶曰始興郡五代盧光稠據之後入南漢地理沿革表縣沿革曲江縣漢屬桂陽郡吳屬始興晉為郡治隋初置韶州後屬南海郡唐韶州治翁源本漢湞陽縣地梁蕭勃分置翁源縣陳}
