  - {type: variant, offset: 2943, length: 0, content: '', krp: 書並同上桂州倚郭一外縣九臨桂興安靈川陽朔荔浦永福脩仁理定義寧古縣静江軍節度廣西經略安撫司轉運司提刑司提舉司郡號桂林桂府始安桂州臨桂郡沿革翼軫之分鶉尾之次禹貢荆州之域春秋百越地戰}
  - {type: variant, offset: 2944, length: 0, content: '', WYG: 屬楚秦屬桂林郡漢屬零陵蒼梧二郡吳立始安郡宋明帝改始建國齊復梁兼立桂州大業復始安郡唐立桂州為大都督府屬嶺南道天寶曰始安郡天順升静江軍節度五代入楚馬氏後入南漢沿革表縣沿革臨桂本漢零陵郡始安縣吳始安郡治梁桂州治唐析始安縣置福禄純化二縣貞觀省福禄更始安曰臨桂永真更純化曰恭化後唐更慕化本朝省入臨桂興安本漢始安縣地唐武德析置臨源縣大厯改全義石晉時馬氏奏立漙州改縣為德昌後復曰全義本朝廢漙州更今名靈川本漢始安縣地唐龍朔析置陽朔本漢始安縣地梁初析置唐屬桂州武德置歸義縣正觀省入荔浦漢置屬蒼梧郡吳屬始安郡仍析置永豐縣梁廢之唐武德立荔州又分陽朔置永豐縣屬昭州正觀廢荔州以荔浦永豐屬桂州長慶更永豐曰永後梁又改永寧本朝省入荔浦永福本漢始安縣地唐武德析置脩仁本漢荔浦縣地吳置建陸縣屬蒼梧郡宋末屬始建國齊梁陳屬始安郡隋屬桂州唐武德屬荔州貞觀立晏州州廢來屬長慶更今名理定本漢始安縣地隋置興安縣大業省唐武德復置又置宣風縣貞觀省之至德改興安曰理定義寧本漢始安縣地石晉析臨川初置古縣本漢始安縣地唐乾寧析置恭化地理沿革表形勝堯山在城東北舜山在城北桂林一名八桂又名八柱言八桂成柱也桂水又名桂江荔水一名荔江灕山在城南居灕水之陽獨秀山在城西北七寶山在南沙阿林龍蟠山在興安龍隱岩在水東七星山龍門山在陽朔鳯巢山在永福白龍洞在南溪白鶴山在陽朔有白鶴洞繡山洞在新林驛北丹崖峰金泉山在陽朔銀江水在靈川棲霞洞在七星峰下凌霄峰在陽朔隱山六洞曰朝陽夕陽平華北牖嘉蓮白雀輿地紀勝人物王世則中進士第一淳化中以言儲貳謫象州輿地紀勝集我所思兮在桂林欲往從之兮湘水深張衡賦南州實炎德桂樹凌寒山五嶺皆炎熱宜人獨桂林桂詩城窄山將壓江寛地共浮西南通絶域東北有髙樓神護青楓岸龍移白石湫李商隱蒼蒼森八桂兹地在湘南江作青羅帶山如碧玉篸戸輸多翠羽家自種黄柑韓文山水衙門外旌旗樓堞中白居易遥聞桂水遶城隅城上江山滿畫圖為問訾家州畔月清秋擬許醉狂}
