  - {type: variant, offset: 2943, length: 0, content: '', WYG: 書並同上桂州倚郭一外縣九臨桂興安靈川陽朔荔浦永福脩仁理定義寧古縣静江軍節度廣西經略安撫司轉運司提刑司提舉司郡號桂林桂府始安桂州臨桂郡沿革翼軫之分鶉尾之次禹貢荆州之域春秋百越地戰}
