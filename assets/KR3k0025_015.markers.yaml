  - {type: variant, offset: 3386, length: 4, content: 崑崙則覺, WYG: 置賔州天寶曰安城郡屬嶺南道沿革表縣沿革嶺方縣漢屬鬱林郡都尉治又廣鬱縣地梁置郡治此又於廣鬱地置安城郡隋廢郡以嶺方安城二縣屬鬱林郡唐武德屬南方州仍置瑯瑘思干二縣貞觀祈三縣及南尹州安城縣置賔州後省思干至徳改安城為保城本朝省入嶺方遷江縣本屬覊縻思剛州本朝來屬上林本漢嶺方縣地唐武德析置上林縣及南方州又置無虞止戈二縣及析栁州置賀水縣俱屬焉貞觀改澄州本朝廢之省諸縣入上林地理沿革表形勝錢山寶水在嶺方龍水在上林虎岩在遷江馬潭在州泉鏌鋣山在上林明鏡湖去州三十五里雙髻山中子山皆在遷江葛仙岩在州西盧仙岩在遷江輿地紀勝人物唐韋厥開拓化外詔領澄州刺史皇朝梁仲保與儂賊戰死今有梁太尉廟李安靣半黒蠻人號鉄靣將軍廖世英自號逃禪居士輿地紀勝本朝開寶五年廢賔州省瑯琊保城二縣入嶺方廢澄州省止戈無虞賀水三縣入上林並𨽻邕州六年二州並復端拱二年廢澄州以上林來屬天禧四年廢思剛州以遷江縣來屬沿革表集賔州在何處為子上栖霞蘇東坡何處登臨好城樓對萬山安城太守知邉計菡萏花中閱水兵並同上廣右開炎服思剛置縣衙羈縻唐世及正朔漢朝加鄉分今賀水邑𨽻古瑯琊泉脉通明鏡封鄰接鏌鎁秦泌横州倚郭一外縣一寧浦永淳郡號烏巖永定寧浦簡陽從化州沿革牛女之分春秋駱越地秦屬桂林郡漢屬鬱林合浦二郡吳析置寧浦郡梁分置簡陽郡隋廢二郡立簡州開皇改緣州大業州廢屬鬱林郡唐立南簡州貞觀改横州天寶曰寧浦郡屬嶺南道五代地入南漢沿革表縣沿革寧浦本漢廣鬱髙梁二縣地吳於髙凉置寧浦縣及郡梁又立簡陽嶺山二郡陳於廣鬱置樂陽郡隋開皇為簡州治大業廢屬鬱林郡又廢樂陽郡為縣廢嶺山郡為嶺縣後改樂陽曰樂山嶺縣曰嶺山唐横州治寧浦縣武德析置蒙澤淳風二縣以樂山來屬貞觀省䝉澤嶺山永貞改淳風曰從化本朝省入寧浦永淳本秦桂林郡地漢嶺方縣地唐武徳立淳州治永定縣天寶曰永定郡乾元復曰淳州永貞改蠻州並省武羅靈竹二縣本朝並省入永淳沿革表形勝秋風江桂榜山在永定縣南寶盖山登髙嶺在寧浦鳯凰巖在城東鸕鷀灘在寧浦震龍山在州北飛龍山龍牙山龍鎮山在寧浦龍章山魚流山在永定秀林山在寧浦洪崖山在城南輿地紀勝本朝開寶五年廢蠻州省武羅靈竹二縣入永定來屬省從化樂山二縣入寧浦熈寧四年省永定入焉元祐復置永定崇寧改永淳沿革表集萬疊山圍城堞古一灣江抱海槎浮徐安國羣嶺中推古鉢尊山川羅列掌中存亭臺突兀聖婆廟}
