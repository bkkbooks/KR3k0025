  - {type: variant, offset: 451, length: 0, content: '', WYG: 觀州廢屬廣州立南漢地理沿革表縣沿革眞陽本漢桂陽郡湞陽縣吳以後屬始興隋省入曲江後復置曰真陽唐初屬洭州貞觀復曰湞陽屬廣州南漢英州治此浛光本漢桂陽郡含洭縣吳以後屬始興梁治衡州陽山郡隋改􅀈州州廢屬廣州唐置洭州治此州廢屬廣州本朝改今名來屬地理沿革表形勝銀山在真陽有銀江琅溪在縣南通天岩碧落洞在州西相去二三里㴠暉谷有飛霞嶺棲雲洞濳靈洞晞陽島夣弼岩在州南鳴絃峰下真陽峽在真陽東南芙蓉山在州西蓮花峰在鳴絃峰前桃花洞在含暉谷後娥眉岡熊耳嶺皆在浛光輿地紀勝人物皇朝石汝礪問學淹該馮安上父}
