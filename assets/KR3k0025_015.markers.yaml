  - {type: variant, offset: 3664, length: 155, content: 下在培塿以宜慚奏咸池而張洞庭非哇咬之可度歐公集經觀其舞知其德記樂記居家理故治可移於官孝經子射者扞烏號之弓彎棋衛之箭重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以為之籠因江海以為之罟又何亡魚失鳥之有乎淮南子集求忠臣於孝子求良婦於罵己食子盡節也推其忍可以疑心放麛違命也推其仁可以屬國劉賓客互見觸類, WYG: 寶改招義曰幹水}
