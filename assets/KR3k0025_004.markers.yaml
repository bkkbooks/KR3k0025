  - {type: variant, offset: 4448, length: 9, content: 臧榖雖殊竟兩忘坡詩, WYG: 郡縣因改元神爵宣帝祀后土鸞鳥集長樂宫史韓瑗與禇遂良相繼去内外以言為諱帝造奉天宫御史李善感始上䟽極言時人謂之鳳鳴朝陽唐史傳記周昭王以青鳥之毛為二裘後人得之片羽則準千金拾遺記石季龍皇后有詔書五色紙着鳳口中銜之鄴中記揚雄著太𤣥夢吐白鳳西京雜記蕭史與其妻㺯玉吹簫於鳳凰臺引鳳凰至夫婦乘之飛去列仙傳薛元敬與收及徳音齊名世稱河東三鳳唐書鳳有六象頭象天目象日背象月翼象風足象地尾象緯其徳九苞其文五采傳明皇逰月宫見素娥皆皓衣乘白鸞舞於大桂下龍城錄集晨逰紫霧夕飲𤣥霜資長風以舉翰戾天衢而逺翔西翥則烟氛閟色東飛則日月騰光唐太宗賦神鸞垂玉音陶潜朝鳴崑崙丘夕飲砥柱湍歸飛海路逺獨宿天霜寒鸞乃鳳之族翺翔紫雲霓文章輝五色棲在瓊樹枝靈鳳託髙梧凌風何翩翩鳳飛九千仞五章備綵珍李白一毛生鳳鵷杜甫朝餐琅玕實夕飲玉池津江文通本朝應升中而降止覽徳輝而下之嘗逰郊藪詎集藩籬則有揚雄之吐蕭史之吹賞僧綽之戯奪荀朂之池呉淑賦記纂淵海卷四}
