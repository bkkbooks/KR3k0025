  - {type: variant, offset: 4444, length: 0, content: '', WYG: 人如問君不識字宜對獬廌不學而能觸邪陛下用人安事識字無何后問思止以對后大悦史獬廌神竒之獸一名任法狀如羊古者決訟令之以觸不直黄帝時有遺者帝問何食飲曰食薦春夏處水澤秋冬處松栢説文傳記東北荒中有獸如牛一角尾青四足如熊見人鬬則觸不直聞人論則咋不正名獬豸一名任法獸神異經獬豸神羊}
