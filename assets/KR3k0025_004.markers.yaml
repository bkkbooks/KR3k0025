  - {type: variant, offset: 28, length: 874, content: 出樽俎之間折衝千里之外家語圜居而方正則若盤石然觸之者角摧荀議兵拱揖指麾強暴之國莫不趍使荀真儒無敵於天下楊史吳伐魯魯微虎欲宵攻王舍私屬徒七百人三踊於幕庭吳子聞之一夕三遷左哀八年頰谷之會孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來焉命司馬止之齊侯逡巡而謝曰寡人之過也罷會齊人使優施舞於魯君之幕下孔子曰笑君者罪當死司馬行法焉首足異門而出齊人來歸鄆讙龜陰之田者蓋為此也穀梁傳秦欲伐魏聞干木在魏終不敢發兵史記諸侯以公子賢多客不能加兵謀魏史魏世家互入為世輕重項王願與漢王挑戰漢王曰吾能鬭智不能鬭力史記運籌帷幄之中決勝千里之外前漢高帝紀心有所懷威動千里西漢通傳六國常以十倍之地百萬之軍仰關而攻秦秦人開關延敵九國之師遁巡而不敢進秦無亡矢遺鏃之費而天下已困矣前漢項籍傳不降階序而運天下前漢諸侯王表楚有子玉得臣文公為之側席而坐趙有廉頗馬服疆秦不敢窺兵井陘近漢郅都魏尚匈奴不敢南卿沙漠西漢陳湯傳賢人立朝折衝厭難勝於亡形西漢辛慶忌傳酈食其憑軾下齊七十餘城前漢互入談辨王商有威重長八尺餘身體鴻大容貌甚過絕人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前謁商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣西漢王商傳匈奴素聞郅都節為引兵去竟都死不近鴈門前漢郅都傳魏軍次于興勢假費禕節率眾往禦之光祿大夫來敏至禕話別求共圍基于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退蜀志費禕傳互入處事閑暇劉琨在晉陽嘗為胡騎所圍數重琨乃乘月登樓清嘯中夜奏胡笳向晚復吹之賊棄圍而走晉劉琨傳互入處事閑暇祖逖為鎮西將軍石勒不敢窺兵河南使成皋縣修逖母墓晉書祖逖傳以計伐戰一以當萬晉書杜預傳頡利可汗進至渭水便橋之北遣其腹心執失思力入見以觀虛實上囚思力於門下省上出玄武門與高士廉房玄齡等六騎徑詣渭水上與頡利隔水而語責負約突厥大驚皆下馬羅拜俄而頡利來請和通監唐高祖紀突厥寇并州京師戒嚴世民乃帥騎馳詣虜陳告之曰國家與可汗和親何為負約深入我地我秦王也可汗能鬭獨出與我鬭若以眾來直以此百騎相當耳, WYG: 絶}
