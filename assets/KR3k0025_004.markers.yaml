  - {type: variant, offset: 1998, length: 392, content: 勝其喜俄而遺其所藏之處遂以為夢焉順塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之列周穆王六國𧈪𧈪為贏弱姬楊重黎魏田父得玉徑尺以告鄰人鄰人詐之曰此怪石也蓄之非利其家田父猶豫以歸置於廡下其玉明照一室大怖遽棄之於遠野鄰人取之以獻魏王魏王召玉工相之曰此無價魏王賜獻玉者千金食上大夫祿尹文互入愚弄桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝也周生烈子屠者霍羹車者步行陶人用缺盆匠人處狹廬淮南子史忌將士以資敵國此伍子胥所以鞭荊平之墓也史季布傳諸將偶語雍齒先封西漢張良傳秦張誹謗之罔以為漢敺除通監漢成帝謝琨女夫殷叡好樗蒲奪其妻妹及伯母兩姑之分以還戲債或譏之曰謝氏累世財產充殷君一朝戲債通監晉太祖常以三分勞筋苦骨之人奉七分待衣坐食之輩通監唐憲宗隋貯洛口倉而李密因之積布帛東都而王世充據之唐書馬周傳傳記齊欲伐魏淳于髡曰韓盧天下之疾犬東郭逡天下之狡兔盧逐逡環山者三騰山者, WYG: ''}
