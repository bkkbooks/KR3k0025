  - {type: variant, offset: 4439, length: 0, content: '', krp: 上嵗星所居而五穀豐昌同上史五星不失行則年用豐昌前天文志文帝時天下殷富粟至十餘錢史律書是以元年膏雨降五穀登此天所以相陛下也前賈山傳至言武帝元鼎五年詔巡祭后土以祈豐年本紀景星歌云上天布施后土成穣穣豐年四時榮禮樂志甘露降五穀登此和之至也公孫𢎞傳賢良䇿宣帝元康四年比年豐穀石五錢本紀百姓安之嵗數豐稔榖至石五錢農人少利食貨志詔上帝之祠朕親奉祀為百姓獲豐年焉郊祀志以四時祠江海為天下祈豐年焉同上光武建武三年野穀旅登麻菽尤盛後本紀明帝永平九年大有年本紀十年詔昔嵗五穀登衍今兹蠶麥足収其赦天下十二年嵗比登稔百姓殷富粟斛三十並同上章帝詔増脩羣祀以祈豐年本紀嵗星守心年穀豐後郎顗傳斗覆豐穣隋文帝志唐太宗貞觀初户不及三百萬絹}
  - {type: variant, offset: 4440, length: 0, content: '', WYG: 匹易粟一斗至四年米斗四五錢人行數千里不齎糧民物蕃息唐食貨志五六年頻嵗豐稔一匹絹易粟十餘斛馬周傳𤣥宗海内富實米斗之價十一二青齊間斗纔三錢食貨志集憂國願年豐杜詩本朝有年秋屢實歐陽公惟幸嵗之穣兹惠豈人力非徒給租調且可銷盜賊從今潔鬴廪相與飽麰麥至治臻無事年豐樂有成豐年氣候和年豐千里無夜驚嘉瑞奏豐年歸田仍值嵗豐穣老農亦豈知帝力聽我歌此豐年詩相隨簫鼔樂豐年並同上此生已覺各無事今嵗仍逢大有年東坡聖功恵我豐年食未有涓埃可報名山谷堆塲結藁騐豐年陳後山勸相秋郊開稔熟麥秀知春力時和騐嵗豐並同上麒麟經黄帝時麒麟在囿書傳麟之趾振振公子吁嗟麟兮詩西狩獲麟春秋天不愛道地不愛寳人不愛情故麟在郊藪禮子麒麟夀千嵗抱朴子叔孫氏子鉏商獲麟以為不祥孔叢子王者好生故麒麟逰其郊野孫卿子麟者𤣥枵之獸隂之精也徳能致之其精畢至鶡冠子麟之為靈昭昭也韓子史刳胎殺夭則麟不至也史章帝時麟五十一見終軍從幸雍獲白麟一角五蹄漢史吕光入姑臧時麟見百獸從之光以為瑞晉史晉愍帝時有白麒麟神璽出於江寜其文曰長夀萬年晉史齊中興二年宣城内鑿井得鏤麒麟一枚齊史蜀王建武成元年麟見璧州永平二年麟見文州三年麟見永泰四年麟見昌州天祐二年有獸入吳興一角而麟趾宋史傳記麟水精也鬭則日無光孔演圗記麒麟麕身牛尾含仁懐義音中律吕歩中規矩不履生蟲不踐生草牡曰麒牝曰麟王者之嘉瑞也漢苑麟牡鳴曰逰聖牝鳴曰歸和夏鳴曰扶㓜秋鳴曰養緩祥瑞記麟一角明海内共一主也春秋傳麟生於火㳺於土故修其母致其子五行之精月令傳記王濬平吳被謗上表曰夫猛獸當塗麒麟恐懼晉記孔子夜夢豐沛有赤煙顔回子貢徃觀之至楚西北范氏之廟有芻兒麟伏其前折左足束薪而覆之孔子發薪下麟視孔子趨而往蒙其耳吐三卷書孔子精而讀之捜神記大道盛兮麟鳳逰今非其時兮来何求麟兮麟兮我}
