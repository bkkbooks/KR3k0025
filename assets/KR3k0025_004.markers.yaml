  - {type: variant, offset: 4438, length: 0, content: '', WYG: 風雨節五穀登淮南子嵗時熟而不凶}
  - {type: variant, offset: 4438, length: 0, content: '', krp: 風雨節五穀登淮南子嵗時熟而不凶}
  - {type: variant, offset: 4439, length: 0, content: '', WYG: 上嵗星所居而五穀豐昌同上史五星不失行則年用豐昌前天文志文帝時天下殷富粟至十餘錢史律書是以元年膏雨降五穀登此天所以相陛下也前賈山傳至言武帝元鼎五年詔巡祭后土以祈豐年本紀景星歌云上天布施后土成穣穣豐年四時榮禮樂志甘露降五穀登此和之至也公孫𢎞傳賢良䇿宣帝元康四年比年豐穀石五錢本紀百姓安之嵗數豐稔榖至石五錢農人少利食貨志詔上帝之祠朕親奉祀為百姓獲豐年焉郊祀志以四時祠江海為天下祈豐年焉同上光武建武三年野穀旅登麻菽尤盛後本紀明帝永平九年大有年本紀十年詔昔嵗五穀登衍今兹蠶麥足収其赦天下十二年嵗比登稔百姓殷富粟斛三十並同上章帝詔増脩羣祀以祈豐年本紀嵗星守心年穀豐後郎顗傳斗覆豐穣隋文帝志唐太宗貞觀初户不及三百萬絹}
  - {type: page-break, offset: 4439, content: '', id: KR3k0025_WYG_004-10a, image: WYG0930/WYG0930-0115a.png}
