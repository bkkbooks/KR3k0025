  - {type: variant, offset: 4446, length: 1, content: 道, WYG: 矣于彼髙岡梧桐生矣于彼朝陽翽翽鸞聲詩羽蟲三百六十而鳳凰為之長禮子少皡之立也鳳鳥適至故為鳥師剡子鳳鶉火禽陽之精徳能致之其精畢至鶡冠子昔者三皇鳳至於庭三代鳳至於門周室鳳至於澤淮南子南方有鳥名鵷雛非梧桐不棲非竹實不食非醴泉不飲荘子鸞鳥似鳳而白纓聞樂則節而舞至則國安寜抱朴子史黄帝服齋於宫中有大鳥備五色文巢於阿閣史堯敷政七十載鳳凰来巢舜好生惡殺鳳凰巢其樹文王鳳鳴於岐山史漢武帝時神爵}
