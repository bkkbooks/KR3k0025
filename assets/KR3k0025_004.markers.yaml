  - {type: variant, offset: 1702, length: 1, content: 旁, WYG: 長盛徳之精也文者則異本而同秀質者則同本而異秀此夏殷時嘉禾也孫氏瑞應圗周時嘉禾三本同穂貫桑而生其穂盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之徳乃獻文王之廟同上成王有苗異畆同穂王召周公問之對曰三苗為一穂抑天下其和為一乎尚書大傳嘉禾莖長五尺三十五穂尚書大𫝊神農作耒耜天應以嘉禾禮含文喜綏五器明五禮則五禾應以大豐同上人君乘土而王其政昇平則嘉穀並生禮斗威儀堯時嘉禾七莖連三十五穂詩含神霧璇生得嘉禾液春秋運斗樞王者徳至于地則嘉禾生孝經援神契光武生于濟陽縣舍時有嘉禾一莖九穂縣境大熟因名曰秀東觀漢記章帝時嘉禾嘉麥日月不絶同上梁大同六年始平獻嘉禾一莖十七穂梁起居注嘉禾者大禾之為美瑞者也白虎通王者徳盛則嘉禾生嘉禾者仁卉也其大盈箱一稃二米國政質則同本而異穎國政文則同穎而異本晉證祥説集嘉禾六穂我穡曷蓄文選共穂之禾史不絶書同上嘉穀順成靈貺昭格天人合應遐邇栁文賀嘉禾表植物知仁祥圗應聖靈嶽不愆於賛佑燕谷用遂于生成豐稔既均知朔南之被澤休嘉克叶見天地之同和六穂慙稱於漢臣異畝恥書於周典同上豐年經乃亦有秋書嵗則大熟金縢華黍時和年豐宜黍稷也亡詩序牧人乃夢衆維魚矣大人占之實維豐年詩自古有年詩曽孫之稼如茨如梁曽孫之庾如坻如京乃求千斯倉乃求萬斯箱詩綏萬邦屢豐年詩豐年秋冬報也豐年}
