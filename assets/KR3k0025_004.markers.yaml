  - {type: variant, offset: 1138, length: 1, content: 奇, WYG: 規曹植魏徳論司空咸寜王尹蒲之七年連理生于河之東邑野夫来告且曰吾不知古殆氣之交暢也維吾王之徳交暢者有五云云殊本連理之柯同榮異隴之禾吾徯之産兹土也久矣願記頌詞長言之于康衢頌曰木何為兮此祥洵厥美兮在吾王願封植兮永固俾斯人兮不忘韓文咸寜王渾瑊也朱草子太清之世四時不失其序日月揚光五星循軌則朱草生淮南子朱草状似小桑纔長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及金石銀投其中立可為丸泥以金投其中名曰金漿以玉投之名曰玉漿服之皆長生也抱朴子聖人至徳上及太清下及太寜中及萬靈則朱草生鶡冠子史光武時朱草生於水涯後漢書武帝時朱草生}
