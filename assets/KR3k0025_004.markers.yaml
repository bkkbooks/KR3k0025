  - {type: variant, offset: 1089, length: 2, content: 甲兵, krp: 王者慈仁則紫芝生食之令人延年孫氏瑞應圗王者寵近耆老養有道則芝莢生同上摇光則陵山𤣥芝生春秋運斗樞王者徳至草木則芝草生孝經援神契漢桓帝時芝草生中黄藏府東觀漢記唐貞觀十九年李樹生芝英赤蓋紫光色鮮麗唐春秋肅宗上元二年皇后奏含暉院生金芝同上梁大同九年金芝二十八莖生平水署少府卿蕭介以聞大同起居注王者徳至于山則芝實茂白虎通黄帝以五芝為房宫張厯食芝延年}
  - {type: variant, offset: 1092, length: 0, content: '', WYG: 終與真人同瑞令記漢建初三年零陵泉陵縣女子博寜宅内生芝草五本莖葉紫色論衡芝草一年三花食之令人眉夀度世栽紫芝者其栽如豆並同上集武帝之世芝房寳鼎之歌薦于郊廟班固西都賦序魏文帝青龍元年神芝産于長平之習陽許昌𢎞農中郎􅃽充奉表以聞其色丹紫其質光耀上别為三榦分為九枝散為三十六莖妥綏連屬有似珊瑚之状考圗按譜蓋美乎前代矣繆襲神芝賛濯靈芝於朱柯張平子賦玉芝含秀而晨敷孫綽賦煌煌靈芝一年三秀嵇康詩蓂莢史蓂莢生於階下隨月盈虧依厯開落晉天文志詳見儀象類傳記堯時瑞草號蓂莢生於階下每朔日生一葉月半至十五葉自十五日已後日落一葉月終而盡落月小盡則餘一葉厭而不落帝王世紀蓂莢者葉圓而五色一名厯莢聖明之瑞也孫氏瑞應圗周公輔幼主不矜則蓂莢生尚書大傳周公作樂而治蓂莢生尚書中候老人星臨國則蓂莢生春秋運斗樞箕星得則蓂莢生同上王者徳至于地則蓂莢生孝經援神契按孝經説古太平蓂莢生階其味酸王者取以調味後以醯醢代之風俗通黄帝之時有蓂莢者瑞草也葢神靈之嘉應也徐整正厯王者考厯得其分度則蓂生于階莢者樹名也白虎通連理木史漢武帝幸雍得竒木枝旁}
