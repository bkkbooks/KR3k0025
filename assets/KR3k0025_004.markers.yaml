  - {type: variant, offset: 4442, length: 1, content: 妙, WYG: 伯屏營唐日帝堯保禄天作聖帝享兹萬國薛綜麟頌㳺必擇地翔而後出徳無不王為之折服武昭王麒麟頌早聞黄閣畫麒麟衆中見毛骨猶是麒麟兒杜甫本朝麟有趾而不踶仁哉麟哉有角而不抵仁哉麟哉有額而不觸仁哉麟哉今之人一朝之忿以觸人滅身辱親嗚呼人中有獸獸中有人矣山谷麟趾賦騶虞經吁嗟乎騶虞詩武王克殷後散軍郊射左射貍首右射騶虞禮子白虎黑文不踐生草不食生物也騶虞之化行則人倫正朝廷治庶類蕃殖蒐田以時則王道成矣朱子史漢宣帝時東立宗廟告祠仁獸銜肉致於殿前神雀元年詔曰南郡獲白虎朕之不明震於珍物漢史宋元嘉十六年琅邪有虎從騶虞宋史騶虞吾不知其何物也賈誼以謂騶者文王之囿虞者虞官也然則以之為獸者其出於近世之説乎五代史傳記騶虞如虎五色尾長於身日行千里人君有至信之徳則應之山海經女華之妃曰扶始升丘見白虎其上有雲感以生咎繇元命苞文王拘羑里散宜生等得白虎以獻紂免西伯之難尚書大傳前蜀永平三年騶虞見璧山有二鹿隨之蜀傳集騶虞不折生草莖梁甫吟騶虞不虛来李白般般之獸樂我君囿白質黒章其儀可嘉旼旼穆穆君子之態蓋聞其聲今親其來厥塗靡蹤天瑞之徵司馬相如孟山有獸仁心為質有道則見非時不出白居易賛獬豸子堯時有獬廌緝其尾為帝帳史侯思止髙元禮宻教曰上不次}
