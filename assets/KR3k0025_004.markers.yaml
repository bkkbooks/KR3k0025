  - {type: variant, offset: 1089, length: 2, content: 甲兵, WYG: 王者慈仁則紫芝生食之令人延年孫氏瑞應圗王者寵近耆老養有道則芝莢生同上摇光則陵山𤣥芝生春秋運斗樞王者徳至草木則芝草生孝經援神契漢桓帝時芝草生中黄藏府東觀漢記唐貞觀十九年李樹生芝英赤蓋紫光色鮮麗唐春秋肅宗上元二年皇后奏含暉院生金芝同上梁大同九年金芝二十八莖生平水署少府卿蕭介以聞大同起居注王者徳至于山則芝實茂白虎通黄帝以五芝為房宫張厯食芝延年}
