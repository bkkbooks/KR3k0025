  - {type: variant, offset: 4445, length: 0, content: '', WYG: 輿服志殿中侍御史朝㑹乘馬具服戴黒豸升殿百官志𤣥宗時富平縣産一神羊肉角當頂白毛上捧議者以為獬豸酉陽雜爼鳳凰附鸞鸑鷟鵷雛神爵經簫韶九成鳳凰来儀書鳳凰}
