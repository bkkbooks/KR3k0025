  - {type: variant, offset: 3387, length: 1047, content: 居武城有越寇或曰寇至盍去諸曰無寓人於我室毀傷其薪木寇退則曰脩我墻屋我將反寇退曾子反子思居於衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守孟子曰曾子子思同道曾子子思易地則皆然孟離婁下居下位不以賢事不肖者伯夷也五就湯五就桀者伊尹也不惡汙君不辭小官者柳下惠也三子者不同道其趍一也一者仁也孟子路拯溺而受牛謝孔子曰魯國必好救人於患子贛贖人而不受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善淮南子齊俗訓互入所見不同蹠越者或以舟或以車雖異路所極一也淮南子說林訓非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也可以仕則仕可以止則止可以久則久可以速則速孔子也皆古聖人也孟公孫丑上臧與榖二人相與牧羊而俱亡其羊臧則挾策讀書榖則博塞以遊二人者事業不同其於亡羊均也莊駢拇比犧尊於溝中之斷美惡有間其於失性一也莊天地柤梨橘柚其味相反而皆可於口莊天運夫織者日以進耕者日以卻事相反成功一也淮南子百川異源同歸於海同上塗雖曲而通諸夏川雖曲而通諸海事雖曲而通諸聖楊問道仲尼之道猶四瀆也經營中國終入大海楊君子史晏子儉矣夷吾則奢齊桓以霸景公亦治史太史公自序廣行無部伍行陣就善水章舍止人人自便不擊刁斗以自衛莫府省約文書然亦遠斥堠未嘗遇害程不識正部曲行伍營陣擊刁斗士吏治軍簿至明軍不得休息然亦未嘗遇害通監漢武紀三仁殊而一致夷惠舛而齊聲西漢班固敘傳魏高允稱常爽訓厲有方曰文翁柔勝先生剛克立教雖殊成人則一通監宋文紀唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸于治唐書宋璟贊互入相資成美巡先死不為遽遠後死不為屈唐書本贊傳記宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治呂氏春秋一見韓詩外傳互入政事集夫沿河而下苟不止雖有疾遲必至於海韓文杞桂殊姿而共芳珪璋異質而同潤呂和叔殊趍而一致異派而同源皇甫湜釋宗稱定慧儒師著誠明派分示三教理詣無二名李義山吾君用大和理萬物動靜各隨其宜則陳力以致用潔身以弘教其致一也同上雖羈鸞冥鴻一飛一籠遐心遠意終共超曠歐陽詹文本朝昔者孟子不願召見而孔子不辭小官夫欲正其所由得之之名是以謹其所以取之之故孟子不為矯孔子不為卑老蘇集陳平聽張辟彊許王諸呂呂后安之故平與周勃得執將相之柄以伺其間唐武后欲以武三思為嗣狄仁傑曰母子與姑姪孰親陛下立廬陵王則千秋萬歲後血食於太廟無祔姑之禮后感悟欒城集牛鐸調與黃鍾同山谷詩小蟲心在一啄間得失與世同輕重同上蜣之丸蟻之粒與夫承蜩貫虱者同一心之功用也螳螂之斧莎雞之羽與夫扛鼎拔山者同一心之力用也工倕之削輪扁之斲庖丁之牛與夫堯舜禹湯, WYG: 黄帝}
