  - {type: variant, offset: 2391, length: 851, content: 兔極於前犬廢於後犬兔各死田父見而擅其功戰國策貪功貪功集董卓稱亂徒藉群雄之手王莽偷安卒成光武之業梁任孝恭檄魏文假手于贏以混諸侯憑力于項以離關東柳漢原廟銘莫養瘦馬駒莫養小妓女後事在目前不信君看取馬肥快行去妓長能歌舞三年五歲間已聞換一主借問新舊主誰樂誰辛苦白侍郎互入儆戒賓客歡娛童僕飽始知官職為它人白集互入省悟及勞己為人歌舞教成心力盡一朝身去不相隨白侍郎匠刀者不必自用割匠弓者不必自用射唐文粹戰士風霜苦將軍雨露新杜荀鶴燕趙之收藏韓魏之經營齊楚之精英幾世幾年剽掠其人倚疊如山一旦有不能輸來其間杜牧之阿房賦蘇代曰臣過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄鷸曰今日不雨明日不雨必見蜯脯蜯亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之春秋後語互入相鬭相損本朝借寇兵而資盜糧東坡集有小丈夫者得一金櫝而藏諸家拒戶而守之鳴呼是求不失富也非求富也大盜至劫而取之又烏知其果不失也老蘇集經維鵲有巢維鳩居之詩鵲巢互入蒙成子未嘗稼穡粟蒲倉未嘗蠶桑絲滿囊淮南子史略其武夫以為己腹心股肱瓜牙左成十三年如杞梓皮革自楚往也雖楚有材晉實用之左襄二十六年鄭國曰臣為韓延數年之命然渠成亦秦萬世之利也通監第六韓盧東郭自困於前而為田父之獲者也東漢袁譚傳蜀楊顒曰今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飲食而已通監三國志傳唐高祖曰徐觀蚌鷸之勢以收漁人之功通監隋恭帝紀李密因洛口之食王世充據東都布帛唐書馬周傳鷸蚌相持我乘其敝通監梁高祖傳記兩虎相鬭駑犬受其弊戰國策本朝力生於所激而不自為力故不勞形生於所遇而不自為形故不窮東坡清風閣記秦收鄭渠成晉得楚材多山谷集互入蒙成經天下同歸而殊塗易繫辭下為善不同同歸于治為惡不同同歸于亂書蔡仲之命子夏既除喪而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉記檀弓上經禮三百曲禮三千其致一也記禮器或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也記中庸道並行而不相悖, WYG: 稔}
