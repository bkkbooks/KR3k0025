  - {type: variant, offset: 4441, length: 0, content: '', WYG: 憂孔子使麒麟可得繫而羈兮又何以異乎犬羊賈子皇矣大角降生靈獸視明禮修麒麟来孚春秋既書爾來告就庶士鉏商獲諸西狩蔡邕麟頌懿哉麒麟惟獸}
