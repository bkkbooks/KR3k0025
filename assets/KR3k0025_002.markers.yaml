  - {type: variant, offset: 56, length: 0, content: '', WYG: 可辨及明春状元乃王拱夀御筆改為王拱辰括異志傳記天員如倚蓋地方如棊局天旁轉半在地上半在地下日月本東行天西旋入於海牽之以西如蟻行磨上磨左旋蟻右行磨疾蟻遲不得不西天文志天形如鷄子天大地小表裏有水地乗氣而立載水而浮天運如車轂之運渾天儀哀公曰敢問何貴乎天道也子思曰貴其不已如日月東西相從而不已是天道也不閉其久是天道也無為而成是天道也已成而明是天道也哀公問天聰明也聖人得之天垂象也聖人則之不言而信不怒而威驗之衡軸考之樞軸六帖春為蒼天夏為昊天秋為旻天冬為上天東曰昊天東南曰陽天南曰炎天西南曰朱天西曰成天西北曰幽天北曰𤣥天東北曰變天中央曰鈞天九天之際曰九垠九天之外次曰九陔天去地二億一萬六千七百八十一里半度地之厚與天髙等天南北相去二億三萬三千五十七里二十五步東西短減四步廣雅集玉璫緘劄何由達萬里雲羅一鴈飛李義山𤣥象成文列宿有章三辰燭曜五緯重光衆星遷而環極招摇運而指方白虎時據於參昴青龍垂尾於心房𤣥龜匿首於女虛朱鳥奮翼於軫張垣屏絡繹而珠連三台差池而雁行軒轅華布而曲列攝提鼎峙而相望晉成公賦天行一何健日月無髙踪百川皆赴海三辰回泰蒙傅𤣥祭地肆瘞郊天致煙氣升太一精淪九泉至敬不文明徳惟鮮郭璞混成發粹大道含元興於物祖首自肧渾分泰階而立極光曜魄以司尊懸兩明而必照列五緯而無言驅馭隂陽裁成風雨叶乾位而凝化建坤儀而作輔劉允濟賦本朝容成造厯大撓創辰龍集有次星紀乃分宋何承天天讃日經日月之道貞明者也日月麗乎天易寅賓出日協時月正日書日之方中日出有曜詩冕而朝日東門之外禮馮相氏冬夏致日周禮日南則景短多暑日北則景長多寒周禮子宋有田夫曝日謂妻曰負日之暄人莫知之以獻吾君列子王者敬日荀子白駒過隙荘子日出于暘谷浴于咸池拂于扶桑是謂晨明淮南子日出地上明照四海文中子史晉帝命王導共坐導辭曰若太陽下同萬物蒼生何由仰照晉史晉明帝幼而聰哲元帝寵愛之年數嵗嘗置膝前屬長安使來帝因問之曰日與長安孰近對曰長安近不聞人從日邊來居然可知也明日宴羣臣又問之對曰日近上失色曰何乃異間者之言乎對曰舉目則見日未聞舉目而見長安也帝竒之日者人君之象故有是對本紀漢明帝為太子樂人作歌四章以賛太子之徳一曰日宣重光本紀唐李程為翰林院學士程性懶日過八磚乃至號八磚學士本傳傳記扶桑在碧海中樹長數千丈一千餘圍兩幹同根更相依倚是以名扶桑十洲記有客登岱岳絶頂行四十里以伺日出久之星斗漸稀東望如平地天際已明其下則暗又久之明處有山數峯如卧牛車蓋之状星斗盡不見其下尚暗初意日自明處出又久之自大暗中日輪湧出正紅色騰起數十丈至明處全無光其下亦尚暗邵氏聞見録方諸山真人皆呼日為圓羅耀外國人呼日為濯羅耀真誥桃都山有大樹有天鷄日出即鳴天下鷄皆鳴淵中記集羲和冬馭近愁畏日車翻杜詩火輪飛出客心驚韓愈夜半起下視溟波銜日輪金雅既騰翥六合俄清新同上吚喔天鷄鳴扶桑色昕昕赤波千萬里湧出黄金輪劉禹錫金烏海底初飛來韓愈杲杲冬日出照我屋南隅負暄閉目坐和風生肌膚初似飲醇醪又如執屠蘇外融百骸暢中適一念無曠然忘所在心與空虛俱白居易月經坎為月易月以為量禮月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也大數取法於月禮卿士惟月月之從星則以風雨書月離于畢俾滂沱矣詩子月者太隂之精淮南子月精生水故月盛而潮大抱朴子方諸見月則津而為水方諸隂燧大蛤也向月則水生淮南子月中有物者山河影也其空處海影同上史月者象隂之長妃后大臣象漢書月立夏夏至行南方赤道曰南陸立秋秋分行西方白道曰西陸立冬冬至行北方黒道曰北陸分則同道至則相過同上天文志云月有九行如日有九道也晉書漢武帝起俯月臺下穿池登臺眺月影入池中使宫人乗舟弄月因名影娥池洞𡨕記唐明皇八月望日逰月宮見天府牓曰廣寒清虛之府少前見素娥十餘人皆乘白鸞舞於桂下龍城錄冬至後月養魄於廣寒宮十洲記傳記楊炯渾天儀賦云月也者羣隂之紀上天之使異姓之王后妃之事日猶火月猶水火則施光水則含影月光生於日所照魄生於日所蔽當日則光盈近日則明盡周髀政太平則月圓而多輝政昇平則月清而明禮斗月羣隂之本望則蚌蛤實羣隂盈晦則蚌蛤虛羣隂揫呂氏炎洲仙山有逺飛鷄朝往夕還銜月中桂實歸於南土故北方無桂南方當月路江東諸處每于路衢得洞𡨕記集初無征鴈已無蟬百尺樓南水接天青女素娥俱耐冷月中霜裏鬬嬋娟李商隠斜漢左界北陸南躔白露暎空素月流天謝荘月賦澄江涵皓月水影若浮天風來如可泛流急不成圓元帝昨三五兮既滿今二八兮将缺浮雲褰兮收泛濫明舒照兮殊皎潔謝靈運舟子夜離家開船望月華山明疑有雪岸白不闗沙天漢㸔珠蚌星橋視桂花灰飛重暈缺蓂落獨輪斜庾信露濯清輝苦風飄素影寒杜審言本朝山下白雲横匹素水中明月卧浮圖東坡玉斧修成寳月團月邊仍有女乗鸞青𡨕風露非人世鬢亂釵横特地寒王荆公星經庶民惟星書月離于畢俾滂沱矣東有啓明西有長庚詩晥彼牽牛不以服箱定之方中作于楚宮詩子鯨魚死而彗星出淮南子政失於春嵗星盈縮政失於夏熒惑逆行政失於秋太白出入無常政失於冬辰星不効其鄉文子四守主賞罰淮南子騎箕尾比於列宿莊子史五星者天之五佐為經緯見伏有時所過贏縮有度史記魁斗下三星兩兩相比者名曰三能也色齊則君臣和史記北斗天之喉舌尚書陛下喉舌也斟酌元氣運平四時李固仲尼曰吾聞堯率舜逰首山}
