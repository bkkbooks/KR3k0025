  - {type: variant, offset: 36, length: 0, content: '', WYG: 成其天文中子史天者羣物之祖也故徧覆包含而無所殊前漢秦穆公夢至帝所觀鈞天廣樂帝錫之以䇿秦遂大昌秦紀陶侃夢生八翼飛而上天天門九重比登其八惟一門不得入閽者以杖撃之因墜地折其左翼及寤猶痛倦逰録吳}
