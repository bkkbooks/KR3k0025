  - {type: variant, offset: 67, length: 3, content: 語困誓, WYG: 千里駒也雜記傳記青陽之肇化兮陶萬殊于天壤結鬱蒸以成雷兮鼓訇輘之逸響驚蟄蟲于始作兮懼逺邇之異象李顒雷賦雷于天地為長子以其萬物為出入也雷二月出地百八十日雷出則萬物出八月入地百八十日雷入則萬物入入則除害出則興利人君之象也王充論衡内侍李舜舉家曽為暴雷所震其堂之西室雷火自忩間出赫然出簷人以為堂屋已焚皆出避之及雷止其舎宛然牆壁忩紙皆黔有一木格其中雜貯諸器其漆器銀釦者銀悉鎔流在地漆器曽}
