  - {type: variant, offset: 172, length: 3, content: 智周勃, WYG: 閑送臘迎春亦偶然翠管銀鈎傳故事金花綵勝作新年東坡元宵史隋栁彧見都邑百姓每至正月十五日作角觝戲上奏曰京邑爰及外州每以正月望夜充階塞陌鳴鼓聒天燎炬照地人帶獸面男為女服竭資破産競此一時請並禁斷上可其奏北史唐朝正月十五夜許三夜夜行其寺觀街巷燈明若晝山棚髙百餘尺神龍以後復加嚴飭士女無不夜逰車馬塞路有足不躡地浮行數十步者雍洛靈異小録隋文帝時元胄為右衛大将軍嘗正月十五日帝與近臣登髙時元胄}
