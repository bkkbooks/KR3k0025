  - {type: variant, offset: 980, length: 3, content: 努力老, krp: 流綿絮折阮籍歌倚天松骨冷背日海雲髙淮上人推槖闗中客贈袍胡藏之坐聞西牀琴凍折兩三絃賈島勁氣方凝酒清威正折綿庾肩吾髙吟瘦馬衝殘雪逺㸔孤鴻入斷雲潘閬長風入短袖納手如懐氷李白夜久雪猿啼岳嶺夢回清月上梅花惠洪長洲暮雪藏漁舍野市寒風颺酒旗唐詩本朝破屋仰見星忩風冷如鎪歐陽修北風飄飄天作惡枯林已久葉可落山谷寒威入夜益亷纎酒甕爐牀亦戒嚴東坡履此𤣥英感兹陽月知盛徳之在水慨窮隂之殺節吳淑賦冬至經雷在地中復先王以至日閉闗商旅不行復其見天地之心乎反復其道七日來復天行也易一之日于耜詩僖公五年辛亥朔日南至公既視朝遂登觀臺以望左傳是月也日短至陰陽争諸生蕩芸始生荔挺出蚯蚓結麋角解水泉動禮記子陽氣潛萌于黃鍾之宫揚子冬至子之半邵子千嵗之日至可坐而致也孟子史魏晉冬至日受萬國及百僚稱賀曹植冬至獻襪履所以迎福履長晉史魏武帝元豐元年十一月甲子朔旦冬至五星如連珠史宦者淳于陵渠覆太初歴晦朔望最宻五星如連珠史傳記十一月建子周之正月冬至日南景極長隂陽日月萬物之始律當黄鍾其管最長故有履長之賀玉燭寳典冬至朝賀享祀皆如元日之儀沈約宋書冬至日陽氣起君道長故賀傳黄帝得寳鼎神䇿是嵗己酉朔日冬至得天之紀終而復始傳調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲纎塵不形冬至夜半黄鍾以應太𤣥經傳漢宫中美人刺綉者率以冬至後日添一線漢宫書唐開元冬至}
