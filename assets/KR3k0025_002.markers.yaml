  - {type: variant, offset: 984, length: 4, content: 徒傷悲選, WYG: 雪簷溜結為氷條妃子使侍兒敲二枝㸔玩帝問何物妃子笑曰妾玩氷筯摭遺記集千載昌期一陽嘉節四方交泰萬物昭蘇曹植柔荔迎時萋芳筠應節馥傅亮景移風度改日至晷遷換眇眇負霜鶴皎皎帶雲鴈鮑昭天宫初動磬緹室已飛灰暮風吹竹起陽雲覆石來折氷開茘色除雪出蘭栽慙無宋玉辨濫吹楚王臺蕭慤依稀和氣排冬嚴已就}
