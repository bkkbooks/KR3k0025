  - {type: variant, offset: 1018, length: 1, content: 互, WYG: 難以相曉臣雖圖上願賜清燕之間指圖陳狀本傳張衡善機巧尤致思於天文隂陽歴算後本傳張衡天文之妙冠絶一代所著靈憲渾儀畧具辰曜之本天文志李郃善河圖風星之學本傳郎顗父宗善風角星算能望氣占候吉凶顗少傳父業晝研精義夜占星度本𫝊裴楷善天文隂陽之術本傳髙允博通經史天文術數詔允集天文災異允依洪範𫝊天文志撮其事要畧其文辭凡為八篇北史本傳崔浩善占天文常置銅鋌於酢器中夜有所見即以鋌畫紙作字以記其異本傳唐興太史李淳風浮圖一行尤稱精博唐天文志李淳風明步天歴算於占候吉凶若節契唐天文志詩人所謂婚禮土功必候天星春秋書日食星變𫝊載諸國所占次舍伏見逆順周禮測景求中分星辨國妖祥察候至漢以後星經厯法皆出於數術之學同上本朝南鄭有李郃得妙甘公書夜坐指流星驚倒兩使車東坡候氣經眡祲掌十煇之法以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰敘九曰隮十曰想注云祲隂陽氣相侵也象者如赤鳥也䥴謂日旁氣四面反向如煇狀也監雲氣臨日也闇日月食也瞢日月瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者升氣也想者輝光也鄭𤣥謂䥴者日旁氣刺日也監冠弭也彌氣貫日也隮虹也想雜氣有似可形想也周禮僖五年日南至公登觀臺以望而書左傳昭二十年日南至梓慎望氛同上史金寳上皆有氣海旁蜃氣象樓臺廣埜氣成宫闕然雲氣各象其山川人民所聚積前天文志秦始皇曰東南有天子氣於是東游以厭之漢書范増勸項羽擊沛公曰臣使人望其氣皆為龍成五采此天子氣也同上望氣者蘇伯阿至南陽望見舂陵郭曰氣佳哉鬱鬱葱葱後漢光武記瑞氣一曰慶雲若煙非煙若雲非雲郁郁芬芬蕭索輪菌亦曰景雲此喜氣也太平之應二曰歸邪如星非星如雲非雲或曰星有兩赤上向有蓋下連見必有歸國者三曰昌光赤如龍状聖人起帝授終則見妖氣一曰虹蜺日旁氣也二曰䍧雲如狗赤色長尾晉天文志天子氣内赤外黄或如城門隠隠在氣霧中或如華蓋在氣霧中或如龍馬或雜色鬱鬱衡天者此皆帝王氣也猛将之氣如龍如猛獸或如火煙之状或曰如粉沸或如火光之状或如山林竹木或上黒下赤状如黒旌或如張弩或如塵埃此皆猛将之氣也凡軍勝之氣如堤如坂前後磨地或如火光或如山堤山上若林木将士驍勇或如人持斧向敵或如蛇舉首向敵或氣如覆舟雲如牽牛或有雲如鬬雞赤白相隨在氣中或發黄氣皆将士精勇凡負氣如馬肝色或如死灰色或類偃蓋或類偃魚或黒氣如壊山墮車上名曰營頭之氣或如羣羊羣猪在氣中此衰氣也或如懸依如人相隨或紛紛如轉蓬或如揚灰或雲如卷席如匹布亂穰者皆為敗證氣如擊手如人卧如雙蛇如飛鳥如决堤垣如壊屋如驚鹿相逐如兩雞相向此皆為敗軍之氣也凡堅城之上或青雲黄雲臨城皆有大喜慶同上凡候氣之法初出時若雲非雲若霧非霧髣髴若可見初出森森然在桑榆上髙五六尺者是千五百里外平視則千里舉目望則五百里仰瞻中天即百里内平望桑榆間二千里登髙而望下属治者三千里敵在東日出候之在南日中候之在西日}
