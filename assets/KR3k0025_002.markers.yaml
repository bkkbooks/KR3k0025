  - {type: variant, offset: 160, length: 0, content: '', WYG: 大司徒掾詔部送徒詣河内時冬寒徒病不能行路過𢎞農輒移屬縣使作徒衣縣不得已與之上書言状意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠}
