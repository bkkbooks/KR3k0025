  - {type: variant, offset: 1257, length: 2, content: 阮咸, WYG: 𫝊記帝與娥皇汎於海上以桂枝為表結芳茅為旍刻玉為鳩置於表端今之相風此遺像也拾遺記長安宫南靈臺上有相風烏或云此烏遇千里風乃動述征記候風之羽楚人曰五兩北堂書抄宫中置長竿挂五色旌綴以金鈴占風候謂之相風旌宫中懸碎玉片於簷間風摇為環佩聲謂之占風鐸開元天寳遺事集駟馬駕相風古樂府蔟蔟淮隂市竹樓縁岸上好日起檣竿烏飛驚五兩劉禹錫今日轉船頭金烏指西北煙波與春草千里同一色同上儀象經在璿璣玉衡以齊七政}
