  - {type: variant, offset: 74, length: 0, content: '', WYG: 霹怪松必若有蘇天下志何如驚起武侯龍韓偓陌上冬乾泣老農天留甘雨付春工阿香急試雷霆手莫放人間有起龍朱喬年本朝誰將神斧破頑隂地裂山開鬼失林我願君王法天造早施雄斷答羣心晦庵已外浮雲更外身區區雷電若為神山頭只作嬰兒㸔無限人間失箸人東坡電子電激氣也以為鞭策淮南子隂氣伏重泉之下上通於天隂陽分争故為電荘子良将如收電可見不可追抱朴子豐隆軒其震霆列缺􅁮其照夜注豐隆雷公列缺電也張平子史王戎視日不眩目爛爛若巖中電晉史傳記春秋公羊傳云有聲曰雷無聲曰電電殄也乍見則殄滅也釋文霹靂列缺吐火施鞭揚雄魯隠公元年大雨震電周之三日夏之正月雷常聞於地中電未可見而大雨震電此陽氣之失其節公羊集電尾燒空黒雲脚飛銀線韓偓驚電夜舒光陸士衡電光時掣紫金蛇東坡餘霞張錦幛輕電閃紅綃劉禹錫恐天時之代序兮耀靈曅而西征楚詞注云靈曅電貌霜經霜隂陽之氣也隂氣勝則凝而為霜禮履霜堅氷至易糾糾葛屨可以履霜詩霜露既降君子履之必有悽愴之心禮霜既降則百工休乃命有司曰寒氣總至民力不堪其皆入室同上子馬蹄可以踐霜雪荘子青女出以降霜註青女霜神也又髙誘云青女乃青腰玉女司霜雪者淮南並註鄒衍事燕惠王盡其忠貞左右譛之王棄衍乃仰哭感天霜降淮南子史漢武帝元光四年隕霜殺草木自是征伐四夷師出三十餘年本紀元帝永光元年三月隕霜殺桑九月二日隕霜殺稼天下大饑是時石顯用事漢史琴操履霜者伯竒之所作也伯竒者尹吉甫之子也甫聴其後妻之言疑其孝子伯竒遂逐之伯竒編水荷而衣之采花而食之清朝履霜而自傷無罪見放逐乃援琴而鼓之琴操傳記王者順天行誅以成肅殺之威若政令苛則夏下霜誅伐不行則冬霜不殺草感精符京房易傳云誅不原情其霜附木不下地不教而誅其霜反在草下易傳集仲秋邊風起孤蓬捲霜垠王僧達曉霜楓葉丹夕曛嵐氣隂謝靈運金祇暮律盡玉女暝氛歸孕冷隨鐘徹飄華逐劒飛蘇味道一夜新霜著瓦輕芭蕉心折敗荷傾耐寒惟有東籬菊金葉初開曉更清白樂天十暑岷山葛三霜楚户砧杜甫原野生暮藹堦墀散夕霏徘徊總嚴氣悵望淪清輝平臺寒月色池水愴風威疑隂同徂夜逓鴈獨歸飛張率雪經雨雪其滂雨雪載塗上天同雲雨雪雰雰雨雪瀌瀌見晛曰消俱詩天地積隂温則為雨寒則為雪禮今我來思雨雪霏霏詩孟春行冬令則水潦為敗雪霜大摯禮子至秋三月青女乃出以降霜雪淮南子藐姑射之山有神人容膚若氷雪荘子齊景公時雨雪三日公被狐白裘見晏子曰不寒晏子曰古之賢君飽而知饑暖而知寒公悟乃脱裘發粟與饑寒者晏子東郭先生衣敝履不完行雪中履有上無下足盡踐地世説天寒既至霜雪既降吾是以知松栢之茂也荘子史唐韋斌每朝㑹不敢離立笑言㑹大雪在廷者皆振裾更立斌不徙足雪甚幾至没靴韋安石傳西王母進上藥有𤣥霜絳雪漢武帝傳漢時長安雪數尺牛馬毛寒縮如蝟西京雜記安居貧大雪丈餘洛陽令過安門徑無行跡謂已死入見安僵卧問奚不出安曰大雪人皆乏食不宜干人令賢之遂舉為孝亷袁安𫝊漢髙帝自将兵擊匈奴冬大寒雨雪士卒墮指者十二三匈奴傳蘇武使虜單于幽武置大窖中絶不與飲食天雨雪武卧囓雪與旃毛並咽之數日不死匈奴以為神西漢本傳郢善歌者始為下里巴人之曲和者數千中為陽阿採菱和者百人既而歌陽春白雪和者數人其曲彌髙其和彌寡宋玉傳記春秋元命苞云隂凝為雪北風雨雪天子逰黄臺之丘駕于苹澤日中大寒北風雨雪有凍人天子作黄竹詩三章穆天子河洛之神名曰宓妃髣髴兮若輕雲之蔽月飄颻兮若流風之迴雪又趙飛燕𫝊飛燕體輕宛轉如流風迴雪曹子建衛君重裘坐見路有負樵而哭者問之對曰雪下衣薄衛君懼見于色曰為君而}
