  - {type: variant, offset: 737, length: 6, content: 泣矣何嗟及矣, WYG: 辭甚美晉史貞元四年詔以九月九日令百寮追賞為樂史宋武帝在彭城九日登項羽戲馬臺至今相承為故事史寧康三年重九日上講孝經謝安侍坐史𫝊記重九日折茱萸以揷首辟除惡氣風土記重九日佩茱萸令人長夀西京雜記重陽尚食糕以棗為之或加以栗都人相遺嵗時雜記重九日採菊花與茯苓松脂久服令人不老太清草木方王勃重九過鍾陵都督大宴滕王閣宿命其壻吳子章作序因出紙筆遍請客至勃不辭少頃成文坐客大駭本傳陶潜九日無酒坐東籬摘菊盈把未幾王𢎞遣白衣送酒便即酣飲本傳袁師徳其父名髙重九日不忍食糕本𫝊潤州鶴林寺有杜鵑花或見女子紅裳艷粧逰花下人謂花神也周寳鎮浙江謂道士殷七七曰鶴林寺花可開到重九乎曰可乃前二日往女子來謂曰今為道者開之至日爛熳詩話明皇重陽日獵沙􅁐射中飛鴈帶箭西南去益州道觀有道士寄寓忽持此箭歸因掛於壁書云十年箭主到此付之後明皇幸蜀至觀乃見箭廣異記集餐秋菊之落英楚詞時維九月序属三秋潦水盡而寒潭清煙光凝而暮山紫王勃九日東籬採菊英白衣遙見眼能明陶令自有盃中物一段風流可得成韓子蒼江涵秋影鴈初飛與客攜壺上翠㣲塵世難逢開口笑菊花須揷滿頭歸杜牧臺上霜威凌草木軍中殺氣傍旌旗為報使君多泛菊更将絃管醉東籬岑參羞将短髪還吹帽笑倩旁人為正冠坐開桑葉酒來把菊花枝天宇清霜浄公堂宿霧披寒花開已盡菊蕋獨盈枝杜甫丹羽下髙閣黄花垂古城許用晦本朝黄花一盃酒白髪幾重陽冦準天邊今日又重陽隴樹紅飛鴈呌霜來日預期扶宿酒未應籬菊減秋香李欽用龍山戲馬賞秋光多少新詩入錦囊張敏之一持旌節出五見菊花開宇文虛中飇館輕霜拂曙袍糗餈花飲鬬分曹劉郎不敢題糕字空負}
