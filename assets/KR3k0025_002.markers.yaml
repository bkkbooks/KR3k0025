  - {type: variant, offset: 2, length: 7, content: 後知經學然後知, WYG: 光明觀乎天文以察時變天道虧盈而益謙天垂象見吉凶易乃命羲和欽若昊天天有顯道厥類惟彰惟天惠民惟辟奉天書天監在下有命既集天難諶斯不易惟王敬之敬之天惟顯思詩天不愛道氣如白虹天也禮子天之道其猶張弓乎髙者抑之下者舉之有餘者損之}
