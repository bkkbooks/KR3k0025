  - {type: variant, offset: 1017, length: 0, content: '', krp: 凶聖人象之仰則觀象於天並易厯象日月星辰書馮相氏掌十有二嵗十有二月十有二辰二十有八星之位辨其叙事以㑹天位保章氏掌天星以志星辰日月之變動周禮孟春命太史司天日月星辰之行天子有日官諸侯有日御並記子以天占天揚子或問星有甘石如何曰在徳不在星同上史顓帝乃命南正重司天以屬神火正黎司地以屬民歴書堯復遂重黎之後立羲和之官明時正度同上昔之𫝊天數者髙辛之前重黎於唐虞羲和有夏昆吾殷商巫咸周室史佚萇𢎞於宋子韋鄭則禆竈在齊甘公楚唐昧趙尹臯魏石申夫天官書臯唐甘石其占驗凌雜米鹽同上東方朔願陳泰階六符以觀天變前本傳劉向夜觀星宿或達旦不寐謂天}
