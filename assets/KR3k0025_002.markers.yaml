  - {type: variant, offset: 146, length: 1, content: 知, WYG: 由五月臨平山下路藕花無數滿汀洲參寥河漢㣲明星乍稀碧蓮香濕襲人衣夜凉如水琉璃滑自起開牕放月歸方巨山夏夜秋經説言乎兊兊正秋也萬物之所説也易分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋書秋日凄凄百卉俱腓詩孟秋之月日在翼律中夷則仲秋之月日在角律中南吕季秋之月日在房律中無射其日庚辛其帝少皥其神蓐收其蟲毛其音商其數九其味辛其臭腥其祀門祭先肝天子迎秋於西郊賞軍師武人入朝乃命将帥選士厲兵簡練俊傑専任有功以征不義以明好惡順彼逺方禮子斗柄西指而天下皆秋鶡冠子秋者隂氣始下故萬物生西成立穀謂之大秋秋三月以庚辛之日發五政一曰禁博塞二曰無見五兵之刄三曰慎旅農趍聚收四曰補缺塞圻修垣牆謹門閭五曰敬時五穀之皆入也管子叢蘭欲茂秋風敗}
