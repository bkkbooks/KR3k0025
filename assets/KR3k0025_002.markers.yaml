  - {type: variant, offset: 1004, length: 3, content: 兔跡貪, WYG: 乎唐史臘日賜北門學士口脂盛以碧縷牙筒同上傳記陳脩家貧為吏恒食乾糒每至臘僵仆不起同僚飲食請不肯往其志操如此㑹稽典録韓卓陳留人臘日奴竊食祭其先人卓義其心即日免之後漢傳記隂子方臘日晨炊而竈君形見子方再拜受慶家有黄羊因以祀之自是暴至巨富故後世嘗以臘日祀竈捜神記鄭𤣥年十二隨母還家正臘宴㑹同列十餘人皆盛飾閒適𤣥獨漠然曰此非我志本傳東京十二月初八日作浴佛㑹並送七寳五味粥謂之臘八粥雜記集解水迎流結凝溜垂簾霣人欣八蜡暢誰知嵗聿盡張望凝寒迫清祀有酒宴嘉平宿心何所道藉此慰中情魏收嚴冬慘切寒氣凛冽不用東風𤣥冥掌雪李白本朝嘉平之節祭本伊耆索饗有戴紀之祀問賀有徐氏之儀鳴楚鼓以逐疫出土牛而應時景興慕子魚之徳魯公旌母師之禮吳淑賦嵗除經嵗聿云莫日月其除詩日窮于次月窮于紀星回于天嵗且更始禮子驅疫癘之鬼謂之逐除吕子蜀風俗晩嵗相餽謂之餽嵗酒食相邀謂别嵗除夕達旦不眠謂之守嵗蘇子史貞觀初天下乂安時属除夜太宗盛飾宫掖明設燈燭大奏樂歌乃延蕭后觀之后曰隋主淫侈每除夜殿}
