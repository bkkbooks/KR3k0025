  - {type: variant, offset: 169, length: 1, content: 因, krp: 屠蘇千門萬户曈曈日總把新桃換舊符王介甫立春經先立春三日太史謁之天子曰某日立春盛徳在木天子乃親帥三公九卿諸侯大夫以迎春於東郊月令史取宜陽金門竹為管河内葭草為灰以候陽氣玉泉記以葭莩灰實律之端氣至則灰飛續漢唐景龍四年正月八日立春上令侍臣迎春内出綵花樹人賜一枝令學士賦詩景龍記唐制立春賜三省官綵勝各有差文昌雜録傳記立春之日士夫之家剪綵為小幡謂之春幡或懸于家人之頭或綴於花枝之下又剪為春蝶春錢春勝以為戲立春前五日並造土牛耕夫犂具於大門之外是日黎明有司為壇以祭先農官吏各具綵仗環撃牛者三所以示勸耕之意慶華録立春前一日開封府進春牛入禁中鞭春開封祥符兩縣置春牛於府前至日絶早府僚打春府前百姓皆賣小春牛同上集春日春盤細生菜忽憶兩京梅發時盤出髙門行白玉菜傳纎手送青絲杜北陸凝隂盡千門淑氣新年年金殿裏寳字貼宜春嵗時記春衣不用蕙蘭薰領縁無煩刺綉紋曽在蠶宮親織就方知縷縷盡辛勤春詞聖主終朝親萬幾燕居専}
  - {type: variant, offset: 171, length: 0, content: '', WYG: 養希夷千門永晝春岑寂不用車前挿竹枝温公録朝來煮菜往鞭牛已覺江邊雪意休習習東風收雨脚暄暄曉日綻雲頭尊前未放梅花老鬢上先㸔栁帶柔及取春花時一醉莫教沈瘦更清秋侯彭老煙添栁色㸔猶淺鳥踏梅花落已頻李相公本朝太平興國二年冬縣司以春牛呈知府就大門外安排薦以香燈酒果其芒兒塐之頗精同判王洗馬晦伯慮有損闕移寘㕔上知府程給事之謂同判曰某雖不才忝為刺史且芒兒者耕墾之人不應上㕔将來恐村夫輩或有不揆耳至甲午果有順賊之變成都記仙家日月本}
