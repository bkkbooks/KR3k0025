  - {type: variant, offset: 660, length: 0, content: '', WYG: 俗曰媵獸同上𫝊記秋為隂中萬物以成律歴志立秋之日涼風至後五日白露降後五日寒蜩鳴凉風不至國無嚴政白露不降民多欬病寒蜩不鳴人臣力争周書時訓立秋祀黄帝樂奏黄鍾歌西顥舞雲翹禮儀志京師立秋男女皆翦楸葉戴之賣者盈市夢華記集秋風兮蕭蕭舒芳兮振條嫋嫋兮秋風洞庭兮木葉下皇天平分四時兮切獨悲此凜秋白露既下降百草兮淹離被此梧楸楚詞泬㵳兮天髙而氣清寂寥兮潦收而水清宋玉始驚三伏盡又遇立秋時露綵朝還冷雲峰晩更竒隴香禾半熟原迥草㣲衰幸好清光裒安仁謾起悲僧齊巳律變新秋至蕭條自此初花酣蓮報謝葉在栁成疎淡日非雲映清風似雨餘卷帷凉暗度迎扇暑先除草盡多翻燕波澄下露魚今朝散騎省作賦興何如司空曙秋色入林紅黯淡日光穿竹翠玲瓏蘇子美扇生猶泛暑片氣忽生秋王元之本朝郊園暑退秋光滿㸃滴髙梧似漏長歐陽公風定小軒無落葉秋蟲相對吐青絲秦}
