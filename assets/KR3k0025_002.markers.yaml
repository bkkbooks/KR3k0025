  - {type: variant, offset: 2094, length: 0, content: '', krp: 閎鮮于妄人耿夀昌等造圓儀以考厯度後至和帝時賈逵又加黄道至順帝時張衡又制渾象具内外規南北極黄赤道列二十四氣二十八宿中外星宫及日月五緯以漏水轉之星中出没與天相應又轉瑞輪蓂莢於階下隨月盈虛依厯開落其後陸績亦造渾象至吳時王蕃傳劉洪範象厯依其法而制渾儀並通鑑張衡造候風地動儀以精銅鑄之圓徑八尺蓋合隆起形如酒罇中有都柱傍施闗發機外八龍首各銜銅丸下有蟾蜍張口承之其牙機巧製皆隠在罇中如有地震則罇動機發龍吐丸而蟾蜍銜之一龍發機而七首不動尋知方面乃知震動之所在曽一龍發機而不動咸怪其無證數日驛至果地動隴西於是皆服其神妙本傳古言天者三家一曰蓋天二曰宣夜三曰渾天蔡邕言宣夜之學絶無師法周髀術數具存考驗天文多所違失惟渾天近得其情今候臺所用銅儀則其法也七八尺圓體而具天地之形以正黄道以行日月以步五緯精㣲深妙百代不易之道也蔡邕所謂周髀者即蓋天之説也宣夜之書惟漢郄萌記先師相傳云晉天文志宋髙祖克長安得古銅渾儀詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應通鑑運轉者為璣持平者為衡隋天文志璇璣中而星未中為急急則日過其度月不及其宿璇璣未中而星中為舒舒則日不及其度月過其宿璇璣中而星中為調調則風雨時吳時葛衡明逹天官改作渾天使地居於天中以機動之天動而地止上應晷度則樂之所放術也並同上貞觀七年李淳風造候儀成其制以銅為之表裏三重下據凖基狀如十字末樹鼈足以張四表焉第一名曰六合儀第二名三辰儀第三名四遊儀舊唐書𤣥宗詔一行與梁令瓉等更鑄渾天銅儀圓天之象具列宿赤道及周天度數注水激輪令其自轉一晝夜而天運周銅鐵漸澁藏集賢院天文志張說鑄銅為儀圓以象天上具列宿赤道周天度數注水激輪令其自運一日一夜天轉一周又别立一周輅絡在天外綴以日月令得運行每轉一匝日行一度月行十三度十九分度之七凡二十九轉有餘而日月㑹三百六十五轉而行匝仍置木櫃以為地平令儀半在地上半在地下又立二木人每刻擊鼓每刻擊鐘機械皆藏櫃中通鑑𫝊記據璇璣以觀天運則天地之動未足怪也王弼畧例昔記天體者有三渾儀}
  - {type: variant, offset: 2095, length: 0, content: '', WYG: 知其始書以齊七政蓋渾體也二曰宣夜夏殷之法也三曰周髀周人志周人所𫝊也近世復有四術一曰方天興於王充二曰昕天起於姚信三曰穹天開於虞昺皆臆斷浮説不足觀也唯渾天之事證驗不疑領道養渾天記璣衡即今渾儀古者以玉為之風土記集爰造兹器考正星度魏鐵儀銘堯配璇璣玉衡以齊七政舜繼以成六徳郭得禹穴頌隋遷寳鼎唐在璣衡一行起義堂頌将步天路用定靈軌張衡賦部之以三門張之以八紀驗之以衡軸考之以樞機楊炯渾天賦三十五宫以羣生之係命一十二次當下土之封畿同上本朝思訓所作渾儀起為樓閣之状數層髙丈餘以木偶人為七直神摇鈴撞鐘擊鼓及十二神自持時牌循環而出并著日月星象皆須仰視其機轉之用俱隠樓中觀其制畧頗有開元遺象張思訓自叙見㑹要盖天之學唯唐一行知其與渾天不異盖天之法如繪象止得其半渾天之法如塑像方得其全堯之厯象日星盖天法也舜之璿璣玉衡渾天法也渾法宻於盖天創意者尚畧述作者愈詳也宣夜人雖非之竊謂作者不為無見但論述者失其本㫖爾張氏説前代之論天體者曰如彈丸曰如雞子曰如倚盖曰如蟻磨要之皆不外夫渾天之制夫渾天者狀如彈丸是也所謂如雞子者謂天包地外如雞子之白地居天内如雞子之黄此盖論天包乎地内外周宻之意耳言不盡意故以雞子為喻特取其内外之相包未甞言天之體形如雞子之長也如倚盖者謂天之中央在人之北形如倚盖然此乃論北極所在為天之中云耳言不盡意故以倚盖為喻特取夫列宿之拱極如盖之張列於旁而凑其中耳未甞言天如盖之形北狹而南廣有北而無南也如蟻磨者謂天道西行而最速七政東行而最遲天運如磨七政如蟻七政東行以其行遲故天帶之而西没此論七政與天相運之意耳言不盡意故喻以蟻還磨焉蓋取其運行遲速之相若固未嘗言天體如磨之平旋自東而南自西而北也渾天之制状如彈丸以言其内外之􅊶則兼取乎雞子以言其天中所在則兼取乎倚蓋以言其七政與天相運而遲速則兼取乎蟻磨可謂詳且備矣渾天辨疑刻漏經挈壺氏不能掌其職焉詩序挈壺氏凡軍事縣壺以序聚􅈀以水火守之分以日夜及冬則以火爨鼎水而沸之而沃之周禮史立晷儀辨刻漏前天文志張衡漏水轉渾天儀制曰以銅為器再疊差置實以清水下各開孔以玉虬吐漏水入兩壺右為夜左為晝後本傳孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉天文志太史霍融上言官刻漏率九日増減一刻不與天相應或時差至二刻半不如夏厯密乃詔用夏厯漏刻隨日南北為長短律厯志光武詔曰漏水以節時分定昏明同上宋何承天改刻漏用二十五箭南史隋文帝每雞人伺漏𫝊籖於殿中者令投籖於階石上鎗然有聲云吾雖得眠亦令驚覺同上隋耿詢作馬上刻漏世稱其妙本𫝊刻漏者測天地正儀象之本也隋天文志漢武帝考定星厯刻漏以追天度隋煬帝造馬上刻漏以從行辨時刻揆日晷耿詢作古敧器以漏水注之宇文愷作候影分箭上水方器置於東都乾陽殿前鼓下司辰並同上拂菻國樓中懸一大金秤以金丸十二枚属於衡端以候日之十二時焉為一金人立於側每至一時其金丸輙落鏗然發聲引唱以紀日時毫釐無失唐書徳宗延英召對雖大臣率漏下二三刻止韋渠牟每奏事輙五六刻乃罷本傳憲宗延英議論漏下率五六刻方退舊史傳記漏以銅盛水刻節晝夜百刻説文刻漏之作肇於軒轅宣於夏商之代刻漏經殷䕫刻漏為器三重圓皆徑尺差立於方輿踟蹰之上為金龍口吐水轉注入踟蹰經緯之中盖上鑄金人為司辰具衣冠以兩手執箭殷䕫刻漏法以銅為渇鳥以引器中水以銀龍口中吐之李蘭刻漏法以玉壺玉管流珠馬上奔馳行漏同上掌漏官曰壺郎類説孝武置刻漏史晉起居注越僧僧徹得蓮花漏於廬山𫝊江西觀察使韋丹初恵逺以山中}
