  - {type: variant, offset: 397, length: 251, content: 而後難耳韓文荅李翱書經事漸知非柳詩不讀關睢篇安知后妃德劉義文入耳淡無味愜心潛有情白侍郎始知為客苦不及在家貧憂方知酒聖貧始覺錢神不窮眡世界焉識宇宙廣當時父母念今日爾應知並同上世情閑盡見藥性病多諳獲寶於已喪得途於既迷與夫平居不為艱故所激者其味異矣劉賓客不涉太行險誰知斯路難歐陽堅石臨終詩長因送人處憶得別家時唐人詩見冷齋夜話本朝人之未知學者自視以為無缺及既知學反思前日所為則駭然矣老泉嘗鼎一臠旨可知也臨川集多事始知田舍好凶年偏覺野蔬香東坡詩吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人, WYG: 象}
