  - {type: variant, offset: 2919, length: 346, content: 公同飯矣珣瑜喟然曰吾可復居此乎歸家疾卒唐書鄭珣瑜傳本朝顯禹雲山之罪雖應夷滅光之忠勳不可不祀司馬光編經昔魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也記魯子問子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也記中庸管仲鏤簋而朱紘旅樹而反坫山節藻梲賢大夫也而難為上晏平仲祀其先人豚肩不揜豆一狐裘三十年賢大夫也而難為下記雜記子以為無益而舍之者不耘苗者也助之長者揠苗者也孟公孫丑過則失中不及則不至楊問道昔徐偃王軟而國滅齊簡公懦而身亡此性太柔之失也晉陽處父以純剛取害鄭子陽以嚴猛致斃此性太剛之過也列史矯枉過其正西漢諸侯王表集純柔純弱兮必削必薄純剛純強兮必喪必亡柳佩韋本朝為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人東坡論西羌夏人事宜劄子, WYG: ''}
