  - {type: variant, offset: 1009, length: 1, content: 梟, WYG: 疫後漢書李畋隣人為山魈所祟畋謂隣人曰汝于除夕庭中爆竹隣人然其言妖遂止異聞録賈島嘗以嵗除取一年所得詩稿祭以酒酺曰勞吾精神以是補之嵗節記漢武巡狩河間得美女兩手皆拳即鈎弋夫人也後人于除嵗為藏鈎之戲始此風土記集故鄉今夜思千里霜鬢明朝又一年髙適嵗隂窮暮紀獻節啟新芳冬盡今宵促年開明日長雪消出鏡水梅散入風香對此懽終宴傾壺待曙光暮景斜芳殿年華麗綺宮寒辭去冬雪暖帶入春風階馥舒梅素盤花卷燭紅共觀新故嵗迎送一宵中唐太宗四時運灰管一夕變冬春送寒餘雪盡迎嵗早梅新同上嵗序已云殫春}
