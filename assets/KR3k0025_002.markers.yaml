  - {type: variant, offset: 1354, length: 188, content: 監庫門其人終日危坐吏卒無敢妄出入者通監唐德宗集直木不可以為輪曲木不可以為桶文選夫大木為杗細木為桷欂櫨侏儒椳闑居楔各得其宜以成室屋者匠氏之工也玉札丹砂赤箭青芝牛溲馬敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也韓文進學解互入兼收並蓄大匠無棄才尋尺各有施況當營都邑杞梓用不疑韓文量力而任之度才而處之其所不能不彊使為是故為下者不獲罪, WYG: 動}
