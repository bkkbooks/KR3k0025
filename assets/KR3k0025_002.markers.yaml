  - {type: variant, offset: 140, length: 2, content: 久久, WYG: 吾朝受命而夕飲氷荘子覩瓶中之氷知天下之寒淮南子史永徽二年十一月隂霧凝凍封樹木數日不解劉向以為木少陽此人将有害則隂氣脅木先寒故得雨而氷亦謂之樹介本紀光武南馳聞王郎兵在後至滹沱河候吏還曰河水流澌無船不可濟令王霸往視之霸還詭曰氷堅可渡官屬喜比至河河氷亦合乃令霸䕶渡未畢數騎而氷解光武曰王霸權以濟事殆天瑞也後王霸傳晉慕容晃上書言躬征郭逺假陛下之精神威靈乃結氷凌行海中三百餘里晉史初齊文宣時周人常懼齊兵之西渡恒以冬月守河椎氷及武成即位朝政漸紊齊人椎氷懼周師之逼北史或勸進士張彖謁楊國忠曰見之富貴可立圖彖曰君輩倚楊右相如泰山吾以為氷山耳若皎日既出君輩得無失所恃乎遂隠居嵩山本傳晉王祥性至孝繼母朱氏嘗欲生魚時天寒氷凍祥釋衣将剖氷求之氷忽自解雙鯉躍出本傳傳記積氷曰凌氷壮曰凍氷流曰凘氷解曰泮風俗通逸人王休居太白山每冬取溪氷琢其精瑩者煑建茗供賓客六帖集碎如墜瓊方截璐粉壁生寒象筵布玉壺紈扇亦玲瓏坐有麗人色俱素韋應物清如玉壺氷鮑明逺簷動玉壺氷杜甫開氷動玉壺同上雪後排簷挺銀竹山谷敢望君恩玉井氷杜渴飲月窟氷饑餐天上雪李白擔囊行採薪斧氷持作糜魏武帝飛雪斷道氷成梁同上霞集青霞起而照天楊炯望海樓明照曉霞䕶江隄白踏平沙白樂天晨霞朝可餐杜桐林帶晨霞謝靈運朝霞迎白日選仰首漱朝霞曹植青軒秘晩霞李白晩霞飛處散朱暉李嶠海風吹斷暮天霞唐人晩望樓角紅綃一縷霞古詩餘霞散成綺謝眺餘霞明逺川韋應物殘霞照髙閣同上落霞沈緑綺杜甫丹霞夾明月選赤霞動金光李白雲霞冠秋嶺謝混萬里洞中朝玉帝九光霞内宿仙壇真誥水光浮日出霞彩映江飛張均煙集凉煙兮冒江鮑昭賦煙光凝而暮山紫滕王閣記村煙對浦沙汀煙輕冉冉水煙通逕草並杜夜長簷溜寒無寝日晏厨煙濕未炊竇牟春風掩映千門柳曉色凄凉萬井煙李郢梨花千樹雪楊葉萬條煙李白本朝午鷄聲不到蟬林栢子煙中静擁衾王安石霧經仲冬行夏令則氛霧㝠𡨕月令子積水上溢則為霧荘隂陽之氣亂則為霧曽雲霧四起則時多隠士京房易占與善人逰如行霧中雖不濡濕潜自有潤抱朴子飛龍乗雲騰蛇逰霧韓史武帝葬武陵芳香之氣異常積于墳埏之間如大霧漢武故事髙祖困于平城之圍大霧三日漢書河南張楷字公超性好道術能作五里霧學其術者填塞如市故云霧市時闗西人裴優亦能作三里霧自以為不如往從學之楷避不見漢史王肅張衡馬均俱冒重霧行一人無恙一人病一人死問其故無恙者曰我飲酒病者飽食死者空腹博物志𫝊記黄帝與蚩尤戰于涿鹿九戰不勝黄帝歸于太山三日三夜大霧𡨕𡨕有一婦人人首鳥形黄帝稽首再拜伏不敢起婦人曰吾所謂𤣥女者子欲何問黄帝曰小子欲萬戰萬勝萬隠萬匿首當何從起𤣥女戰法陶答子仕陶三年名譽不興家産三倍其妻諫曰夫子能薄而官大無功而家昌是嬰害積殃也妾聞南山有𤣥豹霧雨七日不下食欲以澤其衣毛成其文章故藏以避害今君有此寧不無後患乎列女傳韓佽在桂州妖賊封盈能為數里霧尅期将攻桂州有紫氣者我必勝至日果紫氣如疋帛自山亘于州城白氣直衝之紫氣遂散天忽大霧至午稍開霽樹滴下同人如沐酉陽雜俎集七條開早陌五里闇朝氛帶樓凝海氣含蓋似浮雲王褒秋晨海霧重職事凌晨出浩浩含元天溶溶洒明日纔㸔含鬢白稍見沾衣密導騎全不分郊樹都如失霏㣲誤噓吸膚腠生寒栗當歸飲一盃庶用蠲此疾韋應物氤氲起洞壑遥裔匝平疇乍似含龍劍還疑映蜃樓拂林隨雨密度迥帶煙浮方謝公超步終從彦輔逰蘇味道三晨生逺霧五里暗城闉從風疑細雨映日似逰塵乍若飛煙散時如佳氣新不妨鳴樹鳥能蔽摘花人梁元帝曹公迷夢澤漢帝出平城涿野妖氛静丹山霽色明類煙飛稍重方雨散還輕倘入非熊繇寧思𤣥豹情李嶠虹經螮蝀在東莫之敢指詩子天二氣則成虹淮南子史漢靈帝時有黒氣墮北宫温明殿東庭中黒如車蓋騰起奮迅長十餘丈其貌似龍上問蔡邕對曰此天投蜺也漢五行志荆軻欲往刺秦王精誠感天白虹貫日鄒陽齊威公時虹貫牛山管仲諫無近妃宮雞跖集傳記黄帝占軍决曰攻城有虹從外南方入飲城中者從虹攻之勝白虹遶城不匝從虹所在乃撃之世傳虹能入溪澗飲水信然嘗見夕虹下澗中飲者兩頭皆垂澗中使人過澗隔虹對立相去數丈之間如隔綃縠自西望東則見立澗之東向西則為日光所爍筆談晉陵薛願義熙初有虹飲其釜澳噏響便竭願輦酒灌之隨投隨咽便吐金滿器于是灾弊日祛而豐富數臻異苑孔子作春秋孝經告備于天赤虹自上而下化為黄玉捜神記集江虹明逺飲峽雨帶餘飛杜甫安得五彩虹架天作長橋李白紆餘帶星渚窈窕架天潯空因壮士見還共美人沈逸勢含良玉神光藻瑞金獨留長劍彩終負昔賢心蘓味道天河經倬彼雲漢維天有漢監亦有光俱詩子河漢沍而不能寒荘天河從北極分為兩頭至于南極隨天而轉入地下過抱朴子傳記天漢起東方經尾箕之間謂之漢津乃分為二道至天津下而合西南行至七星南而没天文志星者元氣之英水之精也氣發而升精華上浮宛轉隨流名曰天河一曰雲漢衆星出焉楊泉物理論舊説天河與海通有居海上者每年八月有浮槎來賫一年糧乗之奄至一處望見婦人織一丈夫牽牛渚次飲之此人即問何處答曰君可詣蜀問嚴君平此人還問君平君平曰某年月有客星犯斗牛即此人到天河也張華博物志有人尋河源見婦人浣紗問之曰此天河也乃與一石而歸問嚴君平君平曰此織女支機石也集林集八月凉風天氣晶萬里無雲河漢明昏見南樓清且淺曉落西山縱復横洛陽城闕天中起長河夜夜千門裏複道連甍共敝虧畫堂瓊户特相宜雲母帳前初泛濫水晶簾外轉逶迤倬彼昭回如練白復出東城接西陌南北征人去不歸誰家今夜搗寒衣鴛鴦機上疎螢度烏鵲橋邊一鴈飛鴈飛螢度愁難歇坐見明河漸㣲没已能舒卷任浮雲不惜光輝讓明月明河可望不可親安得乗槎一問津更将織女支機石還訪成都賣卜人宋之問常時任顯晦秋至最分明縱被㣲雲掩終能永夜清含星動雙闕伴月落邊城牛女年年渡何曽風浪生杜昭昭清漢暉燦燦光天步陸士衡安得壮士挽天河浄洗甲兵長不用杜雲漢西流夜未央牽牛織女遥相望魏文帝河漢清且淺相去復幾許盈盈一水間脈脈不得語選詩初旭紅可染明河澹如掃杜牧之嵗時部春經萬物出乎震易分命羲仲宅𤾉谷平秩東作日中星鳥以殷仲春每嵗孟春遒人以木鐸徇於路並書經春日遲遲采蘩祁祁春日載陽有鳴倉庚詩孟春之月日在營室律中大簇仲春之月日在奎律中夾鍾季春之月日在胃律中姑洗其日甲乙其帝太皥其神勾芒其蟲鱗其音角其數八其味酸其臭羶其祀户祭先脾天子迎春於東郊布徳和令行慶施惠下及兆民禮記春王正月春秋子衆人熙熙如享太牢如登春臺老子斗柄東指而天下皆春鶡冠子春為忠萬物咸遂忠之至也尸子孟春之月君子聴朝論爵賞管子二月之夕女夷鼓歌以司天和孟春之月天子服八風水注取露銅盤中淮南子以鳥鳴春韓子古之為政者非春無以布徳和令行慶施惠養幼小省囹圄賜貧窮禮賢者栁子史煬帝西􅁐宮秋冬木凋令剪綵為花葉綴條上景若陽春隋史宋璟人謂其為有脚陽春言所至之處如陽春及物也開元遺事方春時和草木羣生皆有以自樂而吾百姓莫之省憂其議所以賑貸之漢史元魏黎季明曰招摇東指天下識其春北史方春生養萬物莩甲宜助萌陽以育時物漢章帝紀明皇嘗遇二月坐小殿栁杏将吐嘆曰對此景物豈可不與判斷之呼髙力士取羯鼔縱擊一曲名春光好回顧栁杏皆發笑曰不喚我作天公可乎唐史正月者嵗之始王者則天之象因時之序宜開發徳號爵賢命士流寛大之澤垂仁厚之恩漢書傳記方春東作布徳之元陽氣開發養導萬物郎顗傳春退貪殘進柔良卹幼孤賑不足求隠士則萬物應節而生京房傳嫁娶以春和也天地交通萬物始生白虎通氣在春佩蒼璧尚書考開嵗發春百卉含英漢書春曰芳春青春陽春三春九春景曰媚景和景韶景時曰良時嘉時芳時辰曰良辰嘉辰芳辰節曰華節芳節良節嘉節韶節淑節纂要仲春月令時和氣清王睢鼓翼倉庚和鳴交頸頡頏闗闗嚶嚶張衡傳天受二年臘将逰上􅁐遣詔曰明朝逰上􅁐火急報春知花須連夜發莫待曉風吹凌晨名花布􅁐卓異闕記秋風起愁盡人間白髪人録歌踏春曲集聞道春還未相識走傍寒梅探消息昨夜東風入武陽陌頭楊栁黄金色李白紅入桃花嫩青歸栁葉新望鄉應未已四海尚風塵杜侵凌雪色還萱草漏泄春光有栁條杜春每歸兮花開花已闌兮春改嘆長河之流春送馳波於東海春不留兮時已失老衰颯而情逾極恨不得掛長繩於青天繫西飛之白日李白習習兮春風岸栁動兮渚花落春冉冉其将晝予何為而不樂白居易晝静疎簾燕語頻雙雙鬭雀動堦塵柴扉日暮隨風揜落盡閒花不見人元稹草樹知春不及歸百般紅紫鬬芳菲楊花榆筴無才思惟解漫天作雪飛退之獨倚闌干玩野塘俄驚節物老春光緑楊隂密鶯将懶紅杏枝空蝶不忙詩思謾沿芳草逺茶甌㣲帶落花香僧惠洪寒隨窮律變春逐鳥聲開初風飄帶栁曉雪間花梅碧林青舊竹緑沼翠新苔芝田初鴈去綺樹未鶯來唐太宗春風本自竒楊栁最相宜栁條恒著地楊花好上吹梁簡文帝風色翻露文雪花上空碧花蝶來未已山光曖将夕上官儀沐乗閑豫清晨步北林池楊師道日影飛花殿風文積草池鳳樓通夜敞虬輦望春移元萬頃花輕蝶亂仙人杏葉密鶯喧帝女桑飛雲閣上春應至明月樓中夜未央同上本朝春雲漠漠雪欲落東風和冷驚羅幕漸看逺水緑生漪未放小桃紅入蕚東坡新年變物華春意已堪嘉霽色初含栁餘寒尚勒花風絲飛蕩漾林鳥弄交加歐陽修輕花細葉滿林端昨夜春風晩色寒黄鳥不堪愁裏聴緑楊宜向雨中㸔宋齊夏經日月運行一寒一暑易申命羲叔宅南交平秩南訛敬致日永星火以正仲夏書四月維夏六月徂暑夏之日詩孟夏之月日在畢律中中吕仲夏之月日在東井律中㽔賓季夏之月日在栁律中林鍾其日丙丁其帝炎帝其神祝融其蟲羽其音徵其數七其味苦其臭焦其祀竈祭先肺天子迎夏於南郊以賞封諸侯慶賜遂行無不欣説禮子斗柄南指而天下皆夏鶡冠子立夏之日服𤣥氷丸或飛雪散及六壬六癸符則不熱抱朴子大旱金石流土山焦荘子九暑至時雨乃降五穀百果乃登管子陽常居大夏以生育長養為事董子夏政不失則時雨降文中子炎風之野赤帝祝融之所司淮南子史浮甘瓜于清泉沈朱李于寒水魏史元載有紫龍髯拂水晶為柄拂之清泠有聲夜則蚊蚋不敢近唐史李徳裕為相方盛暑宴賓以金盤貯水浸白龍皮置坐凄然都無暑氣唐史太宗欲幸九成宫馬周上疏謂上皇留熱處温凊之義臣所未安太宗善其言唐史髙宗夏宴以葡萄賜宰相學士從行給翔鱗馬帝賦詩學士属和唐史傳記龍見而雩左傳作迎風觀寒露臺以避暑闗中記陶潜夏月髙卧北忩清風颯至自謂羲皇上人本傳吳猛性至孝兒時父母邊卧夏多蚊蚋集身受之不敺恐蚊蚋去及父母也搜神記何子平事父孝年六十有孺子之慕夏避清凉孝子傳漢長安巧工丁緩作七輪扇連續七輪大皆徑丈一人運之滿堂寒西京雜記唐文宗與柳公權聨句文宗曰人皆苦炎熱我愛夏日長權曰薰風自南來殿閣生㣲凉本傳集清江一曲抱村流長夏江村事事幽唐詩炎威不到軒忩外冷氣常存枕簟中王觀竹深留客處荷淨納凉時杜我有江隂竹能令朱夏寒杜甫緑樹隂濃夏日長樓臺倒影入池塘水晶簾動㣲風起滿架薔薇一院香髙駢生物趍功日夜流園林纔夏麥先秋緑隂黄鳥北忩簟付與來禽安石榴山谷竹粉千腰白桃皮半纈紅太白荷翻紫蓋搖波面蒲蓄青刀挿水湄施肩吾和風穆而扇物麥含露而飛芒傅𤣥上無纎雲下無㣲風晉夏侯湛積歊蒸於簾櫳流煩溽於園籞陽風淟其長扇火雲赫而四舉隋盧思道節序遇徂炎兹宵在三伏憑軒佇凉氣中筵倦煩燠寂寞對空牕清疎}
