  - {type: variant, offset: 2093, length: 0, content: '', WYG: 者曰璇璣所加某星始見某星已中某星今没皆如合符也崔子玉為其碑銘曰數術窮天地制作侔造化髙才偉藝與神合契春秋文曜鈎云唐堯即位羲和立渾儀此則儀象之設其來逺矣暨漢太初洛}
  - {type: variant, offset: 2093, length: 0, content: '', krp: 者曰璇璣所加某星始見某星已中某星今没皆如合符也崔子玉為其碑銘曰數術窮天地制作侔造化髙才偉藝與神合契春秋文曜鈎云唐堯即位羲和立渾儀此則儀象之設其來逺矣暨漢太初洛}
  - {type: variant, offset: 2094, length: 0, content: '', WYG: 閎鮮于妄人耿夀昌等造圓儀以考厯度後至和帝時賈逵又加黄道至順帝時張衡又制渾象具内外規南北極黄赤道列二十四氣二十八宿中外星宫及日月五緯以漏水轉之星中出没與天相應又轉瑞輪蓂莢於階下隨月盈虛依厯開落其後陸績亦造渾象至吳時王蕃傳劉洪範象厯依其法而制渾儀並通鑑張衡造候風地動儀以精銅鑄之圓徑八尺蓋合隆起形如酒罇中有都柱傍施闗發機外八龍首各銜銅丸下有蟾蜍張口承之其牙機巧製皆隠在罇中如有地震則罇動機發龍吐丸而蟾蜍銜之一龍發機而七首不動尋知方面乃知震動之所在曽一龍發機而不動咸怪其無證數日驛至果地動隴西於是皆服其神妙本傳古言天者三家一曰蓋天二曰宣夜三曰渾天蔡邕言宣夜之學絶無師法周髀術數具存考驗天文多所違失惟渾天近得其情今候臺所用銅儀則其法也七八尺圓體而具天地之形以正黄道以行日月以步五緯精㣲深妙百代不易之道也蔡邕所謂周髀者即蓋天之説也宣夜之書惟漢郄萌記先師相傳云晉天文志宋髙祖克長安得古銅渾儀詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應通鑑運轉者為璣持平者為衡隋天文志璇璣中而星未中為急急則日過其度月不及其宿璇璣未中而星中為舒舒則日不及其度月過其宿璇璣中而星中為調調則風雨時吳時葛衡明逹天官改作渾天使地居於天中以機動之天動而地止上應晷度則樂之所放術也並同上貞觀七年李淳風造候儀成其制以銅為之表裏三重下據凖基狀如十字末樹鼈足以張四表焉第一名曰六合儀第二名三辰儀第三名四遊儀舊唐書𤣥宗詔一行與梁令瓉等更鑄渾天銅儀圓天之象具列宿赤道及周天度數注水激輪令其自轉一晝夜而天運周銅鐵漸澁藏集賢院天文志張說鑄銅為儀圓以象天上具列宿赤道周天度數注水激輪令其自運一日一夜天轉一周又别立一周輅絡在天外綴以日月令得運行每轉一匝日行一度月行十三度十九分度之七凡二十九轉有餘而日月㑹三百六十五轉而行匝仍置木櫃以為地平令儀半在地上半在地下又立二木人每刻擊鼓每刻擊鐘機械皆藏櫃中通鑑𫝊記據璇璣以觀天運則天地之動未足怪也王弼畧例昔記天體者有三渾儀}
