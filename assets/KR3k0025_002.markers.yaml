  - {type: variant, offset: 151, length: 3, content: 齊高彊, WYG: 堯為天子嘗秋日夢白帝遺以烏啄子其母曰扶桑升髙丘白帝上有雲如虎感已乃生臯陶史秋風和則商聲調序移玉律氣應金商唐史朱异除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆梁史孫寳為京兆尹秋日署侯文為東部督郵勅曰今鷹隼始擊當從王氣取姦惡以成嚴霜之誅史袁宏孤貧運租自業謝尚時鎮牛渚秋夜乗月泛江㑹宏在舫中諷詠遣問得其詠史之作尚邀至舟與談至旦不寝自此名譽日盛晉史李陵云窮秋九月塞外草衰胡笳互動牧馬悲鳴吟嘯成羣邊聲四起漢史徳宗秋日出畋有寒色顧謂左右曰九月猶衫十月而袍不為順時朕欲改月謂何左右稱善李程獨曰𤣥宗著月令十月始裘不可改帝矍然止唐史李適云凡天子饗㑹逰豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱夀唐史傳記駟見而隕霜火見而秋風戒寒國語少昊乗兊執矩司夀天文志日行白道曰西陸謂之秋律歴志秋者西方金行之氣西羌傳周秦秋日遣輶軒採異俗方言藏之秘府本紀平固縣覆笥山上有湖中有石鴈每至秋飛鳴如候時南康記仲秋甲戍天子東逰次雀梁蠧書羽陵穆天子傳賈佩蘭宫中八月四日出雕房北户竹林下圍棊勝者終年有福西京雜記漢武嘗以秋日泛靈鶂舟於淋池以香金為鈎縮紐絲為綸丹鯉為餌釣得白蛟付大官為鮓肉紫骨青香美無倫拾遺記唐宫人麗娟善歌嘗唱迴風曲庭葉翻落如秋洞𡨕記張季鷹在洛見秋風起因思蓴菜羮鱸魚鱠曰人生貴適志耳本傳明皇製秋風髙曲每奏之則清風徐來樹葉交墜史唐宫中每至秋時妃妾以金籠閉蟋蟀置枕函畔夜聴其聲庶民之家皆效之也史秋}
