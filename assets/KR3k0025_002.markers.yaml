  - {type: variant, offset: 226, length: 0, content: '', WYG: 能歸同上月色燈光滿帝都香車寳輦隘通衢身閒不覩中興盛羞逐鄉人賽紫姑李義山本朝雪消華月滿仙臺萬燭當樓寳扇開雙鳳雲中扶輦下六鼇海上駕山來鎬京春酒霑周宴汾水秋風陋漢才一曲升平人盡樂君王又進紫霞盃髙列千峯寳炬森端門方喜翠華臨宸逰不為三元夜樂事還同萬衆心天上清光留此夕人間和氣閣春隂要知盡慶華封祝四十餘年惠愛深蔡君謨薄雪初銷野未耕賣薪買酒㸔升平吾君勤儉倡優拙自是豐年歌笑聲東坡天醉笙歌外風香羅綺餘曼卿雲歸萬年樹月滿九重城楊徽之中和節史唐徳宗欲以二月名節李泌請以二月朔為中和節遂詔備三令節時數唐書傳記民間以青囊成百穀瓜果種相遺號為獻生子里閭釀酒謂宜春酒鄴侯家傳集殿前來日中和節連夜瓊林散舞衣傳服所司分蠟燭監開金鎖放人歸王建社日史里中社陳平為宰分肉甚均父老曰善陳孺子之為宰乎曰嗟乎使平得宰天下亦}
