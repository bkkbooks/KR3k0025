  - {type: variant, offset: 186, length: 0, content: '', WYG: 數衣羅綺曳錦繡耀珠翠施香粉妙簡長安萬年少女婦千餘人衣服花釵婢子亦稱是於燈輪下踏歌三日歡樂之極未始有之唐書開元十八年正月朢日帝謂葉天師曰四方之盛此夕何處極麗對曰天下無踰於廣陵帝曰何術以觀之師曰可俄而虹橋起於殿前師奏橋成但無回顧於是帝步而上太真及髙力士黄幡綽樂官數人從行俄頃已到廣陵寺觀陳設之盛燈火之光照灼其殿士女華麗皆仰望曰仙人現於五色雲中帝大悦師曰請勅伶官奏霓裳羽衣一曲後數日廣陵果奏幽怪録開元初正月朢夜𤣥宗移仗上陽宫以觀燈焉結搆綵樓三十餘間}
