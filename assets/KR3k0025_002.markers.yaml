  - {type: variant, offset: 164, length: 0, content: '', krp: 國卒至丞相吾决囚六十年矣雖不及于公其庶幾乎子孫何憂不為九卿耶故字詡曰升卿詡仕至尚書令漢史傳記冬中也物方藏于中也陽盛則吁舒萬物而養之外隂盛則呼吸萬物而藏之内故曰呼吸者隂陽之交接萬物之始終尚書大傳東方朔年}
  - {type: variant, offset: 166, length: 0, content: '', WYG: 學讀書三冬文史足用本傳寳雲溪有僧舍盛冬若客至不燃薪火燒香一炷滿室如春人歸更收餘燼異景志京師十月朔沃酒炙臠肉于爐中圍坐飲啗謂之煖爐嵗時記漢代十月十五日以豚酒入靈女之廟撃筑奏上弦曲連臂踏地歌赤鳳來巫俗也捜神記董遇好學人從學者遇云當先讀書百遍而義自見學者云苦難無日遇曰當以三餘冬者嵗之餘雨者晴之餘夜者日之餘劉殷曾祖母王氏盛冬思堇殷時九嵗乃往澤中慟哭忽若有人云止聲殷即收淚視地有堇因得斛餘歸何鳳為建安太守物不敢忤伏臘每放囚還家依期而返本傳唐髙祖冬幸新豐歴白鹿觀上驪山賜浴湯池給香粉澤帝賦詩學士皆屬和李適傳邴原就師學三冬講孝經論語魏志齊孝子王虛之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹奈一冬三實時人咸以為孝感所致本傳集嘉南洲之炎徳兮麗桂樹之冬榮乗鄂渚而反顧兮欵秋冬之緒風楚詞冽冽冬日肅肅祁寒潜鱗在川歸鴈在軒王中初四氣迴周節慶代停萬國同休庶尹羣和奉爵升朝我有嘉禮式宴百寮晉張華綿邈冬霄永凜厲寒氣升離葉向晨落長風振條興夜静輕響起天清月暉澄寒氷盈渠結素霜竟欄凝晉曹毗冬深栁條落雪後桂枝殘星明霧色盡天白鴈行單雲飛乍想閣氷結逺疑紈晩橘隠重屏枯藤帶迥竿岳隂連氷氣山峯添月寒梁簡文帝洞庭門未掩金壺漏已催曛煙生澗曲暗色起林隈雪花無有蔕氷鏡不安臺同上月影含氷凍風聲凄夜寒江海波濤壮崤嶂坂險難同上景移風度改日至晷迴換眇眇負霜鶴皎皎帶雲雁長河結琅玕層氷如玉岸鮑昭早景煙霜面初寒鳥雀愁詩成遣誰和還是寄蘇州白樂天節序部元旦經元者善之長也先王體元以居正易旭日始旦詩天子乃以元日祈穀于上帝命樂正習舞禮履端于始舉正于中春秋傳子邯鄲民正月旦獻鳩于趙簡子簡子賞之客問故簡子曰正旦放生示有恩也客曰民知君欲放之故競捕之傷者衆矣君欲生之不若禁民勿捕捕而放之恩過不相補列子春月飲酒茹葱以通五臟荘子史元日立仗百官皆備宰相方至列燭五六百炬謂之火城宰相至衆皆避之國史吳隠之為牧守冬月無被乃披絮國史魏武帝用漢儀元日百官上夀設白獸尊於殿庭能獻直言者則發此尊飲酒案禮白獸尊乃北齊之遺失也上施白獸蓋後代所為示忌憚也典畧傳記王羲之月儀書曰日往月來元正首祚太簇告辰㣲陽始布罄無不宜和神養素正月一日天中節㑹之辰獻夀之日並出道書昔有人居草庵之中每嵗除夕遺里閭藥一貼令囊浸井中至元日取水置于酒樽名曰屠蘇酒合家飲之不瘟疫嵗華紀履端元日正始之初士于是日設禮樂榮耳目之觀臧榮漢髙長樂宫成制羣臣朝賀儀武帝改夏正元日慶賀始此通典玉燭寳典曰正月為端月尚書大傳云夏以平明為朔殷以雞鳴為朔周以夜半為朔白虎通曰正朔有三何本天有三統謂之三㣲月也三㣲者何謂也陽氣始施黄泉萬物始動㣲而未著集初嵗元祚吉日惟良乃為嘉㑹宴此髙堂衣裳鮮潔黼黻𤣥黄珍膳雜遝充溢圓方俯視文軒仰瞻華梁願保兹善千載為常歡笑盡娛樂哉未央皇室榮貴夀考無疆曹植朱庭容衛肅青天春氣明朝光動劒彩長階分珮聲隋煬帝和風起天露嚴氣銷氷井索索枝木柔厭厭漏猶永陳叔連履端初啓節長􅁐命髙筵肆夏喧金奏重潤響朱絃春光催栁色日彩照槐煙㣲臣同濫吹謬得仰鈞天虞世南旋穹周迴三朔肇建青陽散輝澄景載渙淑哉虛花爰採爰獻聖容映之永夀於萬劉臻妻獻椒花正朝辟惡酒新}
