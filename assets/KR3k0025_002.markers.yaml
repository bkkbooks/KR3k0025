  - {type: variant, offset: 284, length: 1, content: 若, WYG: 天子大社以五色土為壇封諸侯者取方面土苴以白茅授之各以其方色以立社於其國故謂之授茅土漢舊儀集社實隂祇稷惟穀先伯德方将時號共工厥有才子實曰勾龍陶唐救災决河疏江棄亦播殖作乂萬邦克配二祀以報勲庸向承天社頌鵞湖山下稻梁肥㹠穽雞棲對掩扉桑柘影斜春社散家家扶得醉人歸張蠙村居田家遭社日邀我嘗春酒杜甫幾㸃社翁雨一畨花信風陸龜䝉社雨報年豐杜初語燕雛知社日習飛鷹隼識秋風杜寒食傳記冬至後一百五日有疾風甚雨謂之寒食介子推三月五日為火所焚國人哀之每嵗春暮為}
