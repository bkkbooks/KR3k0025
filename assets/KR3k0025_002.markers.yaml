  - {type: variant, offset: 76, length: 0, content: '', WYG: 民孰以君我乃捐金出粟以賑貧窮公孫子謝安冬日集兒女講論文義俄而雪驟公曰白雪紛紛何所似兄子朗兒曰撒鹽空中差可擬兄女道藴曰未若柳絮因風起世説集盈尺則呈瑞于豐年踰丈則表沴于隂徳謝惠連細玉羅紋下碧霄杜門顔巷落偏饒巢居只恐髙柯折旅客愁聞去路遥撅凍野蔬和粉重掃庭松葉帶酥燒寒忩呵筆尋詩句一片飛來紙上銷古詩有田皆種玉無樹不開花班扇難裁素曹衣詎比麻鵞歸逸少宅鶴滿令威家寂寞門扉掩依稀履跡斜人疑迷麪市馬似困鹽車李義山重重玉宇三千界一一瓊干十二樓晏元憲斷蓬飄葉卷黄沙只有千林䰒鬆花應為王孫朝上國珠幢玉節與排衙東坡巧剪銀花亂輕飛玉葉狂辛寅遜本朝宋大明中元日雪花降右将軍謝荘下殿雪集衣白上以為瑞賦詩宋書太祖一日大雪夜叩趙普門普出帝立風雪中曰已約晉王矣已而太宗至共于普堂中設重裀地坐熾炭燒肉普妻行酒帝以嫂呼之普從容問曰夜久寒甚陛下何以出帝曰吾睡不著一榻之外皆他人家也故來見卿普曰南征北伐今其時矣遂定下江南䇿邵氏聞見録㳺楊初見伊川伊川瞑目而坐二子侍立既覺顧謂曰賢輩尚在此乎日既晩且休矣及出門門外之雪深一尺語録凍合玉樓寒起粟光摇銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟氷柱憶劉义東坡露經孟秋之月凉風至白露降禮蒹葭蒼蒼白露為霜湛湛露斯匪陽不晞厭浥行露厭浥濕也英英白雲露彼菅茅俱詩子}
