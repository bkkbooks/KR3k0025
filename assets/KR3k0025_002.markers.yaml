  - {type: variant, offset: 159, length: 0, content: '', WYG: 秋早鶯疎覺夏闌怡神紫氣外凝睇白雲端同上本朝清溪流過碧山頭空水澄鮮一色秋隔斷紅塵三十里白雲紅葉兩悠悠程伯簿秋詩輕風捲纎雲碧漢磨青銅坐久襟袖凉皎月升天東雷希顔秋夜至若金氣方勁清風戒寒嚴霜舉侯文之職飛蟬集朱异之冠露始滋於園菊風已敗於叢蘭吳淑秋賦冬經勞乎坎坎者水也正北方之卦也萬物之所歸也易申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬書冬日烈烈飄風發發詩孟冬之月日在尾律中應鍾仲冬之月日在斗律中黄鍾季冬之月日在婺律中大呂其日壬癸其帝顓頊其神𤣥𡨕其蟲介其音羽其數六其味鹹其臭朽其祀行祭先腎天子迎冬於北郊固封疆備邊境完要塞謹闗梁塞徯徑禮辛亥朔日南至公視朔遂登觀臺以望春秋子隂常居大冬董子斗柄北指而天下皆冬鶡冠子燭龍在鴈門北藏于委羽之山不見日其神人面龍身而無足淮南子以冬至之日始數四十九冬盡春始教民鑚燧墐竈所以夀人也管子景公時雨雪三日公衣狐白之裘謂晏子曰天下不寒何也晏子曰賢君飽知人饑温知人寒公曰善遂出衣發粟以與饑貧者晏子君子齋戒處心掩身身欲寧去聲色禁嗜欲安形性静以待隂陽之定荘子楚荘王對雪披裘當户曰我猶寒彼百姓賓客甚矣乃使巡國中求無居宿絶糧者賑之國人大悦尸子史漢髙祖既定天下叔孫通定朝儀于是羣臣朝十月于長樂宫中尊卑次序諸侯王以下莫不震恐帝曰吾今知皇帝之貴也漢史鍾離意辟}
