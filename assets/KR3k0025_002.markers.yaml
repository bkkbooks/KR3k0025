  - {type: variant, offset: 156, length: 2, content: 折肱, WYG: 秋九秋首秋上秋肇秋蘭秋暮秋末秋秒秋景曰朗景澄景清景時曰凄辰霜辰節曰素節商節梁元纂妥蒲栁之質望秋先零顧顗之𫝊壮士悲秋感隂氣也韓詩外傳𢎞農鄧紹八月朝入華山見一童子以五色綵囊盛取栢葉下露云赤松先生取以明目今八月朝作眼明囊象此也續齊諧記集雲髙氣静露凝衣野草變色莖葉稀鳴蜩抱木鴈南飛曹植集曉煙茅舍月初日棗林霜歐陽公觀四時之代序對三秋之爽節雲既浄而天髙潦将收而水潔凝珠露之凄冷鏡青山之滉澈鷰運幕而巢空鴈篤羣而行絶虞世南賦爽氣澄蘭沼秋風動桂林露凝千片玉菊散一叢金日岫髙低影雲空㸃綴隂蓬瀛不可望泉石且娛心菊散金風起荷疎玉露圓将秋數行鴈離夏幾林蟬雲凝愁半嶺露碎纈髙天還似成都望直見蛾眉前秋光凝翠嶺凉吹肅離宫荷疎圓蓋缺樹冷半帷空側陣移鴻影圓花釘菊叢攄懐俗塵外髙眺白雲中煙生遥岸隠月落半崖隂連山驚鳥亂隔岫斷猿吟山亭秋已滿巖牖凉風度疎蘭尚染煙殘菊猶承露古石衣新苔新巢封古樹歴覽情無極只尺輪光暮並唐太宗肅肅簟上寒凄凄帳裏清物色延暮思霜露遍朝榮宋鮑昭露濃山氣冷風急蟬聲哀鳥撃初移樹魚寒欲隠苔斷霧時通日殘雲尚作雷隋煬帝濕庭凝墜露摶風卷落槐日氣斜還冷雲峰晩更霾隋庾信玉樹凉風舉金塘細草萎葉落商飈觀鴻歸明月池迎寒桂酒熟含霧菊花垂袁朗應詔凄風移漢筑流水入虞琴雲飛送斷鴈月上浄疎林上官儀林樹千霜積山宫四序寒蟬急}
