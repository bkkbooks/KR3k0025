  - {type: variant, offset: 658, length: 1, content: 料, WYG: 司者萬二千里秋為矩矩者所以矩萬物也義者成成者方故為矩也孟秋始朔仲秋始内一葉落天下知秋俱淮南子壮士悲秋感隂氣也韓子史夏盡炎氣㣲火息凉風至宋史立秋之日夜漏未盡五刻迎氣于西郊漢史漢家授御史多于立秋蓋以風霜始嚴鷹隼初撃也同上立秋日祭獸王者以此日獵獸祭宗廟冀州北八月朔作飲食為媵}
