  - {type: variant, offset: 56, length: 0, content: '', krp: 可辨及明春状元乃王拱夀御筆改為王拱辰括異志傳記天員如倚蓋地方如棊局天旁轉半在地上半在地下日月本東行天西旋入於海牽之以西如蟻行磨上磨左旋蟻右行磨疾蟻遲不得不西天文志天形如鷄子天大地小表裏有水地乗氣而立載水而浮天運如車轂之運渾天儀哀公曰敢問何貴乎天道也子思曰貴其不已如日月東西相從而不已是天道也不閉其久是天道也無為而成是天道也已成而明是天道也哀公問天聰明也聖人得之天垂象也聖人則之不言而信不怒而威驗之衡軸考之樞軸六帖春為蒼天夏為昊天秋為旻天冬為上天東曰昊天東南曰陽天南曰炎天西南曰朱天西曰成天西北曰幽天北曰𤣥天東北曰變天中央曰鈞天九天之際曰九垠九天之外次曰九陔天去地二億一萬六千七百八十一里半度地之厚與天髙等天南北相去二億三萬三千五十七里二十五步東西短減四步廣雅集玉璫緘劄何由達萬里雲羅一鴈飛李義山𤣥象成文列宿有章三辰燭曜五緯重光衆星遷而環極招摇運而指方白虎時據於參昴青龍垂尾於心房𤣥龜匿首於女虛朱鳥奮翼於軫張垣屏絡繹而珠連三台差池而雁行軒轅華布而曲列攝提鼎峙而相望晉成公賦天行一何健日月無髙踪百川皆赴海三辰回泰蒙傅𤣥祭地肆瘞郊天致煙氣升太一精淪九泉至敬不文明徳惟鮮郭璞混成發粹大道含元興於物祖首自肧渾分泰階而立極光曜魄以司尊懸兩明而必照列五緯而無言驅馭隂陽裁成風雨叶乾位而凝化建坤儀而作輔劉允濟賦本朝容成造厯大撓創辰龍集有次星紀乃分宋何承天天讃日經日月之道貞明者也日月麗乎天易寅賓出日協時月正日書日之方中日出有曜詩冕而朝日東門之外禮馮相氏冬夏致日周禮日南則景短多暑日北則景長多寒周禮子宋有田夫曝日謂妻曰負日之暄人莫知之以獻吾君列子王者敬日荀子白駒過隙荘子日出于暘谷浴于咸池拂于扶桑是謂晨明淮南子日出地上明照四海文中子史晉帝命王導共坐導辭曰若太陽下同萬物蒼生何由仰照晉史晉明帝幼而聰哲元帝寵愛之年數嵗嘗置膝前屬長安使來帝因問之曰日與長安孰近對曰長安近不聞人從日邊來居然可知也明日宴羣臣又問之對曰日近上失色曰何乃異間者之言乎對曰舉目則見日未聞舉目而見長安也帝竒之日者人君之象故有是對本紀漢明帝為太子樂人作歌四章以賛太子之徳一曰日宣重光本紀唐李程為翰林院學士程性懶日過八磚乃至號八磚學士本傳傳記扶桑在碧海中樹長數千丈一千餘圍兩幹同根更相依倚是以名扶桑十洲記有客登岱岳絶頂行四十里以伺日出久之星斗漸稀東望如平地天際已明其下則暗又久之明處有山數峯如卧牛車蓋之状星斗盡不見其下尚暗初意日自明處出又久之自大暗中日輪湧出正紅色騰起數十丈至明處全無光其下亦尚暗邵氏聞見録方諸山真人皆呼日為圓羅耀外國人呼日為濯羅耀真誥桃都山有大樹有天鷄日出即鳴天下鷄皆鳴淵中記集羲和冬馭近愁畏日車翻杜詩火輪飛出客心驚韓愈夜半起下視溟波銜日輪金雅既騰翥六合俄清新同上吚喔天鷄鳴扶桑色昕昕赤波千萬里湧出黄金輪劉禹錫金烏海底初飛來韓愈杲杲冬日出照我屋南隅負暄閉目坐和風生肌膚初似飲醇醪又如執屠蘇外融百骸暢中適一念無曠然忘所在心與空虛俱白居易月經坎為月易月以為量禮月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也大數取法於月禮卿士惟月月之從星則以風雨書月離于畢俾滂沱矣詩子月者太隂之精淮南子月精生水故月盛而潮大抱朴子方諸見月則津而為水方諸隂燧大蛤也向月則水生淮南子月中有物者山河影也其空處海影同上史月者象隂之長妃后大臣象漢書月立夏夏至行南方赤道曰南陸立秋秋分行西方白道曰西陸立冬冬至行北方黒道曰北陸分則同道至則相過同上天文志云月有九行如日有九道也晉書漢武帝起俯月臺下穿池登臺眺月影入池中使宫人乗舟弄月因名影娥池洞𡨕記唐明皇八月望日逰月宮見天府牓曰廣寒清虛之府少前見素娥十餘人皆乘白鸞舞於桂下龍城錄冬至後月養魄於廣寒宮十洲記傳記楊炯渾天儀賦云月也者羣隂之紀上天之使異姓之王后妃之事日猶火月猶水火則施光水則含影月光生於日所照魄生於日所蔽當日則光盈近日則明盡周髀政太平則月圓而多輝政昇平則月清而明禮斗月羣隂之本望則蚌蛤實羣隂盈晦則蚌蛤虛羣隂揫呂氏炎洲仙山有逺飛鷄朝往夕還銜月中桂實歸於南土故北方無桂南方當月路江東諸處每于路衢得洞𡨕記集初無征鴈已無蟬百尺樓南水接天青女素娥俱耐冷月中霜裏鬬嬋娟李商隠斜漢左界北陸南躔白露暎空素月流天謝荘月賦澄江涵皓月水影若浮天風來如可泛流急不成圓元帝昨三五兮既滿今二八兮将缺浮雲褰兮收泛濫明舒照兮殊皎潔謝靈運舟子夜離家開船望月華山明疑有雪岸白不闗沙天漢㸔珠蚌星橋視桂花灰飛重暈缺蓂落獨輪斜庾信露濯清輝苦風飄素影寒杜審言本朝山下白雲横匹素水中明月卧浮圖東坡玉斧修成寳月團月邊仍有女乗鸞青𡨕風露非人世鬢亂釵横特地寒王荆公星經庶民惟星書月離于畢俾滂沱矣東有啓明西有長庚詩晥彼牽牛不以服箱定之方中作于楚宮詩子鯨魚死而彗星出淮南子政失於春嵗星盈縮政失於夏熒惑逆行政失於秋太白出入無常政失於冬辰星不効其鄉文子四守主賞罰淮南子騎箕尾比於列宿莊子史五星者天之五佐為經緯見伏有時所過贏縮有度史記魁斗下三星兩兩相比者名曰三能也色齊則君臣和史記北斗天之喉舌尚書陛下喉舌也斟酌元氣運平四時李固仲尼曰吾聞堯率舜逰首山}
  - {type: variant, offset: 57, length: 2, content: 巨海, WYG: 河渚有五老飛為流星上入昴家語齊有彗星公欲禳之國語嚴陵少與光武為友帝登極物色陵至京師夜與共卧陵以足加帝腹太史奏客星犯帝座甚急帝曰朕與故人子陵共卧耳周伯老子王蓬絮國皇温星皆客星也漢書傳記文耀麗乎天其動者有七日者陽精之宗月者隂精之宗五星五行之精天文志天根見而水涸國語蒼龍連蜷於左白虎猛據於右朱雀奮翼於前靈龜圏脊於後黄龍軒轅於中則軒轅一星與蒼龍白虎朱雀𤣥武四獸為五矣張衡軒轅為權太㣲為衡孟康𤣥枵齊之分星紀吳越之分析木之津燕之分大火宋之分夀星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分實沈魏之分大梁趙之分降婁魯之分訾娵衛之分漢志雷電在室南霹􅆮在雷電南雲雨在霹靂南土工吏在壁西南蓋雷公電姥雲将雨師與霹靂宿吏皆北方水宿之精而娵訾為人門故其神棲焉甘氏集天上何所有歴歴種白榆古詩瑞動星光照化穆月輪重庶徵膺祉籙将以賛時雍邢子才團團素月浄翛翛夕景清谷泉驚暗石風松動夜聲被衣出荆户躡履步山楹欣覩明堂亮喜見太階平觜參猶可識牛女尚分明更移斗柄轉夜久天河横徘徊不能寐參差幾種情煬帝陽精去南陸大曜始西流夕風凄謝暑夜氣應清秋重門月已映嚴城漏漸修臨風出累樹度月蔽層樓靈河隔神女仙轡動星牛玉衡指棟落瑤光對幌留徒知仰閶闔乗槎未有由蕭琮旦秋炎景暮初弦月彩新清風滌暑氣文露浄囂塵蕩霧銷輕縠鮮雲卷夕鱗休光灼前曜瑞彩接重輪縁情摛聖藻並作命徐陳宿草誠渝濫吹噓偶縉紳天文豈易述徒知仰北辰虞世南歴歴東井舎昭昭右掖垣雲際龍文出池中鳥色翻流暉下月露墜影入河源方知潁川集别有太丘門董思恭北極傳記大中之道在天為北辰在地為人君馬融傳北極第一星主月太子也第二星主日帝王也第三星主五星庶子也天文志北極四星曰四輔所以輔佐北極而出度授政也天文志集北極轉文昌袁慶和五星傳記五星同色天下偃兵百姓寧昌春風秋雨冬寒夏暑史書五星色白圜為喪旱赤圜為兵青圜為憂水黒圜為疾多死黄圜則吉赤角犯我城黄角地之爭白角哭泣之聲青角兵憂黒角則水史書嵗星主角亢氐房心尾箕熒惑主井鬼栁星張翼軫鎮星主東井太白主奎婁胃昴畢觜參辰星主斗牛女虛危室壁天文志史漢元年冬十月五星聚東井髙祖紀天寳九載五星聚於尾箕占曰有徳則慶無徳則殃天文志四星聚者有四漢平帝元始四年四星聚柳張後有王莽赤眉之亂而光武復興晉懐永嘉六年四星聚牛女後有劉聰石勒之亂而元帝復興漢獻初平元年四星聚心又聚箕尾後有董卓暴亂黄巾黒山熾擾而魏武迎帝都許兖豫遂定建元二十二年四星聚二十五年魏文受禪義熙二年四星各一聚而宋有天下驗異録夀星傳記老人一星名狐南一曰南極常以秋分之日見於丙春分之夕没於丁晉志狼北有大星曰南極老人星每見治安不見兵起常以秋分之時候於南郊天文志王者承天則老人星臨其國孫氏集今宵南極外結托老人星杜風經風從虎易休徵曰聖時風若言君聖則風時也咎徵曰蒙恒風若反是並書經洪範大風有隧詩前有塵埃則載鳴鳶禮記注云鴟鳴則風生風生則塵起君子之徳風小人之徳草草上之風必偃語藏氷以時春無凄風左傳周公居東二年天大雷電以風禾盡偃大木斯拔王啓金滕之書迎周公天乃反風禾盡起書子大塊噫氣其名為風荘子物類之相應𤣥妙深㣲論辨不能解故東風至而酒沈溢注酒沈清酌酒也末物下沈木味酸酸風入酒故酢而沈者沸淮南子鵬摶扶搖而直上九萬里扶搖風也荘子虎嘯而谷風生淮南子大王之雄風庶人之雌風宋玉飄風不終朝老子拔木之風必千里也抱朴子子列子御風而行泠泠然旬有五日而反荘子史舜作五絃之琴以歌南風曰南風之薰兮解吾民之愠兮史楚襄王逰於蘭臺之宫宋玉侍有風颯然而至王披襟而當之曰快哉此風寡人所與庶人共者耶玉對曰此獨大王之風耳庶人安得而共之夫風生於地起於青蘋之末盛怒於土囊之口縁於太山之阿舞於松栢之下徘徊於桂椒之間翺翔於激水之上然後徉徜中庭北上玉堂清清泠泠發明耳目寧體便人此所謂大王之雄風王曰善哉宋玉賦項王圍漢王三匝於是大風從西北來折木發屋揚石楚軍大亂漢王乃得與數十騎遁去漢書孝武坐未央前殿天新雨東方朔屈指獨語上問之對曰殿後栢上有鵲立桂枝上東向而鳴視之果然問朔}
