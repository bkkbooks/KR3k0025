  - {type: variant, offset: 680, length: 0, content: '', WYG: 者為得巧動清商之曲宴樂達旦士民皆效之唐史齊武帝起層城觀七月七日宫人多登之穿針世謂之穿針樓齊史開元中帝與妃子每至七夕夜在華清宫宴時宮女各以蜘蛛内之小金盒中至曉開視蛛絲稀密以為得巧之多少民間效焉七夕婦人結綵樓七孔針陳𤓰果於庭中以乞巧有蟢子網於𤓰上則以為得巧史傳記天河之西有星煌煌與參俱出謂之牽牛天河之東有星㣲㣲在氐之下謂之織女世謂雙星大斗記洛陽人間乞巧造明星酒装同心繒嵗節記七月七日西王母降帝庭東方朔於朱雀忩中窺之母以桃七枚獻帝曰此桃一千年生花一千年結實指方朔云此兒三偷桃矣漢武内傳王子喬見桓良曰告我家七月七日待我於緱氏山頭至時乗白鶴在山頂望之不得即舉手謝時人而去列仙傳陶安公者六安鑄冶師有朱雀止冶上曰安公安公冶與天通七月七日迎汝赤龍後龍至安公騎之上昇列仙傳蔡州蔡氏七夕乞巧忽見流星墜筵中明日𤓰上得金梭自是巧思益進秘閣記景帝夢髙祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝於猗蘭殿漢武帝傳𤣥宗與貴妃避暑驪山宮夜半妃獨侍上上與誓曰願世世為夫婦如牽牛織女也開元遺事郭子儀至銀州夜見天上軿車綉幄中有美女自空而下子儀拜祝云今七月七日必是織女降臨願賜長夀富貴女笑云大富貴亦夀考後如女言本𫝊集雲漢有靈匹彌年闕相從遐川阻昵愛脩渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已雨今聚夕無風傾河易迴幹欵情難久悰沃若靈駕旋寂寥雲幄空留情顧華寝遥心逐奔龍謝惠連白露含明月青雲斷絳河天街七襄轉闕道二神過袨服鏘環佩香筵拂綺羅年年今夜盡機杼别情多杜審言聞道尋源使從天北路回牽牛去幾許宛馬至今來杜甫青鳥西來秋院宇碧雲南度夜樓臺宋之問七月七日長生殿夜半無人私語時樂天此日六軍同駐馬當時七夕笑牽牛李商隠銀燭秋光冷畫屏輕羅小扇撲流螢天階夜色凉如水卧㸔牽牛織女星杜牧本朝若乃雲漢靈匹見於七夕阮巷矜綈錦之衣魏宮愴琉璃之筆或張雲錦之帷或履𤣥瓊之舄道武則參合分祥漢帝則猗蘭告吉層城嬉戲開襟宴適西母則青鳥傍侍竇后則神光照室亦有針穿七孔燈燃九㣲命五龍之駕臨百子之池登舜山而騁望侍𤣥圃以裁詩陶安騎龍而遐騖子喬乗鶴而難追吳淑秋賦中元子日月㑹於鶉尾而斗建申之辰招摇指申淮南子史代宗信浮屠七月望日宫中造盂蘭盆綴飾鏐琲設髙祖以下七聖位幡節衣服皆具自禁内分詣道佛祠兢吹鼓角奔走相属唐史開寳四年七月中元節京城張燈同上𫝊記七月十五日中元之日地官校勾搜選人間分别善惡諸大聖衆普詣宫中簡定傳録作𤣥都大醮珍竒異物幢幡寳蓋精膳飲食獻諸聖衆道士於其日夜講誦是經出道經目連以鉢盛飯往餉其母食未入口化成火炭遂大呌白佛佛言汝母罪重非汝一人所禁何當須十方衆僧威神之力以七月十五日供養十方大徳佛母乃得脱孟蘭經傳集燈前飛入玉階蟲未卧先聞半夜鐘看即中元齋日到白盤金線綉真容王建宫詞本朝壬戌之秋七月既望蘇子與客泛舟遊於赤壁之下清風徐來水波不興誦明月之詩歌窈窕之章}
