  - {type: variant, offset: 164, length: 0, content: '', WYG: 國卒至丞相吾决囚六十年矣雖不及于公其庶幾乎子孫何憂不為九卿耶故字詡曰升卿詡仕至尚書令漢史傳記冬中也物方藏于中也陽盛則吁舒萬物而養之外隂盛則呼吸萬物而藏之内故曰呼吸者隂陽之交接萬物之始終尚書大傳東方朔年}
