  - {type: variant, offset: 57, length: 2, content: 巨海, krp: 河渚有五老飛為流星上入昴家語齊有彗星公欲禳之國語嚴陵少與光武為友帝登極物色陵至京師夜與共卧陵以足加帝腹太史奏客星犯帝座甚急帝曰朕與故人子陵共卧耳周伯老子王蓬絮國皇温星皆客星也漢書傳記文耀麗乎天其動者有七日者陽精之宗月者隂精之宗五星五行之精天文志天根見而水涸國語蒼龍連蜷於左白虎猛據於右朱雀奮翼於前靈龜圏脊於後黄龍軒轅於中則軒轅一星與蒼龍白虎朱雀𤣥武四獸為五矣張衡軒轅為權太㣲為衡孟康𤣥枵齊之分星紀吳越之分析木之津燕之分大火宋之分夀星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分實沈魏之分大梁趙之分降婁魯之分訾娵衛之分漢志雷電在室南霹靂在雷電南雲雨在霹靂南土工吏在壁西南蓋雷公電姥雲将雨師與霹靂宿吏皆北方水宿之精而娵訾為人門故其神棲焉甘氏集天上何所有歴歴種白榆古詩瑞動星光照化穆月輪重庶徵膺祉籙将以賛時雍邢子才團團素月浄翛翛夕景清谷泉驚暗石風松動夜聲被衣出荆户躡履步山楹欣覩明堂亮喜見太階平觜參猶可識牛女尚分明更移斗柄轉夜久天河横徘徊不能寐參差幾種情煬帝陽精去南陸大曜始西流夕風凄謝暑夜氣應清秋重門月已映嚴城漏漸修臨風出累樹度月蔽層樓靈河隔神女仙轡動星牛玉衡指棟落瑤光對幌留徒知仰閶闔乗槎未有由蕭琮旦秋炎景暮初弦月彩新清風滌暑氣文露浄囂塵蕩霧銷輕縠鮮雲卷夕鱗休光灼前曜瑞彩接重輪縁情摛聖藻並作命徐陳宿草誠渝濫吹噓偶縉紳天文豈易述徒知仰北辰虞世南歴歴東井舎昭昭右掖垣雲際龍文出池中鳥色翻流暉下月露墜影入河源方知潁川集别有太丘門董思恭北極傳記大中之道在天為北辰在地為人君馬融傳北極第一星主月太子也第二星主日帝王也第三星主五星庶子也天文志北極四星曰四輔所以輔佐北極而出度授政也天文志集北極轉文昌袁慶和五星傳記五星同色天下偃兵百姓寧昌春風秋雨冬寒夏暑史書五星色白圜為喪旱赤圜為兵青圜為憂水黒圜為疾多死黄圜則吉赤角犯我城黄角地之爭白角哭泣之聲青角兵憂黒角則水史書嵗星主角亢氐房心尾箕熒惑主井鬼栁星張翼軫鎮星主東井太白主奎婁胃昴畢觜參辰星主斗牛女虛危室壁天文志史漢元年冬十月五星聚東井髙祖紀天寳九載五星聚於尾箕占曰有徳則慶無徳則殃天文志四星聚者有四漢平帝元始四年四星聚柳張後有王莽赤眉之亂而光武復興晉懐永嘉六年四星聚牛女後有劉聰石勒之亂而元帝復興漢獻初平元年四星聚心又聚箕尾後有董卓暴亂黄巾黒山熾擾而魏武迎帝都許兖豫遂定建元二十二年四星聚二十五年魏文受禪義熙二年四星各一聚而宋有天下驗異録夀星傳記老人一星名狐南一曰南極常以秋分之日見於丙春分之夕没於丁晉志狼北有大星曰南極老人星每見治安不見兵起常以秋分之時候於南郊天文志王者承天則老人星臨其國孫氏集今宵南極外結托老人星杜風經風從虎易休徵曰聖時風若言君聖則風時也咎徵曰蒙恒風若反是並書經洪範大風有隧詩前有塵埃則載鳴鳶禮記注云鴟鳴則風生風生則塵起君子之徳風小人之徳草草上之風必偃語藏氷以時春無凄風左傳周公居東二年天大雷電以風禾盡偃大木斯拔王啓金滕之書迎周公天乃反風禾盡起書子大塊噫氣其名為風荘子物類之相應𤣥妙深㣲論辨不能解故東風至而酒沈溢注酒沈清酌酒也末物下沈木味酸酸風入酒故酢而沈者沸淮南子鵬摶扶搖而直上九萬里扶搖風也荘子虎嘯而谷風生淮南子大王之雄風庶人之雌風宋玉飄風不終朝老子拔木之風必千里也抱朴子子列子御風而行泠泠然旬有五日而反荘子史舜作五絃之琴以歌南風曰南風之薰兮解吾民之愠兮史楚襄王逰於蘭臺之宫宋玉侍有風颯然而至王披襟而當之曰快哉此風寡人所與庶人共者耶玉對曰此獨大王之風耳庶人安得而共之夫風生於地起於青蘋之末盛怒於土囊之口縁於太山之阿舞於松栢之下徘徊於桂椒之間翺翔於激水之上然後徉徜中庭北上玉堂清清泠泠發明耳目寧體便人此所謂大王之雄風王曰善哉宋玉賦項王圍漢王三匝於是大風從西北來折木發屋揚石楚軍大亂漢王乃得與數十騎遁去漢書孝武坐未央前殿天新雨東方朔屈指獨語上問之對曰殿後栢上有鵲立桂枝上東向而鳴視之果然問朔}
