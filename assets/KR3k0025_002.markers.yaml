  - {type: variant, offset: 682, length: 3, content: 荅王庠, WYG: 野迥雲歸盡山髙日上遲暗螢依露草驚鵲遶風枝素影隨波逺新凉與酒宜郝子玉中秋經天子春朝日秋夕月朝日以朝夕月以夕禮中春晝撃土鼓吹豳雅以逆暑中秋夜迎寒亦如之周禮子天子以八月之望與諸侯並往觀濤於廣陵之曲江枚乗史蘇頲與李乂對掌綸誥八月十五日夜於禁中直宿諸學士翫月備文酒之宴時長天無雲月色如晝蘇曰清光可愛何用燈燭外史何中正登第卜人贈之詩云三字來時月正圓一麾從此出秦闗何後以八月十五日授知制誥言事忤㫖出秦州外史明皇與太真法静八月望日逰月宫少頃見龍樓雉堞金闕玉扉冷氣逼人後西川奏其夕有天樂過史傳記中秋月有光則是嵗珠多傳長慶中八月十五日有人翫月見林中光燭天視之見一金背蝦蟇酉陽雜俎武夷山神號武夷君一日語村人曰汝等以八月十五日㑹山頂是日畢集聞空中人聲不見其形須臾樂響亦但見樂器諸仙傳趙知㣲有道術中秋積隂不解㣲曰可備酒殽登天柱峯翫月既出門天色開霽及登峯月色如晝比下山凄風苦雨隂晦如故三水小牘唐太和中周生善道術中秋客至周曰我能挈月置懐袖中因取繩梯駕之命閉目良久忽天黒仰視無雲俄呼曰至矣手舉其衣出月寸許一室盡明寒入肌骨宣室志𫝊集待月東臨月正圓廣庭無樹草無烟中秋雲静出滄海半夜露寒當碧天輪影漸移金殿外鏡光猶掛玉樓前莫辭達曙殷勤望一墜西岩又隔年許渾桂影中秋特地圓况當餘閏魄澄鮮因懐勝賞初經月免使詩人嘆隔年趙大成滿目飛明鏡歸心折大刀轉蓬行地逺攀桂仰天髙水路凝霜雪林棲見羽毛此時瞻白兔直欲數秋毫杜子美本朝把酒氷壺接勝逰今年喜不負中秋戴復古暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不常好明月明年何處㸔東坡長風迅掃太空雲銀漢無聲斗柄横秋到今朝三五半月于此夜十分明晁無咎玉露金波不可孤相瞻今夕定何如曽吉甫萬頃波光天上下兩山秋色月東南姜彦光一年明月在中秋數日隂雲不奈愁忽喜新晴轉}
