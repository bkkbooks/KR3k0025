  - {type: variant, offset: 991, length: 2, content: 毫末, WYG: 梅梢横月欲昏黄漢宫紅影無人見未必能添一線長方巨山乃若周正在候履長伊始閉蘆灰而潜應黄鍾獲寳鼎而自當天紀吳淑賦臘經二之日栗烈詩天子乃蜡百神于南郊祈年于天宗臘先祖禮史秦惠文公十二年初臘始皇三十一年更名臘曰嘉平史沛國陳咸為廷尉監王莽簒位還家杜門}
