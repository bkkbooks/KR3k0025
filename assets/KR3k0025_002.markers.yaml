  - {type: variant, offset: 1009, length: 1, content: 梟, krp: 疫後漢書李畋隣人為山魈所祟畋謂隣人曰汝于除夕庭中爆竹隣人然其言妖遂止異聞録賈島嘗以嵗除取一年所得詩稿祭以酒酺曰勞吾精神以是補之嵗節記漢武巡狩河間得美女兩手皆拳即鈎弋夫人也後人于除嵗為藏鈎之戲始此風土記集故鄉今夜思千里霜鬢明朝又一年髙適嵗隂窮暮紀獻節啟新芳冬盡今宵促年開明日長雪消出鏡水梅散入風香對此懽終宴傾壺待曙光暮景斜芳殿年華麗綺宮寒辭去冬雪暖帶入春風階馥舒梅素盤花卷燭紅共觀新故嵗迎送一宵中唐太宗四時運灰管一夕變冬春送寒餘雪盡迎嵗早梅新同上嵗序已云殫春}
  - {type: variant, offset: 1012, length: 2, content: 早防, WYG: 自安聊開栢葉酒試薦五辛盤金薄圖神鴈朱泥印鬼丸梅花應可折惜為雪中㸔庾肩吾故年隨夜盡初春逐曉生方驗從軍樂飲至入西京道衡金吾除夜進儺名畫挎朱衣四隊行院院燒燈如白日沈香火裏坐吹笙王建一年将盡夜萬里未歸人叔倫莫辭今夕醉應是隔年期唐詩本朝宦薄惟名在年華與鬢新桃符詩句好恐動徃來人趙仲白海内春還滿江南硯不氷題詩餞殘嵗鐘鼔報晨興北風吹雪四更初嘉瑞天教及嵗除半􅊦屠蘇猶未舉燈前小草寫桃符曽公衮除夕城中爆竹已殘更朔吹飜江意未平比量舊嵗聊堪喜流轉殊方又可驚明日岳陽樓上去島煙湖霧㸔春生陳去非除夕漏箭更籌日夜催萬牛不挽白駒回梅花雪片嵗除盡萱草柳芽春鼎來曽吉甫除夕臘殘畫角東風裏春到梅花小雪邊王徳卿除夜殷勤守此嵗來嵗復何如劉雲卿次東坡守嵗詩測候部測日經羲仲宅嵎夷曰暘谷寅賓出日和仲宅西曰昧谷寅餞納日書揆之以日作于楚室詩度其夕陽同上大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂夏至日景尺有五寸謂之地中周禮典瑞土圭以致四時日月封國則以土地馮相氏冬夏致日土方氏掌土圭之法以致日景玉人土圭尺有五寸以致日以土地匠人建國水地以縣置􅈏以縣眡以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕並周禮史黄帝迎日推策本紀日光道夏至至於東井北近極故晷短立八尺之表而晷影長尺五寸八分冬至至於牽牛逺極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日在婁角去極中而晷中立八尺之表而晷景長七尺三寸六分前天文志天子殿中用玉律十二靈臺用竹律六十候日如其厯後律厯志立表儀以校日景天文志周禮日至之景尺有五寸謂之地中鄭𤣥説土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭𤣥云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里矣日邪射陽城則天徑之半也天體圓如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣故知從日射陽城為天徑之半也以勾股法言之一萬五千里勾也立八極萬里股也從日邪射陽城弦也以勾股求弦法入之得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分此天徑之數也以周率乗之徑率約之得五十一萬三千六百八十七里六十八步一尺八寸二分周天之數也晉天文志袁充奏隋興以後日景漸長曰周官以土圭之法正日影日至之影尺有五寸鄭𤣥曰冬至之影一丈三尺今十六年夏至之影短於舊影五分十七年冬至之影短於舊影三寸七分日去極近則影短而日長去極逺則影長而日短行内道則去極近行外道則去極逺京房别對曰太平日行上道中平行次道霸世行下道伏惟大隋啓運影短日長振古未之有也北史梁武帝天監中祖暅造八尺銅表揆測日景至大同十年大史令虞􅒠又用九尺表格江左之景隋天文志太史監南宮説擇河南平地設水準繩墨植表而以引度之自滑臺始白馬夏至之晷尺五寸七分又南百九十八里餘得浚儀岳臺晷尺五寸三分又南百六十七里得扶溝晷尺四寸四分又南百六十里餘得上蔡武津晷尺三寸六分半大率五百二十六里餘晷差二寸餘而舊説王畿千里影差一寸妄矣原古人所以步圭影之意将以節宣和氣輔相物宜不在於辰次之周徑其所以重厯數之意将欲恭授人時欽若乾象不在於渾蓋之是非若乃述無稽之法於視聴之所不及則君子當闕疑而不議也通鑑傳記冬至之日植八尺之表日中視其晷晷如度者嵗美人和不則嵗惡人惑易通卦驗僧一行造黄道游儀以進御製游儀銘付太史監将向靈臺上用以測候分遣太史官馳驛往安南朗兖等州測候日影同以二分二至之日午時量日影皆數年方定大唐新語集立土圭以步厯}
