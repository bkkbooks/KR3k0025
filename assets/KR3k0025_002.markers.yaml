  - {type: variant, offset: 167, length: 1, content: 互, krp: 長命盃栢葉隨銘至椒花逐頌來庾信聊開栢葉酒試奠五辛盤金薄圖神燕朱泥却鬼丸庾肩吾年光悲擲舊景色喜呈新庾亮欲曙九衢人更多千條香燭照星河今朝始見金吾貴車馬縱横避玉珂釋靈徹天仗宵嚴建羽旄春雲送色曉雞號金鑪香動螭頭暗玉佩聲來雉尾髙戎服上趍承北極儒冠列侍映東曹太平時節身難遇郎署何須歎二毛韓愈鳴佩隨鵷鷺登階見冕旒無能裨聖代何事别滄州間夜貧還醉浮名老漸羞鳯城春欲晚郎吏一同遊盧綸葦桃猶在户椒栢已稱觴嵗每風先應朝回日漸長星河猶在整朝衣逺望天門再拜歸杜牧之本朝堆盤紅縷細茵蔯巧與椒花兩鬬新竹馬異時寧信老土牛明日莫辭春東坡爆竹聲中一嵗除春風送煖}
