  - {type: variant, offset: 655, length: 0, content: '', krp: 梨花白鳥窺魚網青帘認酒家幽棲雖自適交友在京華鄭谷詩清明千萬家處處是年華榆栁芳辰火梧桐今日花祭祠結雲騎逰陌擁春車惆悵田郎去原迴煙樹斜楊巨源上已傳記按周禮女巫掌嵗時以祓除疾病禊者潔也故於水上盥潔之也已者祉也邪疾已去祈介祉也應劭上已於流水上洗濯祓除去宿垢謂之祓禊鄭國之俗上已於溱洧之上招魂續魄秉蘭草祓除不祥華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中池陽上巳日婦女以薺花㸃油祝而洒之水中若成龍鳳花卉之状則吉謂之油花卜圖經集東出千金堰西臨鴈鶩陂㳺絲映空轉髙楊拂地垂緑幘文照耀紫燕光陸離清晨餞伊水薄暮宿蘭池沈約卜洛成周地浮盃上已筵鬬雞寒食下走馬射堂前孟浩然翠浪有聲黄繖動春風無力綵旌垂王直力三月三日天氣新長安水邊多麗人杜詩桃花生玉澗栁葉暗金溝庾肩吾帷宫對廣掖層殿邇髙岑風旗争曳影卓午共生隂樹花初墮蔕池荷欲吐心文帝野花飄御座河栁拂天杯日晩迎祥處笙鏞下帝臺同上是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以逰目騁懐足以極視聴之娛信可樂也王羲之立夏經是月也以立夏先立夏三日太史謁之天子曰某日立夏盛徳在火天子乃齋立夏之日天子親帥三公九卿大夫以迎夏南郊禮記集長風始飄閣疊雲纔吐嶺韋應物麥天晨氣潤槐夏午隂清古詩端午𫝊記五月五日午時為天中節提要録五月五日為地臘五帝校定生人罪福外滋萬類内延年夀此日可謝罪求福移易官爵祭祀先祖道書朱明啟節栁宗元謝端午衣物五月五日以蘭湯沐浴大戴禮洛陽端午作术羮艾酒金門嵗節記端午刻菖蒲為人或葫蘆形帶之辟邪端午以菰葉裹粘米謂之角黍蓋取隂陽包裹之義或云亦為屈原恐蛟龍奪之以五采線纒飯投水中遂襲云是日命舟楫拯之至今為競渡之戲又越地𫝊云起於勾踐嵗時記桃印本漢制以止惡氣今世端午以采繒篆符相問遺亦以置屏帳門户續漢書劉昭五月五日集繋五綵繒謂之辟兵裴𤣥新語五月五日以采絲繋臂謂之續命縷俗説能益人夀算一名辟兵繒一名條脱五月蓋屋令人頭秃風俗通唐嵗時節物五月五日有百索粽子文昌雜録端午賜百索為夀索李華翰林志朱索懸門止惡氣禮儀志漢令郡國捕梟五月五日為羮賜百官以惡鳥故食之也又云止妬郊祀志五月五日取蟾蜍可已惡疽瘡抱朴子云蟾蜍千年生角項下丹書八字五月五日午時取隂乾百日以其足畫地即為流水崔寔月令鸜鵒人多養之五月五日去其舌尖則能語零陵記天寳二年諸陵常以五月五日薦衣扇禮儀志晉謝靈運鬚美臨刑施為南海祗洹寺維摩像鬚中宗朝安樂公主五日鬬百草欲廣異物令馳驛取之又恐為他得因翦棄其餘青箱雜記胡廣本姓黄以五月五日生父母惡之藏之葫蘆棄之河流人收養之長有盛名父母欲取之廣以為背所生則害義背所養則忘恩兩無所歸託葫蘆而生因姓胡名廣後登三司小説孝女曹娥㑹稽上虞人父旴能絃歌為巫祝漢安二年五月五日於縣江沂濤迎神溺死不得屍娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死三日後與父屍俱出列女傳俗忌五月産子田文五月五日生父令勿舉母私舉文長啟父曰不舉五日子何父曰及户損父文曰受命於天豈户邪若爾何不髙之夫誰能及父心知其賢後封孟嘗君異苑王鳳以五月五日生又西京雜記宫中端午造粉團角黍貯盤中以小角弓射之中者得食都市盛行此戲開元遺}
  - {type: variant, offset: 656, length: 0, content: '', WYG: 太宗五日謂長孫無忌楊師道曰五日舊俗必用服翫相賀朕今各賀君飛白扇二枚庶動清風以揚美徳唐書要録天寳中揚州進水心鏡背有盤龍先有老人自稱為龍䕶之鑄鏡所三日開户已失所在鏡匠吕輝移爐以五月五日於揚子江心鑄之背龍頗異後大旱祀之乃大雨異聞集重五日午時有雨則急聴一竿竹節中必有神水瀝取獺肝為丸治心腹積聚嵗時記端午以艾為虎形至有如黒豆大者或剪綵為小虎粘艾葉戴之嵗時記集宫衣亦有名端午被恩榮細葛含風軟香羅疊雪輕意内稱長短終身荷聖情杜甫佳辰共喜沐蘭湯毒令何須採艾禳但得臯陶調鼎鼐自然灾沴變休祥歐陽折花競鮮彩拭露染芳津含嬌起斜盼歛笑動㣲嚬獻璫依洛浦懐珮似江濱須待恩光接中夜奉衣巾梁王筠麥涼殊未畢蜩鳴早欲聞喧林尚黄鳥浮天已白雲辟兵書鬼字神印題靈文因想蒼梧郡兹日祀陳君北齊魏收伏日傳記四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也秦徳公始為伏祠伏日進湯餅名為辟惡歴忌釋夏侯湛大暑賦曰三伏相仍徂暑彤彤上無纎雲下無㣲風扶桑赩以増燌大火􅁮其南升同上三伏焦暑元陽重授輕飇不扇纎雲不覆王彪伏日詔賜從官肉太官日晏不來東方朔獨拔劒割肉謂同官曰伏者當蚤歸請受賜即懐肉去太官奏之朔入上問之朔免冠謝曰朔來受賜不待詔何無禮也拔劒割肉一何壮也割之不多又何亷也歸遺細君又何仁也上笑曰使先生自責乃}
