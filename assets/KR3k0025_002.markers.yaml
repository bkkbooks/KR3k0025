  - {type: variant, offset: 78, length: 1, content: 高, krp: 令而似均又晉書云王者敬養耆老則甘露降而松栢受之尊賢容衆則竹葦受之老子春食朝霞日始欲出赤黄氣也夏食正陽南方日中氣也秋食淪隂日没以後赤黄氣也冬飲沆瀣北方夜半之氣也并天地𤣥黄之氣是謂六氣陵陽子方諸取露于月注云方諸大蛤隂極者淮南子藐姑射之山有神人焉}
