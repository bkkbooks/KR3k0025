  - {type: variant, offset: 37, length: 11, content: 人記文王世子子不臨深淵, WYG: 張温來聘温問秦宓曰天有頭乎宓曰有之温曰在何方宓曰詩云乃睠西顧以此推之頭在西方温曰天有耳乎宓曰天處髙而聴卑詩云鶴鳴于九臯聲聞于天若其無耳何以聴之温曰天有足乎宓曰詩云天步艱難若其無足何以步之温曰天有姓乎宓曰姓劉曰}
