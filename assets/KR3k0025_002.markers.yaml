  - {type: variant, offset: 1611, length: 225, content: 端為輪者取其因地之屈白侍郎若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名而得仕則自堯已降聖人賢人率多子弟杜牧之互入兼收並蓄子鳧脛雖短續之則憂鶴脛雖長斷之則悲莊取猿狙而衣以周公之服彼必齕齧挽裂盡去而後慊莊天運譬若樹荷山上而蓄火井中操釣上山揭斧入淵欲得所求難也淮南子說山訓責疲者以舉千鈞督跛者以及走兔鄧析子史指金火以求合西漢杜鄴傳傳記舍其所長責其所短堯亦有所不及矣戰國策集猶鏤以鈆刀而望巧不已踈, WYG: 幾幾}
