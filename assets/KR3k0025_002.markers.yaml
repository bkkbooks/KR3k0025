  - {type: variant, offset: 1015, length: 1, content: 承, WYG: 説封禪頌土圭酌乾坤韋蘇州本朝周大司徒立八尺之表度夏至日中之景尺有五寸謂之地中地中者非地體之中乃其地得寒暑風雨之中凡日行黄道每嵗有差地中亦當隨而轉移故周在洛邑漢在潁川陽城唐在汴州浚儀程迴三器圖義日月升降三萬里之中此是主黄道相去逺近而言立八尺之表以候尺有五寸之景寸當千里則尺有五寸却是三萬里之半日去表有逺近故景之長短為可驗也朱文公語測圭知日永歐陽公占天經觀乎天文以察時變仰以觀於天文天垂象見}
