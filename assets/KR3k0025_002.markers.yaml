  - {type: variant, offset: 65, length: 1, content: 患, krp: 為壮聲則士髪衝冠為哀聲則士皆流淚燕丹子傳記易緯曰八節之風謂之八風立春條風至春分明庶風至立夏清明風至夏至景風至立秋凉風至秋分閶闔風至立冬不周風至冬至廣莫風至爾雅云東風曰谷風南風曰凱風西風曰泰風北風曰凉風暴風從上下曰頽從下上曰飇亦曰扶搖迴風曰飄日出而風曰暴隂而風曰曀風而雨土曰霾月令云疾風曰盲風廣雅云大風風俗通曰猛風曰颲凉風曰瀏㣲風曰飉小風曰颼小風從孔來曰䫼太平之世風不搖條開甲破萌而已董仲舒至治之世風不鳴條孝經援神契火見而清風戒寒國語集故君徳喻其靡草風人假以為名及其猛勢将奮夾雲結隂洪氣鬱拂殷雷發音勃然鼓作拂髙凌深天無澄景嶺無停林六鷁為之退飛萬竅為之哀吟亦有飄泠之氣不疾不徐颲颲㣲扇亹亹清舒王喬以之控鵠列子以之乗虚湛方生風賦蕭條起闗塞搖颺下蓬瀛拂林花亂彩響谷鳥分聲披雲羅影散汎水織文生勞歌大風曲威加四海清太宗樓上起朝粧風花下砌傍入鏡先飄粉翻彩好染香度舞飛長袖𫝊歌共繞梁欲因吹少女還将拂大王元帝可聞不可見能重復能輕鏡前飄落粉琴上響餘聲梁何遜金風起燕觀翠竹夾梁池翻花疑鳳下颺水佀龍移帶露依深葉飄寒入勁枝聊因萬籟響詎待伶倫吹張正肅肅凉景生加我林壑清驅烟入閫户卷霧出山楹去來固無跡動息如有情日落山水静為君起松聲王勃蕭蕭度閶闔習習下庭闈花蝶自飄舞蘭蕙先光輝檣烏正舉翼退鷁已驚飛方從列子御更逐浮雲歸董思恭天地寥廓誰相待日月虚乗九萬風李義山大熱去酷吏清風來故人杜牧之雨經雲行雨施品物流形潤萬物者莫大乎雨易用汝作霖雨休徵曰肅時雨若書興雨祁祁靈雨既零以祈甘雨以介我稷黍以榖我士女詩土潤溽暑大雨時行禮子雲不待簇而雨廣成子雨者為雲乎荘子五政順時春雨乃來管子四海之雲凑千里之雨至晏子黒蜧居潜泉将雨則躍朱鼈浮波上必大雨淮南子太平之時雨不破塊浸莖潤葉而已董子神農治天下欲雨則至五日為行雨兩旬為谷兩旬五日為時雨萬物咸利故謂之神雨尸子史周公之時越裳氏來朝曰天無烈風滛雨其意中國有聖人乎史百里嵩為徐州刺史每出巡處甘雨輒㴻漢史鄭洪為淮隂太守行春隨車致雨漢史袁安為楚相辨疑獄活千人甘雨滂沛嵗大豐稔漢史晉束晢為人請雨三日而雨注衆稱其能通神明晉史顔真卿遷監察御史時辨理五原獄遂大雨郡人呼為御史雨唐史傳記隂陽和而為雨雨者天地之施也元命苞雨者神漿可挹盧師道雨三日已上曰霖久雨曰霪説文暴雨曰凍雨時雨曰㴻雨雨與雪雜曰霰爾雅疾雨曰驟雨徐雨曰零雨雨久曰苦雨雨晴曰霽雨晝晴曰啓雨水曰潦雨纂要春曰榆莢雨夏至前曰梅雨六月曰濯枝雨八月曰豆花雨荆楚嵗時記觸石而起膚寸而合不崇朝而徧雨乎天下者惟泰山之雲爾公羊傳春雨甲子赤地千里夏雨甲子乗船如市秋雨甲子禾頭生耳冬雨甲子鸛巢下地朝野僉載夷陵有隂陽石隂石常潤陽石常燥旱則鞭隂石必雨雨久鞭陽石則止武昌記太平之世五日一風十日一雨論衡集和風吹緑野梅雨洒芳田新流添舊澗宿霧足朝烟鴈濕行無次花沾色更鮮對此豐登嵗披襟弄五絃唐太宗油雲隂御道膏雨潤公田隴麥沾逾翠山花濕更燃虞世南濯枝林杏發潤葉渚蒲生絲入綸言喜花依錦字明魏知古空濛如薄霧散漫似輕埃謝眺風輕不動葉雨細未沾衣入樓如霧散拂馬似塵飛元帝落照依山盡浮凉帶雨來重雲出飛電髙棟響行雷洒樹輕花發滴沼細萍開朱迢澗滿新流濁山霑積翠濃風起還吹燕雲來本送龍諸葛穎風鴛藏近渚雨燕集深條杜片雲頭上黒應是雨催詩杜好雨知時節當春乃發生隨風潜入夜潤物細無聲杜雷聲忽送千峯雨花氣渾如百和香杜湛湛長江去𡨕𡨕細雨來杜深夜沈沈動春酌燈前細雨簷花落杜巢燕髙飛盡林花潤色分杜小雨晨光内初來葉上聞霧交纔洒地風逆旋隨雲暫起柴荆色輕霑鳥獸羣麝香山一半亭午未全分杜西北雲膏起東南雨足來靈童出海見神女向山回斜影風前合圓紋水上開十旬無破塊九土信康哉李嶠蓬萊一水通雲氣閶闔千門度雨聲劉威潤氣凝柱礎繁聲注瓦溝暗流忩不曉凉引簟先秋白樂天珠簾暮捲西山雨王勃雲經雲行雨施天下平也雲從龍風從虎聖人作而萬物覩雲雷屯君子以經綸山川出雲易上天同雲雨雪雰雰詩倬彼雲漢為章于天詩保章氏以五雲之物辨吉凶禮陽聚為雲舜将興黄雲升堂湯将興白雲入房春秋孔演圖子天油然作雲孟雲者為雨乎黄帝得之以登雲天莊子山雲草莽水雲魚鱗旱雲煙火涔雲波水淮南子史漢武帝至泰山封禪其夜有白雲起封中史封禪書漢髙祖隠於芒碭山澤間吕后與人俱求常得之髙祖怪問后曰季所居上常有雲氣文王遇姜公於渭陽灼然如披雲見白日恍若開霧而覩青天司馬相如奏大人賦天子大説飄飄有凌雲之氣㳺天地之間並史記傳記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲之見喜氣也舜時景雲見作歌曰卿雲爛兮糺漫漫楚襄王逰於雲夢之臺望髙唐觀上有雲氣須㬰之間變化無窮王曰此何氣也曰所謂朝雲也昔先王常逰髙唐晝寝夢一婦人曰妾巫山之女也為髙唐之客聞君逰髙唐願薦寢席王因幸之去而辭曰妾在巫山之陽也髙丘之阻朝為行雲暮為行雨朝朝暮暮陽臺之下旦視之如言故為立廟號曰朝雲文選冬至初陽雲出箕如樹之状立春少陽雲出房如積氷春分正陽雲出軫如白鵠榖雨