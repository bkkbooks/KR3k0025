  - {type: variant, offset: 657, length: 0, content: '', WYG: 自譽復賜酒一石肉百斤本傳楊氏子弟每至伏中取大氷使匠琢成山周圍於宴席間座右雖酒酣而各有寒色亦有挾纊者其驕貴如此又以氷鏤鳳獸之状以送王公家氷以藥固之可數日不消潰天寳遺事集南陸迎脩景朱明送末垂初伏啟新節隆暑方赫曦朝想慶雲興夕遲白日移揮汗辭中宇登城臨清池涼風自逺集輕衫隨風吹露圃曜華果通衢列髙椅潘岳立秋經七月流火九月授衣詩先立秋三日太史謁之天子曰某日立秋盛徳在金天子親帥三公九卿諸侯大夫以迎秋于西郊禮記子西方之極三色之山石成金室飲氣之民不死之野少皥蓐收之}
