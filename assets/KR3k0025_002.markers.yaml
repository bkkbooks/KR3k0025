  - {type: variant, offset: 1050, length: 189, content: 焉可及矣唐沈顧登華首互入貪迷本朝枯魚雖悔泣何及陳後山經徂來之松新甫之柏是斷是度是尋是尺詩閟宮或以德進或以事舉或以言揚記文王世子子曰君子使人也器之注孔曰度才而官之語子路子工之制木也大者以為舟航柱梁小者以為楫楔脩者以為櫚榱短者以為侏儒枅櫨無大小脩短皆得其所宜管子互入兼收並蓄良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之朴森然陳於目前大廈之器具矣孫子互入兼收並蓄巧工之制木也規矩方圓各隨所施, WYG: 謂五兩}
