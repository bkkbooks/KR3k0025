  - {type: variant, offset: 1020, length: 0, content: '', WYG: 候之在北夜半候之並同上𫝊記帝王将興嘉氣出河圖堯祇徳匪懈萬民欣和沈璧於河休氣四塞尚書中候王者和隂陽序萬物則休氣充塞白虎通麻衣和尚善望氣李守正叛河中周太祖親征麻衣語趙韓王曰李侍中安得久其城下有三天子氣未幾城陷時周世宗與本朝太祖從行唐宋遺史山氣多男澤氣多女水氣多喑風氣多聾木氣多傴石氣多力險氣多癭暑氣多殘雲氣多夀谷氣多痺丘氣多尫衍氣多仁陵氣多}
