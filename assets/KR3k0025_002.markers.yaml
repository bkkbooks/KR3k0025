  - {type: variant, offset: 1837, length: 243, content: 仲長統昌言不可以自好章甫強越人以文冕也晉山濤書強人所不能事必不集韓文本朝求朱於藍色何從來類要經未有違謙越禮能全其壯者也易略例用壯處壯則觸藩矣同上子兵彊則滅木彊則折柔弱者生之徒堅彊者死之徒列黃帝堅則毀矣銳則挫矣莊天下革堅則裂淮南訓道史天為剛德猶不干時況在人乎左文五年其強易弱西漢韓信傳桓公曰金剛則折革剛則裂說苑嶢嶢者易缺皦皦者易污東漢黃瓊傳快牛馬犢多能破車通監八十七卷李邕文名天下盧藏用曰邕如干將莫耶難與爭鋒但虞傷缺耳唐李邕傳互入藻鑑集利劍多缺真玉喜折劉賓客集子天下柔弱莫過於水而攻堅彊者, WYG: ''}
