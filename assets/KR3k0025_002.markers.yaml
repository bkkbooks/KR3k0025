  - {type: variant, offset: 1049, length: 0, content: '', WYG: 下皆多風溥天之民皆病濕泄耶沈存中筆談相風經保章氏以十有二風察天地之和乖别妖祥注云十有二辰皆有風吹其律以知和乖疏云風惟有八以當八卦八節云十二風者則乾之風漸九月坤之風漸六月艮之風十二月巽之風八月故清明節次云清明風立夏復云清明風是清明主三月復主四月則其餘四維之風主兩月可知周禮子故終身𨽻於人譬若綄之從風也注云綄音緩候風者也世}
