  - {type: variant, offset: 2109, length: 0, content: '', WYG: 定十二時晷景無差焉髙僧𫝊燒香知夜刻燭歛更嵗時廣記集今之官漏出自㑹稽注云舊漏本山隂令曹丕所造選陸倕刻漏銘序靈虬承注隂蟲吐吸倐忽往來鬼神出入㣲若抽繭逝若激電銅史司刻金徒抱箭刻漏銘載𫝊呼之節揆景測辰金筒方圓之制飛流吐納之規並同上金壺啓夕鑰選詩銀箭金壺漏水多李白靈虬𫝊夕箭同上丁丁暖漏滴花影催入景陽人不知温庭筠唯可瓊籖報天曙同上鼉鼓沈沈虬水咽李義山本朝漏刻之法有水秤以木為衡衡上刻疏之曰天河}
