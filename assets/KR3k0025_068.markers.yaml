  - {type: variant, offset: 4088, length: 0, content: '', WYG: 王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳賈曰周公使管叔監殷管叔以殷叛知而使之是不仁也不知而使之是不智也仁智周公未之盡也屋廬子曰夫子之任見季子之齊不見儲子為其為相與魯平公將見孟子臧倉曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後䘮踰前䘮君無見焉人有言伊尹以割烹要湯或謂孔子於衛主癰疽於齊主侍人瘠環萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也並孟子鵬徙九萬里鳩與鸒鳩笑之曰我决起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而}
  - {type: page-break, offset: 4088, content: '', id: KR3k0025_WYG_068-35a, image: WYG0932/WYG0932-0129a.png}
  - {type: page-break, offset: 4088, content: '', id: KR3k0025_WYG_068-35b, image: WYG0932/WYG0932-0129b.png}
  - {type: variant, offset: 4088, length: 0, content: '', krp: 王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣陳賈曰周公使管叔監殷管叔以殷叛知而使之是不仁也不知而使之是不智也仁智周公未之盡也屋廬子曰夫子之任見季子之齊不見儲子為其為相與魯平公將見孟子臧倉曰何哉君所為輕身以先於匹夫者以為賢乎禮義由賢者出而孟子之後䘮踰前䘮君無見焉人有言伊尹以割烹要湯或謂孔子於衛主癰疽於齊主侍人瘠環萬章問曰或曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也並孟子鵬徙九萬里鳩與鸒鳩笑之曰我决起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而}
