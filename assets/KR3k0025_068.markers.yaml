  - {type: variant, offset: 3963, length: 2, content: 行道, WYG: 兄敦曰此兒容貎志氣將相之器也晋王導傳何充嘗詣王導導以麈尾指牀呼充共坐曰此是君座也及導薨充參録尚書事何充傳王珣與謝𤣥為桓溫掾温嘗謂之曰謝掾年四十必擁旄杖節王掾當作黒頭公晋書劉裕謂義隆曰王曇首沈毅有器度宰相才也晉帝紀王儉幼篤學王粲見之曰栝栢豫章雖小已有棟梁氣矣終當任人家國事徐勉好學宗人徐孝嗣見之曰此謂人中麒麟必能致千里並南史徐陵年數嵗家人攜以候沙門寳誌寳誌摩}
