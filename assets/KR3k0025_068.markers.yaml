  - {type: variant, offset: 3950, length: 0, content: '', WYG: 光即奏琦已服罪肅宗紀上初疎斥宦官親任朝士而張渉以儒學入侍薛邕以文雅登朝繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我亂天下豈非欺罔耶於是上心始疑不知所倚仗矣唐徳宗紀反擠之又下石焉韓文集痛無知之相陷吕溫田鹿賦嫁禍史楚殺伍奢其子員}
