  - {type: variant, offset: 3317, length: 1, content: 勃, WYG: 求之已去即使人馳傳逐之孟嘗君至闗闗法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴遂發闗出本傳李同説平原曰士方其危苦之時易得耳伍子胥奔吳到昭闗昭闗欲執之伍子胥幾不得脫追者後至江上有一漁父乗船知伍子胥之急乃渡子胥本傳鮑宣下廷尉王咸舉幡太學下曰欲救鮑司𨽻者㑹此諸生㑹者千餘人遮丞相孔光車不得行宣減死一等望氣者言長安獄中有天子氣郭穣夜到郡邸獄丙吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可况親曾孫乎相守至天明不得入緩急相䕶西漢何顒與袁紹為犇走之交嘗私入洛陽從紹計議為諸名士罹黨事者求捄援權計使得逃隠所全免甚衆東漢初蔡邕與將作大匠陽球有隙球即中常侍程璜女夫使人飛章言邕下邕於雒陽獄劾以􅄷怨奉公議害大臣不臣不敬棄市事奏中常侍河南吕强愍邕無罪力為伸請陽球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕由是得免漢靈帝紀趙岐逃難賣餅北海中孫嵩見岐與共載歸藏岐複壁中數年侯覽等上書告張儉與同郡二十四人為黨於是刋章討捕儉儉困迫遁走望門投止莫不重其名行破家相容其所經歴伏重誅者以數十宗親皆殘滅郡縣為之殘破張儉為中常侍侯覽所怨覽刋章捕儉與孔融兄褒有舊亡抵褒不遇融曰兄雖在外吾不能為君主耶因留舍之後事泄褒坐死並東漢王祥漸有時譽母深疾之宻使鴆祥弟覽知之徑起取酒祥争而不與母遽奪反之自後母賜祥饌覽輒先甞魏元帝紀李景莊老於塲屋毎被黜母輒撻景譲荘兄也宰相謂主司曰李景莊今嵗不可不收可憐彼母每嵗受撻由是始得及第武宗紀勅曰王衍一行並從殺戮樞宻使張居翰就殿柱揩去行字改為家字唐明宗紀傳記窮鳥入懐仁人所憫死士歸我當棄之乎伍員之託漁舟季布之託廣栁孔融之藏張儉孫嵩之匿趙岐以此得罪甘心瞑目顔氏家訓集蹈水火之求免於人也茍不至乎欲其死者則將狂奔盡氣濡手足焦毛髪救之而不辭也韓文吐飯飽之解衣煖之牧之推輓史或輓之或推之欲無入得乎出左㐮田勝為周陽侯徧見湯貴人季布名所以益聞者曹丘揚之也使孔子名布揚於天下者皆子貢先後之也史記欲相扳援死而後已西漢相與抗衡杜周傳鄭當時推轂士類及官屬常引以為賢於己本傳借譽于左右鄒陽傳㳺揚足下名於天下季布傳張華性好人物至於窮賤候門之士有一介之善者咨嗟稱詠為之延譽晋士子聲名未立應共奨成無惜齒牙餘論南史謝朓傳傳記士非玉石談者為價物理論集名聲荷朋友韓集青㝠送吹嘘詩故人相攜直上太階吕溫贊吹噓期指掌元㣲之本朝乗雪洒潤秉律嘘枯臨川軫恤經勞來還定安集之至于矜寡無不得其所詩序老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養記隠惻矜恤于物謂之仁禮史昔闔廬在國天有菑癘親廵矜寡而共其乏困左民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣穀梁范雎見須賈賈曰范叔一寒如此哉乃取其一綈袍以賜之史記蓋寛饒為衛尉司馬躬按行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚恩西漢集以俸錢𦵏枯而恩浹以家飲救渇而澤周萼合兄弟之析居者而民以養麕復老弱之流庸者而疆以實皇甫湜齊王不忍觳觫牛簡子亦放邯鄲鳩栁詩視人之瘼如熛疽在身不忘决去劉賔客其心如肺石動必逹窮民白侍郎長安有貧者為瑞不宜多羅隠集本朝我哀籃中蛤閉口䕶殘汁又哀網中魚開口吐微濕坡詩覆蓋子孔子將行雨而無蓋門人曰商也有之子曰商之為人也甚短於財吾聞與人交推其長者諱其短者故能乆也家語史人之有牆以蔽惡也左曹參見人有過掩匿覆蓋之陳遵入公府日出醉歸曹事數廢西曹請斥之司徒馬宫重遵謂西曹曰此人大度士奈何以小失責之黄霸為潁川守許丞老病聾督郵白欲去之霸曰許丞雖老尚能起拜送迎重聽何傷且善助之毋失賢者意並西漢未敢誦言誅之髙後紀古者大臣有坐不㢘而廢者不謂不㢘曰簠簋不飾坐汙穢淫亂男女亡别者不曰汙穢而曰帷簿不脩坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥}
