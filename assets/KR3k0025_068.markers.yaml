  - {type: variant, offset: 4208, length: 0, content: '', krp: 之圖南也汪民表心説尊禮經作賔于王家書貴貴為其近于君也記尊長于己踰等不敢問其年大夫七十而致事若不得謝必賜之几杖乘安車國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾羣居五人則長者必異席謀於長者必操几杖以從之並禮子齊管夷吾任國政號曰仲父枉千乘於陋巷列子史宋先代之後也於周為客天子有事膰焉有喪拜焉左傳魯荘公使束縛管仲以予齊使齊使受而退比至三釁以香塗者三浴之桓公親逆之於郊國語周文王得吕望於磻溪武王以為師謂之太公號曰尚父項羽尊敬范增為亞父史記魏公子無忌仁而下士魏有隠士曰侯嬴公子從車騎虛左自迎侯生侯生攝敝衣冠直上載上坐不譲公子執轡愈恭周紀大將軍青侍中上踞厠視之丞相𢎞晏見上或時不冠至如見黯不冠不見上嘗坐武帳黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此汲黯傳曹參為齊相聞膠東有蓋公善治黄老言厚幣請之參於是避正堂舍蓋公焉本傳擁篲而先驅暴勝之望見雋不疑容貌尊嚴勝之躧履起迎並西漢大將軍袁紹總兵冀州遣使要鄭𤣥大㑹賔客𤣥最後至乃延升上座東漢傳孔融深敬於鄭𤣥倒屣造門告髙宻縣為𤣥特立一鄉曰昔齊置善鄉越有君子軍皆異賢之意也今鄭君鄉宜曰鄭君鄉後漢興席改容吳張昭吳中謂之仲父吳志傳徐庶曰此人可就見不可屈致也備由是詣亮凡三徃乃見漢獻紀萬章為京兆尹門下督從至殿中諸侯貴孫䇿擊豫章先遣虞翻詣華歆歆葛巾迎䇿謂歆府君徳望逺近所歸䇿年幼稚宜修子弟之禮便向歆拜胡冲吳書孫䇿曰昔管子相齊一則仲父二則仲父而桓公為霸者宗吳書許靖年踰七十愛樂人物納誘後進清談不倦丞相諸葛亮皆為之拜蜀志晉王導任丞相元帝委之為好日隆朝野傾心號為仲父郭奕為野王令羊祜嘗過之奕歎曰羊叔子去人逺矣遂送祜出界數百}
  - {type: variant, offset: 4209, length: 3, content: 秋風天, WYG: 坐此免官並晉書虞翻在吳魏文帝嘗為翻設虛坐吳志唐郭子儀徳宗時賜號尚父代宗不名呼為大臣唐書魏徴曰人言陛下欲幸南山}
