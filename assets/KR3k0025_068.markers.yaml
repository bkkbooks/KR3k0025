  - {type: variant, offset: 3986, length: 4, content: 閎休揚厲, WYG: 璧共執掠笞數百本傳趙人方與公謂御史大夫周昌曰君之吏趙堯年雖少竒士君必異之是乃代君之位昌笑曰堯年少刀筆吏耳何至是乎堯後為御史大夫西漢周昌傳以蠡測海方朔傳應龍潛於潢汙魚黿媟之不覩其能奮靈徳合風雲超忽而躋顥蒼也和氏之璧韜於荆石隋侯之珠藏於蜯蛤歴莫旴不知其將含景耀吐精英曠千嵗而流光也並班固傳楚龍且曰韓信}
