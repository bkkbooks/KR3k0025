  - {type: variant, offset: 4110, length: 5, content: 堪呼一擲爭, WYG: 有伯寮之愬東漢庸可以水旱而累堯湯乎蔡邕傳今之少年喜謗前輩孔融傳好議論人長短妄是非攻發馬援傳俗論皆言處士純盗虛聲武帝下令曰昔直不疑無兄世人謂之盗嫂第五倫三娶孤女世人謂之撾婦翁王鳳擅權谷永比之申伯王商忠臣張匡謂之左道此皆以白為黑欺天㒺君者也魏志桓冲曰謝安石有廟堂之量不嫺將畧今大敵垂至方逰談不暇遣諸不經事少年拒之衆又寡弱天下事已可}
