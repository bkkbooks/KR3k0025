  - {type: variant, offset: 3418, length: 269, content: 足為鼓琴者劉向說苑集知我者希則我貴矣揚雄解難鳳凰集南嶽羞與燕雀群劉公幹詩雖逍遙於廣廈思擊厲於中原選傳玄鷹賦生必耀華名於玉牒沒則勒洪伐於金策張景陽七命懷紀燕山石思開函谷園徐敬業琅琊城作排朱門而獨遠昇青雲而自致匪偷光於鄰壁寧假輝於陽燧終徇己以致能靡因人以成事駱賓王雖不能縱逸韻於霜皋唳野致九天之響頗亦蓄奇芬於露薄垂薰有十步之芳同上安能與尺鷃決起但搶榆孟浩然人生若不能師表朝廷即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顏受納元次山杜陵有布衣老大意轉拙許身一何愚自比稷與契居然成濩落白首甘契闊蓋棺事則已此志常覬豁窮年憂黎元嘆息腸內熱非, WYG: 後于鄭左荘子文}
