  - {type: variant, offset: 3343, length: 3, content: 卿雲溪, WYG: 得蕭何為國相自西流水盡朝宗王建集假以羽翼俾之騫翥栁文澤潤窮鱗雷使幽蟄吕和叔文本朝斟酌元氣洪纎溥被其仁彫刻衆形妍惡曲成其彚臨川集當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢才當公居相府時范仲淹韓琦富弼皆進用至於臺閣一時之賢晏殊譬之象犀珠玉雖無補於飢寒要不可使在泥塗中東坡文奨予後進子竊竊焉欲爼豆予於賢人之間荘子史郭泰好奨訓士類或出於屠沽卒伍因泰奨進成名者甚衆漢桓紀荀淑㧞李昭於小吏}
