  - {type: variant, offset: 3319, length: 1, content: 汗, krp: 正以謼之也尚遷就而為之諱故其在大譴大呵之域者聞譴呵則白冠㲠纓盤水加劍造請室而請辜矣西漢禇彦回有門生盗其衣彦回遇之謂曰可宻藏之勿使人見此門生慙而去宋書王僧祐父袁時人為之語曰王袁如屏風屈曲能蔽風露齊書王曰朕好與人較量理致崔祐甫性褊躁朕難之則應對失次朕常知其短而䕶之唐紀初李景畧嘗宴僚佐行酒者誤以醯進判官京兆任迪簡以景畧性嚴恐行酒者獲罪强飲之唐順紀傳記牛竒章公帥維揚杜牧在幕中夜㣲服逸遊後牧以拾遺召公以縱逸為戒牧始隠公取一篋皆街子輩服帖云杜書記平書芝白録集仲尼不假蓋於子夏䕶其短也嵇叔夜本朝韓魏公與歐陽永叔相親最深公知永叔不以繫辭為}
  - {type: variant, offset: 3321, length: 0, content: '', WYG: 孔子書又多不以文中子為可取中書相㑹累年未嘗與之言及也又韓魏公為丞相毎見文字有攻人隠惡者必手自封之未嘗使人見並筆談傾蓋子程子返自郯遭孔子于塗傾蓋而顧相語終日甚相親也子華子史吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉左孔子過鄭與子産如兄弟史鄭世家傾蓋如故鄒陽傳周瑜過魯肅求糧肅指一囷與瑜遂相親結定僑札之分吳志一見如舊𤣥齡傳傳記傾蓋如故劉向新序黄憲常逢一童容貌非常憲怪而問之是魯國孔融時年十嵗餘憲下執融手載歸舍與融談知其不凡便結為兄弟因升堂見親㑹稽録集傾蓋雖終朝大分邁疇昔盧子諒詩生平未識一見而交道遂存此日披懐千載之風期對坐陳子昂集相識雖新有故情白樂天欲迎先倒屣並坐便傾樽劉賔客本朝風期一相許意氣曽誰讓歐陽文顧盼子列子學乗風之道三年之後心不敢念是非口不敢言利害始得光商一盼而已列子集顧盼増其倍價剪拂使其長鳴昔歐冶改視鈆刀易價伯樂所盼駑馬百倍並文選唾為恩猥以庇賤之姿謬奉清通之盼駱賔王集一顧輕千金李太白一顧生鴟羽孟東野三都時覺重一顧世稱妍元㣲之風光一擡舉猶得暫時看同上提㧞經㧞茅茹以其彚征吉易儒有内稱不辟親外舉不辟怨推賢而進達之不望其報記趙文子所舉於晉國管庫之士七十有餘家同上子趙武薦白屋之士六十餘家韓子史楚子西曰勝如卵余翼而長之君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫唯善故能舉其類絳縣人七十有三年矣趙孟曰不能用吾子使吾子辱在泥塗乆矣遂仕之並左仲尼聞魏子之舉也曰近不失親魏戊逺不失舉可謂義矣左傳韓安國貪嗜於財所推舉皆㢘士賢於己者也於梁舉壺遂臧固皆天下名士薦天下賢俊鄭當時推轂士類及官屬常引以為賢於己本傳楊興說史髙曰匡衡才智有餘經學絶倫但以其無階朝廷故隨牒在逺方將軍誠召置幕府與參事議觀其所有貢之朝廷必為國器匡衡傳稠人廣衆薦寵下輩士亦以此多之灌夫傳何武為人仁厚好進士奨稱人之善為楚内史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此兩人顯於世者何侯力也田蚡進名士家居者本傳河南尹羊陟謁造趙壹言談}
