  - {type: variant, offset: 749, length: 283, content: 為人臣懷二心以事其君者也頃之襄子出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅願請君之衣而擊之以致報讎之意則死不恨襄子持衣與讓拔劍三躍而擊之曰吾可以下報智伯矣史本傳互入英烈藺相如奉趙璧於秦秦王喜傳示左右相如視秦王無意償趙城乃曰璧有瑕請指示王王授璧相如持璧卻立倚柱怒髮衝冠曰臣觀大王無意償趙王城故取璧大王必欲急臣臣頭與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王乃辭謝相如懷其璧從徑道歸璧于趙同上互入英烈屈原曰誰能以身之察察受物之汶汶者乎寧赴湘流而葬于江魚腹中耳又安能以皓皓之白而蒙世之溫蠖乎同上張儀謂其妻曰視吾舌尚在不其妻曰舌在也儀曰足矣史張儀傳高皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習, WYG: 抗}
