  - {type: variant, offset: 4095, length: 0, content: '', WYG: 䘮家之狗子貢以告孔子曰形狀末也而似䘮家之狗然哉史記世家莊子作漁父盗跖胠篋以詆訾孔子之徒本傳拜陳平為都尉使為參乗䕶軍諸將盡讙曰大王一日得楚之亡卒未知其髙下而即與同載反使監䕶長者髙帝紀龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之䇿受辱於跨下無兼人之勇}
