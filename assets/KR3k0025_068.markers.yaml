  - {type: variant, offset: 3951, length: 0, content: '', krp: 吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭秦王年少太后時竊私通吕不韋吕不韋恐覺禍及己乃私求嫪毐嫪力髙反毐於改反詐令人以腐罪告之不韋隂謂太后曰詐腐則得給事中后乃隂賜主腐者詐論之遂侍太后私與通不韋傳趙豹曰韓氏所以不入秦者欲嫁其禍於趙也趙世家七國反錯欲令上自將兵而身居守漢景帝紀公孫敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得族陵家武帝紀快讐史楚殺子玉公喜而後可知也曰莫余毒也已左宣公王甫父子應時馘截路人士女莫不稱善若除父母之讐靈帝吕布刺董卓百姓歌舞於道長安中士女賣其珠玉衣装市酒肉相慶者填滿街肆守尸吏為大炷置卓臍中燃之光明達曙如是積日獻帝紀吐突承璀首唱用兵疲弊天下上罷承璀中尉降為軍器}
  - {type: variant, offset: 3952, length: 1, content: 茲, WYG: 中外相賀徳宗紀裴延齡卒中外相賀同上來俊臣棄市時}
  - {type: variant, offset: 3952, length: 1, content: 茲, krp: 中外相賀徳宗紀裴延齡卒中外相賀同上來俊臣棄市時}
  - {type: variant, offset: 3954, length: 0, content: '', WYG: 無不快俊臣讎家争噉俊臣之肉斯須而盡抉眼剥面披腹出心騰踏成泥士民皆相賀於路曰自今眠者始帖席矣武后紀貶皇甫鏄為崖州刺史市井皆相賀穆宗紀本朝鄭向知杭州王耿為㳺漕互}
  - {type: variant, offset: 3954, length: 0, content: '', krp: 無不快俊臣讎家争噉俊臣之肉斯須而盡抉眼剥面披腹出心騰踏成泥士民皆相賀於路曰自今眠者始帖席矣武后紀貶皇甫鏄為崖州刺史市井皆相賀穆宗紀本朝鄭向知杭州王耿為㳺漕互}
  - {type: variant, offset: 3955, length: 0, content: '', WYG: 論列而耿死鄭徃哭之甚哀或曰龍圖素惡端公今何慟哭也范極曰龍圖待哭斯人乆矣倦㳺録樂禍史王子頽享五大夫樂及徧舞鄭伯曰王子頽歌舞不倦樂禍也左荘公鄭慶曰幸災不仁幸災民所棄也左僖王宏素與司𨽻校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰胡种樂人之禍禍將及之王允傳好乗人之弊周伯仁傳董養見王彌謂之曰君好亂樂禍若天下有事不作士大夫矣晋世祖紀用情經有酒湑我無酒酤我雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無徳與女式歌且舞醉言舞于胥樂兮諸父兄弟備言燕私詩黨無容觴酒豆肉自吾母而不用吾情吾惡乎用吾情記殺雞為黍而食之居不容並語史子之事父焉得不盡其情傅奕𫝊謝安嘗詣陸納納殊無供辦所設惟茶菓而已晋書集斗酒相娛樂選古詩銜盃酒接慇懃之歡司馬遷書禮有所尚隻雞不薄意有所將生芻為貴九齡文輸㵼藴積劉賔客握手出肺肝相示草草具盤饌不持酒獻酬韓集約窮歡於一晝雖掾俸之酸寒要㧞貧而為富韓祭栁州文情意既深庶乎無間父子直徃直來曲江集本朝司馬温公在洛為真率㑹有約酒不過五行食不過五味惟菜無限言行録坦率見真情東坡集相從盃酒形骸外笑殺平生醉夢間同上他日過飯隨家風買魚貫栁雞着籠山谷集真率經有直情而徑行者記子直語無藻飾抱朴子史衛綰忠實無他腸西漢晉文帝毎言王述才既不長直以真率便敵人耳晋書集主人一心好四面無藩籬元稹集内外都無隔帷幈不復張元㣲之蹊徑絶縈紆同上不設塹壘杜牧之司馬温公在洛為真率㑹有約酒不過五行食不過五味唯菜無限言行録期待經後生可畏焉}
