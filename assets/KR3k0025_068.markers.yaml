  - {type: variant, offset: 3985, length: 0, content: '', WYG: 用錐指地荘子立尺度以度天直寸指以測淵孔叢子以指測河荀子指測海指極則謂水盡猶目察百歩而云見極也抱朴史趙平原君以千金為魯連夀仲連傳張儀嘗從楚相飲已而楚相亡璧門下意儀曰儀貧無行此必盗相君}
