  - {type: 'tls:seg', offset: 3957, content: '', id: KR3k0025_CHANT_068-13a.99}
  - {type: variant, offset: 3957, length: 0, content: '', WYG: 卒與女陳平傳長卿雖貧其人材足依也相如傳初何武為郡吏時事太守何夀夀知武有宰相器故厚之西漢賈復少事李生生竒之曰賈君容貎志氣如此而勤於學將相之器也後漢本傳王允仕州郡郭林宗見而竒之曰一日千里王佐才也遂與之友同上馬援兄况謂援曰汝大才當晩成馬援傳吕䖍遷徐州刺史請王祥為别駕民事一以委之初䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰茍}
