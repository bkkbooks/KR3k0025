  - {type: variant, offset: 1931, length: 264, content: 亦如此肉矣通監漢高紀蒯通自序其說號曰雋永西漢本傳師古曰雋字充反肥肉也永長也以其所論甚善而義深長也韓安國曰死灰獨不復然乎終軍自願受長纓羈南越王致之闕下終軍步入關關吏與軍繻軍問何為吏曰為復傳還當合符軍曰丈夫西遊終不復傳還棄繻而去並同上士病不明經術經術苟明取青紫如俛拾地芥西漢夏侯勝傳郭丹曰丹不乘使者車終不出關去家十有二年果乘高車出關東漢本傳梁竦自負其才曰大丈夫居世生當封侯死當廟食州縣之職徒勞人耳同上虞詡笑曰不遇盤根錯節無以別利器此乃吾立功之秋也通監漢殤紀禰衡唯善孔融楊脩常稱曰大兒孔文舉小兒楊德祖餘子碌碌不足數東漢本傳曹操從容謂劉, WYG: 牀}
