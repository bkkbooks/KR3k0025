  - {type: variant, offset: 4089, length: 5, content: 元常轡共驅, WYG: 翺翔蓬蒿之間此亦飛之至也而彼且奚適也荘子小辯而毁大道孔叢子人各是其所是非其所非將誰使正之妄譽仁之賊妄毁義之賊揚子俗人未嘗見龍麟鸞鳯乃謂天下無有此物以為古人虛設瑞應抱朴子史鄭子産作丘賦鄭人謗之曰已為蠆尾昭四年季康子將召仲尼公之魚曰昔吾先君用之不終為諸侯笑今又用之不能終是再為諸侯笑必召冉求孔子世家孔子適鄭鄭人或曰纍纍}
