  - {type: variant, offset: 3322, length: 1, content: 踵, WYG: 曛夕極歡而執其手曰良璞不剖必有泣血以相明者矣陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采東漢第五倫舉人多至二千石本傳胡廣所辟命皆天下名士本傳光武任使諸將多訪於鄧禹毎有所舉皆當其才鄧禹傳陳寔出於單㣲鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得人西門亭長陳寔可寔聞之曰鍾君似不察人何獨識我太守遂以寔為功曹漢紀孔融上疏曰惟嶽降神異人並出竊見平原處士禰衡年二十四字正平淑質貞亮英才卓躒初渉藝文升堂覩奥目所一見輒誦於口耳所蹔聞不忘於心性與道合思若有神𢎞羊潛計安世黙識以衡凖之誠不足怪忠果正直志懐霜雪見善若驚疾惡若讎任座抗行史魚勵節殆無以過也鷙鳥累百不如一鶚使衡立朝必有可觀飛辯騁辭溢氣坌涌觧疑釋結臨敵有餘昔賈誼求試屬國詭繫單于終軍欲以長纓牽致勁越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫㣲垂光虹蜺足以昭近署之多士増四門之穆穆鈞天廣樂必有竒麗之觀帝室皇居必蓄非常之寳若衡等輩不可多得激楚揚阿至妙之容掌技者之所貪飛兎騕褭絶足犇放良樂之所急臣等區區敢不以聞禰衡傳吕蒙至都權問誰可代卿者蒙曰陸遜意思深長才堪負重乃召遜拜偏將軍右部督以代蒙漢獻帝諸葛誕曰今善人單少茍其性不邪便可奨就吳志龎統曰㧞十失五猶得其半蜀志荀令君之舉善不進不休魏志荀令君之所舉皆命世之大才謝脁好奨與人才曰士子聲名未立宜共奨成無惜齒牙之餘論山濤為吏部甄㧞人物初克未仕時河内山簡嘗與瑯琊王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字㧞人石苞求為小縣許允曰卿我輩人當相引在朝並晉書劉穆之為丹陽尹凡所薦達不納不止宋書劉逖薦辛徳源曰弱齡好書晩節逾厲枕籍六經漁獵百氏北史海内賢才起自側陋外國逺方名士㧞而用之皆浩之由也同上金在礦何足貴善冶鍛而為器人乃寳之唐書魏中尉李彪家世孤㣲朝無親援李冲薦于魏主且為之延譽於朝公私汲引齊髙紀房𤣥齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰㣲公言㡬失之唐高紀㧞犀之角擢象之齒古人言㧞十失五猶得其半太后嘗問狄仁傑朕欲得一佳士用之誰可者仁傑}
