  - {type: variant, offset: 3956, length: 0, content: '', WYG: 來者之不如今也語子子曰義也清而荘姚義靖也惠而㫁李靖威也和而博竇威收也曠而肅薛收瓊也明而毅賈瓊淹也誠而厲杜淹𤣥齡志而宻房喬徴也直而遂魏徴大雅深而𢎞温大雅叔達簡而正陳叔達若逢其時不減卿相天地篇史吕不韋曰吾門待子門而大本傳張負曰固有美如陳平長貧者}
