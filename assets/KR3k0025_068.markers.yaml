  - {type: variant, offset: 3319, length: 1, content: 汗, WYG: 正以謼之也尚遷就而為之諱故其在大譴大呵之域者聞譴呵則白冠㲠纓盤水加劍造請室而請辜矣西漢禇彦回有門生盗其衣彦回遇之謂曰可宻藏之勿使人見此門生慙而去宋書王僧祐父袁時人為之語曰王袁如屏風屈曲能蔽風露齊書王曰朕好與人較量理致崔祐甫性褊躁朕難之則應對失次朕常知其短而䕶之唐紀初李景畧嘗宴僚佐行酒者誤以醯進判官京兆任迪簡以景畧性嚴恐行酒者獲罪强飲之唐順紀傳記牛竒章公帥維揚杜牧在幕中夜㣲服逸遊後牧以拾遺召公以縱逸為戒牧始隠公取一篋皆街子輩服帖云杜書記平書芝白録集仲尼不假蓋於子夏䕶其短也嵇叔夜本朝韓魏公與歐陽永叔相親最深公知永叔不以繫辭為}
