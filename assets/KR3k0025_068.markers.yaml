  - {type: variant, offset: 3951, length: 0, content: '', WYG: 吳言伐楚之利公子光曰是宗為戮而欲反其讎不可從也左昭秦王年少太后時竊私通吕不韋吕不韋恐覺禍及己乃私求嫪毐嫪力髙反毐於改反詐令人以腐罪告之不韋隂謂太后曰詐腐則得給事中后乃隂賜主腐者詐論之遂侍太后私與通不韋傳趙豹曰韓氏所以不入秦者欲嫁其禍於趙也趙世家七國反錯欲令上自將兵而身居守漢景帝紀公孫敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得族陵家武帝紀快讐史楚殺子玉公喜而後可知也曰莫余毒也已左宣公王甫父子應時馘截路人士女莫不稱善若除父母之讐靈帝吕布刺董卓百姓歌舞於道長安中士女賣其珠玉衣装市酒肉相慶者填滿街肆守尸吏為大炷置卓臍中燃之光明達曙如是積日獻帝紀吐突承璀首唱用兵疲弊天下上罷承璀中尉降為軍器}
  - {type: page-break, offset: 3951, content: '', id: KR3k0025_WYG_068-26b, image: WYG0932/WYG0932-0124d.png}
