  - {type: variant, offset: 3960, length: 2, content: 誰哉, WYG: 人刀或為害卿有公輔之量故以相與蔡邕倒屐迎王粲曰此王公孫有異才並魏志吕蒙曰士别三日則刮目相待吳志庾亮謂諸葛恢曰明府當作黒頭三公晋書王導少有識量陳㽜高士張公見而竒之謂}
  - {type: variant, offset: 3960, length: 2, content: 誰哉, krp: 人刀或為害卿有公輔之量故以相與蔡邕倒屐迎王粲曰此王公孫有異才並魏志吕蒙曰士别三日則刮目相待吳志庾亮謂諸葛恢曰明府當作黒頭三公晋書王導少有識量陳㽜高士張公見而竒之謂}
