  - {type: variant, offset: 3981, length: 1, content: 鋪, krp: 足下年尚强嗣徳有繼將大書特書不一書而已韓退之答元稹書知君志不小一舉凌鴻鵠劉長卿幽姿閒自適逸翮當一逞如有長風吹青雲在俄頃同上禁林聞得長棲鳯池水那能乆滯龍元㣲之集落落精神終有立飄飄才思杳無窮杜牧之蛟龍可是池中物鳯鳥無非閣上音}
  - {type: variant, offset: 3983, length: 1, content: 對, WYG: 函吉文混溪既琢必見山川之精樹羽已懸行嗣雲韶之響駱賓王期君蟠桃枝千嵗終一甞東坡集傳記杜如晦少聰悟髙孝基深器重之曰公有應變之才為棟梁之用丁重能閲人觀于琮謂路巖曰于侍郎如百斛重器尚空其半安使不益於禄位哉並世説從兹穏上青雲去萬里誰能測羽翰玉壺清話淺量子孔子厄於陳蔡七日不食顔囘仲由炊之有埃墨墮飯中顔囘取而食之子貢見之不恱以為竊食也家語公孫丑曰夫子當路於齊管仲晏子之功可復許乎孟子去齊充虞路問曰夫子若有不豫色然孟子用管窺}
