  - {type: variant, offset: 4216, length: 0, content: '', WYG: 狄仁傑羣臣莫及常謂之國老而不名曰毎見公拜朕亦身痛武后紀𤣥宗尊遇姚崇毎見便殿必為之興去輙臨軒以送它相莫如也唐書龎徳公素有重名諸葛亮毎至其家獨拜牀下三國志王維名盛於開元間豪貴人虛左以迎唐書帝如曲阜謁孔子祠帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓禁孔林樵采訪孔子顔淵之後以為曲阜令及主簿周太祖紀樊宗師見劉义獨拜唐書傳記范逵既去陶侃追送不已且百里許世說}
