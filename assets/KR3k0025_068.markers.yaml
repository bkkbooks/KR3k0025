  - {type: variant, offset: 3325, length: 2, content: 過耳, WYG: 學醖藉則蘇味道李嶠固其選矣必欲取卓犖竒才則有荆州長史張柬之其人雖老宰相才也太后擢為洛州司馬數日又問仁傑對曰前薦柬之尚未用也太后曰已遷矣對曰臣所薦者可為宰相非司馬也狄仁傑嘗薦數十人卒為名臣或謂仁傑曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也李吉甫同平章事謂中書舍人張垍曰朝廷後進罕所接識君有精鑑願悉為我言之垍取筆疏三十人數日之間選用殆盡當時翕然稱吉甫為得人唐紀傳記驥躊躇於弊輂兮遇孫陽而得代楚辭集蓋聞繁弱登御然後髙墉之功顯孤竹在肆然後降神之曲成伏見處士廣陵戴淵心智足以妍幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之㓗誠東南之貴寳聖朝之竒璞也陸機文蓋聞驪龍之珠必洗紫泉之裏垂天之翼必翔青㝠之表竊見處士吳國張道順下筆攄雕龍之文發言吐掞天之藻若得清水淬其鋒越砥斂其鍔必騰躍天路出覿聖世楊方文東都雖信多士朝取一人焉㧞其尤暮取一人焉㧞其尤好賢樂善孜孜以薦進良士為己任方今天下一人而已文章之尤者有侯喜侯雲長者有劉述古者其文長於為詩當今舉於禮部者無與為比有崔羣玉者其文進而未止者也為人賢而有才志剛而氣和凡此四人者皆可以當執事首薦有沈把張苰尉遲汾李紳張後餘李翊者或文或行皆出羣之才也凡此數子舉之足以收人望得才實誠不忍竒寳横棄道側並}
