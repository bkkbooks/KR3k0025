  - {type: variant, offset: 3294, length: 644, content: 餘人通監唐元宗睢陽士卒死傷之餘纔六百人張巡許遠分城而守之令南霽雲將三十騎犯圍而出告急於臨淮見賀藺進明進明強留之具食與樂延霽雲坐霽雲慷慨泣且語曰霽雲來時睢陽之人不食月餘矣霽雲雖欲獨食且不下咽也夫擁彊兵觀睢陽陷沒曾無分災救患之意豈忠臣義士之所為乎因齧落一指以示進明曰霽雲既不能達主將之意請留一指以示信歸報通監唐肅宗互入坐視劉闢發兵圍東川林蘊力諫闢舉兵闢怒械繫於獄引出將斬之陰戒行刑者使不殺但數礪刃於其頸欲使屈服而赦之蘊叱之曰豎子當斬即斬我頸豈汝砥石耶通監唐憲紀雖千五百年其英烈言言如嚴霜烈日可畏而仰哉唐顏真卿傳贊傳記烈士徇名壯夫重氣寧為蘭摧玉折不為瓦礫長存史通集烈士甘危軀以成人文選七啟烈心厲勁秋文選長安行齎志沒地選江文通恨賦縱死俠骨香不慚世上英李白海上五百人同日死田橫當時不好賢豈傳千古名乍向草中耿介死不求黃金籠下生同上寶劍思存楚金鎚許報韓駱賓王丹誠自守雖九死而如歸白刃交前豈三軍之可奪喑嗚則山岳可崩叱咤則風雲變色同上壯志死不息千年如隔晨韓送惠師詩英心甘鬥死韓退之孟郊聯句至誠無忘炳若日月烈氣不散長為風雷呂和叔文苟效用之得所雖殺身而何計張九齡塵尾賦白虹千里氣血頸一劍義劉義平生一匕首孟浩然恨血千年土中碧高達夫泣血嘗膽誓復國讎刻骨鏤肌敢違天造陳子昂多應銜恨骨千古不為塵杜荀鶴萬古壯骨唐文粹植髮成干櫓厲氣成風雲同上縱死猶聞俠骨香王維集萬古英風柳文報恩不到頭徒作輕生士劉義文本朝生為楚英沒為吳豪烈氣不泯視此江濤東坡祈睛吳山文精誠貫山石為裂東坡詩張睢陽生猶罵賊嚼齒空齗顏平原死不忘君握拳透爪古今詩話, WYG: 八}
