  - {type: variant, offset: 2026, length: 266, content: 以事其君者也頃之襄子嘗出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅願請君之衣而擊以致報讎之意則死不恨襄子持衣與讓讓拔劍三躍而擊之曰吾可以下報智伯矣史記本傳互入堅忍不拔燕入齊聞畫邑人王蠋賢謂蠋曰吾以子為將封子萬家蠋曰忠臣不事二君貞女不更二夫與其生而無義固不如烹遂經其頸於樹枝自奮絕脰而死史記田單傳贊秦王令趙王鼓瑟藺相如曰聞秦王善為秦聲請奉盆缻秦王以相娛樂秦王怒不許相如進缻因跪請曰五步之內請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王為一擊缻相如顧趙御史書曰某年月日秦王為趙王擊缻史記本傳魯仲連聞秦為帝曰連有蹈東海而死耳吾不忍為之民也, WYG: 乎俛拾並}
