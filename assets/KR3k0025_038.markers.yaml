  - {type: variant, offset: 17, length: 0, content: '', WYG: 幼者聴而弗問學不躐等也學}
  - {type: variant, offset: 17, length: 0, content: '', krp: 幼者聴而弗問學不躐等也學}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 大學之教時教必有正業退息必有居學太學之}
  - {type: variant, offset: 18, length: 0, content: '', krp: 大學之教時教必有正業退息必有居學太學之}
