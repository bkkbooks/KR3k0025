  - {type: variant, offset: 7, length: 0, content: '', WYG: 制以為先求賢徳之士以為師長百度可不勞而成言行録莫嫌學舎官閒冷歐陽公學者得佳士山谷太學經於論鼓鍾於樂辟雍詩靈臺鎬京辟雍文王}
