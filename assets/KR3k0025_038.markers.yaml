  - {type: variant, offset: 24, length: 0, content: '', WYG: 臣相應之㫖帝甚悅同上紹興十四年幸太學命曽開講易百官内外舎人推恩有差復幸養正持志二齋顧覽生徒肄業之所今上嘉熙辛丑幸學講太學罷王荆公従祀詔濂溪明道伊川横渠晦翁五先生繪像於廡諸州縣學凖此邸報武學武成王廟附史開元十九年始置太公尚父廟以留侯張良配仲春秋中上戊祭之牲樂之制如文宣出師命將發日引辭於廟仍以古名將十人為十哲配饗上元元年尊太公為武成王以白起韓信諸葛亮李靖李勣列於左張良田穰苴孫臏吳起樂毅列於右以良為配唐書建中二年詔史館考定}
