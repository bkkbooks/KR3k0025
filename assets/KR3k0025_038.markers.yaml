  - {type: variant, offset: 161, length: 2, content: 昭四, WYG: 傳史文翁為蜀郡守選郡小吏開敏有才者十餘人遣詣京師受業博士數嵗皆成就還歸文翁以為右職又修起學宫於成都市中繇是大化蜀地學於京師者比齊魯焉武帝時乃令天下郡國皆立學校官漢書平帝詔郡國曰學縣道邑侯國曰校鄉曰庠聚曰序同上明帝永平二}
