  - {type: variant, offset: 2686, length: 606, content: 中使使召之至則聞田橫死亦皆自殺通監漢高紀貫高曰所以不死一身無餘者白張王不反也今王已出吾責已塞死不恨矣且人臣有篡弒之名何面目復事上哉縱上不殺我不愧於心乎乃仰絕亢遂死之通監漢惠紀赴死如歸前漢欒布傳吳郡王閎渡錢塘江遭風舡欲覆閎拔劍斫水罵伍胥風息得濟謝承後漢書夫嚴氣正性覆折而已豈其負園委屈可以每其生哉凜凜焉暠暠焉其與琨玉秋霜比肩可也園即刓字團無稜角也每貪也言寧傾覆摧折不能委曲以貪生也東漢孔融傳殺身為君齊孟陽代君居床以待賊西漢紀信乘黃屋以誑楚破家為國要離焚妻子以徇吳李通誅宗族以從漢東漢孔融傳袁紹殺臧洪同郡人陳容曰將軍除暴先誅忠義豈合天意紹使人牽出容曰今日寧與臧洪同日死不與將軍同日生遂復見殺坐者歎曰如何一日殺二烈士後漢含笑入地東漢韓韶傳鄧文斬諸葛瞻瞻子尚歎曰父子荷國重恩不早斬黃皓使敗國殄民用生何為策馬冒陳而死通監魏元紀卞壺苦戰而死二子眕盱隨父後亦赴敵而死其母撫尸哭曰父為忠臣子為孝子夫何恨乎通監晉成紀有前死一尺無卻生一寸通監梁武紀千載之後凜凜猶生北史藺相如叱秦王目眥皆裂唐王君廓傳叚秀實素有人望朱泚反召秀實議事源休在坐秀實勃然起執休腕奪其象笏奮前唾泚面遂擊之泚舉臂捍笏中顙流血滿面唐書互入節操張巡城陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以荅國恩唐書李克用執孫揆揆大罵不屈克用怒使以鋸解齒不行謂曰死狗奴解人當夾之以板汝輩安知行刑刑者如其所言罵聲不輟至死唐書孫揆傳顏氏一門死於刀鋸者, WYG: 卷}
