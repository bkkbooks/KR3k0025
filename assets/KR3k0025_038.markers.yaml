  - {type: variant, offset: 1821, length: 198, content: 嘗須臾忘郢耶故隱忍就功名非烈丈夫孰能致此哉史記子胥傳互入堅忍不拔伍子胥諫吳王吳太宰嚭讒之吳王賜劍死子胥乃告其舍人曰必植吾墓上以梓令可以為器而抉吾眼掛吳東門之上以觀越冠之入滅吳也乃自刎死史記彭越嘗與欒布游彭越反梟頭於洛陽詔曰有敢收視者輒捕之布奏事彭越頭下祠而哭之吏捕以聞布曰彭越已死臣生不如死請就烹史記本傳豫讓事智伯智伯滅讓挾匕首剌襄子襄子釋之頃之漆身為厲吞炭為啞行乞於市曰所以為此者將以愧天下後世, WYG: 顓眺聽}
