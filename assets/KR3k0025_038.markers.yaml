  - {type: variant, offset: 101, length: 9, content: 語泰伯見危授命語憲, WYG: 乃條其事以告有㫖遷睦親近屬之居與它所而盡拓故基以為學復増補貟定試額凡陞黜進退之制槩視太學宗學題名宗庠載闢用宏舊規所以昭崇睦廣教育也惟麟趾化行𤓰瓞綿茂雖資稟之攸厚必陶冶而後成俾繇選補著之於籍月書季攷一視賢闗文行相符矩矱是蹈庶益收得人之效强我王室尚其懋哉寧宗御書綾紙贊詞淳祐甲辰之冬皇上奮發英斷更新大化又明年以麟庠之胄苦隳肝膽力扶綱常於是赫奕奎章誕錫黌宇錫之束帛試之春官優之陞擢登科題名嘉定更新宗學置四齋曰貴仁大雅明賢立愛辛巳重廣學舎續添兩齋曰懐徳升俊小録州縣學經泮水頌僖公能修泮宫也思樂泮水薄采其芹思樂泮水薄采其藻魯侯戾止其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒詩既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑}
