  - {type: variant, offset: 2389, length: 296, content: 剌客本傳聶政剌殺韓相俠累因自反面抉目自屠出腸以死史記本傳荊軻見樊於期曰秦之遇將軍厚矣父母宗族皆為戮沒今聞購將軍首金千斤今有一言可以解燕國之患報將軍之讎願得將軍之首以獻秦王秦王必喜臣左手把其袖右手揕其胸將軍之仇報矣樊於期偏袒扼腕曰此臣之日夜切齒腐心也今乃得聞教遂自刎同上項王留沛公飲亞夫令項莊以劍舞擊沛公張良見樊噲曰今日事甚急噲請入與之同命即入軍門側盾撞衛士仆地遂入披帷立瞋目視項王頭髮上指目眥盡裂項王問客何為者張良曰沛公之參乘樊噲也王曰壯士賜斗酒噲立而飲之賜一生彘肩噲覆盾於地加彘肩上拔劍切而啗之王曰壯士能復飲乎噲曰臣死且不避巵酒何辭乎史記項羽紀田橫自剄二客穿其家旁孔皆刎下從之橫客五百人尚在, WYG: 纂淵}
