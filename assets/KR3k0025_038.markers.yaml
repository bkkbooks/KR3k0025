  - {type: variant, offset: 21, length: 0, content: '', WYG: 無北面所以尊師也並同上子太學}
  - {type: page-break, offset: 21, content: '', id: KR3k0025_WYG_038-4a, image: WYG0931/WYG0931-0061a.png}
  - {type: variant, offset: 21, length: 0, content: '', krp: 無北面所以尊師也並同上子太學}
