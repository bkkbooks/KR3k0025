  - {type: variant, offset: 164, length: 2, content: 楚熊, WYG: 郡縣道行鄉飲酒禮於學校後漢書鮑徳遷南陽太守時郡學乆廢徳乃修起黌舎備爼豆黼冕行禮奏樂諸儒百姓歎服本傳漢耿恭遷常山太守修學校教授不輟本傳寇恂拜汝南太守乃修鄉校教生徒本傳魏武帝令曰喪亂以來後生者不見仁義禮遜之風吾甚傷之其令郡國各修文學縣五百户置校官選其鄉之俊造而崇學之魏本紀虞博除河陽内史大修學校廣招學徒晉虞喜傳范寗在郡立鄉校教授常數百人由是江州人士並好經學范寗傳魏獻文帝時髙允表請郡國立學北史魏以郡國雖有學縣黨亦}
