  - {type: variant, offset: 22, length: 0, content: '', krp: 槐市淮南子辟雍以本之揚子史願造太學修先王之道風行俗成萬世之基定前賈山傳至言太學者賢士之所闗也教化之本原也董仲舒傳對策其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始儒林傳序古之立太學將以傳先王之道流化於天下也漢書成帝紀劉向說上興辟雍以風化天下禮樂志太學者禮義之宫教化所興也後朱浮傳書聖王之建辟雍所以尊崇禮義既富而教之也張純傳議修起大學稽式古典籩豆千戚之容備之於列服方領習矩步者委蛇其中儒林傳記先帝立辟雍恢𢎞大道被之八極明帝紀詔辟雍禮得則太徴諸侯明晉志太宗天下初定增築學舎千二百區唐選本志鼓笥踵堂者八千餘人紆侈袂曳方履誾誾秩秩雖三代之盛所未聞也儒學傳序蕭昕請崇太學以植教本本傳古天子學曰辟雍以制言之壅水環繞如壁然以誼言之以禮樂明和天下云爾在禮為澤宫故前世或曰壁池或曰壁沼亦言學省請以國子監為辟雍省歸崇敬傳議國庠雖設冠履或濫裴抱傳制䇿殄趨競之風勵生徒之制子衿之什不作棫樸之詠有聞同上葺國學振儒風牛僧儒制策太學明教之源也宗策圜水為辟雍古之制也張齊賢傳傳記辟雍天子饗飲處也流轉王道周而復始說文辟積也積天下之道徳也雍壅也壅天下之殘賊也白虎通王者作圎池如壁形實水其中以圜雍之桓譚新論辟雍水四周於外象四海也三輔决録集辟雍海流道徳之富班東都賦乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑皇儀孝友孔明辟雍詩春日載陽合射辟雍張東京賦講曲禮於辟雍曽植七啓兩學齊列雙字如一名延國胄左納良逸辟雍嵓嵓規圎矩方階序牖闥雙觀四張流水湯湯造舟為梁學尤賦太學四年朝韲暮鹽韓文本朝熙寧四年中書門下言近制增廣太學益置生員其生貟分三等以初入學生貟為外舎不限貟自外舎升内舎内舎升上舎上舎以一百貟内舎以二百貟為限其生貟各治一經從所請之官講授至判官直講逐月考試到優等舉業並申約中書㑹要初建太學只有十齋曰服膺禔身習是守約存心允蹈養正持志率履誠意續置七齋曰觀化貫道務本果行謹信時中循理後又申請増置三齋曰節信經徳立禮共二十齋周學士上庠録紹興十三年熊彦逺乞依嘉祐治平故}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 監學生並給綾紙命詞詔從之言行録幸學經王親視學記王制食三老五更於太學天子􅃝而割牲執醬而饋執爵而酳記祭義史陛下尊敬先聖垂意古典堂室未飾干戈未休而先建太學造立黌舎比日車駕親臨享將以𢎞時雍之化也光武朝朱浮疏漢明帝永平二年二月臨辟雍初行大射禮十月幸辟雍初行養老禮本紀明帝即位盛清道之儀􅃝割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人其圜橋門而觀聽者葢億計儒林傳序晉武帝幸辟雍行鄉飲之禮賜太常博士學生帛本紀太宗幸太學觀釋菜命穎達講經畢上釋奠頌唐孔穎達傳集臨辟雍揚緝熙宣皇風班東都賦於乎辟雍辟雍沈沈天子所臨或弦或歌講古述今其徒八千纓弁森森貊穢羌髳咸詠徳音羽林孤兒亦垂青襟吕温虞世南贊本朝建隆二年帝幸國子監三年又再幸焉太平興國四年駕幸國子監端拱元年幸國子監謁文宣王廟淳化五年亦如之㑹要太宗幸國子監學官孫覺方聚徒講說帝詔覺講泰卦覺因述天地感通}
