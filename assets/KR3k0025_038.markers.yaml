  - {type: variant, offset: 181, length: 0, content: '', WYG: 敕州縣每鄉之内各置一學仍擇師資令其教授唐書李栖筠為常州刺史大起學校堂上書孝友傳以示諸生為鄉飲酒禮登髙降飲人人知勸本傳常衮為福建觀察使始閩人未知學校為設鄉校始作為文章親加講導由是風俗一變本傳倪若水為許州刺史興州縣學徒廬勸生徒身為教誨風化興行本傳傳記泮宫者明尊卑有差所化少也半於天子之宫也半者象璜也獨南面禮儀之方有水耳白虎通列槐樹數百行諸生朔望㑹此中雍雍揖遜論議槐下藝文類聚本朝國初未建州學乾興元年兖州}
