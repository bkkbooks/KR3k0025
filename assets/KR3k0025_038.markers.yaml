  - {type: variant, offset: 238, length: 1316, content: 之教以不忘先帝也乃吞藥自殺通監秦紀楚地皆降漢獨魯不下史記項羽紀蘇武既徙北海上單于使李陵至海上為武置酒設樂因謂武曰足下兄弟二人前皆坐事自殺來時太夫人已不幸子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此武曰自分已死久矣王必欲降武請畢今日之驩效死於前陵見其至誠喟然歎曰嗟乎義士陵與衛律之罪上通於天因泣下霑衿與武決去武留匈奴凡十九歲始以強壯出及還鬚髮盡白通監漢昭紀翟義曰死國埋名可以不慚於先帝通監漢平紀莽安車駟馬迎龔勝勝對曰豈以一身事二姓下見故主哉通監漢平紀校尉太原溫序為隗囂將荀宇所獲宇曉警數四欲降之序大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人宇眾爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜須於口顧左右曰既為賊所殺毋令鬚汙土遂伏劍而死通監漢光武楊彪以累世為公卿恥為魏臣稱疾續漢書雖死之日猶生之年也東漢陳元傳士雖百行操業萬殊至於義節百行之冠冕也蜀姜維傳龐德罵關羽曰我寧為國家鬼不為賊將也魏志志烈秋霜精貫白日晉忠義傳序重義輕生亡軀徇節白刃可陵正心難折晉忠義贊守鐵石之深衷厲松筠之雅操見正心於歲暮標勁節於南風赴鼎鑊其如歸履危亡而不顧晉忠義傳序勁松方操嚴霜比烈晉書忠義傳贊秦王堅歎曰周孟威不屈於前丁彥遠潔已於後吉祖沖閉口而死何晉氏之多忠臣也通監晉武紀魏帝禪位于晉司馬孚拜辭執帝手流涕歔欷不自勝曰臣死之日固大魏之純臣也通監晉世祖紀楊盛聞晉亡不改義熙年號謂其子玄曰吾老矣終為晉臣通監南史宋高祖紀陶潛自以高祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏年號自永初以來甲子而已南史本傳先軫喪元王蠋絕脰殞身殉義前代多之北史魏志露竹霜松故多勁節北史節義傳唐王之入關張季珣之弟仲琰弟琮兄弟三人皆死國難時人愧之通監唐高祖風霜其操鐵石其心同上李希烈留顏真卿不遣朱滔王武俊田悅李納各遣使詣希烈上表稱臣希烈召顏真卿示之真卿叱之曰汝知有罵安祿山而死顏杲卿乎乃吾兄也吾年八十知守節而死耳希烈乃使甲士十人守真卿於館舍掘坎於庭云欲坑之真卿怡然見希烈曰死生已定何必多端亟以一劍相與豈不快公心事耶希烈乃謝之通監唐德宗紀朱泚反德宗使叚秀實往泚召秀實議事語至僭位秀實奪源休笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反耶遂擊之泚舉臂捍笏中顙流血新唐書段秀實傳顏杲卿嗔罵安祿山曰我世唐臣守忠義恨不斬汝謝上乃從汝反邪祿山不勝怒忿節解以肉噉之罵不絕唐書本傳巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也唐書張巡傳贊朱泚反諸生將從亂蕃正色叱不聽故六館無受汙者唐何蕃傳互入轉移人心屈突通口與心誓以死許國自摩其頸曰要當為國家受人一刀耳唐書身可殺而名不可死終始一操雖頹嵩岱不吾壓也唐書忠義傳躬可殞而名與嵩岱等矣唐書張鑑傳毅然之氣折而不沮唐書段秀實傳集守節沒齒忠莫至焉文選賦序互入忠鯁志烈秋霜心貞崑玉梁劉峻辨命論壯志凌蒼兕精誠貫白虹駱賓王集血三年而藏碧魂一變而成虹同上貞心凌晚桂勁節掩寒松駱賓王非稟乾坤之秀氣含宇宙之淳精孰能負凌雲概日之姿抱積雪封霜之骨同上清風蕩萬古跡與星辰高李太白集澗松抱節幽蘭有薰歲寒不變無人亦芬歐陽詹傳清標霜潔馨德蘭薰柳文涇原之亂柳惟深以變起卒遽奔匿賊徒及公而問焉追以相印公變名氏以紿之賊平公初名載, WYG: ''}
