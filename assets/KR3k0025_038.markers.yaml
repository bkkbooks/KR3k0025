  - {type: variant, offset: 36, length: 0, content: '', WYG: 已降不武命去之乃詔張昭竇儀髙錫等取歴代謀臣各將功業始終無瑕者配享㑹要四年詔曰武成王廟従祀神像齊相管仲宜塑像升於堂西河太守吳起宜畫像降於廡下㑹要大中祥符元年詔尚父宜加諡昭烈武成王慶厯三年詔置武學於武成王廟以阮逸為教授八月罷武學議者以為古名将如諸葛羊祜杜預裴度等豈甞專學孫吳立學無謂故也熙寧五年樞宻院言古者出師受成於學文武弛張其道一也洪惟仁祖甞建武學横議中輟識者悼之欲乞復置武學以追成先朝之志詔於武成王廟置學並同上胡翼之乞興武學講論語使知忠孝之道講孫吳使知制勝之術撰成武學規矩一卷時議難之言行録餘見武博武諭類宗學本朝兩漢宗室設學未聞唐初為皇族子孫别立小學}
