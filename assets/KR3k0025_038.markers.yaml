  - {type: variant, offset: 10, length: 5, content: 如松柏之有, WYG: 宵雅肄三官其始也入學鼔篋孫其業也夏楚二物収其威也未卜禘不視學游其志也時觀而弗語存其}
  - {type: variant, offset: 10, length: 5, content: 如松柏之有, krp: 宵雅肄三官其始也入學鼔篋孫其業也夏楚二物収其威也未卜禘不視學游其志也時觀而弗語存其}
