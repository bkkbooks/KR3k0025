  - {type: variant, offset: 3, length: 0, content: '', WYG: 漢室龍興開設學校書序子衿刺學校廢也亂世則學校不修焉詩序有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠記王制米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也泮宫周學也明堂位凡入學以齒文王世子古之教者家有塾黨有庠術有序國有學學記子謹庠序之教申之以孝悌之義孟子設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也同上立太學設庠序修六禮明教所以導之也荀子校學以教之揚子史漢髙祖喟然興於學然尚有干戈亦未遑庠序之事也前儒林傳序成帝朝劉向説上宜設庠序陳禮樂隆雅頌之聲盛揖遜之容以風化天下禮樂志聖主設庠序以教之里有序而鄉有庠序以明教庠以行禮而觀化焉食貨志服儒衣稱先生遊庠序聚黌塾者蓋布之邦學矣後儒林傳論謂光武明帝養三老五更於辟雍然徳化未流洽者以庠序尚未之設故也禮樂志古之建國有明堂辟雍之制鄉有庠序學校之儀皆所以抽導幽滯啓廣才思晉戴邈上疏風化之本在於正人倫人倫之正在乎設庠序庠序之設五教明徳禮洽通彛倫攸叙王導上書昔之明王建庠序於京畿立學校於羣邑見李訢傳延集英儒廣開學校用能闡道義於八荒布盛徳於中國鄭道昭傳崇建學校以厲風俗使先王之道光演於明時郁郁之音流聞於四海髙允傳京邑達乎四方皆啔黌校齊魯趙魏學者尤多負笈從師不逺千里講誦之學道路不絶隋儒林傳永徽以來庠序諸生未聞甄異是奨勸之道未周也唐劉祥道疏元宗朝楊瑒奏國家啓庠序廣化導將有以用而勸進之本傳陸贄請視學校興廢以稽教導本傳傳記鄉曰庠庠者詳禮義也里曰序序者序長幼也白虎通集四海之内學校}
