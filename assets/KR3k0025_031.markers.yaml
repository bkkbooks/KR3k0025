  - {type: variant, offset: 533, length: 0, content: '', WYG: 路十如今便入翰林如何到老玉泉子記集每宴飲無不先及每慶賜無不先霑中廏之馬代其勞内厨之膳供其食白集晨趨紫禁中夕待金門詔李白李侯金閨彦老杜贈李白君王曉坐金鑾殿只待相如草詔來李商隠銀花懸院牓李徳裕謬入金門侍玉除苑花似雪同隨輦宫月如眉伴直廬白樂天本朝太宗皇帝曰詞臣實神仙之職也玉堂東西壁悉畫水以布之風濤浩渺瀛洲之象也脩篁鵠鶴悉圗廊廡風傳禁漏月色滿庭真人世之仙境李昉赴玉堂賜宴詩後序云今日之盛其事七新賜衣帶鞍馬十月朔錦袍特定草麻例物改賜内庫法酒俸給見錢給親事官隨從就院敕設玉堂後廡建二閤畫煙嵐曉景續翰林志太宗謂宰臣曰蘇易簡乞御飛白書玉堂之署四字今付宰臣李昉以下喚来於中書堂面宣賜職任之親切曹局之凝嚴禮遇優渥賜與繁縟金坡遺事政和五年御書摛文堂賜學士院院中有雙鵲栖於玉堂之後海棠樹或鳴噪必有大詔及宣召之事續㑹要學士院牕格上有火燃處太宗嘗幸玉堂蘇易簡已寢遽起無燭宫嬪自牕格引燭入照之至今不欲更易以為玉堂一盛事學士院北扉者為其在浴堂之南便於應召故事堂中設視草臺每草制則具衣冠據臺而坐學士院第三㕔學士閤堂前有一巨槐素號槐㕔舊傳居此閤者多至入相翰林院在禁中玉堂承明金鑾殿皆在其間筆談衣惹御香拖瑞錦筆宣皇澤洒春霖李助青輪輝映輕前古丹地深嚴隔世塵賈黄中日上花磚簾捲後栁遮鈴索雨晴初錢}
