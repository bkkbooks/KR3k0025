  - {type: variant, offset: 474, length: 0, content: '', WYG: 一宋潘自牧撰職官部翰苑史學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮尤寵而翰林院者待詔之所也唐志李白天寶初至長安往見賀知章知章見其文而歎曰子謫仙人也言於𤣥宗召見金鑾殿論當世事奏頌一篇有詔供奉翰林本傳翰林院者在麟徳殿西重廊之後盖天下以伎術召見者之所處也學士院者開元}
