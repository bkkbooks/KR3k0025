  - {type: variant, offset: 2611, length: 390, content: 不擇地海角亦逢春古今詩話子跬步不休跛鱉千里荀子駑馬十駕功在不捨同上經有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也詩江有汜說以使民民忘其死詩東山志微噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣憤之音作而民剛毅廉直勁正莊誠之音作而民肅敬寬裕肉好順成和動之音作而民慈愛記樂記子韓娥之齊鬻歌聲哀一里老幼悲怨復為長歌老幼喜抃列子夫榮啟期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感于憂動諸琴瑟形諸聲音而能使人為諸哀樂淮南子主術訓荊軻入秦宋意擊筑歌於易水之上聞者瞋目髮直穿冠趙王遷於房陵心懷故鄉作山水之謳聽者嗚咽泣涕流連簞醪注流軍士通醉溫辭一灑師人挾纊並釗子史楚伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左成十二燕昭王為郭隗改築臺師事之其後樂毅自魏往鄒衍自齊往劇辛自趙往士爭趍燕史記漢王下令軍士不幸死者吏為衣衾棺歛轉送其家四方歸心焉通監漢高紀趙佗稱制與中國侔帝乃為佗親冢在真定者, WYG: 初}
