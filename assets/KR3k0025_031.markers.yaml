  - {type: variant, offset: 4211, length: 1, content: 可, WYG: 奉法以縱罪為寛恕以守文為苛刻遂上應正論以見志唐書大理正掌參議詳正科條之事唐志傳記龍朔改為詳刑大夫光宅中為司刑正後復故掌議獄正科條凡丞斷罪有}
  - {type: variant, offset: 4211, length: 1, content: 可, krp: 奉法以縱罪為寛恕以守文為苛刻遂上應正論以見志唐書大理正掌參議詳正科條之事唐志傳記龍朔改為詳刑大夫光宅中為司刑正後復故掌議獄正科條凡丞斷罪有}
  - {type: variant, offset: 4213, length: 3, content: 備度笑, WYG: 當者則以法正之唐紀視南臺持書以為晉制通典天隂雨比干夢貴客車騎滿門覺以語妻語未已有老嫗謂比干曰公有隂徳今天賜君䇿因出懷中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此自汝隂徙平陵代為名族何氏家傳集古風真往哲雅道濫朝聞活獄威豪右銷時賴典墳垂銀棘庭印持斧栢臺綱范咸送大理正攝御史詩本朝神宗復置大理獄後置寺正元豐五年刑部奏乞分評事司直與正為斷司丞與長貳為議司凡斷案先上正㸔詳當否論難改正然後過議司覆續㑹要建炎併省斷刑治獄寺正各置一貟中興㑹要范旻判大理正事持法平允太宗實錄正於理官參贊為正南豐陳林純制司直史唐王祚為司直馳傳決獄所至仁平唐書傳記後魏永安三年髙穆奏置司直十人位在正監上不署曺事惟覆理御史檢劾事六典司直凡承制而出先請魚書以往白帖司直凡大理斷獄皆連署同上集清絶聞詩語䟽通豈法流傳家有衣鉢斷獄盡春秋東坡不耻青袍故尤宜白髮新李嘉祐送韋司直驊騮事天子辛苦在道路司直非冗官荒山甚無趣杜甫本朝熙寜中置大理寺獄至元豐五年始命程嗣先四人為司直續㑹要建炎三年詔斷刑司直兼治獄司直其治獄司直罷中興㑹要評事史漢宣帝地節三年初于廷尉置左右平貟四人漢書馬宫行能髙潔遷廷尉平漢書漢宣帝詔曰吏用法巧文滋深其為置廷平務平之於是選用于定國黄霸等同上何攀上便宜十事除廷尉平晉史唐姚正操云自餘以評事入臺後相繼不絶韓琬以為不然自則天好法刑曹望居九寺之首以此評事多入臺迄今為雅例唐志傳記魏晉以来無左右而直謂之廷尉評隋置大理評事六典唐貞觀二十二年褚遂良議重法官奏置評事十貟掌出使推覆後加為十二貟通典王敬由為評事奉使河南叱咤風生到廣陵訪裴諶諶曰評公使車留此一宿得無驚郡將乎廣記漢公孫𢎞舉何比干為廷尉右評獄無寃民號曰何公三輔决録寺簿史陳希㸃為太學博士遷大理寺簿人為之憤然公忻然就職素不讀律而原情引經法家自以為不及本傳傳記晉初置廷尉主簿六典後齊九寺各有主簿唐置二人掌印省置抄目勾檢稽失同上薛季宣為大理主簿是歲江湖大旱流民往往北渡江邊吏復奏淮民多欵塞者遣公行淮西收以實邊公持節勞来吕東萊集集法吏多少年磨淬出角圭將舉汝愆尤以為已階梯韓愈本朝元豐正名初除二貟建炎三年省後復中興㑹要司農卿經太府掌九賦九貢禮史秦為治粟内史主穀貨韓信歸漢為治粟内史即其任也景帝更名大農令武帝太初更名大司農漢書魏梁習為并州二十餘年政治為天下最召拜大司農魏志鄭當時為大司農門下客亡貴賤亡留門者山東諸公翕然稱鄭莊武帝}
