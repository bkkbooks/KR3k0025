  - {type: variant, offset: 2143, length: 0, content: '', WYG: 韋處義以穆宗沖怠不向學即與路隋合六經掇其粹要題為六經法言二十篇冀助省覽帝稱善韋處厚路隋為侍講穆宗召入太液亭命分講毛詩闗雎尚書洪範等篇訪以理體處厚等演經義以廣規諷}
  - {type: page-break, offset: 2143, content: '', id: KR3k0025_WYG_031-13b, image: WYG0930/WYG0930-0680d.png}
  - {type: variant, offset: 2143, length: 0, content: '', krp: 韋處義以穆宗沖怠不向學即與路隋合六經掇其粹要題為六經法言二十篇冀助省覽帝稱善韋處厚路隋為侍講穆宗召入太液亭命分講毛詩闗雎尚書洪範等篇訪以理體處厚等演經義以廣規諷}
  - {type: variant, offset: 2144, length: 0, content: '', WYG: 道鄭澣文宗時為侍讀學士帝使搜擷經史為要錄舉諸條摘問之隨即酧析無留王起文宗時侍講時或僻字疑事令中使口宣即以牓子寫對故起著口宣十卷文宗召王起許康佐為侍講學士栁公權為書學士每有疑義即召入便殿顧問討論謂之三侍學士唐書傳記馬懷素禇無量同為侍讀更畨日入既叩閤肩轝以進宫中每宴見帝目送迎以師臣禮職林集授道帷幄師範之功贈司空臨晉侯冊虎觀諸儒許丁鴻之博學唐制詞賦成於鼓吹典墳富於泉海馬懷素制殿横儒席中宗哀冊祇事穆宗侍經内殿敷堯舜之大典暢周禮之遺風雅言玉音奥義氷釋路隋制本朝太平興國八年始因吕文仲為侍讀尋又為翰林侍讀咸平二年以楊徽之夏侯嶠為翰林侍讀學士邢昺為翰林侍講學士始建學士之職㑹要景徳四年以翰林侍講學士邢昺知曹州侍講學士外使自昺始也天禧三年張知白充翰林學士知天雄軍府翰林學士外使自知白始也元豐官制廢翰林侍讀侍講學士以為兼官元祐七年復增學士之號元符元年省去續㑹要明道五年馮元侍講上金華五箴本傳趙元昊反罷進講趙師民獻勸講箴至是復命講讀經史慶厯二年召御史中丞賈昌朝侍講故事臺臣無在經筵者以昌朝長於講說特召之帝學舊制坐而論道别置書冊於御前仁宗富於春秋令儒臣立就御案便於指示神宗朝王安石侍讀以為道之所存禮亦加重請復賜坐不行元祐初程頤為侍講復請坐不從元祐間蘇頌為侍講請遇不講日各進漢故實二事仍於逐事後畧論得失大㫖吕氏家塾廣記錢象先自講筵出知蔡州帝諭之曰大夫行有日矣宜講徹一編元祐初將啓講筵宣仁諭執政云啓與蔡卞皆少年宜用老成端士乃以彦博兼侍讀四朝史西學上賀玷侍臣之髙選奉天子五學之遊日奉講幄}
