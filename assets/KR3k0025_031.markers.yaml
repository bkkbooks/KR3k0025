  - {type: variant, offset: 1994, length: 5, content: 泰山選枚乘, WYG: 便殿對明皇撰詔誥時十月大寒筆凍莫能書字帝敕宫嬪十人侍白左右令各執牙筆呵之白遂受而書其受聖眷如此開元遺事李琪每臨流坐石摘木葉試草制詞朱梁時果為翰林學士瓚言姚洎為學士梁祖問及裴延裕曰頗知其人思敏洎曰向在翰林號下水船梁祖曰卿便是}
