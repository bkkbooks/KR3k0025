  - {type: variant, offset: 1989, length: 0, content: '', WYG: 簡詩云翰林承㫖貴清浄玉堂中張方平為承㫖神宗親劄曰卿文章典雅煥然有三代之風而又善以多為少意博辭寡雖書訓誥無以加也本傳金鑾玉堂親被絲綸之宻北㕔東閤獨稱年徳之尊東坡表宜還與}
