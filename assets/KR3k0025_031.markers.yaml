  - {type: variant, offset: 2178, length: 2, content: 非弊, WYG: 命下以通直郎充崇政殿說書實錄吕希哲字原明為說書凡二年日夕勸導人主以修身為本修身以正心誠意為主心正意誠天下自化不假他術身不能修雖左右之人且不能論况天下乎言行錄景祐元年以賈昌朝為崇政殿說書昌朝講說明白上喜之多所質問昌朝悉記錄歳終以付史館事畧近制兼職雖宰相領國史實錄院勅令所玉牒所降勅而已惟講讀官下至說書皆命詞給告可見崇儒重道之典也周益公文集總九卿史夏商九卿周六官是為六卿又立少師少傅少保是為三孤與六卿為九前漢百官志後漢左雄言九卿位亞三事班在六官行有珮玉之節後漢書三公比三星曰九卿隋志二千石以下六百石佩兩印皆以黑犀司馬彪漢書九卿位為列棘南史齊侯}
