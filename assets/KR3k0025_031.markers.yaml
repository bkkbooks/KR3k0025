  - {type: variant, offset: 2064, length: 4, content: 輕躁很戾, WYG: 故宰相曰昉以本官直學士院未即真拜真拜學士在多遜之上開寶二年李文正盧相並直學士院太平興國元年湯恱徐鉉直學士院王克正張洎直舍人院四公皆江南文士也退朝錄經筵史宣帝召韋𤣥成與五經諸儒雜論於石渠閣成帝嚮學鄭寛中張禹說尚書於金華殿中詔頒白綬焉漢書光武好經術每朝㑹令桓榮敷奏經義章帝㑹諸儒白虎觀講論五經同}
