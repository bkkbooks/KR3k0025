  - {type: variant, offset: 4219, length: 1, content: 彰, WYG: 大司農居處節儉漢書後漢鄭衆為司農在位以清正稱趙典為大司農閉門却掃非德不交並後漢書傳記少皥氏以九扈為九農正通典唐有司農卿一人少卿二人龍朔二年改為司稼咸亨復卿掌邦國倉儲委積之事通典牟融為大司農性明達稱為名卿東觀漢記陳寵為廣漢太守風聲大行入為大司農張播記唐杜中立遷司農卿初度支度六宫餐錢移司農季一出付吏大吏盡舉所給於人權其子錢以給之既不以時黄門来督責慢罵中立取錢納帑舎率五百一出吏不得為奸遂以為法唐書集以清明之徳掌周稷之粟國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不作兹選假以秩崇之榮用制國泉之重裴司農制本朝司農寺判寺事二人以兩制或朝官以上充熙寜二年立常平斂散法三年詔以新法付司農寺而農田水利免役保甲等法悉自司農講行建炎三年詔罷司農寺紹興四年復置司農寺卿少各特置一貟中興㑹要少卿史後魏北齊司農寺置少卿隋唐因之職官唐韋機拜少卿有宦者於苑中犯法機杖而後奏髙宗嗟賞賜絹數十疋唐書韋機受詔檢授東郡營田苑囿之事髙宗謂之曰宫館隋代所造漸將摧毁頻修費財力如何機奏曰臣任司農向已十年前後省費今見貯錢三十萬貫可以供葺理上恱同上本朝元豐間置少卿為卿之貳建炎三年省紹興四年後置司農卿少各一員中興㑹要熊本判司農寺丞神宗曰熊本不傷財不害民一旦去百年之患檄奏詳明可嘉也東都事畧寺丞史秦治粟内史有兩丞漢司農丞亦二人或謂之中丞耿夀昌為大司農中丞奏設常平倉給北邉省轉運又桑𢎞羊為大司農中丞管諸㑹計事唐有丞六人掌判寺事凡天下租稅及折造轉運於京師皆閱而納之以供國用以祿百官百官志本朝呂惠卿請置司農寺丞一貟熙寜五年增置丞四貟元豐四年舒亶請止留丞一貟餘並罷續㑹要建炎二年詔罷司農寺紹興三年復置寺丞二貟中興㑹要寺簿傳記晉太康中置主簿一人自後無聞梁陳又有北齊亦然唐主簿二人掌印署抄目勾檢稽失出納通典本朝治平中已置主簿熙寜新法行詔增置一貟五年增至四貟後又置六貟續㑹要建炎三年罷司農紹興十年復置中興㑹要太府卿史太府之職以二法平物一曰度量二曰權衡唐百官志李襲譽召為太府為人嚴慤以威肅聞本傳楊崇禮開元為少卿雖錢帛充牣丈尺皆躬自省閱時以為前後無與為比擢拜太府卿本傳傳記周官太府下大夫掌九貢九賦之貳九功受其貨賄之入頒其貨於受藏之府秦漢以下不置唐初置之龍朔二年改太府為外府正卿咸亨復楊國忠判度支𤣥宗觀左藏庫喜其財幣山積面賜國忠金紫權太府卿國忠專於左藏府而太府四時以數聞通典集領貢獻於四方杜彼虛耗掌財用於五庫職有司存白樂天居監臨之官典出入之務同上㑹帑藏出入之要修權量平校之法同上本朝太府寺判寺事一人以兩制或帶職朝官充凡財貨廩藏貿易四方貢賦百官俸秩皆𨽻三司本寺但掌供祠祭香帛帨巾神位席及造斗秤升尺而已元豐改制始正職掌四朝志財賦掌於他官而太府司其出納非明於金谷之要不在兹選南豐集少卿史後魏孫詔為少卿帝問卿何年老對曰臣年雖老臣節尚少北史尹思貞為司府少卿時侯知一亦厲威嚴吏人為之語曰不畏侯卿杖惟畏尹卿筆唐書傳記後魏孝文帝改少府為太府置少卿一人北齊因之隋煬帝加至二人唐減一人貞觀初龍朔咸亨光宅神龍並隨寺改復六典集出納之地眷求惟精兼領三尚之班以榮四至之列白樂天制本朝太府寺同判寺一人以京朝官充元豐正名置少卿一人以為卿之貳元祐三年詔太府長貳並置餘則否續㑹要建炎中興省紹興四年復㑹要九賦領受之政百貨貿遷之法典領之任位次列卿南豐集寺丞傳記丞於周官為太府上士之任梁選部太府丞一人陳因之後魏亦一人後周曰太府上士隋又曰太府丞六人唐四人通典太府掌邦國之出入而丞屬分治衆務職略本朝元豐改制置丞二人元符中增一貟宣和中省一貟紹興三年詔復置㑹要太府受邦國之出入而設丞屬俾預叅贊欲勝是任必惟其人國朝制寺簿傳記主簿亦周太府下士之任梁置一人陳因之後魏一人隋四人唐二人掌印省署抄目勾檢稽失通典本朝元豐改制置主簿二人續㑹要建炎三年罷太府寺紹興十年復置中興㑹要光禄卿史光禄寺卿一人從三品少卿二人從四品百官志龍朔二年改光祿寺曰司宰寺光宅元年曰司膳寺同上杜林為光祿勲内奉宿衛外總三署周密敬慎選舉稱平漢書王肅為光祿勲時有魚集武庫肅辨之曰魚生於泉而見於庫失其所也邊將殆有棄甲之變後果有東闗之敗魏志傳記光祿卿漢官也齊職儀云初秦置郎中令掌宫殿門戸及主諸郎之左殿中侍衛故曰郎中令漢因之至武帝更名光祿勲至梁加卿字初學記孫湛為光祿以清廉見稱東觀漢記集經兆宫室畫為中外廊殿門闥限以禁衛楊䧺光祿箴德人立朝義士充庭祿巨司光敢告執經同上本朝光祿寺判寺事一人以朝官以上充元豐官制行置卿少卿丞主簿各一人中興後廢光祿併入禮部通考太僕卿史太僕寺卿掌廏牧輦輿之政總乗黄典廏典牧車府四置及諸監牧行幸供五路屬車百官志永徽中太僕司曰司馭光宅元年改曰司僕寺同上夏侯嬰為沛公太僕常奉車嬰自上初起常為太僕竟髙祖以太僕事惠帝髙后漢書石慶為太僕御出上問車中㡬馬慶以䇿數馬舉手曰六馬慶於兄弟中最為簡易而猶如此同上晉郭展為太僕心精於養畜是以馬充盛其後伐吳得以濟事晉史傳記太僕周官也秦因之掌輿馬歴漢後魏及晉兩朝咸置之初學記穆王命伯冏小大之臣咸懷忠良其侍御僕從罔匪正人外記後漢祭彤字次孫膂力過人入為太僕從上至魯昭帝入孔子廟至子路室曰此太僕之室也太僕吾之禦侮東觀漢記集周用忠良任先伯冏漢推廉正選在萬年守清近之臣居僕御之任白樂天朝欽厥庸出尹京畿迴授太僕四牡騑騑騄耳盈箱翠華葳㽔勲齊庭實增國之輝孫楚本朝太僕寺判寺事一人以朝官以上充凡邦國廏牧車輿之政令今分𨽻郡牧司騏驥院諸坊監本寺但掌天子五輅屬車后妃王公車輅給大中小祀牛羊通考鴻臚寺史鴻臚寺卿一人掌賓客及凶儀之事百官志漢郭况為鴻臚上數幸其宅飲酒賞金帛甚豐京師號况家為金穴漢書劉}
