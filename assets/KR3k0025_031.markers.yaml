  - {type: variant, offset: 3825, length: 357, content: 卒莫不感悅有不預征名自願以私裝從軍動以千計皆曰不求縣官勳賞惟願效死遼東通監唐太宗山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下通監唐肅宗李懷光叛其將降馬燧以數騎入城慰撫其眾大呼曰吾輩復為王人矣通監唐德宗唐德宗在奉天時赦令武夫悍卒無不感動思奮唐書陸贄傳僕固懷恩誘吐蕃等南下急召郭子儀屯涇陽回紇曰令公誠存安得而見之子儀將出諸將請無往子儀曰虜收十倍之眾今力固不敵至誠感神況虜乎諸將請選鐵騎五百子儀曰適足以為害也即傳呼曰令公來虜初疑持滿注矢以待之子儀以數十騎徐出免冑而勞之曰安乎久同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領入朝舊唐書本傳互入處事閑暇遣知制誥裴度至魏博宣慰以錢百五十萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成德兗鄆使者數輩見之相顧失色嘆曰倔強者果何益, WYG: 輕}
