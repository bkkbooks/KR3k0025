  - {type: variant, offset: 2059, length: 4, content: 叫呼跳梁, WYG: 上曾陪鶴駕之逰六學士中猶有漁翁之歎廣記直學士院權直本朝開寳二年李昉盧多遜並直學士院直院之名始此六年張澹權直翰林院權直之名始此凡他官入院未除學士謂之直院學士俱闕他官暫行文書謂之權直㑹要乾道九年以崔端詩為翰林權直孝宗㑹要李昉入直翰林先是盧多遜己任學士太祖見昉在多遜下問}
