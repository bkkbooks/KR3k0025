  - {type: variant, offset: 2057, length: 0, content: '', krp: 地當以宿儒}
  - {type: variant, offset: 2058, length: 0, content: '', WYG: 之又曰禁中非此人不可故事學士在内中院吏朱衣雙引李昉以太宗在南衛朱衣一人前引昉亦去其一太宗謂近臣曰學士之職清切貴重非他官可比玉署之設宻邇紫闈每夜漏既上宫鑰並入有大號令大除拜邉境急奏惟天子與學士知之居是職者豈不貴重乎金坡遺事王旦為翰林學士中外皆以為宰相器真宗曰為朕致太平必斯人也李迪真宗時為學士上問陜西兵㡬何對曰臣向在本道以小冊書兵馬糧草之數以備調發今猶置佩囊中帝令探取之曰不意頗牧復在吾禁中本傳鼂宗慤一夕草除將相五制真宗作歌一首賜新除學士陳彭年因謂向敏中曰頃命學士罕曾賜歌詩天聖元年詔學士遇雙日至晩方下直盖故事以雙日鎻院隻日除麻故也實錄非徒翰墨之選乃是將相之儲東坡謝表有同在翰林而大拜者王禹偁以啓賀之云三神}
  - {type: page-break, offset: 2058, content: '', id: KR3k0025_WYG_031-10b, image: WYG0930/WYG0930-0679b.png}
