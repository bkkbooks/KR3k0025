  - {type: variant, offset: 4203, length: 1, content: 蔡, WYG: 彼嘗陷公於死今生之何也對曰爾所言者私忿我所守者公法不可以私害公白帖集佐棘竟誰同因思證聖中事雖無復報理合有隂功韓詩居屈亞卿未副羣情韓文本朝以朝官一貟兼少卿事神宗置大理獄少卿二貟以蹇周輔楊汲為之分左斷刑右治獄四朝志建炎中興省大理卿而少卿二貟如故中興㑹要仁宗時陳大素權大理少卿又判大理寺號為明習法令長編參典之官貳正之選南豐擬制大理正經成獄辭史以獄成告於正正聽之禮記史秦置廷尉正一}
