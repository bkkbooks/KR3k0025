  - {type: variant, offset: 2054, length: 2, content: 狙猴, WYG: 學士金鑾殿後居天中行坐侍龍輿承恩不許離床謝宻㫖長教倚案書王建本朝翰林學士掌内制淳化二年以翰林學士賈黄中蘇易簡同管勾差遣院自是學士兼領他司止與職名同元豐官制行始專典内制乾徳元年竇儀為翰林學士太祖曰深嚴}
