  - {type: variant, offset: 3002, length: 255, content: 守邑歲時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越賜佗書曰前日聞王發兵於邊為冠災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕今得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭而不遜仁者不為也願與王分棄前惡終今以來通使如故賈至南越南越王恐頓首謝罪願奉明詔長為藩臣奉貢職下令去帝制稱臣通監漢文紀悲者不可為絫欷思者不可為歎息故高漸離擊筑易水之上荊軻為之低而不食雍門子一微吟孟嘗君為之於邑西漢中山靖王勝傳滿堂飲酒有, WYG: 少卿}
