  - {type: 'tls:seg', offset: 1992, content: '', id: KR3k0025_CHANT_031-14a.8}
  - {type: variant, offset: 1992, length: 1, content: 安, WYG: 内外命書劉瑑始在翰林帝素器遇至是手詔追還帝視案上厯謂瑑曰為朕擇一令日瑑跽曰某日良帝笑曰是日卿可遂相杜讓能以學士從僖宗在蜀闗東用兵書詔雲委讓能詞才敏速筆無㸃竄動中事機僖宗嘉之唐書傳記唐太宗時名儒學士時召草制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表䟽批答應和文章繼以制敕文誥悉由中書多壅滯始選朝官入居翰林供奉别㫖然亦未定名制詔書敕猶㦯分在集賢開元二十六年翰林供奉改稱學士翰林志選用益重而禮遇益親至號為内相又以為天子私人晉天福五年詔翰林學士院公事宜並歸中書舎人自是舎人晝直者當中書制夜直者當内制開運元年復詔翰林學士與中書舎人分為兩制職源睿聖登極段文昌杜元頴不離内庭便至公輔及寳厯以後韋處厚恩深授選亦自翰林由是稍為故事或不至拜者以為深恥翰林内志姚元崇為翰林學士明皇在便殿甚思元崇論時務七月十五日苦雨泥濘上令侍御者擡步輦召學士中外榮之李白}
