  - {type: variant, offset: 4188, length: 1, content: 互, krp: 廟羣神之祀漢書傳記晉武置籍田令江左省宗元嘉中又置通典集帝籍開千畝農功先九州王孫守耒耜吏隠極風流黄山谷規地餘千畝三推示勸耕廩犧猶故宇潑麥有新楹日至土膏動雪消泉脉生城中若羈束野徑得閒行蔣之竒本朝元豐三年詔籍田令𨽻太常寺續㑹要渡江初闕紹興十五年初除康與之為籍田令三十一年詔田籍司權罷官吏並罷後復置中興㑹要宗正卿史劉向蕭望之薦向宗室忠直明經有行拜為宗正漢書劉般在朝竭忠盡節夙夜不怠拜宗正同上晉羊祜忠厚篤重然不長於理劇宗正卿秩不知可轉作否晉書後魏世祖謂崔浩曰天下諸社何處最欲取一人以為宗正浩曰中書博士杜銓合為諸社之最即命召之既見銓器貌瓌雅世祖謂浩曰此真吾所欲也以為宗正魏史唐宗室司訓棄官中宗即位以耆舊擢為宗正卿唐書傳記秦置宗正掌親屬漢因之以叙九族唐武徳置宗師龍朔改曰司宗開元二十五年置宗正寺官屬皆以皇秩為之通典宗正星在帝座之東南職林宗正寺卿一人少卿二人掌天子族親屬籍以別昭穆通典集丈人領宗卿杜甫詩宗正為冷卿東坡詩巍巍帝堯欽親九族經哲宗伯禮為攸訓屬有攸籍各有胄子世以不錯伯臣司宗敢告執政揚雄宗正箴本朝宗正寺判寺事二人以宗姓兩制以上充闕則以朝官以上知丞事掌奉宗廟諸陵薦享之事司皇族之籍職略建炎三年九月宗正殿曰玉牒殿堂曰屬籍堂㑹要宗正少卿史後魏太和中初置宗正少卿北齊亦然隋皆有職官唐李漢為少卿通古博學屬辭雄蔚唐史本朝祥符中給舎以下兼少卿元豐始正名焉中興罷寺監詔太常少卿兼宗正少卿紹興三年復置少卿六典宗正寺丞史秦宗正掌親屬有丞漢用皇族後漢一人劉茂為宗正丞歴代皆有之隋有二人唐一人掌判司事通鑑漢劉徳召見甘泉宫武帝謂之千里駒昭帝時為宗正丞復為卿漢書集清時為丞郎氣力侔陶鈞劉禹錫本朝元豐五年正名初除趙君錫明年以楊畏為宗正寺丞詔宗正寺除長貳外自今後更不專差國姓續㑹要建炎三年罷紹興五年復置中興㑹要宗正寺簿傳記梁天監七年置北齊隋皆有唐因之通典主簿一人掌印及勾檢稽失分紀開元加一人並於宗室中擇才行者補受六典本朝天禧改元以衛尉丞趙鼎兼宗正寺簿元豐正名初除楊完職略元祐元年宗正寺言既許主簿通管寺事竊恐亦合依太常寺國子監例正通管雜務其編纂圗書乞依舊例丞專修從之㑹要大理卿經帝曰臯陶汝作士五刑有服帝曰臯陶惟兹臣庶罔或干於正汝作士明于五刑以弼五教書史秦置廷尉掌刑辟有正左右監漢因之景帝更名大理武帝復為廷尉宣帝置左右廷尉平哀帝復為大理卿于定國父于公其門閭壞父老方與共治于公曰可髙大其門令容駟馬髙車我治獄多隂徳子孫必有興者至定國為丞相于公為郡曺決獄稱平漢書于定國為廷尉其決獄平反務在哀鰥寡加謹審之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃當漢張釋之為廷尉周亞夫見釋之持義平乃結為親友由此天下稱之前漢書漢宣帝路温舒為廷尉吏上言秦有十失其一尚存治獄之吏是也同上王殷為大理務在寛恕與鍾繇以治獄見稱魏志傳記大理古官也舜命臯陶作士正五刑隋為大理寺唐因之卿一人少卿二人龍朔二年改為詳刑寺咸亨復職略孔坦遷廷尉卿獄多囚繫坦到官躬執辭狀口辯曲直每臺司錄獄無所顧問皆面決當時之事初學記鄭善果為大理卿奉法持正風稜顯於公卿范說為卿持法明審並職林集上卿才大名不朽早朝至尊暮求友髙適晏大理寺卿憐君獨守廷尉法知君決獄有隂功蘇東坡送蔡冠卿恩霑庶類道格𤣥功化覃於萬國之間苛慝不作鳥巢於圜扉之内囹圄知空足驗時清可知刑措韓鎡賦蒼鷹莫鷙寜懷獄吏之憂踈網無寃豈有虞人之懼同上本朝大理寺以朝官一貟或二貟判寺官一貟兼少卿事建隆二年以工部尚書竇儀判寺事㑹要太和四年大理卿崔杞奏大理寺卿陛下守法之司卿設官之重揺動若朝示而暮改同罪而異刑則人何所措其手足哉續通典以五聽察其情氣色視聲辭以三慮盡其理明謹以獻疑獄哀矜以去寃獄公平以鞫庶獄六典少卿史開元初班景倩自揚州採訪使}
