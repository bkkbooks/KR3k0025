  - {type: variant, offset: 559, length: 1348, content: 集諸生業患不能精無患有司之不明行患不能成無患有司之不公韓文公進學解夫有湛盧豪曹之器者患不得犀兇而剸之不患其不利也柳文君子抱仁義不懼天地傾王建集本朝清香肯以無人減歐公陪飲上林院後亭不可取者存乎子取不取者存乎人東坡四菩薩記知命者必盡人事然後理足而無憾物之有成必有壞譬如人之有生必有死國之有興必有亡也雖知其然而君子之養身也凡可以久生而緩死者無不用其治國也凡可以存存而救亡者無不為至於不可柰何而後已此之謂知命東坡墨妙亭記經惟聖罔念作狂惟狂克念作聖書多方禮之於人也猶酒之有孽也君子以厚小人以薄記禮運互入事同體異子仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求則得之舍則失之孟子子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣孟子西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以祀上帝孟離婁下有人於此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳孟盡心下人性之善也猶水之就下也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉人之可使為不善其性亦猶是也孟告子下鍥而舍之朽木不折鍥而不舍金石可鏤荀子勸學厭其源開其瀆江河可竭一進一退一左一右六驥不致荀子脩身故善用之則百里之國足以獨立不善用之則楚六千里而為讎人役荀子仲尼日月星辰禹桀之所同也禹以治桀以亂有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王得其人則存失其人則亡並荀子天道積厚者流澤廣積薄者流澤狹為君子則常安榮為小人則常危辱並荀子跛鼈致之六驥不致是無他故焉或為之或不為之耳荀子脩身百川學海而至于海丘陵學山而不至于山楊子學行晞驥之馬亦驥之乘也晞顏之人亦顏之徒也同上脩其善則為善人脩其惡則為惡人楊子脩身見畏與見侮無不由己楊子五百御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵楊子互入間不容髮假儒衣書服而讀之三月不歸孰曰非儒也楊子互入矯揉耕道而得道獵德而得德楊子譬水火焉善用之則為福不善用之則為禍亢倉子兵道篇今夫毛嬙西施天下之美人若使之御腐鼠蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻嘗試使之施芳澤正娥眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環則雖王公大人有嚴志頡頏之行者無不憛悇癢心而悅其色矣淮南子脩務訓互入間不容髮故魏兩用樓翟吳起而亡西河湣王專用淖齒而死于東廟無術以御之也文王兩用呂望召公奭而王楚莊王專用孫叔敖而霸有術以御之也淮南子記論訓史衛文公元年革車三十乘季年乃三百乘左閔三閔子馬曰禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也左襄二十三李斯見吏廁中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂斯乃曰人之賢不肖譬如鼠矣在所自處耳史本傳今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子所置之湯武置天下於仁義禮樂累子孫數十世此天下所共聞也秦王置天下於法令刑罰禍幾及身子孫誅絕此天下之所共見也西漢賈誼治安策祜之始至也軍無百日之糧至季年有十年之積晉書羊祜傳許敬宗嘆曰士之登庸不係世業履道則為衣冠失緒則為匹庶來護男兒作宰相虞世南男作木匠新唐書來濟傳云作匠將作少匠主工作夫人猶水也壅之則為泉疏之則為川通塞隨流豈有常性通監唐武后疏曰雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長通監, WYG: ''}
