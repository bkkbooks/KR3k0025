  - {type: variant, offset: 1990, length: 1, content: 反, WYG: 禁逰且進承於宻㫖牋表類粉署重来憶舊遊蟠桃開盡海山秋寜知不是神仙骨上到鼇山最上頭宋祁翰林學士史陸贄為學士從幸奉天時機務填委詔書數百贄揮翰起草思如泉注初若不經思逮成皆周盡事情他學士閣筆不得下而贄沛然有餘畢諴為翰林學士党項羌擾河西宣宗召學士對諴論破羌之狀上曰不期頗牧在吾禁中栁公權為翰林學士上嘗夜召對於亭燭窮而語未盡宫人以蠟液濡紙繼之李紳穆宗召為學士與李徳裕元稹同在禁署時稱三俊李徳裕擢翰林學士凡號令大典冊皆更其手陸扆為翰林學士工文辭敏速若注射然昭宗嘗金鑾作賦命學士和扆先成帝曰朕聞貞元時有陸贄吳通元能作内廷文書今得卿斯文不墜矣北㕔前階有花甎道冬日以日影及五甎為入直之候李程性懶常過八甎乃至衆呼為八甎學士李絳為翰林學士孜孜以正諌為己任徳宗以段文昌張仲素為學士韋貫之以為學士所以備顧問不宜專取辭藝奏罷之韋綬為翰林學士宻政多所㕘逮帝嘗幸其院韋妃從㑹綬方寢時大寒以妃蜀纈袍覆而去趙宗儒父驊徳宗欲寵其門使一時並命于休烈及二子益蕭相繼為翰林趙光逢為學士光裔知制誥兄弟對}
