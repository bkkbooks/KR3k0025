  - {type: variant, offset: 3294, length: 437, content: 妻奉順尤篤母好飲江水妻常泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑慚感呼還東漢姜詩妻列傳王脩母以社日亡來歲鄰里社脩感念母哀鄰里為之罷社三國魏志羊祜都督荊州有并吞之心每與吳人交兵剋日方戰不為掩襲之計將帥欲有進譎詐之策者輒飲以醇酒使不得言有略吳二兒為俘者送還其家出軍行吳境刈穀為糧皆計所侵送絹償之游獵常止晉地若禽獸為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利晉書羊祜傳劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞之聲以動其游客之思於是群胡泣去晉書互入處事閑暇轉移人心劉琨在晉陽嘗為胡騎所圍窘迫無計琨乃乘月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊流涕欷歔向曉復吹之賊並棄圍而走晉書本傳互入處事閑暇坐以制勝轉移人心三門劉弘每有興發手書守相丁寧款密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事通監晉懷紀德可感義夫恩可勸死, WYG: 孫修謹}
