  - {type: variant, offset: 532, length: 0, content: '', WYG: 等一十八人皆以𢎞文館學士㑹於禁中當時號十八學士其後永徽中黄門侍郎顧崇復有麗正之稱開元初中書令張說等又有集仙之目𤣥宗始選朝官有辭藝學識者入居翰林供奉别㫖於是吕向尹愔首充焉至二十六年始以翰林供奉改稱學士由是遂别建學士院俾專内命至徳以後軍國務殷其入直者並以文詞共掌詔勅自此翰林院始兼學士之名其後又置東翰林院於金鑾殿之西隨上所在而遷取其便近翰林故事翰林每下直出門謂之小三昧出銀臺門上馬謂之大三昧言出纒縛而就解脫也學士初入院賜馬一疋謂之長借馬登翰林者謂之凌玉清翔紫霄初選者召令赴銀臺試制書批答三首内庫給青綺被紫絲履之類端午賜青團扇貞元中由此而居輔弼者十有二焉元和中由此而膺大用者十有六焉翰林志唐制駕在大内則明福門内置學士院駕在興慶宫則金明門内置院徳宗移院於金鑾坡上續志路延年少自監察入翰林崔鉉}
