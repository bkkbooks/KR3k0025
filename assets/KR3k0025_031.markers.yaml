  - {type: variant, offset: 2141, length: 1, content: 越, WYG: 太祖置講席於便殿聖政仁宗天聖中雙日御筵休務之日亦不廢仁宗初御延義閣每初講論或講讀終篇則宣二府同聽賜飛白書或賜宴其後專御邇英東齊記事英宗詔以九月五日開講至重陽罷先是仁宗率二月開經筵至重午罷八月復開冬至罷吕公著乞依先帝故事上從之哲宗詔開講筵進讀寳訓講讀日赴資善以雙日講論仍輪一員宿直范祖禹節尚書論語孝經訓戒之言名曰三經要法進之行狀髙宗建炎二年謂宰執曰故事自五月至八月罷講朕欲勿罷可乎自是勿罷聖政侍讀侍講史肅宗嘗言張酺入侍講屢有諌正可謂有史魚之風本傳孟侯經傳侍言帝幕張酺贊楊賜侍講華光殿中本傳唐開元三年上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入内侍讀乃以馬懷素褚無量更日侍讀通鑑十三年置集賢院侍講學士侍讀直學士百官志開元中王志愔表薦白履忠隠居讀書正苦守操堪代褚無量馬懷素入閤侍讀徐岱少好學多所探究侍讀兩宫謹守過}
  - {type: page-break, offset: 2141, content: '', id: KR3k0025_WYG_031-12b, image: WYG0930/WYG0930-0680b.png}
