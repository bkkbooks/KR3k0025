  - {type: variant, offset: 4186, length: 0, content: '', krp: 薛稷遷太常少卿會鍾紹京為中書令稷諷使讓因入言於帝曰紹京本胥吏無素才望今特以勲進師長百僚恐非朝廷具瞻之美帝然之遂許讓中令同上傳記唐元儋景雲中授少卿行中以系出拓䟦恨史無編乃撰魏典二十篇學者向之有人得銅器似琵琶人莫能辨行中曰此阮咸所作也雅樂家遂謂之阮咸北史斛斯證博覽羣書尤精三禮兼解音律自謂雅樂廢證博采遺逸始備又樂有錞于者或自蜀得之皆莫識證見之曰此錞于也並職林集帝命詩書將壇登禮樂卿杜牧送崔少卿響切晨趨佩煙濃近侍香司儀六禮冷論將七兵揚合樂来儀鳳尊祠重餼羊卿材優柱石公器擅巖廊栁子厚素尚寜知貴清談不厭貧温庭筠詩奉常之職非特以治郊廟之度服器之數而已國有大政事大議論必稽焉鮮于侁可詔立國之本禮樂為先今之太常實兼其職守兹職者不亦重乎歴代迄今謂之清選職林本朝少卿無職事以為階序品秩元豐正名始有職掌元祐元年吕純禮為少卿御史論門䕃得官不可任奉常於是外補續㑹要中興建炎三年詔太常少卿貟兼宗正少卿中興㑹要寺丞史奉常秦官有丞漢多以博士議郎為之後漢諸丞皆掌行禮及祭祀小事總署曺事皆銅印墨綬歴代皆有唐因隋太常丞從五品下凡享太廟則修七祀於兩門之内分判寺事通典韋宏為丞父賢以宏當嗣太常職掌陵廟煩劇多過教宏自免懷嫌不去官及賢疾篤宏坐廟事繫獄漢書傳記太常丞視尚書則銅印黄綬一梁冠宋百官春秋晉宋九卿置丞進賢一梁冠介幘衣皂文唐天后時李嗣真聞東夷三曲一遍授胡琴彈之無一聲遺忘並職林陶覆之凡宗廟疑義多所決定時人為之語曰定禮決疑問陶覆之陶氏家傳集臨風曲臺淨對月璧池寒權徳輿詩暫輟清齋出太常重攜詩卷赴甘棠劉禹錫詩五兵不用百度載光誕敷文教式奏薰弦命太常以修樂將享帝而配天六變而天神可禮九成而帝徳惟休唐馬周本朝皇祐中詔差禮官一貟兼丞事李泌之請也建炎三年省丞紹興三年復置范希純為太常丞舊制太廟薦享逐室設席食一牙盤元豐四年奏罷之希純奏請復舊制易其名曰薦羞事畧陳文惠公堯佐居官不妄進取屢為太常丞十三年不遷言行錄寺簿傳記主簿漢有之鹵簿之制太常駕四馬主簿前八乘魏晉亦有之唐置二人掌付事勾稽省置抄目監印給紙筆等事餘寺主簿並同㕔通典職林龍溪除蘇良治簿領雖卑然𨽻於太常與聞禮樂之事非他官比也職畧集聞道甘泉能獻賦懸知獨有子雲才王維和太常韋主簿詩曲臺簿正多廊廟西府璇樞第一人詩集本朝皇祐中宋祁乞增置一貟勾檢在寺文書及掌出納遂除胡瑗後詔更不置元豐正名初除王子琦職畧李浩除太常寺簿輪對陳無逸之戒且論宿衛大將恩寵太過髙宗感其言宿將旋就第自檜扼塞言路士風寢衰至是與王十朋馮方查籥胡}
  - {type: variant, offset: 4187, length: 0, content: '', WYG: 始相繼有所開陳號五賢聞者興起太學之士至為五言詩以述其事言行錄籍田令經春籍田而祈社稷也詩序甸師帥其屬以掌耕耨也周禮史周為甸師漢文帝感賈誼之言始開籍田置令丞掌耕國廟社稷之田春始東耕於籍田祀先農大賜三輔二百里孝弟力田三老帛種百榖收萬斛立為籍田館榖皆以給祭天地}
