  - {type: variant, offset: 2806, length: 0, content: '', WYG: 吉曰神農氏之有天下也吾剝膚刻肝怡顔下氣以固蔕之術獻上上喜之命記注官陶洪景狀其方畧以付國史出為九江守宣上徳澤使兒童亦懐之子才孰與甘曰不如也吉之子為下邳侯以美湯藥官至陳謝治中東坡陸吉傳洲中奴長足為生鳯室堂前野橘香坡詩柑史張盤為廬江太守潯陽令嘗餉一奩柑其小兒就取一枚盤奪取付外卒以兩枚與之盤奪兒柑鞭卒曰何故行賄於吾子謝承後漢彭城王義康時四方獻饋皆以上品獻義康而以次者供御上嘗啖柑嘆其味並劣義康在坐曰今年柑殊有佳者遣人還東府取柑大三寸宋書羅浮柑子開元始有山僧種於南樓寺其後嘗資進獻幸蜀幸奉天之嵗皆不結實初開元末江陵進乳柑橘上以十枚種蓬萊宫至天寶十年結實上宣示羣臣曰朕近於宫内種柑子數株今秋結實乃與江南所進無別宰臣賀曰雨露所均混天區而齊被草木有性慿地氣以潛}
