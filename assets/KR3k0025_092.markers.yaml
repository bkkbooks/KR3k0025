  - {type: variant, offset: 1812, length: 127, content: 志邪僻之行何其不仁趍利之甚子貢入以告子曰參天下賢人也其習知音矣向者丘鼓瑟有鼠出遊狸見屬屋循梁獲而不得丘以瑟為其音參以丘為貪狼邪僻不亦宜乎韓詩外傳吳人有燒桐以爨者蔡邕聞其爆聲曰此良桐也因請之削以為琴搜神記于頔令客彈琴其嫂知音曰三分中一分箏聲二分琵琶全無琴韻, WYG: 首}
