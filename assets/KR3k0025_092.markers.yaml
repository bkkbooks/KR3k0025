  - {type: variant, offset: 5089, length: 0, content: '', WYG: 餳曝之凝如冰破如薄棊入口沙釋吳錄甘蔗其餳為石蜜廣志南方荒内􅦠􅀈林其髙百丈圍三丈促節多汁甜如蜜神異經孫亮使黄門就中藏吏取交州所獻甘蔗餳黄門以䑕矢投餳中啓言吏不謹亮呼吏曰此器旣蓋之且有油覆無緣有此也黄門將有恨汝耶叩頭曰常就臣求莞席不敢與亮曰必是此也即於廷前加髠鞭外付江表傳集有柘漿些楚辭諸柘巴苴諸柘甘蔗也出相如子虛賦挫斯柘而療渇若潄醴而含蜜清滋津於紫梨溜液豐於朱橘張梅賦都蔗雖甘杖之必折巧言雖美用之必滅曹植纖液玉津㫖於飴蜜李伯仁本朝甘蔗只生於南方北}
