  - {type: variant, offset: 2377, length: 1, content: 國, krp: 亷五距注云三亷果名晉安謂之楊桃也南越志楊桃似南方橄欖子其味甜常五月十月熟諺言楊桃無蹙一嵗三熟楊桃子生晉安侯官縣實大三寸可蜜藏之臨海異物志橘經厥包橘柚錫貢書橘踰淮而北為枳周禮子夫橘樹之江北化而為橙淮南子史江陵千樹橘其人皆與千戸侯等漢書亷范為成都太守部人楊由善占候嘗有風吹削哺曰當有薦木實者其色黄赤頃之五官椽獻橘數包後漢書陸績年六嵗見袁術術出橘績懐三枚拜而墮地術謂曰陸郎作賓客而懐橘乎績曰欲歸遺母術大竒之吳志虞愿始數嵗家中橘樹冬熟諸兒競求取之愿獨不取家人皆異之南史傳記北山有菜橘柚所聚荷囊載畚盈我筐筥焦贑易林璇樞星散為橘運斗樞洞庭之山其木多橘山海經吳山饋}
