  - {type: variant, offset: 2296, length: 1, content: 趙, WYG: 脯也釋名夏祠用白㮏秋祠用赤㮏盧諶祭法太始二年嘉㮏一蔕十五實生於酒泉起居注崑崙山上有㮏須玉井之水洗之方可食拾遺記有紫㮏大如升甜如蜜洞賔記東華夫人設𤣥洲白㮏廣記白㮏出涼州大如兔頭脂衣㮏其汁可染著衣不可浣雜爼貞觀中有於黄河上拾得一樹栽子歸蒔之三年乃結子進之號曰朱㮏僉載河州靈岩寺每七月十五日溪穴流出聖㮏大如盞洽聞記承光寺㮏味冠京師伽藍記華陽雷平山地美可種㮏所謂福卿之㮏以除災異類要集素㮏夏成左思賦二㮏耀丹白之色潘安仁賦投素㮏於清渠潘岳賦𤓰州素㮏張載經輕籠熟㮏香杜詩林檎傳記黒琴似赤㮏廣志林檎亦名黒琴林檎果實可佳比榅桲榅桲果名實微大其狀醜其味香輔關有之江淮南少述真記華林園有林檎十二株晉宫闕記永徽中王方於河灘上拾得一小樹栽埋之及長乃林檎也王懼得之獻於髙宗又為朱㮏又名五色林檎洽聞記張李二公相與學道李思仕宦而歸奉使至揚州遇張子張邀李備珍膳命妓女五人中有持筝者酷似李妻張以林檎繫裙帶上然後使去張已得仙矣廣記僧問靈雲如何是西來意師曰井底種林檎傳燈錄王内史書帖子與蜀郡太守書求櫻桃來禽來禽言味甘來衆禽也俗作林檎尚書故事集枇杷林檎帶谷映渚謝靈運賦本朝東坡先生未歸時自種來禽與青李東坡泥塗無去馬夏木有來禽后山粲粲來禽已著花芳根誰徙向天涯好尋青李相遮映風味應同逸少家劉屏山枇杷史建中元年詔山南之枇杷江南之柑橘嵗為次第貢者取一次以供廟饗唐書傳記孟夏祭用枇杷范注祠制枇杷葉似栗子似葯四月熟風土記南安縣出好枇杷南中八郡志宜都出大枇杷荆州土地記華山講堂西頭有枇杷園華山記枇杷冬華實黄大如鷄子小者如杏味甜酢四月熟出犍為廣記黎舉常言楊梅枇杷幸為執友金城賦集盧橘夏熟上林賦今人主不思甘露醴泉而患枇杷荔枝之腐亦鄙仲長統昌言枇杷寒暑無變負雪揚華余植之庭圃遂賦之云名同音器質異真松四序一采素華冬馥周祗賦盧橘為秦樹李白枇杷樹樹香杜詩夏首薦枇杷栁集本朝東坡詩云廬橘楊梅常帶酸張嘉甫問曰盧橘何種果類曰枇杷是也事見相如賦嘉甫曰盧橘夏熟黄柑橙榛枇杷橪柿亭柰厚朴不應四句重用應劭注曰伊尹書曰箕山之書青鳥之所有盧橘常夏熟不據依何也東坡曰意不欲耳冷齋夜話枇杷已熟燦金珠坡詩萬斛金丸綴樹稠遺根漢苑識風流也知不作清明瑞朽腐聊關聖主憂劉屏山大葉聳長耳一稍堪滿盤荔枝分與核金橘却無酸雨壓低枝重漿流冰齒寒長卿今在否莫遣作園官誠齋柿傳記俗謂柿有七絶一夀二多隂三無鳥窠四無蟲蠧五霜葉可翫六嘉實七落葉肥大雜爼柿有小者如小杏廣志孟冬祭用柿范注祠制集宛中朱柿王逸賦梁侯烏椑之柿潘岳賦故並丹柿王廙賦鴻柿若𤓰七疑勅㫖垂賜華林園柿出自神苑滋味絶劉義恭啓然雲燒樹大實駢金鳥下啄赬虬卵韓集本朝韓退之青龍寺詩終篇言赤色莫曉其故嘗見小說鄭䖍寓青龍寺無紙取柿葉書九月柿葉赤而實紅則退之詩乃謂此也東坡唐鄧間多大柿初生澁堅實如石凡百十柿以一櫨桲久放則紅熟爛如泥而可食土人謂之烘柿者非用火乃用此爾歸田錄秋林黄葉晩霜嚴熟蔕甘香味獨兼火傘赬虬浪褒拂風標却似邑中黔劉屏山椑傳記梁侯園有烏椑八稜大如酒盞地理志宜都出大椑荆州記孟冬祭用椑范注祠制集椑柿披實於長浦謝靈運賦後園樹烏椑潘岳賦梨史淮北滎南河濟之間千樹梨其人皆與千户侯等漢書孔融與諸兄食梨取小者人問其故曰小兒法當取小者後漢真定郡梨大如拳甘若蜜脆若菱魏文帝詔王𤣥謨征滑臺一疋布買民八百大梨張敷小名楂父邵小名梨文帝常戲謂之曰查何如梨楂曰梨百果之宗查何敢比之宋書扶桑國有赤梨經年不壊崔逺文才清麗風神峻整當時目為飣坐梨言為席上之珍齊書傳記梨山摛爾雅洞庭之中其木多梨山海經常山好梨盧毓論上林有紫梨芳梨青梨大谷梨金柯梨縹蔕梨紫條梨瀚海梨玉梨西京雜記洛陽北邙張公夏梨海内唯有一樹常山真定梨山陽鉅野梨梁園睢陽梨齊郡臨淄梨鉅野棠梨上黨楟梨小而甘新豐箭谷梨關以西𢎞農京兆右扶風界谷中梨多供御廣都梨重陸斤可數人分食之廣志漢武帝園一名樊川一名禦宿有大梨如升落地則破取者以布囊盛之名含消梨三秦記吕光時燉煌太守宋歆獻同心梨凉州記青田村民家多種梨樹名曰官梨恒以供獻名為御梨梨實落至地即融釋永嘉記塗山之北有梨大如斗千年一花食者身輕亦曰紫輕梨洞㝠記東方有樹曰梨其子徑三尺食之為地仙神異經宋廢帝太始年江南盛傳種蕭梨先無此樹百姓争欲植之識者曰當有姓蕭人王者後齊受禪廣五行記歡農里報德寺有含消梨世云報德之梨洛陽伽藍記老子西遊省太真王}
