  - {type: variant, offset: 408, length: 622, content: 王戎有人倫鑒識晉書本傳王導少有風鑒識量清遠年十四高士張公見而奇之謂其從兄敦曰此兒容貌志氣宰相之器也同上互見期待謝安弱冠詣王濛清言既去濛曰此子亹亹逼人同上時太尉郄鑒使門生求女婿於王導導令就東廂徧觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹食獨若不聞鑒曰此正佳婿耶訪之乃羲之也晉書王羲之傳互見擇婿王羲之年十二周顗異之時重牛心炙坐客未噉顗先割噉羲之羲之由是知名晉書仁傑所薦進若張柬之桓彥範敬暉姚崇等皆為中興名臣唐書本傳則天問狄仁傑思得奇才用之仁傑曰荊州長史張柬之其人雖老真宰相才也續世說李邕文名天下盧藏用曰邕如干將莫耶難與爭鋒但虞傷缺耳唐書本傳互見剛大必折獨孤信見孫思邈曰器大難為用耳席豫拔寒遠士多至臺閣當時推知人王起典貢舉貢舉皆知名者人服其鑒互見座主門賈餗三典貢舉多得名卿宰相並同上集明白山濤鑒杜詩夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也韓文互入鑒別本朝王沂公作有物混成賦識者知其決為宰相聞見錄晏元獻為相求婿於范文正文正曰公女必求國士無如富弼者同上歐公知頴州呂公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之遺事經審聲以知音審音以知樂記樂記子孔子在衛昧旦晨興顏回侍側聞哭者之聲甚哀子曰回汝知此哭何者此哭之聲非但為死者而已矣又為生離別者子曰何以知之對曰回聞恒山之鳥生四子焉羽翼既成將分乎四海其母悲鳴而送之哀聲有似於此為其往而不返回竊以音類知之孔子使問哭者果曰夫死家貧賣子葬之, WYG: 具}
