  - {type: variant, offset: 249, length: 158, content: 明東漢本傳司馬徽清雅有知人之鑒龐德公嘗謂德操司馬徽也為冰一作水鑑通監泰性明知人獎訓士類天下咸稱許郭之鑒東漢本傳荀淑遇黃憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰吾之師表也東漢司馬徽曰龐士元非百里之才使處治中別駕之任當展其驥足蜀志龐統傳諸葛亮曰蔣琬社稷之器非百里之才也蜀志本傳周弼見裴頠嘆曰若武庫五兵縱橫一時之傑晉, WYG: 市買果實祐悉以買筆墨}
