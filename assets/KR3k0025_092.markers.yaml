  - {type: variant, offset: 5071, length: 1, content: 舞, WYG: 味甚好比來已七千嵗矣仙之上藥有空同靈瓜四劫一實也漢武内傳集含金精之芳流冠種瓜而作珍投諸清流一浮一沈斫以金刀四剖三離承以雕盤幕以纎絺甘牟蜜房冷甚冰圭劉楨賦𤣥表丹裏呈素含紅豐敷外偉綠瓤内醲張載賦夫其種族頭數則栝樓定桃黄扁白榑金釵蜜筒小青大斑𤣥骭素腕狸首虎蹯東陵出於秦谷桂體起於巫山陸機賦摘虎掌拾黄斑落蔕離母漬以寒泉夏侯孝若賦瓜則桂枝栝樓綠瓤青肌消暑蕩暍解渇療饑王廙賦傾筐蒲鴿青滿眼顔色好沈浮亂冰玉愛惜如芝草落刃嚼冰霜開懐慰枯槁破瓜霜落刃瓜嚼水精寒杜詩瓜畦爛文貝韓詩本朝蘚井筠籠浸蒼玉金盤碧筯薦寒冰田中誰問不納履座上適來何處蠅山谷故人夙有瓜畦約走送筠籠百里間翠甒瓊罌纔一握極}
