  - {type: variant, offset: 2264, length: 0, content: '', WYG: 天下第一也福州江家綠為州之第一並同上莆田荔支名品皆出天成雖以其核種之初不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過牆則為小陳紫矣此果形狀變態百出不可以理求或似龍牙或類鳯𤓰釵頭紅之可簪綠珠子之旁綴是豈人力所能加哉容齋隨筆永元荔支來交州天寶嵗貢取之涪至今欲食林甫肉無人舉觴酹伯游}
