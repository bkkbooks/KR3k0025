  - {type: variant, offset: 2287, length: 0, content: '', WYG: 李少君謂鍾山之李大如瓶仙之上藥有圓丘紅李漢武内傳華林園有春李冬華春熟鄴中記南居細李四月先熟風土記五靈丹山上有𤣥雲之李食之得仙王褒内傳上林苑有紫李青綺李黄李青房李綠李顔淵李合枝李羌李朱李車下李燕李侯李蠻李西京雜記䑕李朱李可以染麥李最細小溝道李黄建李青皮李馬肝李赤房陵李䭞李其肌粘茹之似䭞柰李離核李似柰劈李熟必先劈裂經李又一名老李杏李味小酢似杏黄扁李夏李春李冬李廣志琳國多生玉葉李五千嵗一熟韓終常食之亦名韓終李洞賔記魏文帝安陽殿前天降朱李八枚今安陽李大而甘者即其種也房陵朱仲有李園三十六所林陵有金李其大者為夏李尤小者為䑕李述異記東都嘉慶坊有李甚鮮故稱嘉慶李今人但言嘉慶子西京記長靈安丘生病篤弟子沙都來省之共坐庭樹下見雙朱李著枯皮自墮掌中安食之所苦除盡髙士傳崔奉國家一種李肉厚而無核識者曰天罰乖龍割其耳耳血墮地故生此李琴莊美事西王母居龍月城城中産黄中李花實上皆有黄中二字王母惜之過}
