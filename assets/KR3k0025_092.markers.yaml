  - {type: variant, offset: 3301, length: 1, content: 文, WYG: 筠本朝六月京師暑雨多夜夜南風吹芡觜凝祥池鎖會靈園僕射荒陂安可擬争先園客採新苞剖蚌得珠從海底都城百物貴新鮮厥價難酬與珠比金盤磊落何所為滑臺潑醅如玉醴六一集樓中煮酒初嘗芡東坡蝟毛蒼蒼磔不死銅盤矗矗釘頭生吳鷄鬬罷絳幘碎海蚌扶出真珠明梅聖俞芡葉初生皺如縠南風吹開輪脫輻紫苞青刺攅蝟毛水面放花波底熟森然赤手初莫近誰料明珠藏滿腹子由剖蚌煮鴻頭剝芡珠走盤明珠論斗煮鷄頭千頭剖蚌明珠熟山谷龍宫失曉惱江妃也養鳴鷄報早暉要啄稻梁無半粒只敎滿頷飽珠璣江妃有訣煮真珠菰飯牛酥軟不如手擘鷄腮金五色盤傾驪頷琲千餘夜光明月供朝嚼水府靈宫恐久虛好與藍田飱玉法編餘辟穀赤松}
