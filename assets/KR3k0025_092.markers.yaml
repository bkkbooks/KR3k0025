  - {type: variant, offset: 5086, length: 0, content: '', WYG: 大如甒白黄實甚苦香爾雅之所謂楙也水經木瓜生夷陵吳氏本草虎丘山三面悉有木瓜虎丘山疏華林園有木瓜五株觀音閣記集惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有曜何承天賦本朝沈沈黛色濃糝糝金沙絢却笑宣州房競作紅粧面范至能天下宣城多木瓜日華露液繡成花何須堠子强呈界自有瓊琚先報衙楊誠齋甘蔗史顧愷之每食蔗自尾至本}
