  - {type: variant, offset: 5060, length: 6, content: 善哉覘國乎禮, WYG: 參來勿内也曾子使人請孔子孔子曰舜之事瞽瞍小杖則受大杖則走參委身以待暴怒身死而陷父於不義不孝孰大焉家語昔梁大夫宋就為邊縣令與楚隣界梁亭楚亭皆種瓜梁亭數灌其瓜美楚亭稀灌其瓜惡楚令怒因往夜竊搔梁瓜梁亭欲就搔楚瓜宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其瓜瓜日以美楚亭察之則梁亭之為也楚令以聞楚王楚王聞之恱乃謝以重幣而友於梁王賈誼新書孫鍾種瓜為業有三人來乞瓜鍾設瓜及飯詳見伎術部風水類韓靈敏早䘮父其兄靈珍至孝母亡家貧無以葬與靈珍種瓜靈敏朝採暮還復生葬事由此舉沈約齊}
