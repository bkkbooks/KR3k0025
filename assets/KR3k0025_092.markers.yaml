  - {type: variant, offset: 2279, length: 0, content: '', WYG: 饑下大溪邊有二女邀還家遂停半年懐土思歸女曰罪牽君如何便語大路幽㝠錄王㻌入王屋洞室遇東極真人贈以桃出融臯澤廣記集有東園之珍果兮承隂陽之靈和結柔根以列樹兮横長畆而駢羅𫝊𤣥賦李經投我以木李報之以瓊玖丘中有李投我以桃報之以李詩子陳仲子居於陵三日不食井上有李螬食實者過半矣匍匐徃將食之孟子五沃之土其木宜李管子五原蔡誕入山而還欺其家云到崑崙山有玉李以玉井水洗之便軟可食張助耕於白田有一李栽掘之置空桑中其里人}
