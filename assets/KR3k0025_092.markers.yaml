  - {type: variant, offset: 3179, length: 0, content: '', WYG: 飯輕身益氣令人强健詩疏西王母進素蓮一房百子拾遺記宋元嘉十八年揚州刺史王濬州治後池有兩蓮駢生雙房分體泰始二年嘉蓮雙葩並實合跗同莖生豫州澧湖宋起居注周平齊齊幼主胡太后等並歸於長安初武成殂後有謡云千錢買果園中有芙蓉樹破劵不分明連子隨他去至是應焉三國典畧集綠房紫菂窟咤垂珠文選露冷蓮房墜粉紅杜池蓮折秋房韓集青房圓實齊戢戢張藉水中蓮子懐芳心温庭筠本朝蓮房前後熟供噉不須齊肉嫩山蜂子稜深天馬蹄尚連餘蘂在深映亂荷低脆美如新采近根猶帶泥司馬公半脫蓮房露壓欹綠荷深處有遊龜東坡蓮實大如指分甘念母慈共房頭􅋾􅋾更深兄弟思實中有幺荷拳如小兒手念我憶衆雛迎門索梨棗蓮心政}
