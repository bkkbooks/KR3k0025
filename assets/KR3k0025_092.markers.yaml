  - {type: variant, offset: 3440, length: 0, content: '', WYG: 鳬茈史王莽末南方饑饉民庶羣入野澤掘鳬茈而食之後漢書傳記芍鳬茈也爾雅瓜經以把包瓜易七月食瓜緜緜瓜瓞詩為天子削瓜者副之巾以絺為國君華之巾以綌為大夫累之士㚄之庶人齕之禮齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代左傳子五原蔡誕入山而還欺家人云至崑崙山有玉瓜其形如世間瓜但為光明洞徹而堅須以玉井水洗之便軟而可食枹朴子史邵平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜史記燉煌古瓜州地生美瓜漢書施延家貧母老嘗役力供養種瓜自給後漢書安帝元初三年有瓜異本共生一瓜蔕續漢書建和二年河東瓜兩本共蔕袁崧後漢書步隲避難江東與衛旌同年相善俱以種瓜自給晝勤四體夜誦經傳吳志咸寧二年嘉瓜同蔕生於成都桑虞有園宅北數里瓜果初熟有人踰園偷之虞以園多荆棘乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盜瓜叩頭請罪歡然盡以瓜與之晉書郭原平種瓜大觀七年大旱瓜賣不復通船縣令劉僧秀下水與之原平曰豈可減漑田之水以通運瓜之船乃涉他道往錢塘貨賣齊書王羆性儉率嘗有客與羆食瓜客削瓜侵膚稍厚及瓜皮落地羆引手取而食之客甚有愧色後周書宋瓊以孝稱母曾病季秋月}
