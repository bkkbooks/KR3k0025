  - {type: variant, offset: 2806, length: 0, content: '', krp: 吉曰神農氏之有天下也吾剝膚刻肝怡顔下氣以固蔕之術獻上上喜之命記注官陶洪景狀其方畧以付國史出為九江守宣上徳澤使兒童亦懐之子才孰與甘曰不如也吉之子為下邳侯以美湯藥官至陳謝治中東坡陸吉傳洲中奴長足為生鳯室堂前野橘香坡詩柑史張盤為廬江太守潯陽令嘗餉一奩柑其小兒就取一枚盤奪取付外卒以兩枚與之盤奪兒柑鞭卒曰何故行賄於吾子謝承後漢彭城王義康時四方獻饋皆以上品獻義康而以次者供御上嘗啖柑嘆其味並劣義康在坐曰今年柑殊有佳者遣人還東府取柑大三寸宋書羅浮柑子開元始有山僧種於南樓寺其後嘗資進獻幸蜀幸奉天之嵗皆不結實初開元末江陵進乳柑橘上以十枚種蓬萊宫至天寶十年結實上宣示羣臣曰朕近於宫内種柑子數株今秋結實乃與江南所進無別宰臣賀曰雨露所均混天區而齊被草木有性慿地氣以潛}
  - {type: variant, offset: 2807, length: 2, content: 監晉, WYG: 故得兹江外之珍果為宫中之華實荆州進黄柑帝以紫幅包賜蕭嵩唐書傳記柑橘有黄者有赬者赬者謂之壺柑風土記柑有二十一核有成都平蔕柑大如升又犍為南}
  - {type: variant, offset: 2807, length: 2, content: 監晉, krp: 故得兹江外之珍果為宫中之華實荆州進黄柑帝以紫幅包賜蕭嵩唐書傳記柑橘有黄者有赬者赬者謂之壺柑風土記柑有二十一核有成都平蔕柑大如升又犍為南}
  - {type: variant, offset: 2810, length: 3, content: 紀隋高, WYG: 縣出黄柑唐宣宗嘗賜軒轅集柑子曰臣山下有者味愈於此遂取御前碧玉甌以寶盤覆之俄而徹盤柑子至矣芬馥滿殿廣記東方朔云東南外有建春山其山多美柑樹神異經冬祠用柑盧諶祭法枝江有名柑宜都郡舊江北有其園名宜都柑荆州記柑實形如石榴者謂壺柑也真柑一名乳唯泥山為最生枝柑鄉人以其耐久留之枝間俟其味變柑帶葉而拆故名生枝柑橘錄李衡於武陵龍陽洲上種柑千樹臨死敕兒曰吾州里有千頭木奴不責汝衣食嵗征一疋絹亦足用矣及柑成嵗得絹四十疋襄陽記集披黄苞以授柑潘安仁賦厥包橘柚精者曰柑郭璞賛煌煌嘉實磊如景星南金其色隨候厥形宗炳頌在南稱柑渡北則橙文選甜逾萍實冷亞冰壺劉}
