  - {type: variant, offset: 1097, length: 566, content: 列子子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子互入機鋒相湊門史晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功左襄十八年伯石始生姑視之聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣左昭二十八年孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰己習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰有所穆然深思焉有所怡然高望而遠志焉曰丘得其為人黯然而黑幾然而長眼如望羊如王四國非文王其誰能為此也師襄子辟席再拜曰師蓋云文王操也史孔子世家蔡邕有以酒食召者客有彈琴於屏邕至門潛聽之曰以樂召我而有殺心何也遂返坐人追問其故邕具以告彈琴者曰我向見螳蜋方向鳴蟬將去而未飛螳蜋為之一前一卻吾心聳然唯恐螳蜋之失蟬此豈為殺心而形於聲乎邕歎曰此足以當之矣東漢蔡邕夜鼓琴絃絕琰曰第二絃邕曰偶得之矣故斷一絃問之琰曰第四絃後本傳周瑜少精意於音樂三爵之後其有闕誤瑜必知之知之必顧時人謠曰曲有誤周郎顧吳志開皇十四年詔行新樂萬寶常聽太常所奏泫然泣曰樂聲淫厲而哀天下不久將盡時四海全盛皆謂不然大業之末其言卒驗通監隋文紀韓滉知音律嘗觀彈琴至止息歎曰妙哉嵇生之為是曲也其當晉魏之際乎其音主商商為秋秋者天將搖落肅殺其歲之晏乎又晉乘金運商金聲此所以知魏之季而晉將代也慢其商絃與宮同音是臣奪君之義也所以知司馬氏之將篡也舊, WYG: ''}
