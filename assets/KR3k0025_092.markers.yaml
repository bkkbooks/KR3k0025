  - {type: variant, offset: 4113, length: 942, content: 識奇趣同上霏霏乎其若卿雲之蔽月也翻翻乎其若長風之卷旆也猗猗乎其若遊絲之牽柳絮也裊裊乎若流水之舞荇帶也離離乎其遠而相屬縮縮乎其近而不隘也東坡文與可飛白贊敘讀文選恨其編次無法去取失當齊梁文字衰陋蕭統尤為卑弱如李陵五言皆偽今日觀淵明集可喜者甚多而獨取數篇淵明作閑情賦正所謂國風好色而不淫正使不及周南與屈原所陳何異而統大譏之此小兒強解事也仇池筆記唐人工於為詩而陋於聞道欒城集六經已後便有司馬遷三百五篇之後便有杜子美文當學司馬遷詩當學杜子美唐庚文司馬遷敢亂道卻好班固不敢亂道卻不好不亂道又好是左傳亂道又不好是唐書同上王右軍蘭亭天朗氣清自是秋景以此不入選然絲竹管絃語亦重複遯齋閑覽東坡云書之美者莫如顏魯公然書法之壞自魯公始詩之美者莫如韓退之然詩格之變自退之始王直方詩話經人無於水監當於民監書酒誥回之為人也擇乎中庸記中庸誠之者擇善而固執之也同上多聞擇其善者而從之語述而子君請擇於斯二者孟子觀水有術必觀其瀾同上善擇者制人不善擇者人制之荀子人莫鑑於流水而鑑於止水莊子鵷雛非梧桐不止非練實不食非醴泉不飲莊秋水或問人有倚孔氏之牆誦韓莊之書則引諸門乎曰在夷貉則進之倚門牆則麾之揚子人不照於昧金而照於瑩鏡者以瑩能明也不鑑於流波而鑑於靜水者以靜能清也劉子史筮短龜長不如從長左僖四年臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石左襄二十三年鳥則擇木左哀十一年范文子曰擇福莫若重擇禍莫若輕國晉語注云有二福擇取其重有二禍擇取其輕也飢人所以不食烏喙者為其愈充腹而與餓死同也史記士宜以才行為先不可純以閥閱通監漢章帝懇懇用刑不如行恩孳孳求奸未若禮賢通監漢相紀傳記寧為雞口無為牛後戰國策得十良馬不如得一伯樂得十良劍不如得一歐冶呂氏春秋食其自匿監門非高祖不長揖孔明躬稼南陽非劉氏不馳驅晉中興書集挽弓當挽強用箭當用長射人先射馬擒賊先擒王杜詩養禽當養鶻元稹集磨劍莫磨錐磨錐成小利同上互見捨小圖大擇肉於熊羆肯視兔與狸韓文互見氣概率性飭躬立志希古當以聖人為準的中庸為慕尚清與和皆非中道皇甫湜本朝故窮山水登臨之美者必之乎寬閑之野寂寞之鄉而後足焉覽人物之盛麗夸都邑之雄富者必據乎四達之衝舟車之會而後足焉歐公有美堂記經它人有心予忖度之詩小雅巧言陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也, WYG: 蘇}
