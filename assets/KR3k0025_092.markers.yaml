  - {type: variant, offset: 5251, length: 2038, content: 年孟獻子曰晉帥乘和師必有大功左成十三年士鞅曰欒黶汰虐已甚猶可以免其在盈乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實彰左襄十四年晉囚叔向樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫樂王鮒從君者也何能行祁大夫外舉不棄仇內舉不失親其獨遺我乎左襄二十一年周王曰韓氏其昌阜於晉乎左襄二十八年季武子曰晉未可媮也有趙孟以為大夫其朝多君子其庸可媮乎左襄三十年叔向曰伯有已侈所謂不及五稔者左襄二十七年互見識者所闚楚執伍奢費無極曰奢之子材若在吳必憂楚國盍召之員適吳奢聞員不來曰楚君大夫其吁食乎左昭二十年吳二千里不三月不至何及於我左定七年楚子西曰夫差其先自敗也已安能敗我左哀元年魏子其長有後於晉國乎魏子魏舒也左昭二十年伍員曰越十年生聚而十年教訓二十年之外吳其為沼乎左哀元年子胥曰越在我心腹之疾也左哀十一年季札曰衛多君子未有患也左襄二十九年觀其容而知其心矣國語互見識者所窺伍子胥諫曰越王勾踐食不重味衣不重采弔喪問疾且欲有所用其眾此人不死必為吳患今越在心腹疾而王不先不亦謬乎史吳世家侯嬴曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之嘗聞公子為如姬執其父仇如姬欲為公子死無所辭公子誠一開口則得虎符奪鄙之兵北救趙西卻秦此五伯之功也公子如其言卻秦通監周紀龐涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐涓死此樹下於是令齊軍善射者萬弩夾道而伏期日暮見火起而俱發龐涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自刎曰遂成豎子之名史記楚南公曰楚雖三戶亡秦必楚史項籍紀房君諫陳餘曰秦未亡而誅武信等此生一秦也通監秦紀陳平曰項王骨鯁之臣亞父鍾離昧龍且周殷之屬不過數人耳通監漢高紀英布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而臥矣上曰何謂上計對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣上曰是計將安出對曰出下計通監十二晁錯曰吳削亦反不削亦反削之其反亟禍小不削之其反遲禍大前漢荊燕吳傳朱勃小器速成智盡此耳東漢愋傳互見識者所窺邴吉有陰德夏侯勝識其當封及子孫東漢袁安傳論幽州刺史馮煥玄菟太守姚光數糾發姦惡怨者詐作璽書譴責煥光賜以歐刀下遼都尉龐奮使速行刑奮即斬光收煥煥欲自殺其子緄疑詔文有異止煥曰大人在州志欲去惡實無它故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所為通監漢殤紀孫策將襲許眾懼郭嘉料之曰策新得江東所誅者英髦雄傑輕而無備雖有百萬眾無異獨行中原若刺客伏起一人之敵爾果為刺客所殺魏志袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絕其哺乳立可餓殺通監漢獻紀蛟龍得雲雨恐非池中物吳志周瑜傳互見識者所窺衛公子開方仕齊積年不返管仲以為不懷其親安能愛君是以求忠臣必於孝子之門通監漢獻紀郭嘉曰袁紹性遲而多疑來必不速同上諸葛亮至郿軍於渭水之南司馬懿引軍渡渭背水為壘以拒之謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原諸將無事矣亮果出五丈原通監魏明紀魏文帝欲伐吳蜀賈詡曰吳蜀依阻山水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢皆難卒謀魏志邢貞曰江東將相如此非久下人者也三國司馬懿告人曰諸葛孔明食少事煩其能久乎魏明紀索靖知天下將亂指雒陽宮銅駝嘆曰會見汝在荊棘中耳通監晉紀互入憂世及先見朝廷初聞燕王雋卒皆以為中原可圖桓溫曰慕容恪尚在憂方大耳通監晉海西公紀桓玄曰劉裕足為一世之雄劉毅家無擔石之儲樗蒲一擲百萬何無忌酷侶其舅共舉大事何謂無成通監晉安紀劉裕伐燕過大峴曰虜已入吾掌中矣同上于謹曰曜兵漢沔席卷度江直據丹陽是其上策移郭內居人退保子城以待援至是其中策若難於移動據守羅郭是其下策長孫儉曰裁繹蕭繹也出何策謹曰必用下策北史元魏本傳隋軍臨江高熲謂行臺吏部郎中薛道衡曰今茲大舉江東必可克乎道衡曰克之嘗聞郭璞有言江東分王三百年復與中國合今此數將周一也主上恭儉勤勞叔寶荒淫驕侈二也國之安危在所寄任彼以江揔為相唯事詩酒拔小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之用耳三也我有道而大彼無德而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑通監陳長城公紀李敬元盛稱王勃楊炯盧照鄰駱賓王之才裴行儉曰勃等雖有才而浮躁衒露豈享爵祿者哉唐書裴行儉傳互入識者所窺使者所薦唯得文辭干進之士耳安有有道賢人肯隨牒舉選乎通監唐德宗裴度曰朱克融譬如猛獸自於山林中咆哮跳踉久當自困必不敢輒離巢穴通鑑唐肅宗李弘曰鄭注姦猾無雙卵𪆪不除使成羽翼以為國患通鑑唐文紀一日狼煙百餘舉帝曰此虜將遁張虛勢也通鑑五代漢高祖傳記可食以粱肉者可加以鞭捶可受以官祿者可隨以鈇鉞高士傳望影揣情文選陸士衡頌有志氣而能思富貴者必能建功業有志氣而能輕爵祿者必能立名節李衛公君子論季札以樂卜趙孟以詩卜襄仲歸父以言語卜子游子貢以威儀卜沈尹戍以政卜孔成子以禮卜其應也如響無他在精誠而已不精誠者不能自卜況吉凶他人乎陸魯望文若燭照數計而龜卜也韓文, WYG: ''}
