  - {type: variant, offset: 3298, length: 2, content: 在內, WYG: 出菱甚為甘㫖羅浮山記𤣥都觀有翠水水有菱狀如飛鷄謂之飛鷄菱㓊㝠記屈到嗜菱有疾召其宗老而屬之曰祭我必芰及祥宗老將薦芰屈建命去之曰夫子不以私欲干國之典也國語漢武帝穿池有倒生菱莖如亂絲一花千葉根浮水上實沈泥如紫色謂之紫泥菱拾遺錄芰一名水粟一名薢茩漢武昆明池中有無根菱亦曰青水芰𤣥都有菱碧色狀如鷄飛名翻鷄芰今人但言菱芰諸解草木書亦不分别唯伍安貧武陵記言四角三角曰菱今蘇州折要菱多兩角荆州有僧遺段成式一斗郢城菱三角而無傷可以挼莎雜爼集夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜嘆巧言之亂徳仲尼惡紫之奪朱林恕篤論加籩之品菱芡存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝旣毁就養無方之禮又失奉死如生之義奪乎素欲建何忍焉孫楚論屈建其沃羸則有綠菱紅蓮左思賦採菱花而結辭曹植九愁忽忘食而宵歸詠採菱以叩舷郭璞江賦紫菱生軟角庾信水果剝菱芡採菱寒刺上杜詩菱葉亂穿萍菱翻紫角利韓集朶頥進芰實栁集白馬湖平秋日光紫菱如錦綵鸞翔盪舟遊女滿中央采菱不顧馬上郎劉夢得本朝烏菱白芡不論錢亂絲素菰滿綠盤東坡幸自江湖可避人懐珠隠玉冷無塵何須抵死露頭角荇葉荷花老此身柄似蟾蜍股様肥葉如蝴蝶翼相差蟾蜍翹立蝴蝶起便是菱花著子時鷄頭吾弟藕吾兄頭角嶄然也不争白璧中藏煙水晦紅裳左袒雪花明一生子木非知己千載靈均是主盟每到炎官張火傘西山未當聖之清楊誠齋芡鷄頭同經加籩之實菱芡㮚脯周禮子鷄頭已瘻注云瘻頸腫疾也鷄頭水中草幽州謂之鴈頭淮南子傳記芡鷄頭也葉圓而大葉上蹙衂如沸實有芒刺其裏如味可以療饑止渇古今注鷄頭一名鴈實生雷澤本草經䓈芡鷄頭也北燕謂之䓈青徐淮泗之間謂之芡方言南楚江湘之間謂之鷄頭或謂之鴈頭廣雅集鴻頭刺芡實平池散芡盤風能折炎水韓集繡頸金鬚蕩倒光團圓皺綠鷄頭葉温}
