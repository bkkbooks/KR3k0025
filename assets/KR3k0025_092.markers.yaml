  - {type: variant, offset: 2301, length: 1, content: 全, WYG: 賜之穎王等曰臣等請聨句以為他年故事穎王曰先生年幾許顔色似童兒信王曰夜抱九僊骨朝披一品衣穎王曰不食千鍾粟唯餐兩顆梨上曰天生此間氣助我化無為鄴侯家傳王公達尚夀春公主聞真定有紫花梨就加封檢洎秋實公主必親選而進之耳目記李建勲出鎮豫章遊西山田間茅舍有老叟教授村童公觴于}
  - {type: variant, offset: 2301, length: 1, content: 全, krp: 賜之穎王等曰臣等請聨句以為他年故事穎王曰先生年幾許顔色似童兒信王曰夜抱九僊骨朝披一品衣穎王曰不食千鍾粟唯餐兩顆梨上曰天生此間氣助我化無為鄴侯家傳王公達尚夀春公主聞真定有紫花梨就加封檢洎秋實公主必親選而進之耳目記李建勲出鎮豫章遊西山田間茅舍有老叟教授村童公觴于}
  - {type: variant, offset: 2303, length: 0, content: '', WYG: 廬連食數梨賔僚有曰五臓刀斧不宜多食叟笑曰鶡冠子云五臓刀斧乃離别之離非梨也蓋離别戕伐胷懐有若刀斧耳東軒錄集紫梨津潤左思賦果則昫山之梨齊都賦張公大谷之梨潘岳賦茂林列芳梨金谷園賦紫梨甜脆孫楚賦梨則大谷冬紫張公秋黄王廙賦山盤薦霜梨紅梨逈得霜張梨不外求山梨結小紅李白霜亦染梨腮韓集紫實已含津梁宣帝本朝嗟予久苦相如渇却憶冰梨慰齒寒六一集勸君莫食金花梨勸君須食紅消梨金花紅消兩般梨一般顔色如胭脂紅消食之甘如飴金花食之先皺眉似此誤人多少事未食之前寧辨之康節霜降紅梨熟柔柯已不勝未嘗蠲夏渇唯見助冬冰東坡丹腮曉露香猶薄玉齒寒冰嚼欲無舊有嘉名傳大谷誰分靈種下仙都劉屏山珍實渾疑露結成香葩况是雪儲精乍驚磊落堆盤出旋剖輕盈照骨明盧橘謾勞除夏熱柘漿未許析朝酲啖餘更檢桐君錄快果知非浪得名朱文公柤傳記柤似棃說文箕山之東有甘柤吕氏春秋平丘有楊栁甘柤洞庭之山其木多柤山海經南方大荒有樹曰柤三千嵗作花九千嵗作實長九尺無核割之如凝蜜神異經江淮南人至北見榅桲香以為柤子蓋實異之耳述異記集甘柤引於崑山傅𤣥賦橄欖傳記有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹金樓子橄欖澁酢廣州記如大鷄子交州以飲酒廣志橄欖子大如棗二月華八九月熟生食味酢蜜藏乃甜美交趾武平與古九真有之南州草木狀橄欖閩中尤重云咀之香口勝含鷄舌香解酒毒樹峻不可梯但刻其根下方寸許内鹽其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之和其皮葉煎如黒餳謂之橄欖糖嶺表錄異本朝江南多果實橄欖稱珍竒北人將就酒食之先顰眉皮核苦且澁歴口復棄遺良久有迴味始覺甘如飴我今何所喻喻彼忠臣辭直道逆君耳斥退投天涯世亂思其言噬臍焉能追寄與采詩者無輕橄欖詞王黄州五行居四時維火盛南訛炎焦凌木氣橄欖得之多酸苦不相入初争久方和霜苞入中洲萬里來江波幸登君子席得與衆果羅六一集紛紛青子落紅鹽正味森森苦且嚴待得餘甘還齒頰已輸崖蜜十分甜東坡青膚鏤瓊瑩翠顆森菡萏苦為幽人貞久見君子淡甘壊彼包羞日新此剛敢清泉薦芳茗具味獨潛感澡雪清煩酲滌隂瑩𤣥覽劉貢父想共餘甘有𤓰葛苦中真味晩方囘山谷餘甘傳記髙涼安寧縣有餘甘吳錄瀘水南岸有餘甘子樹色微黄味酸苦核有五稜雲南記餘甘如彈丸大視之理如定陶𤓰片初入口如苦忽咽中乃更甜美鹽而蒸之尤美可多食之異物志朱崖果有餘甘朱崖故事菴摩勒餘甘子也本草芳馥餘甘註云餘甘子出廣州四方多菴摩勒果也佛書集其果則丹橘餘甘荔枝之林左吳都賦本朝方懐味諫軒中果注云戎州蔡次律家軒外有餘甘余名之曰味諫山谷石榴史晉安帝時武陵臨沅獻安石榴一蔕六實沈約宋書元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏宋書齊安德王延}
