  - {type: variant, offset: 1796, length: 1, content: 孔, WYG: 織女星主果春秋元命苞在木曰果在草曰蓏說文不周之山爰有嘉果其實如桃李其葉華赤跗食之不飢山海經種名果法取好直枝内著芋塊中種之食經舍衛國在月氏南萬里果大如三斗盆闞駰十三州記石虎有華林園種衆果民間有名果虎作蝦蟇車四搏握根面去一丈深一丈合土載之植之無不生鄴中記􅄞昌蓄採星盆夏月漬果則倍冷叙聞錄李直方嘗第果實以綠李為首楞梨為副櫻桃為三甘}
