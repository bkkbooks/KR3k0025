  - {type: variant, offset: 2828, length: 5, content: 跡似輕薄通, WYG: 力好竒自賢侯因令江上根結實夷門秋始摘纔三四金奩獻凝旒公侯不及識天子百金酬嵗久子漸多纍纍枝上稠鵝毛贈千里所以重其人鴨脚雖百箇得之誠可珍六一集秋盤堆鴨脚后山鴨脚類緑李其名因葉髙今喜生都下薦酒壓蒲萄初聞帝苑誇又復主第褒纍纍誰採掇玉腕上金鼇梅聖俞蓮實史張承業權貴任事人皆脅肩低首候之唯馬郁以滑稽侮狎每賓僚宴集承業出異方珍果當郁前者食必盡承業私戒主膳者曰他日馬}
