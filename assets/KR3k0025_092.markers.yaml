  - {type: variant, offset: 2834, length: 96, content: 隋紀王通嘗稱無赦之國其刑必平重歛之國其財必貧通監隋高祖或言李密侶項羽非也羽興五年伯天下密連兵數十百戰不能取東都自立亦不能鼓而西其亡宜也唐李密贊昔晉武帝平吳之後志意驕怠何曾位極台司不能直諫乃私語, WYG: 至唯以乾藕}
