  - {type: variant, offset: 3292, length: 4, content: 裴延裕乾, WYG: 荷美芙蕖其根藕荷根也一曰蔤乃莖下白蒻在泥中者說文碧藕白橘皆神仙之物廣記西王母進千年碧藕拾遺記碧衣女子詠云藕隠玲瓏玉樹萱錄集秋藕折輕絲謝朓踏藕野池中佳人雪藕絲杜詩太華峰頭玉井蓮開花十丈藕如船冷比雪霜甘比蜜一片入口沈痾痊韓集紅藕香中萬㸃珠不知淮水濁丹藕為誰開魚尾迸圓沙千珠落相藕温庭筠本朝平生冰雪姿七星羅心胷豈無有絲毫上禆天子聰而不自薦達胡為乎泥中沈痾正無賴安得若從容其子亦可憐風味如乃翁胡致隆荷衣芰製雪為容家住雲煙太華峯外面看來真璞玉胷中琱出許玲瓏楊誠齋菱芰同經加籩之實菱芡㮚脯周禮子楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食菱飲水枕塊而死淮南子史魚𢎞為湘東王鎮西司馬述職西上道中乏食緣路采菱作菱飯給所部梁書傳記菱厥樚注云今水中芰也爾雅鉅野菱尚書大傳䔖菱也說文淮漢以南凶年以菱為蔬廣志孟秋之祭菱芡范注祠制綏}
