  - {type: variant, offset: 2401, length: 1, content: 事, WYG: 湘東王王國典畧晏子使楚楚王遺橘置削晏子并食不割王曰橘當去割對曰臣聞之賜人主前者瓜桃不削橘柚不割今者萬乗無教故不敢割臣非不知也晏子春秋甘橘大釐城有之其味甚酸穹有橘大如覆杯南夷志羅浮山有橘夏熟實大如李廣州記橘為樹白花而赤實皮旣馨香又有善味交趾有橘置長官主嵗貢御橘異物志宣城秦精入武昌山中採茗忽見一人身長一丈通體皆毛探懐中二十枚橘與精甘美異常續搜神記越中有王氏橘園述異記巴卭人橘樹有二大橘如三四斗盎剖開每橘有二叟相對象棋一叟曰橘中之樂不減商山但不得深根固蔕為遊人摘下耳幽怪錄李衡作宅種橘千枝敕其子曰吾有千頭木奴可以不貧襄陽耆舊傳江陵進乳甘橘}
