  - {type: variant, offset: 2370, length: 6, content: 公慚卿卿慚長, WYG: 白馬甜榴一實直牛洛陽伽藍記劉馮學道於樓丘子常服中岳石榴神仙傳崔𤣥徽常遇數美人其一曰石阿措即石榴也小說李漢碎胡碼瑙盤盛送王莒曰安石榴莒見之不疑旣食乃覺之揚州事迹集若榴競裂蜀都賦接翠萼於綠蔕冐紅牙於丹鬚赩然含㽔璀爾散珠夏侯孝賦味滋芳柚色耀瓊蘂若榴者天下之竒樹九州之名果也遥而望之煥若隋珠耀重淵詳而察之灼若列宿出雲間千房同模十子如一御饑療渇解酲止醉天迴節移龍火西没流風晨激含露朝白紫房獨熟赬膚自拆剖之則珠散含之則水釋充嘉味於庖籠極酸甜之滋味上薦清廟之重下羞玉堂之客金谷石榴木滋之最膚如凝脂汁如清瀨渇者所思銘之衣帶潘岳賦乃剖乃析金房緗隔張協賦或珠離於璇椀或玉碎於雕觴璘彬洒映曄紫嬰緗璀若瑶英之攅巘粲若靈蚌之含珠股安元賦惟木之珍莫美石榴擢鮮葩於青春結芳實於素秋徐澡妻賦庭榴剖朱實江總潛苞絳實拆韓集流霞包染紫鸎粟黄蠟紙裹紅瓠房皮日休本朝秋雷石罌破曉日丹砂爛梅聖俞晴林紫榴析六一集試剖紫金椀滿堆紅玉珠鄭獬庭榴結實墊芳叢一夜飛霜染茜容萬子同包無異質金房玉隔謾重重劉屏山深著紅藍染暑裳琢成文玳敵秋霜半含笑裏清冰齒忽綻吟邊古錦囊霧縠作房珠作骨水晶為醴玉為漿誠齋楊桃傳記雲母山多白雀素質凝映}
