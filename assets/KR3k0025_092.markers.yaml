  - {type: variant, offset: 2295, length: 0, content: '', WYG: 整冠占樂府種别分類或朱或黄𫝊𤣥記色潤房陵縹味奪寒水朱沈約朱李沈不冷杜詩冰盤夏薦碧實脆韓集本朝青李扶疎禽自來東坡道傍多苦李山谷柰史王祥後母不慈庭有丹柰結實使守視之祥晝則驅鳥雀夜則驚䑕時雨忽至祥抱樹至曙本傳楊愔家甚隆盛庭前有柰樹實落地羣兒皆争之愔巋然獨坐其季父偉見之大用嗟異北史傳記上林苑有白㮏紫㮏綠㮏西京雜記㮏有白赤青三種張掖有白㮏酒泉有赤㮏廣記摘圜丘之紫㮏漢武故事㮏油𢷬㮏實也㮏脯切㮏曝乾之}
