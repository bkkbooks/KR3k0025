  - {type: variant, offset: 1959, length: 0, content: '', WYG: 而興化軍最為竒特泉漳時亦知名列品雖髙而寂寥無紀將尤異之物昔所易有乎蓋亦有之而未始遇乎人也蔡君謨荔支譜夫以一木之實生於海濵岩險之逺而能名徹上京外被夷狄其於果品卓然第一興化軍大重陳紫富室大家嵗或}
