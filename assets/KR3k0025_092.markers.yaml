  - {type: variant, offset: 3753, length: 359, content: 補於萬民之勞苦哉柳文風雅則諸葛瑾張承步騭以名聲光國政事則顧雍潘濬呂範呂岱以器任幹職奇偉則虞蕃陸績張溫張焞以諷議舉正奉使則趙咨沈珩以敏達延譽術數則吳範趙達以禨祥協應陸機辨亡論本朝唐諸子號詩人者僻固而狹陋歐公文集韓愈嘗有賦矣不過羡二鳥之光榮一飽之無時耳推是心使光榮而飽則不復云矣若翱獨不然其賦曰眾囂囂而獨處兮咸嘆老而嗟卑視予心之不然兮慮行道之猶非怪神堯以一旅取天下後世子孫不能以天下取河北以為憂嗚呼使當時君子皆易其歎老嗟卑之心為翱所憂之心則唐之天下豈有亂與亡哉歐公讀李翱文羊祜陸遜送絹償禾之事甚好至祜飲遜藥則不可陸遜雖不是鴆人底人然兩軍相向其所餉藥自不當飲老泉文今世稱善草書或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡集永禪師書骨氣深穩體兼眾妙精能之至返造深淡如觀陶彭澤詩初若散緩不收反復不己, WYG: 頃}
