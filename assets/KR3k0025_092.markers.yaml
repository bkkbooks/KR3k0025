  - {type: variant, offset: 1943, length: 3, content: 識曲聽, WYG: 百果甲拆異色同榮左思賦芳果萬名攅羅廣庭霜滋露熟時至則零劉禎賦雜果幾乎萬株石崇金谷詩序竒樹珍果鉤盾所職張平子賦天淵地東南角有果各作一林無處不有縱横成行陸機書於焉摘朱果兼得養𤣥牝李白山果多瑣細苦甘齊結實或紅如丹砂或黒如㸃漆杜詩葉心朱實堪時落朱果爛枝繁並同上篚實摘林珍韓集本朝凡果實久不熟者以祭社餘酒洒之則繁茂倍常用生人髪掛枝上則飛鳥不敢近方結實時最忌白衣人過則}
  - {type: page-break, offset: 1943, content: '', id: KR3k0025_WYG_092-3a, image: WYG0932/WYG0932-0662c.png}
  - {type: variant, offset: 1943, length: 3, content: 識曲聽, krp: 百果甲拆異色同榮左思賦芳果萬名攅羅廣庭霜滋露熟時至則零劉禎賦雜果幾乎萬株石崇金谷詩序竒樹珍果鉤盾所職張平子賦天淵地東南角有果各作一林無處不有縱横成行陸機書於焉摘朱果兼得養𤣥牝李白山果多瑣細苦甘齊結實或紅如丹砂或黒如㸃漆杜詩葉心朱實堪時落朱果爛枝繁並同上篚實摘林珍韓集本朝凡果實久不熟者以祭社餘酒洒之則繁茂倍常用生人髪掛枝上則飛鳥不敢近方結實時最忌白衣人過則}
  - {type: variant, offset: 1947, length: 9, content: 真選古詩古調雖自愛, WYG: 實盡落遯齋閒覽江南有蜀士桑果已許乞東坡栖禪晩置酒蠻果粲蕉荔同上荔支史汝南唐羌為臨武縣長接交州舊獻荔支羌上書諫乃止謝承後漢魏文帝詔羣臣曰南方有龍眼荔支寧比西國蒲萄石蜜乎今以荔支賜將吏則知其味薄矣魏志楊妃嗜荔支必欲生致之乃置驛傳送走數千里味未變已至京師唐書白居易為忠州刺史在郡為木蓮荔支圖曰荔支生巴峽間形圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴如酪若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣同上傳記南越王尉佗獻髙祖鮫魚荔支髙祖報以蒲萄錦四疋西京雜記單于來朝賜橙橘龍眼荔支東觀漢記蒼梧多荔支生山中人家亦種之吳錄犍為僰道南荔支熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈比三種為美次鼈􅆑大而酸率生稻田間廣志荔支壺橘南珍之同上荔支南中之珍果也梧州江前有火山上有荔支四月先熟核大而味酸其髙新州與南海産者最佳五六月方熟形若小鷄子近蔕稍平皮殻殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有蠟荔支黄色味稍劣於紅者嶺表錄集}
