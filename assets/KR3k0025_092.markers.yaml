  - {type: variant, offset: 1958, length: 0, content: '', WYG: 主不思神芝朱草而患枇杷荔支之腐亦鄙矣仲長統昌言其形也暖若朝雲之興森如横天之彗角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之著天王逸賦傍挺龍目側生荔支布綠葉之萋萋結朱實之離離左思賦雖受氣于震方實禀精于火離張九齡賦下合圍以擢犀傍䕃畆而抱規紫文紺理黛葉緗枝蔕葯房而捽萃皮龍鱗以駢比膚玉英而含澤色江蓱以吐日信琱盤之仙液實玳筵之綺繢並同上素華春漠漠丹實夏煌煌白居易星綴連心朶珠排耀眼房紫羅裁襯殻白玉裹填囊燕脂掌中顆甘露舌頭漿並同上封開玉籠鷄冠澁葉襯金盤鶴頂鮮韓偓巧裁縫片裹神漿崖蜜天然有異香應是仙人金掌露待成冰入茜羅裳同上輕紅擘荔支杜詩本朝閩中唯四郡有之福州最}
