  - {type: variant, offset: 2131, length: 129, content: 心無出死之計韓信軍孤在水上士卒必死無有二志此信之所以勝之也漢王深入敵國置酒高會士卒逸豫戰心不固楚以強大之威而喪其國都士卒皆有憤激之氣救敗赴亡之急以決一旦之命而漢以怠惰之卒應之此同事而異情也通監子房蕭何韓信三者皆人傑吾能用之此吾所以取天下也項羽有一范增而不能用, WYG: 銷如絳雪}
