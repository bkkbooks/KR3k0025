  - {type: variant, offset: 2820, length: 6, content: 謹絕倫然爽俊, WYG: 江岸千柑二頃園青雲羞葉宻白雪避花繁結子隨邊使開筒近至尊後於桃李熟終得獻金門杜詩手種黄柑三百株春來新葉徧城隅方同楚客憐皇樹不學荆州利木奴數嵗開花聞噴雪何時摘實見垂珠若教不待成林後滋味還堪養老夫栁集本朝安定郡王以黄柑釀酒名曰洞庭春色黄柑隠於泥山楚王聞其名遣使召之拜温尹平陽侯甘謂陸吉曰每嵗太守勸駕乗傳入金門上玉堂與虞荔甲棖梅福棗嵩之徒列侍上前使數子者口呿舌縮不復上齒牙間更封甘子為穰侯東坡傳一雙羅帕未分珍林下先嘗愧逐臣雲葉霜枝剪寒碧金盤玉指破芳辛清泉潄潄先流齒香霧霏霏故噀人坐客慇勤為收子千枝盈掬為吾貧歸來一㸃殘燈在猶有傳柑遺細君燕南異事真堪記三寸黄柑擘永嘉侍史傳柑玉座傍人間草木盡天漿坡詩君家秋實羅浮種已作累累半拂牆假作肅霜金弄色匀添寒日與争黄色深林表風霜下香著樽前指爪間山谷橙子夫橘樹之淮北化而為橙淮南子傳記橙橘屬也說文橙皮可為醬虀風俗通橙橘屬也而葉正圓風土記成都廣都郫新繁江源臨卭六縣生給橙夏秋冬或華或實大如櫻桃小者或如彈丸或有年華實竟嵗博物志橙子木有刺香氣馥馥可以薫袖可以芼鮮可以漬蜜真佳實也橘錄黎舉常欲令橙子臣櫻桃但恨時不同金城記集穰橙鄧橘蜀都賦在南稱柑渡北則橙文選襄隂大橙胡道安賦細雨更移橙霜橙壓香橘杜詩鵠殻攅􅅛韓文本朝嘉樹團團俯可攀壓枝秋實漸斕斑朱欄碧瓦青霜曉粲粲繁星綠葉間六一集一年好景君須記正是橙黄橘綠時西風初作十分涼喜見新橙透甲香金橙縱復里人知不見鱸魚價自低須是松江煙霧裏小盤燒薤𢷬香虀東坡柚經厥包橘柚錫貢書子吳越之間有木焉其名曰櫾碧樹而冬青實丹而味酸度淮北而化為枳焉列子傳記柚條也爾雅詩云有條有梅果之美者雲夢之柚吕氏春秋洞庭之山綸山銅山賈超之山其木多櫾山海經成都有柚大如升廣志廣州别有雷柚廣州記柚大橘也赤黄而酢風土記東方建春山外多柚神異經集紫葉𤣥實綠裏朱莖七蠲橘柚芬芳子虛賦枸櫞傳記枸櫞樹似橘如柚大而頗長味竒酢廣州記枸櫞大如飯筥皮不香味不美異物志枸櫞子形如瓜皮似橙而金色故人重之愛其香氣京輦豪貴家飣盤筵憐其逺方異果南中女工競取其肉雕鏤花鳥浸蜂蜜㸃以胭脂亦不讓湘中人鏤木瓜也嶺表錄異金橘本朝金橘産於江西都人初不識明道景祐初始與竹子俱至京師竹子味酸人不甚喜後遂不至而金橘香清味美置之樽爼間光彩灼爍如金彈丸誠珍果也都人初不甚貴後因温成皇后尤好食之由是價重京師歸田錄苑臣初摘置琱盤口敕宣恩賜近官氣味豈同淮枳辣皮膚不作楚梅酸參差翠葉藏珠琲錯落黄金鑄彈丸安得一株擎雨露畫圖傳與世人看李清臣霜枝摇落黄金彈山谷銀杏傳記唐鄭光讌飲把酒曰某改令身上取果子名云膍臍薛保遜還令云脚杏滿座大笑盧氏雜說本朝鴨脚生江南名實未相浮致逺}
