  - {type: variant, offset: 2265, length: 1, content: 擒, krp: 願天公憐赤子莫生此物為瘡痏雨順風調百穀登民不飢寒為上瑞東坡獨使皴皮生弄色暎琱爼同上炎精孕秀多靈植荔子佳名聞自昔絳囊剖雪出琱盤尋常百果無顔色閩天六月雨初晴星火熒煌耀川澤歘如彩鳯戲翺翔爛若彤雲堆翕赫中郎裁品三十三陳紫方紅冠儔匹陳去非筆下丹青千品色釵頭風露一枝香鷄冠借喻何輕許馬乳争名固不量劉屏山錦筵火齊堆金盤五月甘漿破齒寒劉貢父龍眼史交趾七郡獻龍眼謝承後漢傳記益智龍眼也廣雅龍眼一名比目吳氏本草龍眼一名益智蓋甘味歸脾而能益智非今益智子也本草龍眼樹葉似荔支蔓延緣木生子大如酸棗色味純甜無酸廣志龍眼子樹如荔支葉小殻青黄色形圓如彈丸大核如木槵子而不堅内白帶漿其甘如蜜一朶常三二十顆荔支方過龍眼即熟南人謂之荔支奴嶺表錄異集傍挺龍目左思賦本朝閩越之人髙荔子而下龍眼吾為評之荔子如蝤蛑大蟹斫雪流膏一嘬可飽龍眼如食蟛􅒹石蟹嚼嚙久之了無所得然酒闌口爽饜飽之餘則咂啄之味石蟹有時而勝蝤蛑也東坡亷州龍眼質味殊絶可敵荔支龍眼與荔支異生同父祖端如甘與橘未易相可否異哉西海濵琪樹羅𤣥圃纍纍似桃李一一流膏乳坐移星殞空又恐珠還浦圖經未嘗說玉食逺莫數獨使皴皮生弄色映琱爼蠻荒非汝辱幸免妃子汚並同上幽株傍挺綠婆娑啄咂雖微奈美何香割蜜脾知韻勝價輕魚目為生多劉屏山棗經八月剝棗詩子曾晳嗜羊棗而曽子不忍食羊棗孟史李少君以却老方見上少君曰臣曾遊海上見安期生食巨棗大如𤓰史記廣陵厲王胥宫園中棗樹乃生十餘莖莖正赤葉白如素玉坐呪咀自殺漢書王吉居長安其東家有棗樹垂吉庭中吉婦取棗以㗖吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還安邑千樹棗此其人皆與千戸侯等並同上孟節能含棗核不食可至五年謝承後漢李郁因晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象將不免乎未幾而卒晉史傳記棗壺棗也今江東稱棗大而銳上者為壺邊要棗細要棗也今謂之鹿盧棗櫅白棗即今棗子樲酸棗樹小實酸孟子曰養其樲棘遵羊棗俗呼為羊矢棗洗大棗今河東猗氏出蹶泄苦棗子味苦也晳無實棗不著子也還味稔棗還味短味也已上並爾雅北山有棗使叔夀考焦贑易林握棗與錯金以示嬰兒必取棗而不取金春秋繁露魏文帝忌弟任城王饒壯因在卞太后側共圍棋並啖棗文帝以毒置諸棗蔕中自選可食者而王弗悟遂雜進之中毒遂卒世說王大將軍嘗至石崇家如厠見漆箱中盛乾棗本以塞鼻王遂食盡羣婢莫不笑同上景公謂晏子曰東海之中有棗花而不實何也晏子曰昔者秦穆公乗龍治天下以黄布裹蒸棗至海而投其布故水赤蒸棗故花而不實公曰吾佯問子對曰嬰聞佯問因佯對之晏子春秋七月七日西王母當下為帝設玉門之棗漢武内傳北極有岐峯之隂多棗樹百尋其實長尺核細而柔百嵗一實拾遺記老子西遊省大真王母共食玉文之棗其實如缾關令尹内傳沈羲為仙人所迎上天云老君賜棗二枚大如鷄子神仙傳馮明生為縣吏捕賊為賊所傷殆死遇神女以藥與服即愈明生隨神女還岱宗見安期生曰共與女即遊於安息西母之際食棗異美此間棗小不及意此棗未久已二千年矣神女云昔與君共食一枚乃不盡此間小棗那可相比也馮明生別傳東郡穀城棗長二寸西王母棗大如李核三月熟河内汲郡棗一名墟棗一名安邑棗東海蒸棗洛陽夏白棗安平信都大棗單父棗梁園國夫人棗大白棗一名曰慼咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗牙鷄心牛頭羊矢猴細腰之名又有𤣥棗﨑亷棗桂棗廣志景陽山南有百果園果别作一林林各有一堂有仙人棗長五寸把之兩頭俱出核細如針霜降乃熟食之甚美洛陽伽藍記􅝜嵣細棗出􅝜嵣之山山臨碧海萬年一實子如今軟棗笮之有膏膏可燃燈西王母握核以獻帝因名曰握核棗洞㝠記大業二年信都獻仲思棗長四寸五寸圍勝於青州棗洞𤣥錄初脩上林苑羣臣各獻名果樹有弱枝棗西王母棗棠棗王門棗青華棗梬棗赤心棗西京雜記波斯棗廣州所種者或三五年一番結子亦似此中青棗但小耳嶺表錄異蒲中多大棗嵗中不過一二無核者廣記滄州有碧棗大如梨梁武帝以棗擲蕭琛琛取栗擲帝正中面曰陛下投臣以赤心臣敢不戰栗於陛下並同上北方有七尺棗述異記集安平好棗何晏論素華離離朱實甚脫色如霜雪甘如含蜜傅𤣥賦黄葉離髙柯丹棗坐自零不摘棗自零念我少弟兄前人歌詞棗下纂纂朱實離離宛其落矣化為枯枝潘岳笙賦周文弱枝之棗閒居賦信都之棗左思魏都賦美棗生荆棘古詩赤心鯁直郭璞賛垂花臨碧澗結翠依丹巘吳筠外雖多荆棘内實有赤心趙整浮華齊水麗垂彩鄭都竒白紛英靡靡紫子標離離風摇羊角樹日映鷄心枝穀城踰石蜜蓬岳表仙儀已聞安邑美永茂玉門垂梁簡文帝紅皺曝簷瓦韓集棗圃落青璣同上本朝秋來紅棗壓枝繁堆向君家白玉盤六一集甘心楚國赤萍實磊落韓嫣黄金丸同上風包墮朱繒日顆皺紅玉王介甫胡桃傳記上林苑有胡桃西京雜記陳倉胡桃皮薄多肌隂平胡桃大而皮脆急捉則破廣志張騫使西域還得胡桃博物志山胡桃皮厚而堅底平如㯽榔以斧搥之方破嶺表錄異集三桃表櫻胡之别潘岳閒居賦胡桃本生西羌外剛内柔質似賢劉滔母答吳國書榧子本朝彼美玉山果粲粲金盤實瘴霧脫蠻溪清樽奉佳客客行何以贈一語當加璧祝君如此果得膏以自澤驅攘三彭仇已我心腹疾願君如此木凛凛傲霜雪斷為君倚几滑浄不容拭物微興不淺此贈無虛擲東坡送鄭户曹栗經樹之榛栗詩經東門之栗詩鄭風隰有栗詩秦風女贄不過榛栗棗脩以告䖍也左傳哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗語子莊周遊乎調陵之樊睹一異鵲感周之顙而集於栗林莊子史燕秦千樹栗此其人與千户侯等漢書東夷韓國出大栗如梨魏志劉秀之從叔穆之為丹陽㕔事柱有一穿穆之謂子弟曰汝等試以栗遥擲柱入穿者必得此郡唯秀之獨入焉其言果驗晉書王泰年數嵗時祖母散栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之同上沈約嘗侍宴會豫州獻栗徑寸半竒之問衆栗事少多與約各疏所知梁書傳記五方皆有栗周秦吳揚特饒唯漁陽范陽栗甜美長味倭韓國上栗大如鷄子亦短味不美桂陽有栗藂生大如杼子詩義疏八月栗零零也者降也零而後取之故不言剝大戴禮果之美者箕山之栗吕氏春秋上林苑有侯栗榛栗瑰栗嶧陽栗西京雜記漢武帝果園有大栗十五枚及一升三秦說東北荒有栗樹髙三十丈栗徑三尺其殻赤肉黄白味甜神異經諸暨如拳之栗地理誌廣州無栗唯勒州山中有石栗一年方熟皮厚而肉少味似胡桃仁熟時或為羣鸚鵡至啄食畧盡嶺表錄異汝水灣中有栗園數貢三百石以充天府水渚即栗洲也水經注王可交掉漁舟遇道士與栗青赤色如棗長二寸許非人間之栗肉脆而甘如飴廣記有佐酒倡優侮殷七七乃白主人欲以栗為令乃以栗巡行笑七七者作石綴於鼻掣拽不落滄州有丹栗大如梨並同上鄴中産巨栗脫其殻可以為杯鄴中記集穰多栗過拳杜詩山家蒸栗暖羅生雜橡栗嵗拾橡栗隨狙公並同上採栗𤣥猿窟韋蘇州王檀侯栗王彪之賦人有折蔡氏祠前故栗者故作此賦蔡邕傷故栗賦中山好栗何晏論本朝夜火爆山栗六一集老去自添腰脚病山翁服栗舊傳方客來為說晨興晩三咽徐收白玉漿蘇子由榛經山有榛疏云榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木藂生髙丈餘作胡桃味遼代上黨皆饒詩榛楛濟濟旱麓女贄不過榛栗棗脩左傳傳記榛似梓實如小栗說文枝葉似栗樹小似橡子味似栗枝莖可以為燭詩義疏上市之山下多榛楛山海經漢末楊氏家園中産神榛二株述異記集寒梨乾榛七辨櫻桃經仲夏之月天子羞以含桃先薦寢廟記史惠帝出離宫叔孫通曰今櫻桃熟可獻陛下宜以櫻桃獻宗廟上許之漢書太宗將致櫻桃於酅公稱奉則以尊言賜又以卑虞監曰昔梁帝遺巴陵王稱餉遂從之唐書中宗遊芳林園命公卿馬上摘櫻桃𤣥宗紫宸殿櫻桃熟命百官口摘之蕭穎士李林甫欲用之乃召見時穎士居母䘮即縗麻而謁林甫林甫素不識遽見縗麻即令斥去穎士乃為伐櫻桃賦以刺林甫云擢無庸之瑣質因本枝而自庇泊羣材而非據居階庭之右地雖先寢而或薦豈和羮之正味文宗嘗因内園進新櫻桃將以賜二宫上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常並同上傳記楔荆桃爾雅注曰今櫻桃含桃櫻桃為鳥所含故曰含桃吕氏春秋注孟夏祭用櫻桃范注祠祭櫻桃大者如彈丸有長八分者白色多肌者凡三種廣志櫻桃或如手指春秋冬夏華實竟嵗博物志櫻桃一名朱桃一名麥英本草實深紅色者謂之朱櫻正黄明者謂之蠟櫻同上漢明帝於月夜讌賜羣臣櫻桃盛以赤瑛盤羣臣視之月下以為空盤帝笑之拾遺錄景龍四年上與侍臣於樹下摘櫻桃恣其食大陳宴席至暝每人賜朱櫻二籠景龍文館記上幸兩儀殿命侍臣食櫻桃盛以琉璃和以杏酪飲酴醿酒同上黎舉欲令橙子臣櫻桃但恨時不同耳金城記韓約能作櫻桃饆饠其色不變雜爼集惟櫻桃之先熟兆百果而含榮鳥纔食而便墮雨薄灑而皆零後梁宣帝賦櫻桃為樹則多䕃為果則先熟𫝊咸賦集繁星而積曜栁文西蜀櫻桃也自紅野人相贈滿筠籠數囘細㵼愁仍破萬顆匀圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬杜詩崖蜜松花熟赤墀櫻桃枝隠映銀絲籠干春薦陵寢永永垂無窮並同上漢家舊種明光殿炎帝還書本草經豈若滿朝承雨露共看傳賜出青冥香隨翠籠擎初重色照銀盤㵼未停韓集合充鳯食留三島誰許鸎偷過五湖苦筍恐難同象匕酪漿無復瑩蠙珠韓偓披香殿下櫻桃熟温庭筠空看翠幄成隂日不見紅珠滿樹時宜男謾作後庭草不似櫻桃千子垂並同上矮墮綠雲髻欹危紅玉篸李義山珠實雖先熟瓊莩縱早開流鸎猶故在争得諱含來同上新果真瓊液來應宴紫蘭圓疑竊龍頷色已奪鷄冠杜牧白玉牕中起草臣櫻桃初赤試嘗新殿頭傳語金階逺因進詞來謝聖人王建本朝杜牧之詩云忍用烹酥酪從將洗玉盤遂知唐人已用櫻桃薦酪也作錄東坡橄欖詩曰待得微甘囘齒頰已輸崖蜜十分甜見鬼谷子曰崖蜜櫻桃也墨客揮犀紫櫻桃熟麥風涼六一集獨遶櫻桃樹酒醒喉肺乾莫除枝上露從向口中傳東坡傾籃的皪沾朝露出袖熒煌得寶珠會薦瑛盤傾一座莧腸藜口未良圖陳后山梅經若作和羮爾惟鹽梅書摽有梅其實七兮摽有梅其實三兮詩子百梅足以為一人酸一梅不足為百人酸淮南傳記梅柟爾雅梅杏類也樹及葉皆如杏而黒詩義疏靈山其木多梅山海經魏武帝興軍士失道大渇而無水遂令曰前有梅林結子甘酸可以止渇士卒聞之皆口中水出遂得及泉原世說五月有落梅風江淮以為信風又有霖霪號為梅雨霑衣服皆敗黦風俗通上林苑有朱梅同心梅紫蔕梅燕支梅麗枝梅紫花梅侯梅西京雜記夏至之雨名為黄梅雨風土記蜀名梅為􅀢大如鴈子梅􅀢皆可以為油脯黄梅以熟􅀢作之廣志晉范汪能啖生梅人嘗致一斛奩須臾啖盡詩林集亦果中之嘉實吳淑賦紅綻雨肥梅杜詩四月熟黄梅梅杏半傳黄並同上好忻待賔侣金盤薦紅瓊庾信齒軟越梅酸韓偓天賜烟脂一抹腮盤中磊落笛中哀雖然未得和羮便曾與將軍止渇來羅隠本朝吳人謂梅子為曹公以嘗望梅止渇也筆談江梅有佳實託根桃李場山谷古來和鼎實此物升廟廊青莎徑裏香未乾黄鳥隂中實已團蒸豆作烏鹽作白屬聞丹杏薦牙盤北客未嘗眉自顰南人誇說齒生津磨錢和蜜誰能許去蔕供鹽亦可人並同上楊梅傳記地有章名則生楊梅博物志故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也吳興記楊梅其子如彈丸正赤五月中熟熟時似梅其味甜酸臨海異物志盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下廣州記楊脩七嵗甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔用指以示兒曰此真君家果兒應聲答曰未聞孔雀是夫子家禽世説新語趙綸妻死遺雪竹搔頭階下不數日化為楊梅花朶如撒時人異之姑臧記陸展郎中見楊梅歎曰此果恐是日精然若無蜂兒採香誰勝難和之味即以竹絲籃貯千枝并茶花蜜送衡山道士湘潭記黎舉常云楊梅枇杷幸為執友金城記集懐蘂挺實涵黄橘丹鏡目綉壑照霞綺蠻江淹頌玉盤楊梅為君設吳鹽如花皎白雪李白本朝南村諸楊北村盧白花青葉冬不枯垂紅綴紫煙雨裏特與荔支為先驅東坡羅浮山下四時春盧橘楊梅次第新同上楊出稽山世少雙情知風味勝他楊玉肌甫醉生紅粟墨暈微深染紫囊火齊堆盤珠徑寸醴泉繞齒柘為漿楊誠齋越絶諸楊盛一時也解過江尋德祖政緣作尹是丘遲渠伊不是南村𣲖未免先驅是荔支並同上杏子五沃之土其木宜杏管子孔子休坐杏壇之上莊子史馬燧之子暢以第中大杏饋竇文場文場以進德宗德宗未嘗見頗怪令中使就封杏樹暢懼進宅廢為奉誠園唐書傳記杏木者東方嵗星之精典術杏多實不蟲者來年秋善師曠占靈山之下其木多杏山海經夏祠用杏盧諶祭法張元性亷潔南隣有杏二樹杏熟多落元園中元所得者悉以還主董奉居廬山為人治病得愈者令種杏數年成林奉語買杏者不須來報但自取之一器榖便得一器杏有人少穀徃而取杏多即有虎逐之奉悉以杏所得穀賑救貧窮神仙傳仙人有三𤣥紫杏南岳夫人傳上林有文杏蓬萊杏西京雜記滎陽有白杏鄴中有赤杏有榛杏廣志嵩髙山東北有牛山多杏百姓饑饉資此為命嵩山記杏園洲南海中多杏海上人云仙人種杏處漢時嘗有人舟行遇風泊此洲食杏免死云洲中有冬杏述異記范蠡宅在湖中有海杏大如拳賴鄉老子祠有縹杏並同上北齊仙都苑有合歡杏花木錄齊南郡東南杏大如梨色黄如橘土人謂之漢帝杏亦曰金杏雜爼集冬實之杏王充賦魏土送西山之杏王逸荔支賦豹祠赤杏王廙賦越魏都之赤杏胡道安賦光武墳邊杏甚美今奉送其核朱起石與兄書本朝貢杏初嘗酒正醇六一集芳枝結青杏翠葆新奕奕同上酒䦨紅杏闇東坡大杏金黄小麥熟同上屬同丹杏薦牙盤山谷里中饋杏得嘗新后山意行到南園杏子半紅碧誠齋小苦已自正未酸政堪喫聊將挿鬢歸空樽有餘瀝同上桃經桃之夭夭有蕡其實投我以木桃報之以瓊瑶投我以桃報之以李並詩子五沃之土其木宜桃管昔彌子瑕有寵於衛君食桃而甘以其半啖君君曰愛我哉忘其口而啖寡人及彌子瑕得罪於君曰是固嘗啖我以餘桃韓子五原蔡誕入山而還欺其家云到崑崙山有玉桃須玉井水洗之便軟而可食抱朴子史貞觀十一年康國獻金桃銀桃詔令植之於苑囿唐書莊宗年邁多疾馮道奏曰臣願陛下寢膳之間動留調衛因指御前果實曰如食桃不康翊日見桃而思戒可也五代史傳記六月煮桃以為豆實大戴禮玉衡星散為桃春秋運斗樞旌冬桃子冬熟也椃桃山桃並爾雅玉桃服之長生不死神異經關令尹喜從老子西遊省大真王母共食碧桃内傳孔子侍坐於魯哀公哀公賜之桃與黍仲尼先飯黍而後食桃公曰以黍雪桃也對曰黍五穀之長果六而桃為下君子不以貴雪賤家語公孫接田開强古冶子事景公勇而無禮晏子言於公請公饋之二桃曰三子計功而食公孫接田開强先言功援桃而起古冶子又言其功令二子反桃二子慙而自殺古冶子曰恥人以言夸其聲不義也亦反其桃契領而死晏子春秋魏文侯見箕季從者食其功而箕季禁之文侯曰豈愛桃哉是教我下無犯上也劉向新序上林苑有秦桃櫻桃緗核霜桃金城桃胡桃綺葉桃含桃紫文桃西京雜記東郡獻短人武帝呼東方朔短人指朔曰王母種桃此兒三偷之矣後西王母下出桃七枚自㗖其二以五枚與帝帝留核欲種之母歎曰此桃三千年一著子非下土所植也漢武故事張陵服丹能變化有趙升就陵受學陵與諸弟子登雲臺山有桃樹旁生石壁下桃大有實陵曰得此者當告以道升乃從上自擲正投桃樹得二百枚陵分賜諸弟子餘二枚陵自食一留一以與升神仙傳桓𤣥素輕柏崖崖有好桃𤣥連就求之不得佳者𤣥與殷仲文書曰德之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得也世說積石山桃實大如十斛甕𤣥中記磅磄山有桃樹千圍萬嵗一實拾遺記漢明帝時嘗獻巨核桃霜下結花隆暑方熟常使植於霜林園俗謂相陵聲之誤}
