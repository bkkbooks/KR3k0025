  - {type: variant, offset: 2522, length: 281, content: 吾嘗恥隋陸無武絳灌無文隋陸遇高帝而不能建封侯之業絳灌遇文帝而不能興庠序之教通監晉世祖張輔嘗著論以為管仲不若鮑叔班固不及司馬遷魏武不及劉備樂毅減於諸葛亮晉書崔浩曰王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也通監晉紀魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎通監晉恭紀互見品藻胡藩言於裕曰公謂劉衛軍終能為公下乎裕默然久之曰卿謂何如藩曰連百萬之眾攻必取戰必克毅固以此服公至於涉獵傳記一談一詠自許以為雄豪公殆, WYG: ''}
  - {type: variant, offset: 2522, length: 281, content: 吾嘗恥隋陸無武絳灌無文隋陸遇高帝而不能建封侯之業絳灌遇文帝而不能興庠序之教通監晉世祖張輔嘗著論以為管仲不若鮑叔班固不及司馬遷魏武不及劉備樂毅減於諸葛亮晉書崔浩曰王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也通監晉紀魏主嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅桓玄興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎通監晉恭紀互見品藻胡藩言於裕曰公謂劉衛軍終能為公下乎裕默然久之曰卿謂何如藩曰連百萬之眾攻必取戰必克毅固以此服公至於涉獵傳記一談一詠自許以為雄豪公殆, krp: ''}
