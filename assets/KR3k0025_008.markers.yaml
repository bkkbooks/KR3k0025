  - {type: variant, offset: 1750, length: 1, content: 興, WYG: 靈臺但有時臺囿臺也五經異義子雖有臺池鳥獸豈能獨樂哉孟九層之臺起於累土老子尸子曰瑶臺九累而堯白屋史武帝升望月臺南端有三鴨羣飛俄而下臺帝悦之至夕鴨宿臺端洞㝠范蠡起遊臺於怪山以為靈臺仰觀天文候日月之變怪吳越春秋傳記案山海經有軒轅臺帝堯臺帝舜臺其後夏有璿臺鈞臺殷有鹿臺南單臺周有靈臺重璧臺秦有章臺鳯皇臺望海臺琅琊臺漢有栢梁臺漸臺神明臺八風臺思子臺後漢有雲臺魏有銅雀臺金臺氷井臺凌雲臺南巡臺九華臺吳有釣臺晉有崇天臺織室臺此其畧也類要白虎通曰天子立靈臺所以考天人之際察隂陽之㑹揆星度之驗景公與晏子遊少海登柏寢之臺望其}
