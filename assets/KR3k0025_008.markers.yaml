  - {type: variant, offset: 1756, length: 1, content: 馬, WYG: 並代自祖及孫官府邸宅相望漢記傳記戴延之西征記曰蒲坂城外有舜宅瀬鄉記云譙城西有老子宅漢書云魯有孔子宅水經注云齊城北門外有晏嬰宅荆州記云宛有伍子胥宅秭歸縣有屈原宅義陽安昌有漢光武宅宅亦曰第言有甲乙之次第也一曰出不由里門面大道者名曰第爵雖列侯食邑不滿萬户不得作第其舎在里中皆不稱第集新豊停翠輦譙邑駐鳴笳園荒一徑㫁臺古半階斜前池消舊水昔樹發今花一朝辭此地四海遂成家唐太宗翫竹春前筍驚花雪後梅青山殊可對黄卷復時開江總詩乗春行故里徐歩採芳蓮逕毁悲仇仲林殘憶巨源見桐猶識井看栁尚知門花落空難徧鸎啼静易喧無人訪語黙何處叙寒溫江總鳥散茅簷静雲披澗户斜唐楊師道未如靈光輪奐睢陽爽塏北連城闕有似甄侯之宅東望市􅆵榮深豫章之門昔狼望未平冠軍辭第梁元帝義範蒼生道格時雍自昔爰止於焉龍盤躬耕西畝永嘯東巒跡逸中林神凝嚴端同上庫藏經武庫軍府甲兵所聚非邑非里}
