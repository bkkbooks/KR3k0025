  - {type: variant, offset: 2680, length: 178, content: 敘傳鄭詹縛於晉終亦無死鍾儀南音卒獲返國叔向囚虜自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寬擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗唐書柳宗元傳集綠驥垂耳於林坰鴻雀戢翼於汙池褻之者固以為園囿之凡鳥外廄之下乘也及整蘭莇揮勁翮陵厲清浮顧盼千里豈可謂其借翰於晨風假足於六駮哉陳孔璋書朝為仇虜夕為上將陳孔璋檄, WYG: 地志天}
