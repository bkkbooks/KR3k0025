  - {type: variant, offset: 862, length: 0, content: '', WYG: 曰禪庭誰作石龍頭龍口湯泉沸不休直待衆生塵垢盡我方清冷混常流瀑布傳記唐宣宗㣲時以武宗忌之逐出為僧與黄蘗禪師同觀瀑布黄蘗得一聨云千岩萬壑不辭勞逺看方知出處髙宣宗續之曰溪澗豈能留得住終歸大海作波濤王者氣象可見也史詩集灑流濕行雲濺沫驚飛鳥雷吼何噴薄箭馳}
