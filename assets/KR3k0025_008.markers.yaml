  - {type: variant, offset: 2859, length: 177, content: 安國免徒起紆青組張敞亡命坐致朱軒陸士衡不見公與相起身自犁鋤韓文李斯逐焉而為上卿鄒陽囚焉而為上客劉賓客本朝士方窮時困阨閭里庸人孺子皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦高車駟馬旗旄導前騎卒擁後夾道之人相與駢肩累跡瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以悔罪於車塵馬足之間者此一介之士得志當時而意氣之盛昔人比之衣錦之榮者也歐公書錦堂記互入炎涼趙廣漢, WYG: 兩}
