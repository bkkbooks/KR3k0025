  - {type: variant, offset: 66, length: 3, content: 知風乘, krp: 改井无喪无得往来井井汔至亦未繘井羸其缾凶巽乎水而上水井井養而不窮也木上有水井初六井泥不食舊井无禽九二井谷射鮒九三井渫不食可用汲六四井甃无咎九五井洌寒泉食上六井収勿幕井德之地也井居其所而遷井以辨義井道不可不革易塞井夷竈左傳宰}
  - {type: variant, offset: 70, length: 7, content: 耶我乘風耶列黃, WYG: 問曰仁者雖告之曰井有仁焉其從之也論語子瞽瞍使浚井出從而揜之有為者辟若掘井掘井九軔而不及泉猶為棄井也孟子子貢見一丈人方將為圃畦鑿隧而入井抱瓮而出灌搰搰然用力甚勞而見功寡井蛙不可以語於海者拘於虛也子獨不聞乎埳井之蛙乎跳梁乎井幹之上入休乎缺甃之崖甘井先竭莊子短綆不可以汲井深之泉荀子伯益作井而黄龍登余祖嘗為臨沅令此縣民夀考或百嵗或八九十嵗疑其井水殊赤乃試掘井左右得古人埋丹砂數千斛是以飲其水而得夀抱朴子史武}
