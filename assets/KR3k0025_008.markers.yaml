  - {type: variant, offset: 849, length: 0, content: '', krp: 陳后山泉經山下出泉蒙寒泉之食中正也易爰有寒泉在浚之下毖彼泉水亦流于淇泉源在左冽彼下泉莫浚匪泉相彼泉水載清載濁泉流既清觱沸檻泉逝彼百泉觀其流泉無飲我泉我泉我池如彼泉流無淪胥以敗泉之竭矣不云自中詩仲冬水泉動記子原泉混混泉之始達孟子孔子過於盜泉渇矣而不飲曽子立廉不飲盜泉淮南子史泉流灌浸所以育五穀溝洫志李廣利行軍無水㧞劍刺山飛泉湧出本傳廣州有貪泉前}
  - {type: variant, offset: 850, length: 0, content: '', WYG: 飲者懷無厭之欲呉隠之酌而飲之賦詩曰古人云此水一㰱懷千金試使夷齊飲終當不易心晉書潘師正居逍遥谷髙宗召問所須對曰茂林清泉臣所須唐書楊朝晟師次方渠水乏有青蛇降險下走水從而流朝晟使築防環之有詔命泉曰應聖本傳傳記宋范百年謁明帝帝言及廣州貪泉因問曰卿州復有此水否答曰梁州惟有文川武鄉㢘泉讓水廣記李德裕在中書不飲京城水悉用惠}
