  - {type: variant, offset: 1728, length: 1, content: 荊, WYG: 結於前鎮以嵩髙喬嶽峻極於天傅毅洛都賦於顯樂都既麗且康陪京之南居漢之陽割周楚之豐壤跨荆豫而為疆體爽塏之閒敞紛郁郁其難詳爾其地勢則武闗闗其西桐栢掲其東流滄浪而為隍廓方城以為墉湯谷涌其後濟水蕩其西推瀨引湍三方是通張衡南都賦夫蜀都者盖兆基於上代開國於中古廓靈闗而為門包玉壘而為宇帶二江之雙流枕峩嵋之重阻水陸所湊兼六合而交㑹也晉左思蜀都賦京洛信名都佳麗擬蓬壺九華彫玳瑁百福上椒塗黄金絡騕褭蓮花装鹿盧咸言儀服盛全盛執金吾陳孔奐賦詩憲章殫禮樂容服備車徒迴鑾入酆鎬從蹕度枌榆冉冉年和變遲遲節物徂餘花照玉李細葉翦珪梧朝夕萬國湊海㑹百川輸許善畫野通淮泗星躔應斗牛玉牒宏圖表黄旗美氣浮三分開霸業萬里宅神州髙臺臨茂苑飛閣跨澄流江濤如素盖海氣似珠樓吳趨自有樂還似鏡中遊虞世南賦城郭經哲夫成城公侯干城宗子維城無俾城壞俱詩周禮曰日至之晨尺有五寸謂之地中天地之所合也四時之所交也乃建王國焉子三里之城七里之郭孟子管子曰内為之城外為之郭鯀作九仭之城淮南呉越春秋鯀築城以衛君造郭以守民此城郭之始也崑崙}
