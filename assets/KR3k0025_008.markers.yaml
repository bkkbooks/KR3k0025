  - {type: variant, offset: 863, length: 0, content: '', WYG: 窈窕張九齡飛湍瀑流争喧豗砯崖轉石萬壑雷日照香爐生紫煙遥看瀑布挂長川飛流直下三千丈疑是銀河落九天西登香爐峯南見瀑布水挂流三千丈噴壑數十里歘如飛雷来隠若白虹起}
