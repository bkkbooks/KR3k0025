  - {type: variant, offset: 1753, length: 2, content: 恃險, WYG: 曰臺美夫對曰先君莊王為匏居之臺髙不過望國氛大不過容晏豆民不廢時務官不易朝常今君為此臺民罷財盡數年而成諸侯莫至若君謂此美楚其殆矣國語楚靈王作乾溪之臺五百仭之髙欲登浮雲窺天文陸賈新語史記云寡婦清先得丹穴而擅其利數葉家亦不訾清寡婦也能守其業用財以自衛不見犯秦皇帝以為貞婦為築女懷清臺貨殖傳集從明君而嬉遊聊登臺以娯情見天府之廣開觀聖德之所營建髙臺之嵯峩浮雙闕乎泰清仰沖天之單觀連飛閣乎西城臨漳川之長流望衆果之滋榮仰春風之和穆聽百鳥之悲鳴天功怛其既立家願得而雙呈揚仁化於宇宙盡肅恭於上京雖桓文之為盛豈足方乎聖明休矣美矣惠澤逺暢翼佐皇家寜彼四方同天地之矩量齊日月之暉光魏陳思王曹植賦魯國觀遺殿韓城想舊臺仲宣原濕滿子建悲風来夏蓮猶反植秋牕尚左開圖雲仍溜雨書石即生苔梁庾肩吾蓮披香稍上月明光正来離鵠將雲散飛花似雪迴遥思休林友前牕夜夜開陳祖孫周氏舊居惟漢襲因崇臺嶆㠂上礙蒼雲垂示億載俾率舊章人循其行而國其昌李尤銘堂經天子之堂九尺諸侯七尺大夫五尺士三尺禮記書大𫝊云天子之堂髙九雉公侯七雉伯子男五雉注云雉長三尺也堂上接武堂下歩武禮記子置杯水於㘭堂之上則芥為之舟莊殷人曰陽館周人曰明堂尸子堂髙數仭榱題數尺孟今歩者一日百里之情通堂上有事一月而君不聞歩者百日萬里之情通門庭有事周年而君不聞此謂逺於萬里也管子史劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時逍遥園李中堂元逹抱堂下樹呌曰臣所言社稷之計聰勉聽之於是易李中堂為愧賢堂漢趙記傳記墨子稱堯舜堂髙三尺武王入殷登堂見美玉曰誰之玉或曰諸侯之玉也王取而歸之天下聞之曰王㢘於財矣漢武有玉堂去地十二丈光武生有赤光堂中盡明如晝靈帝造萬金堂於西園魏名臣奏有翦吳堂有魏茅堂晉宫闕名有堯母堂永光堂長夀堂在郡國魯城北有孔子學堂蜀有文翁講堂北海有鄭𤣥儒林講堂永康縣有縉雲堂費北有積弩堂崑崙山有光碧堂羣書類記集樹中天之華闕豊冠山之朱堂班固西都賦覽黄圖之棟宇規紫宸於太清何面勢之膠葛信不日之經營仰一時之壯麗跨萬古之威靈吐觸石之竒色混髙臺之舊名若乃三階八戸百柱千楹瑩以玉琇飾以金英緑芰懸插紅蕖倒生於時木葉聲寒壼人唱静承露擎虛相風昭逈天子乃下輦開讌出豫娛神文懸日月思革風塵寔附鳯之多幸愧屠龍之不真江總賦宅子天子宅千畝諸侯百畝大夫以下里舎九畝尉繚子封衡宇百華中書監裕之子也輕財好施年十餘嵗見一老父荷擔於路引歸問之父曰宣子一飯著名春秋宜給宅一區奴一口日供贍以終其年裕髙其志而従之崔子史夏侯嬰以太僕事惠帝髙后德嬰之脱孝惠魯元於下邑間乃賜嬰北第第一曰近我以尊異之張放以公主子取皇后弟平恩侯嘉女成帝賜甲第哀帝為董賢起大第北闕下俱漢書竇氏一公兩侯三公主四二千石相}
