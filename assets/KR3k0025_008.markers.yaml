  - {type: variant, offset: 852, length: 2, content: 炊沙, WYG: 泉音玉淙琤泄乳交巖脈清泉潔塵襟泉紳拖脩白居然鱗介不能容石眼環環水一鍾韓集懸泉粲成簾羅注無時休韻磬叩凝碧鏘鏘徹岩幽引泉開故竇栁集本朝趙德麟曰王仲至謂余云吾嘗奉使過仇池有九十九泉萬山環之可以避世如桃源東坡集使君能愛客朝夕弄山泉翁歡不待絲與竹把酒終日聽泉聲飛泉溜垂綆石乳滴空竇靈泉吐巖側安得白玉琴寫之朱絲繩卧聞乳石淙溜響疑是香林八節聲山泉響夜琴史君自有林泉趣不用笙簧亂水聲隂精分月窟水味標茶錄歐陽公最愛泉鳴澗初嘗渇入喉遂名參寥泉可濯幽人襟石泉解娛客琴筑鳴空山或為雲洶湧或}
