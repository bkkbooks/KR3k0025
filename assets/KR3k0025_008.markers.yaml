  - {type: variant, offset: 861, length: 0, content: '', WYG: 昨日寄書至坐想參寥泉此泉如此公遇物作清妍陳后山温泉傳記秦始皇至驪山與神女遊而忤其㫖神女唾之遂生瘡始皇怖謝神女為出温泉而洗除三秦記凡水源有石硫黄其泉則温或云神人所暖主療人疾博物志紹興山出温泉可以瀹雞吳錄句容縣吳續塘有湖水半冷半熱皆有魚交入輒死雜爼江乘縣有泉半温半冷共出一壑地記雞龍山澗中朝夕湧泉溢出時刻不差號為潮泉常如沸湯潯陽記漢水南有温泉其熱可熟雞子未至二十里即望見白氣衝天梁州記廬山主簿山下有温泉冬夏常熱廬山記天寳六載更温泉曰華清宫湯地理志上於華清新建一湯禄山以玉魚龍鳬鴈石梁石蓮花以獻上命陳於湯中解衣將入龍魚鳬雁皆奮鱗舉翼狀若飛動上因恐却之明皇雜錄集觀温泉浴神井張衡賦偉温濤之若焚曹植賦暄波起兹源劉義恭贊雞頭温水魯湯神泉不㸑自沸熱若焦然爛毛瀹卵煮絹濯鮮洛都賦挺此温谷驪山之隂白礜上徹丹砂下沉温泉銘玉甃煖兮温泉溢白樂天隂陽結炎炭造化開靈泉沸珠躍清月皎鏡涵空天李白零葉翻紅萬樹霜玉蓮開蘃暖泉香行雲不下朝元閣一曲淋鈴淚數行杜牧驪岫飛泉泛暖香九龍呵䕶玉蓮房李義山華清源中礜石湯徘徊百鳯隨君王李賀本朝過水北十餘里得白水山山行一里許得佛跡院院中湧二泉其東所謂湯泉其西雪如也吾意湯泉在天地間自為一類受性本然不必有待然後温也凡物各求其類而水性猶耿介得其類則雖數萬里而伏流相通非其類則横絶徑過十字旁午而不相入故二泉之間不能容尋常而炎凉特異如此唐子西惠州遊湯泉記泓泓涓涓莫虞嵗年不火而燠其名湯泉嗚呼豈非熒惑蒞於上邪燭龍隠於中邪旁通咸池日馭之所經邪幽精沉魄隂償其負邪丹砂黄硫金石之氣酷悍之所激邪德有常仁惠公而浃寒凝海兮不氷旱焦山兮不竭以沭則髪澤以頮則膚悦其羨流冗浸捐弃於溝壑者猶能灌蔬稻之畦已牛馬之渇此又何其然耶秦少游賦東坡所記湯泉秦州之駱谷渝州之陳氏山居秦君之所賦東城及康廬汝水尉氏驪山後謫居惠州遊白水山佛跡巖浴於湯泉凡有十八矣余之所見新安之黄山閩中之劍浦亦有其二矣第湯泉多作硫黄氣浴之則襲人肌膚惟驪山是礜石泉黄山是硃砂泉漁隠鬱攸火山烈觱沸湯泉注豈惟渇獸駭坐使癡兒怖安能長魚鼈僅可燖狐兎東坡石龍有口口無根自在流泉誰吐吞若信衆生本無垢此泉何處覔寒温東坡詠廬山湯泉先是僧可遺}
