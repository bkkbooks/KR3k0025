  - {type: variant, offset: 849, length: 0, content: '', WYG: 陳后山泉經山下出泉蒙寒泉之食中正也易爰有寒泉在浚之下毖彼泉水亦流于淇泉源在左冽彼下泉莫浚匪泉相彼泉水載清載濁泉流既清觱沸檻泉逝彼百泉觀其流泉無飲我泉我泉我池如彼泉流無淪胥以敗泉之竭矣不云自中詩仲冬水泉動記子原泉混混泉之始達孟子孔子過於盜泉渇矣而不飲曽子立廉不飲盜泉淮南子史泉流灌浸所以育五穀溝洫志李廣利行軍無水㧞劍刺山飛泉湧出本傳廣州有貪泉前}
