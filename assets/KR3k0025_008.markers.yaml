markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷八宋潘自牧撰地理部潮子月之精生水是以月盛則潮濤大潮水從天邊来一月之中天再東再西故潮再大再小也夏時日居南宿而天髙一萬五千里故夏潮大也冬時日居北宿而天卑一萬五千里故冬潮小也春日居東宿故春潮漸起也秋日居西宿故秋潮漸减也天河從北極分為兩條至於南極兩河隨天轉入地下過而下水}
