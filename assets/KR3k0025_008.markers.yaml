  - {type: variant, offset: 2631, length: 0, content: '', WYG: 又趙媫妤居昭陽舎殿壁帶徃徃為黄金缸琅琊王京好宫室理殿館壁帶飾以金銀漢省中皆胡粉塗壁畫古烈士則其事也其名墻有雕墻髙墻繚垣長崇垣壁有粉壁紅壁瓊壁銀壁諸侯垣墻有黝堊之色無丹青之彩劉向新序苑囿傳記昔先王之為苑囿臺池也足以觀望勞形而已矣非好儉節乎性也故周有靈囿國游漢有上林樂遊博望黄山後漢有鴻德畢圭靈崑廣成諸苑晉有平樂鹿子桑梓諸苑或曰囿有林池所以禦災也其餘莫非穀土及其衰也馳騁游獵以奪人之時而勞人之力也務苑囿之大不恤農時所以強國富人者盖此謂也其名苑有天苑禁苑上苑囿有君囿靈囿上囿文帝為太子}
