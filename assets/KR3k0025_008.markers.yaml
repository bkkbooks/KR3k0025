  - {type: variant, offset: 1224, length: 500, content: 迎刃而解晉書以大吞小猶豺狼之食豚也通監晉穆紀譬如以駒犢鬥虎狼也何懼之有通監晉宋太祖隋帝曰取爾如籠內雞雛耳通監陳紀傳記決江河而灌熒火磨蕭斧而伐朝菌說苑使豺狼逐群羊也戰國策以千鈞之弩射潰癰墮千鈞之重集於鳥卵之上必無幸矣馳韓盧而逐蹇兔也並同上集若縱火於秋蓬楚辭執棠谿以刜蓬利劍也秉干將以割肉亦利劍也同上順風而縱烈火曬白日而掃朝雲也曹植漢二祖論若駭鯨之決細網奔兕之觸魯縞未足以喻其易陳孔璋落葉俟微風以隕而風之力蓋寡陸士衡豪士賦序猶烈火之燔秋蓬衝飆之掃落葉也晉庾闡檄石虎文譬猶迴太陽以消湛露運滄海以灌燎火庾亮表顛木之餘枿痤疽之遺種斧斨欲加而先析鍼石未攻而自潰白傳集因雲灑潤則芳澤易流乘風載響則音徽自遠陸機演連珠必有餘刃如烹小鮮白傳集操刃決滯砉騞有聲白傳集霜風冽冽摧朝菌連年收科第若摘頷底髭韓文眾輕鬥蟻勇劣怒蛙纖縞當強弩之初孤豚僨肥牛之下事同拾芥力易摧枯杪忽蜂腰虛見辱於齊斧突梯鼠首濫欲寄於旄頭柳表餘力一揮應手糜碎柳文洪爐熾炭燎一毛大鼎煩湯沃殘雪韋應物太山壓卵鴻毛在爐陳子昂覆暴如風振槁葉裴度撰李晟碑如淬鋒潰疣決防注水陸宣公文以赤刀效小割皇甫湜互入大才小用摧枯爍雪唐文粹如摧枯株如搏蓄兔如利刃之破罥索並同上史四嶽, WYG: ''}
