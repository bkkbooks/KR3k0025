  - {type: variant, offset: 103, length: 126, content: 好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數不止列天瑞莊周夢為蝴蝶俄然覺曰不知周之夢為蝴蝶與蝴蝶之夢為周與莊齊物論互入曠達田里相距雞犬相聞人至老死不相往來蓋自足也文中立命史陶潛絕州郡覲謁其鄉親張野及羊松齡龐遵等或有酒要之共至酒坐雖不識主人亦欣然無忤酣醉便反, WYG: 靈符}
