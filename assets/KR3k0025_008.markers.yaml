  - {type: variant, offset: 2636, length: 1, content: 中, WYG: 立博望苑使通賔客漢書集玉臺極百尺銀樹起千尋水流冠盖影風揚歌吹音踟蹰憐拾翠顧歩惜遺氛日落庭光轉方幰屢移隂紀少瑜寒烟慘髙樹凝露變輕蘿澤葵猶帶荇池竹尚侵荷秋風徒自急無復白雲歌陳釋洪偃館驛經適子之館兮詩見人弗能館不問其所舎禮晉師三日館穀春秋子仁義先王之蘧廬蘧廬舎一宿而去莊子遇夫人之来使必公館而羅羞韓子萬國之㑹四夷之来皆就諸侯之館栁子史鄭莊置驛以筵賔客文帝詔太僕凡遺財餘馬皆給傳置宣帝詔吏或飾厨傳稱過使客以取名譽元帝幸長楊射熊館布車騎大獵楊雄作賦以諫公孫𢎞為相起館開東閣以延賢人鄭當時置驛馬日郊迎賔客俱漢書傳記劉諷夜投空館有三女}
