  - {type: variant, offset: 1749, length: 0, content: '', WYG: 者皆在流遁大構架興宫室延樓棧道雞棲井幹檦木欂櫨以相支持木巧之飾此遁於木也淮南子更始帝到長安其大臣辟除東宫之事為下所非笑但為小衛樓半城而居之以是知其將相非蕭曺之儔也桓譚新論史武帝時方士言黄帝為五城十二樓以候神人魏有麗譙越有飛翼漢有井幹武帝立井幹樓髙五十丈漢書張華善天文解望氣元康初嘗與鄱陽雷孔章共夜登樓而見一氣起牛斗間華謂孔章曰此何氣也對曰其寳劍乎晉書朝日百官班於殿庭左右循使二人分涖於鐘鼓樓下唐書集有都城之百雉加層樓之五尋從明王以登遊聊暇日以娛心鳴鳩拂羽於桑榆游鳬濯翅於素波牧豎吟嘯於阡陌舟人鼔栧而揚歌百寮雲集從坐華臺嘉肴滿爼㫖酒盈杯談三墳與五典釋聖哲之所裁孫楚賦迴首望長安千里懷三益顧惟慙入楚殊私等申白西阻水潦収昭立霜露積龍門不可見空慕凌霜栢劉孝綽臺經經始靈臺經之營之庶民攻之不日成之詩可以居髙明可以逺眺望可以升山陵可以處臺榭月令散鹿臺之財書惟宫室臺榭陂池侈服以殘害於爾萬姓書天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鼈諸侯卑不得觀天文}
