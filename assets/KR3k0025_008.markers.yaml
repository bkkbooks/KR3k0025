  - {type: variant, offset: 866, length: 0, content: '', WYG: 際逶迤見脈分劉禹錫本朝世傳徐凝瀑布詩云瀑布瀑布千丈直雷奔入江無暫息萬古長如白練飛一條界破青山色此至為塵陋又偽作樂天稱美此句有賽不得之語樂天雖渉淺易然豈至是哉乃戱作絶句云帝遣銀河一派垂古来惟有謫仙詞飛流濺沫知多少不為徐凝洗惡詩東坡志林春岩響瀑泉歐陽公靈源何太髙北斗想可挹凌日五光直逗雲千仭急白虹下澗飲寒劒倚天立閃電不得瞬長雷無敢蟄萬丈岩崖折一道林巒濕險逼飛鳥墜冷灑山鬼泣須當截海去濁流不相入范文正擘開青玉峽飛出兩白龍亂沫散霜雪古潭揺青空餘流滑無聲快瀉雙石谼吾聞泰山石積日穿殘溜况此百雷霆萬世與石鬬長輸不盡溪欲滿無底竇跳波翻潛魚震響落飛狖玉淵神龍近雲雨亂晴晝東坡崩騰復璀璨佳麗更雄偉勢從三梁外影落明鏡裏倐至走長蛇提来翻素雪聲雄萬霹靂勢倒千墆嵲朱文公陂陂塘附經彼澤之陂詩史楚孫叔敖作期思陂灌雩婁之野號芍陂史記汝南有鴻隙陂翟方進以數溢為害奏罷之王莽時枯旱郡中追怨乃作童謡曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰言者兩黄鵠後鄧晨為守復脩所壞陂周燮有先人草廬結於岡畔下有陂田嘗服勤以自給宗族更勸之曰君獨何為守東岡之陂乎郭林宗曰黄叔度汪汪若千頃波澄之不清淆之不濁費長房遇壺公幾得道不成長房辭歸翁與一竹杖曰騎此則自至矣長房騎竹杖到家弃葛陂中顧視乃龍也漢書鄧艾於楚州開白水陂灌田又築塘四十九所晉書傳記鄭敬立吏隠居於蟻陂之陽以漁釣自娛汝南先賢傳集或火雲􅅡天旱魃為虐歊蒸癉怒蛟龍逭誅而翠瀲摇岸澄瀾洗月溶溶浩浩獨落天光順勢導流猶潤百里則灌畦浮塍平嵗之溉千頃豈為多哉韋瓘宣州南陵縣大農陂記岑參兄弟皆好竒攜我逺来遊渼陂天地黯慘忽異色波濤萬頃堆琉璃琉璃汗漫泛舟入事殊興極憂思集鼉作鯨吞不復知惡風白浪何嗟及半陂已南純浸山應為西陂好金錢罄一餐飯抄雲子白𤓰嚼水精寒陂塘五月秋陂澤遶迴旋天清黄子坡杜詩陂水寒更緑栁集本朝程明道攝上元邑盛夏陂塘大決法當言之府府禀於漕然後計功調役先生曰如是苖槁矣救民獲罪所不辭也遂發民塞之言行錄汴水濁流自生民以來不以種稲今欲陂而清之萬頃之稻必用千頃之陂一歲一淤三嵗而滿矣東坡萬言書樂哉朱君障靈隄導鄢及蠻興衆陂水落陂光淡歐陽公破陂漏水不耐旱人力未至求天全焦陂上與長淮通秋来不見渼陂岑千里詩盟忽重尋東坡溝洫經坎為溝瀆易濬畎澮巨川書築城伊淢詩遂人凡治野夫間有遂十夫有溝百夫有洫千夫有澮稻人以瀦蓄水以防止水以溝蕩水以遂均水以列舎水以澮瀉水雍氏掌溝瀆澮池之禁司險設國之五溝五澮匠人為溝洫廣尺深尺謂之甽田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仭謂之澮凡溝逆地阞謂之不行凡溝必因水勢善溝者水潄之周禮季春開導溝瀆記月令禹卑宫室而盡力乎溝洫論語子雨集溝澮皆盈其涸也可立而待也孟子江湖鱣鮪非溝洫所容文中子史禹致費於溝洫史本紀禹䟽溝洫滎陽下引東南為鴻溝河渠書召信臣為南陽太守開導溝瀆數十處以廣灌溉歳増至三萬頃前本傳和帝詔曰隄防溝渠所以助順地理令刺史二千石其隨宜䟽導後本紀鮑昱為汝南太守郡多陂池嵗嵗缺壞乃作梁石洫水常饒足溉田倍多本傳傳記宻雨溟沐潤於枯瀆太𤣥長安御溝謂之楊溝謂植髙楊於其上也又曰羊溝謂羊喜觝觸垣牆故為溝以隔之古今注集彼尋常之汙瀆兮豈容吞舟之魚賈誼賦遶堤龍骨冷拂岸鴨頭香李賀御溝詩秋水通溝洫杜詩清溝映汙渠潢潦無根源朝滿夕已除君獨居溝上溝濁萍青青溝聲通􅁐急韓集本朝隣注湧溝竇街流溢庭除歐陽公直度千人溝下有㣲凉泫東坡伏蛙號蚓溝瀆空暗溜入溝塍陳后山河渠史禹以河所從来髙難以行平地乃穿二渠以引其河韓聞秦好興事欲罷之毋令東伐乃使水工鄭國間説秦令鑿涇水自中山西邸瓠口為渠三百餘里欲以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠因命曰鄭國渠武帝時鄭當時為大司農言曰引渭穿渠起長安並南山下至河三百餘里徑易漕而渠下民田萬餘頃又可得以溉田天子以為然令水工徐伯表發卒穿漕渠三歳而通其後河東守番係言穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下度可得五千頃天子發卒作渠田數嵗河移徙渠不利其後人有上書欲通褒斜道及漕事下御史湯天子拜湯子卬為漢中守發數萬人作褒斜道果便近而水湍石不可漕其後莊熊羆言臨晉民願穿洛以溉重泉以東萬餘頃於是發卒萬餘人穿渠自徴引洛水至商顔下穿渠得龍骨故名龍首渠史河渠書西門豹為鄴令鑿十二渠引河水灌田本傳倪寛奏請穿鑿六輔渠以益溉鄭國髙卬之田前溝洫志太始二年趙中大夫白公復奏穿渠引涇水溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉鍤為雲决渠為雨史起為鄴令引漳水溉鄴以富魏之河内民歌曰終古舄鹵兮生稻梁宣帝地節中郭昌乃穿渠直東涇東郡界中不令北曲渠通利百姓安之哀帝時何武奏多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也溝洫志明帝十二年修汴渠十三年渠成後本紀安帝元初二年詔修理西門豹所分漳水為支渠以溉民田二月詔脩理舊渠通利水道以溉公私田本紀馬援所過穿渠以利其民本傳賈侯為豫州通運渠二百里所謂賈侯渠魏志薛胄為兖州刺史城東沂泗二水合而南流胄决令西注陂澤盡為良田民號豊兖渠本𫝊開皇中郭衍開漕渠闗中頼之名富人渠本𫝊唐髙宗時長孫祥奏言昔鄭國白渠溉田四萬餘頃今為富商大賈競造碾磑渠流梗澁止溉萬頃請修營以便百姓開元初詔決三輔渠時王主權家皆旁渠立磑李元紘敕史盡廢之民頼其恩杜亞拜淮南節度使至則治漕渠夹隄髙卬田因得灌溉人皆悦賴温造為朗州刺史開化鄉渠溉田二千頃號右史渠彊循遷雍州司户教人承水浸田號彊公渠薛大鼎遷滄州刺史無棣渠久塞大鼎復治属海民歌曰新溝通舟楫利属滄海魚鹽至李聽徙靈鹽節度部有光禄渠聽即引渠溉塞下地千餘頃本傳傳記漢靈帝西域所獻因墀香煮為浴湯宫人以之沐浴使餘汁入渠名曰流香渠拾遺記延攜為幽州刺史范陽郡有舊沈渠廢敗多時攜自度水形營造溉田萬餘頃通典汝陽王璉取雲夢石甃泛春渠以蓄酒醉仙圖記集君乃崑崙渠籍乃嶺頭瀧牆下春渠入禁溝渠氷初破滿渠浮鳳池近日長光暖流到渠時更不流韓集本朝汴水首受黄河每嵗自春及冬常淤河口均調水勢止深六尺以通行重載為準太宗詔汴河嵗運江淮米五千百萬斛以濟京師金河本京水其源曰祝龍泉過中牟名曰金水國初始遣使浚治惠民河與蔡河一水即閔河也建隆元年始命陳承昭督丁夫遵閔河自新鄭與蔡水合貫京師南歴陳潁達夀春以通淮右舟楫相繼商賈畢至都下利之於是以西南為閔河東南為蔡河至開寳六年始改閔河為惠民河廣濟河自都城歴曺濟及鄆舊云五丈河開寳六年詔改今名㑹要齊州太守政之暇鑿渠開沼䟽清漣鳴渠夹路何潺潺歐陽公明年共看決渠水飢飽在我寜闗天灔灔春渠長東坡秦収鄭渠成市門行清渠山谷郊經同人于郊易王朝至于商郊牧野王出郊書命君陳分正東郊書序命畢公保釐東郊申畫郊圻書適彼樂郊在浚之郊詩二曰四郊之賦注云四郊去國百里遂士掌四郊注云其地則距王城百里以外至二百里載師近郊之地逺郊之地注云五十里為近郊百里為逺郊小宗伯兆五帝於四郊周禮四郊多壘記子齊景公出舎於郊孟子適莾蒼者三餐而返注云莾蒼近郊之邑莊子史東方帝太昊青靈句芒畤於東郊兆南方帝炎帝赤靈祝融畤於南郊兆西方帝少昊白靈蓐収畤於西郊兆北方帝顓帝黒靈𤣥冥畤於北郊兆中央帝黄靈后土畤於長安城之末兆前郊祀志傳記邑外謂之郊郊外謂之牧爾雅賔至於近郊張􅎶行時税舎於北郊今還至此正其故行服以俟君命敬也逺郊之内有候館可以小休止儀禮注卿出郊勞注聘禮曰賔至近郊使卿用束帛勞之國語集四郊多白楊城上俯江郊西郊向草堂西川供客眼惟有此江郊老夫有如此不異在郊坰杜詩新凉入郊墟韓集本朝行行漸樂郊一雨郊圻迴秋色滿郊原千里郊原正如畫正宜攜酒望晴川歐陽公偶作郊原十日遊未應迴首厭籠囚東坡郊原注目日青深陳后山野經同人于野上古穴居而野處易野無遺賢君子在野書湯與桀戰于鳴條之野髙宗夢傅説使百工營求諸野書序説築傅巖之野惟肖台小子舊學于甘盤既乃遯于荒野武王放牛于桃林之野書逺送于野我行其野叔適野劬勞于野至于艽野京師之野在坰之野詩體國經野司㑹以九賦之法令田野之財用小司}
