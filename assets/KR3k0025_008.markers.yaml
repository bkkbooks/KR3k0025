  - {type: variant, offset: 855, length: 4, content: 糜終不飽, WYG: 線㫁續或鳴空洞中雜佩間琴筑或流蒼石縫宛轉龍鳯蹙卧聽空階環玦響消破亭中萬斛泉山泉宅龍蜃平地流膏乳寒泉比吉士清濁在其心龍井白泉甘勝乳東坡雲夢澤南君子泉水無名字托人賢}
