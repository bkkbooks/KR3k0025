  - {type: variant, offset: 851, length: 0, content: '', WYG: 泉時有水逓之號有僧曰水逓有損盛德京師昊天觀後一眼泉與惠山水脈相通因取稱量與惠山等乃罷水逓芝田錄强村有水方寸許人欲取之唱浪淘沙一曲即得一盃味大甘冷因名樂音泉𤣥山記集余聞荆州玉泉寺近青溪諸山山洞徃徃有乳窟中有玉泉交流中有白蝙蝠千嵗之後體如白雪盖飲乳水而長生也李白集前有寒泉井聊可瑩心神文選惜彼落日暮幽此寒泉清倚樹聽流泉飛泉挂碧峯李白悲泉共幽咽奔泉濺水珠泉聲帶玉琴凍泉倚細石石泉流暗壁石間見海眼天畔縈水府竹竿接嵌竇引注来鳥道山稠隘石泉山驛醒心泉出泉枯栁眼汲引嵗月古通竹溜涓涓杜}
