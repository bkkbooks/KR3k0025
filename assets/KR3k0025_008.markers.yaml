  - {type: variant, offset: 1739, length: 0, content: '', WYG: 敢自専禦於天子也月令每嵗孟秋之月補城郭仲秋之月築城郭左傳曰計丈數揣髙卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮材用書糇糧以令役此築城之義也始皇奮六代之餘烈振長䇿而御宇内踐華為城因河為池過秦論集崪若斷岸矗似長雲制磁石以禦衝糊頳壤而飛文觀階扄之固䕶傳萬祀而}
