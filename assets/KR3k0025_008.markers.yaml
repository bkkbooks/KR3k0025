  - {type: variant, offset: 10, length: 0, content: '', krp: 始起也洪淋淋兮若白鷺之下翔其少進也浩浩溰溰如素車白馬帷盖之張其波湧而雲亂也擾擾焉如三軍之騰裝其旁作而奔起也飄飄焉如輕車之勒兵侯波奮振合戰於藉藉之口鳥不及飛魚不及迴獸不及走此天下怪異詭觀也注云侯波陽侯之波也藉藉盖地名云枚乘七發呼吸萬里吐納靈潮自然徃復或夕或朝郭璞江賦潮水定可信風潮爭洶湧神怪何翕忽浪打天門石壁開海神来過惡風迴浙江八月何如此潮似連山噴雪来李白春潮帶雨晩来急韋蘓州屯門積日無風飇滄波不歸成沓潮轟如鞭石矻且揺亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤八月濤聲吼地来頭髙數丈觸山迴須臾却入海門去捲起沙堆似雪堆劉禹錫謾道徃来存大信也知反覆向平流羅隠本朝潮之漲退海非増减盖月之所臨則水往從之月臨卯酉則水漲乎東西月臨子午則潮平乎南北太隂西没之期常緩於日三刻有竒潮之日緩其期率亦如是自朔至望常緩一夜潮自望至晦復緩一晝潮朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢極大望亦如之月弦之際其行差遲故潮之去来亦合沓不盡盈虛消息一之於月隂陽之所以分也夫春夏晝潮常大秋冬夜潮常大盖春為陽中秋為隂中嵗之有春秋猶月之有朔望也故潮之極漲常在春秋之中濤之極大常在朔望之後此又天地之常數也余安道海潮圖序勢雄驅島嶼聲怒戰貔貅北客觀猶懼吳兒弄弗憂子胥忠義者無覆巨川舟寜非天吐納長逐月虧盈暴怒中秋勢雄豪半夜聲范文正海上濤頭一線来樓頭指顧雪成堆從今潮上君須上更看銀山十二迴江神河伯兩醯雞海若東来氣吐霓安得夫差水犀手三千强弩射潮低萬人鼔噪懾吳儂猶似浮江老阿童欲識潮頭髙幾許越山無數浪花中八月十八潮壯觀天下無鯤鵬水擊三千里組練長驅十萬夫紅旗青盖互明滅黒沙白浪相吞屠再見潮頭湧玉輪煩君久駐浙江春豪氣正與潮爭怒夜潮流向月中看吳兒生長狎濤囦冐利輕生不自憐東坡波濤浪附傳記塞漏舟而輕陽侯之波則舟覆也戰國䇿龜鼉魚鼈不可勝記蹙波為城遏浪為池纂異記集凌陽侯之素波兮豈吾纍之獨見許揚雄反騷滄溟湧波濤觀濤壯天險濤白雪山来江中白浪如銀屋李白髙浪蹴天浮岸風翻夕浪幔捲浪花浮積隂帶奔濤風浪與雲平春風洪濤壯江間波浪兼天湧鼉作鯨吞不復知惡風白浪何嗟及逆浪風帆急杜詩一瀉百里翻雲濤憤濤氣尚盛風波無程期所憂動不測韓集翻雲波泱渀栁集儂是怕浪兒飲則拜浪婆孟郊滿江秋浪碧參差杜牧本朝波濤卷海傾歐陽公送我長蘆舟一葉笑看雪浪滿衣巾髙談破巨浪坐看百步鳴飛濤白浪横江起槎牙似雪城濤雷殷白晝一聽秋濤萬古音我已横江擊素波東坡月清放舟舫萬里渺雲濤山谷驚濤破山風動地疾如萬騎千里来氣壓三江五湖上突兀重重浪轟豗處處雷陳后山川經利涉大川易予決九川九川滌源若濟巨川若游大川並書如川之方至百川沸騰如川之流詩萬夫有川川上有路揚州其川三江荆州其川江漢豫州其川滎雒青州其川淮泗兖州幽州其川河泲雍州其川涇汭冀州其川漳并州其川虖池嘔夷兩山之間必有川焉周禮川壅為澤左子在川上曰逝者如斯夫論語子百川灌河莊子川雖曲而通如海則由諸百川學海而至於海川有防順則便逆則否者其惟川乎揚子百川異源皆歸於海淮南子史禹抑洪水九川既䟽史河渠書禹乘四載百川是導賈遜言大川無防大川難禁制壅防百川各順從其性無復灌溉則百川流行治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也前溝洫志王道公正脩明則百川脈理絡通李尋傳懼滿溢則思江海而下百川唐魏徴疏傳記川壅而潰傷民必多是故為川者決之使導川氣之導也川無舟梁陽失而在隂川源必塞國語川為積刑家語後漢鄭𢎞夜宿采石釀牧川逢故人無酒乃以錢投水中共飲盡夕皆得大醉因更名沉釀川古今注集譬之水也通之斯為川焉李蕭逺論水懷珠而川媚陸士衡賦水積成川載瀾載清張茂先詩百川派别歸海而㑹左思賦噓吸百川木𤣥虛賦障百川而東之韓集清川含藻景文選百川赴巨海同上溪傳記文中子隠白牛溪賈氏談錄吳故宫有香水溪云西子浴處述異記五雲溪即若耶溪徐浩惡其名而改之圖經李白與孔巢父韓準裴政張叔明陶沔}
