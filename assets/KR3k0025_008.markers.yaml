  - {type: variant, offset: 3039, length: 6, content: 郡吏也尹翁歸, WYG: 節以聽闗市故有闗市之賦案春秋時有闗門以察行李魯有六闗楚有昭闗秦地西有隴闗東有函谷闗臨晉闗南有嶢闗武闗為闗中漢興都闗中置闗都尉以察偽遊用傳出入漢文除闗無用傳漢景復置用傳漢武時楊僕征南越有功恥為闗外人為徙函谷闗於新安漢洛陽四闗東成臯闗南伊闕闗西函谷闗北孟津闗集崤函稱地險襟帶壯兩京霜峯直臨道氷}
