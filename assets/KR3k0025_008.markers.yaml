  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0025_CHANT_008-1a.3}
  - {type: variant, offset: 5, length: 1, content: 樂, WYG: 史開平四年武肅王錢氏始築捍海塘在候潮通江門之外潮水晝夜衝擊版築不就因命强弩數百以射潮頭乂致禱於胥山祠既而潮水避錢塘東擊西陵遂成隄岸史傳記朝曰潮夕曰汐説文大夫種伏劍而死葬於國之西山伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水者伍子胥也後潮水者大夫種也吳越春秋伍子胥諫吳王而死戒}
  - {type: page-break, offset: 5, content: '', id: KR3k0025_WYG_008-2a, image: WYG0930/WYG0930-0177a.png}
  - {type: variant, offset: 5, length: 1, content: 樂, krp: 史開平四年武肅王錢氏始築捍海塘在候潮通江門之外潮水晝夜衝擊版築不就因命强弩數百以射潮頭乂致禱於胥山祠既而潮水避錢塘東擊西陵遂成隄岸史傳記朝曰潮夕曰汐説文大夫種伏劍而死葬於國之西山伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水者伍子胥也後潮水者大夫種也吳越春秋伍子胥諫吳王而死戒}
  - {type: variant, offset: 7, length: 1, content: 俗, WYG: 子曰以鴟夷裹吾屍投江中吾當朝暮乘潮以觀吳之敗自是海門山潮頭洶湧有見子胥乘素車白馬在潮頭之中因立廟以祠焉廣記鯨鯢出穴則水溢為潮金樓子苕溪在餘杭夹岸多苕花相傳古有尹公者有異術此水或潮至今日暮則風生水長數寸號為尹公潮圖經移風縣有潮雞鳴長且清如吹角海潮至則鳴初學記早潮上晩潮下兩水相合謂之沓潮畨禺記髙麗圖經云潮汐徃来應期不爽為天地之至信古人嘗論之在山海經以為海鰌出入之度浮屠書以為神龍之變化竇叔蒙海嶠志以為水隨之盈虧盧肇海潮賦以為日出於海衝擊而成王充論衡以為水者地之血脈隨氣進退卒未之盡大抵天依水水承地而一元之氣升降於太空之中地乘水力以自持與元氣升降方其氣升而地沉則海水溢而為潮及其氣降而地浮則海水縮而為汐一晝一夜隂陽之氣凡再升再降故一日之間潮汐皆再焉臨}
