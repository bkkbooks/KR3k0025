  - {type: variant, offset: 2151, length: 286, content: 脩政不德而武王伐之由此觀之在德不在險若君不修德舡中之人盡敵國也武侯曰善說苑晉有河華九阿而奪於六卿齊有太山巨海而脅於田常亙寬鹽鐵論集隆隆者絕炎炎者滅選解嘲洞庭雖峻負之者北魏都賦不見三公後寒飢出無驢韓文作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬李太白互入儆戒日近恩雖重雲高勢卻孤翻身落霄漢失腳倒泥塗白侍郎榮難久藉唐文粹剪袖恩雖重殘桃愛不終劉遵詩子豈惟形骸有聾盲哉夫知亦有之莊史智者千慮必有一失西漢韓信傳集智有所不明數有所不逮神有所不通楚辭智亦有盲聾劉賓客史眾怒難犯左襄十年犯眾興禍左襄十年眾怒如水火焉不可為謀左昭十三年眾之所為不可奸也左定元年灌夫罵坐西漢本傳眾之所怒在於不平通監, WYG: ''}
