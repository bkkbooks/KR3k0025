  - {type: variant, offset: 867, length: 0, content: '', krp: 井牧其田野遂人掌邦之野注云郊外曰野旅師掌聚野之耡粟委人掌斂野之賦縣士掌野注云謂地距王城二百里外至三百里周禮子伊尹耕於有莘之野孟子堯治天下五十五年不知治歟不治歟問之在野在野不知列子黄帝張咸池之樂於洞庭之野莊子史黄帝與蚩尤戰於涿鹿之野與炎帝戰於阪泉之野史黄帝畫埜分州前地理志堯舜逺四佞而放諸野五行志舜萬物和於野劉向傳叔孫通為綿蕞野外習之叔孫通傳文帝詔曰朕親率天下之民而野不加辟宣帝牛馬被野本紀唐太宗牛馬被野食貨志商旅野宿焉通鑑傳記魯有大野十藪爾雅集春晩緑野秀文選原野曠超緬李白竹風連野色野濶天清無戰聲原野轉蕭瑟地卑荒野大曠野懷咫尺迴身視緑野慘淡如荒澤秋野日踈蕪碧水春風野外昏平野入青徐在野興清深杜詩土膏釋原野野静停風威迥野恣窺臨邇連野緑逺混天碧栁文本朝平野見南山山明雪野晴日落原野晦雨過西城野色侵瘦野一刀田野曠覺天穹歐陽平野容回顧野潤風光秀野曠低歸鳥東坡村墟傳記嶺南謂村市為墟陶淵明千村萬落生荆把卜宅楚村墟逺村信荒僻孤村春水生農務村村急杜詩緑荷包飯趂虛人栁集按經脩道具依様買山村注云馬髙唐為御史大夫將置宅命畫工圖其狀戒所使曰依此様買之劉禹錫得草緑楊村李商隐燕詩海虛争翡翠溪邏鬬芙蓉注云新州有翡翠虛芙蓉杜牧之本朝木落孤村迥歐陽攜杖村落去淡淡煙村逺煙火動村落行行玩村落猶有小船来買餅喜聞墟落在山前東坡水遶數家村陳后山林藪經太宰九曰藪以富得民四曰藪牧養蓄鳥獸大司徒辨其山林之名物林衡掌巡林麓之禁令山虞掌山林之政令司險周知山林之阻設國之五溝五涂而樹之林周禮仲春毋焚山林記月令山麓以時入而不禁王制山藪藏疾山林藪澤之利與民共之左傳子斧斤以時入山林孟子夸父不量力欲追日景道渇而死弃其杖尸膏肉所浸生鄧林鄧林彌廣數千里列子鷦鷯巢於深林不過一枝孔子遊緇帷之林莊子幽蘭生於深林不以無人而不芳荀子史山林藪澤各以肥饒多少為差前食貨志山澤先帝熂爐養種竹木雜果為林採者聽不追奪南史羊𤣥保兄子希傳傳記古之長民者不崇藪藪物之歸也山林藪澤足以備財用則寳之國語汝應觀此逝多林以佛威神廣無際一切莊嚴皆示現十方法界悉充滿文殊師利菩薩住莊嚴幢娑羅林中説法華嚴經洞𤣥宫内有空青之林七寳浴池八騫之林道經山林竒處乃欲界之仙都陶𢎞景云集巢許山林志山林引興長林廻硖角来林響颼颼交林茂鳥知歸林僻来人少苦乏大藥資山林迹如掃杜詩出宰山水縣讀書松竹林韓集本朝髙林野阜相迴環林枯山瘦失顔色歐陽老去山林猶夢想霜林散煙鬟東坡老覺山林可避人正須麋鹿與同羣回看幽徑遶雙林陳后山谷經入于幽谷幽不明也易宅㬂夷曰暘谷宅西曰昧谷書施于中谷出}
  - {type: variant, offset: 868, length: 1, content: 困, WYG: 幽谷在彼空谷髙岸為谷深谷為陵詩子谷得一以盈老子渤海之東有大壑焉實維無底之谷列子史周之成康川谷不塞漢紀石崇有别館在河陽之金谷晉書傳記鄒衍在燕谷吹律而陽氣生至今名黍谷類記詳見律吕類鳥氏倮谷量牛馬倮人名也六帖韋嗣立退居新豐山中宗嘗幸其居名所居為靈源幽居翰林志集谿谷巉岩招隠士望山谷之嵯峨西都賦幽谷嶜岑南都賦深溝嵌岩而為谷甘泉賦太行之陽有盤谷友人李愿居之宴喜亭記曰其石谷曰謙受之谷言德也其土谷曰黄金之谷言容也韓文氷谷明且秀煖氣變寒谷空谷宜秋清行歌入谷口路盡無人躋李白谷口樵歸唱愚公野谷村幽居在空谷有谷禾黍稠傳道東柯谷深藏十數家白谷㑹深遊杜詩本朝時時度深谷徃徃得佳景山勢抱幽谷一徑﨑嶇入谷中過春深谷尚花開澗谷自深曖歐陽公入谷驚蒙宻谷映竹欄秀小語輒響谷深谷下窈窕東坡洞史章夏卿晩嵗署其居曰大隠洞唐書傳記廬山有白鹿洞廬山記魚朝㤙有洞房四壁夹安琉璃板中貯江水及萍藻諸色魚蝦號魚藻洞南康記集薛景梅為道州刺史得異境於近郊有石穹然如夏屋因名其地曰含輝洞劉禹錫常聞玉泉山山洞多乳窟洞門閉石扇地底興雲雷李白洞門無鎖鑰俗客不曽来岩洞幽深門不鎖韓集乳肥春洞生鵝管紫洞香風吹碧桃杜牧本朝魏野居陕府之東郊鑿土為室曰樂天洞遯齋閒覽四字丹青萬仭崖神清之洞鎖樓臺洞門常起煙霞洞穴傍穿透谿谷歐陽公不辭攜被岩底眠洞口雲深夜無月東坡居處部都邑經文王受命有此武功既伐於崇作邑于豐詩盤庚五遷將徙亳殷書序我乃卜澗水東瀍水西惟洛食書商邑翼翼四方之極詩史劉敬説上都闗中上疑之左右大臣皆山東人多勸上都洛陽曰東有成皐西有崤澠背河向洛其固亦足恃也張良曰洛陽雖有此固其中小不過數百里地薄四面受敵此非用武之國夫闗中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯此所謂金城千里天府之國也漢書傳記春秋左氏傳曰凡邑有宗廟先君之主曰都無曰邑伏羲都陳神農亦都陳又營曲阜黄帝都涿鹿或曰都有熊少昊都窮桑顓頊都髙陽帝嚳都亳一曰都髙辛堯始封於唐後徙晉陽即帝位都平陽舜都蒲阪禹本封於夏為夏伯及舜禪都平陽或在安邑湯都亳至仲丁遷囂河亶甲居相祖乙居耿及盤庚五遷復南都亳之殷地周文王都酆武王都鎬周公相成王以酆鎬偏處西方方貢不均乃營洛邑成王即洛邑建明堂朝諸侯復還酆鎬至幽王為犬戎所殺平王東遷乃居洛邑及敬王時又遷成周秦非子始封於秦後都咸陽漢都長安東觀漢記曰光武中興都洛陽又於南陽置南都三國時魏畧云魏以長安譙許昌鄴洛陽為五都吳志云吳都鄂後遷建業蜀志云蜀都成都晉書云晉都洛陽至}
