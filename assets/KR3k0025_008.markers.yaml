  - {type: variant, offset: 2025, length: 1, content: 豈, WYG: 有天庫藏府之星王者審五庫之量一曰車庫二曰兵庫三曰祭器庫四曰樂庫五曰宴器庫蔡邕或曰王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於箧匱韓詩外傳芻蕘論曰國之稱富者在乎豊民非獨謂府庫盈倉廪實也且府庫盈倉廩實非上天所降皆取之於民民困國虛矣鍾㑹集搏噬爪牙鋒距之先毒螫芒刺矛矢以存聖人垂象五兵已陳李尤銘有財無義惟家之殃無愛糞土以毁五常摯虞銘門經成性存存道義之門易迺立臯門臯門有亢迺立應門應門將將詩重門擊柝以待暴客蓋取諸豫易賔於四門四門穆穆書衡門之下可以棲遲詩夫士出入君門由闑右}
