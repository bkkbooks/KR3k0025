  - {type: variant, offset: 871, length: 10, content: 證道歌經如取如攜詩子, WYG: 南居建康秦皇兼天下都咸陽渭水貫都以象天漢横橋南度以法牽牛朕聞踐華固德百二稱乎建瓴卜洛歸仁七百崇乎定鼎是以控膏腴於天府啟黄圖於渭濵襟沃壤於王城摛緑宇於河渚市朝之城麗皇州之九緯丹紫之原邈神臯之千里二京之盛其来自昔此都在茲宇宙通賦貢於四方交乎風雨均朝宗於萬國唐髙宗東都詔集漢之}
