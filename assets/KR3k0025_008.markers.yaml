  - {type: variant, offset: 1747, length: 0, content: '', WYG: 玩皆薫歇燼滅煙沉響絶東都妙姝南國麗人鮑昭賦漢渚水初緑江南草復黄日照蒲心煖風吹梅樹香簡文帝湛淡水成文參差樹交影長門久已閉離宫一何静細草縁玉堦髙枝䕃桐井温子昇日落征途逺悵然臨古城頺墉寒雀集荒堞晩烏驚蕭森灌木上迢逓孤煙生霞景煥餘照露氣澄晩清秋風轉摇落此志安可平李百藥天險匪登地險丘陵帝王設險乾坤是承後漢李尤宫經上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨盖取諸大壯周易命士以上父子皆異宫儒有一畝之宫環堵之室禮記史建章長樂宫皆輦道相屬懸棟飛閣不由徑路髙祖七年至長安蕭何脩未央宫漢書漢武帝巡省五岳禋祀豐備故立宫其下號曰集靈宫武帝置夀宫張羽旗以禮神君漢書傳記昔黄帝有合宫堯有二宫撝宫湯有鑣宫周有蒿宫鄭宫春宫秦有蘄年宫信宫梁山宫漢有長樂宫未央宫沛宫林光宫甘泉宫龍泉宫首山宫明光宫五柞宫萬嵗宫池陽宫蒲陶宫竹宫夀宫建章宫黄山宫太一宫思子宫夜光宫棠梨宫扶荔宫桂宫鼎湖宫宜春宫谷口宫望僊宫通天宫後漢有南宫北宫胡桃宫魏有鄴宫吳有太初宫昭明宫亦猶天文之有紫宫文昌及五宫神仙之有金玉琉璃宫矣初學記河圖曰瑶光貫月感女嫗於幽房之宫生黒帝河圖集軼凌隂之地室過谷陽之増城迴天門而鳯舉躡黄帝之明庭冠髙山而為居乘崑崙而為宫案軒轅之舊處居北辰之闗中背共工之幽都向炎神之祝融縁石闕之天梯桂木雜而成行芳肸蠁之依棐鸞孔飛而翺翔劉歆賦遥看雲霧中刻桷映丹紅珠簾通曉日金華拂夜風欲知歌管處来過安樂宫簡文帝玉燭調秋氣金輿歴舊宫還如過白水更似入新豐秋潭清晩菊寒井落踈桐舉杯延故老令聞歌大風周明帝新宫實壯哉雲裏望樓臺迢逓翔鵾仰連翩賀客来重欄寒露宿丹井夏蓮開砌石披新錦梁花畫早梅欲知安樂盛歌管雜塵埃陳隂鏗聖祖神傑堯蹤漢烈岳峻雄圖天張武節墜命既升霸畧將騁清渭走烽濁河獻警恃峭劍闗憑深桂嶺彛章委闕禮樂沉河極壓傾構引溺危波盡物稱瑞窮靈委和𤣥精翼日丹羽巢阿沈約頌殿史明德馬皇后嘗有不安時在敬法殿東廂上令太夫人及兄弟得入見之洛陽宫殿簿曰太極殿近含章殿傳記蒼頡篇曰殿大堂也商周以前其名不載按史記秦闕九尺二百歩一立樓去城中二丈五尺墨子亂之}
