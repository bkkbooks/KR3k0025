  - {type: variant, offset: 59, length: 1, content: 乘, krp: 潘音盤莊子作審舜以天下讓其友北人無擇北人無擇自投清泠之淵千金之珠必在九重之淵莊子積水成淵而蛟龍生焉荀子九珽之淵淮南子直寸指以測淵孔叢子沉靈甲於𤣥淵以違鑽灼之災抱朴子史臨淵羨魚不若退而結網董仲舒取日虞淵狄仁傑傳記月宫有蘂淵七籖今秦不可知之國也猶不測之淵也戰國䇿東海之外有甘山者甘水出焉主甘淵大荒東經集澹乎若深淵之靚賈誼呀周池而成淵西都賦清淵洋洋西京賦夕納景於虞淵選琴賦佇重淵以育鱗陸士衡賦靈湖之淵郭璞江賦黒蜧躍重淵回淵可比心張景陽譬之水也塞之斯為淵焉李蕭逺論潭傳記唐𤣥宗置麴精潭砌以銀磚泥以石粉貯三辰酒一萬車以賜當制學士等史諱錄集崇其臺延其檻行其泉於髙者而墜之潭有聲潨然尤與中秋觀月為宜於以見天之髙氣之逈孰使予樂居夷而忘故土者非兹潭也歟栁文鈷鉧潭記春潭漾月輝隋煬帝潭落天上星石門噴作金沙潭迴作玉鏡潭澄明洗心魂百尺金潭照雲日行盡綠苔潭轉幽李白百頃}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 潭上萬里橋南宅百花潭北莊杜詩非鑄復非鎔泓澄忽此逢魚蝦不用避秪是照蛟龍韓鏡潭詩本朝潭養千年蛻骨龍碧潭風定影涵虛北潭新漲緑空餘緑潭水尚帶餘春色至今清夜夢猶遶北潭北歐陽公茫茫夜潭静皎皎秋月灣清潭百尺皎無泥潭静寫衰客何以娛嘉客潭水洗君心東坡灘瀨史嚴子陵披羊裘釣澤中後人名其釣處為嚴陵瀨後漢傳記羊腸虎臂江中灘名水經集水之反流者為渇渇上與南館髙嶂合下與百家灘合其中重洲小溪澄潭淺渚間厠曲折栁文袁家渇記聞説金華渡東連五百灘三門横峻灘曲折走波瀾石驚虎伏起水狀龍縈盤何慙七里瀨使我欲垂竿白波若捲雪側石不容舠白鷺拳一足月明秋水寒人驚遠飛去直向使君灘李白終焉减灘瀨暫喜息蛟螭杜詩浩浩復湯湯灘聲抑更揚奔流疑掣電驚浪似浮霜夢覺燈生暈宵殘雨送凉如何連曉語秪是説家鄉韓集本朝為畫龍門八節灘待向伊川買泉石東坡野水穿沙自作灘陳后山汀洲經淮有三洲詩傳記水中可居曰洲釋文春皇者伏羲之别號所居之都有華胥之洲拾遺記河澗王兎園中有鶴洲鳬渚三輔黄圖涪州有錦繡洲九域圖大寳洲種種法華充滿其中華嚴經歘已宴玉洲同上集采芳洲兮杜若楚詞九歌搴汀洲兮杜若同上沙明瞰前洲白鷺洲前月天明送客迴桑落洲渚連李白江斂洲渚出汀洲稍踈散風景開怏悒杜詩日出州渚淨栁集金犢近蘭汀温庭筠望郎臨大郡佳句灑丹青應自丘遲宅仍過栁惲汀李商隠鴻歸杜若洲同上本朝尋芳謝朓洲按謝朓詩云芳洲生杜若自漸紅鷹侣爭集稲梁洲東坡隄岸經髙岸為谷詩以防止水善防者水淫之周禮修利隄防記月令故以舊防為無用壞之者必有水敗經觧史决通隄防秦始皇史漢文帝時河決酸􅀥潰金隄史河渠書隄防之作近起戰國壅防百川各以自利溝洫志韋丹築隄捍江長十二里唐本傳裴耀卿徙宣州大水河防壞耀卿躬護作役有詔陟官耀卿弗即宣}
