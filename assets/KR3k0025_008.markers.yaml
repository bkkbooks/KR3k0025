  - {type: variant, offset: 2143, length: 1, content: 在, WYG: 虎門春興門青瑣門金商門雲龍門神武門宜秋門又有大夏門長春門朱明門洛陽故宮記集漢家一統軌濟濟萬國朝飛纓拂薄霧輕輦逐晨飇槐衢映緑綟日彩麗金貂此時叅待詔誰復想漁樵何胥賦詩門之設張為宅表㑹納善閑邪擊柝防害李尤銘門惟王建國配彼太㣲大君有命髙明啟扉良辰是簡枚卜無違彫梁乃架綺翼斯飛六龍杳杳九重巍巍居宸納祐就日垂衣一人有慶四海爰歸温子升文墻壁經峻宇雕墻不學墻面書人而不為周南召南}
