  - {type: variant, offset: 2642, length: 0, content: '', WYG: 擁河流廣陵候濤水荆峡望陽侯波生從故舶沙漲涌新洲天星識辨對檢玉應沉鈎空悦浮雲賦非復採蓮謳王褒春舟鸚鵡色流水桃花香星精逢漢帝釣叟遇周王平隄石岸直髙堰栁林長羨言杜元凱河橋獨舉觴庾信闗史孟嘗君夜半至函谷闗闗秦法雞鳴出客孟嘗君恐追至客有居下坐者能為雞鳴遂發傳出食頃追果至史記東方朔得神馬一匹髙九尺武帝問朔是何獸也朔曰此王母乗靈光之輦}
