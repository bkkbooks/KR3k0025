  - {type: variant, offset: 59, length: 1, content: 乘, WYG: 潘音盤莊子作審舜以天下讓其友北人無擇北人無擇自投清泠之淵千金之珠必在九重之淵莊子積水成淵而蛟龍生焉荀子九珽之淵淮南子直寸指以測淵孔叢子沉靈甲於𤣥淵以違鑽灼之災抱朴子史臨淵羨魚不若退而結網董仲舒取日虞淵狄仁傑傳記月宫有蘂淵七籖今秦不可知之國也猶不測之淵也戰國䇿東海之外有甘山者甘水出焉主甘淵大荒東經集澹乎若深淵之靚賈誼呀周池而成淵西都賦清淵洋洋西京賦夕納景於虞淵選琴賦佇重淵以育鱗陸士衡賦靈湖之淵郭璞江賦黒蜧躍重淵回淵可比心張景陽譬之水也塞之斯為淵焉李蕭逺論潭傳記唐𤣥宗置麴精潭砌以銀磚泥以石粉貯三辰酒一萬車以賜當制學士等史諱錄集崇其臺延其檻行其泉於髙者而墜之潭有聲潨然尤與中秋觀月為宜於以見天之髙氣之逈孰使予樂居夷而忘故土者非兹潭也歟栁文鈷鉧潭記春潭漾月輝隋煬帝潭落天上星石門噴作金沙潭迴作玉鏡潭澄明洗心魂百尺金潭照雲日行盡綠苔潭轉幽李白百頃}
