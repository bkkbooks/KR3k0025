  - {type: variant, offset: 2639, length: 1, content: 蜀, WYG: 歌曰明月清風良宵㑹同已而有黄衣人至皆驚散明日拾得翠釵數隻幽怪錄劉元嘗宿驛中夜聞歌聲明旦有題楹間云爹娘送我青楓根不記青楓幾回落當時手制衣上花今日為灰不堪著酉陽雜爼陶榖使江南厓岸甚峻韓熈載遣歌姬秦弱蘭假為驛卒女誘之遂絶謹獨之戒作風光好以贈冷齋夜話集臨驛卷緹幕外堂接繡衣李白水上鵠已去亭中鳥又鳴晩泊水邉驛栁塘初起風蛙鳴蒲葉下魚入稻花中王重初孤亭凌噴薄萬井逼舂容山險風烟合天寒橘柚垂岸風翻夕浪舟雪灑寒燈杜甫道路經一達謂之道路二達謂之岐旁三達謂之劇旁四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇驂八逹謂之崇期九逹謂之逵廟中路謂之唐唐途謂之陳爾雅匠人營國國中九經九緯經涂九軌環涂七軌野涂五軌合方氏掌逹天下道路至於四畿凡道路之舟車輦轂者叙而行之凡有節者及有爵者至則為之辟禁野之横行徑踰者周禮集江移林岸㣲巖深煙袖複嵗嚴摧磴草午寒散喬木縈迴夕颷卷蹉跎晩雲伏豈慕淄宫梧方辭兎園竹沈約業冠遷夏功踰入秦時惟大畜象及同人惠雨方霤蟬枝獨春帝徳惟厚皇恩甚深觀乎禹跡見我堯心徐陵銘市經神農氏日中為市致天下之人聚天下之貨交易而退各得其所蓋取諸噬嗑周易凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以陰禮司市掌市之治教政刑量度禁令以次叙分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈阜財而行布大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主周禮傳記市恃也言交易而退恃以不匱也市亦謂之市井言人至市有所鬻賣者當於井上洗濯令香潔然後到市也市巷謂之闤市門謂之闠巷謂門市中空地謂之㕓市樓謂之旗亭風俗通集惟市之由興自炎帝之所創聚貨財以利用等厮事之莫尚爾乃巷列千所羅居百族街衢相望連棟接屋則能目語額瞬動頞塞鼻談智於尺寸之間窺窬於分毫之利成伯陽賦旗亭出御道遊目暫迴車既非隨栁舞聊思索枯魚因龜識季主傍酒見相如日中人已合黄昏故未踈庾肩吾橋經造舟為梁不顯其光詩子澤梁無禁嵗十一月徒杠成十二月輿梁成孟史張良嘗遊下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良孺子可取履良因長跪授之父以足納履笑云作速来云孺子可教本傳髙麗國侍婢有器如雞子来下之有身生子名東明東明善射王恐其害國欲殺之東明走至淹水以弓擊水魚鼈浮為橋既渡魚鼈觧散王充論衡公孫述大司馬田戎將兵下江開至南郡據浮橋於江水吳漢鋸絶横橋大破之東觀漢記傳記楚人謂橋為圯凡橋有木梁石梁舟梁謂浮橋即詩所謂造舟為梁者也周文王造舟於渭秦公子鍼奔晉造舟於河秦都咸陽渭水貫都造渭橋及横橋南渡長樂宫漢作便橋趨茂陵並跨渭以木為梁漢又作霸橋以石為梁初學記集曲岸非千里橋斜異七星暫低逢輦度還髙值浪驚水摇文鷁動纜轉錦花縈逺近隨輪影輕重應人行唐太宗賦秦王金作柱漢帝玉為梁仙人飛徃易道士出歸難梁庾肩吾東流仰天漢南渡似牽牛長堤通甬道飛梁跨造舟使者開金堰}
