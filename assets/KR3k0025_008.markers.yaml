  - {type: variant, offset: 66, length: 3, content: 知風乘, WYG: 改井无喪无得往来井井汔至亦未繘井羸其缾凶巽乎水而上水井井養而不窮也木上有水井初六井泥不食舊井无禽九二井谷射鮒九三井渫不食可用汲六四井甃无咎九五井洌寒泉食上六井収勿幕井德之地也井居其所而遷井以辨義井道不可不革易塞井夷竈左傳宰}
