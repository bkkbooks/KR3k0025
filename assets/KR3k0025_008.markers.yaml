  - {type: variant, offset: 11, length: 14, content: 鄰國相望雞狗之聲相聞民至老死, WYG: 徂徕山日沉飲號竹溪六逸六帖田遊巖愛夷陵青溪上廬其側六帖集閩有水生毒霧厲氣故其名曰惡溪栁文愚溪對溪雖莫利於世而清瑩秀澈鏘鳴金石能使愚者喜笑眷慕}
