  - {type: variant, offset: 27, length: 0, content: '', WYG: 能去也愚溪詩序地當東溪之上名其溪曰蒙溪將以蒙昧也陸希聲山居記明月出髙岑清溪澄素光溪水桃花流溪即鏡中迴却羨雙溪解北流清溪清我心水色異諸水清溪勝桐廬水木有佳色我愛溪水閒乘流興無極李白溪行衣自濕溪邊春事幽碧溪揺艇濶溪喧獺趂魚洗藥浣花溪幾時陪羽獵應指釣璜溪杜詩藹藹溪流漫馬頭溪深不可厲南溪亦清駛冰溪時咽絶韓集本朝一溪春水碧漣漪野岸溪幾曲隔谷聞溪聲尋溪渡横嶺百仭寒溪漱不知溪源来逺近但見流出山中花歐陽公便應築室苕溪上荷葉遮門水浸階又試曹溪一勺甘溪流變春酒與我}
  - {type: page-break, offset: 27, content: '', id: KR3k0025_WYG_008-9b, image: WYG0930/WYG0930-0180d.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 能去也愚溪詩序地當東溪之上名其溪曰蒙溪將以蒙昧也陸希聲山居記明月出髙岑清溪澄素光溪水桃花流溪即鏡中迴却羨雙溪解北流清溪清我心水色異諸水清溪勝桐廬水木有佳色我愛溪水閒乘流興無極李白溪行衣自濕溪邊春事幽碧溪揺艇濶溪喧獺趂魚洗藥浣花溪幾時陪羽獵應指釣璜溪杜詩藹藹溪流漫馬頭溪深不可厲南溪亦清駛冰溪時咽絶韓集本朝一溪春水碧漣漪野岸溪幾曲隔谷聞溪聲尋溪渡横嶺百仭寒溪漱不知溪源来逺近但見流出山中花歐陽公便應築室苕溪上荷葉遮門水浸階又試曹溪一勺甘溪流變春酒與我}
  - {type: variant, offset: 28, length: 2, content: 往來, WYG: 賔主絶壁寒溪吼應同栁州栁要使愚溪畫日淨東溪照清泚溪光自古無人畫憑仗新詩與寫成尋溪水濺裳東坡遠法師居廬山下送客無貴賤不過虎溪而與陸道士行過虎溪數百歩大笑而别山谷集溪毛亂錦纈故園溪友膾腹腴山谷澗經于以采蘩于澗之中于以采蘋南澗之濵夾其皇澗遡其過澗詩史劉牢之為慕容垂所擊敗績䇿馬躍五丈澗得脱晉書陶𢎞景於茅山立館移居積金東澗南史傳記何徴君多遊靈寳院涵星澗髙隠外書集碧澗雖多雨澗水空山道澗寒人欲到杜詩本朝斷澗横荒堡北臨白雲澗幽澗初生草歐陽隂風生澗壑東坡淵經或躍在淵不利渉大川入於淵也易}
