  - {type: variant, offset: 864, length: 1, content: 筭, WYG: 風吹不斷江月照還空飛珠散輕霧流沫拂穿石李白雲門吼瀑泉杜詩懸瀑垂天紳宴喜亭記曰其瀑曰振鷺之瀑言容也又曰秩秩之瀑言德也韓文皛皛擲岩端潔光如可把瓊枝折不㫁雪片晴猶下石堅激清響葉動水餘灑前時明月中見是銀河瀉飛流透嵌隙噴灑如絲棼含暈迎初旭翻光破夕曛餘波遶石去碎響隔溪聞郤望瓊}
