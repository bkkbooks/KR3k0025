  - {type: variant, offset: 658, length: 1, content: 焉, WYG: 始一嵗吾之子始五嵗少而强者不可保如此孩提者又可兾其成立耶太學四年朝虀暮鹽汨東西與南北恒十年以不居辱飽食其有數况䇿名於薦書時所好之為賢庸有謂余之非愚時命雖乖心轉壯技}
