  - {type: variant, offset: 660, length: 2, content: 使予, WYG: 虛富家逾窘今者無端讀書史智慧總是勞精神畫蛇着足無處用兩鬢雪白趍埃塵身將老寂寥志欲少閒暇名聲荷朋友援引乏姻婭疾添兒女戀老喪丈夫勇少年真可喜老大百無益自嘆虞翻骨相屯頭童齒豁竟死何禆進寸退尺卒無所成學成而道益窮年老而身益困利居衆後責在人先切自悲辛生天下無事時承先人之遺業}
