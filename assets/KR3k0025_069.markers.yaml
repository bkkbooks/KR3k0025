  - {type: variant, offset: 640, length: 0, content: '', WYG: 通鑑漢明紀管輅嘆曰天與我以才不與我年夀魏志王羲之曰宇宙雖廣自容何所通鑑晋紀尾長翼短不能飛四海雖廣寧有容足之地通鑑晉成紀嵇康將刑顧視日影索琴弹之曰廣陵散於今絶矣晋書本傳陸機臨受誅嘆曰華亭鶴唳豈可聞乎晉書本傳自傷年紀摧頽功名不立通鑑梁髙祖魏元忠曰我薄命譬如墜驢足絓於鐙為所曳矣通鑑唐武后紀天地為籠去將安所唐武后贊傳記孔子過谷中見蘭獨茂嘆曰蘭當為王者香今乃獨茂與草為伍乃止車援琴鼓之自傷不逢時托辭於香蘭云琴操集青春背我堂堂去白髪欺人故故}
  - {type: page-break, offset: 640, content: '', id: KR3k0025_WYG_069-9b, image: WYG0932/WYG0932-0136d.png}
  - {type: variant, offset: 640, length: 0, content: '', krp: 通鑑漢明紀管輅嘆曰天與我以才不與我年夀魏志王羲之曰宇宙雖廣自容何所通鑑晋紀尾長翼短不能飛四海雖廣寧有容足之地通鑑晉成紀嵇康將刑顧視日影索琴弹之曰廣陵散於今絶矣晋書本傳陸機臨受誅嘆曰華亭鶴唳豈可聞乎晉書本傳自傷年紀摧頽功名不立通鑑梁髙祖魏元忠曰我薄命譬如墜驢足絓於鐙為所曳矣通鑑唐武后紀天地為籠去將安所唐武后贊傳記孔子過谷中見蘭獨茂嘆曰蘭當為王者香今乃獨茂與草為伍乃止車援琴鼓之自傷不逢時托辭於香蘭云琴操集青春背我堂堂去白髪欺人故故}
  - {type: variant, offset: 641, length: 9, content: 德於予魯臧倉毀鬲孟, WYG: 唐詩長吟永欷楚辭五薦不入朝一麾乃出守南史顔延之詩罕有知音者空勞流水聲江總詩牽世嬰時網陸士衡與士龍榮與壯俱去賤與老相尋張季鷹雜詩萬族各有托孤雲獨無依陶淵明詩年行已長所懐萬端時有所慮至通夜不瞑志意何時復類昔日已成老翁但未白頭耳魏文帝吳質書風雲落人後嵗月度人前齊顔延之班匠不我顧牙曠不我録焉得成琴瑟何由揚妙曲選司馬紹贈山濤互入不遇及怨望萬事已黄髪殘生隨白鷗聖朝無棄物老病已成翁多少殘生事飄零似轉蓬顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤以兹悟生理獨耻事干謁乗黄已去矣凡馬徒區區勲業頻看鏡行藏獨倚樓識字用心苦白頭趍幕府窮途愧知已暮齒借前籌白首壯心違失學從兒懶長貧任婦愁吾徒日飄泊世事各艱難苦被微官縛低頭愧野人窮途反遭俗眼白紈絝不餓死儒冠多誤身殘杯與冷炙到處潛悲辛長卿多病乆}
