  - {type: variant, offset: 851, length: 0, content: '', WYG: 𫝊負之無可言者後漢張歩傳禇裒伐後趙敗還至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慙憤發疾卒晉穆紀王導曰吾雖不殺伯仁伯仁由我而死幽㝠之中負此良友晉書周顗傳狄仁傑曰婁公盛徳我為所容乃知吾不逮逺矣唐書婁師徳傳王叔文敗韋執誼亦自失形勢知禍且至雖尚為相常不自得奄奄無氣聞人行聲輒皇悸失色通鑑唐順宗紀集愧汗如漿駱賔王互見陳情門内省慙惶若墜氷谷劉賔客汗赩含羞耻杜牧之自慰附自寛解史張儀嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盗相君之璧共執張儀掠笞數百不服釋之其妻曰子毋讀書㳺說安得此辱乎張儀謂其妻曰視吾舌尚在不其妻笑曰在也儀曰足矣史記本傳東方朔曰使張儀蘓秦與僕並生於今之世曾不能掌故安敢望常侍郎乎時朔已為殿中郎史記本傳茍有良田何憂晩嵗北史楊侃}
