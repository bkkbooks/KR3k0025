  - {type: variant, offset: 1215, length: 0, content: '', WYG: 應無切齒人邵堯夫詩孫奭致仕於鄆置宴語客曰白傅有言多少朱門鎻空宅主人到了不曾歸今老夫歸矣喜動於色澠水燕談滿院花開不似貧雲溪友議嵗禄二千親八十世間誰有此時榮陳後山詩收身薄氷釋置枕泰山安山谷詩自新史欲改過自新西漢刑法志洒心自新東漢平帝紀洗心向善後漢郭泰傳失旦之雞復思一鳴三國志諸葛瑾云竺景秀曰若許自新必呑力割腸飲灰洗胃南史齊書荀伯玉傳集君其務貰過我亦請改事韓集自責經母氏聖善我無令人有子七人母氏勞苦有子七人莫慰母心静言思之躬自悼矣詩史宣子曰吾淺之為丈夫也左襄十九年趙孟曰我實不徳而以𨽻人之垣以贏諸侯是吾罪也使謝不敏襄三十一年晉悼夫人食輿人之城把者綘縣人年長矣與於食趙孟問縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能用吾子使吾子辱在泥塗乆矣武之罪也敢謝不敏襄三十年擢賈之髪以讀賈之罪尚未足史記范睢傳縱彼不言籍獨不愧於心乎前漢項籍傳妻子有過輒免冠自責東漢仇覧傳罪積山河釁深莫磨劉越石傳寧人負我我無負人通鑑唐徳}
