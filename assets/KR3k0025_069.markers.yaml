  - {type: variant, offset: 1212, length: 1, content: 矣, WYG: 耶杜牧之他人似我還應少如此安貧亦荷天杜荀鶴本朝花與新奇如有意臨川何必濯於水本無纓上塵歐公集世上升沉無限事樽前强健不貲身欒城集尚有讀書清浄業未容春睡敵千鍾因病得閒殊不惡安心是藥更無方但把窮愁博長健退伏田野自稱老臣追叙始終之遭遇以詫鄉鄰之父老如醉而醒如瘖而鳴如痿而起初還故鄉初見父兄無官一身輕有子萬事足東坡平生不作皺眉事}
