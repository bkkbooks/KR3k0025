  - {type: variant, offset: 1071, length: 134, content: 元微之文書自傳道奚待史筆垂韓文昔揚子雲著太玄人皆笑之子雲之言曰世不我知無害也後世復有楊子雲必好之矣韓文與馮宿論文書作者不祈人之知也明矣直百世以俟聖人而不惑質鬼神而不疑耳同上人以為拙臣行不疑同上武王周公聖人也率天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊乃獨, WYG: 主}
