  - {type: variant, offset: 823, length: 6, content: 桐鄉民及死其, WYG: 聽吹竹彈絲敲金擊石也韓愈夫溝中之木與犧象同體追琢不至坐成枯薪朱而藍之猶足以為器茍液樠曲戾不足枉斧斤願為庭燎以照嘉客劉賔客幸堪調鼎用願君垂採摘王維集鐵衣雖正澁寳刄猶可試儻遇拂拭恩應知剸犀利劉長卿連城之珍俟楚文而乃進髙山之操待鍾期而後發唐文粹本朝敝車無用猶可具於勞薪棄席未忘或再施於華屋臨川集枯朽猶能出菌芝東坡詩自愧}
