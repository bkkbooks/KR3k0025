  - {type: variant, offset: 1209, length: 1, content: 殷, WYG: 行而置之是不以武臣相待而親厚之也諸君可賀矣又何怪焉聞者皆服通鑑唐代宗裴皥書一絶曰宦塗最重是文衡天與愚夫立盛名三主禮闈今八十門生門下見門生五代史集位貶道行身窮志逸文選齒落未是無心人舌有只作窮途哭新歸且慰意生理焉足說生還對童稚似欲忘飢渇大哉乾坤内吾道長悠悠自古有覊旅我何苦哀傷眼前無俗物多病也身輕家書抵萬金此生免荷殳莫思身外無窮事且盡生前有限盃親朋滿天地脱身簿尉中始與箠楚辭憶獻三賦蓬萊宫自怪一日聲輝赫杜詩嵗稔貧心泰逰人莫笑白頭醉老醉花間有㡬人劉賓客比者分將委棄泥塗老死草野今胷中之氣勃然復有仕進之路矣壯志已憐成白首餘生猶待發青春眼中了了見鄉國知有歸日眉方開韓愈乍抛衫笏覺身輕姚少監朝來始向花前覺度却醒時一半愁元㣲之我愛狷介性立為頑拙身平生雖寡合今即無緇磷昨因風發甘長徃今遇陽和又小康還似逺行装束了遲回且住又何妨我是人間事了人老耳未多聾薺花榆莢深村裏亦道春風為我來婚嫁累輕何怕老飢寒心慣不憂貧酒引眼前興詩留身後名自此光隂為己有從前日月屬官家互見閒適門骨肉團欒亦可榮己為海内有名客又占世間長命人書訊朝賢㫁知音野老多世間富貴應無分身後文章合有名擢第未為貴賀親方可榮白侍郎詩閒人似我世間無老為樊上翁}
