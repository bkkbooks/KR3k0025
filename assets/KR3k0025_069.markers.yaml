  - {type: variant, offset: 444, length: 3, content: 間非聖, WYG: 師荀子東里閭空腹而好自賢孔叢子龜三千嵗蜉蝤不過三日以蜉蝤而為龜憂養生之具人必笑之淮南子嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜闞子羣蟻觀鼇隠如岳蟻曰彼之冠山何異我之戴粒逍遙封壤之顛伏乎窟穴也符子史無大功而求大禄國語持布鼓過雷門西漢王尊𫝊居累卵之危而圖㤗山之安為朝露之行而思傳代之功東漢王符傳無毛髪之勞而欲求丘山之用東漢張奐𫝊互見求多侯思止求為御史太后曰卿不識字豈堪御史對曰獬豸何嘗識字但能觸邪太后恱即以為朝散大夫侍御史通鑑唐武后紀李輔國求為宰相上曰以卿之功何官不可為其如朝望未允何唐代宗紀傳記魏收云我視沈約正如奴耳此所謂飾嫫母而誇西施持魚目而笑明月也有類效嚬彌益其醜史通集嫫母姣而自好楚辭醜嫗自飾也家家自以為稷契揚雄解嘲人人自謂握靈蛇之珠家家自謂抱荆山之玉孔璋不嫺於辭賦而自謂能與司馬長卿同風曹子建}
