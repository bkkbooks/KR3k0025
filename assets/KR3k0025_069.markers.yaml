  - {type: variant, offset: 1508, length: 315, content: 來欲收雄雄恐不能免迺從閣上自投下幾死西漢本傳互入無定力傳記魯人有與曾子同名族者而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若頃之又一人告之曰曾參殺人其母懼投杼踰墻而走戰國策互入無定力經小人以小善為無益而弗為也易繫辭力不足者中道而廢今女畫語雍也困而不學民斯為下矣語季氏子一羽之不舉為不用力焉輿薪之不見為不用明焉孟梁惠上為長者折枝語人曰我不能是不為也非不能也同上以為無益而捨之者不耘苖者也孟公孫上有是四端而自謂不能者自賊者也同上飽食暖衣逸居而無教則近於禽獸孟滕文公上自暴者不可與有言也自棄者不可與有為也言非禮義謂之自暴也吾身不能居仁由義謂之自棄也孟離婁上曠安宅而弗居舍正路而弗由哀哉同上徐行者豈人, WYG: ''}
