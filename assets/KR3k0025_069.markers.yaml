  - {type: variant, offset: 427, length: 7, content: 久遠看蔡君謨詩, WYG: 過其實食浮於人雖叨過實之名卒無堪用之器蓋散才不任於斧斤而病馬空糜於芻束溝中不願於青黄爨下無心於宫徴東坡集地資淺薄積薪有後來之譏徳業空虛在梁有不稱之誚㤗壇之樽何取溝中之斷清廟之瑟誤收竈下之焦狙猿無事於冠裳爰居不樂於鐘鼓病窳不中於規模固陋難逃於氷鑑六六年華屬老夫朽株難刻畫枯葉任彫零欒城集血指汗顔終縮手陳後山文不自揣度子教玉人彫琢玉人之患在好為人師孟子日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎互見勢力不敵西施病心而矉其里之醜人見而美之歸亦捧心而矉彼知美矉而不知矉之所以美荘子學曾未如肬贅則具然}
