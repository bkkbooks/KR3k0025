  - {type: variant, offset: 416, length: 3, content: 世間萬, WYG: 山林本我性章服偶包裹寵兼憂而並至恩與責以俱深以聖主而責愚臣方懐愧惕假小人而乗大器豈不隮顛渇如偃䑕之飲河喘若吳牛之見月舉足則蹈禍之機以身為斂怨之府寵榮既過小器盈而必顛筋力已疲飛鳥倦而思止昔而少健黔驢之伎已殫今也病衰駑馬之疲難强貪榮同衛鶴取笑類黔驢歐公集蓼蟲}
