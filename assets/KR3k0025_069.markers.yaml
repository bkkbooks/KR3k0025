  - {type: variant, offset: 26, length: 0, content: '', WYG: 左襄十年互見晩境子魚曰展四體以率舊猶懼不給而煩刑書若又共二徼大罪也左定四年時見㣲意有所禆補譬嘒星之繼朝陽飛塵之集華嶽史記序罷駑之質無汗馬之勞西漢公孫𢎞傳碌碌未有竒節蕭何傳互見闒茸門無橫草之功終軍傳無尺寸之效孔光傳無伐閲功勞車千秋傳師古曰伐積功也閲經歴也糞土愚臣忘生觸}
