  - {type: variant, offset: 651, length: 5, content: 孟子曰臧氏, WYG: 夏索居貧形容勞宇宙奔走空皮骨一生襟抱向誰開昭代將垂白途窮乃叫閽尚為諸侯客獨屈州縣中致身傷短翮驤首顧疲駑本賣文為活翻令室倒懸杜詩進不能矯翰龍雲退不能棲神豹霧昔年離别還同塞北之鳬今日歸來即似遼東之鶴生涯無嵗月岐路有風塵萬里煙波舉目有江山之恨百齡心事勞生無晷刻之懽畫地終難入書空自不安進不能言社稷之務立事嚢中退不能掃丞相之門買名天下風塵摧白首嵗月損紅顔駱賔王集世家黄葉散鄉路白雲重皇甫湜如何同枝葉各自有枯榮壯夫或未達十歩九太行秋蓬已種種所為覺無成李太白集吾自今年來蒼蒼者或化而為白矣動搖者或脱而落矣毛血日益衰志氣日益㣲㡬何不從汝而死也死而有知其㡬何離其無知悲不㡬時而不悲者無窮期矣汝}
