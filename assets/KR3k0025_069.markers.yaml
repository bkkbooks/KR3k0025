  - {type: variant, offset: 638, length: 1, content: 稱, WYG: 世家劉備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲耳通鑑漢獻紀犬馬之誠不能動人把人之誠不能通}
