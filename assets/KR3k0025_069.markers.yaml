  - {type: variant, offset: 79, length: 1, content: 脩, WYG: 無分可採鄧隲傳螢爝末光唐岑文本傳命輕雀䑕三國虞翻傳人㣲地寒不當極總重任通鑑梁均王紀傳記代匠指南取誚博識陸徳明經典釋文序蚉力何能負太山牛涔不足增滄海狄梁公家傳集牛馬走司馬子長書注言已為太史公掌牛馬之僕自謙之辭也内愧齊竽外羞魯服梁任孝恭啟蟻垤敢侔於嵩華陳琳答東阿王牋懼蒙塵於叩缶顧取笑乎鳴玉陸士衡文賦四逹雖平直蹇歩媿無良謝宣逺張子房詩在木闕不材之資處雁乏善鳴之分顧此腹背羽愧彼排空翮盧子諒以犬羊之質服虎豹之文吳質書但恨功名薄竹帛無所宣長歌行䇿蹇長途終慙一日之致懸縷層臺難任千鈞之重固知才弱不可自强力㣲難以企及智小謀大恐貽折足之憂任重才輕懼有絶臏之悔既慮鑠金固陳匪石魏温子昇為人讓表予非荆山璞謬登和氏塲羊質服虎皮燕}
