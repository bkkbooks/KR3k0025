  - {type: variant, offset: 81, length: 0, content: '', WYG: 假鳯翔􅀥道彦雜詩顧我蓬屋姿謬通金閨籍謬知終􅀞虎㣲分是醯雞杜詩著書毎成於廢疾進徳且乏其馨香栁唘踈愚空薄文選方托麋鹿羣敢同騏驥槽栁詩學不能探奥義窮章句為腐爛之儒雖或寘力於文學勤勤懇懇於嵗時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖逢掖曳大帶㳺於朋齒且有愧色况}
