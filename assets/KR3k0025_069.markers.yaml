  - {type: variant, offset: 719, length: 0, content: '', WYG: 不試没世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重禄禽息鳥視終於白首此徒圏牢之飬物非臣之所志也兾以塵露㣲誠補益山海螢燭末光增輝日月選曹植求}
