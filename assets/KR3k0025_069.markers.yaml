  - {type: variant, offset: 712, length: 1, content: 相, WYG: 䇿名於薦書齒下士於朝以仰望天子之光明今是鳥也惟以羽毛之異非有道徳智謀承顧問贊教化者乃反蒙採擢薦進光耀如此可以人}
  - {type: variant, offset: 712, length: 1, content: 相, krp: 䇿名於薦書齒下士於朝以仰望天子之光明今是鳥也惟以羽毛之異非有道徳智謀承顧問贊教化者乃反蒙採擢薦進光耀如此可以人}
  - {type: variant, offset: 715, length: 1, content: 喜, WYG: 如鳥乎韓文雖家置一喙以自稱道詬益甚矣互見暗投少時陳力希公侯許國不復為身謀風波一跌逝萬里吐心瓦觧空縲囚雄雌蓄形於木杪兮短狐伺景於深淵仰矜危而俯慄兮弭日夜之拳拳栁文滿鏡悲華髪空山寄此身白雲家自有黄卷業長貧劒寒空有氣松老欲無心白首銜寃欲問天惟有貧將病能令親愛疎白日豈知心同官嵗嵗先辭滿惟有青山伴老身窮分安藜藿衰容稱薜蘿嘆逝翻悲有此身獨醒空取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗牢落機心盡惟應鷗鳥親生涯已逐滄浪老斗間誰與看寃氣盆下無由見太陽不才成擁腫失計似邯郸只縁六翮不自致長似孤雲無所依白屋漸看秋草没青雲莫道故多嵗月蹉跎飛不進羽毛憔悴何人問遶樹空隨烏鵲羣巢林只有鷦鷯願落落惟心在劉長卿雖云意氣在豈免顔色低無成心力盡未老形骸殘塵土滿青袍官曹冷似氷誰肯來同宿身方逐萍梗年欲近桑榆時遭人指㸃數被鬼揶揄朝逰九城陌肥馬輕車笑殺人暮宿五侯門殘茶冷酒愁殺人拙詩在壁無人愛鳥汙苔侵文字殘迢逓麒麟閣圖功未有期區區盡素志焉用寫真為朽株枯竹有何榮青衫未觧白髪已多始得名於文章終得罪於文章委心泥滓絶望煙霄跼身地逺仰首天髙流年惝恍不饒我秋冷先知是瘦人亦知合被才名折二十年來折太多鏡裏老來無避處樽前愁至有銷時還似今朝歌酒席白頭翁入少年塲徒勞州縣不致青雲僕乗嚢輜日削月脧一照舊圗畫無復昔儀刑勿言一莖少滿頭從此始誰知濩落心先納蕭條氣莫言三十是年少百嵗三分已一分良時風景長虛度壮氣心情已暗消三旬卧廢鶯花月一半春消風雨天長慶老郎惟我在年光東流水生計南枝鳥白侍郎頑鈍如鎚命如紙近來時世欺前輩好染髭鬚學後生媿無鴛鷺姿短翮空飛還誰當假羽毛雲路相追攀韋應物人生不如意十乃居八九唐李衞公平泉記青雲滿眼應驕我杜牧之毎行經舊處欲想似前身銅壺漏水何時歇如此相摧即老翁何事獨傷懐少年曾得意編蒲曾苦思垂竹媿無名劉賔客君登青雲去余望青山歸互見趍向不同常恐填溝壑何由振羽儀世途皆自媚流俗寡相知當路誰相假知音世所稀虛擲此芳辰不才明主棄多病故人踈孟浩然平生心力盡於文半雨半風三月内多愁多病百年中杜荀鶴集似玉兮将沉如金兮永没𤣥鬢行為霜清淚泣成血皮日休集鴛鴻得路争先翥松桂凌寒獨後凋歸去朝端如有問玉門闗外老班超武伯蒼鄰富雞長徃家貧客漸稀姚少監拜迎官長心欲碎鞭撻黎庶令人悲一卧東山三十春豈知書劒老風塵壮心瞻落景心事感流萍髙適道直去官早家貧為客多一身仍白髪萬慮止丹心性拙難超世心孤易感恩竹馬兒猶小荆釵婦慣貧世途行處見人事病來踈許渾長貧惟要健漸老不禁愁張文昌文字不得力桑麻難救貧方雄飛相看戀簮組不覺老風塵錢起涸魚乆失風波勢枯草曾霑雨露恩唐文粹出門即有礙誰謂天地寛譬如浸檗泉流苦日已長生前為造化剰物殁後與灰土俱委此豈不為辜負日月之光景耶孟東野只言聖代謀身易争奈貧儒得路難平生四方志此夜五湖心心寒已分灰無焰羅隠共君前後俱從事羞見功名與别人元㣲之集動觸樊籠倦閒消肉食難吕和叔本朝但應花枝日愈好惟有我老年年衰衰鬢鑷殘欹雪嶺壯心降盡倒風旌歐公集新花與故吾已矣筋骸徽纒束腑肺鼎鐺煎一巢無地拙於鳩青天白日春常好緑鬢朱顔老自悲輊軒已任人前後掲厲安知世淺深今吾即故吾老來容易得新年明明漢月空相識天偶人觭識盡風波惡生涯亦可哀心腹非故時更覺日月駛臨川集駛疏吏切從史疾貎無錢乞與韓知客名紙生毛不為通古今詩話積憂熏心驚齒髪之先變抱恨刻骨傷皮肉之僅存風流耆舊消磨盡只有青山對病翁可憐老驥真老矣無人更秣天山禾天窮無所逃年年嵗嵗何窮已花似去年人老矣聞道鴛鴻滿臺閣網羅應不到沙鷗信我人厄非天窮我生無田食破硯邇來硯枯磨不出寒聴不知春溝中枯木應笑人鑚灼不然誰似我俯仰隨人如桔橰平生五千卷一字不救饑園中草木春無數只有黄楊厄閏年生涯到處似檣烏此身自㫁天休問白髪年來漸不公身行萬里半天下僧卧一庵初白頭多才乆被天公怪闕食惟應㸑婦知萬事早知皆有命十年浪走寧非癡狂謀謬筭百不遂惟有霜鬢來如期人生識字憂患始心如死灰不復温逺宦不知官爵好思歸苦覺嵗年長冷官無事屋廬深東坡心事數莖白髪生涯一片青山百斛明珠人生不願才才士困奔走壯心付與東流水才短如蠶只自纒一官來徃似秋燕薄俸包裹如春蠶此身長似伏轅馬何日還為縱壑魚一被簮裳裹長遭羅網牽丹心變為灰老人無力年年懶世事如花種種新欒城集身如病鶴翅翎短心似亂絲頭緒多山谷詩叙述部自薦子今大冶鑄金金踴躍曰我且必為鏌鎁荘子史毛遂曰使遂早得處嚢中則頴脱而出非特其末見而已史平原君傳東方朔上書曰臣朔少失父母長養兄嫂年十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陣之具鉦鼓之教亦誦二十二萬言臣朔年二十二長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌㢘若鮑叔信若尾生若此可以為天子大臣矣前漢東方朔傳猶泥之在鈞惟甄者之所為猶金之在鎔唯冶者之所鑄董仲舒傳先零反趙充國年七十餘上問誰可將充國曰亡踰於老臣本傳搦朽摩鈍鈆刀皆能一斷班固叙傳僕雖罷駑亦嘗側聞長者遺風耳司馬遷傳青骹繁霜縶於籠中何以教其搏東郭於韝下也白猨𤣥豹藏於􅎉檻何以}
