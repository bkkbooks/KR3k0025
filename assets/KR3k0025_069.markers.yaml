  - {type: 'tls:seg', offset: 716, content: '', id: KR3k0025_CHANT_069-7a.11}
  - {type: variant, offset: 718, length: 0, content: '', WYG: 接垂條於千仞也和璧之在荆山隋珠之潛重川非遇其人焉有連城之價照車之名乎晋書張載傳晉譙王永曰公未見知耳鈆刀豈無一割通鑑晋紀使受天澤餘潤雖朽枿敗腐不能生殖猶足蒸出芝菌以為瑞物唐書栁宗元傳衣不蓋體常寄食於人切恐轉死溝壑伏惟天子哀矜之令執先臣故事㧞泥塗之乆辱則臣之述作雖不足鼓吹六經至沈鬱頓挫隨時敏給揚雄枚臯可企及也有臣如此陛下其忍棄之唐杜甫傳元澹謂狄仁傑曰下之事上譬富家儲畜以自資也脯腊以供滋味參术以防疾疢門下充百味者多矣願以小人備一藥石可乎唐書本傳集羞庖人之獨割引尸祝以自助絶交論髙鳥未挂於輕繳淵魚未懸於鉤餌者恐釣射之術或未盡也昔賈誼弱冠求試屬國請繫單于之頸而制其命終軍以妙年使越欲得長纓繫其王覊致北闕切不自量志在效命庶立毛髪之功以報所受之恩效錐刀之用使得西屬大將軍當一校之隊東屬大司馬統偏師之任必乗危躡險騁舟奮驪突刄觸鋒為士卒先雖未能擒權馘亮庶虜其雄率殱其醜類必效須㬰之㨗以滅終身之愧雖身分蜀境首懸吳闕猶生之年也如微}
