  - {type: variant, offset: 479, length: 0, content: '', krp: 齊流蜉蝤與大椿齒年郭璞瓴甋誇璵璠魚目笑明月張景陽雜詩顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤不謂矜餘力還來謁大巫杜詩持郤克之質入邯郸之墟奏曹鄶之音歴莖英之肆陳叔達答王續書盗跖自方於仲尼張渭虞帝碑銘夫鯤之為魚也潛碧海泳滄流沈鰓於渤海之中掉尾乎風濤之下}
  - {type: variant, offset: 480, length: 0, content: '', WYG: 濠魚井鮒自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天池之間宛頸乎江海之畔而雙鳬乗鴈自以為可得而䙝焉駱賓王猶螢燐增輝太陽唐邢璹畧例序斗水㵼大海孟東野昨夜新生黄雀兒飛來直上紫藤枝擺頭撼腦花園裏將為春光總屬伊白侍郎猶張蹭蹬之鱗更舉螳螂之臂唐文粹裹燕石而履𤣥圃帶魚目而㳺漲海祗取誚耳栁文臨江之人得麋畜之日抱就犬習示之與之戯積乆益狎麋忘己之麋也出門外見犬與為戯外犬共殺之麋至死}
  - {type: page-break, offset: 480, content: '', id: KR3k0025_WYG_069-8a, image: WYG0932/WYG0932-0136a.png}
