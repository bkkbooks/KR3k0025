  - {type: variant, offset: 479, length: 0, content: '', WYG: 齊流蜉蝤與大椿齒年郭璞瓴甋誇璵璠魚目笑明月張景陽雜詩顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤不謂矜餘力還來謁大巫杜詩持郤克之質入邯郸之墟奏曹鄶之音歴莖英之肆陳叔達答王續書盗跖自方於仲尼張渭虞帝碑銘夫鯤之為魚也潛碧海泳滄流沈鰓於渤海之中掉尾乎風濤之下}
