  - {type: variant, offset: 1879, length: 226, content: 在而阿諛求容諂莫甚焉孔叢子抗志篇以不善先人者謂之諂以不善和人者謂之諛荀勸學史楚祈父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲左昭十二陳勝起山東二世召諸生問叔孫通曰此特群盜狗偷鼠竊耳何足置之齒牙間郡守尉今捕論何足憂史本傳卑疵而前纖趨而言同上曰者傳非冇材能徒以婉佞貴幸佞幸傳並史衛侯言計非是而群臣和者如出一口夫不察事之是非而悅人讚己闇莫甚焉不度理之所在而阿諛求容諂莫甚焉通鑑周紀互見阿諛黃霸為相鶡雀飛丞相府霸以為神雀欲以聞西漢傳回面汙行, WYG: ''}
