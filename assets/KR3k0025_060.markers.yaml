  - {type: variant, offset: 115, length: 1, content: 九, WYG: 一年譬如農夫是穮是蓘雖有饑饉必有豐年左昭元無瑕者可以戮人左昭四臨淵羡魚不如退而結網西漢董仲舒欲人勿聞莫若勿言欲人勿知莫若勿為枚乗傳集高鳥未挂扵輕繳淵魚未懸扵鈎餌者恐釣射之術或未盡也選自試表務出人之名安得不厲出人之器戰横行之陳安得不振横行之畧皇甫湜任其自然子性所長非所短性短非所續莊子駢拇篇賈瓊問何以息謗子曰無辯曰何以止怨曰無争文中子問易史荒服之外其叛不為之勞師其降不為之釋備使其為冦不能為臣不得唐書突厥傳序又見控制有道集茍不知我而謂我盜跖吾又安取懼焉茍不知我而謂我仲尼吾又安取榮焉柳文謗譽本朝美者自美吾何為而喜惡者自惡吾何為而怒去自去耳吾何缺而追來自來耳吾何妨而拒臨川集齒髪付天公缺壞不可修東坡盡其在我經寧適弗來㣲我弗顧寧適不來㣲我有咎詩伐木君子内省不疚無惡扵志記中庸子曰不患無位患所以立不患莫己知求為可知也語里仁忠告而善道之不可則止語顔淵子曰不患人之不己知患其不能也語憲問子殀壽不貳修身以俟之孟盡心上君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故恥不修不恥見汙恥不信不恥不見信恥不能不恥不見用荀子非十二子互入知恥君子慕其在己者不慕其在天者荀子天道蘭生幽室不為莫服而不芳舟在江海不為莫乗而不浮君子行義不為莫知而止休淮南子說山訓史心茍無瑕何恤乎無家左閔一鄭人㳺扵鄉校以論執政然明謂子産曰毁鄉校子産曰夫人退而㳺焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之左襄三十二茍能修身何患不榮東方朔士病不能明經經術茍明其取青紫如俛拾地芥西漢夏侯傳内省不疚何恤人言東漢班超傳互入無愧虞世南曰若徳不修雖獲麟鳯終是無補但執政無闕雖有災何損扵時唐書集諸生業患不能精無患有司之不明行患不能成無患有司之不公韓文公進學解夫有湛盧豪曹之器者患不得犀兕而剸之不患其不利也柳文君子抱仁義不懼天地傾王建集本朝清香肯以無人减歐公可取不可取者存乎子取不取者存乎人東坡四菩薩記知命者必盡人事然後理足而無憾物之有成必有壞譬如人之有生必有死國之有興必有亡也雖知其然而君子之養身也凡可以久生而緩死者無不用其}
