  - {type: variant, offset: 106, length: 0, content: '', krp: 鬻牛馬者不飾價賣羔豚者不加飾家語虞芮二國争田而訟連年不决乃相謂曰西伯仁人也盍往質之入其境則耕者讓畔行者讓路入其朝士讓于大夫大夫讓于卿虞芮之君曰嘻吾儕小人也不可以入君子之朝遂自相與而退咸以所争之田為閒田家語孔子遭厄扵陳蔡之間子路彈琴而歌孔子和之曲三終旅人解甲而罷家語孔子曰天下有道盜其先變乎荀子君子為國張其綱紀謹其教化導之以仁則下不相賊蒞之以廉則下不相盜臨之以正則下不相詐修之以禮義則下多徳讓同上夷恵變貪革薄千載聞之猶有感激孟子注南郭順子正容以悟物使人之意也消莊子市南冝僚弄丸兩家之難解孫叔敖秉羽而郢人投兵同上子罕不利寳玉而争券契者愧矣務光不汙扵世而貪利偷生者愧矣淮南子精神訓昔舜耕扵歴山期年而田者争處墝埆以封壤肥饒相讓釣扵河濱期年而漁者争處湍瀬以曲隈深潭相予當此之時口不設言手不指麾執𤣥徳扵心而化馳若神使舜無其徳雖口辯而户說之不能化一人淮南子原道訓速哉七十子之肖仲尼也揚子孔子用扵魯齊人歸其侵疆同上史范宣子讓其下皆讓欒黶為汰不敢違也左一人刑善百姓休和士㑹}
  - {type: variant, offset: 107, length: 0, content: '', WYG: 中軍晉國之盜逃奔扵秦左孔父正色而立扵朝則人莫敢過而致難扵君者公羊傳孔子行乎季孫三月不違曰家不藏甲邑無百雉之城扵是叔敖帥師堕郈季孫仲孫帥師堕費同上舜耕歴山歴山之人皆讓畔漁雷澤雷澤之人皆讓居史記五帝紀西伯行善虞芮之人有獄不能决如周入界耕者讓畔民俗皆讓長虞芮之人未見西伯皆慚相謂曰吾所争周人所恥何往為祗取辱耳遂還俱讓而去史周紀孔子與聞國政三月粥羔豚者弗飾價男女行者别扵塗塗不拾遺四方之客至乎邑者不求有司史孔子世家儉節仁義之人立扵朝則荒肆之樂輟矣諫說論理之臣間扵側則流漫之志詘矣烈士死節之行顯扵世則淫康之虞廢矣史李斯傳萬石君子孫有過不誚讓為便坐對案不食諸子相責因長跪肉袒固謝罪改之前漢同上互入示人以意吳王詐病不朝賜以几杖張武等受賂金錢覺更加賞賜以愧其心通鑑漢文紀上設禮義㢘恥以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也前漢賈誼傳韓延壽守馮翊民有昆弟訟田延壽閉閣思過扵是訟者宗族相責此兩昆弟深自愧皆自髠肉袒謝願以田相移終死不敢争後民莫敢以辭訟自言者前漢同上互見政事山有猛獸藜藿為之不採國有忠臣奸邪為之不起前漢盖寛饒傳宋均為九江太守虎相與東渡江後漢同上孟嘗遷合浦太守去珠復還同上王烈所居市無二價東漢前在江陵反風㓕火後守𢎞農虎北渡河劉昆傳諸有争訟曲直將質之扵王烈或至塗而反或望廬而還黄憲言論風㫖無所傳聞然士君子見之靡不服深逺去鄙吝同上譬如靈蓍在林林無毒草威鳯在野野集仁禽許邵傳舜歌南風不下堂而天下治步隲傳涉其門者貪夫反㢘懦夫立志晉羊祜傳天下改目暴貪斂手北史李彪傳徐有功為蒲州司法以寛為治不施敲扑吏相約有犯徐司法杖者衆共斥之迨官滿不杖一人職事亦修通鑑唐武后陸贄秉筆内翰􅘀狡向風懦夫増氣唐書同上汲黯在朝淮南寢謀干木處魏諸侯息兵一士止百萬之師一賢制千里之難裴度傳楊綰始輔政中丞崔寛本豪俊城南别墅池觀堂阜為當時第一即日遣人毁之京兆尹黎幹出入従騶百數省損纔留十餘騎郭子儀邠州行營方大㑹除書至音樂散五之四他聞風靡然自化者不可勝紀同上賛綰以徳服人而人自化同上毛玠以清徳為魏尚書而人不敢鮮衣美食李程傳魯秉周禮齊不加兵于休烈傳陽公在朝四方聞風貪冒茍進邪薄之夫沮其志雖㣲師尹之位而人實瞻望焉同上至潮與鱷魚約數日水涸西徙潮無鱷魚患韓愈楚有昭王井傳言汲者死行人雖渇困不敢視韓朝宗移書諭神自是亡恙唐書冀缺以禮遜升而晉人知禮文翁以經術教而蜀士多儒唐薛登傳可使繁暑坐變清凉五代史郭崇韜傳傳記陳寔在鄉閭平心率物有盜夜入其室止扵梁上寔命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是也盜驚自投地寔徐譬之曰視君狀貎不似惡人冝深克己反善然當由貧今遺絹二疋自是一縣無復盜竊東觀漢紀程普頗以年長侮周瑜瑜折節下之不與計普後自敬而親重之告人曰吾與周公瑾交若飲醇醪不覺自醉江表傳宓子賤為單父宰鳴琴不下堂而單父自治吕氏春秋子産相鄭桃李之垂扵街者莫之援也同上楚昭王與吳人戰楚軍敗走履决背而行三十步復取之左右問曰王何惜一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與偕反也自是之後楚國之俗無相棄者賈誼新書人問郭文曰虎狼害人先生獨不畏乎文曰人無害獸心獸亦不害人耳髙士傳孔子居相位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起鹽鐵論集不言之化若門到户說矣齊竟陵王行狀鄰國有媮衣食帶刀劍椎埋胠篋之類鬬雞走狗之豪莫不靡下風馴雅素陳子昂集懷梟䲭以好音消祲沴為和氣陸宣公文魯有泮林鳥革其音劉賓客集自従郤縠為元帥大將歸來盡把書同上鸞鳯一鳴蜩螗革音同上始知聽韶濩可使心和平白侍郎令修扵庭户數月之間而人自得扵湖山千里之外唐文粹記陽城居扵晉之鄙晉之鄙人薫其徳而善良者幾千人韓文諌臣論柳侯為州不鄙夷其民動以禮法三年民各自矜奮曰兹土雖逺京師吾等亦天民今天幸恵仁侯若不化服我則非人扵是老少相教語莫違侯令凡有所為扵其鄉閭及扵其家皆曰吾侯聞之得無不可扵意否莫不忖度而後従事凡令之期民勸趨之無有後先必}
