  - {type: variant, offset: 3, length: 3, content: 怙侈滅, WYG: 池之竭矣不云自頻泉之竭矣不云自中詩召旻哲夫成城哲婦傾城詩瞻仰為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之記曲禮下事親有隠而無犯事君有犯而無隱事師無犯無隠同上君子之愛人以徳細人之愛人以姑息檀弓上禮之於人也猶酒之有蘖也君子以厚小人以薄禮運竝記互見同出異趣子曰惟上智與下愚不移語陽貨子同室之人鬬者救之雖被髪纓冠而救之可也鄉隣有鬬者被髪纓冠而往救之則惑也雖閉户可也孟子離婁盡其道而死者正命也桎梏死者非正命也同上盡心下盜跖名聲若日月與舜禹俱傳然而君子不貴非禮}
