  - {type: variant, offset: 176, length: 0, content: '', krp: 家録人皆有分經罔俾阿衡専美有商書子舜何人也予何人也有為者亦若是孟子人人有貴於己者弗思耳孟告子惻隠之心人皆有之羞惡之心人皆有之辭讓之心人皆有之是非之心人皆有之孟子人皆可以為堯舜同上塗之人可以為禹荀子性惡希驥之馬亦驥之乗也希顔之人亦顔之徒也希之則是揚子傳記動靜之物日月所照莫不砥礪大戴記集雨露之所濡甘苦齊結實杜工部若果以聖與我異類則自堯舜以下皆冝縦目卬鼻四手八足鱗毛羽鬛飛走變化然後乃可茍不為是則亦人耳柳文楊誨之第二書一氣之所春一雨之所膏而得之者各有淺深不必均也李習之禽魚各翔泳草木遍芬芳韋應物集本朝春風無先後爛漫争紅白歐公集草木本無情及時如自得同上不及牆根花與草春來無處不芳菲同上造化未嘗私一物各隨妍醜自芳菲歐公春帖子皇帝閣詞陽和不擇地海角亦逢春古今詩話以勤補拙子跬步不休跛鼈千里荀子駑馬十駕功在不捨同上人心易感經有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也詩小序說以使民民忘其勞易志㣲噍殺之音作而民思憂嘽諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅㢘直勁正莊誠之音作而民肅敬寛裕肉好順成和動之音作而民慈愛記樂記子韓娥之齊鬻歌聲哀一里老幼悲怨復為長歌老幼喜抃列子夫榮啓期一彈而孔子三日樂感于和鄒忌一徽而威王終夕悲感扵憂動諸瑟琴形諸聲音而能使人為諸哀樂淮南子荆軻入秦朱亥撃筑歌扵易水之上聞者瞑目髪直穿冠趙王遷於房陵心懷故鄉山谷之謳聽者嗚咽泣流連列子簞醪注流軍士通醉温辭一灑師人挾纊並列子史楚伐蕭師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左成十二燕昭王為郭隗改築臺師事之其後樂毅自魏往鄒衍自齊往劇辛自趙往士争趨燕史記漢王下令軍士不幸死者吏為衣衾棺斂轉送其家四方歸心焉通鑑漢高紀趙佗稱制與中國侔帝乃為佗親家在真定者置守邑嵗時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越賜佗書曰前日聞王發兵於邊為㓂災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕今得王之地不足以為大得王之財不足以為冨服領以南王自治之雖然王之號為帝兩帝並立亡一乗之使以通其道是争而不遜仁者不為也願與王分棄前惡終今以來通使如故賈至南越南越王恐頓首謝罪願奉明詔長為藩臣奉貢職下令去帝制稱臣通鑑漢文紀悲者不可為絫欷思者不可為嘆息故髙漸離撃筑易水之上荆軻為之低徊不食雍門子一㣲吟孟嘗君為之於邑西漢中山靖王勝傳滿堂飲酒有一人向隅而悲泣則一坐皆不樂前漢法志一夫得情千室鳴絃後漢循吏傳姜詩事母至孝妻奉順尤篤母好飲江水妻常泝流而汲後值風不時得還母渇詩責而遣之妻乃寄止隣舎晝夜紡績市珍羞使隣母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑慚感念悲哀隣里為之罷社三國魏志羊祜都督荆州有吞併之心每與吳人交兵尅日方戰不為掩襲之計將帥有欲進譎詐之䇿者輙飲以醇酒使不得言有畧呉二兒為俘皆送還其家出軍行呉境刈榖為糧皆計所侵送絹償之㳺獵常止晉地若禽獸為吳人所傷而為晉兵所得者皆封還之扵是吳人翕然悅服稱為羊公不之名也祜與陸抗相對抗每告其戍曰彼専為徳我専為暴是不戰而自服也各保分界而已無求細利晉羊祜傳劉疇避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞之聲以動其游客之思扵是羣賈偕去晉書互入處事閒暇轉移人心劉琨在晉陽嘗為羣騎所圍窘迫無計琨乃乗月登樓清嘯賊聞之皆悽然長嘆中夜奏金笳賊流涕欷歔向曉復吹之賊棄圍而走晉書本傳互入處事閒暇坐以制勝轉移人心三門劉𢎞每有興發手書守相叮嚀欵宻所以人皆感恱争赴之咸曰得劉公一紙書賢扵十部従事通鑑晉懷記徳可感義夫恩可勸死士通鑑梁高祖宇文泰從賀㧞岳入關時闗隴彫弊泰撫以恩信民皆感恱曰早遇宇文使君吾輩豈従亂乎同上諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆恱服通鑑唐太宗上見病卒召至御榻前存慰士卒莫不感恱有不預征名自願以私裝従軍動以千計皆曰不求縣官勲賞惟願效死遼東通鑑唐太宗山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下通鑑唐肅宗李懷光叛其將降馬燧以數騎入城慰撫其衆大呼曰吾輩復為王人矣通鑑唐徳宗唐徳宗在奉天時赦令武夫悍卒無不感動思奮唐書僕固懷恩誘吐蕃等南下急召郭子儀屯涇陽回紇曰令公誠存安得而見之子儀將出諸將請無往子儀曰敵數十倍之衆今力固不勝至誠感神况敵乎諸將請選鐵騎五百子儀曰適足以為害也即傳呼曰令公來敵初疑持滿注矢以待之子儀以數十騎徐出免胄而勞之曰汝等乆同忠義何至於是回紇皆捨兵下馬齊拜曰果吾父也子儀召其首領入朝舊唐本傳互入處事閒暇遣知制誥裴度至魏博宣慰以錢百五十萬緡賞軍士六州百姓給復一年軍士受賜歡聲如雷成徳兖鄆使者數輩見之相顧失色嘆曰倔强者果何益乎通鑑唐憲宗互入倔強裴度以蔡卒為牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾為彰義節度使元惡既擒蔡人則吾人也何疑焉蔡人聞之感泣先是吳氏父子阻兵禁人偶語於途夜不燃燭有以酒食相過従者罪死度既視事下令惟禁盜賊鬬殺餘皆不問往來者不限晝夜蔡人始知有生之樂通鑑唐憲宗傳記昔者良將之用兵饋簞醪者投諸河士卒同流而飲夫一簞之醪不能味一河之水而三軍之士思為致死者以滋味之及已也黄石公三畧互入與士卒一體雍門周以琴見孟嘗君曰臣竊悲千秋萬嵗外墳墓生荆棘狐兎穴其中樵兒牧豎躑躅而歌其上行人見之悽愴曰孟嘗君之尊貴如何成此乎孟嘗君喟然嘆息淚下承睫桓譚新論髙臺已傾稷下有聞琴之泣壯士一去燕南有撃筑之悲周庾信思舊銘簞醪投河三軍奮感刓印在手萬夫睽離陳子昂集降將有依風之感宫人成憶月之歌劉賔客一客失意行十客顔色低姚少監本朝河西諸將讀璽書而知天子之聖明河北叛臣聞赦令而致武夫之涕泣欒城集示人以意經挈壺以令軍并挈轡以令舍挈畚以令糧周禮夏官挈壺氏前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅記曲禮上成王有過則撻伯禽記文王世子陽貨欲見孔子孔子不見歸孔子豚孔子時其亡也而往拜之孺悲欲見孔子孔子辭以疾將命者出户取瑟而歌使之聞之並陽貨子宓子賤為單父宰恐魯君聽䜛使己不得行其政請君之近吏二與之俱至官宓子賤戒其邑令二吏方書掣其肘書不善則怒之二吏辭歸魯君以問孔子子曰意者以此為諫乎公悟使告宓子曰自今以往單父非吾有也従子之制有便於民子决為之家語屈節篇孟子去齊宿於晝有欲為王留行者坐而言不應隠几而卧孟公孫丑下絶人以玦反絶以環荀子越王勾踐欲伐吳欲民輕死生見鬬鼃乃下軾従者曰王何敬也曰以其勇絶故也其後國人輕命死戰韓非子越王勾踐謀報吳欲人之勇路逢怒鼃下車而揖之尹文子舜藏金千斤於嶄岩之下所以塞貪鄙之心淮南子齊莊公出獵有一蟲舉足將搏其輪問其御曰此何蟲也對曰此謂螳螂者也其為蟲也知進而不知却不量力而輕敵莊公曰此為人必為天下勇武矣迴車而避之勇武聞之知所盡死矣淮南子人聞訓史楚侵鄭穿封戌囚皇頡公子圍與之争正扵伯州犂犂曰請問扵囚乃立囚上其手曰夫子為王子圍寡君之貴介弟也下其手曰此為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉左襄二十六秦穆公使孟明視等襲鄭侵晉渡河焚舟大敗晉人史記燕昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先従隗始况賢扵隗者豈逺千里哉扵是昭王為隗築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士争趨燕史燕世家楚懐王使項羽為將軍伐秦羽兵渡河皆沉船破釜甑廬舎持三日糧以示士卒必死扵是大破秦軍史記上大封功臣其餘争功不决未得行封諸將偶語張良}
