  - {type: variant, offset: 1461, length: 416, content: 也朕有過未嘗不面言至有朕所不堪聞者允皆無所避朕聞其過而天下不知可不謂忠乎通鑑宋世祖額扣龍墀唐書劉栖楚德宗欲遂相裴延齡城顯語曰延齡為相吾當取白麻壞之哭於庭帝不相延齡城力也同上陽城傳褚遂良鯁亮唐書本傳集悉心以諫極言無隱選策文正言不諱以危身選騷經氣蘊逆鱗色形匪躬唐文粹守節沒齒忠莫至焉選豪士賦序納忠為爭臣之表柳文盧景亮奏事如水赴壑同上匡拂時病磨切貴近罔有顧慮知無不為杜牧之為負剛腸譽還追強項名張說諫舌切切上磨帝缺孫樵苦隳肝膽而言天下之事元微之忤英主之龍鱗蹈姦臣之虎尾唐張悅撰宋璟遺愛碑本朝魯宗道為參政以忠鯁自任時人謂曰魚頭公蓋以骨鯁目之聖宋掇遺經巧言令色便僻側媚書冏命籧篨常觀人顏色而為之辭故不能俯戚施下人以色故不能仰也詩新臺注巧言令色鮮矣仁語學而籧篨口柔也戚施面柔也夸毗體柔也爾雅子脅肩諂笑病于夏畦孟子注夏畦夏月治畦之人也言為此者其勞過於夏畦之人閹然媚於世者是鄉原也孟子盡心下秦王有病召醫舐痔者得車五乘莊子列御寇希意導言謂之諂莊子不度理, WYG: ''}
