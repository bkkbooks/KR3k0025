  - {type: variant, offset: 3173, length: 246, content: 談主上之聖明則君盡三五述宰相之英偉則臣皆二八史通集睮睮諛夫選諷諫詩折枝舐痔選絕交論吐言如傷屈體無骨梁張纘謝僕射表入門自媚駱賓王諂媚相與千顏一容元次山為人惠口而柔顏同上奴顏婢膝真乞丐陸龜蒙小人趨事必變顏色唐文粹本朝冠萊公為相丁謂出其門為參政會食都堂羹染公鬚謂起拂之遺事俯仰隨人如桔槔東坡詩中宗宴近臣祝欽明自請作八風舞搖頭轉目備諸醜態續世說則天不豫令閻朝隱往少室山祈禱朝隱乃曲申悅媚以身為犧牲請代上所苦魏元忠疾臥諸御史盡往省之郭霸獨居後請視便液曰大夫糞味甘或不瘳今味苦當即愈矣蠖屈鼠伏佞詞泉湧同上, WYG: 纂淵海卷六十}
