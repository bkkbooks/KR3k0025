  - {type: variant, offset: 2643, length: 529, content: 武建章盛德彌永唐武宗楊再思為御史專以諂媚取容張同休戲再思曰楊內史面似高麗再思欣然即剪紙帖巾反披紫袍為高麗舞舉坐大笑唐中宗宮中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下同上薛謙光獻武后所製豫州鼎銘其末云上玄降鑒方建隆基以為上受命之符姚崇表賀請宣示史官頒告中外唐元宗李適之性踈率李林甫嘗謂適之曰華山有金礦采之可以富國主上未之知也他日適之因奏事言之上以問李林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以李林甫為愛己薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脫適之由是束手矣唐元宗太清宮奏學士李琪見元元皇帝乘紫雲告以國祚延昌同上上嘗謂佛言報應果為有無元載等奏以國家運祚靈長非宿植福業何以致之福業已定雖時有小災終不能為害所以安史悖逆方熾而皆有子禍僕固懷恩稱兵內侮出門病死回紇吐蕃大舉深入不戰而退此皆非人力所及豈得言無報應也唐代宗李兼在江西有月進韋皋在西川有日進剌史進奉自兼始幕僚進奉自綬始唐德宗上御延英問宰相曰天下何時當太平牛僧孺對曰太平無象今四夷不至交侵百姓不至流散雖非至理亦謂小康陛下若別求太平非臣等所及唐文宗蝗自東而西蔽日所過赤地京兆尹楊知至奏蝗入京畿不食稼皆抱荊棘而死宰相皆賀唐懿宗太史奏太陽應虧不虧姚崇表賀請書之史冊唐元宗並通鑑傳, WYG: 趙曄吳越春秋}
