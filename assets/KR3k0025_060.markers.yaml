  - {type: variant, offset: 345, length: 881, content: 笑謂崇誤入卿內崇曰是廁耳本傳石崇與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂同上石崇財產豐積室宇宏麗後房百數皆曳綺繡金翠絲竹盡當時之選庖膳窮水陸之珍並晉書本傳魏高陽王雍一食直錢數萬李崇曰高陽一食敵我千日通鑑梁武紀韋陟窮治饌羞擇膏腴地蓺榖苖以鳥羽擇米每視庖中所棄其直猶不減萬錢宴公侯家雖極水陸曾不下筯唐書本傳傳記楊國忠子弟上元夜各有千炬燭圍天寶遺事李德裕奢侈每食一杯羹其費約錢三萬雜珠玉寶貝朱砂煎汁為之過三煎即棄其滓獨異志元載造芸輝堂芸香草也白如玉入土不朽為屑以塗壁設紫綃帳凝冬風不入盛夏自清涼唐蘇鶚蘇氏演義韓嫣好彈以金為丸一日所失者十餘長安為之語苦飢寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉西京雜記楊氏子弟暑月大冰琢山周圍宴席王仁裕開元天寶遺事楊國忠冬月選婢妾肥大者列行於前令遮風謂之肉陣開元遺事集木衣綈繡土被朱紫張平子東京賦春衣一對直千金白侍郎山珍海錯棄藩籬烹犢炰羔如折葵韋應物集首飾載千金一膳傾千家唐文粹經王臣蹇蹇匪躬之故易蹇卦子忠臣不諂其君莊子史韓信曰乘人之車者載人之患衣人之衣者懷人之憂食人之食者死人之事史本傳上所幸慎夫人在禁中嘗與皇后同席坐反坐郎署袁盎引卻慎夫人坐曰陛下所以為慎夫人適所以禍之也通鑑漢紀忠臣不避重誅而直諫西漢主父偃傳忠臣蒙死而竭知宣帝紀獨有極言待死五行志並西漢忠臣憂世犯主嚴顏譏剌貴臣至以殺身滅家而猶為之者何耶君臣義重有不得己也後漢何敞傳漢成帝欲御樓船薛廣德諫言宜從橋陛下不聽臣臣自刎以血污車輪本傳槐里令朱雲上書曰臣願賜尚方斬馬劍斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣廷辱師傳罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已通鑑漢成帝紀大司徒韓歆好直言無隱諱於上前證歲將饑凶指天畫地言甚剛切通鑑漢光武紀衛覬上疏曰非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說也魏志崔洪清厲骨鯁好面折人過而退無後言, WYG: ''}
