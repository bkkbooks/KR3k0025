  - {type: variant, offset: 117, length: 10, content: 宅甲諸第前田蚡傳奢泰, WYG: 國也凡可以存存而救亡者無不為至扵不可柰何而後已此之謂知命東坡墨妙亭記在人所為經惟聖罔念作狂惟狂克念作聖書多方禮之扵人也猶酒之有蘖也君子以厚小人以薄記禮運互入事同體異子仁義禮智非由外鑠我也我固有之也弗思耳矣故曰求}
