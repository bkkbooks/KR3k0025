  - {type: variant, offset: 175, length: 0, content: '', krp: 扵反掌安於泰山選枚上吳王書互入間不容髪如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥流濬則沼沚陸宣公文善根茍種佛果終成白樂天狙猴之處山呌呼跳梁其輕躁狼戾異甚然得而縶之未半日則定坐求食唯人之為制其或優人得之加鞭箠狎而擾焉跪起趨走咸能為人所為者未有一焉狂奔掣頓踣弊自絶吾信夫狂之聖也柳文楊誨之第二書本朝越人之望燕為絶域也北轅而首之茍不已無不至臨川集士生於世使其中不自得將何往而非弊使其中坦然不以物傷性將何適而非快欒城集方寸之地清之則為高明虛靜之府雜之則為塵垢滓穢之囊鷹之鷙不可以為慈化而為鳩則鷙性盡矣橘之甘不可以為苦變而為枳則甘味忘矣並鳴道集或問伊川氏量可學否曰可學進則識進識進則量進胡氏}
