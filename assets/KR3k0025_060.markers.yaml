  - {type: variant, offset: 2383, length: 186, content: 言六郎似蓮華非也正謂蓮華似六郎耳唐書楊再思傳唐明皇將幸東都而太廟屋壞姚崇曰此苻堅故殿也山有朽壤而崩木蠹而折理無足怪同上本傳太史令袁充表稱隋興以後晝日漸長景短日長振古希有是後百工作役並加程課日長故也通鑑互觀顏面多不盡公唐太宗太當博士蕭楚材等以為豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕唐高宗太子洗馬劉訥言嘗撰俳諧集以獻太子賢上謂侍臣曰朕嘗虛心求諫而竟無諫者, WYG: 掩鼻}
