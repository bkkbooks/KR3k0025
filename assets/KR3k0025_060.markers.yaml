  - {type: variant, offset: 197, length: 147, content: 性奢食必方丈旦輒為十人饌未嘗獨餐同上晉安帝紀何曾性奢豪每燕見不食太官所設食日萬錢猶曰無下筯處晉本傳何劭驕奢簡貴亦有父風食必盡四時之珍異一日之供以錢二萬為限晉本傳石崇以奢豪矜物廁上常有十餘婢侍列皆有容色置甲煎粉沈香汁有如廁者皆易新衣而出同上王敦傳劉寔嘗詣石崇家如廁見有絳紋帳裀褥甚麗兩婢持香囊寔便, WYG: 登乃}
