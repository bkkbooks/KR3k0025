  - {type: variant, offset: 187, length: 1, content: 室, WYG: 欲出戰怒皆十倍田單知士卒之可用與士卒分功因大敗燕史記田單相齊過淄水有老人涉淄而寒出水不能行單解其裘而衣之襄王怒之曰田單之施於人將欲以取我國乎不早誅恐後之變也有貫珠者曰王不如因以為己善嘉善之下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單憂之稱寡人之意王曰善乃賜單牛酒後數日貫珠者復見王曰王朝日冝召田單而揖扵廷口勞之乃布令求百姓之饑寒者收穀之乃使人聽扵閭里聞丈夫之相與語者曰田單之憂人嗟乃王之教也通鑑周紀魏與楚攻韓韓告急扵齊使田忌將而往直走大梁魏將龐涓聞之去韓而歸齊孫臏使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龐涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃與輕銳倍日併行逐入史記蘇秦說趙肅侯恐秦兵之至趙也乃激怒張儀入之於秦史蘇秦傳齊大夫使人刺蘇秦求賊不得秦且死謂王曰臣即死車裂臣以狥於市曰蘇秦為燕作亂扵齊如此則臣之賊必得矣如其言而殺蘇秦者果自出齊王因而誅之史本傳張良說漢王曰王何不燒絶所過棧道示天下無還心以固項王意乃使良燒絶棧道項羽以此無西憂漢乃發兵北撃齊史留侯世家張良遺項王書曰漢王失職欲得闗中如約即止不敢東又以齊梁反書遺項王曰齊欲與趙并滅楚項王以此故無西意而撃齊通鑑漢高紀韓信撃趙乃使萬人先行出背水陣趙兵望見大笑開壁撃之大戰信棄鼓旗走水上軍軍皆殊死戰不可敗破趙軍斬成安君西漢韓信傳陷之死地而後生投之亡地而後存同上亞父勸羽急攻滎陽漢王患之項王使至漢陳平使為太牢具舉進見楚使即佯驚曰吾以為亞夫使乃項王使復持去更以惡草具進楚使歸具以報項王項王果大疑亞父通鑑漢高紀楚軍食少項王患之乃為髙爼置太公其上告漢王曰今不為急下吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一杯羮同前朱虛侯章忿劉氏不得職常入侍太后燕飲令章為酒吏章自請曰臣將種也請得以軍法行酒諸吕有一人醉亡酒章追㧞劔斬之而還通鑑漢高后紀陳平使人刼酈商令其子寄往紿說吕禄曰今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也通鑑漢后紀王生在廷中謂張釋之曰吾襪解為我結韈釋之跪而受之或讓生生曰廷尉天下名臣吾聊使結韈欲以重之諸公聞之賢王生而重釋之西漢吳王詐病不朝賜以几杖張武受賂金錢更加賞賜以愧其心並前漢文帝賛龔遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治通鑑漢宣紀人棄我取人取我予西漢班固貨殖傳古人有言曰天下皆知取之為取而莫知與之為取東漢桓譚傳耿恭曰漢家神箭其中創者必有異敵中矢者視創皆沸大驚匈奴震怖相謂曰漢兵真可畏也通鑑漢明紀廣陵賊張嬰冦亂梁冀以張綱為廣陵太守前太守率多求兵馬綱獨請单車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱扵門外罷遣吏兵獨留所親十人以書諭嬰請與相見嬰見綱至誠乃出拜謁通鑑漢順紀虞詡為武都太守羌率衆數千遮詡扵陳倉崤谷詡令吏士各作兩竈日増倍之羌不敢逼後漢書曹操攻吕布軍敗布騎得操而不識問曰曹操何在操曰乗黄馬走者是也布騎乃釋操而追黄馬者操突出引還通鑑漢紀互入當面蹉過夫能屈以為伸讓以為徳弱以為强鮮不遂矣}
