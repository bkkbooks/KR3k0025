  - {type: variant, offset: 105, length: 0, content: '', WYG: 公甫文伯官於魯病死婦人為之自殺扵房中者二八其母聞之不肯哭也相室曰焉有子死而不哭者乎其母曰孔子賢人也逐扵魯是人不隨今死而婦人為死者十六人若是者其於長者薄而扵婦人厚故従母言之為賢母也従婦言之必不免為妬婦也故其言者異則人心變矣戰國䇿互入婦人識見道高益安勢高益危史日者傳詩曰無酒酤我而論語曰酤酒不食二者非相反也夫詩據承平之世酒酤在官和㫖便人可以相御也論語孔子當衰亂酒酤在民薄惡不誠是以疑而弗食前漢食貨志張釋之為廷尉天下無寃民于定國為廷尉民自以為不寃前漢姚宋二人毎進見上輙為之起去則為臨軒送之及李林甫為相雖寵任過扵姚宋然禮遇殊卑薄矣通鑑傳記忠扵治世易忠扵濁世難吕氏春秋互見事有難易集人固有一死死或重於㤗山或輕於毛羽司馬遷報任安書史臣責錯之父不逮趙括母何其鄙也夫趙括持必敗之勢而母言扵趙王不可使將及括失律母以先見獲宥晁錯用至忠之略與必敗之勢異也其父雖懼禍至柰其子所籌國之大事也且使括母言之是稱明婦人也使錯父言之是阻其子為忠也李元賔燕昭築金臺天下稱其賢殷紂作玉杯天下稱其惡盖為人與為己殊也周文之囿百里時患其尚小齊宣之囿四十里時病其太大盖同利與専利異也陸宣公本朝夜光之與蒸燭互照雖均質則異焉晏公類要以物與人物盡而止以法活人法行無窮東坡乞免五谷劄子南面之君雖清逺閒放如鶴者猶不得好好之則亡其國而山林遁世之士雖荒惑敗亂如酒者不能為害東坡鶴亭記古人謂鵰鶚百鳥望而畏之鸞鳯百鳥望而愛之其服則一其品相逺同上事各有體經見同等不起上客起禮曲禮下外事以剛日内事以柔日記曲禮下婦人不立乗同上國君下齊牛式宗廟大夫士下公門式路馬臨䘮則必有哀色執紼不笑臨樂不歎介胄則有不可犯之色帷薄之外不趨堂上不趨執玉不趨堂上接武堂下布武室中不翔主佩倚則臣佩垂主佩垂則臣佩委居䘮不言樂祭事不言凶公庭不言婦女曲禮下君扵士不答拜也非其臣則答拜之大夫扵其臣雖賤必答拜之大夫私行出疆必請反必有獻士私行出疆必請反必告在官言官在府言府在庫言庫在朝言朝言不及犬馬在朝言禮問天子之年對曰聞之始服衣若干尺矣問國君之年長曰能從宗廟社稷之事矣問大夫之子長曰能御矣問士之子長曰能典謁矣問庶人之子長曰能負薪矣問國君之富數地以對山澤之所出問大夫之富曰有宰食力祭器衣服不假問士之富以車數對問庶人之富數畜以對並同上死者北首生者南鄉禮運邇臣守和宰正百官大臣慮四方表記母親而不尊父尊而不親同上女子哭泣悲哀撃胷傷心男子哭泣悲哀稽顙觸地無容問䘮君子太牢而祭謂之禮匹士太牢而祭謂之攘禮器攘盜竊也士扵大夫不承賀下大夫扵上大夫承賀玉藻同姓従宗合族屬異姓主名治際㑹名著而男女有别異姓謂來嫁者也主於母與婦之名耳際㑹昏禮交接之㑹也著明也母婦之名不明則人倫亂也大傳樂者為同禮者為異同則相親異則相敬樂記武車不式介者不拜少儀賔客主恭祭祀主敬䘮事主哀㑹同主詡軍旅思險隠情以虞同上門内之治㤙揜義門外之治義揜恩聘義子父子主恩君臣主敬孟公孫丑上事生飾歡祭祀飾敬荀子不聰不明不能為王不瞽不聾不能為公慎子道猶金石一調不更事猶琴瑟每終改調淮南子家老異飯而食殊器而享子婦跣而上堂跪而斟羮非不費也然而不可省者為其害義也同上史雖有文母之徳必繋扵子東漢杜鄴傳夫委大臣以大體責小臣以小事為治之道也通鑑唐憲宗文舞用功成慶善之樂武舞用神功破陣之樂同上唐髙宗杜黄裳曰明主勞扵求賢而逸扵任人此虞舜所以能無為而治者也至於簿書獄訟煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳飱皆無補扵當時取譏扵後來其耳目形神非不勤且勞也所務非其道也唐憲宗並同上集家須男子繼國合大夫憂張承吉文集本朝元祐初起文潞公以平章軍國重事召程正叔為崇政殿說書正叔以師道自居每侍上講色甚莊繼以諷諫潞公時年九十對上恭甚進士唱名侍立終日或問正叔正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也聞見録操約馭詳經若網在綱有條而不紊書盤庚居敬行簡以臨其民語雍也故敬其父則子恱敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道也孝經統之有宗㑹之有元故繁而不亂衆而不惑易略例夫衆不能治衆治衆者至寡者也夫動不能制動制天下之動者貞夫一者也自統而尋之物雖衆則知可以執一御也由本以觀之義雖博則知可以一名舉也處璇璣以觀天運則天地之動未足怪也據㑹要以觀方來則六合輻輳未足多也少者多之所貴也寡者衆之所宗也約以存博簡以濟衆並同上子守約而施博者善道也孟子總天下之要治海内之衆若使一人故操彌約而事彌大五寸之矩盡天下之方故君子不下堂而海内之情舉積諸此者則操術然也荀不茍欲觀千歲則審今日欲知億萬則審一二故曰以近知逺以一知萬以㣲知明荀非相舉其綱則衆目張若挈裘領順者不可勝數並荀子事欲鮮者執柄持術得要以應衆執約以治廣處靜持中運於璇璣以一合萬若合符者也淮南子王術訓十圍之木持千鈞之屋五寸之鍵以制開闔豈其材之巨小足哉所居要也淮南子天下為大治之在道四海為逺治之在心揚孝至茍得其要則八極之外如在指掌百代之逺有若同時不必在乎庭宇之左右瞻視之所及然後知之也抱樸子對俗舉一綱衆目張文中子史石稱丈量徑而寡失西漢枚乗傳互見事有簡徑探端以知緒前漢善為政者綱舉而目踈晉書劉頌傳聖王不徧窺望而視已明不殫傾耳而聽已聰通鑑漢宣紀執要而委務扵下晉書集統扵一而應扵萬韓文聖人篤近而舉逺同上原人委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧指曰鋸彼執鋸者趨而左俄而斤者斷刀者削皆視其色俟其言莫敢自斲者其不勝任者怒而退之亦莫敢愠焉畫宫扵堵盈尺而曲盡其制計其毫釐而搆其大厦無進退焉既成書于上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而嘆曰彼將捨其手藝専其心智而能知體要者歟吾聞勞心者役人勞力者役扵人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圗而究焉猶梓人畫宫于堵而績于成也能者進而用之使無所徳不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英材討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣柳文梓人傳端本澄源經言出乎身加乎民行發乎邇見乎逺易繫辭爾身克正罔敢不正民心罔中惟爾之中書君牙刑于寡妻至于兄弟以御于家邦詩思齊爾之逺矣民胥然矣爾之教矣民胥傚矣角弓民以君為心君以民為體心莊則體舒心肅則容敬記緇衣政者正也君為政則百姓従政矣君之所為百姓之所従也哀公問古之欲明明徳扵天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意大學自天子以至扵庻人壹是皆以修身為本其本亂而末治者否矣大學並記政者正也子帥以正孰敢不正語顔淵季康子患盜問扵孔子孔子對曰茍子之不欲雖賞之不竊季康子問政扵孔子孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之德草草上之風必偃並顔淵其身正不令而行其身不正雖令不従子路茍正其身矣扵從政乎何有不能正其身如正人何同上並語子天下之本在國國之本在家家之本在身孟離婁上其身正而天下歸之同上君子之守修其身而天下平盡心下身不行道不行扵妻子使人不以道不能行扵妻子同上並孟我無為而民自化我無事而民自富我好靜而民自正我無欲而民自樸老子聞修身未聞修國也君者儀也儀正則景正君者槃也槃圓而水圎君者盂也盂方而水方荀君道君子者治之源也君子養源源清則流清源濁則流濁同上上者下之本也上宣明則下治辯矣上端誠則下愿慤矣上公正則下易直矣荀子正論史法令者治之具而非制治清濁之源也史酷吏傳序罔宻而姦不塞刑煩而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也冝思所以清源正本之論前漢刑法志管子曰先王端本肇末國語齊春秋謂一為元者示大始而欲正本也為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方前董仲舒傳易曰正其本萬物理同上杜欽傳失之末流求之本源後漢陳忠傳表曲者影必邪源清者流必潔猶扣木本百枝皆動也同上李固傳本立道生風行草従澄其源者流清溷其本者末濁同上郎顗傳治水不自其源末流彌増其廣矣通鑑漢盧植志正則衆邪不生心靜則衆事不躁思慮審定則教令不煩三國志萬目不張舉其綱衆毛不整齊其領通鑑魏明紀荀勉曰省吏不如省官省官不如省事省事不如清心同上晉武紀潔其流者清其源理其末者正其本北史袁翻傳禍之所來皆生扵利茍不求利禍従何生通鑑梁高祖上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎同上唐太宗夫家給人足而無瑞不害為堯舜百姓怨愁而多瑞不害為桀紂同上上謂魏徴曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣同上求木之長者必固其根本欲流之逺者必浚其泉源舊唐書魏徴傳陸象先嘗謂人曰天下本無事但庸人擾之爾茍清其源何憂不治通鑑天下本無事庸人擾之煩耳第澄其源何憂不簡邪唐陸象先傳上嘗問裴垍為理之要何先對曰先正其心通鑑唐憲宗集爾形信直影亦不曲爾聲信清響亦不濁晉裴頠女史箴互入影響相應養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄韓文答李翊書澄其源而流其清韓文本朝莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而専言仁義之說仁義之說勝則楊墨之學廢漢之時百家並興董生患之而退修孔子之道孔氏之道明則百家自息此所謂修其本以勝之之效也歐文本論隂驅黙化經小人革面順以従君也易四方風動書大禹謨爾惟風下民惟草君陳爾身克正罔敢弗正同上翩彼飛鴞集於泮林食我桑椹懷我好音詩泮水子曰長民者衣服不貳從容有常以濟其民則民徳一記緇衣爾之教矣民胥效矣角弓君子不賞而民勸不怒而民威扵鈇鉞中庸徳煇動乎内而民莫不承聽理發乎外而衆莫不承順祭義好賢如緇衣惡惡如巷伯則爵不凟而民作愿刑不試而民咸服記上好仁則下之為仁争先人同上君子有徽猷小人與屬詩角弓一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此大學君子篤扵親則民興扵仁故舊不遺則民不偷語泰伯動容貎斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣同上茍子之不欲雖賞之不竊顔淵子欲善而民善矣君子之德風小人之徳草草上之風必偃同上其身正不令而行子路天何言哉四時行焉百物生焉陽貨並語君子之教以孝也非家至而日見之也孝經子文武興則民好善孟告子上孔子為中都宰路不拾遺器不彫偽家語有大人者正已而物正者也孟盡心上孔子為政魯沈猶氏不敢朝飲其羊公慎氏出其妻淫不制慎潰氏越境而走奢}
