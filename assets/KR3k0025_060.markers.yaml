  - {type: variant, offset: 183, length: 2, content: 孽火, WYG: 數夜開城門勞擾百姓或引弓彈人或埋人雪中以戲笑上致書切讓之不致扵法書下上考以愧其心元嬰與蔣王惲皆好聚斂上嘗賜諸王帛各五百段獨不及二王勅曰滕叔蔣兄自能經紀不須賜物給麻兩車以為錢貫二王大慚通鑑唐紀何易于為益昌令大守崔樸遊宴江上索民挽舟易于腰笏挽焉太守問狀對曰民方耕桑不可役縣令閒暇當任其勞樸慚乃罷唐書李林甫居相位諫官無敢言者杜璡以上書言事斥林甫乃因以語動其餘曰君等獨不見立仗馬乎終日無聲飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎唐書李林甫傳傳記燕昭王遣使齎千金市千里之馬未至而馬死使者買死馬之骨以歸王大怒使者曰死者尚市之况生者乎天下必知君之好也馬將至矣扵是期年而千里馬至者三焉戰國䇿魏文侯令樂羊將而攻中山三年而㧞之樂羊反論功文侯示之謗書一篋春秋後語互入毁謗及不信䜛武王伐紂過壑斬柵過水折舟過谷發梁過山焚萊示民無返志說苑楚莊王好獵夫人樊姫數諫不止乃不食禽獸之肉二年王感之而勤扵政事古列傳齊桓公好滛樂衛姬為不聽鄭衛之聲同上舜捐珠玉扵五湖之淵杜滛邪絶覬媚之情也陸賈新語晏平仲以齊君奢故澣其朝冠振其鹿裘風俗通集田子方出見老馬扵道問焉其御曰故公家畜也罷而不用出而放之子方曰少盡其力老棄其身仁者不為也以束帛贖之窮士聞之知所歸心矣臣注文選本朝仁宗三司使請𣙜河北鹽仁宗批奏牘後不許時賈昌朝守北都至即刻石扵府園癭本亭上及賈公再守魏而提刑薛向宻奏行榷法託以他事入議賈公具知其計及其還置酒邀之中食引至癭本亭相對酒五行無他語向顧見刻石知事已露遂不復議榷事龍川志反鋒而用子將欲噏之必固張之將欲取之必固與之老子夫狐之搏雉也卑體弭耳以待其來也雉見而信之故可得而禽也使狐嗔目見其必殺之勢雉亦知憚逺飛以避其怒矣淮南子史鷙鳥之撃必匿其形史越世家美城之大名也子孫不忘吾助子請乃為之請扵諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪左僖楚子元伐鄭懸門不發楚言而出子元曰鄭有人焉楚師夜遁左莊二十八楚子享公好以大屈弓名既而悔之薳啟彊聞之見公公語之拜賀公曰何賀曰齊與晉君欲此久矣寡君無適與也而傳諸君其備禦三鄰慎守寳矣公懼乃反之左智伯請地於韓康子段規曰周書曰將欲敗之必姑輔之將欲取之必姑與之王不如與之以驕智伯然後可以擇交而圖智氏矣通鑑周紀楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有說乎髠曰今日臣従東方來見道旁有穰田者操一豚蹄酒一盂祝曰甌寠滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之扵是齊威王乃益齎黄金千鎰白璧十雙車馬百駟髠辭而行史記滑稽傳楚優孟嘗以談笑風諫楚莊王有愛馬死使羣臣䘮之欲以棺槨大夫禮𦵏之左右争之不可孟入殿門仰天大笑曰楚國堂堂何求不得而以大夫禮𦵏之薄請以人君禮𦵏之王曰何如曰臣請以雕玉為棺文梓為槨梗楓豫章為題湊發甲卒為穿壙老弱負土齊趙陪位扵前韓魏翼衛其後廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎乃使以馬屬太官無令天下久聞也史滑稽傳燕將騎刼攻齊即墨齊將田單拒守乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中見齊降者盡劓皆怒堅守唯恐見得田單又縦反間曰吾懼燕人掘吾城外冡墓戮先人可為寒心燕軍盡掘壟墓}
