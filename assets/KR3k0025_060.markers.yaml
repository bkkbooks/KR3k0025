markers:
  front:
  - {type: variant, offset: 0, length: 2, content: 奢侈, WYG: 欽定四庫全書記纂淵海卷六十宋潘自牧撰論議部事必有極四世而緦服之窮也五世祖免殺同姓也六世親屬竭矣記大傳子君子之澤五世而斬小人之澤五世而斬孟子史一體炫金不及百兩一歳美衣不過數襲通鑑宋太祖傳記烏獲舉千鈞之重行年八十而求扶持戰國䇿騏驥盛壯之時一日而馳千里至其衰也駑馬先之同上集延年不死壽何所止楚詞金石終銷毁謝恵連秋懷詩物壯誠有衰勢雄良易極陳子昂集盛色無千年李白鷦鷯巢林不過一枝鼯䑕飲河不過滿腹蔡邕表事同體異}
