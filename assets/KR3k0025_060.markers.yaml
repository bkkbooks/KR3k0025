  - {type: variant, offset: 110, length: 1, content: 斃, krp: 白玉雖塵垢拂拭還光輝韋應物集沉璜瘞珮兮孰幽而不光荃蕙蔽匿兮胡久而不芳柳弔屈原文天下英雄氣千秋尚凜然劉賔客珠非塵可昏同上把梓植扵深林人雖不知不妨其為天下之材也歐陽詹文劔雖埋而氣在白樂天不有百鍊火孰知寸金精孟東野鏡破不改光蘭死不改香同上擣麝成塵香不㓕抛蓮作寸絲難絶杜牧之照乗之珍難晦符彩唐文粹譬諸日月雖終古常見而光景常新此所以為靈物也同上日月晦而更明隨和幽而不昧夫豫章珠璣鏌鎁毛嬙終不慮隠之櫝之橈之椎之之為患而擁腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳同上君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工鍜鍊凡幾年鑄作寳劍名龍泉何言中路遭棄捐零落飄淪古獄邊雖復埋沉無所用猶能夜夜氣衝天郭元振寳劔歌本朝譬如埋金玉不耗精與英歐公集三光萬古不磨滅同上孔孟困一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難同上斯文金玉也棄擲埋没糞土不能消蝕其見遺于一時必有收而寳之于後世者雖其埋没而未出其精氣光怪已能常自發見而物亦不能掩也故方其擯斥摧挫流離窮厄之時文章已自行于天下雖其怨家讐人及嘗能出力而擠之死至其文章則不能少毁而揜蔽之也歐公蘇氏文集序金百鍊以為鑑而萬物不能遁其形及為物蝕而蔽其光頑然無異乎瓦甓然而一遇良工加之藥磨而瑩之則可以見肝膽而數毛髪盖其可昏者光不可昏者性歐公祭劉給事文軒昂磊落突兀峥嶸而埋藏扵地下者意其不化為朽壤而為金玉之精不然生長松之千尺産靈芝而九莖歐公祭石曼卿文故曰久而無弊者道隱而終顯者誠歐公漢郎中干君碑又知物貴久至寳見百鍊歐公集黑月在濁水何嘗不清眀東坡詩骨可朽爛心難窮同上百鍊竟不變欒城集靈珠在泥沙光景不可昏臨川集刼火洞然不燼惟玉楊中立弔劉安世文金百死而不化陳瓘文經百煉而火自銷金不亡是真金也鳴道安正忘筌集師篇假不可掩子强哭者雖疾不哀强歡者雖笑不樂淮南子羊質而虎皮見草而說見豺而戰忘其皮之虎也揚子史陸展染白髮欲以媚側室涅緇不解久星星行復出南史謝靈運傳傳記楊炯常呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳朝野僉載集草螢有耀終非火荷露雖圎豈是珠白樂天黔無驢有好事者船載以入至則無可用放之山下虎見之龐然大物也以為神蔽林間窺之稍出近之愸愸然莫相知他日驢一鳴虎大駭退遁以為且噬已也甚恐然往來視之竟無異能者益習其聲又出近前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大闞斷其喉盡其肉而去柳文本朝如翦綵為花花則無不似只是無他造化不可及處明道二程語録識真者罕子大聲不入扵里耳折楊黄華則嗑然而笑莊子史直道而行多讐少與西漢盖寛饒傳傳記客有歌扵郢中者其始曰下里巴人國中屬而和者數千人其為陽陵採薇國中屬而和者數百人其為陽春白雪國中屬而和者不過數人是其曲彌髙者其和彌寡劉向新序集誰憐松桂性競愛桃李隂韓集齎財入市賣貴者怕難售同上世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱扵奴𨽻之手駢死扵槽櫪之間不以千里稱也同上本朝時無鍾期誰識高山之意人非季札豈知治世之音歐公謝泗倅向都官示詩啟折楊黄華笑者多陽春白雪和者少知音四海無幾人况乃區區郢中小臨川集才大占難用論高常近迂坡詩先於自治經夙夜强學以待問懷忠信以待舉力行以待取記儒行欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意大學冝其家人而後可以教國人同上恭近扵禮逺恥辱也語學而君子所貴乎道者三動容貎斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣泰伯工欲善其事必先利其器衛靈公子先立乎其大者則其小者弗能奪也孟告子下大人者正已而物正者也孟子周于利者凶年不能殺周于徳者邪世不能亂同上寄汲莫若鑿井淮南子臨河欲魚不如退而織網文子人必其自愛也然後人愛諸人必其自敬也然後人敬諸揚吾子大器者其猶規矩凖繩乎先自治而後治人揚先知史臧武仲曰在上位者洒濯其心壹以待人軌度其信而後可以治人}
