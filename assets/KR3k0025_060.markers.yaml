  - {type: variant, offset: 178, length: 0, content: '', WYG: 所憎誰甚曰雍齒良曰今先封齒以示羣臣羣臣皆喜西漢張良傳漢高祖怨其嫂之轑釡乃封其子為羮頡侯楚元王傳互入報怨朱虛侯章曰深耕穊種立苗欲䟽非其種者鋤而去之通鑑漢髙后其得漢繒絮以馳草棘中衣袴皆裂弊以示}
  - {type: variant, offset: 178, length: 0, content: '', krp: 所憎誰甚曰雍齒良曰今先封齒以示羣臣羣臣皆喜西漢張良傳漢高祖怨其嫂之轑釡乃封其子為羮頡侯楚元王傳互入報怨朱虛侯章曰深耕穊種立苗欲䟽非其種者鋤而去之通鑑漢髙后其得漢繒絮以馳草棘中衣袴皆裂弊以示}
  - {type: variant, offset: 179, length: 0, content: '', WYG: 如旃裘之完善也得漢食物皆去之以示不如湩酪之便美也通鑑漢高后帝居禁中召周亞夫賜食獨置大胾無切肉又不置箸亞夫心不平顧尚席取箸上視而笑曰此非不足君所乎通鑑漢景紀萬石君子孫有過不誚讓為便坐對案不食諸子相責因長老肉袒固謝罪改之西漢本傳互入隂驅黙化又入教子薄昭殺漢使者帝不忍加誅使公卿羣臣従之飲酒欲令自引分昭不肯使羣臣䘮服往哭之乃自殺通鑑漢文紀匈奴徙蘇武北海上無人處使牧羝曰羝乳乃得歸通鑑漢武紀詔求㣲時故劔大臣知指白立許偼伃為皇后通鑑漢宣紀韋賢薨長子松有罪繋獄家人矯賢令次子大河都尉𤣥成為後𤣥成深知其非雅意即陽為病狂卧便利妄笑語昏亂既塟當襲爵以狂不應召同前嚴君平卜筮扵成都市以為卜筮者賤業而可以恵衆人有邪惡非正之問依蓍龜為言利書害與人子言依扵孝與人弟言依扵順與人臣言依扵忠各因勢導之以善西漢上欲封諸舅太后不聽但笑言太后素好}
