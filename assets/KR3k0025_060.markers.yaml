  - {type: variant, offset: 181, length: 0, content: '', WYG: 車先問大姓主名吏數閭里豪强以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣莱傭乎扵是部吏望風㫖争以激切為事貴戚跼蹐京師肅清同上龐參為漢陽太守郡人任棠有竒節隠居參候之棠}
  - {type: variant, offset: 181, length: 0, content: '', krp: 車先問大姓主名吏數閭里豪强以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣莱傭乎扵是部吏望風㫖争以激切為事貴戚跼蹐京師肅清同上龐參為漢陽太守郡人任棠有竒節隠居參候之棠}
  - {type: variant, offset: 182, length: 0, content: '', WYG: 與言但以薤一大本水一盂置户屛前自抱孫兒伏扵户下主簿白以為倨參思之曰水者白欲吾清也㧞大本者欲吾擊强宗也抱兒當户欲吾開門恤孤也後漢繆彤兄弟四人皆同財業及各娶妻諸婦遂求分異又數鬬争彤乃掩户自撾曰繆彤不能正家弟及諸婦聞之皆叩頭謝罪漢書皇天不言以文象設教後漢裴楷傳魏于禁降關公㑹吳孫權禽公禁在吳吳稱藩遣禁還拜為安逺將軍欲遣使吳先令北詣鄴謁高陵帝使豫扵陵屋畫關公戰克龎徳憤怒禁降伏之狀禁見慚恚發病薨魏志張郃傳范粲陽狂不言子孫常侍左右至有婚冠大事輒宻諮焉合者則色無變不合則眠寢不安妻子以此知其㫖不言三十六載晉書吐谷渾王阿柴疾召諸子二十人各獻一箭取一箭與其弟折之又取二十箭共一束與其弟折之不能折阿柴曰汝知之乎孤則易折離則易摧汝曹戮力一心然後可以保國寧家通鑑晉紀互入衆力易成顔延之作五君詠以述竹林七賢山濤王戎以貴顯被黜宋書王儉作長梁齋制度小過王僧䖍視之不悅竟不入户儉即日毁之通鑑齊太祖互入人心易感金州刺史滕王元嬰驕奢縦逸居亮隂中畋遊無}
