  - {type: variant, offset: 109, length: 0, content: '', krp: 時韓文柳州羅池廟碑䑕無夜動梟變好音柳文本朝渡海鯨波息登山豹霧消楊文公集凛凛乎其若處女之在閨也兢兢乎其若懷千金之璧而行也夫是以不仁者不敢至其墻不義者不敢過其門東坡宻翊謝上表環堵蕭然而妻子奴婢皆有自得之色東坡方山子傳退居扵洛往來陜郊陜洛間皆化其徳尊其學法其儉有不善曰君實得無知之乎東坡司馬行狀使人之意消不善無由萌東坡詩以衛武之年踐吕尚之位安然無作則功名自隆黙然無言則卿尹自化當以至靜之徳坐鎮羣動之樞蘇子由文彦博乞致仕不允批答互見老成兼收並蓄經翕受敷施書臯陶謨子山不辭土石故能成其大管子工之制木也大者以為舟航柱梁小者以為檝楔脩者以為榱櫚短者以為侏儒枅櫨無大小脩短皆得其所宜同上互見随材器使以天下為之籠則雀無所逃莊子庚桑楚良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之樸森然陳扵目前大厦之器具矣孫子張天下以為籠因江海以為罟又何亡魚失鳥之有乎淮南子史雖有絲麻無棄菅蒯雖有姜姬無棄蕉萃左成九年匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄通鑑周紀狗盜雞鳴孟嘗列此二人扵賓客賓客盡羞及有秦難卒此二人㧞之史孟嘗君傳互見因事見人太山不遜土壤故能成其大河海不擇細流故能就其深史李斯傳譬諸材木洪纎曲直各有所施晉書阮咸傳陶侃為征西大將軍荆州刺史時造船木屑及竹頭悉令舉掌之咸不解後正㑹積雪始晴㕔事餘雪猶濕以屑布地及桓温伐蜀以侃所貯竹頭作釘裝船其綜理㣲宻皆此類也晉書互入㣲有小補若榱椽梁柱以成大室戴負偃植各安所施而無遺材唐劉𢎞基賛互入隨材器使元行沖謂狄仁傑曰凡為家者必有儲蓄脯醢以適口参术以攻疾竊計明公之門珍味多矣請備藥物之末仁傑曰君正吾藥籠中之物何可一日無也通鑑唐紀互見自薦集頓彌天之網收萬仭之魚量之以谿谷數之以陔兆何其壮乎應璩報季然書葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必達陸宣公文水之細者河海假其深材之短者棟梁資其峻唐文粹互見細㣲有補夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其冝以成屋室者匠氏之功也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也登眀選公雜進巧拙紆餘為姸卓犖為傑較短量長惟器是適者宰相之方也韓文進學解互入隨材器使丞相方築太平之基架羣材立清廟陸魯望占小善者率以録名一藝者無不庸韓文大匠無棄材尋尺各有施况當營都邑把梓用不疑韓集互見隨材器使㑹結彌天網盡取一無遺元稹集尺寸之材無所棄元㣲之集銖銅寸鐵罔有孑遺白樂天集曲輪直桷各適於用皇甫湜常思掄羣才以為國家治譬如匠見木礙眼皆不棄楣橛與棟梁施之皆有位忽然豎眀堂一揮立能致杜牧之集若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名而得美任則自堯以降聖人率多子弟杜牧之集本朝古者至治之世自瞽矇昏瞶侏儒籧篨戚施之人上所以使者皆各盡其材臨川集㧞十覬五人之用累百求一鶚之精欒城詩吾聞調羮鼎異味及粉槿豈其供王羞而棄㑹稽筍山谷詩貞不可㓕經不曰堅乎磨而不磷不曰白乎涅而不緇語陽貨子有人扵此藏十鎰之金雖行貨而食人謂之富矣荀子互見不受麄鍾山之玉炊以爐炭三日三夜其色不變淮南子琬琰之玉在汙泥之中雖亷者不釋也美之所在雖汙辱世不能賤同上荆山之玉潛光荆石之中雖有千仭之土不能掩其光抱樸子丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛劉子史如日月之食焉何損扵明左宣十二年自漢鑄五銖至宋文帝歴五百餘年制度世有廢興而不變五銖者明其輕重可法得貨之冝故也通鑑齊太祖白玉投泥豈能相汙北史穆弼傳崔沔舉賢良高第不中者痛訾之武后勅有司覆試沔對益工遂為第一唐書干將雖折不改其光舊唐書楊於陵傳記周有砥石宋有結緑梁有縣黎楚有和璞此四寳者工之所失也而為天下名器戰國䇿石可破也而不可奪其堅吕氏春秋良珠度寸雖有百仭之水不能掩其輝韓詩外傳夫良玉徑尺雖千仭之土不能掩其光明珠度寸雖有函丈之石不能戢其曜虞􅀈佑高士傳集毛嬙西施善毁者不能蔽其好選四子講徳論薰臭猶芳選連珠珠碎無土色玉墜無瓦聲劍折有寸利鏡破有片明元稹集持謝衆人口銷盡猶是金同上神劔土不蝕異布火不燋元㣲之集金可鎔不可使為汙腐水可濁不可使為塵糞元次山互見有定}
  - {type: variant, offset: 110, length: 1, content: 斃, WYG: 白玉雖塵垢拂拭還光輝韋應物集沉璜瘞珮兮孰幽而不光荃蕙蔽匿兮胡久而不芳柳弔屈原文天下英雄氣千秋尚凜然劉賔客珠非塵可昏同上把梓植扵深林人雖不知不妨其為天下之材也歐陽詹文劔雖埋而氣在白樂天不有百鍊火孰知寸金精孟東野鏡破不改光蘭死不改香同上擣麝成塵香不㓕抛蓮作寸絲難絶杜牧之照乗之珍難晦符彩唐文粹譬諸日月雖終古常見而光景常新此所以為靈物也同上日月晦而更明隨和幽而不昧夫豫章珠璣鏌鎁毛嬙終不慮隠之櫝之橈之椎之之為患而擁腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳同上君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工鍜鍊凡幾年鑄作寳劍名龍泉何言中路遭棄捐零落飄淪古獄邊雖復埋沉無所用猶能夜夜氣衝天郭元振寳劔歌本朝譬如埋金玉不耗精與英歐公集三光萬古不磨滅同上孔孟困一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難同上斯文金玉也棄擲埋没糞土不能消蝕其見遺于一時必有收而寳之于後世者雖其埋没而未出其精氣光怪已能常自發見而物亦不能掩也故方其擯斥摧挫流離窮厄之時文章已自行于天下雖其怨家讐人及嘗能出力而擠之死至其文章則不能少毁而揜蔽之也歐公蘇氏文集序金百鍊以為鑑而萬物不能遁其形及為物蝕而蔽其光頑然無異乎瓦甓然而一遇良工加之藥磨而瑩之則可以見肝膽而數毛髪盖其可昏者光不可昏者性歐公祭劉給事文軒昂磊落突兀峥嶸而埋藏扵地下者意其不化為朽壤而為金玉之精不然生長松之千尺産靈芝而九莖歐公祭石曼卿文故曰久而無弊者道隱而終顯者誠歐公漢郎中干君碑又知物貴久至寳見百鍊歐公集黑月在濁水何嘗不清眀東坡詩骨可朽爛心難窮同上百鍊竟不變欒城集靈珠在泥沙光景不可昏臨川集刼火洞然不燼惟玉楊中立弔劉安世文金百死而不化陳瓘文經百煉而火自銷金不亡是真金也鳴道安正忘筌集師篇假不可掩子强哭者雖疾不哀强歡者雖笑不樂淮南子羊質而虎皮見草而說見豺而戰忘其皮之虎也揚子史陸展染白髮欲以媚側室􅄺緇不解久星星行復出南史謝靈運傳傳記楊炯常呼朝士為麒麟楦或問之曰今假弄麒麟者修飾其形覆之驢上宛然異物及去其皮還是驢耳朝野僉載集草螢有耀終非火荷露雖圎豈是珠白樂天黔無驢有好事者船載以入至則無可用放之山下虎見之龐然大物也以為神蔽林間窺之稍出近之愸愸然莫相知他日驢一鳴虎大駭退遁以為且噬已也甚恐然往來視之竟無異能者益習其聲又出近前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大闞斷其喉盡其肉而去柳文本朝如翦綵為花花則無不似只是無他造化不可及處明道二程語録識真者罕子大聲不入扵里耳折楊黄華則嗑然而笑莊子史直道而行多讐少與西漢盖寛饒傳傳記客有歌扵郢中者其始曰下里巴人國中屬而和者數千人其為陽陵採薇國中屬而和者數百人其為陽春白雪國中屬而和者不過數人是其曲彌髙者其和彌寡劉向新序集誰憐松桂性競愛桃李隂韓集齎財入市賣貴者怕難售同上世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱扵奴𨽻之手駢死扵槽櫪之間不以千里稱也同上本朝時無鍾期誰識高山之意人非季札豈知治世之音歐公謝泗倅向都官示詩啟折楊黄華笑者多陽春白雪和者少知音四海無幾人况乃區區郢中小臨川集才大占難用論高常近迂坡詩先於自治經夙夜强學以待問懷忠信以待舉力行以待取記儒行欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意大學冝其家人而後可以教國人同上恭近扵禮逺恥辱也語學而君子所貴乎道者三動容貎斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣泰伯工欲善其事必先利其器衛靈公子先立乎其大者則其小者弗能奪也孟告子下大人者正已而物正者也孟子周于利者凶年不能殺周于徳者邪世不能亂同上寄汲莫若鑿井淮南子臨河欲魚不如退而織網文子人必其自愛也然後人愛諸人必其自敬也然後人敬諸揚吾子大器者其猶規矩凖繩乎先自治而後治人揚先知史臧武仲曰在上位者洒濯其心壹以待人軌度其信而後可以治人}
