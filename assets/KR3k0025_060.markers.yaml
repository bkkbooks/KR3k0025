  - {type: variant, offset: 107, length: 0, content: '', krp: 中軍晉國之盜逃奔扵秦左孔父正色而立扵朝則人莫敢過而致難扵君者公羊傳孔子行乎季孫三月不違曰家不藏甲邑無百雉之城扵是叔敖帥師堕郈季孫仲孫帥師堕費同上舜耕歴山歴山之人皆讓畔漁雷澤雷澤之人皆讓居史記五帝紀西伯行善虞芮之人有獄不能决如周入界耕者讓畔民俗皆讓長虞芮之人未見西伯皆慚相謂曰吾所争周人所恥何往為祗取辱耳遂還俱讓而去史周紀孔子與聞國政三月粥羔豚者弗飾價男女行者别扵塗塗不拾遺四方之客至乎邑者不求有司史孔子世家儉節仁義之人立扵朝則荒肆之樂輟矣諫說論理之臣間扵側則流漫之志詘矣烈士死節之行顯扵世則淫康之虞廢矣史李斯傳萬石君子孫有過不誚讓為便坐對案不食諸子相責因長跪肉袒固謝罪改之前漢同上互入示人以意吳王詐病不朝賜以几杖張武等受賂金錢覺更加賞賜以愧其心通鑑漢文紀上設禮義㢘恥以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也前漢賈誼傳韓延壽守馮翊民有昆弟訟田延壽閉閣思過扵是訟者宗族相責此兩昆弟深自愧皆自髠肉袒謝願以田相移終死不敢争後民莫敢以辭訟自言者前漢同上互見政事山有猛獸藜藿為之不採國有忠臣奸邪為之不起前漢盖寛饒傳宋均為九江太守虎相與東渡江後漢同上孟嘗遷合浦太守去珠復還同上王烈所居市無二價東漢前在江陵反風㓕火後守𢎞農虎北渡河劉昆傳諸有争訟曲直將質之扵王烈或至塗而反或望廬而還黄憲言論風㫖無所傳聞然士君子見之靡不服深逺去鄙吝同上譬如靈蓍在林林無毒草威鳯在野野集仁禽許邵傳舜歌南風不下堂而天下治步隲傳涉其門者貪夫反㢘懦夫立志晉羊祜傳天下改目暴貪斂手北史李彪傳徐有功為蒲州司法以寛為治不施敲扑吏相約有犯徐司法杖者衆共斥之迨官滿不杖一人職事亦修通鑑唐武后陸贄秉筆内翰􅘀狡向風懦夫増氣唐書同上汲黯在朝淮南寢謀干木處魏諸侯息兵一士止百萬之師一賢制千里之難裴度傳楊綰始輔政中丞崔寛本豪俊城南别墅池觀堂阜為當時第一即日遣人毁之京兆尹黎幹出入従騶百數省損纔留十餘騎郭子儀邠州行營方大㑹除書至音樂散五之四他聞風靡然自化者不可勝紀同上賛綰以徳服人而人自化同上毛玠以清徳為魏尚書而人不敢鮮衣美食李程傳魯秉周禮齊不加兵于休烈傳陽公在朝四方聞風貪冒茍進邪薄之夫沮其志雖㣲師尹之位而人實瞻望焉同上至潮與鱷魚約數日水涸西徙潮無鱷魚患韓愈楚有昭王井傳言汲者死行人雖渇困不敢視韓朝宗移書諭神自是亡恙唐書冀缺以禮遜升而晉人知禮文翁以經術教而蜀士多儒唐薛登傳可使繁暑坐變清凉五代史郭崇韜傳傳記陳寔在鄉閭平心率物有盜夜入其室止扵梁上寔命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是也盜驚自投地寔徐譬之曰視君狀貎不似惡人冝深克己反善然當由貧今遺絹二疋自是一縣無復盜竊東觀漢紀程普頗以年長侮周瑜瑜折節下之不與計普後自敬而親重之告人曰吾與周公瑾交若飲醇醪不覺自醉江表傳宓子賤為單父宰鳴琴不下堂而單父自治吕氏春秋子産相鄭桃李之垂扵街者莫之援也同上楚昭王與吳人戰楚軍敗走履决背而行三十步復取之左右問曰王何惜一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與偕反也自是之後楚國之俗無相棄者賈誼新書人問郭文曰虎狼害人先生獨不畏乎文曰人無害獸心獸亦不害人耳髙士傳孔子居相位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起鹽鐵論集不言之化若門到户說矣齊竟陵王行狀鄰國有媮衣食帶刀劍椎埋胠篋之類鬬雞走狗之豪莫不靡下風馴雅素陳子昂集懷梟䲭以好音消祲沴為和氣陸宣公文魯有泮林鳥革其音劉賓客集自従郤縠為元帥大將歸來盡把書同上鸞鳯一鳴蜩螗革音同上始知聽韶濩可使心和平白侍郎令修扵庭户數月之間而人自得扵湖山千里之外唐文粹記陽城居扵晉之鄙晉之鄙人薫其徳而善良者幾千人韓文諌臣論柳侯為州不鄙夷其民動以禮法三年民各自矜奮曰兹土雖逺京師吾等亦天民今天幸恵仁侯若不化服我則非人扵是老少相教語莫違侯令凡有所為扵其鄉閭及扵其家皆曰吾侯聞之得無不可扵意否莫不忖度而後従事凡令之期民勸趨之無有後先必}
  - {type: variant, offset: 109, length: 0, content: '', WYG: 時韓文柳州羅池廟碑䑕無夜動梟變好音柳文本朝渡海鯨波息登山豹霧消楊文公集凛凛乎其若處女之在閨也兢兢乎其若懷千金之璧而行也夫是以不仁者不敢至其墻不義者不敢過其門東坡宻翊謝上表環堵蕭然而妻子奴婢皆有自得之色東坡方山子傳退居扵洛往來陜郊陜洛間皆化其徳尊其學法其儉有不善曰君實得無知之乎東坡司馬行狀使人之意消不善無由萌東坡詩以衛武之年踐吕尚之位安然無作則功名自隆黙然無言則卿尹自化當以至靜之徳坐鎮羣動之樞蘇子由文彦博乞致仕不允批答互見老成兼收並蓄經翕受敷施書臯陶謨子山不辭土石故能成其大管子工之制木也大者以為舟航柱梁小者以為檝楔脩者以為榱櫚短者以為侏儒枅櫨無大小脩短皆得其所宜同上互見随材器使以天下為之籠則雀無所逃莊子庚桑楚良匠提斤斧造山林棟梁阿衡之材櫨柱楣椽之樸森然陳扵目前大厦之器具矣孫子張天下以為籠因江海以為罟又何亡魚失鳥之有乎淮南子史雖有絲麻無棄菅蒯雖有姜姬無棄蕉萃左成九年匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄通鑑周紀狗盜雞鳴孟嘗列此二人扵賓客賓客盡羞及有秦難卒此二人㧞之史孟嘗君傳互見因事見人太山不遜土壤故能成其大河海不擇細流故能就其深史李斯傳譬諸材木洪纎曲直各有所施晉書阮咸傳陶侃為征西大將軍荆州刺史時造船木屑及竹頭悉令舉掌之咸不解後正㑹積雪始晴㕔事餘雪猶濕以屑布地及桓温伐蜀以侃所貯竹頭作釘裝船其綜理㣲宻皆此類也晉書互入㣲有小補若榱椽梁柱以成大室戴負偃植各安所施而無遺材唐劉𢎞基賛互入隨材器使元行沖謂狄仁傑曰凡為家者必有儲蓄脯醢以適口参术以攻疾竊計明公之門珍味多矣請備藥物之末仁傑曰君正吾藥籠中之物何可一日無也通鑑唐紀互見自薦集頓彌天之網收萬仭之魚量之以谿谷數之以陔兆何其壮乎應璩報季然書葑菲不以下體而不採故英華靡遺芻蕘不以賤品而不詢故幽隱必達陸宣公文水之細者河海假其深材之短者棟梁資其峻唐文粹互見細㣲有補夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其冝以成屋室者匠氏之功也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也登眀選公雜進巧拙紆餘為姸卓犖為傑較短量長惟器是適者宰相之方也韓文進學解互入隨材器使丞相方築太平之基架羣材立清廟陸魯望占小善者率以録名一藝者無不庸韓文大匠無棄材尋尺各有施况當營都邑把梓用不疑韓集互見隨材器使㑹結彌天網盡取一無遺元稹集尺寸之材無所棄元㣲之集銖銅寸鐵罔有孑遺白樂天集曲輪直桷各適於用皇甫湜常思掄羣才以為國家治譬如匠見木礙眼皆不棄楣橛與棟梁施之皆有位忽然豎眀堂一揮立能致杜牧之集若以科第之徒浮華輕薄不可任以為治則國朝自房杜以降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名而得美任則自堯以降聖人率多子弟杜牧之集本朝古者至治之世自瞽矇昏瞶侏儒籧篨戚施之人上所以使者皆各盡其材臨川集㧞十覬五人之用累百求一鶚之精欒城詩吾聞調羮鼎異味及粉槿豈其供王羞而棄㑹稽筍山谷詩貞不可㓕經不曰堅乎磨而不磷不曰白乎􅄺而不緇語陽貨子有人扵此藏十鎰之金雖行貨而食人謂之富矣荀子互見不受麄鍾山之玉炊以爐炭三日三夜其色不變淮南子琬琰之玉在汙泥之中雖亷者不釋也美之所在雖汙辱世不能賤同上荆山之玉潛光荆石之中雖有千仭之土不能掩其光抱樸子丹可磨而不可奪其色蘭可燔而不可滅其馨玉可碎而不可改其白金可銷而不可易其剛劉子史如日月之食焉何損扵明左宣十二年自漢鑄五銖至宋文帝歴五百餘年制度世有廢興而不變五銖者明其輕重可法得貨之冝故也通鑑齊太祖白玉投泥豈能相汙北史穆弼傳崔沔舉賢良高第不中者痛訾之武后勅有司覆試沔對益工遂為第一唐書干將雖折不改其光舊唐書楊於陵傳記周有砥石宋有結緑梁有縣黎楚有和璞此四寳者工之所失也而為天下名器戰國䇿石可破也而不可奪其堅吕氏春秋良珠度寸雖有百仭之水不能掩其輝韓詩外傳夫良玉徑尺雖千仭之土不能掩其光明珠度寸雖有函丈之石不能戢其曜虞􅀈佑高士傳集毛嬙西施善毁者不能蔽其好選四子講徳論薰臭猶芳選連珠珠碎無土色玉墜無瓦聲劍折有寸利鏡破有片明元稹集持謝衆人口銷盡猶是金同上神劔土不蝕異布火不燋元㣲之集金可鎔不可使為汙腐水可濁不可使為塵糞元次山互見有定}
