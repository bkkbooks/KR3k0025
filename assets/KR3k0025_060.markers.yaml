  - {type: variant, offset: 174, length: 0, content: '', WYG: 今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子所置之湯武置天下扵仁義禮樂累子孫數十世此天下所共聞也秦王置天下扵法令刑罰禍幾及身子孫誅絶此天下所共見也西漢賈誼治安䇿祜之始至也軍無百日之糧至季年有十年之積晉書許敬宗嘆曰士之登庸子孫世業履道則為衣冠失緒則為匹庻來護男兒作宰相虞世南男作木匠新唐書夫人猶水也壅之則為泉䟽之則為川通塞隨流豈有常上通鑑唐武后䟽曰雊雉升鼎而桑榖生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長通鑑後唐明宗傳記昔者禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵夫差以吳見禽扵越文公以晉國霸而厲公以見殺扵匠黎之宫大戴禮記集必若所為危扵累卵難扵上天變所以為}
  - {type: page-break, offset: 174, content: '', id: KR3k0025_WYG_060-37b, image: WYG0931/WYG0931-0699d.png}
  - {type: variant, offset: 174, length: 0, content: '', krp: 今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子所置之湯武置天下扵仁義禮樂累子孫數十世此天下所共聞也秦王置天下扵法令刑罰禍幾及身子孫誅絶此天下所共見也西漢賈誼治安䇿祜之始至也軍無百日之糧至季年有十年之積晉書許敬宗嘆曰士之登庸子孫世業履道則為衣冠失緒則為匹庻來護男兒作宰相虞世南男作木匠新唐書夫人猶水也壅之則為泉䟽之則為川通塞隨流豈有常上通鑑唐武后䟽曰雊雉升鼎而桑榖生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長通鑑後唐明宗傳記昔者禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵夫差以吳見禽扵越文公以晉國霸而厲公以見殺扵匠黎之宫大戴禮記集必若所為危扵累卵難扵上天變所以為}
  - {type: variant, offset: 175, length: 0, content: '', WYG: 扵反掌安於泰山選枚上吳王書互入間不容髪如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汙泥流濬則沼沚陸宣公文善根茍種佛果終成白樂天狙猴之處山呌呼跳梁其輕躁狼戾異甚然得而縶之未半日則定坐求食唯人之為制其或優人得之加鞭箠狎而擾焉跪起趨走咸能為人所為者未有一焉狂奔掣頓踣弊自絶吾信夫狂之聖也柳文楊誨之第二書本朝越人之望燕為絶域也北轅而首之茍不已無不至臨川集士生於世使其中不自得將何往而非弊使其中坦然不以物傷性將何適而非快欒城集方寸之地清之則為高明虛靜之府雜之則為塵垢滓穢之囊鷹之鷙不可以為慈化而為鳩則鷙性盡矣橘之甘不可以為苦變而為枳則甘味忘矣並鳴道集或問伊川氏量可學否曰可學進則識進識進則量進胡氏}
