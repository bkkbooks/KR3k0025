  - {type: variant, offset: 128, length: 0, content: '', krp: 得之舎則失之孟子子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣孟子西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴可以祀上帝孟離婁下有人扵此力不能勝一匹雛則為無力人矣今曰舉百鈞則為有力人矣然則舉烏獲之任是亦為烏獲而已矣夫人豈以不勝為患哉弗為耳孟盡心下人性之善也猶水之就下也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉人之可使為不善其性亦猶是也孟告子上鍥而舎之朽木不折鍥而不舎金石可鏤荀子勸學湮其源開其瀆江河可竭一進一退一左一右六驥不致荀子脩身故善用之則百里之國足以獨立不善用之則楚六千里而為讐人役荀子仲尼日月星辰禹桀之所同也禹以治桀以亂有治人無治法羿之法非亡也而羿不世中禹之法猶存而夏不世王得其人則存失其人則亡荀子天道積厚者流澤廣積薄者流澤狹為君子則常安榮為小人則常危辱荀子跛鼈致之六驥不致是無他故焉或為之或不為之耳荀子脩身百川學海而至于海丘陵學山而不至于山揚子學行希驥之馬亦驥之乗也希顔之人亦顔之徒也同上脩其善則為善人脩其惡則為惡人揚子脩身見畏與召侮無不由已揚子五百御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵揚子互入間不容髪假儒衣書服而讀之三月不歸孰曰非儒也揚子互入矯揉耕道而得道獵徳而得徳揚子譬水火焉善用之則為福不善用之則為禍尤倉子今夫毛嬙西施天下之美人若使之御腐䑕蒙蝟皮衣豹裘革帶死則布衣韋帶之人過者莫不左右眼睨而掩鼻嘗試使之施芳澤正蛾眉設笄珥衣阿錫曳齊紈粉白黛黑珮玉環則雖王公大人有嚴志頡頏之行者無不憛悇癢心而恱其色矣淮南子故魏兩用樓翟吳起而亡西河湣王専用淖齒而死扵東廟無術以御之也文王兩用吕望召公奭而王楚莊王専用孫叔敖而霸有術以御之也淮南子史衛文公元年革車三十乗季年乃三百乗左閔三閔子騫曰禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬冨倍季氏可也姦回不軌禍倍下民可也左襄二十三李斯見吏厠中䑕食不潔近人犬數驚恐之斯入倉觀倉中䑕食積粟居大廡之}
