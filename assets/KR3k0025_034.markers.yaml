  - {type: punctuation, offset: 3421, content: 《, id: KR3k0025_CHANT_034-bkkpn1010}
  - {type: variant, offset: 3421, length: 344, content: 杜牧之集本朝操舟者常不見水道之曲折而水濱之立觀者常見之弈碁之形雖國工有所不盡而袖手旁觀者常得之東坡朝辭赴定州論事狀互入袖手旁觀不識廬山真面目只緣身在此山中經執柯以伐柯睨而視之猶以為遠記中庸互入愚暗人莫不飲食也鮮能知味也記中庸雖有嘉肴弗食不知其旨也記學記子道在邇而求諸遠孟離婁上仲尼謂顏淵曰吾終身與汝交一臂而失之莊子山木史平原君定從而歸曰勝相士多者千人寡者百數自以不失天下之士今於毛先生失之矣史平原君傳曹操攻呂布軍敗布騎得操而不識詢曰曹操何在操曰乘黃馬走者是也乃釋操而追黃馬者操突出引還通監漢獻紀互入反鋒而用晉武帝曰吾獨不得如亮者而臣之乎樊建曰陛下知鄧艾之冤而不能直雖得亮得無如馮唐之言乎通鑑晉紀魏舒為鍾毓長史毓初不知其善射後遇朋人不足以舒蒲數舒發無不中舉坐莫敵毓嘆而謝曰吾之不足以盡卿才有, WYG: 憚}
