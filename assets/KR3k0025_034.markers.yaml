  - {type: variant, offset: 2515, length: 0, content: '', WYG: 甞革商前弊求民利病未經嵗珠復還稱為神明李元禮祖父修生子亮叔訓秀號四龍俱為牧守劉昆前任江陵反風滅火復守𢎞農虎北渡河楊震為東萊太守故人王宻懐金遺之曰暮夜無知者曰天知神知子知我知宻愧而出楊震為涿郡太守或勸開産業震曰使後世稱為清白吏子孫以此遺之不亦可乎陳蕃為豫章太守不接賔客唯徐穉來特設一榻去則懸之並後漢王衍為青州弟澄為荆州弟敦謂衍曰荆有江漢之固青有附海之險卿二人在外而吾留于此足以為三窟矣劉宏為荆州刺史每手書郡國丁寧疑宻咸曰將劉公一尺書賢於十部從事並晉書顔延之為永嘉太守甚怨憤作五君詠於阮咸曰屢薦不入朝一麾乃出守南史周太祖除裴俠為河北郡守命俠立謂牧守曰俠清謹奉公為天下最衆有如俠者可與俱立衆無應者朝野號獨立使君北史姜謩以平薛仁杲拜秦州刺史髙祖曰衣錦還鄉古人所尚今以本州相授唐書陽城為道州刺史觀察使當上考功第城自署曰撫字心勞催科政拙考下下姚元崇牧荆州受代民擁馬首遮道不肯去乗馬鞭􅌱民皆截留之賈敦頤為洛州刺史百姓共立碑及弟敦實為長史復刻石頌美於兄碑之側時人號為棠棣碑袁滋為華州刺史召拜大將軍耆老遮道不得進楊於陵代之宣言曰於陵不敢易袁公之政李正己反徳宗以張萬福為濠州刺史謂曰朕以江淮草木知卿威名陸長源為汝州刺史清白自將去汝州送車二乗曰吾祖罷魏州有車一乗而圗書半之吾愧不及先人云並同上後唐長興元年給事中崔衍奏當省給納諸州二銅魚一隻長留内庫一在本州庫新除刺史請領左魚到州集官吏取州庫右魚契合即遣差人送左魚納省五代史傳記郡守秦官秩二千石漢景帝更名太守王莾改名大尹晉郡守皆加將軍後魏初郡置三太守北齊制郡為上中下三等後周郡太守各以户多少定品命隋因北齊九等之制唐武徳改為州刺史加號持節天寶改為郡太守開元中定天下州府自京都及都督䕶府之外以近畿為四輔餘為六雄十望十𦂳及上中下之差至徳後諸州始各有州鎮刺史皆加團練使故其任重矣通典集今之郡守縣令民之師帥所使承流而宣化也董策古者參用名儒典領大郡本經術以濟事參禮法以訓人居一州之表為千里之師潁川有封侯之賞膠東有璽書之勞常集賈琮以最于十二州頒之以璽書黄霸以用于二千石寵之以侯印韋處原對䇿今之郡守古侯伯也於吏有君臣之道焉於人有父母之道焉白集得不思勤儉教導勞來安輯膏雨吾土襦袴吾人者乎楊潛制于時州宰髙季通秩映隼旟榮參熊軾徐游藝碑州將李憬閔河承寄以廉能居課最之先顔元孫制丈夫官至刺史亦榮矣韓文斂此大恵施于一方無疾其驅天子有詔嵗㑹課第甲於他州白集亟分符宇于頔制俾從竹使之權王愽制恵露霑呉仁風扇越昭王碑寵冠列藩越敷邦教禇淵碑廊廟之具裴施州宿昔一逢無比流金鐘大鏞在東序冰壺玉衡懸清秋堯有四岳明至理漢二千石眞分憂杜甫寄裴施州人生五馬貴莫受二毛侵送賈汝州京兆先時傑琳琅照一門送鮮于萬州東藩駐皁蓋李邕宴使君騎紫馬捧擁從西來與張留後酒酣誇新尹蓄眼未}
