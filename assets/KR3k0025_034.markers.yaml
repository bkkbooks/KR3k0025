  - {type: variant, offset: 2472, length: 0, content: '', WYG: 秦置監察御史漢省之後復置文帝以御史不奉法乃遣丞相史出刺并督察御史武帝元封五年初置部刺史掌奉詔條察州以六條問事秩六百石居部九嵗舉為守相成帝更為州牧秩真二千石位次九卿哀帝復為刺史天壽復為牧光武復刺史乗傳周行郡國錄囚徒考殿最舊制州牧奏二千石事皆先下三公光武不復委三府故權歸刺舉之史靈帝改為牧魏晉為刺史持節都督庶姓為單車刺史後魏州置三刺史隋開皇三年罷郡以州統縣自是刺史之名存而職廢後有刺史皆太守之互名理一郡而已煬帝罷州置郡置司𨽻臺大夫一人巡察畿内刺史十四人巡察畿外唐罷郡置州神龍二年分天下為十道置巡察使二十人景雲改置按察使開元改置採訪處置使至徳之後改採訪使為觀察并領都團練治于所部之大郡職源分馳郡國督察在位其敷以言錄見囚徒漢官解詁集周以十聨率諸侯若今之廉察白集廉問七州牛僧孺歴居廉鎮崔鈜制泊廉視浙右李徳裕玉節居分陜金貂總上流麾軍時舉扇作賦且登樓年光徧原隰春色滿汀州日華三翼舸風轉七星斿向解青絲䌫將移丹桂舟梁元帝綉衣春當霄漢立杜詩州家申明使家抑韓集堯置州牧四岳持而綱之柳文本朝初有轉運使淳化及景徳増提刑熙寧又置提舉㑹要督刺之寄南豊委節傳分按州郡公是行周沆制分龍節以典州驟歴劇部公是謝表轉運使副判官史楚漢相距滎陽蕭何轉漕關中給食不乏髙祖曰鎮國家撫百姓給饋餉吾不如蕭何漢書光武謂寇恂曰昔髙祖留蕭何鎮闗中吾今委公以河内堅守轉運給足軍粮光武于是北征恂收租四百萬斛以輦車驪駕轉輸前後不絶後漢書諸葛亮出祁山以木牛運由斜谷出以流馬運蜀志裴耀卿充轉運使置河隂集津二門倉引天下租繇盟津泝流而西三年積七百萬石省費三十萬緡唐書劉晏以轉運為己任凡所經歴必究利病運米數千萬石以濟闗中歴代操利柄為國計者莫不損下益上危人自安變法以弄權斂怨以搆禍皆有之矣如劉晏通壅滯任才能富其國而不勞于民儉其家而歸利于衆第五琦促辦應卒民不加賦而國豐饒亦庶幾矣唐書傳記唐先天二年李傑始為水陸發運使開元二十一年裴耀卿充江南淮南轉運使而崔希逸蕭旻為副天寶以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸道轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆始于此五代罷巡院始置轉運使唐㑹要本朝乾徳以後始置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此其轉運使國初但曰勾當某路水陸計度轉運使官髙者曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與判官焉又置同勾當轉運使尋罷諸路副使真宗毎用兵或令都部署兼轉運使王}
