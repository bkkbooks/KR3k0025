  - {type: variant, offset: 2493, length: 1, content: 客, krp: 荆湖福建廣東可依三路置總管于帥府七年淮東置總管十二年諸路並置州總管一貟㑹要淳化間以參政趙昌言為川陜兩路兵馬都總管命招討蜀寇仍御札數幅授以方畧景徳以王欽若判天雄軍兼都總管初帝曰天雄且為重鎮思得熟識機宜行事果斷者蒞之於是欽若請行分紀狄青京師呼為狄天使授涇原路兵馬副總管令圖像以進上觀其儀表曰朕之關張也於是有狄萬人之稱天聖七年劉平上封事言趙元昊必為邊患授邠寧環慶副都總管遣中人就賜黄金一器景祐四年以御製神武秘畧賜沿邊總管鈐轄熙寧五年以燕達權發遣環慶路駐泊總管達有戰功故自鈐轄躐遷然以資淺故令權發遣權發遣自達始也實録總管鈐轄司掌總治軍旅屯戍營防守禦之政令凡符兵𨽻屬者訓練教閱之事皆掌之續㑹要都鈐轄鈐轄本朝國初以朝官及諸司使以上充或一州或一路或兩三路嘉祐詔内臣為鈐轄都監者逐路止置一貟分紀官髙資深者稱都鈐轄官卑資淺者稱鈐轄續㑹要建炎三年要郡守臣兼兵鈐轄以武臣為之副改諸路都監為副鈐轄紹興三年守臣罷兼兵職副鈐轄改為路分都監而帥府如故二十八年鎮江守楊揆言舊法一路分鈐轄一州則有州鈐轄如常秀平江皆有之獨鎮江闕欲添置州鈐轄從之中興㑹要祥符中涇原路都鈐轄曹常乞别差人知渭州臣一面管勾鈐轄司事帝謂王欽若曰邊防軍馬所屯之地若别置知州即各生事可降詔諭以此意職畧曹瑋為環慶路鈐轄帝出其所上涇原環慶兩道圖以示輔臣曰華戎山川戰守之要盡在是矣同上賜御製神武秘畧治平元年以内侍省押班王昭明為環慶路鈐轄帶御器械李若愚為涇原路鈐轄前世以官人預邊事而將帥不盡其用及有是命人不以為便也後卒罷之實録出總州兵孔彦舟制遙剖兵符出鈐尺籍胡文恭草童貫詔往位兵鈐綦史宣制就司鈐䕶余靖制參委戎鈐王興制往涖戎政之重公是劉貽孫制訓齊軍政宣明國威柳渉制兵馬都監本朝兵馬都監有路分掌本路禁旅屯戍邊防訓練之政令以肅清所部建炎三年以要郡守臣帶本路兵馬都監武臣一貟充副都監中興㑹要紹興三年罷守臣兼兵職而副都監如故同上睠典戎之臣任以䕶兵胡文恭諸路將官本朝神宗留意武備本以捍西北二敵而推其法于東南職畧陜西諸路四十二將河北東路三十七將而東南纔十三將淮南東第一西路第二兩浙西路第三東路第四江南東路第五西路第六荆湖北路第七南路潭州第八全邵永三州備廣西應援第九福建第十廣東路第十一西路桂州第十二邕州第十三實録諸路將各有正副中軍行圖陣隊調發賞罰皆闗決于將副宣和詔元祐元年司馬光請盡罷諸路將官樞宻院難之止詔都路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一貟兼本州都監其單將駐劄處勿復差兼宣和五年御筆諸路將副部隊自今並依元豐法選差㑹要乾道四年詔諸州各置凖備將一貟專一管轄日逐訓練揀中弓弩事藝孝宗㑹要諸路將官掌統制所𨽻禁旅以行陣隊伍金鼔旗幟弓矢擊刺之法而教習訓練之别其武藝精強者待次遷補以激勸士卒凡兵仗器甲之數廩禄犒設賞罰約束之禁令皆掌焉副將為之貳續㑹要熙寧初詔求將帥近臣以劉舜卿名聞命總京東九郡將兵訓之三年詔以所部軍閱于内殿神宗歎曰坐作有度其可用也本傳王祖道請宻下諸路經畧監司體量將副第人才為三等職畧太守史漢文帝初與郡守為銅虎符竹使符符合乃聽受之以代古之珪璋史記二千石皆皁蓋朱幡續漢志季布為河東守上曰河東吾股肱郡文翁為蜀郡守起學成都市至今巴蜀好文雅文翁之化也汲黯為東海太守治官理民好清靜黯多病臥閤内不出嵗餘東海大治召信臣為南陽太守興水利吏民信愛號為召父武帝謂朱買臣曰衣錦還鄉遂除㑹稽太守宣帝時渤海嵗饑盜起上選能治者以龔遂為渤海太守召見謂曰君欲何以息其盜賊對曰海瀕遐逺不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜弄兵于潢池中耳今欲使臣勝之耶將安之也上曰選用賢良固欲安之遂曰治亂民猶治亂繩不可急也願得便宜從事上許焉至渤海悉罷捕逐盜賊吏諸持田器者皆為良民吏毋得問持兵器者乃為盜賊遂單車獨行至府盜賊即時解散乃開倉廩假貧民勸民務農桑民有帶刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢黄霸為潁川太守布宣詔令勸務耕桑甞欲有所伺察擇吏遣行屬令周宻吏出食于道旁烏攫其肉後還謁霸勞之曰甚苦食于道旁乃為烏所盜肉吏大驚咸稱神明霸外寛内明得吏民心戸口嵗増治為天下第一韓延夀為東郡太守斷獄大減為天下最入守左馮翊民有昆弟相與訟田延夀傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟傷殘風化是日移病不聽事於是昆弟遜謝不敢復爭延夀恩信周徧二十四縣}
