  - {type: variant, offset: 1927, length: 1, content: 布, WYG: 豫州刺史舉奏二千石以下阿縱不法者帝曰逵真刺史也賈琮為冀州刺史之部言曰刺史當逺聽廣視糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰帷百城聞風竦震諸贓過者望風解印而去謝夷吾為荆州刺史第五倫薦之曰尋功簡能為外臺之表聽聲察實為九伯之冠李膺為青州刺史守令畏其威名聞風棄官种暠為梁州刺史}
