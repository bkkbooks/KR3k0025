  - {type: variant, offset: 4109, length: 0, content: '', WYG: 不敢近塞並漢書崔寔為五原太守敵不敢犯常為邊最廉范為雲中太守匈奴不敢犯雲中祭彤為遼東太守邊境肅靜並後漢士燮為交趾太守二十餘年疆場無事呉志羊祜都督荆州朝廷委}
