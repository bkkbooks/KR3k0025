  - {type: variant, offset: 812, length: 197, content: 律為詩書又言五帝官天下三王家天下家以傳子官以傳賢執金吾奏寬饒指意欲求擅大逆不道諫大夫鄭昌上書訟寬饒曰上無許史之屬下旡金張之託許伯宣帝皇后父史宣帝外家張金張目磾安世也上不聽遂下寬饒吏寬饒引佩刀自剄北闕下西漢本傳位過其任莫能有終所謂愛之適足以害之也西漢佞倖傳讚厚之如此反所以害之也西漢鮑宣傳丁公為項羽將逐窘高祖高祖曰兩賢豈相阨哉丁公引兵還及羽滅丁公謁高祖高祖以丁公徇軍中曰丁公為臣不忠使項王失天下者, WYG: ''}
