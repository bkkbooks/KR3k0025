  - {type: variant, offset: 2487, length: 1, content: 坐, krp: 来帥熊羆四方作儀為戎臣師韓文本朝南渡諸路起兵有自稱統制者州縣管押勤王兵亦有稱統制者諸道都總管及諸司便宜差統制者建炎初並罷惟中都主兵朝廷差統制者仍舊紹興十一年韓世忠張俊岳飛除樞宻副使其兵馬就領所部統制官節制是年張俊發張憲事併岳飛賜死俊遂薦其將田師中掌故岳飛之兵又薦王徳住金陵於是並詔為御前都統制師中于鄂州徳于建康府駐劄野紀南按江三州都統司史無見考副都統史唐興元中置副都統唐書集自古軍制必有佐貳逮至漢氏亦循舊章既得將方俾參戎政實資謀策用正紀綱李徳裕夙以驍騎之鋒累佐元戎之斾徳裕行史憲討制副旌麾於戎閫常集辛景宗制參於戎副早參戎秩田承嗣元帥之任實屬于師貞佐軍之選諒資于邦傑李元弼宜副出車之命仍踐分麾之寵翊閫外而專征膺鑿門而受律並同本朝紹興}
  - {type: variant, offset: 2491, length: 0, content: '', WYG: 副統制隆興二年詔應諸軍副都統制並罷乾道三年上謂宰執曰朕欲江上諸軍各置副都統制一員令兼軍事豈惟儲它日統制亦使諸將有所顧忌於是以郭剛為鎮江副都統制張榮為建康副都統制三省樞宻院定制云已復置在外副都統制俾贊主帥商議軍事覺察奸弊所有本司文字與都統連銜調發軍馬並聽都統指揮月旦亦許上表孝宗㑹要都幹集參戎作弼文選楊荆州昔事前軍幕古詩參務戎旃白集軍府之要掌在賔僚路貫制班固傅毅之徒皆置於戎幕以典文章李文饒出官府廷乃佐戎幕韓文初試佐戎祭馬捴文因効策于戎幕衛伯玉制庇身戎幕文粹營開楊柳幕展芙蓉四六集本朝都統制僚屬有計議官一貟主管機宜文字二貟武昌志都總管副總管史長孫晟為秦州道行軍總管出討突厥有達官來降言突厥大畏長孫總管聞其弓聲可謂霹靂見其走馬稱為閃電髙祖詔黎州總管徐世勣本自黎陽擁徒歸順任以藩岳誠效克彰張士貴貞觀中為龔州道行軍總管太宗以其冒矢石先登勞之曰甞聞以忠報國者不顧身於公見之李靖為定襄道行軍總管率勁騎三千由馬邑趣惡楊嶺頡利可汗大驚太宗曰靖以騎三千蹀血敵庭遂取定襄古未有輩薛萬均為沃沮道行軍總管從李靖討吐谷渾斬數千級勇蓋三軍李大亮為河東道大總管出北道與敵遇蜀渾山大戰破之俘其名王並唐書傳記魏黄初始置都督諸州軍事後周改為總管隋文帝以并益荆揚四州置大總管其餘總管府置于諸州列為上中下三等加使持節煬帝改帥都督為旅帥唐諸州復有總管亦加使持節通典武徳初邊要之地亦置摘竒本朝馬歩軍都總管以節度使充副總管以觀察以下充有止一州者有數州為一路者有帶兩路三路者或文臣知州則管軍勾馬事舊相重臣亦為都總管咸平廢三路都總管景徳詔鎮定兩路併為一路諸路並去行營之名止為駐泊總管慶歴三年詔近分陜西縁邊為四路各置經畧安撫招討等使自今路分總管鈐轄以上許與都總管司同議軍事路分都監以下並聽都總管等節制違者以軍法論七年析河北四路各置都總管一貟如無事止以安撫使總制諸路八年諸州部置並改總管軍馬總管副總管分紀建炎元年李綱言守備當于沿河沿淮沿江置帥府要郡以控扼其帥府文臣一貟帶安撫使馬歩軍都總管武臣一貟充副總管改路分為副總管紹興二年要郡守臣罷帶兵職諸路副總管可依舊充路分鈐轄五年詔兩浙}
