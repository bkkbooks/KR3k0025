  - {type: variant, offset: 2487, length: 1, content: 坐, WYG: 来帥熊羆四方作儀為戎臣師韓文本朝南渡諸路起兵有自稱統制者州縣管押勤王兵亦有稱統制者諸道都總管及諸司便宜差統制者建炎初並罷惟中都主兵朝廷差統制者仍舊紹興十一年韓世忠張俊岳飛除樞宻副使其兵馬就領所部統制官節制是年張俊發張憲事併岳飛賜死俊遂薦其將田師中掌故岳飛之兵又薦王徳住金陵於是並詔為御前都統制師中于鄂州徳于建康府駐劄野紀南按江三州都統司史無見考副都統史唐興元中置副都統唐書集自古軍制必有佐貳逮至漢氏亦循舊章既得將方俾參戎政實資謀策用正紀綱李徳裕夙以驍騎之鋒累佐元戎之斾徳裕行史憲討制副旌麾於戎閫常集辛景宗制參於戎副早參戎秩田承嗣元帥之任實屬于師貞佐軍之選諒資于邦傑李元弼宜副出車之命仍踐分麾之寵翊閫外而專征膺鑿門而受律並同本朝紹興}
