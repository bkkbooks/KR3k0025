  - {type: variant, offset: 1231, length: 692, content: 覆族袁紹之地裂兵亡可為龜鑑也北齊顏氏家訓魏文侯出遊見路人反裘而負芻文侯問之對曰臣愛其毛也文侯曰若不知裡盡而毛無所恃耶新序永有某氏愛鼠不畜貓又禁僮勿擊鼠倉廩庖廚悉以恣鼠不問由是飲食大率鼠之餘也數歲某氏徙居他州後人來居鼠為態如故假王六貓闔門撤瓦灌穴購僮羅捕之殺鼠如丘柳文永某氏之鼠幾許平生歡無限骨肉恩結為腸間痛聚作鼻頭辛白樂天集櫪馬非不肥所苦長縶維豢豕非不飽所憂竟為犧文粹橐駝種木其蒔也若子其置也若棄它植者則不然愛之太過憂之太勸旦視而暮撫巳去而復顧甚者瓜其膚以驗其生枯搖其本以觀其踈密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之唐柳宗元郭橐駝傳本朝東坡下獄張安道致仕在南京上書令其子恕持至登聞院恕不敢投久之東坡出獄其後東坡見其副本因吐舌動色曰獨不見鄭昌之捄蓋寬饒云上無許史下無金張正激宣帝之怒元城語錄煩惱初無根恩愛為種子東坡詩子管子以小欲成大榮淮南子史李同說平原曰家之所有盡散以饗士士方其危苦之時易德耳於是平原君說之得敢死之士三千人史本傳人爭取賤賈任氏獨取貴西漢貨殖傳陷之死地而後生投之亡地而後存西漢韓信傳互入反鋒而用不入虎穴不得虎子東漢班超傳不探虎穴安得虎子三國吳呂蒙傳絳灌等譖陳平受諸將金漢王召讓之平曰臣躶身來不受金無以為資史陳平世家子獨不見家人寡婦耶始自約敕之時意乃慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫佚知其非禮然不能自還吾猶此矣西漢原涉傳互入遂非無顧藉許后當娠病女醫淳于衍者霍氏所愛因投毒藥加煩懣崩諸醫皆收繫顯恐急即以狀具語光光大驚欲自發舉不忍猶與會奏上光署衍勿論顯因勸光內其女入宮通鑑漢宣紀弘為布衣食不重肉汲黯曰弘位在三公奉祿甚多然為布被此詐也上問弘弘謝曰有之誠中弘之疾夫, WYG: 賜}
