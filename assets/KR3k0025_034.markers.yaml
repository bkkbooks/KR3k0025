  - {type: variant, offset: 2512, length: 1, content: 所, WYG: 附枝麥秀兩岐張君為政樂不可支侯霸為臨淮太守被召百姓攀轅臥轍岑熙遷魏郡太守無為而化輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂鮑徳為南陽太守號為神父宋均為九江太守郡多暴虎常設檻穽均至去檻穽虎相為東渡河而去廉范遷蜀郡太守舊制禁民夜作以防火災范乃削先令百姓歌曰廉叔度來何暮不禁火民安作昔無襦今五袴劉寛拜南陽太守温仁多恕吏人有過但以蒲鞭撻之示辱而已朱暉為臨淮太守吏人歌曰強直自遂南陽朱季吏畏其威民服其恵劉寵為㑹稽太守召為将作匠山隂老叟人齎百錢以送曰自明府下車狗不夜吠民不見吏今聞棄去故自扶送寵為人選一大錢受之孟甞遷合浦太守郡不産穀而海出珠與交趾常通商販貨糴糧先守多貪穢珠漸徙于交趾界商旅}
  - {type: page-break, offset: 2512, content: '', id: KR3k0025_WYG_034-34a, image: WYG0930/WYG0930-0758a.png}
