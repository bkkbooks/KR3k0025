  - {type: variant, offset: 4176, length: 2, content: 過於, WYG: 學官弟子武帝時天下郡國皆立學設教官平帝時郡國曰學侯國曰校置經師一人鄉曰庠聚曰序置孝經師一人匡衡補平原文學學者多衡經明當世少雙並漢書光武問武臣曰請卿自度爵禄何所至也鄧禹曰臣少甞學問可郡文學同上傳記魏晉以下郡國並有文學即博士助教之任六典隋潘徽為博士唐府郡置經學士各一人掌以}
