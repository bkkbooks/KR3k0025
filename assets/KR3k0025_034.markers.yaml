  - {type: variant, offset: 1030, length: 166, content: 吁愛而不教終至凶戾愛子若此猶飢而食之以毒適所以害之也東漢何敞傳愛之不以道適所以害之也通鑑東晉成紀傳記魏武曹操常云我眠中不可妄近近便斫人亦不自覺左右宜深慎此後陽眠所幸一人竊以被覆之因便斫殺自爾每眠左右莫敢近者世說輕詆篇互入姦邪尹吉甫子伯奇至孝事後母母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑伯奇自死列女傳人之愛子罕亦能均, WYG: 刺史}
