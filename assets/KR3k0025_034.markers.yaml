  - {type: variant, offset: 26, length: 165, content: 今日病矣予助苗長矣其子趍而往視之苗則槁矣孟子公孫丑上伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患後有鞭策之威馬之死者已過半矣莊子鼯鼠五技而窮荀勸學畫虎不成反類狗東漢馬援傳反裘負薪存毛實難宋書范泰傳殷浩荅亙溫書慮有謬誤開閉者十數竟達空函通鑑晉穆紀傳記楚舍人相謂曰各畫地為蛇蛇, WYG: 奉}
