  - {type: variant, offset: 2509, length: 0, content: '', WYG: 南郡太守上以育耆舊名臣之子乃以三公使車載育入殿守並前漢本傳光武定河内難其守鄧禹曰寇恂有牧人御衆之才乃拜恂河内太守潁川盜賊羣起車駕南征恂從至潁川盜賊悉降百姓遮道曰願從陛下復借寇君一年杜詩為南陽太守性節儉而政治清平南陽為之語曰前有召父後有杜母潁川盜起召郭伋拜潁川太守帝勞曰賢能太守去帝城}
