  - {type: variant, offset: 4110, length: 0, content: '', WYG: 方鎮之事祜招攜以禮懐逺以徳呉人恱東晉書李勣治并州太宗曰煬帝不擇人守邊勞中國築長城以備敵今我用勣守并賢長城逺矣唐書傳記桓階為趙郡太守上曰北邊未靖以卿威能震敵徳懐逺人故以相煩漢紀集西川曰益部地有險府有兵礙戎屏華號為難理白集本朝沿邊州郡或當一道衝要者並兼兵馬鈐轄巡檢都監或帶沿邊安撫提轄兵甲沿邊溪谷都巡檢餘州事則否職畧治平三年陸說知延州入見上問當何以施為對曰邊事不可遙度候臣到察審有所見當畫一條奏蔡挺在渭乆鬱鬱不自聊寓意樂府詞有玉闗人老之歎中使至則使倡優歌之達于禁掖天子愍焉遂有樞府之拜四朝史出總邊瑣公是行陳旭制通判史黄霸為刺史詔賜車蓋髙一丈别駕車緹油屏泥于軾前以彰有徳漢書周景辟陳蕃為别駕蕃不就景題駕輿曰陳仲舉坐不復更辟蕃起就職趙温為京兆郎丞嘆曰丈夫當雄飛不當雌伏後漢書龎統守萊陽令不治免官魯肅遺先主書曰龎士元非百里之才使處治中别駕之任始當展其驥足耳蜀志吕䖍有佩刀工相之以為必登三公可服此刀䖍語别駕王祥曰茍非其人刀或有害卿有公輔之量故以相與王祥為徐州别駕糾合義衆州境獲寧人歌之曰海沂之康實賴王祥邦國不空别駕之功桓温辟謝奕為安西司馬奕在温坐岸幘談詠曰我方為司馬也習鑿齒吏才不常桓温深器之用為荆州治中别駕謝牋曰不遇明公荆州從事耳庾亮與郭游書曰别駕舊與刺史同乗流王化于萬里之外任居刺史之半安可非其人並晉書趙執别本作張執為齊州别駕有能名詔徴入朝父老揮涕隨逐曰公清如水請酌一盃水奉餞執受飲之隋書孔昌寓貞觀中對策髙第歴魏州司馬帝為不置刺史為政三年璽書褒美唐書崔神慶則天時擢拜并州長史因謂之曰并州朕之枌榆又有軍馬比日簡擇無如卿者武后求宰相狄仁傑曰荆州長史張柬之其人雖老宰相才也堂吏朱儉為别駕給事中蕭倣駁曰别駕古為治中從事任居刺史之半豈宜以人吏兼副政之名大厯十二年制曰刺史有故及闕本道使不得}
