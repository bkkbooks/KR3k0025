  - {type: variant, offset: 2478, length: 0, content: '', WYG: 坊場河渡水利之法視嵗豐歉而為之斂散以恵農民仍專舉刺官吏之事掌摘山煑海之利以佐國用皆有鈔法視其嵗額之登損以詔賞罰且給之不如期鬻之不如式與州縣之不加恤者皆劾以聞慶元制朕以常平蠲役之政加恵黎元若在神考取成三代制為常平蠲役之政以利天下方畧制提舉司幹官本朝熙寧三年置提舉常平司勾當公事於通判幕職内選差一貟不妨本職紹興三年戸部看詳欲諸路州並以通判充主管官又許于幕職官選差六年復置主管官十五年依舊為幹辦公事此常平幹也宣和三年置茶鹽提舉屬官一貟並㑹要此茶鹽幹也今提舉司存二幹官以此使幹茗局胡文恭總領史劉晏移書於元載曰諸將有不庭邊敵有侵盜聞我貢輸錯入軍食豐衍可以震耀中外劉晏領租庸使租庸得補署積數百人盡當時之選趣督倚辦故能成功李靈耀反河南節帥擅征賦州縣益削劉晏甞以羨補之人不加調而所入自如贊曰劉晏制萬物低昻操贏貲以佐軍興斂不及民而用度足唐中僨而振晏有勞焉論曰劉晏幹萬貨盈虛厥功懋矣君子之治財以仁為本以義為利其為利害而寓之法法成矣巧者不敢過拙者不敢不及又曰斂之於官而下不怨藏之百姓而上不之元琇判度支國無横斂而軍旅濟肅宗駐彭原第五琦謁見陳今之急在兵兵強弱在賦賦所出以江淮為淵若假臣一職請悉東南寶貨飛餉函洛帝拜為勾當江淮租庸使當軍興隨事趣辦人不益賦而國益饒並唐書本朝南渡之初甞命朝臣總領都督府宣撫司財賦未以官名也紹興十一年收諸帥之兵以為御前軍屯駐諸處皆置總領仍帶專一報發御前軍馬文字蓋與聞軍屯不獨職餽餉而已叙位在轉運副使之上鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之十六年四川總司以總領四川宣撫司錢糧所為名十八年詔罷宣撫司始改為四川總領乾道六年詔淮東總領併歸淮西總領所七年復設淮東總領並㑹要總屬本朝紹興十一年初置四川總領官屬有幹辦公事準備差遣四川有主管文字三貟淮東淮西有分差糧料院審計司審計司通判兼𣙜貨務都茶塲御前封樁甲仗庫大軍倉大軍庫贍軍酒庫市易抵當庫恵民藥局湖廣有給納場屬官兼分差糧料院審計司審計以屬官兼御前封樁甲仗庫大軍倉大軍庫贍軍酒庫四川有分差糧料院審計司審計兼大軍倉大軍庫撥發船運官贖藥庫糴買場㑹要都大提㸃茶馬本朝熙寧七年始詔三司鹽鐵判官李杞三司勾當公事蒲宗閔經畫川蜀買茶充秦鳯熙河路博馬就除成都府路買茶公事把于秦州宗閔于成都置司後改名都大提舉茶馬事成都記元豐四年郭茂恂言茶司既不兼買馬遂立法以害馬政恐悮國事乞併茶馬為一司從之掌收摘山之利以佐邦用凡市馬于藩夷以茶易大觀以采川茶不以博馬唯市珠玉故馬政廢缺紹興四年始令四川宣撫司支茶博馬五年宻院言已于永康軍茂州置場舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等乾道元年川秦兩司馬共九千餘匹熙寧十年李稷提舉成都府等路茶場熙河市易事手詔李稷風力固已可任然權勢輕小可依李把例兼三司判官仍委權限貟舉劾官吏初蜀茶額錢三十五萬至稷加至五十萬及陸師閔代稷為百萬李稷言一年通計課利錢七十六萬緡上批云蜀茶變法稷能推原法意日就是切宜速遷擢以勸在官元祐初司馬光為相罷諸路鹽鐵法皆復其舊獨川陜茶以邊用未即罷使相視去其任者紹聖中提舉程之邵以羨茶轉入熙秦市戰騎故馬多而茶息厚之邵革黎州買馬之弊嵗以仲秋為市四月止元符末程之邵召對徽宗詢以馬政之邵言戎俗食肉飲酪故貴茶而病于難得願禁治邊鬻茶以蜀産易上乘詔可未幾易馬萬匹並四朝志淳熙五年茶馬呉總以馬政修舉除敷文閣待制自紹興初至是踰四十年間以次對為茶馬者趙開及呉總二人耳成都記在昔元豐留神武備摘山市駿具著科條乃詔攸司悉遵成憲乃將使指實克推行李昌儒制講摘山之利得充廏之良龍溪除起宗制都大提㸃坑冶傳記開元二十五年羅文信充諸道鑄錢使唐㑹要天寶三載楊睿矜除御史中丞充鑄錢使六載楊釗充諸道鑄錢使永泰元年劉晏充東都淮南浙江東西湖南山南東道鑄錢使第五琦充京畿闗内河東劒南山南西道鑄錢使諸鑄錢監所在州府都督刺史為之副監一人上佐判之續通典本朝開寶置錢監于鄱陽既而江淮荆浙閩廣之地皆有監係發運使兼提㸃咸平三年以馮亮為河南轉運副使兼都大提㸃江南福建路鑄錢事供奉官白丞睿同提㸃鑄錢事實録景祐二年始置江浙荆廣福建等路都大提㸃坑冶鑄錢一貟與提㸃刑獄叙官元豐二年増提㸃一貟定為兩司在饒者領江東浙淮七閩在䖍者領江西荆湖二廣焉職畧元祐元年以坑冶鑄錢通為一司㑹要政和七年置提㸃鑄錢官兩貟于饒䖍州紹興二年置䖍州提㸃司六年銜内添都大二字二十六年詔都大提㸃坑冶鑄錢司官吏並罷令逐路轉運司交割二十七年置提領諸路鑄錢官於行在以提領諸路鑄錢所為名二十九年復置官以江淮荆浙福建廣南路提督坑冶鑄錢公事繫銜與運判序官依舊于饒贑二州置司專以措置坑冶督責鼔鑄為職乾道六年併歸發運司七年復置九年兩司分認課額淳熙二年併贑司歸饒州加都大焉掌收山澤之所産及鑄泉貨以給邦國之用嵗有定數視其登耗而賞罰之四朝志朕修山澤之政令以足國恵民天方降休地不愛寶惟是興利之廣幅貟既長必資能臣以持九路之節徐謹制沿挾銅之令以收七福因採山之法用廣五銖胡文恭行葛源制按南州寶冶之饒佐縣官圜府之用宣勞于外興利在公同上主管提幹檢踏本朝紹興二年鑄錢司言本司昨被㫖許置幹辦公事一貟檢踏官五貟催綱官二貟後來與諸司屬官一例減罷縁所𨽻諸州不可闕官詔復置幹辦公事一貟檢踏官三貟催綱官一貟後檢踏置六貟十一年將檢踏官各分認專管職事一貟在饒州本司一貟在信州一貟在建州一貟在韶州一貟在潭州二十六年官吏並罷二十九年再置提㸃官於饒州置主管文字贑州置幹辦公事一貟韶州建州各置檢踏官一貟别置秤銅官催綱官各一貟續詔饒州添檢踏官一貟並中興㑹要提舉市舶史嶺南市舶使周慶立造竒器以進栁澤上書曰慶立雕製詭物造作竒器用淫巧為珍玩以譎怪為異寶乃治國之巨蠧也𤣥宗稱善盧鈞開成三年為廣州刺史南海有蠻舶之利珍貨輻凑舊帥靡不捆載而還鈞性廉潔請監軍領市舶使已一不干預並唐書傳記張公為安南習于海邦琛珍良貨溢于玉府至殊俗異類盈于藁街職林市舶者其利貲㩁金山珠海天子南庫也百蠻之寶五夫之珍每嵗山積市舶録集扶南雜種安西諸國跨險慿危梯山航海飛艎走浪望䑕島而三休大舶參雲指麟洲而一息鳶波象郡萬舳爭先烏滸狼㬻千艘競進張鷟集本朝開寶四年以同知廣州潘美尹宗珂並兼市舶使通判謝處玭兼市舶判官實録咸平二年令杭州明州各置市舶聽藩官從便長編熙寧變市舶法泉人賈海外者往復必使東詣廣否則沒其貨哲宗即位之二年始詔泉州置市舶舊制市舶司多州郡兼領元豐中始令轉運司兼提舉而州郡不復預矣後專置提舉而轉運亦不復預矣後盡罷提舉官大觀元年復置建炎中興詔罷兩浙福建市舶司歸轉運司時政記而廣南如故明年復置中興㑹要紹興二年廢福建提舉市舶初令提刑兼領旋委提舉茶事十二年朝廷措置蠟茶以茶事歸建州而提舉市舶以次復矣乾道三年詔罷兩浙提舉市舶逐處職事委知通知縣監司同行檢視而總其數令轉運司提督均掌蕃貨海舶征𣙜貿易之事所以來逺人通貨物也㑹要向敏中知廣州兼市舶前後守者多渉譏議敏中無所求索清節益著長編侍御史王絲兼市舶提舉舊蕃舶之來十稅其一必擇精者絲令粗精兼取蕃人悦之目為金珠御史㑹稽圗記市舶司言廣州自祖宗以來興置市舶收課入倍于他路㑹要上曰市舶之利最厚若措置合宜所得動以百萬計朕所以留意于此庶幾可以少寛民力耳又曰市舶之利頗助國用宜循舊法以招倈逺人阜通貨賄紹興二十一年李莊除福建提舉上曰提舉市舶司委寄非輕若用非其人措置失當海商不至矣髙祖問張闡舶市嵗入㡬何闡對抽解與和買以嵗計之約入二百萬緡並同上知西外南外宗正司本朝崇熙元年蔡京乞于兩京置外宗正司當擇宗室之賢者管幹逐處各置一人凡外任宗室事不干州縣者外宗政司受理大觀罷政和復續㑹要中興外宗司無定所後南外置司泉州西外置司福州其丞係兼簿係簽判兼紹興府亦有宗司乾道七年省紹興宗司𨽻行在置四川宗司㑹要宗子有文藝行實衆所共知者許宗正考實以聞㑹要爰俾訓齊往分糾正慶元制睦宗院本朝崇寧元年蔡京請宗室非袒免親以下兩世除北京外欲分于西京近輔或沿流便郡居止自西京為始每處置敦宗院差文臣一貟武臣一貟管幹大觀罷政和復續㑹要中興南外居泉州西外居福州光宗改名睦宗院北置院于别都大觀詔所以親睦宗族愛養孤幼崇寧詔宗教史漢元始五年于郡國置宗師以糾皇室親族世氏致教訓焉選有徳義者為之有冤失職者宗師得因郵亭上書漢書晉咸寧三年置宗師使皇室戚屬奉率徳義有所施行必合諮之晉書唐武徳三年詔天下每州置宗師一人以相統攝唐書本朝崇寧初蔡京請置敦宗院又云令置學立師為量試之法大觀元年南敦宗院大學教授張戣以宗子釋褐教養有方特轉一官大觀三年詔曰比置院于别都増學于官邸廩其無禄而教養其未命者累累于兹宗子之在别都或犯朝法吏弗能禁民以為擾師儒之官殆相倍蓰而就學者寡宜有裁適應西京敦宗院官吏並罷政和二年詔曰宗族蕃衍詔有司分食兩京為立廩稍之格由庠序之教朕心無慊焉宣和三年増置西南司敦宗院教授各一貟時又有博士正録中興後唯置宗教㑹要都統史上元初詔郭子儀為諸道兵馬都統領率諸鎮之師徑抵范陽為朝恩所間事竟不行永泰元年以子儀都統河南節度使行營出鎮河中唐書徳宗置六軍統軍秩視六尚書為節制徊翔之地乾符中黄巢大掠江淮宰相王鐸願自率諸軍盪滌羣寇乃拜荆淮南節度使諸道行營兵馬都統並同上傳記晉太元十九年有河西大都統唐天寶末置天下兵馬元帥都統朔方河東北平盧龍節度使都統之名始此乾元元年李峘除都統淮南江東西節度使都統之官始此唐㑹要唐制或總五道或總三道上元末省大中後討徐州以康承訓討黄巢以王鐸為都統分紀黄巢之難置諸道行營都統掌征伐兵罷則省雖總諸道兵馬不賜旌節同上集宜兼領䕶之權副師貞之吉李若幽制執羈霸府盡忠肅之勤誠聳劍元戎罄旌旄之茂績張巡師制折衝之寄符玉帳而總金壇出總戎麾杜佑制分委戎輅作鎮孟津杜牧行李班册授銅符之律王緒制執節鈴以涖衆杜黄裳主持戎律削奪陳敬宣官制權握兵戎董昌制建}
