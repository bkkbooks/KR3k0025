  - {type: variant, offset: 3767, length: 333, content: 射矣晉書本傳宇文泰與侯景戰墮馬失所之左右皆散李穆罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸通監梁武紀互入反鋒而用漢文帝知李廣才而不能用乃嘆其生不逢時唐魏元忠傳本朝唐李程貞元中試日五色賦初出試楊於陵遇程詢其所試於陵謂程曰公今須作狀元翌日無名於陵深不平乃於故冊子末繕寫而斥其名氏攜之以訴主文主文嘆賞不已於陵曰當今場中若有此賦侍郎何以待之荅曰非狀元不可也於陵曰苟如此侍郎已遺賢矣此乃李程所作亟命取李程所納卷對不差一字主文因謀之於陵擢為狀元見東坡與李廌詩注互入轉禍為福五色賦事北夢瑣言亦載新唐書李程傳載程試日五色賦擢進士駕餘皇而索舟策飛黃而問駿鳴道集平時謾說古戰場過眼空迷日五色坡詩子境內之傑不愛而求邦外之士尸子史漢文曰吾不得廉頗李牧為將哉馮唐曰, WYG: ''}
