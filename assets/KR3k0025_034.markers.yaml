  - {type: variant, offset: 4195, length: 2, content: 異聞, WYG: 朝廷矣㑹要建炎教授並罷紹興復置四十二州若試教官則始于元豐添差教授則始于政和慶厯三年臣察言本朝學校興矣未甞設官在泮采芹典教以重其任崇寧四年令教授承務郎以上在本州簽判上選人在本州職官之上政和五年臣寮言見任教授不得為人撰書啓簡牘樂語之類鄒浩調陽州潁昌府教授吕公著范純仁為守獨加禮重純仁常屬撰樂語辭不為純仁曰翰林學士亦作此浩曰翰林學士則可祭酒司業則不可四朝史任諒為懐州教授徽宗見其所作新學碑曰文士也擢提舉蘷路學事紹興十三年宋宙奏乞盡復教官上曰教授須逐州置仍須是擇}
