  - {type: variant, offset: 2472, length: 0, content: '', krp: 秦置監察御史漢省之後復置文帝以御史不奉法乃遣丞相史出刺并督察御史武帝元封五年初置部刺史掌奉詔條察州以六條問事秩六百石居部九嵗舉為守相成帝更為州牧秩真二千石位次九卿哀帝復為刺史天壽復為牧光武復刺史乗傳周行郡國錄囚徒考殿最舊制州牧奏二千石事皆先下三公光武不復委三府故權歸刺舉之史靈帝改為牧魏晉為刺史持節都督庶姓為單車刺史後魏州置三刺史隋開皇三年罷郡以州統縣自是刺史之名存而職廢後有刺史皆太守之互名理一郡而已煬帝罷州置郡置司𨽻臺大夫一人巡察畿内刺史十四人巡察畿外唐罷郡置州神龍二年分天下為十道置巡察使二十人景雲改置按察使開元改置採訪處置使至徳之後改採訪使為觀察并領都團練治于所部之大郡職源分馳郡國督察在位其敷以言錄見囚徒漢官解詁集周以十聨率諸侯若今之廉察白集廉問七州牛僧孺歴居廉鎮崔鈜制泊廉視浙右李徳裕玉節居分陜金貂總上流麾軍時舉扇作賦且登樓年光徧原隰春色滿汀州日華三翼舸風轉七星斿向解青絲䌫將移丹桂舟梁元帝綉衣春當霄漢立杜詩州家申明使家抑韓集堯置州牧四岳持而綱之柳文本朝初有轉運使淳化及景徳増提刑熙寧又置提舉㑹要督刺之寄南豊委節傳分按州郡公是行周沆制分龍節以典州驟歴劇部公是謝表轉運使副判官史楚漢相距滎陽蕭何轉漕關中給食不乏髙祖曰鎮國家撫百姓給饋餉吾不如蕭何漢書光武謂寇恂曰昔髙祖留蕭何鎮闗中吾今委公以河内堅守轉運給足軍粮光武于是北征恂收租四百萬斛以輦車驪駕轉輸前後不絶後漢書諸葛亮出祁山以木牛運由斜谷出以流馬運蜀志裴耀卿充轉運使置河隂集津二門倉引天下租繇盟津泝流而西三年積七百萬石省費三十萬緡唐書劉晏以轉運為己任凡所經歴必究利病運米數千萬石以濟闗中歴代操利柄為國計者莫不損下益上危人自安變法以弄權斂怨以搆禍皆有之矣如劉晏通壅滯任才能富其國而不勞于民儉其家而歸利于衆第五琦促辦應卒民不加賦而國豐饒亦庶幾矣唐書傳記唐先天二年李傑始為水陸發運使開元二十一年裴耀卿充江南淮南轉運使而崔希逸蕭旻為副天寶以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸道轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆始于此五代罷巡院始置轉運使唐㑹要本朝乾徳以後始置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此其轉運使國初但曰勾當某路水陸計度轉運使官髙者曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與判官焉又置同勾當轉運使尋罷諸路副使真宗毎用兵或令都部署兼轉運使王}
  - {type: variant, offset: 2473, length: 1, content: 曠, WYG: 征討則有隨軍轉運使慶厯中皆帶按察之任實錄熙寧二年詔轉運使用本資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常唯使副判官常置紹熙以來使副運判不雙除開寶九年詔諸道官吏宜令轉運使廉訪能否第為三等嵗終以聞當行誅賞李士衡為河北漕真宗幸澶州東封西祀供調百萬億士衡有功焉士衡為河北都運使調發得策列郡有數年之積其餘以濟饑民祥符七年詔曰自今轉運副使不限官品並在提㸃刑獄之上咸平元年上謂輔臣曰諸路轉運使按察官吏使權甚重必須平允之吏寛猛適中卿等其慎擇四年查道請自今轉運使副得替先批書一任曽舉若干廉勤才}
  - {type: page-break, offset: 2473, content: '', id: KR3k0025_WYG_034-6a, image: WYG0930/WYG0930-0744a.png}
  - {type: page-break, offset: 2473, content: '', id: KR3k0025_WYG_034-6b, image: WYG0930/WYG0930-0744b.png}
  - {type: variant, offset: 2473, length: 1, content: 曠, krp: 征討則有隨軍轉運使慶厯中皆帶按察之任實錄熙寧二年詔轉運使用本資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常唯使副判官常置紹熙以來使副運判不雙除開寶九年詔諸道官吏宜令轉運使廉訪能否第為三等嵗終以聞當行誅賞李士衡為河北漕真宗幸澶州東封西祀供調百萬億士衡有功焉士衡為河北都運使調發得策列郡有數年之積其餘以濟饑民祥符七年詔曰自今轉運副使不限官品並在提㸃刑獄之上咸平元年上謂輔臣曰諸路轉運使按察官吏使權甚重必須平允之吏寛猛適中卿等其慎擇四年查道請自今轉運使副得替先批書一任曽舉若干廉勤才}
  - {type: variant, offset: 2475, length: 2, content: 爨薪, WYG: 之士曽按若干貪贓猥濫之人朝廷量其臧否以行賞罰從之吕文靖擢李詢為京西轉運使謂之曰以學士才器髙爽故有此授宜副朝廷之意景祐元年令諸路轉運使副察所部官吏能否分為三等景祐間河北河東陜西三路漕臣賜方勝練鵲錦袍陳堯佐六為運使方嚴清肅使人知畏而重犯法皇祐五年詔轉運之職本以澄清官吏豈可誅求有能盡嵗入以致増盈者留為本路移用毋得進羨實錄哲宗立復以鮮于侁為京東漕司謂人曰以侁之賢不宜使居外顧齊魯之區凋弊已甚須侁為福星救之耳四朝史逺採漢官設刺之使近參唐制考將漕之最胡文恭賦輿衍増分輸錯出同上往總一方之刺督之任張商英出總舟車之餫餉徐彦孚督軍餉朔部唐義問運管運幹集以佐軺車白集本朝熙寧初詔諸路漕司始置屬官勾當兩貟或一貟又置管勾文字實錄元祐中除三路外並罷後復置建炎初避髙廟諱改管勾為主管文字勾當為幹辦公事熙寧中辟唐義問為京西轉運司管當文字神宗因黄好謙領使事諭之曰唐義問風力強敏行且用矣可面詔之四朝史主管帳司本朝熙寧五年詔諸路漕司始置屬官元祐罷管勾文字以帳司兼管後復故㑹要提㸃刑獄公事史暴勝之為直指使者衣繡杖斧以出討盜賊漢書本朝淳化二年遣官分往諸路提㸃刑獄尋消之景徳四年真宗謂王旦曰朕慮四方刑獄官吏未盡得人一夫受冤即召災沴先帝甞選朝臣為諸路提㸃刑獄今可復置仍以使臣副之天禧四年改提㸃刑獄勸農使天聖六年悉罷八年復置嘉祐中罷武臣提㸃刑獄治平元年罷提㸃刑獄而委轉運司職官熙寧二年諸路提㸃刑獄並差文臣十年復置提㸃京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其廉吏以達於朝㑹要宣和初詔廣西江西増置武提刑之貟遇闗帥不許武憲兼攝建炎元年以盜賊未衰諸路無武提刑處權添差一貟專管提刑四年罷之乾道復置武提刑後又罷之中興㑹要慶厯二年詔自今提㸃刑獄朝臣代還列功過三等以聞續㑹要熙寧十年以丁執禮為河北西路使上諭之曰卿職在刑獄盜賊最急宜用捕督髙賦言國家置提刑司蓋欲平反獄訟使民不寃國家惟吏之不平民之失職獄之放紛未能獨察也故設糾度之司使奉欽恤之㫖罷諸路同提㸃刑獄使臣敕督視祥獄田待問按兹祥刑宜得膚使蘇􅒲制操外憲之柄胡文恭讞平犴獄林劭制早稱才名出提憲寄胡宿集提刑司幹官本朝建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許存留文臣一貟㑹要提刑司檢法本朝熙寧六年置諸路提刑司檢法一貟元豐三年罷五年復置四朝史髙賦言自罷武臣以來多止一貟兼河渠盜賊而刑書繁多者閱不給若委之吏則為大弊請逐路置檢法官以專平讞䟽駁本傳熙寧八年詔檢法官今後得隨長官出巡臣寮奏檢法官職專詳讞㑹要提舉常平茶鹽司本朝淳化中建常平倉景祐元年令轉運使司與長吏舉所部官兼領之熙寧遣使提領蓋提舉常平之所始也九年府界亦專置提舉常平倉一貟不令司農丞兼領元祐初置紹聖復置政和改元詔江淮荆浙六路其置茶鹽提舉一貟宣和三年詔河北京東路推行新法鹽鈔可添置提舉一貟此提舉茶鹽之所始也既而諸路皆置建炎元年詔提舉常平司併歸提刑司二年復三年復詔提刑兼四年詔逐路提刑司茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉茶鹽常平等公事為名十五年詔改充提舉常平茶鹽公事等掌常平義倉免役市}
