  - {type: variant, offset: 309, length: 273, content: 史通集余不知服食說自何世起殺人不可計而世慕向之蘄不死乃得速死謂之智可不可也韓文李君墓誌飲藥本攻病毒腸翻自殘韋應物集本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歷數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入自納敗闕子宋人有閔其苗之不長而揠之者芒芒然歸謂其人曰今日病矣予助苗長矣其子趍而往視之苗則槁矣夫助之長者揠苗者也非徒無益而又害之孟子互見徒勞無補繆公之於子思也亟問亟餽鼎肉子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋孟子萬章下南海之帝為鯈北海之帝為忽中央之帝為渾沌鯈與忽時相與遇於渾沌之地渾沌待之, WYG: 殽}
