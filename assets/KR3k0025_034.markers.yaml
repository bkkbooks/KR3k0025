  - {type: variant, offset: 4111, length: 1, content: 功, WYG: 攝但令上佐知州事姚崇為揚州長史政條簡肅人為紀徳于碑並同上傳記秦置郡丞以佐守在邊為長史掌兵馬漢因之于定國條州大小為設吏貟治中别駕諸郡從事秩}
