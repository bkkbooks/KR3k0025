  - {type: variant, offset: 2285, length: 183, content: 似莫耶者唯歐冶能名其種玉工眩玉之似碧盧者唯猗頓不謬其情淮南子識珍者必拾濁水之明珠抱朴子以趙曲為雅聲者唯鐘期不溷其音以燕石為美王者唯猗頓不謬其真以逞賦為麗藻者唯相如不濫其賞劉子史叔孫通初制定禮儀見非於齊魯之士前漢禮樂志美玉蘊於碔砆凡人視之藐焉良工眡之然後知其為和寶也精鍊藏於鐮璞庸人視之忽焉巧冶鑄之然後知其為干將也南史沈約傳斛律金用匈奴法望塵知馬步多少嗅地知軍度遠近北, WYG: ''}
