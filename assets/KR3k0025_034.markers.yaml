  - {type: variant, offset: 4111, length: 1, content: 功, krp: 攝但令上佐知州事姚崇為揚州長史政條簡肅人為紀徳于碑並同上傳記秦置郡丞以佐守在邊為長史掌兵馬漢因之于定國條州大小為設吏貟治中别駕諸郡從事秩}
  - {type: variant, offset: 4113, length: 3, content: 級削爵, WYG: 百石晉因之而省郡丞宋梁以下如之至隋改别駕治中為長史司馬煬帝罷之而置郡贊治後又改為丞位在通守下至唐而郡丞廢矣有長史有别駕别駕以皇族為之開元始通用庶姓以貳都督刺史之職通典漢制從事史一人從刺史行部别乗一乗故謂之别駕孔恂為别駕别駕車舊有屏星如刺史車刺史怒欲去之恂曰撤去屏星毀國舊儀别駕可去屏星不可去蕭遘貶播州司馬道二峽方迫畏不瞑遽有神人曰相公勿憂予為公禦侮遘異之過峽州經白帝祠即所見神人也同上集江州土髙氣清富有佳境刺史守土不逺觀遊郡吏執事不自暇佚惟司馬綽綽可以從容于山水詩酒間於是郡南樓山北樓水湓亭百花亭風篁石岩瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志于吏隠者捨此官何求焉貳藩有職方題别駕與贊郡符才優佐郡大邦端佐並白集半刺上佐得與二千石參校政事短長利病者也杜牧行馬逥制通倅之官朱廣平集通理方州題政佐岳無轉驥之能子昻代表半刺已翺翔杜詩爽氣金天豁清談玉露摶佇鳴南岳鳯欲化北溟鵾贈虞司馬案牘來時惟署字風煙入興便成章劉禹錫本朝藝祖懲五代藩鎮之弊始置諸州通判建隆四年詔知府公事並湏長史通判僉議連書方許行下時大郡置兩貟餘置一貟州不及萬户不置正刺史以上及諸司副使知州者}
