  - {type: variant, offset: 2684, length: 616, content: 張士然表丈人屋上烏人好烏亦好杜詩子庚公名位漸重足傾王公庚公在石頭王公在城忽風起揚塵王公以扇拂之曰元規塵汙人郭子元規庚亮字王公導也又見通鑑傳記憎人甚惡其餘胥說苑立節篇互入遷怒不愛人者盡其咠餘注咠餘里落之壁也尚書大戰篇互入遷怒大傳經夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨書君牙夏日暑雨小民惟曰怨咨音至冬祁寒小民亦惟曰怨記緇衣如彼築室于道謀是用不潰於成詩小旻注人之多言亦可畏也詩將仲子謀夫孔多是用不集詩小旻天地之大也人猶有所憾記中庸天地至大無不覆載人尚有所恨況於聖人能盡備乎子眾議成林無翼而飛三人成市虎一里橈椎淮南子史眾口禍福之門國晉語作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下堯作大章一夔足矣范瞱後漢曹褒傳傳記眾口所毀浮石沈木陸賈新語集若眾口之鑠石楚辭黃金爍眾口李太白譬之於食物至於遐方異味則有嗜者有不嗜者韓文經人之視已如見其肺肝然曾子曰十目所視其嚴乎並禮記大學史欲蓋而章左傳序劉洎曰借使遂良不記天下亦皆記之通監唐書郜鼎在廟章孰甚焉左威二甯殖曰吾得罪於君名藏在諸侯之策左襄二十陳軫曰非獨儀知之也行道之人盡知之矣史本傳互入無隱司馬昭之心路人所知也通鑑晉書集萬目睽睽韓文西子不華嫫女錦縠是不能易其美惡難將一人手掩得天下目並唐文粹子夫以一縷之任繫千鈞之重上懸之於無極之高下垂之於不測之深旁人皆哀其絕而造之者不知其危孔叢子史虞卿料事揣情為趙畫策何其工也及不忍魏齊卒困於大梁庸夫且知其不可況賢人乎史本傳論韓子為說難而不能自脫史記本傳太史公曰, WYG: 平江州治因}
