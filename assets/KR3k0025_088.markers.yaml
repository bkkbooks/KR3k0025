  - {type: variant, offset: 817, length: 3, content: 敢嘗翔, WYG: 余畀也同上本朝投子者投擲之義今或作頭子言骨所成非也有作骰子者骰即股字不音投史記蔡澤說范雎曰博者咸欲大投投瓊也則知以玉名為投擲之義資暇集棊經奕者舉棋不定不勝其耦左傳子奕之為數小數也不專心致志不得也奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳}
