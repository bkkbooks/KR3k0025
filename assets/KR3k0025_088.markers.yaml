  - {type: variant, offset: 14, length: 0, content: '', WYG: 之博戲長行最盛其具有局有子子黒黄各十五擲彩之頭有二其法生於握槊變於雙陸後人新意長行出焉彊名爭勝謂之撩零假借分畫謂之囊家囊家什一而取謂之乞頭國史補貞元中宋清進博經一卷國史纂要天寶中嶺南獻白鸚鵡甚聰慧呼為雪衣女上每與嬪御及諸王博戲上稍}
