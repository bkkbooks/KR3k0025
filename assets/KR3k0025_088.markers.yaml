  - {type: variant, offset: 811, length: 0, content: '', WYG: 賜近從新譜識梟盧擬喚安陽舊博徒只恐分隂閒過了更教人誚牧猪奴雙陸傳記南海獻集翠裘則天以賜張昌宗時狄仁傑入奏事則天命與昌宗雙陸賭之昌宗累局連北狄公對御脫其裘拜恩而出及至光範門遂付家奴衣之促馬而去集異記餘互見賜紫類梁時荆州掾屬雙陸賭金錢盡以金錢花相足魚𢎞謂得花勝得錢雜爼具州潘彦奴雙陸每有所詣局不離身曽泛海遇風船破彦右手挾一板左手抱雙陸局口銜雙陸頭子經二日一夜至岸兩手見骨局終不挫頭子亦在口僉載梁王書曰雙陸乃出天竺涅槃經名為波羅塞戲類要武后自置九勝局形如雙陸其頭加千萬二彩其子三十令文武官分明為此戲同上陸大夫與普願禪師見人雙陸拈起骰子云恁麽不恁麽只恁麽信彩去時如何師拈起骰子臭骨頭十八傳燈錄投子史徐温與劉信博信斂投子祝曰劉信欲背吳願為惡彩茍無二心當成渾化一擲六子皆赤五代史傳記博陸彩名也陳思王置雙陸局置投子二至唐末有葉子之戲遂加投子至六飾四以朱者明皇與貴妃采戰惟重四可轉敗為上擲連呼叱之以投子宛轉而成重四上大恱命髙力士賜四緋也事始張祐客淮南幕中赴宴時杜牧為支使座有美人索投子賭酒牧微唫曰投子逡巡褁手拈無因得見玉纖纖祐應聲答曰但知報道金釵落髣髴還應露指尖摭言有王生與夏侯孜偕遊京西鳯翔連帥館之一日從事有宴召焉酒酣從事以投子祝曰二秀才明年若俱登第當擲堂印王生怒曰吾誠淺薄與夏侯孜同年乎孜及第至宰相王生竟無所聞廣記薛昭遇三美女請擲子遇采强者得薦枕席張雲容采勝同上蜀王建為禁軍都頭與其儕於僧院擲投子六隻次第相重自幺至六人共駭之他日覇蜀北夢瑣言擲投子呪云伊帝彌帝彌靖羅帝念滿十萬遍彩隨呼而成雜爼問和尚年多少師曰始見去年九月九如今又見秋葉黄曰畢竟如何師曰六隻投子滿盆紅傳燈錄集客有以博戲自任者有博齒二異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應朞月視其轉止依以争道是制也通行之久矣莫詳所祖以其用必投擲故以博投詔之是日客抵骨于局且祝}
