  - {type: variant, offset: 1364, length: 407, content: 基可乎鴻感悟垂涕乃還就國通鑑漢明紀以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪通鑑唐德宗集不量鑿而正枘楚辭擇焉而不精語焉而不詳韓文原道經知進退存亡而不失其正易乾卦括囊無咎易坤卦全身遠害王風君子陽陽既明且哲以保其身詩訪落國無道其默足以容記中庸邦無道則愚語公冶長危邦不入亂邦不居語泰伯邦無道危行言孫語憲問邦無道卷而懷之語衛靈公子功成名遂身退天之道出老子魚鼈黿鼉猶以淵為淺而掘其中鷹鳶猶以山為卑而巢其上荀子法行持寵處位終身不厭之術主尊貴之則恭敬而僔卑道也主信愛之則謹慎而嗛興歉同主專任之則拘守而詳謹守戢事主安近之則慎比而不邪荀子仲尼可以保身可以全生可以盡年莊子養生鳥獸不厭高魚鼈不厭深莊子庚桑楚鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患莊子應帝王鴻飛冥冥弋人何慕焉楊子遜于不虞以保天命揚子問明史祭仲以智免左傳子產曰無過亂門左昭十九賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也賓孟曰雞其憚為人用乎左昭二十三生於亂世, WYG: 差數豐}
