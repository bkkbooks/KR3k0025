  - {type: variant, offset: 35, length: 0, content: '', WYG: 持操何由得升彬曰擲五木子十擲輒犍豈復是擲子之拙並同上梁主蕭詧曽獻碼碯鍾周文帝顧丞郎曰能擲摴蒱頭得盧者便與鍾已經數人不得至蒒端乃執摴蒱頭而言曰非為此鍾可貴但思露其誠耳便擲之五子皆黒文帝恱即以賜之北史周文帝解所服金帶令諸人徧擲曰}
