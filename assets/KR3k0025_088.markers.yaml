  - {type: variant, offset: 166, length: 353, content: 六亡羊而補牢戰國策子胥不蚤見主之不同量是以至於入江而不化史樂毅傳不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎史呂不韋傳張耳曰吾聞天與不取反受其殃咎通鑑秦紀本無殃字張良陳平說曰漢有天下太半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也通鑑漢高祖互入投機晁厝為內史東出不便更穿一門南出南出者太上皇廟堧垣也申屠嘉請誅厝厝恐夜入宮上謁上曰厝所穿非真廟垣故冗官居其中且又我使為之嘉謂長史曰吾悔不先斬厝乃請之為厝所賣通鑑漢文紀張良曰不因其幾而取之所謂養虎自遺患也前漢高紀袁紹多謀少決失在後事通鑑漢獻紀所謂一日縱敵患在數世也通鑑三國魏文初劉備在許與曹公共獵獵中眾散關羽勸備殺公備不從及至夏口飄颻江渚羽怒曰往日獵中若從羽言可無今日之困蜀志羊祜曰當斷不斷天與不取豈非更事者恨於後時哉晉書本傳互入懲創集差池一步一生休, WYG: 載荒郊任博徒挼莎五木擲梟盧}
