  - {type: variant, offset: 2748, length: 880, content: 萬以施宗族晉書阮籍本有濟世志屬魏晉之際天下多故名士少有全者由是不與世事遂酣飲為常晉書本傳互入知幾後周于謹自以久當重權功名既立願保優閑乃上先所乘駿馬及所著鎧甲等北史本傳互入知幾侍中謝朏求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹為書曰可力飲此勿豫人事通鑑齊高宗王晏外弟尉氏阮孝緒亦知晏必敗晏屢至其門逃匿不見嘗食醬美問知得於晏家吐而覆之通鑑齊高宗互入遠慮楊慎矜知御史中丞事時李林甫專權公卿之進有不出其門者必以罪去之慎矜由是固辭不敢受通鑑唐元宗上就李泌飲酒同榻而寢泌曰臣今報德足矣復為閑人何樂如之上曰柰何遽欲去乎泌曰臣有五不可留願陛下聽臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太高跡太奇此其所以不可留也通鑑唐肅宗郭子儀為上將擁強兵程元振魚朝恩讒謗百端詔書一紙徵之無不即日就道由是讒謗不行通鑑唐德宗郭子儀遭讒惎奪兵柄朝聞命夕引道無纖介自嫌全身高節爛然獨著唐書郭子儀贊互入無愧裴度晚節頗浮沉為自安計唐書本贊蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊讒間將興繕甲訓士非吾輩之所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已通鑑後梁均王互入遠慮魏公子無忌自知再以毀廢乃謝病不朝與賓客為長夜飲飲醇酒多近婦人日夜為樂飲史本傳傳記司馬徽居荊州以劉表必有變思退縮以自全每與語但言佳其妻責以無別徽曰如汝所言亦復甚佳終免于難襄陽記孔鳥愛羽虎豹愛爪所以輔其身也說苑王允之年在摠角為從伯敦所知嘗夜宴允之辭醉眠在別床敦與鳳謀逆允之悉聞其語便於眠處大吐敦以為大醉不復疑晉中興書互入穎悟集鸞鳳翔於蒼雲兮故繒繳不能加蛟龍潛於旋淵兮身不挂於網羅知貪餌而近死兮不如下游於清波全命避害不受世患並楚辭鳳鳴高岡以遠罻羅選陳琳檄不懷寶以招害不飾表以招累張華鷦鷯賦游必擇地翔而後處不入陷阱不離網罟西涼武王麒麟頌蕭條兩翅蓬蒿下縱有鷹鸇柰爾何李白集宿鳥擇深枝潛魚不銜鉤走鹿無反顧短翮惟願巢深叢並杜詩螻蟻謀深穴鳥得辭籠不擇林並白傳集冥鴻不下非吾意杜牧之常恐性坦率失身為杯酒近辭痛飲輩折節萬夫後杜工部青雲上了無多路卻要徐驅穩著鞭白侍郎本朝黠蠶不作繭未老輒自僵永謝湯火厄冷然超無方東坡詩, WYG: 八}
