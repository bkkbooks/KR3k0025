  - {type: variant, offset: 19, length: 0, content: '', krp: 飛局中鼓翼以亂之譚賔錄肅宗與張良娣打博子聲聞于外鄴侯因言及上遂潛令刻乾樹鷄}
  - {type: variant, offset: 21, length: 9, content: 孫憂語季氏互入噬臍, WYG: 不欲有聲良娣尤怨鄴侯家傳桓宣武家貧求救於袁躭躭時居艱迺變服懐布㡌隨温去與債主戲躭素有藝名債主就局曰汝故當不辦作袁彦道耶遂共戲十萬一擲直上百萬數投馬絶叫旁若無人擲布㡌仍對人曰汝竟識袁彦道不世說集箆敝象棊有六博些分曹並進遒相迫些成梟而牟呼五白些楚辭六博争雄好采來金盤一擲萬人開李白有時六博快壯心遶床三匝呼一擲五木思一擲如繩繫窮猿連呼五白行六博分曹賭酒酣馳暉並同上咸陽客舍一事無相與博塞為歡娛慿陵大叫呼五白袒跣不肯成梟盧杜詩昨夜雙鉤敗今朝百草輸關西狂小吏惟喝遶床盧李義山本朝盡日閒窓賭選遷小姓争覔倒盆錢上籌争占蓬萊島一擲乗鸞出洞天王禹玉竟識彦道否絶叫呼百萬東坡摴蒱史陶侃領荆州刺史諸叅佐或以談戲廢事者乃命取其酒器蒱博之具悉投之於江將吏則加鞭撻曰摴蒱者牧猪奴戲耳晉書劉裕於東府聚摴蒱大擲餘人並黒犢唯裕及劉毅在後毅次擲雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳裕因挼五木曰老兄試為卿答即成盧焉劉毅家無擔石之儲一擲百萬並同上劉毅好摴蒱宋武帝與毅斂局各得半積錢毅呼帝併之先擲得雉帝良久答之擲得盧謂帝曰知公不以大坐席與人鄭鮮之大喜徒跣繞床大叫毅甚不平曰此鄭君}
