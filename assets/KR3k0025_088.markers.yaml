  - {type: variant, offset: 977, length: 0, content: '', WYG: 博擊三秋兵鴈行布陣衆未曉虎穴得子人皆驚劉禹錫山僧對棋坐局上竹隂清映竹無人見時聞子下聲白樂天對面不相見用心如用兵筭人常欲殺顧已自貪生得勢侵天逺危行打刼贏有時逢敵手當局到深更杜荀鶴本朝太宗時待詔賈𤣥侍上棋太宗饒三子𤣥常輸一路太宗知其挾詐乃曰此局汝復輸我當榜汝旣而滿局不生不死太宗曰汝亦詐也更圍一局汝勝賜汝緋不勝當投汝於泥中旣而不勝不負太宗曰我饒汝子今而局平是汝不勝也命左右抱投之水乃呼曰臣握中尚有一子太宗大笑賜以緋衣荆公詩注吕相留守東都公退必手談會有文簿公罷棋發遣歘見棋者易一子公明日謝客束帛遣之芝田錄林和靖每曰逋世間事皆能之唯不能擔糞著棋黒客揮犀李重恩奕棋與人對奕坐而昏睡人精思久之方下一子重恩開目隨手應之皆出人意表李巖老好睡衆人食飽下棋巖老輒就枕閱數局乃一展轉云我始一局君幾局矣東坡曰巖老常用四脚棋盤著一色黒子昔與邊韶敵手今被陳搏饒先著時自有輸贏著了並無一物腹心受害誠堪懼唇齒生憂尚可醫康節飛雹落文楸山谷彈棊傳記漢成帝好蹙鞠羣臣以為非尊者所宜劉向為彈棋以獻小說彈棋魏宫中用裝器戲也文帝善彈棊能用手巾角時一書生又能低頭以所冠葛巾撇棋世說魏戲法先立一棊於局中餘者間白黒圍繞之同上集莫近彈棊局中心最不平李義山彈棋玉指兩參差背局臨虛鬬打危先打角頭紅子路上三金字半邊垂王建宫詞房生直温與余二弟遊皆好學余病其確也思所以休息之者得木局隆其中以䂓焉其下方以直置棋二十有四貴者半賤者半用朱墨以別焉旣而抵戲者二人則}
