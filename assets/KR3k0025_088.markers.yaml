  - {type: variant, offset: 923, length: 3, content: 六馬慶, WYG: 吳之荒淫驕虛宜亟討之晉書苻堅率衆百萬攻淮淝謝安無懼色旋命駕出圍棋賭別墅至夜乃還指授將帥各當其任旣而兄子𤣥破堅有驛書至安方對圍棋看書了無喜色棋如故客問之徐答云小兒輩已破賊王導嘗與子恱奕棋争道導笑曰相與有𤓰葛那得為爾邪王恬善奕棋為中興第一並同上宋明帝與王抗圍棋每假借之曰皇帝飛棋臣抗不能斷上終不悟好之愈篤通鑑羊𤣥保與宋文帝奕棋賭郡𤣥保戲勝補宣城太守南史琅邪王抗第一品吳郡褚思莊會稽夏赤松第二品齊髙帝使思莊與王抗交賭自食時至日暮一局始竟謝𢎞微性寛博末年與友人棋友人西南棋有死勢傍一客曰西南風急友悟乃救之𢎞微大怒投局}
