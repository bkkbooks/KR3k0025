  - {type: variant, offset: 2495, length: 184, content: 矣乃絕跡於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮受刑者數百人唯蟠超然免於疑論後漢申屠蟠傳或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也後漢郭太傳雲中白鶴非鶉鷃之網所能羅也魏志邴原傳北海王袞謹慎好學文學防輔遂具表稱陳袞美袞聞之大驚懼責讓文學曰脩身自守常人之行耳而諸君乃以上聞是適所以增其負累也通鑑三國魏又互入遠慮少府蒯欽楊駿之姑子也數以直言犯駿它人皆為之懼欽曰, WYG: 叅政}
