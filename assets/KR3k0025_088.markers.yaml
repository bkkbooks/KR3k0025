  - {type: variant, offset: 972, length: 0, content: '', WYG: 記堯造圍棋以教子丹朱或云舜以子商均愚故作圍棋以教之博物志人能盡數天星則徧知棋勢述戈集取蛻龍牙一枚手握之臨局自然機變横出李參棋談王積薪夢青龍吐棋經九部授已其藝頓精棋訣王積薪寓宿山中但有姑婦夜䦨忽}
  - {type: page-break, offset: 972, content: '', id: KR3k0025_WYG_088-10b, image: WYG0932/WYG0932-0636b.png}
  - {type: variant, offset: 972, length: 0, content: '', krp: 記堯造圍棋以教子丹朱或云舜以子商均愚故作圍棋以教之博物志人能盡數天星則徧知棋勢述戈集取蛻龍牙一枚手握之臨局自然機變横出李參棋談王積薪夢青龍吐棋經九部授已其藝頓精棋訣王積薪寓宿山中但有姑婦夜䦨忽}
  - {type: variant, offset: 973, length: 0, content: '', WYG: 姑與婦曰良宵無以為適與子敵棋共子下三十六子姑曰子已敗矣吾止勝九枰耳積薪遲明問之姑始令案局置子因指示攻守殺奪救應防拒之法曰已無敵於人間矣述異記信安郡石室山晉時王質伐木見數童子棋視斧柯爛盡旣歸無復時人同上一行本}
  - {type: variant, offset: 973, length: 0, content: '', krp: 姑與婦曰良宵無以為適與子敵棋共子下三十六子姑曰子已敗矣吾止勝九枰耳積薪遲明問之姑始令案局置子因指示攻守殺奪救應防拒之法曰已無敵於人間矣述異記信安郡石室山晉時王質伐木見數童子棋視斧柯爛盡旣歸無復時人同上一行本}
  - {type: variant, offset: 974, length: 0, content: '', WYG: 解棋觀王積薪一局遂與之敵笑曰此但争先耳若念貧道四句乗除語則人為國手雜爼日本國王子來朝王子善棋上勅待詔顧師言對手王子出}
  - {type: page-break, offset: 974, content: '', id: KR3k0025_WYG_088-11a, image: WYG0932/WYG0932-0636c.png}
  - {type: variant, offset: 974, length: 0, content: '', krp: 解棋觀王積薪一局遂與之敵笑曰此但争先耳若念貧道四句乗除語則人為國手雜爼日本國王子來朝王子善棋上勅待詔顧師言對手王子出}
  - {type: variant, offset: 975, length: 1, content: 親, WYG: 楸玉棋局冷暖玉棋子言本國有手譚池池中出玉子自然黒白分為冬温夏冷故謂之冷暖玉更産如楸玉狀類楸木師言與之敵手至三十三子即謂之鎮神頭解兩征勢也杜陽編王中郎以圍棋是坐隠支公以圍棋為手談世談石晉陳保性極鄙吝每與人奕棋敗則手亂棋局懼所賭金錢不欲償也續世說李杓值與人棋而敗乃竊數子嚥之反呼尋問乃鼓局大怒棋天洞覽徐峯善棋段成式欲窮其術峯曰子若以墨狻猊與我當令子過我十倍大唐龍髓記集所志不出一枰之上所務不過方罫之間文選圓奩象天方局法地圍棋賦文楸方罫花參差心算未成星滿池温庭筠一木之枰孰與方國之封枯棋三百孰與萬人之將韋曜論初疑磊落曙天星次}
  - {type: page-break, offset: 975, content: '', id: KR3k0025_WYG_088-11b, image: WYG0932/WYG0932-0636d.png}
  - {type: variant, offset: 975, length: 1, content: 親, krp: 楸玉棋局冷暖玉棋子言本國有手譚池池中出玉子自然黒白分為冬温夏冷故謂之冷暖玉更産如楸玉狀類楸木師言與之敵手至三十三子即謂之鎮神頭解兩征勢也杜陽編王中郎以圍棋是坐隠支公以圍棋為手談世談石晉陳保性極鄙吝每與人奕棋敗則手亂棋局懼所賭金錢不欲償也續世說李杓值與人棋而敗乃竊數子嚥之反呼尋問乃鼓局大怒棋天洞覽徐峯善棋段成式欲窮其術峯曰子若以墨狻猊與我當令子過我十倍大唐龍髓記集所志不出一枰之上所務不過方罫之間文選圓奩象天方局法地圍棋賦文楸方罫花參差心算未成星滿池温庭筠一木之枰孰與方國之封枯棋三百孰與萬人之將韋曜論初疑磊落曙天星次}
