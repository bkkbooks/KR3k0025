  - {type: variant, offset: 1828, length: 346, content: 危國然卒免刑戮者以其言正也史本贊秦始皇使王剪伐蜀請美田宅園池甚眾或曰將軍之乞貸甚矣剪曰秦王怚音粗而不信人今空秦國甲士而專委我我不多請田宅為子孫之業以自堅固令秦王坐而疑我矣史本傳蘇秦說燕王曰臣居燕不能使燕重而在齊則燕重通鑑周紀聞大王有意督過之脫身獨去史項羽紀張耳以智全史本贊張良入謝曰沛公不勝杯杓不能辭通鑑漢高紀箕子佯狂接輿避世史鄒陽傳願棄人間事欲從赤松子遊耳史張良傳呂須數讒陳平於呂后曰丞相不治事日飲醇酒戲婦人人一作女平聞日益甚漢書李邑盛稱班超擁愛妻抱愛子安樂外國無內顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻通鑑漢章紀梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變姓名為吳市門卒云通鑑漢平紀北海逄萌謂友人曰三綱絕矣不去禍將及人即解冠掛東都城門歸將家屬浮海客於遼同, WYG: ''}
