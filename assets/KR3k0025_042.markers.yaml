  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷四十二宋潘自牧撰性行部全德經州閭鄉黨稱其孝兄弟親戚稱其慈僚友稱其弟執友稱其仁交逰稱其信記曲禮上致廣大而盡精㣲極髙明而道中庸記中庸言滿天下無口過行滿天下無怨惡孝經子曰君子不器語為政互入不可比喻子君子貧窮而志廣富貴而體恭安燕而血氣不惰勞勌而容貌不枯怒不過奪喜不過予荀修身史徳至矣哉如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣左襄二十九年徳人無累西漢賈誼傳德重山岳東漢仲長統事四朝以全徳始終唐書裴度傳直不近禍亷不沽名唐書栁玭傳集美冒衆流楚辭兼資九徳總修百行陳太丘碑始終三朝無玷可磨唐吕温作李英公賛山之大者匿峰巒含氣象積髙無倪而不見其險孕粹育物而不知其神此其所以為大也徳之全者毀方圭黜皎厲靈機密運而智不驚愚遐標特立而迹無變俗此其所以為全也然則太山髙則可陟全徳近而難知吕温文虚懐泛愛而涇渭不雜真率徑盡而應變無窮張説通塞若水變化若龍動之謂道非可以一善稱非可以一行目皇甫湜互入不可比喻本朝剛毅正直而守之以寛忠恕仁厚而發之以義東坡上韓太尉書君子安身崇徳如山嶽之鎮開物成務如江河之流東坡賜文彦博不允答器業崇深不言而四方自服道徳髙妙無為而庶務以成蘇子由賀文侍中啓小有才經好行小慧謂小小之才語衞靈公斗筲之人何足算也語互入小器子其為人也小有才未聞君子之大道也則足以殺其軀而已矣孟盡心下史國之亂臣家之敗子才有餘而徳不足以至扵顚覆者多矣通鑑周紀求斗筲之才西漢谷永傳察察小慧類無大能後漢韋彪傳論書畫辭賦才之小者通鑑漢靈紀費禕曰楊儀魏延牧豎小子也蜀志董允傳魏崔浩曰纎利小才不能成大功通鑑宋太祖紀夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免有敗通鑑唐太宗王勃等雖有才而浮躁衒露唐裴行儉傳小器經管仲之器小哉語子曰斗筲之人何足算也語子路互入小有才子小夫之知不離苞苴竿牘荘列禦寇有盛雲濃霧之勢而不能乗逰者螾螘之材也韓非難勢史小智自𢎞賤彼貴我西漢賈誼傳九江王至漢漢王方踞牀洗足召布大怒悔欲自殺及出就舎帳御飲食從官皆如王居布又大喜過望通鑑漢髙紀馬援曰朱㪍小器智盡此耳後漢馬援傳駑馬戀棧豆通鑑三國志食垂餌者皆小魚唐書楊綰傳集蚉䖟終日經營不能越階序文選四子講徳論互入力所不及盤盂小器文選銘推得失去就扵方寸銖黍間杜牧之互入瑣細本朝有小丈夫得一金櫝而藏諸家拒户而守之嗚呼是求不失非求冨也老泉文桑蠶作繭自纒裹蛛蝥結網工遮邏黄魯直詩醯雞甕裏天幾大同上不才經無所取裁語子此木以不才得終其天年荘山木懐空抱虛有似蜀人瓠壺之喻胷中無一紙之識不過酒炙所謂冒於貨賄貪於飲食左氏所載不才之子抱朴子互入所學史帝鴻氏有不才子掩義隠賊好行凶徳醜類惡物頑嚚不友是與比周謂之渾敦左文公十八年顓頊氏有不才子不可教訓不知話言告之則頑舎之則嚚傲狠明徳以亂天常謂之檮杌少皞氏有不才子毀信廢忠崇飾惡言靖譛庸回服讒蒐慝以誣盛徳謂之窮竒縉雲氏有不才子貪於飲食冒於貨賄侵欲崇侈不可盈厭聚斂積實不知紀極謂之饕餮左文十八年天姿自然經不聞亦式不諫亦入詩思齊天生蒸民有物有則民之秉彛好是懿徳詩烝民人生而静天之性也記樂記君子不矜而荘記表記生而知之者上也語季氏子孔子曰少成則天性也習慣若自然也家語七十二弟子解丹漆不文白玉不雕何者質有餘者不受飾故也家語仁義禮智根於心其生色也晬然見於面盎於背孟盡心下人之所不學而能者其良能也所不慮而知者其良知也孟人無有不善孟告子上互入人人有分惻隠之心羞惡之心是非之心辭讓之心人皆有之孟或問甘羅之悟吕不韋張辟疆之覺平勃皆以十二齡曰茂良不必父祖楊重黎注甘羅茂之孫張辟疆良之子天才自然不假父祖互入無種白玉不雕美珠不文質有餘也淮南互入不待矯揉石生而堅蘭生而芳淮南鴻不學飛飛則冲天驥不學行行則千里傅子史生有嘉聞左不修文學而性明達前漢髙祖紀少成若天性習慣如自然前漢賈誼傳良玉不琢無異於達巷黨人不學而自知也前漢董仲舒傳器範自然標準無假三國名臣序或謂秦宓曰足下何故揚文藻見瓌穎乎宓曰虎生而文炳鳯生而五色豈以五采自飾畫哉天性自然也蜀志天質不雕合扵大朴晉書王湛等傳嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳯姿天質自然晉書不學孫吳而暗與之合晉山濤傳傳記鳯凰生而有仁義之意大戴禮保傅篇雕之不増文磨之不加瑩氣質貞正稟性自然魏文士傳互入不待損益得諸襟府非由染習史通似特受異氣稟之自然非積學所能致也嵇康養生論集芳華自中出楚辭天然生知姿杜詩如鶴雛襹褷未有六翮而步舒視逺戛然唳天非泥滓間物劉賓客互入警敏天授神敏性能無師同上松栢生深山無心自貞直盧仝詩朱絃遺音而宫商自韻大玉不琢而精采溢發吕公叔文虎豹之文不得不炳於犬羊鸞鳳之音不得不鏘於烏鵲金玉之光不得不炳於瓦石非有意先之也乃天然也皇甫湜匹庶賤陋循習淺下性非文字所導生與耒耨為業而能鍾彼醇孝超出古列栁文孝門銘本朝美不待追琢歐公集韓魏公范文正公皆是天資不由講學上蔡語録出類經翹翹錯薪言刈其楚詩子麒麟之於走獸鳯凰之於飛鳥太山之扵丘垤河海之於行潦類也聖人之扵民亦類也出乎其類拔乎其萃孟公孫丑上好書者衆矣而蒼頡獨稱好稼者衆矣而后稷獨傳荀子史鐵中錚錚庸中佼佼也後漢劉盆子傳桂林之一枝崑山之片玉晉郄詵傳王敦曰夷甫處衆中如珠玉在瓦石間晉書嵇紹扵稠人中昻昻然若野鶴之在雞羣晉書本傳謝琨風流為江左第一晉書謝晦傳沈演之家世為武弁至演之折節好學宋書人中之龍宋殷鐵傳文宗謂李程曰髙飛之翮長者在前卿朝廷羽翮也唐書本傳竇威家世勲貴諸昆弟並向武藝而威耽翫文史介然自守諸兄謂為書癡唐書集亭亭物表文選北山移文冠倫魁能揚雄甘泉賦有同類而殊能者故力稱烏獲捷言慶忌勇期賁育司馬相如疏絶唱髙蹤久無嗣響謝靈運互入寡和逸羣之骨拔俗之標陳子昻集有才繼騷雅哲匠莫比肩杜詩絶類離倫韓文進學解聖賢者時人之耳目韓文清居市不為市之行栁文宋清傳粲焉如繁星麗天而芒寒色正人望而敬者五行而已劉賓客序栁文市井生而雲鶴性劉賓客萬人頭上見儀形同上秀出儕輩劉禹錫人倫之落落士林之楚楚李元賓公侯子弟多溺扵驕邪能讀書學文自可嘉奨白侍郎集技癢者出扵羣藝成者推於衆白樂天衆花盡處松千尺羣鳥喧時鶴一聲髙達夫顧後絶配瞻前無鄰唐文粹粹然立於千仭之表以嶽長羣山猶人之有聖賢草木之有松蘭百川之有河海鱗羽之有虬鸞同上五行秀氣得之居多者為雋人吕和叔仲尼聖賢之宗也師聃道徳之祖也李文饒本朝萬木寒癡睡不醒惟有此樹先萌芽乃知此為最靈物宜其獨得天地之英華歐公茶詩百鳥而一鶚羣獸出麟角歐公顔魯公書雄秀獨出一變古法如杜子美詩格力天縱奄有漢魏晉宋風流後之作者難復措手東坡書唐六家書後詩至於杜子美文至扵韓退之書至扵顔魯公畫至於吳道子而古今之變天下之能事畢矣東坡書呉道子畫後一尾追風抹萬蹄坡詩於愛欲泥如蓮生塘處水超然出泥而香黄魯直詩蓮生於泥中不與泥同調同上天資素惡經下愚不移語子凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者螫有蹄者跌喜而相戲怒而相害天地之性也淮南虎能雄猛不可以託麑鷹能飃擊不可以寄雛秦子史夫性惡之民民之豺狼雖得放宥之澤終無改悔之心東漢王符傳互入稔惡國狗之瘈無不噬也左傳記鳥之美羽勾啄者鳥畏之魚之侈口垂膄者魚畏之人之利口贍辭者人畏之韓詩外傳集譬猶􅑹卵始生翰毛而便陸梁放肆陳琳檄志期害物隂妬潜狙汝之稟受若是雖欲為龜與螾焉可得已凡汝之為惡非樂乎此縁形役性不可自止栁罵蝮蛇鴟梟不鳴未為瑞鳥唐吕尚文醜性毒行唐文粹丹朱商均為堯舜子夫生扵堯舜之世被其化皆為善人况生扵其室親為父子蒸不能潤灼不能熱是其惡與堯舜之善等耳杜牧之集本朝小人雖㣲弱之時未嘗無害君子之心程易姤卦解節操經如竹箭之有筠也如松栢之有心也記禮器子曰事君可貴可賤可富可貧可生可殺而不可使為亂記表記志士仁人無求生以害仁有殺身以成仁語衛靈公嵗寒然後知松栢之後凋也語子罕可以託六尺之孤可以寄百里之命臨大節而不可奪也語泰伯見危授命語憲問子守志厲操者儀之則可以崇髙節抗浮雲孟序身死而名彌白荀不苟史宋大司馬崛節以死左子産曰茍利社稷死生以之左昭四年楚熊宜僚不為利諂不為威惕左哀十六年守節不摇國語蒙恬曰自吾先人及至子孫積功信扵秦三世矣今臣将兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教以不忘先帝也乃吞藥自殺通鑑秦記楚地皆降漢獨魯不下史記項羽紀蘇武既徙北海上單于使李陵至海上為武置酒設樂因請武曰足下兄弟二人前皆坐事自殺來時太夫人已不幸子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此武曰自分已死久矣王必欲降武請畢今日之驩效死於前陵見其志誠喟然歎曰嗟乎義士陵與衞律之罪上通於天因泣下霑衿與武訣去武留匈奴凡十九嵗始以强壮出及還鬚髮盡白通鑑漢昭記翟義曰死國埋名可以不慙於先帝通鑑漢平紀莽安車駟馬迎龔勝勝對曰豈以一身事二姓下見故主哉通鑑漢平紀校尉太原温序為隗囂将苟宇所獲字曉譬數四欲降之序大怒叱宇等曰虜何敢迫脇漢将因以節撾殺數人宇衆争欲殺之宇止之曰此義士死節可賜以劒序受劒銜鬚扵口顧左右曰既為賊所殺毋令鬚汙血遂伏劒而死通鑑漢光武楊彪以累世為公卿恥為魏臣稱疾續漢書雖死之日猶生之年也東漢陳元傳事雖百行操業萬殊至扵義節百行之冠冕也蜀姜維傳龎徳罵闗公曰我寧為國家鬼不為爾将也魏志志烈秋霜精貫白日晉忠義傳重義輕生亡軀徇節白刃可陵正心難折晉忠義賛守鉄石之深忠厲松筠之雅操見正心扵嵗暮標勁節於南風赴鼎鑊其如歸履危亡而不顧晉忠義傳勁松方操嚴霜比烈晉書忠義傳賛秦王堅歎曰周孟威不屈扵前丁彦達潔已於後吉祖沖閉口而死何晉氏之多忠臣也通鑑晉武記魏帝禪位于晉司馬孚拜辭執帝手流涕歔欷不自勝曰臣死之日固大魏之純臣也晉世祖記楊盛聞晉亡不改義熙年號謂其子𤣥曰吾老矣終為晉臣通鑑南史宋髙祖記陶潜自以髙祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題其年月義熙以前明書晉氏朝號自永初以來甲子而已南史本傳先軫喪元王蠋絶脰殞身殉義前代多之北史魏志露竹霜松故多勁節北史節義傳唐王之入闗張季珣之弟仲琰弟琮兄弟三人皆死國難時人愧之通鑑唐髙祖風霜其操鉄石其心同上李希烈留顔真卿不遣朱滔王武俊田悦李納各遣使詣希烈上表稱臣希烈召顔真卿示之真卿叱之曰汝知有罵安禄山而死顔杲卿乎乃吾兄也吾年八十知守節而死矣希烈乃使甲士十人守真卿於館舎掘坎於庭云欲坑之真卿怡然見希烈曰死生已定何必多端亟以一劒相與豈不快公心事耶希烈乃謝之通鑑唐徳宗記朱泚反徳宗使段秀實徃泚召秀實議事語至僣位秀實奪源休笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反耶遂擊之泚舉臂捍笏中顙流血新唐書段秀實傳顔杲卿嗔罵安禄山曰我世唐臣守忠義恨不斬汝謝上乃從汝反邪禄山不勝怒忿節解以肉噉之罵不絶唐書本傳巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也唐書張巡傳賛朱泚反諸生将從亂何蕃正色叱不聽故六館無受汙者唐何蕃傳互入人心屈突通口與心誓以死許國自摩其頸曰要當為國家受人一刀耳唐書身可殺而名不可死終始一操雖頺嵩岳不吾壓也唐書忠義傳躬可殞而名與嵩岱等矣唐書張鎰傳毅然之氣折而不沮唐書段秀實傳集守節没齒忠莫至焉文選賦序互入忠鯁志烈秋霜心貞崑玉梁劉峻辨命論壯志凌蒼兕精誠貫白虹駱賔王集血三年而藏碧魂一變而成虹貞心凌晩桂勁節掩寒松同上非稟乾坤之秀氣含宇宙之淳精孰能負凌雲暴日之姿抱積雪封霜之骨同上清風蕩萬古跡與星辰髙李太白集澗松抱節幽蘭有薫嵗寒不變無人亦芬歐陽詹傳清標霜潔馨徳蘭薫柳文涇卒之亂公以變起卒遽盡室奔匿終南賊徒訪公所在追以相印公變名氏以紿之賊平公初名載至是奏請改命以滌偽署之汙飲氷徇節栁文劒共丹誠在劉長卿操烈寒松心横勁草張説之英標激俗峻節凌霜司空表聖秉志潔於瑾瑜皮日休刺心自明刎頸見志白樂天重義如泰山輕生如鴻毛負刺謹身履氷勵節捐軀之鬼死節之骨並同上憤容凌鼎鑊公議動朝廷温飛卿節操凌霜而不凋杜牧之髙節不知塵土辱蘇子由英烈經有殺身以成仁語子藺相如雖千載死人凜凜常如有生氣郭子史燕太子丹見田光曰燕秦不兩立願留意也光曰臣所善荆軻可使也太子曰願勿泄光見荆軻曰言足下於太子也太子告光曰勿泄是疑光也夫為行使人疑之非節俠也欲自殺以激荆軻曰願足下言光以死明不言也遂自刎而死史記伍子胥窘於江上道乞食志豈嘗須臾忘郢耶故隠忍就功名非烈丈夫孰能致死哉史記互入堅忍不拔伍子胥諫吳王吳太宰嚭讒之吳王賜劒死子胥乃告其舎人曰必植吾墓上以梓令可以為器而抉吾眼掛吳東門之上以觀越冦之入滅吳也乃自刎死史記彭越嘗與欒布㳺彭越反梟頭於洛陽詔曰有敢收視者輒捕之布奏事彭越頭下祠而哭之吏捕以聞布曰彭越已死臣生不如死請就烹史記豫讓事智伯智伯滅讓挾匕首刺襄子襄子釋之頃之漆身為厲吞炭為啞行乞扵市曰所以為此者将以愧天下後世之為人臣懐二心以事其君者也頃之襄子嘗出讓伏橋下馬驚襄子乃數讓讓曰臣固伏誅望請君之衣而擊以致報讎之意則死不恨襄子持衣與讓讓拔劒三躍而撃之曰吾可以下報智伯矣史記互入堅忍不拔燕入齊聞畫邑人王蠋賢謂蠋曰吾以子為将封子萬家蠋曰忠臣不事二君貞女不更二夫與其生而無義固不如烹遂經其頸於樹枝自奮絶脰而死史記田單傳賛秦王令趙王鼓瑟藺相如曰聞秦王善為秦聲請奉盆缻秦王以相娛樂秦王怒不許相如進缻因跪請曰五步之内請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王為一撃缻相如顧趙御史書曰某年月日秦王為趙王撃缻史記魯仲連聞秦為帝曰連有蹈東海而死耳吾不忍為之民也同上藺相如奉璧奏秦王視秦王無意償趙城乃曰璧有瑕請指示王王授璧相如持璧却立倚柱怒髪上衝冠曰大王必欲急臣頭今與璧俱碎於柱矣相如持璧睨柱欲以撃柱秦王恐其破璧乃辭謝同上曹沬執匕首刼齊桓公盡歸魯之侵地史記刺客本傳聶政刺殺韓相俠累因自反面抉目自屠出腸以死史記荆軻見樊於期曰秦之遇将軍厚矣父母宗族皆為戮沒今聞購将軍首金千斤今有一言可以解燕國之患報将軍之讎願得将軍之首以獻秦王秦王必喜臣左手挹其袖右手揕其胷将軍之讎報矣樊於期偏袒扼腕曰此臣之日夜切齒腐心也今乃得聞教遂自刎同上項王留沛公飲亞夫令項荘以劒舞撃沛公張良見樊噲曰今日事甚急噲請入與之同命即入軍門側盾撞衞士仆地遂入披帷立瞋目視項王頭髪上指目眦盡裂項王問客何為者張良曰沛公之參乗樊噲也王曰壮士賜斗酒噲立而飲之賜一生彘肩噲覆盾於地加彘肩上拔劒切而啗之王曰壮士能復飲乎噲曰臣死且不避巵酒何辭乎史記項羽紀田横自剄二客穿其冢旁孔皆刎下從之横客五百人尚在海中使使召之至則聞田横死亦皆自殺通鑑漢髙紀貫髙曰所以不死一身無餘者白趙王不反也今王已出吾責已塞死不恨矣且人臣有簒弑之名何面目復事上哉縱上不殺我不愧扵心乎乃仰絶吭遂死之通鑑漢惠紀赴死如歸前漢欒布傳吳郡王閎渡錢塘江遭風船欲覆閎拔劒斫水罵伍胥風息得濟謝承後漢書夫嚴氣正性覆折而已豈有員园委屈可以每其生哉凜凜焉皜皜焉其與琨玉秋霜比質可也园即刓字團無稜角也每貪也言寧傾覆推折不能委曲以貪生也東漢孔融傳殺身為君齊孟陽代君居牀以待賊西漢紀信乗黄屋以誑楚破家為國要離焚妻子以徇吳李通誅宗族以從漢東漢孔融傳袁紹殺臧洪同郡人陳容曰将軍誅暴先誅忠義豈合天意紹使人牽出容曰今日寧與臧洪同日死不與将軍同日生遂復見殺坐者歎曰如何一日殺二烈士後漢含笑入地東漢韓紹傳鄧艾斬諸葛瞻瞻子尚歎曰父子荷國重恩不早斬黄皓使敗國殄民用生何為䇿馬冒陳而死通鑑魏元紀卞壼苦戰而死二子眕盱隨父後亦赴敵而死其母撫尸哭曰父為忠臣子為孝子夫何恨乎通鑑晉成紀有前死一尺無却生一寸通鑑梁武紀千載之後凜凜猶生北史藺相如叱秦王目眦皆裂唐王君廓傳段秀實素有人望朱泚反召秀實議事源休在坐秀實勃然起執休腕奪其象笏奮前唾泚面遂撃之泚舉臂捍笏中顙流血滿面唐書互入節操張巡城陷西向再拜曰為救不至臣智勇俱竭不能全一城今使逆賊見逼臣死之後願為鬼與賊為厲以答國恩唐書李克用執孫揆揆大罵不屈克用怒使以鋸解齒不行謂曰死狗奴解人當夾之以板汝輩安知行刑刑者如其所言罵聲不輟至死唐書孫揆傳顔氏一門死於刀鋸者三十餘人通鑑唐𤣥宗睢陽士卒死傷之餘纔六百人張巡許逺分城而守之令南霽雲将三十騎犯圍而出告急於臨淮見賀蘭進明進明强留之具食與樂延霽雲慷慨泣且語曰霽雲來時睢陽之人不食月餘矣霽雲雖欲獨食且不下咽也夫擁彊兵觀睢陽陷沒曽無分災救患之意豈忠臣義士之所為乎因齧落一指以示進明曰霽雲既不能達主将之意請留一指以示信歸報通鑑唐肅宗互入坐視劉闢發兵圍東川林藴力諌闢舉兵闢怒械繋於獄引出将斬之隂戒行刑者使不殺但數礪刃於其頸欲使屈服而赦之藴叱之曰豎子當斬即斬我頸豈汝砥石耶通鑑唐憲紀雖千五百年其英烈言如嚴霜烈日可畏而仰哉唐顔真卿傳賛傳記烈士徇名壮夫重氣寧為蘭摧玉折不為瓦礫長存史通集烈士甘危軀以成仁文選七啓烈心厲勁秋文選長安行齎志沒地選江文通恨賦縱死俠骨香不慙世上英李白海上五百人同日死田横當時不好賢豈傳千古名直向草中耿介死不求黄金籠下生同上寳劒思存楚金鎚許報韓駱賓王丹誠自守雖九死而如歸白刃交前豈三軍之可奪喑嗚則山岳崩頽叱咤則風雲變色同上壮志死不息千年如隔晨韓送惠師詩英心甘鬬死韓退之孟郊聨句至誠無忘炳若日月烈氣不散長為風雷吕和叔文茍効用之得所雖殺身而何計張九齡麈尾賦白虹千里氣血頸一劒義劉义平生一匕首孟浩然恨血千年土中碧髙達夫泣血嘗膽誓復國讎刻骨鏤肌敢違天造陳子昻多應銜恨骨千古不為塵杜荀鶴萬古壮骨唐文粹植髪成干櫓厲氣成風雲同上縱死猶聞俠骨香王維集萬古英風栁文報恩不到頭徒作輕生士劉义詩本朝生為楚英沒為吳豪烈氣不冺視此江濤東坡祈晴吳山文精誠貫山石為烈東坡詩張睢陽生猶罵賊嚼齒穿齗顔平原死不忘君握拳透爪古今詩話偉傑經維此仲行百夫之防維此鍼虎百夫之禦維此奄息百夫之特詩黄鳥邦之桀兮詩伯兮子俊傑在位孟智過萬人謂之英千人謂之俊百人謂之豪十人謂之桀淮南史江充為人魁岸西漢本傳師古曰亷稜如崖岸之形魁梧竒偉西漢張良賛俶儻竒偉西漢揚雄傳為人精悍西漢嚴延年傳踔絶之能西漢孔光傳識時務者在乎俊傑蜀志諸葛亮傳注凜凜與秋霜争嚴真丈夫哉唐卓行傳賛集直若砥矢言若丹青進不隠其謀退不顧其命此誠絶世之行俊彦之英也楚辭丈夫之雄也孔文舉書失節史中行説曰必我也為漢患者中行説既至因降單于單于甚親幸之通鑑漢文紀清名之士紀逡兩唐林遵皆仕王莽西漢鮑宣傳漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬烏北地人習北俗去其節黥面入廬西漢匈奴傳齊明帝即位徴沈約為五兵尚書國子祭酒帝崩為司徒初梁武在西邸與約舊逰勲業既就天人允属約常叩其端帝黙然而不應他日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳯者皆望有尺寸之功以保其福禄今童兒牧豎悉知齊祚之終帝曰吾方思之約曰公初起兵樊沔此時應思今日王業已就何所復思若天子還都公卿在位則君臣分定無復異圖君明於上臣忠於下豈復有人方更同公作賊帝然之約出召范雲告之帝受禪為尚書僕射奉䇿之日吏部尚書范文等二十餘人咸來致拜南史沈約傳馬仙琕曰小人如失主犬後主飼之則復爲用矣通鑑齊和紀下盧藏用始隠有意當時世人目為隨駕隠士晩乃徇權利務為驕縱素節盡矣唐書本傳委靡輕熟偷生自私唐書忠義傳鄭韜以户部尚書致仕自襁褓迨於縣車事真偽十一君凡七十載五代史馮道事晉晉滅又事契丹耶律徳光於京師徳光責道事晉無状道不能對又問曰何以來朝對曰無城無兵安敢不來徳光誚之曰爾是何等老子對曰無才無徳癡頑老子五代史馮道傳馮道之為相歴五朝八姓若逆旅之視過客朝為仇敵暮為君臣易面變辭曽無愧怍大節如此雖有小善庸足稱乎通鑑集何意百鍊剛化為繞指柔文選古詩對穹廬以屈膝丘希範書揚雄作劇秦美新一篇文選云配五帝冠三王開闢以來未之有也本朝末路喪初心東坡詩才美經美如英萬人為英美如玉詩汾沮洳故建邦能命龜田能施命作器能銘使能造命升髙能賦師旅能誓山川能説喪紀能誄祭祀能詔君子能此九者可謂有徳音可以為大夫也詩定之方中注子刀刃若新發於硎荘養生互入方興未艾應當時之變如數一二荀子史髙陽氏有才子八人齊聖廣淵明允篤誠髙辛氏有才子八人忠肅恭懿宣惠慈和左文十八年吳中賢士大夫皆出於項梁下每吳中有大繇役及喪項梁常為主辦史記項羽本紀登髙能賦可以為大夫言感物造端材知深美可與圖事故可以為列大夫也西漢藝文志鄧禹曰冦恂文武備足有牧民御衆之才通鑑漢平紀器局方整有萬夫之望晉書筆敷華藻吻縱波濤方駕搢紳足為翹楚晉庾亮等賛風力局幹冠冕一時上馬横槊下馬談論桓榮祖傳上馬能撃賊下馬作露板唯傅脩期爾通鑑齊明紀本朝續世說第四卷引此語版字作布字帝謂周捨曰柳惲可謂具美分其才藝足了十人梁書崔孝伯才浩浩如黄河東注北史本傳劉晏有精力變通有無曲盡其妙募善走者置逓相望覘報四方物價雖逺方不數日皆達食貨輕重之權悉制在掌握勾檢簿書出納錢穀事雖至細必委之士類吏惟書符牒不得輕出一言晏始為轉運使時天下見户不過二百萬其季年乃三百餘萬在晏所統則増非晏所統則不増也其初財賦嵗入不過四百萬緡季年乃千餘萬緡其始江淮鹽利不過四十萬緡季年乃六百餘萬緡通鑑唐德宗上顧張鎰曰才兼文武望重内外無以易卿同上兼資文武出将入相唐王珪傳盧藏用謂李邕如干将莫邪難與争鋒唐書本傳一日千里唐書蘇廷碩傳徳裕廊廟老子手弦鳴鴈落刃往牛解唐元稹論衡集長松在林利錐處囊森疎穎脱鋒幹獨見歐陽詹逸俊雄姿迥斧刃迎皆碎同上雄推三虎賈秀擢八龍荀元㣲之處繁應卒鋩刃不頓凌雲羽翮掞天才劉賓客才名括天下白樂天雅有器幹精彊博敏有才子之稱金劒淬來長透匣駃足逸翮天驥冥鴻始擅文三捷終兼武六韜並同上世上五百年吾家一千里髙達夫利刃新磨一匣霜張承吉桂枝片玉光生于家栁文處劇不繁事業皆辨杜牧之臨事無全牛劉長卿本朝後發先至者驥之良歐公集鋒銳必脱穎安肯乆處囊僧參寥子君如汗血駒轉盼略燕楚東坡詩功業附報功經功加于時書㣲子之命厥有成績紀于太常書君牙王功曰勲國君曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書于王之太常祭於大烝周禮司勲名與功偕記樂記后稷天下之為烈也豈一手一足哉禮表記子功積如天地荀王伯史勲在王室藏於盟府左僖五年晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧魏絳於是有金石之樂左襄十九年銘其功業以示子孫左襄十九年互入傳逺克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免左哀二年樂毅六月之間下齊七十餘城通鑑周紀何之勲爛焉與宜生等争烈矣史記蕭何世家卞荘子一舉有兩虎之功史記陳軫傳夷萬乗之彊國收八百之蓄積史記樂毅傳齊器設於寧臺大吕陳於元英故鼎反乎磨室薊丘之植植於汶湟自五伯以來功未有及先王者也同上封爵之誓曰使黄河如帶泰山若礪國以永存爰及苖裔前漢功臣表功光王府前漢表銘勲彛器歴世彌光聲溢金石前漢書匈奴逺遁而幕南無王庭通鑑漢武紀漢功臣皆剖符世爵受山河之誓存以著其號亡以顯其魂前漢功臣表立千載之功建萬世之安羣臣之勲莫大焉昔周大夫方叔吉甫為宣王誅玁狁而百蠻從通鑑漢元紀休烈垂於不朽東漢鄧隲建天地之功増日月之耀後漢郎顗傳垂功名於竹帛東漢鄧禹傳伊霍之功不下席而立東漢崔瑗傳功名重山岳東漢酈炎傳馮異功若丘山東漢冦鄧之髙勲耿賈之鴻烈東漢二十八将論勲效傳於百世晉書士雅叶迹中興克復九州之半晉書祖逖賛勲髙一代勲力之盛無人倫比唐書初秦王以大箭射却突厥後餘大弓一大箭五世寳之郊丘必陳儀物之首以識武功唐書子儀功蓋天下唐書賜鉄劵藏名太廟畫像凌煙同上李晟破朱泚帝紀其功自文于碑敕皇太子書立于東渭橋以示後世唐書本傳吳元濟平帝美裴度功命韓愈為平淮西碑唐書尉遲敬徳桑䕃不徙而大功立新唐書本傳賛李克用時年二十八於諸将最少而破黄巢復長安功第一諸将皆畏之時人謂之獨眼龍通鑑唐僖宗紀郭子儀收東都代宗迎灞上勞之曰國家再造卿之力也唐書本傳集業類補天功均柱石文選銘功銘著扵景鍾名績垂於竹帛文選自試表當令麟閣上千載有雄名文選北伐詩勲超邃古文選記室牋驃騎發迹於祁連文選解嘲茂勲格於皇天文選建丘山之功文選檄文刈單于之旗勦閼氏之首探苻離之窟掃五王之庭文選典論銘功景鍾書名竹帛選臨淄侯牋勲業青𡨕上杜詩功業汾陽異姓王同上赫赫乎洸洸乎功業逐日以新韓文嗣徳有繼将大書特書屢書不一書而已也韓文答元微之取日虞淵洗光咸池潜授五龍夾日以飛唐吕温作狄仁傑頌神發響效謨成天功唐文粹功名滿青史劉長卿記能事載盛徳渭川之竹不足簡終南山之木不足軸唐文粹䇿功第一承恩莫二勒函谷之闗刋燕然之石鼓行海内麾定四方同上闒茸附凡下子齪齪焉自保不足以發也文中子述史史毛遂曰公等碌碌所謂因人成事者也通鑑周赧王紀委瑣握􅐅西漢司馬相如傳智不足以權變勇不足以决斷仁不足以取予彊不能以有守西漢貨殖傳碌碌未有竒節西漢蕭何賛互入自揆今已虧形為掃除之吏在闒茸之中西漢司馬遷傳啙音紫窳音庾偷生西漢地理志為人在下中西漢李廣傳師古在下輩之中樸遫不足數西漢息夫躬傳非有踔絶之能西漢孔光傳娖娖廉謹備位而已無所能發明功名有著扵當世者西漢申屠嘉傳樊伷嘗為州人設饌比至日中食不可得而十餘自起通鑑漢獻紀宋蒼梧王凡諸鄙事裁衣作帽過目則能未嘗吹篪執管便韻通鑑専習小人賤事以為己能通鑑唐憲紀委靡輭熟唐書忠義傳集百不逮人所尚業復不能尺寸銖兩自彊自進乃庸人輩也杜牧之本朝齊澣劾奏裴談神昬形滓白孔六帖聰明經明作哲聰作謀書洪範子曰浸潤之譖膚受之愬不行焉可謂明也已矣語顔淵子詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮孟鑑明則塵垢不止莊子徳充符冥冥之中獨見曉焉無聲之中獨聞和焉荘子明哲煌煌旁燭無疆揚子史延陵季子見㣲而知清濁史記吳世家聰者聽於無聲明者見於未形西漢伍被傳清水明鏡不可以形逃西漢韓安國傳互入物無遁形明者睹未萌後漢班超傳標鑒通晤唐王珪傳馬周言天下事若素宦于朝明悉憲章者唐書本傳吐突承璀欲希上意奪裴垍權自請将兵討王承宗上疑未决宗正少卿李拭奏稱承宗不可不討承璀親近信臣宜委以禁兵上以拭状示諸學士曰此姦臣也知朕欲将承璀故上此奏卿曹記之自今勿令得進用通鑑唐憲宗傳記明如日月難為蓋藏史通集光明如日月楚辭注云聰明如日月智燭千里動必察㣲心鏡萬機物來斯應李文饒水鏡澄花炫金波於靈府氷壺徹鑒朗玉燭於神機駱賓王飛聰馳明無逺不察李白明堂賦本朝讀書眼如月罅隙靡不照東坡詩精力附精明史米鹽靡密初若煩碎然霸精力能推行之前漢黄霸傳根株窟宂所在銖兩之姦皆知之其發姦擿伏如神趙廣漢傳互入政事郄超曰謝𤣥使才雖履屨間亦得其任晉謝𤣥傳互入不忽㣲小劉穆之為左僕射入居東府總攝内外穆之内總朝政外供軍旅决斷如流事無壅滯賓客輻凑求訴百端内外諮稟盈堦滿室目覽詞訟手答牋書耳行聽受口並酬應不相參涉悉皆贍舉又喜賓客言談賞笑彌日無倦裁有閒暇手自寫書尋覽校定通鑑晉安紀互入敏捷陶侃在軍四十一年明毅善斷悉察纎密人不能欺通鑑晉帝紀徐勉為吏部尚書精力過人雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱通鑑梁紀徐紇有機辨彊力終日治事畧無休息不以為勞時有急詔令數吏執筆或行或卧人别占之造次俱成不失事理通鑑梁髙祖紀帝常曰唐邕强幹一人當千又曰邕每有軍事手作文書且處分耳又聽受通鑑梁世祖紀范雲臨煩處劇精力過人通鑑梁武紀小大之物必經心目通鑑愚暗經終踰絶險曽是不意詩正月惷愚𡨕頑記哀公問執柯以伐柯睨而視之猶以為逺記中庸互入對面蹉過人莫不飲食也鮮能知味也同上驅而納諸罟擭陷穽之中而莫之知避也同上衣服在躬而不知其名為罔記少儀注無知貎其猶正牆面而立也與語陽貨子安其危而利其菑樂其所以亡者孟子道在邇而求諸逺事在易而求諸難孟離婁上猶縁木而求魚孟子行之而不著焉習矣而不察焉終身由之而不知其道者衆也孟盡心下大惑者終身不解大愚者終身不靈荘天地禍重乎地莫之知避荘人間世人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影愈不離身而不知處隂以休影處静以息迹愚亦甚矣荘愚夫宋人有㳺於道得人遺契者歸而藏之密數其齒告鄰人曰吾富可待矣列説符篇燕人生於燕長於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀然變容指社曰此若里之社乃喟然而歎指舍曰此若先人之廬乃潸然而泣指壠曰此若先人之冢其人哭不自禁同行者啞然大笑曰予昔紿若此晉國耳列互入欺罔齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜也一年而給二年而足三年而富穰自此以往施及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡不探也未及時以贓獲罪沒其先君之財向氏以國氏之謬已也往而怨之國氏曰若為盜如何向氏言其状國氏曰嘻若失為盜之道至此乎今将告若矣吾聞天有時地有利吾盜天地之時利雲雨之滂潤山澤之産育以生吾禾殖吾稼築吾垣建吾舍陸盜禽獸水盜魚鼈皆天之所生豈吾之所有然吾盜天而無殃夫金玉珍寳穀帛貨財人之所聚豈天之所與向氏大惑以為國氏之重罔已也列天瑞妄人者門庭之間猶有可誣欺焉而况於千里之上乎荀非上愚以重愚暗以重暗同上以篙測江篙終而以水為淺惑矣淮南説林訓捨茂木而集於枯不弋鵠而弋烏難與有圖淮南嘗被甲而免射者被而入水嘗抱壺而度水者抱而蒙火可謂不知類矣楚人有乗船而遇大風者投於水非不貪生而畏死也惑於死而反忘生同上不聰實無耳也不明實無目也揚問明燕雀處屋竈突炎上棟宇将焚不知禍之将及己也孔叢子蹈薄氷以待夏日也抱朴子甘於茶蓼而不識飴蜜酣於醨酪而不嘗醇醪抱朴子如坐漏船之中伏燒屋之下吳子宋之愚人得燕石藏之以為大寳周客聞而觀焉主人冕𤣥服始發寳革匱十重緹巾十襲客見之胡盧而笑曰此燕石也與瓦甓不異主人大怒藏之愈固闕子互入自是史晉侯復假道扵虞以伐虢宫之竒曰虢虞之表也虢亡虞必從之虞公曰晉吾宗也豈害我哉左僖五年周子有兄而無慧不能辨菽麥左成十八年耳不聽五聲之和為聾目不辨五色之章為昧左僖二十四年不知話言左夫抱火厝之積薪之下而寝其上火未及然因謂之安方今之勢何以異此漢文紀狐白之裘而反衣之也西漢匡衡傳如衣錦夜行西漢朱買臣傳憒眊不知所為西漢息夫躬傳馳深淵入虎口東漢馬援傳嚴顔曰獨坐窮山放虎自衞通鑑東漢居累卵之危而圖太山之安為朝露之行而思傳世之功東漢王符傳互入不自揆度升山採珠東漢劉𤣥傳豈有知其無成而萎肢咋舌义手從族乎通鑑漢光武紀張角作亂向栩上便宜不欲國家興兵但遣将於河上北向讀孝經賊自當消滅東漢向栩傳縁木求魚却行求前通鑑漢殤紀孫恩攻㑹稽㑹稽内史王凝之世奉天師道不出兵亦不設備日扵道室稽顙跪呪官屬請出兵討恩凝之曰我已請大道借鬼兵守諸要津各數萬賊不足憂也及恩漸近乃聽出兵恩已至郡下甲寅恩陷㑹稽凝之出走恩執而殺之并其諸子通鑑晉紀晉王與蜀後主劉禪宴作故蜀伎旁人皆為之感泣禪喜笑自若晉王曰人之無情乃至扵此它日王問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之謂禪曰若王後問宜泣而對曰先人墳墓逺在岷蜀乃心西悲無日不思因閉其目㑹王復問禪對如前王曰何乃似郤正語耶禪驚視曰誠如尊命左右皆笑通鑑晉紀安帝幼而不慧口不能言至扵寒暑饑飽亦不能辨飲食寝興皆非已出通鑑晉武紀亦猶犬彘腴肥不知禍之将及晉書韓伯傳論開門揖盜吳志張昭傳斛律光曰鴻鵠已翔於寥空羅者猶視於沮澤通鑑聽人穿鼻梁武紀魏杜弼曰舉螗螂之斧被蛣蜣之甲當窮轍以待輪坐積薪而候燎通鑑宋紀謝靈運子鳳鳳子超宗有文辭帝大嗟賞謂謝荘曰超宗殊有鳳毛靈運復出時右衞将軍劉道隆在御坐出候超宗求鳯毛觀之超宗以其無識又觸其父名徒跣還内道隆謂檢覔毛至暗待不得乃去南史将渉千里棄騏驎而䇿蹇驢通鑑梁武紀挾氷求温抱炭希涼魏志髙柔傳上曰譬如饑人自噉其肉肉盡而斃何其愚也通鑑唐太宗紀互入自相矛盾庇朽木乗膠船唐韋承慶互見取禍魏徴曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也通鑑唐太宗紀姚顗不知錢楮銖兩之數五代晉紀傳記塞漏舟而輕陽侯之波則舟覆矣戰國策猶之井中而求火同上去日之明於庭而就火之光於室賈誼書楚人有渉江者其劒自舟中墜於水遽鍥其舟曰是吾劒所從墜也舟去從所鍥處入求之而舟已行劒不行此不亦惑乎吕氏春秋互入窒泥集不别横之與縱楚辭蓼蟲避葵堇習苦不言非選放歌行食填巨壑飲灌漏巵曹子建書以覺痛之日為受病之始稽叔夜養生論遵覆車之遺轍五等論是知二五而未識於十辨命論圖形於影未盡纎麗之容察火扵灰不覩洪赫之烈陸士衡連珠坐積薪以待燃方指日而比盛潘安仁西征賦登陽城而避險卧砥柱以求安庾信哀江南賦愚者逆理而動文選書羔羊口在縁何事闇死屠門無一聲白傅集坐薪言泰巢幕云安李義山猶去蘭室而居鮑肆捨牢醴而食糟糠脱錦綉而服枲麻唐文粹譬如無目昧於日月之中行於重險之處顚踣墮落可勝既乎同上狂風拔倒樹樹倒根已露上有數枝藤青青猶未悟唐于瀆詩掩耳盜鍾自云無覺劉知幾史通蒙然靡察有如聾瞽史通本朝託麑猛虎寄雛颺鷹類要下何異避喧之趨市兮又如惡影之就日歐公集如坐弊􅊑之中駸駸乎将入於深淵不及其尚淺也舍之而求所以自生之道而以濡足為解者是固夫覆溺之道也老泉文敏捷史枚皋為文疾受詔輒成西漢本傳口占檄文西漢朱博傳禰衡為賦文不加㸃筆不停綴東漢本傳費禕為尚書令于時多事禕識悟過人每省讀書記粗舉目暫視究其意㫖其速敏過於人終亦不忘蜀志劉穆之為左僕射入居東府總攝内外穆之内總朝政外供軍旅決㫁如流事無壅滯賓客輻凑求訴百端内外諮稟盈堦滿室目覽詞訟手答牋書耳行聽受口並酬應不相參渉悉皆贍舉又喜賓客言談賞笑彌日無倦裁有閒暇手自寫書尋覽校定通鑑晉安紀互入精力王泰刻燭賦詩文不加㸃南史宋本傳梁武延進士二十餘人置酒賦詩蕭介染翰便成文不加㸃帝曰蕭介之文即席之美也梁書范雲善屬文尺牘下筆輒成未嘗定稾時人疑其宿構梁書裴子野為文典而速或問其文速子野曰人皆成於手我獨成於心梁書本傳武帝取鍾王真迹授周興嗣令選不重復者千字韻而文之興嗣一宿即上鬚髮皆白梁書蕭文琰丘令楷洪江等共打銅鉢立韻響滅則詩成梁王孺傳時軍書日以百數李徳林口授數人文意百端不加治㸃通鑑陳後主紀劉炫强記黙識莫與為儔左畫方右畫圓口誦目數耳聽五事同舉無所遺失隋書齊元康作軍書颯颯運筆俄頃數紙北齊書軍中多事如晦剖决如流通鑑唐髙祖紀裴延裕在内庭文書敏捷號下水船唐書謝㣲善属文時魏中山王原畧還北梁武帝餞扵武徳殿賦詩三十韻限三刻成㣲便就南史𤣥宗平内難書詔填委蘇廷碩所占授功状百緒無所差書吏白曰丐公徐之不然手腕脱矣唐書本傳令狐楚為太原掌記鄭儋在鎮暴卒不及指撝後事軍中喧譁将變忽夜數十騎持刀迫楚至軍門諸将迫之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書互入有定力房𤣥齡軍符府檄或駐馬即辨文約理盡不著稿唐書本傳朱泚謀逆駕幸奉天時天下叛亂機務填委徴發指縱千緒萬端一日之内詔書數百贄揮翰起草思如泉注初若不經思慮既成莫不曲盡事情中扵機㑹胥吏簡札不暇同舍皆伏其能唐書陸贄傳王勃属文初不精思先磨墨數升則酣飲引被覆面卧及寤援筆成編不易一字時人謂勃為腹稿唐書本傳栁公權工辭賦應聲成文唐文宗曰子建七步爾乃三焉唐書互入文章薛收為書檄露布或馬上占辭該敏如夙構初不竄定唐書韋承慶属文敏無留思雖大詔令未嘗著稿唐書本傳鄭敏為中書舍人詔令旁午動無滯思言皆破的李栖筠為文勁迅陸扆工文辭敏速若注射然並同上傳記李太白在翰林應詔草白蓮花序及宫詞十首時方大醉中貴人以水沃之稍醒白於御前索筆一揮文不加㸃摭言温庭筠工於小賦凡八义手而八韻成北夢瑣言集魏文駐馬鞭為臨渦賦魏文臨渦賦日試萬言倚馬可待李太白與韓荆州書揮毫落紙如雲煙杜詩誘扵一時一物發扵一笑一吟率然成章白樂天辨如懸河筆無停綴范傳正撰李白碑本朝楊大年每欲作文則與門人賓客飲博投壺奕碁語笑喧譁而不妨締思以小方紙細書揮翰如飛文不加㸃每盈一幅則命門人傳録門人疲於應命頃刻之際或數千言歐陽公歸田録千言一揮手五車不再讀東坡集袖手獨不言黙稿已在腹文如翻水成賦作义手速當其下手風雨快筆所未到氣已吞並同上展卷五行下揮毫萬字傾蘇子由集黄生學詩用力深急手疾口如翻盆陳後山遲鈍史翟方進年十二三給事太守府為小史號遲頓師古讀曰鈍不及事西漢本傳張衡擬班固兩都作二京賦因以諷諌思十年始成後漢左思造齊都賦一年乃成欲作三都賦構思十年賦成晉書濡緩機事不稱耳通鑑晉海西公紀李程為翰林學士性懶日過八磚乃至時號八磚學士新唐書本傳傳記張衡兩京十年左思三都一紀文心雕龍揚子草𤣥累年不就史通穎悟經誰夙知而暮成詩抑注云罕有所知實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食詩生民箋云能匍匐則岐岐然意有所知也其貌嶷嶷然有所識别也蚤有譽於天下中庸子孔子東逰見兩小兒辨鬬問其故一兒曰我以日始出時去人近而日中時逺也一兒曰我以日出時逺而日中時近也一兒曰日初出時大如車蓋及日中則如盤盂此不為逺者小而近者大乎一兒曰日初出滄滄凉凉及日中則如探湯此不為近者熱而逺者凉乎孔子不能决也兩小兒笑曰孰為汝多智乎列湯問童烏九齡與我𤣥文揚子注童烏子雲之子也或問甘羅之悟吕不韋張辟疆之覺平勃皆以十二齡楊重黎虎豹未成文而有食牛之氣鴻鵠之鷇羽翼未成而有四海之心賢者之生亦然尹子史楚使子玉治兵國老皆賀子文蒍賈尚幼後至不賀子文問之對曰子玉之敗子之舉也舉以敗國将何賀焉過三百乗不能入矣苟入而賀何後之有左僖二十七年秦師過周北門王孫滿尚幼觀之言秦師輕而無禮必敗左僖三十二年項羽攻外黄下欲坑之外黄令舍人兒年十三説羽曰彭越彊刼外黄故且降待大王至又皆坑之百姓豈有歸心後此梁地十餘城皆恐莫肯下矣史記項羽紀秦始皇使張唐往相燕不肯行甘羅曰項槖生七嵗為孔子師今臣生十二嵗於兹矣君其試臣始皇使甘羅扵趙史記甘茂傳賈誼年二十餘最少每詔令議下諸老先生未能言誼盡為之對西漢本傳司馬遷年十嵗則誦古文二十而南㳺江淮上㑹稽探禹穴窺九嶷浮沅湘北渉汶泗講業齊魯之都西漢本傳應奉少聰明自為童兒凡所經履莫不暗記讀書五行並下東漢本傳賈誼求試屬國詭繫單于終軍欲以長纓牽致勁越弱冠慷慨前世美之禰衡傳日蝕京師不見黄瓊以状聞太后詔問所蝕多少瓊未知所况琬年七嵗在傍曰何不言日蝕之餘如月之初瓊大驚即以其言應詔東漢黄瓊傳京師號曰天下無雙江夏黄童後漢黄香傳孔融幼有異才十嵗隨父詣京師時河南尹李膺不妄接士融造門曰我是李君通家子弟門者言之膺請融問曰髙明祖父嘗與僕有恩舊乎融曰然先君孔子與李老君同徳比義而相師友則融與君累世通家衆坐歎息陳煒後至坐中以告煒曰小而聰了大未必竒融曰觀君所言将不早慧乎東漢本傳孔融年六七嵗時嘗與諸兄共食棗輒引小者人問其故答曰我小兒法當取小者由是宗族竒之後漢張霸年七嵗通春秋欲進餘經父母曰汝小未能者霸曰我饒為之東漢本傳賈逵自為兒戲弄常設部伍魏書虞翻少有髙氣年十二客有候其兄者不過翻翻追與書曰僕聞琥珀不取腐芥磁石不受曲針過而不存不亦宜乎吳書本傳注常林七嵗有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有魏志諸葛瞻八嵗聰慧可愛蜀志本傳荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆将姦亂衢悟乃推問果殺人亡命因是異之魏志互入諸父張憑祖鎮憑年數嵗鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎晉書互見祖孫異門鄧艾年十一每見髙山大澤輒指畫軍營處後為大将晉書王允之總角從伯敦常以自隨出則同輿入則共寝敦常夜飲允之辭醉先臥敦與錢鳳謀為逆允之已醒悉聞其言慮敦或疑己便於臥處大吐衣面並汙鳳既出敦果照視見允之卧吐中以為大醉不復疑之晉書本傳劉湛自弱年即有宰物之情常自比管葛通鑑晉恭紀慕容盛年十三謂慕容柔曰夫十人之長亦須才過九人然後乃安通鑑晉武紀謝安總角沈敏風宇條暢晉書王儉年數嵗風神聳拔有成人之度晉王儉傳謝朏十嵗能属文隨父荘游山使朏命篇攬筆便就晉書本傳陸雲少與兄機齊名幼時閔鴻見而竒之曰此兒若非龍駒當是鳳雛謝尚八嵗神悟速成父鯤嘗攜之送客或曰此兒一坐之顔回也尚應聲答曰坐無尼父焉别顔回王戎幼而穎悟年六七嵗嘗與羣兒戲於道側見李樹多實等輩競趨之戎獨不往或問其故戎曰樹在道傍而多子必苦李也取之信然並同上元魏祖瑩年八嵗能誦詩書十二為中書學生耽書父母恐其成疾禁之不能止常密扵灰中藏火驅逐僮僕父母寝睡之後燃火讀書以衣蔽塞牕户恐漏光明為家人所覺由是聲譽甚盛内外親属呼為聖小兒尤好属文北史本傳明帝幼而聰哲為元帝所寵異年數嵗嘗坐置膝前属長安使來帝因問曰汝謂日與長安孰逺對曰長安近不聞人從日邊來元帝異之明日宴羣僚復問之對曰日近元帝失色曰何乃異向者之言乎對曰舉目則見日不見長安晉本紀謝安年四嵗桓彛見之而歎曰此兒風神秀徹後當不減王東海王導亦深器之由是少有重名晉書栝柏豫章雖小已有棟梁之器南宋袁粲傳王泰幼敏悟年數嵗時祖母諸孫姪散栗於牀羣兒競之泰獨不取問其故對曰不取自當得賜由是中外異之宋書劉孝綽七嵗能属文父繪齊時掌詔誥孝綽年十四繪嘗使代草之南史宋書互入克紹謝貞八嵗嘗為春日閒居詩曰風定花猶落從舅王筠曰追步惠連矣南史何遜八嵗能賦詩沈約謂遜曰吾每讀卿詩一日三復猶不已其為名流所稱如此梁書蕭摩訶年十三單騎出戰無敢當者通鑑梁髙祖紀徐陵八嵗属文十三通荘老慧雲法師每嗟陵早就謂之顔回南史本傳王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先嘗齊書楊愔庭前有柰樹實落羣兒咸争之愔頽然不動獨坐北齊何妥少機警八嵗顧良戲之曰汝姓何是荷葉之荷是河水之河妥應聲曰先生姓顧是眷顧之顧是新故之故隋書薛世雍為童時與羣輩㳺戲輒畫地為城郭令諸兒為攻守之勢有不從令者撻之諸兒畏憚莫不整齊宇文忻為童時與羣輩㳺輒為部伍進止行列無不用命識者見而異之同上李泌七嵗能為文𤣥宗召之既至帝方與張説觀奕因使説試其能説請賦方圓動静泌曰願聞其略説曰方若棋局圓若棋子動若棋生静若棋死泌應曰方若行義圓若用智動若騁才静若得意説因賀帝得竒童新唐書李泌傳蘇頲弱冠敏悟一覽至千言輒覆誦唐書蘇頲傳盧懐慎在童丱已不凡韓思彦歎曰此兒器不可量同上貟俶九嵗升坐詞辨注射坐人皆屈新書李泌傳白居易始生七月能展書指之無兩字雖百試不差唐書本傳李賀七嵗能辭章韓愈皇甫湜始聞未信過其家使賦詩援筆輒就如素構目曰髙軒過唐書李賀傳褚無量幼厲志好學家近湖中有龍鬭傾里閈觀之無量時年十二讀書晏然不動舊唐書嚴武幼豪爽母裴不為挺之所答厚其妾英武始八嵗怪問其母母語之故武奮然以鉄鎚就英寝碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也唐書嚴挺之傳嚴武神氣雋爽敏扵聞見幼有成人之風舊唐書斬裴炎炎弟子太僕寺丞伷先年七嵗上封事請見言事太后召見詰之曰汝伯父謀反尚何言伷先對曰陛下為李氏婦先帝棄天下遽攬朝政變易嗣子疎斥李氏封崇諸武臣伯父忠於社稷反誣以罪戮及子孫陛下所為如是臣實惜之陛下早宜復子明辟髙枕深居則宗族可全不然天下一變不可復救矣通鑑唐武后紀樂思晦男未十嵗沒入司農得召見太后問状對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反状以付俊臣無不承反矣太后意稍寤通鑑唐武后互入轉移人心劉晏八嵗獻頌帝竒其幼命宰相張説試之曰國瑞也即授以正字公卿邀請旁午號神童名震一時新唐書本傳互入際遇傳記王獻之少而標邁為一時風流之冠晉陽秋揚信字子烏雄第二子幼而明慧雄草𤣥經不㑹子烏令作九數而得之雄又擬易羝羊觸藩彌日不就子烏曰大人何不云荷㦸入榛劉向張𤣥祖八嵗齒虧先達知其不常戲之曰君口復何為開狗竇𤣥答曰使君輩正從此中出劉昭幼童傳互入納侮賈逵年十嵗暗誦六經父曰吾未嘗教爾安得三墳五典誦之對曰姊嘗抱于籬邊聽鄰家讀書因記得而誦之耳王子年拾遺記何晏大将軍進之孫進遇害魏武納晏養於宫至七八嵗慧心天悟帝欲以為子每逰觀令與諸子長幼晏㣲覺之坐則専席止則獨立或問其故答曰禮異姓不相貫何晏别傳劉晏以神童為秘書省正字上問晏曰正字正得㡬字晏曰天下字皆正惟朋字未正𤣥宗大竒之明皇雜録辛攀年七嵗程曉目攀而笑曰犂牛騂犢孺子之謂攀曰戲及人親非雅訓也崔鴻十六國春秋徐孺子年九嵗月下戲人或曰月中無物當極明徐曰不然譬如人眼中有瞳子無此可不暗乎世説鍾毓鍾㑹少有令譽年十三魏文帝聞之並召見問毓曰卿何汗曰戰戰惶惶汗出如漿復問㑹卿何不汗對曰戰戰栗栗汗不敢出王濬仲裴叔則二人總角詣鍾士季客問鍾曰二童是誰鍾曰裴楷清通王戎簡要並同上楊氏子九嵗甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔以示兒曰此是君家果兒答曰未聞孔雀是夫子家禽世説上集終童山東之英妙賈生洛陽之才子文選西征賦弱冠流芳雋聲清劭音邵文選楊武仲往昔十四五出逰翰墨場斯文崔魏徒以我似班揚七齡思即壮開口詠鳳凰九齡書大字有作成一囊杜詩早年見標格秀氣衝星斗驥之子鳳之雛陸機二十作文賦汝更小年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青雲只今年才十六七射䇿君門期第一並同上生而岐嶷實覃實華越在襁褓神明滋盛童蒙訓敏光潤玉顔與諸兒戲神清涵泳卓然如鴻雛鵠子有青雲之意也陳子昻耳目明達神氣以靈特出等夷韓文少年嶄然見頭角衆謂栁氏有子矣韓愈撰栁宗元墓誌互入有後新篁纔解籜寒色已青䓤元微之衛瓘諸郎衛玠珍可憐雛鳯好青春十嵗佩觽嬌稚子八行飛札老成人同上成童在侣獨不嗜戲劉賓客骨清年少雙眼氷鳯羽參差五色層天上麒麟時一下人間不獨有徐陵杜牧之七嵗属文意語天出皇甫湜撰韓愈碑童區寄十一嵗行牧且蕘二豪賊刼持之墟所賣之寄偽兒啼恐慄為兒恒状賊易之一人去為市一人醉卧童殺之逃未逺市者還得童曰為兩郎童孰若為一郎童耶彼不我恩也郎誠見完與恩無所不可市者持童抵主人所愈束縳牢甚夜半童轉以縳即爐火燒絶之雖瘡手勿憚復殺市者因大號一墟皆驚以聞於官刺史顔証竒之留為小吏不肯䕶還之鄉栁文童區寄傳本朝王元之七八嵗一日太守席上出詩句鸚鵡能言争似鳳元之書其下曰蜘蛛雖巧不如蠶聞見後録文潞公幼時與羣兒擊毬入柱穴中不能出公以水灌之毬浮出司馬公幼與羣兒戲一兒墮大水甕中已沒羣兒驚走不能救公取石破甕兒得出識者已知二公之仁智不凡矣同上司馬温公自成童凜然如成人七嵗手不釋書至不知寒暑饑渴年十五書無所不通東坡撰公行状軾總角入鄉校有自京師來者以石守道作聖徳詩示鄉先生軾從道旁竊觀問先生以所頌者十一人何也先生曰童子何用知之軾曰此天人也則不敢知若亦人矣何為而不可先生竒軾言盡以告之東坡范文正公集叙摇頭却棃棗似識非分恥東坡詩少年壮盛日千里同上蘇公軾生十年而太夫人親授以書聞古今成敗輒能語其要太夫人讀范滂傳慨然太息公侍側曰某若為滂夫人亦許之乎蘇子由撰東坡墓誌虎子墮地氣食牛陳後山癡騃附童幼子瞳然如新生之犢荘子古之伐國不殺黄口淮南子史昭公生十九年矣猶有童心左襄三十一年漢髙祖問魏大将誰曰柏直是口尚乳臭不能當韓信西漢末世貴戚食禄之家温衣美飯乗堅驅良而面牆術學不識臧否通鑑漢殤紀黄吻婢兒通鑑晉紀晉惠帝為人戇騃聞蛙聲謂左右曰此鳴者為官乎為私乎時天下荒百姓餓死曰何不食肉麋晉書生長富貴齒髮尚少不更艱危通鑑唐徳宗紀集雖有五男兒總不好紙筆阿舒已二八嬾惰固無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔棗與栗陶淵明責子詩互入責子童騃無知雖藉祖父之寵曽微分寸之勞白傅集}
