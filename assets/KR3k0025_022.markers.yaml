  - {type: variant, offset: 1888, length: 8, content: 俶真訓史裨諶能謀, WYG: 集雄髪指危冠猛氣衝長纓飲餞易水上四座列群英陶潛荆軻飲燕市酒酣氣益震左太沖此地别燕丹壯髪上衝冠駱賔王匹馬東歸羨知己燕王䑓上結交新髙千里長虹貫白日易水急寒風陽縉洛陽為易水嵩嶽是燕山俗變羌胡語人多沙塞顔李白誰言行遊近張掖至幽州饑食首陽薇渴飲易水流陶潛雙旌過易水千騎入幽州塞草連天暮邉風動地秋皇甫茂政本朝雍熈四年陷}
