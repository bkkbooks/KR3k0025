  - {type: variant, offset: 1897, length: 0, content: '', WYG: 契丹宣和四年金人以州来歸賜郡名曰遂武防禦沿革表荆軻一去不復返易水東流無盡期馮戴燕山不改色易水無新聲誰知數尺䑓中有萬古情中有學仙䑓燕平欲升天林壑少佳色風雷有清秋太行千萬里瀟湘横中洲並劉因郭君自舉先羣豪樂生獨歩超凡曹酬恩一雪伯國恥建功並倚雲天髙吴師道郭隗獨為天下始樂生還自魏中來齊城下後讒夫起易水歌長壯士哀董儒薊州倚郭一外縣二漁陽三河玉田郡號廣川郡沿革天文尾箕分}
