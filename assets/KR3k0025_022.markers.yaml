  - {type: variant, offset: 2800, length: 222, content: 晉滅欒氏執政氏之臣勿行欒氏之臣辛俞行吏執而獻公曰國有大令何故犯之對曰自臣之祖以無大挼於晉國世隸欒氏於今三世矣臣故不敢不行國語滕公曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶通監漢紀漢高祖臣各為其主耳同上跖之狗吠堯堯非不仁狗固吠非其主當是時臣惟獨知韓信非知陛下也同上漢高紀桀之犬可使吠堯跖之客可使刺由西漢鄒陽書關羽殺顏良拜書辭曹操而犇劉備左右欲追之操曰彼各為其主勿追也通監漢獻紀什翼犍嘗討西部獲射者群臣欲臠割之什翼犍曰彼各為其主鬭耳何罪遂釋之同上晉, WYG: 纂淵}
