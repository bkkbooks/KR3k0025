  - {type: variant, offset: 1373, length: 4, content: 善矣終全, WYG: 戮兖親屬玉負兖之子琦逃至太原後琦仕後唐官至兵部侍郎時人以玉能存吕氏之孤皆稱其義皇朝髙彦暉漁陽人太祖時從王師伐蜀為先鋒又討王師雄之難力戰而死集閩烽指荆闗代馬属幽燕横海咸飛騎絶漢皆控弦韓延年簫鼓流漢颸旌甲被邊霜疾風衝塞起沙礫自飄揚鮑明逺接鏑赴陣首卷甲起行前韓延年征路出窮邉孤吟傍戍煙河光深蕩塞磧色逈連天許文化本朝宣和四年金人以州来歸賜名曰横山陞鎮逺軍節度沿革表行祠寂寞寄闗門野草猶知避血痕東坡驅馳本為中原用嘗享能令異域尊蘇轍題楊公祠亂山環合疑無路小逕縈迴長傍溪髣髴夣中尋蜀道興州東谷鳯州西同上平州倚郭一外縣二盧龍石城馬城郡號}
