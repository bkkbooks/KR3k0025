  - {type: variant, offset: 2155, length: 1, content: 苟, WYG: 明宗大悦遷黔南節度使累官左衛上將軍皇朝趙普州人仕太祖初為掌書記後拜相又相太宗拜太師追封韓王許驤州人風骨秀異十三能文善辭賦與吕䝉正齊名擢進士歴御史中丞用法寛恕時稱仁厚長者楊崇勲州人知兵法真宗時為郡牧使仁宗時拜同平章事判定州集北登薊丘望求古軒轅䑓應龍已不見牧馬空黄埃陣子昻鴈足牽情逺漁陽入望頻王懌征戍在桑乾年年薊水寒李君虞去嵗荆南梅似雪今年薊北雪如梅邉鎮戍歌連日動京城燎火徹明開張道濟沙場烽火侵胡月海畔雲山擁薊城少小雖非投筆吏論功直欲請長纓祖詠望薊門詩李相將軍擁薊門白頭惟}
