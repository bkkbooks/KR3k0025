  - {type: variant, offset: 2153, length: 1, content: 兼, WYG: 棲卧相𫝊孫真人修行於此徐無山在玉田縣東北後漢田疇避難於此小泉山在玉田縣東北三十里有泉出石罅間故名無終山在玉田東北三十里乃古無終子國金泉河在州城北龍池河在州南周村河在漁陽縣西光沙泉在玉田南溪澗中泉湧沙而出碎若飛雪輿地紀勝人物三國徐邈州人仕魏歴譙相平陽安平太守所在著稱後為梁州刺史風化大行累官司空晉劉沉州人博學好古仕至侍中喜薦賢士為時所重南北朝平恒州人為幽州别駕亷貞寡慾衣食常不足後遷秘書丞平鍳郡人少聰敏有豪俠氣以軍功累遷㐮州刺史後遷懐州築城以防冦城内井竭鍳衣冠而祝泉即湧出唐魯炅州人至襄鄧節度使後以禦賊有功封岐國公五代李承約郡人後唐明宗拜為陘州節度使見毛璋諭以祸福璋即從}
