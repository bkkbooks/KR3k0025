  - {type: variant, offset: 639, length: 533, content: 也傳說賢相也而武丁引金作礪以命其相說喻木從繩則正以戒其君陸宣公文善為國者宣惠以養威飬威以尊惠威而能飬則不挫惠而見尊則有恩同上絲桐本異質音響合自然韋應物集冰玉相輝椒蘭同馥張九齡文冰置白玉壺始見清皎潔珠穿殷紅縷始見明洞徹元稹集猶眾壑合注霈為大川群山出雲混成一氣呂和叔文集互見眾力難成本朝端溪石硯宣城管王屋松煙紫兔毫更得孤卿老書札人間無此五般高欒城集史今兩虎共鬭其勢不俱生通監互見勢不兩立朱彭冠賈為世壯士愛惡相攻能為國憂猶昆虫之相齧適足還害其身也後漢孔融傳角智者皆窮角力者皆負通監漢獻紀傳記韓盧天下之疾犬東都逡天下之狡兔盧逐逡環山者三兔極於前犬廢於後犬兔各死戰國策卞莊子方剌虎卞豎子曰兩虎方食牛牛甘必爭爭必鬭鬭則大者傷小者死從傷而剌之一舉必有獲兩虎之名有頃兩虎果鬭大者傷小者死春秋後語蘇代曰臣過小水見小蜯方出曝而鷸啄其肉蜯合而挾其喙鷸曰今日不雨明日不雨必有蜯脯蜯亦曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之春秋後語互見與人為地經君子之道或出或處或默或語易繫辭道並行而不相悖記中庸互入殊途同歸子曰道不同不相為謀語微子去之箕子為之奴比干諫而死語史伍員與申包胥友其亡也謂包胥曰我必復楚國包胥曰勉之子能復之我必能興之左定十四年子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若, WYG: 彦范陽}
