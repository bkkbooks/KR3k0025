  - {type: variant, offset: 2443, length: 286, content: 明曰李光弼長於憑城今出在野此成擒矣通監諸葛亮明於治國而為相關羽張飛勇冠三軍而為將同上漢獻紀傳記曹沬之奮三尺之劍一軍不能當使曹沬釋其三尺之劍而操銚鎒與農夫居壟畝之中則不若農夫戰國策猿獮猴錯木據水則不若魚鱉歷險乘危則騏驥不如狐狸同上顧劭與龐士元曰吾與足下孰愈曰陶冶世俗與時浮沉吾不如子論王霸之餘策覽倚伏之要害吾似有一日之長劭亦安其言世說集琴待嵇中散杯思阮步兵元微之集子長在筆予長在論劉賓客廉頗解武文無說謝眺能文武不通杜荀鶴集天之生物為用罕兼性有所長必有所短才有所合亦有所睽曲成則器物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良馭適險易之宜故駑驥無失性陸宣公文互見隨材器使, WYG: 道}
