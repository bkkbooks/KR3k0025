  - {type: variant, offset: 171, length: 4, content: 得益彰雖, WYG: 𫝊吕仙往来處弹琴峽在居庸闗中水流石罅聲若弹琴海子在府西三里汪洋如海中有芰荷鷗毛可玩西湖在玉泉山下環湖十里為一郡之勝觀太湖在府西南傍有二泉湧出經冬不凍玉河流出郡城東南注大通河盧溝河在府西南亦曰小黄河榆河源出昌平縣黄花鎮河自塞外流入琉璃河在良鄉南即古聖水延芳淀在漷隂西廣數百畆中多菱芡魚鴈九龍池在天壽山西南泉出九穴鑾石為龍吻水萬桞崖在府南銅馬門在舊燕城東南隅即古薊城門居庸闗在府北一百二十里天津闗在良鄉縣北白楊口在昌平縣西黄花鎮在昌平東北九十里樂毅墓在良鄉南三里竇禹鈞墓在府西二十里輿地紀勝人物周左}
