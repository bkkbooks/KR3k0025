  - {type: variant, offset: 167, length: 3, content: 精會神, WYG: 集遂置香河縣漷隂漢泉州縣地属漁陽遼改為漷隂縣本朝因之同上形勝天壽山在府北一百里羣峰聳㧞為一郡之勝槩西山在府西三十里為太行山之首玉泉山在府西北上有芙蓉殿韓家山在府西上有韓延夀墓仰山在府西七十里中有平頂如蓮花傍有五峰上多禪刹西湖山在府西一百里下有溪潭因名綿山在昌平縣東十二里上有古道塲玉𢃄山在昌平東北山腰有白石若𢃄故名燕山在府東自西山一𢃄迤􅆔東来延袤數百里抵海岸分水嶺在府西諸水至此分而為二摘星嶺在府西髙入雲霄吕公巖在玉泉山}
