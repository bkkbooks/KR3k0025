  - {type: variant, offset: 588, length: 0, content: '', WYG: 集十月北風燕草黄燕人馬飽弓力強虎皮裁鞍鵰羽箭射殺隂山雙白狼張子潛兒童能走馬婦女亦腰弓歐公度鴈山横岱北狐塞接雲中勿使燕然上惟留漢將功陳伯玉陣去金河冷書歸玉塞寒駱賔王隂雲興巖側悲風鳴樹端陸士衡燕䑓一去客心驚笳鼓喧喧漢將營萬里寒光生積雪三邉曙色動危旌祖詠寒深沙草白都䕶領燕兵放火燒奚帳分旗築漢城張文昌本朝宣和四年改燕京為燕山府又改郡曰廣陽節度曰永清軍沿革表燕山如長蛇千里限夷漢首衝西山麓尾掛東海岸㑹當挽天河洗此生齒萬並東坡萬里鉏耰接塞垣幽燕桑葉暗川原王安石草自岡長暮驛賖朔風終日起平沙韓稚圭黄金䑓下古燕都潭碧淵淪粉堞隅朱弁邉日照人如月色野風吹草似泉聲范純仁涿州倚郭一外縣三范陽歸義固安新城郡號涿鹿郡沿革天文尾箕分野禹貢冀州之域春秋戰國皆燕之涿邑秦為上谷郡地漢置涿郡曹魏改為范陽郡晋改為范陽國後魏復為范陽郡隋為涿郡唐初廢郡為范陽縣屬幽州大厯中又於縣置涿州遼置永泰軍本朝改為涿水郡沿革表縣沿革范陽春秋戰國為燕之涿邑唐置范陽縣歸義本漢易縣地唐置歸義縣本朝改歸信固安本漢方城縣屬廣陽國後屬涿郡新城本漢新昌侯國屬涿郡同上形勝獨鹿山在州城西十五里下有鹿鳴澤石虎山在州城西上有二石其形如虎龍安山在州城西北五十里時有雲氣騰繞宛若龍然白溝河在新城南淇溝在州西南督亢陂燕太子使荆軻齎督亢圖即此今有督亢亭月池在州西南廣三頃其形如月展䑓在州西南燕昭王嘗展禮于此華陽䑓在州境燕太子丹}
