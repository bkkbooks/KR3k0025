  - {type: variant, offset: 1174, length: 0, content: '', krp: 才學李宻禮重之唐盧承慶范陽人學博才辨累官至户部尚書賈島范陽人舉進士有詩名累官司戸五代張藏英范陽人後唐末舉族為賊孫居道所害藏英襲殺居道以祭}
  - {type: variant, offset: 1175, length: 182, content: 寶左襄十五年分量不同楚伍尚謂其弟員曰爾適吳我將歸死我能死爾能報左昭二十張竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣西漢陳遵傳互入各有所長蕭望之以射策為郎署小苑東門候王仲翁傳呼甚寵顧謂望之曰不肯錄錄反抱關為望之曰各從其志同上蕭望之傳王陽為益州剌史行部至卬郲九折坂歎曰奉先人遺體柰何數乘此險後以病去及尊為剌史至其坂問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽, WYG: 父母時稱}
