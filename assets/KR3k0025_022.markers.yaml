  - {type: variant, offset: 1371, length: 0, content: '', WYG: 集胡風吹朔雪千里度龍山鮑明逺度闗行照月乗障坐消烟徐知仁鞞鼓黿鼉振旌旗鳥獸懸由来詞翰簡今見勒燕然同上方消塞北祲還静漠南塵李巨山本朝宣和四年金將郭藥師以州降賜名曰涿水陞威勝軍節度沿革表我瞻涿鹿野古来戰蚩尤軒轅此立極玉泉朝諸侯文山曠野風多勁范純仁涿州沙上望桑乾鞍馬春風特地寒王介甫樓桑大樹翠繽紛鳯鳥鳴時曽一聞合使本支垂百世詎知功業只三分朱熹燕山竇十郎教子以義方靈椿一株老丹桂五枝芳馮道誰將家集過幽都每被行人問大蘇莫把文章動蠻貊恐妨談笑卧江湖李宗易寄子瞻檀州倚郭一外縣一宻雲行唐郡號宻雲白檀郡沿革天文尾箕分野禹貢冀州之域秦漢時為漁陽郡地後魏置宻雲郡領白檀要陽宻陽三縣兼置安州後周改安州曰𤣥州隋置檀州後改安樂郡唐為檀州遼為}
  - {type: page-break, offset: 1371, content: '', id: KR3k0025_WYG_022-9a, image: WYG0930/WYG0930-0499c.png}
