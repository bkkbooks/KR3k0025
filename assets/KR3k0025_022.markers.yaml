  - {type: variant, offset: 163, length: 3, content: 袁譚傳, WYG: 省廣陽合上谷永光初復立廣陽郡三國魏為燕國晋改范陽國後周改置燕及范陽二郡兼立總管于幽州唐改州為范陽郡乾元初復為幽州遼陞幽州為南京幽都府後改幽都為析津府本朝宣和中改燕山府沿革表縣沿革析津本秦薊縣地属上谷郡漢至唐皆仍舊遼改為析津昌平漢為軍都縣属上谷郡晋為昌平縣本朝仍舊良鄉春秋時燕中都地漢為良鄉縣潞秦属漁陽郡漢置潞縣武清漢雍奴縣𨽻漁陽郡属燕國天寳初改為武清縣安次漢舊縣唐武徳間移治石梁永清本秦上谷郡地漢属渤海郡唐改為永清縣香河本武清縣地遼于新倉置𣙜鹽院因居民}
