  - {type: variant, offset: 1683, length: 23, content: 鵬鷃逍遙各自知臨川集經夔達於樂而不達於禮記仲尼, WYG: 號為遂武郡縣沿革易水本秦上谷郡地漢為涿郡本朝置為易水縣淶水本漢涿郡遒縣地後周置永陽縣後改涞水縣容城本漢舊縣屬涿郡唐屬易州本朝因之並沿革表形勝龍跡山在州城西南石上有仙人及龍跡西麓有坑大如車輪中有四穴春則風東出夏出南秋出西冬出北龍宫山在淶水縣西北三十里中有石洞泉水匯石井中大寜山在易水西中有大寜寺五迴嶺在州西南委折五迴下望層山若蟻垤然星月巖在州城西山頂有二穴望之隠然如星月狀黄金䑓在易州東南}
