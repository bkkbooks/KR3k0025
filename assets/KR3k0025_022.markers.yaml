  - {type: variant, offset: 1372, length: 0, content: '', WYG: 威軍本朝號為檀州沿革表縣沿革宻雲本秦漢漁陽郡地五代時魏置宻雲縣行唐本真定舊地秦割為南行唐縣後魏去南字為行唐縣同上形勝宻雲山在縣南十五里昔燕趙伏兵於此大獲遼衆白檀山在縣南山陽古有白檀故名曹操歴白檀破烏丸于栁城即此霧靈山在宻雲縣東北山擁祥光如霧每于六月六日現栢山在行唐西北三十里上有古栢大數十圍栢上有鉄環相𫝊竇建徳椓以繫馬者箕山在行唐西北其峰若箕形相𫝊許由隠此上有許由墓棄瓢巖洗耳溪巢父問答碑毘山在行唐西北四十里峰巒若列屏障相𫝊毘盧佛化身之所上有禅刹掛甲谷在宻鄉東北楊彦朗北征嘗掛甲于此廣􅛜水在宻雲東北道人溪在宻雲東北告河在行唐縣南倒馬闗水在行唐東二十里古北口在宻雲北一百二十里峩􅔞山塞在宻雲東北楊令公祠在古北口共城在檀州乃舜流共工于幽州之地輿地紀勝人物周郤縠行唐人趙衰稱其説禮樂敦詩書知御兵之道晋文公使作元帥將三軍南北朝鮮于世榮郡人沉敏有器幹事北齊為太子太傅周武帝入代遺以寳噐不受後被執不屈而死五代趙玉郡人嘗客滄州依節度使吕兖劉守光破滄州}
