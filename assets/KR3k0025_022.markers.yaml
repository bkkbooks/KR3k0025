  - {type: variant, offset: 1902, length: 5, content: 邑則否左襄, WYG: 此後復置漁陽郡唐置薊州取古薊門闗以名天寳初改漁陽郡乾元初復為薊州本朝改廣川沿革表縣沿革漁陽本漢舊縣屬漁陽郡後廢唐為漁陽縣之大王鎮三河本漢臨泃縣地唐析潞縣地置三河縣屬幽州以地近七渡鮑丘臨泃三水故名玉田本春秋無終國地漢為無終縣魏屬漁陽郡後省唐復置屬幽州後改為玉田縣因漢楊雍伯種石得玉故名同上形勝崆峒山在州東北五里黄帝嘗問道於崆峒山上有府君廟存焉盤山在州西北山北數峯陡絶桃花山在州西南魏志漁陽有桃花山即此甘泉山在州西北七十里山下有泉極甘羙故名瑞屏山在漁陽縣北二十里連峯聳㧞秀若列屏碣山在漁陽縣東峰巒峭峻林谷深䆳華山在三河縣北}
