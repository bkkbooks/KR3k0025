  - {type: variant, offset: 905, length: 7, content: 候也霜雪飄暴凍, WYG: 邯鄲鉅鹿二郡地漢初立趙國治邯鄲縣晉亦為趙國治房子後魏廢國為趙郡治平棘北齊置趙州隋置灤州後改為趙州大業初改趙郡仍治平棘唐復為趙州治栢鄉縣尋復治平棘天寳初改趙郡後復為趙州本朝置慶源府沿革表縣沿革平棘春秋時晉地戰國屬趙後魏置平棘寜晉春秋晉楊氏邑漢屬鉅鹿郡晉為廮陶唐改寜晉臨城戰國屬趙為房子縣唐改臨城縣髙邑本晉鄗邑漢為鄗縣屬常山郡光武改為髙邑隆平本漢廣阿縣隋為象城唐為昭慶本朝為隆平栢鄉本春秋晉鄗邑地隋置栢鄉賛皇東漢高邑縣屬常山國隋置賛皇取山為名同上形勝檀山在賛皇縣東十里髙百餘丈周穆王嘗駐蹕於此五馬山在賛皇東十里上有五石馬故名賛皇山在縣西南十里高百餘丈縣名取此十八盤山在賛皇六十里上下十有八盤龍井在州北思賢堂在隆平縣治西祀宓子賤卓茂魯恭環山亭在賛皇治西環亭皆山故名望臺在州東南漢時耿弇築此以望光武千秋臺在髙邑南二里漢光武至鄗因諸將請築臺遺趾猶存安濟橋在州南五里洨河上即大石橋昔張果嘗騎驢過此河踏跡尚存永通橋在州西清平河上槐水橋在栢鄉縣六里漢光武廟在栢鄉縣北十五里内有石人唐祖陵在隆平縣南十五里唐祖宣皇帝塟此象城在隆平縣三十五里舜弟象嘗居於此輿地紀勝人物南北朝李靈平棘人魏道武時以才俊被徴拜中書􅀶士累官洛州刺史贈鉅鹿郡公李順靈從父弟多計策仕魏征伐有功賜爵平棘子李璨靈之弟仕魏為中書郎以定淮北功賜爵始豐侯子二元茂宣茂曾孫名槩俱有文學李謐孝伯從孫十嵗喪父哀毁動人事兄極恭十三通詩書厯數鄉人以神童號之魏文徴拜著作郎不就賜號貞静處士隋李徳饒璨四世孫好學有至性仕為監察御史唐李思行州人髙祖起兵時以賛大議受左統軍累功遷嘉州刺史樂安郡公李素立髙邑人擢監察御史有犯法不至死者髙祖欲殺之素立堅執不可帝嘉納之累爵髙邑侯李嶠賛皇人十五通五經舉進士任給事嘗辨狄仁傑寃獄李華賛皇人舉進士累官吏部貟外郎李翺州人中進士第初為國子􅀶士嘗面斥宰相李逢吉之過後拜諌議大夫李吉甫栖筠子為翰林院學士擢中書侍郎引薦賢士時稱賢相李絳賛皇人舉進士官翰林學士後與李吉甫同相甚鯁直獻宗稱為真宰相李徳裕吉甫子初為翰林學士曽上丹扆六箴後拜封衛國公皇朝宋綬平棘人性孝謹清介擢進士累官資政殿學士叅知政事李京州人中進士第遷監察御史數上書言事切直王徳用州人累功遷集慶軍節度使名聞四夷時號黒王相公郭諮平棘人舉進士𨽻殿中丞嘗陳治水禦戎之䇿時論偉之同上集夜渡濁河津衣中劍滿身昨縁秦苦楚来往大梁頻鄭縱黄雲同}
