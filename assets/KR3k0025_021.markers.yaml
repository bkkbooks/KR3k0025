  - {type: variant, offset: 46, length: 2, content: 唶吮, WYG: 舊臺空望闕應懷戀遭時貴立功並韋應物朝光耀庭雪宿凍聚池寒正色臨㕔事疑詞定筆端張説魏帝當年銅雀臺黄花深映菊叢開薛能金鳳隣銅雀漳河望鄴城劉方平士苦形骸黒林踈鳥獸稀那堪往来戍恨解鄴城圍杜甫本朝熈寜五年省氷和縣入安陽宣和二年以湯隂縣𨽻濬州尋復𨽻相州熈寜五年省鄴縣入臨漳沿革表甘棠猶茂應存愛植栁堪驚近過圍魚遊藻間適物性月沉波底發禪機韓魏公遷鶯賀燕翩翩集嘉樹甘棠次第春宋子京黄昏日傍霜臺落緑樹人穿廢苑行劉彦冲白首三朝社稷臣壺漿夹道擁如雲金貂争看真宰相竹馬猶迎舊使君韓魏公中山府倚郭一外縣六安喜無極曲陽唐望都新樂北平郡號􅀶陵郡沿革天文昴畢分野禹貢冀州}
