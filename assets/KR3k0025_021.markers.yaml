  - {type: variant, offset: 218, length: 1, content: 川, WYG: 在郡城北二十里馬頭山在郡西北三十里上有石柱鐡環相傳洪水懷山時民繫舟於此明月山在懷州城東北四十里其山高峻可登眺金傘山在懷州城東北五十餘里其巖絶壁可愛嵇山在脩武縣北五十里嵇康嘗居其下温峪山在修武縣北五十里峭壁千仭懸瀑下注㑹而為黒白二龍潭鳯凰山在脩武北六十里熙寜間鳳集於此六真山在修武北二十里即六真子脩道之所上有六真洞沁河在郡北二里源出沁州穿太行逹濟源神井在郡城東北其水㓗而味甘望嶽樓在郡内高百尺為一郡勝槩迎風樓在河内縣甘泉閣在修武縣下有井泉香而美輿地紀勝人物漢趙子河内人受詩學於韓嬰生徒甚盛蔡茂河内懐人以儒學顯試􅀶士遷侍中清儉匪懈樂崧河内人天性朴直常為郎獨直臺上家貧無衾帝入臺見而嘉之召大官賜朝夕餐歴官南陽太守衛颯修武人家貧好學随師無糧嘗傭以自給建武初除侍御史遷桂陽太守理恤民事居官治家有規程丁蘭河内人性至孝喪母刻木像事之若生隣人張叔醉詈母像以杖擊其首蘭歸像色若有不懌詢知之即奮擊張叔吏捕蘭像為之垂泣郡守嘉其孝通神明奏之詔圖其}
