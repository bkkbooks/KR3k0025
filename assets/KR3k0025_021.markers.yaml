  - {type: variant, offset: 732, length: 1, content: 心, WYG: 三國楊俊獲嘉人舉茂材為安陵令遷南陽太守宣徳教吏民稱之南北朝李彪衛國人少孤貧有大志仕魏官至御史不避權倖文帝呼為李生而不名李昶彪之孫年十嵗作明堂賦當時竒之後官至臨黄縣公唐謝偃衛人貞觀初對策高第歴高陵主簿後屢}
