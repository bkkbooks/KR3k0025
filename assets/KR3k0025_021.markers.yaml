  body:
  - {type: variant, offset: 1, length: 1, content: 物, WYG: 北齊遷平原太守隋李知本元氏人愽學性孝友子孫百數庭無間言大業末盗賊過閭不入}
  - {type: page-break, offset: 1, content: '', id: KR3k0025_WYG_021-4a, image: WYG0930/WYG0930-0473a.png}
  - {type: variant, offset: 1, length: 1, content: 物, krp: 北齊遷平原太守隋李知本元氏人愽學性孝友子孫百數庭無間言大業末盗賊過閭不入}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 戒曰無犯義門唐倪若水藳城人擢進士嘗為汴州刺史政尚清浄累官尚書右丞劉禹錫中山人擢進士宏詞科累官集賢直學士劉栖楚真定人累官右拾遺常諌敬宗遊畋碎首玉階帝為動容皇朝髙懷徳常山人從太祖征澤潞及揚州以功封冀國公曹彬靈夀人太祖命為都監伐蜀回囊中惟圖書而已及下江南不妄殺一人以功封魯國公曹璨彬長子習知韜畧屢戰有功授同平章事曹瑋彬第三子沉勇有謀通春秋三𫝊年十九舉措老成累立戰功為都指揮使賈昌朝獲鹿人登進士為崇政殿説書拜中書門下平章事同上集光武經營業未興王郎兵革暫憑陵須知後漢功臣力不及滹沱一片氷肅氣闗河暮屯烟部落晴旂彩秋燒去甲色夜光横石曼卿吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終陳伯玉士喜擊中鼔虜疑聞後鉦無私乃時雨不殺是天聲石曼卿贈曹彬寒逾博望塞春燕隗囂城外使戎心伏旁資帝道平同上本朝開寳六年廢九門石邑二縣端拱初以鼓城𨽻祁州淳化九年以束鹿𨽻深州慶厯八年初置真定府路安撫使統真定府磁相邢趙洺六州熈寜六年省井陘入獲鹿平山八年復置徙治天武軍即縣治置軍使𨽻府有天威軍小作口王家谷二砦熈寜六年省靈夀為鎮入行唐八年復冇赤陘飛吳二砦沿革表萬人背水亦書意獨驅市人收萬全黄魯直君不見滹沱流澌車折軸公孫倉皇送豆粥濕薪破竈自燎衣饑時頓解劉文叔身經戎馬心逾壯天入風霜氣更豪横槊賦詩男子事征西誰為謝諸曹並東坡夷門一把平安火定遂恒山候騎来李長源破趙降燕漢業成兎亡良犬日圖烹功盖一時誠不滅恨埋千古欲誰明韓稚圭相州倚郭一外縣三安陽湯隂臨章林慮郡號鄴郡州沿革天文室壁分野禹貢冀州之域商河亶甲居相即此春秋為晉之東陽地戰國為魏之鄴地秦為上黨邯鄲二郡地漢置魏郡治鄴東漢末冀州徙治鄴魏曹操受封於此後稱為鄴都晉仍為魏郡屬冀州後趙石虎前燕慕容雋並都之後魏於此置相州東魏静帝徙都之改曰司州北齊武帝又都之改為清都尹後周復改為相州及魏郡治安陽隋初置郡為相州大業初復改魏郡唐為相州天寳初改鄴郡乾元初復為相州五代梁置昭徳軍節度晉改彰徳軍本朝復相州屬河北道縣沿革安陽本紂都之地左傳羛陽即此秦更名安陽湯隂古羑里地戰國為魏湯隂地漢置湯隂縣臨漳縣本鄴地魏文侯始封於此晉改為臨漳縣林慮縣本漢隆慮縣屬河北郡後漢改林慮縣沿革表}
