  - {type: variant, offset: 898, length: 0, content: '', WYG: 井輿地紀勝人物皇朝盧之翰少篤學家貧太宗朝登第歴遷殿中丞通判洺州契丹入㓂决漳御河以固城敵不能攻召還歴西京轉運副使建議導潩河入於淮逹許州以便漕運齊恢蒲隂人唐宰相映之裔登進士第通判陳州臨政簡約州人愛之韓琦薦其賢擢太子左諭徳神宗時以天章閣待制知相州召紏察在京刑獄同上集佳人擕瑟漳河曉壯士悲歌易水秋薛大拙本朝端拱初以鎮州鼔城来屬景徳元年移治於定州蒲隂以無極𨽻定州熈寜六年省深澤縣為鎮入鼔城元祐元年復置沿革表慶源府倚郭}
