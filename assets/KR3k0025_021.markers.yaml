  - {type: variant, offset: 49, length: 0, content: '', WYG: 域漢為中山郡後改中山國魏改定州晉慕容垂都地隋改􅀶陵郡唐改定州天寳初改􅀶陵郡乾元初復為定州建中間改義武郡節度本朝改定武軍政和間陞中山府沿革表縣沿革安喜漢中山郡地後魏屬定州本朝陞州為府以安喜附焉無極本漢毋極縣唐武后時改毋作無曲陽漢置上曲陽縣以在太行之陽轉曲處故名唐漢常山國地本朝改為縣望都亦漢常山國本朝置縣新樂漢新市縣屬中山國本朝因之北平漢薊州地李廣出獵暮遇石以為虎射之沒羽即此同上形勝嘉山在州西唐郭子儀敗史思明於此少容山在曲陽殷女昌容隐居之所上有八㑹寺利民侯祠恒山在曲陽西北恒為北嶽盖五嶽之一也辰星主焉雙嶺山在唐縣西北水豆巖在曲陽西北上有潄玉亭並蘇軾書浮休二大字雪浪石在郡文廟前狀如雪浪鑿石盆為芙蓉形以盛之沙河在新樂西南東流入海黒水在郡界地深而不流閲古堂在郡治後園韓琦率武定時建傍書歴代良守將事績凡六十條問山堂在無極縣境内春露亭在新樂縣南義臺在新樂縣南燕慕容麟戰於義臺即此倒馬闗在郡西龍泉關在曲陽縣西韓魏公祠在文廟西蘇東坡祠在郡境内堯城在郡東北固城在郡城東相傳禹治水所築苦陘城在無極縣東魏李克為中山相知縣吏之貪而免之輿地紀勝人物南北朝魏季景曲陽人􅀶學有文才仕魏為中書侍郎家無餘財所著文筆二百卷魏釗曲陽人􅀶涉羣書仕齊為建忠將軍子長賢􅀶涉經史為著作郎隋魏澹季景子世業文章仕為禮部侍郎唐張行誠郡人少師劉兹兹稱其器宇方正宰相才也高宗補侍御史崔𤣥暉郡人武后時為天官侍郎後封􅀶陵郡王李百藥郡人七嵗能文魏立為鳯閣舎人與裴炎結交能保終始號耐乆朋陽城郡人徳宗召拜諌議大夫后遷國子司業崔湜郡人舉進士累官中書令與弟液澄從兄涖並以文學顯甄濟無極人知禄山將叛隐居不仕後肅宗召為}
