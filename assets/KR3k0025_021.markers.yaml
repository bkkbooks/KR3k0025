  - {type: variant, offset: 1035, length: 2, content: 配喬, krp: 秋文山保州倚郭一保塞郡號上谷清苑州沿革天文尾箕兼昴畢分野禹貢冀州之域戰國時屬趙秦為上谷鉅鹿二郡地漢為涿郡及信都中山國地晉屬范陽髙陽中山安平河間國後魏為樂浪北平上谷郡地隋屬上谷博陵河間三郡始於此置清苑縣唐時其地屬莫定滿瀛等州五代晉割屬契丹於此置秦州後移州治蒲城而舊州仍為清苑縣本朝即縣置保塞軍沿革表縣沿革保塞本漢樊輿縣屬涿郡北齊省入永寜軍隋改為清苑縣屬河間郡以境内有清苑河故名唐屬莫州五代因之本朝改保塞縣同上形勝郎山在郡西北五十里其峯尖鋭如削}
