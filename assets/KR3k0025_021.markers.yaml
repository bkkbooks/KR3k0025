  - {type: variant, offset: 4399, length: 419, content: 火就燥也平地若一水就濕也草木疇生禽獸群焉物各從其類也荀勸學天之且雨也陰曀未集而魚已噞矣山雲蒸柱礎淮南子抱薪加火燥者必先然平地注水濕者必先濡鄧子史蟋蟀俟秋唫蜉蝣出以陰虎嘯而風冽龍具而致雲王褒頌南風至則黃鍾應融風動而魚上冰後蔡邕傳威蒸在野野集仁獸後漢應龍之翔雲雺滃然而從震風薄怒萬竅不約而號物有自然相動耳唐裴寂贊影之像形響之赴聲動而相隨各以類應唐傳記吳牛見月而喘世說蛤蟹珠龜與月盛衰會稽先賢傳蚌蛤龜珠與月盛衰月者太陰之精故龜蛤之屬因之以盛虧呂氏春秋曰月望則蚌蛤實月晦則蚌蛤虛大戴禮霜降則鳴山海經陽出雞鳴以類感也春秋說蟻封穴戶大雨將至焦貢易林唐樂懸散失獨無徵音李嗣真求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一段為四具補樂懸之散闋大周正集同音者相和同類者相似飛鳥號其群鹿鳴求其友楚辭叩宮而宮應彈角而角動虎嘯而谷風生龍舉而景雲往聲音之相扣兮言物類之相感也同上鳴聲相應仇偶相從選詩蚌蛤珠胎與月虧全選東都賦隱雷自天昆蟲已聽浮陰在漢柱礎先霑任孝恭啟, WYG: ''}
