  - {type: variant, offset: 730, length: 0, content: '', WYG: 泉源出共城縣凡城在共城縣西南二十里周公子凡伯封此牧野在郡城南周武王伐紂陳師即此朝歌邑在郡境内即殷舊都七賢鄉即晉時竹林七賢之地邀月樓飛雲樓警嚴樓俱在郡治挹翠樓筠溪軒俱在共城縣内太公臺武王築此拜太公望為尚父故名共臺在共城治内臺髙一丈五尺上有亭共姜守節之所君子村在郡西蘧伯玉居於此安樂窩在共城縣西北邵康節所寓處輿地紀勝}
