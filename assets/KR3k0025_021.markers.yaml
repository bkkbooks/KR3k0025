  - {type: variant, offset: 45, length: 0, content: '', WYG: 所害晉邵續安陽人愽覧經史初為成都王叅軍後為樂陵太守累官冀州刺史南北朝孔伯恭鄴人事魏累官鎮樂將軍唐傅奕鄴人仕為太史丞常上書詆浮圖法戴胄安陽人為秦王府叅軍犯顔諌諍遷尚書左丞叅知政事杜正倫相州人初置文學舘魏徴薦其才累遷中書侍郎杜羔正倫孫舉進士性至孝官至工部尚書皇朝韓國華安陽人舉進士性純直累官左司諌子珫賜進士出身琚璩琦並進士及第韓琦國華子弱冠舉進士方唱名太史奏五色雲見歴仕中外朝廷倚重封魏國公韓忠彦琦子舉進士初為樞宻丞拜右僕射數進讜言大有忠益封儀國公岳飛湯隂人少負氣節好左氏春秋􅊎以忠義報國為秦檜所害追封鄂王諡武穆同上集禮樂儒家子英豪燕趙風鳴琴當理邑走馬却從戎白刄千夫闢黄金四海同鄴州新騎滿魏}
