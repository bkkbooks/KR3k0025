  - {type: variant, offset: 735, length: 2, content: 蘇瓌, WYG: 王言不可藏於私家卒贈太子太保髙定郢之子七嵗讀湯􅊎跪問父曰柰何以臣伐君郢曰應天順人何云伐耶對曰用命賞於祖不用命戮於社是順人乎郢異之仕至京兆府參軍皇朝魏仁􅄎汲人幼孤貧周世宗時官至集賢殿學士太宗初進為右僕射為人謹厚時稱長者魏咸熈仁漙之子性仁孝仕為屯田郎中常㑹賓客家僮覆案碎器客皆驚諤咸熙色不變其寛厚若此魏咸信熙之弟初授春坊舎人尚公主後以御契丹}
  - {type: page-break, offset: 735, content: '', id: KR3k0025_WYG_021-28b, image: WYG0930/WYG0930-0485b.png}
  - {type: variant, offset: 735, length: 2, content: 蘇瓌, krp: 王言不可藏於私家卒贈太子太保髙定郢之子七嵗讀湯誓跪問父曰柰何以臣伐君郢曰應天順人何云伐耶對曰用命賞於祖不用命戮於社是順人乎郢異之仕至京兆府參軍皇朝魏仁溥汲人幼孤貧周世宗時官至集賢殿學士太宗初進為右僕射為人謹厚時稱長者魏咸熈仁漙之子性仁孝仕為屯田郎中常㑹賓客家僮覆案碎器客皆驚諤咸熙色不變其寛厚若此魏咸信熙之弟初授春坊舎人尚公主後以御契丹}
  - {type: variant, offset: 738, length: 0, content: '', WYG: 功拜彰徳軍節度使同上集揚芬紫烟上垂綵緑雲中春吹回白日霜歌落塞鴻鮑照憶昔征南府内遊君家東閣最淹留共相聮句嘗侵夜次第看花直到秋想思前路㡬回首滿眼青山過衛州楊累山自愛新梅好行尋一徑斜不教人掃石恐損落来花張籍題梅溪周王甲子旦漢後徳陽宫灑瑞天庭裏驚秋御苑中沈佺期氛氲生浩氣䬃杳舞回風宸藻光盈尺􅆳歌樂嵗豐同上洛北風花樹江南彩鷁舟芳生蕙蘭草春入鳳凰樓孫逖春風野岸名花發一道帆檣盡御烟杜甫日臨秋草廣山接逺天㣲岸葉随波盡沙雲與鳥飛許棠本朝熈寜六年廢新鄉為鎮入汲縣元祐二年復天聖四年自懷州来𨽻獲嘉沿革表先生自衛客西畿樂道安閒絶世機貫穿百代嘗探古吟咏千篇亦造㣲富弼題安樂􅩲客求墨妙多擕卷天為詩豪剰借春千章古木隈崖寺一㸃清光守障燈並程明道君王不恃金湯險自有仁恩結萬方李廸洺州倚郭一外縣四永年肥鄉平恩鷄澤曲周郡號廣平武安州沿革天文昴分野禹貢冀州之域春秋屬晉戰國屬趙秦為邯鄲郡地漢初置廣平國後周改置洺州隋改為武安郡唐初改為洺州天寳初改廣平郡乾元初復為洺州本朝屬河北道沿革表縣沿革永年本春秋曲梁地漢為曲梁縣屬廣平國東漢屬鉅鹿郡晉屬廣平郡隋改廣平為永年縣屬武安郡唐屬洺州本朝以臨洺縣省入肥鄉本漢邯鄲蒲縣地曹魏置肥鄉縣屬廣平郡晉因之隋屬洺州本朝仍舊平恩本周之甘泉市秦為晉縣漢為信城縣屬清河郡晉改清河縣唐復為貝州五代時晉置永清軍節度本朝改為平恩鷄澤春秋盟於鷄澤即此漢為廣平縣地隋於廣平城置鷄澤縣大業初省唐復置自後縣治累遷而名不改曲周本漢舊縣屬廣平國後魏改曲安縣屬廣平郡隋屬洺州本朝因之同上形勝聰明山在州西六十里上有神廟狗山在州西七十里山頂有狗迹因名唐太宗討劉黒闥建壘於此天臺山在肥鄉西南上有夀亭侯廟浮丘山在肥鄉南四里鷄澤在縣境石家河在肥鄉東南五里滏水在州南五里永濟渠在平恩西北十里隋煬帝征遼時命名董塘坡在曲周西北晉劉牢之北救符丕追慕容垂于董塘泉即此輿地紀勝人物三國朱靈平恩人從曹操征伐有功文帝禪位封俞侯晉程衛曲周人劉毅聞其名辟為都官從事在朝正色難犯名振逺邇南北朝馮道振洺州人事母以孝聞郡召為主簿不就聞梁文帝起兵率鄉人從之為驍騎將軍攻戰有功進爵為伯唐程名振平恩人仕為永寜令太宗征遼嘗召問方畧名振辨對甚詳太宗稱為竒士軍中號為名將馮仁海鷄澤人事親居喪有志行為鄉人所稱郭守素鷄澤人與馮仁海齊名同載唐書孝友𫝊五代霍存曲周人善騎射仕梁累官曹州刺史兼諸軍都指揮使皇朝解暉洺州人屢從征伐身先士卒金創徧體時稱驍將以功遷馬步軍副都頭元逹鷄澤人善射𨽻太宗帳下累遷北面行營都部署交士大夫能折節盡禮人以是稱之孟元洺州人性謹愿善讀書仕為真定路鈐轄討賊有功累官閤門祗侯榮州刺史李若水曲周人以十舎登第為太學􅀶士金人侵邊若水大罵不屈遂遇害諡忠愍同上集畛封連故趙廬井𢃄清漳儲光羲蔓草縁闗隅修楊夹廣津鮑明逺萬山盤礴全流環匯全書本朝建隆元年陞廣平郡為防禦熙寜三年省曲周為鎮入鷄澤六年省臨洺縣為鎮入永年元祐二年曲周臨洺復為縣尋復為鎮四年曲周鷄澤依舊别為兩縣沿革表漠漠春風裏茸茸緑未齊平田鴉散啄深樹馬迎嘶千年㡬度河山改空指遺臺是趙家地入河流曲天随日去低髙城已在眼聊復解輕齎並王介甫洺州秋雨後幽勝可供閑王逸賔野泉来竹底危磴入雲間尚記登高㑹重嵓細車班同上深州倚郭一外縣四静安束鹿安平饒陽武强郡號饒陽州沿革天文昴畢分野禹貢冀州之域本漢下􅀶縣地屬信都國晉屬安平國隋屬信都郡開皇中始置深州治安平縣後廢唐復置深州于饒陽後移治陸澤五代周始徙治下􅀶本朝改下􅀶曰静安沿革表縣沿革束鹿本漢郳縣地屬鉅鹿郡北齊改曰安國縣隋於此置安定縣屬定州開皇中改為鹿城縣唐初屬深州天厯中改為束鹿縣本朝仍舊安平本漢舊縣屬涿郡晉置􅀶陵國北齊為􅀶陵郡治隋置深州後省州以縣屬􅀶陵郡唐又置深州本朝因之饒陽本漢舊縣屬涿郡隋屬瀛川唐為深州治所本朝仍屬深州武强漢為武隧縣地屬河間國晉析置武强縣屬長樂國唐屬深州後屬冀州本朝屬深州同上形勝武强山在武强縣境内漢置縣取此紫金山在深州北五十里即舊捍水隄嵗乆頽敗惟存二阜巉然屹立束鹿巖在束鹿縣北外隘内廣可容千餘人滹沱河在束鹿南三十里饒河在饒陽縣西南漢置縣取此鴉兒河在束鹿南十里輿地紀勝人物漢崔駰安平人愽學有才時薦其宿徳大儒遷濟北相官至尚書崔琦安平人文章􅀶通梁冀行多不軌琦作外戚箴以諷冀隂使人害之晉馮沈安平人􅀶涉經史仕魏為魏郡太守入晉累遷御史中丞隋孫萬夀武強人􅀶渉子史善屬文隋初徴拜豫章王長史有文集十三卷崔頥安平人七嵗能屬文開皇初射䇿髙第居母憂水漿不入口五日後奉詔與諸儒撰區宇圖志唐張進饒陽人少負竒質有膽氣唐初謀擒劉黒闥以功授開府儀同三司張鷟深州人少聰慧絶倫為文下筆輒成舉進士累官學士時稱其文猶青銅錢萬選萬中人號為青錢學士魏知古深州人幼有才雅擢進士第後拜黄門侍郎皇朝周仁美深州人開寳中征契丹有功累官右班都知戍環州李昉饒陽人和厚多恕不念舊惡太宗嘗稱為善人君}
