  - {type: variant, offset: 2519, length: 1746, content: 漢李固傳互見事同一体舉中於禮則強梁禠氣片言違正則廝臺解情東漢循吏傳贊一夫得情千室鳴絃同上互見循良姜詩母嗜魚鱠又不能獨食夫婦嘗力作供鱠呼鄰母共之舍側忽有湧泉味如江水每旦輒出雙鯉魚以供二母之膳同上姜詩妻列傳魏武好法術而天下貴刑名魏文慕通達而天下賤守節通監殷紂好色妲己是出葉公好龍真龍游廷通監漢桓紀王者心有所想雖未形顏色而五星以之推移陰陽為之變度漢靈紀謝安好聲律㫷功之慘不廢絲竹土大夫效之遂以成俗晉侮西公紀秦劉蘭討蝗經秋多不能滅有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是歲秦大熟晉武紀作解散髻斜插簪朝野慕之相與倣傚齊王儉齊帝既殘忍有司訊囚莫不嚴酷或燒犁耳使立其上或燒車釭使以臂貫之梁敬帝紀以上並通監裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠通監唐太宗上入苑中見蝗掇數枚祝之曰民以榖為命而汝食之寧食吾之肺腸舉手吞之是歲蝗不為災同上夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣同上唐高祖張楚金魏元忠臨刑太后使鳳閣舍人王隱客馳騎傳聲赦之是日陰雲四塞既釋楚金等天氣晴霽武后並通監傳記行非為影也而影隨之呼非為響也而響和之說文書蟊吏抵冒取民財則生蟘吏乞貸則生螟吏冥冥犯法則生許慎說文宋景公時熒惑在心公召子韋問焉子韋曰禍在君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於歲公曰歲飢人餓必死焉為人君而殺其人誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舍後果三徙呂氏春秋齊景公時熒惑守虛朞年晏子曰虛齊之分野當強為善公乃去冤獄振孤敬老行之三日而熒惑遷晏子春秋周公下白屋之士七十人而天下之士皆至晏子與同衣食百人而天下之士亦至仲尼修道行理文章而天下之士亦至說苑集爾形信直影亦不曲爾聲信清響亦不濁晉裴頠女史箴互入端本澄源庶女告天振風襲於齊堂建平王上書風大行貞女蒙冶容之化淳化殷流盜跖挾曾史之情陸士衡演連珠賤臣叩心飛霜擊於燕地選江文通上書珠玉無脛而自至者以人好之也孔文璋文宋景公時大旱三年卜之以人祠乃雨公下堂頓首曰所以求雨將自當之言未卒大雨藝文類聚強於內者外必勝殖不固者發必隳皇甫湜疋婦含怨三年亢陽疋夫結憤六月飛霜唐文粹漢高帝大度故其時多魁傑不羈之才孝武好英風故其時富瑰琦立名之士孝宣精吏能故其時萃循良核實之能陸宣公集誠信大虧則百事無不紕繆同上本朝六國合從而辨說之材出劉項並世而籌畫戰鬭之徒起唐太宗欲治而謀謨諫諍之佐來臨川集唐太宗朝將相固不可及至伎藝之士醫有孫真人陰陽有李淳風呂才相法有袁天綱後世不及也鳴道集武帝好四夷之功而勇銳輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘亦被其利此一君之身趣好殊別而士輒應之司馬溫公通監論經子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎語憲問子曰參乎吾道一以貫之曾子曰唯里仁子犁然有當於人之心莊山木子游汾亭鼓琴有釣者過曰美哉琴意在山澤而有廊廟之志文中子互入知音史禰衡為江夏太守黃祖作書記輕重踈密各得體宜祖持其手曰此正得祖腹中之所欲言也東漢本傳互入文章王儉令任昉作一文及見曰正得吾腹中之欲任昉傳集堯心惟舜會元稹集光陰與時節先感是詩人白樂天杜詩韓集愁來讀似倩麻姑癢處抓杜牧之經若金用汝作礪書說命上惟木從繩則正同上鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章記學記無本不立無文不行禮器子無君子莫治野人無野人莫養君子孟滕文公上以粟易器械者不為厲陶冶陶冶亦以其械器易粟者豈為厲農夫哉同上勞心者治人勞力者治於人治於人者食人治人者食於人並同上金石有聲不考不鳴莊子互見激厲有刀者礲諸有玉者錯諸楊學行烏號之弓谿子之弩不能無弦而發越舲蜀艇不能無水而浮淮南子俶真訓史陽不得陰之助亦不能獨成歲終前漢董仲舒策水火相濟監梅相成唐王義方傳傳記干將莫耶非得人力則不能割堅箭利金不得玄機之利則不能遠戰國策龍非風不舉龜非火不兆戴禮曾子天圖篇集塤箎相須選雲龍之所能使為靈也然龍弗得雲無以神其靈矣韓文雜記經非權則泥權非經則悖柳斷刑經同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物睹本乎天者親上本乎地者親下則各從其類也易乾卦鶴鳴在陰其子和之中孚召雲者龍命呂者律易略例命宮而商應同上有豕白蹢烝涉波矣詩漸漸之石將久雨則豕進涉水波喓喓草蟲趯趯阜螽草蟲詩以燧取明火於日以鑒取明水於月周禮天降時雨, WYG: ''}
