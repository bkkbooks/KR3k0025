markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷二十一宋潘自牧撰郡縣部河北西路真定府倚郭一外縣八真定藁城欒城元氏井陘獲鹿平山行唐靈夀天威軍郡號常山郡沿革天文昴畢分野禹貢冀州之域周為并州地春秋為鮮虞國戰國屬趙秦為鉅鹿郡地漢初置恒山郡後避諱改曰常山武帝置真定國常山屬焉東漢建武間併真定屬常山國魏復為郡晉因之治真定後魏移治真定又復移治安樂壘後周於郡置恒山隋廢郡存州大業間省州以縣屬高陽郡唐復置恒州開元間改恒州郡置大都督府元和中改鎮州後升成徳軍節度五代時梁改武順軍唐復成徳軍後又為鎮州晉改順徳軍漢復成徳軍周改為鎮州本朝為真定府成徳軍節度沿革表縣沿革真定本戰國楚之東垣邑漢改為真定縣屬常山郡藳城漢舊縣屬真定國本朝因之欒城本春秋晉欒武子封邑東漢置欒城縣元氏本趙公子元之封邑漢置元氏縣屬常山郡井陘漢舊縣屬常山郡獲鹿本戰國趙之石邑唐改名獲鹿𨽻恒州平山本春秋晉之蒲邑唐改為平山縣屬恒州行唐隋割真定地置行唐縣漢屬常山國靈夀本戰國時中山國地漢置靈夀縣同上形勝抱犢山在府西南昔韓信伐趙持赤幟登山而望即此横山在真定縣南劍山在井陘縣東其形似劍雲鳳山在井陘東北神山在井陘縣東射挅山在井陘縣東南秦將王剪伐趙下井陘於此射挅蒼巖山在井陘縣東上有海山龍堂西屏山在獲鹿縣西高聳為一郡竒景神巖山在元氏西南無極山在元氏縣西有漢時碑封龍山在元氏西北楸山在靈夀縣西北上多楸樹東林山在平山縣北上有千佛堂玉女山在行唐縣北試劍石在元氏縣境唐郭元振得寳劍即此滹沱河在武城南為九河第一流天寜閣在府治東高一百三十尺中有銅鑄觀音像欒武臺在欒城縣境晉大夫欒武子所築白鹿臺在平山縣西漢武帝登此有白鹿至故名淮隂侯廟在獲鹿縣西王滹南祠在藁城縣學董王趙三氏勲閥子弟祀其師王若虛麥飯亭在滹沱河馮異進麥飯於光武即此輿地紀勝人物周郤縠行唐人悦禮樂敦詩書常為晉文公將中軍列國樂毅靈夀人燕昭王以為亞卿伐齊下七十餘城漢李左車行唐人韓信用其策下燕齊諸城田叔井陘人常薦孟舒朝廷稱其知人三國趙雲真定人為漢昭烈將累樹竒功封永昌亭侯南北朝張彫武中山人通五經尤明三𫝊弟子就業者以百數}
