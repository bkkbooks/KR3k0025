  - {type: variant, offset: 895, length: 0, content: '', WYG: 帝子卜者王郎所築周昌墓在滏陽縣境内即漢御史大夫前有祠藺相如墓在邯鄲縣境内輿地紀勝人物列國李同邯鄲人同趙平原君與秦戰却秦兵同戰死封其父為侯劉劭邯鄲人魏文帝時為尚書郎授詔集五經羣書凡所著作皆寓諷諌又有人物志行於世賜爵闗内侯唐王及善邯鄲人以父爵錫邢國公為人清正有大臣節崔𤣥亮磁州人舉進士為監察御史清介自持朝廷推為宿望皇朝韓令坤武安人有才畧為天平軍節度加侍衛同平章事屢立竒功韓令贇武安人少有勇力仕為都校防禦使屢立戰功贈侍中子崇訓官至太傅崇業官至大將軍蔡審廷武安人善騎射初授冀州刺史從征太原訓練士卒甚整後為鎮州兵馬都鈐轄蘇寀滏陽人擢進士第嘗使契丹聞英宗晏駕遂徹樂不飲燕累官給事中知審刑院長於刑名受詔奬張君平滏陽人以父承訓與契丹戰沒平屢戰功遷右班殿直後治河遷鈐轄子拱為河隂判嗣其父秩同上集客從長安来驅馬邯鄲道秦兵益圍邯鄲急魏王不救平原君並王維子真河朔尉邑里𢃄清漳春草迎袍色晴花拂綬香岑參送鄭少府兵符刼晉鄙匕首刺秦人報士非無膽高堂念有親鄭從邯鄲城南遊侠子自矜生長邯鄲裏千塲縱􅀶家仍富幾處酬恩身不死髙逹夫雲起龍沙暗木落雁行秋輕生狥知己非是為身謀虞世南五陵豪俊多買酒黄金賤揮劍邯鄲市走馬梁王苑韋端已家住叢臺下門前漳水流喚人呈楚舞借客試吴鈎鄭錫本朝武和三年改作磁州熈寜六年省昭徳縣為鎮入滏陽沿革表數㸃寒峯擁翠嵐叢臺日落見漳南回仙逆旅今存否世上黄梁夢正酣陳剛中邯鄲懷古邯鄲居民苦坐甑大梁公子思要君張楷朝别鄴中人暮走邯鄲道同上邯鄲今日題詩客猶是黄梁夢裏人遺山祁州倚郭一外縣二蒲隂鼓城深澤郡號蒲隂州沿革天文尾箕兼昴畢分野禹貢冀州之域本漢中山國安國縣地晉屬􅀶陵郡北齊省隋置義豐縣屬􅀶陵郡唐改為立節縣神龍初復曰義豐屬定州景福初於此置祁州本朝改蒲隂縣沿革表縣沿革蒲隂春秋時曲陽城地隋為義豐縣唐置祁州宋改蒲隂縣鼔城本漢涿郡地本朝置鼔城縣深澤本漢舊縣屬涿郡東漢屬安平國晉屬􅀶陵後魏因之隋屬定州唐因之本朝省入鼔城沿革表形勝鼔城山在縣境廣谷大川春月有聲相呼應清漳水在鼔城境滹沱河在危渡口光武為赤眉所追馳至滹沱吏言水深無舟上使王霸視之}
