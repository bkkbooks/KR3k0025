  - {type: variant, offset: 1152, length: 1001, content: 之中孚卦隆墀永歎遠壑必盈處高墀而長嘆遠壑之中盈響而應易略例善邇而遠至命宮而商應修下而高者降與彼而取此者服矣同上惠迪吉從逆凶惟影響書卿士師師非度小民方興相為敵讎書微子之命建無窮之基亦有無窮之聞畢命作善降之百祥作不善降之百殃伊訓並書鼓鍾于宮聲聞于外詩白華衛文公臣子多好善賢者樂告以善道也鄘于旄內和而外順則民膽其顏色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順記樂記下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不謹也是民之表也緇衣上好仁則下之為仁爭先人上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情語子路子以富貴而下人何人不尊以富貴而愛人何人不親家語互見施報愛人者人恒愛之敬人者人恒敬之孟子互見施報夫苟好善則四海之內皆將輕千里而來告之以善同上告子上生於其心害於其政發於其政害於其事公孫丑上文武興則民好善幽厲興則民好暴告子上上有好者下必有甚焉者矣滕文公上夫人必自侮然後人侮之家必自毀然後人毀之國必自伐而後人伐之離婁訑訑之聲音顏色拒人於千里之外告子下德之流行速於置郵而傳命已上並孟子大人之教若形之於影聲之於響莊子在宥別契券者所以為信也上好權謀則誕詐之人乘是而後欺探籌投鉤者所以為公也上好曲私則下乘是而後偏衡石稱懸者所以為平也上好傾覆則下乘是而後險勝斛敦概者所以為嘖也上好貪利則下乘是而後鄙豐取刻與以無度取於人荀子君道楚王好細腰故朝有餓人同上善其言而類焉者應矣故馬鳴而馬應之非知也其勢然也同上不苟夫下之和上猶響之應聲影之像形也強國篇聽唱而應視儀而動正論篇上好富則民死利矣大略篇並荀子齊桓好服紫一國盡服十素不得一紫公患之管仲曰試勿衣也謂左右曰甚惡紫臭公曰諾三日莫有衣紫者韓子鄒君好長纓左右皆服纓甚貴公悉之因先自斷其纓而出國中皆不服同上人主之情上通于天故誅暴則多飄風枉法令則多蟲螟殺不辜則國赤地令不收則多雨淮南子天文訓鄒衍盡忠於燕惠王王信讒繫之鄒子仰天而哭正夏而天為之降霜淮南子有陰德者必有陽報有陰行者必有昭名同上湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁傳子體痛者口不能不呼心說者顏不能不笑尹子從道必吉反道必凶如影如響也同上史齊桓公復會諸侯於葵丘益有驕色諸侯頗有叛者史齊世家口雖未言聲疾雷震令雖未行化馳如神史記漢女居東海飬姑姑女讒之於姑姑經太守訴而殺之五月下雪漢書東海有孝婦少寡無子養姑甚謹姑死姑之女告吏婦殺我母更捕孝婦婦自誣服太守竟殺婦郡中枯旱, WYG: ''}
