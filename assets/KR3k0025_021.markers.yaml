  - {type: variant, offset: 212, length: 0, content: '', WYG: 廻詠古鏡曽經一向磨惆悵心思滑臺北滿杯濃酒與愁和同上本朝端拱元年以滑州黎陽縣為軍天聖元年改通利軍為安利四年以衛州衛縣𨽻軍熈寜三年廢為縣𨽻衛州元祐元年改為軍政和五年陞為州號濬川軍節度熈寜六年廢衛縣為鎮入黎陽後復沿革表精誠皎於日發出為忠詞千古存遺像翻為諂子嗤邵雍題比干墓巖扄嵐氣深石像苔花冷日送伾山雲扶桑散初景陳無已隂含烟雨重影落溪潭深斐然武公徳衛風有遺音同上懷州倚郭一外縣二河内修武武陟郡號河内州沿革天文室壁分野禹貢冀州覃懷之地商為畿内地周初為三監及􅆁􅅠衛地後屬晉戰國時又為魏鄭衛三國地秦為三川河南二郡之北境漢初為殷國隋改河内郡晉為河内汲二郡地後魏置懷州兼置河内郡隋初郡罷州存大業初廢州復置河南郡唐初置懷州治野王城天寳初改為河内郡乾元初復為懷州屬河北道本朝屬河北西路沿革表縣沿革河内春}
