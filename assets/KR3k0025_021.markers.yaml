  - {type: variant, offset: 209, length: 0, content: '', WYG: 諸子弟并姪顯於朝皇朝劉斌郡人性至孝嘗手仞父讐朝廷義之釋其罪王安中曲陽人進士及第累官翰林院學士尚書左丞所著書七十餘卷同上集對敵六竒峯臨戎八陣張唐太宗晏中山旌旃朝􅃋氣笳吹夜邉聲坐覺烟塵掃秋風古北平杜必蕳王師非樂戰之子慎甲兵海氣侵南部邉風掃北平陳伯玉天開還白日風動散晴雲紈扇情初㫁黄花興欲醺杜牧之月浪衝天天宇濕凉蟬落盡水星入但聞北斗聲回環不見長河水清淺並李義山戍樓吹角起征鴻獵獵寒旌背晚風千里暮烟愁不盡一川秋草恨無窮張泌山本朝建隆元年以易北平併來屬太平興國軍改武定軍節度本定州慶厯八年始置定州路安撫使統保定深祁安肅順安永寜八州政和三年升為府改賜郡名曰中山沿革表孤雲落日在馬耳照耀金碧開烟鬟東坡太行西来萬馬屯勢壓岱嶽争䧺尊飛狐上黨天下􅆃半掩落日先黄昬畫師争摹雪浪勢天工不見雪斧痕同上中山䧺北邉地得要害扼烽警昔未徹民日困兵革中山古戰國殺氣浮高牙並韓魏公信徳府倚郭一外縣七邢臺沙河任堯山平郷内丘南和鉅鹿郡號鉅鹿襄國郡沿革天文昴分野禹貢冀州之域周為邢國地後屬晉戰國屬趙秦置信都縣屬鉅鹿郡項羽改襄國漢屬鉅鹿常山二郡及趙廣平二國晉時為石勒所據石虎改置襄國後魏改為襄國縣後周仍為襄國郡隋初廢郡以縣屬洺州開皇中置邢州大業初復襄國郡唐初為邢州置總管府天寳初改鉅鹿郡武徳初復為邢州五代梁為保義軍節度唐改安國軍本朝升為信徳府縣沿革邢臺秦信都縣地本朝改邢臺縣沙河本隋龍岡縣地後分龍岡南境置沙河縣任本春秋時晉張縣地漢置任縣堯山春秋時晉栢人邑戰國及漢為縣屬趙國唐改堯山縣平鄉本漢廮陶縣地後魏改平鄉内丘本漢常山郡之中丘縣晉陞中丘郡隋改為内丘縣南和漢舊縣屬廣平國東漢屬鉅鹿郡鉅鹿本漢鉅鹿郡隋置鉅鹿縣屬趙州唐改屬邢州本朝仍舊並沿革表形勝仙翁山在府城北唐時張果常止棲其上雷公山在府西上有雷公廟百花山在府西南甚崇峻石門山在邢臺縣石勒遣石季龍據石門即此湯山在沙河北有湯泉可以愈疾上有石室堯山在縣西北相𫝊堯時封於此上有堯祠蓬鵲山在内丘西相𫝊扁鵲採藥於此百泉水在府東南水自平地出其脉甚多聖井相𫝊張果在此地掘井冬夏不渇仙井在南和北其水與平地深不可測上有廟温泉在沙河北四時常温洗腸源在内丘縣西昔有高僧曽於此洗腸蘇秦亭在沙河西秦送張儀入秦即此沙丘臺在平鄉縣東秦皇東廵崩於此豫讓橋在府北豫讓刺趙襄子伏此橋下銅馬祠在鉅鹿北祠漢}
