  - {type: variant, offset: 734, length: 0, content: '', WYG: 賦稱㫖時人稱為謝賦甄濟衛州人少孤好學天寳中為安禄山掌書記察禄山有異志托疾求歸後禄山刼之起濟不從賊平遷著作郎兼侍御史甄逢濟之子幼孤貧躬耕讀書因父名不得在國史詣京自言由是父子俱顯名於世高郢衛州人九嵗能文其父伯祥為好畤尉安禄山反將殺之郢尚幼解衣請代賊義並釋之後舉進士官至同平章事掌制誥家無留稿人問之}
