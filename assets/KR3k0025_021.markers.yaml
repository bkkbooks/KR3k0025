  - {type: variant, offset: 210, length: 0, content: '', WYG: 武郭巨廟在内丘縣東金堤村祖乙都書傳祖乙遷於邢即今府城是也輿地紀勝人物漢路温舒鉅鹿人累官臨淮太守治有異績侯芭鉅鹿人少力學壯遊四方從揚雄受太𤣥獨得其㫖張禹襄國人性篤厚節儉舉孝㢘初拜揚州刺史轉兖州刺史以清平稱孟敏鉅鹿人性剛直隐居不仕嘗客居太原荷甑堕地弗顧而去郭㤗見而竒之時苖鉅鹿人性清介為夀春令駕牛車至縣後生一犢及去任留其犢謂父老曰是爾土所生也晉張賔内丘人愽學有大節嘗自謂智筭不亞子房南北朝游雅任人魏太武時與高允俱知名累官太子太傅隋游元少聰敏仕周歴夀春令有能名奉使黎陽督運楊𤣥感作逆元以正言諭之為所囚不屈而死唐李嗣真邢臺人舉明經直𢎞文舘與劉獻臣徐昭少有名號三少武后嘗}
  - {type: page-break, offset: 210, content: '', id: KR3k0025_WYG_021-16a, image: WYG0930/WYG0930-0479a.png}
  - {type: page-break, offset: 210, content: '', id: KR3k0025_WYG_021-16b, image: WYG0930/WYG0930-0479b.png}
  - {type: variant, offset: 210, length: 0, content: '', krp: 武郭巨廟在内丘縣東金堤村祖乙都書傳祖乙遷於邢即今府城是也輿地紀勝人物漢路温舒鉅鹿人累官臨淮太守治有異績侯芭鉅鹿人少力學壯遊四方從揚雄受太𤣥獨得其㫖張禹襄國人性篤厚節儉舉孝㢘初拜揚州刺史轉兖州刺史以清平稱孟敏鉅鹿人性剛直隐居不仕嘗客居太原荷甑堕地弗顧而去郭㤗見而竒之時苖鉅鹿人性清介為夀春令駕牛車至縣後生一犢及去任留其犢謂父老曰是爾土所生也晉張賔内丘人愽學有大節嘗自謂智筭不亞子房南北朝游雅任人魏太武時與高允俱知名累官太子太傅隋游元少聰敏仕周歴夀春令有能名奉使黎陽督運楊𤣥感作逆元以正言諭之為所囚不屈而死唐李嗣真邢臺人舉明經直𢎞文舘與劉獻臣徐昭少有名號三少武后嘗}
  - {type: variant, offset: 211, length: 0, content: '', WYG: 以儲貳事對曰程嬰杵臼存趙孤古人嘉之后悟中宗乃得安李之愷邢臺人愽學性恭慎宋璟常師之李懷逺邢臺人少孤嗜學擢四科第累官同平章事宋璟南和人耿介有大節武帝時為鳳閣舎人遇事直言不顧利害𤣥宗時為中興賢相首稱柴守禮堯山人妹為周太祖后無子以守禮之子為子是為世宗守禮徙居洛陽終世宗之世未嘗至京苐以元舅禮之皇朝陳薦沙河人舉進士為華陽尉韓琦稱其亷於進勇於退嫌疑間毫髪不處進資政殿學士集紫塞流沙北駱賔王雲遮襄國天邉去樹遶漳河地底来絃管變成山鳥弄綺羅留作野花開李逺兩岸嚴風吹玉樹一灘明月照銀沙韋端已昨縁秦苦趙来往大梁頻鄭縱回首覧燕趙春生兩河間雨歇清林潤烟空緑野閒崔湜雁塞秋聲逺龍沙雲路迷張正見本朝宣和元年升為府治宣和二年改龍岡縣為邢臺熈寜六年省平鄉縣為鎮入鉅鹿元祐元年復熈寜六年省堯山縣入内丘元祐元年復熈寜五年省任縣為鎮入南和元祐元年復沿革表太行穠秀霜洗盡全趙規模天鑿成帝與天同大天存帝亦存桑麻通絶徼簫鼔出深村水至孤亭合山居列岫尊尚餘土堦意樵牧踐籬藩劉潜夫題堯廟詩火枯襄子殘銅斗土蝕平原舊玉簮宫閉沙丘空有雀兵吞函谷已如蠶陳剛中濬州倚郭一外縣一衛陽黎郡號濬川州沿革天文室壁分野禹貢冀兖二州之域本春秋衛邑漢為黎陽縣屬魏郡晉省後魏置黎陽郡及黎州隋初州郡皆廢尋復置黎州大業初廢以縣屬汲郡唐復置黎州貞觀中州廢以縣屬衛州五代晉置濬州本朝改為通利軍熈寜初改黎陽政和間升濬州本朝因之縣沿革衛本春秋衛邑漢屬魏郡本朝屬濬州黎陽亦春秋衛邑魏置黎陽郡本朝改黎陽並沿革表形勝善化山在州西北三十五里上有三峯如鼎峙西有龍洞大伾山在州東二里髙四十丈峯巒㧞秀禹貢導河即此浮丘山在州西南三里峯巘三層傍有故城後䧟為湖紫金山在衛縣東北五里相𫝊玉女修真於其上傍有玉女觀鳳凰山在衛縣故河東岸相𫝊有鳳凰即此黒山在黎陽西北八十里其色蒼黒九州要記黒子居此採茯苓食之夀五百嵗陳家山在黒山西下臨淇水髙二十仭昔陳氏居此同山在州西南十五里武王伐紂諸侯㑹同於此故名衛河在縣境與洪漳滹沱等河至直沽入海黎水在黎陽境内長豐泊在州西南二十里按地志天下水名泊者二此其一也鹿臺在州西五十里武王散鹿臺之財即此杏花臺在大伾山西高二十丈黎陽津又名白馬津漢酈食其所謂守白馬之山即此比干墓在州境子貢墓在州東枋頭在州西南八十五里淇水之北魏曹操於此築堰以障漕渠輿地紀勝人物春秋端木賜衛黎陽人聖門高弟封黎侯北宫文子衛人相衛侯如楚見令尹圉無威儀而知其不能善終後果如其言孔圉衛人為大夫善治賓客孔子稱其敏而好學公叔枝衛人為大夫衛君稱其有三善諡曰貞恵文子史魚衛大夫孔子稱其直太叔儀衛人有識見知寗喜之敗果如其言公孫免餘誅寗氏有功獻公賜之食邑辭不受晉桑虞黎陽人有沉識性至孝年十四喪父哀毁過禮五世同居人皆重之皇朝李載黎陽人少苦學登進士吕夷簡入相薦其材累官六州以寛厚稱同上集隔河見桑柘藹藹黎陽川望望行漸逺孤峯凌雲烟王維九廻紓白浪一半在青天氣肅晴空外光翻曉日邊楊巨源登黎陽城眺黄河魏都城裏遊從熟才子齋中止泊多去日緑楊垂紫陌歸時白草映黄河賈島黎陽作新詩不覺}
