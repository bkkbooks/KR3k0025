  - {type: variant, offset: 2242, length: 0, content: '', krp: 孔六帖集貞元初以甸服長吏天下理本於是親擇郎吏分宰於京師栁文歴宰京劇元和制化神臯之俗常集漢以四科取士求多畧不惑強明決斷者任三輔令漢朝郎官出宰百里故今京邑令缺多令尚書郎補能佩弦以自導帶星以自勤白集輦轂之下豪黠僄輕擾之則獄市不容緩之則囊槖相聚故前代京令得與御史丞分進道路以其捕逐之急也元集赤縣官曹擁材傑杜詩本朝紹聖間詔開封祥符知縣今後差通判以資序充四朝史縣丞史縣丞長吏也縣百戸以上皆有丞尉是為長吏黄霸守潁川許丞年老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起漢書桓譚數言事忤㫖出為安陵丞忽忽不樂張元遷陳倉縣丞清净無欲專心經書後漢書唐臨為萬泉丞有輕囚十數人㑹春暮時雨臨白令請出之悉令歸家耕種與之約令歸繫囚至期畢集詣獄臨由是知名陸景倩為扶溝丞按察}
  - {type: variant, offset: 2243, length: 0, content: '', WYG: 覆州縣殿最有吏言狀曰某清某詐清惟景倩真清宋安恭為龍門丞年已五十八數年而登列岳每謂僚屬曰公輩但守清白何憂不遷唐書傳記漢氏縣丞尉多以本部人為之諸縣皆有主刑獄囚徒後漢署文書典知倉獄署諸曹掾吏自晉後無丞宋惟建康有獄丞隋氏盡用他郡人六典唐髙宗始為品官吏部選授為縣令之貳職林縣有七司丞為副貳如州上佐隋及大唐縣丞各一人通判縣事通典州有上佐縣有丞簿俗謂閒官不領公事殊乖制作之本意續通典裴子雨為下邳令張晴為縣丞二人俱有聲氣而善言語曽論事移時人吏竊相謂曰縣官甚不和長官稱雨贊府道晴終日如此不和也南部新書集丞之職所以貳令於一邑事無所不當問藍田丞㕔壁記丞位髙而偪例以嫌不可否事文書行吏抱成案詣丞卷}
