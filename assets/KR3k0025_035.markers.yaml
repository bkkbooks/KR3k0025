  - {type: variant, offset: 1745, length: 0, content: '', WYG: 節制馴致州綱張日嚴制表率諸曹樊克明制督郵綱掾之峻閻仲宣制司理參軍本朝五代以來諸州皆有馬步獄以牙校充馬步都虞候掌刑法謂之馬步院太祖慮其任私髙下其手開寶六年始置諸州司寇參軍後改為司理掌獄訟勘鞫之事職源國朝别置以專鞫獄事劇者置二人太平興國九年詔曰司理參軍專於推鞫研覈情實尤在得人宜令本州於見任簿尉判司内選明敏有官業者充分紀雍熙詔不得與帑藏之事自端拱淳化以來皆上躬自選擇仍詔掠囚皆依律令祥符五年薛顔請自今司理誤入人徒已上罪者令批歴依例守選庶有所懲職畧鮮于侁為江陵右司理慶歴旱求言侁條當世之失有四其語切直唐介稱其名於上官交章乞薦侁盛言左參軍李景陽之美乞移與之介益以為賢四朝史司户參軍史張}
