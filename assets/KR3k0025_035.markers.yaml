  - {type: variant, offset: 1925, length: 7, content: 蓮花糞壤出菌芝, WYG: 不閑法令每議獄必求合於人情曰人情所在法亦在焉郡中稱平四朝史參法律之曹胡文恭行朱逵制往司三尺之律陳元良制州都監本朝掌本城屯住兵甲訓練差使之事兼在城巡檢資淺者為監押續㑹要四朝志長樂郡夫人髙氏為其弟求亳州兵馬監押真宗曰䕶戎之任實司軍旅趙用為界河巡檢都監虜人畏之以其常乘虎頭船故謂之趙虎頭分紀外領屯衆公是行陳欽明制䕶州藩之兵胡文恭行全克懃制巡檢本朝巡檢司有沿邊溪洞都巡檢或藩漢都巡檢或數州數縣管界或一州一縣巡檢掌訓練甲兵巡邏州邑擒捕盜賊事又有刀魚船戰棹巡檢江湖淮海置捉賊巡檢及巡馬遞舗巡河巡捉私茶鹽等各視其名分以脩舉職業皆掌巡邏議察之事四朝志郭進為西山巡檢有誣告其隂通劉繼元有異志者太祖怒命付其人於進進曰爾能為我取繼元一城一寨不止贖爾死罪請貴爾一官嵗餘其人誘其一城來降進請賞以官太祖曰賞不可濫得也進曰使臣失信則不能用人矣遂賞以一官分紀景徳三年封事者言諸處巡檢務在武勇強明乞不以閩楚江浙川陜人為之上曰人之勇怯豈拘南北若此區别非任人之道職畧當道之衡俾邏四封之警胡文恭行鄭從政制居警邏之司髙尊望制材著幹勤職司警邏能發擿於隂伏多剪除於寇攘林友制排岸司本朝開封府置排岸}
