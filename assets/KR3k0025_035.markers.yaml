  - {type: variant, offset: 2233, length: 0, content: '', WYG: 補新都令三年之間鄰縣歸之戸口十倍魯恭拜中牟令郡國螟傷稼不入中牟河南尹袁安使肥親往察之恭隨行阡陌俱坐桑下有雉止其旁旁有兒童親曰何不捕之兒言雉方雛親矍然起曰所以來者察君之政迹耳今蟲不犯境一異也化及禽獸二異也童子有仁心三異也後漢書劉備以龐統為棗陽令魯肅曰士元之才百里不足以展驥足蔣琬除廣都長諸葛亮請曰琬社稷之器非百里之才蜀志潘岳為河陽令植桃李人號曰河陽一縣花陶潛為彭澤令門種五柳郡遣督郵至縣吏白應束帶見之潛嘆曰吾豈能為五斗米折腰事鄉里小兒耶解印去縣乃賦歸去來辭王衍為元城令終日清談縣政亦理晉書丘仲季遷山隂令百姓謠曰二傅沈劉不如一丘前傅琰父子沈憲劉元明相繼宰山隂有政聲仲季長於撥煩吏人號稱神明政為天下第一顧愷之為山隂令晝日垂簾門階閑寂務簡而事理南史房彦謙為長葛令百姓號為慈父立碑頌徳開元初韋濟調鄄城令有詔問所以安人者對凡二百人惟濟居第一馮元叔歴清漳浚儀始平三令右善去惡人稱為神明蔣欽緒子沇歴陸渾盩厔咸陽髙陵四令美政流行郭子儀軍出其縣敕麾下曰蔣賢令也供億得蔬飯足矣毋撓其清唐書}
