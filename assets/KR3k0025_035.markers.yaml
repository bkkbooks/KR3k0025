  - {type: variant, offset: 1743, length: 0, content: '', WYG: 典掌總録衆曹管其文案自上佐法意違失者彈正以法掌凡諸司察之事平寶司徒儀集君為京兆司録諸曹白事不敢平面視揖起趨去無敢間語縣令丞尉如嚴京兆事以幹治公為京兆府司録與一府政故相崔圎尤狎愛州民丁某至親省其家後大衙㑹日司録君趨以前曰請舉公過公與小民狎至其家害於政圎驚謝乃自罰韓文君轉隴州録參時劉仁軌以宰相之貴持節此州坐帷中主諾責下君提綱未幾羣轄載孚劉公坐嘯以為能也陳子昻集王符君志往參都録雅有能名宜列府聨之職俾展官常之效紀綱大府利可析滯明可照奸常集為樞為相何莫由斯權集向事圭符實司綱紀徐騎省集操持紀綱地喜見朱絲直杜詩本朝諸府為司録諸州為録事不盡置也乾興元年諸州始各置録事參軍慶歴二年河西河東陜西諸州權令京官知録事參軍㑹要政和三年尚書省言參軍之稱起於行軍之際恐不當襲奉聖㫖參軍改為掾職畧建炎復舊掌州縣庶務糾諸曹稽違中興㑹要元符中陳察乞}
