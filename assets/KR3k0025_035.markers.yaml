  - {type: variant, offset: 2234, length: 3, content: 本傳醫, WYG: 記周官有縣正春秋時縣大而郡小縣邑之長曰宰曰尹曰公曰大夫其職一也戰國郡大而縣小漢縣令長皆秦官掌治其縣萬户以上為令減萬戸為長侯國為相後漢令掌治民顯善勸義察姦罰惡理訟平賦恤民時務晉制大縣令有治績者報以大郡不經宰縣不得入於臺郎宋諸縣署令銅印墨綬進賢兩梁冠北齊制上中下九等唐制縣有六等之差掌導揚風化撫字黎氓敦四民之業崇五土之利養鰥寡恤孤窮審察寃屈躬親獄訟通典分紀五代任官齷齪無能者始注為縣令職源子路治蒲三年孔子入其境曰善哉恭敬以信矣入其邑曰忠信以寛矣至其庭曰明察以斷矣子謂宓子賤曰子治單父衆說何施而得之也對曰不齊之治也父恤其子子恤諸孤而哀喪紀子曰小節也曰不齊所父事者三人所兄事者五人所友者十一人子曰中節也曰此地有賢於不齊者五人不齊事之而稟度焉孔子歎曰其大者乃此乎惜乎所治者小也宓子賤為單父宰請君之近吏二人戒其邑吏令二吏書方書輒掣其肘書不善則從而怒之二吏歸報於君魯君以問孔子子曰意者以此為諫乎公歎曰寡人亂宓子之政而責其善者數矣遽發使告宓子曰自今以往有便於民者子決為之於是單父治焉巫馬期入單父見夜漁者得魚輒舎之而問焉漁者曰魚之大者名為䲖吾大夫愛之其小者名鱦吾大夫欲長之吾是以得二者輒舎之巫馬返以告孔子曰誠於此者形於彼宓子行術於單父也家語宓子賤治單父彈琴不下堂而單父治巫馬期戴星而出戴星而入以身親之而單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者故勞任人故逸吕氏春秋集縣令民之師帥董䇿詳見太守類明明君侯臨下有赫克隆有光恵我咫尺乃冰其清乃玉其白風抗其髙雲垂其澤君有餘愛民有餘徳江革作傅渾頌於穆君侯英才宣朗聲之所震下應如響明斷決疑易於反掌野有寇盜惟侯屛之我有田疇惟侯闢之古人謹獄惟侯平之凡此三恵如何勿思孫楚梁令孫侯頌荆玉不足喻其徳南金未能方其勵徐卓孔之陽像賛導王}
