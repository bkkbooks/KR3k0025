  - {type: variant, offset: 2239, length: 0, content: '', WYG: 澤以被于下求庻人之瘼以聞于朝陸宣公草詔用重典以威奸暴鋪太和以恵鰥嫠柳文未下車人懼之既下車人恱之恵如春風三月大化奸吏束手豪宗側目同上吾愛崔秋浦宛然陶令風門前五楊柳井上二梧桐山鳥下㕔事夜蟾落酒中見客但傾酒為官不愛錢河陽花作縣秋浦玉為人范宰不買名弦歌對前楹為邦黙自化日覺氷壺清百里雞犬靜千廬機杼鳴開宰江陽邑剪棘樹蘭芳城門何肅穆五月飛秋霜李白東陽本是佳山水何況曽經沈隠侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雍州落在尋常畫工手猶能三伏凛生秋劉禹錫答于興宗連城為重寶茂宰得才新山雉迎舟楫江花報邑人故人有孫宰髙義薄青雲看君宜著王喬履真賜還疑出上方杜甫本朝建隆元年應諸縣除赤畿外四千戸為望三千戸以上為𦂳二千戸以上為上千戸以上為中不滿千戸為中下五百戸以下為下掌總治民政勸課農桑凡戸口賦役錢穀賑濟及給納之事皆掌之政和二年詔縣令以十二事勸課農桑一曰敦本業二曰興地利三曰戒㳺手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤佃戸十二曰無妄誕㑹要續㑹要乾道二年御筆今後非兩任縣令不除監察御史孝宗㑹要尹洙知河南伊闕縣與穆脩以古文革崑體之弊天下翕然宗之王禹偁知長洲羅處約知呉縣相與日賦五題太宗聞其名召試館職燕肅知臨邛縣民苦吏擾公削木為牘民訟有連逮者書其姓名使召之如期而至通鑑葉庭直知光化縣豐稷知穀城縣人歌之曰葉光化豐榖城清如水平如衡四朝史佩懸銅墨胡文恭行陳亢制施字人之縣譜姚偘制寄懸銅之任劉棻制給懸銅之綬王昭制宜從健令之遷趙況制京畿令史董宣為洛陽令搏擊豪強莫不震慄京師號臥虎民歌曰桴鼔不鳴董少平後漢書顧憲之為建康令性清介強力為政清且美也樂法才為建康令不受俸秩梁武帝嘉其清節曰居職若斯可為百城表矣南史唐貞元間上召京兆府諸縣令對於延英訪以人之疾苦各賜衣一襲韋昭為永昌令輦轂繁要不事威刑而治李頻為武功令畿民多横頻治之無所貸豪猾大驚懿宗嘉之賜緋衣銀魚髙宗擢權懐恩為萬年令賞罰明時人曰寧食三斗塵無逢權懐恩屈突蓋為長安令以威嚴顯時為語云寧食三斗艾不見屈突蓋寧食三斗葱不見屈突通穆宗時京邑多盜賊王正雅為萬年令威震豪強尹公綽言其能就賜緋魚張杜夀為長安令時人以為神明唐書傳記明帝臨觀見洛陽令車騎意河南尹及至而非尤其太盛敕去軒綏漢官儀李果為洛陽令吏民畏之有劉兼者過其境夜聞戸外語聲曰古今正人李令是也見其行事令人破膽我輩可於他縣血食兼開門}
