  - {type: variant, offset: 1922, length: 2, content: 淤泥, WYG: 掌户籍賦稅倉庫受納職畧乾道六年汪大猷乞令司户專主倉庫中興㑹要司法參軍史張湯以倪寛為奏讞掾以古義決獄漢書郭洪為潁川郡決曹掾治獄四十年用法平正郡内比之東海于公後漢書韋仁夀大業末為蜀郡司法書佐斷獄平恕得罪者曰韋君所斷罪死而無悔隋書狄仁傑為并州法曹親在河陽仁傑登太行山及見白雲孤飛謂左右曰吾親舍其下藺仁基曰狄公之賢北斗以南一人而已鄭從質母老當使絶域仁傑謂曰太夫人有危病而公逺使豈可貽親萬里之憂乃請代行徐有功累轉蒲州司法不行杖罰吏人感其恩信遞相約曰若犯司法徐參軍杖者必斥罰之終於代滿不戮一人顔杲卿為遂州司法性剛正蒞事明濟甞為刺史詰讓正色别白不為屈唐書傳記兩漢有決曹賊曹掾主刑法歴代皆有唐掌律令定罪盜賊之事職源集公為京兆法曹日伏階下與大尹爭是非大尹屢詘己見惟是鄙鈍不通曉於時事學成而道益窮年老而身益困棲身法曹掾何處事卑陬州家申明使家抑坎軻祇得移荆蠻判司卑官不堪說未免捶楚塵埃間法曹貧賤衆所易腰腹空大何能為韓愈文集官決平之司無舞文之過杜牧行楊元汶制本朝掌議法斷刑紹興三年罷後復舊中興㑹要賈易調常州司法自以書}
