  - {type: variant, offset: 2527, length: 0, content: '', WYG: 用益饒嵗杪㑹其所入贏羨什百劉禹錫崔公垂碑本朝監當官掌塲務庫藏出納之事其征榷塲務嵗有定期以登耗為殿最賞罰凡課利所入日具數申於州四朝志太平興國三年詔諸路轉運副使常體量部内監當官公勤㢘幹顯有勞績者具名聞奏與親民差遣慶歴四年詔舊制諸道榷酤滿三萬貫舉官監臨嵗滿而課贏者升用之㑹要劉摯責監衡州鹽倉悉意核視弊減什七父老目為學士監四朝史臨榷木之酤及連敖之賞胡文恭行何世昌制領筭商車典臨茗局孫詔制當庾氏之掌裴士傑制局課衍盈姚預制商利局者以饒衍名最賈程制征筭之饒衍於局次王拱辰等制臨筦榷之局筭無遺力沛有衍緡毛維藩制往幹牢盆之入頗増近監之饒劉雝制監司商筭假政制服勞廩委公是行劉詰制錢監史王莾時主鑄錢官曰鍾官後漢志集筦官錢曰圜府之職文選本朝開寶鑄錢監於文番陽既而江淮荆浙閩廣之地皆有監職畧泣全冶之别司胡文恭行成有宗制沿挾銅之令以收七福因採山之法用廣五銖司南州寶冶之饒佐縣官圜府之用宣勞於外興利在公葛源制官曹自是錫與銅東坡送王怡江淮鐵錢官傳記唐西北邊州禁人}
