  - {type: variant, offset: 127, length: 0, content: '', WYG: 俄聞報李判官來僧具以告自是逢吉每造其室即見其人先至率以為常故逢吉出入將相二十餘年廣記集翹車著詠戔帛垂文式重弓旌以光樽俎允奉幕中之畫以稱席上之珍乾祐勅烏重𦙍鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以温生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤送温造序忽騎將軍馬自號報恩子風雲入壯懐泉石别幽耳送石處士赴河陽幕從軍古云樂談笑青油幕郾城夜㑹城上赤烏呈瑞氣眉間黄色見歸期幕中無事惟須飲即是連鑣向闕時韓愈歸路芙蓉府離堂玳瑁筵劉禹錫送陸侍郎安西幕府多才雄喧喧惟道三數公繡衣貂裘明積雪飛}
