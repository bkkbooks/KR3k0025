  - {type: variant, offset: 1781, length: 2, content: 山公, WYG: 曹羣也户曹民所羣聚釋名漢魏以下有户曹掾主民户北齊以下與功曹同隋有户曹參軍文帝時為司户參軍煬帝為司户書佐唐開元復為户曹參軍掌户口籍帳婚姻田宅雜徭道路之事梁開平省六曹掾屬留户曹一貟通判六曹通典及分紀王宗銖謫授雍州司户參軍問吏曰參軍何官衣何衣吏曰下州判司緑衫槐笏而已宗銖}
