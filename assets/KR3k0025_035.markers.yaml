  - {type: variant, offset: 2665, length: 168, content: 子以為舟則沈以為棺椁則速腐以為器則速毀以為門戶則液樠以為柱則蠹不材之木也無所可用故能若是之壽夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭莊子巧者勞而智者憂無能者無所求飽食而遨汎若不繫之舟也同上螾無爪牙之利筋骨之強上食埃土下飲黃泉用心一也蟹六跪而二螯非蛇蟺之穴無所寄託者用心躁也荀勸學巧詐不如拙誠傅子史, WYG: 纂淵海卷三}
