  - {type: variant, offset: 2524, length: 2, content: 荀富, krp: 府元城縣尉張義元為本縣令賞捕盜之功也天下縣尉久廢其任是嵗復置義元首該賞典以激勸之寶元初有明州慈溪尉倜儻不羣雖處賤官而有憂天下之心屢上書言事至和中山陽尉李宗嗔百姓申蝗抑令食之提刑奏劾上怒曰縣尉亦親民之官謂其能慰安於民而不與民除害反傷民命削其官事類守在尉察善於追胥胡文恭行王徳梲制曩居尉督解懐徳制京畿尉史曹操年二十舉孝㢘為郎除洛陽北部尉太祖初入尉廨造五色棒垂門左右有犯禁者皆棒殺之魏志韋貫之自長安尉不數年拜相陸操補長安尉以清幹稱李程為藍田尉有滯獄十年程單言輒判京兆狀最拜監察御史唐書傳記漢長安有四尉分為左右部城東南置廣部尉是為左部城西北置明部尉是為右部黄綬大冠主追捕盜賊伺察姦非六典注魏因之晉洛陽建康皆置六部尉宋齊梁陳並因之唐赤縣置六貟通典嚴安之崔譚俱為赤尉安之令五伯執大杖譚益大其杖如椽安之復令執小杖譚益小其杖至如節安之令五伯空手行乃不能學見聞紀畿尉入御史為佛道入評事為仙道入京尉為人道入畿丞為苦海道入縣令為畜生道入判司為餓鬼道御史臺紀拾遺立𦂳評事出𦂳赤尉坐𦂳俗號為三𦂳官西京記本朝建隆初置尉一貟至和二年開封祥符二縣増置一貟㑹要尉於北部著發奸擿伏之能胡文恭行陳禹臣制監當官集以幹蠱之才領鹽鹵之務管摧條制動皆得宜白集裴𢎞泰制榷東池鹵生息倍稱元集唐慶制鹽鐵榷束之籍杜牧行李鄠制公幹池鹽於蒲脩牢盆謹衡石煎和既精斂散乃盈商通而荐至吏懼而循法㡬不絓網而}
  - {type: punctuation, offset: 2527, content: 》, id: KR3k0025_CHANT_035-bkkpn744}
