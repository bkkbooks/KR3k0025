  - {type: variant, offset: 1746, length: 2, content: 宗盧, WYG: 素仕隋為景城縣户曹竇建徳陷景城將殺之邑人千餘請代曰此清吏殺之是無天也李素立髙祖令授七品清要官所司擬雍州司户上曰此官要而不清裴琰之為同州司户年少刺史李崇義輕之州中積年舊案數百道崇義促琰之判琰之命書吏數人連紙筆湏臾剖判盡畢由是大知名謂之霹靂手李}
