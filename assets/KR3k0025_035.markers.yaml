  - {type: variant, offset: 199, length: 1, content: 傳, WYG: 朝有兩使防團軍事推判官皆以選人充太平興國中以贊善大夫十五貟充諸州節度判官以王化基韋亶武元穎等為之且令綿歴觀其佐治之才也蓋太宗以諸州戎幕缺官選朝士補之俾分理事且試其才能此簽判所由始也蓋選人則為判官京官則為簽判或謂簽書判官之名不正政和初改為司録建炎復舊職源簽盛府之元僚胡文恭行周詢制推官判官史大厯中東都留守楊再思王方慶共引徐堅為判官方慶學禮常就堅釋疑晦堅屬文典厚再思每目為鳯閣舎人様李瓊鎮桂管奏柳璧為判官軍政不愜璧極言不納拂衣而去狄仁傑孫兼謨元和末解褐襄陽推官言行剛直使府知名韓退之為武寧張建封府推操行堅正鯁言無所忌裴度東都留守辟皇甫湜為判官度脩福先寺求碑文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之湜援筆立就度曰不羈之才也崔造與韓㑹盧東美張正則三人友善皆自謂王佐才故號四䕫浙西觀察李栖楚辟為判官唐書後唐長興詔推判官各限年任惟績效拔異文學超邁擢任不限年五代史}
