  - {type: variant, offset: 2834, length: 714, content: 語九中不如一默史記互見謹言攖挐者亡默默者存西漢揚雄傳智者以有餘為疑而朴者以不足取信東漢吳漢左雄曰白璧不可為容容多後福通鑑東漢周顗周嵩並列貴位嘗冬至置酒其母舉觴賜三子嵩曰伯仁志大而才短名重而識闇好乘人之弊非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴嵩弟謨小字也晉書周顗傳傳記默無過言愨無過事木馬不能行亦不費食騏驥日馳千里鞭箠不去其背說苑集何巧智之不足而拙艱之有餘潘安仁閑居賦牛之為物日耕百畝人不慚愧利滿天下皮角見用肩莫保不如羸驢服逐駑馬不耕不駕藿菽自與騰踏康莊出入輕舉當道長鳴聞者驚辟牛雖有功於己何益命有好醜非若能力柳牛賦今者無端讀書史智惠秪是勞精神凡物之生不願為材犧尊青黃乃木之災並韓文老龜被刳腸不如無神靈白侍郎互入招禍門巧婦才人常薄命莫教男女苦多能虫全性命緣無毒木盡天命為不才鐵馬因疲退鈆刀以鈍全並白侍郎本朝癡人自得終天命智士死智冤莫雪皎皎千文清不如尺水渾先竭是甘井得全如苦李人人生子欲聰明我被聰明害一生但願我兒愚且魯無災無難到公卿並坡詩信有千丈清不如一尺渾後山巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉周茂叔拙賦經子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也記中庸子魚鱉黿鼉猶以淵為淺而堀其中鷹鳶猶以山為卑而巢其上及其得也必以餌荀子法行篇互入貪迷神蛇能斷而復續而不能使人勿斷也淮南子智能知人不能自知神能衛物不能自衛故神龜以智見灼靈蛇以神見爆列子集猩猩見酒及屐知里人設張則知張者祖先姓字及呼名罵云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取屐而著之乃為人所擒皆獲輒無遺者唐文粹裴炎猩猩銘互見貪迷本朝老狐足姦計安居穴垣墻窮冬聽冰度思慮豈不長引身入扱引也中將死猶跳踉歐公集虎終機械得烏亦彈丸隨臨川集, WYG: 五}
