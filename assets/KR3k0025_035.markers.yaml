  - {type: 'tls:seg', offset: 2242, content: '', id: KR3k0025_CHANT_035-27a.4}
  - {type: variant, offset: 2242, length: 0, content: '', WYG: 孔六帖集貞元初以甸服長吏天下理本於是親擇郎吏分宰於京師栁文歴宰京劇元和制化神臯之俗常集漢以四科取士求多畧不惑強明決斷者任三輔令漢朝郎官出宰百里故今京邑令缺多令尚書郎補能佩弦以自導帶星以自勤白集輦轂之下豪黠僄輕擾之則獄市不容緩之則囊槖相聚故前代京令得與御史丞分進道路以其捕逐之急也元集赤縣官曹擁材傑杜詩本朝紹聖間詔開封祥符知縣今後差通判以資序充四朝史縣丞史縣丞長吏也縣百戸以上皆有丞尉是為長吏黄霸守潁川許丞年老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起漢書桓譚數言事忤㫖出為安陵丞忽忽不樂張元遷陳倉縣丞清净無欲專心經書後漢書唐臨為萬泉丞有輕囚十數人㑹春暮時雨臨白令請出之悉令歸家耕種與之約令歸繫囚至期畢集詣獄臨由是知名陸景倩為扶溝丞按察}
