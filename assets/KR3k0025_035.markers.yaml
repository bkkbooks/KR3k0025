  - {type: variant, offset: 487, length: 342, content: 鄉人皆惡我鳴鳩曰子能更鳴可矣不能更鳴東徙猶惡子之聲說苑談叢集雖漸歛束故態未鋤司空表聖文互入習慣子今以其昏昏使人昭昭孟子猶足不能行而賣躄藥劉子史陳遵常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優乎西漢陳遵傳以鴟鴞而笑鳳凰執蝘蜓而嘲龜龍西漢楊雄傳北山有鴟不潔其翼饕餮貪污臭腐是食長鳴呼鳳謂鳳無德東漢朱暉傳注互入居邪惡正因傷遷傳物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也范曄贊班固互入此無彼誚唐太宗曰人苦不自覺通鑑本紀集家有敝帚享之千金斯不自見之患也魏文帝典論本朝韓子論荀楊之疵而韓子之疵有甚於荀楊荀卿譏六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫東坡私試策, WYG: 君一似鄱陽王蕭驚}
