  - {type: variant, offset: 2529, length: 106, content: 錐之地而公侯不能與之爭名仲尼是也荀子史梁齊楚趙之君非不富且貴也惡乎成名谷口鄭子真不屈其志耕於岩石之下名震于京師西漢王貢等傳序向長讀易至損益卦曰吾巳知富不如貧矣東漢集齊景公之千駟不如顏回原憲之約其身文選李蕭遠運命論, WYG: 鐵冶續通典}
