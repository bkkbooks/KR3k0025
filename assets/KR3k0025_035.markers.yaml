  - {type: variant, offset: 2243, length: 0, content: '', krp: 覆州縣殿最有吏言狀曰某清某詐清惟景倩真清宋安恭為龍門丞年已五十八數年而登列岳每謂僚屬曰公輩但守清白何憂不遷唐書傳記漢氏縣丞尉多以本部人為之諸縣皆有主刑獄囚徒後漢署文書典知倉獄署諸曹掾吏自晉後無丞宋惟建康有獄丞隋氏盡用他郡人六典唐髙宗始為品官吏部選授為縣令之貳職林縣有七司丞為副貳如州上佐隋及大唐縣丞各一人通判縣事通典州有上佐縣有丞簿俗謂閒官不領公事殊乖制作之本意續通典裴子雨為下邳令張晴為縣丞二人俱有聲氣而善言語曽論事移時人吏竊相謂曰縣官甚不和長官稱雨贊府道晴終日如此不和也南部新書集丞之職所以貳令於一邑事無所不當問藍田丞㕔壁記丞位髙而偪例以嫌不可否事文書行吏抱成案詣丞卷}
  - {type: variant, offset: 2244, length: 1, content: 毒, WYG: 前鉗以左手右手摘紙尾鴈鶩行以進平立睨丞曰當署丞涉筆占位署唯謹博陵崔斯立種學績文以蓄其有泓涵演迤日大以肆再轉而為丞兹邑既噤不得施用喟然曰丞哉丞哉余不負丞而丞負余庭有老槐四行南牆鉅竹千挺儼立若相持水㶁㶁循除鳴斯立痛掃溉對植二松日哦其間有問者輒對曰余方有公事子姑去韓文丞之位八品以下述六職以輔其治也栁文武功丞㕔壁紀謳吟者不歌其宰頌議者必歸於丞以管輅之才從趙典之任陳子昻集九千里之丹鳳自下升髙七十日之黄龍從微至著張鷟集本朝天聖中開封兩縣始各置丞一貟在簿尉之上熙寧四年編脩條例所言諸路州軍繁劇縣令户二萬以上増置縣丞一貟㑹要元祐元年詔應因給納常平免役置丞並行省罷崇寧二年蔡京言熙寧脩水土之政行市易之法興山澤之利皆王政之大請縣並置丞一貟以掌其事大觀三年詔除舊額萬户以上縣令委是事務繁冗并雖非萬户實有山林坑治之利}
