  - {type: variant, offset: 2520, length: 0, content: '', WYG: 救之而使恵歸於一尉豈不愧也遽令釋之劉仁軌轉陳倉尉部人折衝都尉魯寧縱狠仁軌約不再犯而寧暴横自如仁軌殺之州以聞太宗以為剛正擢咸陽丞蘇珦調鄠尉時李義琰為雍州長史鄠多訟日至長史府珦裁決明辨義琰顧㕔事曰此公坐也恨吾齒晩不及見婁師徳補江都尉揚州長史盧承業竒其才謂曰吾子台輔之器當以子孫相託何可以官屬常禮待也陸贄補渭南尉徳宗立遣黜陟使庾何等十一人行天下贄說使者請以五術省風俗八計聽吏治三科登俊乂四賦經財貨六徳保疲瘥五要簡官事白居易調盩厔尉月餘召入翰林為學士郭元振初為通泉尉任侠使氣武后欲詰}
