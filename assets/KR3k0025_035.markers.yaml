  - {type: variant, offset: 2522, length: 1, content: 爭, WYG: 索所為文章上寶劍篇后覽嘉之唐書傳記漢大縣兩尉小縣一人歴代因之銅印黄綬朝服武冠北齊郡縣置三尉隋改為正後置尉又分為户曹法曹唐初因隋制武徳中復改為正七年復為尉分判諸司事通典髙宗時始為品官吏部遷授職林唐尉分理諸曹如州判司通典按李白贈瑕丘王少府别西河劉少府贈秋浦栁少府杜甫貽華陽李少府當是唐時縣尉多稱少府也類要牛僧孺為伊闕尉縣前灘出不旬日拜察院詳見監察御史類漢雍仲進南海香拜洛陽尉號曰香尉述異記集隠吏逢梅福逰山憶謝公杜詩皎皎鸞鳳姿飄飄神仙氣梅生亦何為來作南昌尉世人若醯雞安可識梅生仙尉趙家玉英風凌四豪搖扇對酒樓持袂把蟹螯李白操斷舉措通乎細大潔㢘檢守形於造次栁文栁渾行狀心不掛細務口不言人非李白為李錫元去思碑黄綬位輕而青雲望重陳子昻送齊少府本朝建隆三年每縣置尉一貟實録元豐五年詔並差使臣元祐元年詔除沿邊縣尉依舊外餘並差選人崇寧元年詔重法地縣尉舊差武臣處並依元豐法續㑹要乾徳元年以大}
  - {type: page-break, offset: 2522, content: '', id: KR3k0025_WYG_035-32a, image: WYG0930/WYG0930-0781a.png}
