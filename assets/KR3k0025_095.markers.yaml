  - {type: variant, offset: 3204, length: 4, content: 棄好非謀, WYG: 伐之輙大風雨夜夢有鬼謂梓樹曰近者使三百人被頭以絲繞樹豈不敗汝樹黙然不應明日秦王依此言伐之中有青牛逐之入澧水𤣥中記松陽門内有大梓樹先枯永嘉中忽更榮花元帝果繼大業豫章記集斬泗濵之梓以為筝文選柟傳記黄金山有柟樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓樹者此是}
