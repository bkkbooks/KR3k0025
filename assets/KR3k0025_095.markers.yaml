  - {type: variant, offset: 1694, length: 0, content: '', WYG: 松栢為百木長也史記庾顗見和嶠嘆曰嶠森森如千丈松雖磥砢多節施之大厦有棟梁之用王隱}
  - {type: variant, offset: 1694, length: 0, content: '', krp: 松栢為百木長也史記庾顗見和嶠嘆曰嶠森森如千丈松雖磥砢多節施之大厦有棟梁之用王隱}
  - {type: variant, offset: 1695, length: 0, content: '', WYG: 書陶𢎞景特愛松風庭院皆植松每聞其響欣然為樂有時獨遊泉石望見者以為仙人梁書彭城王勰從幸代都次于上黨之銅鞮山路傍大松樹十數株帝行而賦詩令人示勰曰吾作詩雖不七步亦不言逺汝可作之勰去帝十餘步未至帝所而就詩曰松林經幾冬山川何如昔後}
