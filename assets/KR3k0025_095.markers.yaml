  - {type: variant, offset: 3166, length: 1, content: 訓, WYG: 列種桐竹號為桐山齊書傳記榮桐木爾雅有青桐白桐赤桐白桐宜琴瑟詩義䟽桐枝濡毳而又空中難成易傷湏成氣而後華易緯吹臺有髙桐皆百圍嶧陽孤桐方此為劣逰名山志成王與唐叔虞燕居剪桐葉以為珪曰以此封汝虞喜以告周公周公請封虞成王曰余與虞戯也周公曰天子無戯言遂封叔虞於晉吕氏春秋北宗雅禪師建蘭若庭多古桐一年中桐始華有異蜂聲如人禪師網獲一焉寘紗籠中忽有數人集籠}
