  - {type: variant, offset: 525, length: 1165, content: 安危之萌應於外矣秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百歲而弗失秦王治天下十餘歲則大敗此亡他故矣湯武之定取舍審而秦王之定取舍不審矣通監漢文紀趙充國曰窮寇不可迫也緩之則走不顧急之則還致死通監漢宣紀於心有猜則簋飧饌餔猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之東漢張衡傳義重於生舍生可也生重於義全生可也東漢李固傳論夫雞肋食之則無所得棄之則如可惜後漢揚脩傳思樹芳蘭剪除荊棘三國名臣贊寧飲建業水不食武昌魚寧還建業死不止武昌居通監晉武帝仁道不遠則殺身以徇義重於生則捐軀以踐北史傳記良商不與人爭買賣之賈而謹司時時賤而買雖貴己賤時貴而買雖賤己貴戰國策集寧作清水之汙泥不為濁路之飛塵曹植人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如或墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則麾之在夷狄則進之吾取以為法焉韓文比於東都略見顏色未得接言語心固已相奇但不敢果以貌定知人堯舜所難又嘗服宰予之誡故未敢決然挹亦不敢忽然忘也善雖不吾與吾將強而附不善雖不吾惡吾將強而拒與其譽於前孰若無毀於其後與其樂於身孰若無憂於其心並韓文互入曠達寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎柳文養隼者誠欲其鷙於烏鳶乎鷙於鷥鳳乎唐文粹本朝范文正公言幕府辟客須可為師者乃辟之雖朋友亦不可辟遺事與其貴而拘孰若肆而賤臨川未應遺合抱取用及把拱東坡詩經不作無益害有益功乃成不貴異物賤用物民乃足書旅獒父母存不許友以死記曲禮上互入子道為宮室不斬於丘木記曲禮下陳乾昔疾屬其子尊己曰如我死必大為我棺使吾二婢子夾我乾昔死其子曰殉葬非禮也弗果殺記檀弓下毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士記緇衣儒有不寶金玉而忠信以為寶不祈土地立義以為土地不祈多積多文以為富記儒行已聘而還圭璋此輕財而重禮之義也記聘義大夫祭器未成不造燕器記王制廄焚子退朝曰傷人乎不問馬語鄉黨君子謀道不謀食君子憂道不憂貧語衛靈公子孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也孟萬章下鄉人長於伯兄酌則誰先曰先酌鄉人孟告子上無以小害大無以賤害貴禮與食孰重曰禮重色與禮孰重曰禮重並同上宓子賤為單父宰齊人攻魯道由單父父老請曰麥已熟矣今齊寇至請放民皆使出穫傅郭之麥可以益糧且不資寇三請而宓子不聽曰今茲無麥明年可樹若使不耕者得穫是民樂有寇也且單父一歲之麥於魯不加強喪之不加弱使民有自取之心其瘡必數世家語互入深識大體人之情雖桀跖豈肯為其所惡賊其所好哉荀議兵拔戟加乎首則十指不辭斷非不以此為務也緩急之有相先者也荀強國聖人不貴尺之璧而重寸之陰淮南林回棄千金之璧負赤子而趍莊子兕虎在於後隋侯之珠在於前弗及掇者先避患而後就利淮南子說稱訓割痤疽非不痛也飲毒藥非不苦也然而為之者便於身也渴而飲水非不快也飢而大餐非不贍也然而弗為者害於性也淮南子詮言訓荊卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈戟於豺狼之群, WYG: 松栢茂}
