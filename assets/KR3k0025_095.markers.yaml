  - {type: variant, offset: 2557, length: 2, content: 射鉤, WYG: 為怪擁腫支離神羞鬼疑道人咨嗟筆傳其竒或怪于形或竒于辭吾為怪魁是以讃之陸龜䝉怪松圖賛連根欲鬭岩巒力一盖常涵雨露清曽映月明留鶴宿近經雷霹𢃄龍腥劉屏山椿子上古有大椿樹以八千嵗為春八千嵗為秋列子又莊子傳記盧攜夢人贈句曰若問登庸日庭椿不染風後拜相庭下古椿一株雖狂風驟雨不濕不摇鳯池集檜經杶榦栝栢注云栢葉松身曰栝書檜楫松舟詩傳記檜栢葉松身爾雅李徳裕平泉莊有鴈翅檜葉婆娑如鴈翅也花木記本朝亳州太清宫殿前有老檜南枝礙簷以真宗將幸欲加斤斧一夕大風雷及曉檜枝已轉}
