  - {type: variant, offset: 1818, length: 280, content: 高紀明君貴五穀而賤金玉前漢食貨志遺子黃金滿籯不如一經漢書藺相如不畏秦王而屈於廉頗者為國也東漢寇恂傳就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇羲之純德唐虞之文明猶不能以保蕭墻之內也蓋民可百年無貨不可一朝有飢東漢劉陶傳張綱分行州郡埋其車輪於雒陽都亭曰豺狼當路安問狐狸東漢本傳互入疾惡蔡邕曰夫邊陲之患手足之疥搔中國之困胸背之瘭疽通監東漢帝使人以馬易珠璣翡翠玳瑁於吳吳主曰此皆孤所不用而可以得馬孤何愛焉皆以與之通監魏明紀石勒曰吾不喜得幽州喜得二子王憲孫綽也通監晉愍紀下燕主子寶言於垂曰願不以意氣微恩忘社稷之重通監晉武紀李謐曰丈夫擁書萬卷何假南面百城北史, WYG: 官儀丁固夢松樹生腹}
