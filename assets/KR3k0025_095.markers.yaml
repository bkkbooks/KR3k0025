  - {type: variant, offset: 3179, length: 2, content: 內疾, WYG: 桐出自大冥含黄鍾以吐榦據蒼岑而孤生十合䨇桐生空井枝葉自相和通泉溉其根𤣥雨潤其柯魏明帝孤桐北窗外髙枝百丈餘葉生既婀娜葉落更扶疎謝𤣥暉昔也植朝陽傾枝俟鸑鷟今者絶世用倥偬見迫束班匠不我顧牙曠不我録焉得琴瑟成何由揚妙曲司馬彪分根䕃玉池欲待髙鸞集沈約桐香待鳯池李賀樹暗惜桐孫杜牧一株青玉立千葉緑雲委山木多蓊欝兹桐獨亭亭葉重碧雲片花簇紫霞英為君布緑隂當暑䕃軒楹為君發清韻風來如叩瓊受君陽和徳不獨含芳榮戒君無戯言剪葉封弟兄受君嵗月功不獨資生成為君長髙枝鳯凰上頭鳴白居易本朝疎柯青玉聳密葉翠羽䝉午景凝餘清夕照留殘紅雨響甍棟外風生户牖中司馬公梓經維桑與梓必恭敬止詩子拱把}
