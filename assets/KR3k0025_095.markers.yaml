  - {type: variant, offset: 2905, length: 0, content: '', WYG: 曰章臺栁章臺栁昔日青青今在否縱使長條似舊垂也應攀折他人手栁氏答之曰楊栁枝芳菲節所恨年年贈離别一葉隨風忽報秋縱使君來豈堪折本事走張敞為京兆尹馬街有栁市故號章臺栁杜詩云京兆空栁市集在余年之二七植斯栁乎中庭始圍寸而髙尺今連拱而九成魏文帝賦垂楊䕃御溝文選溧陽酒樓三月春楊花茫茫愁殺人楊花滿江來疑是龍山雪栁色黄金嫩花飛玉關雪葉暖金牕煙河堤栁弱欝金枝昨夜東風入武陽陌頭楊栁黄金色池南栁色半青青縈煙裊娜拂綺城垂絲百尺掛雕楹上有好鳥相和鳴李白顛狂栁絮隨風舞糝徑楊花鋪白氊輕輕栁絮㸃人衣市橋官栁細髙栁半青天隔溪楊栁弱嫋嫋恰似十五女兒腰青歸栁葉新岸容待臘將舒栁漏泄春光有栁條枝枝總到地葉葉自開春紫燕時翻翼黄鸝}
