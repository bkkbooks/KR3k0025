  - {type: variant, offset: 2526, length: 2, content: 蹯蝮, WYG: 間藍田丞行壁記日出霧露餘青松如膏沐積雪表明秀寒花助窓籠幽真如有慕恃以延秋風竒姿來逺山勁色不改舊芳心誰與榮清韻動竽笙諧此風中聲商山臨路有孤松往來斫以為明好事者憐之編竹成援遂其生植感而賦詩云孤松挺翠盖託根臨廣路不以險自防遂為明所誤幸逢仁惠意重以籓籬䕶猶有半心存時將承雨露韓詩翠盖煙籠密花幢雪壓低與僧清影坐借鶴穩枝棲白居易本朝松鳴澗底自風寒青松守節見臨危正色凛凛不可犯松老無風韻自寒六一集虬角龍鬚不可攀亭亭千丈䕃南山應嗟無地逃斤斧豈願争明爝火間此詩為道傍大松人取為明作萬壑風生成夜響千山月照掛秋隂豈因糞壤栽培力自得乾坤造化心王介甫朅來齊安野夾路鬚髯蒼㑹開龍}
