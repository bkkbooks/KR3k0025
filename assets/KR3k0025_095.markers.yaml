  - {type: variant, offset: 2901, length: 0, content: '', WYG: 似張緒當時見賞如此齊書栁機在周與族人昂俱歴顯要及機昂並為外職楊素方用事因上賜宴素戲機曰二栁俱摧孤楊獨聳髙熲初孩孺時家有栁樹髙百許尺亭亭如盖里中父老曰此家當出貴人後熲果至宰相煬帝自坂渚引河築街道植栁名曰隋堤隋書中書省有栁樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞栁梁修仁監造蓬萊宮列種白楊示契苾何力曰此木易成不數十年可庇何力不答但誦白楊多悲風蕭蕭愁殺人之句修仁驚悟更植以桐唐書傳記檉河栁旄澤栁楊蒲栁爾雅楊蒲栁也從木易聲檉河栁也從木聖聲栁小楊也從木夘聲説文鵲巢栁樹鳩奪其處焦贑易林正月栁稊稊者發葉也大戴禮均萑谷其木多栁鳯伯之山熊山直陵之山木多栁平丘山爰有楊栁沃民之國有白栁山海經栁華一名栁絮本草展禽家有栁樹身行惠徳故號栁下惠許慎淮南子注漢苑中有栁狀如人一日三起三倒號曰人栁侯鯖録陶侃明識過人武昌道上通種楊栁人有竊之植於家侃見識之問何以盗官所種時以為神晉中興書栁汁染衫三峯集見狀元類李將失名以幸姬栁氏與韓翊天寶末盗覆二京洎宣皇帝反正翊乃遣人間行求栁氏以練囊盛麩金}
