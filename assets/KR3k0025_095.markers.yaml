  - {type: variant, offset: 1736, length: 81, content: 年孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言史記陳世家沛公西入咸陽諸將皆爭走金帛財物之府分之蕭何獨先收秦相府圖籍藏之此沛公得具知天下阨塞戶口多少強弱之處通監, WYG: 大夫}
