  - {type: variant, offset: 2517, length: 8, content: 係蹄在足則猛虎絕, WYG: 流潤飛津沉精幽結貞㽔含芳仰拂素雪庾肅之賛南山石嵬嵬松栢何崔崔上枝拂青雲中心十數圍扶風歌撫孤松而盤桓懷此貞秀姿卓為霜下傑陶詩松數千株切切交呼如冠劒大臣國有疑難庭立而議杜牧賦亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁風霜正慘悽終嵗恒端正豈不罹霜雪松栢有本性劉公幹松栢本孤直錯落千丈松虬龍盤古根松栢雖寒苦羞逐桃李春隂生古苔緑色染秋煙碧何當凌雲霄直上數千尺南窓蕭瑟松聲起憑誰一聽清心耳李白大哉霜雪榦嵗久為寒材疎松隔水奏笙簧松林駐逺清偃盖反走虬龍形中有松栢參天長黛色參天二千尺幽色幸秀發踈柯亦昂藏未見紫煙集虛䝉清露沾何當一百丈欹盖擁髙簷兩株慘列白蘚皮新松恨不髙千尺落落出羣非桃栁青青不朽豈楊梅欲存老盡千年意為覓霜根數寸栽杜詩藍田丞崔斯立痛掃溉對植二松日吟哦}
