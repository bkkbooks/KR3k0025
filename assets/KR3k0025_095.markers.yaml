  - {type: variant, offset: 2889, length: 0, content: '', WYG: 入言之公罷其禁晏子春秋廣陵王元淵夢著衮衣倚槐樹立問於楊元慎元慎曰三公之祥退而告人曰廣陵死矣槐字木傍鬼死後當得三公廣陵討葛榮果為所殺追贈司徒洛陽伽藍記淳于棼嘗夢入大槐安國其王以棼為南柯太守及覺尋其所經由乃宅南大槐下一蟻穴耳廣記甘泉北有槐今謂玉樹三輔黄圖集樹以青槐𤣥隂耽耽文選夾道疎槐出老根夏槐作雲屯韓詩毿毿金蘃撲晴空舉子魂驚落照中鄭谷本朝晉國王公祐嘗手植三槐於庭曰吾子孫必有為三公者已而其子文正公旦相真宗於景徳祥符之間細細槐花暖欲零緑槐髙處一蟬吟東坡曉日宫槐影山谷漢家宮殿䕃長槐嫩色葱葱}
