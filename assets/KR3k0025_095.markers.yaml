  - {type: variant, offset: 115, length: 266, content: 鄉鄰有鬭者被髮纓冠而往救之則惑矣雖閉戶可也同上互入事同體異魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也生亦我所欲也義亦我所欲也二者不可得兼舍生而取義者也孟告子上言飽乎仁義也所以不願人之膏粱之味也令聞廣譽施於身所以不願人之文繡也同上求則得之舍則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也孟盡心上可以取可以無取取傷廉可以與可以無與與傷惠孟離婁下與其屈己以富貴不若抗志以貧賤屈己則制於人抗志則不愧於道孔叢子互入有守三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然豈可以貪爵祿而使吾君有妄施之名乎, WYG: ''}
