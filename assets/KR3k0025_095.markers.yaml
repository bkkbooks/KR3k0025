  - {type: variant, offset: 2885, length: 1, content: 千, WYG: 凛凛節竒霜澗栢六一集嵗月那能記風霜亦飽經槁乾仍故節潤澤出新青秀色有新古英姿無暑寒後山槐經面三槐三公位焉周禮趙宣子驟諌公患之使鉏麑賊之麑觸槐而死左傳子五沃之土其木宜槐管子水中有火乃焚大槐莊子槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬葉成淮南子槐子服之補腦令人髪不白而長抱朴子史建始四年山陽社中大槐樹吏人伐斷之其夜復自立如故漢書大司馬府有老槐樹殷仲文歎曰此樹婆娑生意盡矣晉書庾肩吾甞服槐實年七十餘目看細字鬢皆黒梁書貞元中度支欲取兩京道中槐樹為薪先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊逰豈宜斬伐虢州刺史蕭祐奏湖城縣百姓閻酆五代同居家内槐一本再生枝葉唐書傳記櫰槐大葉而黑守宮槐葉晝聶宵炕爾雅槐木者虛星之精春秋説武王問太公曰天下神來甚衆恐有試者何以待之太公曰請樹槐於王門内有益者入無益者距之太公}
