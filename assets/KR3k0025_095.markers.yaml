  - {type: variant, offset: 2556, length: 0, content: '', WYG: 救斧斤厄野火解憐氷雪姿已負梁棟質肯為兒女悲林中百尺松嵗久蒼龍蹙松花釀仙酒養此霜雪根遲待鸞鳯吟欝欝蒼髯真道友十年春雨養髯龍澗底松根劚雪腴並同上喬松千尺老不僵兮流膏入土龜蛇藏兮欝欝蒼髯千嵗姿肯來杯酒作兒嬉醉裏便成歌雪舞醒時喚作嘯風詞上有百尺絲兎絲也下有千嵗苓老松閲世卧雲壑晩著滄江舞萬牛蟠空作風雨發地鳴鼓吹太邱心灑落古松韻清深聊持不俗耳靜聴無絃琴老去惟心在相依到嵗寒山谷松生隂隘岩嶽穴械病乎不快卒}
