  - {type: variant, offset: 3198, length: 4, content: 失一國與, WYG: 抉吾眼懸吳之東門上以觀越兵之入吳也史記應順遷東平相有梓樹生於㕔事室上順事後母至孝衆以為孝感之應後漢書傳記楰䑕梓爾雅七詩義疏曰今永昌人謂䑕梓漢人謂之楰君乘火而王其政和平楸梓為常生禮斗威儀玉山碧山多梓木雞山美梓山海經太姒夢太子發取周庭之梓樹於商闕間化為松柏竹書康叔伯禽問於商子商子曰南山之陽有木名橋北山之隂有木名梓二子盍徃觀焉二子往觀見橋木髙而仰梓木晉而俯反以告商子曰橋者父道也梓者子道也尚書大傳秦文公造長安宫終南山有梓樹䕃宫中公}
