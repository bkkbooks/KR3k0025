  - {type: variant, offset: 2529, length: 25, content: 在手則壯士斷其節何則以其所全者重所棄者輕陳琳檄齊桓, WYG: 窟不惜斤斧瘡縱未得茯苓且當拾流肪東坡坐待老龍蛇清䕃滿南臺孤根裂山石直榦排風雷我今百日客養此千嵗材天}
