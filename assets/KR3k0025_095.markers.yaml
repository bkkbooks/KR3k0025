  - {type: variant, offset: 3228, length: 795, content: 年初楚子玉自為瓊弁玉纓未之服也先戰夢河神謂己曰畀余余賜女孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也左僖二十八年簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛忘修身之道而求眾人之譽割衣食之業以供享宴之好通監漢武紀塞川原為潢潦前漢食貨志趙壹曰文籍雖滿腹不如一囊錢東漢本傳帝使人以馬易珠璣翡翠玳瑁於吳吳主曰此皆孤所不用而可以得馬孤何愛焉皆以與之通監魏明紀互入知所輕重傳縡曰不處郊廟大神專媚淫昏之鬼通監陳後主鄧景山有裨將抵罪當死諸將請之不許其弟請代兄死亦不許請入馬以贖罪乃許之諸將怒曰我輩曾不及一馬乎通監唐代宗本朝持千金之璧以求一瓦釜幾何其不舉而棄諸溝也老泉經君子三揖而進一辭而退記表記同而進不同而退記儒行色斯舉矣翔而後集語鄉黨直道而事人焉往而不三黜枉道而事人何必去父母之邦語微子子庶人召之役則往役君欲見之召之而不往見孟萬章下所就三所去三孟告子下史小國之事大國也德則其人也不德則其鹿也左文十七年鳥則擇木木豈能擇鳥左哀十一年費無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也必死不辟勇也父不可棄名不可廢爾其勉之相從為愈左昭二十年集吾寧悃悃款款朴以忠乎將送往迎來追俗人也斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗富貴以媮生乎寧超然高舉以保真乎將咒訾慓斯承顏色也喔咿嚅唲以事婦人乎寧廉潔正直以自清乎將突梯滑稽隨俗如脂如韋乎柔弱寧昂昂若千里之駒乎將汜汜若水中之鳧乎與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之跡乎寧與黃鵠比翼乎將與雞鶩爭食乎楚辭繞樹三匝何枝可依魏武短歌行明月難暗投郭景純遊仙詩須知世路難輕進豈是君門不大開杜牧之, WYG: ''}
