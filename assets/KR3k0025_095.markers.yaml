  - {type: variant, offset: 2889, length: 0, content: '', krp: 入言之公罷其禁晏子春秋廣陵王元淵夢著衮衣倚槐樹立問於楊元慎元慎曰三公之祥退而告人曰廣陵死矣槐字木傍鬼死後當得三公廣陵討葛榮果為所殺追贈司徒洛陽伽藍記淳于棼嘗夢入大槐安國其王以棼為南柯太守及覺尋其所經由乃宅南大槐下一蟻穴耳廣記甘泉北有槐今謂玉樹三輔黄圖集樹以青槐𤣥隂耽耽文選夾道疎槐出老根夏槐作雲屯韓詩毿毿金蘃撲晴空舉子魂驚落照中鄭谷本朝晉國王公祐嘗手植三槐於庭曰吾子孫必有為三公者已而其子文正公旦相真宗於景徳祥符之間細細槐花暖欲零緑槐髙處一蟬吟東坡曉日宫槐影山谷漢家宮殿䕃長槐嫩色葱葱}
  - {type: variant, offset: 2890, length: 0, content: '', WYG: 染埃天仗龍旗穿影去鈎陳豹尾拂枝來梅堯臣楊栁經枯楊生稊老夫得其女妻枯楊生華老婦得其士夫易折栁樊圃東門之楊其葉牂牂昔我徃矣楊栁依依北山有楊菀彼栁斯有菀者栁詩子五沃之土宜栁管子支離叔觀於㝠伯之丘崑崙之墟黄帝之所休俄而栁生其左肘莊子夫木槿楊栁斷而植之更生倒之亦生横之亦生抱朴子史周亞夫屯軍細栁營漢書王恭美姿容或目之曰濯濯如春月栁太康末京洛為折楊栁之歌是時三楊貴盛而被族㓕太后幽}
