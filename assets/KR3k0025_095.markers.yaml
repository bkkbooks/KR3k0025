  - {type: variant, offset: 2912, length: 1, content: 留, krp: 栁送腰肢日幾囬更教飛絮舞樓臺顛狂忽作髙千丈風力㣲時穏下來陳去非桑桑柘附蠶事詳見民業部經其亡其亡繫於苞桑易桑之未落其葉沃若于嗟鳩兮無食桑葚桑之落矣其黄而隕星言夙駕説於桑田無踰我墻無折我樹桑肅肅鴇行集於苞桑交交黄鳥止於桑隰桑有阿翩彼飛鴞集於泮林食我桑黮懐我好音詩季春命野虞毌伐桑柘記晉重耳將行謀於桑下趙宣子田於首山舍於翳桑左傳子子産開畆樹桑鄭人謗訾韓子季夏取桑柘之火鄒子史齊魯千畆桑其人與千户}
  - {type: variant, offset: 2914, length: 2, content: 論歐, WYG: 等史記張堪為漁陽太守百姓歌曰桑無附枝麥秀兩岐陳􅁮為巫令桑旅生二萬餘株民以為給後漢書先主舍有桑樹生髙丈餘遥望如小車盖或謂當出貴人先主少時與宗中諸兒於樹下戲言吾必當乘此羽葆車盖蜀志齊太祖宅南有桑樹擢本三丈横出四枝狀如車盖上年數嵗逰於其下從兄敬宗謂曰此樹為汝生也齊書傳記女桑桋桑俗呼小桑長條者為女桑樹檿桑山桑書曰厥篚檿絲詩曰其檿其柘是也桑栁醜條妸娜垂條也並爾雅宣山上有桑髙五千尺圍五丈其枝四衢葉大尺赤理青葉名曰帝女之桑東北海外圓丘有三桑無枝皆髙百仭山海經東方有樹焉髙八千丈葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸神異經桑木者箕星之精典術伊尹之母孕伊尹夢神告之曰臼出水而東走無顧明日視臼果出水告其隣東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒於空桑之中獻之於君命之曰伊尹吕氏春秋楚邊邑之女與吳邊邑處女争界上之桑二家相攻吳國不勝遂伐楚二都吳越春秋東華夫人設珍肴有扶桑丹椹廣記集出自薊北門遥望胡地桑枝枝自相值葉葉自相當曺植歌緑葉興而盈尺崇條蔓而増尋陸機賦上似華盖紫極比形下象鳯闕萬桷一楹樊欽賦桑柘起寒煙謝眺嫋嫋桑柘葉桑柘羅平蕪李白桑柘葉如雲舍西柔桑葉可拈杜詩桑葉忽蕪蔓韓詩官罷得絲髪好買百樹桑杜牧嫋嫋陌上桑䕃陌復垂塘長條繫白日細葉隱鸝黄古樂府本朝桑枝生椹鳥啁啾兩岸桑柘雜耕耘風勁野田桑柘折緑桑髙下映平川桑柘千疇富六一集去年東坡拾瓦礫自種黄桑三百尺傳云古隆中萬樹桑柘美東坡梧桐經梧桐生矣于彼朝陽詩子舍其梧檟養其樲棘孟子據槁梧而瞑棲鵷鶵非梧桐不棲莊子傳記梓實桐皮曰椅今民云梧桐也詩義疏櫬梧也爾雅君乘火而王其政平梧桐為常生禮斗威儀王者任用賢良則梧桐生於東廂瑞應圖梧桐不生則九州異注云梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二月有閏則十三葉視葉小者則知閏何月也不生九州各異君天下不同也遁甲經梧桐生於嶧山陽岩石之上採東南孫枝為琴聲甚清雅風俗通梧桐有白者驃國有白桐木其華有白毳取其毳淹漬緝織以為布廣志益州有梧桐木其華采如絲人績以為布名曰華布華陽國志梧桐生山石間者為樂器則鳴齊民要術梧桐園在吳夫差舊國一名琴川梧園宮在句容縣古樂府云梧宫秋吳王愁是也述異記人有折博陵君豹山園桐枝者}
