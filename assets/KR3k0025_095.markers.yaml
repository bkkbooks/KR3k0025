  - {type: variant, offset: 1696, length: 1, content: 武, WYG: 書傳記松脂淪入地中千嵗為茯神茯苓𤣥中記温山松栢常茂不落焦贑易林松脂一名松膏一名松肪久服輕身延年本草嵩山有大松樹或百嵗千嵗其精變為青牛或為伏龜採食其實得長生嵩山記永寧縣界海中有松門島嶼上皆生松王羲之逰郡記石門岩即松林也南臨石門澗澗中仰視之離離如駢麈尾號麈尾松西嶺松如馬鬛又葉五粒者名五粒松服之長生廬山記松凡言兩粒五粒粒當言鬛段成式修行里私第大堂前五鬛松五鬛皮不鱗唐仇士良水嵦亭}
