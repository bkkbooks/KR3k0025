  - {type: variant, offset: 2516, length: 0, content: '', WYG: 伏生者當湯時為木正常食松脂偓佺好食松實能飛行逮走馬以松子遺堯不能服列仙傳漢末大亂宮人小黄門避兵食松栢實遂不復飢舉體生毛魏武聞而始收養還食穀米齒落髪白異苑李元禮冽冽如長松下風周君颼颼如小松下風世説東都龍興觀有古松樹枝偃倒垂相傳云已經千年常有白鶴飛止其間西京雜記沙門𤣥装大唐武德中將徃西域取經於龍岩寺前見一松樹以手摩其枝曰吾西去求佛教汝可西長若吾歸即却東回及去年果西指一年忽東回果東歸衆謂此松為摩頂松廣記朝真觀九星院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香逰之不數日松皆半枯事畧}
  - {type: page-break, offset: 2516, content: '', id: KR3k0025_WYG_095-4a, image: WYG0932/WYG0932-0733c.png}
  - {type: variant, offset: 2516, length: 0, content: '', krp: 伏生者當湯時為木正常食松脂偓佺好食松實能飛行逮走馬以松子遺堯不能服列仙傳漢末大亂宮人小黄門避兵食松栢實遂不復飢舉體生毛魏武聞而始收養還食穀米齒落髪白異苑李元禮冽冽如長松下風周君颼颼如小松下風世説東都龍興觀有古松樹枝偃倒垂相傳云已經千年常有白鶴飛止其間西京雜記沙門𤣥装大唐武德中將徃西域取經於龍岩寺前見一松樹以手摩其枝曰吾西去求佛教汝可西長若吾歸即却東回及去年果西指一年忽東回果東歸衆謂此松為摩頂松廣記朝真觀九星院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香逰之不數日松皆半枯事畧}
