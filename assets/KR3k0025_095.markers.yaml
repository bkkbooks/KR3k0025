  - {type: variant, offset: 2910, length: 0, content: '', WYG: 鳯闕輕遮翡翠幃龍池遥望麯塵絲御溝春水相輝映狂殺長安年少兒花萼樓前初種時美人樓上鬭腰肢如今抛擲長街裏露葉如啼欲恨誰御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離劉夢得柳枝詞色映妖韶栁不比禁中人栁終朝剩得三眠絮飛藏皓蝶帶弱露黄鸝灞岸已攀行客手楚宫先騁舞姬腰已帶黄金縷仍飛白玉花長時須拂馬密處更藏鴉曽逐東風拂舞筵樂遊春􅁐斷腸天如何肯到清秋日已帶斜陽又帶蟬李義山灞上漢南千萬樹幾人逰宦别離中緑隂未覆長堤水金穗先迎上􅁐風杜牧半煙半雨江橋畔映杏映桃山路中㑹得離人無限意千絲萬絮惹春風鄭谷自家飛絮猶無定争把長條絆得人羅隱楊栁千條拂面絲緑煙金穗不勝吹温庭筠栁意不勝春韋蘇州本朝栁絮已將春去逺落絮風捲盡春歸不留迹六一集為問如何挿楊栁明年飛絮作浮萍長恨漫天栁絮輕只將飛舞占清明}
