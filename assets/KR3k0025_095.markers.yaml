  - {type: variant, offset: 2912, length: 1, content: 留, WYG: 栁送腰肢日幾囬更教飛絮舞樓臺顛狂忽作髙千丈風力㣲時穏下來陳去非桑桑柘附蠶事詳見民業部經其亡其亡繫於苞桑易桑之未落其葉沃若于嗟鳩兮無食桑葚桑之落矣其黄而隕星言夙駕説於桑田無踰我墻無折我樹桑肅肅鴇行集於苞桑交交黄鳥止於桑隰桑有阿翩彼飛鴞集於泮林食我桑黮懐我好音詩季春命野虞毌伐桑柘記晉重耳將行謀於桑下趙宣子田於首山舍於翳桑左傳子子産開畆樹桑鄭人謗訾韓子季夏取桑柘之火鄒子史齊魯千畆桑其人與千户}
