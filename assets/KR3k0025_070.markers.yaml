  - {type: variant, offset: 3490, length: 5, content: 平原君欲封, WYG: 上畏鷹鸇下畏網羅説􅁐正諫篇集下堂兮見蠆出門兮見蜂退静黙而莫予知兮進號呼又莫予聞楚辭出門無通路枳棘塞中途左太冲詠史舉手挂羅網動足觸機䧟陳孔璋檄毎愁悔吝作如覺天地窄杜詩出門即有礙誰謂天地寛孟郊絶糧於陳畏於匡毁於叔孫奔走於齊}
