  - {type: variant, offset: 3542, length: 398, content: 解紛亂而無所取也即有所取者是啇賈之人也戰國策鍾離意曰志士忍渴於盜泉之水曾參迴車於勝母之閭惡其名也東漢紀互入疾惡水名盜泉仲尼不漱論語撰考讖郝子廉一介不取諸人曾過姊飲留錢席下而去每行飲水常投一錢井中風俗通集食不媮而為飽兮衣不苟而為溫楚辭互入廉潔恥干媚而求親藝文曹植敘愁賦義分明於霜信行直如弦袁陽源白馬篇渴飲堅冰漿飢待零露餐苦寒行箕山許由有高節湘水屈原有清源陳子昂黃河一直青松萬仞同前松柏青青不受令於霜雪張說之秀木勢怕孤張說集獨立天地間李太白多君秉古節嶽立冠人曹同上以茲悟生理獨恥事干謁兀兀遂至今忍為塵埃沒杜詩物白諱受玷行高無污真同上馬蹄無入朱門跡韓文道不行於主人與之處者非其類雖有享之以季氏之富不一日留也同上古琴無俗韻寒松無妖花李太白勁葉森利劍孤莖挺端標介潔靜專不交勢利並同上高郢規矩自立不干權貴柳文見佞色諂笑者不忍與坐語同上潔性不可污韋應物嶷然如斷山絕巘不可以邪徑造焉穆員作鄭叔則誌獨鶴不群孤松無柯, WYG: ''}
