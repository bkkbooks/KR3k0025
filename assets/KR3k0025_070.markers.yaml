  - {type: 'tls:seg', offset: 404, content: '', id: KR3k0025_CHANT_070-2a.57}
  - {type: variant, offset: 404, length: 0, content: '', WYG: 口忘憂已滿小人之腹殺身粉骨難酬聖主之恩卵翼不自於他門頂踵實非其己物李義山我蟠濁泥君躡青雲不以升沉塹隔其間誨我如兄煦我如春我何敢忘銘骨書紳孫可之煖乎若冬陽之煦油乎若春澤之侵喜過生悲感深以泣吕温雕琢只應勞郢匠羅隠感激念知己匣中孤劒鳴錢起感入心府權載之本朝摳衣最出諸生後倒屐嘗傾廣坐中丹青}
