  - {type: variant, offset: 3059, length: 297, content: 并丹高潔未嘗脩剌謁人東漢梁鴻尚節介勢家慕其高節多欲女之鴻竝絕不娶楊震舉茂才王密密遺震金曰暮夜無知者震曰天知神知我知子知何謂無知徐穉非其力不食並同上陳泰為并州京邑貴人寄寶貨因泰市奴婢泰皆掛之於壁不發其封三國魏志羊祜不附中朝時人為之語曰二王王戎王衍當國羊公無德通監晉武紀方正亮直介然不群晉書王基傳崔遊自少及長口未嘗語及財利晉書崔洪口不言貨財手不執珠玉同上顏延之子竣貴重凡所資供延之一無所受布衣茅室蕭然如故常乘羸牛笨車逢竣鹵簿即住道側常語竣曰吾平生不憙見要人今不幸見汝通監宋世祖劉行本為左庶子太子得良馬欲令行本乘行本正色曰至尊置臣於庶子者欲令輔導以正道非為作弄臣也隋書惡木垂蔭志士不息盜泉飛溢廉夫不飲, WYG: 呌閽弗聽叩鼓弗聞}
