  - {type: variant, offset: 3501, length: 2, content: 三終, WYG: 東坡文暗投經我即爾謀聽我囂囂誨爾諄諄聽我藐藐匪用為敎覆用為虐詩子彼非所明而明之宋人資章甫而適諸越越人斷髪文身無所用之大聲不入於里耳道堯舜於戴晉人之前荘子徴羽之操不入鄙人之耳淮南子楚人和氏得玉獻厲王王使玉人相之曰石也王以和為詐而刖其左足及武王又獻之王使玉人相之曰石也王又以為詐而刖其右足和乃抱璞而泣於楚山之下韓非子夫歌採菱發陽阿鄙人聽之不若延路陽局延路陽局鄙歌曲也非夫歌者拙也聽者異也魯人善制冠妻善織屨徃徙於越而大困窮以其所脩而逰不用之鄉淮南子史明月之珠夜光之璧以暗投人於道衆莫不按劍相眄西漢鄒陽傳未遇知己道不同耳通鑑漢明帝紀至音不合於衆聽東漢初賈妃之為太子妃也嘗以妬殺數人武帝怒楊后曰賈公閭有大勲又豈可遽忘之耶妃由是得不廢數誡厲妃妃不知后之助己返以后為構己於武帝更恨之及帝即位賈后}
