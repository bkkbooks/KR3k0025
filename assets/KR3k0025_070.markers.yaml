  - {type: variant, offset: 401, length: 0, content: '', WYG: 曲突煙路無行輪聲同上千里蕭條雞犬罕音季友表草合人蹤斷塵濃鳥跡深李太白集周王之馬跡不至謝公之屐齒不及栁集窮陋史敝邑褊小不足以容從者左傳僻陋在夷其孰以我為虞左生於窮巷之中長於蓬茨之下無有逰觀廣覧之知顧有至愚極陋之累王褒傳集煙消日出不見人欸乃一聲山水緑千山鳥飛絶萬徑人跡㓕孤舟蓑笠翁獨釣寒江雪栁詩蹄道補復破絲窠掃還成寂寞之濵韓文落葉滿空山何處尋行跡韋應物蛙聲籬落下草色户庭間張文昌怪禽啼曠野落日恐行人賈浪仙紅葉紛紛葢欹瓦緑苔重重封壊垣元稹孤螢出荒池落葉穿破屋司空圖本朝緑苔人跡少黄葉雨聲多歐陽榮不知人間之㡬時兮但見草木華落為春冬同上虗市無人冷欲氷欒城詩叙述部感謝經飲之食之教之誨之中心藏之何日忘之詩史}
  - {type: page-break, offset: 401, content: '', id: KR3k0025_WYG_070-24b, image: WYG0932/WYG0932-0158b.png}
  - {type: page-break, offset: 401, content: '', id: KR3k0025_WYG_070-25a, image: WYG0932/WYG0932-0158c.png}
  - {type: variant, offset: 401, length: 0, content: '', krp: 曲突煙路無行輪聲同上千里蕭條雞犬罕音季友表草合人蹤斷塵濃鳥跡深李太白集周王之馬跡不至謝公之屐齒不及栁集窮陋史敝邑褊小不足以容從者左傳僻陋在夷其孰以我為虞左生於窮巷之中長於蓬茨之下無有逰觀廣覧之知顧有至愚極陋之累王褒傳集煙消日出不見人欸乃一聲山水緑千山鳥飛絶萬徑人跡㓕孤舟蓑笠翁獨釣寒江雪栁詩蹄道補復破絲窠掃還成寂寞之濵韓文落葉滿空山何處尋行跡韋應物蛙聲籬落下草色户庭間張文昌怪禽啼曠野落日恐行人賈浪仙紅葉紛紛葢欹瓦緑苔重重封壊垣元稹孤螢出荒池落葉穿破屋司空圖本朝緑苔人跡少黄葉雨聲多歐陽榮不知人間之㡬時兮但見草木華落為春冬同上虗市無人冷欲氷欒城詩叙述部感謝經飲之食之教之誨之中心藏之何日忘之詩史}
  - {type: variant, offset: 402, length: 0, content: '', WYG: 謂生死而肉骨也左傳管仲曰生我者父母知我者鮑叔也史管仲傳浹肌膚而藏骨髓董仲舒傳隕首流腸侯景傳周宇文曰生死肉骨豈過今恩負山戴嶽未足勝荷通鑑陳紀衣服之外皆聖恩所賜惟髪與膚生從父母唐楊妃傳集一言之譽東陵侔於西山一盼之榮鄭璞踰於周寳王文憲文集序迴霜收電使不隕越陸機謝表自頂至踵功歸造化咳唾為恩盼睞成飾顧已循涯實如塵忝千載一逄再造難答任昉彈文實佩荆卿黄金之賜却感豫譲國士之分惠以恩光顧以顔色江淹書潤朽骨而榮枯木文選曹植表恩惠周渥赭白馬賦生繁華於枯荑育豐肌於朽骨勸進表守死陵墓没齒家園不意慶雲垂澤天漢横流拂拭霧露生見白日踴躍昭泰情何以勝再造生涯天實為徳㧞於草野謬齒衣冠私門祖宗幽顯榮慶豈止一身而已肝腦塗地不足塞責特恕萬死賜以再生才本庸㣲名術無紀皆縁際㑹叨遇聖明謬得揚歴簮徽陪奉鴛鷺綢繆榮禄荏苒平時摩頂至趾豈足上酬陳子昻集𤣥造曲成大明私照來效未聞新恩洊及回一瞬之念致再造之恩羣蟄應南山之雷窮鱗得西江之水六律變幽谷之寒一丸銷彌年之疹喜心深生懼珍羞出於内府㫖酒降於上尊勤勞無展於股肱醉飽有慙於口腹跽奉自天之命遥馳捧日之心鼓舞忭成雷緘藤既開覩彩章之盛飾蹈舞而服發温燠於祁寒頓驚凢口舉其匕筯若負丘山恩光到敝廬白首垂絲荷不遺糗糧既備永無半菽之虞襦袴足頒逺超挾纊之感劉賔客徳重恩宏身㣲命輕無階荅謝惟積慚惶受恩益大顧已愈輕蒙生成於天地無禆補於涓塵温存感深惠琢切奉明戒韓集泛大鯨之海每覺魂摇戴巨鰲之山未如恩重駑駘蒙錦繡塵土浴潺湲如我酬恩合執鞭螢光爝火何禆日月之明弱質孤根但荷乾坤之徳杜牧之成九族之榮盡百年之幸興哀於無用之地垂徳於不報之所守突奥者忽仰睎於白日負泥塗者遂自濯於清源栁文釋於齊斧之下揖於羣士之上燕公集涸溜沾濡沬餘光照死灰元稹提攜增善價拂拭長妍姿女醜嫁勞媒惠深范叔綈袍贈榮過蘇秦佩印歸天酒來以分甘御羞降而示惠寵過加籩懼多尸素之責榮同置醴悲無麴蘖之功𤣥造曲成榮幸不止於一身感戴實深於萬品既鮮華而駭目亦輕煖而便身祕藏篋笥傳示子孫榮降天上寵驚人間澤及草木秋色變而成春顧陋質而懐慙貎非稱服拊㣲躬而荷寵力不勝衣肉食無謀未展涓埃之報素餐有愧難勝醉飽之恩天厨酒脯御府管絃寵賜忽降於寰中慶幸實生於望外念嚴凝而加之煦嫗慮皸瘃而潤以膏脂挾纊之恩所勉和則體舒不龜之澤既沾感而手舞頒御府之酒漿賜大官之餅餌白侍郎得陪桃李植芳叢别感生成太昊功今日無言春雨後似含冷涕謝東風姚少監㫖酒名茶玉食仙果來於天府莫匪天慈杜牧}
