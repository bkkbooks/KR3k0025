  - {type: variant, offset: 158, length: 1, content: 梁, WYG: 社鼷不灌屋䑕不熏何則所託者然也前漢中山王傳巨魚縱大壑前王褒傳星辰之麗天猶萬國之附王後漢袁楷傳如晨風之鬱北林龍魚之趣藪澤也晉書孝愍帝紀魚得水而遊鳥乗風而翔唐書元稹傳鳥生深林獸在豐草白居易傳傳記稷蜂不攻社䑕不熏其所託者然也韓詩外傳鳯凰巢於阿閣通歴集歸鳥赴喬林翩翩厲羽翼曹子建贈白馬王彪庇身有地任彦昇集蝟結蟻聚水草有依文選露淋秋檜鶴聲清杜荀鶴問無恙外不暇出一語且先賀其得賢主人韓退之代張籍團團規内星未必明如月託迹近北辰周天無淪没元稹雄藩車馬地作尉有光華銜泥入華屋韋應物不見千年鶴多栖百丈松獸樂在山谷魚樂在陂池蟲樂在深草鳥樂在高枝白侍郎互見趨向不同水深魚極樂杜詩失所依託經龍戰于野其道窮也易若渉大水其無津涯予將疇依書予羽譙譙予尾翛翛予室翹翹風雨所漂搖鴻飛遵陸不屬于毛不離于裏靡所止戾詩子下喬木而入於幽谷孟子蒙鳩以羽為巢而編之以髮繫之以葦苕風至苕折卵破子死巢非不完也所繫者然也荀子史虢射曰皮之不存毛將安傅左僖十四年容容無所倚史淮隂傳失所為愆史孔子世家曾不得邪徑而託足焉前漢賈山傳宇宙雖廣自容無所通鑑晉穆紀有鳥於此架巢於葭葦之顛天風則葭折而巢毁所托者弱也韓詩外傳集眇眇而無所歸泊楚辭花離蔕而萎條去幹而枯蔡邕釋誨出籠窮短翮委轍涸枯鱗駱賔王行舟楫而不識四方兮渉大水之漫漫韓文閔已賦互入昧於趨向為水不入海安得浮天波為木不在山安得横日柯孟東野枳棘徒棲鳳劉長卿舊時王謝堂前燕飛入尋常百姓家劉賔客百川不朝於海雖狂奔澶漫終為涸土唐田頵移書楊行密纍纍然若䘮家之狗史記孔子世家辨白經無信人之言人實迋女詩子曰二三子以我為隠乎吾無隠乎爾吾無行而不與二三子者是丘也語子如使予欲富辭十萬而受萬是為欲富乎予豈好辯哉予不得已也孟史考問左驗明白楊惲傳貫髙怨家知其謀上變告之於是上遣捕趙王及諸反者趙午等十餘人皆自爭剄貫髙獨怒罵曰誰令公為之今王實無謀而並捕王公等皆死誰白王不反者乃詣長安髙對獄曰獨吾屬為之王實不知吏治搒笞數千刺剟身無可擊者終不復言貫髙曰人情寧不各愛其父母妻子乎今吾三族皆以論死豈愛王過於吾親哉顧為王實不反獨吾等為之漢}
