  - {type: variant, offset: 250, length: 0, content: '', WYG: 獸走叢薄之中禍猶及之又况編户齊民乎俶真訓史昔虞舜窘於井廩伊尹負於鼎爼傅說匿於巖險吕尚困於棘津夷吾桎梏百里飯牛仲尼畏匡菜色陳蔡此皆學士所謂有道仁人也猶遭此菑况以中材渉亂世遇害可勝道哉㳺俠傳人方為刀爼我為魚肉項羽傳景帝没入鄧通家財一簪不得着身佞倖傳龍不隠鱗鳯不藏羽網羅髙懸去將安所東漢傳過誤失言文吏躡尋三王傳明知禍烈及己也晁錯傳張敬兒被收脱冠投地曰用此物誤我齊書烈火燒心衆鏑叢體憲宗紀集秋草榮其将實}
