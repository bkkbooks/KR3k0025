  - {type: variant, offset: 2991, length: 2, content: 趾守, WYG: 人無相生相死之友於朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乗機抵􅇖以要權利韓文公集釋言入門無為言之侣出谷罕求聲之援唐文粹天和蒸物燕谷不被其煦一鄒子尚能耻之栁文攀驥逸而無由仰鵬飛而自失駱賓王鄉曲無知己朝端乏親故伊誰為揚雄一薦甘泉賦孟浩然朝無一命之親路無囬眸之舊猶孤根寄不食之田也人人耘耨所不及家家灌溉所不沾堂上百里鬷明無撤器之因門下三千毛遂乏處嚢之地文粹駱谷春深未有容僕短馬瘦言簡行孤為驕閽之所排訶元稹集沈埋經初登於天後入於地入於幽谷幽不明也易子下喬木而入於幽谷孟子史長材廣度沈迹下僚唐}
