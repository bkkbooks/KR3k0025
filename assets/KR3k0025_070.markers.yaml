  - {type: variant, offset: 1114, length: 3, content: 所建明, WYG: 過則謝以質小人有過則謝以文史記孔子世家知悔經我心之憂日月逾邁若弗云來書子自怨自艾孟子史鄭莊公曰寡人有弟不能和協而使餬其口於四方左隠十一年宣子曰我之懐矣自貽伊戚其我之謂矣宣二年悔禍之延成十三年楚靈王聞羣公子之死曰予殺人子多矣能無及此乎昭十二年魯季桓子病輦而見魯城喟然嘆曰昔此國㡬興矣以吾獲罪於孔子故不興也謂其嗣康子曰我即死若必相魯必召仲尼史記孔子世家悔之折骨東}
