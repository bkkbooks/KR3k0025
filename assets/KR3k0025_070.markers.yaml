  - {type: variant, offset: 15, length: 2, content: 俎豆, krp: 願借助焉左襄四年甘茂謂蘇秦曰貧人女與富人女㑹績貧人女曰我無以買燭而子}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 燭光幸有餘子可分我餘光無損子明而得一便焉史記雖復零雨自天終待雲興四岳北史魏愷傳蕭炅為河南尹嘗坐}
  - {type: variant, offset: 18, length: 0, content: '', krp: 燭光幸有餘子可分我餘光無損子明而得一便焉史記雖復零雨自天終待雲興四岳北史魏愷傳蕭炅為河南尹嘗坐}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 西臺遣吉温徃按之温治炅甚急及温為萬年丞未幾炅為京兆尹温素與髙力士相結力士自禁中歸度炅必徃謝官乃先詣力士與之談謔握手甚歡炅後至温陽為驚避力士呼曰吉士不須避此亦吾故人也召還與炅坐炅接之甚恭不敢以前事為怨他日温詣炅曰曩者温不敢虧國家法自今請洗心事公炅遂與盡歡通鑑唐𤣥宗紀傳記士非玉璧談者為價物理論互見因人而重門集兾宵燭之末光邀潤屋之㣲澤劉孝標廣絶交論寒谷待鳴律文選譬諸蟄蟲坯户而死者與夫槁死亦無以異矣春雷一震必歆然翹首與生為徒况有吹律者召東風以薫之其化也益速宋廣平之沈下僚蘇公味道為使者廣平投以梅花賦蘇盛稱之自是方列於聞人之目是知英賢卓犖可外文字猶用片言借說於先達之口席其勢而後驤首當時矧碌碌者疇能自異互見因人而重施一陽於剝極之際援衆溺於坎深之下夫踣者思起必謼而求拯疾者思愈必呻而求醫劉賔客集孤獸走索羣曹子建贈白馬王彪詩無衆星之明假日月之光魏文帝吳質書願假東壁輝餘光照貧女李白集餘波期救涸巨海能無釣浮雲亦有梯麾下頼君材並美獨能無意向漁樵揚雄更有河東賦惟待吹嘘送上天杜詩儻荆璞不致見疑夜光不逄按劍}
  - {type: page-break, offset: 19, content: '', id: KR3k0025_WYG_070-2a, image: WYG0932/WYG0932-0147a.png}
