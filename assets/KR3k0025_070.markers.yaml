  - {type: variant, offset: 255, length: 0, content: '', WYG: 夜降哀余生之不當兮獨蒙毒而逄尤楚辭妻孥受灰滅之咎陳琳檄潤鑊伏鑕王命論抱不測之罪任安書動足蹈非搖首入禍鶡冠子清霜一委地萬草色不緑狂飇一入山萬葉不着木孟郊網羅未觧縱羽翮而何施嚢檻方堅雖虎豹其焉徃一廢不復曾不若躄足延顙之猶有遭也栁文問牛悲釁鐘說彘驚臨牢栁詩夫鳥俛而啄仰而四顧獸深居而簡出懼物之為己害也猶且不免焉斷鶴兩翅鳴何哀縶驥四足氣空横韓文共展排空翼俱遭繳逺矰㣲之車催太行路劍落酆城獄白侍郎集才展凌雲翼俄成失水鱗同上寄孤經哀此㷀獨詩小雅無父何怙無母何恃詩子老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤四者天}
