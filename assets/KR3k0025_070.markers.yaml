  - {type: variant, offset: 406, length: 4, content: 剌字漫滅, WYG: 風波必死之淵尚賴至仁脱臣於蛟鰐垂涎之口歐公集雖父兄所以處臣其僥倖不過如此投畀麏鼯之野保全樗櫟之生天地能覆載之而不能容之於度外父母能生育之而不能出之於死中使破甑弊箒復増九鼎之重使星下燭生蓬蓽之光華天澤旁流失桑榆之枯槁憂深投杼豈無三至之言詔復賜環不待一人之譽既陶甄於頑礦復封植於散材東坡遺簮以故而見收老馬以病而復養哀憐廢棄之乆誰復肯然綢繆樽爼之歡亦非偶爾衣食有奉己寛盡室之憂道徳照人况復終身之幸欒城集受知史子産聞子皮卒哭且曰吾已無與為善矣惟夫子知我左昭十三楚薳子馮曰知我者如夫子則可不然請止左㐮二十二年管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利有不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也生我者父母知我者鮑子也史管仲傳士為知己用女為悦己容西漢司馬遷傳初曹操㣲時人莫知者嘗徃候𤣥𤣥見異焉謂曰今天下將亂安生民者其在君乎操嘗感其知己及後經過𤣥墓輙悽愴致祭奠自為其文}
