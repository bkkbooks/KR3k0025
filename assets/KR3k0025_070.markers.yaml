  - {type: variant, offset: 165, length: 4, content: 孟軻稱大, WYG: 傳洗刷疵姤宣暢湮欎雪寃氣於幽泉唐書集使入湯之禽復假羽毛自斷之足復蒙連續蘓武報李陵書塵洗天波謗絶衆口陸機表茍削丹書得夷平民迴霜收電同上㧞泥塗之乆辱文粹窮骸枯骨一朝再生踴躍章惶再崩再殯陳子昂集收骸溝壑返魄幽泉魑魅窮魂重生聖日糞土殘命不滅荒陬再造生涯天實為徳起骨九泉幽魂雪憤遺噍昭蘇天波昭洗更得自新朽骨更肉萬死一生並同上使枯朽之條更與秋蘭垂芳陸沉之羽復共翔鴻撫翼陸士衡洗㧞出泥滓白侍郎出泥騰霄從骨生肉提㧞出泥吹嘘生翅將枯鱗再躍經鎩翼重矯並同上恩波起涸鱗杜詩寃氣初逄渙汗收劉長卿六翮方鎩思重托於扶搖孤桐半焦兾見收於煨燼同上表而出之為生羽翼劉賔客重雲開朗照九地雪幽魂杜牧之藥肉白骨香返逰魂祓拭舊痕湔洗前過必欲牽復用存始終並同上莫因毫髪累長使濺泥沙錢起收召魂魄栁文生繁華於枯荑育豐肌於朽骨劉越石聖代也知無棄物羅隠本朝安得層穹返收拾莫教狼籍渾泥沙僧參廖子雪詩進退難處經云不可使得罪於天子亦云可使怨及朋友詩子與之為無方則危吾國與之為有方則危吾身荘子矰繳機而在上網罟張而在下雖欲翺翔其勢焉得淮南子史齊魯仲連為書約之以矢遺燕將得書泣三日猶豫不能决欲歸燕已有隙恐誅欲降齊所殺虜於齊甚衆恐已降而後見辱曰與人刄我寜自刄乃自殺仲連傳依世則廢道違俗則危殆何武贊文集居閒力不足從事力難任兩事皆害性一生恒苦心韓文公集蒙成經不耕穫不菑畬易史渠成亦秦之利也溝洫志蕭何為法較若畫一曹參代之守而弗失本傳贊馮翊垂拱蒙成薛宣𫝊以杜畿為河東太守鍾繇促}
