  - {type: variant, offset: 3496, length: 4, content: 仲連辭讓, WYG: 宋衛之郊荀卿逃讒於楚廢死蘭陵公不見信於人私不見助於友䟦前㚄後動輙得咎韓文吾盪而趨不知太行之異乎九衢以敗吾車吾放而逰不知呂梁之異乎安流以沒吾舟吾足蹈坎井頭抵木石衝冐榛枳僵仆虺蜴栁愚溪對如䧟還濘動而愈沉劉賓客縱我生羽翼網羅方縶維元㣲之集一列朝士籍遂為世網拘髙有繒繳憂下有䧟穽虞毎覺宇宙窄未嘗心體舒白侍郎捨虎逄豺狼文粹姜子牙少貧賣漿值天凉屠牛賣肉值天熱而肉敗白帖天上猶有礙何况地上身元㣲之集本朝顔杲卿張廵之徒世治則擯斥方外沈抑下僚世亂則委棄孤城韲粉冦手通鑑唐紀司馬温公論毎言處世窮困所向輙值墻谷無一遂}
