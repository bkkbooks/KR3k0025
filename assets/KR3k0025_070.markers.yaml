  - {type: variant, offset: 3506, length: 2, content: 平原, WYG: 嗤於拙目文賦集雖家至而户曉祗以招尤而速累悲楚人之和氏獻寳玉以為石幕中之辯人反以汝為叛臺中之評人反以汝為傾齊王好竽有求仕於齊者操瑟而徃立王之門三年不得入叱曰吾瑟鼓之而能使鬼神上下吾鼓瑟合軒轅氏之律吕客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利於求韓文雖家置一喙以自稱道詬益甚耳居塗泥若螾蛭然雖鳴其聲音誰為聽之栁文古調雖自愛今人多不彈向}
