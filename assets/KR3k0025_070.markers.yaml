  - {type: variant, offset: 429, length: 3, content: 起人問, WYG: 足縛也唐立宗紀傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俛而噴仰而鳴聲聞於天若出金石之聲者何也彼見伯樂之知己也戰國䇿鑿齒有才桓宣武器之未三十用為荆州治中謝牋曰不遇明公荆州老從事耳世説晉伐吳張悌渡江戰吳軍大敗諸葛靚過迎悌悌不肯去垂泣曰仲思今是我死日且我作兒童便為卿家丞相所㧞常恐不得}
