  - {type: variant, offset: 400, length: 0, content: '', WYG: 險山居谷汲地理志窮里空舍趙廣漢傳集落落窮巷士抱影守空廬左太冲采茨葺茅宇剪棘開舊畦顔延年詩小市常爭米孤城早閉門草深迷市井地僻懶衣裳杜詩陋宇荒堦不足回旋劉賔客欲掃柴門迎逺客青苔黃葉滿貧家劉長卿媿非鄭公里歸掃蒙籠室韋應物集青苔依空牆蜘蛛網四屋張景陽里}
