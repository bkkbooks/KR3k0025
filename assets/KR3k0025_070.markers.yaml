  - {type: variant, offset: 163, length: 1, content: 攻, krp: 改過自新其道無繇西漢刑法志隆天重地死無以塞責一日卒有不勝洒掃之職先狗馬填溝渠竊有所恨西漢東方朔傳劉向曰臣幸得託肺腑西漢劉向傳范逵謂陶侃曰欲仕辟乎曰困于無津陶侃傳春不得避風塵夏不得避暑熱秋不得避風雨冬不得避寒凍四時之間無日休息又私自送徃迎來弔死問疾貴粟論本朝曽與蒿藜同雨露終隨松栢耐風霜臨川集豈堪置足青冥上終欲回身寂寞濱少遭閔凶自奮寒苦螢爝殊光不獲干時之譽榱楹近用亦參構厦之功日有簡書之繁乆無竿牘之獻同上范忠宣遺表云葢嘗先天下而憂期不負聖人之學養疴卧治之所蒙成坐嘯之餘信道直前曽無坎井之避立朝寡助誰為先後之容言行隻影自憐命寄江湖之上驚魂未定夢逰縲紲之中疾病連年人皆相傳為己死饑寒併日臣亦自厭其餘生坡集逮親而得斗禄雖慰於子心歛板而揖上官遂成於俗狀學乆矣而將落思兀然而欲枯進無取當塗之資退已失故時之歩歐公集學以父兄為師貧無公卿之助欒城集木雞自笑真無用芻狗何勞收已陳罪積如山命輕如髮同上湔洗經開釋無辜書蟄蟲昭蘇記子息我黥而補我劓荘子史所謂生死而肉骨也左傳振㧞泥塗前漢班固叙傳枯骨復被肉東漢}
  - {type: punctuation, offset: 165, content: ，, id: KR3k0025_CHANT_070-bkkpn45}
