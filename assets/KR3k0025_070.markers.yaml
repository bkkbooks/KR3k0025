  - {type: variant, offset: 170, length: 25, content: 去邠此豈有意阿世俗苟合哉史孟軻傳叔孫通徵魯諸生魯兩, WYG: 邑交付邑佩印綬畿謂衛固范先曰范衛河東之望也吾仰成而已漢獻紀本朝秦收鄭渠成晉得楚材多山谷集備員經今由與求也可謂具臣矣論語子齊宣王好竽南郭先}
