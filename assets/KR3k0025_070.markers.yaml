  - {type: variant, offset: 1517, length: 1421, content: 言顛則不能扶危則不能安婉婉以順上逡巡以避患雖保黃耇終壽百年蓋志士之所恥愚夫之所賤也楚辭或推迻古移字而難容同上決耳目之欲以苟容為度選論變音聲以順旨思摧翮而為庸張華賦惜位則偷合而不言愛身則苟容而不諫白傳集公卿大夫偷合苟容持祿養安皇甫湜希仕尺寸徇祿斗升唐文粹史君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專壹誰能聽之同之不可也如是左昭二十年衛侯言計非是而群臣和者如出一口通監周紀君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而群下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生通監周紀雷同相從隨聲是非西漢劉歆傳希指雷同西漢馬宮傳每有一事群臣同聲得無非其美者通監漢成紀上下雷同非陛下之福後漢雷同容容無違而已通監漢靈紀若心知不可而順旨雷同負臣子之義通監漢和紀傳記君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待說苑集萬口和附并為一談韓文和而唱之同然一辭同上經胥動以浮言書盤庚上道聽而塗說德之棄也語陽貨子聽虛而責響視空而索影劉子互入任情不任理四面時言軒轅四面一足夔本非真實玉璞鳳凰不是定名魯人東郭空濫美稱愚谷黃公橫受惡名由此觀之傳聞喪真翻傳名實虛信傳說即以定真聞野丈人藥名謂之田父河上姹女謂之婦人堯漿禹糧謂之飲食龍肝牛膝謂之為肉劉子史聞諸道路左昭十三年流言飛文譁於民間西漢誅名而不察實為善者不必免而犯惡者未必刑也通監漢武紀城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全疋帛東漢馬廖傳傳記訛言難信傳聞多失至於魯參殺人不疑盜㛐翟義不死諸葛猶存此皆得之於行路傳之於眾口史通師曠軒轅並世公明方朔同時堯有八眉夔惟一足烏白馬角救燕丹而免禍犬吠雞鳴逐劉安以高蹈故道聽塗說之違理街談巷議之損實說鳧履登朝則云漢書舊記談蛇劍飛屋必曰晉典明文逆波虛辭成茲實錄並同上古語曰事歷終古以魚為魯白氏六帖一犬吠形百犬吠聲同上江南閭里間士大夫道聽塗說強事飾詞呼徵質為周鄭謂霍亂為博陸上荊州必稱陝西下楊都要云海郡言食則糊口道錢則孔方問移則楚丘論婚則燕爾及王則無不仲宣語劉則無不公幹凡一二百件傳相祖述尋問莫知源由施安時復失所顏氏家訓集隨風靡而成行楚辭街談巷議張平子西京賦聽者不察和而唱之同聲一辭韓文諱辨臆決唱聲萬口和附并為一談牢不可破韓文平淮西碑吠聲者多辨實者寡飛語一發臚言四馳萌芽始發枝葉俄茂方謂語怪終成禍梯劉賓客本朝造謗于下者初若含沙之射影但期陰以中人宣言于庭者遂肆鳴梟之惡音孰不聞而掩耳歐公集經舍車而徒義弗乘也易賁卦君子以立不易方易恒卦無有淫朋無有比德書洪範正色率下書畢命君子不以色親人記表記姦聲亂色不留聰明記樂記非時不見非義不合記儒行儒有可親而不可劫也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽記樂記富與貴是人之所欲也不以其道得之不處也語里仁有澹臺滅明者行不由徑非公事未嘗至於偃之室也語雍也子伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭孟公孫丑上端人也孟離婁下一介不以與人一介不以取諸人孟萬章上不以三公易其介孟盡心上不取於人謂之富不辱於人謂之貴孔叢子葛稚川不以片言半字煩人抱朴子史齊即墨大夫不事左右以求譽毀言自至史記齊世家未嘗卑節下意以求仕也西漢蒯通傳行不苟合義不取容前漢朱建傳申屠嘉曰使君所言公事君且奏之則私吾不受私語西漢爰盎傳申屠嘉為人廉直門不受私謁通監漢文紀尹翁歸之語不及私西漢本傳請謁無所行貨賄無所用通監漢武紀里名勝母曾子不入邑號朝歌墨子回車, WYG: 忘}
