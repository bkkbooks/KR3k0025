  - {type: variant, offset: 399, length: 0, content: '', WYG: 危並韓文長念蝸牛猶有舍不如碩䑕觧藏身七十無家萬里身弔影分為千里鴈辭根散作九秋蓬白侍郎集去國長為不繫舟李太白江海今為客風波失所依一身不家食萬事從人求並劉長卿身逐閒雲不在家武作營生計如雲無定所窮愁似影巧相隨姚上監本朝井水分四鄰竹隂借東家蕭然行脚僧一身寄天涯東坡寄寓經黎侯寓于衛詩註諸侯不臣寓公禮史羈旅之臣左傳兩君羈旅張耳傳李揆乞衣求食萍寄諸郡唐小史集羈旅無定心張景陽蹔託棟梁何用喜元稹集生計南枝鳥白侍郎醉鄉無迹似閒雲温飛卿人生已如寄在寄復為客李君虞文荒僻經果羸之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠燿宵行詩東山史狐狸所居豺狼所嘷左傳土陿}
