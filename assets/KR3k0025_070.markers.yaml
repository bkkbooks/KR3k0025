  - {type: variant, offset: 161, length: 0, content: '', WYG: 倫撰禪詔收欲殺之將軍為之辨理得免死因表為平原内使晉惠帝紀張昌宗曰說嘗謂元忠為伊周伊尹放太甲周公攝王位説曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫臣以郎官徃賀元忠語客曰無功受寵不勝慙懼臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為至忠古今仰慕陛下宰相不使學伊周當使學誰耶且臣豈不知今日附昌宗立取台衡附元忠立致族滅但臣畏元忠寃魂不敢誣之耳唐中宗紀議者或罪張廵以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上以為若不時紀録恐逺而不傳使廵生死不遇誠可悲哉唐肅宗紀帝戲第五倫曰聞卿為吏篣婦翁不過從兄飯寧有之耶對曰臣三娶妻皆無父少遭饑亂實不敢妄過人餐東漢本傳李晟大安園多竹後有為飛語者云晟伏兵大安園}
  - {type: page-break, offset: 161, content: '', id: KR3k0025_WYG_070-12b, image: WYG0932/WYG0932-0152b.png}
  - {type: variant, offset: 161, length: 0, content: '', krp: 倫撰禪詔收欲殺之將軍為之辨理得免死因表為平原内使晉惠帝紀張昌宗曰說嘗謂元忠為伊周伊尹放太甲周公攝王位説曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫臣以郎官徃賀元忠語客曰無功受寵不勝慙懼臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為至忠古今仰慕陛下宰相不使學伊周當使學誰耶且臣豈不知今日附昌宗立取台衡附元忠立致族滅但臣畏元忠寃魂不敢誣之耳唐中宗紀議者或罪張廵以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上以為若不時紀録恐逺而不傳使廵生死不遇誠可悲哉唐肅宗紀帝戲第五倫曰聞卿為吏篣婦翁不過從兄飯寧有之耶對曰臣三娶妻皆無父少遭饑亂實不敢妄過人餐東漢本傳李晟大安園多竹後有為飛語者云晟伏兵大安園}
  - {type: variant, offset: 162, length: 0, content: '', WYG: 因倉卒為變晟遂斫伐其竹唐德宗紀張廵死節睢陽人昧其功以為降賊肅宗未及知李翰傳廵功状表之帝因是感悟而廵大節白於世唐李翰傳集刺心以自明刎頸以見志李少卿夫傲雖凶徳必有恃而敢行愈之族親鮮少無扳音班聫之勢於今不善交人無相生相死之友於朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乗機抵戲以要權利夫何恃而傲若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也韓文釋言自古賢人才士秉志遵分被謗議不能自明者百數故有無兄盗嫂娶孤女云撾婦翁者然頼當世豪傑分明辨别卒光史籍堅然相白者無數人栁文西施若觧傾吳國越國亡來又是誰羅隠集陳情史淳于公少女緹縈隨其父至長安迺上書曰妾傷夫死者不可復生刑者不可復屬雖}
  - {type: page-break, offset: 162, content: '', id: KR3k0025_WYG_070-13a, image: WYG0932/WYG0932-0152c.png}
  - {type: page-break, offset: 162, content: '', id: KR3k0025_WYG_070-13b, image: WYG0932/WYG0932-0152d.png}
  - {type: variant, offset: 162, length: 0, content: '', krp: 因倉卒為變晟遂斫伐其竹唐德宗紀張廵死節睢陽人昧其功以為降賊肅宗未及知李翰傳廵功状表之帝因是感悟而廵大節白於世唐李翰傳集刺心以自明刎頸以見志李少卿夫傲雖凶徳必有恃而敢行愈之族親鮮少無扳音班聫之勢於今不善交人無相生相死之友於朝無宿貨蓄資以釣聲勢弱於才而腐於力不能奔走乗機抵戲以要權利夫何恃而傲若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也韓文釋言自古賢人才士秉志遵分被謗議不能自明者百數故有無兄盗嫂娶孤女云撾婦翁者然頼當世豪傑分明辨别卒光史籍堅然相白者無數人栁文西施若觧傾吳國越國亡來又是誰羅隠集陳情史淳于公少女緹縈隨其父至長安迺上書曰妾傷夫死者不可復生刑者不可復屬雖}
  - {type: variant, offset: 163, length: 1, content: 攻, WYG: 改過自新其道無繇西漢刑法志隆天重地死無以塞責一日卒有不勝洒掃之職先狗馬填溝渠竊有所恨西漢東方朔傳劉向曰臣幸得託肺腑西漢劉向傳范逵謂陶侃曰欲仕辟乎曰困于無津陶侃傳春不得避風塵夏不得避暑熱秋不得避風雨冬不得避寒凍四時之間無日休息又私自送徃迎來弔死問疾貴粟論本朝曽與蒿藜同雨露終隨松栢耐風霜臨川集豈堪置足青冥上終欲回身寂寞濱少遭閔凶自奮寒苦螢爝殊光不獲干時之譽榱楹近用亦參構厦之功日有簡書之繁乆無竿牘之獻同上范忠宣遺表云葢嘗先天下而憂期不負聖人之學養疴卧治之所蒙成坐嘯之餘信道直前曽無坎井之避立朝寡助誰為先後之容言行隻影自憐命寄江湖之上驚魂未定夢逰縲紲之中疾病連年人皆相傳為己死饑寒併日臣亦自厭其餘生坡集逮親而得斗禄雖慰於子心歛板而揖上官遂成於俗狀學乆矣而將落思兀然而欲枯進無取當塗之資退已失故時之歩歐公集學以父兄為師貧無公卿之助欒城集木雞自笑真無用芻狗何勞收已陳罪積如山命輕如髮同上湔洗經開釋無辜書蟄蟲昭蘇記子息我黥而補我劓荘子史所謂生死而肉骨也左傳振㧞泥塗前漢班固叙傳枯骨復被肉東漢}
