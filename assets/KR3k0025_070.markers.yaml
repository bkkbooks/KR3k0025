  - {type: variant, offset: 20, length: 1, content: 嘗, krp: 沈骸九死終望銜珠俛首三泉猶希結草涸鱗濡沫常觖望於鯨波决羽搶榆頗思遷於鶯樹儻餘光之可照庶寒灰之重然曲逮恩光資餘潤於東里襲承導引輕托夢於南樛奮短翮於搶榆希髙標之餘拂濯鮮鱗於涓滴望鴻浪之㣲沾所兾顧盼曲流剪拂増價則鈆刀起一割之用跛鼈致千里之行互見自薦儻能分其斗水濟濡沫之枯鱗恵以餘光照孀棲之寒女得使伏櫪駑蹇希騏驥而蹀足竄迹翩翾排鴛鸞而刷羽互見自薦並駱賔王集蹈水火者之求免於人也不惟其父兄子弟之慈愛然後徃而全之也將有介於其側者雖其所憎怨茍不至乎欲其死者則將大聲疾呼而望其人之救也木在山馬在肆過之而不顧者雖日累千百人未為不才與下乗也及至匠石過之而不睨伯樂過之而不顧然後知其非棟梁之才超逸之足也互見委棄天地之濱大江之濆有怪物焉蓋非常鱗凡介之品彚匹儔其得水變化風雨上下於天不難也其不及水蓋尋常尺寸之間耳無髙山大陵曠途絶險為之闗隔也然其窮涸不能自致乎水為獱獺之笑者蓋八九矣如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俛首帖耳摇尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其有命而且鳴號之者亦命也韓文且天下熈熈然而獨呻吟栁文恩波自觧惜枯鱗銜花縦有報恩時擇木誰容托身處劉長卿見借羽翼王維集折簡能榮瘁遺簮莫棄捐韶光如見借寒谷變風烟温飛卿愧無鵷鷺姿短翮空飛還誰當假羽毛雲路相追攀韋應物集線因針而入矢因弦而發雖有線矢無針弦欲自致焉不可得也白傅集當途訴知已投刺匪求蒙孟浩然朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家溉灌所不沾其濯乃條枚成乃華實者上天至仁之膏澤厚地無際之陽春乎相公為上天霖雨佐厚地無際之陽春發生者也何以處某焉歐陽行周文握風捕影鑄木鏤水敢求恩知但希鐫琢墜井者求出執熱者願濯自愧掃門士誰為乞火人杜牧之遺簮墜履應留念門客如今只下寮宣室夜闌如有問可能全忘未燃灰羅隐本朝無鹽煩刻畫寒谷借吹噓歐公集必為鏌鎁盡歸鎔鑄晏公類要儻矜一介之誠願借半辭之助臨川行看富貴逼炙手借餘暖特借齒牙曲成羽翼東坡求哀史楚子圍鄭三月克之鄭伯肉袒牽羊以逆曰孤不天不能事君使君懐怒以及敝邑孤之罪也敢不惟命是聽其俘諸江南以實海濵亦惟命其剪以賜諸侯使臣妾之亦惟命若惠顧前好徼福於厲宣桓武不泯其社稷使改事君夷於九縣君之惠也孤之願也非所敢望也敢布腹心君實圗之左宣十二楚莊王伐鄭克之鄭伯肉袒牽羊以逆曰孤不天不能事君君用懐怒孤之罪也敢不惟命是聽擯之南海以臣妾賜諸侯亦惟命是聽若不絶其社稷使改事君孤之願也非所敢望也敢布腹心史楚世家懐朔鎮將元尼須與元懐舊交貪穢狼籍置酒請懐謂懐曰命之短長繫卿之口豈可不相寛貸通鑑梁武帝紀魏齊笞繫范雎折脅摺齒睢佯死卷以簀置厠中使客醉者更溺之范雎謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣通鑑周紀晉王斬劉守光守光曰守光善騎射王欲成伯業何不留之使自効其二妻李氏祝氏讓之曰皇帝事已至此生亦何益妾請先死即伸頸就戮守光至死號泣哀祈不已通鑑後梁均王丁公為項羽將逐窘高祖彭城西短兵接漢王急顧謂丁公曰兩賢豈相戹哉丁公引兵而還西漢季布傳暴勝之欲斬王訢訢曰殺訢不足增威不如時有所寛以明恩貸勝之壯其言而赦之前漢猛虎處深山百獸震恐及其在䧟穽之中搖尾而求食司馬遷𫝊集元相公在浙東賔府有薛書記酒後傷公猶子逐出幕既去作十離詩以獻犬離主筆離手馬離廐鸚鵡離籠燕離巢珠離掌魚離池鷹離羣竹離亭鏡離臺犬詩云馴擾朱門四五年毛香足净主人憐無端咬着親情客不得紅絲毯上眠筆詩云越管宣毫始稱情紅牋紙上撒花瓊都縁用乆鋒頭盡不得羲之手裏擎鸚鵡詩云隴西獨自一孤身飛去飛來上錦䄄都縁出語無方便不得籠中更喚人燕詩云出入朱門未忍抛主人常愛語咬咬銜泥穢汚珊瑚簟不得梁間更壘巢摭言餘不載謁見經見情者獲直徃則違易例既見君子云胡不喜既見君子為龍為光詩}
