  - {type: variant, offset: 211, length: 2, content: 可興, WYG: 遇朋人不足以舒滿數魏明帝記傳記强奏􅅠者特為足曲史通乗間簉乏琴賦集切混吹於齊竽濫飛聲於郢路駱賓王名亦濫吹竽温飛卿本朝衆裏笙歌誰比數東坡詩狼狽經若崩厥角周書史匹馬隻輪無反者左傳掃地盡矣韓信傳奉頭䑕竄以歸蒯通傳託足無所晋書傳記狼狽是兩物狽前足短常駕兩狼失狼則不能動故世言事乖者稱狼狽酉陽雜爼集乾坤之量包含海嶽臣身甚㣲無所投足蟻適於垤蝸休於殻龜黿螺蜯皆有所伏臣物之靈進退惟辱栁乞巧文孑輪無反文粹被䜛經巷伯寺人傷於䜛故作是詩}
