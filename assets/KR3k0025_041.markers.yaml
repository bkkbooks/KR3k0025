  - {type: variant, offset: 2615, length: 139, content: 監唐武后樂思晦男未十歲沒入司農得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者為反狀以付俊臣無不承反矣太后意稍寤通監唐武后互入轉移人心劉晏八歲獻頌帝奇其幼命宰相張說試之曰國瑞也即授以正字公卿邀請旁午號神童名震一時新唐書本傳互入際遇, WYG: 鑑}
