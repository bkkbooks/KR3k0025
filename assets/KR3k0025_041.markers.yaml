  - {type: variant, offset: 3070, length: 3, content: 年九歲, krp: 建投軀報明主身死為國殤選樂府北門行潢汚易竭抑有朝宗之願犬馬無識猶知戀主之誠子牟馳心扵魏闕汲黯積思扵漢庭微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深栁文揮涕戀行在道途猶恍惚中原消息斷黄屋今安否生逢堯舜君不忍便永訣當今廊廟具搆厦豈云缺葵藿傾太陽物性固莫奪杜工部炙背可以獻天子杜詩獨隨朝宗水赴海輸微涓李太白集萬里納忠一心稟命白樂天報國心皎潔念時涕汎瀾韓詩仰長安而就日赴帝鄉以望雲駱賓王集㣲臣欲獻唐虞夀筵指南山對衮龍王維集平生五色線願補舜衣裳簮組赤墀戀禽魚滄海心杜詩臣心堯日下錢起詩本朝鄭俠雖流落頓挫之餘一話一言未嘗不在君父鄭介夫録雖伏櫪之馬悲鳴猶戀於君軒而曳尾之龜涵養未離於靈沼歐公表蹌蹌退舞敢忘虞帝之笙鏞翼翼歸飛亦在文王之靈沼元絳表古今詩人衆多而杜子美為首豈非以其流落饑寒終身不用而一飯未嘗忘君也歟進如孟子之敬王退若蕭生之憂國蘇文只因未報君恩重清夢時時到玉堂坡詩平生本朝心嵗}
  - {type: punctuation, offset: 3073, content: ，, id: KR3k0025_CHANT_041-bkkpn975}
  - {type: 'tls:seg', offset: 3073, content: '', id: KR3k0025_CHANT_041-6a.61}
  - {type: variant, offset: 3074, length: 0, content: '', WYG: 閩江浪去國雖千里分憂即近君山谷詩夕寐北河隂夢還甘泉宫詩集憂世經我瞻四方蹙蹙靡所騁憂心如惔不敢戲談憂心如酲心之憂矣疢如疾首不遑假寐癙憂以痒䑕思泣血無言不疾並詩一夫不獲則曰時予之辜書雖危起居竟信其志猶将不忘百姓之病也禮記子孟子周流憂世思濟斯民經營八紘之内心勦形瘵何勤如焉孟序有安社稷臣者以安社稷為悦也思天}
