  - {type: variant, offset: 3989, length: 4, content: 少年壯盛, WYG: 肇牽車牛逺服賈用孝養厥父母書親有疾飲藥子先嘗之啜菽飲水盡其歡斯之謂孝下氣怡聲問所欲而敬進之柔色以温之滫髓以滑之腴膏以膏之㫖甘柔滑禮記子子路曰昔者由也事二親之時常食藜藿之羮為親負米百里之外齊聘曽子為卿曰吾不忍逺親而為人役家語以孝敬易以孝愛難曽子曰吾及親仕三釜而心樂後仕三千鍾而不洎吾愁愁一本作悲荘子史孝如曽參義不離其親一宿於外蘇秦傳穎考叔曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之左傳旦夕得甘毳以養親而供養備聶政傳李密曰為人子者願為人兄不願為人弟兄者事親之}
