  - {type: variant, offset: 2341, length: 0, content: '', krp: 後世稱為清白吏子孫以此遺之不亦厚乎東漢宋髙祖微時躬耕於丹徒及受命耕耨之具頗有存者皆命藏之以留於後張緒謂齊栁世隆曰君以清名遺子孫耶答曰一身之外亦復何須子孫不才将為争府如其才也不如一經南史髙歡曰堪敵侯景者唯有慕容紹宗我故不貴之留以遺汝通鑑房彦謙謂子𤣥齡曰今皆因禄富吾獨以官貧所遺子孫在於清白耳隋本傳上謂太子曰李世勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行候我死汝扵後用為僕射親任之若徘徊顧望當殺之耳通鑑張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子孫酒食之􅓵吾不取也聞者是之通鑑夫名門右族莫不由祖考忠孝恭儉以成立之栁玭傳集應劭曰書賢而覆黶幽通}
  - {type: variant, offset: 2342, length: 0, content: '', WYG: 注家世貧儉先人遺訓常恐置産怠子孫故家無樵蘇之地元微之後貴有金玉必不為汝藏崔昭生崔芸李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵杜牧之貽禍經今不取後世必為子孫憂論語子闕史武子之施沒矣而黶之怨寔彰左傳秦始皇宫室之麗使其後曽不得聚廬而託處焉馳道之麗使其後曽不得邪徑而託足焉葬埋之侈使其後曽不蓬顆蔽塚而託葬焉賈山至言集應劭曰黶惡而害盈幽通賦注燕翼無似終為餒魂劉賓客集閉門不解栽桃李滿地唯聞種蒺藜白集攝養經山下有雷頤君子以慎言語節飲食易君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣耳目聰明血氣和平姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體剛氣不怒柔氣不懾四暢交扵中而發作扵外不使放心邪氣得接焉禮記子持其志毋暴其氣養心莫善扵寡欲存其心養其性孟子無以好惡内傷其身荘子合六氣之精平易恬淡則憂惡不能入邪氣不能襲故其徳全而神不虧又曰純粹而不雜靜一而不變淡而無為動而以天行此養神之道也又曰精神四達無所不極荘子邪汚之氣何由得接荀子神清者嗜欲弗能亂淮南子恬和養神則自安扵内清虚養心則不誘扵外神恬心清則形無累矣劉子史子産曰節宣其氣勿使有所壅閉湫底以露其體左養精㳺神西漢東方朔傳養身者以煉神為寳東漢孟説曰養性者善言不可離口新唐書孫思邈云養性者先知自謹栁公度曰吾不以氣海暖冷物熟生物不以元氣佐喜怒年八十九唐書孫思邈曰人無故不應餌藥藥有所偏助則臟氣為不平唐裴潾傳傳記夫欲養神必先須養氣修真祕訣集君子知形恃神以立神須形以存悟生理之易失知一過之害生故修性以保神安心以全身愛憎不接於情憂喜不留於意泊然無感而體氣和平嵇叔夜養生論頤性養夀嵇叔夜幽憤}
