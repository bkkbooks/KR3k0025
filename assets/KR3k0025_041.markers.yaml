  - {type: variant, offset: 4282, length: 2, content: 童騃, WYG: 史擇子莫若父祁奚請老晉侯問嗣曰午也可左傳陶朱公中男殺人囚扵楚朱公曰千金之子不死於市令其少子往視之朱公長男固請欲行朱公不聽長男欲自殺其母為言朱公不得已而遣長子朱公長男竟持其弟喪歸朱公笑曰吾固知必殺其弟也彼非不愛其弟故有所不能忍者也是少與我俱見其為生難故重棄財至如少弟者生而見我富乗堅驅良逐狡兔豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也}
  - {type: page-break, offset: 4282, content: '', id: KR3k0025_WYG_041-41b, image: WYG0931/WYG0931-0149d.png}
  - {type: variant, offset: 4282, length: 2, content: 童騃, krp: 史擇子莫若父祁奚請老晉侯問嗣曰午也可左傳陶朱公中男殺人囚扵楚朱公曰千金之子不死於市令其少子往視之朱公長男固請欲行朱公不聽長男欲自殺其母為言朱公不得已而遣長子朱公長男竟持其弟喪歸朱公笑曰吾固知必殺其弟也彼非不愛其弟故有所不能忍者也是少與我俱見其為生難故重棄財至如少弟者生而見我富乗堅驅良逐狡兔豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也}
  - {type: variant, offset: 4285, length: 0, content: '', WYG: 足悲者吾日夜固以望其喪之來也史記越世家伍奢曰尚為人仁呼必來員為人剛戾忍訽能成大事史記本傳趙括少學兵法父奢不能詰然不謂善曰兵死地而括易言之敗趙必括也史記諸葛亮與兄瑾書曰瞻今已八嵗而聰慧可愛嫌其早成恐不為重器耳蜀志本傳石苞臨終分財與諸子獨不及崇其母以為言苞曰此兒雖小後自能立石崇傳索靖子綝少有逸羣之畧靖每曰綝廊廟之才州郡吏不足汚吾兒也後至尚書左僕射晉書王獻之七八嵗時學書羲之密從後掣其筆不得嘆曰此兒後當復有大名晉本傳晉王湛有隠徳兄弟以為癡父昶獨異焉晉書姚弋仲遣其子襄救趙誡之曰冉閔棄仁背義屠滅石氏汝才十倍於閔若不梟擒以來不必復見我也通鑑帝嘗問顔延之曰竣得臣筆測得臣文㚟得臣義躍得臣酒南史初宋維父弁嘗曰維性踈險必敗吾家梁髙祖梁彦光岐嶷其母謂所親曰此兒有風骨當興吾家北史帝謂雄曰吾兒更事未多通鑑嚴武母裴氏不為其父所答獨厚其妾英武奮然以鐵槌就英寝碎其首挺之竒之曰真嚴挺之子新唐書本傳傳記陳元方季方共論其父寔因曰元方難為兄季方難為弟世説上昧於}
