  - {type: variant, offset: 184, length: 0, content: '', WYG: 注君家兄弟真連璧門十朱輪家萬石靈運子孫俱得鳯慈明兄弟孰非龍坡詩族大徽音逺欒城集閥閲子弟經闕子闕史太史公曰平原君翩翩濁世之佳公子也史記世家子弟如淳曰世世有禄秩家也宛孔氏有㳺閒公子之名西漢食貨志師古曰言其舉動性行有以似之也李徳裕曰朝廷顯官須公卿子弟為之何者少習其業目熟朝廷之事臺閣之儀不教而自成寒士縱有出人之材固不能閑習也則子弟未易可輕唐選舉志越公兒郎故有家風隋書楊洪傳傳記王謝家子弟奕奕皆有一種風氣隋僧智果評書集王孫公子不鏤自彫非鸞則鳯魏王問表觀者尚識承平王孫故態栁文貞房太尉家子孫也韓墓碑本朝蘭砌傳芳鯉庭稟訓臨川集東山子弟家風在歐公詩閨庭蘭玉照鄉閭東坡集白屋子傅説舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市孟子史甘茂起下蔡閭閻顯名諸侯本傳陳涉非王公大人名族之後主父偃傳陳涉甕牖繩樞之子非有陶朱猗頓之富項籍傳諸儒}
