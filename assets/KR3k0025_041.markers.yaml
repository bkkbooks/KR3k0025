  - {type: variant, offset: 2321, length: 0, content: '', WYG: 陳餘慶方稚有祖風歐陽通詢之子母徐氏教以父書晝夜無倦遂亞扵詢唐書謩之論議挺挺有祖風烈魏徴傳宋之問父令文富文辭且工書有力絶人世稱三絶既之問以文章起其弟之悌以蹻勇聞之遜精草𨽻世謂皆得父一絶趙道興遷左武侯明閑宿衛太宗曰卿父為隋武侯有當官之譽卿今克傳弓冶可謂不墜家聲柳公綽之子仲郢有父風牛僧孺曰非積習名教何以致此}
