  - {type: variant, offset: 35, length: 7, content: 張衡擬班固兩都, WYG: 自楊震至彪四世太尉徳業相繼與袁氏俱為東京名族東漢本傳漢興惟韋平父子至宰相西漢平當傳金日磾世名忠孝七世内侍西漢本傳耿氏自中興後訖建安之末大将軍二人将軍九人卿十三人列侯十九人中郎将刺史二千石數十百人與漢興衰耿恭傳世吏一千石至祜九世並以清徳聞晉羊祜傳陸機曰我父祖名播四海晉書本傳中興桓氏尤盛自榮至典世宗其道父子兄弟代}
