  - {type: variant, offset: 2081, length: 149, content: 童時與群輩游戲輒畫地為城郭令諸兒為攻守之勢有不從令者撻之諸兒畏憚莫不整齊同上宇文忻為童時與群輩游輒為部伍進止行列無不用命識者見而異之李泌七歲知為文玄宗召之既至帝方與張說觀弈因使說試其能說請賦方圓動靜泌曰願聞其略說曰方若棋局圓若棊子動若棋生靜若棋死泌應曰方若行義圓若用智動若騁材靜若得意說因賀帝得奇童, WYG: 中興名将}
