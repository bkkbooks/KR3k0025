  - {type: variant, offset: 2341, length: 0, content: '', WYG: 後世稱為清白吏子孫以此遺之不亦厚乎東漢宋髙祖微時躬耕於丹徒及受命耕耨之具頗有存者皆命藏之以留於後張緒謂齊栁世隆曰君以清名遺子孫耶答曰一身之外亦復何須子孫不才将為争府如其才也不如一經南史髙歡曰堪敵侯景者唯有慕容紹宗我故不貴之留以遺汝通鑑房彦謙謂子𤣥齡曰今皆因禄富吾獨以官貧所遺子孫在於清白耳隋本傳上謂太子曰李世勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行候我死汝扵後用為僕射親任之若徘徊顧望當殺之耳通鑑張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為宰相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子孫酒食之􅓵吾不取也聞者是之通鑑夫名門右族莫不由祖考忠孝恭儉以成立之栁玭傳集應劭曰書賢而覆黶幽通}
