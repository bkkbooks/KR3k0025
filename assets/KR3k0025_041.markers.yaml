  - {type: variant, offset: 2352, length: 3, content: 高軒過, WYG: 令以我不復見馬耶欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬通鑑仲尼去魯曰遲遲而行孟子去齊三宿而後出境言忠臣之於主慕戀不已荀悦忠臣逺不忘君後漢注心皇極結情紫闥神明知之通鑑髙堂隆疾篤口占上疏曰臣寝疾有増無損常恐奄忽忠欵不昭天下乃天下之天下非獨陛下之天下也通鑑累繭救宋重胝存楚南史陽固曰昔龔遂去國猶獻直言韋孟離朝不忘本國後魏書為歌詩情不忘君人憐其忠杜甫房𤣥齡寝疾抗表諌征髙麗}
