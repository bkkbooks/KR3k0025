  - {type: variant, offset: 155, length: 0, content: '', WYG: 行鶺鴒接翼李義山文鄭晦族清胄貴杜牧之集地甲門闌大元㣲之世禄金張貴孟浩然鍾石享於祖考帶礪傳於子孫一門四節輝耀當時徳門之裔門為上族唐文粹簮笏自懐綳祖孫相望韓文庭列鍾彛笥傳組綬司空表聖文杜氏大家世有顯人韓文墓誌欒郤門風大羅隠集子父諸孫盈于室堂公姑悦喜五福具有大夫士家孰不榮羨韓祭文本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳天下以陳氏世家為榮神道碑漢諸袁之父子四世繼出五公唐諸温之弟子同時並列三省東坡集家聲奕奕盖并凉東坡}
