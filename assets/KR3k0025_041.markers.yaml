  - {type: variant, offset: 153, length: 1, content: 暮, WYG: 嘉最好學盧植以儒學用而諶為祭酒舊史咸以為榮漢司徒禹之世也栁文奕奕四世崔為之冠劉賓客言冠冕者許為世雄言門閥者許為時表家聲烜赫冠前賢劉賓客世家表甲第白樂天清望標門榮冠山東之族同上杜氏大族枝蔓蟬聮朝廷典章飽於聞見名卿賢相之家清風素範之族子孫森羅髦俊並作杜牧之晉室簮纓宋朝人物謝萬已稱富貴孟視尋處威權而安石東山尚為匹士彦重白屋猶是布衣未有鴻鴈}
