  - {type: variant, offset: 3067, length: 2, content: 徐孺, WYG: 集欲闔口無言兮嘗被君之厚徳念三十年之積思兮願一見而陳辭楚辭馳心輦轂應劭詩若葵藿之傾葉太陽雖不為之迴光然終向之者誠也曹}
  - {type: variant, offset: 3067, length: 2, content: 徐孺, krp: 集欲闔口無言兮嘗被君之厚徳念三十年之積思兮願一見而陳辭楚辭馳心輦轂應劭詩若葵藿之傾葉太陽雖不為之迴光然終向之者誠也曹}
  - {type: variant, offset: 3070, length: 3, content: 年九歲, WYG: 建投軀報明主身死為國殤選樂府北門行潢汚易竭抑有朝宗之願犬馬無識猶知戀主之誠子牟馳心扵魏闕汲黯積思扵漢庭微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深栁文揮涕戀行在道途猶恍惚中原消息斷黄屋今安否生逢堯舜君不忍便永訣當今廊廟具搆厦豈云缺葵藿傾太陽物性固莫奪杜工部炙背可以獻天子杜詩獨隨朝宗水赴海輸微涓李太白集萬里納忠一心稟命白樂天報國心皎潔念時涕汎瀾韓詩仰長安而就日赴帝鄉以望雲駱賓王集㣲臣欲獻唐虞夀筵指南山對衮龍王維集平生五色線願補舜衣裳簮組赤墀戀禽魚滄海心杜詩臣心堯日下錢起詩本朝鄭俠雖流落頓挫之餘一話一言未嘗不在君父鄭介夫録雖伏櫪之馬悲鳴猶戀於君軒而曳尾之龜涵養未離於靈沼歐公表蹌蹌退舞敢忘虞帝之笙鏞翼翼歸飛亦在文王之靈沼元絳表古今詩人衆多而杜子美為首豈非以其流落饑寒終身不用而一飯未嘗忘君也歟進如孟子之敬王退若蕭生之憂國蘇文只因未報君恩重清夢時時到玉堂坡詩平生本朝心嵗}
