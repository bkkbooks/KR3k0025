  - {type: variant, offset: 2335, length: 3, content: 未信過, WYG: 去聲俾家聲不頺劉賓客集公胚胎光前生長食息不離典訓之内目濡耳染不學以能太師之平汴州年老益髙挈持維綱耡削荒類納之太和而已其囊篋細碎無所遺漏繄公之功見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子姢姢静秀瑶環瑜珥蘭茁其芽稱}
