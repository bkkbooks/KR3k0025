  - {type: variant, offset: 419, length: 231, content: 楚使子玉治兵國老皆賀子文蒍賈尚幼後至不賀子文問之對曰子玉之敗子之舉也舉以敗國將何賀焉過三百乘不能入矣苟入而賀何後之有左僖二十七年秦師過周北門王孫滿尚幼觀之言秦師輕而無禮必敗左僖三十二年項羽攻外黃下欲阬之外黃令舍人兒年十三往說羽曰彭越彊劫外黃故且降待大王至又皆阬之百姓豈有歸心後此梁地十餘城皆恐莫肯下矣史記項羽紀秦始皇使張唐往相燕不肯行甘羅曰項橐生七歲為孔子師今臣生十二歲於茲矣君其試臣始皇使甘羅於趙史記甘茂傳賈誼年二十餘最少每詔令議下諸老先生未能言誼盡為之對西漢, WYG: 李廣世世受射}
