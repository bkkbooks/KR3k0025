  - {type: variant, offset: 3148, length: 5, content: 戰戰慄慄汗, WYG: 臣愚無所知識惟願陛下慎無赦而已漢鑑房𤣥齡留守京師疾篤語諸子曰今天下無事惟東征未已乃上表諫上謂公卿曰彼病篤如此尚能憂我國家温彦博薨上謂侍臣曰彦博以憂國之故精神耗竭上将發兵討新羅侍中張文瓘卧疾在家自輿入見諫上乃止晉州男子郇模以麻編髮持竹筐葦席哭於東市人問其故對曰願獻三十字一字為一事若言無所取請以席裹尸貯筐中棄扵野其言團者請罷諸州團練使也監者請罷諸道監軍使也唐鑑傳記家國愔愔如日将暮潘佑表集生逢堯舜君不忍便永訣當今廊廟具搆厦豈云缺葵藿傾太陽物性固莫奪賢有不黔突聖有不煖席安得壮士挽天河浄洗甲兵長不用幾時髙議排金門各使蒼生有環堵安得大厦千萬間盡庇天下寒士皆歡顔杜詩自古聖人賢士皆非有心求於聞用也憫其時之不平人之不義得其道}
