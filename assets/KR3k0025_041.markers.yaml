  - {type: variant, offset: 770, length: 641, content: 歲在傍曰何不言日蝕之餘如月之初瓊大驚即以其言應詔東漢黃瓊傳京師號曰天下無雙江夏黃童後漢黃香傳孔融幼有異才十歲隨父詣京師時河南尹李膺不妄接士融造門曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與李老君同德比義而相師友則融與君累世通家眾坐歎息陳煒後至坐中以告煒曰小而聰了大未必奇融曰觀君所言將不早慧乎東漢本傳孔融第六四歲時嘗與諸兄共食棗輒引小者人問其故荅曰我小兒法當取小者由是宗族奇之後漢張霸年七歲通春秋欲進餘經父母曰汝小未能者霸曰我饒為之東漢本傳賈逵自為兒戲弄常設部伍魏書虞翻少有高氣年十二客有候其兄者不過翻翻追與書曰僕聞琥珀不取腐芥磁石不授曲針過而不存不亦宜乎吳書本傳注常林七歲有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有魏志諸葛瞻八歲聰慧可愛蜀志本傳荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志互入諸父張憑祖鎮憑年數歲鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎晉書互見祖孫兩門鄧艾年十一每見高山大澤輒指畫軍營處後為大將晉書王允之總角從伯敦常以自隨出則同輿入則共寢敦常夜飲允之辭醉先臥敦與錢鳳謀為逆允之已醒悉聞其言慮敦或疑已便於臥處大吐衣面並汙鳳既出敦果照視見允之臥吐中以為大醉不復疑之晉書本傳劉湛自弱年即有宰物之情常自比管葛通監晉恭紀慕容盛年十三謂慕容柔曰夫十人之長亦須才過九人然後得安通監晉武紀謝安摠角沈敏風宇條暢晉書王暕年數歲風神聳拔有成人之度晉王儉傳謝朏十歲, WYG: 嵗}
