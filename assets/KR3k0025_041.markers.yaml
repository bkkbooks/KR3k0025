  - {type: variant, offset: 4009, length: 0, content: '', WYG: 極甘脆年七十父母猶存萊子服斑斕之衣為嬰兒戲於親前髙士傳集凡侍父母得如曽參可以無譏也韓文忘身展孝白樂天眷戀庭幃心不遑安馨爾夕膳潔爾晨飱文選白華増勤綵衣是慕朝盥夕膳候色承顔䕫䕫齋慄烝烝不匱有若楚老萊子之為嬰兒也陳子昻承歡膝下馭潘輿於家園駱賓王慢親經子弗祗服厥父事侮厥父母書子好貨財私妻子不顧父母之養孟子妻子具而愛衰於親荀子史借父耰鋤慮有徳色母取箕箒立而誶語西漢本朝譬如人子得過於父母惟有恭順静思引咎自責庶幾可解今乃詰責奴婢恣行箠楚以此事親未有見赦於父母者東坡集教子經教誨爾子式穀似之詩子君子之於子愛之而勿面使之而勿貌導之以道而勿彊荀人有教其子曰爾行矣慎無為善曰不為善将為不善耶應之曰善且猶弗為况不善乎此全其大器者也淮南子史狐突曰子之能仕父教之忠古之制也䇿名委質貳乃辟也父教子貳何以事君石碏曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也左漢孝武曰生子當置之齊魯禮義之邦史記樊宏戒子曰富貴盈溢未有能終者吾非不喜榮勢也保身全已豈不樂哉後漢鄭𤣥以書戒子益恩曰入此嵗來已七十矣宿素衰落仍有失誤按之禮典便合傳家今我告爾以老歸爾以事将閑居以安性覃思以精業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之家今差多於昔勤力務時無恤饑寒菲飲食薄衣服節夫二者尚可令吾寡悔悔一作恨若忽忘不識亦已焉哉東漢傳范滂謂其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡通鑑傳記王昶名其兄子曰黙曰沈名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越夫物速成則疾亡晩就則善終朝華之草夕而零落松栢之茂隆冬不衰夫能屈以為伸讓以為得弱以為强鮮不遂矣通鑑魏明魏文帝誡子曰父母於子雖肝腸腐爛為其掩蔽不欲鄉黨士友聞其罪過然行之不改人自知之見太平御覽馬援戒兄子曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非政法此吾所大惡也寧死不願聞子孫有此行也龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也馬援傳鄧禹内行淳備有子十三人各使守一藝脩整閨門教養子孫皆可以為後世法漢鑑竇融曰臣有子朝夕教導以經藝不令觀天文見䜟記誠欲令恭肅畏事恂恂守道不願其有才能漢鑑王昶戒子曰未有千名要利不厭而能保世持家永全福禄者也魏本傳王昶明帝時為揚威将軍嘗為書誡其子及其兄子曰吾與時人從事雖出處不同然各有取潁川郭伯益好尚通達敏而有知其為人洪曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以是親之昵之不願兒子為之北海徐偉長不沽髙名不求茍得澹然自守惟道是務其有所是非則託古人以見意當時無所褒貶吾欽之重之願兒子師之東平劉公幹博學才髙識逺有大志然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道内敏外恕推遜恭謙處不避洿而義勇在朝忘身為國吾友之善之願兒子遵之魏三國志劉殷有七子五子各授一經一子授太史公一子授漢書一門之内七葉俱興北州之學殷門為盛晉書顔延之嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎通鑑蔡王智積帝之弟子也有五男止教讀論語孝經不令交通賓客或問其故智積曰卿非知我者其意恐諸子有才能致禍也隋鑑朱仁軌嘗誨子弟終身遜路不枉百步終身遜畔不失一段唐書上謂侍臣曰朕自立太子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乗馬則曰汝知其勞逸不竭力則常得乗之矣見其乗舟則曰水所以載舟亦所以覆舟民猶舟也見其息於木下則曰木從繩則正后從諫則聖唐鑑傅奕臨終戒其子曰無得學佛書時年八十五唐鑑栁玭嘗戒其子曰凡門第髙可畏不可恃也立身行已一事有失則得罪重於他人死無以見先人於地下門髙則驕心易生族盛則為人所嫉懿行實才人未信之少有疵累衆皆指之唐書本傳房𤣥齡嘗恐諸子驕侈席勢凌人乃集古今家誡為屏風曰留意於此足以保躬矣唐書房𤣥齡傳栁氏自公綽以來世以孝弟禮法為士大夫所宗玭嘗戒子弟曰凡門地髙可畏不可恃也唐鑑髙洋太妃曰汝父如龍兄如虎通鑑李存審出於寒㣲常戒諸子曰爾父少提一劒去鄉里四十年間位極将相其間出萬死獲一生者非一破骨出鏃凡百餘因}
