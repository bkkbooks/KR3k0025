  - {type: variant, offset: 1688, length: 5, content: 從日邊來元, WYG: 不在舊族揚雄之才非出孔氏芝草無根醴泉無源虞翻書靈珠産無種彩雲出無根亦如彼姝子生此遐陋村白詩克紹經子克家裕父之蠱幹父之蠱易篤前人成烈公劉克篤前烈無忝祖考汝克紹乃顯祖書召公是似維其有之是以似之纘戎祖考詩國人穪願然曰幸哉有子如此所謂孝也已良冶之子必學為裘良弓之子必學為箕禮子譬之若山木枝葉必類本荀史洪宣祖業無廢先君之功世濟其美不隕其名謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也左趙括能讀其父書傳史記田叔為魯相卒魯人以百金祠少子仁不受曰無以百金傷父名史記田叔傳董仲舒子及孫皆以學至大官儒林傳靈}
