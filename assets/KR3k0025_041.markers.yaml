  - {type: variant, offset: 3077, length: 1, content: 或, WYG: 蒿目而憂世之患荘子周行天下上説下教雖天下不取强聒而不舎荘子楊子見路逵而哭為其可以南可以北墨子見練絲而泣為其可以黄可以黒神農憔悴堯痩臞舜黴黒禹胼胝由此觀之則聖人之憂勞亦甚矣淮南子目若營四海文中子史楚子囊死遺言謂子庚必城郢君子謂子囊忠将死不忘衛社稷嫠不恤其緯而憂宗周之隕左憂國如饑渴鮑宣傳孔席不煖墨突不黔西漢陳蕃}
