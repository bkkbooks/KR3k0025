  - {type: 'tls:seg', offset: 2340, content: '', id: KR3k0025_CHANT_041-5a.375}
  - {type: variant, offset: 2340, length: 0, content: '', WYG: 兒也韓文懿哉能世其家劉賓客襲弓裘而稟詩禮以水木之有本源服名教乃保家之子白樂天生扵清談克肖素風清風素範克肖家聲杜牧之紹復丕績不墜厥祀柳漢銘楊公莫訝清無業家有驪珠不復貧元微之身雖不貴有後斯榮唯公之嗣實大家聲李習之韋𤣥方繼相荀爽復齊名張九齡趙孟慕成季之勲復能霸晉亞夫紹絳侯之武亦克擒吳唐淮西碑本朝克家傳衆子欒城集承家從昔如君少陳後山諸郎有父風山谷能蓋前愆經蔡仲克庸祗徳周公以為卿士叔卒乃命諸王邦之蔡王若曰惟爾率徳改行克謹厥猷爾尚蓋前人之愆惟忠惟孝書史沈勁充之子也勁以其父死扵逆亂志欲立功以雪舊恥燕人逼洛陽陳祐留勁以五百人守洛陽勁喜曰吾欲致命今得之矣恥父之惡致死以滌之變㐫逆之族為忠義之門通鑑盧元輔杞之子簡潔貞方人不以父之醜行為累人人歸美舊唐書不克紹經女雖湛樂從弗念厥紹于嗟乎不承權輿詩子孫弗率不徳罔大墜厥宗忝厥祖子弗祗服厥父事大傷厥考心厥父母勤勞稼穡厥子乃不知稼穡之艱難書遏佚前人光絶失也若考作室既底法厥子乃弗肯堂矧肯搆厥父菑厥子乃弗肯播矧肯穫荒墜厥緒覆宗絶祀書史其父析薪其子弗克負荷左行莫醜扵辱先李陵生降隤音頽其家聲並史記時漢成帝無嗣政由王氏劉向遂上封事極諌王氏與劉氏不並立如下有泰山之安則上有累卵之危向卒子歆王莽舉為侍中莽持政留歆為右曹建平元年改名秀及莽簒位歆為國師西漢本傳為人後嗣守人功業如此豈不負哉通鑑祖約逖之弟也逖卒代逖為西平将軍豫州刺史王敦舉兵約歸衞京師自以名輩不後郄卞久望開府及所表請多不見許遂懐怨望及蘇峻舉兵遂推崇約約聞大喜峻剋京都以約為侍中後奔石勒而死晉書本傳房杜平生勤苦僅能立門户遭不肖子蕩覆無餘通鑑李勣疾謂弟弼曰我見房𤣥齡杜如晦髙季輔皆辛苦立門户亦望貽後悉為不肖子敗之新唐書狄仁傑為魏州刺史有惠政百姓為之立生祠後其子景暉為魏州司功曹參軍貪暴人患之遂毁其像焉唐鑑房𤣥齡之子遺愛尚唐太宗女遺愛驕恣謀黜其兄遺直奪其封爵永徽中誣告遺直無禮扵已髙宗令長孫無忌鞫其事因得公主與遺愛謀反之状遺愛伏誅杜如晦子構襲爵慈州刺史坐弟荷謀逆徙於嶺表唐書傳記韓昶退之子也性闇劣為集賢校理史傳有金根車昶以誤悉改根為銀字尚書故實不肖子弟有三變第一變為蝗蟲謂鬻庄而食第二變為蠧魚謂鬻書而食第三變為大蟲謂賣奴婢而食三食之輩何代無之北夢瑣言集門緒不昌任彦昇書咨汝之胄出門户何巍巍不修其操行賤薄似汝稀何不忝厥祖靦然不知歸韓文陵替經遭家不造詩史欒郤胥原狐續慶伯降在皂𨽻叔向曰肸之宗十一族惟羊舌氏在而已左魏徴𤣥孫稠貧甚以故第貸錢扵人帝停叔玉婚而仆所為碑顧其家衰矣唐魏徴傳集門衰祚薄陳情表承先人之後者在孫惟汝在子惟吾韓氏兩世惟此而已韓文自揚家醜經其父攘羊而子證之語史欒盈曰陪臣書能輸力扵王室其子黶不能保任其父之勞宋華耦曰君之先臣督得罪扵宋殤公名在諸侯之䇿左貽後經貽厥孫謀以燕翼子詩垂裕後昆書克昌厥後詩邁迹自身克勤無怠以垂憲乃後身其康强子孫其逢吉書子不為子孫留財列子史故襲天禄子孫賴之左晏子将死鑿楹納書謂妻曰楹記日也子壮而示之晏子春秋叔向曰昔欒武子無一卒之田其官不備其宗器宣其徳行順其憲則以免扵難及桓子驕泰奢侈貪欲無藝宜及於難而賴武之徳以沒其身晉國語平當為相上欲封當病篤不應召或謂當不為子孫耶當曰吾居大位已負素餐起受侯印還卧而死死有餘罪今不起者所以為子孫也前漢疏廣乞骸骨上賜黄金二十斤或勸廣以其金頗為子孫立産業者廣曰吾豈老誖不念子孫哉頋自有舊田廬令子孫勤力其中足以供衣食與凡人齊今復増置之以為贏餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨西漢韋𤣥成繼父賢為相鄒魯謳曰遺子黄金滿籯不如教子一經西漢文帝戒太子曰即有緩急周亞夫真可任将兵及七國反書聞上乃拜中尉周亞夫為太尉将軍往擊吳楚薛廣徳歸縣其安車以傳示子孫為榮漢鑑龎公釋耕扵壟上妻子耘扵前劉表問先生苦扵􅅵畆而不肯官禄後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也後漢楊震性廉子孫常蔬食步行或欲令開産業震曰}
