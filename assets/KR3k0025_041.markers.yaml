  - {type: variant, offset: 3163, length: 0, content: '', krp: 聖一賢者豈不知自安佚之為樂哉誠畏天命而悲}
  - {type: variant, offset: 3164, length: 278, content: 總角詣鍾世季客問鍾曰二童是誰鍾曰裴楷清通王戎簡要並同上楊氏子九歲甚聰惠孔君平詣其父父不在乃呼兒出為設果果有楊梅孔以示兒曰此是君家果兒應聲荅曰未聞孔雀是夫子家禽世說上集終童山東之英妙賈生洛陽之才子文選西征賦弱冠流芳雋聲清劭音韶文選楊武仲往昔十四五出遊翰墨場斯文崔魏徒以我似班楊七齡思即壯開口詠鳳凰九齡書大字有作成一囊杜詩早年見標格秀氣衝星斗驥之子鳳之雛陸機二十作文賦汝更小年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青冥只今年才十六七射策君門期第一並同上生而歧嶷實單實華越在襁褓神明滋盛童蒙訓敏光潤玉顏與諸兒戲神清涵泳卓然如鴻雛鵠子有青雲之意, WYG: 窮}
