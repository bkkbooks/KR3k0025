  - {type: variant, offset: 2343, length: 3, content: 援筆輒, WYG: 王其愛玉體俱享黄髮期曹子建吾學養生之術外榮華去滋味不愛其身而嗇其神文選減書存眼力省事養心田劉賓客頤性保命屑瓊飲露唐文粹新浴肢體暢獨寝神魂安白樂天漱吮甘液㳺泳和氣葆和嗇神凝和葆神唐文粹本朝汛掃身心澡瀹神氣東坡集山芎麥麯都不用泥行露宿終無疾欒城養氣如養兒東坡詩不善攝養經闕子孔子曰人有三死而非其命也已自取也夫寝處不時飲食不節逸勞過度者疾共殺之家語形勞而不休則弊精用而不已則勞勞則竭不可以無涯之智役有涯之身荘子耳目淫於聲色之樂則五臟動摇而不定矣五臟動摇而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣精神馳騁於外而不守則禍福之至雖如丘山無由識之矣淮南子神躁則心蕩心蕩則形傷劉子目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼔口貪滋味命曰腐腸之藥鼻悦芳馨命曰燻喉之煙身安輿駟命曰召蹶之機劉子史神太用則竭形太勞則弊形神騷動欲與天地長久非所聞也太史公盛食珍味以壊其口音樂婦人以壊其耳髙堂䆳宇倉庫奴婢以壊其腹娯樂親酌以壊其心前漢賈誼五餌書以耎脆之玉體犯勤勞之煩毒非所以全夀命之宗也通鑑多記損心多語耗氣心氣内損形神外耗初雖無覺久且為弊唐書世嘗謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也神躁於中而形喪於外嵇叔夜五情今已傷安得自能老世人不察惟五穀是見聲色是躭目感𤣥黄耳務淫哇滋味煎其腑臟醴醪鬻其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而内外受敵身非木石其能久乎孟東野藥以愈疾非朝夕常餌之物况金石酷烈有毒又益以火氣殆非人臟所能勝也通鑑積微成損積損成衰養生論傳記肥肉厚酒務以自强命曰爛腸之食吕氏春秋膚氣内消有似尾閭之波神志外傷同乎牛山之木文心雕龍集出輿入輦命曰蹷痿之機洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥文選合冰炭以交戰祗自苦乎厥身白侍郎本朝煎烹心脾擢胃腎自令鬢髮驚秋霜欒城集愛君經申伯忠臣不欲離王室詩雖爾身在外乃心罔不在王室昔先正保衡曰予弗俾厥后惟堯舜其心愧恥若撻於市武王有疾弗豫周公為三壇同墠册祝曰以旦代某之身書子曰事君欲諫不欲陳詩云心乎愛矣遐不謂矣中心藏之何日忘之善則稱君過則稱已晉世子申生使人辭於狐突曰吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死禮記子我非堯舜之道不敢以陳扵王前予三宿而出晝於予心猶以為速王庶幾改之王如改諸則必反予夫出晝而王不予追也予然後浩然有歸志予雖然豈舎王哉不得於君則熱中孟子宋國有田夫常衣緼黂僅以過冬暨春東作自曝扵日不知天下之有廣厦隩室綿纊狐狢顧謂其妻曰負日之暄人莫知者以獻吾君列子身在江湖之上心居魏闕之下荘子史荀林父進思盡忠退思補過社稷之衛也季文子見有禮扵其君者事之如孝子之養父母見無禮扵其君者誅之如鷹鸇之逐鳥雀也左屈原雖放流睠顧楚國繫心懐王不忘不勝犬馬之心汲黯曰臣常有狗馬病不能任郡事願為中郎出入禁闥補過拾遺史記忠臣不先身而後君魯仲連傳望之雅意本朝西漢本傳願賜數刻之間極竭毣毣之思退入三泉死亡所恨鮑宣傳史魚既沒餘忠未訖委柩後寝以屍達誠汲黯身外思内發憤舒憂谷永傳忠臣雖在畎畆猶不忘君劉向傳昔周公雖老猶在京師明不離成周示不忘王室也仲山甫異姓之臣無親扵宣}
