  - {type: variant, offset: 2391, length: 222, content: 動舊唐書嚴武幼豪爽母裴不為挺之所荅獨厚其妾英武始八歲怪問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也唐書嚴挺之傳嚴武神氣雋爽敏於聞見幼有成人之風舊唐書斬裴炎炎弟子太僕寺丞伷先年七歲上封事請見言事太后召見詰之曰汝伯父謀反尚何言伷先對曰陛下為李氏婦先帝棄天下遽攬朝政變易嗣子踈斥李氏封崇諸武臣伯父忠於社稷反誣以罪戮及子孫陛下所為如是臣實惜之陛下早宜復子明辟高枕深居則宗族可全不然天下一變不可復救, WYG: 忝厥祖}
