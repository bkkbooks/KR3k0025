  - {type: variant, offset: 148, length: 0, content: '', WYG: 集幸賴先君之靈免負擔之勤選書忝籍世賢選彈文金張藉舊業七葉珥漢貂左太沖詩席寵門緒實公侯之子孫有山河之氣象家世以清白崇徳陳子昻蟬聮珪組世為顯著李太白門閥冠雲霄名家莫出杜陵人家聲盖六合杜詩世言氏族者署為闗内甲姓劉賓客荘憲皇太后之弟今天子之舅太師之子太尉之孫司徒之曽孫韓文公道碑路氏得姓歴二千年凡二十三世世稱徳門人不得並房故為宦族稱世有人自太尉琯以徳行為相相𤣥宗肅宗名聲益彰徹太行世號其門為太尉家宗族子弟皆法象其賢韓文昔韋孟以詩禮傳楚而郊廟之制卒正於𤣥成鄭𤣥以箋注師漢而禪代之儀卒集於小同賈誼以}
