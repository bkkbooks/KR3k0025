  - {type: variant, offset: 4286, length: 0, content: '', WYG: 子經人莫知其子之惡大學史陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀臺新成太祖悉将諸子登使各賦援筆立成太祖甚異之魏志山簡濤之子也年二十餘濤不之知也簡嘆曰吾年幾三十而不為家父所知晉書謝惠連幼有竒才不為父方明所知族兄靈運謂方明曰阿連才悟如此而尊作常兒遇之南史以太宗之明昧於知子唐書太宗賛令狐綯執政嵗久子滈頗招權受賄言事者攻其短綯為其子滈訟寃唐鑑傳記萬迴師初若愚癡}
