  - {type: variant, offset: 120, length: 0, content: '', krp: 杜氏大族尊行不翅數十人唐鑑則天以王方慶家多書籍訪求右軍遺跡方慶奏曰臣十代從伯祖羲之書先有四十餘紙貞觀十三年太宗購求先臣並已進之唯有一卷見在今又進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寳五代祖騫髙祖規曽祖裒并九代三從伯祖晉中書令獻之已下二十八人書共十卷舊唐書本傳徳宗召温造至謂之曰卿誰家子曰臣五代祖大雅外五代祖李勣本傳竇氏自武徳以來尚主者八人女為王妃者六人唐世貴盛莫與為比崔湜遷兵部侍郎父挹為吏部侍郎父子同為南省副貳自唐以來未有是事唐書世祖問天下諸杜何處望髙崔浩曰京兆為美後魏書戴胄子至徳父子繼為宰相世詫其榮韋思謙子承慶嗣立父子並為宰相世罕其比張嘉貞子延賞延賞子𢎞靖時號一門三相唐書}
