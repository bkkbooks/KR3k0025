  - {type: variant, offset: 2801, length: 261, content: 雄又擬易羝羊觸藩彌日不就子烏曰大人何不云荷戟入榛劉向張玄祖八歲齒虧先達知其不常戲之曰君口復何為開狗竇玄荅云使君輩正從此中出劉昭幼童傳互入納侮賈逵年十歲暗誦六經父曰吾未嘗教爾安得三墳五典誦之對曰姉嘗抱于籬邊聽鄰家讀書因記得而誦之耳王子年拾遺何晏大將軍進之孫進遇害魏武納晏養於宮至七八歲惠心天悟帝欲以為子每遊觀令與諸子長幼晏微覺之坐則專席止則獨立或問其故荅曰禮異姓不相貫何晏別傳劉晏以神童為秘書省正字上問晏曰正字正得幾字晏曰天下字皆正惟朋字未正玄宗大奇之明皇雜錄辛攀年七歲程曉目攀而笑曰犁牛騂犢孺子之謂攀曰戲及人親非雅訓也崔鴻, WYG: ''}
