  - {type: variant, offset: 4199, length: 0, content: '', WYG: 教他讀孝經論語免他學沈謝嘲風詠月汚人行止外史集辛勤三十年始有此屋廬此物豈無華於我自有餘韓退之詩凡人不能教其子者非欲陷其罪惡但重扵呵怒傷其顔色不忍楚撻其肌膚耳當以疾病為喻安得不用湯藥針艾救之哉顔氏家訓本朝陳堯叟為樞密堯咨為節度使父秦公尚無恙每賓客至其家堯叟及伯季侍立左右坐客不安求去公曰此兒子輩耳故天下以秦公教子為法神道碑范忠宣戒子弟曰人雖至愚責人則明雖有聰明恕己則昏但當以責人之心責己以恕己之心恕人不患不到聖賢地位也二朝言行録責子史范子暮退扵朝武子曰何暮也對曰有秦客廋辭於朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人於朝國語廋隠也謂以隠伏詭譎之言問之於朝中也石奮子孫有過失不誚讓為便坐對案不}
