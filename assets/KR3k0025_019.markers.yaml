  - {type: variant, offset: 2182, length: 13, content: 反也知困然後能自強也記學記, WYG: 動有聲尋失其所嵖岈山在遂平縣西中有洞可深入昔李觀及吳元濟戰嵖岈即此蔡岡在上蔡縣西光武井在上蔡縣東上有光武臺玉梁渠在新息縣西北隋嘗濬以溉田蔡溝在上蔡縣西南古有蔡河即此神溝在遂平縣西北有古岳廟髙皇臺在確山縣東漢髙皇所築光武臺在上蔡縣東北漢光武所築月旦里在汝陽縣東漢許劭兄弟所居故名二孝莊在汝陽縣西漢孝}
