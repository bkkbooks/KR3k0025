  - {type: variant, offset: 2173, length: 0, content: '', krp: 垂楊冉冉臨清籞細草茸茸覆路沙長閉園門人不入禁渠流出雨殘花劉敞滑州倚郭一外縣二白馬韋城胙城郡號滑臺州沿革天文營室東壁分野禹貢豫州之域春秋時屬衛戰國亦屬衛其西境屬魏秦漢置東郡晉為陳留濮陽二國宋武平河南置堯州以為邊鎮後屬後魏亦為東郡隋初置杞州後為滑州又改為堯州尋廢堯州置東郡唐為滑州本朝因之沿革表縣沿革白馬春秋衛國漕邑狄滅衛衛人立戴公廬於漕即此韋城本古豕韋國胙城古胙國周公封别子為胙伯即此沿革表形勝鮒鰅山在州境山海經云顓頊葬其陽九嬪葬其隂白馬山在白馬縣東北水經云昔有白馬羣行山上悲鳴則河決馳走則山崩狗脊山在郡西北其地出狗脊草天臺山在白馬西昔河決於此今有長堤尚存滑河在州境内即黄河故道鯀堤在州西鯀治水所築瓠子堤在州西南漢武所築大堤在白馬縣東東西堤在韋城境内新堤在胙城境内平陽城在故韋城春秋時孔悝為蒯瞶所逐載伯姬於平陽即此滑臺城即故鄭廪延邑述征記云登滑臺西北望太行山白鹿岩王莽嶺冠於衆山表也逯明壘在州東石虎將逯明所築也王鐵鎗砦在白馬縣東有歐陽修畫像記沙店在韋城西南向固城在白馬西北唐置都督府其南有坑數處每坑可匿千人世傳為伏兵之所京觀在韋城北漢翟義起兵討王莽為莽所滅築臺於此白馬津在白馬縣境漢酈生所稱守白馬之津即此靈昌津在白馬境内周十餘里人獲菰蒲之利帝嚳陵顓頊陵並在州東北上山之陽自唐以来天子嵗祀之滑伯墓在州境惠子塜在州東即梁恵王相也顔良塜在白馬縣魚池店北闗雲長刺顔良葬此堯祠在州西上有白敏中記豢龍廟古豢龍氏祀處也上有司馬光禱雨文河侯祠即漢王尊欲以身填金堤之處賈魏公廟在白馬北仁風樓在韋城境内袁宏所築遺趾尚存瀟湘亭在白馬縣境内紀勝人物三國程昱有智畧事魏拜衛尉封安鄉侯唐崔日用擢進士第佐臨淄王平韋氏之難屢賛大計官至户部尚書崔宗之性好學與李白杜甫以文相知崔日知少孤貧力學以明經進至兵部貟外郎嘗平譙王重福之變以功加銀青光禄大夫殿中少監四遷京兆尹封安平侯李元紘初為宗正卿性介直時太平公主與民争碾磑元紘㫁令還民且署其判曰南山可移判不可摇累官太子少傅皇朝王昭素有學行徴為國子博士上問治世養身之術對曰治世莫如愛民養身莫如寡慾朝廷愛其言遂書於几紀勝集謁帝承明廬逝將歸舊疆清晨發皇邑日夕過首陽伊洛廣且深欲濟川無梁汎舟越洪濤怨彼東路長顧瞻戀城闕引領情内傷曹子建荆魏多壯士宛洛富少年意氣深自許肯事郡邑權王僧逹白馬津頭春日遲沙洲歸雁拂旌旗劉禹錫將軍發白馬旌節渡黄河一掃清大漠咆虎戢金戈李太白滑臺門外見淇水眼前流高適黄河曲裏沙為岸白馬津邉栁向城同上棠梨宫裏瞻龍衮細栁營前着豹裘想到滑臺桑葉落黄河東注杏園秋崔峒青絲玉勒康侯馬孟水金堤滑伯城韓君平本朝太平興國初改武成軍節度熈寜五年廢州縣並𨽻開封府元豐四年復舊縣復来𨽻元祐元年還舊節度沿革表汀洲出沒叢花短波浪澄虛兩岸平前聖事跡君今似不愧當年畫舫名蘇子由謨明乆合分三府治劇聊須試一方王安石孟州倚郭一外縣五河陽濟源温汜水河隂王屋郡號孟津州沿革天文室壁分野禹貢冀豫二州之域商為畿内地周初為三監及弼鄘衛地春秋屬晉為河陽戰國屬魏為河雍漢為河南縣元魏始築城於此北齊置河陽闗隋仍為河陽縣屬淮州唐初改大基縣後復為河陽縣屬河南府後升孟州本朝置三城節度使沿革表縣沿革河陽春秋時晉邑以在河之陽故名濟源周為原地以濟水發源故名温周為蘇忿生之封邑漢為温縣汜水古東虢國地春秋時為鄭巖又名虎牢河隂秦置平隂縣在廣武山王屋本周召公邑後周置縣沿革表形勝紫金山在州西其地宜麥唐太宗嘗田獵於此華盖峯在濟源縣西前有陽臺宫天壇山在濟源西山上旦夕有五色影夜有仙燈即唐司馬承禎得道之所盤谷在濟源北唐李愿隐居之所濟瀆在温縣西北流入黄河淇水在五臺山東萬艘潭在河陽縣治温泉在州城北夏凉冬温畜魚池在州城内舊貢黄魚鮓出此神農澗在温縣境相傳神農采藥至此敖山在河隂西北秦時敖氏築倉於上三山在氾水界上有三峯故名鴻溝在河隂東即漢椘分界處伯牛岡在氾水縣上有冉伯牛廟氾水源出汜縣流入黄河厄井在氾水縣東南漢髙曾逃難於此瀑布泉在濟源東北堯池在州西北太師堂在孟縣治文彦愽以太師致仕居此九曲山在氾水縣西二里頂上有吕布城王屋山在濟源縣西北百里以山形如王者車盖故名紀勝人物漢石奮以孝謹稱官至二千石景帝號奮為萬石君雖齊魯諸儒皆自以為不及蔡義以明經給事大將軍幕府昭帝召見説}
