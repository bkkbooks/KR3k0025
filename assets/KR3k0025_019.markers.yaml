  - {type: variant, offset: 1371, length: 509, content: 士乃見史記伯夷傳肥義曰正臣難至而節見忠臣累至而行明同上趙世家淮陰黥布等皆已誅滅而何之勳爛焉蕭何世家天下昏濁忠臣乃見魏王豹傳狗盜雞鳴孟嘗君列此二人於賓客盡羞及有秦難卒此二人技之孟嘗君傳互入兼收並蓄已上並史記劇孟博徒母死客送喪千餘乘此亦有過人者西漢袁盎傳不遇盤根錯節何以別利器後漢虞詡傳王祥之薨奔赴者非朝廷之賢則親親故吏而已門無雜吊之賓晉書本傳互見吊門王湛曰直行平路何以別馬唯當於蟻封晉紀鄧粲傳唐李夷簡彈楊憑坐貶臨賀尉徐晦獨至藍田與別後夷簡薦晦為御史晦曰平生未嘗望公顏色公何從而取之夷簡曰君不負楊臨賀肯負國乎通監互見徇公忘私當一生一死間而後見其節唐元德秀傳疾風知勁草版蕩識誠臣唐太宗賜蕭瑀詩見本傳李世勣常侍宴上從容謂曰朕求群臣可托孤幼者無以踰公公往不負李密豈負朕哉通監唐太宗馬文舉曰不遇勍敵何以顯壯士同上集寧如霜雪後獨見竹柏心江淹詩時危見臣節世亂識忠良選鮑明遠詩扶顛始知籌策長杜詩繹騷之際鯁亮彌彰劉賓客火後見琮璜霜餘識松柏同上士窮乃見節義韓文雨晦識雞鳴之信風高見隼擊之威白樂天磨涅始彰其堅白杜牧之微風但覺杉香滿烈日方知竹氣寒呂和叔文不有百鍊火孰知寸金精孟東野互見是真難滅破松見貞心裂竹看直文唐文粹天若無雪霜青松不如草地若無, WYG: 醇}
