  - {type: variant, offset: 2205, length: 0, content: '', WYG: 子從我為伊吕乎將為巢由而父老堯舜乎敬曰吾足矣戴憑舉明經嘗在御前講經羣臣無能難之者王琳性孝友十餘嵗遭亂守父母柩不去其弟季為賊所獲欲殺琳願以身代賊矜而釋之袁安性清介嘗客洛陽後舉孝亷累遷司徒薛包性孝友事繼母甚謹與諸弟分財多推讓陳蕃性儉浄處家不脩飾嘗曰大丈夫當掃除天下安事一室黄憲舉孝亷時人比其為顔子袁閎安之𤣥孫若身脩節累徴不應延熹末黨士起閎潜居土室十八年袁忠閎之弟初為沛相以清介稱及時亂浮海投交趾許劭少重名節好品題人物人稱其為月旦評晉周訪好周窮乏家無餘財元帝加為鎮東將軍唐周墀舉進士屬詞髙古文宗雅重之累官尚書右僕射皇朝孫何篤學嗜古十五能文舉進士第一知制誥著述甚多孫僅何之弟舉進士第一兄弟連魁天下時人榮之累官集賢院學士謝良佐學}
