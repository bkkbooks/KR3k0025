  - {type: variant, offset: 1, length: 0, content: '', krp: 之沿革表縣沿革河南本成周地秦屬三川郡漢為河南郡治洛陽以地居洛水之上故名莽改宜陽東漢改雒陽隋遷郡治河南縣併移縣於城中唐神龍初改洛陽為永昌本朝初河南洛陽二縣併置熈寜中省洛陽入河南偃師本帝嚳所都之地商有三亳成湯居西亳即此後盤庚亦徙都改號曰殷周武王伐紂還息偃師後遂名潁陽本夏倫國漢置縣屬潁川鞏周鞏伯邑惠公封少子班於鞏是為東周漢時置鞏縣宻本古宻國漢時置縣新安春秋時西周地秦名新安漢置新安縣福昌周為召伯聼訟之所漢為宜陽縣地魏析置甘棠縣唐改曰福昌本朝因之伊本古伊闕地漢置陸渾縣隋改伊州尋廢唐置伊陽縣本朝改伊縣澠池本韓地後屬秦漢置澠池縣屬𢎞農西魏屬河南郡後周屬同軌郡唐初屬陜州貞觀初徙今治本朝因之永寜漢為澠池縣之西境屬𢎞農郡西魏屬宜陽郡隋改永寜縣唐移鹿橋屬洛州本朝屬河南府夀安本後魏甘棠縣隋改今名登封禹避舜之子於陽城即此漢置陽城崇髙二縣屬潁川晉屬河南郡唐初屬嵩州尋改嵩陽曰登封本朝屬河南府沿革表形勝北邙山在府城北綿亘四百餘里東漢諸陵及唐宋名臣墓皆在此伊闕山在府城西南大禹䟽龍門伊水出焉八將山在河南縣西唐尉遲敬徳與單雄信等八将戰此遂以名山箕山在登封東許由洗耳於此委粟山在洛陽城東魏明帝營為圓丘至今形制尚在首陽山在偃師縣黒雲山在鞏縣西昔成湯於此禱旱輙應嵩山在登封縣北五嶽之中岳也漢武帝祠中岳聞神呼萬嵗者三即此天壇山在永寜縣西四十里壇上有仙燈王母祠慕容山昔慕容垂屯兵於此桓王山在澠池縣北上有周桓王廟鬼谷在登封縣北有蘇秦授業處洛水在永寜縣界禹治水神龜負書出此回溪馮異與赤眉戰處空桑澗伊尹産於此石渠在府城有文彦愽宅温泉在府城南冬温夏凉夾馬營在府城東宋太祖所生處獨樂園在府城南白樂天宅趙普宅曹彬宅富弼宅安樂窩俱在府城内紀勝人物商伊尹耕莘野樂堯舜之道湯聘為相周申伯有惠直徳乃宣王元舅仲山甫克全懿徳周宣王中興賢臣漢賈誼少有俊才文帝時上治安策後為長沙太傅郭賀光武時尚書令有殊政顯宗賜以三公服卜式武帝時輸粟助邊賜爵闗内侯杜宻少有大志為司徒胡廣所辟遷北海相與李膺齊名三國郤正家貧好學}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 蜀漢為秘書多所匡救元文遥有王佐才仕北齊累遷尚書左僕射隋元巖好讀書以名節自許仕周為御史大夫唐長孫無忌晟之子佐太宗定天下功第一元徳秀為魯山令有清操士論髙之盧仝號玉川子嘗為月蝕詩以譏元和逆黨韓愈重之韋應物性髙㓗工詩累官蘇州刺史有集十卷元稹舉制科第一官至膳部貟外郎詩與白居易齊名五代桑惟翰舉進士嘗著日出扶桑賦以見志後拜相皇朝劉温叟性清介拜御史中丞吕蒙正太宗時舉進士第一三居相位封許國公种放七嵗能文奉母隐終南山累詔不起後拜工部侍郎贈尚書不娶無子以姪過𢎞為嗣錢若水舉進士善决疑獄累官集賢院學士范雍中進士第為治平恕累官資政殿學士富弼仁宗時舉茂才慶厯中再使契丹以成和議拜樞宻使尹洙博學深於春秋舉進士累遷起居舎人倡為古文以矯時弊程顥生而秀爽舉進士専尚徳化熈寜初為御史理刑論新法不合遂去以道學鳴世稱明道先生程頥少有高識非禮不動仁宗時上䟽欲黜世俗之論以王道為心􅈒宗時擢崇政殿説書與兄顥倡明道學世稱伊川先生邵雍號堯夫精數學著皇極經世書邵伯温雍子以薦授大名府助教著皇極經世解司馬光神宗時累官樞宻使天下稱為真宰相紀勝集途出梁宋郊道由周鄭間前登陽城路日夕望三川顔延年步出上東門北望首陽岑下有採薇士上有嘉樹林阮籍握手出都門駕言適京師豈不懐舊廬惆悵與子辭麗日作髙歌清觴讌華池韋應物出城車騎次諸侯坐領圖書見督郵繞郭桑麻通漢口滿川風景接襄州髙城鳥過方催夜廢壘蟬鳴不待秋聞説元規偏愛月知君長得伴登樓盧允言蕙葉青青花亂開少年趨府下蓬莱甘泉未厭揚雄賦吏道何榮賈誼才錢仲文開雲種玉嫌山淺渡海傳書怪鶴遲隂洞石幢㣲有字古壇松樹半無枝盧允言春城月出人皆醉野戍花深馬去遲寄聲報爾山翁到今日河南勝昔時岑參本朝熈寜五年省洛陽入河南元祐二年復景徳四年升永安為縣慶厯二年廢偃師四年復熈寜五年省入緱氏八年復慶厯二年廢潁陽為鎮四年復熈寜五年省入登封元祐二年復崇寜四年割宻縣𨽻鄭州宣和二年還𨽻府熈寜五年省福昌入夀安元祐元年復為縣熈寜五年廢伊縣為鎮六年改𨽻伊陽景佑四年改鐵門鎮為澠池慶厯三年廢夀安為鎮四年復開寳元年移河清治白陂鎮熈寜八年閏四月置鐵監沿革表西来洛水遶崧髙野店荒村換市朝千古興亡幾春夢只將閒話付漁樵蕭真卿玉光照夜開新塚劍氣沉沙古戰塲金谷更誰誇富麗銅駝無處問興亡龎才卿潁昌府倚郭一外縣六長社郾城陽翟長葛臨舞陽郟潁郡號許昌郡沿革天文角亢分野周為許國秦屬潁川郡漢為韓國尋置許縣屬潁川郡東漢末獻帝都於此曹魏改為許昌晉徙潁川郡治此北齊於此置南鄭州後周改許州五代梁置匡國軍唐改忠武軍本朝升為潁昌府沿革縣沿革長社秦屬潁川唐改長社縣郾城本古郾子國漢置郾城縣陽翟鄭柳邑漢改陽翟長葛本春秋鄭邑宋人伐鄭取長葛即此臨潁漢舊縣以在潁水之上故名舞陽漢舊縣以在舞水之上故名郟縣本春秋時鄭地漢置郟縣並沿革表形勝禹山在潁縣南下有禹廟石梁河在臨潁北西湖在府西北龍華井在府城北靈池在長葛縣西亦名葛仙池世傳葛𤣥寓居於此梅花堂在府北宋蘇軾建上有軾咏梅花詩徳星亭在府西上有荀叔故宅溵亭在郾城南裴度討吳元濟時建聼水亭在府西湖上宋蘇軾卜宅其南上有蘇轍詩灌臺在郡城南漢潁隂侯灌嬰故宅尚書臺在臨潁縣東漢馬融嘗講書於上故名唐髙宗於此閲兵更名講武臺張飛祠在郡境内七先生祠在郡學祀宋時周敦頤程顥頤張載司馬光邵雍朱熹髙陽里在府城内漢荀叔所居闗公故宅在郡城内一宅兩院今有祠在焉十八盤山在武陽縣南鳳翅山在郏縣西上有靈泉舞水泉在舞陽縣東南泉湧若舞龍池在郏縣西上有龍洞鄼侯廟在舞陽縣治唐太宗廟在郏縣東北紀勝人物周潁考叔純孝以孝感莊公張子稱其錫類秦吕不韋為秦相作月令著十二紀并吕氏春秋漢賈山孝文時上書勸納諌名曰至言晁錯以文學為太常掌故遷太子家令號智嚢灌夫性孝誼嘗為父報讐後為淮陽太守韓延年襲父爵封成安侯伐匃奴以戰死王霸從光武為王郎所逼言冰堅可渡後以功封淮陽侯祭遵以軍功封潁陽侯光武稱其憂國奉公臧宫從光武征伐有功封朗陵侯姚期素重信義以功封安成侯王常以功封山桑侯郭躬少習法律累官至廷尉决獄多從輕恕陳實為太邱長以徳化人盗賊皆愧服之鍾皓以篤行稱九辟公府皆不就李曇性至孝隐居養母桓帝以安車𤣥纁徴之不起三國陳羣寔孫事漢為侍御史晉鍾雅好學有才智為御史中丞百僚憚之褚裒少有盛名人謂皮裏春秋累官鎮北將軍唐郭孝恪少有竒節以功遷上柱國王求禮為御史直言不阿時相朝廷重之皇朝焦繼勲為右金吾盗賊屏息吳虔裕為右千牛衛上將軍朝廷眷愛孫甫少好學舉進士多所建明有文集唐史行於世程戡舉進士安重習事治不近名累官端明殿學士常禹錫舉進士試身言書判第一著文集甚衆何中立進士及第累官樞宻院學士清介家無餘資孫永擢進士累官吏部尚書與人交終身無怨尤田况舉賢良方正累遷翰林侍讀學士太子少傅著好名朋黨二論曹勛以恩補承信郎從徽宗北遷多著勞効累官太尉紀勝集出磧清沙漠還家拜羽林風霜臣節苦嵗月主恩深為語西河使知余報國心崔顥梁王昔全盛賔客復多才悠悠一千年陳迹惟髙臺寂寞向秋草悲風千里来梁苑白日暮梁山秋草時君王不可見修竹令人悲九月桑葉盡寒風鳴樹枝並髙逹夫仙官欲住九龍潭毛節朱幡倚石龕山壓天中半天上洞穿江底出江南瀑布杉松常帶雨夕陽彩翠忽成嵐借問迎來雙白鶴已曽衡岳送蘇耽髙館張燈酒復清夜深殘月雁歸聲只言啼鳥堪求侣無那春風欲送行黄河曲裏沙為岸白馬津邉桞向城莫怨他鄉暫離别知君到處有逢迎並王摩詰一樽酒盡青山暮千里書回碧樹秋日落逺波驚宿雁風吹輕浪起眠鷗舞陽親友誰相念潘岳閒居欲白頭許用晦本朝元豐三年升為府崇寜四年為南輔郡𨽻京畿大觀四年罷政和四年復為輔郡𨽻京畿宣和三年復罷輔郡依舊𨽻京西北路熈寜四年省許昌縣為鎮中元間以郏𨽻汝州崇寜四年来𨽻潁州沿革表宴開芸閣儒風盛坐對蓬山逸興長孝宗臂健尚嫌弓力軟眼明猶識陣雲髙庭前昨夜秋風起羞見團花舊戰袍曹翰賈誼書成動兩漢謝安人笑起東山前途去覺雲天近舊隐回}
