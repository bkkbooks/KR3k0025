  - {type: variant, offset: 874, length: 282, content: 因詠霜雪句永懷鸞鶴姿白樂天徽績空存書旗當而播美音容不見聽鼙鼓以增思同上聞鼓鼙而憶名將鑒丹青而思老臣李文饒湘竹舊班思帝子江蘺初綠哀騷人劉長卿本朝韓魏公死士大夫歎曰天何不為我留歐陽公為魏公作誌文而後死也韓魏公別錄盧仝韓愈不在此彈壓百怪無雄文歐公集經萬夫之長可以觀政書咸有一德風雨思君子也亂世則思君子不改其度焉風雨如晦雞鳴不已詩風雨觀其器而知其工之巧觀其發而知其人之知記禮器歲寒然後知松柏之後彫也語子罕子不容然後見君子家語互見不苟合及道大不容六親不和有孝慈國家昏亂有忠臣老子遠使之而知其忠近使之而觀其敬煩使之而觀其能委之以財而觀其仁卒然問焉而觀其智急與之期而觀其信醉之以, WYG: 誇壯健小杯飲}
