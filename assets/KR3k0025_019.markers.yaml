  - {type: variant, offset: 2404, length: 791, content: 高彊曰三折肱知為良醫左定十三互見復而後知高宗遭鳴雉之戒飭己正道享百年之壽西漢杜欽傳木不生庭太戊無以隆雉不鳴鼎武丁不為宗晉書郭璞傳集九折臂而成醫楚辭三折乃良醫劉賓客經蔽芾甘棠勿翦勿伐召伯所茇詩甘棠子無仲尼則西山之餓夫與東國之絀臣惡乎聞楊子連城之璧瘞影荊山夜光之珠潛輝鬱浦玉無翼而飛珠無脛而行揚聲於章華之臺炫燿於綺羅之堂者蓋人為之舉也劉子柳下惠不遇仲尼則貞潔之行不顯未免於三黜之臣季布不遇曹丘則百金之諾不揚未離於凡虜之人同上史伯夷叔齊雖賢得夫子而名益彰門巷之人欲砥行立名者非附青雲之士烏能施於後世哉史記伯夷傳毛先生遂一至楚使趙重於九鼎大呂同上平原傳庾乘游學宮為諸生傭後能講誦自以卑第每處下坐諸生博士皆就讎問之由是學中以下坐為貴後漢本傳河南尹羊陟謁造趙壹言談至曛夕極歡陟乃與司徒袁逢共稱薦之名動京師士大夫想望其風采同上趙壹傳阮籍見張華鷦鷯賦曰王佐才也由是聲名始著晉書左思作三都賦成人未之重思以示張華深稱讚之兼作序豪貴競寫都下為之紙貴晉書許詢移居皋屯之嵓常與沙門支遁及謝安石王羲之等同遊往來今皋屯呼為許度嵓謝安有盛名時人愛慕有罷縣還安問其歸資答曰有蒲葵扇五萬安乃取其中者捉之士庶競市價增數倍晉書楊雄作太玄晚遭陸續玄道遂明王長文傳王導為司徒時帑藏空竭庫中惟有綀數千端鬻之不售乃與朝賢俱制綀布單衣於是士人翕然服之綀遂踊貴主者出賣端直一金其為時所慕如此王羲之見一姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百金價姥如言人競買之已上並晉書傳記人有市駿馬者三旦立市人莫之知伯樂一顧之一旦而馬價十倍戰國策郭林宗游洛陽始見河南尹李膺膺大奇之遂相友善於是名震京師郭林宗別傳慈廉江者昔有李祖仁居此兄弟十人並慈孝廉讓因此名江交州記梁顧摠始為縣吏一夕遇二人稱是王粲徐幹云昔與公同府公劉楨也乃誦其遺文摠悟以遺文數篇投令令待之甚厚時謂死劉楨猶庇得生顧摠太平廣記士非玉璧談者為價物理論互見求援, WYG: 皇甫茂政松膠黏琥珀筠粉撲琅玕}
