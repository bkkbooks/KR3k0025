  - {type: variant, offset: 7, length: 5, content: 聽鍾聲則思, WYG: 之道四焉子太叔繼子産為政民甚徳之列禦㓂學本黄帝老子著書十餘萬言漢任安守正不阿權貴服虔有俊才著書甚多累官九江太守晉潘岳少頴敏號為竒童子累官中書令南北朝鄭鮮之性剛直仕為御史權倖憚之累官尚書僕射鄭義為堯州太守表薦士類時論多之鄭紹緒仕梁為安豐令有能名累遷衛將軍隋劉祐開皇初為大都督善占候所著兵書甚多唐鄭善果仕唐為檢校大理卿奉法持正朝野知名婁師徳舉進士與人無競嘗云唾面自乾累官將相李日知進士及第為司刑丞獨尚寛平累官刑部尚書鄭虔為廣文館博士居官貧約且善書畵𤣥宗稱其為三絶鄭潜曜性至孝母代國長公主寢疾潜曜刺血為書禱神願以身代後尚臨晉公主官至光禄卿鄭珣瑜少孤躬耕養母為宋城尉嚴重人不敢干以私累官同平章事鄭絪㓜有竒志擢進士累官太子太保守道寡欲世以耆徳稱之鄭餘慶絪從子舉進士性亷介歴事四朝其禄皆賑親濟急累官同平章事鄭肅學有根本舉進士挺挺有大臣節累官平章事鄭棨善詩文舉進士累官中書門下平章事皇朝梁周翰十嵗能屬文累官大名尹天雄軍節度使李及舉進士性清介喜薦下吏官至御史中丞盛陶舉進士彈劾不避權倖史稱其有大節孫固舉進士石介以公輔期之累官門下侍郎張逸舉進士歴知數縣囚無寃抑民多便之紀勝集花明桞暗繞天愁上進重城更上樓欲問歸鴻何處去不知身世自悠悠李義山朝與周人辭暮投鄭人宿他鄉絶儔侣孤客親僮僕宛洛望不見秋霜晦平陸田父草際歸村童雨中牧蟲絲機杼鳴雀喧禾黍熟王摩詰九陌逢君又别離行雲别鶴本無期望嵩樓上留相見看過花開花落時劉禹錫蕙葉青青花亂開少年趨府下蓬莱甘泉未厭揚雄賦吏道何榮賈誼才錢仲文蒼苔滿字土埋碑風雨銷魂色欲頽曽向圖經中舊見誰人知是蔡邕碑王建畫船載酒及芳辰宰相園林潩水濵鳬旂虎符剖不得却將清影付賢人我扶黄雲去京闕掛席欲進波連山天長水濶厭逺渉訪古始及平臺間並賈昌朝本朝熈寜五年廢州以管城新鄭𨽻開封府省滎陽滎澤縣為鎮入管城原}
