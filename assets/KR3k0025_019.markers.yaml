  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷十九宋潘自牧撰郡縣部京西北路河南府倚郭二一河南師洛陽陽外縣十偃潁鞏宻新安登福昌安封伊縣澠池永寕夀郡號三川郡沿革天文栁分野禹貢豫州之域武王克商定鼎於郏鄏成王營洛為王城下都至平王自鎬京東遷乃居王城秦置三川縣漢置河南郡東漢都於此置河南尹兼置司𨽻三國魏置司州晉亦都此置河南尹司州如故苻秦改為豫州劉宋仍置司州後魏改為洛州孝文自代徙都之又改司州亦為河南尹東魏改司州為洛州改河南尹為河南郡西魏又改為司州北齊為洛州周為東京隋初罷郡為洛州煬帝徙都於此改豫州尋改河南郡唐初復為洛州置都督府開元初開河南府髙宗以此為樂都光宅初改神都神龍初復為樂都天寳初又改東京五代梁為西都唐改東都晉改西京本朝}
  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 之沿革表縣沿革河南本成周地秦屬三川郡漢為河南郡治洛陽以地居洛水之上故名莽改宜陽東漢改雒陽隋遷郡治河南縣併移縣於城中唐神龍初改洛陽為永昌本朝初河南洛陽二縣併置熈寜中省洛陽入河南偃師本帝嚳所都之地商有三亳成湯居西亳即此後盤庚亦徙都改號曰殷周武王伐紂還息偃師後遂名潁陽本夏倫國漢置縣屬潁川鞏周鞏伯邑惠公封少子班於鞏是為東周漢時置鞏縣宻本古宻國漢時置縣新安春秋時西周地秦名新安漢置新安縣福昌周為召伯聼訟之所漢為宜陽縣地魏析置甘棠縣唐改曰福昌本朝因之伊本古伊闕地漢置陸渾縣隋改伊州尋廢唐置伊陽縣本朝改伊縣澠池本韓地後屬秦漢置澠池縣屬𢎞農西魏屬河南郡後周屬同軌郡唐初屬陜州貞觀初徙今治本朝因之永寜漢為澠池縣之西境屬𢎞農郡西魏屬宜陽郡隋改永寜縣唐移鹿橋屬洛州本朝屬河南府夀安本後魏甘棠縣隋改今名登封禹避舜之子於陽城即此漢置陽城崇髙二縣屬潁川晉屬河南郡唐初屬嵩州尋改嵩陽曰登封本朝屬河南府沿革表形勝北邙山在府城北綿亘四百餘里東漢諸陵及唐宋名臣墓皆在此伊闕山在府城西南大禹䟽龍門伊水出焉八將山在河南縣西唐尉遲敬徳與單雄信等八将戰此遂以名山箕山在登封東許由洗耳於此委粟山在洛陽城東魏明帝營為圓丘至今形制尚在首陽山在偃師縣黒雲山在鞏縣西昔成湯於此禱旱輙應嵩山在登封縣北五嶽之中岳也漢武帝祠中岳聞神呼萬嵗者三即此天壇山在永寜縣西四十里壇上有仙燈王母祠慕容山昔慕容垂屯兵於此桓王山在澠池縣北上有周桓王廟鬼谷在登封縣北有蘇秦授業處洛水在永寜縣界禹治水神龜負書出此回溪馮異與赤眉戰處空桑澗伊尹産於此石渠在府城有文彦愽宅温泉在府城南冬温夏凉夾馬營在府城東宋太祖所生處獨樂園在府城南白樂天宅趙普宅曹彬宅富弼宅安樂窩俱在府城内紀勝人物商伊尹耕莘野樂堯舜之道湯聘為相周申伯有惠直徳乃宣王元舅仲山甫克全懿徳周宣王中興賢臣漢賈誼少有俊才文帝時上治安策後為長沙太傅郭賀光武時尚書令有殊政顯宗賜以三公服卜式武帝時輸粟助邊賜爵闗内侯杜宻少有大志為司徒胡廣所辟遷北海相與李膺齊名三國郤正家貧好學}
