  - {type: variant, offset: 2175, length: 0, content: '', WYG: 百家多所研究州郡辟命皆不就教授門徒七百餘人號儒林先生趙黙魏獻文時為選部尚書當官謹飭進爵河内公累功進爵為王謐康子司馬子如東魏丞相髙歡入洛以為大行臺尚書司馬筠㓜通經史明三禮為暨陽令有清標入為尚書丞唐王智興少驍鋭累有戰功歴遷侍御史後又平賊加尚書左僕射裴休藴藉能文章書有體法舉賢良為監察御史操守嚴正後入相張庭珪慷慨有志舉進士累遷監察御史黄門侍郎皇朝史杭宣和末為代州沿邉安撫使城被危呼二子稽古稽哲突圍力戰而死李伯宗舉進士歴大理卿執法平恕贈光禄大夫傅察端重有特操登進士第蔡京欲妻以女察拒之常奉命出使不屈而死贈徽猷閣侍制傅伯成察之孫少從朱熹學登進士第累官集英殿侍制陳芳一門十四世同居三百年孝義為時人所重仕為大理丞詔旌其門集兵符闗帝闕天策動將軍塞静胡笳徹沙明楚練分風旂翻翼影霜劍轉龍文白羽摇如月青山㫁若雲烟踈疑捲幔塵滅似消氛投筆懐班業臨戎想顧勲還應雪漢恥持此報明君並駱賔王孔山刀劍立沁水龍蛇走白居易願随天子天壇上閒與仙人掃落花李白夜分光見日院静逺聞笙劉禹錫日夕隂雲起登城望洪河川氣冐山嶺驚濤激巖阿歸鳥映蘭畤游魚動圓波依水類浮萍倚松似懸蘿潘岳昔向都邑遊今掌河􅃋徭登城眷南顧凱風揚㣲綃洪流何浩蕩修芒鬱岧嶤誰謂晉京逺室邇身實遼同上獨立蒼茫殘照外落花飛絮㸃人衣白居易星斗半沉蒼翠色紅霞逺照海濤分折松曉拂天壇雪投簡寒窺玉洞雲絶頂樵廻人不見深林磬度鳥應聞馬戴本朝政和二年改孟州為濟源郡熈寜五年省氾水入河隂元豐二年復置大中祥符四年改虎牢闗曰行慶熙寜五年王屋河南来𨽻沿革表曉日都門颭旗旌晩風鐃吹入三城}
