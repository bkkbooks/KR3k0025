  - {type: variant, offset: 2209, length: 0, content: '', WYG: 北揚州為信州隋置陳州煬帝初州廢置淮陽郡唐為陳州或為淮陽郡屬河南道領縣六梁以太康屬開封府晉為鎮安軍節度本朝為淮寜府沿革表縣沿革宛丘陳國都有東門池又有固陵漢髙追項羽處項城本槐坊店項羽所築商水本漢汝陽縣地本朝改商水縣西華漢為長平西華二縣地秦省長平本朝置西華南頓古頓子國後通於陳南徙故曰南頓又光武父劉欽為南頓令故名沿革表形勝西銘山在府西北即張子作西銘處長白山在太康縣東北山形長大甚秀宜山在西華縣南聳翠為一縣}
