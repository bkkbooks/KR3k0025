markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十九宋潘自牧撰郡縣部京西北路河南府倚郭二一河南師洛陽陽外縣十偃潁鞏宻新安登福昌安封伊縣澠池永寕夀郡號三川郡沿革天文栁分野禹貢豫州之域武王克商定鼎於郏鄏成王營洛為王城下都至平王自鎬京東遷乃居王城秦置三川縣漢置河南郡東漢都於此置河南尹兼置司𨽻三國魏置司州晉亦都此置河南尹司州如故苻秦改為豫州劉宋仍置司州後魏改為洛州孝文自代徙都之又改司州亦為河南尹東魏改司州為洛州改河南尹為河南郡西魏又改為司州北齊為洛州周為東京隋初罷郡為洛州煬帝徙都於此改豫州尋改河南郡唐初復為洛州置都督府開元初開河南府髙宗以此為樂都光宅初改神都神龍初復為樂都天寳初又改東京五代梁為西都唐改東都晉改西京本朝}
