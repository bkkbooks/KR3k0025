  - {type: variant, offset: 2177, length: 2, content: 足然, WYG: 是尋常刺史行程明道南指嵩髙北太行大河中出貫靈長君王不恃金湯險自有仁恩結萬方李廸氾水鴻溝椘漢間跳兵走馬百重山如河咫尺商於地便有園公綺季閒王安石下馬入枋口漾船汎碧溪雪消山骨瘦風急浪頭低文彦博脩竹𢃄藩籬百禽鳴朝暾仰視浮雲作俯窺流水奔相望有盤谷李愿故居存黄魯直蔡州倚郭一外縣九汝陽上蔡新蔡褒信遂平新息確山真陽西平平輿郡號汝南州沿革天文角亢氐分野禹貢豫州之域古吕國春秋時沈蔡二國戰國時為楚魏二國之境秦屬潁川郡漢髙置汝南郡}
