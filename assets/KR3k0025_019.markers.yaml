  - {type: variant, offset: 2180, length: 1, content: 能, WYG: 漢因之魏晉亦曰汝南郡劉宋因之兼置豫州以為重鎮後魏置豫州東魏置行臺後周置總管府後改曰舒州尋復曰豫州其後改洛州為豫州以此為溱州尋改曰蔡州後置汝南郡隋初郡廢煬帝初復置汝南郡唐為豫州寳應初仍為蔡州本朝因之為淮康軍節度使沿革表縣沿革汝陽周為沈國地漢置汝陽縣上蔡古蔡國周武王封弟蔡叔度於蔡漢置上蔡縣新蔡古吕國春秋時蔡平侯徙都於此故曰新蔡褒信本漢偃縣地劉宋改曰褒信遂平本春秋房子國後魏改遂平新息春秋為息侯國漢為新息確山本春秋江國本朝改確山真陽本漢慎陽縣隋改曰真陽西平古栢子國漢置西平縣平輿春秋沈子國漢置縣同上形勝天中山在汝陽縣北以在天地之中故名確山在確山縣南晉何曽見山有臼杵}
