  - {type: variant, offset: 3252, length: 2, content: 足定, krp: 域周為王畿地春秋戎蠻子邑戰國属韓後屬魏秦屬三川郡漢為河南郡三國魏屬舞陽郡晉屬河南襄城二郡後魏屬汝北魯陽二郡東魏置北荆州後周改曰和州隋改汝州以汝水為名尋改㐮城郡治承休縣唐復為汝州天寳初改州為臨汝郡乾元初復為汝州五代因之沿革表縣沿革梁古梁國城漢改為梁縣㐮城本春秋鄭氾地周襄王出居於此故名葉古應子國春秋為楚地遷許於葉即此魯山春秋時為鄭邑漢為魯陽縣寳豐本漢郏城縣地唐析置龍興縣沿革表形勝風穴山在汝州東北上有風穴及吳公洞讀書庵令武山在㐮城縣西上有令武將軍祠黄城山在葉縣北即子路問津處鹿臺山在州北有臺状若蹲鹿竈君山在州西南上有普濟廟以祀竈君雲夢山在梁縣西南相傳鬼谷子脩道處旁有水簾洞崆峒山在州西南黄帝問道於廣成子即此處今有廣成墓鳴臯山在州西南上有唐清暑宫香山在梁縣東南上有寺塔天池石梁魯山在魯縣東高出羣山為一邑巨鎮堯山在魯山縣西上有堯祠太史湖在州境内王素所濬為一郡之勝廣成澤在州西廣成子所居之地旁有漢所立廣成苑巢父井在梁縣西旁有巢由廟馬跑泉在梁縣東昔漢武渇馬跑地而得此泉故名温湯泉在州西南唐武后嘗幸此旁有武后流杯池並碑石顔魯公祠在州治東紀勝人物上古廣成子隐居脩煉或云得道飛昇漢張宗鄧禹薦為偏將軍諸將服其勇累遷大中大夫唐韓伯俞性至孝有過母撻之泣母怪而問之曰撻之不痛知母衰矣是以泣也元結少聰悟舉進士歴官監察御史撰大唐中興頌馬燧姿度魁傑李抱玉表為隴州刺史屢立大}
