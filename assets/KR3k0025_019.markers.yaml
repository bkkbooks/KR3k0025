  - {type: variant, offset: 2206, length: 0, content: '', WYG: 程門伊川嘗稱歎其善淑已為好學紀勝集行乏憇余駕依然見汝墳洛川方罷雪髙嶂見静雲輙曵半空褏溶溶五色分孟浩然西掖梧桐樹空留一院隂艱難歸故里去住損春心杜甫宫殿青門隔雲山紫蘿深人生五馬貴莫使二毛侵同上汝南晨雞喔喔鳴城頭鼔角音和平路傍老人憶舊事相與感激皆淚零劉夢得天涯流落兩丘土玉樹並揜佳城中舉杯三酹不忍去萬木颯颯擊秋空苑中詩康樂寵詞客清霄意無窮徴文北山外借月南樓中千里愁併盡一樽歡暫同同上本朝大中祥符五年始改確山縣屬淮康軍政和間升蔡州為陸海軍節度沿革表京塵無處可軒眉照面淮濵喜自知風裏麥苖連地起雨中楊桞𢃄烟垂黄庭堅北闕望南山明嵐雜紫烟樹遶芳堤外橋横落照前歐陽脩更小亭欄花正好儘荒臺榭景纔真邵雍淮寜府倚郭一外縣四宛丘項城商水西華南頓郡號淮陽郡沿革天文角亢分野禹貢豫州之域昔庖羲氏所都曰大吳之墟周初封舜後媯滿於此以備三恪為陳國楚}
