  - {type: variant, offset: 3259, length: 19, content: 庭藝文類聚載應璩薦和慮則牋一經品題便作, WYG: 授兵馬使累功封同昌郡王五代張仁謙初為晉兵馬都監後平李繼筠授象州刺史皇朝㓂瑊舉進士授遂州推官討平溪蠻累官樞宻直學士吴㡬復登進士第為太學直講歴仕内外官至秘閣沈宣性至孝𦵏父母不塞墓附棺而卧同妻負土築墳旌表其門紀勝集望嵩樓上忽相見看過花開花落時劉禹錫晨登歇馬嶺遥望伏牛山孤出羣峰首熊羆元氣間宋之問回看巴路在雲間寒食離家麥熟還日暮數峯青似染商人説是汝州山王建務閒惟印吏公退只棊僧藥鼎初寒火書龕欲夜燈許用晦汝水無濁波汝山饒竒石大賢為此郡}
