  - {type: variant, offset: 232, length: 641, content: 賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者詣公車天子引見敞拜為冀州剌史敞到部盜賊屏跡同上漢宣紀頴川盜賊群起河東守兵亦叛京師騷動帝聞之言吾悔不用郭子橫之言同上漢光武紀馬援南擊交趾從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足致求盈餘但自苦耳當吾在浪泊西里間下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中臥念少游平生語何可得也後漢本傳漢主伐吳而敗時法正已卒亮歎曰孝直若在必能制主上東行就使東行必不傾危矣通監三國王獻之兄弟自郄超未亡見愔常躡履問訊甚修舅甥之禮及超死見愔慢怠屐而候之愔每慨然曰使嘉賓不死鼠子敢爾耶晉書郄超傳愔超父也互入炎涼宋文帝曰檀道濟若在豈使胡馬至此通監宋紀吳已平群臣上壽帝執爵流涕曰此羊太傳之功也同上晉武大康元年突厥圍鴈門煬帝歎曰向使長孫晟在不令匈奴至此隋書劉行本太子少庶子太子勇虛襟敬憚後卒及太子廢上曰劉行本在勇當不及於此元嵓為蜀王長史後王漸以非法得罪上曰元嵓若在吾兒豈有是乎並同上張九齡奏安祿山有逆相請因罪戮之上放歸九齡既死上皇在蜀思九齡之先覺詔哀贈唐書征高麗班師上以不能成功深悔之歎曰魏證若在不使我有是行也命馳驛祀徵以少牢復立製碑召其妻子詣行在勞賜之通監唐太宗刑部郎中闕上曰朕得其人矣往者李道裕議張亮獄云反形未具此言當矣朕雖不從至今悔之遂以道裕為刑部郎中同上太宗自遼東還曰魏證若在吾豈有此行耶唐書傳記祭遵死後每朝會上常歎曰安得奉公憂國如祭征虜者東觀漢紀集霖雨思賢佐丹青憶老臣杜, WYG: 字冩}
