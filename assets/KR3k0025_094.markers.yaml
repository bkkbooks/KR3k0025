  - {type: variant, offset: 215, length: 1, content: 祝, WYG: 矣明年應生臣走往刈之以飼馬馬食不饑帝許之朔平旦去至暮而返背負數束其形葉似麥而金色剉以飼馬即不覺饑甜溪水如蜜瑶琨}
