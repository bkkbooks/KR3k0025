  - {type: variant, offset: 228, length: 1, content: 初, WYG: 十二節小兒休更籋霜鬚詠菖蒲花斕斑碎玉養菖蒲一勺清泉半石盂碧玉盌盛紅瑪瑙青盆水養石菖蒲也知供法無窮盡試問禪師得飽無其延年輕身之功既非昌陽之所能及至於思寒苦安淡泊與清泉白石為伍不待泥土而生者亦豈昌陽之所能髣髴哉東坡閒行澗底採菖蒲千嵗龍蛇抱石臞明朝却覓黄州路飛下山巔不用扶陳與義芭蕉傳記芭蕉一曰苞苴或曰甘蕉子兩兩共對剥其皮色黄白味似蒲萄甜而脆其莖解散如絲績以為葛謂之蕉葛廣志每花一闔各有六子先後相次子不俱生花不俱落有三種一種子大如拇指長而鋭有似羊角名羊角蕉味最甘好一種子大如鷄卵有似牛乳味㣲减羊角蕉一種大如藕子長六七寸形正方少甘味最弱取鑊煮之為絲可以紡績女工以為絺綌今交趾葛也南州異物志赤岩山水石之間唯有甘蕉林深者十丈遊名山志路德延數嵗能詩嘗賦芭蕉詩曰一種靈苗異天然體性虛葉如斜界紙心似倒抽書廣記僧懷素貧無紙可書甞於故里種芭蕉萬餘以供揮洒陸羽作懷素傳集扶踈似樹質則非木卞敬宗賛芭蕉葉大梔子肥韓集晩英值窮節緑潤含朱光以兹正陽色窈窕凌清霜逺物世所重旅人心獨傷回暉眺林際摵摵無遺芳栁詩芭蕉不展丁香結同向春風各自愁芭蕉開緑扇李義山本朝芭蕉一枕西窻雨王介甫更展芭蕉看學書山谷骨相玲瓏透八窻花頭倒挿紫荷香繞身無數青羅扇風不來時也覺凉誠齋水草經參差荇菜左右流之于以采蘩于沼于沚于以采蘋南澗之濵于以采藻于彼行潦思樂泮水薄采其芹薄采其茆詩季春萍始生禮記蘋蘩蕰藻之菜可薦於鬼神可羞於王公左傳傳記苹萍也無根浮水而生説文水藻一名水簾生池澤中水上葉圓小一莖一葉吳氏本草水萍一名水華久服輕身本草經萍麄大者為蘋季春生可糝蒸為茹詩義疏穀雨之日萍始生萍不生隂氣貫盈逸周書菜之美者崐崘之萍焉吕氏春秋}
