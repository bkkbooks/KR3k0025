  - {type: variant, offset: 116, length: 2, content: 狐突, WYG: 子草木暢茂孟子逮至衰世草木之勾萌銜華佩實而不死者不可勝數淮南子展禽}
  - {type: page-break, offset: 116, content: '', id: KR3k0025_WYG_094-2a, image: WYG0932/WYG0932-0727a.png}
