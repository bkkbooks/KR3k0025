  - {type: variant, offset: 219, length: 1, content: 詛, WYG: 洞冥記不其城東有鄭𤣥教授山山下生草如薤葉土人名作康成書𢃄三齊畧記席萁一名塞盧生湖北地古詩云千里席萁草秦趙間有相思草狀若石竹而節節相續一名斷腸草又名愁婦草亦名孀草人呼為寡婦莎述異記太極山西有采華之草服之乃通萬里之言括地圖太原晋陽已北生屏風草天姥曰太陽之草名曰黄精餌而食之可以長生太隂之草名曰鈎吻入口立死海上有蒒草其實食之如大麥名曰自然榖或曰禹餘糧博物志霍山上有神草四十三種靈山記壽榮草出少室金山丘下服之令人不老典術餌玉長生草一名通天日再服之令人得仙嵗欲豐甘草先生甘草者薺也嵗欲儉苦草先生苦草者葶藶也嵗欲惡惡草先生惡草者水藻也嵗欲旱旱草先生旱草者蒺藜也嵗欲潦潦草先生潦草者蓬也師曠占午橋莊小兒坡茂草盈里晋公每使數羣白羊散於坡上曰芳草多情賴此粧㸃窮幽記元和時館閣湯飲煎騏驎草鳳翔退耕傳集何所獨無芳草爾何懷乎故宇楚辭折芳馨兮遺所思九歌春草生兮萋萋招隱春草碧色江淹賦四顧何茫茫東風摇百草新樹蘭蕙枝雜用杜蘅草終朝採草榮日暮不盈抱採之欲遺誰所思在逺道青袍似春草長條從風舒青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感以人含氣血古詩池塘生春草謝靈運池草暗生春緑蘿紛葳蕤繚繞松栢枝草木有所託嵗寒尚不移草不謝榮於春風芳草換野色飛蘿摇春煙瑶草映髙堂春風如有情山中尚含緑春草如有意羅生玉堂隂芳草歇柔艷李白汀草亂青袍草見踏青心忘機對芳草宮草霏霏承委佩映堦碧草自春色草敵虛嵐翠碧知湖外草春泥百草生百草競春華方期拾瑶草杜詩白露下百草蕭蘭共憔悴青青四墻下已復生滿地野草花葉細不辨薋菉葹草珠競駢晴韓詩隂草濕翠羽栁詩五陵愁碧春萋萋温庭筠芳草復芳草斷腸還斷腸自然堪下淚何必更殘傷杜牧憶春草處處多情洛陽道金谷園中見日遲銅駝陌上迎風早館娃宮外姑蘇臺欝欝芊芊掇不開劉禹錫本朝楚辭所詠香草曰蘭曰蓀曰􅊉曰葯曰虈曰芷曰荃曰蕙曰薫曰蘼蕪曰江蘺曰杜若曰杜蘅曰揭車曰留夷釋者但一切謂之香草而已如蘭一物或以為都梁良或以為澤蘭或以為猗蘭草今當以澤蘭為正山中又一種大葉蘭冬春開花極香此别名幽蘭非真蘭也蓀則今人所謂石菖蒲者􅊉葯虈芷雖有四名秪是一物今所謂白芷是也蕙即零陵香一名薰蘼蕪即芎藭苗也一名江蘺杜若即山薑也杜蘅今人呼為馬蹄香惟荃與揭車留夷終莫能識余他日當徧求其本列植欄檻間以為楚香亭漸覺東皇意思勻陳根初種夜來新忽驚平地有輕緑已覺六街無舊塵莫為榮枯吟野草且憐愁醉軛香輪詩人空怨王孫逺極目萋萋又一春遯齋閒覧似嫌車馬繁華處纔入城門便不生劉原父光耀發幽叢秋草風吹春復緑芳草留人意自閒草木本無情及時如自得六一集草木含幽香芳草不鋤當户長並東坡菖蒲石菖蒲附經王使周公閲來䀻饗有昌歜左傳史梁太祖后張氏忽見庭前菖蒲生花因取食之生髙祖詳見莖節類傳記玉衡星散為菖蒲春秋運斗樞菖蒲放花人得食之長年風俗通菖蒲生石上一寸九節者久服輕身明耳目不忘不迷菖蒲}
