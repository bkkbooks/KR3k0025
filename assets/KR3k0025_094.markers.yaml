  - {type: variant, offset: 227, length: 0, content: '', WYG: 節堅芬之極羅浮山記文王好食菖蒲葅説苑王興採菖蒲食得長生神仙傳王徽之以菖蒲映竹曰菖蒲只以九節為貴而此君面目聳焉菖蒲正當再拜此君而此君亦安得不受之耶髙士春秋僧普寂大好菖蒲房中以菖蒲種成獅子鸞鳳仙人之狀海墨㣲言成都營妓薛濤元微之使蜀屢陪讌笑元後寄詩云别後相思隔煙水菖蒲花發五雲髙牧䜿閒談集菖蒲從短出平沙菖蒲花紫茸李白水長减蒲芽青青水中蒲長在水中居寄語浮萍草相隨我不如韓詩本朝九節菖蒲石上仙菖蒲人不識生此亂石溝山髙雪霜苦苗葉不得抽下有千嵗根蹙縮如蟠虬春荑秋莢兩須臾神藥人間果有無無鼻何由識薝蔔有花今始信菖蒲芳心未飽兩蝴蝶寒意知鳴幾蟪蛄記取明}
