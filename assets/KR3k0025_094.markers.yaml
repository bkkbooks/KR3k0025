  - {type: variant, offset: 294, length: 1609, content: 曰使神可祝而來亦可禳而去史齊世家鄒陽枚乘游於危國然卒免刑戮者以其言正也西漢本贊互入有守班婕妤曰死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為西漢本傳互見婦言明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱奇怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥遙興輕舉黃冶變化之術者皆奸人惑眾挾左道懷詐偽以欺罔世主聽言洋洋滿耳若將可遇求之盪如係風捕影終不可得通監漢紀魏帝愛女淑卒帝痛之欲幸許陳群諫曰臣以為吉凶有命禍福由人移都求女則亦無益且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心況乃帝王萬國之主行止動靜豈可輕脫哉通監魏明紀時長吏喪官後人惡之多毀壞舊府祜以死生有命非由居室普加禁斷晉書羊祜傳王度曰佛外國之神非天子諸華所應祠奉漢氏初傳其道唯聽西域人立寺都邑以奉之漢人皆不得出家魏世亦然今宜禁公卿以下母得詣寺燒香禮拜其趙人為沙門者皆返初服通監晉成紀郭璞嘗遇顏含欲為之筮含曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞蓍龜同上庾翼在武昌數有妖怪欲移鎮樂鄉王述曰武昌實江東鎮戍之中非但扞禦上流而已達人君子直道而行禳避之道皆所不取通監晉穆紀太史令傅弈上疏請除佛法曰佛在西域言妖路遠漢譯胡書恣其假托使不忠不孝削髮而揖君親游手游食易服以逃租賦偽啟三塗謬張六道恐喝愚夫詐欺庸品乃追懺既往之罪虛規將來之福布施萬錢希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章有造為惡逆身墜刑網方乃獄中禮佛規免其罪且死生壽天由於自然刑德威福關之人主貧富貴賤功德所招而愚僧矯詐皆云由佛降自羲黃至于有漢皆無佛法君明臣忠祚長年久漢明帝始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輒行髡髮之事梁武齊襄足為明鏡今天下僧尼數盈千萬剪刻繒綵裝束泥人競為厭魅迷惑百姓通監唐高祖有僧自西域來善咒術能令人立死復咒之使蘇上擇飛騎中壯者試之皆如其言以告傳弈弈曰此邪術也臣聞邪不干正請使咒臣必不能行上命僧咒弈弈初無覺須臾僧忽僵仆若為物所擊遂不復蘇通監唐太宗梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧祇殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀𪆪子孫覆亡而不暇社稷俄頃而為墟報施之徵何其謬也呂才以為近世巫覡妄分五姓如張王為商武庾為羽似取諧韻至於以柳為宮以趙為用又復不類或同出於一姓分屬宮商或複姓數字莫辨徵羽此則事不稽古義理乖僻者也祿命之書多言或中人乃信之然長平阬卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同祿而貴賤懸殊共命共胎而天壽或異又云古之葬者皆於國都之北兆域有常處是不擇地也夫子文為令尹而三已柳下惠為士師而三黜計其丘隴未嘗改移而野俗無識妖巫妄言遂於擗踊之際擇葬地而希官爵荼毒之秋選葬時而規財利或云辰日不可哭泣遂莞爾而對弔客或云同屬忌於臨壙遂吉服不送其親傷教敗禮莫斯為盛術士皆惡其言而識者以為確論並同上狄仁傑以吳楚多淫祠奏焚其一千七百餘所獨留夏禹吳太伯季札伍員四祠通監唐武后太后造大像狄仁傑上疏諫其略曰今日伽藍制過宮闕功不使鬼止在役人物不天來終須地出不損百姓將何以求又曰游僧皆托佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘所激切於官徵法事所須嚴於制敕通監唐史宗李邕上疏以為詩三百一言以蔽之曰思無邪若有神仙能令人不死則秦始皇漢明帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已同上姚崇上言佛圖澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃但使蒼生安樂即佛身何用妄度奸人使壞正法命有司沙汰天下僧尼以偽妄還俗者萬二千餘人通監唐玄宗姚崇曰若使殺蝗有禍臣請當之同上張鎬曰帝王當修德以弭亂安人未聞飯僧可致太平也通監唐肅宗上曰建中之亂術士豫請城奉天此蓋天命非杞所能致也李泌曰天命他人皆可言惟君相不可言蓋造命也通監唐德宗上與宰相語及神仙問果有之乎李藩曰秦始皇漢武帝學仙之效具在前史太宗服天竺僧長年藥致疾此古今之明戒也苟道盛德充人安國理何憂無堯舜之盛壽乎通監唐憲宗傳記, WYG: ''}
