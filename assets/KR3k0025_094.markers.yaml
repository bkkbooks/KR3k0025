  - {type: punctuation, offset: 119, content: 「, id: KR3k0025_CHANT_094-bkkpn59}
  - {type: variant, offset: 119, length: 0, content: '', WYG: 春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯符子史元帝永光二年天雨草葉相糾結如彈丸漢書靈帝中平元年東郡陳留濟陽長垣濟隂諸縣界有草生莖其大如指狀似鳩爵龍蛇鳥獸之形五色各如其毛羽頭目足翅皆具續漢書宕昌𦍑俗無文字但候草榮落以記嵗時後周書傳記草卉也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英爾雅草盛曰菶木茂曰葆風俗通凡生草而初達謂之䓲䓲小也荄杜根也齊東曰杜或曰苃方言堯時有屈佞草佞人入朝則屈而指之又名指佞草博物志魏興錫義山多生薇蘅草其草有風不掩無風獨摇水經魯城北孔子塋中不生刺人草木金樓子生而無識者草木是也古今注秦皇時大宛中多枉死者横道有鳥如烏銜草以覆死人面遂活鬼谷先生曰此草是爼洲不死草也生瓊田中亦名養}
