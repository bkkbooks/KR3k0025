  - {type: variant, offset: 2144, length: 1651, content: 十九年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜果其後竟為侯景所逼餓死臺城國亦隨滅事佛求福反更得禍由此觀之佛不足信事亦可知矣韓文論佛骨表佛如有靈能作禍福凡有殃咎宜加臣身上天鑒臨臣不怨悔同上凡君子行己立身自有法度聖賢事業載在方冊可效可師仰不愧天俯不怍人內不愧心積善積惡殃慶自各以其類至何有去聖人之道舍先王之法而從夷狄之教以求福利也韓文與孟尚書假如釋氏能與人為禍福非守道君子之所懼也況萬萬無此理釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在旁又安得因一摧折自毀其道以從於邪也並同上未有恃祥而壽者也商之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽惡在其為符也柳貞符本朝開寶塔災得舊瘞舍利迎入內廷傳言頗有光怪將復建塔余襄公言彼一塔不能衛何福可及於民凡腐草皆有光及珠之圓者夜亦有光烏足畏也筆談王嗣宗為節度使性剛正嘗臥病家人私爇紙幣以祈福嗣宗大呼而止之曰神苟有知豈枉法而受賄耶聖宋掇遺經民興胥漸泯泯棼棼罔中于信以覆詛盟書呂刑非其所祭而祭之名曰淫祀淫祀無福記曲禮下奧者老婦之祭也盛於盆尊於瓶記禮器非其鬼而祭之諂也語八佾互入強自攀附史申繻曰妖由人興也人無釁焉妖不自作人棄常則妖興左莊十四年史嚚曰國將興聽於民將亡聽於神左莊二十三年初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之通監漢明紀初帝奉佛法立精舍於殿內引諸沙門居之通監晉武紀謝萬曰三郄諂於道二何佞於佛晉書自天監中用釋氏法長齋斷魚肉日止一食惟菜羹糲飯而已通監梁高祖上好禨祥小數王劭表上符瑞甚眾又採民間歌謠引圖書讖緯捃摭佛經曲加誣飾撰皇隋靈感志上令宣示天下隋文紀隋傅縡曰不虔郊廟大神專媚淫昏之鬼通監隋紀隋程知節曰王世充好為咒誓此乃老巫嫗耳同上楚人信妖言通監唐高祖上好祀神鬼王璵習祠祭之禮以干時璵祈禱或焚紙錢類巫覡習禮者羞之通監唐元宗肅宗代宗皆喜陰陽鬼神事無大小謀之卜祝故王璵黎幹以左道得進通監唐代宗上病甚令僧剃髮遺令為塔以葬同上傳記孫恩攻會稽王凝之謂吏民曰不須預防吾已請大道許遣鬼兵相助賊自破矣既不設備遂為恩所害王氏譜見世說注事鬼求福墨生所信史通集甚矣人之好怪也不求其端不訊其末惟怪之欲聞韓文原道越人信祥而易殺病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飭死事曰神不置我矣因不食蔽面死柳寺記德實受命之符以奠永祀後之妖婬嚚昏好怪之徒乃始陳大電大虹玄鳥巨跡白魚流火之烏以為符斯皆詭譎闊誕其可羞也柳貞符自司馬相如劉向揚雄班彪彪子固皆沿襲嗤嗤推古瑞物以配受命其言類淫巫瞽史誑亂後代不足以知聖人立極之本顯至德揚大功甚失厥趣同上本朝畏鬼神聽巫覡者匹婦之愚也通監唐肅宗史諸葛瞻亮之子亮卒蜀人思亮之德咸愛瞻才敏每有善政佳事雖非瞻所建皆相告曰葛侯所為也是以美譽過實蜀志互入遺愛章華好學善屬文朝臣以華素無閥閱競排詆之通監陳後主集丈人屋上烏人好烏亦好杜詩偶然題作木㞐士便有無窮求福人韓文必若土之出無不可者則東南之竹箭雖旁歧揉曲皆可以貫犀革北山之木雖離奇液暪空中立枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曳者皆可以勝百鈞馳千里雍之塊墣皆可以備砥礪徐之糞壤皆可以封大社荊之茅皆可以縮酒九江之元龜皆可以卜泗濱之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊關轂而輠輪者皆可以為師儒盧之沽名者皆可以為大醫西子之里惡而矉者皆可以當侯王山西之冒沒輕俛沓貪而忍者皆可以鑿凶門制閫外山東之椎騃樸鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉柳文互入不具眼目本朝韓魏公曰頃時丁寇立朝天下聞一善事皆歸之萊公未必盡出萊公也聞一不善事皆歸之晉公未必盡出晉公也蓋天下善惡爭歸焉遺事, WYG: ''}
