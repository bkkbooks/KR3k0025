  - {type: variant, offset: 2241, length: 243, content: 盛時雖寂寞雪霜多後始青蔥李義山文一發之初雖失正鵠百鍊之後方辨精銅白帖試玉要燒三日滿辨材須待七年期周公恐懼流言日王莽謙恭未篡時假使當時身便死一生真偽有誰知白樂天千淘萬漉雖辛苦吹盡狂沙始到金劉賓客福不在於其身慶必流於後嗣唐文粹大抵生則不遇死而垂聲者眾焉楊雄沒而法言大興馬遷生而史記未振柳子厚集凡人可以言古不可以言今桓譚亦云親見楊子雲容貌不能動人安肯傳其書誠使博如莊周哀如屈原奧如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之高者至少矣由此觀之古之人未嘗不薄於當世而榮於後世也韓, WYG: ''}
