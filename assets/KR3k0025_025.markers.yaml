  - {type: variant, offset: 1750, length: 2, content: 傳互, krp: 朝熙寜六年收復安鄉為河州熈寕八年置枹罕縣九年省崇寕四年陞寕河砦為縣沿革表華夷分壤處雪嶺白嵯峨萬古消難盡三秋積又多寒光欺夏日素彩爍天河自笑經過客相㸔鬢易皤並㳺師雄題雪山鞏州倚郭一外縣一隴西寕逺郡號隴西天水漢陽郡沿革天文井鬼分野禹貢雍州之域春秋戰國時為羌戎所居秦屬隴西郡漢為天水郡東漢為漢陽郡及隴西郡地魏為隴西南安二郡後魏為隴西南安安陽三郡兼置渭州隋廢南安郡復置隴西郡唐武徳元年置渭州天寳元年改隴西郡本朝改鞏州地理沿革表縣沿革隴西本漢之天水郡地唐為隴西縣本朝立古渭寨元祐中復置隴西縣寧逺本唐隴西縣地本朝置寜逺寨崇寜中陞為縣同上形勝仁夀山在州城南馬鹿山在州南四圍崖甚險西山在州西廣漢水所出廣吴山在寧逺縣西有廣吳堡故城在焉石門山在寧逺縣東北斗山在寕逺縣南渭水在州城北六泉在州東南乞伏國仁率騎兵襲鮮卑三部于六泉即此輿地紀勝人物漢龎徳隴西人初平中從馬騰擊反羌有功累官中郎將封都亭侯南北朝李叔仁隴西人驍健有武力仕魏征討有功遷揚州刺史封陳郡公官終大都督唐李揆隴西人性警敏善文章乾元中進禮部侍郎同平章事善奏對帝曰卿門地人物文章當世第一時稱三絶李中敏隴西人舉進士性剛峭與杜牧李甘善善文辭太和中旱中敏上䟽陳時政得失文宗嘉納之皇朝王君萬寧逺人以殿中侍為秦鳯指揮使積功擢熈河路鈐轄累官副總管同上集隴西將軍號都䕶樓蘭校尉稱嫖姚王褒囬風吹雨渭城西細草新花踏作泥岑參借問隴西行何當驅馬征草合前迷路雲濃後暗城庾慎之漢國臨清渭京城枕蜀河望極闗山逺秋深烟霧多楊烱隴陂常無極蒼山望不窮花開緑野霧鶯囀紫岩風盧果之本朝熈寧五年以秦州古渭砦為軍崇寕三年陞為州元祐五年増置隴西縣崇寕三年陞永寕砦為縣又陞寧逺砦為縣沿革表秋色滿秦川登臨渭水邉極浦涵秋月孤㠶沒逺烟潘閬隴雲連塞起渭水}
