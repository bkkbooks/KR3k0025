  - {type: variant, offset: 0, length: 118, content: 事難遙度經如匪行邁謀是用不得于道詩小旻箋不行而坐謀遠近是於道路無進於跬步史傳聞不如親見東漢馬援傳傳聞與指實不同懸筭與臨事有異通監趙充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略西漢趙充國傳經天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也, WYG: 欽定四庫全書}
