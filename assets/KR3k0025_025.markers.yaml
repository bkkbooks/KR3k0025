  - {type: variant, offset: 1163, length: 0, content: '', WYG: 之隴坂長張衡汧水悠悠去似絣逺山如畫翠眉横僧尋野渡歸吴嶽鴈帶斜陽入渭城韋莊秦隴無人塞草腥將軍一去泣空營漢家天子東巡狩行到江南又起兵隴亭童謡憶昨逰隴坂髙秋視吳嶽杜甫本朝熈寧八年改秦州定邉砦為隴西鎮𨽻縣開寳二年析汧陽縣四鄉置隴安縣沿革表凍雲凝白雪漫漫不是寒亭分外寒六月大雹天不雨請君來此凭䦨干王庶題苦寒亭隴山如碧環缺處蒼崖開當年造物手辦此何神哉劉昻雷鳯州倚郭一外縣二梁泉河池兩當郡號河池郡沿革天文井鬼翼軫分野禹貢梁雍二州之域春秋時氐羌所居秦為隴西郡地漢為故道河池二縣後魏于此置梁泉縣西魏改為鳯州隋廢州置河池郡唐初復鳯州天寳初改河池郡乾元初復為鳯州五代時蜀置武興軍本朝仍為鳯州地理沿革表縣沿革梁泉本氐羌故地秦為隴西郡漢為故道縣後魏置梁泉又更名凉泉尋復為梁泉河池春秋時氐羌所居秦為隴西郡地漢為河池縣屬武都郡晋䧟于氐羌後魏置廣化郡及縣隋初郡廢以縣屬鳯州仁夀初復名河池縣本朝因之兩當本漢故道縣地屬武都郡晉䧟于氐羌後魏置兩當郡及縣因界内兩當水為名隋廢郡以縣屬鳯州本朝因之同上形勝鳯凰山在州東鳯凰嘗棲此紫栢山在州東南上有一十七洞異人多隱於此南岐山在州南上有竹雲洞内有湫池君子山在州西南上有靈惠廟御愛山在州東北唐徳宗巡幸至此愛玩故名豆積山在州北上有不老泉仙人洞唐張果之隠處一名遯迹山文子谷唐僖宗幸蜀至此武休闗在州東馬嶺闗畫眉關大散川黄花川斜谷河鳴玉泉連雲棧橋并在州境和尚原在州東即吳玠敗烏珠處鐵山在河池縣東南天門山在河池東南伶倫山在河池南天池山在河池南青泥山在河池南木皮嶺在河池西銀椿崖在河池東北金蓮洞在河池西髙數十仭首陽洞在卧龍山畔仇池石在天池山仙人闗在河池東小河闗在河池南嘉陵江在河池南忠義水在河池南鸑鷟山在兩當縣東上有登真洞董真峪在兩當東南上有真人庵分水嶺在兩當縣東獅子川在兩當縣境輿地紀勝人物皇朝文彦􅀶邠州人㣲時寓居兩當縣富民郇氏之家教授生徒邵雍河南人嘗寓居鳯州同上集寒城朝烟積山谷落葉赤隂風千里來吹汝江上宅杜甫題吴郁宅溪從沮水流嶓􅜗嶺接青泥入劒天史瑜首路栗亭西尚想鳯凰村南登木皮嶺艱險不易論始知五嶽外别有他山尊杜甫題木皮嶺山城薄酒不堪飲勸君且吸杯中月李太白鳯州詩楊栁垂青絲風動入飛蓋邵堯夫鳯州飛蓋亭詩古時應是山頭水自古流来江路深元稹題嘉陵江借問嘉陵江水湄東川東去爾西之薛逢題鑿崖泄奔湍稱古神禹蹟韋應物題嘉陵江本朝乾徳五年降防禦為團練開寳五年移河池治故鎮至道元年移兩當治唐鄉鎮沿革表里數三千七百餘兩當冬夜宿中途舉朝五往来西蜀還有區區似我無趙抃赴益州猿啼鬼迷店馬噤飛石鋪陸㳺過鳯州嘯歌山水重黄庭堅嘯歌臺當日蒙塵極險艱正由蒼翠强開顔吾皇髙拱巖廊上只愛生靈不愛山王素題御愛山不是當時經御愛此山還與衆山同趙抃題御愛山豆積更名為遯迹西康麥積合如何袁桂題豆積山我携此石歸袖中有仇池東坡鳥去林自空雲移山不礙塞目烟岑宻都城若天外邵雍登鳯州城詩階州倚郭一外縣一福津將利郡號武都郡沿革天文井鬼分野禹貢雍州之域戰國時白馬氐居焉漢武為武都郡魏置武階郡改置武州唐為行州後復立武州更名曰階州本朝初𨽻秦鳯路地理沿革表縣沿革福津本後魏覆津縣屬武階郡隋屬武州唐改曰福津本朝因之將利本後魏石門縣西魏改安育後周又改今名唐武州治于此同上形勝石雞山在州東有石雞神廟盤堤山在州東南近有盤堤城鳯凰山在州東南漢世曾有鳯凰棲其上有鳯凰臺鹿玉山在州東山下溪中水潄石如玉故名仇池山在州西北四面壁立峭絶醉仙崖在州南連鳯凰山東柯谷在州東南唐杜甫姪佐居此裴公湖在州西南隅唐刺史裴守真所剏杜甫故居在州東輿地紀勝人物皇朝牛皓福津人仕為川陜宣撫後死節人稱其忠義丁焴福津人為人剛直不受私謁累官至大府少卿嘉定間為利州路安撫使吏民信服同上集傳道東柯谷深崖數十家對門藤蓋瓦映竹水穿沙杜甫題東柯谷亭亭鳯凰臺北對西康州西伯今寂寞鳯臺亦悠悠題鳯凰臺徘徊虎穴上面勢龍泓頭停騎龍潭雲囘首虎崖石並題虎穴彩鳯舒雙翼宛然半巖間哥舒翰題鳯凰山萬古仇池穴潜通小有天杜甫題仇池山本朝髙倚青㝠揖酒星小崖誰作醉仙形從來天地為衾枕應笑人間有獨醒魯伯能題醉仙臺對面好峯横翠幕繞城垂桞拂清漣李師中題裴公湖玉井響侵獅子洞㳺師雄題鹿玉山萬丈潭邉萬丈山山根一竇落飛泉玉繩自我題巖石留作人間美事傳喻陟題玉繩泉勢將玉繩齊位據金野窄游師雄渭州倚郭一外縣四平凉潘原安化崇信華亭郡號隴西郡沿革天文井鬼分野禹貢雍州之域春秋為朝那故地秦屬北地郡漢析置安定郡治髙平晉徙治臨涇後魏於潘原縣置武州屬太平郡後周屬原州隋治安定縣又析置平凉郡唐初置原州元和中以原州平凉縣置行渭州後䧟于吐蕃中和間復置本朝為涇原路沿革縣沿革平凉本漢朝那涇陽二縣地東漢省涇陽入朝那晉因之後魏廢為長城縣地後周復置朝那縣隋改平凉縣潘原本漢隂盤縣地唐天寳初置潘原縣五代周以武州省入本朝屬渭州安化本春秋戰國義渠戎國秦為北地郡地漢為郁郅縣東漢晉俱廢後魏後周