  - {type: variant, offset: 1777, length: 3, content: 臣奏議, WYG: 將堃以六郡鎮撫使守咸淳府元將楊文安與堃同里諭使降元堃不從文安乃列柵攻城潜遣勇士躡雲梯宵登斬關納外兵堃悉力向戰死之馬塈堃弟撫諸蠻治關隘皆有條理邉陲晏然後留靜江元將隅里海牙以兵夾攻三月使人招降不屈後城破塈率死士向戰被執殺之斷其首猶握拳大奮起立踰時方仆並輿地紀勝集重嵠既下潄峻嶺亦上干隴頭聞戍鼓嶺外咽飛湍瑟瑟松風急蒼蒼山月團盧杲題分水嶺塞雲多斷續邊日少光輝警急烽常報傳聞檄屢飛杜甫已喜皇威清海岱還期仙杖過崆峒同上伯夷竄首陽老耼伏柱史放神青雲外絶迹窮山裏王康居題賢隠山詩凝霜凋朱顔寒泉傷玉趾歸來安所期與物齊終始同上雄叔意同芸叟觀王資題千丈潭本}
