  - {type: variant, offset: 1199, length: 0, content: '', WYG: 域秦屬北地郡漢晉皆屬安定郡後魏始置涇州取涇水為名隋大業初改安定郡安定縣唐復為涇州改縣為保定縣天寳初改州為安定郡後復為涇州本朝改彰化軍地理沿革表縣沿革保定本漢安定縣東漢省後魏置涇州縣唐改保定縣本朝因之靈臺古宻須之國漢為北地即鶉觚縣地隋析置靈臺縣取文王作靈臺之意後省入鶉觚唐復置本朝仍舊良原隋置屬安定郡唐本朝俱屬涇州長武本烏氏國地本朝范仲淹奏差宋良等部領番漢軍馬往涇州長武寨把隘即此同上形勝筆峰山在州南樹林隂宻回中山在州西上有王母宫漢武帝求神仙於此蒼山在靈臺縣東南林木蒼翠保巖山在靈臺縣東南三十里山勢峭抜回旋百折共池在州北詩侵阮徂共即此翠屏山在平凉縣南一里上有石如珠一名􅂷珠峰輿地紀勝人物漢梁統州人性剛毅精法制更始召拜酒泉太守封陵鄉侯南北朝鄧彦海安定人性真潔博覽羣書長於易武定中擢為尚書唐牛仙客靈臺縣人初為縣小吏後以功遷洮州司馬累遷工部尚書牛僧孺靈臺人性鯁直不阿初為監察御史後累官𢎞文舘大學士皇朝劉惟輔州人以同州觀察使為熈河副總管後死節贈昭化節度使號忠烈同上集雪下陽闗路人稀隴戌頭白草三冬色黄雲萬里秋耿湋過涇州九光飛鞅志何遥千載靈蹤隔綘霄漢殿杳沉青鳥信崑丘誰聽白雲謡崔立題王母宫詩林巒尚鎖空臺舘城邑全非舊市朝同上遮虜黃雲斷燒羌白草空朔野長城閉河源舊路通戎昱涇州觀元戎出師本朝太平興國元年改彰化軍節度咸平四年陞長武寨為長武縣五年省為砦屬保定縣大觀三年復以砦為縣沿革表最髙翠屏山舉手星可摘珠石信團圞羣峯森劔㦸㳺師雄題翠屏山相傳雷雨收片片歸雲白題青龍洞此去陟參雲危棧愈踧踖㑹景亦可喜周顧忘倦罷同上原州倚郭一外縣一臨涇彭陽郡號平凉郡沿革天文井鬼分野禹貢雍州之域本秦北地郡地漢為安定郡之髙平縣東漢永初間廢後魏置髙平鎮後為太平郡兼置原州隋初廢郡州如故大業間廢州為髙平郡唐初為原州後改平凉郡乾元初復原州本朝置鎮戎軍地理沿革表縣沿革臨涇本漢縣晉安定郡治此唐屬涇州本朝屬原州彭陽本漢舊縣屬安定郡後魏属原州隋廢唐置義豐縣本朝復}
