  - {type: variant, offset: 1200, length: 1, content: 我, krp: 彭陽同上形勝潜夫山在州北東漢王符隠此玉山在州東山多白石隂雨之夜明艷如玉雉頭山在州西状如雉頭金佛峽在州東上}
  - {type: variant, offset: 1202, length: 0, content: '', WYG: 金粧佛和戎原在臨涇縣南蒲水在州北三水在州東北水流三𣲖㑹歸一川蕭闗在州西北漢文帝時匈奴入蕭闗即此石橋在州玉山之下有巨石横亘名仙人石橋俗呼為仙人著碁臺輿地紀勝人物三國胡奮臨涇人從司馬懿伐遼東以功封夏陽}
  - {type: variant, offset: 1202, length: 0, content: '', krp: 金粧佛和戎原在臨涇縣南蒲水在州北三水在州東北水流三𣲖㑹歸一川蕭闗在州西北漢文帝時匈奴入蕭闗即此石橋在州玉山之下有巨石横亘名仙人石橋俗呼為仙人著碁臺輿地紀勝人物三國胡奮臨涇人從司馬懿伐遼東以功封夏陽}
  - {type: variant, offset: 1203, length: 0, content: '', WYG: 累遷散騎常侍南北朝胡國珍臨涇人少好學雅尚清儉太和中襲父爵為武始侯後封安定郡公席闡文臨涇人幼孤貧渉獵書史仕南齊為雍州刺史有能名冬至悉放獄中囚依期而至後封湘西侯皇朝胡順之州人舉進士嘗上書宰相乞太后還政仁宗嘉其忠遷尚書范仲淹愛其才同上集夫戌蕭闗妾在吳西風吹妾妾憂夫一行書信千行淚寒到君邉衣到無唐人詩出得蕭闗北儒衣不稱身張象文過蕭關旋聞受降日歌舞入蕭闗朱延清本朝太平興國初改義豐為彭陽至道三年自寕州來隸沿革表來觀金佛峽如入玉門闗王素石橋跨兩岫野叟嘗逺蹠旁有枰碁處云是神仙奕㳺師雄野石橋熈州倚郭一狄道郡號臨洮郡沿革天文井鬼分野禹貢雍州之域春秋戰國西羌所居秦置隴西郡漢因之晉析置狄道郡劉宋置武始郡後魏置臨洮郡後周廢隋復置後改金城郡唐天寳初置臨川寳應初陷于吐蕃號武勝軍本朝為鎮洮軍尋改熈州地理沿革表縣沿革狄道本漢置縣為隴西郡治晉屬狄道郡後魏至隋縣不改唐析置臨川縣屬蘭州又别置安樂縣後廢本朝始置狄道縣同上形勝嶽麓山在州東西平山在州西寳鼎山在州西卧龍山抹邦山碧井山幞頭山蓮花山常家山黎紫山馬寒山黒石山西傾山崆峒山俱在州境麝香坡在州西南洮河東崆河三岔河抺邦河打壁河結河邦金川玉潤泉石井泉三岔關打壁峪闗八角關十八盤關分水嶺闗摩雲嶺闗俱在州境夀亭侯廟在州東長城在州北鳴鶴城三足城俱在州界吐蕃所築輿地紀勝人物漢辛慶忌狄道人舉茂才為郎中遷車騎將軍其父武賢為酒泉太守人皆以為虎臣朝廷重之晉辛勉狄道人慱學有清操為侍中洛陽陷時劉聰欲以為光禄大夫固辭又賜酒米不受辛恭靖狄道人為河南太守姚興冦城固守百餘日後城陥厲色不屈安帝嘉奬𤣥請為咨議叅軍辛謐狄道人為散騎常侍長安陷劉聦拜官不受後不食而卒李舍狄道人舉孝㢘官至都督南北朝辛淵狄道人為驍騎將軍以義烈見稱兄}
