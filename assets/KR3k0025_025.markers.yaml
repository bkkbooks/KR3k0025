  - {type: variant, offset: 1161, length: 1, content: 產, WYG: 於此秦屬隴西郡漢置天水郡治平襄魏置秦州晉改漢陽為天水郡治上邽尋廢復置秦州宋齊復為天水郡隋廢郡為秦州大業初復為天水郡唐初復置為秦州天寳初改為天水郡乾元初復為秦州後移治成紀本朝因之地理沿革表縣沿革成紀本伏羲氏所生之地漢置縣屬天水郡晋以後皆因之天水唐置縣後廢本朝復置清水本漢舊縣屬天水郡晋屬畧陽郡後魏分畧陽置清水郡尋廢隋屬天水郡唐初置邽州於清水城尋廢州以縣屬秦州本朝仍舊伏羌本冀戎地秦武公伏冀戎置冀縣東漢于此置漢陽郡晉屬天水郡後魏改當亭縣後周改冀城縣隋改為伏羌縣兼置伏州尋廢州以縣屬秦州本朝為伏羌縣屬秦州地理沿革表形勝麥積山在州東南九十里狀如麥積岳平山在州西南上有龍王廟闗山在清水縣東即龍山也石皷山在伏羌縣南山有石皷不撃自鳴鳴則兵起大像山在伏羌縣西南上有石佛像寳盖山在清水縣北仙泉嶺在州東南其土中常出藥丸色黒相傳服之可以療病赤谷在州西南十二里鐵堂峽在天水東五里峽有石笋清翠清水在清水縣境縣因以名馬跑泉在州東四十里唐尉遲敬徳與畨將戰士卒罷敬徳馬忽跑出泉昇仙臺在州西南世傳老子于此昇仙瑞應寺在麥積山上隗囂宫在州東北杜甫草堂在州東五十里輿地紀勝人物周石作蜀成紀人孔子弟子唐贈石邑伯漢紀信成紀人項羽圍漢王滎陽信誑楚漢王得脱羽燒殺信李廣成紀人文帝時擊匈奴以功為散騎常侍武帝時為北平太守匈奴畏之號飛將軍隗囂天水人素有名好經書又謙恭下士名震四州三國姜維天水人仕昭烈累遷征西將軍封平襄侯唐李白成紀人唐宗室性倜儻善詩歌才思飄逸天寳初為翰林有詩集三十卷皇朝尹崇珂天水人為淄州刺史有善政後以功遷保信軍節度使劉仲武成紀人資貌雄偉累官東上閣門使以功累遷瀘川軍節度使張俊成紀人好騎射負才氣政和中以討河朔羣冦為都指揮使後以功累遷太傅封清河郡王輿地紀勝集麝香眠石竹鸚鵡啄金桃杜甫題麥積山自開茅屋趣只想竹窓眠歸谷山雲起侵籬澗水懸同上晨發赤谷亭艱險方自兹杜甫過赤谷詩峽形藏堂隍壁色立積鉄杜甫秦州城北寺勝跡隗囂宫月明垂葉露雲色度溪風同上本朝建隆中酋長上波了獻地為伏羌砦屬清水縣熈寧三年為伏羌城屬秦州沿革表路入青松翠靄間斜陽倒影下溪灣李師中題麥積山重臺猶在碧山層想象真仙為勉登蔣之竒題昇仙臺清甘一派古祠邊昨日親烹小鳯團却恨黄陵無品目煩君精鍳為當㸔㳺師雄題馬跑泉鳳翔府倚郭一外縣六天興岐山扶風郿寳雞麟游普潤郡號扶風岐陽郡沿革天文井鬼分野禹貢雍州之域周為岐周地春秋戰國為秦地始皇并天下以屬内史漢初更内史名中地郡後復故景帝分屬右内史武帝更曰右扶風與京兆左馮翊為三輔三國魏為扶風郡晋為秦國後魏置平秦郡又于郡東置雍城鎮後改鎮為岐州西魏為岐陽郡隋初為岐州大業初改為扶風郡唐初復為岐州天寳初改扶風郡至徳初改鳯翔郡尋改鳯翔府號西京寶應間罷京名屬闗内道五代時屬關西道本朝仍為府屬秦鳯路地理沿革表縣沿革天興春秋時為故雍秦置雍縣漢屬右扶風唐析置天興縣改省鳯翔屬天興岐山古岐周地漢為雍縣地唐時移治不一本朝屬鳯翔府扶風周為岐陽鎮漢為羙陽縣地唐貞觀中改為扶風縣本朝仍舊郿本秦縣漢屬右扶風西魏郿城縣唐改為郿縣屬鳯翔府本朝因之寳雞本秦陳倉縣漢屬右扶風唐至徳初因秦文公獲石雞之異改為寳雞縣本朝因之麟逰本漢右扶風之杜陽地隋置鳯棲郡尋因獲白麟更名麟逰縣唐初廢郡為麟州貞觀初州廢以縣屬鳯翔府本朝因之普潤本漢漆縣地隋為普潤縣唐并本朝仍舊同上形勝岐山在岐山縣東北文王時鳯鳴岐山即此雍山在府西北雍水所出故名梁山在岐山東太王去邠踰梁山即此陳倉山在寳雞東南上有石類山雞晨鳴山頭聲聞三十里茂陵山在扶風東北林壑秀美漢末馬超居此鳴鳯山在麟遊西舊傳常有鳯鳴其上周原在岐山東北詩曰周原膴膴即此青峰山在寳雞東南峰巒蒼翠故名龍尾坡在岐山東鄭畋嘗破巢兵于此磻溪石在寳雞東南即周太公釣處渭河在寳雞縣治東湖在府治東魚龍川在府境潤徳泉在岐山西北相傳時平則流亂則竭九成宫在麟逰縣西本隋仁夀宫唐太宗脩以避暑更名九成宫石鼻寨在寳雞東諸葛亮所築以拒郝昭紀勝人物周周公旦岐山人生有聖徳輔成王制禮作樂召公奭輔武王定天下又輔成王以成聖治白起郿人善用兵秦昭王用為左庶長戰勝攻取後封武安君漢井丹郿人通五經善談論隠居不仕當世髙之南北朝蘇孝慈扶風人少沉謹有器局為中侍上士後以功進位開府爵靈水縣公唐楊炎天興人性至孝父喪廬墓號慕時切有紫芝白雀之祥詔表其閭唐徳宗時拜相皇朝張載郿人舉進士為神州司法召為崇文殿校書同知太常禮院與執政不合告歸居横渠教人以禮闗西之士翕然宗之所著有東銘西銘正蒙諸書張戬載弟篤行不茍為一時師表闗中稱為二張輿地紀勝集西京無暑氣夏景似清秋江山通蜀國日月近神州李徳新水落魚龍夜杜甫題魚龍川詩蒼山入百里岸斷如杵臼層宫憑風迴岌嶪土囊口立神扶棟梁鑿翠開戸牖其陽産靈芝其隂宿牛斗題九成宫關山陵旦開石路無塵埃重門臨去壑連棟起崇隈王勃題大散關本朝乾徳初置崇信縣淳化中割崇信屬儀州熈寧五年廢乾州以好疇縣来𨽻沿革表聞昔周道興翠鳯棲孤嵐飛鳴飲此水照影弄毿毿扶風古三輔政事豈汝諳聊為湖上飲一縱醉後談並蘇軾題東湖詩聞道磻溪石猶存渭水頭蒼崖雖有跡大釣本無鈎山頭孤月耿猶在石上寒波暁更喧並題磻溪石翠鳯舊依山硉兀清泉長與世窮通蘇軾題潤徳泉詩此臺一覧秦川水不待傳經意已空題授經臺隴州倚郭一外縣三汧源汧陽吳山隴安郡號汧陽郡沿革天文井鬼分野禹貢雍州之域周為岐隴之地春秋屬秦國秦并天下屬内史漢為汧縣屬右扶風西魏改隴州因山為名後周省入岐州尋復置隋省入扶風郡復置隴東郡唐改汧陽郡後復為隴州治汧源縣本朝屬鳳翔路地理沿革表縣沿革汧源在隴州治東南後魏為汧隂縣隋改曰汧源唐本朝並為州附郭縣汧陽本漢隃糜縣地屬右扶風後周置汧陽郡及縣以古汧水之陽故名尋廢郡以縣屬隴州唐本朝仍舊吳山本漢隃麋縣地後魏置長蛇縣隋改吳山縣唐改華山縣尋復舊本朝因之隴安本唐汧陽縣地本朝置隴安縣同上形勝隴山在州西北六十里山髙而長其頂有泉吴嶽山在州南比諸山最秀異頂有龍湫小隴山在縣西岩障髙峻不通軌轍龍盤山在吴山縣東南為一州之勝西秦山在隴安北内有秦王試劒崖景福山在隴州西北亦名龍門山卧虎山在汧陽東以形似名天池溝在汧陽東水流不涸珍珠泉在汧陽南泉湧如珠故名汧陽閣在汧陽縣治隴亭在山旁八卦亭在州西北有仙人鍾離權洞賓遺跡苦寒亭在州西輿地紀勝人物周非子汧陽人伯益之後善養馬為孝王主馬于汧渭之間馬大蕃息秦使叙嬴氏之祀漢郭欽州人哀帝時為丞相以㢘直名唐段秀實汧陽人征討有功累拜涇原節度使贈太尉同上集吳嶽曉光連翠巘李善正我所思兮在漢陽欲往}
