  - {type: variant, offset: 1448, length: 299, content: 言以困平城吾已斬前使十輩言可擊者矣乃封敬為侯史本傳充國奏每上輒下公卿議臣初是充國計者什三中什伍最後什八西漢本傳所居無赫赫名去後常見思西漢何武傳要之死日然後是非乃定司馬遷傳王邑嚴尤謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也自雄之沒至今四十餘年其法言大行楊雄傳並西漢昔卞和獻寶以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善東漢班固傳陳寔為功曹中常侍侯覽託太守高倫用吏倫教署為文學寔知非其人懷檄請見曰此人不宜用而侯常侍不可違寔乞從外署倫從之鄉論怪其非舉倫後為人言曰吾前為侯常侍用吏陳君密持教還而於外白署比聞議者以此少之此咎由故人畏憚強禦陳君可謂過則稱己者也寔因自引愆聞者方歎息, WYG: ''}
