  - {type: variant, offset: 144, length: 1013, content: 語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也孟子先甲一日易後甲一日難楊先知客有為齊王畫者問之畫孰最難曰狗馬最難孰最易曰鬼魅最易狗馬人所知也旦暮於前不可類也故難鬼魅者無形無形者不可覩故易韓子禹能決江疏河以為天下興利不能使水西流稷能闢田墾草以為百姓力農而不能使冬生禾淮南子史鑴金石者難為功摧枯朽者易為力吏道以法令為師可問而知及能與不能自有資材何可學也通監言成事者以功著易顯謀幾初者以理隱難照東漢邳彤傳魏韓顯宗曰使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而就通監宋紀傳記忠於治世易忠於濁世難呂氏春秋集危於累卵難於上天易於反掌安於泰山選書儀天步晷而脩短可量臨淵揆水而淺深難察選演連珠夫力易強而有功也心難強而有智也韓文將新變故易持故為新難東野本朝道可以講習而知德可以勉強而能惟知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉東坡凝對策譬如江河之徙移順其所欲行而治之則易為功強其所不欲而復之則難為力東坡議學校貢舉狀子離婁之明公輸子之巧不以規矩不能成方圓師曠之聰不以六律不能正五音孟离婁上盜亦有道莊子公輸不能加於繩墨荀法行釋法而為治堯不能正一國使中正守法拙匠執規矩尺寸則萬不失一也韓非子無準繩雖魯班不能以定曲直淮南子斷木為棋梡革為鞠亦皆有法楊子史譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左襄三十不習為吏視已成事西漢賈誼傳謀事必就祖發政占古語西漢韓安國傳經若升高必自下若陟遐必自邇書太甲下君子將營宮室宗廟為先廄庫為次居室為後記曲禮下凡畫繢之事後素功周禮考工記凡家造祭器為先養器為後同上未有入室而不由戶者記禮軍君子之道譬如行遠必自邇譬如升高必自卑中庸物有本末事有終始知所先後則近道矣大學子曰繪事後素語八佾子堂上不糞則郊草不瞻矌芸荀強國注堂上猶未糞除則不可瞻視郊野之草也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此故先後上下不可不審淮南子說山訓史僑聞學而後入政未聞以政學者也左襄三十一譬猶行舟雖不橫截迅流然當漸靡而往稍向所趨然後得濟也通監集春兩潤木自葉流根文選將欲茂枝葉必先救根株白樂天本朝今世稱善草書者或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡書唐六家書後子人有亡鈇者意其鄰之子視其行步竊鈇也顏色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而抇其谷而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子說符篇互見心隨事後史臧文仲既歿其言立左襄, WYG: 卷}
