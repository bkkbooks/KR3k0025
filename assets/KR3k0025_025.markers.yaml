  - {type: variant, offset: 2739, length: 378, content: 月之交互入物理盈虛子臭腐復化為神奇神奇復化為臭腐莊子傳記麻姑謂王方平曰自接侍以來見東海三為桑田向間蓬萊水亦淺於往者會時略半也顏真卿麻姑壇記集悲泰山之為隍住城下地也楚辭繁華有憔悴堂上生荊杞阮嗣宗諫懷詩空桑之里變成洪川歷陽之都化為魚鱉劉孝標論循環飜覆迅若波瀾選廣絕交論人間百年物理千變名利寵辱之情立愛憎毀譽之跡生駱賓王東海波連天三度成桑田高岸高於屋斯須變溪谷天地猶尚然人情難久全夜半白刃讎旦來金石堅盧仝文本朝芙蓉芰荷之的歷幽蘭白芷之芬芳與天佳花美木列植而交陰此前日之蒼煙白露而荊棘也高甍巨桷水光日影動搖而下上其寬閑深靚可以荅遠響而生清風此前日之頹垣斷塹而荒墟也嘉時令節州人士女笑歌而管絃此前日之晦冥風雨鼪鼯鳥獸之嗥音也歐文昔者荒草野田霜露之所蒙翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毀相尋於無窮則臺之復為荒草皆不可知也東坡凌虛臺記世道如奕棋變化不容覆坡詩卷終, WYG: 五}
