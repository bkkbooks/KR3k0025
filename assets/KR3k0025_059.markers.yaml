  - {type: variant, offset: 393, length: 0, content: '', krp: 未有入室而不由户者記禮運君子之道譬如行逺必自邇譬如升髙必自卑中庸物有本末事有終始知所先後則近道矣大學子曰繪事後素語八佾子堂上不糞則郊草不瞻曠云荀強國注堂上惜未糞除則不可瞻曠郊野之草也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此故先後上下不可不審淮南子史僑聞學而後入政未聞以政學者也左襄三十一譬猶行舟雖不横截迅流然當漸靡而往稍向所趨然後得濟也通鑑集春雨潤木自葉流根文選将欲茂枝葉必先救根株白樂天本朝今世稱善草書者或不能真行此大忌也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡書唐六家書後事久論定子人有亡鈇者意其隣之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而相其谷而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子史臧文仲既没其言立左襄}
  - {type: variant, offset: 395, length: 0, content: '', WYG: 五子産從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之左襄三十子順曰民之不可與慮始乆矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及賢庸知謗乎通鑑子順曰先君相魯人誦曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰衮衣章甫實獲我所章甫衮衣恵我無私同上張湯既死家産直不過五百金昆弟諸子欲厚葬母曰湯為天子大臣被汙惡言而死何厚𦵏乎載以牛車有棺無槨天子聞之乃盡案誅三長史通鑑漢武紀劉敬使匈奴還言不可擊時漢兵已發上怒械繫敬至平城匈奴圍帝七日得解帝赦敬曰吾不用公言以困平城吾已斬前使十輩言可擊者矣乃封敬為侯史本傳充國奏每上輙下公卿議臣初是充國計者什三中什五最後什}
