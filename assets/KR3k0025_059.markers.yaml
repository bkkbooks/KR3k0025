  - {type: variant, offset: 1949, length: 1, content: 胡, WYG: 以一壺飱得士二人戰國䇿燕太子丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而嘆烏頭生白馬即生角秦王乃放歸吕氏春秋顧聰為縣吏數被鞭棰因逃墟墓之間有二黄衣人曰劉君頗憶昔日周旋否僕二人乃王粲徐幹君前身是劉楨因出袖中書曰此君集也聰省覽了然明悟乃攜集見孫宰宰大驚曰不可使劉公幹為小吏即以賓禮待之時謂死劉楨猶援得生顧聰牛僧儒幽怪録集離蔬釋屩而享膏梁人情駭觀如見買臣之綬梁劉孝儀謝啓尋聲得器虛求實歸唐文粹事在目前經殷鑒不逺在夏后之世詩伐柯伐柯其則不逺伐柯道不逺人記子目撃而道存莊子史馬援於帝前聚米為山谷指畫形勢開示衆軍所従道徑往來分析曲折昭然可睹帝曰敵在吾目中矣後漢互見黙㑹事莫至盡經罰弗及嗣書大禹謨殱厥渠魁脅從罔治書𦙍征無忿疾于頑無求備於一人書鴟鴞鴟鴞既取我子無毁我室詩君子不盡人之歡不竭人之忠以全交也記國君春田不圍澤大夫不掩羣士不取麛卵同上有餘不敢盡記君子以人治人改而止同上君子以義度人則難為人以人望人則賢者可知也矣記子釣而不綱弋不射宿語子仲尼不為己甚者孟子尅核太至則必有不肖之心應之莊子水至清則無魚人至察則無徒家語魯定公問於顔回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚昔舜巧扵使民而造父巧扵使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也并馬執轡銜體正矣步驟馳騁朝禮畢矣歴險致逺馬力盡矣然而其心猶乃求馬不已家語察見淵魚者不祥智料隠暱者有殃列子焚林而田後必無獸以詐遇民後必無民韓子焚林而獵愈多得獸後必無獸淮南子史御者不盡馬之情史記夫差智伯極武而亡西漢陸賈傳黄霸曰凡治道去其太甚者耳本傳物禁太甚馮奉世傳聰明流通者戒扵太察匡衡傳董卓曰窮冦勿逼歸衆勿追後漢皇甫嵩傳太剛則折至察無徒晉劉隗鼓繁氣易衰呌數力易竭通鑑宋太祖常獻曰為將當矢石時不可專勇通鑑梁武紀善惡太明亦有時而失通鑑唐太宗霆碎電射天怒也不能終朝聖人在上安有必世而怒人臣耶唐書吳武陵傳惡衣之垢而焚之患木之蠧而伐之其為害豈不益多哉通鑑唐昭宗傳記樂毅曰君子交絶不出惡聲忠臣去國不潔其名戰國䇿出妻令其可嫁同上晉雍季曰竭澤而漁豈不得魚而明年無魚焚林而田豈不得獸而明年無獸詐偽之道雖今可偷後將無獲非其長術也吕氏春秋集許其後效以補前非白樂天不當束縳之馳騁之使若牛馬然急則敗矣韓文致一物扵必窮之地君子不為杜牧之互見長厚物之精華天地所秘惜故蒙金以沙錮玉以璞瑰瑚之木必茂重溟夜光之珠必頷驪龍抉而不止不窮則禍文章亦然所取者亷其得必多所取者深其身必窮孫樵集本朝聖人之行法也如雷霆之震草木}
