  - {type: variant, offset: 377, length: 14, content: 悉用蕭曹故人郭伋亦譏南陽多顯, WYG: 發政占古語西漢韓安國傳事有次第經若升髙必自下若陟遐必自邇書太甲下君子將營宫室宗廟為先廐庫為次居室為後記曲禮下凡畫繢之事後素功周禮考工記凡家造祭器為先養器為後}
