  - {type: variant, offset: 1373, length: 3, content: 珠漸徙, WYG: 延齡罪慷慨引義申直贄等累日不止聞者寒慄城愈勵唐書本傳互入不可淺量及不可窺測賢者不得志扵今必取貴扵後古之著書者皆是也唐柳宗元傳傳記天漢二年恒山西國獻續弦膠及火浣裘帝受以付庫不知二物之妙也以上貢不竒稽留使未遣㑹帝幸華林苑射虎而弩斷弦使者従駕上膠一分使口濡以續弦帝驚乃使武士數人對掣終日不斷毛裘入水經月不沈入火不焦帝重之厚賂使者而遣之十洲記豫章之木生七年而材始辨廣志集春華雖美期扵秋實水璧雖澤期扵見日晉裴頠女史箴文仲沒而其言立子産終而遺愛存張曲江集桃李盛時雖寂寞雪霜多後始青葱李義山集一發之初雖失正鵠百鍊之後方辨精鋼白帖試玉要燒三日滿辨材須待七年期周公恐懼流言日王莽謙恭未簒時假使當時身便死一生真偽有誰知白樂天千陶萬灑雖辛苦汰盡狂沙始到金劉賔客福不在}
  - {type: page-break, offset: 1373, content: '', id: KR3k0025_WYG_059-26a, image: WYG0931/WYG0931-0668a.png}
  - {type: page-break, offset: 1373, content: '', id: KR3k0025_WYG_059-26b, image: WYG0931/WYG0931-0668b.png}
