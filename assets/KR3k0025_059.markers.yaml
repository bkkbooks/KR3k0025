  - {type: variant, offset: 2149, length: 6, content: 憂民亦似清吟, WYG: 事窮勢迫子鳥窮則啄獸窮則搏家語人窮則詐馬窮則佚同上魚相呴以濕相濡以沫莊天運此惟救死而恐不贍奚暇治禮義哉孟梁恵王上史鄭子家曰鹿死不擇音左文十七年鋌而走險急何能擇同上宋使華元夜入楚師登子反之牀曰寡君使元以病告曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能従也左宣十五年人窮則反本故勞}
