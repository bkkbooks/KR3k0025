  - {type: variant, offset: 2119, length: 0, content: '', WYG: 以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果扵殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴東坡文吕布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯吕布見誅於曹公而牢之見殺扵桓氏欒城文事同一體經同舟而濟則胡越不患乎異心畧例百姓足君孰與不足百姓不足君孰與足語子下貧則上貧下冨則上冨荀富國吳越之人同舟濟}
