  - {type: variant, offset: 511, length: 831, content: 盛北人晚度者朝廷悉以傖荒遇之雖復人才可施皆不得踐清塗通鑑宋紀崔浩曰文士褒貶多過其實同上南史宋高祖紀毀譽由己憎惡任情北史李德裕節制劍南西川吐蕃將悉怛謀以城降德裕既得之即發兵以守且陳出師之利牛僧孺居中沮其功命返於虜德裕終身以為恨唐書李德裕傳又牛僧孺傳云群臣請如李德裕策又云時皆謂僧孺橫議王洪義為侍御史於鄉里求瓜瓜主拒之洪義狀言瓜園有白兔縣官捕逐園苖盡矣同上酷吏傳不知仁義不分枉直惟利是嗜得賂則譽跖蹻為廉良咈意則毀龔黃為貪暴能用傾巧之智構成疑似之端通鑑唐憲宗武三思曰但於我善者則為善人於我惡者則為惡人耳積忤生憎積順生愛唐睿宗紀同上情有愛憎憎者惟見其惡愛者止見其善唐書魏證傳李振舉進士不中深疾縉紳之士言於全忠曰此輩常自謂清流宜投之黃河永為濁流通鑑唐昭宗紀王福畤有子勔勮皆著才名福畤嘗詫韓思彥思彥戲曰君有譽兒癖唐書孔循罵曰天下事一則任圜二則任圜圜乃何人五代史任圜傳傳記談經者惡聞服杜之嗤論史者憎言班馬之失史通劉禹錫謁李德裕曰曾得白居易文集否德裕曰吾於此人不足久矣其章何必覽焉北夢瑣言傅毅之於班固伯仲之間耳而固小之典論集人之情莫不欲耀其所能而黨其所近苟將得志則必快其所蘊微之集曲木忌日影孟東野本朝小篆之法自秦李斯斯之相秦焚棄典籍遂欲滅先王之法而至己之所作則為萬世不可朽之計何其愚哉歐公集怒移水中蟹愛及屋上烏坡詩私於家者隔墻樊而分比鄰私於己者隔形骸而分爾汝諸儒鳴道集子焉有君子而可以貨取乎孟子一介不以取諸人萬章上並孟子廉士重名莊子廉者常樂無求文中子史潔白而不受汙公羊莊二十四年注子罕曰我以不貪為寶左襄十三以不賄聞於諸侯昭公二十八廉如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下史蘇秦傳秋毫無所犯淮陰傳終廣之身為二千石四十餘年家無餘財終不言家產事李廣傳廉士寡欲易足西漢景帝紀志懷霜雪東漢禰衡傳使馬如羊不以入廄使金如粟不以入懷通鑑漢質帝紀張奐劉寵為會稽太守召為將作大匠老叟齎百錢送寵寵為人選一大錢東漢孔奮在姑臧力行清潔為眾人所笑或以為身處脂膏不能以自潤被召奮無資單車就路, WYG: 歎息}
