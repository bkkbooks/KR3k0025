  front:
  - {type: variant, offset: 0, length: 2, content: 私意, WYG: 欽定四庫全書記纂淵海卷五十九宋潘自牧撰論議部事難定論子仁義道徳常安術也然而未必不危也汙漫突盜常危術也然而未必不安也荀榮辱謂夏必長而麥枯冬必凋而竹栢茂又盛陽宜暑而夏未必無涼日也極隂宜寒而冬未必無暫温也抱樸子水主純冷而有温谷之湯泉火體宜熾而有蕭丘之寒焰重類應沈而南海有浮石之山輕物當浮而䍧柯有沈羽之流同上史晉司馬侯曰或多難以固其國啟其疆土或無難以䘮其國失其守宇齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦䘮之左昭四年孔子曰使仁者而必信安有伯夷叔齊使智者而必行安有王子比干孔子世家智者千慮必有一失愚者千慮必有一得西漢韓信傳馬或奔踶而致千里士或有負俗之累而立功名漢武帝紀韓明宗曰茍有竒才雖屠釣奴虜之賤亦可用之茍非其人雖三后之胄自墜扵皂𨽻矣後魏書夫吉凶之扵人猶影響也為善者得吉常多其不幸而罹扵凶者有矣為惡者未始不及扵凶其幸而免者亦時有焉新唐書集盛衰無常惟受所丁東都賦不見公與相起身自犂鋤不見三公後寒飢出無驢韓集事有定分}
