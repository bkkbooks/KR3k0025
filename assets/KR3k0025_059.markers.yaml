  - {type: variant, offset: 3, length: 8, content: 愛惡相攻易略例上, WYG: 死生有命富貴在天語顔淵子分定故也孟子楚王後車千乗非知也君子啜菽飲水非愚也荀天道兎走於街百人追之貪人具存}
