  - {type: variant, offset: 1417, length: 13, content: 宜歸二女田宅僮役應屬弘微一, WYG: 物乃為請吾苑下相國廷尉械繋之通鑑漢高紀晁錯為國逺慮禍反及身兩漢荆燕傳諸家子弟見光武絳衣大冠驚曰謹厚者亦復為之東漢光武紀諸葛亮卒于軍中長史楊儀整軍而出百姓犇告司馬懿懿追之姜維令儀反旗鳴鼓若將向懿懿斂軍退不敢偪諺曰死諸葛走生仲達懿聞之笑曰吾能料生不能料死故也通鑑魏明紀高蟬處乎輕隂不知螳蜋襲其後也晉書石苞傳蜂蠆作於懷䄂勇夫為之驚駭晉書顧禍生不意雖有智勇}
