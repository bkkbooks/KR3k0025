  - {type: variant, offset: 1382, length: 13, content: 到官革易前弊求民病利未踰歲, WYG: 不薄扵當世而榮於後世也韓文本朝譬如磨鑑不滅愈光一世之短萬世之長歐公祭蘇子美文良藥不甘口厥功見沉疴忠言初厭之事至每若何歐公集又如食橄欖真味久愈在同上後世茍不公至今無賢聖同上松柏生於山林其始也困扵蓬蒿厄扵牛羊而其終也貫四時閱千年而不改者其天定也東坡三槐堂記一時之屈萬世之信東坡王元之畵像賛序始以帝堯之聰姑試伯鯀終為孔子之聖不信宰予東坡責吕恵卿文人}
