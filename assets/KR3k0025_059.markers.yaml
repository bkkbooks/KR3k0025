  - {type: variant, offset: 1863, length: 3, content: 紀柳玭, WYG: 傳記蠧蝝仆柱梁䖟蚊走牛羊說苑集是胡越起於輦下而羌夷接軫也司馬相如諫獵互見禍生所忽梁之亂兮陸受其毒徐之難兮鄭罹其殃唐文粹互見連累魯酒致邯鄲之圍飛鳶生博者之禍劉賔客本持鄉曲譽肯料泥途辱劉長卿百鳥畏人林野宿翻遭網羅爼其肉韋應物解帶翻成結同上疾雷不及掩耳卒電不及瞑目大公六韜本朝夫以斧析薪可謂必克然不循其理則斧可折薪不可破白鷗生意在滄浪不謂風塵有網羅臨川集謾說罷侯能置守趙髙元不是封侯邵堯夫秦詩事出望外經枯揚生荑易魚網之設鴻則離之詩發彼小豝殪此大兕詩子有不虞之譽孟離婁下麗之姬艾封人之子也晉國之始得之也涕泣沾襟及其至於王所與王同牀食芻豢而後悔其泣也莊子史秦燔書而易}
