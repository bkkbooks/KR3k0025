  - {type: variant, offset: 2119, length: 0, content: '', krp: 以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果扵殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴東坡文吕布事丁原則殺丁原事董卓則殺董卓劉牢之事王恭則反王恭事司馬元顯則反司馬元顯吕布見誅於曹公而牢之見殺扵桓氏欒城文事同一體經同舟而濟則胡越不患乎異心畧例百姓足君孰與不足百姓不足君孰與足語子下貧則上貧下冨則上冨荀富國吳越之人同舟濟}
  - {type: variant, offset: 2120, length: 5, content: 水秋正深清, WYG: 中流遇風波其相救如左右手者所患同也孔叢子同舟渡海中流遇風救患若一所憂同也張羅而畋唱和不差者其利等也故體痛者口不能不呼心悅者顔不能不笑鄧析子史鄭伯謂燭之武曰鄭亡子亦有不利焉左僖三年輔車相依脣亡齒寒其虞虢之謂乎左僖五年蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也左傳左師曰大臣不順國之恥也左傳子産謂子皮曰子於鄭國棟也棟折榱崩僑將壓焉左襄三十君之卿佐是謂股肱股肱或虧何痛如之左傳叔孫氏之司馬􅞭戾言於衆曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也左昭二十五年成孟氏之保障也無成是無孟氏也左定十二夫魯齊晉之脣齒脣亡齒寒左哀八宋樂豫曰公族公室之枝葉也君去之則本根無所庇䕃矣左傳民實瘠矣君安得肥國語漢王曰吾翁即若翁漢書淮南王反令尹曰往年殺彭越前年殺韓信此三人者同體之人也自擬禍及身故反耳通鑑漢高紀枝葉落則本根無所庇䕃西漢劉向傳將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之後漢朱穆田蚡曰程不識李廣俱東西宫衛尉令衆辱程將軍仲孺獨不為李將軍地乎西漢淮史傳李固曰譬猶一門之内一家之事安則共其福慶危則通其禍敗通鑑東漢紀猶叩樹本百枝皆動也東漢李固傳互}
