  - {type: variant, offset: 1377, length: 4, content: 交趾郡界, WYG: 其身慶必流扵後嗣唐文粹大抵生則不遇死而垂聲者衆焉揚雄没而法言大興馬遷生而史記未振柳子厚集凡人可以言古不可以言今桓譚亦云親見揚子雲外貎不能動人安肯傳其書誠使博如莊周哀如屈原奥如孟軻壯如李斯峻如馬遷冨如相如明如賈誼専如揚雄猶為今之人則世之髙者至少矣由此觀之古之人未}
