  - {type: variant, offset: 1411, length: 5, content: 公私咸謂貲, WYG: 將數百之衆轉而攻秦斬木為兵掲竿為旗天下雲集響應贏糧而景従山東豪俊遂並起而亡秦族矣史記秦紀賈生論諸將皆以為得大將至拜大將乃韓信也一軍皆驚西漢韓信傳楚使者在九江方急責布發兵隨何直入坐楚使者上曰九江王已歸漢楚何人得發兵布愕然楚使者起何因說布曰事已構可遂殺楚使者無使歸而疾走漢并力布曰如使者教於是殺楚使者因起兵而攻楚通鑑漢高祖相國何以長安地陿上林中多空地棄願令民得入田毋收藁為禽獸食上大怒曰相國多受賈人}
