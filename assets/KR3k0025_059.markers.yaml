  - {type: variant, offset: 2131, length: 0, content: '', krp: 東漢紀慕容垂曰秦晉瓦合相待為彊一勝則俱豪一敗則俱弱晉武紀君臣猶父子也休戚同之唐高祖紀上常謂公卿曰茍其君愎諫自賢其臣阿諛順㫖君既失國臣豈能獨全如虞世基等諂事煬帝以保冨貴煬帝既弑世基等亦誅唐太宗紀傳記若同舟而濟濟則皆同其利敗則皆同其害太公六韜未見子富而父貧也通典事權不一經謀夫孔多是用不集發言盈庭誰敢執其咎詩子大道以多岐亡羊列子百醫守痛適足致疑而不能一愈也莊子大臣内權而魏命亂矣司馬宣王與曹爽權相須文中子史狐裘尨茸一國三公吾誰適従左僖五齊簡}
  - {type: variant, offset: 2133, length: 0, content: '', WYG: 在魯也闞止有寵焉及即位使為政陳成子常憚之諸御缺言扵公曰陳闞不可並也君其釋焉弗聽左哀十四楚子之為令尹也為王旌以朝尹無芋曰一國兩君其誰堪之左傳韓宣王欲兩用公仲公叔為政問扵繆留對曰不可晉用六卿而國分齊簡公用陳成子及闞止而見殺魏用犀首張儀而西河之外亡今君兩用之其多力者内樹黨寡力者藉外雄羣臣有内樹黨以驕主有外為交以削地君之國危矣通鑑周顯王紀九卿更進用事事不闗决扵丞相同上漢武紀政出多門勢位之家更相薦托有如互市晉恵紀刑法不一獄訟繁滋劉頌上䟽曰自近世以來法漸多門令甚不一吏不知所守下不知所避奸偽者因以售其情居上者難以檢其下同上二分政權鮮不階禍晉成紀時宰相無常官唯人主所與論議政事委以機宻者皆宰相也南史宋高祖紀張𢎞䇿曰一國三公猶不堪况六貴同朝勢必相圗齊東昏侯紀天下大權悉歸中宫黜陟生殺決扵其口天子拱手而已中外謂之二聖唐高宗紀斜封官皆不由兩省而授兩省莫敢執奏通鑑唐睿宗傳記百人舉瓢瓢必裂戰國䇿集一國三公十羊九牧陸宣文公事不相干史齊伐楚楚子使與師言曰君處}
