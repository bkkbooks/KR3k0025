  - {type: variant, offset: 16, length: 0, content: '', WYG: 文以為若敖氏}
  - {type: variant, offset: 16, length: 0, content: '', krp: 文以為若敖氏}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 鬼不食也人之性果善乎后稷之生也其母無災其始匐匍也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果}
