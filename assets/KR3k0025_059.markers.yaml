  - {type: variant, offset: 393, length: 0, content: '', WYG: 未有入室而不由户者記禮運君子之道譬如行逺必自邇譬如升髙必自卑中庸物有本末事有終始知所先後則近道矣大學子曰繪事後素語八佾子堂上不糞則郊草不瞻曠云荀強國注堂上惜未糞除則不可瞻曠郊野之草也染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事猶此故先後上下不可不審淮南子史僑聞學而後入政未聞以政學者也左襄三十一譬猶行舟雖不横截迅流然當漸靡而往稍向所趨然後得濟也通鑑集春雨潤木自葉流根文選将欲茂枝葉必先救根株白樂天本朝今世稱善草書者或不能真行此大忌也真生行行生草真如立行如行草如走未有未能行立而能走者也東坡書唐六家書後事久論定子人有亡鈇者意其隣之子視其行步竊鈇也顔色竊鈇也言語竊鈇也作動態度無為而不竊鈇也俄而相其谷而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子史臧文仲既没其言立左襄}
