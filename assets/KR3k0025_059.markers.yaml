  - {type: variant, offset: 1487, length: 5, content: 亦厚乎東漢, WYG: 識草書疑其告已罪行至渭南殺驛吏而逃通鑑唐太宗姚崇與張說同為宰相張銜崇崇病戒諸子曰張為人好服玩吾身没之後汝其陳吾平生服玩寳帶重器羅列殮帳前張若不顧汝家事産族無類矣若顧此吾屬無虞仍以神道碑為請既獲其文登時録進仍先礱石以待至便鐫刻張丞相見事常遲扵我數日之後必當有悔若徴碑文以刋削為辭當引使視其鐫仍告以昇聞上崇没張果至目其服玩者五四不數日文成叙述該詳後數日果遣使取本以為辭未周宻欲加刪改姚氏子引使者視其碑乃告以奏御使復命焉張悔恨撫膺曰死姚崇能筭生張說吾今日方知才之不及逺矣舊唐書}
