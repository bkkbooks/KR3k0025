  - {type: variant, offset: 1951, length: 0, content: '', WYG: 怒雖甚而歸於欲其生人主之罪人也如}
  - {type: variant, offset: 1951, length: 0, content: '', krp: 怒雖甚而歸於欲其生人主之罪人也如}
  - {type: variant, offset: 1952, length: 1, content: 質, WYG: 母之譴子孫鞭撻雖嚴而不忍致之死東坡美酒飲教㣲醉後好花看到半開時邵堯夫事當可繼經弁人有其母死而孺子泣者孔子曰哀則哀矣而難於繼也夫禮}
  - {type: variant, offset: 1952, length: 1, content: 質, krp: 母之譴子孫鞭撻雖嚴而不忍致之死東坡美酒飲教㣲醉後好花看到半開時邵堯夫事當可繼經弁人有其母死而孺子泣者孔子曰哀則哀矣而難於繼也夫禮}
  - {type: variant, offset: 1954, length: 1, content: 荊, WYG: 可傳也為可繼也故哭踊有節記檀弓上子魯法贖人取金於府子貢不取孔子曰自今以後魯不復贖人於諸侯矣家語史鼓繁氣易衰呌數力易竭通鑑宋太祖紀事有反報經老馬反為駒不顧其後詩言悖而出者亦悖而入貨悖而入者亦悖而出記大學子出乎爾者反乎爾者也孟子君之視臣如犬馬則臣視君如國人君之視臣如草芥則臣視君如冦讎同上人有送其妻適私家者道見桑婦悅而與言顧視其妻亦有招之者也列子菑人者人必反菑之莊子故商鞅立法而支解呉起刻削而車裂淮南子史楚靈王聞羣公子之死曰余殺人子多矣能無及此乎左昭十二商君亡至闗下欲舎客舎客舎人不知其是商君也曰商君之法舎人無驗者坐之商君曰為法之敝一至此哉去之魏史本傳衛鞅内刻刀鋸外深鈇鉞論囚渭水盡赤所逃莫之隠所歸莫之容身死車裂史記商君傳注禍莫大扵殺已降此將軍所以不得侯也史記廣傳三代之將道家所忌自廣至陵遂亡其宗同上義縦誅殺甚多上幸鼎湖甘泉道多不治上怒曰縦以我為不復行此道耶嗛之棄縦市鄉秦之禁適所以資豪傑而還自斃也前漢袁盎傳掩人者人亦掩之陵人者人亦陵之魏志王㫤傳程普殺降者數百人皆令投火即自病瘖而卒吳志庾懌以酒餉江}
