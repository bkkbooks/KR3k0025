  - {type: variant, offset: 371, length: 2, content: 留侯, krp: 嬋娟多命薄陳後山事難遥度經如匪行邁謀是用不得于道詩小旻箋不行而坐謀逺近是於道路無進於跬步史傳聞不如親見東漢馬援傳傳聞與指實不同懸筭與臨事有異通鑑趙充國曰百聞不如一見兵難遥度臣願馳至金城圖上方略西漢趙充國傳事有難易經天下國家可均也爵禄可辭也白刄可蹈也中庸不可能也記子曰貧而無怨難冨而無驕易語子挾㤗山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也孟子先甲一日易後甲一日難揚先知客有為齊王畫者問之畫孰最難曰狗馬最難孰最易曰鬼魅最易狗馬人所知也旦暮扵前不可類也故難鬼魅者無形無形者不可覩故易韓子禹能决江䟽河}
  - {type: variant, offset: 375, length: 1, content: 高, WYG: 天下興利不能使水西流稷能闢田墾草以為百姓力農而不能使冬生禾淮南子史鐫金石者難為功摧枯朽者易為力吏道以法令為師可問而知及能與不能自有資材何可學也通鑑言成事者以功著易顯謀幾初者以理隠難照東漢邳彤傳魏韓顯宗曰使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而說通鑑宋紀傳記忠於治世易忠於濁世難吕氏春秋集危於累卵難於上天易於反掌安於㤗山選書儀天步晷而修短可量臨淵揆水而淺深難察選演連珠夫力易强而有功也心難强而有智也韓文將新變故易持故為新難東野本朝道可以講習而知徳可以勉強而能惟知人之明不可學必出乎天資而蕭何之識韓信此豈有法而可傳者哉東坡擬對䇿譬如江河之徙移順其所欲行而治之則易為功强其所不欲而復之則難為力東坡議學校貢舉狀事皆有法子離婁之明公輸子之巧不以規矩不能成方圎師曠之聰不以六律不能正五音孟離婁上盗亦有道莊子公輸不能加於繩墨荀法行釋法而為治堯不能正一國使中正守法拙匠執規矩尺寸則萬不失一也韓非子無準繩雖魯班不能以定曲直淮南子斷木為棋捖革為鞠亦皆有法揚子史譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲左襄十三不習為吏視已成事西漢賈誼傳謀事必就}
