  - {type: variant, offset: 2789, length: 481, content: 竟不為立傳同上本傳庾炳之無文學性彊急輕淺既居選部好詬詈賓客且多納貨賂見人有燭盤佳驢無不乞丐同上宋太祖鄧琬性鄙闇貪吝既執大權父子賣官鬻爵使婢僕出市道販賣同上宋太祖魏右衛將軍元暉與侍中盧昶皆有寵於魏主而貪縱時人謂之餓虎將軍饑鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千匹次郡下郡減其半餘官皆有等差選者謂之市曹梁武紀並通鑑元脩義為吏部尚書唯事貨賄官之大小皆有定價呼為京師白劫後魏書魏收納爾朱榮之子金減其惡而增其善北史宇文述貪鄙知人有珍異之物必求取之富商大賈皆恩接之呼之為兒隋書盧坦曰其能積財者必剝下以致如其子孫善守是天富不道之人也不若恣其不道以歸於人新唐書本傳王伾以納賄為事作大匱貯金帛夫婦寢其上通鑑互見貪迷平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給同上唐明宗桑維翰權勢既盛四方賂遺歲積鉅萬五代史西京留守同平章事王守恩性貪鄙專事聚歛喪車非輸錢不得出城下至抒廁行丐之人不免課率或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返通鑑後漢隱帝集谿壑為之一罄川瀆為之中貧左太沖吳都賦交疇貨賄選孫皓書貪潤微財取犯朝憲陳子昂傳富己潤屋同上橐奸瀆貨, WYG: 魚窮爨鼎蟻懼捜穴}
