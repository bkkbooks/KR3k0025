  - {type: variant, offset: 3275, length: 458, content: 經晏子一狐裘三十年記檀弓下子曰以約失之者鮮矣語里仁禮與其奢也寧儉八佾史御孫曰儉德之共也左莊二十四鄭叔叚賦蟋蟀趙孟曰保家之主也襄二十七年季文子無衣帛之妾無食粟之馬無藏金玉無重器備相三君矣而無私積襄五並左衣不兼采食不重味西漢朱家傳朱慱不好酒色游宴自微賤至富貴食不重味同上朕為天下守財豈得妄用之哉通鑑漢殤帝紀魏高允兄弟惟草屋數間而被縕袍廚中鹽菜而已同上宋世祖長孫道生性清儉一熊皮鄣泥數十年不易同上宋太祖庾杲之清貧食唯有韭薤生韭雜菜任昉戲之曰誰謂庾郎貧食常有二十七種言三九也齊書昔楊震趙咨等咸以薄葬知真識去身貴速朽耳夫厚葬之家流于俗以奢靡為孝令死者戮尸暴骸可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩何用破貲徇侈乎吾亡歛以常服四時衣各一稱新唐書姚崇傳崔郾處庳陋至霖淖則容蓋而屐以就外位同上盧懷謹門不施箔會風雨至舉席自鄣日晏設食蒸豆兩器菜數杯而已同上傳記唐鄭餘慶清儉有重德一日忽召親友朝官數人會食呼左右曰處分廚家爛蒸去毛莫拗折頸諸人相顧以為必蒸鵝鴨之類已而下粟米飯一器蒸葫蘆一枚而已盧氏雜記集奉身如貧劉賓客尚儉經營少張文昌, WYG: ''}
