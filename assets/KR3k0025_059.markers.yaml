  - {type: variant, offset: 2131, length: 0, content: '', WYG: 東漢紀慕容垂曰秦晉瓦合相待為彊一勝則俱豪一敗則俱弱晉武紀君臣猶父子也休戚同之唐高祖紀上常謂公卿曰茍其君愎諫自賢其臣阿諛順㫖君既失國臣豈能獨全如虞世基等諂事煬帝以保冨貴煬帝既弑世基等亦誅唐太宗紀傳記若同舟而濟濟則皆同其利敗則皆同其害太公六韜未見子富而父貧也通典事權不一經謀夫孔多是用不集發言盈庭誰敢執其咎詩子大道以多岐亡羊列子百醫守痛適足致疑而不能一愈也莊子大臣内權而魏命亂矣司馬宣王與曹爽權相須文中子史狐裘尨茸一國三公吾誰適従左僖五齊簡}
