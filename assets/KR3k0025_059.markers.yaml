  - {type: variant, offset: 1371, length: 1, content: 紀, WYG: 救而甚銜之既誅顗導後料檢中書故事見顗表救己殷勤欵切執表流涕周顗事王導曰人言伐貴貴後人當思此憒憒世說在官無當時譽去後為人所思謝安傳晉王珣曰王陵廷争陳平謹黙但問歳晏何如耳通鑑陽城處諫諍官士望其死職天下益憚之及受命也諫官論事苛細紛紛帝厭苦而城寝聞得失且熟猶未肯言韓愈作諍臣論譏切之居位八年而人不能窺其際及裴延齡誣逐陸贄等帝怒甚無敢言城上䟽論}
