  - {type: variant, offset: 1979, length: 1, content: 清, WYG: 毅歎曰為法自弊一至於此遂縊而死通鑑晉安紀魏城陽王徽走至南抵前洛陽令冦祖仁家祖仁一門三刺史皆徽所引㧞以有舊㤙故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千户侯今日冨貴至矣乃怖徽云官捕將至令其逃於他所使人扵路邀殺之送首於兆兆夢徽謂已曰我有金二百斤馬百匹在冦祖仁家卿可取之兆既覺意所夢為實即掩捕祖仁徴其金馬祖仁謂人客告望風欵服云實得金百斤馬五十匹疑其隱匿依夢徴之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首}
