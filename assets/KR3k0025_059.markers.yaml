  - {type: variant, offset: 395, length: 0, content: '', krp: 五子産從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之左襄三十子順曰民之不可與慮始乆矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及賢庸知謗乎通鑑子順曰先君相魯人誦曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰衮衣章甫實獲我所章甫衮衣恵我無私同上張湯既死家産直不過五百金昆弟諸子欲厚葬母曰湯為天子大臣被汙惡言而死何厚𦵏乎載以牛車有棺無槨天子聞之乃盡案誅三長史通鑑漢武紀劉敬使匈奴還言不可擊時漢兵已發上怒械繫敬至平城匈奴圍帝七日得解帝赦敬曰吾不用公言以困平城吾已斬前使十輩言可擊者矣乃封敬為侯史本傳充國奏每上輙下公卿議臣初是充國計者什三中什五最後什}
  - {type: variant, offset: 396, length: 1, content: 將, WYG: 西漢本}
  - {type: variant, offset: 396, length: 1, content: 將, krp: 西漢本}
  - {type: variant, offset: 398, length: 0, content: '', WYG: 所居無赫赫名去後常見思西漢何武傳要之死日然後是非乃定司馬氏傳王邑嚴尤謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也自雄之沒至今四十餘年其法言大行揚雄傳昔卞和獻寳以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善東坡班固傳陳寔為功曹中常侍侯覽託太守髙倫用吏倫教署為文學寔知非其人懷檄請見曰此人不宜用而侯常侍不可違寔乞従外署倫從之鄉}
  - {type: page-break, offset: 398, content: '', id: KR3k0025_WYG_059-25a, image: WYG0931/WYG0931-0667c.png}
  - {type: variant, offset: 398, length: 0, content: '', krp: 所居無赫赫名去後常見思西漢何武傳要之死日然後是非乃定司馬氏傳王邑嚴尤謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也自雄之沒至今四十餘年其法言大行揚雄傳昔卞和獻寳以離斷趾靈均納忠終於沈身而和氏之璧千載垂光屈子之篇萬世歸善東坡班固傳陳寔為功曹中常侍侯覽託太守髙倫用吏倫教署為文學寔知非其人懷檄請見曰此人不宜用而侯常侍不可違寔乞従外署倫從之鄉}
