  - {type: variant, offset: 148, length: 1, content: 吾, WYG: 之道闇然而日章小人之道的然而日亡同上齊景公有馬千駟死之日民無得而稱焉伯夷叔齊餓于首陽之下民到于今稱之語季氏子以堯為君而有象以瞽瞍為父而有舜以紂為兄之子且以為君而有㣲子啓王子比干孟子生於憂患而死於安樂告子下生無一日之歡死有萬世之名列子以瓦注者巧以黄金注者昬莊子以瓦摳者巧以黄金摳者惽列子天下莫相憎扵膠漆而莫相愛於氷炭膠漆相賊氷炭相息也淮南子善㳺者溺善騎者堕淮南子或欲利之適足以害之或欲害之乃反以利之利害之反禍福之門户不可不察也淮南}
