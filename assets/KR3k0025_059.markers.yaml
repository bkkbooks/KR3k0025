  - {type: variant, offset: 2355, length: 322, content: 適齊見路有遺金有披裘而薪者季子呼薪者取彼地金薪者曰吾當夏五月披裘而薪豈取金者哉唐藝文類聚本朝御覽言出吳越春秋今考之不見冠萊公歷富貴四十年無田宅園邸魏野獻詩曰有官居鼎鼐無地起樓臺顧說湘山野錄經具乃貝玉書盤庾中惟貨其吉冏命子非其有而取之者盜也孟萬章下侵人自用謂之貪莊子貪者常憂不足文中子貪者難為惠譙子清訓互見無厭史臧哀伯曰官之失德寵賂章也郜鼎在廟章孰甚焉左威二羊舌鮒瀆貨無厭昭十三陳轅頗為司徒賦封田以嫁公女有餘以為己大器襄十一汝專利而不厭互見無厭並左必以賄死國語趙良曰非其位而居之曰貪位非其名而有之曰貪名史商鞅傳貪如狼西漢項籍傳大臣有不廉曰簠簋不飾同上賈誼傳貪饕不閑義理同上禮樂志素無廉聲同上息夫躬傳貪夫徇財賈誼傳並西漢陳湯素貪所鹵獲財物入塞多不法, WYG: ''}
