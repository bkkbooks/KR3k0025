  - {type: variant, offset: 13, length: 0, content: '', WYG: 之非者矣得兎為定分也積兎滿市過不能顧非不欲兎也分定之後雖鄙不争慎子互入事同體異史庶人之富者或累巨萬而貧者或不厭糟糠史平準書布帛尋常庸人不釋鑠金百鎰盜跖不摶非庸人之心重尋常之利深而盜跖之欲淺也史李斯傳竇姬入侍太后出宫人賜諸侯竇姬在行中姬家在清河欲如趙請其主遣宦者使置我趙籍中宦者忘之誤置代籍中至代王獨幸生兩男及文帝立姬立為皇后長男為太子史外戚世家漢文使善相者相鄧通相曰當貧餓死上曰能富通者在我何說貧於是賜通蜀道銅山得自鑄錢景帝立有告通徼外鑄錢案没入之竟不得一錢寄死人家西漢佞幸傳班彪曰饑饉流𨽻飢寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也通鑑萬人逐兎一人獲之貪者悉止分定故也東漢袁紹傳集浮生有定分飢飽豈可逃杜工部高馬達官厭酒肉此輩杼軸茅茨空同上中人愛富貴高士慕神仙神仙須有兼富貴亦在天白樂天或有終老者沈賤如泥沙或有始壯者飄忽如風花同上所賦有厚薄不可移者命鵬鷃高低事皆定茍無金骨相不列丹臺名同上顔回簞瓢纔自給肥膿不到口年不登三十張蒼幸愛浩無際妾媵填後房竟壽百餘歲白樂天互入分量不同事難詰問萬户侯須骨上來劉賔客貴人自貴貧自貧元㣲之集蓬累江湖坎􅇄中歳衣不襲突不黔彼乗堅驅良滅没扵康莊者復何人哉繇是而言可以言命權載之譬之求珠扵海而徑寸先得則餘皆決然罷去知竒寳之有歸也柳文髙流之為徐州刺史河决水繞城破一古墓得銘曰死後三百年背底生流泉賴逢高流之遷吾上髙原流之為造棺槨改𦵏之朝野僉載事難詰問經伯牛有疾子問之曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也語雍也子冉耕字伯牛以徳行著名而有惡疾子曰命矣夫家語彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽十八仲尼之徳不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位季札無爵扵吴田恒専有齊國夷齊餓扵首陽季氏冨扵展禽列子兎絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴淮南子夫顔回季路子夏冉伯牛孔子之通學也然顔淵殀死季路葅扵衛子夏失明冉伯牛為厲同上精神訓史伯夷叔齊積仁累行如此而餓死回也屢空而卒早殀盗跖暴戾恣睢横行天下竟以夀終史記伯夷傳伯竒孝而棄於親子胥忠而誅於君西漢諸葛豐傳長平坑卒未必盡犯三刑南陽貴人豈必俱當六合通鑑唐紀康澄上䟽曰雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長同上後唐明宗紀傳記天以至明為不可蔽乎日何為而食地以至安為不可危乎地何為而動說苑集日何為兮右轉天何為兮左旋磐石何神兮立天地巨靈何聖兮造山川螟何細兮師曠清耳而不聞離朱拭目而無見鵬何壯兮摶扶摇而翔九萬運海水而撃三千龜與蛇兮異其長短之質椿與菌兮殊其小大之年鐘可鳴兮應霜氣劔何伏兮動星躔列子何方兮御風而能行師丹何術兮驗火而登仙魯陽揮戈兮轉于西日陶侃折翼兮登乎上𤣥女何寃兮化精衛帝何恥兮化杜䳌唐文粹楊伯渾天賦以為天不知人事耶則周公有風雷之災宋景有三次之福以為知人事乎則楚昭有弗禜之應邾文無延朝之報曹植相論天意高難問杜工部自古聖賢多薄命奸雄惡少封公侯同上金張世禄原憲貧白樂天人生少滿百不得長歡樂誰謂天地心千齡與龜鶴同上愚者多貴壽賢者多賤殀謂天不愛人胡為生其質謂天果愛人胡為奪其年並同上當秦之敗亂得一士而可王何五百人之擾擾而不能脫夫子扵劍鋩抑所寳之非賢亦天命之有常韓愈祭田廣文自古賢者少不肖者多自省事以來又見賢者恒不遇不賢者比肩青紫賢者恒無以自存不賢者心得意滿賢者雖得卑位則旋而死不賢者或終眉壽不知造物者竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生壽殀耶未可知也韓文與崔書羣顔淵簞瓢纔自給肥膿不到口年不登三十張蒼幸愛浩無際妾媵填後房竟壽百餘歳白樂天互入分量不同事有定分叔魚之生也其母視之}
