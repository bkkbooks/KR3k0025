  - {type: variant, offset: 2118, length: 0, content: '', WYG: 本朝盧多遜貶朱崖李符見趙普言朱崖雖海外而水土無惡地春州在内至者必死普頷之後符坐貶宣州上怒未已普具述其事即以知春州半歳而卒談苑冦忠愍之貶時丁晉公馮拯在中書丁當秉筆初欲貶崖州丁忽自疑乃擬雷州丁之貶也馮遂擬崖州當時好事相語曰若見雷州冦司户人生何處不相逢歐公歸田録丁謂為相逐李迪時宋紱知制誥請罪名謂曰春秋無將漢法不道及謂貶朱崖宋猶當制誥即為之詞曰無將之戒深著扵魯經不道之誅難逃於漢法天下快之就川志石介既卒夏竦言扵英宗曰介實不死走北邊矣乃出字便發介棺以驗虛實其後夏竦之死呉奎曰夏竦多詐今死矣仁宗至其家命左右去竦面羃而視之世謂剖棺之與去面羃其為人主之疑一也亦所謂報應者耶東軒筆報曹丕當時不自恥敢謂舜禹傳之堯得之以此失亦此誰知三馬同一槽歐公}
  - {type: page-break, offset: 2118, content: '', id: KR3k0025_WYG_059-42b, image: WYG0931/WYG0931-0676b.png}
