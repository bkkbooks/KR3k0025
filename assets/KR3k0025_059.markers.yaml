  - {type: variant, offset: 212, length: 0, content: '', WYG: 藝文志千鈞浮而錙銖沈漢書柔能制剛弱能制強東漢臧宫傳桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯争與為伍者以其有徳也通鑑漢殤紀昔之為我哺乳之子孫者今盡是我飲血之冦讎也同上漢獻紀武后以易得人徳宗以猜失士唐書陸贄傳傳記昔秦攻齊令曰有敢去柳下季壠五十步而樵採者罪死不赦有能得齊王頭封萬户由是觀之生王之頭不如死士之壠戰國䇿馬援以薏苡興謗王陽以囊衣邀名續漢書有聲之聲不過百里無聲之聲延及四海說苑順帝時京師謡曰直如弦死道邊曲如鈎乃封侯風俗通集桑穀之妖反為福扵太戊大鳥之慶竟成禍扵帝辛李太白集堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖韓文原性自古多有以功徳得其位者不得常祀勾龍棄孔子皆不得位而得常祀然皆不如孔子之盛韓文孰謂少者殁而長者存强者殀而病者全耶韓祭文至柔反成堅常應篇商之王以桑穀昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黄犀死莽郤文富貴亦有苦苦在心憂危貧賤亦有樂樂在身自由白樂天集蘇武却生返鄧通終死飢杜牧之百勝難慮敵三折乃良醫劉賔客本朝紛華暫時好俯仰浮雲散淡泊味愈長始終殊不變歐公集物固有以安而生變兮亦有以用危而求安東坡賦吾平生多難嘗以身試之凡免我于厄者皆平生可畏人也擠我于險者皆異時可喜人也東坡凡有物必歸於盡時恃形以為固者尤不可長雖金石之堅俄而變壞至於功名文章其傳世垂後猶為差久東坡周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其冨貴而夫子之所與共貧賤者皆天下之賢才則亦足以樂乎此矣東坡稽天之潦不能終朝而一綫之溜可以穿石東坡注金無全巧竊發或中鵠山谷后皇蒔嘉橘中嵗多成枳同上白頭無故意異代有同音後山互見離合無親疎蔡天申得温公撰吕獻可墓銘以獻王安石天申初欲中温公安石得之掛壁間謂其門下士曰君實之文西漢之文也聞見録事有凑偶經遇主于巷易不自我先不自我後詩胡不自北胡不自南同上史遭陽九之阨百六之㑹西漢王莽傳集正丁厥時選新論適丁民之有是時也韓文事與願違子樹欲靜而風不停子欲養而親不待家語人莫不欲冨貴全壽而未有能免扵貧賤死殀之禍也心欲冨貴全壽而貧賤死殀是不能至其所欲至也韓非子日月欲明浮雲蓋之叢蘭欲秀秋風敗之文中子史晉羊祜曰天下不如意常十居七八晉本傳謝安雖受朝寄東山之志始末不渝及鎭新城造汎海之裝欲須經略粗定自江道還東遂遇疾篤自以本志不遂深自慨失晉書集值風雲之㑹時邁齒耋文選吴季重牋可惜歡娱地都非少壯時杜詩耳聾目昬後堂上調絲竹齒牙缺落時盤中堆酒肉彼來此已去外餘中不足白樂天榮名與壯齒相避如朝暮時命始欲來年顔已先去同上繫官扵朝願莫之遂韓文虛逢好陽艶其那苦昏懵元㣲之集本朝為政一年疾病半之東坡撰温公神道碑脂車秣馬試長道一日百里先自期不知中途有陷穽山髙日暮多棘茨欒城集書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開後山好景難逢良㑹少倦㳺録事無全美經苗而不秀者有矣夫秀而不實者有矣夫語子天地無全功聖人無全能萬物無全用列子故羽翼美者傷骨骸枝葉美者傷根莖能兩美者天下無之也淮南子堯無子舜無父不如堯父舜子也揚子史肥義曰吾欲全吾言安能全吾身史記趙世家予之齒者去其角傅其翼者兩其足西漢董仲舒傳遷之博物洽聞而不能以知自全同上}
