  - {type: variant, offset: 1408, length: 2, content: 鄉君, WYG: 海三為桑田向聞蓬萊水亦淺於往者㑹時畧半也顔真卿麻姑壇記集悲㤗山之為隍注城下地也楚辭繁華有憔悴堂上生荆杞阮嗣宗詠懷詩空桑之里變成洪川歴陽之都化為魚鼈劉孝標論循環飜覆迅若波瀾選廣絶交論人間百年物理千變名利寵辱之情立愛憎毁譽之迹生駱賔王東海波連天三度成桑田髙岸髙突兀斯須變谿谷天地猶尚然人情難乆全夜半白刃銛旦來金石堅盧仝本朝芙蓉芰荷之的歴幽蘭白芷之芬芳與夫佳花美木列植而交䕃此前日之蒼煙白露而荆棘也高甍巨棟水光日影動而下上其寛閒深靚可以荅逺響而生清風此前日之頺垣斷塹而荒墟也嘉時令節州人士女笑歌而管絃此前日之晦㝠風雨鼪鼯鳥獸之嘷音也歐文昔者荒草野田霜露之所蒙翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毁相尋扵無窮則臺之復為荒草皆不可知也東坡凌虛臺記世道如奕棋變化不容覆坡詩事出意表子螣蛇無足而飛荀子虞氏者登高樓臨大路設樂陳酒擊博樓上俠客相隨而行鳶適墜其腐䑕而中之俠客相與言吾不侵犯之而乃辱我必滅其家至期日之夜聚農積兵以攻㓕虞氏列子為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍然已盜至則負匱掲篋擔囊而趨惟恐緘縢扃鐍之不固也莊子魯酒薄而邯鄲圍同上藏舟於壑藏車於澤謂之固矣夜半有力者負之而走莊子毁譽萌生而不能照也淮南子日照天下蝕扵蟾蜍螣蛇㳺露而殆扵蝍蛆烏力勝日而勝扵鵻鴀同上楚㑹諸侯魯趙皆獻酒扵楚王楚王酒吏求酒於趙不與吏乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲淮南子史陳涉甕牖繩樞之子甿𨽻之人而遷徙之徒才能不及中庸非有仲尼墨翟之賢陶朱倚頓之冨躡足行伍之間而倔起阡陌之中率罷散之}
