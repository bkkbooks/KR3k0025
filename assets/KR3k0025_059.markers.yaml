  - {type: variant, offset: 369, length: 1, content: 隱, WYG: 救河橋之敗唐魏元志傳傳記意不並說事不兩隆盛於彼者必衰扵此長扵左者必短於右說苑父賢不過堯而丹朱傲子賢不過舜而瞽瞍拘兄賢不過舜而象傲弟賢不過周公而管叔誅臣賢不過湯禹而桀紂伐韓詩外傳四足者無羽翼戴角者無爪齒大戴禮易本命明月之珠不能無考不平也夜光之璧不能無纇史通取恱小人見嗤君子同上翟備五色而翔翥百步肌豐而力沉也鷹隼無采而翰飛戾天骨勁而氣猛也文心雕龍集尺有所短寸有所長智有所不明數有所不逮神有所不通椘辭甘𤓰抱苦蔕美棗生荆棘古詩瞽瞍清耳而無伶倫之察選連珠麗物苦偽醜器多牢魏阮瑀文質論良辰美景賞心樂事四者難併謝靈運擬魏太子郢中詩集序耀乗之珠不能無纇連城之璧不能無瑕陸質奏議人生半哀樂天地有順逆杜詩荔枝非名花牡丹無甘實白侍郎明月清風三五夜萬人行樂一人愁同上既竊時名又欲叨時之富貴使已造物者肯兼與之乎白傅集詞人命薄多無位戰將功高少有文同上以揚馬之才則不知教化以荀陳之道則不知文章柳見論文互見得此失彼同涉于川其時在風㳂者之吉泝者之凶同藝于野其時在澤伊穜之利乃穋之厄劉賔客光武出於支庻少康不及君親王㣲集日月髙明有時傾冥珠玉貞潔不免疵瑕歐陽詹文全功難持大明難堅日赫扵晝而乏清媚月皎扵夜而無温煦李文饒鵬鷹不傳之以馳驟驊騮不授之以鶱翥同上周勃霍光雖有勲伐而不知儒術枚臯嚴助善為文筆而不至廊廟貴則近禍冨多不仁同上及親之貴自古罕兼老莱則空耀綵衣多慚紱冕潘岳則惟稱壽酒固乏鼎彛司空表聖文賢不及富壽不及賢皇甫湜集荆璧不能無瑕隋珠不能無纇唐文粹譽髙千載道屈一時天乎與人才乎無命同上本朝君子之學或施之事業或見之文章而常患扵難兼也盖遭時之士功烈顯於朝廷名譽光於竹帛故其常視文章為末事而又有不暇與不能者焉至於失志之人窮居隠約苦心危慮而極力精思與其有所感激發憤惟無所居扵世者皆一寓於文辭故曰窮者之言易工也如唐之劉柳無稱於事業而姚宋不見扵文章彼四人者猶不能扵兩得况其下者乎歐文韓簡肅公文集百世一人千載一時惟時與人鮮儷常竒東坡祭司馬君實文惟有文為不朽與有子為不死雖冨貴壽考之人未有皆有此二者也東坡祭柳子厚文耕田欲雨刈欲晴去得順風來者怨若使人人禱輙遂造物應須日千變東坡詩故教窮到骨要使壽無涯同上漢之賈誼談論俊美止於諸侯相而陳平之屬實為三公唐之韓愈磊落終於京兆尹而裴度之倫實在相府夫陳平裴度未免謂之不文而韓愈賈生亦常悲於不遇盖人之於世美惡必有所偏而天之於人賦予亦莫能備欒城集互見事反所料従}
