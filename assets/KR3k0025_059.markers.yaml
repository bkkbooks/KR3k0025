  - {type: variant, offset: 371, length: 2, content: 留侯, WYG: 嬋娟多命薄陳後山事難遥度經如匪行邁謀是用不得于道詩小旻箋不行而坐謀逺近是於道路無進於跬步史傳聞不如親見東漢馬援傳傳聞與指實不同懸筭與臨事有異通鑑趙充國曰百聞不如一見兵難遥度臣願馳至金城圖上方略西漢趙充國傳事有難易經天下國家可均也爵禄可辭也白刄可蹈也中庸不可能也記子曰貧而無怨難冨而無驕易語子挾㤗山以超北海語人曰我不能是誠不能也為長者折枝語人曰我不能是不為也非不能也孟子先甲一日易後甲一日難揚先知客有為齊王畫者問之畫孰最難曰狗馬最難孰最易曰鬼魅最易狗馬人所知也旦暮扵前不可類也故難鬼魅者無形無形者不可覩故易韓子禹能决江䟽河}
