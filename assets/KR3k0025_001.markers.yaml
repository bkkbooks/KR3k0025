  - {type: variant, offset: 26, length: 0, content: '', WYG: 鬚眉而察理矣孔子見大水必觀焉曰夫水柔而無為也似徳}
  - {type: variant, offset: 26, length: 0, content: '', krp: 鬚眉而察理矣孔子見大水必觀焉曰夫水柔而無為也似徳}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 浩浩乎不屈似有道其赴百仭之谷不懼似勇主量必平似法盈不求溉似正發源必東似志並同上水之性乗勢而行乗衰而流淮南子向冬則凝而為氷向春則泮而為水上天則為雨露下地則為潤澤萬物不得不生百事不得不成水可循而不可毁女媧積蘆灰以}
