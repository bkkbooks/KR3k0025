  - {type: variant, offset: 1405, length: 1137, content: 於幽遠同上嘗欲大潤澤於天下一物枯槁以為身羞臨川集畢竟春風不揀擇隨開隨落自勻勻欒城集爭得大裘長萬丈與君都蓋洛陽城禾黍與稂莠雨來同日滋白侍郎子自其異者視之肝膽楚越莊德充符淮南子曰肝膽胡越史舟中之人盡為敵國史記吳起傳謝玄子煥煥子靈運才藻贍逸玄曰我尚生煥煥那得不生靈運晉書本傳集失之者肝膽楚越唐徐彥伯論本朝肝膽猶能楚越如東坡經孔子曰今吾於人也聽其言而觀其行語趙文子其言吶吶然如不出諸其口禮記檀弓下君子不以辭盡人禮記表記子曰君子不以言取人語衛靈公子孔子欲以言辭取人於宰我失之矣家語史相如口吃而善著書史記司馬相如傳倪寬敏於文口不能發明也史儒林伏生傳劉儒口訥而心辯後漢張釋之曰周勃張相如稱為長者兩人言事曾不出口通監漢文紀孔子曰吾以言取人失之宰予史仲尼弟子列傳文帝登虎圈問上林尉禽獸簿不能對嗇夫從旁代對響應亡窮詔拜嗇夫為上林令前漢張釋之傳楊愔典選多以言取人後魏書朱朴自言得為宰相月餘可致太平上以為然以朴同平章事朴為人庸鄙迂僻無他長制出中外大驚通監唐昭紀經趙文子其中退然如不勝衣中身也記檀弓下子孔子欲以容貌取人於子張改之矣家語澹臺有君子之容而行不勝其貌同上相形不如論心孫卿非相徐偃王之狀目可瞻焉不能俯視細物遠望纔見焉仲尼之狀面如蒙倛方相也周公之狀身如斷菑皋陶之狀色如削瓜閎夭之狀面無見膚傅說之狀身如植鰭如魚立也伊尹之狀面無須麋禹跳湯偏堯舜參牟子二瞳桀紂長巨姣美天下之傑筋力越勁百人之敵然身死國亡為天下大僇後世言惡則必稽焉今世俗之亂君鄉曲之儇子莫不美麗姚冶奇衣婦飾血氣態度擬於女子婦人莫不願得以為夫處女莫不願以為士然而中君羞以為臣中父羞以為子中兄羞以為弟中人羞以為友孫卿非相楚孫叔敖突禿長左而以楚霸棄公子高微小短瘠行若將不勝其衣而白公之亂誅白公定楚國如反手取同上史晉叔向適鄭鄭鬷蔑立於堂下一言而善叔向曰子少不颺子若不言吾幾失子矣左昭二十年太史公以為留侯魁梧奇偉至見其圖狀如婦人好女史記世家嚴延年為人短小精悍敏捷於事雖子貢冉有通於政事不能絕也西漢舜蓋重童子項羽又重童子西漢項籍傳何休質朴訥口而雅有心思東漢本傳互入深沈周爕生而欽頤折頞醜狀駭人其母欲棄之其父曰賢聖多有異貌興我宗者乃此兒也於是養之後漢本傳魏主指崔浩曰汝曹視此人尫纖懦弱不能彎弓持矛然其胸中所懷乃過於甲兵通監宋紀齊孟業為法曹王岳見其容貌短小笑而不言及尋斷決之處謂業曰卿決斷之明可謂有過軀之用三國典略侯景右足偏短弓馬非其長而多謀筭通監梁高祖虞世南外若不勝衣而中抗烈唐書本傳魏證容貌不逾中人而有膽略通監唐太紀太學博士周捨舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀劉璠梁典互入外表集子雖軀幹小老氣橫九州杜詩脈不病雖瘠不害脈病而肥者死矣韓文雜說雖長不滿七尺而心雄萬夫唐文粹伯倫之形不妨賢士白帖晏子短而相齊蔡義小而佐漢高柴至惡推至孝於孔門, WYG: 翠㣲並}
