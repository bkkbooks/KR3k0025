  - {type: variant, offset: 36, length: 0, content: '', WYG: 同上趙襄子狩於中山藉芿燔林有一人自石壁中出從燼上下襄子問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火列子日月出矣而爝火不息荘子指窮於為薪火傳也利害相摩生火甚多衆人焚和月固不勝火並同上施薪若一火就燥也荀子順風縱火紫芝與蕭艾俱盡同上火攻有五一曰火人二曰火積三曰火輜四曰火庫五曰火墜孫子史顓帝命火正黎司地史厯書武王渡河有火復于王屋流為烏周本紀神農氏作以火承木故為炎帝又曰堯封於唐木生火故為火徳前律厯志火南方揚光輝為明者也其於王者南面嚮明而治五行志漢承堯運旗幟尚赤叶於火徳髙祖賛炎帝承離執衡司夏注云火為禮禮者齊齊者平故為衡魏相傳火者陽之精也火性炎上人所用烹飪者也後五行志注棄法律逐功臣殺太子以妾為妻則火不炎上賢佞分别官人有事率由舊章敬重功勲殊别適庶如此則火得其性矣陳蕃等上疏曰火極隂之變也前始春而獄刑慘故火不炎上並同上荀爽曰火生於木木盛於火其徳為教其象在易之離在地為火在天為日夏則火王其精在天温煖之氣養生百木荀爽傳王劭上表請變火曰在晉時有人以洛陽火渡江者世世事之火色變青今温酒及炙肉用石炭木炭火竹火草火麻荄火氣味各不同以此推之新火舊火理應有異北史隋文帝時火為威徳隋天文志唐時清明賜火詳見寒食類傳記燧人為燧皇以火紀物尚書大傳黎為髙辛氏炎正以淳耀篤大天明地徳光照四海故名之曰祝融國語火之為言化也陽氣用事萬物變化白虎通火陽也君之象也同上連渾府有火井炎氣上昇以草焚之則煙騰火發故名焚臺郡國志宛渠國夜則琢然石以代日光火大如粟輝耀一室拾遺記燧明國有火樹名燧木有鳥名鴞啄樹則燦然火出同上岱山之東有圓淵孟夏月水常騰沸人掘地得焦石如炭往往有火焉同上火林山有火獸似䑕毛長二三寸績之可為火浣布十洲記崌山有鳥如鴞而赤身白首名曰竊指可以衛火山海經厭火國人首獸身火出口中同上冶師陶安公數行火術一旦散上紫色衝天湏臾朱雀止冶上曰安公安公冶與天通七月七日迎汝以赤龍龍至安公騎之東南而上列仙傳葛仙翁與客談話時天寒公因吐氣火赫然從口中出客皆減衣别傳積油萬石則自然生火博物志南方有炎火山四月生火十二月火滅草木皆生枝條至火然草木葉落取此木以為薪然之不盡以其皮績之為火浣布𤣥中記神丘有火穴光照千里括地圖陽燧以銅為之形如鏡照物則景倒向日生火古今注譬如鑚火兩木相因火出木盡灰飛煙滅圓覺經如取螢火燒須彌山終不能著同上溈山禪師參百丈師百丈云汝撥鑪中有火否師撥云無百丈深撥得少火以示之師發悟禮謝𫝊燈録集陶公矍鑠呵赤電回禄睢盱揚紫烟李白鄰火夜深明杜詩爐存火似紅同上皇甫補官古陸渾時當大冬澤乾源山狂谷狠相吐吞風怒不休何軒軒擺磨出火以自燔有聲夜中驚莫原天跳地踔顛乾坤赫赫上照窮崖垠截然髙周燒四垣神焦鬼爛無逃門韓詩逺火明連艘栁詩火晶燥露滋同上起來望南山山火燒山田㣲紅久如滅短熖復相連温庭筠本朝鑚木取火謂火生於木非也兩木相戛用力極則陽生金以石相軋則有火非特木也程子語問四時取火何為季夏又取一畨曰土王於未月故取之朱文公語燒嚮之空山歐陽公隂窮火自生風鳴燒入空城響五行居四時維火盛南訛並同上照山炬火落驚猿東坡野竹爆哀聲幽桂飄寃芬悲同秋照蟹快若夏撩蚊始知一炬力燒盡狐兔羣火牛入燕壘燧象奔吳軍並同上火災見災異部水火經水流濕火就燥易水火相息水在火上既濟火在水上未濟水火不相射水火相逮並易烹人以給水火之齊大祝執明水火而號祝挈壺氏皆以水火守之大司冦祀五帝則奉其明水火司烜氏掌火以燧取明火於日以鑒取明水於月祭祀共明水明火畫繢之事水以龍火以圜周禮水之於民也親而不尊火尊而不親記子産曰夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉左傳民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也論語子如水益深如火益熱孟子猶以一杯水救一車薪之火也民非水火不生活聖人治天下使有菽粟如水火並同上民之所急莫急於水火管子古之真人入水不濡入火不熱荘子水中有火乃焚大槐同上水火不積則輝潤不博荀子有氣水火而無生同上今夫水之勝火亦明矣然釡鬵間之水煎沸竭盡其上而火得熾盛於下水失其所以為勝者矣韓非子槁竹有火弗鑚不然土中有水弗掘無}
