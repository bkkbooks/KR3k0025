  - {type: variant, offset: 50, length: 3, content: 硎莊養, WYG: 宻水洩於深尚書大𫝊水性宜冷而有華陽温泉猶曰水冷冷者多也火性宜熱而有蕭丘寒熖猶曰火熱熱者多也十籖金錫之性一也以五月丙午日中鑄為陽燧以十一月壬子夜半鑄為隂燧則就日月出火出水捜神記手執陽燧日前求火手執方諸承月中水楞嚴經集女丁婦壬傳世婚一朝結讎奈後昆韓詩本朝水隂根陽火陽根隂濓溪通書有温泉而無寒火隂能從陽而陽不能從隂也邵康節語陽先隂故水先成隂後陽故火後成水者火之地火者水之氣火}
