  - {type: variant, offset: 325, length: 2, content: 飄風, WYG: 子縁木求魚同上為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斲而小之則王怒以為}
  - {type: variant, offset: 325, length: 2, content: 飄風, krp: 子縁木求魚同上為巨室則必使工師求大木工師得大木則王喜以為能勝其任也匠人斲而小之則王怒以為}
  - {type: variant, offset: 328, length: 0, content: '', WYG: 勝其任矣牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也方寸之木可使髙於岑樓並同上合抱之木生於毫末老子匠石之齊見櫟社樹其大蔽牛絜之百圍曰散木也以為舟則沈以為棺槨則速腐以為器則速毁以為門户則液樠以為柱則蠧是不材之木也故能若是之夀荘子櫟社見夢曰散人又惡知散木南伯子綦見大木焉曰此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂酲三日而不已曰此果不材之木也以至於如此其大也荘子行山見大木枝葉茂盛採木者止其傍而不取也問其故曰無所可用荘子曰此木以不材得}
