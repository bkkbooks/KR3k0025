  - {type: variant, offset: 2602, length: 6, content: 眇小丈夫耳史, WYG: 下也類君子而言野也有君不臣有友不友當暑衣裘吾豈取金者乎韓詩外傳集惟金三品揚越作貢五材之珍是謂國用郭璞賦沈其質兮五材或厥耀其光兮六府以修栁子厚賦蓐收肅金氣李白爽氣金天豁杜詩大暑運金剛同上鏗如撞羣金韓文金神所司刑同上本朝金氣與髙明山谷傾家取樂不論命散盡黄金如轉燭鄔裏金多曷足憑並同上土經百穀草木麗乎土易安土敦乎仁易惟荒度土功書任土作貢禹敷土兾州厥土惟白壤兖州厥土黒墳青州厥土白墳徐州厥土赤埴墳厥貢惟土五色揚荆州厥土惟塗泥豫州厥土惟壤下土墳壚梁州厥土青黎雍州厥土惟黄壤庶土交正錫土姓自服于土中並書適彼樂土詩徹我疆土江漢禹敷下土方長發大司徒以土㑹之法辨五地之物生以土宜之法辨十有二土之名物以土均之法辨五物九等考工}
