  - {type: variant, offset: 23, length: 0, content: '', WYG: 放乎四海有本者如是水信無分於東西無分於上下乎今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉觀於海者難為水觀水有術必觀其瀾並孟子水者地之血氣如筋脈之通流者}
