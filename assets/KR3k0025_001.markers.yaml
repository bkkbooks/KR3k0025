  - {type: variant, offset: 24, length: 1, content: 未, WYG: 管水萬物之凖也同上上善若水水善利萬物而不争處衆人之所惡故幾於道矣老水天下之至柔馳騁天下之至剛同上孔子觀於呂梁懸水三十仭流沬三十里列長於水而安於水性也白公曰若以石投水如何孔子曰吳之善㳺者能取之曰若以水投水如何孔子曰淄澠之合易牙嘗而知之白公曰人固不可與㣲言也並同上人莫鑑於流水而鑑於止水荘水净則明燭鬚眉平中準大匠取法焉水之性不雜則清莫動則平鬱閉而不流亦不能清水之積也不厚則負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也秋水時至百川灌河涇流之大兩涘渚涯之間不辨牛馬並同上積水成淵蛟龍生焉荀水能載舟亦能覆舟其萬折也必東水至平端不傾心術如此象聖人譬如盤水正錯而勿動則湛濁其下而清在上是以}
