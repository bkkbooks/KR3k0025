  - {type: variant, offset: 16, length: 0, content: '', WYG: 行失其度隂氣來干陽韓詩本朝太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉周子太極圖天以陽生萬物以隂成萬物通書五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮同上無極之前隂含陽也有象之後陽分隂也康節觀物外篇本一氣也生則為陽消則為隂陽主闢而出隂主翕而入並同上隂陽之精互藏其宅横渠正蒙五行部五行五徳附經天一地二天三地四天五地六天七地八天九地十易水火金木土穀惟修書大禹謨有扈氏威侮五行甘誓鯀陻洪水汨陳其五行洪範一曰水二曰火三曰木四曰金五曰土疏云天一生水地二生火天三生木地四生金天五生土此其生數也地六成水天七成火地八成木天九成金地十成土謂之成數也水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘並同上或審曲面勢以飭五材記播五行於四時人者五行之秀氣人者五行之端也聖人五行以為質先王道五常之行並同上天生五材民並用之左傳地有五行用其五行並同上子黄帝立五行以正天命管木與木相摩則燃金與火相守則流荘水生木木生火火生土土生金金生水子生母曰義母生子曰}
