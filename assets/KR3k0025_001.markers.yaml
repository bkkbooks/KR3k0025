  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷一宋潘自牧撰混元部太極混沌附經易有太極是生兩儀疏云老子道生一此太極是也易夫禮必本於太一記子有物混成先天地生老太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也氣形質具而未相離故曰渾淪𤣥牝之門是謂天地之根並列未有天地自古以固存神鬼神帝生天生地在太極之先而不為髙在六極之下而不為深荘子太初有無無有無名一之所起有一而未形儵與忽時相與遇於混沌之地混沌待之甚善儵與忽謀報混沌之徳曰人皆有七竅以視聴食息此獨無有嘗試鑿之日鑿一竅七日而混沌死並荘天地未形馮馮翼翼洞洞􅀈􅀈故曰大昭天地未剖隂陽未判四時未分萬象未生汪然平静寂然澄清莫見其形古未有天地之時唯象無形窈窈𡨕𡨕芒芠漠閔澒濛鴻洞莫知其門淮南太極初搆清濁始分抱朴夫子其與太極合徳神道並行乎文中史太極元氣函三為一前律厯志太極中央元氣故為黄鍾太極運三辰五星於上經元一以統始易太極之首也並同上太極者混沌之時曚昧未分日月含其輝八卦隠其神天地混其始聖人藏其真晉紀瞻傳傳記太極形質已具帝王世紀氣形之初謂之太始同上先有太初後有太始形兆既成名曰太素渾渾相連視之不見聴之不聞白虎通集邃古之初孰傳道之上下未形何由考之楚詞天問太易之始太初之先馮馮沉沉奮搏無端揚雄賦太極之先兩儀始分有沈而奥有浮而清班固典引覽太極之初化陸機賦嘉太極之開元傅𤣥賦太極剖判造化權輿左思賦太極之始混沌未分曹子建七啓在昔太初𤣥黄混并混沌鴻濛兆眹未形曹子建論易謂之太極春秋謂之元老子謂之道阮籍論無極之極漭彌非垠柳文天對本始之茫誕者傳焉鴻靈幽紛曷可言焉同上混沌無形氣奚從生兩儀元一是能分太極焉得離張萃詩本朝無極而太極太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也濓溪太極圖道為太極又曰心為太極邵子語弄丸餘暇時往時來自注云丸謂太極無名公序分而言之一物各具一太極也合而言之萬物統體一太極也朱文公太極圖注太極只是天地萬物之理在天地則天地中有太極在萬物則萬物中各有太極語録太極只是箇極好至善底道理人人有一太極物物有一太極太極便是性動静隂陽是心金木水火土是仁義禮智信化生萬物是萬事並同上不言無極則太極同於一物而不足為萬化根本不言太極則無極淪於空寂而不能為萬化根本答陸梭山書昆侖大無外旁薄下深廣隂陽無停機寒暑互來往皇羲古神聖妙契一俯仰不待窺馬圖人文已宣朗混然一理貫昭晰非象罔珍重無極翁為我重指掌感興詩吾觀隂陽化升降八紘中前瞻既無始後際那有終至理諒斯存萬世與今同誰言混沌死幻語驚盲聾同上造化經乾道變化各正性命易天地變化草木蕃易可以賛天地之化育則可與天地參矣記子造化者其巧妙其功深造化之所始者謂之生並列子來有病将死子犁往問之與之語曰造化又将奚以汝為将奚以汝適以汝為䑕肝乎以汝為蟲臂乎大冶鑄金金踴躍曰我且必為鏌鎁夫大冶必以為不祥之金今一犯人之形而曰人耳人耳夫造化者必以為不祥之人今一以天地為大鑪以造化為大冶惡乎往而不可哉許由謂意而子曰夫堯既已黥汝以仁義而劓汝以是非矣意而子曰庸詎知夫造化者之不息我黥補我劓使我乗成以隨先生耶萬物皆出於機皆入於機並荘造化者之攫援物也譬猶陶人之埏埴也淮南子史制作侔造化後張衡傳含元包一甄陶品類後郅惲傳五氣陶鑄萬物流形隋書傳記上知造物無物而下知物物之自造也郭象荘子序集大鈞播物坱圠無垠賈誼賦天地為鑪造化為工隂陽為炭萬物為銅同上太極造化權輿左思賦造化為工匠天地為陶鈞潘尼賦洪鈞陶萬類張茂先八荒開夀域一氣轉鴻鈞杜詩茫茫大造間鈞陶力大哉並同上本朝造化無情不擇物歐陽公神工自爐鞴東坡造化何如童子戲未識造物意茫然同一爐爐鎚一手賦形殊造物無心莫怨渠細㸔造物真無物春到江南花自開同上元氣天地之氣附經天地絪緼萬物化醇易易有太極疏云元氣混而為一是太初太一也同上孟春天氣下降地氣上騰記天氣上騰地氣下降記夫禮必本於太一家語注云太一元氣也同上天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地温厚之氣始於東北而盛於東南此天地之盛徳氣也此天地之仁氣也鄉飲酒子太易者未見氣也太初者氣之始也列伏羲得之以襲氣母注云取元氣之本荘道始生虛廓虛廓生宇宙宇宙生元氣淮南人稟二儀之氣列天者統元氣焉文中子史至治之世天地之氣合以生風天地之風氣正十二律定前律厯志黄鍾紀元氣之謂律黄者中之色故陽氣施種於黄泉孳萌萬物為六氣元也故以黄色名元氣焉元氣轉三統五行於下太極元氣函三為一極中也元始也行於十二辰並同上元氣剖判剛柔始分清濁未位後天文志注明帝升靈臺望元氣本紀助順元氣含養庶類郎顗傳斗斟酌元氣運平四時李固𫝊天地者生萬物以資始冲氣以為和原元氣之本求天地之根晉紀瞻傳候天地之氣以知四時寒暑唐律歴志元氣者天地之始萬物之所王政之大端王政莫先於安人故安人則隂陽和隂陽和則天地平天地平則元氣正陳子昂傳調元氣治隂陽和元氣睦人倫並同上元者氣之始也劉蕡䇿傳記元氣初分重濁為地萬物所陳列也説文兩儀未分其氣混沌河圖元氣無形洶洶濛濛同上嵗在攝提元氣肈始三五歴紀天地者元氣之所生萬物之所自焉禮統地者元氣生萬物之祖也白虎通元者包含道徳搆掩乾坤橐籥元氣張衡元圖有巨靈者偏得元神之道故與言氣一時生混沌開元遁甲圖麗山氏分布元氣各生次序産生山谷同上崐崙山上有金臺玉闕亦元氣之所合天帝之居治處十洲記集元氣始化揚雄賦大者含元氣纎者入無倫解嘲混元運物流不處兮班固賦茫茫元氣誰知其終曹子建七啓皓天元氣也皓然而已無他物焉楊泉物理論含元氣之絪緼王文考賦稟元氣於靈和郭景純賦大象無形元氣為母杳兮冥兮陶冶衆有孫楚石人銘元氣氤氲二儀開闢李義府箴龎昧革化惟元氣存柳文天對渾然而中處者世謂之元氣天説元氣大癰痔也並説文本朝乾道成男坤道成女二氣交感化生萬物濓溪太極圖隂陽經一隂一陽之謂道隂陽不測之謂神隂陽合徳而剛柔有體分隂分陽迭用柔剛並易以天産作隂徳以地産作陽徳以隂陽為端隂陽相摩天地相盪天地訢合隂陽相得並記冬無愆陽夏無伏隂左傳獨隂不生獨陽不生獨天不生三合然後生穀梁傳子隂陽同度曰道管春夏秋冬隂陽之推移也時之短長隂陽之利用也日夜之易隂陽之化也同上萬物負隂而抱陽冲氣以為和老能隂能陽能柔能剛列天地之道非隂則陽同上隂陽相照相蓋相治荘冦莫大於隂陽無所逃於天地之間同上隂陽大化風雨博施萬物各得其和以生各得其養以成荀含隂吐陽而萬物和同者徳也淮南天地之襲精為隂陽隂陽和而萬物生隂陽之陶化萬物並同上史陽常居大夏而以生育長養為事隂常居大冬而積於空虛不用之處以此見天之任徳不任刑也前董仲舒䇿天地設位垂日月分隂陽定四時列五行以示聖人翼奉封事陽施其氣隂化成物律厯志隂陽調和萬物咸得其宜東}
