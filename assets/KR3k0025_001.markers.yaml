  - {type: variant, offset: 329, length: 3, content: 朝驟雨, WYG: 其天年匠人曰我善治木曲者中鈎直者應繩並同上林木茂而斧斤至焉木成䕃而羣鳥息焉荀子玉在山而木潤构木必待隠木括揉矯然後直木直中繩揉以為輪其曲中規雖有槁暴}
