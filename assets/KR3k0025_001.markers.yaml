  - {type: variant, offset: 1018, length: 320, content: 大也不曰人遺弓人得之何必楚也家語自其同者視之萬物皆一也莊德充符史封略之內何非君土食土之毛誰非君臣左昭十年四海之內若一家通監秦紀六合怡怡比屋為仁壹天下之眾異齊品類之萬殊參差同量坏冶一陶後漢崔駰傳集四海皆兄弟誰為行路人蘇武詩和氏之璧焉得獨耀於郢握夜光之珠何得專玩於隋掌天下之資當與天下共之劉越石書惟同大觀萬殊一轍盧子諒書澤無不漸螻蟻之穴靡遺齊故安陸碑桃李有奇質樗櫟無妙姿皆承慶雲沃一種春風吹歐陽行周六合栖霖雨萬物無凋枯李太白安得廣廈千萬間大庇天下寒士皆懽顏杜詩聖人一視而同仁韓文原人視外猶視中一家猶一人韓文誠使剌史不私於其民觀察使不急於其賦剌史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也歛不可以獨急如是而政不均令不行者未之有也, WYG: 肯但空心並}
