  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0025_CHANT_001-1a.9}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 引流清派分歐陽公春水弄春沙清漣對女郎水天本虛静雲收風波止始見天水性晩宿南溪上森如水國秋東坡細細龍鱗生亂石馮夷窟宅非梁棟小風吹水碧鱗開積雨浮舟減石鱗共坐船中那得見乾坤浮水水浮空水作玉虹流水性固自清不清或撓之繫悶豈無羅帶水流水無心自入池堂中隠幾人心與水俱凉漸㸔逺水緑生漪差向清漪照病顔垂餌得清甘可嚥不可潄金沙玉礫燦可數古鏡寳奩寒不動山下碧流清似銀水光㶑灔如浮碧千尋掛雲闕萬頃含風灣㣲風不起鏡面平泗水茫茫鴨頭緑瑠璃百頃水仙家並同上夢臨秋江水魚鰕避窺瞰山谷栖遲林丘下欲濯無塵纓同上至潔而納汙此水真君師陳后山春水瓜頭緑同上火經天與火同人火在天上大有山下有火賁澤中有火革木上有火鼎山上有火旅易燥萬物者莫熯乎火離為火同上火炎崑㟠玉石俱焚天吏逸徳烈于猛火書𦙍征若火之燎于原盤庚予若觀火同上無若火始􅆋􅆋洛誥如火烈烈則莫我敢曷詩宫正春秋以木鐸修火禁司爟掌行火之政令四時變國火以救時疾季春出火民咸從之季秋内火民亦如之注云春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火司烜氏中春以木鐸修火禁于國中並周禮孟夏盛徳在火仲夏無用火南方後聖有作修火之利范金合土以炮以燔以烹以炙季春出火為焚也並記夫兵猶火也弗戢将自焚也左傳古之火正或食於心或食於味以出内火炎帝氏以火紀故為火師而火名並同上鑽燧改火論語子舜使益掌火益烈山澤而焚之孟}
