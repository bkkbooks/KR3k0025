  - {type: variant, offset: 19, length: 1, content: 吾, WYG: 専母勝子曰制子勝母曰困淮南火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之唯造化者物莫能勝也木生於亥壮於卯死於未三辰皆木也火生於寅壮於午死於戌三辰皆火也土生於午壮於戌死於寅三辰皆土也金生於巳壮於酉死於丑三辰皆金也水生於申壮於子死於辰三辰皆水也並同上五行不相沴則王者可以制禮文中史五常五行之象史天官書黄帝得土徳黄龍地螾}
