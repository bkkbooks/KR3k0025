  - {type: variant, offset: 29, length: 0, content: '', WYG: 揚清激濁蕩去滓穢安也柔而難犯弱而難勝勇也導江疏河惡盈流謙智也尸子方折者有玉圓折者有珠清者有黄金龍淵有玉英同上史九黎亂徳顓帝受之金生水故為水徳又曰湯伐桀金生水故為水徳前律厯志顓帝乗坎執權司冬注云水為智智者謀謀者重故為權魏相傳鄭崇曰臣心如水本傳水性下流人所用灌溉者也後五行志注簡宗廟不禱祠廢祭祀逆天時則水不潤下郊祀天地禱祈神祗謹其齋戒致其嚴敬至發號施令亦順天時如此則水得其性矣同上孔若思座右置止水一石明自足意北史本傳趙軌受詔入朝父老送之曰公清如水請酌一杯水奉餞本傳酈道元歴覽竒書注水經本傳唐新豐鸚鵡谷水清世𫝊云此水清天下平唐書古者水官不失職則能辨味與色潜而出合而更分皆能識之唐許敬宗答髙宗傳記水者天地之包幕五行之始焉元命苞水之為言隂化沾濡白虎通𤣥洲澗水如蜜服之長生河圖浮天載地髙下無不至萬物無不潤𤣥中記髙前之山有水甚寒而清帝臺之漿水也山海經非水無以準萬里之平非水無以通逺任重也尚書大傳臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭述征記魏賈􅟚有蒼頭嘗令乗小艇於黄河中接河源水以釀酒名崑崙觴酒之芳味世中所絶酉陽雜俎取若下水以釀酒醇美俗稱若下酒十道記楚水第一晉水最下水記濉渙水其波文皆五色名文章水又曰續水述異記唐祕書省中水最佳名祕水茶録谷簾水在廬山披嵓而下陸鴻漸第其水為天下第一同上山水上江水次井水下陸羽茶經劉伯芻以楊子江為第一惠山石泉第二虎丘寺井第三丹陽寺井第四揚州大明寺井第五松江第六淮水第七李秀卿以廬山康王谷水第一惠山石泉第二蘄州蘭溪石下水第三扇子峽蝦蟇口水第四虎丘寺井第五廬山招賢寺方橋潭第六楊子江南零水第七洪州西南瀑布第八桐栢淮源第九廬山龍池山頂水第十丹陽寺井第十一揚州大明寺井第十二漢江中零水第十三玉虛洞香溪水第十四武關西水第十五松江水第十六天台千丈瀑布第十七柳州圓泉第十八嚴陵灘水第十九雪水第二十張又新煎茶水記集承液而生雲雨涌凝而為甘泉委輸而作四海决導而流百川王彪之賦水懐珠而川媚陸士衡賦空水共澄鮮文選秋水共長天一色王勃滕王閣賦長流玉琴聲李白緑水解人意為余西北流誰道此水廣狹如一匹練水色倒空青流水無情去水色緑且明令人思鏡湖水影弄月色清光奈愁何乃是天鏡中分明盡相似並同上碧色動柴門杜詩春水船如天上坐琉璃漫汗泛舟入馮夷撃鼓羣龍趨湘妃漢女出歌舞逺水兼天净清漣曳水衣水流心不競湍駛風醒酒秋水清無底並同上湍圍亦騰聲韓詩浩浩浮秋浸碧溜滴玲瓏映波鋪逺錦並同上水碧無塵埃柳詩蔽空素彩列激浪寒光聚的皪沈珠淵鏘鳴捐珮浦同上本朝坎水也一始於中有生之最先者也程子}
