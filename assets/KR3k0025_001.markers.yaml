  - {type: variant, offset: 21, length: 0, content: '', krp: 夏得木徳青龍止於郊草木暢茂商得金徳銀自山溢周得火徳有赤烏之符秦文公出獵獲黒龍此}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 水徳之瑞封禪書公孫臣上書曰始秦得水徳今漢受之當得土徳土徳之應黄龍見後三嵗黄龍見成紀同上劉向父子以為庖犧始受水徳其後以水傳子而漢得火徳故髙祖始起神母夜號著赤帝之符前律厯志漢代秦繼周木生火為火徳同上五行者五常之形氣也藝文志五行異位千變萬化繁育庶類五行志五行見象於天也為五星分位於地也為五方行於四時也為五徳稟於人也為五常播於音律為五聲發於文章為五色而揔其精氣之用謂之五行唐五行志洪範九疇其説不相附屬而劉向為五行傳乃取五事皇極庶徵附於五行以為八事皆属五行歟同上傳記黄帝問曰太虛寥廓五運回薄衰盛不同損益相從願聞平氣何如而名也岐伯曰木曰敷和火曰升明土曰備化金曰審平水曰静順帝曰其不及奈何岐伯曰木曰委和火曰伏明土曰卑監金曰從革水曰涸流帝曰太過何謂岐伯曰木曰發生火曰赫曦土曰敦阜金曰堅成水曰流行素問天有五行水火金木土分時化育以成萬物其禪謂之五帝古之王者易代改號取法五行太昊配木炎帝配火黄帝配土少昊配金顓帝配水其次以所行之次轉相承也家語堯以火徳王色尚黄舜以土徳王色尚青夏后氏以金徳王色尚黒殷人以水徳王色尚白周人以木徳王色尚赤勾芒為木正祝融為火正蓐收為金正𤣥𡨕為水正后土為土正並同上地之五成所以生殖也國語先王以土與金木水火雜以成百物同上五行者天地之性白虎通火日外景金水内景大戴禮木為青龍火為朱雀土為勾陳金為白虎水為𤣥武真仙𫝊本朝陽變隂合而生水火木金土五氣順布四時行焉濓溪太極圖五行之生也各一其性同上木曰曲直能既曲而反申也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不能得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火燃而不能離也蓋得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之濡故水火相待而不害鑠之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺也横渠正蒙五行者質具於地而氣形於天者也以氣而語其行之序則曰金水木火土而木火陽也金水隂也以質而語其生之序則曰水火木金土而水木陽也火金隂也朱文公太極圖説五行雖各一其性然一物又各具五行之理語録水經地中有水師地上有水比水洊至習坎山上有水蹇澤無水困木上有水井風行水上渙澤上有水節並易水流而不盈坎者水也正北方之卦也説卦潤萬物者莫潤乎水坎為水溝瀆並同上人無於水監書酒誥禹平水土吕刑揚之水詩沔彼流水朝宗于海沔水稻人以瀦蓄水以防止水萍氏掌國之水禁匠人善溝者水潄之善防者水滛之並周禮水曰清滌孟秋完隄防以備水潦孟冬盛徳在水水無當於五色五色不得弗章水煩則魚鼈不大並記今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉中庸水易狎而難親也易以溺人表記潢汙行潦之水左傳顓頊氏以水紀故為水官而水名同上知者樂水論語子水之就下沛然誰能禦之孟子滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足徐子曰仲尼亟稱於水曰水哉水哉何取於水也孟子曰源泉混混不舍晝夜盈科而後}
