  - {type: variant, offset: 1, length: 6, content: 興未艾經如川, WYG: 朔傳隂陽和調物乃茂成三老上書陽以博施為徳隂以不専為義梁皇后紀隂陽和則天地平元氣正唐陳子昂傳和隂陽以養物劉蕡䇿傳記四時隂陽者萬物之根本也素問隂陽者天地之道也萬物之綱紀變化之父母生之本始神明之府也同上隂陽和萬物序白虎通集明明闇闇惟時何為隂陽三合何本何化屈原天問一隂一陽天地}
