  - {type: variant, offset: 2560, length: 0, content: '', WYG: 公庭樹忽改色秋風動其枝翠樹鬱如弄芬芳弄嘉月翠緑相森茂春榮忽已衰夏月換初秀古木卧山腰危根老盤石老枿亂發争春妍清霜一夕零衆木少堅勁並同上散木支離得自全交柯蚴蟉欲相纒不須更説能鳴鴈要以空中得盡年}
  - {type: variant, offset: 2560, length: 0, content: '', krp: 公庭樹忽改色秋風動其枝翠樹鬱如弄芬芳弄嘉月翠緑相森茂春榮忽已衰夏月換初秀古木卧山腰危根老盤石老枿亂發争春妍清霜一夕零衆木少堅勁並同上散木支離得自全交柯蚴蟉欲相纒不須更説能鳴鴈要以空中得盡年}
  - {type: variant, offset: 2562, length: 1, content: 詩, WYG: 因嗟大不為梁棟又嗟賤不為薪槱穉杉戢戢三千本且作凌雲合抱㸔樹林幽翠滿山谷拱把不知數㑹當出千尋並同上木鳴端自語陳后山金經二人同心其利斷金易金作贖刑厥貢惟金三品若金用汝作礪並書大輅南金泮水職方氏東南曰揚州其利金錫大司冦入鈞金束矢於朝然後聴之職金入其金錫于兵器之府考工記吳粤之金錫鑠金以為刃攻金之工六築冶鳬㮚段桃築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量段氏為鏄桃氏為刃㮚氏改煎金錫則不耗周禮天子之六工曰金工孟秋盛徳在金内金示和也並記貢金九牧左傳子金聲而玉振之也金聲也者始條理也孟子湯以荘山之金禹以歴山之金贖民之賣子者管子葛盧山發而出金蚩尤取之為劒鎧雍狐山發而出金蚩尤取以為㦸堯之治天下也猶金之在鑪􅔤冶者之所鑄並同上齊人有欲金者清旦適鬻金之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人惟見金列子大冶鑄金金踴躍曰我且必為鏌鎁夫大冶必以為不祥之金荘子金之性沈託之於舟則浮淮南子舜藏千金於嶄嚴之山所以塞貪鄙之心也同上覿君子者問鑄人不問鑄金揚子荆南麗水之中生金韓非子}
