  - {type: variant, offset: 38, length: 3, content: 始達孟, krp: 熱氣生火積隂之寒氣為水並同上水測之而益深窮之而益逺火用之而彌明宿之而彌壮揚子煙生於火而煙鬱火氷生於水而氷遏水故煙㣲而火盛氷泮而水通劉子火炎上而受制於水水趍下而得志於火文中子史黄帝節用水火史本紀水火者隂陽之餘氣也晉天文志趙綽為隋齊州别駕水火不與民交北史拯民於水火之中措之於袵席之上通鑑唐太宗王義方曰天子置}
