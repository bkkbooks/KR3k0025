  - {type: variant, offset: 2571, length: 5, content: 羽史仲尼弟, WYG: 土生金故為金徳號曰金天氏前律厯志顓帝五世生鯀鯀生禹舜嬗以天下土生金故為金徳同上金西方萬物既成殺氣之始也五行志文帝作露臺召匠計之直百金上曰百金中人十家之産也本紀少昊乗兊執矩司秋注云金為義義者成成者方故為矩魏相傳好戰攻輕百姓飾城郭侵邊城則金不從革出軍行師把旄杖鉞誓士衆抗威武動静應誼説以犯難民忘其死如此則金得其性矣後五行志金之為言禁也言秋時萬物隂氣所禁止物也后西羌傳序太宗謂魏徵曰公獨不見金在鑛何足貴耶善冶鍛而為器人乃寳之朕方自比於金以卿為良匠而加礪焉唐魏徵傳傳記衆口鑠金國語金有五色西方之行也説文金者少隂有中和之性白虎通體性堅剛半隂半陽五音為商五常為義五事為言非土不成同上衆口鑠金者在五行二曰火五事二曰言言與火宜故曰鑠金論衡延陵季}
