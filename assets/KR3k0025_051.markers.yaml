  - {type: variant, offset: 780, length: 0, content: '', WYG: 必駟馬稱身不必狐裘無辱不必受福甘餐不必食肉山谷易足子榮啟期行乎郕之野鹿裘帶索鼔琴而歌孔子問曰先生所以為樂者何也期對曰吾樂甚多而至者三天生萬物唯人為貴吾既得為人是一樂也男女之别男尊女卑吾既得為男是二樂也人生有不見日月不免襁褓吾既得已行年九十五矣是三樂也貧者士之常死者人之終處常得終吾何憂哉家語六本篇饑者易為食渴者易為飲孟鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹莊孔子謂顏淵曰家貧居卑胡不仕乎對曰不願仕囘有郭外之田五十畆足以給饘粥郭内之田十畆足以為絲麻鼔琴足以自娛所學於夫子者足以自樂也囘不願仕莊子蟪蛄不羨大椿而欣然自得斥鷃不貴天地而榮願以足莊齊物論北宫子文其裋褐有狐貉之温進其茂菽有稻粱之味庇其蓬室若廣厦之䕃乘其篳輅若文軒之飾終身逌然庖饌班錯所享不過一味華葢結駟列道警蹕其容不過容膝並列子渇飲河水入腹不過壺漿淮南子史鄭𤣥曰家今差多於昔東漢本傳寒之於衣不待輕暖饑之於食不待甘㫖西漢食貨糲粱之食藜藿之羮夏日葛衣冬日鹿裘西漢司馬遷傳馬援謂兄子少游曰士生一世但取衣食裁足乘下澤車御欵段馬為郡掾吏守墳墓鄉里稱善人斯}
