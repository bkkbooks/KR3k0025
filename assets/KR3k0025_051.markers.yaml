  - {type: variant, offset: 781, length: 78, content: 屈于俗雖有所應其於爵祿也汎然受悠然辭使人君常有所慕企怊然如不足其可貴也末焉者資槁薄樂山林內審其才終不可當世取舍故逃丘園而不返使人常高其風而不敢加訾焉唐書隱逸, WYG: 矣致求盈餘但自苦耳東漢本}
