  - {type: punctuation, offset: 101, content: 《, id: KR3k0025_CHANT_051-bkkpn37}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 天也並孟當死不懼在窮而戚知命也列子知命知其不可奈何而安之若命唯有徳者能之子貢曰古之得道者窮亦樂通亦樂所樂非窮通也適來夫子時也適去夫子順也安時而處順哀樂不能入也孔子曰我諱窮久矣而不免命也求通久矣而不得時也並莊子樂天知命吾何憂窮理盡性吾何疑文中子史知命不憂乗流則逝得坎則止並漢賈誼傳君子得時則大行不得時則龍蛇遇不遇命也揚雄傳黄憲隤然其處順東漢本傳郭璞遇顏含欲為之筮含曰自有性命無勞蓍龜人禀命有定分非智力所移唯應恭已守道而闇者不逹妄意僥倖徒虧雅道無關得喪乃以其意命弟子愿著定命論以釋之宋世祖李嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳唐明宗傳}
  - {type: page-break, offset: 101, content: '', id: KR3k0025_WYG_051-2a, image: WYG0931/WYG0931-0390a.png}
  - {type: variant, offset: 101, length: 0, content: '', krp: 天也並孟當死不懼在窮而戚知命也列子知命知其不可奈何而安之若命唯有徳者能之子貢曰古之得道者窮亦樂通亦樂所樂非窮通也適來夫子時也適去夫子順也安時而處順哀樂不能入也孔子曰我諱窮久矣而不免命也求通久矣而不得時也並莊子樂天知命吾何憂窮理盡性吾何疑文中子史知命不憂乗流則逝得坎則止並漢賈誼傳君子得時則大行不得時則龍蛇遇不遇命也揚雄傳黄憲隤然其處順東漢本傳郭璞遇顏含欲為之筮含曰自有性命無勞蓍龜人禀命有定分非智力所移唯應恭已守道而闇者不逹妄意僥倖徒虧雅道無關得喪乃以其意命弟子愿著定命論以釋之宋世祖李嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳唐明宗傳}
  - {type: variant, offset: 102, length: 1, content: 儒, WYG: 知命之士見利不動臨死不怨劉向新序集委命順理與物無患張華鷯賦鷦齊萬物兮超自得委性命兮任去留嵇康琴賦歸老任乾坤杜詩進取果由命不由趨險難元稹集貧賤非不惡道在何足避富貴非不愛時來當自致寘懐齊寵辱委順隨}
  - {type: page-break, offset: 102, content: '', id: KR3k0025_WYG_051-2b, image: WYG0931/WYG0931-0390b.png}
