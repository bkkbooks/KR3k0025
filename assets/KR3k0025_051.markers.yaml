  - {type: variant, offset: 104, length: 2, content: 隱居, WYG: 止時邪命邪吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能㝠至順而合大和客問樂天憂病否樂天知命更無憂並白侍郎集悠悠天地間委順無不樂張九齡集日有糲食歲有粗衣饑寒獲同骨肉相保此亦熙熙委順之外益自安也白傅集何去何從罷龜䇿之臧否自開自落任天地之榮枯唐文粹本朝齒髪付天公缺壊不可修坡詩待時經君子藏器於身待時而動尺蠖之屈}
  - {type: page-break, offset: 104, content: '', id: KR3k0025_WYG_051-3a, image: WYG0931/WYG0931-0390c.png}
  - {type: variant, offset: 104, length: 2, content: 隱居, krp: 止時邪命邪吾其無奈彼何委邪順邪彼亦無奈吾何夫兩無可奈何然後能㝠至順而合大和客問樂天憂病否樂天知命更無憂並白侍郎集悠悠天地間委順無不樂張九齡集日有糲食歲有粗衣饑寒獲同骨肉相保此亦熙熙委順之外益自安也白傅集何去何從罷龜䇿之臧否自開自落任天地之榮枯唐文粹本朝齒髪付天公缺壊不可修坡詩待時經君子藏器於身待時而動尺蠖之屈}
  - {type: variant, offset: 108, length: 0, content: '', WYG: 信也龍蛇之蟄以存身也並易有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也語子雖有鎡基不如待時孟史姑務修徳以待時乎譬如農夫是穮是蓘雖有饑饉必有豐年並左戢鱗潛翼思屬風雲晉宣帝紀王猛斂翼待時候風雲而後動王猛傳陸法和曰凡人取果宜待熟時不撩自落梁世祖元魏于謹曰州郡之職昔人所鄙台鼎之位須待時來北史本傳集貴賤貧富不可求兮正身履道以俟時曹大家東征賦雖無𤣥豹姿且隱南山霧謝朓詩仲尼旅人文王明夷茍非其時聖賢低眉李太白天馬長鳴待駕馭杜詩未展從東駿空戢圖南翼駱賓王勉哉耘其業以待歲晩收填窓塞户慎勿出暄風暖景明年日並韓詩低囘且向籠間宿奮迅終須天外飛白樂天潛龍須待一聲雷杜牧之六翮未因風武伯蒼龍蟠泥中未有雲不能生彼昇天翼張文昌夭矯太空鱗曾為小泉蟄孟東野夫豫章珠璣鏌鎁毛嬙終不慮隱櫃撓櫃一作樻撓一作燒帷之為患而臃腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳權徳輿蟄龍三冬卧老鶴萬里心唐文粹冬去氷須泮春來草自生馮道本朝徘徊且垂翼㑹有秋風時歐公集龍不冬躍螢能夜飛君子小人各有其時邵堯夫不知命經不知命無以為君子也語子怨夭折者不知命者也怨貧窮者不知時者也並列子史屈原至江濱懐石自投汨羅以死史記本傳知足經孟獻子曰畜馬乘不察於雞豚伐氷之家不畜牛羊百乘之家不畜聚斂之臣君子仕則不稼田則不漁分無求多並記子知足常足知足不辱老子知者不為不足莊子福莫長於無禍荀子勸學士不通財貨國君不息牛羊錯質之臣不息雞豚大夫不為長圃荀名進身退天之道也管子天下有至富而非金玉也適情知足則富矣淮南子錦繢紛華所服不過温體三牲太牢所食不過充腹知以身取節者則知足矣茍知足則不累}
