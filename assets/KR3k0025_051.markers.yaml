  - {type: variant, offset: 975, length: 0, content: '', krp: 雨薄田足以具􅊡粥讀書談道足以自樂願明公正身以治天下使時和年豐通也受賜多矣不願仕也隋髙祖蔬食以當肉安步以當車無罪以當貴清靜以自虞戰國策集客徒欲朱丹吾轂不知一跌將赤吾之族也文選解嘲布衣可終身寵禄豈足賴阮嗣宗詠懐寧與燕雀翔不隨鴻鵠飛同上茍無凌風翮徘徊守故林陸士衡詩老龜豈羨犧牲飽蟠木寧爭桃李春我本蓬蓽人鄙賤遽泥沙並白侍郎囘瞻順流輩誰敢望同昇元稹集寧為宇宙閒吟客怕作乾坤竊禄人杜荀鶴鳳凰不憎山栖蛟龍不羞泥蟠王無功逍遥飲啄安涯分何假扶摇九萬為王維集身世比行舟無風亦暫休敢言終破浪唯願穢乘流錢起詩却厭長裾曳寧辭短褐穿張丞吉詩驥路未伸雀羅無愠司空表聖文本朝或告狄青當推狄梁公為逺祖青謝曰青出田家少為兵安敢祖梁公哉聞見録茹蔬飯糗不願餘樂城集石守道為舉子時王瀆侍郎以盤餐遺之石謝曰甘脆者亦介之願也但日享之則可若止得一餐則明日將何繼乎朝享膏粱暮厭粗糲人之常情也介所以不敢當倦遊録安貧經君子固窮語衡門之下可以棲遲詩貧而無諂貧而無怨難並語子貧者士之常處常何憂哉列列子窮有饑色有客言於鄭子陽子陽令官遺之粟列子辭莊史揚雄家產不過十金無儋石之儲晏如也西漢本傳藜藿有八珍之甘蓬蓽有藻梲之樂晉書葛洪傳陶潛環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也晉本傳傳記顏蠋曰安步以當車蔬食以當肉戰國策大雪丈餘洛陽令出行見人家皆除路而袁安門無行路謂安死矣令㸔之見安偃臥問之答曰大雪人人皆餓不宜干人後漢注見汝南先賢傳集含歡谷汲行歌負薪陶潛自祭文灌園鬻蔬以供朝夕之膳潘安仁閒居賦食先人之徳無厚生之財陳子昂故園生事微韋應物長安布衣誰比數反掃衡門守環堵長貧任婦愁手自移蒲栁家纔足稻粱並杜詩活計縱貧長淨潔白傅集筆耕為養傭書成學任彥昇表素尚寧知貴清談不厭貧温飛卿本朝貧家何以娛樂但知抺風批雨一本作抺月批風東坡集家徒四壁書侵坐山谷陋巷一生顏氏樂清風千古伯夷貧程顥和邵康節安樂窩不安分經志大心勞所以求者非其道也詩士志於道而恥惡衣惡食者未足與議也語子弓人而恥為弓矢人而恥為矢孟量力經貧者不以貨財為禮老者不以筋力為禮禮陳力就列不能者止語子短綆不可以汲深荀子史量力而動其過鮮矣冉求曰小人慮材而言量力而共者也並左皇甫規對曰徳不稱禄猶鑿墉之趾以益其高豈量力審功安固之道哉漢紀集量力守故轍陶淵明大厦既焚不可洒之以淚長河一决不可障之以手庾信連珠本朝載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登阪險而馬不躓欒城集不量力經徳薄而位尊知小而謀大力少而任重易多見其不知量也語子猶以一杯水救一車薪之火挾泰山以超北海並孟代大匠斵希有不傷手矣老猶涉海鑿河而使䖟負山也莊夸父不量力欲逐日於嵎谷之際道渴而死北山愚公年九十面山而居懲山北之寒出入之迂聚室而謀曰畢力平之可乎髪引千鈞並列子螳蜋怒臂以當車轍莊譬以盲辨色以聾辨聲荀以博塗而塞江海以僬僥而戴泰山短人也荀子猶以錐力墮泰山也荀小敵之堅大敵之擒孫子注言小國不量力與大邦為讐權時堅城固守然終必見擒獲乳狗之噬虎伏雞之搏狸淮南子以一縷之任係千金之重孔叢子策蹇驢而追迅風棹藍舟而濟大川抱朴子以燕雀之羽而慕沖天之迅犬羊之蹄而覬追日之步劉子史君子是以知息之將亡也不度徳不量力左驅羣羊而攻猛虎虎之與羊不格明矣史張儀傳張儀說趙王曰斷右臂而與人鬬欲無危得乎通鑑以桀詐堯若卵投石夫何幸之有前漢刑法志以羔犢之弱而扞虎狼之敵也西鄒陽傳錯之𤨏才智小謀大晁錯傳以一簣障江河西漢何武等贊譬猶鼱鼩之襲狗孤豚之咋虎東方朔傳釋斤斧之用而欲嬰以芒刃臣以為不缺則折賈誼傳張儉以區區一掌而欲獨堙江河終嬰疾甚之亂多見其不知量也東漢本傳投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢夏侯湛傳譬由虻蚋之捕羣牛腐肉之齒利劒也漢書步隲表言北相多作布囊盛沙塞江水向荆州吕範諸葛恪云此江與開闢俱生寧有可以沙塞埋也三國吳志步隲傳注欲以片心除衆弊獨手遏羣邪君子不亮其誠羣小共攻其短舊唐書贄傳論持腐株支大厦之顛唐李順贊夫以蝸蚓之餌雜垂滄海而望吞舟之魚不亦難乎唐書傳記炎帝之女名曰女娃遊于東海溺而不反是為精衛常取西山之木石以填東海山海經集機蓬矢以射革駟跛鱉而上山兮吾固知其不能陞任重載盛兮陷滯而不濟楚辭物勝權而衡殆形過鏡則照窮選演連珠以螳蜋之斧禦鋒車之隧袁紹檄不揆蠛蠓之力强舉千鈞之重宋玉對楚王問何異無足而欲行無翼而欲翔魯褒錢神論微縷懸千金陳子昻集謬持蠡測海杜詩千鈞巨石一髪懸韋應物詩手中無尺鐵徒欲穿重圍劉長卿捧爝火以干日御抱布鼔以詣雷門李義山是猶垂蝸蚓之餌以釣吞舟之魚設弓弋之􅗤以羅垂天之翼李深之施衆網而加一禽尚不能况張一目以羅萬品而望其飛走大小盡出乎其間可乎元微之蚍蜉撼大樹可笑不自量韓文童麋來觸犀徳力不相及何異乎蜉蝣爭長於龜鶴秋毫計大於崐閬者哉逆風撲燎推岸塞河知其難矣並唐文粹難將一人手掩得天下目曹鄴讀李斯傳本朝有時爭勝不量力何異弱魯攻强齊安得獨洒一掬淚欲助河水增滔滔並歐公集司馬公曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉七國紀桓魋武叔不量力欲持一草摇蟠桃臨川譬如敝車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有隂雨之變陵谷之險其患必有不可知者欒城集欲將駒過隙坐待石穿溜東坡集隨宜經深則厲淺則揭豈其食魚必河之魴豈其取妻必齊之姜就其深矣方之舟之就其淺矣泳之游之雖無旨酒式飲庶幾雖無嘉肴式食庶幾雖無徳與女式歌且舞並詩禮從宜子游問喪具夫子曰稱家之有亡君子之於禮也有直而行也有曲而殺也啜菽飲水盡其歡斯之謂孝歛手足形還葬而無槨稱其材斯之謂禮並記子為高必因丘陵為下必因川澤清斯濯纓濁斯濯足並孟夫待腰褭飛兔而駕之則世莫乘車待西施毛嬙而為配則終身不家矣淮南子齊俗訓史何必驊騮騄耳而后行逺乎史記樂書浴不必江海要之去垢馬不必騏驥要之善走史外戚世家未能免俗聊復爾爾晉書集雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情王羲之蘭亭記王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍選連珠聽極於音不慕鈞天之樂身足於䕃不假垂天之雲選稱家隨豐儉盤飱市逺無兼味樽酒家貧只舊醅杜詩稱家開户牖量力置園林白樂天本朝華佗不世出天下未嘗廢醫東坡彊為經志大心勞所以求者非其道也詩序居山以魚鼈為禮居澤以鹿豕為禮記不順其鄉之所有也史王吉王崇皆好車馬衣服自奉養極為鮮明而遷徙去處所載不過囊衣人怪其奢服其儉故俗傳王陽能作金西漢王吉傳本朝事到强為須涉迹邵堯夫曠逹子身非吾有是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蛻也莊生為附贅縣疣死為决􅪵胡玩切潰癰忘其肝膽遺其耳目芒然彷徨乎}
