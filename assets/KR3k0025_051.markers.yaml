  - {type: variant, offset: 4163, length: 4, content: 汎若虛舟, WYG: 章百年瞬息萬世忙夷齊盜跖俱亡羊不如眼前一醉是非憂樂兩都忘愛惜微官將底用它年端好冩旌銘萬古一昏曉平生寓物不留物在家學得忘家禪逸韻謝邊幅升沈何足道等是蠻與觸囘翔天壤間何必懐此都年來萬事足所欠惟一死何必擇所安滔滔天下是譬}
