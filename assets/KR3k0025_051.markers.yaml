  - {type: variant, offset: 2245, length: 313, content: 不可動其志桎拲冠冕泥滓祿位高名無階級逸跡絕涯涘並皮日休在生未識公卿面至死不離麋鹿群杜荀鶴惟有風流謝安石拂衣攜妓入東山白樂天芝朮夢中春姚少監與松喬為伍是羲皇上人王維集寰海多虞日江湖獨往人姓名何處變鷗鳥幾時親賈浪仙柴門反關無俗客盧仝文山棲谷飲王維集寧知市朝變但覺泉石好與麋鹿同群處浪跡於豐草長林石泉可以洗昏蒙雲松可以遺身世俗塵不飛人意自遠並文粹朝飲花上露夜臥松下風王昌齡閎覽古先遐蹈物表芝耕雲臥聲利不入唐文粹手搖白羽扇腳踏青芒履聞道鶴書徵臨流還洗耳孟浩然雖有柴門長不閉片雲孤木伴身閑猶嫌住久人知處見擬移家更上山賈浪仙卜築青巖裏雲蘿四布陰虛室若無人喬木自成林時有青風至側聞樵採音儲光羲文煙火晝不盡蓬蒿春更深錢起文落葉遍空山何處尋行跡, WYG: 齊}
