  - {type: variant, offset: 3188, length: 361, content: 下不易其樂不絓聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉西漢班固敘傳眇然絕俗離世西漢王褒傳雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎後漢樊英傳傳記顧況志向踈遠有時宰招致將命好官況荅詩曰四海如今已太平相公何用喚狂生此身還似籠中鶴東望滄溟叫一聲趙郡李綽編尚書故實集鳳不貪餧而妄食楚辭飲余馬於咸池總余轡於扶桑同上蹈鴻崖之遐跡紹巢許之絕軌翔區外以舒翼超天衢以高跱蔡伯喈碑文蟬蛻濁穢之中浮游塵埃之外皭然泥而不滓推此志與日月爭光可也班孟堅作離騷序不求聞達於諸侯諸葛亮出師表名位為糟粕勢利為塵埃晉潘尼安身論傲世忘榮絕棄人事成公子安嘯賦丘園東國錙銖軒冕齊竟陵王行狀傲墳素之場圃步先哲之高衢潘安仁閑居賦封己養高勢動人主文選運命論魯連讓齊爵遺組居邯鄲獨立矯世陳子昂集軒冕猶埃塵駱賓王逸興橫素襟李白喜結海上契自為天外賓李白蕭踈外聲利杜, WYG: 地曽}
