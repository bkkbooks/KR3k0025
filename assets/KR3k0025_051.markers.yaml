  - {type: variant, offset: 737, length: 1, content: 焉, WYG: 方不足而下比有餘張華鷦鷯賦逹人知止足遺榮忽如無抽簪解朝衣散髪歸海隅張景陽詠史詩伯兄徳行高曉方藥食必視本草年止四十二某疏愚食不擇禁忌位為侍郎年出伯兄十五歲矣如又不足於何而足且獲終於牖下幸不至失大節以下見先人可謂榮矣韓愈行狀幸生天下無事時承先人之遺業不識干戈耒耜攻守耕穫之勤韓文感二鳥賦月費俸錢歳縻廩粟子不知耕婦不知織乘馬從徒安坐而食始我來京師止擕一束書辛勤三十年以有此屋廬此屋豈無華於我自有餘中堂高且新四時登牢蔬並韓集栁氏號為大族五六代以來無為朝士}
