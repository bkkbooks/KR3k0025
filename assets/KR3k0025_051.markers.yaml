  - {type: variant, offset: 98, length: 2, content: 事諸, WYG: 尤人並記用之則行舍之則藏道之將行也與命也道之將廢也與命也並語子遺佚而不怨阨窮而不憫君子不怨天不尤人行止非人所能也吾之不遇魯}
