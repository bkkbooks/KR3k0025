  - {type: variant, offset: 978, length: 4, content: 揖謝夷齊, WYG: 統傳向長隱居不仕貧無資食好事者更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳後漢趙岐先自為壽藏圖季札子產晏嬰叔向四像居賓位又自圖其像居主位皆為讚頌敕其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩坎本傳劉伶}
