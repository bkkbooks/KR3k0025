  - {type: variant, offset: 4168, length: 4, content: 獨往寂如, WYG: 􅃄雲之過眼百鳥之感耳豈不欣然接之去不復念也並東坡坐中客滿誰憂百榼之空身後名輕但覺一杯之重東坡濁醪有妙理賦雞蟲得失何須筭鵬鷃逍遥各自知收拾乾坤付一壺世間無物直錙銖並臨川鄉閭等行路何處更為家後山已將世界等微塵空裏浮花夢裏身盛衰閱過君應笑寵辱年來我亦平何侯方丈庾郎三韭較豐約於夢寐卒同歸於一朽百年雖長要有終富}
