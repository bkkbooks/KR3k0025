  - {type: variant, offset: 282, length: 7, content: 外文中注史賈誼, WYG: 家褚先生曰蘇秦張儀一當萬乘之主而都卿相之位今子積數十年官不過侍郎位不過執㦸意者有遺行耶東方生曰彼一時也此一時也使蘇秦張儀與僕並生於今之世曾不能得掌故安敢望常侍郎乎前漢東方朔傳以齊三萬户封張良良曰臣願封留足矣不敢當三萬户西漢本傳公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵愠而㧞其葵曰吾已食禄又奪園夫紅女利乎前漢董仲舒傳辟彊侯子徳常持老子知足之計西漢楚元王傳疏廣謂受}
