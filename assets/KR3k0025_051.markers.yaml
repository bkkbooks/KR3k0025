  - {type: variant, offset: 977, length: 0, content: '', WYG: 逍遥乎無為之表墮肢體黜聰明離形去智同於大通此謂坐忘並莊其生若浮其死若休死生同狀並莊吾所以有大患者為吾有身及吾無身吾有何患老無町畦莊人間世莊子將死弟子厚葬之曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下螻蟻食奪彼予此何其偏也莊子妻死惠子弔之方箕倨鼓盆而歌人生天地之間若白駒之過隙忽然而已以死生為寤寐以形骸為逆旅並莊子平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可唯所遇焉死後數百年餘名豈足潤枯骨並列魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下無有今子死不憂何也東門吳曰吾嘗無子之時不憂今子死乃與向無子同又奚憂焉列子子高曰人生有四方之志豈鹿豕也哉而常羣聚乎孔叢子史其生若浮兮其死若休澹乎若深淵之靜氾乎若不繫之舟不以生故自寳兮養空而遊徳人無累兮知命不憂細故蔕芥兮何足以疑史賈生傳達人大觀物亡不可賈誼傳飄飄有凌雲氣游天地之間意司馬相如傳孟敏荷甑墮地不顧而去郭林宗見而問其意對曰甑已破矣視之何益東漢郭泰傳其於胷中曾不芥蔕司馬相如傳飛鳥遺跡蟬蛻亡殻東漢王符論逍遥一世之上睥睨天地之間仲}
