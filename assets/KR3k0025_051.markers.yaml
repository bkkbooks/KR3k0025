  - {type: variant, offset: 736, length: 0, content: '', WYG: 張嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為將相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身没之日適足為無賴子弟酒色之資吾不取也聞者是之唐𤣥宗李日知拜侍中先天中乞骸骨日知將有請不謀于家歸乃治行妻驚曰産利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭於心無日而足也唐書本傳元延祖調舂陵丞輒棄官去曰人生衣食可適饑飽不宜復有所須每灌園掇薪以為有生之役過此吾不思也唐書元結傳有勸岑文本營産業文本曰南方一布衣徒步入關望不過秘郎縣令耳無汗馬之勞以文墨致位中書令亦極矣何得更言産業乎唐書本傳傳記委贄之臣不探市井之利韓詩外傳集畏極位之盛滿潘安仁西征賦}
  - {type: page-break, offset: 736, content: '', id: KR3k0025_WYG_051-8a, image: WYG0931/WYG0931-0393a.png}
