  - {type: variant, offset: 1400, length: 282, content: 見漁竿吾道在鷗鳥世人賖結茅依翠微伐木開蒙籠孤峰倚青霄一徑去不窮桃花洞裏居人滿桂樹山中任日長萬壑千峰獨閉門白雲幽臥處不向世人傳並劉長卿拂衣從此去高步躡華嵩捫蘿亦踐苔昔聞龐德公採藥遂不返金澗餌芝朮石床臥苔蘚松月生夜涼風泉滿清聽結廬就巖崛竹房閑虛靜花藥連冬春平石藉琴硯落泉洒衣巾焚香宿華頂裛露采靈芝屢踐莓苔滑將尋汗漫期並劉義詩杜門不復出久與世情踈門無俗士駕人有上皇風並孟浩然惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也韓物外日月本不忙韓文肥遯居貞包蒙養正柳文耕於寬閑之野釣於寂寞之濱韓文飲朮煮松柏孟東野且欲遺姓名安能慕竹帛芝朮資餱糧煙霞拂巾幘愛名之世忘名客多事之時無事, WYG: 關}
