  - {type: variant, offset: 740, length: 1, content: 藏, WYG: 閒自為貴何必居榮秩心足即非貧豈惟珠滿室並同上團圓便是家肥事何必盈倉與滿箱杜荀鶴一身既飽暖一家無怨咨家雖有􅅵畆手不秉鎡基皮日休集季子今二頃揚雄才一㕓伊予有南畆數已踰先賢李義山集福不可以屢僥倖得不可以常覬覦先生貧}
