  - {type: variant, offset: 996, length: 2, content: 仙詩, WYG: 觀而已阮籍聞步兵㕑營人善釀有貯酒三百斛乃求為校尉遺落世事並晉本傳顧榮素好琴張翰哭之上牀鼓琴數曲撫琴而歎曰顧彥先能復賞此不因又哭不弔喪主而去晉書不事崖檢宋書梁蕭恭曰勞神苦思竟不成名豈如臨清風對明月登山泛水肆意酣歌也南史梁本傳}
