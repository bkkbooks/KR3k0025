  - {type: variant, offset: 4162, length: 0, content: '', WYG: 下眂官爵如泥淤興廢何足弔萬世一俯仰名高不朽終安用有生何處不安生功名一破甑棄置何用顧已向閒中作地仙更於酒裏得天全人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無留者五更待漏靴滿霜不如三丈日高睡足北窻凉珠襦玉匣萬人祖送歸北邙不如懸鶉百結獨坐負朝陽生前富貴死後}
