  - {type: variant, offset: 3668, length: 491, content: 日言不及名與利高謝人間鶴唳無凡聲但拂衣冠莫回顧的無官職趁人來上無羅弋憂下無羈鎖牽蘿襟蕙帶竹皮冠雖到塵中不染塵並白樂天四皓有芝輕漢祖功名富貴不能釣之有山水閑淡之思心與青雲自有期並杜牧之處世似孤鶴遺榮同蛻蟬皮日休扁舟泛湖海長揖謝公卿劉義糠粃禮義錙銖功名王無功高情自與俗人踈張文昌杜陵解印時賣故陵之瓜彭澤無官詎有公田之黍王維集青山有雪諳松性碧落無雲稱鶴心許用晦味道腴以代膏粱含德輝而輕軒冕遺榮養素恬淡如也柳文公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻冥冥胡可量也張九齡張良郤粒之懷錙銖軒冕范蠡扁舟之志夢想江湖中山寂寞幽蘭自榮雖有矰繳不羈冥冥以聰明為駢枝名聲為纏繳無耗氣無焚和退然葆真獨與道往鷗鳥不動家人忘貧是行也朵頤者知懼矣冥冥翰飛不可及已自觀靈龜不嗅驕餌並李義山肥於貌孰與肥其道求於人孰與求其身孫可之文含風飲露以樂吾道唐文粹海內嫌官只一人姚少監瑞草唯承天上露紅鸞不受世間塵王建消息治亂之際卷舒夷曠之域如雲出於山遊於天復歸於無間不可得而累也唐肅宗釣臺碑本朝幽閑靖節性孤高伯夷心歐公聯句棄官如棄泥東坡詩慕幅巾於衡巷乘下澤於鄉閭晦丘園之養高輕鴈纁而堅臥歐公集爵位利祿蓋古者有志之士所謂鴻毛弊屣, WYG: ''}
