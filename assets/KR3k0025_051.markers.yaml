  - {type: variant, offset: 739, length: 0, content: '', WYG: 豈容豈容一作豈愚䝉獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受禄位亦所未能栁與楊京兆馮書手不能執殳肩不能荷鋤幸因筆硯工得升仕進途白樂天鬢雪人間壽腰金世上榮子孫無可念產業不能營一日安閒直萬金優游福禄更難銷得年非痩薄長福是單貧設自為化工優饒之如是若比簞瓢人吾今大富貴莫嫌貧活計更富即勞心有帛禦冬寒有榖防歳饑飽於東方朔樂於榮啟期}
