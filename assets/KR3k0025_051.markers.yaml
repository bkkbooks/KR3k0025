  - {type: variant, offset: 984, length: 11, content: 凌霄外嚼蘂挹飛泉郭景純, WYG: 肆志常以細宇宙齊萬物為心常乘鹿車擕一壺酒使人荷鍤隨之曰死便埋我晉書本傳畢卓常謂人曰得酒百斛船四時甘味置兩頭右手持酒盃左手持蟹螯拍浮酒船中便足了一生矣晉書本傳張翰縱任不拘因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適意何能覊官數千里以要名爵乎遂命駕而歸晉本傳阮修性簡意有所思率爾褰裳至或無言欣然相對常步以百錢挂杖頭至酒店便酣暢晉書阮籍傲然獨得任情不覊當其得意忽忘形骸郄超卓犖不覊有曠世之度阮孚蓬髪飲酒不以世務嬰心常以金貂換酒並晉本傳張翰曰使我有身後名不如即時一杯酒時人貴其曠達曰人生貴適意耳富貴何為同上王徽之居山隂憶戴逵夜乘小船詣之造門不前而反曰乘興而來興盡而反何必見安道耶晉王徽之傳阮孚曰未知一生能着幾兩屐晉書陶濳為彭澤令在官八十餘日解印去縣未嘗有所造詣所之唯至田舍及廬山}
