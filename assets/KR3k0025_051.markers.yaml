  - {type: variant, offset: 973, length: 1, content: 蹈, WYG: 嗜緑蔬羮意輕肥膩羊孟東野飲啄既已盈安能勞羽翼劉賓客茍無公私債飲水不為貧元稹集兹焉即可愛何必是吾廬韋應物枯鱗易為水貧士易為施孟東野如鳥擇木姑務安巢白樂天才小分易足心寛體長舒浮榮及虛位皆是身之賓惟有衣與食此事粗關身茍免饑寒外餘物盡浮雲稍無骨肉累粗有漁樵資家田輸歳盡拾此充饑膓並白侍郎日有糲食歳有麄衣饑寒獲同骨肉相保此亦熙熙委順之外益自安也白傅集寛於蝸舍足於容身富於黔婁壽於顏囘飽於伯夷樂於榮啟期健於衛叔寳今何求哉身閒自為貴何必居榮秩心足即非貧豈惟金滿室並同上畦蔬繞茅屋自足媚盤飱老杜集一枝聊暫安駱賓王蓬蒿三畆居寛於一天下杜牧之田家衣食無厚薄不見縣門身即樂王建詩以此心目暢敵彼名利途輕微何為者藜藿自有餘李義山詩每含咀義味獨坐日昃案上有一盃藜羮如五鼎七牢饋於左右加之以撞金石萬羽籥也陸魯望文坐白屋有公侯之資食藜羮有卿相之色皮日休集尚儉經營少居閒意思長張文昌田翁真快活婚嫁不離村州縣供輸罷追隨鼓笛喧盤餐同老小家計共田園畫㦸門前難作客釣漁船上易安身杜荀鶴集本朝生計易足纔蔬畦人生自足乃為娛並歐詩三徑粗成資一枝有餘暖身安一牀足坡詩陋巷開門負朝日小園除雪得春蔬無錢種菜為家事老作諸侯客貧為一飽謀生當得意樂鷗邊何用封侯墮鳶外並後山集茅簷適性輕華屋黍酒忘情敵上尊茹蔬飯糗不願餘並欒城集吾身眠食耳一飽萬想滅坡詩一室可盤蝸山谷無厭經辛未取郜歸於我辛巳取防歸於我春秋子不奪不饜富貴之中有私龍斷焉並孟禍莫大於不知足老子江河不能實漏巵淮南子貪者難為惠譙子法訓史申侯有寵於楚文王文王將死使行曰唯我知汝汝專利而不厭予取予求不汝疵瑕也初虞叔有玉虞公求旃之也既而獻之又求其寳劒曰是無厭也無厭將及我侵欲崇侈不可盈厭聚斂積實不知紀極管仲曰戎狄豺狼不可厭也實有豕心貪惏無厭忿纇無期謂之封豕並左傳谿壑可盈是不可厭也國語田蚡嘗討考工地益宅上怒曰君何不遂取武庫田蚡傳猶未足澹澹音贍其欲西漢食貨志夫已受大又取小天不能足而况人乎此民之所囂囂苦苦一作若不足也漢武安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家童七百人皆有手技作事内治產業累積纖微是以能殖其貨西漢張安世傳夫晉何厭之有既東封鄭又欲肆其西封左嬰兒常病傷於飽也東漢王符傳光武賜岑彭書曰人苦不知足既平隴復望蜀光武紀殷興曰外戚家苦不知謙退嫁女欲配侯王娶婦盼睨王室光武建武宣王破張魯請魏武便討劉備魏武曰人苦無足既得隴復欲得蜀耶王隱晉書車騎將軍張敬兒好信夢初為南陽太守其妻向氏夢一手熱如火及為雍州夢一股熱為開府夢半身熱敬兒意欲無限嘗謂所親曰吾妻復夢舉體熱矣又自言夢舊村杜樹高至天上聞而惡之齊太祖溪壑可盈志欲難滿齊書溪壑之欲發乎無厭唐書元載等贊楊國忠于暄舉明經舉業荒陋不及格禮部侍郎逹奚珣置暄上第及暄為户部侍郎珣始自禮部遷吏部暄與所親言猶歎已之淹囘珣之迅疾唐𤣥宗傳記薛元超曰吾富貴過分然平生有三恨不以進士擢第不得娶五姓女不得修國史劉餗撰隋唐嘉話集華貂深不足之嘆選表江海誠難滿元微之集早夭羨中年中年羨暮齒暮齒又貪生服食求不已白侍郎求多子一人之身而百工之所為備如必自為而後用之是率天下而路也孟史無大功以求大禄國語淳于髠曰臣見道傍有禳田者操一豚蹄酒一盃祝曰甌窶滿篝汙邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而一本無而字所欲者奢史記滑稽傳寗成曰仕不至二千石賈不至千萬安可比於人乎西漢本傳安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家童七百人皆有手技作事内治產業累積纖微是以能殖其貨西漢張安世傳身寵而戴高位家温而食厚禄因乘富貴之資力以與民爭利於下漢武昔秦始皇毀壊諡法以一二數欲至萬世而莽下三萬六千歳之厯言身當盡此度東漢隗囂傳無毛髪之勞而欲求丘山之用漢張奐傳本朝宿鳥一枝足爭林終夜鳴陳後山安分經君子不以小言受大禄記君子素其位而行不願乎其外在下位不援上庸君子下不僭上上不偪下記子監門御旅抱關擊柝而不自以為寡荀古之為道者量腹而食容身而居文中子史公孫免餘曰唯卿備百邑臣六十矣下有上禄亂也受其半齊景公欲更晏子之宅辭曰君之先臣容焉臣不足以嗣之於臣侈矣並左李克曰卑不謀尊疏不謀戚史魏世家龍門王通教授於河汾之間弟子自逺至者甚衆累徵不起楊素甚重之勸之仕通曰有先人之敝廬足以庇}
