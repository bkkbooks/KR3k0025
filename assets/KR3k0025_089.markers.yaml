  - {type: variant, offset: 2904, length: 0, content: '', WYG: 鞦韆北方山戎之戲以習輕趫者古今藝術圖案詞人髙無際鞦韆賦序云鞦韆漢武帝後庭之戲本云千秋祝夀之詞也語訛轉為秋千後人乃旁加革青箱雜記每春節懸長繩於髙木士女咸集並立其上共推引之名曰鞦韆楚俗亦謂之施鈞涅槃}
