  - {type: variant, offset: 113, length: 978, content: 用賤而好自專烖及其身者也記中庸好人之所惡惡人之所好是謂拂人之性菑必逮夫身記大學子曰放於利而行多怨語里仁羿善射奡盪舟俱不得其死然語憲問子譬若載無轄之車以臨千仞之谷欲其不顛覆難也家語寶珠玉者殃必及身孟盡心下邪穢在身怨之所構荀子勸學言有召禍同上位尊則必危任重則必廢擅寵則必辱可立而待也可炊而傹也荀子仲尼以卵投石以指撓沸若赴水火入焉焦沒耳荀子議兵山木自寇莊子虞氏者登高樓臨大路設樂陳酒擊博樓上俠客相隨而行飛鳶適墜其腐鼠而中之俠客相與言吾不侵犯之而乃辱我必滅其家至期日之夜聚眾積兵以攻滅虞氏列子說符互見事出意表乘奔而去轡履冰而負重鄧析子齎不貲之寶獨宿曠野其危甚於累卵傳子蹈薄冰以待夏日登朽枝而須勁風抱朴子虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身之可保也同上禍之所生必由積怨劉子史兵猶火也弗戢將自焚左傳隱公四年匹夫無罪懷璧其罪左威十無德而祿殃也左閔二互入踰分服之不衷身之災也適也左僖二十四互入不稱華而不實怨之所聚也犯而聚怨不可以定身左文六今夫子傲取禍之道也左威十四鄭子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚群不逞之人以作亂殺子駟左襄十小人懷璧不可以越鄉左襄十五孔子曰有臧武仲之智而不容於魯國抑有由也作不順而施不恕也左襄二十三齊莊公鞭侍人賈舉而又近之乃為崔子崔杼間公左襄二十五互入不能防閑齊慶封獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也左襄二十八齊高止好以事自為功故難及之左襄二十五叔向曰汰侈已甚身之災也左昭五無大功而求大祿皆怨府也積貨滋多蓄怨滋厚八郤五大夫三卿其寵大矣一朝而滅惟無德也並國語勇略震主者身危功蓋天下者不賞西漢蒯通傳所謂探虎口者也史酈生傳好聲矜賢竟以名敗史晁厝傳論居君子之位而為庶人之行者患禍必至也通鑑漢武紀知眾嫭之嫉妒兮何必颺纍之蛾眉眉音眉譏屈原自舉蛾眉合眾嫉之西漢揚雄傳湯數行丞相事知三長史素貴故陵折丞吏遇之三長史皆怨恨通鑑漢武紀張湯下令不便顏異不應微反唇湯奏異腹非論死前漢食貨志鼠不容穴衘窶藪也西漢楊惲傳顏師古曰窶藪者載器也昔國武子好招人過以致怨惡通鑑漢質紀昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難通鑑漢桓紀陳蕃欲誅宦官乃事露章曰願出臣章宣示左右令諸姦臣知臣疾之已上互入踈略聞者莫不震恐謀未及發為曹節王甫等矯詔殺之東漢本傳臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身淫刑禍及朋友士類殲滅而國隨以亡通鑑漢靈紀孔融棄市融恃其才望數侮, WYG: 牧撰雜}
