  - {type: variant, offset: 3631, length: 0, content: '', krp: 相公悉以繫獄故魃不得不出未幾罷璟相通鑑諧臣談官怡愉天顔元結傳唐莊宗好俳優别}
  - {type: variant, offset: 3632, length: 11, content: 左右翼金吾靜街前驅在數, WYG: 優名以自目曰李天下常身與俳優雜戲於廷伶人由此用事五代史莊宗嘗與羣優戲于庭伶人敬新磨批其頰羣伶驚駭共持新磨詰曰汝奈何批天下頰新磨曰李天下者一人而已復誰呼耶莊宗大恱吳王楊隆演㓜懦徐氏專政嘗飲酒樓上命優人髙貴卿侍酒徐知訓為叅軍隆演鶉衣髽髻為蒼鶻並同上傳記晉獻公之優曰施通於驪姬國語女伶謝阿蠻善舞凌波曲開元天寶遺事本朝髙懐德節制睢陽宋城南抵汴渠五里有東西二橋倡優亦衆率多鄙俚為髙之伶人所輕誚每宴飲樂作必效其朴野之態以為戲玩謂之河市樂迄今俳優常有此戲沂公筆談}
