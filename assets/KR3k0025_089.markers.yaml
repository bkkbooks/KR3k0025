  - {type: variant, offset: 2923, length: 1, content: 閑, WYG: 也綵旗夾岸照蛟室羅襪凌波呈水嬉曲中人散空愁暮招屈亭前水東注同上鼓聲三下紅旗開兩龍躍出浮水來陣影斡波飛萬劍鼔聲劈浪鳴千雷文苑英華本朝淳化三年幸金明池觀水嬉命為競渡之戲擲金甌於波間俾軍人撇波争取之會要藏鉤傳記按漢武故事云上巡守河間見清光屬天望氣者云下}
