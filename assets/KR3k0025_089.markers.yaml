  - {type: variant, offset: 3821, length: 316, content: 五互入取禍岑彭所營時攻公孫述地名彭亡聞而惡之欲徙會日暮蜀刺客詐為亡奴降夜刺殺彭東漢本傳來歙攻公孫述蜀人大懼使刺客刺歙未殊自書表曰臣夜人定後為何人所賊傷中臣要害本傳昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難通監漢桓紀互入取禍張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右取禍之道也飛不悛其帳下將殺飛蜀志互入取禍蜀大將費禕與諸將大會於漢壽郭循在坐禕歡飲沈醉循起刺禕殺之禕資性汎愛不疑於人張嶷嘗以書戒之曰昔岑彭帥師來歙使節咸見害於刺客今將軍位尊權重待信新附太過宜鑒前事少以為警禕不從通監魏紀義康自謂兄弟至親不復存君臣形跡率心而行曾無猜防通監宋太祖齊王晏輕淺無防與賓客語好屏人請間明帝聞之疑遂有誅晏之意通監齊紀, WYG: 九}
