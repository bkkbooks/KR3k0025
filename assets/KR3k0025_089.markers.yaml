  - {type: variant, offset: 2922, length: 0, content: '', WYG: 競長江流建標明取舍勝負死生求並同上沅江五月平堤流邑人相將浮綵舟靈均何年歌已矣哀謡振楫從此起揚枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動蝃蝀飲河形影聨劉禹錫競渡曲注云競渡始於武陵至今舉楫而相和之其音咸呼云何在斯招屈之}
