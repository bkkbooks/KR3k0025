  - {type: variant, offset: 3424, length: 204, content: 至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之西漢孝文紀劉郃曰凶豎多耳目恐事未會先受其禍通監漢靈紀譬如養鷹飢則附人每聞風飆之起常有凌霄之志正宜謹其絛籠豈可解縱任其所欲哉通監晉武紀或謂常山王演曰鷙鳥離巢必有探卵之患今日王何宜出通監陳紀崔神慶曰五品以上佩龜者蓋防徵召之詐內出龜以命之新唐書本傳李林甫自以多結怨常虞刺客出則步騎, WYG: 二}
