  - {type: variant, offset: 1561, length: 1085, content: 弊此非自全之道嵩性狼抗亦不容於世世說中集累卵於疊棊左太沖魏賦財居權寵四海側目庾元規表守孤直以見嫉觸姦邪而結釁劉長卿何異登膠舩而汎巨浸操朽索以馭奔駟若飛蛾之赴明燭破塊之落空谷殊不知坐致燋爛而莫能自出並唐文粹愚觸駭機迸落深泉劉賓客鵲巢聲楂楂烏噪聲擭擭爭鬭庭宇間持身慱彈射韓文互入因言好盡言以招人過國武子所以見殺於齊也韓文同上不擇言以危肆兮固群禍之際也御長轅之無撓兮行九折之峨峨卻驚棹以橫江兮泝凌天之騰波柳懲咎賦多藏潤屋賈禍危身白樂天足踐禍門皮日休得一時之貴滅百世之族杜牧之本朝靡然如蛟龍釋其風雲之勢而安於豢養之樂終以不悟使其腹披股裂登於匹夫之俎東坡上韓太尉書經其心愧恥若撻于市書說命上缾之罄矣惟罍之恥詩蓼莪君子有五恥居其位無其言無其行君子恥之記雜記下君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德恥有其德而無其行使民有所勸勉愧恥以行其言並記表記知恥近乎勇記中庸巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之語公冶長邦有道貧且賤焉恥也邦無道富且貴焉恥也語子路邦有道穀邦無道穀恥也語憲問子羞惡之心義之端也孟公孫丑上喍爾而與之行道之人弗受蹴爾而與之乞人不屑也孟告子下君子恥不修不恥見污恥不信不恥不見信恥不能不恥不見用荀子非十二子恥不從枉管子史隨會能賤而有恥左文十二每念斯恥汗未嘗不發背霑衣也西漢司馬遷傳赧然流汗會稽之恥漢書君子雖貧不受亂君之祿說苑集死辱片時痛生辱長年羞孟東野互見尚氣門經小人不恥不仁易繫辭有靦面目詩何人斯白華廢則廉恥缺矣詩六月殷人之敝勝而無恥記表記子無羞惡之心非人也孟公孫丑上徧國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之它此其為饜足之道也孟離婁下無恥之恥無恥矣孟盡心上恥之於人大矣為機變之巧者無所用恥焉不恥不若人何若人有同上其無愧而不知恥也甚矣莊子在宥厚顏而忍詬荀子解蔽辱莫大於不知恥文中子關朗篇秦太后與嫪力高切毐於改切私通事皆決於嫪毐諸客求官為嫪毐舍人千餘人史呂不韋傳棄禮義捐廉恥日甚西漢賈誼傳頑頓亡恥奊音胡結切詬音后亡節廉恥不立且不自好苟若而可同上鮮廉寡恥則俗不長厚西漢司馬相如傳飢寒至身不顧廉恥前漢食貨志回面汙行以事諂諛之人而求親近於左右史鄒陽傳司馬長卿竊貲於卓氏東方朔割名於細君西漢楊雄傳梁孫廉性巧佞善宦時人為履謎以譏之曰刺鼻不知嚏蹋面不知嗔嚙地作步數持此得勝人刺其不避恥辱以求名位也南史本傳齊著作郎祖珽有文學多技藝而踈率無行嘗為高祖中外府功曹因宴失金叵羅於珽髻上得之通監陳世祖互入表裏不副梁主入朝于鄴周主自彈琵琶梁主起舞曰陛下既親撫五絃臣何敢不同百獸通監陳紀崔日用燕內殿酒酣起為回波風舞求學士唐書楊再思為內史專以諂媚取容張同休, WYG: ''}
