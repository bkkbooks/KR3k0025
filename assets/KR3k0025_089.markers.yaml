  - {type: variant, offset: 2905, length: 0, content: '', WYG: 謂之罥索嵗時記集萬里鞦韆習俗同杜詩綵索拂庭柯輕毬滿鄰圃温庭筠䩔鞦藤索拼韓文􅀈繩覲娥婺同上本朝綠蹊出鞦韆六集鞦韆索掛人何所東坡拄杖閒挑菜鞦韆不見人同上蹴鞠史蹴鞠足蹴之也鞠以韋為之中實以物蹴蹋為樂也漢書注穿地蹋鞠注云穿地作鞠以皮為之實以毛蹴蹋以為也霍去病傳傳記蹴鞠起於戰國案鞠與毬同古人蹋蹴以為戲劉向別錄唐僖宗在藩邸好築毬有鍊腿之語商云小說集永日迢迢無一事隔牆聞築氣毬聲韋莊打毬史蜀王衍常列錦步障擊毬其中爇諸香晝夜不絶通鑑唐僖宗尤善擊毬嘗謂優人石野猪曰朕若應擊毬進士舉須為狀元對曰若遇堯舜作禮部侍郎陛下不免駮放僖宗令陳敬瑄等四人擊毬賭三川敬瑄第一籌即以為西川節度使並同上西川節度使杜元穎進罨畫打毬衣五百事敬宗實錄郭英義拜劍南節度使教}
