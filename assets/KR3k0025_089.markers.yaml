  - {type: variant, offset: 3784, length: 2, content: 千仞, krp: 百戲起於秦漢有魚龍蔓延髙絙鳯凰案息五案都盧尋橦走丸跳劍戲車山車興雲動雷跟挂腹旋吞刀履素吐火激水轉石潄霧扛鼎象人怪獸含利}
  - {type: variant, offset: 3787, length: 3, content: 牆禍不, WYG: 戲纂要梁有髙絙伎蓋今之戲繩也梁有舞輪伎蓋今之戲車輪者也透三峽伎蓋今之透飛梯者也類要吞刀吐火植𤓰種樹之術皆從西域來苻堅嘗得西域倒舞伎漢世有撞末伎梁有長蹻伎跳鈐伎擲倒伎跳劍伎又有梁竿伎獮猴緣竿伎漢世有盤舞者晉世加之以杯謂之杯盤舞梁謂之舞盤伎並同上唐宴吐蕃使作蹀馬之戲景龍文館記石虎製皮兒作獮猴之形走馬上或在馬脇或在馬頭或在馬尾馬走如故名曰猨騎鄴中記龜兹樂戲有五蹄獅子樂府雜錄弄叅軍始自漢館陶令石耽有贓和帝惜其才每宴樂令衣白夾衫命優伶戲弄辱之大中以夾弄假婦人又弄婆羅門戲有代面者始自齊神武之弟善鬬戰以其顔雌無威於敵每}
