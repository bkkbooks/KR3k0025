  - {type: variant, offset: 2921, length: 0, content: '', WYG: 久低昂㸌如羿射九日落矯如羣帝驂龍翔來如雷霆收震怒罷如江海凝清光鬬草傳記謝靈運鬚美臨刑施於南海祇洹寺為維摩詰鬚中宗安樂公主五日鬬百草欲廣其物色令馳取之又恐為他人所得因剪棄其餘國史纂異集若是吳王鬬百草不如應是欠西施劉禹錫競渡史唐杜亞為淮南節度方春南民為競渡戲亞欲輕駛乃髹船底使篙人衣油綵衣没水不濡李衡在坐曰使桀紂為之不是過也唐書傳記端午俗謂是屈原死汨羅日人傷其死並以舟楫拯之至今競渡是其遺俗荆楚記競渡者治其舟使輕利謂之飛鳬又曰水車又曰水馬嵗時記越人為競渡有輕薄少年為鶩没之戲有至水底然後魚躍而出御覽集楚俗不愛力費力為競舟買舟俟一競競斂貧者賕元微之祭船如祭祖習競如習讎畫鷁四來合}
