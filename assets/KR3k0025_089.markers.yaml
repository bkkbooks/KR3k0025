  - {type: variant, offset: 2917, length: 1, content: 正, WYG: 婿等與諸人為之如臣坐對食盤口眼俱飽此為樂耳旁觀大家馳逐忙遽何暇知樂上曰爾言大有理後不復自為也教坊記淮南陽渥居䘮晝夜酣飲然十圍之燭以擊毬續世說集以擊毬事諫執事者多矣諫者不休執事不止其意必曰進若習熟則無危墮之憂避能便捷則免激射之虞小何傷於面目大何累於形軀者哉愈今所言特以擊毬之間之事明之耳馬之與人情性殊異至於筋骸之相束血氣之相持安佚則適勞頓則疲者同也以之馳毬于場蕩摇其心腑振撓其筋骨氣不及出入走不及迴旋逺者三四年近者一二年無全馬矣然則毬之害於人也决矣韓文上張僕射書分曹决勝約前定百馬攅蹄近相映毬驚杖奮合且離紅牛纓拂黄金羈側身轉臂著馬腹霹靂應手神珠馳贈張僕射毬簇桃花騎白樂天舞劍子昔趙文王喜劍劍士夾門而客三千餘人莊史沛公見項羽鴻門羽因留飲項莊入為夀夀畢曰軍中無以為樂請以劍舞因拔劍舞欲擊沛公項伯亦起舞常以身翼蔽沛公漢書傳記將軍裴旻請吳道𤣥畫東都天宫寺壁道𤣥曰聞將軍善舞劍觀其壯氣可助揮毫旻欣然為舞𤣥奮筆立成若有神助明皇雜錄開元中公孫大娘舞劍器僧懐素草書遂長蓋觀其頓挫之勢樂府雜錄老杜見臨潁李十二娘舞劍器曰余公孫大娘弟子也開元三載余尚童稚記於郾城觀公孫氏舞劍器渾脫瀏灕頓挫獨出冠時徃者吳人張旭善草書數於鄴觀公孫大娘舞西河劍器自此草書長進豪蕩感激即公孫可知矣詩云昔有佳人公孫氏一舞劍器動四方觀者如山色沮䘮}
