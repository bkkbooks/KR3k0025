  - {type: variant, offset: 1092, length: 436, content: 曹操通鑑漢獻紀關羽剛而自矜張飛暴而無恩以短取敗通鑑三國魏文張飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭撾健兒而令在左右此取禍之道也飛不悛其帳下將殺飛蜀志何曾陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉晉書互入傲慢匹夫獨立結恨彊宗通鑑西晉世祖紀謝靈運恃才放逸多所陵忽故及於禍通監宋太祖崔浩書魏之先世事皆詳實列於衢路往來見者咸以為言北人無不忿恚帝怒殺之通鑑宋太祖李延壽論曰凶人之濟其身非世亂莫由焉曹爽以亂世之情而行之於平日其取敗也宜哉通監宋太祖魏崔浩曰張虛聲而召實禍通監宋太祖紀劉孝綽仗氣負才多所陵忽每於朝集會同處公卿間無所與語反呼騶卒訪道途間事由此多忤於物前後凡五免南史宋紀劉孝綽傳賀若弼復坐事下獄上數之曰公有三太猛嫉妬心太猛自是非人心太猛無上心太猛通監王義方以疾惡不容於時唐書本傳如火投泉安得不敗唐書則天贊王殷每出入侍者數百人殷請量給鎧仗以備巡邏帝難之帝疾殷入起居遂執殺之通監後周太祖庇朽木乘膠舡唐韋承慶傳互入愚暗張昌齡獻頌太宗謂之曰昔禰衡潘岳皆恃才傲物以至非命唐書, WYG: 部鞦韆}
