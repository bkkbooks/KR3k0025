  - {type: variant, offset: 272, length: 219, content: 於行潦孟賜也日進商也日退賜也好友勝己者商也好友不勝己者家語魯繆公無人乎子思之側則不能安子思泄柳申詳無人乎繆公之側則不能安其身孟公孫丑下好名之人能讓千乘之國苟非其人簞食豆羹見於色盡心下楊子取為我拔一毛而利天下不為也墨子兼愛摩頂放踵利天下為之盡心上互見不得中道趨向不同天之道損有餘補不足人之道損不足奉有餘老七十七章公儀伯以力聞周宣王聘之曰女力何如曰臣力能折春螽之股堪勝也秋蟬之翼王曰吾力能裂犀兕之革曳九牛之尾猶憾其弱列子上古有大椿者以八千歲為, WYG: 域}
