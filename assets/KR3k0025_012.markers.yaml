  - {type: variant, offset: 1421, length: 2098, content: 赴水火入焉焦沒耳通監工人之用鈍器也勞筋苦骨終日矻矻及巧冶鑄干將之樸清水淬其鋒越砥歛其咢水斷蛟龍陸剸犀革前漢王褒傳荷旃被毳者難與道純綿之麗密羹藜茹糗者不足與論太牢之滋味同上小智自私賤彼貴我達人大觀物亡不可賈誼傳度長挈大比權量力不可同年而語項籍傳盲者不見咫尺而離婁燭千里之隅楊雄傳男雖賤各為其家陽女雖貴各為其國陰杜鄴傳並前漢上智不處危以僥倖中智能因危以為功下愚安於危以自亡後漢吳漢傳智者順時而謀愚者逆理而動朱浮傳智者順以成德愚者逆以取害郅惲傳登高不懼者胥靡之人也坐不垂堂者千金之子也馬融傳互入其居使然門管寧與華歆共鋤菜見地有金寧鋤不顧與瓦石無異歆捉而擲之人以是知其優劣通監東漢費禕為尚書令常以朝晡聽事其間接賓客飲食嬉戲加之博弈每盡人之歡董允代禕旬日之中事多停滯蜀志桓溫來朝或云欲誅王謝謝安神色不變坦之流汗沾衣倒執手版通監晉紀或謂華譚曰諺言人之相去如九牛毛寧有此理乎譚對曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也晉書華譚傳魏主執任城王勰手曰二曹以才名相忌吾與汝以道德相親通監齊明紀下顧悅之與簡文帝同年而髮早白帝問其故對曰松柏之姿經霜猶茂蒲柳常質望秋先零晉書本傳互見敏於應對顏峻謝莊為吏部尚書時人語曰顏峻嗔而與人官謝莊笑而不與人官宋書齊神武令諸子各理亂絲帝獨抽刀斬之曰亂者須斬北史文宣紀松柏孤生勁特無所因倚女蘿弱不能立必附他木唐書李德裕傳正人如松柏獨立不倚邪人如藤羅非附他物不能自起通監唐文宗李晟為其子請昏於延賞不許晟謂人曰武夫性快釋怨於柸酒間則不復貯胸中矣非如文士難犯外雖和解內蓄憾如故吾得無懼通監唐德宗土城竹馬童兒樂也飾金翠羅綺婦人樂也貿遷有無商賈樂也高官厚秩士大夫樂也戰無前敵將帥樂也四海寧一帝王樂也唐書西域焉耆傳傳記君子得時如水小人得時如火說苑談叢篇郭林宗曰奉高之器譬諸汍濫雖清而易挹叔度汪汪若千頃陂澄之不清撓之不濁不可量也世說後漢黃憲傳氿從九音晷泉之側出者濫戶斬反泉之正出者毛詩有列氿泉又觱沸檻泉同義今人多誤作汎濫繆矣此段只當載漢書者夏侯太初嘗倚柱作書時大雨霹靂破所倚柱衣服焦然神色無變書亦如故賓客左右皆跌蕩不能住世說中楊脩為丞相曹操主簿至江南讀曹娥碑上八字問脩脩曰知之操曰待朕思之行三十里乃得之令脩解脩曰黃絹色絲絕字幼婦少女妙字外孫女子好字齏臼受辛辭字操曰一如朕意俗云有智無智校三十里裴啟語林孔子曰仁義動君子財色動小人樂動聲儀魯有男子獨處于室鄰人嫠婦又獨處于室夜暴風雨至而室壞婦人趨而託之男子閉戶而不納曰吾聞之男子不六十不間居今子幼吾亦幼不可以納子婦人曰子何不若柳下惠然嫗不逮門之女國人不稱亂男子曰柳下惠固可吾固不可毛公詩傳集尺澤之鯢豈能與鯤魚量江海之大藩籬之鷃豈能與鳳凰料天地之高哉楚辭互見小不足以知大𠧐原之與子都培螻之與方壺左太沖魏賦彼桑榆之末光踰長庚之初輝同上鷦螟巢於蚊睫大鵬彌乎天隅張華鷦鷯賦一飛沖青天曠世不再鳴安與鶉鷃徒翩翩戲中庭晉阮步兵詩駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用班叔皮論孤松宜晚歲眾木愛芳春陳子昂互見物各有宜巢許蔑四海商賈爭一錢曹植樂府歌眾星羅青天朗者獨有月李太白互見事相形雀鳴朝營食鳩鳴暮求群獨有知時鶴雖鳴不緣身韓文內不足者急於人知霈焉有餘厥聞四馳今人適數百里出門惘惘有離別可憫之色持被入直三省丁寧顧婢子語剌剌不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉不善為斲血指汗顏巧匠旁觀縮手袖間不知言之人烏可與言知言之人默焉而其意已傳彊者必怒於言懦者必怒於色並韓文不矍矍於進取不施施於得喪左絃右壺樂以終日與夫拳拳恐悸蒙諂負義得之拘拘榮不蓋愧以終其身而不能止者不獨優乎柳文君子宜于上不宜于下小人宜于下不宜于上柳文謗譽達士如弦直小人似鉤曲杜工部智士日千慮愚夫唯四愁孟東野君子山嶽定小人絲毫爭駑蹄顧挫抹逸翮遺稻粱君子芳桂性春榮冬更繁小人槿花心朝在夕不存並孟東野百草短長出眾禽高下鳴元微之聖人瑩其心而窒其謗是以能照天下之理故其心清而定愚者負其心而薄於外是以閉天下之理故其心塵而結皇甫湜項籍納秦降卒二十萬慮其懷詐一舉而盡坑之其於防虞亦已甚矣漢高豁達大度天下之士至者納用不疑其於備慮可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也陸贄狀貌群分頭角萬殊皇甫湜務鳩歛而厚其帑櫝之積者匹夫之富也務散發而收其兆庶之心者天子之富也陸宣公文屠羊于肆適味於眾口也攻玉於山俟知於獨見也貪日得則鼓刀利要歲計而韞匵多劉賓客靈芝萐蒲與百果齊拆然煌煌翹翹出乎其類同上彼如君子心秉操貫冰霜此如小人面變態隨炎涼白樂天椿壽八千春槿花不經宿葵枯猶向日蓬斷即辭春因指塵土下蜉蝣良可悲不聞姑射上千歲冰雪肌彼為葅醢机上盡此作鸞鳳天外飛並白樂天集鷹飢常啄腥鳳飢亦待瓊張說文顏回簞瓢才白給肥醲不到口年不登三十張蒼染愛浩無際妾媵填後房竟壽百餘歲同上互見事難詰門鵬背負天龜曳尾雲泥不可得同游並張說之文蟪蛄寧與雪霜期賢哲難教俗士知杜牧文君子寧小窮而大達小人寧小達而大窮程晏靜者多便夜豪家不見愁姚少監逸足期千里窮鱗渴一泓張承吉智士役十慮達人輕百憂許用晦文以至愚而對至聖以極卑而對極尊徒思自彊不可得也唐文粹小物無大志同上蘭蕙雖可懷芳香與時息豈如凌霜葉歲暮藹顏色韋應物聖人之道猶坦途諸子之道猶斜徑皮日休, WYG: ''}
