  - {type: variant, offset: 9, length: 1, content: 瞻, krp: 澤佛子院仙居山皆在固始輿地紀勝人物春秋虞丘相楚之處士孫叔敖為楚令尹虞丘相薦之齊楊愔為名相五代閩王王審知皇朝司馬光生光山驛今有祠堂輿地紀勝本朝建隆元年改殷城為商城縣後省為鎭入固始宣和初陞光山軍額沿革表集弋陽信夷曠深在亂山中惟此仙人杏特盛蒼臣功盛度詠杏亭我來小小郡愛此髙髙臺前對篬筤竹萬竿球琳材黄子山川遺故國弋陽煙霧共空臺楊蟠潢河遶出郡城樓樓枕潢南城上頭天濶星連翼軫分地長川帶漢淮流百年京邑天邉在一㸃弋山煙際浮趙彦琓野陂衰草淒荒城千里浮光㸃太清不與衆山為伴侣自然八面露崢嶸荆榛千里古黄國此景葱菁浮煙嵐張天覺浮光山佩蘭浮者今何在煉杏山翁去不還郝及中浮光山黄州倚郭一外縣二黄岡黄陂麻城郡號齊安黄岡黄城黄陂赤壁州沿革楚地翼軫分野禹貢揚州之域春秋黄國境戰國屬楚漢髙帝置江夏郡魏為重鎭後入吳晉初屬弋陽郡後屬西陽郡南齊分置齊安郡北齊兼置衡州陳廢州後周復置隋改黄州大業為永安郡唐黄州齊安郡初屬江南後屬淮南道沿革表縣沿革黄岡戰國楚徙相君扵此漢西陵縣為江夏郡治又邾縣晉並屬弋陽郡後廢邾縣北齊置南安縣及齊安郡隋廢郡改黄岡縣置黄州治此又有木蘭縣唐省木蘭入黄岡黄陂本漢西陵縣地東漢末為黄城鎭北齊置南司州後周置黄陂縣改南司曰黄州隋屬永安郡唐武徳置南司州尋以黄陂來屬麻城本漢西陵縣地梁置信安縣東漢置定州後周改亭州隋廢州改麻城縣屬黄州唐武徳復亭州八年廢州來屬元和省麻城縣建中復置沿革表形勝松湖在黄陂竹樓在城上王元之作記赤壁在江濵東坡作賦烏林近赤壁赤山在黄岡春風嶺在麻城甘露山在黄陂十勝景在城山有仙女臺仙女洞㸔花臺龍潭瀑水崖龍仙源亭馬頭泉師姑臺仰天窩七丈山在黄岡三角山九螺山在麻城紀勝人物皇朝程珦寓居黄陂生二子即二程先生潘大臨潘大觀皆有詩名何頡之自號樗叟陳慥自號龍丘東坡謫黄州與之逰紀勝集一夜風吹竹連江雨送秋可憐赤壁争雄處唯有簔翁坐釣魚杜牧本朝詩情不負齊安郡杜牧當年與我齊山州過夏如山寺銷盡機塵見道心淮甸為内地黄岡壓上㳺王元之南篇司馬青衫濕北句郎官白髪生堪與江黄永傳唱離騷經外此歌聲王軫小司馬白居易郎官王元之長江遶郭知魚美好竹連山覺笋香黄州小郡夾谿谷茅屋數間依竹葦一别臨平山上塔五年雲夢澤南州東坡雲夢澤南君子泉水無名字托人賢山谷異時小杜髙眠地幾向秋風聽楚江張耒縹渺煙中漁父槳坡陀山上使君衙董乂地據淮西盡江吞石壁寬孫載安豐軍倚郭一外縣二安豐壽春六安郡號六安六蓼八公芍陂壽陽軍沿革吳地斗分野禹貢揚州之域春秋六國楚滅之秦九江郡治漢為六安國東漢屬廬江郡魏置安豐郡梁增置陳留郡隋廢郡屬壽州大業屬淮南郡唐屬壽州本朝置軍沿革表縣沿革安豐本漢六蓼陽泉安豐四縣地東漢廬江郡晉但存六縣餘三縣悉省之南朝廢六縣梁置安豐郡及縣又僑置陳留郡隋廢郡以安豐屬淮南郡本朝置郡治此壽春本春秋楚邑秦置九江郡漢淮南國後為九江郡治東漢揚州刺史九江郡並治此晉淮南郡治後改壽陽縣宋復為壽春縣梁置豫州陳為揚州隋開皇為壽州治大業淮南郡治唐壽州治周世宗徙壽州治下蔡而縣屬焉本朝置軍來屬六安本漢廬江郡潛縣及六安國安豐縣晉省潛縣梁徙安豐縣扵郡治扵此置霍州及岳安郡縣北齊州廢隋廢郡改岳安為霍山縣屬廬州唐武徳置霍州並析置應城潛城二縣貞觀州縣並廢以霍山屬壽州開元改盛唐縣天寳又别置霍山縣本朝廢之改盛唐為六安縣沿革表形勝霍山即天柱山也爾雅云霍山為南岳蓼城在安豐即春秋蓼國芍陂在安豐東詳見陂類三公山在六安八公山在壽春符堅戰敗見其草木皆為人兵九公山在六安安陽山在陽泉安豐二縣之間盛唐山在六安黄閭山青岡城皆在壽春紀勝人物漢英布六安人臯陶之後梅福壽春人得仙召信臣見循吏傳民號為召父魏胡質胡威父子清謹名譽著聞唐龎嚴舉賢良第一李興父疾自刃股肉以饋父父死捧土就墳詔表門閭紀勝集風獵紅旗入壽春滿城歌舞向朱輪八公山下清淮水千騎塵中白面人劉禹錫寄楊壽春遥知用兵處多在八公山劉文房日夕煙波那可道壽陽西去水無窮皇甫冉本朝開寳初省霍山縣為鎭入盛唐四年改六安縣紹興十二年陞安豐縣為軍以壽春壽州六安二縣來屬沿革表集三輔亡秦期可必八公草木勢將回王樞宻地分三楚嘗為茅土之強山號八公終闕京西南路襄陽府倚郭一外縣三襄陽榖城宜城南漳山南東道節度京西湖北兩路安撫司京湖制置司京西轉運司提刑司提舉司都統制司郡號漢水鄧城荆山臨漢梁山襄漢樊城府沿革楚地翼軫之分禹貢豫州之域春秋戰國屬楚秦南郡之北界漢屬南陽南郡魏置襄陽郡為重鎭晉兼置荆州東晉僑置雍州宋割荆州置雍州西魏改襄州隋開皇廢郡大業廢州復置郡唐武徳曰襄州為山南東道節度本朝陞州來屬沿革表縣沿革襄陽本古樊城春秋鄾鄧之國漢屬南郡及南陽郡魏屬襄陽後立樊城縣東晉僑置雍州鄧城縣後廢入樊城後周省樊城入安養曰臨漢貞元移治古鄧復改曰鄧城本朝省入襄陽榖城本春秋榖伯秦屬南陽郡漢筑陽縣隂縣鄼縣之城晉孝武置義成縣屬義成郡宋以筑陽置扶風郡隂鄼屬廣平郡梁置饒陽縣屬義城郡後周省鄼縣餘並屬襄陽隋省筑陽饒陽