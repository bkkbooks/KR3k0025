  - {type: variant, offset: 4837, length: 296, content: 餘通詣狄青以為青之遠祖青謝遣還之比之郭崇韜哭子儀之墓青所得多矣筆談如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立於朝則豺狼狐狸自相吞噬故皆能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖累千百緩急豈可望哉王元之畫像贊新序青松守節見臨危正色凜凜不可犯芭蕉芰荷不足數狼籍徒能污池檻歐陽文集新進之士喜勇銳老成之人多持重同上夫窮天下之物無不得其欲者富貴者之樂也浮槎山水記他人磨礱爭出圭角公獨渾然不見其璞祭胡太博文萬物各有役無心獨浮塵貴賤同為一丘土聖賢獨如星日垂歐陽文集人能百歲自古稀松得千年未為老臨川集松苗地合分高下鳧鶴天教有短長短羽卑飛已甘心於枚粒陰虯自躍思遠耀於風雲並同上, WYG: 二}
