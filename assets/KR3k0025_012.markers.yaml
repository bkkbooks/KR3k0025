  - {type: variant, offset: 602, length: 438, content: 外者半有一史後至者儃儃不趨受揖不立因之舍公使人觀之則解衣槃礡莊子孔子謂子路曰水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交于前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也同上大智閑閑小智間間夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絕塵而回瞠若乎後矣田子方篇互見事有難易門埳井之蛙謂東海之鱉曰井幹之樂至矣東海之鱉左足未入而右膝已縶秋水篇鵬徙於南溟水擊三千里摶扶搖而上者九萬里蜩與鳩決起而飛槍榆枋斥鷃騰躍而上不過數仞而下翱翔蓬蒿之間逍遙遊篇並莊子輕死而暴是小人之勇也荀子君子能則寬容易直以開道人不能則恭敬繜絀以畏事人小人能則倨傲辟違以驕溢人不能則妒嫉怨誹以傾覆人荀不苟楚王有白猨自射之則摶矢而熙使養由基射之始調弓矯矢未發而猨擁柱號矣淮南子泰山之與丘垤江河之與行潦孟子仲尼之道猶四瀆也經營中國終入大海他人之道者西北之流也綱紀夷貉或入于沱或淪于漢楊君子良馬不待策錣而行駑馬雖兩錣之而不能進淮南子許由獨善其身太公兼利天下孔叢子記問篇眾木不能法松柏諸蟲不能學龜鶴, WYG: 淅川縣}
