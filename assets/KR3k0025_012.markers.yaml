  - {type: variant, offset: 3609, length: 430, content: 貴賤長幼皆為彈神氣沖和不知向人所在內兄潘岳使彈終日達夜無忤色識者知其不可榮辱也使立本如千里之達其誰能以畫師辱之東坡書朱象先畫後翟公之客負公於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪己與士益厚賢於古人遠矣東坡勤上人詩集敘公謂歐公也昔者夫子廉潔而不為異眾之行勇敢而不為過物之操孝而不徇其親忠而不犯其君凡此者是夫子之全也原憲廉而至於貧公良孺勇而至於鬭曾子孝而徇其親子路忠而犯其君凡此者是數子之偏也上韓太尉書昔唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以宴安之際不能用裴度於未病治亂之效如斯可見賜文彥博乞致仕不允批荅小人以位為寵求之而不可得君子以寵為憂推之而莫能去賜尚書右丞相胡宗允辭免不允詔君子之難知如麟鳳色斯舉矣翔而後集況可麾而卻之乎小人之易進如蛆蠅腥羶所聚瞬息千萬況可招而來之乎論周種擅議配享劄子並東坡富人事紛華綵繡光翻座貧者媿不能微摯出舂磨東坡君如大江日千里我如此水千山底達人千鈞弩一弛難再彀下士沭猴冠已繫猶跳驟乃知賢達與愚陋豈直相去九牛毛達人友四, WYG: 名氏記纂淵}
