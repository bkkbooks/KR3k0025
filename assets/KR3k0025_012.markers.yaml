  - {type: variant, offset: 4040, length: 796, content: 曲士守一鄉鳳凰覽德輝遠引不待遣鷾鴯燕子戀庭宇倏忽來千轉有如市倡抹青紅妖歌嫚舞眩兒童謝家夫人淡手容蕭然自有林下風並東坡詩古之君子不用於世必寄於物以自遣阮籍以酒嵇康以琴阮無酒嵇無琴則其食草木而友麋鹿有不安者矣獨顏氏子飲水啜菽居於陋巷無假於外而不改其樂此孔子所以嘆其不可及也欒城集眾皆以力事君公獨以道自任仕以其力者力衰而後去進以其道者道高則難留同上秋鴻一何樂空際乘風飛秋蟲一何憂壁間終夜悲秋風坐見蒲柳躓歲晏惟有松柏堅袞袞河渭濁皎皎江漢清並同上大小窮鵬鷃短長見椿槿山谷詩我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江同上互入明於自知太阿無前鋒不缺鈆刀不堪供一切後山詩賜牆及肩人得視公才槃槃一都會同上棋不甚相遠但高棋識先後著耳若低棋即以後著為先著昔黥布以窮來歸故高祖洗足不起以挫其銳布欲自殺後見張御從官如漢王則又大喜過望此識先著者也侯景以窮來歸梁武遽裂地而王之其後景凡有所須輒痛剉抑之故景反而梁武亡此以後著為先著也鳴道集互見區處失當人有斗筲之量者有鐘鼎之量者有江河之量者有天地之量者斗筲之量固不足算若鐘鼎江河者亦已大矣然滿則溢也唯天地之量無得而損益焉非聖人孰能當之大抵為名者只是內不足內足者自無意於名冰與水精非不光比之玉自是有溫潤含蓄氣象無許多光耀也譬如積水於萬仞之源一日決之滔滔汨汨直至于海其源深也若夫潢潦之水乍流乍涸終不能有所至者其源淺也並鳴道集韓魏公惟務容小人善惡黑白不太分故小人忌之亦少如范富歐尹常欲分君子小人故小人忌怨日至遺書韓魏公曰呂申公以進賢自任恩歸於己時士皆出其籠絡獨歐范尹旋收旋失之終不受其籠絡聖人之道如天地天地之間靡所不有眾人之道如山川如陵谷如鳥獸如草木如蟲沙各盡其分不知其外天地則無不包也無不徧也並遺書司馬溫公曰夫功名之際人臣之所難處如高帝所稱者三傑而巳淮陰誅夷蕭何械繫非以履盛滿而不止耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者子房有焉通監高帝紀有獻狄梁公畫像及告身, WYG: 卷}
