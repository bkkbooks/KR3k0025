  - {type: variant, offset: 7, length: 0, content: '', WYG: 吕泉在石膏山下云吕仙卓劍而泉湧出三公山九卿山在廬江縣佛足山在無為縣西仙女洞在廬江有仙女臺錦緑溪在城内七寳山在巢縣為西關濡須山為東關輿地紀勝人物東漢毛義以孝行稱皇朝楊傑自號無為子有無為集二十五卷賈易辨韓忠彦援立之功焦蹈元豐魁天下士王之道與兄之義之深同登科名其所居堂曰三桂堂輿地紀勝本朝太平興國三年以巢縣之無為鎭置無為軍以廬州巢縣廬江縣來屬熙寧三年析巢廬江二縣置無為縣治郭下沿革表集荻迸短芽淝水暖荷浮圎葉漅湖清温公此樓此景他州無山川形勝吞三吳惟慿詩老寫竒勝縱有畫筆難工夫此樓此景他州無天髙水濶連平蕪緑楊深處杏花發日暖數聲山鷓鴣楊侍講詠南樓山横大秀一峯髙水隔平湖千里遥楊坎兮林靄波光秀可餐登臨都付一亭間坐違世事塵埃逺静入湖山日月閒對岸鶯花迷閬苑隔煙洲溆砌蓬山習池勝事無多闕只負襄陽倒載還蒲守詠挹秀亭壽春府倚郭一外縣一下蔡霍邱忠正軍節度郡號壽春下蔡壽州忠正軍府沿革禹貢揚州之域戰國屬楚秦九江郡漢髙帝為淮南國武帝復九江郡治壽春縣東漢兼置揚州三國屬魏晉武帝改九江郡為淮南郡宋齊兼置豫州元魏曰揚州梁曰南豫州東魏曰揚州陳曰豫州後周曰揚州隋開皇改壽州治壽春縣置總管府大業為淮南郡唐壽州治壽容縣天寳曰壽春郡屬淮南道後唐陞忠正軍節度周顯徳徙治潁州之下蔡本朝陞府沿革表縣沿革下蔡本春秋州來國漢為沛郡下蔡縣東漢屬九江郡晉置淮南郡梁置汴郡北齊廢之隋屬汝隂郡唐武徳改淮州縣尋復故又置渦州八年州廢屬潁州五代周世宗徙州治此霍邱本春秋蓼國漢為廬江郡松滋縣梁置安豐郡東魏廢之隋置霍邱縣屬壽州唐武徳以松滋霍邱二縣置蓼州七年省松滋州廢屬壽州神功曰武昌景雲復故名沿革表形勝壽春合肥受南北皮革鮑木之輸亦一都㑹也漢志南引汝潁之利東連吳㑹之富北接梁宋平途不過七百里西接陳許水陸不出千里外有江湖之阻内有淮淝之固龍泉之阪良田萬頃舒六之貢利盡南越晉伏滔𫝊峽石山潁水淮水在下蔡豐津在霍邱沿革表八公山在壽春有隠室石井初學記人物秦甘羅年十二為泰上卿皇朝吕夷簡及子公著皆為名相見安豐軍下集不見華胥夢空聞下蔡迷李義山本朝州郡軍額並仍前代政和六年陞壽春府沿革表集珠履繽紛宴壽陽欄干横出白雲傍小艇鬬垂凹鼻釣佳人尤學小梅粧郭祥正安慶府倚郭一外縣四懐寧桐城宿松望江太湖安慶軍節度舊提刑司郡號灊山同安舒皖皖城徳慶桐鄉府沿革星紀之次斗分野禹貢揚州之域春秋羣舒地楚􅂑之戰國屬楚秦九江郡地漢廬江郡地三國屬魏孫權克皖城以為重鎭晉安帝置晉熙郡梁兼置豫州後改晉州北齊改江州陳又改晉州隋開皇廢郡置熙州大業為同安郡唐武徳為東安州五年為舒州天寳曰同安郡至徳為盛唐郡後復故屬江南道五代吳及南唐有之本朝陞府沿革表縣沿革懐寧本漢廬江郡皖縣晉永嘉後廢之安帝復置懐寧縣為晉熙郡治隋初置熙州後為同安郡治唐改舒州治此桐城本春秋桐國漢為廬江郡樅陽縣東漢省之宋置隂安縣屬晉熙郡梁復置樅陽縣郡隂安屬焉隋開皇廢郡省隂安以樅陽屬熙州十八年改同安縣唐屬舒州至徳更今名宿松本漢皖縣地梁置髙塘郡隋開皇廢為縣屬熙州十八年改今名唐武徳置嚴州州廢來屬望江本漢皖縣地晉安帝置新冶縣屬晉熙郡陳置大雷郡隋開皇廢郡改曰義鄉十八年改望江屬熙州唐武徳置髙州尋改智州州廢屬嚴州嚴州來屬太湖本漢皖縣地宋置太湖縣屬晉熙郡齊置龍安郡陳廢之復屬晉熙郡隋改縣曰晉熙後復名太湖屬熙州唐屬舒州沿革表形勝灊山在懐寧西北上有三峯一曰天柱二曰灊山三曰皖山灊水出焉為第十四小洞天南嶽漢武帝以衡山遙逺移祭灊山遂為南嶽龍吟岩虎嘯岩皆在灊山左右龍井在真源宫虎井在中煉丹山三祖山在郡西北有乾元寺七公山在皖山南百子山在懐寧縣東萬嵗峯在玉照峯北多智山在懐寧縣北桃花港去司真洞五里菊花港在懐寧東北桑落洲在宿松縣南麟角峯在皖山頂虎頭岩在懐寧北龍眠山在桐城西北鳳棲山在太湖縣東南玉龍洞在州北七十里金雞石在真源宫後水晶洞在天柱寺中瓊瑶宫在灊山西瑪瑙山在太湖北白雲山在太湖東丹霞峯至皖山二里輿地紀勝人物漢朱邑守東海治行第一南史河尚之子孫多文人仕皆顯達皇朝王珪為相張漢卿為興國管庫與太守論事不合即和陶潛歸去來辭大書扵印紙而去輿地紀勝集疎鐘天柱寺細雨皖溪船張喬縣好也知臨皖水官閒應得㸔灊峯羅隠灊嶽積蒼翠皖溪生素波馬戴本朝政和五年陞徳慶軍節度紹興十七年改安慶軍沿革表集一水碧羅裁繚繞萬峯蒼玉刻孱岩王介甫獨秀司命峯衆立遜髙寒松竹二喬宅雪霜三祖山山谷碧水蒼山照眼青始知朱邑愛桐城郭祥正此山富山水自昔少園池主簿峯髙昔所見司空山深初未㳺白水十丈瀑吳塘千頃波林依玉照逺雲為石盆留虎頭玉照南北嶺麟角石盆三兩峯三百六旬了無事二十七峯常對門横舟千古樅陽水一徑從容達觀臺北峽逺連南峽險小龍峻逼大龍髙徐俯勢參吳楚分作鎭向同安地勝塵寰隔天深洞府寬位將衡嶽獻根與霍山蟠日轉香爐暖風清玉照寒石樓平郡堞天柱倚雲端禪臨祖師塔山接左慈壇𤣥宗曽立廟漢武亦鳴鑾孫倬題灊山蘄州倚郭一外縣四蘄春蘄水羅田廣濟黄梅蘄春