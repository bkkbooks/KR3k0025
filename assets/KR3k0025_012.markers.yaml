  - {type: variant, offset: 1078, length: 0, content: '', WYG: 寒雪未銷蔣吉鷗翻漢浦風波急鴈下鄖溪霧雨深羅隠本朝乾徳五年陞崇義軍節度太平興國改崇信熙寧五年省光化縣為鎭入隨縣沿革表嘉定年間割徳安府應山縣入隨州邸報集城上春光鶯語亂城下煙波風拍岸錢文僖詩筒相逐到隨城練句揮毫老益精范純仁詩到隨州更老成江山為助筆縱横山谷隨為西楚南郡頗富山水溳水帶西城城髙敞郡亭城隅樓榭與雲平城下流溪見底清邢恕雲山連楚塞夏水暗隨城隨州九十九重山安得鄉人住此間王安中隨州西南多竒峰争髙競秀無終窮衆山迤邐漸行盡始見獨尊惟大洪楊連厥溳雙水抱城隅髙誼前聞季大夫九十九岡風俗厚人人况已握靈珠陳師道均州倚郭一外縣一武當鄖鄉武當軍節度郡號武當鄒城始平鄖鄉齊興豐則州沿革秦韓}
