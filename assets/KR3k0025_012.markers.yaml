  - {type: variant, offset: 3, length: 0, content: '', WYG: 少屈法天下號曰包家李公麟博學好古輿地紀勝集勝境天然别精藍入畫圖一山分四頂三面瞰平湖羅隠本朝孝宗朝以御名改慎縣為梁縣沿革表集沃壤欲包淮甸盡堅城尤抱蜀山迴栁塘春水藏舟浦蘭若秋風教弩臺晴湖列逺岫萬疊來駿奔横入小蜀岡金友依玉昆肥川勝賞冠他州浦口揚舲得俊逰梅雨正肥江國路蘋風未破洞庭秋朱服蜀山回出千螺秀肥水長縈一帶迴猶合金城藏後浦不惟銅雀起樓臺花島可憐春自媚栁洲遙覺月微眀郭祥正無為軍倚郭一外縣二無為巢縣廬江淮西路提刑司提舉司郡號廬江居巢巢州軍沿革星土分野歴代地理並}
