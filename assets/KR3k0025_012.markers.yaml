  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷十二宋潘自牧撰郡縣部淮南西路廬州倚郭一外縣二合肥梁縣舒城保信軍節度淮西路安撫司制置司轉運司郡號合肥廬江肥水南豫徳勝軍保信軍州沿革吳地斗}
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_012-1a, image: WYG0930/WYG0930-0296a.png}
  - {type: page-break, offset: 0, content: '', id: KR3k0025_WYG_012-1b, image: WYG0930/WYG0930-0296b.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書記纂淵海卷十二宋潘自牧撰郡縣部淮南西路廬州倚郭一外縣二合肥梁縣舒城保信軍節度淮西路安撫司制置司轉運司郡號合肥廬江肥水南豫徳勝軍保信軍州沿革吳地斗}
  body:
  - {type: variant, offset: 1, length: 1, content: 量, WYG: 野禹貢揚州之域春秋舒國徐取之楚又取之戰國屬楚秦九江郡地漢廬江九江二郡地魏為揚州治晉淮南廬江二郡地宋齊為廬江郡梁置汝隂郡又改南豫州尋改合州隋開皇改廬州大業為廬江郡唐屬淮南道後唐改長興陞昭順軍節度周改保信軍沿革表縣沿革合肥本漢九江郡合肥縣晉屬淮南郡梁改汝隂縣及置汝隂郡隋廢郡改合肥縣置廬州治焉梁縣本漢浚遒縣屬九江郡晉屬淮南郡東晉改慎縣東魏置平梁郡陳改梁郡隋廢郡以慎州屬廬州舒城本春秋舒國楚滅之漢置廬江郡治舒縣晉後廢縣唐開元析合肥廬江置舒城縣沿革表形勝潛山州治所據巢湖詳見地理部湖類龍潭在梁縣治後鵲岸在舒城春秋吳人敗楚扵此金城河在合肥西金沙灘在藏舟浦鐵索澗金斗城皆在合肥三角山在舒城四頂山在合肥東南桃城鎭在舒城縣北花家城在舒城西舊名竹子市龍舒山在舒城有龍舒水龍眠山鹿起山在舒城金牛山在合肥金雞潭在舒城輿地紀勝人物范增為項羽謀臣文翁化巴蜀好文雅左慈有神術吳周瑜破曹操扵赤壁晉陶侃惜分隂唐萬敬儒三世同居兩賜旌表皇朝馬亮漕西川王均反主將誅戮得亮救免者千數包拯守本州}
