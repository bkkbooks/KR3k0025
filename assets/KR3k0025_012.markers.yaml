  - {type: variant, offset: 4, length: 2, content: 經維, WYG: 廬州本朝置軍沿革表縣沿革無為本漢廬江郡襄安縣梁改蘄縣隋復為襄安屬廬江郡唐為巢縣本朝析置無為縣為軍治巢縣本古南巢地春秋羣舒之邑漢為廬江郡居巢縣三國屬吳後廢之晉復置屬廬江郡隋省入襄安縣唐武徳置巢州七年州廢改襄安為巢縣屬廬州本朝置軍來屬廬江本漢廬江郡龍舒縣南齊改廬江縣梁置湘州北齊廢之隋廢郡𨽻廬州義興移治扵石梁東南唐景隆移治扵今所本朝置軍來屬沿革表形勝杏山在巢縣梅山見左傳楚師伐鄭右回梅山栭山在廬江巢山在巢縣本名道山巢湖在巢縣西一名焦湖孔臺在巢縣云宣聖與羣弟子憇息扵}
