  - {type: variant, offset: 210, length: 3, content: 夫知古, WYG: 黄鍾所以宣養六氣九徳也國語皇甫直臨小池弹琵琶本黄鍾而聲入㽔賔彈於他處則黄鍾也因夜復彈於池上覺有物擊水如魚躍遂竭池索之得鐵一片乃方響㽔賔鐵也雜爼集黄鍾毁棄瓦釡雷鳴楚辭卜居林鍾經大司樂歌函鍾以祭山川注云函鍾一名林鍾周禮太師隂聲函鍾注云林鍾未之氣也六月建焉同上季夏律中林鍾注云林鍾者黄鍾之所生也長六寸記季武子以其所得於齊之兵作林鍾而銘魯功焉左傳子林鍾者引而止也淮南子史林鍾者言萬物就死氣林林然史律書林鍾長五寸七分四角同上林君也言隂氣受任助㽔賔君主種物使長大楙盛也位於未在六月前律厯志六月坤之初六隂氣受任於太陽繼養化柔萬物生長楙之於未令種剛强大故林鍾為地統律長六寸六者所以含陽之施楙之於六合之内令剛柔有體也林鍾吕之首隂之變也並同上傳記林鍾和展百事俾莫}
