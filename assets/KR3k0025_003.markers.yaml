  - {type: variant, offset: 23, length: 0, content: '', krp: 清濁謂之律吕大戴禮命吕者律畧例吹律定姓以記其族白虎通燕有黍谷地美而寒不生五穀鄒衍吹律而温氣至劉向别録梁武帝素善音律遂自制四器通典唐張文收截竹為律吹之備旋宫之義同上隋文帝取律吕實葭灰以候氣問於牛𢎞對曰灰飛半出為和氣全出為猛氣不出為衰氣古今樂錄集寒谷豐黍吹律以暖之左思賦聴清濁五聲之和然後制為鍾律楊泉物理論律比崑崙竹杜詩惜無協律者窈𦕈絃吾詩栁集本朝太祖毎謂雅樂聲近於哀思因詔和峴依古法别造新尺并黄鍾九寸管令工人校其聲果下於王朴所定管一律尋又内降羊頭山秬黍累尺校律亦相符合自此雅音和暢㑹要李照所造鍾磬當時只是将太府寺布帛尺一面定法其尺約長王朴尺三寸使朝廷以不法之器薦見郊廟只如照所定黄鍾之管乃是南吕陪磬舊黄鍾九寸正磬却降在大簇夾鍾之間宋景文公議樂状律之分寸既定便當埋管候氣以騐其應否至於播之五聲二變而為六十調者乃其餘耳朱文公集候氣之説蓋埋管雖相近而自管之長短入地深淺有不同故氣之應有先後耳非以方位而為先後也同上衆絃排律吕金石次第名歐公黄鍾經大司樂奏黄鍾以祀天神周禮太師陽聲黄鍾注云黄鍾子之氣也十一月建焉㮚氏為量其聲中黄鍾之宫同上中央土律中黄鍾之宫注云黄鍾之宫最長也仲冬律中黄鍾注云黄鍾者律之始也九寸並記子師文鼔琴當夏而叩羽絃以召黄鍾霜雪交下川地暴沍列黄鍾者鍾已黄也淮南子黄鍾以生之注云黄鍾為音律之本揚子史黄鍾者陽氣鍾黄泉而出也律書黄鍾長八寸七分一宫同上五聲之本生於黄鍾之律前律厯志黄鍾者黄者中之色君之服也鍾者種也天之中數五五為聲聲上宫五聲莫大焉地之中數六六為律律有形有色色上黄五色莫盛焉故陽氣施種於黄泉孳萌萬物為六氣元也以黄色名元氣律者著宫聲也宫以九唱六變動不居周流六虛始於子在十一月十一月乾之初九陽氣伏於地下始著為一萬物萌動種於太隂故黄鍾為天統律長九寸九者所以究極中和為萬物元也黄鍾紀元氣之謂律太極中央元氣故為黄鍾其實一龠以其長自乘故八十一為日法所以生權衡度量禮樂之所繇出也隂陽相生自黄鍾始黄鍾初九律之首陽之變也陽生隂曰下生隂生陽曰上生上生不得過黄鍾之清濁下生不得及黄鍾之實並同上伏羲作易紀陽氣之初為律法建日冬至之聲以黄鍾之宫後律厯志黄鍾應天之數而長九寸同上冬至黄鍾之音調君道得禮儀志黄者隂陽之中色也或曰冬至徳氣為土土色黄故曰黄鍾晉志黄鍾者天子之宫北史伶倫斷竹長三寸九分而吹之以為黄鍾之宫曰含少隋禮樂志初隋用黄鍾一宫惟擊一鍾其十一鍾設而不擊謂之啞鍾唐張文収乃斷竹為十二律與孝孫吹調五鍾叩之而應由是十二鍾皆用唐禮樂志太常缺黄鍾鑄不能成李嗣真逢車有鐸聲}
