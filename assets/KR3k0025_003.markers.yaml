  - {type: variant, offset: 2145, length: 0, content: '', WYG: 法者天下之度量也同上史同律度量衡所以齊逺近立民信也前律厯志審度嘉量以臨兆民凡律度量衡用銅者名自名也所以同天下而齊風俗也並同上度量所以禁暴止邪也漢景帝詔律度量衡公私不同所宜一之北史王登奏律度量衡相用為表裏使得律者可以制度量衡因度量衡亦可以制律也唐禮樂志太史卿以二法權物量度權衡也百官志傳記先王之鑄鍾也律度量衡於是乎生國語集齊律度量衡使天下咸得其用人曰明我者舜也齊我者舜也資我者舜也韓集本朝皇祐中阮逸胡瑗累黍定尺始欲合其量也然竟於權不合程迥三器圖説上黨之黍其色至烏其形圎重用為度量决不徒然止以時有水旱之差地有肥瘠之異取黍大小必得其中故伊川先生曰欲度量權衡之得其正必自律起以律管定尺蓋凖乎天地也秬黍積數在先王時惟此適與度量合故可用也今或不然形有長短所以起度也受有多寡所以生量也物有輕重所以用權也是器也皆凖之上黨羊頭山之秬黍焉以之測幽隐之情以之達精微之理推三光之運則不失其度通八音之變則可召其和以辨上下則有品以分隆殺則有節並同上度經典瑞璧羨以起度周禮玉人璧羨度尺好三寸以為度同上司空執度度地記用器兵革不中度不粥於市同上子度然後知長短孟史禹聲為律身為度史本紀度者分寸丈尺引也所以度夫長短也本起黄鍾之長以子穀秬黍中者一黍之廣度之九十分黄鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅髙一寸廣二寸長一丈而分寸丈尺存焉用竹為引髙一分廣六分長十丈其方法矩髙廣之數隂陽之象也分者自三微而成著可分别也寸者忖也尺者蒦也丈者張也引者信也夫度者别於分忖於寸蒦於尺張於丈信於引引者信天下也前律厯志體有長短檢之以度則不失毫釐隋志本朝自唐昭宗時雅樂亡散至後周時王朴重定尺度太祖朝又詔和峴以景表尺重加磨治稍令聲下昨縁景祐二年燕肅始乞修正樂器其時只得王朴律準又與王朴所定律尺律管參騐音韻而燕肅只據律準與鍾磬}
