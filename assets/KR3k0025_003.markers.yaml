  - {type: variant, offset: 653, length: 2, content: 甸侯, WYG: 志傳記夾鍾出四隙之細也注云出四時之間氣微細者四時之氣皆始於春故夾鍾出四時之氣也國語夾者孚甲也言萬物孚夾鍾類分也白虎通無射經大司樂奏無射以享先祖周禮太師陽聲無射注云無射戍之氣也九月建焉同上季秋律中無射注云無射者夾鍾之所生長四寸六千五百六十一分寸之六千五百二十四記天王景王将鑄無射伶州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿}
