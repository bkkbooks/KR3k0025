  - {type: variant, offset: 2243, length: 0, content: '', WYG: 夘者茂也言陽氣生而孳茂也辰者振也謂時物振動而長也巳者起也物至此時畢盡而起也午者長也大也言萬物皆長大也未者味也言萬物向成有滋味也申者身也言萬物身體皆成就也酉者猶也謂時物皆猶縮也戌者滅也謂時物皆度滅也亥者劾也言時隂氣劾殺萬物也晉樂志傳記太嵗在寅曰攝提格在夘曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰恊洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若爾雅少陽見寅寅者演也卯者茂也辰震也太陽見於巳巳者物必起午物滿未味也少隂見於申申者身也酉老物收斂戌者滅也太隂見於亥亥者仰也子者孳也丑者紐也白虎通日以統辰如君統臣也辰屬月故月上繫天也其斗之星夜隨天左旋各指十二辰之位謂之斗建亦名月建閏月則指十二辰之間厯術子𤣥枵丑星紀寅析木夘大火辰夀星巳鶉尾午鶉火未鶉首申實沈酉大梁戌降婁亥娵訾同上詳見十二次類子寳瓶丑磨蝎寅人馬卯天蝎辰天秤已雙女午獅子未巨蟹申隂陽酉金牛戌白羊亥雙魚命}
