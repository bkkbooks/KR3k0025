  - {type: variant, offset: 2164, length: 1, content: 吾, WYG: 通而有紀周宻而不泄準平而不失萬物皆平民無險謀怨惡不生是故上帝以為物平無準繩雖魯班不能以定曲直並同上準水平準中大匠取法焉荘程者物之準荀繩大匠不為拙工改廢繩墨孟造父學御進退履繩列待鉤繩而正者是削其性也荘以繩墨自給而備世之急同上木受繩則直荀繩者直之至引繩以持曲直繩墨之起為不直也度已以繩足以為天下法則矣並同上繩正於上木直於下淮南子繩之於内外無私曲直故可以為正同上史孝文以仁義為準前東方朔傳賢才之畜於國猶巧匠之待繩墨也晉阮种傳其餘見五則類集背繩墨以追曲兮競周容以為度離騷經何時俗之工巧兮背繩而改錯宋玉九辨使離婁督繩公輸削墨文選五則權衡規矩繩經衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圎記古者深衣以應規矩繩權衡規矩取其無私繩取其直權衡取其平深衣子天為繩地為準春為規夏為衡秋為矩冬為權繩者所以繩萬物也準者所以準萬物也規者所以圎萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也淮南子史規圜矩方權重衡平準繩嘉量探賾索隠鉤深致逺前律厯志權與物鈞而生衡衡運規生規圜生矩矩方生繩繩直生準準正則平衡而均權矣是為五則規者所以規圜器械令得其類也矩者所以矩方器械令不失其形也規矩相須隂陽位序圜方乃成準者所以揆平取正也繩者上下端直經緯相通也準繩連體權衡合徳百工由焉以定法式太隂者北方北伏也陽氣伏於下於時為冬冬終也物冬藏乃可稱水潤下知者謀謀者重故為權也太陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平火炎上禮者齊齊者平故為衡也少隂者西方西遷也隂氣遷落物於時為秋秋揫也物揫斂乃成熟金從革改更也義者成成者方故為矩也少陽者東方東動也陽氣動物於時為春春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也中央者隂陽之内四方之中經緯通達乃能端直於時為四季土稼穡蕃息信者誠誠者直故為繩也五則揆物有輕重圜方正直隂陽之義四時四方之體五常五行之象厥法有品各順其方而應其行今廣延羣儒博謀講道修明舊典同律審度嘉量平衡均權正準直繩立于五則備數和聲以利兆民並同上太昊乘震執規司春炎帝乘離執衡司夏少昊乘兑執矩司秋顓帝乘坎執權司冬黄帝乘坤艮執繩司下土魏相傳厯經澤中有火革君子以治厯明時易厯象日月星辰敬授人時書帝曰来禹天之厯數在爾躬禹謨四五紀五曰厯數洪範太史正嵗年以序事頒之于官府及都鄙注云中數曰嵗朔數曰年䟽云一年二十四氣皆節氣在前中氣在後節氣一名朔氣中氣匝則為嵗朔氣匝則為年周禮先王之正時也履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖左傳㐮二十七年冬十一月朔日有食之辰在申司厯過也哀十二年冬十二月螽仲尼曰火伏而後蟄者畢今火猶西流司厯過也少皥氏以鳥名官鳳鳥氏律正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啟者也丹鳥氏司閉者也並同上堯曰咨爾舜天之厯數在爾躬論語子黄帝之治天下節四時之度正律厯之數文中子史容成氏始造律厯史黄帝本紀髙辛厯日月而迎送之本紀周過其厯秦不及期諸侯王表黄帝考定星厯建立五行起消息正閏餘少皥氏之衰也九黎亂徳顓帝受之乃命南正重司天以屬神命北正黎司地以屬民其後三苗服九黎之徳故二官咸廢所職而厯數失序堯復逐重黎之後而立羲和之官明時正度申戒文祖云天之厯數在爾躬舜亦以命禹厯書今上即位謂漢武帝招致方士唐都分其天部而巴落下閎運筭轉厯然後日辰之度與夏正同乃改元詔以七年為太初元年同上三代既沒史官喪紀故其所紀有黄帝顓帝夏商周及魯厯秦兼天下頗推五勝而自以獲水徳乃以十月為正漢興襲秦正朔以張蒼言用顓帝厯至武帝元封七年公孫卿壺遂司馬遷等言厯紀廢壊遂詔卿遂遷等議造漢厯乃以前歴上元太初四千六百一十七嵗至於元封元年復得閼逢攝提格之數中冬十一月甲子朔夜半冬至日月在建星太嵗在子已得太初本星度新正乃選方士唐都分天部落下閎運筭轉厯其法以律起厯曰律容一龠積八十一寸則一日之分也與鄧平所治同於是皆觀新星度日月行更以推筭如閎平法一月之日二十九日八十一分日之四十三廼詔遷用鄧平所造八十一分律厯罷廢尤䟽逺者十七家復使宦者淳于陵渠復}
