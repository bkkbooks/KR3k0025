  - {type: variant, offset: 2218, length: 5, content: 發縱謂解紲, WYG: 閼逢史記作焉逢在乙曰旃蒙史記作端䝉在丙曰柔兆史記作游兆在丁曰強圉史記作彊梧在戊曰著雍史記作徒維在己曰屠維史記作祝犂在庚曰上章史記作商横在辛曰重光史記作昭陽在壬曰𤣥黓史記作横艾在癸曰昭陽史記作尚章以上並爾雅月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極同上大撓作甲子類要五剛甲丙戊庚壬五柔乙丁己辛癸記䟽青帝生子}
