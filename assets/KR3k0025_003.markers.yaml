  - {type: variant, offset: 2163, length: 0, content: '', WYG: 巧不以規矩不能成方圎孟聖人既竭目力焉繼之以規矩準繩以為方圎平直規矩方圎之至也梓匠輪輿能與人規矩不能使人巧並同上奚仲之為車器也方圎曲直皆中規矩鈎繩管造父學御旋曲中規矩列工倕旋而蓋規矩指與物化而不以心稽荘陶者曰我善治埴圜者中規方者中矩匠石曰我善治木勾者中鈎直者應繩夫埴木之性豈欲中規矩鉤繩哉同上設規矩陳繩墨便備用君子不如工人荀無規矩雖奚仲不能以定方圓淮南子規矩一行而不易常一而不邪方行而不流一日行之萬世𫝊之而以無為為之規矩鉤繩者巧之具也而非所以巧也規矩事之制也賢王用人猶制木規矩方圎各有所施規之為度也轉而不獲圎而不垸優而不縱廣大以寛矩之為度也肅而不悖剛而不憒取而無怨内而無害威厲而不懾令行而不廢並同上如委己以從人雖有規矩焉得而用之揚大器其猶規矩準繩乎先自治然後治人之謂大器同上天圎不中規地方不中矩文中矩五寸之矩盡天下之方荀史禹左準繩右規矩史本紀哲王規矩乾坤晉阮种傳漢興破觚為圜前酷吏序大漢中興破矩為圜後杜林傳餘見後五則類集固時俗之工巧兮偭規矩而改錯離騷經規天矩地文選木之就規矩在梓匠輪輿韓集重規疊矩唐楊炯少室山碑準繩經準㮚氏為量權之然後準之周禮繩巽為繩直易惟木從繩則正書其繩則直詩子法者人生之準繩也淮南為平者準也為直者繩也若夫不在準繩之中可以為平直者此不共之術也繩之為度也直而不争修而不窮久而不弊逺而不忘與天地得與神明合所欲則得所惡則忘自古及今不可移正厥徳孔宓廣大以容衆是故上帝以為物宗準之為度也平而不險均而不阿廣大以容寛裕以和柔而不剛鋭而不挫流而不滯易而不穢}
