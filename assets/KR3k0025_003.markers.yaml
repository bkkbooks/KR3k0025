  - {type: variant, offset: 301, length: 134, content: 君眼不見門前事白侍郎徐鉉不信佛酷好鬼神之說楊億談苑經家不寶龜記禮器子家不藏甲家語史五大不在邊五細不在庭左昭十年國家之立也本大而末小是以能固故天子建國諸侯立家左大夫無百雉之城史孔子世家徙齊諸田楚昭屈燕趙韓魏後及豪傑名家居關中無事可以備胡諸侯有變亦足率以東伐此強本弱末之術, WYG: 萬物簇生}
