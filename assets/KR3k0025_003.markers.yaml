  - {type: variant, offset: 2167, length: 1, content: 吾, WYG: 詔與丞相御史大将軍右将軍史各一人雜候上林清臺課諸厯踈宻凡十一家太初厯第一徐萬且徐禹治太初厯亦第一夀王及李信治黄帝調厯課皆踈濶孝成世劉向總六律列是非作五紀論向子歆究其微妙作三統厯自文公閏月不告朔百有餘年莫能正厯數並同上王莽令太史推三萬六千嵗厯紀六嵗一改元本傳漢初用乙夘厯至武帝始作太初厯後律厯志武帝更建太初改元易朔行夏之正自太初元年始用三統厯施行百有餘年考其行日有退無進月有進無退章帝知其錯繆召治厯編訢李梵等及能術者課校諸厯以為四分厯並同上元和中劉洪造乾象法方於太初四分轉精宻矣後漢司馬彪注黄帝經緯厯數然後天歩有常則風后之力也張衡傳黄帝使羲和占日常儀占月鬼臾區占星氣伶倫造律吕大撓造甲子𨽻首作筭數容成綜斯六術考定氣象謂之調厯晉律厯志三代世有日官日官司厯仲尼每於朔閏發文蓋因以宣明厯數也並同上宋文帝元嘉二十一年何承天撰元嘉新厯通鑑初魏入中原用景初厯世祖克沮渠氏得元始厯時人以為宻是嵗始行之同上時宋元嘉三十九年延昌中李業興為戊子元厯上之北史齊文㐮引李業興為中外府咨議參軍業興乃造化宫行棊厯以五百為章四千四十為蔀九百八十七為分還以己未為元始終相推不復移轉與今厯法術不同至於氣序交分景度盈縮不異也同上東魏以正元厯浸差命李業興更加修正以甲子為元號曰興元厯通鑑隋張胄𤣥改定新厯言前厯差一日謂厯法與古不同者三事其超古獨異者有七事北史本傳唐貞觀十四年十一月甲子朔冬至時戊寅厯以癸亥為朔李淳風表稱古厯分日起於子半今嵗甲子朔冬至而故太史令傅仁均減餘稍多子初為朔遂差三刻用乖天正請更加考定衆議以仁均定朔微差淳風推校精宻請如淳風議通鑑王勃嘗作大唐千嵗厯本傳開元九年詔僧一行作新厯推大衍數立術以應之較經史所書氣朔日名宿度可考者皆合十五年草成而一行卒詔張説與陳𤣥景等次為厯術七篇畧例一篇厯議十篇自太初至麟徳厯二十三家與天雖近而未宻也至一行宻矣其倚數立法固無以易也後世雖有改作者皆依倣而已其一厯本議曰大衍為天地之樞如環之無端蓋律厯之大紀也唐律厯志厯法尚矣其要在於候天地之氣以知四時寒暑而仰察天日月星辰之行運以相參合而已唐始終二百九十餘年而厯八改初髙祖曰戊寅元厯髙宗曰麟徳甲子元厯𤣥宗曰開元太衍厯代宗曰寳應五紀厯徳宗曰建中正元厯憲宗曰元和觀象厯穆宗曰長慶宣明厯至昭宗曰景福崇元厯而止矣同上五代之初因唐之故用崇元厯至晉髙祖馬重績始更造新厯不復古推上元甲子冬至七曜之㑹而起唐天寳十四載乙未為上元用正月雨水為氣首初唐曹士為以顯慶五年為上元雨水為嵗首號符天厯秪行於民間而重績遂施于朝廷號調元厯然行之五年輙差不可用而復用崇元厯周廣順中王處訥私撰明元厯民間又有萬分厯西蜀有永昌厯南唐有齊政厯五代厯家可攷見者止於此五代史周世宗詔王朴定大厯設通經統三法以嵗軌離交朔望周變率䇿之數歩日月五星為欽天厯同上傳記神農因嘉禾八穂乃作穂書用頒時令雞跖集周羣嘗學山中忽有白猿化為老人而至授羣厯書一卷乃黄帝而下厯日也拾遺記自黄帝顓帝下逮三王治厯十有一家考課損益各有變衰風土記邢和璞曰漢之落下閎造太初厯云後八百嵗當差一日則有聖人定之今年期畢矣而一行造大衍厯正其差謬則落下閎之言信矣廣記愚按落下閎謂八百年當差一度然當時候注史官攷諸中星知太初厯已差五度而閎之不察則所謂八百年豈其然乎其黄道嵗差説詳見中星類内集璿籥環璣鳳司肇律簡文謝新厯表疇昔神農始治農功正節氣審寒温以為早晩之期故立厯日楊泉物理論階蓂朝開宫槐夜卷正我長厯同符大衍張説握符頌千年聖厯遐栁集本朝吕奉天奏臣考唐堯即位之年嵗在丙子凡三千三百一年矣成湯既沒太甲元年始有十二月乙丑朔旦冬至至武王伐商之年正月辛夘朔二十八日戊午二月五日甲子昧爽又康王十二年六月戊辰朔三日庚午朏從太甲元年距今至道二年凡二千七百三十二年今起商王小甲七年十一月甲申朔旦冬至自此毎七十六年得一朔旦冬至乃古厯一蔀也㑹要愚按厯法以十九嵗為一章四章七十六嵗為一蔀二十七章積五百一十三年為一㑹三㑹積八十一章為一統而得千五百二十九嵗三統積四千六百一十七年而為一元黄帝起元用辛夘厯顓帝用乙夘厯虞用戊午厯夏用丙寅厯商用甲寅厯周用丁巳厯魯用庚子厯秦用乙夘厯漢用太初厯四分厯三統厯魏用黄初厯景初厯晉用元始厯北元萬分厯宋用大明厯元嘉厯齊用天保厯同章厯正象厯後魏用興和厯正元厯正象厯梁用大同厯乾象厯永昌厯後周用天和厯丙寅厯明元厯隋用甲子厯開皇厯皇極厯大業厯唐用戊庚厯麟徳厯神龍厯大衍厯元和厯觀象厯長慶宣明厯寳應厯正元厯景福崇元厯晉天福用調元厯周顯徳用欽天厯本朝太祖用應天厯太宗用乾元厯真宗用宜天厯仁宗用崇天厯英宗用明天厯已而復用崇天厯春明退朝錄愚今按髙宗用統天厯孝宗用乾道厯淳熈厯光宗用㑹元厯寜宗用統天厯開禧厯今上寳佑改㑹天厯厯家筭氣只筭得到日月星辰運行處上圗去更筭不得朱文公語錄季通説當初造厯便合并天運所差之度都筭在裏庶㡬厯可以正而不差今人只管説天之運行有差造厯以求合乎天以厯愈差元}
