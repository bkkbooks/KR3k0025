  - {type: variant, offset: 2192, length: 4, content: 獵追殺獸, WYG: 用建子為正三年還以今正月為嵗首矣湘山野錄集革正朔為天下始司馬相如賦班正朔於八荒文選朔望弦晦告朔聽朔附經太史頒告朔于邦國周禮天子聴朔於南門之外記諸侯皮弁以聽朔於太廟同上僖五年正月辛亥朔公既視朔遂登觀䑓以望而書左傳文六年閏月不告朔棄時政也同上十六年公四不視朔天子告朔于諸侯諸侯受于禰廟禮也穀梁傳朔有事則書晦雖有事不書公羊傳甲乙}
