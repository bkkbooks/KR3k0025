  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 周時玉尺朂以校已所治鍾鼓金石絲竹皆短於一米於是伏咸之妙同上鄭譯牛𢎞辛彦之之徒依京房六十律因而六之為三百六十律以一律為七音音為之調凡十二律為八十四調唐禮樂志吕才制尺十二枚長短與律黙契始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為龠合一黍之重積而為銖兩}
