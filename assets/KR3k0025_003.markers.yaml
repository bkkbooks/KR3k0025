  - {type: variant, offset: 925, length: 0, content: '', WYG: 無射者隂氣盛用事陽氣無餘也史律書無射長四寸四分三分一同上射厭也言陽氣䆒物而使隂氣畢剝落之終而復始亡厭射也位於戍在九月前律厯志射者出也言時陽氣上升萬物收藏無復出也晉志傳記無射所以宣布哲人之令徳示民軌儀也注云九月乾上九也陽氣上升收藏萬物無得見者可徧布前哲之令徳示民導法國語射終也言萬物隨陽而復又隨陽而起無有終極故以為名通典中吕經大司樂歌小吕以享先妣注云小吕一名中吕周禮太師隂聲小吕注云中吕已之氣也四月建焉同上孟夏律中中吕注云中吕者無射之所生長六寸萬九千六百八十三分寸之萬二千九百七十四記月令愚按無射三分損一下生中吕實長三寸萬九千六百八十三分寸之六千四百八十七月令注葢中吕之倍數也子中吕者中充大也淮南子史中吕者言萬物盡旅而西行也史律書中吕長五寸九分三分二徴同上中吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於已在四月前律厯志陽下生隂隂上生陽終於中吕十二律畢矣同上吕助也謂陽氣盛長隂助成功也晉志傳記中吕宣中氣也國語度量律度量衡附經同律度量衡書舜典内宰}
