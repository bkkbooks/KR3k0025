  - {type: variant, offset: 1204, length: 934, content: 久存而繼者常至於殆廢自古賢哲之士為其民捍患興利其遺跡往往而在使其繼者皆如始作之心則民到于今受其賜天下豈有遺利乎歐公偃虹隄記以四時之功而成之以數日之雨而壞之歐公求晴祭文善百譽而不進兮一毀終世以顛隮歐文蘇子美墓銘子其進銳者其退速孟無故以合者則無故以離莊山木史物暴長者必夭折功卒成者必亟壞東漢朱浮傳致貴無漸失必暴東漢翟酺傳受爵非道失必疾同上夫物速成則疾亡晚就則善終朝華之草夕而零落通監晉明帝經獲罪於天無所禱也語八佾互入守正子知而使之是不仁也不知而使之是不知也孟公孫丑下史欲加之罪其無辭乎左僖十年進退罪也左不有人禍則當鬼誅通監唐紀魏元忠曰臣猶鹿耳羅織之徒欲得臣肉為羹臣安避之通監唐武后集豈不在遐遠虞羅所見尋陳子昂集不有人禍則有天刑韓文經虎兕出於柙龜玉毀於櫝中是誰之過歟語子行脩而名不章友之罪也家語夫舟浮於水車轉於陸此勢之自然也木擊折軎水戾破舟不怨木石而罪巧拙者知故不載焉淮南子主術篇言木石無巧拙故不怨也史鄭棄其師春秋閔二年左傳曰鄭惡高克使帥師次于河上師潰而歸高克奔陳申子卑卑施之於名實韓子引繩墨切事情明是非其極慘礉胡革切少恩皆原於道德之意史記韓非傳論王恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也上曰首為馬邑事者恢不誅恢無以謝天下通監漢武紀是時小旱上令官求雨卜式言曰縣官當食租衣稅而已今弘羊令吏坐市列肆販物求利烹弘羊天乃雨同上時以浮虛相扇儒雅日朁范寧謂其源始於王弼何晏二人之罪深於桀紂晉書范寧傳互入作俑桓溫過淮泗踐北境與諸寮屬登平乘樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責晉書本傳互入感歎武后見駱賓王檄曰宰相之過也人有如此才而使之流落不偶乎通監唐紀陸贄上疏以為陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死臣所謂致今日之患群臣之罪者豈徒言歟謂禍福由人不言盛衰有命人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也通監唐德宗譬猶操兵以刃人天下不委罪於兵而委罪於所操之主蓄毒以殃物天下不歸咎於蠱而歸咎於所蓄之家舊唐書裴延齡傳傳記以徵為羽非絃之罪也以甘為苦非味之罪也說苑集教盜穴墻發櫃多得金玉已復不與同挈得不為盜乎杜牧之集互入誅心本朝百鍊之剛日膾千牛匣而不用非我之羞東坡集民勞吏宜羞坡詩經昭然若發矇矣記, WYG: 象}
