markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷三宋潘自牧撰律厯部律吕經同律度量衡律和聲予欲聞六律五聲八音並書大司樂以六律六同五聲五音大合樂周禮大師掌六律六同以合隂陽之聲陽聲黄鍾太簇姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾掌執同律以聽軍聲而詔吉凶典同掌六律六同之和同上五聲六律十二管還相為宫也並記為六律七音八風九歌以相成也左傳子師曠之聰不以六律不能正五音聖人既竭耳力焉繼之以六律正五音並孟䕫合六律調五音淮南子一律而生五音十二律而為六十音因六六之六六三十六故三百六十日以當一嵗之日律厯之數天地之道也同上或問交五聲十二律或雅或鄭何也曰中正則雅多哇則鄭揚子帝軒候鳳鳴以調律抱朴子史王者制事立法物度軌則一禀於六律六律為萬事根本焉其於兵械尤所重故云望敵知吉凶聞聲考勝負史律書武王伐紂吹律聴聲同上律十有二陽六為律隂六為吕律以統氣類物吕以旅陽宣氣前律厯志黄帝使伶倫自大夏之西崑崙之隂取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黄鍾之宫制十有二筩以聴鳳之鳴其雄鳴為六雌鳴亦六比黄鍾之宫而皆可以生之黄鍾之長九寸三分損一下生林鍾參分林鍾益一上生太簇參分太簇損一下生南吕參分南吕益一上生姑洗參分沽洗損一下生應鍾參分應鍾益一上生蕤賔參分蕤賔損一下生大吕參分大吕益一上生夷則參分夷則損一下生夾鍾參分夾鍾益一上生無射參分無射損一下生中吕參分律用銅者銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似士君子之行是以用銅也並同上武帝以李延年為協律都尉畧論律吕以合八音之調禮樂志伏羲作易紀隂陽之初以為律法以六十律分朞之日後律厯志截管為律吹以考聲紀斗氣効物類五音生於隂陽分為十二律轉生六十天効以景地効以響即律也天子常以冬夏至候鍾律冬至陽氣應則樂均清景極長黄鍾通土炭輕而衡仰夏至隂氣應則樂均濁景極短㽔賔通土炭重而衡低候氣之法布緹縵室中以木為案每律各一内庳外髙從其方位加律其上以葭莩灰抑其内端案厯而候之氣至者灰去並同上明帝升靈䑓吹時律觀物變本紀黄帝作律以玉為管長尺六寸為十二月音晉律厯志西王母獻舜以昭華之琯以玉為之取其體猶潤也律之始造以竹為管取其自然圎虛也神道廣大妙本於隂陽形氣精微義先於律吕遂八風而宣九徳和大樂而成政道律之為言法也言陽氣始生各有法也吕之為言助也所以助隂成陽也並同上荀朂以杜䕫所制律吕乖錯乃制古尺作新律吕以調聲韻樂志荀朂作新律笛十二枚以調律吕而雅樂正然論者猶謂朂暗觧時阮咸妙達八音論者謂之神解咸嘗心譏朂新律聲髙近哀思不合中和朂以為異已乃出咸為始平相後有田父}
