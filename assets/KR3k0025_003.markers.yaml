  - {type: variant, offset: 2214, length: 0, content: '', WYG: 元和元年太初去天益逺晦朔弦望差天一日章帝召治厯編訢李梵等綜校其状而訢梵以為十一月當先大欲以合朔弦望而晦朔失實行之未期章帝考之經䜟以問訢梵等以為月當先小據春秋書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔後律厯志日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相去為衡分天之中謂之望以速及舒光盡體伏謂之晦永元中復令史官以九道法候弦望騐之無有差失並同上弦望伏見者厯數之綱紀也晉律厯志課弦望於兩儀同上朔為朝㑹之首隋志聖厯元年制毎月一日於明堂行告朔之禮唐禮樂志傳記堯階有草生庭名曰蓂莢堯觀之以知晦朔通鑑又詳見蓂莢類月朔見東方曰朒晦見西方曰朓白虎通}
  - {type: page-break, offset: 2214, content: '', id: KR3k0025_WYG_003-46b, image: WYG0930/WYG0930-0106b.png}
  - {type: variant, offset: 2214, length: 0, content: '', krp: 元和元年太初去天益逺晦朔弦望差天一日章帝召治厯編訢李梵等綜校其状而訢梵以為十一月當先大欲以合朔弦望而晦朔失實行之未期章帝考之經䜟以問訢梵等以為月當先小據春秋書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔後律厯志日月相推日舒月速當其同謂之合朔舒先速後近一逺三謂之弦相去為衡分天之中謂之望以速及舒光盡體伏謂之晦永元中復令史官以九道法候弦望騐之無有差失並同上弦望伏見者厯數之綱紀也晉律厯志課弦望於兩儀同上朔為朝㑹之首隋志聖厯元年制毎月一日於明堂行告朔之禮唐禮樂志傳記堯階有草生庭名曰蓂莢堯觀之以知晦朔通鑑又詳見蓂莢類月朔見東方曰朒晦見西方曰朓白虎通}
