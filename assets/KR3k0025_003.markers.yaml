  - {type: variant, offset: 2155, length: 0, content: '', WYG: 道如底以見準之正繩之直左旋見規右折見矩其在天也佐助璇璣斟酌建指以齊七政故曰玉衡權者銖兩斤鈞石也所以稱物平施知輕重也本起於黄鍾之重一龠重千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十八變之象也五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之四倍好者周旋無端周而復始無窮也已銖者物繇忽微始至於成著可殊異也兩者兩黄鍾律之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乘四方之象鈞者鈞也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之數也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十鈞者十二月之象也終於十二辰而復於子黄鍾之象也千九百二十兩者隂陽之數也三百八十四爻者五行之象也四萬六千八十銖者萬一千五百二十物厯四時之象也而嵗功成就五權謹矣前律厯志趙石勒得圎石状如水碓銘曰律權石重四鈞同律度量衡晉志量有輕重平以權衡則不失黍絫隋書帝曰天下之勢}
