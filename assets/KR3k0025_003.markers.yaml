  - {type: variant, offset: 2230, length: 0, content: '', WYG: 者滋也丑者紐也同上史子者滋也言萬物滋於下也丑者紐也言陽氣在上未條萬物厄紐未敢出寅言萬物始生螾然也夘之為言茂也言萬物茂也辰者言萬物之蜄也巳者言陽氣之巳盡也午者隂陽交未者言萬物皆成有滋味也申者言隂}
