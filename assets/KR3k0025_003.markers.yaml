  - {type: variant, offset: 2224, length: 1, content: 放, WYG: 曰甲乙甲乙東方木赤帝生子而曰丙丁丙丁南方火黄帝生子而曰戊己戊己中央土白帝生子而曰庚辛庚辛西方金黒帝生子而曰壬癸壬癸北方水見於時而生物者乙與庚合春則有榆青而白不失金木之色辛與丙合秋則有棗白而赤不失金火之色已與甲合夏末秋初有𤓰青而黄不失土木之色丁與壬合夏則有椹赤而黑不失水火之色癸與戊合冬則有橘黒而黄不失水土之色真仙骨天上三竒乙丙丁地下三竒甲戊庚遁甲丙加甲名飛鳥跌穴甲加丙名青龍迴首同上戊孟知祥曰上戊之辰時俗所重不可廢也談苑諸欲止宿安營避病去害者當用真人閉六戊之法遁甲道家忌六戊日不入靖燒香道書戊己燕作窠避戊己説文集仙官勅六丁雷電下取將韓集女丁婦壬傳世婚同上十二支經馮相氏掌十有二辰以㑹天位周禮硩簇氏以方書十二辰之號同上天之大數不過十二郊特牲注亥嵗在豕韋之次注亥也左傳子子午夘酉為二繩丑寅辰巳未申戌亥為四鉤淮南帝張四維運之以斗指寅則萬物螾夘則茂茂然辰則振}
