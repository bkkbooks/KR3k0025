  - {type: variant, offset: 719, length: 202, content: 通監漢文紀支大於榦脛大於股不折必披西漢灌夫傳如下有泰山之安則上有累卵之危西漢劉向傳唐魏元忠曰言文者則以詞華為首而不及經綸言武者則以騎習為先而不知方略通監唐紀傳記脛大於股者難以步指大於臂者難以把本小末大不能相使也說苑君道篇集母瘦雛漸肥白樂天子今盆水在庭清之終日未能見目睫濁之不用一撓而不能察方圓人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎淮南子俶真訓夫樹本灌以潦水疇以肥壤千人養之一人拔之則必无餘孽, WYG: ''}
