  - {type: variant, offset: 645, length: 1, content: 互, WYG: 簇者簇也謂萬物隨於陽氣太簇而生也晉志傳記太簇所以金奏賛陽出滯也國語南吕經大司樂歌南吕以祀四望周禮太師隂聲南吕注云南吕酉之氣也八月建焉同上仲秋律中南吕注云南吕者太簇之所生也長五寸三分寸之一記子師文鼔琴當春而叩商絃以召南吕凉風忽至草木茂實列南吕者任包大也淮南子史南吕者言陽氣之旅}
