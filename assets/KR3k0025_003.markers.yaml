  - {type: variant, offset: 2146, length: 1, content: 老, krp: 聲按定髙下即是太常舊樂比王朴時已自不同况和峴減定後又經景徳中李宗諤一次修飾至燕肅凡經三度磨鑢然俱不先立尺度律準所以後来無處根正法度音律宋景文公議樂状周尺也者先儒考其制脗合者不一至宋景文公得隋大業中尺十五等一周尺二晉田父玉尺三梁表尺四漢官尺五魏尺六殷後尺七後魏前尺八中尺九後尺十東後魏尺十一蔡邕銅龠尺十二宋氏尺十三隋常水尺十四雜尺十五梁朝俗間尺獨以周尺為之本以考諸尺韓忠獻嘉祐累黍二其一亦與周尺合苟以是定尺又以是參定權量如挈裘而振其領其順者不可勝數也程迥三器圗義量經㮚氏為量深尺内方尺而圎其外其實一鬴六斗四升其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黄律之宫槩而不税其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器惟則周禮齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之左傳}
  - {type: variant, offset: 2148, length: 0, content: '', WYG: 為之斗斛以量之則并與斗斛而竊之荘史量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子穀秬黍中者千有二百實其龠以井水準其槩十龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圎其外旁有庣焉其上為斛其下為斗左耳為升右耳為合龠其状似爵以縻爵禄上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重一鈞備氣物之數合萬有一千五百二十聲中黄鍾始於黄鍾而反覆焉君制器之象也龠者黄鍾律之實也躍微動氣而生物也合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也前律厯志量有輕重平以權衡物有多少受以量後律厯志物有多少受之以量則不失圭撮隋志傳記黄帝設五量家語集黄帝一統類齊制器栁相欺也為之斗斛以信之韓本朝二龠為合注云謂二十四銖皇祐新樂圗}
