  - {type: variant, offset: 2230, length: 0, content: '', krp: 者滋也丑者紐也同上史子者滋也言萬物滋於下也丑者紐也言陽氣在上未條萬物厄紐未敢出寅言萬物始生螾然也夘之為言茂也言萬物茂也辰者言萬物之蜄也巳者言陽氣之巳盡也午者隂陽交未者言萬物皆成有滋味也申者言隂}
  - {type: variant, offset: 2231, length: 1, content: 反, WYG: 事申賊萬物酉者萬物之老也戌者言萬物盡滅亥者該也言陽氣藏於下故該也史律書太極元氣函三為一行於十二辰始動於子參之於丑得三又參之於寅得九又參之於夘得二十七又參之於辰得八十一又參之於巳得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戌得五萬九千四十九又參之於亥得十七萬七千一百四十七此隂陽合徳氣鍾於子化生萬物者也故孳萌於子紐牙於丑引達於寅冒茆於卯振美於辰巳盛於巳咢布於午昧薆於未申堅於申留熟於酉畢入於戌該閡於亥故隂陽之施化萬物之終始既類依於律吕又經厯於日辰}
