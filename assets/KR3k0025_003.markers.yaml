  - {type: variant, offset: 2149, length: 1, content: 丘, krp: 今令文誤作十龠為合程迥三禮圗義合方一寸深一寸六分六釐積一千六百二十分升方三寸深一寸八分積一萬六千二百分斗方六寸深四寸五分積十六萬二千分迥用周尺依考工記造鬴却用本草千金方法以兔絲子九兩為升實容六十四升兎絲之秤蓋用開通錢十為七十二銖者是故周漢晉之尺本草千金方之升周禮之鬴唐書志之權四物不相謀而相合若符契然並同上皇祐龠合升斗以今太府寺見行升斗較之二升九合一龠弱得太府寺升一升二斗九升五合得太府寺斗一斗阮逸胡瑗云林億等較本草千金方曰藥升方作上徑一寸下徑六分深八分蓋龠法也同上權衡經稱物平施巽稱而隠巽以行權並易輪人權之以眂其輕重之均也㮚氏為量不耗然後權之玉人駔琮五寸宗后以為權駔琮七寸鼻寸有半寸天子以為權並周禮仲春日夜分則鈞衡石正權概仲秋日夜分則平權衡正鈞石記下齊如權衡者以安志而平心也深衣可與立未可與權論語子權然後知輕重執中無權猶執一也並孟權衡者所以視輕重也管為之權衡以稱之則並與權衡而竊之荘權物而稱用荀聖人備道全美是垂天下之權衡也道者古今之正權也衡所以知輕重衡石稱垂者所以為平也衡者平之至也衡不正則重垂於仰而人以為輕輕垂於俛而人以為重公平者職之行也並同上衡之為度也緩而不後平而不怨施而不徳弔而不責常平民禄以繼不足權之為度也急而不盈殺而不割誠信以必堅慤以固淮南子衡}
  - {type: variant, offset: 2152, length: 1, content: 道, WYG: 左右無私輕重故可以為平謹於權衡審乎輕重足以治其境内矣並同上史參為衡石史天官書優劣之垂在於權衡非徒低昻之差乃鈞銖之覺也滑稽傳注衡平也權垂也衡所以佐權而均物平輕重}
