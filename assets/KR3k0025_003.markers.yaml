  - {type: variant, offset: 2146, length: 1, content: 老, WYG: 聲按定髙下即是太常舊樂比王朴時已自不同况和峴減定後又經景徳中李宗諤一次修飾至燕肅凡經三度磨鑢然俱不先立尺度律準所以後来無處根正法度音律宋景文公議樂状周尺也者先儒考其制脗合者不一至宋景文公得隋大業中尺十五等一周尺二晉田父玉尺三梁表尺四漢官尺五魏尺六殷後尺七後魏前尺八中尺九後尺十東後魏尺十一蔡邕銅龠尺十二宋氏尺十三隋常水尺十四雜尺十五梁朝俗間尺獨以周尺為之本以考諸尺韓忠獻嘉祐累黍二其一亦與周尺合苟以是定尺又以是參定權量如挈裘而振其領其順者不可勝數也程迥三器圗義量經㮚氏為量深尺内方尺而圎其外其實一鬴六斗四升其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黄律之宫槩而不税其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器惟則周禮齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之左傳}
