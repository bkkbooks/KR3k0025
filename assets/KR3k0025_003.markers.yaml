  - {type: variant, offset: 2215, length: 2, content: 師古, WYG: 弦月半之名也若張弓弦也望月滿之名也日月相望釋名日月中分謂之弦日月相望謂之望日月合宿謂之晦論衡月望則蚌蛤實而羣隂盈月晦則蚌蛤虛而羣隂廢吕氏春秋集朔有告餼之文楊偉表晦朔如循環月盈已見魄文選本朝三日第一節之中月生明之時也蓋始受一陽之光為震而昏見於西方庚地八日第二節之中月上弦之時受二陽之光為兑而昏見於南方丁地十五日第三節之中月既望之時全受日光盛滿而昏見於東方之甲地是為乾體十六日第四節之始也始受下一隂為巽而成魄以平旦而沒於西方辛地二十三日第五節之中復生中一隂為艮而下弦以平旦而沒於南方丙地三十日第六節之終全變為坤而光盡體伏於西北一月六節既盡而禪於後月復生震卦云朱文公參同契注上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦語錄以天之圍言之上下弦明日月相㸔皆分天之一同上十榦經挾日而斂之注云從甲至癸謂之挾周禮硩簇氏以方書十日之號同上孟春仲春季春其日甲乙孟夏仲夏季夏其日丙丁中央土其日戊己孟秋仲秋季秋其日庚辛孟冬仲冬季冬其日壬癸記天有十日左傳先甲三日後甲三日易日用甲用日之始也記仲春上丁命樂正習舞釋菜仲丁命樂正習舞季秋上丁命樂正入學習吹記吉日惟戊詩先庚三日後庚三日易郊之用辛也䟽云以冬至陽氣新用事故用辛也記昭二十七年七月上辛大雩季秋又雩春秋史甲者言萬物剖符甲而出也乙者言萬物生軋軋也丙者言陽道著明丁者言萬物之丁壮也庚者言隂氣更萬物辛者言萬物之新生壬之為言任也言陽氣任養萬物於下也癸之為言揆也言萬物可揆度也史律書出甲於甲奮軋於乙明炳於丙大盛於丁豐楙於戊理紀於己斂更於庚悉新於辛懐任於壬陳揆於癸前律厯志日有六甲注云六甲之中惟甲寅無子同上甲巳為角乙庚為商丙辛為徵丁壬為羽戊癸為宫晉律厯志傳記太嵗在甲}
