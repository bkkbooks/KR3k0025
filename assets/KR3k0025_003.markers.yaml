  - {type: variant, offset: 2176, length: 3, content: 莊山木, WYG: 三年加以一閏以㑹成嵗也春秋元命苞梧桐一邊有六葉有閏則十三葉視之則知閏遁甲集嵗重先年重時七十二候迴環推天官玉琯灰剩飛今嵗何長来嵗遲王母移桃獻天子羲氏和氏迃龍轡李賀閏月樂詞本朝嵗有十二月月有三十日三百六十者一嵗之常數也故日與天㑹而多五日九百四十分日之二百三十五者為氣盈月與日㑹而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而餘生焉故一嵗不盡十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一而有餘五嵗再閏則五十四日九百四十分日之三百五而不足十有九嵗七閏則氣朔分齊是為一章也朱文公語載蔡九峯説愚按九峯用九百四十分日法盖古厯日法也太初厯日法用八十一分大衍用三千四十分本朝統元厯用萬二百分只有黄楊厄閏年東坡正朔經有扈氏怠棄三正書一之日觱發注云周正月二之日栗烈注云商正月三之日于耜注云夏正月詩聖人南面而聽天下改正朔易服色記隠元年春王周正月注云言周以别夏殷左傳行夏之時論語}
