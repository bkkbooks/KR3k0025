  - {type: variant, offset: 651, length: 0, content: '', WYG: 傷之物也位於申在七月前律厯志夷平也謂萬物将成平均皆有法則也晉志傳記夷則者所以詠歌九則平民無貳也注云言萬物既成可法則也故可詠歌九功之則使民無疑貳也國語七月萬物将成平均結實皆有法則故謂之夷則一云夷者傷之義言秋之時萬物始被刑法而傷其性故以為名通典注夾鍾經大司樂歌夾鍾以享先祖周禮太師隂聲夾鍾注云夾鍾夘之氣也二月建焉同上仲春律中夾鍾注云夾鍾者夷則之所生長七寸二千一百八十七分寸之千七十五記按夷則參分損一下生夾鍾實長三寸二千一百八十七分寸之一千六百三十一月令注蓋夾鍾之倍數也子師文鼓琴及秋而叩角絃以激夾鍾温風徐迴草木發榮列夾鍾者種始莢也淮南子}
