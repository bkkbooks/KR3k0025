  - {type: variant, offset: 2180, length: 1, content: 師, WYG: 王者易姓受命必慎始初改正朔史厯書夏正以正月殷正以十二月周正以十一月蓋三王}
  - {type: variant, offset: 2180, length: 1, content: 師, krp: 王者易姓受命必慎始初改正朔史厯書夏正以正月殷正以十二月周正以十一月蓋三王}
  - {type: variant, offset: 2182, length: 0, content: '', WYG: 正若循環窮則反本天下有道則不失紀序無道則正朔不行於諸侯秦正以十月色上黒並同上其於三正也黄鍾子為天正林鍾未之衝丑為地正太簇寅為人正前律厯志倪寛與愽士等議曰帝王必改正朔易服色所以明受命於天也推傳序文則今夏時也火出於夏為三月商為四月周為五月夏數得天四時之正也三代各據一統明三統常合而迭為首登降三統之首周還五行之道也故三五相包而生天統之正始生於子半日萌色赤地統受之於丑初日肇化而黄至丑半日牙化而白人統受之於寅初日孽成而黒至寅半日生成而青天施復於子地化自丑畢於辰人生自寅成於申故厯數三統天以甲子地以甲辰人以甲申孟仲季迭用為統首三統之微既著而五行自青始三辰之合於三統也日合於天統月合於地統斗合於人統並同上武帝初用夏正以正月為嵗首故改元為太初也本紀有司議曰單于非正朔所加宣帝本紀三代之盛胡越不與受正朔嚴助傳冬至之節陽氣始萌故十一月天以為正周以為春十二月陽氣上通地以為正商以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春漢陳寵傳三微成著以通三統周以天元殷以地元夏以人元注云三微三正也言十一月陽氣始施萬物動於黄泉之下微而未著其色皆赤赤者陽氣故周以天正為嵗色尚赤夜半為朔十二月萬物始牙色白白者隂氣故殷以地元為正色尚白雞鳴為朔十三月萬物始達其色皆黒人得知功以展其業故夏以人正為嵗色尚黒平旦為朔故曰三微漢書景初元年有司奏以魏得地統宜以建丑之月為正三國志夫改正朔謂夏建寅商建丑周建子此三王相襲之道也唐律厯志傳記十一月乾之初九其位在子天氣始起生隂陽之化故子為天統六月坤之初六其位在未隂受陽化故十二月為地統正月乾之九三萬物凑出於地人奉而成之故寅為人統荀悦漢紀王者受命必改正朔明上受之於天下受之於人所以變易民心革其}
