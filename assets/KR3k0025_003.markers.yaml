  - {type: variant, offset: 2156, length: 5, content: 醯雞與微夫, krp: 持衡然此首重則彼尾輕矣唐李石傳賞罰之馭衆猶權衡之於輕重也陸宣公奏議傳記垂之者權也平之者衡也太𤣥本朝唐鑄開元通寳錢積十錢重一兩計一千重六斤四兩蘇冕曰今錢為古秤七銖以上比古五銖錢則加重二銖以上迥謂一大兩為七十二銖即一錢為七銖畸十分銖之一則所謂三兩為大兩者可無疑矣程迥三器圗義規矩規矩準繩附經輪人規之以眂其圜也萬之以眂其匡也周禮輿人為車圜者中規方者中矩同上古之君子必佩玉周旋中規折旋中矩記玉藻規沔水規宣王也注云規者正圜之器詩序矩君子有絜矩之道記大學七十而從心所欲不踰矩論語子離婁之明公輸}
