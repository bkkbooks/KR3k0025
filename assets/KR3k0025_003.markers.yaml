  - {type: variant, offset: 645, length: 1, content: 互, krp: 簇者簇也謂萬物隨於陽氣太簇而生也晉志傳記太簇所以金奏賛陽出滯也國語南吕經大司樂歌南吕以祀四望周禮太師隂聲南吕注云南吕酉之氣也八月建焉同上仲秋律中南吕注云南吕者太簇之所生也長五寸三分寸之一記子師文鼔琴當春而叩商絃以召南吕凉風忽至草木茂實列南吕者任包大也淮南子史南吕者言陽氣之旅}
  - {type: punctuation, offset: 647, content: 「, id: KR3k0025_CHANT_003-bkkpn195}
  - {type: variant, offset: 647, length: 3, content: 區處失, WYG: 藏也史律書南吕長四寸七分八徵同上南任也言陽氣旅助夷則任成萬物也位於酉在八月前律厯志南者任也謂時物皆秀有懐任之象也晉志傳記南吕賛陽秀也注云榮而不實曰秀南任也隂任陽事助成萬物國語八月物皆含秀懐吐之象隂任陽功助陽成功也通典注姑洗經大司樂奏姑洗以祀四望周禮太師陽聲姑洗注云姑洗辰之氣也三月建焉同上季春律中姑洗注云姑洗者南吕之所生也長七寸九分寸之一記子姑洗者陳去而新来也淮南子史姑洗者言萬物洗生史律書姑洗長六寸七分羽同上姑洗潔也言陽氣洗物姑潔之也位於辰在三月前律厯志姑枯也洗濯也謂物生新潔洗除其枯改柯易葉也晉志傳記姑洗所以修潔百物考神納賔也注云姑潔也洗濯也考合也言百物修潔故用之饗宴可以合神納賔也國語應鍾經大司樂歌應鍾以祭地示周禮太師隂聲應鍾注云應鍾亥之氣也十月建焉同上孟冬律中應鍾注云應鍾者姑洗之所生也長四寸二十七分寸之二十記子應鍾者應其鍾也淮南子史應鍾者陽氣之應不用事也史律書應鍾長四寸二分三分二羽同上應鍾言隂氣應無射該藏萬物而雜陽閡種也位於亥在十月前律厯志應者和也謂嵗功皆應和陽功收而聚之也晉志傳記應鍾均利器用俾應復也國語㽔賔經大司樂奏㽔賔以祭山川周禮太師陽聲㽔賔注云㽔賔午之氣也五月建焉同上仲夏律中㽔賔注云㽔賔者應鍾之所生也長六寸八十一分寸之二十六並記子師文鼓琴及冬而扣徴絃以激㽔賔陽光熾烈堅氷立散列㽔賔者安而服之也淮南子史㽔賔者言隂氣㓜少故曰㽔痿陽不用事故曰賔史律書㽔賔長五寸六分三分一同上㽔繼也賔導也言陽始導隂氣使繼養物也位於午在五月前律厯志㽔葳㽔垂下貎也賔敬也謂時陽氣下降隂氣始起相賔敬也晉志傳記㽔賔所以安靖神人獻酬交酢也國語皇甫直得方響蕤賔鐵詳見黄鍾類大吕經大司樂歌大吕以祀天神周禮太師隂聲大吕注云大吕丑之氣也十二月建焉同上季冬律中大吕注云大吕者㽔賔之所生也長八寸二百四十三分寸之百四記月令按㽔賔三分損一下生大吕實長四寸二百四十三分寸之五十二月令注葢大吕之倍數也子大吕者旅旅而去也淮南子史大吕長七寸五分三分一史律書吕旅也言隂大旅助黄鍾宣氣而牙物也位於丑在十二月前律厯志吕助也謂陽氣方生隂氣助也晉志大吕者皇后之位北史傳記大吕助宣物也國語夷則經大司樂奏夷則以享先妣周禮太師陽聲夷則注云夷則申之氣也七月建焉同上孟秋律中夷則注云夷則者大吕之所生也長五寸七百二十九分寸之四百五十一記子夷則者易其則也淮南子史夷則言隂氣之賊萬物也史律書夷則長五寸四分三分二商同上則法也言陽氣正法度而使隂氣夷}
