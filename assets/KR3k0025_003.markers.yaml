  - {type: variant, offset: 2171, length: 0, content: '', krp: 如何㑹差自是運行合當如此又云天之所運無常日月星辰行度疾徐自是不齊使我之法能運乎天而不為天之所運則其踈宻遲速過不及之間厯可推而不失矣康節厯十二萬九千六百分並同上節正須知鳳厯新歐陽公詩太史頒時令同上閏法經歸竒於扐以象閏五嵗再閏故再扐而後掛易以閏月定四時成嵗書太史閏月詔王居門終月周禮閏月則闔門左扉立于其中記文元年閏三月非禮也先王之正時也履端於始舉正於中歸餘於終左傳文六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民哀二十七年冬十一月朔日有食之辰在申司厯過也再失閏矣並同上閏是叢殘之數非月之正也穀梁注史三苗服九黎之徳故重黎二官咸廢所職而閏餘乖次史厯書秦正以十月閏厯度餘未能睹其真也同上厯數以閏正天}
  - {type: variant, offset: 2173, length: 0, content: '', WYG: 中前律厯志魯厯不正以閏餘一之嵗為蔀首自文公閏月不告朔至此百餘年莫能正厯數并終嵗為十九易窮則變是為閏法按天數終於九地數終於十終則有始所謂易窮則變也并二終之數共為十九厯法十九年而七閏是為一章傳曰歸餘於終事則不悖此聖王之重閏也朔不得中是為閏月言隂陽雖交不得中不生故以日法乘閏法是為統嵗並同上按太初厯日法八十一分乘閏法十九凡八十一十九共得千五百三十九是為一統之嵗閏月無中氣而北斗斜指兩辰之間所以異於他月也律厯志注五嵗再閏天道乃備天地之靈猶五載以成其化况人道哉朱浮傳其在閏交際以朔御之後律厯志合二終以起閏餘同上張純奏曰三年一閏天氣小備五年再閏天氣}
