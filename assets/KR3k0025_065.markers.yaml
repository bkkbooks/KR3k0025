  - {type: variant, offset: 2907, length: 286, content: 暴行且致亂亂則罪及副元帥亂由常侍出然則郭氏功名其存者幾何言未畢晞再拜曰公幸教晞以道恩甚大敢不從命顧叱左右皆解甲散還火伍中敢譁者死通鑑唐代宗回紇吐蕃合兵圍涇陽郭子儀曰今眾寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥藥葛羅執弓注矢於陣前子儀免冑釋甲投鎗而進回紇諸酋長相顧曰是也皆下馬羅拜藥葛羅曰懷恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復總兵於此懷恩又為天所殺我曹豈肯與公戰乎同上涇州王童之謀作亂期以辛酉旦警嚴而發前夕有告之者段秀實陽召掌漏者怒之以其失節令每更來白輒延之數刻遂四更而曙童, WYG: ''}
