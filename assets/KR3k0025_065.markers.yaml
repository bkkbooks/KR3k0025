  - {type: variant, offset: 708, length: 4, content: 憂五朝言, WYG: 慮晉温嶠𫝊殷浩弱冠有美名三府辟不就時擬之管葛王濛謝尚伺其出處以卜江左興亡晉書本𫝊為儉嵗之粱稷寒年之纎纊齊劉糾𫝊北齊主登童子寺望并州城曰此是何等城或對曰此是金城湯池天府之國齊主曰我謂唐邕是金城此非金城也北史太宗授李緯為兵部尚書房𤣥齡在京城㑹有自京師來者太宗問𤣥齡聞緯拜尚書如何曰但說緯好鬚更別無它語遽改緯洛州刺史其為當世準的如此裴度威譽徳業侔於郭子儀出入中外以身繫國之安危為時之輕重者二十年凡命将相無賢不肖皆推度為首唐書以身為天下安危者二十年唐郭子儀𫝊唐李栖筠初封賛皇縣尹喜奨善而樂人攻己之短為天下士歸重不敢有所斥稱賛皇公云本𫝊開元後天下稱曰曲江公而不名唐張九齡傳河北恃公為金城唐顔真卿𫝊元徳秀天下高其}
