  - {type: variant, offset: 1949, length: 2, content: 將移, krp: 織筆耕李肇翰林志江偉善書人得其手疏莫不藏之以為寳江偉別𫝊白傅𦵏龍門山四方過者必奠酒塚前方丈之土常成泥濘賈黄中談録白樂天應宏詞賦考落登科之人賦並無聞白公之賦𫝊於天下摭言師其徳業可以治國字人慕其風範可以激貪厲俗史通集吾希段干木偃息藩魏君吾慕魯仲連談笑却秦軍著論準過秦作賦擬子虛文選王仲舒家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交韓文墓碑柰何李膺之上士思就田文之下客楊盈川碑李邕求識面王翰願卜隣杜詩衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀韓文栁子厚墓誌銘名聲大振一時皆慕與之交諸公要人争欲令出我門下交口薦譽之柳墓誌凡四方奔走之士思欲修容於轅門之外躡履於油幢之間譬之涉蓬瀛登崑閬不可得而進也常願操篲醫門掬溜蘭室良辰不與夙志多違柳集鸞鳯把梓舉集其門時賢雋人結轅在門唐文粹今日見名如見面塵埃壁上破牕前白侍郎木朝王禹偁嘗云吾若生元和從事於李絳崔羣間斯無愧矣五朝言行録邵康節居洛士人之道路者有不入公府而必之先生之廬康節墓誌短章醉墨落筆争為人所𫝊示天下之士聞其名而慕見所𫝊而喜往揖其貌而竦聽其論而驚以服乆與其居而不能捨以去也歐公作蘇舜欽銘沈警美風調吟詠為梁常侍毎公卿宴集必致騎邀之當時為之語曰𤣥機在席傾倒賓客異聞集天下之士得一識面者退誇於人以為榮至於㳺談布衣之賤往往竊託門下之名歐公集欲過叔度留終日未出魯山空此生東坡詩人人願得出君門欒城集文潞公以太尉留守西都時富韓公以司徒致仕潞公集洛中年徳髙者為耆英㑹獨司馬温公年未及七十潞公素重其人用唐九老狄兼謨故事請入㑹温公辭以晩進不敢班文富二公之後潞公不從聞見録東坡出知杭州道由南京後山時為徐州教授告徐州守孫覺願往見而覺不之許乃托疾謁告來南京送別同舟下至宿而歸事見東坡答陳𫝊道書及劉安世彈章學者非韓不學歐公書韓文寡和子和之寡者清廟之歌一唱而三嘆也荀子史宋玉對楚王曰其曲彌高其和彌寡史記客有歌於郢中者為陽春白雪國中属而和者數十人而已引商刻角雜以流徴國中属而和者不過數人是其曲彌高其和彌寡劉向新序絶唱幽蹤乆無嗣音沈休文作謝靈運𫝊北海天逸孤音少和後漢孔融傳賛陽春之曲和者必寡東漢黄瓊𫝊集陽春無和者選張景陽雜詩南荆有寡和之歌古詩唱繁而和寡選演連珠清歌寡和於郢路駱賓王本朝窈眇文章宜寡和峥嶸肝肺亦交難坡詩陽春白雪和者少陽春白雪分吞聲山谷退聽史蘇君之時儀何敢言且蘇君在儀寧渠音詎能耶史張儀𫝊孔子為春秋子夏之徒不能賛一辭史記孔子世家須賈曰不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事史記范睢傳班揚韜筆仲舒結舌}
  - {type: variant, offset: 1952, length: 0, content: '', WYG: 書虞博傳魑魅乘夜争出見日自消通鑑五代漢隠帝集金石寝聲匏竹屏氣王豹輟謳嵇康琴賦衛無所措其邪鄭無所容其淫選潘安仁笙賦綿駒結舌而䘮精王豹杜口而失色成公子安嘯賦虞公輟聲而止歌甯子斂手而嘆息同上毛嬙鄣袂不足程式西施掩面比之無色宋玉好色賦戴憑遙避席祖逖後施鞭元㣲之𫝊本朝陽春白雪分吞聲山谷稱頌經有匪君子如金如錫如圭如璧追琢其章金玉其相詩子宜為國老家語矢口而成言肆筆而成書揚子命世亞聖之大才孟子序史齊聖廣淵明允篤誠忠肅恭懿宣慈惠和羊舌肸之下祈午張趯籍談女齊梁丙張骼輔樂苖賁皇皆諸侯之選也左文能附衆武能威敵史記司馬穰苴傳名實純粹史蔡澤𫝊聪以知逺明以察㣲史五帝本紀雖甚盛徳無以加矣史世家諸君譽之皆不容口史晁錯傳位冠羣臣聲施後世史蕭何世家静淵以有謀疏通而知事史五帝本紀諸公翕然稱鄭荘史鄭當時𫝊二君之所稱頌可著廟堂二君張釋之馮唐史二𫝊論劉向稱仲舒王佐之才雖伊吕無以加西漢本𫝊實羽翮之美用非徒腹背之毛也東漢馬嘗傳淑質貞亮英才卓礫東漢禰衡𫝊魏孝文曰上馬能擊賊下馬作露板惟傅修期耳通鑑齊明紀下卷續世說改板字為布字謝安曰裒雖不言而四時之氣亦備矣晉書禇裒𫝊文貫九功武經七徳晉書王導冊文桓榮祖曰昔曹公父子上馬横槊下馬談詠此於天下可不負飲食矣通鑑宋紀江智淵少有操行沈懐文毎稱之曰人所應有盡有人所應無盡無者其惟江智淵乎通鑑宋世祖虞世南卒上嘗稱世南有五絶一徳行二忠直三博學四文辭五書翰通鑑唐太宗員半千稱張鷟文辭猶青銅錢萬選萬中唐書明玉美珠求之可得如陳國範人中之寳不可得也通鑑五代晉高祖宋公齊丘造國手也通鑑周世宗功可象於圖畫徳可刻於金石聲可託於絃管名可留於竹帛後漢趙曄吳越春秋集騰跨百辟孤絶一人李邕宣聖廟碑言炳丹青道潤金璧文選王元長曲水詩序玉質幼章金聲夙振文選劉越石表直幹百㝷澄波千頃盧府君碑辭同錦肆心同學府沈約作任昉墓誌風儀與秋月齊明音徽與春雲等潤選禇淵碑含辰象之秀徳體河岳之上靈文選齊故安陸碑氣藴風雲身負日月沈約如攀珠樹徒仰照車之輝若踐玉田不知照廡之價隋江總道恊神交黄石授帝師之畧徳由天縱白雲降王輔之精折衝千里魯連談笑之功師表一時郭泰人倫之至三千運北擊舜海以逰鱗九萬圖南望堯雲而矯翼羽儀百代掩梁竇以霞鶱鐘}
