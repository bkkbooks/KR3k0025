  - {type: variant, offset: 3637, length: 2, content: 驚擾, WYG: 譽書令聞令望鶴鳴于九臯聲聞于天是以有譽處兮聞于四國詩聲名洋溢乎中國施及蠻貊蚤有譽於天下也中庸在邦必聞在家必聞語子死有萬世之名列子令聞廣譽施於身所以不願人之文繡也孟子名聲若日月名聲之部發於天地之間豈不如日月雷霆哉荀王伯部當為剖史生有令聞令名徳之輿也恕思以明徳令名載而行之左名與天壤相敝管仲名高天下史記魯仲連傳為令聞嘉譽以聲之國周語陸賈㳺公卿間名聲籍甚西漢陸賈𫝊聲聞梁楚間鄭當時傳名譽日廣韋𤣥成𫝊四皓采榮於商山揚雄𫝊榮者謂聲名也聲薫天地東漢馬援𫝊祭彤威讋北方聲行海表葛龔以善文記知名東漢本𫝊名侔於父兄吳江表𫝊令聞令望必與此山俱𫝊晉羊祜𫝊謝安雖處衡門其名猶出萬之右自然有公輔之望謝安傳時弟萬為中郎将少而流聲長而垂名潘岳傳以雅望獲海内盛名周顗傳器業殆人望也南史宋柳仲𫝊江淮草木亦知爾威名唐張萬福傳盧尚書海内大儒之望也漢獻紀聲出區宇名流海内通鑑集齊名字於天地並光明於列星名聲若日照四海徳譽配天名聲著而日延布名乎天下聲盈塞於天淵楚詞考四海而為雋當中葉而擅名左太冲蜀都賦流千載之英聲楊修答臨淄侯牋英名擅八區左太冲詠史詩流聲馥秋蘭潘叔正詩揚聲紫闕名播天壤間髙名動京師天下皆藉藉名與此山俱李白詩名聲豈浪垂杜詩養聲譽於衆多之口駱賓王名聲照四海宜乎從事於是府而流聲著實於朝天也赫然千載徳譽愈尊厥聲赫赫滿華遍貊韓愈自始仕以至沒世未嘗無聞焉柳文如金玉在佩動而有聲翩翩有聲白樂天名流襲蘭麝才名天下首元稹聲價金應敵聲外金禎姓字時元微之聲氣朗徹髙韻冠于一時名聲四馳速如羽檄芒刄愈出素風𫝊竹帛髙價騁琳琅劉賓客名聲逼揚馬名聲動四夷白侍郎聲名之垂星斗之光李習之茂實葳㽔榮聲洋溢李光賓頌聲滿江海古今流不竭劉長卿入海際天知公徳音擅美一時流譽千載名飛天京何以得此聲於天壤之間名與日月懸唐文粹榮聞日流姚崇碑銘名垂星斗聲殫天地李翺祭韓愈文本朝宋州臨汴水公操之譽日與南方之舟造京師歐公與石操書名與謫仙髙東坡名重沒猶存欒城書先聲經成人有其兄死而不為衰者聞子臯将為成宰遂為衰記檀弓史晉命士㑹将中軍且為太傅於是晉國之盜逃奔于秦左時兾州饑荒盜賊羣起滂按察之登車攬轡慨然有澄清天下之志至州境守令自知􅂍汙望風解印綬去范滂傳集預𫝊藉藉新京兆青史無勞數趙張杜詩實未至而聲先馳劉賓客劍拔蛟知斷弓鳴虎自開張説之文聲如飇馳先詔而至吏人畏服男女相賀唐文粹所謂先聲後實者豈惟兵用之然雖士亦然方今由州郡抵有司求進士者嵗數百人咸多為文辭道今古角誇麗務富厚有司一朝而受者幾千萬言讀不能十一即偃仰疲耗目眩而不欲視心廢而不欲營如此而曰吾能不遺士者偽也唯聲先焉者讀至其文辭心目必専以故少不勝柳送韋中立本朝朱輪未及郊清風已先馳號令聳毛羽先聲落虛絃東坡無聞經四十五十而無聞焉斯亦不足畏也已齊景公有馬千駟死之日民無徳而稱焉君子疾沒世而名不稱焉語史大将軍至尊重而天下之賢大夫毋稱也史衛青𫝊論非世所指名西漢項籍𫝊古者富貴而名磨滅者不可勝記司馬遷𫝊懐道無聞委身草芥東漢二十八将論集墳土未乾身名俱滅曹子建求自試身死無名諡為至愚司馬長卿取信經人不間於其父母昆弟之言言忠信行篤敬雖蠻貊之邦行矣語子孔子厄於陳蔡七日不食子貢糴於野人得米一石焉顔回仲由炊之有埃墨墮飯中顔回取而食之子貢見之不恱以為竊食也入問孔子孔子曰吾信回之為人乆矣雖汝有聞弗以疑之其或者必有故乎召顔回問之對曰向有埃墨堕飯中欲置之則不潔欲棄之則可惜回即食之顔回出孔子顧謂二三子曰吾之信回乆矣非特今日也其言於人也無所不信曽參也家語偃然如固有之而天下不稱貪焉荀儒效史晉叔向曰祁大夫外舉不棄讎内舉不失親其獨遺我乎左羊祜與陸抗相對抗嘗病祜饋之藥抗服之無疑心人多諫抗曰羊祜豈酖人者晉書羊祜傳通鑑云豈有酖人羊叔子哉君子謂祁奚能舉善稱其讎不為諂立其子不為譽舉其偏不為黨小邾射以句繹來奔曰使季路要我吾無盟矣季康子曰千乗之國不信其盟而信子之言子何辱也左一字之褒踰華衮之贈片言之貶過市朝之撻榖梁序蘇秦相燕燕人惡之於王王按劍而怒食以駃騠白圭顯於中山中山人惡之於魏文侯投之以夜光之璧何則兩主二臣剖心折肝相信豈移於浮辭哉史記得黄金百斤不如季布一諾前漢季布𫝊二荀論説乆而益信魏志本𫝊得劉公一紙書賢於十部從事晉書劉𢎞𫝊上官桀黨與有譖霍光者上怒輙曰大将軍忠臣先帝所属以輔朕身敢有毁者坐之自是桀等不敢復言通鑑漢昭紀黄瓊薨将𦵏四方逺近名士㑹者六七千人徐穉往弔之進酧哀哭而去人莫知者諸名士推問䘮宰曰先時有一書生來衣麄薄而哭之哀不記姓氏衆曰必徐孺子也漢桓紀吳主假太常潘濬節度使討五溪蠻濬姨兄蔣琬為諸葛亮長史衡旍奏濬遣宻使與琬相聞欲有自託之計吳王曰承明不為此也魏明紀龐晃等短髙熲於上上怒皆黜之因謂熲曰獨孤公猶鏡也毎被磨瑩皎然益明隋髙祖世民謂尉遲敬徳曰公心如山嶽雖積金至斗知公不移唐髙祖李緯為户部尚書有自京師來者上問𤣥齡何言對曰𤣥齡聞李緯拜尚書但聞李緯美鬚鬢帝遽改除緯為洛州刺史唐太宗夏官侍郎李昭徳宻言於太后曰魏王承嗣權太重承嗣亦毁昭徳於太后太后曰吾任昭徳始得安眠唐武后周太祖推心委任蘇綽而無間言太祖或出㳺常預署空紙以授綽若須處分則隨事施行及還啓之而已通鑑魏武法尚峻令云京城有變九卿各居其府其後嚴才作亂與其徒属數千人攻左掖門魏武登銅雀臺逺望無敢救者時王修為奉常聞變召車馬未至便将官属步至宫門魏武望見之曰彼來者必王修乎權傾天下而朝不忌功盖一世而主不疑唐書郭子儀𫝊一言之重訂千金唐李大亮𫝊𫝊記衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮下公門式路馬今蘧伯玉賢者也必不以暗昧失禮公令人視之果如斯言列女𫝊集殺青無兼兩之宜薏苡起懐珠之謗王愡歐陽熲墓誌片辭貴白璧一諾輕黄金李太白集斯言勝金玉佩服無失墜白侍郎唯君飲冰心可酌貪泉水張承吉文笑言成月旦李義山集偉人一顧踰于華章一非惨乎黥刖劉賓客褒其一字有踰拱璧之重同上歸向經沔彼流水朝宗于海愛莫助之豈弟君子民之攸歸詩子巨室之所慕一國慕之一國之所慕天下慕之願受一㕓而為氓孟子君子若華山松栢既多望之自不知厭晏子史楚葉公至或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢或傷君是絶民望也若之何不胄乃胄又遇一人曰君胡胄國人望君如望嵗也日月以幾若見君面是得艾也民知不死而又掩面以絶民望不亦甚乎乃免胄而進禆諶曰天禍鄭乆矣其必使子産息之乃猶可以戾定也不然将亡矣左楊回見趙簡子曰臣居鄉三逐事君五去聞君好士故走來見說􅁐相如至一坐盡傾西漢本𫝊歙然歸仁匡衡傳陳遵請求不敢逆所到衣冠懐之惟恐在後本傳趙廣漢為京兆尹吏咸願為用僵仆無所避廣漢聪明皆知其能之所宜盡力與否通鑑漢宣紀士皆言願属大樹将軍漢平紀大司徒歐陽歙坐前為汝南太守度田不實􅂍罪千餘萬下獄歙世受尚書八世為博士諸生守闕為歙求哀者千餘人至有自髠剔者平原禮震年十七求代歙死同上罷戍屯校尉及都䕶官徴還班超于寘王侯以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得前通鑑章紀張綱在郡一嵗卒張嬰五百餘人為之制服行䘮送到犍為負土成墳梁兾收李固下獄門生渤海王調貫械上書證固之枉河内趙承等數十人亦要鈇質詣闕通訴太后詔赦之及出獄京師市里皆稱萬嵗漢殤帝客有言於何進曰孔文舉有重名不如因而禮之可以示廣天下後漢孔融𫝊注猶衆星之有北斗百榖之有黍稷天下莫不属目李膺等雖廢錮天下士大夫皆髙尚其節而汙穢}
