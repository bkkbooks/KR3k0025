  - {type: variant, offset: 1933, length: 4, content: 苻堅百萬, WYG: 習鑿齒為桓温荆州主簿時語曰三十年看儒書不如一詣習主簿謝鯤為王敦長史時王澄在敦坐見鯤談語無倦唯歎謝長史可與言都不盼敦為人所慕如此晉書郄超死}
