  - {type: variant, offset: 1943, length: 4, content: 亙溫九五, WYG: 州刺史王𢎞欲識之不能致潛嘗往廬山𢎞令潛故人龎通之齎酒具於半道要之及至欣然共飲南史獨孤信為秦州刺史日暮馳馬入秦州城其帽㣲側詰旦而吏人有戴帽者咸慕信而側帽焉北史南史任昉為中丞簪裾輻凑預其宴者號為龍門逰梁陸倕𫝊陽城逺近慕其行來學者跡接于道唐書唐賀知章美談笑陸象先知章之族姑子與知章甚厚謂人曰賀兄可謂風流之士一日不見賀兄則鄙吝生矣舊唐書𫝊李華為元徳秀墓碑顔真卿李陽氷篆額後人争摸寫號為三絶碑唐書公卿大臣家碑不得公權手筆者人以為不孝遠方入貢皆別署貨具曰此購柳書盧知猷善書一落簡翰人皆模倣劉义聞韓愈接天下士徒步歸之大歴中楊琯為相徳望日崇天下雅正之士争趨其門有自數千里來者唐書𫝊記王勃所至請託為文金帛豐積人謂}
  - {type: page-break, offset: 1943, content: '', id: KR3k0025_WYG_065-39a, image: WYG0932/WYG0932-0079c.png}
