  - {type: variant, offset: 519, length: 186, content: 時汝誤也非故也何罪之有劉斧翰府名談韓魏公鎮相州祀宣尼齋夜宿省偷兒入室挺刃曰不能自濟求濟於公公曰几上器具可直百千盡以與汝偷兒曰願得公首以獻西人公即引頸偷兒稽顙曰以公量過人欲來試公几上之物已荷公賜願無泄也公曰諾終不以語人其後為盜者以他事坐罪當死於市中備言其事曰慮吾死後惜公之遺德不傳於世也遯齋閑覽寇準在澶淵每夕與楊億飲博歌謳諧謔歡呼常達旦或就寢則鼻息如雷上使人視之喜曰得渠如此, WYG: 管夷}
