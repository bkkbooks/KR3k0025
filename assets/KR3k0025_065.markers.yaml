  - {type: variant, offset: 257, length: 260, content: 吾可以義求不可以威劫操劍斬蛟蛟死波休乃投璧於河三投而輒躍出乃毀璧而去示無恡意水經注集幹坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下唐文粹功參造物謀協先天天地之內指麾無前屹屹中立為天一柱雷崩山谷貔虎頓伏飆倒溟波鯨鯢蹉跎長轡利策橫制宇宙據長河如指盃擘太華若破塊斷鰲補天大與地角壯與天勍橫流之中一斥而定乾坤為之坱軋河嶽為之震蕩並唐文粹障百川而東之回狂瀾於既倒韓文鰲怒則蹴翻五嶽鯨擊則掉破百川皮日休本朝韓魏公知北都有獻二玉杯公荅以百金乃開宴召貴客特設一棹致杯其上將酌酒遍勸坐客俄為吏誤觸檯倒玉杯俱碎坐皆失色吏伏地待罪公神色不動曰物破亦, WYG: 江左}
