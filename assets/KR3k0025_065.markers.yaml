  - {type: variant, offset: 1943, length: 4, content: 亙溫九五, krp: 州刺史王𢎞欲識之不能致潛嘗往廬山𢎞令潛故人龎通之齎酒具於半道要之及至欣然共飲南史獨孤信為秦州刺史日暮馳馬入秦州城其帽㣲側詰旦而吏人有戴帽者咸慕信而側帽焉北史南史任昉為中丞簪裾輻凑預其宴者號為龍門逰梁陸倕𫝊陽城逺近慕其行來學者跡接于道唐書唐賀知章美談笑陸象先知章之族姑子與知章甚厚謂人曰賀兄可謂風流之士一日不見賀兄則鄙吝生矣舊唐書𫝊李華為元徳秀墓碑顔真卿李陽氷篆額後人争摸寫號為三絶碑唐書公卿大臣家碑不得公權手筆者人以為不孝遠方入貢皆別署貨具曰此購柳書盧知猷善書一落簡翰人皆模倣劉义聞韓愈接天下士徒步歸之大歴中楊琯為相徳望日崇天下雅正之士争趨其門有自數千里來者唐書𫝊記王勃所至請託為文金帛豐積人謂}
  - {type: variant, offset: 1949, length: 2, content: 將移, WYG: 織筆耕李肇翰林志江偉善書人得其手疏莫不藏之以為寳江偉別𫝊白傅𦵏龍門山四方過者必奠酒􅊘前方丈之土常成泥濘賈黄中談録白樂天應宏詞賦考落登科之人賦並無聞白公之賦𫝊於天下摭言師其徳業可以治國字人慕其風範可以激貪厲俗史通集吾希段干木偃息藩魏君吾慕魯仲連談笑却秦軍著論準過秦作賦擬子虛文選王仲舒家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交韓文墓碑柰何李膺之上士思就田文之下客楊盈川碑李邕求識面王翰願卜隣杜詩衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀韓文栁子厚墓誌銘名聲大振一時皆慕與之交諸公要人争欲令出我門下交口薦譽之柳墓誌凡四方奔走之士思欲修容於轅門之外躡履於油幢之間譬之涉蓬瀛登崑閬不可得而進也常願操篲醫門掬溜蘭室良辰不與夙志多違柳集鸞鳯把梓舉集其門時賢雋人結轅在門唐文粹今日見名如見面塵埃壁上破牕前白侍郎木朝王禹偁嘗云吾若生元和從事於李絳崔羣間斯無愧矣五朝言行録邵康節居洛士人之道路者有不入公府而必之先生之廬康節墓誌短章醉墨落筆争為人所𫝊示天下之士聞其名而慕見所𫝊而喜往揖其貌而竦聽其論而驚以服乆與其居而不能捨以去也歐公作蘇舜欽銘沈警美風調吟詠為梁常侍毎公卿宴集必致騎邀之當時為之語曰𤣥機在席傾倒賓客異聞集天下之士得一識面者退誇於人以為榮至於㳺談布衣之賤往往竊託門下之名歐公集欲過叔度留終日未出魯山空此生東坡詩人人願得出君門欒城集文潞公以太尉留守西都時富韓公以司徒致仕潞公集洛中年徳髙者為耆英㑹獨司馬温公年未及七十潞公素重其人用唐九老狄兼謨故事請入㑹温公辭以晩進不敢班文富二公之後潞公不從聞見録東坡出知杭州道由南京後山時為徐州教授告徐州守孫覺願往見而覺不之許乃托疾謁告來南京送別同舟下至宿而歸事見東坡答陳𫝊道書及劉安世彈章學者非韓不學歐公書韓文寡和子和之寡者清廟之歌一唱而三嘆也荀子史宋玉對楚王曰其曲彌高其和彌寡史記客有歌於郢中者為陽春白雪國中属而和者數十人而已引商刻角雜以流徴國中属而和者不過數人是其曲彌高其和彌寡劉向新序絶唱幽蹤乆無嗣音沈休文作謝靈運𫝊北海天逸孤音少和後漢孔融傳賛陽春之曲和者必寡東漢黄􅌦𫝊集陽春無和者選張景陽雜詩南荆有寡和之歌古詩唱繁而和寡選演連珠清歌寡和於郢路駱賓王本朝窈眇文章宜寡和峥嶸肝肺亦交難坡詩陽春白雪和者少陽春白雪分吞聲山谷退聽史蘇君之時儀何敢言且蘇君在儀寧渠音詎能耶史張儀𫝊孔子為春秋子夏之徒不能賛一辭史記孔子世家須賈曰不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事史記范睢傳班揚韜筆仲舒結舌}
