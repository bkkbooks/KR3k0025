  - {type: variant, offset: 71, length: 0, content: '', WYG: 息孟子喜而天下和之怒而暴亂畏之荀樂論史季孫欲以田賦使冉有訪諸仲尼曰子為國老待子而行若之何子之不言也左孔子布衣𫝊十餘世學者宗之自天子王侯中國言六藝者折𠂻於夫子可謂至聖矣後世藏孔子衣冠琴書至于漢二百餘年不絶高帝過魯以太牢祀焉諸侯卿相至常先謁然後從政孔子世家子産仁人鄭所以存者子産也史鄭世家毛先生遂一至楚使趙重於九鼎大吕史記平原君傳夷吾所居國重史齊世家魯仲連不肯帝秦而秦将聞之却五十里史本𫝊子貢一出存魯亂齊破呉彊晉而霸越史記孔子世家楚春申君魏信陵君救趙秦軍為之却三十里史平原𫝊天下騷動宰相得之若得一敵國云史㳺俠劇孟𫝊所在國重所去國輕戰國䇿諸侯以公子賢多客不敢加兵謀魏十餘年史魏無忌傳為國柱石漢霍光傳為一代之柱臣漢蕭何𫝊李将軍死天下知與不知皆為流涕前漢李廣𫝊魯以季友治亂楚以子玉輕重魏以無忌折衝項以范増存亡百萬之衆不如一賢漢書孟軻雖連音輦蹇猶為萬乘師漢揚雄𫝊王成黄霸朱邑龔遂鄭𢎞召信臣等所居民富所去見思生有榮號死見奉祀西漢天下想聞其風采西漢霍光𫝊漢高祖任蕭何於闗中無西顧之憂後漢冦恂𫝊自天子及大臣皆賴恃之東漢袁安傳陳寔在鄉閭平心率物其有争訟輙求判正曉譬曲直退無怨}
