  - {type: variant, offset: 1014, length: 0, content: '', WYG: 年間吐蕃不敢犯塞唐書黄巢作亂鄭棨為廬州刺史移檄無犯州境巢為斂兵州獨完嵗滿去贏錢千緡藏府庫後它盜終不犯鄭使君錢本𫝊權戚縮氣魏謩𫝊傳記四坐為之改容世說劉整居家奢麗謂}
