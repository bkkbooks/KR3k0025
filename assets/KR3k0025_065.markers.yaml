  - {type: variant, offset: 1150, length: 172, content: 人先封以示群臣上封雍齒群臣皆喜曰雍齒且侯吾屬亡患耳初雍齒不欲屬沛公沛公怨齒互見轉移人心田延年前離席按劍曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今群臣鼎沸社稷將傾且漢之傳謚帝為孝者以長有天下令宗廟血食也如漢家絕祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵群臣後應者請劍斬之通鑑漢宣帝紀關內大雨四十餘日京師民相驚言大水至百姓奔走大將軍鳳, WYG: 角}
