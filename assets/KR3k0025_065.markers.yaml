  - {type: variant, offset: 1015, length: 0, content: '', WYG: 曰紗榖吾之常服耳遇蔡子在坐而終日不自安蔡克別𫝊集偵諜不敢東窺駝馬不敢南牧選昭王碑千乘為之軾廬左太冲魏賦将敬滌耳以聽玉音七啓四座皆辟易杜詩夷落遙知真漢相争來屈膝看儀形劉賓客曹操不敢以兵强輙進孫權不敢以境闊妄動彼相之力焉尚馳作諸葛武侯碑黠吏偏驚隼貪夫輒避驄劉長卿一坐凜生寒崔徐跡未朽千載揖風波劉叉詩親賓改舊觀僮僕生新敬蒼鷹獨立時惡鳥不敢飛懸三公不敢吏唐文粹日月垂於方寸不求不欺於人而人不忍欺矣三不欺先後論本朝范仲淹在延安夏人聞之相戒曰無以延州為意今小范老子胷中自有數萬甲兵不比大范雍老子可欺也五朝言行録司馬温公為相遼人敕其邊吏曰中國相司馬矣謹無生事開邊隙温公神道碑文潞公在朝契丹使耶律永昌劉霄來聘使者入覲望見公殿門外却立改容曰此文潞公耶所謂以徳服人者東坡徳威堂記傅欽之欲見陳師道知其貧甚因懐金餽之及覩其貌聽其議論竟不敢以出口道鄉集姦凶與佞媚膽破骨亦驚歐公集里中少年聞其謦欬之聲往往逃匿若匿而不及則俯首恐愧臨川奮鬚抵几走羣纎兮聞名見像已癘痁兮不仁者不敢至其牆不義者不敢過其門耿然如秋霜夏日不可狎翫東坡集向來一瓣香敬為曽南豐盛徳于今丈人行陳後山詩睎慕子孟子曰乃所願則學孔子也孟子夫子步亦步夫子趨亦趨夫子馳亦馳荘子昔顔常睎夫子矣正考甫常睎尹吉甫矣公子奚斯常睎正考甫矣揚子衣冠禮義所自出也故聖賢景慕焉文中子史季札曰札雖不才願附於子臧以無失節左燕齊之間皆為欒布立社號曰欒公社史本𫝊石慶為齊相舉齊國皆慕其行為立石相祠本𫝊鮑宣下廷尉博士弟子王咸舉幡太學下曰欲救鮑司𨽻者㑹此諸生㑹者千餘人西漢本𫝊陳遵居長安近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門所到衣冠懐之惟恐在後司馬相如慕藺相如之為人更名相如西漢本𫝊雄家貧嗜酒有好事者載酒殽從㳺學}
