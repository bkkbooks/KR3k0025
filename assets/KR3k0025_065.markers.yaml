  - {type: variant, offset: 1357, length: 285, content: 必訛言也有頃長安中稍定問之果訛言鳳大慚自恨失言同上漢成帝紀互見失言臥赤子天下之上而安朝委裘而天下不亂西漢賈誼傳變所欲為易於反掌安於泰山枚乘傳太子幸酒樂燕樂上不以為能有意欲以山陽為嗣上間獨寢時史丹直入臥內頓首伏青蒲上涕泣言曰道路流言以為太子有動搖之議臣願先賜死以示群臣太子由是遂定為嗣通鑑漢元帝紀灼曰章酒好酒也樂燕沈讌也師古曰上樂又音五孝切王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至滹沱河還白河水流澌無船不可渡官屬大懼光武令王霸往視之霸恐驚眾欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河水亦合乃令霸護渡未畢數騎而冰解光武謂霸曰安吾眾得濟免者卿之力也, WYG: ''}
