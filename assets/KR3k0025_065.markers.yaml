  - {type: variant, offset: 1961, length: 2, content: 從容, WYG: 油然如雲白侍郎氣蒸雲夢澤波撼岳陽城孟浩然詩伯仲之間見伊吕指揮若定失蕭曹學業醇儒富詞華哲匠能詞源倒流三峽水筆陣獨掃千人軍詞華傾後輩風雅藹孤鶱讀書破萬卷下筆如有神異材應間出爽氣必殊倫清高金莖露正直朱絲絃鄭公瑚璉器華岳金天晶情窮造化理學貫天人際道為詩書重名因賦頌雄金鐘大鏞在東序冰壺玉衡懸清秋杜詩心輕馬融帳籌奪子房帷秀發幽岩電清澄隘岸陂盛氣河包濟貞姿嶽柱天元微之集頌其聲聞其謠如金石之永播也確然金石不足以為貞淡然冰玉不足以為潔秉義植信高蹈於世潔乎瑾瑜不足為其貞芬乎蘭􅉅不足為其秀清似匣中鏡直如琴上絲溟渤於文場嵩華於朝右身行聖人之道口吐聖人之言立身百行足為文六藝全皮日休雷霆驅號令星斗焕文章䑛筆和鈆欺賈馬讃公論道鄙蕭曹山秀扶英氣川流入妙思盛徳大功直筆實光於簡䇿清節細行祝史不愧於神明夷險一貫忠勞兩兼杜牧之雲朗鏡開匣月寒冰在壺白圭無玷朱絃有聲二十八宿羅心胷高逹夫名將日月同時朽身是山河應數生方雄飛譏誚經既㣲且爾勇伊何為猶將多爾居徒幾何哀今之人胡為虺蜴詩危}
