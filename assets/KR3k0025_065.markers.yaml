  - {type: variant, offset: 1955, length: 5, content: 易慮遠邇崩, WYG: 趙北都有聲真漢相無纇勝隋珠金石高韻珪璋徳容宵語途話琴書調謔一出于文章劉賓客凝為和兮聚五福發為春兮消六沴以孝友肥其身以仁信羶其行言行謹直風操端荘肅然禮容清廟之器降自天和立為人傑沈斷大事奮揚竒謀器得天爵文為國華行有根源辭無枝葉玉立不倚金叩有聲嚴重有大臣之體温雅秉君子之文金璧其操鸞鳯其姿器宇甚宏衣冠甚偉寡言正色人望而敬之燕逰觴詠之間則其貌温然如春其}
