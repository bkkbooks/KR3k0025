  - {type: variant, offset: 3641, length: 0, content: '', WYG: 希之者唯恐不及更共相標榜為之稱號為三君八俊八顧八及八厨魯肅曰孫討虜敬賢禮士江表英豪咸歸附之劉豫州士慕仰若水歸海漢獻紀車駕南征冦恂從至潁川盜賊悉平百姓遮道曰願從陛下復借冦君一年上乃留恂東觀漢紀懐赴如歸後漢禹所止停車駐節父老童稚垂髮戴白滿其車下東漢鄧禹張楷居𢎞農山學者隨之所居成市范曄後漢齊魯間宗之東漢鄭𤣥𫝊犬馬戀主物不敢忘晉書石勒𫝊車𦙍善於賞㑹當時毎有盛坐而𦙍不在皆云無車公不樂謝安逰集之日輙開筵待之晉書本𫝊周顗曰何敢近捨明公王導逺希嵇阮晉書周顗𫝊温嶠等至建康王導周顗庾亮等皆愛嶠才争與之交通鑑晉元當效犬馬之用陳書蕭穎士有奴事穎士十年笞楚嚴惨或勸其去曰非不能愛其才也唐書謝超宗公事免詣東府門自通其日風寒蕭道成謂四座曰此客至使人不衣自暖矣宋書竇建徳陷京城執户曺河東張𤣥素将殺之縣民千餘人號泣請代其死曰户曺清謹無比大王殺之何以勸善通鑑太后思徐有功用法平擢拜左臺殿中侍御史逺近聞者無不相賀唐武后劉瞻為刑部尚書瞻之貶也人無賢愚莫不痛惜及其還也長安兩市人率錢顧百戲迎之瞻}
