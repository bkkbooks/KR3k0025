  - {type: variant, offset: 1007, length: 0, content: '', WYG: 寧力不勝而智不足耶畏之也史魯仲連傳郭解出入人皆避之史㳺俠𫝊胡人不敢南下而牧馬士不敢彎弓而報怨史記賈誼過秦論正衣冠立於朝廷而羣臣莫敢言浮說長孺矜焉史記鄭傳序燕之初入齊聞晝邑人王蠋賢令軍中曰環畫邑三十里無入以王蠋之故也史記齊世家匈奴竟郅都死不近鴈門史本傳威王曰吾臣有檀子者使守南城則楚人不敢為冦泗上十二諸侯皆來朝吾臣有盻子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而}
  - {type: page-break, offset: 1007, content: '', id: KR3k0025_WYG_065-31a, image: WYG0932/WYG0932-0075c.png}
  - {type: variant, offset: 1007, length: 0, content: '', krp: 寧力不勝而智不足耶畏之也史魯仲連傳郭解出入人皆避之史㳺俠𫝊胡人不敢南下而牧馬士不敢彎弓而報怨史記賈誼過秦論正衣冠立於朝廷而羣臣莫敢言浮說長孺矜焉史記鄭傳序燕之初入齊聞晝邑人王蠋賢令軍中曰環畫邑三十里無入以王蠋之故也史記齊世家匈奴竟郅都死不近鴈門史本傳威王曰吾臣有檀子者使守南城則楚人不敢為冦泗上十二諸侯皆來朝吾臣有盻子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而}
  - {type: variant, offset: 1008, length: 0, content: '', WYG: 者七千餘家吾臣有種首者使備盜賊則道不拾遺通鑑周紀項羽召見諸侯将諸侯将入轅門無不膝行而前莫敢仰視李牧為将居代鴈門單于聞之大率衆來入李牧多為竒陣張左右翼擊之大破殺匈奴十餘萬騎單于奔走十餘嵗不敢近趙邊通鑑秦紀諸吕憚朱虛侯雖大臣皆依朱虛侯通鑑漢高后諸吕欲為亂畏大臣絳灌等未敢發通鑑漢高紀漢天子我丈人行也西漢蘇武𫝊李膺為度遼将軍膺到邊羌戎皆望風畏服先所掠男女悉詣塞下送還之韓韶為嬴長賊聞其賢相戒不敢入嬴境通鑑漢質紀宦人黄皓畏董允不敢為非終允之世皓位不過黄門丞通鑑魏邵陵厲公紀張華盡忠帝室彌縫遺闕賈后雖凶險猶知敬重數年之間雖闇主在上而朝野安静華等之功也通鑑晉惠紀王毛仲有婚事上謂宰相曰卿等宜與逹官悉詣其第既而日中客未敢舉筯待璟乆之方至通鑑唐𤣥宗淮南大将王韶欲自為留後令将士推己知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶等懼止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人通鑑唐徳宗紀孫期事母至孝黄巾賊起過期里陌相約不犯後漢本𫝊卓王孫為具召臨卭令王吉及司馬長卿令既至日中司馬長卿謝病不能臨臨卭令不敢嘗食身自迎相如相如不得已而强往一坐盡傾西漢司馬相如𫝊尹翁歸拜東海}
