  - {type: variant, offset: 984, length: 0, content: '', WYG: 探驪吾子先得其珠其餘鱗甲将何為三公罷吟監戒録李相讀春秋誤以叔孫婼敕畧呼為敕晷有小吏曰某縁師受誤呼文字聞相公呼婼為婼方悟之耳公曰不然因檢釋文果敕畧反公大慚號小吏為一字師摭言劉孝標有重名無所與讓惟服謝詠置几桉動輙吟咏其文顔氏家訓集共君一夜話勝讀十年書古詩使人意奪神駭心摧骨驚江淹別賦天下進士望風戁畏以為瑞人神士朗出天外不可梯接望門不敢造皇甫湜衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀曽經聖人手議論安敢到所聞昔已多所得今過前乆聞名始相識也韓集萬不試而一出焉猶為當世甚重若使幸得出于十二三則巍然為偉人與世無窮其可涯也觀其掉鞅于藝術之場㳺刄乎文翰之林風雨生於筆札雲霧發於簡牘左右圜視朋儕拱手甚可壮也觀徽容而敬聞嘉話而慕柳文作冰柱雪車二詩出盧仝孟郊右樊宗師為獨拜劉叉文取卷開讀喜嘆入骨孫可之文豈獨書紳可以銘心唐文粹本朝衆工讓口無敢先臨川集孔明與司馬宣王對壘不能取尺寸地宣王受其巾幗之辱而不敢出兵其已死按行軍壘猶曰天下竒材也元城語録欲知君得人失者亦稱善東坡詩擅場推老手後山温公退居洛陽毎論當世人物必曰吕獻可之先見范景仁之勇决皆予所不及心誠服之劉諫議景仰經我思古人實獲我心高山仰止景行行止泰山巖巖魯邦所瞻詩固願聞名於将命者日月星辰民所瞻仰也記景行先哲孝經序子君子若華山松栢既多望之自不知厭晏子史太史公曰余讀孔子書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低回留之不能去史孔子世家竊伏海濱聞暴公子威名舊矣西漢雋不疑𫝊講聞高誼之日乆矣西漢董仲舒𫝊竊高下風之行西漢鄒陽𫝊陳蕃周舉相謂曰時月之間不見黄生則鄙吝之萌復存乎心東漢黄憲𫝊李膺與郭林宗泛舟洛水之上望之者以為仙舟後漢李膺𫝊朝野翕然謂之一世龍門後進之士莫不景慕放效晉書王衍𫝊宋纎沈静不與世交隠居南山太守楊宣畫其象於閣上出入視之酒泉太守馬岌具威儀造焉纎不見岌嘆曰吾今知先生人中之龍也晉書陸象先嘗曰季真清談風流吾一日不見則鄙吝生矣唐書賀知章𫝊房琯毎見徳秀嘆曰見紫芝眉宇使人名利之心都盡蘇源明常語人曰吾不幸生衰俗所不恥者識元紫芝也唐書元徳秀𫝊仰之如太山北斗唐書韓愈𫝊𫝊記夫山萬人之所觀仰韓詩外𫝊集後世仰末照所恨不見之猶如仰昭回管鮑乆已死何人繼其蹤李太白集五雲多處是三台杜詩羽儀之拜日月以數皇甫湜朝廷之士引頸東望若景星鳯凰之始見也争先覩之為快韓愈與李渤書瞻仰徳宇高踰嵩岱柳文四岳仰維嵩之高健筆高科早絶倫後來無不揖芳塵劉賓客飽聞聲名渇見風采杜牧之四瀆宗海衆星拱天洗心瞻仰天漢彌高生不用萬户侯但願一識韓荆州何}
