  - {type: variant, offset: 982, length: 0, content: '', WYG: 宋璟一人毛仲有婚上謂宰相宜與逹官悉詣其第既而日中客未敢舉筯待璟乆之方至飲不盡巵遽稱腹痛而歸通鑑李戡隠陽羨里民有争不之官而詣戡以辨陽城隠中條山里閭有争訟不詣官而詣城決之蘇源明曰吾不幸生衰世所不恥者識元紫芝也唐書𫝊記夫山萬人之所觀仰育羣物而不倦材用生焉寳藏殖焉飛禽萃焉走獸伏焉韓詩外𫝊集賢哲國之柱棟人之羽翼桓譚新論名盖羣后是謂宗臣選陸士衡𫝊謝公還欲卧誰與濟蒼生駱賓王今日朝廷須汲黯北辰當宇宙南嶽據江湖劇孟七國畏杜詩名成身退猶係人望駱賓王後進歸之承望聲光一言許可必自矜重杜牧之大國梁棟中朝羽儀劉長卿萬里長城九重安枕一柱中天而獨立司空表聖倚為長城永固中夏倚為長城捨一日而不可白𫝊集有賢大國豐無子一家貧男兒富邦家豈為榮其身王建詩青山無逸人毎國大覺貧張文集若作進退爾惟旗鼔若斷首尾爾惟常蛇若戮鯨鯢爾惟干将若拯沈溺爾惟巨艦唐文粹本朝范仲淹與韓琦必欲收復靈夏邊上謠曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽五朝言行録四海以公之用舍一時為國之安危臨川徂徠魯東山而先生非隠者也其仕嘗位于朝矣然魯人不稱其官而稱其徳以為徂徠魯之望先生魯人之所尊名之曰徂徠先生者魯人之志也歐公撰石守道墓誌凡徇私者皆指笑之曰你一个包家見貪汙者曰你一个司馬家吕氏家塾記契丹尤畏韓魏公名凡使契丹及來使者必問韓魏公安否行状熈寧元豐間士大夫論天下賢者必曰君實景仁東坡撰范鎮墓誌士如稻苗待公秧臨流不度公為航後山贈二蘇詩温公没京師民畫其像刻印鬻之家置一本飲食必祝焉四方皆遣人購之京師時畫工有致富者東坡撰温公行状遼人夏人遣使入朝與吾使至彼國者彼必問公起居司馬温公神道碑施之事實則可以慘舒四方之人見之筆墨則可以照耀萬世之下欒城集魏舒謂冦萊公曰盛刺不復還留為山家之寳唐宋遺史如日出時眠者皆作如雷震時蟄者皆動吏民瞻師尹之儀型中外識漢相之風采凡令中外執事膂力之畢陳視吾一二老臣進退以為節卿若無事而引去人将相顧而自疑朕惟朝廷之盛衰常以輔相為輕重若根本强固則精神折衝故薦吕臣奉己而不在民則晉文無復憂色汲長孺直諌而守死節則淮南為之寝謀朕思得其人付之以政使天下聞風而心服則人主無為而日尊國以得人而强如猛獸之衛藜藿以積賢為寳如珠玉之茂山川湛然無營物自蒙利故崔公發議則淄青慙服知朝廷之有人蜀使抗詞則孫權回顧歎張昭之不在東坡集神宗崩公赴闕臨衛士見公入皆以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之東坡集司馬温公神道碑楊綰當朝天下喜山谷詩兒童誦君實走卒知司馬東坡集范仲淹知開封京師謠言曰朝廷無憂有范君京師無事有希文范仲淹卒天下想聞風采賢士大夫以不獲出其門為恥下至里巷及逺方皆知其名國史本𫝊天不生仲尼萬古如長夜唐庚集載蜀道館舎壁間詩不足輕重經焉能為有焉能為亡子過我門而不入我室我不憾焉者其惟鄉原乎孟子嬰兒傷人而被傷者不以為怨侏儒嘲人而獲嘲者不以為辱列子史漢高論功行封欲以曹參為第一鄂千秋曰雖無曹參等百數何缺於漢西漢蕭何𫝊譬如禽獸得其善言不足喜惡言不足怒也西漢匈奴𫝊居前不能令人輊居後不能令人軒後漢馬援𫝊不知貶毁之於己猶蚊虻之一過也後漢孔融傳𫝊記鴻鵠一舉千里所恃六翮耳背上之毛腹下之毳益一把飛不為加高損一把飛不為加下韓詩外𫝊牛之一毛生既無益死亦何損魏董尋云集生無益於事死無損於數選自試表生無益於一毛死何異於腐䑕王建一縷鴻毛天地中白侍郎雖有若無經折其右肱雖左股在豈足用乎易畧例子曰誦詩三百授之以政不逹使於四方不能専對雖多亦奚以為語子庶羞百品雜進於盤几而咽不下無為於貴饌矣抱璧而行乞無為於貴寳矣子華子堂谿空見韓侯昭曰今有白玉巵而無當君渇将何以飲君曰以瓦巵韓非子金弧玉絃無激矢之能土飯瓦胾不療於飢抱朴子玉屑盈匣不可琢為圭璋剉絲滿箧不可織為綺綬雖多亦奚以為也劉子史趙括徒能讀其父書傳不知合變也史記趙奢𫝊吳伐齊子胥曰得志於齊猶獲石田無所用史記吳世家兵不完利與空手同甲不堅密與袒裼同弩不可以及逺與短兵同射不能中與無矢同中不能入與無鏃同西漢晁錯𫝊夫全趙之時武力鼎士袪服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之俠死士盈朝而不能還厲王之西也西漢鄒陽傳李善淹貫古今不能綴辭故人號書簏唐書桓温曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸牸通鑑晉哀紀矢雖注不射刀雖舉不擊矟雖利不刺通鑑梁高祖傅迪好廣讀書而不解其義劉栁曰卿讀書而無所解可謂書簏矣晉書劉栁𫝊𫝊記無刄之兵不毒之蟲無能為也通典駢指在手必假力於千鈞附贅居身非廣形於七尺劉知幾史通鏤冰為璧不可得而用也畫地為餅不可得而食也史通陶犬無守夜之益瓦雞無司晨之警韓詩外𫝊集劍鏤七星非有司天之用縑圖五岳寧識崇朝之雲是知䇿彼泥龍不能令其逐日乘斯流馬安可使其奔電梁庾肩吾讓表干将之刄未磨𤓰匏不能傷箆簬之機不發魯縞不能穿王充論衡薄戍綿冪無異蛛蝥之網弱卒細甲無異螳蜋之衛魏左太冲賦玉巵無當未有底也雖寳非用張平子南都賦有聲之玉無纇之珠不置於佩服掌握之間皆非其所有白𫝊集本朝使天而雨珠寒者不得以為􅃭使天而雨玉飢者不得以為粟東坡喜雨亭記矜式經萬邦作式書君子是則是效文武吉甫萬邦為憲百辟為憲文武是憲式是百辟四方其訓之百辟其刑之詩君子動而世為天下道行而世為天下法言而世為天下則記中庸後世以為楷記見而民莫不敬言而民莫不信行而民莫不說記中庸子思之母死於衛柳若謂子思曰子聖人之後也四方於子乎觀禮記徳義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之孝經子使諸大夫國人皆有所矜式規矩方員之至也孟子端而言端而動一可以為法則荀子規者所以圓萬物矩者所以方萬物淮南子史能為人則者不為人下矣左孔子為中都宰一年四方皆則之史記孔子世家天下模楷李元禮後漢黨錮𫝊序經為人師行為人表魏志劉靖傳士之模楷國之楨幹東漢盧植𫝊賈彪在京師與郭林宗為談論之首一言一行天下以為準的袁山崧漢書殷浩為風流宗通鑑晉成紀吐言則為訓辭涖世則為物軌東漢李充陳仲舉言為士則行為世範世説新語張湛詳言正色三輔以為儀表東漢本𫝊庾亮端委廟堂百僚準則晉書謝琨𫝊魏舒堂堂人之領袖晉書本𫝊𫝊記師範億載規模萬古史通集作範後昆立行可模置言成範百代之儀表千年之領袖文選行為時領袖言作世蓍龜清能律貪夫白侍郎言為代之軌物行為人之師表唐張説撰姚崇神道碑萬世之標準吐辭為經舉足為法韓文爝然為世程劉禹錫羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠雖不常為人用而自然可貴李文饒集風度可以師長人倫動静可以訓齊天下羽儀振鷺黼藻羣龍唐文粹本朝匹夫而為百世師一言而為天下法是皆有以參天地之化闗盛衰之運東坡作潮州韓文公碑表帥經正色率下書子帥以正孰敢不正語子率馬以驥不亦可乎揚子史范宣子讓其下皆譲欒黶為汰弗敢違也左公孫𢎞用節衣食為百吏先史記太史公自序萬石君居家子孫在側雖燕居必冠西漢石奮𫝊陳寔在鄉閭平心率物後漢清節為百城表南史樂法才表耿介為宗臣表唐李勉𫝊委棄經折其右肱雖左股在豈能用乎易畧例譬彼壊木疾用無枝詩朽木不可雕也糞土之牆不可杇也語子惠子謂荘子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧所學者真土梗耳荘子玉屑盈匣不可琢為珪璋剉絲滿篋不可織為綺綬雖多亦奚以為也劉子腐木不可以為屋弊單甑糜在旃茵之上雖貪者不搏也淮南子史臧紇曰衛侯其言糞土也不可教訓左𫝊一國棄之如遺跡焉國語如行人之遺棄其迹亡國之大夫不可以圖存敗軍之將不可以語勇西漢韓信𫝊國家棄憲如孤雛腐䑕耳通鑑漢章帝顧視趙戒胡廣猶糞土也東漢李固𫝊駑馬鉛刀不可强扶通鑑漢光武王戎曰樹在道邊而多子必苦李也晉書本𫝊劉輿猶膩也近則汚人晉書本傳𫝊記李台嘏曰韓八座事藝如拆韈線無一條長北夢瑣言韓昭凡事如僧剃髪無有寸長外史檮杌吐菓之核棄藥之滓糞土同捐史通集慈父不能愛無益之子仁君不能蓄無用之臣選曹子建自試教義所不容紳冕所共棄文選任彦昇彈文要領不足以膏齊斧名字不足以汚簡墨陳孔璋檄本在山馬在肆過之而不顧者雖日累千萬人未為不才與下乘也及至匠石過之而不睨伯樂遇之而不顧而後知其非棟梁之才超逸之足也韓愈為人求薦書卧木易成蠧棄花難再春孟東野泥沙難振㧞劉賔客生無益於一毛死何異於腐䑕王建為人鄙賤經國人不齒也出鄉不與士齒屏之逺方終身不齒記問子西曰彼哉彼哉語子徧國中無與立談者孟子彼夫曷足稱乎大君子之門哉荘子百姓賤之如㑌所當為尫病人也惡之如鬼荀子吾視子䝉䝉若未視之狗子耳惠子史呉起嘗學於曽子其母死起不歸曽子薄之而與起絶史記本傳非子之座史有若𫝊陳湯家貧匄貸無節不為州里所稱西漢本𫝊主父偃學長短縱横術㳺齊諸儒相與排擯不容於齊家貧假貸無所得㳺趙燕中山皆莫能厚客甚困西漢本𫝊韓信家貧無行不得推擇為吏漢本𫝊子之比我䝉䝉如未視之狗說􅁐狗䑕不食汝餘世說第五倫少藴藉不修威儀以此見輕後漢本𫝊度尚不修學不為鄉里推舉東漢本𫝊晉張載貌醜㳺洛陽市羣女以瓦石投之晉書冢中枯骨何足介意通鑑漢獻帝紀梁尚書虞隲嘗為王偉所辱乃唾其面偉曰君不讀書不足與語梁世祖楊釗不學無行為宗黨所鄙通鑑唐𤣥宗孫晟素輕馮延已謂人曰金盃玉盌乃貯狗矢乎通鑑周太宗集揚子撰法言蜀富貴人賫錢十萬願載一名子雲不聽夫富人無義正如圏中之鹿欄中之牛安得妄載王充論衡閭閻闒茸名教所絶選彈文季緒瑣瑣何足以云文選本朝譬之癬疥豈足爬搔類要推尊經徳輶如毛民鮮克舉之我儀圖之維仲山甫舉之詩夫子之不可及也猶天之不可階而升也達巷黨人曰大哉孔子博學而無所成名子貢曰夫子其生也榮其死也哀如之何其可及也語故雖天子必有尊也言有父也必有先也言有兄也孝經子儒家惟有孟子閎逺㣲妙緼奥難見孟子序道則高矣美矣宜若登天然似不可及也天下有逹尊三爵一齒一徳一孔子之謂集大成集大成也者金聲而玉振之也自生民以來未有盛於孔子也以予觀於夫子賢於堯舜逺矣孟子仲尼之教獨尊於千古孟子後序關百聖而不慙蔽天地而不恥能言之類莫能加也揚子史民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆猶衣服之有冠冕木水之有本原左天下言風流者謂樂廣王衍為稱首晉書樂廣傳殷浩為風流談論者所宗晉書本𫝊器業殆人望也南史宋柳仲柳顧博學罕所推謝見虞世基曰海内共推一人非吾儔所及也隋書門地人物文學皆當世第一唐書李揆昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘嵗撥衰反正功與齊而力倍之所以過况雄為不少矣唐書韓愈𫝊集與日月俱懸鬼神争奥孝敬之準式人倫之師友文選序昭昭若三辰之麗乎天滔滔猶四瀆之紀于地選齊故安陸碑日月不息師表常尊文選任昉釋奠宴詩文章之司命人物之權衡自三代以來風騷之後驅馳屈宋鞭撻揚馬千載獨步推公一人李太白𫝊何蕃入太學二十餘年學成行尊諸生推頌不敢與蕃齒自天子至郡邑守長通得祀而徧天下者唯社稷與孔子焉然而社祭穀句龍與棄乃其佐享非其専主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面拜跪薦祭進退誠敬禮如親弟子者句龍棄以功孔子以徳固自有次第哉自古多有以功徳得其位者不得常祀然其祀事皆無如孔子之盛所謂自生民以來未有如夫子者其賢於堯舜者此其效歟昭乎日月不足以為明崒乎泰山不足以為高巍乎天地不足以為容韓丈夫子之道閎肆尊顯二帝三王無以侔大也柳文坐上無人第二流劉賓客死而可作當小天下裴度作武侯碑本朝轍之來也於山見終南嵩華之高於水見黄河之大且深於人見歐陽公而猶以為未見太尉也故願得覩賢人之光耀聞一言以自壮然後可以盡天下之大觀而無憾矣聖人之道譬如山海藪澤之奥人之入於中者莫不皆得其所欲欒城集韓氏之文之道萬世所共尊天下所共𫝊而有也歐陽公書韓文後曽子文章衆無有水之江漢星之斗臨川集素服經君子不厲而威不言而信有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也古之人一舉事而衆皆知其徳之備也記子一雀適羿羿必得之威也荘子齊王謂子思曰先生名高於海内吐言則天下之士莫不属耳目孔叢子伯夷叔齊非於死之日而後有名也管子天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉荀子史賁諸懐錐刀而天下為勇西施衣褐而天下稱美戰國䇿蒲且修繳鳬鴈悲鳴逢䝉撫弓虎豹哀嘷說苑陳遵毎至人門曰陳孟公座中莫不震動西漢本傳耿純嘗為東郡太守威信著於衛地東都聞純入界盜賊九千餘人皆詣降大兵不戰而還通鑑漢光武桓氏累世臨荆州士民畏之通鑑晉孝武紀陸機與弟雲俱入洛造張華素重其名如舊相識晉書本𫝊顔真卿三朝舊臣忠直剛烈名重海内人所信服郭子儀位極人臣而衆不疾窮奢極欲而人不非韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯也通鑑唐紀崔仁師訊諸囚皆曰崔公平恕事無枉濫請速死無一人異辭者通鑑太宗楊綰乆積公輔之望及大拜詔下朝野相賀續世說𫝊記齊澣善知今事高仲舒善知古事姚崇曰欲知古事問仲舒欲知今事問齊澣則無敗政矣韋絢戎幕閒談集養由㳺睇而猿號選班固幽通賦太學諸生推頌不敢與何蕃齒韓文騏􅂹未馳知有致逺之力干将未割知有剸堅之功高逹夫本朝胡安定先生弟子散於四方隨其人賢愚循循雅飭其言談舉止遇之不問可知為先生弟子其學者相語稱先生不問可知為胡公安定墓表田夫野老皆號公司馬相公婦人孺子知其為君實也東坡撰温公行状邵康節常以春秋時行㳺城中士大夫家聽其車音倒屣迎致雖兒童僕𨽻皆知歡喜尊敬康節墓志刻木而為人朝夕而拜之它日析之以為薪猶且忌之老泉望重者無所為而人自服富人之謀利常獲世以為福非也富人者信於人素深而服於人素厚所為而莫或害之所欲而莫或非之事未成而衆已先成之矣寳刀匣不見但見龍雀環何曽斬蛟蛇亦未切琅玕胡為穿窬輩見之要領寒東坡集藍田生美璞未琢價連城山谷心服經獻子加於人一等矣記管仲奪伯氏駢邑三百飯蔬食没齒無怨言顔淵喟然嘆曰仰之彌高鑽之彌堅瞻之在前忽焉在後語子中心恱而誠服也如七十子之服孔子也以佚道使民雖勞不怨以生道殺民雖死不怨殺者孟子立以為仲父而貴戚莫之敢妬也與高國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢拒也貴賤長少莫不秩秩然而貴敬之荀子賈瓊曰夫子年十五為人師王孝逸先達之傲者也然白首北面豈以年乎敬佩玉音服之無斁文中子史孔子之所嚴事於周則老子於衛蘧伯玉於齊晏平仲於楚老萊子於鄭子産於魯孟公綽新垣衍謝魯仲連曰吾今日知先生為天下士也管仲富擬公室有三歸反坫齊人不以為侈太史公曰假令晏子而在吾雖為之執鞭所忻慕焉史記張儀曰此吾在術中而不悟吾不及蘇君明矣史本𫝊呉起謂田文曰請與子論功可乎文曰可起曰将三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東向韓趙賓從子孰與起文曰不如子起曰此三者子皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時属之子乎属之我乎起黙然良乆曰属之子矣通鑑周紀匹夫無勢化之者七十人劉向戰國䇿序梁丘據曰吾至死不及夫子說􅁐萬石君以孝謹聞雖齊魯諸儒質行皆自以為不及前漢本𫝊相如至一座盡傾西漢司馬相如𫝊毎讀詔書嘗嘆息曰此聖主也一見决矣後漢第五倫𫝊王延夀作靈光殿賦後蔡邕亦造此賦未成及見延夀所為遂輟翰東漢王逸傳陳寔在鄉閭平心率物有争訟輙求判正曉諭曲直退無怨者至乃嘆曰寜為刑罰所加不為陳君所短卒海内赴者三萬餘人制衰麻者以百數後漢馬援與越人申明舊制以約束之自後駱越奉行馬将軍故事通鑑漢光武博聞强記竒逸卓犖吾敬孔文舉魏志陳矯傳董允代費禕為尚書令旬日之中事多停滯允嘆曰人才力相懸若此非吾所及蜀志陳夀撰三國志時人稱善夏侯湛時著魏書見夀所作便壊己書晉書本𫝊王粲才高辨論應機鍾繇等為魏卿相至於奏議皆閣筆不能措手魏志本𫝊注司馬懿與諸葛亮相距于五丈原對壘百餘日㑹亮病卒諸将燒營遁走經日乃行其營壘曰天下竒才也晉書管輅嘗謂人曰吾與劉潁川兄弟語時使人神思清發昏不假寐晉書劉寔𫝊石勒陷京師呼王衍與相見勒甚恱之謂其黨曰吾行天下多矣未嘗見如此人晉書衍𫝊郭奕高爽於時少所推先見阮咸心醉晉書阮咸𫝊謝安嘆曰朝廷大事所不能決者以諮王公彪之無不立决通鑑晉蕳文紀徐羨之起自布衣又無學術直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望通鑑晉恭紀王澄有高名少所推服毎聞衛玠言輙歎息絶倒王衍尤重澄有經澄所題目者衍不敢復言輙云已經平子矣晉書陸雲曰君苖見兄文輙欲焚其筆硯晉陸機傳石勒曰若遇漢祖當北面事之與韓彭比肩晉載記本傳侯景曰吾跨鞍對陳刄石交下了無怖心今見蕭公使人自慴通鑑梁紀柳顧博學罕所推謝見虞世基曰海内多共推此一人非吾儕所及也隋書田承嗣傲浪不軌謂子儀使者曰茲膝不屈於人久矣今為公拜舊唐書郭子儀𫝊自愈没其言盛行學者仰之如太山北斗李密見太宗不敢仰視退而嘆曰真英主也尹思正為大府卿時侯知一亦厲威嚴吏為語曰不畏侯卿杖秪畏尹卿筆李祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於温御史孫逖典制誥為代言最張九齡視其草欲易一字卒不能也張說曰死姚崇能算生張說吾今日方知才之不及逺矣韓愈於文章慎許可至歌詩獨推曰李杜文章在光燄萬丈長唐書李密謂徐文逺曰始謂先生儒者不達時事今乃坐决大計何其明也通鑑唐高祖岑文本嘗稱馬周論事援引事類揚㩁古今舉要删煩㑹文切理一字不可増亦不可減聽之靡靡令人忘倦通鑑唐太宗辛彦之撰新禮沈重名為宿學彦之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢隋書郭子儀勞回紇皆捨兵下馬齊拜曰果吾父也舊唐書本𫝊吾儕五人智不及一韋公唐韋顗𫝊𫝊記禰衡高論冠世來逰京師詆訿朝士及南見趙戩嘆曰鐡則干将莫邪木則椅桐梓漆人則顔冉仲弓典畧元㣲之劉夢得韋楚客㑹於樂天之居因論南朝興廢事各賦詩夢得首唱一揮而成白公曰}
