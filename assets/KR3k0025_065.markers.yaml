  - {type: variant, offset: 1953, length: 0, content: '', WYG: 一時罩袁揚而岳立言泉潄逈驚瀑布以飛瀾文江淡清含濯錦而翻浪飛英鳯穴藻五色以凝華濯頴龍泉漏九重而毓潤心波湛漢泳精魄於黄陂情岳干天韞風雲於嵇巘疏乾激派龍門開竹箭之波鎮地横基鵠翅恃蓮花之嶺騰瀾浴景濬靈派以含珠擢幹捎雲翊高岩而聳桂玉潤金聲蘭薫桂馥垂秋實於翰林絢春花於文苑清規湛秀照月旦而雕談素論凝𤣥開夜光於妙辨談叢散馥韜幹氣於九蘭筆海流濤駭洪波於八水駱賓王學如猗頓之富文如清廟之樂皇甫湜氣岸遙淩豪士前風流肯落他人後浩蕩深謀噴江海縱横逸氣走風雷吐言遺珠玉落筆迴風霜舒文振頽波秉徳冠彛倫李太白幼而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一流處之仁鱗智龍為瑞一辰未若君子瑞於天倫文雅闗西族}
