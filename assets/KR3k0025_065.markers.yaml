  - {type: variant, offset: 1645, length: 2, content: 紀誅, WYG: 𫝊張霸博覧五經諸生孫林劉固段著等慕之皆市宅其旁以就學焉李膺性簡亢無所交接南陽樊陵求為門徒荀爽嘗謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此蔡邕以經籍去聖已乆文字多謬乃自書於碑使工雕刻太學門外後儒晩學咸取正焉及碑始立其觀及摹寫者車騎日千餘兩填塞街陌東漢本𫝊士有被其容接者名為登龍門後漢李膺𫝊卓茂性寛仁鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉東漢本𫝊阮修字宣子居貧四十未有室}
