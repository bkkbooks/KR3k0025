  - {type: 'tls:seg', offset: 1010, content: '', id: KR3k0025_CHANT_065-8a.22}
  - {type: variant, offset: 1010, length: 0, content: '', WYG: 兩人終日不敢見乃謂邑子曰此賢将汝不任事也又不可干以私西漢本𫝊坐者皆属目卑下之西漢盖寛饒𫝊淮南王謀反憚黯曰黯好直諫守節死義至說公孫𢎞等如發䝉耳西漢汲黯𫝊姜詩事母至孝赤眉散經詩里弛兵而過曰驚大孝必觸鬼神許劭為武功太守徐璆甚敬之府中聞子将為吏莫不改操飾行同郡袁紹去濮陽令歸車從甚盛将入郡界乃謝遣賓客曰吾輿服豈可使許子将見遂以單車歸家東漢本𫝊桓典為御史無所迴避京師為之語曰行行且止避驄馬御史後漢本𫝊有盜牛者主得之盜請罪曰刑戮是甘乞不使王彦方知也東漢王烈𫝊黄巾賊數萬人見鄭𤣥皆拜相約不敢入縣境東漢本𫝊孔融深敬鄭𤣥屣履造門造髙密縣為𤣥特立一鄉曰鄭公鄉東漢鄭𤣥傳彭􅁱為州從事時賊張子林等數百人作亂賊素聞其恩信即降曰自為彭君故降不為太守服也後漢袁閎投迹深林潛身十八年黄巾賊起攻没郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免後漢書周訪智勇過人聞王敦有不臣之心常切齒敦雖懐逆謀故終訪之世不敢為非晉書荀巨伯逺看友人疾值冦来攻郡羣相謂曰我輩無義之衆而入有義之國遂班師而還一郡並獲全裴令公目夏侯太初肅肅如入廊廟中不修敬而人自敬世說宋璟嘗侍宴在下坐張易之兄弟皆為列卿素畏於璟虛位揖璟曰公第一人何乃下座續世說王敦乆懐逆亂畏祖逖不敢發晉書劉琨𫝊謝安欲使王獻之題太極殿榜而難言之試謂曰魏時凌雲殿榜未題而匠者誤釘之不可下乃使韋仲将懸橙書之獻之揣知其㫖正色曰仲將魏之大臣寧有此事使其若此有以知魏徳之不長安遂不之逼王敦素憚周顗毎見顗面熱雖值冬月扇面手不得休晉書梁顧恊少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口謂人曰我願解身}
