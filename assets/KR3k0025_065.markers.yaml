  - {type: variant, offset: 3643, length: 2, content: 詔張, krp: 改期由他道而入通鑑𫝊記漢韋約曰犬馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割三輔決録集不勝犬馬之情選曺子建責躬詩表疲馬戀君軒選詩百川赴巨海謝靈運詩百川宗渤海五岳輔崑崙劉賓客傾巢舉落望徳如歸選昭王碑白聞天下談士相聚而言曰生不用萬户侯但願一識韓荆州何令人之景慕一至於此耶豈不以有周公之風躬吐握之事使海内豪俊奔走而歸之一登龍門則聲譽十倍所以龍蟠鳯逸之士皆欲收名定價於君侯李太白上韓荆州水深魚極樂林茂鳥知歸杜工部雖天地不求仁於芻狗而畎澮思委潤於滄溟白傅集小人之懐惠兮猶知獻其至愚固余異於牛馬兮寧止乎飲水而求芻伏門下之黙黙兮竟嵗年以康娛時乗間以獲進兮顔垂歡而愉愉仰盛徳以安躬兮又何忠之能輸韓復志賦惴惴焉惟恐不得出大賢之門韓}
