  - {type: variant, offset: 2300, length: 1, content: 贊, WYG: 憲宗謂鄭餘慶之子涵為令子本傳傳記顔延之少有令名太祖問其父延之曰諸子誰得卿風延之曰竣得臣筆測得臣聞夐得臣義姓氏英賢録竇禹鈞有子五人俱進士及第馮道詩曰丹桂五枝芳時號竇氏五龍類說集一園水竹今為主百卷文章更付誰}
