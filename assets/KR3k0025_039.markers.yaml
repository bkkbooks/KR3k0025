  - {type: variant, offset: 2302, length: 2, content: 克用, WYG: 白賀兄榮是見兒榮杜荀鶴吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此名位豈肯卑㣲休杜詩少年嶄然見頭角衆謂柳氏有子美韓愈撰柳宗元墓誌本朝方公之輝華顯赫之跡而其親享壽考康寧之福夫得禄及親人以為幸也而公以榮名顯仕為之養綵衣而戲昔以為孝也而公以金章紫綬恱其顔使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也歐公集温公誌吕獻可墓未成河南監牧使劉航自請書石既見其文遲回不敢書航之子安世曰成吾父之名可乎代書之聞見録有兒真驥子一噴羣馬倒杜詩惟要得家好兒子有子還應不死同挽梅聖俞生男已當户後山無子史齊大倉令淳于公無子有女五人有罪當刑罵曰生女不生男緩急非有益史記樓護有故人吕公無子歸護西漢本傳魏太祖}
