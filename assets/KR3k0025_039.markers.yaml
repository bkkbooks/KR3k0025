  - {type: variant, offset: 3081, length: 162, content: 形逃西漢韓安國傳互入物無遁形明者睹未萌後漢班超傳標鑒通晤唐王珪傳馬周言天下事若素宦于朝明習憲章者唐書本傳吐突承璀欲希上意奪裴垍權自請將兵討王承宗上疑未決宗正少卿李拭奏稱承宗不可不討承璀親近信臣宜委以禁兵上以拭狀示諸學士曰此姦臣也知朕欲將承璀故上此奏卿曹記之自今勿令得進用通監唐憲宗傳記明如日月難為蓋藏史通集光明於日月楚辭注云, WYG: 孝友}
