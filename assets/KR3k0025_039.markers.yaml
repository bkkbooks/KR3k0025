  - {type: variant, offset: 105, length: 0, content: '', WYG: 解嘲作名選作各有注作嬪君子室秋胡詩爰奉嬪於髙族寡婦賦中饋酒食之事總論細君知蠶織韓集卓文君作白頭吟諷相如樂府出妻經有女仳離詩子甚宜其妻父母不說出記妻出夫使人致之曰某不敏不能従而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命如舅在則稱舅舅没則兄無兄則稱夫雜記下子婦有七出不順父母者無子者淫僻者嫉妬者惡疾者多口舌者竊盜者家語本命篇曽參後母遇之無恩供養不衰其妻以蒸藜不熟因出之人曰非七出也參曰蒸藜小物耳吾欲使熟而不用吾命況大事乎七十二弟子解自叔梁紇始出妻及伯魚亦出妻至子思又出妻故稱孔氏三世出妻後序孟子惡敗而出妻荀子解蔽注惡其敗徳而出妻}
