  - {type: variant, offset: 636, length: 0, content: '', WYG: 何如陶家兒繞舎覔梨栗坡詩羲之生五子同上大兒踉蹡越門限小兒咿啞語繡帳坡詩子道經凡為人子之禮冬温而夏凊昬定而晨省在醜夷不争記曲禮夫為人子者三賜不及車馬夫為人子者所逰必有常所習必有業恒言不稱老為人子者居不主奥坐不中席行不中道立不中門不登髙不臨深不茍訾不茍笑不服闇不登危懼辱親也父母存不許友以死不有私財父母存冠衣不純素父母有疾冠者不櫛行不翔言不隋琴瑟不御食肉不至變味飲酒不至變貎笑不至哂怒不至詈同上子之事親也三諫而不聴則號泣而隨之記曲禮下親有疾飲藥子先嘗之同上事親有隠而無犯左右就養無方服勤至死致䘮三年檀弓上未仕者不敢稅人如稅人則以父兄之命不専家財也稅謂遺于人同上父母之衣衾簟席枕几不傳移也杖履勿敢近内則在父母之所有命之應唯敬}
  - {type: page-break, offset: 636, content: '', id: KR3k0025_WYG_039-19a, image: WYG0931/WYG0931-0075c.png}
  - {type: page-break, offset: 636, content: '', id: KR3k0025_WYG_039-19b, image: WYG0931/WYG0931-0075d.png}
