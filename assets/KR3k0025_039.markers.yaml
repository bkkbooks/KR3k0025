  - {type: variant, offset: 2343, length: 201, content: 儀收東都代宗迎灞上勞之曰國家再造卿之力也唐書本傳集業類補天功均柱石文選銘功銘著於景鍾名績垂於竹帛文選自試表當令麟閣上千載有雄名文選廿伐詩勳超邃古文選記室牋驃騎發跡於祈連文選解嘲茂勳格於皇天文選建丘山之功文選檄文刈單于之旗勦閼氏之首探符離之窟掃五王之庭文選典論銘功景鍾書名竹帛選臨淄侯牋勳業青冥上杜詩功業汾陽異姓王同上赫赫乎洸洸乎功業逐日以新韓文嗣德有繼將大書特書屢書不一書而己也韓文荅元微之取日虞淵洗光, WYG: 私恩願與相近即徙}
