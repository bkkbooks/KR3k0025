  - {type: variant, offset: 638, length: 5, content: 無城無兵安, WYG: 是善事我子行夫婦之禮焉没身不衰父母之所愛亦愛之父母之所敬亦敬之至扵犬馬盡然同上親在行禮於人稱父人或賜之則稱父拜之事統於尊記玉藻父命召唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時親癠色容不盛同上身者父母之遺體也行父母之遺體}
  - {type: page-break, offset: 638, content: '', id: KR3k0025_WYG_039-20a, image: WYG0931/WYG0931-0076a.png}
  - {type: variant, offset: 638, length: 5, content: 無城無兵安, krp: 是善事我子行夫婦之禮焉没身不衰父母之所愛亦愛之父母之所敬亦敬之至扵犬馬盡然同上親在行禮於人稱父人或賜之則稱父拜之事統於尊記玉藻父命召唯而不諾手執業則投之食在口則吐之走而不趨親老出不易方復不過時親癠色容不盛同上身者父母之遺體也行父母之遺體}
