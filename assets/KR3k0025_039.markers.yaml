  - {type: variant, offset: 2302, length: 2, content: 克用, krp: 白賀兄榮是見兒榮杜荀鶴吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此名位豈肯卑㣲休杜詩少年嶄然見頭角衆謂柳氏有子美韓愈撰柳宗元墓誌本朝方公之輝華顯赫之跡而其親享壽考康寧之福夫得禄及親人以為幸也而公以榮名顯仕為之養綵衣而戲昔以為孝也而公以金章紫綬恱其顔使天下為子者莫不欲其親如公之親為父母者莫不欲其子如公之為子也歐公集温公誌吕獻可墓未成河南監牧使劉航自請書石既見其文遲回不敢書航之子安世曰成吾父之名可乎代書之聞見録有兒真驥子一噴羣馬倒杜詩惟要得家好兒子有子還應不死同挽梅聖俞生男已當户後山無子史齊大倉令淳于公無子有女五人有罪當刑罵曰生女不生男緩急非有益史記樓護有故人吕公無子歸護西漢本傳魏太祖}
  - {type: variant, offset: 2305, length: 0, content: '', WYG: 征漢中聞王粲子死嘆曰孤若在不使仲宣無後三國魏志王粲傳皇天無知使鄧伯道無兒晉書鄧攸傳傳昔有人無男而養七女父亡七女負土葬父方輿記集樂天無子以姪孫阿新為之後見長慶集醉吟先生墓誌下無嗣紹隂宰漫韓集中郎有女能傳業伯道無兒可保家韓退之䘮子經子夏䘮其子而䘮其明記子負建鼓而求亡子莊集鴟梟啄母腦母死子始蕃蝮蛇生子時拆裂腸與肝好子雖云好未還恩與勤惡子不可說鴟梟蝮蛇然有子且勿喜無子固勿嘆韓集慰孟東野失子慈淚隨聲迸悲腸遇物牽白樂天詩傷心自嘆鳩巢拙長堕春雛養不成同上本朝顧况䘮子悲傷作詩曰老人䘮愛子日夜泣成血老人年七十不作多時别孔帖我淚猶可拭日逺當日忘母哭不可聞欲與汝俱亡故衣尚懸架張乳已流牀仍將恩愛刄割此衰老腸坡詩女經維虺維蛇女子之祥乃生女子載寢之地載衣之裼載弄之瓦詩歸妹女之終也注女終於出嫁也易雜卦漢有㳺女不可求思詩誰其尸之有齊季女有女懷春有女如玉顔如舜華同上女子許嫁笄而字記曲禮上女不言外内則女子十年不出姆教婉娩聴従執麻枲治絲繭織絍組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾同上女雖未許嫁}
