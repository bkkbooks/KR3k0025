  - {type: variant, offset: 2545, length: 162, content: 池潛授五龍夾之以飛唐呂溫作狄仁傑頌神發響效謨成天功唐文粹功名滿青史劉長卿記能事載盛德渭川之竹不足簡終南山之木不足軸唐文粹策功第一承恩莫二勒函谷之關刊燕然之石鼓行海內麾定四方並同上凡下子齪齪焉自保不足以發也文中述史史毛遂曰公等碌碌所謂因人成事者也通監周赧王紀委瑣握𪘏西漢司馬相如傳智不足以權變勇不足以決斷仁不足以取予彊不能以有, WYG: 為𢎞農太}
