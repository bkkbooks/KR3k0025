  - {type: variant, offset: 637, length: 0, content: '', WYG: 不敢噦噫􅅉咳欠伸跛倚睇眡不敢唾咦寒不敢襲癢不敢搔不敢袒裼父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫不說與其得罪扵鄉黨州閭寧熟諫父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果子甚宜其妻父母不說出子不宜其妻父母}
  - {type: variant, offset: 637, length: 0, content: '', krp: 不敢噦噫嚏咳欠伸跛倚睇眡不敢唾咦寒不敢襲癢不敢搔不敢袒裼父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫不說與其得罪扵鄉黨州閭寧熟諫父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果子甚宜其妻父母不說出子不宜其妻父母}
