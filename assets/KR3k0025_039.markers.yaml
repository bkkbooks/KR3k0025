  - {type: variant, offset: 628, length: 3, content: 對又問, WYG: 正室也易傳謝朓妻常懷刃欲殺朓不敢相見通鑑齊高宗集昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦蘇武詩畏内經夫子制義従婦凶也易繫于金柅柔道牽也同上惟婦言是用書牧誓史牽扵帷廧之制西漢鄒陽傳讀作牆孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆執刀侍立先主每入中心常凜凜蜀志王導為丞相妻曹氏性妬導甚憚之乃宻營别館以處衆妾曹氏知而將往焉導恐妾被辱遽命駕晉書子經子克家易幹父之蠱幹母之蠱同上嗣續妣祖詩父為長子不言適者通上下也亦言立適以長傳}
