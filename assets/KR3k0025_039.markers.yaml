  - {type: variant, offset: 94, length: 0, content: '', WYG: 廣川王傳注舅姑之心豈可失常哉東漢列女曹世叔妻傳傳記古者子婦供事舅姑旦夕在側與男女無異北齊顔氏家訓婦對舅姑之稱同上庻母附所生母及慈母經為庶母何以小功以慈已加也儀禮䘮服士為庶母何以緦也以名服也大夫以上為庶母無服慈母如母傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則葬之三年如母貴父之命也同上諸母不漱裳記曲禮上注庶母也庶母賤可使漱衣不可使漱裳婦謂夫之庶母為少姑爾雅子王子有其母死者其傅為之請數月之䘮孟子史母以子貴注妾子立則母得為夫人成風是也公羊隠元王符無外家東漢本傳阮孚之母即姑婢也晉書本傳周顗母李氏字絡秀顗父為安東將軍求絡秀為妾父兄不許絡秀曰門户殄瘁何惜一女子遂與之生嵩顗曰我屈節為汝家妾同上崔道固諸兄逼道固所生母自致酒炙客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我不足以報貴賓汝冝荅拜後魏志李迥秀母氏庶賤而色養過人通鑑唐則天紀下卷傳記裴秀母是婢秀年十八有令望而嫡母妬猶令秀母親下食與衆賓賓見竝起拜之答曰㣲賤豈冝如此當為小兒故耳於是嫡母乃不敢復役之語林漢中程文矩妻者李法之娣也有二男前妻四子以母非所生憎毁日積而穆姜慈愛温仁撫字益隆衣食資供皆兼倍所生或謂母曰四子不孝甚矣何不别居以逺之對曰吾方以義相導使其自遷善也及前妻長子興遇病困篤母惻隱自然親調藥膳恩情篤宻興疾久乃瘳扵是呼三弟謂曰繼母慈仁出自天授吾兄弟不識恩養禽獸其心雖母道盡隆我曹過惡亦已深矣遂將三弟詣南鄭獄陳母之徳狀已之過乞就刑辟東漢列女傳諸母經世母叔母何以亦期也以名服也儀禮䘮服父之兄妻為世母父之弟妻為叔母爾雅史宗室諸母因酣恱曰文叔少時謹信唯直柔耳今迺能如此後光武紀謝瞻幼孤叔母撫育有恩同於至親宋書傳記羊祜年十五而孤事伯母蔡氏以孝聞三十國春秋夫婦經夫夫婦婦而家道正易夫婦之道不可以不久也故受之以恒同上宜其室家宜其家人詩桃夭糓則異室死則同穴詩女曰雞鳴士曰昧旦子興視夜明星有爛詩蟲飛薨薨甘與子同夢同上妻子好合如鼓瑟琴常棣夫婦以禮義合顔色相親亦不可以顔色衰棄其相與之禮邶谷風箋夫婦一體也儀禮䘮服夫尊於朝妻貴於室同上夫婦之禮唯及七十同藏無間内則妻將生子及月辰居側室夫使人日再問之同上一與之齊終身不改郊特牲合􅈟而飲同上夫義婦聴記夫婦和家之肥也君子之道造端乎夫婦同上共牢而食合􅈟而酳所以合體同尊卑以親之也記日之與月隂之與陽相須而後成也記子夫婦有别孟子夫婦之道不可不正也荀大畧史冀缺耨其妻饁之敬相待如賔左僖三十二鳥獸猶不失儷成十一夫和而義妻柔而正昭六為夫婦内外二經二物昭二十五易基乾坤詩始闗雎夫婦之際人道之大倫也史外戚世家夫婦之道有義則合無義則離西漢夫婦人倫大綱夭壽之萌也王吉䟽夫婦之好父不能得之於子通鑑漢光武紀何曽閨門整肅與妻相見正衣冠相待如賔己南面妻北面再拜上酒一嵗不過再三晉書山濤布衣家貧謂妻韓氏曰忍饑寒我後當作公但不知卿堪為公夫人不耳本傳沈文季飲酒至五斗妻王氏飲亦至三斗常對食竟日宋書夫貴扵朝妻榮扵室後魏志傳記夫婦之道人倫之始王化之端也吳越春秋惟夫妻為同庖劉向列女傳王渾妻鍾夫人每嘗卿渾渾曰詎可爾妻曰憐卿愛卿是以卿卿我不卿卿誰當卿卿世說集合昏尚知時鴛鴦不獨宿杜詩非是夫不稱是妻白樂天結髪為夫妻恩愛兩不疑蘓子卿詩音容相眷戀羽翮兩逶迤飛翻不異林和鳴多好音陳子昂集雜佩以迎之寳瑟以友之其相得如青鳥翡翠之婉孌矣同上謂言琴與瑟糟糠結久長盧仝詩夫婦之道參配隂陽通逹神明夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢婦不事夫則義禮堕夫婦之好終身不離夫有再娶之義婦無二適之文東漢列女傳夫經夫子制義従婦凶也易夫者妻之天也儀禮䘮服婦人稱夫曰良士昏禮注夫也者以知帥人者也記郊特牲子良人者所仰望而終身也孟為人夫致功而不流致臨而有辨荀君道史夫主嘉美東漢列女傳夫主之不可以不事正色端操以事夫主同上傳記婦人既嫁以夫為天父母降服一等無二天之義列女傳集非是夫不稱是妻白樂天藁砧今何在夫也樂府解題妻經唯酒食是議詩妻子好合如鼔瑟琴同上父在則為妻不杖儀禮䘮服為妻何以期也妻至親也記檀弓為伋也妻者是為白也母不為伋也妻者是不為白也母同上大夫内子註適妻也記曽子問不敢藏於夫之篋笥不敢共湢浴夫不在斂枕篋簟席韣器而藏之内則子甚宜其妻父母不說出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰同上妻也者親之主也敢不敬與哀公問子為人妻夫有禮則柔従聴侍夫無禮則恐懼而自悚荀君道列子之妻曰妾聞有道之士妻子皆得佚樂莊子史叔向對齊晏嬰曰撫有晉國賜之内主左昭三婢子侍巾櫛僖二十二有息女願為箕箒妾西漢髙紀妻者夫之隂杜欽傳東方朔割名扵細君揚雄傳解嘲師古曰以肉歸遺細君是損割其名宋𢎞曰糟糠之妻不下堂東漢本傳黄承彦者高爽開朗為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黄頭黑色而才堪相配孔明許即載送之時人以為樂鄉里為之諺曰莫作孔明擇婦正得阿承醜女三國志註襄陽記賈充前妻李氏坐徙後娶郭氏赦得還詔充置左右夫人郭氏怒為李築舘舎於外晉書禮義有愆夫則薄之東漢列女傳夏侯道遷不聘正室後魏書傳記妻齊也共奉祭祀樊英列傳謝太傅兄奕女名道藴王凝之妻也世說謝羯絶重其婦}
