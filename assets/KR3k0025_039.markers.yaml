  - {type: variant, offset: 1478, length: 817, content: 之稱金劍淬來長透匣駭足逸翮天驥冥鴻始擅文三捷終兼武六韜並同上世上五百年吾家一千里高達夫利刃新磨一匣霜張承吉文桂枝片玉光生于家柳文處劇不繁事業皆辦杜牧之臨事無全牛劉長卿本朝後發先至者驥之良歐公集鋒錐必脫穎安肯久處囊僧參寥子君如汗血駒轉盻略燕楚東坡詩報功經功加于時書微子之命厥有成績紀于太常書君牙王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書于王之太常祭于大烝周禮司勳名與功偕記樂記后稷天下之為烈也豈一手一足哉記表記子功積如天地荀王伯史勳在王室藏於盟府左僖五年晉俟以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧魏絳於是有金石之樂左襄十九年銘其功業以示子孫左襄十九年互入傳遠克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣隸圉免左哀二年樂毅六月之間下齊七十餘城通監周紀何之勳爛焉與宜生等爭烈矣史記蕭何世家卞莊子一舉有兩虎之功史記陳軫傳夷萬乘之彊國收八百之蓄積史記樂毅傳齊器設於寧臺大呂陳於元英故鼎反乎磨室薊丘之植植於汶篁自五伯以來功未有及先王者也同上封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔前漢功臣表功光王府前漢表銘勳彝器歷世彌光聲溢金石前漢書匈奴遠遁而幕南無王庭通監漢武紀漢功臣皆剖符世爵受山河之誓存以著其號亡以顯其魂前漢功臣表立千載之功建萬世之安群臣之勳莫大焉昔周大夫方叔吉甫為宣王誅玁狁而百蠻從通監漢元紀休烈垂於不朽東漢鄧騭傳建天地之功增日月之耀後漢郎顗傳垂功名於竹帛東漢鄧禹傳伊霍之功不下席而立東漢崔瑗傳功名重山岳東漢酈炎傳馮異功若丘山東漢寇鄧之高勳耿賈之鴻烈東漢二十八將論勳效傳於百世晉書士稚葉跡中興克復九州之半晉書祖逖贊勳高一代勳力之盛無人倫比唐書初秦王以大箭射卻突厥後餘大弓一大箭五世寶之郊丘必陳儀物之首以識武功唐書子儀功蓋天下唐書賜鐵券藏名太廟畫像凌煙同上李晟破朱泚帝紀其功自文于碑敕皇太子書立于東渭橋以示後世唐書本傳吳元濟平帝美裴度功命韓愈為平淮西碑唐書尉遲敬德桑蔭不徙而大功立, WYG: ''}
