  - {type: variant, offset: 651, length: 2, content: 爾是, WYG: 父母其順矣乎中庸子孝子不諛其親莊孝子不生慈父之家順子為人子敬愛而致文荀従義不従父同上孝子不從命有三従命則親危不従命則親安孝子不従命乃禮従命則親辱不從命則親榮孝子不従命乃義從命則禽獸不從命則修飭孝子不従命乃敬子道傳子孝而箴左昭六聶政曰母在政身未敢以許人也史本傳親有嚴客帣攸衣䙝也韝音備鞠曲也􅎽其紀反與跪同謂小跪也侍酒於前史淳于髠傳得子經維熊維羆男子之祥乃生男子載寢之牀載衣之裳載弄之璋詩史徐陵母臧氏嘗夢五色雲化而為鳯集左肩上已而誕陵焉時有寳誌上人者世稱其有道陵年數嵗家人攜以候之寳誌手摩其頂曰天上石麒麟也南史傳記王鎭惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒興吾宗以鎮惡為名宋略集男兒當門户堕地目生神傅𤣥豫章行門衰祚薄晩有兒息選陳情表玉樹長新枝韋應物詩豈料鬢一作髮成雪方看掌弄珠白傅集}
