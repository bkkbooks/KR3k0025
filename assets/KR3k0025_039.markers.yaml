  - {type: variant, offset: 634, length: 0, content: '', WYG: 三年也正體於上又乃將所以傳重也庶子不得為長子三年不繼祖也儀禮䘮服男子冠而不為殤注云殤者男未冠而死可殤者男子二十冠而字記大夫之子長曰能御矣士之子長曰能典謁矣庻人之子長曰能負薪矣同上男子生設弧於門左内則子也者親之後也哀公問已冠而字之成人之道也冠義男子生桑弧蓬矢六以射天地四方射義父母生之續莫大焉孝經子遺腹子不思其父無貎扵心也不夢見像無形扵目也淮南子說林訓繼子得食肥而不澤情不相往}
  - {type: page-break, offset: 634, content: '', id: KR3k0025_WYG_039-17b, image: WYG0931/WYG0931-0074d.png}
  - {type: variant, offset: 634, length: 0, content: '', krp: 三年也正體於上又乃將所以傳重也庶子不得為長子三年不繼祖也儀禮䘮服男子冠而不為殤注云殤者男未冠而死可殤者男子二十冠而字記大夫之子長曰能御矣士之子長曰能典謁矣庻人之子長曰能負薪矣同上男子生設弧於門左内則子也者親之後也哀公問已冠而字之成人之道也冠義男子生桑弧蓬矢六以射天地四方射義父母生之續莫大焉孝經子遺腹子不思其父無貎扵心也不夢見像無形扵目也淮南子說林訓繼子得食肥而不澤情不相往}
  - {type: variant, offset: 635, length: 0, content: '', WYG: 也適子懷扵燕慈母喻於荆情相往來也列子傳鄭文公有妾夢天與己蘭曰以是為而子以蘭有國香人服媚之如是左宣二以母貴隠元注以母秩决立也家有長子曰家督史越世家子者父之隂也西漢杜欽傳奉先人之遺體王尊傳自季至雄五世而傳一子故雄無他揚扵蜀揚雄傳李宻曰為人子者願為人兄不願為人弟兄事親之日長弟事親之日短蜀志郤志傳注集十子若不肖不如一女英李白集通子繼餘塵揚杯祝願無他語特勿頑愚似汝爺同上繼體承家白氏六帖驥子好男兒杜詩大兒九齡色清徹秋水為神玉為骨小兒五歲氣食牛滿堂賔客皆回頭徐卿二子歌閩俗呼子為囝音蹇顧况補亡本}
  - {type: page-break, offset: 635, content: '', id: KR3k0025_WYG_039-18a, image: WYG0931/WYG0931-0075a.png}
