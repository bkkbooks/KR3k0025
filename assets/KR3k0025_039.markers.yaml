  - {type: variant, offset: 2741, length: 0, content: '', WYG: 風本傳古者女生三日卧之床下弄之瓦磚而齊告焉卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主繼祭祀也列女傳孝女曹娥者父盱於縣江泝濤迎神婆娑溺死不得屍骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死同上孔融被誅女年七歲幼弱得全寄尼舎主人有遺男欲娶之女曰豈得久活或言曹操收之女曰若死而有知得見父母豈非志願乃延頸就刑同上喬公兩女皆國色也吳周瑜傳甄后年九嵗喜書輒用諸兄筆硯兄言當作女愽士耶魏志甄后傳郭永竒其女曰此吾女}
