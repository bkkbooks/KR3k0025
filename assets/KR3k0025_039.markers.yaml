  - {type: 'tls:seg', offset: 646, content: '', id: KR3k0025_CHANT_039-5a.89}
  - {type: variant, offset: 650, length: 0, content: '', WYG: 喜而弗忘父母惡之懼而無怨父母有過諫而不逆一舉足而不敢忘父母是故道而不徑舟而不㳺不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出扵口忿言不反扵身不辱其身不羞其親孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容父母既没謹行其身不遺父母惡名可謂能終矣父母全而生之子全而歸之可謂孝矣同上子之事親有三道焉生則養沒則䘮䘮畢則祭祭統父母在不敢有其身不敢私其財坊記善則稱親過則稱己君子弛其親之過而敬其美従命不忿㣲諫不倦勞而不怨父母在不稱老言孝不言慈閨門之内戲而不嘆父母在饋獻不及車馬同上仁人之事親也如事天哀公問身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本同上不敢擅重事所以自卑而尊先祖也冠義事父母幾諫見志不従又敬不違勞而不怨語故當不義則子不可以不争於父孝經子}
