  - {type: variant, offset: 326, length: 228, content: 勳業既就天人允屬約常扣其端帝默然而不應他日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳳者皆望有尺寸之功以保其福祿今童兒牧豎悉知齊祚之終帝曰吾方思之約曰公初起兵樊沔此時應思今日王業已就何所復思若天子還都公卿在位則君臣分定無復異圖君明於上臣忠於下豈復有人方更同公作賊帝然之約出召范雲告之帝受禪為尚書僕射奉策之日吏部尚書范雲等二十餘人咸來致拜南史沈約傳馬仙琕曰小人如失主犬後主飼之則復為用矣通監齊和紀下盧藏用始隱有意當時世人目為隨駕隱士晚乃徇權利務為驕縱素節盡矣, WYG: ''}
