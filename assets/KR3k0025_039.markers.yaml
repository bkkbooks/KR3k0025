  - {type: variant, offset: 78, length: 0, content: '', krp: 賈逵自為兒戲弄常設部伍祖父習異之曰汝大必為將魏志張憑字長宗祖鎭蒼梧太守憑年數嵗鎮謂其父曰我不如汝有嘉兒憑曰阿翁詎宜以子戲父乎晉書苻堅幼而無賴祖洪甚惡之生無一目洪戲之曰吾聞瞎兒一淚生怒引刀自刺出血曰此亦一淚洪鞭之生曰性耐刀槊不堪鞭箠洪曰吾將以爾為奴生曰可不如石勒也本傳范喬祖父馨臨終執其手曰恨不見女成人因以所用硯與之陳書李百藥為童兒時多疾病祖母趙氏故以百藥為之名唐書傳記潘尼稱祖曰家祖顔氏家訓侯霸子孫稱其祖父曰家公同上臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命文選李令伯陳情表父經家人有嚴君焉父母之謂也易父兮生我詩靡瞻匪父陟彼岵兮瞻望父兮無父何怙同上父子之天父子一體父子首足也父至尊也同上由命士以上父子皆異宫記父之親子也親賢而下無能父尊而不親同上父作之子述之中庸為人父止於慈大學母取其愛而君取其敬兼之者父也孝經子父子主恩孟父子之間不責善離婁下君子之扵子愛之而勿面使之而勿貎面貎謂以顔色慰恱之不欲施小恵也荀子為人父寛恵而有禮君道石奮石建父子之美也無是父無是子無是子無是父楊孝至傳子之能仕父教之忠左僖二十二父一而已父慈而教昭六魏奚達驍勇周文曰非此父不生此子北史傳記客有問陳季方曰足下家君有何功徳而荷天下重名季方曰吾家君譬如桂生扵太山之阿上有萬仭之高下有不測之淵上為甘露所沾下有淵泉所潤當此之時焉知泰山之高淵泉之深不知有功徳與無也世說父子之嚴不可以狎骨肉之愛不可以簡簡則慈愛不接狎則怠忽生焉北齊顔氏家訓陳思王稱其父為家父同上囝别郎罷心摧血下囝音蹇閩俗呼子為囝父為郎罷唐顧况補亡哀閩章諸父經既有肥羜以速諸父詩諸父兄弟備言燕私變小楚親親則諸父昆弟不怨記中庸父之昆弟先生為世父後生為叔父爾雅子王珪従子求續經子曰叔父通何徳以之哉珪曰勿辭也文中子闗朗篇史荀攸字文達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志曹操少無賴叔父數言之扵嵩操患之後逢叔父扵路乃陽敗面喎口叔父以告嵩呼操曰叔父言汝中風已差乎操曰初不中風但失愛叔父故見罔耳晉書曹瞞傳王湛字處沖司徒渾之弟兄子濟輕之嘗詣湛見周易謂曰叔父何用此為湛曰體中不佳時脫復看耳復一作腹恐非濟請言之湛剖析𤣥㣲妙有竒趣濟才氣抗邁扵湛畧無子姪之敬既聞其言心形俱肅王湛有隠徳宗族皆以為癡武帝見濟曰癡叔死未濟曰臣叔不癡同稱其美同上母經家人有嚴君焉父母之謂也易母氏劬勞詩母氏聖善同上陟彼屺兮瞻望母兮靡依匪母無母何恃母兮鞠我同上父在為母何以期也屈也至尊在不敢伸其私尊也儀禮䘮服父卒繼母嫁従為之服報傳曰何以期也貴終也嘗為母子貴重其恩繼母之配父與因母同故孝子不敢殊也同上注因猶親也子上之母死而不䘮門人問子思曰昔者子之先君子䘮出母乎子思曰為伋也妻者是為白也母不為伋也妻者不為白也母故孔氏之不䘮出母自子思始也記檀弓上伯魚之母死期而猶哭夫子聞之曰誰與哭也門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之同上為父後者為出母無服䘮服母親而不尊表記母之親子也賢則親之無能則憐之同上子幼被慈母三遷之教孟曽參後母遇之無恩其妻蒸藜不熟出之家語史陸續母截肉未嘗不方㫁葱以寸為度東漢本傳王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥俱往及長娶妻母虐使祥妻覽妻亦趨而共之祥漸有時譽母深疾之宻使鴆祥覽知之徑起取酒祥争而不與母遽奪之自後母賜祥饌覽輒先嘗通鑑魏元帝紀天后上表請自今父在為母服齊衰三年唐髙宗紀韋嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寛唐武后紀李公孝四歲䘮母九歲外繼其後父更别娶後妻至是而亡劉炫以為無撫育之恩議不解任劉子翊駁之曰傳云繼母同母也當以配父之尊居母之位齊杖之制皆如親母繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有乎服既有之心䘮焉可獨異今言令許不解何其甚繆以親繼親既等故心䘮不得有殊如謂繼母之來在子出之後制有淺深考之經傳未見其文昔長沙人王毖漢末為上計詣京師既而吳魏隔絶毖在内國更娶生子昌毖死後為東平相始知吳之母亡便請繋居重不攝事于時議者不以為非然則繼之與前於情無别若要以撫育始生服制王昌復何足云乎又晉鎭南將軍羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭田伯生存養也伊不敢違然無父命故還本生尚書彭權議子之出養必由父命無命而出是為叛子扵是下詔従之然則心服之制不得縁恩而生也然本父後妻因父而得母稱若如來㫖本父亦可無心䘮乎何直父之後妻也事奏竟従子翊之議栁文劉子翊傳記陳思王稱其母為家母顔氏家訓魯母師魯九子之寡母也穆公賜號母師列女傳集母訓曰慈嵇含傳上堂拜家慶選秋胡詩太夫人御板輿選閒居賦芬芬孟母鄰杜詩舅姑經婦人不飾不敢見舅姑記婦事舅姑如事父母下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之内則婦將有事大小必請扵舅姑不敢専行舅姑之所有命之應唯敬對不敢噦噫嚏咳欠伸跛倚睇眡唾咦寒不敢襲癢不敢搔不敢袒裼舅姑之衣衾簟席枕几不傳移也杖屨勿敢近舅没則姑老注傳家事扵子婦也同上婦盥饋舅姑卒食婦餕餘私之也郊特牲婦稱夫之父曰舅稱夫之母曰姑在則曰君舅君姑没則曰先舅先姑爾雅子室無空虛則婦姑勃豀莊子外物篇注争處也吾聞先生姑國語婦養姑者也左姑慈婦聴禮也同上禮送女父誡之曰謹従汝舅之言母誡之曰謹従汝姑之言榖梁婦姑不相說則反唇而相稽稽計也西漢賈誼傳顔}
