  - {type: variant, offset: 1458, length: 256, content: 通監晉紀桓溫來朝或云欲誅王謝謝安神色不變同上殷浩被黜談詠不輟雖家人不見其有流放之慼晉書本傳謝安嘗與孫綽泛海風起浪湧諸人並懼安吟嘯自若同上陶侃疾篤上表遜位遣右長史殷羡奉送所假節麾幢曲蓋侍中貂蟬太尉章荊江雍梁交廣益寧八州刺史印傳棨戟軍資器仗牛馬舟舡皆有定簿尉印倉庫侃自管鑰以後事付右司馬王愆期通監晉成紀魏冉閔使常煒使燕燕主雋使封裕詰之積柴其旁使裕以其私誘之曰君更熟思無為徒取灰滅煒正色曰吾聞死者骨肉下于土精魄升于天蒙君之惠速益薪縱火使僕得上訴于帝足矣吾結髮以來尚不欺布衣況人主乎曲意苟合性所不能直情盡言雖沈東海不敢避, WYG: 咎救物故}
