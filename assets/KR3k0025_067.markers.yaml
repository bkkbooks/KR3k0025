  - {type: variant, offset: 6, length: 0, content: '', WYG: 嬴請}
  - {type: variant, offset: 6, length: 0, content: '', krp: 嬴請}
  - {type: variant, offset: 7, length: 2, content: 仕為, WYG: 帥公許之秦伯鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪左𫝊僖公三十三年漢主曰孤負黄權權不負孤也通鑑魏文紀劉洪専督江漢謀事有成者則曰某人之功也如有負敗則曰老子之罪陸贄曰寧人負我無我負人通鑑李廣曰諸校尉無罪乃我自失道吾今自上簿至幕府前本傳傳記人之有徳於我也不可忘也吾有徳於人也不可不忘也戰國䇿集君子謹乎約己𢎞乎接物典論古之君子其責己也重以周其待人也輕以約韓文本朝以恕己之心恕人則仁不可勝用矣以責人之心責己則義不可勝用矣言行録恕己責人經縱我不往子寧不嗣音詩非諸人行諸己禮記不能正其身如正人何其身不正雖}
