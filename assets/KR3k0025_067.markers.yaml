  - {type: variant, offset: 40, length: 0, content: '', WYG: 人而賤己先人而後己禮記子勞苦之事則争先饒樂之事則能讓荀子史小自潤之時師古曰言所潤益於己者當減小之西漢谷永傳薛包篤行父母服除子弟求分財異居包}
