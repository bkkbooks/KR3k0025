  - {type: variant, offset: 244, length: 1, content: 蕩, WYG: 若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎荘秋水互入見聞淺狹羣蟻觀鼇隠如岳蟻曰彼之冠山何異我之戴粒逍遙封壤之顛伏乎窟穴也符子集離婁㣲睇兮瞽以為無明楚辭已嗜臭腐養鴛雛以死䑕嵇叔夜書本朝此戰國䇿士以己度伊尹者也東坡臆度經他人有心予忖度之詩億則屢中論語反己經自我致戎又誰咎也易小人怨汝詈汝則皇自敬徳責人斯無難惟受責俾如流是惟艱哉書子曰三人行必有我師焉擇其善者而從之其不善者而改之論語正己而不求於人則無怨記中庸君子求諸己子曰見賢思齊焉見不賢而内自省也君子病無能焉不病人之不己知也不患人之不己知患其不能也内省不疚夫何憂何懼論語互入無愧子吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣荘子愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己自反而不縮雖褐寛博吾不惴焉自反而縮雖千萬人吾往矣射者正己而後發發而不中不怨勝己者反求諸己而已矣有人於此其待我以横逆則君子必自反也孟子曽子曰同逰而不見愛者吾必不仁也交而不見敬者吾必不長也臨財而不見信者吾必不信也三者在身曷怨人見善翛然必有以自存也見不善愀然必有以自省也}
