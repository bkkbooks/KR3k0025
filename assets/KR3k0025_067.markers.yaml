  - {type: variant, offset: 579, length: 0, content: '', krp: 𫝊人有毁己當退而求之於身若己有可毁之行則彼言當矣若己無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫如重裘止謗莫如自修斯言信矣通鑑魏明紀顔含曰吾聞伐國不問仁人向馮祖思問佞於我我豈有邪徳耶通鑑晉紀阮裕在剡曽有好車借無不給有人𦵏母意欲借而不敢言後裕聞之歎曰吾有車而使人不借何以車為命焚之晉書楊昭儉曰刻石紀功不若降哀痛之詔染翰稱美不若頒罪己之文通鑑晉髙祖盜發郭子儀父冡捕之不獲人以魚朝恩素惡子儀疑其使之子儀自奉天入朝朝廷憂其為變子儀見上上語及之子儀流涕曰臣乆將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也朝廷乃安通鑑大歴元年集齊生兄為時名相朝之碩臣皆其舊友齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司豈枉我哉我将利吾器而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既不得志矣而曰我未至也不以闗於有司其不亦鮮乎哉韓文送齊生下第序本朝君子與小人處為小人侵陵則修省畏避動心忍性増益預防老泉不能反己經不善學者師勤而功半又從而怨之禮記小人求諸人論語集鏡明不自照盧仝集溺井而怨伯益失火而怨燧人同上苛責於人經魯人有朝祥而暮歌者子路笑之夫子曰由爾責於人終無己夫禮記子曰小人使人也求備焉論語子苛煩者難為恭譙子責三光不照於覆盆之内抱朴子史孫季舒與石崇酣燕慢傲過度崇欲表免之裴楷謂崇曰足下飲人狂藥責人正禮不亦乖乎晉裴楷𫝊庫狄伏連居室患蠅杖門者曰何故聽入北史集自拳五色毬迸入他人宅却捉蒼頭奴玉鞭打三百詩話不任己意附虛心經君子以虛受人易舍己從人書子古之王者知雖落天地不自慮也辨雖彫萬物不自說也能雖盖海内不自為也荘子史昔周公朝讀百篇書夕見七十士猶恐不足通鑑惟不自用乃能用人通鑑唐徳宗李絳或乆不諫上輒詰之曰豈朕不能容受耶将無事可諫也通鑑唐憲宗𫝊記以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也太公六韜集虛舟應物駱賓王幽谷無私有至斯響洪鐘虛受無來不應頭陀寺碑本朝萬事轉頭同墮甑獨身浮世若虛舟詩話専擅經權臣擅命詩序愚而好自用賤而好自専中庸子愚者好専事而妬賢能荀子鷄有専栖之雄雉有擅澤之鷮抱朴子史鄭子孔之為政也専國人殺之左襄十九祭仲専鄭伯患之左成十五子産曰衆怒難犯専欲難成左襄十年盧蒲嫳聽政於其家左}
