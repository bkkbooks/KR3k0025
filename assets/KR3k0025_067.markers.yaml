  - {type: variant, offset: 1059, length: 370, content: 白刃南史不曲筆以求存東漢臧洪傳袁閎投跡深林潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移東漢怒不變容喜不失節故最為難通監漢獻帝蹈海之節千乘莫移其情東漢逸民傳論宜僚臨白刃而色正東漢孔融傳孔融被誅二子方弈祺被收而不動左右曰父執而不起何也荅曰安有巢毀而卵不破乎同上雖遇履虎神氣恬然三國名臣贊先主入益州劉璋張飛諸葛亮分定郡縣破璋將嚴顏生獲顏曰大軍至何不降顏曰我州但有斷頭將軍無降將軍飛怒令斫頭顏色不變曰斫頭便斫頭何為怒耶飛壯而釋之蜀志互入不屈陸遜遣親人韓扁奉表詣吳主邏者得之諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾闊狹且水乾宜當急去遜未荅方催人種葑豆與諸將弈棋射戲如常通監魏明紀智者不為小利移目不為意似改步通監魏元紀賈充見夏侯統令妓繞其舡三匝統若無聞充曰此吳兒木人石心也晉書諸葛誕以氣勵稱常倚柱讀書雷震其柱讀書自若曹嘉之晉紀孔坦將卒庾永省之流涕坦, WYG: 譴毅}
