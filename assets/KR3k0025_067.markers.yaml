  - {type: variant, offset: 5, length: 0, content: '', WYG: 弗祗服厥父事大傷厥考心於父不能字厥子乃疾厥子於弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友於弟書子惡聲至必反之君之視臣如犬馬則臣視君如國人君之視臣如草芥則臣視君如冦讐殺人之父人亦殺其父殺人之兄人亦殺其兄孟子史牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左宣十一互入人已兩失劉穆之往妻兄家乞食多見辱江氏後有慶㑹属令勿來穆之猶往食畢求梹榔江氏兄弟戲之曰梹榔消食君乃常飢何忽須此妻市肴饌為其兄弟以餉穆之穆之為丹陽尹召妻兄乃令厨人以金柈貯梹榔一斛進之宋書本傳互入妻家及報怨兩門責己恕人經與人不求備檢身若不及書躬自厚而薄責於人則逺怨矣不患人之不己知患不知人也攻其惡無攻人之惡論語史晉敗秦師於殽獲百里孟明視西乞術白乙丙以歸}
