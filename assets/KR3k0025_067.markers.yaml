  - {type: variant, offset: 657, length: 227, content: 監漢和紀盧植事馬融融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盻東漢本傳李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚皆長歎流涕而已通監漢質紀互入責望梁冀使人脅杜喬曰早宜從妻子可得全喬不肯明日冀遣騎至門不聞哭者遂白太后收繫之死獄中同上太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也通監, WYG: 鑑}
