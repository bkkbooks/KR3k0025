  - {type: variant, offset: 243, length: 0, content: '', WYG: 為也孟子楊子曰世故非毛所濟列子史奉己而已不在民矣左𫝊杜密曰劉勝位為大夫知善不薦聞惡無言隠情惜已自同寒蟬後漢私自潤入通鑑晉紀集入門各自媚誰肯相為言長城窟以己體人經無自廣以狹人書大夫䟦渉我心則憂詩鄰有䘮舂不相里有殯不巷歌禮記所惡於下毋以事上所惡於上毋以使下大學施諸己而不願亦勿施於人中庸己欲立而立人己欲達而達人子食於有䘮者之側未嘗飽也子貢曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人我不欲人之加諸我也吾亦欲無加諸人論語史晉荀吳圍鼓鼔人或請以城叛穆子曰或以吾城叛吾所甚惡也人以城來吾獨何好焉左昭十五楚王曰人之愛其子也亦如余乎左昭十二晉祖逖牙門童建毅殺内使周密降後趙石勒勒輒送首於逖曰叛臣逃吏吾之深仇將軍之惡也猶吾惡也通鑑晉元紀互入疾惡蘧伯玉耻獨為君子東漢顧榮與同寮宴見執炙者有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不知其味庾亮所乗馬有的顱殷浩以為不利於主勸亮賣之亮曰何有己之不安而移之於人晉本傳秦王堅召代長史燕鳳問代所以亂故鳳具以状對堅曰天下之惡一也乃執寔君及斤至長安車裂之通鑑晉武紀隂鏗嘗與賓客宴飲見行爵者因回酒炙以授之曰吾儕終日酣酒而執爵者不知其味非人情也南史山南地熱上以軍士未有春服亦自御裌衣通鑑徳宗集衆鳥欣有託吾亦愛吾廬陶淵明視人之瘼如疽在身劉賓客穏暖皆如我天下無寒人白樂天若知其心安而思所以安人其性適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勞勞一作勤吕和叔文𫝊記晏子曰古之賢者飽而知人飢温而知人寒晏子春秋以己度人子埳井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾}
