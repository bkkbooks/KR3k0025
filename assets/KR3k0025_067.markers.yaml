  - {type: variant, offset: 2373, length: 370, content: 容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜色亦無愧詞又改曰寵辱不驚考中上通監唐高宗紀徐公當雷霆之震而能全仁恕雖千載未見其比唐書徐有功傳有功武后時為廷尉后多殺人劉禕之竊謂賈大隱曰太后既廢昏立明安用臨朝稱制不如返政大隱密奏之太后命王本立推之本立宣敕示之禕之曰不經鳳閣鸞臺何名為敕太后大怒賜死禕之初下獄睿宗為之上疏申理中表皆賀之禕之曰此乃所以速吾死也臨刑沐浴神色自若自草謝表立成數紙通監唐武后張楚金魏元忠並免死流嶺南臨刑太后使鳳閣舍人王隱客馳騎傳聲赦之聲達於市當刑者皆喜躍讙呼宛轉不已元忠獨安坐自如或使之起元忠曰虛實未知隱客至又使起元忠曰俟宣敕已既宣敕乃徐起舞蹈再拜竟無憂喜之色同上李朝隱前後執破斜封官一千四百餘人怨謗紛然朝隱一無所顧通監唐睿宗楊國忠專國權勢可炙或勸張巡一見且顯用荅曰是方為國怪祥朝宦不可為也唐書張巡傳令狐楚為太原掌書, WYG: 白樂天}
