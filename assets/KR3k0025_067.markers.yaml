markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷六十七宋潘自牧撰人己部人已兩得經觀頥觀其所養也自求口食觀其自養也易謀其身不遺其友禮記惟天下至誠為能盡其性能盡其性則能盡人之性誠者非自成己而已也所以成物也中庸集愷悌以肥家信義以急人唐文粹人已兩失史申叔時曰人}
