  - {type: variant, offset: 2765, length: 882, content: 騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名重唐書互入敏捷寮屬二類李希烈留顏真卿不遣朱滔王武俊田悅李納各遣使詣希烈上表稱臣召顏真卿示之真卿叱之曰汝知有罵安祿山死者顏杲卿乎乃吾兄也吾年八十知守節而死耳希烈乃使甲士十人守真卿於館舍掘坎於庭云欲阬之真卿怡然見希烈曰死生已定何必多端亟以一劍相與豈不快公心事邪希烈乃謝之通監唐德宗紀蘇檢數為韓偓經營入相且遣親吏告偓偓曰乃欲以此相汙通監唐昭紀傳記劉裕次山陽聞何無忌敗績卷甲兼行將濟江而風急眾咸難之裕曰若有天命風當自息若其天不助舟覆溺何足可怪即命登舟舟移而風止三十國春秋居磨涅之中無緇磷之損世說中注嵇康臨死顏色不變謂其兄曰以琴來不兄曰已至康取調之為太平引曲成歎曰太平引絕於今日矣文土傳夏侯玄嘗倚柱作書霹靂其柱神色不變作書如故世說集吞縱之強不能反蹈海之志漂鹵之威不能降西山之節陸士衡連珠烈火流金不能焚景沈寒凝海不能結風迅風凌雨不謬晨禽之察勁陰殺節不凋寒木之心並同上舉世非之力行而不惑者千百年一人而已韓退之伯夷頌金可鎔不可使為污腐水可濁不可使為塵糞元次山互入是真難滅勢去未須悲時來何足喜白侍郎互入達理波濤喧眾口藜藿靜吾廬劉長卿飛語霜動明誠山立李義山文常經磨涅不改堅白杜牧之俾吾為秋毫之彬吾亦自足不見其小俾吾為泰山之阿吾亦無餘不見其多唐文粹互入不可損益踐危機不易心處橫潰不忘國奮身拔跡於豺狼之口道不汙而磨滅同上劍淬愈利玉燒不然孫可之文靈豸薦角比干獻骨合此憤烈在公為笏怒虎可唾笏不可挫峭華可拔笏不可折拄天不仄指日不蝕同上本朝呂端使高麗遇風濤檣折舟人大恐公恬然讀書若在齋閤時玉壺清話舉世皆冤而語言未嘗以自及以窮至死而妻子不見其悲忻歐公祭尹師魯文死生之間既已能通於性命憂患之至宜其不累於心胸同上泰山覆於前而色不變麋鹿興於左而目不瞬老泉文司馬溫公嘗曰並馳萬馬中能駐足者其王存乎王存墓誌得志遂茂而不驕不得志瘁瘠而不辱群居不倚獨立不懼東坡墨君堂記毀譽幾至於萬端夷險常持於一意臨川集確然金石心不畏蚊蚋觸蘇子由集金石不隨波黃魯直詩千重浪裏平安過百尺竿頭穩下來陳從易作王文穆罷相詩處士不生巫峽夢虛勞雲雨下陽臺陳希夷詩見青瓚, WYG: 七}
