  - {type: variant, offset: 1913, length: 303, content: 帝帝召彥回西上閣宿十日公主夜就之備見逼迫彥回整身而立從夕至曉不為移志公主謂曰君鬚髯如戟何無丈夫意彥回曰雖不敏何敢首為亂階宋書本傳魏宗愛用事威振四海嘗倨見百官於都坐王公已下皆趍庭望拜高允獨升階長揖通監宋武紀柳元景知禍至入辭其母整朝服乘車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮通監宋太祖王景文賜死敕至景文正與客棊叩函看已復置局下神色不變方與客思行爭劫局竟歛手納奩畢徐曰奉敕見賜以死方以敕示客通監宋明紀王惠嘗臨曲水風雨暴至坐者皆馳散惠徐起不異常日不以霑濡而改南史帝召允謂曰國書皆浩作不允曰太祖記前著作郎鄧彥海所撰先帝記及今記臣與浩同作然而臣多於浩帝大怒曰此甚於浩安有生路景穆曰, WYG: 樂}
