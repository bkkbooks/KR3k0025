  - {type: variant, offset: 38, length: 1, content: 富, WYG: 吾未聞枉己而正人者也况辱己以正天下乎孟子志不免於曲私而兾人以己為公也行不免於汙漫而兾人以己為修也身不善而怨人不亦反乎荀子行非其所履以督人是猶笞父而責人以大舜之節罵母而規人以曽閔之行唐子史宋子明謂桐門右師曰吾有衰絰而子擊鐘何也右師曰已衰絰而生子余何故舎鐘左定九年互入敏於應對已則無禮而責於有禮者女何故行禮左傳鄧艾謂宗預曰禮六十不服戎而卿受兵何也預答曰卿七十不還兵我六十何為不受耶蜀志曹操曰寧我負人無人負我三國魏志己無能而望他人用己無善而望他人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎唐書柳玭𫝊𫝊記財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君戰國䇿晉平公使工為弓三年乃成射不穿一札公怒将殺工烈女傳集其責人也詳其待己也亷詳故人難於為善亷故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣是不亦待於己者已亷乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者已詳乎夫是謂不以衆人待其身而以聖人望於人韓文原毁不知清己之慮而惡人之譁柳文譽己毁人𫝊記齊席毗毗一作玭清幹之士􅅓鄙文學嘲劉逖云君輩詞藻譬若朝菌須臾之玩非宏才也豈比吾徒千丈松常有風霜不可彫悴顔氏家訓集辯士多毁訾不聞談己非唐文粹本朝韓浦韓洎咸有詞學浦嘗輕洎語人曰吾兄為文譬如繩樞草舍聊庇風雨予之為文是造五鳳樓手楊文公筆談薄己厚人經君子}
