  - {type: variant, offset: 589, length: 11, content: 竇憲將征匈奴三公九卿詣, WYG: 春秋之義亡遂事漢家之法有矯制前漢馮奉世𫝊以匹夫之細竊殺生之權西漢㳺俠傳田蚡為丞相薦人或起家至二千石權移主上上曰君除吏盡未吾亦欲除吏嘗請考工地益宅上怒曰君何不遂取武庫西漢田蚡𫝊集専塲誇觜距韓集舍己狥人經舍爾靈龜觀我朶頥凶易子人病舍其田而芸人之田所求於人者重而所以自任者輕為之詭遇一}
