  body:
  - {type: variant, offset: 1, length: 2, content: 定力, WYG: 言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣左𫝊互見施報兩失世之亂也君子稱其功以加小人小人伐其技以馮君子左襄十三丞相田蚡言灌夫家在潁川横甚民苦之灌夫亦持丞相隂事為姦利受淮南王金史灌夫𫝊楚軍食少項王患之乃為髙爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾翁即若翁必欲烹而翁幸分我一杯羮通鑑漢髙祖紀集楚則失矣而齊亦未為得也司馬相如上林賦互入此莫笑彼陵雖孤恩漢亦負徳文選李陵書施報兩得經投我以桃報之以李詩以徳報徳論語子君之視臣如手足則臣視君如腹心孟子集美人贈我錦繡段何以報之青玉案美人贈我金錯刀何以報之英瓊瑤文選張平子四愁詩施報兩失}
