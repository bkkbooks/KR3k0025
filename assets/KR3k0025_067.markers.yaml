  - {type: variant, offset: 51, length: 4, content: 能屈孟滕, WYG: 過一頃復推與兄子後漢郭林宗減三牲之具以供賓旅通鑑漢桓紀流民萬餘户入縣界韓韶開倉賑之主者争謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣通鑑温大雅将改𦵏其祖父筮者曰𦵏於此地害兄而福弟大雅曰若得家弟永康我将含笑入地𦵏訖嵗餘而卒唐書弟彦愽也𫝊記閔子騫為後母所苦冬月以蘆花衣之以代絮父知之欲出後母子騫曰母在一子寒母去三子單父遂止孝子傳集劉禹錫刺播州子厚泣曰播非人所居夢得親在堂且萬無母子俱往理将拜疏願以柳易播韓作柳銘削衣貶食不立資遺以班親舊為友為義擔石之儲常空於私室方丈之食每盛於賓筵韓}
