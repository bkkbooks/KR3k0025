  - {type: variant, offset: 594, length: 1, content: 況, WYG: 成王臣下强盛将動為害前五行志魯㐮公十六年地震其後崔氏專齊欒盈專晉良霄傾鄭閽殺呉子燕逐其君楚滅陳蔡昭公十九年地震劉向以為是時季氏将有逐君之變昭公三十三年地震劉向以為是時周景王崩劉子單子立王子猛尹氏立王子朝哀公二年地震仲尼見棄而季氏强並同上漢惠帝時地震隴西壓四百餘家武帝時地震壓殺人宣帝時地震河南以東四十九郡北海瑯琊壊祖宗廟城郭殺六千人後又京師地震至北邊郡國三十餘壊城郭殺四百餘人元帝建昭四年藍田地震沙石流擁潭水安陵岸崩擁水逆流前漢光武時地震裂和帝時郡國十三地震順帝時頻地震岸崩及地陷冲帝時京師地震三郡沙擁土裂桓帝時京師地震又震憲陵寢屋靈帝時地震海水溢又震鴻都府門獻帝時雍州地頻震後漢魏明帝時京師地震揺動屋瓦晉武帝時頻嵗地震惠帝元康四年郡國地震淮南洪水出或山崩地陷壊城府殺百餘人元帝大興元年頻地震或水湧山崩殺人晉書宋孝武大明元年地震有聲自河北来魯郡山揺地動彭城女墻四百八十丈墜屋傾兖州地裂泉湧二年不已宋書梁武太清二年侯景舉兵反於豫州登壇㰱血之地震三年地再震隋書隋文帝開皇二十年廢太子勇以晉王廣為皇太子将冊之夜烈風大雪地震山崩人舎多壊殺人同上傳記地動隂有餘京房易占周文王寢病五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為主也羣臣皆悲曰請移之興事動衆以増國城文王曰我必有罪故}
