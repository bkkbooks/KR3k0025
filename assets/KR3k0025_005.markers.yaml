  - {type: variant, offset: 572, length: 2, content: 萹愛, WYG: 漢文帝後元年雨雹如桃李深三尺白虎通劉居中至嵩山有大蜥蜴數百人以食食之一日聚繞水盆邊各就取水纔入口即吐雹俄頃纍纍滿地忽震雷一聲起皆失去明日人言昨午雨雹大作乃知蜥蜴所為夷堅志本朝熈寜中河州雨雹大者如雞卵小者如蓮芡或如人頭耳目口鼻皆具無異鐫刻次年王師平河州蕃戎授首者甚衆豈克勝之符預告耶歐陽公地震經地震春秋南宫極震萇𢎞謂劉文公曰周之亡也其三川震今西王之大臣亦震天弃之也東王必大克左傳西王謂王子朝也東王敬王也史周幽王二年三川震太史伯陽甫曰周將亡矣昔伊洛竭}
