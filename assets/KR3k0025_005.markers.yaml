  - {type: variant, offset: 1979, length: 1, content: 互, WYG: 心雖惻何由知不如寛法擇良令告蝗不隠捕以時今苗因捕雖踐死明嵗猶免為蝝災歐陽公去年夏旱秋不雨海畔居民餘鹹苦今年春煖欲生蝝地上戢戢多于土預憂一旦開兩翅口吻如蜂那肯吐前時渡江過呉越布陣横空如項羽農夫拱手但垂泣人力區區固難禦撲縁騣尾困牛馬啗嚙衣服穿房户坐觀不救亦何心秉畀炎火傳自古荷鋤散掘誰敢後得米濟飢還少補同上饑荒經帝曰棄黎民阻饑汝后稷播時百穀書暨稷播奏庶艱食鮮食益稷古者國有凶則殺禮而多昏㑹男女之無夫家者所以育人民也詩序王曰於乎何辜今之人天降喪亂饑饉薦臻詩大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去㡬七曰省禮八曰殺哀九曰蕃樂十曰多昏十一曰索鬼神十二曰除盜賊周禮嵗凶年穀不登君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂記曲禮荘二十八年大無麥禾臧孫辰告糴于齊公羊傳曰君子之為國也必有三年之委一年不熟告糴饑也春秋饑大饑一穀不升謂之歉二穀不升謂之饑三穀不升謂之饉四穀不升謂之荒五穀不升謂之大祲穀梁子梁恵王曰河内凶則移其民于河東移其粟于河内河東凶亦然孟子凶年免於死亡凶年饑嵗君之民老弱轉乎溝壑壮者散而之四方者㡬千人矣凶嵗子弟多暴孟子史河内貧人傷水患萬餘家父子相食臣謹以便宜持節發河内倉廪以賑貧民汲黯武帝元鼎二年闗東餓死者千數詔下巴蜀之粟致之江陵有賑捄饑民免其戹者具舉以聞宣帝本始四年詔今嵗不登遣使者賑貸困乏元帝詔嵗比灾害民有菜色下詔吏虛倉廩開府庫賑救唐𤣥宗秋雨害稼京師饑裴耀卿曰陛下可遣重臣分道賑饑俱本紀傳記穀不熟為饑蔬不熟為饉果不熟為荒仍饑為荐爾雅集傳聞閭里問赤子弃渠溝持男易斗粟掉臂莫肯酬我時出衢路餓莩何其稠親逢道死者佇立久咿嚘歸舎不能食有如魚挂鈎韓集本朝景祐二年呉中大饑范文正公鎮浙西發粟募民以餉監司劾公不恤荒公乃自序所以晏㳺興造皆欲以有餘之財以恵貧者工技服力之人仰食于公私者日無慮萬數荒政之施莫此為大筆談趙清獻知越州兩浙旱蝗米價踴貴諸州皆禁増米價公獨榜衢路令有米者増價糴之於是米商輻凑米價更賤民無饑死者記聞富鄭公知鄆州自鄆移青㑹河朔大水民流京東擇所部豐稔三州勸民出粟得十五萬斛益以官廪隨所在貯之得公私廬舍十餘萬間散處其人凡活五十萬人募而為兵又萬餘人神道碑杭州大旱蘇公軾請于朝免本路上供米三之一故米不翔貴復得賜度牒百易米以救饑者活者甚衆言行錄老農釋耒歎淚}
