  - {type: variant, offset: 1973, length: 2, content: 嚮邇, WYG: 於是二府方奏事飛蝗蔽天上曰使百官方賀而蝗若此豈不為天下笑耶通鑑趙抃守青州時山東旱有蝗自青齊来及境遇風退飛墮水而盡言行錄蠅頭出土不急捕羽翼已就功難施只驚羣飛自天下不究生子由山陂官}
