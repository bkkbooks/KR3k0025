  - {type: variant, offset: 450, length: 0, content: '', WYG: 日者徳也故日蝕則修徳漢書漢文帝二年日有食之詔曰人主不徳布政不均則天示之災以戒不治乃謫見于天罪孰大焉其悉思朕之過失前本紀元帝永平二年日蝕詔氣邪嵗増侵犯太陽本紀哀帝初鮑宣上書今日蝕於三始陛下深自内責避正殿舉直言求過失天心同人心人心悦則天}
  - {type: page-break, offset: 450, content: '', id: KR3k0025_WYG_005-8b, image: WYG0930/WYG0930-0122d.png}
  - {type: variant, offset: 450, length: 0, content: '', krp: 日者徳也故日蝕則修徳漢書漢文帝二年日有食之詔曰人主不徳布政不均則天示之災以戒不治乃謫見于天罪孰大焉其悉思朕之過失前本紀元帝永平二年日蝕詔氣邪嵗増侵犯太陽本紀哀帝初鮑宣上書今日蝕於三始陛下深自内責避正殿舉直言求過失天心同人心人心悦則天}
  - {type: variant, offset: 451, length: 0, content: '', WYG: 得矣列傳廼正月辛丑朔日有食之變見三朝之㑹上天聰明苟無其事變不虛生臣聞師曰天佑與王者故灾異數見以譴告之若不畏懼有以塞除而輕忽簡誣則凶罰加焉孔光傳黄琬祖父香為魏郡守時日蝕而京師不見魏郡乃表日蝕之状帝問日蝕多少香久而無對琬年六嵗在傍曰何不言日蝕之餘如月之初遂用其言答詔本傳劉寵鄭𢎞徐昉趙喜虞延並為三事以日蝕免官漢書唐𤣥宗開元二年二月朔太史奏太陽應虧不虧姚崇表賀通鑑集陛下敬畏天命克已修身自辰至巳當虧不虧轉見明朗韓文賀穆宗表本朝仁宗康定元年皇祐元年嘉祐四年神宗臨寜元年皆正旦日食㑹要赫赫初出咸池中浴光洗跡生天東不覺有物来晦昧團圎一片如頑銅前時蝦蟇食爾妃天下戢戢無有忠責罵四方誰膽大仰頭憤憤惟盧仝老鴉居處已自穏三足鼎峙何乖慵而今有嘴不能噪而今有爪不能攻任㸔怪物翳天眼方且省事保爾躬日月與物固無惡應由此鳥招禍凶並梅聖俞詩月食經月盈則食易彼月而食則維其常詩婦順不修隂事不得謫見于天月為之食故月食則后素服而修六宫之職蕩天下之隂事記昏義子月望日奪其光月十五日與日相望東西中絶則月食奪光也淮南子史晉永嘉元年月蝕赤如血傳記秦胡亥立日月薄蝕熒惑襲月説苑月蝕后自提鼓階前把槌擊鼓者三中良人諸御者宫人皆擊柝救之月已食后乃入齋服素縞三日不從樂以應其祥荆州記集爛銀盤從海底出出来照我茅屋東天色紺滑凝不流氷光交貫寒曈曨初疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食来輪中輪如壮士斧斫壊桂似雪山風拉摧百錬鏡照見膽平地埋寒灰火龍珠飛出腦却入蛤蚌胎搥環破璧眼㸔盡當天一搭如煤炲磨滅踪跡須臾間便似萬古不可開玉川月食詩本朝有婢上堂来白我事可驚天如青玻瓈月若黒水精時當十分圎只見一寸明主婦煎餅去小兒敲鏡聲此雖淺近意乃重補救情夜深兎窟出衆星隨西傾梅聖俞星變經荘七年夏恒星不見夜明也星隕如雨與雨偕也左傳僖十六年隕石于宋五隕星也文十四年有星孛入于北斗周内史曰不及七年宋齊晉之君皆将死亂昭十年有星出于婺女禆竈曰七日戊子晉侯将死十七年有星孛于大辰西及漢申須曰彗所以除舊布新也並春秋左傳二十六年齊有彗星齊侯使禳之晏子曰無益也天之有彗也以除穢也君無穢徳又何禳焉若徳之穢禳之何益同上子鯨魚死而彗星出淮南子史五星五星所行}
