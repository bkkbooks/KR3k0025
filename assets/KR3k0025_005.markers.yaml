  - {type: variant, offset: 451, length: 0, content: '', krp: 得矣列傳廼正月辛丑朔日有食之變見三朝之㑹上天聰明苟無其事變不虛生臣聞師曰天佑與王者故灾異數見以譴告之若不畏懼有以塞除而輕忽簡誣則凶罰加焉孔光傳黄琬祖父香為魏郡守時日蝕而京師不見魏郡乃表日蝕之状帝問日蝕多少香久而無對琬年六嵗在傍曰何不言日蝕之餘如月之初遂用其言答詔本傳劉寵鄭𢎞徐昉趙喜虞延並為三事以日蝕免官漢書唐𤣥宗開元二年二月朔太史奏太陽應虧不虧姚崇表賀通鑑集陛下敬畏天命克已修身自辰至巳當虧不虧轉見明朗韓文賀穆宗表本朝仁宗康定元年皇祐元年嘉祐四年神宗臨寜元年皆正旦日食㑹要赫赫初出咸池中浴光洗跡生天東不覺有物来晦昧團圎一片如頑銅前時蝦蟇食爾妃天下戢戢無有忠責罵四方誰膽大仰頭憤憤惟盧仝老鴉居處已自穏三足鼎峙何乖慵而今有嘴不能噪而今有爪不能攻任㸔怪物翳天眼方且省事保爾躬日月與物固無惡應由此鳥招禍凶並梅聖俞詩月食經月盈則食易彼月而食則維其常詩婦順不修隂事不得謫見于天月為之食故月食則后素服而修六宫之職蕩天下之隂事記昏義子月望日奪其光月十五日與日相望東西中絶則月食奪光也淮南子史晉永嘉元年月蝕赤如血傳記秦胡亥立日月薄蝕熒惑襲月説苑月蝕后自提鼓階前把槌擊鼓者三中良人諸御者宫人皆擊柝救之月已食后乃入齋服素縞三日不從樂以應其祥荆州記集爛銀盤從海底出出来照我茅屋東天色紺滑凝不流氷光交貫寒曈曨初疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食来輪中輪如壮士斧斫壊桂似雪山風拉摧百錬鏡照見膽平地埋寒灰火龍珠飛出腦却入蛤蚌胎搥環破璧眼㸔盡當天一搭如煤炲磨滅踪跡須臾間便似萬古不可開玉川月食詩本朝有婢上堂来白我事可驚天如青玻瓈月若黒水精時當十分圎只見一寸明主婦煎餅去小兒敲鏡聲此雖淺近意乃重補救情夜深兎窟出衆星隨西傾梅聖俞星變經荘七年夏恒星不見夜明也星隕如雨與雨偕也左傳僖十六年隕石于宋五隕星也文十四年有星孛入于北斗周内史曰不及七年宋齊晉之君皆将死亂昭十年有星出于婺女禆竈曰七日戊子晉侯将死十七年有星孛于大辰西及漢申須曰彗所以除舊布新也並春秋左傳二十六年齊有彗星齊侯使禳之晏子曰無益也天之有彗也以除穢也君無穢徳又何禳焉若徳之穢禳之何益同上子鯨魚死而彗星出淮南子史五星五星所行}
  - {type: variant, offset: 452, length: 0, content: '', WYG: 散犯守厯陵鬬蝕彗孛飛流皆隂之精本于地而發于天也前天文志孝昭元始中太白入太微太微者天庭也法曰國恐有誅建始四年熒惑踰嵗星占曰熒惑與嵗星鬬有病君饑嵗而後旱傷麥民食榆皮綏和二年熒惑守心丞相翟方進欲塞灾異自殺同上彗孛秦始皇十五年彗星四見長或竟天史記漢武元封元年有星茀于東井後十餘日有星茀于三能音台望氣王朔言候獨見其星出如瓠有司皆曰陛下封禪天其報徳星云史記哀帝建平二年彗星出牽牛漢書獻帝建安二十三年彗星晨見東方日夕出西方後漢天狗天狗狀如大奔星有聲其下止地類狗破軍殺將史記孝昭元年牂雲如狗赤色長尾三枚前天文志成帝綏和元年天有星隠如雷聲有流星如缶長十餘丈郡國皆言為王者失勢諸侯起伯之異漢書哀帝建平元年有物着天白廣如一疋布西南行聲如雷一刻止曰天狗同上北齊孝昭皇建二年天狗下于郿山於其下講武厭之帝将至有兎驚馬墜死隋書煬帝大業十二年有大流星如斗出王良閣道聲如頽墻其日又有大流星如甕出羽林有聲同上枉矢枉矢類大流星蛇行而蒼黒望之如有毛羽史天官書晉武帝元康四年枉矢北行竟天之半晉書齊東昏侯永光三年枉矢晝見西方長十餘丈隋書蚩尤旗蚩尤之旗類彗而後曲象旗見}
