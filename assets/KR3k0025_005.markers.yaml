  - {type: variant, offset: 1910, length: 3, content: 老而學, WYG: 黄帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎封禪書宣帝本始三年夏大旱東西數千里東海有婦養姑甚謹姑自經死姑女告吏云婦殺我母于公争之不能得太守竟論殺孝婦郡中枯旱三年前漢獻帝興平元年秋三輔旱人相噉食後漢晉永嘉初大旱河洛漢皆可渉晉元帝斬淳于伯于建康市刑者以刀拭柱血皆上流於是大旱三年晉書宋孝武時頻嵗大旱人飢死者十有六七宋書隋煬帝時大旱人疫死}
