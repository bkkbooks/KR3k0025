  - {type: variant, offset: 456, length: 6, content: 昆弟由余子臧, WYG: 營首其下有大亂流血晉書傳記五星人君不仁春殺無辜則嵗星失度人君薄恩無義懦弱不勝任則太白失度人君内無仁義外多華飾則鎮星辰星失度京房五星占彗孛彗星為欃槍爾雅彗星者天之旗河圗五星散為五色之彗同上赤彗火精如火耀長七尺運斗彗星在北斗禍大起在三台臣害君在太微君害臣在天獄諸侯作禍彗行所指其國大惡孝經天狗太白散為天狗主候兵河圗七國之兵戰扵梁地故天狗先降梁疊見以其象也狗者守禦之也所降以惑守禦也洪範傳金門之山有赤犬名曰天狗其所下者起兵山海經兩敵相望其雲氣如牛馬状頭低尾仰曰天狗勿與戰也兵書枉矢辰星散為枉矢流所射刑誅河圗枉矢者弓矢之象也枉矢之所觸天下之所伐滅亡之象也洪範傳枉矢或南或北無聚衆伐戰國春秋蚩尤旗熒惑散為蚩尤旗主惑亂河圗蚩尤冢在東郡夀張縣闕鄉城中髙七丈民常十月祠之有赤氣出如絳名曰蚩尤旗皇覽墓記雷變經秋大熟未穫天大雷電以風書􅏎􅏎震電不寜不令詩隠九年春大雨震電公羊傳云記異也春秋僖十五年震夷伯之廟左傳云於}
