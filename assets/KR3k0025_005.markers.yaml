  - {type: variant, offset: 834, length: 959, content: 互入事反所料但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條晁董之對則孝宣以致中興東坡進陸贄奏議劄子子越人關弓而射之則己談笑而道之無他疏之也其兄關弓而射之則己垂涕泣而道之無它戚之也孟告子同室之人鬭者救之雖被髮纓冠而救之可也鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也孟經愛而知其惡憎而知其善禮記曲禮上拜下禮也今拜乎上泰也雖違眾吾從下語子罕互入不隨人轉紂之不善不如是之甚也語子張史子貢喜揚人之美不能隱人之惡史記不虛美不隱惡西漢司馬遷贊曹操勳勞宜賞不吝千金無功望施分毫不與通監三國志昔屈到嗜芰屈建去之以為不可以私欲干國之典通監齊太祖傳記所憎者有功必賞所愛者有罪必罰太公六韜集譬如親骨肉寧免相可否韓文當其賞雖三旌之貴萬鍾之祿咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之慘咸曰宜何也為惡而然也劉賓客集勿矜朱門是陋此白屋非同上登奉常之第者未必盡能文章為牙門之將者未必盡能威敵唐文粹本朝天下之事固有出於不幸者矣苟有可以用於世者不必聖賢之作也𧈪尤作五兵紂作漆器不以二人之惡而廢萬世之利也歐公集君實嘗謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反覆相非終身不能相一溫公行狀若無天下議美惡併成空後山詩經罔水行舟書益稷奡盪舟語憲問俾出童羖詩賓之初筵子匿為物而愚不識大為難而罪不敢重為任而罰不勝遠其塗而誅不至莊則陽以舟之可行於水也而求推之於陸莊天運兩喜必多溢美之言兩怒必多溢惡之言莊人間世互入私意天下莫大於秋毫之末而泰山為小莫壽乎殤子而彭祖為夭莊齊物論立直木而求其影之枉也立枉木而求其影之直也荀王霸責三光不照於覆盆之內抱朴辯問互入苛責於人責疲者以舉千鈞責兀者以及走兔鄧析子無厚聽虛而責響視空而索影劉子史董仲舒曰不琢玉而求文采西漢本傳以毀譽為榮辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯通監漢光武紀言論者計厚薄而吐辭選舉者度親踈而舉筆善惡謬於眾聲功罪亂於王法通監漢武紀曲表而欲直影郤行而欲求及前人也東漢楊賜傳傳記若夏之日而欲夜之長也說苑前賢群邪相抑以曲為直陸賈新語集謂鏌耶為鈍兮鈆刀為銛賈誼鵬賦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也韓文原道天下無正聲悅耳即為娛人間無正色悅目即為姝白侍郎集蓼蘗為甘山岳為輕沈下賢日月至明或以為昏秋毫至微或以為繁唐文粹本朝女無美惡富者妍士無賢不肖貧者鄙玉扄文, WYG: 火災}
