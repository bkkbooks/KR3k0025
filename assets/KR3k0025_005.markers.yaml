  - {type: variant, offset: 1812, length: 1, content: 上, WYG: 于西門之外晉侯問于士弱曰吾聞之宋灾於是乎知有天道何故對曰古之火正或食于心或食于咮以出内火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘商丘分野之辰辰火主火也祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以日知其有天道也宋商之後也左傳三十年或叫于宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆甲午宋大災宋伯姬卒待姆也待姆不来而死于火昭十七年有星孛于大辰西及漢申須曰彗所以除舊布新也今除于火火出必布焉諸侯其有火災乎梓慎曰徃年吾見之是其證也火出而見今兹火出而章其居火也必矣}
