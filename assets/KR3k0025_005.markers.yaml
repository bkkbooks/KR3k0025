  - {type: variant, offset: 1895, length: 0, content: '', WYG: 已求之母乃已䟽乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎記檀弓大旱春秋不雨自十二月不雨至于秋七月自正月不雨至于秋七月僖三年自十月不雨至于五月不雨旱不為灾也二十一年大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚衞大旱卜有事于山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎師興而雨鄭大旱使屠繫有事于桑山斬其木不雨子産曰有事于山藝山林也而斬其木其罪大矣奪之官邑左傳閔雨者有志乎民者也榖梁子七八月之間旱則苗稿矣若大旱之望雲霓也若大旱之望雨也孟子大旱金石流土山焦荘子湯之救旱也素車白馬布衣身嬰白茅以身為牲尹子晉平公使}
