  - {type: variant, offset: 78, length: 2, content: 一心, krp: 妖也六韜趙簡子問于翟封餘曰吾聞翟雨穀三日雨血三日牛生馬馬生牛信乎對曰此非翟之灾也其君㓜弱其大臣比黨}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 求爵禄其百官肆斷而無常其政令不竟而數改此其妖也説苑燕伐齊齊湣王出走楚使淖齒救齊淖齒謂王曰夫千乘博昌間地方數百里雨血霑衣嬴博之地拆至泉有人當闕而哭求之不得王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王戰國䇿天灾地妖所以警人主也夢寐證怪所以儆人臣也灾妖不勝善政怪夢不勝善行家語貌之不恭厥咎狂厥極惡時則有龜孽雞禍言之不從厥咎僣厥極憂時則有詩妖介蟲之孽時則有犬禍視之不明厥咎豫厥極疾時則有草妖倮蟲之孽聴之不聰厥咎急厥極貧時則有鼓妖豕禍思之不睿厥咎雺厥極凶短折時則有脂夜之妖時則有華孽牛禍皇之不極厥咎雺厥極弱時則有射妖龍蛇之孽時則有馬禍時則有日月亂行星辰逆行尚書大傳凡有所害謂之灾無所害而異于常謂之異洪範傳日食經乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走注云集合也不合則日食可知書十月之交朔日辛卯日有食之亦孔之醜此日而食于何不臧詩男教不修陽事不得謫見于天日}
  - {type: page-break, offset: 81, content: '', id: KR3k0025_WYG_005-6b, image: WYG0930/WYG0930-0121d.png}
  - {type: page-break, offset: 81, content: '', id: KR3k0025_WYG_005-7a, image: WYG0930/WYG0930-0122a.png}
