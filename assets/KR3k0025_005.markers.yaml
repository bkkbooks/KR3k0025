  - {type: variant, offset: 530, length: 0, content: '', WYG: 冬雷民飢同上臣僣奢下犯主則雷電擊朝河圗霹靂擊於宫殿者妃后争政王言不從革而秋多霹靂霹靂者金氣也其音商故應之並春秋繁露集巫山冬可怪昨夜有奔雷杜詩龍蛇不成蟄天地劃争回同上雨雹經大雨雹春秋季武子問于申豐曰雹可禦乎對曰聖人在上無雹雖有不為灾古者日在北陸而藏兵西陸朝覿而出之今藏川池之氷弃而不用風不越而殺雷不發而震雹之為灾誰能禦之左傳子景帝二年秋雨雹大者五寸永初三年夏河中縣大雨雹如杯棬大或如斗殺畜牲雉兎折樹木孔叢子史周孝王七年厲王生冬大雹牛馬死江漢俱凍史記漢武元封三年冬雨雹大如馬首前漢宣帝大始中山陽濟陽雨雹如雞子深二尺五寸殺飛鳥牛馬皆死成帝時楚國雨雹大如斧飛鳥死王莽時雨雹殺牛羊並同上安帝初元}
