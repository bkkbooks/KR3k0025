  - {type: variant, offset: 83, length: 8, content: 鴻鵠將至思援弓繳, WYG: 食之日有食之既春秋莊公十五年六月辛未朔日有食之鼓用牲于社非常也注云非常鼔之月長厯推辛未實七月朔置閏失所故致月錯左傳惟正月之朔慝未作日有食之于是乎用幣于社伐鼓于朝注云正月夏之四月周之六月}
