  - {type: variant, offset: 1841, length: 0, content: '', WYG: 拾瀋也於是乎去表之藁道還公宫孔子在陳聞火曰其桓僖乎左傳子失火而遇雨失火則不幸遇雨則幸也故禍中有福趨夫救火者汲水而赴之或以甕瓴或以盆盂其方員鋭橢不同盛水各異其於滅火均也淮南子史漢武時河内失火燒千餘家上使汲黯視之前漢晉太子遹惠帝長子也宫中嘗夜失火武帝登樓望之太子時五嵗牽帝裾入闇中曰暮夜倉卒宜備非常不宜令照見人也帝由是竒之武庫火張華懼變列兵固守然後救之累代之寳及漢祖斬蛇劍王莽頭孔子履等盡焚焉佛圗澄嘗與石季龍升中䑓澄忽驚曰幽州當火灾仍取酒噀之久而笑曰救已得矣季龍遣騐幽州云火從西門起西南驟雨滅之雨亦頗有酒氣晉書傳記古初遭父䘮未葬隣人失火及初舍棺不}
