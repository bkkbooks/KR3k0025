  - {type: variant, offset: 1949, length: 0, content: '', WYG: 考異南方有人長二三尺袒身而目在頂上走行如風名曰魃所見之國大旱神異經齊大旱景公欲祠靈山晏子曰夫靈山以石為身以草木為毛髪天不雨髪将焦身将熱彼獨不欲雨乎祠之何益公曰吾欲祠河伯可乎晏子曰河伯以水為國以魚鼈為民天久旱百川将竭國亡民将滅矣彼獨不欲雨乎祠之何益公曰奈何晏子曰公試避宫殿曝露與山河共憂其幸而雨景公曝露三日果大雨晏子春秋嵗旱旱草先生旱草者蒺蔾也師曠占湯大旱七年雒川竭煎沙爛石於是祀山川祝曰政不節與民失職與苞苴行與䜛夫昌與宫室崇與女謁盛與何不雨之甚也説苑集旱有三曰天旱國旱人旱曷為天旱蹇陽肆㐫下土祗謹雖六七嵗黎民不飢曷為國旱君道熾灾徳涸仁枯貪風暴氣蒸為時癘曷為人旱邦毁其政吏賊其行千里人心燥不為隂夫天旱求諸仁仁洽而時豐國旱求諸徳徳潤而澤流人旱求諸政政清而俗阜今貨逰于上刑黯于下百姓焦愁結成狠暑所謂人旱也邦守不清其政而逮龍貸雨於何可兾乎文粹維兹之旱兮其誰之由我知其端兮風伯是尤山升雲兮澤上氣雷鞭車兮電摇􅀈雨寖寖兮欲墜風伯怒兮雲不得止雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施韓訟風伯昔聞草木焦今覩沙石爛何遜退藏恨雨師健歩聞旱魃前聖欲焚巫武王親救暍真龍意寂寞土梗空俯僂暴尫成前聞鞭巫非稽古杜詩本朝方炎夏之隆蒸兮閔時澤之不濡冦乘時而行虐兮盗威烈乎陽烏駕畢方而驂熒惑兮回禄為其前驅燼所及於一燎兮何有瓦石與璠璵豐隆致其微隂兮飛亷蕩覆而無餘野曈曈而揚塵兮何蕭艾之紛敷應龍矯首于下澤兮僅自免于槁枯鳥呀咮而忘飛兮獸逃穴而深居張文潜賦旱野渴天澤歐陽公安得夢隨霹靂車馬上傾倒天瓢翻東坡我来秋日午旱久石床温安得雲如蓋能令雨㵼盆嵗旱泉水竭枯萍粘破塊並同上未須丘垤占鳴鸛只要朝廷起卧龍山谷蝗螟經去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火詩螟螽有蜚蝝生文三年雨螽于宋墜而死也左傳雨螽于宋外灾不書此何以書灾甚也其灾甚柰何茅茨盡也穀梁史漢平帝時蝗詔使者捕蝗人能捕蝗詣吏者以石斗受錢前漢魯恭為中牟令蝗不入境}
