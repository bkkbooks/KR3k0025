  - {type: variant, offset: 1827, length: 7, content: 尚有典刑詩蕩往, WYG: 道邇竈焉知天道是亦多言矣豈不或信遂不與亦不復火火作之明日禳火于𤣥冥回禄祈于四鄘哀三年司鐸火火踰公宫桓僖灾南宫敬叔至命周人出御書子服景伯至命宰人出禮書校人乘馬巾車脂轄百官備府庫謹守官人肅給濟濡帷幕鬱攸從之蒙葺公室自太廟始外内以悛公父文伯至命校人駕乘車季桓子至御公立于象魏之外命救火}
