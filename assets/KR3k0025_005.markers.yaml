  - {type: variant, offset: 453, length: 2, content: 胡越, WYG: 王者征伐四方史天官書魏嘉平四年白氣經天司馬景王問王肅肅曰此蚩尤之旗也東南其亂乎魏志營頭晉惠帝太和二年星晝流矢北下光變有聲如雷占曰}
