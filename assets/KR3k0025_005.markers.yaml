  - {type: variant, offset: 1893, length: 0, content: '', krp: 藏寳之䑓燒救火三日三夜乃勝之公子晏賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏于囷庾商賈藏于箧匱今百姓乏於外而賦歛無已皇天降災是君之福也韓詩外傳劉昆為江陵令民有火灾昆向火叩頭即霈然下雨陳留耆舊傳鄭𤣥年十七在家見大風起詣縣曰某時當有火灾宜祭爟神廣設禁備時火果起而不為害别傳欒巴為尚書正朔大㑹巴得酒不飲西南噀之有詔}
  - {type: variant, offset: 1894, length: 0, content: '', WYG: 巴巴曰臣本縣成都都市大失火故因酒為雨以滅火驛至果如其言列仙𫝊糜竺嘗從洛陽歸有好新婦從求寄載行二十餘里謝竺曰我天使也當往燒東海糜竺家感君見載故以相語君快去我緩行竺乃急行達家使出財物日中而火大發搜神記集永州多火灾人無安處老弱燔死晨不爨夜不燭蓋類物為之者訛言相驚云怪鳥莫實其状山海經云有鳥如鶴一足赤文白嘴其名曰畢方見則其邑有譌火若今火者其可謂譌歟而人有以鳥傳者其畢方歟遂令邑中状而圗之禳而磔之為之文而逐之栁文朝儲清以聫邃兮夕蕩覆而為灰焚傷羸老兮炭死童孩呌號隳突兮戸駭人哀袒夫狂走兮倏忽往来鬱收孽暴兮混合恢台民氣不舒兮僵踣顛頽休炊息燎兮反覆灰煤門甍晦黒兮啟伺奸回栁中宵焚九廟雲漢為之紅杜詩訛火急生煆栁詩本朝半夜人呼急横空火氣浮天遥殊不辨風急已難収暁入陳倉縣猶餘賣酒樓烟煤已狼籍吏卒尚呀咻東坡旱暵經僣常𤾉若書旱既太甚藴隆蟲蟲詩旱既太甚則不可推旱既太甚則不可沮赫赫炎炎云我無所旱既太甚滌滌山川旱魃為虐如惔如焚旱既太甚黽勉畏去胡寜瘨我以旱􅉃不知其故詩如彼嵗旱草不潰茂召旻舞師教皇舞帥而舞旱暵之事周禮司巫若國大旱則帥巫而舞雩女巫旱暵則舞雩周禮嵗旱繆公召縣子而問焉曰天久無雨吾欲暴尫而奚若曰天則不雨而暴人之疾子虐無乃不可乎然則吾欲暴巫而奚若曰天則不雨而望之愚婦人}
