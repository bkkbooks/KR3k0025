  - {type: variant, offset: 78, length: 2, content: 一心, WYG: 妖也六韜趙簡子問于翟封餘曰吾聞翟雨穀三日雨血三日牛生馬馬生牛信乎對曰此非翟之灾也其君㓜弱其大臣比黨}
