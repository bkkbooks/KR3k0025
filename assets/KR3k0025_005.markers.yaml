  - {type: variant, offset: 642, length: 0, content: '', WYG: 民其咨書洚水警予大禹謨洪水滔天浩浩懐山㐮陵下民昏墊益稷鯀堙洪水洪範洪水茫茫詩大水春秋凡平原出水為大水左傳宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之灾又以為君憂拜命之辱左傳子當堯之時洪水横流汎濫于天下孟子水逆行汎濫于中國蛇龍居之民無所定下者為巢上者為營窟孟古者水為民害禹鑿龍門闢伊闕平治水土使民得陸處往古之時四極廢九州裂水浩漾而不息於是女媧積蘆灰以止淫水淮南子史秦武王三年渭水赤三日昭王三十四年渭水大水三日史記髙后三年漢中南郡河陽大水流數萬家前五行志山東被水災民多飢乏於是天子遣使虛郡國倉廪以賑貧貨志昭帝詔廼者民被水灾頗匱于食朕虛倉廪使使者賑乏漢武帝桓帝永興三年彭城泗水溢流永夀元年洛水溢至津城門漂流人物獻帝建安二年漢水溢害人物公沙穆銳思洛下推歩之術永夀元年大水三輔以東無不漂沒穆明曉占候乃預告令民姓徙居髙地故𢎞農人獨得免灾後漢任文公巴郡人也為治中從事時天大旱白刺史曰五月一日當有大水其變卒至不可防救宜令民吏預為其備刺史不聴文公獨儲大船百姓頗有防者其日旱烈至日中雲起須臾雨至晡時湔水湧起十餘丈突壊廬舎所害數千人同上建武十年雒水出造津城門或欲築塞之陳宣諫曰昔王尊正身金堤水退况聖主耶言未絶而水去范􅁮後漢書傳記君湎于酒淫于色賢人潜國家危厥異流水赤京房易占哀帝延平六年河東河化為血元初二年潁川㐮城臨水化為血不流崔豹古今注集洪泉極深何以窴之楚詞天問天網浡潏為凋為瘵洪濤瀾汗萬里無際長波涾􅘍迤延八裔木華海賦秋隂欺白日泥潦不少乾河隄决東都老弱隨驚湍䟽决須有頼懐㐮信可畏堯呼大水浸十日不惜萬國赤子魚頭生暮宿投民村髙處水}
