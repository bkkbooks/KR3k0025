markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷五宋潘自牧撰災異部災異經古有夏先后方懋厥徳罔有天災書伊陟相太戊亳有祥桑穀共生于朝亡書序髙宗祭成湯有飛雉升鼎耳而雊書肜日序髙宗肜日越有雊雉書曰咎徵書天大雷電以風禾盡偃大木斯拔金縢日月告凶不用其行詩􅂱􅂱震電不寜不令百川沸騰山冢崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲詩宣王遇災而懼側身修行欲消去之詩序保章氏命乖别之妖祥以詔救政周禮孟春行夏令則雨水不時草木早落國時有恐行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春行秋令則其國大水寒氣總至冦戎来征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱煖氣早来蟲螟為害季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時雨不降山林不収行秋令則天多沉隂淫雨早降兵革並起孟夏行秋令則苦雨數來五穀不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗蟲為灾暴風来格秀草不實仲夏行冬令則雹凍傷穀道路不通暴兵来至行春令則五穀晩熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫季夏行春令則穀實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風寒不時鷹隼早鷙四鄙入保孟秋行冬令則隂氣太勝介蟲敗穀戎兵乃来行春令則其國乃旱陽氣復還五穀無實行夏令則其國多火災寒熱不節民多瘧疾仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國乃旱蟄蟲不藏五榖復生行冬令則風災數起収雷先行草木早死季秋行夏令則其國大水冬藏殃敗民多鼽嚏行冬令則國多盜賊邊境不寜土地分裂行春令則煖風来至民氣懈惰師興不居孟冬行春令則凍閉不宻地氣上泄民多流亡行夏令則國多暴風方冬不寒蟄蟲復出行秋令則雪霜不時小兵時起土地侵削仲冬行夏令則其國乃旱氛霧冥冥雷乃發聲行秋令則天時雨汁𤓰瓠不成國有大兵行春令則蝗蟲為敗水泉咸竭民多疥癘季冬行秋令則白露早降介蟲為妖四鄙入保行春令則胎夭多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降氷凍消釋記月令沙麓崩春秋梁山崩無氷隕石于宋五六鷁退飛過宋都十二月隕霜不殺草李梅實雨水氷十月隕霜殺菽春秋齊侯田于貝丘見大豕從者曰公子彭生也公怒射之豕人立而啼初内蛇與外蛇鬬於鄭南門中内蛇死六年而厲公入申繻曰妖由人興也人無釁焉妖不自作人弃常則妖興晉文公卒殯于曲沃柩有聲如牛有蛇出自泉宫入于國如先君之數石言于晉魏榆晉侯問于師曠對曰作事不時怨讟動于民則有非言之物而言王子朝用成周之寳珪于河津人得諸河上隂不佞拘得玉者取其玉将賣之則為石有鸜鵒来巢師已曰吾聞童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢逺哉遥遥裯父喪勞宋父以驕鸜鵒鸜鵒往歌来哭是年昭公孫于齊楚王有疾是嵗有雲如衆赤烏夾日以飛周太史曰其當王身乎若禜之可移于令尹司馬王曰除腹心之疾而置諸股肱何益遂弗禜天反時為災地反物為妖人反徳為亂亂則妖生並左傳史凡天變過度乃占國君強大有徳者昌弱小飾詐者亡太上修徳其次修政其次修救其次修禳史天官書國家将有失道之敗而天乃先出灾異以譴告之不知自省天出怪異以警懼之尚不知變而傷敗乃至董仲舒傳漢惠帝宜陽雨血漢書漢武帝建元四年有風赤雨血漢成帝即位封五舅其日黄霧四塞哀帝時山陽雨血大者如錢小者如麻漢書夫灾變之發皆所以明教戒也惟率禮修徳可以勝之晉志晉愍帝建興二年霧着人如墨晉書晉孝武帝京都地生毛}
