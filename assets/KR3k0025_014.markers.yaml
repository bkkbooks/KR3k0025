  - {type: variant, offset: 1886, length: 1, content: 輕, WYG: 錦州招諭縣後廢之本朝以麻陽來屬黔陽本漢武陵郡鐔城縣地宋省之唐貞觀置朗溪縣屬叙州後廢為黔江城本朝復升為黔陽縣地理沿革表形勝沅水在黔陽㵲水在盧陽龍溪在鎮江寨犀溪在盧陽界鵶井出硃砂花山竹山在盧陽金斗崖在黔陽錦州渡在麻陽雙髻峰在盧陽七寶山在黔陽龍井洞在盧陽有三洞曰龍井乾井小井大浴洞在黔陽輿地紀勝集令沅湘兮無波楚辭沅有芷兮澧有蘭同上沅湘萬里秋杜詩楊花落盡子規啼聞說龍標過五溪我亦甘心寄明月隨君直到夜郎西李白送王昌齡叙浦潭陽隔楚山離樽不用起愁顔王昌齡南浦逢君嶺外還沅溪更逺洞庭山同上沅水羅紋海燕回栁條牽恨到荆臺定知行路春愁裏故郢城邉見落梅李羣玉送客本朝熈寧七年收復兼得唐錦􅅄二州地置沅州治盧陽縣今鎮江鋪乃龍標縣龍門鋪乃唐龍同縣以辰州麻陽縣來屬先是端拱三年復置招諭縣屬辰州至是亦屬焉八年省入麻陽今錦州寨乃唐錦州元豐三年升黔江城為黔陽縣來屬沿革表草暖聞鳴鹿江清對飲猿何時一樽酒}
