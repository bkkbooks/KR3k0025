  - {type: variant, offset: 1878, length: 0, content: '', WYG: 府倚郭一外縣三安陸雲夣應城孝感安逺軍節度郡號安陸環岳安逺鄖州安州府沿革翼軫分野禹貢荆州之域春秋鄖國楚滅之戰國楚地秦屬南郡漢髙帝分置江夏郡三國初屬魏中屬吳後又屬魏宋分置安陸郡梁置南司州尋廢西魏置安州總管府周置鄖州及安陸郡隋廢郡為安州大業復安陸郡唐武德改安州後為大督都府屬淮南道天寶曰安陸郡貞元為奉義軍節度後罷後唐升安逺軍本朝升府地理沿革表縣沿革安陸縣屬漢江夏郡晉為郡治宋安陸郡梁南司州西魏安州隋安陸郡唐安州皆治此雲夣本漢江夏郡治西陵縣西魏置雲夣縣屬城陽郡隋為安陵郡應城本漢江夏郡雲杜縣地西魏置應城縣屬陽城郡隋大業改應陽屬安陸郡唐武德復故名屬安陸州省入雲夣大和復置天祐復改應陽後唐復曰應城孝感本漢安陸縣地宋置孝昌縣屬江夏郡梁置永陽縣及應州西魏置岳州及岳山郡後周並省隋開皇廢郡梁置永陽以孝昌屬安州永陽為吉陽唐武德置環州及澴陽縣州廢省澴陽入孝昌來屬寳應屬沔州又歸安州元和省孝昌入雲夣省吉陽入應山後皆復置後唐改孝昌為孝感本朝省吉陽入焉地理沿革表形勝鐵城山}
