  - {type: variant, offset: 2088, length: 4, content: 臧詩十月, WYG: 特秋悲冬亦悲闕熊繹舊城空竹叢同上歸州闕山窮林薄不肥沃生爾闕穹廬天萬里漢宫無色闕復州倚郭一外縣一景陵玉沙郡號竟陵建興江沙景陵州沿革翼軫鶉尾}
