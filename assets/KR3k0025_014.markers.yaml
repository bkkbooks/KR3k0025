  - {type: variant, offset: 28, length: 0, content: '', WYG: 南郡又分置南平郡梁元帝都此西魏以封後梁置江陵總管府陳置荆州於公安隋大業為南郡唐武德為荆州貞觀屬山南道為督都府天寶江陵郡上元升府貞元為荆南節度五代髙季梁據之本朝為江陵府江陵郡地理沿革表縣沿革江陵本秦南郡之臨江縣漢景帝改江陵為郡治又置郢縣東漢省郢入江陵西魏屬江陵總管府周因之隋為荆州治唐為江陵府治公安本漢武陵郡之孱陵縣蜀先主名}
