  - {type: variant, offset: 2087, length: 0, content: '', WYG: 得山有屈原宅若道巫山女麤醜何得上有昭君村羣山萬壑赴荆門生長明妃尚有村一去紫臺連朔漠獨留青􅊘向黄昏並同上巫女廟花紅似粉昭君村柳翠於眉白居易巫山暮足霑花雨楚水春多逆浪風同上本朝開寶歸州直𨽻京師咸平屬湖北建炎屬䕫路紹興復故尋又屬䕫路淳熈復故闕熈寧闕年闕興闕屬秭歸元祐復置沿革表晩日寒天過秭歸闕况經宋玉悲秋處}
