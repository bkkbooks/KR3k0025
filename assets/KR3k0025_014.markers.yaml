  - {type: variant, offset: 1752, length: 1, content: 荊, WYG: 唐李善注文選子李邕為北海太守號李北海李鄘邕之從孫吐突承璀薦之引疾辭位元結製大唐中興頌皇朝馮京進士第一人李宗孟年十一召試兩掖陳卓有田五千而兄之田止一千願合戸而同之輿地紀勝集乘鄂渚而反顧兮款秋冬之緒風楚辭過夏首而西浮兮顧龍門而不見同上浮鄂渚而駕言背夏首以窘逝陸雲賦落㠶黄鵠之浦藏船鸚鵡之洲庾信賦我且為君搥碎黄鶴樓君亦為吾𢷬却鸚鵡洲赤壁爭雄如夣裏且須歌舞寛離愁李白路指鳯凰山北雲衣霑鸚鵡洲邊雨岑參江邉黄鶴古時樓勞置華筵待我遊楚思蒼茫雲水冷商音清脆管絃秋白花浪濺頭陀寺紅葉林籠鸚鵡洲總是平生未行處醉來堪賞醒堪愁白居易本朝開寳八年改臨江縣為崇陽縣景德四年改永安縣為咸寧縣熙寜五年升通城鎮為縣元豐八年屬岳州元祐七年来屬紹興五年廢為鎮十七年復置嘉定十五年升武昌縣為夀昌軍紹定復為縣屬鄂州沿革表孤烟漢川樹長笛武昌人劉摯鶴樓試望晴霞斷鸚渚行吟緑蕙香梅詢鸚洲有客弔芳草黄鶴無人吹落梅劉奉世但見石城多草木定知江夏乆興亡張舜民黄鶴樓鸚鵡洲碧水欲合天自浮芳草無情春亦秋禰衡白骨瘞何處曹王舊曲無人收郭祚正常德府倚郭一外縣三武陵桃源龍陽沅江常德軍節度湖北提刑司提舉司郡號武陵鼎水桃源臨沅黔中府沿革翼軫鶉尾之次禹貢荆州之域春秋屬楚戰國楚黔中地秦黔中郡漢髙帝改武陵郡三國初入蜀後入吳梁置武州後改沅州隋廢郡改朗州大業復武陵郡唐武德曰朗州天寶曰武陵郡屬江南道後周升武平軍本朝改鼎州地理沿革表縣沿革武陵漢武陵郡索臨沅二縣以索為郡治東漢臨沅為郡治陽嘉更索曰漢夀為荆}
