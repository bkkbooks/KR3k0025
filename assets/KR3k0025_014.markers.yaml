  - {type: variant, offset: 2045, length: 2, content: 鳴鳳, WYG: 縣屬睦州貞觀來屬天寳日省入長陽五代髙氏復置巴山縣本朝省之宜都本秦南郡夷道縣屬宜都郡治此宋析宜道置宜昌縣屬宜都郡陳析置宜都縣屬南荆州隋開皇廢郡省宜都入宜昌屬江陵府大業夷道屬夷陵郡唐武德改宜昌曰宜都以二縣置江州六年曰東松州貞觀州廢省宜道入宜都屬峽州長陽本漢武陵郡佷山縣東漢屬南郡蜀吳以後皆屬宜都郡晉太康改興山後復故梁屬宜州西魏屬拓州陳屬南荆州又置鹽水縣及亭州隋開皇改長陽縣屬江陵府九年置睦州尋廢又改亭州為庸州又廢為清江郡後郡徙而省鹽水唐武德復置睦州并鹽水八年州廢省鹽水入長陽屬東松州貞觀州廢來屬逺安本漢臨沮縣地東晉沮陽地義熈分置髙安縣及汶陽郡後周改髙安曰逺安隋廢郡屬峽州地理沿革表形勝丹山在逺安縣清江在宜都縣龍角山在長陽羊腸山在宜都虎牙山在夷陵狼尾灘在蜀江羊門山在宜都鹿溪山在逺安黄牛峽白狗峽在夷陵金龍洞在逺安鬼谷子隱處西陵峽在夷陵三峽之一也松門山蘭亭洞皆在逺安荆門山在宜都桃李洞在逺安隂陽石在長陽見雨晴類琮峥谷在夷陵並輿地紀勝人物五代李景威死節南平太祖稱其忠臣厚䘏其家皇朝何參}
