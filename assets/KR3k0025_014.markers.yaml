  - {type: variant, offset: 1879, length: 0, content: '', WYG: 柱山在府北石梁山在府西北石岩山在府南石牛潭金龍澗在府西北四望山九堫山八境岩在孝感縣紫金山在府西北碧玉亭在府南珍珠坡在雲夣縣輿地紀勝人物楚鬬榖於菟即令尹子文東漢黄香號江夏黄童子黄瓊為太尉黄琬瓊之孫對日事見日食類唐許紹與唐髙祖同學皇朝鄭獬魁多士宋庠宋祁寓居安陸文學冠世天下謂之二宋王德臣有註和杜詩及塵史郭贊為上蔡令金人入不屈死輿地紀勝集遥送扁舟安陸郡天邉何處穆陵關王昌齡還把餘杯重相勸不堪秋草背鄖城羅隠暮雨不知溳口處春風只到穆陵西劉文房本朝宣和元年以神宗潛藩升徳安府開寶二年省吉陽縣入孝感熈寧二年省雲夣縣入安陸元祐復置沿革表安陸號方鎮江邉無事州范雍鄖川夣澤地古迹堪詞求白兆桃花岩翰林棲此丘同上紫金髙處是鰲頭獨負華堂幾百秋形勢平吞北夢澤規模雄峙南司州李楫白兆山光相掩映紫金氣象轉深幽同上樓在浮雲縹緲間浮雲破處見朱欄山光對入鄖城紫溪影横飛夣澤寒鄭獬咏浮雲樓荆湖北路岳州倚郭一外縣三巴陵華容平江臨湘岳陽軍節度郡號巴陵巴川岳陽華容羅水洞庭州沿革楚分翼軫之次禹貢荆州之域三苖之地春秋戰國屬楚秦以後屬長沙郡三國初入蜀後歸吳晉元康置建昌郡咸康省之宋元嘉置巴陵郡梁兼置巴州隋廢郡改岳州大業改羅州後為巴陵郡唐武德巴州六年改岳州天寶}
