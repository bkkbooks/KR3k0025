  - {type: variant, offset: 1876, length: 0, content: '', WYG: 建隆削武平軍額大中祥符改鼎州政和升常德軍額隆興升府乾德元年析武陵置桃源縣復以橋江為沅江縣屬岳州後改𨽻常德沿革表武陵控扼五溪猺路入京城萬國朝石櫃雄排沅水勢浮圗髙聳接雲霄丹砂井湧三泉脉玉帶河横六畫橋楊川曲臺風月德山雲夣想中間今幾春臣葬江魚終愛楚民逃花洞不思秦陶弼鎖斷桃源一窟春避秦日月無歸處徐東野花片已随山下水雲層虛鎖洞中春}
