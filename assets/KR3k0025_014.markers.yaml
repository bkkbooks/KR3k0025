  - {type: variant, offset: 2042, length: 0, content: '', WYG: 外縣三夷陵宜都長陽逺安郡號夷陵西陵三峽夷山夷都州沿革鶉尾之次禹貢荆州之域春秋戰國屬楚秦漢屬南郡魏分置臨江郡蜀改宜都郡吳以後因之梁兼置宜州西魏改拓州後周改硤州隋大業為夷陵郡唐武德改峽州自下牢戍徙治步闡壘天寳曰夷陵郡屬山南道五代髙季興有其地地理沿革表縣沿革夷陵屬秦南郡漢為都尉治東漢建中屬新城郡魏為臨江郡治蜀宜都郡吳改曰西陵為重鎮晉太康復曰夷陵為宜都郡治梁宜州西魏拓州周硤州皆治焉隋置郡又分長陽置巴山縣屬}
