  - {type: variant, offset: 1880, length: 2, content: 權者, WYG: 巴陵郡五代入楚馬氏地理沿革表縣沿革巴陵本漢長沙郡下雋縣地晉太康置巴陵縣宋置巴陵郡治梁為巴州治隋為巴陵郡治華容本漢武陵郡孱陵縣地晉武置南安縣屬南平郡隋改華容縣屬岳州唐垂拱改容城神龍復故平江本漢長沙郡羅縣地東漢置漢昌縣吳改曰吳昌隋省入羅縣屬巴陵郡唐省羅入湘隂神龍分湘隂置昌江縣屬岳州後唐改今名臨湘本晉巴陵縣之王朝塲本朝置縣地理沿革表形勝君山在洞庭湖中帝之二女居之曰湘君湘夫人湘水至清雖深見底洞庭湖詳見湖類雲夣澤雲在江北夣在江南紫閣山見杜牧詩赤亭湖在華容縣玉笥山在湘隂屈原於此九歌詞金船洞在平江岳陽樓下瞰洞庭洞庭山即君山也幕阜山在平江為第二十五小洞天道岩山梅仙山仙郎洞仙女岩皆在平江石龍洞在臨湘界中玉猴山在華容界昌江山在平江境仙人艾君居之有石壇芙蓉池金線洞飛仙石温泉山有别出山凡五曰天岳天柱雷臺雷公幕府輿地紀勝人物唐以來隱君子鄭田二劉山人嵇處士劉長卿李頻王昌齡鄭谷自劉長卿以下各有詩篇傳世黄誥登熈寧第李平西登元符第靖康中}
