  - {type: variant, offset: 95, length: 1, content: 侯, WYG: 公虬曰此兒必興吾宗庾曼倩早有令譽庾域小有名梁文帝美其才曰荆南杞梓唐俞文俊武后時新豐山移文俊上書言女主居陽位故山變為災后怒流嶺南皇朝李堯言李立言李竦同時致仕號挂冠三李朱昻朱協兄弟致仕賜宴玉津園號渚宫二䟽唐介為御史論事不屈孫偉自號七澤老漁樂京熈寧中不肯行助役法弃官而去輿地紀勝集江村竹樹多於草山路塵埃半是雲姚合東彌夏首濶西拒􅍮門壯張九齡府中丞相閣江上使君灘孟浩然此府雄且沃驕凌盡戈矛韓詩江陵城西三月尾花不見桃惟見李同上漢水照天碧楚山挿雲青江陵珠比橘宜陽酒似餳白居易簾幕青山巫峡雨烟開碧樹渚宫秋武元衡江陵道途逺楚俗雲水青元微}
