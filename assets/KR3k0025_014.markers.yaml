  - {type: variant, offset: 2165, length: 0, content: '', WYG: 陽五華山在竟陵東採桑村撒花臺皆在竟陵白鷺湖在玉沙白螺在竟陵大隠林小隱林在沔陽輿地紀勝人物唐陸羽號竟陵子皇朝張徽能詩有滄浪集弟張徵七持使節八部郡府張嘉言為學諭敵犯景陵郡不屈自沉于水同室六人俱死輿地紀勝集羡爾優游正少年竟陵烟月佀吳天車螯近岸無妨取舴艋随風不費牽處處路傍千頃稻家家門外一渠蓮皮日休送弟千羡萬羡西江水曽見竟陵城下來陸羽本朝熈寧六年廢復州以景陵縣屬安州元祐復置州治景陵乾德二年置玉沙縣屬江陵至道來屬寶元省沔陽入玉沙熈寧州廢省縣為鎮入江陵監利縣元祐復玉沙縣屬江陵尋又來屬沿革表西風嫋嫋木颼颼身在江湖北岸州自古楚人詞最好為君重賦竟陵秋張耒水際疑逢陸文學草間恐有鬬於菟趙綱立雲夣澤南古竟陵登臨聚景在幽亭幾重湛湛波湖緑萬疊隂隂桑柘青唐恪漢陽軍倚郭一外縣一漢陽漢川郡號沔陽漢津古沔軍沿革翼軫分野禹貢荆州之域春秋屬鄖楚取之秦屬南郡漢屬江夏郡三國初屬魏後屬吳梁屬沔陽郡後周屬復州隋屬沔陽郡置沔州天寶曰漢陽郡建中廢之尋復寶厯又廢地屬岳州後周置漢陽軍地理沿革表縣沿革漢陽本漢安陸縣地漢末三國沔口縣地東晉置沌縣陳省之隋開皇置漢津縣屬復州大業改今名唐初置沔州後廢屬鄂州後周置軍治此漢川本安陸縣地梁置梁安縣西魏改魏安尋改􅆜川周改甑山隋屬沔陽郡後廢甑山唐武德析漢陽置􅆜川縣屬沔州後屬鄂州後周屬安州本朝來屬地理沿革表形勝却月城在縣北三里却月湖在漢川鳯栖山在軍治北雞鳴鎮在漢川西仙濳山一名九真山又名五嵗山大小别山小軍山皆在漢陽梁城山在郡治東北一名魯山石潭山在漢陽桃花洞在鍾秀門外菖蒲洞在漢陽輿地紀勝集漢陽抱青山飛樓映㐮渚白雲蔽黄鶴緑樹藏鸚鵡崔羣玉南湖秋月白王宰夜相邀錦帳郎官醉羅衣舞女嬌李白漢陽渡口蘭為舟漢陽城下多酒樓羅隱本朝熈寧四年廢漢陽軍以縣屬鄂州元祐復置太平興國二年改􅆜川縣為漢川來屬熈寜廢為鎮元祐復置沿革表西來漢水接江流大别山邉舊沔州春到夕陽無盡興一行飛鷺下汀洲林邵郎官湖上郎官遊只都閒客}
