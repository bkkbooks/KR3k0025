  - {type: variant, offset: 2082, length: 0, content: '', krp: 過一生䰟夣拍潺湲同上鹿角真走險狼頭如䟦胡杜甫白狗斜臨宂黄牛更在東逺山朝白帝深水謁夷陵並同上萬丈赤幢潭底}
  - {type: variant, offset: 2083, length: 0, content: '', WYG: 一條白練峽中天白居易神女臺雲閒繚繞使君灘水急潺湲上有萬仭山下有千丈水蒼蒼兩崖間闊狹容一葦並同上兩崖開盡水回環一葉纔過石罅間楚客莫言山勢險世人心更險於山雍陶本朝開寶以峽州𨽻京師咸平中屬湖北路開寶八年省巴山縣入夷陵為巴山寨沿革表未臈梅先發經霜葉不凋歐陽公時節同荆俗民風載楚謡西陵山水天下佳愁烟苦霧少芳菲野卉蠻花鬬紅紫醉裏人歸芳草渡夣中船下武牙灘並同上江水逺流千古恨峽雲長作四時容房與之楓落楚江寒岸静月髙巫峽夜猿哀秦惟肖三遺洞裏尋遺跡坐喜亭前足雅歌洪邁歸州倚郭一外縣二秭歸巴東興山郡號巴東秭歸建平䕫國州沿革翼軫分野禹貢荆州之域春秋䕫子國楚滅之秦漢屬南郡三國先入蜀後歸吳永安屬建平郡晉屬荆州齊屬巴州梁屬信州後周置秭歸郡隋開皇初郡廢縣仍曰秭歸屬信州唐武德分䕫置歸州天寳曰巴東郡屬山南東道五代地入南平髙氏地理沿革表縣沿革秭歸屬漢南郡吳屬建平郡後周置秭歸郡改縣曰長寧隋廢為秭歸縣屬信州唐為歸州治巴東本漢巫縣地宋置歸鄉縣屬建平郡梁置信陵郡後周廢郡改歸鄉曰樂鄉隋改巴東屬信州唐武德來屬興山本秭歸縣地吳置興山縣屬建平郡宋省之周武帝置髙陽縣宣帝省之唐武德析秭歸復置興山屬歸州地理沿革表形勝四通山在興山有四徑可上三遊洞即龍昌洞蔣槩彭德純周茂叔同遊得名三閭山屈原所居八學士山在秭歸桐木山在巴東蓮花灘棗子林在秭歸竒石山在興山破石山滑石灘在秭歸雞籠山在巴東龍湫洞在秭歸螺玉山螺金山在巴東縣北金字山在巴東玉虛洞在興山朱雀山在秭歸青羊溪在巴東輿地紀勝人物楚屈原忠}
