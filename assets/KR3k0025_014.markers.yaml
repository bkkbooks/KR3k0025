  - {type: variant, offset: 1885, length: 0, content: '', WYG: 楚殺白公晉車武子聚螢讀書唐李羣玉放懷丘壑吟詠性情輿地紀勝集望涔陽兮極浦楚辭遺余珮兮澧浦同上秋原被蘭葉春渚漲桃花劉禹錫芳意悵摇落蘭芷謝汀洲李羣玉濡毫亂寫湘江月同上本朝忠以申鳴著學有車公優外挹蘭江水下俯仙明洲讀書謂羣玉探藥思浮丘况得子厚語謂冠南漢州樓鑰沅州倚郭一外縣二盧陽麻陽黔陽郡號潭陽黔陽龍標沅陵州沿革鶉尾楚分禹貢荆州之域春秋戰國楚地秦黔中郡地漢以後武陵郡地梁陳屬沅陵郡隋屬辰州唐貞觀以辰之龍標縣置巫州天授改沅州開元復曰巫州天寳曰潭陽郡大厯改叙州衰沒于溪峒地理沿革表縣沿革盧陽本漢武陵郡無陽縣晉置舞陽縣宋省之梁闕州唐垂拱析麻陽縣地置龍門縣屬辰州先天析龍標置潭陽縣屬叙州並廢本朝置盧陽縣屬沅州麻陽唐武德分沅溪辰溪初置屬辰州又}
