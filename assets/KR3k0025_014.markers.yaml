  - {type: variant, offset: 97, length: 120, content: 師也見君之老馬棄之曰少盡其力老而棄之非也於是收贖而養之史記犬馬有勞於人尚加帷蓋之報前漢陳湯傳經獺祭魚豺祭獸鷹祭鳥記月令今是大鳥獸則失喪其群匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢䠱焉踟躕焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之, WYG: 楚地八千里槃桓此都㑹巍峩數里城逺水相映帶李白本朝淳熈元年改荆南府尋復改江陵府乾德}
