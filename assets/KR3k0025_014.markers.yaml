  - {type: variant, offset: 1883, length: 0, content: '', WYG: 李綱奏守禦之策輿地紀勝集三湘淪洞庭七澤藹荆牧顔延之清晨登巴陵周覧無不極李白山青滅逺樹水緑無寒烟風清長沙浦霜空雲夣田帝子瀟湘去不還空餘秋草洞庭間淡掃明湖開玉鏡丹青畫出是君山樓觀岳陽盡川迴洞庭開鴈引愁心去山啣好月來並同上西泛平湖盡差參入亂山東瞻岳陽郡汗漫太虗間張説江國踰千里山城近百層杜詩雲夢夕陽愁裏色洞庭春浪坐來聲崔櫓夜䌫洞庭舟叢芮纔可傍明登岳陽樓輝焕朝日亮韓詩湖光秋色兩相和潭靣無風鏡未磨遥望洞庭山木翠白銀盤裏一青螺劉禹錫本朝宣和二年升岳陽軍額紹興二十五年改純州華容軍三十一年復舊淳化四年升王朝塲為王朝縣至道改臨湘縣沿革表欹枕夜聽瀟湘雨扶笻秋望洞庭山吕䝉正滿川風月獨凭欄綰結湘娥十二鬟可惜不當湖水靣銀山堆裏看青山山谷一境并吞雲夣國四時閒澹洞庭天彭浚明萬里山川寛眼界兩湖風月送天涯范宗澧州倚郭一外縣三澧陽安鄉石門慈利郡號澧陽澧水澧陵澹澧松門石門州沿革翼軫鶉尾之次禹貢荆州之域春秋戰國屬楚秦屬黔中郡漢屬武陵郡吳孫休置天門郡晉安帝僑置南義陽郡隋廢郡置松州尋改澧州大業為澧陽郡唐屬江南道五代地入楚馬氏地理沿革表縣沿革澧陽本漢武陵郡零陽縣地晉太康分置澧陽縣屬天門郡宋省之隋復置為郡治安鄉本漢武陵郡孱陵縣地東漢分置作唐縣亦漢夀縣地晉置南平郡治作唐宋置義陽郡隋改作唐為孱陵又置安鄉縣並屬澧州唐貞觀省孱陵入安鄉石門本漢零陽縣地吳置天門郡隋廢郡置石門縣慈利本漢零陽縣吳又置漊中縣晉置天門郡治零陽後省漊中南朝又省零陽周置衡州隋開皇復置零陽後改慈利又於衡州置崇義縣改衡州曰崇州大業州廢唐二縣屬澧州麟德省崇義入慈利地理沿革表形勝澧水在澧陽縣南崇山即放驩兠之所兼泉在大同山湯泉在慈利有三處獨浮山在澧陽浮丘子修道於此層步山在石門雷山洞在慈利張宗洞之側仙女洞在石門紫和山之陽鴛鴦浦在慈利鸜鵒湖在澧陽天門山一名嵩梁山在慈利有六十峰石桂城在慈利黄石山在石門赤崖山赤松城白公城皆在慈利輿地紀勝人}
