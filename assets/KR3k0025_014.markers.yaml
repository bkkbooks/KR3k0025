  - {type: variant, offset: 769, length: 978, content: 書石勒傳傳記驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥於是俛而噴仰而鳴聲達於天若出金石者何也彼見伯樂之知己也戰國策互見受知齊廣寧王孝珩嘗蓄一犬守外人不得趣近孝珩每射令其取箭亦解呼召左右牽衣而進三國典略蜂有兩衙應潮稗雅亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也論衡鄭子陽之難猘狗潰之齊高固之難失牛潰之當其時狗牛猶可以為人唱呂氏春秋陸機犬名曰黃耳機往仕洛常將自隨此犬黠慧能解又嘗借人三百里外犬識路自還一日至家機羈宦京師久無家問機戲語犬曰我家絕無書信汝能齎書馳還取消息不犬喜搖尾作聲應之機試為書盛於竹筒繫之犬頸犬出驛路疾走向吳飢入草噬肉取飽每經大水輒依渡者弭耳掉尾其人憐愛因呼上船載近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作荅內竹筒中復繫其犬頸犬既得荅仍馳還洛計人程五旬而犬往還裁半述異記會稽人張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍盪奴奴失刀信然取刀殺奴也續搜神記苻堅為慕容沖所襲堅馳馬墮澗追兵幾及計無由出馬踟躕臨澗垂鞚與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江異苑鵲知太歲之所在燕作巢知戊己說文鄧芝射中猿母其子以葉塞瘡華陽國志集疲馬戀君軒選樂府東武吟互見歸向師曠奏清徵之音而玄鵠下舞謝靈運擬詩注混雞犬以亂放各識家而競入西征賦蜂蠆螗蜋頗亦自負杜牧之集攘螗臂而戰蝸角唐文粹本朝可憐蝸角能多少獨與區區觸事爭臨川集物有自得天理者如蜂蟻知衛其君豺獺知祭禮鳴道集豺獺祭天葵藿向陽蜂蟻之有君臣喬梓之有父子同上黃蜂衙退海潮上白蟻戰酣山雨來談苑子千鈞之重加銖兩而移家語屈節解管仲隰朋從桓公伐孤竹春往冬返迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水以管仲隰朋之智至其所不知不難師於老馬與蟻今人不知以其愚心而師聖人之智不亦過乎韓非子齊興兵伐楚子發將師以當之兵三卻楚賢良大夫皆盡其計而悉其誠齊師愈強於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明日又復往取其枕子發又使人歸之明日又復往取其簪子發又使歸之齊帥聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去故曰無細而能薄在人君用之耳淮南子道應訓史猶塵加岱嶽霧集淮海雖未有益不為損也後漢楊倫傳陶侃為, WYG: 孟嘉}
