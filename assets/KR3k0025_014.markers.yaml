  - {type: variant, offset: 2093, length: 7, content: 交子田父晨出夜, WYG: 次禹貢荆州之域春秋戰國楚地秦屬南郡漢屬江夏郡三國初屬魏闕晉元康分置竟陵郡南齊分置遂安左郡梁又置沔陽郡改遂安左郡為建安西魏改光川郡置郢州後周改復州隋開皇廢郡為復州大業改沔州又改沔陽郡唐武徳為復州貞觀屬山南道天寶為竟陵郡後梁升武威軍地理沿革表縣沿革景陵本漢江夏郡竟陵縣晉元康置竟陵郡治霄城縣竟陵屬焉南齊以霄城屬遂安左郡梁省竟陵以霄城屬建安郡西魏屬光川郡周改霄城為竟陵屬復州隋開皇為復州治仁夀徙治建興唐初為州治貞觀徙治沔陽後梁為州晉天福改縣曰景陵玉沙本漢江夏郡雲杜縣晉元康屬竟陵郡梁分置沔陽縣及郡西魏改沔陽曰建興廢雲杜縣隋大業改建興曰沔陽徙沔陽郡治焉唐武德屬復州貞觀為州治後梁徙治竟陵以為屬邑本朝置玉沙縣省沔陽}
