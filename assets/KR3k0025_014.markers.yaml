  - {type: variant, offset: 29, length: 5, content: 食田鼠也迎, WYG: 地曰公安晉屬南平郡又置江安縣南朝改江安為公安陳於此置荆州隋省孱陵入公安屬南郡别置孱縣屬澧州唐為江陵府公安縣潛江本漢江陵縣地本朝析置監利本漢南郡華容縣吳置監利縣尋省之晉太康復置屬巴陵郡懷帝屬成都郡又増置豐都縣愍帝省豐都入監利仍屬南郡宋屬巴陵郡隋屬沔陽郡唐屬復州後梁屬江陵府松滋本漢南郡髙城縣地東漢省之晉於此僑立松滋縣南朝並屬河南東郡隋廢郡屬荆州唐屬江陵府枝江屬漢南郡魏屬臨江郡吳以後屬南郡唐屬江陵府上元分置長寜縣尋省枝江入焉大厯復置枝江而省長寧入焉石首本漢華容縣地晉置石首縣南朝省之唐武德復置屬荆州地理沿革表形勝龍山在江陵孟嘉登髙吹㡌處}
