  - {type: variant, offset: 3480, length: 3, content: 值遇相, WYG: 與出躄浮圖以為師中廏病顙駒顙之病亦自十年不得齒他馬食斥棄異皁凡廏之馬無肯為伍今刺史來涖吾邦將至無以為乗於是衆牽駒上燥土大廡下浴剔蚤鬋刮惡除殘莝以雕胡秣以香萁御夫盡飾然後敢持豈不曰宜乎今先生來吾州亦十年曽不若躄足涎顙之猶有遭也興}
