  - {type: variant, offset: 2362, length: 1070, content: 晉伯宗曰雖鞭之長不及馬腹左宣十五晉侯疾秦伯使醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也左成十互入疾病飄風之末不能舉鴻毛國語彊弩之極矢不能穿魯縞衝風之末不能漂鴻毛非初不勁末力衰也史韓安國傳死病無良醫通鑑周紀昔伊摯在夏呂望在商而二國不治豈伊呂之不欲哉勢不可也同上覆水不收東漢光武紀蓋萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也通鑑漢桓紀徐稺曰夫大木將顛非一繩所維通鑑漢桓紀隄防穿漏萬夫同力不能復救通鑑漢孝紀若河決金堤火炎崑崗雖神禹之乘四載玄冥之洒八瀛亦不能堙洪濤而撲烈焰者何也良以勢既壞而不能遽救也唐史臣代宗贊傳記騏驥盛壯之時一日而馳千里至其衰也駑馬先之戰國策互入事必有極猶渴而穿井臨難而鑄兵雖疾從而不及也說苑雜言篇互入遠水不救近火尺水不能卻蕭丘之熱意林集孰江河之可涸楚辭譬猶疾疢彌年而欲一丸銷之選詩集序沈寒凝海不能結風烈火流金不能焚景選連珠鞭長不及馬腹風末不舉鴻毛朱敬則宋武論譬如心中疾箴石非所砭韓文獵客張兔置不能挂龍虎李太白集短線無長縫月中有桂樹無翼難上天海底有驪珠下隔萬丈淵並唐文粹轆轤無繩井百尺盧仝詩索過風於前林求往夢於既寤不可及也穆玄同德寺會集序本朝疾風無末勢陳後山子譬猶好聲色而無耳目也荀王伯臨河羡魚而無網罟枹朴子釋滯篇傳記猶鴻鵠之無羽翼也雖有千里之望不能致其意之所欲至說苑尊賢集潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲謝玄暉首燕徒有心局步何由騁梁劉孝綽詩我欲橫天無羽翰孟東野時危思報主衰謝不能休致君時已晚懷古意空存並杜詩喑人食太牢信知其味而不能形於言劉賓客虛逢好陽艷其柰苦昏懜元微之互入事與願違遙看雲路心空在同上本朝巧舞苦短袖東坡詩子莊周貧往貸粟於監河侯侯曰諾我將得邑金貸子三百金可乎莊周忿然作色對曰昨來有中道而呼者周顧視車轍中有鮒魚周曰激西江之水而迎子可乎莊子外物失火而取水於海水雖多火必不滅矣遠水不救近火也韓非子焦喉之渴遙指滄海指冰室不能起暍死之熱望炎治不能止噤凍之寒大廈既燔而運水於滄海此無及也並枹朴子穿井而救火則熛颺棟焚矣鑿舟而拯溺則葬江魚之腹中矣劉子史周詩曰俟河之清人壽幾何左襄八及溺呼舡吳志譬如火發於家安能俟遠水乎通鑑唐昭宗傳記猶渴而穿井臨難而後鑄兵雖疾從而不及也說苑雜言篇互入力所不及集桃實千年非易待駱賓王本朝不應遠水救近渴陳後山集獵人箭底求傷鴈釣戶竿頭乞活魚王建本朝刮毛龜背上何時得成氈枯松強鑽膏槁竹欲瀝汁並東坡詩子泉涸魚相與處於陸相呴以濕相濡以沫莊子大宗師假榖於夷齊之門告寒於黔婁之家所得者不過橡栗縕褐必無太牢狐裘矣抱朴子祛惑史自, WYG: ''}
