  - {type: variant, offset: 5415, length: 871, content: 國載記集計窮然後賽後賽竟何恩元稹集臨老抱佛腳教妻讀黃經唐文粹史遼東有豕生子白頭異而獻之至河東見群豕皆白懷慚而還若以子之功論於朝廷則為遼東豕也後漢朱浮傳互入聞見淺狹集楚翠丹質在荊南以多慚遼豕白頭望河東而載恧劉賓客集本朝雕琢肝脾欲報公還如獻豕過遼東僧參廖子詩子孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文飾而舞容璣及文馬四十以遺魯君魯君觀之終日怠於政事三日不聽國政孔子遂行家語以瓦摳者巧以黃金摳者惛列子黃帝篇以瓦注者巧以金注者惛莊子達生有情於譽飽雖蒙惠而非德無情於傷辱雖獲毀而無憾劉子去情劉棻從楊雄學奇字雄不知情顏師古曰古文之異者不知獻符命之事也棻乃劉歆之子初莽以符命自立即位之後欲絕其原以神前事棻復獻之投棻四裔西漢楊雄傳李廣見草中石以為虎而射之中石沒矢視之石也它日射之終不能入西漢李廣傳蔡裔有勇氣聲若雷震嘗有三盜入室裔拊床一呼而盜俱殞晉書互入敢勇鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚愕出於意外故也晉書傳記楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無跡韓詩外傳園中有水其端有蟬蟬悲鳴飲露不知螳蜋在其後曲跗欲取其蟬而螳蜋不知黃雀在其後延頸欲啄之然黃雀又不知臣操彈圓在其下皆務前不顧後患劉向說苑互入貪迷本朝人能碎千金之璧而不能無失聲於破釜能摶猛虎而不能無變色於蜂蠆東坡黠鼠賦泰山覆於前而色不變麋鹿興於左而目不瞬老泉子投鉤分財投策分馬得美者不知所以德慎子媒揚譽人而受譽者不以為德臣虜強飯而蒙飽者不以為惠劉子去情篇集若自有聲名又託形勢此乃市道之事又何足貴乎韓文薦侯喜狀見危者已墜而欲援觀鬥者將死而方救皮日休互入市恩本朝譬如傭力之人計工而受直雖與之千萬豈知德其主哉老泉文子吾不見震風之能動聾聵也揚問明史太子仁孝謹靜張垍高力士常保護於上前故林甫終不能間也通鑑唐元宗楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至國忠之言不能入矣通鑑唐元宗集烝不能潤灼不能熱杜牧之春花與秋月不感無情人白侍郎臣有大拙智所不化醫所不攻威不能遷寬不能容柳乞巧文本朝衝風震河海不能號無竅東坡互入無所用力鑽灼不燃誰似我東坡詩, WYG: ''}
