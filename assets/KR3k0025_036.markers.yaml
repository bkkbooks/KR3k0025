  - {type: variant, offset: 4800, length: 399, content: 謝元以八萬當苻堅百萬之眾其勢不敵若苻堅逼肥水而陳必保萬全惟麾軍卻退眾亂不能止故敗世謂謝元能走苻堅者此耳孔氏雜說集虎見驢鳴大駭然往來視之覺無異能益習其聲稍近驢怒蹄之虎曰技止此耳因斷其喉盡其肉乃去噫形之厖也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫柳子厚黔之驢本朝譬如一物十焉吾舉其一而人不知吾之不知其九也歷數之至於九而不知其一不如舉一之不可測也而況乎不至於九也老蘇集互入巧反成拙經既輸爾載將伯助予詩正月注言國危而求賢者已晚矣將恐將懼惟予與女將安將樂女轉棄予將恐將懼寘予于懷將安將樂棄予如遺幽小雅谷風史越子使后庸來聘且言邾田封于駘上欲使魯還邾田封竟至駘上盟于平陽三子皆從季康子叔孫文子孟武伯皆從后庸盟康子恥從蠻夷盟言及子贛思子贛曰若在此吾不及此夫不及與越盟武伯曰然何不召曰固將召之文子曰他日請念言季孫不能用子貢臨難而思之左哀二十七互入因事思人公曰吾不能早用子今急而求子是寡人之過也左僖, WYG: 纂淵海卷}
