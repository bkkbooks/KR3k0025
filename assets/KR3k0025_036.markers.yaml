  - {type: variant, offset: 2005, length: 356, content: 毛詩成事不說遂事不諫既往不咎論語子目之明能見於百步之外而不見其背帷墻之外則無睹也子華子萬室之國一人陶則可乎孟告子下猶七年之病求三年之艾也孟子世固非一毛之所濟列子楊朱篇古人目短於自見故以鑑觀面韓非子瞽者無以與乎文章之觀聾者無以與乎鍾磬之聲莊子逍遙遊盲者無以與乎眉目顏色之好瞽者無以與乎青黃黼黻之觀莊大宗師離朱之明察毫末於百步之外下水尺不能見淺深非目不明其勢難覩也慎子朝露之繭工女不能治淄澠之沙計兒不能數魯連子躄者見虎不走非勇也淮南子離朱之明察毫末於百步之外不能見淵中之魚師曠之聰合八風之調而不能聽十里之外淮南子訓道論故君子能為善而不能必其得福不忍為非而未能必免其禍淮南子繆稱訓瞽曠能默瞽曠不能齊不齊之耳狄牙能喊呼覽切狄牙不能齊不齊之口楊問神歐治不能鑄鈆錫為干將抱朴子阿膠三寸不足止黃河之濁毀箄三尺不足救鹽池之鹹傅子, WYG: 左傳}
