  - {type: variant, offset: 1039, length: 0, content: '', WYG: 義陽成王望字子初時魏髙貴鄉公好才愛士望與裴秀王沉鍾㑹並見親待公性急秀等居内職急有召便至以望外官特置追風車一乗毎有宴集望奔馳而至魏書太宗召馬周未至間遣使者四輩敦趨唐書集鶴書赴隴北山移文束帛旅于丘園旌命交乎途巷選辨亡論鳳凰初下紫泥詔謁帝稱觴登御筵謬忝燕臺詔叨陪郭隗蹤骯髒辭故國昻藏入君門李白風雲入壯懐泉石别幽耳濯纓起江湖韓集除書忽到門冠帶便拘束愧忝郎署迹謬蒙君子錄俯仰垂華纓飄風翔輕轂韋應物本朝還朝似夢中雙闕眩金碧復穿鵷鷺行強寄麋鹿迹還朝暫接鵷鷺翼便合劍佩趨明光忽然眉上有黄氣吾君漸欲收英髦行聞宣室召歸近御爐煙東坡召還汲脩綆南歸脫毒蠱入對隨孔鸞漢庭日日召嚴徐山谷赴官經齊侯使連稱管至父戍葵丘曰𤓰時而往左傳史客曹郎主治羌胡事劇遷刺史其公遷縣令詔書賜錢三萬與三臺祖餞治裝一月凖謁公卿凌朝乃發後漢百官志注張輔為東郡太守賜裝錢三十萬以之官鍾離意上書薦劉平等有詔徴平等特賜辦裝錢後漢集牽絲及元興解龜在景平謝靈運詩云牽絲謂牽王如絲之言而仕也元興晉安帝年號景平宋少帝年號交承經舊令尹之政必以告新令尹論語史曹參代蕭何為相舉事無所變更壹遵何之約束百姓歌曰蕭何為法較若畫一曹參代之守而勿失又揚雄傳曰蕭規曹隨功若泰山曹參去位屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大于此者乎參曰夫獄市者所以并容也今君擾之姦人何所容乎黄霸代韓延夀居潁州因其迹而大治延夀代蕭望之為左馮翊而望之為御史大夫㑹御史當問事東郡望之因令並問延夀在東郡時放散官錢千餘萬延夀竟坐弃市漢書傅燮為漢陽太守初范津舉燮孝㢘及為漢陽與交代合符而去任尚代班超為都護謂超曰小人猥承君後宜有以誨之後漢謝方明善治郡承前代人不易其政必當改者則以次漸移變使無迹可尋晉書楊於陵不敢易袁公之政詳見太守類本朝歐陽公知開封府所代包孝肅公以威嚴御下公簡易循理不求赫赫之譽有以包公之政勵公者公曰凡人才性不一吾亦任吾所長耳神道碑王文正公曽李文定公迪皆狀元及罷相領青又為交承故文正送文定詩有錦標得雋曽相繼金鼎調元亦踐更之句詹堅老下大理李端初為少卿詬曰子嘴尖如此誠姦人也後十年堅老代端初為淮南漕端初頗省其面目因曰郎中若有素者豈甞邂逅朝路中耶風采堂堂非曩日比也堅老答言風采堂堂固非某所見但不知比往時嘴尖否端初愧怍而悟揮塵録同僚之契交承之分有兄弟之義至其子孫亦}
