  - {type: variant, offset: 1489, length: 6, content: 曰貧賤常思富, WYG: 諝坐未甞當正位為政以和易為理韋氏東眷有逍遙公夐鄖公孝寛西眷有平齊公瑱固安公法保並為盛門至今稱為四公之後已上並雜見史傳前職官部中亦多收載恐難檢尋今復類聚于此父子同朝經父子並為周司徒鄭武公莊公是也武公莊公為平王卿士左傳史成王於周公子父俱延拜而受之注云周公拜前魯公拜後漢書䟽廣䟽受父子並為師傅朝廷以為榮本傳蘇頲遷給事中拜中書舍人父瓌同中書門下三品父子同在禁苑朝廷榮之貞元四年詔以太尉中書令西平郡王晟長子愿為銀青光禄大夫太子賓客賜勲上柱國與晟門並列㦸唐書傳記崔湜弱冠登科不十年掌貢舉遷兵部父揖亦甞為禮部至是父子累日同省為侍郎翰林盛事集近世勲將尤}
