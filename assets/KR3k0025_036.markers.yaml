  - {type: variant, offset: 3467, length: 12, content: 枯松強鑽膏槁竹欲瀝汁兩窮, WYG: 茍削丹書得夷平民則塵洗天波謗絶衆口陸士衡表柳先生遊于愚溪之上黧老進而言曰今兹是州起廢者二焉東祠躄浮圖中廏病顙之駒躄浮圖有師道少而病躄居東祠十年今年他有師道者悉以故去學者倀倀無所師遂}
