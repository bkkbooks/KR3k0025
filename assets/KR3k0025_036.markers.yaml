  - {type: variant, offset: 4095, length: 1, content: 代, WYG: 寄語諸公肯湔祓昨夜風雷震海隅天心急擬活焦枯山谷萬里早歸來九折慎馳騖后山起復經子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也子夏曰金革之事無辟也者非與孔子曰吾聞諸老􅖫曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也記曽子問春秋不以家事辭王事閔子騫曰若是乎古之道不即人心退而致事公羊史}
