  - {type: 'tls:seg', offset: 1285, content: '', id: KR3k0025_CHANT_036-11a.2}
  - {type: variant, offset: 1285, length: 0, content: '', WYG: 勇獨請封兄子元興時人義之後周書傳記伯白也孝經援神契本朝制度見後食邑實封類開國子經諸子之地封疆方二百里其食者四之一子執穀璧子男五命周禮史咸熙五年晉王奏五等諸子地方五十里邑八百户官屬同諸公妾三人車前司馬四人旅賁二十人咸熙中改封蔣愷為下蔡子魏志王敬則封崇安縣子敬則幼時於草中射獵有蟲如烏豆集其身摘去乃脫脫處皆流血敬則惡之詣道士卜道士曰此封侯之瑞也齊書傳記子獨孳孳栖下之稱也環齊要略本朝制度見後食邑實封類開國男經諸男之地封疆方百里其食者四之一男執蒲璧子男五命史咸熙元年晉王奏建五等諸男地方三十五里邑四百户妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百户魏志傳記男任也任治事受王命為君也環齊要略本朝制度見後食邑實封類食邑實封經晉於}
