  - {type: variant, offset: 1040, length: 2, content: 祖佞, WYG: 講之前輩專以此為務今人知之者蓋少矣童蒙訓薦舉經拔茅連茹以其彚征吉易趙文子所舉於晉國管庫之士七十餘家記檀弓儒有内稱不避親外舉不避怨推賢而進達之不望其報儒行君子謂祁奚能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨左子玉之敗子之舉也舉以敗國將何賀焉夫舉無他唯善所在親䟽一也同上仲弓問政子曰舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸論語子趙簡王問于解狐曰孰可以為上黨守對曰荆柏柳可趙簡王曰非子之讐乎對曰忠臣舉賢不避仇讐趙武薦白屋之士六十家韓子史韓信亡去蕭何追之因薦於漢王曰必欲爭天下非信無可與計事者鄭當時為司農其推轂士及官屬丞史誠有味其言也聞人之善言進之上唯恐後山東諸公以此翕然稱鄭莊韓安國嗜于財然推舉皆㢘士賢于己者也於梁舉壺遂臧固郅佗皆天下之名士張安世甞有所薦其人來謝安世大恨以為舉賢達能豈有私謝}
