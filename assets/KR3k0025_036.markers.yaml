  - {type: variant, offset: 3461, length: 2, content: 史記, krp: 既放三年不得復見竭智盡忠而蔽障於讒心煩意亂不知所從乃往見太卜鄭詹尹曰云云俗溷濁而不清蟬翼為重千鈞為輕黄鍾毁棄瓦釜雷鳴讒人髙張賢士無名楚辭卜居恭承嘉恵兮待罪長沙側聞屈原兮自沉汨羅造託湘流兮敬弔先生遭世㒺極兮迺隕厥身嗚呼哀哉兮逢時不祥鸞鳳伏竄兮䲭鴞翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂隨夷溷兮謂跖蹻㢘鏌鋣為鈍兮鉛刀為銛吁嗟黙黙生之無故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳伏鹽車兮章甫薦屨漸不可乆兮嗟若先生獨罹此咎兮賈誼弔屈原賦賈生西望憶京華湘浦南邊莫怨嗟聖主恩深漢文帝憐君不遣到長沙去嵗左遷夜郎道}
  - {type: variant, offset: 3465, length: 0, content: '', WYG: 顦顇滯江潭竒伯流離放遼海遷人發佳興我是瀟湘放逐臣天外常求太白老金陵捉得酒仙人一為遷客去長沙西望長安不見家李白萬里傷心嚴譴日百年垂死中興時杜詩孤臣昔放逐泣血追愆尤謂言即施設乃反遷炎州朝為青雲士暮作白首囚靜思屈原沉逺憶賈誼貶翻飛乏羽翼指摘困瑕玷一封朝奏九重天夕貶潮陽路八千欲為聖明除弊事肯將衰朽計殘年雲横秦嶺家何在雪擁藍闗馬不前前年出官日此禍最無妄韓集匪兕吾為柙兮匪豕吾為牢積十年莫吾省兮増蔽吾以蓬蒿始驚陷世議終欲逃遷刑風波一跌逝萬里壯心瓦解空縲囚未競遷喬樂俄成失路嗟别怨秦城暮途窮越嶺斜沉埋全死地流落半生涯獨棄傖人國難窺夫子牆鳴玉機全息懐沙事不忘十年顦顇到秦京誰料翻為嶺上行一身去國六千里萬死投荒十二年栁集栁子厚斥已十二年程劉二韓皆已抆拭獨子厚與猿鳥為伍吳武陵與孟簡書咋舌驚魂分終裔壤劉夢得啟沉舟側畔千颿過病樹前頭萬木花前人詩一去一萬里千知千不還崖州在何處生度鬼門闗李徳裕本朝盧多遜貶朱崖李符見趙普雖在海外而水土無他惡春州雖在内地而至者必死望追改前命以外彰寛宥乃寘于必死之地普頷之後符坐事貶上怒未已令再貶海外普具述其事即以符知春州到郡月餘卒言行録寇凖貶雷州司户及境吏以圖獻抵海岸凡十里公恍然曰少時有到海祇十里過山應萬重之句乃今日意耳人生得喪豈偶然哉寇公之貶也丁晉公與馮相拯在中書丁當秉筆初欲貶崖州忽自疑語馮曰崖州再涉鯨波如何馮唯唯而已丁乃徐擬雷州丁之貶也馮遂擬崖州當時好事者曰若見雷州冦司户人生何處不相逢丁謂既逐李文定因肆行貶竄時王沂公參政不平之曰責太重矣謂熟視乆之曰居停主人恐亦不免也沂公懼因宻謀去之以擅移山陵劾謂雖沂公以計傾之而公議不以為非也龍州志丁謂謫崖州甞謂客曰天下州郡孰為大客曰京師也謂曰不然朝廷宰相為崖州司尸則崖州為大也聞者絶倒陳瑩中云嶺南人見逐客不問官之尊卑盡呼相公豈非相公愛逰此乎近日瑩中赴龍城士美相繼過桂又報伯紀來因念瑩中言發一笑折彦質記劉器之謫嶺外盛夏奉老母以行一日行山中憇樹下有大蛇冉冉而至若相向者久之乃去村民羅拜器之曰官異人也蛇吾山之神見官喜相迎耳聞見録蘇轍謫雷不許占官舍遂僦民屋章子厚以為強奪民居下州追民究治以僦劵甚明乃已及章子厚謫雷州亦問舍于民民曰前蘇公來為章丞相㡬破我家今不可也人以為報秦㑹之千鬼萬怪如不樂這人貶竄將去却與他殷勤不絶一日忽招胡和仲飯意極拳拳比其還家則臺章已下又送白金為贐如欲論其人章䟽多是自為以授言者朱文公行見江山且吟詠不因遷謫豈能來得罪宜投裔六一集逐客何人着眼看東坡山憶喜歡勞逺夢地名皇恐泣孤臣蜀中鋪名贑中灘名吏民驚怪坐何罪父老相攜迎此翁佗年誰作輿地志海南萬里是吾鄉九死南荒吾不恨兹逰竒絶冠平生公方占賈鵩我正買龔牛逐客不妨員外置詩人例作水曹郎夢遶雲山心似鹿魂飛湯火命如雞山僧有味寧知子瀧吏無言只笑儂逢人瘴髮黄入市胡眼碧屢作退飛鷁羞看乾死螢孤鴻方避弋老驥猶在埛謫恵州東坡謫嶺南時宰欲殺之飽喫恵州飯細和淵明詩淵明千載人東坡百世士出處雖不同氣味乃相似山谷人鮓瓮中危萬死鬼門闗外更千岑問君底事向前去要試平生鐵石心答劉文學去國行萬里淡如雲水僧安知隴鳥樊籠宻更覺南鵬羽翼低並前人去國一身輕似葉髙名千古重於山李師中送唐介起廢史以貴戚廢錮當復以貴戚浣濯之猶解酲以酒也後漢第五倫䟽魏愷積年沉廢遇楊愔於路微自陳愔曰咸由中㫖愷曰雖復零雨自天終待雲興四岳愔忻然曰此言極簡要數日除霍州刺史北史張威在青州侵擾百姓坐廢於家後從上祠泰山上曰今還公笏於是復拜洛州刺史隋書賈誼謫長沙文帝思之召見宣室問鬼神之本文帝前席見赴召類汲黯坐免官隱於田園者數年召為淮陽太守本}
