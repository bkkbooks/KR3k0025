  - {type: variant, offset: 1286, length: 0, content: '', krp: 乎作爰田注云分公田之稅應入公者爰之于所賞之衆晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣衛侯與免餘邑六十辭曰唯卿備百邑臣六十矣下而上禄亂也魯昭公孫于齊齊侯曰自莒疆以西請致千社左傳子公子開方以書社七百下衛矣管子史秦以吕不韋為丞相封文信侯食河南洛陽十萬户史記今濟南中山王幸以支庶享食大國衍食佗縣後漢景龍二年韋嗣立上䟽以為食封之家其數甚衆昨問户部云用六十餘萬丁一丁絹兩疋凡百二十餘萬疋臣頃在太府每嵗庸調絹多不過百萬少則六十萬疋比之封家所入殊少不若悉記丁輸之太府使封家於左藏受之為愈上弗聽通鑑開元十年初令宰相共食實封三百户以七丁為限元和五年應給實封例節度使兼宰相每食實封百户嵗給八百端疋若是絹加給綿六兩節度使不兼宰相每百户給四百疋軍使諸衞大將軍每百户給三百五十端匹唐書宋齊丘罷相願復歸九華山賜號九華先生食青陽一縣五代史傳記北齊以後功臣多食郡縣輸若髙徳正封藍田公食勃海郡輸雞跖集本朝凡加食邑宰相千户實封四百户餘降麻官七百户實封三百户直學士以上五百户實封二百户舎人待制散尚書至少卿監以上三百户實封一百户凡食邑三百户封縣開國男五百户封子七百户封伯千户封郡侯二千户封公千五百户以上始加實封惟將相食邑萬户即開國㑹要皇朝沿唐制文臣少卿監以上武臣副率以上内殿崇班以上有封爵丞郎學士刺史大將軍諸司使以上有實封但以増户數為差不係爵級邑過其爵則並進爵焉止于郡公三朝志昔在前代凡食邑民户給其税賦後以食實封方給之本朝悉為虛名而制詞尚以實封為真賦云官制舊典錫土非所以逮無功割户實所以褒有徳茍有寵過其量是謂食浮于人李清臣表俄奉璽書驟加井賦邑衍真租食倍多賦仍増勲秩倍衍户封陪食爰田衍封真賦加以爰田衍之真食寵章非次衍食有加真食爰田併加於上賦陪敦邑采増衍井腴申錫爰田陪敦多賦牋表類加恩本朝倣隋唐官制設階謂文武兩階官勲謂上柱國柱國上䕶軍䕶軍上輕車都尉輕車都尉上騎都尉騎都尉騎驍都尉飛騎尉雲騎尉武騎尉凡十二等謂之勲封爵謂王郡王國公郡公及開國公侯伯子男凡九等謂之封爵食邑實封為降赦加恩之數應宰臣親王使相執政官前任同加恩四種尚書以下至諌議大夫學士待制大卿監加三種少監以下至朝臣加二種京官選人加一種稱種者謂階勲爵食邑實封各為一種也京官選人初命官便帶階每加恩如上件之數加焉祖宗用此以别仕進之新舊蓋祖宗用人必擇歴試之才能自非士取殊科在三人之列及制科入等方不次擢任然亦須先歴一任倅幕使知州縣事方登館閣擢言路自餘皆以資歴選任故以階勲别之熙寧王安石當國之初喜用新進以行法不次擢任}
  - {type: variant, offset: 1287, length: 2, content: 惡濕, WYG: 然開陳其人之才能稟上}
  - {type: variant, offset: 1287, length: 2, content: 惡濕, krp: 然開陳其人之才能稟上}
  - {type: variant, offset: 1290, length: 2, content: 居下, WYG: 進擬逮元豐判乃以階為寄禄官故只加勲而已至政和以後蔡京用事專選新進之附已者不次擢用慮人君檢察同列梗議當職人言遂削去勲毎有恩霈只云合加恩人並無加恩乃立司封法暗理加勲之數加至上柱國方封爵加食邑云官制舊典任子經賞延於世世選爾勞予不掩爾善書古之仕者世禄詩序史袁盎兄噲任盎為郎汲黯以父任為太子洗馬王吉曰今使俗吏得任子弟率多驕傲不通古今至於積功治人無益于民此伐檀所由作也宜明選賢才除任子之令漢書各以品之髙卑䕃其親屬多者及九族少者三世宗室國賔先賢之後及士人子孫亦如之晉書嚴父弱冠以門䕃䇿名李徳裕以䕃補校書郎後為名宰相唐書傳記漢制二千石九卿得資䕃為郎皆為三省郎悉屬光禄勲更直執㦸宿衛及其髙第有亷茂可察四行可舉乃出補長及丞自魏晉迄唐臣僚有功利及民勞效在國始賜其子官至唐開元三品以上許䕃子孫降子一等曽孫又降一等散官同執事䕃四品五品以降臣早以門資初登官叙通鑑世臣門子􅉏御之族天隆其祐主豐其禄蔡邕集以門功拜為太子舍人韓文公初為吏亦以門庇房公墓銘東隂令于興宗生於公侯家以覆䕃入仕劉夢得本朝太平祥符二年邢昺言欲望自今補䕃出身人並須先於國學聽書二年候滿日本學牒送審官院依條試驗方與差遣㑹要世宦經官人以世書古者臣有世功世其官邑詩䟽世禄之家鮮克由禮畢命春秋譏世卿公羊五世其昌並於正卿八世之後莫之與京左傳陳厲公生敬仲筮之曰此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也左子所謂故國者非謂有喬木之謂也有世臣之謂也}
