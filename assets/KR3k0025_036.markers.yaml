  - {type: variant, offset: 1285, length: 0, content: '', krp: 勇獨請封兄子元興時人義之後周書傳記伯白也孝經援神契本朝制度見後食邑實封類開國子經諸子之地封疆方二百里其食者四之一子執穀璧子男五命周禮史咸熙五年晉王奏五等諸子地方五十里邑八百户官屬同諸公妾三人車前司馬四人旅賁二十人咸熙中改封蔣愷為下蔡子魏志王敬則封崇安縣子敬則幼時於草中射獵有蟲如烏豆集其身摘去乃脫脫處皆流血敬則惡之詣道士卜道士曰此封侯之瑞也齊書傳記子獨孳孳栖下之稱也環齊要略本朝制度見後食邑實封類開國男經諸男之地封疆方百里其食者四之一男執蒲璧子男五命史咸熙元年晉王奏建五等諸男地方三十五里邑四百户妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百户魏志傳記男任也任治事受王命為君也環齊要略本朝制度見後食邑實封類食邑實封經晉於}
  - {type: variant, offset: 1286, length: 0, content: '', WYG: 乎作爰田注云分公田之稅應入公者爰之于所賞之衆晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣衛侯與免餘邑六十辭曰唯卿備百邑臣六十矣下而上禄亂也魯昭公孫于齊齊侯曰自莒疆以西請致千社左傳子公子開方以書社七百下衛矣管子史秦以吕不韋為丞相封文信侯食河南洛陽十萬户史記今濟南中山王幸以支庶享食大國衍食佗縣後漢景龍二年韋嗣立上䟽以為食封之家其數甚衆昨問户部云用六十餘萬丁一丁絹兩疋凡百二十餘萬疋臣頃在太府每嵗庸調絹多不過百萬少則六十萬疋比之封家所入殊少不若悉記丁輸之太府使封家於左藏受之為愈上弗聽通鑑開元十年初令宰相共食實封三百户以七丁為限元和五年應給實封例節度使兼宰相每食實封百户嵗給八百端疋若是絹加給綿六兩節度使不兼宰相每百户給四百疋軍使諸衞大將軍每百户給三百五十端匹唐書宋齊丘罷相願復歸九華山賜號九華先生食青陽一縣五代史傳記北齊以後功臣多食郡縣輸若髙徳正封藍田公食勃海郡輸雞跖集本朝凡加食邑宰相千户實封四百户餘降麻官七百户實封三百户直學士以上五百户實封二百户舎人待制散尚書至少卿監以上三百户實封一百户凡食邑三百户封縣開國男五百户封子七百户封伯千户封郡侯二千户封公千五百户以上始加實封惟將相食邑萬户即開國㑹要皇朝沿唐制文臣少卿監以上武臣副率以上内殿崇班以上有封爵丞郎學士刺史大將軍諸司使以上有實封但以増户數為差不係爵級邑過其爵則並進爵焉止于郡公三朝志昔在前代凡食邑民户給其税賦後以食實封方給之本朝悉為虛名而制詞尚以實封為真賦云官制舊典錫土非所以逮無功割户實所以褒有徳茍有寵過其量是謂食浮于人李清臣表俄奉璽書驟加井賦邑衍真租食倍多賦仍増勲秩倍衍户封陪食爰田衍封真賦加以爰田衍之真食寵章非次衍食有加真食爰田併加於上賦陪敦邑采増衍井腴申錫爰田陪敦多賦牋表類加恩本朝倣隋唐官制設階謂文武兩階官勲謂上柱國柱國上䕶軍䕶軍上輕車都尉輕車都尉上騎都尉騎都尉騎驍都尉飛騎尉雲騎尉武騎尉凡十二等謂之勲封爵謂王郡王國公郡公及開國公侯伯子男凡九等謂之封爵食邑實封為降赦加恩之數應宰臣親王使相執政官前任同加恩四種尚書以下至諌議大夫學士待制大卿監加三種少監以下至朝臣加二種京官選人加一種稱種者謂階勲爵食邑實封各為一種也京官選人初命官便帶階每加恩如上件之數加焉祖宗用此以别仕進之新舊蓋祖宗用人必擇歴試之才能自非士取殊科在三人之列及制科入等方不次擢任然亦須先歴一任倅幕使知州縣事方登館閣擢言路自餘皆以資歴選任故以階勲别之熙寧王安石當國之初喜用新進以行法不次擢任}
