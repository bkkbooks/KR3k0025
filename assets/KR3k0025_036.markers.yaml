  - {type: variant, offset: 1484, length: 1, content: 衡, WYG: 衣冠盛事傳記前漢金日磾張安世七葉珥貂為侍中張氏自昭帝封安世至吉傳國八世歴莽簒二百年間未甞遣黜封者莫與為比韋賢及子元成平當及子晏唐劉祥道及子齊蘇瓌子頲李吉甫子徳裕房融子琯皆父子為相後漢竇巖為司空子畧少保略子熾太傅略孫毅大司馬楊氏自震至彪四世太尉徳業相繼為東京名族袁安為司徒子敞為司空孫湯為太尉湯子逢為司空逢弟遇為司徒晉謝安子琰琰子混三世僕射中書令王述述子坦之坦之子愉三世中書僕射梁謝覽為吳興守與祖}
