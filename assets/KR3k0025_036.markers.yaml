  - {type: variant, offset: 1831, length: 8, content: 隨牒牽黃綬孟浩然, WYG: 集謂蘇瓌蘇頲也兄弟同朝史張綰為中丞兄纘為僕射元日舊制僕射中丞坐為東西時百司就列導騶分趨兩途前代未有時人榮之梁書劉偉之為左史懿之為給事中兄弟並居兩省論者美之唐書兄弟相繼史馮立與兄野王相代為西河上郡太守民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恵吏民政如魯衛徳化鈞周公康叔猶二君漢書夏侯䕫為南豫州刺史兄亶先經此任並有恩恵百姓歌曰我之有州頻得夏侯前兄後弟布政優優南史賈敦頤為洛州刺史其弟敦實後繼鎮之並有恵政百姓前後立碑於東京唐書入貲史張釋之以貲為騎郎卜式上書願輸家半財助邊上使使問式式曰天子誅匈奴愚以為賢者宜死節有財者宜輸之如此而匈奴可滅也是時富豪者皆爭匿財唯式尤欲助費上乃拜為中郎賜爵左庶長田十頃布告天下尊顯以風百姓漢書崔烈因傅母入錢五百萬得為司徒及拜日帝曰悔不少靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是豈不知足也皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如逢掖漢書中宗時安樂公主等用事請謁受賄}
