  - {type: variant, offset: 5201, length: 213, content: 人窮則反本故勞苦倦極未嘗不呼天地疾痛慘怛未嘗不呼父母也史屈原傳寬則寵名譽之人急則用介冑之士史記韓作傳孔融為賊管亥所圍遣太史慈求救於平原相劉備備曰孔北海乃復知天下有劉備耶東漢孔融傳李克用曰當阽危之時譽為韓彭伊呂及既安之後則罵為戎羯胡夷通鑑僖宗紀黃巢北趣襄陽劉巨容拒之大破賊眾或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛宮賞事寧則棄之或更得罪不若留賊以為富貴之資眾乃止通鑑唐僖宗飢則為用飽則颺去魏志傳記飢則附人飽則高飛十, WYG: ''}
