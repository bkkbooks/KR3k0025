  - {type: variant, offset: 1267, length: 0, content: '', krp: 舞故稱比之世說集朝取一人焉拔其尤暮取一人焉拔其尤誠不忍竒寶横弃道側昔人有鬻馬於市者知伯樂之善相也從而求之伯樂一顧價増倍屢為丞相言雖懇不見録殿前羣公賜食罷驊騮踏路驕且閒稱多量少裁鑑宻豈念幽桂遺榛菅㡬欲犯顔出薦口氣象硉砈未可攀韓集唯待吹噓送上天杜詩本朝王太尉薦寇萊公為相萊公數短太尉于上前上謂太尉曰卿雖稱其美彼專談卿惡太尉曰臣在相位久政事闕失必多凖對陛下無所隠益見其忠直此臣所以重凖也上由是益賢太尉言行録孫杵薦唐介呉中復為御史孫晩為執政甞嘆曰吾何功以輔政惟薦二臺官為無愧耳東軒筆録吕蒙正為相夾袋中有册子四方人謁見必問其有何人才客去隨即䟽之或有一人而數人稱之者必賢也朝廷求賢取之囊中故文武百官各稱職巵史范忠宣公薦引人才必以公議未甞示恩恵於人王沂公擢用人才絶口未甞言子弟曰獨不使之知乎公曰若使之知是我徇私情而市私恩也恩欲歸已怨使誰歸言行録韓魏公喜用知名士或不識其面既用之其人亦不知為所薦者李師錫改京官仁宗覧其薦者三十二人師錫乃使相王徳用甥壻上曰保任之法欲以盡天下之才但薦勢要孤寒何以進乃令師錫循資吕公著薦張載脩身講學為闗右士人師表且深知邊境利害上以為崇文院校書吕正獻公與温公同舉程頥乞特加召命待以不次拜崇政殿說書程伊川與韓持國范夷叟泛舟須㬰客將去有一官員上書謁見求知己頥云大賢居位不去求人乃使人倒來求己是甚道理夷叟云求薦章常事也頥云不然只為曽有不求者不與求者與之遂致人如此語錄范文正公知杭州蘇鱗為屬縣巡檢城中兵官往往皆獲薦書鱗在外邑未見收録獻詩曰近水樓臺先得月向陽花木易為春文正薦之況子多才兼美行薦書期即達承明籄櫝瓦礫遺琳球薦書轉石古所尤歐陽都邑正喧收把梓囘㸔世上無伯樂都道鹽車勝月題東坡書考經以參互攷日成以月要攷月成以嵗㑹攷嵗成周禮史京房對曰古帝王以功舉賢則萬化成瑞應著宜令百官各試其功災異可息詔使房作其事房奏考課吏法漢書劉邵作都官考課法七十二條魏志杜預受詔為黜陟之法曰莫若委達官各考所統在官一年以後每嵗言優者一人為上第劣者一人為下第因計偕以名聞按其六嵗處優舉者超用之六嵗處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之晉書上考第羣臣以李綱孫伏伽為第一盧承慶考内外官有一官督運遭風失米盧考之曰監運損糧考中下其人容止}
