  - {type: variant, offset: 119, length: 221, content: 關甯成側行送迎然縱氣盛弗為禮至郡遂案甯氏盡碎破其家史義縱傳蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀遊諸侯無所遇困於楚蘇秦故召而辱之舍人曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣陰奉給君資盡蘇君之計謀也張儀曰嗟乎此在吾術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言通監周紀漢有善射者曰樓煩楚挑戰樓煩輒射殺之使射項羽羽大怒瞋目叱之樓煩目不能視手不能發走還入壁不復敢出西漢項羽傳汲黯為忮師古曰忮意堅也音章𢼧反司馬安之, WYG: 夜半}
