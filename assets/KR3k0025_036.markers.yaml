  - {type: variant, offset: 1274, length: 0, content: '', WYG: 君手迹並寫誦之北史傳記李元紘治潤有恵政代去吏民遮留烏鵲羣飛翔集以擁行車姚崇牧荆州受代吏民擁馬截􅌱留鞭開元天寶遺事集解龜在景平謝靈運詩解龜謂解去所佩龜印也景平宋少帝年號本朝士人歴官一任得外無官謗中無所愧於心釋肩而去如大熱逺行雖未到家得清涼館舍一解衣潄濯已足樂矣東坡章服經以訟受服亦不足敬也易天命有徳五服五章哉惟衣裳在笥書服其命服詩傳記唐初品官舊服止黄紫貞觀四年詔三品以上服紫四品五品已上服緋六品七品以緑八品九品以青永徽二年京官文武職事四品五品並給隨身魚袋天夀中改佩魚為龜神龍依舊景雲赦文魚袋著紫者金裝著緋者是時正貟官始佩魚其離任及致仕即去魚袋貟外判試并檢校等官並不佩魚開元中張嘉貞奏請致仕官及内外官五品以上檢校試判及内供奉官見占闕者聽凖正貟例許終身佩魚以理去任亦許佩魚自後恩制賞緋紫謂之章服凡服飾差等上得兼下下不得僭上唐㑹要及職林本朝雍熈初郊祀慶成始詔升朝官緋緑二十年叙賜緋紫真宗東封西祀赦書京朝官並以十五年為限太平興國二年詔朝官出知節鎮及轉運使副借紫知防團刺史州借緋衣緋者借紫其知通判知軍監止借緋魚袋之制國初多闕雍熙元年南郊畢内出魚袋以賜近臣由是内外升朝文武官皆佩魚㑹要舊制借服者但稱借紫借緋而已初不佩魚醫官職雖髙亦不佩魚政和初王詔上言於是始佩魚稱借紫金魚袋而醫官隨服色佩魚矣國史後補賜緋史李子慎誣告其舅以獲五品其母見其著緋衫泣曰此是汝舅血染者邪張宿賜緇青裴度欲為請銀緋太和三年中書門下奏參戎要但官至侍御史以上者雖偕考未至亦量許奏緋唐書傳記張鷟初為岐王屬夜夢著緋乗驢睡中有怪我衣緑乘馬何為衣緋却乗驢其年應舉及第授鴻臚丞未經考而授五品以其應也張鷟為鴻臚丞帽帶及緑袍並䑕嚙有蜘蛛大如粟當寢門懸絲上經數日大赦加階授五品周朱前因上書賜緋魚袋未入五品於緑衫上帶之朝野莫不怪笑僉載張嘉貞開元中書令著緋傅游藝武后時居相位著緋南部新書沈佺期以罪謫遇恩復官而未還朱衣因内晏羣臣皆歌迴波詞佺期曰身名已蒙齒緑袍笏未賜牙緋中宗即賜之本事詩緋袍子紛紛見下賜紫類集朱紱白銀章李白扶病垂朱紱銀章付老翁杜詩朱衣象笏承命以行朱衣象板賜服朱銀加賜朱衣銀魚韓文彩動綾袍鴈趂行白集注云緋多以鴈御瑞莎為之也腰白金服赤紱徒使花袍紅似火其如蓬鬢白如絲魚綴白金隨步躍鶻銜紅綬遶身飛榮傳錦帳花聨萼彩動莎衫鴈趂行聞弟行簡並蒙恩賜章服入賜朱衣銀印劉夢得集腰垂魚印首帶武冠令狐楚代表賜紫史馮伉為皇太子諸王侍讀殿中賜金紫服太和三年中書門下奏檢校四品兼中丞先賜緋經三周年以上者兼許奏紫唐書傳記武后以南海獻集翠裘賜張昌宗狄仁傑入奏事后令爭三籌賭昌宗所衣裘卿以何物為對狄因指所衣紫駝袍曰臣以此敵則天笑曰此裘價逾千金卿之所指為不等矣狄對曰臣此袍乃大臣朝見奏對之服也集異記李泌起家金紫為帝王師廣記顔真卿問范氏尼曰吾得五品否尼指座上紫絲布云顔郎衫色如此遺事或有客譏來濟近日白袍子紛紛濟曰正由緋袍子紫袍子紛紛國史補崔日用為中丞賜紫是時佩魚須有特恩日用因内宴撰迴波詞中宗以金魚賜之本事詩集恩降重霄榮沾陋質虛黷陟明之典恐興彼己之詩劉禹錫表金章紫綬照青春杜詩封爵經列爵惟五書一曰爵以馭其貴周禮以徳詔爵同上史昔周爵五等春秋三等注云春秋變周之文從殷之質合伯子男為一則殷爵三等者公侯伯也史記爵一級曰公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乗九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關内侯二十徹侯皆秦制以賞勞功漢百官表項王使人有功當封爵刻印刓忍不能予漢書樊噲破李由軍上聞賜爵明帝詔民爵過公乗得移與子若同産爵過公乗得移其親漢書建安二十六年始制名號侯置五大夫與舊列侯關内侯凡十六等以置軍功注置名號侯爵十八級關中侯爵十七級皆金印紫綬又置闗内外侯十六級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬}
