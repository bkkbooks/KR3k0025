  - {type: variant, offset: 1609, length: 219, content: 人駕乘者非樂負千鈞之重行千里之險鞭策痛矣袁淮正書集女辭家而適人臣出身而事主禰正平賦遊山澤觀魚鳥心甚樂之一行作吏此事便廢晉嵇康與山濤絕交書去住與願違仰慚林間翮杜工部譬如籠中鶴六翮不自搖騎虎不敢下並韓文心雖出雲鶴身尚觸籠鷹心源雖了了塵世苦憧憧並元微之開卷不及顧沈埋案牘間世事波上舟沿洄安得住意有清夜戀身為符守嬰並韋應物一落名宦途浩如乘風舡奔走情波不自由並劉賓客驛馬走四蹄痛酸無歇期磑牛封兩目昏閉何人知樹欲靜而風不止並自樂天自嫌如疋素刀尺不由身, WYG: 相於武后朝小許公佐𤣥宗}
