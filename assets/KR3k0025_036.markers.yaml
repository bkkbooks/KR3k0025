  - {type: variant, offset: 3461, length: 2, content: 史記, WYG: 既放三年不得復見竭智盡忠而蔽障於讒心煩意亂不知所從乃往見太卜鄭詹尹曰云云俗溷濁而不清蟬翼為重千鈞為輕黄鍾毁棄瓦釜雷鳴讒人髙張賢士無名楚辭卜居恭承嘉恵兮待罪長沙側聞屈原兮自沉汨羅造託湘流兮敬弔先生遭世㒺極兮迺隕厥身嗚呼哀哉兮逢時不祥鸞鳳伏竄兮䲭鴞翺翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂隨夷溷兮謂跖蹻㢘鏌鋣為鈍兮鉛刀為銛吁嗟黙黙生之無故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳伏鹽車兮章甫薦屨漸不可乆兮嗟若先生獨罹此咎兮賈誼弔屈原賦賈生西望憶京華湘浦南邊莫怨嗟聖主恩深漢文帝憐君不遣到長沙去嵗左遷夜郎道}
