  - {type: variant, offset: 1482, length: 1, content: 充, WYG: 訓年十六召見文徳殿應對爽徹武帝謂朱異曰可謂相門有相梁書博陵崔倕緦麻親三世爨貞元以來言家法者以倕為首生六子一登輔相五任大僚太常卿邠太府卿酆外臺尚書郎郾庭尉卿郇執金吾鄯左僕射平章事鄆宣宗聞之嘆曰崔鄯家門孝友可為士族師法矣鄯甞構小齋于别寢御筆題額賜號曰徳星堂今京兆民因崔氏舊里立徳星社唐書傳記金日磾忠勤之節七葉侍中三輔故事唯金張子弟世履忠篤故保貴恃寵祚鍾昆嗣藝文類聚通侯百數富平最盛于西京類要謂張安世子孫東京楊氏累世宰相為漢名族然袁氏車馬衣服極奢僭能守家風為世所貴不及楊氏也望豐屋知名家類要公門有公卿門有卿王沉釋時}
