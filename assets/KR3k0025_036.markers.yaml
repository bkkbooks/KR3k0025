  - {type: variant, offset: 4311, length: 200, content: 不如身逢耳聞不如目覩且陛下與太子當韋氏用事之時日夕憂危切齒於群凶今幸而除之乃不改其所為臣恐復有切齒於陛下者也通鑑唐玄宗楊國忠謂客曰吾本寒家一旦緣椒房至此未知稅駕之所然念終不能致令名不如且極樂耳同上傳記文君眉色不加黛飾臉若芙蓉長卿素有消渴疾作美人賦自剌卒以此疾死西京雜記互入耽好集睹前車之傾覆而不改其轍跡選六代論小蟲水草楂梨橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者柳文序是悔其覆車不易前轍之失唐文粹, WYG: 姚崇碑}
