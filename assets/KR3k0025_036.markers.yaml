  - {type: variant, offset: 4589, length: 210, content: 法明禁之而人明犯之是不有天子之法也老泉子猶傴伸而好升高也指其頂者愈眾荀儒效史適足以發笑而自點耳司馬遷傳智伯曰吾乃今知水可以亡人國也襄子夜使人決水灌智伯軍軍亂殺智伯通鑑互入因言取禍李吉甫言天下已太平陛下宜為樂上謂左右曰吉甫專為悅媚通鑑唐憲宗太后習貓使與鸚鵡共處出示百官傳觀未遍貓飢摶鸚鵡食之太后甚慚通鑑唐武后盧藏用隱終南山晚乃徇權利司馬承正召至闕下藏用指南山曰此中大有佳處承正徐曰仕宦之捷徑耳藏用慚新唐書本傳互入識者所窺傳, WYG: ''}
