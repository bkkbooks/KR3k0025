  - {type: variant, offset: 750, length: 238, content: 錄互入敏於應對一輿薪之火眾人之所憚而不敢犯也舉而投之河則何熱之能為老蘇集經不懲其心覆怨其正箋云不止女之妊心而反憎其正詩節南山彼醉不臧不醉反恥詩賓之初筵子鄉原言不顧行行不顧言曰古之人行何為踽踽涼涼孟子盡心眾曲不容直眾枉不容正淮南子直繩者枉木之所憎抱朴子史惡直醜正左已則無禮而討於有禮者曰汝何故行禮並左傳盜憎主人成十五年晉伯宗之妻曰盜憎主人別見于家語闒茸佞讇抱虛求進殘賊酷虐若此之徒嫉善憎忠西漢李尋傳北山有鴟不潔其翼饕餮貪汙臭腐是食長鳴呼鳳謂鳳無德東漢朱暉傳注互入不自覺醜妄議二門, WYG: 至}
