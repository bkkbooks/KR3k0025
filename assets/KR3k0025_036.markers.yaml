  - {type: variant, offset: 1871, length: 2, content: 林間, WYG: 百人取㫖中興㑹要邊邑備員蔑聞善狀大庭偶見賜與階升龍墀引對叨被寵陞俄應格于天官遂進階於文散俾脫迹於銓衡獲陞名於京籍偶嵗成之及格蒙序法之推恩校課中銓方上六年之最拜恩宸陛濫沾八品之階牋表類公子亦改官三就繁馬頭坡詩遷除史田蚡為丞相薦人或起家至二千石權移主上上迺曰君除吏盡未吾亦欲除吏漢書亦有少負令譽弱冠超越清級者南齊丘巨源為江夏王掌書記平除奉朝請南史延昌二年崔鴻建議曰竊見景明以來考格三年成一考一考轉一階貴賤内外萬有餘人}
