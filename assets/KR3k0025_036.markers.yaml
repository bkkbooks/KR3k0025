  - {type: variant, offset: 1276, length: 0, content: '', krp: 食租與舊列侯闗内外侯凡十六等今之虛封自此始魏志唐之封爵皆設虛名其食實封者給繒布而已唐書集漢髙祖甞詔天下凡以戰}
  - {type: variant, offset: 1277, length: 1, content: 憂, WYG: 爵七大夫公乘以上令丞與亢禮故為吏益難栁文本朝唐制王食邑五千户郡王國公三千户開國郡公二千户縣公千五百户縣侯千户伯七百户子五百户男三百户又有食實封者户給縑帛毎賜爵遞加一級唐末及五代始有特加邑户而罷實封之給本朝㑹要封王史髙祖定天下功臣異姓王者八國咸得裂土南面稱孤韓信平齊使人言漢王曰齊夸詐多變不為假王以鎮之其勢不定請自立為假王漢王罵曰大丈夫定諸侯即為真王何以假為髙祖四年立韓信為齊王徙為楚王五年以九江王英布為淮南王盧綰為燕王韓王信為代王彭越為梁王吕后臨朝封諸吕為王太后病戒産禄曰髙祖與大臣約非劉氏王者天下共擊之今王吕氏大臣不平我即崩大臣恐為變必據兵衛宫毋為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等誅諸吕使人迎立代王前漢書匈奴攻耿恭單于遣使招恭曰若降者當封為白屋王後漢尉景之子粲性麄武天保初封庫狄干等為王粲以景不預王爵大恚恨閉門不朝帝怪遣就宅問之隔門謂使人曰天子不封粲父作王粲不如死文宣親詣其宅慰之方復朝請北齊書本朝中書令趙普封韓王諡忠獻太尉髙瓊封衛王諡烈武國史顓班帝制榮啓國封六集金劵玉册虎符龍節東坡表忠觀碑遂膺典册進位真王衮衣繡裳既極公台之貴金印盭綬肈開王社之封土宇分封位列真王之貴牋表類郡王史天寶九載賜安禄山爵東平郡王唐將帥封王自此始通鑑上元二年李光弼兵敗河陽失守又河中軍亂殺其帥李國貞太原節度使鄧景山亦為部下所殺遂用郭子儀進封汾陽郡王出鎮絳州子儀擒其殺國貞賊首王元振數十人並誅之太原辛雲京亦誅害景山者由是河東諸鎮悉皆奉法渾瑊父釋之積戰功累遷至開府儀同三司寧朔郡王徳宗幸奉天瑊率家人子弟以拒朱泚賊平徳宗封瑊為咸寧王馬燧少讀書輟卷歎曰丈夫當建功於昭代以濟四海安能矻矻為一儒哉燧姿度魁異沉勇多智畧朱泚之亂燧守太原引晉水而注城之東渚以為池寇至計省守陴者萬人封北平郡王唐書集功業汾陽異姓王杜詩本朝曹彬追封濟陽郡王諡武恵國史宗室近親承襲特㫖封郡王兩朝志光奉制書峻膺寵數六一集囘皇子淮陽王啓開國郡縣公經諸公之地封疆方五百里其食者半公執桓圭上公九命為伯周禮史咸熙元年相國晉王奏建五等諸公地方七十五里邑一千八百户置相一人典祠典書典衛典禮各一人妾六人車前司馬十人旅賁四十人魏志上公九命則劍履上殿有善相者師圭謂陶侃曰君左手中指有堅理當為公若徹於上貴不}
