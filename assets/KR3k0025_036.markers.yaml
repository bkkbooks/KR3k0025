  - {type: variant, offset: 1283, length: 0, content: '', WYG: 縣公或贈侯者無開國字三朝志國公本朝舊制將相食邑萬户即封國公王旦過萬户而謙抑不請封慶厯七年南郊中外將相惟夏竦滿萬户中書請封英國公因詔使相未滿萬户者皆得封宋敏求録國朝之制食邑滿萬户乃封國公惟宰相三公則通計實封滿萬户便封國公杜衍既致仕因郊祀當加恵而食邑未滿萬户特詔封祁國公蓋異禮也其後遺奏有曰非萬户而忝賜履之封自三少而席司成之重蓋謂是云徐度編遇恩及宗室祖宗後承襲及特㫖者封國公三朝志開國侯經屯利建侯豫利建侯行師易諸侯之地封疆方四百里其食者參之一侯伯七命侯執信圭周禮史髙帝初封侯者皆賜丹書鐵券曰使黄河為帶泰山為礪漢有宗廟爾無絶世漢封功臣張良未有戰鬬功髙帝曰運籌帷幄之中決勝千里之外子房功也乃封良為留侯上在洛陽南宫從複道望見諸將相與坐沙中語上曰此何語留侯曰此謀反耳上曰為之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒留侯曰今急先封雍齒以示羣臣上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣韓王信入匈奴與太子俱至頽當城生子因名頽當至文帝時降封功髙侯頽當孽孫嫣貴幸顯當世嫣弟説以校尉征匈奴封龍額侯漢書馮石襲母公主封獲嘉侯為安帝所寵常幸其府留飲十日許賜駮犀具劍佩刀紫紋綬玉玦各一光武封功臣令各言所樂諸將皆占豐邑美縣惟丁綝願封本鄉曰昔孫叔敖敕其子受封必受墝埆之地今綝能薄功微得封鄉亭侯足矣光武封景丹櫟陽侯帝曰富貴不歸故鄉如衣錦夜行故以封卿耳詔曰竇融執志忠孝扶微救危仇疾反膚隗囂率勵五郡精兵羌胡畢}
