  - {type: variant, offset: 1273, length: 0, content: '', WYG: 非赦不出天下以為談笑之最焉御史臺記本朝元祐四年吏部言州令罷任委知州通判考察課績以徳義有聞清謹明著公平可稱恪勤匪懈為四善以獄訟無寃催科不擾稅賦無陷失宣敕條貫按帳簿書齊整差役均平為治事之最農桑墾殖野無曠土水利興修民賴其用為勸課之最屏除奸盜人獲安處賑恤貧窮不致流移而能招誘復業為撫養之最仍通取善最為上中下三等限次月申監司類聚每年一次同行審覆若有能否允著者别為優劣等上半年限八月下半年限二月保明以聞㑹要受代經及𤓰而代左傳史任昉為呉興太守清潔友人劉溉與弟洽從昉為山澤逰被代而還無衣沈約為裙衫迎之梁書宋世良為清河太守及代至傾城祖道有老人曰老人年九十記三十五政府君非惟善政清亦徹底申徽為襄州刺史及代還人吏送者數十里不絶徽賦詩於清水亭長㓜皆競來就讀遞相謂曰此是申}
