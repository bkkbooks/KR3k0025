  - {type: variant, offset: 1874, length: 3, content: 在啼歐, WYG: 非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如襲黄才史如班馬文章如張蔡得一分一寸必為常流所攀選曹官抑為一槩不曽甄别雖明㫖已行猶宜消息不從北史傳記凡言除者除故官就新官也漢書音義陳依梁制若有遷授吏部先為白牒列數十人尚書與參掌者共署奏敕或可或否其可者則下於選曹以貴賤别内外隨才補用以黄紙録名八座通署奏可乃出以付與典書其名貼鶴頭板修整容儀送所授之家其别發詔除者即宣付詔局章奏聞敕下黄紙冩出門下答詔請付外施行通典郭汾陽每遷官則靣長二寸額有光氣事已乃復隴上書集光隂荏苒遷授頻仍李義山恩光照拙薄雲漢希騰遷李白本朝叨膺渙渥叙進官聨六一醫是肱三折官多嵗九遷山谷罷免經狼瞫曰吾以勇求右無勇而黜亦其宜也謂上不我知黜而宜乃知我矣左傳令尹子文三已之無愠色栁下恵為士師三黜論語史荀卿適楚春申君以為蘭陵令春申君死而荀卿廢史漢髙赦韓信為淮隂侯信居常鞅鞅與絳灌等列過樊將軍噲噲跪拜送迎言稱臣曰大王肯臨臣信出門笑曰生乃與噲等伍孫㑹宗與楊惲書云大臣廢退當闔門皇懼為可憐之意李廣贖為庶人屏居藍田南山中射獵飲還至亭灞陵尉醉呵止廣曰故將軍尉曰今將軍尚不得夜行何故也哀帝時册免孔光曰君其上丞相博山侯印綬罷歸光退閭里杜門自守漢書栁渾罷政事後數日置酒召故人出遊酣肆乃還曠然無黜免意時李俛盧翰皆以舊相闔門奉朝請嘆曰吾等視柳宜城真拘俗之人哉唐書傳記鄧竟陵免官後見桓}
