  - {type: variant, offset: 1284, length: 0, content: '', WYG: 兵不血刃而虜土崩瓦解朕甚嘉之其以六安安豐陽原蓼安凡四縣封為安豐侯班超詣相者相者曰生燕額虎頸飛而食肉此萬里侯相也班超定西域五十餘國封為定逺侯後漢書曹沐自荆州北歸太祖曰此吾家千里駒也封為東亭侯咸熙元年晉王奏建五等諸侯地七十里邑千六百户官屬同諸公妾五人車前司馬八人旅賁三十六人魏志相工指吕僧珍曰此兒有竒聲封侯相也宋明帝目李安仁曰卿面方如田封侯相也南史李崇以父賢勲封迴樂縣侯時年尚小親族相賀崇獨泣賢怪而問之對曰無勲於國而幼小封侯當報主恩不得終於養是以悲耳賢由是大竒之隋書傳記列侯金印紫綬功大者食縣邑小者食鄉亭漢官解詁孔愉以討華軼功封餘不亭侯初愉少時甞得一龜於餘不溪中流左顧者數四及鑄侯印而龜左顧更鑄猶然愉悟遂佩焉晉中興書本朝制度見後食邑實封類開國伯經諸伯之地封疆方三百里其食者參之一伯執躬圭侯伯七命周禮史咸熙元年晉王奏建五等伯地方六十里邑千二百户官屬同諸公妾四人車前司馬八人旅賁二十八人魏志王勇論討茹茹功别封永固伯邑五百户時有别封者例聽迴授次}
