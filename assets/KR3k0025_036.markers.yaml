  - {type: variant, offset: 3623, length: 439, content: 之自我失之亦復何恨通鑑梁武帝紀侯自我得之自我捐之無所恨前漢田蚡傳夫水能浮草木亦能沈之地能生萬物亦能殺之江海能下谿谷亦能朝之聖人能從眾亦能使之後漢趙曄吳越春秋集淮陰之禍冤在神理通說且拒豨謀寧起堂堂蕭公實曰知已紿致鐘室胡寧忍此呂和叔文經有其禮而無其財君子弗行也有其財而無其時君子弗行也記檀弓下子為可為於可為之時則從為不可為於不可為之時則凶楊子在夷貉則引之倚門墻則麾之楊子脩身世冶則以義衛身世亂則以身衛義文子史陸賈曰馬上得之寧可馬上治之乎西漢孔子對葉公以來遠哀公以臨人景公以節禮非其不同所急異務也通鑑漢質紀禮教榮辱以加君子化其情也桎梏鞭朴以加小人化其形也通鑑漢獻紀崔郾為廣州剌史治以寬經月不笞一人及涖鄂州嚴法峻誅不貸唐書天下未定則專取其才不考其行喪亂既平則非才行兼備不可用也通鑑唐太宗柳仲郢為京兆尹政號嚴明後出為河南尹以寬惠為政或言不類荅曰輦轂之下先彈壓郡邑之治本惠養唐書互入政事集理在將順怡然而奉旨事當正色儼然而犯鱗唐文粹君子救時雖切必相時度力以致其用不可則靜而鎮之以道訓服司空表聖, WYG: 歸韓}
