  - {type: variant, offset: 1486, length: 2, content: 劉穆, WYG: 中書莊父齊太子詹事􅀢伯父司徒朏侍中敬三代五人為此郡謝𢎞子微微子莊莊子朏朏孫哲五世為侍中後魏宇文裘太尉子測少保深少師深子孝伯少冢宰又晉荀勗司徒子萍太保組太尉萍子遂太保皆三世四公後魏李沖沖子延寔延寔子彧又西魏長孫雅為太師子紹逺大司馬紹逺子覽大司徒皆三世三公北齊賀拔允為太尉弟勝為太師丘為太保勝堂弟仁為太師一門四人為三公後周于謹為太師二子寔為司空翼為太尉一門三人為三公唐蕭瑀子嵩華二子並為相張嘉禎子延賞延賞子宏靖又蕭復子寘寘子遘崔沔子祐甫祐甫子植並三世為相貞觀中顔師古相時勤禮三人皆𢎞文館學士開元中鄭齊景齊丘齊望兄弟並為著作郎裴諝為河南尹此官諝五世為}
  - {type: page-break, offset: 1486, content: '', id: KR3k0025_WYG_036-33b, image: WYG0931/WYG0931-0017d.png}
