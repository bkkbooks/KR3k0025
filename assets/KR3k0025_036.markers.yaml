  - {type: variant, offset: 3452, length: 0, content: '', WYG: 有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也誼居長沙卑濕自傷夀不得長乃為賦以自廣史虞翻放棄南方云犯上獲罪當長沒海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨以典籍自慰作易設象以占吉凶吳志齊髙帝敕劉祥曰我當原卿性命令卿萬里思愆乃徙廣州南史楊憑貶臨賀尉姻友憚累無往候者獨徐晦至藍田慰餞宰相權徳輿謂曰無乃為絫乎晦曰方布衣時臨賀知我今忍遽棄也有如公異時為奸邪譖斥又可爾乎徳輿嘆其直李夷簡表為監察御史晦}
  - {type: page-break, offset: 3452, content: '', id: KR3k0025_WYG_036-42a, image: WYG0931/WYG0931-0022a.png}
  - {type: page-break, offset: 3452, content: '', id: KR3k0025_WYG_036-42b, image: WYG0931/WYG0931-0022b.png}
  - {type: variant, offset: 3452, length: 0, content: '', krp: 有鵩飛入誼舍止于坐隅鵩似鴞不祥鳥也誼居長沙卑濕自傷夀不得長乃為賦以自廣史虞翻放棄南方云犯上獲罪當長沒海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨以典籍自慰作易設象以占吉凶吳志齊髙帝敕劉祥曰我當原卿性命令卿萬里思愆乃徙廣州南史楊憑貶臨賀尉姻友憚累無往候者獨徐晦至藍田慰餞宰相權徳輿謂曰無乃為絫乎晦曰方布衣時臨賀知我今忍遽棄也有如公異時為奸邪譖斥又可爾乎徳輿嘆其直李夷簡表為監察御史晦}
  - {type: variant, offset: 3453, length: 1, content: 湘, WYG: 謝夷簡曰君不負楊臨賀肯負國乎徳裕貶潮州著􅄒雜序數十篇號曰窮愁志其論𡨕數曰予自荆楚保釐東周于路出方城有隱者謂方城長曰此官人居守後二年南行萬里則知憾予者必因天譴譖予者乃自鬼謀雖抱至寃固不為恨唐書傳記殷浩被黜夷神委命雅詠不輟雖家人不見其流放之戚續晉陽秋殷中軍被廢在信安終日常書空作字揚州吏民尋義逐之竊視唯作咄咄怪事四字而已世說陸宣公至忠州土塞其門鹽菜由狗竇中端坐抄藥方兒姪亦罕與語丁用晦芸田録新繁縣有東湖李徳裕為宰日所鑿夜夢一老父曰某潛形其下幸庇之明府富貴今鼎來七九之年當相見于萬里外後于土中得一蟇徑數尺投之}
  - {type: page-break, offset: 3453, content: '', id: KR3k0025_WYG_036-43a, image: WYG0931/WYG0931-0022c.png}
