  - {type: variant, offset: 1045, length: 1, content: 西, WYG: 導主而令朝廷躭恱鄭聲臣之罪也帝從容謝之劉勝知善不薦聞惡不言隱情惜已自同寒蟬後漢龐統性好論人每所稱述多過其才人怪問之曰當今雅道陵遲善人少惡人多今拔十得五猶可以崇勵世教蜀志荀彧前後所舉皆命世大才終為卿相者十數人魏志凌寶移書大常薦同郡張贍曰方今太清闢宇四門啓鑰}
