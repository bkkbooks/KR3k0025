  - {type: variant, offset: 1270, length: 1, content: 禁, WYG: 改曰寵辱不驚考中上唐鑑陽城自署曰撫字心勞催科政拙考下下互見太守類唐臨自述其考曰形如死灰心若鐵石張說為中書令𤣥宗詔曰動惟直道累開獻替之誠言則不諛自得謨猷之體才望兼著理合褒陞考中上唐書傳記周李詳解褐鹽亭尉因考為録事所擠詳謂刺史曰録事持銓曹之權當要害之地為其妄褒貶耳若使詳秉筆頗亦有詞刺史遂授筆詳即書録事考曰怯斷大案好勾小稽自隠不清言}
