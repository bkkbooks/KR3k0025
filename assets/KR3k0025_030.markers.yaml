  - {type: variant, offset: 47, length: 0, content: '', WYG: 通典監察御史非因奏事不得入至殿庭望殿中侍御史以上從觀象門出若從天降唐㑹要唐法殿中侍御史遷拜及職事與侍御史相亞殿中為蘿蔔亦曰生薑雖辛辣而不為患賈言本草集南臺持斧杜牧崔徳融制暁趨天闕烏紗薄内直空臺古柏寒饒易憲府初收迹丹墀共拜嘉分行叅瑞獸傳㸃亂宫鴉義文本朝殿中侍御史掌言事分糾大朝㑹及朔望六叅官班序四朝志元豐詔殿中御史兼察事續㑹要皇祐中詔中丞孫抃舉御史抃舉吳中復或曰公平生不識中復何由知之抃曰昔人恥為呈身御史今我豈求識面臺官遂除殿中侍御史治平二年以范純仁為殿中侍御史吕大防為監察御史裏行皆内出姓名而命之實錄執法殿中俾專議論曲阜陳師錫制監察御史史大歴十四年監察御史分察尚書省六司號曰六察官興元元年以第一人察禮吏部第二人察兵工部第三人察户刑部唐志監察御史其一察官人善惡其二察户口流散帳籍隠没賦役不均其三察農桑不勤倉廪耗減其四察妖猾盜賊不事生業為私蠧害其五察徳行孝弟茂才異等藏器晦迹應時用者其六察黠吏豪宗兼并縱暴貧弱冤苦不能自伸者百官志髙季輔拜監察御史彈治不避權要本傳𤣥宗時有胡人言市船之利上命監察御史楊範臣偕往求之範臣奏曰夫御史天子耳目之官必有軍國大事臣雖觸冐炎瘴死不敢辭此特胡人眩惑求媚無益聖徳上慰諭而罷通典顔真卿為監察御史辯五原冤獄天方旱獄決乃雨郡人呼為御史雨韓思彦授監察御史直言當世得失髙宗夜召加二階郭𢎞霸自陳討徐敬業臣誓抽其筋食其肉飲其血絶其體武后大恱授監察御史時號四其御史韋思謙拜監察御史常曰御史出使不能動揺山岳震慴州縣為不任職又曰大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳姚崇用齊澣為監察御史彈劾違犯先風教當時}
