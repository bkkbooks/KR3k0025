  - {type: variant, offset: 14, length: 1, content: 山, krp: 太子國之儲副常侍無一尺詔書安知非挾奸邪今日之事有死而已堯}
  - {type: variant, offset: 16, length: 3, content: 辭土石, WYG: 敢爭桓典為侍御史常乗驄馬京都畏之為之語曰行行且止避驄馬御史張綱為侍御史安帝遣八使按行風俗綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸遂奏大將軍梁冀京師震􅋺楊秉拜侍御史京師咸稱其有宰相之才鄭據為侍御史上疏曰斗筲小吏擢在案視之官分當刺邪矯枉大駕屬車八十一乗皆尚書御史所載最後一乘懸豹尾注云侍御史載之後漢書劉暾轉侍御史武庫火尚書郎郭彰率百人自衛暾正色詰之彰怒曰我能截君角也暾勃然曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言晉本傳栁彧為侍御史上嘉之曰栁彧正色之士國之龜寳隋書唐李素立髙祖令授七品清要官所司擬雍州司户上曰此官要而不清擬秘書郎上曰此官清而不要遂授侍御史栁範為侍御史吳王恪好田獵範彈治之太宗曰權萬紀不能輔導恪罪當死範曰房𤣥齡事陛下猶不能諫止田獵豈宜獨罪萬紀王志愔為侍御史以剛鷙為治所居人吏畏讋呼為皂鵰温造授侍御史夏州節度李祐違詔進馬造彈之祐趨出待罪股戰流汗謂人曰吾夜踰蔡州城擒吳元濟未嘗心動今日膽落温御史王𢎞義遷侍御史始賤時求傍舎𤓰不與乃騰文言園有白兎縣集衆捕逐畦蓏無遺内史李昭徳曰昔聞蒼鷹獄吏今見白御史唐書傳記周御史亦謂之柱下史秦改為侍御史漢因秦制置十五員六典後漢亦有之掌察舉非法受公卿郡吏奏事有違失舉劾之二漢所掌五曹令曹印曹供曹尉馬曹乘曹豹尾之内便為禁省魏八人晉九人宋齊十人梁陳皆九人居曹糾察不法隋八人唐四人侍御史號臺端他人稱曰端公其知雜事者謂之雜端最為推劇食坐之南横設榻謂之南床例不出累月遷登南省}
