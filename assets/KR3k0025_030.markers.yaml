  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書記纂淵海卷三十宋潘自牧撰職官部御史臺經御史掌邦國都鄙及萬民之治令以賛冢宰周禮史太㣲三光之廷匡衛十二星藩臣西將東相南四星執法中端門史天官書御史大夫秦官佐上卿銀印青綬掌副丞相注云位次上卿職官周昌為御史大夫徙為趙相髙祖持御史大夫印弄之曰誰可以為御史大夫者熟視趙堯曰無以易堯遂拜御史大夫叔孫通起朝儀㑹長樂宫成置酒御史執法舉不如儀者輒引去張蒼秦時為御史大夫主柱下方書張湯為御史大夫舞文巧詆以輔法張敞弟武為梁相敞使吏送至關戒吏問武武曰梁國大都吏民凋敝且當以柱後惠文彈治之耳注應劭曰法冠也以纚裹鐵柱卷秦制執法服今御史服之謂之解廌貢禹為御史大夫潔白亷正經術通明有伯夷史魚之風華隂守丞嘉上封事言御史宰相之副九卿之右不可不選谷永上疏言御史大夫内承本朝之風化外佐丞相統理天下得其人則百姓欣嘉百僚恱服不得其人則王功不興朱博奏言髙祖時御史大夫位次丞相典正法度以職相叅縂領百官上下相監臨又曰臣願盡力以御史大夫為百僚率御史府中列柏木常有野烏數千棲宿其上晨去暮來號曰朝夕烏前漢書北魏崔暹為御史中尉上書移牒索御史監選不與及暹為僕射還索御史宋游道判云崔僕射昔在憲司籠架北省今居禮閣控制南司遂不與北史韋思謙進御史大夫性蹇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶奈何屈以狎之御史大夫李承嘉嘗召諸御史責曰近日御史言事不諮大夫禮乎蕭至忠曰故事臺中無長官御史人君耳目比肩事主得自彈事若先白大夫而許則彈大夫不知白誰也肅宗詔御史臺欲彈事不須進狀仍服豸冠唐書傳記御史周官有之戰國亦有御史皆記事之職至秦漢為糾察之任所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢謂之御史臺亦謂之蘭臺寺梁及後魏北齊或謂之南臺後周曰司憲隋唐皆曰御史臺龍朔改憲臺咸亨復故舊制鞠案禁繫委大理貞觀中中丞李乾祐以囚自大理徃來滋其姦乃奏於臺中置東西二獄以自繫劾開元復罷武后改御史臺為肅政臺置左右左以察朝廷右以澄郡縣二臺迭相糾正龍朔改為左右御史臺睿宗詔二臺並察京師太極元年廢右臺通典御史大夫司寺在司馬門内門無墊門制樹用梓板不起郭邑題曰御史大夫司寺漢官儀至徳後諸道使府叅佐皆以御史為之謂之外臺職林御史為風霜之任彈糾不法百僚震恐官之雄峻莫之比焉貞觀初以法理天下尤重憲官故御史最為雄要通典臺印隨從印左巡印右巡印監倉印監庫印監察印出使印凡八印唐臺義自唐初來歴五院惟二人李尚隠張延賞五院謂監察殿中侍御中丞大夫也南部新書御史故事大朝㑹則監察押班常叅則殿中知班入閣則侍御監奏含元殿最逺用八品宣政殿其次用七品紫宸殿最近用六品殿中得立五花塼綠衣用紫案褥之類號為七貴唐國史補御史臺臨制百司糾繩不法事簡則風憲自肅事煩則紀綱轉輕御史臺紀綱之地唐㑹要事總朝綱職司天憲中朝執憲之司四海繩違之地霜威掃地風憲收聲五代㑹要桂林風俗日日食蛙有來中朝為御史者朝士戯之曰汝之居非烏臺乃蛙臺也承平舊纂御史臺門北開蓋取肅殺就隂之義按鄴都故事云御史臺在宫城西南其門北開又譚賓錄曰或云是隋初移都之時兵部尚書李圓通}
