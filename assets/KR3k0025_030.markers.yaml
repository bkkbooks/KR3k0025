  - {type: variant, offset: 35, length: 2, content: 舟航, WYG: 冠六典注每出入行步侍御史在}
  - {type: variant, offset: 35, length: 2, content: 舟航, krp: 冠六典注每出入行步侍御史在}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 裏殿察兩院在柱外唐宣宗欲與韋宙好官拜侍御史職林侍御史為脆梨互見御史臺類集周興鐵柱漢制繡衣簪白筆以繩違取驄馬而明目故能出則督察萬里入則糾劾百僚司馬子瑞爰有貞柏徙植清臺麝條霜勁蠶葉風開始逢鵲喜終見烏來杜易簡侍御史㕔雙柏贊榮服繡衣寵簮白筆持斧埋輪豸角分輝孫樵御史吾耳目官也非清明勁正不泥不撓者安可使辯淑慝振紀綱廣吾之聰明焉白集王申伯制超升憲簡袁幹制峩峩鐵冠皛皛銀印元㣲之制匡拂時病磨切貴近杜牧髙元裕制鷙鳥得秋氣法星懸火旻劉禹錫憲府舊乗驄杜詩繡衣柱史何昻藏鐵冠白筆横秋霜李白本朝天禧置言事御史後乆不除慶歴復置蓋御史得兼諫職也㑹要又吕誨上言風憲糾繩百司刑名出入當舉劾若令判大理寺於體有妨許免處以横榻使叅中司横榻以異庶工簮筆以奏不法往貳中憲曲阜制際曉乘驄入九逵内朝簮筆坐前墀天家御史非凡格曽向崐崙服紫芝楊億班心突兀見長身東坡注云臺吏謂御史立處為班心殿中侍御史史魏大㑹殿中侍御史簮白筆側堦而坐上問此為何辛毗曰此謂御史舊時簮筆以奏不法豈如今者直備位但曠筆耳魏志宋游道為殿中侍御史臺中語曰見惡能討宋游道南史唐張行成為殿中侍御史糾劾不避威權太宗曰若行成朕自舉之無先容也行成常侍宴太宗語山東及關中人意有同異行成曰天子四海為家不容以東西為限是示人以隘矣帝稱善髙宗以雍州司士叅軍韋絢為殿中侍御史或疑非遷上官儀曰御史供奉赤墀下接武䕫龍簉羽鵷鷺豈雍州判佐比唐書傳記魏蘭臺遣御史二人居殿中伺察非法故曰殿中侍御史晉四人東晉二人}
