  body:
  - {type: variant, offset: 1, length: 0, content: '', WYG: 御史大夫欲向省便近故開北門裏行給事員外為合口椒殿中曰生薑侍御史為脆梨漸入佳味賈言忠監察本草集簡上霜凝筆端風起崔篆箴烏臺峻秩望總鐵冠蒼珮崇班威髙石室朱帷霧徹初停州縣之勞白簡霜飛宜屏權豪之氣蘇烟制御史府不以一職名官蓋總察三司典掌衆政元㣲之行髙允恭制漢家授署御史多以立秋蓋以風霜始嚴鷹隼初擊杜牧制稜稜直指烈烈方書蒼玉鳴珮繡衣登車元希聲詩御史府自中執憲暨察視之官皆顯秩也白集總憲度於朝端植風聲於天下栁文秦漢以降御史府莫不用剛果勁正之士維持紀綱季代而還埋輪破柱之徒絶不復出元㣲之行裴洼制前代有埋輪都亭之奏唐朝有戴豸正殿之劾杜牧行李蔚制彰善癉惡激濁揚清景雲詔糾慝繩違謬掌天憲文選盛府持青槖殊章動繡衣風連臺閣起霜就簡花飛蘇味道本朝御史大夫止為兼官中丞除正員外有知雜一員副中丞判臺事其屬有三院一曰臺院侍御史隷焉二曰殿院殿中侍御史隷焉三曰察院監察御史隷焉天禧中始置言事御史元豐三年李定請復六察於是以御史専領六察其後大正官名下除大夫以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史㑹要及四朝志仁宗宣諭宰臣曰諫官御史必用忠厚淳直通世務明治體之人以革浮薄之弊㑹要王素在憲臺風力甚勁時號獨擊鶻言行錄劉剴為御史言事貶蘇軾遺以詩有烏府先生鐵作肝之句世因目為鐵肝御史四朝國史白簡威猶凛青山興已濃柏臺霜氣夜凄凄風動琅璫月向低東坡擊彊如摧枯食檗不知苦御史威降霜行私不容粟山谷御史中丞經小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁周禮史漢元帝擢陳咸為御史中丞總領州郡奏事課第諸御史内執法殿中公卿以下皆畏憚之谷永疏曰薛宣前為御史中丞執憲轂下不吐剛不茹柔舉錯時當漢書光武特詔御史中丞與司𨽻校尉尚書令㑹並專席而坐故京師號曰三獨坐後漢書陳謙拜中丞執憲奉法多所糾正續漢書傅𤣥為中丞每有奏劾或值日暮則捧白簡整襟帶坐以待旦於是貴遊懾伏臺閣生風崔鴻為中丞明法直繩無所阿避周處為中丞正繩直筆權豪震肅晉書宋荀柏子為中丞立朝正色内外憚之南史江淹兼中丞彈劾不避權勢明帝曰自宋以來又復有嚴明中丞君今日可謂近世獨步梁中丞給威儀十人其八人武冠絳韝執青儀囊在前張緬為中丞號為勁直梁武帝遣圖其形於臺省以厲當官後魏御史中丞其出入千步清道與皇太子分道王公遜避李彪為中丞豪右屏跡髙祖謂羣臣曰吾之有李生猶漢之有汲黯也北史唐崔從氣貌孤峻立朝彈奏不避裴度為中丞用以自代髙元裕為中丞風望崚整武元衡遷中丞徳宗曰真宰相持平無私綱條悉舉狄兼謩遷中丞帝曰御史臺朝廷綱紀一臺正則朝廷治朝廷正則天下治牛僧孺遷中丞按治一法内外澄肅魏謩遷中丞發杜中立奸贓權戚縮氣舒元褒上疏曰元和長慶中中丞呵道不過半坊今乃至兩坊謂之籠街喝道但以崇髙自大盧奕懐慎之少子也與兄奐齊名父子三人為中丞清節不易唐書傳記周官小宰即御史中丞之任也漢御史有兩丞一曰中丞亦謂御史執法在殿中蘭臺掌圖籍秘書外督部刺史内領侍御史十五人受公卿奏事舉劾按章哀帝更中丞為御史長史光武復改中丞魏初改宫正後復故通典晉宋以中丞為臺主職林齊梁皆謂之南司後魏為御史中尉後周有司憲中大夫隋省中丞通典置大夫為臺主以治書侍御史二人代中丞之任唐髙宗復號中丞龍朔改司憲大夫咸亨復大事奏裁小事専達職林漢中丞故二千石為之或選侍御髙第執憲中司通典注江左中丞雖一時髦彦然膏粱名士猶不樂宋丞銅印墨綬進賢兩梁冠佩水蒼玉介幘絳朝服通典中丞周淩果毅有才孔顥有才能果勁不撓可御史中丞事山公唘事蘭臺之官監國得失論衡集辟車要秩非徳靡升專席雄班惟賢是屬唐制南憲右掖至於中臺我朝之極選元稹制提糾謬綱白集牛僧孺制執憲凖繩之司所以提振紀綱端肅内外薛存誠制有守者可以執憲無私者可以閑邪栁公綽制國朝自王義方後曠數百年憲署之舉咸無廢職然未有危言激論如此之章灼者也故權右震竦朝野喧騰傳冩彈文為之紙貴徐集江文蔚志煌煌天文宿星是環爰立執法其輝有煥執朝之綱秉國之憲鷹揚虎視肅清違慢憂責有在繩亦必直良農耘穢勿使能殖無禮是逐安措羽翼傅咸箴白簡光朝列彤騶出禁中褚亮本朝自中丞以下掌糾繩内外百官姦慝肅清朝廷綱紀大事則廷辯小事則奏彈兩朝志故事三院御史言事必先白中丞自劉子儀為中丞始榜臺中今後御史有言不須先白中丞至今如此歸田錄孔道輔為中丞論廢郭后事天下聳聞風采張昇為中丞仁宗曰張昇真可任風憲胡宗愈元祐中為中丞首進六事曰端本正志知難加意守法畏天王舉正論張堯佐一日領四史又狄青為樞密使力爭不能奪因請改言職上稱其得風憲之體慶歴二年召御史中丞賈昌朝侍講故事臺丞無在經筵者仁宗以昌朝長於講説特召之曏自禁林入都憲席胡文恭行張方平制憲席持綱亦資糾正栁植制侍御史史嚴延年遷侍御史劾霍光專廢立前漢書陳翔遷侍御史元日朝賀梁冀威儀不整請}
