  - {type: variant, offset: 650, length: 3, content: 隨材器, WYG: 對百官表嘉祐四年韓絳請置裏行從之熈寜三年除秀州推官李定權監察御史裏行用選人為御史自定始也職官分紀元豐三年詔御史專領六察又詔以三員分領察案三員專言事七年大正官名以言事官為殿中侍御史察官為監察御史八年詔監察御史兼言事續會要張錫為御史京師人曰張御史貌柔和而心剛正真御史也同上宋敏求繳李定詞頭云去嵗驟用京官今又幕職官便昇朝著峻處糾繩之地臣恐未厭衆議同上俾冠惠文往專刺督曲阜除傅楫制御史臺主簿史張忠署孫寳為主簿寳徙入舎祭竈請比鄰忠怪之}
