  - {type: variant, offset: 3935, length: 217, content: 上人不信有木大如魚漢武帝不識弦膠魏文帝不信火布胡人見錦不信有蟲食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬斛舟船北齊黃門侍郎顏之推顏氏家訓集野人有快炙背而美芹子者欲獻之至尊雖有區區之意亦已疏矣選嵇叔夜書食芹雖云美獻御固已癡韓文歸趙城詩老子之小仁義非毀之也其見者小也坐井而觀天曰天小者非天罪也韓文原道如龜居殼不知海寬白樂天集醯雞仰甕口亦謂雲漢津劉賓客集本朝俗傳書生入官庫見錢不識或問之曰生固知其為一作謂錢但怪其不在紙褁中耳百斛明珠, WYG: 卷九十八}
