  - {type: variant, offset: 2788, length: 778, content: 鴻鵠之一舉兮如山川之迂曲再舉兮睹天地之方圓安能以身之察察受物之汶汶者乎又安能以皎皎之白而蒙世俗之塵埃乎互入不隨人轉當代豈無騏驥見執轡者非其人遂足跳而遠去並同上鳳皇翔于千仞兮覽德輝而下之賈誼賦悲世俗之迫隘朅輕舉而遠遊司馬相如大人賦俯觀萬物擾擾焉如江漢之浮萍晉劉伶酒德頌振衣千仞崗濯足萬里流左太沖詠史詩狹世路之阨僻仰天衢而高蹈成公子安嘯賦高舉磨太清永絕矰繳懼儲光義文決巨壑摩太清塊視三山杯觀五湖李白鵬賦激三千以崛起搏九萬而迅征同上綿綿羅網冥冥高鴻趯趯竹竿穆穆幽龍其禍敗之遼絕胡越哉陳子昂集豈無朝陽鳳恥與微物爭元稹集互入知所愛重長居青雲路彈射無由緣劉賓客集求觀眾丘小必上太山岑求觀眾流細必泛滄海一作滇深韓文誰能駕飛車相從觀海水同上洞視萬古李漢韓文集序靈鳳不啄羶白樂天集黃鵠一去青冥無極柳文下視三界狹但聞五濁腥唐文粹優哉遵渚鴻自得養身旨不啄太倉粟不飲方塘水振羽搴浮雲置羅任從爾孟東野本朝高標不可揖杳若雲間鴻歐公冷看世間人東坡詩超逸絕塵獨立萬物之表馭風騎氣以與造物者遊東坡荅黃魯直書高蹈玩一世過秦漢之故都恣觀終南嵩華之高北顧黃河之奔流慨然想見古之豪傑至京師仰觀天子宮闕之壯與倉廩府庫城池苑囿之富且大也而後知天下之巨麗欒城集扶搖雲漢上睥睨千萬里同上一朝厭蝸角萬里騎鵬背王直方詩話高情如飛鴻未易握粟呼百斛明珠經獨學而無友則孤陋而寡聞記學記子子誠齊人也知管仲晏子而已矣孟公孫丑上陳仲子居於陵耳無聞目無見孟滕文公下少聞曰淺少見曰陋荀修身坎井之蛙謂東海之鱉曰吾跳梁乎井幹之上入休乎缺甃之崖赴水則接液一作掖持頤蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎莊秋水互入以己度人款啟寡聞款空也如空之聞所見小也莊達生昔者宋國有田夫常衣蘊黂以過冬暨春東作自曝於日不知天下之有廣廈燠室綿纊狐貉顧謂其妻曰負日之暄夫人莫知者以獻吾君將有重賞里之富室, WYG: 中}
