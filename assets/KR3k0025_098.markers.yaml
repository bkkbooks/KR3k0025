  - {type: variant, offset: 3906, length: 6, content: 序釋氏戒世人, WYG: 圗賛本朝嘴長毛短淺含臕久向山中食藥苗蒸處已將蕉葉褁熟時兼用杏漿澆紅鮮雅稱金盤飣軟熟真堪玉筋挑若把毡根來比並毡根自合喫藤條仇池筆記猫經有猫有虎詩迎猫為其食田䑕也禮子使牛捕䑕不如猫性之捷尹文子史高宗廢王后立武后良娣罵曰願得一日為猫阿武為䑕吾扼其喉以報今日即足矣武后聞之不恱約六宫不許畜猫朱泚軍中有猫乳䑕者泚獻之為祥崔祐甫獨不賀曰禮云迎猫為其食田䑕也以其除害故列祀典今反乳之是謂失常故不敢賀唐書傳記猫目睛旦暮圎及午豎歛如綖其鼻端常冷唯夏至一日暖俗言猫洗面過耳則客至一名蒙貴一名烏圚雜爼集司徒北平王家猫有生子同日者其一母死焉有二子飲於死母母且死其鳴咿咿其一方乳其子若聞之起而若聽之走而若救之銜其一置其棲又往如之反而乳之若其子然噫亦異之大者夫猫畜也非性於仁義者也其感於所畜者乎韓文本朝夫養猫以去䑕}
