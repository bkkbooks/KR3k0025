  - {type: variant, offset: 3697, length: 6, content: 寸鮹汎跡濫水, WYG: 史范蠡遺大夫種書狡兔死走狗烹范雎説秦昭王曰夫以秦而治諸侯譬猶縱韓盧而摶蹇兔也高祖詔齊捕蒯通通至上曰若教淮隂侯反乎對曰跖狗吠堯堯非不仁犬固吠非其主史記岑熈為魏郡太守輿人歌之曰吠狗不驚足下生􅈊靈帝於西園弄狗著進賢冠帶綬後漢書昌邑王弄狗冠方山冠龔遂曰王之左右皆狗而冠續漢書杜預有癭疾初攻吳吳人憚其智以瓠繫狗頸而示之預恨之及平吳盡殺其狗晉書張彪敗後唯常所養一狗在彪左右及彪被害黄倉皥叫寃轉血中隋書傳記狗四尺為獒爾雅犬狗之有懸蹄者也尨犬之多毛者也狗叩也叩氣吠以守也説文盧韓良犬也促音鵲宋良犬也􅜏逐虎犬也字林殷虞晉獒楚茹黄韓盧宋鵲並犬屬廣雅狗斗精之所生也宋均注高辛氏時犬戎為亂帝曰有討之者妻以美女帝之狗名槃瓠亡三月而殺犬戎以其首來帝以女妻之生男為狗生女為美人封為狗氏國𤣥中記晏子短使楚楚人為門於大門側延晏子晏子曰使狗國者從狗門入今使楚不當從此門入晏子春秋荆王得茹黄之狗以畋雲夢吕氏春秋一犬吠形百犬吠聲潛文論陸機有犬名黄耳機羇官京師久無家問戯問犬曰汝能齎書馳還取消息不犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬徑至機家口銜竹筒作聲示人機家開筒取書作答内竹筒中復繫犬頸仍馳還洛述異記㑹稽張然滯役不歸婦與奴私通然養一狗名曰烏龍後歸奴與婦謀殺然狗注晴䑛脣視奴然呼烏龍狗即應聲盪奴奴失刀伏然取刀殺奴續搜神記集猛犬狺狺而迎吠兮關梁閉而不通楚辭毛踰紫豔光雙眉如白璧時頻伸而振迅若應龍之騰擲爪類刀戈牙如劍㦸賈岱宗足懸鈎爪口含表牙首類驤螭尾如騰蛇勢似凌青雲目若泉中星轉視流光采曜赤精付𤣥本朝烏啄本海􅋙幸我為之主食餘已瓠肥終不憂鼎爼晝馴識賓客夜悍為門戸知我當北還掉尾喜欲舞跳踉趂僮僕吐舌喘汗雨長橋不肯躡徑渡清深浦拍浮似鵝鴨登岸劇虓虎盜牛亦小疵鞭䇿當貫汝再拜主謝恩天不遣言語何當寄家書黄耳定乃祖東坡豕經豶豕之牙吉睽孤見豕負塗羸豕孚蹢躅坎為豕易一發五豝一發五豵有豕白蹢詩豕望視而交睷腥周禮豕曰剛鬛豚曰腯肥天子以彘嘗麥禮記齊侯田于具丘見大豕從者曰公子彭生也公怒射之豕人立而啼昔有仍氏生女后䕫取之生伯石實有豕心謂之封豕衛靈公為夫人南子召宋朝太子過宋野人歌之曰既定爾婁豬盍歸吾艾豭左傳子陽貨闞孔子之亡也而饋孔子烝豚孟子孔子窮於陳蔡之間子路享豕孔子不問肉所從來而食之墨子朔人獻燕昭王以大豕曰今年百二十矣人謂豕仙王命冡宰養六十五年其重千鈞燕相謂王奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生蔣子祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾將三月犧汝七日戒三日齋藉白茅加汝肩尻乎雕爼之上則汝為之乎為彘謀曰不如食以糟糠而錯之牢筴}
