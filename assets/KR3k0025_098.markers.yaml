  - {type: variant, offset: 467, length: 0, content: '', krp: 劉瑀圗侍中不得與偃同從郊祀時偃乗在前瑀䇿駟居後瑀謂偃曰君轡何疾曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥罹於羈絆所以居後偃曰何不着鞭使致千里答曰一蹙造青雲何至與駑駘争路宋書齊太祖乘嘗所騎赤馬入殿及踐祚號此馬為龍驤將軍齊書吐谷渾有青海中有小山其俗至冬輙放牝馬於其上言得龍種嘗得波斯草馬放入海因生騘駒日行千里故世稱青海驄隋書貞觀十三年廏産白馬朱鬛骨利幹遣使獻良馬十疋太宗為之制名號為十驥一曰騰霜白二曰皎雪騘三曰凝露驄四曰懸光驄五曰决波騟六曰飛霞驃七曰發電赤八曰流金駉九曰翔麟紫十曰奔虹赤天寶中皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒身有鱗而不生毛時有慶雲五色覆馬上久而不散}
