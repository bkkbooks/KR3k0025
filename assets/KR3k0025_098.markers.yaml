  - {type: variant, offset: 14, length: 0, content: '', WYG: 雉兔淮南子傳記麋鹿屬也冬至解角説文瑤光星散為麋春秋運斗樞晉文公逐麋而失之問農夫古老對曰虎豹厭閒而近人故得魚鼈厭深而之淺故得諸侯厭衆而匹}
  - {type: page-break, offset: 14, content: '', id: KR3k0025_WYG_098-26b, image: WYG0932/WYG0932-0791b.png}
  - {type: variant, offset: 14, length: 0, content: '', krp: 雉兔淮南子傳記麋鹿屬也冬至解角説文瑤光星散為麋春秋運斗樞晉文公逐麋而失之問農夫古老對曰虎豹厭閒而近人故得魚鼈厭深而之淺故得諸侯厭衆而匹}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 國文公悦欒貞子問其故公曰今日逐麋失之而得善言故忻也新序魏文帝將受禪有白麋見魏略本朝野麋循杖屨東坡麞子山中稱赤吏者麞也抱朴子史後魏廣平王懐嘗逐一麞入草命人圍遶將自射之失麞所在惟有塼塔存焉懐乃悵然動仁恕之心遂不獵北史傳記麞一名􅍪青州人謂􅍪為麞古今注樞星散為麞春秋運斗樞宋元嘉十五年華林園麞生二子文帝又獲青麞瑞應圖咸寧中白麞見魏郡晉起居注劉幡射得一麞剖肚臟以草塞之蹷然起走拔塞還倒如此三焉後以此草治傷痍多愈異苑本朝市人拍手笑狀如失林麞東坡何處驚麏觸禍機煩}
