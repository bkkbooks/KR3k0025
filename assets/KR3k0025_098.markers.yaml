  - {type: variant, offset: 470, length: 0, content: '', WYG: 馬春秋説題辭徳至山陵則澤出神馬孝經援神契飛飛鴻野麋娥鹿騶吾走狐桃􅷪金喙馬屬也廣雅龍媒騕䮍並駿馬名駑駘欵段並羸馬名六帖玉馬者王者清明尊賢則至乘黄者王者輿服有度則闕者神馬也與飛同以明君有徳也飛兔者日行三萬里禹治水土天應其徳則至駃蹄者后土之獸也王者仁孝於民則出龍馬者仁馬河水之精也有明王則見瑞應圖周穆王馭八龍之駿名曰絶地翻羽奔霄越影踰暉超光騰霧挾翼曹洪與魏武帝所乗之馬名曰白鶴時人諺曰憑空虛躍曹家白鶴拾遺記秦始皇有七名馬一曰追風二曰白三曰躡影四曰追電五曰飛翮六曰銅雀七曰晨鳬古今注漢文帝有良馬九疋名曰浮雲赤電絶羣逸驃紫鷰緑耳青騘龍子驎駒絶塵號為九逸西京雜記苻堅遣使西域於是大宛獻千里駒皆汗血朱鬛五色鳯膺麟身堅命羣臣作止馬詩遣之載記吕布有駿馬名赤常騎乘之時人為之語曰人中有吕布馬中有赤兔曹暪傳夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而羃之驥於是俯而噴仰而鳴聲逹於天欣伯樂之知己也戰國䇿集太乙貺天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲䁆上馳體容與迣萬里今安匹龍為友天馬來從西極涉流沙九夷服天馬來歴無草經千里來東道天馬來開逺門竦予身逝崑崙天馬來龍之媒遊閶闔登玉臺漢書世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬秖辱於奴𨽻之手駢死於皁櫪之間不以千里稱也馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足材美不外見且欲與常馬等不可得安求其能千里也騏驥生絶域自稱無匹儔飢食玉山禾渇飲醴泉流飛黄騰踏去不能顧蟾蜍韓文胡馬顧朔雲躞蹀長嘶鳴天馬來出月支窟背為虎文龍翼骨嘶長雲振緑髪蘭筋權竒走滅沒騰崑崙歴西極四足輕翻無一蹶鷄鳴刷燕晡秣越神行電邁躡恍惚天馬呼騰飛龍趨目明長庚臆雙鳬尾如流星首渇烏口噴紅光汗流珠曽陪時龍躍天衢羇金絡月照皇都逸氣稜稜凌九區白璧如山誰敢沽回頭笑紫燕但覺爾輩愚天馬奔突戀君軒竦躍驚矯浮雲翻萬里足躑躅遙瞻閭闔門不逢寒風子誰採逸景孫困負鹽車上峻坂倒行逆施畏日晩伯樂翦拂中道遺少盡其力老棄之願逢田子方惻然為我悲雖有玉山禾不能療苦飢嚴霜五月凋桂枝伏櫪銜寃摧兩眉請君贖獻穆天子猶堪弄影舞瑤池紫騮行且嘶雙翻碧玉蹄緑驥本天馬素非伏櫪駒六駮食猛武恥從駑馬羣醉騎白花駱西走邯鄲城李白驊騮老大腰䮍清新魚目瘦腦龍文長身雪垂白肉風蹙蘭筋逸態蕭疎高驤縱恣四蹄雷電一日天池瞻彼駿骨實維龍媒蕭蕭千里馬箇箇五花文竹批雙耳峻風}
