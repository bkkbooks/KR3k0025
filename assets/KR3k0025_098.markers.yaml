  - {type: variant, offset: 448, length: 0, content: '', krp: 夜驚恐漢書王浚據幽州有狐踞府門躍入㕔事後浚果敗晉書傳記狐水神也韓詩外傳狐妖獸也鬼所乘也有三徳其色中和小前大後死其首丘説文白狐至國民利春秋潛潭巴君乗火而王政平南海輸以文狐禮斗威儀青丘之國有狐而九尾黒水上有𤣥狐蓬尾山海經狐者先古之淫婦也其名曰紫紫化而為婦故其名自稱阿紫名山記楚宣王以昭奚恤為相問羣臣曰吾聞北方畏昭奚恤何如江乙對曰虎求百獸而食之得狐狐曰天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先行子隨我後觀百獸見我能無走乎虎隨狐而行百獸見之皆走虎不知獸之畏已以為畏狐也今王地方千里帶甲百萬而任之昭奚恤北方非畏奚恤其實畏王之甲兵也春秋後語夏侯藻母病將詣淳于智卜有一狐當門向之嘷藻馳詣智智曰其禍甚急君速歸在嘷處樹下啼哭家人驚怪大小畢}
  - {type: variant, offset: 449, length: 0, content: '', WYG: 一人不出啼哭勿休藻如其言母亦扶疾而出家人既集堂屋五間拉然崩搜神記集青丘竒獸九尾之狐有道祥見出則御書作瑞}
