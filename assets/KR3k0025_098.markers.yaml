  - {type: variant, offset: 447, length: 0, content: '', WYG: 之狡兔也韓子盧逐東郭逡環山者三騰山者五兔極於前犬疲於後各死其處田父見而獲之春秋後語睦固屯於射犬巫戒之曰將軍本名白兔見犬必驚不宜屯此固不從司空曰入犬城旦當取遂進軍擊平之漢獻春秋桓温有參軍夜坐忽見屋梁棟間有一伏張目切齒而向之引刀斫之正中於兔而實及其膝幽冥録集𢷬藥兔長生此時瞻白兔直欲數秋毫杜詩譬如兔得所安用東西跳韓文衣褐之徒缺口而長鬚七竅而趺居毛頴傳本朝毛氏頴出中山中衣白褐求文公文公嘗為頴作傳使頴名字傳無窮可笑姮娥不了事却走玉兔來人間月中辛勤莫𢷬藥桂傍杵臼今應閒梅聖俞兔生明月月在天玉兔不能久人間六一集奔滄海來却入明月窟秦少㳺東郭阿㕙駝褐裳清馥不著煙花香姮娥喚入廣寒殿詔許𢷬藥不許嘗偷將缺吻吸瓊漿蜕盡骨毛作仙子誠齋狐經田獲三狐得黄矢小狐汔濟濡其尾易莫赤匪狐詩狐死正丘首仁也記子狐隂陽之變六月而一見管子狐白之裘非一狐之腋慎子史陳勝吳廣於所次旁叢祠夜篝火狐鳴呼大楚興陳勝王卒}
