  - {type: variant, offset: 447, length: 0, content: '', krp: 之狡兔也韓子盧逐東郭逡環山者三騰山者五兔極於前犬疲於後各死其處田父見而獲之春秋後語睦固屯於射犬巫戒之曰將軍本名白兔見犬必驚不宜屯此固不從司空曰入犬城旦當取遂進軍擊平之漢獻春秋桓温有參軍夜坐忽見屋梁棟間有一伏張目切齒而向之引刀斫之正中於兔而實及其膝幽冥録集𢷬藥兔長生此時瞻白兔直欲數秋毫杜詩譬如兔得所安用東西跳韓文衣褐之徒缺口而長鬚七竅而趺居毛頴傳本朝毛氏頴出中山中衣白褐求文公文公嘗為頴作傳使頴名字傳無窮可笑姮娥不了事却走玉兔來人間月中辛勤莫𢷬藥桂傍杵臼今應閒梅聖俞兔生明月月在天玉兔不能久人間六一集奔滄海來却入明月窟秦少㳺東郭阿㕙駝褐裳清馥不著煙花香姮娥喚入廣寒殿詔許𢷬藥不許嘗偷將缺吻吸瓊漿蜕盡骨毛作仙子誠齋狐經田獲三狐得黄矢小狐汔濟濡其尾易莫赤匪狐詩狐死正丘首仁也記子狐隂陽之變六月而一見管子狐白之裘非一狐之腋慎子史陳勝吳廣於所次旁叢祠夜篝火狐鳴呼大楚興陳勝王卒}
  - {type: variant, offset: 448, length: 0, content: '', WYG: 夜驚恐漢書王浚據幽州有狐踞府門躍入㕔事後浚果敗晉書傳記狐水神也韓詩外傳狐妖獸也鬼所乘也有三徳其色中和小前大後死其首丘説文白狐至國民利春秋潛潭巴君乗火而王政平南海輸以文狐禮斗威儀青丘之國有狐而九尾黒水上有𤣥狐蓬尾山海經狐者先古之淫婦也其名曰紫紫化而為婦故其名自稱阿紫名山記楚宣王以昭奚恤為相問羣臣曰吾聞北方畏昭奚恤何如江乙對曰虎求百獸而食之得狐狐曰天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先行子隨我後觀百獸見我能無走乎虎隨狐而行百獸見之皆走虎不知獸之畏已以為畏狐也今王地方千里帶甲百萬而任之昭奚恤北方非畏奚恤其實畏王之甲兵也春秋後語夏侯藻母病將詣淳于智卜有一狐當門向之嘷藻馳詣智智曰其禍甚急君速歸在嘷處樹下啼哭家人驚怪大小畢}
