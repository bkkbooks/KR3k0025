  - {type: variant, offset: 450, length: 2, content: 林甫, WYG: 周以標靈符郭璞贊古冢有狐妖且老化為婦人顔色好頭變雲鬟面變粧大尾曵作長紅裳徐徐行旁荒村路日欲暮時人静處或歌或舞或悲啼翠眉不舉花顔低忽然一笑千萬態見者十人八九迷狐假女妖害猶淺一朝一夕迷一眼女為狐媚害即深日長月長溺人心白居易本朝妖狐憑莽蒼六一集老狐宅城隅涵養體豐大不知窟穴處草木但晻靄秋食承露禾夏飲灌園𣲖暮夜出旁舍鷄畜遭横害晩登睥睨鳴呼吸召百怪乆矣縱凶妖一旦果禍敗皮為榻上藉肉作盤中膾蘓文説􅁐曰臣未見稷狐見攻社䑕見燻稷狐二字甚竒且新容齋隨筆狸經狸首之班然狸去正􅆃禮子變則豹揚子狸頭似䑕以類推也淮南子史徐季龍獵令管輅筮其所得輅曰當獲小獸雖有爪牙㣲而不彊雖有文章蔚而不相非虎非雉其名曰狸魏志樂廣為河南尹官舎多妖怪廣居之不疑嘗外戸自閉左右皆驚廣獨為顧見有牆孔掘得狸而殺之其怪亦絶晉書傳記狸子􅡐爾雅狸伏獸也説文曽子鼓琴墨子立外而聽之曲終入曰善哉鼓琴身已成矣而曽未得其首也曽子曰吾夢一狸見其身而不見其頭起而為之弦因曰殘形琴操董仲舒下帷講誦有客來詣舒知其非常客又云欲雨舒戱曰巢居知風穴居知雨卿非狐狸則是鼷䑕客遂化為老狸也幽㝠録集有獸維狸兮我夢得之其身孔明兮而頭不知吉凶何為兮覺坐而思巫咸上天兮識者其誰韓文琴操本朝首如狸尾如牛攀條捷險如猱猴橘柚為漿栗為餱筋肉不足為膏油蘓子由狐公韻勝氷玉肌字則未聞名季狸誤隨齊相燧牛尾䇿勲封作糟丘子山僮相傳皂衣郎字曰季狸氏竒章白茅面縳來獻俘𤣥端貂裘瓠肥白解驂薦渠登相門立談封作糟丘君誠齋壓糟玉面天涯見琢雪庖霜照眼明朱喬年獺經孟春獺祭魚記子愛獺而飲之酒欲養之而非其道淮南子傳記獺如小狗水居食魚説文南蠻皆用獺為其冠魏畧水有獱獺而池勞鹽鐡論樊夫人者劉䌉之妻也俱行道術䌉唾槃中水即作鯉魚夫人乃唾槃中使成獺而食魚神仙傳吕球乗船泊菰際見一少女乘船采菱舉體皆衣荷葉因問汝非鬼耶衣服何至如此女答云子不聞荷衣兮蕙帶倐而來兮忽而逝乎球射之即獲一獺船皆是蘋蘩藴藻之葉幽㝠記集有獺得嘉魚自謂天見憐先祭不敢食捧鱗望清𤣥人立寒沙上心}
