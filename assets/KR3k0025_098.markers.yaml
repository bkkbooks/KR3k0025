  - {type: variant, offset: 475, length: 6, content: 揆有才望盧杞, WYG: 公孫軌調雍州軌令驢主皆加絹一百疋乃與受之百姓語曰驢無弱負絹自壯衆共嗤之北史傳記驢似馬長耳也説文王仲宣好驢鳴既葬魏文帝臨其喪顧語同遊曰王好驢鳴可各作二聲以送之赴客皆作驢鳴世説凡人相罵曰死驢醜}
