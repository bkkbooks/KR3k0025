  - {type: variant, offset: 471, length: 3, content: 蕃會盟, krp: 四蹄輕渥洼騏驥兒無異是龍脊雄姿逸態何崷崪顧影驕嘶自矜寵魚目青熒夾鏡懸肉騣碨􅓓連錢動赤汗㣲生白雪毛銀鞍却覆香羅帕雄姿未受伏櫪恩猛氣猶思邊戰利五花散作雲滿身萬里方看汗流血頭上鋭耳批秋竹脚下高蹄削寒玉杜詩本朝世無伯樂良可嗤千金市馬惟市肥騏驥伏櫪兩耳垂夜聞秋風仰秣嘶一朝絡以黄金羇旦别呉越暮燕陲六一集想見開元天寳年四十萬匹如雲煙騅駓駰駱驪騮騵白魚赤騂皇䮧龍鸕鳯頸獰且妍竒姿逸徳隠駑頑碧眼胡兒手足鮮嵗時剪刷供帝閑柸枹臨池待三千紅光照日光流囦樓下玉螭吐清寒往來蹙踏生飛湍金羈玉勒綉雕鞍鞭箠刻絡傷天全王良挾䇿飛上天何必俯首伏短轅天馬飛來從西極勢與落日争分馳龍膺豹股頭八尺奮迅不受人間羈元狩虎脊聊可友開元玉花何足竒沙苑茫茫蒺藜秋風駿霧鬛寒颼颼天廏新頒玉鼻騂金鞍冒雪錦玉勒垂青絲東坡驢史靈帝駕四白驢親自操轡驢者服重致逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒置凡執政者皆如驢焉薊子訓投主人家停其驢忽死訓曰無若遂往驢邊舉杖驢忽走起戴良其母喜驢鳴常學之以娛樂後漢書王濟卒孫楚哭之甚悲向靈牀曰卿常好我作驢鳴我為卿作之賓客皆笑王導謂諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也晉書初太武將北征發驢以運糧}
