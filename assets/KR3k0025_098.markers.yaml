  - {type: variant, offset: 2, length: 1, content: 忘, krp: 已不分充嗛果腹兮驕傲驩欣嘉華美木兮願而繁羣披齒競齧兮枯株根毁成敗實兮更怒喧居民厭苦兮號窮旻栁文贈王孫為寄小如拳預哂愁胡面杜詩本朝聞説獼猴性頗靈相車來便滿山迎鞭羸到此何曽見始覺毛蟲更世情程明道逰山山僧云晏元獻南來獼猴滿野真宜少陵覔未解栁州憎婢喜常儲果奴顛屢掣繩山谷猩猩經猩猩能言不離禽獸禮子猩猩能言笑亦二足無毛而君子啜其羮食其胾故人非以二足無毛以知禮也荀子猩猩知往而不知來知人姓字此知往也醉以擒身此不知來也淮南子史封溪縣有獸曰猩猩體似猪面似人音作小兒啼聲既能語又知人姓名人以酒取之猩猩覺初暫嘗之得其味甘而飲之終見羈纓也蜀志設裴炎曰里人以酒并糟於路側織草為履更相連結猩猩見之則知張者祖先姓字及呼名云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲其味逮乎醉因取履而著之乃為人之所擒傳記永昌郡有猩猩能言其血可以染朱罽華陽國志伊尹説曰肉之美者猩猩之脣吕氏春秋猩猩猿形人面顔容端正學人語若與交聞者無不歔欷其肉食之窮年無厭可以辟穀酈道元水經注集猩猩似狐走立行伏懐木挺刃少辛明目山海經贊能言之獸是謂猩猩厥狀似貛號音若嬰自然知往頗測物情郭璞賛夫財色名利溺人也豈若猩猩好酒乎爵賞禄位羈人也曷若猩猩愛履乎饕餮致禍飾辭覬免者曷若猩猩推肥乎蘊利生孽死而無悔者曷若猩猩含血乎爾形惟猿爾面惟人言不忝面智不踰身淮隂佐漢李斯相秦曷若箕山以全吾身裴炎本朝愛酒醉魂在能言機事疎來生㡬兩履身後五車書物色看王㑹勲勞足石渠拔毛能濟世端為謝楊朱正以多知巧言語故應來作管城}
  - {type: variant, offset: 4, length: 2, content: 附挾, WYG: 山谷􅍛􅍛傳記􅍛􅍛如人被髮迅走食人爾雅􅍛􅍛一名梟羊北方謂之上螻説文􅍛􅍛如人面唇黒身有毛反踵見人則笑笑上脣掩目俗呼為山都山海經集􅍛􅍛怪獸被髪操竹獲人則笑脣盖其目終亦號咷反為我戮山海經贊猩猩啼而就禽􅍛􅍛笑而被格呉都賦鹿經即鹿無虞易野有死鹿呦呦鹿鳴麀鹿麌麌甡甡其鹿麀鹿攸伏麀鹿濯濯詩仲夏鹿角解記鹿死不擇音鋌而走險急何能擇譬如捕鹿晉人角之諸戎掎之左傳子鄭人有薪於野者遇駭鹿却而擊之斃藏諸隍中覆之以蕉俄而遺其所藏之處遂以為夢焉沿塗而詠其事傍人有聞者用其言而取之告其室人曰向薪者夢得鹿而不知其處吾今取之列子民如野鹿莊子鹿走而無顧六馬不能望其塵尸子鹿夀千嵗滿五百歳則其色白抱朴子史趙高欲為亂持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬史記蒯通曰秦失其鹿天下共逐之漢書雲南縣有神鹿兩頭食毒草范曄後漢鄭𢎞為臨淮太守行春兩白鹿隨車俠轂而行謝承後漢謝鯤在豫章嘗行居空亭中夜宿將晩有黄衣人呼鯤字鯤無懼色便於窓中度手牽之膊斷視之鹿也尋血獲焉爾後此亭無復妖怪晉書扶南有鹿車國人養鹿如中國畜牛以乳為酪南史四夷傳太宗狩於濟源之陵山曰古者先驅以奉宗廟今所獲鹿宜令有司造脯醢以充薦享唐書傳記䴥牡鹿也夏至解角􅀢鹿􅀢也􅀢鹿迹也麛鹿子也􅀢鹿之絶有力也麠大鹿也説文周穆王征犬戎得四白鹿天子賜曹奴之人黄金之鹿白銀之麋穆天子傳晏子曰鹿生於山命懸於厨吕氏春秋瑤光星散為鹿春秋運斗樞夫鹿者能夀之獸五色光暉瑞應圖夏禹之時神鹿行於河水金樓子武帝時有殺上林鹿者下有司收殺之朔時在旁曰是固當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急須鹿觸之三當死帝黙而赦之東方朔别傳魏明帝母甄后妬文帝殺之嘗從帝獵見鹿子母帝射鹿母語明帝射鹿子明帝曰陛下既已殺其母吾不忍復殺其子因大泣由是立為太子魏本傳漢成帝末年宫中雨一蒼鹿殺而食之味甚美鹿一千年為蒼鹿又五百年化為白鹿又五百年為𤣥鹿漢成帝時山中人得𤣥鹿烹而視其骨皆黒色餘干縣有白鹿土人皆傳千歳矣晉成帝時遣人捕得鹿有銅牌字在其角後云寶鼎二年臨江所獻述異記集白鹿麕麚兮或騰或倚楚辭樹深時見鹿李白走鹿無反顧春草鹿呦呦杜詩鹿鳴驗食野方託麋鹿羣栁文本朝山深聞鹿呌呦呦山鹿鳴六一集仙子去無蹤故山遺白鹿仙人已去鹿無家孤棲悵望曽城霞至今聞有逰洞客頻來江市呌平沙夜鳴白鹿安在哉滿山秋草無行迹東坡麋經獸人夏獻麋周禮仲冬麋角解記莊}
