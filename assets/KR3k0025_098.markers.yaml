  - {type: variant, offset: 484, length: 0, content: '', WYG: 黒牛生白犢以問孔子孔子曰吉祥也以享上帝居一年其父無故而盲牛復生白犢其子又無故而盲其後楚攻宋圍其城民易子而食之析骸而炊之丁壯皆乘城戰死此人以父子有疾皆免及圍解而疾俱復列子今夫氂牛其大若垂天之雲此能為大矣而不能執䑕庖丁為文惠君解牛曰臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚而入有間恢恢乎其於逰刃必有餘地矣或聘於莊子莊子曰子見夫犧牛乎衣以文繡食以芻菽及其牽入於太廟雖欲為孤犢其可得乎莊子剥牛皮鞹以為鼔正三軍之衆然為牛計者不若服軛也淮南子史騎刼攻即墨田單用牛千頭縳刃其前結火其尾穿城而出牛燕師夜大驚所觸皆死燕師大敗遂收齊城史記丙吉問牛喘龔遂使民賣劍買牛賣刀買犢西漢書漢光武初起騎牛殺新野尉乃得馬劉寛嘗行有人失牛者乃就寛車中認之寛無所言有頃認者得牛而送還叩頭而謝寛曰物有相類事容脱誤幸勞見歸何為謝之後漢書蔣琰曽夢牛頭流血問於趙直直曰牛角及口公字也血者事明也夢吉矣蜀志羊篇祜之姪也歴官清慎有私牛於官舍産犢及還而留之郭舒嘗有鄉人盜食舒牛事覺來謝舒曰卿飢所以食牛耳餘肉可共啖之王濟性豪侈王愷有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之濟一發破的因趣左右探心作炙一啖而去晉書禇彦回父湛之有牛墜井湛之率左右營救彦回下簾不視顧憲之為建康令有盜牛者與本主争牛憲之乃令解牛任其所去牛徑還本宅盜者伏其罪宋書牛宏有弟曰弼嘗因醉射殺宏車牛還宅其妻曰叔射殺牛矣宏聞之無所怪隋書傳記牛經自寗戚傳百里奚漢世河西薛公得其書至魏世髙堂生傳晉高祖宣皇帝後王愷秘其書相牛經使烏獲疾引牛尾絶力殫而牛不行逆也使五尺豎子引其綣而恣所之順也吕氏春秋堯讓天下於許由由逃之巢父聞而洗耳於池濱樊仲父牽牛飲之見巢父洗耳乃驅牛而還恥令牛飲其下流逸士傳秦穆公見百里奚牛肥問何以致也對曰臣飲食以時}
