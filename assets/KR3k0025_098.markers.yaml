  - {type: variant, offset: 459, length: 2, content: 通監, krp: 為善鳴為馵足為作足為的顙其於馬也為亟心為下首為薄蹄為曵易歸馬于華山之陽書我馬虺隤我馬𤣥黄騋牝三千兩服上驤兩驂鴈行駟鐡孔阜六轡在手騏駵是中騧驪是驂皎皎白駒在彼空谷駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄有騅有駓有騂有騏有驒有駱有駵有雒有駰有騢有驔有魚詩馬質掌質馬校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物趣馬掌賛正良馬而齊其飲食簡其六節巫馬掌養疾馬而乗治之庾人掌十有二閑之政教圉師掌教圉人養馬圉人掌養馬芻牧之事周禮大夫士下公門式路馬乘路馬必朝服步路馬必中道以足蹙路馬芻有誅齒路馬有誅春駕蒼龍夏駕赤駵秋駕白駱冬駕鐡驪禮晉恵公乘小駟慶鄭曰今乘異産以従戎事及懼而變將與人易亂氣狡憤隂血周作張脉憤興外强中乾進退不可周旋不能宋人以文馬百駟贖華元于鄭冀之北土馬之所生無興國焉衛侯來獻其乘馬曰啓服}
  - {type: variant, offset: 462, length: 1, content: 紀, WYG: 成公有兩肅爽馬宋公子地有白馬四公嬖曰魋魋欲之公朱其尾鬛以與之左傳晉獻公將伐虢荀息請以屈産之乘垂棘之璧假道於虞公曰此晉寳也荀息曰是取中府藏外府取中廏藏外廏也晉舉虞荀息牽馬操璧而前曰璧則猶是而馬齒加長矣穀梁傳驥不稱其力稱其徳也論語子穆王命駕八駿之乘右服驊騮而左緑耳右驂赤驥而左白􅠋次車之乗右服渠黄而左踰輪右驂盗驪而左山子秦穆公謂伯樂曰子之年長矣子姓有可使求馬者乎伯樂對曰良馬可以形容筋骨相也天下之馬者若滅若沒若亡若失臣之子皆下才也臣有所與九方臯其於馬非臣之比也穆公見之使行求馬三月而反報曰已得之矣在沙丘牝而黄公使人徃取之牡而驪公召伯樂曰子之所使求馬者色物牝牡尚弗能知又何馬之能知也伯樂曰若臯之所觀天機也得其精忘其粗在其内而忘其外馬至果天下之馬也列子馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也及至伯樂曰我善治馬燒之剔之刻之絡之連之以羈􅎗編之以皂棧馬之死者十二三矣飢之渇之馳之驟之整之齊之前有蹶躓之患後有鞭筴之威而馬之死者已過半矣吾相馬直者中繩曲者中鉤方者中矩圎者中規是國馬也而未若天下馬也天下馬者若亡若失若喪若一若是者超軼絶塵不知其所莊子定公問於顔淵曰東野子之善御乎顔淵曰善則善矣雖然其馬將佚定公曰何以知之顔淵曰昔造父不窮其馬是造父無佚馬也今東野子之馭上車執轡銜體正矣步驟馳騁朝}
