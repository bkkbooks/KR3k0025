  - {type: variant, offset: 1182, length: 1593, content: 當伏罪奢曰不私其父非孝子也不奉王命非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死史循吏傳互入循良蘇章遷冀州刺史故人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲酒者私恩也明日冀州刺史按事公法也遂舉正其罪東漢本傳互入徇私忘公苟晞為兗州刺史從母子求為將晞以為督護後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者兗州刺史哭弟者苟道將其杖法如此晉書源懷為使持節巡行北邊有懷朔鎮將元尼須與懷少舊貪穢狼籍置酒請懷曰命之長短由卿之口豈可不相寬貸懷曰今日之集乃是源懷與故人飲酒之坐非鞠獄之所也明日公庭始為使者檢鎮將罪狀之處尼須揮淚無以對於是表劾尼須北史互入徇公忘私張鎮周拜舒州都督舒州即其本邑鎮周乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕裾敘疇昔之歡十日贈以錢帛既而垂泣謂賓曰比者張鎮周與故人為歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與永訣自是親戚有犯法一無所縱州境肅然唐書本傳陸贄曰吾上不負天子下不負所學唐書陸贄傳山陵近禁人屠宰郭子儀之隸人潛殺羊載以入城右金吾將軍裴諝奏之或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勳高望重上新即位以為群臣附之者眾故吾發其小過以明郭公威權不足畏也如此上尊天子下安大臣通監唐德宗初李懷光之解奉天圍也上以其子璀為監察御史及懷光屯咸陽不進璀密言於上曰臣父必負陛下願早為之備臣聞君父一也但今日之勢陛下未能誅臣父而臣父足以危陛下不忍不言上驚曰知卿大臣愛子當為朕委曲彌縫而奏之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自免對曰臣之進言非苟求生也臣父敗則臣與之俱死矣尚有何策哉使臣賣父求生陛下亦安用之上曰更至咸陽諭卿父使君臣父子俱全不亦善乎李泌曰李璀固賢者必與父俱死矣若其不死則亦無足貴者及懷光死璀先刃其二弟乃自殺同上高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威眾辦事耳以白金數百兩遺之通監梁均王互入徇公忘私晉相桑維翰乃裴皞門生嘗謁皞皞不迎不送或問之荅云皞見維翰於中書則庶僚也維翰見皞於私館則門生也何送迎之有五代史集在家常早起憂國願年豐杜詩互入憂世以孝肥家以忠肥國唐文粹本朝韓魏公言慶曆中與范希文富彥國同在西府上前爭事議論各別下殿不失和氣如未嘗爭也別錄元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官明日交府事以次見府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣聞見錄屬者故敕有司增定蔭補之格必由試藝乃得授官不惟為國造士是乃為臣立家歐公集經時止則止時行則行動靜不失其時其道光明易艮卦用之則行舍之則藏語述而子窮則獨善其身達則兼善天下孟盡心上窮不失義故士得己焉達不離道故民不失望焉同上窮則必有名達則必有力荀子古之得道者窮亦樂通亦樂莊子讓王史張衡云元龍迎夏則凌雲而奮鱗涉冬則淈泥而潛蟠後漢集舒之濟萬民卷之善一身白侍郎施之乃伊呂事業蓄之則莊老道德應而不滯飭躬有則時之來也為雲龍為風鵬勃然突然陳力以出時之去也為霧豹為冥鴻寥兮寂兮奉身而退互入所遇不同達人靜則暗然與陰合跡動則浩然與陽同波並同上隱而晦之則金渾玉璞君子之道也發而明之則龍飛虎變大人之文也唐文粹進為天下利退有百世名顯為諸侯師默成萬世法同上靜則龍蟄存神在一水而無悶動則鳳翔覽德自千仞以來儀李義山文子吞舟之魚不遊枝流鴻鵠高飛不集汙池列楊朱乘雲氣御飛龍而遊乎四海之內莊逍遙遊史自疏濯淖汙泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也推此志也雖與日月爭光可也史記屈原傳鴻鴈高飛一舉千里史張良傳眇然絕俗離世西漢王褒傳傳記神龍不處罔罟之水鳳皇不翔罻羅之鄉人物考集鸞鳳翔於蒼雲兮故繒繳不能加蛟龍潛於旋淵兮身不挂於罔羅楚辭玄鶴兮高飛增逝兮青冥鸞鳳之高翔兮乃集太皇之埜循四極而回周兮見盛德而後下彼聖人之神德兮遠濁世而自藏使麒麟, WYG: ''}
