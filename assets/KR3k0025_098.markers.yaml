  - {type: variant, offset: 483, length: 0, content: '', WYG: 稱也董卓凌虐王室執政皆如死驢風俗通武后多置裏行拾遺補闕御史時有令史將入室値裏行御史數人聚立門内令史不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂驢曰汝伎藝可知精神極鈍何物驢畜敢於御史裏行於是羞赧而止國朝載記集駕蹇驢而無䇿又何路之能極楚辭爾有濟師旅之勲而加之以衆能是用遣中大夫閭丘騾加爾使銜勒大鴻臚班脚大將軍宫亭侯以揚州之廬江江州之廬陵吳國之桐廬合浦之朱廬封爾為廬山公宋袁淑俳諧文黔無驢有好事者船載以入至則無可用放之山下虎見之龎然大物也以為神他日驢一鳴虎大駭以為且噬已也甚恐然往來視之覺無異能稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳跳踉大噉斷其喉盡其肉乃去噫形之龎也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫栁文本朝張子厚聞驢鳴云與自家意思一般語録騾史衛青圍匈奴匈奴薄暮乘六騾壯騎可數百冒圍去史記傳記騾驢父馬母也説文趙簡子有兩白騾而甚愛之陽城胥􅀢處夜欵門而謁曰胥􅀢有疾醫曰得白騾肝病則止不得則死謁者入通簡子曰殺畜以活人不亦仁乎於是殺白騾取其肝以與之呂氏春秋元封四年脩彌國獻駮騾高一丈毛色赤斑皆生毛旋成日月之象常以金寳物器盛芻以飼之洞冥記牛經旡妄之災或繫之牛行人之得邑人之災童牛之牿元吉離畜牝牛吉執之用黄牛之革鞏用黄牛之革東隣殺牛不如西隣之禴祭坤為牛坤為子母牛易放牛於桃林之野書誰謂爾無牛九十其犉爾牛來思其耳濕濕詩牛夜鳴則庮牛人掌養國之公牛弓人穉牛之角直而澤老牛之角紾而昔角長一尺有五寸三色不失理謂之牛戴牛周禮國君下齊牛牛曰一元大武天子以犧牛諸侯以肥牛大夫以索牛帝牛必在滌三月稷牛唯具祭天地之牛角繭栗宗廟之牛角握賓客之牛角尺禮介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信牽牛以蹊人之田而奪之牛韓厥曰殺老牛莫之敢尸而况君乎牛雖瘠僨於豚上其畏不死左傳犂牛之子騂且角雖欲勿用山川其舍諸論語子王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舎之吾不忍其觳􅑌若無罪而就死地孟子屠牛長朝解九牛而刀可以剃髪則刃逰於其間也老子宋人有行仁義者家無}
