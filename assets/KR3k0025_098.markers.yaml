  - {type: variant, offset: 56, length: 278, content: 門不一至主之庭百慮私家之便不一圖主之國韓非有度史趙充國曰諸君便文自營非為公家忠計也西漢本傳張禹雖家居以特進為天子師國家每有大政必與定議時吏民多上書言災異之應譏切王氏專政所致上意然之未有以明見即車駕至禹第辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏通監漢成紀互入阿附谷永前後所上四十餘事專攻上身與後宮而已黨於王氏上亦知之不甚親信也西漢本傳荀悅曰私務眾於官事通監西漢王衍雖居宰輔之重不以經國為念而思自全之計乃以弟澄為荊州族弟敦為青州因謂澄敦曰卿二人在外而吾留此足, WYG: 令崔浩推其咎徴浩}
