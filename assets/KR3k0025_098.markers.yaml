  front:
  - {type: variant, offset: 0, length: 1, content: 徇, WYG: 欽定四庫全書記纂淵海卷九十八宋潘自牧撰獸部麒麟騶虞獬豸並見祥瑞部獅子史烏弋國有獅子似虎正黄尾端毛大如斗漢書章和元年安息國獻獅子符枝形似麟而無角續漢書宗慤討林邑王范陽邁傾國來逆以具裝被象前後無際慤以爲外國有獅子威服百獸乃製其形與象相禦象果驚奔遂尅林邑宋書中宗朝太石國使請獻獅子姚璹上疏諫遽停此使唐書傳記虓獅子也説文狻猊如虥猫食豹郭璞曰即獅子也爾雅狻猊日走五百里穆天子傳後魏波斯國獻獅子莊帝曰朕聞虎見獅子必伏可覔試之於是鞏縣山陽並送二虎一豹見獅子悉皆瞑目不敢仰視洛陽伽藍記開元末西域獻獅子至安西道中繫於驛樹近井獅子哮吼若不自安俄頃風雷大至有龍出井而去國史補獅子奮迅威猛之力法華經爾時佛以青蓮葉目獅子嚬申普視千方獅子吼經集天骨雄詭材力傑異得金精之剛為毛羣之特屹立不動而九牛相去眈視直瞋而百獸皆伏所以肉視羣象孩撫熊羆其餘瑣細不置牙齒張九齡序有絶域之神獸因重譯而來擾其為狀也筋骨糾纒殊姿異制闊臆修尾勁豪柔毳鈎爪鋸牙藏鋒蓄銳弭耳宛足伺間借勢暨乎奮鬛舐唇倐來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隋兕於齦齶屈巴蛇於指掌踐籍則林麓摧殘哮呼則江河震蕩虞世南賦紺眼星懸赤毛焰起銅爪鐡甲鋸牙鑿齒顧犀象則百隊山跧看熊羆則千羣野伏高適本朝弭其耳仰其鼻奮髯吐舌威見齒舞其足突其目左顧右盼喜見尾雖猛而和盖其職巖巖高堂䕶燕几啼呼顛沛走百鬼嗚呼妙哉古陸子東坡象經象弭魚服元龜象齒詩王使執燧象以奔吳師象有齒以焚其身左傳子驅虎豹犀象而逺之孟子見象之牙知大於牛文子史漢成帝時林邑王獻象一能拜跪王莽與世祖戰昆陽驅虎豹犀象以助威武漢書舜南巡葬蒼梧下有羣象常為之耕帝王世記高宗時周澄國遣使上表云訶伽國有白象既有威靈又弭災患以水洗牙飲之愈疾請發兵迎取以獻上曰無益之源不可不遏勞其使而遣之永徽以來文單國累獻馴象凡三十二皆豢扵禁中頗有善舞者徳宗即位以為物性不遂放于荆山之陽唐書張茂常夢大象以問萬推推曰象者大獸獸者守也君當為郡守而不能善然象以齒焚身後為吳興太守値王敦問鼎執正不移敦滅之晉書傳記南方之美者有梁山之犀象焉爾雅象三年一乳説文瑤光星㪚而為象春秋運斗樞長仭之象為越童所鈎論衡伊水有洲洲廣十里有羣象野牛始興記潮循人捕得象争食其鼻云肥美象肉有十二種嶺表異録象牙長一丈餘脫其牙則掘地深藏之人削木為假牙潛易之乃得南越志象出交趾山谷雌雄者有兩長牙運動以鼻為役一軀之力皆在鼻可以開闔取物中有少肉雖芥子亦可拾出象處曰象山虞衡志九真郡多象日南亦饒之地里志明皇所教舞象天寶之亂禄山大宴其将出象紿之曰此自南海奔至以吾有天命雖異物必拜舞左右教之象皆努目不動終不肯拜禄山怒盡殺之南楚新聞魏武欲知象輕重而不可稱少子蒼舒曰置象以舟刻其水痕而以土實之則知其數也帝悦之異物志集象之為獸形體特詭身倍數牛目不渝狶鼻為口役望頭若尾馴良乘教聽言則跪素牙玉㓗載籍所美服重致逺行如丘徙郭璞賛山腹雨晴添象跡栁文本朝象踏洹河徹底山谷牧者謂之象奴又名象公凡制象必以鈎象奴正跨其頸以鐡鈎鈎其頭欲左鈎右欲右鈎左欲却鈎頭欲前不鈎欲其跪伏以鈎止案其腦其形雖大而不勝痛故人得以數寸之鈎馴焉范至能波斯以象牙為白暗以其難别識也澠水燕談犀犀角附子通天犀角有白理如綖者以盛米羣雞欲啄米至輙驚却故南人名為駭鷄犀也得眞角刻以為魚而銜以入水水常為開方三尺得毒藥以犀攪之皆生白沬抱朴子史温嶠至牛渚磯云其水多怪物遂燃犀角而照之見朱衣乘車馬嶠夢人曰與君幽明道别何苦相照晉書杜悰未嘗薦進幽隠時號秃角犀唐書傳記犀似豕爾雅犀牛一名奴角六帖太史南宫括至義渠得駭雞犀以獻紂韓詩外傳犀角駭狐淮南萬畢術犀有特神者角有光耀白日視之如角夜暗之中望如火炬置之草野飛鳥走獸皆驚南州異物志集犀之為狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角椅郭璞賛獸曰𤣥犀處自林麓食唯棘刺體兼五肉或有神異表露以角含精吐烈望如華燭置之荒野禽獸莫觸萬震匣龍期剸犀孟郊馴犀馴犀通天犀軀貌駭人角駭雞白居易本朝何但入海求靈犀六一集波斯以犀角為黒暗以其難别識也西域謂犀為朅伽角為毗沙挐言一角也澠水燕談兕經我姑酌彼兕觥匪兕匪虎率彼曠野殪此大兕詩犀兕尚多棄甲則那左傳虎兕出於柙論語子兩虎不鬭於伏兕之旁淮南子傳記兕如野牛青毛其皮堅厚可為鎧説文尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟河中有此獸時浮出一身九首人惡畏之未必能覆舟也亦謂之蒼雉論衡唐叔射兕于徒林殪以為大甲國語楚王逰於雲夢有狂兕王彎弓而射發而殪戰國䇿集君王親發兮憚青兕宋玉招魂狂兕觸蹷西都賦水兕雷咆乎陽侯江賦若奔兕之觸魯縞未足以喻其易曹洪與魏文帝書兕惟壯獸似牛青黒力無不傾自焚以革皮充武備角助文徳郭璞賛熊羆附經如熊如羆於商郊書維熊維羆男子之祥詩晉靈公使宰夫胹熊膰不熟殺之楚太子商臣以宮甲圍成王王請食熊膰而死昔堯殛鯀於羽山其神化為黄熊以入於羽淵左傳子舎魚而取熊掌者也孟子熊經鳥伸為夀而已矣莊子熊夀五百嵗五百歲則能化抱朴子史趙簡子病不知人五日而寤曰我之帝所見一熊欲援我帝命我射之中熊死有當道者曰帝令主君滅晉上卿熊其祖也史記昌邑王賀在藩邸見熊以問左右左右皆答不見漢書馮媛當熊見皇親部婕妤類傳記熊獸似豕山居冬蟄説文熊能攀緣上高樹見人則顛倒投地而下詩義疏赤熊見則奸宄自逺孝經援神契散宜生行宛懐修塗之山有黄熊得而獻於紂六韜成王時不屠何國獻青熊一周書大秦國出𤣥熊魏畧咸和七年左右啓以米飴熊上曰此無益而費穀且是惡獸所不宜蓄遣人打殺以肉賜左右直人建武故事集青兕黄熊向我啼熊羆咆深林熊羆守翠㣲杜詩羆經赤豹黄羆詩史趙簡子疾夢之帝所射殺熊又有一羆來亦殺之史記符健母姜氏夢大羆而孕生健長而勇果晉書齊韓軌司馬子如襲王羆羆詬曰老羆當道臥獅子那敢過北史傳記羆如熊黄白文爾雅嶓冡之山其獸多羆山海經集深叢見孤羆韓文鹿畏貙貙畏虎虎畏羆楚之南有獵者能吹竹為百獸之音為鹿鳴以感其類伺其至發火而射之貙聞其鹿也趨而至其人恐因為虎而駭之貙走而虎至愈恐則又為羆虎亦走去羆聞而求其類至則人也捽搏挽裂而食之今夫不善内而恃外者未有不為羆之食也栁羆説本朝晉人以五犬逐一羆羆鷙而力長於用大犬弱而健巧於用小顧左而右逐前而後羆不能搏也行不數十里羆敗而伏犬更前而殺之獸之鷙者爪莫如虎齒莫如豕而羆食之羆而受制於犬者遇非其敵困于羣也陳无已羆説虎經風從虎履虎尾不咥人亨履虎尾咥人凶虎視眈眈大人虎變其文炳也易袒裼暴虎詩仲冬虎始交苛政猛於虎也記鬭伯比淫於䢵子之女生子文䢵夫人使棄諸夢中虎乳之楚人謂乳曰穀謂虎曰於菟故命之曰鬭穀於菟實為令尹子文左傳暴虎馮河論語子晉人有馮婦者善搏虎卒為善士則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之孟子桀之時女樂三萬人放虎於市觀其驚駭管子梁鴦曰養虎之法凡順之則喜逆之則怒此血氣者之性也夫食虎者不敢以生物與之為其殺之恐怒也不敢以全物與之為其决之恐怒也列子時其飢飽達其怒心虎之與人異類而媚養己者順也其殺者逆也疾走撩虎頭編虎鬚㡬不免虎口哉莊子龎共與太子質於邯鄲謂魏王曰今一人言市有虎王信乎王曰不二人言王信乎王曰不三人言王信乎曰寡人信之龎共曰夫市無虎明矣然而三人言成市虎今夫邯鄲去魏逺於市議臣者過三人願王察之夫虎之所以能伏狗者爪牙也使虎釋其爪牙而使狗用之則虎反伏於狗矣韓子虎豹之駒未成文已有食牛之氣尸子昔者牛哀病七日化而為虎其兄啓户而入虎搏而殺之方其為虎也不知其嘗為人也方其為人也不知其將為虎也蝟使虎申物有所制也淮南子山中寅日稱虞史者虎也抱朴子史猛虎之猶與不如蜂蠆之致螫猛虎在山百獸震恐及檻穽搖尾而求食積威約之漸也元狩中南郡獲白虎以為寶漢書劉昆為𢎞農太守先是多虎災昆為政三年虎皆負子渡河宋均遷九江太守郡多暴虎數為民患常募設檻穽而猶多傷害均到一去檻穽除削課制虎相與東浮渡江法雄為南郡太守永初中多虎狼之暴雄乃移書屬縣毁壊檻穽不得妄捕山林是後虎害稍息童恢為不其令户人嘗為虎所害乃設檻捕之生獲二虎恢祝虎曰若是殺人者當垂頭伏罪自知非者當號呼稱寃一虎低頭閉目即時殺之一乃踴躍自奮遂放之後漢書劉陵為長沙安成長先時多虎陵之官修徳政踰月虎悉出界去謝承後漢吕䝉欲従軍母止之蒙曰不探虎穴安得虎子孫權作射虎車吳志傳記虎山獸之君也説文虎者陽物百獸之長也風俗通樞星散而為虎春秋運斗樞立秋虎始嘯易通卦騐􅂒白虎虪黒虎爾雅陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳或謂之於莬方言狄山爰有熊文虎幽都之山黑水上有𤣥虎山海經卞莊子欲刺虎卞豎子止之曰兩虎方食牛牛甘必爭争必鬬鬭則大者傷小者死從傷而刺之一舉必有雙虎之名戰國䇿有虎在於葭中高奔戎生捕而獻于天子命為柙而畜之東虞是曰虎牢穆天子傳曹公擒吕布布顧劉備曰繩縳我急獨不可一言耶操曰縳餓虎不得不急英雄記漢宣城郡守封邵忽化虎食郡民民呼曰封使君因去不復來時人語曰無作封使君生不治民死食民述異記馮恭醉臥于山路夜有虎來以頭枕其背恭中宵展轉以手搏之復大寢向曉始醒猶見虎蹲在脚後自有宿命非智力所加也異苑裴旻守北平北平多虎旻善射嘗一日斃虎三十有一有父老至曰此皆彪似虎而非將軍若遇真虎無能為也旻躍馬而往果有一虎狀小而勢猛據地一吼山石震裂旻弓矢皆墜自此不復射虎國史補集誕節緩腕續背連骸細腰鼓胷方口大鼻似黼組雜間若錦繡相連吳氏虎賦怒氣之所狡憤迅軀之所騰跱鋸牙之所噉齚鈎爪之所挐攫傑作人立呀若箕張聲轟暴雷目爍燃炬符載畋獲虎頌猛虎又掉尾磨牙皓秋霜有手莫捋猛虎鬚虎嘯谷而生風李白猛虎立我前蒼崕吼時裂杜詩猛虎雖云惡亦各有匹儕羣行深谷間百獸望風低身食黄熊父子食赤豹麛擇肉於熊豹肯顧兔與狸正晝當谷眠眼有百歩威自矜無當對氣性縦以乖朝怒殺其子暮還食其妃匹儕四散走猛虎還孤棲韓文南山北山樹冥冥猛虎白日遶村行向曉一身當道食此中糜鹿盡無聲張籍舉頭為城掉尾為旌李賀本朝猛虎白日行心閒貌揚揚當路擇人肉熊猪不形相頭垂尾不掉百獸自然降暗禍發所忽有機埋路傍徐行自踏之機翻矢穿腸怒吼震林丘瓦裂兒墮床已死不敢近目睛射餘光深山猛虎夜生兒虎兒可愛光陸離六一集操戈畏炳彪風生飢虎嘯空行何年白竹千鈞弩射殺南山雪毛虎至今顱骨帶霜牙尚作四海毛蟲祖東坡猛虎肉醉初醒時楷磨痾痒助風威山谷豹經君子豹變其文蔚也易虎豹之鞟猶犬羊之鞟論語子夫豐狐文豹不免於網罟之患其皮為之災也莊子虎豹之文采射文子貍變則豹豹變則虎楊子蛇令豹止物有所制也淮南子傳記豹似虎説文南山有𤣥豹南多赤豹廣志青豹出浪坂之山狀如虎色如翠洞冥記陶大夫妻曰妾聞南山有𤣥豹霧雨七日不下食者何也欲以澤其毛衣而成其文章也列女傳散宜生獻紂黒豹帝王世紀狄不竒少曽逰獵得豹見其文采炳煥遂自感嘆始學書藝後秦記集雖無𤣥豹姿且隠南山霧謝朓隠豹深愁雨杜詩遙知𤣥豹在深處不笑羈絆泥塗間栁文本朝南山豹不畏白額虎澤霧毛雖雜鼮䑕朝捋其鬚暮飲乳文章子雲乆已許還笑大夫費五羖天子仗中儀物舉尾與斾裳願看取梅聖俞豺經季秋豺乃祭獸戮禽記越椒伯石豺狼之聲左傳史漢遣八使循行風俗張綱獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸遂劾奏梁冀後漢書集豺羣喙尚呀栁文豺狼得食喧杜詩本朝人跡尚蕭條豺狼夜相觗東坡狼經並驅從兩狼兮狼跋其胡載㚄其尾詩獸人冬獻狼周禮狼臅膏記史烏孫王昆莫初生棄於野狼往乳之史記江都王建宫人有過者或投於狼令齧殺之建觀而大笑為樂漢書匈奴單于生二女姿容甚美單于曰吾女安可配人將以與天乃築高臺置二女其上曰請天自迎之經四年有一老狼守臺下為穴其小女曰吾父處我於此欲與天而今狼來或是神物乃就之而産子後遂滋繁成國故其民長歌似狼嘷後魏書突厥之先其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合生男子其後各為一姓阿史郍是其一也後周書傳記狼牝猚牝狼其子檄絶有力迅爾雅狼似犬銳頭而白頰説文狼能為小兒啼聲以誘人其膏可以煎和其皮可以為裘詩義疏周穆王將征犬戎祭公謀父諫不聴遂征之得四白狼以歸自是荒服者不至國語洛南有避狼城云幽王時羣臣為狼食人故築城避之今洛中有狼村是也述異記集矯矯白狼有道則逰應符變質乃御靈鈎山海經賛本朝一狼將四子上嶺走千羊意得無前敵時乖闕後防寧知射生手已發弩機張㑹使烏鳶飽空令豺虎傷陳后山猿子老羭為猿列子猿猵狙以為雌人木處則惴慄恂懼猿猱然乎哉今取猿狙而衣以周公之服彼必齕嚙挽裂盡去而後慊夫不見騰猨乎其得柟梓豫章欖蔓枝而生長其間雖羿逢蒙不能盼睞也及其得柘棘枳枸之間危行側視勢有不便未足以騁其能也莊子楚王亡其猨林木為之殘置猨檻中則與豚同非不巧捷也無所肆其能也淮南子玉䇿記稱猨壽五百嵗則化為貜千嵗則變為老人周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙抱朴子傳記堂庭之山其上多白猿山海經猨似猴大而黒長前臂所以夀者好引其氣也春秋繁露峽中猿鳴至清山谷傳其響泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣宜都山川記荆王有白猨王射之則摶樹而熈使養由基射之猨擁木而號吕氏春秋越王問范蠡手劍之術蠡曰臣聞趙有處女國人稱之於是王乃請女女將北見王道逢老人自稱袁公曰聞汝善為劍願觀之處女曰惟公所試公即挽林杪之竹末折墮地女接取其末袁公操其本而刺處女女因舉杖擊之公即飛上樹化為白猿吴越春秋孫恪妻袁氏到端州峽山寺持碧玉環獻僧曰此是院中舊物齋罷有猿數十聨臂下高松袁氏惻然題壁曰無端變化幾湮沈剛被恩情役此心不如逐伴歸山去長嘯一聲煙霧深詩畢化老猿而去續世説楊叟入山見一小龕有胡僧貌甚老曰某族是袁氏居巴山其後子孫或在弋陽散逰居山谷中獨吾好浮屠氏棲心岩谷中啖橡栗飲流泉忽跳躍化為一猿而去宣室志鄧芝見猿抱子在樹上射之中猿母其子為拔箭以葉塞瘡芝乃嘆息投弩水中華陽國志商山隠士高太素所居曰清心亭毎日有猿詣亭前鞠躬而啼目為報時猿開元天寶遺事李約養一猿名山谷𤣥猿善啼其音凄入肝脾韻合宫徴段公路因捕養之名曰巴兒北戸録集霧嵐昏而共黙風雨霽而争鳴使幽人之思清暢路客之涕霑襟歴千尋之喬木俯萬仭之危嶠弄逰雲之亂飛嬉落日之横照連肱澗飲命侣煙嘯或聚而閒棲或分而迥逴吳筠猿賦或哀吟於永夜或清嘯於朝暾峰合沓以連響水潺湲而共喧動不為暴止皆擇所檉松鬱而不殘楂梨熟而後取李徳裕白猿賦腸斷月明猿宛溪霜夜聴猿愁江猿嘯晩風月出白猿啼彈琴聽霜猿猿嘯時聞岩下吟牽引條上兒數弄水中月李白嶺猿霜外宿有猿揮淚盡高蘿垂猿飲猿挂時相狎江猿吟翠屛窮猿失木悲清猿惱夢思裊裊啼虛壁蕭蕭挂冷枝杜詩溪路千里曲哀猿何處鳴孤臣涙已盡虛作斷腸聲栁文本朝霜寒入毛骨清響哀愈長猿聲在碧霄滿川明月一猿哀六一集楚山固多猿青者黠而夀化為狂道士山谷恣騰蹂無復號雲聲空餘舞柸手山猿悲嘯谷泉響東坡猴經無教猱升木疏云猱獼猴也楚人謂之沐猴詩子宋有狙公者愛狙養之成羣誑狙曰與若芧朝三而暮四足乎衆狙皆怒俄而曰朝四而暮三足乎衆狙皆喜列子吳王登于狙之山衆狙見之恂然棄而走有一狙見巧于王王射之敏給摶捷矢王命相者趨射之狙就死王謂顔不疑曰之狙也伐其巧持其便以慠予以至此也莊子御得其道則狙詐咸作使楊子山中申日稱人君者猴也抱朴子史韓生勸項羽都關中羽燒宫室都彭城韓生曰人言楚人沐猴而冠果然張信少府檀長卿為沐猴與狗鬭盖寛饒奏免之漢書傳記玃大母猴也色蒼黒狙玃屬爾雅一名狙一名王孫一名胡孫廣雅有人種黍山中從介象乞辟猴之法象曰汝明日徃黍所望見羣猴便大喚語之云已白介君教莫復侵食黍如其言獼猴各自還山遂絶跡神仙傳昭宗播遷只有一弄猴者其猴能隨班起居昭宗賜以緋袍號孫供奉朱梁僣號取其猴亦令於殿下隨班猴望見全忠跳躍奮擊遂令殺之唐臣愧此猴多矣幕府燕閒録胡孫無脾以行消食雜爼集有王孫之狡獸形陋觀而醜儀顔狀類乎老公軀體似乎小兒儲糧食於兩頰稍委輸於胃脾王延夀跳踉叫囂兮衝自宣斷外以敗物兮内以争羣排鬭善類兮譁駭披紛盜取民食兮}
