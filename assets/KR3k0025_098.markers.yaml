  - {type: variant, offset: 464, length: 0, content: '', WYG: 畢矣歴險致逺馬力盡矣然猶求馬不已是以知之也驊騮騏驥纎離緑耳古之良馬也驥一日而千里駑馬十駕則亦及之荀子齊桓公伐孤竹迷惑失道管仲曰老馬之智可用乃放老馬而隨之遂得道韓子塞上之人其馬亡入蕃中人皆弔之其父曰此何詎知不為福居數月其馬將蕃駿馬而歸人皆賀之其父曰此何詎知不為禍家冨馬良其子好騎墮而折髀人皆弔之其父曰此何詎知不為福盡十年蕃兵大出丁壯者皆控弦而戰塞上之人死者十九此子獨以跛故父子相保淮南子史造父以善御幸於周穆王得驥温驪驊騮緑耳之駟西廵狩樂而忘歸楚莊王有愛馬死欲以大夫禮葬之樂人優孟入殿門大哭曰請以人君之禮葬之諸侯聞之皆知大王賤人貴馬也王曰奈何曰六畜之葬以壟竈為槨銅䥶為棺齊以薑桂薦以木蘭衣以火光葬人腹中王乃以馬屬大官郭隗謂燕昭王曰古人有以千金求市千里馬者於是與涓人金請為市之有千里馬已死乃用五百金市其首而還王怒曰安用死馬者首乎答曰死馬首尚用五百金况生馬乎未期年果有獻千里馬者三疋項王駿馬名騅常騎及至烏江謂亭長曰吾騎此馬五嵗所當無敵不忍殺以賜公史記初天子發書易曰神馬當從西北來得烏孫馬號曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬號宛馬曰天馬詔曰馬或奔踶而致千里士有負俗之累而立功名夫泛駕之馬亦在御之而已元狩二年馬生余吾水中元鼎四年馬生渥洼水中龍文魚目汗血之馬充於黄門卓茂為丞相府史嘗出行有人認其馬茂解與之顧曰若非公馬幸至丞相府歸我他日馬主别得亡者乃詣府送馬叩頭謝之漢書龎徳拒關公常乗白馬公軍謂之白馬將魏志陳思王表文帝曰臣於武皇帝世得大宛紫騂馬一疋教令習拜又能行與鼓節相應謹以奉獻曹公所乗馬名絶影後漢書魏使以馬求易珠璣翡翠瑇瑁孫權曰此皆孤所不用而可以得馬何苦而不聽與交易吳志何偃為吏}
