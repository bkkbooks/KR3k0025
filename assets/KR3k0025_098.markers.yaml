  - {type: variant, offset: 459, length: 2, content: 通監, WYG: 為善鳴為􅑓足為作足為的顙其於馬也為亟心為下首為薄蹄為曵易歸馬于華山之陽書我馬虺隤我馬𤣥黄騋牝三千兩服上驤兩驂鴈行駟鐡孔阜六轡在手騏駵是中騧驪是驂皎皎白駒在彼空谷駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄有騅有駓有騂有騏有驒有駱有駵有雒有駰有騢有驔有魚詩馬質掌質馬校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物趣馬掌賛正良馬而齊其飲食簡其六節巫馬掌養疾馬而乗治之庾人掌十有二閑之政教圉師掌教圉人養馬圉人掌養馬芻牧之事周禮大夫士下公門式路馬乘路馬必朝服步路馬必中道以足蹙路馬芻有誅齒路馬有誅春駕蒼龍夏駕赤駵秋駕白駱冬駕鐡驪禮晉恵公乘小駟慶鄭曰今乘異産以従戎事及懼而變將與人易亂氣狡憤隂血周作張脉憤興外强中乾進退不可周旋不能宋人以文馬百駟贖華元于鄭冀之北土馬之所生無興國焉衛侯來獻其乘馬曰啓服}
