  - {type: variant, offset: 5605, length: 2, content: 太多, WYG: 衆木鬬榮謙也四時一貫榮衰不殊常也垂賁實以延鳯樂賢也嵗擢筍以成榦進徳也羣居不亂獨立自持振風㧞屋不為之傾大旱乾物不為之瘁堅可以配松栢勁可以凌霜雪密可以泊晴煙踈可以漏霄月文苑英華翠色落波深虛聲帶寒早龍吟曽未聴鳯曲吹應好野竹分青靄緑竹助秋聲窗竹夜鳴秋李白竹光團野色我有江隂竹能令朱夏寒籠竹和煙滴露稍風含翠篠娟娟净竹細野池幽種竹交加翠愛竹遣兒書霜埋雪竹根脩竹不受暑叢篁低地碧錦竹亭亭出縣髙賞靜連雲竹緑竹半含籜新稍纔出墻色侵書帙暗隂過酒樽凉雨洗娟娟净風吹細細香但令無剪伐㑹見拂雲長杜詩竹影金瑣碎孟郊折篁嘯遺笙誰家有竹門可欵藹藹溪流慢稍稍岸篠長穿沙碧榦净落水紫苞香筍添南堦竹日日成清閟縹節已儲霜黄苞猶揜翠髙標凌秋嚴貞色奪春媚風枝未飄吹露粉先涵淚韓詩風篁冒水逺迸籜分苦節輕筠抱虛心栁詩停車欲去繞藂竹偏愛新筠十數竿莫遣兒童觸瓊粉留待幽人回日看韋蘇州本朝司馬公獨樂園有竹一本去地二尺分為兩榦並生六節節間容線復合為一洛中號為瑞竹李方叔西㳺記茲軒最灑落歴歴種琅玕翠隂凉宴坐疎韻成清歡錦籜裁夏扇玉筍供春盤司馬公竹比君子徳猗猗寒更緑嫰籜筠粉暗虛心髙自擢勁節晩愈瘦雖慙桃李妖寧愧松栢}
