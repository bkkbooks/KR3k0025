  - {type: variant, offset: 521, length: 423, content: 取之心其瘡必數世家語互入知所輕重若魯子則可謂養志也孟離婁下季孫相魯六月掘長溝子路私飯之孔子覆其飯曰魯有民焉輒愛一作受之何也韓非子史楚成得臣伐陳城頓還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾左僖二十三年鄭簡公卒將為葬除司墓之室有當道者毀之則朝而塴不毀則日中而塴子太叔請毀之曰無若諸侯之賓何子產曰諸侯之賓能來會吾喪豈憚日中無損於賓而民不害何故不為遂弗毀日中而葬君子謂子產知禮禮無毀人以自成也左昭十二年晉韓宣子有環其一在鄭商宣子謁諸鄭伯子產弗與曰非官府之守器也寡君弗知左昭十六年韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬笑有為朕今袴豈特嚬笑哉吾必待有功者通監周紀沛公至咸陽諸將爭走金帛財物之府蕭何獨收秦圖書西漢蕭何傳上令周昌選趙壯士可令將者白見四人封各千戶以為將左右諫上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟通監曹參去齊屬, WYG: 伶倫採竹嶰谷}
