  - {type: variant, offset: 984, length: 280, content: 主者上曰主者為誰乎曰陛下即問決獄責廷尉問錢穀責治粟內史西漢陳平傳冇獻千里馬者帝曰鸞旗在前屬車在後吉行五十里師行三十里朕乘千里馬獨先安之於是還其馬通監漢文紀田叔按梁事來還至霸昌廄取火悉燒梁之獄辭空手來見帝曰梁事有之乎對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味臥不安席此憂在陛下也通監漢景紀互入區處得當其治務在無為引大體不拘文法通監漢武紀明有所不見聰有所不聞西漢東方朔傳馮奉世以衛候使持節送大宛諸國遂以節諭告諸國王因發其兵南進擊莎車攻拔其城諸國悉平上甚悅議封奉世蕭望之以為奉世奉使擅矯制違命發諸國兵雖有功效不, WYG: 􅀢竹}
