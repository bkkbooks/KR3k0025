  - {type: variant, offset: 1395, length: 354, content: 武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動前始納貢禹之議後人相因多所動搖易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之又以久無繼嗣冬十月庚辰上曰太后令詔有司復甘泉泰畤汾陰后土如故及雍五畤陳寶祠長安及郡國祠著明者皆復之通監漢成紀帝王之意不窺人閨門之私聽聞中冓之言同上何武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一馬援為隴西太守任吏以職但總大體諸曹時白外事援輒曰此丞掾之任何足相煩若大姓侵小民黠吏不從令此乃太守事耳東漢本傳設法禁者非能盡塞天下之奸皆合眾人之所欲也大抵取便國利事多者則可矣東漢桓譚宋均曰文吏習為欺謾而廉吏清在一己無益百姓流亡盜賊為害也通監漢明紀下邳周紆為雒陽令下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚跼蹐京師肅清通監, WYG: ''}
