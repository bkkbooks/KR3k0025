  - {type: variant, offset: 6148, length: 594, content: 拜之李愚獨長揖帝聞而讓之曰衡王於朕兄也朕猶拜之卿長揖可乎對曰陛下以家人禮見衡王拜之宜也振等陛下家臣臣於王無私敬不敢妄有所屈通監後梁均王遇赦則曲者幸免直者銜冤冤氣升聞乃所以致災非所以弭災也通監五代晉高祖或言營田鬻之可得錢十萬緡以資國帝曰利在於民猶在國也朕用此錢何為通監後周太祖帝政事無小大皆親決百官受成於上而已河南推官高錫上書諫以為四海之廣萬機之眾雖堯舜不能獨治必擇人而任之今陛下以一身親之天下不謂陛下聰明睿智足以兼下官之任皆言陛下褊迫疑忌舉不信群臣也不若選能知人公正者以為宰相能愛民聽訟者以為守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下何必降君尊而代臣職無乃失為政之本乎通監五代周世宗集天子不問有無諸侯不言多少百乘之家不畜聚歛之臣陸宣公文昔人所以掩絕纓而飲盜馬者豈必忘其情愛蓋知為君之體然也同上善醫者不視人之瘠肥察其脈之病否而已矣善計天下者不視天下之安危察其紀綱而已矣是故四肢雖無故不足恃也脈而已矣四海雖無事不足矜也紀綱而已矣韓文以志為養兮何有牛羊周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名晢曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱呂后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也唯宦官宮妾乃不敢言諭及機以為觸犯士君子立言行事宜何所法守也凡事父母得如曾參可, WYG: ''}
