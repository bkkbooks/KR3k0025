  - {type: variant, offset: 5603, length: 0, content: '', WYG: 船南海以竹為甑皆羅浮之竹也嶺表録異李衞公言北都惟童子寺有竹一窠纔長數尺令傳其寺每日報竹平安雜爼潤州甘露寺僧某者李徳裕以方竹杖留贈出大宛國堅實而正萬節眼鬚牙四面對出公再鎮浙右問僧曰竹杖無恙否曰已規圓而漆之矣叢談唐天復甲子嵗自隴而西亢陽竹皆放花結子饑民採之舂米而食珍於粳糯其味更馨香可謂百萬圓顱活於貞筠之下玉堂閒話舊稱竹實鸞鳯}
  - {type: page-break, offset: 5603, content: '', id: KR3k0025_WYG_096-4a, image: WYG0932/WYG0932-0746a.png}
  - {type: variant, offset: 5603, length: 0, content: '', krp: 船南海以竹為甑皆羅浮之竹也嶺表録異李衞公言北都惟童子寺有竹一窠纔長數尺令傳其寺每日報竹平安雜爼潤州甘露寺僧某者李徳裕以方竹杖留贈出大宛國堅實而正萬節眼鬚牙四面對出公再鎮浙右問僧曰竹杖無恙否曰已規圓而漆之矣叢談唐天復甲子嵗自隴而西亢陽竹皆放花結子饑民採之舂米而食珍於粳糯其味更馨香可謂百萬圓顱活於貞筠之下玉堂閒話舊稱竹實鸞鳯}
  - {type: variant, offset: 5604, length: 0, content: '', WYG: 食今近道竹結實如小麥無氣味近有餘干人言彼有竹實大如鷄子竹葉層層包裹味甘勝蜜因知鸞鳯之食必非常物也本草竹有生日即五月十三日也文心雕龍岳人以五月十三日謂之龍生日可種竹即齊民要術竹醉日也岳陽風土記五月十三日移竹神日也四時纂要集便娟之竹寄生江潭上葳㽔而防露下泠泠而來風七諫含虛中以象道體圓質以儀天江淹賦或茂沙水或挺岩陸條暢紛敷青翠森肅戴凱之竹譜竹則包笱抽節徃徃縈結緑葉翠莖冒霜停雪吳都賦風篁成韻文選翠葆隨風金戈動日謝朓檀欒嬋娟玉潤碧鮮初篁包緑籜文選長淇園貞榦臣脩竹稽首沈約脩竹彈甘焦文竹本固固以樹徳君子見其本則思善建不㧞者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者日出有清隂風來有清聲白樂天養竹記勁本堅節不受雪霜剛也緑葉萋萋翠筠浮浮柔也虛心而直無所隱蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣上終不}
