  - {type: variant, offset: 1849, length: 3671, content: 公作而行之謂之士大夫故丙吉不問橫道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體也明公為治乃躬自校簿書流汗終日不亦勞乎通監魏明紀互入不識大體楊阜召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎同上初丞相亮時有言公惜赦者亮荅曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啟告治亂之道多矣曾不語赦也若劉景升季玉父子歲歲赦宥何益於治通監魏舒為司馬昭參軍府朝碎務未嘗是非至於廢興大事眾人莫能斷者舒徐為籌之多出眾議之表通監魏紀顧和謂王導曰明公作輔寧使網漏吞舟何緣採聽風聞以察察為政邪通監東晉元紀王彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣通監晉穆紀謝安為政務舉大綱不為小察時人比安於王導通監晉武紀桓玄嘗欲以謝安宅為營謝琨曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅耶玄聞慚而止晉書謝琨傳謝弘微曰親戚爭財為鄙之甚今內人尚能無言豈可導之使爭乎通監齊太祖魏源懷性寬簡不喜煩碎常曰為貴人當舉綱維何必事事詳細譬如為屋但外望高顯楹棟平正基壁完牢足矣斧斤不平斲削不密非屋之病也通監梁高祖徐勉為吏部尚書嘗與文臣夜集客虞暠求詹事五官勉正色曰今宵止可談風月不可及公事時人服其無私通監梁武紀魏大旱散騎常侍邢巒奏昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐵為轡勒府藏之金裁給而已不復買積以費國資逮景明之初承升平之業四境清晏遠邇來同於是貢篚相繼商估交入諸所獻納倍多於常金玉常有餘國用常不足苟非為之分限但恐歲計不通自今請非要須者一切不受魏主納之通監梁武紀屈突通往隴西檢覆群牧得隱匿馬二萬餘匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜產之故殺千餘人臣敢以死請又頓首曰臣一身分死就陛下匄千餘人命帝感寤悉達等皆減死論通監隋高紀互入轉移人心牛弘問劉炫曰周禮士多而府史少今令史百倍於前減則不濟其故何也炫曰古人委任責成歲終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿恒慮覆治若鍜鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由省官不如省事官事不省而望從容其可得乎通監隋煬紀秦王世民每破軍克城諸將佐爭取寶貨玄齡獨收采人物致之幕府通監唐高紀益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時出鼠竊乃其常俗守苟能撫以恩信自然帥服安可輕動干戈漁獵其民比之禽獸豈為民父母之意耶竟不許通監唐太宗杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彝對曰設官分職各有所司果有愆違御史自應糾舉若徧歷諸司搜擿疵纇大為煩碎長樂公主將出降敕有司資送倍於永嘉長公主魏徵諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎鄧世隆袁請集上文章上曰朕之辭令有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無德政文章何為上謂房玄齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職比聞聽受詞訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射尚書左丞韋悰勾司農木橦價貴於民間奏其隱沒上召大理卿孫伏伽書司農罪對曰只為官橦貴所以私橦賤向使官橦賤私橦無由賤矣但見司農識大體不知其過也張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之並同上劉曉上疏論禮部取士專用文章為甲乙故天下之士皆捨德行而趍文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體文成七步未足化人況盡心卉木之間極筆煙霞之際以斯成俗豈非大謬通監唐高祖戴至德為右僕射劉仁軌為左僕射更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有冤結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取之通監唐高宗選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家彼皆庸人豈足當閫外之任李左車陳湯呂蒙孟觀皆出貧賤而立殊功未聞其家代為將也少府監裴匪舒善營利奏賣苑中馬糞歲得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也並同上尚方監裴匪躬檢校京苑將鬻苑中蔬果以收其利蘇良嗣曰昔公儀休相魯能拔葵去織婦未聞萬乘之主鬻蔬果也乃止通監唐武后狄仁傑同平章事太后謂仁傑曰卿在汝南甚有善政卿欲知讚卿者名乎仁傑謝曰陛下以臣為過臣請改之知臣無過臣之幸也不願知讚者名禁天下屠殺右拾遺張德生男三日私殺羊會同僚補闕杜肅懷一餤上表告之明日太后對仗謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭伏罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇人出肅表示之肅大慚舉朝欲唾其面劉知幾表陳四事其一以赦令不息近則一年再降遠則每歲無遺元日之朝指期天澤重陽之節佇降皇恩如其忖度咸果釋免或有名垂結正罪將斷決竊行貨賄方便規求故致稽違畢霑寬宥為善者不預恩光作惡者獨承徼幸古語曰小人之幸君子之不幸斯之謂也太后問鸞臺侍郎同平章事陸元方以外事對曰臣備位宰相若大事不敢不以聞人間細事不足煩聖聽由是忤旨並同上朱敬則為相以用人為先自餘細務不之視通監唐中宗宗楚客令袁守一奏言則天昔在三陽宮不豫狄仁傑奏請陛下監國元忠密奏以為不可上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎同上楊孚彈紏不避權貴權貴避之上曰鷹捕狡兔須急救之不爾必反為所噬御史繩奸慝亦然苟非人主保衛之則亦為奸慝所噬矣通監唐玄宗上命宋璟蘇頲為諸皇子制名及國邑之號又令別制一佳名及佳號進之璟等上言七子均養著於國風今臣等所制名三十餘輒混同以進以彰陛下覆燾無偏之德上甚善之山東大蝗盧懷慎以為殺蝗太多恐傷和氣崇曰昔楚莊吞蛭而愈疾孫叔殺蛇而致福奈何不忍於蝗而忍人之饑死乎若使殺蝗有禍臣請當之皇后妹夫尚衣奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而歐之傑上表上大怒命於朝堂杖殺以謝百僚以書慰傑互入徇公忘私上欲加牛仙客尚書張九齡曰不可李林甫言於上曰仙客宰相才也何有於尚書九齡書生不達大體上悅明日上曰卿嫌仙客寒微如卿有何閥閱九齡曰臣嶺海孤賤不如仙客生於中華然臣出入臺閣典司誥命有年矣仙客邊隅小吏目不知書若大任之恐不愜眾望前廣州都督裴胄先下獄上與宰相議其罪張嘉貞請杖之張說曰臣聞刑不上大夫為其近於君且所以養廉恥也故士可殺不可辱臣曏巡北邊聞杖姜皎於朝堂皎官登三品亦有微功有罪應死則死應流則流豈可輕加笞辱以皁隸待之乎事往不可復追胄先據狀當流豈可復蹈前失上深然之並同上上嘗從容與李泌語及李林甫欲敕諸將克長安發其冢焚骨揚灰泌曰陛下方定天下奈何讎死者彼枯骨何知徒示聖德之不弘耳通監唐肅宗上又謂李泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宮以慰上皇心對曰宜待上皇之命不過晚歲月之間耳上從之王去榮以私怨殺本縣令當死上以其善用礮免死中書舍人賈至不即行下上表以為去榮無狀殺本縣之君若以礮石一能則免殊死今諸軍技藝絕倫者其徒實繁必恃其能所在犯上復何以止之今惜一去榮之才而不殺必殺十如去榮之才者不亦其傷益多乎並同上裴諝入奏事上問榷酤之利歲入幾何諝久之不對上復問之對曰臣自河東來所過見菽粟未種農民愁怨臣以為陛下召臣必先問人之疾苦乃責以營利臣是以未敢對也通監唐代宗京兆尹黎幹奏秋霖損稼韓滉奏幹不實渭南令劉澡阿附度支稱縣境苖不損上曰霖雨溥博豈得渭南獨無命御史視之損三千餘頃代宗嘆息久之曰縣令字人之官不損猶應言損乃不仁如是乎不癡不聾不為家翁兒女閨房之言何足聽也朱泚獻貓鼠同乳不相害者以為瑞常袞帥百官稱賀中書舍人崔祐甫獨不賀曰物反常為妖貓捕鼠乃其職也今同乳妖也何以賀為並同上代宗將發引上送之見轀輬車不當馳道稍指未丁之間問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行通監唐德宗天不以地有惡木而廢發生天子不以時有小人而廢聽納以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之奸邪役智彌精失道彌遠項籍納秦卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦己甚矣漢高豁達大度天下之士至者納用不疑其於備虞可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荊軻奮其陰計光武寬容博厚而馬援輸其款誠豈不以虛懷待人人欲思附任數附物物終不親情思附則感而悅之雖寇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣智出庶物冇輕待人臣之心思周萬機有獨馭區㝢之意謀吞眾略有過慎之防明照群情有先事之察嚴束百辟有任刑政之規威制四方有以力勝殘之志劉從一詣蕭復曰欽緒宣旨令從一與公議朝來所言事即奏行之勿令李盧知復曰李盧不堪為相乃罷之既在相位安得不與之同議李泌曰宰相之職不可分也非如給事則有吏過兵過舍人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也並通監裴垍為相奏天下留州送使物垍一切用省估通監唐憲宗宰相議誅李錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟乂曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎宰相以為然盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房元齡康誥, WYG: ''}
  - {type: variant, offset: 1849, length: 3671, content: 公作而行之謂之士大夫故丙吉不問橫道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體也明公為治乃躬自校簿書流汗終日不亦勞乎通監魏明紀互入不識大體楊阜召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎同上初丞相亮時有言公惜赦者亮荅曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啟告治亂之道多矣曾不語赦也若劉景升季玉父子歲歲赦宥何益於治通監魏舒為司馬昭參軍府朝碎務未嘗是非至於廢興大事眾人莫能斷者舒徐為籌之多出眾議之表通監魏紀顧和謂王導曰明公作輔寧使網漏吞舟何緣採聽風聞以察察為政邪通監東晉元紀王彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣通監晉穆紀謝安為政務舉大綱不為小察時人比安於王導通監晉武紀桓玄嘗欲以謝安宅為營謝琨曰召伯之仁猶惠及甘棠文靖之德更不保五畝之宅耶玄聞慚而止晉書謝琨傳謝弘微曰親戚爭財為鄙之甚今內人尚能無言豈可導之使爭乎通監齊太祖魏源懷性寬簡不喜煩碎常曰為貴人當舉綱維何必事事詳細譬如為屋但外望高顯楹棟平正基壁完牢足矣斧斤不平斲削不密非屋之病也通監梁高祖徐勉為吏部尚書嘗與文臣夜集客虞暠求詹事五官勉正色曰今宵止可談風月不可及公事時人服其無私通監梁武紀魏大旱散騎常侍邢巒奏昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐵為轡勒府藏之金裁給而已不復買積以費國資逮景明之初承升平之業四境清晏遠邇來同於是貢篚相繼商估交入諸所獻納倍多於常金玉常有餘國用常不足苟非為之分限但恐歲計不通自今請非要須者一切不受魏主納之通監梁武紀屈突通往隴西檢覆群牧得隱匿馬二萬餘匹帝大怒將斬太僕卿慕容悉達及諸監官千五百人通諫曰人命至重陛下奈何以畜產之故殺千餘人臣敢以死請又頓首曰臣一身分死就陛下匄千餘人命帝感寤悉達等皆減死論通監隋高紀互入轉移人心牛弘問劉炫曰周禮士多而府史少今令史百倍於前減則不濟其故何也炫曰古人委任責成歲終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿恒慮覆治若鍜鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由省官不如省事官事不省而望從容其可得乎通監隋煬紀秦王世民每破軍克城諸將佐爭取寶貨玄齡獨收采人物致之幕府通監唐高紀益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時出鼠竊乃其常俗守苟能撫以恩信自然帥服安可輕動干戈漁獵其民比之禽獸豈為民父母之意耶竟不許通監唐太宗杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彝對曰設官分職各有所司果有愆違御史自應糾舉若徧歷諸司搜擿疵纇大為煩碎長樂公主將出降敕有司資送倍於永嘉長公主魏徵諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎鄧世隆袁請集上文章上曰朕之辭令有益於民者史皆書之足為不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無德政文章何為上謂房玄齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職比聞聽受詞訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射尚書左丞韋悰勾司農木橦價貴於民間奏其隱沒上召大理卿孫伏伽書司農罪對曰只為官橦貴所以私橦賤向使官橦賤私橦無由賤矣但見司農識大體不知其過也張昌齡王公謹皆善屬文名振京師考功員外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之並同上劉曉上疏論禮部取士專用文章為甲乙故天下之士皆捨德行而趍文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體文成七步未足化人況盡心卉木之間極筆煙霞之際以斯成俗豈非大謬通監唐高祖戴至德為右僕射劉仁軌為左僕射更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有冤結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取之通監唐高宗選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家彼皆庸人豈足當閫外之任李左車陳湯呂蒙孟觀皆出貧賤而立殊功未聞其家代為將也少府監裴匪舒善營利奏賣苑中馬糞歲得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也並同上尚方監裴匪躬檢校京苑將鬻苑中蔬果以收其利蘇良嗣曰昔公儀休相魯能拔葵去織婦未聞萬乘之主鬻蔬果也乃止通監唐武后狄仁傑同平章事太后謂仁傑曰卿在汝南甚有善政卿欲知讚卿者名乎仁傑謝曰陛下以臣為過臣請改之知臣無過臣之幸也不願知讚者名禁天下屠殺右拾遺張德生男三日私殺羊會同僚補闕杜肅懷一餤上表告之明日太后對仗謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭伏罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇人出肅表示之肅大慚舉朝欲唾其面劉知幾表陳四事其一以赦令不息近則一年再降遠則每歲無遺元日之朝指期天澤重陽之節佇降皇恩如其忖度咸果釋免或有名垂結正罪將斷決竊行貨賄方便規求故致稽違畢霑寬宥為善者不預恩光作惡者獨承徼幸古語曰小人之幸君子之不幸斯之謂也太后問鸞臺侍郎同平章事陸元方以外事對曰臣備位宰相若大事不敢不以聞人間細事不足煩聖聽由是忤旨並同上朱敬則為相以用人為先自餘細務不之視通監唐中宗宗楚客令袁守一奏言則天昔在三陽宮不豫狄仁傑奏請陛下監國元忠密奏以為不可上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎同上楊孚彈紏不避權貴權貴避之上曰鷹捕狡兔須急救之不爾必反為所噬御史繩奸慝亦然苟非人主保衛之則亦為奸慝所噬矣通監唐玄宗上命宋璟蘇頲為諸皇子制名及國邑之號又令別制一佳名及佳號進之璟等上言七子均養著於國風今臣等所制名三十餘輒混同以進以彰陛下覆燾無偏之德上甚善之山東大蝗盧懷慎以為殺蝗太多恐傷和氣崇曰昔楚莊吞蛭而愈疾孫叔殺蛇而致福奈何不忍於蝗而忍人之饑死乎若使殺蝗有禍臣請當之皇后妹夫尚衣奉御長孫昕以細故與御史大夫李傑不協昕與其妹夫楊仙玉於里巷伺傑而歐之傑上表上大怒命於朝堂杖殺以謝百僚以書慰傑互入徇公忘私上欲加牛仙客尚書張九齡曰不可李林甫言於上曰仙客宰相才也何有於尚書九齡書生不達大體上悅明日上曰卿嫌仙客寒微如卿有何閥閱九齡曰臣嶺海孤賤不如仙客生於中華然臣出入臺閣典司誥命有年矣仙客邊隅小吏目不知書若大任之恐不愜眾望前廣州都督裴胄先下獄上與宰相議其罪張嘉貞請杖之張說曰臣聞刑不上大夫為其近於君且所以養廉恥也故士可殺不可辱臣曏巡北邊聞杖姜皎於朝堂皎官登三品亦有微功有罪應死則死應流則流豈可輕加笞辱以皁隸待之乎事往不可復追胄先據狀當流豈可復蹈前失上深然之並同上上嘗從容與李泌語及李林甫欲敕諸將克長安發其冢焚骨揚灰泌曰陛下方定天下奈何讎死者彼枯骨何知徒示聖德之不弘耳通監唐肅宗上又謂李泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宮以慰上皇心對曰宜待上皇之命不過晚歲月之間耳上從之王去榮以私怨殺本縣令當死上以其善用礮免死中書舍人賈至不即行下上表以為去榮無狀殺本縣之君若以礮石一能則免殊死今諸軍技藝絕倫者其徒實繁必恃其能所在犯上復何以止之今惜一去榮之才而不殺必殺十如去榮之才者不亦其傷益多乎並同上裴諝入奏事上問榷酤之利歲入幾何諝久之不對上復問之對曰臣自河東來所過見菽粟未種農民愁怨臣以為陛下召臣必先問人之疾苦乃責以營利臣是以未敢對也通監唐代宗京兆尹黎幹奏秋霖損稼韓滉奏幹不實渭南令劉澡阿附度支稱縣境苖不損上曰霖雨溥博豈得渭南獨無命御史視之損三千餘頃代宗嘆息久之曰縣令字人之官不損猶應言損乃不仁如是乎不癡不聾不為家翁兒女閨房之言何足聽也朱泚獻貓鼠同乳不相害者以為瑞常袞帥百官稱賀中書舍人崔祐甫獨不賀曰物反常為妖貓捕鼠乃其職也今同乳妖也何以賀為並同上代宗將發引上送之見轀輬車不當馳道稍指未丁之間問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行通監唐德宗天不以地有惡木而廢發生天子不以時有小人而廢聽納以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之奸邪役智彌精失道彌遠項籍納秦卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦己甚矣漢高豁達大度天下之士至者納用不疑其於備虞可謂疏矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荊軻奮其陰計光武寬容博厚而馬援輸其款誠豈不以虛懷待人人欲思附任數附物物終不親情思附則感而悅之雖寇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣智出庶物冇輕待人臣之心思周萬機有獨馭區㝢之意謀吞眾略有過慎之防明照群情有先事之察嚴束百辟有任刑政之規威制四方有以力勝殘之志劉從一詣蕭復曰欽緒宣旨令從一與公議朝來所言事即奏行之勿令李盧知復曰李盧不堪為相乃罷之既在相位安得不與之同議李泌曰宰相之職不可分也非如給事則有吏過兵過舍人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也並通監裴垍為相奏天下留州送使物垍一切用省估通監唐憲宗宰相議誅李錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟乂曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎宰相以為然盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房元齡康誥, krp: ''}
