  - {type: variant, offset: 6969, length: 623, content: 而不致仕有司以時按籍舉行胡宿以為養廉恥厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其事使人得自言而全其美節歐公撰胡宿墓誌陳執中為相范蜀公嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今陰陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之范鎮墓誌歐陽脩余靖蔡襄王素欲引石介范文正公曰介為諫官必以難行之事責人君以必行少拂其意則引裾折檻叩頭流血無所不為主上無失德政事自修安用如此諫官諸公伏其言東軒筆錄韓魏公為相日曾公為亞相趙康靖與歐陽公為參政凡事該政令則曰問集賢該典故則曰問東廳該文學則曰問西廳至於大事則自決之人以為得宰相體塵史有人欲為范希文買綠野堂希文不肯曰在唐如晉公者是可尊也一旦取其物而有之如何得安寧使耕壞及它有力者致之己則不可取言行錄日月經天大可以被四海而小或不能入一屋之下彼固無用此區區之小明也老泉昔謝安破苻堅書至安與客圍棊不輟曰小兒輩已遂破賊安亦非矯情蓋萬目觀望事體應爾東坡論擒獲鬼章稱賀太速劄子寧容網自漏吞舟誰能烹鮮作苛碎後山周世宗嘗作詩以示學士竇儼曰此可宣布否儼曰詩專門學王者若厲精叩課有妨機務苟切磋失至又不盡善世宗解其意遂不作詩楊億談苑劉綽天聖中為京西漕分遣屬官盤量諸郡在庾之糧凡收十餘萬石歸朝上殿具劄子乞付三司收繫時章獻太后垂簾問曰已盤量者條貫許再盤量否曰向來盤量官多徇顏情不肯盡收入曆又曰卿識王曾張知白呂夷簡魯宗道否此四人者皆不因盤量收出斛斗致身于此劉大慚謂人曰當是時殿上壁罅可入我亦入矣, WYG: 六}
