  - {type: variant, offset: 6886, length: 2, content: 求對, WYG: 器之乃悟其戲為之大笑東坡作偈曰不怕石頭路來參玉版師聊憑栢樹子與問籜龍兒冷齋夜話東坡云文與可嘗令余作洋州三十詠篔簹谷其一也予詩曰漢川脩竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濱千畆在胷中與可是日與其妻㳺谷中燒筍晩食發函得詩大笑噴飯滿案畫篔簹谷記故人知我意千里寄竹萌駢頭玉嬰兒一一脱錦綳東坡隣里亦知偏愛竹春來相與䕶龍雛數里春畦獨自尋迸屖抽錦亂森森田文死去賔朋散抛擲三千玳瑁簮王元之繭栗戴地翻觳􅑌觸墻壞南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束}
