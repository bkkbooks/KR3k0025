  - {type: variant, offset: 877, length: 1, content: 縷, WYG: 也晉書自秦壊古文有八體一曰大篆史籀書二曰小篆李斯書三曰刻符即古繆篆四曰蟲書即鳥書書幡首象勢而書五曰摹印秦璽文也六曰署書漢蕭何所定以題蒼龍白虎二闕七曰殳書殳有八觚隨其勢書八曰𨽻書程邈所作徒𨽻}
  - {type: page-break, offset: 877, content: '', id: KR3k0025_WYG_082-2a, image: WYG0932/WYG0932-0499a.png}
  - {type: variant, offset: 877, length: 1, content: 縷, krp: 也晉書自秦壊古文有八體一曰大篆史籀書二曰小篆李斯書三曰刻符即古繆篆四曰蟲書即鳥書書幡首象勢而書五曰摹印秦璽文也六曰署書漢蕭何所定以題蒼龍白虎二闕七曰殳書殳有八觚隨其勢書八曰𨽻書程邈所作徒𨽻}
  - {type: variant, offset: 879, length: 3, content: 任係千, WYG: 書王莽時使司空甄豐改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者也三曰篆書秦篆書也四曰佐書即𨽻書也五曰繆篆所以摹印也六曰鳥書所以書幡信也及許慎説文用篆書為正以為體例最可得而論也同上傳記則天好改新字有言國中有或或者惑也乞一武鎮之乃改作復言武在口中與困何異乃改作圀正字通篆籀八分𨽻章草草書飛白行書通謂之八體尚書故實鶴頭蚊脚二書皆漢詔板所用各象形也書法苑百體有懸針書垂露書秦王破塜書金鵲鵠頭書虎爪書倒薤書偃波書信幡書飛白書籀書繆書𫝊書制書列書日書月書風書署書蟲書葉書明書逢書天竺書楷書芝英𨽻花草𨽻鐘鼓𨽻仙人𨽻龍麒麟篆仙人魚蟲篆鳥篆鼠篆科斗篆復有大小篆牛書蟲書草書龍書猴書犬書雞書雲書雨書行書押書檝書藁書半草書奏召用虎爪為不可學以防詐偽告下用偃波書謝草用蚋脚書節信用鳥書朝賀用填書亦施於婚姻西域書起屍書右旋書蓮花書節分書大秦書䭾乗書牸牛書樹葉書闕覆書天書龍鳥等書六十四種簡秦書兼素書捨此之外書存猶一百二十體闕注五十六體書晉徐安子撰五十一體書勢蕭子雲撰隂陽分則有三元八會之文又有八龍雲篆光明之章也其後三皇之世演八會之文為龍鳳之章拘省雲篆之迹以為順形梵書破分二道壊真從易乃為六十四種之書遂播之三十六天上下也今三元八會太極清山之所用雲篆光明今所見神靈符書之字是也真誥書有十體較其優劣差之為神妙能之品居神品者二十有五妙品九十有八能品一百有七古今善書盡於是矣書斷真生行行生草真如立行如行草如走未有未能立能行而能妙於走者也志林集師宜八分之巧元帝三昧之章史籀李斯之篆梁鴻曹喜之書莫不總華桂宫盈滿甲館竊以為鸞驚之勢既聞之於索靖鷹踀之巧又顯之於蔡邕是以遊霧重雲𫝊敬禮之法鳥鵠魚鵷表揚泉之賦頗好六文多慙三禮尚方大篆既甚牢落柱下方書何曾髣髴空慕河間之聚書竟徴東平之獻表齊收尺牘顧已缺然北海楷𨽻終成難擬梁元帝上東宫古跡啟本朝古之字書皆從左文凡字其類在左其義在右如木類其左皆從木所謂右文凡如戔小也水之小者曰淺}
