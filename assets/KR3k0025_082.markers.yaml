  - {type: variant, offset: 2329, length: 258, content: 為決𤴯胡視切潰癰忘其肝膽遺其耳目芒然彷徨乎塵垢之外逍遙乎無為之表墮枝體黜聰明離形去智同於大通此謂坐忘並莊子大宗師其生若浮其死若休莊刻意死生同狀莊天地吾所以有大患者為吾有身及吾無身吾有何患老寵辱章無町畦莊人間世莊子將死弟子厚葬之曰吾恐烏鳶之食夫子也莊子曰在上烏鳶食在下螻蟻食奪彼予此何其偏也莊子妻死惠子吊之方箕倨鼓盆而歌並莊子人生天地之間若白駒之過隙忽然而已莊知北遊以死生為寤寐以形骸為逆旅莊子平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可衣薪而棄諸溝壑亦可袞衣繡裳而納諸石椁亦可唯所遇焉死後數百年餘名豈足潤枯骨並列楊朱魏, WYG: 問溪}
