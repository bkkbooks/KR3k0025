  - {type: variant, offset: 3564, length: 295, content: 嵇康自代康曰譬猶禽鹿少見馴育則服教從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豊草高士傳集何所獨無荒草兮爾何懷乎故宇楚辭苟縱心於物外安知榮辱之所如張衡歸田賦丈夫志四海萬里猶比鄰何必同衾禂然後展慇懃曹植微身輕蟬翼潘安仁河陽詩人生如寄多憂何為善哉行身名竟誰辨圖史終磨滅謝靈運遊山以天地為一朝以萬期為須臾日月為扄牖八荒為庭衢行無轍跡居無室廬幕天席地縱意所如止則操卮執觚動則挈榼提壺劉伯倫頌陶子將辭逆旅之館永歸于故宅羞以嘉蔬薦以清酌陶潛自祭文釋域中之常戀暢超然之高情孫綽天台賦放浪形骸之外王羲之蘭亭序一隨往化滅安用空名揚謝靈運求一日之足當百年之溢晉孫綽蘭亭詩敘窅然遺天地乘化入無窮聖人以萬機為貴而我, WYG: ''}
