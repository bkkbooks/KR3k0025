  - {type: variant, offset: 2855, length: 399, content: 更饋焉受之取足而反其餘讀易至損益卦歎曰吾已知富不如貧貴不如賤但未知死何如生耳後漢趙岐先自為壽藏圖季札子產晏嬰叔向四像居賓位又自圖其像居主位皆為讚頌敕其子曰我死之日墓中聚沙為床布簟白衣散髮其上覆以單被即日便下下訖便掩坎本傳劉伶放情肆志常以細宇宙齊萬物為心常乘鹿車攜一壺酒使人荷鍤隨之曰死便埋我晉書本傳畢卓常謂人曰得酒滿百斛舩四時甘味置兩頭右手持酒盃左手持蟹螫拍浮酒舩中便足了一生矣晉書本傳張翰縱任不拘因見秋風起乃思吳中菰菜蓴羹鱸魚鱠曰人生貴得適意何能羈宦數千里以要名爵乎遂命駕而歸晉本傳阮脩性簡意有所思率爾褰裳至或無言欣然相對常步以百錢挂杖頭至酒店便酣暢晉書阮籍傲然獨得任情不羈當其得意忽忘形骸郄超卓犖不羈有曠世之度阮孚蓬髮飲酒不以世務嬰心常以金貂換酒並晉本傳張翰曰使我有身後名不如即時一柸酒時人貴其曠達曰人生貴適意耳富貴何為同上王徽之居山陰憶戴逵夜乘小舡詣之造門不前而反曰乘興而來興盡而反何必見安道, WYG: ''}
