  - {type: variant, offset: 1305, length: 0, content: '', WYG: 飛白王僧䖍云飛白八分之輕者邕在鴻都門見匠人施堊帚遂創意焉書斷李嗣真云王逸少飛白猶霧縠卷舒煙空炤灼長劍耿介而倚天勁矢超忽而無地可謂飛白之仙法書吳張敬禮善飛白以為飄若浮雲激如驚電晉王廙善飛白書若鵰鶚之翅羽旌旗之卷舒蕭侍中飛白浄可愛令取掃帚沾泥汁中以書壁為方丈一字晻曖斐亹極有體勢㑹萃梁武帝謂蕭子雲曰蔡邕飛而不白羲之白而不飛飛白之間在卿斟酌耳尚書故實梁武帝造寺令蕭子雲飛白大書蕭寺至今一字存焉國史補集秋毫}
