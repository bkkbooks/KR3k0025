  - {type: variant, offset: 1304, length: 0, content: '', WYG: 也書斷崔瓊善章草書師於杜度而媚輒過之㸃畫精微神變無礙王隱謂之草賢張伯英尤善章草韋仲将謂之草聖書評張旭章草類伯英時人謂之亞聖書斷史游作急就章蓋插𨽻之規矩存字之梗槩本草創之義謂之草書至建初中杜度善草章帝詔上章表令作草體始號章草法書苑羲之常以章草答庾亮亮示翼翼因與羲之書云吾昔有伯英章草數紙過江顛沛遂至忘失常歎妙迹永絶忽見足下答家兄書恍若神明還舊觀圖書薈粹飛白𫝊記按飛白書者後漢左中郎蔡邕所作也王隠王愔並云飛白變楷制也本是宫殿題署勢勁文字宜輕微不滿名既}
