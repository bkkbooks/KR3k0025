  - {type: variant, offset: 1302, length: 1, content: 反, WYG: 惑令狐楚與嚴少保書蒼頡鳥迹既茫昧字體變化如浮雲陳倉石鼓文已訛大小二篆生八分秦有李斯漢蔡邕中間作者寂不聞杜詩惜哉李蔡不復作吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元以來數八分潮也奄有二子成三人八分一字值萬金蛟龍盤挐肉屈强並同上阿買不識字頗知書八分詩成使之寫亦足張吾軍韓集楷書史上谷王次仲始作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小者方寸千言甚矜其能或不時前詣酒家飲因書其壁顧觀者以讐酒討錢足而滅之每書輒削其柎梁鵠乃益為版而飲之酒俟其醉而竊其柎晉書傳記秦羽人王次仲以𨽻書作楷法書斷王獻之字子敬幼學於父後改變制度率爾師心冥合天矩年五六嵗時學書右軍從後潛掣其筆不脱乃嘆曰此兒當有大名遂書樂毅論與之學竟能極小真書可謂窮微入聖書斷隋文帝曰妙書冠絶古今字之體勢一筆而成衛瓘索靖號一臺二妙瓘云我得伯英之筋恒得其骨靖得其肉恒謂衛恒杜預三世善草書並同集悲風生微綃萬物起古色杜甫詠張旭草書圖嗚呼東吳精逸氣感清識同上本朝顛張醉素兩禿翁追逐世好稱書工何曽夢見王與鍾妄自粉飾欺盲聾有如市井倡抹紅妖歌慢舞眩兒童謝家夫人淡丰容蕭然自有林下風天風蕩蕩驚跳龍山林飛鳥一掃空為君草書續其終待我他日無匆匆東坡題王逸少帖章草傳記按章草漢黄門令史史游所造也愔云漢元帝時史游作急就章解散𨽻體麄書之漢俗隨漸以行之}
