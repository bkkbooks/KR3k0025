  - {type: variant, offset: 4107, length: 586, content: 翼妬雲生我身乘風振迅出六合絕浮塵死生哀樂兩相棄是非得失付閑人江魚不池活野鳥難籠馴並韓文至仁以死生為傳舍以軒冕為儻來留名萬代不關身並劉賓客肺腑都無隔形骸兩不羈白侍郎上一句互入梟白悠悠天地內一死會相逢互入寬解安處即為鄉鄙斗筲之奚筭哂挈瓶之固守身後堆金拄北斗不如生前一柸酒第一莫若禪第二莫若醉禪能泯人我醉可忘榮悴飄然世塵外鸞鳳如何追形骸屬日月老去何足驚栖心釋梵浪跡老莊汨市朝溺妻子非達也囚山林擯血屬亦非達也若有人與群動處一代間彼為彼我為我不自潔不自污不巢許不伊呂水其心雲其身浮沉消息無往而不自得者其惟達人乎互入無往不自得吾觀九品至一品其間氣味都相似紫綬朱衣青布衫顏色不同而已矣付命有厚薄委心信窮通通當為大鵬舉翅摩蒼穹窮則為鷦鷯一枝足自容苟能知此道身窮心不窮功名斗藪是灰塵其生也浮雲其死也委蛻來何緣去何緣吾性不動吾形屢遷巳焉巳焉吾安往而不可又何足厭戀乎其間伯倫每置隨身鍤元亮先為自祭文去有何顧戀住亦無憂撓名為錮身鎖利是焚身火形神兩是幻夢寐俱非實餘年自問將何用恐是人間賸長身相看萬里別同是一浮萍並白樂天古之達人以生為寄為夢以死為歸為魂偶然即泯為大空與不生同杜牧之理涉虛趣心潛潛一作階靜緣室為為一作惟生白人則思玄張說之文勢去未須悲時來何足喜白侍郎互入見有定力惟有不二門其間無夭壽同上富貴何如草頭露杜詩始終者萬物之大歸生死者百年之常分駱賓王存亡去就如九牛一毛長林豊草豈與官署門闌有異乎並, WYG: 笑}
