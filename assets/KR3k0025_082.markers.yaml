  - {type: variant, offset: 1283, length: 0, content: '', WYG: 季孟兼真謂之真行帶草謂之行草法書苑吳皇象善行草書世稱沉著痛快同上鍾胡二家為行書法今大行於世類要草書史漢興而有草書至章帝而齊相杜度號善作篇崔瓊崔寔亦皆稱工杜氏投字甚安而書體微痩崔氏甚得筆勢而結字小疎𢎞農張伯英因而精轉甚巧至今猶寳其書韋仲将謂之草聖伯英弟文舒者次伯英又有姜孟穎梁孔達田彦和及韋仲将之徒皆伯英弟子有名於世羅叔景趙元嗣者與伯英並時或云伯英自稱上比崔杜不足下方羅趙有餘張旭嗜酒每大醉呼叫狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼張顛初任為常熟尉有老人陳牒求判宿昔又求旭怒老人曰觀公筆奇妙欲以藏家耳因問所藏盡出其父書旭覽之天下奇筆也自是盡其法}
