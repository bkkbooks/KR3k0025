  - {type: variant, offset: 1343, length: 0, content: '', WYG: 中則一管躍出筆盡雖官府勢要求之無復有也時人謂之仙筆四譜宣州諸葛氏能作筆栁公權求之先與二管語其子曰栁學士如能書當留此筆不爾退還即以常筆與之未幾果退還先與者二筆非右軍}
