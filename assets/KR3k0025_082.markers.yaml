  - {type: variant, offset: 1345, length: 1, content: 陞, krp: 用也同上晉韋日好作筆王子敬得其筆歎為絶世書斷許漢陽遇龍女觀其筆白玉為管博異志智永禪師學書有秃筆頭十瓮取瘞之謂之退筆塜尚書故實嶺南嘗有郡牧得兔皮使工人製筆醉失之因剪已鬚為筆甚善便使為之工者以實對遂下令使一户輸人鬚或不能致輒責其直異物志有書生謁李林甫曰管子文後化為筆大唐遺事有僦馬生甚貧遇人與虎毛紅筆管一枝曰所須但呵筆即得之然夫妻之外令一人知則殆矣時方暑欲凝煙帳風篁扇皆呵而得之一日晩思兔頭羮連呵得數盤夫妻不能盡以與鄰家自是呵之無應纂異記薛稷為筆封九錫拜墨曹都統墨水郡王兼毛州刺史雲仙散録李仲甫賣筆遼東市一筆三錢如無錢亦與筆神仙傳集毛頴者中山人也秦始皇時蒙将軍恬南伐楚次中山圍毛氏之族抜其豪載頴以歸秦皇使恬賜之湯沐而封諸管城號曰管城子累拜中書令上嘗呼為中書君頴與絳人陳𤣥𢎞農陶泓及會稽楮先生友善其出處必偕後因進見上将有}
