  - {type: variant, offset: 1313, length: 0, content: '', WYG: 貴其能軟石美其潤堅加采漆之膠固含沖徳之清𤣥同上琉璃硯水長枯槁李白巨璞禹鑿餘杜詩其光或雷電其滑乃波濤同上文字之祥君家其曰韓髙仙君硯銘𢎞農陶泓毛穎傳栁州龍壁多秀石可觀栁文端州石工巧如神踏天磨刀割紫雲傭刓抱水含滿唇暗洒萇𢎞冷血㾗李賀紗帷晝暖墨花春輕漚漂沬松麝薰同上本朝硯四十餘品以青州紅絲石第一斧柯山第二龍尾石第三餘皆在中下雖銅雀臺古瓦硯列於下品特存古物耳端所出有四品嵓石為甲石屋次之西坑又次之後埜為劣而嵓石又分上下又有活眼死眼之别圓暈相重黄黑相間黳精在内晶瑩可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形體略具内外皆白殊無光彩謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼蘇易簡硯譜歙州石出於龍尾溪以金星為貴虢州澄泥唐人品硯以為第一今人罕用澤州道人吕翁作澄泥硯堅重如石上著名字李充伯得玉材琢為硯發墨可愛青州以熟鐵為硯甚發墨有柄可執世言端溪水中石其色青山半石其色紫山絶頂者尤潤如猪肝色者佳其貯水處有白黄色㸃者謂之鴝鵒眼脉理黄者謂之金線紋其山號斧柯端溪石硯之美正在於眼如木之有節今不知者乃以為石病吁可痛哉惟上嵓有眼眼之美者青緑黄三色相重多者自外至心凡九重其生於墨池之外者謂之髙眼生於内者曰低眼髙眼尤可尚以其不為墨漬常可睹也或云石有金線為美正其病也端溪有斧柯茶園将軍池同是一溪惟斧柯出者佳茶園次之将軍又次之並同上端石本以子石為上流俗𫝊訛遂以紫石為上然十無一二發墨者但充玩好而已歙石大抵多發墨以金星為貴端溪以北嵓為上龍尾以深溪為上較其優劣龍尾逺出端溪上而端溪以後出見貴爾歐公硯譜端溪有三種曰上嵓曰西坑曰後埜西坑硯三當嵓石之一後埜三當西坑之一東軒筆録唐林夫與余端硯一枚極佳但小而凸磨墨不甚便作硯者意待數百年後硯平乃便墨耳一硯猶須作數百年計而作事乃不為明日計可不謂大惑耶東坡淄石號韞玉硯發墨而損筆端石非上嵓者宜筆而褪墨二者當安所去取用褪墨硯如騎鈍馬數步一鞭數字一磨不如騎騾用瓦硯也澤州金道人澄泥硯多作投壺樣其首有吕字非刻非畫堅緻可以試金並同上君看龍尾豈石材玉徳金聲寓於石與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知東坡贈龍尾硯羅文歙人也上世隠龍尾山漢武帝召見叩擊之其音鏗鏗可聴上喜曰古所謂玉質而金聲者子真是也使待詔中書久之更拜舎人東坡萬石君羅文傳玉堂新樣世争𫝊况以蠻溪緑石鐫王荆公江上有石形色類}
