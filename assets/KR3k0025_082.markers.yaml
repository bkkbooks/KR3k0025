  - {type: variant, offset: 3867, length: 0, content: '', WYG: 海苔為紙今無復有今人以竹為紙亦古所無有也東坡山谷為范子黙求染鴉青紙詩云學似貧家老破除古今迷望失三餘極知鵠白非新得謾染鴉青襲舊書山谷深如女髮蘭膏罷明似山頭夜月餘為染溪藤三百个待渠湔拂一床書同上陽山老藤截玉昉烏孫翠竹避寒光羅侯包贈室生白明於機上之流黄愧無征西蠆尾手為寫黄門急就章變溪印藤卷盈百側理羞滑繭羞白並前人剡藤開玉板坡詩牋史陳後主常使張貴妃等八人夾坐江總孔範等十人預宴號曰狎客先令婦人襞采牋製五言詩十客一時繼和南史韋陟常以五色牋為書記使侍妾主之其裁荅受意而已唐書𫝊記柏𤣥詔平準作桃花牋及縹緑青赤者法書􅁐武公愛妾曰非煙以金鳳牋寫詩寄象象以剡溪玉葉紙賦詩以謝之非煙傳非煙授趙象以連蟬錦香囊并碧苔牋同上薛濤好製小詩惜其幅}
