  - {type: variant, offset: 3255, length: 308, content: 晉王徽之傳阮孚曰未知一生能著幾兩屐晉書陶潛為彭澤令在官八十餘日解印去縣未嘗有所造詣所之唯至田舍及廬山遊觀而已阮籍聞步兵廚營人善釀有貯酒三百斛乃求為校尉遺落世事並晉本傳顧榮素好琴張翰哭之上床鼓琴數曲撫琴而款曰顧彥先能復賞此不因又哭不吊喪主而去晉書不事崖撿宋書梁蕭恭曰勞神苦思竟不成名豈如臨清風對明月登山泛水肆意酣歌也南史梁本傳放情事外浮沉讌詠唐書貴賤苦樂更迭為之亦復何傷通鑑唐高祖語言之間何足介意通鑑唐太宗姚崇孫勗自為壽藏於萬安山崇塋之旁署兆曰寂居穴墳曰復真堂中剟上為臺曰化臺新唐書本傳傳記馬融才高博洽為通儒達生任性不拘儒者之節東觀漢紀澹臺子羽渡水子溺死將葬之滅明曰此命也吾豈與螻蟻為親戚魚鱉為仇讎遂以葬之博物志山巨源, WYG: 雖}
