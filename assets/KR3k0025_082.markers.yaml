  - {type: variant, offset: 4964, length: 729, content: 身外酒千柸並溫飛卿天地者萬物之逆旅光陰者百代之過客意遠超超然若萬里之鶴也飄飄然不知冠冕之在巳浩浩然不知天地之為大冥機慎道跡繫心曠鴻遡清風凌顥氣翱翔自得於冥冥之間循大小於天倪既齊椿菌忘壽夭於物化寧辨彭殤無春夏秋冬四時之行無得失是非去來之蹟得非我美失非我恥並唐文粹一朝同物化身與糞壤并畢竟金與銀何殊泥與塵貴賤與貧富高下雖有殊憂樂與利害彼此不相踰是以達人觀大化同一途並白侍郎不恨百年促翻悲萬劫長眼前讎敵都休問身外功名一任它雲到何方不是家萬齡龜菌等一死天地平並元微之高士不羈世頗將榮辱齊韋應物本朝食前方丈飽則止一瓢飲水樂可涯廬陵集金鐵有時而腐山岳有時而摧凡有形之物即易壞老泉大患緣有身無身則無疾自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也東坡下眡官爵如泥淤具廢何足吊萬世一俯仰名高不朽終安用有生何處不安生功名一破甑棄置何用顧已向閑中作地仙更於酒裡得天全人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無一留者五更待漏靴滿霜不如三丈日高睡足比窗涼珠襦玉匣萬人祖送過北邙不如懸鶉百結獨坐負朝陽生前富貴死後文章百年瞬息萬世忙夷齊盜跖俱亡羊不如眼前一醉是非憂樂兩都忘愛惜微官將底用它年端好寫旌銘萬古一昏曉平生寓物不留物在家學得忘家禪逸韻謝邊幅升沈何足道等是蠻與觸回翔天壤間何必懷此都年來萬事足所欠惟一死何必擇所安滔滔天下足譬之煙雲之過眼百鳥之感耳豈不欣然接之去不復念也並東坡坐中客滿誰憂百榼之空身後名輕但覺一盃之重東坡濁醪有妙理賦雞虫得失何須筭鵬鷃逍遙各自知收拾乾坤付一壺世間無物直錙銖並臨川鄉閭等行路何處更為家後山已將世界等微塵空裡浮花夢裏身盛衰閱過君應笑寵辱年來我亦平何侯方丈庾郎三韭較豐約於夢寐卒同歸於一朽百年雖長要有終富死未必輸生窮並東坡, WYG: 八十二}
