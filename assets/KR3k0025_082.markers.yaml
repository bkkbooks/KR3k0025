  - {type: variant, offset: 1306, length: 2, content: 衛常, WYG: 勁霜素凝鮮玷此瑶波染彼松煙超工八法盡竒六文輕如遊霧重似崩雲鮑照翠箔映雪羅衣隨風崩雲委地游霧縈空類要煙霧交霏虯鸞縈動同上本朝仁宗飛白尤妙李唐卿撰飛白三百㸃以進上乃為清浄二字賜之其六㸃尤為竒絶又出三百㸃之外歸田録霏霏乎其若輕雲之蔽月翻翻乎其若長風之卷斾也猗猗乎其若遊絲之縈栁絮裊裊乎其若流水之舞荇蔕也東坡贊金牋洒飛白瑞霧縈長虹同上硯史栁公權嘗評硯以青州石未為第一言墨易冷絳州墨硯次之唐書𫝊記漢武帝賜青鐵硯是于闐國所獻博物志漢制天子以酒為書滴以玉為硯}
