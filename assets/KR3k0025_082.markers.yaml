  - {type: variant, offset: 1698, length: 323, content: 監七秦紀桓魋武叔不量力欲撓一草搖蟠挑臨川譬如敝車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有陰雨之變陵谷之險其患必有不可知者欒城集欲將駒過隙坐待石穿溜東坡集經深則厲淺則揭詩衛風匏有苦葉豈其食魚必河之魴豈其取妻必齊之姜詩衡門就其深矣方之舟之就其淺矣泳之游之雖無旨酒式燕庶幾雖無嘉肴式食庶幾雖無德與女式歌且舞詩變小雅車舝禮從宜記曲禮上子游問喪具夫子曰稱家之有亡記檀弓上君子之於禮也有直而行也有曲而殺也記禮器啜菽飲水盡其歡斯之謂孝歛手足形還葬而無槨稱其材斯之謂禮記檀弓下子為高必因丘陵為下必因川澤清斯濯纓濁斯濯足並孟離婁上夫待腰褭飛兔而駕之則世莫乘車待西施毛嬙而為配則終身不家矣淮南子齊俗訓史何必華山之騄耳而后行遠乎史記樂書浴不必江海要之去垢馬不必騏驥要, WYG: 神録紙}
