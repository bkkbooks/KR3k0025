  - {type: variant, offset: 1310, length: 0, content: '', WYG: 京雜記唐李衞公收硯至多其尤妙者名結鄰言與相結為鄰也開元錄内中有七寳硯鑪冬寒氷自消開元天寳遺事薛稷為硯封九錫拜離石鄉侯使持節即墨軍事兼鐵面尚書雲仙散錄徐𤣥之夜讀書見人物如粟米數百皆具甲胄擁一紫衣者行案上𫝊呼曰蚍蜉王欲觀魚於紫石潭漁具數十入硯中皆獲小魚異聞錄許漢陽遇龍女以白玉為硯玻瓈為匣硯中皆貯銀水博異志集採隂}
