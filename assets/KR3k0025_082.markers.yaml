  - {type: punctuation, offset: 89, content: 《, id: KR3k0025_CHANT_082-bkkpn32}
  - {type: variant, offset: 89, length: 355, content: 西漢本傳藜藿有八珍之甘蓬蓽有藻梲之樂晉書葛洪傳陶潛環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也晉本傳傳記顏蠋曰安步以當車蔬食以當肉戰國策大雪丈餘洛陽令行見人家皆除路而袁安門無行路謂安死矣令看之見安偃臥問之荅曰大雪人人皆餓不宜干人後漢注見汝南先賢傳集含歡谷汲行歌負薪陶潛自祭文灌園鬻蔬以供朝夕之膳潘安仁閑居賦食先人之德無厚生之財陳子昂故園生事微韋應物長安布衣誰比數反掃衡門守環堵長貧任婦愁手自移蒲柳家纔足稻梁並杜詩活計縱貧長淨潔白傳集筆耕為養傭書成學任彥昇表素尚寧知貴清談不厭貧溫飛卿本朝貧家何以娛樂但知抹風批雨一本作抹月批風東坡詩家徒四壁書侵坐山谷陋巷一生顏氏樂清風千古伯夷貧程顥和邵康節安樂窩經志大心勞所以求者非其道也詩甫田士志於道而恥惡衣惡食者未足與議也語里仁子弓人而恥為弓矢人而恥為矢孟公孫丑上經貧者不以貨財為, WYG: 周}
