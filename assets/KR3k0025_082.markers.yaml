  - {type: variant, offset: 1247, length: 0, content: '', WYG: 歐陽詢初效王羲之書後險勁過之因自名其體尺牘所𫝊人以為法禇遂良亦以書自名嘗問虞世南曰吾書何如智永荅曰吾聞彼一字直五萬君豈得比遂良曰孰與詢曰吾聞詢不擇紙筆皆得如志君豈得比唐書貞觀永徽間虞世南禇遂良以書顓家後莫能繼薛稷外祖魏徵家多藏虞禇書稷鋭情臨倣結體遒麗遂以書名天下徐浩嘗書四十二幅屏八體皆備世狀其法曰怒猊抉石渴驥奔泉穆宗問栁公權用筆法對曰心正則筆正筆正乃可法矣帝改容悟其筆諫也其書法結體勁媚自目一家文宗命題殿壁歎曰鍾王無以加之嘗書京兆西明寺金剛經有鍾王歐虞禇}
  - {type: page-break, offset: 1247, content: '', id: KR3k0025_WYG_082-5b, image: WYG0932/WYG0932-0500d.png}
  - {type: variant, offset: 1247, length: 0, content: '', krp: 歐陽詢初效王羲之書後險勁過之因自名其體尺牘所𫝊人以為法禇遂良亦以書自名嘗問虞世南曰吾書何如智永荅曰吾聞彼一字直五萬君豈得比遂良曰孰與詢曰吾聞詢不擇紙筆皆得如志君豈得比唐書貞觀永徽間虞世南禇遂良以書顓家後莫能繼薛稷外祖魏徵家多藏虞禇書稷鋭情臨倣結體遒麗遂以書名天下徐浩嘗書四十二幅屏八體皆備世狀其法曰怒猊抉石渴驥奔泉穆宗問栁公權用筆法對曰心正則筆正筆正乃可法矣帝改容悟其筆諫也其書法結體勁媚自目一家文宗命題殿壁歎曰鍾王無以加之嘗書京兆西明寺金剛經有鍾王歐虞禇}
  - {type: variant, offset: 1248, length: 2, content: 贄傳, WYG: 諸家法自為得意吕向工草𨽻能一筆環寫百字若縈髮然世號連錦書並同上𫝊記梁武帝評書云鍾繇書如雲鵠遊天羣鳬戲海王羲之字勢雄逺如龍跳天門虎卧鳳闕書斷衛夫人正書入妙品如玉壺之氷瑶臺之月婉然芳樹穆若清風法書苑王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悦而舉體躁跳殊不可耐羊欣書如大家婢為夫人雖處其位而居止羞澁終不似真徐淮南書如南岡士大夫徒好尚風軌終不免寒乞阮研書如貴胄失品次不能復排突英賢王儀同書如晉安帝非不處尊髙而都無神施吳興書如新亭傖父一往見似揚州人共語便音態出陶隠居書如吳興小兒形雖未成長而骨體甚駿快殷均書如髙麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發如}
