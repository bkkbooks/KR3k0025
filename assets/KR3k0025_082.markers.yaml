  - {type: variant, offset: 1118, length: 126, content: 不知量也東漢本傳投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢東漢夏侯湛傳譬由虻蚋之捕群牛腐肉之齒利劍也漢書步騭表言北相多作布囊盛沙塞江大向荊州呂範諸葛恪云此江與開闢俱生寧有可以沙塞埋也三國吳志步騭傳注欲以片心除眾弊獨手遏群邪君子不亮其誠群小共攻其短, WYG: 體}
