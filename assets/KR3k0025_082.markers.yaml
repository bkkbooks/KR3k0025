  - {type: variant, offset: 1624, length: 0, content: '', WYG: 記左伯字子邑甚能造紙漢興有紙代簡至和帝時蔡倫工為之而子邑尤得其妙書斷南朝以紙為畨為幅為枚湘東王上荆武紙萬幅筆四百枝簡文帝奉紅牋二千畨又云送四色紙三萬枚荅湘東王也比户録晉宋間有一種紙長丈餘世謂前紙同上宋亳間有紙織成界道者謂之烏絲欄紙國史纂要紙取東陽魚卵虛柔而滑浄者墨藪蕭成採野麻土榖作五色斑紋紙法書苑陟釐乃水中苔取以為紙名苔紙青黄色晉武帝賜張華側理紙即陟釐也語訛謂之側理}
