  - {type: variant, offset: 1479, length: 0, content: '', WYG: 截玉銛錐作妙形貯雲含霧到南溟尚書舊用裁天詔内史新将寫道經栁文本朝宣州諸葛氏筆擅名天下久矣縱其間不甚佳者終有家法如北茶内庫酒教坊樂雖弊精疲神欲强學之而草野終不可脫東坡一沐管城頴為把栗尾書溪藤蒼鼠奮鬛飲松腴並同上墨𫝊記楚王靈䕫造紅白二墨及書寫衣服黑衣用白書白衣用紅書自成一家大唐龍髓記盧杞與馮盛相遇於道各攜一囊杞發盛囊有墨一枚杞大笑盛正色曰天峰煤和針魚腦入金溪子手中録離騷古本比公日提綾文刺三百為名利奴顧當孰勝已而捜杞囊果}
