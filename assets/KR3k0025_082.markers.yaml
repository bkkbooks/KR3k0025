  - {type: variant, offset: 1282, length: 0, content: '', WYG: 過蕭思話書若墨連綿衣勢屈强若龍跳淵門虎卧鳳闕薄紹之書字勢蹉跎如舞妓低聲仙人嘯樹袁昂古今書評王子敬𨽻行草章草飛白五體俱入神八分入能書斷集智永禪師書骨氣深隠體兼衆妙精能之至反過疎淡歐陽率更書研𦂳抜羣尤工於小楷禇河南書清逺蕭散微雜𨽻體張長史草書頽然天放畧有㸃畫處而意態自足號稱神逸今世稱善草書者或不能真行此大妄也今長安有長史真書郎官石柱記作字簡逺如晉宋間人顔魯公書雄秀獨出一變古法如杜子美詩格尤天縱奄有漢魏晉宋以來風流後之作者殆難復手栁少師書本出於顔而能自出新意一字百金非虛語也東坡題唐六家書後楊凝式筆蹟雄强往往與顔行相上下今世多稱李建中宋宣獻書宋寒而李裕殆是浪得名惟蔡君謨書姿格既髙而學亦至當為本朝第一仇池筆記歐陽文忠言蔡君謨獨步當世此為至言君謨行書第一小楷第二草字第三大字為少疎也東坡蘭亭繭紙入昭陵世間遺墨猶雲騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山𫝊刻典刑在千載筆法留陽氷杜陵評書貴痩硬此論未公吾不憑短長肥痩各有態玉環飛燕誰敢憎同上篆書𫝊記按大篆者周宣王太史史籀所作也書斷籀文者史籀所作也與古大文篆小異後人以名稱書謂之籀文六書二曰奇字是也小篆者秦丞相李斯所作也增損大篆異同籀文亦曰秦篆並同上古文可為上古大篆為中古小篆為下古書評李斯妙篆省改之為小篆著蒼頡篇七章始皇以和氏之璧琢而為璽令李斯書其文今泰山及泰皇等碑並其遺跡李斯小入神大篆入妙蔡伯喈嵩山學書於石室内得一素書八角垂芒寫李斯并史籀用筆勢並同上石鼓文謂之周宣王獵共有十鼓其文則史籀大篆也法書苑梁昇卿善小篆吕總云如落玉隨珠皆得其妙同上蕭何善籀為前殿成覃思三月以題其額筆陣圖李陽氷善小自言斯翁之後直至小生國史補集緬想聖達立制造書之意於天地山川得方圓流峙之形於日月星辰得經緯昭回之度於雲霞草木得霏布滋漫之容於衣冠文物得揖讓周旋之體於鬢眉口鼻得喜怒慘舒之分於蟲魚禽獸得屈伸飛動之理於骨相齒牙得擺拉咀嚼之勢隨手萬變任心所成可謂通三才之氣象備萬物之情狀者矣李陽氷論古字體不類𨽻與科韓石鼔歌本朝秦始皇初并天下登瑯琊臺刻石頌秦徳二世復刻詔書其旁今頌詩亡矣而二世詔書具在江文勛好古善篆𨽻有絶人者其文字之工世亦莫及皆不可廢東坡集𨽻書𫝊記按𨽻書者秦下邽人程邈所作也邈得罪雲陽獄中覃思十年益小篆方圖而為𨽻書三千字奏之始皇用以為𨽻人佐書故曰𨽻書書斷鍾會尤工𨽻書飄然有凌雲之志嘗詐為荀勗書就勗母鍾夫人取寳劍同上王次仲者古之神仙也得李斯用筆意乃摹諸石置之超然臺上夫秦雖無道然當戰國之時以為世之篆文難於速就乃為𨽻書廣記庾肩吾按酈善長水經注臨淄人發古塜得銅棺棺外書齊太公六代孫胡公之棺唯三字古文餘同今書按胡公在春秋前即𨽻書興於周代明矣當時猶與古文相參程邈始廢古文而全用𨽻又丘光遲以𨽻書之興於周代謂亥有二首六身如布算之狀按此亥文則春秋已有𨽻書矣法書苑唐太宗工𨽻書師虞世南嘗患難於戈法一日書戩字乃空其落虞世南取筆填之帝以示魏鄭公曰朕學世南似盡其法鄭公曰仰觀聖作唯戩字戈法頗逼真上深嘆其藻識同上𨽻有繫石波最為難作書訣八分傳記按八分者秦羽人王次仲所作也王愔云王次仲以𨽻楷藏古今法書法書苑行書傳記按行書者後漢潁川劉徳升所造也行書即正書之小偽務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書著名鍾元常善行押書是也爾後王羲之獻之並造其極焉書斷胡昭與鍾繇並師劉徳升俱善於行草而胡肥鍾痩同上行書非草非真離方遁圓在}
