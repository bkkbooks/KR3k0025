  - {type: variant, offset: 4696, length: 267, content: 第宅非吾廬逆旅暫留止子孫非我有委蛻而巳矣有如蠶造繭又似花結子子結花暗凋繭成蠶老死天地為幕席富貴如沙泥白樂天集豈戀腰間綬如彼籠中禽韋應物互見省悟匪傷蜉蝣之夕不羨龜鶴之年得喪雙遺巢由與許史同歸寵辱兩存廊廟與山林齊致並駱賓王身外皆虛名酒中有全德李義山雲山不求吾是林泉不責吾非元次山但令終日酩酊醉酒不到劉怜墳上土李長吉文棄世酒中老謀身書外貧許用晦文眼豁浮生夢杜荀鶴得即高歌失即休多愁多恨亦悠悠今生有酒今生醉明日愁來明日愁羅隱集功名萬里外心事一柸中乍可狂歌草澤中寧堪作吏風塵下並高達夫朝衣在酒家自覺有家非並姚少監喜方外之皓曠嘆人間之窘束腹中書萬, WYG: 記纂淵海}
