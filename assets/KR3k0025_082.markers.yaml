  - {type: variant, offset: 3, length: 85, content: 君子固窮語衡門之下可以棲遲詩衡門貧而無諂語學而貧而無怨難語子貧者士之常處常何憂哉列子天瑞列子窮有飢色有客言於鄭子陽子陽令官遺之粟列子辭莊子史楊雄家產不過十金無擔石之儲晏如, WYG: 五曰六書注云六書象形會意轉注指事假借諧聲}
