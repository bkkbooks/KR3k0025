  - {type: variant, offset: 1330, length: 5, content: 射革駟跛鱉, WYG: 琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣同上紀少瑜嘗夢陸倕以一束青鏤管筆授之曰卿自擇其善者其文因此大進青箱雜記漢制天子筆以錯寳為跗毛皆以秋兔之毫西京雜記漢末一筆之匣雕以黄金飾以和璧綴以隋珠文以翡翠傅子石晉之末有一髙士每夜作筆付其家室至曉闔户}
