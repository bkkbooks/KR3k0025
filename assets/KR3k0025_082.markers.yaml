  - {type: variant, offset: 1293, length: 7, content: 女娃遊于東海溺, WYG: 銀鉤蠆尾鄭䖍草書如風送雲收霞催月上張芝剙草作楷法字方八分書斷師宜官南陽人靈帝好書徵天下攻書於鴻都門至數百人八分稱宜官為最鍾頴書最妙者八分有魏受禪碑此為最也同上蔡邕工書篆𨽻尤得八分之精微書斷蔡文姬曰臣父云割𨽻字八分取二分割篆二分取八分故名八分張懐瓘云本楷字漸若八字分散故名八分法書苑八分有隼尾波最為難作書談韓擇木工八分師蔡邕法風流閑媚號伯喈中興蕭子良云漢靈帝時上谷王次仲與秦時同姓名也亦依八分書集碑之所形将垂久逺篆籀即至朴昧者難知行𨽻又太見涉於非敬惟八分得文質之至中二妙相兼經古今}
