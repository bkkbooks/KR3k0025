  - {type: variant, offset: 1319, length: 1, content: 海, WYG: 石久為月照著老蚌吸月月降胎水犀望星星入角彤霞爍石變丹砂白虹貫岩生美璞子美集久聞閩石鴨頭緑可磨桂溪龍文刀莫嫌文吏不知武要識飽霜秋兔毫山谷琢雕山骨秀磨礲發光炯體潤雲氣生寒泉冽幽井平生心腹交陳𤣥與毛頴徳重不傾側中虛但明静置之几案上吾方日三省同上筆史晉王珣夢人以一大筆如椽與之既覺語人曰當有大手筆事晉書江淹夢人與五色筆由是文藻日新後又夢郭璞取去自後為詩絶無美者本傳歐陽通詢之子也以狸毛為筆覆以兔毫管用象犀非是未嘗書唐本傳和凝夢人以五色筆一束與之自是才思敏贍十九登進士第五代史史洪肇曰安朝廷定禍亂直須長鎗大劍毛錐子安足用哉同上傳記𤣥龜負圖出周公援筆以時文寫之尚書中候畨禺諸郡多以青羊毛為筆或用山雉豐狐之毫鼠鬚麝毛狸毛為被以為筆樹萱録有人以緑沉漆竹管及鏤管見遺斯亦可玩詎必以金玉哉嘗答牛亨之問曰蒙恬以枯木為管鹿毛為柱羊毛為被王羲之筆}
