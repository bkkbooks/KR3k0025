  - {type: variant, offset: 482, length: 390, content: 動其過鮮矣左傳僖二十冉求曰小人慮材而言量力而共者也左襄十一皇甫規對曰德不稱祿猶鑿墉之趾以益其高豈量力審功安固之道哉通鑑漢殤記集量力守故轍陶淵明大廈既焚不可洒之以淚長河一泱不可障之以手庾信連珠互見勢力不敵本朝載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登阪險而馬不躓欒城集經德薄而位尊知小而謀大力少而任重易繫辭多見其不知量也語子張子猶以一柸水救一車薪之火孟告子上互入勢力不敵挾泰山而超北海孟梁上代大匠斲希有不傷手矣老子猶涉海鑿河而使䖟負山也莊應帝王夸父不量力欲逐日於嵎谷之際道渴而死北山愚公年九十面山而居懲山北之塞出入之迀聚室而謀曰畢力平之可乎並列子髮引千鈞列子仲尼篇螳蜋怒臂以當車轍莊子譬以盲辨色以聾辨聲荀子以塼塗而塞江海以僬僥而戴泰山短人也荀子正論猶以錐力墮泰山也荀議兵小敵之堅大敵之擒孫子注言小國不量力與大邦為讎權時堅城固守然終必見擒獲乳狗之噬虎伏雞之搏狸, WYG: 成字鬼乃夜哭}
