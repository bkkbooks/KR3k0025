  - {type: variant, offset: 145, length: 1, content: 互, krp: 桓温過淮泗踐北境與諸寮屬登東平乗樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責晋書本傳桓温自江陵北伐行經金城見少為琅琊時所種栁皆已十圍慨然曰木猶如此人何以堪羊祜逰峴山言詠終日嘗顧從事鄒湛等曰自有宇宙便有此山由来賢達勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷晋書古稱一世三十年子厚之斥十三年殆半世也唐書傳記古人混混去不返今人紛紛来更多續仙傳集年嵗晩暮時已斜安得壮士翻日車李九曲歌所遇無故物焉得不速老古詩連連丘壑改微微市朝變局塗頓逺策畱歡恨奔箭春貌既移紅秋林豈停蒨一倍倍一作陪茂陵道寧思栢梁宴沈約長歌行變燧回星劉孝標書人生一百年歡笑惟三五庾信對酒後之視今亦猶今之視昔王羲之蘭亭記臨川感流以嘆逝登山懐古而悼逺感冬索而春敷嗟夏茂而秋落潘安仁天地無終極人命若朝露曹子建未厭青春好已睹朱明移謝靈運詩頺魄不再圎傾曦無兩旦曹子建百川東到海何時復西歸長歌行對酒當歌人生幾何譬如朝露去日苦多短歌行人夀如朝露時華不載揚陽来日苦短陽去日苦長同上故人雖故昔經新新人雖新復應故隋江詩彤庭所分帛本自寒女出鞭撻其夫家聚斂貢城闕信知生男惡反是生女好生女猶是嫁比隣生男埋没隨百草悵望千秋一灑淚蕭條異代不同時嵗暮日月疾古来白骨無人收杜詩但見好花開易落從来尤物不長生劉賔客長使英雄淚滿襟即今千種恨惟共水東流王侯與螻蟻隨盡同丘墟萬事隨轉燭乾坤萬里眼時序百年心日月不相饒節序昨夜隔杜詩仙鶴来歸遼東之城郭猶是靈烏代謝漢南之陵谷已非臨水感逝川之嘆百年三萬日一别幾千秋駱賔王吾操鏝以}
  - {type: punctuation, offset: 147, content: 「, id: KR3k0025_CHANT_074-bkkpn53}
  - {type: variant, offset: 147, length: 0, content: '', WYG: 於富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問其隣或曰噫刑戮也或曰身既死而子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者耶非彊心以智而不足不擇其才之稱否而冐之者耶非多行可愧知己之不可彊而為之者耶将富貴難守薄功而厚享之者耶抑豐悴有時一去一来而不可常者耶韓集坐觀萬象化方見百年侵陳子昂孟郊死葬北邙山日月風雲頓覺閒樽酒相逢十載前君為壮夫我少年樽酒相逢十載後我為壮夫君白首韓集人生大限雖百歳就中三十稱一世晦眀烏兎相推遷霜雪漸到雙鬢邊沈憂戚戚多浩嘆不得如意居大半一氣暫聚常恐散黄河清兮白石爛權集城池百載後耆舊幾家殘處處蓬蒿遍歸人掩淚㸔白首相逢征戰後青春已過亂離中蒼苔換古今萬事依然在無如嵗月何劉長裕長明燈是前朝焰曽照青春年少時世事不同心事新人何似故人劉禹錫所嘆别此年永無長慶厯凄涼百年事應與一年同風光少時新同上一夜思量十年事幾人强健幾人無同上二百年来城裏宅一家知換幾多人西施顔色今何在但看春風百草頭不知山下東流水何事長須日夜流元微之不是花中偏愛菊此花開後更無花鄭谷詩功名富貴若常在漢水亦應西北流元㣲之集冠盖散為烟霧盡金輿玉座成寒灰今人不見古人月今月曾經照古人李白時来天地皆同力運去英雄不自由欲招屈宋當時魄蘭敗荷枯不可尋羅隱析羽不復飛逝水不復歸樹有百年花人無一定顔花送人老盡人悲花自閒同上四時如逝水孟郊春早見花枝朝朝恨發遲及㸔花落後却憶未開時芳林新葉催陳葉流水前波讓後波劉禹錫人凶非宅凶同上三百年来庾樓上曾經多少望鄉人臙脂化為泥鉛黛復何有百齡同一寐人夀不如山年光忽如水因驚成人者盡是舊童孺同是天涯流落人相逢何必曾相識昔如𤣥雲光今如素絲帛鵶頭與鶴頸至老長如墨獨有人鬢毛不得終身黑黄金不惜買蛾眉揀得如花三四枝歌舞教成心力盡一朝身去不相隨自嗟名利客擾擾在人間何事長淮水東流亦不閒同上大都好物不堅牢彩雲易散琉璃脆春銷不得處惟有鬢邊霜惟有愁人鬢邊雪不隨春盡逐春生白侍郎義和走馭趂年光不許人間日月長年年只是人空好處處何曾花不開白傅集朝鐘暮角催頭白同上真宰倒持生殺柄閒物命長人短命松枝上鶴蓍下龜千年不死仍無病人生不得似龜鶴少去老来同旦暝天色晴眀少人生事故多同上天時人事常多故一嵗春能幾度㳺不是塵埃便風雨若非疾病即悲憂貧窮心苦多無興富貴身忙不自由同上春日雖遲不再中摇落覆井梧荒涼故籬菊白侍郎百川趂海返潮易一葉報秋歸樹難鮑溶刼灰飛盡古今平王維天若有情天亦老李賀隠跡今尚存髙風邈已逺白雲何時去丹桂空偃蹇孟浩然人生無幾何如寄天地間心有千載憂身無一日閒白集南朝三十六英雄各逐興亡自此中有國有家皆是夢為龍為虎亦成空唐韋荘人生天地之間若流電之過户牖輕塵之棲弱草李康逰仙序恨如春草多事與孤鴻去彭殤共一籌景物不盡人自老芳草何時時一作年恨即休日月如跳丸相趂走不住南去北来人自老夕陽長送釣船歸浮生冷似氷底水日夜東流人不知郵亭寄人世人世寄郵亭聚散真漂梗光隂極轉郵杜牧之花若有情還悵望水應無事莫潺湲墓平春草緑碑折古苔青温飛卿全勝已隨流水去黄鸝空嘲舊春聲武伯蒼日日人空老年年春更歸王維集一向破除愁不盡百方迴避老新来王建千金立碑髙百尺終作誰家柱下石張文昌舊國别多日故人無少年不覺年華似箭流賈浪仙主人何處獨徘􅆦流水自流花自開若見故交皆散去即應新燕不歸来方雄飛世事隨時變交情與我違空餘主人栁相見即依依錢起詩只聞丞相夷三族不見扁舟泛五湖張承吉朝悲辭樹葉夕感歸巢禽韓集地下若逢陳後主豈宜重問後庭花幾時心緒休無事得及逰絲百尺長縱使有花兼有月可堪無酒又無人李義山年年歳嵗花相似嵗嵗年年人不同唐文粹四時輪轉春常少百刻支分夜苦長白侍郎本朝沈碑身後念陵谷把酒泣下悲山川春風自是無情物肯為汝惜無情花今年花落眀年好只見開花人自老歐公集月如無恨月長圓石曼卿集好山緑水萬里有盡清風眀月千古無忘忘一作老時名談山阿昔留賞屐齒無遺跡異鄉物態與人殊惟有東風舊相識廟堂元老今華衮巖壁遺文已緑苔一生勤苦書千卷萬事消磨酒百杯歐公集往事無迹難追尋秦徵天下材入作阿房宫宫成非一木山谷為窮空子羽一炬火驪山三月紅能令掃地盡豈但焚人功世上惟知古有秦山中豈料今為晉天下紛紛經幾秦六朝人物隨煙埃金輿玉几安在哉事事只隨波浪去年年空得鬢毛新廢陵壞冢空冠劍誰復沾纓酹一缸山花落盡山長在山水空流山自閒歌舞可憐人暗換花開花落幾春風丹樓碧閤昔時事只有江山到古今臨川集世道如奕棋變化不容覆洛陽泉水今誰主莫學癡人李與牛壞壁無由見舊題人生營居宅竟為何人卜常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懐盛衰哀樂兩須㬰過眼榮枯電與風榮華坐銷歇閱世如郵傳惟有長眀燈依然照深殿有生共處覆載内擾擾膏火同烹煎近來愈覺世議隘每到寛處差安便世事如今臘酒醲交情自昔秋雲薄過眼百嵗如風燈一番花老一番新雕欄能得幾時好不獨憑欄人易老百年興廢更堪哀懸知草莽化池臺生前富貴草頭露身後風流陌上花親友如摶沙放手還復散出處升沈十年後死生契闊幾人存同上此生此夜不長好明月眀年何處看東坡詩歳月如宿昔人事幾反覆東坡詩近来世上無徐庶誰向桑麻識卧龍詩話平生功業數張紙千古英雄一窖塵聞見錄邯鄲炊未熟榮謝隔逡巡時事無端日日新凄涼百年後事付何人筆欒城集襄陽耆舊内無復姓龎人陳後山詩日月過箭疾自古非一秦六籍盖多難春不能朱鏡裏顔青莎徑裏香未乾黄鳥陰中實已團山谷詩今日牛羊上丘隴當時近前左右嗔同上向来歌舞地夜雨鳴寒蛩後山詩感傷經父没而不能讀父之書手澤存焉爾母沒而杯圏不能飲焉口澤之氣存焉爾禮記子仰視榱桷俯察几筵其器皆存而不覩其人以此思哀則哀可知矣家語其物存其人亡不言哀自至荘子史長老言匈奴失隂山之後過之未嘗不哭也西漢杜延年居父官府不敢當舊位坐卧皆易其處西漢孤者易傷貧者易感魏邴原傳讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇王獻之卒徽之奔喪上靈牀取獻之琴彈之乆而不調歎曰嗚呼子敬人琴倶亡晋書薛收卒太宗曰吾與伯褒欵曲襟袍何期一朝忽成萬古舊唐書集生存華屋處零落歸山丘曹子建詩懿親戚屬亡多寡存昵交宻友亦不半在或曾共逰一塗同宴一室十年之外索然而已盡嗟人生之短期孰長年之能執時飄忽其不再老晼晩其将及觸萬類以生悲歎同節而異時顧舊要於遺存得十一於千百陸士衡不見耆舊老但見新少年曹子建謂百年已分可共相}
