  - {type: variant, offset: 206, length: 0, content: '', WYG: 我褰裳涉溱子不我思豈無他人豈無他人不如我同父胡逝我梁不入我門爾之亟行遑脂爾車始者不如今云不我可爾還而入我心易也還而不入否難知也壹者之来禆我祗也彼狡童兮不與我言兮維子之故使我不我能餐兮忘我大德思我小怨伊誰云憎縱我不往子寧不嗣音相彼投兎尚或先之行有死人尚或墐之君子秉心維其忍之死生契闊與子成説執子之手與子偕老吁嗟闊兮不我活兮吁嗟洵兮不我信兮終逺兄弟謂他人父謂他人父亦莫我顧詩子行修而名不彰友之罪也家語舎館定然後求見長者乎孟子為民父母使民盻盻然将終歳勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母孟子史楚伐鄭鄭使告於晉知武子使行人}
