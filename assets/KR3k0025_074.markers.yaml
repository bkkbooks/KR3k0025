  - {type: variant, offset: 211, length: 0, content: '', krp: 楚沈尹戍曰知者除䜛以自安也今子愛䜛以自危也楚沈尹戍曰仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圗左吳公子札適晉説叔向謂曰吾子勉之君侈而多良大夫多富政将在家吾子好直必思自免於難左襄二十九子太叔語趙孟曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義左公子有德於人願公子忘之史記信陵君傳孟嘗君問門下客誰能為文收債於薛者馮諼曰能治装載契劵而行辭曰債畢收以何市而反君曰視吾家所寡有者諼之薛召諸民當償者悉來合劵以債賜民因燒其劵民稱萬嵗反齊見君曰臣竊計君宫中積珍寳狗馬實外廏美人充下陳所寡有者義耳竊為君市義矯命以債賜諸民因燒其劵史本傳鮑叔牙曰君将治齊即髙徯與叔牙足也君且欲霸王非管夷吾不可史齊世家陳餘遺章邯書曰白起為秦南征鄢郢北坑馬服攻城略地不可勝計而竟賜死蒙恬為秦将軍於上郡開榆中地數千里竟斬陽周有功亦誅無功亦誅通鑑蕭何曰王必欲長王漢中無所事信必欲争天下非信無可與計事者西漢列傳劉望之弟廙謂望之曰趙殺鳴犢仲尼回輪今兄既不能法栁下惠和光同塵於内則宜模范蠡遷化於外坐而自絶於時此殆不可也通鑑馬援謂黄門郎梁松竇固曰凡人富貴當使可復賤也如卿等欲不可復賤居髙堅自持勉思鄙言通鑑黄允以雋才知名郭泰見而謂曰卿髙才絶人足成偉器年過四十名著矣然至於此際當深自匡持不然将失之矣通鑑芻蕘所見冀申螢爝北史髙祖平京師秦王引杜如晦為府兵曹參軍徙陕州總管府長史時府屬多外遷王患之房𤣥齡曰去者雖多不足慮如晦王佐才也大王若終守藩無所事如晦必欲經營四方捨如晦無與立功者王驚曰非公言我㡬失之因表留幕府唐書傳記馮諼謂孟嘗君曰兎有三窟僅得免死君一窟未得髙枕而卧也請為君復鑿二窟戰國策景公與晏子登路寝愀然而歎曰使後嗣代代有此豈不可哉晏子曰厚斂百姓欲代之延不亦難乎晏子春秋集此别無多語期君晦盛名杜牧之不用更敎詩過好折君官職是聲名白侍郎本朝温公議改免役為差役蘇公軾嘗見之政事堂條陳不可温公忿然公曰昔韓魏公刺陕西義勇公為諫官争之甚力魏公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶温公笑而止蘇子由王旦在中書處士魏野獻詩曰聖朝宰相頻頻出君在中書十四秋西祀東封倶禮畢好来相伴赤松逰聖宋掇遺祝頌經如山如阜如岡如陵如川之方至以莫不增如月之恒如日之升如南山之夀如松柏之茂俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有害俾爾熾而昌俾爾夀而臧天保定爾俾爾戩穀罄無不宜受天百禄降爾遐福維日不足何福不除詩膺受多福書子請祝聖人使聖人夀使聖人富使聖人多男子荘子史諸福之物莫不畢至前漢專精神近醫藥彊食自愛匡衡傳强餐自愛東平王傳天所開右谷永傳萬靈薦祉唐書集王其愛玉體俱享黄髪期曹植宜享遐紀長保天秩選詩殃消禍散百福併從此直至耆與鮐韓集願公如衛武百嵗尚康強杜牧之本朝冀大錫於壽祺得永承於慈範彌加葆衛永御吉康剛健之徳與陽皆亨夀昌之期如日方永燮精祲之至和納亨嘉之盛福和倪粹隠御六氣之和薦百嘉之祐欽承德履茂享春祺臨川集絳闕雲臺總有名應須極貴又長生鼎中龍虎黄金賤松下龜虵緑骨輕東坡詩祕藏函谷闗中子将獻蓬莱閣上仙願得鬢眉如此老却敎龜鶴羨長年祝公齒髪老復老歳嵗不改氷雪顔欒城集此中自有不變地嵗閱生日如等閒詩話慶賀經以賀慶之禮親異姓周禮士於大夫不承賀下大夫於上大夫承賀記玉藻史豪傑吏聞沛公有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐堂下史記吕僧珍生子宋季雅往賀署函曰一千閽人少之不為通强之乃進僧珍疑其故人親自發乃金錢也梁書互入謁見傳記新進士每及第鄉曲親戚例以聲樂相慶天寳遺事集大厦構而相歡}
