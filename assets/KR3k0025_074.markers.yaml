  - {type: variant, offset: 206, length: 0, content: '', krp: 我褰裳涉溱子不我思豈無他人豈無他人不如我同父胡逝我梁不入我門爾之亟行遑脂爾車始者不如今云不我可爾還而入我心易也還而不入否難知也壹者之来禆我祗也彼狡童兮不與我言兮維子之故使我不我能餐兮忘我大德思我小怨伊誰云憎縱我不往子寧不嗣音相彼投兎尚或先之行有死人尚或墐之君子秉心維其忍之死生契闊與子成説執子之手與子偕老吁嗟闊兮不我活兮吁嗟洵兮不我信兮終逺兄弟謂他人父謂他人父亦莫我顧詩子行修而名不彰友之罪也家語舎館定然後求見長者乎孟子為民父母使民盻盻然将終歳勤動不得以養其父母又稱貸而益之使老稚轉乎溝壑惡在其為民父母孟子史楚伐鄭鄭使告於晉知武子使行人}
  - {type: variant, offset: 207, length: 0, content: '', WYG: 曰君有楚命亦不使一介行李告於寡君而即安於楚左公如晉使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一介辱在寡君而即安於甥舅左且寡君出伯父無裏言左傳越石父賢在縲絏中晏子解左驂贖之載歸入居乆之越石父請絶晏子瞿然曰嬰雖不仁免子於阨何子求絶之速也石父曰吾聞君子詘於不知己而信於知己者方吾在縲絏中彼不知我也夫子既以感悟而贖我是知己知己而無禮固不如在縲絏之中史記燕惠王使人讓樂毅且謝之曰将軍過聽以與寡人有隙遂捐燕歸趙将軍自爲計則可矣而亦何以報先王之所以遇将軍之意乎通鑑周紀吕后使吕澤語張良曰今日君安得髙枕而卧張良傳天下之責四面至矣谷永傳夫戚而不見殊孰能無怨西漢杜鄴傳張讓詰何進曰但欲托卿門户耳今乃欲滅我曹種族不亦太甚乎通鑑漢獻紀張良曰聞将軍有意督過之西漢從事中郎馬融主為梁冀作章表吳祐謂融曰李公之罪成於卿手李公誅卿何面目視天下通鑑李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉爲凶視成為敗漢家衰微從此始矣公等受主厚禄顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長嘆流涕而已通鑑}
