  - {type: variant, offset: 158, length: 1, content: 丞, krp: 脩文卒為周威之師班超憤而習武終建西域之績皆因窘而發志縁阨而顯名出劉子史以夷狄遇秦擯斥之不得與中國之㑹盟於是孝公發憤彊秦通鑑周紀越王念吳之復夏則握火冬則抱氷吳越春秋痛心疾首左成十三越王句踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰汝忘㑹稽之耻乎身自耕作食不加肉衣不重采折節下賢厚遇賔客賑貧弔死與百姓同其勞史記越世家蘇秦窮困歸兄嫂姊妹妻皆笑之不為下機秦乃閉室讀周書陰符後合六國從約相六國車騎輜重擬於王者荀卿嫉濁世之政於是推儒墨道德之行事著數萬言虞卿不得意乃著書世傳曰虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於後世史記不因阨惡能激乎史蔡澤傳論蘇秦為合從長諸侯各發使送之擬於王者歎曰使我有洛陽}
  - {type: variant, offset: 160, length: 1, content: 余, WYG: 郭田二頃吾豈能佩六國相印乎史本傳西伯拘而演周易仲尼厄而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子臏脚兵法脩列不韋遷蜀世傳吕覽韓非囚秦説難孤憤詩三百篇大抵賢聖發憤之所為作也左丘眀無目孫子斷足終不可用退論書策以舒其憤思垂空文以自見西漢司馬遷傳盱衡厲色西漢王莽傳翟方進給事太守府為小吏數為掾吏所詈辱方進自傷乃西至京師受春秋積十餘年經學眀習徒衆日廣諸儒稱之以射䇿甲第為郎西漢發憤悃愊劉向有志者事竟成耿弇傳諸葛瑾曰失旦之雞復思一鳴吳志周處少不脩細行州曲患之處自知為人所惡慨然有改勵之志謂父老曰今時和歲豐何不樂耶父老曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處乃入山射虎投水殺蛟勵志好學志存義烈克己期年州府交辟張淳曰讐耻未雪枕戈待旦何自娛之有晉書瀝膽抽腸梁書傳記葛洪云司馬遷發憤作史記百二十篇史通集焚舟而克手劔而盟者皆敗北之餘也子之厄困乆矣霸心勇氣無乃發於是乎栁文世不賤不足以立志地不卑不足以立名皮日休集大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎韓文寄興經闕子闗睢興於鳥而君子美之取其雌雄之有别鹿鳴興於獸而君子大之取其得食而相呼家語太公釣隱磻溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿管子史陶淵明性不解音而蓄素琴一張絃徽不具每朋酒之㑹則拊而和之曰但識琴中趣何勞絃上聲王徽之嘗居山隂夜霽月色清朗四望皓然酌酒詠左思招隱詩忽憶戴逵時逵在剡便夜乗小船詣之經㝛方至造門不前而反人問其故曰本乗興而行興盡而反何必見安道耶晉書陸龜蒙升舟設蓬席齎束書茶竈筆牀釣具往来時謂江湖散人張志和埀釣不設餌志不在魚並}
