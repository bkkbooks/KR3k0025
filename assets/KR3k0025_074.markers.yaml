  - {type: variant, offset: 181, length: 0, content: '', krp: 發背霑衣也司馬遷傳齎恨入㝠東漢馮衍傳孫秀為小吏給事岳而狡黠自喜岳惡其爲人數撻辱之秀常銜忿及趙王倫輔政秀為中書令岳於省内謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂誣岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族晉書潘岳傳張華裴頠之被誅趙王倫孫秀以㝛憾收解系兄第梁王肜救系倫怒曰我於水中見蟹且惡之况此人兄弟輕我耶此而可忍孰不可忍遂害之晉書韲之粉之屠之裂之猶未足以謝宋太祖侯景謂左右曰我固知吳老公薄心腸梁髙祖盧杞遇赦用為饒州刺史給事中袁髙應草制執以白盧翰劉從一曰百辟疾之若仇六軍思食其肉通鑑唐徳宗史𢎞肇尤惡文士常曰此屬輕人難耐每謂吾輩為卒諸葛靚歸於鄉里終身不向朝廷而坐吳謝厲曰潘大常常切齒於君但道無因耳晉李太后在建州卧病無醫藥惟與晉主仰天號泣㦸手罵杜重威李守貞曰吾死不置汝劉銖罷青州歸乆奉朝請未除官常㦸手於執政通鑑傳記永言怨耻生死莫云仰天俯地何以為生含齒戴髪何以爲見史通吳王賜子胥屬鏤之劒子胥伏劒而死吳王取子胥尸盛以鴟夷之器投之於江子胥因隨流揚波依潮往来蕩激崩岸越王賜文種屬盧之劔而死越王葬種於國之西山葬一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水候者伍子胥也後潮水候者大夫種也吳越春秋集怒目切齒酒德頌天道如何吞恨者多選鮑昭賦飲恨吞聲江文通賦仇隙經父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讐抵父師長之讐抵兄弟朋友之讎抵從父兄弟周禮父之讎弗與共戴天兄弟之讐不反兵交逰之讐不同國記史周鄭交惡左鄭息}
  - {type: variant, offset: 182, length: 3, content: 慚色唯, WYG: 違言公與大夫始有惡韓簡子與趙文子相惡魏襄子亦與范昭子相惡左定十三三家未睦與我同壤而世爲仇讐左減宣嘗與湯有隙窮竟其事史張湯傳王温舒死仇家欲燒其尸史本傳君臣多間隙也左将軍與臣有隙西漢髙紀内有纎介西漢孫寳傳晁錯素與吳相袁盎不善錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語通鑑曹參為宰相與蕭何有隙西漢本傳趙温與}
