  - {type: variant, offset: 150, length: 0, content: '', krp: 巍韋應物古城聊一望荒棘幾千叢盧照隣詩寂寞空餘歌舞地姚少監昔日青樓對歌舞今日黄埃聚棘荆李嶠本朝不知此地幾興廢仰視喬木皆蒼煙歐公集煙濃草逺望不見物換星移度幾秋臨川集金陵限南北形勢豈其然楚役六千里陳亡三百年江山空幕府風月自航舡登髙一曲悲亡國想繞紅梁落暗塵破堞自生新草木廢宫誰識舊軒牕臨川集西望夏口東望武昌山川相繆鬱乎蒼蒼此非曹孟德之困於周郎者乎方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江横槊賦詩固一世之雄也而今安在哉東坡赤壁賦三千宫女看花處人盡臺空花自開古今詩話儆戒經無平不陂無往不復禍從口出患從口入易傳言行君子之樞機樞機之發榮辱之主也易夙興夜寐詩敢有恒舞於宫酣歌於室時謂巫風敢有殉於貨色恒於逰畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一於身家必喪邦君有一於身國必亡玩人䘮德玩物喪志書子名也者相軋也知也者争之器也多男子則多懼富則多事壽則多辱是三者非所以養徳也莊子天地水能載舟亦能覆舟荀子夫善㳺者溺善騎者墮各以其所好反自為禍淮南子五聲八音清商流徵損聰者也鮮花艷采彧麗炳爛傷明者也宴安逸豫清醪芳醲亂性者也冶容媚姿鈆華素質伐命者也里語曰人在人間日失一日如牽牛以詣屠所每進一歩去死轉近也抱朴子順者福之門逆者禍之府目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼔口貪滋味命曰腐腸之藥鼻恱芳馨命曰燻喉之煙身安轝駟命曰召蹶之機劉子勒於几杖刻於盤盂為之日惕文子聲無小而不聞行無隱而不形荀子史道髙益安勢髙益危司馬季主傳若君不修德舟中之人皆敵國也周紀毋為怨府毋為禍梯趙世家易曰狐渉水濡其尾此言始之易終之難也春申君傳大名之下難以乆居越世家無以先入之語為主西漢禍固多藏於隠微而發於人之所忽司馬相如傳動色相戒劉輔傳木勝者人亡楚作章華以凶吳興姑蘇而滅濟南安王康傳盖寛饒至許伯第曰此如傳舎所閱多矣西漢無為權首将受其咎晁錯贊無為虎傅翼将飛入邑賈誼傳注聰明䟽通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷湛静安舒者戒於後時廣心浩大者戒於遺忘匡衡傳得失一朝而榮辱千載荀恱漢書天地之心福謙禍盛李固傳日不常中月盈有虧履道者固挟勢者危東漢王逸黄石公記曰務廣地者荒務廣德者强有其有者安貪人有者殘臧宫傳李固遺書黄瓊曰觀聽望深聲名大盛通鑑吳隱之為廣州刺史地有水曰貪泉隱之語其親人曰不見可欲使心不亂晋書興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至晉紀謝朏與弟瀹别指其口曰此中惟宜飲酒齊書人笑褚先生至今齒冷無為效也南史樂預齊陳顯達曰麈尾蠅拂是王謝家物齊紀蕭允曰禍之所来皆生於利苟不求利禍從何生梁武紀欹器防滿金人戒口樂志諸葛長民曰貧賤常思富貴富貴必履危機宋書徐惠曰地廣非常安之術徐惠曰珍玩技巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒唐太宗紀陕郡進士張彖曰君輩倚楊右相如泰山吾以為氷山若皎日既出君輩得無失所恃乎唐紀飲食資身過則生患栁公綽傳夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛唐書栁玭傳壯九重於内所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂㒺念丘其糟而池其酒唐鑑目見可欲何能自窒於心已與私交何能中絶其意唐徳宗盛名之下為難居名盛則責望備唐書房琯傳劉延祐有吏能治第一李勣戒之曰子春秋少而有美名宜稍自抑無為出人上新唐書馮道曰臣嘗記昔奉使中山厯井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕後唐明宗憂先於事故能無憂事至而憂無救於事通鑑傳記行百里者半九十此言末路之難也若虎口入之則不知所出矣戰國策牆薄則亟壞繒薄則亟裂器薄則亟毁酒薄則亟酸夫薄而可以曠日持乆者殆未有也劉向新序以財事人者利盡而交踈以色事人者華落而寵衰説苑開元中道士吕翁經邯鄲止邸舎有邑少年盧生同止於邸主人方蒸黄粱共待其熟盧不覺長嘆翁問之具言生世困厄翁取囊中枕以授盧曰枕此當榮適如願生俛首但記身入枕穴中遂至其家未幾登髙第厯臺閣出入将相五十年子孫皆列顯仕榮盛無比上疏曰臣年踰八十位歴三台空負深恩永辭聖代其夕卒盧生欠伸而寤吕翁在旁黄粱尚未熟生謝曰此先生所以窒吾欲也敢不受教再拜而出陳翰異聞集淳于棼家廣陵宅南有古槐生豪飲其下因醉致疾二友扶生歸卧東廡夢二紫衣使者曰槐安國王奉邀生隨二使上車指古槐入一穴中大城朱門題曰大槐安國有一騎傳呼曰駙馬逺降引生升廣殿見一人衣素練服簪朱華冠令生拜王王曰前奉賢尊命許令女瑶芳奉事君子有仙姬數十奏樂執燭引𨗳金翠歩障玲瓏不斷至一門號修儀宫一女子號金枝公主儼若神仙交歡成禮情義日洽王曰吾南柯郡政事不理屈卿為守勅有司出金玉錦繡僕妾車馬施列廣衢餞公主行夫人戒子曰淳于郎性剛好酒為婦之道貴在柔順爾善事之累日達郡有官吏僧道音樂来迎下車省風俗察疾苦郡中大理凡二十載百姓立生祠王賜爵錫邑位居台輔生五男二女榮盛莫比公主遇疾而薨生請護䘮赴國王與夫人素服慟哭於郊備儀仗羽葆鼓吹塟主於盤龍岡生以貴戚威福日盛有人上表𤣥象謫見國有大恐都邑遷徙宗廟崩壞事在蕭牆時議以生僭侈之應王因命生曰卿可暫歸本里一見親族諸孫留此無以為念復令二使者送出一穴遂寤見家僮擁篲於庭三客濯足於榻斜日未隱西垣餘樽尚湛東牖因與二客尋古槐下穴洞然明朗可容一榻上有土壤為城郭臺殿之狀有蟻數羣二大蟻素翼朱首乃槐安國王又窮一穴直上南枝羣蟻亦處其中即南柯郡也又一穴盤屈若龍蛇状有小墳髙尺餘即盤龍山岡也生追想感歎遽遣掩塞是夕風雨暴發旦視其穴遂失羣蟻莫知所之國有大恐都邑遷徙此其驗矣異聞集集桀作瑶臺紂為璇室人力不堪而帝業不卒詩詠宣王由儉改奢春秋譏刺書彼泉臺兩觀雉門而魯以不振揚雄将作箴董生有云弔者在門賀者在閭言憂則恐懼敬事則有善功又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至劉向書出輿入輦命曰蹷痿之機洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥選七發置膏烈火上哀哀自煎熬杜工部有才無義惟家之殃無愛糞土以毁五常晋書物忌堅芳人諱明潔祭屈原文炙手可熱勢絶倫慎莫近前丞相嗔江湖多風波舟楫恐失墜涼風蕭蕭吹汝急恐汝後時難獨立借問頻朝謁何如穏晝眠念君惜羽翮既飽更思戢莫作翻雲鶻聞呼向禽急淘米少汲水汲多井水渾刈葵莫放手放手傷葵根玉潤終孤立珠眀得暗藏並杜詩勢利禍之門陳子昂集處世忌太潔作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬李白集月缺花殘莫慘然花須終發月終圓竟能何事銷芳念亦有濃華委逝川一曲艶歌留婉轉九原春草妬嬋娟王孫莫學多情客自古多情損少年温飛卿竿上擲身難倚梯青㝠舉足}
  - {type: variant, offset: 151, length: 0, content: '', WYG: 跌並劉賔客異質忌處羣孤芳難寄林年少得塗莫要忙韓退之保貴在家貧劉賔客寸心生萬路今古棼若絲逐逐行不盡忙忙休者誰来恨不可遏去悔何足追劉义文人生莫依倚依倚事不成唐文粹莫倚顔似花君㸔嵗如水元微之集名腸内煎外火非熱盛名先物易生厲疵並劉賔客莫道韶華鎮長在白頭面皺專相待唐文粹髙名難恃劉長卿權重持難乆位髙勢易窮窮者物之盈老者數之終四者如冦盜日夜来相攻寵者防悔尤權者懷憂畏為報髙蓋車恐非真富貴日近恩雖重雲髙勢却孤翻身落霄漢失腳倒泥塗晦即全身藥眀為伐性兵無以滋章為聰眀無以鹵莽為髙簡幸履坦途勿遵邪徑莫養痩馬駒莫養小妓女後事在目前不信君㸔取馬肥快行走妓長能歌舞三年五歳間已聞換幾主借問新舊主誰樂誰辛苦雜集試問池臺主多為将相官終身不曾到惟展畫圗㸔蛾須遠燈燭兎勿近罝罘相争兩蝸角所得一牛毛莫嫌地窄林亭小莫厭家貧活計微大有髙門鎖寛宅主人到老不曾歸吾觀權勢者苦以身狥物炙手外炎炎履氷中慄慄須除愛君障莫作戀家囚名為公器無多取利是身災合少求悔時其奈噬臍何權門要路是身災散地閒居少禍胎莫對月明思往事損君顔色減君年白侍郎集居處不守其度則峻宇崇臺攻之視聽不守其度則姦聲艶色攻之喜怒不守其度則僭賞淫刑攻之翫好不守其度則妨行之貨蕩心之器攻之獻納不守其度則讒諂之言聚斂之計攻之道術不守其度則不死之方養生之法攻之夫然則安得不内固其守甚於城池外防其攻甚於冦戎焉白樂天集皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國競競以彊六國既除訑訑乃亡栁文夫禄位富貴人所大欲也得之之難未若持之之難也得之於功或失之於徳得之於身或失之於子孫韓文時不再来榮難乆藉唐文粹我屋汝嫌低不住雕梁畫閣也知寛大須穩擇安巢處莫到巢成却不安遍㸔原上纍纍塜曾是城中汲汲人盡謂黄金堪潤屋誰思荒骨旋成塵杜荀鶴堯舜宰乾坤器農不器兵秦漢盜山岳鑄殺不鑄耕天地莫生金生金人起争孟東野勿踐亂階勿履利門勿蹈怨府勿躡禍源皮日休集團圓莫作波中月潔白莫為枝上雪温飛卿徒見婁敬棹而獲爵不見魏其齰以可悲李文饒箴董賢在前官亦崇梁冀破家金謾積張承吉有齒以焚古人所誡無脛而至亷士不居士能自審出處之宜而不惑者鮮矣或囿於利欲四顧滿志或役於黨類不能自還嚮非强志峻節皦然清厲大圭不琢獨鶴無侣難矣哉李義山楹之銘曰毋曰胡殘其禍将然毋曰胡害其禍將大毋曰胡傷其禍将長大戴禮本朝黄雀死彈丸厥罪在啄粟翠鵠不近人何為亦窮辱財為勢所利髙下同僵促能逃天地間蠛蠓無不足臨川集言語一出而不可復入故宜慎飲食一入而不可復出故宜節東坡易解美人如春風著物物未知身閒曷不長閉口天寒正好深藏手聲名忌太早君子可以寓意於物而不可以留意於物寓意於物雖㣲物足以為樂雖尤物不足以為病留意於物雖㣲物足以為病雖尤物不足以為樂邯鄲之夢猶足以破妄而歸真子今日見而身履之亦可以少悟矣並東坡集莫把文章動蠻貊恐妨談笑卧江湖欒城集翠蛾紅粉嬋娟劒殺盡世人人不知秦帝墓成陳勝起明皇宫就禄山来詩話總龜異香消骨髓絶色死英雄争先徑路機闗惡近後語言滋味長爽口物多終作疾快心事過必成殃知君病後能服藥不若病前能自防事到彊為須渉迹人能知止是先機才髙正被聰眀使身貴方為利害移並邵堯夫集康節嘗誦希夷語曰得便宜事不可再作得便宜處不可再去又曰落便宜是得便宜倦逰錄陳希夷嘗戒門人种放曰名者古今之美器造物者深忌之天地間無完名玉壺清話劉器之云富鄭公年八十書坐屏云守口如瓶防意如城晁氏客語切深疾惡反傷和陳後山集鑒戒經人無於水監當於民監書子借明為鑒淮南子史前事不忘後事之師出鄭世家鑑於水者知面容鑑於人者知吉凶蔡澤傳前車覆後車戒秦世之所以亟絶者其轍迹可見也然而不避是後車又将覆也通鑑往事所以知今馮異傳明鑑未逺覆車如昨後漢書陳蕃傳里語曰明鑑所以照形古事所以知今魏邵陵厲公李襲言曰變法不若養人改作寧如舊貫韓建畜財無數首事朱温王珂變法如麻一朝降賊中山城非不峻上蔡兵非不多前事具眀可以為戒唐鑑傳記以鏡自照者見形容以人自照者見吉凶太公陰謀集集前鑒不逺覆車繼軌選運命論羊腸畱覆轍唐劉長卿集始晉之侈家若欒氏祁氏羊舌氏以十數不能自保以貪國之利三卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣栁漁者對前事之不忘後事之元龜白樂天集明鏡一時覆車千祀王無功誅心經犯時之忌罪不在大失其所適過不在深易略例惟厥罪無在大亦無在多刑故無小人有小罪非𤯝乃惟終敗常亂俗三細不宥書史懲惡而勸善求名而亡欲盖而彰書齊豹盜三叛人名趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰許悼公瘧飲太子止之藥卒書曰弑其君宋督殺孔父而取其妻公怒督懼遂弑公君子以督為有無君之心而後動於惡左君親無将将而必誅公羊傳人臣無将将即反罪死無赦史叔孫通傳公孫𢎞曰解布衣為任侠行權以睚眦殺人解不知此辜甚於解知殺之西漢郭解傳集春秋書王法不誅其人身韓集唐崔沆為主罰錄事同年盧彖者俯及闗燕請假往洛及還同年已宴於曲江亭􅂏以雕幰戴妓㣲服縱觀為團司所發沆判之曰深攙席㡌宻映氊車紫陌尋春便隔同年之面青雲得路可觀異日之心唐崔沆教盜穴牆發櫃多得金玉已復不與同挈得不為盜乎杜牧之集本朝蜀李順黨有罪逃亡時張詠知益州許其首身拘其母十日不出釋之拘其妻一宿而来公斷云禁母十夜畱妻一宵倚門之望何踈結髪之情何厚尋出斬之語錄延齡之親寵陸贄之廢黜趙憬實為之助憬之罪大矣必若治之以春秋之法憬其為誅首歟范祖禹唐鑑唐元稹行李從易宗丞制詞云昔劉氏子孫在屬籍者十餘萬人嘗考王莽居攝時作大誥云宗室之雋有四百人孟康注云謂諸劉見在者何多寡不同如此豈莽殘啄之餘所謂四百人者皆贊莽以盜漢偷生嗜欲之徒歟不然安得生存於斯至為莽稱雋耶侯鯖錄無将之戒深著於魯經不道之誅難逃於漢法貶丁謂制懲創子畏馬之蹶一作辟也不敢騎懼車之覆也不敢乗有以噎死者而禁天下之食有以重馬敗者而禁天下之乗不亦悖哉未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢操刀者見其有所害也並出淮南子有以咽藥而死者欲禁天下之醫非也有以乗舟而死者欲禁天下之船非也兵道篇史人情挫辱則義節之風損後杜林傳羊祜曰當斷不斷天與不取豈非更事者恨於後時哉晋書本傳以饐廢餐梁書韓顯宗曰豈可以世無周召便廢宰相而不置哉後魏杜門齰舌漢傳昔人有以一噎而得病乃欲絶食唐書懲沸羮者吹冷虀傷弓之鳥驚曲巢唐書魏元忠自端州還為相不復强諫而與時俯仰中外失望唐鑑李徳裕言昔𤣥宗以臨淄王定内難自是疑忌宗室不令出閣所以悉為安禄山朱泚所魚肉者由聚於一宫故也通鑑唐𤣥宗傳記更嬴與魏王處廡下有鴈雙飛東方一作從東方来更嬴虛發而鴈下魏王曰射可至此乎更嬴曰其飛徐其鳴悲徐其瘡痛也鳴悲者乆失羣也故痛未息驚心未去故聞弦音而下戰國䇿一噎之故絶榖不食一蹶之故却足不行說苑談叢篇集懲熱羮而吹韲椘辭懲於羮者而吹韲兮何不變此之志也楚辭上傷禽見弦驚倦客惡離聲宋鮑昭詩傷禽惡弦驚出東門行危葉畏風驚禽易落文選治病不得真藥合而服之病以浸加不自知為人所欺也乃反謂方不效而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡雖死可也王符潛夫論懲殘創酷一噎而絶餱粮謬娶而逺正女並陳子昂集虛弦落驚禽李太白集涸鱗驚照轍墜羽怯虛彎駱賓王如痛定之人思當痛之時不知何能自處也韓文絶口不掛時事務為崇深以拒止嫉妬之口韓文虛弓鴈畏威元微之集聞弦尚驚危心不定垂耳斯乆長鳴孔悲遂令後代登壇者每一尋思怕}
