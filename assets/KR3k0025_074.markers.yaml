  - {type: variant, offset: 147, length: 0, content: '', krp: 於富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問其隣或曰噫刑戮也或曰身既死而子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者耶非彊心以智而不足不擇其才之稱否而冐之者耶非多行可愧知己之不可彊而為之者耶将富貴難守薄功而厚享之者耶抑豐悴有時一去一来而不可常者耶韓集坐觀萬象化方見百年侵陳子昂孟郊死葬北邙山日月風雲頓覺閒樽酒相逢十載前君為壮夫我少年樽酒相逢十載後我為壮夫君白首韓集人生大限雖百歳就中三十稱一世晦眀烏兎相推遷霜雪漸到雙鬢邊沈憂戚戚多浩嘆不得如意居大半一氣暫聚常恐散黄河清兮白石爛權集城池百載後耆舊幾家殘處處蓬蒿遍歸人掩淚㸔白首相逢征戰後青春已過亂離中蒼苔換古今萬事依然在無如嵗月何劉長裕長明燈是前朝焰曽照青春年少時世事不同心事新人何似故人劉禹錫所嘆别此年永無長慶厯凄涼百年事應與一年同風光少時新同上一夜思量十年事幾人强健幾人無同上二百年来城裏宅一家知換幾多人西施顔色今何在但看春風百草頭不知山下東流水何事長須日夜流元微之不是花中偏愛菊此花開後更無花鄭谷詩功名富貴若常在漢水亦應西北流元㣲之集冠盖散為烟霧盡金輿玉座成寒灰今人不見古人月今月曾經照古人李白時来天地皆同力運去英雄不自由欲招屈宋當時魄蘭敗荷枯不可尋羅隱析羽不復飛逝水不復歸樹有百年花人無一定顔花送人老盡人悲花自閒同上四時如逝水孟郊春早見花枝朝朝恨發遲及㸔花落後却憶未開時芳林新葉催陳葉流水前波讓後波劉禹錫人凶非宅凶同上三百年来庾樓上曾經多少望鄉人臙脂化為泥鉛黛復何有百齡同一寐人夀不如山年光忽如水因驚成人者盡是舊童孺同是天涯流落人相逢何必曾相識昔如𤣥雲光今如素絲帛鵶頭與鶴頸至老長如墨獨有人鬢毛不得終身黑黄金不惜買蛾眉揀得如花三四枝歌舞教成心力盡一朝身去不相隨自嗟名利客擾擾在人間何事長淮水東流亦不閒同上大都好物不堅牢彩雲易散琉璃脆春銷不得處惟有鬢邊霜惟有愁人鬢邊雪不隨春盡逐春生白侍郎義和走馭趂年光不許人間日月長年年只是人空好處處何曾花不開白傅集朝鐘暮角催頭白同上真宰倒持生殺柄閒物命長人短命松枝上鶴蓍下龜千年不死仍無病人生不得似龜鶴少去老来同旦暝天色晴眀少人生事故多同上天時人事常多故一嵗春能幾度㳺不是塵埃便風雨若非疾病即悲憂貧窮心苦多無興富貴身忙不自由同上春日雖遲不再中摇落覆井梧荒涼故籬菊白侍郎百川趂海返潮易一葉報秋歸樹難鮑溶刼灰飛盡古今平王維天若有情天亦老李賀隠跡今尚存髙風邈已逺白雲何時去丹桂空偃蹇孟浩然人生無幾何如寄天地間心有千載憂身無一日閒白集南朝三十六英雄各逐興亡自此中有國有家皆是夢為龍為虎亦成空唐韋荘人生天地之間若流電之過户牖輕塵之棲弱草李康逰仙序恨如春草多事與孤鴻去彭殤共一籌景物不盡人自老芳草何時時一作年恨即休日月如跳丸相趂走不住南去北来人自老夕陽長送釣船歸浮生冷似氷底水日夜東流人不知郵亭寄人世人世寄郵亭聚散真漂梗光隂極轉郵杜牧之花若有情還悵望水應無事莫潺湲墓平春草緑碑折古苔青温飛卿全勝已隨流水去黄鸝空嘲舊春聲武伯蒼日日人空老年年春更歸王維集一向破除愁不盡百方迴避老新来王建千金立碑髙百尺終作誰家柱下石張文昌舊國别多日故人無少年不覺年華似箭流賈浪仙主人何處獨徘徊流水自流花自開若見故交皆散去即應新燕不歸来方雄飛世事隨時變交情與我違空餘主人栁相見即依依錢起詩只聞丞相夷三族不見扁舟泛五湖張承吉朝悲辭樹葉夕感歸巢禽韓集地下若逢陳後主豈宜重問後庭花幾時心緒休無事得及逰絲百尺長縱使有花兼有月可堪無酒又無人李義山年年歳嵗花相似嵗嵗年年人不同唐文粹四時輪轉春常少百刻支分夜苦長白侍郎本朝沈碑身後念陵谷把酒泣下悲山川春風自是無情物肯為汝惜無情花今年花落眀年好只見開花人自老歐公集月如無恨月長圓石曼卿集好山緑水萬里有盡清風眀月千古無忘忘一作老時名談山阿昔留賞屐齒無遺跡異鄉物態與人殊惟有東風舊相識廟堂元老今華衮巖壁遺文已緑苔一生勤苦書千卷萬事消磨酒百杯歐公集往事無迹難追尋秦徵天下材入作阿房宫宫成非一木山谷為窮空子羽一炬火驪山三月紅能令掃地盡豈但焚人功世上惟知古有秦山中豈料今為晉天下紛紛經幾秦六朝人物隨煙埃金輿玉几安在哉事事只隨波浪去年年空得鬢毛新廢陵壞冢空冠劍誰復沾纓酹一缸山花落盡山長在山水空流山自閒歌舞可憐人暗換花開花落幾春風丹樓碧閤昔時事只有江山到古今臨川集世道如奕棋變化不容覆洛陽泉水今誰主莫學癡人李與牛壞壁無由見舊題人生營居宅竟為何人卜常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懐盛衰哀樂兩須㬰過眼榮枯電與風榮華坐銷歇閱世如郵傳惟有長眀燈依然照深殿有生共處覆載内擾擾膏火同烹煎近來愈覺世議隘每到寛處差安便世事如今臘酒醲交情自昔秋雲薄過眼百嵗如風燈一番花老一番新雕欄能得幾時好不獨憑欄人易老百年興廢更堪哀懸知草莽化池臺生前富貴草頭露身後風流陌上花親友如摶沙放手還復散出處升沈十年後死生契闊幾人存同上此生此夜不長好明月眀年何處看東坡詩歳月如宿昔人事幾反覆東坡詩近来世上無徐庶誰向桑麻識卧龍詩話平生功業數張紙千古英雄一窖塵聞見錄邯鄲炊未熟榮謝隔逡巡時事無端日日新凄涼百年後事付何人筆欒城集襄陽耆舊内無復姓龎人陳後山詩日月過箭疾自古非一秦六籍盖多難春不能朱鏡裏顔青莎徑裏香未乾黄鳥陰中實已團山谷詩今日牛羊上丘隴當時近前左右嗔同上向来歌舞地夜雨鳴寒蛩後山詩感傷經父没而不能讀父之書手澤存焉爾母沒而杯圏不能飲焉口澤之氣存焉爾禮記子仰視榱桷俯察几筵其器皆存而不覩其人以此思哀則哀可知矣家語其物存其人亡不言哀自至荘子史長老言匈奴失隂山之後過之未嘗不哭也西漢杜延年居父官府不敢當舊位坐卧皆易其處西漢孤者易傷貧者易感魏邴原傳讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇王獻之卒徽之奔喪上靈牀取獻之琴彈之乆而不調歎曰嗚呼子敬人琴倶亡晋書薛收卒太宗曰吾與伯褒欵曲襟袍何期一朝忽成萬古舊唐書集生存華屋處零落歸山丘曹子建詩懿親戚屬亡多寡存昵交宻友亦不半在或曾共逰一塗同宴一室十年之外索然而已盡嗟人生之短期孰長年之能執時飄忽其不再老晼晩其将及觸萬類以生悲歎同節而異時顧舊要於遺存得十一於千百陸士衡不見耆舊老但見新少年曹子建謂百年已分可共相}
  - {type: variant, offset: 148, length: 0, content: '', WYG: 何圗數年之間零落略盡徐陳應劉一時倶逝痛可言耶魏書舊齒皆凋䘮車馬行有淚皆成血無聲不斷膓張説之衣綉而歸雖榮之在晝累茵以坐而悲不逮親張九齡文既来何苦不須􅁷縹渺悠揚還滅去去何速兮来何遲是邪非邪兩不知魂之不来君心苦魂之来兮君亦悲背燈隔帳不得語安用暫来還見違唐文粹他時一笑後今日幾人存杜詩世上空驚故人少集中惟覺祭文多劉禹錫解攜襟袖交臂存亡駱賔王寒煙半堂影燼火滿庭灰元微之集逝水良乆矣行雲安在哉君骨乆為土我心常似灰眼前少年客無復昔時人元微之滿朝豪士今已盡欲話舊逰人不知韋應物集見話先朝如夢中同上何言巾上淚乃是腸中血白侍郎見説白楊堪作柱争教紅粉不成灰同上試發舊箧君書盈千詞旨重重墨色如新孫可之文本朝因拂醉題詩句在應憐手種樹隂成人昔共逰今孰在樹猶如此我何堪並出歐公集原憲之貧顔回之短命揚雄之無子馮術之不遇皇甫士安之篤疾彼遇其一而人哀之至今而茂誠兼之豈非命也哉東坡集懷昔經孔子曰魯之郊禘非禮也周公其衰矣禮記誰将西歸懐之好音詩子晋宋江山衣冠文物之舊文中子史韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王韓子所見盖周之舊典禮經也天王使劉定公勞趙孟於洛汭劉定公曰美哉禹功眀德逺矣㣲禹吾其魚乎左傳魏杜弼曰荆棘生於建業之宫麋鹿逰於姑蘇之館梁紀集思南郢之舊俗兮腸一夕而九迴楚辭衣冠禮樂盡在是矣選集序南登㶚陵岸迴首望長安北邙何纍纍髙陵有四五借問誰家塜皆云漢世主七哀詩舊國千年盡荒城四望通栢梁髙宴今何在山川四望是人事一朝非山川不改舊時丘隴多為陳跡駱賔王江頭宫殿鎖千門細栁新蒲為誰緑聞道長安似奕棋百年世事不勝悲王侯第宅皆新主文武衣冠異昔時庾信羅含倶有宅春来秋去作誰家杜詩功盖三分國名成八陣圗江流石不轉遺恨失吞吳緑珠樓下花滿園今日曽無一枝在古之帝宫苑今乃人樵蘇故園池臺今是非金谷銅駞非故鄉杜詩吳宫花草埋幽徑晋代衣冠成古丘李白滕王髙閣臨江渚佩玉鳴鑾罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨閒雲潭影日悠悠物換星移幾度秋閣中帝子今何在檻外長江空自流王勃洛陽東風幾時来川波岸栁春全迴宫門一鎖不復啓雖有九陌無塵埃昌黎集宫前遺老来相問今是開元幾葉孫我思古人伊鄭之僑丘園滿目衣冠盡城闕連雲草樹荒韓集舞榭傾欹基尚在文牕窈窕紗猶緑塵埋粉壁舊花鈿烏啄風筝碎珠玉憶昔開元全盛日小邑猶藏萬家室萬古一長嗟覽物想故國腸斷裴家光德宅無人掃地㦸門深元稹集吳妖小女飛作煙越艷西施化為土嬌花巧笑乆寂寥妓館苧羅空處所白樂天集事去惟留水人非但見山金谷風光依舊在無人管領石家春白詩周臺漢園斜陽春草杜牧之芳􅁐至今生茂草古城依舊枕寒流劉夢得商女不知亡國恨隔江猶唱後庭花杜牧之可憐故國三千里虛唱歌詞滿六宫錦纜龍舟隋煬帝平臺􅃨道漢梁王逰人閒起前朝念折栁孤吟斷殺腸杜牧之登古城兮思古人感賢達兮同埃塵平原兮寄逺目姑蘇兮聚麋鹿黄池髙㑹事未終滄海横流人蕩覆伍胥殺}
