  - {type: variant, offset: 149, length: 0, content: '', WYG: 誰不寃竟㸔墓樹如所言越王嘗膽安可敵逺取石田有何益一朝空謝㑹稽人萬古猶傷甬東客黍離離兮城陂陁牛羊踐兮牧豎歌野無人兮秋草緑國為墟兮古木多劉長卿萬户千門成緑草只縁一曲後庭花劉賔客集芳草遍吳宫碑苔幾字滅山木萬株齊劉長卿山圍故國周遭在潮打孤城寂寞囬惟有淮東舊時月夜深還過女墻来劉禹錫官舎己空秋草緑女墻猶在夜烏啼劉長卿大抵南朝皆曠達可憐西晉最風流杜牧之石麟埋沒藏春草銅雀荒涼對暮雲温飛卿事去人亡跡自留劉長卿永和春色千年在七雄三傑今何在休為閒人淚滿襟梁王兎苑荆榛裏煬帝雞臺夢想中羅隠孤嶂秦碑在荒城魯殿餘從来多古意臨眺獨躊躇杜詩宫盡燕聲少臺荒麋跡多今日皆何處閨門春草長許用晦白骨半隨流水去黄雲猶傍郡城低李嘉祐白社已應無故老清江依舊遶空城鄭守愚市朝欲認不知處漠漠野田空草花錢起詩髙塜荒涼多貴臣蛾眉漫睩共灰塵試上銅臺歌舞處唯有秋風愁殺人張説之屏上樓臺陳後主鏡中金翠李夫人温飛卿六代精靈人不見思量應在月明中六朝勝事已塵埃羅隠一朝物變人亦非四面荒涼人徑稀意氣豪華何處去空餘草露濕征衣孟浩然憑髙覽古嗟寰宇造化茫茫思悠哉秦川入水長繚繞漢氏五陵空}
