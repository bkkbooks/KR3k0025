  - {type: variant, offset: 177, length: 0, content: '', WYG: 失實漢光武紀上官桀怨霍光令人詐為燕王上書言光出都羽林道上稱蹕又擅調益幕府校尉光聞之不入上問大将軍安在桀對以燕王告其罪不敢入有詔召光光免冠上曰將軍冠朕知是書詐也將軍調校尉未十日燕王何以知之漢昭紀貴視其所舉富視其所與貧視其所不為説苑無以先入之語為主臣下雷同是非相蔽國之大患也若不和睦則有讐黨有讐黨則毁譽無端毁譽無端則真偽失實此皆不可不深察也通鑑魏明欲知治經之士則視其記覽博洽講論精通斯為善治經}
