  - {type: variant, offset: 151, length: 0, content: '', krp: 跌並劉賔客異質忌處羣孤芳難寄林年少得塗莫要忙韓退之保貴在家貧劉賔客寸心生萬路今古棼若絲逐逐行不盡忙忙休者誰来恨不可遏去悔何足追劉义文人生莫依倚依倚事不成唐文粹莫倚顔似花君㸔嵗如水元微之集名腸内煎外火非熱盛名先物易生厲疵並劉賔客莫道韶華鎮長在白頭面皺專相待唐文粹髙名難恃劉長卿權重持難乆位髙勢易窮窮者物之盈老者數之終四者如冦盜日夜来相攻寵者防悔尤權者懷憂畏為報髙蓋車恐非真富貴日近恩雖重雲髙勢却孤翻身落霄漢失腳倒泥塗晦即全身藥眀為伐性兵無以滋章為聰眀無以鹵莽為髙簡幸履坦途勿遵邪徑莫養痩馬駒莫養小妓女後事在目前不信君㸔取馬肥快行走妓長能歌舞三年五歳間已聞換幾主借問新舊主誰樂誰辛苦雜集試問池臺主多為将相官終身不曾到惟展畫圗㸔蛾須遠燈燭兎勿近罝罘相争兩蝸角所得一牛毛莫嫌地窄林亭小莫厭家貧活計微大有髙門鎖寛宅主人到老不曾歸吾觀權勢者苦以身狥物炙手外炎炎履氷中慄慄須除愛君障莫作戀家囚名為公器無多取利是身災合少求悔時其奈噬臍何權門要路是身災散地閒居少禍胎莫對月明思往事損君顔色減君年白侍郎集居處不守其度則峻宇崇臺攻之視聽不守其度則姦聲艶色攻之喜怒不守其度則僭賞淫刑攻之翫好不守其度則妨行之貨蕩心之器攻之獻納不守其度則讒諂之言聚斂之計攻之道術不守其度則不死之方養生之法攻之夫然則安得不内固其守甚於城池外防其攻甚於冦戎焉白樂天集皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國競競以彊六國既除訑訑乃亡栁文夫禄位富貴人所大欲也得之之難未若持之之難也得之於功或失之於徳得之於身或失之於子孫韓文時不再来榮難乆藉唐文粹我屋汝嫌低不住雕梁畫閣也知寛大須穩擇安巢處莫到巢成却不安遍㸔原上纍纍塜曾是城中汲汲人盡謂黄金堪潤屋誰思荒骨旋成塵杜荀鶴堯舜宰乾坤器農不器兵秦漢盜山岳鑄殺不鑄耕天地莫生金生金人起争孟東野勿踐亂階勿履利門勿蹈怨府勿躡禍源皮日休集團圓莫作波中月潔白莫為枝上雪温飛卿徒見婁敬棹而獲爵不見魏其齰以可悲李文饒箴董賢在前官亦崇梁冀破家金謾積張承吉有齒以焚古人所誡無脛而至亷士不居士能自審出處之宜而不惑者鮮矣或囿於利欲四顧滿志或役於黨類不能自還嚮非强志峻節皦然清厲大圭不琢獨鶴無侣難矣哉李義山楹之銘曰毋曰胡殘其禍将然毋曰胡害其禍將大毋曰胡傷其禍将長大戴禮本朝黄雀死彈丸厥罪在啄粟翠鵠不近人何為亦窮辱財為勢所利髙下同僵促能逃天地間蠛蠓無不足臨川集言語一出而不可復入故宜慎飲食一入而不可復出故宜節東坡易解美人如春風著物物未知身閒曷不長閉口天寒正好深藏手聲名忌太早君子可以寓意於物而不可以留意於物寓意於物雖㣲物足以為樂雖尤物不足以為病留意於物雖㣲物足以為病雖尤物不足以為樂邯鄲之夢猶足以破妄而歸真子今日見而身履之亦可以少悟矣並東坡集莫把文章動蠻貊恐妨談笑卧江湖欒城集翠蛾紅粉嬋娟劒殺盡世人人不知秦帝墓成陳勝起明皇宫就禄山来詩話總龜異香消骨髓絶色死英雄争先徑路機闗惡近後語言滋味長爽口物多終作疾快心事過必成殃知君病後能服藥不若病前能自防事到彊為須渉迹人能知止是先機才髙正被聰眀使身貴方為利害移並邵堯夫集康節嘗誦希夷語曰得便宜事不可再作得便宜處不可再去又曰落便宜是得便宜倦逰錄陳希夷嘗戒門人种放曰名者古今之美器造物者深忌之天地間無完名玉壺清話劉器之云富鄭公年八十書坐屏云守口如瓶防意如城晁氏客語切深疾惡反傷和陳後山集鑒戒經人無於水監當於民監書子借明為鑒淮南子史前事不忘後事之師出鄭世家鑑於水者知面容鑑於人者知吉凶蔡澤傳前車覆後車戒秦世之所以亟絶者其轍迹可見也然而不避是後車又将覆也通鑑往事所以知今馮異傳明鑑未逺覆車如昨後漢書陳蕃傳里語曰明鑑所以照形古事所以知今魏邵陵厲公李襲言曰變法不若養人改作寧如舊貫韓建畜財無數首事朱温王珂變法如麻一朝降賊中山城非不峻上蔡兵非不多前事具眀可以為戒唐鑑傳記以鏡自照者見形容以人自照者見吉凶太公陰謀集集前鑒不逺覆車繼軌選運命論羊腸畱覆轍唐劉長卿集始晉之侈家若欒氏祁氏羊舌氏以十數不能自保以貪國之利三卿裂而食之矣范氏中行氏貪人之土田侵人之勢力三卿又裂而食之矣栁漁者對前事之不忘後事之元龜白樂天集明鏡一時覆車千祀王無功誅心經犯時之忌罪不在大失其所適過不在深易略例惟厥罪無在大亦無在多刑故無小人有小罪非𤯝乃惟終敗常亂俗三細不宥書史懲惡而勸善求名而亡欲盖而彰書齊豹盜三叛人名趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰許悼公瘧飲太子止之藥卒書曰弑其君宋督殺孔父而取其妻公怒督懼遂弑公君子以督為有無君之心而後動於惡左君親無将将而必誅公羊傳人臣無将将即反罪死無赦史叔孫通傳公孫𢎞曰解布衣為任侠行權以睚眦殺人解不知此辜甚於解知殺之西漢郭解傳集春秋書王法不誅其人身韓集唐崔沆為主罰錄事同年盧彖者俯及闗燕請假往洛及還同年已宴於曲江亭彖以雕幰戴妓㣲服縱觀為團司所發沆判之曰深攙席㡌宻映氊車紫陌尋春便隔同年之面青雲得路可觀異日之心唐崔沆教盜穴牆發櫃多得金玉已復不與同挈得不為盜乎杜牧之集本朝蜀李順黨有罪逃亡時張詠知益州許其首身拘其母十日不出釋之拘其妻一宿而来公斷云禁母十夜畱妻一宵倚門之望何踈結髪之情何厚尋出斬之語錄延齡之親寵陸贄之廢黜趙憬實為之助憬之罪大矣必若治之以春秋之法憬其為誅首歟范祖禹唐鑑唐元稹行李從易宗丞制詞云昔劉氏子孫在屬籍者十餘萬人嘗考王莽居攝時作大誥云宗室之雋有四百人孟康注云謂諸劉見在者何多寡不同如此豈莽殘啄之餘所謂四百人者皆贊莽以盜漢偷生嗜欲之徒歟不然安得生存於斯至為莽稱雋耶侯鯖錄無将之戒深著於魯經不道之誅難逃於漢法貶丁謂制懲創子畏馬之蹶一作辟也不敢騎懼車之覆也不敢乗有以噎死者而禁天下之食有以重馬敗者而禁天下之乗不亦悖哉未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢操刀者見其有所害也並出淮南子有以咽藥而死者欲禁天下之醫非也有以乗舟而死者欲禁天下之船非也兵道篇史人情挫辱則義節之風損後杜林傳羊祜曰當斷不斷天與不取豈非更事者恨於後時哉晋書本傳以饐廢餐梁書韓顯宗曰豈可以世無周召便廢宰相而不置哉後魏杜門齰舌漢傳昔人有以一噎而得病乃欲絶食唐書懲沸羮者吹冷虀傷弓之鳥驚曲巢唐書魏元忠自端州還為相不復强諫而與時俯仰中外失望唐鑑李徳裕言昔𤣥宗以臨淄王定内難自是疑忌宗室不令出閣所以悉為安禄山朱泚所魚肉者由聚於一宫故也通鑑唐𤣥宗傳記更嬴與魏王處廡下有鴈雙飛東方一作從東方来更嬴虛發而鴈下魏王曰射可至此乎更嬴曰其飛徐其鳴悲徐其瘡痛也鳴悲者乆失羣也故痛未息驚心未去故聞弦音而下戰國䇿一噎之故絶榖不食一蹶之故却足不行說苑談叢篇集懲熱羮而吹韲椘辭懲於羮者而吹韲兮何不變此之志也楚辭上傷禽見弦驚倦客惡離聲宋鮑昭詩傷禽惡弦驚出東門行危葉畏風驚禽易落文選治病不得真藥合而服之病以浸加不自知為人所欺也乃反謂方不效而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡雖死可也王符潛夫論懲殘創酷一噎而絶餱粮謬娶而逺正女並陳子昂集虛弦落驚禽李太白集涸鱗驚照轍墜羽怯虛彎駱賓王如痛定之人思當痛之時不知何能自處也韓文絶口不掛時事務為崇深以拒止嫉妬之口韓文虛弓鴈畏威元微之集聞弦尚驚危心不定垂耳斯乆長鳴孔悲遂令後代登壇者每一尋思怕}
  - {type: variant, offset: 152, length: 0, content: '', WYG: 功並劉賔客空彎而鴈驚虛引而猿泣白侍郎集未聞籠裏鳥飛出肯飛還白樂天集傷弓未息新驚鳥白樂天瘡懼再傷弓劉長卿昔人有因噎而廢食者又有懼溺而自沈者其為矯枉防患之慮豈不過哉陸宣公文有憂社稷心亦噤而不吐唐文粹本朝我遭讒口身落此每聞巧舌宜可憎歐公集年来效喑啞天静傷鴻猶戢翼月明驚鵲未安枝東坡詩掃迹滅景於人間如脱兎之投枝也東坡文集盖世有耕田而以其耜殺人者或者因以耕田為可廢矣乆蟄泥塗聞震雷而惕若深囚籠檻得清風而自疑欒城集奮發經身可危也而志不可奪也雖危起居竟信其志儒行史始雖垂趐終能奮翼漢書馮異傳有志者事竟成後漢耿弇陶侃在州無事輒朝運百甓於齋外暮運於齋内人問其故答}
