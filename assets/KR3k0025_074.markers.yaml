  - {type: variant, offset: 148, length: 0, content: '', krp: 何圗數年之間零落略盡徐陳應劉一時倶逝痛可言耶魏書舊齒皆凋䘮車馬行有淚皆成血無聲不斷膓張説之衣綉而歸雖榮之在晝累茵以坐而悲不逮親張九齡文既来何苦不須臾縹渺悠揚還滅去去何速兮来何遲是邪非邪兩不知魂之不来君心苦魂之来兮君亦悲背燈隔帳不得語安用暫来還見違唐文粹他時一笑後今日幾人存杜詩世上空驚故人少集中惟覺祭文多劉禹錫解攜襟袖交臂存亡駱賔王寒煙半堂影燼火滿庭灰元微之集逝水良乆矣行雲安在哉君骨乆為土我心常似灰眼前少年客無復昔時人元微之滿朝豪士今已盡欲話舊逰人不知韋應物集見話先朝如夢中同上何言巾上淚乃是腸中血白侍郎見説白楊堪作柱争教紅粉不成灰同上試發舊箧君書盈千詞旨重重墨色如新孫可之文本朝因拂醉題詩句在應憐手種樹隂成人昔共逰今孰在樹猶如此我何堪並出歐公集原憲之貧顔回之短命揚雄之無子馮術之不遇皇甫士安之篤疾彼遇其一而人哀之至今而茂誠兼之豈非命也哉東坡集懷昔經孔子曰魯之郊禘非禮也周公其衰矣禮記誰将西歸懐之好音詩子晋宋江山衣冠文物之舊文中子史韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王韓子所見盖周之舊典禮經也天王使劉定公勞趙孟於洛汭劉定公曰美哉禹功眀德逺矣㣲禹吾其魚乎左傳魏杜弼曰荆棘生於建業之宫麋鹿逰於姑蘇之館梁紀集思南郢之舊俗兮腸一夕而九迴楚辭衣冠禮樂盡在是矣選集序南登㶚陵岸迴首望長安北邙何纍纍髙陵有四五借問誰家塜皆云漢世主七哀詩舊國千年盡荒城四望通栢梁髙宴今何在山川四望是人事一朝非山川不改舊時丘隴多為陳跡駱賔王江頭宫殿鎖千門細栁新蒲為誰緑聞道長安似奕棋百年世事不勝悲王侯第宅皆新主文武衣冠異昔時庾信羅含倶有宅春来秋去作誰家杜詩功盖三分國名成八陣圗江流石不轉遺恨失吞吳緑珠樓下花滿園今日曽無一枝在古之帝宫苑今乃人樵蘇故園池臺今是非金谷銅駞非故鄉杜詩吳宫花草埋幽徑晋代衣冠成古丘李白滕王髙閣臨江渚佩玉鳴鑾罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨閒雲潭影日悠悠物換星移幾度秋閣中帝子今何在檻外長江空自流王勃洛陽東風幾時来川波岸栁春全迴宫門一鎖不復啓雖有九陌無塵埃昌黎集宫前遺老来相問今是開元幾葉孫我思古人伊鄭之僑丘園滿目衣冠盡城闕連雲草樹荒韓集舞榭傾欹基尚在文牕窈窕紗猶緑塵埋粉壁舊花鈿烏啄風筝碎珠玉憶昔開元全盛日小邑猶藏萬家室萬古一長嗟覽物想故國腸斷裴家光德宅無人掃地㦸門深元稹集吳妖小女飛作煙越艷西施化為土嬌花巧笑乆寂寥妓館苧羅空處所白樂天集事去惟留水人非但見山金谷風光依舊在無人管領石家春白詩周臺漢園斜陽春草杜牧之芳苑至今生茂草古城依舊枕寒流劉夢得商女不知亡國恨隔江猶唱後庭花杜牧之可憐故國三千里虛唱歌詞滿六宫錦纜龍舟隋煬帝平臺複道漢梁王逰人閒起前朝念折栁孤吟斷殺腸杜牧之登古城兮思古人感賢達兮同埃塵平原兮寄逺目姑蘇兮聚麋鹿黄池髙㑹事未終滄海横流人蕩覆伍胥殺}
