  - {type: variant, offset: 173, length: 0, content: '', WYG: 最有如侠者可與共立衆黙然無敢應者泰乃厚賜侠朝野嘆服號為獨立使君通鑑王世充誓衆曰今日之戰非直爭勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所爭者死非獨為國通鑑傳記陶侃為荆州見佐吏博奕戲具投之於江曰圍棊堯舜以教愚子博殷紂所造諸君並國器何以此為晉中興書集夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非止於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也賞厚可令亷士動心罰重可令凶人喪魄韓文為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉栁斷刑齊桓将圖霸功管仲戒之以無忘在莒懼其情志之易變也陸宣公文所以激生者節豈獨慰死者魂白樂天集人之詞待扣而揚猶井之利汲劉賓客本朝美井不日汲何由發清甘歐公集欲試百煉剛要須更泥蟠東坡詩責備史盛名之下其實難副東漢春秋之法常責備於賢者唐太宗贊盛名之下為難居矣名盛則責望備唐書集煉金索堅眞洗玉求眀潔孟郊詩鳳凰五色百鳥尊知鳶為害何不言韋應物集本朝名下難為人山谷詩仰望史季武子曰小國之仰大國也如百穀之仰膏雨焉閔閔焉如農夫之望歳左子餘曰重耳之仰君也若黍苖之仰陰雨也若君實庇陰膏澤之使能成嘉穀薦宗廟君之力也國語吕不韋曰吾門待子門而大史本傳王吉少與貢禹為友吉為益州刺史貢聞之拂冠以待西漢天下莫不拭目傾耳出後漢天下聚目而視攅耳而聽出東漢輶軒未動天下翹然待之矣陳子昂傳集彈冠俟知已曹子建椅梧傾髙鳳寒谷待鳴律顔延年秋胡詩冀宵蠋之末光邀潤屋之微澤劉孝標論今天下以君侯為文章之司命人物之權衡一經品題便}
