  - {type: variant, offset: 158, length: 1, content: 丞, WYG: 脩文卒為周威之師班超憤而習武終建西域之績皆因窘而發志縁阨而顯名出劉子史以夷狄遇秦擯斥之不得與中國之㑹盟於是孝公發憤彊秦通鑑周紀越王念吳之復夏則握火冬則抱氷吳越春秋痛心疾首左成十三越王句踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰汝忘㑹稽之耻乎身自耕作食不加肉衣不重采折節下賢厚遇賔客賑貧弔死與百姓同其勞史記越世家蘇秦窮困歸兄嫂姊妹妻皆笑之不為下機秦乃閉室讀周書陰符後合六國從約相六國車騎輜重擬於王者荀卿嫉濁世之政於是推儒墨道德之行事著數萬言虞卿不得意乃著書世傳曰虞氏春秋太史公曰虞卿非窮愁亦不能著書以自見於後世史記不因阨惡能激乎史蔡澤傳論蘇秦為合從長諸侯各發使送之擬於王者歎曰使我有洛陽}
