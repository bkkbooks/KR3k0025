  - {type: variant, offset: 174, length: 2, content: 碑銘, WYG: 佳士而君侯何惜階前盈尺之地不使白揚眉吐氣激昂靑雲耶李白書萬井九街皆仰望韋應物善人進其類皆有望於公韓集致察經視履考祥易人無於水監當於民監明清於單辭有言逆於汝心必求諸道有言遜於汝志必求諸非道書子察其眉睫之間而得其情列子脱符不知其子視其父不知其君視其左右荀子性惡流言止於智者荀子大畧觀人者審其作輟而已矣揚孝至史子産曰它日吾見蔑之面而已今吾見其心矣左言之大甘其中必苦國語觀其容而知其心矣國語貌言華也至言實也苦言藥也甘言疾也不知其人視其友史記李克曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣史魏世家齊威王召即墨大夫語之曰自子之居即墨也毁言日至然吾使人視即墨田野辟人民給官無事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不辟人民貧餒是子厚幣事吾左右以求譽也是日烹阿大夫及左右常譽者通鑑聽言之道必以其事觀之則言者莫敢妄言賈誼傳忠言逆耳利於行良藥苦口利於病張良達觀其所舉富觀其所予窮觀其所不為貧觀其所不取近觀其所為遠觀其所主西漢杜欽傳夫談有悖於目拂於耳謬於心而便於身者或有悦於目順於耳快於心而毁於行者非有明王聖主孰能聽之東方朔傳徙郡國豪傑及訾三百萬以上於茂陵軹人郭解闗東大侠也亦在徙中衛将軍為言郭解家貧不中徙上曰解布衣權至使将軍為言此其家不貧卒徙解家漢武紀傳聞之事常}
