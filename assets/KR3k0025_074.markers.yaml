  - {type: variant, offset: 207, length: 0, content: '', krp: 曰君有楚命亦不使一介行李告於寡君而即安於楚左公如晉使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一介辱在寡君而即安於甥舅左且寡君出伯父無裏言左傳越石父賢在縲絏中晏子解左驂贖之載歸入居乆之越石父請絶晏子瞿然曰嬰雖不仁免子於阨何子求絶之速也石父曰吾聞君子詘於不知己而信於知己者方吾在縲絏中彼不知我也夫子既以感悟而贖我是知己知己而無禮固不如在縲絏之中史記燕惠王使人讓樂毅且謝之曰将軍過聽以與寡人有隙遂捐燕歸趙将軍自爲計則可矣而亦何以報先王之所以遇将軍之意乎通鑑周紀吕后使吕澤語張良曰今日君安得髙枕而卧張良傳天下之責四面至矣谷永傳夫戚而不見殊孰能無怨西漢杜鄴傳張讓詰何進曰但欲托卿門户耳今乃欲滅我曹種族不亦太甚乎通鑑漢獻紀張良曰聞将軍有意督過之西漢從事中郎馬融主為梁冀作章表吳祐謂融曰李公之罪成於卿手李公誅卿何面目視天下通鑑李固死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉爲凶視成為敗漢家衰微從此始矣公等受主厚禄顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長嘆流涕而已通鑑}
  - {type: variant, offset: 208, length: 1, content: 靈, WYG: 徵田逰岩為太子洗馬在東宫無所規益右衛副率蒋儼以書責之曰向使不餐周粟僕何敢言禄及身矣以何酬塞逰岩竟不能答通鑑盧杞惡太子少師顔真卿欲出之於外真卿謂盧杞曰先中丞傳首至平原真卿以舌䑛面血今相公忍不相容乎杞瞿然起拜然恨之益甚德宗謝安累辟不就簡文帝時為相曰安石既與人同樂必不得不與人同憂召之必至晉書本傳武德中突厥頡利二可汗到原州太宗謂之曰不念昔者香火之言乃来相侵唐書門東漢李膺傳郭林宗與李膺同舟而濟賓客望之以為神仙然東漢郭泰傳袁術見孫策嘆曰使術有子如孫郎死復何恨東漢本傳互見有子秦王堅嘆曰周孟威不屈於前丁彦逺潔已於後吉祖沖閉口而死何晉氏之多忠臣也通鑑晉成紀唐太宗作文學館收賢才以杜如晦等為學士方是時在選中者天下所慕向謂之登瀛州唐書褚亮傳楊貴妃有寵民間歌之曰生男勿喜女勿悲君今看女作門楣通鑑唐𤣥宗班景倩入為大理少卿過大梁倪若水餞之行立望其行塵乆之乃返謂官屬曰班生此行何異登仙通鑑唐𤣥宗紀梁帝曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳通鑑五代梁紀傳記崔日知恨不居八座為太常卿起樓與尚書省相對人謂之崔公望省樓國史纂要唐文宗時進士特盛舉子語曰鄉貢進士不轉上州刺史盧氏雜説唐宣宗留心貢舉題殿柱曰鄉貢進士李某北夢瑣言集陸大夫燕喜西都郭有道人倫東國公卿貴其籍甚縉紳羨其登仙劉孝標廣絶交論縹組雲臺者摩肩趨走丹墀者疉跡選絶交論桓子新論曰闗東語曰人聞長安樂則出門西向而笑知肉味羙則對屠門而大嚼論衡仰羨鸛鶴矯仰羨黄昏鳥投林羽翮輕並杜工部飛騰無奈故人何杜詩自視雛鷇望君飛鴻士大夫家孰不榮羨並韓文籠禽羨歸翼韋應物集已将四海聲名去又占三春風景来白樂天集天外鳯凰誰得髓無人解合續絃膠杜牧之知有杏園無路入馬前惆悵滿枝紅武伯奮咫尺邈霄漢武伯奮本朝長松百尺不自覺企而羨者蓬與蒿東坡見説文星環北極人間無路仰天庭山谷詩過慮經季文子三思而後行子聞之曰再斯可矣論語子道在邇而求諸逺事在易而求諸難孟離婁上杞國有人憂天地崩墜身亡所寄廢飲食者列子天瑞無病而自灸荘子盜跖墨子之言昭昭為天下憂不足夫不足非天下之公患也特墨子之私憂過計也荀子富國以數雜匝也憂天下之亂猶憂河水之少涸而益之也龜三千嵗蜉蝤不過三日以蜉蝤而為龜憂養生之具人必笑之矣淮南子詮言訓史趙孟未盈五十而諄諄焉如八九十者左傳蔡謨性尤篤慎每事必為過防故時人云蔡公過浮船脱帶腰舟長晉書獻忠子交淺而言深忠也淮南子史石祁子曰得一夫而失一國與惡而棄好非謀也左富辰曰庸勲親親暱近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也願以小人之腹為君子}
