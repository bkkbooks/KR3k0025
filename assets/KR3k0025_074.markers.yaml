  - {type: variant, offset: 149, length: 0, content: '', krp: 誰不寃竟㸔墓樹如所言越王嘗膽安可敵逺取石田有何益一朝空謝㑹稽人萬古猶傷甬東客黍離離兮城陂陁牛羊踐兮牧豎歌野無人兮秋草緑國為墟兮古木多劉長卿萬户千門成緑草只縁一曲後庭花劉賔客集芳草遍吳宫碑苔幾字滅山木萬株齊劉長卿山圍故國周遭在潮打孤城寂寞囬惟有淮東舊時月夜深還過女墻来劉禹錫官舎己空秋草緑女墻猶在夜烏啼劉長卿大抵南朝皆曠達可憐西晉最風流杜牧之石麟埋沒藏春草銅雀荒涼對暮雲温飛卿事去人亡跡自留劉長卿永和春色千年在七雄三傑今何在休為閒人淚滿襟梁王兎苑荆榛裏煬帝雞臺夢想中羅隠孤嶂秦碑在荒城魯殿餘從来多古意臨眺獨躊躇杜詩宫盡燕聲少臺荒麋跡多今日皆何處閨門春草長許用晦白骨半隨流水去黄雲猶傍郡城低李嘉祐白社已應無故老清江依舊遶空城鄭守愚市朝欲認不知處漠漠野田空草花錢起詩髙塜荒涼多貴臣蛾眉漫睩共灰塵試上銅臺歌舞處唯有秋風愁殺人張説之屏上樓臺陳後主鏡中金翠李夫人温飛卿六代精靈人不見思量應在月明中六朝勝事已塵埃羅隠一朝物變人亦非四面荒涼人徑稀意氣豪華何處去空餘草露濕征衣孟浩然憑髙覽古嗟寰宇造化茫茫思悠哉秦川入水長繚繞漢氏五陵空}
  - {type: variant, offset: 150, length: 0, content: '', WYG: 巍韋應物古城聊一望荒棘幾千叢盧照隣詩寂寞空餘歌舞地姚少監昔日青樓對歌舞今日黄埃聚棘荆李嶠本朝不知此地幾興廢仰視喬木皆蒼煙歐公集煙濃草逺望不見物換星移度幾秋臨川集金陵限南北形勢豈其然楚役六千里陳亡三百年江山空幕府風月自航舡登髙一曲悲亡國想繞紅梁落暗塵破堞自生新草木廢宫誰識舊軒牕臨川集西望夏口東望武昌山川相繆鬱乎蒼蒼此非曹孟德之困於周郎者乎方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江横槊賦詩固一世之雄也而今安在哉東坡赤壁賦三千宫女看花處人盡臺空花自開古今詩話儆戒經無平不陂無往不復禍從口出患從口入易傳言行君子之樞機樞機之發榮辱之主也易夙興夜寐詩敢有恒舞於宫酣歌於室時謂巫風敢有殉於貨色恒於逰畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一於身家必喪邦君有一於身國必亡玩人䘮德玩物喪志書子名也者相軋也知也者争之器也多男子則多懼富則多事壽則多辱是三者非所以養徳也莊子天地水能載舟亦能覆舟荀子夫善㳺者溺善騎者墮各以其所好反自為禍淮南子五聲八音清商流徵損聰者也鮮花艷采彧麗炳爛傷明者也宴安逸豫清醪芳醲亂性者也冶容媚姿鈆華素質伐命者也里語曰人在人間日失一日如牽牛以詣屠所每進一歩去死轉近也抱朴子順者福之門逆者禍之府目愛綵色命曰伐性之斤耳樂淫聲命曰攻心之鼔口貪滋味命曰腐腸之藥鼻恱芳馨命曰燻喉之煙身安轝駟命曰召蹶之機劉子勒於几杖刻於盤盂為之日惕文子聲無小而不聞行無隱而不形荀子史道髙益安勢髙益危司馬季主傳若君不修德舟中之人皆敵國也周紀毋為怨府毋為禍梯趙世家易曰狐渉水濡其尾此言始之易終之難也春申君傳大名之下難以乆居越世家無以先入之語為主西漢禍固多藏於隠微而發於人之所忽司馬相如傳動色相戒劉輔傳木勝者人亡楚作章華以凶吳興姑蘇而滅濟南安王康傳盖寛饒至許伯第曰此如傳舎所閱多矣西漢無為權首将受其咎晁錯贊無為虎傅翼将飛入邑賈誼傳注聰明䟽通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷湛静安舒者戒於後時廣心浩大者戒於遺忘匡衡傳得失一朝而榮辱千載荀恱漢書天地之心福謙禍盛李固傳日不常中月盈有虧履道者固挟勢者危東漢王逸黄石公記曰務廣地者荒務廣德者强有其有者安貪人有者殘臧宫傳李固遺書黄瓊曰觀聽望深聲名大盛通鑑吳隱之為廣州刺史地有水曰貪泉隱之語其親人曰不見可欲使心不亂晋書興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至晉紀謝朏與弟瀹别指其口曰此中惟宜飲酒齊書人笑褚先生至今齒冷無為效也南史樂預齊陳顯達曰麈尾蠅拂是王謝家物齊紀蕭允曰禍之所来皆生於利苟不求利禍從何生梁武紀欹器防滿金人戒口樂志諸葛長民曰貧賤常思富貴富貴必履危機宋書徐惠曰地廣非常安之術徐惠曰珍玩技巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒唐太宗紀陕郡進士張彖曰君輩倚楊右相如泰山吾以為氷山若皎日既出君輩得無失所恃乎唐紀飲食資身過則生患栁公綽傳夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛唐書栁玭傳壯九重於内所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂㒺念丘其糟而池其酒唐鑑目見可欲何能自窒於心已與私交何能中絶其意唐徳宗盛名之下為難居名盛則責望備唐書房琯傳劉延祐有吏能治第一李勣戒之曰子春秋少而有美名宜稍自抑無為出人上新唐書馮道曰臣嘗記昔奉使中山厯井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕後唐明宗憂先於事故能無憂事至而憂無救於事通鑑傳記行百里者半九十此言末路之難也若虎口入之則不知所出矣戰國策牆薄則亟壞繒薄則亟裂器薄則亟毁酒薄則亟酸夫薄而可以曠日持乆者殆未有也劉向新序以財事人者利盡而交踈以色事人者華落而寵衰説苑開元中道士吕翁經邯鄲止邸舎有邑少年盧生同止於邸主人方蒸黄粱共待其熟盧不覺長嘆翁問之具言生世困厄翁取囊中枕以授盧曰枕此當榮適如願生俛首但記身入枕穴中遂至其家未幾登髙第厯臺閣出入将相五十年子孫皆列顯仕榮盛無比上疏曰臣年踰八十位歴三台空負深恩永辭聖代其夕卒盧生欠伸而寤吕翁在旁黄粱尚未熟生謝曰此先生所以窒吾欲也敢不受教再拜而出陳翰異聞集淳于棼家廣陵宅南有古槐生豪飲其下因醉致疾二友扶生歸卧東廡夢二紫衣使者曰槐安國王奉邀生隨二使上車指古槐入一穴中大城朱門題曰大槐安國有一騎傳呼曰駙馬逺降引生升廣殿見一人衣素練服簪朱華冠令生拜王王曰前奉賢尊命許令女瑶芳奉事君子有仙姬數十奏樂執燭引𨗳金翠歩障玲瓏不斷至一門號修儀宫一女子號金枝公主儼若神仙交歡成禮情義日洽王曰吾南柯郡政事不理屈卿為守勅有司出金玉錦繡僕妾車馬施列廣衢餞公主行夫人戒子曰淳于郎性剛好酒為婦之道貴在柔順爾善事之累日達郡有官吏僧道音樂来迎下車省風俗察疾苦郡中大理凡二十載百姓立生祠王賜爵錫邑位居台輔生五男二女榮盛莫比公主遇疾而薨生請護䘮赴國王與夫人素服慟哭於郊備儀仗羽葆鼓吹塟主於盤龍岡生以貴戚威福日盛有人上表𤣥象謫見國有大恐都邑遷徙宗廟崩壞事在蕭牆時議以生僭侈之應王因命生曰卿可暫歸本里一見親族諸孫留此無以為念復令二使者送出一穴遂寤見家僮擁篲於庭三客濯足於榻斜日未隱西垣餘樽尚湛東牖因與二客尋古槐下穴洞然明朗可容一榻上有土壤為城郭臺殿之􅃺有蟻數羣二大蟻素翼朱首乃槐安國王又窮一穴直上南枝羣蟻亦處其中即南柯郡也又一穴盤屈若龍蛇状有小墳髙尺餘即盤龍山岡也生追想感歎遽遣掩塞是夕風雨暴發旦視其穴遂失羣蟻莫知所之國有大恐都邑遷徙此其驗矣異聞集集桀作瑶臺紂為璇室人力不堪而帝業不卒詩詠宣王由儉改奢春秋譏刺書彼泉臺兩觀雉門而魯以不振揚雄将作箴董生有云弔者在門賀者在閭言憂則恐懼敬事則有善功又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至劉向書出輿入輦命曰蹷痿之機洞房清宫命曰寒熱之媒皓齒蛾眉命曰伐性之斧甘脆肥醲命曰腐腸之藥選七發置膏烈火上哀哀自煎熬杜工部有才無義惟家之殃無愛糞土以毁五常晋書物忌堅芳人諱明潔祭屈原文炙手可熱勢絶倫慎莫近前丞相嗔江湖多風波舟楫恐失墜涼風蕭蕭吹汝急恐汝後時難獨立借問頻朝謁何如穏晝眠念君惜羽翮既飽更思戢莫作翻雲鶻聞呼向禽急淘米少汲水汲多井水渾刈葵莫放手放手傷葵根玉潤終孤立珠眀得暗藏並杜詩勢利禍之門陳子昂集處世忌太潔作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬李白集月缺花殘莫慘然花須終發月終圓竟能何事銷芳念亦有濃華委逝川一曲艶歌留婉轉九原春草妬嬋娟王孫莫學多情客自古多情損少年温飛卿竿上擲身難倚梯青㝠舉足}
