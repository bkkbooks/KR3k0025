  - {type: variant, offset: 178, length: 0, content: '', krp: 欲知治獄之士則視其曲盡情偽無所寃抑斯為善治獄矣欲知治財之士則視其倉庫盈實百姓富給斯為善治財矣欲知治兵之士則視其戰勝攻取敵人畏服斯為善治兵矣通鑑魏眀孫亮出西苑方食生梅使黄門至中藏取蜜漬梅蜜中有䑕屎召問藏吏吏叩頭亮問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄門不服侍中刁元張邠啟黄門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎裏燥亮大笑謂元邠曰若乆在蜜中中外倶濕今裏燥必黄門所為黄門首服左右莫不驚悚吳厯郄詵對䇿曰飾智於外藏邪於内邪正之人難得而知也晉書自古以来欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信晉武紀一人之身所閱者衆故能官得其才鮮有敗事宋世祖崔羣對曰無情曲直辨之至易稍懷欺詐審之實難故孔子有衆好惡之論浸潤膚受之説盖以暗昧難辨故也唐書自古及今骨肉爭離以至敗國亡家未有不因左右離間而然也通鑑上曰人主惟有一心而攻之者甚衆或以勇力或以辯口或以諂䛕或以姦詐或以嗜欲輻輳攻之各求自售以取寵禄人主少懈而受其一則危亡隨之此其所以難也唐太宗昔趙武呐呐而為晉賢臣絳侯木訥而為漢元輔人之難知堯舜所病胡可以一詞一語而謂盡其能哉以察天下之情固多失實唐德宗傳記貌同而心異貌異而心同史通集不予衾之眠信予衾之穿盧仝文嘻笑之怒甚乎裂眥長歌之哀過於慟哭栁文求忠臣於孝子求良婦於貞女食子盡節也推其忍可以疑心鉏麑違命也推其仁可以屬國劉賓客集本朝戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀至於逺方之人肝腦屠於白刃筋骨絶於饋餉流離破産鬻賣男女薫眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鼈以為膳羞食者甚美死者甚苦使陛下見其號呼於挺刃之下宛轉於刀几之間雖八珍之美必将投筯而不忍食而况用人之命以為耳目之觀乎東坡集嘿㑹經古之君子不必親相與言也以禮樂相示而已禮記子不窺牖見天道老子犁然有當於人之心荘子坐於室而見四海荀子君子不下堂而海内之情舉積此者出荀子史龎參為漢陽太守郡人任棠有竒節隠居參候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨參思之曰水者欲吾清也㧞大本薤者欲吾撃强宗抱兒當户欲吾開門恤孤也後漢書晉山濤論用兵不學孫吳而闇與之合晉阮瞻讀書不甚研求而黙識其要遇理而辨晉書暗合孫吳魏書元忠傳帝問栁公權用筆法對曰心正則筆正筆正乃可法矣時帝荒淫故公權及之帝改容悟其以筆諫也新唐書傳記坐披囊箧而神交萬古不出户庭而窮覽千載望表而知裏捫毛而辯骨史通如人飲水冷暖自知傳燈錄集不取孫吳而闇與之㑹曹植不出户而知天下兮何必厯逺以劬勞張平子思𤣥賦知言之人黙然而其意已傳韓文信箴千古同一心唐文粹孫吳暗合王維寛解史句踐之困於㑹稽喟然嘆曰吾終於此乎種曰湯繋夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由是觀之何遽不爲福乎越世家集昔顔氏之庶幾兮在隠約而能寛固哲人之細事兮夫子乃嗟嘆其賢惡飲食於陋巷兮亦足以頥神而保年有至聖以為之依歸兮又何苦不自得於艱難當今聖人求侍從㧞擢杞梓收楛菌東馬嚴徐已奮飛枚臯即召窮且忍鴟鴞啄母腦母死子始蕃蝮蛇生子時折裂腹與肝好子雖云好未還恩與勤惡子不可説鴟鴞蝮虵然有子且勿喜無子固勿嘆韓退之君不見買臣衣錦還故鄉五十身榮未為晩白侍郎集悠悠天地内不死㑹相逢白侍郎集矢楛雖未中璞全終待攻髙達夫艷色天下重西施寧乆微有才年少屈終難王維人生多少歡娛事那得千分無一分同上本朝行藏自欲追時節豈是人間不見容臨川集君猶鸞鶴偶飄墮六翮如雲豈長鎩人生不信長轗軻莫為無車馬含羞入劒闗眼前百種無不有知君一以詩驅除東坡身健何妨逺得志寧論晩陳後山和氏有尺璧楚國無人知但使玉非石果有遭逢時曠度逢知晩髙才處下難但存心裏正勿愁眼下遲天風不借便造物暫淹沮僧參寥今代貴人須白髪挂冠髙處未宜彈陳後山怨望經四方有羨我獨居憂民莫不逸我獨不敢休大夫不均我從事獨賢民莫不穀我獨於罹何辜於天我罪伊何或燕燕居息或盡瘁事國或息偃在牀或不已於行或不知呌號或慘慘劬勞或棲遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎父母生我胡俾我瘉不自我先不自我後東人之子職勞不来西人之子粲粲衣服於我乎夏屋渠渠今也每食無餘吁嗟乎不承權輿於我乎每食四簋今也每食不飽吁嗟乎不承權輿適彼樂土詩貧而無怨難語憲問寧不我顧詩子此莫非王事我獨賢勞也孟子史信而見疑忠而被謗能無怨乎史屈原傳不見用常鞅鞅怨望史記伍子胥傳叩心怨上西漢伍被傳不意君之望臣深也西漢張耳傳赦韓信封為淮陰侯信知漢王畏惡其能多稱病不朝從居常鞅鞅羞與絳灌等列嘗過樊将軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍通鑑漢髙紀黯褊心不能無少望見上言陛下用羣臣如積薪後来者居上西漢汲黯傳怨氣滿腹後漢直如絃死道邊曲如鈎反封侯李固外傳陽球曰微蔑斗筲莫不蒙被殊恩通鑑怏怏形於言色通鑑梁武楊儀自謂年官先蒋琬才能踰之於是怨憤形於聲色歎咤之音發於五内時人畏其言語不節莫敢從也對費褘恨望又語褘曰往者丞相亡殁之際吾若舉軍以就魏氏處世寧當落度如此耶令人追悔不可復及褘宻奏其言漢主廢儀為民自殺通鑑魏明紀范曄有雋才而薄情淺行數犯名教為士流所鄙性躁競自謂才用不盡常怏怏不得志通鑑宋太祖劉文静自以才略功勲在裴寂之右而位居其下意甚不平飲酒酣怨望㧞刀擊柱曰㑹當斬裴寂首李密怒曰唐使吾與絳灌同列何以堪之通鑑唐髙祖傳記羅友答桓温書曰旦出門逢一鬼大揶揄云我祗見汝送人作郡何以不見人送汝作郡世説郝隆為南蠻參軍作詩曰娵隅躍清池桓温曰何為作蠻語隆曰千里投公始得一蠻府參軍那得不作蠻語世説集悠悠蒼天兮莫我振理楚辭死節勤公爵禄不及偸榮尸禄寵秩或加陳子昂集北里富薰天髙樓夜吹笛焉知南隣客九月猶絺綌杜詩百年歌自苦未見有知音諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足霄漢瞻佳士泥塗任此身並同上絳灌更能經幾歳賈生何事又三年大造功何薄長平氣尚寃太陽偏不及非是未傾心何意同根本開花每後時應縁去日逺獨自發春遲年光不可待空羨向南枝並劉長卿但令識字者操弄刀筆權征人戰苦束刀鎗主将勲髙換羅幕時輩多得途無限公卿因戰得與君依舊緑衫行元微之集夔何罰而踸踔蚿何功而扶持相逢滿眼是淒涼並劉賓客上林多少木不得一枝棲唐李義甫若道平分四時氣南枝為底發春偏劉賓客隠隠聚若雷囋膚不知足皇天苦不平微物教食肉貧士無絳紗忍苦卧茅屋何事覔膏腴腹無太倉粟皮日休集側望卿相門難入堅如石王無功太歳只逰桃李徑春風肯管歳寒枝唐盧仝非有道德智謀承顧問贊教化者乃反得蒙採擢薦進光耀如此栁文不才眀主棄多病故人踈孟浩然奪我身上暖買爾眼前恩進入瓊林庫歳乆化為塵時傷大野麟今問長沙鵬君恩薄如紙並白侍郎清血灑不盡仰天知問誰空過流年徒生聖代並杜牧之本朝譬如溝中斷誰復强收拾欒城集范諷自給事中謫官數年歸濟南城西張氏園亭飲宴題詩曰園林再到身猶健官職全抛夢乍醒惟有南山與君眼相逢不改舊時青張師政倦逰錄怨恨史葉公之弟后臧從其母於吳不待而歸葉公終不正視獻子曰所不此報無能渉河齊侯曰余姑剪滅此而朝食范鞅遇欒樂曰死将訟女於天譬如禽獸臣食其肉而寝其皮矣齊子推子尾怒盧蒲嫳慶封告之嫳曰譬之如禽獸吾寢處之矣衛子鮮出奔晉不鄉衛國而坐魯昭公曰則不能見夫人已所能見夫人者有如河左傳袁盎素不好晁錯錯所居坐盎去盎坐錯亦去兩人未嘗同堂語史本傳趙襄子怨智伯漆其頭以為飲器史豫讓傳日夜扼腕瞋目切齒史記張儀傳勾踐曰日夜焦唇乾舌欲與吳王接踵而死史端木賜傳灌夫横潁川潁川歌曰潁水清灌氏寧潁水濁灌氏族史本傳自公卿以下至於庶人咸指湯史張湯傳王温舒誅滅淮陽人甚多及死仇家欲燒其尸史本傳互見嫌隙朱買臣見張湯坐牀上丞吏遇買臣不為禮買臣楚士深怨常欲死之史張湯傳秦父兄怨此三人痛入骨髓史記皆側目於望之等劉向傳公孫𢎞亦仄目而事固轅固傳往往指目陳勝傳晁錯父謂錯曰口語多怨公本傳齰舌自殺西漢灌夫傳李文與張湯有隙已而為御史中丞事有可以傷湯者無不為也張湯傳言必切齒漢書僕以言語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖累百世詬彌甚矣是以腸一日而九迴居則忽忽若有所亡行則不知其所往每念斯耻汗}
  - {type: variant, offset: 181, length: 0, content: '', WYG: 發背霑衣也司馬遷傳齎恨入㝠東漢馮衍傳孫秀為小吏給事岳而狡黠自喜岳惡其爲人數撻辱之秀常銜忿及趙王倫輔政秀為中書令岳於省内謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂誣岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族晉書潘岳傳張華裴頠之被誅趙王倫孫秀以㝛憾收解系兄第梁王肜救系倫怒曰我於水中見蟹且惡之况此人兄弟輕我耶此而可忍孰不可忍遂害之晉書韲之粉之屠之裂之猶未足以謝宋太祖侯景謂左右曰我固知吳老公薄心腸梁髙祖盧杞遇赦用為饒州刺史給事中袁髙應草制執以白盧翰劉從一曰百辟疾之若仇六軍思食其肉通鑑唐徳宗史𢎞肇尤惡文士常曰此屬輕人難耐每謂吾輩為卒諸葛靚歸於鄉里終身不向朝廷而坐吳謝厲曰潘大常常切齒於君但道無因耳晉李太后在建州卧病無醫藥惟與晉主仰天號泣㦸手罵杜重威李守貞曰吾死不置汝劉銖罷青州歸乆奉朝請未除官常㦸手於執政通鑑傳記永言怨耻生死莫云仰天俯地何以為生含齒戴髪何以爲見史通吳王賜子胥屬鏤之劒子胥伏劒而死吳王取子胥尸盛以鴟夷之器投之於江子胥因隨流揚波依潮往来蕩激崩岸越王賜文種屬盧之劔而死越王葬種於國之西山葬一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水候者伍子胥也後潮水候者大夫種也吳越春秋集怒目切齒酒德頌天道如何吞恨者多選鮑昭賦飲恨吞聲江文通賦仇隙經父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讐抵父師長之讐抵兄弟朋友之讎抵從父兄弟周禮父之讎弗與共戴天兄弟之讐不反兵交逰之讐不同國記史周鄭交惡左鄭息}
