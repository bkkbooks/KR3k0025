  - {type: variant, offset: 145, length: 1, content: 互, WYG: 桓温過淮泗踐北境與諸寮屬登東平乗樓眺矚中原慨然曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責晋書本傳桓温自江陵北伐行經金城見少為琅琊時所種栁皆已十圍慨然曰木猶如此人何以堪羊祜逰峴山言詠終日嘗顧從事鄒湛等曰自有宇宙便有此山由来賢達勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷晋書古稱一世三十年子厚之斥十三年殆半世也唐書傳記古人混混去不返今人紛紛来更多續仙傳集年嵗晩暮時已斜安得壮士翻日車李九曲歌所遇無故物焉得不速老古詩連連丘壑改微微市朝變局塗頓逺策畱歡恨奔箭春貌既移紅秋林豈停蒨一倍倍一作陪茂陵道寧思栢梁宴沈約長歌行變燧回星劉孝標書人生一百年歡笑惟三五庾信對酒後之視今亦猶今之視昔王羲之蘭亭記臨川感流以嘆逝登山懐古而悼逺感冬索而春敷嗟夏茂而秋落潘安仁天地無終極人命若朝露曹子建未厭青春好已睹朱明移謝靈運詩頺魄不再圎傾曦無兩旦曹子建百川東到海何時復西歸長歌行對酒當歌人生幾何譬如朝露去日苦多短歌行人夀如朝露時華不載揚陽来日苦短陽去日苦長同上故人雖故昔經新新人雖新復應故隋江詩彤庭所分帛本自寒女出鞭撻其夫家聚斂貢城闕信知生男惡反是生女好生女猶是嫁比隣生男埋没隨百草悵望千秋一灑淚蕭條異代不同時嵗暮日月疾古来白骨無人收杜詩但見好花開易落從来尤物不長生劉賔客長使英雄淚滿襟即今千種恨惟共水東流王侯與螻蟻隨盡同丘墟萬事隨轉燭乾坤萬里眼時序百年心日月不相饒節序昨夜隔杜詩仙鶴来歸遼東之城郭猶是靈烏代謝漢南之陵谷已非臨水感逝川之嘆百年三萬日一别幾千秋駱賔王吾操鏝以}
