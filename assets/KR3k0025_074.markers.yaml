  - {type: variant, offset: 167, length: 3, content: 蔡伯喈, WYG: 孔子過谷中見蘭獨茂嘆曰蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云琴操集往時張旭善草書不治他技喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於草書發之觀於物見山水崖谷鳥獸蟲魚草木之花日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世韓文垂竿不在魚賣藥不為錢劉長卿詩情聊自遣不足赴聲名姚少監感懷經魯共王壞孔子舊宅以廣其居於壁中得古文升堂聞金石絲竹之音乃不壞宅悉以書還孔氏書序子卿大夫士蹈之則可以尊君父立忠信守志勵操者儀之則可以崇髙節抗浮雲孟子序史孔文舉髙志直情足以動義槩後漢孔融傳集事有曠百世而相感者余不自知其何心韓文不因感衰節安能激壯心劉賔客櫪馬待騁夜風起而長鳴匣劒有靈秋氣来而自動吕和叔文激勵經弗率訓典殊厥井疆俾克畏慕書子聖人賞一人而天下諭之罰一人而天下畏之故至賞不費至刑不濫孔子誅少正卯而魯國之邪塞子産誅鄧析而鄭國之姦禁淮南子鮑叔為桓公祝曰使公無忘在莒時管子無忘在魯時寗戚無忘車下時尸子賞一以勸百罰一以懲衆文中子史春秋以一字為褒貶善人勸焉淫人懼焉夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越左傳子貢利口孔子常黜其辯史本傳張儀謁蘇秦秦戒門下不為通又不得去數日已而見之坐於堂下賜僕妾食曰張儀天下之賢士恐其樂小利故召辱之以激其意史記張儀傳自東園公綺里季夏黄公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗西漢王貢等傳張良㳺下邳有一父老衣褐至良所直墮其履圮下顧謂良曰孺子下取履良愕然欲毆之為其老迺强忍下取履因跪進父以足受之笑去曰孺子可教矣後五日平明與我期此良曰諾五日良往父已先在怒曰與老人期後何也去後五日蚤㑹後五日良半夜往有頃父亦至喜曰當如是出一編書曰讀是則為王者師西漢張良傳激清流揚微波蜚英聲騰茂實司馬相如傳爵禄者天下之砥石所以礪世磨鈍也前漢梅福傳馬援與隗囂將楊廣書曰今者歸老更欲低頭與小兒曹共槽櫪而食乎東漢周顗奔琅琊王睿諸名士登新亭相視流涕王導曰當戮力王室克復神州何至作楚囚對泣耶晉紀謝晦為宣州刺史頗有矜色將之鎮詣叔光禄澹澹問晦年曰三十五澹笑曰昔荀中郎年二十己為此府都督卿比之為老矣晦有愧色宋書立懦夫之志息貪競之風北史隠逸楊愔㓜時為季父暐大嗟異顧謂賓客曰此兒恬裕有我家風宅内有茂竹遂為愔於林邊别葺一室命獨處其中常銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彦慎謹自得竹林别室銅盤重肉之食後魏書激清風於萬古厲薄俗於當年唐書魏諸牧守共謁丞相泰泰命河北太守裴侠别立謂牧守曰裴侠清謹奉公}
