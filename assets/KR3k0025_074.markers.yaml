  - {type: variant, offset: 155, length: 0, content: '', WYG: 堪事其勵志勤力皆此類也晉書劉詞以功遷團練使常被甲枕戈而卧曰我以此取富貴豈可一日輒忘之且人情易習若一墮其筋力有事何以報國乎五代史集言未足以動聽故必激發以取異行未足以應逺故必砥礪以沽名劉賓客松柏不幸出於岩穴之内脞脆者則䃘然其牙伏死其下矣何自奮之能為是松柏也雖稚氣初折而正性不辱及其壮也力與石鬭乗陽之威悲已之軋㧞而将升卒不勝其壓擁勇鬱遏岔憤激訐然後大醜彰於形質天下指之為怪木吁豈異人乎哉夫賦才之盛者蚤不得用於世則伏而不舒薰蒸沈酣日進其道權擠勢奪卒不勝其阨號呼呶拏發越訴然後大竒發於文采天下指之為怪民陸龜蒙怪松圗不鼓踴無以起泥塗栁文本朝敢不磨礪淬濯已衰之心紬繹温尋已廢之學臨川發憤經率德改行蔡仲之命子晉公子重耳霸心生於曹越王句踐霸心生於㑹稽齊桓公小白霸心生於莒荀子宥坐蘇秦若有}
