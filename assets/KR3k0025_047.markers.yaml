  - {type: variant, offset: 286, length: 4, content: 元德秀質, WYG: 王伾以納賄為事作大匱貯金帛夫婦寝其上通鑑互見貪迷平章事豆盧革百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給唐明宗桑維翰權勢既盛四方賂遺嵗積鉅萬五代史西京留守同平章事王守恩性貪鄙專事聚斂喪車非輸錢不得出城下至抒厠行丐之人不免課率或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返通鑑後漢隠帝集谿壑為之一罄川瀆為之中貧左太沖吳都賦交醻貨賂選孫皓書貪黷微財敢犯朝憲富已潤屋陳子昂集槖奸瀆貨司空表聖文儉約經節以制度不傷財不害民易慎乃儉徳書儉徳之恭也禮唐俗勤儉詩序史御孫曰儉徳之共也左荘二十四鄭叔段賦蟀蟋趙孟曰保家之主也襄公二十七年季文子無衣帛之妾無食粟之馬無藏金玉無重器備相三君矣而無私積襄公五年衣不兼采食不重味西漢朱家傳朱博不好酒色游宴自㣲賤至富貴食不重味本傳朕為天下守財豈得妄用之哉通鑑漢殤帝紀魏髙允兄弟惟草屋數間而被緼袍厨中鹽菜而已宋世祖長孫道生性清儉一熊皮鄣泥數十年不易宋太祖庾杲之清貧食惟有韮薤生韭雜菜任昉戯之曰誰為庾郎貧食常有二十七種言三九也齊書昔楊震趙咨等咸以薄塟知真識去身貴速朽耳夫}
