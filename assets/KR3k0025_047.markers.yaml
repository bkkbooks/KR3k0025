  - {type: variant, offset: 3, length: 0, content: '', WYG: 愛惡相攻易人莫知其子之惡大學互入昩於知子各親其親各子其子貨力為已以功為已禮記愛之欲其生惡之欲其死論語子兩喜必多溢美之言兩怒必多溢惡之言荘子伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多韓子鬻棺者欲民之疾病也畜粟者欲嵗之荒饑也淮南子人各是其所是非其所非揚子史同罪異罰左僖二十八年何必瘠魯以肥把襄公二十九年論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也司馬遷贊張湯居二千石所愛者撓法活之所憎者曲法滅之漢書託公報私杜欽傳所欲活則傅生議所欲陷則予死比通鑑漢宣紀所好則鑽皮出其毛羽所惡則洗垢求其瘢痕東漢趙壹傳或問倫有私乎對曰昔人有與千里馬者吾雖不受每三公有所選舉心亦不能忘而亦終不用吾兄子病一夜十往返而安寝吾子有疾雖不省視而竟夕不眠若是豈可謂無私乎第五倫傳互見無隠昔留侯以為髙祖悉用蕭曺故人郭汲亦議南陽多顯二十八將傳論陳夀父為馬謖參軍謖為諸葛亮所誅夀父亦坐髠諸葛瞻又輕夀夀為亮立傳云將畧非長無應敵之才言瞻惟工書名過其實議者以此少之晉書陳夀傳庾亮出居外鎮而執朝廷之權王導内不能平常遇西風塵起舉扇自蔽徐曰元規塵汙人王導傳宋元嘉時江東王謝諸族方盛北人晩度者朝廷悉以傖荒遇之雖復人才可施皆不得踐清塗通鑑宋紀崔浩曰文士褒貶多過其實南史宋髙祖紀毁譽由己憎惡任情北史李徳裕節制劎南西川吐蕃將悉怛謀以城降徳裕既得之即發兵以守且陳出師之利牛僧孺居中沮其功命返於虜徳裕終身以為恨唐書李徳裕傳又牛僧孺傳云羣臣請如李徳裕䇿又云時皆謂僧孺横議王洪義為侍御史於鄉里求𤓰𤓰主拒之洪義状言𤓰園有白兔縣官捕逐園苗盡矣唐酷吏傳不知仁義不分枉直惟利是嗜得賂則譽盜跖為賢良咈意則毁龔黄為貪暴能用傾巧之智搆成疑似之端通鑑唐憲宗武三思曰但於我善者則為善人於我惡者則為惡人耳唐書積忤生憎積順生愛唐睿宗紀情有愛憎憎者惟見其惡愛者止見其善唐魏徵傳李振舉進士不中深疾縉紳之士言於全忠曰此輩嘗自謂清流宜投之黄河永為濁流唐昭宗紀王福畤有子勔劇皆著才名福畤嘗詫韓思彦戯曰君有譽兒癖唐書孔循罵曰天下事一則任圜二則任圜圜乃何人五代史任圜傳傳記談經者惡聞服杜之嗤論史者憎言班馬之失史通劉禹錫謁李徳裕曰曽得白居易文集否徳裕曰吾於此人不足久矣其章何必覽焉北夢瑣言傅毅之於班固伯仲之間耳而固小之典論集人之情莫不欲耀其所能而黨其所近苟将得志則必快其所藴微之集曲木忌日影孟東野本朝小篆之法自秦李斯斯之相秦焚棄典籍遂欲滅先王之法而至已之所作則為萬世不可朽之計何其愚哉歐公集怒移水中蟹愛及屋上烏東坡私於家者隔牆樊而分比鄰私於己者隔形骸而分爾汝諸儒鳴道集廉潔子焉有}
