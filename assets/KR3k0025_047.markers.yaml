  - {type: variant, offset: 1392, length: 2, content: 賈耽, WYG: 傳記楊國忠子弟上元夜各有千炬燭圍天寶遺事李徳裕奢侈每食一杯羮其費約錢三萬雜珠玉寶貝朱砂煎汁為之過三煎即棄其滓獨異志元載造芸輝堂芸草香也白如玉入土不朽為屑以塗壁設紫綃帳凝冬風不入盛夏自清涼唐蘇鶚蘇氏演義韓嫣好彈以金為丸一日所失者十餘}
