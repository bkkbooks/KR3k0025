  - {type: variant, offset: 1549, length: 0, content: '', WYG: 為負剛腸譽還追強項名張說諫舌切切上磨帝缺孫樵苦隳肝膽而言天下之事元微之忤英主之龍鱗蹈姦臣之虎尾唐張說宋璟遺愛碑本朝魯宗道為參政以忠鯁自任時人謂曰魚頭公盖以骨鯁目之聖宋掇遺諂諛經巧言令色便僻側媚書籧篨嘗觀人顔色而為之辭故不能俯戚施下人以色故不能仰也詩新臺注巧言令色鮮矣仁論語籧篨口柔也夸毗體柔也爾雅子脅肩諂笑病于夏畦閹然媚於世者是鄉原也孟子秦王有病召醫䑛痔者得車五乗希意導言謂之諂荘子不度理之所在而阿諛求容諂莫甚焉孔叢子以不善先人者謂之諂以不善和人者謂之諛荀子史楚析父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲左昭十二陳勝起山東二世召諸生問叔孫通曰此特羣盗狗偷䑕竊耳何足置之齒牙間郡守尉今捕論何足憂史本傳卑疪而前纎趨而言日者傳非有材能徒以婉佞貴幸佞幸傳衞侯言計非是而羣臣和者如出一口夫不察事之是非而恱人讚已闇莫甚焉不度理之所在而阿諛求容諂莫甚焉通鑑周紀}
