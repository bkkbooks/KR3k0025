  - {type: variant, offset: 2175, length: 200, content: 涉之脛剖賢人之心書泰誓中子盜跖膾人肝而餔之莊子逮至夏桀殷紂燔生人辜諫者為炮烙鑄金柱剖賢人之心折才士之脛醢鬼侯之女俎梅伯之骸淮南子淑真訓篇紂觀炮烙於瑤臺謂龍逢曰樂乎莊子史蠭目而豺聲忍人也左文莒子庚輿虐而好劍苟鑄劍必試諸人左傳紂醢九候剖比干心史記本紀呂太后斷戚夫人手足去眼煇耳飲瘖藥使居廁中命曰人彘史記呂后紀吳起事齊魯人攻魯魯欲將吳起起取齊女起欲就名遂殺其妻以明不與齊也魯卒以為將魯人或惡起起殺其謗己者三, WYG: 堂前親衞校尉髙徳孺等}
