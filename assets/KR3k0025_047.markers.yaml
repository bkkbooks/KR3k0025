  - {type: variant, offset: 1403, length: 0, content: '', WYG: 席坐及坐郎署袁盎引却慎夫人坐曰陛下所以為慎夫人適所以禍之也通鑑漢紀忠臣不避重誅而直諫西漢主父偃傳忠臣蒙死而竭知宣帝紀獨有極言待死五行志忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何耶君臣義重有不得已也後漢何敞傅漢成帝欲御樓船薛廣徳諫言宜從橋陛下不聽臣臣自刎以血汚車輪本傳槐里令朱雲}
