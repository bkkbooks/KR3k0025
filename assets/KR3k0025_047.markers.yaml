  - {type: variant, offset: 1410, length: 2, content: 矯飾, WYG: 在弼弼入侍坐良久不獲陳聞忽起捽樹頭掣下牀搏其背曰朝廷不治實爾之罪通鑑宋太祖上以舞胡安叱奴為散騎侍郎禮部尚書李綱諫曰古者樂工不與士齒雖賢如子野師襄皆終身繼世不易其業唯齊末封曺妙達為王安馬駒為開府有國家者以為殷鑒唐髙祖魏徵容貌不逾中人而有膽畧善回人主意每犯顔苦諫或逢上怒甚徵神色不移上亦為之霽威唐太宗褚遂良曰陛下必欲易皇后伏請妙擇天下令族何必欲武氏武氏經事先帝衆所共知天下耳目安可蔽也唐髙宗魏帝謂羣臣曰如髙允者乃真忠臣也朕有過未}
