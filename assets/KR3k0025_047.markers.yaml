  - {type: variant, offset: 1404, length: 3, content: 朱渥性, WYG: 書曰臣願賜尚方斬馬劎斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣廷辱師傅罪死不赦御史將雲下雲攀殿檻折呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去左将軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死争慶忌叩頭流血上意解然後得已}
