  - {type: variant, offset: 2965, length: 139, content: 宋康王為無頤之冠戰國策樂羊為魏文侯將而攻中山其子在中山中山繫其子示樂羊攻愈急中山烹其子而遺之羹樂羊啜之盡一盃中山見其誠也不忍與之戰果下之文侯賞其功而疑其心說苑亦見戰國策石虎裝飾宮人美叔者斬其首洗血置盤上傳首視之又內諸比丘有姿色者與其褻後殺之合牛羊肉煮而食亦賜左右所以識其味也崔鴻, WYG: 纂淵海卷四}
