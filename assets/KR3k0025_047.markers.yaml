  - {type: variant, offset: 896, length: 492, content: 能出口西漢張釋之傳互入重厚多所平反罪人西漢劉德傳蘇林曰幡罪人辭使從輕也曹參為相擇木訥於文辭重厚者召之為吏吏之言文刻深欲務聲名者輒斥去之前漢張歐為御史未嘗言按人官屬以為長者西漢本傳馬援曰聞人過失如聞父母之名耳可得聞口不得言也同上詔問劉昆曰前在江陵反風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝嘆曰此乃長者之言也東漢劉昆傳厚性寬中東漢卓茂傳劉寬為太尉嘗坐客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產寬須臾遣人視奴疑必自殺顧左右此人也罵畜產辱孰甚焉故吾懼其死也後漢忠孝之人持心近厚東漢韋虎傳阮籍口不臧否人物晉書本傳羅仇曰寧使人負我我不忍負人也通監晉紀什翼犍性寬厚郎中令許謙盜絹二疋什翼犍知而匿之謂左長史燕鳳曰吾不忍視謙之面卿慎勿泄若謙慚而自殺是吾以財殺士也通監晉侮西公紀謝方明為丹陽尹方明善治郡所至有能名承代前人不易其政必當改者則以漸移變使無跡可尋通監晉恭紀互入交代樂廣凡論人必先稱其所長則所短不言自見通監晉惠紀有老嫗欲詣劉仁軌陳牒誤詣戴至德覽之未終嫗曰本謂是解事僕射乃不解事僕射耶歸我牒至德笑而授之時人稱其長者通監高宗寧人負我我無負人通監唐德宗互見自責房元齡不以己長望人, WYG: 下筯}
