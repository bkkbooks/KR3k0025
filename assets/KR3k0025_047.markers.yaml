  - {type: variant, offset: 2378, length: 3, content: 出衛門, WYG: 見之奏以為鸞通鑑隋紀如脂如韋俯僂匍匐噉惡求媚䑛痔自親美言諂笑助其愉樂詐泣佞哀恤其喪紀盧思勞生論張昌宗以姿媚倖武后楊再思每曰人言六郎似蓮花非也正謂蓮花似六郎耳唐書楊再思傳唐明皇将幸東都而太廟屋壊姚崇曰此苻堅故殿也山有朽壤而崩木蠧而折理無足怪本傳太史令袁充表稱隋興以後晝日漸長景短日長振古希有是後百工作役並皆程課日長故也通鑑互觀顔面多不盡公唐太宗太常博士蕭楚材等以為豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕唐髙宗太子洗馬劉訥言嘗撰俳諧集以獻太子賢上謂侍臣曰朕嘗虛心求諫而竟無諫者何也李勣對曰陛下所為盡善羣臣無得而諫御醫沈髙璆得幸於太后懐義心愠是夕密燒天堂延及明堂劉承慶請輟朝停酺以答天譴太后将從之姚璹曰昔成周宣榭卜代愈隆漢武建章盛徳彌永唐武后楊再思為御史專以諂媚取容張同休戯再思曰楊内史面似髙麗再思欣然即翦紙帖巾反披紫袍為髙麗舞舉坐大笑宫中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下唐中宗薛謙光獻武后所製豫州鼎銘其末云上𤣥降鑒方建隆基以為上受命之符姚崇表賀請宣示史官頒示中外李適之性疎率李林甫常謂適之曰華山有金礦採之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先}
