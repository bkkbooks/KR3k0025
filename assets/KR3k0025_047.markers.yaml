  - {type: variant, offset: 3105, length: 184, content: 六國春秋集雄虺九首吞人以益其心楚辭虎豹九關啄害下人文選招鬼血人于牙不肯吐口韓文元和詩經既破我斧又缺我斨詩破斧人而不仁疾之已甚亂也語子段干木踰垣而辟之泄柳閉門而不內是皆已甚孟子互見沽名史不為末減左昭十四年趙廣漢疑丞相夫人殺侍婢乃將吏卒入丞相府召夫人跪庭下受辭收奴婢十餘人通監漢宣紀以苛為察以刻為明前漢宣紀黨人皆歸田里書名三府禁錮終身通監漢靈紀蹊田之牛奪之已甚後漢皇后紀論, WYG: 七}
