  - {type: variant, offset: 2479, length: 216, content: 不殺則慘然不樂通監宋紀夏王勃勃以叱干阿利領將作大匠阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之射甲不入則斬弓人入則斬甲匠通監晉安紀賈妃性酷虐嘗手殺數人或以戟擲孕妾子隨刃墮地晉書本傳符生錘鉗鋸鑿可以害人之具備置左右即位未幾后妃公卿已下至于僕隸凡殺五百餘人截脛拉脅鋸項刳胎者比比有之通監晉哀紀自去春以來潼關之西至于長安虎狼為暴凡殺七百餘人秦群臣奏請禳災符生曰野獸飢則食人飽當自止何禳之有且天豈不愛民而正以犯罪者多故助朕殺之耳晉哀齊定州, WYG: 進}
