  - {type: variant, offset: 1583, length: 343, content: 快恩讎矜名譽為可薄歐公集微小難忽經惟公懋德克勤小物書畢命在上位不陵下記中庸子夏曰雖小道必有可觀者焉語子張子范氏門徒路逢乞兒馬醫弗敢辱也必下車而揖之列子史臧文仲曰國無小不可易也君其無謂邾小蠭蠆有毒左傳詩曰雖有絲麻無棄菅蒯左成九逸詩薳啟疆曰恥匹夫不可以無備左昭公二年君子能勤小物故無大患通監周紀蚋蟻蜂蠆皆能害人同上田琳曰諺稱掩目捕雀夫微物尚不可欺以得志況大事乎通監漢獻紀蒭蕘有可錄之事晉書黃犬之皮終補狐裘也晉書慕谷超傳郄超曰謝玄使才雖履屣間亦得其任晉書謝玄傳互入精明傳記蒭蕘之言明王必擇葑菲之體詩人所記史通雞肋是棄能無惜乎同上敵固無小蜂蠆有毒鳥窮則啄獸窮猶觸者皆自衛其生命而求免於禍難也李衛公兵法集不棄菅蒯愛同絲麻任彥昇表經析言破律巧賣法令記王史公曰言多忌克忌則多怨又焉能克左僖九年陗直刻深, WYG: 聞}
