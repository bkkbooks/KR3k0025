  - {type: variant, offset: 273, length: 1, content: 漢, WYG: 郡太守載米之郡不受俸禄惟飲吳水而已晉書清節為百城表南史樂法才甄彬常以一束苧向長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受曰五月披羊裘而負薪豈拾遺金者南史陳紀本傳别駕在官水火不與百姓交北史趙軌傳蘇瓊為清河太守郡人趙穎五月中得新𤓰一雙自来奉告請遂為留乃致於㕔事梁上人聞受趙穎𤓰欲貢新果聞𤓰猶在相顧而去本}
