  - {type: variant, offset: 276, length: 6, content: 栖筠莊重寡言, WYG: 勉為嶺南節度使居官久未嘗抆飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼盧奐宋璟李朝隠唐書裴寛義不以苞苴汙家有人以鹿為餉寛瘞之本傳杜暹為婺州參軍秩滿歸吏以紙贐之暹為受百番本傳盧懐慎薨家無餘蓄惟一老蒼頭請自鬻以辦喪事唐書盧本傳栁玭為嶺南節度副使廨中橘熟既食乃納直於官蕭倣為嶺南節度使家人病取槁梅於厨以和劑倣知趣市還之歴官有素絲之節居家無疋帛之餘並唐書傳記延陵季子適齊見路有遺金有披裘而薪者季子呼薪者取彼地金薪者曰吾當夏五月披裘而薪豈取金者哉吴越春秋胡威父質為荆州威自京都省之告歸臨辭賜其絹一疋為道路糧威曰大人清髙不審於何得此絹質曰是吾俸之餘故以與汝耳晉陽秋周鎮罷臨川丞相王導曰胡威之清何以過此世說厲飲冰之節白氏六帖亷者不受嗟来之食列女傳居家終始亷白祇入俸錢者雖歴大官亦無厚蓄以傳李翺作盧坦傳集食不媮而為飽兮衣不茍而為温楚辭互見端介清如玉壺氷鮑明逺詩千尋見底清李白集徹底心清水共虛江水秋正深清見萬丈底元稹公之北歸不載南物奴婢之籍不増一人韓文憂民亦似清吟苦守節還如未達貧方雄飛詩脂膏莫潤圭玉無瑕李義山文外示貞潔内含澄徹無染塵能保其素不納汙能全其潔比玉而白不為蠅㸃比月而明不為蟾缺劉長卿欲知清與潔明月在澄灣波澄水更清劉义氷壺照人鯁介絶倫唐文粹清越而瑕不自揜潔白而物莫能汙劉賓客脂膏有戒氷蘗自規李義山清能律貪夫白集本朝官清馬骨髙歐公詩話王質所至有氷蘗聲王質墓誌官清貧似舊欒城隋趙軌為齊州别駕文帝令入朝父老將送者各揮涕曰公清如水請酌一杯水奉餞續世說冦莱公歴富貴四十年無田宅園邸魏野獻詩曰有官居鼎鼐無地起樓臺湘山野録貪汙經具乃貝玉惟貨其吉書子非其有而取之者盜也孟子侵人自用謂之貪荘子貪者常憂不足文中子貪者難為恵譙子清訓互見無厭史臧哀伯曰官之失徳寵賂章也郜鼎在廟章孰甚焉左成二年羊舌鮒瀆貨無厭昭十三陳轅頗為司徒賦封曰以嫁公女有餘以為已大器哀十一汝專利而不厭互見無厭並左必以賄死國語趙良曰非其位而居之曰貪位非其名而有之曰貪名史商鞅傳貪如狼西漢項籍傳大臣有不亷曰簠簋不飭賈誼傳貪饕不閑義理禮樂志素無亷聲息夫躬傳貪夫徇財賈誼傳陳湯素貪所鹵獲財物入塞多不法通鑑漢元帝紀韋貽範為相多受人賂許以官既而以母憂罷去日為債家所譟唐書昭宗紀諸将多斷盜牢稟私自潤入皆以珍寶貨賂左右漢殤帝紀十囊五囊入棗郎晉愍帝紀陳夀作魏書或云丁儀丁廙有盛名於魏夀謂其子可覔千斛米當為尊公作佳傳丁不與之竟不為立傳本傳庾炳之無文學性彊急輕淺既居選部好詬詈賓客且多納貨賂見人有燭盤佳驢無不乞丐本傳鄧琬性鄙闇貪吝既執大權父子賣官鬻爵使婢僕出市道販賣宋太祖魏右衛將軍元暉與侍中盧昶皆有寵於魏主而貪縱時人謂之餓虎将軍飢鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千疋次郡下郡遞減其半餘官皆有等差選者謂之市曺梁武紀元修義為吏部尚書惟事貨賄官之大小皆有定價呼為京師白刧後魏書魏收納爾朱榮之子金減其惡而増其善北史宇文述貪鄙知人有珍異之物必求取之富商大賈皆恩接之呼之為兒隋書盧坦曰其能積財者必剥下以致如其子孫善守是天富不道之人也不若恣其不道以歸於人新}
