body:
  text: 不畏強禦經維仲山甫不畏強禦詩蒸民史當官而行何強之有左文十申屠嘉為丞相太中大夫鄧通方隆幸愛貴居上旁有怠慢之禮嘉為檄召通詣府不來且斬通通詣府嘉責通曰吏今行斬通通頓首首盡出血不解史申屠嘉傳石奢堅直廉正無所阿避史記本傳刻轢宗室侵辱功臣史酷吏傳趙奢為田部吏收租稅平原君不肯出奢以法治之殺平原君用事者九人史趙奢傳搏擊豪強西漢翟方進傳專厲強壯蜂氣見事風生無所回避西漢趙廣漢傳剌譏不憚將相誅惡不避豪強西漢王尊傳鋤耘豪強同上郅都為濟南守先誅澗氏三百家豪猾餘皆股栗前漢本傳鮑永為司隸校尉鮑恢為都官從事抗直不避強禦東漢本傳李膺為司隸校尉時張讓弟朔貪殘無道懼罪逃匿兄讓舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄殺之東漢本傳董宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家主出行而以奴驂乘宣叱奴下車殺之東漢本傳張綱奏大將梁冀曰以芻蕘之資居阿衡之任不能敷揚五教翼贊日月而專為封豕長蛇肆其貪叨上天不赦大辟宜加書奏京師震恐後漢元日朝賀梁冀威儀不整侍御史陳翱請收罪後漢司隸王尊劾奏丞相衡御史大夫談知石顯等顓擅權藝大作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國通鑑漢成紀蕭咸私謂王閎曰董公為大司馬册文允執其中此乃堯禪舜之文非三公故事長老見者莫不心懼通鑑漢成紀光武謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也通鑑漢光武紀竇景擅發邊兵驚惑吏民二千石不待符信而輒承景檄當伏顯誅又奏司隸校尉河南尹附阿貴戚不舉劾請免官按罪通鑑漢和紀群臣朝賀大將軍梁冀帶劍入省尚書蜀郡張陵呵叱令出敕羽林虎賁奪劍冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歲俸贖百僚肅然河南尹不疑嘗舉陵孝廉乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序不疑有愧色通鑑漢質紀吳樹為宛令之官辭梁冀冀賓客布在縣界以請托樹樹曰小人姦蠹比屋可誅明將軍處上將位宜崇賢善以補朝闕自侍坐以來未聞稱一長者而多託非人誠非敢聞冀默然不悅樹到縣遂誅殺冀客為人害者數十人通鑑漢桓紀下邳周紆為洛陽令下車先問大姓主名吏數閭里豪強以對紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風旨爭以激切為事貴戚局蹐京師肅清通鑑漢章帝紀互入示人以意深識大體韋澳為京兆尹鄭光莊吏恣為閭里患積年租稅不入澳執而械之通鑑唐元宗紀蘇良嗣遇僧懷義偃蹇不為禮良嗣大怒命左右捽曳批其頰數十懷義訴於太后太后曰阿師當於北門出入南牙宰相所往來勿犯也通鑑唐武后武三思嘗以事屬宋璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政獨不見産祿之事乎通鑑唐中宗紀太平公主與僧寺爭碾磑雍州司戶李元紘判歸僧寺剌史竇從一大懼亟命元紘改判元紘大署判後曰南山可移此判無動從一不能奪同上宋璟為吏部尚書李乂盧從願為侍郎皆不畏強禦請謁路絶通鑑唐玄宗紀柳渾雖為韓滉所薦正色讓之曰老相公以褊察為相不滿歲而罷今公又甚焉滉愧為之大霽威嚴通鑑唐德宗紀李義府恃寵逼殺大理丞中丞王義方對仗叱義府令下三叱義府趍出唐書裴諝為金吾時禁屠郭子儀隸人殺羊諝列奏狀上以為不畏強禦同上傳記趙琰為青州剌史廳置小甕得貴要之書投於其中華陽國志四達埋輪震霜威於權石駱賓王臺閣以之生風豪貴由之斂手陳子昂傳摧宿豪如剃草視大權如歷塊唐王維文剛不避強陳子昂集經柔則茹之剛則吐之詩史王溫舒為人讇有勢者即無勢者視之如奴有勢家雖有姦如山弗犯無勢者貴戚必侵辱史酷吏楊僕傳違強陵弱非勇也左定四年子産曰火烈民望而畏之水懦弱民狎而玩之左昭十年法禁屈撓於藝族恩澤不逮於單門東漢趙一傳王尊為京兆尹拊循貧弱鉏耘豪強漢本傳嚴延年為河南守其治務在摧強扶弱貧弱雖陷法曲文以出之其豪傑侵小民者以文內之前漢張湯為廷尉所治即豪強舞文巧詆即下戶羸弱時口言雖文致法上裁察前漢本傳師古曰下戶湯欲佐助雖具文奏之而又口奏之得湯言往往釋其人集貴者雖自貴視之若埃塵賤者雖自賤言之若千鈞左太沖詠史詩經彼君子兮不素餐兮詩伐檀或盡瘁事國或王事鞅掌詩北山職思其憂唐風各司其局記曲禮四郊多壘此卿大夫之辱也記曲禮上君子曰謀人之軍師敗則死之謀人之邦邑危則亡之記檀弓上子食人之祿必憂其事家語孔子為魯司寇攝行相事七日而誅亂政大夫少正卯于兩觀之下同上今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死歟孟公孫丑下抱關擊柝者皆有常職孟萬章下孔子嘗為委吏矣曰會計當而巳矣嘗為乘田矣曰牛羊茁壯長而已矣同上史欒書曰不可以當吾世而失諸侯左傳季子曰食焉不避其難左哀十六年粗舉僚職西漢敘傳粗與粗同李廣當斬贖為庶人與故穎陰侯屏居藍田南山射獵嘗夜從一騎出從人田間飲食還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下西漢郅惲為上東城門候帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃回從東中門入後漢書互見有守羊祜在軍嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國之安危也胤今日死此門乃開耳晉書本傳劉行本性剛烈周武時為掌朝大夫典筆硯承御大夫取以進及行本將進承御欲取之行本抗聲謂承御曰筆不可得帝驚問之曰臣既不佩承御刀承御亦焉得取臣筆隋書互見有守元齡以度支係天下利害嘗有闕求其人未得乃自領之通鑑唐太宗紀傳玄每有奏劾或值日暮捧白簡整簪竦踊不寢坐而待旦由是貴遊震懾臺閣生風通鑑西晉世祖徐有功為侍御史有功伏地流涕固辭曰臣聞鹿走山林而命懸庖廚勢使之然也陛下以臣為法官臣不敢枉陛下法必死是官矣太后固授之遠近聞者相賀通鑑唐武后太后出梨花一枝以示宰相皆以為瑞杜景儉獨曰今草木黃落而此更發榮陰陽不時咎在臣等通鑑唐武后給事中李藩在門下制敕有不可即於黃紙後批之吏請更連素紙藩曰如此乃狀也何云批敕通鑑唐憲宗紀武三思求為太子狄仁傑每從容言於太后太后曰此朕家事卿勿預知仁傑曰何者不為陛下家事臣備位宰相豈得不預知乎通鑑柳公綽為京兆尹公綽初赴府有神策小將躍馬橫衝前導公綽駐馬杖殺之明日入對延英上色甚怒詰其專殺之狀對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於街衢金吾街使當奏在坊內左右巡使當奏上無以罪之退謂左右曰汝曹須作意此人朕亦畏之通鑑唐憲宗紀韋思謙曰丈夫當敢言地須明目張膽以報天子焉得録録保妻子耶唐書本傳假志元與宇文士及勒兵衛章武門太宗夜遣使至二將軍所士及披戶內使志元拒曰軍門不夜開使者示手詔志元曰夜不能辨不納比曉帝嘆曰真將軍也周亞夫何以加唐書互入有守韋思謙曰耳目官固當特立雕鶚鷹鸇豈衆禽之偶唐書本傳韋思謙擢監察御史嘗曰御史出使不能動搖山嶽震懾州縣為不任職同上集城尉不弛柝選西京賦豸角當觸邪白侍郎大廈如傾要梁棟杜詩戮力效鷹鸇同上本朝視其卼臲者而安植之求其蒙茸者而疏理之坡集史子産使都鄙有章上下有服田有封洫廬并有伍大人之之忠儉者從而與之泰侈者因而斃之左襄三十子産為政豐卷將祭請田焉弗許曰唯君用鮮衆給而已同上鄭子産作丘賦國人謗之子寬以告子産曰苟利社稷死生以之民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣左昭四年上曰近廣京城於存歿擾動誠多怨謗之語朕自當之它日終為人利通鑑五代周世宗本朝王曾為相常曰恩若己出怨當誰歸魏公別録杜衍字世昌慶曆四年拜相力止內降之敕時有權要干請者上曰朕內降不難然宰相衍公正介執必不出敕或有不得巳而降旨衍皆收之俟及十數即封還之上嘗曰衍助我多矣名臣傳歐陽修尹京寵貴犯禁令必置於法雖詔命有所不從言行録經鼎折足覆公餗言不勝其任也易繫辭九載績用弗成書堯典子匠人斫而小之則王怒以為不勝其任矣孟子史墮弱不任職西漢息夫躬傳屋大柱小可為寒心西漢李尋傳集其不勝任者怒而退之亦莫敢慍焉柳梓人傳經尸厥官罔聞知書嗣征不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有懸貆兮詩伐擅無功而受祿同上處其位而不履其事記表記子齊宣王好竽必三百人齊吹南郭先生不知竽者而濫於三百人之中以吹食祿韓子互見備員主民玩歲而愒日左昭元年愒苦蓋反玩又作玩皆貪也丞相取充位西漢張湯傳師古曰但充其位而已無所造設也曠職尸官西漢許后傳持祿保位西漢匡衡等贊互見苟容門拱默尸素西漢鮑宣傳尸位素餐西漢朱雲傳齪齪廉謹備員而已西漢曠貴最久西漢史傳曠官聞曠貴陳平笑曰君居其位不知其任耶通鑑漢高后馬胤孫為中書侍郎時人目為三不開謂口印門也通鑑五代晉高祖互入緘默盧懷慎與姚崇同為相自以才不及崇每事推之時人謂之伴食宰相通鑑唐元宗紀源乾曜拜左丞相李元紘杜暹知政事乾曜遂無所參議但唯諾署名而已元宗實録傳記徒殫太官之膳虛索長安之米史通集空食疲廊肆選詩濫吹垂名實選雜體詩食焉而怠其事必有天殃韓文月費俸錢歲糜廩粟子不知耕婦不知織乘馬從徒安坐而食韓文進學解家請官供不報答無異鼠雀偷太倉韓文素餐無補益朱綬虛纏繞白集受若直怠若事柳文經一乃心力其克有勳書大禹謨豈敢定居一月三捷詩采薇樂事勸功記王制子北面委質無有二心朝廷不辭賤軍旅不辭難韓子興天下之大利除天下之大害荀子史公家之利知無不為左傳自詭效功西漢京房傳擢臣巖穴誠冀有益毫毛豈徒使臣美食大官重高明之地哉西漢鮑宣傳邊境時有風塵之警臣宜被堅執鋭當矢石啓前行東漢終軍傳鄧禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳通鑑漢平紀范滂為清詔使登車攬轡慨然有澄清天下之志後漢本傳王莽敗赤眉賊衆至鄧禹引師退衆憚為後拒禹乃書諸將名於竹簡題其前後亂著器中令各探之張宗獨不肯探曰死生有命張宗豈辭難就易乎後漢祖逖劉琨並有英氣每語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原本傳陶儼見諸參佐或以談戲廢事乃取其樗蒲博具以投于江晉本傳陶侃荊州剌史終日斂膝危坐軍府衆事檢攝無遺未嘗少間嘗語人曰大禹聖人乃惜寸陰至於衆人當惜分陰豈可但逸遊荒醉生無益於時死無聞於後是自棄也通監晉成帝紀隋大將軍麥鐵杖謂人曰丈夫性命自有所在豈能然艾炙頞瓜蒂噴鼻治黃不差而臥死兒女手中乎乃自請為前鋒通鑑隋煬帝紀骨肉皆天子所賜得效筋力豈敢有辭同上韓滉曰今兩河無虞河湟二十餘州可復也其資糧之費臣請主辦通鑑唐德宗紀右僕射李靖以疾遜位疾小瘳每三兩日至門下中書平章政事詔大舉討吐谷渾上欲得李靖為將為其老重勞之靖聞之請行上大悅通鑑唐太宗紀錢鏐自少在軍中夜未嘗寐倦極則就圓木小枕或枕大鈴寐熟輒欹而寤名曰警枕置粉盤于臥內有所記則書於盤中比老不倦或寐方酣外有白事者令侍女振紙即寤時彈銅丸于樓墻之外以警直更者通鑑後梁均王集山甫勤於夙夜吳漢不離公門選博奕論爭先萬里塗鮑照東橋詩男子本懸弧有志在四方韋應物集志士中夜心良馬白日足賈閬仙文史縮肉女六切不任事之兒也西漢五行志袁粲身居劇任不肯當事主事每往咨決或高詠對之間居高臥通鑑宋紀謝朏求出為吳興太守置酒數斛遺其弟瀹書曰力飲此勿預人事通鑑齊明帝紀卷終
